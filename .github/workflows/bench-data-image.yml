name: Build bench data image

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile.bench-data'
      - 'scripts/bake_bench_cache.py'
      - '.github/workflows/bench-data-image.yml'
  workflow_dispatch:
    inputs:
      bake_limit:
        description: 'Limit instances per dataset (0 = all)'
        required: false
        default: '0'

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/treemapper-bench-data
  CACHE_REF: ghcr.io/${{ github.repository_owner }}/treemapper-bench-data:buildcache

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          sudo docker image prune -af || true
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.bench-data
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.CACHE_REF }}
          cache-to: type=registry,ref=${{ env.CACHE_REF }},mode=max,image-manifest=true,oci-mediatypes=true
          build-args: |
            BAKE_LIMIT=${{ inputs.bake_limit || '0' }}
            BAKE_PARALLELISM=6
