name: Benchmark Suite

'on':
  workflow_dispatch:
    inputs:
      instances:
        description: 'Number of instances per benchmark'
        required: true
        default: '25'
        type: choice
        options: ['10', '25', '50', '100', '200', '500']
      scoring:
        description: 'Scoring modes to run'
        required: true
        default: 'auto'
        type: choice
        options: ['ppr', 'ego', 'auto']
      budget:
        description: 'Token budget'
        required: true
        default: '8000'

jobs:
  cb-ppr:
    name: ContextBench PPR
    if: inputs.scoring == 'ppr' || inputs.scoring == 'auto'
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            /tmp/contextbench_repos
          key: bench-${{ hashFiles('pyproject.toml') }}-repos-v2
          restore-keys: bench-
      - run: pip install -e ".[dev,tree-sitter]" datasets
      - name: Run
        run: |
          mkdir -p results
          python benchmarks/forensic_contextbench.py \
            --limit ${{ inputs.instances }} \
            --budget ${{ inputs.budget }} \
            2>&1 | tee results/cb_ppr.txt
        env:
          DIFFCTX_SCORING: precise
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cb-ppr
          path: results/

  cb-ego:
    name: ContextBench EgoGraph
    if: inputs.scoring == 'ego' || inputs.scoring == 'auto'
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            /tmp/contextbench_repos
          key: bench-${{ hashFiles('pyproject.toml') }}-repos-v2
          restore-keys: bench-
      - run: pip install -e ".[dev,tree-sitter]" datasets
      - name: Run
        run: |
          mkdir -p results
          python benchmarks/forensic_contextbench.py \
            --limit ${{ inputs.instances }} \
            --budget ${{ inputs.budget }} \
            2>&1 | tee results/cb_ego.txt
        env:
          DIFFCTX_SCORING: discover
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cb-ego
          path: results/

  loo-ppr:
    name: LOO PPR
    if: inputs.scoring == 'ppr' || inputs.scoring == 'auto'
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            /tmp/contextbench_repos
          key: bench-${{ hashFiles('pyproject.toml') }}-repos-v2
          restore-keys: bench-
      - run: pip install -e ".[dev,tree-sitter]" datasets
      - name: Run
        run: |
          mkdir -p results
          python benchmarks/loo_swebench.py \
            --limit ${{ inputs.instances }} \
            --budget ${{ inputs.budget }} \
            --workers 8 \
            --output results/loo_ppr.json \
            2>&1 | tee results/loo_ppr.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loo-ppr
          path: results/

  loo-ego:
    name: LOO EgoGraph
    if: inputs.scoring == 'ego' || inputs.scoring == 'auto'
    runs-on: ubuntu-latest-16-cores
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            /tmp/contextbench_repos
          key: bench-${{ hashFiles('pyproject.toml') }}-repos-v2
          restore-keys: bench-
      - run: pip install -e ".[dev,tree-sitter]" datasets
      - name: Run
        run: |
          mkdir -p results
          python benchmarks/loo_swebench.py \
            --limit ${{ inputs.instances }} \
            --budget ${{ inputs.budget }} \
            --workers 8 \
            --output results/loo_ego.json \
            2>&1 | tee results/loo_ego.txt
        env:
          DIFFCTX_SCORING: discover
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loo-ego
          path: results/

  summary:
    name: Publish results
    runs-on: ubuntu-latest
    needs: [cb-ppr, cb-ego, loo-ppr, loo-ego]
    if: always()
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          path: results/
          merge-multiple: true
      - name: Summary
        run: python benchmarks/summarize_results.py results/ >> "$GITHUB_STEP_SUMMARY"
