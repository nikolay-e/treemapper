name: Benchmark Suite

'on':
  workflow_dispatch:
    inputs:
      instances:
        description: 'Number of instances per benchmark'
        required: true
        default: '25'
        type: choice
        options: ['10', '25', '50', '100', '200', '500']
      scoring:
        description: 'Scoring modes to run'
        required: true
        default: 'auto'
        type: choice
        options: ['ppr', 'ego', 'auto']
      budget:
        description: 'Token budget'
        required: true
        default: '8000'

jobs:
  start-runners:
    name: Start EC2 runners
    runs-on: ubuntu-latest
    outputs:
      cb-ppr-label: ${{ steps.cb-ppr.outputs.label }}
      cb-ppr-id: ${{ steps.cb-ppr.outputs.ec2-instance-id }}
      cb-ego-label: ${{ steps.cb-ego.outputs.label }}
      cb-ego-id: ${{ steps.cb-ego.outputs.ec2-instance-id }}
      loo-ppr-label: ${{ steps.loo-ppr.outputs.label }}
      loo-ppr-id: ${{ steps.loo-ppr.outputs.ec2-instance-id }}
      loo-ego-label: ${{ steps.loo-ego.outputs.label }}
      loo-ego-id: ${{ steps.loo-ego.outputs.ec2-instance-id }}
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'eu-central-1' }}

      - name: Start CB-PPR runner
        id: cb-ppr
        if: inputs.scoring == 'ppr' || inputs.scoring == 'auto'
        uses: machulav/ec2-github-runner@v2
        with:
          mode: start
          github-token: ${{ secrets.GH_PAT }}
          ec2-image-id: ${{ secrets.AWS_AMI_ID }}
          ec2-instance-type: c7g.xlarge
          subnet-id: ${{ secrets.AWS_SUBNET_ID }}
          security-group-id: ${{ secrets.AWS_SG_ID }}
          pre-runner-script: |
            # Failsafe: auto-terminate after 6 hours no matter what
            sudo shutdown -P +360 "Benchmark failsafe: auto-shutdown after 6h"

      - name: Start CB-EGO runner
        id: cb-ego
        if: inputs.scoring == 'ego' || inputs.scoring == 'auto'
        uses: machulav/ec2-github-runner@v2
        with:
          mode: start
          github-token: ${{ secrets.GH_PAT }}
          ec2-image-id: ${{ secrets.AWS_AMI_ID }}
          ec2-instance-type: c7g.xlarge
          subnet-id: ${{ secrets.AWS_SUBNET_ID }}
          security-group-id: ${{ secrets.AWS_SG_ID }}
          pre-runner-script: |
            # Failsafe: auto-terminate after 6 hours no matter what
            sudo shutdown -P +360 "Benchmark failsafe: auto-shutdown after 6h"

      - name: Start LOO-PPR runner
        id: loo-ppr
        if: inputs.scoring == 'ppr' || inputs.scoring == 'auto'
        uses: machulav/ec2-github-runner@v2
        with:
          mode: start
          github-token: ${{ secrets.GH_PAT }}
          ec2-image-id: ${{ secrets.AWS_AMI_ID }}
          ec2-instance-type: c7g.xlarge
          subnet-id: ${{ secrets.AWS_SUBNET_ID }}
          security-group-id: ${{ secrets.AWS_SG_ID }}
          pre-runner-script: |
            # Failsafe: auto-terminate after 6 hours no matter what
            sudo shutdown -P +360 "Benchmark failsafe: auto-shutdown after 6h"

      - name: Start LOO-EGO runner
        id: loo-ego
        if: inputs.scoring == 'ego' || inputs.scoring == 'auto'
        uses: machulav/ec2-github-runner@v2
        with:
          mode: start
          github-token: ${{ secrets.GH_PAT }}
          ec2-image-id: ${{ secrets.AWS_AMI_ID }}
          ec2-instance-type: c7g.xlarge
          subnet-id: ${{ secrets.AWS_SUBNET_ID }}
          security-group-id: ${{ secrets.AWS_SG_ID }}
          pre-runner-script: |
            # Failsafe: auto-terminate after 6 hours no matter what
            sudo shutdown -P +360 "Benchmark failsafe: auto-shutdown after 6h"

  cb-ppr:
    name: ContextBench PPR
    needs: start-runners
    if: inputs.scoring == 'ppr' || inputs.scoring == 'auto'
    runs-on: ${{ needs.start-runners.outputs.cb-ppr-label }}
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev,tree-sitter]" datasets
      - name: Run
        run: |
          mkdir -p results
          python benchmarks/forensic_contextbench.py \
            --limit ${{ inputs.instances }} \
            --budget ${{ inputs.budget }} \
            2>&1 | tee results/cb_ppr.txt
        env:
          DIFFCTX_SCORING: precise
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cb-ppr
          path: results/

  cb-ego:
    name: ContextBench EgoGraph
    needs: start-runners
    if: inputs.scoring == 'ego' || inputs.scoring == 'auto'
    runs-on: ${{ needs.start-runners.outputs.cb-ego-label }}
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev,tree-sitter]" datasets
      - name: Run
        run: |
          mkdir -p results
          python benchmarks/forensic_contextbench.py \
            --limit ${{ inputs.instances }} \
            --budget ${{ inputs.budget }} \
            2>&1 | tee results/cb_ego.txt
        env:
          DIFFCTX_SCORING: discover
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cb-ego
          path: results/

  loo-ppr:
    name: LOO PPR
    needs: start-runners
    if: inputs.scoring == 'ppr' || inputs.scoring == 'auto'
    runs-on: ${{ needs.start-runners.outputs.loo-ppr-label }}
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev,tree-sitter]" datasets
      - name: Run
        run: |
          mkdir -p results
          python benchmarks/loo_swebench.py \
            --limit ${{ inputs.instances }} \
            --budget ${{ inputs.budget }} \
            --workers 8 \
            --output results/loo_ppr.json \
            2>&1 | tee results/loo_ppr.txt
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loo-ppr
          path: results/

  loo-ego:
    name: LOO EgoGraph
    needs: start-runners
    if: inputs.scoring == 'ego' || inputs.scoring == 'auto'
    runs-on: ${{ needs.start-runners.outputs.loo-ego-label }}
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev,tree-sitter]" datasets
      - name: Run
        run: |
          mkdir -p results
          python benchmarks/loo_swebench.py \
            --limit ${{ inputs.instances }} \
            --budget ${{ inputs.budget }} \
            --workers 8 \
            --output results/loo_ego.json \
            2>&1 | tee results/loo_ego.txt
        env:
          DIFFCTX_SCORING: discover
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: loo-ego
          path: results/

  stop-runners:
    name: Stop EC2 runners
    needs: [start-runners, cb-ppr, cb-ego, loo-ppr, loo-ego]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'eu-central-1' }}

      - name: Stop CB-PPR
        if: needs.start-runners.outputs.cb-ppr-label
        uses: machulav/ec2-github-runner@v2
        with:
          mode: stop
          github-token: ${{ secrets.GH_PAT }}
          label: ${{ needs.start-runners.outputs.cb-ppr-label }}
          ec2-instance-id: ${{ needs.start-runners.outputs.cb-ppr-id }}

      - name: Stop CB-EGO
        if: needs.start-runners.outputs.cb-ego-label
        uses: machulav/ec2-github-runner@v2
        with:
          mode: stop
          github-token: ${{ secrets.GH_PAT }}
          label: ${{ needs.start-runners.outputs.cb-ego-label }}
          ec2-instance-id: ${{ needs.start-runners.outputs.cb-ego-id }}

      - name: Stop LOO-PPR
        if: needs.start-runners.outputs.loo-ppr-label
        uses: machulav/ec2-github-runner@v2
        with:
          mode: stop
          github-token: ${{ secrets.GH_PAT }}
          label: ${{ needs.start-runners.outputs.loo-ppr-label }}
          ec2-instance-id: ${{ needs.start-runners.outputs.loo-ppr-id }}

      - name: Stop LOO-EGO
        if: needs.start-runners.outputs.loo-ego-label
        uses: machulav/ec2-github-runner@v2
        with:
          mode: stop
          github-token: ${{ secrets.GH_PAT }}
          label: ${{ needs.start-runners.outputs.loo-ego-label }}
          ec2-instance-id: ${{ needs.start-runners.outputs.loo-ego-id }}

      - name: Kill any orphaned benchmark instances
        if: always()
        run: |
          aws ec2 describe-instances \
            --filters "Name=tag:github:actor,Values=${{ github.actor }}" \
                      "Name=instance-state-name,Values=running,pending" \
            --query "Reservations[].Instances[].InstanceId" \
            --output text | xargs -r aws ec2 terminate-instances --instance-ids || true

  summary:
    name: Publish results
    runs-on: ubuntu-latest
    needs: [cb-ppr, cb-ego, loo-ppr, loo-ego]
    if: always()
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - uses: actions/download-artifact@v4
        with:
          path: results/
          merge-multiple: true
      - name: Summary
        run: python benchmarks/summarize_results.py results/ >> "$GITHUB_STEP_SUMMARY"
