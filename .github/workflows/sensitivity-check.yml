name: sensitivity-check

# Manual trigger only. Runs the Group-C parameter sensitivity analysis
# (±25% / ±50% perturbation) on a given diff range.
on:
  workflow_dispatch:
    inputs:
      diff_range:
        description: 'Git diff range (e.g. HEAD~5..HEAD)'
        required: false
        default: 'HEAD~5..HEAD'
      budget:
        description: 'Token budget for diffctx'
        required: false
        default: '4096'
      params:
        description: 'Comma-separated param list (empty = all Group-C params)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  sensitivity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'

      - name: Install treemapper with dev extras
        run: pip install -e ".[dev,tree-sitter]"

      - name: Run sensitivity check
        env:
          DIFF_RANGE: ${{ inputs.diff_range }}
          BUDGET: ${{ inputs.budget }}
          PARAMS: ${{ inputs.params }}
        run: |
          ARGS=(--diff "${DIFF_RANGE}" --budget "${BUDGET}")
          [[ -n "${PARAMS}" ]] && ARGS+=(--params "${PARAMS}")
          bash scripts/sensitivity_check.sh "${ARGS[@]}" | tee sensitivity_output.txt

      - name: Upload sensitivity report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sensitivity-report-${{ github.run_id }}
          path: sensitivity_output.txt
          retention-days: 30
