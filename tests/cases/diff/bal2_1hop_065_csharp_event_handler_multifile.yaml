                  Console.WriteLine($"Order {eventData.OrderId} placed for {eventData.Amount}");
                  await Task.CompletedTask;
              }
          }
      }
    src/Services/EventBus.cs: |
      using System;
      using System.Collections.Generic;
      using System.Threading.Tasks;
      using App.Events;

      namespace App.Services
      {
          public class EventBus
          {
              private readonly Dictionary<Type, List<object>> _handlers = new();

              public void Register<T>(IEventHandler<T> handler)
              {
                  var type = typeof(T);
                  if (!_handlers.ContainsKey(type))
                      _handlers[type] = new List<object>();
                  _handlers[type].Add(handler);
              }

              public async Task Publish<T>(T eventData)
              {
                  var type = typeof(T);
                  if (_handlers.TryGetValue(type, out var handlers))
                  {
                      foreach (var handler in handlers)
                      {
                          await ((IEventHandler<T>)handler).Handle(eventData);
                      }
                  }
              }
          }
      }
    src/Services/OrderProcessor.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Events;
      using App.Services;

      namespace App.Services
      {
          public class OrderProcessor
          {
              private readonly EventBus _eventBus;

              public OrderProcessor(EventBus eventBus)
              {
                  _eventBus = eventBus;
              }

              public async Task ProcessOrder(Guid orderId, decimal amount)
              {
                  var evt = new OrderPlacedEvent
                  {
                      OrderId = orderId,
                      Amount = amount,
                      OccurredAt = DateTime.UtcNow
                  };
                  await _eventBus.Publish(evt);
              }
          }
      }
