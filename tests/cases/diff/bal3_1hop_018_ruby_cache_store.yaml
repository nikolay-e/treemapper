  changed_files:
    lib/cache/memory_store.rb: |
      module Cache
        class MemoryStore
          def initialize(default_ttl: nil)
            @data = {}
            @expiry = {}
            @default_ttl = default_ttl
          end

          def read(key)
            if @expiry[key] && Time.now > @expiry[key]
              delete(key)
              return nil
            end
            @data[key]
          end

          def write(key, value, ttl: nil)
            @data[key] = value
            effective_ttl = ttl || @default_ttl
            @expiry[key] = Time.now + effective_ttl if effective_ttl
          end

          def delete(key)
            @data.delete(key)
            @expiry.delete(key)
          end

          def clear
            @data.clear
            @expiry.clear
          end
        end
      end
  commit_message: "fix: add TTL expiration and clear method to MemoryStore"
