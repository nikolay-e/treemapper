  changed_files:
    src/Auth/TokenStore.php: |
      <?php
      namespace App\Auth;

      class TokenStore {
          private array $tokens = [];
          private array $expiry = [];
          public function store(string $userId, string $token, int $ttl = 3600): void {
              $this->tokens[$userId] = $token;
              $this->expiry[$userId] = time() + $ttl;
          }
          public function verify(string $token): ?string {
              $userId = array_search($token, $this->tokens) ?: null;
              if ($userId && isset($this->expiry[$userId]) && $this->expiry[$userId] < time()) {
                  unset($this->tokens[$userId], $this->expiry[$userId]);
                  return null;
              }
              return $userId;
          }
      }
