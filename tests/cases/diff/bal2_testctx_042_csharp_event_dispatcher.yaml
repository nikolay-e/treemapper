repo:
  initial_files:
    src/Events/EventDispatcher.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Events
      {
          public class EventDispatcher
          {
              private readonly Dictionary<string, List<Action<object>>> _handlers = new();

              public void Subscribe(string eventName, Action<object> handler)
              {
                  if (!_handlers.ContainsKey(eventName))
                      _handlers[eventName] = new List<Action<object>>();
                  _handlers[eventName].Add(handler);
              }

              public void Publish(string eventName, object payload)
              {
                  if (!_handlers.ContainsKey(eventName)) return;
                  foreach (var handler in _handlers[eventName])
                      handler(payload);
              }
          }
      }
    Tests/EventDispatcherTests.cs: |
      using Xunit;
      using App.Events;

      namespace App.Tests
      {
          public class EventDispatcherTests
          {
              [Fact]
              public void Publish_WithSubscriber_InvokesHandler()
              {
                  var dispatcher = new EventDispatcher();
                  object received = null;
                  dispatcher.Subscribe("test", payload => received = payload);
                  dispatcher.Publish("test", "hello");
                  Assert.Equal("hello", received);
              }

              [Fact]
              public void Publish_NoSubscribers_DoesNotThrow()
              {
                  var dispatcher = new EventDispatcher();
                  dispatcher.Publish("unknown", null);
              }
          }
      }
    src/Events/EventStore.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Events
      {
          public class EventStore
          {
              private readonly List<(string Name, object Payload, DateTime Timestamp)> _events = new();

              public void Append(string name, object payload)
              {
                  _events.Add((name, payload, DateTime.UtcNow));
              }

              public int Count => _events.Count;
          }
      }
