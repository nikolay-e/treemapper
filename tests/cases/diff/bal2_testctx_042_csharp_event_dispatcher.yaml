  changed_files:
    src/Events/EventDispatcher.cs: |
      using System;
      using System.Collections.Generic;
      using System.Threading.Tasks;

      namespace App.Events
      {
          public class EventDispatcher
          {
              private readonly Dictionary<string, List<Func<object, Task>>> _handlers = new();

              public void Subscribe(string eventName, Func<object, Task> handler)
              {
                  if (!_handlers.ContainsKey(eventName))
                      _handlers[eventName] = new List<Func<object, Task>>();
                  _handlers[eventName].Add(handler);
              }

              public void Unsubscribe(string eventName)
              {
                  _handlers.Remove(eventName);
              }

              public async Task PublishAsync(string eventName, object payload)
              {
                  if (!_handlers.ContainsKey(eventName)) return;
                  foreach (var handler in _handlers[eventName])
                      await handler(payload);
              }

              public bool HasSubscribers(string eventName)
              {
                  return _handlers.ContainsKey(eventName) && _handlers[eventName].Count > 0;
              }
          }
      }
  commit_message: "refactor: make event dispatcher async, add unsubscribe"
