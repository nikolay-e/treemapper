  changed_files:
    src/Formatting/AddressFormatter.cs: |
      using System;

      namespace App.Formatting
      {
          public class Address
          {
              public string Street { get; set; }
              public string City { get; set; }
              public string State { get; set; }
              public string ZipCode { get; set; }
              public string Country { get; set; }
          }

          public class AddressFormatter
          {
              public string Format(Address address, bool includeCountry = false)
              {
                  var result = $"{address.Street}, {address.City}, {address.State} {address.ZipCode}";
                  if (includeCountry && !string.IsNullOrWhiteSpace(address.Country))
                      result += $", {address.Country}";
                  return result;
              }

              public bool IsValid(Address address)
              {
                  return !string.IsNullOrWhiteSpace(address.Street)
                      && !string.IsNullOrWhiteSpace(address.City)
                      && !string.IsNullOrWhiteSpace(address.ZipCode);
              }

              public string FormatMultiLine(Address address)
              {
                  return $"{address.Street}\n{address.City}, {address.State} {address.ZipCode}";
              }
          }
      }
  commit_message: "feat: add country field, optional country in format, multiline"
