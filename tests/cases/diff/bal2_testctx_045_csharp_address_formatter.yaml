repo:
  initial_files:
    src/Formatting/AddressFormatter.cs: |
      using System;

      namespace App.Formatting
      {
          public class Address
          {
              public string Street { get; set; }
              public string City { get; set; }
              public string State { get; set; }
              public string ZipCode { get; set; }
          }

          public class AddressFormatter
          {
              public string Format(Address address)
              {
                  return $"{address.Street}, {address.City}, {address.State} {address.ZipCode}";
              }

              public bool IsValid(Address address)
              {
                  return !string.IsNullOrWhiteSpace(address.Street)
                      && !string.IsNullOrWhiteSpace(address.City)
                      && !string.IsNullOrWhiteSpace(address.ZipCode);
              }
          }
      }
    Tests/AddressFormatterTests.cs: |
      using Xunit;
      using App.Formatting;

      namespace App.Tests
      {
          public class AddressFormatterTests
          {
              private readonly AddressFormatter _formatter = new AddressFormatter();

              [Fact]
              public void Format_CompleteAddress_ReturnsFormattedString()
              {
                  var addr = new Address
                  {
                      Street = "123 Main St",
                      City = "Springfield",
                      State = "IL",
                      ZipCode = "62704"
                  };
                  Assert.Contains("Springfield", _formatter.Format(addr));
              }

              [Fact]
              public void IsValid_MissingStreet_ReturnsFalse()
              {
                  var addr = new Address { City = "Test", ZipCode = "12345" };
                  Assert.False(_formatter.IsValid(addr));
              }

              [Fact]
              public void IsValid_CompleteAddress_ReturnsTrue()
              {
                  var addr = new Address
                  {
                      Street = "1 Elm",
                      City = "Town",
                      State = "CA",
                      ZipCode = "90210"
                  };
                  Assert.True(_formatter.IsValid(addr));
              }
          }
      }
    src/Formatting/PhoneFormatter.cs: |
      using System;

      namespace App.Formatting
      {
          public class PhoneFormatter
          {
              public string Format(string phone)
              {
                  if (phone.Length == 10)
                      return $"({phone[..3]}) {phone[3..6]}-{phone[6..]}";
                  return phone;
              }
          }
      }
