            @counters[name] = (@counters[name] || 0) + 1
          end

          def get(name)
            @counters[name] || 0
          end
        end
      end
    lib/gateway/health_check.rb: |
      module Gateway
        class HealthCheck
          def status
            { status: 'healthy', uptime: Process.clock_gettime(Process::CLOCK_MONOTONIC) }
          end
        end
      end
