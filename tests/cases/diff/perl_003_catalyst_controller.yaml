repo:
  initial_files:
    src/finance/ledger.rs: |
      use std::collections::HashMap;

      #[derive(Debug, Clone)]
      pub struct Account {
          pub id: String,
          pub balance_cents: i64,
      }

      pub struct Ledger {
          accounts: HashMap<String, Account>,
      }

      impl Ledger {
          pub fn new() -> Self {
              Self { accounts: HashMap::new() }
          }

          pub fn open_account(&mut self, id: &str, initial_cents: i64) {
              self.accounts.insert(id.to_string(), Account {
                  id: id.to_string(),
                  balance_cents: initial_cents,
              });
          }

          pub fn transfer(&mut self, from: &str, to: &str, amount_cents: i64) -> bool {
              let from_balance = self.accounts.get(from).map(|a| a.balance_cents).unwrap_or(0);
              if from_balance < amount_cents {
                  return false;
              }
              if let Some(acc) = self.accounts.get_mut(from) {
                  acc.balance_cents -= amount_cents;
              }
              if let Some(acc) = self.accounts.get_mut(to) {
                  acc.balance_cents += amount_cents;
              }
              true
          }

          pub fn balance(&self, id: &str) -> Option<i64> {
              self.accounts.get(id).map(|a| a.balance_cents)
          }
      }
    src/finance/transaction_log.rs: |
      use crate::finance::ledger::Ledger;

      pub struct TransactionLog {
          ledger: Ledger,
          entries: Vec<String>,
      }

      impl TransactionLog {
          pub fn new() -> Self {
              Self { ledger: Ledger::new(), entries: Vec::new() }
          }

          pub fn record_transfer(&mut self, from: &str, to: &str, amount_cents: i64) -> bool {
              let ok = self.ledger.transfer(from, to, amount_cents);
              if ok {
                  self.entries.push(format!("TRANSFER {} -> {} : {} cents", from, to, amount_cents));
              }
              ok
          }
      }
