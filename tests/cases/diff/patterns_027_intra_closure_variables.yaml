repo:
  initial_files:
    counter.py: |
      def make_counter(start=0):
          count = start

          def increment():
              nonlocal count
              count += 1
              return count

          def decrement():
              nonlocal count
              count -= 1
              return count

          def get_value():
              return count

          return increment, decrement, get_value
    accumulator.py: |
      def make_accumulator(initial=0.0):
          total = initial

          def add(value):
              nonlocal total
              total += value
              return total

          def reset():
              nonlocal total
              total = 0.0
              return total

          return add, reset
    timer.py: |
      import time

      def make_timer(step=1.0):
          start_time = time.time()
          elapsed = 0.0

          def tick():
              nonlocal elapsed
              elapsed += step
              return elapsed

          def get_elapsed():
              return time.time() - start_time

          return tick, get_elapsed
