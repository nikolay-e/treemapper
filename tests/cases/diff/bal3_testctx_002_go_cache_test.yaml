      func (s *Store) Set(key, value string) {
          s.mu.Lock()
          defer s.mu.Unlock()
          s.data[key] = value
      }

      func (s *Store) Delete(key string) bool {
          s.mu.Lock()
          defer s.mu.Unlock()
          if _, ok := s.data[key]; ok {
              delete(s.data, key)
              return true
          }
          return false
      }
