name: javascript_extended_009_type_change
tags:
- lang:typescript
- change:single_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    src/types.ts: |
      export type Config = {
          apiUrl: string;
          timeout: number;
      };

      export type Environment = 'development' | 'staging' | 'production';

      export type LogLevel = 'debug' | 'info' | 'warn' | 'error';

      export function createDefaultConfig(): Config {
          return {
              apiUrl: 'http://localhost:3000',
              timeout: 5000,
          };
      }
    src/app.ts: |
      import { Config, Environment, createDefaultConfig } from './types';

      export function initApp(env: Environment): Config {
          const config = createDefaultConfig();
          if (env === 'production') {
              config.apiUrl = 'https://api.example.com';
          }
          return config;
      }

      export function getApiUrl(config: Config): string {
          return config.apiUrl;
      }
    src/services/configPersistence.ts: |
      import { Config, createDefaultConfig } from '../types';

      const STORAGE_KEY = 'app_config';

      export function saveConfig(config: Config): void {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(config));
      }

      export function loadConfig(): Config {
          const stored = localStorage.getItem(STORAGE_KEY);
          if (!stored) return createDefaultConfig();
          return JSON.parse(stored) as Config;
      }

      export function clearConfig(): void {
          localStorage.removeItem(STORAGE_KEY);
      }
    src/middleware/requestConfig.ts: |
      import { Request, Response, NextFunction } from 'express';
      import { Config } from '../types';

      export function attachConfig(config: Config) {
          return (req: Request, _res: Response, next: NextFunction) => {
              (req as any).config = config;
              next();
          };
      }

      export function getRequestConfig(req: Request): Config {
          return (req as any).config;
      }
    src/utils/envParser.ts: |
      import { Config, LogLevel } from '../types';

      export function parseEnvConfig(): Partial<Config> {
          const result: Partial<Config> = {};
          if (process.env.API_URL) result.apiUrl = process.env.API_URL;
          if (process.env.TIMEOUT) result.timeout = parseInt(process.env.TIMEOUT);
          if (process.env.DEBUG) result.debug = process.env.DEBUG === 'true';
          if (process.env.LOG_LEVEL) result.logLevel = process.env.LOG_LEVEL as LogLevel;
          return result;
      }

      export function validateEnvConfig(partial: Partial<Config>): string[] {
          const errors: string[] = [];
          if (partial.timeout !== undefined && partial.timeout < 0) errors.push('timeout must be positive');
          return errors;
      }
