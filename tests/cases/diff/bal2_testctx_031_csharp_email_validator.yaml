  changed_files:
    src/Validators/EmailValidator.cs: |
      using System;
      using System.Text.RegularExpressions;
      using System.Collections.Generic;

      namespace App.Validators
      {
          public class EmailValidator
          {
              private static readonly Regex EmailRegex = new Regex(
                  @"^[^@\s]+@[^@\s]+\.[^@\s]+$",
                  RegexOptions.Compiled);

              private static readonly HashSet<string> BlockedDomains = new HashSet<string>
              {
                  "tempmail.com", "throwaway.net"
              };

              public bool IsValid(string email)
              {
                  if (string.IsNullOrWhiteSpace(email)) return false;
                  return EmailRegex.IsMatch(email);
              }

              public bool IsAllowed(string email)
              {
                  if (!IsValid(email)) return false;
                  var domain = email.Split('@')[1];
                  return !BlockedDomains.Contains(domain.ToLowerInvariant());
              }
          }
      }
  commit_message: "feat: add blocked domain check to email validator"
