      def yarn_needed(width_cm: float, length_cm: float, gauge: float) -> float:
          return width_cm * length_cm * gauge * 0.01

      def stitch_count(width_cm: float, gauge_per_cm: float) -> int:
          return int(width_cm * gauge_per_cm)

