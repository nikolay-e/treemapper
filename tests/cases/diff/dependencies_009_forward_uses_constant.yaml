    validator.py: |
      def validate():
          pass
    auth/session.py: |
      from constants import SESSION_TIMEOUT_SECONDS

      class SessionManager:
          def __init__(self):
              self.timeout = SESSION_TIMEOUT_SECONDS
              self.sessions = {}

          def create_session(self, user_id: int) -> str:
              import hashlib
              token = hashlib.sha256(str(user_id).encode()).hexdigest()
              self.sessions[token] = {"user_id": user_id, "timeout": self.timeout}
              return token
    auth/lockout.py: |
      from constants import MAX_LOGIN_ATTEMPTS, SESSION_TIMEOUT_SECONDS

      class LoginLockout:
          def __init__(self):
              self.attempts = {}
              self.max_attempts = MAX_LOGIN_ATTEMPTS

          def record_failure(self, user_id: int) -> bool:
              self.attempts[user_id] = self.attempts.get(user_id, 0) + 1
              return self.attempts[user_id] >= self.max_attempts

          def is_locked(self, user_id: int) -> bool:
              return self.attempts.get(user_id, 0) >= MAX_LOGIN_ATTEMPTS
