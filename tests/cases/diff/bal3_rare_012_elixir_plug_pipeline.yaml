repo:
  initial_files:
    src/auth/token.rs: |
      use std::time::{SystemTime, UNIX_EPOCH};

      pub struct Token {
          pub user_id: u64,
          pub expires_at: u64,
          pub scope: String,
      }

      pub fn verify_token(raw: &str) -> Result<Token, String> {
          let parts: Vec<&str> = raw.splitn(3, '.').collect();
          if parts.len() != 3 {
              return Err("malformed token".to_string());
          }
          let expires_at: u64 = parts[1].parse().map_err(|_| "invalid expiry".to_string())?;
          let now = SystemTime::now()
              .duration_since(UNIX_EPOCH)
              .unwrap()
              .as_secs();
          if now > expires_at {
              return Err("token expired".to_string());
          }
          Ok(Token {
              user_id: parts[0].parse().unwrap_or(0),
              expires_at,
              scope: parts[2].to_string(),
          })
      }
    src/auth/middleware.rs: |
      use crate::auth::token::verify_token;

      pub struct AuthContext {
          pub user_id: u64,
          pub scope: String,
      }

      pub fn authenticate(header: Option<&str>) -> Result<AuthContext, String> {
          let header = header.ok_or("missing authorization header")?;
          let raw = header.strip_prefix("Bearer ").ok_or("invalid scheme")?;
          let token = verify_token(raw)?;
          Ok(AuthContext {
              user_id: token.user_id,
              scope: token.scope,
          })
      }
    src/handlers/profile.rs: |
      use crate::auth::middleware::authenticate;

      pub fn handle_profile(auth_header: Option<&str>) -> Result<String, String> {
          let ctx = authenticate(auth_header)?;
          Ok(format!("profile for user {}", ctx.user_id))
      }
    tests/auth_integration.rs: |
      use crate::auth::token::verify_token;
      use crate::auth::middleware::authenticate;

      #[test]
      fn test_verify_valid_token() {
          let far_future = 9999999999u64;
          let raw = format!("42.{}.read:profile", far_future);
          let token = verify_token(&raw).unwrap();
          assert_eq!(token.user_id, 42);
          assert_eq!(token.scope, "read:profile");
      }

      #[test]
      fn test_authenticate_bearer() {
          let far_future = 9999999999u64;
          let raw = format!("Bearer 7.{}.write:data", far_future);
          let ctx = authenticate(Some(&raw)).unwrap();
          assert_eq!(ctx.user_id, 7);
      }

      #[test]
      fn test_expired_token_rejected() {
          let raw = "5.1000000000.read:data";
          assert!(verify_token(raw).is_err());
      }
