repo:
  initial_files:
    lib/auth_plug.ex: |
      defmodule AuthPlug do
        import Plug.Conn

        def init(opts), do: opts

        def call(conn, _opts) do
          case get_req_header(conn, "authorization") do
            ["Bearer " <> token] ->
              assign(conn, :current_user, verify_token(token))
            _ ->
              conn
              |> send_resp(401, "Unauthorized")
              |> halt()
          end
        end

        defp verify_token(token) do
          %{id: "user_1", token: token}
        end
      end
    lib/router.ex: |
      defmodule Router do
        use Plug.Router

        plug :match
        plug AuthPlug
        plug :dispatch

        get "/profile" do
          user = conn.assigns[:current_user]
          send_resp(conn, 200, "Hello #{user.id}")
        end

        get "/settings" do
          user = conn.assigns[:current_user]
          send_resp(conn, 200, "Settings for #{user.id}")
        end

        match _ do
          send_resp(conn, 404, "Not found")
        end
      end
    lib/rate_limiter.ex: |
      defmodule RateLimiter do
        @garbage_rare_012_rate_a 100
        @garbage_rare_012_window_b 60

        def check(_conn), do: :ok
      end
    lib/metrics_plug.ex: |
      defmodule MetricsPlug do
        @garbage_rare_012_metric_c "prometheus"
        @garbage_rare_012_prefix_d "http"

        def init(opts), do: opts
        def call(conn, _opts), do: conn
      end
    lib/cors_plug.ex: |
      defmodule CorsPlug do
        @garbage_rare_012_origin_e "*"
        @garbage_rare_012_methods_f "GET,POST"

        def init(opts), do: opts
        def call(conn, _opts), do: conn
      end
  changed_files:
    lib/auth_plug.ex: |
      defmodule AuthPlug do
        import Plug.Conn

        @allowed_roles ~w(admin editor viewer)

        def init(opts), do: opts

        def call(conn, _opts) do
          case get_req_header(conn, "authorization") do
            ["Bearer " <> token] ->
              case verify_token(token) do
                {:ok, user} ->
                  conn
                  |> assign(:current_user, user)
                  |> assign(:user_role, user.role)
                {:error, reason} ->
                  conn
                  |> send_resp(401, "Invalid token: #{reason}")
                  |> halt()
              end
            _ ->
              conn
              |> send_resp(401, "Unauthorized")
              |> halt()
          end
        end

        defp verify_token(token) do
          if String.length(token) > 0 do
            {:ok, %{id: "user_1", token: token, role: "viewer"}}
          else
            {:error, "empty token"}
          end
        end
      end
  commit_message: "add role-based auth and error handling to AuthPlug"
