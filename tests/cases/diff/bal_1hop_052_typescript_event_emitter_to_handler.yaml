repo:
  initial_files:
    src/events/eventBus.ts: |
      type Listener = (data: unknown) => void;

      const listeners = new Map<string, Listener[]>();

      export function on(event: string, listener: Listener): void {
        const list = listeners.get(event) ?? [];
        list.push(listener);
        listeners.set(event, list);
      }

      export function emit(event: string, data: unknown): void {
        const list = listeners.get(event) ?? [];
        for (const listener of list) {
          listener(data);
        }
      }
    src/handlers/orderHandler.ts: |
      import { on, emit } from '../events/eventBus';

      export function initOrderHandlers(): void {
        on('order:created', (data) => {
          const order = data as { id: string; total: number };
          console.log(`Order ${order.id} created: $${order.total}`);
          if (order.total > 100) {
            emit('order:high-value', data);
          }
        });
      }
    src/handlers/notificationHandler.ts: |
      export function sendPushNotification(userId: string, message: string): void {
        console.log(`Push to ${userId}: ${message}`);
      }
    src/models/orderModel.ts: |
      export interface Order {
        id: string;
        items: string[];
        total: number;
        status: 'pending' | 'paid' | 'shipped';
      }
  changed_files:
    src/events/eventBus.ts: |
      type Listener = (data: unknown) => void;

      const listeners = new Map<string, Listener[]>();

      export function on(event: string, listener: Listener): void {
        const list = listeners.get(event) ?? [];
        list.push(listener);
        listeners.set(event, list);
      }

      export function once(event: string, listener: Listener): void {
        const wrapper: Listener = (data) => {
          off(event, wrapper);
          listener(data);
        };
        on(event, wrapper);
      }

      export function off(event: string, listener: Listener): void {
        const list = listeners.get(event) ?? [];
        const idx = list.indexOf(listener);
        if (idx >= 0) list.splice(idx, 1);
      }

      export function emit(event: string, data: unknown): void {
        const list = listeners.get(event) ?? [];
        for (const listener of list) {
          listener(data);
        }
      }

      export function listenerCount(event: string): number {
        return (listeners.get(event) ?? []).length;
      }
  commit_message: "feat: add once, off, and listenerCount to event bus"
