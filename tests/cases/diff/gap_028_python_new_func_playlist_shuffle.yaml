  changed_files:
    music/library.py: |
      import random
      from music.track import Track, Playlist

      def create_playlist(name: str, tracks: list[Track]) -> Playlist:
          return Playlist(name=name, tracks=tracks)

      def filter_by_genre(playlist: Playlist, genre: str) -> list[Track]:
          return [t for t in playlist.tracks if t.genre == genre]

      def weighted_shuffle(playlist: Playlist, preferred_genre: str, weight: float = 2.0) -> Playlist:
          scored = []
          for track in playlist.tracks:
              score = random.random() * (weight if track.genre == preferred_genre else 1.0)
              scored.append((score, track))
          scored.sort(key=lambda x: x[0], reverse=True)
          return Playlist(
              name=f"{playlist.name} (shuffled)",
              tracks=[t for _, t in scored],
          )
  commit_message: "add weighted shuffle favoring preferred genre"
