name: helm_002_values_to_service
repo:
  initial_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: payment-svc
      version: 2.1.0
      appVersion: "3.0.0"
    chart/values.yaml: |
      replicaCount: 2
      image:
        repository: payment-service
        tag: "3.0.0"
      service:
        type: ClusterIP
        port: 80
      ingress:
        enabled: false
    chart/templates/_helpers.tpl: |
      {{- define "payment-svc.fullname" -}}
      {{- printf "%s-%s" .Release.Name .Chart.Name | trunc 63 | trimSuffix "-" }}
      {{- end }}

      {{- define "payment-svc.labels" -}}
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      {{- end }}
    chart/templates/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: {{ include "payment-svc.fullname" . }}
        labels:
          {{- include "payment-svc.labels" . | nindent 4 }}
      spec:
        type: {{ .Values.service.type }}
        ports:
          - port: {{ .Values.service.port }}
            targetPort: http
            protocol: TCP
            name: http
        selector:
          {{- include "payment-svc.labels" . | nindent 4 }}
    chart/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ include "payment-svc.fullname" . }}
      spec:
        replicas: {{ .Values.replicaCount }}
        selector:
          matchLabels:
            {{- include "payment-svc.labels" . | nindent 6 }}
        template:
          metadata:
            labels:
              {{- include "payment-svc.labels" . | nindent 8 }}
          spec:
            containers:
              - name: {{ .Chart.Name }}
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
                ports:
                  - name: http
                    containerPort: 8080
    chart/templates/backup-cronjob.yaml: |
      apiVersion: batch/v1
      kind: CronJob
      metadata:
      spec:
        schedule: "0 2 * * *"
        jobTemplate:
          spec:
            template:
              spec:
                containers:
                    image: backup-tool:latest
                restartPolicy: OnFailure
    chart/docs/api-spec.md: |
      # Payment API Specification
      ## Endpoints
      POST /api/v1/payments
  changed_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: payment-svc
      version: 2.1.0
      appVersion: "3.0.0"
    chart/values.yaml: |
      replicaCount: 2
      image:
        repository: payment-service
        tag: "3.0.0"
      service:
        type: LoadBalancer
        port: 443
        annotations:
          service.beta.kubernetes.io/aws-load-balancer-type: nlb
      ingress:
        enabled: false
    chart/templates/_helpers.tpl: |
      {{- define "payment-svc.fullname" -}}
      {{- printf "%s-%s" .Release.Name .Chart.Name | trunc 63 | trimSuffix "-" }}
      {{- end }}

      {{- define "payment-svc.labels" -}}
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      {{- end }}
    chart/templates/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: {{ include "payment-svc.fullname" . }}
        labels:
          {{- include "payment-svc.labels" . | nindent 4 }}
      spec:
        type: {{ .Values.service.type }}
        ports:
          - port: {{ .Values.service.port }}
            targetPort: http
            protocol: TCP
            name: http
        selector:
          {{- include "payment-svc.labels" . | nindent 4 }}
    chart/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ include "payment-svc.fullname" . }}
      spec:
        replicas: {{ .Values.replicaCount }}
        selector:
          matchLabels:
            {{- include "payment-svc.labels" . | nindent 6 }}
        template:
          metadata:
            labels:
              {{- include "payment-svc.labels" . | nindent 8 }}
          spec:
            containers:
              - name: {{ .Chart.Name }}
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
                ports:
                  - name: http
                    containerPort: 8080
    chart/templates/backup-cronjob.yaml: |
      apiVersion: batch/v1
      kind: CronJob
      metadata:
      spec:
        schedule: "0 2 * * *"
        jobTemplate:
          spec:
            template:
              spec:
                containers:
                    image: backup-tool:latest
                restartPolicy: OnFailure
    chart/docs/api-spec.md: |
      # Payment API Specification
      ## Endpoints
      POST /api/v1/payments
  commit_message: Update files
fragments:
- id: values_service_type
  selector:
    path: chart/values.yaml
    anchor: 'type: LoadBalancer'
- id: values_service_port
  selector:
    path: chart/values.yaml
    anchor: 'port: 443'
- id: values_lb_annotation
  selector:
    path: chart/values.yaml
    anchor: aws-load-balancer-type
- id: service_template_uses_type
  selector:
    path: chart/templates/service.yaml
    anchor: .Values.service.type
- id: service_template_uses_port
  selector:
    path: chart/templates/service.yaml
    anchor: .Values.service.port
- id: no_backup_cronjob
  selector:
    path: chart/templates/backup-cronjob.yaml
    anchor: backup-tool
- id: no_api_spec
  selector:
    path: chart/docs/api-spec.md
    anchor: Payment API
- id: no_deployment_template
  selector:
    path: chart/templates/deployment.yaml
    anchor: .Values.replicaCount
oracle:
  required:
  - values_service_type
  - values_service_port
  - values_lb_annotation
  - service_template_uses_type
  - service_template_uses_port
  allowed: []
  forbidden:
  - no_backup_cronjob
  - no_api_spec
  - no_deployment_template
