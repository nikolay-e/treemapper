  changed_files:
    pkg/notification/sender.go: |
      package notification

      import "strings"

      type Message struct {
          To      string
          Subject string
          Body    string
      }

      type Sender struct {
          provider Provider
      }

      func NewSender(p Provider) *Sender {
          return &Sender{provider: p}
      }

      func (s *Sender) Send(msg Message) error {
          return s.provider.Deliver(msg.To, msg.Subject, msg.Body)
      }

      func (s *Sender) SendBatch(msgs []Message) []error {
          errs := make([]error, 0, len(msgs))
          for _, msg := range msgs {
              if err := s.Send(msg); err != nil {
                  errs = append(errs, err)
              }
          }
          if len(errs) == 0 {
              return nil
          }
          return errs
      }

      func (s *Sender) SendBulkAlert(recipients []string, subject, body string) []error {
          msgs := make([]Message, 0, len(recipients))
          for _, r := range recipients {
              r = strings.TrimSpace(r)
              if r != "" {
                  msgs = append(msgs, Message{To: r, Subject: subject, Body: body})
              }
          }
          return s.SendBatch(msgs)
      }
    pkg/notification/provider.go: |
      package notification

      type Provider interface {
          Deliver(to, subject, body string) error
      }
    internal/alerts/alert_service.go: |
      package alerts

      import "pkg/notification"

      type AlertService struct {
          sender *notification.Sender
      }

      func NewAlertService(s *notification.Sender) *AlertService {
          return &AlertService{sender: s}
      }

      func (a *AlertService) SendAlert(email, alertMsg string) error {
          return a.sender.Send(notification.Message{
              To:      email,
              Subject: "Alert",
              Body:    alertMsg,
          })
      }

      func (a *AlertService) BroadcastAlert(emails []string, alertMsg string) []error {
          return a.sender.SendBulkAlert(emails, "Alert", alertMsg)
      }
    internal/monitoring/checker.go: |
      package monitoring

      import "internal/alerts"

      type Checker struct {
          alerts *alerts.AlertService
      }

      func NewChecker(a *alerts.AlertService) *Checker {
          return &Checker{alerts: a}
      }

      func (c *Checker) Check(endpoint, contactEmail string) error {
          return c.alerts.SendAlert(contactEmail, "Endpoint "+endpoint+" is down")
      }
