    logger = Logger()
    logger.info("Starting CLI")

must_include_files:
- app/BUILD
- libs/utils/utils.py

must_include_content_from:
  app/BUILD:
    - '//libs/utils:utils'
  libs/utils/utils.py:
    - parse_config
    - validate_input

must_not_include:
- GARBAGE_BAZEL_001_A
- GARBAGE_BAZEL_001_B
- GARBAGE_BAZEL_001_C
- GARBAGE_BAZEL_001_D

must_not_include_files:
- libs/logging/BUILD
- libs/logging/logger.py
- other/BUILD
- other/cli.py

max_files: 4
add_garbage_files: false
skip_garbage_check: true
