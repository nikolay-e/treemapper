      from libs.database.client import DatabaseClient
      from libs.utils.utils import parse_config, validate_input

      class Application:
          def __init__(self, config_path="app.conf"):
              self.db = DatabaseClient()
              self.config = parse_config(config_path)

          def run(self):
              validate_input(self.config, ["host", "port"])
              self.db.connect()
