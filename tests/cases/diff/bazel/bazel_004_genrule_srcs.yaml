  codegen/templates/events.tmpl: |
    class {{ .Name }}Event:
        def __init__(self, {{ range .Fields }}{{ .Name }}: {{ .Type }}, {{ end }}):
            {{ range .Fields }}self.{{ .Name }} = {{ .Name }}
            {{ end }}
            self.timestamp = None

        def emit(self):
            import json
            return json.dumps(self.to_dict())

        def to_dict(self):
            return {
                "type": "{{ .Name }}",
                {{ range .Fields }}"{{ .Name }}": self.{{ .Name }},
                {{ end }}
                "timestamp": self.timestamp,
            }
  codegen/scripts/generator.py: |
