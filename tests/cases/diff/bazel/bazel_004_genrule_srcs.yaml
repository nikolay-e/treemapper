must_include_files:
- codegen/BUILD
- codegen/templates/events.tmpl

must_include_content_from:
  codegen/BUILD:
    - events.tmpl
    - events_model.py
  codegen/templates/events.tmpl:
    - Event
    - emit

must_not_include:
- GARBAGE_BAZEL_004_A
- GARBAGE_BAZEL_004_B
- GARBAGE_BAZEL_004_C
- GARBAGE_BAZEL_004_D
- GARBAGE_BAZEL_004_E

must_not_include_files:
- codegen/templates/legacy.tmpl
- codegen/scripts/validate.sh
- services/BUILD
- services/api.py
- data/BUILD

max_files: 4
add_garbage_files: false
skip_garbage_check: true
