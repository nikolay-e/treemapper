must_include_files:
  - game/state.lua
  # Q1+Q2: sprite.lua defines create_animated and update_animated
  - game/sprite.lua
must_include_content_from:
  game/state.lua:
    - "sprite.create_animated"
    - "sprite.update_animated"
    - "spawn_enemy"
  game/sprite.lua:
    - "function M.create_animated(sheet_path, frame_count, fps)"
    - "frame_width = iw / frame_count"
must_not_include:
  # game/audio.lua: sound manager — same directory but no dependency
  - GARBAGE_LUA_003_A
  - "love.audio.newSource"
  - "M.load_sound"
  - "M.play_music"
  # game/input.lua: input handler — same directory but no dependency
  - GARBAGE_LUA_003_B
  - "M.is_pressed"
  - "M.get_axis"
  - "love.keyboard.isDown"
must_not_include_files:
  - game/audio.lua
  - game/input.lua
max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
