must_include_files:
  - app/handler.lua
  # Q1+Q2: validator.lua defines validate_email called by handler.lua
  - lib/validator.lua
must_include_content_from:
  app/handler.lua:
    - "validator.validate_email"
    - 'require("lib.validator")'
  lib/validator.lua:
    - "function M.validate_email(email)"
    - "invalid email format"
must_not_include:
  # lib/sanitizer.lua: input sanitization — similar domain but not required
  - GARBAGE_LUA_005_A
  - "M.escape_html"
  - "M.strip_tags"
  - "M.normalize_whitespace"
  # app/admin_handler.lua: different handler — uses validator too but
  # reviewing its code doesn't help understand handler.lua's change
  - GARBAGE_LUA_005_B
  - "handle_update_config"
  - "handle_delete_user"
must_not_include_files:
  - lib/sanitizer.lua
  - app/admin_handler.lua
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
