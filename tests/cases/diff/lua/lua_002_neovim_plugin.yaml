must_include_files:
  - plugin/lsp.lua
  # Q1+Q2: keymap.lua defines buf_map and merge_opts called by lsp.lua
  - lua/keymap.lua
must_include_content_from:
  plugin/lsp.lua:
    - "keymap.buf_map"
    - "vim.lsp.buf.code_action"
    - "vim.lsp.buf.rename"
  lua/keymap.lua:
    - "function M.buf_map(bufnr, mode, lhs, rhs, opts)"
    - "function M.merge_opts(user_opts)"
must_not_include:
  # plugin/treesitter.lua: treesitter config — different plugin domain
  - GARBAGE_LUA_002_A
  - "nvim-treesitter.configs"
  - "ensure_installed"
  - "incremental_selection"
  # plugin/completion.lua: completion setup — LSP-adjacent but independent
  - GARBAGE_LUA_002_B
  - "cmp.setup"
  - "scroll_docs"
  - "cmp.mapping.complete"
must_not_include_files:
  - plugin/treesitter.lua
  - plugin/completion.lua
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
