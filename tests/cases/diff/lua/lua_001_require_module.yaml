must_include_files:
  - game.lua
  # Q1+Q2: utils.lua defines clamp and lerp called by game.lua
  - lib/utils.lua
must_include_content_from:
  game.lua:
    - 'require("lib.utils")'
    - "utils.clamp"
    - "utils.lerp"
  lib/utils.lua:
    - "function M.clamp(value, min_val, max_val)"
    - "function M.lerp(a, b, t)"
must_not_include:
  # lib/strings.lua: string utils — not required by game.lua
  - GARBAGE_LUA_001_A
  - "M.trim"
  - "M.split"
  - "M.starts_with"
  # lib/logging.lua: logging module — not required by game.lua
  - GARBAGE_LUA_001_B
  - "M.set_level"
  - 'M.level = "info"'
must_not_include_files:
  - lib/strings.lua
  - lib/logging.lua
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
