  game.lua: |
    local utils = require("lib.utils")

    local game = {}

    function game.init()
        game.x = 0
        game.y = 0
        game.target_x = 100
        game.target_y = 100
    end

    function game.update(dt)
        local smooth_factor = utils.clamp(dt * 5, 0, 1)
        game.x = utils.lerp(game.x, game.target_x, smooth_factor)
        game.y = utils.lerp(game.y, game.target_y, smooth_factor)
    end

    return game
