must_include_files:
  - scripts/rate_limiter.lua
  # Q1+Q2: constants.lua defines MAX_WINDOW_SIZE, KEY_PREFIX, make_key
  - scripts/constants.lua
must_include_content_from:
  scripts/rate_limiter.lua:
    - "constants.MAX_WINDOW_SIZE"
    - "constants.make_key"
    - "constants.timestamp"
    - "check_sliding_window"
  scripts/constants.lua:
    - 'M.KEY_PREFIX = "rl:"'
    - "M.MAX_WINDOW_SIZE = 3600"
    - "function M.make_key(identifier)"
must_not_include:
  # scripts/cache_manager.lua: cache eviction — same dir but no dependency
  - GARBAGE_LUA_004_A
  - evict_expired
  - get_or_set
  - SETEX
  # scripts/session_store.lua: session store — different prefix, no dep
  - GARBAGE_LUA_004_B
  - SESSION_PREFIX
  - SESSION_TTL
  - create_session
  - destroy_session
must_not_include_files:
  - scripts/cache_manager.lua
  - scripts/session_store.lua
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
