      package com.analytics.event;

      import org.junit.jupiter.api.Test;
      import java.util.List;
      import java.util.Map;
      import static org.junit.jupiter.api.Assertions.*;

      class EventServiceTest {
          private final InMemoryEventRepository repo = new InMemoryEventRepository();
          private final EventService service = new EventService(repo);

          @Test
          void record_validEvent_savesAndReturns() {
              Event e = service.record("page_view", "user-1", Map.of("path", "/home"));
              assertNotNull(e.getTimestamp());
              assertEquals("page_view", e.getType());
          }

          @Test
          void record_blankType_throwsException() {
              assertThrows(IllegalArgumentException.class,
                  () -> service.record("  ", "user-1", Map.of()));
          }

          @Test
          void findByUser_returnsEventsForUser() {
              service.record("login", "user-1", Map.of());
              service.record("logout", "user-1", Map.of());
              service.record("login", "user-2", Map.of());
              List<Event> events = service.findByUser("user-1");
              assertEquals(2, events.size());
          }
      }
