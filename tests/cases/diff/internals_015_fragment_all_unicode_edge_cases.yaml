    src/main/java/com/analytics/event/EventService.java: |
      package com.analytics.event;

      import java.time.Instant;
      import java.util.List;
      import java.util.Map;

      public class EventService {
          private final EventRepository repository;

          public EventService(EventRepository repository) {
              this.repository = repository;
          }

          public Event record(String type, String userId, Map<String, Object> properties) {
              if (type == null || type.isBlank()) {
                  throw new IllegalArgumentException("event type is required");
              }
              Event event = new Event(type, userId, properties, Instant.now());
              return repository.save(event);
          }

          public List<Event> findByUser(String userId) {
              return repository.findByUserId(userId);
          }

          public List<Event> findByType(String type) {
              if (type == null || type.isBlank()) {
                  throw new IllegalArgumentException("event type is required");
              }
              return repository.findByType(type);
          }

          public Map<String, Long> countByType(String userId) {
              List<Event> events = repository.findByUserId(userId);
              Map<String, Long> counts = new java.util.HashMap<>();
              for (Event e : events) {
                  counts.merge(e.getType(), 1L, Long::sum);
              }
              return counts;
          }

          public List<Event> findInTimeRange(Instant from, Instant to) {
              if (from.isAfter(to)) {
                  throw new IllegalArgumentException("from must be before to");
              }
              return repository.findBetween(from, to);
          }
      }
