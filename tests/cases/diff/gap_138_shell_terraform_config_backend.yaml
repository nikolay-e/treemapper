name: gap_138_shell_terraform_config_backend
tags:
- lang:shell
- lang:terraform
- change:config
- change:single_file
- context:import_chain
- difficulty:easy
- distance:1hop
fixtures:
  auto_garbage: true
repo:
  initial_files:
    terraform/backend.tf: |
      terraform {
        backend "s3" {
          bucket         = "mycompany-tfstate"
          key            = "infra/terraform.tfstate"
          region         = "us-east-1"
          dynamodb_table = "terraform-locks"
          encrypt        = true
        }

        required_providers {
          aws = {
            source  = "hashicorp/aws"
            version = "~> 5.0"
          }
        }
      }

      provider "aws" {
        region = var.region
      }
    scripts/init-backend.sh: |
      #!/usr/bin/env bash
      set -euo pipefail

      BUCKET="mycompany-tfstate"
      REGION="us-east-1"
      TABLE="terraform-locks"

      aws s3api head-bucket --bucket "$BUCKET" 2>/dev/null || {
          aws s3api create-bucket --bucket "$BUCKET" --region "$REGION"
          aws s3api put-bucket-versioning --bucket "$BUCKET" --versioning-configuration Status=Enabled
      }

      aws dynamodb describe-table --table-name "$TABLE" 2>/dev/null || {
          aws dynamodb create-table \
              --table-name "$TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
      }

      terraform init
    terraform/outputs.tf: |
      output "vpc_id" {
        value = module.vpc.vpc_id
      }

      output "subnet_ids" {
        value = module.vpc.public_subnet_ids
      }

      output "load_balancer_dns" {
        value = module.alb.dns_name
      }
    terraform/modules/alb/main.tf: |
      resource "aws_lb" "main" {
        name               = "${var.project}-alb"
        internal           = false
        load_balancer_type = "application"
        subnets            = var.subnet_ids
        security_groups    = [var.security_group_id]
      }

      resource "aws_lb_listener" "https" {
        load_balancer_arn = aws_lb.main.arn
        port              = 443
        protocol          = "HTTPS"
        ssl_policy        = "ELBSecurityPolicy-TLS13-1-2-2021-06"
        certificate_arn   = var.certificate_arn

        default_action {
          type             = "forward"
          target_group_arn = var.target_group_arn
        }
      }
  changed_files:
    terraform/backend.tf: |
      terraform {
        backend "s3" {
          bucket         = "mycompany-tfstate"
          key            = "infra/terraform.tfstate"
          region         = "us-east-1"
          dynamodb_table = "terraform-locks"
          encrypt        = true
        }

        required_providers {
          aws = {
            source  = "hashicorp/aws"
            version = "~> 5.40"
          }
        }
      }

      provider "aws" {
        region = var.region

        default_tags {
          tags = {
            ManagedBy = "terraform"
          }
        }
      }
fragments:
- id: provider_version
  selector:
    path: terraform/backend.tf
    anchor: "~> 5.40"
- id: init_script
  selector:
    path: scripts/init-backend.sh
    anchor: terraform init
- id: no_alb
  selector:
    path: terraform/modules/alb/main.tf
- id: no_lb_listener
  selector:
    anchor: aws_lb_listener
oracle:
  required:
  - provider_version
  - init_script
  forbidden:
  - no_alb
  - no_lb_listener
