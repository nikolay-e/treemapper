name: jvm_and_compiled_005_cpp_namespace
repo:
  initial_files:
    include/utils.h: |
      #pragma once
      #include <string>

      namespace myapp::utils {

      std::string trim(const std::string& s);
      std::string toUpper(const std::string& s);

      }
    src/utils.cpp: |
      #include "utils.h"
      #include <algorithm>
      #include <cctype>

      namespace myapp::utils {

      std::string trim(const std::string& s) {
          size_t start = s.find_first_not_of(" \t\n");
          size_t end = s.find_last_not_of(" \t\n");
          return (start == std::string::npos) ? "" : s.substr(start, end - start + 1);
      }

      std::string toUpper(const std::string& s) {
          std::string result = s;
          std::transform(result.begin(), result.end(), result.begin(), ::toupper);
          return result;
      }

      }
    src/app.cpp: |
      #include <iostream>
      int main() { return 0; }
    src/parser.cpp: |
      #include "utils.h"
      #include <string>
      #include <vector>

      using myapp::utils::trim;

      namespace myapp::parser {

      std::vector<std::string> splitAndTrim(const std::string& input, char delim) {
          std::vector<std::string> tokens;
          std::string current;
          for (char c : input) {
              if (c == delim) {
                  auto trimmed = trim(current);
                  if (!trimmed.empty()) tokens.push_back(trimmed);
                  current.clear();
              } else {
                  current += c;
              }
          }
          auto trimmed = trim(current);
          if (!trimmed.empty()) tokens.push_back(trimmed);
          return tokens;
      }

      }
    include/io_utils.h: |
      #pragma once
      #include <string>
      #include <fstream>

      namespace myapp::io {

      std::string readFile(const std::string& path);
      void writeFile(const std::string& path, const std::string& content);
      bool fileExists(const std::string& path);

      }
    src/config.cpp: |
      #include "utils.h"
      #include <unordered_map>
      #include <string>

      using myapp::utils::trim;
      using myapp::utils::toUpper;

      class ConfigLoader {
          std::unordered_map<std::string, std::string> entries_;
      public:
          void load(const std::string& line) {
              auto eq = line.find('=');
              if (eq == std::string::npos) return;
              auto key = toUpper(trim(line.substr(0, eq)));
              auto val = trim(line.substr(eq + 1));
              entries_[key] = val;
          }

          std::string get(const std::string& key) const {
              auto it = entries_.find(toUpper(key));
              return it != entries_.end() ? it->second : "";
          }
      };
    tests/utils_test.cpp: |
      #include "utils.h"
      #include <cassert>

      void test_trim() {
          assert(myapp::utils::trim("  hello  ") == "hello");
          assert(myapp::utils::trim("") == "");
          assert(myapp::utils::trim("no-spaces") == "no-spaces");
      }

      void test_toUpper() {
          assert(myapp::utils::toUpper("hello") == "HELLO");
          assert(myapp::utils::toUpper("Hello World") == "HELLO WORLD");
      }
  changed_files:
    src/app.cpp: |
      #include "utils.h"
      #include <iostream>

      using myapp::utils::trim;
      using myapp::utils::toUpper;

      int main() {
          std::string input = "  Hello World  ";
          std::cout << toUpper(trim(input)) << std::endl;
          return 0;
      }
