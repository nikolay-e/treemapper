  changed_files:
    src/Core/RateLimiter.cs: |
      using System;
      using System.Collections.Concurrent;

      namespace App.Core
      {
          public class RateLimiter
          {
              private readonly ConcurrentDictionary<string, int> _counters = new ConcurrentDictionary<string, int>();
              private readonly int _maxRequests;
              private readonly object _lock = new object();

              public RateLimiter(int maxRequests)
              {
                  _maxRequests = maxRequests;
              }

              public bool TryAcquire(string clientId)
              {
                  lock (_lock)
                  {
                      var current = _counters.GetOrAdd(clientId, 0);
                      if (current >= _maxRequests)
                          return false;

                      _counters[clientId] = current + 1;
                      return true;
                  }
              }

              public void Reset(string clientId)
              {
                  _counters[clientId] = 0;
              }

              public void ResetAll()
              {
                  _counters.Clear();
              }

              public int GetCount(string clientId)
              {
                  return _counters.GetOrAdd(clientId, 0);
              }
          }
      }
