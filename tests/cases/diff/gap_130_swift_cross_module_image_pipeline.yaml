    Sources/Pipeline/ImagePipeline.swift: |
      import Foundation

      struct ImageRequest {
          let url: String
          let width: Int
          let height: Int
      }

      struct ProcessedImage {
          let data: Data
          let format: String
          let width: Int
          let height: Int
      }

      class ImagePipeline {
          private let downloader: ImageDownloader
          private let cache: ImageCache

          init(downloader: ImageDownloader, cache: ImageCache) {
              self.downloader = downloader
              self.cache = cache
          }

          func fetch(request: ImageRequest) -> ProcessedImage? {
              if let cached = cache.get(key: request.url) {
                  return cached
              }
              guard let raw = downloader.download(url: request.url) else {
                  return nil
              }
              let processed = ProcessedImage(
                  data: raw,
                  format: "png",
                  width: request.width,
                  height: request.height
              )
              cache.store(key: request.url, image: processed)
              return processed
          }

          func prefetchBatch(requests: [ImageRequest]) -> Int {
              var fetched = 0
              for request in requests {
                  if cache.get(key: request.url) != nil {
                      continue
                  }
                  downloader.prefetch(urls: [request.url])
                  fetched += 1
              }
              return fetched
          }
      }
