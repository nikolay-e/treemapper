name: cicd_and_docs_001_gha_workflow_trigger
tags:
- lang:typescript
- change:single_file
- change:config
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    .github/workflows/ci.yml: |
      name: CI
      on: [push]
      jobs:
        build:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
            - run: npm ci
            - run: npm run build
            - run: npm test
    src/index.ts: |
      import { Application } from './app';
      import { Config } from './config';
      import { Logger } from './utils/logger';

      const logger = new Logger('main');

      async function main(): Promise<void> {
        const config = Config.load();
        const app = new Application(config);

        await app.initialize();
        await app.start();

        logger.info(`Application started on port ${config.port}`);

        process.on('SIGTERM', async () => {
          logger.info('Shutting down...');
          await app.stop();
          process.exit(0);
        });
      }

      main().catch((error) => {
        logger.error('Failed to start', error);
        process.exit(1);
      });
    src/app.ts: |
      import express, { Express } from 'express';
      import { Config } from './config';
      import { setupRoutes } from './routes';

      export class Application {
        private app: Express;
        private server: any;

        constructor(private config: Config) {
          this.app = express();
          this.app.use(express.json());
          setupRoutes(this.app);
        }

        async initialize(): Promise<void> {
          // Initialize database, cache, etc.
        }

        async start(): Promise<void> {
          return new Promise((resolve) => {
            this.server = this.app.listen(this.config.port, resolve);
          });
        }

        async stop(): Promise<void> {
          return new Promise((resolve) => {
            this.server?.close(resolve);
          });
        }
      }
    .github/workflows/release.yml: |
      name: Release
      GARBAGE_CICD_DOCS_001_RELEASE_MARKER_G: true
      on:
        push:
          branches: [main, develop]
        pull_request:
          branches: [main]
      jobs:
        release:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                node-version: '20'
            - run: npm ci
            - run: npm run build
            - name: GARBAGE_CICD_DOCS_001_PUBLISH_MARKER_H
              run: npm publish
    .github/branch-protection.json: |
      {
        "GARBAGE_CICD_DOCS_001_PROTECTION_MARKER_I": "branch_rules",
        "branches": {
          "main": {
            "required_reviews": 2,
            "require_ci": true,
            "GARBAGE_CICD_DOCS_001_REVIEW_MARKER_J": true
          },
          "develop": {
            "required_reviews": 1,
            "require_ci": true
          }
        }
      }
    garbage_scheduler.ts: |
      const GARBAGE_CICD_DOCS_001_SCHEDULE_MARKER_A = "cron";
      const GARBAGE_CICD_DOCS_001_INTERVAL_MARKER_B = 3600;

      class GarbageTaskScheduler {
        static GARBAGE_CICD_DOCS_001_QUEUE_MARKER_C = "default";

        schedule(): void {}
      }

