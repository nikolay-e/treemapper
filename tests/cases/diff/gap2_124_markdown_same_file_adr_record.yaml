    docs/adr/001-use-postgresql.md: |
      # ADR 001: Use PostgreSQL for Primary Storage

      ## Status

      Accepted

      ## Context

      The application requires ACID transactions and complex queries.
      We evaluated PostgreSQL, MySQL, and CockroachDB.

      ## Decision

      Use PostgreSQL 16 as the primary relational database.

      ## Consequences

      Operations team must maintain PostgreSQL expertise.
      Backup strategy uses pg_basebackup with WAL archiving.
