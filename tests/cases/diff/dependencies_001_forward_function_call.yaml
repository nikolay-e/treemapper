name: dependencies_001_forward_function_call
tags:
- lang:python
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    utils/math.py: |
      def calculate_tax(amount: float, region: str = "US") -> float:
          rate = get_tax_rate(region)
          tax = amount * rate
          return round(tax, 2)

      def get_tax_rate(region: str) -> float:
          rates = {
              "US": 0.15,
              "EU": 0.20,
              "UK": 0.17,
          }
          return rates.get(region, 0.10)

      def format_tax_amount(tax: float) -> str:
          return f"${tax:,.2f}"
    main.py: |
      def process():
          pass
    services/invoice.py: |
      from utils.math import calculate_tax, format_tax_amount

      class InvoiceService:
          def __init__(self, region: str = "US"):
              self.region = region
              self.line_items = []

          def add_item(self, description: str, amount: float) -> None:
              self.line_items.append({"description": description, "amount": amount})

          def compute_totals(self) -> dict:
              subtotal = sum(item["amount"] for item in self.line_items)
              tax = calculate_tax(subtotal, self.region)
              return {
                  "subtotal": subtotal,
                  "tax": tax,
                  "tax_display": format_tax_amount(tax),
                  "total": subtotal + tax,
              }
    services/checkout.py: |
      from utils.math import calculate_tax
      GARBAGE_DEP_001_CHECKOUT_C = "checkout_flow"

      class CheckoutService:
          GARBAGE_DEP_001_CHECKOUT_CLASS_D = True

          def finalize(self, cart_items: list) -> dict:
              amount = sum(item["price"] for item in cart_items)
              tax = calculate_tax(amount, region="US")
              GARBAGE_DEP_001_CHECKOUT_FINAL_E = "done"
              return {"amount": amount, "tax": tax, "total": amount + tax}
    utils/eu_tax.py: |
      GARBAGE_DEP_001_EU_TAX_F = "eu_tax_module"

      def calculate_tax(amount: float, country: str = "DE") -> float:
          GARBAGE_DEP_001_EU_CALC_G = True
          vat_rates = {
              "DE": 0.19,
              "FR": 0.20,
              "NL": 0.21,
          }
          rate = vat_rates.get(country, 0.20)
          return round(amount * rate, 2)

      def get_tax_rate(country: str) -> float:
          GARBAGE_DEP_001_EU_RATE_H = "vat"
          return 0.20
    tests/test_main.py: |
      from utils.math import calculate_tax
      GARBAGE_DEP_001_TEST_MAIN_I = "test_process"

      def test_process():
          GARBAGE_DEP_001_TEST_RUN_J = True
