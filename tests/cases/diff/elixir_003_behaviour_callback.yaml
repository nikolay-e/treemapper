    lib/myapp/jobs/report_job.ex: |
      defmodule MyApp.Jobs.ReportJob do
        @behaviour MyApp.Jobs.Worker

        @max_retries 3

        @impl true
        def perform(%{"report_type" => type, "user_id" => user_id}) do
          case generate_report(type, user_id) do
            {:ok, _path} -> :ok
            {:error, reason} -> {:error, reason}
          end
        end

        @impl true
        def handle_retry(:timeout, attempt) when attempt < @max_retries do
          :retry
        end

        def handle_retry(:invalid_data, _attempt) do
          :abort
        end

        def handle_retry(_reason, attempt) when attempt < @max_retries do
          :retry
        end

        def handle_retry(_reason, _attempt) do
          :abort
        end

        defp generate_report(type, user_id) do
          {:ok, "/reports/#{type}_#{user_id}.pdf"}
        end
      end
