name: elixir_003_behaviour_callback
repo:
  initial_files:
    lib/myapp/jobs/worker.ex: |
      defmodule MyApp.Jobs.Worker do
        @callback perform(args :: map()) :: :ok | {:error, term()}

        @callback handle_retry(reason :: term(), attempt :: integer()) :: :retry | :abort

        defmacro __using__(_opts) do
          quote do
            @behaviour MyApp.Jobs.Worker
          end
        end
      end
    lib/myapp/jobs/report_job.ex: |
      defmodule MyApp.Jobs.ReportJob do
        @behaviour MyApp.Jobs.Worker

        @impl true
        def perform(%{"report_type" => type, "user_id" => user_id}) do
          case generate_report(type, user_id) do
            {:ok, _path} -> :ok
            {:error, reason} -> {:error, reason}
          end
        end

        defp generate_report(type, user_id) do
          {:ok, "/reports/#{type}_#{user_id}.pdf"}
        end
      end
    lib/myapp/jobs/cleanup_job.ex: |
      defmodule MyApp.Jobs.CleanupJob do
        @behaviour MyApp.Jobs.Worker

        @impl true
        def perform(%{"older_than_days" => days}) do
          count = cleanup_old_records(days)
          if count >= 0, do: :ok, else: {:error, :cleanup_failed}
        end

        @impl true
        def handle_retry(_reason, attempt) when attempt < 5, do: :retry
        def handle_retry(_reason, _attempt), do: :abort

        defp cleanup_old_records(days) do
          days * 10
        end

        def garbage_marker_a, do: "GARBAGE_ELIXIR_003_A_CLEANUP"
        def garbage_marker_b, do: "GARBAGE_ELIXIR_003_B_BATCH_SIZE"
      end
    lib/myapp/jobs/scheduler.ex: |
      defmodule MyApp.Jobs.Scheduler do
        use GenServer

        def start_link(opts) do
          GenServer.start_link(__MODULE__, opts, name: __MODULE__)
        end

        @impl true
        def init(_opts) do
          schedule_jobs()
          {:ok, %{running: []}}
        end

        defp schedule_jobs do
          Process.send_after(self(), :tick, 60_000)
        end

        @impl true
        def handle_info(:tick, state) do
          schedule_jobs()
          {:noreply, state}
        end

        def garbage_marker_c, do: "GARBAGE_ELIXIR_003_C_INTERVAL"
        def garbage_marker_d, do: "GARBAGE_ELIXIR_003_D_CRON"
      end
    lib/myapp/jobs/job_config.ex: |
      defmodule MyApp.Jobs.JobConfig do
        defstruct [:name, :max_retries, :timeout, :priority]

        def default_config(name) do
          %__MODULE__{
            name: name,
            max_retries: 3,
            timeout: 30_000,
            priority: :normal
          }
        end

        def garbage_marker_e, do: "GARBAGE_ELIXIR_003_E_PRIORITY"
      end
  changed_files:
