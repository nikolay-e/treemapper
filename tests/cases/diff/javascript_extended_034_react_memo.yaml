repo:
  initial_files:
    src/components/ExpensiveList.tsx: |
      import { memo } from 'react';

      interface Item {
          id: string;
          name: string;
      }

      interface ExpensiveListProps {
          items: Item[];
      }

      function ExpensiveListComponent({ items }: ExpensiveListProps) {
          return (
              <ul>
                  {items.map(item => (
                      <li key={item.id}>{item.name}</li>
                  ))}
              </ul>
          );
      }

      export const ExpensiveList = memo(ExpensiveListComponent);
    src/pages/Dashboard.tsx: |
      console.log('initial');
    src/db/pool.ts: |
      interface PoolConfig {
          maxConnections: number;
          idleTimeout: number;
          host: string;
      }

      export class ConnectionPool {
          private available: number;

          constructor(private config: PoolConfig) {
              this.available = config.maxConnections;
          }

          acquire(): boolean {
              if (this.available <= 0) return false;
              this.available--;
              return true;
          }

          release(): void {
              this.available = Math.min(this.available + 1, this.config.maxConnections);
          }
      }
    src/config/feature-flags.ts: |
      interface FeatureFlag {
          name: string;
          enabled: boolean;
          rolloutPercentage: number;
      }

      const flags: Map<string, FeatureFlag> = new Map();

      export function registerFlag(flag: FeatureFlag): void {
          flags.set(flag.name, flag);
      }

      export function isEnabled(flagName: string): boolean {
          const flag = flags.get(flagName);
          return flag?.enabled ?? false;
      }
