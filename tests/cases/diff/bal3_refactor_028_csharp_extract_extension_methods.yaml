  changed_files:
    Extensions/DecimalExtensions.cs: |
      using System;
      using System.Collections.Generic;
      using System.Linq;

      namespace App.Extensions
      {
          public static class DecimalExtensions
          {
              public static decimal RoundedSum(this List<decimal> prices) =>
                  Math.Round(prices.Sum(), 2);

              public static string ToFormattedPrice(this decimal price) =>
                  $"${price:F2}";

              public static List<decimal> WithDiscount(this List<decimal> prices, decimal rate) =>
                  prices.Select(p => Math.Round(p * (1 - rate), 2)).ToList();
          }
      }
    Services/OrderService.cs: |
      using System.Collections.Generic;
      using App.Extensions;

      namespace App.Services
      {
          public class OrderService
          {
              public decimal CalculateTotal(List<decimal> prices) =>
                  prices.RoundedSum();

              public string FormatPrice(decimal price) =>
                  price.ToFormattedPrice();

              public List<decimal> ApplyDiscount(List<decimal> prices, decimal rate) =>
                  prices.WithDiscount(rate);
          }
      }
    Services/InvoiceService.cs: |
      using System.Collections.Generic;
      using App.Extensions;

      namespace App.Services
      {
          public class InvoiceService
          {
              public string GenerateInvoice(List<decimal> prices)
              {
                  var total = prices.RoundedSum();
                  return $"Invoice Total: {total.ToFormattedPrice()}";
              }
          }
      }
    Controllers/CartController.cs: |
      using System.Collections.Generic;
      using App.Extensions;

      namespace App.Controllers
      {
          public class CartController
          {
              public string GetCartSummary(List<decimal> prices, decimal discount)
              {
                  var discounted = prices.WithDiscount(discount);
                  var total = discounted.RoundedSum();
                  return total.ToFormattedPrice();
              }
          }
      }
