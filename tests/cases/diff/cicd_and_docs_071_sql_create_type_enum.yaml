name: cicd_and_docs_071_sql_create_type_enum
tags:
- lang:python
- lang:sql
- change:single_file
- change:bug_fix
- context:cross_module
- distance:2hop
- difficulty:medium
xfail:
  category: sql-cross-file-discovery
repo:
  initial_files:
    sql/types/order_status.sql: |
      CREATE TYPE order_status AS ENUM (
          'pending',
          'confirmed',
          'shipped',
          'delivered'
      );
    sql/types/payment_status.sql: |
      CREATE TYPE payment_status AS ENUM (
          'unpaid',
          'authorized',
          'captured',
          'refunded'
      );
    migrations/001_create_orders.sql: |
      CREATE TABLE orders (
          id SERIAL PRIMARY KEY,
          user_id INTEGER REFERENCES users(id),
          status order_status DEFAULT 'pending',
          total DECIMAL(10, 2),
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );
    src/models/order.py: |
      from enum import Enum
      from dataclasses import dataclass
      from decimal import Decimal
      from typing import Optional
      from datetime import datetime

      class OrderStatus(Enum):
          PENDING = 'pending'
          CONFIRMED = 'confirmed'
          SHIPPED = 'shipped'
          DELIVERED = 'delivered'

      @dataclass
      class Order:
          id: int
          user_id: int
          status: OrderStatus
          total: Decimal
          created_at: Optional[datetime] = None
    src/services/order_service.py: |
      from src.models.order import Order, OrderStatus

      class OrderService:
          def transition(self, order: Order, new_status: OrderStatus) -> bool:
              valid = {
                  OrderStatus.PENDING: {OrderStatus.CONFIRMED},
                  OrderStatus.CONFIRMED: {OrderStatus.SHIPPED},
                  OrderStatus.SHIPPED: {OrderStatus.DELIVERED},
              }
              if new_status not in valid.get(order.status, set()):
                  return False
              order.status = new_status
              return True
    src/api/order_handlers.py: |
      from src.models.order import OrderStatus

      VALID_STATUSES = [s.value for s in OrderStatus]

      def is_valid_status(s: str) -> bool:
          return s in VALID_STATUSES
    src/models/payment.py: |
      from enum import Enum
      from dataclasses import dataclass
      from decimal import Decimal

      class PaymentStatus(Enum):
          UNPAID = 'unpaid'
