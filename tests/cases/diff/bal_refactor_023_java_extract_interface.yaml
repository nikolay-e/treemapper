    src/main/java/com/app/notification/MessageSender.java: |
      package com.app.notification;

      public interface MessageSender {
          void send(String to, String subject, String body);
          void sendBulk(String[] recipients, String subject, String body);
      }
    src/main/java/com/app/notification/EmailSender.java: |
      package com.app.notification;

      public class EmailSender implements MessageSender {
          private final String smtpHost;

          public EmailSender(String smtpHost) {
              this.smtpHost = smtpHost;
          }

          @Override
          public void send(String to, String subject, String body) {
              System.out.println("Email to " + to + " via " + smtpHost);
          }

          @Override
          public void sendBulk(String[] recipients, String subject, String body) {
              for (String to : recipients) {
                  send(to, subject, body);
              }
          }
      }
    src/main/java/com/app/notification/SmsSender.java: |
      package com.app.notification;

      public class SmsSender implements MessageSender {
          private final String apiKey;

          public SmsSender(String apiKey) {
              this.apiKey = apiKey;
          }

          @Override
