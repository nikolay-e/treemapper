name: bal3_3hop_003_go_router_dispatch_validator_schema
tags:
- lang:go
- change:new_function
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    pkg/schema/definitions.go: |
      package schema

      type FieldRule struct {
          Name     string
          Required bool
          MinLen   int
      }

      type Schema struct {
          Fields []FieldRule
      }

      func NewSchema(fields []FieldRule) *Schema {
          return &Schema{Fields: fields}
      }

      func (s *Schema) FieldNames() []string {
          names := make([]string, len(s.Fields))
          for i, f := range s.Fields {
              names[i] = f.Name
          }
          return names
      }
    pkg/validator/validator.go: |
      package validator

      import "myapp/pkg/schema"

      type Validator struct {
          schema *schema.Schema
      }

      func NewValidator(s *schema.Schema) *Validator {
          return &Validator{schema: s}
      }

      func (v *Validator) Validate(data map[string]string) []string {
          var errors []string
          for _, field := range v.schema.Fields {
              val, ok := data[field.Name]
              if field.Required && !ok {
                  errors = append(errors, field.Name+" is required")
              }
              if ok && len(val) < field.MinLen {
                  errors = append(errors, field.Name+" too short")
              }
          }
          return errors
      }
    pkg/dispatch/dispatcher.go: |
      package dispatch

      import "myapp/pkg/validator"

      type Dispatcher struct {
          validator *validator.Validator
      }

      func NewDispatcher(v *validator.Validator) *Dispatcher {
          return &Dispatcher{validator: v}
      }

      func (d *Dispatcher) Dispatch(data map[string]string) (bool, []string) {
          errs := d.validator.Validate(data)
          if len(errs) > 0 {
              return false, errs
          }
          return true, nil
      }
    pkg/router/router.go: |
      package router

      import "myapp/pkg/dispatch"

      type Router struct {
          dispatcher *dispatch.Dispatcher
          routes     map[string]bool
      }

      func NewRouter(d *dispatch.Dispatcher) *Router {
          return &Router{dispatcher: d, routes: make(map[string]bool)}
      }

      func (r *Router) Register(path string) {
          r.routes[path] = true
      }

      func (r *Router) Handle(path string, data map[string]string) (bool, []string) {
          if !r.routes[path] {
              return false, []string{"route not found"}
          }
          return r.dispatcher.Dispatch(data)
      }
    pkg/health/checker.go: |
      package health

      var GARBAGE_BAL3_003_HEALTH_MARKER_A = "health"
      var GARBAGE_BAL3_003_STATUS_MARKER_B = "ok"

      type Checker struct{}

      func (c *Checker) Check() string {
          return "healthy"
      }
    pkg/health/reporter.go: |
      package health

      var GARBAGE_BAL3_003_REPORT_MARKER_C = "report"
      var GARBAGE_BAL3_003_METRIC_MARKER_D = 42

      type Reporter struct{}

      func (r *Reporter) Report() string {
          return "all systems go"
      }
  changed_files:
    pkg/schema/definitions.go: |
      package schema

      type FieldRule struct {
          Name     string
          Required bool
          MinLen   int
          MaxLen   int
      }

      type Schema struct {
          Fields []FieldRule
      }

      func NewSchema(fields []FieldRule) *Schema {
          return &Schema{Fields: fields}
      }

      func (s *Schema) FieldNames() []string {
          names := make([]string, len(s.Fields))
          for i, f := range s.Fields {
              names[i] = f.Name
          }
          return names
      }

      func (s *Schema) HasRequiredFields() bool {
          for _, f := range s.Fields {
              if f.Required {
                  return true
              }
          }
          return false
      }
  commit_message: "Add MaxLen to schema and HasRequiredFields helper"
