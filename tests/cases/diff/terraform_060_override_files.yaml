name: terraform_060_override_files
tags:
- lang:terraform
- change:single_file
- change:config
- context:import_chain
- distance:2hop
- difficulty:easy
repo:
  initial_files:
    main.tf: |
      resource "aws_instance" "web" {
        ami           = "ami-production"
        instance_type = "t3.large"
        key_name      = "production-key"

        tags = {
          Name        = "web-server"
          Environment = "production"
        }
      }
    outputs.tf: |
      output "instance_id" {
        value = aws_instance.web.id
      }

      output "instance_type" {
        value = aws_instance.web.instance_type
      }
    database/dev_override.tf: |
      resource "aws_db_instance" "main" {
        identifier     = "dev-database"
        instance_class = "db.t3.micro"

        tags = {
          Environment = "dev"
        }
      }
    sqs/queue.tf: |
      resource "aws_sqs_queue" "tasks" {
        name                      = "task-queue"
        delay_seconds             = 0
        max_message_size          = 262144
        message_retention_seconds = 86400
      }
  changed_files:
    main.tf: |
      resource "aws_instance" "web" {
        ami           = "ami-production"
        instance_type = "t3.large"
        key_name      = "production-key"

        tags = {
          Name        = "web-server"
          Environment = "production"
        }
      }
    main_override.tf: |
      resource "aws_instance" "web" {
        ami           = "ami-development"
        instance_type = "t3.micro"

        tags = {
          Environment = "dev"
        }
      }
  commit_message: Update files
fragments:
- id: main_override
  selector:
    path: main_override.tf
    anchor: ami           = "ami-development"
- id: main_override_1
  selector:
    path: main_override.tf
    anchor: instance_type = "t3.micro"
- id: main_override_2
  selector:
    path: main_override.tf
    anchor: Environment = "dev"
- id: main
  selector:
    path: main.tf
    anchor: resource "aws_instance" "web" {
- id: main_1
  selector:
    path: main.tf
    anchor: ami           = "ami-production"
- id: no_dev_override
  selector:
    path: database/dev_override.tf
- id: no_queue
  selector:
    path: sqs/queue.tf
- id: no_global_0
  selector:
    anchor: dev-database
- id: no_global_1
  selector:
    anchor: db.t3.micro
- id: no_global_2
  selector:
    anchor: task-queue
oracle:
  required:
  - main_override
  - main_override_1
  - main_override_2
  - main
  - main_1
  allowed: []
  forbidden:
  - no_dev_override
  - no_queue
  - no_global_0
  - no_global_1
  - no_global_2
