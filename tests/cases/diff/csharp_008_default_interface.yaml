    Interfaces/IProcessor.cs: |
      namespace MyApp.Interfaces;

      public interface IProcessor
      {
          void Process(string data);

          void ProcessBatch(string[] items)
          {
              foreach (var item in items)
              {
                  Process(item);
              }
          }
      }
