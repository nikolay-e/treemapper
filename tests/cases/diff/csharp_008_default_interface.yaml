name: csharp_008_default_interface
tags:
- lang:rust
- change:bug_fix
- change:single_file
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    src/config/loader.rs: |
      use std::collections::HashMap;

      pub struct ConfigLoader {
          values: HashMap<String, String>,
      }

      impl ConfigLoader {
          pub fn from_env() -> Self {
              ConfigLoader { values: HashMap::new() }
          }

          pub fn get(&self, key: &str) -> Option<&String> {
              self.values.get(key)
          }

          pub fn get_or_default<'a>(&'a self, key: &str, default: &'a str) -> &'a str {
              // BUG: returns default even when key is present but value is empty string
              self.values.get(key).map(|s| s.as_str()).unwrap_or(default)
          }
      }
    src/server/bootstrap.rs: |
      use crate::config::loader::ConfigLoader;

      pub struct ServerConfig {
          pub host: String,
          pub port: u16,
      }

      impl ServerConfig {
          pub fn from_loader(loader: &ConfigLoader) -> Self {
              let host = loader.get_or_default("HOST", "localhost").to_string();
              let port: u16 = loader.get_or_default("PORT", "8080").parse().unwrap_or(8080);
              ServerConfig { host, port }
          }
      }
    garbage/watcher.rs: |
      // GARBAGE_CONF_A = "watcher_marker"
      pub fn watch_file(_path: &str) {}
    garbage/secrets.rs: |
      // GARBAGE_CONF_B = "secrets_marker"
      pub fn fetch_secret(_name: &str) -> Option<String> { None }
    garbage/registry.rs: |
      // GARBAGE_CONF_C = "registry_marker"
      pub struct Registry { pub name: String }
  changed_files:
    src/config/loader.rs: |
      use std::collections::HashMap;

      pub struct ConfigLoader {
          values: HashMap<String, String>,
      }

      impl ConfigLoader {
          pub fn from_env() -> Self {
              ConfigLoader { values: HashMap::new() }
          }

          pub fn get(&self, key: &str) -> Option<&String> {
              self.values.get(key)
          }

          pub fn get_or_default<'a>(&'a self, key: &str, default: &'a str) -> &'a str {
              match self.values.get(key) {
                  Some(v) if !v.is_empty() => v.as_str(),
                  _ => default,
              }
          }
      }
    src/server/bootstrap.rs: |
      use crate::config::loader::ConfigLoader;

      pub struct ServerConfig {
          pub host: String,
          pub port: u16,
      }

      impl ServerConfig {
          pub fn from_loader(loader: &ConfigLoader) -> Self {
              let host = loader.get_or_default("HOST", "localhost").to_string();
              let port: u16 = loader.get_or_default("PORT", "8080").parse().unwrap_or(8080);
              ServerConfig { host, port }
          }
      }
    garbage/watcher.rs: |
      // GARBAGE_CONF_A = "watcher_marker"
      pub fn watch_file(_path: &str) {}
    garbage/secrets.rs: |
      // GARBAGE_CONF_B = "secrets_marker"
      pub fn fetch_secret(_name: &str) -> Option<String> { None }
    garbage/registry.rs: |
      // GARBAGE_CONF_C = "registry_marker"
      pub struct Registry { pub name: String }
  commit_message: "fix: skip empty-string values in get_or_default"
