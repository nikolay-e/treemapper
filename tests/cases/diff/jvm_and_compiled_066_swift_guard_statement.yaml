repo:
  initial_files:
    Response.swift: |
      struct Response {
          let data: Data?
          let error: Error?
          let statusCode: Int
      }
    NetworkHandler.swift: |
      // Initial
      struct NetworkHandler {}
    ResponseValidator.swift: |
      import Foundation

      struct ResponseValidator {
          func validateContentType(_ headers: [String: String], expected: String) -> Bool {
              return headers["Content-Type"]?.contains(expected) ?? false
          }

          func validateContentLength(_ headers: [String: String], maxBytes: Int) -> Bool {
              guard let lengthStr = headers["Content-Length"],
                    let length = Int(lengthStr) else { return true }
              return length <= maxBytes
          }

          func isJSON(_ headers: [String: String]) -> Bool {
              return validateContentType(headers, expected: "application/json")
          }
      }
    HTTPStatusCodes.swift: |
      enum HTTPStatusCodes: Int {
          case ok = 200
          case created = 201
          case badRequest = 400
          case unauthorized = 401
          case notFound = 404
          case serverError = 500

          var isSuccess: Bool { rawValue >= 200 && rawValue < 300 }
          var isClientError: Bool { rawValue >= 400 && rawValue < 500 }
          var isServerError: Bool { rawValue >= 500 && rawValue < 600 }

          var description: String {
              switch self {
              case .ok: return "OK"
              case .created: return "Created"
              case .badRequest: return "Bad Request"
              case .unauthorized: return "Unauthorized"
              case .notFound: return "Not Found"
              case .serverError: return "Internal Server Error"
              }
          }
      }
