repo:
  initial_files:
    storage/store.go: |
      package storage

      type Record struct {
          ID   string
          Data map[string]string
      }

      type Store interface {
          Get(id string) (*Record, error)
          Put(record *Record) error
      }
    storage/memory.go: |
      package storage

      import "fmt"

      type MemoryStore struct {
          records map[string]*Record
      }

      func NewMemoryStore() *MemoryStore {
          return &MemoryStore{records: make(map[string]*Record)}
      }

      func (m *MemoryStore) Get(id string) (*Record, error) {
          r, ok := m.records[id]
          if !ok {
              return nil, fmt.Errorf("record %s not found", id)
          }
          return r, nil
      }

      func (m *MemoryStore) Put(record *Record) error {
          m.records[record.ID] = record
          return nil
      }
    storage/memory_test.go: |
      package storage

      import "testing"

      func TestMemoryStorePutGet(t *testing.T) {
          s := NewMemoryStore()
          r := &Record{ID: "1", Data: map[string]string{"key": "val"}}
          if err := s.Put(r); err != nil {
              t.Fatal(err)
          }
          got, err := s.Get("1")
          if err != nil {
              t.Fatal(err)
          }
          if got.Data["key"] != "val" {
              t.Fatal("wrong data")
          }
      }

      func TestMemoryStoreGetNotFound(t *testing.T) {
          s := NewMemoryStore()
          _, err := s.Get("missing")
          if err == nil {
              t.Fatal("expected error")
          }
      }
    storage/bolt.go: |
      package storage

      GARBAGE_BAL2_007_BOLT_A = "bolt"
      GARBAGE_BAL2_007_BOLT_MARKER_B = true

      type BoltStore struct {
          path string
      }

      func NewBoltStore(path string) *BoltStore {
          return &BoltStore{path: path}
      }
    storage/redis.go: |
      package storage

      GARBAGE_BAL2_007_REDIS_C = "redis"
      GARBAGE_BAL2_007_REDIS_MARKER_D = true

      type RedisStore struct {
          addr string
      }
    config/settings.go: |
      package config

      GARBAGE_BAL2_007_CONFIG_E = "config"

      type Settings struct {
          StorageType string
          StoragePath string
      }
  changed_files:
    storage/store.go: |
      package storage

      type Record struct {
          ID   string
          Data map[string]string
      }

      type Store interface {
          Get(id string) (*Record, error)
          Put(record *Record) error
          Delete(id string) error
          List() ([]*Record, error)
      }
    storage/memory.go: |
      package storage

      import "fmt"

      type MemoryStore struct {
          records map[string]*Record
      }

      func NewMemoryStore() *MemoryStore {
          return &MemoryStore{records: make(map[string]*Record)}
      }

      func (m *MemoryStore) Get(id string) (*Record, error) {
          r, ok := m.records[id]
          if !ok {
              return nil, fmt.Errorf("record %s not found", id)
          }
          return r, nil
      }

      func (m *MemoryStore) Put(record *Record) error {
          m.records[record.ID] = record
          return nil
      }

      func (m *MemoryStore) Delete(id string) error {
          if _, ok := m.records[id]; !ok {
              return fmt.Errorf("record %s not found", id)
          }
          delete(m.records, id)
          return nil
      }

      func (m *MemoryStore) List() ([]*Record, error) {
          result := make([]*Record, 0, len(m.records))
          for _, r := range m.records {
              result = append(result, r)
          }
          return result, nil
      }
    storage/memory_test.go: |
      package storage

      import "testing"

      func TestMemoryStorePutGet(t *testing.T) {
          s := NewMemoryStore()
          r := &Record{ID: "1", Data: map[string]string{"key": "val"}}
          if err := s.Put(r); err != nil {
              t.Fatal(err)
          }
          got, err := s.Get("1")
          if err != nil {
              t.Fatal(err)
          }
          if got.Data["key"] != "val" {
              t.Fatal("wrong data")
          }
      }

      func TestMemoryStoreGetNotFound(t *testing.T) {
          s := NewMemoryStore()
          _, err := s.Get("missing")
          if err == nil {
              t.Fatal("expected error")
          }
      }

      func TestMemoryStoreDelete(t *testing.T) {
          s := NewMemoryStore()
          s.Put(&Record{ID: "1", Data: map[string]string{}})
          if err := s.Delete("1"); err != nil {
              t.Fatal(err)
          }
          _, err := s.Get("1")
          if err == nil {
              t.Fatal("expected not found after delete")
          }
      }

      func TestMemoryStoreList(t *testing.T) {
          s := NewMemoryStore()
          s.Put(&Record{ID: "a", Data: map[string]string{}})
          s.Put(&Record{ID: "b", Data: map[string]string{}})
          records, err := s.List()
          if err != nil {
              t.Fatal(err)
          }
          if len(records) != 2 {
              t.Fatalf("expected 2 records, got %d", len(records))
          }
      }
    storage/bolt.go: |
      package storage

      GARBAGE_BAL2_007_BOLT_A = "bolt"
      GARBAGE_BAL2_007_BOLT_MARKER_B = true

      type BoltStore struct {
          path string
      }

      func NewBoltStore(path string) *BoltStore {
          return &BoltStore{path: path}
      }
    storage/redis.go: |
