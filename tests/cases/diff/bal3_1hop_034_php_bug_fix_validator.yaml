  changed_files:
    src/Validation/EmailValidator.php: |
      <?php
      namespace App\Validation;

      class EmailValidator
      {
          public function isValid(string $email): bool
          {
              if (empty($email)) {
                  return false;
              }
              return filter_var($email, FILTER_VALIDATE_EMAIL) !== false;
          }

          public function getDomain(string $email): string
          {
              $parts = explode('@', $email);
              if (count($parts) !== 2) {
                  return '';
              }
              return $parts[1];
          }
      }
  commit_message: "Fix email validation to use filter_var and handle edge cases"
