repo:
  initial_files:
    src/Validation/EmailValidator.php: |
      <?php
      namespace App\Validation;

      class EmailValidator
      {
          public function isValid(string $email): bool
          {
              return strpos($email, '@') !== false;
          }

          public function getDomain(string $email): string
          {
              return explode('@', $email)[1];
          }
      }
    src/Services/RegistrationHandler.php: |
      <?php
      namespace App\Services;

      use App\Validation\EmailValidator;

      class RegistrationHandler
      {
          private EmailValidator $validator;

          public function __construct(EmailValidator $validator)
          {
              $this->validator = $validator;
          }

          public function register(string $email, string $name): array
          {
              if (!$this->validator->isValid($email)) {
                  return ['error' => 'Invalid email'];
              }
              $domain = $this->validator->getDomain($email);
              return ['name' => $name, 'email' => $email, 'domain' => $domain];
          }
      }
