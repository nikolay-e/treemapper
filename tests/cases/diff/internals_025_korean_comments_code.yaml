repo:
  initial_files:
    src/Inventory.jl: |
      module Inventory

      export Item, reorder_needed, value_on_hand

      struct Item
          sku::String
          quantity::Int
          unit_cost::Float64
          reorder_threshold::Int
      end

      function reorder_needed(item::Item)::Bool
          return item.quantity <= item.reorder_threshold
      end

      function value_on_hand(item::Item)::Float64
          return item.quantity * item.unit_cost
      end

      end
    src/PurchaseOrder.jl: |
      module PurchaseOrder

      include("Inventory.jl")
      using .Inventory

      function generate_orders(items::Vector{Item})::Vector{String}
          return [i.sku for i in items if reorder_needed(i)]
      end

      end
    src/Valuation.jl: |
      module Valuation

      include("Inventory.jl")
      using .Inventory

      function total_value(items::Vector{Item})::Float64
          return sum(value_on_hand(i) for i in items)
      end

      end
