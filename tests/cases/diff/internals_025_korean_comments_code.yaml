  changed_files:
    src/Inventory.jl: |
      module Inventory

      export Item, reorder_needed, value_on_hand, overstocked

      struct Item
          sku::String
          quantity::Int
          unit_cost::Float64
          reorder_threshold::Int
          max_stock::Int
      end

      function reorder_needed(item::Item)::Bool
          return item.quantity <= item.reorder_threshold
      end

      function value_on_hand(item::Item)::Float64
          return item.quantity * item.unit_cost
      end

      function overstocked(item::Item)::Bool
          return item.quantity > item.max_stock
      end

      end
    src/INT025_Supplier.jl: |
      module Supplier

      INT025_GARBAGE_A = "supplier_marker"
      INT025_GARBAGE_B = "lead_time_days"

