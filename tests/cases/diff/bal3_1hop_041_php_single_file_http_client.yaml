  changed_files:
    src/Http/HttpClient.php: |
      <?php
      namespace App\Http;

      class HttpClient
      {
          private string $baseUrl;
          private array $defaultHeaders;
          private int $timeoutSeconds;

          public function __construct(string $baseUrl, array $defaultHeaders = [], int $timeoutSeconds = 30)
          {
              $this->baseUrl = $baseUrl;
              $this->defaultHeaders = $defaultHeaders;
              $this->timeoutSeconds = $timeoutSeconds;
          }

          public function get(string $path, array $headers = []): array
          {
              return [
                  'method' => 'GET',
                  'url' => $this->baseUrl . $path,
                  'headers' => array_merge($this->defaultHeaders, $headers),
                  'timeout' => $this->timeoutSeconds,
              ];
          }

          public function post(string $path, array $data, array $headers = []): array
          {
              return [
                  'method' => 'POST',
                  'url' => $this->baseUrl . $path,
                  'body' => $data,
                  'headers' => array_merge($this->defaultHeaders, $headers),
                  'timeout' => $this->timeoutSeconds,
              ];
          }

          public function put(string $path, array $data, array $headers = []): array
          {
              return [
                  'method' => 'PUT',
                  'url' => $this->baseUrl . $path,
                  'body' => $data,
                  'headers' => array_merge($this->defaultHeaders, $headers),
                  'timeout' => $this->timeoutSeconds,
              ];
          }

          public function delete(string $path): array
          {
              return [
                  'method' => 'DELETE',
                  'url' => $this->baseUrl . $path,
                  'headers' => $this->defaultHeaders,
                  'timeout' => $this->timeoutSeconds,
              ];
          }
      }
  commit_message: "Add headers, timeout, PUT and DELETE to HttpClient"
