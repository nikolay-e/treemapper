name: bal3_cfgcode_011_ruby_yaml_mailer
tags:
- lang:ruby
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    config/mailer.yml: |
      mailer:
        smtp_host: smtp.gmail.com
        smtp_port: 587
        from_address: noreply@example.com
        enable_tls: true
    lib/mailer/config.rb: |
      require 'yaml'

      module Mailer
        class Config
          attr_reader :smtp_host, :smtp_port, :from_address, :enable_tls

          def initialize(path)
            data = YAML.load_file(path)
            cfg = data['mailer']
            @smtp_host = cfg['smtp_host']
            @smtp_port = cfg['smtp_port']
            @from_address = cfg['from_address']
            @enable_tls = cfg['enable_tls']
          end

          def smtp_url
            "smtp://#{@smtp_host}:#{@smtp_port}"
          end
        end
      end
    lib/mailer/sender.rb: |
      module Mailer
        class Sender
          def initialize(config)
            @config = config
          end

          def send_email(to:, subject:, body:)
            {
              from: @config.from_address,
              to: to,
              subject: subject,
              body: body,
              via: @config.smtp_url
            }
          end
        end
      end
    lib/auth/password.rb: |
      GARBAGE_CFGCODE_011_PASS_A = "bcrypt"
      GARBAGE_CFGCODE_011_ROUNDS_B = 12

      module Auth
        def self.hash_password(plain)
          plain
        end
      end
    lib/jobs/scheduler.rb: |
      GARBAGE_CFGCODE_011_SCHED_C = "cron"
      GARBAGE_CFGCODE_011_INTERVAL_D = 60

      module Jobs
        def self.run_scheduler
        end
      end
    lib/utils/format.rb: |
      GARBAGE_CFGCODE_011_FMT_E = "json"
      GARBAGE_CFGCODE_011_INDENT_F = 2

      module Utils
        def self.format_output(data)
          data.to_s
        end
      end
  changed_files:
    config/mailer.yml: |
      mailer:
        smtp_host: smtp.sendgrid.net
        smtp_port: 465
        from_address: notifications@myapp.com
        enable_tls: true
        api_key_env: SENDGRID_API_KEY
  commit_message: "switch mailer to SendGrid"
