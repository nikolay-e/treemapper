repo:
  initial_files:
    src/main/kotlin/ecommerce/PriceEngine.kt: |
      class PriceEngine {
          fun applyDiscount(price: Double, discountPercent: Double): Double {
              return price - (price * discountPercent / 100)
          }

          fun applyVat(price: Double, vatRatePercent: Double): Double {
              return price + (price * vatRatePercent)  // BUG: vatRatePercent should be /100
          }

          fun finalPrice(basePrice: Double, discountPercent: Double, vatRatePercent: Double): Double {
              val discounted = applyDiscount(basePrice, discountPercent)
              return applyVat(discounted, vatRatePercent)
          }
      }
    src/test/kotlin/ecommerce/PriceEngineTest.kt: |
      import org.junit.Test
      import kotlin.test.assertEquals

      class PriceEngineTest {
          private val engine = PriceEngine()

          @Test fun discountReducesPrice() {
              assertEquals(90.0, engine.applyDiscount(100.0, 10.0))
          }

          @Test fun vatIncreasesPrice() {
              assertEquals(121.0, engine.applyVat(100.0, 21.0), 0.01)
          }
      }
