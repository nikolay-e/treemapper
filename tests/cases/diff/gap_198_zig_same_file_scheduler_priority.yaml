  changed_files:
    src/scheduler.zig: |
      const std = @import("std");

      pub const Priority = enum { low, normal, high, critical };

      pub const Task = struct {
          id: u64,
          priority: Priority,
          deadline_ms: u64,

          pub fn isOverdue(self: Task, now_ms: u64) bool {
              return now_ms > self.deadline_ms;
          }

          pub fn isCritical(self: Task) bool {
              return self.priority == .critical;
          }
      };

      pub const Scheduler = struct {
          queue: [128]?Task,
          len: usize,

          pub fn init() Scheduler {
              return Scheduler{
                  .queue = [_]?Task{null} ** 128,
                  .len = 0,
              };
          }

          pub fn submit(self: *Scheduler, task: Task) void {
              self.queue[self.len] = task;
              self.len += 1;
          }

          pub fn nextTask(self: *Scheduler) ?Task {
              if (self.len == 0) return null;
              self.len -= 1;
              const t = self.queue[self.len];
              self.queue[self.len] = null;
              return t;
          }
      };
    src/worker.zig: |
      const std = @import("std");

      const TRAP_GAP_198_WORKER_MARKER_A: []const u8 = "worker_noise";
      const TRAP_GAP_198_WORKER_FLAG_B: u32 = 4;

