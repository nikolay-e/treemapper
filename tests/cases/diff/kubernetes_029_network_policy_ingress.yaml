    k8s/base/networkpolicy.yaml: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
        name: payment-service-ingress
        namespace: production
        labels:
          app: payment-service
          security: high
      spec:
        podSelector:
          matchLabels:
            app: payment-service
        policyTypes:
        - Ingress
        ingress:
        - from:
          - podSelector:
              matchLabels:
                role: api-gateway
          - podSelector:
              matchLabels:
                role: order-service
          - namespaceSelector:
              matchLabels:
                name: monitoring
            podSelector:
              matchLabels:
                app: prometheus
          ports:
          - protocol: TCP
            port: 8080
          - protocol: TCP
            port: 8443
    k8s/base/secret.yaml: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: payment-secrets
        namespace: production
      type: Opaque
      data:
        encryption-key: base64encodedkey==
