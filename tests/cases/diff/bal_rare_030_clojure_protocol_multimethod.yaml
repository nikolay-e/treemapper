repo:
  initial_files:
    src/store/protocol.clj: |
      (ns store.protocol)

      (defprotocol Storage
        (save! [this key value])
        (fetch [this key])
        (delete! [this key]))
    src/store/memory.clj: |
      (ns store.memory
        (:require [store.protocol :as p]))

      (defrecord MemoryStore [state]
        p/Storage
        (save! [this key value]
          (swap! state assoc key value)
          this)
        (fetch [this key]
          (get @state key))
        (delete! [this key]
          (swap! state dissoc key)
          this))

      (defn create-memory-store []
        (->MemoryStore (atom {})))
    src/store/cache.clj: |
      (ns store.cache
        (:require [store.protocol :as p]))

      (defrecord CachedStore [backend cache]
        p/Storage
        (save! [this key value]
          (swap! cache assoc key value)
          (p/save! backend key value)
          this)
        (fetch [this key]
          (if-let [cached (get @cache key)]
            cached
            (when-let [value (p/fetch backend key)]
              (swap! cache assoc key value)
              value)))
        (delete! [this key]
          (swap! cache dissoc key)
          (p/delete! backend key)
          this))

      (defn create-cached-store [backend]
        (->CachedStore backend (atom {})))
    src/app.clj: |
      (ns app
        (:require [store.memory :as mem]
                  [store.cache :as cache]
                  [store.protocol :as p]))

      (defn run []
        (let [store (-> (mem/create-memory-store)
                        cache/create-cached-store)]
          (p/save! store :user {:name "Alice"})
          (println (p/fetch store :user))))
    garbage_search.clj: |
      (ns garbage-search)

      (def ^:const GARBAGE_RARE_030_INDEX_A "inverted")
      (def ^:const GARBAGE_RARE_030_ANALYZER_B "standard")

      (defn garbage-search []
        GARBAGE_RARE_030_INDEX_A)

      (def ^:const GARBAGE_RARE_030_SHARDS_C 3)
    garbage_scheduler.clj: |
      (ns garbage-scheduler)

      (def ^:const GARBAGE_RARE_030_POOL_D 4)
      (def ^:const GARBAGE_RARE_030_QUEUE_E "fifo")

      (defn garbage-schedule []
        GARBAGE_RARE_030_POOL_D)

      (def ^:const GARBAGE_RARE_030_TIMEOUT_F 30000)
  changed_files:
    src/store/protocol.clj: |
      (ns store.protocol)

      (defprotocol Storage
        (save! [this key value])
        (fetch [this key])
        (delete! [this key])
        (exists? [this key]))
    src/store/memory.clj: |
      (ns store.memory
        (:require [store.protocol :as p]))

      (defrecord MemoryStore [state]
        p/Storage
        (save! [this key value]
          (swap! state assoc key value)
          this)
        (fetch [this key]
          (get @state key))
        (delete! [this key]
          (swap! state dissoc key)
          this)
        (exists? [this key]
          (contains? @state key)))

      (defn create-memory-store []
        (->MemoryStore (atom {})))
    src/store/cache.clj: |
      (ns store.cache
        (:require [store.protocol :as p]))

      (defrecord CachedStore [backend cache]
        p/Storage
        (save! [this key value]
          (swap! cache assoc key value)
          (p/save! backend key value)
          this)
        (fetch [this key]
          (if-let [cached (get @cache key)]
            cached
            (when-let [value (p/fetch backend key)]
              (swap! cache assoc key value)
              value)))
        (delete! [this key]
          (swap! cache dissoc key)
          (p/delete! backend key)
          this)
        (exists? [this key]
          (or (contains? @cache key)
              (p/exists? backend key))))

      (defn create-cached-store [backend]
        (->CachedStore backend (atom {})))
    src/app.clj: |
      (ns app
        (:require [store.memory :as mem]
                  [store.cache :as cache]
                  [store.protocol :as p]))

      (defn run []
        (let [store (-> (mem/create-memory-store)
                        cache/create-cached-store)]
          (p/save! store :user {:name "Alice"})
          (println "Exists?" (p/exists? store :user))
          (println (p/fetch store :user))))
    garbage_search.clj: |
      (ns garbage-search)

      (def ^:const GARBAGE_RARE_030_INDEX_A "inverted")
      (def ^:const GARBAGE_RARE_030_ANALYZER_B "standard")

      (defn garbage-search []
        GARBAGE_RARE_030_INDEX_A)

      (def ^:const GARBAGE_RARE_030_SHARDS_C 3)
    garbage_scheduler.clj: |
      (ns garbage-scheduler)

      (def ^:const GARBAGE_RARE_030_POOL_D 4)
      (def ^:const GARBAGE_RARE_030_QUEUE_E "fifo")

      (defn garbage-schedule []
        GARBAGE_RARE_030_POOL_D)

      (def ^:const GARBAGE_RARE_030_TIMEOUT_F 30000)
