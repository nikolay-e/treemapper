name: bal_rare_030_clojure_protocol_multimethod
tags:
- lang:clojure
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/config/schema.clj: |
      (ns config.schema)

      (def required-keys [:db-host :db-port :db-name :app-port])

      (defn validate [cfg]
        (every? #(contains? cfg %) required-keys))
    src/config/loader.clj: |
      (ns config.loader
        (:require [config.schema :as schema]))

      (defn load-config [env-map]
        (let [cfg {:db-host  (get env-map "DB_HOST" "localhost")
                   :db-port  (Integer/parseInt (get env-map "DB_PORT" "5432"))
                   :db-name  (get env-map "DB_NAME" "app")
                   :app-port (Integer/parseInt (get env-map "APP_PORT" "8080"))}]
          (when (schema/validate cfg)
            cfg)))
    src/app/server.clj: |
      (ns app.server
        (:require [config.loader :as cfg]))

      (defn start [env]
        (let [config (cfg/load-config env)]
          (println "Starting on port" (:app-port config))))
    garbage/indexer.clj: |
      (ns garbage.indexer)

      (def ^:const GARBAGE_RARE030_A "es_marker")
      (def ^:const GARBAGE_RARE030_B "shard_marker")

      (defn index-doc [id doc]
        GARBAGE_RARE030_A)
    garbage/reporter.clj: |
      (ns garbage.reporter)

      (def ^:const GARBAGE_RARE030_C "pdf_marker")
      (def ^:const GARBAGE_RARE030_D "template_marker")

      (defn generate-report [data]
        GARBAGE_RARE030_C)
    garbage/mailer.clj: |
      (ns garbage.mailer)

      (def ^:const GARBAGE_RARE030_E "smtp_marker")

      (defn send-email [to subject body]
        GARBAGE_RARE030_E)
