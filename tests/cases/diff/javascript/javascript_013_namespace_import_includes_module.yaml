# Scenario: main.ts is rewritten to import utils namespace from utils.ts and
#   call utils.add, utils.multiply, utils.VERSION. Only main.ts is changed.
#
# Diff shows:
#   - console.log('initial');
#   + import * as utils from './utils';
#   + function calculate() { utils.add(1, 2); utils.multiply(3, 4); utils.VERSION; }
#
# Reviewer questions:
#   Q1: "What exports does utils.ts provide — are add, multiply, VERSION valid?"
#       -> utils.ts (UNCHANGED) exports VERSION, add(), multiply(). Reviewer
#          must verify all accessed members exist in the module.
#
#   Q2: "What do add and multiply return — are the results meaningful?"
#       -> Same file: add returns a+b, multiply returns a*b. Reviewer needs
#          implementations to verify calculate() logic.
#
# Not needed for comprehension:
#   - math-utils.ts: Another utility module with similar math functions.
#     STRUCTURAL TRAP: exports add(), subtract(), divide() — overlapping
#     function names. But not imported by main.ts.
#
#   - utils.test.ts: Tests for utils.add and utils.multiply. DIRECT EDGE:
#     imports the same module, calls the same functions. But test assertions
#     don't help verify main.ts's usage.

initial:
  utils.ts: |
    export const VERSION = '1.0.0';

    export function add(a: number, b: number): number {
        return a + b;
    }

    export function multiply(a: number, b: number): number {
        return a * b;
    }
  main.ts: |
    console.log('initial');
  math-utils.ts: |
    export function add(a: number, b: number): number {
        return a + b;
    }

    export function subtract(a: number, b: number): number {
        return a - b;
    }

    export function divide(a: number, b: number): number {
        if (b === 0) throw new Error('Division by zero');
        return a / b;
    }

    export function modulo(a: number, b: number): number {
        return a % b;
    }
  utils.test.ts: |
    import { add, multiply, VERSION } from './utils';

    describe('utils', () => {
        it('should add numbers', () => {
            expect(add(1, 2)).toBe(3);
            expect(add(-1, 1)).toBe(0);
        });

        it('should multiply numbers', () => {
            expect(multiply(3, 4)).toBe(12);
            expect(multiply(0, 100)).toBe(0);
        });

        it('should export version', () => {
            expect(VERSION).toBe('1.0.0');
        });
    });

changed:
  utils.ts: |
    export const VERSION = '1.0.0';

    export function add(a: number, b: number): number {
        return a + b;
    }

    export function multiply(a: number, b: number): number {
        return a * b;
    }
  main.ts: |
    import * as utils from './utils';

    function calculate() {
        const sum = utils.add(1, 2);
        const product = utils.multiply(3, 4);
        console.log(`Version: ${utils.VERSION}, Sum: ${sum}, Product: ${product}`);
    }

    calculate();
  math-utils.ts: |
    export function add(a: number, b: number): number {
        return a + b;
    }

    export function subtract(a: number, b: number): number {
        return a - b;
    }

    export function divide(a: number, b: number): number {
        if (b === 0) throw new Error('Division by zero');
        return a / b;
    }

    export function modulo(a: number, b: number): number {
        return a % b;
    }
  utils.test.ts: |
    import { add, multiply, VERSION } from './utils';

    describe('utils', () => {
        it('should add numbers', () => {
            expect(add(1, 2)).toBe(3);
            expect(add(-1, 1)).toBe(0);
        });

        it('should multiply numbers', () => {
            expect(multiply(3, 4)).toBe(12);
            expect(multiply(0, 100)).toBe(0);
        });

        it('should export version', () => {
            expect(VERSION).toBe('1.0.0');
        });
    });

must_include_files:
  - main.ts
  # Q1+Q2: utils.ts defines the exports accessed via namespace import
  - utils.ts

must_include_content_from:
  main.ts:
    - "import * as utils from './utils'"
    - "utils.add(1, 2)"
    - "utils.multiply(3, 4)"
  utils.ts:
    - "export const VERSION"
    - "export function add"
    - "export function multiply"

must_not_include:
  # --- math-utils.ts: overlapping function names ---
  # STRUCTURAL TRAP: exports add() just like utils.ts. But not imported.
  - subtract
  - divide
  - modulo
  # --- utils.test.ts: tests the same utils module ---
  # DIRECT EDGE: imports add, multiply, VERSION from utils. But test
  # assertions don't help review main.ts's namespace usage.
  - "describe('utils'"
  - "expect(add(1, 2)).toBe"
  - "expect(multiply"

must_not_include_files:
  - math-utils.ts
  - utils.test.ts

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
