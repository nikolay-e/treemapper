name: javascript_013_namespace_import_includes_module
repo:
  initial_files:
    utils.ts: |
      export const VERSION = '1.0.0';

      export function add(a: number, b: number): number {
          return a + b;
      }

      export function multiply(a: number, b: number): number {
          return a * b;
      }
    main.ts: |
      console.log('initial');
    math-utils.ts: |
      export function add(a: number, b: number): number {
          return a + b;
      }

      export function subtract(a: number, b: number): number {
          return a - b;
      }

      export function divide(a: number, b: number): number {
          if (b === 0) throw new Error('Division by zero');
          return a / b;
      }

      export function modulo(a: number, b: number): number {
          return a % b;
      }
    utils.test.ts: |
      import { add, multiply, VERSION } from './utils';

      describe('utils', () => {
          it('should add numbers', () => {
              expect(add(1, 2)).toBe(3);
              expect(add(-1, 1)).toBe(0);
          });

          it('should multiply numbers', () => {
              expect(multiply(3, 4)).toBe(12);
              expect(multiply(0, 100)).toBe(0);
          });

          it('should export version', () => {
              expect(VERSION).toBe('1.0.0');
          });
      });
  changed_files:
    utils.ts: |
      export const VERSION = '1.0.0';

      export function add(a: number, b: number): number {
          return a + b;
      }

      export function multiply(a: number, b: number): number {
          return a * b;
      }
    main.ts: |
      import * as utils from './utils';

      function calculate() {
          const sum = utils.add(1, 2);
          const product = utils.multiply(3, 4);
          console.log(`Version: ${utils.VERSION}, Sum: ${sum}, Product: ${product}`);
      }

      calculate();
    math-utils.ts: |
      export function add(a: number, b: number): number {
          return a + b;
      }

      export function subtract(a: number, b: number): number {
          return a - b;
      }

      export function divide(a: number, b: number): number {
          if (b === 0) throw new Error('Division by zero');
          return a / b;
      }

      export function modulo(a: number, b: number): number {
          return a % b;
      }
    utils.test.ts: |
      import { add, multiply, VERSION } from './utils';

      describe('utils', () => {
          it('should add numbers', () => {
              expect(add(1, 2)).toBe(3);
              expect(add(-1, 1)).toBe(0);
          });

          it('should multiply numbers', () => {
              expect(multiply(3, 4)).toBe(12);
              expect(multiply(0, 100)).toBe(0);
          });

          it('should export version', () => {
              expect(VERSION).toBe('1.0.0');
          });
      });
  commit_message: Update files
