            <ul>
                <li v-for="c in contacts" :key="c.email">{{ c.name }} ({{ c.email }})</li>
            </ul>
        </div>
    </template>
  src/composables/useForm.ts: |
    import { ref, reactive } from 'vue';

    export function useForm<T extends Record<string, unknown>>(initial: T) {
        const values = reactive({ ...initial });
        const errors = ref<Record<string, string>>({});

        function reset() {
            Object.assign(values, initial);
            errors.value = {};
        }

        function validate(): boolean {
            errors.value = {};
            for (const [key, val] of Object.entries(values)) {
                if (val === '' || val === null || val === undefined) {
                    errors.value[key] = `${key} is required`;
                }
            }
            return Object.keys(errors.value).length === 0;
        }

        return { values, errors, reset, validate };
    }
  src/types/formValidation.ts: |
    export interface ValidationRule {
        name: string;
        validate: (value: string) => boolean;
        message: string;
    }

    export const emailRule: ValidationRule = {
        name: 'email',
        validate: (v: string) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v),
        message: 'Invalid email format',
    };

    export const requiredRule: ValidationRule = {
        name: 'required',
        validate: (v: string) => v.trim().length > 0,
        message: 'This field is required',
    };

must_include_files:
  - ContactForm.vue
  # Q1+Q2: FormEvents interface defines the emit contract.
  # Reviewer must see the event names and payload types to verify
  # defineEmits<FormEvents>() is correctly typed.
  - events.ts

must_include_content_from:
  ContactForm.vue:
    - "<script setup lang=\"ts\">"
    - "defineEmits<FormEvents>()"
  events.ts:
    - "interface FormEvents"
    - "submit:"
    - "cancel: []"

must_not_include:
  # --- ContactList.vue: parent component, listens for events ---
  # Direct structural edge: @submit="handleSubmit" @cancel="handleCancel"
  # binds the exact events from FormEvents. But HOW the parent handles
  # events doesn't help review whether defineEmits is correctly typed.
  - ContactList
  - handleCancel
  - "contacts.value.push"
  # --- useForm.ts: form composable, not imported ---
  - useForm
  - "reactive({ ...initial })"
  # --- formValidation.ts: validation rules, not used in diff ---
  - ValidationRule
  - emailRule
  - requiredRule

must_not_include_files:
  - src/components/ContactList.vue
  - src/composables/useForm.ts
  - src/types/formValidation.ts

max_fragments: 8
max_files: 3
add_garbage_files: false
skip_garbage_check: true
