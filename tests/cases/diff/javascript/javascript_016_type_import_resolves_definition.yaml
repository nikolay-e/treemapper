# Scenario: service.ts is rewritten to import User and UserRole types from
#   types.ts and use them in function signatures. Only service.ts is changed.
#
# Diff shows:
#   - console.log('initial');
#   + import type { User, UserRole } from './types';
#   + function getUser(id: string): User { ... }
#   + function checkRole(role: UserRole): boolean { ... }
#
# Reviewer questions:
#   Q1: "What fields does User have — does the return value match?"
#       -> types.ts (UNCHANGED) defines User with id: string, name: string,
#          email: string. Reviewer must verify getUser returns matching shape.
#
#   Q2: "What values can UserRole take — is 'admin' comparison valid?"
#       -> Same file: UserRole = 'admin' | 'user' | 'guest'. Reviewer needs
#          the type to verify checkRole's comparison is exhaustive.
#
# Not needed for comprehension:
#   - user-repository.ts: Database layer returning User objects. DIRECT TYPE
#     OVERLAP: imports User, returns User from queries. But persistence logic
#     doesn't help review service.ts's type usage.
#
#   - role-guard.ts: Authorization guard checking UserRole. DIRECT TYPE OVERLAP:
#     imports UserRole, checks role values. But guard logic doesn't help
#     review service.ts's checkRole implementation.

initial:
  types.ts: |
    export interface User {
        id: string;
        name: string;
        email: string;
    }

    export type UserRole = 'admin' | 'user' | 'guest';
  service.ts: |
    console.log('initial');
  user-repository.ts: |
    import type { User } from './types';

    export class UserRepository {
        private users: Map<string, User> = new Map();

        findById(id: string): User | undefined {
            return this.users.get(id);
        }

        findByEmail(email: string): User | undefined {
            return [...this.users.values()].find(u => u.email === email);
        }

        save(user: User): void {
            this.users.set(user.id, user);
        }

        deleteById(id: string): boolean {
            return this.users.delete(id);
        }
    }
  role-guard.ts: |
    import type { UserRole } from './types';

    export class RoleGuard {
        private allowedRoles: Set<UserRole>;

        constructor(roles: UserRole[]) {
            this.allowedRoles = new Set(roles);
        }

        canAccess(role: UserRole): boolean {
            return this.allowedRoles.has(role);
        }

        requireAdmin(role: UserRole): void {
            if (role !== 'admin') {
                throw new Error('Admin access required');
            }
        }
    }

changed:
  types.ts: |
    export interface User {
        id: string;
        name: string;
        email: string;
    }

    export type UserRole = 'admin' | 'user' | 'guest';
  service.ts: |
    import type { User, UserRole } from './types';

    function getUser(id: string): User {
        return { id, name: 'Test', email: 'test@example.com' };
    }

    function checkRole(role: UserRole): boolean {
        return role === 'admin';
    }
  user-repository.ts: |
    import type { User } from './types';

    export class UserRepository {
        private users: Map<string, User> = new Map();

        findById(id: string): User | undefined {
            return this.users.get(id);
        }

        findByEmail(email: string): User | undefined {
            return [...this.users.values()].find(u => u.email === email);
        }

        save(user: User): void {
            this.users.set(user.id, user);
        }

        deleteById(id: string): boolean {
            return this.users.delete(id);
        }
    }
  role-guard.ts: |
    import type { UserRole } from './types';

    export class RoleGuard {
        private allowedRoles: Set<UserRole>;

        constructor(roles: UserRole[]) {
            this.allowedRoles = new Set(roles);
        }

        canAccess(role: UserRole): boolean {
            return this.allowedRoles.has(role);
        }

        requireAdmin(role: UserRole): void {
            if (role !== 'admin') {
                throw new Error('Admin access required');
            }
        }
    }

must_include_files:
  - service.ts
  # Q1+Q2: types.ts defines User fields and UserRole union
  - types.ts

must_include_content_from:
  service.ts:
    - "import type { User, UserRole } from './types'"
    - "function getUser(id: string): User"
    - "function checkRole(role: UserRole): boolean"
  types.ts:
    - "interface User"
    - "id: string"
    - "name: string"
    - "email: string"
    - "'admin' | 'user' | 'guest'"

must_not_include:
  # --- user-repository.ts: persistence layer using User type ---
  # DIRECT TYPE OVERLAP: imports and returns User. But database operations
  # don't help review service.ts's type usage.
  - UserRepository
  - findById
  - findByEmail
  # --- role-guard.ts: authorization guard using UserRole ---
  # DIRECT TYPE OVERLAP: imports UserRole, checks 'admin'. But guard
  # logic doesn't help review service.ts's checkRole.
  - RoleGuard
  - canAccess
  - requireAdmin

must_not_include_files:
  - user-repository.ts
  - role-guard.ts

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
