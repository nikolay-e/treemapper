must_include_files:
  - consumer.ts
  # Q1+Q2: asyncGenerator defines what values are yielded and timing
  - generator.ts

must_include_content_from:
  consumer.ts:
    - "import { asyncGenerator } from './generator'"
    - "for await (const value of asyncGenerator())"
  generator.ts:
    - "export async function* asyncGenerator()"
    - "yield i"

must_not_include:
  # --- event-stream.ts: EventEmitter-based async iteration ---
  # Different async pattern (events + Symbol.asyncIterator). Similar concept
  # but not imported by consumer.ts.
  - EventStream
  - "Symbol.asyncIterator"
  - "this.emit('data'"
  # --- batch-processor.ts: array batch processing with async/await ---
  # Uses async/await loops but processes arrays, not generators.
  - processBatch
  - processSequential
  - "Promise.all(batch.map"

must_not_include_files:
  - event-stream.ts
  - batch-processor.ts

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
