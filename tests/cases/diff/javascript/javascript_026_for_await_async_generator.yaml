# Scenario: consumer.ts is rewritten to import asyncGenerator from generator.ts
#   and consume it with for-await-of. Only consumer.ts is changed.
#
# Diff shows:
#   - console.log('initial');
#   + import { asyncGenerator } from './generator';
#   + async function consume() { for await (const value of asyncGenerator()) { ... } }
#
# Reviewer questions:
#   Q1: "What values does asyncGenerator yield and how fast?"
#       -> generator.ts (UNCHANGED) yields 0..4 with 100ms delay per value.
#          Reviewer must see the generator body to understand iteration behavior.
#
#   Q2: "Does asyncGenerator ever throw — should consume() handle errors?"
#       -> Same file: no try/catch, just awaits setTimeout promises. Reviewer
#          needs the body to assess error handling needs.
#
# Not needed for comprehension:
#   - event-stream.ts: EventEmitter-based async stream using on('data').
#     Different async pattern (events vs generators). Similar concept of
#     async data flow but not imported by consumer.ts.
#
#   - batch-processor.ts: Processes arrays in batches with async/await.
#     Uses similar async/await patterns but operates on arrays, not generators.
#     Not imported by consumer.ts. Trap: async function with iteration.

max_enrichment: 4.5
initial:
  generator.ts: |
    export async function* asyncGenerator() {
        for (let i = 0; i < 5; i++) {
            await new Promise(resolve => setTimeout(resolve, 100));
            yield i;
        }
    }
  consumer.ts: |
    console.log('initial');
  event-stream.ts: |
    import { EventEmitter } from 'events';

    export class EventStream extends EventEmitter {
        private buffer: unknown[] = [];

        push(value: unknown): void {
            this.buffer.push(value);
            this.emit('data', value);
        }

        async *[Symbol.asyncIterator]() {
            while (true) {
                if (this.buffer.length > 0) {
                    yield this.buffer.shift();
                } else {
                    await new Promise(resolve => this.once('data', resolve));
                }
            }
        }

        close(): void {
            this.emit('end');
            this.removeAllListeners();
        }
    }
  batch-processor.ts: |
    export async function processBatch<T, R>(
        items: T[],
        processor: (item: T) => Promise<R>,
        batchSize: number = 10
    ): Promise<R[]> {
        const results: R[] = [];
        for (let i = 0; i < items.length; i += batchSize) {
            const batch = items.slice(i, i + batchSize);
            const batchResults = await Promise.all(batch.map(processor));
            results.push(...batchResults);
        }
        return results;
    }

    export async function processSequential<T, R>(
        items: T[],
        processor: (item: T) => Promise<R>
    ): Promise<R[]> {
        const results: R[] = [];
        for (const item of items) {
            results.push(await processor(item));
        }
        return results;
    }

changed:
  generator.ts: |
    export async function* asyncGenerator() {
        for (let i = 0; i < 5; i++) {
            await new Promise(resolve => setTimeout(resolve, 100));
            yield i;
        }
    }
  consumer.ts: |
    import { asyncGenerator } from './generator';

    async function consume() {
        for await (const value of asyncGenerator()) {
            console.log(value);
        }
    }

    consume();
  event-stream.ts: |
