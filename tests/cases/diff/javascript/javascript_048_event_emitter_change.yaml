must_include_files:
  # Q1: listener.ts imports appEmitter — reviewer checks if new events have handlers
  - listener.ts
must_include_content_from:
  listener.ts:
    - "import { appEmitter } from './emitter'"
    - "appEmitter.on('userCreated'"
must_not_include:
  # user-repository.ts: CRUD operations, doesn't import emitter
  - UserRecord
  - saveUser
  - removeUser
  - findUser
  # notification-service.ts: external HTTP notifications, no EventEmitter usage
  - sendEmailNotification
  - sendPushNotification
must_not_include_files:
  - user-repository.ts
  - notification-service.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
