# Scenario: emitter.ts adds emitUserDeleted and emitUserUpdated functions.
# listener.ts subscribes to 'userCreated' via appEmitter.on().
#
# Diff: emitter.ts adds two new emit functions for 'userDeleted' and 'userUpdated'
# events alongside the existing emitUserCreated.
#
# Reviewer questions:
#   Q1: "Are there listeners for the new events?"
#       -> listener.ts (UNCHANGED) imports appEmitter and subscribes only to
#          'userCreated'. The new 'userDeleted' and 'userUpdated' events fire
#          into the void — reviewer flags missing handlers.
#   Q2: "What's the existing event handling pattern?"
#       -> listener.ts: appEmitter.on('userCreated', handler) shows the wiring convention.
#
# Not needed:
#   - user-repository.ts: CRUD operations on users (saveUser, removeUser, findUser).
#     Might eventually call emitUserDeleted, but doesn't import emitter yet.
#   - notification-service.ts: sends notifications via external HTTP API.
#     Different communication mechanism entirely, no EventEmitter usage.

initial:
  emitter.ts: |
    import { EventEmitter } from 'events';

    export const appEmitter = new EventEmitter();

    export function emitUserCreated(user: { id: string; name: string }) {
        appEmitter.emit('userCreated', user);
    }
  listener.ts: |
    import { appEmitter } from './emitter';

    appEmitter.on('userCreated', (user) => {
        console.log('User created:', user);
    });
  user-repository.ts: |
    interface UserRecord {
        id: string;
        name: string;
        email: string;
    }

    const users = new Map<string, UserRecord>();

    export function saveUser(user: UserRecord): void {
        users.set(user.id, user);
    }

    export function removeUser(id: string): boolean {
        return users.delete(id);
    }

    export function findUser(id: string): UserRecord | undefined {
        return users.get(id);
    }
  notification-service.ts: |
    export async function sendEmailNotification(to: string, subject: string, body: string): Promise<boolean> {
        const response = await fetch('/api/notifications/email', {
            method: 'POST',
            body: JSON.stringify({ to, subject, body }),
        });
        return response.ok;
    }

    export async function sendPushNotification(userId: string, message: string): Promise<boolean> {
        const response = await fetch('/api/notifications/push', {
            method: 'POST',
            body: JSON.stringify({ userId, message }),
        });
        return response.ok;
    }
changed:
