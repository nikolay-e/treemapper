initial:
  emitter.ts: |
    import { EventEmitter } from 'events';

    export const appEmitter = new EventEmitter();

    export function emitUserCreated(user: { id: string; name: string }) {
        appEmitter.emit('userCreated', user);
    }
  listener.ts: |
    import { appEmitter } from './emitter';

    appEmitter.on('userCreated', (user) => {
        console.log('User created:', user);
    });
  garbage_storage.ts: |
    const GARBAGE_JS_048_STORAGE_MARKER_A = "storage";
    const GARBAGE_JS_048_BUCKET_MARKER_B = true;

    class ObjectStorage {
        static GARBAGE_JS_048_STORAGE_CLASS_C = "object_store";

        upload(key: string, data: Buffer): Promise<string> {
            return Promise.resolve(key);
        }
    }
  garbage_indexing.ts: |
    const GARBAGE_JS_048_INDEX_MARKER_D = "indexing";
    const GARBAGE_JS_048_SHARD_MARKER_E = 16;

    class SearchIndexer {
        static GARBAGE_JS_048_INDEXER_CLASS_F = true;

        index(docId: string, content: string): void {
            // noop
        }
    }
