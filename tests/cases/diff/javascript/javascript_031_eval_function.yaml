        getMetrics(period: string): Observable<Record<string, number>> {
            return this.http.get<Record<string, number>>(`/api/analytics/metrics?period=${period}`);
        }
    }
  string-utils.ts: |
    export function capitalize(str: string): string {
        return str.charAt(0).toUpperCase() + str.slice(1);
    }

    export function truncate(str: string, maxLength: number): string {
        return str.length > maxLength ? str.slice(0, maxLength) + '...' : str;
    }

    export function slugify(str: string): string {
        return str.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
    }
  eval-sanitizer.ts: |
    export function sanitizeForEval(input: string): string {
        const forbidden = ['require', 'import', 'process', 'global', '__dirname'];
        for (const keyword of forbidden) {
            if (input.includes(keyword)) {
                throw new Error(`Forbidden keyword in eval input: ${keyword}`);
            }
        }
        return input;
    }

    export function isEvalSafe(code: string): boolean {
        const dangerousPatterns = [/\beval\b/, /Function\(/, /setTimeout\(\s*['"`]/];
        return !dangerousPatterns.some(p => p.test(code));
    }

must_include_files:
  - main.ts
  # Q1+Q2: targetFunction is imported and called via eval. Reviewer needs to see
  # the function body to verify eval result and safety.
  - functions.ts

must_include_content_from:
  main.ts:
    - "import { targetFunction } from './functions'"
    - "eval('targetFunction()')"
  functions.ts:
    - "export function targetFunction()"
    - "return 'called'"

must_not_include:
  # --- analytics.service.ts: unrelated Angular service ---
  # Sibling .ts file with imports and exports but no connection to
  # targetFunction or eval. Different domain (analytics HTTP calls).
  - AnalyticsService
  - trackEvent
  - getMetrics
  # --- string-utils.ts: utility module, same pattern as functions.ts ---
  # Another module exporting functions, but not imported by main.ts.
  - capitalize
  - truncate
  - slugify
  # --- eval-sanitizer.ts: KEYWORD OVERLAP with "eval" ---
  # HARDEST TRAP. Contains sanitizeForEval and isEvalSafe — direct
  # keyword overlap with eval() in the diff. But main.ts does not
  # import or use this sanitizer.
  - sanitizeForEval
  - isEvalSafe
  - "Forbidden keyword in eval input"

must_not_include_files:
  - analytics.service.ts
  - string-utils.ts
  - eval-sanitizer.ts

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
