# Scenario: schemas.ts is changed to add new validations (uuid, min/max) and
#   new fields (age, role) to UserSchema. validator.ts imports UserSchema and
#   User type. Only schemas.ts is changed; validator.ts is unchanged.
#
# Diff shows:
#   - id: z.string(), name: z.string(), email: z.string().email()
#   + id: z.string().uuid(), name: z.string().min(1).max(100)
#   + age: z.number().int().positive().optional()
#   + role: z.enum(['admin', 'user', 'guest'])
#
# Reviewer questions:
#   Q1: "Does validator.ts still work with the updated schema?"
#       -> validator.ts: calls UserSchema.parse(data) and uses User type.
#          parse() will now enforce uuid, min/max, and require role.
#          Reviewer needs to see the validator to check if callers pass role.
#
#   Q2: "Will existing data pass the stricter validations?"
#       -> schemas.ts: id changed from z.string() to z.string().uuid() — any
#          non-UUID id will now fail. name added min(1).max(100). role is
#          required (no .optional()). These are breaking changes.
#
# Not needed for comprehension:
#   - product-schemas.ts: Parallel Zod schema for ProductSchema with similar
#     structure (id, name, price, category). Same z.object pattern.
#     HARD TRAP: identical Zod schema structure, same validation methods.
#
#   - schema-tests.ts: Tests for UserSchema using valid/invalid inputs.
#     Direct structural edge — imports UserSchema and tests parse.
#     But test expectations don't help review the schema changes.
#
#   - zod-utils.ts: Custom Zod refinements and transforms shared across schemas.
#     Same Zod ecosystem but utility functions not used by schemas.ts.

initial:
  schemas.ts: |
    import { z } from 'zod';

    export const UserSchema = z.object({
        id: z.string(),
        name: z.string(),
        email: z.string().email(),
    });

    export type User = z.infer<typeof UserSchema>;
  validator.ts: |
    import { UserSchema, User } from './schemas';

    export function validateUser(data: unknown): User {
        return UserSchema.parse(data);
    }
  product-schemas.ts: |
    import { z } from 'zod';

    export const ProductSchema = z.object({
        id: z.string().uuid(),
        name: z.string().min(1).max(200),
        price: z.number().positive(),
        category: z.enum(['electronics', 'clothing', 'food']),
    });

    export type Product = z.infer<typeof ProductSchema>;
  schema-tests.ts: |
    import { UserSchema } from './schemas';

    describe('UserSchema', () => {
        it('accepts valid user', () => {
            const result = UserSchema.safeParse({ id: '1', name: 'Alice', email: 'alice@test.com' });
            expect(result.success).toBe(true);
        });

        it('rejects invalid email', () => {
            const result = UserSchema.safeParse({ id: '1', name: 'Alice', email: 'not-email' });
            expect(result.success).toBe(false);
        });
    });
  zod-utils.ts: |
    import { z } from 'zod';

    export const nonEmptyString = z.string().min(1).trim();
    export const positiveInt = z.number().int().positive();
    export const isoDate = z.string().datetime();

