must_include_files:
  - schemas.ts
  # Q1: validator.ts imports UserSchema and calls .parse() — reviewer needs
  # to see the consumer to assess the impact of the schema changes.
  - validator.ts

must_include_content_from:
  schemas.ts:
    - "UserSchema = z.object({"
    - "z.string().uuid()"
    - "z.string().min(1).max(100)"
    - "z.enum(['admin', 'user', 'guest'])"
    - "type User = z.infer<typeof UserSchema>"
  validator.ts:
    - "import { UserSchema, User } from './schemas'"
    - "UserSchema.parse(data)"

must_not_include:
  # --- product-schemas.ts: parallel Zod schema ---
  # HARD TRAP: identical z.object structure with uuid, min/max, enum.
  - ProductSchema
  - "'electronics'"
  - "'clothing'"
  # --- schema-tests.ts: tests for UserSchema ---
  # Direct edge: imports UserSchema, calls safeParse.
  - safeParse
  - "accepts valid user"
  - "rejects invalid email"
  # --- zod-utils.ts: shared Zod refinements ---
  - nonEmptyString
  - positiveInt
  - isoDate

must_not_include_files:
  - product-schemas.ts
  - schema-tests.ts
  - zod-utils.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
