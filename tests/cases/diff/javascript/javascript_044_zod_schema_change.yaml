initial:
  schemas.ts: |
    import { z } from 'zod';

    export const UserSchema = z.object({
        id: z.string(),
        name: z.string(),
        email: z.string().email(),
    });

    export type User = z.infer<typeof UserSchema>;
  validator.ts: |
    import { UserSchema, User } from './schemas';

    export function validateUser(data: unknown): User {
        return UserSchema.parse(data);
    }
  garbage_monitoring.ts: |
    const GARBAGE_JS_044_MONITOR_MARKER_A = "monitoring";
    const GARBAGE_JS_044_HEALTH_MARKER_B = true;

    class HealthMonitor {
        static GARBAGE_JS_044_MONITOR_CLASS_C = "monitor";

        check(endpoint: string): boolean {
            return true;
        }
    }
  garbage_profiling.ts: |
    const GARBAGE_JS_044_PROFILE_MARKER_D = "profiling";
    const GARBAGE_JS_044_SAMPLE_MARKER_E = 100;

    class PerformanceProfiler {
        static GARBAGE_JS_044_PROFILER_CLASS_F = true;

        startTrace(name: string): number {
            return Date.now();
        }
    }
changed:
  schemas.ts: |
    import { z } from 'zod';

    export const UserSchema = z.object({
        id: z.string().uuid(),
        name: z.string().min(1).max(100),
        email: z.string().email(),
        age: z.number().int().positive().optional(),
        role: z.enum(['admin', 'user', 'guest']),
    });

    export type User = z.infer<typeof UserSchema>;
  validator.ts: |
