# Scenario: Test imports and validates a function — reviewer needs the implementation.
#
# Diff: validator.test.ts is written from scratch importing isValidEmail from
# validator.ts. Tests check valid and invalid email patterns.
#
# Reviewer questions:
#   Q1: "What regex does isValidEmail use and do the test cases cover its edges?"
#       -> validator.ts (UNCHANGED) uses /^[^\s@]+@[^\s@]+\.[^\s@]+$/.
#          The reviewer must see the regex to judge whether 'test@example.com'
#          and 'invalid' adequately exercise the pattern.
#
# Not needed:
#   - sanitizer.ts: input sanitization (HTML stripping) in the same directory.
#     Similar concern (input handling) but different responsibility, no import edge.
#   - validator.constants.ts: error message constants for validation display.
#     Not referenced by isValidEmail or the test.

initial:
  validator.ts: |
    export function isValidEmail(email: string): boolean {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
  validator.test.ts: |
    console.log('initial');
  sanitizer.ts: |
    export function sanitizeHtml(input: string): string {
        return input.replace(/<[^>]*>/g, '');
    }

    export function escapeSpecialChars(input: string): string {
        return input.replace(/[&<>"']/g, char => `&#${char.charCodeAt(0)};`);
    }
  validator.constants.ts: |
    export const EMAIL_ERROR = 'Please enter a valid email address';
    export const REQUIRED_ERROR = 'This field is required';
    export const MIN_LENGTH_ERROR = 'Value is too short';

changed:
  validator.ts: |
    export function isValidEmail(email: string): boolean {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
  validator.test.ts: |
    import { isValidEmail } from './validator';

    describe('Validator', () => {
        it('should validate correct email', () => {
            expect(isValidEmail('test@example.com')).toBe(true);
        });

        it('should reject invalid email', () => {
            expect(isValidEmail('invalid')).toBe(false);
        });
    });
  sanitizer.ts: |
    export function sanitizeHtml(input: string): string {
        return input.replace(/<[^>]*>/g, '');
    }

    export function escapeSpecialChars(input: string): string {
        return input.replace(/[&<>"']/g, char => `&#${char.charCodeAt(0)};`);
    }
  validator.constants.ts: |
    export const EMAIL_ERROR = 'Please enter a valid email address';
    export const REQUIRED_ERROR = 'This field is required';
    export const MIN_LENGTH_ERROR = 'Value is too short';

must_include_files:
  # Q1: validator.ts defines isValidEmail with the regex — reviewer checks test coverage
  - validator.ts
must_include_content_from:
  validator.ts:
    - "function isValidEmail(email: string)"
must_not_include:
  # sanitizer.ts: different input processing, not used by validator tests
  - sanitizeHtml
  - escapeSpecialChars
  # validator.constants.ts: error messages not referenced by isValidEmail
  - EMAIL_ERROR
  - REQUIRED_ERROR
must_not_include_files:
  - sanitizer.ts
  - validator.constants.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
