must_include_files:
  - enums.ts
  # Q1+Q2: task.ts is the primary consumer — reviewer needs to see that
  # it only handles Pending and Completed, not the new values.
  - task.ts

must_include_content_from:
  enums.ts:
    - "enum Status {"
    - "Cancelled = 'CANCELLED'"
    - "OnHold = 'ON_HOLD'"
  task.ts:
    - "import { Status } from './enums'"
    - "status: Status = Status.Pending"
    - "this.status = Status.Completed"

must_not_include:
  # --- status-display.ts: maps Status to labels/colors ---
  # HARD TRAP: exhaustive switch on Status values — a real downstream
  # impact. But it's a different consumer, not needed for understanding
  # the enum change itself.
  - getStatusLabel
  - getStatusColor
  - "#ffc107"
  - "#28a745"
  # --- priority-enum.ts: parallel enum pattern ---
  # HARD TRAP: identical enum structure, same module organization.
  - Priority
  - isUrgent
  - "'CRITICAL'"
  # --- task-history.ts: records status transitions ---
  # Uses Status but for logging, not relevant to the enum change.
  - TaskHistory
  - StatusTransition
  - getTransitions

must_not_include_files:
  - status-display.ts
  - priority-enum.ts
  - task-history.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
