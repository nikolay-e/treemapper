# Scenario: enums.ts is changed to add Cancelled and OnHold values to Status enum.
#   task.ts imports Status and uses Status.Pending and Status.Completed.
#   Only enums.ts is changed; task.ts is unchanged.
#
# Diff shows:
#   - Status { Pending, Active, Completed }
#   + Status { Pending, Active, Completed, Cancelled = 'CANCELLED', OnHold = 'ON_HOLD' }
#
# Reviewer questions:
#   Q1: "Does task.ts handle the new status values?"
#       -> task.ts (UNCHANGED): Task.complete() only transitions to Completed.
#          There's no handling for Cancelled or OnHold. Reviewer must assess
#          whether Task needs cancel() or hold() methods.
#
#   Q2: "Does the existing code do exhaustive status checks?"
#       -> task.ts: only references Pending and Completed. If there's a switch
#          statement or exhaustive check elsewhere, it would break with new values.
#
# Not needed for comprehension:
#   - status-display.ts: Maps Status values to display strings and colors.
#     Direct structural edge — imports Status, switches on all values.
#     HARD TRAP: exhaustive switch on Status — would need updating for new values.
#     But it's a downstream impact concern, not needed to understand the diff.
#
#   - priority-enum.ts: Parallel enum (Priority) with Low/Medium/High/Critical.
#     Same enum pattern, same module organization. HARD TRAP: identical enum
#     structure, would be found in same "enums" search.
#
#   - task-history.ts: Records Task status transitions with timestamps.
#     Uses Status enum for transition tracking. Same Status type, same
#     task domain. But history logging doesn't help review the enum change.

initial:
  enums.ts: |
    export enum Status {
        Pending = 'PENDING',
        Active = 'ACTIVE',
        Completed = 'COMPLETED',
    }
  task.ts: |
    import { Status } from './enums';

    export class Task {
        status: Status = Status.Pending;

        complete() {
            this.status = Status.Completed;
        }
    }
  status-display.ts: |
    import { Status } from './enums';

    export function getStatusLabel(status: Status): string {
        switch (status) {
            case Status.Pending: return 'Pending';
            case Status.Active: return 'In Progress';
            case Status.Completed: return 'Done';
        }
    }

    export function getStatusColor(status: Status): string {
        switch (status) {
            case Status.Pending: return '#ffc107';
            case Status.Active: return '#17a2b8';
            case Status.Completed: return '#28a745';
        }
    }
  priority-enum.ts: |
    export enum Priority {
        Low = 'LOW',
        Medium = 'MEDIUM',
        High = 'HIGH',
        Critical = 'CRITICAL',
    }

    export function isUrgent(priority: Priority): boolean {
        return priority === Priority.High || priority === Priority.Critical;
    }
  task-history.ts: |
    import { Status } from './enums';

    interface StatusTransition {
        from: Status;
        to: Status;
        timestamp: Date;
    }

    export class TaskHistory {
        private transitions: StatusTransition[] = [];

        record(from: Status, to: Status): void {
            this.transitions.push({ from, to, timestamp: new Date() });
        }

        getTransitions(): StatusTransition[] {
            return [...this.transitions];
        }
    }

changed:
  enums.ts: |
    export enum Status {
        Pending = 'PENDING',
        Active = 'ACTIVE',
        Completed = 'COMPLETED',
        Cancelled = 'CANCELLED',
        OnHold = 'ON_HOLD',
    }
  task.ts: |
    import { Status } from './enums';

    export class Task {
        status: Status = Status.Pending;

        complete() {
            this.status = Status.Completed;
        }
    }
  status-display.ts: |
    import { Status } from './enums';

    export function getStatusLabel(status: Status): string {
        switch (status) {
            case Status.Pending: return 'Pending';
            case Status.Active: return 'In Progress';
            case Status.Completed: return 'Done';
        }
    }

    export function getStatusColor(status: Status): string {
        switch (status) {
            case Status.Pending: return '#ffc107';
            case Status.Active: return '#17a2b8';
            case Status.Completed: return '#28a745';
        }
    }
  priority-enum.ts: |
    export enum Priority {
        Low = 'LOW',
        Medium = 'MEDIUM',
        High = 'HIGH',
        Critical = 'CRITICAL',
    }

    export function isUrgent(priority: Priority): boolean {
        return priority === Priority.High || priority === Priority.Critical;
    }
  task-history.ts: |
    import { Status } from './enums';

    interface StatusTransition {
        from: Status;
        to: Status;
        timestamp: Date;
    }

    export class TaskHistory {
        private transitions: StatusTransition[] = [];

        record(from: Status, to: Status): void {
            this.transitions.push({ from, to, timestamp: new Date() });
