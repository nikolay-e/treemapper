initial:
  handlers.ts: |
    export const loggingHandler: ProxyHandler<object> = {
        get(target, prop, receiver) {
            console.log(`Getting ${String(prop)}`);
            return Reflect.get(target, prop, receiver);
        },
        set(target, prop, value, receiver) {
            console.log(`Setting ${String(prop)} = ${value}`);
            return Reflect.set(target, prop, value, receiver);
        },
    };
  proxy.ts: |
    console.log('initial');
  garbage_feature_flags.ts: |
    const GARBAGE_JS_029_FLAG_MARKER_A = "feature_flags";
    const GARBAGE_JS_029_TOGGLE_MARKER_B = true;

    class FeatureToggle {
        static GARBAGE_JS_029_TOGGLE_CLASS_C = "toggle";

        isEnabled(flag: string): boolean {
            return false;
        }
    }
  garbage_auditing.ts: |
    const GARBAGE_JS_029_AUDIT_MARKER_D = "auditing";
    const GARBAGE_JS_029_TRAIL_MARKER_E = 42;

    class AuditTrail {
        static GARBAGE_JS_029_TRAIL_CLASS_F = true;

        record(action: string, userId: string): void {
            // noop
        }
    }
changed:
  handlers.ts: |
    export const loggingHandler: ProxyHandler<object> = {
        get(target, prop, receiver) {
            console.log(`Getting ${String(prop)}`);
            return Reflect.get(target, prop, receiver);
        },
        set(target, prop, value, receiver) {
            console.log(`Setting ${String(prop)} = ${value}`);
            return Reflect.set(target, prop, value, receiver);
        },
    };
  proxy.ts: |
    import { loggingHandler } from './handlers';

    export function createLoggingProxy<T extends object>(target: T): T {
        return new Proxy(target, loggingHandler);
    }
  garbage_feature_flags.ts: |
