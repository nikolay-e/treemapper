name: javascript_014_require_destructured_exports
repo:
  initial_files:
    module.js: |
      const a = 1;
      const b = 2;

      module.exports = { a, b };
    main.js: |
      console.log('initial');
    config.js: |
      const port = 3000;
      const host = 'localhost';
      const debug = false;

      module.exports = { port, host, debug };
    helpers.js: |
      function clamp(value, min, max) {
          return Math.min(Math.max(value, min), max);
      }

      function range(start, end) {
          return Array.from({ length: end - start }, (_, i) => start + i);
      }

      module.exports = { clamp, range };
  changed_files:
    module.js: |
      const a = 1;
      const b = 2;

      module.exports = { a, b };
    main.js: |
      const { a, b } = require('./module');

      function main() {
          console.log(a + b);
      }

      main();
    config.js: |
      const port = 3000;
      const host = 'localhost';
      const debug = false;

      module.exports = { port, host, debug };
    helpers.js: |
      function clamp(value, min, max) {
          return Math.min(Math.max(value, min), max);
      }

      function range(start, end) {
          return Array.from({ length: end - start }, (_, i) => start + i);
      }

      module.exports = { clamp, range };
  commit_message: Update files
