must_include_files:
  - service.ts
  # Q1+Q2: Logger decorator wraps fetchData — reviewer needs to see how
  - decorators.ts

must_include_content_from:
  service.ts:
    - "import { Logger } from './decorators'"
    - "@Logger"
    - "fetchData(url: string)"
  decorators.ts:
    - "export function Logger(target: any, key: string, descriptor: PropertyDescriptor)"
    - "original.apply(this, args)"

must_not_include:
  # --- memoize-decorator.ts: IDENTICAL decorator pattern ---
  # HARDEST TRAP. Same descriptor.value wrapping, same apply pattern,
  # same decorator file location. But Memoize is not used by service.ts.
  - Memoize
  - ClearCache
  - WeakMap
  # --- api-client.ts: HTTP client with similar fetch methods ---
  # getData/postData are similar to fetchData but not decorator-related.
  - ApiClient
  - getData
  - postData

must_not_include_files:
  - memoize-decorator.ts
  - api-client.ts

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
