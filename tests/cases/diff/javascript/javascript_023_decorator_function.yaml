initial:
  decorators.ts: |
    export function Logger(target: any, key: string, descriptor: PropertyDescriptor) {
        const original = descriptor.value;
        descriptor.value = function(...args: any[]) {
            console.log(`Calling ${key} with args:`, args);
            return original.apply(this, args);
        };
        return descriptor;
    }

    export function Readonly(target: any, key: string) {
        Object.defineProperty(target, key, { writable: false });
    }
  service.ts: |
    console.log('initial');
  garbage_queue.ts: |
    const GARBAGE_JS_023_QUEUE_MARKER_A = "queue";
    const GARBAGE_JS_023_BROKER_MARKER_B = true;

    class MessageBroker {
        static GARBAGE_JS_023_BROKER_CLASS_C = "broker";

        publish(topic: string, payload: string): void {
            // noop
        }
    }
  garbage_throttling.ts: |
    const GARBAGE_JS_023_THROTTLE_MARKER_D = "throttle";
    const GARBAGE_JS_023_LIMITER_MARKER_E = 42;

    class RequestLimiter {
        static GARBAGE_JS_023_LIMITER_CLASS_F = true;

        allow(clientId: string): boolean {
            return true;
        }
    }
