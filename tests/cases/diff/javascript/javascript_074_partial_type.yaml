              timeout: parseInt(process.env.TIMEOUT ?? '5000', 10),
          };
      }
    config-validator.ts: |
      import { FullConfig } from './config';

      export function validateConfig(config: FullConfig): { valid: boolean; errors: string[] } {
          const errors: string[] = [];
          if (!config.host) errors.push('host is required');
          if (config.port < 1 || config.port > 65535) errors.push('port out of range');
          if (config.timeout < 0) errors.push('timeout must be non-negative');
          return { valid: errors.length === 0, errors };
      }
    network-config.ts: |
      export interface NetworkConfig {
          host: string;
          port: number;
          protocol: 'http' | 'https';
      }

      export function updateNetworkConfig(
          current: NetworkConfig,
          updates: Partial<NetworkConfig>
