# Scenario: UserDetails.vue is rewritten from a stub to a Vue 3 component that
#   uses watch() to reactively fetch user data when userId prop changes.
#   Imports fetchUserData from api.ts. Only UserDetails.vue is changed.
#
# Diff shows:
#   - <template><div>initial</div></template>
#   + <script setup lang="ts"> with watch(() => props.userId, async (newId) => {...})
#   + Calls fetchUserData(newId) and stores result in userData ref
#
# Reviewer questions:
#   Q1: "What does fetchUserData return — does the template access valid fields?"
#       -> api.ts: returns { id: userId, name: 'User' }. Template uses
#          userData.name which is valid. Without api.ts, reviewer cannot
#          verify the field access.
#
#   Q2: "Is the watch callback correctly typed for the API return shape?"
#       -> api.ts: returns { id: string; name: string }. The ref type
#          annotation { id: string; name: string } | null matches the API shape.
#
# Not needed for comprehension:
#   - UserList.vue: Parent component that renders UserDetails for each user.
#     Direct consumer edge — passes userId as prop. But HOW the parent iterates
#     users doesn't help review whether the watch/fetch logic is correct.
#
#   - user-cache.ts: Cache layer for user data with the same { id, name } shape.
#     Same data domain, same return type shape. HARD TRAP: same interface as
#     fetchUserData return value. But not imported by UserDetails.vue.
#
#   - UserAvatar.vue: Sibling component that also watches a userId prop and
#     fetches avatar data. Same watch(() => props.userId, ...) pattern.
#     HARD TRAP: identical reactive pattern but different data concern.

max_enrichment: 7.2
initial:
  api.ts: |
    export async function fetchUserData(userId: string) {
        return { id: userId, name: 'User' };
    }

    export async function fetchUserAvatar(userId: string) {
        return { userId, url: `/avatars/${userId}.png` };
    }
  UserDetails.vue: |
    <template><div>initial</div></template>
  UserList.vue: |
    <script setup lang="ts">
    import { ref } from 'vue';
    import UserDetails from './UserDetails.vue';

    const userIds = ref(['u1', 'u2', 'u3']);
    const selectedId = ref('u1');
    </script>

    <template>
        <div>
            <button v-for="id in userIds" :key="id" @click="selectedId = id">{{ id }}</button>
            <UserDetails :userId="selectedId" />
        </div>
    </template>
  user-cache.ts: |
    const cache = new Map<string, { id: string; name: string }>();

    export function getCachedUser(userId: string): { id: string; name: string } | null {
        return cache.get(userId) ?? null;
    }

    export function setCachedUser(userId: string, data: { id: string; name: string }): void {
        cache.set(userId, data);
    }
  UserAvatar.vue: |
    <script setup lang="ts">
    import { ref, watch } from 'vue';
    import { fetchUserAvatar } from './api';

    const props = defineProps<{ userId: string }>();
    const avatarUrl = ref<string | null>(null);

    watch(() => props.userId, async (newId) => {
        const result = await fetchUserAvatar(newId);
        avatarUrl.value = result.url;
    }, { immediate: true });
    </script>

    <template>
        <img v-if="avatarUrl" :src="avatarUrl" alt="avatar" />
    </template>

changed:
  api.ts: |
    export async function fetchUserData(userId: string) {
        return { id: userId, name: 'User' };
    }

    export async function fetchUserAvatar(userId: string) {
        return { userId, url: `/avatars/${userId}.png` };
    }
  UserDetails.vue: |
    <script setup lang="ts">
    import { ref, watch } from 'vue';
    import { fetchUserData } from './api';

    const props = defineProps<{ userId: string }>();
    const userData = ref<{ id: string; name: string } | null>(null);

    watch(() => props.userId, async (newId) => {
        userData.value = await fetchUserData(newId);
    }, { immediate: true });
    </script>

    <template>
        <div v-if="userData">{{ userData.name }}</div>
    </template>
  UserList.vue: |
    <script setup lang="ts">
    import { ref } from 'vue';
    import UserDetails from './UserDetails.vue';

    const userIds = ref(['u1', 'u2', 'u3']);
    const selectedId = ref('u1');
    </script>

    <template>
        <div>
            <button v-for="id in userIds" :key="id" @click="selectedId = id">{{ id }}</button>
            <UserDetails :userId="selectedId" />
        </div>
    </template>
  user-cache.ts: |
    const cache = new Map<string, { id: string; name: string }>();

    export function getCachedUser(userId: string): { id: string; name: string } | null {
        return cache.get(userId) ?? null;
    }

    export function setCachedUser(userId: string, data: { id: string; name: string }): void {
        cache.set(userId, data);
    }
  UserAvatar.vue: |
    <script setup lang="ts">
    import { ref, watch } from 'vue';
    import { fetchUserAvatar } from './api';

    const props = defineProps<{ userId: string }>();
    const avatarUrl = ref<string | null>(null);

    watch(() => props.userId, async (newId) => {
        const result = await fetchUserAvatar(newId);
        avatarUrl.value = result.url;
    }, { immediate: true });
    </script>

    <template>
        <img v-if="avatarUrl" :src="avatarUrl" alt="avatar" />
    </template>

