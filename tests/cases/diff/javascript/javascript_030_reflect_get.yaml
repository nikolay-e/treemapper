# Scenario: Reflect.get on imported class — reviewer needs the class with accessor.
#
# Diff: main.ts is rewritten to import Accessor from accessor.ts and use
# Reflect.get(obj, 'value') to dynamically access its property.
#
# Reviewer questions:
#   Q1: "Does Accessor have a 'value' property that Reflect.get can access?"
#       -> accessor.ts (UNCHANGED) defines a class with private _value and
#          get/set value accessors. Reflect.get(obj, 'value') invokes the getter.
#          The reviewer must see the class to confirm accessibility.
#
# Not needed:
#   - counter.ts: another class with a 'value' getter.
#     Lexical overlap but not imported by main.ts.
#   - metadata.ts: uses Map-based metadata store with defineMetadata/getMetadata.
#     Conceptual overlap with Reflect but entirely different mechanism.

initial:
  accessor.ts: |
    export class Accessor {
        private _value: number = 0;

        get value(): number {
            return this._value;
        }

        set value(v: number) {
            this._value = v;
        }
    }
  main.ts: |
    console.log('initial');
  counter.ts: |
    export class Counter {
        private _value: number = 0;

        increment(): void { this._value++; }
        decrement(): void { this._value--; }
        get value(): number { return this._value; }
    }
  metadata.ts: |
    const metadataStore = new Map<string, Record<string, unknown>>();

    export function defineMetadata(key: string, value: unknown, target: string): void {
        const existing = metadataStore.get(target) ?? {};
        existing[key] = value;
        metadataStore.set(target, existing);
    }

    export function getMetadata(key: string, target: string): unknown {
        return metadataStore.get(target)?.[key];
    }

changed:
  accessor.ts: |
    export class Accessor {
        private _value: number = 0;

        get value(): number {
            return this._value;
        }

        set value(v: number) {
            this._value = v;
        }
    }
  main.ts: |
    import { Accessor } from './accessor';

    function getValue(obj: Accessor) {
        return Reflect.get(obj, 'value');
    }

    const accessor = new Accessor();
    console.log(getValue(accessor));
  counter.ts: |
    export class Counter {
        private _value: number = 0;

        increment(): void { this._value++; }
        decrement(): void { this._value--; }
        get value(): number { return this._value; }
    }
  metadata.ts: |
    const metadataStore = new Map<string, Record<string, unknown>>();

    export function defineMetadata(key: string, value: unknown, target: string): void {
        const existing = metadataStore.get(target) ?? {};
        existing[key] = value;
        metadataStore.set(target, existing);
    }

    export function getMetadata(key: string, target: string): unknown {
        return metadataStore.get(target)?.[key];
    }

must_include_files:
  # Q1: accessor.ts defines the class with get/set value — confirms Reflect.get works
  - accessor.ts
must_include_content_from:
  accessor.ts:
    - "class Accessor {"
    - "get value(): number {"
must_not_include:
  # counter.ts: different class with 'value' property, not imported
  - Counter
  - increment
  - decrement
  # metadata.ts: Map-based metadata, different Reflect-like mechanism
  - defineMetadata
  - getMetadata
  - metadataStore
must_not_include_files:
  - counter.ts
  - metadata.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
