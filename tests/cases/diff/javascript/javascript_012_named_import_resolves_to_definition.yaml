must_include_files:
  - main.ts
  # Q1+Q2: fetchUser implementation defines return shape and error behavior
  - utils.ts

must_include_content_from:
  main.ts:
    - "import { fetchUser } from './utils'"
    - "await fetchUser('123')"
  utils.ts:
    - "export function fetchUser(id: string)"
    - "fetch(`/api/users/${id}`)"

must_not_include:
  # --- user-cache.ts: wraps fetchUser with caching ---
  # DIRECT EDGE: imports fetchUser, calls it. But caching logic
  # doesn't help review main.ts's usage.
  - getCachedUser
  - invalidateUserCache
  - clearAllCache
  # --- utils.test.ts: tests fetchUser with mocks ---
  # DIRECT EDGE: imports and calls fetchUser. But mock setup
  # doesn't help review the actual implementation.
  - "describe('fetchUser'"
  - "jest.Mock"
  - mockResolvedValue

must_not_include_files:
  - user-cache.ts
  - utils.test.ts

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
