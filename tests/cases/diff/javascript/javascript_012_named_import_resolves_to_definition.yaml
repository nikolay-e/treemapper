initial:
  utils.ts: |
    export function fetchUser(id: string): Promise<User> {
        return fetch(`/api/users/${id}`).then(res => res.json());
    }

    export function fetchPosts(userId: string): Promise<Post[]> {
        return fetch(`/api/users/${userId}/posts`).then(res => res.json());
    }
  main.ts: |
    console.log('initial');
  garbage_telemetry.ts: |
    const GARBAGE_JS_012_SPAN_MARKER_A = "telemetry";
    const GARBAGE_JS_012_EXPORT_MARKER_B = true;

    class SpanExporter {
        static GARBAGE_JS_012_EXPORTER_CLASS_C = "exporter";

        export(spans: string[]): void {
            // noop
        }
    }
  garbage_retry.ts: |
    const GARBAGE_JS_012_BACKOFF_MARKER_D = "retry";
    const GARBAGE_JS_012_DELAY_MARKER_E = 42;

    class ExponentialBackoff {
        static GARBAGE_JS_012_BACKOFF_CLASS_F = true;

        retry(fn: () => void, attempts: number): void {
            fn();
        }
    }
