# Scenario: main.ts is rewritten to import fetchUser from utils.ts and call
#   it. Only main.ts is changed.
#
# Diff shows:
#   - console.log('initial');
#   + import { fetchUser } from './utils';
#   + async function main() { const user = await fetchUser('123'); ... }
#
# Reviewer questions:
#   Q1: "What does fetchUser return — what is the user object shape?"
#       -> utils.ts (UNCHANGED) fetches /api/users/:id and returns parsed JSON.
#          Reviewer needs the function body to understand the return type.
#
#   Q2: "Does fetchUser handle errors or could it throw?"
#       -> Same file: no try/catch, uses .then(). fetch() can throw on
#          network errors. Reviewer needs the body to assess error handling.
#
# Not needed for comprehension:
#   - user-cache.ts: Caches fetchUser results. DIRECT EDGE: imports fetchUser
#     from utils.ts and wraps it. But caching logic doesn't help review
#     main.ts's usage of fetchUser.
#
#   - utils.test.ts: Tests for fetchUser. DIRECT EDGE: imports and calls
#     fetchUser with mock responses. But test mocking doesn't help review
#     the actual function implementation.

initial:
  utils.ts: |
    export function fetchUser(id: string): Promise<User> {
        return fetch(`/api/users/${id}`).then(res => res.json());
    }

    export function fetchPosts(userId: string): Promise<Post[]> {
        return fetch(`/api/users/${userId}/posts`).then(res => res.json());
    }
  main.ts: |
    console.log('initial');
  user-cache.ts: |
    import { fetchUser } from './utils';

    const cache = new Map<string, { data: unknown; timestamp: number }>();
    const TTL = 60_000;

    export async function getCachedUser(id: string): Promise<unknown> {
        const cached = cache.get(id);
        if (cached && Date.now() - cached.timestamp < TTL) {
            return cached.data;
        }
        const user = await fetchUser(id);
        cache.set(id, { data: user, timestamp: Date.now() });
        return user;
    }

    export function invalidateUserCache(id: string): void {
        cache.delete(id);
    }

    export function clearAllCache(): void {
        cache.clear();
    }
  utils.test.ts: |
    import { fetchUser, fetchPosts } from './utils';

    global.fetch = jest.fn();

    describe('fetchUser', () => {
        it('should fetch user by id', async () => {
            (fetch as jest.Mock).mockResolvedValue({
                json: () => Promise.resolve({ id: '123', name: 'Alice' }),
            });
            const user = await fetchUser('123');
            expect(fetch).toHaveBeenCalledWith('/api/users/123');
            expect(user.name).toBe('Alice');
        });
    });

    describe('fetchPosts', () => {
        it('should fetch posts for user', async () => {
            (fetch as jest.Mock).mockResolvedValue({
                json: () => Promise.resolve([{ id: '1', title: 'Post 1' }]),
            });
            const posts = await fetchPosts('123');
            expect(posts).toHaveLength(1);
        });
    });

