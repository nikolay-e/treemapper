# Scenario: main.ts is rewritten to create a Worker from worker.ts and set up
# message passing with postMessage/onmessage.
#
# Diff: main.ts creates `new Worker('./worker.ts')`, sets onmessage handler,
# and posts the value 21.
#
# Reviewer questions:
#   Q1: "What does the worker do with the posted message?"
#       -> worker.ts (UNCHANGED) multiplies e.data by 2 and posts back.
#          The reviewer needs this to verify main.ts posts 21 and expects 42 back.
#
# Not needed:
#   - shared-worker.ts: SharedWorker for multi-tab communication. Different worker type
#     with port-based API (port.onmessage). Not referenced by main.ts.
#   - thread-pool.ts: manages a pool of workers for batch processing. Higher-level
#     abstraction over Worker, not instantiated by main.ts.

initial:
  worker.ts: |
    self.onmessage = function(e: MessageEvent) {
        const result = e.data * 2;
        self.postMessage(result);
    };
  main.ts: |
    console.log('initial');
  shared-worker.ts: |
    const connections: MessagePort[] = [];

    self.onconnect = function(e: MessageEvent) {
        const port = (e as any).ports[0];
        connections.push(port);
        port.onmessage = function(msg: MessageEvent) {
            connections.forEach(p => p.postMessage(msg.data));
        };
    };
  thread-pool.ts: |
    export class WorkerPool {
        private workers: Worker[] = [];
        private taskQueue: Array<{ data: unknown; resolve: (v: unknown) => void }> = [];

        constructor(private size: number, private workerPath: string) {
            for (let i = 0; i < size; i++) {
                this.workers.push(new Worker(workerPath));
            }
        }

        execute(data: unknown): Promise<unknown> {
            return new Promise(resolve => {
                this.taskQueue.push({ data, resolve });
            });
        }
    }
changed:
  worker.ts: |
    self.onmessage = function(e: MessageEvent) {
        const result = e.data * 2;
        self.postMessage(result);
    };
  main.ts: |
    const worker = new Worker('./worker.ts');

    worker.onmessage = function(e: MessageEvent) {
        console.log('Result:', e.data);
    };

    worker.postMessage(21);
  shared-worker.ts: |
    const connections: MessagePort[] = [];

    self.onconnect = function(e: MessageEvent) {
        const port = (e as any).ports[0];
        connections.push(port);
        port.onmessage = function(msg: MessageEvent) {
            connections.forEach(p => p.postMessage(msg.data));
        };
    };
  thread-pool.ts: |
    export class WorkerPool {
        private workers: Worker[] = [];
        private taskQueue: Array<{ data: unknown; resolve: (v: unknown) => void }> = [];

        constructor(private size: number, private workerPath: string) {
            for (let i = 0; i < size; i++) {
                this.workers.push(new Worker(workerPath));
            }
        }

        execute(data: unknown): Promise<unknown> {
            return new Promise(resolve => {
                this.taskQueue.push({ data, resolve });
            });
        }
    }
must_include_files:
  # Q1: worker.ts defines the message handler that main.ts communicates with
  - worker.ts
must_include_content_from:
  worker.ts:
    - "self.onmessage"
    - "e.data * 2"
must_not_include:
  # shared-worker.ts: SharedWorker with port-based API, different worker type
  - onconnect
  - connections
  # thread-pool.ts: pool management abstraction, not used by main.ts
  - WorkerPool
  - taskQueue
must_not_include_files:
  - shared-worker.ts
  - thread-pool.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
