      export function getRegistrationData() {
          return { name: 'Test User', email: 'test@example.com', password: 'newpass123' };  // pragma: allowlist secret
      }
    test-helpers.ts: |
      import { Page } from '@playwright/test';

      export async function waitForPageLoad(page: Page): Promise<void> {
          await page.waitForLoadState('networkidle');
      }

      export async function clearCookies(page: Page): Promise<void> {
          await page.context().clearCookies();
      }
  changed_files:
    login.ts: |
      export function getLoginUrl(): string {
          return '/login';
      }

      export function getCredentials() {
          return { username: 'test', password: 'test123' };  // pragma: allowlist secret
      }
    login.spec.ts: |
      import { test, expect } from '@playwright/test';
      import { getLoginUrl, getCredentials } from './login';

      test('user can log in', async ({ page }) => {
          await page.goto(getLoginUrl());
          const { username, password } = getCredentials();
          await page.fill('[name=username]', username);
          await page.fill('[name=password]', password);
          await page.click('button[type=submit]');
          await expect(page).toHaveURL('/dashboard');
      });
    registration.ts: |
      export function getRegistrationUrl(): string {
          return '/register';
      }

      export function getRegistrationData() {
          return { name: 'Test User', email: 'test@example.com', password: 'newpass123' };  // pragma: allowlist secret
      }
    test-helpers.ts: |
      import { Page } from '@playwright/test';

      export async function waitForPageLoad(page: Page): Promise<void> {
          await page.waitForLoadState('networkidle');
      }

      export async function clearCookies(page: Page): Promise<void> {
          await page.context().clearCookies();
      }
  commit_message: Update files
