# Scenario: login.spec.ts is written from scratch as a Playwright test importing
# test data helpers from login.ts.
#
# Diff: login.spec.ts adds `import { getLoginUrl, getCredentials } from './login'`
# and implements a login test that fills username/password fields and submits.
#
# Reviewer questions:
#   Q1: "What URL and credentials does the test use?"
#       -> login.ts (UNCHANGED) defines getLoginUrl returning '/login' and
#          getCredentials returning { username: 'test', password: 'test123' }.
#          Reviewer verifies the test fills the correct form fields.
#
# Not needed:
#   - registration.ts: registration page helpers (getRegistrationUrl, getRegistrationData).
#     Same page-object pattern but for the registration flow, not login.
#   - test-helpers.ts: generic test utilities (waitForPageLoad, clearCookies).
#     Test infrastructure, not specific to login flow.

initial:
  login.ts: |
    export function getLoginUrl(): string {
        return '/login';
    }

    export function getCredentials() {
        return { username: 'test', password: 'test123' };  // pragma: allowlist secret
    }
  login.spec.ts: |
    console.log('initial');
  registration.ts: |
    export function getRegistrationUrl(): string {
        return '/register';
    }

    export function getRegistrationData() {
        return { name: 'Test User', email: 'test@example.com', password: 'newpass123' };  // pragma: allowlist secret
    }
  test-helpers.ts: |
    import { Page } from '@playwright/test';

    export async function waitForPageLoad(page: Page): Promise<void> {
        await page.waitForLoadState('networkidle');
    }

    export async function clearCookies(page: Page): Promise<void> {
        await page.context().clearCookies();
    }
changed:
  login.ts: |
    export function getLoginUrl(): string {
        return '/login';
    }

    export function getCredentials() {
        return { username: 'test', password: 'test123' };  // pragma: allowlist secret
    }
  login.spec.ts: |
    import { test, expect } from '@playwright/test';
    import { getLoginUrl, getCredentials } from './login';

    test('user can log in', async ({ page }) => {
        await page.goto(getLoginUrl());
        const { username, password } = getCredentials();
        await page.fill('[name=username]', username);
        await page.fill('[name=password]', password);
        await page.click('button[type=submit]');
        await expect(page).toHaveURL('/dashboard');
    });
  registration.ts: |
    export function getRegistrationUrl(): string {
        return '/register';
    }

    export function getRegistrationData() {
        return { name: 'Test User', email: 'test@example.com', password: 'newpass123' };  // pragma: allowlist secret
    }
  test-helpers.ts: |
    import { Page } from '@playwright/test';

    export async function waitForPageLoad(page: Page): Promise<void> {
        await page.waitForLoadState('networkidle');
    }

    export async function clearCookies(page: Page): Promise<void> {
        await page.context().clearCookies();
    }
must_include_files:
  # Q1: login.ts defines the URL and credentials that the test imports
  - login.ts
must_include_content_from:
  login.ts:
    - "getLoginUrl()"
    - "getCredentials()"
must_not_include:
  # registration.ts: registration flow helpers, not login
  - getRegistrationUrl
  - getRegistrationData
  - /register
  # test-helpers.ts: generic test utilities, not specific to login test
  - waitForPageLoad
  - clearCookies
must_not_include_files:
  - registration.ts
  - test-helpers.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
