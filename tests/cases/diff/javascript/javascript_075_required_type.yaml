# Scenario: validator.ts is rewritten from a stub to import Options from options.ts
#   and use Required<Options> to create a StrictOptions type for validation.
#   Only validator.ts is changed; options.ts is unchanged.
#
# Diff shows:
#   - console.log('initial')
#   + import { Options } from './options'
#   + type StrictOptions = Required<Options>
#   + function validate(options: StrictOptions) accesses name.length, value >= 0
#
# Reviewer questions:
#   Q1: "What fields does Options have — which become required?"
#       -> options.ts: Options has name?: string, value?: number, enabled?: boolean.
#          All three are optional. Required<Options> makes all mandatory.
#
#   Q2: "Does validate safely access fields that are now guaranteed present?"
#       -> options.ts: After Required<Options>, name is string (not undefined),
#          value is number, enabled is boolean. validate accesses name.length,
#          value >= 0, typeof enabled === 'boolean' — all safe because
#          Required removes the optional modifiers.
#
# Not needed for comprehension:
#   - options-defaults.ts: Provides default values for Options fields.
#     Same Options type, same field names. HARD TRAP: references the exact
#     same optional fields. But default-filling is a different concern than
#     type-level required enforcement.
#
#   - options-merger.ts: Merges partial Options with existing values using
#     spread. Same Options type with Partial usage. HARD TRAP: complementary
#     utility type usage (Partial vs Required).
#
#   - config-validator.ts: Validates a different Config interface with
#     similar validation logic (length checks, numeric bounds). Same
#     validation pattern but different type.

initial:
  options.ts: |
    export interface Options {
        name?: string;
        value?: number;
        enabled?: boolean;
    }
  validator.ts: |
    console.log('initial');
  options-defaults.ts: |
    import { Options } from './options';

    export const DEFAULT_OPTIONS: Required<Options> = {
        name: 'default',
        value: 0,
        enabled: true,
    };

    export function applyDefaults(partial: Options): Required<Options> {
        return { ...DEFAULT_OPTIONS, ...partial };
    }
  options-merger.ts: |
    import { Options } from './options';

    export function mergeOptions(base: Options, overrides: Partial<Options>): Options {
        return { ...base, ...overrides };
    }

    export function hasAllFields(options: Options): boolean {
        return options.name !== undefined && options.value !== undefined && options.enabled !== undefined;
    }
  config-validator.ts: |
    interface Config {
        host: string;
        port: number;
        ssl: boolean;
    }

    export function validateConfig(config: Config): { valid: boolean; errors: string[] } {
        const errors: string[] = [];
        if (!config.host || config.host.length < 1) errors.push('host required');
        if (config.port < 1 || config.port > 65535) errors.push('invalid port');
        return { valid: errors.length === 0, errors };
    }

changed:
  options.ts: |
    export interface Options {
        name?: string;
        value?: number;
        enabled?: boolean;
    }
  validator.ts: |
    import { Options } from './options';

    type StrictOptions = Required<Options>;

    function validate(options: StrictOptions): boolean {
        return options.name.length > 0 && options.value >= 0 && typeof options.enabled === 'boolean';
    }
  options-defaults.ts: |
    import { Options } from './options';

    export const DEFAULT_OPTIONS: Required<Options> = {
        name: 'default',
        value: 0,
        enabled: true,
    };

    export function applyDefaults(partial: Options): Required<Options> {
        return { ...DEFAULT_OPTIONS, ...partial };
    }
  options-merger.ts: |
    import { Options } from './options';

    export function mergeOptions(base: Options, overrides: Partial<Options>): Options {
        return { ...base, ...overrides };
    }

    export function hasAllFields(options: Options): boolean {
        return options.name !== undefined && options.value !== undefined && options.enabled !== undefined;
    }
  config-validator.ts: |
    interface Config {
        host: string;
        port: number;
        ssl: boolean;
    }

    export function validateConfig(config: Config): { valid: boolean; errors: string[] } {
        const errors: string[] = [];
        if (!config.host || config.host.length < 1) errors.push('host required');
        if (config.port < 1 || config.port > 65535) errors.push('invalid port');
        return { valid: errors.length === 0, errors };
    }

must_include_files:
  - validator.ts
  # Q1+Q2: options.ts defines Options — reviewer needs to see the optional
  # fields to understand what Required<Options> resolves to.
  - options.ts

must_include_content_from:
  validator.ts:
    - "import { Options } from './options'"
    - "type StrictOptions = Required<Options>"
    - "options.name.length > 0"
  options.ts:
    - "interface Options {"
    - "name?: string"
    - "value?: number"
    - "enabled?: boolean"

must_not_include:
  # --- options-defaults.ts: also uses Required<Options> ---
  # HARD TRAP: same Required<Options> utility type, same import. But
  # provides default values, a different concern than validation.
  - DEFAULT_OPTIONS
  - applyDefaults
  # --- options-merger.ts: merges Options with Partial ---
  # HARD TRAP: complementary utility type (Partial vs Required).
  - mergeOptions
  - hasAllFields
  # --- config-validator.ts: validates different Config type ---
  # Same validation logic pattern (length checks, bounds) but
  # different type entirely.
  - validateConfig
  - "host required"
  - "invalid port"

must_not_include_files:
  - options-defaults.ts
  - options-merger.ts
  - config-validator.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
