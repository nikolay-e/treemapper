must_include_files:
  - main.ts
  # Q1+Q2: NumberRange implements Symbol.iterator, needed to verify Array.from works
  - iterator.ts

must_include_content_from:
  main.ts:
    - "import { NumberRange } from './iterator'"
    - "Array.from(range)"
  iterator.ts:
    - "class NumberRange"
    - "*[Symbol.iterator]()"
    - "yield i"

must_not_include:
  # --- collection-utils.ts: uses Array.from but on arrays, not NumberRange ---
  # KEYWORD OVERLAP: Array.from appears multiple times. But these utilities
  # are not imported by main.ts and work on different data types.
  - chunk
  - flatten
  - unique
  # --- lazy-sequence.ts: another Symbol.iterator class ---
  # STRUCTURAL TRAP: same iterable pattern as NumberRange.
  # But not imported by main.ts.
  - LazySequence
  - "this.transforms"

must_not_include_files:
  - collection-utils.ts
  - lazy-sequence.ts

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
