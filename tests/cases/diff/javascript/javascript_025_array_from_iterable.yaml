  lazy-sequence.ts: |
    export class LazySequence<T> {
        private transforms: ((value: any) => any)[] = [];

        constructor(private source: Iterable<T>) {}

        map<R>(fn: (value: T) => R): LazySequence<R> {
            this.transforms.push(fn);
            return this as unknown as LazySequence<R>;
        }

        filter(predicate: (value: T) => boolean): LazySequence<T> {
            this.transforms.push((v) => predicate(v) ? v : undefined);
            return this;
        }

        *[Symbol.iterator]() {
            for (const value of this.source) {
                let result: any = value;
                for (const transform of this.transforms) {
