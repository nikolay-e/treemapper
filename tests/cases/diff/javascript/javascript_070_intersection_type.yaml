name: javascript_070_intersection_type
repo:
  initial_files:
    types.ts: |
      export type Named = { name: string };
      export type Aged = { age: number };
    person.ts: |
      console.log('initial');
    employee.ts: |
      import { Named, Aged } from './types';

      type Employee = Named & Aged & { role: string; department: string };

      export function createEmployee(name: string, age: number, role: string, department: string): Employee {
          return { name, age, role, department };
      }
    person-service.ts: |
      import { Named, Aged } from './types';

      type Person = Named & Aged;

      const people: Person[] = [];

      export function addPerson(name: string, age: number): Person {
          const person: Person = { name, age };
          people.push(person);
          return person;
      }

      export function findByName(name: string): Person | undefined {
          return people.find(p => p.name === name);
      }
    type-guards.ts: |
      import { Named, Aged } from './types';

      export function isNamed(value: unknown): value is Named {
          return typeof value === 'object' && value !== null && 'name' in value;
      }

      export function isAged(value: unknown): value is Aged {
          return typeof value === 'object' && value !== null && 'age' in value;
      }
  changed_files:
    types.ts: |
      export type Named = { name: string };
      export type Aged = { age: number };
    person.ts: |
      import { Named, Aged } from './types';

      type Person = Named & Aged;

      function createPerson(name: string, age: number): Person {
          return { name, age };
      }
    employee.ts: |
      import { Named, Aged } from './types';

      type Employee = Named & Aged & { role: string; department: string };

      export function createEmployee(name: string, age: number, role: string, department: string): Employee {
          return { name, age, role, department };
      }
    person-service.ts: |
      import { Named, Aged } from './types';

      type Person = Named & Aged;

      const people: Person[] = [];

      export function addPerson(name: string, age: number): Person {
          const person: Person = { name, age };
          people.push(person);
          return person;
      }

      export function findByName(name: string): Person | undefined {
          return people.find(p => p.name === name);
      }
    type-guards.ts: |
      import { Named, Aged } from './types';

      export function isNamed(value: unknown): value is Named {
          return typeof value === 'object' && value !== null && 'name' in value;
      }

      export function isAged(value: unknown): value is Aged {
          return typeof value === 'object' && value !== null && 'age' in value;
      }
  commit_message: Update files
