# Scenario: Cypress test imports selector constants for cy.get() calls.
#
# Diff: form.cy.ts is written from scratch importing FORM_SELECTORS from form.ts
# and using them in cy.get(FORM_SELECTORS.nameInput), etc.
#
# Reviewer questions:
#   Q1: "What data-testid values do these selectors map to?"
#       -> form.ts (UNCHANGED) exports FORM_SELECTORS with nameInput,
#          emailInput, submitButton mapped to data-testid attributes.
#          The reviewer must verify the selectors match actual DOM elements.
#
# Not needed:
#   - form.validators.ts: validates form input values (email format, name length).
#     The Cypress test fills inputs and clicks submit — doesn't call validators.
#   - api-client.ts: HTTP client for submitting form data to backend.
#     The Cypress test checks UI behavior, not API implementation.

max_enrichment: 5.9
initial:
  form.ts: |
    export const FORM_SELECTORS = {
        nameInput: '[data-testid=name-input]',
        emailInput: '[data-testid=email-input]',
        submitButton: '[data-testid=submit-btn]',
    };
  form.cy.ts: |
    console.log('initial');
  form.validators.ts: |
    export function isValidEmail(email: string): boolean {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    export function isValidName(name: string): boolean {
        return name.trim().length >= 2;
    }
  api-client.ts: |
    export async function submitForm(data: { name: string; email: string }) {
        const response = await fetch('/api/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        });
        return response.json();
    }

changed:
  form.ts: |
    export const FORM_SELECTORS = {
        nameInput: '[data-testid=name-input]',
        emailInput: '[data-testid=email-input]',
        submitButton: '[data-testid=submit-btn]',
    };
  form.cy.ts: |
    import { FORM_SELECTORS } from './form';

    describe('Contact Form', () => {
        it('should submit form', () => {
            cy.visit('/contact');
            cy.get(FORM_SELECTORS.nameInput).type('John Doe');
            cy.get(FORM_SELECTORS.emailInput).type('john@example.com');
            cy.get(FORM_SELECTORS.submitButton).click();
            cy.contains('Thank you').should('be.visible');
        });
    });
  form.validators.ts: |
    export function isValidEmail(email: string): boolean {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    export function isValidName(name: string): boolean {
        return name.trim().length >= 2;
    }
  api-client.ts: |
    export async function submitForm(data: { name: string; email: string }) {
        const response = await fetch('/api/contact', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data),
        });
        return response.json();
    }

must_include_files:
  # Q1: form.ts defines the selectors used by cy.get() calls
  - form.ts
must_include_content_from:
  form.ts:
    - "FORM_SELECTORS"
    - "data-testid=name-input"
    - "data-testid=submit-btn"
must_not_include:
  # form.validators.ts: validation logic not invoked by Cypress test
  - isValidEmail
  - isValidName
  # api-client.ts: backend submission, Cypress tests UI not API
  - submitForm
must_not_include_files:
  - form.validators.ts
  - api-client.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
