# Scenario: main.ts is rewritten to import fetchResponse from api.ts and use
#   optional chaining (response?.data?.user?.name). Only main.ts is changed.
#
# Diff shows:
#   - console.log('initial');
#   + import { fetchResponse } from './api';
#   + function getName() { ... return response?.data?.user?.name ?? 'Unknown'; }
#
# Reviewer questions:
#   Q1: "Does Response have data?.user?.name — do the optional chains match?"
#       -> api.ts (UNCHANGED) defines Response with data?: { user?: { name?: string } }.
#          All three levels are optional. Reviewer must verify chain matches structure.
#
#   Q2: "What does fetchResponse actually return — could it be null?"
#       -> Same file: returns { data: { user: { name: 'Test' } } }.
#          Reviewer needs the function to understand typical return values.
#
# Not needed for comprehension:
#   - response-validator.ts: Validates Response objects using type guards.
#     DIRECT TYPE OVERLAP: works with the same Response interface.
#     But validation logic doesn't help review optional chaining correctness.
#
#   - api.test.ts: Tests for fetchResponse(). Imports fetchResponse and Response.
#     DIRECT EDGE: exercises the same function. But test expectations don't
#     help verify the optional chain structure.

max_enrichment: 5.3
initial:
  api.ts: |
    export interface Response {
        data?: {
            user?: {
                name?: string;
            };
        };
    }

    export function fetchResponse(): Response {
        return { data: { user: { name: 'Test' } } };
    }
  main.ts: |
    console.log('initial');
  response-validator.ts: |
    import { Response } from './api';

    export function isValidResponse(response: Response): boolean {
        return response.data !== undefined
            && response.data.user !== undefined
            && response.data.user.name !== undefined;
    }

    export function assertResponse(response: Response): asserts response is Required<Response> {
        if (!isValidResponse(response)) {
            throw new Error('Invalid response: missing required fields');
        }
    }

    export function getNameOrThrow(response: Response): string {
        if (!response.data?.user?.name) {
            throw new Error('Name not found in response');
        }
        return response.data.user.name;
    }
  api.test.ts: |
    import { fetchResponse, Response } from './api';

    describe('fetchResponse', () => {
        it('should return response with user name', () => {
            const response = fetchResponse();
            expect(response.data?.user?.name).toBe('Test');
        });

        it('should have correct structure', () => {
            const response = fetchResponse();
            expect(response).toHaveProperty('data');
            expect(response.data).toHaveProperty('user');
        });
    });

changed:
  api.ts: |
    export interface Response {
        data?: {
            user?: {
                name?: string;
            };
        };
    }

    export function fetchResponse(): Response {
        return { data: { user: { name: 'Test' } } };
    }
  main.ts: |
    import { fetchResponse } from './api';

    function getName() {
        const response = fetchResponse();
        return response?.data?.user?.name ?? 'Unknown';
    }

    console.log(getName());
  response-validator.ts: |
    import { Response } from './api';

    export function isValidResponse(response: Response): boolean {
        return response.data !== undefined
            && response.data.user !== undefined
            && response.data.user.name !== undefined;
    }

    export function assertResponse(response: Response): asserts response is Required<Response> {
        if (!isValidResponse(response)) {
            throw new Error('Invalid response: missing required fields');
        }
    }

    export function getNameOrThrow(response: Response): string {
        if (!response.data?.user?.name) {
            throw new Error('Name not found in response');
        }
        return response.data.user.name;
    }
  api.test.ts: |
    import { fetchResponse, Response } from './api';

    describe('fetchResponse', () => {
        it('should return response with user name', () => {
            const response = fetchResponse();
            expect(response.data?.user?.name).toBe('Test');
