    });

must_include_files:
  - main.ts
  # Q1+Q2: Response interface and fetchResponse define what optional chains access
  - api.ts

must_include_content_from:
  main.ts:
    - "import { fetchResponse } from './api'"
    - "response?.data?.user?.name"
  api.ts:
    - "interface Response"
    - "data?:"
    - "user?:"
    - "name?: string"
    - "fetchResponse(): Response"

must_not_include:
  # --- response-validator.ts: validates Response objects ---
  # DIRECT TYPE OVERLAP: works with same Response interface, even uses
  # optional chaining on the same fields. But validation doesn't help
  # review main.ts's optional chain correctness.
  - isValidResponse
  - assertResponse
  - getNameOrThrow
  # --- api.test.ts: tests fetchResponse ---
  # DIRECT EDGE: calls fetchResponse, accesses data?.user?.name.
  # But test expectations don't help verify chain structure.
  - "describe('fetchResponse'"
  - toHaveProperty

must_not_include_files:
  - response-validator.ts
  - api.test.ts

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
