# Scenario: Counter.tsx is rewritten to use useReducer with counterReducer and
# State type imported from reducer.ts.
#
# Diff: Counter.tsx adds `import { counterReducer, State } from './reducer'`,
# initializes state with useReducer, and dispatches { type: 'increment' }.
#
# Reviewer questions:
#   Q1: "What actions does the reducer support?"
#       -> reducer.ts (UNCHANGED) handles 'increment', 'decrement', 'reset'.
#          The component dispatches { type: 'increment' } — reviewer verifies
#          it's a valid action type.
#   Q2: "What is the State type?"
#       -> reducer.ts: State = { count: number }. Component reads state.count
#          — reviewer confirms the shape matches.
#
# Not needed:
#   - actions.ts: action creator functions (increment(), decrement(), reset()).
#     The component dispatches raw action objects, doesn't use action creators.
#   - CounterDisplay.tsx: presentation component for counter value.
#     Child component not used in this change.

max_enrichment: 6.5
initial:
  reducer.ts: |
    export type State = { count: number };
    export type Action = { type: 'increment' } | { type: 'decrement' } | { type: 'reset' };

    export function counterReducer(state: State, action: Action): State {
        switch (action.type) {
            case 'increment': return { count: state.count + 1 };
            case 'decrement': return { count: state.count - 1 };
            case 'reset': return { count: 0 };
        }
    }
  Counter.tsx: |
    console.log('initial');
  actions.ts: |
    export const increment = () => ({ type: 'increment' as const });
    export const decrement = () => ({ type: 'decrement' as const });
    export const reset = () => ({ type: 'reset' as const });
  CounterDisplay.tsx: |
    interface CounterDisplayProps {
        value: number;
    }

    export function CounterDisplay({ value }: CounterDisplayProps) {
        return <span className="counter-value">{value}</span>;
    }
changed:
  reducer.ts: |
    export type State = { count: number };
    export type Action = { type: 'increment' } | { type: 'decrement' } | { type: 'reset' };

    export function counterReducer(state: State, action: Action): State {
        switch (action.type) {
            case 'increment': return { count: state.count + 1 };
            case 'decrement': return { count: state.count - 1 };
            case 'reset': return { count: 0 };
        }
    }
  Counter.tsx: |
    import { useReducer } from 'react';
    import { counterReducer, State } from './reducer';

    const initialState: State = { count: 0 };

    export function Counter() {
        const [state, dispatch] = useReducer(counterReducer, initialState);
        return (
            <div>
                <span>{state.count}</span>
                <button onClick={() => dispatch({ type: 'increment' })}>+</button>
            </div>
        );
    }
  actions.ts: |
    export const increment = () => ({ type: 'increment' as const });
    export const decrement = () => ({ type: 'decrement' as const });
    export const reset = () => ({ type: 'reset' as const });
  CounterDisplay.tsx: |
    interface CounterDisplayProps {
        value: number;
    }

    export function CounterDisplay({ value }: CounterDisplayProps) {
        return <span className="counter-value">{value}</span>;
    }
must_include_files:
  # Q1/Q2: reducer.ts defines the reducer and State type that Counter.tsx imports
  - reducer.ts
must_include_content_from:
  reducer.ts:
    - "type State = { count: number }"
    - "function counterReducer(state: State, action: Action): State"
    - "case 'increment'"
must_not_include:
  # actions.ts: action creators not used (component dispatches raw objects)
  - increment = ()
  - decrement = ()
  - reset = ()
  # CounterDisplay.tsx: presentation child, not used in this change
  - CounterDisplayProps
  - counter-value
must_not_include_files:
  - actions.ts
  - CounterDisplay.tsx
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
