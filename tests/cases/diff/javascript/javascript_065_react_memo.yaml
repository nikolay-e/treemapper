must_include_files:
  # Unchanged file — the import target. Reviewer needs to see the
  # memo wrapper and Item type to evaluate render optimization.
  - src/ExpensiveList.tsx
must_include_content_from:
  src/ExpensiveList.tsx:
    - "memo(ExpensiveListComponent)"
    - "ExpensiveListProps"
must_not_include:
  # Sidebar.tsx: sibling component not used by Dashboard
  - SidebarProps
  - collapsed
  # list-utils.ts: list utilities not imported
  - groupBy
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
