# Scenario: types.ts is changed to add disabled? and variant? to ButtonProps.
#   Button.tsx imports ButtonProps from types.ts. Only types.ts is changed;
#   Button.tsx is unchanged.
#
# Diff shows:
#   - ButtonProps { label: string; onClick: () => void; }
#   + ButtonProps { label: string; onClick: () => void; disabled?: boolean;
#     variant?: 'primary' | 'secondary'; }
#
# Reviewer questions:
#   Q1: "Does Button.tsx use the new props — or are they ignored?"
#       -> Button.tsx (UNCHANGED): destructures only { label, onClick }.
#          The new disabled and variant props are not destructured or used.
#          This is a review finding — the props were added but the component
#          doesn't consume them yet.
#
#   Q2: "Is ButtonProps the correct type — does Button already import it?"
#       -> Button.tsx: imports ButtonProps from './types' and uses it in the
#          function signature. The import is already there, so the new fields
#          are available but not destructured.
#
# Not needed for comprehension:
#   - IconButton.tsx: Variant of Button that extends ButtonProps with icon.
#     Direct type edge — imports ButtonProps from types.ts. HARD TRAP: same
#     import, same type, adds its own extension. But how IconButton uses
#     ButtonProps doesn't help review the type change itself.
#
#   - button-styles.ts: Style map with 'primary'/'secondary' variants.
#     Same variant names as the new prop. HARD TRAP: references the exact
#     same variant strings. But styling logic is a separate concern.
#
#   - form-types.ts: Separate form field type definitions with similar
#     optional props (disabled?, required?). Same React form domain.

max_enrichment: 14.5
initial:
  types.ts: |
    export interface ButtonProps {
        label: string;
        onClick: () => void;
    }
  Button.tsx: |
    import { ButtonProps } from './types';

    export function Button({ label, onClick }: ButtonProps) {
        return <button onClick={onClick}>{label}</button>;
    }
  IconButton.tsx: |
    import { ButtonProps } from './types';

    interface IconButtonProps extends ButtonProps {
        icon: string;
    }

    export function IconButton({ label, onClick, icon }: IconButtonProps) {
        return <button onClick={onClick}><span>{icon}</span> {label}</button>;
    }
  button-styles.ts: |
    export const buttonVariants = {
        primary: { backgroundColor: '#007bff', color: 'white' },
        secondary: { backgroundColor: '#6c757d', color: 'white' },
        danger: { backgroundColor: '#dc3545', color: 'white' },
    };

    export function getButtonClass(variant: string, disabled: boolean): string {
        return `btn-${variant}${disabled ? ' btn-disabled' : ''}`;
    }
  form-types.ts: |
    export interface InputProps {
        name: string;
        value: string;
        onChange: (value: string) => void;
        disabled?: boolean;
        required?: boolean;
        placeholder?: string;
    }

    export interface SelectProps {
        name: string;
        options: { value: string; label: string }[];
        onChange: (value: string) => void;
        disabled?: boolean;
    }

changed:
  types.ts: |
    export interface ButtonProps {
        label: string;
        onClick: () => void;
        disabled?: boolean;
        variant?: 'primary' | 'secondary';
    }
  Button.tsx: |
    import { ButtonProps } from './types';

    export function Button({ label, onClick }: ButtonProps) {
        return <button onClick={onClick}>{label}</button>;
    }
  IconButton.tsx: |
    import { ButtonProps } from './types';

    interface IconButtonProps extends ButtonProps {
        icon: string;
    }

    export function IconButton({ label, onClick, icon }: IconButtonProps) {
        return <button onClick={onClick}><span>{icon}</span> {label}</button>;
    }
  button-styles.ts: |
    export const buttonVariants = {
        primary: { backgroundColor: '#007bff', color: 'white' },
        secondary: { backgroundColor: '#6c757d', color: 'white' },
        danger: { backgroundColor: '#dc3545', color: 'white' },
    };

    export function getButtonClass(variant: string, disabled: boolean): string {
        return `btn-${variant}${disabled ? ' btn-disabled' : ''}`;
    }
  form-types.ts: |
    export interface InputProps {
        name: string;
        value: string;
        onChange: (value: string) => void;
        disabled?: boolean;
        required?: boolean;
        placeholder?: string;
    }

    export interface SelectProps {
        name: string;
        options: { value: string; label: string }[];
        onChange: (value: string) => void;
        disabled?: boolean;
    }

must_include_files:
  - types.ts
  # Q1+Q2: Button.tsx imports ButtonProps — reviewer needs to see that the
  # component doesn't destructure the new disabled/variant props yet.
  - Button.tsx

must_include_content_from:
  types.ts:
    - "interface ButtonProps {"
    - "disabled?: boolean"
    - "variant?: 'primary' | 'secondary'"
  Button.tsx:
    - "import { ButtonProps } from './types'"
    - "{ label, onClick }: ButtonProps"

must_not_include:
  # --- IconButton.tsx: extends ButtonProps with icon ---
  # HARD TRAP: same import, same base type, extends it.
  - IconButton
  - IconButtonProps
  - icon
  # --- button-styles.ts: styles with same variant names ---
  # HARD TRAP: references 'primary'/'secondary' — same variant strings.
  - buttonVariants
  - getButtonClass
  - "btn-disabled"
  # --- form-types.ts: separate form types with disabled? ---
  # Same React form domain, similar optional props.
  - InputProps
  - SelectProps
  - placeholder

must_not_include_files:
  - IconButton.tsx
  - button-styles.ts
  - form-types.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
