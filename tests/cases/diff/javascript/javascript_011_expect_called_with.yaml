# Scenario: Test uses jest.fn with toHaveBeenCalledWith — reviewer needs the interface.
#
# Diff: notifier.test.ts is written from scratch. It imports sendNotification and
# Notification from notifier.ts, creates a jest.fn callback, and asserts it was
# called with { title: 'Hello', body: 'World' }.
#
# Reviewer questions:
#   Q1: "What is the Notification interface shape and how does sendNotification
#        call the callback?" -> notifier.ts (UNCHANGED) defines Notification as
#        { title: string; body: string } and sendNotification calls notify({ title, body }).
#        The reviewer verifies the mock assertion matches the real call.
#
# Not needed:
#   - notification-queue.ts: queues notifications for batch delivery.
#     Different layer, doesn't use sendNotification directly.
#   - template-engine.ts: renders notification body from templates.
#     Unrelated step, not invoked in sendNotification.

max_enrichment: 5.4
initial:
  notifier.ts: |
    export interface Notification {
        title: string;
        body: string;
    }

    export function sendNotification(notify: (n: Notification) => void, title: string, body: string) {
        notify({ title, body });
    }
  notifier.test.ts: |
    console.log('initial');
  notification-queue.ts: |
    interface QueuedNotification {
        recipient: string;
        message: string;
        scheduledAt: Date;
    }

    const queue: QueuedNotification[] = [];

    export function enqueueNotification(recipient: string, message: string): void {
        queue.push({ recipient, message, scheduledAt: new Date() });
    }

    export function flushQueue(): QueuedNotification[] {
        return queue.splice(0);
    }
  template-engine.ts: |
    export function renderTemplate(template: string, vars: Record<string, string>): string {
        return template.replace(/\{\{(\w+)\}\}/g, (_, key) => vars[key] ?? '');
    }

changed:
  notifier.ts: |
    export interface Notification {
        title: string;
        body: string;
    }

    export function sendNotification(notify: (n: Notification) => void, title: string, body: string) {
        notify({ title, body });
    }
  notifier.test.ts: |
    import { sendNotification, Notification } from './notifier';

    describe('sendNotification', () => {
        it('should call notify with correct args', () => {
            const notify = jest.fn<void, [Notification]>();
            sendNotification(notify, 'Hello', 'World');
            expect(notify).toHaveBeenCalledWith({ title: 'Hello', body: 'World' });
        });
    });
  notification-queue.ts: |
    interface QueuedNotification {
        recipient: string;
        message: string;
        scheduledAt: Date;
    }

    const queue: QueuedNotification[] = [];

    export function enqueueNotification(recipient: string, message: string): void {
        queue.push({ recipient, message, scheduledAt: new Date() });
    }

    export function flushQueue(): QueuedNotification[] {
        return queue.splice(0);
    }
  template-engine.ts: |
    export function renderTemplate(template: string, vars: Record<string, string>): string {
        return template.replace(/\{\{(\w+)\}\}/g, (_, key) => vars[key] ?? '');
    }

must_include_files:
  # Q1: notifier.ts defines Notification interface and sendNotification behavior
  - notifier.ts
must_include_content_from:
  notifier.ts:
    - "interface Notification {"
    - "function sendNotification"
    - "notify({ title, body })"
must_not_include:
  # notification-queue.ts: batch delivery, different mechanism
  - enqueueNotification
  - flushQueue
  - QueuedNotification
  # template-engine.ts: template rendering, not part of notification sending
  - renderTemplate
must_not_include_files:
  - notification-queue.ts
  - template-engine.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
