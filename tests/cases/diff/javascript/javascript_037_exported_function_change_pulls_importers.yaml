# Scenario: fetchUser in utils.ts gains an optional `options` parameter.
# consumer.ts imports and calls fetchUser(id) without the new parameter.
#
# Diff: utils.ts changes `fetchUser(id: string)` to `fetchUser(id: string, options?: RequestInit)`
# and passes options to fetch().
#
# Reviewer questions:
#   Q1: "Do existing callers break with the new parameter?"
#       -> consumer.ts (UNCHANGED) imports fetchUser and calls fetchUser(id) with no second arg.
#          Since options is optional, this still compiles. Reviewer verifies backward compatibility.
#   Q2: "Should existing callers pass the new options?"
#       -> consumer.ts just loads a user profile. Reviewer can decide if options should be forwarded.
#
# Not needed:
#   - url-builder.ts: URL construction utility. Similar domain (API requests) but
#     doesn't import fetchUser — no import edge.
#   - user-cache.ts: caches user responses by id. Related to users but manages its
#     own Map storage, doesn't call fetchUser.

max_enrichment: 4.7
initial:
  utils.ts: |
    export function fetchUser(id: string) {
        return fetch(`/api/users/${id}`);
    }
  consumer.ts: |
    import { fetchUser } from './utils';

    async function loadUser(id: string) {
        const response = await fetchUser(id);
        return response.json();
    }
  url-builder.ts: |
    export function buildApiUrl(path: string, params?: Record<string, string>): string {
        const base = '/api';
        const url = new URL(`${base}${path}`, 'http://localhost');
        if (params) {
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
        }
        return url.pathname + url.search;
    }
  user-cache.ts: |
    const cache = new Map<string, { data: unknown; expiry: number }>();

    export function getCachedUser(id: string): unknown | null {
        const entry = cache.get(id);
        if (!entry || entry.expiry < Date.now()) return null;
        return entry.data;
    }

    export function setCachedUser(id: string, data: unknown, ttl: number = 60000): void {
        cache.set(id, { data, expiry: Date.now() + ttl });
    }
changed:
  utils.ts: |
    export function fetchUser(id: string, options?: RequestInit) {
        return fetch(`/api/users/${id}`, options);
    }
  consumer.ts: |
    import { fetchUser } from './utils';

    async function loadUser(id: string) {
        const response = await fetchUser(id);
        return response.json();
    }
  url-builder.ts: |
    export function buildApiUrl(path: string, params?: Record<string, string>): string {
        const base = '/api';
        const url = new URL(`${base}${path}`, 'http://localhost');
        if (params) {
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
        }
        return url.pathname + url.search;
    }
  user-cache.ts: |
    const cache = new Map<string, { data: unknown; expiry: number }>();

    export function getCachedUser(id: string): unknown | null {
        const entry = cache.get(id);
        if (!entry || entry.expiry < Date.now()) return null;
        return entry.data;
    }

    export function setCachedUser(id: string, data: unknown, ttl: number = 60000): void {
        cache.set(id, { data, expiry: Date.now() + ttl });
    }
must_include_files:
  # Q1: consumer.ts imports fetchUser — reviewer needs to verify callers aren't broken
  - consumer.ts
must_include_content_from:
  consumer.ts:
    - "import { fetchUser } from './utils'"
    - "fetchUser(id)"
must_not_include:
  # url-builder.ts: URL construction, no import edge to fetchUser
  - buildApiUrl
  # user-cache.ts: caching layer, doesn't call fetchUser
  - getCachedUser
  - setCachedUser
must_not_include_files:
  - url-builder.ts
  - user-cache.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
