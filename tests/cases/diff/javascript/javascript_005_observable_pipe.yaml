# Scenario: Angular component uses RxJS pipe with imported filter function.
#
# Diff: list.component.ts is rewritten to import filterActive from transformers.ts
# and use it inside an Observable pipe(map(filterActive)).
#
# Reviewer questions:
#   Q1: "What generic constraint does filterActive require?"
#       -> transformers.ts (UNCHANGED) defines filterActive<T extends { active: boolean }>.
#          The component defines Item with an `active` field — reviewer must verify
#          Item satisfies the constraint.
#
# Not needed:
#   - sort-utils.ts: another data transformation in the same directory.
#     Similar generics pattern but for sorting, not used by the component.
#   - item.service.ts: Angular HTTP service for fetching items.
#     The component uses inline data, not this service.

max_enrichment: 3.8
initial:
  transformers.ts: |
    export function filterActive<T extends { active: boolean }>(items: T[]): T[] {
        return items.filter(item => item.active);
    }
  list.component.ts: |
    console.log('initial');
  sort-utils.ts: |
    export function sortByName<T extends { name: string }>(items: T[]): T[] {
        return [...items].sort((a, b) => a.name.localeCompare(b.name));
    }

    export function sortById<T extends { id: string }>(items: T[]): T[] {
        return [...items].sort((a, b) => a.id.localeCompare(b.id));
    }
  item.service.ts: |
    import { Injectable } from '@angular/core';
    import { HttpClient } from '@angular/common/http';
    import { Observable } from 'rxjs';

    @Injectable({ providedIn: 'root' })
    export class ItemService {
        constructor(private http: HttpClient) {}

        getItems(): Observable<any[]> {
            return this.http.get<any[]>('/api/items');
        }
    }

changed:
  transformers.ts: |
    export function filterActive<T extends { active: boolean }>(items: T[]): T[] {
        return items.filter(item => item.active);
    }
  list.component.ts: |
    import { Component } from '@angular/core';
    import { Observable, of } from 'rxjs';
    import { map } from 'rxjs/operators';
    import { filterActive } from './transformers';

    interface Item {
        id: string;
        name: string;
        active: boolean;
    }

    @Component({
        selector: 'app-list',
        template: `<div *ngFor="let item of items$ | async">{{ item.name }}</div>`
    })
    export class ListComponent {
        items$: Observable<Item[]> = of([
            { id: '1', name: 'Item 1', active: true },
            { id: '2', name: 'Item 2', active: false },
        ]).pipe(map(filterActive));
    }
  sort-utils.ts: |
    export function sortByName<T extends { name: string }>(items: T[]): T[] {
        return [...items].sort((a, b) => a.name.localeCompare(b.name));
    }

    export function sortById<T extends { id: string }>(items: T[]): T[] {
        return [...items].sort((a, b) => a.id.localeCompare(b.id));
    }
  item.service.ts: |
    import { Injectable } from '@angular/core';
    import { HttpClient } from '@angular/common/http';
    import { Observable } from 'rxjs';

    @Injectable({ providedIn: 'root' })
    export class ItemService {
        constructor(private http: HttpClient) {}

        getItems(): Observable<any[]> {
            return this.http.get<any[]>('/api/items');
        }
    }

must_include_files:
  # Q1: transformers.ts defines filterActive's generic constraint
  - transformers.ts
must_include_content_from:
  transformers.ts:
    - "function filterActive<T extends { active: boolean }>"
must_not_include:
  # sort-utils.ts: different transformation utility, not used by the component
  - sortByName
  - sortById
  # item.service.ts: HTTP layer, component uses inline data
  - ItemService
  - getItems
must_not_include_files:
  - sort-utils.ts
  - item.service.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
