# Scenario: main_generator.ts is rewritten to import subGenerator from
#   sub_generator.ts and delegate via yield*. Only main_generator.ts is changed.
#
# Diff shows:
#   - console.log('initial');
#   + import { subGenerator } from './sub_generator';
#   + export function* mainGenerator() { yield 0; yield* subGenerator(); yield 4; }
#
# Reviewer questions:
#   Q1: "What values does subGenerator yield — what will yield* produce?"
#       -> sub_generator.ts (UNCHANGED) yields 1, 2, 3. The reviewer must see
#          this to understand that mainGenerator produces 0, 1, 2, 3, 4.
#
#   Q2: "Is subGenerator a finite generator — will yield* ever terminate?"
#       -> Same file: it yields exactly 3 values and returns. Reviewer needs
#          the body to confirm mainGenerator won't hang.
#
# Not needed for comprehension:
#   - async-iterator.ts: Async generator using yield with await. Same generator
#     pattern (function*) but async — different mechanism. Not imported by
#     main_generator.ts. Trap: similar yield/generator syntax.
#
#   - range-iterator.ts: Class implementing Symbol.iterator with yield.
#     Different iteration approach (class-based vs function generator).
#     Not imported by main_generator.ts. Trap: yields numbers like subGenerator.

initial:
  sub_generator.ts: |
    export function* subGenerator() {
        yield 1;
        yield 2;
        yield 3;
    }
  main_generator.ts: |
    console.log('initial');
  async-iterator.ts: |
    export async function* fetchPages(baseUrl: string) {
        let page = 1;
        while (true) {
            const response = await fetch(`${baseUrl}?page=${page}`);
            const data = await response.json();
            if (data.items.length === 0) return;
            yield data.items;
            page++;
        }
    }

    export async function* retryableStream<T>(
        generator: AsyncGenerator<T>,
        maxRetries: number = 3
    ) {
        let retries = 0;
        while (retries < maxRetries) {
            try {
                yield* generator;
                return;
            } catch {
                retries++;
            }
        }
    }
  range-iterator.ts: |
    export class NumberRange {
        constructor(private start: number, private end: number) {}

        *[Symbol.iterator]() {
            for (let i = this.start; i <= this.end; i++) {
                yield i;
            }
        }

        toArray(): number[] {
            return [...this];
        }

        contains(value: number): boolean {
            return value >= this.start && value <= this.end;
        }
    }

changed:
  sub_generator.ts: |
    export function* subGenerator() {
        yield 1;
        yield 2;
        yield 3;
    }
  main_generator.ts: |
    import { subGenerator } from './sub_generator';

    export function* mainGenerator() {
        yield 0;
        yield* subGenerator();
        yield 4;
    }
  async-iterator.ts: |
    export async function* fetchPages(baseUrl: string) {
        let page = 1;
        while (true) {
            const response = await fetch(`${baseUrl}?page=${page}`);
            const data = await response.json();
            if (data.items.length === 0) return;
            yield data.items;
            page++;
        }
    }

    export async function* retryableStream<T>(
        generator: AsyncGenerator<T>,
        maxRetries: number = 3
    ) {
        let retries = 0;
        while (retries < maxRetries) {
            try {
                yield* generator;
                return;
            } catch {
                retries++;
            }
        }
    }
  range-iterator.ts: |
    export class NumberRange {
        constructor(private start: number, private end: number) {}

        *[Symbol.iterator]() {
            for (let i = this.start; i <= this.end; i++) {
                yield i;
            }
        }

        toArray(): number[] {
            return [...this];
        }

        contains(value: number): boolean {
            return value >= this.start && value <= this.end;
        }
    }

must_include_files:
  - main_generator.ts
  # Q1+Q2: subGenerator yields the values delegated by yield*
  - sub_generator.ts

must_include_content_from:
  main_generator.ts:
    - "import { subGenerator } from './sub_generator'"
    - "yield* subGenerator()"
  sub_generator.ts:
    - "export function* subGenerator()"
    - "yield 1"

must_not_include:
  # --- async-iterator.ts: async generators, different mechanism ---
  # Uses async function* with await — different from sync yield*.
  # Also uses yield* but in async context. Not imported by main_generator.ts.
  - fetchPages
  - retryableStream
  - "await fetch"
  # --- range-iterator.ts: class-based iterator yielding numbers ---
  # Yields numbers like subGenerator but via Symbol.iterator class pattern.
  # Different mechanism, not imported by main_generator.ts.
  - NumberRange
  - "Symbol.iterator"
  - toArray

must_not_include_files:
  - async-iterator.ts
  - range-iterator.ts

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
