# Scenario: query.ts is rewritten from a stub to import the sql tagged template
#   function from tags.ts and use it to build a parameterized SQL query.
#   Only query.ts is changed; tags.ts is unchanged.
#
# Diff shows:
#   - console.log('initial')
#   + import { sql } from './tags'
#   + function buildQuery(userId: string) using sql`SELECT * FROM users WHERE id = ${userId}`
#
# Reviewer questions:
#   Q1: "What does the sql tag function produce?"
#       -> tags.ts: returns { text: string, values: any[] } where text has
#          $1, $2, ... placeholders and values holds the interpolated values.
#          So sql`...WHERE id = ${userId}` produces { text: '...WHERE id = $1', values: [userId] }.
#
#   Q2: "Is the template tag function safe from SQL injection?"
#       -> tags.ts: replaces interpolated values with $N placeholders instead
#          of inlining them. The values array is separate. This is the standard
#          parameterized query pattern — safe from injection.
#
# Not needed for comprehension:
#   - html-tag.ts: Parallel tagged template function for HTML escaping.
#     Same tagged template pattern. HARD TRAP: identical TemplateStringsArray
#     signature, same pattern of processing strings and values.
#
#   - query-builder.ts: Fluent query builder class with .where(), .select().
#     Same SQL query domain. HARD TRAP: builds SQL queries but via method
#     chaining, not tagged templates. Different mechanism, same output.
#
#   - query.test.ts: Tests for buildQuery verifying the sql tag output.
#     Direct structural edge — imports buildQuery and asserts the result.
#     But test expectations don't help review the template tag mechanism.

max_enrichment: 6.1
initial:
  tags.ts: |
    export function sql(strings: TemplateStringsArray, ...values: any[]) {
        let result = '';
        strings.forEach((str, i) => {
            result += str + (values[i] !== undefined ? `$${i + 1}` : '');
        });
        return { text: result, values };
    }

    export function html(strings: TemplateStringsArray, ...values: any[]) {
        return strings.reduce((acc, str, i) =>
            acc + str + (values[i] !== undefined ? String(values[i]).replace(/</g, '&lt;') : ''), '');
    }
  query.ts: |
    console.log('initial');
  html-tag.ts: |
    export function safeHtml(strings: TemplateStringsArray, ...values: any[]): string {
        return strings.reduce((result, str, i) => {
            const val = values[i] !== undefined ? escapeHtml(String(values[i])) : '';
            return result + str + val;
        }, '');
    }

    function escapeHtml(text: string): string {
        return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }
  query-builder.ts: |
    export class QueryBuilder {
        private parts: string[] = [];
        private params: unknown[] = [];

        select(...columns: string[]): this {
            this.parts.push(`SELECT ${columns.join(', ')}`);
            return this;
        }

        from(table: string): this {
            this.parts.push(`FROM ${table}`);
            return this;
        }

        where(condition: string, value: unknown): this {
            this.params.push(value);
            this.parts.push(`WHERE ${condition} = $${this.params.length}`);
            return this;
        }

        build(): { text: string; values: unknown[] } {
            return { text: this.parts.join(' '), values: this.params };
        }
    }
  query.test.ts: |
    import { sql } from './tags';

    describe('sql template tag', () => {
        it('produces parameterized query', () => {
            const result = sql`SELECT * FROM users WHERE id = ${'user-1'}`;
            expect(result.text).toBe('SELECT * FROM users WHERE id = $1');
            expect(result.values).toEqual(['user-1']);
        });

        it('handles multiple parameters', () => {
            const result = sql`SELECT * FROM users WHERE name = ${'Alice'} AND age > ${25}`;
            expect(result.text).toContain('$1');
            expect(result.text).toContain('$2');
        });
    });

