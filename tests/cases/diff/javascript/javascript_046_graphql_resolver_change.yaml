# Scenario: resolvers.ts is expanded to add a `users` query and a `createUser`
#   mutation. schema.ts imports resolvers and re-exports them alongside typeDefs.
#   Only resolvers.ts is changed; schema.ts is unchanged.
#
# Diff shows:
#   - Query: { user: ... }
#   + Query: { user: ..., users: ... }
#   + Mutation: { createUser: ... }
#
# Reviewer questions:
#   Q1: "Does the schema define types and operations matching the new resolvers?"
#       -> schema.ts: typeDefs only has `type Query { user(id: ID!): User }`.
#          The new `users` query and `Mutation { createUser }` are NOT in the
#          schema yet. This is a potential bug the reviewer must catch.
#
#   Q2: "How are the resolvers wired to the schema?"
#       -> schema.ts: imports resolvers from './resolvers' and re-exports them
#          alongside typeDefs. Reviewer can see the wiring pattern.
#
# Not needed for comprehension:
#   - post-resolvers.ts: Parallel resolvers for Post type with Query and Mutation.
#     Same resolver structure, same GraphQL pattern. HARD TRAP: identical
#     resolver object shape with Query/Mutation at same nesting level.
#
#   - resolver-context.ts: Context type passed to all resolvers (auth, db).
#     Same resolver ecosystem but infrastructure concern, not related to
#     understanding what the new resolvers do.
#
#   - resolver.test.ts: Tests for the user resolver using mock context.
#     Direct structural edge — calls resolver functions. But test setup
#     doesn't help review the schema/resolver alignment.

initial:
  resolvers.ts: |
    export const resolvers = {
        Query: {
            user: (_: any, { id }: { id: string }) => ({ id, name: 'Test' }),
        },
    };
  schema.ts: |
    import { resolvers } from './resolvers';

    export const typeDefs = `
        type User {
            id: ID!
            name: String!
        }

        type Query {
            user(id: ID!): User
        }
    `;

    export { resolvers };
  post-resolvers.ts: |
    export const postResolvers = {
        Query: {
            post: (_: any, { id }: { id: string }) => ({ id, title: 'Test Post', content: 'Content' }),
            posts: () => [{ id: '1', title: 'Post 1', content: 'Content 1' }],
        },
        Mutation: {
            createPost: (_: any, { title, content }: { title: string; content: string }) =>
                ({ id: Date.now().toString(), title, content }),
        },
    };
  resolver-context.ts: |
    export interface ResolverContext {
        userId: string | null;
        db: {
            users: Map<string, { id: string; name: string }>;
            posts: Map<string, { id: string; title: string }>;
        };
    }

    export function createContext(token?: string): ResolverContext {
        return {
            userId: token ? 'user-from-token' : null,
            db: { users: new Map(), posts: new Map() },
        };
    }
  resolver.test.ts: |
    import { resolvers } from './resolvers';

    describe('user resolver', () => {
        it('returns user by id', () => {
            const result = resolvers.Query.user(null, { id: '123' });
            expect(result).toEqual({ id: '123', name: 'Test' });
        });
    });

changed:
  resolvers.ts: |
    export const resolvers = {
        Query: {
            user: (_: any, { id }: { id: string }) => ({ id, name: 'Test' }),
            users: () => [{ id: '1', name: 'User 1' }, { id: '2', name: 'User 2' }],
        },
        Mutation: {
            createUser: (_: any, { name }: { name: string }) => ({ id: Date.now().toString(), name }),
        },
    };
  schema.ts: |
    import { resolvers } from './resolvers';

    export const typeDefs = `
        type User {
            id: ID!
            name: String!
        }

        type Query {
            user(id: ID!): User
        }
    `;

    export { resolvers };
  post-resolvers.ts: |
    export const postResolvers = {
        Query: {
            post: (_: any, { id }: { id: string }) => ({ id, title: 'Test Post', content: 'Content' }),
            posts: () => [{ id: '1', title: 'Post 1', content: 'Content 1' }],
        },
        Mutation: {
            createPost: (_: any, { title, content }: { title: string; content: string }) =>
                ({ id: Date.now().toString(), title, content }),
        },
    };
  resolver-context.ts: |
    export interface ResolverContext {
        userId: string | null;
        db: {
            users: Map<string, { id: string; name: string }>;
            posts: Map<string, { id: string; title: string }>;
        };
    }

    export function createContext(token?: string): ResolverContext {
        return {
            userId: token ? 'user-from-token' : null,
            db: { users: new Map(), posts: new Map() },
        };
    }
  resolver.test.ts: |
    import { resolvers } from './resolvers';

    describe('user resolver', () => {
        it('returns user by id', () => {
            const result = resolvers.Query.user(null, { id: '123' });
            expect(result).toEqual({ id: '123', name: 'Test' });
        });
    });

must_include_files:
  - resolvers.ts
  # Q1+Q2: schema.ts defines typeDefs and wires resolvers — reviewer needs
  # to see that the new query/mutation are NOT in the schema yet.
  - schema.ts

must_include_content_from:
  resolvers.ts:
    - "users: ()"
    - "createUser:"
  schema.ts:
    - "import { resolvers } from './resolvers'"
    - "type Query {"
    - "user(id: ID!): User"
    - "export { resolvers }"

must_not_include:
  # --- post-resolvers.ts: parallel resolver for Post type ---
  # HARD TRAP: identical structure with Query/Mutation, same nesting.
  - postResolvers
  - createPost
  - "Test Post"
  # --- resolver-context.ts: context type for resolvers ---
  - ResolverContext
  - createContext
  - "user-from-token"
  # --- resolver.test.ts: tests the changed resolver ---
  # Direct edge: imports resolvers, calls Query.user.
  - "returns user by id"
  - "resolvers.Query.user"

must_not_include_files:
  - post-resolvers.ts
  - resolver-context.ts
  - resolver.test.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
