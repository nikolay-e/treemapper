  Form.tsx: |
    import { useRef } from 'react';
    import { Input } from './Input';

    export function Form() {
        const emailRef = useRef<HTMLInputElement>(null);

        const handleSubmit = () => {
            emailRef.current?.focus();
        };

        return (
            <form onSubmit={handleSubmit}>
                <Input ref={emailRef} label="Email" type="email" />
            </form>
        );
    }
