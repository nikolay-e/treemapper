# Scenario: accessor.ts is rewritten from a stub to import Schema from schema.ts
#   and use indexed access types Schema['users'][number] and Schema['posts'][number]
#   to derive User and Post types. Only accessor.ts is changed.
#
# Diff shows:
#   - console.log('initial')
#   + import { Schema } from './schema'
#   + type User = Schema['users'][number]
#   + type Post = Schema['posts'][number]
#   + function getFirstUser(schema: Schema): User
#
# Reviewer questions:
#   Q1: "What does Schema['users'][number] resolve to?"
#       -> schema.ts: users is { id: string; name: string }[]. So
#          Schema['users'][number] = { id: string; name: string }.
#
#   Q2: "What does Schema['posts'][number] resolve to?"
#       -> schema.ts: posts is { id: string; title: string; content: string }[].
#          Post = { id: string; title: string; content: string }.
#
# Not needed for comprehension:
#   - schema-builder.ts: Builds Schema objects programmatically. Direct type
#     edge — imports Schema and constructs instances. But HOW schemas are
#     built doesn't help review the indexed access type derivation.
#
#   - schema-validator.ts: Validates Schema data at runtime (checks array
#     lengths, field presence). Same Schema type. HARD TRAP: accesses
#     schema.users and schema.posts — the exact paths used in the index types.
#
#   - post-accessor.ts: Parallel file that does Schema['posts'][number] and
#     provides getFirstPost. Same indexed access pattern, same Schema type.
#     HARD TRAP: identical type extraction technique on the same source type.

max_enrichment: 11.9
initial:
  schema.ts: |
    export interface Schema {
        users: { id: string; name: string }[];
        posts: { id: string; title: string; content: string }[];
    }
  accessor.ts: |
    console.log('initial');
  schema-builder.ts: |
    import { Schema } from './schema';

    export function createEmptySchema(): Schema {
        return { users: [], posts: [] };
    }

    export function addUser(schema: Schema, id: string, name: string): Schema {
        return { ...schema, users: [...schema.users, { id, name }] };
    }

    export function addPost(schema: Schema, id: string, title: string, content: string): Schema {
        return { ...schema, posts: [...schema.posts, { id, title, content }] };
    }
  schema-validator.ts: |
    import { Schema } from './schema';

    export function validateSchema(schema: Schema): { valid: boolean; errors: string[] } {
        const errors: string[] = [];
        if (!Array.isArray(schema.users)) errors.push('users must be an array');
        if (!Array.isArray(schema.posts)) errors.push('posts must be an array');
        schema.users.forEach((u, i) => {
            if (!u.id) errors.push(`users[${i}].id missing`);
        });
        return { valid: errors.length === 0, errors };
    }
  post-accessor.ts: |
    import { Schema } from './schema';

    type Post = Schema['posts'][number];

    export function getFirstPost(schema: Schema): Post | undefined {
        return schema.posts[0];
    }

    export function getPostsByTitle(schema: Schema, title: string): Post[] {
        return schema.posts.filter(p => p.title.includes(title));
    }

changed:
  schema.ts: |
    export interface Schema {
        users: { id: string; name: string }[];
        posts: { id: string; title: string; content: string }[];
    }
  accessor.ts: |
    import { Schema } from './schema';

    type User = Schema['users'][number];
    type Post = Schema['posts'][number];

    function getFirstUser(schema: Schema): User {
        return schema.users[0];
    }
  schema-builder.ts: |
    import { Schema } from './schema';

    export function createEmptySchema(): Schema {
        return { users: [], posts: [] };
    }

    export function addUser(schema: Schema, id: string, name: string): Schema {
        return { ...schema, users: [...schema.users, { id, name }] };
    }

    export function addPost(schema: Schema, id: string, title: string, content: string): Schema {
        return { ...schema, posts: [...schema.posts, { id, title, content }] };
    }
  schema-validator.ts: |
    import { Schema } from './schema';

    export function validateSchema(schema: Schema): { valid: boolean; errors: string[] } {
        const errors: string[] = [];
        if (!Array.isArray(schema.users)) errors.push('users must be an array');
        if (!Array.isArray(schema.posts)) errors.push('posts must be an array');
        schema.users.forEach((u, i) => {
            if (!u.id) errors.push(`users[${i}].id missing`);
        });
        return { valid: errors.length === 0, errors };
    }
  post-accessor.ts: |
    import { Schema } from './schema';

    type Post = Schema['posts'][number];

    export function getFirstPost(schema: Schema): Post | undefined {
        return schema.posts[0];
    }

    export function getPostsByTitle(schema: Schema, title: string): Post[] {
        return schema.posts.filter(p => p.title.includes(title));
    }

must_include_files:
  - accessor.ts
  # Q1+Q2: schema.ts defines Schema — reviewer needs to see the users and
  # posts array element shapes to understand what the indexed access resolves to.
  - schema.ts

must_include_content_from:
  accessor.ts:
    - "import { Schema } from './schema'"
    - "type User = Schema['users'][number]"
    - "type Post = Schema['posts'][number]"
  schema.ts:
    - "interface Schema {"
    - "users: { id: string; name: string }[]"
    - "posts: { id: string; title: string; content: string }[]"

must_not_include:
  # --- schema-builder.ts: constructs Schema objects ---
  # Direct type edge: imports Schema. But building schemas doesn't help
  # review the indexed access type derivation.
  - createEmptySchema
  - addUser
  - addPost
  # --- schema-validator.ts: validates Schema data ---
  # HARD TRAP: accesses schema.users and schema.posts — the exact paths.
  - validateSchema
  - "users must be an array"
  # --- post-accessor.ts: same indexed access pattern for posts ---
  # HARD TRAP: identical Schema['posts'][number] type extraction.
  - getFirstPost
  - getPostsByTitle

must_not_include_files:
  - schema-builder.ts
  - schema-validator.ts
  - post-accessor.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
