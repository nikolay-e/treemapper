# Scenario: main.ts is rewritten to import coreFunction from other.ts (a
#   re-export barrel), which re-exports from core.ts. Only main.ts is changed.
#
# Diff shows:
#   - console.log('initial');
#   + import { coreFunction } from './other';
#   + coreFunction();
#
# Reviewer questions:
#   Q1: "What does coreFunction do — what will calling it produce?"
#       -> core.ts (UNCHANGED) defines coreFunction that logs 'core'.
#          Reviewer must trace through re-export to find the implementation.
#
#   Q2: "Does other.ts actually re-export coreFunction — is the import valid?"
#       -> other.ts (UNCHANGED) has `export { coreFunction } from './core'`.
#          Reviewer must see the re-export to verify the import chain.
#
# Not needed for comprehension:
#   - index.ts: Another barrel file that also re-exports coreFunction.
#     STRUCTURAL TRAP: same re-export pattern. But main.ts imports from
#     other.ts, not index.ts.
#
#   - core.test.ts: Tests for coreFunction. Imports and calls coreFunction.
#     DIRECT EDGE: tests the exact function. But test assertions don't
#     help trace the re-export chain.

max_enrichment: 12.1
initial:
  core.ts: |
    export function coreFunction(): void {
        console.log('core');
    }
  other.ts: |
    export { coreFunction } from './core';
  main.ts: |
    console.log('initial');
  index.ts: |
    export { coreFunction } from './core';

    export function initApp(): void {
        console.log('App initialized');
    }

    export const APP_VERSION = '1.0.0';
  core.test.ts: |
    import { coreFunction } from './core';

    describe('coreFunction', () => {
        it('should log core message', () => {
            const spy = jest.spyOn(console, 'log');
            coreFunction();
            expect(spy).toHaveBeenCalledWith('core');
            spy.mockRestore();
        });
    });

changed:
  core.ts: |
    export function coreFunction(): void {
        console.log('core');
    }
  other.ts: |
    export { coreFunction } from './core';
  main.ts: |
    import { coreFunction } from './other';

    coreFunction();
  index.ts: |
    export { coreFunction } from './core';

    export function initApp(): void {
        console.log('App initialized');
    }

    export const APP_VERSION = '1.0.0';
  core.test.ts: |
    import { coreFunction } from './core';

    describe('coreFunction', () => {
        it('should log core message', () => {
            const spy = jest.spyOn(console, 'log');
            coreFunction();
            expect(spy).toHaveBeenCalledWith('core');
            spy.mockRestore();
        });
    });

must_include_files:
  - main.ts

must_include_content_from:
  main.ts:
    - "import { coreFunction } from './other'"

must_not_include:
  # --- index.ts: parallel barrel file re-exporting coreFunction ---
  # STRUCTURAL TRAP: same re-export pattern as other.ts. But main.ts
  # imports from other.ts, not index.ts.
  - initApp
  - APP_VERSION
  # --- core.test.ts: tests for coreFunction ---
  # DIRECT EDGE: imports and calls coreFunction. But test assertions
  # don't help trace the re-export chain.
  - "describe('coreFunction'"
  - "jest.spyOn"
  - "toHaveBeenCalledWith('core')"

must_not_include_files:
  - index.ts
  - core.test.ts

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
