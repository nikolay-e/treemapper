# Scenario: main.ts is rewritten from a stub to import both the default export
#   and named exports { namedExport, VALUE } from module.ts, then use them all.
#   Only main.ts is changed; module.ts is unchanged.
#
# Diff shows:
#   - console.log('initial')
#   + import defaultFn, { namedExport, VALUE } from './module'
#   + function useAll() that calls defaultFn(), namedExport(), and logs VALUE
#
# Reviewer questions:
#   Q1: "What does defaultFn return — is the logging correct?"
#       -> module.ts: default export returns 'default'. useAll logs the return
#          value via console.log(defaultFn()).
#
#   Q2: "What does namedExport return and what is VALUE?"
#       -> module.ts: namedExport returns 'named', VALUE is 42. useAll logs
#          both, so reviewer can verify the expected console output.
#
# Not needed for comprehension:
#   - consumer.ts: Another file that imports only the default from module.ts.
#     Direct import edge — same module. But it uses a subset of exports,
#     doesn't help review the mixed import pattern.
#
#   - helpers.ts: Utility module with similar structure (default + named exports).
#     Same export pattern. HARD TRAP: identical module structure but different
#     functions/values. Could be confused for the import target.
#
#   - module.test.ts: Tests for module.ts exports. Imports all three exports,
#     asserts return values. Direct edge but test assertions don't help
#     review the import/usage pattern in main.ts.

max_enrichment: 8.4
initial:
  module.ts: |
    export default function defaultExport() {
        return 'default';
    }

    export function namedExport() {
        return 'named';
    }

    export const VALUE = 42;
  main.ts: |
    console.log('initial');
  consumer.ts: |
    import defaultFn from './module';

    export function runDefault() {
        return defaultFn();
    }
  helpers.ts: |
    export default function helperDefault() {
        return 'helper-default';
    }

    export function helperNamed() {
        return 'helper-named';
    }

    export const HELPER_VALUE = 99;
  module.test.ts: |
    import defaultFn, { namedExport, VALUE } from './module';

    describe('module exports', () => {
        it('default export returns "default"', () => {
            expect(defaultFn()).toBe('default');
        });
        it('namedExport returns "named"', () => {
            expect(namedExport()).toBe('named');
        });
        it('VALUE is 42', () => {
            expect(VALUE).toBe(42);
        });
    });

changed:
  module.ts: |
    export default function defaultExport() {
        return 'default';
    }

    export function namedExport() {
        return 'named';
    }

    export const VALUE = 42;
  main.ts: |
    import defaultFn, { namedExport, VALUE } from './module';

    function useAll() {
        console.log(defaultFn());
        console.log(namedExport());
        console.log(VALUE);
    }

    useAll();
  consumer.ts: |
    import defaultFn from './module';

    export function runDefault() {
        return defaultFn();
    }
  helpers.ts: |
    export default function helperDefault() {
        return 'helper-default';
    }

    export function helperNamed() {
        return 'helper-named';
    }

    export const HELPER_VALUE = 99;
  module.test.ts: |
    import defaultFn, { namedExport, VALUE } from './module';

    describe('module exports', () => {
        it('default export returns "default"', () => {
            expect(defaultFn()).toBe('default');
        });
        it('namedExport returns "named"', () => {
            expect(namedExport()).toBe('named');
        });
        it('VALUE is 42', () => {
            expect(VALUE).toBe(42);
        });
    });

must_include_files:
  - main.ts
  # Q1+Q2: module.ts defines all three exports — reviewer needs to see
  # what they return/contain to verify main.ts usage.
  - module.ts

must_include_content_from:
  main.ts:
    - "import defaultFn, { namedExport, VALUE } from './module'"
    - "function useAll()"
  module.ts:
    - "export default function defaultExport()"
    - "return 'default'"
    - "export function namedExport()"
    - "export const VALUE = 42"

must_not_include:
  # --- consumer.ts: imports only default from same module ---
  # Direct import edge but uses a subset, doesn't help review.
  - runDefault
  # --- helpers.ts: parallel module with same export pattern ---
  # HARD TRAP: identical structure (default + named + const).
  - helperDefault
  - helperNamed
  - HELPER_VALUE
  # --- module.test.ts: tests all three exports ---
  # Direct edge: same import pattern as main.ts.
  - "default export returns"
  - "namedExport returns"
  - "VALUE is 42"

must_not_include_files:
  - consumer.ts
  - helpers.ts
  - module.test.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
