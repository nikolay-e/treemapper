# Scenario: api.ts default export apiClient gains a baseUrl parameter and a post method.
# service.ts imports the default export and calls client().get(url).
#
# Diff: api.ts changes `apiClient()` to `apiClient(baseUrl = '')`, adds a `post` method
# alongside the existing `get` method.
#
# Reviewer questions:
#   Q1: "Do existing callers break with the new required parameter?"
#       -> service.ts (UNCHANGED) calls client() with no args. Since baseUrl defaults
#          to '', this still works. Reviewer confirms backward compatibility.
#   Q2: "Should existing callers use the new baseUrl/post features?"
#       -> service.ts: getData calls client().get(url). Reviewer evaluates if baseUrl
#          should be leveraged.
#
# Not needed:
#   - http-types.ts: TypeScript types for HTTP methods/headers. Type definitions only,
#     not an importer of apiClient. No import edge.
#   - retry-client.ts: wraps fetch with retry logic. Different HTTP abstraction entirely,
#     doesn't use apiClient.

max_enrichment: 4.7
initial:
  api.ts: |
    export default function apiClient() {
        return { get: (url: string) => fetch(url) };
    }
  service.ts: |
    import client from './api';

    export function getData(url: string) {
        return client().get(url);
    }
  http-types.ts: |
    export type HttpMethod = 'GET' | 'POST' | 'PUT' | 'DELETE';

    export interface HttpOptions {
        method: HttpMethod;
        headers?: Record<string, string>;
        body?: string;
    }

    export function createRequest(url: string, options: HttpOptions): Request {
        return new Request(url, options);
    }
  retry-client.ts: |
    export async function fetchWithRetry(
        url: string,
        options?: RequestInit,
        maxRetries: number = 3
    ): Promise<Response> {
        for (let i = 0; i < maxRetries; i++) {
            try { return await fetch(url, options); }
            catch (e) { if (i === maxRetries - 1) throw e; }
        }
        throw new Error('Unreachable');
    }
changed:
  api.ts: |
    export default function apiClient(baseUrl = '') {
        return {
            get: (url: string) => fetch(baseUrl + url),
            post: (url: string, data: any) => fetch(baseUrl + url, {
                method: 'POST',
                body: JSON.stringify(data),
            }),
        };
    }
  service.ts: |
    import client from './api';

    export function getData(url: string) {
        return client().get(url);
    }
  http-types.ts: |
    export type HttpMethod = 'GET' | 'POST' | 'PUT' | 'DELETE';

    export interface HttpOptions {
        method: HttpMethod;
        headers?: Record<string, string>;
        body?: string;
    }

    export function createRequest(url: string, options: HttpOptions): Request {
        return new Request(url, options);
    }
  retry-client.ts: |
    export async function fetchWithRetry(
        url: string,
        options?: RequestInit,
        maxRetries: number = 3
    ): Promise<Response> {
        for (let i = 0; i < maxRetries; i++) {
            try { return await fetch(url, options); }
            catch (e) { if (i === maxRetries - 1) throw e; }
        }
        throw new Error('Unreachable');
    }
must_include_files:
  # Q1: service.ts imports default export from api.ts — reviewer checks caller impact
  - service.ts
must_include_content_from:
  service.ts:
    - "import client from './api'"
    - "client().get(url)"
must_not_include:
  # http-types.ts: type definitions, no import edge to apiClient
  - HttpMethod
  - HttpOptions
  - createRequest
  # retry-client.ts: different HTTP abstraction, doesn't use apiClient
  - fetchWithRetry
  - maxRetries
must_not_include_files:
  - http-types.ts
  - retry-client.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
