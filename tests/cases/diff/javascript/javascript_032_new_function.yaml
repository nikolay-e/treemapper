# Scenario: new Function() with imported reference — reviewer needs the target function.
#
# Diff: main.ts is rewritten to import targetFn from target.ts and create a dynamic
# function with new Function('return targetFn()') that references it.
#
# Reviewer questions:
#   Q1: "What does targetFn return?"
#       -> target.ts (UNCHANGED) returns 42. The dynamic function string
#          references targetFn(), so the reviewer needs to see its behavior
#          to understand what the created function will produce.
#
# Not needed:
#   - eval-utils.ts: other dynamic code evaluation utilities (safeEval,
#     createBoundFunction). Same metaprogramming concern but not imported.
#   - safe-eval.ts: sandboxed evaluation with safety checks.
#     Related to dynamic code execution but different mechanism.

max_enrichment: 4.0
initial:
  target.ts: |
    export function targetFn() {
        return 42;
    }
  main.ts: |
    console.log('initial');
  eval-utils.ts: |
    export function safeEval(code: string): unknown {
        try { return Function(`"use strict"; return (${code})`)(); }
        catch { return undefined; }
    }

    export function createBoundFunction(body: string, ...args: string[]): Function {
        return new Function(...args, body);
    }
  safe-eval.ts: |
    const BLOCKED_GLOBALS = ['eval', 'Function', 'setTimeout', 'setInterval'];

    export function isSafeCode(code: string): boolean {
        return !BLOCKED_GLOBALS.some(g => code.includes(g));
    }

    export function sandboxedRun(code: string): unknown {
        if (!isSafeCode(code)) throw new Error('Unsafe code detected');
        return Function(`"use strict"; return (${code})`)();
    }

changed:
  target.ts: |
    export function targetFn() {
        return 42;
    }
  main.ts: |
    import { targetFn } from './target';

    function createDynamicFunction() {
        const fn = new Function('return targetFn()');
        return fn;
    }

    const dynamic = createDynamicFunction();
  eval-utils.ts: |
    export function safeEval(code: string): unknown {
        try { return Function(`"use strict"; return (${code})`)(); }
        catch { return undefined; }
    }

    export function createBoundFunction(body: string, ...args: string[]): Function {
        return new Function(...args, body);
    }
  safe-eval.ts: |
    const BLOCKED_GLOBALS = ['eval', 'Function', 'setTimeout', 'setInterval'];

    export function isSafeCode(code: string): boolean {
        return !BLOCKED_GLOBALS.some(g => code.includes(g));
    }

    export function sandboxedRun(code: string): unknown {
        if (!isSafeCode(code)) throw new Error('Unsafe code detected');
        return Function(`"use strict"; return (${code})`)();
    }

must_include_files:
  # Q1: target.ts defines targetFn — reviewer needs to see its return value
  - target.ts
must_include_content_from:
  target.ts:
    - "function targetFn()"
    - "return 42"
must_not_include:
  # eval-utils.ts: different dynamic evaluation utilities, not imported
  - safeEval
  - createBoundFunction
  # safe-eval.ts: sandboxed eval, not used in this flow
  - isSafeCode
  - sandboxedRun
  - BLOCKED_GLOBALS
must_not_include_files:
  - eval-utils.ts
  - safe-eval.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
