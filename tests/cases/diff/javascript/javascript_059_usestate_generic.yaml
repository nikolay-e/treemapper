# Scenario: TodoList.tsx is rewritten to use useState<TodoItem[]> where TodoItem
# is imported from types.ts.
#
# Diff: TodoList.tsx adds `import { TodoItem } from './types'` and uses
# `useState<TodoItem[]>([])` to manage todo state, creating items with
# { id, text, completed: false }.
#
# Reviewer questions:
#   Q1: "What shape does TodoItem have?"
#       -> types.ts (UNCHANGED) defines TodoItem with id: string, text: string,
#          completed: boolean. Reviewer verifies the component creates new items
#          matching this interface.
#
# Not needed:
#   - todo-filters.ts: filter functions (filterCompleted, filterActive) that import
#     TodoItem. Same domain but not imported by TodoList.tsx in this change.
#   - TodoItemView.tsx: renders a single todo item (TodoItemViewProps). Despite name
#     overlap with TodoItem, this child component is not used by TodoList.tsx here.

max_enrichment: 4.8
initial:
  types.ts: |
    export interface TodoItem {
        id: string;
        text: string;
        completed: boolean;
    }
  TodoList.tsx: |
    console.log('initial');
  todo-filters.ts: |
    import { TodoItem } from './types';

    export function filterCompleted(items: TodoItem[]): TodoItem[] {
        return items.filter(item => item.completed);
    }

    export function filterActive(items: TodoItem[]): TodoItem[] {
        return items.filter(item => !item.completed);
    }
  TodoItemView.tsx: |
    interface TodoItemViewProps {
        text: string;
        completed: boolean;
        onToggle: () => void;
    }

    export function TodoItemView({ text, completed, onToggle }: TodoItemViewProps) {
        return (
            <li onClick={onToggle} style={{ textDecoration: completed ? 'line-through' : 'none' }}>
                {text}
            </li>
        );
    }
changed:
  types.ts: |
    export interface TodoItem {
        id: string;
        text: string;
        completed: boolean;
    }
  TodoList.tsx: |
    import { useState } from 'react';
    import { TodoItem } from './types';

    export function TodoList() {
        const [todos, setTodos] = useState<TodoItem[]>([]);

        const addTodo = (text: string) => {
            setTodos([...todos, { id: Date.now().toString(), text, completed: false }]);
        };

        return <div>{todos.map(t => <span key={t.id}>{t.text}</span>)}</div>;
    }
  todo-filters.ts: |
    import { TodoItem } from './types';

    export function filterCompleted(items: TodoItem[]): TodoItem[] {
        return items.filter(item => item.completed);
    }

    export function filterActive(items: TodoItem[]): TodoItem[] {
        return items.filter(item => !item.completed);
    }
  TodoItemView.tsx: |
    interface TodoItemViewProps {
        text: string;
        completed: boolean;
        onToggle: () => void;
    }

    export function TodoItemView({ text, completed, onToggle }: TodoItemViewProps) {
        return (
            <li onClick={onToggle} style={{ textDecoration: completed ? 'line-through' : 'none' }}>
                {text}
            </li>
        );
    }
must_include_files:
  # Q1: types.ts defines TodoItem that TodoList.tsx imports for useState generic
  - types.ts
must_include_content_from:
  types.ts:
    - "interface TodoItem {"
    - "completed: boolean"
must_not_include:
  # todo-filters.ts: filtering functions not used by TodoList.tsx
  - filterCompleted
  - filterActive
  # TodoItemView.tsx: child component not used in this change
  - TodoItemViewProps
  - onToggle
must_not_include_files:
  - todo-filters.ts
  - TodoItemView.tsx
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
