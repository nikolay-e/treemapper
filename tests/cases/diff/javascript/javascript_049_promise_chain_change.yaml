# Scenario: api.ts's fetchData return type widens to include a metadata field.
# consumer.ts imports fetchData and accesses result.data.
#
# Diff: api.ts changes return type from `{ data: string }` to
# `{ data: string; metadata: { timestamp: number } }`, adding a .then() step
# that attaches metadata.
#
# Reviewer questions:
#   Q1: "Does the type change break existing consumers?"
#       -> consumer.ts (UNCHANGED) accesses result.data — still valid since the type
#          was widened (added metadata), not narrowed. Existing access patterns work.
#   Q2: "Should the consumer use the new metadata field?"
#       -> consumer.ts only logs result.data. Reviewer decides if metadata should
#          be consumed.
#
# Not needed:
#   - api-types.ts: shared ApiResponse/PaginatedResponse types. Not imported by
#     api.ts or consumer.ts — api.ts uses inline types.
#   - retry-fetch.ts: fetch wrapper with retry logic. Transport-level concern,
#     different module entirely.

initial:
  api.ts: |
    export function fetchData(): Promise<{ data: string }> {
        return fetch('/api/data').then(res => res.json());
    }
  consumer.ts: |
    import { fetchData } from './api';

    fetchData().then(result => {
        console.log(result.data);
    });
  api-types.ts: |
    export interface ApiResponse<T> {
        data: T;
        status: number;
        message: string;
    }

    export interface PaginatedResponse<T> extends ApiResponse<T[]> {
        page: number;
        totalPages: number;
    }
  retry-fetch.ts: |
    export async function retryFetch(url: string, retries: number = 3): Promise<Response> {
        for (let i = 0; i < retries; i++) {
            try { return await fetch(url); }
            catch (e) { if (i === retries - 1) throw e; }
        }
        throw new Error('Unreachable');
    }
changed:
  api.ts: |
    export function fetchData(): Promise<{ data: string; metadata: { timestamp: number } }> {
        return fetch('/api/data')
            .then(res => res.json())
            .then(data => ({
                ...data,
                metadata: { timestamp: Date.now() },
            }));
    }
  consumer.ts: |
    import { fetchData } from './api';

    fetchData().then(result => {
        console.log(result.data);
    });
  api-types.ts: |
    export interface ApiResponse<T> {
        data: T;
        status: number;
        message: string;
    }

    export interface PaginatedResponse<T> extends ApiResponse<T[]> {
        page: number;
        totalPages: number;
    }
  retry-fetch.ts: |
    export async function retryFetch(url: string, retries: number = 3): Promise<Response> {
        for (let i = 0; i < retries; i++) {
            try { return await fetch(url); }
            catch (e) { if (i === retries - 1) throw e; }
        }
        throw new Error('Unreachable');
    }
must_include_files:
  # Q1: consumer.ts imports fetchData — reviewer checks if type change breaks callers
  - consumer.ts
must_include_content_from:
  consumer.ts:
    - "import { fetchData } from './api'"
    - "result.data"
must_not_include:
  # api-types.ts: shared type defs not used by api.ts or consumer.ts
  - ApiResponse
  - PaginatedResponse
  - totalPages
  # retry-fetch.ts: transport-level retry, different concern
  - retryFetch
must_not_include_files:
  - api-types.ts
  - retry-fetch.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
