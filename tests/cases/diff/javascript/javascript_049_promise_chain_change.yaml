name: javascript_049_promise_chain_change
repo:
  initial_files:
    api.ts: |
      export function fetchData(): Promise<{ data: string }> {
          return fetch('/api/data').then(res => res.json());
      }
    consumer.ts: |
      import { fetchData } from './api';

      fetchData().then(result => {
          console.log(result.data);
      });
    api-types.ts: |
      export interface ApiResponse<T> {
          data: T;
          status: number;
          message: string;
      }

      export interface PaginatedResponse<T> extends ApiResponse<T[]> {
          page: number;
          totalPages: number;
      }
    retry-fetch.ts: |
      export async function retryFetch(url: string, retries: number = 3): Promise<Response> {
          for (let i = 0; i < retries; i++) {
              try { return await fetch(url); }
              catch (e) { if (i === retries - 1) throw e; }
          }
          throw new Error('Unreachable');
      }
  changed_files:
    api.ts: |
      export function fetchData(): Promise<{ data: string; metadata: { timestamp: number } }> {
          return fetch('/api/data')
              .then(res => res.json())
              .then(data => ({
                  ...data,
                  metadata: { timestamp: Date.now() },
              }));
      }
    consumer.ts: |
      import { fetchData } from './api';

      fetchData().then(result => {
          console.log(result.data);
      });
    api-types.ts: |
      export interface ApiResponse<T> {
          data: T;
          status: number;
          message: string;
      }

      export interface PaginatedResponse<T> extends ApiResponse<T[]> {
          page: number;
          totalPages: number;
      }
    retry-fetch.ts: |
      export async function retryFetch(url: string, retries: number = 3): Promise<Response> {
          for (let i = 0; i < retries; i++) {
              try { return await fetch(url); }
              catch (e) { if (i === retries - 1) throw e; }
          }
          throw new Error('Unreachable');
      }
  commit_message: Update files
fragments:
