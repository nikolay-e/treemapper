# Scenario: user-list.component.ts is rewritten to inject UserService and
#   display users via ngFor. Only user-list.component.ts is changed.
#
# Diff shows:
#   - console.log('initial');
#   + import { UserService } from './user.service';
#   + @Component({ ... }) export class UserListComponent implements OnInit { ... }
#
# Reviewer questions:
#   Q1: "What does UserService.getUsers() return — is it Observable<User[]>?"
#       -> user.service.ts (UNCHANGED) returns this.http.get<User[]>('/api/users').
#          Reviewer must see the service to verify return type matches subscribe().
#
#   Q2: "What is the User interface — does user.name exist for the template?"
#       -> Same file: User has id: string, name: string. Reviewer needs
#          the interface to verify {{ user.name }} is valid.
#
# Not needed for comprehension:
#   - user-detail.component.ts: Sibling component displaying a single user.
#     STRUCTURAL TRAP: same Angular component pattern, same UserService injection,
#     same user.name template binding. HARDEST TRAP: structurally identical
#     sibling component. But viewing another component doesn't help review
#     UserListComponent.
#
#   - user.service.spec.ts: Tests for UserService using HttpClientTestingModule.
#     DIRECT EDGE: imports UserService, calls getUsers(). But mock setup
#     doesn't help review the component's usage.

max_enrichment: 5.9
initial:
  user.service.ts: |
    import { Injectable } from '@angular/core';
    import { HttpClient } from '@angular/common/http';
    import { Observable } from 'rxjs';

    interface User {
        id: string;
        name: string;
    }

    @Injectable({ providedIn: 'root' })
    export class UserService {
        constructor(private http: HttpClient) {}

        getUsers(): Observable<User[]> {
            return this.http.get<User[]>('/api/users');
        }
    }
  user-list.component.ts: |
    console.log('initial');
  user-detail.component.ts: |
    import { Component, Input } from '@angular/core';
    import { UserService } from './user.service';

    @Component({
        selector: 'app-user-detail',
        template: `
            <div class="detail" *ngIf="user">
                <h2>{{ user.name }}</h2>
                <p>ID: {{ user.id }}</p>
            </div>
        `
    })
    export class UserDetailComponent {
        @Input() userId!: string;
        user: any;

        constructor(private userService: UserService) {}

        ngOnChanges() {
            if (this.userId) {
                this.userService.getUsers().subscribe(users => {
                    this.user = users.find(u => u.id === this.userId);
                });
            }
        }
    }
  user.service.spec.ts: |
    import { TestBed } from '@angular/core/testing';
    import { HttpClientTestingModule, HttpTestingController } from '@angular/common/http/testing';
    import { UserService } from './user.service';

    describe('UserService', () => {
        let service: UserService;
        let httpMock: HttpTestingController;

        beforeEach(() => {
            TestBed.configureTestingModule({
                imports: [HttpClientTestingModule],
            });
            service = TestBed.inject(UserService);
            httpMock = TestBed.inject(HttpTestingController);
        });

        it('should fetch users', () => {
            service.getUsers().subscribe(users => {
                expect(users.length).toBe(2);
            });
            const req = httpMock.expectOne('/api/users');
            req.flush([{ id: '1', name: 'Alice' }, { id: '2', name: 'Bob' }]);
        });
    });

changed:
  user.service.ts: |
    import { Injectable } from '@angular/core';
    import { HttpClient } from '@angular/common/http';
    import { Observable } from 'rxjs';

    interface User {
        id: string;
        name: string;
    }

    @Injectable({ providedIn: 'root' })
    export class UserService {
        constructor(private http: HttpClient) {}

        getUsers(): Observable<User[]> {
            return this.http.get<User[]>('/api/users');
        }
    }
  user-list.component.ts: |
    import { Component, OnInit } from '@angular/core';
    import { UserService } from './user.service';

    @Component({
        selector: 'app-user-list',
        template: `
            <ul>
                <li *ngFor="let user of users">{{ user.name }}</li>
            </ul>
        `
    })
    export class UserListComponent implements OnInit {
        users: any[] = [];

        constructor(private userService: UserService) {}

        ngOnInit() {
            this.userService.getUsers().subscribe(users => this.users = users);
        }
    }
  user-detail.component.ts: |
    import { Component, Input } from '@angular/core';
    import { UserService } from './user.service';

    @Component({
        selector: 'app-user-detail',
        template: `
