# Scenario: getter.ts is rewritten from a stub to import AppConfig from config.ts
#   and use keyof AppConfig to create a type-safe config getter with generics.
#   Only getter.ts is changed; config.ts is unchanged.
#
# Diff shows:
#   - console.log('initial')
#   + import { AppConfig } from './config'
#   + type ConfigKey = keyof AppConfig
#   + function getConfig<K extends ConfigKey>(config: AppConfig, key: K): AppConfig[K]
#
# Reviewer questions:
#   Q1: "What keys does AppConfig have — what values can ConfigKey take?"
#       -> config.ts: AppConfig has apiUrl, timeout, debug. So ConfigKey =
#          'apiUrl' | 'timeout' | 'debug'.
#
#   Q2: "Does the generic return AppConfig[K] correctly narrow per key?"
#       -> config.ts: apiUrl is string, timeout is number, debug is boolean.
#          getConfig(cfg, 'apiUrl') returns string, getConfig(cfg, 'timeout')
#          returns number. The indexed access type correctly narrows.
#
# Not needed for comprehension:
#   - config-setter.ts: Type-safe setter using the same keyof pattern.
#     Same AppConfig type, same keyof usage. HARD TRAP: identical type-level
#     technique, same import, complementary operation (set vs get).
#
#   - config-watcher.ts: Watches config changes by key. Uses keyof AppConfig
#     to register callbacks per field. Same keyof pattern. HARD TRAP: same
#     type-level constraint, same import.
#
#   - app-settings.ts: Separate AppSettings interface with similar fields
#     (theme, language, notifications) and its own keyof-based getter.
#     Same pattern, different type.

max_enrichment: 10.6
initial:
  config.ts: |
    export interface AppConfig {
        apiUrl: string;
        timeout: number;
        debug: boolean;
    }
  getter.ts: |
    console.log('initial');
  config-setter.ts: |
    import { AppConfig } from './config';

    export function setConfig<K extends keyof AppConfig>(
        config: AppConfig,
        key: K,
        value: AppConfig[K]
    ): AppConfig {
        return { ...config, [key]: value };
    }
  config-watcher.ts: |
    import { AppConfig } from './config';

    type ConfigCallback<K extends keyof AppConfig> = (oldVal: AppConfig[K], newVal: AppConfig[K]) => void;

    const watchers = new Map<keyof AppConfig, Function[]>();

    export function watchConfig<K extends keyof AppConfig>(key: K, cb: ConfigCallback<K>): void {
        const existing = watchers.get(key) ?? [];
        watchers.set(key, [...existing, cb]);
    }
  app-settings.ts: |
    export interface AppSettings {
        theme: 'light' | 'dark';
        language: string;
        notifications: boolean;
    }

    type SettingsKey = keyof AppSettings;

    export function getSetting<K extends SettingsKey>(settings: AppSettings, key: K): AppSettings[K] {
        return settings[key];
    }

changed:
  config.ts: |
    export interface AppConfig {
        apiUrl: string;
        timeout: number;
        debug: boolean;
    }
  getter.ts: |
    import { AppConfig } from './config';

    type ConfigKey = keyof AppConfig;

    function getConfig<K extends ConfigKey>(config: AppConfig, key: K): AppConfig[K] {
        return config[key];
    }
  config-setter.ts: |
    import { AppConfig } from './config';

    export function setConfig<K extends keyof AppConfig>(
        config: AppConfig,
        key: K,
        value: AppConfig[K]
    ): AppConfig {
        return { ...config, [key]: value };
    }
  config-watcher.ts: |
    import { AppConfig } from './config';

    type ConfigCallback<K extends keyof AppConfig> = (oldVal: AppConfig[K], newVal: AppConfig[K]) => void;

    const watchers = new Map<keyof AppConfig, Function[]>();

    export function watchConfig<K extends keyof AppConfig>(key: K, cb: ConfigCallback<K>): void {
        const existing = watchers.get(key) ?? [];
        watchers.set(key, [...existing, cb]);
    }
  app-settings.ts: |
    export interface AppSettings {
        theme: 'light' | 'dark';
        language: string;
        notifications: boolean;
    }

    type SettingsKey = keyof AppSettings;

    export function getSetting<K extends SettingsKey>(settings: AppSettings, key: K): AppSettings[K] {
        return settings[key];
    }

must_include_files:
  - getter.ts
  # Q1+Q2: config.ts defines AppConfig — reviewer needs to see the three
  # fields to understand what keyof AppConfig resolves to.
  - config.ts

must_include_content_from:
  getter.ts:
    - "import { AppConfig } from './config'"
    - "type ConfigKey = keyof AppConfig"
    - "function getConfig<K extends ConfigKey>"
  config.ts:
    - "interface AppConfig {"
    - "apiUrl: string"
    - "timeout: number"
    - "debug: boolean"

must_not_include:
  # --- config-setter.ts: complementary setter with same keyof pattern ---
  # HARD TRAP: identical keyof AppConfig usage, same import, same generics.
  - setConfig
  - "[key]: value"
  # --- config-watcher.ts: watches changes using same keyof pattern ---
  # HARD TRAP: same keyof AppConfig constraint, same import.
  - watchConfig
  - ConfigCallback
  # --- app-settings.ts: parallel settings with own keyof getter ---
  # Same keyof pattern, different interface.
  - AppSettings
  - SettingsKey
  - getSetting

must_not_include_files:
  - config-setter.ts
  - config-watcher.ts
  - app-settings.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
