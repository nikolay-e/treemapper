# Scenario: handler.ts is rewritten from a stub to import Success and Failure
#   from result.ts and create a Result<T> union type with a discriminated handler.
#   Only handler.ts is changed; result.ts is unchanged.
#
# Diff shows:
#   - console.log('initial')
#   + import { Success, Failure } from './result'
#   + type Result<T> = Success<T> | Failure
#   + function handleResult<T>(result: Result<T>) with discriminated union check
#
# Reviewer questions:
#   Q1: "What does the success discriminant check narrow to?"
#       -> result.ts: Success<T> has { success: true; data: T }. When
#          result.success is true, TypeScript narrows to Success<T> and
#          result.data is available.
#
#   Q2: "Does the Failure branch correctly access the error field?"
#       -> result.ts: Failure has { success: false; error: string }. When
#          result.success is not true, it narrows to Failure and result.error
#          is a string. The throw new Error(result.error) is correct.
#
# Not needed for comprehension:
#   - result-factory.ts: Factory functions that create Success and Failure objects.
#     Direct type edge — imports both types. But HOW results are created doesn't
#     help review the discriminated union handling logic.
#
#   - result-logger.ts: Logs Result outcomes with same success/failure branching.
#     Same discriminated union pattern. HARD TRAP: identical if(result.success)
#     branching logic, same types.
#
#   - either.ts: Alternative Result-like type (Left/Right) with similar union.
#     Same pattern but different types (Left<E>/Right<T> vs Success/Failure).

initial:
  result.ts: |
    export type Success<T> = { success: true; data: T };
    export type Failure = { success: false; error: string };
  handler.ts: |
    console.log('initial');
  result-factory.ts: |
    import { Success, Failure } from './result';

    export function ok<T>(data: T): Success<T> {
        return { success: true, data };
    }

    export function fail(error: string): Failure {
        return { success: false, error };
    }
  result-logger.ts: |
    import { Success, Failure } from './result';

    type AnyResult = Success<unknown> | Failure;

    export function logResult(result: AnyResult): void {
        if (result.success) {
            console.log('[OK]', result.data);
        } else {
            console.error('[FAIL]', result.error);
        }
    }
  either.ts: |
    export type Left<E> = { tag: 'left'; error: E };
    export type Right<T> = { tag: 'right'; value: T };
    export type Either<E, T> = Left<E> | Right<T>;

    export function mapEither<E, A, B>(either: Either<E, A>, fn: (a: A) => B): Either<E, B> {
        return either.tag === 'right' ? { tag: 'right', value: fn(either.value) } : either;
    }

changed:
  result.ts: |
    export type Success<T> = { success: true; data: T };
    export type Failure = { success: false; error: string };
  handler.ts: |
    import { Success, Failure } from './result';

    type Result<T> = Success<T> | Failure;

    function handleResult<T>(result: Result<T>) {
        if (result.success) {
            return result.data;
        }
        throw new Error(result.error);
    }
  result-factory.ts: |
    import { Success, Failure } from './result';

    export function ok<T>(data: T): Success<T> {
        return { success: true, data };
    }

    export function fail(error: string): Failure {
        return { success: false, error };
    }
  result-logger.ts: |
    import { Success, Failure } from './result';

    type AnyResult = Success<unknown> | Failure;

    export function logResult(result: AnyResult): void {
        if (result.success) {
            console.log('[OK]', result.data);
        } else {
            console.error('[FAIL]', result.error);
        }
    }
  either.ts: |
    export type Left<E> = { tag: 'left'; error: E };
    export type Right<T> = { tag: 'right'; value: T };
    export type Either<E, T> = Left<E> | Right<T>;

    export function mapEither<E, A, B>(either: Either<E, A>, fn: (a: A) => B): Either<E, B> {
        return either.tag === 'right' ? { tag: 'right', value: fn(either.value) } : either;
    }

must_include_files:
  - handler.ts
  # Q1+Q2: result.ts defines Success and Failure — reviewer needs to see the
  # discriminant (success: true/false) and the data/error fields to verify
  # the narrowing logic in handleResult.
  - result.ts

must_include_content_from:
  handler.ts:
    - "import { Success, Failure } from './result'"
    - "type Result<T> = Success<T> | Failure"
    - "result.data"
    - "result.error"
  result.ts:
    - "type Success<T> = { success: true; data: T }"
    - "type Failure = { success: false; error: string }"

must_not_include:
  # --- result-factory.ts: creates Success/Failure instances ---
  # Direct type edge: imports both types from result.ts. But HOW results
  # are created doesn't help review the discriminated union handler.
  - "function ok<T>"
  - "function fail("
  # --- result-logger.ts: logs results with same branching ---
  # HARD TRAP: identical if(result.success) pattern, same imports.
  - logResult
  - AnyResult
  - "[OK]"
  - "[FAIL]"
  # --- either.ts: alternative union type pattern ---
  # Same discriminated union idea but different types.
  - Either
  - mapEither
  - "tag: 'left'"
  - "tag: 'right'"

must_not_include_files:
  - result-factory.ts
  - result-logger.ts
  - either.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
