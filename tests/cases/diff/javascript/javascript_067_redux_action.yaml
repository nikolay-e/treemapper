# Reviewer sees: UserForm.tsx dispatches addUser action from userSlice.
# Q1: "What payload shape does addUser expect?"
#     -> userSlice.ts: PayloadAction<User> where User = { id, name }.
#        Reviewer verifies dispatched { id, name } matches the type.
# Q2: "What does the addUser reducer do?"
#     -> userSlice.ts: state.users.push(action.payload). Immer-style
#        mutation. Reviewer understands the state change.
#
# Not needed:
#   - productSlice.ts: Redux slice for products. Same toolkit
#     pattern but different domain.
#   - UserForm.test.tsx: test file placeholder. No comprehension
#     value for understanding the dispatch flow.

max_enrichment: 6.8
initial:
  src/store/userSlice.ts: |
    import { createSlice, PayloadAction } from '@reduxjs/toolkit';

    interface User {
        id: string;
        name: string;
    }

    interface UserState {
        users: User[];
        loading: boolean;
    }

    const initialState: UserState = { users: [], loading: false };

    export const userSlice = createSlice({
        name: 'users',
        initialState,
        reducers: {
            addUser: (state, action: PayloadAction<User>) => {
                state.users.push(action.payload);
            },
            removeUser: (state, action: PayloadAction<string>) => {
                state.users = state.users.filter(u => u.id !== action.payload);
            },
        },
    });

    export const { addUser, removeUser } = userSlice.actions;
  src/components/UserForm.tsx: |
    export function UserForm() {
        return <div>Placeholder</div>;
    }
  src/store/productSlice.ts: |
    import { createSlice, PayloadAction } from '@reduxjs/toolkit';

    interface Product {
        id: string;
        name: string;
        price: number;
    }

    const initialState = { products: [] as Product[] };

    export const productSlice = createSlice({
        name: 'products',
        initialState,
        reducers: {
            addProduct: (state, action: PayloadAction<Product>) => {
                state.products.push(action.payload);
            },
        },
    });

    export const { addProduct } = productSlice.actions;
