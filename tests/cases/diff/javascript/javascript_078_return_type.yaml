# Scenario: types.ts is rewritten from a stub to import createUser from factory.ts
#   and use ReturnType<typeof createUser> to derive the User type.
#   Only types.ts is changed; factory.ts is unchanged.
#
# Diff shows:
#   - console.log('initial')
#   + import { createUser } from './factory'
#   + type User = ReturnType<typeof createUser>
#   + function processUser(user: User) that accesses user.name and user.createdAt
#
# Reviewer questions:
#   Q1: "What does createUser return — what fields does User have?"
#       -> factory.ts: returns { id, name, age, createdAt }. So User has those
#          four fields. processUser accesses user.name and user.createdAt which
#          are valid.
#
#   Q2: "Does processUser access fields that exist on the ReturnType?"
#       -> factory.ts: createUser returns { id: string, name: string, age: number,
#          createdAt: Date }. Both name and createdAt are present. Without seeing
#          factory.ts, reviewer cannot verify these accesses.
#
# Not needed for comprehension:
#   - user-service.ts: Service layer that also calls createUser and processes
#     the result. Direct consumer of the same factory function. But HOW the
#     service uses createUser doesn't help review the ReturnType derivation.
#
#   - user-factory.test.ts: Tests for createUser verifying return shape.
#     Imports createUser, asserts fields. But test expectations don't help
#     review whether processUser's field accesses match the actual type.
#
#   - product-factory.ts: Parallel factory with createProduct() returning
#     { id, name, price, category }. Same factory pattern, same directory.
#     HARD TRAP: identical createXxx factory pattern with similar return shape.

initial:
  factory.ts: |
    export function createUser(name: string, age: number) {
        return { id: Date.now().toString(), name, age, createdAt: new Date() };
    }

    export function createAdmin(name: string) {
        return { ...createUser(name, 0), role: 'admin' as const, permissions: ['read', 'write', 'delete'] };
    }
  types.ts: |
    console.log('initial');
  user-service.ts: |
    import { createUser } from './factory';

    export class UserService {
        private users: ReturnType<typeof createUser>[] = [];

        add(name: string, age: number) {
            this.users.push(createUser(name, age));
        }

        findByName(name: string) {
            return this.users.find(u => u.name === name) ?? null;
        }
    }
  user-factory.test.ts: |
    import { describe, it, expect } from 'vitest';
    import { createUser } from './factory';

    describe('createUser', () => {
        it('returns user with all fields', () => {
            const user = createUser('Alice', 30);
            expect(user.id).toBeDefined();
            expect(user.name).toBe('Alice');
            expect(user.age).toBe(30);
            expect(user.createdAt).toBeInstanceOf(Date);
        });
    });
  product-factory.ts: |
    export function createProduct(name: string, price: number, category: string) {
        return { id: Date.now().toString(), name, price, category, createdAt: new Date() };
    }

    export function createDiscountedProduct(name: string, price: number, discount: number) {
        return { ...createProduct(name, price, 'sale'), discountPercent: discount };
    }

changed:
  factory.ts: |
    export function createUser(name: string, age: number) {
        return { id: Date.now().toString(), name, age, createdAt: new Date() };
    }

    export function createAdmin(name: string) {
        return { ...createUser(name, 0), role: 'admin' as const, permissions: ['read', 'write', 'delete'] };
    }
  types.ts: |
    import { createUser } from './factory';

    type User = ReturnType<typeof createUser>;

    function processUser(user: User) {
        console.log(`User ${user.name} created at ${user.createdAt}`);
    }
  user-service.ts: |
    import { createUser } from './factory';

    export class UserService {
        private users: ReturnType<typeof createUser>[] = [];

        add(name: string, age: number) {
            this.users.push(createUser(name, age));
        }

        findByName(name: string) {
            return this.users.find(u => u.name === name) ?? null;
        }
    }
  user-factory.test.ts: |
    import { describe, it, expect } from 'vitest';
    import { createUser } from './factory';

    describe('createUser', () => {
        it('returns user with all fields', () => {
            const user = createUser('Alice', 30);
            expect(user.id).toBeDefined();
            expect(user.name).toBe('Alice');
            expect(user.age).toBe(30);
            expect(user.createdAt).toBeInstanceOf(Date);
        });
    });
  product-factory.ts: |
    export function createProduct(name: string, price: number, category: string) {
        return { id: Date.now().toString(), name, price, category, createdAt: new Date() };
    }

    export function createDiscountedProduct(name: string, price: number, discount: number) {
        return { ...createProduct(name, price, 'sale'), discountPercent: discount };
    }

must_include_files:
  - types.ts
  # Q1+Q2: factory.ts defines createUser — reviewer needs to see its return
  # value to understand what ReturnType<typeof createUser> resolves to.
  - factory.ts

must_include_content_from:
  types.ts:
    - "import { createUser } from './factory'"
    - "type User = ReturnType<typeof createUser>"
    - "user.name"
    - "user.createdAt"
  factory.ts:
    - "function createUser(name: string, age: number)"
    - "return { id: Date.now().toString(), name, age, createdAt: new Date() }"

must_not_include:
  # --- user-service.ts: uses createUser and same ReturnType pattern ---
  # Direct edge: imports createUser from same module, even uses
  # ReturnType<typeof createUser>[]. But the service's usage doesn't
  # help review whether processUser accesses valid fields.
  - UserService
  - findByName
  # --- user-factory.test.ts: tests createUser ---
  # Direct edge: imports createUser, asserts field existence.
  # But test expectations don't help review the type derivation.
  - toBeInstanceOf
  - toBeDefined
  # --- product-factory.ts: parallel factory pattern ---
  # HARD TRAP: same factory pattern with similar return shape.
  - createProduct
  - createDiscountedProduct
  - discountPercent

must_not_include_files:
  - user-service.ts
  - user-factory.test.ts
  - product-factory.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
