initial:
  factory.ts: |
    export function createUser(name: string, age: number) {
        return { id: Date.now().toString(), name, age, createdAt: new Date() };
    }
  types.ts: |
    console.log('initial');
  garbage_rate_limiting.ts: |
    const GARBAGE_JS_078_RATELIMIT_MARKER_A = "rate_limiting";
    const GARBAGE_JS_078_WINDOW_MARKER_B = true;

    class RateLimiter {
        static GARBAGE_JS_078_LIMITER_CLASS_C = "limiter";

        isAllowed(clientId: string): boolean {
            return true;
        }
    }
  garbage_feature_flags.ts: |
    const GARBAGE_JS_078_FLAG_MARKER_D = "feature_flags";
    const GARBAGE_JS_078_TOGGLE_MARKER_E = 100;

    class FeatureToggle {
        static GARBAGE_JS_078_TOGGLE_CLASS_F = true;

        isEnabled(flagName: string): boolean {
            return false;
        }
    }
