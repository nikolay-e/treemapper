# Scenario: augmentation.ts extends the User interface via `declare module` to add
# a 'role' field. original.ts defines the base User interface.
#
# Diff: augmentation.ts adds `role?: 'admin' | 'user'` to the User augmentation
# and updates createUserWithEmail to accept an optional role parameter.
#
# Reviewer questions:
#   Q1: "What does the original User interface look like?"
#       -> original.ts (UNCHANGED) defines User with id and name. The augmentation
#          already added email, now adds role. Reviewer needs the base type to
#          understand the full merged interface.
#   Q2: "Is createUser in original.ts affected?"
#       -> original.ts: createUser returns { id, name } — no email, no role.
#          The augmented fields are optional, so it still type-checks.
#
# Not needed:
#   - user-permissions.ts: role-based permission checking with admin/user/guest.
#     Mentions role strings but doesn't use module augmentation. No import edge.
#   - user-serializer.ts: JSON serialization for User objects. Works with User
#     type but doesn't augment it.

initial:
  original.ts: |
    export interface User {
        id: string;
        name: string;
    }

    export function createUser(name: string): User {
        return { id: Date.now().toString(), name };
    }
  augmentation.ts: |
    import { User } from './original';

    declare module './original' {
        interface User {
            email?: string;
        }
    }

    export function createUserWithEmail(name: string, email: string): User {
        return { id: Date.now().toString(), name, email };
    }
  user-permissions.ts: |
    type Role = 'admin' | 'user' | 'guest';

    const permissions: Record<Role, string[]> = {
        admin: ['read', 'write', 'delete'],
        user: ['read', 'write'],
        guest: ['read'],
    };

    export function hasPermission(role: Role, action: string): boolean {
        return permissions[role]?.includes(action) ?? false;
    }
  user-serializer.ts: |
    export function serializeUser(user: { id: string; name: string }): string {
        return JSON.stringify(user);
    }

    export function deserializeUser(json: string): { id: string; name: string } {
        return JSON.parse(json);
    }
changed:
  original.ts: |
    export interface User {
        id: string;
        name: string;
    }

    export function createUser(name: string): User {
        return { id: Date.now().toString(), name };
    }
  augmentation.ts: |
    import { User } from './original';

    declare module './original' {
        interface User {
            email?: string;
            role?: 'admin' | 'user';
        }
    }

    export function createUserWithEmail(name: string, email: string, role?: 'admin' | 'user'): User {
        return { id: Date.now().toString(), name, email, role };
    }
  user-permissions.ts: |
    type Role = 'admin' | 'user' | 'guest';

    const permissions: Record<Role, string[]> = {
        admin: ['read', 'write', 'delete'],
        user: ['read', 'write'],
        guest: ['read'],
    };

    export function hasPermission(role: Role, action: string): boolean {
        return permissions[role]?.includes(action) ?? false;
    }
  user-serializer.ts: |
    export function serializeUser(user: { id: string; name: string }): string {
        return JSON.stringify(user);
    }

    export function deserializeUser(json: string): { id: string; name: string } {
        return JSON.parse(json);
    }
must_include_files:
  # Q1: original.ts defines the base User interface that augmentation.ts extends
  - original.ts
must_include_content_from:
  original.ts:
    - "interface User {"
    - "id: string"
    - "name: string"
must_not_include:
  # user-permissions.ts: permission checking, no module augmentation usage
  - hasPermission
  - permissions
  - guest
  # user-serializer.ts: serialization, doesn't augment the type
  - serializeUser
  - deserializeUser
must_not_include_files:
  - user-permissions.ts
  - user-serializer.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
