# Scenario: Test mocks an API module — reviewer needs both the service and the API.
#
# Diff: service.test.ts is written from scratch. It imports getUserName from
# service.ts, mocks api.ts's fetchUser with jest.mock(), and verifies the
# service returns the user's name.
#
# Reviewer questions:
#   Q1: "What does getUserName do with fetchUser's return value?"
#       -> service.ts (UNCHANGED) imports fetchUser, calls it, and returns user.name.
#          The reviewer must see the real implementation to evaluate the mock.
#   Q2: "What is fetchUser's real signature and return shape?"
#       -> api.ts (UNCHANGED) shows fetchUser(id: string) returns response.json().
#          The mock returns { id: '1', name: 'Test User' } — reviewer verifies this
#          matches the real shape.
#
# Not needed:
#   - user.types.ts: TypeScript interfaces for User. Not imported by service.ts
#     or the test — the service uses implicit types from JSON response.
#   - auth.ts: authentication functions. Different concern, no import edge.

initial:
  api.ts: |
    export async function fetchUser(id: string) {
        const response = await fetch(`/api/users/${id}`);
        return response.json();
    }
  service.ts: |
    import { fetchUser } from './api';

    export async function getUserName(id: string): Promise<string> {
        const user = await fetchUser(id);
        return user.name;
    }
  service.test.ts: |
    console.log('initial');
  user.types.ts: |
    export interface User {
        id: string;
        name: string;
        email: string;
        createdAt: string;
    }

    export type UserSummary = Pick<User, 'id' | 'name'>;
  auth.ts: |
    export function getAuthToken(): string | null {
        return localStorage.getItem('auth_token');
    }

    export function isAuthenticated(): boolean {
        return getAuthToken() !== null;
    }

changed:
  api.ts: |
    export async function fetchUser(id: string) {
        const response = await fetch(`/api/users/${id}`);
        return response.json();
    }
  service.ts: |
    import { fetchUser } from './api';

    export async function getUserName(id: string): Promise<string> {
        const user = await fetchUser(id);
        return user.name;
    }
  service.test.ts: |
    import { getUserName } from './service';
    import { fetchUser } from './api';

    jest.mock('./api');

    const mockedFetchUser = fetchUser as jest.MockedFunction<typeof fetchUser>;

    describe('Service', () => {
        it('should return user name', async () => {
            mockedFetchUser.mockResolvedValue({ id: '1', name: 'Test User' });
            const name = await getUserName('1');
            expect(name).toBe('Test User');
        });
    });
  user.types.ts: |
    export interface User {
        id: string;
        name: string;
        email: string;
        createdAt: string;
    }

    export type UserSummary = Pick<User, 'id' | 'name'>;
  auth.ts: |
    export function getAuthToken(): string | null {
        return localStorage.getItem('auth_token');
    }

    export function isAuthenticated(): boolean {
        return getAuthToken() !== null;
    }

must_include_files:
  # Q1: service.ts shows what getUserName does with fetchUser's result
  - service.ts
  # Q2: api.ts defines fetchUser's real signature
  - api.ts
must_include_content_from:
  service.ts:
    - "import { fetchUser } from './api'"
    - "return user.name"
  api.ts:
    - "function fetchUser(id: string)"
must_not_include:
  # user.types.ts: type definitions not imported by service.ts or the test
  - UserSummary
  - createdAt
  # auth.ts: authentication concern, unrelated to user fetching
  - getAuthToken
  - isAuthenticated
must_not_include_files:
  - user.types.ts
  - auth.ts
max_fragments: 6
max_files: 4
add_garbage_files: false
skip_garbage_check: true
