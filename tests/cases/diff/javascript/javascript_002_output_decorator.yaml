# Scenario: item-row.component.ts is rewritten to import Item from item.model.ts
#   and create an Angular component with @Input/@Output. Only item-row.component.ts changed.
#
# Diff shows:
#   - console.log('initial');
#   + import { Item } from './item.model';
#   + @Component({ ... }) export class ItemRowComponent { @Input() item!: Item; @Output() deleted = ... }
#
# Reviewer questions:
#   Q1: "What fields does Item have — is item.name valid in the template?"
#       -> item.model.ts (UNCHANGED) defines Item with id: string and name: string.
#          Reviewer must verify {{ item.name }} and this.item.id are correct.
#
#   Q2: "Is item.id the right type for EventEmitter<string>?"
#       -> Same file: id is string. deleted emits string. Reviewer needs
#          the interface to confirm type consistency.
#
# Not needed for comprehension:
#   - item-list.component.ts: Parent component rendering ItemRowComponent.
#     DIRECT CONSUMER: uses <app-item-row [item]="..." (deleted)="...">.
#     Direct structural edge. But HOW the parent handles events doesn't
#     help review ItemRowComponent's correctness.
#
#   - item.service.ts: Service providing Item[] via HTTP. Same Item type.
#     DIRECT TYPE OVERLAP. But service data fetching doesn't help review
#     the component's template bindings.

max_enrichment: 5.9
initial:
  item.model.ts: |
    export interface Item {
        id: string;
        name: string;
    }
  item-row.component.ts: |
    console.log('initial');
  item-list.component.ts: |
    import { Component } from '@angular/core';
    import { Item } from './item.model';

    @Component({
        selector: 'app-item-list',
        template: `
            <div class="list">
                <app-item-row
                    *ngFor="let item of items"
                    [item]="item"
                    (deleted)="onItemDeleted($event)">
                </app-item-row>
            </div>
        `
    })
    export class ItemListComponent {
        items: Item[] = [];

        onItemDeleted(id: string): void {
            this.items = this.items.filter(item => item.id !== id);
        }

        addItem(name: string): void {
            this.items.push({ id: Date.now().toString(), name });
        }
    }
  item.service.ts: |
    import { Injectable } from '@angular/core';
    import { HttpClient } from '@angular/common/http';
    import { Observable } from 'rxjs';
    import { Item } from './item.model';

    @Injectable({ providedIn: 'root' })
    export class ItemService {
        constructor(private http: HttpClient) {}

        getItems(): Observable<Item[]> {
            return this.http.get<Item[]>('/api/items');
        }

        deleteItem(id: string): Observable<void> {
            return this.http.delete<void>(`/api/items/${id}`);
        }
    }

changed:
  item.model.ts: |
    export interface Item {
        id: string;
        name: string;
    }
  item-row.component.ts: |
    import { Component, Input, Output, EventEmitter } from '@angular/core';
    import { Item } from './item.model';

    @Component({
        selector: 'app-item-row',
        template: `
            <div class="row">
                <span>{{ item.name }}</span>
                <button (click)="onDelete()">Delete</button>
            </div>
        `
    })
    export class ItemRowComponent {
        @Input() item!: Item;
        @Output() deleted = new EventEmitter<string>();

        onDelete() {
            this.deleted.emit(this.item.id);
        }
    }
  item-list.component.ts: |
    import { Component } from '@angular/core';
    import { Item } from './item.model';

    @Component({
        selector: 'app-item-list',
        template: `
            <div class="list">
                <app-item-row
                    *ngFor="let item of items"
                    [item]="item"
                    (deleted)="onItemDeleted($event)">
                </app-item-row>
            </div>
        `
    })
    export class ItemListComponent {
        items: Item[] = [];

        onItemDeleted(id: string): void {
            this.items = this.items.filter(item => item.id !== id);
        }

        addItem(name: string): void {
            this.items.push({ id: Date.now().toString(), name });
        }
    }
  item.service.ts: |
    import { Injectable } from '@angular/core';
    import { HttpClient } from '@angular/common/http';
    import { Observable } from 'rxjs';
    import { Item } from './item.model';

    @Injectable({ providedIn: 'root' })
    export class ItemService {
        constructor(private http: HttpClient) {}

        getItems(): Observable<Item[]> {
            return this.http.get<Item[]>('/api/items');
        }

        deleteItem(id: string): Observable<void> {
            return this.http.delete<void>(`/api/items/${id}`);
        }
    }

must_include_files:
  - item-row.component.ts
  # Q1+Q2: Item interface defines fields used in template and EventEmitter
  - item.model.ts

must_include_content_from:
  item-row.component.ts:
    - "import { Item } from './item.model'"
    - "@Input() item!: Item"
    - "@Output() deleted = new EventEmitter<string>()"
    - "this.deleted.emit(this.item.id)"
  item.model.ts:
    - "interface Item"
    - "id: string"
    - "name: string"

must_not_include:
  # --- item-list.component.ts: parent component using ItemRowComponent ---
  # DIRECT CONSUMER: renders <app-item-row> with [item] and (deleted).
  # But parent's event handling doesn't help review the child component.
  - ItemListComponent
  - "app-item-list"
  - onItemDeleted
  - addItem
  # --- item.service.ts: HTTP service for Item CRUD ---
  # DIRECT TYPE OVERLAP: imports Item, returns Item[]. But service
  # data fetching doesn't help review component template bindings.
  - ItemService
  - getItems
  - deleteItem

must_not_include_files:
  - item-list.component.ts
  - item.service.ts

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
