# Reviewer sees: Button.stories.tsx creates Storybook stories importing Button.
# Q1: "What props does Button support — are argTypes correct?"
#     -> Button.tsx: label, variant (primary/secondary), size
#        (small/medium/large), onClick. Stories configure matching argTypes.
# Q2: "Are the story args valid for the component?"
#     -> Button.tsx: variant defaults to 'primary', size to 'medium'.
#        Stories pass explicit variants — reviewer confirms validity.
#
# Not needed:
#   - Icon.stories.tsx: stories for a different component. Same
#     Storybook pattern but different subject.
#   - Button.test.tsx: test file. Different testing approach than
#     Storybook visual testing.

initial:
  src/Button.tsx: |
    export interface ButtonProps {
        label: string;
        variant?: 'primary' | 'secondary';
        size?: 'small' | 'medium' | 'large';
        onClick?: () => void;
    }

    export function Button({ label, variant = 'primary', size = 'medium', onClick }: ButtonProps) {
        return (
            <button className={`btn btn-${variant} btn-${size}`} onClick={onClick}>
                {label}
            </button>
        );
    }
  src/Button.stories.tsx: |
    console.log('placeholder');
  src/Icon.stories.tsx: |
    import type { Meta, StoryObj } from '@storybook/react';

    const meta: Meta = {
        title: 'Components/Icon',
    };

    export default meta;
    type Story = StoryObj;

    export const Default: Story = {
        args: { name: 'check', size: 24 },
    };
  src/Button.test.tsx: |
    import { render, screen, fireEvent } from '@testing-library/react';

    describe('Button', () => {
        it('renders label', () => {
            expect(true).toBe(true);
        });
    });
changed:
  src/Button.tsx: |
    export interface ButtonProps {
        label: string;
        variant?: 'primary' | 'secondary';
        size?: 'small' | 'medium' | 'large';
        onClick?: () => void;
    }

    export function Button({ label, variant = 'primary', size = 'medium', onClick }: ButtonProps) {
        return (
            <button className={`btn btn-${variant} btn-${size}`} onClick={onClick}>
                {label}
            </button>
        );
    }
  src/Button.stories.tsx: |
    import type { Meta, StoryObj } from '@storybook/react';
    import { Button, ButtonProps } from './Button';

    const meta: Meta<typeof Button> = {
        title: 'Components/Button',
        component: Button,
        argTypes: {
            variant: { control: 'select', options: ['primary', 'secondary'] },
            size: { control: 'select', options: ['small', 'medium', 'large'] },
        },
    };

    export default meta;
    type Story = StoryObj<typeof Button>;

    export const Primary: Story = {
        args: {
            label: 'Primary Button',
            variant: 'primary',
        },
    };

    export const Secondary: Story = {
        args: {
            label: 'Secondary Button',
            variant: 'secondary',
        },
    };
  src/Icon.stories.tsx: |
    import type { Meta, StoryObj } from '@storybook/react';

    const meta: Meta = {
        title: 'Components/Icon',
    };

    export default meta;
    type Story = StoryObj;

    export const Default: Story = {
        args: { name: 'check', size: 24 },
    };
  src/Button.test.tsx: |
    import { render, screen, fireEvent } from '@testing-library/react';

    describe('Button', () => {
        it('renders label', () => {
            expect(true).toBe(true);
        });
    });
must_include_files:
  # Unchanged file — the component being storied. Reviewer needs
  # to see ButtonProps to verify argTypes and story args are valid.
  - src/Button.tsx
must_include_content_from:
  src/Button.tsx:
    - "ButtonProps"
    - "'primary' | 'secondary'"
must_not_include:
  # Icon.stories.tsx: stories for different component
  - Components/Icon
  # Button.test.tsx: test approach, not visual stories
