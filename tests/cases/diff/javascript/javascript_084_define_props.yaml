must_include_files:
  - Card.vue
  # Q1+Q2: types.ts defines CardProps — reviewer needs to see the interface
  # to verify that template accesses (variant, title, subtitle) are valid
  # and that the v-if guard on subtitle is appropriate for its optional type.
  - types.ts

must_include_content_from:
  Card.vue:
    - "defineProps<CardProps>()"
    - "props.variant"
    - "props.title"
  types.ts:
    - "interface CardProps {"
    - "title: string"
    - "subtitle?: string"
    - "variant: 'primary' | 'secondary'"

must_not_include:
  # --- CardList.vue: consumer of Card, imports and renders it ---
  # Direct structural edge: imports Card.vue and CardProps from types.ts.
  # But HOW the parent iterates cards doesn't help review whether Card's
  # template correctly uses the CardProps fields.
  - CardList
  - card-list
  - v-for
  - "v-bind=\"card\""
  # --- CardPreview.vue: sibling component with identical defineProps pattern ---
  # HARD TRAP: same <script setup>, same defineProps<T>() pattern, same
  # types.ts import. But uses PreviewProps not CardProps. Including it
  # confuses which component is being reviewed.
  - CardPreview
  - PreviewProps
  - imageUrl
  - figcaption
  # --- card-animations.ts: card transition helpers ---
  - cardEnterTransition
  - cardLeaveTransition
  - translateY

must_not_include_files:
  - CardList.vue
  - CardPreview.vue
  - card-animations.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
