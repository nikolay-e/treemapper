# Scenario: App.vue is rewritten from a stub to import and render Counter.vue.
#   Counter.vue uses ref() for reactive state. Only App.vue is changed.
#
# Diff shows:
#   - <template><div>initial</div></template>
#   + <script setup> importing Counter from './Counter.vue'
#   + Template renders <Counter /> inside a layout
#
# Reviewer questions:
#   Q1: "What does Counter expose — does it need any props?"
#       -> Counter.vue (UNCHANGED) uses internal ref(0) and an increment
#          function. No props required. Reviewer verifies <Counter /> with
#          no attributes is a valid usage.
#
#   Q2: "What does Counter render — is the parent layout compatible?"
#       -> Counter.vue: renders <button @click="increment">{{ count }}</button>.
#          A standalone clickable element that works inside a <div> wrapper.
#
# Not needed for comprehension:
#   - Timer.vue: Sibling component that also uses ref() for reactive state
#     (seconds counter with setInterval). Same composition API pattern.
#     HARD TRAP: identical ref() reactive pattern, same <script setup> structure.
#     But it's a different component not related to the App -> Counter flow.
#
#   - counter-store.ts: Pinia store for global counter state with increment/
#     decrement actions. Same "counter" domain but external state management.
#     HARD TRAP: same counter concept, but Counter.vue uses local ref() not
#     this store. Including it would confuse which state mechanism is used.
#
#   - App.test.ts: Test file that mounts App and checks for Counter rendering.
#     Direct structural edge — imports App.vue. But test assertions verify
#     mounting behavior, not component composition correctness.

initial:
  Counter.vue: |
    <script setup lang="ts">
    import { ref } from 'vue';

    const count = ref(0);

    function increment() {
        count.value++;
    }
    </script>

    <template>
        <button @click="increment">{{ count }}</button>
    </template>
  App.vue: |
    <template><div>initial</div></template>
  Timer.vue: |
    <script setup lang="ts">
    import { ref, onMounted, onUnmounted } from 'vue';

    const seconds = ref(0);
    let intervalId: number;

    onMounted(() => {
        intervalId = setInterval(() => { seconds.value++; }, 1000);
    });

    onUnmounted(() => {
        clearInterval(intervalId);
    });
    </script>

    <template>
        <span>{{ seconds }}s</span>
    </template>
  counter-store.ts: |
    import { ref } from 'vue';

    const globalCount = ref(0);

    export function useCounterStore() {
        function increment() { globalCount.value++; }
        function decrement() { globalCount.value--; }
        function reset() { globalCount.value = 0; }
        return { count: globalCount, increment, decrement, reset };
    }
  App.test.ts: |
    import { mount } from '@vue/test-utils';
    import App from './App.vue';
    import Counter from './Counter.vue';

    describe('App', () => {
        it('renders Counter component', () => {
            const wrapper = mount(App);
            expect(wrapper.findComponent(Counter).exists()).toBe(true);
        });

        it('displays heading', () => {
            const wrapper = mount(App);
            expect(wrapper.find('h1').text()).toBe('App');
        });
    });

changed:
  Counter.vue: |
    <script setup lang="ts">
    import { ref } from 'vue';

    const count = ref(0);

    function increment() {
        count.value++;
    }
    </script>

    <template>
        <button @click="increment">{{ count }}</button>
    </template>
  App.vue: |
    <script setup lang="ts">
    import Counter from './Counter.vue';
    </script>

    <template>
        <div>
            <h1>App</h1>
            <Counter />
        </div>
    </template>
  Timer.vue: |
    <script setup lang="ts">
    import { ref, onMounted, onUnmounted } from 'vue';

    const seconds = ref(0);
    let intervalId: number;

    onMounted(() => {
        intervalId = setInterval(() => { seconds.value++; }, 1000);
    });

    onUnmounted(() => {
        clearInterval(intervalId);
    });
    </script>

    <template>
        <span>{{ seconds }}s</span>
    </template>
  counter-store.ts: |
    import { ref } from 'vue';

    const globalCount = ref(0);

    export function useCounterStore() {
        function increment() { globalCount.value++; }
        function decrement() { globalCount.value--; }
        function reset() { globalCount.value = 0; }
        return { count: globalCount, increment, decrement, reset };
    }
  App.test.ts: |
    import { mount } from '@vue/test-utils';
    import App from './App.vue';
    import Counter from './Counter.vue';

    describe('App', () => {
        it('renders Counter component', () => {
            const wrapper = mount(App);
            expect(wrapper.findComponent(Counter).exists()).toBe(true);
        });

        it('displays heading', () => {
            const wrapper = mount(App);
            expect(wrapper.find('h1').text()).toBe('App');
        });
    });

must_include_files:
  - App.vue
  # Q1+Q2: Counter.vue defines the component that App imports — reviewer
  # needs to see it has no required props and what it renders.
  - Counter.vue

must_include_content_from:
  App.vue:
    - "import Counter from './Counter.vue'"
    - "<Counter />"
  Counter.vue:
    - "const count = ref(0)"
    - "function increment()"
    - "@click=\"increment\""

must_not_include:
  # --- Timer.vue: sibling component with identical ref() pattern ---
  # HARD TRAP: same <script setup>, same ref() reactive pattern, same
  # lifecycle hooks. But different component, not imported by App.
  - Timer
  - seconds
  - setInterval
  - clearInterval
  # --- counter-store.ts: global counter store, same "counter" domain ---
  # HARD TRAP: same counter concept, ref-based. But Counter.vue uses
  # local ref(), not this store. Including it confuses the state source.
  - useCounterStore
  - globalCount
  - decrement
  # --- App.test.ts: tests the changed component ---
  # Direct edge — imports App.vue. But test assertions don't help
  # review component composition correctness.
  - findComponent
  - "@vue/test-utils"

must_not_include_files:
  - Timer.vue
  - counter-store.ts
  - App.test.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
