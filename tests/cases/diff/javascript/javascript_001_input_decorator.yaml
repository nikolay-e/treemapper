# Scenario: Angular component gains @Input() binding with imported User type.
#
# Diff: user-card.component.ts is rewritten from scratch as an Angular component
# that imports User from user.model.ts and declares @Input() user!: User.
#
# Reviewer questions:
#   Q1: "Does User have the fields used in the template (name, email)?"
#       -> user.model.ts (UNCHANGED) defines User with id, name, email.
#          The template uses user.name and user.email — reviewer confirms they exist.
#
# Not needed:
#   - user-list.component.ts: sibling Angular component rendering users in a list.
#     Same domain but different component, no import from user-card.
#   - user.service.ts: HTTP service fetching users. Different layer (data vs view),
#     not imported by the component.

max_enrichment: 3.0
initial:
  user.model.ts: |
    export interface User {
        id: string;
        name: string;
        email: string;
    }
  user-card.component.ts: |
    console.log('initial');
  user-list.component.ts: |
    import { Component } from '@angular/core';

    @Component({
        selector: 'app-user-list',
        template: `<ul><li *ngFor="let u of users">{{ u.id }}</li></ul>`
    })
    export class UserListComponent {
        users: any[] = [];
    }
  user.service.ts: |
    import { Injectable } from '@angular/core';
    import { HttpClient } from '@angular/common/http';

    @Injectable({ providedIn: 'root' })
    export class UserService {
        constructor(private http: HttpClient) {}

        getUsers() {
            return this.http.get('/api/users');
        }
    }

changed:
  user.model.ts: |
    export interface User {
        id: string;
        name: string;
        email: string;
    }
  user-card.component.ts: |
    import { Component, Input } from '@angular/core';
    import { User } from './user.model';

    @Component({
        selector: 'app-user-card',
        template: `
            <div class="card">
                <h3>{{ user.name }}</h3>
                <p>{{ user.email }}</p>
            </div>
        `
    })
    export class UserCardComponent {
        @Input() user!: User;
    }
  user-list.component.ts: |
    import { Component } from '@angular/core';

    @Component({
        selector: 'app-user-list',
        template: `<ul><li *ngFor="let u of users">{{ u.id }}</li></ul>`
    })
    export class UserListComponent {
        users: any[] = [];
    }
  user.service.ts: |
    import { Injectable } from '@angular/core';
    import { HttpClient } from '@angular/common/http';

    @Injectable({ providedIn: 'root' })
    export class UserService {
        constructor(private http: HttpClient) {}

        getUsers() {
            return this.http.get('/api/users');
        }
    }

must_include_files:
  # Q1: user.model.ts defines User — reviewer verifies template fields match interface
  - user.model.ts
must_include_content_from:
  user.model.ts:
    - "interface User {"
    - "name: string"
    - "email: string"
must_not_include:
  # user-list.component.ts: sibling component, no @Input binding to verify
  - UserListComponent
  # user.service.ts: HTTP layer, unrelated to component input binding
  - UserService
  - getUsers
must_not_include_files:
  - user-list.component.ts
  - user.service.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
