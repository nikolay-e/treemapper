repo:
  initial_files:
    payment_processor.rb: |
      class PaymentProcessor
        def execute(amount)
          validated = validate_amount(amount)
          format_receipt(validated)
        end

        private

        def validate_amount(amount)
          raise "Invalid amount" if amount.nil? || amount <= 0
          amount
        end

        def format_receipt(amount)
          "Receipt: $#{'%.2f' % amount}"
        end

        def log_transaction(amount)
          puts "[#{Time.now}] Processed: $#{amount}"
        end
      end
    app.rb: |
      puts 'Application starting'
    input_sanitizer.rb: |
      module InputSanitizer
        STRIP_TAGS = /<[^>]*>/
        STRIP_WHITESPACE = /\s+/

        def self.clean(input)
          input.gsub(STRIP_TAGS, '').gsub(STRIP_WHITESPACE, ' ').strip
        end

        def self.escape_html(text)
          text.gsub('&', '&amp;').gsub('<', '&lt;').gsub('>', '&gt;')
        end

        def self.truncate(text, length: 100)
          text.length > length ? text[0...length] + '...' : text
        end
      end
    currency_converter.rb: |
      class CurrencyConverter
        RATES = { usd_to_eur: 0.85, usd_to_gbp: 0.73, eur_to_usd: 1.18, gbp_to_usd: 1.37 }.freeze

        def convert(amount, from_to)
          rate = RATES.fetch(from_to) { raise "Unknown rate: #{from_to}" }
          (amount * rate).round(2)
        end

        def available_conversions
          RATES.keys
        end

        def rate_for(from_to)
          RATES.fetch(from_to, nil)
        end
      end
    refund_processor.rb: |
      class RefundProcessor
        def execute(amount)
          validated = validate_amount(amount)
          format_receipt(validated)
        end

        private

        def validate_amount(amount)
          raise "Invalid refund amount" if amount.nil? || amount <= 0
          raise "Refund exceeds limit" if amount > 10000
          amount
        end

        def format_receipt(amount)
          "Refund Receipt: -$#{'%.2f' % amount}"
        end

        def notify_customer(amount)
          puts "Refund of $#{amount} processed"
        end
      end
    transaction_log.rb: |
      class TransactionLog
        def initialize(log_file = 'transactions.log')
          @log_file = log_file
          @entries = []
        end

        def record(processor_class, amount, status)
          entry = {
            processor: processor_class.name,
            amount: amount,
            status: status,
            timestamp: Time.now
          }
          @entries << entry
        end

        def recent(count = 10)
          @entries.last(count)
        end

        def total_processed
          @entries.select { |e| e[:status] == :success }.sum { |e| e[:amount] }
        end
      end
    lib/receipt_template.rb: |
      module ReceiptTemplate
        def self.html(amount, description: 'Payment')
          <<~HTML
            <div class="receipt">
              <h2>#{description}</h2>
              <p class="amount">$#{'%.2f' % amount}</p>
              <p class="date">#{Time.now.strftime('%Y-%m-%d')}</p>
            </div>
          HTML
        end

        def self.text(amount, description: 'Payment')
          "#{description}: $#{'%.2f' % amount} on #{Time.now.strftime('%Y-%m-%d')}"
        end
      end
  changed_files:
    payment_processor.rb: |
      class PaymentProcessor
        def execute(amount)
          validated = validate_amount(amount)
          format_receipt(validated)
        end

        private

        def validate_amount(amount)
          raise "Invalid amount" if amount.nil? || amount <= 0
          amount
        end

        def format_receipt(amount)
          "Receipt: $#{'%.2f' % amount}"
        end

        def log_transaction(amount)
          puts "[#{Time.now}] Processed: $#{amount}"
        end
      end
    app.rb: |
      require_relative 'payment_processor'

      processor = PaymentProcessor.new
      result = processor.execute(150.00)
      puts result
  commit_message: Update files
