name: rust_035_lifetime_annotations
tags:
- lang:python
- change:config
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    config/iot_settings.py: |
      MQTT_BROKER_HOST = "mqtt.local"
      MQTT_BROKER_PORT = 1883
      MQTT_KEEPALIVE = 60
      DEVICE_POLL_INTERVAL = 5
      MAX_RECONNECT_ATTEMPTS = 3
    sensors/temperature_reader.py: |
      from config.iot_settings import MQTT_BROKER_HOST, MQTT_BROKER_PORT, DEVICE_POLL_INTERVAL

      class TemperatureReader:
          def __init__(self):
              self.broker = MQTT_BROKER_HOST
              self.port = MQTT_BROKER_PORT
              self.interval = DEVICE_POLL_INTERVAL

          def start(self):
              pass

          def read(self):
              return 0.0
    sensors/humidity_reader.py: |
      from config.iot_settings import MQTT_BROKER_HOST, MQTT_BROKER_PORT

      class HumidityReader:
          def __init__(self):
              self.broker = MQTT_BROKER_HOST
              self.port = MQTT_BROKER_PORT

          def start(self):
              pass

          def read(self):
              return 0.0
    services/aggregator.py: |
      from sensors.temperature_reader import TemperatureReader
      from sensors.humidity_reader import HumidityReader

      class SensorAggregator:
          def __init__(self):
              self.temp = TemperatureReader()
              self.humidity = HumidityReader()

          def collect(self):
              return {
                  "temperature": self.temp.read(),
                  "humidity": self.humidity.read(),
              }
    garbage/GameAchievement.py: |
      # GARBAGE_RUST035_A = "game_achievement_marker"

      class GameAchievement:
          name = "badge"
    garbage/PaymentWebhook.py: |
      # GARBAGE_RUST035_B = "payment_webhook_marker"

      class PaymentWebhook:
          endpoint = "/webhook"
    garbage/StreamRelay.py: |
      # GARBAGE_RUST035_C = "stream_relay_marker"

      class StreamRelay:
          buffer_size = 4096
  changed_files:
    config/iot_settings.py: |
      MQTT_BROKER_HOST = "mqtt.local"
      MQTT_BROKER_PORT = 8883
      MQTT_USE_TLS = True
      MQTT_KEEPALIVE = 60
      DEVICE_POLL_INTERVAL = 5
      MAX_RECONNECT_ATTEMPTS = 5
    sensors/temperature_reader.py: |
      from config.iot_settings import MQTT_BROKER_HOST, MQTT_BROKER_PORT, MQTT_USE_TLS, DEVICE_POLL_INTERVAL

      class TemperatureReader:
          def __init__(self):
              self.broker = MQTT_BROKER_HOST
              self.port = MQTT_BROKER_PORT
              self.use_tls = MQTT_USE_TLS
              self.interval = DEVICE_POLL_INTERVAL

          def start(self):
              pass

          def read(self):
              return 0.0
    sensors/humidity_reader.py: |
      from config.iot_settings import MQTT_BROKER_HOST, MQTT_BROKER_PORT, MQTT_USE_TLS

      class HumidityReader:
          def __init__(self):
              self.broker = MQTT_BROKER_HOST
              self.port = MQTT_BROKER_PORT
              self.use_tls = MQTT_USE_TLS

          def start(self):
              pass

          def read(self):
              return 0.0
    services/aggregator.py: |
      from sensors.temperature_reader import TemperatureReader
      from sensors.humidity_reader import HumidityReader

      class SensorAggregator:
          def __init__(self):
              self.temp = TemperatureReader()
              self.humidity = HumidityReader()

          def collect(self):
              return {
                  "temperature": self.temp.read(),
                  "humidity": self.humidity.read(),
              }
    garbage/GameAchievement.py: |
      # GARBAGE_RUST035_A = "game_achievement_marker"

      class GameAchievement:
          name = "badge"
    garbage/PaymentWebhook.py: |
      # GARBAGE_RUST035_B = "payment_webhook_marker"

      class PaymentWebhook:
          endpoint = "/webhook"
    garbage/StreamRelay.py: |
      # GARBAGE_RUST035_C = "stream_relay_marker"

      class StreamRelay:
          buffer_size = 4096
  commit_message: "config: switch MQTT to TLS port 8883, bump reconnect attempts to 5"
fragments:
- id: config_tls_port
  selector:
    path: config/iot_settings.py
    anchor: "MQTT_BROKER_PORT = 8883"
- id: config_use_tls
  selector:
    path: config/iot_settings.py
    anchor: "MQTT_USE_TLS = True"
- id: config_reconnect
  selector:
    path: config/iot_settings.py
    anchor: "MAX_RECONNECT_ATTEMPTS = 5"
- id: temp_tls_import
  selector:
    path: sensors/temperature_reader.py
    anchor: "MQTT_USE_TLS"
- id: temp_tls_usage
  selector:
    path: sensors/temperature_reader.py
    anchor: "self.use_tls = MQTT_USE_TLS"
- id: humidity_tls_import
  selector:
    path: sensors/humidity_reader.py
    anchor: "MQTT_USE_TLS"
- id: no_aggregator
  selector:
    path: services/aggregator.py
- id: no_garbage_a
  selector:
    anchor: GARBAGE_RUST035_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_RUST035_B
- id: no_garbage_c
  selector:
    anchor: GARBAGE_RUST035_C
oracle:
  required:
  - config_tls_port
  - config_use_tls
  - temp_tls_import
  - temp_tls_usage
  - humidity_tls_import
  allowed:
  - config_reconnect
  forbidden:
  - no_aggregator
  - no_garbage_a
  - no_garbage_b
  - no_garbage_c
