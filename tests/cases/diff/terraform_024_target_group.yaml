name: terraform_024_target_group
repo:
  initial_files:
    lb.tf: |
      resource "aws_lb" "main" {
        name = "main-alb"
      }
    admin_target.tf: |
      resource "aws_lb_target_group" "admin" {
        name        = "admin-tg"
        port        = 9090
        protocol    = "HTTP"
        vpc_id      = aws_vpc.main.id
        target_type = "ip"

        health_check {
          path                = "/admin/health"
          healthy_threshold   = 3
          unhealthy_threshold = 5
          timeout             = 10
          interval            = 60
        }
      }
    app.py: |
      from flask import Flask
      app = Flask(__name__)

      @app.route('/health')
      def health():
          return 'OK', 200
  changed_files:
    lb.tf: |
      resource "aws_lb" "main" {
        name = "main-alb"
      }

      resource "aws_lb_target_group" "app" {
        name        = "app-tg"
        port        = 8080
        protocol    = "HTTP"
        vpc_id      = aws_vpc.main.id
        target_type = "ip"

        health_check {
          path                = "/health"
          healthy_threshold   = 2
          unhealthy_threshold = 10
          timeout             = 5
          interval            = 30
        }
      }
    admin_target.tf: |
      resource "aws_lb_target_group" "admin" {
        name        = "admin-tg"
        port        = 9090
        protocol    = "HTTP"
        vpc_id      = aws_vpc.main.id
        target_type = "ip"

        health_check {
          path                = "/admin/health"
          healthy_threshold   = 3
          unhealthy_threshold = 5
          timeout             = 10
          interval            = 60
        }
      }
    app.py: |
      from flask import Flask
      app = Flask(__name__)

      @app.route('/health')
      def health():
          return 'OK', 200
  commit_message: Update files
