    config/rate_limits.json: |
      {
        "default_rpm": 60,
        "default_burst": 10,
        "endpoints": {
          "/api/search": {"rpm": 30},
          "/api/upload": {"rpm": 5}
        }
      }
    src/rate_limiter.py: |
      import json

      with open("config/rate_limits.json") as f:
          rate_cfg = json.load(f)

      DEFAULT_RPM = rate_cfg["default_rpm"]
      DEFAULT_BURST = rate_cfg["default_burst"]

      def get_limit(endpoint):
          endpoints = rate_cfg.get("endpoints", {})
          ep_cfg = endpoints.get(endpoint, {})
          return ep_cfg.get("rpm", DEFAULT_RPM)
