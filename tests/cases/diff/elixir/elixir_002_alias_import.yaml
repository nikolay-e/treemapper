# Scenario: An Elixir module adds a new query function that uses an aliased
# schema and imported Ecto.Query macros. The reviewer needs the schema definition
# to verify the query references valid fields.
#
# Diff: lib/myapp/accounts/queries.ex adds find_active_users/1 which queries
# User schema filtering by :active status and ordering by :inserted_at.
# Uses `alias MyApp.Accounts.User` and `import Ecto.Query`.
#
# Reviewer questions:
#   Q1: "Does the User schema have a :status field with 'active' as a value?"
#       -> lib/myapp/accounts/user.ex (UNCHANGED): schema has
#          `field :status, :string, default: "active"` — confirmed.
#
#   Q2: "Does User have :inserted_at for the order_by clause?"
#       -> lib/myapp/accounts/user.ex: uses `timestamps()` which provides
#          :inserted_at and :updated_at automatically.
#
# Not needed for comprehension:
#   - lib/myapp/accounts/team.ex: Another schema in same context.
#     STRUCTURAL TRAP: same Ecto.Schema pattern, same directory.
#     But Team has different fields, not queried here.
#
#   - lib/myapp/accounts/admin.ex: Schema that also has :status field.
#     HARDEST TRAP: has `field :status, :string` just like User.
#     But admin accounts are queried separately.
#
#   - lib/myapp/repo.ex: The Ecto Repo module.
#     Referenced indirectly (Repo.all) but the query construction
#     is what the reviewer needs to verify, not the repo adapter.

max_enrichment: 13.7
initial:
  lib/myapp/accounts/user.ex: |
    defmodule MyApp.Accounts.User do
      use Ecto.Schema
      import Ecto.Changeset

      schema "users" do
        field :name, :string
        field :email, :string
        field :status, :string, default: "active"
        field :role, :string, default: "member"

        timestamps()
      end

      def changeset(user, attrs) do
        user
        |> cast(attrs, [:name, :email, :status, :role])
        |> validate_required([:name, :email])
        |> unique_constraint(:email)
      end
    end
  lib/myapp/accounts/queries.ex: |
    defmodule MyApp.Accounts.Queries do
      import Ecto.Query
      alias MyApp.Accounts.User

      def find_by_email(email) do
        from(u in User, where: u.email == ^email)
      end
    end
