name: elixir_002_alias_import
repo:
  initial_files:
    lib/myapp/accounts/user.ex: |
      defmodule MyApp.Accounts.User do
        use Ecto.Schema
        import Ecto.Changeset

        schema "users" do
          field :name, :string
          field :email, :string
          field :status, :string, default: "active"
          field :role, :string, default: "member"

          timestamps()
        end

        def changeset(user, attrs) do
          user
          |> cast(attrs, [:name, :email, :status, :role])
          |> validate_required([:name, :email])
          |> unique_constraint(:email)
        end
      end
    lib/myapp/accounts/queries.ex: |
      defmodule MyApp.Accounts.Queries do
        import Ecto.Query
        alias MyApp.Accounts.User

        def find_by_email(email) do
          from(u in User, where: u.email == ^email)
        end
      end
    lib/myapp/accounts/team.ex: |
      defmodule MyApp.Accounts.Team do
        use Ecto.Schema
        import Ecto.Changeset

        schema "teams" do
          field :name, :string
          field :description, :string
          field :max_members, :integer, default: 10

          timestamps()
        end

        def changeset(team, attrs) do
          team
          |> cast(attrs, [:name, :description, :max_members])
          |> validate_required([:name])
        end

        def garbage_marker_a, do: "GARBAGE_ELIXIR_002_A_TEAM_LIMIT"
        def garbage_marker_b, do: "GARBAGE_ELIXIR_002_B_TEAM_SLUG"
      end
    lib/myapp/accounts/admin.ex: |
      defmodule MyApp.Accounts.Admin do
        use Ecto.Schema
        import Ecto.Changeset

        schema "admins" do
          field :username, :string
          field :status, :string, default: "active"
          field :permissions, {:array, :string}, default: []

          timestamps()
        end

        def changeset(admin, attrs) do
          admin
          |> cast(attrs, [:username, :status, :permissions])
          |> validate_required([:username])
        end

        def garbage_marker_c, do: "GARBAGE_ELIXIR_002_C_ADMIN_PERMS"
        def garbage_marker_d, do: "GARBAGE_ELIXIR_002_D_SUPERADMIN"
      end
