  lib/myapp/accounts/queries.ex: |
    defmodule MyApp.Accounts.Queries do
      import Ecto.Query
      alias MyApp.Accounts.User

      def find_by_email(email) do
        from(u in User, where: u.email == ^email)
      end

      def find_active_users(limit \\ 50) do
        from(u in User,
          where: u.status == "active",
          order_by: [desc: u.inserted_at],
          limit: ^limit
        )
      end
    end
