must_include_files:
  - config/config.exs
  - lib/myapp/gateway.ex

must_include_content_from:
  config/config.exs:
    - "rate_limit: 200"
    - "rate_window_ms: 30_000"
  lib/myapp/gateway.ex:
    - "Keyword.get(config, :rate_limit, 100)"
    - "Keyword.get(config, :rate_window_ms, 60_000)"
    - "count < state.rate_limit"

must_not_include:
  # --- config/dev.exs: dev overrides, not how config is consumed ---
  - GARBAGE_ELIXIR_005_A_DEV_PORT
  - GARBAGE_ELIXIR_005_B_DEV_LOG
  - show_sensitive_data_on_connection_error
  # --- rate_limiter.ex: separate rate limiter, not used by Gateway ---
  - GARBAGE_ELIXIR_005_C_BUCKET
  - GARBAGE_ELIXIR_005_D_SLIDING
  - MyApp.RateLimiter
  # --- mailer.ex: another configured module, unrelated ---
  - GARBAGE_ELIXIR_005_E_SMTP_HOST
  - send_welcome
  - Bamboo.SMTPAdapter

must_not_include_files:
  - config/dev.exs
  - lib/myapp/rate_limiter.ex
  - lib/myapp/mailer.ex

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
