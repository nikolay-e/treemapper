  lib/myapp/workers/order_processor.ex: |
    defmodule MyApp.Workers.OrderProcessor do
      use GenServer

      def start_link(opts) do
        GenServer.start_link(__MODULE__, opts, name: __MODULE__)
      end

      @impl true
      def init(_opts) do
        {:ok, %{orders: [], processed_count: 0}}
      end

      @impl true
      def handle_call(:get_count, _from, state) do
        {:reply, state.processed_count, state}
      end

      @impl true
      def handle_call(:process_batch, _from, state) do
        results = Enum.map(state.orders, fn order ->
          process_single_order(order)
        end)

        new_count = state.processed_count + length(results)
        summary = %{processed: length(results), total: new_count}

        {:reply, summary, %{state | orders: [], processed_count: new_count}}
      end

      @impl true
      def handle_cast({:enqueue, order}, state) do
        {:noreply, %{state | orders: state.orders ++ [order]}}
      end

      defp process_single_order(order) do
        %{order | status: "completed"}
      end
    end
