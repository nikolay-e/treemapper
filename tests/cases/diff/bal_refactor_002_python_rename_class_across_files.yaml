  changed_files:
    models/payment.py: |
      class BillingService:
          def __init__(self, gateway):
              self.gateway = gateway

          def charge(self, amount, currency):
              return self.gateway.submit(amount, currency)

          def refund(self, transaction_id):
              return self.gateway.reverse(transaction_id)
    handlers/checkout.py: |
      from models.payment import BillingService

      def process_checkout(cart, gateway):
          billing = BillingService(gateway)
          total = sum(item.price for item in cart.items)
          return billing.charge(total, cart.currency)
    handlers/refund.py: |
      from models.payment import BillingService

      def handle_refund(transaction_id, gateway):
          billing = BillingService(gateway)
          return billing.refund(transaction_id)
    utils/formatting.py: |
