name: bal_refactor_002_python_rename_class_across_files
tags:
- lang:python
- change:multi_file
- change:refactor
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    models/payment.py: |
      class PaymentProcessor:
          def __init__(self, gateway):
              self.gateway = gateway

          def charge(self, amount, currency):
              return self.gateway.submit(amount, currency)

          def refund(self, transaction_id):
              return self.gateway.reverse(transaction_id)
    handlers/checkout.py: |
      from models.payment import PaymentProcessor

      def process_checkout(cart, gateway):
          processor = PaymentProcessor(gateway)
          total = sum(item.price for item in cart.items)
          return processor.charge(total, cart.currency)
    handlers/refund.py: |
      from models.payment import PaymentProcessor

      def handle_refund(transaction_id, gateway):
          processor = PaymentProcessor(gateway)
          return processor.refund(transaction_id)
    utils/formatting.py: |
      GARBAGE_REFACTOR_002_FORMAT_MARKER_A = "formatting"
      GARBAGE_REFACTOR_002_LOCALE_MARKER_B = "en_US"

