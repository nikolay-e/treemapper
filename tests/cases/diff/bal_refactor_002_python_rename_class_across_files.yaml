repo:
  initial_files:
    pkg/encoding/base58.go: |
      package encoding

      const alphabet = "123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz"

      func Encode(input []byte) string {
          if len(input) == 0 {
              return ""
          }
          result := []byte{}
          for _, b := range input {
              carry := int(b)
              for i := len(result) - 1; i >= 0; i-- {
                  carry += 256 * int(result[i])
                  result[i] = byte(carry % 58)
                  carry /= 58
              }
              for carry > 0 {
                  result = append(result, byte(carry%58))
                  carry /= 58
              }
          }
          // BUG: result not reversed before encoding
          out := make([]byte, len(result))
          for i, b := range result {
              out[i] = alphabet[b]
          }
          return string(out)
      }
    pkg/wallet/address.go: |
      package wallet

      import "pkg/encoding"

      type Address struct {
          Raw []byte
      }

      func NewAddress(raw []byte) Address {
          return Address{Raw: raw}
      }

      func (a Address) String() string {
          return encoding.Encode(a.Raw)
      }
    internal/blockchain/tx.go: |
      package blockchain

      import "pkg/wallet"

      type Transaction struct {
          From wallet.Address
          To   wallet.Address
          Amt  int64
      }

      func NewTransaction(from, to wallet.Address, amt int64) Transaction {
          return Transaction{From: from, To: to, Amt: amt}
      }

      func (t Transaction) Valid() bool {
          return len(t.From.Raw) > 0 && len(t.To.Raw) > 0 && t.Amt > 0
      }
    internal/api/send_handler.go: |
      package api

      import "internal/blockchain"

      func HandleSend(fromRaw, toRaw []byte, amt int64) (string, error) {
          tx := blockchain.NewTransaction(
              blockchain.Transaction{}.From, // placeholder
              blockchain.Transaction{}.To,
              amt,
          )
          if !tx.Valid() {
              return "", nil
          }
          return tx.From.String(), nil
      }
