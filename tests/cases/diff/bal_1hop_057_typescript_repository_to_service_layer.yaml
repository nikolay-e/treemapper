name: bal_1hop_057_typescript_repository_to_service_layer
tags:
- lang:typescript
- change:signature
- change:single_file
- context:import_chain
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    src/repo/bookRepository.ts: |
      export interface Book {
        isbn: string;
        title: string;
        author: string;
        year: number;
      }

      const books: Book[] = [];

      export function addBook(book: Book): void {
        books.push(book);
      }

      export function findByIsbn(isbn: string): Book | undefined {
        return books.find(b => b.isbn === isbn);
      }

      export function findByAuthor(author: string): Book[] {
        return books.filter(b => b.author === author);
      }

      export function getAllBooks(): Book[] {
        return [...books];
      }
    src/service/libraryService.ts: |
      import { Book, addBook, findByIsbn, findByAuthor, getAllBooks } from '../repo/bookRepository';

      export function registerBook(isbn: string, title: string, author: string, year: number): Book {
        const existing = findByIsbn(isbn);
        if (existing) {
          throw new Error(`Book with ISBN ${isbn} already exists`);
        }
        const book: Book = { isbn, title, author, year };
        addBook(book);
        return book;
      }

      export function searchByAuthor(author: string): Book[] {
        return findByAuthor(author);
      }

      export function catalogSize(): number {
        return getAllBooks().length;
      }
    src/api/bookRoutes.ts: |
      export function handleGetBooks(): string {
        return '[]';
      }

      export function handlePostBook(body: string): string {
        return `{"created": true, "body": "${body}"}`;
      }
    src/util/isbnValidator.ts: |
      export function isValidIsbn13(isbn: string): boolean {
        if (isbn.length !== 13) return false;
        return /^\d{13}$/.test(isbn);
      }
    src/report/catalogReport.ts: |
      export function generateCatalogCsv(rows: string[][]): string {
        return rows.map(r => r.join(',')).join('\n');
      }
    src/config/libraryConfig.ts: |
      export const LIBRARY_CONFIG = {
        maxBooksPerUser: 10,
        loanDurationDays: 14,
        finePerDay: 0.5,
      };
  changed_files:
    src/repo/bookRepository.ts: |
      export interface Book {
        isbn: string;
        title: string;
        author: string;
        year: number;
        tags: string[];
        available: boolean;
      }

      const books: Book[] = [];

      export function addBook(book: Book): void {
        books.push(book);
      }

      export function findByIsbn(isbn: string): Book | undefined {
        return books.find(b => b.isbn === isbn);
      }

      export function findByAuthor(author: string): Book[] {
        return books.filter(b => b.author === author);
      }

      export function findByTag(tag: string): Book[] {
        return books.filter(b => b.tags.includes(tag));
      }

      export function findAvailable(): Book[] {
        return books.filter(b => b.available);
      }

      export function getAllBooks(): Book[] {
        return [...books];
      }

      export function updateAvailability(isbn: string, available: boolean): boolean {
        const book = findByIsbn(isbn);
        if (!book) return false;
        book.available = available;
        return true;
      }
  commit_message: "feat: add tags, availability tracking and new query methods"
