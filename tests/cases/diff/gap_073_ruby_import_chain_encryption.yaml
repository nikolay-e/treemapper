    lib/crypto/hasher.rb: |
      require_relative 'encoder'

      module Crypto
        class Hasher
          def initialize(encoder)
            @encoder = encoder
          end

          def digest(data)
            encoded = @encoder.encode(data)
            encoded.bytes.reduce(0) { |acc, b| (acc * 31 + b) & 0xFFFFFFFF }
          end

          def hmac(data, secret)
            inner = digest("#{secret}:#{data}")
            outer = digest("#{inner}:#{secret}")
            outer.to_s(16).rjust(8, '0')
          end
        end
      end
