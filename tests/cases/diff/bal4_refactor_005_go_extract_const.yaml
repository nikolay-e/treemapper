repo:
  initial_files:
    pkg/timeout/timeout.go: |
      package timeout

      import "time"

      func Wait() {
          time.Sleep(30 * time.Second)
      }

      func Retry() {
          time.Sleep(30 * time.Second)
      }
    pkg/client/client.go: |
      package client

      import "app/pkg/timeout"

      func Fetch(url string) {
          timeout.Wait()
      }
    garbage_auth.go: |
      package garbage

      GARBAGE_BAL4R005_AUTH_A = "auth"
      GARBAGE_BAL4R005_TOKEN_B = "bearer"

      type Token struct {
          GARBAGE_BAL4R005_TOK_C bool
      }
    garbage_router.go: |
      package garbage

      GARBAGE_BAL4R005_ROUTE_D = "router"
      GARBAGE_BAL4R005_PATH_E = "/api"
  changed_files:
    pkg/timeout/timeout.go: |
      package timeout

      import "time"

      const DefaultTimeout = 30 * time.Second

      func Wait() {
          time.Sleep(DefaultTimeout)
      }

      func Retry() {
          time.Sleep(DefaultTimeout)
      }
    pkg/client/client.go: |
      package client

      import "app/pkg/timeout"

      func Fetch(url string) {
          timeout.Wait()
      }
    garbage_auth.go: |
      package garbage

      GARBAGE_BAL4R005_AUTH_A = "auth"
      GARBAGE_BAL4R005_TOKEN_B = "bearer"

      type Token struct {
          GARBAGE_BAL4R005_TOK_C bool
      }
    garbage_router.go: |
      package garbage

      GARBAGE_BAL4R005_ROUTE_D = "router"
      GARBAGE_BAL4R005_PATH_E = "/api"
  commit_message: "refactor: extract magic number to DefaultTimeout const"
