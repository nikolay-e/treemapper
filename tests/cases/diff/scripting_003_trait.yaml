      import pytest
      from src.search.indexer import DocumentIndexer

      def test_add_and_search_single_word():
          indexer = DocumentIndexer()
          indexer.add_document("the quick brown fox")
          result = indexer.search("quick")
          assert 0 in result

      def test_search_multiple_words_returns_intersection():
          indexer = DocumentIndexer()
          indexer.add_document("the quick brown fox")
          indexer.add_document("quick lazy dog")
          result = indexer.search("quick fox")
          assert len(result) == 1

      def test_search_no_match_returns_empty():
          indexer = DocumentIndexer()
          indexer.add_document("hello world")
          result = indexer.search("missing")
          assert result == []

      def test_add_empty_document_raises():
          indexer = DocumentIndexer()
          with pytest.raises(ValueError, match="empty"):
              indexer.add_document("   ")

      def test_document_count_increments():
          indexer = DocumentIndexer()
          indexer.add_document("first document")
          indexer.add_document("second document")
          assert indexer.document_count() == 2

      def test_get_document_returns_text():
          indexer = DocumentIndexer()
          doc_id = indexer.add_document("hello world")
          assert indexer.get_document(doc_id) == "hello world"
