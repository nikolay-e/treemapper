  changed_files:
    src/loot_table.lua: |
      local M = {}

      M.tables = {}

      function M.roll(table_name)
          local t = M.tables[table_name]
          if not t then
              return nil, "unknown loot table: " .. tostring(table_name)
          end
          if #t == 0 then
              return nil, "empty loot table: " .. table_name
          end
          return t[math.random(#t)]
      end

      return M
