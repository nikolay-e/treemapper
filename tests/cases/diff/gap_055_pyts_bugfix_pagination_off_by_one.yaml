      from dataclasses import dataclass
      from typing import TypeVar, Generic

      T = TypeVar("T")

      @dataclass
      class Page(Generic[T]):
          items: list[T]
          total: int
          page: int
          page_size: int
          has_next: bool

      class Paginator:
          def __init__(self, page_size: int = 20):
              self._page_size = page_size

          def paginate(self, items: list, page: int) -> Page:
              start = page * self._page_size
              end = start + self._page_size
              page_items = items[start:end]
              has_next = end < len(items)
              return Page(
                  items=page_items,
                  total=len(items),
                  page=page,
                  page_size=self._page_size,
                  has_next=has_next,
              )

          def total_pages(self, total_items: int) -> int:
              return total_items // self._page_size
    backend/search/engine.py: |
      class SearchEngine:
          def __init__(self, index: dict[str, list[str]]):
              self._index = index

          def search(self, query: str) -> list[str]:
              tokens = query.lower().split()
              results: set[str] = set()
              for token in tokens:
                  if token in self._index:
                      results.update(self._index[token])
              return sorted(results)

          def suggest(self, prefix: str) -> list[str]:
              return sorted(k for k in self._index if k.startswith(prefix.lower()))
    frontend/src/search/pagination.ts: |
      interface PageInfo {
        currentPage: number;
        totalPages: number;
        hasNext: boolean;
        hasPrevious: boolean;
      }

      function computePageInfo(
        total: number,
        pageSize: number,
        currentPage: number
      ): PageInfo {
        const totalPages = Math.floor(total / pageSize);
        return {
          currentPage,
          totalPages,
          hasNext: currentPage < totalPages - 1,
          hasPrevious: currentPage > 0,
        };
      }

      function pageRange(pageInfo: PageInfo, window: number): number[] {
        const start = Math.max(0, pageInfo.currentPage - window);
        const end = Math.min(pageInfo.totalPages, pageInfo.currentPage + window + 1);
        const pages: number[] = [];
        for (let i = start; i < end; i++) {
          pages.push(i);
        }
        return pages;
      }
