name: gap_055_pyts_bugfix_pagination_off_by_one
tags:
- lang:rust
- change:bug_fix
- change:single_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    src/parser/token.rs: |
      #[derive(Debug, Clone, PartialEq)]
      pub enum Token {
          Number(f64),
          Plus,
          Minus,
          Star,
          Slash,
          LParen,
          RParen,
      }

      pub struct Lexer {
          input: Vec<char>,
          pos: usize,
      }

      impl Lexer {
          pub fn new(input: &str) -> Self {
              Lexer { input: input.chars().collect(), pos: 0 }
          }

          pub fn tokenize(&mut self) -> Vec<Token> {
              let mut tokens = Vec::new();
              while self.pos < self.input.len() {
                  let ch = self.input[self.pos];
                  match ch {
                      ' ' | '\t' => self.pos += 1,
                      '+' => { tokens.push(Token::Plus); self.pos += 1; }
                      '-' => { tokens.push(Token::Minus); self.pos += 1; }
                      '*' => { tokens.push(Token::Star); self.pos += 1; }
                      '/' => { tokens.push(Token::Slash); self.pos += 1; }
                      '(' => { tokens.push(Token::LParen); self.pos += 1; }
                      ')' => { tokens.push(Token::RParen); self.pos += 1; }
                      '0'..='9' | '.' => {
                          let start = self.pos;
                          while self.pos < self.input.len()
                              && (self.input[self.pos].is_numeric() || self.input[self.pos] == '.')
                          {
                              self.pos += 1;
                          }
                          let s: String = self.input[start..self.pos].iter().collect();
                          tokens.push(Token::Number(s.parse().unwrap_or(0.0)));
                      }
                      _ => self.pos += 1,
                  }
              }
              tokens
          }

          pub fn peek(&self) -> Option<char> {
              if self.pos < self.input.len() {
                  Some(self.input[self.pos])  // BUG: should peek next, not current
              } else {
                  None
              }
          }
      }
