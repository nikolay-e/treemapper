  changed_files:
    template/token.py: |
      class Token:
          TEXT = "text"
          VAR = "var"
          BLOCK = "block"
          FILTER = "filter"
          def __init__(self, token_type: str, value: str, filters: list[str] = None):
              self.token_type = token_type
              self.value = value
              self.filters = filters or []
          def is_variable(self) -> bool:
              return self.token_type == self.VAR
          def has_filters(self) -> bool:
              return len(self.filters) > 0
    template/lexer.py: |
