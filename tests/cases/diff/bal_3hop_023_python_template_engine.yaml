- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    template/token.py: |
      class Token:
          TEXT = "text"
          VAR = "var"
          BLOCK = "block"
          def __init__(self, token_type: str, value: str):
              self.token_type = token_type
              self.value = value
          def is_variable(self) -> bool:
              return self.token_type == self.VAR
    template/lexer.py: |
      import re
      from template.token import Token
      class Lexer:
          def __init__(self):
              self.var_pattern = re.compile(r'\{\{(\w+)\}\}')
          def tokenize(self, template: str) -> list[Token]:
              tokens = []
              last_end = 0
              for match in self.var_pattern.finditer(template):
                  if match.start() > last_end:
                      tokens.append(Token(Token.TEXT, template[last_end:match.start()]))
                  tokens.append(Token(Token.VAR, match.group(1)))
                  last_end = match.end()
              if last_end < len(template):
                  tokens.append(Token(Token.TEXT, template[last_end:]))
              return tokens
    template/renderer.py: |
      from template.lexer import Lexer
      from template.token import Token
      class Renderer:
          def __init__(self):
              self.lexer = Lexer()
          def render(self, template: str, context: dict) -> str:
              tokens = self.lexer.tokenize(template)
              parts = []
              for token in tokens:
                  if token.is_variable():
                      parts.append(str(context.get(token.value, "")))
                  else:
                      parts.append(token.value)
              return "".join(parts)
    app/email_sender.py: |
      from template.renderer import Renderer
      class EmailSender:
          def __init__(self):
              self.renderer = Renderer()
              self.sent: list[dict] = []
          def send(self, to: str, template: str, context: dict) -> dict:
              body = self.renderer.render(template, context)
              email = {"to": to, "body": body}
              self.sent.append(email)
              return email
