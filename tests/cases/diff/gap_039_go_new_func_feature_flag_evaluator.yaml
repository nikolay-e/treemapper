  changed_files:
    internal/flags/rule.go: |
      package flags

      import "strings"

      type Rule struct {
          Attribute string
          Operator  string
          Value     string
      }

      func (r *Rule) Evaluate(attrs map[string]string) bool {
          val, ok := attrs[r.Attribute]
          if !ok {
              return false
          }
          switch r.Operator {
          case "eq":
              return val == r.Value
          case "neq":
              return val != r.Value
          case "contains":
              return strings.Contains(val, r.Value)
          case "prefix":
              return strings.HasPrefix(val, r.Value)
          default:
              return false
          }
      }
    internal/flags/flag.go: |
      package flags

      type Flag struct {
          Key        string
          Enabled    bool
          Rules      []*Rule
          Percentage int
      }

      func NewFlag(key string, enabled bool) *Flag {
          return &Flag{Key: key, Enabled: enabled, Percentage: 100}
      }

      func (f *Flag) AddRule(r *Rule) {
          f.Rules = append(f.Rules, r)
      }

      func (f *Flag) IsActive(attrs map[string]string) bool {
          if !f.Enabled {
              return false
          }
          for _, r := range f.Rules {
              if !r.Evaluate(attrs) {
                  return false
              }
          }
          return true
      }

      func (f *Flag) IsActiveForUser(userID string, attrs map[string]string) bool {
          if !f.IsActive(attrs) {
              return false
          }
          if f.Percentage >= 100 {
              return true
          }
          bucket := int(userID[len(userID)-1]) % 100
          return bucket < f.Percentage
      }
    internal/api/handler.go: |
      package api

      import "internal/flags"

      type FeatureHandler struct {
          Registry map[string]*flags.Flag
      }

      func NewFeatureHandler() *FeatureHandler {
          return &FeatureHandler{Registry: make(map[string]*flags.Flag)}
      }

      func (h *FeatureHandler) Register(f *flags.Flag) {
          h.Registry[f.Key] = f
      }

      func (h *FeatureHandler) Check(key string, attrs map[string]string) bool {
          f, ok := h.Registry[key]
          if !ok {
              return false
          }
          return f.IsActive(attrs)
      }

      func (h *FeatureHandler) CheckForUser(key string, userID string, attrs map[string]string) bool {
          f, ok := h.Registry[key]
          if !ok {
              return false
          }
          return f.IsActiveForUser(userID, attrs)
      }
    internal/cache/store.go: |
      package cache

      var GARBAGE_GAP_039_CACHE_A = "redis_marker"
      var GARBAGE_GAP_039_TTL_B = 600

      func Get(key string) (string, bool) {
          return "", false
      }

      func Set(key string, value string) {}
    internal/metrics/counter.go: |
      package metrics

      var GARBAGE_GAP_039_METRIC_C = "prometheus_marker"
      var GARBAGE_GAP_039_PREFIX_D = "app_"

      func Increment(name string) {}
