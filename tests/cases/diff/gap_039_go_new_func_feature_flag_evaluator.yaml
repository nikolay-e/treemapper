repo:
  initial_files:
    internal/flags/rule.go: |
      package flags

      type Rule struct {
          Attribute string
          Operator  string
          Value     string
      }

      func (r *Rule) Evaluate(attrs map[string]string) bool {
          val, ok := attrs[r.Attribute]
          if !ok {
              return false
          }
          switch r.Operator {
          case "eq":
              return val == r.Value
          case "neq":
              return val != r.Value
          default:
              return false
          }
      }
    internal/flags/flag.go: |
      package flags

      type Flag struct {
          Key     string
          Enabled bool
          Rules   []*Rule
      }

      func NewFlag(key string, enabled bool) *Flag {
          return &Flag{Key: key, Enabled: enabled}
      }

      func (f *Flag) AddRule(r *Rule) {
          f.Rules = append(f.Rules, r)
      }

      func (f *Flag) IsActive(attrs map[string]string) bool {
          if !f.Enabled {
              return false
          }
          for _, r := range f.Rules {
              if !r.Evaluate(attrs) {
                  return false
              }
          }
          return true
      }
    internal/api/handler.go: |
      package api

      import "internal/flags"

      type FeatureHandler struct {
          Registry map[string]*flags.Flag
      }

      func NewFeatureHandler() *FeatureHandler {
          return &FeatureHandler{Registry: make(map[string]*flags.Flag)}
      }

      func (h *FeatureHandler) Register(f *flags.Flag) {
          h.Registry[f.Key] = f
      }

      func (h *FeatureHandler) Check(key string, attrs map[string]string) bool {
          f, ok := h.Registry[key]
          if !ok {
              return false
          }
          return f.IsActive(attrs)
      }
