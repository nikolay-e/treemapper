fragments:
- id: liveness_probe
  selector:
    path: k8s/apps/api/deployment.yaml
    anchor: 'livenessProbe:'
- id: probe_path_live
  selector:
    path: k8s/apps/api/deployment.yaml
    anchor: 'path: /live'
- id: probe_initial_delay
  selector:
    path: k8s/apps/api/deployment.yaml
    anchor: 'initialDelaySeconds: 30'
- id: probe_failure_threshold
  selector:
    path: k8s/apps/api/deployment.yaml
    anchor: 'failureThreshold: 3'
- id: health_live_endpoint
  selector:
    path: src/health.py
    anchor: 'def live():'
- id: no_hpa
  selector:
    path: k8s/apps/api/hpa.yaml
    anchor: api-server-hpa
- id: no_alerting_rules
  selector:
    path: k8s/monitoring/alerting-rules.yaml
    anchor: pod-health-alerts
- id: no_api_service
  selector:
    path: k8s/apps/api/service.yaml
    anchor: 'targetPort: 8080'
oracle:
  required:
  - liveness_probe
  - probe_path_live
  - probe_initial_delay
  - probe_failure_threshold
  - health_live_endpoint
  allowed: []
  forbidden:
  - no_hpa
  - no_alerting_rules
  - no_api_service
