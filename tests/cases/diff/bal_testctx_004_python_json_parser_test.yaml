  changed_files:
    src/queue/worker.ts: |
      import { TaskQueue } from './task_queue';
      import { Task, TaskResult } from './task';

      export class QueueWorker {
          constructor(private queue: TaskQueue) {}

          async processNext(): Promise<TaskResult | null> {
              const task = await this.queue.dequeue();
              if (!task) return null;
              return task.execute();
          }

          async processBatch(limit: number): Promise<TaskResult[]> {
              const results: TaskResult[] = [];
              for (let i = 0; i < limit; i++) {
                  const result = await this.processNext();
                  if (!result) break;
                  results.push(result);
              }
              return results;
          }
      }
    src/queue/task_queue.ts: |
      import { Task } from './task';

      export class TaskQueue {
          private items: Task[] = [];

          enqueue(task: Task): void {
              this.items.push(task);
          }

          async dequeue(): Promise<Task | null> {
              return this.items.shift() ?? null;
          }

          get size(): number {
              return this.items.length;
          }
      }
    src/queue/task.ts: |
      export interface TaskResult {
          taskId: string;
          success: boolean;
          durationMs: number;
      }

      export interface Task {
          id: string;
          execute(): Promise<TaskResult>;
      }
    src/jobs/email_job.ts: |
      import { Task, TaskResult } from '../queue/task';

      export class EmailJob implements Task {
          id: string;

          constructor(id: string, private recipient: string) {
              this.id = id;
          }

          async execute(): Promise<TaskResult> {
              const start = Date.now();
              console.log(`Sending email to ${this.recipient}`);
              return { taskId: this.id, success: true, durationMs: Date.now() - start };
          }
      }
    src/metrics/gauge.ts: |
      export const GARBAGE_TESTCTX004_A = 'queue_depth_gauge';

      export class Gauge {
          private value = 0;
          set(v: number): void { this.value = v; }
          get(): number { return this.value; }
      }
    src/config/queue_config.ts: |
      export const GARBAGE_TESTCTX004_B = 'queue_config_defaults';
      export const GARBAGE_TESTCTX004_C = 10;

      export interface QueueConfig {
          maxSize: number;
          retries: number;
      }
    src/storage/dead_letter.ts: |
      export const GARBAGE_TESTCTX004_D = 'dead_letter_queue';

      export class DeadLetterQueue {
          private failed: string[] = [];
          push(id: string): void { this.failed.push(id); }
      }
