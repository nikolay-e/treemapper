name: comprehensive_015_quality_imported_function_from_package
tags:
- lang:python
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    pkg/__init__.py: |
      from .helpers import compute_square, compute_cube
    pkg/helpers.py: |
      def compute_square(x):
          return x ** 2

      def compute_cube(x):
          return x ** 3

      def compute_power(x, n):
          return x ** n

      def clamp(value, minimum, maximum):
          return max(minimum, min(value, maximum))
    src/main.py: |
      result = 0

      def process_input(value):
          return int(value)

      def display_result(result):
          print(f"Result: {result}")
    src/math_extensions.py: |
      import math

      def fast_inverse_sqrt(x: float) -> float:
          return 1.0 / math.sqrt(x) if x > 0 else 0.0

      def lerp(a: float, b: float, t: float) -> float:
          return a + (b - a) * t

      def remap(value: float, low1: float, high1: float, low2: float, high2: float) -> float:
          return low2 + (value - low1) * (high2 - low2) / (high1 - low1)
    src/numeric_parser.py: |
      from typing import Optional

      def parse_int(text: str) -> Optional[int]:
          try:
              return int(text.strip())
          except ValueError:
              return None

      def parse_float(text: str) -> Optional[float]:
          try:
              return float(text.strip().replace(',', '.'))
          except ValueError:
              return None

      def is_numeric(text: str) -> bool:
          return parse_float(text) is not None
  changed_files:
    pkg/__init__.py: |
      from .helpers import compute_square, compute_cube
    pkg/helpers.py: |
      def compute_square(x):
          return x ** 2

      def compute_cube(x):
          return x ** 3

      def compute_power(x, n):
          return x ** n

      def clamp(value, minimum, maximum):
          return max(minimum, min(value, maximum))
    src/main.py: |
      from pkg.helpers import compute_square, compute_cube

      result = compute_square(5) + compute_cube(3)

      def process_input(value):
          return int(value)

      def display_result(result):
          print(f"Result: {result}")
    src/math_extensions.py: |
      import math

      def fast_inverse_sqrt(x: float) -> float:
          return 1.0 / math.sqrt(x) if x > 0 else 0.0

      def lerp(a: float, b: float, t: float) -> float:
          return a + (b - a) * t

      def remap(value: float, low1: float, high1: float, low2: float, high2: float) -> float:
          return low2 + (value - low1) * (high2 - low2) / (high1 - low1)
    src/numeric_parser.py: |
      from typing import Optional

      def parse_int(text: str) -> Optional[int]:
          try:
              return int(text.strip())
          except ValueError:
              return None

      def parse_float(text: str) -> Optional[float]:
          try:
              return float(text.strip().replace(',', '.'))
          except ValueError:
              return None

      def is_numeric(text: str) -> bool:
          return parse_float(text) is not None
