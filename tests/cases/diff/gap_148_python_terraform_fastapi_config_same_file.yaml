name: gap_148_python_terraform_fastapi_config_same_file
tags:
- change:config
- change:single_file
- context:same_file
- difficulty:trivial
- distance:0hop
- lang:python
- lang:terraform
repo:
  initial_files:
    api/settings.py: |
      from pydantic_settings import BaseSettings

      class Settings(BaseSettings):
          app_name: str = "inventory-api"
          app_version: str = "1.0.0"
          debug: bool = False

          postgres_host: str = "localhost"
          postgres_port: int = 5432
          postgres_db: str = "inventory"
          postgres_user: str = "api"
          postgres_password: str = "changeme"

          jwt_secret: str = "dev-secret"
          jwt_algorithm: str = "HS256"
          jwt_expiration_minutes: int = 30

          class Config:
              env_prefix = "INV_"
    terraform/api_gateway.tf: |
      resource "aws_apigatewayv2_api" "inventory" {
        name          = "inventory-api"
        protocol_type = "HTTP"
      }

      resource "aws_apigatewayv2_stage" "prod" {
        api_id      = aws_apigatewayv2_api.inventory.id
        name        = "prod"
        auto_deploy = true
      }

      resource "aws_apigatewayv2_integration" "lambda" {
        api_id             = aws_apigatewayv2_api.inventory.id
        integration_type   = "AWS_PROXY"
        integration_uri    = "arn:aws:lambda:us-east-1:123456:function:inventory"
        payload_format_version = "2.0"
      }
    terraform/cognito.tf: |
      resource "aws_cognito_user_pool" "users" {
        name = "inventory-users"

        password_policy {
          minimum_length    = 8
          require_lowercase = true
          require_numbers   = true
          require_symbols   = false
          require_uppercase = true
        }

        auto_verified_attributes = ["email"]
      }

      resource "aws_cognito_user_pool_client" "api" {
        name         = "inventory-api-client"
        user_pool_id = aws_cognito_user_pool.users.id
        explicit_auth_flows = [
          "ALLOW_USER_PASSWORD_AUTH",
          "ALLOW_REFRESH_TOKEN_AUTH"
        ]
      }
  changed_files:
    api/settings.py: |
      from pydantic_settings import BaseSettings

      class Settings(BaseSettings):
          app_name: str = "inventory-api"
          app_version: str = "1.0.0"
          debug: bool = False

          postgres_host: str = "localhost"
          postgres_port: int = 5432
          postgres_db: str = "inventory"
          postgres_user: str = "api"
          postgres_password: str = "changeme"
          postgres_pool_min: int = 2
          postgres_pool_max: int = 10

          jwt_secret: str = "dev-secret"
          jwt_algorithm: str = "HS256"
          jwt_expiration_minutes: int = 60

          cors_allowed_origins: list[str] = ["http://localhost:3000"]

          class Config:
              env_prefix = "INV_"
fragments:
- id: pool_min
  selector:
    path: api/settings.py
    anchor: postgres_pool_min
- id: pool_max
  selector:
    path: api/settings.py
    anchor: postgres_pool_max
- id: jwt_expiration
  selector:
    path: api/settings.py
    anchor: jwt_expiration_minutes
- id: no_api_gateway
  selector:
    path: terraform/api_gateway.tf
- id: no_cognito
  selector:
    path: terraform/cognito.tf
oracle:
  required:
  - pool_min
  - pool_max
  - jwt_expiration
  forbidden:
  - no_api_gateway
  - no_cognito
