name: typescript_008_zod_schema_validation
repo:
  initial_files:
    src/schemas/common.ts: |
      import { z } from 'zod';

      export const uuidSchema = z.string().uuid();
      export const emailSchema = z.string().email();
      export const dateSchema = z.coerce.date();

      export const addressSchema = z.object({
        street: z.string().min(1),
        city: z.string().min(1),
        state: z.string().length(2),
        postalCode: z.string().regex(/^\d{5}$/),
        country: z.string().length(2).default('US'),
      });

      export const moneySchema = z.object({
        amount: z.number().nonnegative(),
        currency: z.enum(['USD', 'EUR', 'GBP']),
      });

      export type Address = z.infer<typeof addressSchema>;
      export type Money = z.infer<typeof moneySchema>;
    src/schemas/user.ts: |
      import { z } from 'zod';
      import { uuidSchema, emailSchema, addressSchema } from './common';

      export const userRoleSchema = z.enum(['admin', 'user', 'guest']);

      export const userSchema = z.object({
        id: uuidSchema,
        email: emailSchema,
        firstName: z.string().min(1).max(50),
        lastName: z.string().min(1).max(50),
        role: userRoleSchema,
        address: addressSchema.optional(),
      });

      export type UserRole = z.infer<typeof userRoleSchema>;
      export type User = z.infer<typeof userSchema>;
    src/schemas/order.ts: |
      console.log('placeholder');
    src/unrelated/billing.ts: |
      import { z } from 'zod';

      export const TAX_RATES = {
        US: 0.08,
        CA: 0.13,
        UK: 0.20,
      } as const;

      export const billingPeriodSchema = z.enum(['monthly', 'yearly']);

      export class BillingCalculator {
        calculateSubtotal(items: Array<{ quantity: number; unitPrice: number }>): number {
          return items.reduce((sum, item) => sum + item.quantity * item.unitPrice, 0);
        }

        calculateTax(subtotal: number, countryCode: keyof typeof TAX_RATES): number {
          const rate = TAX_RATES[countryCode] || 0;
          return Number((subtotal * rate).toFixed(2));
        }
      }

      export const billingCalculator = new BillingCalculator();
    src/unrelated/reports.ts: |
      import { z } from 'zod';

      export const reportTypeSchema = z.enum(['sales', 'inventory', 'financial']);

      export interface ReportResult {
        id: string;
        type: z.infer<typeof reportTypeSchema>;
        generatedAt: Date;
        data: unknown;
      }

      export class ReportGenerator {
        async generate(type: string): Promise<ReportResult> {
          return {
            id: 'report_' + Date.now(),
            type: type as z.infer<typeof reportTypeSchema>,
            generatedAt: new Date(),
            data: [],
          };
        }
      }

      export const reportGenerator = new ReportGenerator();
