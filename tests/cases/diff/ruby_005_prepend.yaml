    lib/handler.rb: |
      require_relative 'wrapper'

      class Handler
        prepend Wrapper

        def process(data)
          data.upcase
        end

        def validate(input)
          !input.nil? && !input.empty?
        end
      end

      handler = Handler.new
      handler.process("hello world")
      handler.validate("test input")
