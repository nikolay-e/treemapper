name: gap_053_pyts_bugfix_currency_rounding
tags:
- lang:python
- lang:typescript
- change:bug_fix
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    backend/pricing/calculator.py: |
      from decimal import Decimal, ROUND_HALF_UP

      class PriceCalculator:
          def __init__(self, tax_rate: Decimal):
              self._tax_rate = tax_rate

          def subtotal(self, unit_price: Decimal, quantity: int) -> Decimal:
              return unit_price * quantity

          def tax_amount(self, subtotal: Decimal) -> Decimal:
              return (subtotal * self._tax_rate).quantize(
                  Decimal("0.01"), rounding=ROUND_HALF_UP
              )

          def total(self, unit_price: Decimal, quantity: int) -> Decimal:
              sub = self.subtotal(unit_price, quantity)
              tax = self.tax_amount(sub)
              return sub + tax

          def discount(self, total: Decimal, percent: float) -> Decimal:
              factor = Decimal(str(percent)) / Decimal("100")
              raw = total * factor
              return raw.quantize(Decimal("0.01"), rounding=ROUND_HALF_UP)
    backend/pricing/formatter.py: |
      from decimal import Decimal

      SYMBOLS = {
          "USD": "$",
          "EUR": "EUR",
          "GBP": "GBP",
      }

      def format_price(amount: Decimal, currency: str) -> str:
          symbol = SYMBOLS.get(currency, currency)
          return f"{symbol}{float(amount):.2f}"

      def parse_price(text: str) -> Decimal:
          cleaned = text.lstrip("$").replace(",", "")
          return Decimal(cleaned)
    frontend/src/cart/pricing.ts: |
      interface LineItem {
        unitPrice: number;
        quantity: number;
      }

      function calculateSubtotal(item: LineItem): number {
        return item.unitPrice * item.quantity;
      }

      function calculateTax(subtotal: number, taxRate: number): number {
        return Math.round(subtotal * taxRate * 100) / 100;
      }

      function calculateTotal(item: LineItem, taxRate: number): number {
        const sub = calculateSubtotal(item);
        const tax = calculateTax(sub, taxRate);
        return sub + tax;
      }

      function formatCurrency(amount: number): string {
        return `$${amount.toFixed(2)}`;
      }
    frontend/src/cart/display.ts: |
      interface CartSummary {
        items: number;
        subtotal: string;
        tax: string;
        total: string;
      }

      function renderSummary(summary: CartSummary): string {
        return [
          `Items: ${summary.items}`,
          `Subtotal: ${summary.subtotal}`,
          `Tax: ${summary.tax}`,
          `Total: ${summary.total}`,
        ].join("\n");
      }
