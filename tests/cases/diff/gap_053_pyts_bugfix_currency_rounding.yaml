    src/main/java/com/fintech/TransactionProcessor.java: |
      package com.fintech;

      import java.math.BigDecimal;

      public class TransactionProcessor {
          private final AccountRepository accounts;

          public TransactionProcessor(AccountRepository accounts) {
              this.accounts = accounts;
          }

          public void transfer(String fromId, String toId, BigDecimal amount) {
              if (fromId == null || fromId.isBlank()) {
                  throw new IllegalArgumentException("Source account ID required");
              }
              if (toId == null || toId.isBlank()) {
                  throw new IllegalArgumentException("Destination account ID required");
              }
              if (amount == null || amount.compareTo(BigDecimal.ZERO) <= 0) {
                  throw new IllegalArgumentException("Amount must be positive");
              }
              Account from = accounts.findById(fromId);
              Account to = accounts.findById(toId);
              if (from == null) throw new IllegalStateException("Account not found: " + fromId);
              if (to == null) throw new IllegalStateException("Account not found: " + toId);
              from.debit(amount);
              to.credit(amount);
          }
      }
