  changed_files:
    src/main/java/com/fintech/TransactionProcessor.java: |
      package com.fintech;

      import com.fintech.validation.PaymentValidator;
      import java.math.BigDecimal;

      public class TransactionProcessor {
          private final AccountRepository accounts;
          private final PaymentValidator validator;

          public TransactionProcessor(AccountRepository accounts, PaymentValidator validator) {
              this.accounts = accounts;
              this.validator = validator;
          }

          public void transfer(String fromId, String toId, BigDecimal amount) {
              validator.requireAccountId(fromId, "source");
              validator.requireAccountId(toId, "destination");
              validator.requirePositiveAmount(amount);
              Account from = accounts.findById(fromId);
              Account to = accounts.findById(toId);
              validator.requireAccountExists(from, fromId);
              validator.requireAccountExists(to, toId);
              from.debit(amount);
              to.credit(amount);
          }
      }
    src/main/java/com/fintech/PaymentService.java: |
      package com.fintech;

      import com.fintech.validation.PaymentValidator;
      import java.math.BigDecimal;

      public class PaymentService {
          private final AccountRepository accounts;
          private final PaymentValidator validator;

          public PaymentService(AccountRepository accounts, PaymentValidator validator) {
              this.accounts = accounts;
              this.validator = validator;
          }

          public void pay(String accountId, BigDecimal amount, String description) {
              validator.requireAccountId(accountId, "payment");
              validator.requirePositiveAmount(amount);
              Account account = accounts.findById(accountId);
              validator.requireAccountExists(account, accountId);
              account.debit(amount);
              System.out.println("Payment: " + description + " = " + amount);
          }
      }
    src/main/java/com/fintech/validation/PaymentValidator.java: |
      package com.fintech.validation;

      import com.fintech.Account;
      import java.math.BigDecimal;

      public class PaymentValidator {
          public void requireAccountId(String accountId, String role) {
              if (accountId == null || accountId.isBlank()) {
                  throw new IllegalArgumentException(capitalize(role) + " account ID required");
              }
          }

          public void requirePositiveAmount(BigDecimal amount) {
              if (amount == null || amount.compareTo(BigDecimal.ZERO) <= 0) {
                  throw new IllegalArgumentException("Amount must be positive");
              }
          }

          public void requireAccountExists(Account account, String accountId) {
              if (account == null) {
                  throw new IllegalStateException("Account not found: " + accountId);
              }
          }

          private String capitalize(String s) {
              if (s == null || s.isEmpty()) return s;
              return Character.toUpperCase(s.charAt(0)) + s.substring(1);
          }
      }
    src/main/java/com/fintech/AccountRepository.java: |
