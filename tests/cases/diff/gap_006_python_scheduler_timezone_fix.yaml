      from datetime import datetime, timezone
      from scheduler.timeutil import parse_cron, next_occurrence

      class TaskScheduler:
          def __init__(self):
              self._tasks: dict[str, dict] = {}

          def register(self, name: str, cron_expr: str, callback) -> None:
              parsed = parse_cron(cron_expr)
              self._tasks[name] = {
                  "cron": parsed,
                  "callback": callback,
                  "last_run": None,
              }

          def tick(self) -> list[str]:
              now = datetime.now(timezone.utc)
              triggered = []
              for name, task in self._tasks.items():
                  last = task["last_run"]
                  if last is None:
                      last = now
                  nxt = next_occurrence(task["cron"], last)
                  if nxt <= now:
                      task["callback"]()
                      task["last_run"] = now
                      triggered.append(name)
              return triggered

          def pending(self) -> list[str]:
              now = datetime.now(timezone.utc)
              result = []
              for name, task in self._tasks.items():
                  last = task["last_run"]
                  if last is None:
                      result.append(name)
                      continue
                  nxt = next_occurrence(task["cron"], last)
                  if nxt <= now:
                      result.append(name)
              return result

          def unregister(self, name: str) -> None:
              self._tasks.pop(name, None)
