      import threading

      class WorkerPool:
          def __init__(self, size: int = 4):
              self._size = size
              self._threads: list[threading.Thread] = []

          def submit(self, fn, *args) -> None:
              t = threading.Thread(target=fn, args=args)
              self._threads.append(t)
              t.start()

          def join_all(self) -> None:
              for t in self._threads:
                  t.join()
              self._threads.clear()
