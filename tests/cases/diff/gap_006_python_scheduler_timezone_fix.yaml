      from datetime import datetime

      class LogSink:
          def __init__(self, path: str):
              self._path = path

          def write(self, message: str) -> None:
              ts = datetime.now().isoformat()
              with open(self._path, "a") as f:
                  f.write(f"[{ts}] {message}\n")
