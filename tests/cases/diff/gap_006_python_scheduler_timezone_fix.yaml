      from datetime import datetime
      from scheduler.timeutil import parse_cron, next_occurrence

      class TaskScheduler:
          def __init__(self):
              self._tasks: dict[str, dict] = {}

          def register(self, name: str, cron_expr: str, callback) -> None:
              parsed = parse_cron(cron_expr)
              self._tasks[name] = {
                  "cron": parsed,
                  "callback": callback,
                  "last_run": None,
              }

          def tick(self) -> list[str]:
              now = datetime.utcnow()
              triggered = []
              for name, task in self._tasks.items():
                  nxt = next_occurrence(task["cron"], task["last_run"] or now)
                  if nxt <= now:
                      task["callback"]()
                      task["last_run"] = now
                      triggered.append(name)
              return triggered

          def unregister(self, name: str) -> None:
              self._tasks.pop(name, None)
    scheduler/timeutil.py: |
      from datetime import datetime, timedelta

      class CronSpec:
          def __init__(self, minute: int, hour: int, interval_minutes: int):
              self.minute = minute
              self.hour = hour
              self.interval_minutes = interval_minutes

      def parse_cron(expr: str) -> CronSpec:
          parts = expr.split()
          minute = int(parts[0]) if parts[0] != "*" else 0
          hour = int(parts[1]) if parts[1] != "*" else 0
          interval = int(parts[2]) if len(parts) > 2 else 60
          return CronSpec(minute, hour, interval)

      def next_occurrence(spec: CronSpec, after: datetime) -> datetime:
          return after + timedelta(minutes=spec.interval_minutes)
