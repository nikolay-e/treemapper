repo:
  initial_files:
    src/main/scala/compiler/ast/AstNode.scala: |
      package compiler.ast

      sealed trait AstNode
      case class Literal(value: Int) extends AstNode
      case class BinOp(op: String, left: AstNode, right: AstNode) extends AstNode
      case class Ident(name: String) extends AstNode
    src/main/scala/compiler/parser/Parser.scala: |
      package compiler.parser

      import compiler.ast.{AstNode, Literal, BinOp, Ident}

      object Parser {
        def parse(tokens: List[String]): AstNode = tokens match {
          case num :: Nil if num.forall(_.isDigit) => Literal(num.toInt)
          case name :: Nil => Ident(name)
          case left :: op :: right :: Nil => BinOp(op, parse(List(left)), parse(List(right)))
          case _ => Literal(0)
        }
      }
    src/main/scala/compiler/typecheck/TypeChecker.scala: |
      package compiler.typecheck

      import compiler.ast.{AstNode, Literal, BinOp, Ident}
      import compiler.parser.Parser

      object TypeChecker {
        def check(node: AstNode): Boolean = node match {
          case Literal(_) => true
          case Ident(_) => true
          case BinOp(_, l, r) => check(l) && check(r)
        }
      }
    src/main/scala/compiler/codegen/CodeGen.scala: |
      package compiler.codegen

      import compiler.ast.{AstNode, Literal, BinOp, Ident}
      import compiler.typecheck.TypeChecker

      object CodeGen {
        def emit(node: AstNode): String = node match {
          case Literal(v) => s"PUSH $v"
          case Ident(n) => s"LOAD $n"
          case BinOp(op, l, r) => s"${emit(l)}\n${emit(r)}\n$op"
        }
      }
    src/main/scala/compiler/Driver.scala: |
      package compiler

      import compiler.parser.Parser
      import compiler.typecheck.TypeChecker
      import compiler.codegen.CodeGen

      object Driver {
        def compile(source: List[String]): String = {
          val ast = Parser.parse(source)
          if (TypeChecker.check(ast)) CodeGen.emit(ast)
          else "ERROR"
        }
      }
    src/main/scala/util/FileReader.scala: |
