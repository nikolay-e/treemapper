    src/main/scala/util/Profiler.scala: |
      package util

      object Profiler {
        val GARBAGE_093_PROF_C = "timing"
        val GARBAGE_093_PROF_D = "memory"

        def time[T](label: String)(block: => T): T = block
      }
    src/main/scala/util/Cache.scala: |
