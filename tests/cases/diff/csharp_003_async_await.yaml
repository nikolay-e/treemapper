    pkg/util/retry.go: |
      package util

      import "time"

      func Retry(attempts int, delay time.Duration, fn func() error) error {
          for i := 0; i < attempts; i++ {
              if err := fn(); err == nil {
                  return nil
              }
              if i < attempts-1 {
                  time.Sleep(delay)
              }
          }
          return nil  // BUG: should return last error, not nil
      }
