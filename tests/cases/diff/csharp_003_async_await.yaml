  changed_files:
    pkg/util/retry.go: |
      package util

      import (
          "errors"
          "time"
      )

      func Retry(attempts int, delay time.Duration, fn func() error) error {
          var lastErr error
          for i := 0; i < attempts; i++ {
              if err := fn(); err == nil {
                  return nil
              } else {
                  lastErr = err
              }
              if i < attempts-1 {
                  time.Sleep(delay)
              }
          }
          return errors.Join(errors.New("retry exhausted"), lastErr)
      }
