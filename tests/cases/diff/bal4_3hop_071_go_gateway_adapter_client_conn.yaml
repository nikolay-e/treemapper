repo:
  initial_files:
    pkg/conn/pool.go: |
      package conn

      type Pool struct {
          Max int
      }

      func NewPool(max int) *Pool {
          return &Pool{Max: max}
      }

      func (p *Pool) Acquire() string {
          return "conn-1"
      }
    pkg/client/http_client.go: |
      package client

      import "myapp/pkg/conn"

      type HTTPClient struct {
          pool *conn.Pool
      }

      func NewHTTPClient(p *conn.Pool) *HTTPClient {
          return &HTTPClient{pool: p}
      }

      func (c *HTTPClient) Get(url string) string {
          cn := c.pool.Acquire()
          return cn + ":" + url
      }
    pkg/adapter/rest.go: |
      package adapter

      import "myapp/pkg/client"

      type RestAdapter struct {
          cl *client.HTTPClient
      }

      func NewRestAdapter(cl *client.HTTPClient) *RestAdapter {
          return &RestAdapter{cl: cl}
      }

      func (a *RestAdapter) Fetch(path string) string {
          return a.cl.Get(path)
      }
    pkg/gateway/api_gw.go: |
      package gateway

      import "myapp/pkg/adapter"

      type APIGateway struct {
          rest *adapter.RestAdapter
      }

      func NewAPIGateway(r *adapter.RestAdapter) *APIGateway {
          return &APIGateway{rest: r}
      }

      func (g *APIGateway) Route(path string) string {
          return g.rest.Fetch(path)
      }
