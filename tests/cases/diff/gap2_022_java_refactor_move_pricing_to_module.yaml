    src/main/java/com/hotel/BookingService.java: |
      package com.hotel;

      import java.time.LocalDate;
      import java.time.temporal.ChronoUnit;

      public class BookingService {
          private final RoomRepository rooms;

          public BookingService(RoomRepository rooms) {
              this.rooms = rooms;
          }

          public double calculatePrice(String roomId, LocalDate checkIn, LocalDate checkOut) {
              Room room = rooms.findById(roomId);
              long nights = ChronoUnit.DAYS.between(checkIn, checkOut);
              return room.getBaseRate() * nights;
          }

          public Booking createBooking(String guestName, String roomId, LocalDate checkIn, LocalDate checkOut) {
              double total = calculatePrice(roomId, checkIn, checkOut);
              return new Booking(guestName, roomId, checkIn, checkOut, total);
          }
      }
