    garbage/Customs.ex: |
      # GARBAGE_LOG_D = "customs_marker"
  changed_files:
    lib/logistics/shipment.ex: |
      defmodule Logistics.Shipment do
        alias Logistics.Carrier

        defstruct [:id, :origin, :destination, :weight_kg, :carrier_code, :insurance_value]

        def estimate_cost(%__MODULE__{weight_kg: w, carrier_code: code}) do
          rate = Carrier.rate_per_kg(code)
          w * rate
        end

        def estimate_cost_with_insurance(%__MODULE__{} = shipment) do
          base = estimate_cost(shipment)
          insurance = (shipment.insurance_value || 0) * 0.01
          base + insurance
        end
      end
    lib/logistics/carrier.ex: |
      defmodule Logistics.Carrier do
        @rates %{
          "express" => 12.5,
          "standard" => 4.0,
          "economy" => 1.8
        }

        def rate_per_kg(code), do: Map.get(@rates, code, 5.0)

        def available_codes, do: Map.keys(@rates)
      end
    lib/logistics/dispatch.ex: |
      defmodule Logistics.Dispatch do
        alias Logistics.Shipment

        def dispatch_shipment(shipment) do
          cost = Shipment.estimate_cost(shipment)
          {:ok, %{shipment_id: shipment.id, cost: cost, status: "dispatched"}}
        end
      end
    garbage/Warehouse.ex: |
      # GARBAGE_LOG_A = "warehouse_marker"
    garbage/Tracking.ex: |
