    src/main/java/com/hotel/BookingService.java: |
      package com.hotel;

      import com.hotel.pricing.PricingEngine;
      import java.time.LocalDate;

      public class BookingService {
          private final RoomRepository rooms;
          private final PricingEngine pricing;

          public BookingService(RoomRepository rooms, PricingEngine pricing) {
              this.rooms = rooms;
              this.pricing = pricing;
          }

          public Booking createBooking(String guestName, String roomId, LocalDate checkIn, LocalDate checkOut) {
              Room room = rooms.findById(roomId);
              double total = pricing.calculate(room, checkIn, checkOut);
              return new Booking(guestName, roomId, checkIn, checkOut, total);
          }
      }
    src/main/java/com/hotel/pricing/PricingEngine.java: |
      package com.hotel.pricing;

      import com.hotel.Room;
      import java.time.LocalDate;
      import java.time.temporal.ChronoUnit;

      public class PricingEngine {
          public double calculate(Room room, LocalDate checkIn, LocalDate checkOut) {
              long nights = ChronoUnit.DAYS.between(checkIn, checkOut);
              return room.getBaseRate() * nights;
          }
      }
