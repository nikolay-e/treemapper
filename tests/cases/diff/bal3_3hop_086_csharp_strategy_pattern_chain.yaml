  changed_files:
    src/Pricing/IPricingStrategy.cs: |
      using System;

      namespace App.Pricing
      {
          public interface IPricingStrategy
          {
              decimal Calculate(decimal basePrice, int quantity);
              decimal CalculateWithDiscount(decimal basePrice, int quantity, decimal discountPercent);
          }
      }
    src/Pricing/StandardPricing.cs: |
      using System;
      using App.Pricing;

      namespace App.Pricing
      {
          public class StandardPricing : IPricingStrategy
          {
              public decimal Calculate(decimal basePrice, int quantity)
              {
                  return basePrice * quantity;
              }
              public decimal CalculateWithDiscount(decimal basePrice, int quantity, decimal discountPercent)
              {
                  var total = basePrice * quantity;
                  return total - (total * discountPercent / 100m);
              }
          }
      }
    src/Cart/CartCalculator.cs: |
      using System;
      using App.Pricing;

      namespace App.Cart
      {
          public class CartCalculator
          {
              private readonly IPricingStrategy _strategy;
              public CartCalculator(IPricingStrategy strategy)
              {
                  _strategy = strategy;
              }
              public decimal ComputeTotal(decimal price, int qty)
              {
                  return _strategy.Calculate(price, qty);
              }
              public decimal ComputeDiscountedTotal(decimal price, int qty, decimal discount)
              {
                  return _strategy.CalculateWithDiscount(price, qty, discount);
              }
          }
      }
    src/Services/CheckoutService.cs: |
      using System;
      using App.Cart;

      namespace App.Services
      {
          public class CheckoutService
          {
              private readonly CartCalculator _calculator;
              public CheckoutService(CartCalculator calculator)
              {
                  _calculator = calculator;
              }
              public decimal Checkout(decimal price, int qty)
              {
                  return _calculator.ComputeTotal(price, qty);
              }
              public decimal CheckoutWithDiscount(decimal price, int qty, decimal discount)
              {
                  return _calculator.ComputeDiscountedTotal(price, qty, discount);
              }
          }
      }
    src/Controllers/CheckoutController.cs: |
      using System;
      using App.Services;

      namespace App.Controllers
      {
