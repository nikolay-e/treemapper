          {
              private readonly CheckoutService _service;
              public CheckoutController(CheckoutService service)
              {
                  _service = service;
              }
              public decimal Process(decimal price, int qty)
              {
                  return _service.Checkout(price, qty);
              }
              public decimal ProcessWithDiscount(decimal price, int qty, decimal discount)
              {
                  return _service.CheckoutWithDiscount(price, qty, discount);
              }
          }
      }
