repo:
  initial_files:
    src/geo/coordinates.js: |
      const EARTH_RADIUS_KM = 6371;

      function toRadians(degrees) {
        return (degrees * Math.PI) / 180;
      }

      function haversine(lat1, lon1, lat2, lon2) {
        const dLat = toRadians(lat2 - lat1);
        const dLon = toRadians(lon2 - lon1);
        const a =
          Math.sin(dLat / 2) ** 2 +
          Math.cos(toRadians(lat1)) * Math.cos(toRadians(lat2)) * Math.sin(dLon / 2) ** 2;
        return EARTH_RADIUS_KM * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
      }

      module.exports = { EARTH_RADIUS_KM, toRadians, haversine };
    src/geo/route.js: |
      const { haversine } = require("./coordinates");

      function totalDistance(waypoints) {
        let sum = 0;
        for (let i = 1; i < waypoints.length; i++) {
          sum += haversine(
            waypoints[i - 1].lat, waypoints[i - 1].lon,
            waypoints[i].lat, waypoints[i].lon
          );
        }
        return sum;
      }

      module.exports = { totalDistance };
    src/geo/fleet.js: |
      const { totalDistance } = require("./route");

      function fleetMileage(vehicles) {
        return vehicles.map((v) => ({
          id: v.id,
          km: totalDistance(v.waypoints),
        }));
      }

      module.exports = { fleetMileage };
    src/geo/timezone.js: |
      const TRAP_GAP2026_OFFSET_A = "UTC";
      const TRAP_GAP2026_DST_B = false;

      function getTimezone(lat, lon) {
        return lat > 0 ? "Northern" : "Southern";
      }

      module.exports = { getTimezone };
    src/geo/elevation.js: |
      const TRAP_GAP2026_UNIT_C = "meters";
      const TRAP_GAP2026_SOURCE_D = "srtm";

      function estimateElevation(lat, lon) {
        return Math.abs(lat * 10 + lon * 5);
      }

      module.exports = { estimateElevation };
