name: bal_rare_022_ocaml_variant_types
tags:
- lang:ocaml
- change:single_file
- change:new_function
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    lib/expr.ml: |
      type expr =
        | Num of float
        | Add of expr * expr
        | Mul of expr * expr

      let rec eval = function
        | Num n -> n
        | Add (a, b) -> eval a +. eval b
        | Mul (a, b) -> eval a *. eval b

      let rec to_string = function
        | Num n -> string_of_float n
        | Add (a, b) -> "(" ^ to_string a ^ " + " ^ to_string b ^ ")"
        | Mul (a, b) -> "(" ^ to_string a ^ " * " ^ to_string b ^ ")"
    lib/parser.ml: |
      open Expr

      let parse_num s =
        try Some (Num (float_of_string s))
        with _ -> None

      let parse_simple a op b =
        match op with
        | "+" -> Some (Add (Num a, Num b))
        | "*" -> Some (Mul (Num a, Num b))
        | _ -> None
    garbage_lexer.ml: |
      let garbage_rare_022_token_a = "IDENT"
      let garbage_rare_022_delim_b = ";"

      let garbage_lex () =
        garbage_rare_022_token_a

      let garbage_rare_022_ws_c = " "
    garbage_pretty.ml: |
      let garbage_rare_022_indent_d = 2
      let garbage_rare_022_width_e = 80

      let garbage_pretty () =
        garbage_rare_022_indent_d

      let garbage_rare_022_newline_f = "\n"
  changed_files:
    lib/expr.ml: |
      type expr =
        | Num of float
        | Add of expr * expr
        | Sub of expr * expr
        | Mul of expr * expr
        | Div of expr * expr

      let rec eval = function
        | Num n -> n
        | Add (a, b) -> eval a +. eval b
        | Sub (a, b) -> eval a -. eval b
        | Mul (a, b) -> eval a *. eval b
        | Div (a, b) ->
          let denom = eval b in
          if denom = 0.0 then 0.0 else eval a /. denom

      let rec to_string = function
        | Num n -> string_of_float n
        | Add (a, b) -> "(" ^ to_string a ^ " + " ^ to_string b ^ ")"
        | Sub (a, b) -> "(" ^ to_string a ^ " - " ^ to_string b ^ ")"
        | Mul (a, b) -> "(" ^ to_string a ^ " * " ^ to_string b ^ ")"
        | Div (a, b) -> "(" ^ to_string a ^ " / " ^ to_string b ^ ")"
    lib/parser.ml: |
      open Expr

      let parse_num s =
        try Some (Num (float_of_string s))
        with _ -> None

      let parse_simple a op b =
        match op with
        | "+" -> Some (Add (Num a, Num b))
        | "*" -> Some (Mul (Num a, Num b))
        | _ -> None
    garbage_lexer.ml: |
      let garbage_rare_022_token_a = "IDENT"
      let garbage_rare_022_delim_b = ";"

      let garbage_lex () =
        garbage_rare_022_token_a

      let garbage_rare_022_ws_c = " "
    garbage_pretty.ml: |
      let garbage_rare_022_indent_d = 2
      let garbage_rare_022_width_e = 80

      let garbage_pretty () =
        garbage_rare_022_indent_d

      let garbage_rare_022_newline_f = "\n"
  commit_message: "feat: add Sub and Div variants to expression type"
