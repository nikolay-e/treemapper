name: helm_041_condition
tags:
- lang:yaml
- change:single_file
- change:config
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    Chart.yaml: |
      apiVersion: v2
      name: myapp
      dependencies:
        - name: backend
          version: 1.0.0
        - name: frontend
          version: 1.0.0
    values.yaml: |
      backend:
        enabled: true
        replicaCount: 3
        image:
          repository: backend-api
          tag: "1.0.0"
      frontend:
        enabled: true
        replicaCount: 2
    values-production.yaml: |
      backend:
        enabled: true
        replicaCount: 5
        image:
          tag: "1.2.0"
      frontend:
        replicaCount: 4
    charts/backend/Chart.yaml: |
      apiVersion: v2
      name: backend
      version: 1.0.0
      description: Backend API service
    charts/backend/values.yaml: |
      replicaCount: 1
      image:
        repository: backend-api
        tag: "latest"
    charts/backend/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ include "backend.fullname" . }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: backend
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    charts/frontend/Chart.yaml: |
      apiVersion: v2
      name: frontend
      version: 1.0.0
      description: Frontend web application
  changed_files:
    Chart.yaml: |
      apiVersion: v2
      name: myapp
      dependencies:
        - name: backend
          version: 1.0.0
          condition: backend.enabled
        - name: frontend
          version: 1.0.0
    values.yaml: |
      backend:
        enabled: true
        replicaCount: 3
        image:
          repository: backend-api
          tag: "1.0.0"
      frontend:
        enabled: true
        replicaCount: 2
    values-production.yaml: |
      backend:
        enabled: true
        replicaCount: 5
        image:
          tag: "1.2.0"
      frontend:
        replicaCount: 4
    charts/backend/Chart.yaml: |
      apiVersion: v2
      name: backend
      version: 1.0.0
      description: Backend API service
    charts/backend/values.yaml: |
      replicaCount: 1
      image:
        repository: backend-api
        tag: "latest"
    charts/backend/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ include "backend.fullname" . }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: backend
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    charts/frontend/Chart.yaml: |
      apiVersion: v2
      name: frontend
      version: 1.0.0
      description: Frontend web application
  commit_message: Update files
