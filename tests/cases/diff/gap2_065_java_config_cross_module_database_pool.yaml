    src/main/resources/application.properties: |
      db.url=jdbc:postgresql://localhost:5432/warehouse
      db.pool.maxSize=10
      db.pool.minIdle=2
      db.pool.timeout=30000
    src/main/java/config/DatabaseConfig.java: |
      package config;

      import java.util.Properties;
      import java.io.InputStream;

      public class DatabaseConfig {
          private final Properties props = new Properties();

          public DatabaseConfig() {
              try (InputStream is = getClass().getResourceAsStream("/application.properties")) {
                  props.load(is);
              } catch (Exception e) {
                  throw new RuntimeException(e);
              }
          }

          public String getUrl() { return props.getProperty("db.url"); }
          public int getMaxPoolSize() { return Integer.parseInt(props.getProperty("db.pool.maxSize")); }
          public int getMinIdle() { return Integer.parseInt(props.getProperty("db.pool.minIdle")); }
          public long getTimeout() { return Long.parseLong(props.getProperty("db.pool.timeout")); }
      }
    src/main/java/pool/ConnectionPool.java: |
      package pool;

      import config.DatabaseConfig;

      public class ConnectionPool {
          private final DatabaseConfig config;

          public ConnectionPool(DatabaseConfig config) {
              this.config = config;
          }

          public void initialize() {
              System.out.println("Pool: " + config.getUrl() + " max=" + config.getMaxPoolSize());
          }
      }
