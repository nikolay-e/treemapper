    app/models/user.rb: |
      class User
        attr_accessor :id, :name, :email

        def self.find(id)
          new(id: id, name: "User #{id}")
        end

        def self.all
          []
        end

        def initialize(id: nil, name: nil, email: nil)
          @id = id
          @name = name
          @email = email
        end

        def save
          true
        end

        def update(attrs)
          attrs.each { |k, v| send("#{k}=", v) }
          true
        end

        def destroy
          true
        end
      end
    app/controllers/users_controller.rb: |
      class UsersController
        def index
          "placeholder"
        end
      end
    app/controllers/sessions_controller.rb: |
      class SessionsController
        def create
          token = authenticate(params[:username], params[:password])
          if token
            session[:token] = token
            redirect_to :dashboard
          else
            flash[:error] = "Invalid credentials"
            render :login
          end
        end

        def destroy
          session.delete(:token)
          redirect_to :login
        end

        private

        def authenticate(username, password)
          return "fake-token" if username == "admin"
          nil
        end

        def params
          { username: 'admin', password: 'secret' }
        end

        def session
          @session ||= {}
        end

        def redirect_to(target); end
        def render(action); end
        def flash
          @flash ||= {}
        end
      end
    app/services/email_service.rb: |
      class EmailService
        SMTP_HOST = 'smtp.example.com'
        SMTP_PORT = 587

        def initialize(from:)
          @from = from
          @queue = []
        end

        def send_welcome(to:, name:)
          @queue << {
            to: to,
            subject: "Welcome #{name}!",
            body: "Thanks for signing up.",
            from: @from
          }
          deliver_all
        end

        def send_reset_password(to:, token:)
          @queue << {
            to: to,
            subject: "Password Reset",
            body: "Reset token: #{token}",
            from: @from
          }
          deliver_all
        end

        private

        def deliver_all
          count = @queue.size
          @queue.clear
          count
        end
      end
