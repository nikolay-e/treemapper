  initial_files:
    src/models/user.model.ts: |
      export interface User {
          id: string;
          name: string;
          email: string;
          avatar?: string;
          role: 'admin' | 'user' | 'guest';
      }

      export interface UserDisplayOptions {
          showAvatar: boolean;
          showRole: boolean;
          compact: boolean;
      }
    src/components/user-card.component.ts: |
      import { Component } from '@angular/core';

      @Component({
          selector: 'app-user-card',
          template: '<div>TODO</div>',
      })
      export class UserCardComponent {}
    src/components/user-settings.component.ts: |
      import { Component } from '@angular/core';

      @Component({
          selector: 'app-user-settings',
          template: '<div class="settings-panel"><h2>User Preferences</h2></div>',
      })
      export class UserSettingsComponent {
          darkMode = false;
          language = 'en';
          notificationsEnabled = true;

          toggleDarkMode(): void {
              this.darkMode = !this.darkMode;
          }

          setLanguage(lang: string): void {
              this.language = lang;
          }
      }
    src/services/notification.service.ts: |
      import { Injectable } from '@angular/core';

      export interface Notification {
          id: string;
          message: string;
          type: 'info' | 'warning' | 'error';
          read: boolean;
      }

      @Injectable({ providedIn: 'root' })
      export class NotificationService {
          private notifications: Notification[] = [];

          add(message: string, type: Notification['type'] = 'info'): void {
              this.notifications.push({
                  id: crypto.randomUUID(),
                  message,
                  type,
                  read: false,
              });
          }

          markRead(id: string): void {
              const n = this.notifications.find(n => n.id === id);
              if (n) n.read = true;
          }

          getUnread(): Notification[] {
              return this.notifications.filter(n => !n.read);
          }
      }
  changed_files:
    src/models/user.model.ts: |
      export interface User {
          id: string;
          name: string;
          email: string;
          avatar?: string;
          role: 'admin' | 'user' | 'guest';
      }

      export interface UserDisplayOptions {
          showAvatar: boolean;
          showRole: boolean;
          compact: boolean;
      }
    src/components/user-card.component.ts: |
      import { Component, Input } from '@angular/core';
      import { User, UserDisplayOptions } from '../models/user.model';

      @Component({
          selector: 'app-user-card',
          template: `
              <div class="user-card" [class.compact]="options?.compact">
                  <img *ngIf="options?.showAvatar && user?.avatar"
                       [src]="user.avatar"
                       [alt]="user.name" />
                  <div class="info">
                      <h3>{{ user?.name }}</h3>
                      <p>{{ user?.email }}</p>
                      <span *ngIf="options?.showRole" class="role">{{ user?.role }}</span>
                  </div>
              </div>
          `,
      })
      export class UserCardComponent {
          @Input() user: User | null = null;
          @Input() options: UserDisplayOptions = {
              showAvatar: true,
              showRole: true,
              compact: false,
          };
      }
    src/components/user-list.component.ts: |
      import { Component } from '@angular/core';
      import { User, UserDisplayOptions } from '../models/user.model';

      @Component({
          selector: 'app-user-list',
          template: `
              <div class="user-list">
                  <app-user-card
                      *ngFor="let user of users"
                      [user]="user"
                      [options]="displayOptions">
                  </app-user-card>
              </div>
          `,
      })
      export class UserListComponent {
          users: User[] = [];
          displayOptions: UserDisplayOptions = {
              showAvatar: true,
              showRole: false,
              compact: true,
          };
      }
    src/components/user-settings.component.ts: |
