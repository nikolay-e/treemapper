name: cicd_and_docs_064_sql_migration_adds_column
tags:
- lang:python
- lang:sql
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    migrations/001_create_users.sql: |
      CREATE TABLE users (
          id SERIAL PRIMARY KEY,
          name VARCHAR(255) NOT NULL,
          email VARCHAR(255) UNIQUE NOT NULL,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE INDEX idx_users_email ON users(email);
    src/models/user.py: |
      from dataclasses import dataclass
      from datetime import datetime
      from typing import Optional

      @dataclass
      class User:
          id: int
          name: str
          email: str
          created_at: Optional[datetime] = None
    src/repositories/user_repository.py: |
      from typing import List, Optional
      from models.user import User

      class UserRepository:
          def find_by_id(self, user_id: int) -> Optional[User]:
              result = db.execute("SELECT * FROM users WHERE id = %s", (user_id,))
              return User(**result) if result else None

          def find_all(self) -> List[User]:
              results = db.execute("SELECT * FROM users")
              return [User(**r) for r in results]
    migrations/000_create_roles.sql: |
      CREATE TABLE roles (
          id SERIAL PRIMARY KEY,
          name VARCHAR(100) UNIQUE NOT NULL,
          description TEXT
      );

      INSERT INTO roles (name, description) VALUES
          ('admin', 'Full system access'),
          ('editor', 'Content management'),
          ('viewer', 'Read-only access');
    src/repositories/order_repository.py: |
      from typing import List, Optional
      from models.order import Order

      class OrderRepository:
          def find_by_user(self, user_id: int) -> List[Order]:
              results = db.execute(
                  "SELECT * FROM orders WHERE user_id = %s", (user_id,)
              )
              return [Order(**r) for r in results]

          def find_pending(self) -> List[Order]:
              results = db.execute(
                  "SELECT * FROM orders WHERE status = 'pending'"
              )
              return [Order(**r) for r in results]
  changed_files:
    migrations/002_add_user_status.sql: |
      ALTER TABLE users
      ADD COLUMN status VARCHAR(50) DEFAULT 'active' NOT NULL;

      ALTER TABLE users
      ADD COLUMN last_login_at TIMESTAMP;

      ALTER TABLE users
      ADD COLUMN is_verified BOOLEAN DEFAULT FALSE;

      CREATE INDEX idx_users_status ON users(status);
      CREATE INDEX idx_users_last_login ON users(last_login_at);
  commit_message: "Add status, last_login, and is_verified columns to users table"
fragments:
- id: new_migration
  selector:
    path: migrations/002_add_user_status.sql
- id: alter_table_users
  selector:
    anchor: ALTER TABLE users
- id: user_model
  selector:
    path: src/models/user.py
    anchor: "class User:"
- id: user_repository
  selector:
    path: src/repositories/user_repository.py
    anchor: class UserRepository
- id: create_users_migration
  selector:
    path: migrations/001_create_users.sql
    anchor: CREATE TABLE users
- id: no_roles_migration
  selector:
    path: migrations/000_create_roles.sql
    anchor: CREATE TABLE roles
- id: no_order_repository
  selector:
    path: src/repositories/order_repository.py
    anchor: class OrderRepository
oracle:
  required:
  - new_migration
  - alter_table_users
  - user_model
  - user_repository
  - create_users_migration
  allowed: []
  forbidden:
  - no_roles_migration
  - no_order_repository
