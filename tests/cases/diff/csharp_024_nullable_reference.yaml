name: csharp_024_nullable_reference
tags:
- lang:typescript
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    src/components/Modal.tsx: |
      import React from 'react';

      interface ModalProps {
        title: string;
        children: React.ReactNode;
        onClose: () => void;
      }

      export const Modal: React.FC<ModalProps> = ({ title, children, onClose }) => (
        <div className="modal">
          <div className="modal-header">
            <h2>{title}</h2>
            <button onClick={onClose}>x</button>
          </div>
          <div className="modal-body">{children}</div>
        </div>
      );
    src/components/Badge.tsx: |
      import React from 'react';

      interface BadgeProps {
        text: string;
        color: string;
      }

      export const Badge: React.FC<BadgeProps> = ({ text, color }) => (
        <span className={`badge badge-${color}`}>{text}</span>
      );
    garbage/theme.ts: |
      const GARBAGE_CS024_THEME_A = "theme_marker";
      export const primaryColor = "#007bff";
    garbage/icons.ts: |
      const GARBAGE_CS024_ICONS_B = "icons_marker";
      export function getIcon(name: string): string { return name; }
    garbage/router.ts: |
      const GARBAGE_CS024_ROUTER_C = "router_marker";
      export function navigate(path: string): void {}
  changed_files:
    src/components/Modal.tsx: |
      import React from 'react';

      interface ModalProps {
        title: string;
        children: React.ReactNode;
        onClose: () => void;
        size?: 'sm' | 'md' | 'lg';
        closeOnBackdrop?: boolean;
      }

      export const Modal: React.FC<ModalProps> = ({
        title,
        children,
        onClose,
        size = 'md',
        closeOnBackdrop = true,
      }) => (
        <div
          className={`modal modal-${size}`}
          onClick={closeOnBackdrop ? onClose : undefined}
        >
          <div className="modal-header" onClick={(e) => e.stopPropagation()}>
            <h2>{title}</h2>
            <button onClick={onClose}>x</button>
          </div>
          <div className="modal-body">{children}</div>
        </div>
      );
    src/components/Badge.tsx: |
      import React from 'react';

      interface BadgeProps {
        text: string;
        color: string;
        size?: 'sm' | 'md' | 'lg';
        rounded?: boolean;
      }

      export const Badge: React.FC<BadgeProps> = ({
        text,
        color,
        size = 'md',
        rounded = false,
      }) => (
        <span
          className={`badge badge-${color} badge-${size}${rounded ? ' badge-pill' : ''}`}
        >
          {text}
        </span>
      );
    garbage/theme.ts: |
      const GARBAGE_CS024_THEME_A = "theme_marker";
      export const primaryColor = "#007bff";
    garbage/icons.ts: |
      const GARBAGE_CS024_ICONS_B = "icons_marker";
      export function getIcon(name: string): string { return name; }
    garbage/router.ts: |
      const GARBAGE_CS024_ROUTER_C = "router_marker";
      export function navigate(path: string): void {}
  commit_message: "feat: add size/closeOnBackdrop to Modal and size/rounded to Badge"
fragments:
- id: modal_size_prop
  selector:
    path: src/components/Modal.tsx
    anchor: "size?: 'sm' | 'md' | 'lg'"
- id: modal_close_on_backdrop
  selector:
    path: src/components/Modal.tsx
    anchor: "closeOnBackdrop"
- id: badge_size_prop
  selector:
    path: src/components/Badge.tsx
    anchor: "size?: 'sm' | 'md' | 'lg'"
- id: badge_rounded_prop
  selector:
    path: src/components/Badge.tsx
    anchor: "rounded?: boolean"
- id: no_garbage_a
  selector:
    anchor: GARBAGE_CS024_THEME_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_CS024_ICONS_B
- id: no_garbage_c
  selector:
    anchor: GARBAGE_CS024_ROUTER_C
oracle:
  required:
  - modal_size_prop
  - modal_close_on_backdrop
  - badge_size_prop
  - badge_rounded_prop
  allowed: []
  forbidden:
  - no_garbage_a
  - no_garbage_b
  - no_garbage_c
