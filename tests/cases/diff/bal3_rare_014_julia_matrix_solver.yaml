repo:
  initial_files:
    src/LinAlg.jl: |
      module LinAlg

      export solve_system, matrix_norm, is_singular

      function solve_system(A::Matrix{Float64}, b::Vector{Float64})
          if is_singular(A)
              error("Matrix is singular")
          end
          A \ b
      end

      function matrix_norm(A::Matrix{Float64})
          sqrt(sum(A .^ 2))
      end

      function is_singular(A::Matrix{Float64})
          abs(det(A)) < 1e-10
      end

      end
    src/Optimizer.jl: |
      module Optimizer

      using ..LinAlg

      export gradient_descent

      function gradient_descent(A::Matrix{Float64}, b::Vector{Float64}, lr::Float64, steps::Int)
          x = zeros(size(A, 2))
          for i in 1:steps
              residual = A * x - b
              gradient = A' * residual
              norm_val = matrix_norm(reshape(gradient, :, 1))
              if norm_val < 1e-8
                  break
              end
              x -= lr * gradient
          end
          x
      end

      end
