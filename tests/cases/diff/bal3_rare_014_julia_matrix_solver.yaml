  changed_files:
    src/LinAlg.jl: |
      module LinAlg

      export solve_system, matrix_norm, is_singular, condition_number, least_squares

      function solve_system(A::Matrix{Float64}, b::Vector{Float64})
          if is_singular(A)
              return least_squares(A, b)
          end
          A \ b
      end

      function matrix_norm(A::Matrix{Float64})
          sqrt(sum(A .^ 2))
      end

      function is_singular(A::Matrix{Float64})
          abs(det(A)) < 1e-10
      end

      function condition_number(A::Matrix{Float64})
          svd_vals = svdvals(A)
          svd_vals[1] / svd_vals[end]
      end

      function least_squares(A::Matrix{Float64}, b::Vector{Float64})
          (A' * A) \ (A' * b)
      end

      end
  commit_message: "add condition number and least squares fallback"
