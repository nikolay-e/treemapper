repo:
  initial_files:
    db/schema.sql: |
      CREATE TABLE employees (
          id SERIAL PRIMARY KEY,
          name VARCHAR(255) NOT NULL,
          department_id INTEGER REFERENCES departments(id),
          salary NUMERIC(12, 2) NOT NULL,
          hired_at DATE NOT NULL
      );

      CREATE TABLE departments (
          id SERIAL PRIMARY KEY,
          name VARCHAR(100) NOT NULL,
          manager_id INTEGER REFERENCES employees(id)
      );
    src/hr/employee_repo.py: |
      def list_employees(conn, department_id: int | None = None) -> list:
          cur = conn.cursor()
          if department_id is not None:
              cur.execute(
                  "SELECT id, name, salary FROM employees WHERE department_id = %s",
                  (department_id,)
              )
          else:
              cur.execute("SELECT id, name, salary FROM employees")
          return cur.fetchall()
    src/hr/payroll.py: |
      def total_payroll(conn, department_id: int | None = None) -> float:
          cur = conn.cursor()
          if department_id is not None:
              cur.execute(
                  "SELECT SUM(salary) FROM employees WHERE department_id = %s",
                  (department_id,)
              )
          else:
              cur.execute("SELECT SUM(salary) FROM employees")
          row = cur.fetchone()
          return float(row[0] or 0)
