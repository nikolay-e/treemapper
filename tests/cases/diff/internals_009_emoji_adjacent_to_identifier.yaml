name: internals_009_emoji_adjacent_to_identifier
tags:
- lang:python
- change:bug_fix
- change:multi_file
- context:test_file
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    src/pricing/engine.py: |
      from src.pricing.rules import apply_tax

      def compute_price(base: float, tax_code: str) -> float:
          # BUG: negative base price not rejected
          return apply_tax(base, tax_code)

      def format_price(amount: float, currency: str = "USD") -> str:
          return f"{currency} {amount:.2f}"
    src/pricing/rules.py: |
      TAX_RATES = {
          "standard": 0.20,
          "reduced": 0.05,
          "exempt": 0.0,
      }

      def apply_tax(amount: float, code: str) -> float:
          rate = TAX_RATES.get(code, 0.20)
          return amount * (1 + rate)
    tests/test_pricing.py: |
      from src.pricing.engine import compute_price, format_price

      def test_standard_tax():
          assert abs(compute_price(100.0, "standard") - 120.0) < 0.001

      def test_exempt_tax():
          assert compute_price(50.0, "exempt") == 50.0
    garbage/coupon.py: |
      # GARBAGE_PENG_A = "coupon_marker"
      def validate_coupon(code: str) -> bool:
          return len(code) > 3
    garbage/loyalty.py: |
      # GARBAGE_PENG_B = "loyalty_marker"
      def get_points(user_id: int) -> int:
          return 0
    garbage/audit.py: |
      # GARBAGE_PENG_C = "audit_marker"
      def log_price_event(event: str) -> None:
          pass
  changed_files:
    src/pricing/engine.py: |
      from src.pricing.rules import apply_tax

      def compute_price(base: float, tax_code: str) -> float:
          if base < 0:
              raise ValueError(f"base price must be non-negative, got {base}")
          return apply_tax(base, tax_code)

      def format_price(amount: float, currency: str = "USD") -> str:
          return f"{currency} {amount:.2f}"
    src/pricing/rules.py: |
      TAX_RATES = {
          "standard": 0.20,
          "reduced": 0.05,
          "exempt": 0.0,
      }

      def apply_tax(amount: float, code: str) -> float:
          rate = TAX_RATES.get(code, 0.20)
          return amount * (1 + rate)
    tests/test_pricing.py: |
      import pytest
      from src.pricing.engine import compute_price, format_price

      def test_standard_tax():
          assert abs(compute_price(100.0, "standard") - 120.0) < 0.001

      def test_exempt_tax():
          assert compute_price(50.0, "exempt") == 50.0

      def test_negative_base_raises():
          with pytest.raises(ValueError, match="non-negative"):
              compute_price(-10.0, "standard")
    garbage/coupon.py: |
      # GARBAGE_PENG_A = "coupon_marker"
      def validate_coupon(code: str) -> bool:
          return len(code) > 3
    garbage/loyalty.py: |
      # GARBAGE_PENG_B = "loyalty_marker"
      def get_points(user_id: int) -> int:
          return 0
    garbage/audit.py: |
      # GARBAGE_PENG_C = "audit_marker"
      def log_price_event(event: str) -> None:
          pass
  commit_message: "fix: raise ValueError for negative base price in compute_price"
fragments:
- id: negative_guard
  selector:
    anchor: "if base < 0"
- id: test_negative_raises
  selector:
    anchor: "def test_negative_base_raises()"
- id: apply_tax_func
  selector:
    anchor: "def apply_tax(amount: float, code: str) -> float"
- id: no_garbage_a
  selector:
    anchor: GARBAGE_PENG_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_PENG_B
- id: no_garbage_c
  selector:
    anchor: GARBAGE_PENG_C
oracle:
  required:
  - negative_guard
  - test_negative_raises
  allowed:
  - apply_tax_func
  forbidden:
  - no_garbage_a
  - no_garbage_b
  - no_garbage_c
