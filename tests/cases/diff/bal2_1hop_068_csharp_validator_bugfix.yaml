    src/Validation/EmailValidator.cs: |
      using System;
      using System.Text.RegularExpressions;

      namespace App.Validation
      {
          public class EmailValidator
          {
              private static readonly Regex Pattern = new Regex(@"^[\w.]+@[\w.]+\.\w+$");

              public bool IsValid(string email)
              {
                  if (string.IsNullOrWhiteSpace(email)) return false;
                  return Pattern.IsMatch(email);
              }
          }
      }
    src/Services/RegistrationService.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Validation;

      namespace App.Services
      {
          public class RegistrationService
          {
              private readonly EmailValidator _emailValidator;

              public RegistrationService(EmailValidator emailValidator)
              {
                  _emailValidator = emailValidator;
              }

              public async Task<bool> Register(string name, string email, string password)
              {
                  if (!_emailValidator.IsValid(email))
                      return false;
                  await Task.Delay(10);
                  return true;
              }
          }
      }
    src/Controllers/AccountController.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Services;
      using Microsoft.AspNetCore.Mvc;

      namespace App.Controllers
      {
          [ApiController]
          [Route("api/account")]
          public class AccountController : ControllerBase
          {
              private readonly RegistrationService _registrationService;

              public AccountController(RegistrationService registrationService)
              {
                  _registrationService = registrationService;
              }

              [HttpPost("register")]
              public async Task<IActionResult> Register(string name, string email, string password)
              {
                  var success = await _registrationService.Register(name, email, password);
                  return success ? Ok() : BadRequest("Invalid email");
              }
          }
      }
