      from typing import Any

      ALLOWED_CONTENT_TYPES = ("application/json", "application/xml")

      class RequestValidator:
          def __init__(self, max_body_size: int = 1048576):
              self.max_body_size = max_body_size

          def validate_content_type(self, content_type: str) -> bool:
              return content_type in ALLOWED_CONTENT_TYPES

          def validate_body(self, body: bytes) -> dict[str, Any]:
              if len(body) > self.max_body_size:
                  return {"valid": False, "reason": "body too large"}
              return {"valid": True}
    src/middleware/rate_limiter.py: |
      from time import monotonic
      from collections import defaultdict

      RATE_LIMIT_WINDOW = 60
      DEFAULT_MAX_REQUESTS = 100

      class RateLimiter:
          def __init__(self, max_requests: int = DEFAULT_MAX_REQUESTS):
              self.max_requests = max_requests
              self._buckets: dict[str, list[float]] = defaultdict(list)

          def is_allowed(self, client_id: str) -> bool:
              now = monotonic()
              window = [t for t in self._buckets[client_id] if now - t < RATE_LIMIT_WINDOW]
              self._buckets[client_id] = window
              if len(window) >= self.max_requests:
                  return False
              self._buckets[client_id].append(now)
              return True
