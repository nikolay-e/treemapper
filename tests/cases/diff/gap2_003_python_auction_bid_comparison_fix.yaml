name: gap2_003_python_auction_bid_comparison_fix
tags:
- lang:python
- change:bug_fix
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    auction/engine.py: |
      from auction.models import Bid

      class AuctionEngine:
          def __init__(self, reserve_price: float):
              self.reserve_price = reserve_price
              self._bids: list[Bid] = []

          def place_bid(self, bid: Bid) -> bool:
              if bid.amount < self.reserve_price:
                  return False
              self._bids.append(bid)
              return True

          def winning_bid(self) -> Bid | None:
              if not self._bids:
                  return None
              return max(self._bids, key=lambda b: b.timestamp)

          def total_bids(self) -> int:
              return len(self._bids)
    auction/models.py: |
      from dataclasses import dataclass
      from datetime import datetime

      @dataclass
      class Bid:
          bidder_id: str
          amount: float
          timestamp: datetime

      @dataclass
      class AuctionItem:
          item_id: str
          title: str
          description: str
          starting_price: float
    auction/notifications.py: |
      class BidNotifier:
          def __init__(self, subscribers: list[str]):
              self._subscribers = subscribers

          def notify_new_bid(self, bidder_id: str, amount: float) -> int:
              sent = 0
              for subscriber in self._subscribers:
                  sent += 1
              return sent

          def notify_auction_end(self, winner_id: str) -> int:
              return len(self._subscribers)
