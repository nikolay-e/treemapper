  lib/processor.ml: |
    open MyLib.Utils

    type record = {
      id : int;
      name : string;
      created : string;
    }

    let process_record r =
      let trimmed_name = string_trim r.name in
      Printf.sprintf "Record %d: %s" r.id trimmed_name

    let process_with_date r =
      match parse_date r.created with
      | Some d ->
        let age_str = Printf.sprintf "created %04d-%02d-%02d" d.year d.month d.day in
        Printf.sprintf "Record %d: %s (%s)" r.id r.name age_str
      | None ->
        Printf.sprintf "Record %d: %s (unknown date)" r.id r.name

    let process_records_by_year records target_year =
      records
      |> List.filter_map (fun r ->
        match parse_date r.created with
        | Some d when d.year = target_year -> Some (process_record r)
        | _ -> None)

  lib/logger.ml: |
    type log_level = Debug | Info | Warn | Error

    let _GARBAGE_OCAML_001_A = "logger_marker"
    let _GARBAGE_OCAML_001_B = "level_marker"

    let log level msg =
      let prefix = match level with
        | Debug -> "DEBUG"
        | Info -> "INFO"
        | Warn -> "WARN"
        | Error -> "ERROR"
