    let is_debug config = config.debug

  lib/validator.ml: |
    open MyLib.Utils

    let _GARBAGE_OCAML_001_E = "validator_marker"
    let _GARBAGE_OCAML_001_F = "rule_marker"

    let validate_date_field s =
      match parse_date s with
      | Some d -> d.year >= 1900 && d.year <= 2100
      | None -> false

    let validate_name s =
      let trimmed = string_trim s in
      String.length trimmed > 0 && String.length trimmed <= 100

must_include_files:
  - lib/processor.ml

must_include_content_from:
  lib/processor.ml:
    - "let process_with_date r"
    - "parse_date r.created"
    - "d.year"
    - "d.month"
  lib/utils.ml:
    - "let parse_date s"
    - "type date ="
    - "year : int"
    - "month : int"
    - "day : int"

must_not_include:
  # logger.ml: same directory, different domain
  - _GARBAGE_OCAML_001_A
  - _GARBAGE_OCAML_001_B
  - log_level
  - log_info
  - log_error
  # config.ml: same directory, unrelated
  - _GARBAGE_OCAML_001_C
  - _GARBAGE_OCAML_001_D
  - default_config
  - load_config
  # validator.ml: HARDEST TRAP, also calls parse_date
  - _GARBAGE_OCAML_001_E
  - _GARBAGE_OCAML_001_F
  - validate_date_field
  - validate_name

must_not_include_files:
  - lib/logger.ml
  - lib/config.ml
  - lib/validator.ml

max_fragments: 8
max_files: 2
add_garbage_files: false
skip_garbage_check: true
