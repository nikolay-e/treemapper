must_include_files:
  - lib/cache.mli
  - lib/cache.ml

must_include_content_from:
  lib/cache.mli:
    - "val evict_expired : t -> float -> t"
    - "val stats : t -> cache_stats"
    - "type cache_stats"
    - "hits : int"
  lib/cache.ml:
    - "let evict_expired cache max_age"
    - "let stats cache"
    - "hit_count : int"
    - "miss_count : int"

must_not_include:
  # store.mli/store.ml: HARDEST TRAP, same .mli/.ml pattern
  - GARBAGE_OCAML_004_A
  - GARBAGE_OCAML_004_B
  - _GARBAGE_OCAML_004_C
  - _GARBAGE_OCAML_004_D
  - "val put :"
  - "val fetch :"
  # pool.mli/pool.ml: same pattern, third pair
  - GARBAGE_OCAML_004_E
  - _GARBAGE_OCAML_004_F
  - _GARBAGE_OCAML_004_G
  - "val acquire :"
  - "val release :"
  # metrics.ml: also has stats-like type
  - _GARBAGE_OCAML_004_H
  - _GARBAGE_OCAML_004_I
  - metric_stats
  - total_requests
  - avg_latency
  - record_request

must_not_include_files:
  - lib/store.mli
  - lib/store.ml
  - lib/pool.mli
  - lib/pool.ml
  - lib/metrics.ml

max_fragments: 8
max_files: 2
add_garbage_files: false
skip_garbage_check: true
