name: bal3_cfgcode_002_go_json_feature_flags
tags:
- lang:go
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/features.json: |
      {
        "features": {
          "dark_mode": true,
          "beta_search": false,
          "new_dashboard": false
        }
      }
    internal/features/flags.go: |
      package features

      import (
          "encoding/json"
          "os"
      )

      type FeatureFlags struct {
          DarkMode     bool `json:"dark_mode"`
          BetaSearch   bool `json:"beta_search"`
          NewDashboard bool `json:"new_dashboard"`
      }

      func LoadFlags(path string) (*FeatureFlags, error) {
          data, err := os.ReadFile(path)
          if err != nil {
              return nil, err
          }
          var wrapper struct {
              Features FeatureFlags `json:"features"`
          }
          if err := json.Unmarshal(data, &wrapper); err != nil {
              return nil, err
          }
          return &wrapper.Features, nil
      }

      func (f *FeatureFlags) IsEnabled(name string) bool {
          switch name {
          case "dark_mode":
              return f.DarkMode
          case "beta_search":
              return f.BetaSearch
          case "new_dashboard":
              return f.NewDashboard
          default:
              return false
          }
      }
    internal/api/router.go: |
      package api

      GARBAGE_CFGCODE_002_ROUTER_A = "router"
      GARBAGE_CFGCODE_002_MUX_B = true

      func SetupRoutes() {}
    internal/auth/session.go: |
      package auth

      GARBAGE_CFGCODE_002_SESSION_C = "session"
      GARBAGE_CFGCODE_002_TOKEN_D = "jwt"

      type Session struct {
          UserID string
      }
    internal/metrics/collector.go: |
      package metrics

      GARBAGE_CFGCODE_002_METRIC_E = "counter"
      GARBAGE_CFGCODE_002_PROM_F = true

      func RecordMetric(name string, value float64) {}
  changed_files:
    config/features.json: |
      {
        "features": {
          "dark_mode": true,
          "beta_search": true,
          "new_dashboard": true,
          "ai_assistant": false
        }
      }
  commit_message: "enable beta_search and new_dashboard, add ai_assistant flag"
