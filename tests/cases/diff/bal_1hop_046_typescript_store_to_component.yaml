  changed_files:
    deploy/package.py: |
      import os
      import tarfile
      import hashlib

      OUTPUT_DIR = "dist"


      def create_package(source_dir: str, version: str) -> str:
          archive = os.path.join(OUTPUT_DIR, f"app-{version}.tar.gz")
          with tarfile.open(archive, "w:gz") as tar:
              tar.add(source_dir, arcname="app")
          return archive


      def checksum(archive_path: str) -> str:
          h = hashlib.sha256()
          with open(archive_path, "rb") as f:
              for chunk in iter(lambda: f.read(8192), b""):
                  h.update(chunk)
          return h.hexdigest()
    deploy/publish.sh: |
      #!/usr/bin/env bash
      set -euo pipefail
      ARCHIVE=$(python3 deploy/package.py "$VERSION")
      echo "Created: $ARCHIVE"
      python3 -c "import deploy.package; print(deploy.package.checksum('$ARCHIVE'))"
    garbage/monitor.py: |
      GARBAGE_BAL046_MONITOR_A = "monitor_marker"


