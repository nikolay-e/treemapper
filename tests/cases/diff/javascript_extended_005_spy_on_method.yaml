name: javascript_extended_005_spy_on_method
repo:
  initial_files:
    src/logger.ts: |
      export interface LogEntry {
          level: string;
          message: string;
          timestamp: Date;
      }

      export const logger = {
          entries: [] as LogEntry[],

          log(message: string): void {
              this.entries.push({ level: 'info', message, timestamp: new Date() });
              console.log(`[INFO] ${message}`);
          },

          error(message: string): void {
              this.entries.push({ level: 'error', message, timestamp: new Date() });
              console.error(`[ERROR] ${message}`);
          },

          warn(message: string): void {
              this.entries.push({ level: 'warn', message, timestamp: new Date() });
              console.warn(`[WARN] ${message}`);
          },
      };
    src/app.ts: |
      import { logger } from './logger';

      export function processData(data: string): string {
          logger.log(`Processing: ${data}`);
          const result = data.toUpperCase().trim();
          if (result.length === 0) {
              logger.warn('Empty data after processing');
          }
          return result;
      }

      export function handleError(error: Error): void {
          logger.error(`Unhandled error: ${error.message}`);
      }
    src/app.test.ts: |
      console.log('placeholder');
    src/unrelated/metrics.ts: |
      export class MetricsCollector {
          private counters: Map<string, number> = new Map();

          increment(name: string): void {
              const current = this.counters.get(name) ?? 0;
              this.counters.set(name, current + 1);
          }

          getCount(name: string): number {
              return this.counters.get(name) ?? 0;
          }
      }

      export function reportMetrics(collector: MetricsCollector): void {
          console.log('reporting metrics snapshot');
      }
    src/unrelated/scheduler.ts: |
      interface SchedulerConfig {
          interval: number;
          maxJobs: number;
      }

      export class JobScheduler {
          private jobs: Array<() => void> = [];

          schedule(job: () => void): void {
              this.jobs.push(job);
          }

          run(): void {
              this.jobs.forEach(job => job());
          }
      }

      export function clearSchedule(scheduler: JobScheduler): void {
          console.log('clearing scheduled jobs');
      }
