    requirements.txt: |
      flask==2.3.0
      psycopg2-binary==2.9.9
      redis==5.0.0
      gunicorn==21.2.0
    Dockerfile: |
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY src/ ./src/
      CMD ["gunicorn", "-b", "0.0.0.0:8080", "src.app:app"]
    docker-compose.yml: |
      version: '3.8'

      services:
        web:
          build:
            context: .
            dockerfile: Dockerfile
          ports:
            - "8080:8080"
          environment:
            - DB_HOST=db
            - DB_NAME=app
            - DB_USER=postgres
            - DB_PASSWORD=secret
            - REDIS_HOST=redis
          depends_on:
            db:
              condition: service_healthy
              restart: true
            redis:
              condition: service_healthy
            migrations:
              condition: service_completed_successfully
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 40s
          restart: unless-stopped

        worker:
          build:
            context: .
            dockerfile: Dockerfile
          command: ["python", "src/worker.py"]
          environment:
            - DB_HOST=db
            - REDIS_HOST=redis
          depends_on:
            web:
              condition: service_healthy
            redis:
              condition: service_healthy

        db:
          image: postgres:16-alpine
          environment:
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: secret
            POSTGRES_DB: app
          volumes:
            - postgres_data:/var/lib/postgresql/data
          healthcheck:
            test: ["CMD-SHELL", "pg_isready -U postgres"]
            interval: 5s
            timeout: 5s
            retries: 5
            start_period: 10s

        redis:
          image: redis:7-alpine
          command: redis-server --appendonly yes
          volumes:
            - redis_data:/data
          healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 3s
            retries: 3

        migrations:
          build:
            context: .
            dockerfile: Dockerfile
          command: ["python", "-c", "print('Migrations completed')"]
          environment:
            - DB_HOST=db
          depends_on:
            db:
              condition: service_healthy

      volumes:
        postgres_data:
        redis_data:
    scripts/wait_for_deps.sh: |
      #!/bin/bash
      until pg_isready; do sleep 1; done
    tests/test_deps.py: |
      def test_dependency_order():
          pass
    docs/services.md: |
      # Service Dependencies
    k8s/deployment.yaml: |
      apiVersion: apps/v1
    helm/templates/deployment.yaml: ''
  commit_message: Update files
fragments:
- id: docker_compose_file
  selector:
    path: docker-compose.yml
- id: dockerfile_build_context
  selector:
    anchor: 'dockerfile: Dockerfile'
- id: postgres_volumes
  selector:
    anchor: 'postgres_data:'
- id: app_db_connection
  selector:
    path: src/app.py
    anchor: 'host=os.getenv("DB_HOST", "db")'
- id: app_redis_connection
  selector:
    path: src/app.py
    anchor: 'host=os.getenv("REDIS_HOST", "redis")'
- id: worker_imports
  selector:
    path: src/worker.py
    anchor: "from app import get_db_connection, get_redis_client"
- id: no_wait_script
  selector:
    path: scripts/wait_for_deps.sh
    anchor: "until pg_isready"
- id: no_k8s_deployment
  selector:
    path: k8s/deployment.yaml
    anchor: "apiVersion: apps/v1"
- id: no_test_deps
  selector:
    path: tests/test_deps.py
    anchor: "def test_dependency_order"
oracle:
  required:
  - docker_compose_file
  - dockerfile_build_context
  - postgres_volumes
  - app_db_connection
  - app_redis_connection
  - worker_imports
  allowed: []
  forbidden:
  - no_wait_script
  - no_k8s_deployment
  - no_test_deps
