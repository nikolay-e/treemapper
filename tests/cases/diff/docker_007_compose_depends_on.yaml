name: docker_007_compose_depends_on
tags:
- lang:python
- lang:shell
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    src/app.py: |
      from flask import Flask, jsonify
      import psycopg2
      import redis
      import os

      app = Flask(__name__)

      def get_db_connection():
          return psycopg2.connect(
              host=os.getenv("DB_HOST", "db"),
              database=os.getenv("DB_NAME", "app"),
              user=os.getenv("DB_USER", "postgres"),
              password=os.getenv("DB_PASSWORD", "secret")
          )

      def get_redis_client():
          return redis.Redis(
              host=os.getenv("REDIS_HOST", "redis"),
              port=int(os.getenv("REDIS_PORT", "6379")),
              decode_responses=True
          )

      @app.route('/health')
      def health():
          return jsonify(status='ok')

      @app.route('/db-check')
      def db_check():
          conn = get_db_connection()
          cursor = conn.cursor()
          cursor.execute('SELECT 1')
          conn.close()
          return jsonify(db='connected')

      @app.route('/redis-check')
      def redis_check():
          client = get_redis_client()
          client.ping()
          return jsonify(redis='connected')
    src/worker.py: |
      import time
      from app import get_db_connection, get_redis_client

      def process_queue():
          redis_client = get_redis_client()
          db_conn = get_db_connection()

          while True:
              job = redis_client.lpop('jobs')
              if job:
                  print(f"Processing job: {job}")
              time.sleep(1)

      if __name__ == "__main__":
          process_queue()
    requirements.txt: |
      flask==2.3.0
      psycopg2-binary==2.9.9
      redis==5.0.0
      gunicorn==21.2.0
    Dockerfile: |
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY src/ ./src/
      CMD ["gunicorn", "-b", "0.0.0.0:8080", "src.app:app"]
    docker-compose.yml: |
      version: '3.8'
      services:
        web:
          build: .
          depends_on:
            - db
        db:
          image: postgres:15
    scripts/wait_for_deps.sh: |
      #!/bin/bash
      until pg_isready; do sleep 1; done
    tests/test_deps.py: |
      def test_dependency_order():
          pass
    docs/services.md: |
      # Service Dependencies
    k8s/deployment.yaml: |
      apiVersion: apps/v1
    helm/templates/deployment.yaml: ''
  changed_files:
    src/app.py: |
