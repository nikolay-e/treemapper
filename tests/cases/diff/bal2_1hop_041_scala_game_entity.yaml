name: bal2_1hop_041_scala_game_entity
tags:
- lang:scala
- change:new_function
- context:import_chain
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    src/main/scala/engine/Entity.scala: |
      package engine

      trait Entity {
        def id: String
        def position: (Double, Double)
        def update(dt: Double): Entity
      }
    src/main/scala/engine/Physics.scala: |
      package engine

      object Physics {
        def applyGravity(entity: Entity, dt: Double): (Double, Double) = {
          val (x, y) = entity.position
          (x, y - 9.81 * dt)
        }

        def checkCollision(a: Entity, b: Entity): Boolean = {
          val (ax, ay) = a.position
          val (bx, by) = b.position
          math.abs(ax - bx) < 1.0 && math.abs(ay - by) < 1.0
        }
      }
    src/main/scala/game/Player.scala: |
      package game

      import engine.Entity

      case class Player(id: String, position: (Double, Double), health: Int) extends Entity {
        def update(dt: Double): Player = {
          val (x, y) = position
          copy(position = (x, y - 9.81 * dt))
        }
      }
    src/main/scala/game/Enemy.scala: |
      package game

      import engine.Entity

      case class Enemy(id: String, position: (Double, Double), damage: Int) extends Entity {
        def update(dt: Double): Enemy = {
          val (x, y) = position
          copy(position = (x + 0.5 * dt, y))
        }
      }
    src/main/scala/game/World.scala: |
      package game

      import engine.{Entity, Physics}

      class World(entities: List[Entity]) {
        def tick(dt: Double): World = {
          new World(entities.map(_.update(dt)))
        }

        def collisions: List[(Entity, Entity)] = {
          for {
            a <- entities
            b <- entities if a.id != b.id && Physics.checkCollision(a, b)
          } yield (a, b)
        }
      }
    src/main/scala/render/Sprite.scala: |
      package render

      GARBAGE_041_SPRITE_A = "sprite"

      class Sprite(texture: String, width: Int, height: Int) {
        def draw(x: Double, y: Double): Unit = ()
      }
    src/main/scala/audio/SoundEngine.scala: |
      package audio

      GARBAGE_041_SOUND_B = "sound"

      class SoundEngine {
        def play(clip: String): Unit = ()
        def stop(clip: String): Unit = ()
      }
    src/main/scala/input/KeyboardHandler.scala: |
      package input

      GARBAGE_041_KEYBOARD_C = "keyboard"

      class KeyboardHandler {
        def isPressed(key: String): Boolean = false
      }
  changed_files:
    src/main/scala/engine/Entity.scala: |
      package engine

      trait Entity {
        def id: String
        def position: (Double, Double)
        def velocity: (Double, Double) = (0.0, 0.0)
        def update(dt: Double): Entity
        def boundingBox: (Double, Double, Double, Double) = {
          val (x, y) = position
          (x - 0.5, y - 0.5, x + 0.5, y + 0.5)
        }
      }
  commit_message: "feat: add velocity and boundingBox to Entity trait"
