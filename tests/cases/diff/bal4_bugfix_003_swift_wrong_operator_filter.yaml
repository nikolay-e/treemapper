repo:
  initial_files:
    Sources/Models/Product.swift: |
      struct Product {
          let id: Int
          let name: String
          let price: Double
          let isAvailable: Bool
      }
    Sources/Services/Catalog.swift: |
      import Foundation

      class Catalog {
          var products: [Product] = []

          func affordableProducts(maxPrice: Double) -> [Product] {
              return products.filter { $0.price > maxPrice && $0.isAvailable }
          }

          func addProduct(_ product: Product) {
              products.append(product)
          }

          func removeProduct(id: Int) {
              products.removeAll { $0.id == id }
          }
      }
    Sources/Views/ProductList.swift: |
      class ProductListView {
          let catalog: Catalog

          init(catalog: Catalog) {
              self.catalog = catalog
          }

          func render(budget: Double) -> [String] {
              let items = catalog.affordableProducts(maxPrice: budget)
              return items.map { $0.name }
          }
      }
