    from typing import List, Dict, Any, Optional, TypeVar, Generic
    from dataclasses import dataclass
    from datetime import datetime

    @dataclass
    class StoredEvent:
        event_id: str
        event_type: str
        payload: Dict[str, Any]
        timestamp: datetime

    class EventStore:
        def __init__(self):
            self._events: List[StoredEvent] = []

        def append(self, event_type: str, payload: Dict[str, Any]) -> StoredEvent:
            event = StoredEvent(
                event_id=f"evt_{len(self._events)}",
                event_type=event_type,
                payload=payload,
                timestamp=datetime.now(),
            )
            self._events.append(event)
            return event

        def get_by_type(self, event_type: str) -> List[StoredEvent]:
            return [e for e in self._events if e.event_type == event_type]
  cache_store.py: |
    from typing import Dict, Any, Optional, TypeVar, Generic
    from datetime import datetime, timedelta
    from dataclasses import dataclass

    T = TypeVar('T')

    @dataclass
    class CachedItem(Generic[T]):
        value: T
        expires_at: datetime

    class CacheStore(Generic[T]):
        def __init__(self, ttl_seconds: int = 300):
            self._store: Dict[str, CachedItem[T]] = {}
            self._ttl = ttl_seconds

        def get(self, key: str) -> Optional[T]:
            item = self._store.get(key)
            if item and datetime.now() < item.expires_at:
                return item.value
            return None

        def set(self, key: str, value: T) -> None:
            self._store[key] = CachedItem(
                value=value,
                expires_at=datetime.now() + timedelta(seconds=self._ttl),
            )
