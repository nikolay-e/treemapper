must_include_files:
  - config.py
  # Q1/Q2: compat.py defines tomllib and PathLike that config.py imports
  - compat.py

must_include_content_from:
  config.py:
    - "from compat import tomllib, PathLike"
    - 'def load(path: PathLike) -> dict:'
    - "tomllib.load(f)"
  compat.py:
    - "import tomllib"
    - "PathLike: TypeAlias = str"

must_not_include:
  # --- yaml_parser.py: config file parser, same domain ---
  # load() returning dict — identical pattern to config.py load().
  # But independent YAML parser, no compat.py or tomllib dependency.
  - YamlConfigParser
  - validate_schema
  - strict_mode
  # --- circuit_breaker.py: unrelated failure handling domain ---
  - CircuitBreaker
  - record_failure
  - is_open

must_not_include_files:
  - adapters/yaml_parser.py
  - infra/circuit_breaker.py

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
