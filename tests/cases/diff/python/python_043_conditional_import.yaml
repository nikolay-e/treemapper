# Scenario: config.py adds `from compat import tomllib, PathLike` and
#   implements real TOML config loading. compat.py is unchanged but defines
#   the version-conditional imports.
#
# Diff shows:
#   + from compat import tomllib, PathLike
#   + def load(path: PathLike) -> dict: with open(path, "rb") as f: return tomllib.load(f)
#
# Reviewer questions:
#   Q1: "Is compat.py's version-conditional import pattern correct?"
#       -> compat.py (UNCHANGED): if sys.version_info >= (3, 11): import
#          tomllib else: import tomli as tomllib. Reviewer verifies the
#          conditional provides tomllib regardless of Python version.
#
#   Q2: "What is PathLike — just str, or something more complex?"
#       -> compat.py: PathLike: TypeAlias = str. Reviewer sees it's a
#          simple alias and the load(path: PathLike) signature is clear.
#
# Not needed for comprehension:
#   - adapters/yaml_parser.py: YamlConfigParser with load/dump methods.
#     HARDEST TRAP: same "config file parser" domain — load() reads a
#     file and returns a dict, dump() writes it. Same pattern as the new
#     config.py load(). But doesn't use compat.py or tomllib. Independent
#     YAML parser with its own file handling.
#
#   - infra/circuit_breaker.py: CircuitBreaker with failure tracking.
#     Completely different domain (failure handling), no config/compat
#     dependency.

max_enrichment: 7.8
initial:
  compat.py: |
    import sys

    if sys.version_info >= (3, 11):
        import tomllib
    else:
        import tomli as tomllib

    if sys.version_info >= (3, 10):
        from typing import TypeAlias
    else:
        from typing_extensions import TypeAlias

    PathLike: TypeAlias = str

    def get_python_version() -> str:
        return f"{sys.version_info.major}.{sys.version_info.minor}"
  config.py: |
    def load():
        pass

    def get_default_config() -> dict:
        return {"debug": False, "timeout": 30}
  adapters/yaml_parser.py: |
    from typing import Any

    class YamlConfigParser:
        def __init__(self, strict_mode: bool = True):
            self.strict_mode = strict_mode

        def load(self, path: str) -> dict[str, Any]:
            with open(path, "r") as f:
                return {}

        def dump(self, data: dict[str, Any], path: str) -> None:
            with open(path, "w") as f:
                pass

        def validate_schema(self, data: dict, schema: dict) -> bool:
            return all(k in data for k in schema.get("required", []))
  infra/circuit_breaker.py: |
    from datetime import datetime, timedelta

    class CircuitBreaker:
        def __init__(self, failure_threshold: int = 5, reset_timeout: int = 60):
            self.failure_threshold = failure_threshold
            self.reset_timeout = reset_timeout
            self._failures = 0
            self._last_failure: datetime | None = None

        def record_failure(self) -> None:
            self._failures += 1
            self._last_failure = datetime.utcnow()

        def record_success(self) -> None:
            self._failures = 0

        def is_open(self) -> bool:
            if self._failures < self.failure_threshold:
                return False
            if self._last_failure and datetime.utcnow() - self._last_failure > timedelta(seconds=self.reset_timeout):
                return False
            return True

