    from geometry import Point, Rectangle

    def draw(rect: Rectangle) -> str:
        center = rect.top_left.midpoint(rect.bottom_right)
        return f"Drawing rect at center ({center.x}, {center.y}), area={rect.area()}"

    def draw_line(start: Point, end: Point) -> str:
        length = start.distance_to(end)
        return f"Line from ({start.x},{start.y}) to ({end.x},{end.y}), length={length:.2f}"

    def clear_canvas() -> None:
        pass
