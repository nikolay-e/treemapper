  animation.py: |
    from typing import List, Optional, NamedTuple
    from dataclasses import dataclass

    class Keyframe(NamedTuple):
        time_ms: int
        x: float
        y: float
        opacity: float = 1.0

    @dataclass
    class Animation:
        name: str
        keyframes: List[Keyframe]
        loop: bool = False

    class AnimationPlayer:
        def __init__(self):
            self._animations: dict[str, Animation] = {}

        def register(self, animation: Animation) -> None:
            self._animations[animation.name] = animation

        def get_frame_at(self, name: str, time_ms: int) -> Optional[Keyframe]:
            anim = self._animations.get(name)
            if not anim or not anim.keyframes:
                return None
            for kf in reversed(anim.keyframes):
                if kf.time_ms <= time_ms:
                    return kf
            return anim.keyframes[0]
  layout_engine.py: |
    from typing import List, Dict, Optional
    from dataclasses import dataclass

    @dataclass
    class LayoutBox:
        x: float
        y: float
        width: float
        height: float

    class LayoutEngine:
        def __init__(self, container_width: float, container_height: float):
            self._width = container_width
            self._height = container_height

        def flow_layout(self, items: List[tuple[float, float]], gap: float = 10) -> List[LayoutBox]:
            boxes = []
            current_x, current_y = 0.0, 0.0
            for w, h in items:
                if current_x + w > self._width:
                    current_x = 0.0
                    current_y += h + gap
                boxes.append(LayoutBox(current_x, current_y, w, h))
                current_x += w + gap
            return boxes
