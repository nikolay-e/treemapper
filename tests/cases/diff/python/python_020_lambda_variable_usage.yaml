    import re
    from typing import Optional

    class TextCleaner:
        def __init__(self):
            self._whitespace_re = re.compile(r'\s+')
            self._special_re = re.compile(r'[^a-zA-Z0-9\s]')

        def clean(self, text: str) -> str:
            text = self._whitespace_re.sub(' ', text)
            return text.strip()

        def remove_special(self, text: str) -> str:
            return self._special_re.sub('', text)

        def normalize_whitespace(self, text: str) -> str:
            return self._whitespace_re.sub(' ', text).strip()
  string_utils.py: |
    from typing import List, Optional

    def truncate(text: str, max_length: int = 100, suffix: str = "...") -> str:
        if len(text) <= max_length:
            return text
        return text[:max_length - len(suffix)] + suffix

    def capitalize_words(text: str) -> str:
        return ' '.join(word.capitalize() for word in text.split())

    def extract_words(text: str) -> List[str]:
        return [w for w in text.split() if w.strip()]

    def pad_string(text: str, width: int, fill_char: str = ' ') -> str:
        return text.center(width, fill_char)
