initial:
  mixins.py: |
    import logging
    from typing import Optional, Any, Dict
    from dataclasses import dataclass, field
    from datetime import datetime
    from enum import Enum

    class LogLevel(Enum):
        INFO = "info"
        WARNING = "warning"
        ERROR = "error"

    @dataclass
    class LogEntry:
        timestamp: datetime
        level: LogLevel
        message: str
        context: Dict[str, Any] = field(default_factory=dict)

        def to_dict(self) -> dict:
            return {
                "timestamp": self.timestamp.isoformat(),
                "level": self.level.value,
                "message": self.message,
                "context": self.context
            }

    class LoggingMixin:
        _log_history: list[LogEntry] = []

        @property
        def logger(self) -> logging.Logger:
            return logging.getLogger(self.__class__.__name__)

        def log_action(self, action: str, **context) -> None:
            entry = LogEntry(
                timestamp=datetime.now(),
                level=LogLevel.INFO,
                message=f"Action: {action}",
                context=context
            )
            self._log_history.append(entry)
            self.logger.info(entry.message)

        def log_error(self, error: str, **context) -> None:
            entry = LogEntry(
                timestamp=datetime.now(),
                level=LogLevel.ERROR,
                message=f"Error: {error}",
                context=context
            )
            self._log_history.append(entry)
            self.logger.error(entry.message)

        def get_log_history(self) -> list[LogEntry]:
            return self._log_history.copy()
