# Scenario: loader.py imports AppConfig and DatabaseConfig TypedDicts from
#   types.py and implements real config loading with json.load(). Both
#   loader.py and types.py are relevant; types.py is unchanged.
#
# Diff shows:
#   + from types import AppConfig, DatabaseConfig
#   + def load_config(path: str) -> AppConfig: (replaces stub)
#   + json.load(), db_config: DatabaseConfig, AppConfig(...) construction
#
# Reviewer questions:
#   Q1: "Does load_config correctly populate all required AppConfig fields?"
#       -> types.py (UNCHANGED): AppConfig has debug, timeout, host, port,
#          database (DatabaseConfig), log_level (Optional). The diff
#          constructs AppConfig with all fields. Reviewer must verify
#          the field names and types match the TypedDict definition.
#
#   Q2: "Is DatabaseConfig a nested TypedDict — are all its keys required?"
#       -> types.py: DatabaseConfig(TypedDict) has host, port, name, user,
#          password — all required (total=True by default). The diff assigns
#          raw["database"] directly. Reviewer must check if raw JSON will
#          always have all 5 keys.
#
#   Q3: "Does ServerConfig's total=False matter here?"
#       -> types.py defines ServerConfig(TypedDict, total=False) but loader.py
#          doesn't import or use it. Not relevant to this diff.
#
# Not needed for comprehension:
#   - schema_validator.py: SchemaValidator with validate() method checking
#     required fields and types. HARDEST TRAP: validates data against a
#     schema with field names — same "type validation" concept as TypedDict.
#     SchemaError dataclass parallels TypedDict field checking. But
#     schema_validator uses runtime isinstance checks, not TypedDict static
#     typing. No import from types.py or loader.py.
#
#   - config_merger.py: deep_merge() and ConfigMerger class for merging
#     config dicts. "Config" domain overlap — both deal with configuration
#     dictionaries. But config_merger works on plain dicts, doesn't import
#     AppConfig or DatabaseConfig, and doesn't affect how loader.py loads.
