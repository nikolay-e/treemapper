    schema_validator.py: |
      from typing import Dict, Any, List, Optional
      from dataclasses import dataclass

      @dataclass
      class SchemaError:
          path: str
          message: str

      class SchemaValidator:
          def __init__(self, schema: Dict[str, Any]):
              self._schema = schema

          def validate(self, data: Dict[str, Any]) -> List[SchemaError]:
              errors = []
              for field, field_type in self._schema.items():
                  if field not in data:
                      errors.append(SchemaError(field, f"Missing required field: {field}"))
                  elif not isinstance(data[field], field_type):
                      errors.append(SchemaError(field, f"Expected {field_type.__name__}"))
              return errors
    config_merger.py: |
      from typing import Dict, Any, Optional

      def deep_merge(base: Dict[str, Any], override: Dict[str, Any]) -> Dict[str, Any]:
          result = base.copy()
          for key, value in override.items():
              if key in result and isinstance(result[key], dict) and isinstance(value, dict):
                  result[key] = deep_merge(result[key], value)
              else:
                  result[key] = value
          return result

      class ConfigMerger:
          def __init__(self, base: Dict[str, Any]):
              self._base = base

          def merge(self, overrides: Dict[str, Any]) -> Dict[str, Any]:
              return deep_merge(self._base, overrides)
