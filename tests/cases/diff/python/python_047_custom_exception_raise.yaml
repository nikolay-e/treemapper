# Scenario: service.py adds imports of custom exceptions and uses them for
#   input validation and not-found handling.
#
# Reviewer questions:
#   - Are ValidationError and NotFoundError the right exceptions for these cases?
#   - Does the validation logic cover all required fields?
#
# Trap files:
#   - audit/audit_logger.py: logging/event vocabulary, no dependency on exceptions or service
#   - cache/lru_cache.py: caching with get/put, completely different domain

initial:
  exceptions.py: |
    class ValidationError(Exception):
        def __init__(self, field: str, message: str):
            self.field = field
            self.message = message
            super().__init__(f"Validation failed on '{field}': {message}")

        def to_dict(self) -> dict:
            return {"field": self.field, "error": self.message}

    class NotFoundError(Exception):
        def __init__(self, entity: str, entity_id: int):
            self.entity = entity
            self.entity_id = entity_id
            super().__init__(f"{entity} with id={entity_id} not found")

        def to_dict(self) -> dict:
            return {"entity": self.entity, "id": self.entity_id, "error": "not found"}

    class AuthorizationError(Exception):
        def __init__(self, action: str, resource: str):
            self.action = action
            self.resource = resource
            super().__init__(f"Not authorized to {action} on {resource}")
