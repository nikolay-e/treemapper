    from typing import Generic, TypeVar, Optional, Callable
    from dataclasses import dataclass, field
    from datetime import datetime, timedelta
    from collections import OrderedDict

    T = TypeVar("T")

    @dataclass
    class CacheEntry(Generic[T]):
        value: T
        created_at: datetime
        expires_at: Optional[datetime]
        access_count: int = 0

        @property
        def is_expired(self) -> bool:
            if self.expires_at is None:
                return False
            return datetime.now() > self.expires_at

    class CacheStatistics:
        def __init__(self):
            self.hits = 0
            self.misses = 0

        @property
        def hit_rate(self) -> float:
            total = self.hits + self.misses
            return self.hits / total if total > 0 else 0.0

    class Cache(Generic[T]):
        def __init__(self, max_size: int = 1000, default_ttl: int = None):
            self._data: OrderedDict[str, CacheEntry[T]] = OrderedDict()
            self._max_size = max_size
            self._default_ttl = default_ttl
            self.stats = CacheStatistics()

        def __getitem__(self, key: str) -> Optional[T]:
            entry = self._data.get(key)
            if entry is None:
                self.stats.misses += 1
                return None
            if entry.is_expired:
                del self._data[key]
                self.stats.misses += 1
                return None
            entry.access_count += 1
            self.stats.hits += 1
            return entry.value

        def __setitem__(self, key: str, value: T) -> None:
            expires_at = None
            if self._default_ttl:
                expires_at = datetime.now() + timedelta(seconds=self._default_ttl)
            self._data[key] = CacheEntry(
                value=value,
                created_at=datetime.now(),
                expires_at=expires_at
            )

        def __contains__(self, key: str) -> bool:
            entry = self._data.get(key)
            return entry is not None and not entry.is_expired
