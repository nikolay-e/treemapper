    from typing import Optional, List
    from datetime import datetime, date
    from dataclasses import dataclass
    from enum import Enum

    class Gender(Enum):
        MALE = "male"
        FEMALE = "female"
        OTHER = "other"
        PREFER_NOT_TO_SAY = "prefer_not_to_say"

    @dataclass
    class Address:
        street: str
        city: str
        country: str
        postal_code: str

    class Person:
        def __init__(self, first: str, last: str, birth_date: Optional[date] = None):
            self._first = first
            self._last = last
            self._birth_date = birth_date
            self._email: Optional[str] = None
            self._phone: Optional[str] = None
            self._address: Optional[Address] = None
            self._gender: Optional[Gender] = None
            self._created_at = datetime.now()
            self._updated_at = datetime.now()

        @property
        def first(self) -> str:
            return self._first

        @first.setter
        def first(self, value: str) -> None:
            self._first = value.strip()
            self._mark_updated()

        @property
        def last(self) -> str:
            return self._last

        @last.setter
        def last(self, value: str) -> None:
            self._last = value.strip()
            self._mark_updated()

        @property
        def full_name(self) -> str:
            return f"{self._first} {self._last}"

        @property
        def age(self) -> Optional[int]:
            if self._birth_date is None:
                return None
            today = date.today()
            age = today.year - self._birth_date.year
            if (today.month, today.day) < (self._birth_date.month, self._birth_date.day):
                age -= 1
            return age

        @property
        def is_adult(self) -> bool:
            age = self.age
            return age is not None and age >= 18

        @property
        def email(self) -> Optional[str]:
            return self._email

        @email.setter
        def email(self, value: str) -> None:
            if value and "@" not in value:
                raise ValueError("Invalid email format")
            self._email = value
            self._mark_updated()

        @property
        def display_info(self) -> str:
            parts = [self.full_name]
            if self.age is not None:
                parts.append(f"Age: {self.age}")
            if self._email:
                parts.append(f"Email: {self._email}")
            return " | ".join(parts)

        def _mark_updated(self) -> None:
            self._updated_at = datetime.now()

        def set_address(self, address: Address) -> None:
            self._address = address
            self._mark_updated()

        def get_address(self) -> Optional[Address]:
            return self._address
