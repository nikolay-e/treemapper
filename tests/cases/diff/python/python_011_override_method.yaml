    from typing import List, Any, Callable, Optional
    from dataclasses import dataclass

    @dataclass
    class PipelineStage:
        name: str
        transform: Callable[[Any], Any]
        enabled: bool = True

    class DataPipeline:
        def __init__(self):
            self._stages: List[PipelineStage] = []
            self._processed_count = 0

        def add_stage(self, name: str, transform: Callable[[Any], Any]) -> None:
            self._stages.append(PipelineStage(name=name, transform=transform))

        def process(self, data: List[Any]) -> List[Any]:
            result = data
            for stage in self._stages:
                if stage.enabled:
                    result = [stage.transform(item) for item in result]
                    self._processed_count += len(result)
            return result

        def get_stats(self) -> dict:
            return {"stages": len(self._stages), "processed": self._processed_count}
