    from typing import List, Any, Callable, Optional
    from dataclasses import dataclass

    @dataclass
    class FilterRule:
        name: str
        predicate: Callable[[Any], bool]
        error_message: str = ""

    class FilterChain:
        def __init__(self):
            self._filters: List[FilterRule] = []
            self._rejected_count = 0

        def add_filter(self, name: str, predicate: Callable[[Any], bool]) -> None:
            self._filters.append(FilterRule(name=name, predicate=predicate))

        def validate(self, item: Any) -> bool:
            for rule in self._filters:
                if not rule.predicate(item):
                    self._rejected_count += 1
                    return False
            return True

        def filter_all(self, items: List[Any]) -> List[Any]:
            return [item for item in items if self.validate(item)]
