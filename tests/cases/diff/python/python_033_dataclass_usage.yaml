name: python_033_dataclass_usage
repo:
  initial_files:
    models.py: |
      from dataclasses import dataclass, field
      from typing import Optional, List
      from datetime import datetime
      from enum import Enum

      class AccountStatus(Enum):
          ACTIVE = "active"
          INACTIVE = "inactive"
          SUSPENDED = "suspended"

      @dataclass
      class Address:
          street: str
          city: str
          state: str
          postal_code: str
          country: str = "USA"

          def format_single_line(self) -> str:
              return f"{self.street}, {self.city}, {self.state} {self.postal_code}"

      @dataclass
      class Preferences:
          notifications_enabled: bool = True
          newsletter_subscribed: bool = False
          theme: str = "light"
          language: str = "en"

      @dataclass
      class User:
          name: str
          age: int
          email: str = ""
          address: Optional[Address] = None
          preferences: Preferences = field(default_factory=Preferences)
          status: AccountStatus = AccountStatus.ACTIVE
          created_at: datetime = field(default_factory=datetime.now)
          roles: List[str] = field(default_factory=list)

          def is_adult(self) -> bool:
              return self.age >= 18

          def has_role(self, role: str) -> bool:
              return role in self.roles

          def add_role(self, role: str) -> None:
              if role not in self.roles:
                  self.roles.append(role)
    service.py: |
      from models import User, Address, Preferences, AccountStatus

      class UserRepository:
          def __init__(self):
              self._users = {}

          def save(self, user: User) -> int:
              return 1

          def find_by_id(self, user_id: int):
              return self._users.get(user_id)
    notification_service.py: |
      from typing import List, Dict, Any, Optional
      from dataclasses import dataclass
      from datetime import datetime

      @dataclass
      class TaskNotification:
          task_id: str
          recipient: str
          message: str
          sent_at: Optional[datetime] = None

      class TaskNotificationService:
          def __init__(self):
              self._sent: List[TaskNotification] = []

          def notify_assignee(self, task_id: str, assignee: str, message: str) -> bool:
              self._sent.append(TaskNotification(
                  task_id=task_id, recipient=assignee, message=message, sent_at=datetime.now()
              ))
              return True

          def get_notifications_for(self, recipient: str) -> List[TaskNotification]:
              return [n for n in self._sent if n.recipient == recipient]
    analytics_tracker.py: |
      from typing import Dict, Any, List
      from dataclasses import dataclass
      from datetime import datetime

      @dataclass
      class TaskMetric:
          task_id: str
          event: str
          value: float
          timestamp: datetime

      class TaskAnalyticsTracker:
          def __init__(self):
              self._metrics: List[TaskMetric] = []

          def track_completion_time(self, task_id: str, seconds: float) -> None:
              self._metrics.append(TaskMetric(
                  task_id=task_id, event="completion", value=seconds, timestamp=datetime.now()
              ))

          def get_average_completion_time(self) -> float:
              times = [m.value for m in self._metrics if m.event == "completion"]
              return sum(times) / len(times) if times else 0.0
