#     completely independent

initial:
  mypackage/helpers.py: |
    class HelperClass:
        def __init__(self, config: dict):
            self._config = config

        def help(self) -> str:
            return f"helping with {len(self._config)} settings"

        def get_config_value(self, key: str, default=None):
            return self._config.get(key, default)

        def validate_config(self) -> bool:
            required_keys = ["name", "version"]
            return all(k in self._config for k in required_keys)
  mypackage/formatters.py: |
    class TextFormatter:
        def format_title(self, text: str) -> str:
            return text.strip().title()

        def format_slug(self, text: str) -> str:
            return text.lower().replace(" ", "-")
