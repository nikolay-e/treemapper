      def create_app() -> Flask:
          app = Flask(__name__)
          init_extensions(app)
          return app
    extensions/cache_backend.py: |
      from typing import Any, Optional

      class CacheBackend:
          def __init__(self, app=None, default_ttl: int = 300):
              self.default_ttl = default_ttl
              self._store: dict[str, Any] = {}
              if app is not None:
                  self.init_app(app)

          def init_app(self, app) -> None:
              app.extensions["cache"] = self

          def get(self, key: str) -> Optional[Any]:
              return self._store.get(key)

          def set(self, key: str, value: Any, ttl: int = None) -> None:
              self._store[key] = value
    extensions/mail_service.py: |
      from typing import Optional

      class MailService:
          def __init__(self, app=None, smtp_host: str = "localhost"):
              self.smtp_host = smtp_host
              if app is not None:
                  self.init_app(app)

          def init_app(self, app) -> None:
              self.smtp_host = app.config.get("SMTP_HOST", self.smtp_host)
              app.extensions["mail"] = self

          def send(self, to: str, subject: str, body: str) -> bool:
              return True
