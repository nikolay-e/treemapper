    from containers import Cache

    class CacheWarmer:
        def __init__(self, cache: Cache[str, dict]):
            self._cache = cache

        def warm(self, entries: list[tuple[str, dict]]) -> int:
            count = 0
            for key, value in entries:
                self._cache.set(key, value)
                count += 1
            return count

        def is_warm(self, key: str) -> bool:
            return self._cache.get(key) is not None
  type_coercion.py: |
    from typing import Any, Type, Optional, Union

    class CoercionError(Exception):
        pass

    def coerce(value: Any, target_type: Type) -> Any:
        try:
            if target_type == bool:
                if isinstance(value, str):
                    return value.lower() in ('true', '1', 'yes')
            return target_type(value)
        except (ValueError, TypeError) as e:
            raise CoercionError(f"Cannot coerce {type(value).__name__} to {target_type.__name__}") from e

    def safe_coerce(value: Any, target_type: Type, default: Any = None) -> Any:
        try:
            return coerce(value, target_type)
        except CoercionError:
            return default
  nullable.py: |
    from typing import TypeVar, Generic, Optional, Callable

    T = TypeVar('T')

    class Nullable(Generic[T]):
        def __init__(self, value: Optional[T] = None):
            self._value = value

        def is_present(self) -> bool:
            return self._value is not None

        def get(self) -> T:
            if self._value is None:
                raise ValueError("Value is not present")
            return self._value

        def or_else(self, default: T) -> T:
            return self._value if self._value is not None else default

        def map(self, func: Callable[[T], T]) -> 'Nullable[T]':
            if self._value is not None:
                return Nullable(func(self._value))
            return Nullable()
