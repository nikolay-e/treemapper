    from containers import Cache
    from service import run

    class TestSessionService:
        def setup(self):
            self.cache = Cache[str, dict](max_size=10)

        def test_run_caches_result(self):
            result = run("sess_1", {"key": "value"})
            assert result["session"] == "sess_1"
            second = run("sess_1", {"key": "other"})
            assert second == result

        def test_run_different_sessions(self):
