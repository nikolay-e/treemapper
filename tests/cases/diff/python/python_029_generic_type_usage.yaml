# Scenario: Service goes from empty stub to full implementation using generic
#   Cache[K, V] from containers module. Only service.py is changed.
#
# Diff shows:
#   - def run(): pass
#   + from containers import Cache
#   + session_cache: Cache[str, dict] = Cache(max_size=500)
#   + def run(session_id, payload) with .get()/.set() calls on the cache
#
# Reviewer questions:
#   Q1: "What does Cache.get(key) return when the key is missing — None or raise?"
#       -> Returns None (Optional[V]). The diff checks `if cached is not None`,
#         so reviewer must verify Cache.get returns None on miss, not KeyError.
#
#   Q2: "Does Cache.set() enforce max_size eviction? Is max_size=500 safe?"
#       -> Yes, set() checks len >= max_size and calls _evict_least_used().
#         Reviewer must verify the eviction policy exists and is LFU-based.
#
#   Q3: "What are the type parameters K, V — is Cache[str, dict] valid?"
#       -> Cache is Generic[K, V] with K=TypeVar, V=TypeVar. str and dict
#         are valid concrete type arguments.
#
# Not needed for comprehension:
#   - test_service.py: Test file that imports Cache and service.run, calls
#     run() with test data and asserts results. Direct structural edge:
#     imports the exact module being changed. But test expectations don't
#     help verify whether Cache.get/set contracts are correct.
#
#   - cache_warmer.py: Imports Cache from containers and calls .set() in a
#     loop to pre-populate caches. Direct structural edge: same import,
#     same .set() method calls. But HOW the warmer uses Cache doesn't help
#     review whether service.py uses it correctly.
#
#   - nullable.py: Another Generic[T] container in the same codebase with
#     similar patterns (get/is_present/or_else). HARD TRAP: shares Generic
#     import, TypeVar pattern, and "container with get" semantics. But
#     service.py imports Cache, not Nullable.
#
#   - type_coercion.py: Type manipulation utilities sharing "typing" imports
#     but no dependency on containers module.

initial:
  containers.py: |
    from typing import Generic, TypeVar, Optional

    K = TypeVar('K')
    V = TypeVar('V')

    class Cache(Generic[K, V]):
        def __init__(self, max_size: int = 100):
            self._data: dict[K, V] = {}
            self._max_size = max_size
            self._access_count: dict[K, int] = {}

        def get(self, key: K) -> Optional[V]:
            if key in self._data:
                self._access_count[key] = self._access_count.get(key, 0) + 1
                return self._data[key]
            return None

        def set(self, key: K, value: V) -> None:
            if len(self._data) >= self._max_size and key not in self._data:
                self._evict_least_used()
            self._data[key] = value
            self._access_count[key] = 0

        def _evict_least_used(self) -> None:
            if not self._access_count:
                return
            least_used = min(self._access_count, key=self._access_count.get)
            del self._data[least_used]
            del self._access_count[least_used]

        def size(self) -> int:
            return len(self._data)
