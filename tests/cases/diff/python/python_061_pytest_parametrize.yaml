    import pytest
    from validators import validate_email, validate_phone, validate_password

    @pytest.mark.parametrize("email,expected", [
        ("user@example.com", True),
        ("test.name+tag@domain.org", True),
        ("invalid", False),
        ("no@dot", False),
        ("@nodomain.com", False),
        ("", False),
    ])
    def test_validate_email(email, expected):
        assert validate_email(email) == expected

    @pytest.mark.parametrize("phone,expected", [
        ("+1 (555) 123-4567", True),
        ("5551234567", True),
        ("123", False),
        ("not-a-phone", False),
    ])
    def test_validate_phone(phone, expected):
        assert validate_phone(phone) == expected

    @pytest.mark.parametrize("password,valid,reason", [
        ("StrongP1", True, "valid"),
        ("short", False, "too short"),
        ("alllowercase1", False, "no uppercase"),
        ("NoDigitHere", False, "no digit"),
    ])
    def test_validate_password(password, valid, reason):
        is_valid, msg = validate_password(password)
        assert is_valid == valid
        assert msg == reason
