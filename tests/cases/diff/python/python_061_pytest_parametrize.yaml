    import re

    class HtmlSanitizer:
        def __init__(self, allowed_tags: list[str] | None = None):
            self.allowed_tags = allowed_tags or ["p", "br", "strong", "em"]

        def sanitize(self, html: str) -> str:
            for tag in self.allowed_tags:
                html = html.replace(f"<{tag}>", f"[{tag}]")
            return html

        def strip_all_tags(self, html: str) -> str:
            return re.sub(r'<[^>]+>', '', html)

        def escape_entities(self, text: str) -> str:
            return text.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

        def is_valid_html(self, html: str) -> bool:
            open_tags = re.findall(r'<([a-z]+)[^>]*>', html)
            close_tags = re.findall(r'</([a-z]+)>', html)
            return open_tags == close_tags

