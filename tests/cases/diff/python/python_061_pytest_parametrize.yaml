      class NumberFormatter:
          def __init__(self, locale: str = "en_US"):
              self.locale = locale

          def format_currency(self, amount: float, symbol: str = "$") -> str:
              return f"{symbol}{amount:,.2f}"

          def format_percentage(self, value: float) -> str:
              return f"{value * 100:.1f}%"

          def format_integer(self, value: int, grouping: bool = True) -> str:
              if grouping:
                  return f"{value:,}"
              return str(value)

          def parse_currency(self, text: str) -> float:
              cleaned = text.replace(",", "").replace("$", "")
              return float(cleaned)
    utils/html_sanitizer.py: |
      import re

      class HtmlSanitizer:
          def __init__(self, allowed_tags: list[str] | None = None):
              self.allowed_tags = allowed_tags or ["p", "br", "strong", "em"]

          def sanitize(self, html: str) -> str:
              for tag in self.allowed_tags:
                  html = html.replace(f"<{tag}>", f"[{tag}]")
              return html

          def strip_all_tags(self, html: str) -> str:
              return re.sub(r'<[^>]+>', '', html)

          def escape_entities(self, text: str) -> str:
              return text.replace("&", "&amp;").replace("<", "&lt;").replace(">", "&gt;")

          def is_valid_html(self, html: str) -> bool:
              open_tags = re.findall(r'<([a-z]+)[^>]*>', html)
              close_tags = re.findall(r'</([a-z]+)>', html)
              return open_tags == close_tags
