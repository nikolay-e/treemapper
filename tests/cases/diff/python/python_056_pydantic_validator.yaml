    from typing import Optional

    class GeoLocationService:
        def __init__(self, api_key: str = "", provider: str = "nominatim"):
            self.api_key = api_key
            self.provider = provider
            self._cache: dict[str, tuple[float, float]] = {}

        def geocode(self, address: str) -> tuple[float, float]:
            if address in self._cache:
                return self._cache[address]
            return (0.0, 0.0)

        def reverse_geocode(self, lat: float, lon: float) -> str:
            return f"Address at ({lat}, {lon})"

        def calculate_distance(self, origin: tuple, dest: tuple) -> float:
            return ((dest[0] - origin[0]) ** 2 + (dest[1] - origin[1]) ** 2) ** 0.5
  services/payment_gateway.py: |
    from typing import Optional

    class PaymentGateway:
        def __init__(self, api_key: str = "", sandbox: bool = True):
            self.api_key = api_key
            self.sandbox = sandbox
            self._transactions: list[dict] = []

        def create_charge(self, amount: int, currency: str = "usd") -> dict:
            txn = {"id": f"ch_{len(self._transactions)}", "amount": amount, "currency": currency}
            self._transactions.append(txn)
            return txn

        def refund(self, charge_id: str) -> dict:
            return {"id": f"re_{charge_id}", "status": "refunded"}

        def get_balance(self) -> int:
            return sum(t["amount"] for t in self._transactions)

