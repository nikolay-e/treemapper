    from typing import Any
    from tasks import send_email, process_data, generate_report

    def submit_form(email: str, data: dict[str, Any]) -> dict[str, Any]:
        send_email.delay(email, "Form Received", "Thank you for your submission")
        process_data.delay(data)
        return {"status": "queued"}

    def request_report(report_type: str) -> dict[str, Any]:
        task = generate_report.delay(report_type, {"start": "2024-01-01", "end": "2024-12-31"})
        return {"status": "generating", "task_id": task.id}

    def get_task_status(task_id: str) -> dict[str, Any]:
        from celery.result import AsyncResult
        result = AsyncResult(task_id)
        return {"task_id": task_id, "status": result.status, "result": result.result}
