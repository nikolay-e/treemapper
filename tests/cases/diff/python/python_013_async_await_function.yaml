    grpc_client.py: |
      import asyncio
      from typing import Dict, Any, Optional, List
      from dataclasses import dataclass

      @dataclass
      class GrpcResponse:
          status_code: int
          data: Dict[str, Any]
          metadata: Dict[str, str]

      class AsyncGrpcClient:
          def __init__(self, host: str, port: int = 50051):
              self._host = host
              self._port = port
              self._connected = False

          async def connect(self) -> None:
              self._connected = True

          async def call(self, service: str, method: str, request: Dict[str, Any]) -> GrpcResponse:
              if not self._connected:
                  raise RuntimeError("Not connected")
              await asyncio.sleep(0.01)
              return GrpcResponse(status_code=0, data={}, metadata={})

          async def close(self) -> None:
              self._connected = False

      async def fetch_user_via_grpc(user_id: int, client: AsyncGrpcClient) -> Dict[str, Any]:
          response = await client.call("UserService", "GetUser", {"id": user_id})
          return response.data
    event_dispatcher.py: |
      import asyncio
      from typing import Dict, Any, Callable, List, Optional
      from dataclasses import dataclass
      from datetime import datetime

      @dataclass
      class Event:
          name: str
          data: Dict[str, Any]
          timestamp: datetime

      class AsyncEventDispatcher:
          def __init__(self):
              self._handlers: Dict[str, List[Callable]] = {}

          def on(self, event_name: str, handler: Callable) -> None:
              if event_name not in self._handlers:
                  self._handlers[event_name] = []
              self._handlers[event_name].append(handler)

          async def dispatch(self, event: Event) -> None:
              handlers = self._handlers.get(event.name, [])
              tasks = [handler(event) for handler in handlers]
              await asyncio.gather(*tasks, return_exceptions=True)

          async def dispatch_and_wait(self, event: Event) -> List[Any]:
              handlers = self._handlers.get(event.name, [])
              return await asyncio.gather(*[h(event) for h in handlers])
