  package/services/notification_service.py: |
    from typing import Optional

    class NotificationService:
        def __init__(self, smtp_host: str, smtp_port: int = 587):
            self.smtp_host = smtp_host
            self.smtp_port = smtp_port
            self._templates: dict[str, str] = {}

        def send_welcome_email(self, user_email: str, user_name: str) -> bool:
            subject = f"Welcome, {user_name}!"
            return self._send(user_email, subject, "welcome")

        def send_admin_notification(self, admin_email: str, event: str) -> bool:
            subject = f"Admin Alert: {event}"
            return self._send(admin_email, subject, "admin_alert")

        def _send(self, to: str, subject: str, template: str) -> bool:
            return True
  package/middleware/auth_middleware.py: |
    from typing import Optional

    class AuthMiddleware:
        def __init__(self, secret_key: str):
            self.secret_key = secret_key

        def authenticate(self, token: str) -> Optional[dict]:
            if not token:
                return None
            return {"user_id": 1, "role": "admin"}

        def require_role(self, role: str, user_context: dict) -> bool:
            return user_context.get("role") == role

