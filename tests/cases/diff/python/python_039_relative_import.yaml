# Scenario: user_service.py adds a relative import of User model from
#   ..models.user and implements find_admins() filtering by User.is_admin().
#   package/models/user.py is unchanged but defines the User class.
#
# Diff shows:
#   + from ..models.user import User
#   + def find_admins(self) -> list[User]:
#   +     all_users = self.repository.find_all()
#   +     return [u for u in all_users if u.is_admin()]
#
# Reviewer questions:
#   Q1: "Does the relative import path ..models.user resolve correctly?"
#       -> package/models/user.py (UNCHANGED) defines User class. The
#          import path goes up two levels (from services/ to package/)
#          then into models/user. Reviewer verifies the directory structure.
#
#   Q2: "Is User.is_admin() the right predicate for admin filtering?"
#       -> package/models/user.py: is_admin() returns self.role == "admin".
#          Reviewer must verify that the role field and comparison value
#          match expectations for the find_admins() filter.
#
# Not needed for comprehension:
#   - package/services/notification_service.py: Same services/ directory.
#     HARDEST TRAP: send_admin_notification() method — uses "admin"
#     vocabulary, same package structure. But doesn't import User or
#     call is_admin(). Independent service with no model dependency.
#
#   - package/middleware/auth_middleware.py: authenticate() returns
#     {"user_id": 1, "role": "admin"} and require_role() checks role.
#     Same "admin"/"role" vocabulary as User.is_admin(). But middleware
#     works with plain dicts, not User objects. No import from models.

max_enrichment: 6.5
initial:
  package/__init__.py: ''
  package/models/user.py: |
    from dataclasses import dataclass
    from typing import Optional

    @dataclass
    class User:
        user_id: int
        name: str
        email: str
        role: str = "member"

        def is_admin(self) -> bool:
            return self.role == "admin"

        def display_name(self) -> str:
            return self.name or self.email.split("@")[0]

        def has_verified_email(self) -> bool:
            return "@" in self.email and "." in self.email
  package/models/__init__.py: |
