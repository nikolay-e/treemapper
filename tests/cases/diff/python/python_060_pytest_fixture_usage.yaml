# Scenario: test_service.py goes from placeholder to real tests using pytest
#   fixtures (db_session, test_user, test_project) from conftest.py.
#   Only test_service.py is changed.
#
# Diff shows:
#   - Removes test_placeholder
#   + test_create_user(db_session, test_user): asserts name, email, queries session
#   + test_create_project(db_session, test_project, test_user): asserts name, owner
#   + test_user_is_active(test_user): asserts is_active is True
#
# Reviewer questions:
#   Q1: "Do the test functions reference valid fixture names? What does
#        each fixture provide?"
#       -> Needs conftest.py: defines db_session (yields Session, closes
#         after), test_user (creates User "Alice", adds to session), and
#         test_project (creates Project, depends on test_user). Reviewer
#         must verify fixture param names in tests match fixture function
#         names, and that the fixture chain is correct (test_project
#         depends on both db_session and test_user).
#
#   Q2: "The tests assert test_user.name == 'Alice', test_user.is_active,
#        test_project.owner is test_user. Do these properties exist on
#        the model classes?"
#       -> Needs models.py: User has name, email, is_active (default True).
#         Project has name and owner. Without this, the reviewer cannot
#         verify that the asserted attributes actually exist — they could
#         be typos or removed fields.
#
#   Q3: "test_create_user calls db_session.query(type(test_user)).
#        What does query() return?"
#       -> Needs database.py: Session.query() returns the list of objects
#         stored under that class name. The test asserts len(users) == 1,
#         which only makes sense if query() returns the stored objects.
#
# Not needed for comprehension:
#   - tests/test_api.py: Another test file that uses the SAME fixtures
#     (db_session, test_user) from the SAME conftest.py. Strongest
#     structural trap: identical fixture dependencies, same conftest.
#     But seeing how ANOTHER test file uses these fixtures doesn't help
#     review whether THIS test file uses them correctly.
#
#   - services/user_service.py: A service layer that imports User from
#     models and Session from database — the same modules the fixtures
#     use. Structural edges to both models.py and database.py. But the
#     test file tests model properties directly via fixtures, not through
#     a service layer. The service is the "subject under test" conceptually,
#     but the tests don't import or call it.
#
#   - tests/integration/conftest.py: A DIFFERENT conftest.py in a
#     subdirectory. Defines fixtures named integration_db and
#     integration_user — similar fixture pattern but different scope
#     and different fixture names. Confusing if included: reviewer
#     might think tests use these instead.
#
#   - utils/test_factories.py: A factory utility that creates User and
#     Project objects for testing. Shares "test" + "User" + "Project"
#     vocabulary, creates the same model types. But it's a manual
#     factory, not a pytest fixture — the tests use conftest fixtures.
#
#   - utils/migration_runner.py: Database migration tool. "db" and
#     "session" vocabulary overlap, but no pytest or fixture relationship.

