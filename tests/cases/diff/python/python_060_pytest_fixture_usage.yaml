  utils/test_factories.py: |
    from models import User, Project

    class UserFactory:
        _counter = 0

        @classmethod
        def create(cls, name: str = None, email: str = None) -> User:
            cls._counter += 1
            return User(
                name=name or f"TestUser_{cls._counter}",
                email=email or f"user{cls._counter}@test.com",
            )

    class ProjectFactory:
        _counter = 0

        @classmethod
        def create(cls, name: str = None, owner: User = None) -> Project:
            cls._counter += 1
            if owner is None:
                owner = UserFactory.create()
            return Project(
                name=name or f"TestProject_{cls._counter}",
                owner=owner,
            )

  utils/migration_runner.py: |
    from typing import Optional

    class MigrationRunner:
        def __init__(self, db_url: str = ""):
            self.db_url = db_url
            self._applied: list[str] = []

        def apply(self, migration_id: str) -> None:
            self._applied.append(migration_id)

        def rollback(self, migration_id: str) -> bool:
            if migration_id in self._applied:
                self._applied.remove(migration_id)
                return True
            return False

        def get_current_version(self) -> Optional[str]:
            return self._applied[-1] if self._applied else None

