    from typing import Dict, Any, List, Optional
    from dataclasses import dataclass
    from datetime import datetime

    @dataclass
    class AuditRecord:
        user_id: int
        action: str
        resource: str
        timestamp: datetime

    class AuditService:
        def __init__(self):
            self._records: List[AuditRecord] = []

        def log_action(self, user_id: int, action: str, resource: str) -> None:
            self._records.append(AuditRecord(
                user_id=user_id, action=action, resource=resource, timestamp=datetime.now()
            ))

        def get_user_actions(self, user_id: int) -> List[AuditRecord]:
            return [r for r in self._records if r.user_id == user_id]
  services/permission_service.py: |
    from typing import Dict, Set, Optional

    class PermissionService:
        def __init__(self):
            self._user_permissions: Dict[int, Set[str]] = {}

        def grant(self, user_id: int, permission: str) -> None:
            if user_id not in self._user_permissions:
                self._user_permissions[user_id] = set()
            self._user_permissions[user_id].add(permission)

        def has_permission(self, user_id: int, permission: str) -> bool:
            return permission in self._user_permissions.get(user_id, set())

        def revoke(self, user_id: int, permission: str) -> bool:
            perms = self._user_permissions.get(user_id, set())
            if permission in perms:
                perms.discard(permission)
                return True
            return False
