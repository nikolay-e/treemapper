    from typing import Any

    class DataNormalizer:
        def __init__(self, strategy: str = "min_max"):
            self.strategy = strategy

        def normalize(self, values: list[float]) -> list[float]:
            if not values:
                return []
            min_val = min(values)
            max_val = max(values)
            if max_val == min_val:
                return [0.5] * len(values)
            return [(v - min_val) / (max_val - min_val) for v in values]

        def transform_columns(self, data: dict[str, list]) -> dict[str, list]:
            return {col: self.normalize(vals) for col, vals in data.items()}
  reports/chart_builder.py: |
    from typing import Any

    class ChartBuilder:
        def __init__(self, chart_type: str = "line"):
            self.chart_type = chart_type
            self._data_series: list[dict] = []

        def add_series(self, name: str, values: list[float]) -> None:
            self._data_series.append({"name": name, "values": values})

        def compute_summary(self) -> dict[str, float]:
            all_values = [v for s in self._data_series for v in s["values"]]
            if not all_values:
                return {"mean": 0, "std": 0, "count": 0}
            mean = sum(all_values) / len(all_values)
            variance = sum((v - mean) ** 2 for v in all_values) / len(all_values)
            return {"mean": mean, "std": variance ** 0.5, "count": len(all_values)}

