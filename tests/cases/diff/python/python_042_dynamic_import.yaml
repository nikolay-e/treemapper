  loader.py: |
    import importlib

    def load(plugin_name: str):
        module = importlib.import_module(f"plugins.plugin_{plugin_name}")
        return module

    def execute_plugin(plugin_name: str, data: list[dict]) -> str:
        module = load(plugin_name)
        return module.execute(data)

    def list_available_plugins() -> list[str]:
        return ["csv", "json"]
