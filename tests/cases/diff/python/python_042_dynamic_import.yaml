# Scenario: loader.py replaces a stub with real importlib-based plugin
#   loading. It dynamically imports from plugins/ directory and calls
#   module.execute(data). Plugins (plugin_csv, plugin_json) are unchanged.
#
# Diff shows:
#   + import importlib
#   + def load(plugin_name: str): importlib.import_module(f"plugins.plugin_{plugin_name}")
#   + def execute_plugin(plugin_name: str, data): module.execute(data)
#
# Reviewer questions:
#   Q1: "Is importlib.import_module the right approach for plugin loading?"
#       -> loader.py constructs module path as f"plugins.plugin_{plugin_name}".
#          Reviewer verifies this matches the actual file naming convention.
#
#   Q2: "Do the existing plugins have the expected execute() interface?"
#       -> plugins/plugin_csv.py (UNCHANGED) defines execute(data: list[dict]) -> str.
#          plugins/plugin_json.py (UNCHANGED) also defines execute(data) -> str.
#          Reviewer verifies both match what loader.py calls: module.execute(data).
#
# Not needed for comprehension:
#   - extensions/notification_dispatcher.py: register/dispatch pattern with
#     handlers dict. HARDEST TRAP: plugin-like dispatch pattern — register()
#     adds handlers, dispatch() calls them by name. Same "load and execute
#     by name" concept. But doesn't use importlib, doesn't load from
#     plugins/ directory, no dependency on loader.py.
#
#   - telemetry/metrics_collector.py: MetricsCollector with increment/get.
#     Unrelated domain (telemetry), no connection to plugin loading.

initial:
  plugins/plugin_csv.py: |
    def execute(data: list[dict]) -> str:
        headers = list(data[0].keys()) if data else []
        lines = [",".join(headers)]
        for row in data:
            lines.append(",".join(str(row.get(h, "")) for h in headers))
        return "\n".join(lines)

    def get_extension() -> str:
        return ".csv"
  plugins/plugin_json.py: |
    import json

    def execute(data: list[dict]) -> str:
        return json.dumps(data, indent=2)

    def get_extension() -> str:
        return ".json"
  loader.py: |
    def load():
        pass

    def list_available_plugins() -> list[str]:
        return ["csv", "json"]
  extensions/notification_dispatcher.py: |
    from typing import Callable

    class NotificationDispatcher:
        def __init__(self):
            self._handlers: dict[str, Callable] = {}

        def register(self, channel: str, handler: Callable) -> None:
            self._handlers[channel] = handler

        def dispatch(self, channel: str, message: str) -> bool:
            handler = self._handlers.get(channel)
            if handler:
                handler(message)
                return True
            return False

        def list_channels(self) -> list[str]:
            return list(self._handlers.keys())
  telemetry/metrics_collector.py: |
    from typing import Optional

    class MetricsCollector:
        def __init__(self, prefix: str = "app"):
            self.prefix = prefix
            self._counters: dict[str, int] = {}

        def increment(self, metric_name: str, value: int = 1) -> None:
            key = f"{self.prefix}.{metric_name}"
            self._counters[key] = self._counters.get(key, 0) + value

        def get_value(self, metric_name: str) -> int:
            key = f"{self.prefix}.{metric_name}"
            return self._counters.get(key, 0)

