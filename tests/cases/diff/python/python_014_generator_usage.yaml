    from typing import List, Any, Optional, TypeVar, Generic
    from dataclasses import dataclass

    T = TypeVar('T')

    @dataclass
    class Page(Generic[T]):
        items: List[T]
        page_number: int
        page_size: int
        total_items: int

        @property
        def total_pages(self) -> int:
            return (self.total_items + self.page_size - 1) // self.page_size

        @property
        def has_next(self) -> bool:
            return self.page_number < self.total_pages

    class Paginator(Generic[T]):
        def __init__(self, items: List[T], page_size: int = 20):
            self._items = items
            self._page_size = page_size

        def get_page(self, page_number: int) -> Page[T]:
            start = (page_number - 1) * self._page_size
            end = start + self._page_size
            return Page(
                items=self._items[start:end],
                page_number=page_number,
                page_size=self._page_size,
                total_items=len(self._items),
            )

        def iter_pages(self):
            for i in range(1, self.get_page(1).total_pages + 1):
                yield self.get_page(i)
  stream_reader.py: |
    from typing import Iterator, Optional, Any
    from dataclasses import dataclass

    @dataclass
    class StreamConfig:
        buffer_size: int = 8192
        max_records: Optional[int] = None

    class StreamReader:
        def __init__(self, config: StreamConfig):
            self._config = config
            self._records_read = 0

        def read_records(self, data: list) -> Iterator[Any]:
            for item in data:
                if self._config.max_records and self._records_read >= self._config.max_records:
                    break
                self._records_read += 1
                yield item

        def get_records_read(self) -> int:
            return self._records_read
