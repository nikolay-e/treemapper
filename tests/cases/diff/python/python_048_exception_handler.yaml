    from typing import Optional

    class MetricsRegistry:
        def __init__(self, namespace: str = "app"):
            self.namespace = namespace
            self._counters: dict[str, int] = {}
            self._gauges: dict[str, float] = {}

        def increment_counter(self, name: str, value: int = 1) -> None:
            key = f"{self.namespace}_{name}"
            self._counters[key] = self._counters.get(key, 0) + value

        def set_gauge(self, name: str, value: float) -> None:
            key = f"{self.namespace}_{name}"
            self._gauges[key] = value

        def get_counter(self, name: str) -> int:
            return self._counters.get(f"{self.namespace}_{name}", 0)
  scheduling/task_scheduler.py: |
    from datetime import datetime, timedelta

    class TaskScheduler:
        def __init__(self, max_workers: int = 4):
            self.max_workers = max_workers
            self._tasks: list[dict] = []

        def schedule(self, name: str, interval_seconds: int) -> None:
            self._tasks.append({
                "name": name,
                "interval": interval_seconds,
                "next_run": datetime.utcnow() + timedelta(seconds=interval_seconds),
            })

        def cancel(self, name: str) -> bool:
            before = len(self._tasks)
            self._tasks = [t for t in self._tasks if t["name"] != name]
            return len(self._tasks) < before

