    from typing import Any, Optional

    class SearchIndex:
        def __init__(self, index_name: str = "default"):
            self.index_name = index_name
            self._documents: dict[str, dict] = {}

        def index_document(self, doc_id: str, content: dict[str, Any]) -> None:
            self._documents[doc_id] = content

        def search(self, query: str, model_type: str = "all", limit: int = 10) -> list[dict]:
            results = []
            for doc_id, fields in self._documents.items():
                for value in fields.values():
                    if query.lower() in str(value).lower():
                        results.append({"id": doc_id, **fields})
                        break
            return results[:limit]

        def delete_document(self, doc_id: str) -> bool:
            if doc_id in self._documents:
                del self._documents[doc_id]
                return True
            return False

