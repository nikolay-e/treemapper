    from typing import Any

    class AnalyticsEngine:
        def __init__(self, project_id: str = "default"):
            self.project_id = project_id
            self._events: list[dict] = []

        def track_event(self, event_name: str, properties: dict[str, Any]) -> None:
            self._events.append({"name": event_name, **properties})

        def query_events(self, event_name: str, limit: int = 100) -> list[dict]:
            return [e for e in self._events if e["name"] == event_name][:limit]

        def flush(self) -> int:
            count = len(self._events)
            self._events.clear()
            return count

        def get_event_count(self) -> int:
            return len(self._events)
