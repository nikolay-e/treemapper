  services/object_storage.py: |
    from typing import Optional

    class ObjectStorageClient:
        def __init__(self, bucket: str = "default", region: str = "us-east-1"):
            self.bucket = bucket
            self.region = region
            self._objects: dict[str, bytes] = {}

        def put_object(self, key: str, data: bytes) -> str:
            self._objects[key] = data
            return f"s3://{self.bucket}/{key}"

        def get_object(self, key: str) -> Optional[bytes]:
            return self._objects.get(key)

        def delete_object(self, key: str) -> bool:
            if key in self._objects:
                del self._objects[key]
                return True
            return False

        def list_objects(self, prefix: str = "") -> list[str]:
            return [k for k in self._objects if k.startswith(prefix)]
  services/email_sender.py: |
    from typing import Optional

    class EmailSender:
        def __init__(self, smtp_host: str = "localhost", smtp_port: int = 587):
            self.smtp_host = smtp_host
            self.smtp_port = smtp_port
            self._sent: list[dict] = []

        def send(self, to: str, subject: str, body: str) -> bool:
            self._sent.append({"to": to, "subject": subject, "body": body})
            return True

        def send_bulk(self, recipients: list[str], subject: str, body: str) -> int:
            for recipient in recipients:
                self.send(recipient, subject, body)
            return len(recipients)

        def get_sent_count(self) -> int:
            return len(self._sent)

