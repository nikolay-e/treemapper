# Scenario: client.py adds `from constants import *` and rewrites call()
#   and build_headers() to use imported constants (DEFAULT_HEADERS,
#   TIMEOUT_SECONDS, get_full_url). constants.py is unchanged.
#
# Diff shows:
#   + from constants import *
#   + url = get_full_url(endpoint)
#   + headers = build_headers(DEFAULT_HEADERS)
#   + "timeout": TIMEOUT_SECONDS
#   ~ build_headers now copies DEFAULT_HEADERS with dict()
#
# Reviewer questions:
#   Q1: "What names come through the star import via __all__?"
#       -> constants.py (UNCHANGED): __all__ lists MAX_RETRIES,
#          TIMEOUT_SECONDS, BASE_URL, DEFAULT_HEADERS, RATE_LIMIT.
#          Note: get_full_url() is NOT in __all__ — the diff calls it
#          but it won't be available via star import. Bug to catch.
#
#   Q2: "Are DEFAULT_HEADERS and TIMEOUT_SECONDS used correctly?"
#       -> constants.py: DEFAULT_HEADERS = {"Content-Type": "application/json"},
#          TIMEOUT_SECONDS = 30. The diff uses both as expected.
#
# Not needed for comprehension:
#   - integrations/oauth_client.py: OAuthClient with build_auth_headers()
#     and call_api(endpoint, method). HARDEST TRAP: same HTTP client
#     pattern — builds headers, calls endpoints, uses method param.
#     Even has a "headers" dict. But doesn't import from constants,
#     uses its own auth token pattern instead.
#
#   - storage/file_manager.py: FileManager with save/delete operations.
#     Completely different domain (file I/O), no dependency on constants.

