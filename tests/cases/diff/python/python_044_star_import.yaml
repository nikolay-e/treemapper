  integrations/oauth_client.py: |
    from typing import Optional

    class OAuthClient:
        def __init__(self, client_id: str, client_secret: str, token_url: str):
            self.client_id = client_id
            self.client_secret = client_secret
            self.token_url = token_url
            self._access_token: Optional[str] = None

        def authenticate(self) -> str:
            self._access_token = f"token_{self.client_id}"
            return self._access_token

        def build_auth_headers(self) -> dict:
            return {"Authorization": f"Bearer {self._access_token}"}

        def call_api(self, endpoint: str, method: str = "GET") -> dict:
            headers = self.build_auth_headers()
            return {"url": endpoint, "method": method, "headers": headers}
  storage/file_manager.py: |
    from pathlib import Path

    class FileManager:
        def __init__(self, base_dir: str = "/tmp/uploads"):
            self.base_dir = Path(base_dir)

        def save(self, filename: str, content: bytes) -> Path:
            path = self.base_dir / filename
            path.parent.mkdir(parents=True, exist_ok=True)
            path.write_bytes(content)
            return path

        def delete(self, filename: str) -> bool:
            path = self.base_dir / filename
            if path.exists():
                path.unlink()
                return True
            return False

