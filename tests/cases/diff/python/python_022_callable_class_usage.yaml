    task_queue.py: |
      from typing import Callable, Any, List, Optional
      from dataclasses import dataclass
      from datetime import datetime

      @dataclass
      class QueuedTask:
          name: str
          callable: Callable
          args: tuple = ()
          created_at: datetime = None

      class TaskQueue:
          def __init__(self, max_size: int = 100):
              self._queue: List[QueuedTask] = []
              self._max_size = max_size

          def enqueue(self, name: str, task: Callable, *args: Any) -> bool:
              if len(self._queue) >= self._max_size:
                  return False
              self._queue.append(QueuedTask(name=name, callable=task, args=args))
              return True

          def process_next(self) -> Optional[Any]:
              if not self._queue:
                  return None
              task = self._queue.pop(0)
              return task.callable(*task.args)
    middleware_chain.py: |
      from typing import Callable, Any, List

      class MiddlewareChain:
          def __init__(self):
              self._middlewares: List[Callable] = []

          def use(self, middleware: Callable) -> None:
              self._middlewares.append(middleware)

          def execute(self, request: dict, handler: Callable) -> Any:
              chain = handler
              for mw in reversed(self._middlewares):
                  prev = chain
                  chain = lambda req, h=prev, m=mw: m(req, h)
              return chain(request)
