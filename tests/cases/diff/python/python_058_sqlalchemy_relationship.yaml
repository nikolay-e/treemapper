  services/inventory_manager.py: |
    from typing import Optional

    class InventoryManager:
        def __init__(self):
            self._stock: dict[str, int] = {}

        def check_availability(self, sku: str) -> int:
            return self._stock.get(sku, 0)

        def reserve_stock(self, sku: str, quantity: int) -> bool:
            available = self._stock.get(sku, 0)
            if available >= quantity:
                self._stock[sku] = available - quantity
                return True
            return False

        def restock(self, sku: str, quantity: int) -> None:
            self._stock[sku] = self._stock.get(sku, 0) + quantity

        def get_low_stock_items(self, threshold: int = 10) -> list[str]:
            return [sku for sku, qty in self._stock.items() if qty < threshold]

