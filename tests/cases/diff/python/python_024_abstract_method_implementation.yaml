    from abc import ABC, abstractmethod
    from typing import Generic, TypeVar, Optional, Dict, Any
    from dataclasses import dataclass
    from enum import Enum

    T = TypeVar("T")

    class HandlerStatus(Enum):
        PENDING = "pending"
        COMPLETED = "completed"
        FAILED = "failed"

    @dataclass
    class HandlerResult(Generic[T]):
        data: Optional[T]
        status: HandlerStatus
        error_message: str = ""

        @classmethod
        def success(cls, data: T) -> "HandlerResult[T]":
            return cls(data=data, status=HandlerStatus.COMPLETED)

        @classmethod
        def failure(cls, error: str) -> "HandlerResult[T]":
            return cls(data=None, status=HandlerStatus.FAILED, error_message=error)

    class BaseHandler(ABC, Generic[T]):
        @abstractmethod
        def execute(self, data: dict) -> HandlerResult[T]:
            pass

        @abstractmethod
        def validate(self, data: dict) -> bool:
            pass

        def run(self, data: dict) -> HandlerResult[T]:
            if not self.validate(data):
                return HandlerResult.failure("Validation failed")
            return self.execute(data)
  handlers.py: |
    from base import BaseHandler, HandlerResult, HandlerStatus
    from typing import Dict, Any
    from dataclasses import dataclass

    @dataclass
    class DataPayload:
        id: str
        content: Dict[str, Any]

    class ConcreteHandler(BaseHandler[dict]):
        def execute(self, data: dict) -> HandlerResult[dict]:
            processed = {
                "id": data.get("id", ""),
                "processed": True,
                "content": data.get("content", {})
            }
            return HandlerResult.success(processed)

        def validate(self, data: dict) -> bool:
            return "id" in data and isinstance(data.get("id"), str)

    def process_payload(payload: DataPayload) -> HandlerResult[dict]:
        handler = ConcreteHandler()
        return handler.run({"id": payload.id, "content": payload.content})
