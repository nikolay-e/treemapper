    from typing import Dict, Any, List, Optional
    from dataclasses import dataclass

    @dataclass
    class ValidationError:
        field: str
        message: str

    class ModelValidator:
        def __init__(self):
            self._rules: Dict[str, List[callable]] = {}

        def add_rule(self, field: str, rule: callable) -> None:
            if field not in self._rules:
                self._rules[field] = []
            self._rules[field].append(rule)

        def validate(self, data: Dict[str, Any]) -> List[ValidationError]:
            errors = []
            for field, rules in self._rules.items():
                value = data.get(field)
                for rule in rules:
                    if not rule(value):
                        errors.append(ValidationError(field, f"Validation failed for {field}"))
            return errors
  mappers.py: |
    from typing import Dict, Any, TypeVar, Type

    T = TypeVar('T')

    class ModelMapper:
        def __init__(self):
            self._mappings: Dict[str, Dict[str, str]] = {}

        def register_mapping(self, source: str, target: str, field_map: Dict[str, str]) -> None:
            self._mappings[f"{source}->{target}"] = field_map

        def map(self, source_data: Dict[str, Any], source: str, target: str) -> Dict[str, Any]:
            field_map = self._mappings.get(f"{source}->{target}", {})
            return {field_map.get(k, k): v for k, v in source_data.items()}
