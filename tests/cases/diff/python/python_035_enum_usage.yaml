    from decimal import Decimal

    class DiscountRule:
        def __init__(self, name: str, percentage: Decimal):
            self.name = name
            self.percentage = percentage

        def apply(self, order_total: Decimal) -> Decimal:
            return order_total * (1 - self.percentage / 100)

        def is_applicable(self, min_amount: Decimal, order_total: Decimal) -> bool:
            return order_total >= min_amount

    class BulkDiscountCalculator:
        def __init__(self, tiers: list[tuple[int, float]]):
            self.tiers = sorted(tiers, key=lambda t: t[0], reverse=True)

        def calculate(self, quantity: int, unit_price: float) -> float:
            for threshold, rate in self.tiers:
                if quantity >= threshold:
                    return unit_price * quantity * (1 - rate)
            return unit_price * quantity
