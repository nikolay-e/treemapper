    from datetime import datetime
    from typing import Optional

    class InvoiceRenderer:
        def __init__(self, template_path: str = "templates/invoice.html"):
            self.template_path = template_path

        def render(self, order_id: int, line_items: list[dict], status: str) -> str:
            total = sum(item["amount"] for item in line_items)
            return f"Invoice #{order_id} | Status: {status} | Total: ${total:.2f}"

        def render_payment_receipt(self, payment_id: str, amount: float) -> str:
            timestamp = datetime.utcnow().isoformat()
            return f"Receipt for payment {payment_id}: ${amount:.2f} at {timestamp}"
