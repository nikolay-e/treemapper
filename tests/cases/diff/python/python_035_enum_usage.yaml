    from dataclasses import dataclass
    from datetime import datetime

    @dataclass
    class ShipmentTracking:
        tracking_number: str
        carrier: str
        origin: str
        destination: str
        estimated_delivery: datetime

        def days_until_delivery(self) -> int:
            delta = self.estimated_delivery - datetime.utcnow()
            return max(0, delta.days)

    class TrackingService:
        def __init__(self, api_base_url: str):
            self.api_base_url = api_base_url
            self._cache: dict[str, ShipmentTracking] = {}

        def get_tracking(self, tracking_number: str) -> ShipmentTracking | None:
            return self._cache.get(tracking_number)

