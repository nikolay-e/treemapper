# Scenario: APIClient methods gain decorator-based rate limiting, retry,
#   timing, and caching. Only api.py is changed.
#
# Diff shows:
#   + from decorators import rate_limit, retry, timed, cached
#   + @rate_limit(calls_per_second=100, burst=10)
#   + @retry(max_attempts=3, delay=0.5)
#   + @timed("api_call")  on call_api()
#   + @cached(ttl_seconds=60)  on get()
#
# Reviewer questions:
#   Q1: "Is the decorator stacking order correct? Does @retry wrap @timed
#       or vice versa?"
#       -> @rate_limit is outermost (applied first), then @retry, then @timed
#         (innermost). So timing includes retries, rate limit is per-attempt.
#         Reviewer must see decorator implementations to verify this is correct.
#
#   Q2: "What does @cached(ttl_seconds=60) do — does it cache across
#       different endpoint arguments?"
#       -> cached() keys on `str((args, sorted(kwargs.items())))`, so
#         different endpoints get different cache entries. Reviewer must
#         verify the cache key strategy handles `self` argument correctly.
#
#   Q3: "Does @rate_limit with burst=10 mean 10 calls can happen instantly?"
#       -> Yes, burst_tokens starts at burst value and decrements. Reviewer
#         must verify the token bucket implementation.
#
# Not needed for comprehension:
#   - test_api.py: Tests APIClient with decorator behavior — calls get()
#     multiple times, asserts caching works, measures timing. Direct
#     structural edge: imports APIClient and calls decorated methods.
#     But test expectations don't help verify decorator implementations.
#
#   - api_factory.py: Factory that constructs APIClient instances with
#     specific base_url/api_key. Direct structural edge: imports and
#     instantiates the changed class. But construction logic doesn't
#     help review decorator stacking correctness.
#
#   - middleware.py: HTTP middleware with IDENTICAL wrapping pattern —
#     chains of functions that wrap a handler, timing via perf_counter,
#     logging elapsed time. HARD TRAP: same "wrap function, measure time"
#     pattern. But uses request/response pipeline, not Python decorators.
#
#   - circuit_breaker.py: Fault tolerance with retry/failure semantics.
#     Shares "retry", "failure_count", "exception handling" vocabulary.
#     But independent pattern, not imported by api.py.

