    import asyncio
    from typing import Dict, Any, List
    from dataclasses import dataclass
    from enum import Enum

    class ServiceStatus(Enum):
        HEALTHY = "healthy"
        DEGRADED = "degraded"
        UNHEALTHY = "unhealthy"

    @dataclass
    class HealthResult:
        service_name: str
        status: ServiceStatus
        response_time_ms: float
        details: Optional[Dict[str, Any]] = None

    class HealthChecker:
        def __init__(self, timeout_seconds: float = 5.0):
            self._timeout = timeout_seconds
            self._checks: Dict[str, callable] = {}

        def register_check(self, name: str, check_fn: callable) -> None:
            self._checks[name] = check_fn

        async def run_checks(self) -> List[HealthResult]:
            results = []
            for name, check_fn in self._checks.items():
                try:
                    start = asyncio.get_event_loop().time()
                    await asyncio.wait_for(check_fn(), timeout=self._timeout)
                    elapsed = (asyncio.get_event_loop().time() - start) * 1000
                    results.append(HealthResult(name, ServiceStatus.HEALTHY, elapsed))
                except asyncio.TimeoutError:
                    results.append(HealthResult(name, ServiceStatus.UNHEALTHY, self._timeout * 1000))
            return results
