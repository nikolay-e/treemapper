    env_loader.py: |
      import os
      from typing import Dict, Any, Optional, List
      from dataclasses import dataclass

      @dataclass
      class EnvConfig:
          prefix: str = "APP_"
          required_vars: List[str] = None
          defaults: Dict[str, str] = None

      class EnvironmentLoader:
          def __init__(self, config: EnvConfig):
              self._config = config
              self._loaded: Dict[str, str] = {}

          def load(self) -> Dict[str, str]:
              prefix = self._config.prefix
              self._loaded = {
                  key[len(prefix):].lower(): value
                  for key, value in os.environ.items()
                  if key.startswith(prefix)
              }
              return self._loaded

          def get(self, key: str, default: Optional[str] = None) -> Optional[str]:
              return self._loaded.get(key, default)

          def validate_required(self) -> List[str]:
              if not self._config.required_vars:
                  return []
              return [v for v in self._config.required_vars if v not in self._loaded]
    config_watcher.py: |
      import time
      from typing import Callable, Optional, Dict
      from dataclasses import dataclass
      from pathlib import Path

      @dataclass
      class WatcherConfig:
          config_path: str
          poll_interval: float = 5.0
          auto_reload: bool = True

      class ConfigFileWatcher:
          def __init__(self, config: WatcherConfig):
              self._config = config
              self._last_modified: Optional[float] = None
              self._callbacks: list[Callable] = []

          def register_callback(self, callback: Callable) -> None:
              self._callbacks.append(callback)

          def check_for_changes(self) -> bool:
              path = Path(self._config.config_path)
              if not path.exists():
                  return False
              mtime = path.stat().st_mtime
              if self._last_modified and mtime > self._last_modified:
                  self._last_modified = mtime
                  for cb in self._callbacks:
                      cb(self._config.config_path)
                  return True
              self._last_modified = mtime
              return False
