    middleware/context.py: |
      class RequestContext:
          def __init__(self, path: str, method: str, headers: dict):
              self.path = path
              self.method = method
              self.headers = headers
              self.metadata: dict = {}
          def set_meta(self, key: str, value):
              self.metadata[key] = value
    middleware/handler.py: |
      from middleware.context import RequestContext
      class MiddlewareHandler:
          def __init__(self, name: str):
              self.name = name
          def process(self, ctx: RequestContext) -> RequestContext:
              ctx.set_meta(f"processed_by_{self.name}", True)
              return ctx
    middleware/chain.py: |
      from middleware.handler import MiddlewareHandler
      from middleware.context import RequestContext
      class MiddlewareChain:
          def __init__(self):
              self.handlers: list[MiddlewareHandler] = []
          def add(self, handler: MiddlewareHandler):
              self.handlers.append(handler)
          def execute(self, ctx: RequestContext) -> RequestContext:
              for handler in self.handlers:
                  ctx = handler.process(ctx)
              return ctx
    server/application.py: |
      from middleware.chain import MiddlewareChain
      from middleware.handler import MiddlewareHandler
      from middleware.context import RequestContext
      class Application:
          def __init__(self):
              self.chain = MiddlewareChain()
          def use(self, name: str):
              self.chain.add(MiddlewareHandler(name))
          def handle_request(self, path: str, method: str, headers: dict) -> dict:
              ctx = RequestContext(path, method, headers)
              result = self.chain.execute(ctx)
              return result.metadata
