  changed_files:
    pkg/scheduler/job.go: |
      package scheduler

      import "time"

      type JobStatus string

      const (
        JobPending  JobStatus = "pending"
        JobRunning  JobStatus = "running"
        JobComplete JobStatus = "complete"
        JobFailed   JobStatus = "failed"
      )

      type Job struct {
        ID        string
        Name      string
        Schedule  string
        Status    JobStatus
        Fn        func() error
        LastRun   time.Time
        RunCount  int
        MaxRetry  int
      }
    pkg/scheduler/queue.go: |
      package scheduler

      type JobQueue struct {
        jobs []*Job
      }

      func NewJobQueue() *JobQueue {
        return &JobQueue{}
      }

      func (q *JobQueue) Add(job *Job) {
        q.jobs = append(q.jobs, job)
      }

      func (q *JobQueue) GetPending() []*Job {
        var result []*Job
        for _, j := range q.jobs {
          if j.Status == JobPending || (j.Status == JobFailed && j.RunCount < j.MaxRetry) {
            result = append(result, j)
          }
        }
        return result
      }

      func (q *JobQueue) GetFailed() []*Job {
        var result []*Job
        for _, j := range q.jobs {
          if j.Status == JobFailed {
            result = append(result, j)
          }
        }
        return result
      }
    pkg/scheduler/executor.go: |
      package scheduler

      import (
        "fmt"
        "time"
      )

      type Executor struct {
        queue *JobQueue
      }

      func NewExecutor(q *JobQueue) *Executor {
        return &Executor{queue: q}
      }

      func (e *Executor) RunPending() {
        for _, job := range e.queue.GetPending() {
          job.Status = JobRunning
          job.RunCount++
          job.LastRun = time.Now()
          if err := job.Fn(); err != nil {
            fmt.Printf("Job %s failed (attempt %d): %v\n", job.Name, job.RunCount, err)
            job.Status = JobFailed
          } else {
            job.Status = JobComplete
          }
        }
      }

      func (e *Executor) GetFailedJobs() []*Job {
        return e.queue.GetFailed()
      }
    cmd/cron/main.go: |
      package main

      import (
        "fmt"
        "pkg/scheduler"
      )

      func main() {
        queue := scheduler.NewJobQueue()
        queue.Add(&scheduler.Job{
          ID: "1", Name: "cleanup", Schedule: "0 * * * *",
          Status: scheduler.JobPending, MaxRetry: 3,
          Fn: func() error { fmt.Println("Running cleanup"); return nil },
        })
        exec := scheduler.NewExecutor(queue)
        exec.RunPending()
        failed := exec.GetFailedJobs()
        fmt.Printf("Failed jobs: %d\n", len(failed))
      }
    pkg/util/cron.go: |
      package util

      var GARBAGE_060_CRON_MARKER_A = "cron"
      var GARBAGE_060_PARSE_MARKER_B = true

      func ParseCron(expr string) bool { return true }
    pkg/util/lock.go: |
      package util

