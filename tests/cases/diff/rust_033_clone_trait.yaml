  changed_files:
    src/main/kotlin/iot/ThresholdChecker.kt: |
      class ThresholdChecker(private val warnThreshold: Double, private val critThreshold: Double) {
          enum class Status { OK, WARN, CRITICAL }

          fun check(value: Double): Status {
              if (value < 0) return Status.WARN
              if (value >= critThreshold) return Status.CRITICAL
              if (value >= warnThreshold) return Status.WARN
              return Status.OK
          }

          fun message(value: Double): String {
              return when (check(value)) {
                  Status.CRITICAL -> "CRITICAL: $value exceeds $critThreshold"
                  Status.WARN -> "WARN: $value exceeds $warnThreshold"
                  Status.OK -> "OK: $value"
              }
          }
      }
    src/test/kotlin/iot/ThresholdCheckerTest.kt: |
      import org.junit.Test
      import kotlin.test.assertEquals

      class ThresholdCheckerTest {
          private val checker = ThresholdChecker(70.0, 90.0)

          @Test fun criticalAboveThreshold() {
              assertEquals(ThresholdChecker.Status.CRITICAL, checker.check(95.0))
          }

          @Test fun warnBetweenThresholds() {
              assertEquals(ThresholdChecker.Status.WARN, checker.check(75.0))
          }

          @Test fun okBelowWarn() {
              assertEquals(ThresholdChecker.Status.OK, checker.check(50.0))
          }
      }
