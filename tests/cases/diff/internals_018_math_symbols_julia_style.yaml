  changed_files:
    lib/src/main/kotlin/com/platform/crypto/HashUtil.kt: |
      package com.platform.crypto

      import java.security.MessageDigest
      import java.util.Base64

      object HashUtil {
          fun sha256(input: String): String {
              val digest = MessageDigest.getInstance("SHA-256")
              val bytes = digest.digest(input.toByteArray(Charsets.UTF_8))
              return bytes.joinToString("") { "%02x".format(it) }
          }

          fun sha256Bytes(input: ByteArray): String {
              val digest = MessageDigest.getInstance("SHA-256")
              val bytes = digest.digest(input)
              return bytes.joinToString("") { "%02x".format(it) }
          }

          fun sha256WithSalt(input: String, salt: String): String {
              return sha256("$salt:$input")
          }
      }
    lib/src/main/kotlin/com/platform/user/UserCredentials.kt: |
      package com.platform.user

      import com.platform.crypto.HashUtil

      data class UserCredentials(
          val username: String,
          val passwordHash: String,
          val salt: String = "",
      ) {
          fun matches(plainPassword: String): Boolean {
              return if (salt.isEmpty()) {
                  passwordHash == HashUtil.sha256(plainPassword)
              } else {
                  passwordHash == HashUtil.sha256WithSalt(plainPassword, salt)
              }
          }
      }
    lib/src/main/kotlin/com/platform/user/UserRepository.kt: |
      package com.platform.user

      interface UserRepository {
          fun findByUsername(username: String): UserCredentials?
          fun save(credentials: UserCredentials)
      }
    api/src/main/kotlin/com/platform/auth/AuthService.kt: |
      package com.platform.auth

      import com.platform.user.UserRepository
      import com.platform.crypto.HashUtil
      import java.util.UUID

      class AuthService(private val userRepo: UserRepository) {
          fun login(username: String, password: String): Boolean {
              val creds = userRepo.findByUsername(username) ?: return false
              return creds.matches(password)
          }

          fun register(username: String, password: String) {
              val salt = UUID.randomUUID().toString()
              val hash = HashUtil.sha256WithSalt(password, salt)
              userRepo.save(com.platform.user.UserCredentials(username, hash, salt))
          }
      }
