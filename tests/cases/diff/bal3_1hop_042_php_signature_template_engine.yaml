  changed_files:
    src/Template/Engine.php: |
      <?php
      namespace App\Template;

      class Engine
      {
          private string $basePath;
          private string $extension;

          public function __construct(string $basePath, string $extension = '.html')
          {
              $this->basePath = $basePath;
              $this->extension = $extension;
          }

          public function render(string $template, array $vars, ?string $layout = null): string
          {
              $content = "Template: {$template}{$this->extension}";
              foreach ($vars as $key => $value) {
                  $content = str_replace("{{$key}}", $value, $content);
              }
              if ($layout !== null) {
                  $content = "Layout({$layout}): {$content}";
              }
              return $content;
          }

          public function exists(string $template): bool
          {
              return true;
          }
      }
  commit_message: "Add layout support and extension config to template Engine"
