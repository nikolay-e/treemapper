  changed_files:
    src/spawn.lua: |
      local M = {}

      local MAX_ENEMIES_PER_WAVE = 50

      function M.spawn_enemy(wave, enemy_type)
          if wave < 1 then
              return 0
          end
          local count = math.min(wave * 2, MAX_ENEMIES_PER_WAVE)
          for i = 1, count do
              M.create(enemy_type, i)
          end
          return count
      end

      function M.create(enemy_type, index)
          if not enemy_type or enemy_type == "" then
              return nil
          end
          return {type = enemy_type, id = index, hp = 100}
      end

      return M
    garbage/INT027_loot.lua: |
