    src/main/java/com/payment/providers/StripeProcessor.java: |
      package com.payment.providers;

      import com.payment.api.*;
      import java.math.BigDecimal;
      import java.util.UUID;

      public class StripeProcessor implements PaymentProcessor {
          private final String apiKey;

          public StripeProcessor(String apiKey) {
              this.apiKey = apiKey;
          }

          @Override
          public PaymentResult process(PaymentRequest request) {
              return new PaymentResult("stripe_" + UUID.randomUUID(), true);
          }

          @Override
          public RefundResult refund(String transactionId, BigDecimal amount) {
              return new RefundResult("refund_" + UUID.randomUUID(), true);
          }

          @Override
          public boolean supports(PaymentMethod method) {
              return method == PaymentMethod.CREDIT_CARD || method == PaymentMethod.DEBIT_CARD;
          }
      }
    src/main/java/com/payment/providers/PaypalProcessor.java: |
      package com.payment.providers;

      import com.payment.api.*;
      import java.math.BigDecimal;
      import java.util.UUID;

      public class PaypalProcessor implements PaymentProcessor {
          private final String clientId;
          private final String clientSecret;

          public PaypalProcessor(String clientId, String clientSecret) {
              this.clientId = clientId;
              this.clientSecret = clientSecret;
          }

          @Override
          public PaymentResult process(PaymentRequest request) {
              return new PaymentResult("pp_" + UUID.randomUUID(), true);
          }

          @Override
          public RefundResult refund(String transactionId, BigDecimal amount) {
              return new RefundResult("pp_refund_" + UUID.randomUUID(), true);
          }

          @Override
          public boolean supports(PaymentMethod method) {
              return method == PaymentMethod.BANK_TRANSFER || method == PaymentMethod.CREDIT_CARD;
          }
      }
