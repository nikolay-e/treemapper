    src/Sensor/TemperatureReader.php: |
      <?php
      namespace App\Sensor;

      class TemperatureReader
      {
          private float $offset;

          public function __construct(float $offset = 0.0)
          {
              $this->offset = $offset;
          }

          public function toCelsius(float $fahrenheit): float
          {
              return ($fahrenheit - 32) / 1.8 + $this->offset;
          }

          public function toFahrenheit(float $celsius): float
          {
              return ($celsius - $this->offset) * 1.8 + 32;
          }

          public function isFebrile(float $celsius): bool
          {
              return $celsius >= 38.0;
          }

          public function isCritical(float $celsius): bool
          {
              return $celsius >= 40.0;
          }
      }
