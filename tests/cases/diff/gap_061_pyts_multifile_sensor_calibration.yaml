  changed_files:
    src/calibration/sensor.py: |
      from typing import List, Tuple
      from dataclasses import dataclass

      @dataclass
      class SensorReading:
          raw_value: float
          unit: str
          timestamp: float

      class SensorCalibrator:
          def __init__(self, offset: float = 0.0, gain: float = 1.0):
              self.offset = offset
              self.gain = gain
              self._readings: List[SensorReading] = []

          def record(self, reading: SensorReading) -> None:
              self._readings.append(reading)

          def calibrate(self, reading: SensorReading) -> float:
              return (reading.raw_value * self.gain) + self.offset

          def calibrate_batch(self, readings: List[SensorReading]) -> List[float]:
              return [self.calibrate(r) for r in readings]

          def average(self) -> float:
              if not self._readings:
                  return 0.0
              total = sum(r.raw_value for r in self._readings)
              return total / len(self._readings)

          def reset(self) -> None:
              self._readings.clear()
    src/calibration/display.ts: |
      interface CalibrationResult {
        correctedValue: number;
        deviation: number;
        confidence: number;
      }

      function formatDeviation(deviation: number): string {
        const sign = deviation >= 0 ? "+" : "";
        return `${sign}${deviation.toFixed(3)}`;
      }

      function formatConfidence(confidence: number): string {
        return `${(confidence * 100).toFixed(1)}%`;
      }

      function renderCalibrationRow(label: string, result: CalibrationResult): string {
        const devStr = formatDeviation(result.deviation);
        const confStr = formatConfidence(result.confidence);
        return `${label}: ${result.correctedValue.toFixed(2)} (${devStr}) [${confStr}]`;
      }

      function renderCalibrationTable(entries: Map<string, CalibrationResult>): string {
        const rows: string[] = [];
        entries.forEach((result, label) => {
          rows.push(renderCalibrationRow(label, result));
        });
        return rows.join("\n");
      }
