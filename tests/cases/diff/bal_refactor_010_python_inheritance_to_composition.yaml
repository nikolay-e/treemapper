name: bal_refactor_010_python_inheritance_to_composition
tags:
- lang:scala
- change:multi_file
- change:new_function
- context:cross_module
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/main/scala/medical/Patient.scala: |
      package medical

      case class Patient(
        id: String,
        name: String,
        age: Int,
        conditions: List[String]
      )
    src/main/scala/medical/PatientRepository.scala: |
      package medical

      class PatientRepository {
        private var store: Map[String, Patient] = Map.empty

        def save(p: Patient): Unit = {
          store = store + (p.id -> p)
        }

        def find(id: String): Option[Patient] = store.get(id)

        def all(): List[Patient] = store.values.toList
      }
    src/main/scala/medical/DiagnosisService.scala: |
      package medical

      class DiagnosisService(repo: PatientRepository) {
        def addCondition(id: String, condition: String): Either[String, Patient] = {
          repo.find(id) match {
            case None    => Left(s"Patient $id not found")
            case Some(p) =>
              val updated = p.copy(conditions = p.conditions :+ condition)
              repo.save(updated)
              Right(updated)
          }
        }
      }
    src/main/scala/medical/api/PatientController.scala: |
      package medical.api

      import medical.{DiagnosisService, PatientRepository, Patient}

      class PatientController(service: DiagnosisService) {
        def handleAddCondition(patientId: String, condition: String): String = {
          service.addCondition(patientId, condition) match {
            case Right(p) => s"Updated patient ${p.id}: ${p.conditions.mkString(", ")}"
            case Left(e)  => s"ERROR: $e"
          }
        }
      }
    src/main/scala/REFACTOR010_Billing.scala: |
      package billing

      object REFACTOR010_Billing {
        val REFACTOR010_GARBAGE_A = "billing_marker"
        val REFACTOR010_GARBAGE_B = "invoice_prefix"

        def generateInvoice(patientId: String): String = s"INV-$patientId"
      }
    src/main/scala/REFACTOR010_Scheduler.scala: |
