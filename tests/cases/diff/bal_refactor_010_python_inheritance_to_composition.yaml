repo:
  initial_files:
    core/base_handler.py: |
      import logging

      class BaseHandler:
          def __init__(self):
              self.logger = logging.getLogger(self.__class__.__name__)

          def log_request(self, method, path):
              self.logger.info(f"{method} {path}")

          def validate_auth(self, token):
              if not token:
                  raise PermissionError("missing token")
              return True

          def format_response(self, data, status=200):
              return {"status": status, "data": data}
    handlers/user_handler.py: |
      from core.base_handler import BaseHandler

      class UserHandler(BaseHandler):
          def __init__(self, user_repo):
              super().__init__()
              self.user_repo = user_repo

          def get_user(self, request):
              self.log_request("GET", "/users")
              self.validate_auth(request.get("token"))
              user = self.user_repo.find(request["user_id"])
              return self.format_response(user)
    handlers/product_handler.py: |
      from core.base_handler import BaseHandler

      class ProductHandler(BaseHandler):
          def __init__(self, product_repo):
              super().__init__()
              self.product_repo = product_repo

          def list_products(self, request):
              self.log_request("GET", "/products")
              self.validate_auth(request.get("token"))
              products = self.product_repo.all()
              return self.format_response(products)
    app/routes.py: |
      from handlers.user_handler import UserHandler
      from handlers.product_handler import ProductHandler

      def setup_routes(user_repo, product_repo):
          user_h = UserHandler(user_repo)
          product_h = ProductHandler(product_repo)
          return {
              "/users": user_h.get_user,
              "/products": product_h.list_products,
          }
