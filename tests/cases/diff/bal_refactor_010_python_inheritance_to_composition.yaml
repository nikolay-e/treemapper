  changed_files:
    core/request_logger.py: |
      import logging

      class RequestLogger:
          def __init__(self, name):
              self.logger = logging.getLogger(name)

          def log_request(self, method, path):
              self.logger.info(f"{method} {path}")
    core/auth.py: |
      def validate_auth(token):
          if not token:
              raise PermissionError("missing token")
          return True
    core/response.py: |
      def format_response(data, status=200):
          return {"status": status, "data": data}
    handlers/user_handler.py: |
      from core.request_logger import RequestLogger
      from core.auth import validate_auth
      from core.response import format_response

      class UserHandler:
          def __init__(self, user_repo):
              self.user_repo = user_repo
              self.logger = RequestLogger("UserHandler")

          def get_user(self, request):
              self.logger.log_request("GET", "/users")
              validate_auth(request.get("token"))
              user = self.user_repo.find(request["user_id"])
              return format_response(user)
    handlers/product_handler.py: |
      from core.request_logger import RequestLogger
      from core.auth import validate_auth
      from core.response import format_response

      class ProductHandler:
          def __init__(self, product_repo):
              self.product_repo = product_repo
              self.logger = RequestLogger("ProductHandler")

          def list_products(self, request):
              self.logger.log_request("GET", "/products")
              validate_auth(request.get("token"))
              products = self.product_repo.all()
              return format_response(products)
