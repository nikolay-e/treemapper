    src/Services/InventoryService.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Services
      {
          public class InventoryService
          {
              private readonly Dictionary<string, int> _stock = new();

              public void AddStock(string productId, int quantity)
              {
                  if (!_stock.ContainsKey(productId))
                      _stock[productId] = 0;
                  _stock[productId] += quantity;
              }

              public bool Reserve(string productId, int quantity)
              {
                  if (!_stock.ContainsKey(productId)) return false;
                  if (_stock[productId] < quantity) return false;
                  _stock[productId] -= quantity;
                  return true;
              }

              public int GetStock(string productId)
              {
                  return _stock.GetValueOrDefault(productId, 0);
              }
          }
      }
    Tests/InventoryServiceTests.cs: |
      using Xunit;
      using App.Services;

      namespace App.Tests
      {
          public class InventoryServiceTests
          {
              [Fact]
              public void AddStock_IncreasesQuantity()
              {
                  var svc = new InventoryService();
                  svc.AddStock("item1", 10);
                  Assert.Equal(10, svc.GetStock("item1"));
              }

              [Fact]
              public void Reserve_SufficientStock_ReturnsTrue()
              {
                  var svc = new InventoryService();
                  svc.AddStock("item1", 10);
                  Assert.True(svc.Reserve("item1", 5));
                  Assert.Equal(5, svc.GetStock("item1"));
              }

              [Fact]
              public void Reserve_InsufficientStock_ReturnsFalse()
              {
                  var svc = new InventoryService();
                  svc.AddStock("item1", 3);
                  Assert.False(svc.Reserve("item1", 5));
              }
          }
      }
