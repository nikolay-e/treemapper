  changed_files:
    src/Services/InventoryService.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Services
      {
          public class InventoryService
          {
              private readonly Dictionary<string, int> _stock = new();

              public void AddStock(string productId, int quantity)
              {
                  if (quantity <= 0)
                      throw new ArgumentException("Quantity must be positive", nameof(quantity));
                  if (!_stock.ContainsKey(productId))
                      _stock[productId] = 0;
                  _stock[productId] += quantity;
              }

              public bool Reserve(string productId, int quantity)
              {
                  if (quantity <= 0)
                      throw new ArgumentException("Quantity must be positive", nameof(quantity));
                  if (!_stock.ContainsKey(productId)) return false;
                  if (_stock[productId] < quantity) return false;
                  _stock[productId] -= quantity;
                  return true;
              }

              public int GetStock(string productId)
              {
                  return _stock.GetValueOrDefault(productId, 0);
              }

              public void ReleaseReservation(string productId, int quantity)
              {
                  if (!_stock.ContainsKey(productId))
                      _stock[productId] = 0;
                  _stock[productId] += quantity;
              }
          }
      }
  commit_message: "fix: validate positive quantity, add reservation release"
