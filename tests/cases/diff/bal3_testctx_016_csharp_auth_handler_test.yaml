  changed_files:
    src/AuthHandler.cs: |
      namespace Auth;

      using System;
      using System.Collections.Generic;

      public class AuthHandler
      {
          private readonly Dictionary<string, string> _credentials = new();
          private readonly HashSet<string> _lockedAccounts = new();
          private readonly Dictionary<string, int> _failedAttempts = new();

          public void Register(string username, string passwordHash)
          {
              _credentials[username] = passwordHash;
          }

          public bool Authenticate(string username, string passwordHash)
          {
              if (_lockedAccounts.Contains(username))
                  return false;

              if (!_credentials.TryGetValue(username, out var stored) || stored != passwordHash)
              {
                  var attempts = _failedAttempts.GetValueOrDefault(username, 0) + 1;
                  _failedAttempts[username] = attempts;
                  if (attempts >= 5)
                      _lockedAccounts.Add(username);
                  return false;
              }

              _failedAttempts.Remove(username);
              return true;
          }

          public bool IsLocked(string username) => _lockedAccounts.Contains(username);

          public void Unlock(string username)
          {
              _lockedAccounts.Remove(username);
              _failedAttempts.Remove(username);
          }
      }
  commit_message: "refactor: add account lockout after 5 failed attempts"
