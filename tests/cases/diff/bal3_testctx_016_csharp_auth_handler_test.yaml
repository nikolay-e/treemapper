    tests/AuthHandlerTests.cs: |
      using Xunit;
      using Auth;

      public class AuthHandlerTests
      {
          [Fact]
          public void Register_And_Authenticate_Succeeds()
          {
              var handler = new AuthHandler();
              handler.Register("alice", "hash123");
              Assert.True(handler.Authenticate("alice", "hash123"));
          }

          [Fact]
          public void Authenticate_WrongPassword_Fails()
          {
              var handler = new AuthHandler();
              handler.Register("bob", "correct");
              Assert.False(handler.Authenticate("bob", "wrong"));
          }

          [Fact]
          public void Authenticate_UnknownUser_Fails()
          {
              var handler = new AuthHandler();
              Assert.False(handler.Authenticate("nobody", "any"));
          }
      }
