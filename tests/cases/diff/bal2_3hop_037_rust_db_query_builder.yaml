                  ColumnType::Text => "TEXT",
                  ColumnType::Boolean => "BOOLEAN",
                  ColumnType::Float => "REAL",
              };
              format!("{} {}", self.name, t)
          }
      }
  commit_message: "feat: add Float column type to query builder"
