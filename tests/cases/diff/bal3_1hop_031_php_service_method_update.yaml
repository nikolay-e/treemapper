      <?php
      namespace App\Helpers;

      GARBAGE_BAL3_031_STR_E = 'helper';
      GARBAGE_BAL3_031_TRIM_F = true;

      class StringHelper
      {
          public static function slugify(string $text): string
          {
              return strtolower(str_replace(' ', '-', $text));
          }
      }
  changed_files:
    src/Services/PaymentGateway.php: |
      <?php
      namespace App\Services;

      class PaymentGateway
      {
          private string $apiKey;
          private string $merchantId;

          public function __construct(string $apiKey, string $merchantId = 'default')
          {
              $this->apiKey = $apiKey;
              $this->merchantId = $merchantId;
          }

          public function charge(float $amount, string $currency, array $metadata = []): array
          {
              return [
                  'status' => 'success',
                  'amount' => $amount,
                  'currency' => $currency,
                  'merchant' => $this->merchantId,
                  'metadata' => $metadata,
              ];
          }

          public function refund(string $transactionId): array
          {
              return [
                  'status' => 'refunded',
                  'transaction_id' => $transactionId,
              ];
          }
      }
  commit_message: "Add merchant ID and metadata to PaymentGateway"
