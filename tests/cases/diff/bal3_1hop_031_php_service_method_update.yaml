repo:
  initial_files:
    src/Services/PaymentGateway.php: |
      <?php
      namespace App\Services;

      class PaymentGateway
      {
          private string $apiKey;

          public function __construct(string $apiKey)
          {
              $this->apiKey = $apiKey;
          }

          public function charge(float $amount, string $currency): array
          {
              return [
                  'status' => 'success',
                  'amount' => $amount,
                  'currency' => $currency,
              ];
          }

          public function refund(string $transactionId): array
          {
              return [
                  'status' => 'refunded',
                  'transaction_id' => $transactionId,
              ];
          }
      }
    src/Controllers/CheckoutController.php: |
      <?php
      namespace App\Controllers;

      use App\Services\PaymentGateway;

      class CheckoutController
      {
          private PaymentGateway $gateway;

          public function __construct(PaymentGateway $gateway)
          {
              $this->gateway = $gateway;
          }

          public function processPayment(float $amount): array
          {
              return $this->gateway->charge($amount, 'USD');
          }

          public function issueRefund(string $txId): array
          {
              return $this->gateway->refund($txId);
          }
      }
    src/Controllers/SubscriptionController.php: |
      <?php
      namespace App\Controllers;

      use App\Services\PaymentGateway;

      class SubscriptionController
      {
          private PaymentGateway $gateway;

          public function __construct(PaymentGateway $gateway)
          {
              $this->gateway = $gateway;
          }

          public function renewSubscription(float $price): array
          {
              return $this->gateway->charge($price, 'USD');
          }
      }
    src/Controllers/RefundController.php: |
      <?php
      namespace App\Controllers;

      use App\Services\PaymentGateway;

      class RefundController
      {
          private PaymentGateway $gateway;

          public function __construct(PaymentGateway $gateway)
          {
              $this->gateway = $gateway;
          }

          public function bulkRefund(array $transactionIds): array
          {
              $results = [];
              foreach ($transactionIds as $txId) {
                  $results[] = $this->gateway->refund($txId);
              }
              return $results;
          }
      }
    src/Controllers/InvoiceController.php: |
      <?php
      namespace App\Controllers;

      use App\Services\PaymentGateway;

