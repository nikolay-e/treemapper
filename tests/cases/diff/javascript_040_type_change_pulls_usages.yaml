name: javascript_040_type_change_pulls_usages
repo:
  initial_files:
    types.ts: |
      export type Config = {
          apiUrl: string;
          timeout: number;
      };
    app.ts: |
      import { Config } from './types';

      function init(config: Config) {
          console.log(`Connecting to ${config.apiUrl}`);
      }
    config-factory.ts: |
      import { Config } from './types';

      export function createDefaultConfig(): Config {
          return { apiUrl: 'http://localhost:3000', timeout: 5000 };
      }

      export function createConfig(apiUrl: string, timeout: number): Config {
          return { apiUrl, timeout };
      }
    env-config.ts: |
      export interface EnvConfig {
          apiUrl: string;
          timeout: number;
          retries: number;
          debug: boolean;
      }

      export function loadFromEnv(): EnvConfig {
          return {
              apiUrl: process.env.API_URL ?? 'http://localhost:3000',
              timeout: parseInt(process.env.TIMEOUT ?? '5000', 10),
              retries: parseInt(process.env.RETRIES ?? '3', 10),
              debug: process.env.DEBUG === 'true',
          };
      }
    config.test.ts: |
      import { Config } from './types';

      describe('Config', () => {
          it('should have required fields', () => {
              const config: Config = { apiUrl: 'http://test.com', timeout: 1000 };
              expect(config.apiUrl).toBe('http://test.com');
              expect(config.timeout).toBe(1000);
          });
      });
  changed_files:
    types.ts: |
