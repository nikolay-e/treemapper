repo:
  initial_files:
    lib/etl/extractor.rb: |
      module Etl
        class Extractor
          def extract(source)
            raise NotImplementedError
          end
        end
      end
    lib/etl/csv_extractor.rb: |
      require_relative 'extractor'

      module Etl
        class CsvExtractor < Extractor
          def initialize(delimiter: ',')
            @delimiter = delimiter
          end

          def extract(source)
            source.each_line.map { |line| line.chomp.split(@delimiter) }
          end
        end
      end
    lib/etl/transformer.rb: |
      require_relative 'csv_extractor'

      module Etl
        class Transformer
          def initialize(extractor)
            @extractor = extractor
          end

          def transform(source)
            rows = @extractor.extract(source)
            rows.map { |row| row.map(&:strip) }
          end
        end
      end
    lib/etl/loader.rb: |
      require_relative 'transformer'

      module Etl
        class Loader
          def initialize(transformer)
            @transformer = transformer
          end

          def load(source, destination)
            rows = @transformer.transform(source)
            destination.write(rows)
          end
        end
      end
    lib/pipeline/runner.rb: |
      require_relative '../etl/loader'
      require_relative '../etl/csv_extractor'
      require_relative '../etl/transformer'

      module Pipeline
        class Runner
          def run(source_path, destination)
            extractor = Etl::CsvExtractor.new
            transformer = Etl::Transformer.new(extractor)
            loader = Etl::Loader.new(transformer)
            loader.load(File.read(source_path), destination)
          end
        end
      end
    garbage/scheduler.rb: |
      # GARBAGE_PRETTYCFG_A = "cron_scheduler_marker"
    garbage/monitor.rb: |
      # GARBAGE_PRETTYCFG_B = "job_monitor_marker"
    garbage/alerting.rb: |
      # GARBAGE_PRETTYCFG_C = "alert_manager_marker"
  changed_files:
    lib/etl/extractor.rb: |
      module Etl
        class Extractor
          def extract(source, options = {})
            raise NotImplementedError
          end

          def supports?(source_type)
            false
          end
        end
      end
    lib/etl/csv_extractor.rb: |
      require_relative 'extractor'

      module Etl
        class CsvExtractor < Extractor
          def initialize(delimiter: ',', skip_header: false)
            @delimiter = delimiter
            @skip_header = skip_header
          end

          def extract(source, options = {})
            lines = source.each_line.map { |line| line.chomp.split(@delimiter) }
            @skip_header ? lines.drop(1) : lines
          end

          def supports?(source_type)
            source_type == :csv
          end
        end
      end
    lib/etl/transformer.rb: |
      require_relative 'csv_extractor'

      module Etl
        class Transformer
          def initialize(extractor)
            @extractor = extractor
          end

          def transform(source, options = {})
            rows = @extractor.extract(source, options)
            rows.map { |row| row.map(&:strip) }
          end
        end
      end
    lib/etl/loader.rb: |
      require_relative 'transformer'

      module Etl
        class Loader
          def initialize(transformer)
            @transformer = transformer
          end

          def load(source, destination, options = {})
            rows = @transformer.transform(source, options)
            destination.write(rows)
          end
        end
      end
    lib/pipeline/runner.rb: |
      require_relative '../etl/loader'
      require_relative '../etl/csv_extractor'
      require_relative '../etl/transformer'

      module Pipeline
        class Runner
          def run(source_path, destination, options = {})
            extractor = Etl::CsvExtractor.new
            transformer = Etl::Transformer.new(extractor)
            loader = Etl::Loader.new(transformer)
            loader.load(File.read(source_path), destination, options)
          end
        end
      end
    garbage/scheduler.rb: |
      # GARBAGE_PRETTYCFG_A = "cron_scheduler_marker"
    garbage/monitor.rb: |
      # GARBAGE_PRETTYCFG_B = "job_monitor_marker"
    garbage/alerting.rb: |
      # GARBAGE_PRETTYCFG_C = "alert_manager_marker"
