name: terraform_057_sensitive_variable
tags:
- lang:terraform
- change:single_file
- change:config
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    variables.tf: |
      variable "db_password" {
        type = string
      }

      variable "db_host" {
        type    = string
        default = "db.internal"
      }

      variable "environment" {
        type    = string
        default = "production"
      }
    main.tf: |
      resource "aws_db_instance" "main" {
        identifier = "app-db"
        engine     = "postgres"
        password   = var.db_password
        username   = "admin"

        tags = {
          Environment = var.environment
        }
      }

      resource "aws_lambda_function" "api" {
        function_name = "api-handler"
        runtime       = "python3.11"
        handler       = "main.handler"
        role          = aws_iam_role.lambda.arn
        filename      = "lambda.zip"

        environment {
          variables = {
            DB_HOST = var.db_host
          }
        }
      }

      resource "aws_lb_listener" "https" {
        load_balancer_arn = aws_lb.main.arn
        port              = 443
        protocol          = "HTTPS"

        default_action {
          type             = "forward"
          target_group_arn = aws_lb_target_group.app.arn
        }
      }
    terraform.tfvars.example: |
      db_password     = "CHANGEME"
      db_host         = "db.internal"
      api_key         = "CHANGEME"
      ssl_certificate = "arn:aws:acm:..."
    payment/secrets.tf: |
      variable "stripe_api_key" {
        type      = string
        sensitive = true
      }

      variable "sendgrid_token" {
        type      = string
        sensitive = true
      }

      variable "payment_webhook_secret" {
        type      = string
        sensitive = true
      }
    secrets_manager.tf: |
      resource "aws_secretsmanager_secret" "api_key" {
        name = "app/api_key"
      }

      resource "aws_secretsmanager_secret" "ssl_certificate" {
        name = "app/ssl_certificate"
      }

      resource "aws_secretsmanager_secret_version" "api_key" {
        secret_id     = aws_secretsmanager_secret.api_key.id
        secret_string = var.api_key
      }
    networking/vpc.tf: |
      resource "aws_vpc" "main" {
        cidr_block           = "10.0.0.0/16"
        enable_dns_hostnames = true
      }

      resource "aws_subnet" "private" {
        count      = 2
        vpc_id     = aws_vpc.main.id
        cidr_block = cidrsubnet("10.0.0.0/16", 8, count.index + 100)
      }
    outputs.tf: |
      output "db_endpoint" {
        value = aws_db_instance.main.endpoint
      }

      output "db_connection_string" {
        value     = "postgres://admin:${var.db_password}@${aws_db_instance.main.endpoint}/appdb"
        sensitive = true
      }

      output "lambda_arn" {
        value = aws_lambda_function.api.arn
      }
    ci/pipeline.tf: |
      resource "aws_codebuild_project" "deploy" {
        name = "deploy-pipeline"

        environment {
          type  = "LINUX_CONTAINER"
          image = "aws/codebuild/standard:7.0"

          environment_variable {
            name  = "DB_PASSWORD"
            value = var.db_password
            type  = "PARAMETER_STORE"
          }
        }

        source {
          type     = "GITHUB"
          location = "https://github.com/org/repo.git"
        }
      }
  changed_files:
    variables.tf: |
      variable "db_password" {
        type      = string
        sensitive = true
      }

      variable "db_host" {
        type    = string
        default = "db.internal"
      }

      variable "environment" {
        type    = string
        default = "production"
      }

      variable "api_key" {
        type      = string
        sensitive = true
      }

      variable "ssl_certificate" {
        type      = string
        sensitive = true
      }
  commit_message: Update files
