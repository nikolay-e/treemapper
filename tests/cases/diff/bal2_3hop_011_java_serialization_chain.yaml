name: bal2_3hop_011_java_serialization_chain
tags:
- lang:java
- change:single_file
- change:signature
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/main/java/com/app/dto/UserDto.java: |
      package com.app.dto;

      public class UserDto {
          private String id;
          private String name;
          public UserDto(String id, String name) {
              this.id = id;
              this.name = name;
          }
          public String getId() { return id; }
          public String getName() { return name; }
      }
    src/main/java/com/app/mapper/UserMapper.java: |
      package com.app.mapper;

      import com.app.dto.UserDto;

      public class UserMapper {
          public UserDto toDto(String id, String name) {
              return new UserDto(id, name);
          }
          public String toJson(UserDto dto) {
              return "{\"id\":\"" + dto.getId() + "\",\"name\":\"" + dto.getName() + "\"}";
          }
      }
    src/main/java/com/app/service/UserSerializer.java: |
      package com.app.service;

      import com.app.mapper.UserMapper;
      import com.app.dto.UserDto;

      public class UserSerializer {
          private final UserMapper mapper;
          public UserSerializer(UserMapper mapper) {
              this.mapper = mapper;
          }
          public String serialize(String id, String name) {
              UserDto dto = mapper.toDto(id, name);
              return mapper.toJson(dto);
          }
      }
    src/main/java/com/app/handler/ExportHandler.java: |
      package com.app.handler;

      import com.app.service.UserSerializer;

      public class ExportHandler {
          private final UserSerializer serializer;
          public ExportHandler(UserSerializer serializer) {
              this.serializer = serializer;
          }
          public String export(String id, String name) {
              return serializer.serialize(id, name);
          }
      }
    src/main/java/com/app/util/CsvWriter.java: |
      package com.app.util;

      public class CsvWriter {
          public static String toCsv(String... fields) {
              return String.join(",", fields);
          }
      }
    src/main/java/com/app/util/XmlBuilder.java: |
      package com.app.util;

      public class XmlBuilder {
          public static String tag(String name, String value) {
              return "<" + name + ">" + value + "</" + name + ">";
          }
      }
