name: bal3_rare_006_dart_repository_api
tags:
- lang:dart
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    lib/config/api_config.dart: |
      class ApiConfig {
        final String baseUrl;
        final int timeoutMs;
        final Map<String, String> headers;

        ApiConfig({
          required this.baseUrl,
          required this.timeoutMs,
          this.headers = const {},
        });
      }
    lib/repositories/product_repository.dart: |
      import '../config/api_config.dart';

      class ProductRepository {
        final ApiConfig config;

        ProductRepository(this.config);

        String buildUrl(String path) {
          return '${config.baseUrl}$path';
        }

        Map<String, dynamic> fetchProducts() {
          final url = buildUrl('/products');
          return {'url': url, 'timeout': config.timeoutMs};
        }
      }
    lib/repositories/order_repository.dart: |
      import '../config/api_config.dart';

      class OrderRepository {
        final ApiConfig config;

        OrderRepository(this.config);

        String buildUrl(String path) {
          return '${config.baseUrl}$path';
        }
      }
    lib/widgets/product_list.dart: |
      const GARBAGE_RARE_006_LIST_A = 'grid';
      const GARBAGE_RARE_006_COLS_B = 2;

      class ProductList {
        void render() {}
      }
    lib/theme/colors.dart: |
      const GARBAGE_RARE_006_PRIMARY_C = 0xFF6200EE;
      const GARBAGE_RARE_006_ACCENT_D = 0xFF03DAC5;

      class AppColors {}
    lib/utils/debounce.dart: |
      const GARBAGE_RARE_006_DELAY_E = 300;
      const GARBAGE_RARE_006_TIMER_F = 'debounce';

      void debounce(Function fn, int delayMs) {}
  changed_files:
    lib/config/api_config.dart: |
      class ApiConfig {
        final String baseUrl;
        final int timeoutMs;
        final Map<String, String> headers;
        final int retryCount;
        final String? apiKey;

        ApiConfig({
          required this.baseUrl,
          required this.timeoutMs,
          this.headers = const {},
          this.retryCount = 3,
          this.apiKey,
        });
      }
  commit_message: "add retryCount and apiKey to ApiConfig"
