    src/main/java/com/example/UserService.java: |
      package com.example;

      import org.springframework.stereotype.Service;

      @Service
      public class UserService {
          public User findById(Long id) {
              return new User(id, "John");
          }
      }
    src/main/java/com/example/UserController.java: |
      package com.example;

      import org.springframework.beans.factory.annotation.Autowired;
      import org.springframework.web.bind.annotation.*;
      import java.util.List;

      @RestController
      @RequestMapping("/users")
      public class UserController {

          @Autowired
          private UserService userService;

          @GetMapping("/{id}")
          public User getUser(@PathVariable Long id) {
              return userService.findById(id);
          }
      }
    src/main/java/com/example/User.java: |
      package com.example;

      public class User {
          private Long id;
          private String name;

          public User(Long id, String name) {
              this.id = id;
              this.name = name;
          }

          public Long getId() { return id; }
          public String getName() { return name; }
      }
    src/main/java/com/example/ProductService.java: |
      package com.example;

      import org.springframework.stereotype.Service;
      import java.util.List;

      @Service
      public class ProductService {
          public Product findById(Long id) {
              return new Product(id, "Widget", 9.99);
          }

          public List<Product> findAll() {
              return List.of(new Product(1L, "Widget", 9.99), new Product(2L, "Gadget", 19.99));
          }

          public Product save(Product product) {
              return product;
          }
      }
    src/main/java/com/example/OrderService.java: |
      package com.example;

      import org.springframework.stereotype.Service;
      import java.util.List;

      @Service
      public class OrderService {
          public Order findById(Long id) {
              return new Order(id, "pending", 100.00);
          }

          public List<Order> findAll() {
              return List.of(new Order(1L, "pending", 100.00));
          }

          public Order save(Order order) {
              return order;
          }
      }
    src/main/java/com/example/UserRepository.java: |
      package com.example;

      import org.springframework.data.jpa.repository.JpaRepository;
      import org.springframework.stereotype.Repository;

      @Repository
      public interface UserRepository extends JpaRepository<User, Long> {
          List<User> findByName(String name);
          boolean existsByName(String name);
      }
    src/test/java/com/example/UserServiceTest.java: |
      package com.example;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      class UserServiceTest {
          private final UserService service = new UserService();

          @Test
          void findByIdReturnsUser() {
              User user = service.findById(1L);
              assertNotNull(user);
              assertEquals("John", user.getName());
          }
      }
    src/main/java/com/example/ProductController.java: |
