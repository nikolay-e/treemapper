repo:
  initial_files:
    internal/errors/domain_errors.go: |
      package errors

      import "errors"

      var (
          ErrNotFound     = errors.New("resource not found")
          ErrUnauthorized = errors.New("unauthorized access")
          ErrForbidden    = errors.New("access forbidden")
      )
    internal/errors/http_errors.go: |
      package errors

      import "net/http"

      func HTTPStatusCode(err error) int {
          if errors.Is(err, ErrNotFound) {
              return http.StatusNotFound
          }
          if errors.Is(err, ErrUnauthorized) {
              return http.StatusUnauthorized
          }
          if errors.Is(err, ErrForbidden) {
              return http.StatusForbidden
          }
          return http.StatusInternalServerError
      }
    internal/handler/error_handler.go: |
      package handler

      import (
          "encoding/json"
          "myproject/internal/errors"
          "net/http"
      )

      type ErrorResponse struct {
          Code    int    `json:"code"`
          Message string `json:"message"`
      }

      func HandleError(w http.ResponseWriter, err error) {
          code := errors.HTTPStatusCode(err)
          w.WriteHeader(code)
          json.NewEncoder(w).Encode(ErrorResponse{
              Code:    code,
              Message: err.Error(),
          })
      }
    internal/handler/middleware.go: |
      package handler

      import (
          "log"
          "net/http"
          "time"
      )

      func LoggingMiddleware(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              start := time.Now()
              next.ServeHTTP(w, r)
              log.Printf("%s %s %v", r.Method, r.URL.Path, time.Since(start))
          })
      }

      func RecoveryMiddleware(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              defer func() {
                  if err := recover(); err != nil {
                      http.Error(w, "internal server error", http.StatusInternalServerError)
                  }
              }()
              next.ServeHTTP(w, r)
          })
      }
  changed_files:
    internal/errors/domain_errors.go: |
      package errors

      import (
          "errors"
          "fmt"
      )

      var (
          ErrNotFound       = errors.New("resource not found")
          ErrUnauthorized   = errors.New("unauthorized access")
          ErrForbidden      = errors.New("access forbidden")
          ErrConflict       = errors.New("resource conflict")
          ErrValidation     = errors.New("validation failed")
          ErrRateLimit      = errors.New("rate limit exceeded")
          ErrServiceUnavail = errors.New("service unavailable")
      )

      type DomainError struct {
          Code       string
          Message    string
          Field      string
          Underlying error
      }

      func (e *DomainError) Error() string {
          if e.Field != "" {
              return fmt.Sprintf("%s: %s (%s)", e.Code, e.Message, e.Field)
          }
          return fmt.Sprintf("%s: %s", e.Code, e.Message)
      }

      func (e *DomainError) Unwrap() error {
          return e.Underlying
      }

      func (e *DomainError) Is(target error) bool {
          if e.Underlying != nil {
              return errors.Is(e.Underlying, target)
          }
          return false
      }

      func NewNotFoundError(resource string) *DomainError {
          return &DomainError{
              Code:       "NOT_FOUND",
              Message:    resource + " not found",
              Underlying: ErrNotFound,
          }
      }

      func NewValidationError(field, message string) *DomainError {
          return &DomainError{
              Code:       "VALIDATION_ERROR",
              Message:    message,
              Field:      field,
              Underlying: ErrValidation,
          }
      }

      func NewConflictError(resource string) *DomainError {
          return &DomainError{
              Code:       "CONFLICT",
              Message:    resource + " already exists",
              Underlying: ErrConflict,
          }
      }

      func NewRateLimitError(limit int) *DomainError {
          return &DomainError{
              Code:       "RATE_LIMITED",
              Message:    fmt.Sprintf("rate limit of %d requests exceeded", limit),
              Underlying: ErrRateLimit,
          }
      }
