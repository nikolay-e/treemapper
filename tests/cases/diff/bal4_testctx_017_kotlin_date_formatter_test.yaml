repo:
  initial_files:
    src/main/kotlin/util/DateFormatter.kt: |
      package util

      import java.time.LocalDate
      import java.time.format.DateTimeFormatter

      class DateFormatter {
          fun formatIso(date: LocalDate): String {
              return date.format(DateTimeFormatter.ISO_LOCAL_DATE)
          }

          fun formatSlash(date: LocalDate): String {
              return date.format(DateTimeFormatter.ofPattern("MM/dd/yyyy"))
          }
      }
    src/test/kotlin/util/DateFormatterTest.kt: |
      package util

      import org.junit.jupiter.api.Test
      import org.junit.jupiter.api.Assertions.assertEquals
      import java.time.LocalDate

      class DateFormatterTest {
          private val formatter = DateFormatter()

          @Test
          fun testFormatIso() {
              val date = LocalDate.of(2024, 1, 15)
              assertEquals("2024-01-15", formatter.formatIso(date))
          }

          @Test
          fun testFormatSlash() {
              val date = LocalDate.of(2024, 1, 15)
              assertEquals("01/15/2024", formatter.formatSlash(date))
          }
      }
    src/main/kotlin/util/TimeUtils.kt: |
      package util

      class TimeUtils {
          fun millisToSeconds(ms: Long): Double = ms / 1000.0
      }
    src/main/kotlin/util/Calendar.kt: |
      package util

      import java.time.LocalDate

      class Calendar {
          fun isWeekend(date: LocalDate): Boolean {
              val day = date.dayOfWeek.value
              return day == 6 || day == 7
          }
      }
  changed_files:
