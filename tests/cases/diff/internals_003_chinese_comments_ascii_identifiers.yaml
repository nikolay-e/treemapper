  changed_files:
    src/event/bus.clj: |
      (ns event.bus)

      (defprotocol EventBus
        (publish! [this topic payload])
        (subscribe! [this topic handler])
        (unsubscribe! [this topic handler]))

      (defrecord LocalBus [handlers]
        EventBus
        (publish! [this topic payload]
          (doseq [h (get @handlers topic [])]
            (h payload)))
        (subscribe! [this topic handler]
          (swap! handlers update topic (fnil conj []) handler))
        (unsubscribe! [this topic handler]
          (swap! handlers update topic (partial remove #(= % handler)))))

      (defn create-bus []
        (->LocalBus (atom {})))
    src/event/dispatcher.clj: |
      (ns event.dispatcher
        (:require [event.bus :as bus]))

      (defn dispatch [event-bus topic payload]
        (bus/publish! event-bus topic payload))

      (defn register [event-bus topic handler]
        (bus/subscribe! event-bus topic handler))

      (defn deregister [event-bus topic handler]
        (bus/unsubscribe! event-bus topic handler))
    src/service/order_service.clj: |
      (ns service.order-service
        (:require [event.dispatcher :as disp]))

      (defn place-order [event-bus order]
        (disp/dispatch event-bus :order/placed order))

      (defn cancel-order [event-bus order-id]
        (disp/dispatch event-bus :order/cancelled {:id order-id}))

      (defn stop-listening [event-bus topic handler]
        (disp/deregister event-bus topic handler))
    garbage/metrics.clj: |
      (ns garbage.metrics)

      (def ^:const GARBAGE_INT003_A "prometheus_marker")
      (def ^:const GARBAGE_INT003_B "counter_marker")

      (defn record-metric [name value]
        GARBAGE_INT003_A)
    garbage/storage.clj: |
      (ns garbage.storage)

      (def ^:const GARBAGE_INT003_C "s3_marker")
      (def ^:const GARBAGE_INT003_D "bucket_marker")

      (defn upload [key data]
        GARBAGE_INT003_C)
    garbage/auth.clj: |
      (ns garbage.auth)

      (def ^:const GARBAGE_INT003_E "jwt_marker")

      (defn verify-token [token]
        GARBAGE_INT003_E)
