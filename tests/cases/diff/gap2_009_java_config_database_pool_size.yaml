    src/main/java/com/logistics/config/DatabaseConfig.java: |
      package com.logistics.config;

      import java.io.InputStream;
      import java.util.Properties;

      public class DatabaseConfig {
          private final Properties props;

          public DatabaseConfig() {
              this.props = new Properties();
              try (InputStream is = getClass().getClassLoader()
                      .getResourceAsStream("application.properties")) {
                  props.load(is);
              } catch (Exception e) {
                  throw new RuntimeException("Failed to load config", e);
              }
          }

          public int getMaxPoolSize() {
              return Integer.parseInt(props.getProperty("db.pool.maxSize", "10"));
          }

          public int getMinIdle() {
              return Integer.parseInt(props.getProperty("db.pool.minIdle", "2"));
          }

          public long getTimeout() {
              return Long.parseLong(props.getProperty("db.pool.timeout", "30000"));
          }

          public String getUrl() {
              return props.getProperty("db.url");
          }
      }
    src/main/java/com/logistics/db/ConnectionPool.java: |
      package com.logistics.db;

      import com.logistics.config.DatabaseConfig;
      import java.sql.Connection;
      import java.util.concurrent.ArrayBlockingQueue;

      public class ConnectionPool {
          private final ArrayBlockingQueue<Connection> pool;
          private final DatabaseConfig config;

          public ConnectionPool(DatabaseConfig config) {
              this.config = config;
              this.pool = new ArrayBlockingQueue<>(config.getMaxPoolSize());
          }

          public Connection acquire() throws InterruptedException {
              return pool.take();
          }

          public void release(Connection conn) {
              pool.offer(conn);
          }

          public int available() {
              return pool.size();
          }
      }
    src/main/java/com/logistics/service/ShipmentService.java: |
      package com.logistics.service;

      import com.logistics.db.ConnectionPool;
      import java.sql.Connection;

      public class ShipmentService {
          private final ConnectionPool pool;

          public ShipmentService(ConnectionPool pool) {
              this.pool = pool;
          }

          public String createShipment(String origin, String destination) {
              try {
                  Connection conn = pool.acquire();
                  pool.release(conn);
                  return "SHIP-" + System.currentTimeMillis();
              } catch (InterruptedException e) {
                  Thread.currentThread().interrupt();
                  throw new RuntimeException("Failed to create shipment", e);
              }
          }
      }
    src/main/java/com/logistics/util/IdGenerator.java: |
      package com.logistics.util;

      import java.util.UUID;

      public class IdGenerator {
          public static String newId() {
              return UUID.randomUUID().toString().replace("-", "");
          }

          public static String prefixed(String prefix) {
              return prefix + "-" + newId().substring(0, 8);
          }
      }
