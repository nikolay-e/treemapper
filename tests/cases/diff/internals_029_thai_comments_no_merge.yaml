  changed_files:
    src/inventory.lua: |
      local M = {}

      function M.deduct_stock(item_id, quantity)
          if not M.stock[item_id] then
              return false, "item not found"
          end
          if M.stock[item_id] < quantity then
              return false, "insufficient stock"
          end
          M.stock[item_id] = M.stock[item_id] - quantity
          return true
      end

      M.stock = {}

      return M
    garbage/INT029_network.lua: |
