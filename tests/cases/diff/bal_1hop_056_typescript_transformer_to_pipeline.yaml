name: bal_1hop_056_typescript_transformer_to_pipeline
tags:
- lang:typescript
- change:new_function
- change:multi_file
- context:import_chain
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    src/transform/textTransformer.ts: |
      export type TransformFn = (input: string) => string;

      export function toUpperCase(input: string): string {
        return input.toUpperCase();
      }

      export function trim(input: string): string {
        return input.trim();
      }

      export function removeExtraSpaces(input: string): string {
        return input.replace(/\s+/g, ' ');
      }
    src/pipeline/transformPipeline.ts: |
      import { TransformFn, toUpperCase, trim, removeExtraSpaces } from '../transform/textTransformer';

      export class TransformPipeline {
        private steps: TransformFn[] = [];

        add(fn: TransformFn): TransformPipeline {
          this.steps.push(fn);
          return this;
        }

        execute(input: string): string {
          return this.steps.reduce((acc, fn) => fn(acc), input);
        }

        static defaultPipeline(): TransformPipeline {
          return new TransformPipeline()
            .add(trim)
            .add(removeExtraSpaces)
            .add(toUpperCase);
        }
      }
    src/io/fileReader.ts: |
      export function readLines(content: string): string[] {
        return content.split('\n').filter(line => line.length > 0);
      }
    src/io/fileWriter.ts: |
      export function writeOutput(lines: string[]): string {
        return lines.join('\n') + '\n';
      }
    src/metrics/pipelineMetrics.ts: |
      export interface PipelineStats {
        inputLength: number;
        outputLength: number;
        stepsExecuted: number;
      }

      export function computeStats(input: string, output: string, steps: number): PipelineStats {
        return {
          inputLength: input.length,
          outputLength: output.length,
          stepsExecuted: steps,
        };
      }
  changed_files:
    src/transform/textTransformer.ts: |
      export type TransformFn = (input: string) => string;

      export function toUpperCase(input: string): string {
        return input.toUpperCase();
      }

      export function toLowerCase(input: string): string {
        return input.toLowerCase();
      }

      export function trim(input: string): string {
        return input.trim();
      }

      export function removeExtraSpaces(input: string): string {
        return input.replace(/\s+/g, ' ');
      }

      export function capitalize(input: string): string {
        return input.replace(/\b\w/g, char => char.toUpperCase());
      }

      export function slugify(input: string): string {
        return input
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/^-|-$/g, '');
      }

      export function truncate(maxLength: number): TransformFn {
        return (input: string) => input.length > maxLength
          ? input.slice(0, maxLength) + '...'
          : input;
      }
  commit_message: "feat: add toLowerCase, capitalize, slugify, and truncate transforms"
