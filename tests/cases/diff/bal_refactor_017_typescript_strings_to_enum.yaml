fragments:
- id: dry_run_fn
  selector:
    path: scripts/sync.py
    anchor: "def dry_run"
- id: sync_directory_fn
  selector:
    path: scripts/sync.py
    anchor: "def sync_directory"
- id: shell_dry_run_check
  selector:
    path: scripts/sync.sh
    anchor: 'DRY_RUN'
- id: no_garbage_a
  selector:
    anchor: GARBAGE_TS017_COMPRESS_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_TS017_ENCRYPT_B
- id: no_garbage_c
  selector:
    anchor: GARBAGE_TS017_CHECKSUM_C
oracle:
  required:
  - dry_run_fn
  - sync_directory_fn
  - shell_dry_run_check
  allowed: []
  forbidden:
