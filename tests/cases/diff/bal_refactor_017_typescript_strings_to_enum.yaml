name: bal_refactor_017_typescript_strings_to_enum
tags:
- lang:typescript
- change:multi_file
- change:refactor
- context:import_chain
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    src/models/task.ts: |
      export interface Task {
          id: string;
          title: string;
          priority: string;
          assignee: string;
      }

      export function createTask(title: string, priority: string, assignee: string): Task {
          return { id: crypto.randomUUID(), title, priority, assignee };
      }
    src/services/taskService.ts: |
      import { Task, createTask } from '../models/task';

      export class TaskService {
          private tasks: Task[] = [];

          addTask(title: string, priority: string, assignee: string): Task {
              const task = createTask(title, priority, assignee);
              this.tasks.push(task);
              return task;
          }

          getHighPriority(): Task[] {
              return this.tasks.filter(t => t.priority === 'high');
          }

          getMediumPriority(): Task[] {
              return this.tasks.filter(t => t.priority === 'medium');
          }
      }
    src/views/taskBoard.ts: |
      import { Task } from '../models/task';

      export function renderPriorityBadge(task: Task): string {
          const colors: Record<string, string> = {
              'high': 'red',
              'medium': 'orange',
              'low': 'green',
          };
          return `<span style="color:${colors[task.priority] || 'gray'}">${task.priority}</span>`;
      }
    src/utils/dates.ts: |
      const GARBAGE_REFACTOR_017_DATES_A = 'dates';
      const GARBAGE_REFACTOR_017_TZ_B = 'UTC';

      export function today(): string {
          return new Date().toISOString().split('T')[0];
      }
    garbage_events.ts: |
      const GARBAGE_REFACTOR_017_EVENTS_C = 'events';
      const GARBAGE_REFACTOR_017_BUS_D = 'memory';

      export class EventBus {
          static GARBAGE_REFACTOR_017_BUS_CLASS_E = true;

          emit(name: string, data: unknown): void {}
      }
  changed_files:
    src/models/priority.ts: |
      export enum Priority {
          HIGH = 'high',
          MEDIUM = 'medium',
          LOW = 'low',
      }
    src/models/task.ts: |
      import { Priority } from './priority';

      export interface Task {
          id: string;
          title: string;
          priority: Priority;
          assignee: string;
      }

      export function createTask(title: string, priority: Priority, assignee: string): Task {
          return { id: crypto.randomUUID(), title, priority, assignee };
      }
    src/services/taskService.ts: |
      import { Task, createTask } from '../models/task';
      import { Priority } from '../models/priority';

      export class TaskService {
          private tasks: Task[] = [];

          addTask(title: string, priority: Priority, assignee: string): Task {
              const task = createTask(title, priority, assignee);
              this.tasks.push(task);
              return task;
          }

          getHighPriority(): Task[] {
              return this.tasks.filter(t => t.priority === Priority.HIGH);
          }

          getMediumPriority(): Task[] {
              return this.tasks.filter(t => t.priority === Priority.MEDIUM);
          }
      }
    src/views/taskBoard.ts: |
      import { Task } from '../models/task';
      import { Priority } from '../models/priority';

      const PRIORITY_COLORS: Record<Priority, string> = {
          [Priority.HIGH]: 'red',
          [Priority.MEDIUM]: 'orange',
          [Priority.LOW]: 'green',
      };

      export function renderPriorityBadge(task: Task): string {
          const color = PRIORITY_COLORS[task.priority] || 'gray';
          return `<span style="color:${color}">${task.priority}</span>`;
      }
    src/utils/dates.ts: |
      const GARBAGE_REFACTOR_017_DATES_A = 'dates';
      const GARBAGE_REFACTOR_017_TZ_B = 'UTC';

      export function today(): string {
          return new Date().toISOString().split('T')[0];
      }
    garbage_events.ts: |
      const GARBAGE_REFACTOR_017_EVENTS_C = 'events';
      const GARBAGE_REFACTOR_017_BUS_D = 'memory';

      export class EventBus {
          static GARBAGE_REFACTOR_017_BUS_CLASS_E = true;

          emit(name: string, data: unknown): void {}
      }
  commit_message: "refactor: replace priority strings with Priority enum"
