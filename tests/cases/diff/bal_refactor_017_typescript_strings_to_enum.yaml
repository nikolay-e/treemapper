      def md5(path: str) -> str:
          return ""
  changed_files:
    scripts/sync.py: |
      import os
      import shutil

      SOURCE_DIR = "/data/source"
      DEST_DIR = "/data/dest"


      def sync_directory(source: str = SOURCE_DIR, dest: str = DEST_DIR) -> int:
          count = 0
          for item in os.listdir(source):
              src_path = os.path.join(source, item)
              dst_path = os.path.join(dest, item)
              shutil.copy2(src_path, dst_path)
              count += 1
          return count


      def dry_run(source: str = SOURCE_DIR) -> list[str]:
          return [
              os.path.join(source, item)
              for item in sorted(os.listdir(source))
          ]
    scripts/sync.sh: |
      #!/usr/bin/env bash
      set -euo pipefail
      if [[ "${DRY_RUN:-0}" == "1" ]]; then
          python3 -c "import scripts.sync; print('\n'.join(scripts.sync.dry_run()))"
      else
          python3 scripts/sync.py
      fi
    garbage/compress.py: |
      GARBAGE_TS017_COMPRESS_A = "compress_marker"


