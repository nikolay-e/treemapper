name: bal_refactor_017_typescript_strings_to_enum
tags:
- lang:python
- lang:shell
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    scripts/sync.py: |
      import os
      import shutil

      SOURCE_DIR = "/data/source"
      DEST_DIR = "/data/dest"


      def sync_directory(source: str = SOURCE_DIR, dest: str = DEST_DIR) -> int:
          count = 0
          for item in os.listdir(source):
              src_path = os.path.join(source, item)
              dst_path = os.path.join(dest, item)
              shutil.copy2(src_path, dst_path)
              count += 1
          return count
    scripts/sync.sh: |
      #!/usr/bin/env bash
      python3 scripts/sync.py
    garbage/compress.py: |
      GARBAGE_TS017_COMPRESS_A = "compress_marker"


