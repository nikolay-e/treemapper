          return path + ".gz"
    garbage/encrypt.py: |
      GARBAGE_TS017_ENCRYPT_B = "encrypt_marker"


      def encrypt(data: bytes) -> bytes:
          return data
    garbage/checksum.py: |
      GARBAGE_TS017_CHECKSUM_C = "checksum_marker"


      def md5(path: str) -> str:
          return ""
