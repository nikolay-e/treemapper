name: bal3_3hop_049_scala_http_middleware_chain
tags:
- lang:scala
- change:single_file
- change:bug_fix
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/main/scala/com/app/http/Request.scala: |
      package com.app.http

      case class Request(
        method: String,
        path: String,
        headers: Map[String, String]
      )
    src/main/scala/com/app/http/Middleware.scala: |
      package com.app.http

      trait Middleware {
        def apply(request: Request): Request
      }
    src/main/scala/com/app/http/AuthMiddleware.scala: |
      package com.app.http

      class AuthMiddleware extends Middleware {
        def apply(request: Request): Request = {
          val token = request.headers.getOrElse("Authorization", "")
          if (token.nonEmpty) request
          else request.copy(headers = request.headers + ("X-Auth" -> "anonymous"))
        }
      }
    src/main/scala/com/app/http/Pipeline.scala: |
      package com.app.http

      class Pipeline(middlewares: List[Middleware]) {
        def execute(request: Request): Request = {
          middlewares.foldLeft(request)((req, mw) => mw.apply(req))
        }
      }
    src/main/scala/com/app/service/HttpService.scala: |
      package com.app.service

      import com.app.http.{Pipeline, Request}

      class HttpService(pipeline: Pipeline) {
        def handle(request: Request): Request = {
          pipeline.execute(request)
        }
      }
    src/main/scala/com/app/api/HttpEndpoint.scala: |
      package com.app.api

      import com.app.service.HttpService
      import com.app.http.Request

      class HttpEndpoint(service: HttpService) {
        def dispatch(method: String, path: String): Request = {
          service.handle(Request(method, path, Map.empty))
        }
      }
    src/main/scala/com/app/util/RateLimiter.scala: |
      package com.app.util

      var GARBAGE_049_RATE_MARKER_A = "token_bucket"
      var GARBAGE_049_LIMIT_MARKER_B = 100

      object RateLimiter {
        def allow(key: String): Boolean = true
      }
    src/main/scala/com/app/util/CircuitBreaker.scala: |
      package com.app.util

      var GARBAGE_049_CB_MARKER_C = "closed"
      var GARBAGE_049_THRESH_MARKER_D = 5

      object CircuitBreaker {
        def isOpen: Boolean = false
      }
  changed_files:
    src/main/scala/com/app/http/Request.scala: |
      package com.app.http

      case class Request(
        method: String,
        path: String,
        headers: Map[String, String],
        body: Option[String] = None,
        queryParams: Map[String, String] = Map.empty
      )
  commit_message: "fix: add body and queryParams to HTTP Request model"
