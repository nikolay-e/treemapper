  changed_files:
    src/Shape.hs: |
      module Shape where

      class Measurable a where
        area :: a -> Double
        perimeter :: a -> Double
        describe :: a -> String

      data Circle = Circle { radius :: Double } deriving (Show)
      data Rectangle = Rectangle { width :: Double, height :: Double } deriving (Show)
      data Triangle = Triangle { sideA :: Double, sideB :: Double, sideC :: Double } deriving (Show)

      instance Measurable Circle where
        area c = pi * radius c ^ 2
        perimeter c = 2 * pi * radius c
        describe _ = "Circle"

      instance Measurable Rectangle where
        area r = width r * height r
        perimeter r = 2 * (width r + height r)
        describe _ = "Rectangle"

      instance Measurable Triangle where
        area t = let s = perimeter t / 2
                 in sqrt (s * (s - sideA t) * (s - sideB t) * (s - sideC t))
        perimeter t = sideA t + sideB t + sideC t
        describe _ = "Triangle"
    src/Renderer.hs: |
      module Renderer where
      import Shape (Measurable, area, perimeter, describe)

      renderStats :: Measurable a => a -> String
      renderStats shape =
        describe shape ++ " - Area: " ++ show (area shape) ++ ", Perimeter: " ++ show (perimeter shape)
    src/App.hs: |
      module App where
      import Renderer (renderStats)
      import Shape (Circle(..), Rectangle(..), Triangle(..))

      main :: IO ()
      main = do
        let c = Circle 5.0
        let r = Rectangle 3.0 4.0
        let t = Triangle 3.0 4.0 5.0
        putStrLn (renderStats c)
        putStrLn (renderStats r)
        putStrLn (renderStats t)
    garbage_db.hs: |
      module GarbageDb where
      GARBAGE_RARE_002_CONN_A = "postgres"
      GARBAGE_RARE_002_POOL_B = 10

      connectDb :: String -> IO ()
      connectDb _ = return ()

      GARBAGE_RARE_002_TIMEOUT_C = 30
    garbage_auth.hs: |
      module GarbageAuth where
      GARBAGE_RARE_002_TOKEN_D = "jwt"
      GARBAGE_RARE_002_SECRET_E = "hidden"

      authenticate :: String -> Bool
      authenticate _ = False

      GARBAGE_RARE_002_EXPIRE_F = 7200
