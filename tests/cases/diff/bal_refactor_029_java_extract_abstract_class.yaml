    src/main/java/com/app/export/TabularExporter.java: |
      package com.app.export;

      import java.util.List;
      import java.util.Map;

      public abstract class TabularExporter {
          private final String delimiter;

          protected TabularExporter(String delimiter) {
              this.delimiter = delimiter;
          }

          public String export(List<Map<String, String>> records, List<String> columns) {
              StringBuilder sb = new StringBuilder();
              sb.append(String.join(delimiter, columns)).append("\n");
              for (Map<String, String> record : records) {
                  for (int i = 0; i < columns.size(); i++) {
                      if (i > 0) sb.append(delimiter);
                      String val = record.getOrDefault(columns.get(i), "");
                      sb.append(sanitize(val));
                  }
                  sb.append("\n");
              }
              return sb.toString();
          }

          protected abstract String sanitize(String val);
      }
    src/main/java/com/app/export/CsvExporter.java: |
      package com.app.export;

      public class CsvExporter extends TabularExporter {
          public CsvExporter() {
              super(",");
          }

          @Override
          protected String sanitize(String val) {
              if (val.contains(",") || val.contains("\"")) {
                  return "\"" + val.replace("\"", "\"\"") + "\"";
              }
              return val;
          }
      }
    src/main/java/com/app/export/TsvExporter.java: |
      package com.app.export;

      public class TsvExporter extends TabularExporter {
          public TsvExporter() {
              super("\t");
          }

          @Override
          protected String sanitize(String val) {
              return val.replace("\t", " ").replace("\n", " ");
          }
      }
