    src/main/java/com/app/export/CsvExporter.java: |
      package com.app.export;

      import java.util.List;
      import java.util.Map;

      public class CsvExporter {
          public String export(List<Map<String, String>> records, List<String> columns) {
              StringBuilder sb = new StringBuilder();
              sb.append(String.join(",", columns)).append("\n");
              for (Map<String, String> record : records) {
                  for (int i = 0; i < columns.size(); i++) {
                      if (i > 0) sb.append(",");
                      String val = record.getOrDefault(columns.get(i), "");
                      sb.append(sanitize(val));
                  }
                  sb.append("\n");
              }
              return sb.toString();
          }

          private String sanitize(String val) {
              if (val.contains(",") || val.contains("\"")) {
                  return "\"" + val.replace("\"", "\"\"") + "\"";
              }
              return val;
          }
      }
    src/main/java/com/app/export/TsvExporter.java: |
      package com.app.export;

      import java.util.List;
      import java.util.Map;

      public class TsvExporter {
          public String export(List<Map<String, String>> records, List<String> columns) {
              StringBuilder sb = new StringBuilder();
              sb.append(String.join("\t", columns)).append("\n");
              for (Map<String, String> record : records) {
                  for (int i = 0; i < columns.size(); i++) {
                      if (i > 0) sb.append("\t");
                      String val = record.getOrDefault(columns.get(i), "");
                      sb.append(sanitize(val));
                  }
                  sb.append("\n");
              }
              return sb.toString();
          }

          private String sanitize(String val) {
              return val.replace("\t", " ").replace("\n", " ");
          }
      }
