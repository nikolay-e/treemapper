name: nim_004_include_directive
xfail:
  category: nim-include-discovery
repo:
  initial_files:
    src/helpers.nim: |
      template tryExcept*(body: untyped, handler: untyped): untyped =
        try:
          body
        except CatchableError as e:
          handler

      template benchmark*(name: string, body: untyped): untyped =
        let startTime = cpuTime()
        body
        let elapsed = cpuTime() - startTime
        echo name & " took " & $elapsed & "s"

      proc clamp*[T](value, minVal, maxVal: T): T =
        if value < minVal: minVal
        elif value > maxVal: maxVal
        else: value
    src/main.nim: |
      include "helpers"
      include "constants"
      import validators

      proc processItem(id: int) =
        let value = clamp(id, 1, 1000)
        benchmark("processItem"):
          echo "Processing item " & $value

      proc main() =
        for i in 1..MaxItems:
          processItem(i)

      when isMainModule:
        main()
    src/constants.nim: |
      const MaxItems* = 100
      const DefaultTimeout* = 30
      const AppVersion* = "1.0.0"

      let GARBAGE_NIM_004_A = "const_marker"
      let GARBAGE_NIM_004_B = "version_marker"
    src/validators.nim: |
      import strutils

      let GARBAGE_NIM_004_C = "validator_marker"
      let GARBAGE_NIM_004_D = "rule_marker"

      proc isValidEmail*(email: string): bool =
        email.contains("@") and email.contains(".")

      proc isValidPort*(port: int): bool =
        port > 0 and port <= 65535

      proc isNonEmpty*(s: string): bool =
        s.strip().len > 0
    src/macrohelpers.nim: |
      import macros

      let GARBAGE_NIM_004_E = "macro_marker"
      let GARBAGE_NIM_004_F = "ast_marker"

      template repeat*(count: int, body: untyped): untyped =
        for i in 0..<count:
          body

      template debugPrint*(msg: string): untyped =
        when defined(debug):
          echo "[DEBUG] " & msg

      macro generateEnum*(name: string, values: varargs[string]): untyped =
        result = nnkTypeSection.newTree()
  changed_files:
    src/helpers.nim: |
      template tryExcept*(body: untyped, handler: untyped): untyped =
        try:
          body
        except CatchableError as e:
          handler

      template benchmark*(name: string, body: untyped): untyped =
        let startTime = cpuTime()
        body
        let elapsed = cpuTime() - startTime
        echo name & " took " & $elapsed & "s"

      template withLogging*(procName: string, body: untyped): untyped =
        echo ">>> Entering " & procName
        body
        echo "<<< Exiting " & procName

      proc clamp*[T](value, minVal, maxVal: T): T =
        if value < minVal: minVal
        elif value > maxVal: maxVal
        else: value
    src/main.nim: |
      include "helpers"
      include "constants"
      import validators

      proc processItem(id: int) =
        let value = clamp(id, 1, 1000)
        withLogging("processItem"):
          benchmark("processItem"):
            echo "Processing item " & $value

      proc processAll() =
        withLogging("processAll"):
          for i in 1..MaxItems:
            processItem(i)

      proc main() =
        processAll()

      when isMainModule:
        main()
    src/constants.nim: |
      const MaxItems* = 100
      const DefaultTimeout* = 30
      const AppVersion* = "1.0.0"

      let GARBAGE_NIM_004_A = "const_marker"
      let GARBAGE_NIM_004_B = "version_marker"
    src/validators.nim: |
      import strutils

      let GARBAGE_NIM_004_C = "validator_marker"
      let GARBAGE_NIM_004_D = "rule_marker"

      proc isValidEmail*(email: string): bool =
        email.contains("@") and email.contains(".")

      proc isValidPort*(port: int): bool =
        port > 0 and port <= 65535

      proc isNonEmpty*(s: string): bool =
        s.strip().len > 0
    src/macrohelpers.nim: |
      import macros

      let GARBAGE_NIM_004_E = "macro_marker"
      let GARBAGE_NIM_004_F = "ast_marker"

      template repeat*(count: int, body: untyped): untyped =
        for i in 0..<count:
          body

      template debugPrint*(msg: string): untyped =
        when defined(debug):
          echo "[DEBUG] " & msg

      macro generateEnum*(name: string, values: varargs[string]): untyped =
        result = nnkTypeSection.newTree()
  commit_message: Update files
