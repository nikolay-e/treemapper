    path: config/notifications.yaml
- id: no_template_renderer
  selector:
    path: src/template_renderer.py
- id: no_global_0
  selector:
    anchor: firebase
- id: no_global_1
  selector:
    anchor: fcm-server-key
- id: no_global_2
  selector:
    anchor: TemplateRenderer
- id: no_global_3
