  commit_message: Update files
fragments:
- id: mailer
  selector:
    path: src/mailer.py
    anchor: smtplib.SMTP(self.host, self.port)
- id: mailer_1
  selector:
    path: src/mailer.py
    anchor: server.send_message(msg)
- id: no_notifications
