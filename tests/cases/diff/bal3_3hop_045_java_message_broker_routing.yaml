repo:
  initial_files:
    src/main/java/com/app/broker/Envelope.java: |
      package com.app.broker;

      public class Envelope {
          private String topic;
          private String payload;
          public Envelope(String topic, String payload) {
              this.topic = topic;
              this.payload = payload;
          }
          public String getTopic() { return topic; }
          public String getPayload() { return payload; }
      }
    src/main/java/com/app/broker/Router.java: |
      package com.app.broker;

      import java.util.HashMap;
      import java.util.Map;

      public class Router {
          private final Map<String, String> routes = new HashMap<>();
          public void register(String topic, String handler) {
              routes.put(topic, handler);
          }
          public String route(Envelope envelope) {
              return routes.getOrDefault(envelope.getTopic(), "default");
          }
      }
    src/main/java/com/app/broker/Broker.java: |
      package com.app.broker;

      public class Broker {
          private final Router router;
          public Broker(Router router) {
              this.router = router;
          }
          public String dispatch(Envelope envelope) {
              String handler = router.route(envelope);
              return "dispatched:" + handler;
          }
      }
    src/main/java/com/app/service/MessagingService.java: |
      package com.app.service;

      import com.app.broker.Broker;
      import com.app.broker.Envelope;

      public class MessagingService {
          private final Broker broker;
          public MessagingService(Broker broker) {
              this.broker = broker;
          }
          public String send(String topic, String payload) {
              return broker.dispatch(new Envelope(topic, payload));
          }
      }
    src/main/java/com/app/web/MessageController.java: |
      package com.app.web;

      import com.app.service.MessagingService;

      public class MessageController {
          private final MessagingService messagingService;
          public MessageController(MessagingService messagingService) {
              this.messagingService = messagingService;
          }
          public String publish(String topic, String body) {
              return messagingService.send(topic, body);
          }
      }
