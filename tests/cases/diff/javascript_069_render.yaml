    src/Greeting.test.tsx: |
      import { render, screen } from '@testing-library/react';
      import { Greeting } from './Greeting';

      describe('Greeting', () => {
          it('should display name', () => {
              render(<Greeting name="World" />);
              expect(screen.getByText('Hello, World!')).toBeInTheDocument();
          });
      });
