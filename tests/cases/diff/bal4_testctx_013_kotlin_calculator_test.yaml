repo:
  initial_files:
    src/main/kotlin/math/Calculator.kt: |
      package math

      class Calculator {
          fun add(a: Int, b: Int): Int = a + b

          fun subtract(a: Int, b: Int): Int = a - b
      }
    src/test/kotlin/math/CalculatorTest.kt: |
      package math

      import org.junit.jupiter.api.Test
      import org.junit.jupiter.api.Assertions.assertEquals

      class CalculatorTest {
          private val calc = Calculator()

          @Test
          fun testAdd() {
              assertEquals(5, calc.add(2, 3))
          }

          @Test
          fun testSubtract() {
              assertEquals(2, calc.subtract(5, 3))
          }
      }
    src/main/kotlin/format/Formatter.kt: |
      package format

      class Formatter {
          fun padLeft(s: String, width: Int): String = s.padStart(width)
      }
