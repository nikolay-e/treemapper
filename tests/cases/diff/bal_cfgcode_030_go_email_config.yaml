name: bal_cfgcode_030_go_email_config
tags:
- lang:go
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/email.yaml: |
      smtp:
        host: localhost
        port: 1025
        from: dev@localhost
      templates:
        welcome: "Hello {name}"
        reset: "Reset link: {link}"
    internal/email/mailer.go: |
      package email

      import (
        "os"

        "gopkg.in/yaml.v3"
      )

      type EmailConfig struct {
        SMTP struct {
          Host string `yaml:"host"`
          Port int    `yaml:"port"`
          From string `yaml:"from"`
        } `yaml:"smtp"`
        Templates map[string]string `yaml:"templates"`
      }

      func LoadEmailConfig() (*EmailConfig, error) {
        data, err := os.ReadFile("config/email.yaml")
        if err != nil {
          return nil, err
        }
        var cfg EmailConfig
        yaml.Unmarshal(data, &cfg)
        return &cfg, nil
      }

      func (c *EmailConfig) Send(to string, templateName string) string {
        tpl := c.Templates[templateName]
        return c.SMTP.From + " -> " + to + ": " + tpl
      }
    internal/notification/notify.go: |
      package notification

      import (
        "os"

        "gopkg.in/yaml.v3"
      )

      type mailCfg struct {
        SMTP struct {
          From string `yaml:"from"`
        } `yaml:"smtp"`
      }

      func DefaultSender() string {
        data, _ := os.ReadFile("config/email.yaml")
        var cfg mailCfg
        yaml.Unmarshal(data, &cfg)
        return cfg.SMTP.From
      }
    internal/billing/invoice.go: |
      package billing

      var GARBAGE_CFGCODE_030_BILL_A = "stripe"
      var GARBAGE_CFGCODE_030_BILL_B = "usd"

      func CreateInvoice(amount int) string {
        return "invoice"
      }
    internal/analytics/tracker.go: |
      package analytics

      var GARBAGE_CFGCODE_030_TRACK_C = "mixpanel"
      var GARBAGE_CFGCODE_030_TRACK_D = false

      func Track(event string) {}
  changed_files:
    config/email.yaml: |
      smtp:
        host: smtp.sendgrid.net
        port: 465
        from: hello@example.com
        use_tls: true
      templates:
        welcome: "Welcome aboard, {name}! Get started: {link}"
        reset: "Reset link: {link}"
        invoice: "Invoice #{id} for ${amount}"
      rate_limit_per_minute: 100
    internal/email/mailer.go: |
