name: go_017_variadic_function
tags:
- lang:go
- change:single_file
- change:new_function
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    internal/logging/logger.go: |
      package logging

      import (
          "fmt"
          "log"
          "time"
      )

      type Level int

      const (
          DEBUG Level = iota
          INFO
          WARN
          ERROR
      )

      type Logger struct {
          level  Level
          prefix string
      }

      func NewLogger(prefix string, level Level) *Logger {
          return &Logger{prefix: prefix, level: level}
      }

      func (l *Logger) Log(level Level, format string, args ...interface{}) {
          if level < l.level {
              return
          }
          msg := fmt.Sprintf(format, args...)
          log.Printf("[%s] %s: %s", levelName(level), l.prefix, msg)
      }

      func levelName(level Level) string {
          switch level {
          case DEBUG:
              return "DEBUG"
          case INFO:
              return "INFO"
          case WARN:
              return "WARN"
          case ERROR:
              return "ERROR"
          }
          return "UNKNOWN"
      }
    internal/app/application.go: |
      package app

      import "myproject/internal/logging"

      type Application struct {
          logger *logging.Logger
      }

      func NewApplication(logger *logging.Logger) *Application {
          return &Application{logger: logger}
      }

      func (a *Application) Run() {
          a.logger.Log(logging.INFO, "Application started")
      }
    internal/app/version.go: |
      package app

      import "fmt"

      var (
          BuildVersion = "dev"
          BuildTime    = "unknown"
          GitCommit    = "none"
      )

      func VersionString() string {
          return fmt.Sprintf("%s (built %s, commit %s)", BuildVersion, BuildTime, GitCommit)
      }
