  changed_files:
    src/main/scala/codec/JsonCodec.scala: |
      package codec

      trait JsonCodec[T] {
        def encode(value: T, pretty: Boolean = false): String
        def decode(json: String, strict: Boolean = true): T
      }

      object JsonCodec {
        def stringCodec: JsonCodec[String] = new JsonCodec[String] {
          def encode(value: String, pretty: Boolean = false): String = {
            val encoded = s""""$value""""
            if (pretty) s"{\n  \"value\": $encoded\n}" else encoded
          }

          def decode(json: String, strict: Boolean = true): String = {
            val stripped = json.stripPrefix("\"").stripSuffix("\"")
            if (strict && stripped.isEmpty) throw new IllegalArgumentException("Empty value")
            stripped
          }
        }

        def intCodec: JsonCodec[Int] = new JsonCodec[Int] {
          def encode(value: Int, pretty: Boolean = false): String = value.toString
          def decode(json: String, strict: Boolean = true): Int = json.trim.toInt
        }
      }
  commit_message: "Add pretty print, strict mode, and int codec to JsonCodec"
