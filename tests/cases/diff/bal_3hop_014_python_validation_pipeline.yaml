  changed_files:
    validation/rule.py: |
      import re
      class ValidationRule:
          def __init__(self, field: str, rule_type: str, pattern: str = ""):
              self.field = field
              self.rule_type = rule_type
              self.pattern = pattern
          def check(self, value) -> bool:
              if self.rule_type == "required":
                  return value is not None and value != ""
              if self.rule_type == "positive":
                  return isinstance(value, (int, float)) and value > 0
              if self.rule_type == "pattern":
                  return bool(re.match(self.pattern, str(value)))
              if self.rule_type == "max_length":
                  return len(str(value)) <= int(self.pattern)
              return True
