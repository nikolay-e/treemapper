repo:
  initial_files:
    validation/rule.py: |
      class ValidationRule:
          def __init__(self, field: str, rule_type: str):
              self.field = field
              self.rule_type = rule_type
          def check(self, value) -> bool:
              if self.rule_type == "required":
                  return value is not None and value != ""
              if self.rule_type == "positive":
                  return isinstance(value, (int, float)) and value > 0
              return True
    validation/validator.py: |
      from validation.rule import ValidationRule
      class Validator:
          def __init__(self):
              self.rules: list[ValidationRule] = []
          def add_rule(self, field: str, rule_type: str):
              self.rules.append(ValidationRule(field, rule_type))
          def validate(self, data: dict) -> list[str]:
              errors = []
              for rule in self.rules:
                  value = data.get(rule.field)
                  if not rule.check(value):
                      errors.append(f"{rule.field}: failed {rule.rule_type}")
              return errors
    validation/form.py: |
      from validation.validator import Validator
      class FormValidator:
          def __init__(self, schema: dict[str, list[str]]):
              self.validator = Validator()
              for field, rules in schema.items():
                  for rule_type in rules:
                      self.validator.add_rule(field, rule_type)
          def validate_form(self, data: dict) -> dict:
              errors = self.validator.validate(data)
              return {"valid": len(errors) == 0, "errors": errors}
    api/form_handler.py: |
      from validation.form import FormValidator
      user_schema = {"name": ["required"], "age": ["required", "positive"]}
      form_validator = FormValidator(user_schema)
      def handle_registration(data: dict) -> dict:
          result = form_validator.validate_form(data)
          if result["valid"]:
              return {"status": "ok", "message": "Registration successful"}
          return {"status": "error", "errors": result["errors"]}
