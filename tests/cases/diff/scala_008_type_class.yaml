    src/main/java/com/api/ratelimit/RateLimiter.java: |
      package com.api.ratelimit;

      import java.time.Instant;
      import java.util.concurrent.ConcurrentHashMap;
      import java.util.concurrent.atomic.AtomicInteger;

      public class RateLimiter {
          private final int maxRequests;
          private final long windowSeconds;
          private final ConcurrentHashMap<String, WindowState> states = new ConcurrentHashMap<>();

          public RateLimiter(int maxRequests, long windowSeconds) {
              this.maxRequests = maxRequests;
              this.windowSeconds = windowSeconds;
          }

          public boolean allowRequest(String clientId) {
              long now = Instant.now().getEpochSecond();
              WindowState state = states.computeIfAbsent(clientId, k -> new WindowState(now));
              synchronized (state) {
                  if (now - state.windowStart >= windowSeconds) {
                      state.windowStart = now;
                      state.count.set(0);
                  }
                  return state.count.incrementAndGet() <= maxRequests;
              }
          }

          public RateLimitStatus getStatus(String clientId) {
              WindowState state = states.get(clientId);
              if (state == null) {
                  return new RateLimitStatus(maxRequests, 0, windowSeconds);
              }
              synchronized (state) {
                  int used = state.count.get();
                  int remaining = Math.max(0, maxRequests - used);
                  return new RateLimitStatus(maxRequests, remaining, windowSeconds);
              }
          }

          public void resetClient(String clientId) {
              states.remove(clientId);
          }

          private static class WindowState {
              long windowStart;
              AtomicInteger count = new AtomicInteger(0);
              WindowState(long start) { this.windowStart = start; }
          }
      }
