name: scala_008_type_class
repo:
  initial_files:
    Show.scala: |
      trait Show[A] {
        def show(a: A): String
      }

      object Show {
        def apply[A](implicit sh: Show[A]): Show[A] = sh

        implicit val intShow: Show[Int] = (a: Int) => a.toString
        implicit val stringShow: Show[String] = (a: String) => a
      }
    Printer.scala: |
      class Printer {}
    Eq.scala: |
      trait Eq[A] {
        def eqv(a: A, b: A): Boolean
      }

      object Eq {
        def apply[A](implicit ev: Eq[A]): Eq[A] = ev

        implicit val intEq: Eq[Int] = (a: Int, b: Int) => a == b
        implicit val stringEq: Eq[String] = (a: String, b: String) => a == b

        def isEqual[A: Eq](a: A, b: A): Boolean = Eq[A].eqv(a, b)
      }
    Formatter.scala: |
      class Formatter {
        def formatInt(value: Int): String = s"Integer: $value"
        def formatString(value: String): String = s"String: '$value'"
        def formatDouble(value: Double): String = f"Double: $value%.2f"
        def formatBoolean(value: Boolean): String = if (value) "yes" else "no"
      }
  changed_files:
    Show.scala: |
      trait Show[A] {
        def show(a: A): String
      }

      object Show {
        def apply[A](implicit sh: Show[A]): Show[A] = sh

        implicit val intShow: Show[Int] = (a: Int) => a.toString
        implicit val stringShow: Show[String] = (a: String) => a
      }
    Printer.scala: |
      class Printer {
        def print[A: Show](value: A): String = {
          Show[A].show(value)
        }

        def printInt(value: Int): String = {
          print(value)
        }

        def printString(value: String): String = {
          print(value)
        }
      }
    Eq.scala: |
      trait Eq[A] {
        def eqv(a: A, b: A): Boolean
      }

      object Eq {
        def apply[A](implicit ev: Eq[A]): Eq[A] = ev

        implicit val intEq: Eq[Int] = (a: Int, b: Int) => a == b
        implicit val stringEq: Eq[String] = (a: String, b: String) => a == b

        def isEqual[A: Eq](a: A, b: A): Boolean = Eq[A].eqv(a, b)
      }
    Formatter.scala: |
      class Formatter {
        def formatInt(value: Int): String = s"Integer: $value"
        def formatString(value: String): String = s"String: '$value'"
        def formatDouble(value: Double): String = f"Double: $value%.2f"
        def formatBoolean(value: Boolean): String = if (value) "yes" else "no"
      }
