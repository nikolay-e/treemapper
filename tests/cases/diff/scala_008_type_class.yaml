    src/test/java/com/api/ratelimit/RateLimiterTest.java: |
      package com.api.ratelimit;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      class RateLimiterTest {
          @Test
          void allowRequest_withinLimit_returnsTrue() {
              RateLimiter limiter = new RateLimiter(5, 60);
              for (int i = 0; i < 5; i++) {
                  assertTrue(limiter.allowRequest("client1"));
              }
          }

          @Test
          void allowRequest_exceedsLimit_returnsFalse() {
              RateLimiter limiter = new RateLimiter(2, 60);
              limiter.allowRequest("client1");
              limiter.allowRequest("client1");
              assertFalse(limiter.allowRequest("client1"));
          }

          @Test
          void allowRequest_differentClients_independentCounters() {
              RateLimiter limiter = new RateLimiter(1, 60);
              assertTrue(limiter.allowRequest("clientA"));
              assertTrue(limiter.allowRequest("clientB"));
              assertFalse(limiter.allowRequest("clientA"));
          }

          @Test
          void getStatus_afterRequests_returnsCorrectRemaining() {
              RateLimiter limiter = new RateLimiter(10, 60);
              limiter.allowRequest("client1");
              limiter.allowRequest("client1");
              limiter.allowRequest("client1");
              RateLimitStatus status = limiter.getStatus("client1");
              assertEquals(10, status.getLimit());
              assertEquals(7, status.getRemaining());
          }

          @Test
          void resetClient_clearsState() {
              RateLimiter limiter = new RateLimiter(1, 60);
              limiter.allowRequest("client1");
              assertFalse(limiter.allowRequest("client1"));
              limiter.resetClient("client1");
              assertTrue(limiter.allowRequest("client1"));
          }
      }
