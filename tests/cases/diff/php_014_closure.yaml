repo:
  initial_files:
    src/Math/Multiplier.php: |
      <?php
      namespace App\Math;

      class Multiplier {
          public function __construct(private readonly int $factor) {}

          public function getFactor(): int {
              return $this->factor;
          }

          public function apply(int $value): int {
              return $value * $this->factor;
          }

          public function isIdentity(): bool {
              return $this->factor === 1;
          }
      }
    src/Collections/Collection.php: |
      <?php
      namespace App\Collections;

      class Collection {
          private array $items;

          public function __construct(array $items = []) {
              $this->items = $items;
          }

          public function toArray(): array {
              return $this->items;
          }

          public function count(): int {
              return count($this->items);
          }
      }
    src/Collections/Sorter.php: |
      <?php
      namespace App\Collections;

      class Sorter {
          public function sortBy(array $items, callable $comparator): array {
              usort($items, $comparator);
              return $items;
          }

          public function sortDescending(array $items): array {
              return $this->sortBy($items, function(int $a, int $b): int {
                  return $b - $a;
              });
          }

          public function sortAscending(array $items): array {
              return $this->sortBy($items, function(int $a, int $b): int {
                  return $a - $b;
              });
          }

          public function toArray(): array {
              return [];
          }
      }
    src/Collections/Reducer.php: |
      <?php
      namespace App\Collections;

      class Reducer {
          private array $items;

          public function __construct(array $items = []) {
              $this->items = $items;
          }

          public function reduce(callable $callback, mixed $initial = null): mixed {
              return array_reduce($this->items, $callback, $initial);
          }

          public function sum(): int {
              return $this->reduce(function(int $carry, int $item): int {
                  return $carry + $item;
              }, 0);
          }

          public function average(): float {
              $count = count($this->items);
              return $count > 0 ? $this->sum() / $count : 0.0;
          }
      }
    src/Math/Calculator.php: |
      <?php
      namespace App\Math;

      class Calculator {
          public function add(int $a, int $b): int {
              return $a + $b;
          }

          public function multiply(int $a, int $b): int {
              return $a * $b;
          }

          public function divide(int $a, int $b): float {
              if ($b === 0) {
                  throw new \DivisionByZeroError("Cannot divide by zero");
              }
              return $a / $b;
          }
      }
    src/Collections/Pipeline.php: |
      <?php
      namespace App\Collections;

      class Pipeline {
          private array $stages = [];

          public function map(callable $fn): self {
              $this->stages[] = ['type' => 'map', 'fn' => $fn];
              return $this;
          }

          public function filter(callable $fn): self {
              $this->stages[] = ['type' => 'filter', 'fn' => $fn];
              return $this;
          }

          public function execute(array $data): array {
              foreach ($this->stages as $stage) {
                  $data = match($stage['type']) {
                      'map' => array_map($stage['fn'], $data),
                      'filter' => array_values(array_filter($data, $stage['fn'])),
                  };
              }
              return $data;
          }
      }
    src/Math/Statistics.php: |
      <?php
      namespace App\Math;

      class Statistics {
          public function average(array $values): float {
              return count($values) > 0 ? array_sum($values) / count($values) : 0.0;
          }

          public function sum(array $values): int|float {
              return array_sum($values);
          }

          public function median(array $values): float {
              sort($values);
              $count = count($values);
              $mid = intdiv($count, 2);
              return $count % 2 === 0
                  ? ($values[$mid - 1] + $values[$mid]) / 2
                  : $values[$mid];
          }
      }
