repo:
  initial_files:
    result.ts: |
      export type Success<T> = { success: true; data: T };
      export type Failure = { success: false; error: string };
    handler.ts: |
      console.log('initial');
    result-factory.ts: |
      import { Success, Failure } from './result';

      export function ok<T>(data: T): Success<T> {
          return { success: true, data };
      }

      export function fail(error: string): Failure {
          return { success: false, error };
      }
    result-logger.ts: |
      import { Success, Failure } from './result';

      type AnyResult = Success<unknown> | Failure;

      export function logResult(result: AnyResult): void {
          if (result.success) {
              console.log('[OK]', result.data);
          } else {
              console.error('[FAIL]', result.error);
          }
      }
    either.ts: |
      export type Left<E> = { tag: 'left'; error: E };
      export type Right<T> = { tag: 'right'; value: T };
      export type Either<E, T> = Left<E> | Right<T>;

      export function mapEither<E, A, B>(either: Either<E, A>, fn: (a: A) => B): Either<E, B> {
          return either.tag === 'right' ? { tag: 'right', value: fn(either.value) } : either;
      }
  changed_files:
    result.ts: |
      export type Success<T> = { success: true; data: T };
      export type Failure = { success: false; error: string };
    handler.ts: |
      import { Success, Failure } from './result';

      type Result<T> = Success<T> | Failure;

      function handleResult<T>(result: Result<T>) {
          if (result.success) {
              return result.data;
          }
          throw new Error(result.error);
      }
    result-factory.ts: |
      import { Success, Failure } from './result';

      export function ok<T>(data: T): Success<T> {
          return { success: true, data };
      }

      export function fail(error: string): Failure {
          return { success: false, error };
      }
    result-logger.ts: |
      import { Success, Failure } from './result';

      type AnyResult = Success<unknown> | Failure;

      export function logResult(result: AnyResult): void {
          if (result.success) {
              console.log('[OK]', result.data);
          } else {
              console.error('[FAIL]', result.error);
          }
      }
    either.ts: |
      export type Left<E> = { tag: 'left'; error: E };
      export type Right<T> = { tag: 'right'; value: T };
      export type Either<E, T> = Left<E> | Right<T>;

      export function mapEither<E, A, B>(either: Either<E, A>, fn: (a: A) => B): Either<E, B> {
          return either.tag === 'right' ? { tag: 'right', value: fn(either.value) } : either;
      }
  commit_message: Update files
