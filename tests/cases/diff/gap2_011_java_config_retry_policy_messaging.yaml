    src/main/java/com/healthcare/config/MessagingConfig.java: |
      package com.healthcare.config;

      import java.io.InputStream;
      import java.util.Properties;

      public class MessagingConfig {
          private final Properties props;

          public MessagingConfig() {
              this.props = new Properties();
              try (InputStream is = getClass().getClassLoader()
                      .getResourceAsStream("messaging.properties")) {
                  props.load(is);
              } catch (Exception e) {
                  throw new RuntimeException(e);
              }
          }

          public int getMaxRetryAttempts() {
              return Integer.parseInt(props.getProperty("messaging.retry.maxAttempts", "3"));
          }

          public long getBackoffMs() {
              return Long.parseLong(props.getProperty("messaging.retry.backoffMs", "1000"));
          }

          public double getMultiplier() {
              return Double.parseDouble(props.getProperty("messaging.retry.multiplier", "2.0"));
          }
      }
    src/main/java/com/healthcare/messaging/RetryHandler.java: |
      package com.healthcare.messaging;

      import com.healthcare.config.MessagingConfig;

      public class RetryHandler {
          private final int maxAttempts;
          private final long initialBackoff;
          private final double multiplier;

          public RetryHandler(MessagingConfig config) {
              this.maxAttempts = config.getMaxRetryAttempts();
              this.initialBackoff = config.getBackoffMs();
              this.multiplier = config.getMultiplier();
          }

          public boolean shouldRetry(int attempt) {
              return attempt < maxAttempts;
          }

          public long delayForAttempt(int attempt) {
              return (long) (initialBackoff * Math.pow(multiplier, attempt));
          }
      }
    src/main/java/com/healthcare/messaging/PatientAlertPublisher.java: |
      package com.healthcare.messaging;

      public class PatientAlertPublisher {
          private final RetryHandler retryHandler;

          public PatientAlertPublisher(RetryHandler retryHandler) {
              this.retryHandler = retryHandler;
          }

          public boolean publish(String alertJson) {
              int attempt = 0;
              while (retryHandler.shouldRetry(attempt)) {
                  attempt++;
              }
              return false;
          }
      }
    src/main/java/com/healthcare/model/PatientRecord.java: |
      package com.healthcare.model;

      public class PatientRecord {
          private final String patientId;
          private final String name;
          private final int age;

          public PatientRecord(String patientId, String name, int age) {
              this.patientId = patientId;
              this.name = name;
              this.age = age;
