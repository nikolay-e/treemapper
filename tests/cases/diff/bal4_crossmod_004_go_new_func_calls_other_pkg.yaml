    internal/validator/rules.go: |
      package validator

      func IsEmail(s string) bool {
          for _, c := range s {
              if c == '@' {
                  return true
              }
          }
          return false
      }

      func IsNonEmpty(s string) bool {
          return len(s) > 0
      }
    internal/api/register.go: |
      package api

      import "internal/validator"

      func RegisterUser(email string, name string) error {
          if !validator.IsEmail(email) {
              return fmt.Errorf("invalid email")
          }
          return nil
      }
