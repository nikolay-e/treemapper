      var GARBAGE_004_METRIC_C = "requests"
      var GARBAGE_004_LABEL_D = "handler"

      func Inc(name string) {}
    garbage_server.go: |
      package server

      var GARBAGE_004_HOST_E = "0.0.0.0"
      var GARBAGE_004_PORT_F = 8080

      func Start() {}
  commit_message: "add name validation and UpdateEmail handler"
