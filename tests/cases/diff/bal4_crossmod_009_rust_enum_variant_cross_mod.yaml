repo:
  initial_files:
    src/types/status.rs: |
      pub enum Status {
          Active,
          Inactive,
      }

      impl Status {
          pub fn as_str(&self) -> &str {
              match self {
                  Status::Active => "active",
                  Status::Inactive => "inactive",
              }
          }
      }
    src/services/account.rs: |
      use crate::types::status::Status;

      pub fn activate(current: &Status) -> Status {
          match current {
              Status::Inactive => Status::Active,
              _ => Status::Active,
          }
      }
    src/db/pool.rs: |
      pub const GARBAGE_009_POOL_A: u32 = 5;
