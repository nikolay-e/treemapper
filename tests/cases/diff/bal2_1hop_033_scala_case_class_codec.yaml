name: bal2_1hop_033_scala_case_class_codec
tags:
- lang:scala
- change:multi_file
- context:import_chain
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    src/main/scala/model/User.scala: |
      package model

      case class User(id: String, name: String, email: String)
    src/main/scala/codec/UserCodec.scala: |
      package codec

      import model.User
      import io.circe._
      import io.circe.generic.semiauto._

      object UserCodec {
        implicit val userEncoder: Encoder[User] = deriveEncoder[User]
        implicit val userDecoder: Decoder[User] = deriveDecoder[User]
      }
    src/main/scala/api/UserEndpoint.scala: |
      package api

      import model.User
      import codec.UserCodec._

      class UserEndpoint {
        def getUser(id: String): User = User(id, "Alice", "alice@example.com")
        def encodeUser(u: User): String = userEncoder(u).noSpaces
      }
    src/main/scala/repo/UserRepo.scala: |
      package repo

      import model.User

      class UserRepo {
        private var users: Map[String, User] = Map.empty
        def save(u: User): Unit = users += (u.id -> u)
        def find(id: String): Option[User] = users.get(id)
      }
    src/main/scala/notification/Mailer.scala: |
      package notification

      GARBAGE_033_MAILER_A = "mailer"

      class Mailer(smtpHost: String) {
        def send(to: String, subject: String, body: String): Unit = ()
      }
    src/main/scala/cache/RedisClient.scala: |
      package cache

      GARBAGE_033_REDIS_B = "redis"

      class RedisClient(host: String) {
        def get(key: String): Option[String] = None
        def set(key: String, value: String): Unit = ()
      }
    src/main/scala/scheduler/CronJob.scala: |
      package scheduler

      GARBAGE_033_CRON_C = "cron"

      trait CronJob {
        def schedule: String
        def execute(): Unit
      }
  changed_files:
    src/main/scala/model/User.scala: |
      package model

      case class User(id: String, name: String, email: String, role: String, active: Boolean)
    src/main/scala/codec/UserCodec.scala: |
      package codec

      import model.User
      import io.circe._
      import io.circe.generic.semiauto._

      object UserCodec {
        implicit val userEncoder: Encoder[User] = deriveEncoder[User]
        implicit val userDecoder: Decoder[User] = deriveDecoder[User]

        def withDefaults(json: Json): Json = {
          json.mapObject(obj =>
            obj.add("role", obj("role").getOrElse(Json.fromString("viewer")))
              .add("active", obj("active").getOrElse(Json.fromBoolean(true)))
          )
        }
      }
  commit_message: "feat: add role and active fields to User with codec defaults"
