      import logging
      from typing import Dict, List, Optional
      from dataclasses import dataclass, field

      logger = logging.getLogger(__name__)

      @dataclass
      class User:
          user_id: str
          email: str
          display_name: str
          is_active: bool = True
          roles: List[str] = field(default_factory=list)

      class UserService:
          def __init__(self, db_connection):
              self._db = db_connection
              self._cache: Dict[str, User] = {}

          def find_by_id(self, user_id: str) -> Optional[User]:
              if user_id in self._cache:
                  return self._cache[user_id]
              row = self._db.query("SELECT * FROM users WHERE id = %s", user_id)
              if row is None:
                  return None
              user = User(user_id=row["id"], email=row["email"], display_name=row["name"])
              self._cache[user_id] = user
              return user

          def update_email(self, user_id: str, new_email: str) -> bool:
              user = self.find_by_id(user_id)
              if user is None:
                  return False
              self._db.execute("UPDATE users SET email = %s WHERE id = %s", new_email, user_id)
              user.email = new_email
              return True
    src/role_manager.py: |
      from typing import Dict, Set

      ADMIN_ROLE = "admin"
      VIEWER_ROLE = "viewer"
      EDITOR_ROLE = "editor"

      class RoleManager:
          def __init__(self):
              self._user_roles: Dict[str, Set[str]] = {}

          def assign_role(self, user_id: str, role: str) -> None:
              if user_id not in self._user_roles:
                  self._user_roles[user_id] = set()
              self._user_roles[user_id].add(role)

          def has_role(self, user_id: str, role: str) -> bool:
              return role in self._user_roles.get(user_id, set())

          def revoke_role(self, user_id: str, role: str) -> bool:
              roles = self._user_roles.get(user_id, set())
              if role in roles:
                  roles.discard(role)
                  return True
              return False
    src/session_tracker.py: |
      from datetime import datetime, timedelta
      from typing import Dict, Optional

      SESSION_TTL = timedelta(hours=8)

      class SessionTracker:
          def __init__(self, ttl: timedelta = SESSION_TTL):
              self.ttl = ttl
              self._sessions: Dict[str, datetime] = {}

          def create_session(self, user_id: str) -> str:
              session_id = f"sess_{user_id}_{datetime.utcnow().timestamp()}"
              self._sessions[session_id] = datetime.utcnow()
              return session_id

          def is_active(self, session_id: str) -> bool:
              created = self._sessions.get(session_id)
              if created is None:
                  return False
              return datetime.utcnow() - created < self.ttl
