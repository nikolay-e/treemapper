name: csharp_023_property_pattern
tags:
- lang:sql
- change:single_file
- context:cross_module
- distance:0hop
- difficulty:medium
repo:
  initial_files:
    db/schema.sql: |
      CREATE TABLE orders (
          id SERIAL PRIMARY KEY,
          customer_id INTEGER NOT NULL REFERENCES customers(id),
          status VARCHAR(20) NOT NULL DEFAULT 'pending',
          total_amount NUMERIC(12, 2) NOT NULL,
          created_at TIMESTAMP NOT NULL DEFAULT NOW()
      );

      CREATE TABLE order_items (
          id SERIAL PRIMARY KEY,
          order_id INTEGER NOT NULL REFERENCES orders(id) ON DELETE CASCADE,
          product_id INTEGER NOT NULL,
          quantity INTEGER NOT NULL CHECK (quantity > 0),
          unit_price NUMERIC(10, 2) NOT NULL
      );
    src/orders/order_repo.py: |
      def get_order(conn, order_id: int) -> dict | None:
          cur = conn.cursor()
          cur.execute(
              "SELECT id, customer_id, status, total_amount FROM orders WHERE id = %s",
              (order_id,)
          )
          row = cur.fetchone()
          if row is None:
              return None
          return {"id": row[0], "customer_id": row[1], "status": row[2], "total": row[3]}
    src/orders/item_repo.py: |
      def get_order_items(conn, order_id: int) -> list:
          cur = conn.cursor()
          cur.execute(
              "SELECT id, product_id, quantity, unit_price FROM order_items WHERE order_id = %s",
              (order_id,)
          )
          return cur.fetchall()
    garbage/shipping.py: |
      GARBAGE_CS023_SHIP_A = "shipping_marker"


      def calculate_shipping(weight: float) -> float:
          return weight * 0.5
    garbage/tax.py: |
      GARBAGE_CS023_TAX_B = "tax_marker"


      def calculate_tax(amount: float, rate: float) -> float:
          return amount * rate
    garbage/coupon.py: |
      GARBAGE_CS023_COUPON_C = "coupon_marker"


      def apply_coupon(total: float, code: str) -> float:
          return total
