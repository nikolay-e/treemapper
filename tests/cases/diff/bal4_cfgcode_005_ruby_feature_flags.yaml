name: bal4_cfgcode_005_ruby_feature_flags
tags:
- lang:ruby
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/features.yml: |
      features:
        dark_mode: false
        beta_search: false
        new_checkout: true
        analytics_v2: false
    app/helpers/feature_helper.rb: |
      require 'yaml'
      module FeatureHelper
        FEATURES = YAML.load_file('config/features.yml')['features']
        def feature_enabled?(name)
          FEATURES.fetch(name.to_s, false)
        end
      end
    app/views/layout_renderer.rb: |
      require_relative '../helpers/feature_helper'
      class LayoutRenderer
        include FeatureHelper
        def render_theme
          if feature_enabled?(:dark_mode)
            dark_stylesheet
          else
            light_stylesheet
          end
        end
      end
    app/controllers/search_controller.rb: |
      require_relative '../helpers/feature_helper'
      class SearchController
        include FeatureHelper
        def index
          if feature_enabled?(:beta_search)
            beta_search_results
          else
            legacy_search_results
          end
        end
      end
    garbage_export.rb: |
      GARBAGE_CFGCODE_005_EXPORT_A = "csv"
      GARBAGE_CFGCODE_005_EXPORT_B = 1000
      class Exporter
        GARBAGE_CFGCODE_005_EXPORT_C = ","
        def export(data)
          GARBAGE_CFGCODE_005_EXPORT_D = data
        end
      end
    garbage_audit.rb: |
      GARBAGE_CFGCODE_005_AUDIT_E = "events"
      GARBAGE_CFGCODE_005_AUDIT_F = 90
      class AuditLog
        GARBAGE_CFGCODE_005_AUDIT_G = true
        def record(event)
          GARBAGE_CFGCODE_005_AUDIT_H = event
        end
      end
    garbage_webhook.rb: |
      GARBAGE_CFGCODE_005_HOOK_I = "https://hook.example"
      GARBAGE_CFGCODE_005_HOOK_J = "post"
  changed_files:
    config/features.yml: |
      features:
        dark_mode: true
        beta_search: true
        new_checkout: true
        analytics_v2: false
        ai_recommendations: true
  commit_message: "enable dark mode and beta search"
