# Scenario: config.json gains a "features" array; config.rs adds get_features()
# to parse it via include_str!. The data file and its consumer are tightly coupled.
#
# Diff: data/config.json adds "features" field; src/config.rs adds get_features()
# that reads config["features"] as an array.
#
# Reviewer questions:
#   Q1: "Does get_features() correctly parse the new JSON shape?" ->
#        data/config.json (CHANGED) and src/config.rs (CHANGED) together show the
#        contract: the array is string-typed and get_features returns Vec<String>.
#   Q2: "Do existing consumers still work with the changed JSON?" ->
#        src/config.rs (CHANGED) — get_app_name() and get_version() are unchanged.
#
# Trap files (plausible but no dependency on config.json / config.rs):
#   - src/env.rs: reads environment variables for runtime config (PORT, LOG_LEVEL).
#     Same "configuration" domain but no include_str! / JSON dependency.
#   - src/feature_flags.rs: compile-time feature flag checks using cfg attributes.
#     Shares "features" vocabulary but is completely unrelated to JSON config.

max_enrichment: 7.6
initial:
  data/config.json: |
    {"name": "app", "version": "1.0"}
  src/lib.rs: |
    pub mod config;
    pub mod env;
    pub mod feature_flags;
  src/config.rs: |
    const CONFIG_JSON: &str = include_str!("../data/config.json");

    pub fn get_config() -> serde_json::Value {
        serde_json::from_str(CONFIG_JSON).unwrap()
    }

    pub fn get_app_name() -> String {
        let config = get_config();
        config["name"].as_str().unwrap_or("unknown").to_string()
    }

    pub fn get_version() -> String {
        let config = get_config();
        config["version"].as_str().unwrap_or("0.0.0").to_string()
    }
  src/env.rs: |
    use std::env;

    pub struct EnvConfig {
        pub port: u16,
        pub log_level: String,
        pub debug_mode: bool,
    }

    impl EnvConfig {
        pub fn from_env() -> Self {
            Self {
                port: env::var("PORT")
                    .ok()
                    .and_then(|p| p.parse().ok())
                    .unwrap_or(8080),
                log_level: env::var("LOG_LEVEL").unwrap_or_else(|_| "info".to_string()),
                debug_mode: env::var("DEBUG").is_ok(),
            }
        }

        pub fn is_production(&self) -> bool {
            self.log_level == "error" && !self.debug_mode
        }
    }
  src/feature_flags.rs: |
    pub struct FeatureSet {
        enabled: Vec<String>,
    }

    impl FeatureSet {
        pub fn new() -> Self {
            let mut enabled = Vec::new();
            #[cfg(feature = "auth")]
            enabled.push("auth".to_string());
            #[cfg(feature = "api")]
            enabled.push("api".to_string());
            Self { enabled }
        }

        pub fn is_enabled(&self, feature: &str) -> bool {
            self.enabled.iter().any(|f| f == feature)
        }

        pub fn list_features(&self) -> &[String] {
            &self.enabled
        }
    }

changed:
  data/config.json: |
    {"name": "app", "version": "2.0", "features": ["auth", "api"]}
  src/lib.rs: |
    pub mod config;
    pub mod env;
    pub mod feature_flags;
  src/config.rs: |
    const CONFIG_JSON: &str = include_str!("../data/config.json");

    pub fn get_config() -> serde_json::Value {
        serde_json::from_str(CONFIG_JSON).unwrap()
    }

    pub fn get_app_name() -> String {
        let config = get_config();
        config["name"].as_str().unwrap_or("unknown").to_string()
    }

    pub fn get_version() -> String {
        let config = get_config();
        config["version"].as_str().unwrap_or("0.0.0").to_string()
    }

    pub fn get_features() -> Vec<String> {
        let config = get_config();
        config["features"]
            .as_array()
            .map(|arr| {
                arr.iter()
                    .filter_map(|v| v.as_str().map(|s| s.to_string()))
                    .collect()
            })
            .unwrap_or_default()
    }

  src/env.rs: |
    use std::env;

    pub struct EnvConfig {
        pub port: u16,
        pub log_level: String,
        pub debug_mode: bool,
    }

    impl EnvConfig {
        pub fn from_env() -> Self {
            Self {
                port: env::var("PORT")
                    .ok()
                    .and_then(|p| p.parse().ok())
                    .unwrap_or(8080),
                log_level: env::var("LOG_LEVEL").unwrap_or_else(|_| "info".to_string()),
                debug_mode: env::var("DEBUG").is_ok(),
            }
        }

        pub fn is_production(&self) -> bool {
            self.log_level == "error" && !self.debug_mode
        }
    }
  src/feature_flags.rs: |
    pub struct FeatureSet {
        enabled: Vec<String>,
    }

    impl FeatureSet {
        pub fn new() -> Self {
            let mut enabled = Vec::new();
            #[cfg(feature = "auth")]
            enabled.push("auth".to_string());
            #[cfg(feature = "api")]
            enabled.push("api".to_string());
            Self { enabled }
        }

        pub fn is_enabled(&self, feature: &str) -> bool {
            self.enabled.iter().any(|f| f == feature)
        }

        pub fn list_features(&self) -> &[String] {
            &self.enabled
        }
    }

must_include_files:
  # Changed: adds get_features() parsing the JSON features array
  - src/config.rs
must_include_content_from:
  src/config.rs:
    - "pub fn get_features() -> Vec<String> {"
    - 'include_str!("../data/config.json")'
must_not_include:
  # env.rs: runtime env var config, no JSON/include_str dependency
  - EnvConfig
  - from_env
  - LOG_LEVEL
  # feature_flags.rs: compile-time cfg features, no JSON dependency
  - FeatureSet
  - is_enabled
  - list_features
must_not_include_files:
  - src/env.rs
  - src/feature_flags.rs
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
