  src/traits.rs: |
    use std::fmt::Debug;

    pub trait Named {
        fn name(&self) -> &str;

        fn display_name(&self) -> String {
            format!("Name: {}", self.name())
        }
    }

    pub trait Identifiable {
        type Id: Debug + Clone;

        fn id(&self) -> Self::Id;
    }

    pub trait Describable {
        fn describe(&self) -> String;

        fn short_description(&self) -> String {
            let desc = self.describe();
            if desc.len() > 50 {
                format!("{}...", &desc[..47])
            } else {
                desc
            }
        }

        fn detailed_description(&self) -> String {
            format!("Description: {}", self.describe())
        }
    }

    pub trait Displayable: Named + Describable {
        fn display(&self) -> String {
            format!("{}: {}", self.name(), self.short_description())
        }
    }

    pub struct Entity {
        name: String,
        id: u64,
        description: String,
    }

    impl Entity {
        pub fn new(id: u64, name: &str, description: &str) -> Self {
            Self {
                id,
                name: name.to_string(),
                description: description.to_string(),
            }
        }
    }

    impl Named for Entity {
        fn name(&self) -> &str {
            &self.name
        }
    }

    impl Identifiable for Entity {
        type Id = u64;

        fn id(&self) -> Self::Id {
            self.id
        }
    }

    impl Describable for Entity {
        fn describe(&self) -> String {
            self.description.clone()
        }
    }

    impl Displayable for Entity {}
