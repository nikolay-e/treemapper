# Scenario: Adding Describable and Displayable traits to a trait hierarchy.
#   src/traits.rs gains Describable trait (describe, short_description,
#   detailed_description), Displayable supertrait (Named + Describable),
#   Entity gets description field and impl blocks for both new traits.
#
# Diff shows:
#   + pub trait Describable { fn describe, short_description, detailed_description }
#   + pub trait Displayable: Named + Describable { fn display }
#   + description: String field on Entity
#   + Entity::new takes description parameter
#   + impl Describable for Entity
#   + impl Displayable for Entity
#
# Reviewer questions:
#   Q1: "Does Displayable correctly compose Named + Describable?"
#       -> Same file: trait Displayable: Named + Describable defines
#          display() calling self.name() and self.short_description().
#          Reviewer verifies the supertrait bounds match the method calls.
#
#   Q2: "Is Entity::new updated to accept the new description field?"
#       -> Same file: Entity::new(id, name, description) now takes 3 params
#          instead of the original 2. Reviewer verifies initialization.
#
# Not needed for comprehension:
#   - src/printable.rs: Printable trait with print() and print_verbose().
#     HARDEST TRAP: "display/print" vocabulary overlaps with Displayable.
#     Same pattern: trait with methods, struct implementing the trait.
#     Document has `title` and `content` — similar to Entity's `name`
#     and `description`. But Printable is independent, not a supertrait
#     of Displayable, and Document doesn't impl Named or Describable.
#
#   - src/serializable.rs: Serializable trait with to_bytes/from_bytes
#     and default method to_string_repr(). Same "trait with default
#     methods" pattern as Describable. Record struct implements it.
#     But completely different domain (byte serialization), no trait
#     dependency on Named/Describable/Displayable.
initial:
  src/lib.rs: |
    pub mod traits;
    pub mod printable;
    pub mod serializable;
  src/traits.rs: |
    use std::fmt::Debug;

    pub trait Named {
        fn name(&self) -> &str;

        fn display_name(&self) -> String {
            format!("Name: {}", self.name())
        }
    }

    pub trait Identifiable {
        type Id: Debug + Clone;

        fn id(&self) -> Self::Id;
    }

    pub struct Entity {
        name: String,
        id: u64,
    }

    impl Named for Entity {
        fn name(&self) -> &str {
            &self.name
        }
    }

    impl Identifiable for Entity {
        type Id = u64;

        fn id(&self) -> Self::Id {
            self.id
        }
    }
  src/printable.rs: |
    pub trait Printable {
        fn print(&self);
        fn print_verbose(&self);
    }

    pub struct Document {
        title: String,
        content: String,
    }

    impl Document {
        pub fn new(title: &str, content: &str) -> Self {
            Self {
                title: title.to_string(),
                content: content.to_string(),
            }
        }
    }

    impl Printable for Document {
        fn print(&self) {
            println!("{}", self.title);
        }

        fn print_verbose(&self) {
            println!("{}: {}", self.title, self.content);
        }
    }
  src/serializable.rs: |
    pub trait Serializable {
        fn to_bytes(&self) -> Vec<u8>;
        fn from_bytes(data: &[u8]) -> Self where Self: Sized;

        fn to_string_repr(&self) -> String {
            let bytes = self.to_bytes();
            bytes.iter().map(|b| format!("{:02x}", b)).collect()
        }
    }

    pub struct Record {
        pub id: u32,
        pub data: Vec<u8>,
    }

    impl Serializable for Record {
        fn to_bytes(&self) -> Vec<u8> {
            let mut buf = self.id.to_be_bytes().to_vec();
            buf.extend_from_slice(&self.data);
            buf
        }

        fn from_bytes(data: &[u8]) -> Self {
            let id = u32::from_be_bytes([data[0], data[1], data[2], data[3]]);
            Self { id, data: data[4..].to_vec() }
        }
    }
