# Scenario: Adding step-based increment/decrement to a Counter struct.
#   src/counter.rs gains a `step` field, with_step() constructor,
#   increment/decrement/get/reset/set_step methods, and updated Display.
#
# Diff shows:
#   + step: i32 field on Counter struct
#   + pub fn with_step(name: &str, step: i32) -> Self
#   + pub fn increment/decrement/get/reset/set_step methods
#   ~ Display impl updated to show step
#   ~ new() and with_name() updated to initialize step: 1
#
# Reviewer questions:
#   Q1: "Does the Display impl correctly reflect the new step field?"
#       -> Same file: write!(f, "Counter({}): {} (step: {})", ..., self.step).
#          Reviewer verifies step is shown in the output format.
#
#   Q2: "Are all constructors initializing the step field?"
#       -> Same file: new() sets step: 1, with_name() sets step: 1,
#          with_step() accepts step parameter. All covered within the diff.
#
# Not needed for comprehension:
#   - src/timer.rs: CountdownTimer with duration, start(), remaining(),
#     is_expired(). HARDEST TRAP: similar "stateful numeric struct" pattern
#     — a struct with internal state and methods that mutate it. Same
#     module pattern (pub struct in same crate). But CountdownTimer tracks
#     time, not counts, and has no import/type dependency on Counter.
#
#   - src/rate_limiter.rs: TokenBucket with capacity, tokens, try_consume().
#     "Counter-like" vocabulary — tracks a numeric value that increments
#     and decrements. But uses different types (u32 vs i32), different
#     semantics (rate limiting vs counting), and no shared types.
