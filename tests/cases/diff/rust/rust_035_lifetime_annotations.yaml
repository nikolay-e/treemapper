  src/lib.rs: |
    pub mod parser;
    pub mod lexer;
    pub mod ast;
    pub mod source_map;
  src/parser.rs: |
    use std::collections::HashMap;

    pub struct Parser<'a> {
        input: &'a str,
        position: usize,
    }

    impl<'a> Parser<'a> {
        pub fn new(input: &'a str) -> Self {
            Self { input, position: 0 }
        }

        pub fn parse(&self) -> Vec<&'a str> {
            self.input.split_whitespace().collect()
        }

        pub fn first_word(&self) -> Option<&'a str> {
            self.input.split_whitespace().next()
        }

        pub fn position(&self) -> usize {
            self.position
        }

        pub fn remaining(&self) -> &'a str {
            &self.input[self.position..]
        }

        pub fn advance(&mut self, n: usize) {
            self.position = (self.position + n).min(self.input.len());
        }

        pub fn peek(&self, n: usize) -> Option<&'a str> {
            if self.position + n <= self.input.len() {
                Some(&self.input[self.position..self.position + n])
            } else {
                None
            }
        }
    }

    pub struct Token<'a> {
        kind: TokenKind,
        value: &'a str,
        span: Span,
    }

    #[derive(Debug, Clone, Copy)]
    pub struct Span {
        pub start: usize,
        pub end: usize,
    }

    impl Span {
        pub fn new(start: usize, end: usize) -> Self {
            Self { start, end }
        }

        pub fn len(&self) -> usize {
            self.end - self.start
        }

        pub fn is_empty(&self) -> bool {
            self.start == self.end
        }
    }

    #[derive(Debug, Clone, PartialEq)]
    pub enum TokenKind {
        Identifier,
        Number,
        Operator,
        Whitespace,
        Eof,
    }

    impl<'a> Token<'a> {
        pub fn new(kind: TokenKind, value: &'a str, span: Span) -> Self {
            Self { kind, value, span }
        }

        pub fn kind(&self) -> &TokenKind {
            &self.kind
        }

        pub fn value(&self) -> &'a str {
            self.value
        }

        pub fn span(&self) -> Span {
            self.span
        }
    }

    pub fn tokenize<'a>(input: &'a str) -> Vec<Token<'a>> {
        let mut tokens = Vec::new();
        let mut pos = 0;

        for word in input.split_whitespace() {
            let start = input[pos..].find(word).map(|i| pos + i).unwrap_or(pos);
            let end = start + word.len();
            let span = Span::new(start, end);
            tokens.push(Token::new(TokenKind::Identifier, word, span));
            pos = end;
        }

        tokens
    }

    pub fn longest<'a>(x: &'a str, y: &'a str) -> &'a str {
        if x.len() > y.len() { x } else { y }
    }

    pub fn first_matching<'a, 'b>(
        items: &'a [&'b str],
        predicate: impl Fn(&str) -> bool,
    ) -> Option<&'b str> {
        items.iter().copied().find(|s| predicate(s))
    }

    pub struct StringInterner<'a> {
        strings: HashMap<&'a str, u32>,
        next_id: u32,
    }

    impl<'a> StringInterner<'a> {
        pub fn new() -> Self {
            Self {
                strings: HashMap::new(),
                next_id: 0,
            }
        }

        pub fn intern(&mut self, s: &'a str) -> u32 {
            if let Some(&id) = self.strings.get(s) {
                id
            } else {
                let id = self.next_id;
                self.strings.insert(s, id);
                self.next_id += 1;
                id
            }
        }

        pub fn lookup(&self, s: &str) -> Option<u32> {
            self.strings.get(s).copied()
        }

        pub fn len(&self) -> usize {
            self.strings.len()
        }

        pub fn is_empty(&self) -> bool {
            self.strings.is_empty()
        }
    }

    impl<'a> Default for StringInterner<'a> {
        fn default() -> Self {
            Self::new()
        }
    }

    pub trait Parseable<'a>: Sized {
        fn parse_from(parser: &mut Parser<'a>) -> Option<Self>;
    }

    pub struct Identifier<'a> {
        name: &'a str,
        span: Span,
    }

    impl<'a> Identifier<'a> {
        pub fn name(&self) -> &'a str {
            self.name
        }

        pub fn span(&self) -> Span {
            self.span
        }
    }

    impl<'a> Parseable<'a> for Identifier<'a> {
        fn parse_from(parser: &mut Parser<'a>) -> Option<Self> {
            let word = parser.first_word()?;
            let span = Span::new(parser.position(), parser.position() + word.len());
            parser.advance(word.len());
            Some(Identifier { name: word, span })
        }
    }
  src/lexer.rs: |
    use std::collections::HashMap;

    pub struct LexerRule {
        pub name: String,
        pub pattern: String,
        pub priority: i32,
    }

    pub struct Lexer {
        rules: Vec<LexerRule>,
    }

    impl Lexer {
        pub fn new() -> Self {
            Self { rules: Vec::new() }
        }

        pub fn add_rule(&mut self, name: &str, pattern: &str, priority: i32) {
            self.rules.push(LexerRule {
                name: name.to_string(),
                pattern: pattern.to_string(),
                priority,
            });
        }

        pub fn tokenize(&self, input: &str) -> Vec<String> {
            input.split_whitespace().map(String::from).collect()
        }

        pub fn rule_count(&self) -> usize {
            self.rules.len()
        }
    }
  src/ast.rs: |
    #[derive(Debug)]
    pub enum AstNode {
        Literal(String),
        Identifier(String),
        BinaryOp { op: String, left: Box<AstNode>, right: Box<AstNode> },
        Call { name: String, args: Vec<AstNode> },
    }

    impl AstNode {
        pub fn literal(value: &str) -> Self {
            AstNode::Literal(value.to_string())
        }

        pub fn identifier(name: &str) -> Self {
            AstNode::Identifier(name.to_string())
        }

        pub fn is_leaf(&self) -> bool {
            matches!(self, AstNode::Literal(_) | AstNode::Identifier(_))
        }
    }
  src/source_map.rs: |
    pub struct SourceMap {
        line_offsets: Vec<usize>,
    }

    impl SourceMap {
        pub fn new(source: &str) -> Self {
            let mut offsets = vec![0];
            for (i, ch) in source.char_indices() {
                if ch == '\n' {
                    offsets.push(i + 1);
                }
            }
            Self { line_offsets: offsets }
        }

        pub fn line_col(&self, offset: usize) -> (usize, usize) {
            let line = self.line_offsets.partition_point(|&o| o <= offset).saturating_sub(1);
            let col = offset - self.line_offsets[line];
            (line + 1, col + 1)
        }

        pub fn line_count(&self) -> usize {
            self.line_offsets.len()
        }
    }

