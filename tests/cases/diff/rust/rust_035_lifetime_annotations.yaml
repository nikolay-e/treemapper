# Scenario: Parser is refactored from owned String to borrowed &'a str throughout.
# Token gains a Span struct, lifetime annotations propagate to all types, and
# new zero-copy constructs (StringInterner, Parseable trait) are added.
#
# Diff: src/parser.rs overhauls Parser<'a>, Token<'a>, adds Span, StringInterner<'a>,
# Parseable<'a> trait, Identifier<'a>, and several free functions with lifetimes.
#
# Reviewer questions:
#   Q1: "How do the lifetime annotations flow through Parser -> Token -> Span?"
#        -> src/parser.rs (CHANGED) — all in one file, self-contained.
#   Q2: "What is the public API surface change?" -> Parser<'a> replaces Parser,
#        new() takes &'a str instead of String, parse() returns Vec<&'a str>.
#
# Trap files (plausible but no dependency on Parser or its lifetime types):
#   - src/lexer.rs: a separate lexer that tokenizes by regex patterns. Shares
#     "tokenize/token" vocabulary but uses owned Strings, not borrowed slices.
#   - src/ast.rs: abstract syntax tree nodes built from owned data. Same "parser"
#     domain but downstream consumer, not a dependency of the Parser refactor.
#   - src/source_map.rs: maps byte offsets to line/column. Shares "Span/position"
#     vocabulary but operates independently on &str without Parser dependency.

initial:
  src/lib.rs: |
    pub mod parser;
    pub mod lexer;
    pub mod ast;
    pub mod source_map;
  src/parser.rs: |
    use std::collections::HashMap;

    pub struct Parser {
        input: String,
        position: usize,
    }

    impl Parser {
        pub fn new(input: String) -> Self {
            Self { input, position: 0 }
        }

        pub fn parse(&self) -> Vec<String> {
            self.input.split_whitespace().map(String::from).collect()
        }

        pub fn position(&self) -> usize {
            self.position
        }

        pub fn remaining(&self) -> &str {
            &self.input[self.position..]
        }
    }

    pub struct Token {
        kind: TokenKind,
        value: String,
    }

    #[derive(Debug, Clone, PartialEq)]
    pub enum TokenKind {
        Identifier,
        Number,
        Operator,
        Whitespace,
    }

    impl Token {
        pub fn new(kind: TokenKind, value: String) -> Self {
            Self { kind, value }
        }

        pub fn kind(&self) -> &TokenKind {
            &self.kind
        }

        pub fn value(&self) -> &str {
            &self.value
        }
    }

    pub fn tokenize(input: &str) -> Vec<Token> {
        input
            .split_whitespace()
            .map(|s| Token::new(TokenKind::Identifier, s.to_string()))
            .collect()
    }
  src/lexer.rs: |
    use std::collections::HashMap;

    pub struct LexerRule {
        pub name: String,
        pub pattern: String,
        pub priority: i32,
    }

    pub struct Lexer {
        rules: Vec<LexerRule>,
    }

    impl Lexer {
        pub fn new() -> Self {
            Self { rules: Vec::new() }
        }

        pub fn add_rule(&mut self, name: &str, pattern: &str, priority: i32) {
            self.rules.push(LexerRule {
                name: name.to_string(),
                pattern: pattern.to_string(),
                priority,
            });
        }

        pub fn tokenize(&self, input: &str) -> Vec<String> {
            input.split_whitespace().map(String::from).collect()
        }

        pub fn rule_count(&self) -> usize {
            self.rules.len()
        }
    }
  src/ast.rs: |
    #[derive(Debug)]
    pub enum AstNode {
        Literal(String),
        Identifier(String),
        BinaryOp { op: String, left: Box<AstNode>, right: Box<AstNode> },
        Call { name: String, args: Vec<AstNode> },
    }

    impl AstNode {
        pub fn literal(value: &str) -> Self {
            AstNode::Literal(value.to_string())
        }

        pub fn identifier(name: &str) -> Self {
            AstNode::Identifier(name.to_string())
        }

        pub fn is_leaf(&self) -> bool {
            matches!(self, AstNode::Literal(_) | AstNode::Identifier(_))
        }
    }
  src/source_map.rs: |
    pub struct SourceMap {
        line_offsets: Vec<usize>,
    }

    impl SourceMap {
        pub fn new(source: &str) -> Self {
            let mut offsets = vec![0];
            for (i, ch) in source.char_indices() {
                if ch == '\n' {
                    offsets.push(i + 1);
                }
            }
            Self { line_offsets: offsets }
        }

        pub fn line_col(&self, offset: usize) -> (usize, usize) {
            let line = self.line_offsets.partition_point(|&o| o <= offset).saturating_sub(1);
            let col = offset - self.line_offsets[line];
            (line + 1, col + 1)
        }

        pub fn line_count(&self) -> usize {
            self.line_offsets.len()
        }
    }

