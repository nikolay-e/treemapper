name: rust_013_result_error_handling
repo:
  initial_files:
    src/lib.rs: |
      pub mod parser;
      pub mod validator;
      pub mod decoder;
    src/parser.rs: |
      use std::str::FromStr;

      pub fn parse(s: &str) -> i32 {
          s.parse().unwrap()
      }

      pub fn parse_multiple(inputs: &[&str]) -> Vec<i32> {
          inputs.iter().map(|s| parse(s)).collect()
      }

      pub struct NumberParser {
          radix: u32,
      }

      impl NumberParser {
          pub fn new(radix: u32) -> Self {
              Self { radix }
          }

          pub fn parse(&self, s: &str) -> i32 {
              i32::from_str_radix(s, self.radix).unwrap()
          }
      }

      impl Default for NumberParser {
          fn default() -> Self {
              Self::new(10)
          }
      }
    src/validator.rs: |
      #[derive(Debug)]
      pub enum ValidationError {
          TooShort(usize),
          TooLong(usize),
          InvalidFormat(String),
      }

      pub struct InputValidator {
          min_length: usize,
          max_length: usize,
      }

      impl InputValidator {
          pub fn new(min: usize, max: usize) -> Self {
              Self { min_length: min, max_length: max }
          }

          pub fn validate(&self, input: &str) -> Result<(), ValidationError> {
              if input.len() < self.min_length {
                  return Err(ValidationError::TooShort(self.min_length));
              }
              if input.len() > self.max_length {
                  return Err(ValidationError::TooLong(self.max_length));
              }
              Ok(())
          }
      }
    src/decoder.rs: |
      #[derive(Debug)]
      pub enum DecodeError {
          InvalidHeader,
          UnexpectedEof,
          ChecksumMismatch,
      }

      pub struct BinaryDecoder {
          data: Vec<u8>,
          position: usize,
      }

      impl BinaryDecoder {
          pub fn new(data: Vec<u8>) -> Self {
              Self { data, position: 0 }
          }

          pub fn read_u32(&mut self) -> Result<u32, DecodeError> {
              if self.position + 4 > self.data.len() {
                  return Err(DecodeError::UnexpectedEof);
              }
              let bytes = &self.data[self.position..self.position + 4];
              self.position += 4;
              Ok(u32::from_be_bytes([bytes[0], bytes[1], bytes[2], bytes[3]]))
          }

          pub fn remaining(&self) -> usize {
              self.data.len() - self.position
          }
      }
