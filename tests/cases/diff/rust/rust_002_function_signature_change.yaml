# Scenario: math.rs widens arithmetic functions from i32 to i64, adds subtract()
# and divide(), and adds Calculator::subtract(). main.rs calls math::add(2, 3)
# which will break because the signature changed from i32 to i64.
#
# Diff: src/math.rs changes all function signatures from i32 to i64, adds new
# functions. src/main.rs is unchanged but calls math::add(2, 3).
#
# Reviewer questions:
#   Q1: "Does main.rs still compile after the type change?"
#       -> src/main.rs (UNCHANGED) calls math::add(2, 3) with integer literals.
#          In Rust, untyped integer literals default to i32, but will infer i64
#          from the function signature. Reviewer must verify this compiles.
#   Q2: "Is divide-by-zero handled?"
#       -> src/math.rs: divide returns Option<i64>, returns None when b == 0.
#          Self-contained in the diff.
#
# Not needed:
#   - src/statistics.rs: statistical functions (mean, variance). Same numeric
#     domain, uses f64 operations. But no shared types/imports with math.rs.
#   - src/conversion.rs: unit conversion utilities. Numeric domain overlap
#     but independent module.
#   - src/calculator_cli.rs: CLI that ALSO calls math::add, math::multiply.
#     HARDEST TRAP: direct consumer of the changed functions, same import
#     path, same function calls. But main.rs is the only caller that helps
#     assess compilation impact of the signature change.
#   - src/math_test.rs: tests for math module calling add, subtract, multiply.
#     Uses the exact same API. But test assertions don't define the contract.
#   - src/bignum.rs: arbitrary precision math with similar add/multiply names.
#     Same "math" vocabulary but different types entirely.

max_enrichment: 6.9
initial:
  src/lib.rs: |
    pub mod math;
    pub mod statistics;
    pub mod conversion;
    pub mod calculator_cli;
    pub mod bignum;
  src/math.rs: |
    use std::ops::{Add, Sub};

    pub fn add(a: i32, b: i32) -> i32 {
        a + b
    }

    pub fn multiply(a: i32, b: i32) -> i32 {
        a * b
    }

    pub struct Calculator {
        precision: u8,
    }

    impl Calculator {
        pub fn new(precision: u8) -> Self {
            Self { precision }
        }

        pub fn add(&self, a: f64, b: f64) -> f64 {
            let result = a + b;
            self.round(result)
        }

        fn round(&self, value: f64) -> f64 {
            let factor = 10_f64.powi(self.precision as i32);
            (value * factor).round() / factor
        }
    }

    impl Default for Calculator {
        fn default() -> Self {
            Self::new(2)
        }
    }
  src/main.rs: |
    mod math;

    fn main() {
        let sum = math::add(2, 3);
        let product = math::multiply(4, 5);
        println!("Sum: {}, Product: {}", sum, product);

        let calc = math::Calculator::new(3);
        let precise = calc.add(1.1, 2.2);
        println!("Precise: {}", precise);
    }
  src/statistics.rs: |
    pub fn mean(values: &[f64]) -> f64 {
        if values.is_empty() {
            return 0.0;
        }
        values.iter().sum::<f64>() / values.len() as f64
    }

    pub fn variance(values: &[f64]) -> f64 {
        let m = mean(values);
        values.iter().map(|v| (v - m).powi(2)).sum::<f64>() / values.len() as f64
    }

    pub fn standard_deviation(values: &[f64]) -> f64 {
        variance(values).sqrt()
    }

    pub struct StatisticalSummary {
        pub count: usize,
        pub mean: f64,
        pub std_dev: f64,
    }
  src/conversion.rs: |
    pub const METERS_PER_MILE: f64 = 1609.344;
    pub const KG_PER_POUND: f64 = 0.453592;

    pub fn miles_to_km(miles: f64) -> f64 {
        miles * METERS_PER_MILE / 1000.0
    }

    pub fn pounds_to_kg(pounds: f64) -> f64 {
        pounds * KG_PER_POUND
    }

    pub fn celsius_to_fahrenheit(celsius: f64) -> f64 {
        celsius * 9.0 / 5.0 + 32.0
    }
  src/calculator_cli.rs: |
    use crate::math;

    pub fn run_interactive() {
        let a = 10;
        let b = 20;
        let sum = math::add(a, b);
        let product = math::multiply(a, b);
        println!("CLI Calculator: {} + {} = {}", a, b, sum);
        println!("CLI Calculator: {} * {} = {}", a, b, product);
    }

    pub fn run_batch(pairs: &[(i32, i32)]) {
        for (a, b) in pairs {
            println!("{} + {} = {}", a, b, math::add(*a, *b));
        }
    }
  src/bignum.rs: |
    pub struct BigNum {
        digits: Vec<u8>,
        negative: bool,
    }

    impl BigNum {
        pub fn from_i64(value: i64) -> Self {
            Self {
                digits: value.abs().to_string().bytes().map(|b| b - b'0').collect(),
                negative: value < 0,
            }
        }

        pub fn add(&self, other: &BigNum) -> BigNum {
            BigNum::from_i64(0)
        }

        pub fn multiply(&self, other: &BigNum) -> BigNum {
            BigNum::from_i64(0)
        }
    }
  src/math_test.rs: |
    #[cfg(test)]
    mod tests {
        use crate::math;

        #[test]
        fn test_add() {
            assert_eq!(math::add(2, 3), 5);
        }

        #[test]
        fn test_multiply() {
            assert_eq!(math::multiply(4, 5), 20);
        }
    }
changed:
  src/math.rs: |
    use std::ops::{Add, Sub};

    pub fn add(a: i64, b: i64) -> i64 {
        a + b
    }

    pub fn subtract(a: i64, b: i64) -> i64 {
        a - b
    }

    pub fn multiply(a: i64, b: i64) -> i64 {
        a * b
    }

    pub fn divide(a: i64, b: i64) -> Option<i64> {
        if b == 0 {
            None
        } else {
            Some(a / b)
        }
    }

    pub struct Calculator {
        precision: u8,
    }

    impl Calculator {
        pub fn new(precision: u8) -> Self {
            Self { precision }
        }

        pub fn add(&self, a: f64, b: f64) -> f64 {
            let result = a + b;
            self.round(result)
        }

        pub fn subtract(&self, a: f64, b: f64) -> f64 {
            let result = a - b;
            self.round(result)
        }

        fn round(&self, value: f64) -> f64 {
            let factor = 10_f64.powi(self.precision as i32);
            (value * factor).round() / factor
        }
    }

    impl Default for Calculator {
        fn default() -> Self {
            Self::new(2)
        }
    }
must_include_files:
  # Q1: main.rs calls math::add(2, 3) — must verify it compiles with i64 signature
  - src/main.rs
must_include_content_from:
  src/main.rs:
    - "math::add(2, 3)"
    - "math::multiply(4, 5)"
must_not_include:
  # statistics.rs: numeric domain but no shared types
  - StatisticalSummary
  - standard_deviation
  - "fn variance"
  # conversion.rs: unit conversions, independent
  - METERS_PER_MILE
  - KG_PER_POUND
  - celsius_to_fahrenheit
  # calculator_cli.rs: ALSO calls math::add and math::multiply
  - "run_interactive"
  - "run_batch"
  - "CLI Calculator"
  # bignum.rs: same add/multiply names but different types
  - "struct BigNum"
  - "from_i64"
  # math_test.rs: tests calling the same functions
  - "test_add"
  - "test_multiply"
must_not_include_files:
  - src/statistics.rs
  - src/conversion.rs
  - src/calculator_cli.rs
  - src/bignum.rs
  - src/math_test.rs
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
