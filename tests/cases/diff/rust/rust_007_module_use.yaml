# Scenario: Adding new public functions and re-exports to a utils module
# Changed: src/lib.rs — added pub use for processor, transformer; src/utils.rs — added processor(), transformer(), word_count()
# Reviewer questions: Are the new re-exports tested? Does word_count handle edge cases?
# Trap files:
#   - src/encoder.rs: Base64/hex encoding — "transform data" vocabulary but no import relationship
#   - src/sanitizer.rs: HTML/SQL sanitization — "process strings" domain overlap but independent
max_enrichment: 7.7
initial:
  src/lib.rs: |
    pub mod utils;
    pub mod encoder;
    pub mod sanitizer;

    pub use utils::helper;
  src/utils.rs: |
    use std::fmt::Display;

    pub fn helper() -> String {
        "helper".to_string()
    }

    pub fn format_value<T: Display>(value: T) -> String {
        format!("Value: {}", value)
    }

    pub struct StringUtils;

    impl StringUtils {
        pub fn capitalize(s: &str) -> String {
            let mut chars = s.chars();
            match chars.next() {
                None => String::new(),
                Some(first) => first.to_uppercase().chain(chars).collect(),
            }
        }

        pub fn reverse(s: &str) -> String {
            s.chars().rev().collect()
        }
    }
  src/encoder.rs: |
    pub fn to_base64(data: &[u8]) -> String {
        use std::io::Write;
        let mut buf = Vec::new();
        for chunk in data.chunks(3) {
            let n = chunk.len();
            let _ = write!(buf, "{}", n);
        }
        String::from_utf8_lossy(&buf).to_string()
    }

    pub fn to_hex(data: &[u8]) -> String {
        data.iter().map(|b| format!("{:02x}", b)).collect()
    }

    pub fn from_hex(hex: &str) -> Vec<u8> {
        hex.as_bytes()
            .chunks(2)
            .filter_map(|pair| {
                let s = std::str::from_utf8(pair).ok()?;
                u8::from_str_radix(s, 16).ok()
            })
            .collect()
    }
  src/sanitizer.rs: |
    pub fn strip_html(input: &str) -> String {
        let mut result = String::new();
        let mut inside_tag = false;
        for ch in input.chars() {
            match ch {
                '<' => inside_tag = true,
                '>' => inside_tag = false,
                _ if !inside_tag => result.push(ch),
                _ => {}
            }
        }
        result
    }

    pub fn escape_sql(input: &str) -> String {
        input.replace('\'', "''").replace('\\', "\\\\")
    }

    pub struct Sanitizer {
        allowed_tags: Vec<String>,
    }

    impl Sanitizer {
        pub fn new(allowed: &[&str]) -> Self {
            Self {
                allowed_tags: allowed.iter().map(|s| s.to_string()).collect(),
            }
        }
    }
