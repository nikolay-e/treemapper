    pub enum ValidationResult {
        Valid,
        Invalid(String),
        Warning(String),
    }

    pub fn validate_path(path: &str) -> ValidationResult {
        if path.is_empty() {
            ValidationResult::Invalid("Path cannot be empty".to_string())
        } else if path.contains("..") {
            ValidationResult::Warning("Path contains parent traversal".to_string())
        } else {
            ValidationResult::Valid
        }
