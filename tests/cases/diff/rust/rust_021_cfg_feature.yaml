# Scenario: Adding a #[cfg(feature = "yaml")] conditional impl block for
#   YAML serialization and a version field to Config. Only src/config.rs
#   is changed.
#
# Diff shows:
#   + #[cfg(feature = "yaml")] use serde_yaml;
#   + pub version: String field on Config
#   + version: "1.0.0".to_string() in Config::new()
#   + #[cfg(feature = "yaml")] impl Config { from_yaml, to_yaml }
#
# Reviewer questions:
#   Q1: "Is the yaml feature properly gated — does it mirror the json pattern?"
#       -> Same file: #[cfg(feature = "json")] impl already exists with
#          from_json/to_json. The new yaml block follows the same pattern.
#          Reviewer verifies consistency of the cfg guards.
#
#   Q2: "Does the version field addition affect the existing json impl?"
#       -> Same file: the json impl uses serde_json::from_str(s).unwrap()
#          which deserializes into Config. Adding version field means JSON
#          input must now include "version". Reviewer must check this.
#
# Not needed for comprehension:
#   - src/toml_loader.rs: TomlConfig with HashMap<String, HashMap<...>>.
#     HARDEST TRAP: "config format loader" domain overlap — TOML is another
#     serialization format like YAML. Same crate, same concept of loading
#     config from a format. But TomlConfig is a separate struct, not Config.
#     No shared types, no import of Config or serde_yaml.
#
#   - src/schema.rs: SchemaField with SchemaType enum for validation.
#     "Config" vocabulary overlap — schema validation is conceptually
#     related to config structure. But independent module with no
#     dependency on Config struct or feature flags.
initial:
  src/lib.rs: |
    pub mod config;
    pub mod toml_loader;
    pub mod schema;
  src/config.rs: |
    use std::collections::HashMap;

    #[cfg(feature = "json")]
    use serde_json;

    pub struct Config {
        pub name: String,
        pub settings: HashMap<String, String>,
    }

    impl Config {
        pub fn new(name: &str) -> Self {
            Self {
                name: name.to_string(),
                settings: HashMap::new(),
            }
        }

        pub fn set(&mut self, key: &str, value: &str) {
            self.settings.insert(key.to_string(), value.to_string());
        }

        pub fn get(&self, key: &str) -> Option<&String> {
            self.settings.get(key)
        }
    }

    #[cfg(feature = "json")]
    impl Config {
        pub fn from_json(s: &str) -> Self {
            serde_json::from_str(s).unwrap()
        }

        pub fn to_json(&self) -> String {
            serde_json::to_string(self).unwrap()
        }
    }
  src/toml_loader.rs: |
    use std::collections::HashMap;

    pub struct TomlConfig {
        sections: HashMap<String, HashMap<String, String>>,
    }

    impl TomlConfig {
        pub fn new() -> Self {
            Self { sections: HashMap::new() }
        }

        pub fn get_section(&self, name: &str) -> Option<&HashMap<String, String>> {
            self.sections.get(name)
        }

        pub fn set_value(&mut self, section: &str, key: &str, value: &str) {
            self.sections
                .entry(section.to_string())
                .or_insert_with(HashMap::new)
                .insert(key.to_string(), value.to_string());
        }

        pub fn sections(&self) -> Vec<&String> {
            self.sections.keys().collect()
        }
    }
  src/schema.rs: |
    #[derive(Debug)]
    pub enum SchemaType {
        String,
        Integer,
        Boolean,
        Array(Box<SchemaType>),
    }

    pub struct SchemaField {
        name: String,
        field_type: SchemaType,
        required: bool,
    }

    impl SchemaField {
        pub fn new(name: &str, field_type: SchemaType, required: bool) -> Self {
            Self {
                name: name.to_string(),
                field_type,
                required,
            }
        }

        pub fn is_required(&self) -> bool {
            self.required
        }

        pub fn name(&self) -> &str {
            &self.name
        }
    }
