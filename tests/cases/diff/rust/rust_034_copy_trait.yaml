must_include_files:
  # Changed: Point gains Copy, method signatures change to by-value
  - src/point.rs
  # New: geometry functions that rely on Point being Copy
  - src/geometry.rs
  # Changed: lib.rs adds pub mod geometry
  - src/lib.rs
must_include_content_from:
  src/point.rs:
    - "#[derive(Debug, Clone, Copy)]"
    - "pub fn distance(self, other: Point) -> f64 {"
  src/geometry.rs:
    - "use crate::point::Point;"
    - "pub fn calculate_area(p1: Point, p2: Point, p3: Point) -> f64 {"
must_not_include:
  # color.rs: also derives Copy but independent type, no Point usage
  - "struct Color"
  - blend
  - white
  # matrix.rs: geometry vocabulary but its own Matrix2D type
  - Matrix2D
  - rotation
  - multiply
must_not_include_files:
  - src/color.rs
  - src/matrix.rs
max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
