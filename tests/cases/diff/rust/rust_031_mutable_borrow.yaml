must_include_files:
  # Changed: process() now takes &mut Data, new mutating functions added
  - src/processor.rs
  # Unchanged but essential: Data struct shows what mutable API is available
  - src/data.rs
must_include_content_from:
  src/processor.rs:
    - "pub fn process(data: &mut Data) {"
    - "pub fn process_multiple(data: &mut Data, count: usize) {"
  src/data.rs:
    - "pub fn add(&mut self, value: i32) {"
must_not_include:
  # formatter.rs: string formatting, no Data struct dependency
  - OutputFormatter
  - format_values
  - format_summary
  # aggregator.rs: statistical functions on i32 slices, no Data dependency
  - compute_stats
  - "pub min:"
  - mean
must_not_include_files:
  - src/formatter.rs
  - src/aggregator.rs
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
