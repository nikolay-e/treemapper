name: rust_031_mutable_borrow
repo:
  initial_files:
    src/lib.rs: |
      pub mod data;
      pub mod processor;
      pub mod formatter;
      pub mod aggregator;
    src/data.rs: |
      pub struct Data {
          values: Vec<i32>,
          label: String,
      }

      impl Data {
          pub fn new(label: &str) -> Self {
              Self {
                  values: Vec::new(),
                  label: label.to_string(),
              }
          }

          pub fn add(&mut self, value: i32) {
              self.values.push(value);
          }

          pub fn get(&self, index: usize) -> Option<&i32> {
              self.values.get(index)
          }

          pub fn len(&self) -> usize {
              self.values.len()
          }

          pub fn label(&self) -> &str {
              &self.label
          }
      }
    src/processor.rs: |
      use crate::data::Data;

      pub fn process(data: &Data) {
          if let Some(val) = data.get(0) {
              println!("[{}] First value: {}", data.label(), val);
          }
      }
    src/formatter.rs: |
      pub struct OutputFormatter {
          prefix: String,
          separator: String,
      }

      impl OutputFormatter {
          pub fn new(prefix: &str) -> Self {
              Self {
                  prefix: prefix.to_string(),
                  separator: ", ".to_string(),
              }
          }

          pub fn format_values(&self, values: &[i32]) -> String {
              let items: Vec<String> = values.iter().map(|v| v.to_string()).collect();
              format!("{}: {}", self.prefix, items.join(&self.separator))
          }

          pub fn format_summary(&self, count: usize, total: i32) -> String {
              format!("{}: {} items, sum={}", self.prefix, count, total)
          }
      }
    src/aggregator.rs: |
      pub struct Stats {
          pub min: i32,
          pub max: i32,
          pub sum: i64,
          pub count: usize,
      }

      pub fn compute_stats(values: &[i32]) -> Option<Stats> {
          if values.is_empty() {
              return None;
          }
          Some(Stats {
              min: *values.iter().min().unwrap(),
              max: *values.iter().max().unwrap(),
              sum: values.iter().map(|&v| v as i64).sum(),
              count: values.len(),
          })
      }

      pub fn mean(values: &[i32]) -> Option<f64> {
          if values.is_empty() {
              return None;
          }
          Some(values.iter().map(|&v| v as f64).sum::<f64>() / values.len() as f64)
      }
