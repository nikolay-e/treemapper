    src/animal.rs: |
      use std::fmt;

      pub trait Animal {
          fn speak(&self) -> String;
          fn species(&self) -> &str;

          fn introduce(&self) -> String {
              format!("I am a {} and I say: {}", self.species(), self.speak())
          }
      }

      pub trait Domesticated: Animal {
          fn owner(&self) -> Option<&str>;
      }

      #[derive(Debug, Clone)]
      pub struct Dog {
          pub name: String,
          age: u8,
          owner_name: Option<String>,
      }

      impl Dog {
          pub fn new(name: &str, age: u8) -> Self {
              Self {
                  name: name.to_string(),
                  age,
                  owner_name: None,
              }
          }

          pub fn with_owner(name: &str, age: u8, owner: &str) -> Self {
              Self {
                  name: name.to_string(),
                  age,
                  owner_name: Some(owner.to_string()),
              }
          }

          pub fn age(&self) -> u8 {
              self.age
          }
      }

      impl Animal for Dog {
          fn speak(&self) -> String {
              format!("{} says woof!", self.name)
          }

          fn species(&self) -> &str {
              "dog"
          }
      }

      impl Domesticated for Dog {
          fn owner(&self) -> Option<&str> {
              self.owner_name.as_deref()
          }
      }

      impl fmt::Display for Dog {
          fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
              write!(f, "Dog: {} (age {})", self.name, self.age)
          }
      }

      #[derive(Debug, Clone)]
      pub struct Cat {
          pub name: String,
          indoor: bool,
      }

      impl Cat {
          pub fn new(name: &str, indoor: bool) -> Self {
              Self {
                  name: name.to_string(),
                  indoor,
              }
          }

          pub fn is_indoor(&self) -> bool {
              self.indoor
          }
      }

      impl Animal for Cat {
          fn speak(&self) -> String {
              format!("{} says meow!", self.name)
          }

          fn species(&self) -> &str {
              "cat"
          }
      }

      impl fmt::Display for Cat {
          fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
              let location = if self.indoor { "indoor" } else { "outdoor" };
              write!(f, "Cat: {} ({})", self.name, location)
          }
      }
