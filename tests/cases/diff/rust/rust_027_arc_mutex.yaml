  src/shared_state.rs: |
    use std::sync::{Arc, Mutex, RwLock, Condvar};
    use std::thread;
    use std::time::Duration;

    #[derive(Debug)]
    pub struct Counter {
        value: Arc<Mutex<i32>>,
        history: Arc<RwLock<Vec<i32>>>,
        name: String,
    }

    impl Counter {
        pub fn new(name: &str) -> Self {
            Self {
                value: Arc::new(Mutex::new(0)),
                history: Arc::new(RwLock::new(vec![])),
                name: name.to_string(),
            }
        }

        pub fn increment(&self) {
            let mut val = self.value.lock().unwrap();
            *val += 1;
            let mut history = self.history.write().unwrap();
            history.push(*val);
        }

        pub fn decrement(&self) {
            let mut val = self.value.lock().unwrap();
            *val -= 1;
            let mut history = self.history.write().unwrap();
            history.push(*val);
        }

        pub fn get(&self) -> i32 {
            *self.value.lock().unwrap()
        }

        pub fn get_history(&self) -> Vec<i32> {
            self.history.read().unwrap().clone()
        }

        pub fn name(&self) -> &str {
            &self.name
        }

        pub fn reset(&self) {
            let mut val = self.value.lock().unwrap();
            *val = 0;
            let mut history = self.history.write().unwrap();
            history.clear();
        }
    }

    impl Clone for Counter {
        fn clone(&self) -> Self {
            Self {
                value: Arc::clone(&self.value),
                history: Arc::clone(&self.history),
                name: self.name.clone(),
            }
        }
    }

    pub fn increment_in_threads(counter: &Counter, num_threads: usize) {
        let handles: Vec<_> = (0..num_threads)
            .map(|_| {
                let c = counter.clone();
                thread::spawn(move || {
                    c.increment();
                })
            })
            .collect();

        for handle in handles {
            handle.join().unwrap();
        }
    }

    pub struct BoundedCounter {
        value: Arc<Mutex<i32>>,
        min: i32,
        max: i32,
        not_empty: Arc<Condvar>,
        not_full: Arc<Condvar>,
    }

    impl BoundedCounter {
        pub fn new(min: i32, max: i32) -> Self {
            Self {
                value: Arc::new(Mutex::new(min)),
                min,
                max,
                not_empty: Arc::new(Condvar::new()),
                not_full: Arc::new(Condvar::new()),
            }
        }

        pub fn increment_blocking(&self) {
            let mut val = self.value.lock().unwrap();
            while *val >= self.max {
                val = self.not_full.wait(val).unwrap();
            }
            *val += 1;
            self.not_empty.notify_one();
        }

        pub fn decrement_blocking(&self) {
            let mut val = self.value.lock().unwrap();
            while *val <= self.min {
                val = self.not_empty.wait(val).unwrap();
            }
            *val -= 1;
            self.not_full.notify_one();
        }

        pub fn try_increment(&self) -> bool {
            let mut val = self.value.lock().unwrap();
            if *val < self.max {
                *val += 1;
                self.not_empty.notify_one();
                true
            } else {
                false
            }
        }

        pub fn try_decrement(&self) -> bool {
            let mut val = self.value.lock().unwrap();
            if *val > self.min {
                *val -= 1;
                self.not_full.notify_one();
                true
            } else {
                false
            }
        }

        pub fn get(&self) -> i32 {
            *self.value.lock().unwrap()
        }
    }

    impl Clone for BoundedCounter {
        fn clone(&self) -> Self {
            Self {
                value: Arc::clone(&self.value),
                min: self.min,
                max: self.max,
                not_empty: Arc::clone(&self.not_empty),
                not_full: Arc::clone(&self.not_full),
            }
        }
    }

    pub trait SharedCounter: Send + Sync {
        fn inc(&self);
        fn dec(&self);
        fn value(&self) -> i32;
    }

    impl SharedCounter for Counter {
        fn inc(&self) {
            self.increment();
        }

        fn dec(&self) {
            self.decrement();
        }

        fn value(&self) -> i32 {
            self.get()
        }
    }

    impl SharedCounter for BoundedCounter {
        fn inc(&self) {
            self.try_increment();
        }

        fn dec(&self) {
            self.try_decrement();
        }

        fn value(&self) -> i32 {
            self.get()
        }
    }
