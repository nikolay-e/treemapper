# Scenario: Cache is refactored from single-owner HashMap to Arc<RwLock<HashMap>>
# for thread-safe shared ownership. Methods change from &mut self to &self, and
# a Clone impl is added that clones the Arc handle.
#
# Diff: src/cache.rs wraps data in Arc<RwLock<...>>, changes method signatures,
# adds clone_handle() and Clone impl.
#
# Reviewer questions:
#   Q1: "Is the RwLock usage correct (read vs write)?" -> src/cache.rs (CHANGED)
#        uses .read().unwrap() for get/contains/len/is_empty and .write().unwrap()
#        for set — correct separation.
#   Q2: "How is shared ownership established?" -> Clone impl clones Arc handle,
#        clone_handle() exposes the raw Arc for external holders.
#
# Trap files (plausible but no dependency on Cache or its Arc/RwLock internals):
#   - src/session_store.rs: stores user sessions in a HashMap<String, Session>.
#     Same "key-value store" domain but uses no Arc/RwLock, single-threaded design.
#   - src/rate_limiter.rs: tracks request counts per client. Uses AtomicU64 for
#     thread safety — same concurrency domain but different type entirely.

max_enrichment: 4.8
initial:
  src/lib.rs: |
    pub mod cache;
    pub mod session_store;
    pub mod rate_limiter;
  src/cache.rs: |
    use std::collections::HashMap;

    pub struct Cache {
        data: HashMap<String, String>,
    }

    impl Cache {
        pub fn new() -> Self {
            Self { data: HashMap::new() }
        }

        pub fn get(&self, key: &str) -> Option<&String> {
            self.data.get(key)
        }

        pub fn contains(&self, key: &str) -> bool {
            self.data.contains_key(key)
        }

        pub fn len(&self) -> usize {
            self.data.len()
        }

        pub fn is_empty(&self) -> bool {
            self.data.is_empty()
        }
    }
  src/session_store.rs: |
    use std::collections::HashMap;

    pub struct Session {
        pub user_id: String,
        pub token: String,
        pub expires_at: u64,
    }

    pub struct SessionStore {
        sessions: HashMap<String, Session>,
    }

    impl SessionStore {
        pub fn new() -> Self {
            Self { sessions: HashMap::new() }
        }

        pub fn create_session(&mut self, user_id: &str, token: &str, ttl: u64) {
            self.sessions.insert(token.to_string(), Session {
                user_id: user_id.to_string(),
                token: token.to_string(),
                expires_at: ttl,
            });
        }

        pub fn get_session(&self, token: &str) -> Option<&Session> {
            self.sessions.get(token)
        }

        pub fn revoke(&mut self, token: &str) -> bool {
            self.sessions.remove(token).is_some()
        }
    }
  src/rate_limiter.rs: |
    use std::sync::atomic::{AtomicU64, Ordering};
    use std::collections::HashMap;

    pub struct RateLimiter {
        limits: HashMap<String, u64>,
        window_seconds: u64,
    }

    impl RateLimiter {
        pub fn new(window_seconds: u64) -> Self {
            Self {
                limits: HashMap::new(),
                window_seconds,
            }
        }

        pub fn set_limit(&mut self, key: &str, max_requests: u64) {
            self.limits.insert(key.to_string(), max_requests);
        }

        pub fn check(&self, key: &str, current_count: u64) -> bool {
            self.limits.get(key).map_or(true, |&limit| current_count < limit)
        }

        pub fn window(&self) -> u64 {
            self.window_seconds
        }
    }

changed:
  src/lib.rs: |
    pub mod cache;
    pub mod session_store;
    pub mod rate_limiter;
  src/cache.rs: |
    use std::collections::HashMap;
    use std::sync::{Arc, RwLock};

    pub struct Cache {
        data: Arc<RwLock<HashMap<String, String>>>,
    }

    impl Cache {
        pub fn new() -> Self {
            Self {
                data: Arc::new(RwLock::new(HashMap::new())),
            }
        }

        pub fn get(&self, key: &str) -> Option<String> {
            self.data.read().unwrap().get(key).cloned()
        }

        pub fn set(&self, key: String, value: String) {
            self.data.write().unwrap().insert(key, value);
        }

        pub fn contains(&self, key: &str) -> bool {
            self.data.read().unwrap().contains_key(key)
        }

        pub fn len(&self) -> usize {
            self.data.read().unwrap().len()
        }

        pub fn is_empty(&self) -> bool {
            self.data.read().unwrap().is_empty()
        }

        pub fn clone_handle(&self) -> Arc<RwLock<HashMap<String, String>>> {
            Arc::clone(&self.data)
        }
    }

    impl Clone for Cache {
        fn clone(&self) -> Self {
            Self {
                data: Arc::clone(&self.data),
            }
        }
    }
  src/session_store.rs: |
