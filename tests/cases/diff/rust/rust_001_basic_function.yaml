# Scenario: Adding farewell functions alongside existing greet functions.
#   src/greeting.rs gains farewell(), farewell_with_message(), and
#   Greeter::farewell(). Only src/greeting.rs is changed.
#
# Diff shows:
#   + pub fn farewell(name: &str) -> String
#   + pub fn farewell_with_message(name: &str, message: &str) -> String
#   + pub fn farewell(&self, name: &str) -> String (on Greeter impl)
#
# Reviewer questions:
#   Q1: "Do the new farewell functions follow the same signature patterns
#        as the existing greet functions?"
#       -> src/greeting.rs itself shows greet(name: &str) -> String and
#          greet_with_title<T: Display>(title, name) -> String. The diff
#          adds farewell(name) and farewell_with_message(name, message).
#          All context is within the changed file.
#
#   Q2: "Does the Greeter struct's farewell method use self.prefix
#        consistently with the existing greet method?"
#       -> Same file: Greeter::greet uses format!("{} {}!", self.prefix, name),
#          farewell uses format!("Farewell from {}, {}!", self.prefix, name).
#          Reviewer can verify consistency within the changed file.
#
# Not needed for comprehension:
#   - src/formatting.rs: String formatting utilities (pad_left, pad_right,
#     TextWrapper). Shares format!() macro usage — same language construct as
#     the diff. But formatting utilities are generic text operations with no
#     import or call edge to the greeting module.
#
#   - src/localization.rs: MessageCatalog with get/set for i18n messages.
#     HARDEST TRAP: "message" vocabulary overlaps with farewell_with_message.
#     Same domain conceptually (user-facing text). But the catalog is a
#     standalone key-value store with no import from or dependency on
#     greeting.rs. Including it doesn't help verify the farewell functions.
initial:
  src/lib.rs: |
    pub mod greeting;
    pub mod formatting;
    pub mod localization;
  src/greeting.rs: |
    use std::fmt::Display;

    pub fn greet(name: &str) -> String {
        format!("Hello, {}!", name)
    }

    pub fn greet_with_title<T: Display>(title: T, name: &str) -> String {
        format!("Hello, {} {}!", title, name)
    }

    pub struct Greeter {
        prefix: String,
    }

    impl Greeter {
        pub fn new(prefix: &str) -> Self {
            Self {
                prefix: prefix.to_string(),
            }
        }

        pub fn greet(&self, name: &str) -> String {
            format!("{} {}!", self.prefix, name)
        }
    }

    impl Default for Greeter {
        fn default() -> Self {
            Self::new("Hello")
        }
    }
  src/formatting.rs: |
    pub fn pad_left(s: &str, width: usize) -> String {
        format!("{:>width$}", s, width = width)
    }

    pub fn pad_right(s: &str, width: usize) -> String {
        format!("{:<width$}", s, width = width)
    }

    pub struct TextWrapper {
        max_width: usize,
    }

    impl TextWrapper {
        pub fn new(max_width: usize) -> Self {
            Self { max_width }
        }

        pub fn wrap(&self, text: &str) -> Vec<String> {
            text.chars()
                .collect::<Vec<_>>()
                .chunks(self.max_width)
                .map(|chunk| chunk.iter().collect())
                .collect()
        }
    }
  src/localization.rs: |
    use std::collections::HashMap;

    pub struct MessageCatalog {
        messages: HashMap<String, String>,
        locale: String,
    }

    impl MessageCatalog {
        pub fn new(locale: &str) -> Self {
            Self {
                messages: HashMap::new(),
                locale: locale.to_string(),
            }
        }

        pub fn get(&self, key: &str) -> Option<&String> {
            self.messages.get(key)
        }

        pub fn set(&mut self, key: &str, value: &str) {
            self.messages.insert(key.to_string(), value.to_string());
        }

        pub fn locale(&self) -> &str {
            &self.locale
        }
    }
