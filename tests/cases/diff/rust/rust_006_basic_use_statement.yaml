  # import or reference SortedSet anywhere.
  - SortedSet
  - BTreeSet
  - is_empty
  # --- src/deque.rs: VecDeque wrapper, collection vocabulary overlap ---
  # Another std::collections wrapper. But main.rs has no dependency.
