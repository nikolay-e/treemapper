# Scenario: main.rs adds use statements for HashMap, HashSet, BTreeMap and
#   populates/iterates them. Only src/main.rs is changed.
#
# Diff shows:
#   + use std::collections::HashMap;
#   + use std::collections::HashSet;
#   + use std::collections::BTreeMap;
#   + HashMap/HashSet/BTreeMap instantiation, insertion, iteration
#
# Reviewer questions:
#   Q1: "Are all three imported collection types actually used?"
#       -> Same file: HashMap used for map, HashSet for set, BTreeMap for
#          btree. All three are instantiated, populated, and printed.
#
#   Q2: "Is the HashMap iteration idiomatic Rust?"
#       -> Same file: for (key, value) in &map { ... }. Reviewer verifies
#          the borrow pattern is correct.
#
# Not needed for comprehension:
#   - src/sorted_set.rs: Custom SortedSet<T> wrapping BTreeSet<T>.
#     HARDEST TRAP: uses std::collections::BTreeSet — the diff adds
#     std::collections::BTreeMap. Same collections module, similar
#     sorted-container concept. But SortedSet is a wrapper in a
#     separate module. main.rs doesn't import or use SortedSet.
#
#   - src/deque.rs: Deque<T> wrapping VecDeque<T>. Same collections
#     domain (std::collections::VecDeque). But main.rs doesn't import
#     Deque or VecDeque. No dependency edge.
initial:
  src/main.rs: |
    fn main() {
        let map = std::collections::HashMap::new();
        println!("{:?}", map);
    }
  src/lib.rs: |
    pub mod sorted_set;
    pub mod deque;
  src/sorted_set.rs: |
    use std::collections::BTreeSet;

    pub struct SortedSet<T: Ord> {
        inner: BTreeSet<T>,
    }

    impl<T: Ord> SortedSet<T> {
        pub fn new() -> Self {
            Self { inner: BTreeSet::new() }
        }

        pub fn insert(&mut self, value: T) -> bool {
            self.inner.insert(value)
        }

        pub fn contains(&self, value: &T) -> bool {
            self.inner.contains(value)
        }

        pub fn len(&self) -> usize {
            self.inner.len()
        }

        pub fn is_empty(&self) -> bool {
            self.inner.is_empty()
        }
    }
  src/deque.rs: |
    use std::collections::VecDeque;

    pub struct Deque<T> {
        inner: VecDeque<T>,
        max_size: usize,
    }

    impl<T> Deque<T> {
        pub fn new(max_size: usize) -> Self {
            Self {
                inner: VecDeque::with_capacity(max_size),
                max_size,
            }
        }

        pub fn push_back(&mut self, value: T) {
            if self.inner.len() >= self.max_size {
                self.inner.pop_front();
            }
            self.inner.push_back(value);
        }

        pub fn pop_front(&mut self) -> Option<T> {
            self.inner.pop_front()
        }

        pub fn len(&self) -> usize {
            self.inner.len()
        }
    }
