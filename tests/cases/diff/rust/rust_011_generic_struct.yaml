# Scenario: Expanding generic Container<T> with accessors, map, replace,
#   and adding TypedContainer<T, Tag> with PhantomData. Only src/container.rs
#   is changed.
#
# Diff shows:
#   + use std::marker::PhantomData
#   + get(), get_mut(), into_inner(), map(), replace() on Container<T>
#   + duplicate() on Container<T: Clone>
#   + TypedContainer<T, Tag> struct with PhantomData<Tag>
#   + TypedContainer::new(), TypedContainer::get()
#
# Reviewer questions:
#   Q1: "Does map() preserve the label when transforming the value?"
#       -> Same file: map() returns Container { value: f(self.value),
#          label: self.label }. Reviewer verifies label is carried over.
#
#   Q2: "Is PhantomData usage correct for TypedContainer?"
#       -> Same file: _marker: PhantomData<Tag> on the struct, initialized
#          with PhantomData in new(). Tag is a type parameter used only
#          for phantom typing. Reviewer verifies the pattern is correct.
#
# Not needed for comprehension:
#   - src/registry.rs: TypeRegistry using Box<dyn Any> with register/get.
#     HARDEST TRAP: "generic container" vocabulary — register<T: 'static>,
#     get<T: 'static> are generic methods that store and retrieve typed
#     values. Same concept as Container<T>. But TypeRegistry uses type
#     erasure (Box<dyn Any>), not parametric types. No import of Container.
#
#   - src/pool.rs: ObjectPool<T> with acquire/release. Same <T> generic
#     pattern, same crate module structure. But ObjectPool manages a
#     Vec<T> pool with size limits — different semantics, no Container
#     dependency.
max_enrichment: 4.0
initial:
  src/lib.rs: |
    pub mod container;
    pub mod registry;
    pub mod pool;
  src/container.rs: |
    use std::fmt::Debug;

    #[derive(Debug, Clone)]
    pub struct Container<T> {
        value: T,
        label: String,
    }

    impl<T> Container<T> {
        pub fn new(value: T, label: &str) -> Self {
            Self {
                value,
                label: label.to_string(),
            }
        }

        pub fn label(&self) -> &str {
            &self.label
        }
    }

    impl<T: Clone> Container<T> {
        pub fn value(&self) -> T {
            self.value.clone()
        }
    }

    impl<T: Default> Default for Container<T> {
        fn default() -> Self {
            Self {
                value: T::default(),
                label: String::from("default"),
            }
        }
    }
  src/registry.rs: |
    use std::any::Any;
    use std::collections::HashMap;

    pub struct TypeRegistry {
        entries: HashMap<String, Box<dyn Any>>,
    }

    impl TypeRegistry {
        pub fn new() -> Self {
            Self { entries: HashMap::new() }
        }

        pub fn register<T: 'static>(&mut self, name: &str, value: T) {
            self.entries.insert(name.to_string(), Box::new(value));
        }

        pub fn get<T: 'static>(&self, name: &str) -> Option<&T> {
            self.entries.get(name)?.downcast_ref()
        }

        pub fn contains(&self, name: &str) -> bool {
            self.entries.contains_key(name)
        }
    }
  src/pool.rs: |
    pub struct ObjectPool<T> {
        available: Vec<T>,
        max_size: usize,
    }

    impl<T> ObjectPool<T> {
        pub fn new(max_size: usize) -> Self {
            Self {
                available: Vec::with_capacity(max_size),
                max_size,
            }
        }

        pub fn acquire(&mut self) -> Option<T> {
            self.available.pop()
        }

        pub fn release(&mut self, item: T) {
            if self.available.len() < self.max_size {
                self.available.push(item);
            }
        }

        pub fn available_count(&self) -> usize {
            self.available.len()
        }
    }
changed:
  src/lib.rs: |
    pub mod container;
    pub mod registry;
    pub mod pool;
  src/container.rs: |
    use std::fmt::Debug;
    use std::marker::PhantomData;

    #[derive(Debug, Clone)]
    pub struct Container<T> {
        value: T,
        label: String,
    }

    impl<T> Container<T> {
        pub fn new(value: T, label: &str) -> Self {
            Self {
                value,
                label: label.to_string(),
            }
        }

        pub fn label(&self) -> &str {
            &self.label
        }

        pub fn get(&self) -> &T {
            &self.value
        }

        pub fn get_mut(&mut self) -> &mut T {
            &mut self.value
        }

        pub fn into_inner(self) -> T {
            self.value
        }

        pub fn map<U, F>(self, f: F) -> Container<U>
        where
            F: FnOnce(T) -> U,
        {
            Container {
                value: f(self.value),
                label: self.label,
            }
        }

        pub fn replace(&mut self, new_value: T) -> T {
            std::mem::replace(&mut self.value, new_value)
        }
    }

    impl<T: Clone> Container<T> {
        pub fn value(&self) -> T {
            self.value.clone()
        }

        pub fn duplicate(&self) -> Self {
            Self {
                value: self.value.clone(),
                label: self.label.clone(),
            }
        }
    }

    impl<T: Default> Default for Container<T> {
        fn default() -> Self {
            Self {
                value: T::default(),
                label: String::from("default"),
            }
        }
    }

    #[derive(Debug)]
    pub struct TypedContainer<T, Tag> {
        inner: Container<T>,
        _marker: PhantomData<Tag>,
    }

    impl<T, Tag> TypedContainer<T, Tag> {
        pub fn new(value: T, label: &str) -> Self {
            Self {
                inner: Container::new(value, label),
                _marker: PhantomData,
            }
        }

        pub fn get(&self) -> &T {
            self.inner.get()
        }
    }
