      pub mod pool;
    src/container.rs: |
      use std::fmt::Debug;
      use std::marker::PhantomData;

      #[derive(Debug, Clone)]
      pub struct Container<T> {
          value: T,
          label: String,
      }

      impl<T> Container<T> {
          pub fn new(value: T, label: &str) -> Self {
              Self {
                  value,
                  label: label.to_string(),
              }
          }

          pub fn label(&self) -> &str {
              &self.label
          }

          pub fn get(&self) -> &T {
              &self.value
          }

          pub fn get_mut(&mut self) -> &mut T {
              &mut self.value
          }

          pub fn into_inner(self) -> T {
              self.value
          }

          pub fn map<U, F>(self, f: F) -> Container<U>
          where
              F: FnOnce(T) -> U,
          {
              Container {
                  value: f(self.value),
                  label: self.label,
              }
          }

          pub fn replace(&mut self, new_value: T) -> T {
              std::mem::replace(&mut self.value, new_value)
          }
      }

      impl<T: Clone> Container<T> {
          pub fn value(&self) -> T {
              self.value.clone()
          }

          pub fn duplicate(&self) -> Self {
              Self {
                  value: self.value.clone(),
                  label: self.label.clone(),
              }
          }
      }

      impl<T: Default> Default for Container<T> {
          fn default() -> Self {
              Self {
                  value: T::default(),
                  label: String::from("default"),
              }
          }
      }

      #[derive(Debug)]
      pub struct TypedContainer<T, Tag> {
          inner: Container<T>,
          _marker: PhantomData<Tag>,
      }

      impl<T, Tag> TypedContainer<T, Tag> {
          pub fn new(value: T, label: &str) -> Self {
              Self {
                  inner: Container::new(value, label),
                  _marker: PhantomData,
              }
          }

          pub fn get(&self) -> &T {
              self.inner.get()
          }
      }
    src/registry.rs: |
      use std::any::Any;
