              self.entries.get(name)?.downcast_ref()
          }

          pub fn contains(&self, name: &str) -> bool {
              self.entries.contains_key(name)
          }
      }
    src/pool.rs: |
      pub struct ObjectPool<T> {
          available: Vec<T>,
          max_size: usize,
      }

      impl<T> ObjectPool<T> {
          pub fn new(max_size: usize) -> Self {
              Self {
                  available: Vec::with_capacity(max_size),
