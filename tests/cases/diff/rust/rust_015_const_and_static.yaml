changed:
  src/lib.rs: |
    pub mod config;
    pub mod env;
    pub mod defaults;
  src/config.rs: |
    use std::sync::atomic::{AtomicUsize, Ordering};

    pub const MAX_SIZE: usize = 100;
    pub const MIN_SIZE: usize = 10;
    pub const DEFAULT_NAME: &str = "unnamed";
    pub const VERSION: &str = env!("CARGO_PKG_VERSION");

    pub static INSTANCE_COUNT: AtomicUsize = AtomicUsize::new(0);

    static mut GLOBAL_CONFIG: Option<Config> = None;

    pub fn get_max_size() -> usize {
        MAX_SIZE
    }

    pub fn get_instance_count() -> usize {
        INSTANCE_COUNT.load(Ordering::SeqCst)
    }

    pub fn increment_instance_count() -> usize {
        INSTANCE_COUNT.fetch_add(1, Ordering::SeqCst)
    }

    #[derive(Debug, Clone)]
    pub struct Config {
        pub name: String,
        pub size: usize,
        pub enabled: bool,
    }

    impl Config {
        pub fn new(name: &str, size: usize) -> Self {
            increment_instance_count();
            Self {
                name: name.to_string(),
                size: size.clamp(MIN_SIZE, MAX_SIZE),
                enabled: true,
            }
        }

        pub fn with_defaults() -> Self {
            Self::new(DEFAULT_NAME, MAX_SIZE)
        }

        pub fn is_valid(&self) -> bool {
            self.size >= MIN_SIZE && self.size <= MAX_SIZE
        }
    }

    impl Default for Config {
        fn default() -> Self {
            Self::with_defaults()
        }
    }

    pub fn get_default_config() -> Config {
        Config::with_defaults()
    }

    pub struct Settings {
        pub size: usize,
        pub name: String,
    }

    impl Settings {
        pub fn new(size: usize) -> Self {
            Self {
                size: size.clamp(MIN_SIZE, MAX_SIZE),
                name: DEFAULT_NAME.to_string(),
            }
        }

        pub fn with_name(size: usize, name: &str) -> Self {
            Self {
                size: size.clamp(MIN_SIZE, MAX_SIZE),
                name: name.to_string(),
            }
        }
    }

    impl Default for Settings {
        fn default() -> Self {
            Self::new(MAX_SIZE)
        }
    }
  src/env.rs: |
