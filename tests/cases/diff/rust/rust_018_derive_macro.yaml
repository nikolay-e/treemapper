      use std::fmt;
      use std::hash::{Hash, Hasher};

      #[derive(Debug, Clone, PartialEq, Eq, Hash)]
      pub struct User {
          pub id: u64,
          pub name: String,
          pub email: String,
          pub active: bool,
      }

      impl User {
          pub fn new(id: u64, name: String, email: String) -> Self {
              Self {
                  id,
                  name,
                  email,
                  active: true,
              }
          }

          pub fn with_status(id: u64, name: String, email: String, active: bool) -> Self {
              Self { id, name, email, active }
          }

          pub fn display_name(&self) -> &str {
              &self.name
          }

          pub fn is_active(&self) -> bool {
              self.active
          }

          pub fn deactivate(&mut self) {
              self.active = false;
          }

          pub fn activate(&mut self) {
              self.active = true;
          }
      }

      impl fmt::Display for User {
          fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
              let status = if self.active { "active" } else { "inactive" };
              write!(f, "User #{}: {} <{}> [{}]", self.id, self.name, self.email, status)
          }
      }

      impl Default for User {
          fn default() -> Self {
              Self::new(0, String::from("Anonymous"), String::from("anon@example.com"))
          }
      }

      #[derive(Debug, Clone, PartialEq, Eq, Hash, Default)]
      pub struct UserProfile {
          pub user_id: u64,
          pub bio: String,
          pub avatar_url: Option<String>,
      }

      impl UserProfile {
          pub fn new(user_id: u64) -> Self {
              Self {
                  user_id,
                  bio: String::new(),
                  avatar_url: None,
              }
          }

          pub fn with_bio(user_id: u64, bio: &str) -> Self {
              Self {
                  user_id,
                  bio: bio.to_string(),
                  avatar_url: None,
              }
          }

          pub fn set_avatar(&mut self, url: &str) {
              self.avatar_url = Some(url.to_string());
          }
      }
