# Scenario: handler.rs adds ownership-transfer functions for Resource — both
# transfer_ownership() which passes through, and take_and_return() which
# consumes and reconstructs a Resource.
#
# Diff: src/handler.rs adds two functions that take Resource by value (move).
#
# Reviewer questions:
#   Q1: "What does Resource::consume(self) do?" -> src/resource.rs (UNCHANGED)
#        shows consume() takes self by value and returns the inner String.
#   Q2: "Can we reconstruct a Resource after consuming?" -> src/resource.rs shows
#        Resource::new(data) constructor.
#
# Trap files (plausible but no dependency on Resource or handler):
#   - src/buffer.rs: buffer management with similar ownership patterns (into_inner,
#     take). Shares "consume/transfer" vocabulary but operates on Vec<u8>.
#   - src/pool.rs: object pool that recycles instances. Same "resource management"
#     domain but uses a different type entirely.

max_enrichment: 6.3
initial:
  src/lib.rs: |
    pub mod resource;
    pub mod handler;
    pub mod buffer;
    pub mod pool;
  src/resource.rs: |
    pub struct Resource {
        data: String,
        size: usize,
    }

    impl Resource {
        pub fn new(data: String) -> Self {
            let size = data.len();
            Self { data, size }
        }

        pub fn consume(self) -> String {
            self.data
        }

        pub fn size(&self) -> usize {
            self.size
        }
    }
  src/handler.rs: |
    use crate::resource::Resource;

    pub fn handle(resource: Resource) {
        println!("Handling resource of size {}", resource.size());
        let data = resource.consume();
        println!("Handled: {}", data);
    }
  src/buffer.rs: |
    pub struct Buffer {
        data: Vec<u8>,
        capacity: usize,
    }

    impl Buffer {
        pub fn new(capacity: usize) -> Self {
            Self {
                data: Vec::with_capacity(capacity),
                capacity,
            }
        }

        pub fn write(&mut self, bytes: &[u8]) {
            self.data.extend_from_slice(bytes);
        }

        pub fn into_inner(self) -> Vec<u8> {
            self.data
        }

        pub fn take(&mut self) -> Vec<u8> {
            std::mem::take(&mut self.data)
        }

        pub fn remaining(&self) -> usize {
            self.capacity.saturating_sub(self.data.len())
        }
    }
  src/pool.rs: |
    pub struct ObjectPool<T> {
        available: Vec<T>,
        max_size: usize,
    }

    impl<T> ObjectPool<T> {
        pub fn new(max_size: usize) -> Self {
            Self {
                available: Vec::new(),
                max_size,
            }
        }

        pub fn acquire(&mut self) -> Option<T> {
            self.available.pop()
        }

        pub fn release(&mut self, item: T) {
            if self.available.len() < self.max_size {
                self.available.push(item);
            }
        }

        pub fn available_count(&self) -> usize {
            self.available.len()
        }
    }

