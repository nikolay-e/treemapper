  src/handler.rs: |
    use crate::resource::Resource;

    pub fn handle(resource: Resource) {
        println!("Handling resource of size {}", resource.size());
        let data = resource.consume();
        println!("Handled: {}", data);
    }

    pub fn transfer_ownership(resource: Resource) -> Resource {
        println!("Transferring resource of size {}", resource.size());
        resource
    }

    pub fn take_and_return(mut resource: Resource) -> Resource {
        let original_size = resource.size();
        let mut data = resource.consume();
        data.push_str("_processed");
        let new_resource = Resource::new(data);
        println!("Processed: {} -> {} bytes", original_size, new_resource.size());
        new_resource
    }
