# Scenario: Entity gains #[derive(Clone)] and a duplicate() method; a new
# service.rs uses .clone() and .cloned() to work with Entity copies.
#
# Diff: src/entity.rs adds Clone derive and duplicate(); src/service.rs (NEW)
# imports Entity and uses clone-based patterns; src/lib.rs adds pub mod service.
#
# Reviewer questions:
#   Q1: "What fields does Entity clone?" -> src/entity.rs (CHANGED) has id: u64,
#        name: String, tags: Vec<String> — all Clone types, so derive works.
#   Q2: "Does lib.rs register the new module?" -> src/lib.rs (CHANGED) adds
#        pub mod service.
#
# Trap files (plausible but no dependency on Entity or its Clone impl):
#   - src/cache.rs: LRU cache that clones values internally via HashMap. Shares
#     "clone" usage but works with generic types, not Entity.
#   - src/snapshot.rs: creates snapshots of application state by deep-copying.
#     Same "duplication" domain but operates on its own State struct.

initial:
  src/lib.rs: |
    pub mod entity;
    pub mod cache;
    pub mod snapshot;
  src/entity.rs: |
    #[derive(Debug)]
    pub struct Entity {
        id: u64,
        name: String,
        tags: Vec<String>,
    }

    impl Entity {
        pub fn new(id: u64, name: String) -> Self {
            Self {
                id,
                name,
                tags: Vec::new(),
            }
        }

        pub fn add_tag(&mut self, tag: String) {
            self.tags.push(tag);
        }

        pub fn id(&self) -> u64 {
            self.id
        }

        pub fn name(&self) -> &str {
            &self.name
        }

        pub fn tags(&self) -> &[String] {
            &self.tags
        }
    }
  src/cache.rs: |
    use std::collections::HashMap;

    pub struct LruCache<K: std::hash::Hash + Eq + Clone, V: Clone> {
        map: HashMap<K, V>,
        max_size: usize,
    }

    impl<K: std::hash::Hash + Eq + Clone, V: Clone> LruCache<K, V> {
        pub fn new(max_size: usize) -> Self {
            Self {
                map: HashMap::new(),
                max_size,
            }
        }

        pub fn get(&self, key: &K) -> Option<V> {
            self.map.get(key).cloned()
        }

        pub fn insert(&mut self, key: K, value: V) {
            if self.map.len() >= self.max_size {
                if let Some(first_key) = self.map.keys().next().cloned() {
                    self.map.remove(&first_key);
                }
            }
            self.map.insert(key, value);
        }

        pub fn size(&self) -> usize {
            self.map.len()
        }
    }
  src/snapshot.rs: |
    #[derive(Clone)]
    pub struct AppState {
        pub version: u32,
        pub entries: Vec<String>,
    }

    pub struct SnapshotManager {
        history: Vec<AppState>,
    }

    impl SnapshotManager {
        pub fn new() -> Self {
            Self { history: Vec::new() }
        }

        pub fn take_snapshot(&mut self, state: &AppState) {
            self.history.push(state.clone());
        }

        pub fn restore_latest(&self) -> Option<AppState> {
            self.history.last().cloned()
        }

        pub fn snapshot_count(&self) -> usize {
            self.history.len()
        }
    }

