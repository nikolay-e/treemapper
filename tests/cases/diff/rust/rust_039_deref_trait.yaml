# Scenario: Wrapper<T> gains Deref and DerefMut implementations so it transparently
# delegates to the inner value. A new usage.rs demonstrates auto-deref calling
# String::len() and Vec::push() through the wrapper.
#
# Diff: src/wrapper.rs adds Deref/DerefMut impls; src/usage.rs (NEW) demonstrates
# transparent access; src/lib.rs adds pub mod usage.
#
# Reviewer questions:
#   Q1: "What does deref return?" -> src/wrapper.rs (CHANGED) shows Deref::Target = T,
#        deref returns &self.value, DerefMut returns &mut self.value.
#   Q2: "How does auto-deref work in practice?" -> src/usage.rs (NEW) calls
#        wrapped.len() and wrapped.push() directly through the Wrapper.
#
# Trap files (plausible but no dependency on Wrapper or its Deref impl):
#   - src/smart_ptr.rs: custom smart pointer with reference counting. Same "wrapper
#     around a value" pattern but its own type, no Wrapper<T> usage.
#   - src/newtype.rs: newtype wrappers for domain types (UserId, Email). Similar
#     "wrapper struct" pattern but no Deref, uses explicit .0 access.

max_enrichment: 4.7
initial:
  src/lib.rs: |
    pub mod wrapper;
    pub mod smart_ptr;
    pub mod newtype;
  src/wrapper.rs: |
    pub struct Wrapper<T> {
        value: T,
        label: String,
    }

    impl<T> Wrapper<T> {
        pub fn new(value: T, label: &str) -> Self {
            Self {
                value,
                label: label.to_string(),
            }
        }

        pub fn into_inner(self) -> T {
            self.value
        }

        pub fn label(&self) -> &str {
            &self.label
        }

        pub fn set_label(&mut self, label: &str) {
            self.label = label.to_string();
        }
    }
  src/smart_ptr.rs: |
    use std::ops::Deref;

    pub struct SharedPtr<T> {
        data: Box<T>,
        ref_count: usize,
    }

    impl<T> SharedPtr<T> {
        pub fn new(value: T) -> Self {
            Self {
                data: Box::new(value),
                ref_count: 1,
            }
        }

        pub fn ref_count(&self) -> usize {
            self.ref_count
        }
    }

    impl<T> Deref for SharedPtr<T> {
        type Target = T;
        fn deref(&self) -> &Self::Target {
            &self.data
        }
    }
  src/newtype.rs: |
    pub struct UserId(pub u64);
    pub struct Email(pub String);

    impl UserId {
        pub fn as_u64(&self) -> u64 {
            self.0
        }
    }

    impl Email {
        pub fn domain(&self) -> &str {
            self.0.split('@').nth(1).unwrap_or("")
        }

        pub fn local_part(&self) -> &str {
            self.0.split('@').next().unwrap_or("")
        }
    }

    impl std::fmt::Display for UserId {
        fn fmt(&self, f: &mut std::fmt::Formatter<'_>) -> std::fmt::Result {
            write!(f, "user:{}", self.0)
        }
    }

