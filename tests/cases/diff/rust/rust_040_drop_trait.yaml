  src/connection.rs: |
    use std::sync::atomic::{AtomicUsize, Ordering};

    static CONNECTION_COUNT: AtomicUsize = AtomicUsize::new(0);

    pub struct Connection {
        host: String,
        port: u16,
        connected: bool,
        id: usize,
    }

    impl Connection {
        pub fn new(host: &str, port: u16) -> Self {
            let id = CONNECTION_COUNT.fetch_add(1, Ordering::SeqCst);
            println!("Creating connection {} to {}:{}", id, host, port);
            Self {
                host: host.to_string(),
                port,
                connected: true,
                id,
            }
        }

        pub fn disconnect(&mut self) {
            if self.connected {
                println!("Disconnecting connection {} from {}:{}", self.id, self.host, self.port);
                self.connected = false;
            }
        }

        pub fn is_connected(&self) -> bool {
            self.connected
        }

        pub fn host(&self) -> &str {
            &self.host
        }

        pub fn port(&self) -> u16 {
            self.port
        }

        pub fn id(&self) -> usize {
            self.id
        }
    }

    pub fn active_connections() -> usize {
        CONNECTION_COUNT.load(Ordering::SeqCst)
    }
  src/file_handle.rs: |
    use std::fs::File;
    use std::io::{self, Write, Read};
    use std::path::PathBuf;

    pub struct FileHandle {
        file: File,
        path: PathBuf,
        bytes_written: usize,
    }

    impl FileHandle {
        pub fn create(path: &str) -> io::Result<Self> {
            let file = File::create(path)?;
            Ok(Self {
                file,
                path: PathBuf::from(path),
                bytes_written: 0,
            })
        }

        pub fn write_data(&mut self, data: &[u8]) -> io::Result<()> {
            self.file.write_all(data)?;
            self.bytes_written += data.len();
            Ok(())
        }

        pub fn path(&self) -> &str {
            self.path.to_str().unwrap_or("")
        }

        pub fn bytes_written(&self) -> usize {
            self.bytes_written
        }
    }

    impl Drop for FileHandle {
        fn drop(&mut self) {
            let _ = self.file.flush();
            println!("Closing file: {} ({} bytes written)", self.path(), self.bytes_written);
        }
    }
  src/transaction.rs: |
    pub enum TransactionState {
        Active,
        Committed,
        RolledBack,
    }

    pub struct Transaction {
        id: String,
        state: TransactionState,
        operations: Vec<String>,
    }

    impl Transaction {
        pub fn begin(id: &str) -> Self {
            println!("BEGIN transaction {}", id);
            Self {
                id: id.to_string(),
                state: TransactionState::Active,
                operations: Vec::new(),
            }
        }

        pub fn execute(&mut self, op: &str) {
            self.operations.push(op.to_string());
        }

        pub fn commit(&mut self) {
            self.state = TransactionState::Committed;
            println!("COMMIT transaction {} ({} ops)", self.id, self.operations.len());
        }
    }

    impl Drop for Transaction {
        fn drop(&mut self) {
            if matches!(self.state, TransactionState::Active) {
                println!("ROLLBACK transaction {} (auto)", self.id);
                self.state = TransactionState::RolledBack;
            }
        }
    }
  src/logger.rs: |
    pub struct Logger {
        prefix: String,
        level: LogLevel,
    }

    #[derive(Clone, Copy, PartialEq, PartialOrd)]
    pub enum LogLevel {
        Debug,
        Info,
        Warn,
        Error,
    }

    impl Logger {
        pub fn new(prefix: &str, level: LogLevel) -> Self {
            Self {
                prefix: prefix.to_string(),
                level,
            }
        }

        pub fn info(&self, msg: &str) {
            if self.level <= LogLevel::Info {
                println!("[{}][INFO] {}", self.prefix, msg);
            }
        }

        pub fn error(&self, msg: &str) {
            if self.level <= LogLevel::Error {
                println!("[{}][ERROR] {}", self.prefix, msg);
            }
        }

        pub fn with_context(&self, host: &str, port: u16) -> String {
            format!("[{}] {}:{}", self.prefix, host, port)
        }
    }

