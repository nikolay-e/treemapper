# Scenario: Connection gains a Drop impl for auto-disconnect, an ACTIVE_CONNECTIONS
# counter, and uptime tracking. New ConnectionPool and ScopedConnection types
# also implement Drop, plus a Resource trait with ResourceGuard<T: Resource>.
#
# Diff: src/connection.rs adds Drop impls for Connection, ConnectionPool,
# ScopedConnection, and a generic ResourceGuard<T: Resource>.
#
# Reviewer questions:
#   Q1: "What cleanup happens on drop?" -> src/connection.rs (CHANGED) shows
#        Connection::drop auto-disconnects and decrements ACTIVE_CONNECTIONS.
#   Q2: "Is the drop ordering correct for nested types?" -> ConnectionPool::drop
#        logs before inner connections are dropped, ScopedConnection holds &mut pool.
#
# Trap files (plausible but no dependency on Connection or its Drop semantics):
#   - src/file_handle.rs: wraps File with auto-close. Same "RAII cleanup" domain
#     and implements Drop, but operates on files, not network connections.
#   - src/transaction.rs: database transaction with commit/rollback on drop.
#     Same "cleanup on scope exit" pattern but independent type and logic.
#   - src/logger.rs: structured logging with connection metadata fields. Shares
#     "connection" vocabulary (host, port) but only formats strings.

