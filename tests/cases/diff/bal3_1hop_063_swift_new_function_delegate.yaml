    Sources/Auth/AuthManager.swift: |
      import Foundation

      protocol AuthDelegate: AnyObject {
          func authDidLogin(user: String)
          func authDidLogout()
          func authDidRefreshToken(user: String, newExpiry: Date)
      }

      class AuthManager {
          weak var delegate: AuthDelegate?
          private var currentUser: String?
          private var tokenExpiry: Date?

          func login(username: String, password: String) {
              currentUser = username
              tokenExpiry = Date().addingTimeInterval(3600)
              delegate?.authDidLogin(user: username)
          }

          func logout() {
              currentUser = nil
              tokenExpiry = nil
              delegate?.authDidLogout()
          }

          func refreshToken() {
              guard let user = currentUser else { return }
              let newExpiry = Date().addingTimeInterval(3600)
              tokenExpiry = newExpiry
              delegate?.authDidRefreshToken(user: user, newExpiry: newExpiry)
          }
      }
