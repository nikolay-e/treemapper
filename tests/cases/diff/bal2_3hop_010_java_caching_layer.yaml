      package com.app.service;

      import com.app.cache.CacheStore;
      import com.app.cache.CacheEntry;

      public class CachedUserService {
          private final CacheStore cache;
          public CachedUserService(CacheStore cache) {
              this.cache = cache;
          }
          public String getUser(String id) {
              CacheEntry entry = cache.get(id);
              if (entry != null) {
                  return (String) entry.getValue();
              }
              String user = "user-" + id;
              cache.put(new CacheEntry(id, user));
              return user;
          }
      }
