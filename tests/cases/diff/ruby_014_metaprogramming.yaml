    lib/config.rb: |
      require_relative 'dsl'

      class Config
        include DSL

        define_accessors :host, :port, :debug, :timeout
        define_validators :host, :port

        def initialize(host: 'localhost', port: 3000, debug: false, timeout: 30)
          @host = host
          @port = port
          @debug = debug
          @timeout = timeout
        end

        def valid?
          validate_host && validate_port
        end
      end
