      package com.app.service;

      import com.app.util.MoneyUtil;

      public class InvoiceService {
          public double computeInvoiceAmount(double subtotal, double taxRate) {
              double tax = MoneyUtil.roundCents(subtotal * taxRate);
              return MoneyUtil.roundCents(subtotal + tax);
          }
      }
