      public class MoneyUtil {
          public static double roundCents(double amount) {
              return Math.round(amount * 100.0) / 100.0;
          }
      }
    src/main/java/com/app/service/OrderService.java: |
      package com.app.service;

      import com.app.util.MoneyUtil;
      import java.util.List;

      public class OrderService {
          public double calculateTotal(List<Double> prices) {
              double total = 0;
              for (double price : prices) {
                  total += MoneyUtil.roundCents(price);
              }
              return MoneyUtil.roundCents(total);
          }

          public String formatReceipt(List<Double> prices) {
              double total = calculateTotal(prices);
              return String.format("Total: $%.2f", total);
          }
      }
