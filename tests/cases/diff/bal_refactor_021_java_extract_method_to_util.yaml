    src/main/java/com/app/service/OrderService.java: |
      package com.app.service;

      import java.util.List;

      public class OrderService {
          public double calculateTotal(List<Double> prices) {
              double total = 0;
              for (double price : prices) {
                  double rounded = Math.round(price * 100.0) / 100.0;
                  total += rounded;
              }
              return Math.round(total * 100.0) / 100.0;
          }

          public String formatReceipt(List<Double> prices) {
              double total = calculateTotal(prices);
              return String.format("Total: $%.2f", total);
          }
      }
    src/main/java/com/app/service/InvoiceService.java: |
      package com.app.service;

      public class InvoiceService {
          public double computeInvoiceAmount(double subtotal, double taxRate) {
              double tax = subtotal * taxRate;
              double rounded = Math.round(tax * 100.0) / 100.0;
              return Math.round((subtotal + rounded) * 100.0) / 100.0;
          }
      }
    src/main/java/com/app/controller/OrderController.java: |
      package com.app.controller;

      import com.app.service.OrderService;
      import java.util.List;

      public class OrderController {
          private final OrderService orderService;

          public OrderController(OrderService orderService) {
              this.orderService = orderService;
          }

          public String handleOrder(List<Double> prices) {
              return orderService.formatReceipt(prices);
          }
      }
