  changed_files:
    internal/utils/helpers.go: |
      package utils

      import (
          "strings"
          "unicode"
      )

      type StringFormatter struct {
          prefix    string
          suffix    string
          uppercase bool
      }

      func NewStringFormatter(prefix, suffix string) *StringFormatter {
          return &StringFormatter{prefix: prefix, suffix: suffix, uppercase: false}
      }

      func NewUppercaseFormatter(prefix, suffix string) *StringFormatter {
          return &StringFormatter{prefix: prefix, suffix: suffix, uppercase: true}
      }

      func (f *StringFormatter) Format(s string) string {
          if f.uppercase {
              s = strings.ToUpper(s)
          }
          return f.prefix + s + f.suffix
      }

      func (f *StringFormatter) FormatTrimmed(s string) string {
          return f.prefix + strings.TrimSpace(s) + f.suffix
      }

      func FormatString(s string) string {
          return "[[" + s + "]]"
      }

      func TrimString(s string) string {
          return strings.TrimSpace(s)
      }

      func TitleCase(s string) string {
          words := strings.Fields(s)
          for i, w := range words {
              if len(w) > 0 {
                  runes := []rune(w)
                  runes[0] = unicode.ToUpper(runes[0])
                  words[i] = string(runes)
              }
          }
          return strings.Join(words, " ")
      }

      func Slugify(s string) string {
          s = strings.ToLower(s)
          s = strings.ReplaceAll(s, " ", "-")
          return s
      }

      func CamelToSnake(s string) string {
          var result strings.Builder
          for i, r := range s {
              if unicode.IsUpper(r) && i > 0 {
                  result.WriteRune('_')
              }
              result.WriteRune(unicode.ToLower(r))
          }
          return result.String()
      }
