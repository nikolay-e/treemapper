xfail:
  category: weak-csharp-discovery
repo:
  initial_files:
    src/Core/IMessageBroker.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Core
      {
          public interface IMessageBroker
          {
              void Publish(string topic, string message);
              void Subscribe(string topic, Action<string> handler);
          }
      }
    src/Services/OrderNotifier.cs: |
      using System;
      using App.Core;

      namespace App.Services
      {
          public class OrderNotifier
          {
              private readonly IMessageBroker _broker;

              public OrderNotifier(IMessageBroker broker)
              {
                  _broker = broker;
              }

              public void NotifyOrderCreated(int orderId)
              {
                  _broker.Publish("orders.created", orderId.ToString());
              }

              public void NotifyOrderShipped(int orderId)
              {
                  _broker.Publish("orders.shipped", orderId.ToString());
              }
          }
      }
    src/Services/InventorySync.cs: |
      using System;
      using App.Core;

      namespace App.Services
      {
          public class InventorySync
          {
              private readonly IMessageBroker _broker;

              public InventorySync(IMessageBroker broker)
              {
                  _broker = broker;
                  _broker.Subscribe("orders.created", HandleOrderCreated);
              }

              private void HandleOrderCreated(string message)
              {
                  Console.WriteLine($"Syncing inventory for order {message}");
              }
          }
      }
    src/Services/AuditLogger.cs: |
      using System;
      using App.Core;

      namespace App.Services
      {
          public class AuditLogger
          {
              private readonly IMessageBroker _broker;

              public AuditLogger(IMessageBroker broker)
              {
                  _broker = broker;
                  _broker.Subscribe("orders.created", LogEvent);
                  _broker.Subscribe("orders.shipped", LogEvent);
              }

              private void LogEvent(string message)
              {
                  Console.WriteLine($"[AUDIT] {DateTime.UtcNow}: {message}");
              }
          }
      }
    src/Services/EmailDispatcher.cs: |
      using System;
      using App.Core;

      namespace App.Services
      {
          public class EmailDispatcher
          {
              private readonly IMessageBroker _broker;

              public EmailDispatcher(IMessageBroker broker)
              {
                  _broker = broker;
                  _broker.Subscribe("orders.shipped", SendShipmentEmail);
              }

              private void SendShipmentEmail(string message)
              {
                  Console.WriteLine($"Sending shipment email for {message}");
              }
          }
      }
    src/Utils/StringHelper.cs: |
      using System;
      GARBAGE_076_STRING_PAD_A = 20;
      GARBAGE_076_TRIM_MODE_B = "both";

      namespace App.Utils
      {
          public static class StringHelper
          {
              public static string Truncate(string input, int maxLength)
              {
                  return input.Length <= maxLength ? input : input.Substring(0, maxLength);
              }
          }
      }
    src/Utils/MathHelper.cs: |
      using System;
      GARBAGE_076_PRECISION_C = 6;
      GARBAGE_076_ROUNDING_D = "half_up";

      namespace App.Utils
      {
          public static class MathHelper
          {
              public static double Round(double value, int decimals)
              {
                  return Math.Round(value, decimals);
              }
          }
      }
    src/Config/AppSettings.cs: |
      using System;
      GARBAGE_076_ENV_NAME_E = "production";
