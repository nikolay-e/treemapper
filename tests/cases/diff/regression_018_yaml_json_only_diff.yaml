name: regression_018_yaml_json_only_diff
tags:
- lang:typescript
- change:multi_file
- change:config
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    .pre-commit-config.yaml: |
      repos:
        - repo: https://github.com/pre-commit/pre-commit-hooks
          rev: v4.5.0
          hooks:
            - id: trailing-whitespace
    .github/workflows/ci.yml: |
      name: CI
      on: [push]
      jobs:
        build:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
    package.json: |
      {
        "name": "myapp",
        "version": "1.0.0",
        "dependencies": {
          "express": "^4.18.0"
        }
      }
    src/server.ts: |
      import express from 'express';
      import { authMiddleware } from './middleware/auth';

      const app = express();
      app.use(express.json());
      app.use(authMiddleware);

      app.get('/health', (req, res) => {
          res.json({ status: 'ok' });
      });

      app.get('/api/users', (req, res) => {
          res.json({ users: [] });
      });

      app.listen(3000, () => {
          console.log('Server running on port 3000');
      });
    src/middleware/auth.ts: |
      import { Request, Response, NextFunction } from 'express';

      export function authMiddleware(req: Request, res: Response, next: NextFunction): void {
          const token = req.headers.authorization;
          if (!token) {
              res.status(401).json({ error: 'Unauthorized' });
              return;
          }
          if (!token.startsWith('Bearer ')) {
              res.status(401).json({ error: 'Invalid token format' });
              return;
          }
          next();
      }

      export function optionalAuth(req: Request, res: Response, next: NextFunction): void {
          const token = req.headers.authorization;
          if (token && token.startsWith('Bearer ')) {
              req.user = { authenticated: true };
          }
          next();
      }
    tsconfig.json: |
      {
        "compilerOptions": {
          "target": "ES2020",
          "module": "commonjs",
          "strict": true,
          "esModuleInterop": true,
          "outDir": "./dist",
          "rootDir": "./src"
        },
        "include": ["src/**/*"],
        "exclude": ["node_modules", "dist"]
      }
  changed_files:
    .pre-commit-config.yaml: |
      repos:
        - repo: https://github.com/pre-commit/pre-commit-hooks
          rev: v5.0.0
          hooks:
            - id: trailing-whitespace
            - id: end-of-file-fixer
            - id: check-yaml
        - repo: https://github.com/gitleaks/gitleaks
          rev: v8.21.0
          hooks:
            - id: gitleaks
    .github/workflows/ci.yml: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        lint:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - name: Lint
              run: npm run lint
        build:
          runs-on: ubuntu-latest
          needs: lint
          steps:
            - uses: actions/checkout@v4
            - name: Install
              run: npm ci
            - name: Build
              run: npm run build
    package.json: |
      {
        "name": "myapp",
        "version": "2.0.0",
        "dependencies": {
          "express": "^5.0.0",
          "helmet": "^7.0.0"
        },
        "devDependencies": {
          "eslint": "^9.0.0",
          "prettier": "^3.0.0"
        },
        "scripts": {
          "lint": "eslint .",
          "build": "tsc",
          "start": "node dist/index.js"
        }
      }
    src/server.ts: |
      import express from 'express';
      import { authMiddleware } from './middleware/auth';

      const app = express();
      app.use(express.json());
      app.use(authMiddleware);

      app.get('/health', (req, res) => {
          res.json({ status: 'ok' });
      });

      app.get('/api/users', (req, res) => {
          res.json({ users: [] });
      });

      app.listen(3000, () => {
          console.log('Server running on port 3000');
      });
    src/middleware/auth.ts: |
      import { Request, Response, NextFunction } from 'express';

      export function authMiddleware(req: Request, res: Response, next: NextFunction): void {
          const token = req.headers.authorization;
          if (!token) {
              res.status(401).json({ error: 'Unauthorized' });
              return;
          }
          if (!token.startsWith('Bearer ')) {
              res.status(401).json({ error: 'Invalid token format' });
              return;
          }
          next();
      }

      export function optionalAuth(req: Request, res: Response, next: NextFunction): void {
          const token = req.headers.authorization;
          if (token && token.startsWith('Bearer ')) {
              req.user = { authenticated: true };
          }
          next();
      }
    tsconfig.json: |
      {
        "compilerOptions": {
          "target": "ES2020",
          "module": "commonjs",
          "strict": true,
          "esModuleInterop": true,
          "outDir": "./dist",
          "rootDir": "./src"
        },
        "include": ["src/**/*"],
        "exclude": ["node_modules", "dist"]
      }
  commit_message: Update files
fragments:
- id: pre_commit_config
  selector:
    path: .pre-commit-config.yaml
    anchor: gitleaks
- id: ci
  selector:
    path: .github/workflows/ci.yml
    anchor: 'needs: lint'
- id: package
  selector:
    path: package.json
    anchor: '"version": "2.0.0"'
- id: no_server
  selector:
    path: src/server.ts
- id: no_auth
  selector:
    path: src/middleware/auth.ts
- id: no_tsconfig
  selector:
    path: tsconfig.json
- id: no_global_0
  selector:
    anchor: authMiddleware
- id: no_global_1
  selector:
    anchor: app.listen
- id: no_global_2
  selector:
    anchor: optionalAuth
- id: no_global_3
  selector:
    anchor: Invalid token format
- id: no_global_4
  selector:
    anchor: esModuleInterop
oracle:
  required:
  - pre_commit_config
  - ci
  - package
  allowed: []
  forbidden:
  - no_server
  - no_auth
  - no_tsconfig
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
