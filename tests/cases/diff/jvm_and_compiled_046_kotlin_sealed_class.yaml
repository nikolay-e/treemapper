repo:
  initial_files:
    src/main/kotlin/com/example/Result.kt: |
      package com.example

      sealed class Result<out T> {
          data class Success<T>(val data: T) : Result<T>()
          data class Error(val message: String) : Result<Nothing>()
      }
    src/main/kotlin/com/example/Handler.kt: |
      package com.example

      fun handleResult(result: Result<String>) {
          when (result) {
              is Result.Success -> println(result.data)
              is Result.Error -> println(result.message)
          }
      }

      fun processResult(result: Result<Int>): String {
          return when (result) {
              is Result.Success -> "Value: ${result.data}"
              is Result.Error -> "Error: ${result.message}"
          }
      }
    src/main/kotlin/com/example/NetworkState.kt: |
      package com.example

      sealed class NetworkState {
          data object Idle : NetworkState()
          data object Connecting : NetworkState()
          data class Connected(val latency: Long) : NetworkState()
          data class Disconnected(val reason: String) : NetworkState()
      }

      fun describeState(state: NetworkState): String = when (state) {
          is NetworkState.Idle -> "Idle"
          is NetworkState.Connecting -> "Connecting..."
          is NetworkState.Connected -> "Connected (${state.latency}ms)"
          is NetworkState.Disconnected -> "Disconnected: ${state.reason}"
      }
    src/main/kotlin/com/example/ResultMapper.kt: |
      package com.example

      data class ApiResponseDto(val data: Any?, val error: String?, val status: String)

      fun <T> mapToResponse(result: Result<T>): ApiResponseDto = when (result) {
          is Result.Success -> ApiResponseDto(result.data, null, "success")
          is Result.Error -> ApiResponseDto(null, result.message, "error")
      }
    src/main/kotlin/com/example/ResultExtensions.kt: |
      package com.example

      fun <T, R> Result<T>.map(transform: (T) -> R): Result<R> = when (this) {
          is Result.Success -> Result.Success(transform(data))
          is Result.Error -> Result.Error(message)
      }

      fun <T, R> Result<T>.flatMap(transform: (T) -> Result<R>): Result<R> = when (this) {
          is Result.Success -> transform(data)
          is Result.Error -> Result.Error(message)
      }

      fun <T> Result<T>.getOrElse(default: T): T = when (this) {
          is Result.Success -> data
          is Result.Error -> default
      }
    src/main/kotlin/com/example/ErrorHandler.kt: |
      package com.example

      object ErrorHandler {
          fun handle(error: Result.Error) {
              println("Error occurred: ${error.message}")
          }

          fun toUserMessage(error: Result.Error): String {
              return when {
                  error.message.contains("timeout") -> "Request timed out"
                  error.message.contains("auth") -> "Authentication failed"
                  else -> "An error occurred"
              }
          }
      }
    src/main/kotlin/com/example/ApiResponse.kt: |
      package com.example

      sealed class ApiResponse<out T> {
          data class Ok<T>(val body: T, val statusCode: Int = 200) : ApiResponse<T>()
          data class ClientError(val statusCode: Int, val message: String) : ApiResponse<Nothing>()
          data class ServerError(val statusCode: Int, val message: String) : ApiResponse<Nothing>()
      }
