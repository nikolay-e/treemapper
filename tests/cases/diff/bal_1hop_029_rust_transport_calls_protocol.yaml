  changed_files:
    src/protocol/frame.rs: |
      pub const MAX_FRAME_SIZE: u32 = 1_048_576;

      pub struct Frame {
          pub opcode: u8,
          pub payload: Vec<u8>,
          pub length: u32,
          pub checksum: u32,
      }

      impl Frame {
          pub fn new(opcode: u8, payload: Vec<u8>) -> Self {
              let length = payload.len() as u32;
              let checksum = Self::compute_checksum(&payload);
              Frame { opcode, payload, length, checksum }
          }

          fn compute_checksum(data: &[u8]) -> u32 {
              data.iter().fold(0u32, |acc, &b| acc.wrapping_add(b as u32))
          }

          pub fn encode(&self) -> Vec<u8> {
              let mut buf = Vec::new();
              buf.push(self.opcode);
              buf.extend_from_slice(&self.length.to_be_bytes());
              buf.extend_from_slice(&self.checksum.to_be_bytes());
              buf.extend_from_slice(&self.payload);
              buf
          }

          pub fn decode(data: &[u8]) -> Result<Self, String> {
              if data.len() < 9 {
                  return Err("frame too short".to_string());
              }
              let opcode = data[0];
              let length = u32::from_be_bytes([data[1], data[2], data[3], data[4]]);
              if length > MAX_FRAME_SIZE {
                  return Err(format!("frame too large: {} bytes", length));
              }
              let checksum = u32::from_be_bytes([data[5], data[6], data[7], data[8]]);
              let end = 9 + length as usize;
              if data.len() < end {
                  return Err("incomplete frame".to_string());
              }
              let payload = data[9..end].to_vec();
              let computed = Self::compute_checksum(&payload);
              if computed != checksum {
                  return Err("checksum mismatch".to_string());
              }
              Ok(Frame { opcode, payload, length, checksum })
          }
      }
  commit_message: "fix: add checksum verification and max frame size to protocol"
