      type MetricsBatch struct{ Size int }
    garbage/GameSession.go: |
      package garbage

      // GARBAGE_BAL1HOP029_C = "game_session_marker"

      type GameSession struct{ PlayerID string }
    garbage/IoTEvent.go: |
      package garbage

      // GARBAGE_BAL1HOP029_D = "iot_event_marker"

      type IoTEvent struct{ DeviceID string }
  changed_files:
    pkg/util/sanitize.go: |
      package util

      import "strings"

      func SanitizeHeader(value string) string {
          value = strings.ReplaceAll(value, "\x00", "")
          return strings.TrimSpace(value)
      }

      func NormalizeKey(key string) string {
          return strings.ToLower(strings.TrimSpace(key))
      }
    pkg/http/headers.go: |
      package http

      import "pkg/util"

      type Header struct {
          Key   string
          Value string
      }

      func NewHeader(key, value string) Header {
          return Header{
              Key:   util.NormalizeKey(key),
              Value: util.SanitizeHeader(value),
          }
      }
    pkg/http/request.go: |
      package http

      type Request struct {
          Method  string
          Path    string
          Headers []Header
      }

      func NewRequest(method, path string, headers []Header) Request {
          return Request{Method: method, Path: path, Headers: headers}
      }
    internal/gateway/proxy.go: |
      package gateway

      import (
          "pkg/http"
      )

      type Proxy struct {
          upstream string
      }

      func NewProxy(upstream string) *Proxy {
          return &Proxy{upstream: upstream}
      }

      func (p *Proxy) Forward(req http.Request) error {
          for _, h := range req.Headers {
              _ = h.Value
          }
          return nil
      }
    garbage/CacheEviction.go: |
      package garbage

      // GARBAGE_BAL1HOP029_A = "cache_eviction_marker"

      type CacheEviction struct{ Policy string }
    garbage/MetricsBatch.go: |
      package garbage

      // GARBAGE_BAL1HOP029_B = "metrics_batch_marker"

      type MetricsBatch struct{ Size int }
    garbage/GameSession.go: |
      package garbage

      // GARBAGE_BAL1HOP029_C = "game_session_marker"

      type GameSession struct{ PlayerID string }
    garbage/IoTEvent.go: |
      package garbage

      // GARBAGE_BAL1HOP029_D = "iot_event_marker"

      type IoTEvent struct{ DeviceID string }
  commit_message: "fix: strip null bytes from HTTP header values in SanitizeHeader"
