repo:
  initial_files:
    src/protocol/frame.rs: |
      pub struct Frame {
          pub opcode: u8,
          pub payload: Vec<u8>,
          pub length: u32,
      }

      impl Frame {
          pub fn new(opcode: u8, payload: Vec<u8>) -> Self {
              let length = payload.len() as u32;
              Frame { opcode, payload, length }
          }

          pub fn encode(&self) -> Vec<u8> {
              let mut buf = Vec::new();
              buf.push(self.opcode);
              buf.extend_from_slice(&self.length.to_be_bytes());
              buf.extend_from_slice(&self.payload);
              buf
          }

          pub fn decode(data: &[u8]) -> Result<Self, String> {
              if data.len() < 5 {
                  return Err("frame too short".to_string());
              }
              let opcode = data[0];
              let length = u32::from_be_bytes([data[1], data[2], data[3], data[4]]);
              let payload = data[5..5 + length as usize].to_vec();
              Ok(Frame { opcode, payload, length })
          }
      }
    src/protocol/opcodes.rs: |
      pub const OP_DATA: u8 = 0x01;
      pub const OP_ACK: u8 = 0x02;
      pub const OP_PING: u8 = 0x03;
      pub const OP_PONG: u8 = 0x04;
      pub const OP_CLOSE: u8 = 0x05;
    src/transport/connection.rs: |
      use crate::protocol::frame::Frame;
      use crate::protocol::opcodes;

      pub struct Connection {
          buffer: Vec<u8>,
          connected: bool,
      }

      impl Connection {
          pub fn new() -> Self {
              Connection {
                  buffer: Vec::new(),
                  connected: true,
              }
          }

          pub fn send(&mut self, data: &[u8]) -> Result<(), String> {
              if !self.connected {
                  return Err("not connected".to_string());
              }
              let frame = Frame::new(opcodes::OP_DATA, data.to_vec());
              self.buffer.extend_from_slice(&frame.encode());
              Ok(())
          }

          pub fn recv(&mut self) -> Result<Frame, String> {
              if self.buffer.is_empty() {
                  return Err("no data".to_string());
              }
              Frame::decode(&self.buffer)
          }

          pub fn close(&mut self) {
              self.connected = false;
          }
      }
    src/transport/pool.rs: |
      use super::connection::Connection;

      pub struct ConnectionPool {
          connections: Vec<Connection>,
          max_size: usize,
      }

      impl ConnectionPool {
          pub fn new(max_size: usize) -> Self {
              ConnectionPool {
                  connections: Vec::new(),
                  max_size,
              }
          }

          pub fn acquire(&mut self) -> Option<&mut Connection> {
              self.connections.first_mut()
          }
      }
