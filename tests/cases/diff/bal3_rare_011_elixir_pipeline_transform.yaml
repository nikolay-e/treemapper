repo:
  initial_files:
    lib/transform.ex: |
      defmodule Transform do
        def normalize(text) do
          text
          |> String.trim()
          |> String.downcase()
        end

        def tokenize(text) do
          text
          |> normalize()
          |> String.split(~r/\s+/)
        end

        def word_count(text) do
          text
          |> tokenize()
          |> length()
        end
      end
    lib/analyzer.ex: |
      defmodule Analyzer do
        def analyze(text) do
          tokens = Transform.tokenize(text)
          count = Transform.word_count(text)
          %{tokens: tokens, count: count}
        end

        def summary(text) do
          normalized = Transform.normalize(text)
          "Normalized: #{normalized} (#{Transform.word_count(text)} words)"
        end
      end
    lib/exporter.ex: |
      defmodule Exporter do
        @garbage_rare_011_export_a "csv"
        @garbage_rare_011_delim_b ","

        def to_csv(data), do: Enum.join(data, ",")
      end
    lib/importer.ex: |
      defmodule Importer do
        @garbage_rare_011_import_c "json"
        @garbage_rare_011_strict_d true

        def from_json(json), do: json
      end
    lib/formatter.ex: |
      defmodule Formatter do
        @garbage_rare_011_fmt_e "html"
        @garbage_rare_011_escape_f true

        def to_html(text), do: "<p>#{text}</p>"
      end
  changed_files:
    lib/transform.ex: |
      defmodule Transform do
        def normalize(text) do
          text
          |> String.trim()
          |> String.downcase()
          |> String.replace(~r/[^\w\s]/, "")
        end

        def tokenize(text) do
          text
          |> normalize()
          |> String.split(~r/\s+/)
          |> Enum.reject(&(&1 == ""))
        end

        def word_count(text) do
          text
          |> tokenize()
          |> length()
        end

        def unique_words(text) do
          text
          |> tokenize()
          |> Enum.uniq()
        end
      end
  commit_message: "strip punctuation, filter empties, add unique_words"
