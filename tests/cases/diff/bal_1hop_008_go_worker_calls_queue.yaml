          println("span:", name)
      }

      func EndSpan(name string) {
          println("end:", name)
      }
  changed_files:
    internal/queue/broker.go: |
      package queue

      import "context"

      type Message struct {
          Topic   string
          Payload []byte
          Headers map[string]string
      }

      type Broker struct {
          ch chan *Message
      }

      func NewBroker(size int) *Broker {
          return &Broker{ch: make(chan *Message, size)}
      }

      func (b *Broker) Publish(ctx context.Context, msg *Message) error {
          select {
          case b.ch <- msg:
              return nil
          case <-ctx.Done():
              return ctx.Err()
          }
      }

      func (b *Broker) Consume(ctx context.Context) (*Message, error) {
          select {
          case msg := <-b.ch:
              return msg, nil
          case <-ctx.Done():
              return nil, ctx.Err()
          }
      }
  commit_message: "feat: add context support to Broker Publish/Consume"
