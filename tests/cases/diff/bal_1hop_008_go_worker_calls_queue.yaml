repo:
  initial_files:
    internal/queue/broker.go: |
      package queue

      type Message struct {
          Topic   string
          Payload []byte
      }

      type Broker struct {
          ch chan *Message
      }

      func NewBroker(size int) *Broker {
          return &Broker{ch: make(chan *Message, size)}
      }

      func (b *Broker) Publish(msg *Message) {
          b.ch <- msg
      }

      func (b *Broker) Consume() *Message {
          return <-b.ch
      }
    internal/worker/processor.go: |
      package worker

      import (
          "fmt"
          "myapp/internal/queue"
      )

      type Processor struct {
          broker *queue.Broker
      }

      func NewProcessor(b *queue.Broker) *Processor {
          return &Processor{broker: b}
      }

      func (p *Processor) Run() {
          for {
              msg := p.broker.Consume()
              fmt.Printf("processing topic=%s len=%d\n", msg.Topic, len(msg.Payload))
          }
      }
    internal/storage/s3.go: |
      package storage

