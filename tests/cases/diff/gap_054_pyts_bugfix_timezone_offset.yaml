name: gap_054_pyts_bugfix_timezone_offset
tags:
- lang:rust
- change:bug_fix
- context:import_chain
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    src/queue/consumer.rs: |
      use crate::message::envelope::Envelope;

      pub struct Consumer {
          queue_name: String,
          prefetch: usize,
          processed: u64,
          failed: u64,
      }

      impl Consumer {
          pub fn new(queue_name: &str, prefetch: usize) -> Self {
              Consumer {
                  queue_name: queue_name.to_string(),
                  prefetch,
                  processed: 0,
                  failed: 0,
              }
          }

          pub fn handle(&mut self, envelope: &Envelope) -> Result<(), String> {
              match self.process_envelope(envelope) {
                  Ok(_) => {
                      self.processed += 1;
                      Ok(())
                  }
                  Err(e) => {
                      // BUG: failed counter never incremented
                      Err(e)
                  }
              }
          }

          fn process_envelope(&self, envelope: &Envelope) -> Result<(), String> {
              if envelope.payload.is_empty() {
                  return Err("empty payload".to_string());
              }
              Ok(())
          }

          pub fn stats(&self) -> (u64, u64) {
              (self.processed, self.failed)
          }
      }
    src/message/envelope.rs: |
      pub struct Envelope {
          pub id: String,
          pub payload: Vec<u8>,
          pub retry_count: u32,
      }

      impl Envelope {
          pub fn new(id: &str, payload: Vec<u8>) -> Self {
              Envelope { id: id.to_string(), payload, retry_count: 0 }
          }

          pub fn with_retry(mut self, count: u32) -> Self {
              self.retry_count = count;
              self
          }
      }
    src/monitoring/reporter.rs: |
      use crate::queue::consumer::Consumer;

      pub fn report_health(consumer: &Consumer) -> String {
          let (processed, failed) = consumer.stats();
          format!("processed={} failed={}", processed, failed)
      }
