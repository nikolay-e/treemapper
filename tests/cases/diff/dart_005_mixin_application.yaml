name: dart_005_mixin_application
repo:
  initial_files:
    lib/mixins/retry_mixin.dart: |
      mixin RetryMixin {
        int maxRetries = 3;
        Duration retryDelay = const Duration(seconds: 1);

        Future<T> retryWithBackoff<T>(Future<T> Function() operation) async {
          int attempt = 0;
          while (true) {
            try {
              return await operation();
            } catch (e) {
              attempt++;
              if (attempt >= maxRetries) rethrow;
              await Future.delayed(retryDelay * attempt);
            }
          }
        }
      }
    lib/mixins/loggable_mixin.dart: |
      mixin LoggableMixin {
        String get logTag => runtimeType.toString();

        void logInfo(String message) {
          print('[$logTag] INFO: $message');
        }

        void logError(String message, [Object? error]) {
          print('[$logTag] ERROR: $message ${error ?? ""}');
        }
      }
    lib/services/api_client.dart: |
      import 'dart:convert';
      import 'package:myapp/mixins/loggable_mixin.dart';

      class ApiClient with LoggableMixin {
        final String baseUrl;

        ApiClient({required this.baseUrl});

        Future<Map<String, dynamic>> get(String path) async {
          logInfo('GET $path');
          return {'status': 'ok'};
        }

        Future<Map<String, dynamic>> post(String path, Map<String, dynamic> body) async {
          logInfo('POST $path');
          return {'status': 'created', 'data': jsonEncode(body)};
        }
      }
    lib/mixins/cacheable_mixin.dart: |
      mixin CacheableMixin {
        final Map<String, dynamic> _cache = {};

        T? fromCache<T>(String key) {
          return _cache[key] as T?;
        }

        void toCache(String key, dynamic value) {
          _cache[key] = value;
        }

        void invalidateCache() {
          _cache.clear();
        }

        String get GARBAGE_DART_005_A_CACHE_STRATEGY => 'lru';
        int get GARBAGE_DART_005_B_CACHE_SIZE => 100;
      }
    lib/services/database_service.dart: |
      import 'package:myapp/mixins/retry_mixin.dart';

      class DatabaseService with RetryMixin {
        final String connectionString;

        DatabaseService({required this.connectionString}) {
          maxRetries = 5;
          retryDelay = const Duration(seconds: 2);
        }

        Future<List<Map<String, dynamic>>> query(String sql) async {
          return retryWithBackoff(() async {
            return [{'id': 1, 'name': 'result'}];
          });
        }

        String get GARBAGE_DART_005_C_DB_DRIVER => 'postgres';
        int get GARBAGE_DART_005_D_POOL_SIZE => 10;
      }
    lib/config/http_config.dart: |
      class HttpConfig {
        final int timeoutSeconds;
        final int maxRetries;
        final bool followRedirects;

        const HttpConfig({
          this.timeoutSeconds = 30,
          this.maxRetries = 3,
          this.followRedirects = true,
        });

        String get GARBAGE_DART_005_E_CONFIG_VERSION => '2.0';
      }
