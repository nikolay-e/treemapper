# Scenario: env.sh defines application path variables. setup.sh sources env.sh
# and uses those variables. The diff expands setup.sh to use advanced parameter
# expansion (default values, string length, case modification) on variables
# from env.sh.
#
# Diff: setup.sh adds mkdir calls, config file copy, and parameter expansion
# on APP_NAME, DATA_DIR, CONFIG_PATH from env.sh.
#
# Reviewer questions:
#   Q1: "What values do CONFIG_PATH and DATA_DIR hold?"
#       -> env.sh (UNCHANGED) exports CONFIG_PATH="/etc/myapp" and
#          DATA_DIR="/var/lib/myapp". Reviewer verifies mkdir targets.
#   Q2: "What is APP_NAME for the ${APP_NAME^^} expansion?"
#       -> env.sh exports APP_NAME="myapp". Reviewer confirms the
#          uppercase expansion makes sense.
#   Q3: "What does resolve_path do — is the call correct?"
#       -> env.sh defines resolve_path echoing "${base}/${sub}".
#          Reviewer verifies the 2-arg invocation in setup.sh.
#
# Not needed:
#   - paths.sh: defines PATH-related variables (BIN_DIR, LIB_DIR) — similar
#     "path config" pattern but not sourced by setup.sh. No source edge.
#   - defaults.sh: defines default values for optional settings — similar
#     "default value" theme but independent script with no dependency.
#   - install.sh: also sources env.sh and calls resolve_path. DIRECT structural
#     edge (same source dependency) but is a different consumer — how install.sh
#     uses the same variables doesn't help review setup.sh's expansion logic.
#   - validate_env.sh: checks that CONFIG_PATH and DATA_DIR exist. References
#     the EXACT same variable names as the diff, but is independent — doesn't
#     define them, just checks them.
#   - teardown.sh: reverse of setup — removes the same directories. References
#     CONFIG_PATH and DATA_DIR but doesn't help verify expansion correctness.
#   - lib/logging.sh: logging utility sourced by many scripts. Uses similar
#     "source ./lib/..." pattern but no dependency from setup.sh.

initial:
  lib/env.sh: |
    #!/bin/bash

    export CONFIG_PATH="/etc/myapp"
    export DATA_DIR="/var/lib/myapp"
    export APP_NAME="myapp"
    export LOG_DIR="/var/log/myapp"

    resolve_path() {
        local base=$1
        local sub=$2
        echo "${base}/${sub}"
    }

    get_app_version() {
        echo "1.2.3"
    }
  setup.sh: |
    #!/bin/bash
    source ./lib/env.sh

    echo "Setting up ${APP_NAME}..."
    mkdir -p "${CONFIG_PATH}"
  paths.sh: |
    #!/bin/bash

    export BIN_DIR="/usr/local/bin"
    export LIB_DIR="/usr/local/lib"
    export SHARE_DIR="/usr/local/share"

    add_to_path() {
        local dir=$1
        if [[ ":$PATH:" != *":$dir:"* ]]; then
            export PATH="$dir:$PATH"
        fi
    }

    ensure_dir_exists() {
        local dir=$1
        [[ -d "$dir" ]] || mkdir -p "$dir"
    }

    remove_from_path() {
        local dir=$1
        export PATH=$(echo "$PATH" | tr ':' '\n' | grep -v "^$dir$" | tr '\n' ':')
    }
  defaults.sh: |
    #!/bin/bash

    TIMEOUT="${TIMEOUT:-30}"
    RETRIES="${RETRIES:-3}"
    VERBOSE="${VERBOSE:-false}"
    LOG_FORMAT="${LOG_FORMAT:-text}"

    apply_defaults() {
        echo "Timeout: $TIMEOUT"
        echo "Retries: $RETRIES"
        echo "Verbose: $VERBOSE"
        echo "Log format: $LOG_FORMAT"
    }

    reset_defaults() {
        unset TIMEOUT RETRIES VERBOSE LOG_FORMAT
    }
  install.sh: |
    #!/bin/bash
    source ./lib/env.sh

    echo "Installing ${APP_NAME} to ${CONFIG_PATH}..."

    install_dir=$(resolve_path "$CONFIG_PATH" "bin")
    mkdir -p "$install_dir"

    cp -r dist/* "$install_dir/"
    chmod +x "$install_dir"/*.sh

    echo "Installed ${APP_NAME} version $(get_app_version)"
  validate_env.sh: |
    #!/bin/bash

    check_required_dirs() {
        local status=0
        for dir in "$CONFIG_PATH" "$DATA_DIR" "$LOG_DIR"; do
            if [[ ! -d "$dir" ]]; then
                echo "ERROR: Required directory missing: $dir"
                status=1
            fi
        done
        return $status
    }

    check_permissions() {
        local dir=$1
        if [[ ! -w "$dir" ]]; then
            echo "ERROR: No write permission on $dir"
            return 1
        fi
        return 0
    }

    validate_app_name() {
        if [[ -z "$APP_NAME" ]]; then
            echo "ERROR: APP_NAME is not set"
            return 1
        fi
        return 0
    }
  teardown.sh: |
    #!/bin/bash
    source ./lib/env.sh

    echo "Tearing down ${APP_NAME}..."

    rm -rf "${CONFIG_PATH}/conf.d"
    rm -rf "${DATA_DIR}/logs"
    rm -rf "${DATA_DIR}/cache"

    echo "Cleanup complete for ${APP_NAME}"

    remaining=$(find "${CONFIG_PATH}" -type f | wc -l)
    echo "Remaining files in config: $remaining"
  lib/logging.sh: |
    #!/bin/bash

    LOG_LEVEL="${LOG_LEVEL:-info}"
    LOG_FILE="/var/log/app.log"

    log_message() {
        local level=$1
        local message=$2
        local timestamp
        timestamp=$(date +"%Y-%m-%d %H:%M:%S")
        echo "[$timestamp] [$level] $message" >> "$LOG_FILE"
    }

    log_info() {
        log_message "INFO" "$1"
    }

    log_error() {
        log_message "ERROR" "$1"
    }

    rotate_logs() {
        local max_size=10485760
        local size
        size=$(stat -f%z "$LOG_FILE" 2>/dev/null || echo 0)
        if (( size > max_size )); then
            mv "$LOG_FILE" "${LOG_FILE}.1"
            touch "$LOG_FILE"
        fi
    }

changed:
  lib/env.sh: |
    #!/bin/bash

    export CONFIG_PATH="/etc/myapp"
    export DATA_DIR="/var/lib/myapp"
    export APP_NAME="myapp"
    export LOG_DIR="/var/log/myapp"

    resolve_path() {
        local base=$1
        local sub=$2
        echo "${base}/${sub}"
    }

    get_app_version() {
        echo "1.2.3"
    }
  setup.sh: |
    #!/bin/bash
    source ./lib/env.sh

    echo "Setting up ${APP_NAME}..."
    mkdir -p "${CONFIG_PATH}/conf.d"
    mkdir -p "${DATA_DIR}/logs"
    echo "Created directories for ${APP_NAME}"

    config_file=$(resolve_path "$CONFIG_PATH" "${APP_NAME}.conf")
    cp template.conf "$config_file"

    backup_name="${APP_NAME}_backup_$(date +%Y%m%d)"
    echo "Backup label: ${backup_name:-unnamed}"
    echo "Data dir length: ${#DATA_DIR}"
    echo "Upper name: ${APP_NAME^^}"

must_include_files:
  # Q1+Q2+Q3: env.sh defines CONFIG_PATH, DATA_DIR, APP_NAME, resolve_path
  - lib/env.sh
must_include_content_from:
  lib/env.sh:
    - 'export CONFIG_PATH="/etc/myapp"'
    - 'export APP_NAME="myapp"'
    - "resolve_path()"
  setup.sh:
    - "resolve_path"
    - "${APP_NAME^^}"
must_not_include:
  # paths.sh: PATH variable management, not sourced by setup.sh
  - BIN_DIR
  - LIB_DIR
  - add_to_path
  - remove_from_path
  # defaults.sh: default value patterns but independent script
  - TIMEOUT
  - RETRIES
  - apply_defaults
  - reset_defaults
  # install.sh: also sources env.sh but is a different consumer
  - "Installing"
  - "cp -r dist"
  - "chmod +x"
  # validate_env.sh: checks same vars but doesn't define them
  - check_required_dirs
  - check_permissions
  - validate_app_name
  # teardown.sh: reverse operation, not needed for understanding setup
  - "Tearing down"
  - "rm -rf"
  - "Cleanup complete"
  # lib/logging.sh: logging utility, no source edge from setup.sh
  - LOG_LEVEL
  - rotate_logs
  - log_info
must_not_include_files:
  - paths.sh
  - defaults.sh
  - install.sh
  - validate_env.sh
  - teardown.sh
  - lib/logging.sh
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
