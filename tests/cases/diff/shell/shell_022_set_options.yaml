  scripts/strict_wrapper.sh: |
    #!/bin/bash
    set -euo pipefail
    source ./lib/safety.sh

    trap_errors

    SCRIPT=$1
    shift
    if [[ -z "$SCRIPT" ]]; then
        die "Usage: $0 <script> [args...]"
    fi
    if [[ ! -x "$SCRIPT" ]]; then
        die "Script not executable: $SCRIPT"
    fi
    exec "$SCRIPT" "$@"
  lib/logging.sh: |
    #!/bin/bash
    LOG_FILE="${LOG_FILE:-/var/log/app.log}"

    log_info() {
        echo "[INFO] $(date +%T) $1" | tee -a "$LOG_FILE"
    }

    log_warn() {
        echo "[WARN] $(date +%T) $1" | tee -a "$LOG_FILE" >&2
    }

    log_error() {
        echo "[ERROR] $(date +%T) $1" | tee -a "$LOG_FILE" >&2
    }
  scripts/lint_strict.sh: |
    #!/bin/bash
    shellcheck -S error robust.sh
    shellcheck -S warning lib/safety.sh
    echo "Strict lint complete: $?"

must_include_files:
  - lib/safety.sh
  - robust.sh

must_include_content_from:
  lib/safety.sh:
    - "die()"
    - "trap_errors()"
    - "_default_error_handler"
  robust.sh:
    - "trap_errors"
    - "die"
    - "set -euo pipefail"

must_not_include:
  # --- debug.sh: set -x tracing ---
  - enable_debug
  - disable_debug
  - log_debug
  # --- signals.sh: SIGTERM handling ---
  - handle_sigterm
  - register_cleanup
  - CLEANUP_FUNCTIONS
  # --- strict_wrapper.sh: HARDEST TRAP, uses die + trap_errors ---
  - "Script not executable"
  - 'exec "$SCRIPT"'
  # --- logging.sh: related log/warn/error pattern ---
  - log_info
  - log_warn
  # --- lint_strict.sh: code quality tool ---
  - "shellcheck -S"
  - "Strict lint complete"

must_not_include_files:
  - debug.sh
  - signals.sh
  - scripts/strict_wrapper.sh
  - lib/logging.sh
  - scripts/lint_strict.sh

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
