# Scenario: service.sh adds restart and status branches to its case statement.
#
# Diff: service.sh adds restart (calls $0 stop then $0 start), status
# (reads PID_FILE), and updates usage string. Sources service_config.sh.
#
# Reviewer questions:
#   Q1: "What is SERVICE_NAME and where is the PID stored?"
#       -> service_config.sh: SERVICE_NAME="myapp", PID_FILE="/var/run/myapp.pid".
#
#   Q2: "What binary does APP_BIN refer to?"
#       -> service_config.sh: APP_BIN="./bin/app".
#
# Not needed for comprehension:
#   - scripts/monitor.sh: HTTP health check for same service.
#     STRUCTURAL TRAP: references SERVICE_NAME, same "myapp" string.
#     But health monitoring, not lifecycle management.
#
#   - scripts/logrotate.sh: Rotates logs for myapp.
#     STRUCTURAL TRAP: same LOG_DIR="/var/log/myapp".
#     But log management, not service lifecycle.
#
#   - scripts/install_service.sh: Creates systemd unit for myapp.
#     HARDEST TRAP: references SERVICE_NAME, APP_BIN, PID_FILE —
#     exact same variables from service_config.sh. Generates the
#     systemd unit that service.sh's case statement replaces.
#     But installation, not runtime operation.
#
#   - scripts/uninstall_service.sh: Removes systemd unit.
#     STRUCTURAL TRAP: references PID_FILE, SERVICE_NAME.
#     But teardown, not service control.
#
#   - config/service_config_staging.sh: Staging config.
#     STRUCTURAL TRAP: same variable names, different values.

max_enrichment: 6.7
initial:
  service.sh: |
    #!/bin/bash
    source ./service_config.sh

    case "$1" in
        start)
            echo "Starting $SERVICE_NAME..."
            $APP_BIN start
            ;;
        stop)
            echo "Stopping $SERVICE_NAME..."
            $APP_BIN stop
            ;;
        *)
            echo "Usage: $0 {start|stop}"
            exit 1
            ;;
    esac
  service_config.sh: |
    #!/bin/bash
    export SERVICE_NAME="myapp"
    export APP_BIN="./bin/app"
    export PID_FILE="/var/run/myapp.pid"
    export LOG_DIR="/var/log/myapp"
  scripts/monitor.sh: |
    #!/bin/bash
    source ./service_config.sh
    curl -sf "http://localhost:8080/health" > /dev/null && \
        echo "$SERVICE_NAME: healthy" || echo "$SERVICE_NAME: unhealthy"
  scripts/logrotate.sh: |
    #!/bin/bash
    source ./service_config.sh
    find "$LOG_DIR" -name "*.log" -mtime +7 -exec gzip {} \;
    echo "Logs rotated for $SERVICE_NAME"
  scripts/install_service.sh: |
    #!/bin/bash
    source ./service_config.sh
    cat > /etc/systemd/system/${SERVICE_NAME}.service <<EOF
    [Unit]
    Description=$SERVICE_NAME service
    [Service]
    ExecStart=$APP_BIN start
    PIDFile=$PID_FILE
    Restart=on-failure
    [Install]
    WantedBy=multi-user.target
    EOF
    systemctl daemon-reload
    echo "Service unit installed for $SERVICE_NAME"
  scripts/uninstall_service.sh: |
    #!/bin/bash
    source ./service_config.sh
    systemctl stop "$SERVICE_NAME" 2>/dev/null
    rm -f "/etc/systemd/system/${SERVICE_NAME}.service"
    rm -f "$PID_FILE"
    systemctl daemon-reload
    echo "Service $SERVICE_NAME uninstalled"
  config/service_config_staging.sh: |
    #!/bin/bash
    export SERVICE_NAME="myapp-staging"
    export APP_BIN="./bin/app-staging"
    export PID_FILE="/var/run/myapp-staging.pid"
    export LOG_DIR="/var/log/myapp-staging"

changed:
  service.sh: |
    #!/bin/bash
    source ./service_config.sh

    case "$1" in
        start)
            echo "Starting $SERVICE_NAME..."
            $APP_BIN start
            echo $! > "$PID_FILE"
            ;;
        stop)
            echo "Stopping $SERVICE_NAME..."
            $APP_BIN stop
            rm -f "$PID_FILE"
            ;;
        restart)
            $0 stop
            sleep 2
            $0 start
            ;;
        status)
            if [[ -f "$PID_FILE" ]]; then
                pid=$(cat "$PID_FILE")
                if kill -0 "$pid" 2>/dev/null; then
                    echo "$SERVICE_NAME is running (PID $pid)"
                else
                    echo "$SERVICE_NAME PID file exists but process is dead"
                fi
            else
                echo "$SERVICE_NAME is stopped"
            fi
            ;;
        *)
            echo "Usage: $0 {start|stop|restart|status}"
            exit 1
            ;;
    esac
  service_config.sh: |
    #!/bin/bash
    export SERVICE_NAME="myapp"
    export APP_BIN="./bin/app"
    export PID_FILE="/var/run/myapp.pid"
    export LOG_DIR="/var/log/myapp"
  scripts/monitor.sh: |
    #!/bin/bash
    source ./service_config.sh
    curl -sf "http://localhost:8080/health" > /dev/null && \
        echo "$SERVICE_NAME: healthy" || echo "$SERVICE_NAME: unhealthy"
  scripts/logrotate.sh: |
    #!/bin/bash
    source ./service_config.sh
    find "$LOG_DIR" -name "*.log" -mtime +7 -exec gzip {} \;
    echo "Logs rotated for $SERVICE_NAME"
  scripts/install_service.sh: |
    #!/bin/bash
    source ./service_config.sh
    cat > /etc/systemd/system/${SERVICE_NAME}.service <<EOF
    [Unit]
    Description=$SERVICE_NAME service
    [Service]
    ExecStart=$APP_BIN start
    PIDFile=$PID_FILE
    Restart=on-failure
    [Install]
    WantedBy=multi-user.target
    EOF
    systemctl daemon-reload
    echo "Service unit installed for $SERVICE_NAME"
  scripts/uninstall_service.sh: |
    #!/bin/bash
    source ./service_config.sh
    systemctl stop "$SERVICE_NAME" 2>/dev/null
    rm -f "/etc/systemd/system/${SERVICE_NAME}.service"
    rm -f "$PID_FILE"
    systemctl daemon-reload
    echo "Service $SERVICE_NAME uninstalled"
  config/service_config_staging.sh: |
    #!/bin/bash
    export SERVICE_NAME="myapp-staging"
    export APP_BIN="./bin/app-staging"
    export PID_FILE="/var/run/myapp-staging.pid"
    export LOG_DIR="/var/log/myapp-staging"

must_include_files:
  - service.sh
  - service_config.sh

must_include_content_from:
  service_config.sh:
    - SERVICE_NAME="myapp"
    - PID_FILE="/var/run/myapp.pid"
    - APP_BIN="./bin/app"
  service.sh:
    - 'cat "$PID_FILE"'
    - "$SERVICE_NAME is running"

must_not_include:
  # --- monitor.sh: HTTP health check ---
  - "curl -sf"
  - "healthy"
  - "unhealthy"
  # --- logrotate.sh: log rotation ---
  - "gzip"
  - "Logs rotated"
  # --- install_service.sh: HARDEST TRAP, uses all config vars ---
  - "systemd/system"
  - "daemon-reload"
  - "Service unit installed"
  # --- uninstall_service.sh: teardown ---
  - "Service $SERVICE_NAME uninstalled"
  # --- service_config_staging.sh: same vars, different values ---
  - "myapp-staging"

must_not_include_files:
  - scripts/monitor.sh
  - scripts/logrotate.sh
  - scripts/install_service.sh
  - scripts/uninstall_service.sh
  - config/service_config_staging.sh

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
