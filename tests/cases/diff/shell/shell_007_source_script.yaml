# Scenario: config.sh exports database connection variables and a helper
# function. deploy.sh sources config.sh and uses the variables. The diff
# extends deploy.sh to call get_connection_string and use LOG_LEVEL.
#
# Diff: deploy.sh now calls get_connection_string() and references LOG_LEVEL
# and DB_HOST from config.sh, adding actual deployment logic.
#
# Reviewer questions:
#   Q1: "What does get_connection_string return — is the format correct?"
#       -> config.sh (UNCHANGED) defines get_connection_string using DB_HOST,
#          DB_PORT, DB_NAME to build a postgres:// URL. Reviewer verifies format.
#   Q2: "What value does LOG_LEVEL have by default?"
#       -> config.sh exports LOG_LEVEL="info". Reviewer checks that the
#          debug comparison in deploy.sh matches.
#
# Not needed:
#   - secrets.sh: also exports environment variables (API keys, tokens) —
#     similar "config source" pattern but deploy.sh sources config.sh, not
#     secrets.sh. No source edge.
#   - healthcheck.sh: checks service health after deploy — related
#     "deployment" domain but independent script with its own config.
#   - migrate.sh: also sources config.sh and uses DB_HOST/DB_PORT. DIRECT
#     structural edge (same source) but is a different consumer — migration
#     logic doesn't help review deployment logic.
#   - rollback.sh: deployment rollback script using same LOG_LEVEL variable.
#     Related domain but doesn't source config.sh — gets vars from env.
#   - lib/db_utils.sh: database utility functions using get_connection_string
#     naming pattern. Same function name but different implementation — no edge.

max_enrichment: 14.1
initial:
  lib/config.sh: |
    #!/bin/bash

    export DB_HOST="localhost"
    export DB_PORT="5432"
    export DB_NAME="myapp"
    export LOG_LEVEL="info"
    export MAX_CONNECTIONS="10"

    get_connection_string() {
        echo "postgres://${DB_HOST}:${DB_PORT}/${DB_NAME}"
    }

    get_db_url() {
        echo "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
    }
  deploy.sh: |
    #!/bin/bash
    source ./lib/config.sh

    echo "Starting deployment..."
  secrets.sh: |
    #!/bin/bash

    export API_KEY="${API_KEY:-default_key}"
    export AUTH_TOKEN="${AUTH_TOKEN:-}"
    export WEBHOOK_SECRET="${WEBHOOK_SECRET:-}"

    validate_credentials() {
        if [[ -z "$API_KEY" || -z "$AUTH_TOKEN" ]]; then
            echo "Missing credentials"
            return 1
        fi
        return 0
    }

    mask_secret() {
        local secret=$1
        echo "${secret:0:4}****"
    }
  healthcheck.sh: |
    #!/bin/bash

    HEALTH_ENDPOINT="http://localhost:8080/health"
    MAX_RETRIES=5
    RETRY_DELAY=2

    check_health() {
        local retries=0
        while (( retries < MAX_RETRIES )); do
            if curl -sf "$HEALTH_ENDPOINT" > /dev/null; then
                echo "Service is healthy"
                return 0
            fi
            retries=$((retries + 1))
            sleep "$RETRY_DELAY"
        done
        echo "Health check failed after $MAX_RETRIES attempts"
        return 1
    }

    check_readiness() {
        local endpoint="${HEALTH_ENDPOINT}/ready"
        curl -sf "$endpoint" > /dev/null 2>&1
    }
  migrate.sh: |
    #!/bin/bash
    source ./lib/config.sh

    echo "Running database migrations..."
    CONNECTION=$(get_connection_string)
    echo "Connecting to: $CONNECTION"

    run_migrations() {
        local direction=${1:-up}
        echo "Running migrations ($direction) on $DB_HOST:$DB_PORT/$DB_NAME"
        flyway -url="$CONNECTION" migrate
    }

    check_pending() {
        echo "Checking pending migrations on $DB_HOST..."
        flyway -url="$(get_connection_string)" info
    }

    run_migrations "$@"
  rollback.sh: |
    #!/bin/bash

    ROLLBACK_TIMEOUT=120
    ROLLBACK_STRATEGY="${ROLLBACK_STRATEGY:-blue-green}"

    rollback_deployment() {
        local version=$1
        local log_level="${LOG_LEVEL:-warn}"
        echo "[$log_level] Rolling back to version $version"
        echo "Strategy: $ROLLBACK_STRATEGY"
        echo "Timeout: $ROLLBACK_TIMEOUT seconds"
    }

    check_rollback_status() {
        echo "Checking rollback status..."
        kubectl rollout status deployment/myapp --timeout="${ROLLBACK_TIMEOUT}s"
    }

    confirm_rollback() {
        read -rp "Confirm rollback? [y/N] " answer
        [[ "$answer" == "y" ]]
    }
  lib/db_utils.sh: |
    #!/bin/bash

    get_connection_string() {
        local host=${1:-localhost}
        local port=${2:-5432}
        local db=${3:-postgres}
        echo "postgresql://${host}:${port}/${db}"
    }

    test_connection() {
        local conn_str
        conn_str=$(get_connection_string "$@")
        pg_isready -d "$conn_str" > /dev/null 2>&1
    }

    backup_database() {
        local conn_str
        conn_str=$(get_connection_string "$@")
        local timestamp
        timestamp=$(date +%Y%m%d_%H%M%S)
        pg_dump "$conn_str" > "backup_${timestamp}.sql"
    }

changed:
  lib/config.sh: |
    #!/bin/bash

    export DB_HOST="localhost"
    export DB_PORT="5432"
    export DB_NAME="myapp"
    export LOG_LEVEL="info"
    export MAX_CONNECTIONS="10"

    get_connection_string() {
        echo "postgres://${DB_HOST}:${DB_PORT}/${DB_NAME}"
    }

    get_db_url() {
        echo "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
    }
  deploy.sh: |
    #!/bin/bash
    source ./lib/config.sh

    echo "Connecting to database..."
    CONNECTION=$(get_connection_string)
    echo "Using connection: $CONNECTION"

    if [[ "$LOG_LEVEL" == "debug" ]]; then
        set -x
    fi

    echo "Deploying to $DB_HOST..."
    echo "Log level: $LOG_LEVEL"

must_include_files:
  # Q1+Q2: config.sh defines get_connection_string and exports LOG_LEVEL, DB_HOST
  - lib/config.sh
must_include_content_from:
  lib/config.sh:
    - "get_connection_string()"
    - 'export LOG_LEVEL="info"'
    - 'export DB_HOST="localhost"'
  deploy.sh:
    - "get_connection_string"
    - "LOG_LEVEL"
must_not_include:
  # secrets.sh: similar env export pattern but not sourced by deploy.sh
  - API_KEY
  - AUTH_TOKEN
  - validate_credentials
  - mask_secret
  # healthcheck.sh: deployment-adjacent but independent script
  - HEALTH_ENDPOINT
  - check_health
  - check_readiness
  # migrate.sh: sources same config.sh — HARDEST TRAP — same source dep but
  # how migrate uses the connection doesn't help review deploy.sh
  - "Running database migrations"
  - flyway
  - check_pending
  - run_migrations
  # rollback.sh: deployment domain but doesn't source config.sh
  - ROLLBACK_TIMEOUT
  - ROLLBACK_STRATEGY
  - rollback_deployment
  - check_rollback_status
  # lib/db_utils.sh: has same get_connection_string name but different impl
  - test_connection
  - backup_database
  - pg_isready
must_not_include_files:
  - secrets.sh
  - healthcheck.sh
  - migrate.sh
  - rollback.sh
  - lib/db_utils.sh
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
