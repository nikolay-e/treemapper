name: shell_007_source_script
repo:
  initial_files:
    lib/config.sh: |
      #!/bin/bash

      export DB_HOST="localhost"
      export DB_PORT="5432"
      export DB_NAME="myapp"
      export LOG_LEVEL="info"
      export MAX_CONNECTIONS="10"

      get_connection_string() {
          echo "postgres://${DB_HOST}:${DB_PORT}/${DB_NAME}"
      }

      get_db_url() {
          echo "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
      }
    deploy.sh: |
      #!/bin/bash
      source ./lib/config.sh

      echo "Starting deployment..."
    secrets.sh: |
      #!/bin/bash

      export API_KEY="${API_KEY:-default_key}"
      export AUTH_TOKEN="${AUTH_TOKEN:-}"
      export WEBHOOK_SECRET="${WEBHOOK_SECRET:-}"

      validate_credentials() {
          if [[ -z "$API_KEY" || -z "$AUTH_TOKEN" ]]; then
              echo "Missing credentials"
              return 1
          fi
          return 0
      }

      mask_secret() {
          local secret=$1
          echo "${secret:0:4}****"
      }
    healthcheck.sh: |
      #!/bin/bash

      HEALTH_ENDPOINT="http://localhost:8080/health"
      MAX_RETRIES=5
      RETRY_DELAY=2

      check_health() {
          local retries=0
          while (( retries < MAX_RETRIES )); do
              if curl -sf "$HEALTH_ENDPOINT" > /dev/null; then
                  echo "Service is healthy"
                  return 0
              fi
              retries=$((retries + 1))
              sleep "$RETRY_DELAY"
          done
          echo "Health check failed after $MAX_RETRIES attempts"
          return 1
      }

      check_readiness() {
          local endpoint="${HEALTH_ENDPOINT}/ready"
          curl -sf "$endpoint" > /dev/null 2>&1
      }
    migrate.sh: |
      #!/bin/bash
      source ./lib/config.sh

      echo "Running database migrations..."
      CONNECTION=$(get_connection_string)
      echo "Connecting to: $CONNECTION"

      run_migrations() {
          local direction=${1:-up}
          echo "Running migrations ($direction) on $DB_HOST:$DB_PORT/$DB_NAME"
          flyway -url="$CONNECTION" migrate
      }

      check_pending() {
          echo "Checking pending migrations on $DB_HOST..."
          flyway -url="$(get_connection_string)" info
      }

      run_migrations "$@"
    rollback.sh: |
      #!/bin/bash

      ROLLBACK_TIMEOUT=120
      ROLLBACK_STRATEGY="${ROLLBACK_STRATEGY:-blue-green}"

      rollback_deployment() {
          local version=$1
          local log_level="${LOG_LEVEL:-warn}"
          echo "[$log_level] Rolling back to version $version"
          echo "Strategy: $ROLLBACK_STRATEGY"
          echo "Timeout: $ROLLBACK_TIMEOUT seconds"
      }

      check_rollback_status() {
          echo "Checking rollback status..."
          kubectl rollout status deployment/myapp --timeout="${ROLLBACK_TIMEOUT}s"
      }

      confirm_rollback() {
          read -rp "Confirm rollback? [y/N] " answer
          [[ "$answer" == "y" ]]
      }
    lib/db_utils.sh: |
      #!/bin/bash

      get_connection_string() {
          local host=${1:-localhost}
          local port=${2:-5432}
          local db=${3:-postgres}
          echo "postgresql://${host}:${port}/${db}"
      }

      test_connection() {
          local conn_str
          conn_str=$(get_connection_string "$@")
          pg_isready -d "$conn_str" > /dev/null 2>&1
      }

      backup_database() {
          local conn_str
          conn_str=$(get_connection_string "$@")
          local timestamp
          timestamp=$(date +%Y%m%d_%H%M%S)
          pg_dump "$conn_str" > "backup_${timestamp}.sql"
      }
  changed_files:
    lib/config.sh: |
      #!/bin/bash

      export DB_HOST="localhost"
      export DB_PORT="5432"
      export DB_NAME="myapp"
      export LOG_LEVEL="info"
      export MAX_CONNECTIONS="10"

      get_connection_string() {
          echo "postgres://${DB_HOST}:${DB_PORT}/${DB_NAME}"
      }

      get_db_url() {
          echo "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
      }
    deploy.sh: |
      #!/bin/bash
      source ./lib/config.sh

      echo "Connecting to database..."
      CONNECTION=$(get_connection_string)
      echo "Using connection: $CONNECTION"

      if [[ "$LOG_LEVEL" == "debug" ]]; then
          set -x
      fi

      echo "Deploying to $DB_HOST..."
      echo "Log level: $LOG_LEVEL"
  commit_message: Update files
