    from ref_utils import ref_push, ref_pop, ref_contains

    def swap_values(container, key_a, key_b):
        tmp = container[key_a]
        container[key_a] = container[key_b]
        container[key_b] = tmp

    def modify_list(target_list):
        ref_push(target_list, "new_element")

    def append_to_ref(container, key, suffix):
        container[key] = f"{container[key]}_{suffix}"

    data = {"x": "hello", "y": "world"}
    swap_values(data, "x", "y")
    print(f"x={data['x']} y={data['y']}")

    my_list = ["first", "second"]
    modify_list(my_list)
    print(f"List: {my_list}")

    name_data = {"name": "project"}
    append_to_ref(name_data, "name", "v2")
