initial:
  indirect.sh: |
    #!/bin/bash

    swap_values() {
        local -n ref_a=$1
        local -n ref_b=$2
        local tmp="$ref_a"
        ref_a="$ref_b"
        ref_b="$tmp"
    }

    x="hello"
    y="world"
    swap_values x y
    echo "x=$x y=$y"
  unrelated/garbage_weather.sh: |
    #!/bin/bash
    # GARBAGE_SH_002_WEATHER_SERVICE_A
    GARBAGE_SH_002_API_ENDPOINT_B="http://weather.example.com"

    garbage_fetch_forecast_002() {
        local city=$1
        echo "Forecast for $city: sunny"
    }

    garbage_parse_temp_002() {
        local raw=$1
        echo "${raw}C"
    }
  unrelated/garbage_calendar.sh: |
    #!/bin/bash
    # GARBAGE_SH_002_CALENDAR_SYNC_C
    GARBAGE_SH_002_TIMEZONE_D="UTC"

    garbage_next_event_002() {
        echo "No upcoming events"
    }

    garbage_add_reminder_002() {
        local msg=$1
        echo "Reminder: $msg"
    }
changed:
  indirect.sh: |
    #!/bin/bash

    swap_values() {
        local -n ref_a=$1
        local -n ref_b=$2
        local tmp="$ref_a"
        ref_a="$ref_b"
        ref_b="$tmp"
    }

    modify_array() {
        local -n arr_ref=$1
        arr_ref+=("new_element")
    }

    append_to_var() {
        local -n target=$1
        local suffix=$2
        target="${target}_${suffix}"
    }

    x="hello"
    y="world"
    swap_values x y
    echo "x=$x y=$y"

    my_array=("first" "second")
    modify_array my_array
    echo "Array: ${my_array[@]}"

    name="project"
    append_to_var name "v2"
    echo "Name: $name"
  unrelated/garbage_weather.sh: |
    #!/bin/bash
    # GARBAGE_SH_002_WEATHER_SERVICE_A
    GARBAGE_SH_002_API_ENDPOINT_B="http://weather.example.com"

    garbage_fetch_forecast_002() {
        local city=$1
        echo "Forecast for $city: sunny"
    }

    garbage_parse_temp_002() {
        local raw=$1
        echo "${raw}C"
    }
  unrelated/garbage_calendar.sh: |
    #!/bin/bash
    # GARBAGE_SH_002_CALENDAR_SYNC_C
    GARBAGE_SH_002_TIMEZONE_D="UTC"

    garbage_next_event_002() {
        echo "No upcoming events"
    }

    garbage_add_reminder_002() {
        local msg=$1
        echo "Reminder: $msg"
    }
must_include:
- indirect.sh
- arr_ref
- modify_array
must_not_include:
- GARBAGE_SH_002_WEATHER_SERVICE_A
- GARBAGE_SH_002_API_ENDPOINT_B
- garbage_fetch_forecast_002
- garbage_parse_temp_002
- GARBAGE_SH_002_CALENDAR_SYNC_C
- GARBAGE_SH_002_TIMEZONE_D
- garbage_next_event_002
- garbage_add_reminder_002
add_garbage_files: false
skip_garbage_check: true
