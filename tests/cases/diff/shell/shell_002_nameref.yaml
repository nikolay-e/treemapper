# Scenario: indirect.py adds two new indirect-reference-based functions
# (modify_list, append_to_ref) alongside the existing swap_values. It
# imports ref_utils which provides reusable reference manipulation helpers.
#
# Diff: indirect.py adds modify_list, append_to_ref, and usage examples.
#
# Reviewer questions:
#   Q1: "What reference utilities are available for the new functions?"
#       -> ref_utils.py (UNCHANGED) defines ref_push, ref_pop, and
#          ref_contains. Reviewer needs these to understand the
#          reference manipulation context the new functions extend.
#   Q2: "Is the mutable-list pattern consistent with existing helpers?"
#       -> ref_utils.py uses mutable list references. Reviewer verifies
#          the new functions follow the same convention.
#
# Not needed:
#   - logger_utils.py: log-level functions. Same utility style but no
#     import from indirect.py.
#   - cleanup_handler.py: atexit-based cleanup. Uses lists but no
#     reference manipulation and no import relationship.

max_enrichment: 5.4
initial:
  indirect.py: |
    from ref_utils import ref_push

    def swap_values(container, key_a, key_b):
        tmp = container[key_a]
        container[key_a] = container[key_b]
        container[key_b] = tmp

    data = {"x": "hello", "y": "world"}
    swap_values(data, "x", "y")
    print(f"x={data['x']} y={data['y']}")
  ref_utils.py: |
    def ref_push(target_list, *items):
        for item in items:
            target_list.append(item)

    def ref_pop(target_list):
        if target_list:
            return target_list.pop()
        return None

    def ref_contains(target_list, needle):
        return needle in target_list

    def ref_clear(target_list):
        target_list.clear()
  logger_utils.py: |
    LOG_LEVEL = "info"

    def log_info(message):
        if LOG_LEVEL in ("debug", "info"):
            print(f"[INFO] {message}")

    def log_warn(message):
        print(f"[WARN] {message}")

    def log_error(message):
        print(f"[ERROR] {message}")

    def set_log_level(level):
        global LOG_LEVEL
        LOG_LEVEL = level
  cleanup_handler.py: |
    import atexit

    _cleanup_tasks = []

    def register_cleanup(func):
        _cleanup_tasks.append(func)

    def run_cleanup():
        for task in _cleanup_tasks:
            try:
                task()
            except Exception:
                pass

    atexit.register(run_cleanup)
