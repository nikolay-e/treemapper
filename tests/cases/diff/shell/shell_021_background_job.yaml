initial:
  jobs.sh: |
    #!/bin/bash

    long_process() {
        sleep 30
        echo "Long process complete"
    }
  parallel.sh: |
    #!/bin/bash
    source ./jobs.sh

    long_process &
    pid1=$!
    echo "Started job: $pid1"
    wait $pid1
  unrelated/garbage_cgroup.sh: |
    #!/bin/bash
    # GARBAGE_SH_021_CGROUP_LIMIT_A
    GARBAGE_SH_021_MEM_LIMIT_B="512M"

    garbage_set_mem_limit_021() {
        local cgroup=$1
        local limit=$2
        echo "Memory limit for $cgroup: $limit"
    }

    garbage_get_usage_021() {
        local cgroup=$1
        echo "Usage: 128M"
    }
  unrelated/garbage_auditd.sh: |
    #!/bin/bash
    # GARBAGE_SH_021_AUDITD_RULES_C
    GARBAGE_SH_021_AUDIT_LOG_D="/var/log/audit/audit.log"

    garbage_add_watch_021() {
        local path=$1
        echo "Watching $path"
    }

    garbage_search_events_021() {
        local key=$1
        echo "Events for key $key: 0"
    }
changed:
  jobs.sh: |
    #!/bin/bash

    long_process() {
        sleep 30
        echo "Long process complete"
    }
  parallel.sh: |
    #!/bin/bash
    source ./jobs.sh

    long_process &
    pid1=$!

    ./another-task.sh &
    pid2=$!

    echo "Started background jobs: $pid1 $pid2"

    wait $pid1
    echo "Job 1 complete"

    wait $pid2
    echo "Job 2 complete"

    wait
    echo "All jobs complete"
  unrelated/garbage_cgroup.sh: |
    #!/bin/bash
    # GARBAGE_SH_021_CGROUP_LIMIT_A
    GARBAGE_SH_021_MEM_LIMIT_B="512M"

    garbage_set_mem_limit_021() {
        local cgroup=$1
        local limit=$2
        echo "Memory limit for $cgroup: $limit"
    }

    garbage_get_usage_021() {
        local cgroup=$1
        echo "Usage: 128M"
    }
  unrelated/garbage_auditd.sh: |
    #!/bin/bash
    # GARBAGE_SH_021_AUDITD_RULES_C
    GARBAGE_SH_021_AUDIT_LOG_D="/var/log/audit/audit.log"

    garbage_add_watch_021() {
        local path=$1
        echo "Watching $path"
    }

    garbage_search_events_021() {
        local key=$1
        echo "Events for key $key: 0"
    }
must_include:
- parallel.sh
- long_process
must_not_include:
- GARBAGE_SH_021_CGROUP_LIMIT_A
- GARBAGE_SH_021_MEM_LIMIT_B
- garbage_set_mem_limit_021
- garbage_get_usage_021
- GARBAGE_SH_021_AUDITD_RULES_C
- GARBAGE_SH_021_AUDIT_LOG_D
- garbage_add_watch_021
- garbage_search_events_021
add_garbage_files: false
skip_garbage_check: true
