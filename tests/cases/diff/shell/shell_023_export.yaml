# Scenario: env.sh adds APP_LOG export, LD_LIBRARY_PATH, and exported function.
# app.sh uses APP_LOG and calls format_output from env.sh.
#
# Reviewer questions:
#   Q1: "What path does APP_LOG resolve to?"
#       -> env.sh: APP_LOG="$APP_HOME/logs", APP_HOME="/opt/myapp".
#   Q2: "Where is format_output defined?"
#       -> env.sh: defines and exports format_output via export -f.
#
# Not needed:
#   - profile.sh: shell profile variables (EDITOR, PS1). Similar export
#     pattern but for interactive shell, not sourced by app.sh.
#   - runtime.sh: runtime limits (ulimit, nice). Related process
#     environment but independent script.
#   - scripts/child-script.sh: HARDEST TRAP — inherits exported vars
#     from env.sh via app.sh invocation. Reads APP_LOG, calls
#     format_output. Same variables, direct consumer. But how
#     the child uses exports doesn't define them.
#   - scripts/env_check.sh: validates that required exports exist.
#     Sources env.sh, checks APP_HOME, APP_LOG. But validation.
#   - config/env_staging.sh: staging version of env.sh.
#     Same variable names, different values.

max_enrichment: 6.7
initial:
  lib/env.sh: |
    #!/bin/bash

    export PATH="$PATH:$HOME/bin"
    export APP_HOME="/opt/myapp"
    export APP_CONFIG="$APP_HOME/config"
  app.sh: |
    #!/bin/bash
    source ./lib/env.sh

    echo "Starting app from $APP_HOME"
    echo "Config dir: $APP_CONFIG"
  profile.sh: |
    #!/bin/bash

    export EDITOR="vim"
    export LANG="en_US.UTF-8"
    export PS1="\u@\h:\w\$ "

    setup_prompt() {
        if [[ "$TERM" == "xterm"* ]]; then
            export PS1="\[\e[32m\]\u@\h\[\e[0m\]:\w\$ "
        fi
    }
  runtime.sh: |
    #!/bin/bash

    set_open_files_limit() {
        local limit=${1:-65535}
        ulimit -n "$limit" 2>/dev/null
    }

    set_process_priority() {
        local priority=${1:-10}
        renice "$priority" $$ > /dev/null 2>&1
    }

    show_resource_limits() {
        echo "Open files: $(ulimit -n)"
        echo "Max procs:  $(ulimit -u)"
    }
  scripts/child-script.sh: |
    #!/bin/bash
    # Inherits exported env from parent
    format_output "INFO" "Child script started"
    echo "Working in: $APP_HOME"
    echo "Logging to: $APP_LOG"
    format_output "INFO" "Child script finished"
  scripts/env_check.sh: |
    #!/bin/bash
    source ./lib/env.sh

    required_vars=(APP_HOME APP_CONFIG APP_LOG)
    for var in "${required_vars[@]}"; do
        if [[ -z "${!var}" ]]; then
            echo "MISSING: $var"
        else
            echo "OK: $var=${!var}"
        fi
    done
  config/env_staging.sh: |
    #!/bin/bash
    export PATH="$PATH:$HOME/bin"
    export APP_HOME="/opt/myapp-staging"
    export APP_CONFIG="$APP_HOME/config"
    export APP_LOG="$APP_HOME/logs"

changed:
  lib/env.sh: |
    #!/bin/bash

    export PATH="$PATH:$HOME/bin:/usr/local/app/bin"
    export LD_LIBRARY_PATH="/usr/local/lib:$LD_LIBRARY_PATH"

    export APP_HOME="/opt/myapp"
    export APP_CONFIG="$APP_HOME/config"
    export APP_LOG="$APP_HOME/logs"

    format_output() {
        local level=$1
        local msg=$2
        echo "[$(date +%H:%M:%S)] [$level] $msg"
    }
    export -f format_output
  app.sh: |
    #!/bin/bash
    source ./lib/env.sh

    echo "Starting app from $APP_HOME"
    echo "Config dir: $APP_CONFIG"

    mkdir -p "$APP_LOG"
    format_output "INFO" "Logging to $APP_LOG"

    ./child-script.sh
  profile.sh: |
    #!/bin/bash

    export EDITOR="vim"
    export LANG="en_US.UTF-8"
    export PS1="\u@\h:\w\$ "

    setup_prompt() {
        if [[ "$TERM" == "xterm"* ]]; then
            export PS1="\[\e[32m\]\u@\h\[\e[0m\]:\w\$ "
        fi
    }
  runtime.sh: |
    #!/bin/bash

    set_open_files_limit() {
        local limit=${1:-65535}
        ulimit -n "$limit" 2>/dev/null
    }

    set_process_priority() {
        local priority=${1:-10}
        renice "$priority" $$ > /dev/null 2>&1
    }

    show_resource_limits() {
        echo "Open files: $(ulimit -n)"
        echo "Max procs:  $(ulimit -u)"
    }
  scripts/child-script.sh: |
    #!/bin/bash
    # Inherits exported env from parent
    format_output "INFO" "Child script started"
    echo "Working in: $APP_HOME"
    echo "Logging to: $APP_LOG"
    format_output "INFO" "Child script finished"
  scripts/env_check.sh: |
    #!/bin/bash
    source ./lib/env.sh

    required_vars=(APP_HOME APP_CONFIG APP_LOG)
    for var in "${required_vars[@]}"; do
        if [[ -z "${!var}" ]]; then
            echo "MISSING: $var"
        else
            echo "OK: $var=${!var}"
        fi
    done
  config/env_staging.sh: |
    #!/bin/bash
    export PATH="$PATH:$HOME/bin"
    export APP_HOME="/opt/myapp-staging"
    export APP_CONFIG="$APP_HOME/config"
    export APP_LOG="$APP_HOME/logs"

must_include_files:
  - lib/env.sh
  - app.sh

must_include_content_from:
  lib/env.sh:
    - 'export APP_HOME="/opt/myapp"'
    - 'export APP_LOG="$APP_HOME/logs"'
    - "export -f format_output"
  app.sh:
    - "format_output"
    - "APP_LOG"

must_not_include:
  # --- profile.sh: interactive shell setup ---
  - EDITOR
  - setup_prompt
  - PS1
  # --- runtime.sh: resource limits ---
  - set_open_files_limit
  - set_process_priority
  - show_resource_limits
  # --- child-script.sh: HARDEST TRAP, inherits exported env ---
  - "Child script started"
  - "Child script finished"
  # --- env_check.sh: validates exports ---
  - "MISSING:"
  - required_vars
  # --- env_staging.sh: same vars, different values ---
  - "myapp-staging"

must_not_include_files:
  - profile.sh
  - runtime.sh
  - scripts/child-script.sh
  - scripts/env_check.sh
  - config/env_staging.sh

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
