# Scenario: runner.sh adds tee-based logging, grouped system info redirect,
#   and /dev/null suppression for background-task.sh.
#   Only runner.sh is changed.
#
# Diff shows:
#   - ./app >> "$LOG_FILE" 2>&1
#   + ./app 2>&1 | tee -a "$LOG_FILE"
#   + { date; hostname; uptime } >> "$LOG_FILE"
#   + ./background-task.sh > /dev/null 2>&1       (NEW call, suppressed)
#
# Reviewer questions:
#   Q1: "Where does $LOG_FILE point to and does the directory exist?"
#       -> Needs log_config.sh.
#
#   Q2: "What is background-task.sh — what operations are being suppressed?"
#       -> Needs background-task.sh: cleanup ops, WAL compact, cache purge.
#
# WHY THIS TEST IS HARD:
#   Distractors are connected through runner.sh AND background-task.sh —
#   not just through the shared log_config.sh. The algorithm must resist
#   including files that are 1-hop from INCLUDED files.

max_enrichment: 29.5
initial:
  runner.sh: |
    #!/bin/bash
    set -euo pipefail

    source ./log_config.sh
    source ./lib/banner.sh

    print_banner "Application Runner"

    echo "Starting application..."
    ./app >> "$LOG_FILE" 2>&1

  log_config.sh: |
    #!/bin/bash
    export LOG_DIR="/var/log/app"
    export LOG_FILE="${LOG_DIR}/runner.log"
    export LOG_LEVEL="info"
    export LOG_MAX_SIZE="100M"

    mkdir -p "$LOG_DIR"

  background-task.sh: |
    #!/bin/bash
    source ./log_config.sh
    source ./lib/lock.sh

    acquire_lock "background-cleanup" || { echo "Already running"; exit 0; }

    echo "[$(date)] Starting background cleanup" >> "$LOG_FILE"

    # Purge temp files older than 24h
    find /tmp/app -type f -mtime +1 -delete 2>/dev/null || true

    # Invalidate stale cache entries
    if [ -d /var/cache/app ]; then
        find /var/cache/app -type f -mmin +60 -delete
        echo "[$(date)] Cache cleanup complete" >> "$LOG_FILE"
    fi

    # Run registered cleanup hooks
    ./hooks/post-cleanup.sh 2>/dev/null || true

    # Compact database WAL
    if command -v sqlite3 &>/dev/null; then
        sqlite3 /var/lib/app/data.db "PRAGMA wal_checkpoint(TRUNCATE);" 2>/dev/null || true
    fi

    echo "[$(date)] Background cleanup finished" >> "$LOG_FILE"
    release_lock "background-cleanup"

  # --- INCLUDED by runner.sh: banner utility ---
  lib/banner.sh: |
    #!/bin/bash
    print_banner() {
        local title="$1"
        local width=60
        printf '%*s\n' "$width" '' | tr ' ' '='
        printf '%*s\n' $(( (width + ${#title}) / 2 )) "$title"
        printf '%*s\n' "$width" '' | tr ' ' '='
    }

  # --- TRAP 1 (hardest): SOURCED BY background-task.sh ---
  lib/lock.sh: |
    #!/bin/bash
    LOCK_DIR="/var/run/app"
    mkdir -p "$LOCK_DIR"

    acquire_lock() {
        local name="$1"
        local lockfile="${LOCK_DIR}/${name}.lock"
        if [ -f "$lockfile" ]; then
            local pid=$(cat "$lockfile")
            if kill -0 "$pid" 2>/dev/null; then
                return 1  # already running
            fi
            rm -f "$lockfile"  # stale lock
        fi
        echo $$ > "$lockfile"
        return 0
    }

    release_lock() {
        local name="$1"
        rm -f "${LOCK_DIR}/${name}.lock"
    }

    is_locked() {
        local name="$1"
        [ -f "${LOCK_DIR}/${name}.lock" ]
    }

  # --- TRAP 2: CALLED BY background-task.sh ---
  hooks/post-cleanup.sh: |
    #!/bin/bash
    source ./log_config.sh

    echo "[$(date)] Running post-cleanup hooks..." >> "$LOG_FILE"

    # Notify monitoring
    curl -sf http://localhost:9090/api/v1/webhook \
        -d '{"event": "cleanup_complete"}' 2>/dev/null || true

    # Update metrics
    CLEANUP_COUNT_FILE="/var/lib/app/cleanup_count"
    if [ -f "$CLEANUP_COUNT_FILE" ]; then
        COUNT=$(cat "$CLEANUP_COUNT_FILE")
        echo $((COUNT + 1)) > "$CLEANUP_COUNT_FILE"
    else
        echo 1 > "$CLEANUP_COUNT_FILE"
    fi

    echo "[$(date)] Post-cleanup hooks complete" >> "$LOG_FILE"

  # --- TRAP 3: calls ./runner.sh & (backward edge, caller) ---
  service/app-manager.sh: |
    #!/bin/bash
    source ./log_config.sh

    APP_PID_FILE="/var/run/app/app.pid"

    start_service() {
        if [ -f "$APP_PID_FILE" ] && kill -0 "$(cat "$APP_PID_FILE")" 2>/dev/null; then
            echo "Service already running (PID=$(cat "$APP_PID_FILE"))"
            return 1
        fi

        echo "Starting service..." >> "$LOG_FILE"
        ./runner.sh &
        local pid=$!
        echo "$pid" > "$APP_PID_FILE"

        sleep 3
        if kill -0 "$pid" 2>/dev/null; then
            echo "Service started (PID=$pid)" >> "$LOG_FILE"
        else
            echo "Service FAILED to start" >> "$LOG_FILE"
            rm -f "$APP_PID_FILE"
            return 1
        fi
    }

    stop_service() {
        if [ ! -f "$APP_PID_FILE" ]; then
            echo "Service not running"
            return 0
        fi
        local pid=$(cat "$APP_PID_FILE")
        echo "Stopping service (PID=$pid)..." >> "$LOG_FILE"
        kill "$pid" 2>/dev/null
        sleep 2
        kill -9 "$pid" 2>/dev/null || true
        rm -f "$APP_PID_FILE"
        echo "Service stopped" >> "$LOG_FILE"
    }

    status_service() {
        if [ -f "$APP_PID_FILE" ] && kill -0 "$(cat "$APP_PID_FILE")" 2>/dev/null; then
            echo "Running (PID=$(cat "$APP_PID_FILE"))"
        else
            echo "Stopped"
        fi
    }

    case "${1:-status}" in
        start)  start_service ;;
        stop)   stop_service ;;
        status) status_service ;;
        restart) stop_service; sleep 1; start_service ;;
        *) echo "Usage: $0 {start|stop|restart|status}" ;;
    esac

  # --- TRAP 4: Cron referencing BOTH scripts ---
  cron/app.crontab: |
    # Application cron jobs
    # Restart runner every day at 3am
    0 3 * * * /opt/app/service/app-manager.sh restart >> /var/log/app/cron.log 2>&1

    # Background cleanup every hour
    0 * * * * /opt/app/background-task.sh >> /var/log/app/cron.log 2>&1

    # Log rotation weekly
    0 0 * * 0 find /var/log/app -name "*.log" -size +100M -exec gzip {} \;

    # Health check every 5 minutes
    */5 * * * * /opt/app/scripts/health_check.sh >> /var/log/app/cron.log 2>&1

  # --- TRAP 5: systemd unit with ExecStart=runner.sh + ExecStartPost=background-task.sh ---
  systemd/app.service: |
    [Unit]
    Description=Application Runner
    After=network.target postgresql.service
    Wants=postgresql.service

    [Service]
    Type=simple
    User=app
    WorkingDirectory=/opt/app
    ExecStart=/opt/app/runner.sh
    ExecStartPost=/opt/app/background-task.sh
    ExecStop=/bin/kill -TERM $MAINPID
    Restart=on-failure
    RestartSec=5
    StandardOutput=journal
    StandardError=journal
    Environment=LOG_LEVEL=info
    Environment=DEPLOY_ENV=production

    [Install]
    WantedBy=multi-user.target

changed:
  runner.sh: |
    #!/bin/bash
    set -euo pipefail

    source ./log_config.sh
    source ./lib/banner.sh

    print_banner "Application Runner"

    echo "Starting application..."
    ./app 2>&1 | tee -a "$LOG_FILE"

    {
        echo "=== System Info ==="
        date
        hostname
        uptime
    } >> "$LOG_FILE"

    ./background-task.sh > /dev/null 2>&1

must_include_files:
  - runner.sh
  - log_config.sh
  - background-task.sh

must_include_content_from:
  runner.sh:
    - 'tee -a "$LOG_FILE"'
    - "./background-task.sh > /dev/null 2>&1"
    - "=== System Info ==="
    - "source ./lib/banner.sh"
  log_config.sh:
    - 'LOG_FILE="${LOG_DIR}/runner.log"'
    - 'LOG_DIR="/var/log/app"'
    - 'mkdir -p "$LOG_DIR"'
  background-task.sh:
    - "find /tmp/app -type f -mtime +1 -delete"
    - "wal_checkpoint"
    - "acquire_lock"

must_not_include:
  # --- lib/lock.sh: SOURCED BY background-task.sh (2 hops from diff) ---
  # HARDEST TRAP. runner.sh → background-task.sh → lock.sh.
  # Forward dep of an included file. acquire_lock/release_lock are
  # called in background-task.sh. But lock mechanics (PID files, flock)
  # don't explain what cleanup ops are suppressed with /dev/null.
  - acquire_lock
  - release_lock
  - is_locked
  - LOCK_DIR
  - "stale lock"
  # --- hooks/post-cleanup.sh: CALLED BY background-task.sh (2 hops) ---
  # background-task.sh runs this after cleanup. Sources log_config.sh,
  # writes to LOG_FILE. But post-cleanup webhooks and metrics don't
  # help review whether suppressing background-task output is safe.
  - "post-cleanup hooks"
  - "cleanup_complete"
  - CLEANUP_COUNT_FILE
  # --- service/app-manager.sh: calls ./runner.sh & (backward edge) ---
  # Launches runner.sh as daemon, manages PID, start/stop/restart.
  # Writes to same LOG_FILE. But service lifecycle doesn't explain
  # tee behavior or background-task content.
  - start_service
  - stop_service
  - status_service
  - APP_PID_FILE
  - "Service already running"
  # --- cron/app.crontab: references BOTH scripts ---
  # Schedules runner.sh (via app-manager) and background-task.sh directly.
  # But cron timing doesn't explain logging changes.
  - "0 3 * * *"
  - "0 * * * *"
  - "cron.log"
  # --- systemd/app.service: ExecStart=runner.sh, ExecStartPost=background-task.sh ---
  # References BOTH files. StandardOutput=journal relates to logging.
  # But systemd config != bash redirect syntax.
  - ExecStart=/opt/app/runner.sh
  - ExecStartPost
  - "StandardOutput=journal"
  - "multi-user.target"
  # --- lib/banner.sh: sourced but trivial cosmetic utility ---
  - print_banner
  - "tr ' ' '='"

must_not_include_files:
  - lib/lock.sh
  - hooks/post-cleanup.sh
  - service/app-manager.sh
  - cron/app.crontab
  - systemd/app.service
  - lib/banner.sh

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
