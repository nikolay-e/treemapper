# Scenario: analyze.sh adds complex pipeline chains to process CSV data
# and system logs. It reads data from data.csv which defines the column
# structure. The reviewer needs data.csv to understand what the cut/sort
# pipelines extract.
#
# Reviewer questions:
#   1. What columns does data.csv have, so we know what cut -d',' -f2 extracts?
#      -> data.csv: "name,age,role" format. Field 2 is age, which the
#         new pipeline sorts numerically to find the max.
#   2. What is the grep pattern matching against in the nginx pipeline?
#      -> The ps aux | grep "[n]ginx" pipe is self-contained (no external
#         data file), but data.csv structure informs the CSV pipes.
#
# Not needed:
#   - scripts/import.sh: imports raw data into data.csv from external API.
#     Writes to the same file but doesn't define columns or analysis.
#   - scripts/chart.sh: generates gnuplot charts from analysis output.
#     Reads analyze.sh output, not its data source.

max_enrichment: 3.0
initial:
  analyze.sh: |
    #!/bin/bash

    cat data.csv | grep "Engineer"
    echo "Done"
  data.csv: |
    name,age,role
    John,25,Engineer
    Jane,30,Manager
    Bob,22,Developer
    Alice,28,Engineer
    Charlie,35,Director
  scripts/import.sh: |
    #!/bin/bash
    API_URL="https://api.example.com/employees"
    curl -sf "$API_URL" | jq -r '.[] | [.name,.age,.role] | @csv' > data.csv
    echo "Imported $(wc -l < data.csv) records"
  scripts/chart.sh: |
    #!/bin/bash
    gnuplot <<'PLOT'
    set terminal png
    set output "ages.png"
    plot "analysis_output.txt" using 1:2 with lines
    PLOT

changed:
  analyze.sh: |
    #!/bin/bash

    echo "=== Engineers ==="
    cat data.csv | grep "Engineer" | sort -t',' -k2 -n | head -10

    echo "=== Error count ==="
    find . -name "*.log" | xargs grep "ERROR" | wc -l

    echo "=== Nginx PIDs ==="
    ps aux | grep "[n]ginx" | awk '{print $2}'

    echo "=== Max age ==="
    cat data.csv | tail -n+2 | cut -d',' -f2 | sort -n | tail -1
  data.csv: |
    name,age,role
    John,25,Engineer
    Jane,30,Manager
    Bob,22,Developer
    Alice,28,Engineer
    Charlie,35,Director
  scripts/import.sh: |
    #!/bin/bash
    API_URL="https://api.example.com/employees"
    curl -sf "$API_URL" | jq -r '.[] | [.name,.age,.role] | @csv' > data.csv
    echo "Imported $(wc -l < data.csv) records"
  scripts/chart.sh: |
    #!/bin/bash
    gnuplot <<'PLOT'
    set terminal png
    set output "ages.png"
    plot "analysis_output.txt" using 1:2 with lines
    PLOT

must_include_files:
- analyze.sh

must_include_content_from:
  data.csv:
    - name,age,role

must_not_include_files:
  # import.sh: data ingestion, doesn't define column structure
- scripts/import.sh
  # chart.sh: visualization of output, not a data source
- scripts/chart.sh

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
