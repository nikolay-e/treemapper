# Scenario: generate.sh expands its heredoc template to include database
#   config and adds a quoted heredoc for a literal setup script.
#   Only generate.sh is changed.
#
# Diff shows:
#   + "environment": "$DEPLOY_ENV",
#   + "database": { "host": "$DB_HOST", "port": $DB_PORT }
#     in the interpolated heredoc (<<EOF)
#   + cat <<'SCRIPT' > setup.sh  (quoted heredoc — NO variable expansion)
#     with literal $HOME and DB_HOST strings
#
# Reviewer questions:
#   Q1: "What are the defaults for DB_HOST, DB_PORT, DEPLOY_ENV?"
#       -> Needs app_vars.sh: DB_HOST="${DB_HOST:-localhost}",
#         DB_PORT="${DB_PORT:-5432}", DEPLOY_ENV="${DEPLOY_ENV:-production}".
#         The heredoc expands these variables — the generated config.json
#         will contain "localhost" and 5432 unless overridden. The reviewer
#         must see the defaults to assess the generated output.
#
#   Q2: "The quoted heredoc (<<'SCRIPT') mentions DB_HOST literally.
#        Is that intentional — no expansion?"
#       -> Answerable from the diff: <<'SCRIPT' (single-quoted delimiter)
#         means zero expansion. But the reviewer needs app_vars.sh to
#         understand the CONTRAST: the first heredoc (<<EOF) DOES expand
#         DB_HOST, the second (<<'SCRIPT') does NOT. Seeing the variable
#         definition makes this distinction meaningful.
#
# Not needed for comprehension:
#   - docker-compose.yml: Defines services with environment variables
#     DB_HOST=postgres, DB_PORT=5432. These are the RUNTIME overrides
#     that replace the defaults from app_vars.sh. HARDEST TRAP:
#     contains the exact variable names being expanded in the heredoc,
#     and the actual values that will appear in config.json when deployed.
#     But the reviewer question is "what are the DEFAULTS in the source
#     script" not "what values get injected at runtime." The docker env
#     shows what happens in production; app_vars.sh shows what the
#     code falls back to.
#
#   - docs/config-generation.md: Architecture document explaining WHY
#     the team uses heredoc-based config generation instead of Go
#     templates or envsubst. Mentions generate.sh, app_vars.sh, DB_HOST,
#     config.json by name. Describes the exact mechanism in the diff.
#     But documentation ABOUT the approach doesn't help verify the
#     variable defaults or heredoc quoting correctness.
#
#   - Makefile: Has `generate-config: ./generate.sh` target — direct
#     structural edge as caller. Also has `check-db` target that uses
#     DB_HOST and DB_PORT. But build orchestration doesn't help review
#     the heredoc template.
#
#   - .env.example: Template listing DB_HOST=mydb.example.com,
#     DB_PORT=5432, DEPLOY_ENV=staging. Same variable names, meant to
#     be sourced before running scripts. But .env.example shows
#     SUGGESTED values for operators, not the DEFAULTS in app_vars.sh.
#     Including it would confuse the reviewer about which values are
#     actually used.
#
#   - scripts/apply_config.sh: Sources app_vars.sh, uses DB_HOST and
#     DB_PORT to connect to the database. Same source file, same vars.
#     But runtime application of config != generation of config.
#
#   - CHANGELOG.md: Entry describing this exact change: "Added database
#     configuration to generated config.json." References the diff
#     directly. But a changelog entry doesn't show variable defaults.

initial:
  generate.sh: |
    #!/bin/bash
    set -euo pipefail

    source ./app_vars.sh

    echo "Generating config.json..."

    cat <<EOF > config.json
    {
        "name": "$APP_NAME",
        "version": "$APP_VERSION"
    }
    EOF

    echo "Config generated successfully."

  app_vars.sh: |
    #!/bin/bash
    # Application variable defaults — sourced by generate.sh and other scripts.
    # Override via environment: DB_HOST=mydb ./generate.sh

    export APP_NAME="myapp"
    export APP_VERSION="1.0.0"
    export DEPLOY_ENV="${DEPLOY_ENV:-production}"

    # Database defaults
    export DB_HOST="${DB_HOST:-localhost}"
    export DB_PORT="${DB_PORT:-5432}"
    export DB_NAME="${DB_NAME:-appdb}"
    export DB_USER="${DB_USER:-appuser}"

    # Connection string (derived)
    export DB_URL="postgresql://${DB_USER}@${DB_HOST}:${DB_PORT}/${DB_NAME}"

  docker-compose.yml: |
    version: "3.8"
    services:
      app:
        build: .
        environment:
          - DB_HOST=postgres
          - DB_PORT=5432
          - DB_NAME=appdb
          - DB_USER=appuser
          - DEPLOY_ENV=production
        depends_on:
          - postgres
        volumes:
          - ./config.json:/app/config.json:ro
        command: ["./start.sh"]

      postgres:
        image: postgres:16-alpine
        environment:
          POSTGRES_DB: appdb
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: secret
        ports:
          - "5432:5432"
        volumes:
          - pgdata:/var/lib/postgresql/data

      config-generator:
        build: .
        command: ["./generate.sh"]
        environment:
          - DB_HOST=postgres
          - DEPLOY_ENV=production
        volumes:
          - .:/workspace

    volumes:
      pgdata:

  docs/config-generation.md: |
    # Config Generation Strategy

    ## Overview

    We use shell heredocs in `generate.sh` to produce `config.json` at
    build/deploy time. The script sources `app_vars.sh` for variable
    defaults, which can be overridden via environment variables.

    ## Why Heredocs?

    We evaluated three approaches:
    1. **Go templates** (`config.tmpl`) — requires Go toolchain
    2. **envsubst** — can't handle conditional logic
    3. **Shell heredocs** — zero dependencies, full bash expressiveness

    We chose heredocs for simplicity. The tradeoff is that JSON syntax
    errors aren't caught until runtime.

    ## Variables

    | Variable    | Default       | Source         |
    |-------------|---------------|----------------|
    | DB_HOST     | localhost     | app_vars.sh    |
    | DB_PORT     | 5432          | app_vars.sh    |
    | DEPLOY_ENV  | production    | app_vars.sh    |
    | APP_NAME    | myapp         | app_vars.sh    |

    ## Quoted vs Unquoted Heredocs

    The config heredoc uses `<<EOF` (unquoted) so variables like `$DB_HOST`
    are expanded. If we need literal dollar signs in output, we use
    `<<'DELIM'` (quoted) which suppresses all expansion.

    ## Usage

    ```bash
    # Use defaults
    ./generate.sh

    # Override for staging
    DB_HOST=staging-db.internal DEPLOY_ENV=staging ./generate.sh
    ```

  Makefile: |
    .PHONY: generate-config check-db deploy clean test

    generate-config:
    	./generate.sh

    check-db:
    	@source ./app_vars.sh && \
    		pg_isready -h "$$DB_HOST" -p "$$DB_PORT" && \
    		echo "Database OK" || echo "Database UNREACHABLE"

    deploy: generate-config check-db
    	./scripts/apply_config.sh
    	docker compose up -d

    clean:
    	rm -f config.json setup.sh

    test:
    	./generate.sh
    	jq empty config.json
    	@echo "Config valid"

  .env.example: |
    # Copy to .env and customize for your environment.
    # These override the defaults in app_vars.sh.

    DB_HOST=mydb.example.com
    DB_PORT=5432
    DB_NAME=myapp_production
    DB_USER=deploy_user
    DEPLOY_ENV=staging

    # Optional: uncomment for verbose output
    # DEBUG=1
    # LOG_LEVEL=debug

  scripts/apply_config.sh: |
    #!/bin/bash
    set -euo pipefail

    source ./app_vars.sh

    echo "Applying configuration..."
    echo "  Database: $DB_HOST:$DB_PORT/$DB_NAME"
    echo "  Environment: $DEPLOY_ENV"

    # Verify database connectivity
    if pg_isready -h "$DB_HOST" -p "$DB_PORT" -q 2>/dev/null; then
        echo "  Database connection: OK"
    else
        echo "  WARNING: Database not reachable at $DB_HOST:$DB_PORT"
    fi

    # Load config.json into running service
    if [[ -f config.json ]]; then
        curl -s -X POST http://localhost:8080/admin/reload-config \
            -H "Content-Type: application/json" \
            -d @config.json
        echo "  Config reloaded via API"
    fi

  CHANGELOG.md: |
    # Changelog

    ## [Unreleased]

    ### Added
    - Database configuration (host, port) in generated config.json
    - Quoted heredoc for setup.sh generation (no variable expansion)
    - DEPLOY_ENV field in config.json

    ### Changed
    - generate.sh now sources DB_HOST and DB_PORT from app_vars.sh

    ## [1.0.0] - 2025-01-15

    ### Added
    - Initial config generation with APP_NAME and APP_VERSION
    - app_vars.sh for centralized variable management

changed:
  generate.sh: |
    #!/bin/bash
    set -euo pipefail

    source ./app_vars.sh

    echo "Generating config.json..."

    cat <<EOF > config.json
    {
        "name": "$APP_NAME",
        "version": "$APP_VERSION",
        "environment": "$DEPLOY_ENV",
        "database": {
            "host": "$DB_HOST",
            "port": $DB_PORT
        }
    }
    EOF

    cat <<'SCRIPT' > setup.sh
    #!/bin/bash
    echo "This is a literal script"
    echo '$HOME will not be expanded'
    echo 'DB_HOST is not interpolated here'
    SCRIPT

    echo "Config and setup script generated."

must_include_files:
  - generate.sh
  # Q1+Q2: app_vars.sh defines the defaults that the heredoc expands.
  # Without it, $DB_HOST in the heredoc is opaque — the reviewer cannot
  # verify the generated config.json will contain "localhost" and 5432.
  - app_vars.sh

must_include_content_from:
  generate.sh:
    - '"host": "$DB_HOST"'
    - "port": $DB_PORT
    - "<<'SCRIPT'"
    - '$HOME will not be expanded'
  app_vars.sh:
    - 'DB_HOST="${DB_HOST:-localhost}"'
    - 'DB_PORT="${DB_PORT:-5432}"'
    - 'DEPLOY_ENV="${DEPLOY_ENV:-production}"'
    - 'DB_URL="postgresql://${DB_USER}@${DB_HOST}:${DB_PORT}/${DB_NAME}"'

must_not_include:
  # --- docker-compose.yml: HARDEST TRAP ---
  # Contains DB_HOST=postgres, DB_PORT=5432 — the RUNTIME values that
  # override app_vars.sh defaults. Even has a config-generator service
  # that runs ./generate.sh with DB_HOST=postgres. Maximum structural
  # overlap. But the reviewer needs DEFAULTS (from app_vars.sh), not
  # RUNTIME OVERRIDES (from docker env).
  - "image: postgres:16-alpine"
  - POSTGRES_PASSWORD
  - "config-generator"
  - "pgdata"
  # --- docs/config-generation.md: describes the EXACT mechanism ---
  # Mentions generate.sh, app_vars.sh, DB_HOST, heredocs by name.
  # Even has a table of variables with defaults. But documentation
  # ABOUT the approach ≠ the source of truth for defaults. The table
  # could be outdated; app_vars.sh is the actual code.
  - "Config Generation Strategy"
  - "We evaluated three approaches"
  - "envsubst"
  - "Why Heredocs"
  # --- Makefile: calls ./generate.sh, uses DB_HOST/DB_PORT ---
  # Direct caller edge. check-db sources app_vars.sh and uses the
  # same variables. But build targets don't help review heredoc syntax.
  - "generate-config"
  - "pg_isready"
  - "check-db"
  - "docker compose up"
  # --- .env.example: same variable names, different values ---
  # DB_HOST=mydb.example.com — suggested value for operators.
  # Same names as app_vars.sh but shows OPERATOR OVERRIDES, not
  # CODE DEFAULTS. Including it confuses which values apply.
  - "mydb.example.com"
  - "myapp_production"
  - "deploy_user"
  - "# Optional: uncomment"
  # --- apply_config.sh: sources app_vars.sh, uses DB_HOST/DB_PORT ---
  # Same source, same variables. But runtime application ≠ generation.
  - "Applying configuration"
  - "reload-config"
  - "curl -s -X POST"
  # --- CHANGELOG.md: describes this exact change ---
  # "Added database configuration (host, port) in generated config.json"
  # — literally describes the diff. But a changelog entry doesn't show
  # variable defaults or heredoc quoting mechanics.
  - "Database configuration (host, port)"
  - "Quoted heredoc for setup.sh"
  - "[Unreleased]"

must_not_include_files:
  - docker-compose.yml
  - docs/config-generation.md
  - Makefile
  - .env.example
  - scripts/apply_config.sh
  - CHANGELOG.md

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
