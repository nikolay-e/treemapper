# Scenario: build.sh adds subshell blocks for isolated environment execution.
# Sources build_config.sh for BUILD_DIR and BUILD_FLAGS.
#
# Reviewer questions:
#   Q1: "Where does BUILD_DIR point to?"
#       -> build_config.sh: BUILD_DIR="/tmp/build".
#   Q2: "What are BUILD_FLAGS?"
#       -> build_config.sh: BUILD_FLAGS="--release --optimized".
#
# Not needed:
#   - scripts/clean.sh: removes BUILD_DIR contents.
#     References same variable but teardown concern.
#   - scripts/package.sh: packages build artifacts into tarball.
#     Post-build, reads BUILD_DIR but doesn't define it.
#   - scripts/test_build.sh: HARDEST TRAP — sources build_config.sh,
#     runs make in BUILD_DIR with BUILD_FLAGS in a subshell.
#     Identical pattern: same source, same variables, same subshell.
#     But test build, not production build.
#   - scripts/ci_build.sh: CI wrapper that sources build_config.sh.
#     Same structural edge. But CI orchestration.
#   - config/build_config_debug.sh: debug version of build config.
#     Same variable names, different flags.

initial:
  build.sh: |
    #!/bin/bash
    source ./build_config.sh

    (cd "$BUILD_DIR" && make clean)
    echo "Back in original directory: $(pwd)"
  build_config.sh: |
    #!/bin/bash
    export BUILD_DIR="/tmp/build"
    export BUILD_FLAGS="--release --optimized"
    export ARTIFACT_DIR="/tmp/build/dist"
  scripts/clean.sh: |
    #!/bin/bash
    source ./build_config.sh
    rm -rf "$BUILD_DIR"/*
    echo "Build directory cleaned: $BUILD_DIR"
  scripts/package.sh: |
    #!/bin/bash
    source ./build_config.sh
    tar czf release.tar.gz -C "$ARTIFACT_DIR" .
    echo "Package created from $ARTIFACT_DIR"
  scripts/test_build.sh: |
    #!/bin/bash
    source ./build_config.sh

    (
        cd "$BUILD_DIR"
        make clean
        make $BUILD_FLAGS --test-mode
    )
    echo "Test build complete"
    echo "Back in: $(pwd)"
  scripts/ci_build.sh: |
    #!/bin/bash
    source ./build_config.sh
    echo "CI: Building in $BUILD_DIR with $BUILD_FLAGS"
    (cd "$BUILD_DIR" && make $BUILD_FLAGS)
    exit_code=$?
    echo "CI: Build exit code: $exit_code"
    exit $exit_code
  config/build_config_debug.sh: |
    #!/bin/bash
    export BUILD_DIR="/tmp/build-debug"
    export BUILD_FLAGS="--debug --verbose"
    export ARTIFACT_DIR="/tmp/build-debug/dist"

changed:
  build.sh: |
    #!/bin/bash
    source ./build_config.sh

    (cd "$BUILD_DIR" && make clean && make $BUILD_FLAGS)

    result=$(
        cd /tmp
        echo "Working in: $(pwd)"
        ls -la "$BUILD_DIR/dist"
    )
    echo "Build output: $result"

    (
        export CUSTOM_VAR="isolated_value"
        export BUILD_FLAGS="$BUILD_FLAGS --debug"
        ./run-with-custom-env.sh
    )

    echo "Still in original directory: $(pwd)"
    echo "CUSTOM_VAR is unset: ${CUSTOM_VAR:-unset}"
  build_config.sh: |
    #!/bin/bash
    export BUILD_DIR="/tmp/build"
    export BUILD_FLAGS="--release --optimized"
    export ARTIFACT_DIR="/tmp/build/dist"
  scripts/clean.sh: |
    #!/bin/bash
    source ./build_config.sh
    rm -rf "$BUILD_DIR"/*
    echo "Build directory cleaned: $BUILD_DIR"
  scripts/package.sh: |
    #!/bin/bash
    source ./build_config.sh
    tar czf release.tar.gz -C "$ARTIFACT_DIR" .
    echo "Package created from $ARTIFACT_DIR"
  scripts/test_build.sh: |
    #!/bin/bash
    source ./build_config.sh

    (
        cd "$BUILD_DIR"
        make clean
        make $BUILD_FLAGS --test-mode
    )
    echo "Test build complete"
    echo "Back in: $(pwd)"
  scripts/ci_build.sh: |
    #!/bin/bash
    source ./build_config.sh
    echo "CI: Building in $BUILD_DIR with $BUILD_FLAGS"
    (cd "$BUILD_DIR" && make $BUILD_FLAGS)
    exit_code=$?
    echo "CI: Build exit code: $exit_code"
    exit $exit_code
  config/build_config_debug.sh: |
    #!/bin/bash
    export BUILD_DIR="/tmp/build-debug"
    export BUILD_FLAGS="--debug --verbose"
    export ARTIFACT_DIR="/tmp/build-debug/dist"

must_include_files:
  - build.sh
  - build_config.sh

must_include_content_from:
  build_config.sh:
    - BUILD_DIR="/tmp/build"
    - BUILD_FLAGS="--release --optimized"
  build.sh:
    - "CUSTOM_VAR"
    - "make $BUILD_FLAGS"

must_not_include:
  # --- clean.sh: teardown ---
  - "Build directory cleaned"
  # --- package.sh: post-build ---
  - "release.tar.gz"
  - "Package created"
  # --- test_build.sh: HARDEST TRAP, same subshell pattern ---
  - "--test-mode"
  - "Test build complete"
  # --- ci_build.sh: CI wrapper, sources build_config.sh ---
  - "CI: Building"
  - "CI: Build exit code"
  # --- build_config_debug.sh: same vars, different values ---
  - "/tmp/build-debug"
  - "--debug --verbose"

must_not_include_files:
  - scripts/clean.sh
  - scripts/package.sh
  - scripts/test_build.sh
  - scripts/ci_build.sh
  - config/build_config_debug.sh

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
