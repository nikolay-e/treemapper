# Scenario: worker.sh defines a pipe-based IPC protocol for reading transformed
# lines. orchestrate.sh sources worker.sh and runs a single coprocess.
# The diff adds a second coprocess (TRANSFORMER) to orchestrate.sh and reads
# from both, reusing the read_from_coproc helper from worker.sh.
#
# Diff: orchestrate.sh adds TRANSFORMER coprocess, sends data to both WORKER
# and TRANSFORMER, reads results via read_from_coproc.
#
# Reviewer questions:
#   Q1: "What does read_from_coproc do — does it handle the fd array correctly?"
#       -> worker.sh (UNCHANGED) defines read_from_coproc that reads from $1[0]
#          fd. Reviewer needs this to verify second coprocess usage is correct.
#   Q2: "Is cleanup_coproc safe to call twice for different coprocess names?"
#       -> worker.sh defines cleanup_coproc that closes fds by name — reviewer
#          checks it handles distinct coproc names independently.
#
# Not needed:
#   - logging.sh: logging utility sourced by many scripts — no import edge
#     from orchestrate.sh, just coincidentally also uses file descriptors
#     for its log rotation feature.
#   - monitor.sh: monitors running PIDs — related "background process" domain
#     but doesn't define or consume the coprocess helpers.
#   - pipeline.sh: also sources worker.sh and calls read_from_coproc. DIRECT
#     structural edge (same source, same functions) but chains 3 coprocesses
#     in a different pattern — doesn't help review orchestrate.sh's changes.
#   - parallel.sh: runs background jobs with & and wait. Same "concurrent
#     process" domain but uses job control, not coprocesses.
#   - lib/fd_utils.sh: file descriptor management utilities. Manages fds
#     similarly but doesn't use coproc — raw exec redirections.

initial:
  lib/worker.sh: |
    #!/bin/bash

    read_from_coproc() {
        local -n coproc_fds=$1
        local result
        read -r result <&${coproc_fds[0]}
        echo "$result"
    }

    write_to_coproc() {
        local -n coproc_fds=$1
        local data=$2
        echo "$data" >&${coproc_fds[1]}
    }

    cleanup_coproc() {
        local -n coproc_fds=$1
        local coproc_pid=$2
        exec {coproc_fds[1]}>&-
        wait "$coproc_pid"
    }
  orchestrate.sh: |
    #!/bin/bash
    source ./lib/worker.sh

    coproc WORKER { while read -r line; do echo "Echo: $line"; done; }

    echo "Hello" >&${WORKER[1]}
    result=$(read_from_coproc WORKER)
    echo "Got: $result"

    cleanup_coproc WORKER $WORKER_PID
  logging.sh: |
    #!/bin/bash

    LOG_FD=3
    exec 3>/tmp/app.log

    write_log() {
        local level=$1
        local message=$2
        echo "$(date +%Y-%m-%dT%H:%M:%S) [$level] $message" >&$LOG_FD
    }

    rotate_log() {
        exec 3>&-
        mv /tmp/app.log /tmp/app.log.1
        exec 3>/tmp/app.log
    }

    flush_log() {
        sync
    }
  monitor.sh: |
    #!/bin/bash

    declare -A TRACKED_PIDS

    track_pid() {
        local name=$1
        local pid=$2
        TRACKED_PIDS[$name]=$pid
        echo "$name=$pid" >> /tmp/running_pids.txt
    }

    wait_for_all() {
        while read -r entry; do
            local pid="${entry#*=}"
            wait "$pid" 2>/dev/null
        done < /tmp/running_pids.txt
    }

    check_alive() {
        local name=$1
        local pid=${TRACKED_PIDS[$name]}
        kill -0 "$pid" 2>/dev/null
    }
  pipeline.sh: |
    #!/bin/bash
    source ./lib/worker.sh

    coproc STAGE1 { while read -r line; do echo "stage1:$line"; done; }
    coproc STAGE2 { while read -r line; do echo "stage2:$line"; done; }
    coproc STAGE3 { while read -r line; do echo "stage3:$line"; done; }

    run_pipeline() {
        local input=$1
        write_to_coproc STAGE1 "$input"
        local s1
        s1=$(read_from_coproc STAGE1)
        write_to_coproc STAGE2 "$s1"
        local s2
        s2=$(read_from_coproc STAGE2)
        write_to_coproc STAGE3 "$s2"
        read_from_coproc STAGE3
    }

    cleanup_pipeline() {
        cleanup_coproc STAGE1 $STAGE1_PID
        cleanup_coproc STAGE2 $STAGE2_PID
        cleanup_coproc STAGE3 $STAGE3_PID
    }
  parallel.sh: |
    #!/bin/bash

    MAX_JOBS=4
    RUNNING_JOBS=0

    run_job() {
        local cmd=$1
        while (( RUNNING_JOBS >= MAX_JOBS )); do
            wait -n
            RUNNING_JOBS=$((RUNNING_JOBS - 1))
        done
        eval "$cmd" &
        RUNNING_JOBS=$((RUNNING_JOBS + 1))
    }

    wait_all_jobs() {
        wait
        RUNNING_JOBS=0
    }

    job_count() {
        echo "$RUNNING_JOBS"
    }
  lib/fd_utils.sh: |
    #!/bin/bash

    open_fd_read() {
        local fd=$1
        local file=$2
        eval "exec ${fd}<${file}"
    }

    open_fd_write() {
        local fd=$1
        local file=$2
        eval "exec ${fd}>${file}"
    }

    close_fd() {
        local fd=$1
        eval "exec ${fd}>&-"
    }

    redirect_stderr() {
        local file=$1
        exec 2>"$file"
    }

changed:
  lib/worker.sh: |
    #!/bin/bash

    read_from_coproc() {
        local -n coproc_fds=$1
        local result
        read -r result <&${coproc_fds[0]}
        echo "$result"
    }

    write_to_coproc() {
        local -n coproc_fds=$1
        local data=$2
        echo "$data" >&${coproc_fds[1]}
    }

    cleanup_coproc() {
        local -n coproc_fds=$1
        local coproc_pid=$2
        exec {coproc_fds[1]}>&-
        wait "$coproc_pid"
    }
  orchestrate.sh: |
    #!/bin/bash
    source ./lib/worker.sh

    coproc WORKER { while read -r line; do echo "Echo: $line"; done; }

    echo "Hello" >&${WORKER[1]}
    result=$(read_from_coproc WORKER)
    echo "Got: $result"

    coproc TRANSFORMER {
        while read -r line; do
            echo "${line^^}"
        done
    }

    echo "lowercase" >&${TRANSFORMER[1]}
    upper=$(read_from_coproc TRANSFORMER)
    echo "Transformed: $upper"

    cleanup_coproc WORKER $WORKER_PID
    cleanup_coproc TRANSFORMER $TRANSFORMER_PID

must_include_files:
  # Q1+Q2: worker.sh defines read_from_coproc and cleanup_coproc — reviewer
  # verifies the helpers work correctly with the new TRANSFORMER coprocess
  - lib/worker.sh
must_include_content_from:
  lib/worker.sh:
    - "read_from_coproc()"
    - "cleanup_coproc()"
  orchestrate.sh:
    - "coproc TRANSFORMER"
    - "read_from_coproc TRANSFORMER"
must_not_include:
  # logging.sh: file descriptor usage is coincidental, no source edge
  - write_log
  - rotate_log
  - LOG_FD
  - flush_log
  # monitor.sh: PID tracking domain overlap but no dependency
  - track_pid
  - wait_for_all
  - check_alive
  - TRACKED_PIDS
  # pipeline.sh: HARDEST TRAP — sources worker.sh and calls read_from_coproc
  # Same source dependency, same functions, but different consumer pattern
  - STAGE1
  - STAGE2
  - STAGE3
  - run_pipeline
  - cleanup_pipeline
  # parallel.sh: concurrent processes via job control, not coprocesses
  - MAX_JOBS
  - run_job
  - wait_all_jobs
  # lib/fd_utils.sh: raw fd management, no coproc involvement
  - open_fd_read
  - open_fd_write
  - close_fd
  - redirect_stderr
must_not_include_files:
  - logging.sh
  - monitor.sh
  - pipeline.sh
  - parallel.sh
  - lib/fd_utils.sh
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
