initial:
  process.sh: |
    #!/bin/bash

    files=("${@}")

    for file in "${files[@]}"; do
        echo "File: $file"
    done

    echo "Total files: ${#files[@]}"
  unrelated/garbage_etcd.sh: |
    #!/bin/bash
    # GARBAGE_SH_010_ETCD_WATCH_A
    GARBAGE_SH_010_ETCD_ENDPOINT_B="http://localhost:2379"

    garbage_etcd_get_010() {
        local key=$1
        echo "Value for $key: default"
    }

    garbage_etcd_put_010() {
        local key=$1
        local val=$2
        echo "Put $key=$val"
    }
  unrelated/garbage_consul.sh: |
    #!/bin/bash
    # GARBAGE_SH_010_CONSUL_SERVICE_C
    GARBAGE_SH_010_CONSUL_ADDR_D="http://localhost:8500"

    garbage_register_svc_010() {
        local name=$1
        echo "Registered: $name"
    }

    garbage_deregister_svc_010() {
        local id=$1
        echo "Deregistered: $id"
    }
changed:
  process.sh: |
    #!/bin/bash

    files=("${@}")
    declare -a results

    for i in "${!files[@]}"; do
        file="${files[$i]}"
        if [[ -f "$file" ]]; then
            results+=("$file: OK")
        else
            results+=("$file: NOT FOUND")
        fi
    done

    echo "Results:"
    for result in "${results[@]}"; do
        echo "  $result"
    done

    echo "Total files: ${#files[@]}"
    echo "Total results: ${#results[@]}"
  unrelated/garbage_etcd.sh: |
    #!/bin/bash
    # GARBAGE_SH_010_ETCD_WATCH_A
    GARBAGE_SH_010_ETCD_ENDPOINT_B="http://localhost:2379"

    garbage_etcd_get_010() {
        local key=$1
        echo "Value for $key: default"
    }

    garbage_etcd_put_010() {
        local key=$1
        local val=$2
        echo "Put $key=$val"
    }
  unrelated/garbage_consul.sh: |
    #!/bin/bash
    # GARBAGE_SH_010_CONSUL_SERVICE_C
    GARBAGE_SH_010_CONSUL_ADDR_D="http://localhost:8500"

    garbage_register_svc_010() {
        local name=$1
        echo "Registered: $name"
    }

    garbage_deregister_svc_010() {
        local id=$1
        echo "Deregistered: $id"
    }
must_include:
- process.sh
- results
must_not_include:
- GARBAGE_SH_010_ETCD_WATCH_A
- GARBAGE_SH_010_ETCD_ENDPOINT_B
- garbage_etcd_get_010
- garbage_etcd_put_010
- GARBAGE_SH_010_CONSUL_SERVICE_C
- GARBAGE_SH_010_CONSUL_ADDR_D
- garbage_register_svc_010
- garbage_deregister_svc_010
add_garbage_files: false
skip_garbage_check: true
