initial:
  script.sh: |
    #!/bin/bash

    echo "Running with bash"
    echo "Version: $BASH_VERSION"
  unrelated/garbage_fstab.sh: |
    #!/bin/bash
    # GARBAGE_SH_025_FSTAB_ENTRY_A
    GARBAGE_SH_025_MOUNT_OPTS_B="defaults,noatime"

    garbage_check_mounts_025() {
        echo "All mounts OK"
    }

    garbage_add_mount_025() {
        local dev=$1
        local mnt=$2
        echo "Adding $dev at $mnt"
    }
  unrelated/garbage_ulimit.sh: |
    #!/bin/bash
    # GARBAGE_SH_025_ULIMIT_CONF_C
    GARBAGE_SH_025_NOFILE_D="65535"

    garbage_show_limits_025() {
        echo "Open files: $GARBAGE_SH_025_NOFILE_D"
    }

    garbage_set_limit_025() {
        local resource=$1
        local val=$2
        echo "Setting $resource to $val"
    }
changed:
  script.sh: |
    #!/usr/bin/env bash

    if [[ "${BASH_VERSINFO[0]}" -lt 4 ]]; then
        echo "Bash 4.0+ required"
        exit 1
    fi

    declare -A map
    map[key]="value"

    echo "Running with: $BASH_VERSION"
    echo "Map value: ${map[key]}"
  unrelated/garbage_fstab.sh: |
    #!/bin/bash
    # GARBAGE_SH_025_FSTAB_ENTRY_A
    GARBAGE_SH_025_MOUNT_OPTS_B="defaults,noatime"

    garbage_check_mounts_025() {
        echo "All mounts OK"
    }

    garbage_add_mount_025() {
        local dev=$1
        local mnt=$2
        echo "Adding $dev at $mnt"
    }
  unrelated/garbage_ulimit.sh: |
    #!/bin/bash
    # GARBAGE_SH_025_ULIMIT_CONF_C
    GARBAGE_SH_025_NOFILE_D="65535"

    garbage_show_limits_025() {
        echo "Open files: $GARBAGE_SH_025_NOFILE_D"
    }

    garbage_set_limit_025() {
        local resource=$1
        local val=$2
        echo "Setting $resource to $val"
    }
must_include:
- script.sh
- BASH_VERSION
must_not_include:
- GARBAGE_SH_025_FSTAB_ENTRY_A
- GARBAGE_SH_025_MOUNT_OPTS_B
- garbage_check_mounts_025
- garbage_add_mount_025
- GARBAGE_SH_025_ULIMIT_CONF_C
- GARBAGE_SH_025_NOFILE_D
- garbage_show_limits_025
- garbage_set_limit_025
add_garbage_files: false
skip_garbage_check: true
