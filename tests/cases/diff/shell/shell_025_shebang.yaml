# Scenario: runner.sh changes shebang to #!/usr/bin/env bash, adds a
# BASH_VERSINFO check, and uses create_map/get_map_value from bash-utils.sh
# which require bash 4+ (declare -A, local -n).
#
# Reviewer questions:
#   Q1: "What bash features does create_map require?"
#       -> bash-utils.sh: uses `declare -A` (bash 4+) and `local -n`
#          (namerefs, bash 4.3+). Reviewer verifies version check.
#   Q2: "Does get_map_value use namerefs requiring bash 4.3+?"
#       -> bash-utils.sh: `local -n map_ref=$1`. Version check says >=4,
#          but namerefs need 4.3+. Potential bug.
#
# Not needed:
#   - posix-utils.sh: POSIX-compliant utilities (no bashisms).
#     Similar "utils library" but deliberately avoids bash features.
#   - zsh-compat.sh: compatibility shims for zsh.
#     Related "shell compatibility" theme but different shell.
#   - scripts/config_loader.sh: HARDEST TRAP — sources bash-utils.sh,
#     uses create_map to load config, uses get_map_value to read keys.
#     Identical pattern: same source, same functions, same declare -A.
#     But a config consumer, not function definitions.
#   - scripts/version_check.sh: validates bash version for all scripts.
#     Checks BASH_VERSINFO same way. But standalone validation tool.
#   - lib/array-utils.sh: bash 4+ array utilities in same lib/ directory.
#     Same bash version requirement, same directory. But different
#     data structures (indexed arrays vs associative maps).

max_enrichment: 10.1
initial:
  lib/bash-utils.sh: |
    #!/bin/bash

    create_map() {
        local -n map_ref=$1
        shift
        while [[ $# -ge 2 ]]; do
            map_ref[$1]="$2"
            shift 2
        done
    }

    get_map_value() {
        local -n map_ref=$1
        local key=$2
        if [[ -v map_ref[$key] ]]; then
            echo "${map_ref[$key]}"
        else
            echo ""
            return 1
        fi
    }

    map_keys() {
        local -n map_ref=$1
        echo "${!map_ref[@]}"
    }
  runner.sh: |
    #!/bin/bash
    source ./lib/bash-utils.sh

    echo "Running application"
    echo "Bash version: $BASH_VERSION"
  posix-utils.sh: |
    #!/bin/sh

    join_strings() {
        local separator=$1
        shift
        local result=""
        for item in "$@"; do
            if [ -z "$result" ]; then
                result="$item"
            else
                result="${result}${separator}${item}"
            fi
        done
        echo "$result"
    }

    to_lower() {
        echo "$1" | tr '[:upper:]' '[:lower:]'
    }

    file_exists() {
        [ -f "$1" ]
    }
  zsh-compat.sh: |
    #!/bin/bash

    is_zsh() {
        [[ -n "$ZSH_VERSION" ]]
    }

    ensure_bash_compat() {
        if is_zsh; then
            emulate -L bash
        fi
    }

    portable_readlink() {
        if command -v greadlink > /dev/null; then
            greadlink -f "$1"
        elif command -v readlink > /dev/null; then
            readlink -f "$1"
        else
            echo "$1"
        fi
    }
  scripts/config_loader.sh: |
    #!/usr/bin/env bash
    source ./lib/bash-utils.sh

    if [[ "${BASH_VERSINFO[0]}" -lt 4 ]]; then
        echo "Config loader requires bash 4+"
        exit 1
    fi

    declare -A app_config
    create_map app_config \
        db_host "localhost" \
        db_port "5432" \
        db_name "myapp" \
        cache_ttl "300"

    echo "Database: $(get_map_value app_config db_host):$(get_map_value app_config db_port)"
    echo "DB Name: $(get_map_value app_config db_name)"
    echo "Cache TTL: $(get_map_value app_config cache_ttl)s"
  scripts/version_check.sh: |
    #!/bin/bash

    check_bash_version() {
        local required_major=${1:-4}
        local required_minor=${2:-0}
        local current_major="${BASH_VERSINFO[0]}"
        local current_minor="${BASH_VERSINFO[1]}"

        if [[ "$current_major" -lt "$required_major" ]] || \
           [[ "$current_major" -eq "$required_major" && "$current_minor" -lt "$required_minor" ]]; then
            echo "FAIL: Bash ${required_major}.${required_minor}+ required, found ${current_major}.${current_minor}"
            return 1
        fi
        echo "OK: Bash ${current_major}.${current_minor} meets ${required_major}.${required_minor}+"
        return 0
    }

    check_bash_version 4 3 || exit 1
    echo "All version checks passed"
  lib/array-utils.sh: |
    #!/bin/bash

    array_push() {
        local -n arr_ref=$1
        shift
        arr_ref+=("$@")
    }

    array_pop() {
        local -n arr_ref=$1
        local last_index=$(( ${#arr_ref[@]} - 1 ))
        if [[ $last_index -ge 0 ]]; then
            echo "${arr_ref[$last_index]}"
            unset "arr_ref[$last_index]"
        fi
    }

    array_contains() {
        local -n arr_ref=$1
        local needle=$2
        for item in "${arr_ref[@]}"; do
            [[ "$item" == "$needle" ]] && return 0
        done
        return 1
    }

    array_join() {
        local -n arr_ref=$1
        local sep=${2:-,}
        local result=""
        for item in "${arr_ref[@]}"; do
            result="${result:+${result}${sep}}${item}"
        done
        echo "$result"
    }

