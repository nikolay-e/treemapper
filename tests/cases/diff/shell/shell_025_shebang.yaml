must_include_files:
  - lib/bash-utils.sh
  - runner.sh

must_include_content_from:
  lib/bash-utils.sh:
    - "create_map()"
    - "get_map_value()"
    - "local -n map_ref"
  runner.sh:
    - "create_map settings"
    - "get_map_value settings"
    - "BASH_VERSINFO"

must_not_include:
  # --- posix-utils.sh: POSIX-only, no source edge ---
  - join_strings
  - to_lower
  - file_exists
  # --- zsh-compat.sh: different shell compatibility ---
  - is_zsh
  - ensure_bash_compat
  - portable_readlink
  # --- config_loader.sh: HARDEST TRAP, sources bash-utils.sh, uses create_map ---
  - "Config loader requires"
  - app_config
  - "Cache TTL"
  # --- version_check.sh: checks BASH_VERSINFO same way ---
  - check_bash_version
  - "All version checks passed"
  # --- array-utils.sh: sibling in lib/, same bash 4+ requirement ---
  - array_push
  - array_pop
  - array_contains

must_not_include_files:
  - posix-utils.sh
  - zsh-compat.sh
  - scripts/config_loader.sh
  - scripts/version_check.sh
  - lib/array-utils.sh

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
