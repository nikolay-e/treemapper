name: bal_rare_003_haskell_monad_transformer
tags:
- lang:haskell
- change:single_file
- change:bug_fix
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    src/Config.hs: |
      module Config where

      data AppConfig = AppConfig
        { dbHost :: String
        , dbPort :: Int
        , logLevel :: String
        } deriving (Show)

      defaultConfig :: AppConfig
      defaultConfig = AppConfig
        { dbHost = "localhost"
        , dbPort = 5432
        , logLevel = "info"
        }

      getConnectionString :: AppConfig -> String
      getConnectionString cfg =
        "host=" ++ dbHost cfg ++ " port=" ++ show (dbPort cfg)
    src/Database.hs: |
      module Database where
      import Config (AppConfig, getConnectionString)

      data Connection = Connection String deriving (Show)

      connect :: AppConfig -> IO Connection
      connect cfg = do
        let connStr = getConnectionString cfg
        return (Connection connStr)

      query :: Connection -> String -> IO [String]
      query _ _ = return []
    garbage_email.hs: |
      module GarbageEmail where
      GARBAGE_RARE_003_SMTP_A = "smtp.example.com"
      GARBAGE_RARE_003_PORT_B = 587

      sendEmail :: String -> String -> IO ()
      sendEmail _ _ = return ()

      GARBAGE_RARE_003_TLS_C = True
    garbage_queue.hs: |
      module GarbageQueue where
      GARBAGE_RARE_003_QUEUE_D = "rabbitmq"
      GARBAGE_RARE_003_PREFETCH_E = 10

      publishMessage :: String -> IO ()
      publishMessage _ = return ()

      GARBAGE_RARE_003_RETRY_F = 3
  changed_files:
    src/Config.hs: |
      module Config where

      data AppConfig = AppConfig
        { dbHost :: String
        , dbPort :: Int
        , logLevel :: String
        } deriving (Show)

      defaultConfig :: AppConfig
      defaultConfig = AppConfig
        { dbHost = "localhost"
        , dbPort = 5432
        , logLevel = "info"
        }

      getConnectionString :: AppConfig -> String
      getConnectionString cfg =
        "host=" ++ dbHost cfg ++ " port=" ++ show (dbPort cfg) ++ " sslmode=require"
    src/Database.hs: |
      module Database where
      import Config (AppConfig, getConnectionString)

      data Connection = Connection String deriving (Show)

      connect :: AppConfig -> IO Connection
      connect cfg = do
        let connStr = getConnectionString cfg
        return (Connection connStr)

      query :: Connection -> String -> IO [String]
      query _ _ = return []
    garbage_email.hs: |
      module GarbageEmail where
      GARBAGE_RARE_003_SMTP_A = "smtp.example.com"
      GARBAGE_RARE_003_PORT_B = 587

      sendEmail :: String -> String -> IO ()
      sendEmail _ _ = return ()

      GARBAGE_RARE_003_TLS_C = True
    garbage_queue.hs: |
      module GarbageQueue where
      GARBAGE_RARE_003_QUEUE_D = "rabbitmq"
      GARBAGE_RARE_003_PREFETCH_E = 10

      publishMessage :: String -> IO ()
      publishMessage _ = return ()

      GARBAGE_RARE_003_RETRY_F = 3
  commit_message: "fix: add sslmode to connection string"
