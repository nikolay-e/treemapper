name: bal4_crossmod_008_rust_struct_field_cross_mod
tags:
- lang:rust
- change:single_file
- context:cross_module
- distance:1hop
- difficulty:trivial
repo:
  initial_files:
    src/domain/order.rs: |
      pub struct Order {
          pub id: u64,
          pub total: f64,
          pub status: String,
      }

      impl Order {
          pub fn new(id: u64, total: f64) -> Self {
              Order { id, total, status: "pending".to_string() }
          }
      }
    src/handlers/order_handler.rs: |
      use crate::domain::order::Order;

      pub fn create_order(id: u64, total: f64) -> Order {
          Order::new(id, total)
      }

      pub fn format_order(order: &Order) -> String {
          format!("Order #{}: ${:.2} [{}]", order.id, order.total, order.status)
      }
    src/middleware/auth.rs: |
      pub const GARBAGE_008_TOKEN_A: &str = "bearer";
      pub const GARBAGE_008_HEADER_B: &str = "Authorization";

      pub fn check_auth(token: &str) -> bool {
          !token.is_empty()
      }
    garbage_cli.rs: |
      pub const GARBAGE_008_CMD_C: &str = "run";
      pub const GARBAGE_008_FLAG_D: &str = "--verbose";

      pub fn parse_args() {}
  changed_files:
    src/domain/order.rs: |
      pub struct Order {
          pub id: u64,
          pub total: f64,
          pub status: String,
          pub currency: String,
      }

      impl Order {
          pub fn new(id: u64, total: f64) -> Self {
              Order { id, total, status: "pending".to_string(), currency: "USD".to_string() }
          }
      }
    src/handlers/order_handler.rs: |
      use crate::domain::order::Order;

      pub fn create_order(id: u64, total: f64) -> Order {
          Order::new(id, total)
      }

      pub fn format_order(order: &Order) -> String {
          format!("Order #{}: ${:.2} [{}]", order.id, order.total, order.status)
      }
    src/middleware/auth.rs: |
      pub const GARBAGE_008_TOKEN_A: &str = "bearer";
      pub const GARBAGE_008_HEADER_B: &str = "Authorization";

      pub fn check_auth(token: &str) -> bool {
          !token.is_empty()
      }
    garbage_cli.rs: |
      pub const GARBAGE_008_CMD_C: &str = "run";
      pub const GARBAGE_008_FLAG_D: &str = "--verbose";

      pub fn parse_args() {}
  commit_message: "add currency field to Order"
