repo:
  initial_files:
    src/main/java/com/healthcare/DiagnosisService.java: |
      package com.healthcare;

      import java.util.List;

      public class DiagnosisService {
          public String diagnose(String patientId, List<String> symptoms) {
              if (patientId == null || patientId.isBlank()) {
                  throw new IllegalArgumentException("Patient ID required");
              }
              if (symptoms == null || symptoms.isEmpty()) {
                  throw new IllegalArgumentException("Symptoms required");
              }
              return symptoms.contains("fever") ? "flu" : "unknown";
          }
      }
    src/main/java/com/healthcare/PrescriptionService.java: |
      package com.healthcare;

      public class PrescriptionService {
          public String prescribe(String patientId, String diagnosis) {
              if (patientId == null || patientId.isBlank()) {
                  throw new IllegalArgumentException("Patient ID required");
              }
              if (diagnosis == null || diagnosis.isBlank()) {
                  throw new IllegalArgumentException("Diagnosis required");
              }
              return diagnosis.equals("flu") ? "tamiflu" : "paracetamol";
          }
      }
    src/main/java/com/healthcare/LabService.java: |
      package com.healthcare;

      public class LabService {
          public String orderTest(String patientId, String testType) {
              return "LAB-" + patientId + "-" + testType;
          }
      }
