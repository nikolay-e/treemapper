    src/main/java/com/healthcare/DiagnosisService.java: |
      package com.healthcare;

      import com.healthcare.validation.PatientValidator;
      import java.util.List;

      public class DiagnosisService {
          private final PatientValidator validator;

          public DiagnosisService(PatientValidator validator) {
              this.validator = validator;
          }

          public String diagnose(String patientId, List<String> symptoms) {
              validator.requirePatientId(patientId);
              if (symptoms == null || symptoms.isEmpty()) {
                  throw new IllegalArgumentException("Symptoms required");
              }
              return symptoms.contains("fever") ? "flu" : "unknown";
          }
      }
