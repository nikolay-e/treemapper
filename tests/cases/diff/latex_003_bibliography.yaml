    paper.tex: |
      \documentclass[11pt]{article}
      \usepackage[utf8]{inputenc}
      \usepackage{amsmath}
      \usepackage{natbib}

      \title{Advances in Neural Architecture Search}
      \author{Bob Chen}

      \begin{document}
      \maketitle

      \section{Introduction}
      Neural architecture search (NAS) has emerged as a powerful
      approach to automating the design of neural networks.
      Early work by \citet{zoph2017} demonstrated that reinforcement
      learning can discover competitive architectures.

      \section{Background}
      The search space typically includes choices for layer types,
      connections, and hyperparameters. Efficient NAS methods
      reduce the computational cost from thousands of GPU-hours
      to a single GPU-day \citep{liu2019darts}.

      \bibliographystyle{plainnat}
      \bibliography{references}
      \end{document}
    references.bib: |
      @inproceedings{zoph2017,
        author    = {Zoph, Barret and Le, Quoc V.},
        title     = {Neural Architecture Search with Reinforcement Learning},
        booktitle = {ICLR},
        year      = {2017}
      }

      @inproceedings{liu2019darts,
        author    = {Liu, Hanxiao and Simonyan, Karen and Yang, Yiming},
        title     = {{DARTS}: Differentiable Architecture Search},
        booktitle = {ICLR},
        year      = {2019}
      }

      @article{smith2024,
        author    = {Smith, John and Doe, Jane},
        title     = {Weight-Sharing Supernets for Efficient {NAS}},
        journal   = {NeurIPS},
        year      = {2024},
        volume    = {37},
        pages     = {1234--1245}
      }
    chapters/experiments.tex: |
      \section{Experiments}
      GARBAGE_TEX_003_A: experiments_marker

      We evaluate on CIFAR-10 and ImageNet benchmarks.
      All experiments use 8 NVIDIA A100 GPUs.
    chapters/related.tex: |
      \section{Related Work}
      GARBAGE_TEX_003_B: related_marker

      One-shot NAS methods share weights across candidate
      architectures to amortize the evaluation cost.
    supplementary.tex: |
      \documentclass{article}
      GARBAGE_TEX_003_C: supplementary_marker
      \begin{document}
      \section{Additional Results}
      Extended ablation studies are provided here.
      \end{document}
