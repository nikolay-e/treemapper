  changed_files:
    src/main/java/com/app/scheduler/Job.java: |
      package com.app.scheduler;

      public class Job {
          private String name;
          private Runnable task;
          private int maxRetries;
          private int retryCount;
          public Job(String name, Runnable task, int maxRetries) {
              this.name = name;
              this.task = task;
              this.maxRetries = maxRetries;
              this.retryCount = 0;
          }
          public String getName() { return name; }
          public int getMaxRetries() { return maxRetries; }
          public boolean canRetry() { return retryCount < maxRetries; }
          public void execute() {
              try {
                  task.run();
              } catch (Exception e) {
                  retryCount++;
                  if (canRetry()) execute();
              }
          }
      }
  commit_message: "feat: add retry logic to Job execution"
