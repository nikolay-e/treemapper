      package com.app.scheduler;

      public class Job {
          private String name;
          private Runnable task;
          public Job(String name, Runnable task) {
              this.name = name;
              this.task = task;
          }
          public String getName() { return name; }
          public void execute() { task.run(); }
      }
    src/main/java/com/app/scheduler/JobQueue.java: |
      package com.app.scheduler;

      import java.util.LinkedList;
      import java.util.Queue;

      public class JobQueue {
          private final Queue<Job> queue = new LinkedList<>();
          public void enqueue(Job job) {
              queue.add(job);
          }
          public Job dequeue() {
              return queue.poll();
          }
          public boolean isEmpty() { return queue.isEmpty(); }
      }
    src/main/java/com/app/scheduler/Scheduler.java: |
      package com.app.scheduler;

      public class Scheduler {
          private final JobQueue jobQueue;
          public Scheduler(JobQueue jobQueue) {
              this.jobQueue = jobQueue;
          }
          public void run() {
              while (!jobQueue.isEmpty()) {
                  Job job = jobQueue.dequeue();
                  job.execute();
              }
          }
      }
    src/main/java/com/app/service/TaskService.java: |
      package com.app.service;

      import com.app.scheduler.Scheduler;
      import com.app.scheduler.JobQueue;
      import com.app.scheduler.Job;

      public class TaskService {
          private final Scheduler scheduler;
          private final JobQueue jobQueue;
          public TaskService(Scheduler scheduler, JobQueue jobQueue) {
              this.scheduler = scheduler;
              this.jobQueue = jobQueue;
          }
          public void submit(String name, Runnable task) {
              jobQueue.enqueue(new Job(name, task));
          }
          public void runAll() {
              scheduler.run();
          }
      }
