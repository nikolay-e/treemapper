    app/src/main/java/com/example/trackapp/LocationService.java: |
      package com.example.trackapp;
      import android.Manifest;
      import android.content.pm.PackageManager;
      import android.location.LocationManager;
      import androidx.core.content.ContextCompat;
      public class LocationService {
          private final LocationManager locationManager;
          public LocationService(LocationManager locationManager) {
              this.locationManager = locationManager;
          }
          public boolean hasLocationPermission(android.content.Context ctx) {
              return ContextCompat.checkSelfPermission(ctx,
                  Manifest.permission.ACCESS_FINE_LOCATION) == PackageManager.PERMISSION_GRANTED;
          }
          public void startTracking() {
              locationManager.requestLocationUpdates(
                  LocationManager.GPS_PROVIDER, 5000, 10, location -> {});
          }
      }
    app/src/main/java/com/example/trackapp/MainActivity.java: |
      package com.example.trackapp;
