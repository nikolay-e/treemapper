xfail:
  category: weak-dart-discovery
repo:
  initial_files:
    lib/models/user.dart: |
      class User {
        final String id;
        final String name;
        final String email;

        User({required this.id, required this.name, required this.email});

        factory User.fromJson(Map<String, dynamic> json) {
          return User(
            id: json['id'] as String,
            name: json['name'] as String,
            email: json['email'] as String,
          );
        }

        Map<String, dynamic> toJson() {
          return {'id': id, 'name': name, 'email': email};
        }
      }
    lib/services/user_service.dart: |
      import '../models/user.dart';

      class UserService {
        final List<User> _users = [];

        void addUser(User user) {
          _users.add(user);
        }

        User? findById(String id) {
          return _users.where((u) => u.id == id).firstOrNull;
        }

        List<User> listAll() => List.unmodifiable(_users);
      }
    lib/widgets/user_card.dart: |
      import '../models/user.dart';

      class UserCard {
        final User user;

        UserCard(this.user);

        String render() {
          return '${user.name} <${user.email}>';
        }
      }
    lib/utils/validators.dart: |
      // ignore: unused_field
      const GARBAGE_RARE_004_VALID_A = 'validator';
      const GARBAGE_RARE_004_REGEX_B = 'pattern';

      bool isValidEmail(String email) => email.contains('@');
    lib/services/analytics.dart: |
      const GARBAGE_RARE_004_TRACK_C = 'analytics';
      const GARBAGE_RARE_004_EVENT_D = 'event';

      class Analytics {
        void track(String event) {}
      }
    lib/utils/logger.dart: |
      const GARBAGE_RARE_004_LOG_E = 'debug';
      const GARBAGE_RARE_004_LEVEL_F = 'info';

      class Logger {
        void info(String msg) {}
      }
  changed_files:
    lib/models/user.dart: |
      class User {
        final String id;
        final String name;
        final String email;
        final String? avatarUrl;
        final DateTime createdAt;

        User({
          required this.id,
          required this.name,
          required this.email,
          this.avatarUrl,
          required this.createdAt,
        });

        factory User.fromJson(Map<String, dynamic> json) {
          return User(
            id: json['id'] as String,
            name: json['name'] as String,
            email: json['email'] as String,
            avatarUrl: json['avatar_url'] as String?,
            createdAt: DateTime.parse(json['created_at'] as String),
          );
        }

        Map<String, dynamic> toJson() {
          return {
            'id': id,
            'name': name,
            'email': email,
            'avatar_url': avatarUrl,
            'created_at': createdAt.toIso8601String(),
          };
        }
      }
  commit_message: "add avatarUrl and createdAt to User model"
