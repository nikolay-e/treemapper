    ratelimit/bucket.py: |
      import time
      class TokenBucket:
          def __init__(self, capacity: int, refill_rate: float):
              self.capacity = capacity
              self.refill_rate = refill_rate
              self.tokens = float(capacity)
              self.last_refill = time.time()
          def _refill(self):
              now = time.time()
              elapsed = now - self.last_refill
              self.tokens = min(self.capacity, self.tokens + elapsed * self.refill_rate)
              self.last_refill = now
          def consume(self, count: int = 1) -> bool:
              self._refill()
              if self.tokens >= count:
                  self.tokens -= count
                  return True
              return False
    ratelimit/limiter.py: |
      from ratelimit.bucket import TokenBucket
      class RateLimiter:
          def __init__(self, capacity: int, refill_rate: float):
              self.buckets: dict[str, TokenBucket] = {}
              self.capacity = capacity
              self.refill_rate = refill_rate
          def allow(self, client_id: str) -> bool:
              if client_id not in self.buckets:
                  self.buckets[client_id] = TokenBucket(self.capacity, self.refill_rate)
              return self.buckets[client_id].consume()
    ratelimit/policy.py: |
      from ratelimit.limiter import RateLimiter
      class RateLimitPolicy:
          def __init__(self):
              self.limiters: dict[str, RateLimiter] = {}
          def add_policy(self, endpoint: str, capacity: int, refill_rate: float):
              self.limiters[endpoint] = RateLimiter(capacity, refill_rate)
          def check(self, endpoint: str, client_id: str) -> bool:
              limiter = self.limiters.get(endpoint)
              if limiter is None:
                  return True
              return limiter.allow(client_id)
    api/gateway.py: |
      from ratelimit.policy import RateLimitPolicy
      class APIGateway:
          def __init__(self):
              self.policy = RateLimitPolicy()
              self.policy.add_policy("/api/search", 10, 1.0)
              self.policy.add_policy("/api/upload", 3, 0.5)
          def handle(self, endpoint: str, client_id: str, data: dict) -> dict:
              if not self.policy.check(endpoint, client_id):
                  return {"error": "rate_limited", "status": 429}
              return {"data": data, "status": 200}
