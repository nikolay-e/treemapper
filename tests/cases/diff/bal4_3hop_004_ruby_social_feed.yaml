repo:
  initial_files:
    lib/social/post.rb: |
      module Social
        class Post
          attr_reader :body, :author
          def initialize(body, author)
            @body = body
            @author = author
          end
          def preview
            body[0..99]
          end
        end
      end
    lib/social/feed.rb: |
      require_relative 'post'
      module Social
        class Feed
          def initialize
            @posts = []
          end
          def add(body, author)
            @posts << Post.new(body, author)
          end
          def latest(n)
            @posts.last(n)
          end
        end
      end
    lib/social/timeline.rb: |
      require_relative 'feed'
      module Social
        class Timeline
          def initialize(feed)
            @feed = feed
          end
          def render(n)
            @feed.latest(n).map(&:preview)
          end
        end
      end
    lib/social/api.rb: |
      require_relative 'timeline'
      module Social
        class Api
          def initialize
            @feed = Feed.new
            @timeline = Timeline.new(@feed)
          end
          def show(n)
            @timeline.render(n)
          end
        end
      end
    lib/mailer/sender.rb: |
      module Mailer
        GARBAGE_004_SENDER_A = "smtp"
        GARBAGE_004_PORT_B = 587
        class Sender
          def self.deliver(to, body)
            true
          end
        end
      end
    lib/mailer/template.rb: |
      module Mailer
        GARBAGE_004_TEMPLATE_C = "html"
        GARBAGE_004_LAYOUT_D = "default"
        class Template
          def self.render(name)
            "<html>#{name}</html>"
          end
        end
      end
  changed_files:
    lib/social/post.rb: |
      module Social
        class Post
          attr_reader :body, :author
          def initialize(body, author)
            @body = body
            @author = author
          end
          def preview
            return "" if body.nil?
            body[0..99]
          end
        end
      end
    lib/social/feed.rb: |
      require_relative 'post'
      module Social
        class Feed
          def initialize
            @posts = []
          end
          def add(body, author)
            @posts << Post.new(body, author)
          end
          def latest(n)
            @posts.last(n)
          end
        end
      end
    lib/social/timeline.rb: |
