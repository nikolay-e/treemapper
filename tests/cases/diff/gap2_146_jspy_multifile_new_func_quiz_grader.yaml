name: gap2_146_jspy_multifile_new_func_quiz_grader
tags:
- change:multi_file
- change:new_function
- context:same_file
- difficulty:easy
- distance:0hop
- lang:javascript
- lang:python
repo:
  initial_files:
    grading/engine.py: |
      class GradingEngine:
          def __init__(self, answer_key: dict[int, str]):
              self.answer_key = answer_key

          def grade_answer(self, question_id: int, response: str) -> bool:
              return self.answer_key.get(question_id) == response

          def score_percentage(self, responses: dict[int, str]) -> float:
              correct = sum(1 for q, a in responses.items() if self.grade_answer(q, a))
              return round(correct / len(responses) * 100, 1) if responses else 0.0
    ui/quiz.js: |
      function renderQuestion(question) {
        return `<div class="question">${question.text}</div>`;
      }

      function collectAnswer(questionId) {
        const selected = document.querySelector(`input[name="q${questionId}"]:checked`);
        return selected ? selected.value : null;
      }
    grading/reports.py: |
      PASSING_THRESHOLD = 70.0

      class ReportGenerator:
          def __init__(self):
              self._reports: list[dict] = []

          def generate_summary(self, student_id: str, score: float) -> dict:
              return {"student": student_id, "score": score, "passed": score >= PASSING_THRESHOLD}
  changed_files:
    grading/engine.py: |
      class GradingEngine:
          def __init__(self, answer_key: dict[int, str]):
              self.answer_key = answer_key

          def grade_answer(self, question_id: int, response: str) -> bool:
              return self.answer_key.get(question_id) == response

          def score_percentage(self, responses: dict[int, str]) -> float:
              correct = sum(1 for q, a in responses.items() if self.grade_answer(q, a))
              return round(correct / len(responses) * 100, 1) if responses else 0.0

          def partial_credit_score(self, responses: dict[int, list[str]]) -> float:
              total = 0.0
              for qid, answers in responses.items():
                  expected = self.answer_key.get(qid, "")
                  if expected in answers:
                      total += 1.0 / len(answers)
              return round(total / len(responses) * 100, 1) if responses else 0.0
    ui/quiz.js: |
      function renderQuestion(question) {
        return `<div class="question">${question.text}</div>`;
      }

      function collectAnswer(questionId) {
        const selected = document.querySelector(`input[name="q${questionId}"]:checked`);
        return selected ? selected.value : null;
      }

      function showProgress(current, total) {
        const pct = Math.round((current / total) * 100);
        return `Question ${current}/${total} (${pct}%)`;
      }
  commit_message: "feat: add partial credit scoring and progress display"
fragments:
- id: engine_partial_credit
  selector:
    path: grading/engine.py
    anchor: "def partial_credit_score"
- id: ui_show_progress
  selector:
    path: ui/quiz.js
    anchor: "function showProgress"
- id: no_reports
  selector:
    path: grading/reports.py
- id: no_passing_threshold
  selector:
    anchor: PASSING_THRESHOLD
oracle:
  required:
  - engine_partial_credit
  - ui_show_progress
  allowed: []
  forbidden:
  - no_reports
  - no_passing_threshold
