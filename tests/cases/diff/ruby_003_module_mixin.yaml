name: ruby_003_module_mixin
tags:
- lang:ruby
- change:single_file
- change:new_function
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    lib/logging.rb: |
      module Logging
        def log(message, level: :info)
          timestamp = Time.now.strftime("%Y-%m-%d %H:%M:%S")
          formatted = "[#{level.upcase}] #{timestamp} - #{message}"
          puts formatted
          formatted
        end

        def log_error(message)
          log(message, level: :error)
        end

        def log_debug(message)
          log(message, level: :debug)
        end

        def log_warn(message)
          log(message, level: :warn)
        end
      end
    lib/worker.rb: |
      class Worker
        def perform
          "done"
        end
      end
    lib/json_serializer.rb: |
      require 'json'

      class JsonSerializer
        def initialize(pretty: false)
          @pretty = pretty
        end

        def serialize(object)
          if @pretty
            JSON.pretty_generate(object)
          else
            JSON.generate(object)
          end
        end

        def deserialize(json_string)
          JSON.parse(json_string, symbolize_names: true)
        end
      end
    lib/task_queue.rb: |
      class TaskQueue
        def initialize
          @queue = []
          @completed = []
        end

        def enqueue(task_name, priority: 0)
          @queue << { name: task_name, priority: priority, enqueued_at: Time.now }
          @queue.sort_by! { |t| -t[:priority] }
        end

        def dequeue
          @queue.shift
        end

        def complete(task_name)
          @completed << { name: task_name, completed_at: Time.now }
        end

        def pending_count
          @queue.size
        end
      end
  changed_files:
    lib/logging.rb: |
      module Logging
        def log(message, level: :info)
          timestamp = Time.now.strftime("%Y-%m-%d %H:%M:%S")
