          public String getName() { return name; }
          public int getStock() { return stock; }
          public void setStock(int stock) { this.stock = stock; }
      }
    src/test/java/com/inventory/product/ProductRepositoryTest.java: |
      package com.inventory.product;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      public class ProductRepositoryTest {
          @Test
          void saveAndFind() {
              ProductRepository repo = new ProductRepository();
              repo.save(new Product("p1", "Widget", 10));
              assertTrue(repo.findById("p1").isPresent());
          }

          @Test
          void findLowStockReturnsUnderThreshold() {
              ProductRepository repo = new ProductRepository();
              repo.save(new Product("p1", "Widget", 3));
              repo.save(new Product("p2", "Gadget", 50));
              List<Product> low = repo.findLowStock(10);
              assertEquals(1, low.size());
              assertEquals("p1", low.get(0).getId());
          }

          @Test
          void restockIncreasesStock() {
              ProductRepository repo = new ProductRepository();
              repo.save(new Product("p1", "Widget", 5));
              repo.restock("p1", 20);
              assertEquals(25, repo.findById("p1").get().getStock());
          }
      }
