    src/main/java/com/inventory/product/ProductRepository.java: |
      package com.inventory.product;

      import java.util.List;
      import java.util.ArrayList;
      import java.util.Optional;
      import java.util.stream.Collectors;

      public class ProductRepository {
          private final List<Product> products = new ArrayList<>();

          public void save(Product p) {
              products.add(p);
          }

          public Optional<Product> findById(String id) {
              return products.stream().filter(p -> p.getId().equals(id)).findFirst();
          }

          public List<Product> findAll() {
              return products;
          }

          public List<Product> findLowStock(int threshold) {
              return products.stream()
                  .filter(p -> p.getStock() < threshold)
                  .collect(Collectors.toList());
          }

          public void restock(String id, int quantity) {
              findById(id).ifPresent(p -> p.setStock(p.getStock() + quantity));
          }
      }
    src/main/java/com/inventory/product/Product.java: |
      package com.inventory.product;

      public class Product {
          private final String id;
          private final String name;
          private int stock;

