  changed_files:
    models/status.py: |
      from enum import Enum

      class OrderStatus(Enum):
          PENDING = "pending"
          CONFIRMED = "confirmed"
          SHIPPED = "shipped"
          DELIVERED = "delivered"
    models/order.py: |
      from models.status import OrderStatus

      class Order:
          def __init__(self, order_id, items):
              self.order_id = order_id
              self.items = items
              self.status = OrderStatus.PENDING

          def confirm(self):
              if self.status != OrderStatus.PENDING:
                  raise ValueError("can only confirm pending orders")
              self.status = OrderStatus.CONFIRMED

          def ship(self):
              if self.status != OrderStatus.CONFIRMED:
                  raise ValueError("can only ship confirmed orders")
              self.status = OrderStatus.SHIPPED

          def deliver(self):
              if self.status != OrderStatus.SHIPPED:
                  raise ValueError("can only deliver shipped orders")
              self.status = OrderStatus.DELIVERED
    services/order_service.py: |
      from models.order import Order
      from models.status import OrderStatus

      class OrderService:
          def __init__(self, repo):
              self.repo = repo

          def get_pending_orders(self):
              return [o for o in self.repo.all() if o.status == OrderStatus.PENDING]

          def get_shipped_orders(self):
              return [o for o in self.repo.all() if o.status == OrderStatus.SHIPPED]
