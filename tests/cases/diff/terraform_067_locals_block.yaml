name: terraform_067_locals_block
xfail:
  category: terraform-sibling-over-discovery
repo:
  initial_files:
    locals.tf: |
      locals {
        common_tags = {
          Project = "myapp"
          Owner   = "team"
        }
      }
    main.tf: |
      resource "aws_instance" "web" {
        ami           = "ami-12345678"
        instance_type = "t3.micro"
        tags          = local.common_tags
      }
    s3.tf: |
      resource "aws_s3_bucket" "data" {
        bucket = "myapp-data"
        tags   = local.common_tags
      }
    modules/networking/locals.tf: |
      locals {
        common_tags = {
          Project = "networking"
          Owner   = "infra-team"
        }
      }
    variables.tf: |
      variable "environment" {
        type    = string
        default = "production"
      }
  changed_files:
    locals.tf: |
      locals {
        common_tags = {
          Project     = "myapp"
          Owner       = "team"
          Environment = "prod"
        }
      }
  commit_message: Update files
fragments:
- id: locals
  selector:
    path: locals.tf
    anchor: Environment = "prod"
- id: locals_1
  selector:
    path: locals.tf
    anchor: Project     = "myapp"
- id: main
  selector:
    path: main.tf
    anchor: tags          = local.common_tags
- id: no_locals
  selector:
    path: modules/networking/locals.tf
- id: no_variables
  selector:
    path: variables.tf
- id: no_global_0
  selector:
    anchor: networking
- id: no_global_1
  selector:
    anchor: infra-team
- id: no_global_2
  selector:
    anchor: variable "environment" {
oracle:
  required:
  - locals
  - locals_1
  - main
  allowed: []
  forbidden:
  - no_locals
  - no_variables
  - no_global_0
  - no_global_1
  - no_global_2
