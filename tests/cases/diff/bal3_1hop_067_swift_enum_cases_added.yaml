repo:
  initial_files:
    Sources/Models/PaymentMethod.swift: |
      import Foundation

      enum PaymentMethod: String, Codable {
          case creditCard = "credit_card"
          case debitCard = "debit_card"
          case bankTransfer = "bank_transfer"

          var displayName: String {
              switch self {
              case .creditCard: return "Credit Card"
              case .debitCard: return "Debit Card"
              case .bankTransfer: return "Bank Transfer"
              }
          }

          var processingFee: Double {
              switch self {
              case .creditCard: return 0.029
              case .debitCard: return 0.015
              case .bankTransfer: return 0.005
              }
          }
      }
    Sources/Checkout/PaymentProcessor.swift: |
      import Foundation
      import Models

      class PaymentProcessor {
          func process(amount: Double, method: PaymentMethod) -> Bool {
              let fee = amount * method.processingFee
              let total = amount + fee
              return charge(total: total, via: method)
          }

          private func charge(total: Double, via method: PaymentMethod) -> Bool {
              return true
          }
      }
    Sources/Checkout/CheckoutViewModel.swift: |
      import Foundation
      import Models

      class CheckoutViewModel: ObservableObject {
          @Published var selectedMethod: PaymentMethod = .creditCard
          @Published var amount: Double = 0

          func feeDescription() -> String {
              return "\(selectedMethod.displayName): \(selectedMethod.processingFee * 100)%"
          }
      }
    Sources/Checkout/ReceiptGenerator.swift: |
      import Foundation
      import Models

      class ReceiptGenerator {
          func generate(amount: Double, method: PaymentMethod) -> String {
              let fee = amount * method.processingFee
              return "Paid \(amount + fee) via \(method.displayName)"
          }
      }
    Sources/Checkout/PaymentValidator.swift: |
      import Foundation
      import Models

      class PaymentValidator {
          func validate(method: PaymentMethod, amount: Double) -> Bool {
              switch method {
              case .bankTransfer:
                  return amount >= 10.0
              default:
                  return amount > 0
              }
          }
      }
