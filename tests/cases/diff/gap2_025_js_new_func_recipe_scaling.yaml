repo:
  initial_files:
    src/payment/processor.rs: |
      use crate::ledger::journal::Journal;

      pub struct PaymentProcessor {
          journal: Journal,
          fee_rate: f64,
      }

      impl PaymentProcessor {
          pub fn new(journal: Journal, fee_rate: f64) -> Self {
              PaymentProcessor { journal, fee_rate }
          }

          pub fn charge(&mut self, account_id: &str, amount_cents: i64) -> Result<(), String> {
              let fee = (amount_cents as f64 * self.fee_rate) as i64;
              self.journal.record(account_id, amount_cents + fee)
          }

          pub fn refund(&mut self, account_id: &str, amount_cents: i64) -> Result<(), String> {
              self.journal.record(account_id, -amount_cents)
              // BUG: fee not refunded — net balance drifts
          }
      }
    src/ledger/journal.rs: |
      pub struct Journal {
          entries: Vec<(String, i64)>,
      }

      impl Journal {
          pub fn new() -> Self {
              Journal { entries: Vec::new() }
          }

          pub fn record(&mut self, account_id: &str, delta: i64) -> Result<(), String> {
              if delta == 0 {
                  return Err("zero-value entry rejected".to_string());
              }
              self.entries.push((account_id.to_string(), delta));
              Ok(())
          }

          pub fn balance(&self, account_id: &str) -> i64 {
              self.entries
                  .iter()
                  .filter(|(id, _)| id == account_id)
                  .map(|(_, delta)| delta)
                  .sum()
          }
      }
    src/ledger/audit.rs: |
      use crate::ledger::journal::Journal;

      pub fn audit_account(journal: &Journal, account_id: &str) -> i64 {
          journal.balance(account_id)
      }
