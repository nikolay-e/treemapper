repo:
  initial_files:
    internal/worker/pool.go: |
      package worker

      import (
          "context"
          "sync"
      )

      type Job struct {
          ID      int
          Payload interface{}
      }

      type Result struct {
          JobID int
          Data  interface{}
          Error error
      }

      type Worker struct {
          id   int
          jobs <-chan Job
      }

      func NewWorker(id int, jobs <-chan Job) *Worker {
          return &Worker{id: id, jobs: jobs}
      }

      func (w *Worker) Start(ctx context.Context, wg *sync.WaitGroup) {
          defer wg.Done()
          for {
              select {
              case job, ok := <-w.jobs:
                  if !ok {
                      return
                  }
                  w.process(job)
              case <-ctx.Done():
                  return
              }
          }
      }

      func (w *Worker) process(job Job) {
          println("Processing job", job.ID)
      }
    internal/worker/dispatcher.go: |
      package worker

      type Dispatcher struct {
          workerCount int
          jobQueue    chan Job
      }

      func NewDispatcher(workerCount int) *Dispatcher {
          return &Dispatcher{
              workerCount: workerCount,
              jobQueue:    make(chan Job, 100),
          }
      }

      func (d *Dispatcher) Submit(job Job) {
          d.jobQueue <- job
      }
    cmd/main.go: |
      package main

      import (
          "context"
          "myproject/internal/worker"
          "sync"
      )

      func main() {
          jobs := make(chan worker.Job, 100)
          var wg sync.WaitGroup

          for i := 0; i < 3; i++ {
              w := worker.NewWorker(i, jobs)
              wg.Add(1)
              go w.Start(context.Background(), &wg)
          }

          for j := 0; j < 10; j++ {
              jobs <- worker.Job{ID: j}
          }
          close(jobs)
          wg.Wait()
      }
    internal/scheduler/cron.go: |
      package scheduler

      import "time"

      type CronScheduler struct {
          interval time.Duration
          tasks    []CronTask
      }

      type CronTask struct {
          Name     string
          Schedule string
          Handler  func() error
      }

      func NewCronScheduler(interval time.Duration) *CronScheduler {
          return &CronScheduler{interval: interval}
      }

      func (cs *CronScheduler) Register(name, schedule string, handler func() error) {
          cs.tasks = append(cs.tasks, CronTask{Name: name, Schedule: schedule, Handler: handler})
      }

      func (cs *CronScheduler) Run() error {
          for _, task := range cs.tasks {
              if err := task.Handler(); err != nil {
                  return err
              }
          }
          return nil
      }
    internal/pubsub/broker.go: |
      package pubsub

      import "sync"

      type Broker struct {
          mu          sync.RWMutex
          subscribers map[string][]chan []byte
      }

      func NewBroker() *Broker {
          return &Broker{subscribers: make(map[string][]chan []byte)}
      }

      func (b *Broker) Subscribe(topic string) <-chan []byte {
          b.mu.Lock()
          defer b.mu.Unlock()
          ch := make(chan []byte, 10)
          b.subscribers[topic] = append(b.subscribers[topic], ch)
          return ch
      }

      func (b *Broker) Publish(topic string, data []byte) {
          b.mu.RLock()
          defer b.mu.RUnlock()
          for _, ch := range b.subscribers[topic] {
              select {
              case ch <- data:
              default:
              }
          }
      }
