    internal/worker/pool.go: |
      package worker

      import (
          "context"
          "log"
          "sync"
          "time"
      )

      type Job struct {
          ID       int
          Payload  interface{}
          Priority int
          Timeout  time.Duration
      }

      type Result struct {
          JobID    int
          Data     interface{}
          Error    error
          Duration time.Duration
      }

      type Worker struct {
          id      int
          jobs    <-chan Job
          results chan<- Result
          logger  *log.Logger
      }

      func NewWorker(id int, jobs <-chan Job, results chan<- Result, logger *log.Logger) *Worker {
          return &Worker{id: id, jobs: jobs, results: results, logger: logger}
      }

      func (w *Worker) Start(ctx context.Context, wg *sync.WaitGroup) {
          defer wg.Done()
          w.logger.Printf("Worker %d started", w.id)

          for {
              select {
              case job, ok := <-w.jobs:
                  if !ok {
                      w.logger.Printf("Worker %d: job channel closed", w.id)
                      return
                  }
                  result := w.processWithTimeout(ctx, job)
                  w.results <- result
              case <-ctx.Done():
                  w.logger.Printf("Worker %d: context cancelled", w.id)
                  return
              }
          }
      }

      func (w *Worker) processWithTimeout(ctx context.Context, job Job) Result {
          start := time.Now()
          timeout := job.Timeout
          if timeout == 0 {
              timeout = 30 * time.Second
          }

          jobCtx, cancel := context.WithTimeout(ctx, timeout)
          defer cancel()

          resultCh := make(chan Result, 1)

          go func() {
              data, err := w.process(jobCtx, job)
              resultCh <- Result{
                  JobID:    job.ID,
                  Data:     data,
                  Error:    err,
                  Duration: time.Since(start),
              }
          }()

          select {
          case result := <-resultCh:
              return result
          case <-jobCtx.Done():
              return Result{
                  JobID:    job.ID,
                  Error:    jobCtx.Err(),
                  Duration: time.Since(start),
              }
          }
      }

      func (w *Worker) process(ctx context.Context, job Job) (interface{}, error) {
          w.logger.Printf("Worker %d processing job %d", w.id, job.ID)
          select {
          case <-time.After(100 * time.Millisecond):
              return job.Payload, nil
          case <-ctx.Done():
              return nil, ctx.Err()
          }
      }
