    src/logistics/route_optimizer.rs: |
      use std::collections::HashMap;

      pub struct RouteOptimizer {
          distances: HashMap<(String, String), f64>,
      }

      impl RouteOptimizer {
          pub fn new() -> Self {
              Self { distances: HashMap::new() }
          }

          pub fn add_edge(&mut self, from: &str, to: &str, dist: f64) {
              self.distances.insert((from.to_string(), to.to_string()), dist);
          }

          pub fn shortest_path(&self, from: &str, to: &str) -> Option<f64> {
              let mut visited = std::collections::HashSet::new();
              self.dijkstra(from, to, &mut visited)
          }

          fn dijkstra(&self, from: &str, to: &str, visited: &mut std::collections::HashSet<String>) -> Option<f64> {
              if from == to {
                  return Some(0.0);
              }
              if !visited.insert(from.to_string()) {
                  return None;
              }
              let mut best: Option<f64> = None;
              for ((f, t), &d) in &self.distances {
                  if f == from {
                      if let Some(rest) = self.dijkstra(t, to, visited) {
                          let total = d + rest;
                          best = Some(best.map_or(total, |b: f64| b.min(total)));
                      }
                  }
              }
              best
          }
      }
    src/logistics/delivery_planner.rs: |
      use crate::logistics::route_optimizer::RouteOptimizer;

      pub struct DeliveryPlanner {
          optimizer: RouteOptimizer,
      }

      impl DeliveryPlanner {
          pub fn new(optimizer: RouteOptimizer) -> Self {
              Self { optimizer }
          }

          pub fn plan_delivery(&self, origin: &str, destination: &str) -> Option<f64> {
              self.optimizer.shortest_path(origin, destination)
          }
      }
