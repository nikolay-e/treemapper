name: gap_052_json_config_babel_jest
tags:
- lang:json
- change:config
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    babel.config.json: |
      {
        "presets": [
          ["@babel/preset-env", { "targets": { "node": "16" } }],
          "@babel/preset-typescript"
        ],
        "plugins": []
      }
    jest.config.json: |
      {
        "transform": {
          "^.+\\.tsx?$": "babel-jest"
        },
        "testMatch": ["**/*.test.ts"],
        "moduleFileExtensions": ["ts", "js", "json"],
        "collectCoverage": false
      }
    renovate.json: |
      {
        "$schema": "https://docs.renovatebot.com/renovate-schema.json",
        "extends": ["config:base"],
        "labels": ["dependencies"],
        "schedule": ["every weekend"]
      }
    src/math.ts: |
      export function add(a: number, b: number): number {
        return a + b;
      }

      export function multiply(a: number, b: number): number {
        return a * b;
      }

      export function clamp(value: number, min: number, max: number): number {
        return Math.min(Math.max(value, min), max);
      }
  changed_files:
    babel.config.json: |
      {
        "presets": [
          ["@babel/preset-env", { "targets": { "node": "20" } }],
          "@babel/preset-typescript"
        ],
        "plugins": [
          "@babel/plugin-proposal-decorators"
        ]
      }
    jest.config.json: |
      {
        "transform": {
          "^.+\\.tsx?$": "babel-jest"
        },
        "testMatch": ["**/*.test.ts"],
        "moduleFileExtensions": ["ts", "js", "json"],
        "collectCoverage": true,
        "coverageThreshold": {
          "global": {
            "branches": 80,
            "functions": 80,
            "lines": 80
          }
        }
      }
    renovate.json: |
      {
        "$schema": "https://docs.renovatebot.com/renovate-schema.json",
        "extends": ["config:base"],
        "labels": ["dependencies"],
        "schedule": ["every weekend"]
      }
    src/math.ts: |
      export function add(a: number, b: number): number {
        return a + b;
      }

      export function multiply(a: number, b: number): number {
        return a * b;
      }

      export function clamp(value: number, min: number, max: number): number {
        return Math.min(Math.max(value, min), max);
      }
  commit_message: Update files
fixtures:
  auto_garbage: true
fragments:
- id: babel_node_target
  selector:
    path: babel.config.json
    anchor: '"node": "20"'
- id: babel_decorators
  selector:
    path: babel.config.json
    anchor: "plugin-proposal-decorators"
- id: jest_coverage
  selector:
    path: jest.config.json
    anchor: '"collectCoverage": true'
- id: jest_threshold
  selector:
    path: jest.config.json
    anchor: "coverageThreshold"
oracle:
  required:
  - babel_node_target
  - babel_decorators
  - jest_coverage
  - jest_threshold
  allowed: []
  forbidden: []
