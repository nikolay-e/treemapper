  changed_files:
    src/config/loader.rs: |
      use std::collections::HashMap;

      #[derive(Debug, Clone)]
      pub struct ConfigError {
          pub key: String,
          pub message: String,
      }

      pub trait ConfigSource: Send + Sync {
          fn get(&self, key: &str) -> Option<String>;
          fn keys(&self) -> Vec<String>;
      }

      pub struct Config {
          sources: Vec<Box<dyn ConfigSource>>,
      }

      impl Config {
          pub fn new() -> Self {
              Self { sources: Vec::new() }
          }

          pub fn add_source(&mut self, source: Box<dyn ConfigSource>) {
              self.sources.push(source);
          }

          pub fn get(&self, key: &str) -> Option<String> {
              for source in &self.sources {
                  if let Some(v) = source.get(key) {
                      return Some(v);
                  }
              }
              None
          }

          pub fn require(&self, key: &str) -> Result<String, ConfigError> {
              self.get(key).ok_or_else(|| ConfigError {
                  key: key.to_string(),
                  message: format!("required config key '{}' not found", key),
              })
          }
      }
    src/server/listener.rs: |
      use crate::config::loader::Config;

      pub struct Listener {
          host: String,
          port: u16,
      }

      impl Listener {
          pub fn from_config(config: &Config) -> Result<Self, crate::config::loader::ConfigError> {
              let host = config.get("host").unwrap_or_else(|| "127.0.0.1".to_string());
              let port: u16 = config.get("port")
                  .and_then(|p| p.parse().ok())
                  .unwrap_or(8080);
              Ok(Self { host, port })
          }

          pub fn address(&self) -> String {
              format!("{}:{}", self.host, self.port)
          }
      }
    src/app/bootstrap.rs: |
      use crate::server::listener::Listener;
      use crate::config::loader::Config;

      pub struct App {
          listener: Listener,
      }

      impl App {
          pub fn build(config: Config) -> Result<Self, crate::config::loader::ConfigError> {
              let listener = Listener::from_config(&config)?;
              Ok(Self { listener })
          }

          pub fn address(&self) -> String {
              self.listener.address()
          }
      }
    garbage/logging.rs: |
      // GARBAGE_PHPSUBSTR_A = "slog_logger_marker"
    garbage/signals.rs: |
