name: bal3_bugfix_029_php_off_by_one_substr
tags:
- lang:php
- change:single_file
- change:bug_fix
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    src/Text/Truncator.php: |
      <?php
      namespace App\Text;

      class Truncator
      {
          public function truncate(string $text, int $maxLen): string
          {
              if (strlen($text) > $maxLen) {
                  return substr($text, 0, $maxLen - 3) . '...';
              }
              return $text;
          }

          public function words(string $text, int $count): string
          {
              $parts = explode(' ', $text);
              return implode(' ', array_slice($parts, 0, $count));
          }
      }
    src/Text/Sanitizer.php: |
      <?php
      namespace App\Text;

      class Sanitizer
      {
          public function clean(string $input): string
          {
              return htmlspecialchars($input, ENT_QUOTES, 'UTF-8');
          }
      }
  changed_files:
    src/Text/Truncator.php: |
      <?php
      namespace App\Text;

      class Truncator
      {
          public function truncate(string $text, int $maxLen): string
          {
              if ($maxLen < 4) {
                  return substr($text, 0, $maxLen);
              }
              if (strlen($text) > $maxLen) {
                  return substr($text, 0, $maxLen - 3) . '...';
              }
              return $text;
          }

          public function words(string $text, int $count): string
          {
              $parts = explode(' ', $text);
              return implode(' ', array_slice($parts, 0, $count));
          }
      }
  commit_message: "fix: handle maxLen < 4 to prevent negative substr length"
fragments:
- id: boundary_fix
  selector:
    path: src/Text/Truncator.php
    anchor: "if ($maxLen < 4)"
- id: no_sanitizer
  selector:
    path: src/Text/Sanitizer.php
    anchor: "class Sanitizer"
oracle:
  required:
  - boundary_fix
  allowed: []
  forbidden:
  - no_sanitizer
