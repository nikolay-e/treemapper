  changed_files:
    src/main/scala/auth/UserService.scala: |
      package auth

      import auth.model.{User, UserRole}
      import auth.repository.UserRepository

      class UserService(repo: UserRepository) {
        def register(username: String, email: String, passwordHash: String, role: UserRole = UserRole.Member): Either[String, User] = {
          if (repo.existsByEmail(email)) Left("Email already in use")
          else Right(repo.save(User(username, email, passwordHash, active = true, role = role)))
        }

        def deactivate(email: String): Boolean = {
          repo.findByEmail(email).exists { user =>
            repo.save(user.copy(active = false))
            true
          }
        }

        def promote(email: String, role: UserRole): Either[String, User] = {
          repo.findByEmail(email) match {
            case Some(user) => Right(repo.save(user.copy(role = role)))
            case None => Left("User not found")
          }
        }
      }
    src/main/scala/auth/model/User.scala: |
      package auth.model

      sealed trait UserRole
      object UserRole {
        case object Member extends UserRole
        case object Admin extends UserRole
        case object Moderator extends UserRole
      }

      case class User(username: String, email: String, passwordHash: String, active: Boolean, role: UserRole = UserRole.Member)
    src/main/scala/auth/repository/UserRepository.scala: |
