    src/main/scala/auth/UserService.scala: |
      package auth

      import auth.model.User
      import auth.repository.UserRepository

      class UserService(repo: UserRepository) {
        def register(username: String, email: String, passwordHash: String): Either[String, User] = {
          if (repo.existsByEmail(email)) Left("Email already in use")
          else Right(repo.save(User(username, email, passwordHash, active = true)))
        }

        def deactivate(email: String): Boolean = {
          repo.findByEmail(email).exists { user =>
            repo.save(user.copy(active = false))
            true
          }
        }
      }
    src/main/scala/auth/model/User.scala: |
      package auth.model

      case class User(username: String, email: String, passwordHash: String, active: Boolean)
    src/main/scala/auth/repository/UserRepository.scala: |
      package auth.repository

      import auth.model.User

      trait UserRepository {
        def save(user: User): User
        def findByEmail(email: String): Option[User]
        def existsByEmail(email: String): Boolean
      }

      class InMemoryUserRepository extends UserRepository {
        private var users: List[User] = List.empty

        def save(user: User): User = {
          users = users.filterNot(_.email == user.email) :+ user
          user
        }

        def findByEmail(email: String): Option[User] = users.find(_.email == email)

        def existsByEmail(email: String): Boolean = users.exists(_.email == email)
      }
    src/main/scala/auth/SessionManager.scala: |
      package auth

      import auth.repository.UserRepository

      class SessionManager(repo: UserRepository) {
        private var sessions: Map[String, String] = Map.empty

        def createSession(email: String): Option[String] = {
          repo.findByEmail(email).filter(_.active).map { _ =>
            val token = java.util.UUID.randomUUID().toString
            sessions = sessions + (token -> email)
            token
          }
        }

        def invalidate(token: String): Unit = {
          sessions = sessions - token
        }
      }
