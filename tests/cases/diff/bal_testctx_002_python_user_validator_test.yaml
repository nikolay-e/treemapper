      import auth.model.User

      trait UserRepository {
        def save(user: User): User
        def findByEmail(email: String): Option[User]
        def existsByEmail(email: String): Boolean
      }

      class InMemoryUserRepository extends UserRepository {
        private var users: List[User] = List.empty

        def save(user: User): User = {
          users = users.filterNot(_.email == user.email) :+ user
          user
        }

        def findByEmail(email: String): Option[User] = users.find(_.email == email)

        def existsByEmail(email: String): Boolean = users.exists(_.email == email)
      }
