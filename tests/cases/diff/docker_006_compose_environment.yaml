name: docker_006_compose_environment
tags:
- lang:python
- lang:shell
- lang:terraform
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    src/db.py: |
      import os
      from contextlib import contextmanager
      from typing import Generator

      DATABASE_URL = os.getenv("DATABASE_URL")
      REDIS_URL = os.getenv("REDIS_URL")
      SECRET_KEY = os.getenv("SECRET_KEY")

      def validate_config() -> bool:
          required = [DATABASE_URL, SECRET_KEY]
          return all(v is not None for v in required)

      @contextmanager
      def get_connection() -> Generator:
          if not DATABASE_URL:
              raise ValueError("DATABASE_URL not configured")
          conn = {"url": DATABASE_URL, "connected": True}
          try:
              yield conn
          finally:
              conn["connected"] = False

      def get_redis_client():
          if not REDIS_URL:
              return None
          return {"url": REDIS_URL, "type": "redis"}
    src/app.py: |
      from db import validate_config, get_connection, get_redis_client

      def initialize():
          if not validate_config():
              raise RuntimeError("Configuration validation failed")
          redis = get_redis_client()
          return {"redis": redis is not None}
    requirements.txt: |
      psycopg2-binary==2.9.9
      redis==5.0.0
      python-dotenv==1.0.0
    Dockerfile: |
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY src/ ./src/
      CMD ["python", "-c", "from src.app import initialize; initialize()"]
    docker-compose.yml: |
      version: '3.8'
      services:
        api:
          build: .
          environment:
            - DATABASE_URL=postgres://localhost:5432/db
    scripts/deploy.sh: |
      #!/bin/bash
      docker-compose pull
      docker-compose up -d
    tests/test_db.py: |
      def test_connection():
          pass
    docs/environment.md: |
      # Environment Variables
    secrets/template.env: ''
    terraform/ssm.tf: |
      resource "aws_ssm_parameter" "db_url" {
      }
  changed_files:
    src/db.py: |
      import os
      from contextlib import contextmanager
      from typing import Generator

      DATABASE_URL = os.getenv("DATABASE_URL")
      REDIS_URL = os.getenv("REDIS_URL")
      SECRET_KEY = os.getenv("SECRET_KEY")

      def validate_config() -> bool:
          required = [DATABASE_URL, SECRET_KEY]
          return all(v is not None for v in required)

      @contextmanager
      def get_connection() -> Generator:
          if not DATABASE_URL:
              raise ValueError("DATABASE_URL not configured")
          conn = {"url": DATABASE_URL, "connected": True}
          try:
              yield conn
          finally:
              conn["connected"] = False

      def get_redis_client():
          if not REDIS_URL:
              return None
          return {"url": REDIS_URL, "type": "redis"}
    src/app.py: |
      from db import validate_config, get_connection, get_redis_client

      def initialize():
          if not validate_config():
              raise RuntimeError("Configuration validation failed")
          redis = get_redis_client()
          return {"redis": redis is not None}
    requirements.txt: |
      psycopg2-binary==2.9.9
      redis==5.0.0
      python-dotenv==1.0.0
    Dockerfile: |
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY src/ ./src/
      CMD ["python", "-c", "from src.app import initialize; initialize()"]
    docker-compose.yml: |
      version: '3.8'

      services:
        api:
          build:
            context: .
            dockerfile: Dockerfile
          environment:
            # Database configuration
            - DATABASE_URL=postgres://db:5432/prod
            - DATABASE_POOL_SIZE=10
            - DATABASE_MAX_OVERFLOW=20

            # Redis configuration
            - REDIS_URL=redis://redis:6379/0
            - REDIS_MAX_CONNECTIONS=50

            # Application secrets (interpolated from .env or shell)
            - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
            - JWT_SECRET=${JWT_SECRET:-default-jwt-secret}

            # Feature flags
            - FEATURE_NEW_UI=${FEATURE_NEW_UI:-false}
            - FEATURE_BETA_API=true

            # Logging and monitoring
            - LOG_LEVEL=${LOG_LEVEL:-info}
            - SENTRY_DSN=${SENTRY_DSN:-}

          env_file:
            - .env
            - .env.${APP_ENV:-development}

          depends_on:
            db:
              condition: service_healthy
            redis:
              condition: service_started

        db:
          image: postgres:16-alpine
          environment:
            POSTGRES_USER: ${POSTGRES_USER:-app}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
            POSTGRES_DB: ${POSTGRES_DB:-prod}
            PGDATA: /var/lib/postgresql/data/pgdata
          volumes:
            - postgres_data:/var/lib/postgresql/data
          healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app}"]
            interval: 10s
            timeout: 5s
            retries: 5

        redis:
          image: redis:7-alpine
          command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
          volumes:
            - redis_data:/data

      volumes:
        postgres_data:
        redis_data:
    scripts/deploy.sh: |
      #!/bin/bash
      docker-compose pull
      docker-compose up -d
    tests/test_db.py: |
      def test_connection():
          pass
    docs/environment.md: |
      # Environment Variables
    secrets/template.env: ''
    terraform/ssm.tf: |
      resource "aws_ssm_parameter" "db_url" {
      }
  commit_message: Update files
fragments:
- id: docker_compose_file
  selector:
    path: docker-compose.yml
- id: dockerfile_build_context
  selector:
    anchor: 'dockerfile: Dockerfile'
- id: postgres_volumes
  selector:
    anchor: 'postgres_data:'
- id: db_database_url
  selector:
    path: src/db.py
    anchor: 'DATABASE_URL = os.getenv("DATABASE_URL")'
- id: db_redis_url
  selector:
    path: src/db.py
    anchor: 'REDIS_URL = os.getenv("REDIS_URL")'
- id: db_secret_key
  selector:
    path: src/db.py
    anchor: 'SECRET_KEY = os.getenv("SECRET_KEY")'
- id: no_deploy_script
  selector:
    path: scripts/deploy.sh
    anchor: "docker-compose pull"
- id: no_terraform_ssm
  selector:
    path: terraform/ssm.tf
    anchor: "aws_ssm_parameter"
- id: no_test_db
  selector:
    path: tests/test_db.py
    anchor: "def test_connection"
oracle:
  required:
  - docker_compose_file
  - dockerfile_build_context
  - postgres_volumes
  - db_database_url
  - db_redis_url
  - db_secret_key
  allowed: []
  forbidden:
  - no_deploy_script
  - no_terraform_ssm
  - no_test_db
