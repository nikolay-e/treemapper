repo:
  initial_files:
    lib/etl/extractor.ex: |
      defmodule ETL.Extractor do
        def extract_csv(path) do
          path
          |> File.read!()
          |> String.split("\n")
          |> Enum.map(&String.split(&1, ","))
        end
      end
    lib/etl/transformer.ex: |
      defmodule ETL.Transformer do
        alias ETL.Extractor

        def transform(path) do
          path
          |> Extractor.extract_csv()
          |> Enum.map(fn [name, age] -> %{name: name, age: String.to_integer(age)} end)
          |> Enum.filter(fn %{age: age} -> age >= 18 end)
        end
      end
    lib/etl/loader.ex: |
      defmodule ETL.Loader do
        alias ETL.Transformer

        def load(path) do
          records = Transformer.transform(path)
          Enum.each(records, fn record ->
            IO.puts("Loading: #{record.name}")
          end)
          {:ok, length(records)}
        end
      end
