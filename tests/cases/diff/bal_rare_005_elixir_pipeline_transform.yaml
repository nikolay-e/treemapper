  changed_files:
    lib/etl/extractor.ex: |
      defmodule ETL.Extractor do
        def extract_csv(path, opts \\ []) do
          delimiter = Keyword.get(opts, :delimiter, ",")
          skip_header = Keyword.get(opts, :skip_header, false)

          rows =
            path
            |> File.read!()
            |> String.split("\n")
            |> Enum.map(&String.split(&1, delimiter))

          if skip_header, do: tl(rows), else: rows
        end
      end
    lib/etl/transformer.ex: |
      defmodule ETL.Transformer do
        alias ETL.Extractor

        def transform(path, opts \\ []) do
          path
          |> Extractor.extract_csv(opts)
          |> Enum.map(fn [name, age | _rest] -> %{name: name, age: String.to_integer(age)} end)
          |> Enum.filter(fn %{age: age} -> age >= 18 end)
        end
      end
    lib/etl/loader.ex: |
      defmodule ETL.Loader do
        alias ETL.Transformer

        def load(path) do
