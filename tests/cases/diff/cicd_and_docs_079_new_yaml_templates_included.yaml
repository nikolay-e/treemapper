name: cicd_and_docs_079_new_yaml_templates_included
tags:
- lang:python
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    .github/workflows/ci.yml: |
      name: CI
      on: [push, pull_request]
      jobs:
        test:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                python-version: "3.12"
            - run: pip install -e ".[dev]"
            - run: pytest
    README.md: |
      # My Project

      A sample project for testing.

      ## Installation

      ```bash
      pip install myproject
      ```

      ## Usage

      ```python
      from myproject import main
      main()
      ```
    .github/workflows/release.yml: |
      name: Release
      on:
        push:
          tags:
            - "v*"
      jobs:
        publish:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                python-version: "3.12"
            - run: pip install build twine
            - run: python -m build
            - run: twine upload dist/*
    src/myproject/__init__.py: |
      __version__ = "1.0.0"

      def main():
          print(f"myproject v{__version__}")
  changed_files:
    .github/ISSUE_TEMPLATE/bug_report.yml: |
      name: Bug Report
      description: File a bug report
      title: "[Bug]: "
      labels: ["bug", "triage"]
      body:
        - type: markdown
          attributes:
            value: |
              Thanks for taking the time to fill out this bug report!
        - type: textarea
          id: what-happened
          attributes:
            label: What happened?
            description: A clear description of the bug.
            placeholder: Tell us what you see!
          validations:
            required: true
        - type: textarea
          id: expected
          attributes:
            label: Expected behavior
            description: What did you expect to happen?
          validations:
            required: true
        - type: input
          id: version
          attributes:
            label: Version
            description: What version are you running?
            placeholder: "1.0.0"
          validations:
            required: true
    .github/ISSUE_TEMPLATE/feature_request.yml: |
      name: Feature Request
      description: Suggest a new feature
      title: "[Feature]: "
      labels: ["enhancement"]
      body:
        - type: markdown
          attributes:
            value: |
              Thanks for suggesting a feature!
        - type: textarea
          id: problem
          attributes:
            label: Problem
            description: What problem does this solve?
          validations:
            required: true
        - type: textarea
          id: solution
          attributes:
            label: Proposed solution
            description: Describe your proposed solution.
          validations:
            required: true
    .github/ISSUE_TEMPLATE/config.yml: |
      blank_issues_enabled: false
      contact_links:
        - name: Documentation
          url: https://example.com/docs
          about: Check the docs before opening an issue
    README.md: |
      # My Project

      A sample project for testing.

      ## Installation

      ```bash
      pip install myproject
      ```

      ## Usage

      ```python
      from myproject import main
      main()
      ```

      ## Contributing

      Please use the issue templates when reporting bugs or requesting features.
  commit_message: "Add GitHub issue templates and update README contributing section"
fragments:
- id: bug_report_template
  selector:
    path: .github/ISSUE_TEMPLATE/bug_report.yml
- id: feature_request_template
  selector:
    path: .github/ISSUE_TEMPLATE/feature_request.yml
- id: bug_report_name
  selector:
    anchor: "name: Bug Report"
- id: feature_request_name
  selector:
    anchor: "name: Feature Request"
- id: config_template
  selector:
    path: .github/ISSUE_TEMPLATE/config.yml
- id: no_ci_workflow
  selector:
    path: .github/workflows/ci.yml
    anchor: "name: CI"
- id: no_release_workflow
  selector:
    path: .github/workflows/release.yml
    anchor: "name: Release"
- id: no_init_module
  selector:
    path: src/myproject/__init__.py
    anchor: __version__
oracle:
  required:
  - bug_report_template
  - feature_request_template
  - bug_report_name
  - feature_request_name
  allowed:
  - config_template
  forbidden:
  - no_ci_workflow
  - no_release_workflow
  - no_init_module
