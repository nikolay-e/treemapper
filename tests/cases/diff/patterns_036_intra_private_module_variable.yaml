    garbage/dns_resolver.cpp: |
      // GARBAGE_PROBE_C = "dns_resolver_marker"
  changed_files:
    include/cloud/health_checker.hpp: |
      #pragma once
      #include <string>
      #include <chrono>
      #include <vector>

      namespace cloud {

      struct HealthCheckResult {
          std::string service;
          bool healthy;
          std::chrono::milliseconds latency_ms;
      };

      class HealthChecker {
      public:
          explicit HealthChecker(const std::string& service_name);

          HealthCheckResult check() const;
          bool is_healthy() const;
          std::string service_name() const { return service_name_; }

      private:
          std::string service_name_;
          std::string endpoint_;
      };

      } // namespace cloud
    src/cloud/readiness_probe.cpp: |
      #include "cloud/health_checker.hpp"
      #include <vector>
      #include <string>

      namespace cloud {

      class ReadinessProbe {
      public:
          void add_checker(HealthChecker checker) {
              checkers_.push_back(std::move(checker));
          }

          bool all_healthy() const {
              for (const auto& c : checkers_) {
                  if (!c.is_healthy()) return false;
              }
              return true;
          }

          std::vector<std::string> unhealthy_services() const {
              std::vector<std::string> result;
              for (const auto& c : checkers_) {
                  if (!c.is_healthy()) result.push_back(c.service_name());
              }
              return result;
          }

      private:
          std::vector<HealthChecker> checkers_;
      };

      } // namespace cloud
    garbage/load_shedder.cpp: |
      // GARBAGE_PROBE_A = "load_shedder_marker"
    garbage/rollout_controller.cpp: |
      // GARBAGE_PROBE_B = "rollout_controller_marker"
    garbage/dns_resolver.cpp: |
      // GARBAGE_PROBE_C = "dns_resolver_marker"
