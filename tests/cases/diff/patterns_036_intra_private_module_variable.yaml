repo:
  initial_files:
    registry.py: |
      _handlers = {}
      _initialized = False

      def register(name, handler):
          global _initialized
          if not _initialized:
              _initialize()
          _handlers[name] = handler

      def get_handler(name):
          return _handlers.get(name)

      def _initialize():
          global _initialized
          _handlers.clear()
          _initialized = True

      def list_handlers():
          return list(_handlers.keys())
    dispatcher.py: |
      _listeners = {}
      _default_listener = None

      def on(event, listener):
          if event not in _listeners:
              _listeners[event] = []
          _listeners[event].append(listener)

      def emit(event, data=None):
          handlers = _listeners.get(event, [])
          if not handlers and _default_listener:
              return _default_listener(event, data)
          for handler in handlers:
              handler(data)

      def set_default_listener(listener):
          global _default_listener
          _default_listener = listener
    plugin_loader.py: |
      _plugins = {}

      def register_plugin(name, plugin):
          _plugins[name] = plugin

      def get_plugin(name):
          return _plugins.get(name)

      def list_plugins():
          return list(_plugins.keys())

      def unload_plugin(name):
          return _plugins.pop(name, None)
  changed_files:
    registry.py: |
      _handlers = {}
      _initialized = False
      _default_handler = None

      def register(name, handler):
          global _initialized
          if not _initialized:
              _initialize()
          _handlers[name] = handler

      def get_handler(name):
          return _handlers.get(name, _default_handler)

      def _initialize():
          global _initialized
          _handlers.clear()
          _initialized = True

      def list_handlers():
          return list(_handlers.keys())

      def set_default(handler):
          global _default_handler
          _default_handler = handler
