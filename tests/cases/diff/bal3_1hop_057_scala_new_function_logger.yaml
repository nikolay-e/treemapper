  changed_files:
    src/main/scala/log/Logger.scala: |
      package log

      class Logger(channel: String) {
        private var context: Map[String, Any] = Map.empty

        def withContext(ctx: Map[String, Any]): Logger = {
          val copy = new Logger(channel)
          copy.context = this.context ++ ctx
          copy
        }

        def info(message: String): String = {
          format("INFO", message)
        }

        def error(message: String): String = {
          format("ERROR", message)
        }

        def warning(message: String): String = {
          format("WARNING", message)
        }

        def debug(message: String): String = {
          format("DEBUG", message)
        }

        private def format(level: String, message: String): String = {
          val ctx = if (context.nonEmpty) s" ${context.mkString(", ")}" else ""
          s"[$channel] $level: $message$ctx"
        }
      }
  commit_message: "Add structured context, warning, and debug levels to Logger"
