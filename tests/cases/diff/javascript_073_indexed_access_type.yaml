repo:
  initial_files:
    schema.ts: |
      export interface Schema {
          users: { id: string; name: string }[];
          posts: { id: string; title: string; content: string }[];
      }
    accessor.ts: |
      console.log('initial');
    schema-builder.ts: |
      import { Schema } from './schema';

      export function createEmptySchema(): Schema {
          return { users: [], posts: [] };
      }

      export function addUser(schema: Schema, id: string, name: string): Schema {
          return { ...schema, users: [...schema.users, { id, name }] };
      }

      export function addPost(schema: Schema, id: string, title: string, content: string): Schema {
          return { ...schema, posts: [...schema.posts, { id, title, content }] };
      }
    schema-validator.ts: |
      import { Schema } from './schema';

      export function validateSchema(schema: Schema): { valid: boolean; errors: string[] } {
          const errors: string[] = [];
          if (!Array.isArray(schema.users)) errors.push('users must be an array');
          if (!Array.isArray(schema.posts)) errors.push('posts must be an array');
          schema.users.forEach((u, i) => {
              if (!u.id) errors.push(`users[${i}].id missing`);
          });
          return { valid: errors.length === 0, errors };
      }
    post-accessor.ts: |
      import { Schema } from './schema';

      type Post = Schema['posts'][number];

      export function getFirstPost(schema: Schema): Post | undefined {
          return schema.posts[0];
      }

      export function getPostsByTitle(schema: Schema, title: string): Post[] {
          return schema.posts.filter(p => p.title.includes(title));
      }
