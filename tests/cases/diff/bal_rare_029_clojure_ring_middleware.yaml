  changed_files:
    src/web/middleware.clj: |
      (ns web.middleware
        (:require [clojure.string :as str]))

      (defn wrap-logging [handler]
        (fn [request]
          (println "Request:" (:uri request))
          (let [response (handler request)]
            (println "Response:" (:status response))
            response)))

      (defn wrap-content-type [handler content-type]
        (fn [request]
          (let [response (handler request)]
            (assoc-in response [:headers "Content-Type"] content-type))))

      (defn wrap-cors [handler allowed-origins]
        (fn [request]
          (let [origin (get-in request [:headers "origin"])
                response (handler request)]
            (if (and origin (some #{origin} allowed-origins))
              (-> response
                  (assoc-in [:headers "Access-Control-Allow-Origin"] origin)
                  (assoc-in [:headers "Access-Control-Allow-Methods"] "GET, POST, PUT, DELETE"))
              response))))

      (defn wrap-json-body [handler]
        (fn [request]
          (let [response (handler request)]
            (if (map? (:body response))
              (-> response
                  (update :body pr-str)
                  (assoc-in [:headers "Content-Type"] "application/json"))
              response))))
    src/web/handler.clj: |
      (ns web.handler
        (:require [web.middleware :as mw]))

      (defn hello-handler [request]
        {:status 200
         :body {:message "Hello, World!"}})

      (def app
        (-> hello-handler
            mw/wrap-json-body
            mw/wrap-logging
            (mw/wrap-cors ["http://localhost:3000"])
            (mw/wrap-content-type "application/json")))
    src/web/routes.clj: |
      (ns web.routes
        (:require [web.handler :as h]))

      (def route-map
        {"/" h/hello-handler})

      (defn dispatch [request]
        (if-let [handler (get route-map (:uri request))]
          (handler request)
          {:status 404 :body "Not Found"}))
    garbage_auth.clj: |
      (ns garbage-auth)

      (def ^:const GARBAGE_RARE_029_ALGO_A "bcrypt")
      (def ^:const GARBAGE_RARE_029_ROUNDS_B 12)

      (defn garbage-hash []
        GARBAGE_RARE_029_ALGO_A)

      (def ^:const GARBAGE_RARE_029_SALT_C 16)
    garbage_session.clj: |
