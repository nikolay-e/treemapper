name: ansible_004_inventory_group_vars
tags:
- lang:yaml
- change:multi_file
- change:config
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    inventory/production: |
      [webservers]
      web01 ansible_host=10.0.1.10
      web02 ansible_host=10.0.1.11

      [dbservers]
      db01 ansible_host=10.0.2.10

      [all:vars]
      ansible_user=deploy
      ansible_python_interpreter=/usr/bin/python3
    group_vars/production.yml: |
      ---
      env_name: production
      log_level: warn
      backup_enabled: true
      backup_retention_days: 30
    group_vars/staging.yml: |
      ---
      GARBAGE_ANS_004_A: "staging_marker"
      env_name: staging
      log_level: debug
      backup_enabled: false
    group_vars/dev.yml: |
      ---
      GARBAGE_ANS_004_B: "dev_marker"
      env_name: dev
      log_level: debug
      backup_enabled: false
    playbooks/deploy_app.yml: |
      ---
      - hosts: webservers
        become: true
        vars_files:
          - "../group_vars/production.yml"
        tasks:
          - name: Deploy application
            ansible.builtin.copy:
              src: app.tar.gz
              dest: /opt/app/
            notify: Restart application

          - name: Configure logging
            ansible.builtin.template:
              src: logging.conf.j2
              dest: /etc/app/logging.conf
            vars:
              level: "{{ log_level }}"
    playbooks/backup.yml: |
      ---
      - hosts: dbservers
        GARBAGE_ANS_004_C: "backup_playbook_marker"
        tasks:
          - name: Run database backup
            ansible.builtin.shell: pg_dump mydb > /backups/mydb.sql
            when: backup_enabled
    inventory/staging: |
      [webservers]
      GARBAGE_ANS_004_D: staging_web_marker
      staging-web01 ansible_host=10.1.1.10

      [dbservers]
      staging-db01 ansible_host=10.1.2.10
  changed_files:
    inventory/production: |
      [webservers]
      web01 ansible_host=10.0.1.10
      web02 ansible_host=10.0.1.11

      [dbservers]
      db01 ansible_host=10.0.2.10

      [all:vars]
      ansible_user=deploy
      ansible_python_interpreter=/usr/bin/python3
    group_vars/production.yml: |
      ---
      env_name: production
      log_level: warn
      backup_enabled: true
      backup_retention_days: 30
      rate_limit_enabled: true
      rate_limit_rps: 100
    group_vars/staging.yml: |
      ---
      GARBAGE_ANS_004_A: "staging_marker"
      env_name: staging
      log_level: debug
      backup_enabled: false
    group_vars/dev.yml: |
      ---
      GARBAGE_ANS_004_B: "dev_marker"
      env_name: dev
      log_level: debug
      backup_enabled: false
    playbooks/deploy_app.yml: |
      ---
      - hosts: webservers
        become: true
        vars_files:
          - "../group_vars/production.yml"
        tasks:
          - name: Deploy application
            ansible.builtin.copy:
              src: app.tar.gz
              dest: /opt/app/
            notify: Restart application

          - name: Configure logging
            ansible.builtin.template:
              src: logging.conf.j2
              dest: /etc/app/logging.conf
            vars:
              level: "{{ log_level }}"

          - name: Configure rate limiting
            ansible.builtin.template:
              src: rate_limit.conf.j2
              dest: /etc/app/rate_limit.conf
            when: rate_limit_enabled
            vars:
              rps: "{{ rate_limit_rps }}"
    playbooks/backup.yml: |
      ---
      - hosts: dbservers
        GARBAGE_ANS_004_C: "backup_playbook_marker"
        tasks:
          - name: Run database backup
            ansible.builtin.shell: pg_dump mydb > /backups/mydb.sql
            when: backup_enabled
    inventory/staging: |
      [webservers]
      GARBAGE_ANS_004_D: staging_web_marker
      staging-web01 ansible_host=10.1.1.10

      [dbservers]
      staging-db01 ansible_host=10.1.2.10
  commit_message: Update files
