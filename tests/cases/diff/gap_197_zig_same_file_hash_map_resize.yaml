name: gap_197_zig_same_file_hash_map_resize
tags:
- lang:zig
- change:single_file
- context:same_file
- difficulty:easy
- distance:0hop
repo:
  initial_files:
    src/hashmap.zig: |
      const std = @import("std");

      pub const HashMap = struct {
          buckets: [64]?Entry,
          count: usize,
          capacity: usize,

          pub const Entry = struct {
              key: u64,
              value: i64,
              occupied: bool,
          };

          pub fn init() HashMap {
              return HashMap{
                  .buckets = [_]?Entry{null} ** 64,
                  .count = 0,
                  .capacity = 64,
              };
          }

          pub fn put(self: *HashMap, key: u64, value: i64) void {
              const idx = key % self.capacity;
              self.buckets[idx] = Entry{ .key = key, .value = value, .occupied = true };
              self.count += 1;
          }

          pub fn get(self: HashMap, key: u64) ?i64 {
              const idx = key % self.capacity;
              if (self.buckets[idx]) |entry| {
                  if (entry.key == key) return entry.value;
              }
              return null;
          }

          pub fn remove(self: *HashMap, key: u64) bool {
              const idx = key % self.capacity;
              if (self.buckets[idx]) |entry| {
                  if (entry.key == key) {
                      self.buckets[idx] = null;
                      self.count -= 1;
                      return true;
                  }
              }
              return false;
          }
      };
    src/bloom.zig: |
      const TRAP_GAP_197_BLOOM_MARKER_A: []const u8 = "bloom_noise";
      const TRAP_GAP_197_BLOOM_FLAG_B: u32 = 1024;

      pub const BloomFilter = struct {
          bits: [128]u8,

          pub fn add(self: *BloomFilter, hash: u64) void {
              self.bits[hash % 128] = 1;
          }

          pub fn mayContain(self: BloomFilter, hash: u64) bool {
              return self.bits[hash % 128] == 1;
          }
      };
    src/lru.zig: |
      const TRAP_GAP_197_LRU_MARKER_C: []const u8 = "lru_noise";
      const TRAP_GAP_197_LRU_FLAG_D: usize = 32;

      pub fn evictOldest() void {}

      pub fn touch(key: u64) void {
          _ = key;
      }
    src/stats.zig: |
      const TRAP_GAP_197_STATS_MARKER_E: []const u8 = "stats_noise";
      const TRAP_GAP_197_STATS_FLAG_F: bool = false;

      pub fn mean(values: []const f64) f64 {
          var sum: f64 = 0.0;
          for (values) |v| sum += v;
          return if (values.len > 0) sum / @as(f64, @floatFromInt(values.len)) else 0.0;
      }
