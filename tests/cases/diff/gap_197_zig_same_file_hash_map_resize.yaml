                      self.buckets[idx] = null;
                      self.count -= 1;
                      return true;
                  }
              }
              return false;
          }

          pub fn loadFactor(self: HashMap) f64 {
              return @as(f64, @floatFromInt(self.count)) / @as(f64, @floatFromInt(self.capacity));
          }

          pub fn contains(self: HashMap, key: u64) bool {
              return self.get(key) != null;
          }
      };
