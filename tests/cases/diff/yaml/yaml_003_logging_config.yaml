must_include_files:
  # Q1+Q2: The code uses basicConfig -- no syslog support.
  # Without seeing logger.py, the reviewer thinks adding "syslog"
  # to the handler list works. With it, they see it's a dead config.
  - src/logger.py
  # Q3: The call site that reads config and passes to setup_logging.
  # Note handlers list from YAML is never passed -- config gap.
  - src/app.py
must_include_content_from:
  src/logger.py:
    # basicConfig cannot handle syslog -- reveals the config gap
    - "logging.basicConfig("
    # Default still says INFO
    - 'level: str = "INFO"'
  src/app.py:
    # Shows the config-to-code pipeline: handlers list is never used
    - 'level=log_config.get("level", "INFO")'
    - "setup_logging("
must_not_include:
  # --- alerts.yaml: notification channels, not logging ---
  - webhook_url
  - high_error_rate
  - window_minutes
  # --- audit.py: database audit records that use logging module ---
  - AuditLog
  - get_recent
  - audit_log
  # --- metrics.py: uses logger.debug() but is downstream consumer ---
  - MetricsCollector
  - increment
  - set_gauge
  # --- monitoring.yaml: Prometheus scrape config, not log handlers ---
  - scrape_interval
  - prometheus
  # --- test_logger.py: tests the function but not handler support ---
  - test_setup_logging_default_level
  - test_setup_logging_debug_level
must_not_include_files:
  - config/alerts.yaml
  - src/audit.py
  - src/metrics.py
  - config/monitoring.yaml
  - tests/test_logger.py
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
