# Scenario: Cache config doubles TTL, increases max size, adds eviction policy
#
# Diff: cache.yaml changes default_ttl 300→600, max_size 1000→5000,
# adds eviction_policy: lru.
#
# Reviewer questions:
#   Q1: "Does the code respect eviction_policy?"
#       → src/caching.py (UNCHANGED) uses @lru_cache with HARDCODED
#         maxsize=1000. The new eviction_policy field is completely ignored.
#   Q2: "Are TTL and max_size read from config?"
#       → caching.py defaults match the OLD config (ttl=300, maxsize=1000),
#         suggesting config was loaded at some point, but the new values
#         (600, 5000) disagree with the hardcoded defaults.
#
# Not needed:
#   - config/cdn.yaml: CDN edge caching (Cloudflare), not app-level cache.
#   - src/session_store.py: stores user sessions with TTL, different
#     concern from function-level caching.

max_enrichment: 7.6
initial:
  config/cache.yaml: |
    cache:
      default_ttl: 300
      max_size: 1000
  src/caching.py: |
    from functools import lru_cache

    def cached(ttl: int = 300):
        def decorator(func):
            @lru_cache(maxsize=1000)
            def wrapper(*args):
                return func(*args)
            return wrapper
        return decorator

    def invalidate_all():
        cached.__wrapped__ = {}
  config/cdn.yaml: |
    cdn:
      provider: cloudflare
      edge_ttl: 86400
      browser_ttl: 3600
      cache_everything: false
      purge_on_deploy: true
  src/session_store.py: |
    import time

    class SessionStore:
        def __init__(self, ttl: int = 3600):
            self.ttl = ttl
            self._sessions: dict[str, tuple[dict, float]] = {}

        def set(self, session_id: str, data: dict):
            self._sessions[session_id] = (data, time.time())

        def get(self, session_id: str) -> dict | None:
            if session_id not in self._sessions:
                return None
            data, created = self._sessions[session_id]
            if time.time() - created > self.ttl:
                del self._sessions[session_id]
                return None
            return data

changed:
  config/cache.yaml: |
    cache:
      default_ttl: 600
      max_size: 5000
      eviction_policy: lru
  src/caching.py: |
    from functools import lru_cache

    def cached(ttl: int = 300):
        def decorator(func):
            @lru_cache(maxsize=1000)
            def wrapper(*args):
                return func(*args)
            return wrapper
        return decorator

    def invalidate_all():
        cached.__wrapped__ = {}
  config/cdn.yaml: |
    cdn:
      provider: cloudflare
      edge_ttl: 86400
      browser_ttl: 3600
      cache_everything: false
      purge_on_deploy: true
  src/session_store.py: |
    import time

    class SessionStore:
        def __init__(self, ttl: int = 3600):
            self.ttl = ttl
            self._sessions: dict[str, tuple[dict, float]] = {}

        def set(self, session_id: str, data: dict):
            self._sessions[session_id] = (data, time.time())

        def get(self, session_id: str) -> dict | None:
            if session_id not in self._sessions:
                return None
            data, created = self._sessions[session_id]
            if time.time() - created > self.ttl:
                del self._sessions[session_id]
                return None
            return data

must_include_files:
  # Q1+Q2: The code has HARDCODED maxsize=1000 and ttl=300.
  # The config changes are inert — lru_cache doesn't read config.
  # Without caching.py, reviewer thinks eviction_policy works.
  - src/caching.py
must_include_content_from:
  src/caching.py:
    # Hardcoded maxsize that ignores config's max_size
    - "@lru_cache(maxsize=1000)"
    # Hardcoded TTL default that disagrees with new config
    - "ttl: int = 300"
must_not_include:
  # cdn.yaml: CDN edge caching, not application-level cache
  - cloudflare
  - edge_ttl
  - purge_on_deploy
  # session_store.py: user session storage, different concern
  - SessionStore
  - session_id
must_not_include_files:
  - config/cdn.yaml
  - src/session_store.py
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
