must_include_files:
  # Q1+Q2: The code does length checks ONLY — no regex pattern, no
  # special char check. Defaults match OLD config (3, 20, 8). The
  # new pattern and require_special fields are completely inert.
  - src/validators.py
must_include_content_from:
  src/validators.py:
    # Length-only check — no regex pattern support
    - "min_len <= len(username) <= max_len"
    # Length-only check — no special char support
    - "len(password) >= min_len"
    # Defaults match old config, disagree with new values
    - "min_len: int = 3, max_len: int = 20"
must_not_include:
  # permissions.yaml: RBAC role definitions, not input validation rules
  - manage_users
  - default_role
  - super_admin
  # sanitizer.py: HTML/XSS sanitization, not field validation
  - InputSanitizer
  - DANGEROUS_PATTERNS
  - strip_tags
must_not_include_files:
  - config/permissions.yaml
  - src/sanitizer.py
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
