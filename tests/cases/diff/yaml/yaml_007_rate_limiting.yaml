# Scenario: Rate limit config increases RPM and adds admin whitelist.
#
# Diff: limits.yaml changes requests_per_minute 60→100, burst 10→20,
# adds whitelist with admin entry.
#
# Reviewer questions:
#   Q1: "Does the code enforce whitelist?" → src/rate_limiter.py (UNCHANGED)
#        has check_limit but no whitelist parameter — new config field is inert.
#   Q2: "Where are these limits applied?" → rate_limiter.py shows the
#        RateLimiter class that uses rpm and burst values.
#
# Not needed:
#   - config/throttle.yaml: another limits config but for per-endpoint throttling.
#   - src/ip_blocker.py: rate-related but blocks IPs, doesn't enforce rate limits.

initial:
  config/limits.yaml: |
    rate_limit:
      requests_per_minute: 60
      burst: 10
  src/rate_limiter.py: |
    class RateLimiter:
        def __init__(self, rpm: int = 60, burst: int = 10):
            self.rpm = rpm
            self.burst = burst
            self._counters: dict[str, int] = {}

        def check_limit(self, client_id: str) -> bool:
            count = self._counters.get(client_id, 0)
            if count >= self.rpm:
                return False
            self._counters[client_id] = count + 1
            return True

        def reset(self):
            self._counters.clear()
  config/throttle.yaml: |
    throttle:
      endpoints:
        /api/search:
          requests_per_minute: 30
          burst: 5
        /api/export:
          requests_per_minute: 10
          burst: 2
      default:
        requests_per_minute: 60
  src/ip_blocker.py: |
    from datetime import datetime, timedelta

    class IpBlocker:
        def __init__(self, block_duration_minutes: int = 30):
            self.block_duration = timedelta(minutes=block_duration_minutes)
            self._blocked: dict[str, datetime] = {}

        def block(self, ip_address: str):
            self._blocked[ip_address] = datetime.utcnow()

        def is_blocked(self, ip_address: str) -> bool:
            if ip_address not in self._blocked:
                return False
            blocked_at = self._blocked[ip_address]
            if datetime.utcnow() - blocked_at > self.block_duration:
                del self._blocked[ip_address]
                return False
            return True

changed:
  config/limits.yaml: |
    rate_limit:
      requests_per_minute: 100
      burst: 20
      whitelist:
        - admin
  src/rate_limiter.py: |
    class RateLimiter:
        def __init__(self, rpm: int = 60, burst: int = 10):
            self.rpm = rpm
            self.burst = burst
            self._counters: dict[str, int] = {}

        def check_limit(self, client_id: str) -> bool:
            count = self._counters.get(client_id, 0)
            if count >= self.rpm:
                return False
            self._counters[client_id] = count + 1
            return True

        def reset(self):
            self._counters.clear()
  config/throttle.yaml: |
    throttle:
      endpoints:
        /api/search:
          requests_per_minute: 30
          burst: 5
        /api/export:
          requests_per_minute: 10
          burst: 2
      default:
        requests_per_minute: 60
  src/ip_blocker.py: |
    from datetime import datetime, timedelta

    class IpBlocker:
        def __init__(self, block_duration_minutes: int = 30):
            self.block_duration = timedelta(minutes=block_duration_minutes)
            self._blocked: dict[str, datetime] = {}

        def block(self, ip_address: str):
            self._blocked[ip_address] = datetime.utcnow()

        def is_blocked(self, ip_address: str) -> bool:
            if ip_address not in self._blocked:
                return False
            blocked_at = self._blocked[ip_address]
            if datetime.utcnow() - blocked_at > self.block_duration:
                del self._blocked[ip_address]
                return False
            return True

must_include_files:
  - config/limits.yaml

must_include_content_from:
  config/limits.yaml:
    - "requests_per_minute: 100"
    - "whitelist"

must_not_include:
  # throttle.yaml: per-endpoint throttle config, not global rate limits
  - /api/search
  - /api/export
  # ip_blocker.py: blocks IPs entirely, doesn't enforce rate limits
  - IpBlocker
  - is_blocked
  - block_duration

must_not_include_files:
  - config/throttle.yaml
  - src/ip_blocker.py

max_fragments: 4
max_files: 3
add_garbage_files: false
skip_garbage_check: true
