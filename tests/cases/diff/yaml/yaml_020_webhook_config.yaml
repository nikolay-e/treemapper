# Test 020: Webhook config changes timeout/retry — reviewer needs consuming code
#
# Scenario: webhooks.yaml reduces timeout 30→10, increases retry_count 3→5,
# adds a backup endpoint. Only the YAML file is changed.
#
# Reviewer questions:
#   Q1: "Does anything actually read these values?"
#       → webhooks.py has WebhookDispatcher(timeout=30, retry_count=3) with
#         HARDCODED DEFAULTS that now DISAGREE with the config (10, 5).
#         Without seeing this, the reviewer can't tell if the config change
#         has any effect or if the code ignores it.
#   Q2: "What happens with timeout=10 instead of 30?"
#       → webhooks.py does requests.post(..., timeout=self.timeout).
#         Reducing timeout from 30s to 10s means slower webhooks will start
#         failing. The reviewer needs to see the dispatch() call to judge
#         whether 10s is safe.
#
# Not needed:
#   - health_checker.py: polls /healthz endpoints. Different timeout,
#     different purpose. Knowing how health checks work adds nothing
#     to understanding webhook timeout changes.
#   - event_bus.py: in-memory pub/sub for internal events. No HTTP,
#     no timeouts, no retry logic. Unrelated concept despite sharing
#     the word "dispatch".
#   - config/database.yaml: database connection config. Different
#     service, different timeout semantics.

max_enrichment: 21.6
initial:
  config/webhooks.yaml: |
    webhooks:
      timeout: 30
      retry_count: 3
      endpoints:
        - url: https://example.com/hook
  src/webhooks.py: |
    import requests
    import time
    import logging

    logger = logging.getLogger(__name__)

    class WebhookDispatcher:
        def __init__(self, timeout: int = 30, retry_count: int = 3):
            self.timeout = timeout
            self.retry_count = retry_count

        def dispatch(self, url: str, payload: dict) -> bool:
            """Send webhook with retry logic."""
            for attempt in range(1, self.retry_count + 1):
                try:
                    resp = requests.post(url, json=payload, timeout=self.timeout)
                    resp.raise_for_status()
                    return True
                except requests.Timeout:
                    logger.warning(f"Timeout on attempt {attempt}/{self.retry_count}")
                except requests.RequestException as exc:
                    logger.error(f"Webhook failed: {exc}")
                if attempt < self.retry_count:
                    time.sleep(2 ** attempt)
            return False

        def dispatch_all(self, urls: list[str], payload: dict) -> dict[str, bool]:
            """Send to multiple endpoints, return per-URL results."""
            return {url: self.dispatch(url, payload) for url in urls}
  # --- Not needed: different timeout, different purpose ---
  # Health checks poll /healthz with their own 5s timeout.
  # Knowing this adds nothing to evaluating webhook timeout=10.
  src/health_checker.py: |
    import requests

    class HealthChecker:
        def __init__(self, check_interval: int = 60, check_timeout: int = 5):
            self.check_interval = check_interval
            self.check_timeout = check_timeout

        def check_endpoint(self, url: str) -> bool:
            """Poll a health endpoint."""
            try:
                resp = requests.get(f"{url}/healthz", timeout=self.check_timeout)
                return resp.status_code == 200
            except requests.RequestException:
                return False

        def check_all(self, endpoints: list[str]) -> dict[str, bool]:
            return {ep: self.check_endpoint(ep) for ep in endpoints}
  # --- Not needed: in-memory events, no HTTP, no timeouts ---
  # Shares the word "dispatch" but it's in-process function calls.
  src/event_bus.py: |
    from collections import defaultdict
    from typing import Callable

    class EventBus:
        def __init__(self):
            self._handlers: dict[str, list[Callable]] = defaultdict(list)

        def subscribe(self, event_type: str, handler: Callable) -> None:
            self._handlers[event_type].append(handler)

        def dispatch(self, event_type: str, data: dict) -> None:
            """Dispatch event to all registered handlers."""
            for handler in self._handlers.get(event_type, []):
                handler(data)

        def clear(self, event_type: str | None = None) -> None:
            if event_type:
                self._handlers.pop(event_type, None)
            else:
                self._handlers.clear()
  # --- Not needed: different config, different service ---
  config/database.yaml: |
    database:
      host: localhost
      port: 5432
      name: myapp
      pool_size: 10
      connection_timeout: 30
      query_timeout: 60

