# === What a reviewer needs to understand this change ===
#
# Diff: timeout 30→10, retry_count 3→5, added backup endpoint.
#
# Without webhooks.py, the reviewer sees numbers change and thinks "ok".
# With webhooks.py, the reviewer sees:
#   1. Constructor defaults (timeout=30) DON'T match new config (timeout=10)
#      — is the config actually loaded, or do defaults win?
#   2. dispatch() does requests.post(..., timeout=self.timeout)
#      — 10s timeout means slower external services will fail
#   3. retry logic uses time.sleep(2 ** attempt) with retry_count=5
#      — that's sleeps of 2, 4, 8, 16, 32 seconds = 62s total backoff
#      — combined with 5 attempts × 10s timeout = up to 112s per webhook
#   4. dispatch_all() calls dispatch() per URL — with 2 endpoints now,
#      worst case doubles to 224s

must_include_files:
  - config/webhooks.yaml
  # Q1+Q2: "Does code read these values? What happens with timeout=10?"
  # Without seeing the code, the config change is meaningless numbers.
  # With the code, the reviewer can evaluate whether 10s is safe and
  # whether the retry backoff with 5 retries is acceptable.
  - src/webhooks.py
must_include_content_from:
  config/webhooks.yaml:
    - "timeout: 10"
    - "retry_count: 5"
    - backup.example.com
  src/webhooks.py:
    # The defaults that now disagree with config
    - "timeout: int = 30"
    - "retry_count: int = 3"
    # The actual HTTP call affected by the timeout change
    - "requests.post(url, json=payload, timeout=self.timeout)"
must_not_include:
  # --- health_checker.py: different timeout, different concern ---
  # Its 5s check_timeout is unrelated to webhook delivery timeout.
  - HealthChecker
  - check_endpoint
  - "/healthz"
  # --- event_bus.py: shares "dispatch" as a word, not a concept ---
  # In-memory event handlers, no HTTP, no timeouts.
  - EventBus
  - subscribe
  - _handlers
  # --- database.yaml: different service's config ---
  - pool_size
  - query_timeout
  - connection_timeout
must_not_include_files:
  - src/health_checker.py
  - src/event_bus.py
  - config/database.yaml
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
