initial:
  config/i18n.yaml: |
    localization:
      default_locale: en
      supported_locales:
        - en
        - es
  src/i18n.py: |
    class Translator:
        def __init__(self, default_locale: str = "en"):
            self.default_locale = default_locale
            self.translations = {}

        def translate(self, key: str, locale: str = None) -> str:
            locale = locale or self.default_locale
            return self.translations.get(locale, {}).get(key, key)
  garbage_token_bucket.py: |
    GARBAGE_YAML_018_TOKEN_MARKER_A = "token"
    GARBAGE_YAML_018_BUCKET_MARKER_B = True

    class TokenBucket:
        GARBAGE_YAML_018_BUCKET_CLASS_C = "bucket"

        def consume(self, tokens: int) -> bool:
            return True
  garbage_bloom_filter.py: |
    GARBAGE_YAML_018_BLOOM_MARKER_D = "bloom"
    GARBAGE_YAML_018_HASH_MARKER_E = 42

    class BloomFilter:
        GARBAGE_YAML_018_FILTER_CLASS_F = True

        def add(self, item: str) -> None:
            pass
