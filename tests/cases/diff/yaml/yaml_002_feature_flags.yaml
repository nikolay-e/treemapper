initial:
  config/features.yaml: |
    features:
      new_ui: false
      dark_mode: true
  src/features.py: |
    def is_feature_enabled(name: str) -> bool:
        features = {"new_ui": False, "dark_mode": True}
        return features.get(name, False)
  garbage_caching_layer.py: |
    GARBAGE_YAML_002_CACHE_MARKER_A = "caching"
    GARBAGE_YAML_002_LRU_MARKER_B = True

    class CachingLayer:
        GARBAGE_YAML_002_LAYER_CLASS_C = "layer"

        def evict(self, key: str) -> None:
            pass
  garbage_auth_guard.py: |
    GARBAGE_YAML_002_AUTH_MARKER_D = "guard"
    GARBAGE_YAML_002_PERMISSION_MARKER_E = 42

    class AuthGuard:
        GARBAGE_YAML_002_GUARD_CLASS_F = True

        def authorize(self, user_id: str, resource: str) -> bool:
            return True
changed:
  config/features.yaml: |
    features:
      new_ui: true
      dark_mode: true
      beta_api: false
  src/features.py: |
    def is_feature_enabled(name: str) -> bool:
        features = {"new_ui": False, "dark_mode": True}
        return features.get(name, False)
  garbage_caching_layer.py: |
    GARBAGE_YAML_002_CACHE_MARKER_A = "caching"
    GARBAGE_YAML_002_LRU_MARKER_B = True

    class CachingLayer:
        GARBAGE_YAML_002_LAYER_CLASS_C = "layer"

        def evict(self, key: str) -> None:
            pass
  garbage_auth_guard.py: |
    GARBAGE_YAML_002_AUTH_MARKER_D = "guard"
    GARBAGE_YAML_002_PERMISSION_MARKER_E = 42

    class AuthGuard:
        GARBAGE_YAML_002_GUARD_CLASS_F = True

        def authorize(self, user_id: str, resource: str) -> bool:
            return True
