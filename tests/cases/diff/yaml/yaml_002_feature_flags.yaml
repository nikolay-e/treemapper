# Scenario: Feature flags YAML enables new_ui and adds beta_api flag
#
# Diff: features.yaml sets new_ui: true (was false) and adds beta_api: false.
#
# Reviewer questions:
#   Q1: "Will new_ui=true actually take effect?"
#       -> src/features.py (UNCHANGED) has is_feature_enabled() with a
#         HARDCODED dict {"new_ui": False, "dark_mode": True}. The code
#         never reads the YAML file -- the config change is INERT.
#   Q2: "What about beta_api?"
#       -> features.py uses features.get(name, False), so beta_api
#         isn't in the dict and returns False regardless of config.
#   Q3: "Is there middleware that gates features?"
#       -> src/middleware/feature_gate.py (UNCHANGED) imports
#         is_feature_enabled and uses it in request processing. Shows
#         the feature check propagation path.
#
# Not needed:
#   - config/experiments.yaml: A/B testing config with rollout percentages.
#     Contains "enabled" boolean fields like feature flags. HARD TRAP:
#     same boolean toggle pattern, same config directory. But experiments
#     use percentage-based rollout, not boolean flags.
#
#   - src/analytics.py: Event tracker that logs feature-related events.
#     Calls track("feature_used", {"feature": "new_ui"}). Direct structural
#     edge: references "new_ui" by name. But analytics observes usage,
#     it doesn't control whether features are enabled.
#
#   - src/ui/theme.py: UI theming that checks is_feature_enabled("dark_mode").
#     Direct structural edge: calls the exact function from the diff's domain.
#     But dark_mode is a DIFFERENT flag -- the diff changes new_ui and adds
#     beta_api. Theme code doesn't help review those specific flags.
#
#   - tests/test_features.py: Tests for is_feature_enabled() with assertions
#     about default values. Direct structural edge: tests the exact function.
#     But test expectations show existing behavior, not whether YAML loading works.
#
#   - config/rollout_schedule.yaml: Gradual rollout schedule for features
#     including new_ui. Contains the exact flag name from the diff. But
#     rollout scheduling is operational timing, not the flag mechanism.

initial:
  config/features.yaml: |
    features:
      new_ui: false
      dark_mode: true
  src/features.py: |
    def is_feature_enabled(name: str) -> bool:
        features = {"new_ui": False, "dark_mode": True}
        return features.get(name, False)

    def get_enabled_features() -> list:
        features = {"new_ui": False, "dark_mode": True}
        return [name for name, enabled in features.items() if enabled]
  src/middleware/feature_gate.py: |
    from src.features import is_feature_enabled

    class FeatureGateMiddleware:
        def __init__(self, app):
            self.app = app

        def process_request(self, request):
            if request.path.startswith("/api/beta"):
                if not is_feature_enabled("beta_api"):
                    return {"error": "Feature not available", "status": 403}
            if request.path.startswith("/ui/v2"):
                if not is_feature_enabled("new_ui"):
                    return {"error": "New UI not enabled", "status": 403}
            return self.app.handle(request)
  config/experiments.yaml: |
    experiments:
      search_v2:
        enabled: false
        rollout_percentage: 10
        target_group: beta_users
      checkout_redesign:
        enabled: true
        rollout_percentage: 50
        target_group: all
      new_ui_experiment:
        enabled: false
        rollout_percentage: 5
        target_group: internal
  src/analytics.py: |
    from datetime import datetime

    class AnalyticsTracker:
        def __init__(self):
            self.events = []

        def track(self, event_name: str, properties: dict = None):
            self.events.append({
                "name": event_name,
                "properties": properties or {},
                "timestamp": datetime.utcnow().isoformat(),
            })

        def track_feature_usage(self, feature_name: str, user_id: str):
            self.track("feature_used", {
                "feature": feature_name,
                "user_id": user_id,
            })

        def flush(self):
            batch = self.events[:]
            self.events.clear()
            return batch
  src/ui/theme.py: |
    from src.features import is_feature_enabled

    class ThemeManager:
        def __init__(self):
            self.dark_mode = is_feature_enabled("dark_mode")

        def get_styles(self) -> dict:
            if self.dark_mode:
                return {
                    "background": "#1a1a1a",
                    "text": "#ffffff",
                    "accent": "#4fc3f7",
                }
            return {
                "background": "#ffffff",
                "text": "#333333",
                "accent": "#1976d2",
            }

        def toggle_theme(self):
            self.dark_mode = not self.dark_mode
  tests/test_features.py: |
    from src.features import is_feature_enabled, get_enabled_features

    class TestFeatures:
        def test_new_ui_disabled_by_default(self):
            assert not is_feature_enabled("new_ui")

        def test_dark_mode_enabled(self):
            assert is_feature_enabled("dark_mode")

        def test_unknown_feature_returns_false(self):
            assert not is_feature_enabled("nonexistent")

        def test_get_enabled_features(self):
            enabled = get_enabled_features()
            assert "dark_mode" in enabled
            assert "new_ui" not in enabled
  config/rollout_schedule.yaml: |
    rollout:
      new_ui:
        phase_1:
          date: "2024-01-15"
          percentage: 10
        phase_2:
          date: "2024-02-01"
          percentage: 50
        phase_3:
          date: "2024-03-01"
          percentage: 100
      beta_api:
        phase_1:
          date: "2024-04-01"
          percentage: 5

changed:
  config/features.yaml: |
    features:
      new_ui: true
      dark_mode: true
      beta_api: false
  src/features.py: |
    def is_feature_enabled(name: str) -> bool:
        features = {"new_ui": False, "dark_mode": True}
        return features.get(name, False)

    def get_enabled_features() -> list:
        features = {"new_ui": False, "dark_mode": True}
        return [name for name, enabled in features.items() if enabled]
  src/middleware/feature_gate.py: |
    from src.features import is_feature_enabled

    class FeatureGateMiddleware:
        def __init__(self, app):
            self.app = app

        def process_request(self, request):
            if request.path.startswith("/api/beta"):
                if not is_feature_enabled("beta_api"):
                    return {"error": "Feature not available", "status": 403}
            if request.path.startswith("/ui/v2"):
                if not is_feature_enabled("new_ui"):
                    return {"error": "New UI not enabled", "status": 403}
            return self.app.handle(request)

must_include_files:
  # Q1+Q2: The code has hardcoded defaults that IGNORE the YAML.
  # Without seeing features.py, the reviewer thinks new_ui=true works.
  # With it, the reviewer sees the config change is completely inert.
  - src/features.py
  # Q3: Middleware that gates /api/beta and /ui/v2 paths based on
  # is_feature_enabled -- shows how flags affect request routing.
  - src/middleware/feature_gate.py
must_include_content_from:
  src/features.py:
    # Hardcoded dict that contradicts the config change
    - '"new_ui": False, "dark_mode": True'
    - "features.get(name, False)"
  src/middleware/feature_gate.py:
    # Shows feature gate checking for the exact flags being changed
    - 'is_feature_enabled("beta_api")'
    - 'is_feature_enabled("new_ui")'
must_not_include:
  # --- experiments.yaml: A/B testing with rollout percentages ---
  - rollout_percentage
  - target_group
  - search_v2
  - new_ui_experiment
  # --- analytics.py: tracks feature usage events but doesn't control flags ---
  - AnalyticsTracker
  - track_feature_usage
  - flush
  # --- theme.py: uses is_feature_enabled("dark_mode") -- different flag ---
  - ThemeManager
  - get_styles
  - toggle_theme
  # --- test_features.py: tests default values, not YAML loading ---
  - test_new_ui_disabled_by_default
  - test_dark_mode_enabled
  # --- rollout_schedule.yaml: timing schedule, not the flag mechanism ---
  - phase_1
  - phase_2
  - 'percentage: 10'
must_not_include_files:
  - config/experiments.yaml
  - src/analytics.py
  - src/ui/theme.py
  - tests/test_features.py
  - config/rollout_schedule.yaml
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
