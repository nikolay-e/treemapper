must_include_files:
  # Q1+Q2: The code has NO jitter logic — just backoff**attempt.
  # Defaults match old config (3 attempts, 2.0 backoff). The
  # jitter: true field is inert. Without retry.py, reviewer
  # thinks jitter is functional.
  - src/retry.py
must_include_content_from:
  src/retry.py:
    # No jitter — just exponential backoff
    - "time.sleep(backoff ** attempt)"
    # Defaults match old config, disagree with new values
    - "max_attempts: int = 3, backoff: float = 2.0"
