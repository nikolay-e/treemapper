# Scenario: Scheduler config changes timezone and adds a weekly report job
#
# Diff: scheduler.yaml changes timezone UTC→America/New_York, shifts
# cleanup cron to 2am, adds new weekly report job.
#
# Reviewer questions:
#   Q1: "Is there a report_job handler?"
#       → src/scheduler.py (UNCHANGED) has cleanup_job() but NO report_job().
#         register_jobs() looks up handlers via globals()[f"{name}_job"],
#         so adding a "report" job will cause a KeyError at runtime.
#   Q2: "Does timezone get passed correctly?"
#       → scheduler.py creates BackgroundScheduler(timezone=timezone),
#         so America/New_York will work if the config is loaded.
#
# Not needed:
#   - config/crontab.yaml: system-level cron entries (logrotate, certbot),
#     not application scheduler jobs.
#   - src/task_queue.py: async task queue (deque-based), not cron scheduling.

max_enrichment: 5.0
initial:
  config/scheduler.yaml: |
    scheduler:
      timezone: UTC
      jobs:
        - name: cleanup
          cron: "0 0 * * *"
  src/scheduler.py: |
    from apscheduler.schedulers.background import BackgroundScheduler

    def create_scheduler(timezone: str = "UTC"):
        scheduler = BackgroundScheduler(timezone=timezone)
        return scheduler

    def cleanup_job():
        pass

    def register_jobs(scheduler, jobs: list):
        for job in jobs:
            scheduler.add_job(
                globals()[f"{job['name']}_job"],
                "cron",
                **parse_cron(job["cron"]),
            )

    def parse_cron(expression: str) -> dict:
        parts = expression.split()
        return {"minute": parts[0], "hour": parts[1]}
  config/crontab.yaml: |
    crontab:
      entries:
        - name: log_rotation
          schedule: "0 0 * * *"
          command: /usr/sbin/logrotate /etc/logrotate.conf
        - name: cert_renewal
          schedule: "0 3 1 * *"
          command: certbot renew --quiet
        - name: temp_cleanup
          schedule: "*/30 * * * *"
          command: find /tmp -mtime +7 -delete
  src/task_queue.py: |
    from collections import deque
    from threading import Thread

    class TaskQueue:
        def __init__(self, max_workers: int = 4):
            self.max_workers = max_workers
            self._queue: deque = deque()
            self._workers: list[Thread] = []

        def enqueue(self, task_fn, *args, **kwargs):
            self._queue.append((task_fn, args, kwargs))

        def process(self):
            while self._queue:
                task_fn, args, kwargs = self._queue.popleft()
                task_fn(*args, **kwargs)

        def size(self) -> int:
            return len(self._queue)

changed:
  config/scheduler.yaml: |
    scheduler:
      timezone: America/New_York
      jobs:
        - name: cleanup
          cron: "0 2 * * *"
        - name: report
          cron: "0 8 * * 1"
  src/scheduler.py: |
