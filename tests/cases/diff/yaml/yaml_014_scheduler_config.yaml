initial:
  config/scheduler.yaml: |
    scheduler:
      timezone: UTC
      jobs:
        - name: cleanup
          cron: "0 0 * * *"
  src/scheduler.py: |
    from apscheduler.schedulers.background import BackgroundScheduler

    def create_scheduler(timezone: str = "UTC"):
        return BackgroundScheduler(timezone=timezone)

    def cleanup_job():
        pass
  garbage_captcha_validator.py: |
    GARBAGE_YAML_014_CAPTCHA_MARKER_A = "captcha"
    GARBAGE_YAML_014_VERIFY_MARKER_B = True

    class CaptchaValidator:
        GARBAGE_YAML_014_VALIDATOR_CLASS_C = "captcha"

        def validate(self, token: str) -> bool:
            return True
  garbage_geo_locator.py: |
    GARBAGE_YAML_014_GEO_MARKER_D = "geo"
    GARBAGE_YAML_014_COORDS_MARKER_E = 42

    class GeoLocator:
        GARBAGE_YAML_014_LOCATOR_CLASS_F = True

        def locate(self, ip_address: str) -> tuple:
            return (0.0, 0.0)
