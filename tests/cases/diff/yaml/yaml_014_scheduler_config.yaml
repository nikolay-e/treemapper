must_include_files:
  # Q1+Q2: The code resolves job names to functions via globals().
  # Only cleanup_job exists — adding "report" will KeyError.
  # Without scheduler.py, reviewer thinks the new job is ready to run.
  - src/scheduler.py
must_include_content_from:
  src/scheduler.py:
    # Dynamic lookup that will fail for "report" — no report_job exists
    - "globals()[f\"{job['name']}_job\"]"
    # Only handler defined — no report_job
    - "def cleanup_job():"
must_not_include:
  # crontab.yaml: system-level cron (logrotate, certbot), not app scheduler
  - logrotate
  - certbot
  - temp_cleanup
  # task_queue.py: async task queue, not cron-based scheduling
  - TaskQueue
  - enqueue
must_not_include_files:
  - config/crontab.yaml
  - src/task_queue.py
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
