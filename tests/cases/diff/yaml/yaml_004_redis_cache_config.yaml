# Scenario: Redis cache config changes host to cluster and adds password.
#
# Diff: cache.yaml changes redis host, db number, and adds password field.
#
# Reviewer questions:
#   Q1: "Does the code pass password to Redis?" → src/cache.py (UNCHANGED) creates
#        Redis client with hardcoded host/port/db — no password parameter.
#   Q2: "Will the password field actually be used?" → cache.py doesn't load from config.
#
# Not needed:
#   - config/session.yaml: another config but for session storage, not cache.
#   - src/pubsub.py: uses Redis but for pub/sub, not caching.

initial:
  config/cache.yaml: |
    redis:
      host: localhost
      port: 6379
      db: 0
  src/cache.py: |
    import redis

    def get_redis_client():
        return redis.Redis(host="localhost", port=6379, db=0)
  config/session.yaml: |
    session:
      backend: redis
      ttl: 3600
      prefix: "sess:"
      secure: true
      http_only: true
  src/pubsub.py: |
    import redis

    class PubSubManager:
        def __init__(self, redis_url: str = "redis://localhost:6379"):
            self.client = redis.from_url(redis_url)
            self.pubsub = self.client.pubsub()

        def subscribe(self, channel: str, callback):
            self.pubsub.subscribe(**{channel: callback})

        def publish(self, channel: str, message: str):
            self.client.publish(channel, message)

        def listen(self):
            for message in self.pubsub.listen():
                if message["type"] == "message":
                    yield message["data"]

changed:
  config/cache.yaml: |
    redis:
      host: redis.cluster.local
      port: 6379
      db: 1
      password: secret
  src/cache.py: |
    import redis

    def get_redis_client():
        return redis.Redis(host="localhost", port=6379, db=0)
  config/session.yaml: |
    session:
      backend: redis
      ttl: 3600
      prefix: "sess:"
      secure: true
      http_only: true
  src/pubsub.py: |
    import redis

    class PubSubManager:
        def __init__(self, redis_url: str = "redis://localhost:6379"):
            self.client = redis.from_url(redis_url)
            self.pubsub = self.client.pubsub()

        def subscribe(self, channel: str, callback):
            self.pubsub.subscribe(**{channel: callback})

        def publish(self, channel: str, message: str):
            self.client.publish(channel, message)

        def listen(self):
            for message in self.pubsub.listen():
                if message["type"] == "message":
                    yield message["data"]

must_include_files:
  - config/cache.yaml

must_include_content_from:
  config/cache.yaml:
    - "db: 1"
    - "password: secret"

must_not_include:
  # session.yaml: Redis-adjacent but for session storage, not cache
  - "sess:"
  - http_only
  # pubsub.py: uses Redis but for pub/sub messaging, different concern
  - PubSubManager
  - subscribe
  - listen

must_not_include_files:
  - config/session.yaml
  - src/pubsub.py

max_fragments: 4
max_files: 3
add_garbage_files: false
skip_garbage_check: true
