initial:
  config/cache.yaml: |
    redis:
      host: localhost
      port: 6379
      db: 0
  src/cache.py: |
    import redis

    def get_redis_client():
        return redis.Redis(host="localhost", port=6379, db=0)
  garbage_health_checker.py: |
    GARBAGE_YAML_004_HEALTH_MARKER_A = "health"
    GARBAGE_YAML_004_PING_MARKER_B = True

    class HealthChecker:
        GARBAGE_YAML_004_CHECKER_CLASS_C = "checker"

        def check_liveness(self) -> bool:
            return True
  garbage_feature_toggle.py: |
    GARBAGE_YAML_004_TOGGLE_MARKER_D = "toggle"
    GARBAGE_YAML_004_FLAG_MARKER_E = 42

    class FeatureToggle:
        GARBAGE_YAML_004_TOGGLE_CLASS_F = True

        def is_enabled(self, feature_name: str) -> bool:
            return False
changed:
  config/cache.yaml: |
    redis:
      host: redis.cluster.local
      port: 6379
      db: 1
      password: secret
  src/cache.py: |
    import redis

    def get_redis_client():
        return redis.Redis(host="localhost", port=6379, db=0)
  garbage_health_checker.py: |
    GARBAGE_YAML_004_HEALTH_MARKER_A = "health"
    GARBAGE_YAML_004_PING_MARKER_B = True

    class HealthChecker:
        GARBAGE_YAML_004_CHECKER_CLASS_C = "checker"

        def check_liveness(self) -> bool:
            return True
  garbage_feature_toggle.py: |
    GARBAGE_YAML_004_TOGGLE_MARKER_D = "toggle"
    GARBAGE_YAML_004_FLAG_MARKER_E = 42

    class FeatureToggle:
        GARBAGE_YAML_004_TOGGLE_CLASS_F = True

        def is_enabled(self, feature_name: str) -> bool:
            return False
must_include_files:
- config/cache.yaml
must_include_content:
- |2
    db: 1
    password: secret
must_not_include:
- GARBAGE_YAML_004_HEALTH_MARKER_A
- GARBAGE_YAML_004_PING_MARKER_B
- GARBAGE_YAML_004_CHECKER_CLASS_C
- GARBAGE_YAML_004_TOGGLE_MARKER_D
- GARBAGE_YAML_004_FLAG_MARKER_E
- GARBAGE_YAML_004_TOGGLE_CLASS_F
- HealthChecker
- FeatureToggle
- garbage_health_checker.py
- garbage_feature_toggle.py
add_garbage_files: false
skip_garbage_check: true
