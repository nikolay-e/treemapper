    queue:
      broker: redis://localhost:6379
      backend: redis://localhost:6379
  src/tasks.py: |
    from celery import Celery

    def create_celery_app(broker: str, backend: str):
        return Celery(__name__, broker=broker, backend=backend)
  garbage_circuit_breaker.py: |
    GARBAGE_YAML_012_CIRCUIT_MARKER_A = "circuit"
    GARBAGE_YAML_012_BREAKER_MARKER_B = True

    class CircuitBreaker:
        GARBAGE_YAML_012_BREAKER_CLASS_C = "breaker"

        def is_open(self) -> bool:
            return False
  garbage_dns_resolver.py: |
    GARBAGE_YAML_012_DNS_MARKER_D = "dns"
    GARBAGE_YAML_012_RESOLVE_MARKER_E = 42

    class DnsResolver:
        GARBAGE_YAML_012_RESOLVER_CLASS_F = True

        def resolve(self, hostname: str) -> str:
            return "127.0.0.1"
