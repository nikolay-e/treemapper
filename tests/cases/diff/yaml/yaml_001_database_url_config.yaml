initial:
  config.yaml: |
    database:
      host: localhost
      port: 5432
      name: myapp
  src/db.py: |
    import os

    def get_database_url():
        host = os.getenv("DB_HOST", "localhost")
        port = os.getenv("DB_PORT", "5432")
        name = os.getenv("DB_NAME", "myapp")
        return f"postgresql://{host}:{port}/{name}"
  garbage_email_service.py: |
    GARBAGE_YAML_001_EMAIL_MARKER_A = "email"
    GARBAGE_YAML_001_SMTP_MARKER_B = True

    class EmailService:
        GARBAGE_YAML_001_SERVICE_CLASS_C = "service"

        def send(self, to: str, subject: str) -> None:
            pass
  garbage_payment_processor.py: |
    GARBAGE_YAML_001_PAYMENT_MARKER_D = "payment"
    GARBAGE_YAML_001_STRIPE_MARKER_E = 42

    class PaymentProcessor:
        GARBAGE_YAML_001_PROCESSOR_CLASS_F = True

        def charge(self, amount: float) -> bool:
            return True
