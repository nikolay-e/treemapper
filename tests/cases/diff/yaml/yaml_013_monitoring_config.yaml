initial:
  config/monitoring.yaml: |
    metrics:
      enabled: true
      port: 9090
  src/metrics.py: |
    from prometheus_client import start_http_server, Counter

    REQUEST_COUNT = Counter("requests_total", "Total requests")

    def start_metrics_server(port: int = 9090):
        start_http_server(port)
  garbage_load_balancer.py: |
    GARBAGE_YAML_013_BALANCE_MARKER_A = "balance"
    GARBAGE_YAML_013_ROUND_ROBIN_MARKER_B = True

    class LoadBalancer:
        GARBAGE_YAML_013_BALANCER_CLASS_C = "balancer"

        def next_backend(self) -> str:
            return "backend-1"
  garbage_connection_pool.py: |
    GARBAGE_YAML_013_POOL_MARKER_D = "pool"
    GARBAGE_YAML_013_CONN_MARKER_E = 42

    class ConnectionPool:
        GARBAGE_YAML_013_POOL_CLASS_F = True

        def acquire(self) -> object:
            return None
