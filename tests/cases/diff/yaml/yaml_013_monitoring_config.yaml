# Scenario: Monitoring config changes metrics port and adds custom path
#
# Diff: monitoring.yaml changes port 9090→8080, adds path: /metrics.
#
# Reviewer questions:
#   Q1: "Does the code use the path?"
#       → src/metrics.py (UNCHANGED) calls start_http_server(port) with
#         port only — no path parameter. The /metrics path from config
#         is completely ignored.
#   Q2: "Will port 8080 conflict with the main app?"
#       → metrics.py defaults to port 9090. If config is loaded, port
#         8080 will be used, but the reviewer needs to see the code to
#         know there's no path support.
#
# Not needed:
#   - config/alerting.yaml: alert rules and notification channels
#     (Slack, PagerDuty), not metrics collection.
#   - src/health_check.py: liveness/readiness probes, not Prometheus
#     metrics endpoint.

initial:
  config/monitoring.yaml: |
    metrics:
      enabled: true
      port: 9090
  src/metrics.py: |
    from prometheus_client import start_http_server, Counter, Histogram

    REQUEST_COUNT = Counter("requests_total", "Total requests")
    REQUEST_LATENCY = Histogram("request_latency_seconds", "Request latency")

    def start_metrics_server(port: int = 9090):
        start_http_server(port)

    def record_request(method: str, path: str, duration: float):
        REQUEST_COUNT.inc()
        REQUEST_LATENCY.observe(duration)
  config/alerting.yaml: |
    alerting:
      receivers:
        - name: slack
          webhook_url: https://hooks.slack.com/services/xxx
        - name: pagerduty
          routing_key: pd-service-key
      rules:
        - alert: HighErrorRate
          expr: rate(errors_total[5m]) > 0.1
          for: 5m
          severity: critical
  src/health_check.py: |
    from datetime import datetime

    class HealthCheck:
        def __init__(self):
            self._checks: dict[str, callable] = {}
            self.start_time = datetime.utcnow()

        def register(self, name: str, check_fn):
            self._checks[name] = check_fn

        def run(self) -> dict:
            results = {}
            for name, check_fn in self._checks.items():
                try:
                    check_fn()
                    results[name] = "healthy"
                except Exception as e:
                    results[name] = f"unhealthy: {e}"
            return {
                "status": "healthy" if all(v == "healthy" for v in results.values()) else "unhealthy",
                "checks": results,
                "uptime_seconds": (datetime.utcnow() - self.start_time).total_seconds(),
            }

changed:
  config/monitoring.yaml: |
    metrics:
      enabled: true
      port: 8080
      path: /metrics
  src/metrics.py: |
    from prometheus_client import start_http_server, Counter, Histogram

    REQUEST_COUNT = Counter("requests_total", "Total requests")
    REQUEST_LATENCY = Histogram("request_latency_seconds", "Request latency")

    def start_metrics_server(port: int = 9090):
        start_http_server(port)

    def record_request(method: str, path: str, duration: float):
        REQUEST_COUNT.inc()
        REQUEST_LATENCY.observe(duration)
  config/alerting.yaml: |
    alerting:
      receivers:
        - name: slack
          webhook_url: https://hooks.slack.com/services/xxx
        - name: pagerduty
          routing_key: pd-service-key
      rules:
        - alert: HighErrorRate
          expr: rate(errors_total[5m]) > 0.1
          for: 5m
          severity: critical
  src/health_check.py: |
    from datetime import datetime

    class HealthCheck:
        def __init__(self):
            self._checks: dict[str, callable] = {}
            self.start_time = datetime.utcnow()

        def register(self, name: str, check_fn):
            self._checks[name] = check_fn

        def run(self) -> dict:
            results = {}
            for name, check_fn in self._checks.items():
                try:
                    check_fn()
                    results[name] = "healthy"
                except Exception as e:
                    results[name] = f"unhealthy: {e}"
            return {
                "status": "healthy" if all(v == "healthy" for v in results.values()) else "unhealthy",
                "checks": results,
