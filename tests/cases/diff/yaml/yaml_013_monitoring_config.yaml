must_include_files:
  # Q1+Q2: The code calls start_http_server(port) with NO path param.
  # The /metrics path from config is inert. Without metrics.py, the
  # reviewer thinks the path config is functional.
  - src/metrics.py
must_include_content_from:
  src/metrics.py:
    # Only port, no path — reveals the config gap
    - "start_http_server(port)"
    # Default still 9090
    - "port: int = 9090"
must_not_include:
  # alerting.yaml: alert rules and notification channels, not metrics collection
  - HighErrorRate
  - pagerduty
  - routing_key
  # health_check.py: liveness/readiness probes, not Prometheus metrics
  - HealthCheck
  - uptime_seconds
must_not_include_files:
  - config/alerting.yaml
  - src/health_check.py
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
