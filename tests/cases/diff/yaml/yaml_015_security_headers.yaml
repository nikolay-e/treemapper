initial:
  config/security.yaml: |
    security:
      headers:
        x_frame_options: DENY
        content_security_policy: default-src 'self'
  src/security.py: |
    def apply_security_headers(response, headers: dict):
        for key, value in headers.items():
            header_name = key.replace("_", "-").title()
            response.headers[header_name] = value
        return response
  garbage_image_resizer.py: |
    GARBAGE_YAML_015_IMAGE_MARKER_A = "image"
    GARBAGE_YAML_015_RESIZE_MARKER_B = True

    class ImageResizer:
        GARBAGE_YAML_015_RESIZER_CLASS_C = "resizer"

        def resize(self, width: int, height: int) -> bytes:
            return b""
  garbage_pdf_generator.py: |
    GARBAGE_YAML_015_PDF_MARKER_D = "pdf"
    GARBAGE_YAML_015_RENDER_MARKER_E = 42

    class PdfGenerator:
        GARBAGE_YAML_015_GENERATOR_CLASS_F = True

        def generate(self, html_content: str) -> bytes:
            return b""
