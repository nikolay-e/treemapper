initial:
  config/api.yaml: |
    api:
      version: v1
      prefix: /api
  src/routes.py: |
    def register_routes(app, version: str = "v1", prefix: str = "/api"):
        base_path = f"{prefix}/{version}"
        app.add_route(f"{base_path}/users", users_handler)
  garbage_backup_manager.py: |
    GARBAGE_YAML_009_BACKUP_MARKER_A = "backup"
    GARBAGE_YAML_009_SNAPSHOT_MARKER_B = True

    class BackupManager:
        GARBAGE_YAML_009_MANAGER_CLASS_C = "backup"

        def create_snapshot(self, name: str) -> str:
            return ""
  garbage_profiler.py: |
    GARBAGE_YAML_009_PROFILE_MARKER_D = "profile"
    GARBAGE_YAML_009_TIMING_MARKER_E = 42

    class PerformanceProfiler:
        GARBAGE_YAML_009_PROFILER_CLASS_F = True

        def measure(self, func_name: str) -> float:
            return 0.0
