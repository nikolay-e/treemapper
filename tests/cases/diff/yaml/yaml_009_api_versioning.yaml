# Scenario: API config bumps version to v2 and deprecates v1
#
# Diff: api.yaml changes version v1->v2, adds deprecated_versions list with v1.
#
# Reviewer questions:
#   Q1: "Does the code handle deprecated versions?"
#       -> src/routes.py (UNCHANGED) has register_routes() that builds
#         paths like /api/{version}/users, but has NO deprecation logic.
#         The deprecated_versions config field is completely ignored.
#   Q2: "Will v1 clients still work?"
#       -> routes.py defaults to version="v1", so existing routes still
#         register under v1 unless the config value is explicitly loaded.
#   Q3: "Where is this config actually loaded?"
#       -> src/config_loader.py (UNCHANGED) loads config/api.yaml and returns
#         the parsed dict. The reviewer needs to see how config reaches routes.py.
#
# Not needed:
#   - config/openapi.yaml: API spec metadata (title, contact, servers). Contains
#     "version" in its OpenAPI info block, creating a lexical match to the diff's
#     version change. But this is documentation metadata, not routing config.
#
#   - src/serializers.py: Response formatting with status codes and timestamps.
#     Has "api" in imports and produces JSON responses for API endpoints. Same
#     request/response domain, but formatting is independent of version routing.
#
#   - src/middleware.py: Request logging middleware that logs the request path
#     including /api/v1/ prefix. Direct structural edge: it processes the same
#     versioned URL paths that routes.py builds. But middleware observes paths
#     passively; it doesn't control version routing.
#
#   - config/rate_limits.yaml: Rate limit rules keyed by API version (v1, v2).
#     HARDEST TRAP: uses the exact same version identifiers (v1, v2) as the diff.
#     But rate limiting is an orthogonal concern -- the reviewer doesn't need
#     rate limit thresholds to understand whether deprecation is handled.
#
#   - tests/test_routes.py: Integration test for register_routes() that asserts
#     path construction with version="v1". Direct structural edge: calls the
#     exact function affected by the config change. But test assertions verify
#     existing behavior, not whether deprecation logic exists.

max_enrichment: 20.7
initial:
  config/api.yaml: |
    api:
      version: v1
      prefix: /api
  src/routes.py: |
    from src.config_loader import load_config

    def register_routes(app, version: str = "v1", prefix: str = "/api"):
        base_path = f"{prefix}/{version}"
        app.add_route(f"{base_path}/users", users_handler)
        app.add_route(f"{base_path}/items", items_handler)
        app.add_route(f"{base_path}/orders", orders_handler)

    def users_handler(request):
        return {"users": [], "version": request.path.split("/")[2]}

    def items_handler(request):
        return {"items": []}

    def orders_handler(request):
        return {"orders": []}
  src/config_loader.py: |
    import yaml

    def load_config(path: str = "config/api.yaml") -> dict:
        with open(path) as f:
            return yaml.safe_load(f)

    def get_api_version(config: dict) -> str:
        return config.get("api", {}).get("version", "v1")

    def get_deprecated_versions(config: dict) -> list:
        return config.get("api", {}).get("deprecated_versions", [])
  config/openapi.yaml: |
    openapi: "3.0.0"
    info:
      title: My API
      version: "1.0.0"
      description: Backend REST API
      contact:
        name: API Support
        email: api@example.com
    servers:
      - url: https://api.example.com/v1
        description: Production v1
      - url: https://api.example.com/v2
        description: Production v2
  src/serializers.py: |
    from datetime import datetime

    class ResponseSerializer:
        def __init__(self, envelope: bool = True):
            self.envelope = envelope

        def serialize(self, data: dict, status: int = 200) -> dict:
            if self.envelope:
                return {
                    "status": status,
                    "data": data,
                    "timestamp": datetime.utcnow().isoformat(),
                }
            return data

        def error(self, message: str, status: int = 400) -> dict:
            return {"status": status, "error": message}
  src/middleware.py: |
    import logging
    import time

    logger = logging.getLogger(__name__)

    class RequestLoggingMiddleware:
        def __init__(self, app):
            self.app = app

        def process_request(self, request):
            request.start_time = time.time()
            logger.info(f"Incoming request: {request.method} {request.path}")
            return request

        def process_response(self, request, response):
            elapsed = time.time() - request.start_time
            logger.info(f"Response: {response.status} in {elapsed:.3f}s for {request.path}")
            return response
  config/rate_limits.yaml: |
    rate_limits:
      v1:
        requests_per_minute: 60
        burst_size: 10
      v2:
        requests_per_minute: 120
        burst_size: 20
      default:
        requests_per_minute: 30
        burst_size: 5
  tests/test_routes.py: |
    import pytest

    class TestRoutes:
        def test_register_routes_default_version(self, app):
            register_routes(app)
            assert app.has_route("/api/v1/users")
            assert app.has_route("/api/v1/items")
            assert app.has_route("/api/v1/orders")

        def test_register_routes_custom_version(self, app):
            register_routes(app, version="v2")
            assert app.has_route("/api/v2/users")
            assert app.has_route("/api/v2/items")

        def test_users_handler_returns_version(self, client):
            response = client.get("/api/v1/users")
            assert response.json["version"] == "v1"

