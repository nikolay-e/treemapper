# Scenario: Email config switches from localhost SMTP to SendGrid with TLS
#
# Diff: email.yaml changes smtp_host to smtp.sendgrid.net, smtp_port 25→587,
# adds use_tls: true.
#
# Reviewer questions:
#   Q1: "Does the code support TLS?"
#       → src/mailer.py (UNCHANGED) creates smtplib.SMTP(host, port)
#         with NO TLS parameter — uses plain SMTP, no starttls() call.
#         The new use_tls field is completely ignored. Emails will fail
#         or be sent unencrypted to SendGrid.
#   Q2: "Is the port change compatible?"
#       → mailer.py receives host/port as constructor args, so port 587
#         will be used. But without TLS, SendGrid on port 587 will reject
#         the connection.
#
# Not needed:
#   - config/notifications.yaml: push notification config (Firebase),
#     not email delivery settings.
#   - src/template_renderer.py: renders email templates but doesn't send.

initial:
  config/email.yaml: |
    email:
      smtp_host: localhost
      smtp_port: 25
      from_address: noreply@example.com
  src/mailer.py: |
    import smtplib
    from email.mime.text import MIMEText

    class Mailer:
        def __init__(self, host: str, port: int, from_addr: str):
            self.host = host
            self.port = port
            self.from_addr = from_addr

        def send(self, to: str, subject: str, body: str):
            msg = MIMEText(body)
            msg["Subject"] = subject
            msg["From"] = self.from_addr
            msg["To"] = to
            with smtplib.SMTP(self.host, self.port) as server:
                server.send_message(msg)
  config/notifications.yaml: |
    notifications:
      push:
        provider: firebase
        api_key: fcm-server-key
        default_ttl: 86400
      channels:
        - email
        - push
        - sms
  src/template_renderer.py: |
    from string import Template

    class TemplateRenderer:
        def __init__(self, template_dir: str = "templates"):
            self.template_dir = template_dir
            self._cache: dict[str, Template] = {}

        def render(self, template_name: str, context: dict) -> str:
            if template_name not in self._cache:
                with open(f"{self.template_dir}/{template_name}") as f:
                    self._cache[template_name] = Template(f.read())
            return self._cache[template_name].substitute(context)

        def clear_cache(self):
            self._cache.clear()

changed:
  config/email.yaml: |
    email:
      smtp_host: smtp.sendgrid.net
      smtp_port: 587
      from_address: noreply@example.com
      use_tls: true
  src/mailer.py: |
    import smtplib
    from email.mime.text import MIMEText

    class Mailer:
        def __init__(self, host: str, port: int, from_addr: str):
            self.host = host
            self.port = port
            self.from_addr = from_addr

        def send(self, to: str, subject: str, body: str):
            msg = MIMEText(body)
            msg["Subject"] = subject
            msg["From"] = self.from_addr
            msg["To"] = to
            with smtplib.SMTP(self.host, self.port) as server:
