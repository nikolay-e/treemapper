must_include_files:
  # Q1+Q2: The code uses plain smtplib.SMTP with NO TLS support.
  # SendGrid on port 587 requires TLS — this will fail at runtime.
  # Without seeing mailer.py, reviewer thinks use_tls: true works.
  - src/mailer.py
must_include_content_from:
  src/mailer.py:
    # Plain SMTP, no starttls() — incompatible with use_tls: true
    - "smtplib.SMTP(self.host, self.port)"
    - "server.send_message(msg)"
must_not_include:
  # notifications.yaml: push notification config, not email delivery
  - firebase
  - fcm-server-key
  # template_renderer.py: renders HTML templates, doesn't send email
  - TemplateRenderer
  - clear_cache
must_not_include_files:
  - config/notifications.yaml
  - src/template_renderer.py
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
