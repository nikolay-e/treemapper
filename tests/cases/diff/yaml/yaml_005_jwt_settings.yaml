# Scenario: JWT auth config switches algorithm HS256->RS256 and reduces expiry
#
# Diff: auth.yaml changes algorithm to RS256, expiration_hours 24->1.
#
# Reviewer questions:
#   Q1: "Does the code support RS256?"
#       -> src/auth.py (UNCHANGED) passes algorithm as a parameter to
#         jwt.encode/jwt.decode, so it will accept RS256. BUT it uses
#         the same `secret` for both encode and decode -- RS256 requires
#         a private/public key pair, not a shared secret. This will break.
#   Q2: "Will the shorter expiry take effect?"
#       -> auth.py defaults to "HS256" -- if the config is loaded, the
#         algorithm parameter will change, but the key handling is wrong.
#   Q3: "How is the auth config consumed?"
#       -> src/middleware/auth_middleware.py (UNCHANGED) imports create_token
#         and verify_token from auth.py, and reads secret_key from config.
#         The reviewer needs to see it passes the same secret to both calls.
#
# Not needed:
#   - config/oauth.yaml: OAuth provider config (Google, GitHub client IDs).
#     Contains auth-related keywords (client_secret, redirect_uri) but OAuth
#     is a separate authentication flow from JWT token management.
#
#   - src/password.py: Password hashing with pbkdf2. Same security domain
#     (authentication), same module location (src/), but password hashing
#     is cryptographic storage, not token signing.
#
#   - src/session.py: Session management that stores tokens in Redis. Direct
#     structural edge: calls create_token() from auth.py. But session storage
#     is downstream consumption, not the signing mechanism being changed.
#
#   - tests/test_auth.py: Tests for create_token/verify_token with HS256.
#     Direct structural edge: imports and calls the exact functions affected.
#     But test expectations verify existing HS256 behavior, not whether RS256
#     key handling is correct.
#
#   - config/cors.yaml: CORS settings with allowed origins. Same config
#     directory, security-adjacent concern. But CORS headers have nothing
#     to do with JWT algorithm selection.

max_enrichment: 26.4
initial:
  config/auth.yaml: |
    jwt:
      secret_key: dev-secret
      algorithm: HS256
      expiration_hours: 24
  src/auth.py: |
    import jwt
    from datetime import datetime, timedelta

    def create_token(payload: dict, secret: str, algorithm: str = "HS256") -> str:
        expiry = datetime.utcnow() + timedelta(hours=24)
        payload["exp"] = expiry
        return jwt.encode(payload, secret, algorithm=algorithm)

    def verify_token(token: str, secret: str, algorithm: str = "HS256") -> dict:
        return jwt.decode(token, secret, algorithms=[algorithm])

    def refresh_token(token: str, secret: str, algorithm: str = "HS256") -> str:
        payload = verify_token(token, secret, algorithm)
        del payload["exp"]
        return create_token(payload, secret, algorithm)
  src/middleware/auth_middleware.py: |
    from src.auth import verify_token
    from src.config_loader import load_config

    class AuthMiddleware:
        def __init__(self):
            config = load_config("config/auth.yaml")
            self.secret = config["jwt"]["secret_key"]
            self.algorithm = config["jwt"].get("algorithm", "HS256")

        def authenticate(self, request):
            token = request.headers.get("Authorization", "").replace("Bearer ", "")
            if not token:
                raise AuthError("Missing token")
            try:
                payload = verify_token(token, self.secret, self.algorithm)
                request.user = payload
            except Exception as e:
                raise AuthError(f"Invalid token: {e}")
            return request

    class AuthError(Exception):
        pass
