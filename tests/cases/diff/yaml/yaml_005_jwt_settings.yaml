initial:
  config/auth.yaml: |
    jwt:
      secret_key: dev-secret
      algorithm: HS256
      expiration_hours: 24
  src/auth.py: |
    import jwt

    def create_token(payload: dict, secret: str, algorithm: str = "HS256") -> str:
        return jwt.encode(payload, secret, algorithm=algorithm)

    def verify_token(token: str, secret: str, algorithm: str = "HS256") -> dict:
        return jwt.decode(token, secret, algorithms=[algorithm])
  garbage_rate_throttle.py: |
    GARBAGE_YAML_005_THROTTLE_MARKER_A = "throttle"
    GARBAGE_YAML_005_BUCKET_MARKER_B = True

    class RateThrottle:
        GARBAGE_YAML_005_THROTTLE_CLASS_C = "rate"

        def allow_request(self, client_ip: str) -> bool:
            return True
  garbage_session_store.py: |
    GARBAGE_YAML_005_SESSION_MARKER_D = "session"
    GARBAGE_YAML_005_EXPIRY_MARKER_E = 42

    class SessionStore:
        GARBAGE_YAML_005_STORE_CLASS_F = True

        def get_session(self, session_id: str) -> dict:
            return {}
