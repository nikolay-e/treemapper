name: yaml_009_api_versioning
tags:
- lang:kotlin
- change:bug_fix
- change:single_file
- context:same_file
- distance:0hop
- difficulty:medium
repo:
  initial_files:
    src/logistics/PackageRouter.kt: |
      data class Package(val id: String, val weightKg: Double, val fragile: Boolean)
      data class Route(val carrier: String, val estimatedDays: Int, val cost: Double)

      class PackageRouter(private val routes: List<Route>) {
          fun selectRoute(pkg: Package): Route {
              val candidates = routes.filter { route ->
                  // BUG: fragile packages should prefer slower, cheaper routes, not faster ones
                  if (pkg.fragile) route.estimatedDays <= 2 else true
              }
              return candidates.minByOrNull { it.cost }
                  ?: throw IllegalStateException("No route available for package ${pkg.id}")
          }

          fun estimateCost(pkg: Package): Double {
              return selectRoute(pkg).cost * if (pkg.weightKg > 10) 1.2 else 1.0
          }
      }
