repo:
  initial_files:
    src/cacheManager.ts: |
      interface CacheEntry<T> {
        value: T;
        expiresAt: number;
      }

      export class CacheManager<T> {
        private store: Map<string, CacheEntry<T>> = new Map();
        private defaultTtl: number;

        constructor(defaultTtlMs: number = 60000) {
          this.defaultTtl = defaultTtlMs;
        }

        set(key: string, value: T, ttlMs?: number): void {
          const ttl = ttlMs ?? this.defaultTtl;
          this.store.set(key, {
            value,
            expiresAt: Date.now() + ttl,
          });
        }

        get(key: string): T | undefined {
          const entry = this.store.get(key);
          if (!entry) return undefined;
          if (Date.now() > entry.expiresAt) {
            this.store.delete(key);
            return undefined;
          }
          return entry.value;
        }

        size(): number {
          return this.store.size;
        }
      }
    __tests__/cacheManager.test.ts: |
      import { CacheManager } from '../src/cacheManager';

      describe('CacheManager', () => {
        test('stores and retrieves values', () => {
          const cache = new CacheManager<string>();
          cache.set('key1', 'value1');
          expect(cache.get('key1')).toBe('value1');
        });

        test('returns undefined for missing key', () => {
          const cache = new CacheManager<string>();
          expect(cache.get('missing')).toBeUndefined();
        });

        test('tracks size', () => {
          const cache = new CacheManager<number>();
          cache.set('a', 1);
          cache.set('b', 2);
          expect(cache.size()).toBe(2);
        });
      });
    src/taskScheduler.ts: |
      export interface Task {
        id: string;
        name: string;
        execute: () => Promise<void>;
      }

      export class TaskScheduler {
        private queue: Task[] = [];

        add(task: Task): void {
          this.queue.push(task);
        }

        async runAll(): Promise<void> {
          for (const task of this.queue) {
            await task.execute();
          }
          this.queue = [];
        }
      }
  changed_files:
    src/cacheManager.ts: |
      interface CacheEntry<T> {
        value: T;
        expiresAt: number;
      }

      export class CacheManager<T> {
        private store: Map<string, CacheEntry<T>> = new Map();
        private defaultTtl: number;
        private maxSize: number;

        constructor(defaultTtlMs: number = 60000, maxSize: number = 1000) {
          this.defaultTtl = defaultTtlMs;
          this.maxSize = maxSize;
        }

        set(key: string, value: T, ttlMs?: number): void {
          if (this.store.size >= this.maxSize && !this.store.has(key)) {
            const oldestKey = this.store.keys().next().value;
            if (oldestKey !== undefined) {
              this.store.delete(oldestKey);
            }
          }
          const ttl = ttlMs ?? this.defaultTtl;
          this.store.set(key, {
            value,
            expiresAt: Date.now() + ttl,
          });
        }

        get(key: string): T | undefined {
          const entry = this.store.get(key);
          if (!entry) return undefined;
          if (Date.now() > entry.expiresAt) {
            this.store.delete(key);
            return undefined;
          }
          return entry.value;
        }

        has(key: string): boolean {
          return this.get(key) !== undefined;
        }

        clear(): void {
          this.store.clear();
        }

        size(): number {
          return this.store.size;
        }
      }
  commit_message: "feat: add maxSize eviction, has, and clear to CacheManager"
