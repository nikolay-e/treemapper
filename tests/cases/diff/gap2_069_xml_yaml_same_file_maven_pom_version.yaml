name: gap2_069_xml_yaml_same_file_maven_pom_version
tags:
- change:single_file
- context:same_file
- difficulty:trivial
- distance:0hop
- lang:xml
- lang:yaml
repo:
  initial_files:
    pom.xml: |
      <project>
        <modelVersion>4.0.0</modelVersion>
        <groupId>com.example</groupId>
        <artifactId>weather-api</artifactId>
        <version>1.2.0</version>
        <dependencies>
          <dependency>
            <groupId>org.springframework</groupId>
            <artifactId>spring-web</artifactId>
            <version>5.3.20</version>
          </dependency>
        </dependencies>
      </project>
    config.yml: |
      server:
        port: 8080
        host: localhost
      api:
        version: v1
        rateLimit: 100
    other/settings.xml: |
      <settings>
        <TRAP_GAP2_069_SET_A>noise_settings</TRAP_GAP2_069_SET_A>
        <TRAP_GAP2_069_SET_B>42</TRAP_GAP2_069_SET_B>
        <localRepository>/home/user/.m2</localRepository>
      </settings>
    other/defaults.yml: |
      TRAP_GAP2_069_DEF_C: noise_defaults
      TRAP_GAP2_069_DEF_D: true
      timeout: 30
      retries: 3
    other/profiles.xml: |
      <profiles>
        <TRAP_GAP2_069_PROF_E>noise_profiles</TRAP_GAP2_069_PROF_E>
        <TRAP_GAP2_069_PROF_F>99</TRAP_GAP2_069_PROF_F>
      </profiles>
  changed_files:
