      trait CacheBackend {
        def fetch(key: String): Option[CacheEntry]
        def store(key: String, entry: CacheEntry): Unit
        def delete(key: String): Unit
      }

      class InMemoryCacheBackend extends CacheBackend {
        private var store: Map[String, CacheEntry] = Map.empty

        def fetch(key: String): Option[CacheEntry] = store.get(key)

        def store(key: String, entry: CacheEntry): Unit = {
