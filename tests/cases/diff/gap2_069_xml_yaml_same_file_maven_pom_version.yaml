  changed_files:
    src/main/scala/cache/CacheService.scala: |
      package cache

      import cache.backend.CacheBackend
      import cache.model.CacheEntry

      class CacheService(backend: CacheBackend) {
        def get(key: String): Option[String] = {
          backend.fetch(key).flatMap { entry =>
            if (entry.isExpired) {
              backend.delete(key)
              None
            } else Some(entry.value)
          }
        }

        def set(key: String, value: String, ttlSeconds: Long): Unit = {
          val entry = CacheEntry(value, System.currentTimeMillis() + ttlSeconds * 1000)
          backend.store(key, entry)
        }

        def evict(key: String): Unit = backend.delete(key)

        def getOrSet(key: String, ttlSeconds: Long)(compute: => String): String = {
          get(key).getOrElse {
            val value = compute
            set(key, value, ttlSeconds)
            value
          }
        }
      }
    src/main/scala/cache/model/CacheEntry.scala: |
      package cache.model

      case class CacheEntry(value: String, expiresAt: Long) {
        def isExpired: Boolean = System.currentTimeMillis() > expiresAt
      }
    src/main/scala/cache/backend/CacheBackend.scala: |
      package cache.backend

      import cache.model.CacheEntry

      trait CacheBackend {
        def fetch(key: String): Option[CacheEntry]
        def store(key: String, entry: CacheEntry): Unit
        def delete(key: String): Unit
      }

      class InMemoryCacheBackend extends CacheBackend {
        private var store: Map[String, CacheEntry] = Map.empty

        def fetch(key: String): Option[CacheEntry] = store.get(key)

        def store(key: String, entry: CacheEntry): Unit = {
          store = store + (key -> entry)
        }

        def delete(key: String): Unit = {
          store = store - key
        }
      }
    src/main/scala/api/ProductController.scala: |
      package api

      import cache.CacheService

      class ProductController(cache: CacheService) {
        def getProduct(id: String): String = {
          cache.getOrSet(s"product:$id", 300) { s"Product($id)" }
        }
      }
