    src/Glucose.jl: |
      module Glucose

      export GlucoseReading, in_range, classify_level

      struct GlucoseReading
          value_mgdl::Float64
          timestamp::Int
      end

      function in_range(r::GlucoseReading)::Bool
          return 70.0 <= r.value_mgdl <= 180.0
      end

      function classify_level(r::GlucoseReading)::String
          if r.value_mgdl < 70.0
              return "hypoglycemia"
          elseif r.value_mgdl <= 180.0
              return "normal"
          else
              return "hyperglycemia"
          end
      end

      end
