repo:
  initial_files:
    lib/tpl/tokenizer.rb: |
      module Tpl
        class Tokenizer
          def initialize(delimiters = ['{{', '}}'])
            @open_delim = delimiters[0]
            @close_delim = delimiters[1]
          end

          def tokenize(source)
            tokens = []
            remaining = source
            while remaining.length > 0
              idx = remaining.index(@open_delim)
              if idx.nil?
                tokens << { type: :text, value: remaining }
                break
              end
              tokens << { type: :text, value: remaining[0...idx] } if idx > 0
              end_idx = remaining.index(@close_delim, idx)
              expr = remaining[(idx + @open_delim.length)...end_idx].strip
              tokens << { type: :expr, value: expr }
              remaining = remaining[(end_idx + @close_delim.length)..]
            end
            tokens
          end
        end
      end
    lib/tpl/parser.rb: |
      require_relative 'tokenizer'

      module Tpl
        class Parser
          def initialize(tokenizer)
            @tokenizer = tokenizer
          end

          def parse(source)
            tokens = @tokenizer.tokenize(source)
            tokens.map do |tok|
              if tok[:type] == :expr
                { type: :variable, name: tok[:value] }
              else
                { type: :literal, content: tok[:value] }
              end
            end
          end
        end
      end
    lib/tpl/renderer.rb: |
      require_relative 'parser'

      module Tpl
        class Renderer
          def initialize(parser)
            @parser = parser
          end

          def render(source, context = {})
            nodes = @parser.parse(source)
            nodes.map do |node|
              case node[:type]
              when :literal
                node[:content]
              when :variable
                context.fetch(node[:name].to_sym, "")
              end
            end.join
          end
        end
      end
    lib/tpl/cache.rb: |
      TRAP_GAP075_CACHE_A = "template_cache"
      TRAP_GAP075_TTL_B = 300

      module Tpl
        class Cache
          def initialize
            @store = {}
          end

          def get(key)
            @store[key]
          end

          def set(key, value)
            @store[key] = value
          end

          def clear
            @store.clear
          end
        end
      end
    lib/tpl/filter.rb: |
      TRAP_GAP075_FILTER_C = "template_filter"
      TRAP_GAP075_BUILTIN_D = "upcase"

      module Tpl
        class Filter
          def apply(name, value)
            case name
            when 'upcase' then value.to_s.upcase
            when 'downcase' then value.to_s.downcase
            when 'strip' then value.to_s.strip
            else value
            end
          end
        end
      end
