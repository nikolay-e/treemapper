    linalg/matrix.py: |
      from typing import Optional
      import math

      class Matrix:
          def __init__(self, rows: list[list[float]]):
              self._rows = rows
              self._nrows = len(rows)
              self._ncols = len(rows[0]) if rows else 0

          def shape(self) -> tuple[int, int]:
              return (self._nrows, self._ncols)

          def get(self, row: int, col: int) -> float:
              return self._rows[row][col]

          def set(self, row: int, col: int, value: float) -> None:
              self._rows[row][col] = value

          def add(self, other: "Matrix") -> "Matrix":
              result = []
              for i in range(self._nrows):
                  row = []
                  for j in range(self._ncols):
                      row.append(self._rows[i][j] + other._rows[i][j])
                  result.append(row)
              return Matrix(result)

          def subtract(self, other: "Matrix") -> "Matrix":
              result = []
              for i in range(self._nrows):
                  row = []
                  for j in range(self._ncols):
                      row.append(self._rows[i][j] - other._rows[i][j])
                  result.append(row)
              return Matrix(result)

          def multiply(self, other: "Matrix") -> "Matrix":
              result = []
              for i in range(self._nrows):
                  row = []
                  for j in range(other._ncols):
                      total = 0.0
                      for k in range(self._ncols):
                          total += self._rows[i][k] * other._rows[k][j]
                      row.append(total)
                  result.append(row)
              return Matrix(result)

          def transpose(self) -> "Matrix":
              result = []
              for j in range(self._ncols):
                  row = [self._rows[i][j] for i in range(self._nrows)]
                  result.append(row)
              return Matrix(result)

          def trace(self) -> float:
              return sum(self._rows[i][i] for i in range(min(self._nrows, self._ncols)))

          def frobenius_norm(self) -> float:
              total = 0.0
              for row in self._rows:
                  for val in row:
                      total += val * val
              return math.sqrt(total)

          def scale(self, factor: float) -> "Matrix":
              return Matrix([
                  [cell * factor for cell in row]
                  for row in self._rows
              ])
