      interface Product {
          id: string;
          name: string;
          price: number;
      }

      const initialState = { products: [] as Product[] };

      export const productSlice = createSlice({
          name: 'products',
          initialState,
          reducers: {
              addProduct: (state, action: PayloadAction<Product>) => {
                  state.products.push(action.payload);
              },
          },
      });

      export const { addProduct } = productSlice.actions;
