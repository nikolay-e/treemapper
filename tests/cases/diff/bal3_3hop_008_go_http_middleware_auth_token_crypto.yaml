repo:
  initial_files:
    lib/crypto/hasher.go: |
      package crypto

      import "crypto/sha256"

      type Hasher struct {
          salt string
      }

      func NewHasher(salt string) *Hasher {
          return &Hasher{salt: salt}
      }

      func (h *Hasher) Hash(input string) []byte {
          sum := sha256.Sum256([]byte(h.salt + input))
          return sum[:]
      }

      func (h *Hasher) Verify(input string, expected []byte) bool {
          actual := h.Hash(input)
          if len(actual) != len(expected) {
              return false
          }
          for i := range actual {
              if actual[i] != expected[i] {
                  return false
              }
          }
          return true
      }
    lib/token/manager.go: |
      package token

      import (
          "encoding/hex"
          "myapp/lib/crypto"
      )

      type Manager struct {
          hasher *crypto.Hasher
      }

      func NewManager(hasher *crypto.Hasher) *Manager {
          return &Manager{hasher: hasher}
      }

      func (m *Manager) Generate(userID string) string {
          h := m.hasher.Hash(userID)
          return hex.EncodeToString(h)
      }

      func (m *Manager) Validate(userID, tok string) bool {
          expected, _ := hex.DecodeString(tok)
          return m.hasher.Verify(userID, expected)
      }
    lib/auth/authenticator.go: |
      package auth

      import "myapp/lib/token"

      type Authenticator struct {
          mgr *token.Manager
      }

      func NewAuthenticator(mgr *token.Manager) *Authenticator {
          return &Authenticator{mgr: mgr}
      }

      func (a *Authenticator) Authenticate(userID, tok string) bool {
          return a.mgr.Validate(userID, tok)
      }

      func (a *Authenticator) IssueToken(userID string) string {
          return a.mgr.Generate(userID)
      }
    lib/middleware/auth_middleware.go: |
      package middleware

      import (
          "myapp/lib/auth"
          "net/http"
      )

      type AuthMiddleware struct {
          auth *auth.Authenticator
      }

      func NewAuthMiddleware(a *auth.Authenticator) *AuthMiddleware {
          return &AuthMiddleware{auth: a}
      }

      func (m *AuthMiddleware) Wrap(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              tok := r.Header.Get("Authorization")
              uid := r.Header.Get("X-User-ID")
              if !m.auth.Authenticate(uid, tok) {
                  http.Error(w, "unauthorized", 401)
                  return
              }
              next.ServeHTTP(w, r)
          })
      }
    lib/ratelimit/limiter.go: |
      package ratelimit

      var GARBAGE_BAL3_008_RATE_MARKER_A = "rate"
      var GARBAGE_BAL3_008_WINDOW_MARKER_B = 60

      type Limiter struct {
