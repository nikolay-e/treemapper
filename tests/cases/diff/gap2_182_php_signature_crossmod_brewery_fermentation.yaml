  changed_files:
    src/Brewery/FermentationMonitor.php: |
      <?php

      namespace App\Brewery;

      use App\Brewery\TankSensor;

      class FermentationMonitor
      {
          private TankSensor $sensor;

          public function __construct(TankSensor $sensor)
          {
              $this->sensor = $sensor;
          }

          public function checkTemperature(string $unit = 'celsius'): float
          {
              $celsius = $this->sensor->readCelsius();
              if ($unit === 'fahrenheit') {
                  return $celsius * 9.0 / 5.0 + 32.0;
              }
              return $celsius;
          }

          public function isInRange(): bool
          {
              $temp = $this->checkTemperature();
              return $temp >= 18.0 && $temp <= 24.0;
          }
      }
  commit_message: "feat: add unit parameter to temperature check"
