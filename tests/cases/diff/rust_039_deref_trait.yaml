      use std::ops::{Deref, DerefMut};

      pub struct Wrapper<T> {
          value: T,
          label: String,
      }

      impl<T> Wrapper<T> {
          pub fn new(value: T, label: &str) -> Self {
              Self {
                  value,
                  label: label.to_string(),
              }
          }

          pub fn into_inner(self) -> T {
              self.value
