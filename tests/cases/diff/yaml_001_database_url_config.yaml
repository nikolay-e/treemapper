name: yaml_001_database_url_config
repo:
  initial_files:
    config.yaml: |
      database:
        host: localhost
        port: 5432
        name: myapp
    src/db.py: |
      import os

      def get_database_url():
          host = os.getenv("DB_HOST", "localhost")
          port = os.getenv("DB_PORT", "5432")
          name = os.getenv("DB_NAME", "myapp")
          return f"postgresql://{host}:{port}/{name}"
    config/cache.yaml: |
      redis:
        host: localhost
        port: 6379
        db: 0
        max_connections: 10
    src/migrations.py: |
      import subprocess

      def run_migrations(direction: str = "up"):
          if direction == "up":
              subprocess.run(["alembic", "upgrade", "head"], check=True)
          elif direction == "down":
              subprocess.run(["alembic", "downgrade", "-1"], check=True)

      def create_migration(message: str):
          subprocess.run(["alembic", "revision", "--autogenerate", "-m", message], check=True)

      def get_current_revision():
          result = subprocess.run(["alembic", "current"], capture_output=True, text=True)
          return result.stdout.strip()
  changed_files:
    config.yaml: |
      database:
        host: production-db.example.com
        port: 5432
        name: myapp_prod
    src/db.py: |
      import os

      def get_database_url():
          host = os.getenv("DB_HOST", "localhost")
          port = os.getenv("DB_PORT", "5432")
          name = os.getenv("DB_NAME", "myapp")
          return f"postgresql://{host}:{port}/{name}"
    config/cache.yaml: |
      redis:
        host: localhost
        port: 6379
        db: 0
        max_connections: 10
    src/migrations.py: |
      import subprocess

      def run_migrations(direction: str = "up"):
          if direction == "up":
              subprocess.run(["alembic", "upgrade", "head"], check=True)
          elif direction == "down":
              subprocess.run(["alembic", "downgrade", "-1"], check=True)

      def create_migration(message: str):
          subprocess.run(["alembic", "revision", "--autogenerate", "-m", message], check=True)

      def get_current_revision():
          result = subprocess.run(["alembic", "current"], capture_output=True, text=True)
          return result.stdout.strip()
  commit_message: Update files
fragments:
- id: db
  selector:
    path: src/db.py
    anchor: os.getenv("DB_HOST", "localhost")
- id: db_1
  selector:
    path: src/db.py
    anchor: os.getenv("DB_NAME", "myapp")
- id: db_2
  selector:
    path: src/db.py
    anchor: postgresql://{host}:{port}/{name}
- id: no_cache
  selector:
    path: config/cache.yaml
- id: no_migrations
  selector:
    path: src/migrations.py
- id: no_global_0
  selector:
    anchor: max_connections
- id: no_global_1
  selector:
    anchor: run_migrations
- id: no_global_2
  selector:
    anchor: create_migration
- id: no_global_3
  selector:
    anchor: alembic
oracle:
  required:
  - db
  - db_1
  - db_2
  allowed: []
  forbidden:
  - no_cache
  - no_migrations
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
