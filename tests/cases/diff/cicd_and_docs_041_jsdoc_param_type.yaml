      }

      export function validatePostalCode(code: string, country: string): boolean {
        const patterns: Record<string, RegExp> = {
          US: /^\d{5}(-\d{4})?$/,
          UK: /^[A-Z]{1,2}\d[A-Z\d]?\s?\d[A-Z]{2}$/i,
          DE: /^\d{5}$/,
        };
        return patterns[country]?.test(code) ?? false;
      }
    src/events/order-events.ts: |
