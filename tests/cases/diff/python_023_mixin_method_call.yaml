    event_tracker.py: |
      from typing import List, Dict, Any, Optional
      from dataclasses import dataclass
      from datetime import datetime

      @dataclass
      class TrackedEvent:
          name: str
          timestamp: datetime
          data: Dict[str, Any]

      class EventTracker:
          def __init__(self):
              self._events: List[TrackedEvent] = []

          def track(self, name: str, data: Dict[str, Any]) -> None:
              self._events.append(TrackedEvent(name=name, timestamp=datetime.now(), data=data))

          def get_events(self, name: Optional[str] = None) -> List[TrackedEvent]:
              if name:
                  return [e for e in self._events if e.name == name]
              return self._events.copy()
    json_encoder.py: |
      import json
      from typing import Any, Dict
      from datetime import datetime

      class CustomJsonEncoder(json.JSONEncoder):
          def default(self, obj: Any) -> Any:
              if isinstance(obj, datetime):
                  return obj.isoformat()
              if hasattr(obj, 'to_dict'):
                  return obj.to_dict()
              return super().default(obj)

      def serialize_to_json(obj: Any) -> str:
          return json.dumps(obj, cls=CustomJsonEncoder, indent=2)

      def deserialize_from_json(data: str) -> Dict[str, Any]:
          return json.loads(data)
