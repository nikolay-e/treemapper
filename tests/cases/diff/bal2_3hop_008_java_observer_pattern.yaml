  changed_files:
    src/main/java/com/app/observer/Observable.java: |
      package com.app.observer;

      import java.util.ArrayList;
      import java.util.List;
      import java.util.concurrent.CopyOnWriteArrayList;

      public class Observable {
          private final List<String> listeners = new CopyOnWriteArrayList<>();
          public void addListener(String listener) {
              listeners.add(listener);
          }
          public void removeListener(String listener) {
              listeners.remove(listener);
          }
          public void notifyAll(String event) {
              for (String l : listeners) {
                  System.out.println(l + ": " + event);
              }
          }
      }
    src/main/java/com/app/model/StockPrice.java: |
