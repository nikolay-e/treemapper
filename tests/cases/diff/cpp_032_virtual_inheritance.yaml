name: cpp_032_virtual_inheritance
tags:
- lang:php
- change:bug_fix
- change:single_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    src/Auth/PasswordPolicy.php: |
      <?php
      namespace App\Auth;

      class PasswordPolicy
      {
          private int $minLength;
          private bool $requireUppercase;
          private bool $requireDigit;
          private bool $requireSymbol;

          public function __construct(
              int $minLength = 8,
              bool $requireUppercase = true,
              bool $requireDigit = true,
              bool $requireSymbol = false
          ) {
              $this->minLength = $minLength;
              $this->requireUppercase = $requireUppercase;
              $this->requireDigit = $requireDigit;
              $this->requireSymbol = $requireSymbol;
          }

          public function validate(string $password): array
          {
              $errors = [];

              if (strlen($password) < $this->minLength) {
                  $errors[] = "Password must be at least {$this->minLength} characters";
              }

              if ($this->requireUppercase && !preg_match('/[A-Z]/', $password)) {
                  $errors[] = "Password must contain an uppercase letter";
              }

              if ($this->requireDigit && !preg_match('/[0-9]/', $password)) {
                  $errors[] = "Password must contain a digit";
              }

              if ($this->requireSymbol && !preg_match('/[^a-zA-Z0-9]/', $password)) {
                  $errors[] = "Password must contain a symbol";
              }

              return $errors;
          }

          public function isValid(string $password): bool
          {
              return empty($this->validate($password));
          }
      }
    src/Auth/TokenService.php: |
      <?php
      namespace App\Auth;

      class TokenService
      {
          public function generate(string $userId): string
          {
              return bin2hex(random_bytes(32)) . ':' . $userId;
          }
      }
