  changed_files:
    Sources/Navigation/Router.swift: |
      import Foundation

      enum Route: Equatable {
          case home
          case detail(id: Int)
          case settings
          case search(query: String)
          case profile(userId: Int)
      }

      protocol RouterDelegate: AnyObject {
          func routerDidNavigate(to route: Route)
      }

      class Router {
          weak var delegate: RouterDelegate?
          private var history: [Route] = []

          func navigate(to route: Route) {
              history.append(route)
              delegate?.routerDidNavigate(to: route)
          }

          func goBack() -> Route? {
              return history.popLast()
          }

          func currentRoute() -> Route? {
              return history.last
          }

          func canGoBack() -> Bool {
              return history.count > 1
          }
      }
