repo:
  initial_files:
    lib/shopping_cart.rb: |
      class ShoppingCart
        attr_reader :items

        def initialize
          @items = []
        end

        def add_item(name, price, quantity = 1)
          @items << { name: name, price: price, quantity: quantity }
        end

        def total
          @items.sum { |item| item[:price] * item[:quantity] }
        end

        def item_count
          @items.sum { |item| item[:quantity] }
        end
      end
    spec/shopping_cart_spec.rb: |
      require_relative '../lib/shopping_cart'

      RSpec.describe ShoppingCart do
        subject { described_class.new }

        describe '#add_item' do
          it 'adds item to cart' do
            subject.add_item('Widget', 9.99)
            expect(subject.items.size).to eq(1)
          end
        end

        describe '#total' do
          it 'calculates total price' do
            subject.add_item('A', 10.0, 2)
            subject.add_item('B', 5.0, 1)
            expect(subject.total).to eq(25.0)
          end
        end

        describe '#item_count' do
          it 'counts all quantities' do
            subject.add_item('A', 1.0, 3)
            subject.add_item('B', 2.0, 2)
            expect(subject.item_count).to eq(5)
          end
        end
      end
    lib/discount.rb: |
      class Discount
        def self.apply(price, percent)
          price * (1 - percent / 100.0)
        end
      end
    lib/receipt_printer.rb: |
      class ReceiptPrinter
        def print(cart)
          cart.items.each { |i| puts "#{i[:name]}: $#{i[:price]}" }
        end
      end
  changed_files:
    lib/shopping_cart.rb: |
      class ShoppingCart
        attr_reader :items

        def initialize
          @items = []
        end

        def add_item(name, price, quantity = 1)
          raise ArgumentError, 'Price must be positive' if price <= 0
          raise ArgumentError, 'Quantity must be positive' if quantity <= 0

          existing = @items.find { |item| item[:name] == name }
          if existing
            existing[:quantity] += quantity
          else
            @items << { name: name, price: price, quantity: quantity }
          end
        end

        def remove_item(name)
          @items.reject! { |item| item[:name] == name }
        end

        def total
          @items.sum { |item| item[:price] * item[:quantity] }
        end

        def item_count
          @items.sum { |item| item[:quantity] }
        end

        def empty?
          @items.empty?
        end
      end
  commit_message: "fix: merge duplicate items, validate inputs, add remove and empty?"
