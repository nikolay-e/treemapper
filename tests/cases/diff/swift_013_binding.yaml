name: swift_013_binding
repo:
  initial_files:
    Models/User.swift: |
      import Foundation

      struct User: Identifiable {
          let id: UUID
          var name: String
          var email: String
          var avatarURL: URL?

          static let placeholder = User(
              id: UUID(),
              name: "",
              email: "",
              avatarURL: nil
          )
      }
    Features/UserEditor/UserEditorView.swift: |
      import SwiftUI

      struct UserEditorView: View {
          var body: some View { Text("TODO") }
      }
    Models/Product.swift: |
      import Foundation

      struct Product: Identifiable {
          let id: UUID
          var title: String
          var price: Decimal
          var description: String
          var imageURL: URL?
      }
    Features/Settings/SettingsView.swift: |
      import SwiftUI

      struct AppSettings {
          var notificationsEnabled: Bool
          var darkModeEnabled: Bool
          var fontSize: CGFloat
      }

      struct SettingsView: View {
          @Binding var settings: AppSettings

          var body: some View {
              Form {
                  Toggle("Notifications", isOn: $settings.notificationsEnabled)
                  Toggle("Dark Mode", isOn: $settings.darkModeEnabled)
              }
          }
      }
    Features/UserEditor/AvatarPickerView.swift: |
      import SwiftUI

      struct AvatarPickerView: View {
          @Binding var user: User
          @State private var showImagePicker = false

          var body: some View {
              VStack {
                  if let url = user.avatarURL {
                      AsyncImage(url: url) { image in
                          image.resizable().scaledToFit()
                      } placeholder: {
                          ProgressView()
                      }
                      .frame(width: 100, height: 100)
                  }
                  Button("Change Avatar") {
                      showImagePicker = true
                  }
              }
          }
      }
    Views/UserListView.swift: |
      import SwiftUI

      struct UserListView: View {
          @State private var users: [User] = [.placeholder]

          var body: some View {
              NavigationStack {
                  List($users) { $user in
                      NavigationLink(user.name) {
                          UserEditorView(user: $user)
                      }
                  }
                  .navigationTitle("Users")
              }
          }
      }
    Models/Address.swift: |
      struct Address {
          var street: String
          var city: String
          var state: String
          var zipCode: String
          var country: String

          static let empty = Address(
              street: "", city: "", state: "", zipCode: "", country: ""
          )
      }
