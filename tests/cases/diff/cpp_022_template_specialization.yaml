name: cpp_022_template_specialization
tags:
- lang:kotlin
- change:bug_fix
- change:single_file
- context:same_file
- distance:0hop
- difficulty:medium
repo:
  initial_files:
    src/iot/EventThrottler.kt: |
      data class SensorEvent(val deviceId: String, val type: String, val timestamp: Long)

      class EventThrottler(private val windowMs: Long, private val maxPerWindow: Int) {
          private val buckets = mutableMapOf<String, MutableList<Long>>()

          fun shouldAllow(event: SensorEvent): Boolean {
              val key = "${event.deviceId}:${event.type}"
              val now = event.timestamp
              val bucket = buckets.getOrPut(key) { mutableListOf() }
              // BUG: prunes stale entries AFTER counting, not before
              val count = bucket.count { it >= now - windowMs }
              bucket.removeIf { it < now - windowMs }
              return count < maxPerWindow
          }

          fun recordEvent(event: SensorEvent) {
              val key = "${event.deviceId}:${event.type}"
              buckets.getOrPut(key) { mutableListOf() }.add(event.timestamp)
          }
      }
