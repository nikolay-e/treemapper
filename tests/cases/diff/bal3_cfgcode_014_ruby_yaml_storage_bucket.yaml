  changed_files:
    src/validation/schema.py: |
      from src.validation.rules import validate_field

      class SchemaValidator:
          def __init__(self, schema: dict) -> None:
              self._schema = schema

          def validate(self, data: dict) -> list[str]:
              errors = []
              for field, rules in self._schema.items():
                  if rules.get("required") and field not in data:
                      errors.append(f"{field}: required field missing")
                      continue
                  value = data.get(field)
                  field_errors = validate_field(field, value, rules)
                  errors.extend(field_errors)
              return errors
    src/validation/rules.py: |
      def validate_field(name: str, value, rules: dict) -> list[str]:
          errors = []
          if rules.get("type") == "string" and not isinstance(value, str):
              errors.append(f"{name}: expected string")
          if rules.get("min_length") and isinstance(value, str):
              if len(value) < rules["min_length"]:
                  errors.append(f"{name}: too short")
          return errors
    tests/test_schema.py: |
      from src.validation.schema import SchemaValidator

      def test_valid_data():
          schema = {"name": {"type": "string", "min_length": 2}}
          v = SchemaValidator(schema)
          assert v.validate({"name": "Alice"}) == []

      def test_wrong_type():
          schema = {"age": {"type": "string"}}
          v = SchemaValidator(schema)
          assert len(v.validate({"age": 42})) == 1

      def test_required_field_missing():
          schema = {"email": {"type": "string", "required": True}}
          v = SchemaValidator(schema)
          errors = v.validate({})
          assert any("required field missing" in e for e in errors)
