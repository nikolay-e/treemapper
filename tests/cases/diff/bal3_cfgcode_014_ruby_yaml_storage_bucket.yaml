      from src.validation.schema import SchemaValidator

      def test_valid_data():
          schema = {"name": {"type": "string", "min_length": 2}}
          v = SchemaValidator(schema)
          assert v.validate({"name": "Alice"}) == []

      def test_wrong_type():
          schema = {"age": {"type": "string"}}
          v = SchemaValidator(schema)
          assert len(v.validate({"age": 42})) == 1
