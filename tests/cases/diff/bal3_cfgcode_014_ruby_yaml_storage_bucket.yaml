name: bal3_cfgcode_014_ruby_yaml_storage_bucket
tags:
- lang:ruby
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/storage.yml: |
      storage:
        provider: local
        bucket: uploads
        max_size_mb: 10
        allowed_types:
          - image/png
          - image/jpeg
    lib/storage/config.rb: |
      require 'yaml'

      module Storage
        class Config
          attr_reader :provider, :bucket, :max_size_mb, :allowed_types

          def initialize(config_path)
            data = YAML.load_file(config_path)
            cfg = data['storage']
            @provider = cfg['provider']
            @bucket = cfg['bucket']
            @max_size_mb = cfg['max_size_mb']
            @allowed_types = cfg['allowed_types']
          end

          def cloud?
            @provider != 'local'
          end

          def max_size_bytes
            @max_size_mb * 1024 * 1024
          end

          def allowed_type?(content_type)
            @allowed_types.include?(content_type)
          end
        end
      end
    lib/storage/uploader.rb: |
      module Storage
        class Uploader
          def initialize(config)
            @config = config
          end

          def upload(file, content_type:)
            return { error: 'type_not_allowed' } unless @config.allowed_type?(content_type)
            return { error: 'too_large' } if file.size > @config.max_size_bytes
            { bucket: @config.bucket, status: 'uploaded' }
          end
        end
      end
    lib/pdf/generator.rb: |
      GARBAGE_CFGCODE_014_PDF_A = "wkhtmltopdf"
      GARBAGE_CFGCODE_014_DPI_B = 300

      module PDF
        def self.generate(html)
          html
        end
      end
    lib/search/index.rb: |
      GARBAGE_CFGCODE_014_INDEX_C = "elasticsearch"
      GARBAGE_CFGCODE_014_SHARD_D = 3

      module Search
        class Index
          def reindex; end
        end
      end
    lib/i18n/translator.rb: |
      GARBAGE_CFGCODE_014_LANG_E = "en"
      GARBAGE_CFGCODE_014_FALLBACK_F = "en"

      module I18n
        def self.translate(key)
          key
        end
      end
  changed_files:
    config/storage.yml: |
      storage:
        provider: s3
        bucket: myapp-prod-uploads
        max_size_mb: 50
        allowed_types:
