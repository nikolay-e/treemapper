name: gap_069_ts_config_theme_switcher
tags:
- change:config
- change:multi_file
- context:same_file
- difficulty:easy
- distance:0hop
- lang:typescript
repo:
  initial_files:
    src/theme/config.ts: |
      export interface ThemeConfig {
        primaryColor: string;
        fontFamily: string;
        borderRadius: number;
      }

      export const defaultTheme: ThemeConfig = {
        primaryColor: "#3366ff",
        fontFamily: "Inter, sans-serif",
        borderRadius: 4,
      };
    src/theme/applier.ts: |
      import { ThemeConfig, defaultTheme } from "./config";

      function toCssVariable(key: string, value: string | number): string {
        const cssKey = key.replace(/([A-Z])/g, "-$1").toLowerCase();
        return `--theme-${cssKey}: ${value};`;
      }

      function applyTheme(theme: ThemeConfig): string {
        const vars = [
          toCssVariable("primaryColor", theme.primaryColor),
          toCssVariable("fontFamily", theme.fontFamily),
          toCssVariable("borderRadius", `${theme.borderRadius}px`),
        ];
        return `:root {\n${vars.join("\n")}\n}`;
      }

      function resetTheme(): string {
        return applyTheme(defaultTheme);
      }
    src/theme/palette.ts: |
      const TRAP_GAP069_PALETTE_A: string = "palette_module";
      const TRAP_GAP069_SWATCH_B: number = 12;

      function hexToRgb(hex: string): [number, number, number] {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return [r, g, b];
      }

      function rgbToHsl(r: number, g: number, b: number): [number, number, number] {
        const rn = r / 255;
        const gn = g / 255;
        const bn = b / 255;
        const max = Math.max(rn, gn, bn);
        const min = Math.min(rn, gn, bn);
        const l = (max + min) / 2;
        return [0, 0, l];
      }
    src/theme/animation.ts: |
      const TRAP_GAP069_ANIM_C: string = "animation_module";
      const TRAP_GAP069_DURATION_D: number = 300;

      function easeInOut(t: number): number {
        return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
      }

      function transitionValue(from: number, to: number, progress: number): number {
        return from + (to - from) * easeInOut(progress);
      }
