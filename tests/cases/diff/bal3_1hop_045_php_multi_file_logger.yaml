  changed_files:
    src/Log/Logger.php: |
      <?php
      namespace App\Log;

      class Logger
      {
          private string $channel;
          private array $context = [];

          public function __construct(string $channel)
          {
              $this->channel = $channel;
          }

          public function withContext(array $context): self
          {
              $clone = clone $this;
              $clone->context = array_merge($this->context, $context);
              return $clone;
          }

          public function info(string $message): string
          {
              return $this->format('INFO', $message);
          }

          public function error(string $message): string
          {
              return $this->format('ERROR', $message);
          }

          public function warning(string $message): string
          {
              return $this->format('WARNING', $message);
          }

          private function format(string $level, string $message): string
          {
              $ctx = !empty($this->context) ? ' ' . json_encode($this->context) : '';
              return "[{$this->channel}] {$level}: {$message}{$ctx}";
          }
      }
    src/Log/LogFormatter.php: |
      <?php
      namespace App\Log;

      class LogFormatter
      {
          private Logger $logger;

          public function __construct(Logger $logger)
          {
              $this->logger = $logger;
          }

          public function formatInfo(string $msg): string
          {
              return $this->logger->info($msg);
          }

          public function formatWarning(string $msg): string
          {
              return $this->logger->warning($msg);
          }
      }
  commit_message: "Add structured context, warning level, and format method to Logger"
