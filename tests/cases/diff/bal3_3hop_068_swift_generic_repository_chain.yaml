    Sources/Core/Entity.swift: |
      import Foundation

      protocol Entity {
          var id: String { get }
      }
    Sources/Core/Repository.swift: |
      import Foundation

      protocol Repository {
          associatedtype T: Entity
          func findById(_ id: String) -> T?
          func save(_ entity: T)
      }
    Sources/Models/Task.swift: |
      import Foundation
      import Core

      struct Task: Entity {
          let id: String
          let title: String
          let completed: Bool
      }
    Sources/Persistence/TaskRepository.swift: |
      import Foundation
      import Core
      import Models

      class TaskRepository: Repository {
          typealias T = Task
          private var storage: [String: Task] = [:]
          func findById(_ id: String) -> Task? {
              return storage[id]
          }
          func save(_ entity: Task) {
              storage[entity.id] = entity
          }
      }
    Sources/Services/TaskService.swift: |
      import Foundation
      import Persistence

      class TaskService {
          private let repo: TaskRepository
          init(repo: TaskRepository) {
              self.repo = repo
          }
          func getTask(id: String) -> Task? {
              return repo.findById(id)
          }
      }
    Sources/Controllers/TaskController.swift: |
      import Foundation
      import Services

      class TaskController {
          private let service: TaskService
          init(service: TaskService) {
              self.service = service
          }
          func show(id: String) -> Task? {
              return service.getTask(id: id)
          }
      }
