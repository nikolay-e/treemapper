    (defn schedule-notification [channel message delay-ms]
      (future
        (Thread/sleep delay-ms)
        (notif/send-notification channel message)))

  src/myapp/logger.clj: |
    (ns myapp.logger)

    (def GARBAGE_CLJ_003_LOGGER_MARKER_G "logger")
    (def GARBAGE_CLJ_003_LOG_LEVEL_H :info)

    (defn log-info [msg]
      (println (str "[INFO] " msg)))

# === Assertions ===

must_include_files:
- src/myapp/notify_slack.clj

must_include_content_from:
  src/myapp/notify_slack.clj:
    - defmethod send-notification :slack
    - webhook-url
    - channel-name
  src/myapp/notification.clj:
    - defmulti send-notification

must_not_include:
# Tricky: also defines defmethod for send-notification
- GARBAGE_CLJ_003_PUSH_NOTIFY_A
- GARBAGE_CLJ_003_DEVICE_TOKEN_B
# Tricky: defines another multimethod
- GARBAGE_CLJ_003_FORMATTER_MULTI_C
- GARBAGE_CLJ_003_FORMAT_DISPATCH_D
# Tricky: requires notification namespace
- GARBAGE_CLJ_003_SCHEDULER_MARKER_E
- GARBAGE_CLJ_003_CRON_EXPR_F
# Plain garbage
- GARBAGE_CLJ_003_LOGGER_MARKER_G
- GARBAGE_CLJ_003_LOG_LEVEL_H

must_not_include_files:
- src/myapp/notify_push.clj
- src/myapp/formatter.clj
- src/myapp/scheduler.clj
- src/myapp/logger.clj

max_fragments: 8
max_files: 2
add_garbage_files: false
skip_garbage_check: true
