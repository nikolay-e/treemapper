  src/myapp/notify_slack.clj: |
    (ns myapp.notify-slack
      (:require [myapp.notification :refer [send-notification]]
                [clojure.data.json :as json]))

    (defmethod send-notification :slack
      [channel message]
      (let [webhook-url (:webhook-url channel)
            payload (json/write-str {:text (:body message)
                                     :channel (:channel-name channel)})]
        (println (str "Posting to Slack webhook " webhook-url ": " payload))))

  src/myapp/notify_push.clj: |
