# Clojure multimethods: defmulti in one file, defmethod implementations in
# others. A new defmethod is added. Context must include the defmulti
# definition. Noise: other defmethod files for different dispatch values.

initial:
  src/myapp/notification.clj: |
    (ns myapp.notification)

    (defmulti send-notification
      (fn [channel message] (:type channel)))

  src/myapp/notify_email.clj: |
    (ns myapp.notify-email
      (:require [myapp.notification :refer [send-notification]]))

    (defmethod send-notification :email
      [channel message]
      (let [to (:address channel)
            subject (:subject message)
            body (:body message)]
        (println (str "Sending email to " to ": " subject))))

  src/myapp/notify_sms.clj: |
    (ns myapp.notify-sms
      (:require [myapp.notification :refer [send-notification]]))

    (defmethod send-notification :sms
      [channel message]
      (let [phone (:phone-number channel)
            body (:body message)]
        (println (str "Sending SMS to " phone ": " body))))

  # --- Tricky garbage: also defines a defmethod for send-notification ---
  src/myapp/notify_push.clj: |
    (ns myapp.notify-push
      (:require [myapp.notification :refer [send-notification]]))

    (def GARBAGE_CLJ_003_PUSH_NOTIFY_A "push")
    (def GARBAGE_CLJ_003_DEVICE_TOKEN_B "token-xyz")

    (defmethod send-notification :push
      [channel message]
      (let [token (:device-token channel)
            body (:body message)]
        (println (str "Pushing to device " token ": " body))))

  # --- Tricky garbage: defines another multimethod ---
  src/myapp/formatter.clj: |
    (ns myapp.formatter)

    (def GARBAGE_CLJ_003_FORMATTER_MULTI_C "formatter")
    (def GARBAGE_CLJ_003_FORMAT_DISPATCH_D :type)

    (defmulti format-output
      (fn [data fmt] fmt))

    (defmethod format-output :json
      [data fmt]
      (str "{\"data\": " (pr-str data) "}"))

    (defmethod format-output :csv
      [data fmt]
      (clojure.string/join "," (map str data)))

  # --- Tricky garbage: requires notification namespace ---
  src/myapp/scheduler.clj: |
    (ns myapp.scheduler
      (:require [myapp.notification :as notif]))

    (def GARBAGE_CLJ_003_SCHEDULER_MARKER_E "scheduler")
    (def GARBAGE_CLJ_003_CRON_EXPR_F "0 * * * *")

    (defn schedule-notification [channel message delay-ms]
      (future
        (Thread/sleep delay-ms)
        (notif/send-notification channel message)))

  # --- Plain garbage ---
  src/myapp/logger.clj: |
    (ns myapp.logger)

    (def GARBAGE_CLJ_003_LOGGER_MARKER_G "logger")
    (def GARBAGE_CLJ_003_LOG_LEVEL_H :info)

    (defn log-info [msg]
      (println (str "[INFO] " msg)))

