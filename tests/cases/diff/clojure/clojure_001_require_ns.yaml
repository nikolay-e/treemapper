# === Assertions ===

must_include_files:
- src/myapp/handler.clj

must_include_content_from:
  src/myapp/handler.clj:
    - defn create-user-handler
    - db/insert-user!
  src/myapp/db.clj:
    - defn insert-user! [user-data]

must_not_include:
# Tricky: also requires myapp.db
- GARBAGE_CLJ_001_ADMIN_MARKER_A
- GARBAGE_CLJ_001_ADMIN_ROLE_B
# Tricky: also uses json namespace
- GARBAGE_CLJ_001_SERIAL_MARKER_C
- GARBAGE_CLJ_001_FORMAT_TYPE_D
# Tricky: similar handler structure
- GARBAGE_CLJ_001_HEALTH_MARKER_E
- GARBAGE_CLJ_001_STATUS_CHECK_F
# Plain garbage
- GARBAGE_CLJ_001_CONFIG_MARKER_G
- GARBAGE_CLJ_001_ENV_MARKER_H

must_not_include_files:
- src/myapp/admin.clj
- src/myapp/serializer.clj
- src/myapp/health.clj
- src/myapp/config.clj

max_fragments: 8
max_files: 2
add_garbage_files: false
skip_garbage_check: true
