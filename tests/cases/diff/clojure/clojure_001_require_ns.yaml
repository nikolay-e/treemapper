name: clojure_001_require_ns
repo:
  initial_files:
    src/myapp/db.clj: |
      (ns myapp.db
        (:require [clojure.java.jdbc :as jdbc]))

      (def db-spec
        {:dbtype "postgresql"
         :dbname "myapp"
         :host "localhost"
         :port 5432})

      (defn find-user-by-id [id]
        (first (jdbc/query db-spec
                 ["SELECT * FROM users WHERE id = ?" id])))

      (defn find-all-users []
        (jdbc/query db-spec ["SELECT * FROM users"]))

      (defn insert-user! [user-data]
        (jdbc/insert! db-spec :users user-data))
    src/myapp/handler.clj: |
      (ns myapp.handler
        (:require [myapp.db :as db]
                  [clojure.data.json :as json]))

      (defn get-user-handler [request]
        (let [id (get-in request [:params :id])
              user (db/find-user-by-id id)]
          (if user
            {:status 200 :body (json/write-str user)}
            {:status 404 :body "Not found"})))
    src/myapp/admin.clj: |
      (ns myapp.admin
        (:require [myapp.db :as db]
                  [clojure.data.json :as json]))

      (def GARBAGE_CLJ_001_ADMIN_MARKER_A "admin")
      (def GARBAGE_CLJ_001_ADMIN_ROLE_B "superuser")

      (defn list-all-users-handler [request]
        (let [users (db/find-all-users)]
          {:status 200 :body (json/write-str users)}))
    src/myapp/serializer.clj: |
      (ns myapp.serializer
        (:require [clojure.data.json :as json]))

      (def GARBAGE_CLJ_001_SERIAL_MARKER_C "serializer")
      (def GARBAGE_CLJ_001_FORMAT_TYPE_D "json")

      (defn serialize [data]
        (json/write-str data))

      (defn deserialize [s]
        (json/read-str s :key-fn keyword))
    src/myapp/health.clj: |
      (ns myapp.health)

      (def GARBAGE_CLJ_001_HEALTH_MARKER_E "health")
      (def GARBAGE_CLJ_001_STATUS_CHECK_F "ok")

      (defn health-check-handler [request]
        {:status 200 :body "OK"})
    src/myapp/config.clj: |
      (ns myapp.config)

      (def GARBAGE_CLJ_001_CONFIG_MARKER_G "config")
      (def GARBAGE_CLJ_001_ENV_MARKER_H "production")

      (def app-config
        {:port 8080
         :host "0.0.0.0"})
  changed_files:
    src/myapp/db.clj: |
      (ns myapp.db
        (:require [clojure.java.jdbc :as jdbc]))

      (def db-spec
        {:dbtype "postgresql"
         :dbname "myapp"
         :host "localhost"
         :port 5432})

      (defn find-user-by-id [id]
        (first (jdbc/query db-spec
                 ["SELECT * FROM users WHERE id = ?" id])))

      (defn find-all-users []
        (jdbc/query db-spec ["SELECT * FROM users"]))

      (defn insert-user! [user-data]
        (jdbc/insert! db-spec :users user-data))
    src/myapp/handler.clj: |
      (ns myapp.handler
        (:require [myapp.db :as db]
                  [clojure.data.json :as json]))

      (defn get-user-handler [request]
        (let [id (get-in request [:params :id])
              user (db/find-user-by-id id)]
          (if user
            {:status 200 :body (json/write-str user)}
            {:status 404 :body "Not found"})))

      (defn create-user-handler [request]
        (let [body (json/read-str (slurp (:body request)) :key-fn keyword)
              result (db/insert-user! body)]
          {:status 201 :body (json/write-str result)}))
    src/myapp/admin.clj: |
      (ns myapp.admin
        (:require [myapp.db :as db]
