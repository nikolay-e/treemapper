  changed_files:
    src/main/java/com/notify/email/EmailService.java: |
      package com.notify.email;

      import java.util.List;
      import java.util.ArrayList;

      public class EmailService {
          private final List<String> sent = new ArrayList<>();

          public void send(String to, String subject, String body) {
              sent.add(to + "|" + subject);
          }

          public void sendFromTemplate(String to, EmailTemplate template) {
              String body = template.render(to);
              send(to, template.getName(), body);
          }

          public int sentCount() {
              return sent.size();
          }

          public List<String> getSentLog() {
              return sent;
          }
      }
    src/main/java/com/notify/email/EmailTemplate.java: |
      package com.notify.email;

      public class EmailTemplate {
          private final String name;
          private final String bodyPattern;

          public EmailTemplate(String name, String bodyPattern) {
              this.name = name;
              this.bodyPattern = bodyPattern;
          }

          public String render(String recipient) {
              return bodyPattern.replace("{{recipient}}", recipient);
          }

          public String getName() { return name; }
      }
    src/test/java/com/notify/email/EmailServiceTest.java: |
      package com.notify.email;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      public class EmailServiceTest {
          @Test
          void sendRecordsLog() {
              EmailService svc = new EmailService();
              svc.send("a@example.com", "Hello", "body");
              assertEquals(1, svc.getSentLog().size());
          }

          @Test
          void sendFromTemplateUsesRenderedBody() {
              EmailService svc = new EmailService();
              EmailTemplate tpl = new EmailTemplate("Welcome", "Hi {{recipient}}!");
              svc.sendFromTemplate("user@example.com", tpl);
              assertEquals(1, svc.sentCount());
              assertTrue(svc.getSentLog().get(0).contains("Welcome"));
          }

          @Test
          void sentCountMatchesSentLog() {
              EmailService svc = new EmailService();
              svc.send("x@x.com", "A", "body");
              svc.send("y@y.com", "B", "body");
              assertEquals(svc.getSentLog().size(), svc.sentCount());
          }
      }
