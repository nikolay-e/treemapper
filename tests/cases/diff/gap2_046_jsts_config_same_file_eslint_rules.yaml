      package com.notify.email;

      public class EmailTemplate {
          private final String name;
          private final String bodyPattern;

          public EmailTemplate(String name, String bodyPattern) {
              this.name = name;
              this.bodyPattern = bodyPattern;
          }

          public String render(String recipient) {
              return bodyPattern.replace("{{recipient}}", recipient);
          }

          public String getName() { return name; }
