# Scenario: validator.ts is created with a StrictOptions type alias using
#   Required<Options> and a validate function that accesses all fields as
#   non-optional. The options.ts interface is unchanged.
#
# Reviewer questions:
#   Q1: "Which fields does Options have, and are they all optional?"
#       -> src/options.ts: Options has name?: string, value?: number,
#          enabled?: boolean. All three are optional (?:). Required<Options>
#          makes them all mandatory.
#
#   Q2: "Does validate() correctly assume all fields are present?"
#       -> src/options.ts: Options fields are optional. Required<Options>
#          guarantees they're all present, so accessing .length, >= 0,
#          and typeof is safe.
#
# Not needed:
#   - src/defaults.ts: Provides DEFAULT_OPTIONS with fallback values.
#     Same Options type reference. But how defaults work doesn't help
#     review whether Required<Options> is correct.
#
#   - src/parser.ts: Parses CLI arguments into Options. Same type,
#     different concern (parsing vs validation).
#
#   - src/merger.ts: Merges multiple Options objects. Same type,
#     but merge logic doesn't help review the Required usage.
#
#   - src/formatter.ts: Formats Options for display. Same type,
#     but formatting doesn't help review validation correctness.

max_enrichment: 4.2
initial:
  src/options.ts: |
    export interface Options {
        name?: string;
        value?: number;
        enabled?: boolean;
    }

    export function createOptions(overrides?: Partial<Options>): Options {
        return {
            name: overrides?.name,
            value: overrides?.value,
            enabled: overrides?.enabled,
        };
    }

  src/validator.ts: |
    console.log('placeholder');

  src/defaults.ts: |
    import { Options } from './options';

    export const DEFAULT_OPTIONS: Required<Options> = {
        name: 'default',
        value: 0,
        enabled: true,
    };

    export function applyDefaults(partial: Options): Required<Options> {
        return {
            name: partial.name ?? DEFAULT_OPTIONS.name,
            value: partial.value ?? DEFAULT_OPTIONS.value,
            enabled: partial.enabled ?? DEFAULT_OPTIONS.enabled,
        };
    }

    export function isDefault(options: Required<Options>): boolean {
        return (
            options.name === DEFAULT_OPTIONS.name &&
            options.value === DEFAULT_OPTIONS.value &&
            options.enabled === DEFAULT_OPTIONS.enabled
        );
    }

  src/parser.ts: |
    import { Options } from './options';

    export function parseCliArgs(args: string[]): Options {
        const options: Options = {};
        for (let i = 0; i < args.length; i++) {
            switch (args[i]) {
                case '--name':
                    options.name = args[++i];
                    break;
                case '--value':
                    options.value = parseInt(args[++i], 10);
                    break;
                case '--enabled':
                    options.enabled = args[++i] === 'true';
                    break;
            }
        }
        return options;
    }

    export function parseEnvOptions(): Options {
        return {
            name: process.env.OPT_NAME,
            value: process.env.OPT_VALUE ? parseInt(process.env.OPT_VALUE, 10) : undefined,
            enabled: process.env.OPT_ENABLED ? process.env.OPT_ENABLED === 'true' : undefined,
        };
    }

  src/merger.ts: |
    import { Options } from './options';

    export function mergeOptions(...optionsList: Options[]): Options {
        const merged: Options = {};
        for (const opts of optionsList) {
            if (opts.name !== undefined) merged.name = opts.name;
            if (opts.value !== undefined) merged.value = opts.value;
            if (opts.enabled !== undefined) merged.enabled = opts.enabled;
        }
        return merged;
    }

    export function overrideOptions(base: Options, override: Options): Options {
        return {
            name: override.name ?? base.name,
            value: override.value ?? base.value,
            enabled: override.enabled ?? base.enabled,
        };
    }

  src/formatter.ts: |
    import { Options } from './options';

    export function formatOptions(options: Options): string {
        const parts: string[] = [];
        if (options.name !== undefined) parts.push(`name=${options.name}`);
        if (options.value !== undefined) parts.push(`value=${options.value}`);
        if (options.enabled !== undefined) parts.push(`enabled=${options.enabled}`);
        return parts.join(', ');
    }

    export function toJson(options: Options): string {
        return JSON.stringify(options, null, 2);
    }

    export function toQueryString(options: Options): string {
        const params = new URLSearchParams();
        if (options.name) params.set('name', options.name);
        if (options.value !== undefined) params.set('value', String(options.value));
        if (options.enabled !== undefined) params.set('enabled', String(options.enabled));
        return params.toString();
    }

changed:
  src/validator.ts: |
    import { Options } from './options';

    type StrictOptions = Required<Options>;

    export function validate(options: StrictOptions): boolean {
        return options.name.length > 0 && options.value >= 0 && typeof options.enabled === 'boolean';
    }

    export function validateWithErrors(options: StrictOptions): string[] {
        const errors: string[] = [];
        if (options.name.length === 0) errors.push('Name must not be empty');
        if (options.value < 0) errors.push('Value must be non-negative');
        if (typeof options.enabled !== 'boolean') errors.push('Enabled must be a boolean');
        return errors;
    }

must_include_files:
  - src/options.ts

must_include_content_from:
  src/options.ts:
    - "Options"
    - "name?: string"
    - "value?: number"
    - "enabled?: boolean"

must_not_include:
  # --- src/defaults.ts: default values, different concern ---
  - DEFAULT_OPTIONS
  - applyDefaults
  - isDefault
  # --- src/parser.ts: CLI parsing, different concern ---
  - parseCliArgs
  - parseEnvOptions
  - "OPT_NAME"
  # --- src/merger.ts: merging logic, different concern ---
  - mergeOptions
  - overrideOptions
  # --- src/formatter.ts: display formatting, different concern ---
  - formatOptions
  - toQueryString
  - toJson

must_not_include_files:
  - src/defaults.ts
  - src/parser.ts
  - src/merger.ts
  - src/formatter.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
