name: javascript_extended_011_react_props_change
repo:
  initial_files:
    types.ts: |
      export interface ButtonProps {
          label: string;
          onClick: () => void;
      }
    Button.tsx: |
      import { ButtonProps } from './types';

      export function Button({ label, onClick }: ButtonProps) {
          return <button onClick={onClick}>{label}</button>;
      }
    src/components/IconButton.tsx: |
      interface IconButtonProps {
          icon: string;
          onClick: () => void;
          size?: number;
          ariaLabel: string;
      }

      export function IconButton({ icon, onClick, size = 24, ariaLabel }: IconButtonProps) {
          return (
              <button onClick={onClick} aria-label={ariaLabel}>
                  <span style={{ fontSize: size }}>{icon}</span>
              </button>
          );
      }
    src/stories/Button.stories.tsx: |
      import type { Meta, StoryObj } from '@storybook/react';
      import { Button } from '../Button';
      import { ButtonProps } from '../types';

      const meta: Meta<typeof Button> = {
          title: 'Components/Button',
          component: Button,
      };

      export default meta;
      type Story = StoryObj<typeof Button>;

      export const Default: Story = {
          args: { label: 'Click me', onClick: () => console.log('clicked') },
      };

      export const LongLabel: Story = {
          args: { label: 'This is a button with a very long label', onClick: () => {} },
      };
    src/theme/variants.ts: |
      export const VARIANT_STYLES = {
          primary: { background: '#3b82f6', color: '#fff' },
          secondary: { background: '#64748b', color: '#fff' },
          danger: { background: '#ef4444', color: '#fff' },
      } as const;

      export type Variant = keyof typeof VARIANT_STYLES;

      export function getVariantStyle(variant: Variant) {
          return VARIANT_STYLES[variant];
      }
  changed_files:
