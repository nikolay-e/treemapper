must_include_files:
  - types.ts

must_include_content_from:
  types.ts:
    - "interface ButtonProps {"
    - "disabled?: boolean"
    - "variant?: 'primary' | 'secondary'"

must_not_include:
  # --- IconButton.tsx: sibling component, own props, no ButtonProps import ---
  - IconButtonProps
  - IconButton
  - ariaLabel
  # --- Button.stories.tsx: imports ButtonProps, usage examples ---
  # HARDEST TRAP: imports the exact same ButtonProps from the diff.
  # Stories show how Button is rendered. But Storybook args don't
  # help review whether the type change is correct.
  - "Meta<typeof Button>"
  - "StoryObj"
  - LongLabel
  # --- variants.ts: lexical overlap with 'primary', 'secondary' ---
  - VARIANT_STYLES
  - getVariantStyle

must_not_include_files:
  - src/components/IconButton.tsx
  - src/stories/Button.stories.tsx
  - src/theme/variants.ts

max_fragments: 6
max_files: 2
add_garbage_files: false
skip_garbage_check: true
