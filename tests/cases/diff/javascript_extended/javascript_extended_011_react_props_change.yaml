# Scenario: types.ts ButtonProps gains disabled? and variant? fields.
#   Only types.ts is changed. Button.tsx imports ButtonProps but is unchanged.
#
# Diff shows:
#   + disabled?: boolean
#   + variant?: 'primary' | 'secondary'
#
# Reviewer questions:
#   Q1: "Does Button use the new props — will they actually render differently?"
#       -> Button.tsx: destructures { label, onClick } from ButtonProps but does
#          NOT destructure disabled or variant. The new props exist on the type
#          but aren't consumed. Reviewer should flag this as potentially dead code
#          or a phased change.
#
#   Q2: "Are there other components using ButtonProps that might benefit from
#        the new fields?"
#       -> No other consumers in this test scenario. But the reviewer needs to
#          see Button.tsx to verify it doesn't use the new props yet.
#
# Not needed for comprehension:
#   - src/components/IconButton.tsx: Renders a button with an icon. Also accepts
#     onClick handler. Sibling component in same directory, similar structure.
#     But uses its own IconButtonProps, not ButtonProps.
#
#   - src/stories/Button.stories.tsx: Storybook stories for Button. Imports
#     ButtonProps and renders Button with various prop combinations. Direct
#     structural edge: same import. But stories show usage examples, not
#     type definition. Tempting because stories often mirror prop shapes.
#
#   - src/theme/variants.ts: Defines variant styling constants ('primary',
#     'secondary', 'danger'). Lexical overlap with the new variant prop's
#     union values. But theme constants are a separate layer.

initial:
  types.ts: |
    export interface ButtonProps {
        label: string;
        onClick: () => void;
    }
  Button.tsx: |
    import { ButtonProps } from './types';

    export function Button({ label, onClick }: ButtonProps) {
        return <button onClick={onClick}>{label}</button>;
    }
  # --- Not needed: sibling component, own props interface ---
  src/components/IconButton.tsx: |
    interface IconButtonProps {
        icon: string;
        onClick: () => void;
        size?: number;
        ariaLabel: string;
    }

    export function IconButton({ icon, onClick, size = 24, ariaLabel }: IconButtonProps) {
        return (
            <button onClick={onClick} aria-label={ariaLabel}>
                <span style={{ fontSize: size }}>{icon}</span>
            </button>
        );
    }
  # --- Not needed: Storybook stories, same import but usage examples ---
  src/stories/Button.stories.tsx: |
    import type { Meta, StoryObj } from '@storybook/react';
    import { Button } from '../Button';
    import { ButtonProps } from '../types';

    const meta: Meta<typeof Button> = {
        title: 'Components/Button',
        component: Button,
    };

    export default meta;
    type Story = StoryObj<typeof Button>;

    export const Default: Story = {
        args: { label: 'Click me', onClick: () => console.log('clicked') },
    };

    export const LongLabel: Story = {
        args: { label: 'This is a button with a very long label', onClick: () => {} },
    };
  # --- Not needed: theme variant constants, lexical overlap ---
  src/theme/variants.ts: |
    export const VARIANT_STYLES = {
        primary: { background: '#3b82f6', color: '#fff' },
        secondary: { background: '#64748b', color: '#fff' },
        danger: { background: '#ef4444', color: '#fff' },
    } as const;

    export type Variant = keyof typeof VARIANT_STYLES;

    export function getVariantStyle(variant: Variant) {
        return VARIANT_STYLES[variant];
    }

changed:
