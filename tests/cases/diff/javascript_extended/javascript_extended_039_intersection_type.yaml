# Scenario: person.ts goes from stub to a module that imports Named, Aged,
#   Contactable, and formatName from ./types, then builds Person as an
#   intersection type Named & Aged & Contactable.
#
# Diff shows:
#   - console.log('initial')
#   + import { Named, Aged, Contactable, formatName } from './types';
#   + type Person = Named & Aged & Contactable;
#   + createPerson(), describePerson() functions
#
# Reviewer questions:
#   Q1: "What fields does Person have — are name, age, email all present?"
#       -> src/types.ts: Named = { name: string }, Aged = { age: number },
#          Contactable = { email: string; phone?: string }. Intersection
#          yields { name, age, email, phone? }. createPerson({ name, age, email })
#          satisfies Named & Aged & Contactable because phone is optional.
#
#   Q2: "What does formatName do — is the call in describePerson correct?"
#       -> src/types.ts: formatName(entity: Named) returns entity.name.trim().
#          Person extends Named (via intersection), so passing a Person is valid.
#
# Not needed for comprehension:
#   - src/services/personService.ts: CRUD operations for Person. Imports Named
#     and Contactable from the same types module. Direct structural edge: same
#     import source. But service operations don't help review whether the
#     intersection type correctly merges the constituent types.
#
#   - src/services/contactValidator.ts: Validates Contactable fields (email
#     format, phone format). Imports Contactable from types.ts. Same import
#     source, same Contactable type. But validation logic is irrelevant to
#     understanding the intersection type definition.
#
#   - src/formatters/nameFormatter.ts: Formats names for display. Imports
#     Named from types.ts. Same Named type used in the diff. But additional
#     formatting functions don't help review createPerson or describePerson.

max_enrichment: 8.9
initial:
  src/types.ts: |
    export type Named = { name: string };

    export type Aged = { age: number };

    export type Contactable = { email: string; phone?: string };

    export function formatName(entity: Named): string {
        return entity.name.trim();
    }
  src/person.ts: |
    console.log('initial');
  # --- Not needed: CRUD using Named + Contactable, same import source ---
  src/services/personService.ts: |
    import { Named, Contactable } from '../types';

    type PersonRecord = Named & Contactable & { id: string };

    const store: PersonRecord[] = [];

    export function savePerson(name: string, email: string): PersonRecord {
        const record: PersonRecord = { id: Date.now().toString(), name, email };
        store.push(record);
        return record;
    }

    export function findByEmail(email: string): PersonRecord | undefined {
        return store.find(p => p.email === email);
    }

    export function listPersons(): PersonRecord[] {
        return [...store];
    }
  # --- Not needed: validates Contactable, same import but validation concern ---
  src/services/contactValidator.ts: |
    import { Contactable } from '../types';

    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const PHONE_RE = /^\+?[\d\s-]{7,15}$/;

    export function validateContact(contact: Contactable): string[] {
        const errors: string[] = [];
        if (!EMAIL_RE.test(contact.email)) {
            errors.push('Invalid email format');
        }
        if (contact.phone && !PHONE_RE.test(contact.phone)) {
            errors.push('Invalid phone format');
        }
        return errors;
    }

    export function isValidEmail(email: string): boolean {
        return EMAIL_RE.test(email);
    }
  # --- Not needed: formats Named, same type but display concern ---
  src/formatters/nameFormatter.ts: |
    import { Named } from '../types';

    export function formatDisplayName(entity: Named): string {
        return entity.name.charAt(0).toUpperCase() + entity.name.slice(1);
    }

    export function formatInitials(entity: Named): string {
        return entity.name.split(' ').map(w => w[0]).join('').toUpperCase();
    }

    export function truncateName(entity: Named, maxLen: number): string {
        return entity.name.length > maxLen ? entity.name.slice(0, maxLen) + '...' : entity.name;
    }

changed:
  src/types.ts: |
    export type Named = { name: string };

    export type Aged = { age: number };

    export type Contactable = { email: string; phone?: string };

    export function formatName(entity: Named): string {
        return entity.name.trim();
    }
  src/person.ts: |
    import { Named, Aged, Contactable, formatName } from './types';

    type Person = Named & Aged & Contactable;

    function createPerson(name: string, age: number, email: string): Person {
        return { name, age, email };
    }

    function describePerson(person: Person): string {
        return `${formatName(person)}, age ${person.age}, email: ${person.email}`;
    }

    export { Person, createPerson, describePerson };
