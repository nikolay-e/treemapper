# Test: Custom hook gains step, reset, and useCallback — reviewer needs consumer
#
# Scenario: useCounter.ts adds a step parameter, reset() function,
# and wraps callbacks with useCallback for memoization. Counter.tsx
# is the consumer component that imports and uses useCounter.
#
# Reviewer questions:
#   Q1: "Who uses this hook and will the new API break anything?"
#       → Counter.tsx: destructures { count, increment, decrement }
#         from useCounter(0). The new step parameter defaults to 1
#         and reset is additive, so existing usage compiles. But
#         Counter.tsx doesn't use reset — is that expected?
#   Q2: "What was the hook's previous API surface?"
#       → useCounter.ts: returned { count, increment, decrement }.
#         Now returns { count, increment, decrement, reset } with
#         an extra step parameter. The diff shows the expansion.
#
# Not needed:
#   - hooks/useLocalStorage.ts: localStorage persistence hook. Different
#     hook with different purpose (persistence vs counter state).
#   - components/CounterDisplay.tsx: presentational component. Only
#     renders a number, doesn't call useCounter or know about step/reset.

initial:
  hooks/useCounter.ts: |
    import { useState } from 'react';

    export function useCounter(initial = 0) {
        const [count, setCount] = useState(initial);
        const increment = () => setCount(c => c + 1);
        const decrement = () => setCount(c => c - 1);
        return { count, increment, decrement };
    }
  components/Counter.tsx: |
    import { useCounter } from '../hooks/useCounter';

    export function Counter() {
        const { count, increment, decrement } = useCounter(0);
        return (
            <div>
                <span>{count}</span>
                <button onClick={increment}>+</button>
                <button onClick={decrement}>-</button>
            </div>
        );
    }
  # --- Not needed: localStorage hook, different purpose ---
  hooks/useLocalStorage.ts: |
    import { useState, useEffect } from 'react';

    export function useLocalStorage<T>(key: string, initialValue: T) {
        const [value, setValue] = useState<T>(() => {
            const stored = localStorage.getItem(key);
            return stored ? JSON.parse(stored) : initialValue;
        });

        useEffect(() => {
            localStorage.setItem(key, JSON.stringify(value));
        }, [key, value]);

        return [value, setValue] as const;
    }
  # --- Not needed: presentational component, doesn't use the hook ---
  components/CounterDisplay.tsx: |
    interface CounterDisplayProps {
        value: number;
        label?: string;
    }

    export function CounterDisplay({ value, label = 'Count' }: CounterDisplayProps) {
        return (
            <div className="counter-display">
                <span className="label">{label}:</span>
                <span className="value">{value}</span>
            </div>
        );
    }
changed:
  hooks/useCounter.ts: |
    import { useState, useCallback } from 'react';

    export function useCounter(initial = 0, step = 1) {
        const [count, setCount] = useState(initial);
        const increment = useCallback(() => setCount(c => c + step), [step]);
        const decrement = useCallback(() => setCount(c => c - step), [step]);
        const reset = useCallback(() => setCount(initial), [initial]);
        return { count, increment, decrement, reset };
    }
  components/Counter.tsx: |
    import { useCounter } from '../hooks/useCounter';

    export function Counter() {
        const { count, increment, decrement } = useCounter(0);
        return (
            <div>
                <span>{count}</span>
                <button onClick={increment}>+</button>
                <button onClick={decrement}>-</button>
            </div>
        );
    }
  hooks/useLocalStorage.ts: |
    import { useState, useEffect } from 'react';

    export function useLocalStorage<T>(key: string, initialValue: T) {
        const [value, setValue] = useState<T>(() => {
            const stored = localStorage.getItem(key);
            return stored ? JSON.parse(stored) : initialValue;
        });

        useEffect(() => {
            localStorage.setItem(key, JSON.stringify(value));
        }, [key, value]);

        return [value, setValue] as const;
    }
  components/CounterDisplay.tsx: |
    interface CounterDisplayProps {
        value: number;
        label?: string;
    }

    export function CounterDisplay({ value, label = 'Count' }: CounterDisplayProps) {
        return (
            <div className="counter-display">
                <span className="label">{label}:</span>
                <span className="value">{value}</span>
            </div>
        );
    }
