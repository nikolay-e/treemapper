# Reviewer sees: src/routes/users.ts changes from an inline stub to a Router
# that imports getUserHandler and listUsersHandler from the handler module.
#
# Reviewer questions:
#   Q1: "What do these handlers do — what responses will these routes produce?"
#       -> src/handlers/user-handler.ts: defines getUserHandler and
#          listUsersHandler. The reviewer needs handler signatures to verify
#          routes map to correct handlers.
#
# Not needed:
#   - src/middleware/cors-handler.ts: CORS configuration middleware. Not
#     referenced in this diff. Different middleware layer.
#   - src/handlers/product-handler.ts: another resource's handlers. Same
#     directory sibling, similar structure, but different domain.

max_enrichment: 9.1
initial:
  src/routes/users.ts: |
    import { Router } from 'express';

    export const userRouter = Router();

    userRouter.get('/users', (req, res) => {
        res.json({ users: [] });
    });
  src/handlers/user-handler.ts: |
    import { Request, Response } from 'express';

    export interface UserDTO {
        id: string;
        name: string;
        email: string;
    }

    export async function getUserHandler(req: Request, res: Response): Promise<void> {
        const { id } = req.params;
        const user: UserDTO = { id, name: 'John Doe', email: 'john@example.com' };
        res.json(user);
    }

    export async function listUsersHandler(req: Request, res: Response): Promise<void> {
        const page = parseInt(req.query.page as string) || 1;
        const limit = parseInt(req.query.limit as string) || 10;
        res.json({ page, limit, users: [] });
    }
  # --- Not needed: CORS middleware, not referenced in diff ---
  src/middleware/cors-handler.ts: |
    import { Request, Response, NextFunction } from 'express';

    const ALLOWED_ORIGINS = ['http://localhost:3000', 'https://app.example.com'];

    export function corsMiddleware(req: Request, res: Response, next: NextFunction): void {
        const origin = req.headers.origin;
        if (origin && ALLOWED_ORIGINS.includes(origin)) {
            res.setHeader('Access-Control-Allow-Origin', origin);
            res.setHeader('Access-Control-Allow-Methods', 'GET, POST, PUT, DELETE');
            res.setHeader('Access-Control-Allow-Headers', 'Content-Type, Authorization');
        }
        next();
    }

    export function preflight(req: Request, res: Response): void {
        res.status(204).end();
    }
  # --- Not needed: different resource handlers, same directory sibling ---
  src/handlers/product-handler.ts: |
    import { Request, Response } from 'express';

    export interface ProductDTO {
        id: string;
        name: string;
        price: number;
        category: string;
    }

    export async function getProductHandler(req: Request, res: Response): Promise<void> {
        const { id } = req.params;
        const product: ProductDTO = { id, name: 'Widget', price: 9.99, category: 'gadgets' };
        res.json(product);
    }

    export async function listProductsHandler(req: Request, res: Response): Promise<void> {
        const page = parseInt(req.query.page as string) || 1;
        res.json({ page, products: [] });
    }

