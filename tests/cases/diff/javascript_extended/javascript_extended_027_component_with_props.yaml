  # that <Card title="Welcome"><p>...</p></Card> matches CardProps
  # and understand what DOM structure Card produces.
  - src/components/Card.tsx
must_include_content_from:
  src/components/Card.tsx:
    - "CardProps"
    - "title: string"
    - "children: React.ReactNode"
    - "Card({ title, children }"
