# Reviewer sees: src/App.tsx changes from stub to a component that imports
# Card and renders it with title="Welcome" and a child paragraph.
#
# Reviewer questions:
#   Q1: "What props does Card accept — does the usage match the interface?"
#       -> src/components/Card.tsx: defines CardProps { title: string; children: ReactNode }
#          and renders them in a .card div. The reviewer needs the props interface
#          to verify <Card title="Welcome"><p>...</p></Card> is a valid usage.
#   Q2: "What does Card render — is the visual structure appropriate for the App layout?"
#       -> src/components/Card.tsx renders <div className="card"><h2>{title}</h2>{children}</div>.
#          Reviewer confirms the heading level (h2) and wrapper class.
#
# Not needed:
#   - src/components/Button.tsx: another UI component, same directory sibling.
#     Similar structure (props interface + functional component) but not used by App.
#   - src/components/Modal.tsx: overlay component. Different UI concern,
#     not referenced in the diff.
#   - src/styles/theme.ts: CSS theme tokens. Visual concern but no import
#     relationship with Card or App.

initial:
  src/App.tsx: |
    export function App() {
        return (
            <div className="app">
                <h1>My Application</h1>
            </div>
        );
    }
  src/components/Card.tsx: |
    import React from 'react';

    interface CardProps {
        title: string;
        children: React.ReactNode;
    }

    export function Card({ title, children }: CardProps) {
        return (
            <div className="card">
                <h2>{title}</h2>
                {children}
            </div>
        );
    }
  # --- Not needed: different component, same directory sibling ---
  src/components/Button.tsx: |
    import React from 'react';

    interface ButtonProps {
        label: string;
        onClick: () => void;
        variant?: 'primary' | 'secondary' | 'danger';
        disabled?: boolean;
    }

    export function Button({ label, onClick, variant = 'primary', disabled = false }: ButtonProps) {
        return (
            <button
                className={`btn btn-${variant}`}
                onClick={onClick}
                disabled={disabled}
            >
                {label}
            </button>
        );
    }
  # --- Not needed: overlay component, not referenced ---
  src/components/Modal.tsx: |
    import React from 'react';

    interface ModalProps {
        isOpen: boolean;
        onClose: () => void;
        title: string;
        children: React.ReactNode;
    }

    export function Modal({ isOpen, onClose, title, children }: ModalProps) {
        if (!isOpen) return null;
        return (
            <div className="modal-overlay" onClick={onClose}>
                <div className="modal-content" onClick={e => e.stopPropagation()}>
                    <h2>{title}</h2>
                    {children}
                    <button onClick={onClose}>Close</button>
                </div>
            </div>
        );
    }
  # --- Not needed: theme tokens, no import relationship ---
  src/styles/theme.ts: |
    export const colors = {
        primary: '#3b82f6',
        secondary: '#64748b',
        danger: '#ef4444',
        background: '#ffffff',
        text: '#1e293b',
    };

    export const spacing = {
        xs: '4px',
        sm: '8px',
        md: '16px',
        lg: '24px',
        xl: '32px',
    };

    export const breakpoints = {
        mobile: '640px',
        tablet: '768px',
        desktop: '1024px',
    };

