# Scenario: resolvers.ts gains a users query and a createUser mutation.
#   schema.ts imports resolvers and re-exports it alongside typeDefs.
#
# Diff shows:
#   + users: () => [{ id: '1', name: 'User 1' }, ...]  (new Query resolver)
#   + Mutation: { createUser: (_: any, { name }) => ... }  (new Mutation block)
#
# Reviewer questions:
#   Q1: "Does the typeDefs schema define a 'users' query and 'createUser' mutation
#        to match these resolvers?"
#       -> schema.ts: typeDefs has `type Query { user(id: ID!): User }` but does
#          NOT define `users: [User]` or `type Mutation`. The resolvers define
#          handlers that have no matching schema entries — this is a bug the
#          reviewer should catch.
#
#   Q2: "What fields does the User type have in the schema — do the resolver
#        return objects match?"
#       -> schema.ts: User { id: ID!, name: String! }. The resolvers return
#          { id, name } which matches. Reviewer confirms field alignment.
#
# Not needed for comprehension:
#   - src/resolvers/productResolvers.ts: Resolvers for product queries.
#     Same directory pattern with Query/Mutation structure. Structurally
#     identical sibling. But product resolvers don't help review user
#     resolver correctness or schema alignment.
#
#   - src/middleware/authResolver.ts: Authentication middleware for resolvers.
#     Wraps resolvers with auth checks. Same resolver pattern. But auth
#     logic doesn't help verify the resolver-to-schema mapping.
#
#   - src/dataSources/userDataSource.ts: Data source that fetches users from
#     a database. The resolver currently uses inline data, not this source.
#     Eventually should use it, but no import exists yet.

max_enrichment: 5.9
initial:
  resolvers.ts: |
    export const resolvers = {
        Query: {
            user: (_: any, { id }: { id: string }) => ({ id, name: 'Test' }),
        },
    };
  schema.ts: |
    import { resolvers } from './resolvers';

    export const typeDefs = `
        type User {
            id: ID!
            name: String!
        }

        type Query {
            user(id: ID!): User
        }
    `;

    export { resolvers };
  # --- Not needed: product resolvers, same pattern but different domain ---
  src/resolvers/productResolvers.ts: |
    export const productResolvers = {
        Query: {
            product: (_: any, { id }: { id: string }) => ({ id, name: 'Widget', price: 9.99 }),
            products: () => [
                { id: '1', name: 'Widget', price: 9.99 },
                { id: '2', name: 'Gadget', price: 19.99 },
            ],
        },
        Mutation: {
            createProduct: (_: any, { name, price }: { name: string; price: number }) =>
                ({ id: Date.now().toString(), name, price }),
        },
    };
  # --- Not needed: auth middleware, wraps resolvers but different concern ---
  src/middleware/authResolver.ts: |
    type ResolverFn = (parent: any, args: any, context: any) => any;

    export function requireAuth(resolver: ResolverFn): ResolverFn {
        return (parent, args, context) => {
            if (!context.user) {
                throw new Error('Not authenticated');
            }
            return resolver(parent, args, context);
        };
    }

    export function requireRole(role: string, resolver: ResolverFn): ResolverFn {
        return (parent, args, context) => {
            if (context.user?.role !== role) {
                throw new Error(`Requires role: ${role}`);
            }
            return resolver(parent, args, context);
        };
    }
  # --- Not needed: data source, no import from resolvers ---
  src/dataSources/userDataSource.ts: |
    interface UserRecord {
        id: string;
        name: string;
        email: string;
    }

    const users: UserRecord[] = [
        { id: '1', name: 'User 1', email: 'user1@example.com' },
        { id: '2', name: 'User 2', email: 'user2@example.com' },
    ];

    export function getUserById(id: string): UserRecord | undefined {
        return users.find(u => u.id === id);
    }

    export function getAllUsers(): UserRecord[] {
        return [...users];
    }

    export function createUser(name: string, email: string): UserRecord {
        const user = { id: Date.now().toString(), name, email };
        users.push(user);
        return user;
    }

