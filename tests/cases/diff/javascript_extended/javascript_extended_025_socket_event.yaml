must_include_files:
  # Q1+Q2: Event constant value and message type definition.
  # Reviewer must verify CHAT_EVENT matches client expectations.
  - src/socket/events.ts
must_include_content_from:
  src/socket/events.ts:
    - "CHAT_EVENT"
    - "chat:message"
    - "ChatMessage"
must_not_include:
  # message-store.ts: persistence layer, no socket.io import
  - StoredMessage
  - saveMessage
  - getMessages
  # admin-handler.ts: different socket event namespace
  - setupAdminHandler
  - "admin:kick"
  - "admin:ban"
must_not_include_files:
  - src/services/message-store.ts
  - src/socket/admin-handler.ts
max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
