must_include_files:
  # Unchanged — the component the story documents. Reviewer needs to
  # verify story args match ButtonProps interface.
  - src/components/Button.tsx
must_include_content_from:
  src/components/Button.tsx:
    - "ButtonProps"
must_not_include:
  # endpoints.ts: backend API routes, different domain
  - getUsersEndpoint
  - getPostsEndpoint
  # env.ts: environment config, no Storybook relationship
  - isProduction
  - apiUrl
must_not_include_files:
