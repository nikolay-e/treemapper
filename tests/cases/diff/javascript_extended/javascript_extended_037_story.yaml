# Reviewer sees: Button.stories.tsx is rewritten with Storybook Meta/StoryObj
# configuration, importing Button and ButtonProps from ./Button. It defines
# argTypes for variant and size controls, plus Primary and Secondary stories.
#
# Q1: "What props does Button accept — do the story args match?"
#     -> src/components/Button.tsx defines ButtonProps with label (required),
#        variant (optional, defaults to 'primary'), size (optional, defaults
#        to 'medium'), and onClick (optional). The stories pass label and
#        variant — consistent with the interface.
# Q2: "Do the argTypes options match the actual union types?"
#     -> Button.tsx types variant as 'primary' | 'secondary' and size as
#        'small' | 'medium' | 'large'. The story argTypes list exactly
#        these options. Reviewer confirms they're in sync.
#
# Not needed:
#   - src/api/endpoints.ts: REST API endpoint definitions. Backend concern,
#     unrelated to UI component stories.
#   - src/config/env.ts: environment configuration. Infrastructure concern,
#     no connection to Storybook rendering.

max_enrichment: 4.4
initial:
  src/components/Button.tsx: |
    export interface ButtonProps {
        label: string;
        variant?: 'primary' | 'secondary';
        size?: 'small' | 'medium' | 'large';
        onClick?: () => void;
    }

    export function Button({ label, variant = 'primary', size = 'medium', onClick }: ButtonProps) {
        return (
            <button className={`btn btn-${variant} btn-${size}`} onClick={onClick}>
                {label}
            </button>
        );
    }
  src/components/Button.stories.tsx: |
    console.log('initial');
  # --- Not needed: backend API definitions, unrelated domain ---
  src/api/endpoints.ts: |
    const BASE_URL = '/api/v1';

    export function getUsersEndpoint(): string {
        return `${BASE_URL}/users`;
    }

    export function getPostsEndpoint(userId: string): string {
        return `${BASE_URL}/users/${userId}/posts`;
    }

    export function getCommentsEndpoint(postId: string): string {
        return `${BASE_URL}/posts/${postId}/comments`;
    }
  # --- Not needed: env config, no connection to Storybook ---
  src/config/env.ts: |
    export const config = {
        apiUrl: process.env.API_URL || 'http://localhost:3000',
        debug: process.env.NODE_ENV !== 'production',
        version: process.env.APP_VERSION || '0.0.0',
    };

    export function isProduction(): boolean {
        return process.env.NODE_ENV === 'production';
    }

