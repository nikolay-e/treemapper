# Reviewer sees: UserForm.tsx is rewritten to import useDispatch from react-redux
# and addUser from ./store/userSlice, then dispatches addUser on button click.
#
# Q1: "What does addUser expect as payload — does { id, name } match?"
#     -> src/store/userSlice.ts: addUser takes PayloadAction<User> where
#        User = { id: string; name: string }. The component dispatches
#        { id: Date.now().toString(), name: 'New User' }, which matches.
# Q2: "What other actions exist — should removeUser also be handled?"
#     -> userSlice.ts also exports removeUser (PayloadAction<string>).
#        UserForm only adds users, so not using removeUser is consistent
#        with its purpose. Reviewer confirms the scope is intentional.
# Q3: "What does the slice state look like?"
#     -> UserState = { users: User[]; loading: boolean }. The addUser
#        reducer pushes to state.users. Reviewer understands the state shape.
#
# Not needed:
#   - src/store/settingsSlice.ts: application settings state (theme,
#     language). Different slice with no relationship to user management.
#   - src/i18n/translations.ts: internationalization strings. Different
#     domain (localization vs user management), no import relationship.

max_enrichment: 5.9
initial:
  src/store/userSlice.ts: |
    import { createSlice, PayloadAction } from '@reduxjs/toolkit';

    interface User {
        id: string;
        name: string;
    }

    interface UserState {
        users: User[];
        loading: boolean;
    }

    const initialState: UserState = { users: [], loading: false };

    export const userSlice = createSlice({
        name: 'users',
        initialState,
        reducers: {
            addUser: (state, action: PayloadAction<User>) => {
                state.users.push(action.payload);
            },
            removeUser: (state, action: PayloadAction<string>) => {
                state.users = state.users.filter(u => u.id !== action.payload);
            },
        },
    });

    export const { addUser, removeUser } = userSlice.actions;
  src/components/UserForm.tsx: |
    console.log('initial');
  # --- Not needed: separate Redux slice, different domain ---
  src/store/settingsSlice.ts: |
    import { createSlice, PayloadAction } from '@reduxjs/toolkit';

    interface SettingsState {
        theme: 'light' | 'dark';
        language: string;
        notificationsEnabled: boolean;
    }

    const initialState: SettingsState = {
        theme: 'light',
        language: 'en',
        notificationsEnabled: true,
    };

    export const settingsSlice = createSlice({
        name: 'settings',
        initialState,
        reducers: {
            setTheme: (state, action: PayloadAction<'light' | 'dark'>) => {
                state.theme = action.payload;
            },
            setLanguage: (state, action: PayloadAction<string>) => {
                state.language = action.payload;
            },
            toggleNotifications: (state) => {
                state.notificationsEnabled = !state.notificationsEnabled;
            },
        },
    });

    export const { setTheme, setLanguage, toggleNotifications } = settingsSlice.actions;
  # --- Not needed: i18n strings, different domain ---
  src/i18n/translations.ts: |
    interface TranslationMap {
        [key: string]: string;
    }

    const en: TranslationMap = {
        greeting: 'Hello',
        farewell: 'Goodbye',
        submit: 'Submit',
        cancel: 'Cancel',
    };

    const es: TranslationMap = {
        greeting: 'Hola',
        farewell: 'Adiós',
        submit: 'Enviar',
        cancel: 'Cancelar',
    };

    export function translate(key: string, locale = 'en'): string {
        const translations = locale === 'es' ? es : en;
        return translations[key] || key;
    }

