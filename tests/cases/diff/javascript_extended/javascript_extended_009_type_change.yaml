must_include_files:
  - src/types.ts

must_include_content_from:
  src/types.ts:
    - "type Config = {"
    - "retries: number"
    - "debug?: boolean"
    - "type Environment = 'development' | 'staging' | 'production'"

must_not_include:
  # --- configPersistence.ts: imports Config + createDefaultConfig ---
  # Same import source. But localStorage persistence doesn't help
  # review the type change itself.
  - saveConfig
  - loadConfig
  - clearConfig
  - STORAGE_KEY
  # --- requestConfig.ts: imports Config, middleware plumbing ---
  - attachConfig
  - getRequestConfig
  # --- envParser.ts: imports Config + LogLevel, lexical "debug" overlap ---
  # HARDEST TRAP: references the exact new fields (debug, logLevel) that
  # the diff adds to Config. But env parsing is runtime concern, not
  # needed to verify the type shape is correct.
  - parseEnvConfig
  - validateEnvConfig

must_not_include_files:
  - src/services/configPersistence.ts
  - src/middleware/requestConfig.ts
  - src/utils/envParser.ts

max_fragments: 8
max_files: 3
add_garbage_files: false
skip_garbage_check: true
