# Reviewer sees: UserList.tsx is rewritten to import useApi from ./hooks/useApi
# and call useApi<User[]>('/api/users') to fetch data, handling loading/error
# states.
#
# Q1: "What does useApi return — does it provide data, loading, and error?"
#     -> src/hooks/useApi.ts: generic hook returning { data, loading, error }.
#        Uses useState and useEffect internally, fetches the URL on mount
#        and when url changes. Reviewer confirms the destructured properties
#        match the hook's return type.
# Q2: "What happens on fetch failure — does the hook propagate the error?"
#     -> useApi.ts catches with .catch(setError), so error is set to the
#        Error object. The component renders error.message, which is valid
#        because setError receives an Error instance.
#
# Not needed:
#   - src/db/connection.ts: database connection setup. Backend infrastructure,
#     no relationship to frontend data fetching hook.
#   - src/logger/index.ts: application logging. Different cross-cutting
#     concern with no import relationship.

max_enrichment: 3.7
initial:
  src/hooks/useApi.ts: |
    import { useState, useEffect } from 'react';

    export function useApi<T>(url: string) {
        const [data, setData] = useState<T | null>(null);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState<Error | null>(null);

        useEffect(() => {
            fetch(url)
                .then(res => res.json())
                .then(setData)
                .catch(setError)
                .finally(() => setLoading(false));
        }, [url]);

        return { data, loading, error };
    }
  src/components/UserList.tsx: |
    console.log('initial');
  # --- Not needed: database setup, backend concern ---
  src/db/connection.ts: |
    interface ConnectionConfig {
        host: string;
        port: number;
        database: string;
    }

    let pool: ConnectionConfig | null = null;

    export function initConnection(config: ConnectionConfig): void {
        pool = config;
    }

    export function getConnection(): ConnectionConfig {
        if (!pool) throw new Error('Database not initialized');
        return pool;
    }
  # --- Not needed: logging infrastructure, different concern ---
  src/logger/index.ts: |
    type LogLevel = 'debug' | 'info' | 'warn' | 'error';

    export function createLogger(namespace: string) {
        return {
            debug: (msg: string) => log('debug', namespace, msg),
            info: (msg: string) => log('info', namespace, msg),
            warn: (msg: string) => log('warn', namespace, msg),
            error: (msg: string) => log('error', namespace, msg),
        };
    }

    function log(level: LogLevel, namespace: string, msg: string): void {
        console.log(`[${level}] ${namespace}: ${msg}`);
    }

