# Scenario: updater.ts is created with a function that uses Partial<FullConfig>
#   to accept partial updates and merge them into a full config object.
#   The config.ts type definition is unchanged.
#
# Reviewer questions:
#   Q1: "What fields does FullConfig have? Does spread merging preserve all of them?"
#       -> src/config.ts: FullConfig has host (string), port (number),
#          ssl (boolean), timeout (number). Spread { ...current, ...updates }
#          overwrites only provided fields.
#
#   Q2: "Is Partial<FullConfig> the right type for the updates parameter?"
#       -> src/config.ts: All FullConfig fields are required. Partial<FullConfig>
#          makes them all optional, which is correct for a patch/update operation.
#
# Not needed:
#   - src/defaults.ts: Provides DEFAULT_CONFIG constant of type FullConfig. Same
#     type, direct structural edge. But how defaults are defined doesn't help
#     review the Partial update function.
#
#   - src/validator.ts: Validates FullConfig fields (port range, host format).
#     Same type reference. But validation logic is a separate concern from merging.
#
#   - src/loader.ts: Reads config from JSON file and returns FullConfig.
#     Same type, I/O concern. Doesn't help review the spread merge logic.
#
#   - src/envConfig.ts: Reads environment variables into FullConfig.
#     Same type, different source. Doesn't help review the update function.

max_enrichment: 8.3
initial:
  src/config.ts: |
    export interface FullConfig {
        host: string;
        port: number;
        ssl: boolean;
        timeout: number;
    }

    export function createConfig(host: string, port: number, ssl: boolean, timeout: number): FullConfig {
        return { host, port, ssl, timeout };
    }

  src/updater.ts: |
    console.log('placeholder');

  src/defaults.ts: |
    import { FullConfig } from './config';

    export const DEFAULT_CONFIG: FullConfig = {
        host: 'localhost',
        port: 8080,
        ssl: false,
        timeout: 30000,
    };

    export function getDefaultConfig(): FullConfig {
        return { ...DEFAULT_CONFIG };
    }

    export function withDefaults(overrides: Partial<FullConfig>): FullConfig {
        return { ...DEFAULT_CONFIG, ...overrides };
    }

  src/validator.ts: |
    import { FullConfig } from './config';

    export interface ValidationError {
        field: keyof FullConfig;
        message: string;
    }

    export function validateConfig(config: FullConfig): ValidationError[] {
        const errors: ValidationError[] = [];
        if (config.port < 1 || config.port > 65535) {
            errors.push({ field: 'port', message: 'Port must be between 1 and 65535' });
        }
        if (config.timeout < 0) {
            errors.push({ field: 'timeout', message: 'Timeout must be non-negative' });
        }
        if (config.host.trim().length === 0) {
            errors.push({ field: 'host', message: 'Host must not be empty' });
        }
        return errors;
    }

    export function isValidConfig(config: FullConfig): boolean {
        return validateConfig(config).length === 0;
    }

  src/loader.ts: |
    import { readFileSync } from 'fs';
    import { FullConfig } from './config';

    export function loadConfigFromFile(path: string): FullConfig {
        const raw = readFileSync(path, 'utf-8');
        const parsed = JSON.parse(raw);
        return {
            host: parsed.host ?? 'localhost',
            port: parsed.port ?? 8080,
            ssl: parsed.ssl ?? false,
            timeout: parsed.timeout ?? 30000,
        };
    }

    export function loadConfigFromEnv(): Partial<FullConfig> {
        const config: Partial<FullConfig> = {};
        if (process.env.APP_HOST) config.host = process.env.APP_HOST;
        if (process.env.APP_PORT) config.port = parseInt(process.env.APP_PORT, 10);
        if (process.env.APP_SSL) config.ssl = process.env.APP_SSL === 'true';
        if (process.env.APP_TIMEOUT) config.timeout = parseInt(process.env.APP_TIMEOUT, 10);
        return config;
    }

  src/envConfig.ts: |
    import { FullConfig, createConfig } from './config';

    const ENV_PREFIX = 'MYAPP_';

    function getEnvVar(name: string): string | undefined {
        return process.env[`${ENV_PREFIX}${name}`];
    }

    export function configFromEnvironment(): FullConfig {
        const host = getEnvVar('HOST') ?? 'localhost';
        const port = parseInt(getEnvVar('PORT') ?? '3000', 10);
        const ssl = getEnvVar('SSL') === 'true';
        const timeout = parseInt(getEnvVar('TIMEOUT') ?? '5000', 10);
        return createConfig(host, port, ssl, timeout);
    }

    export function mergeEnvConfig(base: FullConfig): FullConfig {
        const envHost = getEnvVar('HOST');
        const envPort = getEnvVar('PORT');
        return {
            ...base,
            ...(envHost && { host: envHost }),
            ...(envPort && { port: parseInt(envPort, 10) }),
        };
    }

changed:
  src/updater.ts: |
    import { FullConfig } from './config';

    export function updateConfig(current: FullConfig, updates: Partial<FullConfig>): FullConfig {
        return { ...current, ...updates };
    }

    export function updateConfigField<K extends keyof FullConfig>(
        config: FullConfig,
        field: K,
        value: FullConfig[K]
    ): FullConfig {
        return { ...config, [field]: value };
    }

must_include_files:
  - src/config.ts

must_include_content_from:
  src/config.ts:
    - "FullConfig"
    - "host: string"
    - "port: number"
    - "ssl: boolean"
    - "timeout: number"

must_not_include:
  # --- src/defaults.ts: default values, different concern ---
  - DEFAULT_CONFIG
  - getDefaultConfig
  - withDefaults
  # --- src/validator.ts: validation, different concern ---
  - ValidationError
  - validateConfig
  - isValidConfig
  - "Port must be between"
  # --- src/loader.ts: file I/O, different concern ---
  - loadConfigFromFile
  - readFileSync
  - loadConfigFromEnv
  # --- src/envConfig.ts: env vars, different concern ---
  - configFromEnvironment
  - mergeEnvConfig
  - ENV_PREFIX

must_not_include_files:
  - src/defaults.ts
  - src/validator.ts
  - src/loader.ts
  - src/envConfig.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
