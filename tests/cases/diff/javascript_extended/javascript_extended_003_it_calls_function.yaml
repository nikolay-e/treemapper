# Reviewer sees: validator.test.ts tests isValidEmail, isValidUrl,
# isNonEmpty, and isWithinLength from validator.ts.
# Q: "What regex patterns and logic do these validators use?"
#    -> src/validator.ts: EMAIL_REGEX and URL_REGEX are module-level
#       constants; isNonEmpty trims then checks length; isWithinLength
#       trims then checks min/max bounds. Reviewer verifies the test
#       cases exercise correct boundary conditions.
#
# Not needed:
#   - src/unrelated/cache.ts: in-memory cache manager. Different
#     infrastructure concern (caching vs validation).
#   - src/unrelated/queue.ts: task queue. Different infrastructure,
#     no relation to string validation.

initial:
  src/validator.ts: |
    const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const URL_REGEX = /^https?:\/\/[^\s]+$/;

    export function isValidEmail(email: string): boolean {
        return EMAIL_REGEX.test(email);
    }

    export function isValidUrl(url: string): boolean {
        return URL_REGEX.test(url);
    }

    export function isNonEmpty(value: string): boolean {
        return value.trim().length > 0;
    }

    export function isWithinLength(value: string, min: number, max: number): boolean {
        const len = value.trim().length;
        return len >= min && len <= max;
    }
  src/validator.test.ts: |
    console.log('placeholder');
  src/unrelated/cache.ts: |
    export class CacheManager {
        private store = new Map<string, unknown>();

        set(key: string, value: unknown): void {
            this.store.set(key, value);
        }

        get(key: string): unknown {
            return this.store.get(key);
        }

        clear(): void {
            this.store.clear();
        }
    }

    export function evictCache(key: string): void {
        console.log('evicting cache for:', key);
    }
  src/unrelated/queue.ts: |
    export class TaskQueue {
        private tasks: string[] = [];

        enqueue(task: string): void {
            this.tasks.push(task);
        }

        dequeue(): string | undefined {
            return this.tasks.shift();
        }
    }

    export function processQueue(): void {
        console.log('processing queue');
    }
