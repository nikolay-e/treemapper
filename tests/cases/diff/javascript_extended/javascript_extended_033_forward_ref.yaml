# Reviewer sees: Form.tsx is rewritten to import Input from ./Input and pass
# a ref via useRef<HTMLInputElement> to the Input component for focus management.
#
# Q1: "Does Input accept a ref — is it wrapped in forwardRef?"
#     -> src/form/Input.tsx: uses forwardRef<HTMLInputElement, InputProps>
#        to forward the ref to the inner <input> element. Reviewer confirms
#        <Input ref={emailRef} ...> is valid.
# Q2: "What props does Input accept besides ref?"
#     -> Input.tsx defines InputProps with label (required) and type (optional,
#        defaults to 'text'). The Form passes label="Email" and type="email",
#        both valid.
#
# Not needed:
#   - src/form/select.tsx: a <select> dropdown component. Same directory
#     as Input but Form doesn't import or use it.
#   - src/validation/rules.ts: form validation rules. The Form doesn't
#     perform validation in this diff — it only handles ref focusing.

initial:
  src/form/Input.tsx: |
    import { forwardRef } from 'react';

    interface InputProps {
        label: string;
        type?: string;
    }

    export const Input = forwardRef<HTMLInputElement, InputProps>(
        ({ label, type = 'text' }, ref) => (
            <div>
                <label>{label}</label>
                <input ref={ref} type={type} />
            </div>
        )
    );
  src/form/Form.tsx: |
    console.log('initial');
  # --- Not needed: sibling component, Form doesn't use Select ---
  src/form/select.tsx: |
    interface SelectOption {
        value: string;
        label: string;
    }

    interface SelectProps {
        options: SelectOption[];
        value: string;
        onChange: (value: string) => void;
        placeholder?: string;
    }

    export function Select({ options, value, onChange, placeholder }: SelectProps) {
        return (
            <select value={value} onChange={e => onChange(e.target.value)}>
                {placeholder && <option value="">{placeholder}</option>}
                {options.map(opt => (
                    <option key={opt.value} value={opt.value}>{opt.label}</option>
                ))}
            </select>
        );
    }
  # --- Not needed: validation logic, not relevant to ref forwarding ---
  src/validation/rules.ts: |
    type ValidationRule = (value: string) => string | null;

    export const required: ValidationRule = (value) =>
        value.trim() ? null : 'This field is required';

    export const minLength = (min: number): ValidationRule => (value) =>
        value.length >= min ? null : `Must be at least ${min} characters`;

    export const emailFormat: ValidationRule = (value) =>
        /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value) ? null : 'Invalid email format';

    export function validate(value: string, rules: ValidationRule[]): string[] {
        return rules.map(rule => rule(value)).filter((msg): msg is string => msg !== null);
    }

