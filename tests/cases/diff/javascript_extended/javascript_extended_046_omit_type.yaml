# Scenario: public.ts goes from placeholder to defining a PublicRecord type
#   via Omit<FullRecord, 'secret' | 'internal'>, with sanitize/create functions.
#   Only src/public.ts is changed.
#
# Diff shows:
#   - import { FullRecord, createFullRecord } from './full'
#   - type PublicRecord = Omit<FullRecord, 'secret' | 'internal'>
#   - sanitize(record: FullRecord): PublicRecord — destructures out secret/internal
#   - createAndSanitize(name, email): PublicRecord — creates then sanitizes
#
# Reviewer questions:
#   Q1: "What fields does PublicRecord actually have?"
#       -> Omit<FullRecord, 'secret' | 'internal'> is OPAQUE without seeing
#         FullRecord. The reviewer must see that FullRecord has { id, name,
#         email, secret, internal, createdAt } to understand that PublicRecord
#         is { id, name, email, createdAt }. Without full.ts, the reviewer
#         cannot verify that the destructuring in sanitize() correctly
#         removes exactly the right fields.
#
#   Q2: "Does the destructuring in sanitize() actually match the Omit<>?"
#       -> `const { secret, internal, ...publicData } = record` removes
#         secret and internal. The Omit removes 'secret' | 'internal'.
#         These must match — the reviewer needs FullRecord to verify no
#         other sensitive field (like a hypothetical `passwordHash`) is
#         leaking through the spread.
#
#   Q3: "What does createFullRecord return, and does createAndSanitize
#        use it correctly?"
#       -> createFullRecord sets secret to 'hidden-value' and internal
#         to true. The reviewer needs to see this to confirm these values
#         exist and get stripped.
#
# Not needed for comprehension:
#   - src/api/user-handler.ts: imports createFullRecord and uses FullRecord.
#     Structural edge to the same module the diff imports from. But knowing
#     who ELSE uses createFullRecord doesn't help the reviewer understand
#     what PublicRecord contains or whether sanitize() is correct.
#
#   - src/serializers/record-serializer.ts: serializes records to JSON,
#     references FullRecord fields by name (id, name, email). Lexical
#     overlap on field names that also appear in the Omit type. But
#     serialization logic doesn't help review the type definition.
#
#   - src/middleware/auth.ts: checks `record.secret` and `record.internal`
#     — the exact fields being Omit'd. Strongest lexical trap: same field
#     names as the Omit parameters. But auth middleware's use of these
#     fields doesn't help review whether PublicRecord correctly excludes
#     them. The reviewer question is "what fields does FullRecord have",
#     not "who reads secret/internal."
#
#   - src/validators/record-validator.ts: validates FullRecord-shaped
#     objects. Imports FullRecord. Another structural edge to full.ts,
#     but validation rules don't help review a type derivation.
#
#   - src/db/record-repository.ts: CRUD for FullRecord. Imports
#     FullRecord and createFullRecord. Structural edges to both
#     imports in the diff. But database persistence doesn't help
#     review Omit<> or destructuring.

initial:
  src/full.ts: |
    export interface FullRecord {
        id: string;
        name: string;
        email: string;
        secret: string;
        internal: boolean;
        createdAt: Date;
    }

    export function createFullRecord(name: string, email: string): FullRecord {
        return {
            id: Date.now().toString(),
            name,
            email,
            secret: 'hidden-value',
            internal: true,
            createdAt: new Date(),
        };
    }

  src/public.ts: |
    console.log('initial');

  src/api/user-handler.ts: |
    import { createFullRecord, FullRecord } from '../full';
    import { Request, Response } from 'express';

    export function handleCreateUser(req: Request, res: Response) {
        const { name, email } = req.body;
        const record: FullRecord = createFullRecord(name, email);
        res.status(201).json({ id: record.id, name: record.name });
    }

    export function handleGetUser(req: Request, res: Response) {
        // fetch from DB, return full record internally
        res.json({ id: req.params.id });
    }

  src/serializers/record-serializer.ts: |
    export interface SerializedRecord {
        id: string;
        name: string;
        email: string;
        created: string;
    }

    export function serializeForClient(record: { id: string; name: string; email: string; createdAt: Date }): SerializedRecord {
        return {
            id: record.id,
            name: record.name,
            email: record.email,
            created: record.createdAt.toISOString(),
        };
    }

    export function serializeBatch(records: Array<{ id: string; name: string; email: string; createdAt: Date }>): SerializedRecord[] {
        return records.map(serializeForClient);
    }

  src/middleware/auth.ts: |
    import { FullRecord } from '../full';

    export function requireInternal(record: FullRecord): boolean {
        return record.internal === true;
    }

    export function validateSecret(record: FullRecord, expected: string): boolean {
        return record.secret === expected;
    }

    export function stripSensitive(record: FullRecord): Omit<FullRecord, 'secret'> {
        const { secret, ...rest } = record;
        return rest;
    }

  src/validators/record-validator.ts: |
    import { FullRecord } from '../full';

    export function validateRecord(record: Partial<FullRecord>): string[] {
        const errors: string[] = [];
        if (!record.name || record.name.length === 0) {
            errors.push('Name is required');
        }
        if (!record.email || !record.email.includes('@')) {
            errors.push('Valid email is required');
        }
        if (record.name && record.name.length > 100) {
            errors.push('Name must be under 100 characters');
        }
        return errors;
    }

    export function isComplete(record: Partial<FullRecord>): record is FullRecord {
        return !!(record.id && record.name && record.email && record.secret !== undefined && record.createdAt);
    }

  src/db/record-repository.ts: |
    import { FullRecord, createFullRecord } from '../full';

    const store = new Map<string, FullRecord>();

    export function save(record: FullRecord): void {
        store.set(record.id, record);
    }

    export function findById(id: string): FullRecord | undefined {
        return store.get(id);
    }

    export function createAndSave(name: string, email: string): FullRecord {
        const record = createFullRecord(name, email);
        save(record);
        return record;
    }

    export function deleteById(id: string): boolean {
        return store.delete(id);
    }

changed:
  src/public.ts: |
    import { FullRecord, createFullRecord } from './full';

    type PublicRecord = Omit<FullRecord, 'secret' | 'internal'>;

    function sanitize(record: FullRecord): PublicRecord {
        const { secret, internal, ...publicData } = record;
        return publicData;
    }

    function createAndSanitize(name: string, email: string): PublicRecord {
        const full = createFullRecord(name, email);
        return sanitize(full);
    }

    export { PublicRecord, sanitize, createAndSanitize };

must_include_files:
  - src/public.ts
  # Q1+Q2: Omit<FullRecord, 'secret' | 'internal'> is opaque without
  # seeing FullRecord's fields. The reviewer must verify that the
  # destructuring { secret, internal, ...publicData } correctly
  # removes exactly the fields in the Omit — and that no other
  # sensitive field leaks through the spread.
  - src/full.ts

must_include_content_from:
  src/public.ts:
    - "import { FullRecord, createFullRecord } from './full'"
    - "type PublicRecord = Omit<FullRecord, 'secret' | 'internal'>"
    - "const { secret, internal, ...publicData } = record"
  src/full.ts:
    - "export interface FullRecord"
    - "secret: string"
    - "internal: boolean"
    - "export function createFullRecord(name: string, email: string)"

must_not_include:
  # --- api/user-handler.ts: imports createFullRecord + FullRecord ---
  # Structural edges to the same module. But who else creates records
  # doesn't help review the Omit<> type definition.
  - handleCreateUser
  - handleGetUser
  # --- serializers/record-serializer.ts: field name overlap ---
  # References id, name, email, createdAt — exactly the fields that
  # survive the Omit. Lexical trap, but serialization != type derivation.
  - SerializedRecord
  - serializeForClient
  - serializeBatch
  # --- middleware/auth.ts: uses `secret` and `internal` explicitly ---
  # Strongest trap: references the EXACT fields being Omit'd, imports
  # FullRecord, and even has its own stripSensitive() that does a
  # partial version of the same destructuring. But auth's use of these
  # fields doesn't help review whether PublicRecord is defined correctly.
  - requireInternal
  - validateSecret
  - stripSensitive
  # --- validators/record-validator.ts: imports FullRecord ---
  - validateRecord
  - isComplete
  # --- db/record-repository.ts: imports both FullRecord and createFullRecord ---
  - createAndSave
  - deleteById
  - findById

must_not_include_files:
  - src/api/user-handler.ts
  - src/serializers/record-serializer.ts
  - src/middleware/auth.ts
  - src/validators/record-validator.ts
  - src/db/record-repository.ts

add_garbage_files: false
skip_garbage_check: true
