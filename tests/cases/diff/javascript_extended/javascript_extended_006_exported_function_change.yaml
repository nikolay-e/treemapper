# Reviewer sees: utils.ts changes fetchUser and fetchPosts signatures
# to accept optional FetchOptions parameter.
# Q: "Who calls these functions — will existing callers break?"
#    -> src/consumer.ts: loadUserProfile() calls fetchUser(id) and
#       fetchPosts(id) without options. New parameter is optional,
#       so existing call sites still compile. Reviewer confirms
#       backward compatibility.
#
# Not needed:
#   - src/unrelated/theme.ts: UI theming manager. Different domain
#     (visual appearance vs API fetching).
#   - src/unrelated/clipboard.ts: clipboard operations. Browser API
#     concern, unrelated to data fetching.

initial:
  src/utils.ts: |
    export interface FetchOptions {
        headers?: Record<string, string>;
        timeout?: number;
    }

    export function fetchUser(id: string) {
        return fetch(`/api/users/${id}`);
    }

    export function fetchPosts(userId: string) {
        return fetch(`/api/users/${userId}/posts`);
    }

    export function buildUrl(base: string, path: string): string {
        return `${base.replace(/\/$/, '')}/${path.replace(/^\//, '')}`;
    }
  src/consumer.ts: |
    import { fetchUser, fetchPosts } from './utils';

    export async function loadUserProfile(id: string) {
        const userResponse = await fetchUser(id);
        const postsResponse = await fetchPosts(id);
        const user = await userResponse.json();
        const posts = await postsResponse.json();
        return { user, posts };
    }
  src/unrelated/theme.ts: |
    export class ThemeManager {
        private current = 'light';

        toggle(): void {
            this.current = this.current === 'light' ? 'dark' : 'light';
        }

        getCurrent(): string {
            return this.current;
        }
    }

    export function applyTheme(theme: string): void {
        console.log('applying theme:', theme);
    }
  src/unrelated/clipboard.ts: |
    interface ClipboardEntry {
        content: string;
        timestamp: Date;
    }

    export class ClipboardService {
        private history: ClipboardEntry[] = [];

        copy(text: string): void {
            this.history.push({ content: text, timestamp: new Date() });
        }

        paste(): string | undefined {
            return this.history[this.history.length - 1]?.content;
        }
    }

    export function readClipboard(): string {
        return 'clipboard content';
    }
changed:
  src/utils.ts: |
    export interface FetchOptions {
        headers?: Record<string, string>;
        timeout?: number;
    }

    export function fetchUser(id: string, options?: FetchOptions) {
        const init: RequestInit = {};
        if (options?.headers) {
            init.headers = options.headers;
        }
        return fetch(`/api/users/${id}`, init);
    }

    export function fetchPosts(userId: string, options?: FetchOptions) {
        const init: RequestInit = {};
        if (options?.headers) {
            init.headers = options.headers;
        }
        return fetch(`/api/users/${userId}/posts`, init);
    }

    export function buildUrl(base: string, path: string): string {
        return `${base.replace(/\/$/, '')}/${path.replace(/^\//, '')}`;
    }
  src/consumer.ts: |
    import { fetchUser, fetchPosts } from './utils';

    export async function loadUserProfile(id: string) {
        const userResponse = await fetchUser(id);
        const postsResponse = await fetchPosts(id);
        const user = await userResponse.json();
        const posts = await postsResponse.json();
        return { user, posts };
    }
  src/unrelated/theme.ts: |
    export class ThemeManager {
        private current = 'light';

        toggle(): void {
            this.current = this.current === 'light' ? 'dark' : 'light';
        }

        getCurrent(): string {
            return this.current;
        }
    }

    export function applyTheme(theme: string): void {
        console.log('applying theme:', theme);
    }
  src/unrelated/clipboard.ts: |
    interface ClipboardEntry {
        content: string;
        timestamp: Date;
    }

    export class ClipboardService {
        private history: ClipboardEntry[] = [];

        copy(text: string): void {
            this.history.push({ content: text, timestamp: new Date() });
        }

        paste(): string | undefined {
            return this.history[this.history.length - 1]?.content;
        }
    }

    export function readClipboard(): string {
        return 'clipboard content';
    }
must_include_files:
  # Unchanged — the caller that imports fetchUser and fetchPosts.
  # Reviewer needs to verify existing call sites still compile
  # after the signature change (new optional parameter).
  - src/consumer.ts
must_include_content_from:
  src/consumer.ts:
    - "loadUserProfile"
    - "fetchUser(id)"
    - "fetchPosts(id)"
must_not_include:
  # theme.ts: UI theming, different domain
  - ThemeManager
  - applyTheme
  # clipboard.ts: browser clipboard API, unrelated to fetching
  - ClipboardService
  - readClipboard
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
