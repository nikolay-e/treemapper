must_include_files:
  # Q1: Consumer that imports User and createUserWithEmail.
  # Reviewer verifies the new optional role param doesn't break
  # existing call sites (buildProfile passes 2 args, still valid).
  - src/services/profile-service.ts
must_include_content_from:
  src/services/profile-service.ts:
    - "createUserWithEmail"
    - "formatUserSummary"
must_not_include:
  # permissions.ts: uses its own RoleConfig, no import of User.
  # Lexical overlap with "role" but structurally unrelated.
  - RoleConfig
  - roleHierarchy
  - getPermissions
  - hasPermission
  # id-generator.ts: ID utilities, no User dependency
  - generateId
  - parseId
  - isValidId
must_not_include_files:
