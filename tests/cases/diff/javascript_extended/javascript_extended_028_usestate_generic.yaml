# Reviewer sees: TodoList.tsx is rewritten from scratch with useState<TodoItem[]>,
# imports TodoItem and createTodo from ./types, and uses them to add/toggle todos.
#
# Q1: "What shape does TodoItem have — what fields does the component render?"
#     -> src/types.ts defines TodoItem with id, text, completed, priority.
#        The component accesses t.id, t.completed, t.text — reviewer confirms
#        these fields exist. The priority field is unused in the component,
#        which might be intentional or an oversight.
# Q2: "What does createTodo() return? Does it match TodoItem[]?"
#     -> src/types.ts exports createTodo() which constructs a TodoItem with
#        Date.now() id and default 'medium' priority. Reviewer confirms the
#        factory aligns with the state type parameter.
#
# Not needed:
#   - src/db/schema.ts: database schema definitions. Backend persistence
#     layer, unrelated to frontend React state management.
#   - src/config/constants.ts: application constants. Different concern,
#     no import relationship to TodoList or types.

max_enrichment: 4.2
initial:
  src/types.ts: |
    export interface TodoItem {
        id: string;
        text: string;
        completed: boolean;
        priority: 'low' | 'medium' | 'high';
    }

    export interface TodoFilter {
        showCompleted: boolean;
        priority?: 'low' | 'medium' | 'high';
    }

    export function createTodo(text: string, priority: TodoItem['priority'] = 'medium'): TodoItem {
        return { id: Date.now().toString(), text, completed: false, priority };
    }
  src/TodoList.tsx: |
    console.log('initial');
  # --- Not needed: database schema, backend concern ---
  src/db/schema.ts: |
    interface TableColumn {
        name: string;
        type: 'string' | 'number' | 'boolean' | 'date';
        nullable?: boolean;
    }

    export const usersTable: TableColumn[] = [
        { name: 'id', type: 'string' },
        { name: 'email', type: 'string' },
        { name: 'created_at', type: 'date' },
    ];

    export function validateSchema(columns: TableColumn[], data: Record<string, unknown>): boolean {
        return columns.every(col => col.nullable || data[col.name] !== undefined);
    }
  # --- Not needed: app constants, no import relationship ---
  src/config/constants.ts: |
    export const APP_NAME = 'TodoApp';
    export const MAX_RETRIES = 3;
    export const REQUEST_TIMEOUT = 5000;

    export function getApiBaseUrl(): string {
        return process.env.API_URL || 'http://localhost:3000';
    }

changed:
  src/types.ts: |
    export interface TodoItem {
        id: string;
        text: string;
        completed: boolean;
        priority: 'low' | 'medium' | 'high';
    }

    export interface TodoFilter {
        showCompleted: boolean;
        priority?: 'low' | 'medium' | 'high';
    }

    export function createTodo(text: string, priority: TodoItem['priority'] = 'medium'): TodoItem {
        return { id: Date.now().toString(), text, completed: false, priority };
    }
  src/TodoList.tsx: |
    import { useState } from 'react';
    import { TodoItem, createTodo } from './types';

    export function TodoList() {
        const [todos, setTodos] = useState<TodoItem[]>([]);
        const [input, setInput] = useState('');

        const addTodo = () => {
            if (input.trim()) {
                setTodos(prev => [...prev, createTodo(input)]);
                setInput('');
            }
        };

        const toggleTodo = (id: string) => {
            setTodos(prev =>
                prev.map(t => t.id === id ? { ...t, completed: !t.completed } : t)
            );
        };

        return (
            <div>
                <input value={input} onChange={e => setInput(e.target.value)} />
                <button onClick={addTodo}>Add</button>
                {todos.map(t => (
                    <div key={t.id} onClick={() => toggleTodo(t.id)}>
                        {t.completed ? '[x]' : '[ ]'} {t.text}
                    </div>
                ))}
            </div>
        );
    }
  src/db/schema.ts: |
    interface TableColumn {
        name: string;
        type: 'string' | 'number' | 'boolean' | 'date';
        nullable?: boolean;
    }

    export const usersTable: TableColumn[] = [
        { name: 'id', type: 'string' },
        { name: 'email', type: 'string' },
        { name: 'created_at', type: 'date' },
    ];

    export function validateSchema(columns: TableColumn[], data: Record<string, unknown>): boolean {
        return columns.every(col => col.nullable || data[col.name] !== undefined);
    }
  src/config/constants.ts: |
    export const APP_NAME = 'TodoApp';
    export const MAX_RETRIES = 3;
    export const REQUEST_TIMEOUT = 5000;

    export function getApiBaseUrl(): string {
        return process.env.API_URL || 'http://localhost:3000';
    }

must_include_files:
  # Unchanged — defines TodoItem shape and createTodo factory the component uses.
  # Reviewer needs to confirm fields accessed (id, text, completed) exist on the type,
  # and that createTodo returns a proper TodoItem for the state array.
  - src/types.ts
must_include_content_from:
  src/types.ts:
    - "TodoItem"
    - "createTodo"
must_not_include:
  # schema.ts: database schema, backend concern
  - TableColumn
  - usersTable
  - validateSchema
  # constants.ts: app config, no import relationship
  - APP_NAME
  - MAX_RETRIES
  - getApiBaseUrl
must_not_include_files:
  - src/db/schema.ts
  - src/config/constants.ts
max_fragments: 10
max_files: 3
add_garbage_files: false
skip_garbage_check: true
