# Reviewer sees: Dashboard.tsx is rewritten to render <ExpensiveList items={items} />
# alongside a counter button. Items come from useState and don't change on counter
# clicks, so memo should prevent ExpensiveList re-renders.
#
# Q1: "Is ExpensiveList wrapped in React.memo — does the optimization work?"
#     -> src/components/ExpensiveList.tsx: exports memo(ExpensiveListComponent).
#        Since Dashboard passes a stable [items] reference (created once via
#        useState), memo prevents re-renders when only count changes.
# Q2: "What props does ExpensiveList accept — is { items } the right shape?"
#     -> ExpensiveList.tsx defines ExpensiveListProps with items: Item[].
#        Dashboard passes [{ id: '1', name: 'Item 1' }] which matches
#        the Item interface (id: string, name: string).
#
# Not needed:
#   - src/db/pool.ts: database connection pooling. Backend infrastructure,
#     no relationship to frontend memo optimization.
#   - src/config/feature-flags.ts: feature flag configuration. Infrastructure
#     concern, not relevant to component rendering.

initial:
  src/components/ExpensiveList.tsx: |
    import { memo } from 'react';

    interface Item {
        id: string;
        name: string;
    }

    interface ExpensiveListProps {
        items: Item[];
    }

    function ExpensiveListComponent({ items }: ExpensiveListProps) {
        return (
            <ul>
                {items.map(item => (
                    <li key={item.id}>{item.name}</li>
                ))}
            </ul>
        );
    }

    export const ExpensiveList = memo(ExpensiveListComponent);
  src/pages/Dashboard.tsx: |
    console.log('initial');
  # --- Not needed: database pooling, backend infra ---
  src/db/pool.ts: |
    interface PoolConfig {
        maxConnections: number;
        idleTimeout: number;
        host: string;
    }

    export class ConnectionPool {
        private available: number;

        constructor(private config: PoolConfig) {
            this.available = config.maxConnections;
        }

        acquire(): boolean {
            if (this.available <= 0) return false;
            this.available--;
            return true;
        }

        release(): void {
            this.available = Math.min(this.available + 1, this.config.maxConnections);
        }
    }
  # --- Not needed: feature flags, infrastructure concern ---
  src/config/feature-flags.ts: |
    interface FeatureFlag {
        name: string;
        enabled: boolean;
        rolloutPercentage: number;
    }

    const flags: Map<string, FeatureFlag> = new Map();

    export function registerFlag(flag: FeatureFlag): void {
        flags.set(flag.name, flag);
    }

    export function isEnabled(flagName: string): boolean {
        const flag = flags.get(flagName);
        return flag?.enabled ?? false;
    }

