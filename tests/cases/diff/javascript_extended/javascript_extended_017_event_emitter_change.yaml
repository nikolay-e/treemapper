# === What a reviewer needs to understand this change ===
#
# Diff: emitter.ts adds emitUserDeleted() and emitUserUpdated().
#
# Without user-listener.ts, the reviewer sees "two new emit functions"
# and thinks "ok, events added". With user-listener.ts, the reviewer sees:
#
#   1. The PATTERN: appEmitter.on('userCreated', ...) registers handlers.
#      This is how event wiring works in this codebase — manually.
#   2. The GAP: there are handlers for 'userCreated' but NONE for
#      'userDeleted' or 'userUpdated'. Two new events fire into the void.
#      Is this intentional or did someone forget the listeners?
#   3. The CONVENTION: each event gets multiple handlers (welcome email +
#      analytics). Are equivalent handlers expected for the new events?
#
# This is the difference between "code looks fine" and "where are the
# handlers for these new events?"

must_include_files:
  - src/events/emitter.ts
  # Q1+Q2: "How does event wiring work, and are the new events handled?"
  # Shows the existing pattern AND reveals missing handlers.
  - src/events/user-listener.ts
must_include_content_from:
  src/events/emitter.ts:
    - emitUserDeleted
    - emitUserUpdated
    - appEmitter.emit
  src/events/user-listener.ts:
    # Existing handlers — reviewer sees the pattern and the gap
    - "appEmitter.on('userCreated'"
    - "Welcome email queued"
must_not_include:
  # --- audit-logger.ts: logs requests, no EventEmitter ---
  - AuditEntry
  - logAuditEvent
  - getAuditTrail
  # --- user-service.ts: CRUD, doesn't call emitters ---
  - UserRecord
  - createUser
  - deleteUser
  - updateUser
  # --- notification-channels.ts: different messaging system ---
  - routeNotification
  - NotificationConfig
  - sendEmail
  - sendSms
must_not_include_files:
  - src/middleware/audit-logger.ts
  - src/services/user-service.ts
  - src/notifications/notification-channels.ts
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
