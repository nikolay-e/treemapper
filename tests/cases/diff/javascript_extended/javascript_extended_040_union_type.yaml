# Scenario: handler.ts goes from stub to a module that imports Result, Success,
#   Failure, and isSuccess from ./result, then builds handleResult() and wrapAsync()
#   using the union type Result<T> = Success<T> | Failure.
#
# Diff shows:
#   - console.log('initial')
#   + import { Result, Success, Failure, isSuccess } from './result';
#   + handleResult<T>(result: Result<T>): T — unwraps or throws
#   + wrapAsync<T>(promise): Promise<Result<T>> — wraps promise into Result
#
# Reviewer questions:
#   Q1: "What is the Result<T> union — what fields does Success have vs Failure?"
#       -> src/result.ts: Success<T> = { success: true; data: T }.
#          Failure = { success: false; error: string; code?: number }.
#          handleResult accesses result.data (Success) and result.error +
#          result.code (Failure). Reviewer must verify these field accesses.
#
#   Q2: "Does isSuccess narrow correctly — is the type guard valid?"
#       -> src/result.ts: isSuccess checks result.success === true and narrows
#          to Success<T>. So inside the if-branch, result.data is available.
#          Reviewer confirms the guard aligns with handleResult's usage.
#
#   Q3: "Does wrapAsync correctly construct Success and Failure shapes?"
#       -> wrapAsync builds { success: true, data } and { success: false, error }.
#          These match the literal types in result.ts. But note: wrapAsync's
#          Failure doesn't set code — reviewer can verify code is optional.
#
# Not needed for comprehension:
#   - src/services/resultLogger.ts: Logs Result outcomes. Imports Result and
#     isSuccess from the same module. Direct structural edge: same import.
#     But logging behavior doesn't help review whether handleResult correctly
#     pattern-matches the union discriminant.
#
#   - src/services/resultAggregator.ts: Collects multiple Results into a batch.
#     Also imports Result<T>. Aggregation logic is a different concern from
#     understanding the union type definition itself.
#
#   - src/utils/errorFormatter.ts: Formats error messages. The handler builds
#     error strings with `[${result.code}] ${result.error}` — lexical overlap
#     with "error" formatting, but no import of Result types.

max_enrichment: 6.3
initial:
  src/result.ts: |
    export type Success<T> = { success: true; data: T };

    export type Failure = { success: false; error: string; code?: number };

    export type Result<T> = Success<T> | Failure;

    export function isSuccess<T>(result: Result<T>): result is Success<T> {
        return result.success === true;
    }

    export function isFailure<T>(result: Result<T>): result is Failure {
        return result.success === false;
    }
  src/handler.ts: |
    console.log('initial');
  # --- Not needed: logs Results, same import but logging concern ---
  src/services/resultLogger.ts: |
    import { Result, isSuccess } from '../result';

    export function logResult<T>(result: Result<T>, context: string): void {
        if (isSuccess(result)) {
            console.log(`[${context}] Success:`, result.data);
        } else {
            console.error(`[${context}] Failure: ${result.error} (code: ${result.code ?? 'none'})`);
        }
    }

    export function logBatchResults<T>(results: Result<T>[], context: string): void {
        const successes = results.filter(isSuccess).length;
        console.log(`[${context}] ${successes}/${results.length} succeeded`);
    }
  # --- Not needed: aggregates Results, same import but batch concern ---
  src/services/resultAggregator.ts: |
    import { Result, Success, Failure } from '../result';

    export function aggregateResults<T>(results: Result<T>[]): Result<T[]> {
        const failures = results.filter((r): r is Failure => !r.success);
        if (failures.length > 0) {
            return { success: false, error: failures.map(f => f.error).join('; ') };
        }
        const data = (results as Success<T>[]).map(r => r.data);
        return { success: true, data };
    }

    export function partitionResults<T>(results: Result<T>[]): { successes: T[]; errors: string[] } {
        const successes: T[] = [];
        const errors: string[] = [];
        for (const r of results) {
            if (r.success) successes.push(r.data);
            else errors.push(r.error);
        }
        return { successes, errors };
    }
  # --- Not needed: error formatting, lexical overlap but no Result import ---
  src/utils/errorFormatter.ts: |
    export function formatError(error: Error): string {
        return `[${error.name}] ${error.message}`;
    }

    export function formatErrorWithStack(error: Error): string {
        return `${formatError(error)}\n${error.stack ?? 'No stack trace'}`;
    }

    export function createErrorCode(prefix: string, code: number): string {
        return `${prefix}-${code.toString().padStart(4, '0')}`;
    }

changed:
  src/result.ts: |
    export type Success<T> = { success: true; data: T };

    export type Failure = { success: false; error: string; code?: number };

    export type Result<T> = Success<T> | Failure;

    export function isSuccess<T>(result: Result<T>): result is Success<T> {
        return result.success === true;
    }

    export function isFailure<T>(result: Result<T>): result is Failure {
        return result.success === false;
    }
  src/handler.ts: |
    import { Result, Success, Failure, isSuccess } from './result';

    function handleResult<T>(result: Result<T>): T {
        if (isSuccess(result)) {
            return result.data;
        }
        throw new Error(`[${result.code ?? 'UNKNOWN'}] ${result.error}`);
    }

    function wrapAsync<T>(promise: Promise<T>): Promise<Result<T>> {
        return promise
            .then((data): Success<T> => ({ success: true, data }))
            .catch((err): Failure => ({ success: false, error: err.message }));
    }

    export { handleResult, wrapAsync };
  src/services/resultLogger.ts: |
    import { Result, isSuccess } from '../result';

    export function logResult<T>(result: Result<T>, context: string): void {
        if (isSuccess(result)) {
            console.log(`[${context}] Success:`, result.data);
