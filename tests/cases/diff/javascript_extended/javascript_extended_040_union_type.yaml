    }

    export function logBatchResults<T>(results: Result<T>[], context: string): void {
        const successes = results.filter(isSuccess).length;
        console.log(`[${context}] ${successes}/${results.length} succeeded`);
    }
  src/services/resultAggregator.ts: |
