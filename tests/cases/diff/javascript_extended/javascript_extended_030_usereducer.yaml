# Reviewer sees: Counter.tsx is rewritten to use useReducer with counterReducer
# imported from ./reducer, with initial state { count: 0 }.
#
# Q1: "What actions does the reducer support — does { type: 'increment' } work?"
#     -> src/state/reducer.ts defines Action as a union of 'increment',
#        'decrement', and 'reset'. The component dispatches 'increment',
#        which is valid. Reviewer also sees 'decrement' and 'reset' exist
#        but aren't wired to buttons yet — possible follow-up.
# Q2: "What is the State shape — does state.count exist?"
#     -> reducer.ts exports State = { count: number }. The component uses
#        state.count for display, which matches.
#
# Not needed:
#   - src/state/history.ts: undo/redo stack for state changes. The counter
#     uses useReducer directly, no history integration in this diff.
#   - src/components/progress-bar.tsx: visual progress indicator. Nearby
#     component but doesn't use or relate to the counter reducer.

max_enrichment: 5.2
initial:
  src/state/reducer.ts: |
    export type State = { count: number };
    export type Action =
        | { type: 'increment' }
        | { type: 'decrement' }
        | { type: 'reset' };

    export function counterReducer(state: State, action: Action): State {
        switch (action.type) {
            case 'increment': return { count: state.count + 1 };
            case 'decrement': return { count: state.count - 1 };
            case 'reset': return { count: 0 };
        }
    }
  src/components/Counter.tsx: |
    console.log('initial');
  # --- Not needed: undo/redo, not used by this component ---
  src/state/history.ts: |
    interface HistoryEntry<T> {
        state: T;
        timestamp: number;
    }

    export class StateHistory<T> {
        private stack: HistoryEntry<T>[] = [];
        private pointer = -1;

        push(state: T): void {
            this.stack = this.stack.slice(0, this.pointer + 1);
            this.stack.push({ state, timestamp: Date.now() });
            this.pointer++;
        }

        undo(): T | null {
            if (this.pointer <= 0) return null;
            this.pointer--;
            return this.stack[this.pointer].state;
        }

        redo(): T | null {
            if (this.pointer >= this.stack.length - 1) return null;
            this.pointer++;
            return this.stack[this.pointer].state;
        }
    }
  # --- Not needed: unrelated UI component ---
  src/components/progress-bar.tsx: |
    interface ProgressBarProps {
        value: number;
        max: number;
        label?: string;
    }

    export function ProgressBar({ value, max, label }: ProgressBarProps) {
        const percentage = Math.min(100, Math.round((value / max) * 100));
        return (
            <div role="progressbar" aria-valuenow={value} aria-valuemax={max}>
                {label && <span>{label}</span>}
                <div style={{ width: `${percentage}%` }} />
            </div>
        );
    }

