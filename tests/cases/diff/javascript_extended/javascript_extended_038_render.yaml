name: javascript_extended_038_render
repo:
  initial_files:
    components/Greeting.tsx: |
      interface GreetingProps {
          name: string;
      }

      export function Greeting({ name }: GreetingProps) {
          return <h1>Hello, {name}!</h1>;
      }
    components/Greeting.test.tsx: |
      console.log('placeholder');
    components/Banner.tsx: |
      interface BannerProps {
          message: string;
          variant: 'info' | 'warning' | 'error';
      }

      export function Banner({ message, variant }: BannerProps) {
          return (
              <div className={`banner banner-${variant}`}>
                  <p>{message}</p>
              </div>
          );
      }
    components/Banner.test.tsx: |
      import { render, screen } from '@testing-library/react';
      import { Banner } from './Banner';

      describe('Banner', () => {
          it('should display message with info variant', () => {
              render(<Banner message="System update" variant="info" />);
              expect(screen.getByText('System update')).toBeInTheDocument();
          });

          it('should apply variant class', () => {
              const { container } = render(<Banner message="Warning" variant="warning" />);
              expect(container.querySelector('.banner-warning')).toBeTruthy();
          });
      });
    components/Avatar.tsx: |
      interface AvatarProps {
          src: string;
          alt: string;
          size?: number;
      }

      export function Avatar({ src, alt, size = 40 }: AvatarProps) {
          return (
              <img
                  className="avatar"
                  src={src}
                  alt={alt}
                  width={size}
                  height={size}
              />
          );
      }
