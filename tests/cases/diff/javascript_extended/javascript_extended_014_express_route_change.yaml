# Test: Express routes expanded — reviewer needs the middleware wiring
#
# Scenario: routes.ts adds POST and DELETE endpoints to the userRouter.
# middleware.ts imports userRouter and mounts it at /users.
#
# Reviewer questions:
#   Q1: "How is this router mounted in the application?"
#       → middleware.ts: setupRoutes() mounts userRouter at '/users'.
#         Reviewer verifies the new POST/DELETE endpoints will be
#         accessible at /users/ and /users/:id respectively.
#   Q2: "What does the existing GET route return?"
#       → routes.ts: returns { id: req.params.id }. Already in the diff,
#         reviewer sees the pattern for new routes.
#
# Not needed:
#   - src/middleware/auth.ts: authentication middleware. Different
#     middleware concern (security vs routing). Not applied to these routes.
#   - src/validators/user-validator.ts: request body validation. Validation
#     layer, not imported by routes.ts. New POST route has no validation.

max_enrichment: 5.4
initial:
  src/routes/routes.ts: |
    import { Router } from 'express';

    export const userRouter = Router();

    userRouter.get('/:id', (req, res) => {
        res.json({ id: req.params.id });
    });
  src/routes/middleware.ts: |
    import { userRouter } from './routes';

    export function setupRoutes(app: any) {
        app.use('/users', userRouter);
    }
  # --- Not needed: authentication middleware, security concern ---
  src/middleware/auth.ts: |
    import { Request, Response, NextFunction } from 'express';

    export function requireAuth(req: Request, res: Response, next: NextFunction): void {
        const token = req.headers.authorization?.replace('Bearer ', '');
        if (!token) {
            res.status(401).json({ error: 'Unauthorized' });
            return;
        }
        next();
    }

    export function requireAdmin(req: Request, res: Response, next: NextFunction): void {
        const role = (req as any).user?.role;
        if (role !== 'admin') {
            res.status(403).json({ error: 'Forbidden' });
            return;
        }
        next();
    }
  # --- Not needed: body validation, not imported by routes ---
  src/validators/user-validator.ts: |
    interface ValidationResult {
        valid: boolean;
        errors: string[];
    }

    export function validateCreateUser(body: any): ValidationResult {
        const errors: string[] = [];
        if (!body.name) errors.push('name is required');
        if (!body.email) errors.push('email is required');
        return { valid: errors.length === 0, errors };
    }

    export function validateUpdateUser(body: any): ValidationResult {
        const errors: string[] = [];
        if (body.email && !body.email.includes('@')) {
            errors.push('invalid email format');
        }
        return { valid: errors.length === 0, errors };
    }
