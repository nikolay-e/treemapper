    export const userRouter = Router();

    userRouter.get('/:id', (req, res) => {
        res.json({ id: req.params.id });
    });

    userRouter.post('/', (req, res) => {
        res.status(201).json(req.body);
    });

    userRouter.delete('/:id', (req, res) => {
        res.status(204).send();
    });
