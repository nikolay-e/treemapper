must_include_files:
  # Q1: The middleware definition — reviewer needs to see what auth logic
  # runs globally after app.use(authMiddleware).
  - src/middleware/auth.ts
  # Q2: A route affected by the global middleware.
  - src/routes/health.ts
must_include_content_from:
  src/middleware/auth.ts:
    - "authMiddleware"
  src/routes/health.ts:
    - "healthRouter"
must_not_include:
  # rate-limiter.ts: different middleware, not mounted in this diff
  - rateLimiter
  - requestCounts
  # server.ts: port/host config, infrastructure concern
  - ServerConfig
  - loadServerConfig
  - CORS_ORIGIN
must_not_include_files:
  - src/middleware/rate-limiter.ts
  - src/config/server.ts
max_fragments: 12
max_files: 4
add_garbage_files: false
skip_garbage_check: true
