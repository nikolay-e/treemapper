# Reviewer sees: Stats.tsx is rewritten to import expensiveComputation and
# averageValue from ./compute and wrap both in useMemo with [items] dependency.
#
# Q1: "What does expensiveComputation do — is useMemo justified?"
#     -> src/compute.ts: reduces items with n*n accumulation (O(n) with
#        expensive per-element math). Memoizing this avoids recomputation
#        on every render when items haven't changed. Justified.
# Q2: "What does averageValue return — is .toFixed(2) safe?"
#     -> src/compute.ts: returns 0 for empty arrays (no division by zero),
#        otherwise total/length. The number return type makes .toFixed(2)
#        safe. Reviewer confirms.
# Q3: "Is filterOutliers used by the component?"
#     -> src/compute.ts exports filterOutliers but Stats.tsx doesn't import
#        it. That's fine — it exists for other consumers.
#
# Not needed:
#   - src/components/chart.tsx: chart rendering component. Stats displays
#     text values, no chart integration in this diff.
#   - src/utils/format.ts: number formatting utilities. The component
#     uses .toFixed(2) directly, not a shared formatter.

initial:
  src/compute.ts: |
    export function expensiveComputation(items: number[]): number {
        return items.reduce((sum, n) => sum + n * n, 0);
    }

    export function averageValue(items: number[]): number {
        if (items.length === 0) return 0;
        const total = items.reduce((sum, n) => sum + n, 0);
        return total / items.length;
    }

    export function filterOutliers(items: number[], threshold: number): number[] {
        const avg = averageValue(items);
        return items.filter(n => Math.abs(n - avg) <= threshold);
    }
  src/Stats.tsx: |
    console.log('initial');
  # --- Not needed: chart rendering, Stats shows text values ---
  src/components/chart.tsx: |
    interface ChartProps {
        data: number[];
        width: number;
        height: number;
        color?: string;
    }

    export function BarChart({ data, width, height, color = '#4a90d9' }: ChartProps) {
        const maxVal = Math.max(...data);
        const barWidth = width / data.length;
        return (
            <svg width={width} height={height}>
                {data.map((val, i) => (
                    <rect
                        key={i}
                        x={i * barWidth}
                        y={height - (val / maxVal) * height}
                        width={barWidth - 2}
                        height={(val / maxVal) * height}
                        fill={color}
                    />
                ))}
            </svg>
        );
    }
  # --- Not needed: formatting utils, component uses .toFixed directly ---
  src/utils/format.ts: |
    export function formatCurrency(value: number, currency = 'USD'): string {
        return new Intl.NumberFormat('en-US', { style: 'currency', currency }).format(value);
    }

    export function formatPercentage(value: number, decimals = 1): string {
        return `${(value * 100).toFixed(decimals)}%`;
    }

    export function formatCompact(value: number): string {
        return new Intl.NumberFormat('en-US', { notation: 'compact' }).format(value);
    }

