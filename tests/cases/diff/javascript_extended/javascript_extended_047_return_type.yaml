# Scenario: types.ts goes from placeholder to defining User/Product types
#   via ReturnType<typeof ...> from factory functions, plus utility functions
#   that operate on those types.
#   Only src/types.ts is changed.
#
# Diff shows:
#   - import { createUser, createProduct } from './factory'
#   - type User = ReturnType<typeof createUser>
#   - type Product = ReturnType<typeof createProduct>
#   - processUser(user: User): string — formats user fields
#   - formatProduct(product: Product): string — formats product fields
#
# Reviewer questions:
#   Q1: "What shape do User and Product actually have?"
#       -> ReturnType<typeof createUser> means the reviewer MUST see
#         createUser's return object to know that User has { id, name,
#         age, createdAt, active }. Without factory.ts, the type aliases
#         are opaque — the reviewer sees `user.name` and `user.age` in
#         processUser but cannot verify these fields actually exist.
#       -> Same for createProduct: reviewer needs to see { sku, title,
#         price, inStock } to verify formatProduct accesses real fields.
#
#   Q2: "Do processUser and formatProduct access fields correctly?"
#       -> processUser uses user.name, user.age, user.createdAt.toISOString()
#         — reviewer needs the factory return shape to verify createdAt
#         is actually a Date (it is: `new Date()`).
#       -> formatProduct uses product.title, product.price.toFixed(2),
#         product.sku — needs factory to verify price is number, sku
#         is string.
#
# Not needed for comprehension:
#   - src/services/user-service.ts: imports createUser and calls it.
#     Structural edge to the same factory function. But understanding
#     WHO uses createUser doesn't help review the type definitions.
#     The reviewer question is "what does createUser return", not
#     "who calls createUser."
#
#   - src/services/product-service.ts: imports createProduct. Same
#     reasoning — a consumer of the factory, not helpful for reviewing
#     the ReturnType definitions.
#
#   - src/validators/user-validator.ts: validates user-shaped objects
#     with field names that overlap (name, age, email). Lexical trap —
#     shares field names but operates on raw input dicts, not the
#     User type. Including it would mislead the reviewer into thinking
#     the validator is related to the new type definition.
#
#   - src/formatters/currency.ts: a formatting utility. processUser
#     and formatProduct are also "formatters" — lexical overlap on
#     the concept of formatting. But this currency formatter has zero
#     dependency on User, Product, or the factory.
#
#   - src/models/order.ts: defines an Order interface that references
#     product SKU strings and user IDs. Structural-ish: it mentions
#     the same domain concepts. But it's a separate model with its
#     own type, not consumed or referenced by the diff.

initial:
  src/factory.ts: |
    export function createUser(name: string, age: number) {
        return {
            id: Date.now().toString(),
            name,
            age,
            createdAt: new Date(),
            active: true,
        };
    }

    export function createProduct(title: string, price: number) {
        return {
            sku: `SKU-${Date.now()}`,
            title,
            price,
            inStock: true,
        };
    }

  src/types.ts: |
    console.log('initial');

  src/services/user-service.ts: |
    import { createUser } from '../factory';

    export class UserService {
        private users: ReturnType<typeof createUser>[] = [];

        register(name: string, age: number) {
            const user = createUser(name, age);
            this.users.push(user);
            return user;
        }

        deactivate(userId: string) {
            const user = this.users.find(u => u.id === userId);
            if (user) user.active = false;
        }

        findByName(name: string) {
            return this.users.filter(u => u.name === name && u.active);
        }
    }

  src/services/product-service.ts: |
    import { createProduct } from '../factory';

    export class ProductService {
        private catalog: ReturnType<typeof createProduct>[] = [];

        addProduct(title: string, price: number) {
            const product = createProduct(title, price);
            this.catalog.push(product);
            return product;
        }

        findBySku(sku: string) {
            return this.catalog.find(p => p.sku === sku);
        }

        getInStock() {
            return this.catalog.filter(p => p.inStock);
        }
    }

  src/validators/user-validator.ts: |
    interface UserInput {
        name: string;
        age: number;
        email: string;
    }

    export function validateUserInput(input: unknown): input is UserInput {
        if (typeof input !== 'object' || input === null) return false;
        const obj = input as Record<string, unknown>;
        if (typeof obj.name !== 'string' || obj.name.length === 0) return false;
        if (typeof obj.age !== 'number' || obj.age < 0 || obj.age > 150) return false;
        if (typeof obj.email !== 'string' || !obj.email.includes('@')) return false;
        return true;
    }

    export function sanitizeUserInput(input: UserInput): UserInput {
        return {
            name: input.name.trim(),
            age: Math.floor(input.age),
            email: input.email.toLowerCase().trim(),
        };
    }

  src/formatters/currency.ts: |
    const LOCALE_MAP: Record<string, string> = {
        USD: 'en-US',
        EUR: 'de-DE',
        GBP: 'en-GB',
        JPY: 'ja-JP',
    };

    export function formatPrice(amount: number, currency: string = 'USD'): string {
        const locale = LOCALE_MAP[currency] || 'en-US';
        return new Intl.NumberFormat(locale, {
            style: 'currency',
            currency,
        }).format(amount);
    }

    export function formatDiscount(original: number, discounted: number): string {
        const pct = ((original - discounted) / original * 100).toFixed(0);
        return `${pct}% off`;
    }

  src/models/order.ts: |
    export interface OrderItem {
        sku: string;
        quantity: number;
        unitPrice: number;
    }

    export interface Order {
        orderId: string;
        userId: string;
        items: OrderItem[];
        total: number;
        status: 'pending' | 'confirmed' | 'shipped';
        createdAt: Date;
    }

    export function calculateTotal(items: OrderItem[]): number {
        return items.reduce((sum, item) => sum + item.unitPrice * item.quantity, 0);
    }

changed:
  src/factory.ts: |
    export function createUser(name: string, age: number) {
        return {
            id: Date.now().toString(),
            name,
            age,
            createdAt: new Date(),
            active: true,
        };
    }

    export function createProduct(title: string, price: number) {
        return {
            sku: `SKU-${Date.now()}`,
            title,
            price,
            inStock: true,
        };
    }

  src/types.ts: |
    import { createUser, createProduct } from './factory';

    type User = ReturnType<typeof createUser>;
    type Product = ReturnType<typeof createProduct>;

    function processUser(user: User): string {
        return `${user.name} (age ${user.age}), created: ${user.createdAt.toISOString()}`;
    }

    function formatProduct(product: Product): string {
        return `${product.title}: $${product.price.toFixed(2)} [${product.sku}]`;
    }

    export { User, Product, processUser, formatProduct };

