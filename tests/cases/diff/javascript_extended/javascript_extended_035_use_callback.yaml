# Reviewer sees: ActionButton.tsx is rewritten to import createClickHandler and
# createDeleteHandler from ./handlers, and wraps the branching logic in
# useCallback with [id, variant] dependency.
#
# Q1: "What do createClickHandler and createDeleteHandler return?"
#     -> src/handlers.ts: both are factory functions returning closures.
#        createClickHandler(id) returns () => console.log('Clicked:', id).
#        createDeleteHandler(resourceId) returns () => console.log('Deleting...').
#        The component calls the returned closure immediately: handler()().
# Q2: "Is createSubmitHandler also exported — why isn't it used?"
#     -> handlers.ts exports createSubmitHandler too, but ActionButton only
#        handles 'click' and 'delete' variants. Reviewer sees the full API
#        and confirms the component uses the right subset.
#
# Not needed:
#   - src/db/migrations.ts: database migration runner. Backend infrastructure,
#     no relationship to UI click handlers.
#   - src/config/routes.ts: URL route definitions. Routing concern, unrelated
#     to action button event handling.

initial:
  src/handlers.ts: |
    export function createClickHandler(id: string) {
        return () => console.log('Clicked:', id);
    }

    export function createSubmitHandler(formId: string) {
        return (data: Record<string, string>) => {
            console.log(`Submitting form ${formId}:`, data);
        };
    }

    export function createDeleteHandler(resourceId: string) {
        return () => {
            console.log(`Deleting resource: ${resourceId}`);
        };
    }
  src/components/ActionButton.tsx: |
    console.log('initial');
  # --- Not needed: database migrations, backend concern ---
  src/db/migrations.ts: |
    interface Migration {
        version: number;
        up: () => Promise<void>;
        down: () => Promise<void>;
    }

    const migrations: Migration[] = [];

    export function registerMigration(migration: Migration): void {
        migrations.push(migration);
    }

    export async function runMigrations(): Promise<void> {
        for (const m of migrations) {
            await m.up();
        }
    }

    export async function rollbackMigration(): Promise<void> {
        const last = migrations.pop();
        if (last) await last.down();
    }
  # --- Not needed: URL routing, different concern ---
  src/config/routes.ts: |
    interface RouteConfig {
        path: string;
        component: string;
        exact?: boolean;
    }

    export const routes: RouteConfig[] = [
        { path: '/', component: 'Home', exact: true },
        { path: '/about', component: 'About' },
        { path: '/contact', component: 'Contact' },
    ];

    export function findRoute(path: string): RouteConfig | undefined {
        return routes.find(r => r.exact ? r.path === path : path.startsWith(r.path));
    }

