  src/service.test.ts: |
    import { getUserDisplayName, getUserEmail } from './service';
    import { fetchUser } from './api';

    jest.mock('./api');

    const mockedFetchUser = fetchUser as jest.MockedFunction<typeof fetchUser>;

    describe('UserService', () => {
        beforeEach(() => {
            mockedFetchUser.mockReset();
        });

        it('should return display name with role', async () => {
            mockedFetchUser.mockResolvedValue({
                id: '1', name: 'Alice', email: 'alice@test.com', role: 'admin',
            });
            const name = await getUserDisplayName('1');
            expect(name).toBe('Alice (admin)');
        });

        it('should return user email', async () => {
            mockedFetchUser.mockResolvedValue({
                id: '2', name: 'Bob', email: 'bob@test.com', role: 'user',
            });
            const email = await getUserEmail('2');
            expect(email).toBe('bob@test.com');
        });
    });
  src/unrelated/storage.ts: |
    export class StorageAdapter {
        private data: Record<string, string> = {};

        save(key: string, value: string): void {
            this.data[key] = value;
        }

        load(key: string): string | undefined {
            return this.data[key];
        }
    }

    export function syncStorage(): void {
        console.log('syncing storage');
    }
  src/unrelated/notifications.ts: |
    export class Notifier {
        send(message: string): void {
