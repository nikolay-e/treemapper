    }
must_include_files:
  # Unchanged — the service layer that the test exercises. Reviewer
  # needs to see how getUserDisplayName formats the response.
  - src/service.ts
  # Unchanged — the API module being mocked. Reviewer needs to see
  # UserResponse shape to verify mock return values are correct.
  - src/api.ts
must_include_content_from:
  src/service.ts:
    - "getUserDisplayName"
    - "user.name"
  src/api.ts:
    - "UserResponse"
    - "fetchUser"
must_not_include:
  # storage.ts: persistence layer, unrelated to API mocking
  - StorageAdapter
  - syncStorage
  # notifications.ts: notification dispatch, different domain
  - Notifier
  - dispatchNotification
max_fragments: 6
max_files: 4
add_garbage_files: false
skip_garbage_check: true
