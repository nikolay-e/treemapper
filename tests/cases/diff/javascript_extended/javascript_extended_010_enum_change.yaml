# Scenario: enums.ts Status enum gains Cancelled = 'CANCELLED' and OnHold = 'ON_HOLD'.
#   Only enums.ts is changed. task.ts imports Status and is unchanged.
#
# Diff shows:
#   + Cancelled = 'CANCELLED'
#   + OnHold = 'ON_HOLD'
#
# Reviewer questions:
#   Q1: "Who uses Status — do existing consumers need updating for new values?"
#       -> task.ts: imports Status, initializes to Status.Pending, transitions
#          to Status.Completed. The new Cancelled/OnHold values don't break
#          existing code but the reviewer should verify switch/if logic doesn't
#          need new branches.
#
#   Q2: "Is the complete() method the only status transition — should there be
#        cancel() and hold() methods?"
#       -> task.ts: only has complete(). Reviewer might flag missing transitions
#          for the new enum values as a follow-up concern.
#
# Not needed for comprehension:
#   - src/services/taskService.ts: CRUD operations for Task. Imports Status
#     for filtering tasks by status. Direct structural edge: same Status import.
#     But CRUD filtering logic doesn't help review whether the new enum values
#     are correctly named/valued.
#
#   - src/services/statusTransitions.ts: Validates allowed status transitions
#     (e.g., Pending -> Active -> Completed). Imports Status enum. Strong
#     structural edge: USES the exact same enum values. But transition rules
#     are a business logic concern, not needed to review the enum definition.
#
#   - src/utils/statusFormatter.ts: Maps Status values to display labels.
#     Imports Status. Lexical overlap with every enum member. But formatting
#     is a presentation concern unrelated to the type definition.

max_enrichment: 12.4
initial:
  enums.ts: |
    export enum Status {
        Pending = 'PENDING',
        Active = 'ACTIVE',
        Completed = 'COMPLETED',
    }
  task.ts: |
    import { Status } from './enums';

    export class Task {
        status: Status = Status.Pending;

        complete() {
            this.status = Status.Completed;
        }
    }
  # --- Not needed: CRUD for Task, filters by Status ---
  src/services/taskService.ts: |
    import { Status } from '../enums';
    import { Task } from '../task';

    const tasks: Task[] = [];

    export function addTask(): Task {
        const t = new Task();
        tasks.push(t);
        return t;
    }

    export function getTasksByStatus(status: Status): Task[] {
        return tasks.filter(t => t.status === status);
    }

    export function countByStatus(): Record<string, number> {
        const counts: Record<string, number> = {};
        for (const t of tasks) {
            counts[t.status] = (counts[t.status] || 0) + 1;
        }
        return counts;
    }
  # --- Not needed: status transition rules, business logic concern ---
  src/services/statusTransitions.ts: |
    import { Status } from '../enums';

    const ALLOWED_TRANSITIONS: Record<Status, Status[]> = {
        [Status.Pending]: [Status.Active],
        [Status.Active]: [Status.Completed],
        [Status.Completed]: [],
    };

    export function canTransition(from: Status, to: Status): boolean {
        return ALLOWED_TRANSITIONS[from]?.includes(to) ?? false;
    }

    export function getNextStatuses(current: Status): Status[] {
        return ALLOWED_TRANSITIONS[current] ?? [];
    }
  # --- Not needed: display labels, presentation concern ---
  src/utils/statusFormatter.ts: |
    import { Status } from '../enums';

    const STATUS_LABELS: Record<Status, string> = {
        [Status.Pending]: 'Pending Review',
        [Status.Active]: 'In Progress',
        [Status.Completed]: 'Done',
    };

    export function formatStatus(status: Status): string {
        return STATUS_LABELS[status] ?? status;
    }

    export function getStatusColor(status: Status): string {
        switch (status) {
            case Status.Pending: return '#f59e0b';
            case Status.Active: return '#3b82f6';
            case Status.Completed: return '#10b981';
            default: return '#6b7280';
        }
    }

