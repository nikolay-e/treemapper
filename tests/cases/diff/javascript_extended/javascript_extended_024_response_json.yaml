name: javascript_extended_024_response_json
repo:
  initial_files:
    src/handlers/data-handler.ts: |
      import { Request, Response } from 'express';

      export function getDataHandler(req: Request, res: Response) {
          res.json({ message: 'placeholder' });
      }
    src/services/response-service.ts: |
      export interface ApiResponse<T> {
          data: T;
          success: boolean;
          timestamp: number;
      }

      export function createResponse<T>(data: T): ApiResponse<T> {
          return { data, success: true, timestamp: Date.now() };
      }
    src/handlers/status-handler.ts: |
      import { Request, Response } from 'express';
      import { createResponse } from '../services/response-service';

      export function getStatusHandler(req: Request, res: Response) {
          const status = { healthy: true, version: '1.0.0' };
          res.json(createResponse(status));
      }
    src/services/logging-service.ts: |
      interface LogEntry {
          method: string;
          path: string;
          statusCode: number;
          durationMs: number;
          timestamp: Date;
      }

      const logs: LogEntry[] = [];

      export function logRequest(method: string, path: string, statusCode: number, durationMs: number): void {
          logs.push({ method, path, statusCode, durationMs, timestamp: new Date() });
      }

      export function getRecentLogs(limit: number = 100): LogEntry[] {
          return logs.slice(-limit);
      }
    src/middleware/error-handler.ts: |
      import { Request, Response, NextFunction } from 'express';

      export function globalErrorHandler(err: Error, req: Request, res: Response, next: NextFunction): void {
          console.error('Unhandled error:', err.message);
          res.status(500).json({ error: 'Internal server error' });
      }

      export function notFoundHandler(req: Request, res: Response): void {
          res.status(404).json({ error: 'Not found', path: req.path });
      }
  changed_files:
