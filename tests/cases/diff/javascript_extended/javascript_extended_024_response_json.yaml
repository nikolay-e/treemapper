must_include_files:
  # Q1: Response envelope definition. Reviewer needs to see what
  # createResponse wraps around data (success flag + timestamp).
  - src/services/response-service.ts
must_include_content_from:
  src/services/response-service.ts:
    - "ApiResponse"
    - "createResponse"
    - "success: true"
must_not_include:
  # logging-service.ts: request logging, no response-service import
  - LogEntry
  - logRequest
  - getRecentLogs
  # error-handler.ts: error middleware, different concern
  - globalErrorHandler
  - notFoundHandler
  - "Internal server error"
must_not_include_files:
  - src/services/logging-service.ts
  - src/middleware/error-handler.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
