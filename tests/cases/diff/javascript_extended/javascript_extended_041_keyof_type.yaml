    src/getter.ts: |
      import { AppConfig, defaultConfig } from './config';

      type ConfigKey = keyof AppConfig;

      function getConfigValue<K extends ConfigKey>(config: AppConfig, key: K): AppConfig[K] {
          return config[key];
      }

      function getDefaultValue<K extends ConfigKey>(key: K): AppConfig[K] {
          return defaultConfig[key];
      }

      function getAllKeys(): ConfigKey[] {
          return Object.keys(defaultConfig) as ConfigKey[];
      }

      export { ConfigKey, getConfigValue, getDefaultValue, getAllKeys };
