must_include_files:
  - src/getter.ts
  # Q1+Q2: AppConfig interface defines the keys that keyof produces.
  # defaultConfig provides the runtime values getAllKeys enumerates.
  - src/config.ts

must_include_content_from:
  src/getter.ts:
    - "import { AppConfig, defaultConfig } from './config'"
    - "type ConfigKey = keyof AppConfig"
  src/config.ts:
    - "interface AppConfig"
    - "apiUrl: string"
    - "defaultConfig: AppConfig"

must_not_include:
  # --- configLoader.ts: imports AppConfig, but env-loading concern ---
  # HARDEST TRAP: same import source as the diff. Loads config from
  # environment variables. But env-loading doesn't help understand
  # whether keyof AppConfig produces the right key union.
  - loadConfigFromEnv
  - mergeConfigs
  # --- configWatcher.ts: imports AppConfig, filesystem watcher ---
  - ConfigWatcher
  - watchConfig
  # --- configMiddleware.ts: imports AppConfig AND defaultConfig ---
  # Both names appear in the diff's import. But middleware injection
  # doesn't help review type-safe key access patterns.
  - configMiddleware
  - getConfigFromRequest

must_not_include_files:
  - src/services/configLoader.ts
  - src/services/configWatcher.ts
  - src/middleware/configMiddleware.ts

max_fragments: 8
max_files: 3
add_garbage_files: false
