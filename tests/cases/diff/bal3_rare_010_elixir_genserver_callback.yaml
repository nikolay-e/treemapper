  changed_files:
    lib/counter.ex: |
      defmodule Counter do
        use GenServer

        def start_link(opts \\ []) do
          initial = Keyword.get(opts, :initial, 0)
          step = Keyword.get(opts, :step, 1)
          GenServer.start_link(__MODULE__, {initial, step}, name: __MODULE__)
        end

        def increment do
          GenServer.cast(__MODULE__, :increment)
        end

        def decrement do
          GenServer.cast(__MODULE__, :decrement)
        end

        def get_value do
          GenServer.call(__MODULE__, :get)
        end

        def reset do
          GenServer.cast(__MODULE__, :reset)
        end

        @impl true
        def init({initial, step}) do
          {:ok, %{value: initial, step: step, initial: initial}}
        end

        @impl true
        def handle_cast(:increment, state) do
          {:noreply, %{state | value: state.value + state.step}}
        end

        @impl true
        def handle_cast(:decrement, state) do
          {:noreply, %{state | value: state.value - state.step}}
        end

        @impl true
        def handle_cast(:reset, state) do
          {:noreply, %{state | value: state.initial}}
        end

        @impl true
        def handle_call(:get, _from, state) do
          {:reply, state.value, state}
        end
      end
  commit_message: "add step, decrement, reset to Counter GenServer"
