repo:
  initial_files:
    lib/event.rb: |
      class Event
        attr_reader :name, :payload

        def initialize(name, payload = {})
          @name = name
          @payload = payload
        end
      end
    lib/event_dispatcher.rb: |
      class EventDispatcher
        def initialize
          @listeners = Hash.new { |h, k| h[k] = [] }
        end

        def on(event_name, &block)
          @listeners[event_name] << block
        end

        def emit(event)
          @listeners[event.name].each { |listener| listener.call(event) }
        end
      end
    spec/event_dispatcher_spec.rb: |
      require_relative '../lib/event'
      require_relative '../lib/event_dispatcher'

      RSpec.describe EventDispatcher do
        subject { described_class.new }

        describe '#on and #emit' do
          it 'calls registered listener' do
            received = nil
            subject.on('click') { |e| received = e.payload }
            subject.emit(Event.new('click', { button: 'left' }))
            expect(received).to eq({ button: 'left' })
          end

          it 'handles multiple listeners' do
            count = 0
            subject.on('tick') { count += 1 }
            subject.on('tick') { count += 1 }
            subject.emit(Event.new('tick'))
            expect(count).to eq(2)
          end

          it 'ignores unregistered events' do
            subject.emit(Event.new('unknown'))
          end
        end
      end
    lib/logger.rb: |
      class Logger
        def initialize(output = $stdout)
          @output = output
        end

        def info(msg)
          @output.puts "[INFO] #{msg}"
        end

        def error(msg)
          @output.puts "[ERROR] #{msg}"
        end
      end
    lib/config_loader.rb: |
      class ConfigLoader
        def self.load(path)
