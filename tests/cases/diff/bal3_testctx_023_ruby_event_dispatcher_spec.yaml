    lib/serializer.rb: |
      require 'json'

      class Serializer
        def self.to_json(obj)
          JSON.generate(obj)
        end

        def self.from_json(str)
          JSON.parse(str)
        end
      end
  changed_files:
    lib/event_dispatcher.rb: |
      class EventDispatcher
        def initialize
          @listeners = Hash.new { |h, k| h[k] = [] }
          @once_listeners = Hash.new { |h, k| h[k] = [] }
          @history = []
        end

        def on(event_name, &block)
          @listeners[event_name] << block
        end

        def once(event_name, &block)
          @once_listeners[event_name] << block
        end

        def off(event_name)
          @listeners.delete(event_name)
          @once_listeners.delete(event_name)
        end

        def emit(event)
          @history << event
          @listeners[event.name].each { |listener| listener.call(event) }
          @once_listeners[event.name].each { |listener| listener.call(event) }
          @once_listeners.delete(event.name)
        end

        def history
          @history.dup
        end

        def clear_history
          @history.clear
        end
      end
    lib/event.rb: |
      class Event
        attr_reader :name, :payload, :timestamp

        def initialize(name, payload = {})
          @name = name
          @payload = payload
          @timestamp = Time.now
        end
      end
  commit_message: "feat: add once, off, event history, and timestamp"
