name: csharp_026_async_disposable
tags:
- lang:ruby
- change:signature
- context:import_chain
- distance:3hop+
- difficulty:medium
repo:
  initial_files:
    lib/core/middleware.rb: |
      module Core
        module Middleware
          def call(env)
            raise NotImplementedError
          end
        end
      end
    lib/core/rack_app.rb: |
      require_relative 'middleware'

      module Core
        class RackApp
          def initialize
            @middlewares = []
          end

          def use(middleware_class, *args)
            @middlewares << [middleware_class, args]
            self
          end

          def call(env)
            build_stack.call(env)
          end

          private

          def build_stack
            app = ->(env) { [200, {}, ['OK']] }
            @middlewares.reverse.reduce(app) do |inner, (klass, args)|
              klass.new(inner, *args)
            end
          end
        end
      end
    lib/middleware/auth_middleware.rb: |
      require_relative '../core/middleware'

      module Middleware
        class AuthMiddleware
          include Core::Middleware

          def initialize(app)
            @app = app
          end

          def call(env)
            token = env['HTTP_AUTHORIZATION']
            if token.nil?
              [401, {}, ['Unauthorized']]
            else
              @app.call(env)
            end
          end
        end
      end
    lib/middleware/cors_middleware.rb: |
      require_relative '../core/middleware'

      module Middleware
        class CorsMiddleware
          include Core::Middleware

          def initialize(app, allowed_origins: ['*'])
            @app = app
            @allowed_origins = allowed_origins
          end

          def call(env)
            status, headers, body = @app.call(env)
            headers['Access-Control-Allow-Origin'] = @allowed_origins.join(', ')
            [status, headers, body]
          end
        end
      end
    lib/app/server.rb: |
      require_relative '../core/rack_app'
      require_relative '../middleware/auth_middleware'
      require_relative '../middleware/cors_middleware'

      module App
        def self.build
          Core::RackApp.new
            .use(Middleware::CorsMiddleware, allowed_origins: ['https://example.com'])
            .use(Middleware::AuthMiddleware)
        end
      end
    lib/utils/logger.rb: |
      GARBAGE_CSHARP026_A = 'rack_logger_format'

      module Utils
        class Logger
          def log(level, msg)
            puts "[#{level}] #{msg}"
          end
        end
      end
    lib/config/env.rb: |
      GARBAGE_CSHARP026_B = 'environment_production'
      GARBAGE_CSHARP026_C = 'rack_env'

      module Config
        ENV_NAME = ENV.fetch('RACK_ENV', 'development')
      end
    lib/monitoring/request_timer.rb: |
      GARBAGE_CSHARP026_D = 'request_timer_metric'

      module Monitoring
        class RequestTimer
          def measure
            start = Time.now
            yield
            Time.now - start
          end
        end
      end
  changed_files:
    lib/core/middleware.rb: |
      module Core
        module Middleware
          def call(env)
            raise NotImplementedError
          end
        end
      end
    lib/core/rack_app.rb: |
      require_relative 'middleware'

      module Core
        class RackApp
          def initialize
            @middlewares = []
          end

          def use(middleware_class, *args, **kwargs)
            @middlewares << [middleware_class, args, kwargs]
            self
          end

          def call(env)
            build_stack.call(env)
          end

          private

          def build_stack
            app = ->(env) { [200, {}, ['OK']] }
            @middlewares.reverse.reduce(app) do |inner, (klass, args, kwargs)|
              klass.new(inner, *args, **kwargs)
            end
          end
        end
      end
    lib/middleware/auth_middleware.rb: |
      require_relative '../core/middleware'

      module Middleware
        class AuthMiddleware
          include Core::Middleware

          def initialize(app, realm: 'Application')
            @app = app
            @realm = realm
          end

          def call(env)
            token = env['HTTP_AUTHORIZATION']
            if token.nil?
              [401, { 'WWW-Authenticate' => "Bearer realm=\"#{@realm}\"" }, ['Unauthorized']]
            else
              @app.call(env)
            end
          end
        end
      end
    lib/middleware/cors_middleware.rb: |
      require_relative '../core/middleware'

      module Middleware
        class CorsMiddleware
          include Core::Middleware

          def initialize(app, allowed_origins: ['*'])
            @app = app
            @allowed_origins = allowed_origins
          end

          def call(env)
            status, headers, body = @app.call(env)
            headers['Access-Control-Allow-Origin'] = @allowed_origins.join(', ')
            [status, headers, body]
          end
        end
      end
    lib/app/server.rb: |
      require_relative '../core/rack_app'
      require_relative '../middleware/auth_middleware'
      require_relative '../middleware/cors_middleware'

      module App
        def self.build
          Core::RackApp.new
            .use(Middleware::CorsMiddleware, allowed_origins: ['https://example.com'])
            .use(Middleware::AuthMiddleware, realm: 'MyApp')
        end
      end
    lib/utils/logger.rb: |
      GARBAGE_CSHARP026_A = 'rack_logger_format'

      module Utils
        class Logger
          def log(level, msg)
            puts "[#{level}] #{msg}"
          end
        end
      end
    lib/config/env.rb: |
      GARBAGE_CSHARP026_B = 'environment_production'
      GARBAGE_CSHARP026_C = 'rack_env'

      module Config
        ENV_NAME = ENV.fetch('RACK_ENV', 'development')
      end
    lib/monitoring/request_timer.rb: |
      GARBAGE_CSHARP026_D = 'request_timer_metric'

      module Monitoring
        class RequestTimer
          def measure
            start = Time.now
            yield
            Time.now - start
          end
        end
      end
