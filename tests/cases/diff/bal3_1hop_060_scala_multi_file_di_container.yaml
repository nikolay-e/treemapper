  changed_files:
    src/main/scala/di/Container.scala: |
      package di

      class Container {
        private var bindings: Map[String, () => Any] = Map.empty
        private var singletons: Map[String, Any] = Map.empty

        def register[T](name: String, factory: () => T): Unit = {
          bindings = bindings + (name -> factory)
        }

        def registerSingleton[T](name: String, factory: () => T): Unit = {
          bindings = bindings + (name -> factory)
          singletons = singletons + (name -> factory())
        }

        def resolve[T](name: String): T = {
          singletons.get(name) match {
            case Some(instance) => instance.asInstanceOf[T]
            case None => bindings(name)().asInstanceOf[T]
          }
        }

        def has(name: String): Boolean = {
          bindings.contains(name) || singletons.contains(name)
        }

        def reset(): Unit = {
          bindings = Map.empty
          singletons = Map.empty
        }
      }
    src/main/scala/di/ServiceProvider.scala: |
      package di

      class ServiceProvider(container: Container) {
        def registerAll(): Unit = {
          container.register("greeting", () => "Hello, World!")
          container.registerSingleton("config", () => Map("env" -> "production"))
        }

        def isRegistered(name: String): Boolean = {
          container.has(name)
        }
      }
  commit_message: "Add singleton support, has check, and reset to DI Container"
