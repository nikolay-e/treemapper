    telemetry/checksum.py: |
      def verify_crc(data: bytes) -> bool:
          if len(data) < 3:
              return False
          body = data[:-2]
          expected = int.from_bytes(data[-2:], 'big')
          computed = sum(body) & 0xFFFF
          return computed == expected

      def compute_crc(data: bytes) -> int:
          return sum(data) & 0xFFFF
