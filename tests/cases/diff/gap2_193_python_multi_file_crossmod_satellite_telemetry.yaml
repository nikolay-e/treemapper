    telemetry/decoder.py: |
      from telemetry.frame import TelemetryFrame
      from telemetry.checksum import verify_crc

      class PacketDecoder:
          def __init__(self, channel_id: str):
              self.channel_id = channel_id

          def decode(self, raw_bytes: bytes) -> TelemetryFrame:
              if not verify_crc(raw_bytes):
                  raise ValueError("CRC mismatch")
              timestamp = int.from_bytes(raw_bytes[:4], 'big')
              payload = raw_bytes[4:-2]
              return TelemetryFrame(timestamp, payload)

          def decode_batch(self, packets: list[bytes]) -> list[TelemetryFrame]:
              frames = []
              for pkt in packets:
                  try:
                      frames.append(self.decode(pkt))
                  except ValueError:
                      continue
              return frames
    telemetry/aggregator.py: |
      from telemetry.frame import TelemetryFrame

      class SignalAggregator:
          def __init__(self):
              self._frames: list[TelemetryFrame] = []

          def ingest(self, frame: TelemetryFrame) -> None:
              self._frames.append(frame)

          def average_size(self) -> float:
              if not self._frames:
                  return 0.0
              return sum(f.size() for f in self._frames) / len(self._frames)

          def filter_by_min_size(self, min_bytes: int) -> list[TelemetryFrame]:
              return [f for f in self._frames if f.size() >= min_bytes]
