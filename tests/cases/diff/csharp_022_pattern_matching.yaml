name: csharp_022_pattern_matching
tags:
- lang:typescript
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    src/components/Alert.tsx: |
      import React from 'react';

      interface AlertProps {
        message: string;
        type: 'info' | 'success' | 'warning' | 'error';
      }

      export const Alert: React.FC<AlertProps> = ({ message, type }) => (
        <div className={`alert alert-${type}`}>{message}</div>
      );
    src/components/Avatar.tsx: |
      import React from 'react';

      interface AvatarProps {
        src?: string;
        alt: string;
        size?: number;
      }

      export const Avatar: React.FC<AvatarProps> = ({ src, alt, size = 40 }) => (
        <img
          src={src ?? `https://ui-avatars.com/api/?name=${encodeURIComponent(alt)}`}
          alt={alt}
          width={size}
          height={size}
          className="avatar"
        />
      );
    garbage/animations.ts: |
      const GARBAGE_CS022_ANIM_A = "animations_marker";
      export function fadeIn(el: HTMLElement): void {}
    garbage/breakpoints.ts: |
      const GARBAGE_CS022_BP_B = "breakpoints_marker";
      export const MOBILE = 768;
    garbage/zindex.ts: |
      const GARBAGE_CS022_ZIDX_C = "zindex_marker";
      export const MODAL_Z = 1000;
  changed_files:
    src/components/Alert.tsx: |
      import React from 'react';

      interface AlertProps {
        message: string;
        type: 'info' | 'success' | 'warning' | 'error';
        dismissible?: boolean;
        onDismiss?: () => void;
        icon?: React.ReactNode;
      }

      export const Alert: React.FC<AlertProps> = ({
        message,
        type,
        dismissible = false,
        onDismiss,
        icon,
      }) => (
        <div className={`alert alert-${type}`} role="alert">
          {icon && <span className="alert-icon">{icon}</span>}
          <span className="alert-message">{message}</span>
          {dismissible && (
            <button className="alert-close" onClick={onDismiss} aria-label="Dismiss">
              ×
            </button>
          )}
        </div>
      );
    src/components/Avatar.tsx: |
      import React from 'react';

      type AvatarShape = 'circle' | 'square';

      interface AvatarProps {
        src?: string;
        alt: string;
        size?: number;
        shape?: AvatarShape;
        online?: boolean;
      }

      export const Avatar: React.FC<AvatarProps> = ({
        src,
        alt,
        size = 40,
        shape = 'circle',
        online,
      }) => (
        <div className={`avatar-wrapper avatar-${shape}`} style={{ width: size, height: size }}>
          <img
            src={src ?? `https://ui-avatars.com/api/?name=${encodeURIComponent(alt)}`}
            alt={alt}
            width={size}
            height={size}
          />
          {online !== undefined && (
            <span className={`avatar-status ${online ? 'online' : 'offline'}`} />
          )}
        </div>
      );
    garbage/animations.ts: |
      const GARBAGE_CS022_ANIM_A = "animations_marker";
      export function fadeIn(el: HTMLElement): void {}
    garbage/breakpoints.ts: |
      const GARBAGE_CS022_BP_B = "breakpoints_marker";
      export const MOBILE = 768;
    garbage/zindex.ts: |
      const GARBAGE_CS022_ZIDX_C = "zindex_marker";
      export const MODAL_Z = 1000;
  commit_message: "feat: add dismissible/icon to Alert and shape/online to Avatar"
