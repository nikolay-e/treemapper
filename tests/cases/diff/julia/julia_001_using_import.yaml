  src/pipeline.jl: |
    using DataProcessor: transform, validate, normalize

    function run_pipeline(raw_data::Vector{Float64}, scale::Float64)
        if !validate(raw_data)
            error("Invalid data")
        end
        return transform(raw_data, scale)
    end

    function run_full_pipeline(raw_data::Vector{Float64}, scale::Float64)
        if !validate(raw_data)
            error("Invalid data")
        end
        normalized = normalize(raw_data)
        return transform(normalized, scale)
    end

    function run_batch_pipeline(datasets::Vector{Vector{Float64}}, scale::Float64)
        return [run_full_pipeline(d, scale) for d in datasets if validate(d)]
    end

