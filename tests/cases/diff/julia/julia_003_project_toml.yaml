    JSON = "0.21"
    DataFrames = "1.6"
    julia = "1.6"

  src/report.jl: |
    using JSON
    using Dates
    using Statistics
    using DataFrames

    struct ReportEntry
        sensor_id::String
        date::Date
        avg_value::Float64
        count::Int
    end

    function generate_report(entries::Vector{ReportEntry})::String
        return JSON.json(Dict(
            "total_entries" => length(entries),
            "sensors" => length(unique([e.sensor_id for e in entries]))
        ))
    end

    function build_report_dataframe(entries::Vector{ReportEntry})::DataFrame
        df = DataFrame(
            sensor_id = [e.sensor_id for e in entries],
            date = [e.date for e in entries],
            avg_value = [e.avg_value for e in entries],
            count = [e.count for e in entries]
        )
        return sort(df, :date)
    end

    function summarize_by_sensor(df::DataFrame)::DataFrame
        return combine(
            groupby(df, :sensor_id),
            :avg_value => mean => :mean_value,
            :count => sum => :total_count,
            nrow => :num_entries
        )
    end

