    - 'DataFrames = "1.6"'
  src/report.jl:
    - "using DataFrames"
    - "function build_report_dataframe"
    - "DataFrame("
    - "function summarize_by_sensor(df::DataFrame)"
    - "groupby(df, :sensor_id)"

