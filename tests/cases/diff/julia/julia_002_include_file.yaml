# Scenario: A Julia main module uses `include("...")` to compose its source from
# multiple files. The change adds `include("analysis.jl")` and the new file
# provides analysis functions that operate on types from the existing includes.
#
# Diff: src/MyPackage.jl adds `include("analysis.jl")` and a new file
# src/analysis.jl provides outlier detection and summary statistics.
#
# Reviewer questions:
#   Q1: "What does the new analysis.jl provide?"
#       -> src/analysis.jl: detect_outliers and summarize functions operating
#          on Measurement type from types.jl.
#
#   Q2: "What is the Measurement type used by analysis.jl?"
#       -> src/types.jl (UNCHANGED): struct Measurement with value, timestamp,
#          sensor_id fields. Already included before analysis.jl.
#
# Not needed for comprehension:
#   - src/utils.jl: Existing included file with helper utilities.
#     Same inclusion pattern, same directory, but provides string/path helpers.
#
#   - src/plotting.jl: Another included file for visualization.
#     Same directory, same include pattern, but handles output, not analysis.
#
#   - src/constants.jl: Constants file, also included.
#     Same pattern but only defines constant values.

