changed:
  src/MyPackage.jl: |
    module MyPackage

    include("types.jl")
    include("utils.jl")
    include("constants.jl")
    include("plotting.jl")
    include("analysis.jl")

    export Measurement, process_measurements, detect_outliers, summarize

    function process_measurements(data::Vector{Measurement})
        filtered = filter(m -> m.value > THRESHOLD, data)
        return [format_measurement(m) for m in filtered]
    end

    end # module

  src/analysis.jl: |
    function detect_outliers(data::Vector{Measurement}, threshold::Float64)::Vector{Measurement}
        values = [m.value for m in data]
        mu = sum(values) / length(values)
        sigma = sqrt(sum((values .- mu) .^ 2) / length(values))
        return filter(m -> abs(m.value - mu) > threshold * sigma, data)
    end

    function summarize(data::Vector{Measurement})::Dict{String, Any}
        values = [m.value for m in data]
        return Dict(
            "count" => length(values),
            "mean" => sum(values) / length(values),
            "min" => minimum(values),
            "max" => maximum(values),
            "sensors" => length(unique([m.sensor_id for m in data]))
        )
    end

    function group_by_sensor(data::Vector{Measurement})::Dict{String, Vector{Measurement}}
        groups = Dict{String, Vector{Measurement}}()
        for m in data
            if !haskey(groups, m.sensor_id)
                groups[m.sensor_id] = Measurement[]
            end
            push!(groups[m.sensor_id], m)
        end
        return groups
    end

