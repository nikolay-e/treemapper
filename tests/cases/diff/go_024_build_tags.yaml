name: go_024_build_tags
tags:
- lang:go
- change:multi_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    internal/platform/platform.go: |
      package platform

      type PlatformInfo struct {
          OS       string
          Arch     string
          Version  string
          Features []string
      }

      type SystemResources struct {
          CPUCores    int
          MemoryTotal uint64
          MemoryFree  uint64
      }
    internal/platform/platform_linux.go: |
      //go:build linux

      package platform

      import (
          "runtime"
          "syscall"
      )

      func GetPlatformInfo() *PlatformInfo {
          return &PlatformInfo{OS: "linux", Arch: runtime.GOARCH}
      }

      func GetSystemResources() (*SystemResources, error) {
          var stat syscall.Sysinfo_t
          if err := syscall.Sysinfo(&stat); err != nil {
              return nil, err
          }
          return &SystemResources{
              CPUCores:    runtime.NumCPU(),
              MemoryTotal: stat.Totalram * uint64(stat.Unit),
              MemoryFree:  stat.Freeram * uint64(stat.Unit),
          }, nil
      }
    internal/platform/platform_darwin.go: |
      //go:build darwin

      package platform

      import "runtime"

      func GetPlatformInfo() *PlatformInfo {
          return &PlatformInfo{OS: "darwin", Arch: runtime.GOARCH}
      }

      func GetSystemResources() (*SystemResources, error) {
          return &SystemResources{CPUCores: runtime.NumCPU()}, nil
      }
    internal/platform/platform_windows.go: |
      //go:build windows

      package platform

      import "runtime"

      func GetPlatformInfo() *PlatformInfo {
          return &PlatformInfo{OS: "windows", Arch: runtime.GOARCH}
      }

      func GetSystemResources() (*SystemResources, error) {
          return &SystemResources{CPUCores: runtime.NumCPU()}, nil
      }
    internal/diagnostics/report.go: |
      package diagnostics

      import (
          "fmt"

          "example.com/app/internal/platform"
      )

      type Report struct {
          Platform *platform.PlatformInfo
          Memory   uint64
      }

      func Generate() (*Report, error) {
          info := platform.GetPlatformInfo()
          res, err := platform.GetSystemResources()
          if err != nil {
              return nil, err
          }
          return &Report{
              Platform: info,
              Memory:   res.MemoryTotal,
          }, nil
      }

      func Format(r *Report) string {
          return fmt.Sprintf("%s/%s: %d MB", r.Platform.OS, r.Platform.Arch, r.Memory/1024/1024)
      }
    internal/diagnostics/health.go: |
      package diagnostics

      type HealthCheck struct {
          Name   string
          Status string
      }

      func RunHealthChecks() []HealthCheck {
          return []HealthCheck{{Name: "ping", Status: "ok"}}
      }
    internal/platform/config.go: |
      package platform

      type Config struct {
          DataDir   string
          ConfigDir string
      }

      func DefaultConfig() *Config {
          return &Config{DataDir: "/data", ConfigDir: "/config"}
      }
    cmd/server/main.go: |
      package main

      import (
          "fmt"

          "example.com/app/internal/diagnostics"
      )

      func main() {
          r, err := diagnostics.Generate()
          if err != nil {
              return
          }
          fmt.Println(diagnostics.Format(r))
      }
