repo:
  initial_files:
    src/Collections/BoundedStack.cs: |
      namespace Collections;

      public class BoundedStack<T>
      {
          private readonly T[] _items;
          private int _top = -1;

          public BoundedStack(int capacity)
          {
              _items = new T[capacity];
          }

          public bool Push(T item)
          {
              if (_top >= _items.Length - 1) return false;
              _items[_top] = item;
              _top++;
              return true;
          }

          public T? Pop()
          {
              if (_top < 0) return default;
              return _items[_top--];
          }

          public int Count => _top + 1;
      }
    tests/Collections/BoundedStackTests.cs: |
      using Xunit;
      using Collections;

      public class BoundedStackTests
      {
          [Fact]
          public void Push_WithinCapacity_ReturnsTrue()
          {
              var stack = new BoundedStack<int>(3);
              Assert.True(stack.Push(1));
          }

          [Fact]
          public void Pop_FromEmpty_ReturnsDefault()
          {
              var stack = new BoundedStack<int>(3);
              Assert.Equal(0, stack.Pop());
          }

          [Fact]
          public void Push_BeyondCapacity_ReturnsFalse()
          {
              var stack = new BoundedStack<int>(1);
              stack.Push(1);
              Assert.False(stack.Push(2));
          }
      }
