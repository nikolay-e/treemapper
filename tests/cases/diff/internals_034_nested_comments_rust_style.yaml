    src/main/java/com/shop/pricing/DiscountService.java: |
      package com.shop.pricing;

      import java.math.BigDecimal;
      import java.util.List;

      public class DiscountService {
          private final DiscountRepository repository;

          public DiscountService(DiscountRepository repository) {
              this.repository = repository;
          }

          public BigDecimal applyDiscount(BigDecimal price, String couponCode) {
              Discount discount = repository.findByCoupon(couponCode);
              if (discount == null) {
                  return price;
              }
              return price.subtract(price.multiply(discount.getRate()));
          }

          public BigDecimal applyBulkDiscount(BigDecimal price, int quantity, BigDecimal threshold) {
              if (quantity <= 0) {
                  throw new IllegalArgumentException("quantity must be positive");
              }
              BigDecimal total = price.multiply(BigDecimal.valueOf(quantity));
              if (total.compareTo(threshold) >= 0) {
                  return total.subtract(total.multiply(new BigDecimal("0.05")));
              }
              return total;
          }

          public BigDecimal applyStackedDiscounts(BigDecimal price, List<String> couponCodes) {
              BigDecimal result = price;
              for (String code : couponCodes) {
                  result = applyDiscount(result, code);
              }
              return result;
          }
      }
