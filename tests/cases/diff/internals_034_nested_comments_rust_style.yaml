    src/test/java/com/shop/pricing/DiscountServiceTest.java: |
      package com.shop.pricing;

      import org.junit.jupiter.api.Test;
      import java.math.BigDecimal;
      import java.util.List;
      import static org.junit.jupiter.api.Assertions.*;

      class DiscountServiceTest {
          private final InMemoryDiscountRepository repo = new InMemoryDiscountRepository();
          private final DiscountService service = new DiscountService(repo);

          @Test
          void applyDiscount_knownCoupon_reducesPrice() {
              repo.save(new Discount("SAVE10", new BigDecimal("0.10")));
              BigDecimal result = service.applyDiscount(new BigDecimal("100.00"), "SAVE10");
              assertEquals(new BigDecimal("90.000"), result);
          }

          @Test
          void applyDiscount_unknownCoupon_returnsOriginalPrice() {
              BigDecimal result = service.applyDiscount(new BigDecimal("50.00"), "INVALID");
              assertEquals(new BigDecimal("50.00"), result);
          }

          @Test
          void applyBulkDiscount_aboveThreshold_applies5Percent() {
              BigDecimal result = service.applyBulkDiscount(new BigDecimal("20.00"), 10, new BigDecimal("150.00"));
              assertEquals(new BigDecimal("190.000"), result);
          }

          @Test
          void applyBulkDiscount_zeroQuantity_throwsException() {
              assertThrows(IllegalArgumentException.class,
                  () -> service.applyBulkDiscount(new BigDecimal("10.00"), 0, new BigDecimal("50.00")));
          }

          @Test
          void applyStackedDiscounts_multipleCoupons_appliedSequentially() {
              repo.save(new Discount("A10", new BigDecimal("0.10")));
              repo.save(new Discount("B20", new BigDecimal("0.20")));
              BigDecimal result = service.applyStackedDiscounts(new BigDecimal("100.00"), List.of("A10", "B20"));
              assertTrue(result.compareTo(new BigDecimal("72.00")) == 0);
          }
      }
