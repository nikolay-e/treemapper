  selector:
    anchor: "if subtotal <= 0"
- id: test_zero_subtotal
  selector:
    anchor: "def test_zero_subtotal_no_discount()"
- id: apply_discount_func
  selector:
    anchor: "def apply_discount(amount: float, code: str) -> float"
- id: no_garbage_a
  selector:
    anchor: GARBAGE_JMAT_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_JMAT_B
- id: no_garbage_c
