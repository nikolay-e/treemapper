repo:
  initial_files:
    src/LinearSolver.jl: |
      module LinearSolver

      export solve_system, determinant

      function solve_system(A::Matrix{Float64}, b::Vector{Float64})::Vector{Float64}
          return A \ b
      end

      function determinant(A::Matrix{Float64})::Float64
          n = size(A, 1)
          if n == 1
              return A[1, 1]
          end
          return det_recursive(A, n)
      end

      function det_recursive(A::Matrix{Float64}, n::Int)::Float64
          if n == 2
              return A[1,1] * A[2,2] - A[1,2] * A[2,1]
          end
          result = 0.0
          for j in 1:n
              result += (-1)^(j+1) * A[1,j] * determinant(A[2:end, [1:j-1; j+1:end]])
          end
          return result
      end

      end
    src/Decomposition.jl: |
      module Decomposition

      export lu_decompose, cholesky_decompose

      function lu_decompose(A::Matrix{Float64})::Tuple{Matrix{Float64}, Matrix{Float64}}
          n = size(A, 1)
          L = zeros(n, n)
          U = copy(A)
          for i in 1:n
              L[i, i] = 1.0
          end
          return (L, U)
      end

      function cholesky_decompose(A::Matrix{Float64})::Matrix{Float64}
          n = size(A, 1)
          L = zeros(n, n)
          for i in 1:n
              L[i, i] = sqrt(A[i, i])
          end
          return L
      end

      end
    src/Interpolation.jl: |
      module Interpolation

      GARBAGE_GAP2_049_INTERP_A = "lagrange"
      GARBAGE_GAP2_049_DEGREE_B = 3

      function lagrange(x::Vector{Float64}, y::Vector{Float64}, t::Float64)::Float64
          n = length(x)
          result = 0.0
          for i in 1:n
              term = y[i]
              for j in 1:n
                  if i != j
                      term *= (t - x[j]) / (x[i] - x[j])
                  end
              end
              result += term
          end
          return result
      end

      end
    src/Regression.jl: |
      module Regression

      GARBAGE_GAP2_049_FIT_C = "least_squares"
      GARBAGE_GAP2_049_ITER_D = 100

      function fit_linear(x::Vector{Float64}, y::Vector{Float64})::Tuple{Float64, Float64}
          n = length(x)
          sx = sum(x)
          sy = sum(y)
          slope = (n * sum(x .* y) - sx * sy) / (n * sum(x .^ 2) - sx^2)
          intercept = (sy - slope * sx) / n
          return (slope, intercept)
      end

      end
  changed_files:
    src/LinearSolver.jl: |
      module LinearSolver

      export solve_system, determinant, is_singular

      function solve_system(A::Matrix{Float64}, b::Vector{Float64})::Vector{Float64}
          if is_singular(A)
              error("Matrix is singular")
          end
          return A \ b
      end

      function is_singular(A::Matrix{Float64})::Bool
          return abs(determinant(A)) < 1e-12
      end

      function determinant(A::Matrix{Float64})::Float64
          n = size(A, 1)
          if n == 1
              return A[1, 1]
          end
          return det_recursive(A, n)
      end

      function det_recursive(A::Matrix{Float64}, n::Int)::Float64
          if n == 2
              return A[1,1] * A[2,2] - A[1,2] * A[2,1]
          end
          result = 0.0
          for j in 1:n
              result += (-1)^(j+1) * A[1,j] * determinant(A[2:end, [1:j-1; j+1:end]])
          end
          return result
      end

      end
    src/Decomposition.jl: |
      module Decomposition

      export lu_decompose, cholesky_decompose, is_positive_definite

      function lu_decompose(A::Matrix{Float64})::Tuple{Matrix{Float64}, Matrix{Float64}}
          n = size(A, 1)
          L = zeros(n, n)
          U = copy(A)
          for i in 1:n
              L[i, i] = 1.0
          end
          return (L, U)
      end

      function is_positive_definite(A::Matrix{Float64})::Bool
          n = size(A, 1)
          for i in 1:n
              if A[i, i] <= 0.0
                  return false
              end
          end
          return true
      end

      function cholesky_decompose(A::Matrix{Float64})::Matrix{Float64}
          if !is_positive_definite(A)
              error("Matrix is not positive definite")
          end
          n = size(A, 1)
          L = zeros(n, n)
          for i in 1:n
              L[i, i] = sqrt(A[i, i])
          end
          return L
      end

      end
