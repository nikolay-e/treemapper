        data: Record<string, unknown>;
      }

      export interface Transition {
        from: string;
        to: string;
        event: string;
      }

      export function createTransition(from: string, event: string, to: string): Transition {
        return { from, to, event };
      }
    src/workflows/checkout.ts: |
      import { StateMachine } from "../fsm/machine";
      import { createTransition } from "../fsm/definitions";

      const transitions = [
        createTransition("cart", "begin", "shipping"),
        createTransition("shipping", "confirm_address", "payment"),
        createTransition("payment", "pay", "confirmation"),
        createTransition("confirmation", "finish", "complete"),
