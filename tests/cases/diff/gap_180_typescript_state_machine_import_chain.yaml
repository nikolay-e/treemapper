repo:
  initial_files:
    src/fsm/machine.ts: |
      import { State, Transition } from "./definitions";

      export class StateMachine {
        private current: State;
        private transitions: Transition[];

        constructor(initial: State, transitions: Transition[]) {
          this.current = initial;
          this.transitions = transitions;
        }

        send(event: string): State {
          const match = this.transitions.find(
            (t) => t.from === this.current.name && t.event === event
          );
          if (!match) throw new Error(`No transition for ${event} from ${this.current.name}`);
          this.current = { name: match.to, data: {} };
          return this.current;
        }

        getState(): State {
          return this.current;
        }
      }
    src/fsm/definitions.ts: |
