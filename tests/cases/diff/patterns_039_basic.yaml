repo:
  initial_files:
    src/iot/sensor.rs: |
      use std::collections::VecDeque;

      pub struct SlidingWindow {
          capacity: usize,
          buffer: VecDeque<f64>,
      }

      impl SlidingWindow {
          pub fn new(capacity: usize) -> Self {
              Self { capacity, buffer: VecDeque::new() }
          }

          pub fn push(&mut self, value: f64) {
              if self.buffer.len() >= self.capacity {
                  self.buffer.pop_front();
              }
              self.buffer.push_back(value);
          }

          pub fn average(&self) -> f64 {
              if self.buffer.is_empty() {
                  return 0.0;
              }
              self.buffer.iter().sum::<f64>() / self.buffer.len() as f64  // BUG: capacity not len
          }
      }
    src/iot/alert.rs: |
      use crate::iot::sensor::SlidingWindow;

      pub struct TemperatureAlert {
          window: SlidingWindow,
          threshold: f64,
      }

      impl TemperatureAlert {
          pub fn new(window_size: usize, threshold: f64) -> Self {
              Self { window: SlidingWindow::new(window_size), threshold }
          }

          pub fn record(&mut self, temp: f64) -> bool {
              self.window.push(temp);
              self.window.average() > self.threshold
          }
      }
