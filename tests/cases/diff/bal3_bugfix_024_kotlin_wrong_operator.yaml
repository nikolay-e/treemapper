  changed_files:
    src/main/kotlin/search/Filter.kt: |
      package search

      data class Product(val name: String, val price: Double, val inStock: Boolean)

      class Filter {
          fun affordable(products: List<Product>, maxPrice: Double): List<Product> {
              return products.filter { it.price <= maxPrice && it.inStock }
          }

          fun available(products: List<Product>): List<Product> {
              return products.filter { it.inStock }
          }
      }
  commit_message: "fix: use && instead of || and <= instead of < in affordable filter"
