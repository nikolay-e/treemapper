    tests/test_schema.py: |
      import pytest

      class SchemaTestHelper:
          def __init__(self, db):
              self.db = db
              self.applied_versions: list[int] = []

          def run_migration(self, version: int, sql: str) -> bool:
              self.db.query(sql)
              self.applied_versions.append(version)
              return True

          def rollback_migration(self, version: int) -> bool:
              if version in self.applied_versions:
                  self.applied_versions.remove(version)
                  return True
              return False

      @pytest.fixture
      def schema_helper(db):
          helper = SchemaTestHelper(db)
          yield helper

      def test_migration_applies_schema(schema_helper):
          result = schema_helper.run_migration(1, "CREATE TABLE test (id INT)")
          assert result is True
          assert 1 in schema_helper.applied_versions

      def test_migration_rollback(schema_helper):
          schema_helper.run_migration(1, "CREATE TABLE test (id INT)")
          result = schema_helper.rollback_migration(1)
          assert result is True
          assert 1 not in schema_helper.applied_versions
    src/connection_pool.py: |
      import logging
      from threading import Lock

      logger = logging.getLogger(__name__)

      MAX_IDLE_TIME_SECONDS = 300
      POOL_CLEANUP_INTERVAL = 60

      class PooledConnection:
          def __init__(self, connection_id: int):
              self.connection_id = connection_id
              self.in_use = False
              self.created_at: float = 0.0
              self.last_used_at: float = 0.0

          def mark_in_use(self):
              self.in_use = True

          def mark_idle(self):
              self.in_use = False

      class ManagedPool:
          def __init__(self, max_size: int = 20):
              self.max_size = max_size
              self._connections: list[PooledConnection] = []
              self._lock = Lock()
              self._next_id = 0

          def acquire(self) -> PooledConnection:
              with self._lock:
                  for conn in self._connections:
                      if not conn.in_use:
                          conn.mark_in_use()
                          return conn
                  if len(self._connections) < self.max_size:
                      conn = PooledConnection(self._next_id)
                      self._next_id += 1
                      conn.mark_in_use()
                      self._connections.append(conn)
                      return conn
              raise RuntimeError("Pool exhausted")

          def release(self, conn: PooledConnection) -> None:
              conn.mark_idle()

          def active_count(self) -> int:
              return sum(1 for c in self._connections if c.in_use)
