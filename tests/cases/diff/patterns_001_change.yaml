      import os
      import random
      import string
      import tempfile

      TEMP_DIR_PREFIX = "test_fixtures_"
      RANDOM_SEED = 42

      def create_temp_directory(prefix: str = TEMP_DIR_PREFIX) -> str:
          return tempfile.mkdtemp(prefix=prefix)

      def generate_random_string(length: int = 16) -> str:
          chars = string.ascii_letters + string.digits
          return "".join(random.choices(chars, k=length))

      def seed_fixture_file(directory: str, filename: str, content: str) -> str:
          filepath = os.path.join(directory, filename)
          with open(filepath, "w") as f:
              f.write(content)
          return filepath

      def cleanup_temp_directory(directory: str) -> None:
          import shutil
          if os.path.exists(directory):
              shutil.rmtree(directory)
    src/migration_runner.py: |
      import logging
      from src.database import Database

      logger = logging.getLogger(__name__)

      MIGRATION_TABLE = "_migrations"
      MIGRATION_LOCK_TIMEOUT = 30

      class MigrationRunner:
          def __init__(self, db: Database):
              self.db = db
              self._applied: list[int] = []

          def run(self, version: int, up_sql: str) -> bool:
              logger.info(f"Running migration v{version}")
              self.db.query(up_sql)
              self.db.query(
                  f"INSERT INTO {MIGRATION_TABLE} (version) VALUES ({version})"
              )
              self._applied.append(version)
              return True

          def rollback(self, version: int, down_sql: str) -> bool:
              logger.info(f"Rolling back migration v{version}")
              self.db.query(down_sql)
              self.db.query(
                  f"DELETE FROM {MIGRATION_TABLE} WHERE version = {version}"
              )
              if version in self._applied:
                  self._applied.remove(version)
              return True

          def get_applied_versions(self) -> list[int]:
              return list(self._applied)
    tests/test_connection.py: |
      import pytest

      def test_connect_sets_connected_flag(db):
          assert db.connected is True

      def test_disconnect_clears_connected_flag(db):
          db.disconnect()
          assert db.connected is False

      def test_query_raises_when_disconnected(db):
          db.disconnect()
          with pytest.raises(RuntimeError, match="Not connected"):
              db.query("SELECT 1")

      def test_reconnect_after_disconnect(db):
          db.disconnect()
          db.connect()
          assert db.connected is True
          result = db.query("SELECT 1")
          assert isinstance(result, list)
