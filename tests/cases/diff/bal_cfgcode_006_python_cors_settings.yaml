name: bal_cfgcode_006_python_cors_settings
tags:
- lang:python
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/cors.yaml: |
      cors:
        allowed_origins:
          - "http://localhost:3000"
        allowed_methods:
          - GET
          - POST
        max_age: 3600
    src/server.py: |
      import yaml

      def load_cors_config():
          with open("config/cors.yaml") as f:
              data = yaml.safe_load(f)
          return data["cors"]

      def apply_cors(app):
          cors = load_cors_config()
          origins = cors["allowed_origins"]
          methods = cors["allowed_methods"]
          max_age = cors["max_age"]
          return origins, methods, max_age
    src/routes.py: |
      GARBAGE_CFGCODE_006_ROUTE_A = "/api/v1"
      GARBAGE_CFGCODE_006_ROUTE_B = "GET"

      def index():
          return {"status": "ok"}

      def health():
          return {"healthy": True}
    src/database.py: |
      GARBAGE_CFGCODE_006_DB_C = "sqlite"
      GARBAGE_CFGCODE_006_DB_D = ":memory:"

      def get_connection():
          return None
  changed_files:
    config/cors.yaml: |
      cors:
        allowed_origins:
          - "http://localhost:3000"
          - "https://app.example.com"
          - "https://admin.example.com"
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
        max_age: 7200
        allow_credentials: true
    src/server.py: |
      import yaml

      def load_cors_config():
          with open("config/cors.yaml") as f:
              data = yaml.safe_load(f)
          return data["cors"]

      def apply_cors(app):
          cors = load_cors_config()
          origins = cors["allowed_origins"]
          methods = cors["allowed_methods"]
          max_age = cors["max_age"]
          return origins, methods, max_age
    src/routes.py: |
      GARBAGE_CFGCODE_006_ROUTE_A = "/api/v1"
      GARBAGE_CFGCODE_006_ROUTE_B = "GET"

      def index():
          return {"status": "ok"}

      def health():
          return {"healthy": True}
    src/database.py: |
      GARBAGE_CFGCODE_006_DB_C = "sqlite"
      GARBAGE_CFGCODE_006_DB_D = ":memory:"

      def get_connection():
          return None
  commit_message: "config: expand CORS for production domains"
fragments:
- id: config_origins
  selector:
    path: config/cors.yaml
    anchor: "https://app.example.com"
- id: config_credentials
  selector:
    path: config/cors.yaml
    anchor: "allow_credentials: true"
- id: server_reads_cors
  selector:
    path: src/server.py
    anchor: 'cors["allowed_origins"]'
- id: no_routes
  selector:
    path: src/routes.py
- id: no_database
  selector:
    path: src/database.py
- id: no_global_0
  selector:
    anchor: GARBAGE_CFGCODE_006_ROUTE_A
- id: no_global_1
  selector:
    anchor: GARBAGE_CFGCODE_006_ROUTE_B
- id: no_global_2
  selector:
    anchor: GARBAGE_CFGCODE_006_DB_C
- id: no_global_3
  selector:
    anchor: GARBAGE_CFGCODE_006_DB_D
oracle:
  required:
  - config_origins
  - config_credentials
  - server_reads_cors
  allowed: []
  forbidden:
  - no_routes
  - no_database
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
