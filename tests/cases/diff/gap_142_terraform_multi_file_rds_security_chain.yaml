name: gap_142_terraform_multi_file_rds_security_chain
tags:
- change:config
- change:multi_file
- context:import_chain
- difficulty:medium
- distance:2hop
- lang:terraform
fixtures:
  auto_garbage: true
repo:
  initial_files:
    db/variables.tf: |
      variable "db_engine" {
        type    = string
        default = "postgres"
      }

      variable "db_version" {
        type    = string
        default = "15.4"
      }

      variable "instance_class" {
        type    = string
        default = "db.t3.micro"
      }

      variable "allocated_storage" {
        type    = number
        default = 20
      }
    db/main.tf: |
      resource "aws_db_instance" "primary" {
        engine               = var.db_engine
        engine_version       = var.db_version
        instance_class       = var.instance_class
        allocated_storage    = var.allocated_storage
        db_name              = "appdb"
        username             = "admin"
        password             = var.db_password
        skip_final_snapshot  = true
        vpc_security_group_ids = [var.sg_id]
      }

      output "db_endpoint" {
        value = aws_db_instance.primary.endpoint
      }
    db/security.tf: |
      variable "sg_id" {
        type = string
      }

      variable "db_password" {
        type      = string
        sensitive = true
      }
    monitoring/alerts.tf: |
      resource "aws_cloudwatch_metric_alarm" "cpu_high" {
        alarm_name          = "cpu-utilization-high"
        comparison_operator = "GreaterThanThreshold"
        evaluation_periods  = 2
        metric_name         = "CPUUtilization"
        namespace           = "AWS/EC2"
        period              = 300
        statistic           = "Average"
        threshold           = 80
        alarm_description   = "CPU above 80%"
      }
  changed_files:
    db/variables.tf: |
      variable "db_engine" {
        type    = string
        default = "postgres"
      }

      variable "db_version" {
        type    = string
        default = "16.1"
      }

      variable "instance_class" {
        type    = string
        default = "db.t3.medium"
      }

      variable "allocated_storage" {
        type    = number
        default = 50
      }

      variable "multi_az" {
        type    = bool
        default = true
      }
    db/main.tf: |
      resource "aws_db_instance" "primary" {
        engine               = var.db_engine
        engine_version       = var.db_version
        instance_class       = var.instance_class
        allocated_storage    = var.allocated_storage
        db_name              = "appdb"
        username             = "admin"
        password             = var.db_password
        skip_final_snapshot  = true
        multi_az             = var.multi_az
        vpc_security_group_ids = [var.sg_id]
      }

      output "db_endpoint" {
        value = aws_db_instance.primary.endpoint
      }
    db/security.tf: |
      variable "sg_id" {
        type = string
      }

      variable "db_password" {
        type      = string
        sensitive = true
      }
fragments:
- id: variables_version
  selector:
    path: db/variables.tf
    anchor: db_version
- id: variables_class
  selector:
    path: db/variables.tf
    anchor: instance_class
- id: main_db_instance
  selector:
    path: db/main.tf
    anchor: aws_db_instance.primary
- id: security_sg
  selector:
    path: db/security.tf
    anchor: variable "sg_id"
- id: no_monitoring
  selector:
    path: monitoring/alerts.tf
- id: no_cloudwatch
  selector:
    anchor: aws_cloudwatch_metric_alarm
oracle:
  required:
  - variables_version
  - variables_class
  - main_db_instance
  - security_sg
  forbidden:
  - no_monitoring
  - no_cloudwatch
