    src/cache/eviction.rs: |
      use std::collections::HashMap;

      pub struct LruCache<V> {
          capacity: usize,
          entries: HashMap<String, V>,
          order: Vec<String>,
      }

      impl<V: Clone> LruCache<V> {
          pub fn new(capacity: usize) -> Self {
              assert!(capacity > 0, "LruCache capacity must be positive");
              Self {
                  capacity,
                  entries: HashMap::new(),
                  order: Vec::new(),
              }
          }

          pub fn get(&mut self, key: &str) -> Option<&V> {
              if self.entries.contains_key(key) {
                  self.order.retain(|k| k != key);
                  self.order.push(key.to_string());
                  self.entries.get(key)
              } else {
                  None
              }
          }

          pub fn put(&mut self, key: &str, value: V) {
              if self.entries.contains_key(key) {
                  self.order.retain(|k| k != key);
              } else if self.entries.len() >= self.capacity {
                  if let Some(oldest) = self.order.first().cloned() {
                      self.entries.remove(&oldest);
                      self.order.remove(0);
                  }
              }
              self.entries.insert(key.to_string(), value);
              self.order.push(key.to_string());
          }

          pub fn len(&self) -> usize {
              self.entries.len()
          }

          pub fn is_empty(&self) -> bool {
              self.entries.is_empty()
          }
      }
    src/api/product_handler.rs: |
      use crate::cache::eviction::LruCache;

      pub struct ProductHandler {
          cache: LruCache<String>,
      }

      impl ProductHandler {
          pub fn new(cache_size: usize) -> Self {
              Self { cache: LruCache::new(cache_size) }
          }

          pub fn get_product(&mut self, id: &str) -> Option<String> {
              self.cache.get(id).cloned()
          }

          pub fn cache_product(&mut self, id: &str, data: String) {
              self.cache.put(id, data);
          }
      }
