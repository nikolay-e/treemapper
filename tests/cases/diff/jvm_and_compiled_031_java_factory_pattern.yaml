name: jvm_and_compiled_031_java_factory_pattern
tags:
- lang:java
- change:multi_file
- context:import_chain
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    src/main/java/com/example/Notification.java: |
      package com.example;

      public interface Notification {
          void send(String message);
          String getType();
      }
    src/main/java/com/example/EmailNotification.java: |
      package com.example;

      public class EmailNotification implements Notification {
          private final String recipient;

          public EmailNotification(String recipient) {
              this.recipient = recipient;
          }

          @Override
          public void send(String message) {
              System.out.println("Email to " + recipient + ": " + message);
          }

          @Override
          public String getType() { return "EMAIL"; }
      }
    src/main/java/com/example/factory/LoggerFactory.java: |
      package com.example.factory;

      public class LoggerFactory {
          public enum Type {
              CONSOLE, FILE, REMOTE
          }

          public static Logger create(Type type) {
              return switch (type) {
                  case CONSOLE -> new ConsoleLogger();
                  case FILE -> new FileLogger();
                  case REMOTE -> new RemoteLogger();
              };
          }
      }
    src/main/java/com/example/NotificationService.java: |
      package com.example;

      import java.util.List;

      public class NotificationService {
          public void notifyAll(List<String> recipients, String message) {
              for (String recipient : recipients) {
                  Notification notification = new EmailNotification(recipient);
                  notification.send(message);
              }
          }

          public void sendBulk(NotificationFactory.Type type, List<String> messages) {
              Notification notification = NotificationFactory.create(type);
              messages.forEach(notification::send);
          }
      }
    src/main/java/com/example/config/NotificationConfig.java: |
      package com.example.config;

      import org.springframework.context.annotation.Bean;
      import org.springframework.context.annotation.Configuration;

      @Configuration
      public class NotificationConfig {
          @Bean
          public String smtpHost() {
              return "smtp.example.com";
          }

          @Bean
          public int smtpPort() {
              return 587;
          }

          @Bean
          public String smsGateway() {
              return "https://sms.example.com/api";
          }
      }
    src/main/java/com/example/template/NotificationTemplate.java: |
      package com.example.template;

      public class NotificationTemplate {
          private final String subject;
          private final String bodyTemplate;

          public NotificationTemplate(String subject, String bodyTemplate) {
              this.subject = subject;
              this.bodyTemplate = bodyTemplate;
          }

          public String render(String... args) {
              String body = bodyTemplate;
              for (int i = 0; i < args.length; i++) {
                  body = body.replace("{" + i + "}", args[i]);
              }
              return subject + ": " + body;
          }
      }
    src/main/java/com/example/AlertNotification.java: |
      package com.example;

      public class AlertNotification implements Notification {
          @Override
          public void send(String message) {
              System.out.println("ALERT: " + message);
          }

          @Override
          public String getType() { return "ALERT"; }
      }
