      package com.example;

      public class NotificationFactory {
          public enum Type {
              EMAIL, SMS, PUSH
          }

          public static Notification create(Type type) {
              return switch (type) {
                  case EMAIL -> new EmailNotification("default@example.com");
                  case SMS -> new SmsNotification();
                  case PUSH -> new PushNotification();
              };
          }
      }
