  changed_files:
    src/http/client.rs: |
      use std::time::Duration;

      pub struct HttpClient {
          base_url: String,
          timeout: Duration,
      }

      impl HttpClient {
          pub fn new(base_url: &str) -> Self {
              let normalized = base_url.trim_end_matches('/').to_string();
              HttpClient {
                  base_url: normalized,
                  timeout: Duration::from_secs(30),
              }
          }

          pub fn get(&self, path: &str) -> Result<String, String> {
              let path = path.trim_start_matches('/');
              let url = format!("{}/{}", self.base_url, path);
              Ok(url)
          }

          pub fn post(&self, path: &str, body: &str) -> Result<String, String> {
              let path = path.trim_start_matches('/');
              let url = format!("{}/{}", self.base_url, path);
              Ok(format!("POST {} body={}", url, body))
          }
      }
    src/api/weather.rs: |
      use crate::http::client::HttpClient;

      pub struct WeatherApi {
          client: HttpClient,
      }

      impl WeatherApi {
          pub fn new(base_url: &str) -> Self {
              WeatherApi { client: HttpClient::new(base_url) }
          }

          pub fn fetch_forecast(&self, city: &str) -> Result<String, String> {
              self.client.get(&format!("/forecast/{}", city))
          }
      }
    garbage/auth.rs: |
      // GARBAGE_HCLI_A = "auth_marker"
      pub fn get_bearer() -> &'static str { "token" }
    garbage/retry.rs: |
      // GARBAGE_HCLI_B = "retry_marker"
      pub fn with_retry<F: Fn() -> bool>(f: F, _n: u8) -> bool { f() }
    garbage/logger.rs: |
      // GARBAGE_HCLI_C = "logger_marker"
      pub fn log(_msg: &str) {}
  commit_message: "fix: normalize URL separator in HttpClient::get and ::new"
