repo:
  initial_files:
    include/infra/circuit_breaker.hpp: |
      #pragma once
      #include <chrono>
      #include <functional>
      #include <stdexcept>

      namespace infra {

      enum class CircuitState { CLOSED, OPEN, HALF_OPEN };

      class CircuitBreaker {
      public:
          explicit CircuitBreaker(int failure_threshold, std::chrono::seconds reset_timeout);

          template<typename Fn>
          auto call(Fn&& fn) -> decltype(fn()) {
              if (state_ == CircuitState::OPEN) {
                  throw std::runtime_error("circuit open");
              }
              try {
                  auto result = fn();
                  on_success();
                  return result;
              } catch (...) {
                  on_failure();
                  throw;
              }
          }

          CircuitState state() const { return state_; }

      private:
          void on_success();
          void on_failure();

          int failure_threshold_;
          int failure_count_ = 0;
          CircuitState state_ = CircuitState::CLOSED;
          std::chrono::seconds reset_timeout_;
      };

      } // namespace infra
    src/infra/http_client.cpp: |
      #include "infra/circuit_breaker.hpp"
      #include <string>

      namespace infra {

      class HttpClient {
      public:
          HttpClient(const std::string& base_url, CircuitBreaker* breaker)
              : base_url_(base_url), breaker_(breaker) {}

          std::string get(const std::string& path) {
              return breaker_->call([&]() {
                  return do_get(base_url_ + path);
              });
          }

      private:
          std::string do_get(const std::string& url);
          std::string base_url_;
          CircuitBreaker* breaker_;
      };

      } // namespace infra
