  changed_files:
    pkg/storage/blob.go: |
      package storage

      import "fmt"

      type BlobMetadata struct {
          Size        int64
          ContentType string
          ETag        string
      }

      type BlobStore struct {
          Bucket string
          Region string
      }

      func NewBlobStore(bucket, region string) *BlobStore {
          return &BlobStore{Bucket: bucket, Region: region}
      }

      func (b *BlobStore) Upload(key string, data []byte) error {
          return nil
      }

      func (b *BlobStore) Download(key string) ([]byte, error) {
          return nil, nil
      }

      func (b *BlobStore) Delete(key string) error {
          return nil
      }

      func (b *BlobStore) Metadata(key string) (*BlobMetadata, error) {
          return &BlobMetadata{Size: 0, ContentType: "application/octet-stream", ETag: ""}, nil
      }

      func (b *BlobStore) URL(key string) string {
          return fmt.Sprintf("https://%s.s3.%s.amazonaws.com/%s", b.Bucket, b.Region, key)
      }
  commit_message: "feat: add Region, BlobMetadata, Delete, Metadata, URL to BlobStore"
