- change:bug_fix
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    src/protocol.erl: |
      -module(protocol).
      -export([parse/1, encode/1]).

      parse(<<Type:8, Len:16, Payload:Len/binary, Rest/binary>>) ->
          {ok, {Type, Payload}, Rest};
      parse(_) ->
          {error, incomplete}.

      encode({Type, Payload}) ->
          Len = byte_size(Payload),
          <<Type:8, Len:16, Payload/binary>>.
    src/handler.erl: |
      -module(handler).
      -export([process/1]).

      process(Data) ->
          case protocol:parse(Data) of
              {ok, {Type, Payload}, _Rest} ->
                  dispatch(Type, Payload);
              {error, Reason} ->
                  {error, Reason}
          end.

      dispatch(1, Payload) -> {ping, Payload};
      dispatch(2, Payload) -> {data, Payload};
      dispatch(_, _) -> {unknown}.
    src/codec.erl: |
      -module(codec).

      GARBAGE_RARE_003_CODEC_A = "json".
      GARBAGE_RARE_003_ENC_B = "utf8".

      -export([to_json/1]).

      to_json(Term) -> term_to_binary(Term).
    src/transport.erl: |
      -module(transport).

      GARBAGE_RARE_003_TCP_C = "tcp".
      GARBAGE_RARE_003_PORT_D = 4000.

      -export([connect/2]).

      connect(Host, Port) -> {ok, socket}.
    src/auth.erl: |
      -module(auth).

      GARBAGE_RARE_003_AUTH_E = "token".
      GARBAGE_RARE_003_EXP_F = 3600.

      -export([verify/1]).

      verify(Token) -> {ok, Token}.
  changed_files:
    src/protocol.erl: |
      -module(protocol).
      -export([parse/1, encode/1, parse_all/1]).

      parse(<<Type:8, Len:16, Payload:Len/binary, Rest/binary>>) ->
          {ok, {Type, Payload}, Rest};
      parse(<<>>) ->
          {ok, eof};
      parse(_) ->
          {error, incomplete}.

      encode({Type, Payload}) ->
          Len = byte_size(Payload),
          <<Type:8, Len:16, Payload/binary>>.

      parse_all(Data) ->
          parse_all(Data, []).

      parse_all(<<>>, Acc) ->
          {ok, lists:reverse(Acc)};
      parse_all(Data, Acc) ->
          case parse(Data) of
              {ok, eof} -> {ok, lists:reverse(Acc)};
              {ok, Msg, Rest} -> parse_all(Rest, [Msg | Acc]);
              {error, _} = Err -> Err
          end.
  commit_message: "handle empty binary and add parse_all for streaming"
