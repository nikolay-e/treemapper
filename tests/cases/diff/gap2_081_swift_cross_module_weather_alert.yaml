  changed_files:
    include/geometry/shape.h: |
      #pragma once

      namespace geometry {

      struct Point {
          double x;
          double y;
      };

      struct BoundingBox {
          Point min;
          Point max;
          double width() const { return max.x - min.x; }
          double height() const { return max.y - min.y; }
          double area() const { return width() * height(); }
          Point center() const { return {(min.x + max.x) / 2.0, (min.y + max.y) / 2.0}; }
      };

      class Shape {
      public:
          virtual ~Shape() = default;
          virtual BoundingBox bounding_box() const = 0;
          virtual double area() const = 0;
          virtual bool contains(Point p) const = 0;
      };

      }
    src/renderer/canvas.cpp: |
      #include "geometry/shape.h"
      #include <vector>
      #include <memory>

      namespace renderer {

      class Canvas {
          std::vector<std::shared_ptr<geometry::Shape>> shapes;
      public:
          void add(std::shared_ptr<geometry::Shape> shape) {
              shapes.push_back(shape);
          }

          void render() {
              for (auto& s : shapes) {
                  auto bb = s->bounding_box();
                  // draw at bb.min with bb.width() x bb.height()
              }
          }
      };

      }
    src/physics/collision.cpp: |
      #include "geometry/shape.h"

      namespace physics {

      bool overlaps(const geometry::BoundingBox& a, const geometry::BoundingBox& b) {
          return a.min.x < b.max.x && a.max.x > b.min.x &&
                 a.min.y < b.max.y && a.max.y > b.min.y;
      }

      bool point_in_box(geometry::Point p, const geometry::BoundingBox& box) {
          return p.x >= box.min.x && p.x <= box.max.x &&
                 p.y >= box.min.y && p.y <= box.max.y;
      }

      }
