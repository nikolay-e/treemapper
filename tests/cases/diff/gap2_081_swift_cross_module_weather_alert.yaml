repo:
  initial_files:
    Sources/Weather/AlertService.swift: |
      import Foundation

      struct WeatherAlert {
          let severity: String
          let region: String
          let message: String
      }

      class AlertService {
          private let provider: WeatherProvider

          init(provider: WeatherProvider) {
              self.provider = provider
          }

          func activeAlerts(for region: String) -> [WeatherAlert] {
              let readings = provider.currentReadings(region: region)
              return readings.filter { $0.temperature > 40 }.map {
                  WeatherAlert(severity: "high", region: region, message: "Temp \($0.temperature)C")
              }
          }
      }
    Sources/Weather/WeatherProvider.swift: |
      import Foundation

      struct WeatherReading {
          let temperature: Double
          let humidity: Double
          let windSpeed: Double
          let stationId: String
      }

      class WeatherProvider {
          private let stationRegistry: StationRegistry

          init(stationRegistry: StationRegistry) {
              self.stationRegistry = stationRegistry
          }

          func currentReadings(region: String) -> [WeatherReading] {
              let stations = stationRegistry.stationsInRegion(region)
              return stations.map { station in
                  WeatherReading(temperature: 25.0, humidity: 60.0, windSpeed: 12.0, stationId: station.id)
              }
          }
      }
    Sources/Weather/StationRegistry.swift: |
      import Foundation

      struct Station {
          let id: String
          let name: String
          let latitude: Double
          let longitude: Double
      }

      class StationRegistry {
          private var stations: [Station] = []

          func stationsInRegion(_ region: String) -> [Station] {
              stations.filter { $0.id.hasPrefix(region) }
          }

          func register(_ station: Station) {
              stations.append(station)
          }
      }
    Sources/Logging/EventLogger.swift: |
      import Foundation

      let TRAP_GAP2_081_LOGGER_A: String = "event_logger"
      let TRAP_GAP2_081_LOGGER_B: Bool = true

