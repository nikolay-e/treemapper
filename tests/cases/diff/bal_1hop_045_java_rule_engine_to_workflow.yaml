    src/main/java/com/workflow/rules/RuleEngine.java: |
      package com.workflow.rules;
      import java.util.ArrayList;
      import java.util.List;
      import java.util.Map;
      import java.util.function.Predicate;
      public class RuleEngine {
          private final List<Rule> rules = new ArrayList<>();
          public void addRule(String name, Predicate<Map<String, Object>> condition, String action) {
              rules.add(new Rule(name, condition, action));
          }
          public List<String> evaluate(Map<String, Object> context) {
              List<String> actions = new ArrayList<>();
              for (Rule rule : rules) {
                  if (rule.condition.test(context)) {
                      actions.add(rule.action);
                  }
              }
              return actions;
          }
          private static class Rule {
              final String name;
              final Predicate<Map<String, Object>> condition;
              final String action;
              Rule(String name, Predicate<Map<String, Object>> condition, String action) {
                  this.name = name;
                  this.condition = condition;
                  this.action = action;
              }
          }
      }
    src/main/java/com/workflow/executor/WorkflowExecutor.java: |
      package com.workflow.executor;
      import com.workflow.rules.RuleEngine;
      import java.util.List;
      import java.util.Map;
      public class WorkflowExecutor {
          private final RuleEngine engine;
          public WorkflowExecutor(RuleEngine engine) { this.engine = engine; }
          public void execute(Map<String, Object> context) {
              List<String> actions = engine.evaluate(context);
              for (String action : actions) {
                  System.out.println("Executing action: " + action);
              }
          }
      }
