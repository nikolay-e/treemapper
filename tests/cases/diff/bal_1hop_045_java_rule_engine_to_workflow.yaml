    src/main/java/com/workflow/rules/RuleEngine.java: |
      package com.workflow.rules;
      import java.util.ArrayList;
      import java.util.List;
      import java.util.Map;
      import java.util.function.Predicate;
      public class RuleEngine {
          private final List<Rule> rules = new ArrayList<>();
          public void addRule(String name, Predicate<Map<String, Object>> condition, String action) {
              rules.add(new Rule(name, condition, action, 0));
          }
          public void addRule(String name, Predicate<Map<String, Object>> condition, String action, int priority) {
              rules.add(new Rule(name, condition, action, priority));
          }
          public List<String> evaluate(Map<String, Object> context) {
              List<String> actions = new ArrayList<>();
              rules.stream()
                  .sorted((a, b) -> Integer.compare(b.priority, a.priority))
                  .filter(r -> r.condition.test(context))
                  .forEach(r -> actions.add(r.action));
              return actions;
          }
          public List<String> evaluateFirstMatch(Map<String, Object> context) {
              return rules.stream()
                  .sorted((a, b) -> Integer.compare(b.priority, a.priority))
                  .filter(r -> r.condition.test(context))
                  .findFirst()
                  .map(r -> List.of(r.action))
                  .orElse(List.of());
          }
          public int ruleCount() {
              return rules.size();
          }
          private static class Rule {
              final String name;
              final Predicate<Map<String, Object>> condition;
              final String action;
              final int priority;
              Rule(String name, Predicate<Map<String, Object>> condition, String action, int priority) {
                  this.name = name;
                  this.condition = condition;
                  this.action = action;
                  this.priority = priority;
              }
          }
      }
  commit_message: "feat: add priority-based rule evaluation and first-match mode"
