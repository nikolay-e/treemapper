      from typing import Optional, List
      from dataclasses import dataclass

      @dataclass
      class Order:
          id: int
          customer_id: int
          total: float

      class OrderService:
          def __init__(self, payment_service):
              self.payment_service = payment_service
              self.orders: List[Order] = []

          def create_order(self, customer_id: int, items: List[dict]) -> Order:
              total = sum(item["price"] * item["quantity"] for item in items)
              order = Order(id=len(self.orders) + 1, customer_id=customer_id, total=total)
              self.orders.append(order)
              return order

          def process_order(self, order_id: int) -> bool:
              order = self.get_order(order_id)
              if not order:
                  return False
              return self.payment_service.charge(order.customer_id, order.total)

          def get_order(self, order_id: int) -> Optional[Order]:
              for order in self.orders:
                  if order.id == order_id:
                      return order
              return None
