repo:
  initial_files:
    src/main/scala/http/HttpClient.scala: |
      package http

      class HttpClient(baseUrl: String) {
        def get(path: String): Map[String, Any] = {
          Map("method" -> "GET", "url" -> s"$baseUrl$path")
        }

        def post(path: String, body: Map[String, Any]): Map[String, Any] = {
          Map("method" -> "POST", "url" -> s"$baseUrl$path", "body" -> body)
        }
      }
    src/main/scala/service/WeatherClient.scala: |
      package service

      import http.HttpClient

      class WeatherClient(client: HttpClient) {
        def getForecast(city: String): Map[String, Any] = {
          client.get(s"/weather/$city")
        }
      }
    src/main/scala/service/GeoClient.scala: |
      package service

      import http.HttpClient

      class GeoClient(client: HttpClient) {
        def geocode(address: String): Map[String, Any] = {
          client.get(s"/geocode?q=$address")
        }
      }
    src/main/scala/service/PaymentClient.scala: |
      package service

      import http.HttpClient

      class PaymentClient(client: HttpClient) {
        def charge(amount: Double): Map[String, Any] = {
          client.post("/charges", Map("amount" -> amount))
        }
      }
    src/main/scala/service/SlackClient.scala: |
      package service

      import http.HttpClient

      class SlackClient(client: HttpClient) {
        def sendMessage(channel: String, text: String): Map[String, Any] = {
          client.post("/chat.postMessage", Map("channel" -> channel, "text" -> text))
        }
      }
    src/main/scala/security/Encryptor.scala: |
      package security

      object Encryptor {
        val GARBAGE_BAL3_051_ENC_A = "encrypt"
        val GARBAGE_BAL3_051_ALGO_B = "AES"

        def encrypt(data: String): String = data.reverse
      }
    src/main/scala/security/TokenGenerator.scala: |
      package security

      object TokenGenerator {
        val GARBAGE_BAL3_051_TOKEN_C = "token"
        val GARBAGE_BAL3_051_LEN_D = 32

        def generate(): String = java.util.UUID.randomUUID().toString
      }
    src/main/scala/security/HashUtil.scala: |
      package security

      object HashUtil {
        val GARBAGE_BAL3_051_HASH_E = "hash"
        val GARBAGE_BAL3_051_SALT_F = "default"

        def sha256(input: String): String = input
      }
  changed_files:
    src/main/scala/http/HttpClient.scala: |
      package http

      class HttpClient(baseUrl: String, defaultHeaders: Map[String, String] = Map.empty, timeoutMs: Int = 30000) {
        def get(path: String, headers: Map[String, String] = Map.empty): Map[String, Any] = {
          Map(
            "method" -> "GET",
            "url" -> s"$baseUrl$path",
            "headers" -> (defaultHeaders ++ headers),
            "timeout" -> timeoutMs
          )
        }

        def post(path: String, body: Map[String, Any], headers: Map[String, String] = Map.empty): Map[String, Any] = {
          Map(
            "method" -> "POST",
            "url" -> s"$baseUrl$path",
            "body" -> body,
            "headers" -> (defaultHeaders ++ headers),
            "timeout" -> timeoutMs
          )
        }

        def put(path: String, body: Map[String, Any]): Map[String, Any] = {
          Map("method" -> "PUT", "url" -> s"$baseUrl$path", "body" -> body, "headers" -> defaultHeaders)
        }

        def delete(path: String): Map[String, Any] = {
          Map("method" -> "DELETE", "url" -> s"$baseUrl$path", "headers" -> defaultHeaders)
        }
      }
  commit_message: "Add headers, timeout, PUT and DELETE to HttpClient"
