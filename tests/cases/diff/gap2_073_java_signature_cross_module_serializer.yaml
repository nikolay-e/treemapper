    src/main/java/codec/Serializer.java: |
      package codec;

      public interface Serializer {
          byte[] serialize(Object obj);
          Object deserialize(byte[] data);
      }
    src/main/java/codec/JsonSerializer.java: |
      package codec;

      public class JsonSerializer implements Serializer {
          public byte[] serialize(Object obj) {
              return obj.toString().getBytes();
          }

          public Object deserialize(byte[] data) {
              return new String(data);
          }
      }
    src/main/java/transport/MessageBus.java: |
      package transport;

      import codec.Serializer;

      public class MessageBus {
          private final Serializer serializer;

          public MessageBus(Serializer serializer) {
              this.serializer = serializer;
          }

          public byte[] send(Object payload) {
              return serializer.serialize(payload);
          }

          public Object receive(byte[] raw) {
              return serializer.deserialize(raw);
          }
      }
