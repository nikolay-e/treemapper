name: bal_hard_027_csharp_observer_pattern
tags:
- lang:csharp
- change:multi_file
- change:signature
- context:cross_module
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/Events/IObserver.cs: |
      namespace App.Events
      {
          public interface IObserver<T>
          {
              void OnNext(T value);
          }
      }
    src/Events/IObservable.cs: |
      namespace App.Events
      {
          public interface IObservable<T>
          {
              void Subscribe(IObserver<T> observer);
              void Unsubscribe(IObserver<T> observer);
          }
      }
    src/Events/EventStream.cs: |
      namespace App.Events
      {
          using System.Collections.Generic;
          public class EventStream<T> : IObservable<T>
          {
              private readonly List<IObserver<T>> _observers = new();
              public void Subscribe(IObserver<T> observer) => _observers.Add(observer);
              public void Unsubscribe(IObserver<T> observer) => _observers.Remove(observer);
              public void Emit(T value)
              {
                  foreach (var observer in _observers)
                  {
                      observer.OnNext(value);
                  }
              }
          }
      }
    src/Models/StockPrice.cs: |
      namespace App.Models
      {
          public class StockPrice
          {
              public string Symbol { get; set; }
              public decimal Price { get; set; }
              public long Timestamp { get; set; }
          }
      }
    src/Observers/PriceLogger.cs: |
      namespace App.Observers
      {
          using System;
          using App.Events;
          using App.Models;
          public class PriceLogger : IObserver<StockPrice>
          {
              public void OnNext(StockPrice value)
              {
                  Console.WriteLine($"[LOG] {value.Symbol}: {value.Price}");
              }
          }
      }
    src/Observers/ThresholdAlert.cs: |
      namespace App.Observers
      {
          using System;
          using App.Events;
          using App.Models;
          public class ThresholdAlert : IObserver<StockPrice>
          {
              private readonly decimal _threshold;
              public ThresholdAlert(decimal threshold) { _threshold = threshold; }
              public void OnNext(StockPrice value)
              {
                  if (value.Price > _threshold)
                      Console.WriteLine($"[ALERT] {value.Symbol} exceeded {_threshold}");
              }
          }
      }
    src/Service/StockFeed.cs: |
      namespace App.Service
      {
          using App.Events;
          using App.Models;
          public class StockFeed
          {
              private readonly EventStream<StockPrice> _stream = new();
              public EventStream<StockPrice> Stream => _stream;
              public void Publish(string symbol, decimal price)
              {
                  _stream.Emit(new StockPrice { Symbol = symbol, Price = price, Timestamp = DateTimeOffset.UtcNow.ToUnixTimeMilliseconds() });
              }
          }
      }
    src/Helpers/DecimalExtensions.cs: |
      namespace App.Helpers
      {
          public static class DecimalExtensions
          {
              public static string ToPercent(this decimal value) => $"{value * 100:F2}%";
          }
      }
  changed_files:
    src/Events/IObserver.cs: |
      namespace App.Events
      {
          public interface IObserver<T>
          {
              void OnNext(T value);
              void OnError(string error);
          }
      }
    src/Events/EventStream.cs: |
      namespace App.Events
      {
          using System;
          using System.Collections.Generic;
          public class EventStream<T> : IObservable<T>
          {
              private readonly List<IObserver<T>> _observers = new();
              public void Subscribe(IObserver<T> observer) => _observers.Add(observer);
              public void Unsubscribe(IObserver<T> observer) => _observers.Remove(observer);
              public void Emit(T value)
              {
                  foreach (var observer in _observers)
                  {
                      try { observer.OnNext(value); }
                      catch (Exception ex) { observer.OnError(ex.Message); }
                  }
              }
          }
      }
    src/Observers/PriceLogger.cs: |
      namespace App.Observers
      {
          using System;
          using App.Events;
          using App.Models;
          public class PriceLogger : IObserver<StockPrice>
          {
              public void OnNext(StockPrice value)
              {
                  Console.WriteLine($"[LOG] {value.Symbol}: {value.Price}");
              }
              public void OnError(string error)
              {
                  Console.WriteLine($"[LOG-ERROR] {error}");
              }
          }
      }
    src/Observers/ThresholdAlert.cs: |
      namespace App.Observers
      {
          using System;
          using App.Events;
          using App.Models;
          public class ThresholdAlert : IObserver<StockPrice>
          {
              private readonly decimal _threshold;
              public ThresholdAlert(decimal threshold) { _threshold = threshold; }
              public void OnNext(StockPrice value)
              {
                  if (value.Price > _threshold)
                      Console.WriteLine($"[ALERT] {value.Symbol} exceeded {_threshold}");
              }
              public void OnError(string error)
              {
                  Console.WriteLine($"[ALERT-ERROR] {error}");
              }
          }
      }
  commit_message: "feat: add error handling to observer pattern"
