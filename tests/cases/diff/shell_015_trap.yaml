name: shell_015_trap
repo:
  initial_files:
    worker.sh: |
      #!/bin/bash
      source ./cleanup.sh

      trap cleanup EXIT

      mkdir -p "$WORK_DIR"
      touch "$LOCK_FILE"
      echo "Working..."
    cleanup.sh: |
      #!/bin/bash
      LOCK_FILE="/tmp/lockfile"
      WORK_DIR="/tmp/workdir"

      cleanup() {
          echo "Cleaning up..."
          rm -f "$LOCK_FILE"
          rm -rf "$WORK_DIR"
      }
    scripts/watchdog.sh: |
      #!/bin/bash
      PID_FILE="/var/run/worker.pid"
      if [[ -f "$PID_FILE" ]]; then
          pid=$(cat "$PID_FILE")
          kill -0 "$pid" 2>/dev/null || echo "Worker is dead"
      fi
    scripts/cron_entry.sh: |
      #!/bin/bash
      SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
      flock -n /tmp/worker.lock "$SCRIPT_DIR/../worker.sh" >> /var/log/worker.log 2>&1
    scripts/supervisor.sh: |
      #!/bin/bash
      source ./cleanup.sh

      trap cleanup EXIT

      while true; do
          if [[ ! -f "$LOCK_FILE" ]]; then
              echo "Worker not running, starting..."
              ./worker.sh &
              WORKER_PID=$!
          fi
          sleep 10
          if ! kill -0 "$WORKER_PID" 2>/dev/null; then
              echo "Worker died, restarting..."
          fi
      done
    scripts/health_check.sh: |
      #!/bin/bash
      LOCK_FILE="/tmp/lockfile"
      WORK_DIR="/tmp/workdir"
      if [[ -f "$LOCK_FILE" ]] && [[ -d "$WORK_DIR" ]]; then
          echo "Worker: HEALTHY"
      else
          echo "Worker: NOT RUNNING"
      fi
    lib/signal_utils.sh: |
      #!/bin/bash
      install_signal_handlers() {
          local handler=$1
          trap "$handler" INT TERM HUP
      }

      reset_signal_handlers() {
          trap - INT TERM HUP ERR
      }
  changed_files:
    worker.sh: |
      #!/bin/bash
      source ./cleanup.sh

      trap cleanup EXIT
      trap 'echo "Interrupted"; cleanup; exit 1' INT TERM
      trap 'echo "Error on line $LINENO"; cleanup; exit 1' ERR

      mkdir -p "$WORK_DIR"
      touch "$LOCK_FILE"

      echo "Working..."
      sleep 60
      echo "Done"
    cleanup.sh: |
      #!/bin/bash
      LOCK_FILE="/tmp/lockfile"
      WORK_DIR="/tmp/workdir"

      cleanup() {
          echo "Cleaning up..."
          rm -f "$LOCK_FILE"
          rm -rf "$WORK_DIR"
      }
    scripts/watchdog.sh: |
      #!/bin/bash
      PID_FILE="/var/run/worker.pid"
      if [[ -f "$PID_FILE" ]]; then
          pid=$(cat "$PID_FILE")
          kill -0 "$pid" 2>/dev/null || echo "Worker is dead"
      fi
    scripts/cron_entry.sh: |
      #!/bin/bash
      SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
      flock -n /tmp/worker.lock "$SCRIPT_DIR/../worker.sh" >> /var/log/worker.log 2>&1
    scripts/supervisor.sh: |
      #!/bin/bash
      source ./cleanup.sh

      trap cleanup EXIT

      while true; do
          if [[ ! -f "$LOCK_FILE" ]]; then
              echo "Worker not running, starting..."
              ./worker.sh &
              WORKER_PID=$!
          fi
          sleep 10
          if ! kill -0 "$WORKER_PID" 2>/dev/null; then
              echo "Worker died, restarting..."
          fi
      done
    scripts/health_check.sh: |
      #!/bin/bash
      LOCK_FILE="/tmp/lockfile"
      WORK_DIR="/tmp/workdir"
      if [[ -f "$LOCK_FILE" ]] && [[ -d "$WORK_DIR" ]]; then
          echo "Worker: HEALTHY"
      else
          echo "Worker: NOT RUNNING"
      fi
    lib/signal_utils.sh: |
      #!/bin/bash
      install_signal_handlers() {
          local handler=$1
          trap "$handler" INT TERM HUP
      }

      reset_signal_handlers() {
          trap - INT TERM HUP ERR
      }
  commit_message: Update files
