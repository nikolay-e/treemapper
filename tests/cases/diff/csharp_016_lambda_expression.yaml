      // GARBAGE_CS16_C = "round_robin_lb_unrelated"
      pub struct RoundRobin {
          backends: Vec<String>,
          idx: usize,
      }
      impl RoundRobin {
          pub fn new(backends: Vec<String>) -> Self { RoundRobin { backends, idx: 0 } }
          pub fn next(&mut self) -> Option<&str> {
              if self.backends.is_empty() { return None; }
              let b = &self.backends[self.idx % self.backends.len()];
              self.idx += 1;
              Some(b)
          }
      }
  changed_files:
    src/dns/resolver.rs: |
      use std::collections::HashMap;
      use std::net::IpAddr;

      pub struct DnsRecord {
          pub name: String,
          pub record_type: String,
          pub value: String,
          pub ttl: u32,
      }

      pub struct DnsResolver {
          records: HashMap<String, Vec<DnsRecord>>,
      }

      impl DnsResolver {
          pub fn new() -> Self {
              DnsResolver { records: HashMap::new() }
          }

          pub fn add_record(&mut self, record: DnsRecord) {
              self.records
                  .entry(record.name.clone())
                  .or_insert_with(Vec::new)
                  .push(record);
          }

          pub fn remove_records(&mut self, name: &str, record_type: &str) -> usize {
              if let Some(recs) = self.records.get_mut(name) {
                  let before = recs.len();
                  recs.retain(|r| r.record_type != record_type);
                  before - recs.len()
              } else {
                  0
              }
          }

          pub fn resolve(&self, name: &str, record_type: &str) -> Vec<&DnsRecord> {
              self.records
                  .get(name)
                  .map(|recs| recs.iter().filter(|r| r.record_type == record_type).collect())
                  .unwrap_or_default()
          }

          pub fn all_names(&self) -> Vec<&str> {
              self.records.keys().map(|k| k.as_str()).collect()
          }
      }
    src/dns/cache.rs: |
      use crate::dns::resolver::DnsRecord;
      use std::collections::HashMap;
      use std::time::{Duration, Instant};

      struct CacheEntry {
          records: Vec<DnsRecord>,
          expires_at: Instant,
      }

      pub struct DnsCache {
          entries: HashMap<String, CacheEntry>,
      }

      impl DnsCache {
          pub fn new() -> Self {
              DnsCache { entries: HashMap::new() }
          }

          pub fn get(&self, key: &str) -> Option<&Vec<DnsRecord>> {
              self.entries.get(key).and_then(|e| {
                  if Instant::now() < e.expires_at {
                      Some(&e.records)
                  } else {
                      None
                  }
              })
          }

          pub fn set(&mut self, key: String, records: Vec<DnsRecord>, ttl: Duration) {
              self.entries.insert(key, CacheEntry {
                  records,
                  expires_at: Instant::now() + ttl,
              });
          }

          pub fn evict_expired(&mut self) -> usize {
              let now = Instant::now();
              let before = self.entries.len();
              self.entries.retain(|_, e| now < e.expires_at);
              before - self.entries.len()
          }
      }
