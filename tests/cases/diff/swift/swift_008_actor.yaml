# Scenario: DataStore changes from a class to an actor that stores and
# manages Item values. The reviewer sees `items.append(item)` and
# `items.removeAll { $0.id == id }` and needs to understand Item's shape.
#
# Diff: Sources/Storage/DataStore.swift changes from a class with a count()
# method to an actor with add(_:), remove(id:), getAll(), and count.
#
# Reviewer questions:
#   Q1: "What is the Item type — does it have an id property for removeAll?"
#       -> Sources/Models/Item.swift: struct Item: Identifiable { let id: String,
#          let name: String }. Reviewer verifies .id exists for the filter.
#
#   Q2: "Does Item conform to Identifiable as the actor methods assume?"
#       -> Same file: Identifiable conformance — yes.
#
# Not needed for comprehension:
#   - Sources/Models/Category.swift: Another Identifiable model in Models/.
#     STRUCTURAL TRAP: same Identifiable conformance, same id: String pattern.
#     But DataStore only stores Item, not Category.
#
#   - Sources/Services/SyncService.swift: Data synchronization service.
#     STRUCTURAL TRAP: data-adjacent domain, async methods. But doesn't
#     reference Item or interact with DataStore.
#
#   - Sources/Storage/CacheStore.swift: Sibling actor in SAME directory.
#     HARDEST TRAP: identical actor pattern with private var storage,
#     add/remove/getAll methods. Same file location, same concurrency model.
#     But stores CachedEntry, not Item.
#
#   - Sources/ViewModels/ItemListViewModel.swift: Consumes DataStore.
#     STRUCTURAL TRAP: calls await dataStore.add(item), await dataStore.getAll().
#     Direct consumer of every changed method. But HOW the ViewModel uses
#     the actor doesn't help verify Item's structure.
#
#   - Sources/Models/Tag.swift: Another Identifiable model used elsewhere.
#     STRUCTURAL TRAP: same pattern (struct: Identifiable, id: String).
#     Different entity entirely.

initial:
  Sources/Models/Item.swift: |
    struct Item: Identifiable {
        let id: String
        let name: String
    }
  Sources/Storage/DataStore.swift: |
    class DataStore {
        private var items: [Item] = []

        func count() -> Int {
            return items.count
        }
    }
  Sources/Models/Category.swift: |
    struct Category: Identifiable {
        let id: String
        let title: String
        let sortOrder: Int
        let colorHex: String
    }
  Sources/Services/SyncService.swift: |
    import Foundation

    class SyncService {
        private var lastSyncDate: Date?

        func sync(endpoint: String) async throws {
            lastSyncDate = Date()
            print("Synced with \(endpoint)")
        }

        func needsSync(thresholdMinutes: Int) -> Bool {
            guard let last = lastSyncDate else { return true }
            return Date().timeIntervalSince(last) > Double(thresholdMinutes * 60)
        }
    }
  Sources/Storage/CacheStore.swift: |
    import Foundation

    struct CachedEntry: Identifiable {
        let id: String
        let data: Data
        let expiresAt: Date
    }

    actor CacheStore {
        private var entries: [CachedEntry] = []

        func add(_ entry: CachedEntry) {
            entries.append(entry)
        }

        func remove(id: String) {
            entries.removeAll { $0.id == id }
        }

        func getAll() -> [CachedEntry] {
            return entries
        }

        func evictExpired() {
            let now = Date()
            entries.removeAll { $0.expiresAt < now }
        }

        var count: Int { entries.count }
    }
  Sources/ViewModels/ItemListViewModel.swift: |
    import Foundation

    @MainActor
    class ItemListViewModel: ObservableObject {
        @Published var items: [Item] = []
        private let store: DataStore

        init(store: DataStore) {
            self.store = store
        }

        func loadItems() async {
            items = await store.getAll()
        }

        func addItem(name: String) async {
            let item = Item(id: UUID().uuidString, name: name)
            await store.add(item)
            await loadItems()
        }

        func removeItem(id: String) async {
            await store.remove(id: id)
            await loadItems()
        }
    }
  Sources/Models/Tag.swift: |
    struct Tag: Identifiable, Hashable {
        let id: String
        let label: String

        static let featured = Tag(id: "featured", label: "Featured")
        static let archived = Tag(id: "archived", label: "Archived")
    }

