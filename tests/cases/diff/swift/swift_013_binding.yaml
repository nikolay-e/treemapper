# Scenario: UserEditorView gains @Binding to edit a User model from another file.
#
# Diff: Features/UserEditor/UserEditorView.swift changes from a placeholder to
# a form that accepts @Binding var user: User and edits user.name and user.email.
#
# Reviewer questions:
#   Q1: "What fields does User have — are name and email mutable (var)?"
#       -> Models/User.swift: struct User: Identifiable { var name, var email,
#          var avatarURL }. Reviewer verifies name and email are var, not let.
#
#   Q2: "Does User have other fields that should be edited?"
#       -> Same file: avatarURL is also var. Reviewer may note the form
#          only edits name/email but not avatarURL.
#
# Not needed for comprehension:
#   - Models/Product.swift: Sibling model in Models/ directory.
#     STRUCTURAL TRAP: same Identifiable struct with var String fields.
#     But different entity, not referenced by UserEditorView.
#
#   - Features/Settings/SettingsView.swift: Another view using @Binding.
#     STRUCTURAL TRAP: identical @Binding pattern, same Form layout. But
#     binds to AppSettings, not User.
#
#   - Features/UserEditor/AvatarPickerView.swift: Child view in SAME directory.
#     HARDEST TRAP: accepts @Binding var user: User (exact same binding!),
#     edits user.avatarURL. Same directory, same type, same binding pattern.
#     But avatar editing doesn't help review name/email form fields.
#
#   - Views/UserListView.swift: Parent view that creates the @Binding.
#     STRUCTURAL TRAP: passes $users[index] to UserEditorView. Direct
#     consumer of changed code. But HOW the binding is created doesn't
#     help verify User's field structure.
#
#   - Models/Address.swift: Another model that could be edited in forms.
#     STRUCTURAL TRAP: similar var properties (street, city, zip).
#     Same "editable model" pattern but different entity.

