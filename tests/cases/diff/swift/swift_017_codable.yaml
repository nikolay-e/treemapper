#   decodes UserResponse → [UserDTO] → [User] using types from UserModels.swift.
#   Only Networking/UserAPIClient.swift is changed.
#
# Diff shows:
#   - class UserAPIClient {} (empty)
#   + init(baseURL:session:), fetchUsers(page:) async throws -> [User],
#     mapToUser(_:) mapping dto.firstName/lastName/emailAddress/joinedAt
#   + Decodes UserResponse.self, maps .users via mapToUser
#
# Reviewer questions:
#   Q1: "What fields does UserDTO have? Is the mapping in mapToUser correct?"
#       -> Needs Models/UserModels.swift: UserDTO has id, firstName, lastName,
#         emailAddress, joinedAt with CodingKeys for snake_case JSON.
#         mapToUser builds fullName from "\(dto.firstName) \(dto.lastName)"
#         and maps emailAddress → email, joinedAt → memberSince.
#         Reviewer must verify these field accesses are correct.
#
#   Q2: "What is UserResponse — does .users exist, is it [UserDTO]?"
#       -> Same file: UserResponse has users: [UserDTO], totalCount, page.
#         The diff does `response.users.map(mapToUser)` — reviewer must
#         verify .users exists and is the right type.
#
#   Q3: "What is User — the domain model being returned?"
#       -> Same file: User has id, fullName, email, memberSince.
#         Reviewer must verify mapToUser's User(...) init matches.
#
# Not needed for comprehension:
#   - Networking/ProductAPIClient.swift: Sibling API client with IDENTICAL
#     structure — URLSession, baseURL, JSONDecoder, async throws, maps DTOs.
#     Same file location pattern (Networking/), same coding style.
#     HARDEST TRAP: structurally identical sibling, but decodes ProductResponse
#     not UserResponse. Including it would confuse which client is being reviewed.
#
#   - Networking/APIClientProtocol.swift: Protocol that UserAPIClient SHOULD
#     conform to (but doesn't yet — another potential review finding).
#     Defines fetchUsers(page:) -> [User] signature. Direct structural overlap:
#     same method signature as the diff. But protocol conformance is a code
#     quality concern, not necessary for understanding the implementation.
#
#   - ViewModels/UserListViewModel.swift: Calls UserAPIClient.fetchUsers()
#     and uses the returned [User]. Direct structural edge: it's the consumer
#     of the changed code. But HOW the ViewModel uses [User] doesn't help
