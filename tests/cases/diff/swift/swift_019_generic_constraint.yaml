# Scenario: A generic cache service is written with constraints referencing
# a protocol defined in another file.
#
# Diff: Features/Cache/EntityCache.swift changes from an empty class to
# a generic class EntityCache<T: Cacheable> with store(_:), retrieve(forKey:),
# evictExpired(), and count. All methods use Cacheable protocol members.
#
# Reviewer questions:
#   Q1: "What does the Cacheable protocol require?"
#       -> Features/Cache/Cacheable.swift: cacheKey: String, expiresAt: Date?,
#          isExpired: Bool. Reviewer verifies store uses cacheKey, retrieve
#          checks isExpired, evictExpired filters by isExpired.
#
#   Q2: "What is the default implementation of isExpired?"
#       -> Same file: extension Cacheable provides isExpired checking
#          Date() > expiresAt. Reviewer verifies eviction logic is correct.
#
# Not needed for comprehension:
#   - Core/Protocols/Persistable.swift: Another protocol with similar
#     requirements. STRUCTURAL TRAP: same pattern (protocol + extension
#     with default implementations), primaryKey similar to cacheKey.
#     But persistence, not caching.
#
#   - Features/Storage/DiskCache.swift: Another cache in different directory.
#     STRUCTURAL TRAP: same "cache" concept, store/retrieve methods.
#     But file-based, no generic constraint, no Cacheable protocol.
#
#   - Features/Cache/CacheManager.swift: Manages multiple EntityCache instances.
#     HARDEST TRAP: same directory, creates EntityCache<T: Cacheable>,
#     calls store/retrieve/evictExpired. Direct consumer with same generic
#     constraint. But orchestration logic doesn't define Cacheable.
#
#   - Models/CachedUser.swift: Model conforming to Cacheable.
#     STRUCTURAL TRAP: implements cacheKey, expiresAt. Shows what Cacheable
#     looks like in practice. But a conformer doesn't define the protocol.
#
#   - Core/Protocols/Expirable.swift: Protocol with isExpired property.
#     STRUCTURAL TRAP: overlapping concept (expiration checking), similar
#     property name. But different protocol entirely.

initial:
  Features/Cache/Cacheable.swift: |
    import Foundation

    protocol Cacheable {
        var cacheKey: String { get }
        var expiresAt: Date? { get }
        var isExpired: Bool { get }
    }

    extension Cacheable {
        var isExpired: Bool {
            guard let expiresAt = expiresAt else { return false }
            return Date() > expiresAt
        }
    }
  Features/Cache/EntityCache.swift: |
    class EntityCache {}
  Core/Protocols/Persistable.swift: |
    import Foundation

    protocol Persistable {
        var primaryKey: String { get }
        func save() throws
        func delete() throws
    }

    extension Persistable {
        func save() throws {
            let data = try JSONSerialization.data(withJSONObject: [:])
            let url = FileManager.default.temporaryDirectory.appendingPathComponent(primaryKey)
            try data.write(to: url)
        }

        func delete() throws {
            let url = FileManager.default.temporaryDirectory.appendingPathComponent(primaryKey)
            try FileManager.default.removeItem(at: url)
        }
    }
  Features/Storage/DiskCache.swift: |
    import Foundation

    class DiskCache {
        private let directory: URL

        init(directory: URL) {
            self.directory = directory
        }

        func write(_ data: Data, forKey key: String) throws {
            let fileURL = directory.appendingPathComponent(key)
            try data.write(to: fileURL)
        }

        func read(forKey key: String) -> Data? {
            let fileURL = directory.appendingPathComponent(key)
            return try? Data(contentsOf: fileURL)
        }

        func removeAll() throws {
            let contents = try FileManager.default.contentsOfDirectory(
                at: directory, includingPropertiesForKeys: nil
            )
            for file in contents {
                try FileManager.default.removeItem(at: file)
            }
        }
    }
  Features/Cache/CacheManager.swift: |
    import Foundation

    class CacheManager {
        private var caches: [String: Any] = [:]

        func getCache<T: Cacheable>(for type: T.Type) -> EntityCache<T> {
            let key = String(describing: type)
            if let existing = caches[key] as? EntityCache<T> {
                return existing
            }
            let cache = EntityCache<T>()
            caches[key] = cache
            return cache
        }

        func evictAll() {
            caches.removeAll()
        }

        func cacheCount() -> Int {
            caches.count
        }
    }
  Models/CachedUser.swift: |
    import Foundation

    struct CachedUser: Cacheable {
        let id: String
        let username: String
        let fetchedAt: Date

        var cacheKey: String { "user_\(id)" }

        var expiresAt: Date? {
            Calendar.current.date(byAdding: .hour, value: 1, to: fetchedAt)
        }
    }
  Core/Protocols/Expirable.swift: |
    import Foundation

    protocol Expirable {
        var createdAt: Date { get }
        var timeToLive: TimeInterval { get }
        var isExpired: Bool { get }
    }

    extension Expirable {
        var isExpired: Bool {
            Date().timeIntervalSince(createdAt) > timeToLive
        }
    }

