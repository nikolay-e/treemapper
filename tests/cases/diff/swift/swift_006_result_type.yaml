name: swift_006_result_type
repo:
  initial_files:
    Sources/Errors/APIError.swift: |
      enum APIError: Error {
          case networkError
          case invalidResponse
          case decodingError

          var isRetryable: Bool {
              switch self {
              case .networkError: return true
              case .invalidResponse: return false
              case .decodingError: return false
              }
          }
      }
    Sources/Network/DataLoader.swift: |
      import Foundation

      struct DataLoader {
          func placeholder() {}
      }
    Sources/Errors/ValidationError.swift: |
      enum ValidationError: Error {
          case emptyField(String)
          case tooLong(field: String, max: Int)
          case invalidFormat(String)
          case outOfRange(field: String, min: Int, max: Int)

          var localizedDescription: String {
              switch self {
              case .emptyField(let f): return "\(f) is required"
              case .tooLong(let f, let m): return "\(f) max \(m) chars"
              case .invalidFormat(let f): return "\(f) has invalid format"
              case .outOfRange(let f, let min, let max): return "\(f) must be \(min)-\(max)"
              }
          }
      }
    Sources/Cache/DiskCache.swift: |
      import Foundation

      class DiskCache {
          private let directory: URL

          init(directory: URL) {
              self.directory = directory
          }

          func store(key: String, data: Data) {
              let url = directory.appendingPathComponent(key)
              try? data.write(to: url)
          }

          func retrieve(key: String) -> Data? {
              let url = directory.appendingPathComponent(key)
              return try? Data(contentsOf: url)
          }

          func evict(key: String) {
              let url = directory.appendingPathComponent(key)
              try? FileManager.default.removeItem(at: url)
          }
      }
    Sources/Network/APIClient.swift: |
      import Foundation

      class APIClient {
          private let loader = DataLoader()

          func fetchData(from url: URL) -> Result<Data, APIError> {
              let result = loader.load(from: url)
              switch result {
              case .success(let data):
                  print("Received \(data.count) bytes")
                  return .success(data)
              case .failure(let error):
                  print("Failed: \(error)")
                  return .failure(error)
              }
          }
      }
    Sources/Network/RetryHandler.swift: |
      import Foundation

      struct RetryHandler {
          let maxAttempts: Int

          func shouldRetry(error: APIError, attempt: Int) -> Bool {
              guard attempt < maxAttempts else { return false }
              return error.isRetryable
          }

          func execute<T>(_ operation: () -> Result<T, APIError>) -> Result<T, APIError> {
              var attempt = 0
              while true {
                  let result = operation()
                  switch result {
                  case .success: return result
                  case .failure(let error):
                      if !shouldRetry(error: error, attempt: attempt) { return result }
                      attempt += 1
                  }
              }
          }
      }
    Sources/Errors/StorageError.swift: |
      enum StorageError: Error {
          case fileNotFound(path: String)
          case permissionDenied(path: String)
          case diskFull
          case corruptedData

          var localizedDescription: String {
              switch self {
              case .fileNotFound(let p): return "File not found: \(p)"
              case .permissionDenied(let p): return "Permission denied: \(p)"
              case .diskFull: return "Disk is full"
              case .corruptedData: return "Data is corrupted"
              }
          }
      }
