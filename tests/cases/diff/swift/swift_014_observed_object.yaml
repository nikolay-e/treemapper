    Features/Profile/ProfileFormView.swift: |
      import SwiftUI

      struct ProfileFormView: View {
          @ObservedObject var viewModel: ProfileViewModel

          var body: some View {
              Form {
                  Section("Profile") {
                      TextField("Display Name", text: $viewModel.displayName)
                      TextEditor(text: $viewModel.bio)
                      Text("\(viewModel.remainingCharacters) characters remaining")
                          .font(.caption)
                          .foregroundColor(viewModel.remainingCharacters < 20 ? .red : .secondary)
                  }
                  Section {
                      Button("Save") {
                          viewModel.validate()
                      }
                      .disabled(!viewModel.isValid)
                  }
              }
              .onChange(of: viewModel.displayName) { _ in viewModel.validate() }
              .onChange(of: viewModel.bio) { _ in viewModel.validate() }
          }
      }
