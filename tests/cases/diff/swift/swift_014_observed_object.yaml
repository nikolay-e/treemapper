#
# Diff: Features/Profile/ProfileFormView.swift changes from a placeholder to a
# form that uses @ObservedObject var viewModel: ProfileViewModel, binding to
# displayName, bio, remainingCharacters, isValid, and calling validate().
#
# Reviewer questions:
#   Q1: "What published properties does ProfileViewModel expose?"
#       -> Features/Profile/ProfileViewModel.swift: @Published var displayName,
#          bio, isValid. Reviewer verifies the form binds to correct properties.
#
#   Q2: "What does validate() do — when is isValid true?"
#       -> Same file: isValid is true when displayName is non-empty after
#          trimming AND bio.count <= maxBioLength (160). Reviewer verifies
#          the button enable state matches.
#
#   Q3: "What is remainingCharacters?"
#       -> Same file: computed property = maxBioLength - bio.count.
#
# Not needed for comprehension:
#   - Features/Settings/SettingsViewModel.swift: Sibling ObservableObject.
#     STRUCTURAL TRAP: same @Published pattern, same directory level,
#     same class: ObservableObject. But settings domain.
#
#   - Features/Feed/FeedView.swift: Another SwiftUI view.
#     STRUCTURAL TRAP: same View pattern with List rendering.
#     But different feature, different data model.
#
#   - Features/Profile/ProfilePictureView.swift: Child view in SAME directory.
#     HARDEST TRAP: accepts same ProfileViewModel, reads viewModel.displayName
#     to show initials. Same directory, same ViewModel reference. But avatar
#     display doesn't help verify form validation logic.
#
#   - Features/Profile/ProfileService.swift: Service that saves ProfileViewModel
#     data. STRUCTURAL TRAP: references displayName, bio — same properties
#     as the diff. But persistence logic doesn't help verify bindings.
#
#   - Features/Registration/RegistrationViewModel.swift: ViewModel with
#     validate() method. STRUCTURAL TRAP: identical pattern — @Published
#     fields, func validate(), var isValid. Same architecture. Different form.

max_enrichment: 8.0
initial:
  Features/Profile/ProfileViewModel.swift: |
    import Combine

    class ProfileViewModel: ObservableObject {
        @Published var displayName: String = ""
        @Published var bio: String = ""
        @Published var isValid: Bool = false

        private let maxBioLength = 160

        func validate() {
            isValid = !displayName.trimmingCharacters(in: .whitespaces).isEmpty
                && bio.count <= maxBioLength
        }

        var remainingCharacters: Int {
            max(0, maxBioLength - bio.count)
        }
    }
