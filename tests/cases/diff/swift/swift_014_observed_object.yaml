name: swift_014_observed_object
repo:
  initial_files:
    Features/Profile/ProfileViewModel.swift: |
      import Combine

      class ProfileViewModel: ObservableObject {
          @Published var displayName: String = ""
          @Published var bio: String = ""
          @Published var isValid: Bool = false

          private let maxBioLength = 160

          func validate() {
              isValid = !displayName.trimmingCharacters(in: .whitespaces).isEmpty
                  && bio.count <= maxBioLength
          }

          var remainingCharacters: Int {
              max(0, maxBioLength - bio.count)
          }
      }
    Features/Profile/ProfileFormView.swift: |
      import SwiftUI

      struct ProfileFormView: View {
          var body: some View { Text("TODO") }
      }
    Features/Settings/SettingsViewModel.swift: |
      import Combine

      class SettingsViewModel: ObservableObject {
          @Published var language: String = "en"
          @Published var theme: String = "system"
          @Published var analyticsEnabled: Bool = true

          func resetToDefaults() {
              language = "en"
              theme = "system"
              analyticsEnabled = true
          }
      }
    Features/Feed/FeedView.swift: |
      import SwiftUI

      struct FeedItem: Identifiable {
          let id: UUID
          let title: String
          let timestamp: Date
      }

      struct FeedView: View {
          let items: [FeedItem]

          var body: some View {
              List(items) { item in
                  VStack(alignment: .leading) {
                      Text(item.title).font(.headline)
                      Text(item.timestamp, style: .relative).font(.caption)
                  }
              }
          }
      }
    Features/Profile/ProfilePictureView.swift: |
      import SwiftUI

      struct ProfilePictureView: View {
          @ObservedObject var viewModel: ProfileViewModel

          var body: some View {
              ZStack {
                  Circle()
                      .fill(Color.blue.opacity(0.2))
                      .frame(width: 80, height: 80)
                  Text(viewModel.displayName.prefix(2).uppercased())
                      .font(.title2)
                      .fontWeight(.bold)
              }
          }
      }
    Features/Profile/ProfileService.swift: |
      import Foundation

      class ProfileService {
          func saveProfile(displayName: String, bio: String) async throws {
              let payload: [String: Any] = [
                  "displayName": displayName,
                  "bio": bio
              ]
              let data = try JSONSerialization.data(withJSONObject: payload)
              let url = URL(string: "https://api.example.com/profile")!
              var request = URLRequest(url: url)
              request.httpMethod = "PUT"
              request.httpBody = data
              _ = try await URLSession.shared.data(for: request)
          }
      }
    Features/Registration/RegistrationViewModel.swift: |
      import Combine

      class RegistrationViewModel: ObservableObject {
          @Published var username: String = ""
          @Published var email: String = ""
          @Published var password: String = ""
          @Published var isValid: Bool = false

          func validate() {
              isValid = !username.isEmpty && email.contains("@") && password.count >= 8
          }
      }
