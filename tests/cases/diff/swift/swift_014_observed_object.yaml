  Features/Feed/FeedView.swift: |
    import SwiftUI

    struct FeedItem: Identifiable {
        let id: UUID
        let title: String
        let timestamp: Date
    }

    struct FeedView: View {
        let items: [FeedItem]

        var body: some View {
            List(items) { item in
                VStack(alignment: .leading) {
                    Text(item.title).font(.headline)
                    Text(item.timestamp, style: .relative).font(.caption)
                }
            }
        }
    }
  Features/Profile/ProfilePictureView.swift: |
    import SwiftUI

    struct ProfilePictureView: View {
        @ObservedObject var viewModel: ProfileViewModel

        var body: some View {
            ZStack {
                Circle()
