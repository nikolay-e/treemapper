                Text(viewModel.displayName.prefix(2).uppercased())
                    .font(.title2)
                    .fontWeight(.bold)
            }
        }
    }
  Features/Profile/ProfileService.swift: |
    import Foundation

    class ProfileService {
        func saveProfile(displayName: String, bio: String) async throws {
            let payload: [String: Any] = [
                "displayName": displayName,
                "bio": bio
            ]
            let data = try JSONSerialization.data(withJSONObject: payload)
            let url = URL(string: "https://api.example.com/profile")!
            var request = URLRequest(url: url)
            request.httpMethod = "PUT"
            request.httpBody = data
            _ = try await URLSession.shared.data(for: request)
        }
    }
  Features/Registration/RegistrationViewModel.swift: |
    import Combine

    class RegistrationViewModel: ObservableObject {
        @Published var username: String = ""
        @Published var email: String = ""
        @Published var password: String = ""
        @Published var isValid: Bool = false

        func validate() {
            isValid = !username.isEmpty && email.contains("@") && password.count >= 8
        }
    }

