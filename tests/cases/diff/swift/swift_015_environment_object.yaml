# Scenario: DashboardView starts reading shared state via @EnvironmentObject.
#
# Diff: Features/Dashboard/DashboardView.swift changes from a placeholder to
# a view that uses @EnvironmentObject var session: SessionManager to display
# user info (isAuthenticated, currentUsername) and trigger logout().
#
# Reviewer questions:
#   Q1: "What properties does SessionManager expose?"
#       -> Core/SessionManager.swift: @Published currentUsername: String?,
#          @Published isAuthenticated: Bool, func login(), func logout().
#          Reviewer verifies the view reads correct properties.
#
#   Q2: "What does logout() do — does it reset both properties?"
#       -> Same file: sets currentUsername = nil, isAuthenticated = false.
#
# Not needed for comprehension:
#   - Core/ThemeManager.swift: Another ObservableObject injected via
#     environment. STRUCTURAL TRAP: same @Published pattern, same Core/
#     directory, same class: ObservableObject. But color/font theme,
#     not authentication.
#
#   - Features/Onboarding/OnboardingView.swift: Another SwiftUI view.
#     STRUCTURAL TRAP: same View pattern, references authentication concept.
#     But onboarding pages, no SessionManager dependency.
#
#   - Features/Dashboard/DashboardHeaderView.swift: Child view in SAME
#     directory. HARDEST TRAP: also uses @EnvironmentObject var session:
#     SessionManager, reads session.currentUsername and session.isAuthenticated.
#     Exact same environment object, same properties. But another consumer.
#
#   - Core/AuthService.swift: Authentication service that calls
#     SessionManager.login(). STRUCTURAL TRAP: direct caller of the same
#     SessionManager methods. But HOW auth works doesn't help verify
#     DashboardView's property access.
#
#   - Features/Settings/AccountView.swift: View that also calls
#     session.logout(). STRUCTURAL TRAP: same @EnvironmentObject pattern,
#     same logout() call. But different view, different feature.

initial:
  Core/SessionManager.swift: |
    import Combine

    class SessionManager: ObservableObject {
        @Published private(set) var currentUsername: String?
        @Published private(set) var isAuthenticated: Bool = false

        func login(username: String, token: String) {
            currentUsername = username
            isAuthenticated = true
        }

        func logout() {
            currentUsername = nil
            isAuthenticated = false
        }
    }
  Features/Dashboard/DashboardView.swift: |
    import SwiftUI

    struct DashboardView: View {
        var body: some View { Text("TODO") }
    }
  Core/ThemeManager.swift: |
    import SwiftUI
    import Combine

    class ThemeManager: ObservableObject {
        @Published var accentColor: Color = .blue
        @Published var useDarkMode: Bool = false
        @Published var cornerRadius: CGFloat = 8

        func applyPreset(_ preset: String) {
            switch preset {
            case "minimal":
                accentColor = .gray
                cornerRadius = 4
            case "vibrant":
                accentColor = .purple
                cornerRadius = 12
            default:
                break
            }
        }
    }
  Features/Onboarding/OnboardingView.swift: |
    import SwiftUI

    struct OnboardingView: View {
        @State private var currentPage = 0

        let pages = [
            "Welcome to the app",
            "Set up your profile",
            "Start exploring"
        ]

        var body: some View {
            TabView(selection: $currentPage) {
                ForEach(pages.indices, id: \.self) { index in
                    Text(pages[index])
                        .font(.title)
                        .tag(index)
                }
            }
            .tabViewStyle(.page)
        }
    }
  Features/Dashboard/DashboardHeaderView.swift: |
    import SwiftUI

    struct DashboardHeaderView: View {
        @EnvironmentObject var session: SessionManager

        var body: some View {
            HStack {
                Image(systemName: "person.circle")
                    .font(.title)
                if session.isAuthenticated {
                    Text(session.currentUsername ?? "User")
                        .font(.headline)
                }
                Spacer()
            }
            .padding(.horizontal)
        }
    }
  Core/AuthService.swift: |
    import Foundation

    class AuthService {
        private let session: SessionManager

        init(session: SessionManager) {
            self.session = session
        }

        func authenticate(username: String, password: String) async throws {
            let token = try await fetchToken(username: username, password: password)
            session.login(username: username, token: token)
        }

        private func fetchToken(username: String, password: String) async throws -> String {
            return "mock-token-\(username)"
        }
    }
  Features/Settings/AccountView.swift: |
    import SwiftUI

    struct AccountView: View {
        @EnvironmentObject var session: SessionManager

        var body: some View {
            Form {
                if session.isAuthenticated {
                    Section("Account") {
                        Text("Logged in as \(session.currentUsername ?? "")")
                        Button("Sign Out", role: .destructive) {
                            session.logout()
                        }
                    }
                }
            }
        }
    }

