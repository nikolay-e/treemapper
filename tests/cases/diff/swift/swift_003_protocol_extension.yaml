# Scenario: Calculator gains methods that call .sum and .average on collections.
# These are provided by protocol extensions on Collection. The reviewer sees
# scores.sum in the diff and needs to know what .sum does.
#
# Diff: Sources/Services/Calculator.swift changes from a stub calculate() to
# totalScore(), averageScore(), and sumDoubles() that use .sum and .average
# from NumericExtensions.swift.
#
# Reviewer questions:
#   Q1: "Where does .sum come from on an [Int] collection?"
#       -> Sources/Extensions/NumericExtensions.swift: extension Collection
#          where Element: Numeric { var sum: Element { reduce(0, +) } }
#
#   Q2: "Where does .average come from?"
#       -> Same file: extension Collection where Element: BinaryInteger
#          { var average: Double { ... Double(sum) / Double(count) } }
#
#   Q3: "Does .sum work on [Double] as well as [Int]?"
#       -> Yes, the Numeric constraint covers both. Reviewer verifies
#          sumDoubles(values: [Double]) -> Double uses the same .sum.
#
# Not needed for comprehension:
#   - Sources/Extensions/ArrayExtensions.swift: Sibling extension in the SAME
#     Extensions/ directory. HARDEST TRAP: extends Array with utility methods
#     (unique, chunked). Same pattern of extending collections. But doesn't
#     provide .sum or .average which are the only extensions used in the diff.
#
#   - Sources/Utils/MathUtils.swift: Static math functions (clamp, lerp).
#     STRUCTURAL TRAP: same "math" domain, could be confused with numeric
#     operations. But standalone functions, not protocol extensions.
#
#   - Sources/Extensions/StringExtensions.swift: Another extension in
#     Extensions/. STRUCTURAL TRAP: same directory, same "extension on stdlib
#     type" pattern. But extends String, not Collection/Numeric.
#
#   - Sources/Services/StatisticsService.swift: Service that uses .sum and
#     .average from the SAME NumericExtensions. HARDEST TRAP: calls the
#     exact same protocol extension methods as the diff. But the reviewer
#     needs the extension definition, not another consumer.
#
#   - Sources/Extensions/ComparableExtensions.swift: Extension on Comparable.
#     STRUCTURAL TRAP: extends protocol with constraints, same pattern as
#     NumericExtensions (extension X where Element: Y). Different protocol.

initial:
  Sources/Extensions/NumericExtensions.swift: |
    extension Collection where Element: Numeric {
        var sum: Element {
            reduce(0, +)
        }
    }

    extension Collection where Element: BinaryInteger {
        var average: Double {
            guard !isEmpty else { return 0 }
            return Double(sum) / Double(count)
        }
    }
  Sources/Services/Calculator.swift: |
    struct Calculator {
        func calculate(_ values: [Int]) -> Int {
            return values.count
        }
    }
  Sources/Extensions/ArrayExtensions.swift: |
    extension Array where Element: Hashable {
        func unique() -> [Element] {
            var seen = Set<Element>()
            return filter { seen.insert($0).inserted }
        }

        func chunked(into size: Int) -> [[Element]] {
            stride(from: 0, to: count, by: size).map {
                Array(self[$0..<Swift.min($0 + size, count)])
            }
        }
    }
  Sources/Utils/MathUtils.swift: |
    struct MathUtils {
        static func clamp(_ value: Double, min: Double, max: Double) -> Double {
            return Swift.min(Swift.max(value, min), max)
        }

        static func lerp(from start: Double, to end: Double, t: Double) -> Double {
            return start + (end - start) * t
        }

        static func normalize(_ value: Double, min: Double, max: Double) -> Double {
            guard max > min else { return 0 }
            return (value - min) / (max - min)
        }
    }
  Sources/Extensions/StringExtensions.swift: |
    extension String {
        var trimmed: String {
            trimmingCharacters(in: .whitespacesAndNewlines)
        }

        var isBlank: Bool {
            trimmed.isEmpty
        }

        func truncated(to maxLength: Int) -> String {
            if count <= maxLength { return self }
            return String(prefix(maxLength)) + "..."
        }
    }
  Sources/Services/StatisticsService.swift: |
    struct StatisticsService {
        func computeStats(values: [Int]) -> (total: Int, avg: Double) {
            let total = values.sum
            let avg = values.average
            return (total, avg)
        }

        func percentile(_ values: [Int], at p: Double) -> Int {
            let sorted = values.sorted()
            let index = Int(Double(sorted.count - 1) * p)
            return sorted[index]
        }
    }
  Sources/Extensions/ComparableExtensions.swift: |
    extension Collection where Element: Comparable {
        var minMax: (min: Element, max: Element)? {
            guard let first = first else { return nil }
            return reduce((first, first)) { result, element in
                (Swift.min(result.0, element), Swift.max(result.1, element))
            }
        }

        func isSorted() -> Bool {
            zip(self, self.dropFirst()).allSatisfy { $0 <= $1 }
        }
    }

