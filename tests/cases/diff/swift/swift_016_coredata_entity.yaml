#   - ViewModels/TaskListViewModel.swift: ViewModel consuming TaskRepository.
#     STRUCTURAL TRAP: calls repository.createTask(), repository.fetchIncomplete().
#     Direct consumer of every changed method. But the ViewModel's UI logic
