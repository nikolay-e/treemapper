  Persistence/CategoryRepository.swift: |
    import CoreData

    class CategoryRepository {
        let context: NSManagedObjectContext

        init(context: NSManagedObjectContext) {
            self.context = context
        }

        func createCategory(name: String, color: String) -> Category {
            let category = Category(context: context)
            category.id = UUID()
            category.name = name
            category.colorHex = color
            category.sortOrder = 0
            return category
        }

        func fetchAll() throws -> [Category] {
            let request = Category.fetchRequest()
            request.sortDescriptors = [NSSortDescriptor(key: "sortOrder", ascending: true)]
            return try context.fetch(request)
        }
    }
  ViewModels/TaskListViewModel.swift: |
    import Foundation

    @MainActor
    class TaskListViewModel: ObservableObject {
        @Published var tasks: [TaskItem] = []
        private let repository: TaskRepository

        init(repository: TaskRepository) {
            self.repository = repository
        }

        func loadTasks() {
            tasks = (try? repository.fetchIncomplete()) ?? []
        }

        func addTask(title: String, priority: Int16) {
            _ = repository.createTask(title: title, dueDate: nil, priority: priority)
            loadTasks()
        }

        func completeTask(_ task: TaskItem) {
            repository.markCompleted(task)
            loadTasks()
        }
    }
