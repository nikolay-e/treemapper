# Scenario: NetworkHandler gains a handleResponse method that uses guard
# statements to validate a Response struct's fields before processing.
#
# Diff: Sources/Network/NetworkHandler.swift changes from a stub to
# handleResponse(_:) which chains guard statements checking response.error,
# response.statusCode, and response.data.
#
# Reviewer questions:
#   Q1: "What fields does Response have — is data actually Optional?"
#       -> Sources/Models/Response.swift: let data: Data?, let error: Error?,
#          let statusCode: Int. All three fields are used in guard chains.
#
#   Q2: "Is statusCode a regular Int I can compare with == 200?"
#       -> Same file: let statusCode: Int — yes, plain Int.
#
# Not needed for comprehension:
#   - Sources/Models/Endpoint.swift: Networking model in same directory.
#     STRUCTURAL TRAP: same Models/ directory, same networking domain.
#     Defines API endpoints (path, method, headers) not responses.
#
#   - Sources/Logging/RequestLogger.swift: HTTP logging utility.
#     STRUCTURAL TRAP: logs requests/responses, same networking concern.
#     But logging behavior doesn't define Response's shape.
#
#   - Sources/Network/APIClient.swift: Network client that calls
#     handleResponse(). HARDEST TRAP: direct consumer of changed code,
#     constructs Response objects and passes them to handleResponse.
#     But HOW the client uses the handler doesn't help verify guard logic.
#
#   - Sources/Models/APIError.swift: Error type thrown by network layer.
#     STRUCTURAL TRAP: related to response.error == nil check in guard.
#     But guard checks for nil, it doesn't inspect error type details.
#
#   - Sources/Network/ResponseParser.swift: Parses Response objects.
#     STRUCTURAL TRAP: references Response type, has guard let data =
