name: swift_005_guard_statement
repo:
  initial_files:
    Sources/Models/Response.swift: |
      import Foundation

      struct Response {
          let data: Data?
          let error: Error?
          let statusCode: Int
          let headers: [String: String]

          var isSuccess: Bool {
              (200..<300).contains(statusCode) && error == nil
          }
      }
    Sources/Network/NetworkHandler.swift: |
      struct NetworkHandler {
          func placeholder() {}
      }
    Sources/Models/Endpoint.swift: |
      enum HTTPMethod: String {
          case get = "GET"
          case post = "POST"
          case put = "PUT"
          case delete = "DELETE"
      }

      struct Endpoint {
          let path: String
          let method: HTTPMethod
          let headers: [String: String]
          let queryItems: [String: String]

          func fullURL(baseURL: String) -> String {
              return baseURL + path
          }
      }
    Sources/Logging/RequestLogger.swift: |
      import Foundation

      class RequestLogger {
          private var entries: [(Date, String)] = []

          func logRequest(url: String, method: String, timestamp: Date) {
              entries.append((timestamp, "\(method) \(url)"))
              print("[\(timestamp)] \(method) \(url)")
          }

          func logLatency(url: String, durationMs: Int) {
              print("\(url): \(durationMs)ms")
          }

          func exportLog() -> String {
              entries.map { "\($0.0): \($0.1)" }.joined(separator: "\n")
          }
      }
    Sources/Network/APIClient.swift: |
      import Foundation

      class APIClient {
          private let handler = NetworkHandler()
          private let baseURL: String

          init(baseURL: String) {
              self.baseURL = baseURL
          }

          func execute(endpoint: Endpoint) async throws -> Data? {
              let url = URL(string: endpoint.fullURL(baseURL: baseURL))!
              let (data, urlResponse) = try await URLSession.shared.data(from: url)
              let httpResponse = urlResponse as! HTTPURLResponse
              let response = Response(
                  data: data,
                  error: nil,
                  statusCode: httpResponse.statusCode,
                  headers: [:]
              )
              return handler.handleResponse(response)
          }
      }
    Sources/Models/APIError.swift: |
      import Foundation

      enum APIError: LocalizedError {
          case invalidURL
          case decodingFailed(Error)
          case serverError(statusCode: Int)
          case noData
          case timeout

          var errorDescription: String? {
              switch self {
              case .invalidURL: return "Invalid URL"
              case .decodingFailed(let error): return "Decoding: \(error.localizedDescription)"
              case .serverError(let code): return "Server error: \(code)"
              case .noData: return "No data received"
              case .timeout: return "Request timed out"
              }
          }
      }
    Sources/Network/ResponseParser.swift: |
      import Foundation

      struct ResponseParser {
          func parseJSON<T: Decodable>(_ response: Response, as type: T.Type) throws -> T {
              guard let data = response.data else {
                  throw APIError.noData
              }
              return try JSONDecoder().decode(T.self, from: data)
          }

          func parseString(_ response: Response) -> String? {
              guard let data = response.data else { return nil }
              return String(data: data, encoding: .utf8)
          }
      }
