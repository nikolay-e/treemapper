name: swift_004_optional_binding
repo:
  initial_files:
    Sources/Models/UserRepository.swift: |
      struct User {
          let id: String
          let name: String
      }

      class UserRepository {
          private var users: [String: User] = [:]

          func fetchUser(id: String) -> User? {
              return users[id]
          }

          func save(user: User) {
              users[user.id] = user
          }

          func deleteUser(id: String) {
              users.removeValue(forKey: id)
          }
      }
    Sources/Controllers/UserController.swift: |
      class UserController {
          let repository = UserRepository()

          func placeholder() -> String { "" }
      }
    Sources/Services/SessionManager.swift: |
      import Foundation

      class SessionManager {
          private var activeSessions: [String: Date] = [:]

          func startSession(userId: String) {
              activeSessions[userId] = Date()
          }

          func isSessionActive(userId: String) -> Bool {
              guard let start = activeSessions[userId] else { return false }
              return Date().timeIntervalSince(start) < 3600
          }

          func endSession(userId: String) {
              activeSessions.removeValue(forKey: userId)
          }
      }
    Sources/Models/Preferences.swift: |
      struct Preferences {
          let theme: String
          let language: String
          let notificationsEnabled: Bool
          let fontSize: Int
      }

      class PreferencesStore {
          private var store: [String: Preferences] = [:]

          func get(userId: String) -> Preferences? {
              return store[userId]
          }

          func save(userId: String, prefs: Preferences) {
              store[userId] = prefs
          }
      }
    Sources/Controllers/ProductController.swift: |
      class ProductController {
          let repository = ProductRepository()

          func showProduct(id: String) -> String {
              if let product = repository.fetchProduct(id: id) {
                  return "Product: \(product.title)"
              } else {
                  return "Product not found"
              }
          }

          func getProductPrice(id: String) -> Double? {
              if let product = repository.fetchProduct(id: id) {
                  return product.price
              }
              return nil
          }
      }
    Sources/Views/UserProfileView.swift: |
      import SwiftUI

      struct UserProfileView: View {
          let controller: UserController
          let userId: String

          var body: some View {
              VStack {
                  Text(controller.showUser(id: userId))
                      .font(.title)
                  if let name = controller.getUserName(id: userId) {
                      Text("Name: \(name)")
                          .font(.subheadline)
                  }
              }
              .padding()
          }
      }
    Sources/Models/ProductRepository.swift: |
      struct Product {
