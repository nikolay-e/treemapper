name: swift_009_property_wrapper
repo:
  initial_files:
    Sources/PropertyWrappers/Published.swift: |
      import Combine

      @propertyWrapper
      struct Published<Value> {
          private var value: Value
          private let subject = PassthroughSubject<Value, Never>()

          var wrappedValue: Value {
              get { value }
              set {
                  value = newValue
                  subject.send(newValue)
              }
          }

          var projectedValue: PassthroughSubject<Value, Never> {
              subject
          }

          init(wrappedValue: Value) {
              self.value = wrappedValue
          }
      }
    Sources/ViewModels/ViewModel.swift: |
      import Combine

      class ViewModel: ObservableObject {
          func placeholder() {}
      }
    Sources/PropertyWrappers/UserDefault.swift: |
      import Foundation

      @propertyWrapper
      struct UserDefault<Value> {
          let key: String
          let defaultValue: Value

          var wrappedValue: Value {
              get { UserDefaults.standard.object(forKey: key) as? Value ?? defaultValue }
              set { UserDefaults.standard.set(newValue, forKey: key) }
          }

          init(wrappedValue: Value, key: String) {
              self.defaultValue = wrappedValue
              self.key = key
          }
      }
    Sources/Services/NotificationCenter.swift: |
      import Foundation

      class AppNotificationCenter {
          static let shared = AppNotificationCenter()
          private var observers: [String: [(Any) -> Void]] = [:]

          func addObserver(event: String, handler: @escaping (Any) -> Void) {
              observers[event, default: []].append(handler)
          }

          func post(event: String, data: Any) {
              observers[event]?.forEach { $0(data) }
          }

          func removeAll(event: String) {
              observers[event] = nil
          }
      }
    Sources/PropertyWrappers/Clamped.swift: |
      @propertyWrapper
      struct Clamped<Value: Comparable> {
          private var value: Value
          let range: ClosedRange<Value>

          var wrappedValue: Value {
              get { value }
              set { value = min(max(newValue, range.lowerBound), range.upperBound) }
          }

          init(wrappedValue: Value, _ range: ClosedRange<Value>) {
              self.range = range
              self.value = min(max(wrappedValue, range.lowerBound), range.upperBound)
          }
      }
    Sources/ViewModels/SettingsViewModel.swift: |
      import Combine

      class SettingsViewModel: ObservableObject {
          @Published var language: String = "en"
          @Published var theme: String = "system"
          @Published var analyticsEnabled: Bool = true

          private var cancellables = Set<AnyCancellable>()

          func resetToDefaults() {
              language = "en"
              theme = "system"
              analyticsEnabled = true
          }
      }
    Sources/Bindings/ObservableStore.swift: |
      import Combine

      class ObservableStore<State> {
          private let subject: CurrentValueSubject<State, Never>

          var state: State {
              get { subject.value }
              set { subject.send(newValue) }
          }

          var publisher: AnyPublisher<State, Never> {
              subject.eraseToAnyPublisher()
          }

          init(initialState: State) {
              subject = CurrentValueSubject(initialState)
          }
      }
