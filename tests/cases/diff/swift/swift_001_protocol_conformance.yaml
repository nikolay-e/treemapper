# Scenario: UserService gains encode/decode methods that rely on User conforming
# to Codable and Equatable. The reviewer sees JSONEncoder().encode(user) in the diff
# but needs the User struct to confirm it actually conforms to Codable.
#
# Diff: Sources/Services/UserService.swift changes from a stub listUsers() method
# to encode(user:), decode(data:), and areEqual(_:_:) that depend on User's
# Codable and Equatable conformances.
#
# Reviewer questions:
#   Q1: "Does User conform to Codable so encode/decode will work?"
#       -> Sources/Models/User.swift: struct User: Codable, Equatable — yes.
#          Reviewer must verify User has the right protocol conformance for
#          JSONEncoder().encode(user) and JSONDecoder().decode(User.self, ...).
#
#   Q2: "Does User conform to Equatable so the == comparison is valid?"
#       -> Same file: Equatable in protocol list — yes. areEqual uses a == b.
#
#   Q3: "What fields does User have — will JSONEncoder encode all of them?"
#       -> Sources/Models/User.swift: id, name, email (all let, all String).
#          Reviewer verifies all fields will round-trip through encode/decode.
#
# Not needed for comprehension:
#   - Sources/Services/NotificationService.swift: Sibling service in the same
#     directory. STRUCTURAL TRAP: same import Foundation, same class pattern,
#     same directory. But handles push notifications, not User encoding.
#
#   - Sources/Models/AppConfig.swift: Sibling model in the same Models/ directory.
#     STRUCTURAL TRAP: same struct pattern with String properties. But represents
#     app configuration, not serializable user data.
#
#   - Sources/Services/UserCacheService.swift: Service that caches User objects
#     using the SAME User type. HARDEST TRAP: imports User, calls methods on User,
#     uses JSONEncoder just like the diff. But caching strategy is separate from
#     whether User conforms to Codable — the reviewer needs the User definition,
#     not another consumer of it.
#
#   - Sources/Models/Product.swift: Another Codable struct in Models/.
#     STRUCTURAL TRAP: identical pattern (struct Product: Codable, Equatable)
#     with String fields. Same conformance but different entity.
#
#   - Tests/UserServiceTests.swift: Test file that imports UserService and User,
#     calls encode/decode, asserts results. STRUCTURAL TRAP: direct consumer of
#     the changed code with overlapping method calls. But test expectations don't
#     show whether User actually conforms to Codable.

initial:
  Sources/Models/User.swift: |
    struct User: Codable, Equatable {
        let id: String
        let name: String
        let email: String
    }
  Sources/Services/UserService.swift: |
    import Foundation

    class UserService {
        func listUsers() -> [User] {
            return []
        }
    }
  Sources/Services/NotificationService.swift: |
    import Foundation

    class NotificationService {
        func sendPush(token: String, message: String) {
            print("Sending push to \(token): \(message)")
        }

        func scheduleLocal(title: String, delay: TimeInterval) {
            print("Scheduling '\(title)' in \(delay)s")
        }
    }
  Sources/Models/AppConfig.swift: |
    struct AppConfig: Codable {
        let apiBaseUrl: String
        let timeout: TimeInterval
        let maxRetries: Int
    }
  Sources/Services/UserCacheService.swift: |
    import Foundation

    class UserCacheService {
        private var cache: [String: Data] = [:]

        func cacheUser(_ user: User) throws {
            let data = try JSONEncoder().encode(user)
            cache[user.id] = data
        }

        func loadUser(id: String) throws -> User? {
            guard let data = cache[id] else { return nil }
            return try JSONDecoder().decode(User.self, from: data)
        }

        func invalidate(id: String) {
            cache.removeValue(forKey: id)
        }
    }
  Sources/Models/Product.swift: |
    struct Product: Codable, Equatable {
        let id: String
        let name: String
        let price: Double
        let category: String
    }
  Tests/UserServiceTests.swift: |
    import XCTest
    @testable import MyApp

    final class UserServiceTests: XCTestCase {
        let service = UserService()

        func testEncodeDecodRoundTrip() throws {
            let user = User(id: "1", name: "Alice", email: "alice@test.com")
            let data = try service.encode(user: user)
            let decoded = try service.decode(data: data)
            XCTAssertEqual(user, decoded)
        }

        func testAreEqual() {
            let a = User(id: "1", name: "Alice", email: "alice@test.com")
            let b = User(id: "1", name: "Alice", email: "alice@test.com")
            XCTAssertTrue(service.areEqual(a, b))
        }
    }

changed:
  Sources/Models/User.swift: |
    struct User: Codable, Equatable {
        let id: String
        let name: String
        let email: String
    }
  Sources/Services/UserService.swift: |
    import Foundation

    class UserService {
        func encode(user: User) throws -> Data {
            let encoder = JSONEncoder()
            return try encoder.encode(user)
        }

        func decode(data: Data) throws -> User {
            let decoder = JSONDecoder()
            return try decoder.decode(User.self, from: data)
        }

        func areEqual(_ a: User, _ b: User) -> Bool {
            return a == b
        }
    }
  Sources/Services/NotificationService.swift: |
