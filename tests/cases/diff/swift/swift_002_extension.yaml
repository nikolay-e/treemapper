name: swift_002_extension
repo:
  initial_files:
    Sources/Extensions/StringExtensions.swift: |
      extension String {
          func isValidEmail() -> Bool {
              let pattern = "[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
              return self.range(of: pattern, options: .regularExpression) != nil
          }

          var trimmed: String {
              trimmingCharacters(in: .whitespacesAndNewlines)
          }

          var isBlank: Bool {
              trimmed.isEmpty
          }
      }
    Sources/Validators/Validator.swift: |
      struct Validator {
          func validate(_ input: String) -> Bool {
              return !input.isEmpty
          }
      }
    Sources/Helpers/DateFormatter.swift: |
      import Foundation

      struct AppDateFormatter {
          static let iso8601: DateFormatter = {
              let formatter = DateFormatter()
              formatter.dateFormat = "yyyy-MM-dd'T'HH:mm:ssZ"
              return formatter
          }()

          static func format(_ date: Date) -> String {
              return iso8601.string(from: date)
          }
      }
    Sources/Helpers/NumberFormatter.swift: |
      import Foundation

      struct AppNumberFormatter {
          static func formatCurrency(_ amount: Double) -> String {
              let formatter = NumberFormatter()
              formatter.numberStyle = .currency
              return formatter.string(from: NSNumber(value: amount)) ?? "$0.00"
          }
      }
    Sources/Extensions/CollectionExtensions.swift: |
      extension Collection {
          var isNotEmpty: Bool {
              !isEmpty
          }

          func element(at index: Index) -> Element? {
              indices.contains(index) ? self[index] : nil
          }

          func chunked(into size: Int) -> [[Element]] {
              var chunks: [[Element]] = []
              var current: [Element] = []
              for element in self {
                  current.append(element)
                  if current.count == size {
                      chunks.append(current)
                      current = []
                  }
              }
              if !current.isEmpty { chunks.append(current) }
              return chunks
          }
      }
    Sources/Validators/PasswordValidator.swift: |
      struct PasswordValidator {
          private let minLength = 8

          func validate(_ password: String) -> [String] {
              var errors: [String] = []
              let cleaned = password.trimmed
              if cleaned.count < minLength {
                  errors.append("Password must be at least \(minLength) characters")
              }
              if cleaned.rangeOfCharacter(from: .uppercaseLetters) == nil {
                  errors.append("Password must contain an uppercase letter")
              }
              if cleaned.rangeOfCharacter(from: .decimalDigits) == nil {
                  errors.append("Password must contain a digit")
              }
              return errors
          }
      }
    Sources/Extensions/URLExtensions.swift: |
      import Foundation

      extension URL {
          var isSecure: Bool {
              scheme == "https"
          }

          var hostWithoutPort: String? {
              host
          }

          func appendingQueryItem(name: String, value: String) -> URL? {
              var components = URLComponents(url: self, resolvingAgainstBaseURL: false)
              var items = components?.queryItems ?? []
              items.append(URLQueryItem(name: name, value: value))
              components?.queryItems = items
              return components?.url
          }
      }
