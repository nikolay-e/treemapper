name: swift_011_swiftui_view
repo:
  initial_files:
    Sources/Models/User.swift: |
      struct User: Identifiable {
          let id: String
          let name: String
          let email: String
      }
    Sources/Views/UserDetailView.swift: |
      import SwiftUI

      struct UserDetailView: View {
          var body: some View {
              Text("placeholder")
          }
      }
    Sources/Models/Post.swift: |
      struct Post: Identifiable {
          let id: String
          let title: String
          let body: String
          let authorId: String
      }
    Sources/Views/PostListView.swift: |
      import SwiftUI

      struct PostListView: View {
          let posts: [Post]

          var body: some View {
              List(posts) { post in
                  VStack(alignment: .leading) {
                      Text(post.title).font(.headline)
                      Text(post.body).font(.body)
                  }
              }
          }
      }
  changed_files:
    Sources/Models/User.swift: |
      struct User: Identifiable {
          let id: String
          let name: String
          let email: String
      }
    Sources/Views/UserDetailView.swift: |
      import SwiftUI

      struct UserDetailView: View {
          let user: User

          var body: some View {
              VStack(alignment: .leading) {
                  Text(user.name)
                      .font(.headline)
                  Text(user.email)
                      .font(.subheadline)
                      .foregroundColor(.gray)
              }
          }
      }
    Sources/Models/Post.swift: |
      struct Post: Identifiable {
          let id: String
          let title: String
          let body: String
          let authorId: String
      }
    Sources/Views/PostListView.swift: |
      import SwiftUI

      struct PostListView: View {
          let posts: [Post]

          var body: some View {
              List(posts) { post in
                  VStack(alignment: .leading) {
                      Text(post.title).font(.headline)
                      Text(post.body).font(.body)
                  }
              }
          }
      }
  commit_message: Update files
fragments:
- id: userdetailview_file
  selector:
    path: Sources/Views/UserDetailView.swift
- id: req_global_0
  selector:
    anchor: Text(user.name)
- id: no_post
  selector:
    path: Sources/Models/Post.swift
- id: no_postlistview
  selector:
    path: Sources/Views/PostListView.swift
- id: no_global_0
  selector:
    anchor: Post
- id: no_global_1
  selector:
    anchor: authorId
- id: no_global_2
  selector:
    anchor: PostListView
- id: no_global_3
  selector:
    anchor: post.title
oracle:
  required:
  - userdetailview_file
  - req_global_0
  allowed: []
  forbidden:
  - no_post
  - no_postlistview
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
