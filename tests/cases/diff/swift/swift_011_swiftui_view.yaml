# Scenario: UserDetailView gains a body that renders User fields (name, email)
# in a VStack layout. The reviewer sees `Text(user.name)` and `Text(user.email)`
# and needs to confirm those properties exist on the User model.
#
# Reviewer questions:
#   Q1: "Does User have a name and email property for the Text views?"
#       -> Sources/Models/User.swift: let name: String, let email: String
#   Q2: "Does User conform to Identifiable for potential use in Lists?"
#       -> Sources/Models/User.swift: struct User: Identifiable — yes
#
# Not needed:
#   - Sources/Models/Post.swift: another Identifiable model — similar
#     conformance but not rendered by UserDetailView
#   - Sources/Views/PostListView.swift: another SwiftUI view — same
#     directory but renders Posts, not Users

initial:
  Sources/Models/User.swift: |
    struct User: Identifiable {
        let id: String
        let name: String
        let email: String
    }
  Sources/Views/UserDetailView.swift: |
    import SwiftUI

    struct UserDetailView: View {
        var body: some View {
            Text("placeholder")
        }
    }

  # Trap: another Identifiable model — same directory, not rendered by UserDetailView
  Sources/Models/Post.swift: |
    struct Post: Identifiable {
        let id: String
        let title: String
        let body: String
        let authorId: String
    }

  # Trap: sibling SwiftUI view — renders posts, not users
  Sources/Views/PostListView.swift: |
    import SwiftUI

    struct PostListView: View {
        let posts: [Post]

        var body: some View {
            List(posts) { post in
                VStack(alignment: .leading) {
                    Text(post.title).font(.headline)
                    Text(post.body).font(.body)
                }
            }
        }
    }

changed:
  Sources/Models/User.swift: |
    struct User: Identifiable {
        let id: String
        let name: String
        let email: String
    }
  Sources/Views/UserDetailView.swift: |
    import SwiftUI

    struct UserDetailView: View {
        let user: User

        var body: some View {
            VStack(alignment: .leading) {
                Text(user.name)
                    .font(.headline)
                Text(user.email)
                    .font(.subheadline)
                    .foregroundColor(.gray)
            }
        }
    }
  Sources/Models/Post.swift: |
    struct Post: Identifiable {
        let id: String
        let title: String
        let body: String
        let authorId: String
    }
  Sources/Views/PostListView.swift: |
    import SwiftUI

    struct PostListView: View {
        let posts: [Post]

        var body: some View {
            List(posts) { post in
                VStack(alignment: .leading) {
                    Text(post.title).font(.headline)
                    Text(post.body).font(.body)
                }
            }
        }
    }

must_include_files:
- Sources/Views/UserDetailView.swift

must_include_content:
- Text(user.name)

must_not_include:
  # Post.swift: another Identifiable model — not referenced by UserDetailView
  - Post
  - authorId
  # PostListView.swift: sibling SwiftUI view — renders Post items,
  # no relation to UserDetailView or User model
  - PostListView
  - post.title

must_not_include_files:
- Sources/Models/Post.swift
- Sources/Views/PostListView.swift

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
