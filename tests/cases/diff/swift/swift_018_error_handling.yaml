# Scenario: A new service is written that throws typed errors defined elsewhere.
#
# Diff: Features/Payment/PaymentService.swift changes from an empty class to a
# service with processPayment(), validateCard(), and validateFunds() that throw
# PaymentError cases and use PaymentRequest/PaymentReceipt types.
#
# Reviewer questions:
#   Q1: "What cases does PaymentError have?"
#       -> Features/Payment/PaymentError.swift: .insufficientFunds,
#          .invalidCard, .expiredCard, .networkFailure. Reviewer verifies
#          the service throws the correct cases with right associated values.
#
#   Q2: "What fields does PaymentRequest contain?"
#       -> Features/Payment/PaymentModels.swift: amount, cardNumber,
#          expiryMonth, expiryYear, cvv. Reviewer verifies validation logic
#          checks the right fields.
#
#   Q3: "What is PaymentReceipt — the return type?"
#       -> Same file: transactionId, amount, timestamp.
#
# Not needed for comprehension:
#   - Features/Auth/AuthError.swift: Another error enum in different feature.
#     STRUCTURAL TRAP: identical enum: LocalizedError pattern with cases and
#     errorDescription. But authentication errors, not payment.
#
#   - Features/Shipping/ShippingService.swift: Sibling service.
#     STRUCTURAL TRAP: same "feature service" pattern, throws errors.
#     But shipping domain, no PaymentError.
#
#   - Features/Payment/PaymentGateway.swift: Gateway that calls PaymentService.
#     HARDEST TRAP: same directory, calls processPayment(), catches
#     PaymentError cases. Direct consumer with same error handling pattern.
#     But upstream consumer doesn't help verify error case correctness.
#
#   - Features/Payment/PaymentHistory.swift: Stores PaymentReceipt objects.
#     STRUCTURAL TRAP: references PaymentReceipt, same directory. But
#     receipt storage doesn't help verify validation logic.
#
#   - Features/Order/OrderError.swift: Another error enum with similar
#     associated values. STRUCTURAL TRAP: same pattern, same feature layer.
#     Different domain (orders vs payments).

initial:
  Features/Payment/PaymentError.swift: |
    import Foundation

    enum PaymentError: LocalizedError {
        case insufficientFunds(available: Decimal, required: Decimal)
        case invalidCard(reason: String)
        case expiredCard(month: Int, year: Int)
        case networkFailure(underlying: Error)

        var errorDescription: String? {
            switch self {
            case .insufficientFunds(let available, let required):
                return "Insufficient funds: \(available) available, \(required) required"
            case .invalidCard(let reason):
                return "Invalid card: \(reason)"
            case .expiredCard(let month, let year):
                return "Card expired: \(month)/\(year)"
            case .networkFailure(let underlying):
                return "Network error: \(underlying.localizedDescription)"
            }
        }
    }
