# Scenario: UserAPI gains async methods fetchUsers() and getUser(id:) that
# decode JSON into [User]. The reviewer sees `try JSONDecoder().decode(
# [User].self, from: data)` and needs to confirm User conforms to Codable.
#
# Reviewer questions:
#   Q1: "Does User conform to Codable so JSONDecoder can decode it?"
#       -> Sources/Models/User.swift: struct User: Codable — yes
#   Q2: "What properties does User have for the first(where:) filter?"
#       -> Sources/Models/User.swift: let id: String, let name: String
#
# Not needed:
#   - Sources/Models/Product.swift: another Codable model — similar pattern
#     but not decoded or referenced in UserAPI
#   - Sources/Network/ImageDownloader.swift: async network code — uses
#     URLSession but downloads images, not user data

initial:
  Sources/Models/User.swift: |
    struct User: Codable {
        let id: String
        let name: String
    }
  Sources/Network/UserAPI.swift: |
    import Foundation

    class UserAPI {
        func placeholder() {}
    }

  # Trap: another Codable model — same pattern but unrelated to UserAPI
  Sources/Models/Product.swift: |
    struct Product: Codable {
        let sku: String
        let title: String
        let price: Double
    }

  # Trap: async network code — similar URLSession usage but downloads images
  Sources/Network/ImageDownloader.swift: |
    import Foundation

    class ImageDownloader {
        func downloadImage(from url: URL) async throws -> Data {
            let (data, response) = try await URLSession.shared.data(from: url)
            guard let httpResponse = response as? HTTPURLResponse,
                  httpResponse.statusCode == 200 else {
                throw URLError(.badServerResponse)
            }
            return data
        }
    }

changed:
  Sources/Models/User.swift: |
    struct User: Codable {
        let id: String
        let name: String
    }
  Sources/Network/UserAPI.swift: |
    import Foundation

    class UserAPI {
        func fetchUsers() async throws -> [User] {
            let url = URL(string: "https://api.example.com/users")!
            let (data, _) = try await URLSession.shared.data(from: url)
            return try JSONDecoder().decode([User].self, from: data)
        }

        func getUser(id: String) async throws -> User {
            let users = try await fetchUsers()
            guard let user = users.first(where: { $0.id == id }) else {
                throw NSError(domain: "UserAPI", code: 404)
            }
            return user
        }
    }
  Sources/Models/Product.swift: |
    struct Product: Codable {
        let sku: String
        let title: String
        let price: Double
    }
  Sources/Network/ImageDownloader.swift: |
    import Foundation

    class ImageDownloader {
        func downloadImage(from url: URL) async throws -> Data {
            let (data, response) = try await URLSession.shared.data(from: url)
            guard let httpResponse = response as? HTTPURLResponse,
                  httpResponse.statusCode == 200 else {
                throw URLError(.badServerResponse)
            }
            return data
        }
    }

must_include_files:
- Sources/Network/UserAPI.swift

must_include_content:
- "try JSONDecoder().decode([User].self, from: data)"

must_not_include:
  # Product.swift: another Codable model — same conformance pattern but
  # not referenced in UserAPI's fetch or decode logic
  - Product
  - sku
  # ImageDownloader.swift: async URLSession code — similar networking
  # pattern but downloads images, not user JSON
  - ImageDownloader
  - downloadImage

must_not_include_files:
- Sources/Models/Product.swift
- Sources/Network/ImageDownloader.swift

max_fragments: 5
