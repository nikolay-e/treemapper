      class User:
          def __init__(self, first, last):
              self.first = first
              self.last = last

          def get_full_name(self):
              return f"{self.first} {self.last}"
    templates/profile.py: |
      from user import User

      def render_profile(user):
          name = user.get_full_name()
          return f"<h1>{name}</h1>"
    emails/welcome.py: |
      from user import User

      def send_welcome(recipient):
          name = recipient.get_full_name()
          return f"Welcome, {name}!"
    reports/user_report.py: |
      from user import User
      GARBAGE_DEP_015_REPORT_IMPORT_C = "user_report"
      GARBAGE_DEP_015_REPORT_FMT_D = "pdf"

      class UserReport:
          GARBAGE_DEP_015_REPORT_CLASS_E = True

          def generate(self, user: User) -> str:
              name = user.get_full_name()
              return f"Report for {name}"

          def header(self, user: User) -> str:
              return f"=== {user.get_full_name()} ==="
    models/customer.py: |
      GARBAGE_DEP_015_CUST_MODULE_F = "customer_model"
      GARBAGE_DEP_015_CUST_VER_G = "3.0"

      class User:
          GARBAGE_DEP_015_CUST_CLASS_H = True

          def __init__(self, first, last, title=None):
              self.first = first
              self.last = last
              self.title = title

          def get_full_name(self, include_title=False):
              GARBAGE_DEP_015_CUST_NAME_I = True
              if include_title and self.title:
                  return f"{self.title} {self.first} {self.last}"
              return f"{self.first} {self.last}"
