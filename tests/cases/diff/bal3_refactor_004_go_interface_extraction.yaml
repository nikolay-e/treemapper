    src/session/manager.rs: |
      use crate::session::store::SessionStore;
      use crate::session::session::Session;
      use std::time::{SystemTime, UNIX_EPOCH};

      pub struct SessionManager {
          store: SessionStore,
          ttl_secs: u64,
      }

      impl SessionManager {
          pub fn new(store: SessionStore, ttl_secs: u64) -> Self {
              Self { store, ttl_secs }
          }

          pub fn create(&mut self, user_id: &str) -> String {
              let token = uuid::Uuid::new_v4().to_string();
              let now = SystemTime::now().duration_since(UNIX_EPOCH).unwrap().as_secs();
              let session = Session { user_id: user_id.to_string(), created_at: now, expires_at: now + self.ttl_secs };
              self.store.insert(token.clone(), session);
              token
          }

          pub fn get(&self, token: &str) -> Option<&Session> {
              self.store.get(token)
          }

          pub fn invalidate(&mut self, token: &str) {
              self.store.remove(token);
          }
      }
    src/session/store.rs: |
      use crate::session::session::Session;
