name: bal3_refactor_004_go_interface_extraction
tags:
- lang:go
- change:multi_file
- change:refactor
- context:cross_module
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    storage/postgres.go: |
      package storage

      type PostgresRepo struct {
          DSN string
      }

      func NewPostgresRepo(dsn string) *PostgresRepo {
          return &PostgresRepo{DSN: dsn}
      }

      func (r *PostgresRepo) Save(key string, value []byte) error {
          return nil
      }

      func (r *PostgresRepo) Load(key string) ([]byte, error) {
          return nil, nil
      }

      func (r *PostgresRepo) Delete(key string) error {
          return nil
      }
    services/profile.go: |
      package services

      import "storage"

      type ProfileService struct {
          repo *storage.PostgresRepo
      }

      func NewProfileService(repo *storage.PostgresRepo) *ProfileService {
          return &ProfileService{repo: repo}
      }

      func (s *ProfileService) SaveProfile(userID string, data []byte) error {
          return s.repo.Save(userID, data)
      }

      func (s *ProfileService) GetProfile(userID string) ([]byte, error) {
          return s.repo.Load(userID)
      }
    cmd/server/main.go: |
      package main

      import (
          "storage"
          "services"
      )

      func main() {
          repo := storage.NewPostgresRepo("postgres://localhost/db")
          svc := services.NewProfileService(repo)
          _ = svc
      }
