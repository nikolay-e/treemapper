      #[test]
      fn test_expired_session_returns_none() {
          let store = SessionStore::new();
          let mut manager = SessionManager::new(store, 0);
          let token = manager.create("user99");
          std::thread::sleep(std::time::Duration::from_secs(1));
          assert!(manager.get(&token).is_none(), "Expired session should return None");
      }
