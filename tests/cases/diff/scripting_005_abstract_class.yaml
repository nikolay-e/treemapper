name: scripting_005_abstract_class
tags:
- lang:php
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
xfail:
  category: scripting-over-discovery
repo:
  initial_files:
    src/Controllers/UserController.php: |
      <?php
      namespace App\Controllers;

      class UserController {
      }
    src/Controllers/BaseController.php: |
      <?php
      namespace App\Controllers;

      abstract class BaseController {
          abstract protected function getModel(): string;

          public function index(): array {
              return ['model' => $this->getModel()];
          }

          protected function respond(array $data): void {
              header('Content-Type: application/json');
              echo json_encode($data);
          }

          protected function respondError(string $message, int $code = 400): void {
              http_response_code($code);
              $this->respond(['error' => $message, 'code' => $code]);
          }
      }
    src/Controllers/ProductController.php: |
      <?php
      namespace App\Controllers;

      class ProductController extends BaseController {
          protected function getModel(): string {
              return 'Product';
          }

          public function show(int $id): void {
              $this->respond(['id' => $id, 'model' => $this->getModel()]);
          }

          public function list(): void {
              $this->respond(['model' => $this->getModel(), 'items' => []]);
          }
      }
    src/Controllers/OrderController.php: |
      <?php
      namespace App\Controllers;

      class OrderController extends BaseController {
          protected function getModel(): string {
              return 'Order';
          }

          public function show(int $id): void {
              $this->respond(['id' => $id, 'model' => $this->getModel()]);
          }

          public function cancel(int $id): void {
              $this->respond(['id' => $id, 'status' => 'cancelled']);
          }
      }
    src/Models/User.php: |
      <?php
      namespace App\Models;

      class User {
          public int $id;
          public string $name;
          public string $email;

          public function __construct(int $id, string $name, string $email) {
              $this->id = $id;
              $this->name = $name;
              $this->email = $email;
          }

          public function toArray(): array {
              return ['id' => $this->id, 'name' => $this->name, 'email' => $this->email];
          }
      }
    src/Middleware/RateLimiter.php: |
      <?php
      namespace App\Middleware;

      class RateLimiter {
          private int $maxRequests;
          private int $windowSeconds;

          public function __construct(int $maxRequests = 60, int $windowSeconds = 60) {
              $this->maxRequests = $maxRequests;
              $this->windowSeconds = $windowSeconds;
          }

          public function check(string $clientIp): bool {
              return true;
          }

          public function getLimit(): int {
              return $this->maxRequests;
          }
      }
    src/Routes/web.php: |
      <?php
      use App\Controllers\UserController;
      use App\Controllers\ProductController;

      $router->get('/users/{id}', [UserController::class, 'show']);
      $router->get('/users', [UserController::class, 'index']);
      $router->get('/products/{id}', [ProductController::class, 'show']);
      $router->get('/products', [ProductController::class, 'list']);
    tests/UserControllerTest.php: |
      <?php
      namespace Tests;

      use App\Controllers\UserController;
      use PHPUnit\Framework\TestCase;

      class UserControllerTest extends TestCase {
          private UserController $controller;

          protected function setUp(): void {
              $this->controller = new UserController();
          }

          public function testIndex(): void {
              $result = $this->controller->index();
              $this->assertEquals(['model' => 'User'], $result);
          }

          public function testGetModelReturnsUser(): void {
              $result = $this->controller->index();
              $this->assertArrayHasKey('model', $result);
          }
      }
  changed_files:
    src/Controllers/UserController.php: |
      <?php
      namespace App\Controllers;

      class UserController extends BaseController {
          protected function getModel(): string {
              return 'User';
          }

          public function show(int $id): void {
              $this->respond(['id' => $id, 'model' => $this->getModel()]);
          }
      }
  commit_message: Update files
