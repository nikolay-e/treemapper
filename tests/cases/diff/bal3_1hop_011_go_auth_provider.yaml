  changed_files:
    pkg/auth/provider.go: |
      package auth

      import "fmt"

      type User struct {
          ID       string
          Email    string
          Role     string
          Verified bool
      }

      type Provider struct {
          users map[string]*User
      }

      func NewProvider() *Provider {
          return &Provider{users: make(map[string]*User)}
      }

      func (p *Provider) Authenticate(email, password string) (*User, error) {
          u, ok := p.users[email]
          if !ok {
              return nil, fmt.Errorf("user not found")
          }
          if !u.Verified {
              return nil, fmt.Errorf("email not verified")
          }
          return u, nil
      }

      func (p *Provider) Register(id, email, role string) {
          p.users[email] = &User{ID: id, Email: email, Role: role, Verified: false}
      }

      func (p *Provider) VerifyEmail(email string) error {
          u, ok := p.users[email]
          if !ok {
              return fmt.Errorf("user not found")
          }
          u.Verified = true
          return nil
      }
  commit_message: "feat: add email verification to auth provider"
