name: comprehensive_008_monorepo_root_config_extends
tags:
- lang:typescript
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    tsconfig.base.json: |
      {
          "compilerOptions": {
              "target": "ES2020",
              "module": "commonjs",
              "strict": true
          }
      }
    packages/core/tsconfig.json: |
      {
          "extends": "../../tsconfig.base.json",
          "compilerOptions": {
              "outDir": "./dist",
              "rootDir": "./src"
          },
          "include": ["src/**/*"]
      }
    packages/core/src/index.ts: |
      export function coreInit(): boolean {
          return true;
      }

      export const CORE_VERSION = "1.0.0";
    packages/web/tsconfig.json: |
      {
          "extends": "../../tsconfig.base.json",
          "compilerOptions": {
              "jsx": "react",
              "outDir": "./dist",
              "rootDir": "./src"
          },
          "include": ["src/**/*"]
      }
    tools/webpack-analyzer.ts: |
      import * as fs from 'fs';

      interface BundleStats {
        totalSize: number;
        chunkCount: number;
        entryPoints: string[];
      }

      function analyzeBuild(statsPath: string): BundleStats {
        const raw = fs.readFileSync(statsPath, 'utf-8');
        const data = JSON.parse(raw);
        return {
          totalSize: data.assets.reduce((sum: number, a: any) => sum + a.size, 0),
          chunkCount: data.chunks.length,
          entryPoints: Object.keys(data.entrypoints),
        };
      }

      export { analyzeBuild, BundleStats };
    tools/rollup-plugin.ts: |
      interface PluginOptions {
        minify: boolean;
        sourcemap: boolean;
        external: string[];
      }

      function createPlugin(options: PluginOptions) {
        return {
          name: 'custom-rollup-plugin',
          resolveId(source: string) {
            if (options.external.includes(source)) return false;
            return null;
          },
          transform(code: string) {
            return options.minify ? code.replace(/\s+/g, ' ') : code;
          },
        };
      }

      export { createPlugin, PluginOptions };
  changed_files:
    tsconfig.base.json: |
      {
          "compilerOptions": {
              "target": "ES2022",
              "module": "ESNext",
              "moduleResolution": "bundler",
              "strict": true,
              "skipLibCheck": true,
              "esModuleInterop": true,
              "paths": {
                  "@myorg/*": ["packages/*/src"]
              }
          }
      }
    packages/core/tsconfig.json: |
      {
          "extends": "../../tsconfig.base.json",
          "compilerOptions": {
              "outDir": "./dist",
              "rootDir": "./src"
          },
          "include": ["src/**/*"]
      }
    packages/core/src/index.ts: |
      export function coreInit(): boolean {
          return true;
      }

      export const CORE_VERSION = "1.0.0";
    packages/web/tsconfig.json: |
      {
          "extends": "../../tsconfig.base.json",
          "compilerOptions": {
              "jsx": "react",
              "outDir": "./dist",
              "rootDir": "./src"
          },
          "include": ["src/**/*"]
      }
    tools/webpack-analyzer.ts: |
      import * as fs from 'fs';

      interface BundleStats {
        totalSize: number;
        chunkCount: number;
        entryPoints: string[];
      }

      function analyzeBuild(statsPath: string): BundleStats {
        const raw = fs.readFileSync(statsPath, 'utf-8');
        const data = JSON.parse(raw);
        return {
          totalSize: data.assets.reduce((sum: number, a: any) => sum + a.size, 0),
          chunkCount: data.chunks.length,
          entryPoints: Object.keys(data.entrypoints),
        };
      }

      export { analyzeBuild, BundleStats };
    tools/rollup-plugin.ts: |
      interface PluginOptions {
        minify: boolean;
        sourcemap: boolean;
        external: string[];
      }

      function createPlugin(options: PluginOptions) {
        return {
          name: 'custom-rollup-plugin',
          resolveId(source: string) {
            if (options.external.includes(source)) return false;
            return null;
          },
          transform(code: string) {
            return options.minify ? code.replace(/\s+/g, ' ') : code;
          },
        };
      }

      export { createPlugin, PluginOptions };
  commit_message: Update files
fragments:
- id: tsconfig_base_changed
  selector:
    path: tsconfig.base.json
- id: tsconfig_base_target_upgrade
  selector:
    anchor: '"target": "ES2022",'
- id: core_extends_base
  selector:
    path: packages/core/tsconfig.json
    anchor: '"extends": "../../tsconfig.base.json"'
- id: web_extends_base
  selector:
    path: packages/web/tsconfig.json
    anchor: '"extends": "../../tsconfig.base.json"'
- id: no_webpack_analyzer
  selector:
    path: tools/webpack-analyzer.ts
- id: no_rollup_plugin
  selector:
    path: tools/rollup-plugin.ts
- id: no_bundle_stats
  selector:
    anchor: BundleStats
- id: no_create_plugin
  selector:
    anchor: createPlugin
oracle:
  required:
  - tsconfig_base_changed
  - tsconfig_base_target_upgrade
  - core_extends_base
  - web_extends_base
  allowed: []
  forbidden:
  - no_webpack_analyzer
  - no_rollup_plugin
  - no_bundle_stats
  - no_create_plugin
