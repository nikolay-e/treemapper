fragments:
  - id: user_changed
    selector: { path: models/user.py }
  - id: auth_constructor_broken
    selector: { path: services/auth.py }
  - id: user_service_constructor_broken
    selector: { path: services/user_service.py }
  - id: fixtures_constructor_broken
    selector: { path: tests/fixtures.py }
  - id: user_query_only_consumer
    selector: { path: services/user_query.py }
  - id: order_unrelated_model
    selector: { path: models/order.py }
  - id: order_service_unrelated
    selector: { path: services/order_service.py }
  - id: validation_unrelated
    selector: { path: utils/validation.py }
oracle:
  required:
    - user_changed
    - auth_constructor_broken
    - user_service_constructor_broken
    - fixtures_constructor_broken
  allowed:
    - user_query_only_consumer
  forbidden:
    - order_unrelated_model
    - order_service_unrelated
    - validation_unrelated
