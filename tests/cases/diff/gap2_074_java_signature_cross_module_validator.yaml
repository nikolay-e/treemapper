    src/main/java/validation/Validator.java: |
      package validation;

      import java.util.List;

      public interface Validator<T> {
          boolean validate(T input);
          List<String> getErrors(T input);
      }
    src/main/java/validation/EmailValidator.java: |
      package validation;

      import java.util.ArrayList;
      import java.util.List;

      public class EmailValidator implements Validator<String> {
          public boolean validate(String input) {
              return getErrors(input).isEmpty();
          }

          public List<String> getErrors(String input) {
              List<String> errors = new ArrayList<>();
              if (input == null) errors.add("email is null");
              else if (!input.contains("@")) errors.add("missing @ symbol");
              return errors;
          }
      }
