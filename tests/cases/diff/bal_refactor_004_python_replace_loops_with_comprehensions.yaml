repo:
  initial_files:
    data/transform.py: |
      def filter_active_users(users):
          result = []
          for user in users:
              if user.is_active:
                  result.append(user)
          return result

      def extract_emails(users):
          emails = []
          for user in users:
              emails.append(user.email)
          return emails

      def build_lookup(users):
          lookup = {}
          for user in users:
              lookup[user.id] = user.name
          return lookup
    data/report.py: |
      from data.transform import filter_active_users, extract_emails

      def generate_active_email_report(users):
          active = filter_active_users(users)
          emails = extract_emails(active)
          return {"count": len(emails), "emails": emails}
    data/export.py: |
      from data.transform import build_lookup, filter_active_users

      def export_active_lookup(users):
          active = filter_active_users(users)
          lookup = build_lookup(active)
          return lookup
