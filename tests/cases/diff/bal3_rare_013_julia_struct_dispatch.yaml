  changed_files:
    src/components/Table.tsx: |
      import React from 'react';

      interface Column<T> {
        key: keyof T;
        header: string;
        sortable?: boolean;
        render?: (value: T[keyof T], row: T) => React.ReactNode;
      }

      interface TableProps<T> {
        rows: T[];
        columns: Column<T>[];
        onSort?: (key: keyof T) => void;
        striped?: boolean;
        stickyHeader?: boolean;
      }

      export function Table<T extends object>({
        rows,
        columns,
        onSort,
        striped = false,
        stickyHeader = false,
      }: TableProps<T>) {
        return (
          <table className={striped ? 'table-striped' : undefined}>
            <thead className={stickyHeader ? 'sticky' : undefined}>
              <tr>
                {columns.map((c) => (
                  <th
                    key={String(c.key)}
                    onClick={c.sortable && onSort ? () => onSort(c.key) : undefined}
                    style={c.sortable ? { cursor: 'pointer' } : undefined}
                  >
                    {c.header}
                  </th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((row, i) => (
                <tr key={i}>
                  {columns.map((c) => (
                    <td key={String(c.key)}>
                      {c.render ? c.render(row[c.key], row) : String(row[c.key])}
                    </td>
                  ))}
                </tr>
              ))}
            </tbody>
          </table>
        );
      }
    src/components/Pagination.tsx: |
      import React from 'react';

      interface PaginationProps {
        page: number;
        totalPages: number;
        onPageChange: (p: number) => void;
        pageSize?: number;
        onPageSizeChange?: (size: number) => void;
        pageSizeOptions?: number[];
      }

      export const Pagination: React.FC<PaginationProps> = ({
        page,
        totalPages,
        onPageChange,
        pageSize,
        onPageSizeChange,
        pageSizeOptions = [10, 25, 50],
      }) => (
        <div className="pagination">
          <button disabled={page <= 1} onClick={() => onPageChange(page - 1)}>Prev</button>
          <span>{page} / {totalPages}</span>
          <button disabled={page >= totalPages} onClick={() => onPageChange(page + 1)}>Next</button>
          {onPageSizeChange && (
            <select value={pageSize} onChange={(e) => onPageSizeChange(Number(e.target.value))}>
              {pageSizeOptions.map((s) => <option key={s} value={s}>{s}</option>)}
            </select>
          )}
        </div>
      );
    garbage/filters.ts: |
      const GARBAGE_JUL013_FILTERS_A = "filters_marker";
      export function applyFilter<T>(items: T[], fn: (x: T) => boolean): T[] { return items.filter(fn); }
    garbage/sort.ts: |
      const GARBAGE_JUL013_SORT_B = "sort_marker";
      export function sortBy<T>(items: T[], key: keyof T): T[] { return [...items]; }
    garbage/export.ts: |
      const GARBAGE_JUL013_EXPORT_C = "export_marker";
      export function toCsv<T>(rows: T[]): string { return ''; }
  commit_message: "feat: add sorting/striped/sticky to Table and pageSize to Pagination"
