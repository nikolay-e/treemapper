  changed_files:
    lib/counter/server.ex: |
      defmodule Counter.Server do
        use GenServer

        def start_link(initial_count) do
          GenServer.start_link(__MODULE__, initial_count, name: __MODULE__)
        end

        def increment do
          GenServer.call(__MODULE__, :increment)
        end

        def decrement do
          GenServer.call(__MODULE__, :decrement)
        end

        def reset do
          GenServer.call(__MODULE__, :reset)
        end

        def get_count do
          GenServer.call(__MODULE__, :get_count)
        end

        @impl true
        def init(initial_count) do
          {:ok, %{count: initial_count, initial: initial_count}}
        end

        @impl true
        def handle_call(:increment, _from, state) do
          new_state = %{state | count: state.count + 1}
          {:reply, new_state.count, new_state}
        end

        @impl true
        def handle_call(:decrement, _from, state) do
          new_state = %{state | count: max(state.count - 1, 0)}
          {:reply, new_state.count, new_state}
        end

        @impl true
        def handle_call(:reset, _from, state) do
          new_state = %{state | count: state.initial}
          {:reply, :ok, new_state}
        end

        @impl true
        def handle_call(:get_count, _from, state) do
          {:reply, state.count, state}
        end
      end
    lib/counter/application.ex: |
      defmodule Counter.Application do
        use Application

        def start(_type, _args) do
          children = [
            {Counter.Server, 0}
          ]
          Supervisor.start_link(children, strategy: :one_for_one)
        end
      end
    garbage_reporter.ex: |
      defmodule GarbageReporter do
        @garbage_rare_004_interval_a 5000
        @garbage_rare_004_format_b :json

        def report(data) do
