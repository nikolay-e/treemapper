    src/Services/RedisCacheService.cs: |
      using System;
      using System.Collections.Generic;
      using System.Threading.Tasks;
      using App.Services;

      namespace App.Services
      {
          public class RedisCacheService : ICacheService
          {
              private readonly Dictionary<string, string> _store = new();

              public Task<string> Get(string key)
              {
                  _store.TryGetValue(key, out var value);
                  return Task.FromResult(value);
              }

              public Task Set(string key, string value, TimeSpan ttl)
              {
                  _store[key] = value;
                  return Task.CompletedTask;
              }

              public Task Remove(string key)
              {
                  _store.Remove(key);
                  return Task.CompletedTask;
              }
          }
      }
    src/Services/ProductService.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Services;

      namespace App.Services
      {
          public class ProductService
          {
              private readonly ICacheService _cache;

              public ProductService(ICacheService cache)
              {
                  _cache = cache;
              }

              public async Task<string> GetProduct(string id)
              {
                  var cached = await _cache.Get($"product:{id}");
                  if (cached != null) return cached;
                  var product = $"Product-{id}";
                  await _cache.Set($"product:{id}", product, TimeSpan.FromMinutes(10));
                  return product;
              }
          }
      }
    src/Controllers/ProductController.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Services;
      using Microsoft.AspNetCore.Mvc;

      namespace App.Controllers
      {
          [ApiController]
          [Route("api/products")]
          public class ProductController : ControllerBase
          {
              private readonly ProductService _productService;

              public ProductController(ProductService productService)
              {
                  _productService = productService;
              }

              [HttpGet("{id}")]
              public async Task<IActionResult> Get(string id)
              {
                  var product = await _productService.GetProduct(id);
                  return Ok(product);
              }
          }
      }
    src/Startup/ServiceRegistration.cs: |
      using System;
      using App.Services;
      using Microsoft.Extensions.DependencyInjection;

      namespace App.Startup
      {
          public static class ServiceRegistration
          {
              public static void AddApplicationServices(this IServiceCollection services)
              {
                  services.AddSingleton<ICacheService, RedisCacheService>();
                  services.AddScoped<ProductService>();
              }
          }
      }
