    internal/entity/item.go: |
      package entity

      type Item struct {
          ID   int
          Qty  int
      }
    internal/repo/item_repo.go: |
      package repo

      import "myapp/internal/entity"

      func GetItem(id int) entity.Item {
          return entity.Item{ID: id, Qty: 5}
      }
    internal/domain/inventory.go: |
      package domain

      import "myapp/internal/repo"

      func Stock(id int) int {
          it := repo.GetItem(id)
          return it.Qty
      }
