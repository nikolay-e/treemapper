  changed_files:
    Sources/Services/SearchService.swift: |
      import Combine

      class SearchService {
          func search(query: String) -> AnyPublisher<[String], Never> {
              Just(["Result 1", "Result 2"])
                  .eraseToAnyPublisher()
          }
      }
    Sources/ViewModels/SearchViewModel.swift: |
      import Combine

      class SearchViewModel: ObservableObject {
          @Published var searchText = ""
          @Published var results: [String] = []

          private let service = SearchService()
          private var cancellables = Set<AnyCancellable>()

          init() {
              $searchText
                  .debounce(for: .milliseconds(300), scheduler: RunLoop.main)
                  .removeDuplicates()
                  .flatMap { [weak self] query in
                      self?.service.search(query: query) ?? Just([]).eraseToAnyPublisher()
                  }
                  .assign(to: &$results)
          }
      }
    Sources/Services/AnalyticsService.swift: |
      import Foundation

      class AnalyticsService {
          static let shared = AnalyticsService()

          func track(event: String, properties: [String: String] = [:]) {
              print("Track: \(event) \(properties)")
          }

          func identify(userId: String) {
              print("Identify: \(userId)")
          }
      }
    Sources/ViewModels/SettingsViewModel.swift: |
      import Combine

      class SettingsViewModel: ObservableObject {
          @Published var darkMode = false
          @Published var fontSize: Double = 14.0

          func resetToDefaults() {
              darkMode = false
              fontSize = 14.0
          }
      }
