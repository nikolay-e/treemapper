name: terraform_055_import_block
repo:
  initial_files:
    main.tf: |
      # Managed S3 resources
    policy.tf: |
      data "aws_iam_policy_document" "bucket_policy" {
        statement {
          effect    = "Deny"
          actions   = ["s3:*"]
          resources = ["arn:aws:s3:::my-existing-bucket/*"]
          principals {
            type        = "*"
            identifiers = ["*"]
          }
          condition {
            test     = "Bool"
            variable = "aws:SecureTransport"
            values   = ["false"]
          }
        }
      }

      resource "aws_s3_bucket_policy" "existing" {
        bucket = "my-existing-bucket"
        policy = data.aws_iam_policy_document.bucket_policy.json
      }
    cloudfront.tf: |
      resource "aws_cloudfront_distribution" "website" {
        enabled             = true
        default_root_object = "index.html"

        origin {
          domain_name = "my-existing-bucket.s3.amazonaws.com"
          origin_id   = "S3-my-existing-bucket"

          s3_origin_config {
            origin_access_identity = aws_cloudfront_origin_access_identity.main.cloudfront_access_identity_path
          }
        }

        default_cache_behavior {
          allowed_methods  = ["GET", "HEAD"]
          cached_methods   = ["GET", "HEAD"]
          target_origin_id = "S3-my-existing-bucket"

          viewer_protocol_policy = "redirect-to-https"
          forwarded_values {
            query_string = false
            cookies { forward = "none" }
          }
        }

        restrictions {
          geo_restriction { restriction_type = "none" }
        }

        viewer_certificate {
          cloudfront_default_certificate = true
        }
      }
    database/import.tf: |
      import {
        to = aws_db_instance.legacy
        id = "legacy-database"
      }

      resource "aws_db_instance" "legacy" {
        identifier     = "legacy-database"
        engine         = "mysql"
        instance_class = "db.t3.medium"

        tags = {
          ManagedBy = "terraform"
          Imported  = "true"
        }
      }
    logs/import.tf: |
      import {
        to = aws_s3_bucket.access_logs
        id = "access-logs-bucket"
      }

      resource "aws_s3_bucket" "access_logs" {
        bucket = "access-logs-bucket"

        tags = {
          ManagedBy = "terraform"
          Purpose   = "access-logging"
        }
      }
    alb.tf: |
      resource "aws_lb" "app" {
        name               = "app-lb"
        internal           = false
        load_balancer_type = "application"
        subnets            = var.public_subnet_ids
      }
    backup/s3.tf: |
      resource "aws_s3_bucket" "backups" {
        bucket = "app-backups-bucket"

        tags = {
          Purpose = "database-backups"
        }
      }

      resource "aws_s3_bucket_versioning" "backups" {
        bucket = aws_s3_bucket.backups.id
        versioning_configuration {
          status = "Enabled"
        }
      }
  changed_files:
    main.tf: |
      import {
        to = aws_s3_bucket.existing
        id = "my-existing-bucket"
      }

      resource "aws_s3_bucket" "existing" {
        bucket = "my-existing-bucket"

        tags = {
          ManagedBy = "terraform"
          Imported  = "true"
        }
      }
  commit_message: Update files
