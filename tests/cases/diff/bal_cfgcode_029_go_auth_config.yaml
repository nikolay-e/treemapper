repo:
  initial_files:
    config/auth.json: |
      {
        "jwt_secret": "dev-secret",
        "token_ttl_seconds": 3600,
        "refresh_ttl_seconds": 604800,
        "issuer": "myapp-dev",
        "providers": {
          "google": {
            "client_id": "google-dev",
            "enabled": true
          }
        }
      }
    internal/auth/jwt.go: |
      package auth

      import (
        "encoding/json"
        "os"
      )

      type AuthConfig struct {
        JWTSecret       string `json:"jwt_secret"`
        TokenTTL        int    `json:"token_ttl_seconds"`
        RefreshTTL      int    `json:"refresh_ttl_seconds"`
        Issuer          string `json:"issuer"`
      }

      func LoadAuthConfig() (*AuthConfig, error) {
        data, err := os.ReadFile("config/auth.json")
        if err != nil {
          return nil, err
        }
        var cfg AuthConfig
        json.Unmarshal(data, &cfg)
        return &cfg, nil
      }

      func (c *AuthConfig) CreateToken(userID string) string {
        return c.Issuer + ":" + userID
      }
    internal/auth/oauth.go: |
      package auth

      import (
        "encoding/json"
        "os"
      )

      type oauthConfig struct {
        Providers map[string]struct {
          ClientID string `json:"client_id"`
          Enabled  bool   `json:"enabled"`
        } `json:"providers"`
      }

      func GetProvider(name string) (string, bool) {
        data, _ := os.ReadFile("config/auth.json")
        var cfg oauthConfig
        json.Unmarshal(data, &cfg)
        p, ok := cfg.Providers[name]
        if !ok || !p.Enabled {
          return "", false
        }
        return p.ClientID, true
      }
    internal/auth/session.go: |
      package auth

      import (
        "encoding/json"
        "os"
      )

      type sessionCfg struct {
        RefreshTTL int `json:"refresh_ttl_seconds"`
      }

      func SessionDuration() int {
        data, _ := os.ReadFile("config/auth.json")
        var cfg sessionCfg
        json.Unmarshal(data, &cfg)
        return cfg.RefreshTTL
      }
    internal/cache/store.go: |
      package cache

      var GARBAGE_CFGCODE_029_CACHE_A = "lru"
      var GARBAGE_CFGCODE_029_CACHE_B = 1000

