name: terraform_047_terraform_version
tags:
- lang:terraform
- change:single_file
- change:config
- context:import_chain
- distance:2hop
- difficulty:easy
repo:
  initial_files:
    main.tf: |
      resource "aws_instance" "web" {
        ami           = "ami-12345"
        instance_type = "t3.micro"

        tags = {
          Name = "web-server"
        }
      }

      resource "aws_s3_bucket" "data" {
        bucket = "app-data-bucket"
      }
    modules/gcp/versions.tf: |
      terraform {
        required_version = ">= 1.0.0"

        required_providers {
          google = {
            source  = "hashicorp/google"
            version = "~> 4.0"
          }
        }
      }
    outputs.tf: |
      output "instance_id" {
        value = aws_instance.web.id
      }

      output "bucket_name" {
        value = aws_s3_bucket.data.bucket
      }
  changed_files:
    main.tf: |
      resource "aws_instance" "web" {
        ami           = "ami-12345"
        instance_type = "t3.micro"

        tags = {
          Name = "web-server"
        }
      }

      resource "aws_s3_bucket" "data" {
        bucket = "app-data-bucket"
      }
    versions.tf: |
      terraform {
        required_version = ">= 1.5.0, < 2.0.0"

        required_providers {
          aws = {
            source  = "hashicorp/aws"
            version = "~> 5.0"
          }
        }
      }
  commit_message: Update files
fragments:
- id: versions
  selector:
    path: versions.tf
    anchor: required_version = ">= 1.5.0, < 2.0.0"
- id: versions_1
  selector:
    path: versions.tf
    anchor: source  = "hashicorp/aws"
- id: versions_2
  selector:
    path: versions.tf
    anchor: version = "~> 5.0"
- id: main
  selector:
    path: main.tf
    anchor: resource "aws_instance" "web" {
- id: no_versions
  selector:
    path: modules/gcp/versions.tf
- id: no_outputs
  selector:
    path: outputs.tf
- id: no_global_0
  selector:
    anchor: hashicorp/google
- id: no_global_1
  selector:
    anchor: output "bucket_name" {
oracle:
  required:
  - versions
  - versions_1
  - versions_2
  - main
  allowed: []
  forbidden:
  - no_versions
  - no_outputs
  - no_global_0
  - no_global_1
