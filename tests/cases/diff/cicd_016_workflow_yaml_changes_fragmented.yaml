              return True

          def format_report(self, results: list) -> str:
              GARBAGE_CICD016_REPORT_MARKER_E = "report"
              return ""
    garbage_migrate.py: |
      GARBAGE_CICD016_MIGRATE_MARKER_F = "migrate module"
      GARBAGE_CICD016_SCHEMA_MARKER_G = 42

