    service/greeter.go: |
      package service

      import "fmt"

      type GreeterService struct {
          prefix string
      }

      func NewGreeterService(prefix string) *GreeterService {
          return &GreeterService{prefix: prefix}
      }

      func (s *GreeterService) Greet(name string) string {
          return fmt.Sprintf("%s, %s!", s.prefix, name)
      }
    service/greeter_test.go: |
      package service

      import "testing"

      func TestGreet(t *testing.T) {
          svc := NewGreeterService("Hello")
          got := svc.Greet("World")
          if got != "Hello, World!" {
              t.Fatalf("expected 'Hello, World!', got '%s'", got)
          }
      }
    service/echo.go: |
