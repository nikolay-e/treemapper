    Sources/Models/Order.swift: |
      struct OrderItem {
          let productId: Int
          let quantity: Int
          let unitPrice: Double
      }

      struct Order {
          let id: Int
          var items: [OrderItem]

          func totalPrice() -> Double {
              return items.reduce(0) { $0 + $1.unitPrice * Double($1.quantity) }
          }
      }
    Sources/Services/OrderService.swift: |
      class OrderService {
          func averageItemPrice(order: Order) -> Double {
              guard !order.items.isEmpty else {
                  return 0.0
              }
              let total = order.totalPrice()
              return total / Double(order.items.count)
          }

          func hasItems(_ order: Order) -> Bool {
              return order.items.count > 0
          }
      }
    Sources/Views/OrderSummary.swift: |
      class OrderSummaryView {
          let service: OrderService

