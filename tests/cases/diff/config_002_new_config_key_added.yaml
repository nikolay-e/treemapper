name: config_002_new_config_key_added
repo:
  initial_files:
    config.yaml: |
      app:
        name: MyApp
        version: 2.1.0
        debug: false

      authentication:
        session_timeout: 3600
        max_login_attempts: 5
        lockout_duration: 900

      payment:
        provider: stripe
        currency: USD
        tax_rate: 0.08
    checkout/views.py: |
      import yaml


      def load_app_config():
          with open("config.yaml") as f:
              return yaml.safe_load(f)


      def checkout(cart_items: list[dict]) -> dict:
          config = load_app_config()
          tax_rate = config["payment"]["tax_rate"]
          subtotal = sum(item["price"] * item["quantity"] for item in cart_items)
          tax = subtotal * tax_rate
          return {
              "subtotal": subtotal,
              "tax": round(tax, 2),
              "total": round(subtotal + tax, 2),
              "currency": config["payment"]["currency"],
          }


      def get_payment_provider() -> str:
          config = load_app_config()
          return config["payment"]["provider"]
    checkout/models.py: |
      from dataclasses import dataclass, field
      from typing import Optional


      @dataclass
      class CartItem:
          product_id: str
          name: str
          price: float
          quantity: int = 1


      @dataclass
      class Order:
          items: list[CartItem] = field(default_factory=list)
          discount_code: Optional[str] = None

          @property
          def item_count(self) -> int:
              return sum(item.quantity for item in self.items)
    notifications/email.py: |
      from typing import Optional


      def send_order_confirmation(email: str, order_id: str) -> bool:
          return len(email) > 0 and len(order_id) > 0


      def send_password_reset(email: str, reset_token: str, expiry_minutes: int = 30) -> dict:
          return {"to": email, "token": reset_token, "expires_in": expiry_minutes}


      def format_email_subject(template: str, context: Optional[dict] = None) -> str:
          if context:
              return template.format(**context)
          return template
    db/migrations.py: |
      from datetime import datetime


      class MigrationRunner:
          def __init__(self, db_url: str):
              self.db_url = db_url
              self.applied: list[str] = []

          def run(self, migration_name: str):
              self.applied.append(migration_name)

          def rollback(self):
              if self.applied:
                  self.applied.pop()

          def get_pending(self, all_migrations: list[str]) -> list[str]:
              return [m for m in all_migrations if m not in self.applied]
