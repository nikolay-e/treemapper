fragments:
- id: config_file
  selector:
    path: config.yaml
- id: feature_flags_section
  selector:
    anchor: 'feature_flags:'
- id: config_loader
  selector:
    path: checkout/views.py
    anchor: load_app_config
- id: no_email_notifications
  selector:
    path: notifications/email.py
- id: no_migrations
  selector:
    path: db/migrations.py
- id: no_checkout_models
  selector:
    path: checkout/models.py
- id: no_send_order_confirmation
  selector:
    anchor: send_order_confirmation
- id: no_migration_runner
  selector:
    anchor: MigrationRunner
- id: no_cart_item_dataclass
  selector:
    anchor: 'class CartItem'
oracle:
  required:
  - config_file
  - feature_flags_section
  - config_loader
  allowed: []
  forbidden:
  - no_email_notifications
  - no_migrations
  - no_checkout_models
  - no_send_order_confirmation
  - no_migration_runner
  - no_cart_item_dataclass
