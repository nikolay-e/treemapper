    pipeline/image.py: |
      from dataclasses import dataclass
      import math

      @dataclass
      class Pixel:
          r: int
          g: int
          b: int
          a: int = 255

      class Image:
          def __init__(self, width: int, height: int):
              self._width = width
              self._height = height
              self._pixels: list[list[Pixel]] = [
                  [Pixel(0, 0, 0) for _ in range(width)]
                  for _ in range(height)
              ]

          def dimensions(self) -> tuple[int, int]:
              return (self._width, self._height)

          def get_pixel(self, x: int, y: int) -> Pixel:
              return self._pixels[y][x]

          def set_pixel(self, x: int, y: int, pixel: Pixel) -> None:
              self._pixels[y][x] = pixel

          def fill(self, pixel: Pixel) -> None:
              for y in range(self._height):
                  for x in range(self._width):
                      self._pixels[y][x] = pixel

          def grayscale(self) -> "Image":
              result = Image(self._width, self._height)
              for y in range(self._height):
                  for x in range(self._width):
                      p = self._pixels[y][x]
                      lum = int(0.299 * p.r + 0.587 * p.g + 0.114 * p.b)
                      result.set_pixel(x, y, Pixel(lum, lum, lum, p.a))
              return result

          def invert(self) -> "Image":
              result = Image(self._width, self._height)
              for y in range(self._height):
                  for x in range(self._width):
                      p = self._pixels[y][x]
                      result.set_pixel(x, y, Pixel(255 - p.r, 255 - p.g, 255 - p.b, p.a))
              return result

          def crop(self, x1: int, y1: int, x2: int, y2: int) -> "Image":
              w = x2 - x1
              h = y2 - y1
              result = Image(w, h)
              for y in range(h):
                  for x in range(w):
                      result.set_pixel(x, y, self._pixels[y1 + y][x1 + x])
              return result

          def brightness(self, factor: float) -> "Image":
              result = Image(self._width, self._height)
              for y in range(self._height):
                  for x in range(self._width):
                      p = self._pixels[y][x]
                      r = min(255, int(p.r * factor))
                      g = min(255, int(p.g * factor))
                      b = min(255, int(p.b * factor))
                      result.set_pixel(x, y, Pixel(r, g, b, p.a))
              return result

          def histogram(self) -> dict[str, list[int]]:
              r_hist = [0] * 256
              g_hist = [0] * 256
              b_hist = [0] * 256
              for y in range(self._height):
                  for x in range(self._width):
                      p = self._pixels[y][x]
                      r_hist[p.r] += 1
                      g_hist[p.g] += 1
                      b_hist[p.b] += 1
              return {"r": r_hist, "g": g_hist, "b": b_hist}
