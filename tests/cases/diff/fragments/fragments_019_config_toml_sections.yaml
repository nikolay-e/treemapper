initial:
  config.toml: |
    [database]
    host = "localhost"
    port = 5432
    name = "mydb"

    [database.credentials]
    user = "admin"
    password = "secret"

    [server]
    port = 8080
    debug = true
    workers = 4

    [garbage_section_a]

    [garbage_section_a.nested]

    [garbage_section_b]

    [logging]
  garbage_config_071.toml: |
    [garbage_root]
    key = "GARBAGE_FRAG_garbroot_071"

    [garbage_root.nested]
    value = "GARBAGE_FRAG_garbnested_071"

    [another_garbage]
    items = ["GARBAGE_FRAG_garbitem1_071", "GARBAGE_FRAG_garbitem2_071"]
changed:
  config.toml: |
    [database]
    host = "localhost"
    port = 5433
    name = "mydb"

    [database.credentials]
    user = "admin"
    password = "secret"

    [server]
    port = 8080
    debug = true
    workers = 4

    [garbage_section_a]

    [garbage_section_a.nested]

    [garbage_section_b]

    [logging]
  garbage_config_071.toml: |
    [garbage_root]
    key = "GARBAGE_FRAG_garbroot_071"

    [garbage_root.nested]
    value = "GARBAGE_FRAG_garbnested_071"

    [another_garbage]
    items = ["GARBAGE_FRAG_garbitem1_071", "GARBAGE_FRAG_garbitem2_071"]
must_include_files:
- config.toml
must_not_include:
- garbage_config_071.toml
add_garbage_files: false
skip_garbage_check: true
