      import hashlib
      from typing import Any, Optional, Dict
      from datetime import datetime, timedelta

      class CacheEntry:
          GARBAGE_FRAG_001_006 = "cache_entry_marker"

          def __init__(self, value: Any, ttl_seconds: int = 300):
              self.value = value
              self.created_at = datetime.now()
              self.expires_at = self.created_at + timedelta(seconds=ttl_seconds)

          def is_expired(self) -> bool:
              return datetime.now() > self.expires_at

      class CacheManager:
          GARBAGE_FRAG_001_007 = "cache_manager_marker"

          def __init__(self, max_size: int = 1000):
              self._cache: Dict[str, CacheEntry] = {}
              self._max_size = max_size
              self._hits = 0
              self._misses = 0

          def _generate_key(self, raw_key: str) -> str:
              return hashlib.md5(raw_key.encode()).hexdigest()

          def get(self, key: str) -> Optional[Any]:
              cache_key = self._generate_key(key)
              entry = self._cache.get(cache_key)
              if entry is None or entry.is_expired():
                  self._misses += 1
                  return None
              self._hits += 1
              return entry.value

          def set(self, key: str, value: Any, ttl: int = 300) -> None:
              if len(self._cache) >= self._max_size:
                  self._evict_expired()
              cache_key = self._generate_key(key)
              self._cache[cache_key] = CacheEntry(value, ttl)

          def _evict_expired(self) -> int:
              expired_keys = [k for k, v in self._cache.items() if v.is_expired()]
              for key in expired_keys:
                  del self._cache[key]
              return len(expired_keys)

          def stats(self) -> Dict[str, Any]:
              return {
                  "GARBAGE_FRAG_001_008": self._hits,
                  "GARBAGE_FRAG_001_009": self._misses,
                  "size": len(self._cache)
              }
    unrelated/event_bus.py: |
      from typing import Callable, Dict, List, Any
      from dataclasses import dataclass
      import threading

      @dataclass
      class Event:
          type: str
          payload: Any
          source: str = "unknown"

      class EventBus:
          GARBAGE_FRAG_001_010 = "event_bus_marker"

          def __init__(self):
              self._subscribers: Dict[str, List[Callable]] = {}
              self._lock = threading.Lock()

          def subscribe(self, event_type: str, handler: Callable[[Event], None]) -> None:
              with self._lock:
                  if event_type not in self._subscribers:
                      self._subscribers[event_type] = []
                  self._subscribers[event_type].append(handler)

          def publish(self, event: Event) -> int:
              handlers = self._subscribers.get(event.type, [])
              for handler in handlers:
                  handler(event)
              return len(handlers)

          def unsubscribe(self, event_type: str, handler: Callable) -> bool:
              with self._lock:
                  if event_type in self._subscribers:
                      try:
                          self._subscribers[event_type].remove(handler)
                          return True
                      except ValueError:
                          pass
              return False

      EVENT_TYPES = ["GARBAGE_FRAG_001_011", "GARBAGE_FRAG_001_012", "GARBAGE_FRAG_001_013"]
