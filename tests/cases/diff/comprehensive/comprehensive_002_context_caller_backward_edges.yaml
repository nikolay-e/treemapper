      from typing import List

      def core_function(values: List[int]) -> int:
          if not values:
              return 0
          total = sum(values)
          return total // len(values)

      def secondary_helper(x: int) -> int:
          return x * x

      def format_output(result: int) -> str:
          return f"Result: {result}"
    src/caller_a.py: |
