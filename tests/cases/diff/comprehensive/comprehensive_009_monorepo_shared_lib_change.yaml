# Test 009: Shared formatDate() gains format parameter — reviewer needs callers
#
# Scenario: packages/shared/src/utils.ts changes formatDate() signature from
# (date: Date) to (date: Date, format: string = 'iso') and adds parseDate().
# The default preserves old behavior, but callers should be verified.
#
# Reviewer questions:
#   Q1: "Who calls formatDate()?" -> DateDisplay.tsx calls formatDate(date)
#       and formatDate(start)/formatDate(end). The new default 'iso' means
#       these still return ISO strings, but the reviewer needs to see
#       whether any caller intended a different format.
#   Q2: "Same question for API side" -> report.ts calls formatDate(date)
#       and formatCurrency(). Reviewer needs to verify the report output
#       is not affected by the signature change.
#
# Not needed:
#   - slugify-test.ts: tests for the slugify() function in the same utils
#     file. Reviewer understanding formatDate changes gains nothing from
#     seeing slug tests.
#   - currency-formatter.ts: standalone currency formatting module. Same
#     domain (formatting) but does not import from shared/utils.
#   - packages/shared/package.json: package metadata, no comprehension value.

initial:
  packages/shared/src/utils.ts: |
    export function formatDate(date: Date): string {
        return date.toISOString();
    }

    export function formatCurrency(amount: number, currency: string): string {
        return `${currency}${amount.toFixed(2)}`;
    }

    export function slugify(text: string): string {
        return text.toLowerCase().replace(/\s+/g, '-');
    }
  packages/web/src/components/DateDisplay.tsx: |
    import { formatDate } from '@myorg/shared';

    export function DateDisplay({ date }: { date: Date }) {
        return <span>{formatDate(date)}</span>;
    }

    export function DateRange({ start, end }: { start: Date; end: Date }) {
        return <span>{formatDate(start)} - {formatDate(end)}</span>;
    }
  packages/api/src/handlers/report.ts: |
    import { formatDate, formatCurrency } from '@myorg/shared';

    export function generateReport(date: Date, revenue: number) {
        return {
            generatedAt: formatDate(date),
            totalRevenue: formatCurrency(revenue, '$'),
        };
    }

    export function generateSummary(dates: Date[]) {
        return dates.map(d => formatDate(d));
    }
  packages/shared/src/__tests__/slugify-test.ts: |
    import { slugify } from '../utils';

    function testSlugifyBasic() {
      const result = slugify('Hello World');
      if (result !== 'hello-world') throw new Error('slugify failed');
    }

    function testSlugifyMultipleSpaces() {
      const result = slugify('multiple   spaces   here');
      if (result !== 'multiple---spaces---here') throw new Error('multi-space failed');
    }

    function testSlugifyAlreadyLower() {
      const result = slugify('already-slugged');
      if (result !== 'already-slugged') throw new Error('idempotent failed');
    }

    testSlugifyBasic();
    testSlugifyMultipleSpaces();
    testSlugifyAlreadyLower();
  packages/web/src/utils/currency-formatter.ts: |
    interface CurrencyFormatOptions {
      locale: string;
      currency: string;
      minimumFractionDigits: number;
    }

    const DEFAULT_OPTIONS: CurrencyFormatOptions = {
      locale: 'en-US',
      currency: 'USD',
      minimumFractionDigits: 2,
    };

    export function formatPrice(amount: number, options?: Partial<CurrencyFormatOptions>): string {
      const merged = { ...DEFAULT_OPTIONS, ...options };
      return new Intl.NumberFormat(merged.locale, {
        style: 'currency',
        currency: merged.currency,
        minimumFractionDigits: merged.minimumFractionDigits,
      }).format(amount);
    }

    export function parsePriceString(priceStr: string): number {
      return parseFloat(priceStr.replace(/[^0-9.-]/g, ''));
    }
  packages/shared/package.json: |
    {
      "name": "@myorg/shared",
      "version": "2.1.0",
      "main": "dist/index.js",
      "types": "dist/index.d.ts",
      "license": "MIT"
    }

changed:
  packages/shared/src/utils.ts: |
    export function formatDate(date: Date, format: string = 'iso'): string {
        if (format === 'iso') {
            return date.toISOString();
        }
        if (format === 'locale') {
            return date.toLocaleDateString();
        }
        return date.toString();
    }

    export function parseDate(str: string): Date {
        return new Date(str);
    }

    export function formatCurrency(amount: number, currency: string): string {
        return `${currency}${amount.toFixed(2)}`;
    }

    export function slugify(text: string): string {
        return text.toLowerCase().replace(/\s+/g, '-');
    }

must_include_files:
  - packages/shared/src/utils.ts
  # Q1: Frontend caller — does formatDate(date) still render correctly?
  - packages/web/src/components/DateDisplay.tsx
  # Q2: API caller — does report generation still produce ISO dates?
  - packages/api/src/handlers/report.ts
must_include_content_from:
  packages/shared/src/utils.ts:
    - "function formatDate(date: Date, format: string = 'iso')"
    - "function parseDate(str: string): Date"
  packages/web/src/components/DateDisplay.tsx:
    # Caller site — reviewer checks these still get ISO format
    - "formatDate(date)"
  packages/api/src/handlers/report.ts:
    # Another caller across packages
    - "formatDate(date)"
    - "formatCurrency(revenue"
must_not_include:
  # --- slugify-test.ts: tests for unrelated function in same file ---
  - testSlugifyBasic
  - testSlugifyMultipleSpaces
  - testSlugifyAlreadyLower
  # --- currency-formatter.ts: standalone formatting, not shared/utils ---
  - formatPrice
  - parsePriceString
  - CurrencyFormatOptions
  - Intl.NumberFormat
  # --- package.json: metadata ---
  - "@myorg/shared"
  - "dist/index.js"
must_not_include_files:
  - packages/shared/src/__tests__/slugify-test.ts
  - packages/web/src/utils/currency-formatter.ts
  - packages/shared/package.json
max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
