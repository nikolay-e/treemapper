  # Q1: "Who constructs User and will it break?"
  # getUser() returns { id, name } — now missing 3 required fields.
  - packages/api/src/routes/users.ts
  # Q2: Same question, different consumer across packages.
  # useUser() returns { id, name } — also broken.
  - packages/web/src/hooks/useUser.ts
must_include_content_from:
  packages/types/src/user.ts:
    - interface User
    - enum UserRole
    - "email: string"
    - "role: UserRole"
  packages/api/src/routes/users.ts:
    # The broken construction site
    - "return { id, name: 'John' }"
  packages/web/src/hooks/useUser.ts:
    # Same broken pattern in a different package
    - "return { id, name: 'John' }"
must_not_include:
  # --- auth middleware: no User construction or destructuring ---
  - authMiddleware
  - verifyToken
  - "Bearer"
  # --- logger: generic request logging ---
  - requestLogger
  - errorLogger
  # --- user-analytics: uses userId string, not User type ---
  - trackPageView
  - getPageViewsByUser
  - getUniqueVisitorCount
  # --- tsconfig: compiler settings != type comprehension ---
  - "ES2022"
  - "NodeNext"
must_not_include_files:
  - packages/api/src/middleware/auth.ts
  - packages/api/src/middleware/logger.ts
  - packages/web/src/analytics/user-analytics.ts
  - tsconfig.json
max_fragments: 10
max_files: 4
add_garbage_files: false
