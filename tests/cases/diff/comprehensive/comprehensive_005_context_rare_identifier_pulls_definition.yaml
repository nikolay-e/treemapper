      from typing import Dict, Optional

      def fibonacci_memoized_optimized(n: int, cache: Optional[Dict] = None) -> int:
          if cache is None:
              cache = {}
          if n in cache:
              return cache[n]
          if n <= 1:
              return n
          result = fibonacci_memoized_optimized(n - 1, cache) + fibonacci_memoized_optimized(n - 2, cache)
          cache[n] = result
          return result

      def collatz_sequence_length(n: int) -> int:
          count = 0
          while n != 1:
              n = n // 2 if n % 2 == 0 else 3 * n + 1
              count += 1
          return count
