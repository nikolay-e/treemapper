name: gap_041_go_signature_router_middleware
tags:
- lang:go
- change:signature
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    pkg/middleware/ratelimit.go: |
      package middleware

      import (
          "net/http"
          "sync"
          "time"
      )

      type RateLimiter struct {
          mu       sync.Mutex
          visitors map[string]*visitor
          limit    int
          window   time.Duration
      }

      type visitor struct {
          count    int
          lastSeen time.Time
      }

      func NewRateLimiter(limit int, window time.Duration) *RateLimiter {
          return &RateLimiter{
              visitors: make(map[string]*visitor),
              limit:    limit,
              window:   window,
          }
      }

      func (rl *RateLimiter) Allow(ip string) bool {
          rl.mu.Lock()
          defer rl.mu.Unlock()
          v, exists := rl.visitors[ip]
          if !exists || time.Since(v.lastSeen) > rl.window {
              rl.visitors[ip] = &visitor{count: 1, lastSeen: time.Now()}
              return true
          }
          v.count++
          v.lastSeen = time.Now()
          return v.count <= rl.limit
      }

      func (rl *RateLimiter) Middleware(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              if !rl.Allow(r.RemoteAddr) {
                  http.Error(w, "rate limited", http.StatusTooManyRequests)
                  return
              }
              next.ServeHTTP(w, r)
          })
      }
    pkg/router/router.go: |
      package router

      import (
          "net/http"
          "mymodule/pkg/middleware"
          "time"
      )

      type Router struct {
          mux     *http.ServeMux
          limiter *middleware.RateLimiter
      }

      func NewRouter() *Router {
          return &Router{
              mux:     http.NewServeMux(),
              limiter: middleware.NewRateLimiter(100, time.Minute),
          }
      }

      func (rt *Router) Handle(pattern string, handler http.Handler) {
          rt.mux.Handle(pattern, rt.limiter.Middleware(handler))
      }

      func (rt *Router) ServeHTTP(w http.ResponseWriter, r *http.Request) {
          rt.mux.ServeHTTP(w, r)
      }
    cmd/server/main.go: |
      package main

      import (
          "log"
          "net/http"
          "mymodule/pkg/router"
      )

      func main() {
          rt := router.NewRouter()
          rt.Handle("/api/health", http.HandlerFunc(healthHandler))
          rt.Handle("/api/data", http.HandlerFunc(dataHandler))
          log.Fatal(http.ListenAndServe(":8080", rt))
      }

      func healthHandler(w http.ResponseWriter, r *http.Request) {
          w.WriteHeader(http.StatusOK)
      }

      func dataHandler(w http.ResponseWriter, r *http.Request) {
          w.Write([]byte(`{"status":"ok"}`))
      }
