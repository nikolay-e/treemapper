name: go_034_json_marshaler
repo:
  initial_files:
    internal/api/types.go: |
      package api

      import "time"

      type Event struct {
          ID        string    `json:"id"`
          Name      string    `json:"name"`
          Timestamp time.Time `json:"timestamp"`
      }
    internal/api/handlers.go: |
      package api

      import (
          "encoding/json"
          "net/http"
      )

      func SerializeEvent(w http.ResponseWriter, e *Event) error {
          return json.NewEncoder(w).Encode(e)
      }
    internal/ingest/parser.go: |
      package ingest

      import (
          "encoding/json"
          "io"

          "example.com/app/internal/api"
      )

      func ParseEvent(r io.Reader) (*api.Event, error) {
          var e api.Event
          if err := json.NewDecoder(r).Decode(&e); err != nil {
              return nil, err
          }
          return &e, nil
      }
    internal/ingest/replay.go: |
      package ingest

      import (
          "bytes"
          "encoding/json"

          "example.com/app/internal/api"
      )

      func ReplayFromBytes(data []byte) (*api.Event, error) {
          var e api.Event
          dec := json.NewDecoder(bytes.NewReader(data))
          if err := dec.Decode(&e); err != nil {
              return nil, err
          }
          return &e, nil
      }
    internal/storage/cache.go: |
      package storage

      import "sync"

      type Cache struct {
          mu   sync.RWMutex
          data map[string][]byte
      }

      func NewCache() *Cache {
          return &Cache{data: make(map[string][]byte)}
      }
    internal/api/errors.go: |
      package api

      import "errors"

      var (
          ErrNotFound  = errors.New("not found")
          ErrForbidden = errors.New("forbidden")
      )
    internal/metrics/counter.go: |
      package metrics

      import "sync/atomic"

      type Counter struct {
          v int64
      }

      func (c *Counter) Inc() { atomic.AddInt64(&c.v, 1) }
      func (c *Counter) Get() int64 { return atomic.LoadInt64(&c.v) }
  changed_files:
    internal/api/types.go: |
      package api

      import (
          "encoding/json"
          "strconv"
          "time"
      )

      type Event struct {
          ID        string    `json:"id"`
          Name      string    `json:"name"`
          Timestamp time.Time `json:"timestamp"`
      }

      func (e Event) MarshalJSON() ([]byte, error) {
          type Alias Event
          return json.Marshal(&struct {
              Alias
              TimestampUnix int64 `json:"timestamp_unix"`
          }{
              Alias:         Alias(e),
              TimestampUnix: e.Timestamp.Unix(),
          })
      }

      func (e *Event) UnmarshalJSON(data []byte) error {
          type Alias Event
          aux := &struct {
              *Alias
              TimestampUnix *int64 `json:"timestamp_unix,omitempty"`
          }{
              Alias: (*Alias)(e),
          }
          if err := json.Unmarshal(data, aux); err != nil {
              return err
          }
          if aux.TimestampUnix != nil {
              e.Timestamp = time.Unix(*aux.TimestampUnix, 0)
          }
          _ = strconv.Itoa
          return nil
      }
    internal/api/handlers.go: |
      package api

      import (
          "encoding/json"
          "net/http"
      )

      func SerializeEvent(w http.ResponseWriter, e *Event) error {
