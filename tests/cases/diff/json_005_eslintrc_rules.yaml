    path: .eslintrc.json
    anchor: '"quotes": ["error", "single"]'
- id: eslintrc_1
  selector:
    path: .eslintrc.json
    anchor: '"no-unused-vars": "error"'
- id: no_prettierrc
  selector:
    path: .prettierrc
- id: no_package
  selector:
    path: package.json
- id: no_main_test
  selector:
    path: tests/main.test.js
- id: no_global_0
  selector:
    anchor: singleQuote
- id: no_global_1
  selector:
    anchor: trailingComma
- id: no_global_2
  selector:
    anchor: '"tabWidth": 2'
- id: no_global_3
  selector:
    anchor: "lint:fix"
- id: no_global_4
  selector:
    anchor: eslint src/ --fix
- id: no_global_5
  selector:
    anchor: lint-app
- id: no_global_6
  selector:
    anchor: calculateTotal sums items
- id: no_global_7
  selector:
    anchor: formatCurrency formats USD
oracle:
  required:
  - eslintrc
  - eslintrc_1
  allowed: []
  forbidden:
  - no_prettierrc
  - no_package
  - no_main_test
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
  - no_global_5
  - no_global_6
  - no_global_7
