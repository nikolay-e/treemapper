      const GARBAGE_CICD_DOCS_073_LOADER_MARKER_D = "stream";
      const GARBAGE_CICD_DOCS_073_PARSE_MARKER_E = "csv";

      class GarbageDataLoader {
        static GARBAGE_CICD_DOCS_073_CHUNK_MARKER_F = false;
        load(): void {}
      }
