  changed_files:
    sql/seed/initial_data.sql: |
      -- Seed data for categories table
      -- Extended with description and active status
      INSERT INTO categories (name, description, active) VALUES
          ('Electronics', 'Electronic devices and accessories', TRUE),
          ('Clothing', 'Apparel and fashion items', TRUE),
          ('Books', 'Physical and digital books', TRUE),
          ('Home & Garden', 'Home improvement and garden supplies', TRUE),
          ('Sports', 'Sports equipment and gear', TRUE),
          ('Toys & Games', 'Toys games and entertainment', TRUE),
          ('Health & Beauty', 'Health beauty and personal care', TRUE);
    sql/migrations/001_create_categories.sql: |
      CREATE TABLE categories (
          id SERIAL PRIMARY KEY,
          name VARCHAR(100) NOT NULL UNIQUE,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );
    sql/migrations/002_add_category_fields.sql: |
      ALTER TABLE categories
          ADD COLUMN description TEXT,
          ADD COLUMN active BOOLEAN DEFAULT TRUE;

      CREATE INDEX idx_categories_active ON categories(active) WHERE active = TRUE;
    src/models/category.py: |
      from dataclasses import dataclass
      from datetime import datetime
      from typing import Optional

      @dataclass
      class Category:
          id: int
          name: str
          description: Optional[str] = None
          active: bool = True
          created_at: Optional[datetime] = None
    src/repositories/category_repository.py: |
      from typing import List
      from models.category import Category

      class CategoryRepository:
          def __init__(self, db):
              self.db = db

          def get_all(self) -> List[Category]:
              results = self.db.execute("SELECT * FROM categories")
              return [Category(**r) for r in results]

          def get_active(self) -> List[Category]:
              results = self.db.execute(
                  "SELECT * FROM categories WHERE active = TRUE"
              )
              return [Category(**r) for r in results]
    garbage_seed_validator.ts: |
