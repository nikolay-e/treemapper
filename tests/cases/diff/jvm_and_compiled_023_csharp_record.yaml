repo:
  initial_files:
    Models/Person.cs: |
      namespace App.Models
      {
          public record Person(string Name, int Age)
          {
              public bool IsAdult => Age >= 18;
          }

          public record Employee(string Name, int Age, string Department) : Person(Name, Age);
      }
    Program.cs: |
      namespace App
      {
          class Program { }
      }
    Models/Address.cs: |
      namespace App.Models
      {
          public record Address(string Street, string City, string ZipCode)
          {
              public string FullAddress => $"{Street}, {City} {ZipCode}";
          }

          public record BusinessAddress(string Street, string City, string ZipCode, string Suite)
              : Address(Street, City, ZipCode);
      }
    Services/PersonService.cs: |
      using System.Collections.Generic;
      using System.Linq;

      namespace App.Services
      {
          class PersonService
          {
              private readonly List<Person> _people = new();

              public void Add(Person person)
              {
                  _people.Add(person);
              }

              public Person FindByName(string name)
              {
                  return _people.FirstOrDefault(p => p.Name == name);
              }

              public List<Person> GetAdults()
              {
                  return _people.Where(p => p.IsAdult).ToList();
              }

              public Person UpdateAge(Person person, int newAge)
              {
                  return person with { Age = newAge };
              }
          }
      }
    Serializers/PersonSerializer.cs: |
      using System.Text.Json;

      namespace App.Serializers
      {
          class PersonSerializer
          {
              public string Serialize(Person person)
              {
                  return JsonSerializer.Serialize(new
                  {
                      name = person.Name,
                      age = person.Age,
                      isAdult = person.IsAdult
                  });
              }

              public string SerializeEmployee(Employee employee)
              {
                  return JsonSerializer.Serialize(new
                  {
                      name = employee.Name,
                      age = employee.Age,
                      department = employee.Department
                  });
              }
          }
      }
    Repositories/EmployeeRepository.cs: |
      using System.Collections.Generic;
      using System.Linq;

      namespace App.Repositories
      {
          class EmployeeRepository
          {
              private readonly List<Employee> _employees = new();

              public void Add(Employee employee)
              {
                  _employees.Add(employee);
              }

              public List<Employee> GetByDepartment(string department)
              {
                  return _employees.Where(e => e.Department == department).ToList();
              }

              public Employee FindByName(string name)
              {
                  return _employees.FirstOrDefault(e => e.Name == name);
              }
          }
      }
    Utils/RecordComparer.cs: |
      namespace App.Utils
      {
          class RecordComparer
          {
              public bool AreEqual<T>(T a, T b) where T : IEquatable<T>
              {
                  return a.Equals(b);
              }

              public int GetHashCodeOf<T>(T record)
              {
                  return record.GetHashCode();
              }

              public string Describe<T>(T record)
              {
                  return record.ToString();
              }
          }
      }
