- difficulty:easy
repo:
  initial_files:
    lib/rate_limiter.rb: |
      class RateLimiter
        def initialize(max_requests)
          @max = max_requests
          @count = 0
        end

        def allow?
          @count += 1
          @count <= @max
        end

        def reset
          @count = 0
        end
      end
    spec/rate_limiter_spec.rb: |
      require_relative '../lib/rate_limiter'

      RSpec.describe RateLimiter do
        describe '#allow?' do
          it 'allows requests under limit' do
            limiter = RateLimiter.new(3)
            expect(limiter.allow?).to be true
            expect(limiter.allow?).to be true
            expect(limiter.allow?).to be true
          end

          it 'rejects requests over limit' do
            limiter = RateLimiter.new(1)
            limiter.allow?
            expect(limiter.allow?).to be false
          end
        end

        describe '#reset' do
          it 'resets counter' do
            limiter = RateLimiter.new(1)
            limiter.allow?
            limiter.reset
            expect(limiter.allow?).to be true
          end
        end
      end
    lib/circuit_breaker.rb: |
      class CircuitBreaker
        def initialize(threshold)
          @threshold = threshold
          @failures = 0
        end

        def record_failure
          @failures += 1
        end
      end
    lib/retry_policy.rb: |
      class RetryPolicy
        def initialize(attempts)
          @attempts = attempts
        end

        def execute
          @attempts.times { yield }
        end
      end
  changed_files:
    lib/rate_limiter.rb: |
      class RateLimiter
        def initialize(max_requests)
          @max = max_requests
          @count = 0
        end

        def allow?
          return false if @max <= 0
          @count += 1
          @count <= @max
        end

        def reset
          @count = 0
        end
      end
  commit_message: "fix: guard against zero max_requests"
