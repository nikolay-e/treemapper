  changed_files:
    Sources/Payments/PaymentProcessor.swift: |
      import Foundation

      enum PaymentStatus {
          case pending
          case authorized
          case captured
          case failed
      }

      struct PaymentResult {
          let transactionId: String
          let status: PaymentStatus
          let amount: Decimal
      }

      class PaymentProcessor {
          private let gateway: PaymentGateway
          private let ledger: TransactionLedger

          init(gateway: PaymentGateway, ledger: TransactionLedger) {
              self.gateway = gateway
              self.ledger = ledger
          }

          func authorize(amount: Decimal, cardToken: String) -> PaymentResult {
              let txId = UUID().uuidString
              let authorized = gateway.charge(token: cardToken, amount: amount)
              let status: PaymentStatus = authorized ? .authorized : .failed
              ledger.record(transactionId: txId, amount: amount, status: status)
              return PaymentResult(transactionId: txId, status: status, amount: amount)
          }

          func refund(transactionId: String) -> PaymentResult {
              guard let entry = ledger.lookup(transactionId: transactionId) else {
                  return PaymentResult(transactionId: transactionId, status: .failed, amount: 0)
              }
              let success = gateway.refund(transactionId: transactionId, amount: entry.amount)
              let status: PaymentStatus = success ? .captured : .failed
              ledger.record(transactionId: transactionId, amount: -entry.amount, status: status)
              return PaymentResult(transactionId: transactionId, status: status, amount: entry.amount)
          }
      }
