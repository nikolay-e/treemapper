    Sources/Ledger/TransactionLedger.swift: |
      import Foundation

      struct LedgerEntry {
          let transactionId: String
          let amount: Decimal
          let status: PaymentStatus
          let timestamp: Date
      }

      class TransactionLedger {
          private var entries: [LedgerEntry] = []

          func record(transactionId: String, amount: Decimal, status: PaymentStatus) {
              let entry = LedgerEntry(
                  transactionId: transactionId,
                  amount: amount,
                  status: status,
                  timestamp: Date()
              )
              entries.append(entry)
          }

          func lookup(transactionId: String) -> LedgerEntry? {
              entries.first { $0.transactionId == transactionId }
          }

          func totalCaptured() -> Decimal {
              entries.filter { $0.status == .captured }
                  .reduce(Decimal.zero) { $0 + $1.amount }
          }
      }
