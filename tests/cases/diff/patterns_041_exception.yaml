    src/main/java/com/devops/DeploymentService.java: |
      package com.devops;

      import com.devops.validation.DeploymentValidator;

      public class DeploymentService {
          private final ArtifactRegistry registry;
          private final DeploymentValidator validator;

          public DeploymentService(ArtifactRegistry registry, DeploymentValidator validator) {
              this.registry = registry;
              this.validator = validator;
          }

          public void deploy(String appName, String version, String environment) {
              validator.validate(appName, version, environment);
              Artifact artifact = registry.find(appName, version);
              System.out.println("Deploying " + appName + ":" + version + " to " + environment);
          }
      }
    src/main/java/com/devops/RollbackService.java: |
      package com.devops;

      import com.devops.validation.DeploymentValidator;

      public class RollbackService {
          private final ArtifactRegistry registry;
          private final DeploymentValidator validator;

          public RollbackService(ArtifactRegistry registry, DeploymentValidator validator) {
              this.registry = registry;
              this.validator = validator;
          }

          public void rollback(String appName, String targetVersion, String environment) {
              validator.validate(appName, targetVersion, environment);
              Artifact artifact = registry.find(appName, targetVersion);
              System.out.println("Rolling back " + appName + " to " + targetVersion);
          }
      }
    src/main/java/com/devops/validation/DeploymentValidator.java: |
      package com.devops.validation;

      public class DeploymentValidator {
          public void validate(String appName, String version, String environment) {
              if (appName == null || appName.isBlank()) {
                  throw new IllegalArgumentException("App name required");
              }
              if (version == null || version.isBlank()) {
                  throw new IllegalArgumentException("Version required");
              }
              if (!"staging".equals(environment) && !"production".equals(environment)) {
                  throw new IllegalArgumentException("Invalid environment: " + environment);
              }
          }
      }
