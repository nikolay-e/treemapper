    src/sensor.rs: |
      pub struct TemperatureSensor {
          pub id: u32,
          pub location: String,
      }

      impl TemperatureSensor {
          pub fn new(id: u32, location: &str) -> Self {
              Self { id, location: location.to_string() }
          }

          pub fn read_celsius(&self) -> f32 {
              22.5
          }
      }
    src/monitor.rs: |
      use crate::sensor::TemperatureSensor;

      pub struct Monitor {
          sensors: Vec<TemperatureSensor>,
      }

      impl Monitor {
          pub fn new() -> Self {
              Self { sensors: Vec::new() }
          }

          pub fn add_sensor(&mut self, s: TemperatureSensor) {
              self.sensors.push(s);
          }

          pub fn average_celsius(&self) -> f32 {
              if self.sensors.is_empty() {
                  return 0.0;
              }
              let sum: f32 = self.sensors.iter().map(|s| s.read_celsius()).sum();
              sum / self.sensors.len() as f32
          }
      }
