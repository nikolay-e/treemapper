  changed_files:
    src/sensor.rs: |
      pub struct TemperatureSensor {
          pub id: u32,
          pub location: String,
          pub min_threshold: f32,
          pub max_threshold: f32,
      }

      impl TemperatureSensor {
          pub fn new(id: u32, location: &str) -> Self {
              Self {
                  id,
                  location: location.to_string(),
                  min_threshold: 0.0,
                  max_threshold: 100.0,
              }
          }

          pub fn read_celsius(&self) -> f32 {
              22.5
          }

          pub fn is_out_of_range(&self, reading: f32) -> bool {
              reading < self.min_threshold || reading > self.max_threshold
          }
      }
    src/monitor.rs: |
      use crate::sensor::TemperatureSensor;

      pub struct Monitor {
          sensors: Vec<TemperatureSensor>,
      }

      impl Monitor {
          pub fn new() -> Self {
              Self { sensors: Vec::new() }
          }

          pub fn add_sensor(&mut self, s: TemperatureSensor) {
              self.sensors.push(s);
          }

          pub fn average_celsius(&self) -> f32 {
              if self.sensors.is_empty() {
                  return 0.0;
              }
              let sum: f32 = self.sensors.iter().map(|s| s.read_celsius()).sum();
              sum / self.sensors.len() as f32
          }

          pub fn alerts(&self) -> Vec<u32> {
              self.sensors.iter()
                  .filter(|s| s.is_out_of_range(s.read_celsius()))
                  .map(|s| s.id)
                  .collect()
          }
      }
    src/INT014_logger.rs: |
      // INT014_GARBAGE_A = "logger_marker"
      pub fn log_info(msg: &str) {
          println!("[INFO] {}", msg);
      }
    src/INT014_config.rs: |
      // INT014_GARBAGE_B = "config_marker"
      pub const DEFAULT_PORT: u16 = 8080;
    src/INT014_storage.rs: |
      // INT014_GARBAGE_C = "storage_marker"
      pub fn store_reading(_val: f32) {}
  commit_message: "feat: add threshold fields to TemperatureSensor and alerts to Monitor"
