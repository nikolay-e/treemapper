name: helm_027_template_include
repo:
  initial_files:
    templates/_helpers.tpl: |
      {{- define "app.labels" -}}
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      {{- end }}
    templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        labels:
          app: myapp
    junk.md: |
      garbage_marker_12345
      unused_marker_67890
  changed_files:
    templates/_helpers.tpl: |
      {{- define "app.labels" -}}
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      {{- end }}
    templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        labels:
      {{ include "app.labels" . | indent 4 }}
    junk.md: |
      garbage_marker_12345
      unused_marker_67890
  commit_message: Update files
fragments:
- id: deployment_file
  selector:
    path: templates/deployment.yaml
- id: req_global_0
  selector:
    anchor: '{{ include "app.labels" . | indent 4 }}'
oracle:
