  changed_files:
    src/Formatting/StringFormatter.cs: |
      using System;
      using System.Globalization;
      using System.Text.RegularExpressions;

      namespace App.Formatting
      {
          public static class StringFormatter
          {
              public static string ToCamelCase(string input)
              {
                  if (string.IsNullOrEmpty(input)) return input;
                  return char.ToLower(input[0]) + input.Substring(1);
              }

              public static string ToPascalCase(string input)
              {
                  if (string.IsNullOrEmpty(input)) return input;
                  return char.ToUpper(input[0]) + input.Substring(1);
              }

              public static string ToSnakeCase(string input)
              {
                  if (string.IsNullOrEmpty(input)) return input;
                  return Regex.Replace(input, "([a-z])([A-Z])", "$1_$2").ToLowerInvariant();
              }

              public static string ToKebabCase(string input)
              {
                  if (string.IsNullOrEmpty(input)) return input;
                  return Regex.Replace(input, "([a-z])([A-Z])", "$1-$2").ToLowerInvariant();
              }
          }
      }
  commit_message: "feat: add snake_case and kebab-case converters"
