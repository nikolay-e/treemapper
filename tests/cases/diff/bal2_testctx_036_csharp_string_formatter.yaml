      using Xunit;
      using App.Formatting;

      namespace App.Tests
      {
          public class StringFormatterTests
          {
              [Fact]
              public void ToCamelCase_PascalInput_LowersFirstChar()
              {
                  Assert.Equal("helloWorld", StringFormatter.ToCamelCase("HelloWorld"));
              }

              [Fact]
              public void ToPascalCase_CamelInput_UppersFirstChar()
              {
                  Assert.Equal("HelloWorld", StringFormatter.ToPascalCase("helloWorld"));
              }

              [Fact]
              public void ToCamelCase_Empty_ReturnsEmpty()
              {
                  Assert.Equal("", StringFormatter.ToCamelCase(""));
              }
          }
