      namespace video { void decode_frame() {} }
    garbage/subtitles.cpp: |
      // GARBAGE_JAV027_SUBS_B = "subtitles_marker"
      namespace subtitles { void render() {} }
    garbage/drm.cpp: |
      // GARBAGE_JAV027_DRM_C = "drm_marker"
      namespace drm { bool verify() { return true; } }
  changed_files:
    include/audio/mixer.h: |
      #pragma once
      #include <vector>
      #include <cstdint>

      namespace audio {

      struct MixerConfig {
          int sample_rate;
          int channels;
          int buffer_size;
          bool normalize_output;
          float limiter_threshold;
      };

      class Mixer {
      public:
          explicit Mixer(const MixerConfig& cfg);
          void mix(const int16_t* input, int16_t* output, int frames);
          float master_volume() const;
          void set_master_volume(float v);
          void set_limiter_threshold(float threshold);
      private:
          MixerConfig cfg_;
          float master_volume_;
      };

      }
    src/playback/player.cpp: |
      #include "audio/mixer.h"

      namespace playback {

      class Player {
          audio::Mixer mixer_;
      public:
          explicit Player(const audio::MixerConfig& cfg) : mixer_(cfg) {}

          void play(const int16_t* pcm, int frames) {
              std::vector<int16_t> out(frames * 2);
              mixer_.mix(pcm, out.data(), frames);
          }
      };

      }
    src/streaming/stream_decoder.cpp: |
      #include "audio/mixer.h"

      namespace streaming {

      class StreamDecoder {
          audio::MixerConfig mixer_cfg_;
      public:
          explicit StreamDecoder(const audio::MixerConfig& cfg) : mixer_cfg_(cfg) {}

          audio::MixerConfig config() const { return mixer_cfg_; }
      };

      }
    garbage/video.cpp: |
      // GARBAGE_JAV027_VIDEO_A = "video_marker"
      namespace video { void decode_frame() {} }
    garbage/subtitles.cpp: |
