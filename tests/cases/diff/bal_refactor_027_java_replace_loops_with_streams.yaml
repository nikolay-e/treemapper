name: bal_refactor_027_java_replace_loops_with_streams
tags:
- lang:cpp
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    include/audio/mixer.h: |
      #pragma once
      #include <vector>
      #include <cstdint>

      namespace audio {

      struct MixerConfig {
          int sample_rate;
          int channels;
          int buffer_size;
      };

      class Mixer {
      public:
          explicit Mixer(const MixerConfig& cfg);
          void mix(const int16_t* input, int16_t* output, int frames);
          float master_volume() const;
          void set_master_volume(float v);
      private:
          MixerConfig cfg_;
          float master_volume_;
      };

      }
    src/playback/player.cpp: |
      #include "audio/mixer.h"

      namespace playback {

      class Player {
          audio::Mixer mixer_;
      public:
          explicit Player(const audio::MixerConfig& cfg) : mixer_(cfg) {}

          void play(const int16_t* pcm, int frames) {
              std::vector<int16_t> out(frames * 2);
              mixer_.mix(pcm, out.data(), frames);
          }
      };

      }
    src/streaming/stream_decoder.cpp: |
      #include "audio/mixer.h"

      namespace streaming {

      class StreamDecoder {
          audio::MixerConfig mixer_cfg_;
      public:
          explicit StreamDecoder(const audio::MixerConfig& cfg) : mixer_cfg_(cfg) {}

          audio::MixerConfig config() const { return mixer_cfg_; }
      };

      }
