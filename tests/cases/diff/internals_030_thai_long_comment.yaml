      import pytest
      import json
      import os
      from src.config.loader import ConfigLoader

      def test_get_default_when_key_missing():
          loader = ConfigLoader({"host": "localhost"})
          assert loader.get("port", 8080) == 8080

      def test_require_raises_when_key_missing():
          loader = ConfigLoader()
          with pytest.raises(KeyError, match="required config key missing"):
              loader.require("database_url")

      def test_load_env_lowercases_keys(monkeypatch):
          monkeypatch.setenv("APP_HOST", "example.com")
          loader = ConfigLoader()
          loader.load_env(prefix="APP_")
          assert loader.get("host") == "example.com"

      def test_load_file_not_found_raises(tmp_path):
          loader = ConfigLoader()
          with pytest.raises(FileNotFoundError, match="config file not found"):
              loader.load_file(str(tmp_path / "nonexistent.json"))

      def test_load_file_non_dict_raises(tmp_path):
          p = tmp_path / "bad.json"
          p.write_text("[1, 2, 3]")
          loader = ConfigLoader()
          with pytest.raises(ValueError, match="JSON object"):
              loader.load_file(str(p))
