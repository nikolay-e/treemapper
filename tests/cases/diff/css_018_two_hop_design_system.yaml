name: css_018_two_hop_design_system
tags:
- lang:css
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    tokens.css: |
      :root {
        --spacing-1: 4px;
        --spacing-2: 8px;
        --spacing-3: 12px;
        --spacing-4: 16px;
        --spacing-6: 24px;
        --spacing-8: 32px;
      }
    components.css: |
      @import "tokens.css";
      .card {
        padding: var(--spacing-4);
        gap: var(--spacing-2);
      }
      .section { margin-bottom: var(--spacing-8); }
    page.css: |
      @import "components.css";
      .page-hero { padding: var(--spacing-8); }
      .page-section { padding: var(--spacing-6); }
    CSS_NOISE_018_maps.css: |
      .CSS_NOISE_018_maps_marker { width: 24px; height: 24px; }
      .CSS_NOISE_018_maps_popup { background: #fff; border-radius: 4px; padding: 8px; }
    CSS_NOISE_018_video.css: |
      .CSS_NOISE_018_video_player { position: relative; aspect-ratio: 16/9; }
      .CSS_NOISE_018_video_controls { position: absolute; bottom: 0; width: 100%; }
  changed_files:
    tokens.css: |
      :root {
        --spacing-1: 4px;
        --spacing-2: 8px;
        --spacing-3: 12px;
        --spacing-4: 16px;
        --spacing-5: 20px;
        --spacing-6: 24px;
        --spacing-8: 32px;
        --spacing-10: 40px;
      }
  commit_message: "style: add --spacing-5 and --spacing-10 to design system tokens"
fragments:
- id: spacing_5_added
  selector:
    path: tokens.css
    anchor: "--spacing-5: 20px"
- id: spacing_10_added
  selector:
    path: tokens.css
    anchor: "--spacing-10: 40px"
- id: components_imports_tokens
  selector:
    path: components.css
    anchor: tokens.css
- id: page_imports_components
  selector:
    path: page.css
    anchor: components.css
- id: no_maps
  selector:
    path: CSS_NOISE_018_maps.css
- id: no_video
  selector:
    path: CSS_NOISE_018_video.css
- id: no_global_0
  selector:
    anchor: CSS_NOISE_018_maps_marker
- id: no_global_1
  selector:
    anchor: CSS_NOISE_018_video_player
oracle:
  required:
  - spacing_5_added
  - spacing_10_added
  - components_imports_tokens
  - page_imports_components
  allowed: []
  forbidden:
  - no_maps
  - no_video
  - no_global_0
  - no_global_1
