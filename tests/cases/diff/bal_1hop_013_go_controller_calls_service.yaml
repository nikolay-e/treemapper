repo:
  initial_files:
    src/pricing/discount.rs: |
      pub struct DiscountEngine {
          tiers: Vec<(u32, f64)>,
      }

      impl DiscountEngine {
          pub fn new(tiers: Vec<(u32, f64)>) -> Self {
              DiscountEngine { tiers }
          }

          pub fn rate_for_quantity(&self, qty: u32) -> f64 {
              // BUG: iterates forward and returns first match instead of best match
              for (threshold, rate) in &self.tiers {
                  if qty >= *threshold {
                      return *rate;
                  }
              }
              0.0
          }

          pub fn apply(&self, unit_price: f64, qty: u32) -> f64 {
              let rate = self.rate_for_quantity(qty);
              unit_price * qty as f64 * (1.0 - rate)
          }
      }
