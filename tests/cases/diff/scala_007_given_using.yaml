name: scala_007_given_using
tags:
- lang:scala
- change:single_file
- change:new_function
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    Ordering.scala: |
      case class User(name: String, age: Int) {
        def displayName: String = s"$name (age $age)"
      }

      object UserOrdering {
        given Ordering[User] = Ordering.by(_.name)

        given ageOrdering: Ordering[User] = Ordering.by(_.age)
      }
    UserSorter.scala: |
      class UserSorter {}
    Comparator.scala: |
      trait Comparator[T] {
        def compare(a: T, b: T): Int
        def isEqual(a: T, b: T): Boolean = compare(a, b) == 0
        def isLessThan(a: T, b: T): Boolean = compare(a, b) < 0
      }

      object Comparator {
        def natural[T: Ordering]: Comparator[T] = new Comparator[T] {
          def compare(a: T, b: T): Int = implicitly[Ordering[T]].compare(a, b)
        }
      }
    UserFilter.scala: |
      class UserFilter {
        def filterByAge(users: List[User], minAge: Int): List[User] =
          users.filter(_.age >= minAge)

        def filterByNamePrefix(users: List[User], prefix: String): List[User] =
          users.filter(_.name.startsWith(prefix))

        def partition(users: List[User], predicate: User => Boolean): (List[User], List[User]) =
          users.partition(predicate)

        def distinctByName(users: List[User]): List[User] =
          users.groupBy(_.name).values.map(_.head).toList
      }
    UserFormatter.scala: |
      class UserFormatter {
        def formatList(users: List[User]): String = {
          users.map(_.displayName).mkString(", ")
        }

        def formatTable(users: List[User]): String = {
          val header = f"${"Name"}%-20s ${"Age"}%5s"
          val rows = users.map(u => f"${u.name}%-20s ${u.age}%5d")
          (header :: rows).mkString("\n")
        }
      }
    ProductOrdering.scala: |
      case class Product(name: String, price: Double)

      object ProductOrdering {
        given Ordering[Product] = Ordering.by(_.name)

        given priceOrdering: Ordering[Product] = Ordering.by(_.price)
      }
    SortSpec.scala: |
      import UserOrdering.given

      class SortSpec {
        def testSortByName(): Unit = {
          val sorter = new UserSorter
          val users = List(User("Charlie", 30), User("Alice", 25), User("Bob", 35))
          val sorted = sorter.sortByName(users)
          assert(sorted.head.name == "Alice")
        }

        def testSortByAge(): Unit = {
          val sorter = new UserSorter
          val users = List(User("Charlie", 30), User("Alice", 25), User("Bob", 35))
          val sorted = sorter.sortByAge(users)
          assert(sorted.head.age == 25)
        }
      }
  changed_files:
    UserSorter.scala: |
      import UserOrdering.given

      class UserSorter {
        def sortByName(users: List[User]): List[User] = {
          users.sorted
        }

        def sortByAge(users: List[User]): List[User] = {
          users.sorted(using UserOrdering.ageOrdering)
        }

        def findMin(users: List[User])(using ord: Ordering[User]): User = {
          users.min
        }
      }
  commit_message: Update files
