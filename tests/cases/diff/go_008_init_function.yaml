    internal/config/config.go: |
      package config

      import (
          "os"
          "strconv"
          "time"
      )

      var Config *AppConfig

      type AppConfig struct {
          Environment string
          Debug       bool
          Port        int
          Timeout     time.Duration
      }

      func init() {
          Config = &AppConfig{
              Environment: getEnv("APP_ENV", "development"),
              Debug:       getEnvBool("APP_DEBUG", false),
              Port:        getEnvInt("APP_PORT", 8080),
              Timeout:     getEnvDuration("APP_TIMEOUT", 30*time.Second),
          }
      }

      func getEnv(key, defaultVal string) string {
          if val := os.Getenv(key); val != "" {
              return val
          }
          return defaultVal
      }

      func getEnvBool(key string, defaultVal bool) bool {
          if val := os.Getenv(key); val != "" {
              b, _ := strconv.ParseBool(val)
              return b
          }
          return defaultVal
      }

      func getEnvInt(key string, defaultVal int) int {
          if val := os.Getenv(key); val != "" {
              i, _ := strconv.Atoi(val)
              return i
          }
          return defaultVal
      }

      func getEnvDuration(key string, defaultVal time.Duration) time.Duration {
          if val := os.Getenv(key); val != "" {
              d, _ := time.ParseDuration(val)
              return d
          }
          return defaultVal
      }
    cmd/main.go: |
      package main

      import (
          "fmt"
          "myproject/internal/config"
      )

      func main() {
          fmt.Printf("Starting in %s mode on port %d\n",
              config.Config.Environment,
              config.Config.Port)
      }
    internal/server/server.go: |
      package server

      import (
          "fmt"
          "myproject/internal/config"
          "net/http"
      )

      type Server struct {
          cfg *config.AppConfig
      }

      func NewServer() *Server {
          return &Server{cfg: config.Config}
      }

      func (s *Server) ListenAndServe() error {
          addr := fmt.Sprintf(":%d", s.cfg.Port)
          return http.ListenAndServe(addr, nil)
      }
    internal/health/checker.go: |
      package health

      import "time"

      type HealthChecker struct {
          interval time.Duration
          checks   []Check
      }

      type Check struct {
          Name    string
          Healthy bool
      }

      func NewHealthChecker(interval time.Duration) *HealthChecker {
          return &HealthChecker{interval: interval}
      }

      func (hc *HealthChecker) AddCheck(name string) {
          hc.checks = append(hc.checks, Check{Name: name, Healthy: true})
      }

      func (hc *HealthChecker) IsHealthy() bool {
          for _, c := range hc.checks {
              if !c.Healthy {
                  return false
              }
          }
          return true
      }
  changed_files:
    internal/config/config.go: |
      package config

      import (
          "log"
          "os"
          "strconv"
          "strings"
          "time"
      )

      var Config *AppConfig

      type AppConfig struct {
          Environment  string
          Debug        bool
          Port         int
          Timeout      time.Duration
          DatabaseURL  string
          RedisURL     string
          JWTSecret    string
          CORSOrigins  []string
          RateLimitRPS int
      }

      func init() {
          Config = &AppConfig{
              Environment:  getEnv("APP_ENV", "development"),
              Debug:        getEnvBool("APP_DEBUG", false),
              Port:         getEnvInt("APP_PORT", 8080),
              Timeout:      getEnvDuration("APP_TIMEOUT", 30*time.Second),
              DatabaseURL:  getEnvRequired("DATABASE_URL"),
              RedisURL:     getEnv("REDIS_URL", "redis://localhost:6379"),
              JWTSecret:    getEnvRequired("JWT_SECRET"),
              CORSOrigins:  getEnvSlice("CORS_ORIGINS", []string{"http://localhost:3000"}),
              RateLimitRPS: getEnvInt("RATE_LIMIT_RPS", 100),
          }

          validateConfig()
      }

      func validateConfig() {
          if Config.Port < 1 || Config.Port > 65535 {
              log.Fatal("Invalid port number")
          }
          if Config.Timeout < time.Second {
              log.Fatal("Timeout must be at least 1 second")
          }
      }

      func getEnv(key, defaultVal string) string {
          if val := os.Getenv(key); val != "" {
              return val
          }
          return defaultVal
      }

      func getEnvRequired(key string) string {
          val := os.Getenv(key)
          if val == "" && Config.Environment == "production" {
              log.Fatalf("Required environment variable %s not set", key)
          }
          return val
      }

      func getEnvBool(key string, defaultVal bool) bool {
          if val := os.Getenv(key); val != "" {
              b, _ := strconv.ParseBool(val)
              return b
          }
          return defaultVal
      }

      func getEnvInt(key string, defaultVal int) int {
          if val := os.Getenv(key); val != "" {
              i, _ := strconv.Atoi(val)
              return i
          }
          return defaultVal
      }

      func getEnvDuration(key string, defaultVal time.Duration) time.Duration {
          if val := os.Getenv(key); val != "" {
              d, _ := time.ParseDuration(val)
              return d
          }
          return defaultVal
      }

      func getEnvSlice(key string, defaultVal []string) []string {
          if val := os.Getenv(key); val != "" {
              return splitAndTrim(val, ",")
          }
          return defaultVal
      }

      func splitAndTrim(s, sep string) []string {
          parts := make([]string, 0)
          for _, p := range strings.Split(s, sep) {
              if trimmed := strings.TrimSpace(p); trimmed != "" {
                  parts = append(parts, trimmed)
              }
          }
          return parts
      }
