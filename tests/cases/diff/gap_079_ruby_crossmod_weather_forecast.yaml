    lib/weather/aggregator.rb: |
      require_relative 'station'

      module Weather
        class Aggregator
          def initialize
            @stations = {}
          end

          def register(station)
            @stations[station.name] = station
          end

          def find(name)
            @stations[name]
          end

          def global_average
            all_temps = @stations.values.map(&:average_temperature)
            return 0.0 if all_temps.empty?
            all_temps.sum / all_temps.length.to_f
          end

          def coldest_station
            @stations.values.min_by(&:average_temperature)
          end

          def freezing_stations
            @stations.values.select do |station|
              recent = station.latest
              recent && recent.is_freezing?
            end
          end
        end
      end
