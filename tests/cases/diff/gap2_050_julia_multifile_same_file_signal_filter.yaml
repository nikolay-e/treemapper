repo:
  initial_files:
    src/Filter.jl: |
      module Filter

      export lowpass, highpass

      function lowpass(signal::Vector{Float64}, cutoff::Float64)::Vector{Float64}
          n = length(signal)
          filtered = zeros(n)
          alpha = cutoff / (cutoff + 1.0)
          filtered[1] = signal[1]
          for i in 2:n
              filtered[i] = alpha * signal[i] + (1 - alpha) * filtered[i-1]
          end
          return filtered
      end

      function highpass(signal::Vector{Float64}, cutoff::Float64)::Vector{Float64}
          lp = lowpass(signal, cutoff)
          return signal .- lp
      end

      end
    src/Window.jl: |
      module Window

      export hamming, hanning

      function hamming(n::Int)::Vector{Float64}
          return [0.54 - 0.46 * cos(2 * pi * k / (n - 1)) for k in 0:n-1]
      end

      function hanning(n::Int)::Vector{Float64}
          return [0.5 * (1 - cos(2 * pi * k / (n - 1))) for k in 0:n-1]
      end

      end
    src/Spectrum.jl: |
      module Spectrum

      GARBAGE_GAP2_050_FFT_A = "radix2"
      GARBAGE_GAP2_050_PAD_B = true

      function power_spectrum(signal::Vector{Float64})::Vector{Float64}
          n = length(signal)
          return abs.(signal) .^ 2 ./ n
      end

      function peak_frequency(spectrum::Vector{Float64}, sample_rate::Float64)::Float64
          idx = argmax(spectrum)
          return (idx - 1) * sample_rate / length(spectrum)
      end

      end
    src/Noise.jl: |
      module Noise

      GARBAGE_GAP2_050_SEED_C = 42
      GARBAGE_GAP2_050_DIST_D = "gaussian"

      function white_noise(n::Int, amplitude::Float64)::Vector{Float64}
          return amplitude .* randn(n)
      end

      function add_noise(signal::Vector{Float64}, snr_db::Float64)::Vector{Float64}
          noise_power = 10^(-snr_db / 10)
          return signal .+ sqrt(noise_power) .* randn(length(signal))
      end

      end
  changed_files:
    src/Filter.jl: |
      module Filter

      export lowpass, highpass, bandpass

      function lowpass(signal::Vector{Float64}, cutoff::Float64)::Vector{Float64}
          n = length(signal)
          filtered = zeros(n)
          alpha = cutoff / (cutoff + 1.0)
          filtered[1] = signal[1]
          for i in 2:n
              filtered[i] = alpha * signal[i] + (1 - alpha) * filtered[i-1]
          end
          return filtered
      end

      function highpass(signal::Vector{Float64}, cutoff::Float64)::Vector{Float64}
          lp = lowpass(signal, cutoff)
          return signal .- lp
      end

      function bandpass(signal::Vector{Float64}, low::Float64, high::Float64)::Vector{Float64}
          lp_result = lowpass(signal, high)
          return highpass(lp_result, low)
      end

      end
    src/Window.jl: |
      module Window

      export hamming, hanning, blackman

      function hamming(n::Int)::Vector{Float64}
          return [0.54 - 0.46 * cos(2 * pi * k / (n - 1)) for k in 0:n-1]
      end

      function hanning(n::Int)::Vector{Float64}
          return [0.5 * (1 - cos(2 * pi * k / (n - 1))) for k in 0:n-1]
      end

      function blackman(n::Int)::Vector{Float64}
          a0 = 0.42
          a1 = 0.50
          a2 = 0.08
          return [a0 - a1 * cos(2 * pi * k / (n - 1)) + a2 * cos(4 * pi * k / (n - 1)) for k in 0:n-1]
      end

      end
