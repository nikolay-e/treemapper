repo:
  initial_files:
    src/RiskModel.jl: |
      module RiskModel

      export RiskFactor, score_risk, high_risk

      struct RiskFactor
          name::String
          weight::Float64
          value::Float64
      end

      function score_risk(factors::Vector{RiskFactor})::Float64
          return sum(f.weight * f.value for f in factors)
      end

      function high_risk(factors::Vector{RiskFactor}, threshold::Float64)::Bool
          return score_risk(factors) >= threshold
      end

      end
    src/UnderwritingEngine.jl: |
      module UnderwritingEngine

      include("RiskModel.jl")
      using .RiskModel

      function underwrite(factors::Vector{RiskFactor}, threshold::Float64)::String
          if high_risk(factors, threshold)
              return "declined"
          else
              score = score_risk(factors)
              premium = score * 100.0
              return "approved: premium \$$premium"
          end
      end

      end
    src/ActuarialReport.jl: |
      module ActuarialReport

      include("RiskModel.jl")
      using .RiskModel

      function factor_breakdown(factors::Vector{RiskFactor})::Vector{String}
          return ["$(f.name): $(f.weight * f.value)" for f in factors]
      end

      function total_exposure(portfolios::Vector{Vector{RiskFactor}})::Float64
          return sum(score_risk(p) for p in portfolios)
      end

      end
