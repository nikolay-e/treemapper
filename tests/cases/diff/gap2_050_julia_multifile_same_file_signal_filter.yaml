  changed_files:
    src/RiskModel.jl: |
      module RiskModel

      export RiskFactor, score_risk, high_risk, normalize_factors

      struct RiskFactor
          name::String
          weight::Float64
          value::Float64
          category::String
      end

      function score_risk(factors::Vector{RiskFactor})::Float64
          return sum(f.weight * f.value for f in factors)
      end

      function high_risk(factors::Vector{RiskFactor}, threshold::Float64)::Bool
          return score_risk(factors) >= threshold
      end

      function normalize_factors(factors::Vector{RiskFactor})::Vector{RiskFactor}
          total_weight = sum(f.weight for f in factors)
          total_weight == 0.0 && return factors
          return [RiskFactor(f.name, f.weight / total_weight, f.value, f.category) for f in factors]
      end

      end
    src/GAP050_Compliance.jl: |
