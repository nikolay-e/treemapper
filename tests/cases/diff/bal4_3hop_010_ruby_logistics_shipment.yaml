name: bal4_3hop_010_ruby_logistics_shipment
tags:
- lang:ruby
- change:new_function
- context:import_chain
- distance:3hop+
- difficulty:medium
repo:
  initial_files:
    lib/logistics/address.rb: |
      module Logistics
        class Address
          attr_reader :city, :country, :zip
          def initialize(city, country, zip)
            @city = city
            @country = country
            @zip = zip
          end
          def domestic?
            country == "US"
          end
        end
      end
    lib/logistics/parcel.rb: |
      require_relative 'address'
      module Logistics
        class Parcel
          attr_reader :weight, :destination
          def initialize(weight, city, country, zip)
            @weight = weight
            @destination = Address.new(city, country, zip)
          end
          def shipping_cost
            base = destination.domestic? ? 5.0 : 15.0
            base + weight * 0.5
          end
        end
      end
    lib/logistics/shipment.rb: |
      require_relative 'parcel'
      module Logistics
        class Shipment
          def initialize
            @parcels = []
          end
          def add(weight, city, country, zip)
            @parcels << Parcel.new(weight, city, country, zip)
          end
          def total_cost
            @parcels.sum(&:shipping_cost)
          end
        end
      end
    lib/logistics/dispatcher.rb: |
      require_relative 'shipment'
      module Logistics
        class Dispatcher
          def initialize
            @shipment = Shipment.new
          end
          def enqueue(weight, city, country, zip)
            @shipment.add(weight, city, country, zip)
          end
          def dispatch
            cost = @shipment.total_cost
            { status: "dispatched", cost: cost }
          end
        end
      end
    lib/logistics/api.rb: |
      require_relative 'dispatcher'
      module Logistics
        class Api
          def initialize
            @dispatcher = Dispatcher.new
          end
          def ship(weight, city, country, zip)
            @dispatcher.enqueue(weight, city, country, zip)
            @dispatcher.dispatch
          end
        end
      end
