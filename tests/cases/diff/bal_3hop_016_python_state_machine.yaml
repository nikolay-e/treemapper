      class State:
          def __init__(self, name: str, is_terminal: bool = False):
              self.name = name
              self.is_terminal = is_terminal
          def __eq__(self, other):
              return isinstance(other, State) and self.name == other.name
          def __hash__(self):
              return hash(self.name)
    fsm/transition.py: |
      from fsm.state import State
      class Transition:
          def __init__(self, source: State, target: State, trigger: str):
              self.source = source
              self.target = target
              self.trigger = trigger
          def matches(self, current: State, trigger: str) -> bool:
              return current == self.source and trigger == self.trigger
    fsm/machine.py: |
      from fsm.transition import Transition
      from fsm.state import State
      class StateMachine:
          def __init__(self, initial: State):
              self.current = initial
              self.transitions: list[Transition] = []
          def add_transition(self, t: Transition):
              self.transitions.append(t)
          def trigger(self, event: str) -> bool:
              for t in self.transitions:
                  if t.matches(self.current, event):
                      self.current = t.target
                      return True
              return False
    app/workflow.py: |
      from fsm.machine import StateMachine
      from fsm.state import State
      from fsm.transition import Transition
      class OrderWorkflow:
          def __init__(self):
              pending = State("pending")
              confirmed = State("confirmed")
              shipped = State("shipped")
              delivered = State("delivered", is_terminal=True)
              self.machine = StateMachine(pending)
              self.machine.add_transition(Transition(pending, confirmed, "confirm"))
              self.machine.add_transition(Transition(confirmed, shipped, "ship"))
              self.machine.add_transition(Transition(shipped, delivered, "deliver"))
          def advance(self, action: str) -> str:
              self.machine.trigger(action)
              return self.machine.current.name
