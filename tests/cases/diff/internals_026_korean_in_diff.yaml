  changed_files:
    src/sensor_hub.lua: |
      local M = {}

      M.sensors = {}

      function M.register(id, sensor)
          if not id or id == "" then
              return false, "invalid id"
          end
          if not sensor or type(sensor.read) ~= "function" then
              return false, "invalid sensor"
          end
          M.sensors[id] = sensor
          return true
      end

      function M.read_all()
          local readings = {}
          for id, sensor in pairs(M.sensors) do
              local ok, val = pcall(sensor.read)
              readings[id] = ok and val or nil
          end
          return readings
      end

      return M
