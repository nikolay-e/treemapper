name: comprehensive_002_context_caller_backward_edges
repo:
  initial_files:
    src/core.py: |
      from typing import List

      def core_function(values: List[int]) -> int:
          return 42

      def secondary_helper(x: int) -> int:
          return x * x

      def format_output(result: int) -> str:
          return f"Result: {result}"
    src/caller_a.py: |
      from src.core import core_function, format_output

      def use_core_a(data):
          result = core_function(data)
          return format_output(result + 1)

      def prepare_data_a(raw_input):
          cleaned = [int(x) for x in raw_input if x.isdigit()]
          return cleaned
    src/caller_b.py: |
      from src.core import core_function, secondary_helper

      def use_core_b(data):
          base = core_function(data)
          multiplied = secondary_helper(base)
          return multiplied * 2

      def validate_input_b(data):
          return all(isinstance(x, int) for x in data)
    src/unrelated_module.py: |
      import os

      def read_environment_variable(key):
          return os.environ.get(key, "default")

      def build_connection_string(host, port, db):
          return f"postgresql://{host}:{port}/{db}"
    src/rate_limiter.py: |
      from typing import Dict
      import time

      class TokenBucketLimiter:
          def __init__(self, capacity: int, refill_rate: float):
              self.capacity = capacity
              self.refill_rate = refill_rate
              self.tokens: Dict[str, float] = {}

          def allow_request(self, client_id: str) -> bool:
              current = self.tokens.get(client_id, self.capacity)
              if current > 0:
                  self.tokens[client_id] = current - 1
                  return True
              return False
    src/circuit_breaker.py: |
      import time

      class CircuitBreaker:
          FAILURE_THRESHOLD = 5
          RECOVERY_TIMEOUT = 30

          def __init__(self):
              self.failure_count = 0
              self.state = "closed"
              self.last_failure_time = 0.0

          def record_failure(self):
              self.failure_count += 1
              if self.failure_count >= self.FAILURE_THRESHOLD:
                  self.state = "open"
                  self.last_failure_time = time.time()
