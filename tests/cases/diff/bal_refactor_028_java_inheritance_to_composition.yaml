    src/main/java/com/app/logging/LogWriter.java: |
      package com.app.logging;

      public interface LogWriter {
          void write(String formatted);
      }
    src/main/java/com/app/logging/LogFormatter.java: |
      package com.app.logging;

      import java.time.LocalDateTime;

      public class LogFormatter {
          public String format(String level, String msg) {
              String timestamp = LocalDateTime.now().toString();
              return String.format("[%s] %s: %s", timestamp, level, msg);
          }
      }
    src/main/java/com/app/logging/Logger.java: |
      package com.app.logging;

      public class Logger {
          private final LogFormatter formatter;
          private final LogWriter writer;

          public Logger(LogFormatter formatter, LogWriter writer) {
              this.formatter = formatter;
              this.writer = writer;
          }

          public void info(String msg) {
              writer.write(formatter.format("INFO", msg));
          }

          public void error(String msg) {
              writer.write(formatter.format("ERROR", msg));
          }
      }
    src/main/java/com/app/logging/ConsoleLogger.java: |
      package com.app.logging;

      public class ConsoleLogger implements LogWriter {
          @Override
          public void write(String formatted) {
              System.out.println(formatted);
          }
      }
    src/main/java/com/app/logging/FileLogger.java: |
      package com.app.logging;

      public class FileLogger implements LogWriter {
