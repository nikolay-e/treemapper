  changed_files:
    scripts/migrate.py: |
      import subprocess
      import os

      MIGRATIONS_DIR = "migrations"


      def list_pending(db_url: str) -> list[str]:
          applied = _get_applied(db_url)
          all_files = sorted(f for f in os.listdir(MIGRATIONS_DIR) if f.endswith(".sql"))
          return [f for f in all_files if f not in applied]


      def _get_applied(db_url: str) -> set[str]:
          result = subprocess.run(
              ["psql", db_url, "-t", "-c", "SELECT filename FROM schema_migrations"],
              capture_output=True, text=True, check=True
          )
          return {line.strip() for line in result.stdout.splitlines() if line.strip()}


      def run_migrations(db_url: str) -> None:
          for filename in list_pending(db_url):
              path = os.path.join(MIGRATIONS_DIR, filename)
              subprocess.run(["psql", db_url, "-f", path], check=True)
    scripts/migrate.sh: |
      #!/usr/bin/env bash
      set -euo pipefail
      echo "Running migrations against $DATABASE_URL"
      python3 scripts/migrate.py "$DATABASE_URL"
      echo "Done"
    garbage/seed.py: |
      GARBAGE_REF028_SEED_A = "seed_marker"


      def seed_db() -> None:
          pass
    garbage/fixtures.py: |
      GARBAGE_REF028_FIX_B = "fixtures_marker"


      def load_fixtures() -> None:
          pass
    garbage/cleanup.py: |
      GARBAGE_REF028_CLEAN_C = "cleanup_marker"


      def cleanup_old_data() -> None:
          pass
  commit_message: "feat: add list_pending migrations and skip already-applied files"
