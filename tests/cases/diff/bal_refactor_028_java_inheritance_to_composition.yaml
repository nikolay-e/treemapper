repo:
  initial_files:
    scripts/migrate.py: |
      import subprocess
      import os

      MIGRATIONS_DIR = "migrations"


      def run_migrations(db_url: str) -> None:
          for filename in sorted(os.listdir(MIGRATIONS_DIR)):
              if filename.endswith(".sql"):
                  path = os.path.join(MIGRATIONS_DIR, filename)
                  subprocess.run(["psql", db_url, "-f", path], check=True)
    scripts/migrate.sh: |
      #!/usr/bin/env bash
      python3 scripts/migrate.py "$DATABASE_URL"
    garbage/seed.py: |
      GARBAGE_REF028_SEED_A = "seed_marker"


      def seed_db() -> None:
          pass
    garbage/fixtures.py: |
      GARBAGE_REF028_FIX_B = "fixtures_marker"


