repo:
  initial_files:
    src/main/java/com/app/base/AbstractLogger.java: |
      package com.app.base;

      import java.time.LocalDateTime;

      public abstract class AbstractLogger {
          protected String formatTimestamp() {
              return LocalDateTime.now().toString();
          }

          protected String formatMessage(String level, String msg) {
              return String.format("[%s] %s: %s", formatTimestamp(), level, msg);
          }

          public void info(String msg) {
              write(formatMessage("INFO", msg));
          }

          public void error(String msg) {
              write(formatMessage("ERROR", msg));
          }

          protected abstract void write(String formatted);
      }
    src/main/java/com/app/logging/ConsoleLogger.java: |
      package com.app.logging;

      import com.app.base.AbstractLogger;

      public class ConsoleLogger extends AbstractLogger {
          @Override
          protected void write(String formatted) {
              System.out.println(formatted);
          }
      }
    src/main/java/com/app/logging/FileLogger.java: |
      package com.app.logging;

      import com.app.base.AbstractLogger;

      public class FileLogger extends AbstractLogger {
          private final String filePath;

          public FileLogger(String filePath) {
              this.filePath = filePath;
          }

          @Override
          protected void write(String formatted) {
              System.out.println("Writing to " + filePath + ": " + formatted);
          }
      }
    src/main/java/com/app/service/OrderProcessor.java: |
      package com.app.service;

      import com.app.base.AbstractLogger;

      public class OrderProcessor {
          private final AbstractLogger logger;

          public OrderProcessor(AbstractLogger logger) {
              this.logger = logger;
          }

          public void process(String orderId) {
              logger.info("Processing order " + orderId);
              logger.info("Order " + orderId + " completed");
          }
      }
