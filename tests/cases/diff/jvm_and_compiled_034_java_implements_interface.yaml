      package com.example;

      public interface PaymentProcessor {
          boolean process(Payment payment);
          void refund(String transactionId);
      }
    src/main/java/com/example/StripeProcessor.java: |
      package com.example;

      public class StripeProcessor implements PaymentProcessor {
          private final String apiKey;

          public StripeProcessor(String apiKey) {
              this.apiKey = apiKey;
          }

          @Override
          public boolean process(Payment payment) {
              System.out.println("Processing via Stripe: " + payment.getAmount());
              return true;
          }

          @Override
          public void refund(String transactionId) {
              System.out.println("Refunding via Stripe: " + transactionId);
          }
      }
    src/main/java/com/example/PaymentStatus.java: |
      package com.example;

      public enum PaymentStatus {
          PENDING,
          COMPLETED,
          FAILED,
          REFUNDED;

          public boolean isTerminal() {
              return this == COMPLETED || this == FAILED || this == REFUNDED;
          }
      }
    src/main/java/com/example/shipping/ShippingProcessor.java: |
      package com.example.shipping;

      public class ShippingProcessor {
          public boolean process(ShippingOrder order) {
              System.out.println("Processing shipment: " + order.getTrackingId());
              return true;
          }

          public void refund(String trackingId) {
              System.out.println("Cancelling shipment: " + trackingId);
          }

          public String getStatus(String trackingId) {
              return "IN_TRANSIT";
          }
      }
    src/main/java/com/example/PaymentService.java: |
      package com.example;

      public class PaymentService {
          private final PaymentProcessor processor;

          public PaymentService(PaymentProcessor processor) {
              this.processor = processor;
          }

          public boolean makePayment(Payment payment) {
              return processor.process(payment);
          }

          public void issueRefund(String transactionId) {
              processor.refund(transactionId);
          }
      }
    src/main/java/com/example/gateway/PaymentGateway.java: |
      package com.example.gateway;

      import java.net.http.HttpClient;
      import java.net.http.HttpRequest;
      import java.net.http.HttpResponse;
      import java.net.URI;

      public class PaymentGateway {
          private final HttpClient client = HttpClient.newHttpClient();
          private final String baseUrl;

          public PaymentGateway(String baseUrl) {
              this.baseUrl = baseUrl;
          }

          public String charge(String token, double amount) throws Exception {
              HttpRequest request = HttpRequest.newBuilder()
                  .uri(URI.create(baseUrl + "/charge"))
                  .POST(HttpRequest.BodyPublishers.ofString(
                      "{\"token\":\"" + token + "\",\"amount\":" + amount + "}"))
                  .build();
              HttpResponse<String> response = client.send(request, HttpResponse.BodyHandlers.ofString());
              return response.body();
          }
      }
    src/main/java/com/example/TransactionLog.java: |
      package com.example;

      import java.time.LocalDateTime;
      import java.util.ArrayList;
      import java.util.List;

      public class TransactionLog {
          private final List<LogEntry> entries = new ArrayList<>();

          public void log(String transactionId, PaymentStatus status) {
              entries.add(new LogEntry(transactionId, status, LocalDateTime.now()));
          }

          public List<LogEntry> getEntries() {
              return List.copyOf(entries);
          }

          record LogEntry(String transactionId, PaymentStatus status, LocalDateTime timestamp) {}
      }
    src/main/java/com/example/RefundPolicy.java: |
      package com.example;

      import java.time.Duration;
      import java.time.LocalDateTime;

      public class RefundPolicy {
          private static final Duration REFUND_WINDOW = Duration.ofDays(30);

          public boolean isRefundable(LocalDateTime purchaseDate) {
              return Duration.between(purchaseDate, LocalDateTime.now())
                  .compareTo(REFUND_WINDOW) <= 0;
          }

          public double calculateRefundAmount(double originalAmount, int daysSincePurchase) {
              if (daysSincePurchase <= 7) return originalAmount;
              if (daysSincePurchase <= 14) return originalAmount * 0.9;
              return originalAmount * 0.5;
          }
      }
