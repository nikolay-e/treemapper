repo:
  initial_files:
    Middleware/IMiddleware.cs: |
      namespace Middleware
      {
          public interface IMiddleware
          {
              Task InvokeAsync(HttpContext context, Func<Task> next);
          }
      }
    Middleware/AuthMiddleware.cs: |
      using Middleware;

      namespace Middleware.Impl
      {
          public class AuthMiddleware : IMiddleware
          {
              public async Task InvokeAsync(HttpContext context, Func<Task> next)
              {
                  if (context.User.Identity.IsAuthenticated)
                      await next();
              }
          }
      }
    Pipeline/PipelineBuilder.cs: |
      using Middleware;

      namespace Pipeline
      {
          public class PipelineBuilder
          {
              private readonly List<IMiddleware> _middlewares = new();

              public PipelineBuilder Use(IMiddleware mw)
              {
                  _middlewares.Add(mw);
                  return this;
              }

              public Func<HttpContext, Task> Build()
              {
                  return ctx => Execute(ctx, 0);
              }

              private async Task Execute(HttpContext ctx, int index)
              {
                  if (index < _middlewares.Count)
                      await _middlewares[index].InvokeAsync(ctx, () => Execute(ctx, index + 1));
              }
          }
      }
