name: docker_030_add_vs_copy
tags:
- lang:python
- lang:shell
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/app.py: |
      import os
      import tarfile
      from pathlib import Path

      ASSETS_DIR = Path('/app/assets')
      CONFIG_DIR = Path('/app/config')

      def extract_assets():
          if ASSETS_DIR.exists():
              print(f"Assets loaded: {list(ASSETS_DIR.iterdir())}")

      def load_config():
          config_file = CONFIG_DIR / 'app.json'
          if config_file.exists():
              return config_file.read_text()
          return '{}'
    assets.tar.gz: |
      (binary tarball placeholder)
    requirements.txt: |
      flask==2.3.0
    Dockerfile: |
      FROM python:3.11-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY assets.tar.gz /app/
      RUN tar -xzf assets.tar.gz && rm assets.tar.gz
      COPY src/ ./src/
      CMD ["python", "src/app.py"]
    scripts/prepare_assets.sh: |
      #!/bin/bash
      cd assets/
      tar -czf ../assets.tar.gz .
      echo "Assets packed: $(du -sh ../assets.tar.gz)"
    cdn/config.yaml: |
      origins:
        - name: app-assets
          bucket: s3://my-assets-bucket
          path: /assets/
    build/checksums.txt: |
      sha256:abc123def456  assets.tar.gz
      sha256:789ghi012jkl  config-defaults.json
  changed_files:
    src/app.py: |
      import os
      import tarfile
      from pathlib import Path

      ASSETS_DIR = Path('/app/assets')
      CONFIG_DIR = Path('/app/config')

      def extract_assets():
          if ASSETS_DIR.exists():
              print(f"Assets loaded: {list(ASSETS_DIR.iterdir())}")

      def load_config():
          config_file = CONFIG_DIR / 'app.json'
          if config_file.exists():
              return config_file.read_text()
          return '{}'
    assets.tar.gz: |
      (binary tarball placeholder)
    requirements.txt: |
      flask==2.3.0
    Dockerfile: |
      FROM python:3.12-slim-bookworm AS base
      ENV PYTHONDONTWRITEBYTECODE=1
      ENV PYTHONUNBUFFERED=1

      FROM base AS dependencies
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt

      FROM base AS production
      WORKDIR /app

      # ADD automatically extracts tar archives
      ADD assets.tar.gz /app/assets/

      # ADD can fetch remote URLs (use with caution - prefer COPY for local files)
      ADD --checksum=sha256:abc123def456 https://releases.example.com/config/v1.0/defaults.json /app/config/defaults.json

      # COPY for regular files (preferred over ADD for non-archives)
      COPY --from=dependencies /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages
      COPY --from=dependencies /usr/local/bin /usr/local/bin
      COPY src/ ./src/

      RUN useradd --create-home appuser && \
          chown -R appuser:appuser /app
      USER appuser

      CMD ["python", "src/app.py"]
    scripts/prepare_assets.sh: |
      #!/bin/bash
      cd assets/
      tar -czf ../assets.tar.gz .
      echo "Assets packed: $(du -sh ../assets.tar.gz)"
    cdn/config.yaml: |
      origins:
        - name: app-assets
          bucket: s3://my-assets-bucket
          path: /assets/
    build/checksums.txt: |
      sha256:abc123def456  assets.tar.gz
      sha256:789ghi012jkl  config-defaults.json
  commit_message: Update files
fragments:
- id: app
  selector:
    path: src/app.py
    anchor: ASSETS_DIR = Path('/app/assets')
- id: app_1
  selector:
    path: src/app.py
    anchor: CONFIG_DIR = Path('/app/config')
- id: dockerfile_file
  selector:
    path: Dockerfile
- id: no_prepare_assets
  selector:
    path: scripts/prepare_assets.sh
- id: no_config
  selector:
    path: cdn/config.yaml
- id: no_checksums
  selector:
    path: build/checksums.txt
oracle:
  required:
  - app
  - app_1
  - dockerfile_file
  allowed: []
  forbidden:
  - no_prepare_assets
  - no_config
  - no_checksums
