    src/memory/block_allocator.hpp: |
      #pragma once
      #include <cstddef>

      namespace memory {

      class BlockAllocator {
      public:
          BlockAllocator(size_t block_size, size_t alignment = alignof(std::max_align_t));
          void* allocate();
          void deallocate(void* ptr);
          size_t block_size() const;
          size_t alignment() const;
      private:
          size_t block_size_;
          size_t alignment_;
          void* free_list_;
      };

      }
    src/memory/block_allocator.cpp: |
      #include "block_allocator.hpp"
      #include <cstdlib>

      namespace memory {

      BlockAllocator::BlockAllocator(size_t block_size, size_t alignment)
          : block_size_(block_size), alignment_(alignment), free_list_(nullptr) {}

      void* BlockAllocator::allocate() {
          if (free_list_) {
              void* ptr = free_list_;
              free_list_ = *static_cast<void**>(free_list_);
              return ptr;
          }
          return std::aligned_alloc(alignment_, block_size_);
      }

      void BlockAllocator::deallocate(void* ptr) {
          *static_cast<void**>(ptr) = free_list_;
          free_list_ = ptr;
      }

      size_t BlockAllocator::block_size() const {
          return block_size_;
      }

      size_t BlockAllocator::alignment() const {
          return alignment_;
      }

      }
