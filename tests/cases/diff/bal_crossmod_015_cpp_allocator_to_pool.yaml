    src/memory/block_allocator.hpp: |
      #pragma once
      #include <cstddef>

      namespace memory {

      class BlockAllocator {
      public:
          explicit BlockAllocator(size_t block_size);
          void* allocate();
          void deallocate(void* ptr);
          size_t block_size() const;
      private:
          size_t block_size_;
          void* free_list_;
      };

      }
    src/memory/block_allocator.cpp: |
      #include "block_allocator.hpp"
      #include <cstdlib>

      namespace memory {

      BlockAllocator::BlockAllocator(size_t block_size)
          : block_size_(block_size), free_list_(nullptr) {}

      void* BlockAllocator::allocate() {
          if (free_list_) {
              void* ptr = free_list_;
              free_list_ = *static_cast<void**>(free_list_);
              return ptr;
          }
          return std::malloc(block_size_);
      }

      void BlockAllocator::deallocate(void* ptr) {
          *static_cast<void**>(ptr) = free_list_;
          free_list_ = ptr;
      }

      size_t BlockAllocator::block_size() const {
          return block_size_;
      }

      }
    src/ecs/component_pool.hpp: |
      #pragma once
      #include <vector>
      #include "../memory/block_allocator.hpp"

      namespace ecs {

      class ComponentPool {
      public:
          explicit ComponentPool(size_t component_size);
          void* get(size_t index);
          void* create();
      private:
          memory::BlockAllocator allocator_;
          std::vector<void*> components_;
      };

      }
    src/ecs/component_pool.cpp: |
      #include "component_pool.hpp"

      namespace ecs {

      ComponentPool::ComponentPool(size_t component_size)
          : allocator_(component_size) {}

      void* ComponentPool::get(size_t index) {
          return components_[index];
      }

      void* ComponentPool::create() {
          void* ptr = allocator_.allocate();
          components_.push_back(ptr);
          return ptr;
      }

      }
