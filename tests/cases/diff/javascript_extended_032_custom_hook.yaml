repo:
  initial_files:
    src/hooks/useApi.ts: |
      import { useState, useEffect } from 'react';

      export function useApi<T>(url: string) {
          const [data, setData] = useState<T | null>(null);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState<Error | null>(null);

          useEffect(() => {
              fetch(url)
                  .then(res => res.json())
                  .then(setData)
                  .catch(setError)
                  .finally(() => setLoading(false));
          }, [url]);

          return { data, loading, error };
      }
    src/components/UserList.tsx: |
      console.log('initial');
    src/db/connection.ts: |
      interface ConnectionConfig {
          host: string;
          port: number;
          database: string;
      }

      let pool: ConnectionConfig | null = null;

      export function initConnection(config: ConnectionConfig): void {
          pool = config;
      }

      export function getConnection(): ConnectionConfig {
          if (!pool) throw new Error('Database not initialized');
          return pool;
      }
    src/logger/index.ts: |
      type LogLevel = 'debug' | 'info' | 'warn' | 'error';

      export function createLogger(namespace: string) {
          return {
              debug: (msg: string) => log('debug', namespace, msg),
              info: (msg: string) => log('info', namespace, msg),
              warn: (msg: string) => log('warn', namespace, msg),
              error: (msg: string) => log('error', namespace, msg),
          };
      }

      function log(level: LogLevel, namespace: string, msg: string): void {
          console.log(`[${level}] ${namespace}: ${msg}`);
      }
