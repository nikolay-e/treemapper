    include/compress/codec.h: |
      #pragma once
      #include <cstdint>
      #include <vector>

      namespace compress {

      enum class Algorithm {
          none,
          zstd,
          lz4,
          snappy,
      };

      struct CodecConfig {
          Algorithm algorithm;
          int level;
          bool checksum_enabled;
      };

      class Codec {
      public:
          explicit Codec(const CodecConfig& cfg);
          std::vector<uint8_t> compress(const uint8_t* data, size_t len) const;
          std::vector<uint8_t> decompress(const uint8_t* data, size_t len) const;
          size_t max_compressed_size(size_t src_len) const;
      private:
          CodecConfig cfg_;
      };

      }
    src/storage/blob_store.cpp: |
      #include "compress/codec.h"
      #include <vector>

      namespace storage {

      class BlobStore {
          compress::Codec codec_;
      public:
          explicit BlobStore(const compress::CodecConfig& cfg) : codec_(cfg) {}

          std::vector<uint8_t> put(const uint8_t* data, size_t len) {
              return codec_.compress(data, len);
          }

          std::vector<uint8_t> get(const uint8_t* blob, size_t len) {
              return codec_.decompress(blob, len);
          }
      };

      }
    src/cache/object_cache.cpp: |
