      class Column:
          def __init__(self, name: str, col_type: str, nullable: bool = True):
              self.name = name
              self.col_type = col_type
              self.nullable = nullable
          def to_sql(self) -> str:
              parts = [self.name, self.col_type]
              if not self.nullable:
                  parts.append("NOT NULL")
              return " ".join(parts)
