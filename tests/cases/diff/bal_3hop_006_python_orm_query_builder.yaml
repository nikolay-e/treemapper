repo:
  initial_files:
    orm/column.py: |
      class Column:
          def __init__(self, name: str, col_type: str, nullable: bool = True):
              self.name = name
              self.col_type = col_type
              self.nullable = nullable
          def to_sql(self) -> str:
              null_str = "NULL" if self.nullable else "NOT NULL"
              return f"{self.name} {self.col_type} {null_str}"
    orm/table.py: |
      from orm.column import Column
      class Table:
          def __init__(self, name: str, columns: list[Column]):
              self.name = name
              self.columns = columns
          def column_names(self) -> list[str]:
              return [c.name for c in self.columns]
    orm/query.py: |
      from orm.table import Table
      class QueryBuilder:
          def __init__(self, table: Table):
              self.table = table
              self.conditions: list[str] = []
          def where(self, condition: str) -> "QueryBuilder":
              self.conditions.append(condition)
              return self
          def select(self, *cols: str) -> str:
              col_str = ", ".join(cols) if cols else "*"
              sql = f"SELECT {col_str} FROM {self.table.name}"
              if self.conditions:
                  sql += " WHERE " + " AND ".join(self.conditions)
              return sql
    api/repository.py: |
      from orm.query import QueryBuilder
      from orm.table import Table
      from orm.column import Column
      users_table = Table("users", [
          Column("id", "INTEGER", nullable=False),
          Column("email", "VARCHAR(255)", nullable=False),
          Column("name", "VARCHAR(100)"),
      ])
      def find_user_by_email(email: str) -> str:
          qb = QueryBuilder(users_table)
          return qb.where(f"email = '{email}'").select("id", "name")
    utils/string_helpers.py: |
      def snake_to_camel(name: str) -> str:
          parts = name.split("_")
          return parts[0] + "".join(p.capitalize() for p in parts[1:])
