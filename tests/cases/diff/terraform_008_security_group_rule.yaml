fragments:
- id: main
  selector:
    path: modules/security_group/main.tf
    anchor: security_groups = ingress.value.security_groups
- id: main_1
  selector:
    path: modules/security_group/main.tf
    anchor: dynamic "ingress" {
- id: no_bastion_sg
  selector:
    path: infrastructure/bastion_sg.tf
- id: no_monitoring_sg
  selector:
    path: infrastructure/monitoring_sg.tf
- id: no_waf
  selector:
    path: infrastructure/waf.tf
- id: no_global_0
  selector:
    anchor: admin_cidr_blocks
- id: no_global_1
  selector:
    anchor: bastion-sg
- id: no_global_2
