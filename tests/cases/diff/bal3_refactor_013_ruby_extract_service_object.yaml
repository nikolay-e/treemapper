        end
      end
    lib/export/pdf.rb: |
      GARBAGE_R013_PDF_C = "pdf"

      class PdfExporter
        def export(data)
          ""
        end
      end
  changed_files:
    app/services/create_order_service.rb: |
      class CreateOrderService
        def call(product_id:, quantity:)
          product = Product.find(product_id)
          order = Order.new(product_id, quantity)
          order.total = quantity * product.price
          order.status = "pending"
          OrderRepository.save(order)
          Mailer.send_confirmation(order)
          order
        end
      end
    app/controllers/orders_controller.rb: |
      class OrdersController
        def create(params)
          CreateOrderService.new.call(
            product_id: params[:product_id],
            quantity: params[:quantity]
          )
        end
      end
    app/models/order.rb: |
      class Order
        attr_accessor :product_id, :quantity, :total, :status

        def initialize(product_id, quantity)
          @product_id = product_id
          @quantity = quantity
        end
      end
    app/models/product.rb: |
      class Product
        attr_reader :id, :name, :price

        def initialize(id, name, price)
