name: bal3_refactor_013_ruby_extract_service_object
tags:
- lang:ruby
- change:multi_file
- change:refactor
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    app/controllers/orders_controller.rb: |
      class OrdersController
        def create(params)
          order = Order.new(params[:product_id], params[:quantity])
          total = order.quantity * fetch_price(order.product_id)
          order.total = total
          order.status = "pending"
          OrderRepository.save(order)
          Mailer.send_confirmation(order)
          order
        end

        private

        def fetch_price(product_id)
          Product.find(product_id).price
        end
      end
    app/models/order.rb: |
      class Order
        attr_accessor :product_id, :quantity, :total, :status

        def initialize(product_id, quantity)
          @product_id = product_id
          @quantity = quantity
        end
      end
    app/models/product.rb: |
      class Product
        attr_reader :id, :name, :price

        def initialize(id, name, price)
          @id = id
          @name = name
          @price = price
        end

        def self.find(id)
          new(id, "Widget", 9.99)
        end
      end
    lib/analytics/tracker.rb: |
      GARBAGE_R013_TRACKER_A = "analytics"

