          : -1 + (4 - 2 * clamped) * clamped;
      }
    src/animation/timeline.ts: |
      import { easeInOut } from './easing';

      export interface Keyframe {
        time: number;
        value: number;
      }

      export function interpolateKeyframes(
        keyframes: Keyframe[],
        currentTime: number,
      ): number {
        const sorted = [...keyframes].sort((a, b) => a.time - b.time);
        const i = sorted.findIndex((k) => k.time > currentTime);
        if (i <= 0) return sorted[0]?.value ?? 0;
        const prev = sorted[i - 1];
        const next = sorted[i];
        const t = (currentTime - prev.time) / (next.time - prev.time);
        return prev.value + (next.value - prev.value) * easeInOut(t);
      }
    src/player/animationPlayer.ts: |
      import { interpolateKeyframes, Keyframe } from '../animation/timeline';

      export class AnimationPlayer {
        private keyframes: Keyframe[] = [];
        private startTime = 0;

        load(keyframes: Keyframe[]): void {
          this.keyframes = keyframes;
          this.startTime = performance.now();
        }

        getValue(): number {
          const elapsed = (performance.now() - this.startTime) / 1000;
          return interpolateKeyframes(this.keyframes, elapsed);
        }
      }
    garbage/particles.ts: |
      const GARBAGE_GRK021_PART_A = "particles_marker";
      export function spawnParticle(x: number, y: number): void {}
    garbage/shader.ts: |
      const GARBAGE_GRK021_SHADER_B = "shader_marker";
      export function compileShader(src: string): number { return 0; }
    garbage/texture.ts: |
      const GARBAGE_GRK021_TEX_C = "texture_marker";
      export function loadTexture(url: string): Promise<void> { return Promise.resolve(); }
