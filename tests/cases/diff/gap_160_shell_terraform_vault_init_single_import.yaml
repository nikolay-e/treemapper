name: gap_160_shell_terraform_vault_init_single_import
tags:
- change:config
- change:single_file
- context:import_chain
- difficulty:medium
- distance:2hop
- lang:shell
- lang:terraform
fixtures:
  auto_garbage: true
repo:
  initial_files:
    vault/init.sh: |
      #!/usr/bin/env bash
      set -euo pipefail

      VAULT_ADDR="${VAULT_ADDR:-https://vault.fintech.internal:8200}"
      KEY_SHARES=5
      KEY_THRESHOLD=3

      export VAULT_ADDR

      if vault status 2>/dev/null | grep -q "Sealed.*true"; then
        vault operator unseal "${UNSEAL_KEY_1}"
        vault operator unseal "${UNSEAL_KEY_2}"
        vault operator unseal "${UNSEAL_KEY_3}"
      fi

      vault secrets enable -path=kv kv-v2 2>/dev/null || true
      vault auth enable kubernetes 2>/dev/null || true
    terraform/vault.tf: |
      resource "helm_release" "vault" {
        name       = "vault"
        repository = "https://helm.releases.hashicorp.com"
        chart      = "vault"
        namespace  = "vault"
        version    = "0.27.0"

        set {
          name  = "server.ha.enabled"
          value = "true"
        }

        set {
          name  = "server.ha.replicas"
          value = "3"
        }

        set {
          name  = "server.dataStorage.size"
          value = "10Gi"
        }
      }
    terraform/kms.tf: |
      resource "aws_kms_key" "vault_unseal" {
        description = "Vault auto-unseal key"
        key_usage   = "ENCRYPT_DECRYPT"

        tags = {
          Purpose = "vault-unseal"
        }
      }

      resource "aws_kms_alias" "vault_unseal" {
        name          = "alias/vault-unseal"
        target_key_id = aws_kms_key.vault_unseal.key_id
      }

      output "kms_key_id" {
        value = aws_kms_key.vault_unseal.key_id
      }
    terraform/consul.tf: |
      resource "helm_release" "consul" {
        name       = "consul"
        repository = "https://helm.releases.hashicorp.com"
        chart      = "consul"
        namespace  = "consul"
        version    = "1.3.0"

        set {
          name  = "server.replicas"
          value = "3"
        }

        set {
          name  = "connectInject.enabled"
          value = "true"
        }
      }
  changed_files:
    vault/init.sh: |
      #!/usr/bin/env bash
      set -euo pipefail

      VAULT_ADDR="${VAULT_ADDR:-https://vault.fintech.internal:8200}"
      KEY_SHARES=5
      KEY_THRESHOLD=3
      AUDIT_LOG_PATH="${AUDIT_LOG_PATH:-/var/log/vault/audit.log}"

      export VAULT_ADDR

      if vault status 2>/dev/null | grep -q "Sealed.*true"; then
        vault operator unseal "${UNSEAL_KEY_1}"
        vault operator unseal "${UNSEAL_KEY_2}"
        vault operator unseal "${UNSEAL_KEY_3}"
      fi

      vault secrets enable -path=kv kv-v2 2>/dev/null || true
      vault secrets enable -path=transit transit 2>/dev/null || true
      vault auth enable kubernetes 2>/dev/null || true

      vault audit enable file file_path="${AUDIT_LOG_PATH}" 2>/dev/null || true

      vault policy write app-read - <<POLICY
      path "kv/data/app/*" {
        capabilities = ["read", "list"]
      }
      path "transit/encrypt/app-key" {
        capabilities = ["update"]
      }
      POLICY
fragments:
- id: transit_engine
  selector:
    path: vault/init.sh
    anchor: transit
- id: audit_log
  selector:
    path: vault/init.sh
    anchor: AUDIT_LOG_PATH
- id: vault_helm
  selector:
    path: terraform/vault.tf
    anchor: helm_release
- id: kms_unseal
  selector:
    path: terraform/kms.tf
    anchor: aws_kms_key.vault_unseal
- id: no_consul
  selector:
    path: terraform/consul.tf
- id: no_consul_helm
  selector:
    anchor: connectInject
oracle:
  required:
  - transit_engine
  - audit_log
  - vault_helm
  forbidden:
  - no_consul
  - no_consul_helm
