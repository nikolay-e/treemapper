        tracking_number: str | None = None
  src/orders/validators.py: |
    import re

    def validate_shipping_address(
        street: str, city: str, postal_code: str, country: str
    ) -> bool:
        """Validate a shipping address for completeness and format."""
        if not all([street, city, postal_code, country]):
            return False
        return len(postal_code) >= 3

    def validate_phone_number(phone: str, country_code: str) -> bool:
        """Validate phone number format for the given country."""
        patterns = {
            "US": r"^\+1\d{10}$",
            "DE": r"^\+49\d{10,11}$",
            "UK": r"^\+44\d{10}$",
        }
        pattern = patterns.get(country_code, r"^\+\d{7,15}$")
        return bool(re.match(pattern, phone))
