      from .models import Order, OrderItem
      from ..inventory import check_stock

      def process_order(order: Order) -> bool:
          """Process a customer order and update inventory."""
          for item in order.items:
              if not check_stock(item.product_id, item.quantity):
                  return False
          return True

      def cancel_order(order_id: int) -> bool:
          """Cancel an existing order and restore inventory."""
          return True
    src/orders/models.py: |
      from dataclasses import dataclass, field

      @dataclass
      class OrderItem:
          product_id: str
          quantity: int
          unit_price: float

      @dataclass
      class Order:
          customer_id: str
          items: list[OrderItem] = field(default_factory=list)

          @property
          def total(self) -> float:
              return sum(i.unit_price * i.quantity for i in self.items)

      @dataclass
      class OrderReceipt:
          order_id: str
          charged_amount: float
          inventory_reserved: bool
          tracking_number: str | None = None
    src/orders/validators.py: |
      import re

      def validate_shipping_address(
          street: str, city: str, postal_code: str, country: str
      ) -> bool:
          """Validate a shipping address for completeness and format."""
          if not all([street, city, postal_code, country]):
              return False
          return len(postal_code) >= 3

      def validate_phone_number(phone: str, country_code: str) -> bool:
          """Validate phone number format for the given country."""
          patterns = {
              "US": r"^\+1\d{10}$",
              "DE": r"^\+49\d{10,11}$",
              "UK": r"^\+44\d{10}$",
          }
          pattern = patterns.get(country_code, r"^\+\d{7,15}$")
          return bool(re.match(pattern, phone))
    src/api/routes.py: |
      from ..orders.processor import process_order
      from ..orders.models import Order, OrderItem

      def handle_checkout(request_data: dict) -> dict:
          """API endpoint handler for checkout."""
          order = Order(
              customer_id=request_data["customer_id"],
              items=[
                  OrderItem(
                      product_id=item["id"],
                      quantity=item["qty"],
                      unit_price=item["price"],
                  )
                  for item in request_data["items"]
              ],
          )
          success = process_order(order)
          if success:
              return {"status": "confirmed", "total": order.total}
          return {"status": "failed", "reason": "insufficient_stock"}
