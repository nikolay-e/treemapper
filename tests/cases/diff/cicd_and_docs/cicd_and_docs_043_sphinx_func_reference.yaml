    class InventoryError(Exception):
        """Raised when inventory operation fails irrecoverably.

        Attributes:
            product_id: The product that caused the failure
            requested: Quantity that was requested
            available: Quantity actually available
        """
        def __init__(self, product_id: str, requested: int, available: int):
            self.product_id = product_id
            self.requested = requested
            self.available = available
            super().__init__(
                f"Cannot fulfill {requested} of {product_id}: "
                f"only {available} available"
            )

    def check_stock(product_id: str, quantity: int) -> bool:
        """Check if sufficient stock exists for the given product."""
        return True

    def reserve_stock(product_id: str, quantity: int) -> str:
        """Reserve inventory and return reservation ID."""
        return f"RSV-{product_id}-{quantity}"
  src/notifications/email.py: |
    from string import Template

    ORDER_CONFIRMATION_TEMPLATE = Template("""
    Dear $customer_name,

    Your order $order_id has been confirmed.
    Total charged: $$${amount}

    Tracking: $tracking_url
    """)

    def send_order_confirmation(
        customer_email: str,
        customer_name: str,
        order_id: str,
        amount: float,
        tracking_url: str,
    ) -> bool:
        """Send order confirmation email."""
        body = ORDER_CONFIRMATION_TEMPLATE.substitute(
            customer_name=customer_name,
            order_id=order_id,
            amount=f"{amount:.2f}",
            tracking_url=tracking_url,
        )
        return True
