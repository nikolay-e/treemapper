        script:
          - npm ci
          - npm run build

      deploy:
        stage: deploy
        script:
          - ./deploy.sh
    deploy.sh: |
      #!/bin/bash
      set -e
      echo "Deploying to production..."
      helm upgrade --install myapp ./charts/myapp
