max_enrichment: 16.1
initial:
  .github/workflows/ci.yml: |
    name: CI
    on: [push]
    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: npm run build
      deploy:
        runs-on: ubuntu-latest
        needs: build
        steps:
          - uses: actions/checkout@v4
          - run: ./deploy.sh
  scripts/deploy.sh: |
    #!/bin/bash
    set -e
    echo "Deploying to production..."
    aws s3 sync ./dist s3://prod-bucket/
  src/config/environments.ts: |
    export type Environment = 'development' | 'staging' | 'production';

    export function getEnvironment(): Environment {
      return (process.env.NODE_ENV as Environment) || 'development';
    }

    export function isProduction(): boolean {
      return getEnvironment() === 'production';
    }
  garbage_branch.ts: |
    const GARBAGE_CICD_DOCS_010_BRANCH_MARKER_A = "feature";
    const GARBAGE_CICD_DOCS_010_PREFIX_MARKER_B = "refs/heads";

    class GarbageBranchManager {
      static GARBAGE_CICD_DOCS_010_PROTECTED_MARKER_C = true;
      getBranch(): string { return ""; }
    }
  garbage_merge.ts: |
    const GARBAGE_CICD_DOCS_010_MERGE_MARKER_D = "squash";
    const GARBAGE_CICD_DOCS_010_STRATEGY_MARKER_E = "recursive";

    class GarbageMergeHandler {
      static GARBAGE_CICD_DOCS_010_CONFLICT_MARKER_F = "abort";
      merge(): void {}
    }
changed:
  .github/workflows/ci.yml: |
    name: CI
    on: [push]
    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: npm run build
      deploy:
        runs-on: ubuntu-latest
        needs: build
        if: github.ref == 'refs/heads/main'
        steps:
          - uses: actions/checkout@v4
          - run: ./deploy.sh
  scripts/deploy.sh: |
    #!/bin/bash
    set -e
    echo "Deploying to production..."
    aws s3 sync ./dist s3://prod-bucket/
  src/config/environments.ts: |
    export type Environment = 'development' | 'staging' | 'production';

    export function getEnvironment(): Environment {
      return (process.env.NODE_ENV as Environment) || 'development';
    }

    export function isProduction(): boolean {
      return getEnvironment() === 'production';
    }
  garbage_branch.ts: |
    const GARBAGE_CICD_DOCS_010_BRANCH_MARKER_A = "feature";
    const GARBAGE_CICD_DOCS_010_PREFIX_MARKER_B = "refs/heads";

    class GarbageBranchManager {
      static GARBAGE_CICD_DOCS_010_PROTECTED_MARKER_C = true;
      getBranch(): string { return ""; }
    }
  garbage_merge.ts: |
    const GARBAGE_CICD_DOCS_010_MERGE_MARKER_D = "squash";
    const GARBAGE_CICD_DOCS_010_STRATEGY_MARKER_E = "recursive";

    class GarbageMergeHandler {
      static GARBAGE_CICD_DOCS_010_CONFLICT_MARKER_F = "abort";
      merge(): void {}
    }
must_include_files:
- .github/workflows/ci.yml
must_include_content:
- 'if: github.ref == ''refs/heads/main'''
must_not_include:
- GARBAGE_CICD_DOCS_010_BRANCH_MARKER_A
- GARBAGE_CICD_DOCS_010_CONFLICT_MARKER_F
- GARBAGE_CICD_DOCS_010_MERGE_MARKER_D
- GARBAGE_CICD_DOCS_010_PREFIX_MARKER_B
- GARBAGE_CICD_DOCS_010_PROTECTED_MARKER_C
- GARBAGE_CICD_DOCS_010_STRATEGY_MARKER_E
- garbage_branch.ts
- garbage_merge.ts
add_garbage_files: false
skip_garbage_check: true
