initial:
  openapi.yaml: |
    openapi: 3.0.0
    info:
      title: User API
      version: 1.0.0
    paths:
      /users:
        get:
          summary: List users
          responses:
            '200':
              description: List of users
  src/handlers/users.py: |
    from flask import jsonify

    def list_users():
        return jsonify([{"id": 1, "name": "John"}])
  src/routes.py: |
    from flask import Blueprint
    from handlers.users import list_users

    api = Blueprint('api', __name__)
    api.route('/users')(list_users)
  garbage_openapi_parser.ts: |
    const GARBAGE_CICD_DOCS_050_PARSER_MARKER_A = "swagger-parser";
    const GARBAGE_CICD_DOCS_050_VALIDATE_MARKER_B = true;

    class GarbageOpenapiParser {
      static GARBAGE_CICD_DOCS_050_DEREFERENCE_MARKER_C = false;
      parse(): void {}
    }
  garbage_openapi_generator.ts: |
    const GARBAGE_CICD_DOCS_050_GENERATOR_MARKER_D = "openapi-generator";
    const GARBAGE_CICD_DOCS_050_LANG_MARKER_E = "typescript";

    class GarbageOpenapiGenerator {
      static GARBAGE_CICD_DOCS_050_TEMPLATE_MARKER_F = "axios";
      generate(): void {}
    }
changed:
  openapi.yaml: |
    openapi: 3.0.0
    info:
      title: User API
      version: 1.0.0
    paths:
      /users:
        get:
          summary: List users
          parameters:
            - name: limit
              in: query
              schema:
                type: integer
                default: 10
          responses:
            '200':
              description: List of users
        post:
          summary: Create user
          requestBody:
            required: true
            content:
              application/json:
                schema:
                  $ref: '#/components/schemas/CreateUser'
          responses:
            '201':
              description: User created
    components:
      schemas:
        CreateUser:
          type: object
          required:
            - name
            - email
          properties:
            name:
              type: string
            email:
              type: string
              format: email
  src/handlers/users.py: |
    from flask import jsonify, request

    def list_users():
        limit = request.args.get('limit', 10, type=int)
        users = [{"id": 1, "name": "John"}][:limit]
        return jsonify(users)

    def create_user():
        data = request.get_json()
        user = {"id": 2, **data}
        return jsonify(user), 201
  src/routes.py: |
    from flask import Blueprint
    from handlers.users import list_users, create_user

    api = Blueprint('api', __name__)
    api.route('/users', methods=['GET'])(list_users)
    api.route('/users', methods=['POST'])(create_user)
  garbage_openapi_parser.ts: |
    const GARBAGE_CICD_DOCS_050_PARSER_MARKER_A = "swagger-parser";
    const GARBAGE_CICD_DOCS_050_VALIDATE_MARKER_B = true;

    class GarbageOpenapiParser {
      static GARBAGE_CICD_DOCS_050_DEREFERENCE_MARKER_C = false;
      parse(): void {}
    }
  garbage_openapi_generator.ts: |
    const GARBAGE_CICD_DOCS_050_GENERATOR_MARKER_D = "openapi-generator";
    const GARBAGE_CICD_DOCS_050_LANG_MARKER_E = "typescript";

    class GarbageOpenapiGenerator {
      static GARBAGE_CICD_DOCS_050_TEMPLATE_MARKER_F = "axios";
      generate(): void {}
    }
must_include_files:
- openapi.yaml
- src/handlers/users.py
- src/routes.py
must_include_content:
- '- name: limit'
- 'format: email'
must_not_include:
- GARBAGE_CICD_DOCS_050_DEREFERENCE_MARKER_C
- GARBAGE_CICD_DOCS_050_GENERATOR_MARKER_D
- GARBAGE_CICD_DOCS_050_LANG_MARKER_E
- GARBAGE_CICD_DOCS_050_PARSER_MARKER_A
- GARBAGE_CICD_DOCS_050_TEMPLATE_MARKER_F
- GARBAGE_CICD_DOCS_050_VALIDATE_MARKER_B
- garbage_openapi_parser.ts
add_garbage_files: false
skip_garbage_check: true
