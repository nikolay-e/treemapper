    export function emitOrderEvent(event: OrderCreatedEvent | OrderCancelledEvent): void {
      console.log(`Event: ${event.type} at ${event.timestamp}`);
    }

# === Assertions ===

must_include_files:
  - src/service.ts
  # Core positive test: types.ts MUST be discovered despite being unchanged.
  # JS edge builder does NOT discover it (only does backward discovery).
  # Rare-identifier expansion on "paymentmethod" (count ≤ 3) discovers it.
  # Strong type_ref edge (0.65) from service.ts gives high PPR.
  # PaymentMethod signature need (priority 0.7) satisfied with match_strength=1.0.
  - src/types.ts
must_include_content_from:
  src/service.ts:
    - async function processOrder
    - PaymentMethod
    - ProcessResult
    - validateOrder
  src/types.ts:
    # Verify that the type DEFINITIONS are included, not just the file
    - interface PaymentMethod
    - interface ProcessResult
must_not_include:
  # --- payment-processor.ts: discovered but NOT selected ---
  # Shares "paymentmethod" rare identifier → discovered by expansion.
  # But types.ts already satisfies PaymentMethod need (match_strength=1.0).
  # This file only MENTIONS PaymentMethod (match_strength=0.3).
  # phi(max(1.0+η·R_types, 0.3+η·R_processor)) = phi(1.0+η·R_types) unchanged.
  # Marginal gain ≈ 0 → not selected.
  - PaymentProcessor
  - processPayment
  - refundPayment
  # --- validators.ts: NOT discovered ---
  # No shared rare identifiers with diff. Only sibling edges (weight=0.05).
  # "validateshippingaddress" and "validatepostalcode" are not diff concepts.
  - validateShippingAddress
  - validatePostalCode
  # --- order-events.ts: NOT discovered ---
  # "order" is in CODE_STOPWORDS → not a diff concept → no rare expansion.
  # Import from '../types' ≠ changed name "service" → JS edge builder skips.
  - OrderCreatedEvent
  - OrderCancelledEvent
  - emitOrderEvent
  - correlationId
must_not_include_files:
  - src/checkout/payment-processor.ts
  - src/validators.ts
  - src/events/order-events.ts
max_fragments: 8
max_files: 2
add_garbage_files: false
skip_garbage_check: true
