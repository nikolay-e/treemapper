  src/types.ts: |
    export interface User {
      id: number;
      name: string;
      email: string;
    }

    export interface Order {
      id: number;
      userId: number;
      items: OrderItem[];
      total: number;
    }

    export interface OrderItem {
      productId: number;
      quantity: number;
      price: number;
    }

    export interface PaymentMethod {
      type: 'card' | 'paypal' | 'bank';
