initial:
  .github/workflows/ci.yml: |
    name: CI
    on: [push]
    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: npm run build
  package.json: |
    {
      "name": "artifact-app",
      "version": "2.0.0",
      "scripts": {
        "build": "vite build",
        "test": "vitest"
      }
    }
  vite.config.ts: |
    import { defineConfig } from 'vite';

    export default defineConfig({
      build: {
        outDir: 'dist',
        sourcemap: true
      }
    });
  garbage_storage.ts: |
    const GARBAGE_CICD_DOCS_011_STORAGE_MARKER_A = "s3";
    const GARBAGE_CICD_DOCS_011_BUCKET_MARKER_B = "artifacts-bucket";

    class GarbageStorageService {
      static GARBAGE_CICD_DOCS_011_REGION_MARKER_C = "us-east-1";
      upload(): void {}
    }
  garbage_retention.ts: |
    const GARBAGE_CICD_DOCS_011_RETENTION_MARKER_D = 30;
    const GARBAGE_CICD_DOCS_011_CLEANUP_MARKER_E = "daily";

    class GarbageRetentionPolicy {
      static GARBAGE_CICD_DOCS_011_ARCHIVE_MARKER_F = true;
      cleanup(): void {}
    }
changed:
  .github/workflows/ci.yml: |
    name: CI
    on: [push]
    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: npm run build
          - uses: actions/upload-artifact@v4
            with:
              name: dist
              path: dist/
      deploy:
        needs: build
        runs-on: ubuntu-latest
        steps:
          - uses: actions/download-artifact@v4
            with:
              name: dist
  package.json: |
    {
      "name": "artifact-app",
      "version": "2.0.0",
      "scripts": {
        "build": "vite build",
        "test": "vitest"
      }
    }
  vite.config.ts: |
    import { defineConfig } from 'vite';

    export default defineConfig({
      build: {
        outDir: 'dist',
        sourcemap: true
      }
    });
  garbage_storage.ts: |
    const GARBAGE_CICD_DOCS_011_STORAGE_MARKER_A = "s3";
    const GARBAGE_CICD_DOCS_011_BUCKET_MARKER_B = "artifacts-bucket";

    class GarbageStorageService {
      static GARBAGE_CICD_DOCS_011_REGION_MARKER_C = "us-east-1";
      upload(): void {}
    }
  garbage_retention.ts: |
    const GARBAGE_CICD_DOCS_011_RETENTION_MARKER_D = 30;
    const GARBAGE_CICD_DOCS_011_CLEANUP_MARKER_E = "daily";

    class GarbageRetentionPolicy {
      static GARBAGE_CICD_DOCS_011_ARCHIVE_MARKER_F = true;
      cleanup(): void {}
    }
must_include_files:
- .github/workflows/ci.yml
must_include_content:
- '- uses: actions/upload-artifact@v4'
must_not_include:
- GARBAGE_CICD_DOCS_011_ARCHIVE_MARKER_F
- GARBAGE_CICD_DOCS_011_BUCKET_MARKER_B
- GARBAGE_CICD_DOCS_011_CLEANUP_MARKER_E
- GARBAGE_CICD_DOCS_011_REGION_MARKER_C
- GARBAGE_CICD_DOCS_011_RETENTION_MARKER_D
- GARBAGE_CICD_DOCS_011_STORAGE_MARKER_A
- garbage_retention.ts
- garbage_storage.ts
add_garbage_files: false
skip_garbage_check: true
