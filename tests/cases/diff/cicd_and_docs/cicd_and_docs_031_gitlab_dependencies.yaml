max_enrichment: 5.6
initial:
  .gitlab-ci.yml: |
    stages:
      - build
      - deploy

    build:
      stage: build
      script:
        - npm ci
        - npm run build
      artifacts:
        paths:
          - dist/

    deploy:
      stage: deploy
      script:
        - ./deploy.sh
  deploy.sh: |
    #!/bin/bash
    set -e
    echo "Deploying from dist/"
    scp -r dist/* server:/var/www/app/
  package.json: |
    {
      "name": "gitlab-dependencies-app",
      "version": "1.0.0",
      "scripts": {
        "build": "webpack --mode production"
      }
    }
  garbage_artifact_store.ts: |
    const GARBAGE_CICD_DOCS_031_STORE_MARKER_A = "s3";
    const GARBAGE_CICD_DOCS_031_BUCKET_MARKER_B = "artifacts";

    class GarbageArtifactStore {
      static GARBAGE_CICD_DOCS_031_COMPRESS_MARKER_C = true;
      upload(): void {}
    }
  garbage_artifact_fetcher.ts: |
    const GARBAGE_CICD_DOCS_031_FETCH_MARKER_D = "http";
    const GARBAGE_CICD_DOCS_031_RETRY_MARKER_E = 3;

    class GarbageArtifactFetcher {
      static GARBAGE_CICD_DOCS_031_TIMEOUT_MARKER_F = 30000;
      fetch(): void {}
    }
changed:
  .gitlab-ci.yml: |
    stages:
      - build
      - deploy

    build:
      stage: build
      script:
        - npm ci
        - npm run build
      artifacts:
        paths:
          - dist/

    deploy:
      stage: deploy
      dependencies:
        - build
      script:
        - ./deploy.sh dist/
  deploy.sh: |
    #!/bin/bash
    set -e
    DIST_DIR="${1:-dist}"
    echo "Deploying from $DIST_DIR/"
    scp -r "$DIST_DIR"/* server:/var/www/app/
  package.json: |
    {
      "name": "gitlab-dependencies-app",
      "version": "1.0.0",
      "scripts": {
        "build": "webpack --mode production"
      }
    }
  garbage_artifact_store.ts: |
    const GARBAGE_CICD_DOCS_031_STORE_MARKER_A = "s3";
    const GARBAGE_CICD_DOCS_031_BUCKET_MARKER_B = "artifacts";

    class GarbageArtifactStore {
      static GARBAGE_CICD_DOCS_031_COMPRESS_MARKER_C = true;
      upload(): void {}
    }
  garbage_artifact_fetcher.ts: |
    const GARBAGE_CICD_DOCS_031_FETCH_MARKER_D = "http";
    const GARBAGE_CICD_DOCS_031_RETRY_MARKER_E = 3;

    class GarbageArtifactFetcher {
      static GARBAGE_CICD_DOCS_031_TIMEOUT_MARKER_F = 30000;
      fetch(): void {}
    }
must_include_files:
- .gitlab-ci.yml
- deploy.sh
must_include_content:
- 'dependencies:'
- DIST_DIR="${1:-dist}"
must_not_include:
- GARBAGE_CICD_DOCS_031_COMPRESS_MARKER_C
- GARBAGE_CICD_DOCS_031_FETCH_MARKER_D
- GARBAGE_CICD_DOCS_031_RETRY_MARKER_E
- GARBAGE_CICD_DOCS_031_TIMEOUT_MARKER_F
- garbage_artifact_fetcher.ts
add_garbage_files: false
skip_garbage_check: true
