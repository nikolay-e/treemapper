max_enrichment: 4.5
initial:
  .github/actions/setup/action.yml: |
    name: Setup
    description: Setup environment
  .github/workflows/ci.yml: |
    name: CI
    on: [push]
    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - uses: actions/setup-node@v4
            with:
              node-version: 18
          - run: npm ci
          - run: npm run build
  package.json: |
    {
      "name": "composite-action-app",
      "version": "1.0.0",
      "scripts": {
        "build": "tsc",
        "test": "jest"
      }
    }
  garbage_action.ts: |
    const GARBAGE_CICD_DOCS_016_ACTION_MARKER_A = "javascript";
    const GARBAGE_CICD_DOCS_016_RUNTIME_MARKER_B = "node20";

    class GarbageActionRunner {
      static GARBAGE_CICD_DOCS_016_TIMEOUT_MARKER_C = 60000;
      run(): void {}
    }
  garbage_input.ts: |
    const GARBAGE_CICD_DOCS_016_INPUT_MARKER_D = "required";
    const GARBAGE_CICD_DOCS_016_DEFAULT_MARKER_E = "latest";

    class GarbageInputParser {
      static GARBAGE_CICD_DOCS_016_VALIDATE_MARKER_F = true;
      parse(): Record<string, string> { return {}; }
    }
changed:
  .github/actions/setup/action.yml: |
    name: Setup
    description: Setup environment
    runs:
      using: composite
      steps:
        - uses: actions/setup-node@v4
          with:
            node-version: 18
        - run: npm ci
          shell: bash
        - run: npm run build
          shell: bash
  .github/workflows/ci.yml: |
    name: CI
    on: [push]
    jobs:
      build:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - uses: ./.github/actions/setup
  package.json: |
    {
      "name": "composite-action-app",
      "version": "1.0.0",
      "scripts": {
        "build": "tsc",
        "test": "jest"
      }
    }
  garbage_action.ts: |
    const GARBAGE_CICD_DOCS_016_ACTION_MARKER_A = "javascript";
    const GARBAGE_CICD_DOCS_016_RUNTIME_MARKER_B = "node20";

    class GarbageActionRunner {
      static GARBAGE_CICD_DOCS_016_TIMEOUT_MARKER_C = 60000;
      run(): void {}
    }
  garbage_input.ts: |
    const GARBAGE_CICD_DOCS_016_INPUT_MARKER_D = "required";
    const GARBAGE_CICD_DOCS_016_DEFAULT_MARKER_E = "latest";

    class GarbageInputParser {
      static GARBAGE_CICD_DOCS_016_VALIDATE_MARKER_F = true;
      parse(): Record<string, string> { return {}; }
    }
must_include_files:
- .github/actions/setup/action.yml
- .github/workflows/ci.yml
must_include_content:
- 'using: composite'
- '- uses: ./.github/actions/setup'
must_not_include:
- GARBAGE_CICD_DOCS_016_ACTION_MARKER_A
- GARBAGE_CICD_DOCS_016_DEFAULT_MARKER_E
- GARBAGE_CICD_DOCS_016_INPUT_MARKER_D
- GARBAGE_CICD_DOCS_016_RUNTIME_MARKER_B
- GARBAGE_CICD_DOCS_016_TIMEOUT_MARKER_C
- GARBAGE_CICD_DOCS_016_VALIDATE_MARKER_F
- garbage_action.ts
- garbage_input.ts
add_garbage_files: false
skip_garbage_check: true
