    ## API Reference

    See [Quick Start](#quick-start) for basic examples.

    ### chirp_synthesis

    Generates a linear chirp signal sweeping from `freq_start` to `freq_end`
    over the specified duration. Uses 44100 Hz sample rate.

    ### wavelet_decompose

    Performs continuous wavelet transform decomposition using Morlet wavelets.
    Returns a list of coefficient arrays, one per scale.

    Parameters:
    - `signal`: input signal as numpy array
    - `scales`: number of wavelet scales (default: 8)
