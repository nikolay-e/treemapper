  initial_files:
    README.md: |
      # SpectralKit

      A Python library for spectral analysis and signal processing.

      ## Installation

      ```bash
      pip install spectralkit
      ```

      ## Quick Start

      ```python
      from spectralkit import chirp_synthesis

      signal = chirp_synthesis(duration=1.0, freq_start=20, freq_end=2000)
      ```
    src/spectralkit/__init__.py: |
      from .analysis import chirp_synthesis, wavelet_decompose

      __all__ = ['chirp_synthesis', 'wavelet_decompose']
    src/spectralkit/analysis.py: |
      import numpy as np

      def chirp_synthesis(duration: float, freq_start: float, freq_end: float) -> np.ndarray:
          """Generate a linear chirp signal sweeping between two frequencies."""
          sample_rate = 44100
          t = np.linspace(0, duration, int(sample_rate * duration))
          freq = np.linspace(freq_start, freq_end, len(t))
          return np.sin(2 * np.pi * np.cumsum(freq) / sample_rate)

      def wavelet_decompose(signal: np.ndarray, scales: int = 8) -> list:
          """Perform continuous wavelet transform using Morlet wavelets."""
          coefficients = []
          for scale in range(1, scales + 1):
              wavelet = np.exp(-0.5 * (np.arange(len(signal)) / scale) ** 2)
              coeff = np.convolve(signal, wavelet, mode='same')
              coefficients.append(coeff)
          return coefficients
    CHANGELOG.md: |
      # Changelog

      ## v2.0.0 (2026-01-15)

      - Added `wavelet_decompose` for continuous wavelet transform analysis
      - Improved `chirp_synthesis` frequency sweep accuracy by 15%
      - Breaking: removed deprecated `fft_analyze` function
      - Updated NumPy dependency to >=1.26

      ## v1.0.0 (2025-06-01)

      - Initial release with `chirp_synthesis` signal generation
    src/spectralkit/signal_filters.py: |
      import numpy as np

      class ButterworthFilter:
          """Digital Butterworth filter implementation."""

          def __init__(self, order: int, cutoff_freq: float, sample_rate: float):
              self.order = order
              self.cutoff_freq = cutoff_freq
              self.sample_rate = sample_rate

          def bandpass(self, signal: np.ndarray, low: float, high: float) -> np.ndarray:
              """Apply bandpass filter between low and high frequencies."""
              return signal

          def lowpass(self, signal: np.ndarray) -> np.ndarray:
              """Apply lowpass filter at cutoff frequency."""
              return signal
    docs/architecture.md: |
      # Architecture

      ## Plugin System

      SpectralKit uses a modular pipeline architecture where each processing
      step is a composable plugin registered with the PluginRegistry.

      ## Data Flow

      Raw input → Preprocessor → AnalysisChain → PostProcessor → Output

      Each stage communicates via immutable SignalFrame objects carrying
      metadata alongside the sample data.
