    README.md: |
      # SpectralKit

      A Python library for spectral analysis and signal processing.

      ## Installation

      ```bash
      pip install spectralkit
      ```

      ## Quick Start

      ```python
      from spectralkit import chirp_synthesis, wavelet_decompose

      # Generate a test signal
      signal = chirp_synthesis(duration=1.0, freq_start=20, freq_end=2000)

      # Decompose with continuous wavelet transform
      coefficients = wavelet_decompose(signal, scales=12)
      ```

      ## API Reference

      See [Quick Start](#quick-start) for basic examples.

      ### chirp_synthesis

      Generates a linear chirp signal sweeping from `freq_start` to `freq_end`
      over the specified duration. Uses 44100 Hz sample rate.

      ### wavelet_decompose

      Performs continuous wavelet transform decomposition using Morlet wavelets.
      Returns a list of coefficient arrays, one per scale.

      Parameters:
      - `signal`: input signal as numpy array
      - `scales`: number of wavelet scales (default: 8)
