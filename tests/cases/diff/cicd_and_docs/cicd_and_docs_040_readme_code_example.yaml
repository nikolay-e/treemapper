  src/spectralkit/analysis.py: |
    import numpy as np

    def chirp_synthesis(duration: float, freq_start: float, freq_end: float) -> np.ndarray:
        """Generate a linear chirp signal sweeping between two frequencies."""
        sample_rate = 44100
        t = np.linspace(0, duration, int(sample_rate * duration))
        freq = np.linspace(freq_start, freq_end, len(t))
        return np.sin(2 * np.pi * np.cumsum(freq) / sample_rate)

    def wavelet_decompose(signal: np.ndarray, scales: int = 8) -> list:
        """Perform continuous wavelet transform using Morlet wavelets."""
        coefficients = []
        for scale in range(1, scales + 1):
            wavelet = np.exp(-0.5 * (np.arange(len(signal)) / scale) ** 2)
            coeff = np.convolve(signal, wavelet, mode='same')
            coefficients.append(coeff)
        return coefficients
  # --- Trap 1: CHANGELOG shares rare identifiers but only mentions them ---
