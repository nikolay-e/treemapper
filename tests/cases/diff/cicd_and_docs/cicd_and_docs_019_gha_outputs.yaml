max_enrichment: 5.2
initial:
  .github/workflows/ci.yml: |
    name: CI
    on: [push]
    jobs:
      version:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: echo "1.0.0"
      deploy:
        needs: version
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: ./deploy.sh
  scripts/version.sh: |
    #!/bin/bash
    VERSION=$(git describe --tags --always)
    echo "Current version: $VERSION"
  src/version.ts: |
    export function getVersion(): string {
      return process.env.APP_VERSION || '0.0.0-dev';
    }

    export function getBuildInfo(): { version: string; commit: string } {
      return {
        version: getVersion(),
        commit: process.env.GIT_COMMIT || 'unknown'
      };
    }
  garbage_semver.ts: |
    const GARBAGE_CICD_DOCS_019_SEMVER_MARKER_A = "major";
    const GARBAGE_CICD_DOCS_019_PRERELEASE_MARKER_B = "beta";

    class GarbageSemverParser {
      static GARBAGE_CICD_DOCS_019_STRICT_MARKER_C = true;
      parse(): string { return ""; }
    }
  garbage_changelog.ts: |
    const GARBAGE_CICD_DOCS_019_CHANGELOG_MARKER_D = "conventional";
    const GARBAGE_CICD_DOCS_019_FORMAT_MARKER_E = "markdown";

    class GarbageChangelogGenerator {
      static GARBAGE_CICD_DOCS_019_UNRELEASED_MARKER_F = true;
      generate(): string { return ""; }
    }
changed:
  .github/workflows/ci.yml: |
    name: CI
    on: [push]
    jobs:
      version:
        runs-on: ubuntu-latest
        outputs:
          version: ${{ steps.version.outputs.value }}
        steps:
          - uses: actions/checkout@v4
          - id: version
            run: echo "value=1.0.0" >> $GITHUB_OUTPUT
      deploy:
        needs: version
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: ./deploy.sh --version ${{ needs.version.outputs.version }}
  scripts/version.sh: |
    #!/bin/bash
    VERSION=$(git describe --tags --always)
    echo "Current version: $VERSION"
  src/version.ts: |
    export function getVersion(): string {
      return process.env.APP_VERSION || '0.0.0-dev';
    }

    export function getBuildInfo(): { version: string; commit: string } {
      return {
        version: getVersion(),
        commit: process.env.GIT_COMMIT || 'unknown'
      };
    }
  garbage_semver.ts: |
    const GARBAGE_CICD_DOCS_019_SEMVER_MARKER_A = "major";
    const GARBAGE_CICD_DOCS_019_PRERELEASE_MARKER_B = "beta";

    class GarbageSemverParser {
      static GARBAGE_CICD_DOCS_019_STRICT_MARKER_C = true;
      parse(): string { return ""; }
    }
  garbage_changelog.ts: |
    const GARBAGE_CICD_DOCS_019_CHANGELOG_MARKER_D = "conventional";
    const GARBAGE_CICD_DOCS_019_FORMAT_MARKER_E = "markdown";

    class GarbageChangelogGenerator {
      static GARBAGE_CICD_DOCS_019_UNRELEASED_MARKER_F = true;
      generate(): string { return ""; }
    }
must_include_files:
- .github/workflows/ci.yml
must_include_content:
- 'version: ${{ steps.version.outputs.value }}'
must_not_include:
- GARBAGE_CICD_DOCS_019_CHANGELOG_MARKER_D
- GARBAGE_CICD_DOCS_019_FORMAT_MARKER_E
- GARBAGE_CICD_DOCS_019_PRERELEASE_MARKER_B
- GARBAGE_CICD_DOCS_019_SEMVER_MARKER_A
- GARBAGE_CICD_DOCS_019_STRICT_MARKER_C
- GARBAGE_CICD_DOCS_019_UNRELEASED_MARKER_F
- garbage_changelog.ts
- garbage_semver.ts
add_garbage_files: false
skip_garbage_check: true
