      const GARBAGE_CICD_DOCS_042_LINKER_MARKER_D = "symbol";
      const GARBAGE_CICD_DOCS_042_RESOLVE_MARKER_E = "lazy";

      class GarbageTsdocLinker {
        static GARBAGE_CICD_DOCS_042_VALIDATE_MARKER_F = true;
        link(): void {}
      }
