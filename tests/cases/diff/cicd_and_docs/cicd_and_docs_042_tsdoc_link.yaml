    src/utils/formatter.ts: |
      export class Formatter {
        format(value: string): string {
          return value.trim();
        }
      }

      export class JsonFormatter extends Formatter {
        format(value: string): string {
          return JSON.stringify(JSON.parse(value), null, 2);
        }
      }
    src/services/data.ts: |
