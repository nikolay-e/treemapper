max_enrichment: 16.4
initial:
  cleanup.sh: |
    #!/bin/bash
    set -e
    echo "Cleaning up test artifacts..."
    rm -rf /tmp/test-*
    rm -rf ./coverage
    rm -rf ./node_modules/.cache
  .gitlab-ci.yml: |
    test:
      script:
        - npm ci
        - npm test
  package.json: |
    {
      "name": "gitlab-cleanup-app",
      "version": "1.0.0",
      "scripts": {
        "test": "jest --coverage"
      }
    }
  garbage_cleanup.ts: |
    const GARBAGE_CICD_DOCS_024_CLEANUP_MARKER_A = "temp";
    const GARBAGE_CICD_DOCS_024_PATTERN_MARKER_B = "*.tmp";

    class GarbageCleanupService {
      static GARBAGE_CICD_DOCS_024_RECURSIVE_MARKER_C = true;
      clean(): void {}
    }
  garbage_finalizer.ts: |
    const GARBAGE_CICD_DOCS_024_FINALIZER_MARKER_D = "always";
    const GARBAGE_CICD_DOCS_024_IGNORE_MARKER_E = false;

    class GarbageFinalizerHandler {
      static GARBAGE_CICD_DOCS_024_ASYNC_MARKER_F = true;
      finalize(): void {}
    }
changed:
  cleanup.sh: |
    #!/bin/bash
    set -e
    echo "Cleaning up test artifacts..."
    rm -rf /tmp/test-*
    rm -rf ./coverage
    rm -rf ./node_modules/.cache
  .gitlab-ci.yml: |
    test:
      script:
        - npm ci
        - npm test
      after_script:
        - ./cleanup.sh
  package.json: |
    {
      "name": "gitlab-cleanup-app",
      "version": "1.0.0",
      "scripts": {
        "test": "jest --coverage"
      }
    }
  garbage_cleanup.ts: |
    const GARBAGE_CICD_DOCS_024_CLEANUP_MARKER_A = "temp";
    const GARBAGE_CICD_DOCS_024_PATTERN_MARKER_B = "*.tmp";

    class GarbageCleanupService {
      static GARBAGE_CICD_DOCS_024_RECURSIVE_MARKER_C = true;
      clean(): void {}
    }
  garbage_finalizer.ts: |
    const GARBAGE_CICD_DOCS_024_FINALIZER_MARKER_D = "always";
    const GARBAGE_CICD_DOCS_024_IGNORE_MARKER_E = false;

    class GarbageFinalizerHandler {
      static GARBAGE_CICD_DOCS_024_ASYNC_MARKER_F = true;
      finalize(): void {}
    }
must_include_files:
- .gitlab-ci.yml
must_include_content:
- 'after_script:'
must_not_include:
- GARBAGE_CICD_DOCS_024_ASYNC_MARKER_F
- GARBAGE_CICD_DOCS_024_CLEANUP_MARKER_A
- GARBAGE_CICD_DOCS_024_FINALIZER_MARKER_D
- GARBAGE_CICD_DOCS_024_IGNORE_MARKER_E
- GARBAGE_CICD_DOCS_024_PATTERN_MARKER_B
- GARBAGE_CICD_DOCS_024_RECURSIVE_MARKER_C
- garbage_cleanup.ts
- garbage_finalizer.ts
add_garbage_files: false
skip_garbage_check: true
