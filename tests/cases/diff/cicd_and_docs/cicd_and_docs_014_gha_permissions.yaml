initial:
  .github/workflows/release.yml: |
    name: Release
    on:
      push:
        tags: ['v*']
    jobs:
      release:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - run: npm run build
          - run: echo "release"
  package.json: |
    {
      "name": "release-automation",
      "version": "1.0.0",
      "scripts": {
        "build": "tsc",
        "release": "./scripts/release.sh"
      }
    }
  scripts/release.sh: |
    #!/bin/bash
    set -e
    echo "Creating release..."
    npm pack
  garbage_rbac.ts: |
    const GARBAGE_CICD_DOCS_014_RBAC_MARKER_A = "admin";
    const GARBAGE_CICD_DOCS_014_SCOPE_MARKER_B = "repo:write";

    class GarbageRBACService {
      static GARBAGE_CICD_DOCS_014_INHERIT_MARKER_C = true;
      checkPermission(): boolean { return false; }
    }
  garbage_access.ts: |
    const GARBAGE_CICD_DOCS_014_ACCESS_MARKER_D = "token";
    const GARBAGE_CICD_DOCS_014_EXPIRY_MARKER_E = 3600;

    class GarbageAccessControl {
      static GARBAGE_CICD_DOCS_014_AUDIT_MARKER_F = true;
      grant(): void {}
    }
changed:
  .github/workflows/release.yml: |
    name: Release
    on:
      push:
        tags: ['v*']
    jobs:
      release:
        runs-on: ubuntu-latest
        permissions:
          contents: write
          packages: write
        steps:
          - uses: actions/checkout@v4
          - run: npm run build
          - name: Create Release
            uses: softprops/action-gh-release@v1
  package.json: |
    {
      "name": "release-automation",
      "version": "1.0.0",
      "scripts": {
        "build": "tsc",
        "release": "./scripts/release.sh"
      }
    }
  scripts/release.sh: |
    #!/bin/bash
    set -e
    echo "Creating release..."
    npm pack
  garbage_rbac.ts: |
    const GARBAGE_CICD_DOCS_014_RBAC_MARKER_A = "admin";
    const GARBAGE_CICD_DOCS_014_SCOPE_MARKER_B = "repo:write";

    class GarbageRBACService {
      static GARBAGE_CICD_DOCS_014_INHERIT_MARKER_C = true;
      checkPermission(): boolean { return false; }
    }
  garbage_access.ts: |
    const GARBAGE_CICD_DOCS_014_ACCESS_MARKER_D = "token";
    const GARBAGE_CICD_DOCS_014_EXPIRY_MARKER_E = 3600;

    class GarbageAccessControl {
      static GARBAGE_CICD_DOCS_014_AUDIT_MARKER_F = true;
      grant(): void {}
    }
must_include_files:
- .github/workflows/release.yml
must_include_content:
- 'contents: write'
must_not_include:
- GARBAGE_CICD_DOCS_014_ACCESS_MARKER_D
- GARBAGE_CICD_DOCS_014_AUDIT_MARKER_F
- GARBAGE_CICD_DOCS_014_EXPIRY_MARKER_E
- GARBAGE_CICD_DOCS_014_INHERIT_MARKER_C
- GARBAGE_CICD_DOCS_014_RBAC_MARKER_A
- GARBAGE_CICD_DOCS_014_SCOPE_MARKER_B
- garbage_access.ts
- garbage_rbac.ts
add_garbage_files: false
skip_garbage_check: true
