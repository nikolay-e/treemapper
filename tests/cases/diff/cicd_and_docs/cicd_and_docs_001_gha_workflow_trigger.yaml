# === Assertions ===

must_include_files:
- .github/workflows/ci.yml

must_include_content_from:
  .github/workflows/ci.yml:
    # All three changed blocks
    - 'branches: [main, develop]'
    - 'pull_request:'
    - 'branches: [main]'
    # Enough context for reviewer
    - 'name: CI'

must_not_include:
# Plain garbage
- GARBAGE_CICD_DOCS_001_SCHEDULE_MARKER_A
- GARBAGE_CICD_DOCS_001_INTERVAL_MARKER_B
- GARBAGE_CICD_DOCS_001_QUEUE_MARKER_C
- GARBAGE_CICD_DOCS_001_WEBHOOK_MARKER_D
- GARBAGE_CICD_DOCS_001_SECRET_MARKER_E
- GARBAGE_CICD_DOCS_001_VERIFY_MARKER_F
# Tricky: sibling workflow with identical branch filters
- GARBAGE_CICD_DOCS_001_RELEASE_MARKER_G
- GARBAGE_CICD_DOCS_001_PUBLISH_MARKER_H
# Tricky: branch config mentioning same branch names
- GARBAGE_CICD_DOCS_001_PROTECTION_MARKER_I
- GARBAGE_CICD_DOCS_001_REVIEW_MARKER_J

must_not_include_files:
- .github/workflows/release.yml
- .github/branch-protection.json
- garbage_scheduler.ts
- garbage_webhook.ts
- src/index.ts
- src/app.ts

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
