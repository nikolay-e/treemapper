initial:
  .gitlab-ci.yml: |
    stages:
      - test

    e2e:
      stage: test
      script:
        - npm ci
        - npm run test:e2e
  tests/browser.test.ts: |
    import { test, expect } from '@playwright/test';

    const browser = process.env.BROWSER || 'chromium';

    test(`renders correctly in ${browser}`, async ({ page }) => {
      await page.goto('/');
      await expect(page.locator('h1')).toBeVisible();
    });
  package.json: |
    {
      "name": "gitlab-parallel-app",
      "version": "1.0.0",
      "scripts": {
        "test:e2e": "playwright test"
      },
      "devDependencies": {
        "@playwright/test": "^1.40.0"
      }
    }
  playwright.config.ts: |
    import { defineConfig } from '@playwright/test';

    export default defineConfig({
      testDir: './tests',
      use: {
        baseURL: 'http://localhost:3000'
      }
    });
  garbage_parallel_executor.ts: |
    const GARBAGE_CICD_DOCS_038_EXECUTOR_MARKER_A = "worker";
    const GARBAGE_CICD_DOCS_038_POOL_MARKER_B = 4;

    class GarbageParallelExecutor {
      static GARBAGE_CICD_DOCS_038_BATCH_MARKER_C = 10;
      execute(): void {}
    }
  garbage_parallel_coordinator.ts: |
    const GARBAGE_CICD_DOCS_038_COORDINATOR_MARKER_D = "central";
    const GARBAGE_CICD_DOCS_038_SYNC_MARKER_E = "barrier";

    class GarbageParallelCoordinator {
      static GARBAGE_CICD_DOCS_038_TIMEOUT_MARKER_F = 60000;
      coordinate(): void {}
    }
changed:
  .gitlab-ci.yml: |
    stages:
      - test

    e2e:
      stage: test
      parallel:
        matrix:
          - BROWSER: [chrome, firefox, safari]
      script:
        - npm ci
        - npm run test:e2e -- --browser=$BROWSER
  tests/browser.test.ts: |
    import { test, expect } from '@playwright/test';

    const browser = process.env.BROWSER || 'chromium';

    test(`renders correctly in ${browser}`, async ({ page }) => {
      await page.goto('/');
      await expect(page.locator('h1')).toBeVisible();
    });
  package.json: |
    {
      "name": "gitlab-parallel-app",
      "version": "1.0.0",
      "scripts": {
        "test:e2e": "playwright test"
      },
      "devDependencies": {
        "@playwright/test": "^1.40.0"
      }
    }
  playwright.config.ts: |
    import { defineConfig } from '@playwright/test';

    export default defineConfig({
      testDir: './tests',
      use: {
        baseURL: 'http://localhost:3000'
      }
    });
  garbage_parallel_executor.ts: |
    const GARBAGE_CICD_DOCS_038_EXECUTOR_MARKER_A = "worker";
    const GARBAGE_CICD_DOCS_038_POOL_MARKER_B = 4;

    class GarbageParallelExecutor {
      static GARBAGE_CICD_DOCS_038_BATCH_MARKER_C = 10;
      execute(): void {}
    }
  garbage_parallel_coordinator.ts: |
    const GARBAGE_CICD_DOCS_038_COORDINATOR_MARKER_D = "central";
    const GARBAGE_CICD_DOCS_038_SYNC_MARKER_E = "barrier";

    class GarbageParallelCoordinator {
      static GARBAGE_CICD_DOCS_038_TIMEOUT_MARKER_F = 60000;
      coordinate(): void {}
    }
must_include_files:
- .gitlab-ci.yml
must_include_content:
- '- BROWSER: [chrome, firefox, safari]'
must_not_include:
- GARBAGE_CICD_DOCS_038_BATCH_MARKER_C
- GARBAGE_CICD_DOCS_038_COORDINATOR_MARKER_D
- GARBAGE_CICD_DOCS_038_EXECUTOR_MARKER_A
- GARBAGE_CICD_DOCS_038_POOL_MARKER_B
- GARBAGE_CICD_DOCS_038_SYNC_MARKER_E
- GARBAGE_CICD_DOCS_038_TIMEOUT_MARKER_F
- garbage_parallel_coordinator.ts
- garbage_parallel_executor.ts
add_garbage_files: false
skip_garbage_check: true
