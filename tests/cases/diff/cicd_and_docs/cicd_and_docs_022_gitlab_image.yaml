max_enrichment: 9.2
initial:
  .gitlab-ci.yml: |
    build:
      script:
        - npm run build
  package.json: |
    {
      "name": "gitlab-docker-app",
      "version": "1.0.0",
      "scripts": {
        "build": "tsc",
        "test": "jest"
      },
      "engines": {
        "node": ">=18"
      }
    }
  Dockerfile: |
    FROM node:18-alpine
    WORKDIR /app
    COPY package*.json ./
    RUN npm ci
    COPY . .
    RUN npm run build
    CMD ["node", "dist/index.js"]
  garbage_registry.ts: |
    const GARBAGE_CICD_DOCS_022_REGISTRY_MARKER_A = "docker.io";
    const GARBAGE_CICD_DOCS_022_TAG_MARKER_B = "latest";

    class GarbageRegistryClient {
      static GARBAGE_CICD_DOCS_022_AUTH_MARKER_C = true;
      pull(): void {}
    }
  garbage_image.ts: |
    const GARBAGE_CICD_DOCS_022_IMAGE_MARKER_D = "alpine";
    const GARBAGE_CICD_DOCS_022_SIZE_MARKER_E = "100MB";

    class GarbageImageBuilder {
      static GARBAGE_CICD_DOCS_022_CACHE_MARKER_F = true;
      build(): void {}
    }
changed:
  .gitlab-ci.yml: |
    image: node:18-alpine

    build:
      script:
        - npm ci
        - npm run build
  package.json: |
    {
      "name": "gitlab-docker-app",
      "version": "1.0.0",
      "scripts": {
        "build": "tsc",
        "test": "jest"
      },
      "engines": {
        "node": ">=18"
      }
    }
  Dockerfile: |
    FROM node:18-alpine
    WORKDIR /app
    COPY package*.json ./
    RUN npm ci
    COPY . .
    RUN npm run build
    CMD ["node", "dist/index.js"]
  garbage_registry.ts: |
    const GARBAGE_CICD_DOCS_022_REGISTRY_MARKER_A = "docker.io";
    const GARBAGE_CICD_DOCS_022_TAG_MARKER_B = "latest";

    class GarbageRegistryClient {
      static GARBAGE_CICD_DOCS_022_AUTH_MARKER_C = true;
      pull(): void {}
    }
  garbage_image.ts: |
    const GARBAGE_CICD_DOCS_022_IMAGE_MARKER_D = "alpine";
    const GARBAGE_CICD_DOCS_022_SIZE_MARKER_E = "100MB";

    class GarbageImageBuilder {
      static GARBAGE_CICD_DOCS_022_CACHE_MARKER_F = true;
      build(): void {}
    }
must_include_files:
- .gitlab-ci.yml
must_include_content:
- 'image: node:18-alpine'
must_not_include:
- GARBAGE_CICD_DOCS_022_AUTH_MARKER_C
- GARBAGE_CICD_DOCS_022_CACHE_MARKER_F
- GARBAGE_CICD_DOCS_022_IMAGE_MARKER_D
- GARBAGE_CICD_DOCS_022_REGISTRY_MARKER_A
- GARBAGE_CICD_DOCS_022_SIZE_MARKER_E
- GARBAGE_CICD_DOCS_022_TAG_MARKER_B
- garbage_image.ts
- garbage_registry.ts
add_garbage_files: false
skip_garbage_check: true
