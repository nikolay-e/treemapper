initial:
  .gitlab-ci.yml: |
    deploy:
      script:
        - npm ci
        - ./deploy.sh
  deploy.sh: |
    #!/bin/bash
    set -e
    echo "Deploying to production..."
    aws ecs update-service --cluster main --service app
  package.json: |
    {
      "name": "gitlab-rules-app",
      "version": "1.0.0",
      "scripts": {
        "deploy": "./deploy.sh"
      }
    }
  garbage_condition.ts: |
    const GARBAGE_CICD_DOCS_026_CONDITION_MARKER_A = "branch";
    const GARBAGE_CICD_DOCS_026_PATTERN_MARKER_B = "main";

    class GarbageConditionEvaluator {
      static GARBAGE_CICD_DOCS_026_STRICT_MARKER_C = true;
      evaluate(): boolean { return false; }
    }
  garbage_trigger.ts: |
    const GARBAGE_CICD_DOCS_026_TRIGGER_MARKER_D = "manual";
    const GARBAGE_CICD_DOCS_026_WHEN_MARKER_E = "on_success";

    class GarbageTriggerHandler {
      static GARBAGE_CICD_DOCS_026_ALLOW_MARKER_F = true;
      trigger(): void {}
    }
changed:
  .gitlab-ci.yml: |
    deploy:
      script:
        - npm ci
        - ./deploy.sh
      rules:
        - if: $CI_COMMIT_BRANCH == "main"
        - if: $CI_COMMIT_TAG
          when: always
        - when: never
  deploy.sh: |
    #!/bin/bash
    set -e
    echo "Deploying to production..."
    aws ecs update-service --cluster main --service app
  package.json: |
    {
      "name": "gitlab-rules-app",
      "version": "1.0.0",
      "scripts": {
        "deploy": "./deploy.sh"
      }
    }
  garbage_condition.ts: |
    const GARBAGE_CICD_DOCS_026_CONDITION_MARKER_A = "branch";
    const GARBAGE_CICD_DOCS_026_PATTERN_MARKER_B = "main";

    class GarbageConditionEvaluator {
      static GARBAGE_CICD_DOCS_026_STRICT_MARKER_C = true;
      evaluate(): boolean { return false; }
    }
  garbage_trigger.ts: |
    const GARBAGE_CICD_DOCS_026_TRIGGER_MARKER_D = "manual";
    const GARBAGE_CICD_DOCS_026_WHEN_MARKER_E = "on_success";

    class GarbageTriggerHandler {
      static GARBAGE_CICD_DOCS_026_ALLOW_MARKER_F = true;
      trigger(): void {}
    }
must_include_files:
- .gitlab-ci.yml
must_include_content:
- '- if: $CI_COMMIT_BRANCH == "main"'
must_not_include:
- GARBAGE_CICD_DOCS_026_ALLOW_MARKER_F
- GARBAGE_CICD_DOCS_026_CONDITION_MARKER_A
- GARBAGE_CICD_DOCS_026_PATTERN_MARKER_B
- GARBAGE_CICD_DOCS_026_STRICT_MARKER_C
- GARBAGE_CICD_DOCS_026_TRIGGER_MARKER_D
- GARBAGE_CICD_DOCS_026_WHEN_MARKER_E
- garbage_condition.ts
- garbage_trigger.ts
add_garbage_files: false
skip_garbage_check: true
