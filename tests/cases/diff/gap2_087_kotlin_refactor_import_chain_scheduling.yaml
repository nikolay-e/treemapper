  changed_files:
    src/auth/token.rs: |
      use crate::auth::claims::Claims;

      pub fn generate_token(claims: &Claims, secret: &str) -> String {
          let payload = serde_json::to_string(claims).unwrap();
          let encoded = base64::encode(&payload);
          format!("{}.{}", encoded, secret)
      }

      pub fn validate_token(token: &str, secret: &str) -> bool {
          let parts: Vec<&str> = token.splitn(2, '.').collect();
          if parts.len() != 2 || parts[1] != secret {
              return false;
          }
          let decoded = base64::decode(parts[0]).unwrap_or_default();
          !decoded.is_empty()
      }
    src/auth/claims.rs: |
      use serde::{Deserialize, Serialize};

