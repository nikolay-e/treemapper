  changed_files:
    src/main/kotlin/scheduler/JobScheduler.kt: |
      package scheduler

      import scheduler.executor.JobExecutor
      import scheduler.model.ScheduledJob
      import scheduler.model.JobPriority

      class JobScheduler(private val executor: JobExecutor) {
          private val jobs = mutableListOf<ScheduledJob>()

          fun schedule(name: String, cronExpr: String, priority: JobPriority, action: () -> Unit) {
              val job = ScheduledJob(name, cronExpr, priority)
              jobs.add(job)
              executor.register(job, action)
          }

          fun cancel(name: String) {
              jobs.removeAll { it.name == name }
              executor.unregister(name)
          }

          fun pendingByPriority(): Map<JobPriority, List<ScheduledJob>> {
              return jobs.groupBy { it.priority }
          }
      }
    src/main/kotlin/scheduler/executor/JobExecutor.kt: |
      package scheduler.executor

      import scheduler.model.ScheduledJob

      class JobExecutor {
          private val registry = mutableMapOf<String, Pair<ScheduledJob, () -> Unit>>()

          fun register(job: ScheduledJob, action: () -> Unit) {
              registry[job.name] = Pair(job, action)
          }

          fun unregister(name: String) {
              registry.remove(name)
          }

          fun runAll() {
              registry.entries
                  .sortedByDescending { it.value.first.priority.ordinal }
                  .forEach { (_, pair) -> pair.second() }
          }
      }
    src/main/kotlin/scheduler/model/JobDefinition.kt: |
      package scheduler.model

      enum class JobPriority { LOW, MEDIUM, HIGH, CRITICAL }

      data class ScheduledJob(
          val name: String,
          val cronExpression: String,
          val priority: JobPriority
      )
