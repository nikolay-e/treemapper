# Test 001: UserService rewritten from scratch — reviewer needs types and API client
#
# Scenario: src/services/userService.ts is rewritten from a placeholder
# (console.log) into a full service class that imports User, UserDTO,
# CreateUserInput, UpdateUserInput from types/user.ts and ApiClient from
# api/client.ts. It maps DTOs to domain objects.
#
# Reviewer questions:
#   Q1: "What are User vs UserDTO?" -> types/user.ts defines both.
#       UserDTO has firstName/lastName, User has fullName. The service
#       maps between them. Reviewer needs the type definitions to verify
#       mapDtoToUser is correct.
#   Q2: "What does ApiClient.get/post do?" -> api/client.ts defines
#       a generic HTTP client. UserService calls client.get<UserDTO>
#       and client.post<UserDTO, CreateUserInput>. Reviewer needs to
#       see the generic signatures to verify type parameters are correct.
#
# Not needed:
#   - analytics-sdk: third-party vendor code. Not imported by UserService.
#   - docs/architecture: prose documentation. Does not help verify code.
#   - notification-service.ts: another service in the same directory.
#     Shares the "service" pattern but does not interact with UserService,
#     User types, or ApiClient.
#   - auth-middleware.ts: HTTP middleware checking tokens. Same layer
#     (infrastructure) but not imported or used by UserService.

max_enrichment: 5.0
initial:
  src/types/user.ts: |
    export interface UserDTO {
      id: string;
      email: string;
      firstName: string;
      lastName: string;
      role: 'admin' | 'user' | 'guest';
    }

    export interface User {
      id: string;
      email: string;
      fullName: string;
      role: 'admin' | 'user' | 'guest';
    }

    export type CreateUserInput = Omit<UserDTO, 'id'>;
    export type UpdateUserInput = Partial<Omit<UserDTO, 'id'>>;
  src/api/client.ts: |
    export interface ApiResponse<T> {
      data: T;
      status: number;
      message?: string;
    }

    export class ApiClient {
      private baseUrl: string;
      private headers: Record<string, string>;

      constructor(baseUrl: string, authToken?: string) {
        this.baseUrl = baseUrl;
        this.headers = {
          'Content-Type': 'application/json',
          ...(authToken && { Authorization: `Bearer ${authToken}` }),
        };
      }

      async get<T>(endpoint: string): Promise<T> {
        const response = await fetch(`${this.baseUrl}${endpoint}`, {
          headers: this.headers,
        });
        return response.json();
      }

      async post<T, U>(endpoint: string, body: U): Promise<T> {
        const response = await fetch(`${this.baseUrl}${endpoint}`, {
          method: 'POST',
          headers: this.headers,
          body: JSON.stringify(body),
        });
        return response.json();
      }
    }
  src/services/userService.ts: |
    console.log('placeholder');
  src/services/notification-service.ts: |
    interface Notification {
      id: string;
      recipientId: string;
      subject: string;
      body: string;
      sentAt: Date | null;
    }

    export class NotificationService {
      private queue: Notification[] = [];

      async send(recipientId: string, subject: string, body: string): Promise<void> {
        const notification: Notification = {
          id: crypto.randomUUID(),
          recipientId,
          subject,
          body,
          sentAt: null,
        };
        this.queue.push(notification);
      }

      async flush(): Promise<number> {
        const pending = this.queue.filter(n => n.sentAt === null);
        for (const n of pending) {
          n.sentAt = new Date();
        }
        return pending.length;
      }

      getPendingCount(): number {
        return this.queue.filter(n => n.sentAt === null).length;
      }
    }
  src/middleware/auth-middleware.ts: |
    interface TokenPayload {
      sub: string;
      exp: number;
      iat: number;
      roles: string[];
    }

    export function authMiddleware(req: any, res: any, next: any): void {
      const header = req.headers['authorization'];
      if (!header?.startsWith('Bearer ')) {
        res.status(401).json({ error: 'Missing token' });
        return;
      }
      const token = header.slice(7);
      try {
        const payload = decodeToken(token);
        if (payload.exp < Date.now() / 1000) {
          res.status(401).json({ error: 'Token expired' });
          return;
        }
        req.user = payload;
        next();
      } catch {
        res.status(403).json({ error: 'Invalid token' });
      }
    }

    function decodeToken(token: string): TokenPayload {
      return { sub: 'user-1', exp: Date.now() / 1000 + 3600, iat: Date.now() / 1000, roles: ['user'] };
    }
