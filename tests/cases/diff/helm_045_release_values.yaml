name: helm_045_release_values
tags:
- lang:yaml
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    templates/configmap.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: app-config
    templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ .Release.Name }}-app
        namespace: {{ .Release.Namespace }}
        labels:
          app.kubernetes.io/managed-by: {{ .Release.Service }}
          helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: app
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    templates/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: {{ .Release.Name }}-svc
        namespace: {{ .Release.Namespace }}
        labels:
          app.kubernetes.io/managed-by: {{ .Release.Service }}
      spec:
        type: {{ .Values.service.type }}
        ports:
          - port: {{ .Values.service.port }}
    templates/_helpers.tpl: |
      {{- define "myapp.fullname" -}}
      {{- printf "%s-%s" .Release.Name .Chart.Name | trunc 63 | trimSuffix "-" -}}
      {{- end -}}

      {{- define "myapp.labels" -}}
      app.kubernetes.io/name: {{ .Chart.Name }}
      helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
      {{- end -}}
    templates/ingress.yaml: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: {{ .Release.Name }}-ingress
      spec:
        rules:
          - host: {{ .Values.ingress.host }}
    Chart.yaml: |
      apiVersion: v2
      name: myapp
      version: 1.2.0
      appVersion: "1.0.0"
    values.yaml: |
      replicaCount: 3
      image:
        repository: myapp
        tag: "1.0.0"
      service:
        type: ClusterIP
        port: 80
      ingress:
        host: myapp.example.com
    tests/test-connection.yaml: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: "{{ .Release.Name }}-test"
        annotations:
          "helm.sh/hook": test
      spec:
        containers:
          - name: wget
            image: busybox
            command: ['wget']
            args: ['{{ .Release.Name }}-svc:{{ .Values.service.port }}']
        restartPolicy: Never
  changed_files:
    templates/configmap.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: {{ .Release.Name }}-config
        namespace: {{ .Release.Namespace }}
        labels:
          app.kubernetes.io/managed-by: {{ .Release.Service }}
          helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ .Release.Name }}-app
        namespace: {{ .Release.Namespace }}
        labels:
          app.kubernetes.io/managed-by: {{ .Release.Service }}
          helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: app
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    templates/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: {{ .Release.Name }}-svc
        namespace: {{ .Release.Namespace }}
        labels:
          app.kubernetes.io/managed-by: {{ .Release.Service }}
      spec:
        type: {{ .Values.service.type }}
        ports:
          - port: {{ .Values.service.port }}
    templates/_helpers.tpl: |
      {{- define "myapp.fullname" -}}
      {{- printf "%s-%s" .Release.Name .Chart.Name | trunc 63 | trimSuffix "-" -}}
      {{- end -}}

      {{- define "myapp.labels" -}}
      app.kubernetes.io/name: {{ .Chart.Name }}
      helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
      {{- end -}}
    templates/ingress.yaml: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: {{ .Release.Name }}-ingress
      spec:
        rules:
          - host: {{ .Values.ingress.host }}
    Chart.yaml: |
      apiVersion: v2
      name: myapp
      version: 1.2.0
      appVersion: "1.0.0"
    values.yaml: |
      replicaCount: 3
      image:
        repository: myapp
        tag: "1.0.0"
      service:
        type: ClusterIP
        port: 80
      ingress:
        host: myapp.example.com
    tests/test-connection.yaml: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: "{{ .Release.Name }}-test"
        annotations:
          "helm.sh/hook": test
      spec:
        containers:
          - name: wget
            image: busybox
            command: ['wget']
            args: ['{{ .Release.Name }}-svc:{{ .Values.service.port }}']
        restartPolicy: Never
  commit_message: Update files
