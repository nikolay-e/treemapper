    Sources/Vehicle/DiagnosticRunner.swift: |
      import Foundation

      struct DiagnosticReport {
          let vehicleId: String
          let faults: [String]
          let passed: Bool
      }

      class DiagnosticRunner {
          private let sensorHub: SensorHub

          init(sensorHub: SensorHub) {
              self.sensorHub = sensorHub
