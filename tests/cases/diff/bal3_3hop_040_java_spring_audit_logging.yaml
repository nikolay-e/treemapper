repo:
  initial_files:
    src/main/java/com/app/audit/AuditRecord.java: |
      package com.app.audit;

      public class AuditRecord {
          private String action;
          private String userId;
          public AuditRecord(String action, String userId) {
              this.action = action;
              this.userId = userId;
          }
          public String getAction() { return action; }
          public String getUserId() { return userId; }
      }
    src/main/java/com/app/audit/AuditWriter.java: |
      package com.app.audit;

      import java.util.ArrayList;
      import java.util.List;

      public class AuditWriter {
          private final List<AuditRecord> log = new ArrayList<>();
          public void write(AuditRecord record) {
              log.add(record);
          }
          public List<AuditRecord> getLog() {
              return new ArrayList<>(log);
          }
      }
    src/main/java/com/app/service/AuditService.java: |
      package com.app.service;

      import com.app.audit.AuditWriter;
      import com.app.audit.AuditRecord;

      public class AuditService {
          private final AuditWriter writer;
          public AuditService(AuditWriter writer) {
              this.writer = writer;
          }
          public void log(String action, String userId) {
              writer.write(new AuditRecord(action, userId));
          }
      }
    src/main/java/com/app/web/AuditController.java: |
      package com.app.web;

      import com.app.service.AuditService;

      public class AuditController {
          private final AuditService auditService;
          public AuditController(AuditService auditService) {
              this.auditService = auditService;
          }
          public String record(String action, String userId) {
              auditService.log(action, userId);
              return "recorded";
          }
      }
    src/main/java/com/app/util/FileWriter.java: |
      package com.app.util;

      public class FileWriter {
          public static String GARBAGE_040_FILE_MARKER_A = "file";
          public static String GARBAGE_040_PATH_MARKER_B = "/tmp";
