repo:
  initial_files:
    src/main/scala/actors/OrderActor.scala: |
      package actors

      import akka.actor.Actor

      case class PlaceOrder(itemId: String, quantity: Int)
      case class OrderResult(success: Boolean)

      class OrderActor extends Actor {
        def receive: Receive = {
          case PlaceOrder(itemId, qty) =>
            sender() ! OrderResult(qty > 0)
        }
      }
    src/main/scala/services/OrderService.scala: |
      package services

      import actors.{PlaceOrder, OrderResult, OrderActor}
      import akka.actor.{ActorSystem, Props}
      import akka.pattern.ask
      import akka.util.Timeout
      import scala.concurrent.duration._
      import scala.concurrent.Future

      class OrderService(system: ActorSystem) {
        implicit val timeout: Timeout = Timeout(5.seconds)
        private val orderActor = system.actorOf(Props[OrderActor])

        def placeOrder(itemId: String, quantity: Int): Future[OrderResult] = {
          (orderActor ? PlaceOrder(itemId, quantity)).mapTo[OrderResult]
        }
      }
    src/main/scala/api/OrderController.scala: |
      package api

      import services.OrderService
      import akka.http.scaladsl.server.Directives._

      class OrderController(orderService: OrderService) {
        val route = path("order") {
          post {
            complete("order placed")
          }
        }
      }
    src/main/scala/db/InventoryRepo.scala: |
      package db

      GARBAGE_031_INVENTORY_REPO_A = "repo"

      class InventoryRepo {
        def findItem(id: String): Option[String] = Some(id)
        def updateStock(id: String, delta: Int): Unit = ()
      }
    src/main/scala/util/JsonCodec.scala: |
      package util

      GARBAGE_031_JSON_CODEC_B = "codec"

      object JsonCodec {
        def encode(value: Any): String = value.toString
        def decode(raw: String): Map[String, Any] = Map.empty
      }
    src/main/scala/util/Logging.scala: |
      package util

      GARBAGE_031_LOGGING_C = "log"

      trait Logging {
        def log(msg: String): Unit = println(msg)
      }
    src/main/scala/metrics/Counter.scala: |
      package metrics

      GARBAGE_031_COUNTER_D = "counter"

      class Counter(name: String) {
        private var count: Long = 0
        def increment(): Unit = count += 1
        def value: Long = count
      }
  changed_files:
    src/main/scala/actors/OrderActor.scala: |
      package actors

      import akka.actor.Actor

      case class PlaceOrder(itemId: String, quantity: Int, priority: Boolean)
      case class OrderResult(success: Boolean, orderId: String)

      class OrderActor extends Actor {
        private var nextId: Int = 0

        def receive: Receive = {
          case PlaceOrder(itemId, qty, priority) =>
            nextId += 1
            val id = s"ORD-$nextId"
            sender() ! OrderResult(qty > 0, id)
        }
      }
  commit_message: "feat: add priority flag and orderId to order messages"
