    src/auth/session.rs: |
      use crate::crypto::token::TokenService;
      use crate::auth::revocation::RevocationList;

      pub struct SessionManager {
          token_service: TokenService,
          max_age_secs: u64,
          revocation: RevocationList,
      }

      impl SessionManager {
          pub fn new(token_service: TokenService, max_age_secs: u64, revocation: RevocationList) -> Self {
              SessionManager { token_service, max_age_secs, revocation }
          }

          pub fn create_session(&self, user_id: &str) -> String {
              self.token_service.sign(user_id, self.max_age_secs)
          }

          pub fn validate_session(&self, token: &str) -> Option<String> {
              if self.revocation.is_revoked(token) {
                  return None;
              }
              self.token_service.verify(token)
          }

          pub fn revoke_session(&mut self, token: &str) {
              self.revocation.revoke(token);
          }
      }
