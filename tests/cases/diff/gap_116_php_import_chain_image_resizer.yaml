    src/crypto/token.rs: |
      use hmac::{Hmac, Mac};
      use sha2::Sha256;

      pub struct TokenService {
          secret: Vec<u8>,
      }

      impl TokenService {
          pub fn new(secret: Vec<u8>) -> Self {
              TokenService { secret }
          }

          pub fn sign(&self, subject: &str, max_age: u64) -> String {
              let payload = format!("{}:{}", subject, max_age);
              let mut mac = Hmac::<Sha256>::new_from_slice(&self.secret).unwrap();
              mac.update(payload.as_bytes());
              let result = mac.finalize();
              let sig = hex::encode(result.into_bytes());
              format!("{}.{}", payload, sig)
          }

          pub fn verify(&self, token: &str) -> Option<String> {
              let parts: Vec<&str> = token.rsplitn(2, '.').collect();
              if parts.len() != 2 { return None; }
              let (sig, payload) = (parts[0], parts[1]);
              let expected = self.sign_raw(payload);
              if sig == expected { Some(payload.split(':').next()?.to_string()) } else { None }
          }

          fn sign_raw(&self, payload: &str) -> String {
              let mut mac = Hmac::<Sha256>::new_from_slice(&self.secret).unwrap();
              mac.update(payload.as_bytes());
              hex::encode(mac.finalize().into_bytes())
          }
      }
    src/auth/revocation.rs: |
      use std::collections::HashSet;

      pub struct RevocationList {
          revoked: HashSet<String>,
      }

      impl RevocationList {
          pub fn new() -> Self {
              RevocationList { revoked: HashSet::new() }
          }

          pub fn revoke(&mut self, token: &str) {
              self.revoked.insert(token.to_string());
          }

          pub fn is_revoked(&self, token: &str) -> bool {
              self.revoked.contains(token)
          }
      }
