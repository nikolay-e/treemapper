    src/Media/ImageResizer.php: |
      <?php

      namespace App\Media;

      class ImageResizer
      {
          private int $maxWidth;
          private int $maxHeight;
          private int $quality;

          public function __construct(int $maxWidth, int $maxHeight, int $quality = 85)
          {
              $this->maxWidth = $maxWidth;
              $this->maxHeight = $maxHeight;
              $this->quality = $quality;
          }

          public function resize(int $width, int $height): array
          {
              $ratio = min($this->maxWidth / $width, $this->maxHeight / $height);
              if ($ratio >= 1.0) {
                  return ['width' => $width, 'height' => $height];
              }
              return [
                  'width' => (int)($width * $ratio),
                  'height' => (int)($height * $ratio),
              ];
          }

          public function crop(int $width, int $height, int $x, int $y): array
          {
              $cropWidth = min($width, $this->maxWidth);
              $cropHeight = min($height, $this->maxHeight);
              return [
                  'x' => $x,
                  'y' => $y,
                  'width' => $cropWidth,
                  'height' => $cropHeight,
                  'quality' => $this->quality,
              ];
          }
      }
