    src/search/index.py: |
      def build_index(documents: list[dict]) -> dict[str, list[int]]:
          index: dict[str, list[int]] = {}
          for doc_id, doc in enumerate(documents):
              for word in doc.get("text", "").split():
                  index.setdefault(word.lower(), []).append(doc_id)
          return index

      def search(index: dict[str, list[int]], query: str) -> list[int]:
          return index.get(query.lower(), [])

      def search_multi(index: dict[str, list[int]], queries: list[str]) -> list[int]:
          result: set[int] = set()
          for q in queries:
              result.update(index.get(q.lower(), []))
          return sorted(result)
    src/search/ranker.py: |
      from src.search.index import search, search_multi

      def rank_results(index: dict[str, list[int]], query: str, documents: list[dict]) -> list[dict]:
          doc_ids = search(index, query)
          return [documents[i] for i in doc_ids]

      def rank_multi(index: dict[str, list[int]], queries: list[str], documents: list[dict]) -> list[dict]:
          doc_ids = search_multi(index, queries)
          return [documents[i] for i in doc_ids]

      def top_n(index: dict[str, list[int]], query: str, documents: list[dict], n: int = 10) -> list[dict]:
          results = rank_results(index, query, documents)
          return results[:n]
    src/api/search_endpoint.py: |
      from src.search.ranker import top_n, rank_multi

