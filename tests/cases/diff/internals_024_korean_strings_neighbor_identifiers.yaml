      namespace net {

      struct SocketOptions {
          int timeout_ms;
          bool keep_alive;
          int recv_buffer_size;
      };

      class Socket {
      public:
          explicit Socket(const SocketOptions& opts);
          ~Socket();
          bool connect(const std::string& host, int port);
          int send(const char* data, int len);
          int recv(char* buf, int len);
