  changed_files:
    src/Parsing/CsvParser.cs: |
      using System;
      using System.Collections.Generic;
      using System.Linq;

      namespace App.Parsing
      {
          public class CsvParser
          {
              public char Delimiter { get; set; } = ',';

              public List<string[]> Parse(string content)
              {
                  var lines = content.Split('\n', StringSplitOptions.RemoveEmptyEntries);
                  return lines.Select(line => line.Split(Delimiter)).ToList();
              }

              public string[] GetHeaders(string content)
              {
                  var firstLine = content.Split('\n')[0];
                  return firstLine.Split(Delimiter);
              }

              public List<Dictionary<string, string>> ParseWithHeaders(string content)
              {
                  var rows = Parse(content);
                  if (rows.Count < 2) return new List<Dictionary<string, string>>();
                  var headers = rows[0];
                  return rows.Skip(1)
                      .Select(row => headers.Zip(row, (h, v) => new { h, v })
                          .ToDictionary(x => x.h, x => x.v))
                      .ToList();
              }
          }
      }
  commit_message: "feat: add configurable delimiter and header-based parsing"
