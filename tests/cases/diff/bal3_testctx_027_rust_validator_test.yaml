name: bal3_testctx_027_rust_validator_test
tags:
- lang:rust
- change:single_file
- change:bug_fix
- context:test_file
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    src/validator.rs: |
      pub fn is_valid_email(email: &str) -> bool {
          let parts: Vec<&str> = email.split('@').collect();
          parts.len() == 2 && !parts[0].is_empty() && parts[1].contains('.')
      }

      pub fn is_valid_username(name: &str) -> bool {
          !name.is_empty() && name.len() <= 32 && name.chars().all(|c| c.is_alphanumeric() || c == '_')
      }
    tests/validator_test.rs: |
      use mylib::validator::{is_valid_email, is_valid_username};

      #[test]
      fn test_valid_email() {
          assert!(is_valid_email("user@example.com"));
      }

      #[test]
      fn test_invalid_email_no_at() {
          assert!(!is_valid_email("userexample.com"));
      }

      #[test]
      fn test_invalid_email_no_dot() {
          assert!(!is_valid_email("user@localhost"));
      }

      #[test]
      fn test_valid_username() {
          assert!(is_valid_username("alice_42"));
      }

      #[test]
      fn test_invalid_username_empty() {
          assert!(!is_valid_username(""));
      }

      #[test]
      fn test_invalid_username_special() {
          assert!(!is_valid_username("user@name"));
      }
    src/hasher.rs: |
      use std::collections::hash_map::DefaultHasher;
      use std::hash::{Hash, Hasher};

      pub fn hash_string(s: &str) -> u64 {
          let mut hasher = DefaultHasher::new();
          s.hash(&mut hasher);
          hasher.finish()
      }
    src/sanitizer.rs: |
      pub fn strip_html(input: &str) -> String {
          let mut result = String::new();
          let mut inside_tag = false;
          for c in input.chars() {
              if c == '<' { inside_tag = true; }
              else if c == '>' { inside_tag = false; }
              else if !inside_tag { result.push(c); }
          }
          result
      }
  changed_files:
    src/validator.rs: |
      pub fn is_valid_email(email: &str) -> bool {
          let parts: Vec<&str> = email.split('@').collect();
          if parts.len() != 2 {
              return false;
          }
          let local = parts[0];
          let domain = parts[1];
          !local.is_empty()
              && local.len() <= 64
              && domain.contains('.')
              && !domain.starts_with('.')
              && !domain.ends_with('.')
      }

      pub fn is_valid_username(name: &str) -> bool {
          name.len() >= 3
              && name.len() <= 32
              && name.chars().all(|c| c.is_alphanumeric() || c == '_')
              && name.chars().next().map_or(false, |c| c.is_alphabetic())
      }

      pub fn is_valid_password(password: &str) -> bool {
          password.len() >= 8
              && password.chars().any(|c| c.is_uppercase())
              && password.chars().any(|c| c.is_lowercase())
              && password.chars().any(|c| c.is_ascii_digit())
      }
  commit_message: "fix: stricter email/username validation, add password validation"
