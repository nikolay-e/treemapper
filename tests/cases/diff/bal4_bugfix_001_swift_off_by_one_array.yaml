    Sources/Models/Playlist.swift: |
      struct Playlist {
          let name: String
          var tracks: [String]

          func trackAt(index: Int) -> String? {
              guard index >= 0 && index <= tracks.count else {
                  return nil
              }
              return tracks[index]
          }

          func isEmpty() -> Bool {
              return tracks.count == 0
          }
      }
