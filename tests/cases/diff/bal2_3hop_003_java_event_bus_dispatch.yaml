              this.payload = payload;
          }
          public String getType() { return type; }
          public String getPayload() { return payload; }
      }
    src/main/java/com/app/event/EventBus.java: |
      package com.app.event;

      import com.app.event.Event;
      import java.util.ArrayList;
      import java.util.List;

      public class EventBus {
          private final List<Event> events = new ArrayList<>();
          public void publish(Event event) {
              events.add(event);
          }
          public List<Event> getEvents() { return events; }
      }
    src/main/java/com/app/service/NotificationService.java: |
      package com.app.service;

      import com.app.event.EventBus;
      import com.app.event.Event;

      public class NotificationService {
          private final EventBus eventBus;
          public NotificationService(EventBus eventBus) {
              this.eventBus = eventBus;
          }
          public void notifyUser(String userId, String message) {
              eventBus.publish(new Event("notify", userId + ":" + message));
          }
      }
