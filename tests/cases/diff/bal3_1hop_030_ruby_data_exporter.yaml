    lib/export/csv_exporter.rb: |
      require_relative 'formatter'

      module Export
        class CsvExporter
          def initialize(formatter)
            @formatter = formatter
          end

          def export(columns, rows)
            lines = [@formatter.format_header(columns)]
            rows.each do |row|
              lines << @formatter.format_row(row)
            end
            lines.join("\n")
          end
        end
      end
    lib/export/tsv_exporter.rb: |
      require_relative 'formatter'

      module Export
        class TsvExporter
          def initialize
            @formatter = Formatter.new(delimiter: "\t")
          end

          def export(columns, rows)
            lines = [@formatter.format_header(columns)]
            rows.each { |row| lines << @formatter.format_row(row) }
            lines.join("\n")
          end
        end
      end
    lib/export/report_exporter.rb: |
      require_relative 'formatter'

      module Export
        class ReportExporter
          def initialize(formatter, title:)
            @formatter = formatter
            @title = title
          end

          def export(columns, rows)
            header = "# #{@title}\n"
            header + @formatter.format_header(columns) + "\n" +
              rows.map { |row| @formatter.format_row(row) }.join("\n")
          end
        end
      end
