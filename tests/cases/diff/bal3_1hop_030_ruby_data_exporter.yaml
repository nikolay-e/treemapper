  changed_files:
    lib/export/formatter.rb: |
      module Export
        class Formatter
          attr_reader :delimiter, :quote_char, :encoding

          def initialize(delimiter: ',', quote_char: '"', encoding: 'UTF-8')
            @delimiter = delimiter
            @quote_char = quote_char
            @encoding = encoding
          end

          def format_row(values)
            values.map { |v| quote(v) }.join(@delimiter)
          end

          def format_header(columns)
            columns.map { |c| quote(c.to_s.upcase) }.join(@delimiter)
          end

          def format_table(columns, rows)
            lines = [format_header(columns)]
            rows.each { |row| lines << format_row(row) }
            lines.join("\n").encode(@encoding)
          end

          private

          def quote(value)
            str = value.to_s
            if str.include?(@delimiter) || str.include?(@quote_char)
              "#{@quote_char}#{str.gsub(@quote_char, @quote_char * 2)}#{@quote_char}"
            else
              str
            end
          end
        end
      end
  commit_message: "feat: add quoting, encoding, format_table, and upcase headers"
