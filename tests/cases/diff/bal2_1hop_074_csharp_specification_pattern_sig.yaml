repo:
  initial_files:
    src/Specifications/ISpecification.cs: |
      using System;
      using System.Linq.Expressions;

      namespace App.Specifications
      {
          public interface ISpecification<T>
          {
              Expression<Func<T, bool>> ToExpression();
              bool IsSatisfiedBy(T entity);
          }
      }
    src/Specifications/ActiveUserSpec.cs: |
      using System;
      using System.Linq.Expressions;
      using App.Specifications;
      using App.Entities;

      namespace App.Specifications
      {
          public class ActiveUserSpec : ISpecification<User>
          {
              public Expression<Func<User, bool>> ToExpression()
              {
                  return u => u.IsActive;
              }

              public bool IsSatisfiedBy(User entity)
              {
                  return entity.IsActive;
              }
          }
      }
    src/Specifications/PremiumUserSpec.cs: |
      using System;
      using System.Linq.Expressions;
      using App.Specifications;
      using App.Entities;

      namespace App.Specifications
      {
          public class PremiumUserSpec : ISpecification<User>
          {
              public Expression<Func<User, bool>> ToExpression()
              {
                  return u => u.SubscriptionTier == "premium";
              }

              public bool IsSatisfiedBy(User entity)
              {
                  return entity.SubscriptionTier == "premium";
              }
          }
      }
    src/Entities/User.cs: |
      using System;

      namespace App.Entities
      {
          public class User
          {
              public int Id { get; set; }
              public string Name { get; set; }
              public bool IsActive { get; set; }
              public string SubscriptionTier { get; set; }
          }
      }
    src/Repositories/UserRepository.cs: |
      using System;
      using System.Collections.Generic;
      using System.Linq;
      using App.Specifications;
      using App.Entities;

      namespace App.Repositories
      {
          public class UserRepository
          {
              private readonly List<User> _users = new();

              public List<User> Find(ISpecification<User> spec)
              {
                  return _users.Where(u => spec.IsSatisfiedBy(u)).ToList();
              }
          }
      }
    src/Services/UserQueryService.cs: |
      using System;
      using System.Collections.Generic;
      using App.Repositories;
      using App.Specifications;
      using App.Entities;

      namespace App.Services
      {
          public class UserQueryService
          {
              private readonly UserRepository _repo;

              public UserQueryService(UserRepository repo)
              {
                  _repo = repo;
              }

              public List<User> GetActiveUsers()
              {
                  return _repo.Find(new ActiveUserSpec());
              }

              public List<User> GetPremiumUsers()
              {
                  return _repo.Find(new PremiumUserSpec());
              }
          }
      }
