    src/file-upload.ts: |
      const GARBAGE_CFGCODE_017_UPLOAD_C = "s3";
      const GARBAGE_CFGCODE_017_UPLOAD_D = "10mb";

      export function upload(buffer: Buffer): string {
        return "uploaded";
      }
    garbage_types.ts: |
      const GARBAGE_CFGCODE_017_TYPE_E = "interface";
      const GARBAGE_CFGCODE_017_TYPE_F = "generic";

      export type Nothing = never;
