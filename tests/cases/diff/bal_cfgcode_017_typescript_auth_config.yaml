name: bal_cfgcode_017_typescript_auth_config
tags:
- lang:typescript
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    config/auth.json: |
      {
        "jwtSecret": "dev-secret-key",
        "tokenExpiry": "1h",
        "refreshExpiry": "7d",
        "providers": {
          "google": {
            "clientId": "google-dev",
            "enabled": true
          }
        }
      }
    src/jwt.ts: |
      import { readFileSync } from 'fs';

      const authConfig = JSON.parse(readFileSync('config/auth.json', 'utf-8'));

      export const JWT_SECRET = authConfig.jwtSecret;
      export const TOKEN_EXPIRY = authConfig.tokenExpiry;
      export const REFRESH_EXPIRY = authConfig.refreshExpiry;

      export function createToken(payload: object): string {
        return `${JWT_SECRET}:${JSON.stringify(payload)}`;
      }
    src/oauth.ts: |
      import { readFileSync } from 'fs';

      const cfg = JSON.parse(readFileSync('config/auth.json', 'utf-8'));

      export function getProvider(name: string) {
        return cfg.providers[name];
      }

      export function listProviders(): string[] {
        return Object.keys(cfg.providers).filter(
          (p) => cfg.providers[p].enabled
        );
      }
    src/session-store.ts: |
      import { readFileSync } from 'fs';

      const authCfg = JSON.parse(readFileSync('config/auth.json', 'utf-8'));

      export const SESSION_DURATION = authCfg.refreshExpiry;

      export function isExpired(createdAt: number, now: number): boolean {
        return now - createdAt > 604800000;
      }
    src/email-service.ts: |
      const GARBAGE_CFGCODE_017_EMAIL_A = "smtp";
      const GARBAGE_CFGCODE_017_EMAIL_B = 587;

      export function sendEmail(to: string, subject: string): void {
