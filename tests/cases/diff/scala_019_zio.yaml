name: scala_019_zio
tags:
- lang:kotlin
- change:bug_fix
- context:import_chain
- distance:3hop+
- difficulty:easy
repo:
  initial_files:
    util/NumberParser.kt: |
      package util

      object NumberParser {
          // BUG: throws NumberFormatException on non-numeric input instead of returning null
          fun parseIntOrNull(raw: String): Int? {
              return raw.toInt()
          }

          fun parseDoubleOrNull(raw: String): Double? {
              return raw.toDouble()
          }
      }
    domain/PriceTag.kt: |
      package domain

      import util.NumberParser

      data class PriceTag(val rawAmount: String, val currency: String) {
          val amount: Int? get() = NumberParser.parseIntOrNull(rawAmount)
          val isValid: Boolean get() = amount != null && amount > 0
      }
    service/ProductCatalog.kt: |
      package service

      import domain.PriceTag

      class ProductCatalog {
          fun buildPriceTag(rawAmount: String, currency: String): PriceTag {
              return PriceTag(rawAmount, currency)
          }
      }
    api/CatalogController.kt: |
      package api

      import service.ProductCatalog

      class CatalogController(private val catalog: ProductCatalog) {
          fun priceEndpoint(rawAmount: String, currency: String): String {
              val tag = catalog.buildPriceTag(rawAmount, currency)
              return if (tag.isValid) "${tag.amount} ${tag.currency}" else "invalid"
          }
      }
    garbage/Formatter.kt: |
      // GARBAGE_KNUM_A = "formatter_marker"
      object Formatter { fun format(n: Int): String = n.toString() }
    garbage/Converter.kt: |
      // GARBAGE_KNUM_B = "converter_marker"
      object Converter { fun toCents(amount: Double): Long = (amount * 100).toLong() }
    garbage/Validator.kt: |
      // GARBAGE_KNUM_C = "validator_marker"
      object Validator { fun isPositive(n: Int) = n > 0 }
  changed_files:
    util/NumberParser.kt: |
      package util

      object NumberParser {
          fun parseIntOrNull(raw: String): Int? {
              return raw.trim().toIntOrNull()
          }

          fun parseDoubleOrNull(raw: String): Double? {
              return raw.trim().toDoubleOrNull()
          }
      }
    domain/PriceTag.kt: |
      package domain

      import util.NumberParser

      data class PriceTag(val rawAmount: String, val currency: String) {
          val amount: Int? get() = NumberParser.parseIntOrNull(rawAmount)
          val isValid: Boolean get() = amount != null && amount > 0
      }
    service/ProductCatalog.kt: |
      package service

      import domain.PriceTag

      class ProductCatalog {
          fun buildPriceTag(rawAmount: String, currency: String): PriceTag {
              return PriceTag(rawAmount, currency)
          }
      }
    api/CatalogController.kt: |
      package api

      import service.ProductCatalog

      class CatalogController(private val catalog: ProductCatalog) {
          fun priceEndpoint(rawAmount: String, currency: String): String {
              val tag = catalog.buildPriceTag(rawAmount, currency)
              return if (tag.isValid) "${tag.amount} ${tag.currency}" else "invalid"
          }
      }
    garbage/Formatter.kt: |
      // GARBAGE_KNUM_A = "formatter_marker"
      object Formatter { fun format(n: Int): String = n.toString() }
    garbage/Converter.kt: |
      // GARBAGE_KNUM_B = "converter_marker"
      object Converter { fun toCents(amount: Double): Long = (amount * 100).toLong() }
    garbage/Validator.kt: |
      // GARBAGE_KNUM_C = "validator_marker"
      object Validator { fun isPositive(n: Int) = n > 0 }
  commit_message: "fix: use toIntOrNull/toDoubleOrNull to handle non-numeric input safely"
