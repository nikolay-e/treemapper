repo:
  initial_files:
    Client.scala: |
      import zio._

      trait Client {
        def fetch(url: String): Task[String]
      }

      object Client {
        val live: ULayer[Client] = ZLayer.succeed(new Client {
          def fetch(url: String): Task[String] = ZIO.succeed(s"Response from $url")
        })
      }
    DataFetcher.scala: |
      object DataFetcher {}
    HttpConfig.scala: |
      case class HttpConfig(
        baseUrl: String = "http://localhost:8080",
        timeoutMillis: Int = 5000,
        maxRetries: Int = 3
      ) {
        def withBaseUrl(url: String): HttpConfig = copy(baseUrl = url)
        def withTimeout(millis: Int): HttpConfig = copy(timeoutMillis = millis)
      }
    MetricsCollector.scala: |
      import zio._

      trait MetricsCollector {
        def recordLatency(endpoint: String, millis: Long): UIO[Unit]
        def incrementCounter(name: String): UIO[Unit]
      }

      object MetricsCollector {
        val live: ULayer[MetricsCollector] = ZLayer.succeed(new MetricsCollector {
          def recordLatency(endpoint: String, millis: Long): UIO[Unit] = ZIO.unit
          def incrementCounter(name: String): UIO[Unit] = ZIO.unit
        })
      }
  changed_files:
    Client.scala: |
      import zio._

      trait Client {
        def fetch(url: String): Task[String]
      }

      object Client {
        val live: ULayer[Client] = ZLayer.succeed(new Client {
          def fetch(url: String): Task[String] = ZIO.succeed(s"Response from $url")
        })
      }
    DataFetcher.scala: |
      import zio._

      case class Data(content: String)

      object DataFetcher {
        def fetch(url: String): ZIO[Client, Throwable, Data] = {
          for {
            client <- ZIO.service[Client]
            response <- client.fetch(url)
          } yield Data(response)
        }

        def fetchMultiple(urls: List[String]): ZIO[Client, Throwable, List[Data]] = {
          ZIO.foreach(urls)(fetch)
        }
      }
    HttpConfig.scala: |
      case class HttpConfig(
        baseUrl: String = "http://localhost:8080",
        timeoutMillis: Int = 5000,
        maxRetries: Int = 3
      ) {
        def withBaseUrl(url: String): HttpConfig = copy(baseUrl = url)
        def withTimeout(millis: Int): HttpConfig = copy(timeoutMillis = millis)
      }
    MetricsCollector.scala: |
      import zio._

      trait MetricsCollector {
        def recordLatency(endpoint: String, millis: Long): UIO[Unit]
        def incrementCounter(name: String): UIO[Unit]
      }

      object MetricsCollector {
        val live: ULayer[MetricsCollector] = ZLayer.succeed(new MetricsCollector {
          def recordLatency(endpoint: String, millis: Long): UIO[Unit] = ZIO.unit
          def incrementCounter(name: String): UIO[Unit] = ZIO.unit
        })
      }
  commit_message: Update files
