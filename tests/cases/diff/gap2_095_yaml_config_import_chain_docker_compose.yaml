name: gap2_095_yaml_config_import_chain_docker_compose
tags:
- change:config
- change:multi_file
- context:import_chain
- difficulty:medium
- distance:2hop
- lang:yaml
repo:
  initial_files:
    docker-compose.yml: |
      version: "3.8"
      services:
        api:
          build: ./api
          ports:
            - "8080:8080"
          env_file:
            - .env.shared
          depends_on:
            - postgres
        postgres:
          image: postgres:16
          env_file:
            - .env.shared
          volumes:
            - pgdata:/var/lib/postgresql/data
      volumes:
        pgdata:
    .env.shared: |
      POSTGRES_HOST=postgres
      POSTGRES_PORT=5432
      POSTGRES_DB=myapp
      POSTGRES_USER=app
      POSTGRES_PASSWORD=secret
    api/Dockerfile: |
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY . .
      CMD ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8080"]
    monitoring/prometheus.yml: |
      global:
        scrape_interval: TRAP_GAP2_095_PROM_A
      scrape_configs:
        - job_name: TRAP_GAP2_095_PROM_B
  changed_files:
    docker-compose.yml: |
      version: "3.8"
      services:
        api:
          build: ./api
          ports:
            - "8080:8080"
          env_file:
            - .env.shared
          depends_on:
            - postgres
            - redis
        redis:
          image: redis:7-alpine
          ports:
            - "6379:6379"
          volumes:
            - redisdata:/data
        postgres:
          image: postgres:16
          env_file:
            - .env.shared
          volumes:
            - pgdata:/var/lib/postgresql/data
      volumes:
        pgdata:
        redisdata:
    .env.shared: |
      POSTGRES_HOST=postgres
      POSTGRES_PORT=5432
      POSTGRES_DB=myapp
      POSTGRES_USER=app
      POSTGRES_PASSWORD=secret
      REDIS_URL=redis://redis:6379/0
  commit_message: Update files
fragments:
- id: redis_service
  selector:
    path: docker-compose.yml
    anchor: "image: redis:7-alpine"
- id: redis_env
  selector:
    path: .env.shared
    anchor: "REDIS_URL=redis://redis:6379/0"
- id: depends_redis
  selector:
    path: docker-compose.yml
    anchor: "- redis"
- id: no_prometheus
  selector:
    path: monitoring/prometheus.yml
- id: no_global_0
  selector:
    anchor: TRAP_GAP2_095_PROM_A
- id: no_global_1
  selector:
    anchor: TRAP_GAP2_095_PROM_B
oracle:
  required:
  - redis_service
  - redis_env
  - depends_redis
  forbidden:
  - no_prometheus
  - no_global_0
  - no_global_1
