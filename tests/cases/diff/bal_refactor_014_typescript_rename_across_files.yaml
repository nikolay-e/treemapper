    src/sessions/store.py: |
      import secrets
      import time
      from typing import Optional, Dict, Any

      class SessionStore:
          def __init__(self, ttl_seconds: int = 3600):
              self._sessions: Dict[str, dict] = {}
              self._ttl = ttl_seconds

          def create(self, user_id: str, data: Dict[str, Any] = None) -> str:
              token = secrets.token_hex(32)
              self._sessions[token] = {
                  "user_id": user_id,
                  "data": data or {},
                  "created_at": time.time(),
              }
              return token

          def get(self, token: str) -> Optional[dict]:
              session = self._sessions.get(token)
              if session is None:
                  return None
              age = time.time() - session["created_at"]
              if age > self._ttl:
                  self.delete(token)
                  return None
              return session

          def delete(self, token: str) -> None:
              self._sessions.pop(token, None)

          def purge_expired(self) -> int:
              now = time.time()
              expired = [t for t, s in self._sessions.items() if now - s["created_at"] > self._ttl]
              for t in expired:
                  del self._sessions[t]
              return len(expired)
    src/sessions/middleware.py: |
      from src.sessions.store import SessionStore

      class SessionMiddleware:
          def __init__(self, store: SessionStore):
              self.store = store

          def process_request(self, request: dict) -> dict:
              token = request.get("session_token")
              if token:
                  session = self.store.get(token)
                  request["session"] = session
              else:
                  request["session"] = None
              return request
    tests/test_sessions.py: |
      import pytest
      import time
      from src.sessions.store import SessionStore

      def test_create_returns_token():
          store = SessionStore(ttl_seconds=60)
          token = store.create("user-1")
          assert token is not None
          assert len(token) == 64

      def test_get_returns_session_data():
          store = SessionStore(ttl_seconds=60)
          token = store.create("user-1", {"role": "admin"})
          session = store.get(token)
          assert session["user_id"] == "user-1"
          assert session["data"]["role"] == "admin"

      def test_delete_removes_session():
          store = SessionStore(ttl_seconds=60)
          token = store.create("user-2")
          store.delete(token)
          assert store.get(token) is None

      def test_get_expired_session_returns_none():
          store = SessionStore(ttl_seconds=1)
          token = store.create("user-3")
          time.sleep(1.05)
          assert store.get(token) is None

      def test_purge_expired_removes_stale_sessions():
          store = SessionStore(ttl_seconds=1)
          store.create("user-4")
          store.create("user-5")
          time.sleep(1.05)
          purged = store.purge_expired()
          assert purged == 2
