name: bal_refactor_014_typescript_rename_across_files
tags:
- lang:typescript
- change:multi_file
- change:refactor
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    src/models/item.ts: |
      export interface Item {
          id: string;
          name: string;
          price: number;
          quantity: number;
      }

      export function createItem(name: string, price: number, quantity: number): Item {
          return { id: crypto.randomUUID(), name, price, quantity };
      }
    src/cart/cartManager.ts: |
      import { Item, createItem } from '../models/item';

      export class CartManager {
          private items: Item[] = [];

          addItem(name: string, price: number, quantity: number): void {
              this.items.push(createItem(name, price, quantity));
          }

          getTotal(): number {
              return this.items.reduce((sum, item) => sum + item.price * item.quantity, 0);
          }

          getItems(): Item[] {
              return [...this.items];
          }
      }
    src/pages/checkout.ts: |
      import { CartManager } from '../cart/cartManager';

      export function renderCheckout(cart: CartManager): string {
          const items = cart.getItems();
          const total = cart.getTotal();
          return `Items: ${items.length}, Total: $${total.toFixed(2)}`;
      }
    src/analytics/tracker.ts: |
      const GARBAGE_REFACTOR_014_TRACK_A = 'tracker';
      const GARBAGE_REFACTOR_014_EVENT_B = 'click';

      export function trackEvent(name: string): void {
          console.log(`Event: ${name}`);
      }
    garbage_theme.ts: |
      const GARBAGE_REFACTOR_014_THEME_C = 'theme';
      const GARBAGE_REFACTOR_014_MODE_D = 'dark';

      export const theme = {
          GARBAGE_REFACTOR_014_THEME_OBJ_E: true,
          primary: '#333',
      };
  changed_files:
    src/models/product.ts: |
      export interface Product {
          id: string;
          name: string;
          price: number;
          quantity: number;
      }

      export function createProduct(name: string, price: number, quantity: number): Product {
          return { id: crypto.randomUUID(), name, price, quantity };
      }
    src/cart/cartManager.ts: |
      import { Product, createProduct } from '../models/product';

      export class CartManager {
          private items: Product[] = [];

          addItem(name: string, price: number, quantity: number): void {
              this.items.push(createProduct(name, price, quantity));
          }

          getTotal(): number {
              return this.items.reduce((sum, item) => sum + item.price * item.quantity, 0);
          }

          getItems(): Product[] {
              return [...this.items];
          }
      }
    src/pages/checkout.ts: |
      import { CartManager } from '../cart/cartManager';

      export function renderCheckout(cart: CartManager): string {
          const items = cart.getItems();
          const total = cart.getTotal();
          return `Items: ${items.length}, Total: $${total.toFixed(2)}`;
      }
    src/analytics/tracker.ts: |
      const GARBAGE_REFACTOR_014_TRACK_A = 'tracker';
      const GARBAGE_REFACTOR_014_EVENT_B = 'click';

      export function trackEvent(name: string): void {
          console.log(`Event: ${name}`);
      }
    garbage_theme.ts: |
      const GARBAGE_REFACTOR_014_THEME_C = 'theme';
      const GARBAGE_REFACTOR_014_MODE_D = 'dark';

      export const theme = {
          GARBAGE_REFACTOR_014_THEME_OBJ_E: true,
          primary: '#333',
      };
  commit_message: "refactor: rename Item to Product across codebase"
