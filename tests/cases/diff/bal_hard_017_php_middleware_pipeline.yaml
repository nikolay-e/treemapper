repo:
  initial_files:
    src/Http/Request.php: |
      <?php
      namespace App\Http;
      class Request {
          public string $method;
          public string $path;
          public array $headers;
          public string $body;
          public function __construct(string $method, string $path, array $headers = [], string $body = '') {
              $this->method = $method;
              $this->path = $path;
              $this->headers = $headers;
              $this->body = $body;
          }
      }
    src/Http/Response.php: |
      <?php
      namespace App\Http;
      class Response {
          public int $statusCode;
          public string $body;
          public array $headers;
          public function __construct(int $statusCode, string $body, array $headers = []) {
              $this->statusCode = $statusCode;
              $this->body = $body;
              $this->headers = $headers;
          }
      }
    src/Middleware/MiddlewareInterface.php: |
      <?php
      namespace App\Middleware;
      use App\Http\Request;
      use App\Http\Response;
      interface MiddlewareInterface {
          public function handle(Request $request, callable $next): Response;
      }
    src/Middleware/CorsMiddleware.php: |
      <?php
      namespace App\Middleware;
      use App\Http\Request;
      use App\Http\Response;
      class CorsMiddleware implements MiddlewareInterface {
          public function handle(Request $request, callable $next): Response {
              $response = $next($request);
              $response->headers['Access-Control-Allow-Origin'] = '*';
              return $response;
          }
      }
    src/Middleware/Pipeline.php: |
      <?php
      namespace App\Middleware;
      use App\Http\Request;
      use App\Http\Response;
      class Pipeline {
          private array $middlewares = [];
          public function pipe(MiddlewareInterface $middleware): self {
              $this->middlewares[] = $middleware;
              return $this;
          }
          public function process(Request $request, callable $handler): Response {
              $pipeline = array_reduce(
                  array_reverse($this->middlewares),
                  fn(callable $next, MiddlewareInterface $mw) => fn(Request $req) => $mw->handle($req, $next),
                  $handler
              );
              return $pipeline($request);
          }
      }
    src/Handler/HomeHandler.php: |
      <?php
      namespace App\Handler;
      use App\Http\Request;
      use App\Http\Response;
      class HomeHandler {
          public function __invoke(Request $request): Response {
              return new Response(200, 'Welcome to ' . $request->path);
          }
      }
    src/App/Kernel.php: |
      <?php
      namespace App\App;
      use App\Middleware\Pipeline;
      use App\Middleware\CorsMiddleware;
      use App\Handler\HomeHandler;
      use App\Http\Request;
      class Kernel {
          public function handle(Request $request) {
              $pipeline = new Pipeline();
              $pipeline->pipe(new CorsMiddleware());
              return $pipeline->process($request, new HomeHandler());
          }
      }
    src/Helpers/ArrayHelper.php: |
      <?php
      namespace App\Helpers;
      class ArrayHelper {
          public static function flatten(array $arr): array {
              return array_merge(...$arr);
          }
      }
  changed_files:
    src/Middleware/RateLimitMiddleware.php: |
      <?php
      namespace App\Middleware;
      use App\Http\Request;
      use App\Http\Response;
      class RateLimitMiddleware implements MiddlewareInterface {
          private array $requestCounts = [];
          private int $maxRequests;
          public function __construct(int $maxRequests = 100) {
              $this->maxRequests = $maxRequests;
          }
          public function handle(Request $request, callable $next): Response {
              $ip = $request->headers['X-Forwarded-For'] ?? 'unknown';
              $this->requestCounts[$ip] = ($this->requestCounts[$ip] ?? 0) + 1;
              if ($this->requestCounts[$ip] > $this->maxRequests) {
                  return new Response(429, 'Too Many Requests');
              }
              return $next($request);
          }
      }
    src/App/Kernel.php: |
      <?php
      namespace App\App;
      use App\Middleware\Pipeline;
      use App\Middleware\CorsMiddleware;
      use App\Middleware\RateLimitMiddleware;
      use App\Handler\HomeHandler;
      use App\Http\Request;
      class Kernel {
          public function handle(Request $request) {
              $pipeline = new Pipeline();
              $pipeline->pipe(new RateLimitMiddleware(50));
              $pipeline->pipe(new CorsMiddleware());
              return $pipeline->process($request, new HomeHandler());
          }
      }
  commit_message: "feat: add rate limiting middleware"
