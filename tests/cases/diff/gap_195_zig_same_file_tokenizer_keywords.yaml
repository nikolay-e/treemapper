name: gap_195_zig_same_file_tokenizer_keywords
tags:
- lang:zig
- change:multi_file
- context:same_file
- difficulty:trivial
- distance:0hop
repo:
  initial_files:
    src/lexer.zig: |
      pub const TokenKind = enum {
          identifier,
          number,
          string,
          plus,
          minus,
          star,
          slash,
          eof,
      };

      pub const Token = struct {
          kind: TokenKind,
          start: usize,
          len: usize,
      };

      pub fn tokenize(source: []const u8) Token {
          if (source.len == 0) {
              return Token{ .kind = .eof, .start = 0, .len = 0 };
          }
          const ch = source[0];
          if (ch >= '0' and ch <= '9') {
              return Token{ .kind = .number, .start = 0, .len = 1 };
          }
          if (ch == '+') return Token{ .kind = .plus, .start = 0, .len = 1 };
          if (ch == '-') return Token{ .kind = .minus, .start = 0, .len = 1 };
          if (ch == '*') return Token{ .kind = .star, .start = 0, .len = 1 };
          if (ch == '/') return Token{ .kind = .slash, .start = 0, .len = 1 };
          return Token{ .kind = .identifier, .start = 0, .len = 1 };
      }
    src/parser.zig: |
      const lex = @import("lexer.zig");

      pub const Expr = struct {
          op: lex.TokenKind,
          left: ?*Expr,
          right: ?*Expr,
      };

      pub fn parseExpression(source: []const u8) Expr {
          const tok = lex.tokenize(source);
          return Expr{ .op = tok.kind, .left = null, .right = null };
      }
    src/formatter.zig: |
      const TRAP_GAP_195_FMT_MARKER_A: []const u8 = "formatter_noise";
      const TRAP_GAP_195_FMT_FLAG_B: bool = true;

      pub fn formatOutput(data: []const u8) []const u8 {
