repo:
  initial_files:
    src/Http/Request.php: |
      <?php
      namespace App\Http;

      class Request {
          private array $headers;
          private string $method;
          private string $path;
          public function __construct(string $method, string $path, array $headers = []) {
              $this->method = $method;
              $this->path = $path;
              $this->headers = $headers;
          }
          public function getMethod(): string { return $this->method; }
          public function getPath(): string { return $this->path; }
          public function getHeader(string $name): ?string {
              return $this->headers[$name] ?? null;
          }
      }
    src/Middleware/AuthMiddleware.php: |
      <?php
      namespace App\Middleware;

      use App\Http\Request;

      class AuthMiddleware {
          public function handle(Request $request): bool {
              $token = $request->getHeader('Authorization');
              return $token !== null;
          }
      }
    src/Middleware/Pipeline.php: |
      <?php
      namespace App\Middleware;

      use App\Http\Request;
      use App\Middleware\AuthMiddleware;

      class Pipeline {
          private AuthMiddleware $auth;
          public function __construct(AuthMiddleware $auth) {
              $this->auth = $auth;
          }
          public function process(Request $request): bool {
              return $this->auth->handle($request);
          }
      }
    src/Routing/Router.php: |
      <?php
      namespace App\Routing;

      use App\Middleware\Pipeline;
      use App\Http\Request;

      class Router {
          private Pipeline $pipeline;
          public function __construct(Pipeline $pipeline) {
              $this->pipeline = $pipeline;
          }
          public function dispatch(Request $request): string {
              if (!$this->pipeline->process($request)) {
                  return '403 Forbidden';
              }
              return '200 OK';
          }
      }
    src/Kernel/Application.php: |
      <?php
      namespace App\Kernel;

      use App\Routing\Router;
      use App\Http\Request;

      class Application {
          private Router $router;
          public function __construct(Router $router) {
              $this->router = $router;
          }
          public function run(Request $request): string {
              return $this->router->dispatch($request);
          }
      }
