    queue/scheduler.py: |
      import heapq
      from queue.task import Task
      class Scheduler:
          def __init__(self):
              self.heap: list[Task] = []
          def enqueue(self, task: Task):
              heapq.heappush(self.heap, task)
          def dequeue(self) -> Task:
              return heapq.heappop(self.heap)
    queue/worker.py: |
      from queue.scheduler import Scheduler
      class Worker:
          def __init__(self, scheduler: Scheduler):
              self.scheduler = scheduler
              self.processed: list[str] = []
          def run_next(self) -> str:
              task = self.scheduler.dequeue()
              self.processed.append(task.id)
              return task.id
    api/task_api.py: |
      from queue.worker import Worker
      from queue.scheduler import Scheduler
      from queue.task import Task
      class TaskAPI:
          def __init__(self):
              self.scheduler = Scheduler()
              self.worker = Worker(self.scheduler)
          def submit(self, name: str, priority: int) -> str:
              task = Task(id=f"task_{name}", name=name, priority=priority)
              self.scheduler.enqueue(task)
              return task.id
          def process_next(self) -> str:
