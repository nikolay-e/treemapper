repo:
  initial_files:
    db/schema.sql: |
      CREATE TABLE posts (
          id SERIAL PRIMARY KEY,
          author_id INTEGER NOT NULL REFERENCES users(id),
          title VARCHAR(512) NOT NULL,
          body TEXT NOT NULL,
          published_at TIMESTAMP,
          created_at TIMESTAMP NOT NULL DEFAULT NOW()
      );

      CREATE TABLE tags (
          id SERIAL PRIMARY KEY,
          name VARCHAR(100) UNIQUE NOT NULL
      );

      CREATE TABLE post_tags (
          post_id INTEGER REFERENCES posts(id) ON DELETE CASCADE,
          tag_id INTEGER REFERENCES tags(id) ON DELETE CASCADE,
          PRIMARY KEY (post_id, tag_id)
      );
    src/blog/post_repo.py: |
      def get_published_posts(conn) -> list:
          cur = conn.cursor()
          cur.execute(
              "SELECT id, title, published_at FROM posts WHERE published_at IS NOT NULL ORDER BY published_at DESC"
          )
          return cur.fetchall()
    src/blog/tag_repo.py: |
      def get_tags_for_post(conn, post_id: int) -> list:
          cur = conn.cursor()
          cur.execute(
              """
              SELECT t.id, t.name FROM tags t
              JOIN post_tags pt ON pt.tag_id = t.id
              WHERE pt.post_id = %s
              """,
              (post_id,)
          )
          return cur.fetchall()
