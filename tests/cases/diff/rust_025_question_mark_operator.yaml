name: rust_025_question_mark_operator
repo:
  initial_files:
    src/lib.rs: |
      pub mod errors;
      pub mod parser;
      pub mod http_client;
      pub mod file_watcher;
      pub mod error_handler;
      pub mod network;
      pub mod validator;
    src/errors.rs: |
      use std::fmt;

      #[derive(Debug)]
      pub enum AppError {
          IoError(std::io::Error),
          ParseError(String),
      }

      impl fmt::Display for AppError {
          fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {
              match self {
                  AppError::IoError(e) => write!(f, "IO error: {}", e),
                  AppError::ParseError(s) => write!(f, "Parse error: {}", s),
              }
          }
      }

      impl std::error::Error for AppError {}

      impl From<std::io::Error> for AppError {
          fn from(e: std::io::Error) -> Self {
              AppError::IoError(e)
          }
      }
    src/parser.rs: |
      use crate::errors::AppError;
      use std::fs;

      pub fn parse_file(path: &str) -> Result<String, AppError> {
          let content = fs::read_to_string(path)?;
          if content.is_empty() {
              return Err(AppError::ParseError("File is empty".to_string()));
          }
          Ok(content.trim().to_string())
      }

      pub fn parse_config(path: &str) -> Result<Vec<String>, AppError> {
          let content = parse_file(path)?;
          let lines: Vec<String> = content.lines().map(|l| l.to_string()).collect();
          Ok(lines)
      }
    src/http_client.rs: |
      use std::collections::HashMap;

      #[derive(Debug)]
      pub enum HttpError {
          ConnectionRefused(String),
          Timeout,
          StatusCode(u16),
          NetworkError(String),
      }

      pub struct HttpClient {
          base_url: String,
          headers: HashMap<String, String>,
      }

      impl HttpClient {
          pub fn new(base_url: &str) -> Self {
              Self {
                  base_url: base_url.to_string(),
                  headers: HashMap::new(),
              }
          }

          pub fn get(&self, path: &str) -> Result<String, HttpError> {
              Err(HttpError::ConnectionRefused(format!("{}{}", self.base_url, path)))
          }

          pub fn post(&self, path: &str, body: &str) -> Result<String, HttpError> {
              Err(HttpError::Timeout)
          }
      }
    src/file_watcher.rs: |
      use std::path::PathBuf;
      use std::time::Duration;

      pub struct FileWatcher {
          paths: Vec<PathBuf>,
          poll_interval: Duration,
      }

      impl FileWatcher {
          pub fn new(poll_interval: Duration) -> Self {
              Self {
                  paths: Vec::new(),
                  poll_interval,
              }
          }

          pub fn watch(&mut self, path: &str) {
              self.paths.push(PathBuf::from(path));
          }

          pub fn check_changes(&self) -> Vec<PathBuf> {
              self.paths.clone()
          }
      }
    src/error_handler.rs: |
      use crate::errors::AppError;

      pub fn handle_error(error: &AppError) -> String {
          match error {
              AppError::IoError(e) => format!("IO failure: {}", e),
              AppError::ParseError(msg) => format!("Parse failure: {}", msg),
          }
      }

      pub fn is_recoverable(error: &AppError) -> bool {
          matches!(error, AppError::ParseError(_))
      }

      pub fn log_error(error: &AppError) {
          eprintln!("[ERROR] {}", error);
      }
    src/network.rs: |
      use crate::errors::AppError;

      pub fn fetch_url(url: &str) -> Result<String, AppError> {
          if url.is_empty() {
              return Err(AppError::NetworkError("Empty URL".to_string()));
          }
          Ok(format!("Content from {}", url))
      }

      pub fn ping(host: &str) -> Result<bool, AppError> {
          if host.is_empty() {
              return Err(AppError::NetworkError("Empty host".to_string()));
          }
          Ok(true)
      }
    src/validator.rs: |
      pub enum ValidationResult {
          Valid,
          Invalid(String),
          Warning(String),
      }

      pub fn validate_path(path: &str) -> ValidationResult {
          if path.is_empty() {
              ValidationResult::Invalid("Path cannot be empty".to_string())
          } else if path.contains("..") {
              ValidationResult::Warning("Path contains parent traversal".to_string())
          } else {
              ValidationResult::Valid
          }
      }

      pub fn validate_input(input: &str, max_len: usize) -> ValidationResult {
          if input.len() > max_len {
              ValidationResult::Invalid(format!("Input exceeds {} chars", max_len))
          } else {
              ValidationResult::Valid
          }
      }
  changed_files:
    src/errors.rs: |
      use std::fmt;

      #[derive(Debug)]
      pub enum AppError {
          IoError(std::io::Error),
          ParseError(String),
          NetworkError(String),
          ValidationError { field: String, message: String },
      }

      impl fmt::Display for AppError {
          fn fmt(&self, f: &mut fmt::Formatter) -> fmt::Result {
              match self {
                  AppError::IoError(e) => write!(f, "IO error: {}", e),
                  AppError::ParseError(s) => write!(f, "Parse error: {}", s),
                  AppError::NetworkError(s) => write!(f, "Network error: {}", s),
                  AppError::ValidationError { field, message } => {
                      write!(f, "Validation error in {}: {}", field, message)
                  }
              }
          }
      }

      impl std::error::Error for AppError {}

      impl From<std::io::Error> for AppError {
          fn from(e: std::io::Error) -> Self {
              AppError::IoError(e)
          }
      }
    src/parser.rs: |
      use crate::errors::AppError;
      use std::fs;

      pub fn parse_file(path: &str) -> Result<String, AppError> {
          let content = fs::read_to_string(path)?;
          if content.is_empty() {
              return Err(AppError::ParseError("File is empty".to_string()));
          }
          Ok(content.trim().to_string())
      }

      pub fn parse_config(path: &str) -> Result<Vec<String>, AppError> {
          let content = parse_file(path)?;
          let lines: Vec<String> = content.lines().map(|l| l.to_string()).collect();
          Ok(lines)
      }

      pub fn validate_and_parse(path: &str) -> Result<Vec<String>, AppError> {
          let lines = parse_config(path)?;
          for (i, line) in lines.iter().enumerate() {
              if line.contains('\0') {
                  return Err(AppError::ValidationError {
                      field: format!("line_{}", i),
                      message: "Contains null byte".to_string(),
                  });
              }
          }
          Ok(lines)
      }
  commit_message: Update files
