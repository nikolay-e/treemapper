name: jvm_and_compiled_072_swift_swiftui_view
xfail:
  category: swift-same-module-edges
repo:
  initial_files:
    User.swift: |
      struct User: Identifiable {
          let id: String
          let name: String
          let email: String
      }
    UserView.swift: |
      import SwiftUI
      struct UserView: View {
          var body: some View { Text("") }
      }
    AvatarView.swift: |
      import SwiftUI

      struct AvatarView: View {
          let initials: String
          let size: CGFloat

          var body: some View {
              ZStack {
                  Circle()
                      .fill(Color.blue)
                      .frame(width: size, height: size)
                  Text(initials)
                      .font(.system(size: size * 0.4))
                      .foregroundColor(.white)
              }
          }
      }
    ColorPalette.swift: |
      import SwiftUI

      struct ColorPalette {
          static let primaryText = Color.black
          static let secondaryText = Color.gray
          static let accent = Color.blue
          static let background = Color(.systemBackground)
          static let separator = Color(.separator)

          static func textColor(for style: TextStyle) -> Color {
              switch style {
              case .headline: return primaryText
              case .subheadline: return secondaryText
              case .caption: return secondaryText.opacity(0.8)
              }
          }

          enum TextStyle {
              case headline, subheadline, caption
          }
      }
  changed_files:
