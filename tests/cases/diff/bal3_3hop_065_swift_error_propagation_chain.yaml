    Sources/Views/CartView.swift: |
      import SwiftUI
      import Services

      struct CartView: View {
          let checkout: CheckoutService
          var body: some View {
              Text("Cart")
          }
      }
    Sources/Config/AppConfig.swift: |
      import Foundation
      let GARBAGE_065_CONFIG_A = "config"
      let GARBAGE_065_ENV_B = "prod"

      struct AppConfig {
          static let apiURL = "https://api.example.com"
      }
    Sources/Config/FeatureFlags.swift: |
      import Foundation
      let GARBAGE_065_FLAG_C = "feature"
      let GARBAGE_065_TOGGLE_D = true

      struct FeatureFlags {
          static let darkMode = true
      }
  changed_files:
    Sources/Errors/AppError.swift: |
      import Foundation

      enum AppError: Error {
          case networkError(String)
          case decodingError(String)
          case paymentDeclined(reason: String)
          case insufficientFunds
      }
    Sources/Network/HTTPClient.swift: |
      import Foundation
      import Errors

      class HTTPClient {
          func get(url: String) throws -> Data {
              throw AppError.networkError("timeout")
          }
      }
    Sources/API/PaymentGateway.swift: |
      import Foundation
      import Network

      class PaymentGateway {
          private let client: HTTPClient
          init(client: HTTPClient) {
              self.client = client
          }
          func charge(amount: Double) throws -> String {
              do {
                  let data = try client.get(url: "/charge")
                  return "receipt"
              } catch AppError.networkError(let msg) {
                  throw AppError.paymentDeclined(reason: msg)
              }
          }
      }
    Sources/Services/CheckoutService.swift: |
      import Foundation
      import API

      class CheckoutService {
          private let gateway: PaymentGateway
          init(gateway: PaymentGateway) {
              self.gateway = gateway
          }
          func processCheckout(total: Double) throws -> String {
              return try gateway.charge(amount: total)
          }
      }
    Sources/Views/CartView.swift: |
      import SwiftUI
      import Services

      struct CartView: View {
          let checkout: CheckoutService
          var body: some View {
              Text("Cart")
          }
      }
    Sources/Config/AppConfig.swift: |
      import Foundation
      let GARBAGE_065_CONFIG_A = "config"
      let GARBAGE_065_ENV_B = "prod"

      struct AppConfig {
          static let apiURL = "https://api.example.com"
      }
    Sources/Config/FeatureFlags.swift: |
      import Foundation
      let GARBAGE_065_FLAG_C = "feature"
      let GARBAGE_065_TOGGLE_D = true

      struct FeatureFlags {
          static let darkMode = true
      }
  commit_message: "fix: add payment-specific error types for better error handling"
