          case networkError(String)
          case decodingError(String)
      }
    Sources/Network/HTTPClient.swift: |
      import Foundation
      import Errors

      class HTTPClient {
          func get(url: String) throws -> Data {
              throw AppError.networkError("timeout")
          }
      }
    Sources/API/PaymentGateway.swift: |
      import Foundation
      import Network

      class PaymentGateway {
          private let client: HTTPClient
          init(client: HTTPClient) {
              self.client = client
          }
          func charge(amount: Double) throws -> String {
              let data = try client.get(url: "/charge")
              return "receipt"
          }
      }
    Sources/Services/CheckoutService.swift: |
      import Foundation
      import API

      class CheckoutService {
          private let gateway: PaymentGateway
          init(gateway: PaymentGateway) {
              self.gateway = gateway
          }
          func processCheckout(total: Double) throws -> String {
              return try gateway.charge(amount: total)
          }
