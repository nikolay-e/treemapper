repo:
  initial_files:
    logging_lib/formatter.py: |
      from datetime import datetime

      def format_entry(level: str, message: str) -> str:
          ts = datetime.utcnow().isoformat()
          return f"[{ts}] {level.upper()}: {message}"

      def format_error(message: str, exc_type: str) -> str:
          base = format_entry("ERROR", message)
          return f"{base} ({exc_type})"
    logging_lib/handler.py: |
      from logging_lib.formatter import format_entry, format_error

      class LogHandler:
          def __init__(self):
              self.buffer: list[str] = []

          def info(self, message: str) -> None:
              self.buffer.append(format_entry("INFO", message))

          def error(self, message: str, exc_type: str = "Exception") -> None:
              self.buffer.append(format_error(message, exc_type))

          def flush(self) -> list[str]:
              entries = list(self.buffer)
              self.buffer.clear()
              return entries
    logging_lib/middleware.py: |
      from logging_lib.handler import LogHandler

      class RequestLogger:
          def __init__(self):
              self.handler = LogHandler()

          def log_request(self, method: str, path: str, status: int) -> None:
              self.handler.info(f"{method} {path} -> {status}")

          def log_error(self, method: str, path: str, error: str) -> None:
              self.handler.error(f"{method} {path} failed: {error}")

          def collect(self) -> list[str]:
              return self.handler.flush()
    logging_lib/rotation.py: |
      GARBAGE_GAP_032_ROTATE_A = "rotation_marker"
      GARBAGE_GAP_032_SIZE_B = 10485760

      def should_rotate(file_size: int, max_size: int) -> bool:
          return file_size >= max_size
    logging_lib/transport.py: |
      GARBAGE_GAP_032_TRANS_C = "syslog_marker"
      GARBAGE_GAP_032_PROTO_D = "udp"

      def send_syslog(host: str, port: int, message: str) -> bool:
          return True
  changed_files:
    logging_lib/formatter.py: |
      from datetime import datetime

      def format_entry(level: str, message: str, context: dict | None = None) -> str:
          ts = datetime.utcnow().isoformat()
          base = f"[{ts}] {level.upper()}: {message}"
          if context:
              pairs = " ".join(f"{k}={v}" for k, v in sorted(context.items()))
              return f"{base} | {pairs}"
          return base

      def format_error(message: str, exc_type: str) -> str:
          base = format_entry("ERROR", message)
          return f"{base} ({exc_type})"
  commit_message: "add structured context dict to format_entry"
