    pkg/safemap/safemap.go: |
      package safemap

      import "sync"

      type SafeMap struct {
          mu   sync.RWMutex
          data map[string]interface{}
      }

      func New() *SafeMap {
          return &SafeMap{data: make(map[string]interface{})}
      }

      func (m *SafeMap) Get(key string) (interface{}, bool) {
          m.mu.RLock()
          defer m.mu.RUnlock()
          val, ok := m.data[key]
          return val, ok
      }

      func (m *SafeMap) Set(key string, value interface{}) {
          m.mu.Lock()
          defer m.mu.Unlock()
          m.data[key] = value
      }

      func (m *SafeMap) Delete(key string) bool {
          m.mu.Lock()
          defer m.mu.Unlock()
          if _, ok := m.data[key]; !ok {
              return false
          }
          delete(m.data, key)
          return true
      }

      func (m *SafeMap) Len() int {
          m.mu.RLock()
          defer m.mu.RUnlock()
          return len(m.data)
      }
    pkg/safemap/safemap_test.go: |
      package safemap

      import "testing"

      func TestGetSet(t *testing.T) {
          m := New()
          m.Set("hello", "world")
          val, ok := m.Get("hello")
          if !ok || val != "world" {
              t.Fatal("expected world")
          }
      }

      func TestGetMissing(t *testing.T) {
          m := New()
          _, ok := m.Get("missing")
          if ok {
              t.Fatal("expected not found")
          }
      }

      func TestDelete(t *testing.T) {
          m := New()
          m.Set("key", "val")
          ok := m.Delete("key")
          if !ok {
              t.Fatal("expected successful delete")
          }
          _, found := m.Get("key")
          if found {
              t.Fatal("key should be gone")
          }
      }

      func TestLen(t *testing.T) {
          m := New()
          m.Set("a", 1)
          m.Set("b", 2)
          if m.Len() != 2 {
              t.Fatalf("expected len 2, got %d", m.Len())
          }
      }
    pkg/safemap/bench_test.go: |
      package safemap

      GARBAGE_BAL2_009_BENCH_A = "bench"

      import "testing"

      func BenchmarkSet(b *testing.B) {
