          val, ok := m.Get("hello")
          if !ok || val != "world" {
              t.Fatal("expected world")
          }
      }

      func TestGetMissing(t *testing.T) {
          m := New()
          _, ok := m.Get("missing")
          if ok {
              t.Fatal("expected not found")
          }
      }
