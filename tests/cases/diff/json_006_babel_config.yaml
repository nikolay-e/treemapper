  selector:
    path: babel.config.json
    anchor: '"targets": {"node": "18"}'
- id: babel_config_1
  selector:
    path: babel.config.json
    anchor: '@babel/preset-typescript'
- id: no_tsconfig
  selector:
    path: tsconfig.json
- id: no_package
  selector:
    path: package.json
- id: no_global_0
  selector:
    anchor: noEmit
- id: no_global_1
  selector:
    anchor: skipLibCheck
- id: no_global_2
  selector:
    anchor: '@babel/core'
- id: no_global_3
  selector:
    anchor: "build:ts"
oracle:
  required:
  - babel_config
  - babel_config_1
  allowed: []
  forbidden:
  - no_tsconfig
  - no_package
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
