repo:
  initial_files:
    src/Safe.hs: |
      module Safe where

      safeHead :: [a] -> a
      safeHead (x:_) = x
      safeHead [] = error "empty list"
    src/garbage_tail.hs: |
      module GarbageTail where

      GARBAGE_B4H003_TAIL_A = "tail"
      GARBAGE_B4H003_TAIL_B = True

      garbageTail :: [a] -> [a]
      garbageTail (_:xs) = xs
    src/garbage_len.hs: |
      module GarbageLen where

      GARBAGE_B4H003_LEN_C = 0
      GARBAGE_B4H003_LEN_D = "len"

      garbageLen :: [a] -> Int
      garbageLen [] = 0
      garbageLen (_:xs) = 1 + garbageLen xs
  changed_files:
    src/Safe.hs: |
      module Safe where

      safeHead :: [a] -> Maybe a
      safeHead (x:_) = Just x
      safeHead [] = Nothing
    src/garbage_tail.hs: |
      module GarbageTail where

      GARBAGE_B4H003_TAIL_A = "tail"
      GARBAGE_B4H003_TAIL_B = True

      garbageTail :: [a] -> [a]
      garbageTail (_:xs) = xs
    src/garbage_len.hs: |
      module GarbageLen where

      GARBAGE_B4H003_LEN_C = 0
      GARBAGE_B4H003_LEN_D = "len"

      garbageLen :: [a] -> Int
      garbageLen [] = 0
      garbageLen (_:xs) = 1 + garbageLen xs
  commit_message: "fix: return Maybe instead of crashing on empty list"
