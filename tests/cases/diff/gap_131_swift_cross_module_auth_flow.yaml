    Sources/Auth/AuthController.swift: |
      import Foundation

      struct AuthCredentials {
          let username: String
          let password: String
      }

      struct AuthSession {
          let token: String
          let userId: String
          let expiresAt: Date
      }

      class AuthController {
          private let tokenStore: TokenStore
          private let userRepo: UserRepository

          init(tokenStore: TokenStore, userRepo: UserRepository) {
              self.tokenStore = tokenStore
              self.userRepo = userRepo
          }

          func login(credentials: AuthCredentials) -> AuthSession? {
              guard let user = userRepo.findByUsername(credentials.username) else {
                  return nil
              }
              guard userRepo.verifyPassword(userId: user.id, password: credentials.password) else {
                  return nil
              }
              let session = AuthSession(
                  token: UUID().uuidString,
                  userId: user.id,
                  expiresAt: Date().addingTimeInterval(3600)
              )
              tokenStore.save(session: session)
              return session
          }

          func logout(token: String) -> Bool {
              guard tokenStore.find(token: token) != nil else {
                  return false
              }
              tokenStore.revoke(token: token)
              return true
          }
      }
