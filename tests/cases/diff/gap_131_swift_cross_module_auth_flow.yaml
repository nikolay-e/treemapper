repo:
  initial_files:
    Sources/Auth/AuthController.swift: |
      import Foundation

      struct AuthCredentials {
          let username: String
          let password: String
      }

      struct AuthSession {
          let token: String
          let userId: String
          let expiresAt: Date
      }

      class AuthController {
          private let tokenStore: TokenStore
          private let userRepo: UserRepository

          init(tokenStore: TokenStore, userRepo: UserRepository) {
              self.tokenStore = tokenStore
              self.userRepo = userRepo
          }

          func login(credentials: AuthCredentials) -> AuthSession? {
              guard let user = userRepo.findByUsername(credentials.username) else {
                  return nil
              }
              guard userRepo.verifyPassword(userId: user.id, password: credentials.password) else {
                  return nil
              }
              let session = AuthSession(
                  token: UUID().uuidString,
                  userId: user.id,
                  expiresAt: Date().addingTimeInterval(3600)
              )
              tokenStore.save(session: session)
              return session
          }
      }
    Sources/Auth/TokenStore.swift: |
      import Foundation

      class TokenStore {
          private var sessions: [String: AuthSession] = [:]

          func save(session: AuthSession) {
              sessions[session.token] = session
          }

          func find(token: String) -> AuthSession? {
              guard let session = sessions[token] else { return nil }
              if session.expiresAt < Date() {
                  sessions.removeValue(forKey: token)
                  return nil
              }
              return session
          }

          func revoke(token: String) {
              sessions.removeValue(forKey: token)
          }

          func activeSessionCount() -> Int {
              let now = Date()
              return sessions.values.filter { $0.expiresAt > now }.count
          }
      }
    Sources/Users/UserRepository.swift: |
      import Foundation

      struct UserRecord {
          let id: String
          let username: String
          let email: String
          let isActive: Bool
      }

      class UserRepository {
          private var users: [UserRecord] = []
          private var passwords: [String: String] = [:]

          func findByUsername(_ username: String) -> UserRecord? {
              users.first { $0.username == username && $0.isActive }
          }

          func findById(_ id: String) -> UserRecord? {
              users.first { $0.id == id }
          }

          func verifyPassword(userId: String, password: String) -> Bool {
              passwords[userId] == password
          }

          func updateEmail(userId: String, newEmail: String) {
              if let index = users.firstIndex(where: { $0.id == userId }) {
                  let old = users[index]
                  users[index] = UserRecord(id: old.id, username: old.username, email: newEmail, isActive: old.isActive)
              }
          }
      }
    Sources/Audit/AuditLogger.swift: |
      import Foundation

      struct AuditEvent {
          let action: String
          let userId: String
          let timestamp: Date
          let metadata: [String: String]
      }

      class AuditLogger {
          private var events: [AuditEvent] = []

          func log(action: String, userId: String, metadata: [String: String] = [:]) {
              events.append(AuditEvent(action: action, userId: userId, timestamp: Date(), metadata: metadata))
          }

          func eventsForUser(_ userId: String) -> [AuditEvent] {
              events.filter { $0.userId == userId }
          }
      }
