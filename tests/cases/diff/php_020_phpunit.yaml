repo:
  initial_files:
    User.php: |
      <?php
      class User {
          public function __construct(
              public string $name,
              public string $email
          ) {}

          public function isValidEmail(): bool {
              return filter_var($this->email, FILTER_VALIDATE_EMAIL) !== false;
          }

          public function getDisplayName(): string {
              return ucfirst($this->name);
          }

          public function toArray(): array {
              return ['name' => $this->name, 'email' => $this->email];
          }
      }
    UserTest.php: |
      <?php
      class UserTest {}
    ProductTest.php: |
      <?php
      class ProductTest {
          public function testProductCreation(): void {
              $name = 'Widget';
              $price = 9.99;
              assert($name === 'Widget');
              assert($price > 0);
          }

          public function testPriceValidation(): void {
              $price = -5.0;
              $isValid = $price > 0;
              assert($isValid === false);
          }

          public function testProductDisplay(): void {
              $name = 'Gadget';
              assert(ucfirst($name) === 'Gadget');
          }
      }
    EmailValidator.php: |
      <?php
      class EmailValidator {
          public function isValidEmail(string $email): bool {
              return filter_var($email, FILTER_VALIDATE_EMAIL) !== false;
          }

          public function getDomain(string $email): string {
              $parts = explode('@', $email);
              return $parts[1] ?? '';
          }

          public function isDisposable(string $email): bool {
              $disposable = ['tempmail.com', 'throwaway.com', 'mailinator.com'];
              return in_array($this->getDomain($email), $disposable);
          }

          public function normalize(string $email): string {
              return strtolower(trim($email));
          }
      }
    UserRepository.php: |
      <?php
      class UserRepository {
          private array $store = [];

          public function find(int $id): ?array {
              return $this->store[$id] ?? null;
          }

          public function save(array $userData): bool {
              $this->store[] = $userData;
              return true;
          }

          public function findByEmail(string $email): ?array {
              foreach ($this->store as $user) {
                  if (($user['email'] ?? '') === $email) {
                      return $user;
                  }
              }
              return null;
          }
      }
    AdminTest.php: |
      <?php
      class AdminTest {
          public function testAdminCreation(): void {
              $name = 'SuperAdmin';
              $role = 'admin';
              assert($name === 'SuperAdmin');
              assert($role === 'admin');
          }

          public function testPermissions(): void {
              $permissions = ['read', 'write', 'delete'];
              assert(count($permissions) === 3);
              assert(in_array('delete', $permissions));
          }
      }
    UserFixture.php: |
      <?php
      class UserFixture {
          public static function createTestUser(): array {
              return ['name' => 'TestUser', 'email' => 'test@example.com'];
          }

          public static function createInvalidUser(): array {
              return ['name' => 'Invalid', 'email' => 'not-an-email'];
          }

          public static function createBatch(int $count): array {
              $users = [];
              for ($i = 0; $i < $count; $i++) {
                  $users[] = ['name' => "User{$i}", 'email' => "user{$i}@test.com"];
              }
              return $users;
          }
      }
