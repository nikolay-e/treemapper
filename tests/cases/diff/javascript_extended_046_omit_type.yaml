name: javascript_extended_046_omit_type
repo:
  initial_files:
    src/full.ts: |
      export interface FullRecord {
          id: string;
          name: string;
          email: string;
          secret: string;
          internal: boolean;
          createdAt: Date;
      }

      export function createFullRecord(name: string, email: string): FullRecord {
          return {
              id: Date.now().toString(),
              name,
              email,
              secret: 'hidden-value',
              internal: true,
              createdAt: new Date(),
          };
      }
    src/public.ts: |
      console.log('initial');
    src/api/user-handler.ts: |
      import { createFullRecord, FullRecord } from '../full';
      import { Request, Response } from 'express';

      export function handleCreateUser(req: Request, res: Response) {
          const { name, email } = req.body;
          const record: FullRecord = createFullRecord(name, email);
          res.status(201).json({ id: record.id, name: record.name });
      }

      export function handleGetUser(req: Request, res: Response) {
          // fetch from DB, return full record internally
          res.json({ id: req.params.id });
      }
    src/serializers/record-serializer.ts: |
      export interface SerializedRecord {
          id: string;
          name: string;
          email: string;
          created: string;
      }

      export function serializeForClient(record: { id: string; name: string; email: string; createdAt: Date }): SerializedRecord {
          return {
              id: record.id,
              name: record.name,
              email: record.email,
              created: record.createdAt.toISOString(),
          };
      }

      export function serializeBatch(records: Array<{ id: string; name: string; email: string; createdAt: Date }>): SerializedRecord[] {
          return records.map(serializeForClient);
      }
    src/middleware/auth.ts: |
      import { FullRecord } from '../full';

      export function requireInternal(record: FullRecord): boolean {
          return record.internal === true;
      }

      export function validateSecret(record: FullRecord, expected: string): boolean {
          return record.secret === expected;
      }

      export function stripSensitive(record: FullRecord): Omit<FullRecord, 'secret'> {
          const { secret, ...rest } = record;
          return rest;
      }
    src/validators/record-validator.ts: |
      import { FullRecord } from '../full';

      export function validateRecord(record: Partial<FullRecord>): string[] {
          const errors: string[] = [];
          if (!record.name || record.name.length === 0) {
              errors.push('Name is required');
          }
          if (!record.email || !record.email.includes('@')) {
              errors.push('Valid email is required');
          }
          if (record.name && record.name.length > 100) {
              errors.push('Name must be under 100 characters');
          }
          return errors;
      }

      export function isComplete(record: Partial<FullRecord>): record is FullRecord {
          return !!(record.id && record.name && record.email && record.secret !== undefined && record.createdAt);
      }
    src/db/record-repository.ts: |
      import { FullRecord, createFullRecord } from '../full';

      const store = new Map<string, FullRecord>();

      export function save(record: FullRecord): void {
          store.set(record.id, record);
      }

      export function findById(id: string): FullRecord | undefined {
          return store.get(id);
      }

      export function createAndSave(name: string, email: string): FullRecord {
          const record = createFullRecord(name, email);
          save(record);
          return record;
      }

      export function deleteById(id: string): boolean {
          return store.delete(id);
      }
  changed_files:
    src/public.ts: |
      import { FullRecord, createFullRecord } from './full';

      type PublicRecord = Omit<FullRecord, 'secret' | 'internal'>;

      function sanitize(record: FullRecord): PublicRecord {
          const { secret, internal, ...publicData } = record;
          return publicData;
      }

      function createAndSanitize(name: string, email: string): PublicRecord {
          const full = createFullRecord(name, email);
          return sanitize(full);
      }

      export { PublicRecord, sanitize, createAndSanitize };
  commit_message: Update files
