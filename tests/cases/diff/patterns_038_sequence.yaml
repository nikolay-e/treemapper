repo:
  initial_files:
    src/healthcare/vital_monitor.rs: |
      pub struct SpO2Monitor {
          readings: Vec<f32>,
          sample_window: usize,
      }

      impl SpO2Monitor {
          pub fn new(sample_window: usize) -> Self {
              Self { readings: Vec::new(), sample_window }
          }

          pub fn record(&mut self, value: f32) {
              self.readings.push(value);
              if self.readings.len() > self.sample_window {
                  self.readings.remove(0);  // BUG: O(n) removal, should use VecDeque
              }
          }

          pub fn average_spo2(&self) -> Option<f32> {
              if self.readings.is_empty() {
                  return None;
              }
              Some(self.readings.iter().sum::<f32>() / self.readings.len() as f32)
          }

          pub fn is_hypoxic(&self) -> bool {
              self.average_spo2().map_or(false, |avg| avg < 94.0)
          }
      }
    src/healthcare/alarm.rs: |
      use crate::healthcare::vital_monitor::SpO2Monitor;

      pub struct HypoxiaAlarm {
          monitor: SpO2Monitor,
          triggered: bool,
      }

      impl HypoxiaAlarm {
          pub fn new(window: usize) -> Self {
              Self { monitor: SpO2Monitor::new(window), triggered: false }
          }

          pub fn update(&mut self, spo2: f32) -> bool {
              self.monitor.record(spo2);
              self.triggered = self.monitor.is_hypoxic();
              self.triggered
          }
      }
