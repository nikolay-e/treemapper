name: shell_021_background_job
tags:
- lang:shell
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    lib/jobs.sh: |
      #!/bin/bash

      long_process() {
          local label=${1:-default}
          sleep 30
          echo "Long process [$label] complete"
      }

      compress_logs() {
          local dir=${1:-/var/log}
          for f in "$dir"/*.log; do
              gzip -k "$f" 2>/dev/null
          done
          echo "Compression finished for $dir"
      }
    parallel.sh: |
      #!/bin/bash
      source ./lib/jobs.sh

      long_process "batch-1" &
      pid1=$!
      echo "Started job: $pid1"
      wait $pid1
    scheduler.sh: |
      #!/bin/bash

      CRON_DIR="/etc/cron.d"

      add_cron_job() {
          local name=$1
          local schedule=$2
          local command=$3
          echo "$schedule root $command" > "$CRON_DIR/$name"
      }

      remove_cron_job() {
          local name=$1
          rm -f "$CRON_DIR/$name"
      }

      list_cron_jobs() {
          ls -1 "$CRON_DIR"
      }
    timeout-guard.sh: |
      #!/bin/bash

      run_with_timeout() {
          local seconds=$1
          shift
          timeout "$seconds" "$@"
          local exit_code=$?
          if [[ $exit_code -eq 124 ]]; then
              echo "Command timed out after ${seconds}s"
          fi
          return $exit_code
      }

      kill_after_timeout() {
          local seconds=$1
          local pid=$2
          sleep "$seconds"
          kill -9 "$pid" 2>/dev/null
      }
    scripts/monitor_jobs.sh: |
      #!/bin/bash
      source ./lib/jobs.sh

      echo "Starting monitored execution..."
      long_process "monitored" &
      pid=$!
      while kill -0 "$pid" 2>/dev/null; do
          echo "Job $pid still running..."
          sleep 5
      done
      compress_logs "/var/log/app" &
      wait
      echo "All monitored jobs finished"
    scripts/sequential.sh: |
      #!/bin/bash
      source ./lib/jobs.sh

      echo "Running sequentially..."
      long_process "step-1"
      echo "Step 1 done"
      compress_logs "/var/log"
      echo "Step 2 done"
    lib/job_queue.sh: |
      #!/bin/bash
      JOB_QUEUE=()

      enqueue_job() {
          JOB_QUEUE+=("$1")
      }

      run_queue() {
          for job in "${JOB_QUEUE[@]}"; do
              eval "$job" &
          done
          wait
      }
