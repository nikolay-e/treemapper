repo:
  initial_files:
    Tables.scala: |
      import slick.jdbc.PostgresProfile.api._

      case class User(id: Long, name: String, age: Int, active: Boolean)

      class Users(tag: Tag) extends Table[User](tag, "users") {
        def id = column[Long]("id", O.PrimaryKey, O.AutoInc)
        def name = column[String]("name")
        def age = column[Int]("age")
        def active = column[Boolean]("active")
        def * = (id, name, age, active).mapTo[User]
      }

      object Tables {
        val users = TableQuery[Users]
      }
    UserRepository.scala: |
      class UserRepository {}
    repositories/OrderRepository.scala: |
      import slick.jdbc.PostgresProfile.api._
      import scala.concurrent.Future

      case class Order(id: Long, userId: Long, total: Double, status: String)

      class Orders(tag: Tag) extends Table[Order](tag, "orders") {
        def id = column[Long]("id", O.PrimaryKey, O.AutoInc)
        def userId = column[Long]("user_id")
        def total = column[Double]("total")
        def status = column[String]("status")
        def * = (id, userId, total, status).mapTo[Order]
      }

      class OrderRepository(db: Database) {
        val orders = TableQuery[Orders]

        def findByUser(userId: Long): Future[Seq[Order]] = {
          db.run(orders.filter(_.userId === userId).result)
        }

        def findPending(): Future[Seq[Order]] = {
          db.run(orders.filter(_.status === "pending").result)
        }

        def totalByUser(userId: Long): Future[Option[Double]] = {
          db.run(orders.filter(_.userId === userId).map(_.total).sum.result)
        }
      }
    repositories/ProductRepository.scala: |
      import slick.jdbc.PostgresProfile.api._
      import scala.concurrent.Future

      case class Product(id: Long, name: String, price: Double, available: Boolean)

      class Products(tag: Tag) extends Table[Product](tag, "products") {
        def id = column[Long]("id", O.PrimaryKey, O.AutoInc)
        def name = column[String]("name")
        def price = column[Double]("price")
        def available = column[Boolean]("available")
        def * = (id, name, price, available).mapTo[Product]
      }

      class ProductRepository(db: Database) {
        val products = TableQuery[Products]

        def findAvailable(): Future[Seq[Product]] = {
          db.run(products.filter(_.available === true).result)
        }

        def findByName(name: String): Future[Option[Product]] = {
          db.run(products.filter(_.name === name).result.headOption)
        }
      }
    migration/DatabaseMigration.scala: |
      object DatabaseMigration {
        def migrate(version: Int): Unit = {
          println(s"Migrating to version $version")
        }

        def rollback(version: Int): Unit = {
          println(s"Rolling back to version $version")
        }

        def currentVersion(): Int = 1

        def pendingMigrations(): List[Int] = List(2, 3, 4)
      }
    services/UserService.scala: |
      import scala.concurrent.{Future, ExecutionContext}
      import scala.concurrent.ExecutionContext.Implicits.global

      class UserService(repo: UserRepository) {
        def getAdultUsers(): Future[Seq[User]] = {
          repo.findAdults()
        }

        def searchByName(name: String): Future[Option[User]] = {
          repo.findByName(name)
        }
      }
