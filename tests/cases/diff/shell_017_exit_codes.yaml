name: shell_017_exit_codes
tags:
- lang:shell
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    validate.sh: |
      #!/bin/bash
      source ./error_handler.sh

      if [[ -z "$1" ]]; then
          echo "Error: No input provided"
          exit 2
      fi
    error_handler.sh: |
      #!/bin/bash

      handle_error() {
          local code=$1
          case $code in
              0) echo "Success" ;;
              1) echo "General error" ;;
              2) echo "Invalid argument" ;;
              *) echo "Unknown error: $code" ;;
          esac
      }

      log_error() {
          local msg=$1
          echo "[ERROR] $(date +%T) $msg" >> /var/log/app/errors.log
      }
    scripts/lint.sh: |
      #!/bin/bash
      shellcheck validate.sh error_handler.sh
      echo "Lint: $?"
    scripts/test_validate.sh: |
      #!/bin/bash
      echo "Test 1: missing arg"
      ./validate.sh
      echo "Exit: $?"
      echo "Test 2: valid file"
      ./validate.sh /etc/hosts
      echo "Exit: $?"
    scripts/retry.sh: |
      #!/bin/bash
      source ./error_handler.sh
      MAX_ATTEMPTS=3
      attempt=0
      while [[ $attempt -lt $MAX_ATTEMPTS ]]; do
          ./validate.sh "$1"
          exit_code=$?
          handle_error $exit_code
          if [[ $exit_code -eq 0 ]]; then
              break
          fi
          log_error "Attempt $attempt failed with code $exit_code"
          ((attempt++))
          sleep 2
      done
    scripts/notify_error.sh: |
      #!/bin/bash
      ./validate.sh "$1"
      code=$?
      if [[ $code -ne 0 ]]; then
          echo "ALERT: validate.sh exited with code $code" | mail -s "Validation Failed" admin@example.com
      fi
    lib/exit_codes.sh: |
      #!/bin/bash
      readonly EXIT_SUCCESS=0
      readonly EXIT_GENERAL=1
      readonly EXIT_INVALID_ARG=2
      readonly EXIT_NOT_FOUND=127
  changed_files:
    validate.sh: |
      #!/bin/bash
      source ./error_handler.sh

      if [[ -z "$1" ]]; then
          log_error "No input provided"
          echo "Error: No input provided"
          exit 2
      fi

      if [[ ! -f "$1" ]]; then
          log_error "File not found: $1"
          echo "Error: File not found"
          exit 1
      fi

      echo "Validation passed for: $1"
      handle_error $?
      exit 0
    error_handler.sh: |
      #!/bin/bash

      handle_error() {
          local code=$1
          case $code in
              0) echo "Success" ;;
              1) echo "General error" ;;
              2) echo "Invalid argument" ;;
              *) echo "Unknown error: $code" ;;
          esac
      }

      log_error() {
          local msg=$1
          echo "[ERROR] $(date +%T) $msg" >> /var/log/app/errors.log
      }
    scripts/lint.sh: |
      #!/bin/bash
      shellcheck validate.sh error_handler.sh
      echo "Lint: $?"
    scripts/test_validate.sh: |
      #!/bin/bash
      echo "Test 1: missing arg"
      ./validate.sh
      echo "Exit: $?"
      echo "Test 2: valid file"
      ./validate.sh /etc/hosts
      echo "Exit: $?"
    scripts/retry.sh: |
      #!/bin/bash
      source ./error_handler.sh
      MAX_ATTEMPTS=3
      attempt=0
      while [[ $attempt -lt $MAX_ATTEMPTS ]]; do
          ./validate.sh "$1"
          exit_code=$?
          handle_error $exit_code
          if [[ $exit_code -eq 0 ]]; then
              break
          fi
          log_error "Attempt $attempt failed with code $exit_code"
          ((attempt++))
          sleep 2
      done
    scripts/notify_error.sh: |
      #!/bin/bash
      ./validate.sh "$1"
      code=$?
      if [[ $code -ne 0 ]]; then
          echo "ALERT: validate.sh exited with code $code" | mail -s "Validation Failed" admin@example.com
      fi
    lib/exit_codes.sh: |
      #!/bin/bash
      readonly EXIT_SUCCESS=0
      readonly EXIT_GENERAL=1
      readonly EXIT_INVALID_ARG=2
      readonly EXIT_NOT_FOUND=127
  commit_message: Update files
fragments:
- id: error_handler
  selector:
    path: error_handler.sh
    anchor: handle_error()
- id: error_handler_1
  selector:
    path: error_handler.sh
    anchor: log_error()
- id: error_handler_2
  selector:
    path: error_handler.sh
    anchor: 2) echo
- id: validate
  selector:
    path: validate.sh
    anchor: handle_error $?
- id: validate_1
  selector:
    path: validate.sh
    anchor: log_error
- id: no_lint
  selector:
    path: scripts/lint.sh
- id: no_test_validate
  selector:
    path: scripts/test_validate.sh
- id: no_retry
  selector:
    path: scripts/retry.sh
- id: no_notify_error
  selector:
