name: rust_006_basic_use_statement
repo:
  initial_files:
    src/main.rs: |
      fn main() {
          let map = std::collections::HashMap::new();
          println!("{:?}", map);
      }
    src/lib.rs: |
      pub mod sorted_set;
      pub mod deque;
    src/sorted_set.rs: |
      use std::collections::BTreeSet;

      pub struct SortedSet<T: Ord> {
          inner: BTreeSet<T>,
      }

      impl<T: Ord> SortedSet<T> {
          pub fn new() -> Self {
              Self { inner: BTreeSet::new() }
          }

          pub fn insert(&mut self, value: T) -> bool {
              self.inner.insert(value)
          }

          pub fn contains(&self, value: &T) -> bool {
              self.inner.contains(value)
          }

          pub fn len(&self) -> usize {
              self.inner.len()
          }

          pub fn is_empty(&self) -> bool {
              self.inner.is_empty()
          }
      }
    src/deque.rs: |
      use std::collections::VecDeque;

      pub struct Deque<T> {
          inner: VecDeque<T>,
          max_size: usize,
      }

      impl<T> Deque<T> {
          pub fn new(max_size: usize) -> Self {
              Self {
                  inner: VecDeque::with_capacity(max_size),
                  max_size,
              }
          }

          pub fn push_back(&mut self, value: T) {
              if self.inner.len() >= self.max_size {
                  self.inner.pop_front();
              }
              self.inner.push_back(value);
          }

          pub fn pop_front(&mut self) -> Option<T> {
              self.inner.pop_front()
          }

          pub fn len(&self) -> usize {
              self.inner.len()
          }
      }
  changed_files:
    src/main.rs: |
      use std::collections::HashMap;
      use std::collections::HashSet;
      use std::collections::BTreeMap;

      fn main() {
          let mut map: HashMap<String, i32> = HashMap::new();
          map.insert("one".to_string(), 1);
          map.insert("two".to_string(), 2);

          let mut set: HashSet<i32> = HashSet::new();
          set.insert(1);
          set.insert(2);
          set.insert(3);

          let mut btree: BTreeMap<String, i32> = BTreeMap::new();
          btree.insert("alpha".to_string(), 100);
          btree.insert("beta".to_string(), 200);

          println!("HashMap: {:?}", map);
          println!("HashSet: {:?}", set);
          println!("BTreeMap: {:?}", btree);

          for (key, value) in &map {
              println!("{}: {}", key, value);
          }
      }
