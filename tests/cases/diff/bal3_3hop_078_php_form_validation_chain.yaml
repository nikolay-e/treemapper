      define('GARBAGE_078_HASH_A', 'bcrypt');
      define('GARBAGE_078_ROUNDS_B', 12);

      class Hasher {
          public function hash(string $value): string { return password_hash($value, PASSWORD_BCRYPT); }
      }
    src/Encryption/Encryptor.php: |
      <?php
      namespace App\Encryption;
      define('GARBAGE_078_ENCRYPT_C', 'aes');
      define('GARBAGE_078_KEY_D', 'secret');

