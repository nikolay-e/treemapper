  changed_files:
    src/Rules/ValidationRule.php: |
      <?php
      namespace App\Rules;

      interface ValidationRule {
          public function passes(string $field, mixed $value): bool;
          public function message(): string;
          public function priority(): int;
      }
    src/Rules/RequiredRule.php: |
      <?php
      namespace App\Rules;

      use App\Rules\ValidationRule;

      class RequiredRule implements ValidationRule {
          public function passes(string $field, mixed $value): bool {
              return $value !== null && $value !== '';
          }
          public function message(): string {
              return 'This field is required.';
          }
          public function priority(): int {
              return 100;
          }
      }
    src/Validation/Validator.php: |
      <?php
      namespace App\Validation;

      use App\Rules\ValidationRule;

      class Validator {
          private array $rules;
          public function __construct(array $rules) {
              $this->rules = $rules;
          }
          public function validate(array $data): array {
              $errors = [];
              foreach ($this->rules as $field => $fieldRules) {
                  usort($fieldRules, fn(ValidationRule $a, ValidationRule $b) => $b->priority() - $a->priority());
                  foreach ($fieldRules as $rule) {
                      if (!$rule->passes($field, $data[$field] ?? null)) {
                          $errors[$field][] = $rule->message();
                          break;
                      }
                  }
              }
              return $errors;
          }
      }
    src/Forms/FormHandler.php: |
      <?php
      namespace App\Forms;

      use App\Validation\Validator;

      class FormHandler {
          private Validator $validator;
          public function __construct(Validator $validator) {
              $this->validator = $validator;
          }
          public function handle(array $data): array {
              $errors = $this->validator->validate($data);
              if (!empty($errors)) {
                  return ['valid' => false, 'errors' => $errors];
              }
              return ['valid' => true];
          }
      }
    src/Controllers/RegistrationController.php: |
      <?php
      namespace App\Controllers;

