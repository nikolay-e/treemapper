name: kubernetes_003_container_port
tags:
- lang:python
- change:single_file
- change:config
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/main.py: |
      from fastapi import FastAPI
      from prometheus_client import make_asgi_app

      app = FastAPI()
      metrics_app = make_asgi_app()

      @app.get("/")
      def root():
          return {"status": "ok"}

      @app.get("/health")
      def health():
          return {"healthy": True}

      if __name__ == "__main__":
          import uvicorn
          uvicorn.run(app, host="0.0.0.0", port=8080)
    k8s/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fastapi-app
        namespace: default
        labels:
          app: fastapi-app
          version: v1
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: fastapi-app
        template:
          metadata:
            labels:
              app: fastapi-app
              version: v1
            annotations:
              prometheus.io/scrape: "true"
              prometheus.io/port: "9100"
          spec:
            containers:
            - name: app
              image: fastapi-app:latest
              ports:
              - containerPort: 3000
                name: http
                protocol: TCP
              env:
              - name: ENVIRONMENT
                value: "production"
              volumeMounts:
              - name: config
                mountPath: /app/config
            volumes:
            - name: config
              configMap:
                name: app-config
    k8s/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: fastapi-app
        namespace: default
      spec:
        selector:
          app: fastapi-app
        ports:
        - name: http
          port: 80
          targetPort: 8080
          protocol: TCP
    k8s/monitoring/prometheus-scrape.yaml: |
      apiVersion: monitoring.coreos.com/v1
      kind: ServiceMonitor
      metadata:
        name: fastapi-app-monitor
        namespace: monitoring
      spec:
        selector:
          matchLabels:
            app: fastapi-app
        endpoints:
        - port: metrics
          interval: 15s
          path: /metrics
    k8s/apps/worker/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: background-worker
        namespace: default
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: background-worker
        template:
          metadata:
            labels:
              app: background-worker
          spec:
            containers:
            - name: worker
              image: worker:v1.3.0
              command: ["python", "-m", "celery", "worker"]
              env:
              - name: BROKER_URL
                value: "redis://redis:6379/0"
