    src/main/kotlin/payment/PaymentProcessor.kt: |
      package payment

      import payment.gateway.GatewayClient
      import payment.model.ChargeRequest
      import payment.model.ChargeResponse

      class PaymentProcessor(private val gateway: GatewayClient) {
          fun charge(amount: Long, currency: String, cardToken: String): ChargeResponse {
              val request = ChargeRequest(amount, currency, cardToken)
              return gateway.submitCharge(request)
          }

          fun refund(chargeId: String, amount: Long): ChargeResponse {
              return gateway.submitRefund(chargeId, amount)
          }
      }
    src/main/kotlin/payment/gateway/GatewayClient.kt: |
      package payment.gateway

      import payment.model.ChargeRequest
      import payment.model.ChargeResponse

      class GatewayClient(private val endpoint: String) {
          fun submitCharge(request: ChargeRequest): ChargeResponse {
              return ChargeResponse(id = "ch_123", status = "succeeded", amount = request.amount)
          }

          fun submitRefund(chargeId: String, amount: Long): ChargeResponse {
              return ChargeResponse(id = chargeId, status = "refunded", amount = amount)
          }
      }
