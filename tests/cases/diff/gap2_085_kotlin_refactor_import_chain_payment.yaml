    src/main/scala/payments/ChargeService.scala: |
      package payments

      import payments.model.{Charge, ChargeStatus}
      import payments.gateway.StripeGateway

      class ChargeService(gateway: StripeGateway) {
        def createCharge(customerId: String, amountCents: Long, currency: String): Charge = {
          val charge = Charge(java.util.UUID.randomUUID().toString, customerId, amountCents, currency, ChargeStatus.Pending)
          gateway.submit(charge)
        }

        def refund(chargeId: String): Either[String, Charge] = {
          gateway.refund(chargeId)
        }
      }
    src/main/scala/payments/model/Charge.scala: |
      package payments.model

      sealed trait ChargeStatus
      object ChargeStatus {
        case object Pending extends ChargeStatus
        case object Succeeded extends ChargeStatus
        case object Failed extends ChargeStatus
        case object Refunded extends ChargeStatus
      }

      case class Charge(
        id: String,
        customerId: String,
        amountCents: Long,
        currency: String,
        status: ChargeStatus
      )
    src/main/scala/payments/gateway/StripeGateway.scala: |
      package payments.gateway

      import payments.model.{Charge, ChargeStatus}

      class StripeGateway(apiKey: String) {
        def submit(charge: Charge): Charge = {
          charge.copy(status = ChargeStatus.Succeeded)
        }

        def refund(chargeId: String): Either[String, Charge] = {
          Left("Charge not found")
        }
      }
    src/main/scala/subscriptions/BillingScheduler.scala: |
      package subscriptions

      import payments.ChargeService

      class BillingScheduler(chargeService: ChargeService) {
        def runMonthlyBilling(customerId: String): Unit = {
          chargeService.createCharge(customerId, 999L, "USD")
        }
      }
