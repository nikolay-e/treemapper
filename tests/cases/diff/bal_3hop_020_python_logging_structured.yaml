fragments:
- id: formatter_trace_id
  selector:
    path: logging/formatter.py
    anchor: "include_trace: bool = False"
- id: logger_uses_formatter
  selector:
    path: logging/logger.py
    anchor: "from logging.formatter import LogFormatter"
- id: manager_uses_logger
  selector:
    path: logging/manager.py
