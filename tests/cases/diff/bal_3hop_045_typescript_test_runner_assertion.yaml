- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/testing/matchers.ts: |
      export interface Matcher {
        name: string;
        check(actual: unknown, expected: unknown): boolean;
        message(actual: unknown, expected: unknown): string;
      }

      export const equalsMatcher: Matcher = {
        name: 'equals',
        check: (a, e) => a === e,
        message: (a, e) => `Expected ${e} but got ${a}`,
      };

      export const containsMatcher: Matcher = {
        name: 'contains',
        check: (a, e) => String(a).includes(String(e)),
        message: (a, e) => `Expected "${a}" to contain "${e}"`,
      };
    src/testing/assertion.ts: |
      import { Matcher, equalsMatcher, containsMatcher } from './matchers';

      export class Assertion {
        private matchers: Map<string, Matcher> = new Map();

        constructor() {
          this.matchers.set('equals', equalsMatcher);
          this.matchers.set('contains', containsMatcher);
        }

        assert(matcherName: string, actual: unknown, expected: unknown): void {
          const matcher = this.matchers.get(matcherName);
          if (!matcher) throw new Error(`Unknown matcher: ${matcherName}`);
          if (!matcher.check(actual, expected)) {
            throw new Error(matcher.message(actual, expected));
          }
        }
      }
    src/testing/suite.ts: |
      import { Assertion } from './assertion';

      export interface TestCase {
        name: string;
        fn: (assert: Assertion) => void;
      }

      export class TestSuite {
        private cases: TestCase[] = [];
        private assertion = new Assertion();

        add(name: string, fn: (assert: Assertion) => void): void {
          this.cases.push({ name, fn });
        }

        run(): { passed: number; failed: number; errors: string[] } {
          let passed = 0;
          let failed = 0;
          const errors: string[] = [];
          for (const tc of this.cases) {
            try {
              tc.fn(this.assertion);
              passed++;
            } catch (e: any) {
              failed++;
              errors.push(`${tc.name}: ${e.message}`);
            }
          }
          return { passed, failed, errors };
        }
      }
    src/testing/runner.ts: |
      import { TestSuite } from './suite';

      export class TestRunner {
        private suites: Map<string, TestSuite> = new Map();

        register(name: string, suite: TestSuite): void {
          this.suites.set(name, suite);
        }

        runAll(): void {
          for (const [name, suite] of this.suites) {
            const result = suite.run();
            console.log(`${name}: ${result.passed} passed, ${result.failed} failed`);
          }
        }
      }
    src/utils/diff.ts: |
      GARBAGE_045_DIFF_MARKER_A = "diff";
      GARBAGE_045_PATCH_MARKER_B = true;

      export function computeDiff(a: string, b: string): string[] {
        return [];
      }
    src/utils/snapshot.ts: |
      GARBAGE_045_SNAPSHOT_MARKER_C = "snapshot";
      GARBAGE_045_UPDATE_MARKER_D = false;

      export function saveSnapshot(name: string, data: string): void {}
      export function loadSnapshot(name: string): string { return ''; }
