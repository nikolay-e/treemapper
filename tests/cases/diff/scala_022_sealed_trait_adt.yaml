name: scala_022_sealed_trait_adt
repo:
  initial_files:
    Expression.scala: |
      sealed trait Expression
      case class Number(value: Double) extends Expression
      case class Add(left: Expression, right: Expression) extends Expression
      case class Multiply(left: Expression, right: Expression) extends Expression
      case class Variable(name: String) extends Expression
    Evaluator.scala: |
      class Evaluator {}
    PrettyPrinter.scala: |
      object PrettyPrinter {
        def format(expr: Expression, indent: Int = 0): String = {
          val prefix = "  " * indent
          expr match {
            case Number(v) => s"${prefix}Number($v)"
            case Variable(n) => s"${prefix}Variable($n)"
            case Add(l, r) =>
              s"${prefix}Add(\n${format(l, indent + 1)},\n${format(r, indent + 1)}\n${prefix})"
            case Multiply(l, r) =>
              s"${prefix}Multiply(\n${format(l, indent + 1)},\n${format(r, indent + 1)}\n${prefix})"
          }
        }
      }
    Parser.scala: |
      object Parser {
        def parse(input: String): Expression = {
          val trimmed = input.trim
          if (trimmed.forall(c => c.isDigit || c == '.')) {
            Number(trimmed.toDouble)
          } else if (trimmed.forall(_.isLetter)) {
            Variable(trimmed)
          } else {
            Number(0)
          }
        }
      }
  changed_files:
    Expression.scala: |
      sealed trait Expression
      case class Number(value: Double) extends Expression
      case class Add(left: Expression, right: Expression) extends Expression
      case class Multiply(left: Expression, right: Expression) extends Expression
      case class Variable(name: String) extends Expression
    Evaluator.scala: |
      class Evaluator {
        def evaluate(expr: Expression, vars: Map[String, Double] = Map.empty): Double = expr match {
          case Number(value) => value
          case Add(left, right) => evaluate(left, vars) + evaluate(right, vars)
          case Multiply(left, right) => evaluate(left, vars) * evaluate(right, vars)
          case Variable(name) => vars.getOrElse(name, 0.0)
        }

        def simplify(expr: Expression): Expression = expr match {
          case Add(Number(0), right) => simplify(right)
          case Add(left, Number(0)) => simplify(left)
          case Multiply(Number(1), right) => simplify(right)
          case Multiply(left, Number(1)) => simplify(left)
          case Multiply(Number(0), _) => Number(0)
          case Multiply(_, Number(0)) => Number(0)
          case Add(left, right) => Add(simplify(left), simplify(right))
          case Multiply(left, right) => Multiply(simplify(left), simplify(right))
          case other => other
        }
      }
    PrettyPrinter.scala: |
      object PrettyPrinter {
        def format(expr: Expression, indent: Int = 0): String = {
          val prefix = "  " * indent
          expr match {
            case Number(v) => s"${prefix}Number($v)"
            case Variable(n) => s"${prefix}Variable($n)"
            case Add(l, r) =>
              s"${prefix}Add(\n${format(l, indent + 1)},\n${format(r, indent + 1)}\n${prefix})"
            case Multiply(l, r) =>
              s"${prefix}Multiply(\n${format(l, indent + 1)},\n${format(r, indent + 1)}\n${prefix})"
          }
        }
      }
    Parser.scala: |
      object Parser {
        def parse(input: String): Expression = {
          val trimmed = input.trim
          if (trimmed.forall(c => c.isDigit || c == '.')) {
            Number(trimmed.toDouble)
          } else if (trimmed.forall(_.isLetter)) {
            Variable(trimmed)
          } else {
            Number(0)
          }
        }
      }
