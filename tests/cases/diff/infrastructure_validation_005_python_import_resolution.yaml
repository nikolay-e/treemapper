name: infrastructure_validation_005_python_import_resolution
tags:
- lang:python
- lang:shell
- change:single_file
- change:new_function
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    utils.py: |
      from typing import Any, Optional

      def helper() -> str:
          return "helper result"

      def format_output(data: Any) -> str:
          return f"Output: {data}"

      def validate_input(value: Optional[str]) -> bool:
          if value is None:
              return False
          return len(value.strip()) > 0

      def parse_config(raw: str) -> dict:
          lines = raw.strip().split('\n')
          result = {}
          for line in lines:
              if '=' in line:
                  key, val = line.split('=', 1)
                  result[key.strip()] = val.strip()
          return result
    services.py: |
      from utils import helper, format_output

      def run_pipeline() -> str:
          result = helper()
          return format_output(result)

      def process_batch(items: list) -> list:
          return [format_output(item) for item in items]
    main.py: |
      print("initial")
    scripts/run_pipeline.sh: |
      #!/bin/bash
      python main.py
    tests/test_utils.py: |
      def test_helper():
          pass
    docs/architecture.md: |
      # Architecture
    config/settings.ini: ''
  changed_files:
    utils.py: |
      from typing import Any, Optional

      def helper() -> str:
          return "helper result"

      def format_output(data: Any) -> str:
          return f"Output: {data}"

      def validate_input(value: Optional[str]) -> bool:
          if value is None:
              return False
          return len(value.strip()) > 0

      def parse_config(raw: str) -> dict:
          lines = raw.strip().split('\n')
          result = {}
          for line in lines:
              if '=' in line:
                  key, val = line.split('=', 1)
                  result[key.strip()] = val.strip()
          return result
    services.py: |
      from utils import helper, format_output

      def run_pipeline() -> str:
          result = helper()
          return format_output(result)

      def process_batch(items: list) -> list:
          return [format_output(item) for item in items]
    main.py: |
      from utils import helper

      def main():
          result = helper()
          print(result)

      if __name__ == "__main__":
          main()
    scripts/run_pipeline.sh: |
      #!/bin/bash
      python main.py
    tests/test_utils.py: |
      def test_helper():
          pass
    docs/architecture.md: |
      # Architecture
    config/settings.ini: ''
  commit_message: Update files
