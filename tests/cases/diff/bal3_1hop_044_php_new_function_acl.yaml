  changed_files:
    src/Auth/AccessControl.php: |
      <?php
      namespace App\Auth;

      class AccessControl
      {
          private array $permissions = [];
          private array $denied = [];

          public function grant(string $role, string $resource): void
          {
              $this->permissions[$role][] = $resource;
          }

          public function deny(string $role, string $resource): void
          {
              $this->denied[$role][] = $resource;
          }

          public function isAllowed(string $role, string $resource): bool
          {
              if (in_array($resource, $this->denied[$role] ?? [])) {
                  return false;
              }
              return in_array($resource, $this->permissions[$role] ?? []);
          }

          public function getRolePermissions(string $role): array
          {
              return $this->permissions[$role] ?? [];
          }

          public function revokeAll(string $role): void
          {
              unset($this->permissions[$role], $this->denied[$role]);
          }
      }
  commit_message: "Add deny, list, and revoke methods to AccessControl"
