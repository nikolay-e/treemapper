name: gap2_021_java_refactor_extract_validator_service
tags:
- lang:elixir
- change:new_function
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    lib/iot/device.ex: |
      defmodule IoT.Device do
        defstruct [:id, :type, :firmware_version, :readings]

        def latest_reading(%__MODULE__{readings: readings}) when readings != [] do
          List.last(readings)
        end
        def latest_reading(_), do: nil

        def add_reading(%__MODULE__{} = device, value) do
          %{device | readings: device.readings ++ [value]}
        end
      end
    lib/iot/aggregator.ex: |
      defmodule IoT.Aggregator do
        alias IoT.Device

        def mean_reading(%Device{readings: readings}) when readings != [] do
          Enum.sum(readings) / length(readings)
        end
        def mean_reading(_), do: nil
      end
    lib/iot/alert_engine.ex: |
      defmodule IoT.AlertEngine do
        alias IoT.Aggregator

        def check_threshold(device, threshold) do
          case Aggregator.mean_reading(device) do
            nil -> :no_data
            mean when mean > threshold -> {:alert, mean}
            _ -> :ok
          end
        end
      end
    garbage/Provisioner.ex: |
