    src/main/java/com/warehouse/InventoryService.java: |
      package com.warehouse;

      import java.util.List;
      import java.util.stream.Collectors;

      public class InventoryService {
          private final InventoryRepository repository;
          private final ShipmentValidator validator;

          public InventoryService(InventoryRepository repository, ShipmentValidator validator) {
              this.repository = repository;
              this.validator = validator;
          }

          public void receiveShipment(String sku, int quantity) {
              validator.validate(sku, quantity);
              Item item = repository.findBySku(sku);
              item.addStock(quantity);
              repository.save(item);
          }

          public List<Item> getLowStockItems(int threshold) {
              return repository.findAll().stream()
                  .filter(i -> i.getStock() < threshold)
                  .collect(Collectors.toList());
          }
      }
