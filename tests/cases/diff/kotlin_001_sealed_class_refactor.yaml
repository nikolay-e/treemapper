repo:
  initial_files:
    src/main/kotlin/domain/Result.kt: |
      package domain

      class Success<T>(val data: T)
      class Failure(val error: String, val code: Int)

      fun <T> isSuccess(result: Any): Boolean {
          return result is Success<*>
      }
    src/main/kotlin/service/UserService.kt: |
      package service

      import domain.Success
      import domain.Failure
      import repository.UserRepository

      class UserService(private val repo: UserRepository) {
          fun findUser(id: String): Any {
              val user = repo.findById(id)
              return if (user != null) {
                  Success(user)
              } else {
                  Failure("User not found", 404)
              }
          }

          fun deleteUser(id: String): Any {
              return if (repo.delete(id)) {
                  Success(Unit)
              } else {
                  Failure("Delete failed", 500)
              }
          }
      }
    src/main/kotlin/repository/UserRepository.kt: |
      package repository

      data class User(val id: String, val name: String, val email: String)

      class UserRepository {
          private val users = mutableMapOf<String, User>()

          fun findById(id: String): User? = users[id]

          fun save(user: User) {
              users[user.id] = user
          }

          fun delete(id: String): Boolean {
              return users.remove(id) != null
          }
      }
    src/main/kotlin/api/UserController.kt: |
      package api

      import service.UserService
      import domain.Success
      import domain.Failure

      class UserController(private val service: UserService) {
          fun getUser(id: String): String {
              val result = service.findUser(id)
              return when (result) {
                  is Success<*> -> "200: ${result.data}"
                  is Failure -> "${result.code}: ${result.error}"
                  else -> "500: Unknown"
              }
          }
      }
    src/main/kotlin/util/Logging.kt: |
      package util

      object Logging {
          fun info(message: String) {
              println("[INFO] $message")
          }

          fun error(message: String) {
              println("[ERROR] $message")
          }

          fun debug(message: String) {
              println("[DEBUG] $message")
          }
      }
    src/main/kotlin/util/Metrics.kt: |
      package util

      object Metrics {
          private val counters = mutableMapOf<String, Long>()

          fun increment(name: String) {
              counters[name] = (counters[name] ?: 0) + 1
          }

          fun get(name: String): Long = counters[name] ?: 0
      }
  changed_files:
    src/main/kotlin/domain/Result.kt: |
      package domain

      sealed class Result<out T> {
          data class Success<T>(val data: T) : Result<T>()
          data class Failure(val error: String, val code: Int) : Result<Nothing>()
      }

      fun <T> Result<T>.getOrNull(): T? = when (this) {
          is Result.Success -> data
          is Result.Failure -> null
      }
    src/main/kotlin/service/UserService.kt: |
      package service

      import domain.Result
      import repository.UserRepository

      class UserService(private val repo: UserRepository) {
          fun findUser(id: String): Result<repository.User> {
              val user = repo.findById(id)
              return if (user != null) {
                  Result.Success(user)
              } else {
                  Result.Failure("User not found", 404)
              }
          }

          fun deleteUser(id: String): Result<Unit> {
              return if (repo.delete(id)) {
                  Result.Success(Unit)
              } else {
                  Result.Failure("Delete failed", 500)
              }
          }
      }
    src/main/kotlin/repository/UserRepository.kt: |
      package repository

      data class User(val id: String, val name: String, val email: String)

      class UserRepository {
          private val users = mutableMapOf<String, User>()

          fun findById(id: String): User? = users[id]

          fun save(user: User) {
              users[user.id] = user
          }

          fun delete(id: String): Boolean {
              return users.remove(id) != null
          }
      }
    src/main/kotlin/api/UserController.kt: |
      package api

      import service.UserService
      import domain.Result

      class UserController(private val service: UserService) {
          fun getUser(id: String): String {
              return when (val result = service.findUser(id)) {
                  is Result.Success -> "200: ${result.data}"
                  is Result.Failure -> "${result.code}: ${result.error}"
              }
          }
      }
    src/main/kotlin/util/Logging.kt: |
      package util

      object Logging {
          fun info(message: String) {
              println("[INFO] $message")
          }

          fun error(message: String) {
              println("[ERROR] $message")
          }

          fun debug(message: String) {
              println("[DEBUG] $message")
          }
      }
    src/main/kotlin/util/Metrics.kt: |
      package util

      object Metrics {
          private val counters = mutableMapOf<String, Long>()

          fun increment(name: String) {
              counters[name] = (counters[name] ?: 0) + 1
          }

          fun get(name: String): Long = counters[name] ?: 0
      }
  commit_message: "refactor: replace loose Result classes with sealed class hierarchy"
