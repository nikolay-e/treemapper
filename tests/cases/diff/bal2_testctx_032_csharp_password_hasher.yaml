    src/Security/PasswordHasher.cs: |
      using System;
      using System.Security.Cryptography;
      using System.Text;

      namespace App.Security
      {
          public class PasswordHasher
          {
              public string Hash(string password)
              {
                  using var sha256 = SHA256.Create();
                  var bytes = sha256.ComputeHash(Encoding.UTF8.GetBytes(password));
                  return Convert.ToBase64String(bytes);
              }

              public bool Verify(string password, string hash)
              {
                  return Hash(password) == hash;
              }
          }
      }
    Tests/PasswordHasherTests.cs: |
      using Xunit;
      using App.Security;

      namespace App.Tests
      {
          public class PasswordHasherTests
          {
              private readonly PasswordHasher _hasher = new PasswordHasher();

              [Fact]
              public void Hash_SameInput_ProducesSameOutput()
              {
                  var h1 = _hasher.Hash("password123");
                  var h2 = _hasher.Hash("password123");
                  Assert.Equal(h1, h2);
              }

              [Fact]
              public void Verify_CorrectPassword_ReturnsTrue()
              {
                  var hash = _hasher.Hash("secret");
                  Assert.True(_hasher.Verify("secret", hash));
              }

              [Fact]
              public void Verify_WrongPassword_ReturnsFalse()
              {
                  var hash = _hasher.Hash("secret");
                  Assert.False(_hasher.Verify("wrong", hash));
              }
          }
      }
    src/Logging/FileLogger.cs: |
      using System;
      using System.IO;

      namespace App.Logging
