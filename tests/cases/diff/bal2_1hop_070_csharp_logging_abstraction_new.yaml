    src/Logging/ConsoleLogger.cs: |
      using System;
      using App.Logging;

      namespace App.Logging
      {
          public class ConsoleLogger : IAppLogger
          {
              public void Info(string message)
              {
                  Console.WriteLine($"[INFO] {message}");
              }

              public void Warn(string message)
              {
                  Console.WriteLine($"[WARN] {message}");
              }

              public void Error(string message, Exception ex)
              {
                  Console.WriteLine($"[ERROR] {message}: {ex.Message}");
              }
          }
      }
    src/Services/OrderService.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Logging;

      namespace App.Services
      {
          public class OrderService
          {
              private readonly IAppLogger _logger;

              public OrderService(IAppLogger logger)
              {
                  _logger = logger;
              }

              public async Task PlaceOrder(string orderId)
              {
                  _logger.Info($"Placing order {orderId}");
                  await Task.Delay(50);
                  _logger.Info($"Order {orderId} placed");
              }
          }
      }
    src/Services/ShippingService.cs: |
      using System;
      using App.Logging;

      namespace App.Services
      {
          public class ShippingService
          {
              private readonly IAppLogger _logger;

              public ShippingService(IAppLogger logger)
              {
                  _logger = logger;
              }

              public void Ship(string orderId)
              {
                  _logger.Info($"Shipping order {orderId}");
              }
          }
      }
    src/Middleware/ErrorHandlingMiddleware.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Logging;
      using Microsoft.AspNetCore.Http;

      namespace App.Middleware
      {
          public class ErrorHandlingMiddleware
          {
              private readonly RequestDelegate _next;
              private readonly IAppLogger _logger;

              public ErrorHandlingMiddleware(RequestDelegate next, IAppLogger logger)
              {
                  _next = next;
                  _logger = logger;
              }

              public async Task InvokeAsync(HttpContext context)
              {
                  try
                  {
                      await _next(context);
                  }
                  catch (Exception ex)
                  {
                      _logger.Error("Unhandled exception", ex);
                      context.Response.StatusCode = 500;
                  }
              }
          }
      }
