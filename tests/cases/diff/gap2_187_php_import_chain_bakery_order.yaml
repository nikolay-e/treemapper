  changed_files:
    src/Bakery/OrderTracker.php: |
      <?php

      namespace App\Bakery;

      use App\Bakery\Recipe\RecipeBook;

      class OrderTracker
      {
          private RecipeBook $recipes;
          private array $orders = [];

          public function __construct(RecipeBook $recipes)
          {
              $this->recipes = $recipes;
          }

          public function placeOrder(string $pastryName, int $qty): string
          {
              $id = 'ORD-' . uniqid();
              $this->orders[$id] = [
                  'pastry' => $pastryName,
                  'qty' => $qty,
                  'status' => 'pending',
              ];
              return $id;
          }

          public function markComplete(string $orderId): bool
          {
              if (!isset($this->orders[$orderId])) {
                  return false;
              }
              $this->orders[$orderId]['status'] = 'complete';
              return true;
          }

          public function pendingCount(): int
          {
              $count = 0;
              foreach ($this->orders as $order) {
                  if ($order['status'] === 'pending') {
                      $count++;
                  }
              }
              return $count;
          }
      }
  commit_message: "feat: add order completion tracking"
