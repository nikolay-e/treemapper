  changed_files:
    src/physics/body.zig: |
      const std = @import("std");
      const shape = @import("shape.zig");

      pub const RigidBody = struct {
          mass: f32,
          restitution: f32,
          friction: f32,
          position_x: f32,
          position_y: f32,
          velocity_x: f32,
          velocity_y: f32,
          collider: shape.AABB,

          pub fn applyForce(self: *RigidBody, fx: f32, fy: f32) void {
              self.velocity_x += fx / self.mass;
              self.velocity_y += fy / self.mass;
          }

          pub fn integrate(self: *RigidBody, dt: f32) void {
              self.position_x += self.velocity_x * dt;
              self.position_y += self.velocity_y * dt;
              self.velocity_x *= (1.0 - self.friction * dt);
              self.velocity_y *= (1.0 - self.friction * dt);
          }
      };
    src/physics/shape.zig: |
      const narrow = @import("narrow.zig");

      pub const AABB = struct {
          min_x: f32,
          min_y: f32,
          max_x: f32,
          max_y: f32,

          pub fn overlaps(self: AABB, other: AABB) bool {
              return narrow.testOverlap(self, other);
          }

          pub fn area(self: AABB) f32 {
              return (self.max_x - self.min_x) * (self.max_y - self.min_y);
          }

          pub fn expand(self: AABB, margin: f32) AABB {
              return AABB{
                  .min_x = self.min_x - margin,
                  .min_y = self.min_y - margin,
                  .max_x = self.max_x + margin,
                  .max_y = self.max_y + margin,
              };
          }
      };
    src/physics/narrow.zig: |
      const shape_mod = @import("shape.zig");

      pub fn testOverlap(a: shape_mod.AABB, b: shape_mod.AABB) bool {
          if (a.max_x < b.min_x or a.min_x > b.max_x) return false;
          if (a.max_y < b.min_y or a.min_y > b.max_y) return false;
          return true;
      }

      pub fn penetrationDepth(a: shape_mod.AABB, b: shape_mod.AABB) f32 {
          const overlap_x = @min(a.max_x, b.max_x) - @max(a.min_x, b.min_x);
          const overlap_y = @min(a.max_y, b.max_y) - @max(a.min_y, b.min_y);
          return @min(overlap_x, overlap_y);
      }
    src/physics/solver.zig: |
      const body_mod = @import("body.zig");

      pub fn resolveCollision(a: *body_mod.RigidBody, b: *body_mod.RigidBody) void {
          const rel_vx = a.velocity_x - b.velocity_x;
          const e = @min(a.restitution, b.restitution);
          const impulse = -(1.0 + e) * rel_vx / (1.0 / a.mass + 1.0 / b.mass);
          a.velocity_x += impulse / a.mass;
          b.velocity_x -= impulse / b.mass;
      }
    src/ui/menu.zig: |
      const std = @import("std");

      const TRAP_GAP_191_MENU_MARKER_A: []const u8 = "menu_noise";
      const TRAP_GAP_191_MENU_FLAG_B: bool = false;

      pub fn showMainMenu() void {}

      pub fn showPauseMenu() void {}

      pub fn hideAll() void {}
    src/audio/sfx.zig: |
