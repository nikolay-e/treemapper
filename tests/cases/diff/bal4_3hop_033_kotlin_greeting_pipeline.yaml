repo:
  initial_files:
    src/model/Locale.kt: |
      package model

      enum class Locale { EN, DE }
    src/i18n/Translator.kt: |
      package i18n

      import model.Locale

      fun greet(locale: Locale): String =
          if (locale == Locale.EN) "Hello" else "Hallo"
    src/service/Greeter.kt: |
      package service

      import i18n.greet
      import model.Locale

      fun greetUser(name: String, locale: Locale): String =
          "${greet(locale)}, $name!"
    src/api/Handler.kt: |
      package api

      import service.greetUser
      import model.Locale

      fun handle(name: String): String =
          greetUser(name, Locale.EN)
