repo:
  initial_files:
    src/renderer/mesh_renderer.hpp: |
      #pragma once
      #include <vector>
      #include <string>

      namespace renderer {

      struct Vertex {
          float x, y, z;
      };

      class MeshRenderer {
      public:
          void draw(const std::vector<Vertex>& vertices);
      };

      }
    src/renderer/mesh_renderer.cpp: |
      #include "mesh_renderer.hpp"

      namespace renderer {

      void MeshRenderer::draw(const std::vector<Vertex>& vertices) {
          for (const auto& v : vertices) {
              // submit vertex to GPU
          }
      }

      }
    src/scene/scene_graph.hpp: |
      #pragma once
      #include <vector>
      #include <memory>

      namespace scene {

      class SceneNode {
      public:
          virtual void render() = 0;
          virtual ~SceneNode() = default;
      };

      class SceneGraph {
      public:
          void add_node(std::shared_ptr<SceneNode> node);
          void render_all();
      private:
          std::vector<std::shared_ptr<SceneNode>> nodes_;
      };

      }
    src/scene/scene_graph.cpp: |
      #include "scene_graph.hpp"
      #include "../renderer/mesh_renderer.hpp"

      namespace scene {

      void SceneGraph::add_node(std::shared_ptr<SceneNode> node) {
          nodes_.push_back(std::move(node));
      }

      void SceneGraph::render_all() {
          for (auto& node : nodes_) {
              node->render();
          }
      }

      }
    src/utils/math_utils.hpp: |
      #pragma once

      namespace utils {

      inline float lerp(float a, float b, float t) {
          return a + (b - a) * t;
      }

      }
