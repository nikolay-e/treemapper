    src/lazy_evaluator.py: |
      from typing import Callable, Any, Optional

      class LazyEvaluator:
          def __init__(self, thunk: Callable[[], Any]):
              self.thunk = thunk
              self.cached: Optional[Any] = None
              self.evaluated = False

          def evaluate(self) -> Any:
              if not self.evaluated:
                  self.cached = self.thunk()
                  self.evaluated = True
              return self.cached

          def reset(self) -> None:
              self.cached = None
              self.evaluated = False
    src/coroutine_pool.py: |
      from typing import Callable, List
      import asyncio

      class CoroutinePool:
          def __init__(self, max_concurrency: int = 10):
              self.max_concurrency = max_concurrency
              self.semaphore = asyncio.Semaphore(max_concurrency)

          async def submit(self, coro: Callable) -> Any:
              async with self.semaphore:
                  return await coro()

          async def map(self, coro_factory: Callable, items: List) -> list:
              tasks = [self.submit(lambda item=item: coro_factory(item)) for item in items]
              return await asyncio.gather(*tasks)
