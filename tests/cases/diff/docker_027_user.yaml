name: docker_027_user
tags:
- lang:python
- lang:shell
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/app.py: |
      import os
      import pwd
      from flask import Flask, jsonify

      app = Flask(__name__)

      @app.route('/whoami')
      def whoami():
          return jsonify(
              uid=os.getuid(),
              gid=os.getgid(),
              user=pwd.getpwuid(os.getuid()).pw_name
          )

      @app.route('/health')
      def health():
          return jsonify(status='ok')

      if __name__ == '__main__':
          app.run(host='0.0.0.0', port=8080)
    requirements.txt: |
      flask==2.3.0
      gunicorn==21.2.0
    Dockerfile: |
      FROM python:3.11-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY src/ ./src/
      CMD ["python", "src/app.py"]
    scripts/setup_user.sh: |
      #!/bin/bash
      useradd -m -u 1000 appuser
      chown -R appuser:appuser /app
    k8s/pod-security.yaml: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: secure-app
      spec:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
        containers:
          - name: app
            securityContext:
              allowPrivilegeEscalation: false
    compliance/checks.yaml: |
      checks:
        - name: non-root-container
          description: Container must not run as root
          target_uid: 1000
  changed_files:
    src/app.py: |
      import os
      import pwd
      from flask import Flask, jsonify

      app = Flask(__name__)

      @app.route('/whoami')
      def whoami():
          return jsonify(
              uid=os.getuid(),
              gid=os.getgid(),
              user=pwd.getpwuid(os.getuid()).pw_name
          )

      @app.route('/health')
      def health():
          return jsonify(status='ok')

      if __name__ == '__main__':
          app.run(host='0.0.0.0', port=8080)
    requirements.txt: |
      flask==2.3.0
      gunicorn==21.2.0
    Dockerfile: |
      FROM python:3.12-slim-bookworm AS base
      ENV PYTHONDONTWRITEBYTECODE=1
      ENV PYTHONUNBUFFERED=1

      FROM base AS dependencies
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt

      FROM base AS production
      WORKDIR /app

      # Create non-root user with specific UID/GID for Kubernetes compatibility
      RUN groupadd --gid 1000 appgroup && \
          useradd --uid 1000 --gid appgroup --shell /bin/bash --create-home appuser && \
          mkdir -p /app/data /app/logs && \
          chown -R appuser:appgroup /app

      COPY --from=dependencies /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages
      COPY --from=dependencies /usr/local/bin /usr/local/bin
      COPY --chown=appuser:appgroup src/ ./src/

      # Switch to non-root user
      USER appuser:appgroup

      EXPOSE 8080

      HEALTHCHECK --interval=30s --timeout=5s \
          CMD curl -f http://localhost:8080/health || exit 1

      CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:8080", "src.app:app"]
    scripts/setup_user.sh: |
      #!/bin/bash
      useradd -m -u 1000 appuser
      chown -R appuser:appuser /app
    k8s/pod-security.yaml: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: secure-app
      spec:
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
        containers:
          - name: app
            securityContext:
              allowPrivilegeEscalation: false
    compliance/checks.yaml: |
      checks:
        - name: non-root-container
          description: Container must not run as root
          target_uid: 1000
  commit_message: Update files
fragments:
- id: app
  selector:
    path: src/app.py
    anchor: os.getuid()
- id: app_1
  selector:
    path: src/app.py
    anchor: os.getgid()
- id: requirements
  selector:
    path: requirements.txt
    anchor: gunicorn==21.2.0
- id: dockerfile_file
  selector:
    path: Dockerfile
- id: no_setup_user
  selector:
    path: scripts/setup_user.sh
- id: no_pod_security
  selector:
    path: k8s/pod-security.yaml
- id: no_checks
  selector:
    path: compliance/checks.yaml
oracle:
  required:
  - app
  - app_1
  - requirements
  - dockerfile_file
  allowed: []
  forbidden:
  - no_setup_user
  - no_pod_security
  - no_checks
