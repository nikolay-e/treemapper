    internal/storage/cache.go: |
      package storage

      import (
          "sync"
          "time"
      )

      type CacheEntry struct {
          Value     interface{}
          ExpiresAt time.Time
      }

      type MemoryCache struct {
          mu      sync.RWMutex
          entries map[string]CacheEntry
          ttl     time.Duration
      }

      func NewMemoryCache(ttl time.Duration) *MemoryCache {
          return &MemoryCache{
              entries: make(map[string]CacheEntry),
              ttl:     ttl,
          }
      }

      func (c *MemoryCache) Get(key string) (interface{}, bool) {
          c.mu.RLock()
          defer c.mu.RUnlock()
          entry, ok := c.entries[key]
          if !ok || time.Now().After(entry.ExpiresAt) {
              return nil, false
          }
          return entry.Value, true
      }

      func (c *MemoryCache) Set(key string, value interface{}) {
          c.mu.Lock()
          defer c.mu.Unlock()
          c.entries[key] = CacheEntry{
              Value:     value,
              ExpiresAt: time.Now().Add(c.ttl),
          }
      }
    internal/service/lookup.go: |
      package service

      import (
          "fmt"
          "mymodule/internal/storage"
          "time"
      )

      type LookupService struct {
          cache *storage.MemoryCache
      }

      func NewLookupService() *LookupService {
          return &LookupService{
              cache: storage.NewMemoryCache(5 * time.Minute),
          }
      }

      func (ls *LookupService) Resolve(domain string) (string, error) {
          if val, ok := ls.cache.Get(domain); ok {
              return val.(string), nil
          }
          addr := fmt.Sprintf("192.168.1.%d", len(domain)%255)
          ls.cache.Set(domain, addr)
          return addr, nil
      }
