      from typing import Dict, Any, Optional, List
      from dataclasses import dataclass
      from datetime import datetime, timedelta
      import hashlib

      @dataclass
      class SessionData:
          session_id: str
          user_id: int
          created_at: datetime
          expires_at: datetime
          ip_address: str

      class SessionManager:
          def __init__(self, max_sessions_per_user: int = 5):
              self._sessions: Dict[str, SessionData] = {}
              self._max_sessions = max_sessions_per_user

          def create_session(self, user_id: int, ip_address: str) -> SessionData:
              session_id = hashlib.sha256(
                  f"{user_id}{datetime.now().isoformat()}".encode()
              ).hexdigest()[:32]
              session = SessionData(
                  session_id=session_id,
                  user_id=user_id,
                  created_at=datetime.now(),
                  expires_at=datetime.now() + timedelta(hours=24),
                  ip_address=ip_address,
              )
              self._sessions[session_id] = session
              return session

          def validate_session(self, session_id: str) -> Optional[SessionData]:
              session = self._sessions.get(session_id)
              if session and datetime.now() < session.expires_at:
                  return session
              return None

          def revoke_session(self, session_id: str) -> bool:
              return self._sessions.pop(session_id, None) is not None
    handlers/notification.py: |
      from typing import Dict, Any, List, Optional
      from dataclasses import dataclass
      from datetime import datetime

      @dataclass
      class UserNotification:
          user_id: int
          message: str
          notification_type: str
          read: bool = False
          created_at: Optional[datetime] = None

      class NotificationHandler:
          def __init__(self):
              self._notifications: List[UserNotification] = []

          def send_notification(self, user_id: int, message: str, notification_type: str = "info") -> None:
              self._notifications.append(UserNotification(
                  user_id=user_id,
                  message=message,
                  notification_type=notification_type,
                  created_at=datetime.now(),
              ))

          def get_unread(self, user_id: int) -> List[UserNotification]:
              return [n for n in self._notifications if n.user_id == user_id and not n.read]

          def mark_read(self, user_id: int) -> int:
              count = 0
              for n in self._notifications:
                  if n.user_id == user_id and not n.read:
                      n.read = True
                      count += 1
              return count
