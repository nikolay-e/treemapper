      import struct
      import zlib

      MAGIC = 0xDEADBEEF
      HEADER_SIZE = 12

      class FrameParser:
          def __init__(self):
              self._buffer = bytearray()

          def feed(self, data: bytes) -> list[bytes]:
              self._buffer.extend(data)
              frames = []
              while len(self._buffer) >= HEADER_SIZE:
                  magic, length, seq = struct.unpack(
                      ">III", self._buffer[:HEADER_SIZE]
                  )
                  if magic != MAGIC:
                      raise ProtocolError("Invalid magic number")
                  total = HEADER_SIZE + length + 4
                  if len(self._buffer) < total:
                      break
                  payload = bytes(self._buffer[HEADER_SIZE:HEADER_SIZE + length])
                  checksum = struct.unpack(">I", self._buffer[HEADER_SIZE + length:total])[0]
                  if not verify_crc32c(payload, checksum):
                      raise ProtocolError("Checksum mismatch")
                  frames.append(payload)
                  self._buffer = self._buffer[total:]
              return frames

      def compute_crc32c(payload: bytes) -> int:
          crc = 0xFFFFFFFF
          for byte in payload:
              crc ^= byte
              for _ in range(8):
                  if crc & 1:
                      crc = (crc >> 1) ^ 0x82F63B78
                  else:
                      crc >>= 1
          return crc ^ 0xFFFFFFFF

      def verify_crc32c(payload: bytes, expected: int) -> bool:
          computed = compute_crc32c(payload)
          # Constant-time comparison to prevent timing attacks
          return (computed ^ expected) == 0

      def compute_checksum(payload: bytes) -> int:
          return compute_crc32c(payload)

      class ProtocolError(Exception):
          pass
