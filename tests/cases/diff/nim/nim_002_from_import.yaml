  src/scanner.nim: |
    from os import walkDir, joinPath, pcFile, pcDir
    import pathhelper

    proc scanDirectory*(root: string): seq[string] =
      var results: seq[string] = @[]
      for kind, path in walkDir(root):
        if kind == pcFile:
          results.add(path)
      results

    proc scanWithFilter*(root: string, pattern: string): seq[string] =
      var results: seq[string] = @[]
      for kind, path in walkDir(root):
        if kind == pcFile and matchesPattern(path, pattern):
          results.add(normalizePath(path))
      results

    proc scanRecursive*(root: string, pattern: string): seq[string] =
      var results: seq[string] = @[]
      for kind, path in walkDir(root):
        case kind
        of pcFile:
          if matchesPattern(path, pattern) and not isHidden(path):
            results.add(path)
        of pcDir:
          if not isHidden(path):
            results.add(scanRecursive(path, pattern))
        else:
          discard
      results

