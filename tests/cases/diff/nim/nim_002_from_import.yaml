must_include_files:
  - src/scanner.nim

must_include_content_from:
  src/scanner.nim:
    - "proc scanWithFilter*(root: string, pattern: string): seq[string]"
    - "matchesPattern(path, pattern)"
    - "normalizePath(path)"
  src/pathhelper.nim:
    - "proc matchesPattern*(path: string, pattern: string): bool"
    - "proc normalizePath*(path: string): string"

must_not_include:
  # fileops.nim: path-related module but no pattern matching
  - GARBAGE_NIM_002_A
  - GARBAGE_NIM_002_B
  - readFileContent
  - writeFileContent
  # formathelper.nim: formatting utility, unrelated
  - GARBAGE_NIM_002_C
  - GARBAGE_NIM_002_D
  - formatSize
  - formatPath
