name: nim_001_import_module
repo:
  initial_files:
    src/mymodule.nim: |
      type
        UserProfile* = object
          name*: string
          age*: int
          email*: string

      proc newUserProfile*(name: string, age: int, email: string): UserProfile =
        UserProfile(name: name, age: age, email: email)

      proc isAdult*(profile: UserProfile): bool =
        profile.age >= 18

      proc displayName*(profile: UserProfile): string =
        profile.name & " <" & profile.email & ">"
    src/app.nim: |
      import strutils, sequtils
      import mymodule

      proc listActiveUsers*(profiles: seq[UserProfile]): seq[string] =
        profiles.filterIt(it.isAdult).mapIt(it.displayName)
    src/database.nim: |
      type
        DbConnection* = object
          host*: string
          port*: int
          dbName*: string

        QueryResult* = object
          rows*: seq[seq[string]]
          columnCount*: int

      let GARBAGE_NIM_001_A = "db_marker"
      let GARBAGE_NIM_001_B = "query_marker"

      proc connect*(host: string, port: int, dbName: string): DbConnection =
        DbConnection(host: host, port: port, dbName: dbName)

      proc execute*(conn: DbConnection, query: string): QueryResult =
        QueryResult(rows: @[], columnCount: 0)
    src/logging.nim: |
      import times

      type
        LogLevel* = enum
          llDebug, llInfo, llWarn, llError

      let GARBAGE_NIM_001_C = "log_marker"
      let GARBAGE_NIM_001_D = "level_marker"

      proc log*(level: LogLevel, msg: string) =
        echo "[" & $level & "] " & $now() & " - " & msg

      proc logInfo*(msg: string) =
        log(llInfo, msg)

      proc logError*(msg: string) =
        log(llError, msg)
    src/config.nim: |
      import parsecfg

      type
        AppConfig* = object
          serverHost*: string
          serverPort*: int
          debug*: bool

      let GARBAGE_NIM_001_E = "config_marker"
      let GARBAGE_NIM_001_F = "env_marker"

      proc loadConfig*(filename: string): AppConfig =
        let dict = loadConfig(filename)
        AppConfig(
          serverHost: dict.getSectionValue("server", "host"),
          serverPort: parseInt(dict.getSectionValue("server", "port")),
          debug: parseBool(dict.getSectionValue("server", "debug"))
        )
  changed_files:
    src/mymodule.nim: |
      type
        UserProfile* = object
          name*: string
          age*: int
          email*: string

      proc newUserProfile*(name: string, age: int, email: string): UserProfile =
        UserProfile(name: name, age: age, email: email)

      proc isAdult*(profile: UserProfile): bool =
        profile.age >= 18

      proc displayName*(profile: UserProfile): string =
        profile.name & " <" & profile.email & ">"
    src/app.nim: |
      import strutils, sequtils
      import mymodule

      proc listActiveUsers*(profiles: seq[UserProfile]): seq[string] =
        profiles.filterIt(it.isAdult).mapIt(it.displayName)

      proc createDefaultProfile*(name: string): UserProfile =
        newUserProfile(name, 0, name.toLowerAscii & "@example.com")

      proc summarizeProfiles*(profiles: seq[UserProfile]): string =
        let names = profiles.mapIt(it.name).join(", ")
        let ages = profiles.mapIt($it.age).join(", ")
        "Users: " & names & " | Ages: " & ages
    src/database.nim: |
      type
        DbConnection* = object
          host*: string
          port*: int
          dbName*: string

        QueryResult* = object
          rows*: seq[seq[string]]
          columnCount*: int

      let GARBAGE_NIM_001_A = "db_marker"
      let GARBAGE_NIM_001_B = "query_marker"

      proc connect*(host: string, port: int, dbName: string): DbConnection =
        DbConnection(host: host, port: port, dbName: dbName)

      proc execute*(conn: DbConnection, query: string): QueryResult =
        QueryResult(rows: @[], columnCount: 0)
    src/logging.nim: |
      import times

      type
        LogLevel* = enum
          llDebug, llInfo, llWarn, llError

      let GARBAGE_NIM_001_C = "log_marker"
      let GARBAGE_NIM_001_D = "level_marker"

      proc log*(level: LogLevel, msg: string) =
        echo "[" & $level & "] " & $now() & " - " & msg

      proc logInfo*(msg: string) =
        log(llInfo, msg)

      proc logError*(msg: string) =
        log(llError, msg)
    src/config.nim: |
      import parsecfg

      type
        AppConfig* = object
          serverHost*: string
          serverPort*: int
          debug*: bool

      let GARBAGE_NIM_001_E = "config_marker"
      let GARBAGE_NIM_001_F = "env_marker"

      proc loadConfig*(filename: string): AppConfig =
        let dict = loadConfig(filename)
        AppConfig(
          serverHost: dict.getSectionValue("server", "host"),
          serverPort: parseInt(dict.getSectionValue("server", "port")),
          debug: parseBool(dict.getSectionValue("server", "debug"))
        )
  commit_message: Update files
