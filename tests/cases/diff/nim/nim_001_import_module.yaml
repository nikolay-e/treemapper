must_include_files:
  - src/app.nim

must_include_content_from:
  src/app.nim:
    - "proc createDefaultProfile*(name: string): UserProfile"
    - "newUserProfile(name, 0"
    - "proc summarizeProfiles*(profiles: seq[UserProfile]): string"
  src/mymodule.nim:
    - "UserProfile* = object"
    - "proc newUserProfile*(name: string, age: int, email: string): UserProfile"

must_not_include:
  # database.nim: unrelated module with its own types
  - GARBAGE_NIM_001_A
  - GARBAGE_NIM_001_B
  - DbConnection
  - QueryResult
  # logging.nim: utility module, no UserProfile dependency
  - GARBAGE_NIM_001_C
  - GARBAGE_NIM_001_D
  - LogLevel
  # config.nim: configuration module, unrelated types
  - GARBAGE_NIM_001_E
  - GARBAGE_NIM_001_F
  - AppConfig

must_not_include_files:
  - src/database.nim
  - src/logging.nim
  - src/config.nim

max_fragments: 8
max_files: 2
add_garbage_files: false
skip_garbage_check: true
