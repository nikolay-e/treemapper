  src/app.nim: |
    import strutils, sequtils
    import mymodule

    proc listActiveUsers*(profiles: seq[UserProfile]): seq[string] =
      profiles.filterIt(it.isAdult).mapIt(it.displayName)

    proc createDefaultProfile*(name: string): UserProfile =
      newUserProfile(name, 0, name.toLowerAscii & "@example.com")

    proc summarizeProfiles*(profiles: seq[UserProfile]): string =
      let names = profiles.mapIt(it.name).join(", ")
      let ages = profiles.mapIt($it.age).join(", ")
      "Users: " & names & " | Ages: " & ages

