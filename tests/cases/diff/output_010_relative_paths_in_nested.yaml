name: output_010_relative_paths_in_nested
repo:
  initial_files:
    src/module.py: |
      def func():
          pass
    utils/path_resolver.py: |
      import os

      PATH_SEPARATOR = os.sep
      MAX_PATH_DEPTH = 50

      class PathResolver:
          def resolve(self, relative_path: str, base: str = ".") -> str:
              return os.path.abspath(os.path.join(base, relative_path))

          def normalize(self, path: str) -> str:
              return os.path.normpath(path)

          def relative_to(self, path: str, base: str) -> str:
              return os.path.relpath(path, base)
    utils/checksum_calculator.py: |
      import hashlib

      DEFAULT_ALGORITHM = "sha256"
      BUFFER_SIZE = 65536

      class ChecksumCalculator:
          def compute_file(self, filepath: str, algorithm: str = DEFAULT_ALGORITHM) -> str:
              h = hashlib.new(algorithm)
              return h.hexdigest()

          def verify(self, filepath: str, expected: str) -> bool:
              return self.compute_file(filepath) == expected
