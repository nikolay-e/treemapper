repo:
  initial_files:
    src/packet.zig: |
      const std = @import("std");
      const serial = @import("serial.zig");

      pub const Packet = struct {
          header: u32,
          payload: []const u8,
          checksum: u16,

          pub fn encode(self: Packet, buf: []u8) usize {
              return serial.writeFrame(self.header, self.payload, buf);
          }

          pub fn isValid(self: Packet) bool {
              return self.checksum == computeChecksum(self.payload);
          }
      };

      fn computeChecksum(data: []const u8) u16 {
          var sum: u16 = 0;
          for (data) |b| sum +%= b;
          return sum;
      }
    src/serial.zig: |
      const crc = @import("crc.zig");

      pub fn writeFrame(header: u32, payload: []const u8, buf: []u8) usize {
          var offset: usize = 0;
          buf[offset] = @truncate(header >> 24);
          offset += 1;
          buf[offset] = @truncate(header >> 16);
          offset += 1;
          buf[offset] = @truncate(header >> 8);
          offset += 1;
          buf[offset] = @truncate(header);
          offset += 1;
          for (payload) |b| {
              buf[offset] = b;
              offset += 1;
          }
          const c = crc.crc16(payload);
          buf[offset] = @truncate(c >> 8);
          offset += 1;
          buf[offset] = @truncate(c);
          offset += 1;
          return offset;
      }
    src/crc.zig: |
      pub fn crc16(data: []const u8) u16 {
          var crc_val: u16 = 0xFFFF;
          for (data) |byte| {
              crc_val ^= @as(u16, byte);
              var i: u4 = 0;
              while (i < 8) : (i += 1) {
                  if (crc_val & 1 == 1) {
                      crc_val = (crc_val >> 1) ^ 0xA001;
                  } else {
                      crc_val >>= 1;
                  }
              }
          }
          return crc_val;
      }

      pub fn crc32(data: []const u8) u32 {
          _ = data;
          return 0;
      }
