name: cpp_027_fold_expression
tags:
- lang:erlang
- change:new_function
- change:single_file
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    src/trade_validator.erl: |
      -module(trade_validator).
      -export([valid_quantity/1, valid_price/1]).

      valid_quantity(Qty) when is_integer(Qty), Qty > 0 -> true;
      valid_quantity(_) -> false.

      valid_price(Price) when is_number(Price), Price > 0.0 -> true;
      valid_price(_) -> false.
    src/order_gateway.erl: |
      -module(order_gateway).
      -export([submit/3]).

      submit(Symbol, Qty, Price) ->
          case trade_validator:valid_quantity(Qty) of
              false -> {error, invalid_quantity};
              true ->
                  case trade_validator:valid_price(Price) of
                      false -> {error, invalid_price};
                      true -> {ok, submitted, Symbol}
                  end
          end.
    src/position_tracker.erl: |
      -module(position_tracker).
      -export([add_position/3]).

      add_position(Account, Symbol, Qty) ->
          io:format("Position: ~p ~p x~p~n", [Account, Symbol, Qty]).
    garbage/margin.erl: |
      % GARBAGE_CPP27_MARG_A = "margin_marker"
    garbage/clearing.erl: |
      % GARBAGE_CPP27_CLEAR_B = "clearing_marker"
    garbage/settlement.erl: |
      % GARBAGE_CPP27_SETTL_C = "settlement_marker"
    garbage/reporting.erl: |
      % GARBAGE_CPP27_REPORT_D = "reporting_marker"
  changed_files:
    src/trade_validator.erl: |
      -module(trade_validator).
      -export([valid_quantity/1, valid_price/1, valid_symbol/1]).

      valid_quantity(Qty) when is_integer(Qty), Qty > 0 -> true;
      valid_quantity(_) -> false.

      valid_price(Price) when is_number(Price), Price > 0.0 -> true;
      valid_price(_) -> false.

      valid_symbol(Symbol) when is_binary(Symbol), byte_size(Symbol) >= 2,
                                byte_size(Symbol) =< 8 -> true;
      valid_symbol(_) -> false.
    src/order_gateway.erl: |
      -module(order_gateway).
      -export([submit/3]).

      submit(Symbol, Qty, Price) ->
          case trade_validator:valid_symbol(Symbol) of
              false -> {error, invalid_symbol};
              true ->
                  case trade_validator:valid_quantity(Qty) of
                      false -> {error, invalid_quantity};
                      true ->
                          case trade_validator:valid_price(Price) of
                              false -> {error, invalid_price};
                              true -> {ok, submitted, Symbol}
                          end
                  end
          end.
    src/position_tracker.erl: |
      -module(position_tracker).
      -export([add_position/3]).

      add_position(Account, Symbol, Qty) ->
          io:format("Position: ~p ~p x~p~n", [Account, Symbol, Qty]).
    garbage/margin.erl: |
      % GARBAGE_CPP27_MARG_A = "margin_marker"
    garbage/clearing.erl: |
      % GARBAGE_CPP27_CLEAR_B = "clearing_marker"
    garbage/settlement.erl: |
      % GARBAGE_CPP27_SETTL_C = "settlement_marker"
    garbage/reporting.erl: |
      % GARBAGE_CPP27_REPORT_D = "reporting_marker"
  commit_message: "feat: add valid_symbol/1 to trade_validator and use it in order_gateway"
fragments:
