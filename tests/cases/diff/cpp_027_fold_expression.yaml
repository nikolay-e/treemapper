    anchor: "{error, invalid_symbol}"
- id: unrelated_position
  selector:
    path: src/position_tracker.erl
    anchor: "add_position(Account, Symbol, Qty) ->"
- id: no_garbage_a
  selector:
    anchor: GARBAGE_CPP27_MARG_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_CPP27_CLEAR_B
- id: no_garbage_c
