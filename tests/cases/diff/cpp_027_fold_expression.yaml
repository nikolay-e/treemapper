    path: src/trade_validator.erl
    anchor: "valid_symbol(Symbol) when is_binary(Symbol)"
- id: valid_symbol_export
  selector:
    path: src/trade_validator.erl
    anchor: "-export([valid_quantity/1, valid_price/1, valid_symbol/1])."
- id: gateway_calls_valid_symbol
  selector:
    path: src/order_gateway.erl
    anchor: "trade_validator:valid_symbol(Symbol)"
- id: gateway_invalid_symbol_error
  selector:
