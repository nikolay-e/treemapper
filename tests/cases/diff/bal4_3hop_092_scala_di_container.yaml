repo:
  initial_files:
    src/main/scala/di/Binding.scala: |
      package di

      trait Binding[T] {
        def resolve: T
      }

      class SingletonBinding[T](instance: T) extends Binding[T] {
        override def resolve: T = instance
      }

      class FactoryBinding[T](factory: () => T) extends Binding[T] {
        override def resolve: T = factory()
      }
    src/main/scala/di/Container.scala: |
      package di

      import di.Binding

      class Container {
        private val bindings = scala.collection.mutable.Map.empty[String, Binding[_]]

        def register[T](name: String, binding: Binding[T]): Unit = {
          bindings(name) = binding
        }

        def resolve[T](name: String): T = {
          bindings(name).resolve.asInstanceOf[T]
        }
      }
    src/main/scala/di/Module.scala: |
      package di

      import di.Container

      trait Module {
        def configure(container: Container): Unit
      }

      class CompositeModule(modules: Seq[Module]) extends Module {
        override def configure(container: Container): Unit = {
          modules.foreach(_.configure(container))
        }
      }
    src/main/scala/app/Bootstrap.scala: |
      package app

      import di.{Container, Module, CompositeModule}

      object Bootstrap {
        def start(modules: Module*): Container = {
          val container = new Container
          val composite = new CompositeModule(modules.toSeq)
          composite.configure(container)
          container
        }
      }
    src/main/scala/app/ServiceModule.scala: |
      package app

      import di.{Container, Module, SingletonBinding}

      class ServiceModule extends Module {
        override def configure(container: Container): Unit = {
          container.register("userService", new SingletonBinding("default-user-svc"))
        }
      }
    src/main/scala/util/StringOps.scala: |
      package util

      object StringOps {
        val GARBAGE_092_STR_A = "pad-left"
        val GARBAGE_092_STR_B = "pad-right"

        def capitalize(s: String): String = s.capitalize
      }
    src/main/scala/util/NumberOps.scala: |
      package util

      object NumberOps {
        val GARBAGE_092_NUM_C = "round"
        val GARBAGE_092_NUM_D = "floor"

        def clamp(v: Int, lo: Int, hi: Int): Int = math.max(lo, math.min(v, hi))
      }
    src/main/scala/util/DateOps.scala: |
      package util

      object DateOps {
        val GARBAGE_092_DATE_E = "epoch"

        def nowMillis: Long = System.currentTimeMillis()
      }
  changed_files:
    src/main/scala/di/Binding.scala: |
      package di

      trait Binding[T] {
        def resolve: T
        def lifecycle: String
      }

      class SingletonBinding[T](instance: T) extends Binding[T] {
        override def resolve: T = instance
        override def lifecycle: String = "singleton"
      }

      class FactoryBinding[T](factory: () => T) extends Binding[T] {
        override def resolve: T = factory()
        override def lifecycle: String = "factory"
      }
  commit_message: "feat: add lifecycle method to Binding trait"
