name: bal4_3hop_011_ruby_notification_dispatch
tags:
- lang:ruby
- change:signature
- context:import_chain
- distance:3hop+
- difficulty:medium
repo:
  initial_files:
    lib/notify/message.rb: |
      module Notify
        class Message
          attr_reader :to, :body, :channel
          def initialize(to, body, channel: :email)
            @to = to
            @body = body
            @channel = channel
          end
          def valid?
            !to.nil? && !body.nil?
          end
        end
      end
    lib/notify/queue.rb: |
      require_relative 'message'
      module Notify
        class Queue
          def initialize
            @items = []
          end
          def push(to, body, channel: :email)
            msg = Message.new(to, body, channel: channel)
            @items << msg if msg.valid?
          end
          def pending
            @items.size
          end
          def drain
            @items.shift(@items.size)
          end
        end
      end
    lib/notify/dispatcher.rb: |
      require_relative 'queue'
      module Notify
        class Dispatcher
          def initialize
            @queue = Queue.new
          end
          def enqueue(to, body, channel: :email)
            @queue.push(to, body, channel: channel)
          end
          def send_all
            @queue.drain.map { |m| { to: m.to, status: "sent" } }
          end
        end
      end
    lib/notify/service.rb: |
      require_relative 'dispatcher'
      module Notify
        class Service
          def initialize
            @dispatcher = Dispatcher.new
          end
          def alert(to, body)
            @dispatcher.enqueue(to, body, channel: :sms)
            @dispatcher.send_all
          end
          def inform(to, body)
            @dispatcher.enqueue(to, body, channel: :email)
            @dispatcher.send_all
          end
        end
      end
    lib/notify/controller.rb: |
      require_relative 'service'
      module Notify
        class Controller
          def initialize
            @svc = Service.new
          end
          def post_alert(to, body)
            @svc.alert(to, body)
          end
        end
      end
    lib/notify/template.rb: |
      module Notify
        GARBAGE_011_TEMPLATE_A = "html"
        GARBAGE_011_LAYOUT_B = "default"
        class Template
          def self.render(name)
            "<div>#{name}</div>"
          end
        end
      end
    lib/notify/analytics.rb: |
      module Notify
        GARBAGE_011_ANALYTICS_C = "track"
        GARBAGE_011_METRIC_D = "open_rate"
        class Analytics
          def self.track(event)
            event
          end
        end
      end
  changed_files:
    lib/notify/message.rb: |
      module Notify
        class Message
          attr_reader :to, :body, :channel, :priority
          def initialize(to, body, channel: :email, priority: :normal)
            @to = to
            @body = body
            @channel = channel
            @priority = priority
          end
          def valid?
            !to.nil? && !body.nil?
          end
          def urgent?
            priority == :high
          end
        end
      end
