    anchor: "delimiter: str = \",\""
- id: transformer_uses_extractor
  selector:
    path: etl/transformer.py
    anchor: "from etl.extractor import Extractor"
- id: loader_uses_transformer
  selector:
    path: etl/loader.py
    anchor: "from etl.transformer import Transformer"
- id: orchestrator_uses_loader
  selector:
    path: etl/orchestrator.py
