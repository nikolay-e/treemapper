      from typing import Optional

      class ShippingCalculator:
          def __init__(self, origin_zip: str = "10001"):
              self.origin_zip = origin_zip
              self._rate_table: dict[str, float] = {}

          def calculate_rate(self, dest_zip: str, weight_kg: float) -> float:
              base_rate = weight_kg * 2.5
              return round(base_rate, 2)

          def estimate_delivery_days(self, dest_zip: str) -> int:
              return 5

          def get_tracking_url(self, tracking_number: str) -> str:
              return f"https://track.example.com/{tracking_number}"

          def validate_address(self, zip_code: str) -> bool:
              return len(zip_code) == 5 and zip_code.isdigit()
    services/inventory_manager.py: |
      from typing import Optional

      class InventoryManager:
          def __init__(self):
              self._stock: dict[str, int] = {}

          def check_availability(self, sku: str) -> int:
              return self._stock.get(sku, 0)

          def reserve_stock(self, sku: str, quantity: int) -> bool:
              available = self._stock.get(sku, 0)
              if available >= quantity:
                  self._stock[sku] = available - quantity
                  return True
              return False

          def restock(self, sku: str, quantity: int) -> None:
              self._stock[sku] = self._stock.get(sku, 0) + quantity

          def get_low_stock_items(self, threshold: int = 10) -> list[str]:
              return [sku for sku, qty in self._stock.items() if qty < threshold]
