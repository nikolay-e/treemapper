  changed_files:
    src/model/Priority.kt: |
      package model

      enum class Priority { LOW, MEDIUM, HIGH }

      data class Message(val text: String, val priority: Priority)
    src/channel/Sender.kt: |
      package channel

      import model.Message
      import model.Priority

      class Sender {
          fun send(msg: Message): Boolean {
              return msg.text.isNotEmpty()
          }

          fun sendUrgent(msg: Message): Boolean {
              return msg.priority == Priority.HIGH && msg.text.isNotEmpty()
          }
      }
    src/dispatch/Dispatcher.kt: |
      package dispatch

      import channel.Sender
      import model.Message
      import model.Priority

      class Dispatcher(private val sender: Sender) {
          fun dispatch(msg: Message): Boolean {
              return if (msg.priority == Priority.HIGH) sender.sendUrgent(msg)
              else sender.send(msg)
          }
      }
    src/api/NotifyApi.kt: |
      package api

      import dispatch.Dispatcher
      import model.Message
      import model.Priority

      class NotifyApi(private val dispatcher: Dispatcher) {
          fun notify(text: String): Boolean {
              val msg = Message(text, Priority.LOW)
              return dispatcher.dispatch(msg)
          }
      }
    src/utils/Metrics.kt: |
      package utils
      val GARBAGE_036_METRICS_A = "metrics"
      val GARBAGE_036_COUNT_B = 0
      fun inc() {}
    src/utils/Retry.kt: |
      package utils
      val GARBAGE_036_RETRY_C = "retry"
      val GARBAGE_036_MAX_D = 3
      fun retry(block: () -> Unit) = block()
  commit_message: "feat: add MEDIUM priority and urgent dispatch"
