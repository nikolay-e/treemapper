repo:
  initial_files:
    src/main/java/com/app/validation/Rule.java: |
      package com.app.validation;

      public interface Rule {
          boolean check(String value);
          String errorMessage();
      }
    src/main/java/com/app/validation/EmailRule.java: |
      package com.app.validation;

      import com.app.validation.Rule;

      public class EmailRule implements Rule {
          public boolean check(String value) {
              return value.contains("@");
          }
          public String errorMessage() {
              return "Invalid email";
          }
      }
    src/main/java/com/app/validation/Validator.java: |
      package com.app.validation;

      import com.app.validation.EmailRule;
      import com.app.validation.Rule;
      import java.util.ArrayList;
      import java.util.List;

      public class Validator {
          private final List<Rule> rules = new ArrayList<>();
          public Validator() {
              rules.add(new EmailRule());
          }
          public List<String> validate(String value) {
              List<String> errors = new ArrayList<>();
              for (Rule r : rules) {
                  if (!r.check(value)) {
                      errors.add(r.errorMessage());
                  }
              }
              return errors;
          }
      }
    src/main/java/com/app/form/RegistrationForm.java: |
      package com.app.form;

      import com.app.validation.Validator;
      import java.util.List;

      public class RegistrationForm {
          private final Validator validator;
          public RegistrationForm(Validator validator) {
              this.validator = validator;
          }
          public boolean submit(String email) {
              List<String> errors = validator.validate(email);
              return errors.isEmpty();
          }
      }
    src/main/java/com/app/util/Sanitizer.java: |
      package com.app.util;

      public class Sanitizer {
          public static String stripHtml(String input) {
              return input.replaceAll("<[^>]*>", "");
          }
