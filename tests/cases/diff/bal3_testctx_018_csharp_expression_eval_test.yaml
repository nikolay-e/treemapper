repo:
  initial_files:
    src/ExpressionEvaluator.cs: |
      namespace Calc;

      using System;
      using System.Collections.Generic;

      public class ExpressionEvaluator
      {
          public double Evaluate(string expression)
          {
              var parts = expression.Split(' ');
              if (parts.Length != 3)
                  throw new FormatException("Expected: operand operator operand");
              var left = double.Parse(parts[0]);
              var op = parts[1];
              var right = double.Parse(parts[2]);
              return op switch
              {
                  "+" => left + right,
                  "-" => left - right,
                  "*" => left * right,
                  "/" => right != 0 ? left / right : throw new DivideByZeroException(),
                  _ => throw new NotSupportedException($"Unknown operator: {op}")
              };
          }
      }
    tests/ExpressionEvaluatorTests.cs: |
      using Xunit;
      using Calc;

      public class ExpressionEvaluatorTests
      {
          private readonly ExpressionEvaluator _eval = new();

          [Fact]
          public void Evaluate_Addition()
          {
              Assert.Equal(7.0, _eval.Evaluate("3 + 4"));
          }

          [Fact]
          public void Evaluate_Subtraction()
          {
              Assert.Equal(1.0, _eval.Evaluate("5 - 4"));
          }

          [Fact]
          public void Evaluate_Multiplication()
          {
              Assert.Equal(12.0, _eval.Evaluate("3 * 4"));
          }

          [Fact]
          public void Evaluate_Division()
          {
              Assert.Equal(2.5, _eval.Evaluate("5 / 2"));
          }

          [Fact]
          public void Evaluate_DivisionByZero_Throws()
          {
              Assert.Throws<System.DivideByZeroException>(() => _eval.Evaluate("5 / 0"));
          }

          [Fact]
          public void Evaluate_InvalidFormat_Throws()
          {
              Assert.Throws<System.FormatException>(() => _eval.Evaluate("bad"));
          }
      }
