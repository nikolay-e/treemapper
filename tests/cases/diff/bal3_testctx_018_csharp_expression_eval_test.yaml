  changed_files:
    src/ExpressionEvaluator.cs: |
      namespace Calc;

      using System;
      using System.Collections.Generic;

      public class ExpressionEvaluator
      {
          private readonly Dictionary<string, Func<double, double, double>> _operators = new()
          {
              ["+"] = (a, b) => a + b,
              ["-"] = (a, b) => a - b,
              ["*"] = (a, b) => a * b,
              ["/"] = (a, b) => b != 0 ? a / b : throw new DivideByZeroException(),
              ["%"] = (a, b) => b != 0 ? a % b : throw new DivideByZeroException(),
              ["^"] = (a, b) => Math.Pow(a, b),
          };

          public void RegisterOperator(string symbol, Func<double, double, double> func)
          {
              _operators[symbol] = func;
          }

          public double Evaluate(string expression)
          {
              var parts = expression.Split(' ');
              if (parts.Length != 3)
                  throw new FormatException("Expected: operand operator operand");
              var left = double.Parse(parts[0]);
              var op = parts[1];
              var right = double.Parse(parts[2]);
              if (!_operators.TryGetValue(op, out var func))
                  throw new NotSupportedException($"Unknown operator: {op}");
              return func(left, right);
          }

          public IReadOnlyCollection<string> SupportedOperators => _operators.Keys;
      }
  commit_message: "refactor: operator registry pattern, add modulo and power"
