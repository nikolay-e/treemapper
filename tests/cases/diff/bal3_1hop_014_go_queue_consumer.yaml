  changed_files:
    src/main/scala/fleet/Vehicle.scala: |
      package fleet

      case class Vehicle(
        id: String,
        plateNumber: String,
        capacityKg: Double,
        status: String,
        currentLoadKg: Double
      )
    src/main/scala/fleet/VehicleRepository.scala: |
      package fleet

      class VehicleRepository {
        private var store: Map[String, Vehicle] = Map.empty

        def save(v: Vehicle): Unit = {
          store = store + (v.id -> v)
        }

        def find(id: String): Option[Vehicle] = store.get(id)

        def all(): List[Vehicle] = store.values.toList

        def available(): List[Vehicle] =
          store.values.filter(_.status == "idle").toList
      }
    src/main/scala/fleet/DispatchService.scala: |
      package fleet

      class DispatchService(repo: VehicleRepository) {
        def assignDelivery(vehicleId: String): Either[String, Vehicle] = {
          repo.find(vehicleId) match {
            case None    => Left(s"Vehicle $vehicleId not found")
            case Some(v) => Right(v.copy(status = "on_route"))
          }
        }

        def loadCargo(vehicleId: String, weightKg: Double): Either[String, Vehicle] = {
          repo.find(vehicleId) match {
            case None    => Left(s"Vehicle $vehicleId not found")
            case Some(v) =>
              if (v.currentLoadKg + weightKg > v.capacityKg)
                Left(s"Overload: capacity ${v.capacityKg}kg exceeded")
              else {
                val updated = v.copy(currentLoadKg = v.currentLoadKg + weightKg)
                repo.save(updated)
                Right(updated)
              }
          }
        }

        def listAvailable(): List[Vehicle] = repo.available()
      }
    src/main/scala/fleet/api/DispatchController.scala: |
      package fleet.api

      import fleet.{DispatchService, VehicleRepository, Vehicle}

      class DispatchController(service: DispatchService) {
        def handleAssign(vehicleId: String): String = {
          service.assignDelivery(vehicleId) match {
            case Right(v) => s"Vehicle ${v.id} assigned"
            case Left(e)  => s"ERROR: $e"
          }
        }

        def handleLoadCargo(vehicleId: String, weightKg: Double): String = {
          service.loadCargo(vehicleId, weightKg) match {
            case Right(v) => s"Loaded ${weightKg}kg onto ${v.id}"
            case Left(e)  => s"ERROR: $e"
          }
        }
      }
