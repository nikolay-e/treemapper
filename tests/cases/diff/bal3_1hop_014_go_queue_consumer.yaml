  changed_files:
    pkg/queue/message.go: |
      package queue

      import "fmt"

      type Message struct {
          ID        string
          Topic     string
          Payload   []byte
          Attempts  int
          MaxRetries int
      }

      type Consumer interface {
          Consume(msg *Message) error
      }

      type Broker struct {
          consumers map[string][]Consumer
          deadLetter []*Message
      }

      func NewBroker() *Broker {
          return &Broker{consumers: make(map[string][]Consumer)}
      }

      func (b *Broker) Register(topic string, c Consumer) {
          b.consumers[topic] = append(b.consumers[topic], c)
      }

      func (b *Broker) Dispatch(msg *Message) error {
          consumers := b.consumers[msg.Topic]
          if len(consumers) == 0 {
              return fmt.Errorf("no consumers for topic %s", msg.Topic)
          }
          for _, c := range consumers {
              if err := c.Consume(msg); err != nil {
                  msg.Attempts++
                  if msg.Attempts >= msg.MaxRetries {
                      b.deadLetter = append(b.deadLetter, msg)
                  }
                  return err
              }
          }
          return nil
      }

      func (b *Broker) DeadLetters() []*Message {
          return b.deadLetter
      }
  commit_message: "fix: add retry tracking and dead letter queue to Broker"
