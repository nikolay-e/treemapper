    src/main/kotlin/codec/MessageCodec.kt: |
      package codec

      data class Envelope(
          val type: String,
          val payload: ByteArray
      )

      class MessageCodec {
          fun encode(type: String, payload: ByteArray): ByteArray {
              val header = type.toByteArray()
              return header + byteArrayOf(0) + payload
          }

          fun decode(raw: ByteArray): Envelope {
              val separator = raw.indexOf(0)
              val type = String(raw.sliceArray(0 until separator))
              val payload = raw.sliceArray(separator + 1 until raw.size)
              return Envelope(type, payload)
          }
      }
    src/main/kotlin/transport/TcpTransport.kt: |
      package transport

      import codec.MessageCodec
      import codec.Envelope

      class TcpTransport(private val codec: MessageCodec) {
          fun send(type: String, payload: ByteArray): Boolean {
              val data = codec.encode(type, payload)
              return transmit(data)
          }

          fun receive(raw: ByteArray): Envelope {
              return codec.decode(raw)
          }

          private fun transmit(data: ByteArray): Boolean {
              return data.isNotEmpty()
          }
      }
    src/main/kotlin/handler/MessageHandler.kt: |
      package handler

      import transport.TcpTransport
      import codec.Envelope

      class MessageHandler(private val transport: TcpTransport) {
          fun process(raw: ByteArray): String {
              val envelope = transport.receive(raw)
              return "Handled: ${envelope.type}"
          }
      }
