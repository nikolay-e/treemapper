name: dependencies_021_reverse_multiple_callers_method
tags:
- lang:python
- change:single_file
- change:new_function
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    models/user.py: |
      class User:
          def __init__(self, name: str, email: str):
              self.name = name
              self.email = email

          def get_display_name(self) -> str:
              return self.name
    views/profile.py: |
      from models.user import User

      def render_profile(user: User) -> str:
          name = user.get_display_name()
          return f"<h1>{name}</h1>"
    views/header.py: |
      from models.user import User

      def render_header(user: User) -> str:
          display = user.get_display_name()
          return f"<span>{display}</span>"
    emails/welcome.py: |
      from models.user import User

      def send_welcome_email(user: User) -> None:
          name = user.get_display_name()
          print(f"Welcome, {name}!")
    admin/user.py: |
      class User:
          def __init__(self, name: str, email: str, title: str = ""):
              self.name = name
              self.email = email
              self.title = title

          def get_display_name(self, include_title: bool = False) -> str:
              if include_title and self.title:
                  return f"{self.title} {self.name}"
              return self.name

          def get_admin_badge(self) -> str:
              return f"[ADMIN] {self.name}"
    views/sidebar.py: |
      from typing import List

      def render_sidebar(items: List[str]) -> str:
          html_items = [f"<li>{item}</li>" for item in items]
          return "<aside><ul>" + "".join(html_items) + "</ul></aside>"

      def render_navigation(links: dict) -> str:
          nav_items = [f'<a href="{url}">{label}</a>' for label, url in links.items()]
          return "<nav>" + " | ".join(nav_items) + "</nav>"
