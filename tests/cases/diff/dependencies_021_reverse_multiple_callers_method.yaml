fragments:
- id: user_init_changed
  selector:
    path: models/user.py
    anchor: "def __init__(self, name: str, email: str, title: str = \"\"):"
- id: user_display_name_changed
  selector:
    path: models/user.py
    anchor: "def get_display_name(self, include_title: bool = False) -> str:"
- id: profile_calls_display_name
  selector:
    path: views/profile.py
    anchor: name = user.get_display_name()
- id: header_calls_display_name
  selector:
    path: views/header.py
    anchor: display = user.get_display_name()
- id: welcome_calls_display_name
  selector:
    path: emails/welcome.py
    anchor: name = user.get_display_name()
- id: no_admin_user
