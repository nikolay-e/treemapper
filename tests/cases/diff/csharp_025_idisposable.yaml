      export function identity<T>(x: T): T { return x; }
  changed_files:
    src/components/Button.tsx: |
      import React from 'react';

      interface ButtonProps {
        label: string;
        onClick: () => void;
        disabled?: boolean;
        variant?: 'primary' | 'secondary';
      }

      export const Button: React.FC<ButtonProps> = ({
        label,
        onClick,
        disabled = false,
        variant = 'primary',
      }) => (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`btn btn-${variant}`}
        >
          {label}
        </button>
      );
    src/components/Input.tsx: |
      import React from 'react';

      interface InputProps {
        value: string;
        onChange: (v: string) => void;
        placeholder?: string;
        disabled?: boolean;
      }

      export const Input: React.FC<InputProps> = ({
        value,
        onChange,
        placeholder = '',
        disabled = false,
      }) => (
        <input
          value={value}
          onChange={(e) => onChange(e.target.value)}
          placeholder={placeholder}
          disabled={disabled}
        />
      );
    garbage/helpers.ts: |
      const GARBAGE_CS025_HELPERS_A = "helpers_marker";
      export function noop(): void {}
    garbage/constants.ts: |
      const GARBAGE_CS025_CONSTANTS_B = "constants_marker";
      export const APP_NAME = "MyApp";
    garbage/utils.ts: |
      const GARBAGE_CS025_UTILS_C = "utils_marker";
      export function identity<T>(x: T): T { return x; }
  commit_message: "feat: add disabled and variant props to Button and Input"
