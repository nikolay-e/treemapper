repo:
  initial_files:
    src/color/hex.js: |
      function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return { r, g, b };
      }

      function rgbToHex(r, g, b) {
        return "#" + [r, g, b].map((c) => c.toString(16).padStart(2, "0")).join("");
      }

      module.exports = { hexToRgb, rgbToHex };
    src/color/palette.js: |
      const { hexToRgb, rgbToHex } = require("./hex");

      function lighten(hex, amount) {
        const { r, g, b } = hexToRgb(hex);
        const factor = 1 + amount;
        return rgbToHex(
          Math.min(255, Math.round(r * factor)),
          Math.min(255, Math.round(g * factor)),
          Math.min(255, Math.round(b * factor))
        );
      }

      module.exports = { lighten };
    src/color/theme.js: |
      const { lighten } = require("./palette");

      function generateTheme(primary) {
        return {
          primary,
          light: lighten(primary, 0.3),
          lighter: lighten(primary, 0.6),
        };
      }

      module.exports = { generateTheme };
    src/color/contrast.js: |
      const TRAP_GAP2028_RATIO_A = 4.5;
      const TRAP_GAP2028_STANDARD_B = "WCAG_AA";

      function luminance(r, g, b) {
        return 0.2126 * r + 0.7152 * g + 0.0722 * b;
      }

      module.exports = { luminance };
    src/color/gradient.js: |
      const TRAP_GAP2028_STEPS_C = 10;
      const TRAP_GAP2028_DIR_D = "linear";

      function generateGradientCSS(from, to) {
        return `linear-gradient(${from}, ${to})`;
      }

      module.exports = { generateGradientCSS };
  changed_files:
    src/color/palette.js: |
      const { hexToRgb, rgbToHex } = require("./hex");

      function lighten(hex, amount) {
        const { r, g, b } = hexToRgb(hex);
        const factor = 1 + amount;
        return rgbToHex(
          Math.min(255, Math.round(r * factor)),
          Math.min(255, Math.round(g * factor)),
          Math.min(255, Math.round(b * factor))
        );
      }

      function blend(hex1, hex2, weight) {
        const c1 = hexToRgb(hex1);
        const c2 = hexToRgb(hex2);
        const w = Math.max(0, Math.min(1, weight));
        return rgbToHex(
          Math.round(c1.r * (1 - w) + c2.r * w),
          Math.round(c1.g * (1 - w) + c2.g * w),
          Math.round(c1.b * (1 - w) + c2.b * w)
        );
      }

      module.exports = { lighten, blend };
