    src/main/java/com/ecommerce/repository/AuditLogRepository.java: |
      package com.ecommerce.repository;

      import com.ecommerce.model.BaseEntity;
      import org.springframework.stereotype.Repository;
      import java.time.LocalDateTime;
      import java.util.ArrayList;
      import java.util.Comparator;
      import java.util.List;
      import java.util.stream.Collectors;

      @Repository
      public class AuditLogRepository {
          private final List<BaseEntity> auditTrail = new ArrayList<>();

          public void recordChange(BaseEntity entity) {
              auditTrail.add(entity);
          }

          public List<BaseEntity> findByUpdatedAfter(LocalDateTime since) {
              return auditTrail.stream()
                  .filter(e -> e.getUpdatedAt() != null && e.getUpdatedAt().isAfter(since))
                  .sorted(Comparator.comparing(BaseEntity::getUpdatedAt).reversed())
                  .collect(Collectors.toList());
          }

          public List<BaseEntity> findByCreatedBy(String user) {
              return auditTrail.stream()
                  .filter(e -> user.equals(e.getCreatedBy()))
                  .collect(Collectors.toList());
          }

          public List<BaseEntity> findDeleted() {
              return auditTrail.stream()
                  .filter(BaseEntity::isDeleted)
                  .collect(Collectors.toList());
          }

          public long countByVersion(int minVersion) {
              return auditTrail.stream()
                  .filter(e -> e.getVersion() >= minVersion)
                  .count();
          }
      }
    src/main/java/com/ecommerce/service/AuditLogService.java: |
      package com.ecommerce.service;

      import com.ecommerce.model.BaseEntity;
      import com.ecommerce.repository.AuditLogRepository;
      import org.springframework.stereotype.Service;
      import java.time.LocalDateTime;
      import java.util.List;

      @Service
      public class AuditLogService {
          private final AuditLogRepository repository;

          public AuditLogService(AuditLogRepository repository) {
              this.repository = repository;
          }

          public void markUpdated(BaseEntity entity, String user) {
              entity.onUpdate(user);
              repository.recordChange(entity);
          }

          public void softDeleteEntity(BaseEntity entity, String user) {
              entity.softDelete(user);
              repository.recordChange(entity);
          }

          public void restoreEntity(BaseEntity entity, String user) {
              entity.restore(user);
              repository.recordChange(entity);
          }

          public List<BaseEntity> getRecentChanges(int minutesAgo) {
              LocalDateTime since = LocalDateTime.now().minusMinutes(minutesAgo);
              return repository.findByUpdatedAfter(since);
          }
      }
    src/test/java/com/ecommerce/model/BaseEntityTest.java: |
      package com.ecommerce.model;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      class BaseEntityTest {
          @Test
          void testVersionIncrementsOnUpdate() {
              Product product = new Product("Test", null, "SKU-1");
              assertEquals(0, product.getVersion());
              product.onUpdate("admin");
              assertEquals(1, product.getVersion());
              assertNotNull(product.getUpdatedAt());
          }

          @Test
          void testSoftDelete() {
              Product product = new Product("Test", null, "SKU-1");
              assertFalse(product.isDeleted());
              product.softDelete("admin");
              assertTrue(product.isDeleted());
              assertEquals(1, product.getVersion());
          }

          @Test
          void testRestore() {
              Product product = new Product("Test", null, "SKU-1");
              product.softDelete("admin");
              product.restore("admin");
              assertFalse(product.isDeleted());
              assertEquals(2, product.getVersion());
          }
      }
