name: frontend_020_mapped_type
repo:
  initial_files:
    src/models.ts: |
      export interface UserModel {
          id: string;
          name: string;
          email: string;
          password: string;
      }

      export interface ProductModel {
          id: string;
          name: string;
          price: number;
          stock: number;
      }
    src/mapped.ts: |
      console.log('initial');
    src/types/form.ts: |
      export type TouchedFields<T> = {
          [K in keyof T]?: boolean;
      };

      export type DirtyFields<T> = {
          [K in keyof T]?: boolean;
      };

      export type FormErrors<T> = {
          [K in keyof T]?: string;
      };

      export interface FormState<T> {
          values: T;
          touched: TouchedFields<T>;
          dirty: DirtyFields<T>;
          errors: FormErrors<T>;
          isSubmitting: boolean;
      }
    src/models/order.ts: |
      export interface OrderItem {
          productId: string;
          quantity: number;
          unitPrice: number;
      }

      export interface Order {
          id: string;
          customerId: string;
          items: OrderItem[];
          total: number;
          status: 'pending' | 'confirmed' | 'shipped' | 'delivered';
          createdAt: Date;
      }

      export function calculateTotal(items: OrderItem[]): number {
          return items.reduce((sum, item) => sum + item.quantity * item.unitPrice, 0);
      }
  changed_files:
    src/models.ts: |
      export interface UserModel {
          id: string;
          name: string;
          email: string;
          password: string;
      }

      export interface ProductModel {
          id: string;
          name: string;
          price: number;
          stock: number;
      }
    src/mapped.ts: |
      import { UserModel, ProductModel } from './models';

      export type ReadonlyDeep<T> = {
          readonly [K in keyof T]: T[K];
      };

      export type Mutable<T> = {
          -readonly [K in keyof T]: T[K];
      };

      export type Optional<T> = {
          [K in keyof T]?: T[K];
      };

      export type Nullable<T> = {
          [K in keyof T]: T[K] | null;
      };

      export type ReadonlyUser = ReadonlyDeep<UserModel>;
      export type OptionalProduct = Optional<ProductModel>;
      export type NullableUser = Nullable<UserModel>;
    src/types/form.ts: |
      export type TouchedFields<T> = {
          [K in keyof T]?: boolean;
      };

      export type DirtyFields<T> = {
          [K in keyof T]?: boolean;
      };

      export type FormErrors<T> = {
          [K in keyof T]?: string;
      };

      export interface FormState<T> {
          values: T;
          touched: TouchedFields<T>;
          dirty: DirtyFields<T>;
          errors: FormErrors<T>;
          isSubmitting: boolean;
      }
    src/models/order.ts: |
      export interface OrderItem {
          productId: string;
          quantity: number;
          unitPrice: number;
      }

      export interface Order {
          id: string;
          customerId: string;
          items: OrderItem[];
          total: number;
          status: 'pending' | 'confirmed' | 'shipped' | 'delivered';
          createdAt: Date;
      }

      export function calculateTotal(items: OrderItem[]): number {
          return items.reduce((sum, item) => sum + item.quantity * item.unitPrice, 0);
      }
  commit_message: Update files
