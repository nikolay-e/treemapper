must_include_files:
- interfaces.py

must_include_content_from:
  interfaces.py:
    - 'def find_by_criteria(self, criteria: dict) -> list:'
    - 'class Repository(Protocol):'
    - 'criteria: dict'

must_not_include:
# Tricky: same class name Repository(Protocol) in different module
- GARBAGE_DEP_017_STORAGE_PROTO_A
- GARBAGE_DEP_017_STORAGE_MOD_B
- GARBAGE_DEP_017_STORAGE_CLASS_C
# Tricky: imports Repository from interfaces, has find_by_criteria
- GARBAGE_DEP_017_PRODUCT_IMPORT_D
- GARBAGE_DEP_017_PRODUCT_TYPE_E
- GARBAGE_DEP_017_PRODUCT_CLASS_F
# Tricky: same directory sibling with find/find_by_criteria methods
- GARBAGE_DEP_017_CACHE_MODULE_G
- GARBAGE_DEP_017_CACHE_TTL_H
- GARBAGE_DEP_017_CACHE_CLASS_I

must_not_include_files:
- storage/interfaces.py
- repos/product_repo.py
- repos/cache_repo.py

