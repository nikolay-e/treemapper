    from typing import Optional
    GARBAGE_DEP_024_FRAMEWORK_A = "framework_handler"
    GARBAGE_DEP_024_FRAMEWORK_VER_B = "2.0"

    class BaseHandler(ABC):
        GARBAGE_DEP_024_FRAMEWORK_CLASS_C = True

