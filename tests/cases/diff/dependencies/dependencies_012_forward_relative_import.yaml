# === Assertions ===

must_include_files:
- pkg/subpkg/module.py
- pkg/utils.py

must_include_content_from:
  pkg/subpkg/module.py:
    - from ..utils import helper
    - result = helper()
    - 'def action():'
  pkg/utils.py:
    - 'def helper():'

must_not_include:
# Plain garbage
- GARBAGE_DEP_012_GARDEN_A
- GARBAGE_DEP_012_COOK_B
# Tricky: same relative import from ..utils with helper() call and action() method
- GARBAGE_DEP_012_WORKER_IMPORT_C
- GARBAGE_DEP_012_WORKER_POOL_D
- GARBAGE_DEP_012_WORKER_CLASS_E
# Tricky: same function names helper() and action() in same subpkg directory
- GARBAGE_DEP_012_HELPERS_MOD_F
- GARBAGE_DEP_012_HELPERS_VER_G
- GARBAGE_DEP_012_HELPERS_FUNC_H
- GARBAGE_DEP_012_HELPERS_ACT_I

must_not_include_files:
- pkg/subpkg/worker.py
- pkg/subpkg/helpers.py
- garbage/gardening_GARBAGE_DEP_012_GARDEN_A.py
- garbage/cooking_GARBAGE_DEP_012_COOK_B.py

max_fragments: 5
max_files: 2
add_garbage_files: false
skip_garbage_check: true
