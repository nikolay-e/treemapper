# === Assertions ===

must_include_files:
- models.py
- client.py

must_include_content_from:
  models.py:
    - timeout = 60
    - 'class Config:'
  client.py:
    - 'def make_request():'
    - Config.timeout

must_not_include:
# Tricky: same class name Config with same attribute timeout, no import
- GARBAGE_DEP_019_ADAPTER_CFG_A
- GARBAGE_DEP_019_ADAPTER_MOD_B
- GARBAGE_DEP_019_ADAPTER_ATTR_C
# Tricky: same directory sibling with timeout/max_connections attributes
- GARBAGE_DEP_019_DEFAULTS_MOD_G
- GARBAGE_DEP_019_DEFAULTS_KEY_H
- GARBAGE_DEP_019_DEFAULTS_CLASS_I

must_not_include_files:
- adapters/config.py
- defaults.py

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
