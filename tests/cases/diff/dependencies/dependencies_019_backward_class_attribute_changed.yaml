initial:
  models.py: |
    class Config:
        timeout = 30
        max_connections = 10
  client.py: |
    from models import Config

    def make_request():
        timeout = Config.timeout
        return f"Request with timeout {timeout}"
  settings.py: |
    from models import Config

    default_timeout = Config.timeout

  # --- Tricky: different Config class with same attribute names, no import link ---
  adapters/config.py: |
    GARBAGE_DEP_019_ADAPTER_CFG_A = "adapter_config"
    GARBAGE_DEP_019_ADAPTER_MOD_B = True

    class Config:
        timeout = 30
        max_connections = 20
        GARBAGE_DEP_019_ADAPTER_ATTR_C = "different_config"

        def get_timeout(self):
            return self.timeout

  # --- Tricky: same directory sibling with similar shape ---
  defaults.py: |
    GARBAGE_DEP_019_DEFAULTS_MOD_G = "defaults_sibling"
    GARBAGE_DEP_019_DEFAULTS_KEY_H = 99

    class Defaults:
        timeout = 60
        max_connections = 5
        GARBAGE_DEP_019_DEFAULTS_CLASS_I = "similar_shape"

