  changed_files:
    src/cli/options.ts: |
      export interface CliOption {
        name: string;
        alias?: string;
        description: string;
        required: boolean;
        defaultValue?: string;
      }

      export function parseOptions(args: string[], options: CliOption[]): Record<string, string> {
        const result: Record<string, string> = {};
        for (const opt of options) {
          if (opt.defaultValue) result[opt.name] = opt.defaultValue;
        }
        for (let i = 0; i < args.length; i += 2) {
          const key = args[i].replace(/^--?/, '');
          result[key] = args[i + 1] || '';
        }
        return result;
      }

      export function validateRequired(parsed: Record<string, string>, options: CliOption[]): string[] {
        return options
          .filter(o => o.required && !parsed[o.name])
          .map(o => `Missing required option: --${o.name}`);
      }
    src/cli/command.ts: |
      import { CliOption, parseOptions, validateRequired } from './options';

      export interface Command {
        name: string;
        options: CliOption[];
        execute(args: Record<string, string>): void;
      }

      export function runCommand(cmd: Command, rawArgs: string[]): void {
        const args = parseOptions(rawArgs, cmd.options);
        const errors = validateRequired(args, cmd.options);
        if (errors.length > 0) throw new Error(errors.join('\n'));
        cmd.execute(args);
      }
    src/cli/registry.ts: |
      import { Command, runCommand } from './command';

      export class CommandRegistry {
        private commands: Map<string, Command> = new Map();

        register(cmd: Command): void {
          this.commands.set(cmd.name, cmd);
        }

        run(name: string, args: string[]): void {
          const cmd = this.commands.get(name);
          if (!cmd) throw new Error(`Unknown command: ${name}`);
          runCommand(cmd, args);
        }
      }
    src/main.ts: |
      import { CommandRegistry } from './cli/registry';

      const registry = new CommandRegistry();

      export function main(argv: string[]): void {
        const [commandName, ...args] = argv.slice(2);
        registry.run(commandName, args);
      }
    src/utils/color.ts: |
      GARBAGE_038_COLOR_MARKER_A = "color";
      GARBAGE_038_ANSI_MARKER_B = true;

      export function red(text: string): string { return `\x1b[31m${text}\x1b[0m`; }
      export function green(text: string): string { return `\x1b[32m${text}\x1b[0m`; }
    src/utils/spinner.ts: |
      GARBAGE_038_SPINNER_MARKER_C = "spinner";
      GARBAGE_038_FRAMES_MARKER_D = true;

      export class Spinner {
        start(): void {}
        stop(): void {}
      }
