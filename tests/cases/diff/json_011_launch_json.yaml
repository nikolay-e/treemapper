  changed_files:
    src/upload/validator.py: |
      ALLOWED_EXTENSIONS = {".jpg", ".jpeg", ".png", ".gif", ".webp", ".svg"}
      MAX_FILE_SIZE_BYTES = 10 * 1024 * 1024
      ALLOWED_MIME_TYPES = {"image/jpeg", "image/png", "image/gif", "image/webp", "image/svg+xml"}

      def is_allowed_extension(filename: str) -> bool:
          suffix = filename.rsplit(".", 1)
          return f".{suffix[-1].lower()}" in ALLOWED_EXTENSIONS if len(suffix) > 1 else False

      def is_within_size_limit(size_bytes: int) -> bool:
          return size_bytes <= MAX_FILE_SIZE_BYTES

      def is_allowed_mime_type(mime_type: str) -> bool:
          return mime_type in ALLOWED_MIME_TYPES
    src/upload/processor.py: |
      from src.upload.validator import is_allowed_extension, is_within_size_limit, is_allowed_mime_type

      def process_upload(filename: str, content: bytes, mime_type: str = "") -> dict:
          if not is_allowed_extension(filename):
              return {"error": "unsupported file type", "status": 415}
          if mime_type and not is_allowed_mime_type(mime_type):
              return {"error": "unsupported MIME type", "status": 415}
          if not is_within_size_limit(len(content)):
              return {"error": "file too large", "status": 413}
          return {"status": 200, "filename": filename, "size": len(content)}
    src/api/upload_endpoint.py: |
      from src.upload.processor import process_upload

      def handle_upload(filename: str, content: bytes, mime_type: str = "") -> dict:
          return process_upload(filename, content, mime_type)
