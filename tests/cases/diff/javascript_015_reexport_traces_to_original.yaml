name: javascript_015_reexport_traces_to_original
tags:
- lang:typescript
- change:single_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    core.ts: |
      export function coreFunction(): void {
          console.log('core');
      }
    other.ts: |
      export { coreFunction } from './core';
    main.ts: |
      console.log('initial');
    index.ts: |
      export { coreFunction } from './core';

      export function initApp(): void {
          console.log('App initialized');
      }

      export const APP_VERSION = '1.0.0';
    core.test.ts: |
      import { coreFunction } from './core';

      describe('coreFunction', () => {
          it('should log core message', () => {
              const spy = jest.spyOn(console, 'log');
              coreFunction();
              expect(spy).toHaveBeenCalledWith('core');
              spy.mockRestore();
          });
      });
  changed_files:
    core.ts: |
