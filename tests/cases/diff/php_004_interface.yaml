name: php_004_interface
tags:
- lang:python
- change:config
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    config/stream_settings.py: |
      CDN_BASE_URL = "https://cdn.example.com"
      SEGMENT_DURATION_SECONDS = 10
      MAX_BITRATE_KBPS = 4000
      BUFFER_SIZE_SEGMENTS = 3
      ENABLE_ADAPTIVE_BITRATE = False
    transcoder/pipeline.py: |
      from config.stream_settings import MAX_BITRATE_KBPS, SEGMENT_DURATION_SECONDS, ENABLE_ADAPTIVE_BITRATE

      class TranscodePipeline:
          def __init__(self):
              self.max_bitrate = MAX_BITRATE_KBPS
              self.segment_duration = SEGMENT_DURATION_SECONDS
              self.adaptive = ENABLE_ADAPTIVE_BITRATE

          def transcode(self, input_path: str, output_dir: str) -> list:
              return []

          def get_profiles(self) -> list:
              if self.adaptive:
                  return [360, 720, 1080]
              return [1080]
    transcoder/segmenter.py: |
      from config.stream_settings import SEGMENT_DURATION_SECONDS, BUFFER_SIZE_SEGMENTS

      class Segmenter:
          def __init__(self):
              self.duration = SEGMENT_DURATION_SECONDS
              self.buffer = BUFFER_SIZE_SEGMENTS

          def segment(self, video_path: str) -> list:
              return []
    delivery/cdn_router.py: |
      from config.stream_settings import CDN_BASE_URL
      from transcoder.pipeline import TranscodePipeline

      class CdnRouter:
          def __init__(self):
              self.cdn = CDN_BASE_URL
              self.pipeline = TranscodePipeline()

          def route(self, content_id: str) -> str:
              return f"{self.cdn}/content/{content_id}"
    garbage/GameSaveState.py: |
      # GARBAGE_PHP004_A = "game_save_state_marker"

      class GameSaveState:
          slot = 1
    garbage/PaymentReconciliation.py: |
      # GARBAGE_PHP004_B = "payment_reconciliation_marker"

      class PaymentReconciliation:
          period = "monthly"
    garbage/IoTAlertRule.py: |
      # GARBAGE_PHP004_C = "iot_alert_rule_marker"

      class IoTAlertRule:
          threshold = 80.0
  changed_files:
    config/stream_settings.py: |
      CDN_BASE_URL = "https://cdn.example.com"
      SEGMENT_DURATION_SECONDS = 6
      MAX_BITRATE_KBPS = 8000
      BUFFER_SIZE_SEGMENTS = 5
      ENABLE_ADAPTIVE_BITRATE = True
      ABR_PROFILES = [360, 480, 720, 1080, 1440]
    transcoder/pipeline.py: |
      from config.stream_settings import MAX_BITRATE_KBPS, SEGMENT_DURATION_SECONDS, ENABLE_ADAPTIVE_BITRATE, ABR_PROFILES

      class TranscodePipeline:
          def __init__(self):
              self.max_bitrate = MAX_BITRATE_KBPS
              self.segment_duration = SEGMENT_DURATION_SECONDS
              self.adaptive = ENABLE_ADAPTIVE_BITRATE
              self.profiles = ABR_PROFILES

          def transcode(self, input_path: str, output_dir: str) -> list:
              return []

          def get_profiles(self) -> list:
              if self.adaptive:
                  return self.profiles
              return [1080]
    transcoder/segmenter.py: |
      from config.stream_settings import SEGMENT_DURATION_SECONDS, BUFFER_SIZE_SEGMENTS

      class Segmenter:
          def __init__(self):
              self.duration = SEGMENT_DURATION_SECONDS
              self.buffer = BUFFER_SIZE_SEGMENTS

          def segment(self, video_path: str) -> list:
              return []
    delivery/cdn_router.py: |
      from config.stream_settings import CDN_BASE_URL
      from transcoder.pipeline import TranscodePipeline

      class CdnRouter:
          def __init__(self):
              self.cdn = CDN_BASE_URL
              self.pipeline = TranscodePipeline()

          def route(self, content_id: str) -> str:
              return f"{self.cdn}/content/{content_id}"
    garbage/GameSaveState.py: |
      # GARBAGE_PHP004_A = "game_save_state_marker"

      class GameSaveState:
          slot = 1
    garbage/PaymentReconciliation.py: |
      # GARBAGE_PHP004_B = "payment_reconciliation_marker"

      class PaymentReconciliation:
          period = "monthly"
    garbage/IoTAlertRule.py: |
      # GARBAGE_PHP004_C = "iot_alert_rule_marker"

      class IoTAlertRule:
          threshold = 80.0
  commit_message: "config: enable ABR, raise bitrate to 8Mbps, add ABR_PROFILES list"
fragments:
- id: config_abr_enabled
  selector:
    path: config/stream_settings.py
    anchor: "ENABLE_ADAPTIVE_BITRATE = True"
- id: config_abr_profiles
  selector:
    path: config/stream_settings.py
    anchor: "ABR_PROFILES = "
- id: config_bitrate
  selector:
    path: config/stream_settings.py
    anchor: "MAX_BITRATE_KBPS = 8000"
- id: pipeline_abr_import
  selector:
    path: transcoder/pipeline.py
    anchor: "ABR_PROFILES"
- id: pipeline_get_profiles
  selector:
    path: transcoder/pipeline.py
    anchor: "def get_profiles(self)"
- id: no_segmenter
  selector:
    path: transcoder/segmenter.py
- id: no_cdn_router
  selector:
    path: delivery/cdn_router.py
- id: no_garbage_a
  selector:
    anchor: GARBAGE_PHP004_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_PHP004_B
- id: no_garbage_c
  selector:
    anchor: GARBAGE_PHP004_C
oracle:
  required:
  - config_abr_enabled
  - config_abr_profiles
  - pipeline_abr_import
  - pipeline_get_profiles
  allowed:
  - config_bitrate
  forbidden:
  - no_segmenter
  - no_cdn_router
  - no_garbage_a
  - no_garbage_b
  - no_garbage_c
