    src/Contracts/RequestHandler.php: |
      <?php
      namespace App\Contracts;

      interface RequestHandler {
          public function handle(array $request): array;
          public function validate(array $request): bool;
          public function getMiddleware(): array;
      }
    src/Contracts/Middleware.php: |
      <?php
      namespace App\Contracts;

      interface Middleware {
          public function process(array $request, callable $next): array;
      }
    src/Handlers/ApiHandler.php: |
      <?php
      namespace App\Handlers;

      class ApiHandler {
          public function respond(array $data): array {
              return ['data' => $data, 'status' => 200];
          }
      }
    src/Contracts/EventDispatcher.php: |
      <?php
      namespace App\Contracts;

      interface EventDispatcher {
          public function dispatch(string $event, array $payload): void;
          public function listen(string $event, callable $listener): void;
          public function hasListeners(string $event): bool;
      }
    src/Handlers/WebhookHandler.php: |
      <?php
      namespace App\Handlers;

      class WebhookHandler {
          private string $secret;

          public function __construct(string $secret) {
              $this->secret = $secret;
          }

          public function verifySignature(string $payload, string $signature): bool {
              return hash_hmac('sha256', $payload, $this->secret) === $signature;
          }

          public function process(array $event): array {
              return ['event' => $event['type'], 'processed' => true];
          }
      }
  changed_files:
    src/Contracts/RequestHandler.php: |
      <?php
      namespace App\Contracts;

      interface RequestHandler {
          public function handle(array $request): array;
          public function validate(array $request): bool;
          public function getMiddleware(): array;
      }
    src/Contracts/Middleware.php: |
      <?php
      namespace App\Contracts;

      interface Middleware {
          public function process(array $request, callable $next): array;
      }
    src/Handlers/ApiHandler.php: |
      <?php
      namespace App\Handlers;

      use App\Contracts\RequestHandler;

      class ApiHandler implements RequestHandler {
          public function handle(array $request): array {
              if (!$this->validate($request)) {
                  return ['error' => 'Invalid request', 'status' => 400];
              }
              return ['data' => $request['body'] ?? [], 'status' => 200];
          }

          public function validate(array $request): bool {
              return isset($request['action']) && isset($request['body']);
          }

          public function getMiddleware(): array {
              return ['auth', 'throttle'];
          }
      }
    src/Contracts/EventDispatcher.php: |
      <?php
      namespace App\Contracts;

      interface EventDispatcher {
          public function dispatch(string $event, array $payload): void;
          public function listen(string $event, callable $listener): void;
          public function hasListeners(string $event): bool;
      }
    src/Handlers/WebhookHandler.php: |
      <?php
      namespace App\Handlers;

      class WebhookHandler {
          private string $secret;

          public function __construct(string $secret) {
              $this->secret = $secret;
          }

          public function verifySignature(string $payload, string $signature): bool {
              return hash_hmac('sha256', $payload, $this->secret) === $signature;
          }

          public function process(array $event): array {
              return ['event' => $event['type'], 'processed' => true];
          }
      }
