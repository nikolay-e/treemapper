    lib/geo/router.rb: |
      require_relative 'calculator'

      module Geo
        class Router
          def initialize(calculator)
            @calculator = calculator
          end

          def total_distance(waypoints)
            return 0.0 if waypoints.length < 2
            waypoints.each_cons(2).sum { |a, b| @calculator.haversine(a, b) }
          end

          def fastest_detour(waypoints, detour_point)
            best_index = 0
            best_cost = Float::INFINITY
            waypoints.each_cons(2).with_index do |(a, b), i|
              cost = @calculator.haversine(a, detour_point) + @calculator.haversine(detour_point, b) - @calculator.haversine(a, b)
              if cost < best_cost
                best_cost = cost
                best_index = i + 1
              end
            end
            { insert_at: best_index, extra_km: best_cost.round(2) }
          end
        end
      end
