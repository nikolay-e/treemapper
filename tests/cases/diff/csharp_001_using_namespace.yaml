              Console.WriteLine("Starting application");
          }
      }
    Formatting/StringHelper.cs: |
      using System;

      namespace MyApp.Formatting;

      // GARBAGE_CS_001_FMT_HELPER_C
      public static class StringHelper
      {
          // GARBAGE_CS_001_FMT_CAP_D
          public static string Capitalize(string input)
          {
              return input.ToUpper();
          }

          public static string ToCamelCase(string input)
          {
              // GARBAGE_CS_001_FMT_CAMEL_E
              return input.Replace(" ", "");
          }

          public static string ToSnakeCase(string input)
          {
              // GARBAGE_CS_001_FMT_SNAKE_F
              return input.Replace(" ", "_").ToLower();
          }
      }
    Services/NameFormatter.cs: |
      using System;
      using MyApp.Utilities;

      namespace MyApp.Services;

      // GARBAGE_CS_001_NAME_FMT_G
      public class NameFormatter
      {
          public string FormatDisplayName(string first, string last)
          {
              // GARBAGE_CS_001_NAME_DISPLAY_H
              var capitalized = StringHelper.Capitalize(first);
              var camel = StringHelper.ToCamelCase($"{first} {last}");
              return $"{capitalized} ({camel})";
          }

          public string FormatUsername(string name)
          {
              // GARBAGE_CS_001_NAME_USER_I
              return StringHelper.ToCamelCase(name);
          }
      }
    Tests/ProgramTests.cs: |
      using System;
      using MyApp.Utilities;
      using Xunit;

      namespace MyApp.Tests;

      // GARBAGE_CS_001_TEST_PROG_J
      public class ProgramTests
      {
          [Fact]
          public void Main_ProducesExpectedOutput()
          {
              // GARBAGE_CS_001_TEST_ASSERT_K
              var result = StringHelper.Capitalize("hello");
              Assert.Equal("Hello", result);
          }

          [Fact]
          public void CamelCase_ProducesExpectedOutput()
          {
              // GARBAGE_CS_001_TEST_CAMEL_L
              var camel = StringHelper.ToCamelCase("hello world example");
              Assert.Equal("helloWorldExample", camel);
          }
      }
