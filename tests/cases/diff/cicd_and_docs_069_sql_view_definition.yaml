name: cicd_and_docs_069_sql_view_definition
repo:
  initial_files:
    sql/views/user_orders_view.sql: |
      CREATE OR REPLACE VIEW user_orders_summary AS
      SELECT
          u.id AS user_id,
          u.name AS user_name,
          COUNT(o.id) AS order_count,
          SUM(o.total) AS total_spent
      FROM users u
      LEFT JOIN orders o ON u.id = o.user_id
      GROUP BY u.id, u.name;
    sql/views/product_sales_view.sql: |
      CREATE OR REPLACE VIEW product_sales_summary AS
      SELECT
          p.id AS product_id,
          p.name AS product_name,
          COUNT(oi.id) AS times_sold,
          SUM(oi.quantity) AS total_quantity
      FROM products p
      LEFT JOIN order_items oi ON p.id = oi.product_id
      GROUP BY p.id, p.name;
    src/reports/user_report.py: |
      from typing import Dict, List, Optional
      from dataclasses import dataclass
      from decimal import Decimal

      @dataclass
      class UserOrdersSummary:
          user_id: int
          user_name: str
          order_count: int
          total_spent: Decimal

      class UserReport:
          def __init__(self, db):
              self.db = db

          def get_summary(self, user_id: int) -> Optional[UserOrdersSummary]:
              result = self.db.query(
                  "SELECT * FROM user_orders_summary WHERE user_id = %s",
                  [user_id]
              )
              if result:
                  return UserOrdersSummary(**result[0])
              return None

          def get_all_summaries(self) -> List[UserOrdersSummary]:
              results = self.db.query("SELECT * FROM user_orders_summary")
              return [UserOrdersSummary(**r) for r in results]
    src/reports/product_report.py: |
      from typing import List
      from dataclasses import dataclass

      @dataclass
      class ProductSalesSummary:
          product_id: int
          product_name: str
          times_sold: int
          total_quantity: int

      class ProductReport:
          def __init__(self, db):
              self.db = db

          def get_top_sellers(self, limit: int = 10) -> List[ProductSalesSummary]:
              results = self.db.query(
                  "SELECT * FROM product_sales_summary ORDER BY times_sold DESC LIMIT %s",
                  [limit]
              )
              return [ProductSalesSummary(**r) for r in results]
  changed_files:
    sql/views/user_orders_view.sql: |
      CREATE OR REPLACE VIEW user_orders_summary AS
      SELECT
          u.id AS user_id,
          u.name AS user_name,
          u.email AS user_email,
          COUNT(o.id) AS order_count,
          COALESCE(SUM(o.total), 0) AS total_spent,
          COALESCE(AVG(o.total), 0) AS avg_order_value,
          MIN(o.created_at) AS first_order_date,
          MAX(o.created_at) AS last_order_date,
          CASE
              WHEN COUNT(o.id) >= 10 THEN 'gold'
              WHEN COUNT(o.id) >= 5 THEN 'silver'
              ELSE 'bronze'
          END AS customer_tier
      FROM users u
      LEFT JOIN orders o ON u.id = o.user_id AND o.status != 'cancelled'
      GROUP BY u.id, u.name, u.email;

      -- Create index on the underlying table for view performance
      CREATE INDEX IF NOT EXISTS idx_orders_user_status
          ON orders(user_id, status);
