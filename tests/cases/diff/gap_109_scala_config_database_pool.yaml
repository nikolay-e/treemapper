- difficulty:medium
- distance:2hop
fixtures:
  auto_garbage: true
repo:
  initial_files:
    src/main/scala/db/ConnectionPool.scala: |
      package db

      import config.DatabaseConfig

      class ConnectionPool(config: DatabaseConfig) {
        private var connections: List[Connection] = List.empty
        private val maxSize: Int = config.maxPoolSize

        def acquire(): Option[Connection] = {
          connections match {
            case head :: tail =>
              connections = tail
              Some(head)
            case Nil if connections.size < maxSize =>
              Some(Connection(config.jdbcUrl, config.username))
            case _ => None
          }
        }

        def release(conn: Connection): Unit = {
          if (connections.size < maxSize) {
            connections = conn :: connections
          }
        }
      }

      case class Connection(url: String, user: String)
