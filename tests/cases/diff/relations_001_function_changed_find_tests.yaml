name: relations_001_function_changed_find_tests
tags:
- lang:python
- change:single_file
- change:bug_fix
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    calculator.py: |
      def add(a, b):
          return a + b

      def subtract(a, b):
          return a - b
    tests/test_calculator.py: |
      from calculator import add, subtract

      def test_add():
          assert add(1, 2) == 3
          assert add(-1, 1) == 0

      def test_subtract():
          assert subtract(5, 3) == 2
    math_utils.py: |
      import math

      def clamp(value, min_val, max_val):
          return max(min_val, min(value, max_val))

      def round_to_precision(value, precision=2):
          factor = 10 ** precision
          return math.floor(value * factor + 0.5) / factor

      def percentage(part, whole):
          if whole == 0:
              return 0.0
          return (part / whole) * 100.0
    conversion_helpers.py: |
      def to_int_safe(value, default=0):
          try:
              return int(value)
          except (ValueError, TypeError):
              return default

      def to_float_safe(value, default=0.0):
          try:
              return float(value)
          except (ValueError, TypeError):
              return default

      def to_bool(value):
          if isinstance(value, str):
              return value.lower() in ('true', '1', 'yes')
          return bool(value)
  changed_files:
