    grid.css: |
      .container {
        display: flex;
        flex-wrap: wrap;
      }
      .col {
        flex: 1 1 200px;
      }
    main.css: |
      @import "grid.css";
      body { margin: 0; font-family: sans-serif; }
      .page-wrapper { padding: 24px; }
    CSS_NOISE_006_sidebar.css: |
      .CSS_NOISE_006_sidebar_nav { list-style: none; padding: 0; }
      .CSS_NOISE_006_sidebar_item { padding: 8px 12px; }
    CSS_NOISE_006_footer.css: |
      .CSS_NOISE_006_footer_links { display: flex; gap: 16px; }
      .CSS_NOISE_006_footer_copy { font-size: 12px; color: #888; }
