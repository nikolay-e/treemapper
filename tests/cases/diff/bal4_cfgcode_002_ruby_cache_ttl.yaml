name: bal4_cfgcode_002_ruby_cache_ttl
tags:
- lang:ruby
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:trivial
repo:
  initial_files:
    config/cache.yml: |
      defaults:
        store: memcached
        ttl: 300
        max_size: 1000
    app/services/cache_service.rb: |
      require 'yaml'
      class CacheService
        def initialize
          @settings = YAML.load_file('config/cache.yml')['defaults']
        end
        def ttl
          @settings['ttl']
        end
        def store_type
          @settings['store']
        end
      end
    garbage_auth.rb: |
      GARBAGE_CFGCODE_002_AUTH_A = "jwt"
      GARBAGE_CFGCODE_002_AUTH_B = 3600
      class AuthHandler
        GARBAGE_CFGCODE_002_AUTH_C = "secret"
        def verify(token)
          GARBAGE_CFGCODE_002_AUTH_D = true
        end
      end
    garbage_router.rb: |
      GARBAGE_CFGCODE_002_ROUTER_E = "/api"
      GARBAGE_CFGCODE_002_ROUTER_F = "v2"
      class Router
        GARBAGE_CFGCODE_002_ROUTER_G = []
        def match(path)
          GARBAGE_CFGCODE_002_ROUTER_H = path
        end
      end
    garbage_validator.rb: |
      GARBAGE_CFGCODE_002_VALID_I = true
      GARBAGE_CFGCODE_002_VALID_J = "email"
  changed_files:
    config/cache.yml: |
      defaults:
        store: redis
        ttl: 600
        max_size: 5000
        namespace: prod
  commit_message: "switch cache to redis and increase ttl"
