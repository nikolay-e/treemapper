name: cicd_and_docs_072_sql_schema_change_queries
tags:
- lang:python
- lang:sql
- change:multi_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    sql/queries/get_user_orders.sql: |
      SELECT
          o.id,
          o.total,
          o.created_at
      FROM orders o
      WHERE o.user_id = :user_id
      ORDER BY o.created_at DESC;
    sql/queries/get_product_reviews.sql: |
      SELECT
          r.id,
          r.rating,
          r.comment,
          r.created_at
      FROM reviews r
      WHERE r.product_id = :product_id
      ORDER BY r.created_at DESC;
    src/repositories/order_repository.py: |
      from typing import List
      from models.order import Order

      class OrderRepository:
          def __init__(self, db):
              self.db = db

          def get_user_orders(self, user_id: int) -> List[Order]:
              results = self.db.execute_file(
                  'sql/queries/get_user_orders.sql',
                  {'user_id': user_id}
              )
              return [Order(**r) for r in results]
    src/repositories/review_repository.py: |
      from typing import List
      from models.review import Review

      class ReviewRepository:
          def __init__(self, db):
              self.db = db

          def get_product_reviews(self, product_id: int) -> List[Review]:
              results = self.db.execute_file(
                  'sql/queries/get_product_reviews.sql',
                  {'product_id': product_id}
              )
              return [Review(**r) for r in results]
  changed_files:
    sql/queries/get_user_orders.sql: |
      SELECT
          o.id,
          o.total,
          o.status,
          o.shipping_address,
          o.created_at,
          o.updated_at,
          COUNT(oi.id) AS item_count,
          SUM(oi.quantity) AS total_items
      FROM orders o
      LEFT JOIN order_items oi ON o.id = oi.order_id
      WHERE o.user_id = :user_id
        AND o.status != 'cancelled'
        AND (:status IS NULL OR o.status = :status)
        AND (:start_date IS NULL OR o.created_at >= :start_date)
        AND (:end_date IS NULL OR o.created_at <= :end_date)
      GROUP BY o.id, o.total, o.status, o.shipping_address, o.created_at, o.updated_at
      ORDER BY o.created_at DESC
      LIMIT :limit OFFSET :offset;
    sql/queries/count_user_orders.sql: |
      SELECT COUNT(*) AS total_count
      FROM orders o
      WHERE o.user_id = :user_id
        AND o.status != 'cancelled'
        AND (:status IS NULL OR o.status = :status)
        AND (:start_date IS NULL OR o.created_at >= :start_date)
        AND (:end_date IS NULL OR o.created_at <= :end_date);
    sql/queries/get_product_reviews.sql: |
      SELECT
          r.id,
          r.rating,
          r.comment,
          r.created_at
      FROM reviews r
      WHERE r.product_id = :product_id
      ORDER BY r.created_at DESC;
    src/repositories/order_repository.py: |
      from typing import List
      from models.order import Order

      class OrderRepository:
          def __init__(self, db):
              self.db = db

          def get_user_orders(self, user_id: int) -> List[Order]:
              results = self.db.execute_file(
                  'sql/queries/get_user_orders.sql',
                  {'user_id': user_id}
              )
              return [Order(**r) for r in results]
    src/repositories/review_repository.py: |
      from typing import List
      from models.review import Review

      class ReviewRepository:
          def __init__(self, db):
              self.db = db

          def get_product_reviews(self, product_id: int) -> List[Review]:
              results = self.db.execute_file(
                  'sql/queries/get_product_reviews.sql',
                  {'product_id': product_id}
              )
              return [Review(**r) for r in results]
  commit_message: "db: expand get_user_orders query with filtering, pagination, and item counts"
