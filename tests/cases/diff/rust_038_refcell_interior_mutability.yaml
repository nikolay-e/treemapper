    util/DateUtil.kt: |
      package util

      import java.time.LocalDate
      import java.time.format.DateTimeParseException

      object DateUtil {
          // BUG: returns null instead of throwing on invalid format
          fun parseDate(raw: String): LocalDate? {
              return try {
                  LocalDate.parse(raw)
              } catch (e: DateTimeParseException) {
                  null
              }
          }
      }
    domain/Subscription.kt: |
      package domain

      import util.DateUtil
      import java.time.LocalDate

      data class Subscription(val userId: String, val rawExpiry: String) {
          val expiry: LocalDate? get() = DateUtil.parseDate(rawExpiry)
          val isActive: Boolean get() = expiry?.isAfter(LocalDate.now()) == true
      }
    service/SubscriptionService.kt: |
      package service

      import domain.Subscription

      class SubscriptionService {
          fun isSubscribed(userId: String, rawExpiry: String): Boolean {
              val sub = Subscription(userId, rawExpiry)
              return sub.isActive
          }
      }
