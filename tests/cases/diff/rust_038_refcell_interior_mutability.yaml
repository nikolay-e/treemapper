    src/counter.rs: |
      use std::cell::Cell;

      pub struct Counter {
          count: u64,
          name: String,
      }

      impl Counter {
          pub fn new(name: &str) -> Self {
              Self {
                  count: 0,
                  name: name.to_string(),
              }
          }

          pub fn increment(&mut self) {
              self.count += 1;
          }

          pub fn decrement(&mut self) {
              if self.count > 0 {
                  self.count -= 1;
              }
          }

          pub fn get(&self) -> u64 {
              self.count
          }

          pub fn name(&self) -> &str {
              &self.name
          }
      }

      impl Default for Counter {
          fn default() -> Self {
              Self::new("default")
          }
      }

      pub struct CellCounter {
          count: Cell<u64>,
      }

      impl CellCounter {
          pub fn new() -> Self {
              Self {
                  count: Cell::new(0),
              }
          }

          pub fn increment(&self) {
              self.count.set(self.count.get() + 1);
          }

          pub fn get(&self) -> u64 {
              self.count.get()
          }
      }
    src/metrics.rs: |
      use std::sync::atomic::{AtomicU64, Ordering};
      use std::collections::HashMap;

      pub struct MetricsCollector {
          counters: HashMap<String, AtomicU64>,
      }

      impl MetricsCollector {
          pub fn new() -> Self {
              Self { counters: HashMap::new() }
          }

          pub fn increment(&self, name: &str) {
              if let Some(counter) = self.counters.get(name) {
                  counter.fetch_add(1, Ordering::Relaxed);
              }
          }

          pub fn register(&mut self, name: &str) {
              self.counters.insert(name.to_string(), AtomicU64::new(0));
          }

          pub fn get(&self, name: &str) -> u64 {
              self.counters.get(name).map_or(0, |c| c.load(Ordering::Relaxed))
          }

          pub fn snapshot(&self) -> HashMap<String, u64> {
              self.counters.iter().map(|(k, v)| (k.clone(), v.load(Ordering::Relaxed))).collect()
          }
      }
    src/event_bus.rs: |
      use std::collections::HashMap;

      type Handler = Box<dyn Fn(&str)>;

      pub struct EventBus {
          handlers: HashMap<String, Vec<Handler>>,
      }

      impl EventBus {
          pub fn new() -> Self {
              Self { handlers: HashMap::new() }
          }

          pub fn subscribe(&mut self, event: &str, handler: Handler) {
              self.handlers.entry(event.to_string()).or_default().push(handler);
          }

          pub fn publish(&self, event: &str, data: &str) {
              if let Some(handlers) = self.handlers.get(event) {
                  for handler in handlers {
                      handler(data);
                  }
              }
          }

          pub fn subscriber_count(&self, event: &str) -> usize {
              self.handlers.get(event).map_or(0, |h| h.len())
          }
      }
    src/timer.rs: |
      use std::cell::Cell;
      use std::time::Instant;

      pub struct Timer {
          start: Cell<Instant>,
          label: String,
      }

      impl Timer {
          pub fn new(label: &str) -> Self {
              Self {
                  start: Cell::new(Instant::now()),
                  label: label.to_string(),
              }
          }

          pub fn restart(&self) {
              self.start.set(Instant::now());
          }

          pub fn elapsed_ms(&self) -> u128 {
              self.start.get().elapsed().as_millis()
          }

          pub fn label(&self) -> &str {
              &self.label
          }
      }
