  changed_files:
    util/DateUtil.kt: |
      package util

      import java.time.LocalDate
      import java.time.format.DateTimeParseException

      object DateUtil {
          fun parseDate(raw: String): LocalDate {
              if (raw.isBlank()) throw IllegalArgumentException("date string must not be blank")
              return try {
                  LocalDate.parse(raw)
              } catch (e: DateTimeParseException) {
                  throw IllegalArgumentException("invalid date format: $raw", e)
              }
          }
      }
    domain/Subscription.kt: |
      package domain

      import util.DateUtil
      import java.time.LocalDate

      data class Subscription(val userId: String, val rawExpiry: String) {
          val expiry: LocalDate get() = DateUtil.parseDate(rawExpiry)
          val isActive: Boolean get() = expiry.isAfter(LocalDate.now())
      }
    service/SubscriptionService.kt: |
      package service

      import domain.Subscription

      class SubscriptionService {
          fun isSubscribed(userId: String, rawExpiry: String): Boolean {
              val sub = Subscription(userId, rawExpiry)
              return sub.isActive
          }
      }
    api/SubscriptionController.kt: |
      package api

      import service.SubscriptionService

      class SubscriptionController(private val svc: SubscriptionService) {
          fun checkAccess(userId: String, rawExpiry: String): String {
              return if (svc.isSubscribed(userId, rawExpiry)) "granted" else "denied"
          }
      }
    garbage/Metrics.kt: |
