      class Container:
          def __init__(self):
              self.bindings: dict[str, Binding] = {}
          def bind(self, interface: str, implementation, singleton: bool = False):
              self.bindings[interface] = Binding(interface, implementation, singleton)
          def resolve(self, interface: str):
