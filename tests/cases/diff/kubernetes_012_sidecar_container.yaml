name: kubernetes_012_sidecar_container
tags:
- lang:yaml
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    config/fluent-bit.conf: |
      [SERVICE]
          Flush         5
          Daemon        Off
          Log_Level     info

      [INPUT]
          Name              tail
          Path              /var/log/app/*.log
          Tag               app.logs
          Refresh_Interval  5

      [OUTPUT]
          Name          stdout
          Match         *
    k8s/apps/backend/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend-service
        namespace: production
        labels:
          app: backend-service
          tier: backend
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: backend-service
        template:
          metadata:
            labels:
              app: backend-service
              tier: backend
          spec:
            containers:
            - name: backend
              image: backend-service:v2.0.0
              ports:
              - containerPort: 8080
              env:
              - name: LOG_FORMAT
                value: "json"
              - name: LOG_PATH
                value: "/var/log/app"
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
    k8s/apps/backend/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: backend-service
        namespace: production
      spec:
        selector:
          app: backend-service
        ports:
        - port: 80
          targetPort: 8080
    k8s/logging/fluentd-aggregator.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fluentd-aggregator
        namespace: logging
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: fluentd-aggregator
        template:
          spec:
            containers:
            - name: fluentd
              image: fluent/fluentd:v1.16
              ports:
              - containerPort: 24224
              env:
              - name: FLUENT_ELASTICSEARCH_HOST
                value: "elasticsearch.logging.svc"
    k8s/monitoring/loki-stack.yaml: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: loki
        namespace: monitoring
      spec:
        serviceName: loki
        replicas: 1
        selector:
          matchLabels:
            app: loki
        template:
          spec:
            containers:
            - name: loki
              image: grafana/loki:2.9.0
              ports:
              - containerPort: 3100
              args:
              - -config.file=/etc/loki/local-config.yaml
  changed_files:
    config/fluent-bit.conf: |
      [SERVICE]
          Flush         5
          Daemon        Off
          Log_Level     info

      [INPUT]
          Name              tail
          Path              /var/log/app/*.log
          Tag               app.logs
          Refresh_Interval  5

      [OUTPUT]
          Name          stdout
          Match         *
    k8s/apps/backend/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend-service
        namespace: production
        labels:
          app: backend-service
          tier: backend
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: backend-service
        template:
          metadata:
            labels:
              app: backend-service
              tier: backend
          spec:
            containers:
            - name: backend
              image: backend-service:v2.0.0
              ports:
              - containerPort: 8080
              env:
              - name: LOG_FORMAT
                value: "json"
              - name: LOG_PATH
                value: "/var/log/app"
              volumeMounts:
              - name: shared-logs
                mountPath: /var/log/app
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
            - name: log-shipper
              image: fluent/fluent-bit:2.1
              volumeMounts:
              - name: shared-logs
                mountPath: /var/log/app
                readOnly: true
              - name: fluent-bit-config
                mountPath: /fluent-bit/etc
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
            volumes:
            - name: shared-logs
              emptyDir: {}
            - name: fluent-bit-config
              configMap:
                name: fluent-bit-config
    k8s/apps/backend/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: backend-service
        namespace: production
      spec:
        selector:
          app: backend-service
        ports:
        - port: 80
          targetPort: 8080
    k8s/logging/fluentd-aggregator.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: fluentd-aggregator
        namespace: logging
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: fluentd-aggregator
        template:
          spec:
            containers:
            - name: fluentd
              image: fluent/fluentd:v1.16
              ports:
              - containerPort: 24224
              env:
              - name: FLUENT_ELASTICSEARCH_HOST
                value: "elasticsearch.logging.svc"
    k8s/monitoring/loki-stack.yaml: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: loki
        namespace: monitoring
      spec:
        serviceName: loki
        replicas: 1
        selector:
          matchLabels:
            app: loki
        template:
          spec:
            containers:
            - name: loki
              image: grafana/loki:2.9.0
              ports:
              - containerPort: 3100
              args:
              - -config.file=/etc/loki/local-config.yaml
  commit_message: Update files
fragments:
- id: sidecar_log_shipper
  selector:
    path: k8s/apps/backend/deployment.yaml
    anchor: 'name: log-shipper'
- id: shared_logs_volume
  selector:
    path: k8s/apps/backend/deployment.yaml
    anchor: 'name: shared-logs'
- id: fluent_bit_image
  selector:
    path: k8s/apps/backend/deployment.yaml
    anchor: fluent/fluent-bit:2.1
- id: sidecar_readonly_mount
  selector:
    path: k8s/apps/backend/deployment.yaml
    anchor: 'readOnly: true'
- id: fluent_bit_config_input_path
  selector:
    path: config/fluent-bit.conf
    anchor: /var/log/app/*.log
- id: no_fluentd_aggregator
  selector:
    path: k8s/logging/fluentd-aggregator.yaml
    anchor: fluentd-aggregator
- id: no_loki_stack
  selector:
    path: k8s/monitoring/loki-stack.yaml
    anchor: grafana/loki
- id: no_backend_service
  selector:
    path: k8s/apps/backend/service.yaml
    anchor: 'targetPort: 8080'
oracle:
  required:
  - sidecar_log_shipper
  - shared_logs_volume
  - fluent_bit_image
  - sidecar_readonly_mount
  - fluent_bit_config_input_path
  allowed: []
  forbidden:
  - no_fluentd_aggregator
  - no_loki_stack
  - no_backend_service
