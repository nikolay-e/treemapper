name: gap2_147_jspy_multifile_new_func_fitness_tracker
tags:
- change:multi_file
- change:new_function
- context:same_file
- difficulty:easy
- distance:0hop
- lang:javascript
- lang:python
repo:
  initial_files:
    api/workouts.py: |
      from dataclasses import dataclass

      @dataclass
      class Workout:
          exercise: str
          sets: int
          reps: int
          weight_kg: float

      class WorkoutLogger:
          def __init__(self):
              self._log: list[Workout] = []

          def add_entry(self, workout: Workout) -> None:
              self._log.append(workout)

          def total_volume(self) -> float:
              return sum(w.sets * w.reps * w.weight_kg for w in self._log)
    web/dashboard.js: |
      function formatVolume(kg) {
        if (kg >= 1000) return `${(kg / 1000).toFixed(1)}t`;
        return `${kg.toFixed(0)}kg`;
      }

      function renderWorkoutCard(workout) {
        return `<div>${workout.exercise}: ${workout.sets}x${workout.reps} @ ${workout.weight_kg}kg</div>`;
      }
    api/nutrition_log.py: |
      DAILY_PROTEIN_TARGET_G = 150

      class NutritionLog:
          def __init__(self):
              self._meals: list[dict] = []

          def log_meal(self, name: str, protein_g: float) -> None:
              self._meals.append({"name": name, "protein_g": protein_g})

          def protein_remaining(self) -> float:
              consumed = sum(m["protein_g"] for m in self._meals)
              return max(0, DAILY_PROTEIN_TARGET_G - consumed)
  changed_files:
    api/workouts.py: |
      from dataclasses import dataclass

      @dataclass
      class Workout:
          exercise: str
          sets: int
          reps: int
          weight_kg: float

      class WorkoutLogger:
          def __init__(self):
              self._log: list[Workout] = []

          def add_entry(self, workout: Workout) -> None:
              self._log.append(workout)

          def total_volume(self) -> float:
              return sum(w.sets * w.reps * w.weight_kg for w in self._log)

          def personal_record(self, exercise: str) -> float:
              matching = [w.weight_kg for w in self._log if w.exercise == exercise]
              return max(matching) if matching else 0.0
    web/dashboard.js: |
      function formatVolume(kg) {
        if (kg >= 1000) return `${(kg / 1000).toFixed(1)}t`;
        return `${kg.toFixed(0)}kg`;
      }

      function renderWorkoutCard(workout) {
        return `<div>${workout.exercise}: ${workout.sets}x${workout.reps} @ ${workout.weight_kg}kg</div>`;
      }

      function renderPersonalRecord(exercise, weightKg) {
        return `<div class="pr">PR: ${exercise} — ${weightKg}kg</div>`;
      }
  commit_message: "feat: add personal record tracking and PR display"
