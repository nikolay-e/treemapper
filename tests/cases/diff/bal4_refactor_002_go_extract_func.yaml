name: bal4_refactor_002_go_extract_func
tags:
- lang:go
- change:multi_file
- change:refactor
- context:import_chain
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    pkg/auth/auth.go: |
      package auth

      func Login(user, pass string) (string, error) {
          if len(user) < 3 {
              return "", fmt.Errorf("user too short")
          }
          if len(pass) < 8 {
              return "", fmt.Errorf("pass too short")
          }
          return generateToken(user), nil
      }

      func generateToken(user string) string {
          return "tok_" + user
      }
    cmd/server.go: |
      package main

      import "app/pkg/auth"

      func handleLogin(u, p string) {
          tok, err := auth.Login(u, p)
          if err != nil {
              panic(err)
          }
          _ = tok
      }
    garbage_config.go: |
      package garbage

      GARBAGE_BAL4R002_CFG_A = "config"
      GARBAGE_BAL4R002_ENV_B = "prod"

      type Config struct {
          GARBAGE_BAL4R002_STRUCT_C bool
      }
    garbage_metrics.go: |
      package garbage

      GARBAGE_BAL4R002_MET_D = "metrics"
      GARBAGE_BAL4R002_CNT_E = 0
  changed_files:
    pkg/auth/auth.go: |
      package auth

      func Login(user, pass string) (string, error) {
          if err := validateCredentials(user, pass); err != nil {
              return "", err
          }
          return generateToken(user), nil
      }

      func validateCredentials(user, pass string) error {
          if len(user) < 3 {
              return fmt.Errorf("user too short")
          }
          if len(pass) < 8 {
              return fmt.Errorf("pass too short")
          }
          return nil
      }

      func generateToken(user string) string {
          return "tok_" + user
      }
    cmd/server.go: |
      package main

      import "app/pkg/auth"

      func handleLogin(u, p string) {
          tok, err := auth.Login(u, p)
          if err != nil {
              panic(err)
          }
          _ = tok
      }
    garbage_config.go: |
      package garbage

      GARBAGE_BAL4R002_CFG_A = "config"
      GARBAGE_BAL4R002_ENV_B = "prod"

      type Config struct {
          GARBAGE_BAL4R002_STRUCT_C bool
      }
    garbage_metrics.go: |
      package garbage

      GARBAGE_BAL4R002_MET_D = "metrics"
      GARBAGE_BAL4R002_CNT_E = 0
  commit_message: "refactor: extract validateCredentials from Login"
