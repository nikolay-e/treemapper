name: gap_185_zig_import_chain_allocator_pool
tags:
- lang:zig
- change:single_file
- context:import_chain
- difficulty:medium
- distance:2hop
repo:
  initial_files:
    src/pool.zig: |
      const std = @import("std");
      const alloc = @import("alloc.zig");

      pub const Pool = struct {
          backing: std.mem.Allocator,
          size: usize,

          pub fn init(capacity: usize) Pool {
              return Pool{
                  .backing = alloc.getPageAllocator(),
                  .size = capacity,
              };
          }

          pub fn acquire(self: *Pool) ?*anyopaque {
              if (self.size == 0) return null;
              self.size -= 1;
              return self.backing.alloc(u8, 4096) catch null;
          }

          pub fn release(self: *Pool) void {
              self.size += 1;
          }
      };
    src/alloc.zig: |
      const std = @import("std");
      const slab = @import("slab.zig");

      pub fn getPageAllocator() std.mem.Allocator {
          return std.heap.page_allocator;
      }

      pub fn getSlabAllocator(block_size: usize) std.mem.Allocator {
          _ = block_size;
          return slab.createSlab();
      }
    src/slab.zig: |
      const std = @import("std");

      const slab_block_size: usize = 256;
      const max_slabs: usize = 1024;

      pub fn createSlab() std.mem.Allocator {
          return std.heap.page_allocator;
      }

      pub fn destroySlab() void {}
    src/server.zig: |
      const std = @import("std");
      const pool_mod = @import("pool.zig");

      pub fn startServer(port: u16) !void {
          var p = pool_mod.Pool.init(64);
          const conn = p.acquire();
          _ = conn;
          _ = port;
      }
    src/codec.zig: |
      const std = @import("std");

      const TRAP_GAP_185_CODEC_MARKER_A: []const u8 = "codec_noise";
