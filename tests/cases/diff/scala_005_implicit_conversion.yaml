name: scala_005_implicit_conversion
repo:
  initial_files:
    src/conversions/Implicits.scala: |
      package conversions

      case class User(name: String, age: Int)
      case class UserProfile(displayName: String, isMinor: Boolean)

      object Implicits {
        implicit def stringToUser(s: String): User = User(s, 0)

        implicit def intToUser(id: Int): User = User(s"user-$id", id)

        implicit def userToProfile(u: User): UserProfile =
          UserProfile(u.name, u.age < 18)
      }
    src/services/UserProcessor.scala: |
      package services

      import conversions.User

      class UserProcessor {
        def greet(user: User): String = s"Hello, ${user.name}"
      }
    src/conversions/JsonCodec.scala: |
      package conversions

      trait JsonEncoder[T] {
        def encode(value: T): String
      }

      trait JsonDecoder[T] {
        def decode(json: String): Option[T]
      }

      object JsonCodec {
        implicit val stringEncoder: JsonEncoder[String] = (value: String) =>
          s""""$value""""

        implicit val intEncoder: JsonEncoder[Int] = (value: Int) =>
          value.toString

        def toJson[T](value: T)(implicit encoder: JsonEncoder[T]): String =
          encoder.encode(value)
      }
    src/services/ProfileRenderer.scala: |
      package services

      import conversions.UserProfile

      class ProfileRenderer {
        def render(profile: UserProfile): String = {
          val status = if (profile.isMinor) "Minor" else "Adult"
          s"${profile.displayName} ($status)"
        }

        def renderBadge(profile: UserProfile): String = {
          s"[${profile.displayName}]"
        }
      }
  changed_files:
