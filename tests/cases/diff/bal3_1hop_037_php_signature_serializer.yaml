repo:
  initial_files:
    src/Serializer/JsonSerializer.php: |
      <?php
      namespace App\Serializer;

      class JsonSerializer
      {
          public function serialize(array $data): string
          {
              return json_encode($data);
          }

          public function deserialize(string $json): array
          {
              return json_decode($json, true);
          }
      }
    src/Api/ResponseBuilder.php: |
      <?php
      namespace App\Api;

      use App\Serializer\JsonSerializer;

      class ResponseBuilder
      {
          private JsonSerializer $serializer;

          public function __construct(JsonSerializer $serializer)
          {
              $this->serializer = $serializer;
          }

          public function success(array $data): string
          {
              return $this->serializer->serialize(['status' => 'ok', 'data' => $data]);
          }

          public function error(string $message): string
          {
              return $this->serializer->serialize(['status' => 'error', 'message' => $message]);
          }
      }
    src/Api/RequestParser.php: |
      <?php
      namespace App\Api;

      use App\Serializer\JsonSerializer;

      class RequestParser
      {
          private JsonSerializer $serializer;

          public function __construct(JsonSerializer $serializer)
          {
              $this->serializer = $serializer;
          }

          public function parse(string $body): array
          {
              return $this->serializer->deserialize($body);
          }
      }
    src/Export/DataExporter.php: |
      <?php
      namespace App\Export;

      use App\Serializer\JsonSerializer;

      class DataExporter
