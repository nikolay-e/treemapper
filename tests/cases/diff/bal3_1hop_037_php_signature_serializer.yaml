  changed_files:
    src/Serializer/JsonSerializer.php: |
      <?php
      namespace App\Serializer;

      class JsonSerializer
      {
          public function serialize(array $data, bool $prettyPrint = false): string
          {
              $flags = $prettyPrint ? JSON_PRETTY_PRINT : 0;
              return json_encode($data, $flags | JSON_THROW_ON_ERROR);
          }

          public function deserialize(string $json, bool $strict = true): array
          {
              $result = json_decode($json, true, 512, $strict ? JSON_THROW_ON_ERROR : 0);
              return $result ?? [];
          }
      }
  commit_message: "Add pretty print and strict mode to JsonSerializer"
