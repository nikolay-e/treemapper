repo:
  initial_files:
    settings/database.py: |
      POOL_SIZE = 5
      POOL_TIMEOUT = 30
      CONNECTION_STRING = "postgresql://localhost:5432/warehouse"
      ECHO_SQL = False
    repository/inventory.py: |
      from settings.database import POOL_SIZE, POOL_TIMEOUT

      class InventoryRepository:
          def __init__(self):
              self.pool_size = POOL_SIZE
              self.timeout = POOL_TIMEOUT
              self._connections: list = []

          def acquire(self) -> object:
              if len(self._connections) < self.pool_size:
                  conn = self._create_connection()
                  self._connections.append(conn)
                  return conn
              raise RuntimeError("Pool exhausted")

          def _create_connection(self) -> object:
              return object()

          def release(self, conn: object) -> None:
              self._connections.remove(conn)
    repository/audit.py: |
      from settings.database import CONNECTION_STRING

      TRAP_GAP_182_AUDIT_MARKER_A: str = "audit_noise"
      TRAP_GAP_182_AUDIT_FLAG_B: bool = True

