name: cicd_and_docs_059_protobuf_import
tags:
- lang:protobuf
- lang:python
- change:multi_file
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    proto/common.proto: |
      syntax = "proto3";

      package common;

      message Pagination {
        int32 page = 1;
        int32 page_size = 2;
      }
    proto/orders.proto: |
      syntax = "proto3";

      package orders;

      import "proto/common.proto";

      message ListOrdersRequest {
        common.Pagination pagination = 1;
      }

      message Order {
        int64 id = 1;
        string status = 2;
      }
    src/services/order_service.py: |
      from proto import orders_pb2, common_pb2

      def create_list_orders_request(page: int, page_size: int):
          pagination = common_pb2.Pagination(page=page, page_size=page_size)
          return orders_pb2.ListOrdersRequest(pagination=pagination)
    proto/inventory.proto: |
      syntax = "proto3";

      package inventory;

      service InventoryService {
        rpc CheckStock(CheckStockRequest) returns (CheckStockResponse);
      }

      message CheckStockRequest {
        string product_id = 1;
      }

      message CheckStockResponse {
        int32 available = 1;
        string warehouse = 2;
      }
    src/services/notification_service.py: |
      from typing import List

      class NotificationService:
          def send_email(self, to: str, subject: str, body: str) -> bool:
              return True

          def send_bulk(self, recipients: List[str], subject: str, body: str) -> int:
              sent = 0
              for r in recipients:
                  if self.send_email(r, subject, body):
                      sent += 1
              return sent
  changed_files:
    proto/common.proto: |
      syntax = "proto3";

      package common;

      message Pagination {
        int32 page = 1;
        int32 page_size = 2;
        string sort_by = 3;
        SortOrder sort_order = 4;
      }

      enum SortOrder {
        SORT_ORDER_UNSPECIFIED = 0;
        SORT_ORDER_ASC = 1;
        SORT_ORDER_DESC = 2;
      }

      message DateRange {
        string start_date = 1;
        string end_date = 2;
      }

      message Money {
        int64 amount = 1;
        string currency = 2;
      }
    proto/orders.proto: |
      syntax = "proto3";

      package orders;

      import "proto/common.proto";

      message ListOrdersRequest {
        common.Pagination pagination = 1;
        common.DateRange date_range = 2;
      }

      message Order {
        int64 id = 1;
        string status = 2;
        common.Money total = 3;
      }
  commit_message: "Extend common proto types and update orders to use them"
fragments:
- id: common_proto
  selector:
    path: proto/common.proto
- id: orders_proto
  selector:
    path: proto/orders.proto
- id: new_sort_field
  selector:
    anchor: string sort_by = 3;
- id: orders_uses_date_range
  selector:
    anchor: common.DateRange date_range = 2;
- id: order_service_consumer
  selector:
    path: src/services/order_service.py
    anchor: from proto import orders_pb2, common_pb2
- id: no_inventory_proto
  selector:
    path: proto/inventory.proto
    anchor: service InventoryService
- id: no_notification_service
  selector:
    path: src/services/notification_service.py
    anchor: class NotificationService
oracle:
  required:
  - common_proto
  - orders_proto
  - new_sort_field
  - orders_uses_date_range
  - order_service_consumer
  allowed: []
  forbidden:
  - no_inventory_proto
  - no_notification_service
