name: ruby_021_rspec_test_discovery
tags:
- lang:ruby
- change:single_file
- change:signature
- context:test_file
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    lib/cart.rb: |
      class Cart
        attr_reader :items

        def initialize
          @items = []
        end

        def add_item(product, quantity = 1)
          existing = @items.find { |i| i[:product] == product }
          if existing
            existing[:quantity] += quantity
          else
            @items << { product: product, quantity: quantity }
          end
        end

        def total
          @items.sum { |i| i[:product].price * i[:quantity] }
        end

        def item_count
          @items.sum { |i| i[:quantity] }
        end
      end
    spec/cart_spec.rb: |
      require 'cart'

      RSpec.describe Cart do
        let(:cart) { Cart.new }
        let(:product) { double('Product', name: 'Widget', price: 9.99) }

        describe '#add_item' do
          it 'adds a new item' do
            cart.add_item(product)
            expect(cart.items.length).to eq(1)
          end

          it 'increments quantity for existing item' do
            cart.add_item(product, 2)
            cart.add_item(product, 3)
            expect(cart.items.first[:quantity]).to eq(5)
          end
        end

        describe '#total' do
          it 'calculates total price' do
            cart.add_item(product, 3)
            expect(cart.total).to eq(29.97)
          end
        end

        describe '#item_count' do
          it 'returns total quantity' do
            cart.add_item(product, 2)
            expect(cart.item_count).to eq(2)
          end
        end
      end
    lib/discount.rb: |
      class Discount
        attr_reader :code, :percentage

        def initialize(code, percentage)
          @code = code
          @percentage = percentage
        end

        def apply(amount)
          amount * (1 - @percentage / 100.0)
        end
      end
  changed_files:
    lib/cart.rb: |
      class Cart
        attr_reader :items

        def initialize
          @items = []
        end

        def add_item(product, quantity = 1)
          existing = @items.find { |i| i[:product] == product }
          if existing
            existing[:quantity] += quantity
          else
            @items << { product: product, quantity: quantity }
          end
        end

        def remove_item(product)
          @items.reject! { |i| i[:product] == product }
        end

        def total
          @items.sum { |i| i[:product].price * i[:quantity] }
        end

        def item_count
          @items.sum { |i| i[:quantity] }
        end

        def empty?
          @items.empty?
        end
      end
    spec/cart_spec.rb: |
      require 'cart'

      RSpec.describe Cart do
        let(:cart) { Cart.new }
        let(:product) { double('Product', name: 'Widget', price: 9.99) }

        describe '#add_item' do
          it 'adds a new item' do
            cart.add_item(product)
            expect(cart.items.length).to eq(1)
          end

          it 'increments quantity for existing item' do
            cart.add_item(product, 2)
            cart.add_item(product, 3)
            expect(cart.items.first[:quantity]).to eq(5)
          end
        end

        describe '#total' do
          it 'calculates total price' do
            cart.add_item(product, 3)
            expect(cart.total).to eq(29.97)
          end
        end

        describe '#item_count' do
          it 'returns total quantity' do
            cart.add_item(product, 2)
            expect(cart.item_count).to eq(2)
          end
        end
      end
    lib/discount.rb: |
      class Discount
        attr_reader :code, :percentage

        def initialize(code, percentage)
          @code = code
          @percentage = percentage
        end

        def apply(amount)
          amount * (1 - @percentage / 100.0)
        end
      end
  commit_message: "feat(cart): add remove_item and empty? methods"
