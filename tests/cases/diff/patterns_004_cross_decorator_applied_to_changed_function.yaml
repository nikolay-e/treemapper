repo:
  initial_files:
    decorators/auth.py: |
      import functools

      def login_required(func):
          @functools.wraps(func)
          def wrapper(*args, **kwargs):
              if not is_authenticated():
                  raise ValueError("Not authenticated")
              return func(*args, **kwargs)
          return wrapper

      def is_authenticated():
          return True

      def admin_only(func):
          @functools.wraps(func)
          def wrapper(*args, **kwargs):
              if not is_admin():
                  raise ValueError("Admin access required")
              return func(*args, **kwargs)
          return wrapper

      def is_admin():
          return False
    decorators/rate.py: |
      import functools
      import time

      def rate_limit(limit):
          def decorator(func):
              calls = []
              @functools.wraps(func)
              def wrapper(*args, **kwargs):
                  now = time.time()
                  calls[:] = [c for c in calls if now - c < 60]
                  if len(calls) >= limit:
                      raise ValueError("Rate limit exceeded")
                  calls.append(now)
                  return func(*args, **kwargs)
              return wrapper
          return decorator
    api.py: |
      from decorators.auth import login_required
      from decorators.rate import rate_limit

      @login_required
      @rate_limit(100)
      def api_endpoint():
          return {"status": "ok"}

      @login_required
      def user_profile():
          return {"user": "current"}
    utils/api_versioning.py: |
      SUPPORTED_VERSIONS = ["v1", "v2", "v3"]
      DEFAULT_API_VERSION = "v2"

      class ApiVersionRouter:
          def __init__(self):
              self._version_handlers: dict[str, callable] = {}

          def register(self, version: str, handler: callable) -> None:
              self._version_handlers[version] = handler

          def route(self, version: str, request: dict) -> dict:
              handler = self._version_handlers.get(version)
              if not handler:
                  return {"error": f"Unsupported version: {version}"}
              return handler(request)
    utils/request_sanitizer.py: |
      import html

      DANGEROUS_TAGS = ["script", "iframe", "object", "embed"]

      class RequestSanitizer:
          def sanitize_string(self, value: str) -> str:
              return html.escape(value)

          def sanitize_params(self, params: dict) -> dict:
              return {k: self.sanitize_string(str(v)) for k, v in params.items()}
