repo:
  initial_files:
    src/ThemeContext.tsx: |
      import React, { createContext, useState, ReactNode } from 'react';

      export interface Theme {
          primary: string;
          secondary: string;
          background: string;
      }

      export interface ThemeContextValue {
          theme: Theme;
          toggleTheme: () => void;
      }

      export const ThemeContext = createContext<ThemeContextValue | null>(null);

      export function ThemeProvider({ children }: { children: ReactNode }) {
          const [isDark, setIsDark] = useState(false);

          const theme: Theme = isDark
              ? { primary: '#fff', secondary: '#ccc', background: '#222' }
              : { primary: '#000', secondary: '#333', background: '#fff' };

          const toggleTheme = () => setIsDark(prev => !prev);

          return (
              <ThemeContext.Provider value={{ theme, toggleTheme }}>
                  {children}
              </ThemeContext.Provider>
          );
      }
    src/ThemedButton.tsx: |
      import React from 'react';

      export function ThemedButton() {
          return <button>TODO</button>;
      }
    src/contexts/AuthContext.tsx: |
      import React, { createContext, useState, ReactNode } from 'react';

      export interface AuthState {
          user: { id: string; email: string } | null;
          token: string | null;
          isAuthenticated: boolean;
      }

      export interface AuthContextValue {
          auth: AuthState;
          login: (email: string, password: string) => Promise<void>;
          logout: () => void;
      }

      export const AuthContext = createContext<AuthContextValue | null>(null);

      export function AuthProvider({ children }: { children: ReactNode }) {
          const [auth, setAuth] = useState<AuthState>({
              user: null,
              token: null,
              isAuthenticated: false,
          });

          const login = async (email: string, password: string) => {
              setAuth({ user: { id: '1', email }, token: 'fake-token', isAuthenticated: true });
          };

          const logout = () => {
              setAuth({ user: null, token: null, isAuthenticated: false });
          };

          return (
              <AuthContext.Provider value={{ auth, login, logout }}>
                  {children}
              </AuthContext.Provider>
          );
      }
    src/components/ThemeToggle.tsx: |
      import React from 'react';

      interface ThemeToggleProps {
          themes: string[];
          currentTheme: string;
          onSelect: (theme: string) => void;
      }

      export function ThemeToggle({ themes, currentTheme, onSelect }: ThemeToggleProps) {
          return (
              <div className="theme-selector">
                  {themes.map(t => (
                      <button
                          key={t}
                          className={t === currentTheme ? 'active' : ''}
                          onClick={() => onSelect(t)}
                      >
                          {t}
                      </button>
                  ))}
              </div>
          );
      }
