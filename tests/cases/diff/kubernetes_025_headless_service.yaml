name: kubernetes_025_headless_service
tags:
- lang:yaml
- change:single_file
- change:config
- context:import_chain
- distance:2hop
- difficulty:medium
xfail:
  category: k8s-config-over-discovery
repo:
  initial_files:
    k8s/database/statefulset.yaml: |
      apiVersion: apps/v1
      kind: StatefulSet
      metadata:
        name: postgres
        namespace: database
        labels:
          app: postgres
      spec:
        serviceName: postgres
        replicas: 3
        selector:
          matchLabels:
            app: postgres
        template:
          metadata:
            labels:
              app: postgres
          spec:
            containers:
            - name: postgres
              image: postgres:15-alpine
              ports:
              - containerPort: 5432
                name: postgres
              env:
              - name: POSTGRES_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: postgres-secret
                    key: password
              volumeMounts:
              - name: data
                mountPath: /var/lib/postgresql/data
        volumeClaimTemplates:
        - metadata:
            name: data
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi
    k8s/database/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: postgres
        namespace: database
      spec:
        selector:
          app: postgres
        ports:
        - port: 5432
          targetPort: 5432
    k8s/database/backup-cronjob.yaml: |
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: postgres-backup
        namespace: database
      spec:
        schedule: "0 2 * * *"
        jobTemplate:
          spec:
            template:
              spec:
                containers:
                - name: backup
                  image: postgres:15-alpine
                  command:
                  - /bin/sh
                  - -c
                  - pg_dump -h postgres -U postgres > /backups/dump-$(date +%Y%m%d).sql
                restartPolicy: Never
    k8s/database/pgbouncer.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: pgbouncer
        namespace: database
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: pgbouncer
        template:
          spec:
            containers:
            - name: pgbouncer
              image: edoburu/pgbouncer:1.21.0
              ports:
              - containerPort: 5432
              env:
              - name: DATABASE_URL
                value: "postgres://postgres:5432/production"
              - name: POOL_MODE
                value: "transaction"
              - name: MAX_CLIENT_CONN
                value: "200"
