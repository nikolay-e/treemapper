  changed_files:
    flags/flag.py: |
      from typing import Optional
      class FeatureFlag:
          def __init__(self, name: str, enabled: bool = False,
                       rollout_percentage: int = 100):
              self.name = name
              self.enabled = enabled
              self.rollout_percentage = rollout_percentage
          def is_active(self) -> bool:
              return self.enabled
          def toggle(self):
              self.enabled = not self.enabled
          def is_in_rollout(self, user_hash: int) -> bool:
              return self.enabled and (user_hash % 100) < self.rollout_percentage
    flags/store.py: |
      from flags.flag import FeatureFlag
