repo:
  initial_files:
    flags/flag.py: |
      class FeatureFlag:
          def __init__(self, name: str, enabled: bool = False):
              self.name = name
              self.enabled = enabled
          def is_active(self) -> bool:
              return self.enabled
          def toggle(self):
              self.enabled = not self.enabled
    flags/store.py: |
      from flags.flag import FeatureFlag
      class FlagStore:
          def __init__(self):
              self.flags: dict[str, FeatureFlag] = {}
          def register(self, name: str, enabled: bool = False):
              self.flags[name] = FeatureFlag(name, enabled)
          def get(self, name: str) -> FeatureFlag:
              return self.flags.get(name, FeatureFlag(name, False))
          def is_enabled(self, name: str) -> bool:
              return self.get(name).is_active()
    flags/evaluator.py: |
      from flags.store import FlagStore
      class FlagEvaluator:
          def __init__(self, store: FlagStore):
              self.store = store
          def evaluate(self, flag_name: str, context: dict) -> bool:
              return self.store.is_enabled(flag_name)
          def evaluate_all(self, flag_names: list[str], context: dict) -> dict[str, bool]:
              return {name: self.evaluate(name, context) for name in flag_names}
    api/feature_api.py: |
      from flags.evaluator import FlagEvaluator
      from flags.store import FlagStore
      class FeatureAPI:
          def __init__(self):
              self.store = FlagStore()
              self.evaluator = FlagEvaluator(self.store)
          def check_feature(self, name: str, user_context: dict) -> dict:
              enabled = self.evaluator.evaluate(name, user_context)
              return {"feature": name, "enabled": enabled}
