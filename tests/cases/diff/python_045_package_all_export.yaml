name: python_045_package_all_export
tags:
- lang:python
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    mylib/validators.py: |
      def validate_email(email: str) -> bool:
          return "@" in email and "." in email.split("@")[-1]

      def validate_url(url: str) -> bool:
          return url.startswith("http://") or url.startswith("https://")
    mylib/formatters.py: |
      def format_currency(amount: float, currency: str = "USD") -> str:
          symbols = {"USD": "$", "EUR": "E", "GBP": "P"}
          symbol = symbols.get(currency, currency)
          return f"{symbol}{amount:.2f}"

      def format_percentage(value: float) -> str:
          return f"{value * 100:.1f}%"
    mylib/__init__.py: |
      from .validators import validate_email, validate_url
      from .formatters import format_currency, format_percentage
    processors/image_optimizer.py: |
      from pathlib import Path

      class ImageOptimizer:
          def __init__(self, quality: int = 85, max_width: int = 1920):
              self.quality = quality
              self.max_width = max_width

          def optimize(self, input_path: str, output_path: str) -> dict:
              return {"input": input_path, "output": output_path, "quality": self.quality}

          def resize(self, width: int, height: int) -> tuple[int, int]:
              if width > self.max_width:
                  ratio = self.max_width / width
                  return self.max_width, int(height * ratio)
              return width, height
    generators/report_builder.py: |
      from typing import Any

      class ReportBuilder:
          def __init__(self, title: str, page_size: str = "A4"):
              self.title = title
              self.page_size = page_size
              self._sections: list[dict] = []

          def add_section(self, heading: str, content: str) -> None:
              self._sections.append({"heading": heading, "content": content})

          def generate(self) -> str:
              parts = [f"# {self.title}\n"]
              for section in self._sections:
                  parts.append(f"## {section['heading']}\n{section['content']}\n")
              return "\n".join(parts)
