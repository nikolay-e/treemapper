name: scripting_016_method_definition
tags:
- lang:ruby
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    lib/processor.rb: |
      class Processor
        def process(data)
          data.upcase
        end

        def batch_process(items)
          items.map { |item| process(item) }
        end

        def can_process?(data)
          data.is_a?(String) && !data.empty?
        end
      end
    app.rb: |
      puts 'Hello'
    lib/formatter.rb: |
      class Formatter
        def format_title(text)
          text.split(' ').map(&:capitalize).join(' ')
        end

        def format_slug(text)
          text.downcase.gsub(/\s+/, '-').gsub(/[^a-z0-9\-]/, '')
        end

        def truncate(text, length = 50)
          text.length > length ? text[0...length] + '...' : text
        end

        def pad(text, width, char = ' ')
          text.ljust(width, char)
        end
      end
    lib/sanitizer.rb: |
      class Sanitizer
        SPECIAL_CHARS = /[<>&"']/
        WHITESPACE = /\s+/

        def clean(input)
          input.gsub(SPECIAL_CHARS, '')
        end

        def strip_tags(html)
          html.gsub(/<\/?[^>]+>/, '')
        end

        def normalize_whitespace(text)
          text.gsub(WHITESPACE, ' ').strip
        end

        def escape(text)
          text.gsub('&', '&amp;').gsub('<', '&lt;').gsub('>', '&gt;')
        end
      end
    lib/batch_runner.rb: |
      require_relative 'processor'

      class BatchRunner
        def initialize(processor = Processor.new)
          @processor = processor
          @results = []
        end

        def run(items)
          items.each do |item|
            result = @processor.process(item)
            @results << result
          end
          @results
        end

        def run_with_filter(items)
          items.select { |item| @processor.can_process?(item) }
               .map { |item| @processor.process(item) }
        end

        def result_count
          @results.size
        end
      end
    lib/transformer.rb: |
      class Transformer
        def process(input)
          input.reverse
        end

        def transform_all(items)
          items.map { |item| process(item) }
        end

        def chain(*operations)
          operations.reduce(nil) do |result, op|
            result ? process(result) : process(op)
          end
        end
      end
    lib/string_utils.rb: |
      module StringUtils
        def self.upcase_first(str)
          str[0].upcase + str[1..]
        end

        def self.to_upper(str)
          str.upcase
        end

        def self.to_lower(str)
          str.downcase
        end

        def self.camelize(str)
          str.split('_').map(&:capitalize).join
        end
      end
  changed_files:
    lib/processor.rb: |
      class Processor
        def process(data)
          data.upcase
        end

        def batch_process(items)
          items.map { |item| process(item) }
        end

        def can_process?(data)
          data.is_a?(String) && !data.empty?
        end
      end
    app.rb: |
      require_relative 'lib/processor'

      processor = Processor.new
      result = processor.process("hello")
      puts result
  commit_message: Update files
