    src/order/matcher.rs: |
      use crate::book::depth::OrderBook;

      pub struct OrderMatcher {
          book: OrderBook,
          total_qty: u64,
          filled_qty: u64,
      }

      impl OrderMatcher {
          pub fn new(book: OrderBook) -> Self {
              OrderMatcher { book, total_qty: 0, filled_qty: 0 }
          }

          pub fn try_match(&mut self, side: &str, price: f64, qty: u64) -> Option<u64> {
              self.total_qty += qty;
              let filled = if side == "buy" {
                  self.book.best_ask()
                      .filter(|&ask| ask <= price)
                      .map(|_| self.book.consume_ask(qty))
              } else {
                  self.book.best_bid()
                      .filter(|&bid| bid >= price)
                      .map(|_| self.book.consume_bid(qty))
              };
              if let Some(f) = filled {
                  self.filled_qty += f;
              }
              filled
          }

          pub fn fill_ratio(&self) -> f64 {
              if self.total_qty == 0 {
                  return 0.0;
              }
              self.filled_qty as f64 / self.total_qty as f64
          }
      }
