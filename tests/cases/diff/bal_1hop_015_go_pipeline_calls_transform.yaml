    src/book/depth.rs: |
      use std::collections::BTreeMap;

      pub struct OrderBook {
          bids: BTreeMap<u64, u64>,
          asks: BTreeMap<u64, u64>,
      }

      impl OrderBook {
          pub fn new() -> Self {
              OrderBook { bids: BTreeMap::new(), asks: BTreeMap::new() }
          }

          pub fn add_bid(&mut self, price_ticks: u64, qty: u64) {
              *self.bids.entry(price_ticks).or_default() += qty;
          }

          pub fn add_ask(&mut self, price_ticks: u64, qty: u64) {
              *self.asks.entry(price_ticks).or_default() += qty;
          }

          pub fn best_bid(&self) -> Option<f64> {
              self.bids.keys().next_back().map(|&p| p as f64 / 100.0)
          }

          pub fn best_ask(&self) -> Option<f64> {
              self.asks.keys().next().map(|&p| p as f64 / 100.0)
          }

          pub fn consume_bid(&mut self, qty: u64) -> u64 {
              let mut remaining = qty;
              let keys: Vec<u64> = self.bids.keys().copied().rev().collect();
              for key in keys {
                  if remaining == 0 { break; }
                  let level = self.bids.get_mut(&key).unwrap();
                  let taken = remaining.min(*level);
                  *level -= taken;
                  remaining -= taken;
                  if *level == 0 { self.bids.remove(&key); }
              }
              qty - remaining
          }

          pub fn consume_ask(&mut self, qty: u64) -> u64 {
              let mut remaining = qty;
              let keys: Vec<u64> = self.asks.keys().copied().collect();
              for key in keys {
                  if remaining == 0 { break; }
                  let level = self.asks.get_mut(&key).unwrap();
                  let taken = remaining.min(*level);
                  *level -= taken;
                  remaining -= taken;
                  if *level == 0 { self.asks.remove(&key); }
              }
              qty - remaining
          }
      }
