    path: Dockerfile
    anchor: ENTRYPOINT ["docker-entrypoint.sh"]
- id: dockerfile_1
  selector:
    path: Dockerfile
    anchor: CMD ["serve", "--workers", "4"]
- id: dockerfile_2
  selector:
    path: Dockerfile
    anchor: STOPSIGNAL SIGTERM
- id: dockerfile_3
  selector:
    path: Dockerfile
    anchor: COPY docker-entrypoint.sh /usr/local/bin/
- id: main
  selector:
    path: src/main.py
    anchor: parser.add_argument('command', choices=['serve', 'migrate', 'shell'])
- id: main_1
  selector:
    path: src/main.py
    anchor: signal.signal(signal.SIGTERM, signal_handler)
- id: no_docker_entrypoint
  selector:
