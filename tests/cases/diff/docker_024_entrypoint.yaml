oracle:
  required:
  - dockerfile
  - dockerfile_1
  - dockerfile_2
  - dockerfile_3
  - main
  - main_1
  allowed: []
  forbidden:
  - no_docker_entrypoint
  - no_test_cli
  - no_values
  - no_init
