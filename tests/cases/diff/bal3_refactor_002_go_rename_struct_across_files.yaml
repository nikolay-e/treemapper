name: bal3_refactor_002_go_rename_struct_across_files
tags:
- lang:go
- change:multi_file
- change:refactor
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    models/item.go: |
      package models

      type Item struct {
          ID    int
          Name  string
          Price float64
      }

      func NewItem(id int, name string, price float64) *Item {
          return &Item{ID: id, Name: name, Price: price}
      }
    services/catalog.go: |
      package services

      import "models"

      type CatalogService struct {
          items []*models.Item
      }

      func (s *CatalogService) AddItem(item *models.Item) {
          s.items = append(s.items, item)
      }

      func (s *CatalogService) FindByName(name string) *models.Item {
          for _, it := range s.items {
              if it.Name == name {
                  return it
              }
          }
          return nil
      }
    api/catalog_handler.go: |
      package api

      import (
          "encoding/json"
          "net/http"
          "services"
      )

      type CatalogHandler struct {
          svc *services.CatalogService
      }

      func (h *CatalogHandler) List(w http.ResponseWriter, r *http.Request) {
          json.NewEncoder(w).Encode(h.svc)
      }
