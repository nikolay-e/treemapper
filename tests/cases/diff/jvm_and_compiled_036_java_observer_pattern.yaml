      package com.example;

      public class Event {
          private final String type;
          private final Object data;

          public Event(String type, Object data) {
              this.type = type;
              this.data = data;
          }

          public String getType() { return type; }
          public Object getData() { return data; }

          @Override
          public String toString() {
              return "Event{type='" + type + "', data=" + data + "}";
          }
      }
    src/main/java/com/example/observer/PropertyChangeNotifier.java: |
      package com.example.observer;

      import java.beans.PropertyChangeListener;
      import java.beans.PropertyChangeSupport;

      public class PropertyChangeNotifier {
          private final PropertyChangeSupport support = new PropertyChangeSupport(this);
          private String value;

          public void addPropertyChangeListener(PropertyChangeListener listener) {
              support.addPropertyChangeListener(listener);
          }

          public void removePropertyChangeListener(PropertyChangeListener listener) {
              support.removePropertyChangeListener(listener);
          }

          public void setValue(String newValue) {
              String old = this.value;
              this.value = newValue;
              support.firePropertyChange("value", old, newValue);
          }

          public String getValue() { return value; }
      }
    src/main/java/com/example/handler/OrderEventHandler.java: |
      package com.example.handler;

      public class OrderEventHandler implements EventListener {
          @Override
          public void onEvent(Event event) {
              System.out.println("Order event: " + event.getType() + " -> " + event.getData());
          }
      }
    src/main/java/com/example/logging/EventLogger.java: |
      package com.example.logging;

      import java.util.ArrayList;
      import java.util.List;

      public class EventLogger implements EventListener {
          private final List<Event> log = new ArrayList<>();

          @Override
          public void onEvent(Event event) {
              log.add(event);
              System.out.println("[LOG] " + event);
          }

          public List<Event> getLog() {
              return List.copyOf(log);
          }
      }
    src/main/java/com/example/store/EventStore.java: |
      package com.example.store;

      import java.util.ArrayList;
      import java.util.List;
      import java.util.stream.Collectors;

      public class EventStore {
          private final List<Event> events = new ArrayList<>();

          public void store(Event event) {
              events.add(event);
          }

          public List<Event> getByType(String type) {
              return events.stream()
                  .filter(e -> e.getType().equals(type))
                  .collect(Collectors.toList());
          }

          public int count() { return events.size(); }
      }
    src/main/java/com/example/metrics/EventMetrics.java: |
      package com.example.metrics;

      import java.util.Map;
      import java.util.concurrent.ConcurrentHashMap;
      import java.util.concurrent.atomic.AtomicInteger;

      public class EventMetrics {
          private final Map<String, AtomicInteger> counts = new ConcurrentHashMap<>();

          public void record(String eventType) {
              counts.computeIfAbsent(eventType, k -> new AtomicInteger()).incrementAndGet();
          }

          public int getCount(String eventType) {
              AtomicInteger count = counts.get(eventType);
              return count != null ? count.get() : 0;
          }

          public void reset() { counts.clear(); }
      }
