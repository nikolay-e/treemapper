    src/main/scala/acl/AccessControl.scala: |
      package acl

      class AccessControl {
        private var permissions: Map[String, Set[String]] = Map.empty

        def grant(role: String, resource: String): Unit = {
          permissions = permissions + (role -> (permissions.getOrElse(role, Set.empty) + resource))
        }

        def isAllowed(role: String, resource: String): Boolean = {
          permissions.getOrElse(role, Set.empty).contains(resource)
        }
      }
    src/main/scala/acl/RoleManager.scala: |
