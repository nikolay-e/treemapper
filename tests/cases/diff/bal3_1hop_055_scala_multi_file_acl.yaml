  changed_files:
    src/main/scala/acl/AccessControl.scala: |
      package acl

      class AccessControl {
        private var permissions: Map[String, Set[String]] = Map.empty
        private var denied: Map[String, Set[String]] = Map.empty

        def grant(role: String, resource: String): Unit = {
          permissions = permissions + (role -> (permissions.getOrElse(role, Set.empty) + resource))
        }

        def deny(role: String, resource: String): Unit = {
          denied = denied + (role -> (denied.getOrElse(role, Set.empty) + resource))
        }

        def isAllowed(role: String, resource: String): Boolean = {
          if (denied.getOrElse(role, Set.empty).contains(resource)) false
          else permissions.getOrElse(role, Set.empty).contains(resource)
        }

        def getRolePermissions(role: String): Set[String] = {
          permissions.getOrElse(role, Set.empty)
        }

        def revokeAll(role: String): Unit = {
          permissions = permissions - role
          denied = denied - role
        }
      }
    src/main/scala/acl/RoleManager.scala: |
      package acl

      class RoleManager(acl: AccessControl) {
        def setupAdmin(): Unit = {
          acl.grant("admin", "users")
          acl.grant("admin", "settings")
          acl.grant("admin", "reports")
        }

        def setupViewer(): Unit = {
          acl.grant("viewer", "reports")
          acl.deny("viewer", "settings")
        }

        def listPermissions(role: String): Set[String] = {
          acl.getRolePermissions(role)
        }
      }
  commit_message: "Add deny, list, and revoke methods to AccessControl"
