      from exceptions import ValidationError

      def validate_user_data(data):
          if not data:
              raise ValidationError("Data is empty")
          if "email" not in data:
              raise ValidationError("Email is required")
          if "name" not in data:
              raise ValidationError("Name is required")
          return True

      def validate_order_data(data):
          if not data.get("items"):
              raise ValidationError("Order must have items")
          if data.get("total", 0) <= 0:
              raise ValidationError("Total must be positive")
          return True
    handlers.py: |
      from exceptions import ValidationError

      def handle_request(data):
          try:
              return process(data)
          except ValidationError as e:
              return {"error": str(e), "status": 422}

      def handle_batch_request(items):
          results = []
          for item in items:
              try:
                  results.append(process(item))
              except ValidationError as e:
                  results.append({"error": str(e), "item": item})
          return results

      def process(data):
          return data
    middleware/error_handler.py: |
      import logging
      from exceptions import ValidationError, NotFoundError

      logger = logging.getLogger(__name__)

      class ErrorHandlerMiddleware:
          def __init__(self, app):
              self.app = app

          def process_request(self, request):
              try:
                  return self.app.handle(request)
              except ValidationError as e:
                  logger.warning(f"Validation error: {e}")
                  return {"status": 422, "error": str(e)}
              except NotFoundError as e:
                  logger.info(f"Not found: {e}")
                  return {"status": 404, "error": str(e)}
              except Exception as e:
                  logger.error(f"Unexpected error: {e}")
                  return {"status": 500, "error": "Internal server error"}
    services/user_service.py: |
      from validators import validate_user_data

      class UserService:
          def __init__(self):
              self._users: dict[int, dict] = {}
              self._next_id = 1

          def create_user(self, data: dict) -> dict:
              validate_user_data(data)
              user_id = self._next_id
              self._next_id += 1
              user = {"id": user_id, **data}
              self._users[user_id] = user
              return user

          def get_user(self, user_id: int) -> dict | None:
              return self._users.get(user_id)

          def list_users(self) -> list[dict]:
              return list(self._users.values())
    tests/test_validation.py: |
      import pytest
      from exceptions import ValidationError
      from validators import validate_user_data, validate_order_data

      def test_validate_user_data_empty():
          with pytest.raises(ValidationError):
              validate_user_data(None)

      def test_validate_user_data_missing_email():
          with pytest.raises(ValidationError):
              validate_user_data({"name": "Alice"})

      def test_validate_user_data_missing_name():
          with pytest.raises(ValidationError):
              validate_user_data({"email": "alice@example.com"})

      def test_validate_user_data_valid():
          assert validate_user_data({"name": "Alice", "email": "alice@example.com"})

      def test_validate_order_data_no_items():
          with pytest.raises(ValidationError):
              validate_order_data({"total": 100})

      def test_validate_order_data_valid():
          assert validate_order_data({"items": ["item1"], "total": 50})
    utils/error_serializer.py: |
      import traceback
      from typing import Any

      INCLUDE_TRACEBACK = False
      MAX_MESSAGE_LENGTH = 500

      class ErrorSerializer:
          def serialize(self, error: Exception) -> dict[str, Any]:
              result = {
                  "type": type(error).__name__,
                  "message": str(error)[:MAX_MESSAGE_LENGTH],
                  "args": [str(a) for a in error.args],
              }
              if INCLUDE_TRACEBACK:
                  result["traceback"] = traceback.format_exc()
              return result

          def serialize_many(self, errors: list[Exception]) -> list[dict]:
              return [self.serialize(e) for e in errors]
    models/form_field.py: |
      from typing import Any

      SUPPORTED_FIELD_TYPES = ["text", "email", "number", "date", "select"]

      class FormField:
          def __init__(self, name: str, field_type: str, required: bool = False):
              self.name = name
              self.field_type = field_type
              self.required = required
              self.validators: list[callable] = []

          def validate(self, value: Any) -> list[str]:
              errors = []
              if self.required and not value:
                  errors.append(f"{self.name} is required")
              for validator in self.validators:
                  error = validator(value)
                  if error:
                      errors.append(error)
              return errors

          def add_validator(self, fn: callable) -> None:
              self.validators.append(fn)
