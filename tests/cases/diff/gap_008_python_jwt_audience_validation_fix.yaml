      from enum import Enum

      class KeyAlgorithm(Enum):
          HS256 = "HS256"
          HS384 = "HS384"
          HS512 = "HS512"

      _KEY_STORE: dict[KeyAlgorithm, bytes] = {}

      def register_key(algo: KeyAlgorithm, key: bytes) -> None:
          _KEY_STORE[algo] = key

      def get_signing_key(algo: KeyAlgorithm) -> bytes:
          if algo not in _KEY_STORE:
              raise KeyError(f"No key registered for {algo.value}")
          return _KEY_STORE[algo]
