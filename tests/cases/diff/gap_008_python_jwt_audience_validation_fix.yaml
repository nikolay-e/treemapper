      import hmac
      import hashlib
      import json
      import base64
      from identity.keys import get_signing_key, KeyAlgorithm

      class JwtValidator:
          def __init__(self, issuer: str):
              self._issuer = issuer

          def validate(self, token: str) -> dict:
              header_b64, payload_b64, signature_b64 = token.split(".")
              header = self._decode_segment(header_b64)
              payload = self._decode_segment(payload_b64)
              algo = KeyAlgorithm(header.get("alg", "HS256"))
              key = get_signing_key(algo)
              expected_sig = self._compute_signature(
                  f"{header_b64}.{payload_b64}", key
              )
              if not hmac.compare_digest(signature_b64, expected_sig):
                  raise ValueError("Invalid signature")
              if payload.get("iss") != self._issuer:
                  raise ValueError("Invalid issuer")
              return payload

          def _decode_segment(self, segment: str) -> dict:
              padded = segment + "=" * (4 - len(segment) % 4)
              return json.loads(base64.urlsafe_b64decode(padded))

          def _compute_signature(self, data: str, key: bytes) -> str:
              sig = hmac.new(key, data.encode(), hashlib.sha256).digest()
              return base64.urlsafe_b64encode(sig).rstrip(b"=").decode()
