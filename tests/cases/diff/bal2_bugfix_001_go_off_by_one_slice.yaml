repo:
  initial_files:
    pkg/pagination/paginator.go: |
      package pagination

      type Page struct {
          Items  []string
          Offset int
          Limit  int
          Total  int
      }

      func Paginate(items []string, offset, limit int) Page {
          if offset > len(items) {
              offset = len(items)
          }
          end := offset + limit
          if end > len(items) {
              end = len(items)
          }
          return Page{
              Items:  items[offset:end],
              Offset: offset,
              Limit:  limit,
              Total:  len(items),
          }
      }

      func LastPageOffset(total, limit int) int {
          return total / limit * limit
      }
