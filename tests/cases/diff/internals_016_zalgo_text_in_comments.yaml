    src/test/java/com/content/media/MediaUploadServiceTest.java: |
      package com.content.media;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      class MediaUploadServiceTest {
          private final InMemoryMediaStorage storage = new InMemoryMediaStorage();
          private final MediaUploadService service = new MediaUploadService(storage);

          @Test
          void upload_validJpeg_succeeds() {
              UploadResult result = service.upload(new byte[]{1, 2, 3}, "image/jpeg", "photo.jpg");
              assertTrue(result.isSuccess());
              assertNotNull(result.getKey());
          }

          @Test
          void upload_unsupportedType_fails() {
              UploadResult result = service.upload(new byte[]{1}, "text/html", "page.html");
              assertFalse(result.isSuccess());
              assertTrue(result.getError().contains("unsupported"));
          }

          @Test
          void upload_emptyData_fails() {
              UploadResult result = service.upload(new byte[]{}, "image/jpeg", "empty.jpg");
              assertFalse(result.isSuccess());
          }

          @Test
          void replace_uploadsNewAndDeletesOld() {
              UploadResult first = service.upload(new byte[]{1}, "image/jpeg", "old.jpg");
              String oldKey = first.getKey();
              UploadResult replaced = service.replace(oldKey, new byte[]{2}, "image/jpeg", "new.jpg");
              assertTrue(replaced.isSuccess());
              assertNull(storage.retrieve(oldKey));
          }

          @Test
          void isAllowedContentType_knownType_returnsTrue() {
              assertTrue(service.isAllowedContentType("image/png"));
          }

          @Test
          void isAllowedContentType_unknownType_returnsFalse() {
              assertFalse(service.isAllowedContentType("application/pdf"));
          }
      }
