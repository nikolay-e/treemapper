      package com.content.media;

      import java.util.Set;

      public class MediaUploadService {
          private static final long MAX_SIZE_BYTES = 10L * 1024 * 1024;
          private static final Set<String> ALLOWED_TYPES = Set.of("image/jpeg", "image/png", "image/gif", "video/mp4");

          private final MediaStorage storage;

          public MediaUploadService(MediaStorage storage) {
              this.storage = storage;
          }

          public UploadResult upload(byte[] data, String contentType, String filename) {
              if (data == null || data.length == 0) {
                  return UploadResult.failure("data is required");
              }
              if (!ALLOWED_TYPES.contains(contentType)) {
                  return UploadResult.failure("unsupported content type: " + contentType);
              }
              if (data.length > MAX_SIZE_BYTES) {
                  return UploadResult.failure("file too large");
              }
              String key = storage.store(data, contentType, filename);
              return UploadResult.success(key);
          }
      }
