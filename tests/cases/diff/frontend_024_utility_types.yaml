name: frontend_024_utility_types
tags:
- lang:typescript
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/models.ts: |
      export interface User {
          id: string;
          name: string;
          email: string;
          password: string;
          createdAt: Date;
          updatedAt: Date;
      }

      export interface Product {
          id: string;
          name: string;
          price: number;
          description: string;
          category: string;
          inStock: boolean;
      }
    src/dtos.ts: |
      console.log('initial');
    src/types/config.ts: |
      export interface AppConfig {
          apiUrl: string;
          timeout: number;
          retries: number;
          debug: boolean;
      }

      export type PartialConfig = Partial<AppConfig>;
      export type RequiredConfig = Pick<AppConfig, 'apiUrl' | 'timeout'>;
    src/mappers/user.ts: |
      interface UserInput {
          name: string;
          email: string;
          password: string;
      }

      export function toUserOutput(input: UserInput & { id: string }) {
          return {
              id: input.id,
              name: input.name,
              email: input.email,
              displayName: input.name.split(' ')[0],
          };
      }
  changed_files:
    src/models.ts: |
      export interface User {
          id: string;
          name: string;
          email: string;
          password: string;
          createdAt: Date;
          updatedAt: Date;
      }

      export interface Product {
          id: string;
          name: string;
          price: number;
