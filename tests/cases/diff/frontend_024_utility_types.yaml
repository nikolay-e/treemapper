          category: string;
          inStock: boolean;
      }
    src/dtos.ts: |
      import { User, Product } from './models';

      export type UserDTO = Omit<User, 'password'>;

      export type CreateUserDTO = Pick<User, 'name' | 'email' | 'password'>;

      export type UpdateUserDTO = Partial<Pick<User, 'name' | 'email'>>;

      export type UserResponse = Readonly<UserDTO>;

      export type ProductPreview = Pick<Product, 'id' | 'name' | 'price'>;

      export type ProductUpdate = Partial<Omit<Product, 'id'>>;
    src/types/config.ts: |
      export interface AppConfig {
          apiUrl: string;
          timeout: number;
          retries: number;
          debug: boolean;
      }

      export type PartialConfig = Partial<AppConfig>;
      export type RequiredConfig = Pick<AppConfig, 'apiUrl' | 'timeout'>;
    src/mappers/user.ts: |
      interface UserInput {
          name: string;
          email: string;
          password: string;
      }

      export function toUserOutput(input: UserInput & { id: string }) {
          return {
              id: input.id,
              name: input.name,
              email: input.email,
              displayName: input.name.split(' ')[0],
          };
      }
