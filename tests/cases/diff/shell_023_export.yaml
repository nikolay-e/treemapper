name: shell_023_export
repo:
  initial_files:
    lib/env.sh: |
      #!/bin/bash

      export PATH="$PATH:$HOME/bin"
      export APP_HOME="/opt/myapp"
      export APP_CONFIG="$APP_HOME/config"
    app.sh: |
      #!/bin/bash
      source ./lib/env.sh

      echo "Starting app from $APP_HOME"
      echo "Config dir: $APP_CONFIG"
    profile.sh: |
      #!/bin/bash

      export EDITOR="vim"
      export LANG="en_US.UTF-8"
      export PS1="\u@\h:\w\$ "

      setup_prompt() {
          if [[ "$TERM" == "xterm"* ]]; then
              export PS1="\[\e[32m\]\u@\h\[\e[0m\]:\w\$ "
          fi
      }
    runtime.sh: |
      #!/bin/bash

      set_open_files_limit() {
          local limit=${1:-65535}
          ulimit -n "$limit" 2>/dev/null
      }

      set_process_priority() {
          local priority=${1:-10}
          renice "$priority" $$ > /dev/null 2>&1
      }

      show_resource_limits() {
          echo "Open files: $(ulimit -n)"
          echo "Max procs:  $(ulimit -u)"
      }
    scripts/child-script.sh: |
      #!/bin/bash
      # Inherits exported env from parent
      format_output "INFO" "Child script started"
      echo "Working in: $APP_HOME"
      echo "Logging to: $APP_LOG"
      format_output "INFO" "Child script finished"
    scripts/env_check.sh: |
      #!/bin/bash
      source ./lib/env.sh

      required_vars=(APP_HOME APP_CONFIG APP_LOG)
      for var in "${required_vars[@]}"; do
          if [[ -z "${!var}" ]]; then
              echo "MISSING: $var"
          else
              echo "OK: $var=${!var}"
          fi
      done
    config/env_staging.sh: |
      #!/bin/bash
      export PATH="$PATH:$HOME/bin"
      export APP_HOME="/opt/myapp-staging"
      export APP_CONFIG="$APP_HOME/config"
      export APP_LOG="$APP_HOME/logs"
  changed_files:
    lib/env.sh: |
      #!/bin/bash

      export PATH="$PATH:$HOME/bin:/usr/local/app/bin"
      export LD_LIBRARY_PATH="/usr/local/lib:$LD_LIBRARY_PATH"

      export APP_HOME="/opt/myapp"
      export APP_CONFIG="$APP_HOME/config"
      export APP_LOG="$APP_HOME/logs"

      format_output() {
          local level=$1
          local msg=$2
          echo "[$(date +%H:%M:%S)] [$level] $msg"
      }
      export -f format_output
    app.sh: |
      #!/bin/bash
      source ./lib/env.sh

      echo "Starting app from $APP_HOME"
      echo "Config dir: $APP_CONFIG"

      mkdir -p "$APP_LOG"
      format_output "INFO" "Logging to $APP_LOG"

      ./child-script.sh
    profile.sh: |
      #!/bin/bash

      export EDITOR="vim"
      export LANG="en_US.UTF-8"
      export PS1="\u@\h:\w\$ "

      setup_prompt() {
          if [[ "$TERM" == "xterm"* ]]; then
              export PS1="\[\e[32m\]\u@\h\[\e[0m\]:\w\$ "
          fi
      }
    runtime.sh: |
      #!/bin/bash

      set_open_files_limit() {
          local limit=${1:-65535}
          ulimit -n "$limit" 2>/dev/null
      }

      set_process_priority() {
          local priority=${1:-10}
          renice "$priority" $$ > /dev/null 2>&1
      }

      show_resource_limits() {
          echo "Open files: $(ulimit -n)"
          echo "Max procs:  $(ulimit -u)"
      }
    scripts/child-script.sh: |
      #!/bin/bash
      # Inherits exported env from parent
      format_output "INFO" "Child script started"
      echo "Working in: $APP_HOME"
      echo "Logging to: $APP_LOG"
      format_output "INFO" "Child script finished"
    scripts/env_check.sh: |
      #!/bin/bash
      source ./lib/env.sh

      required_vars=(APP_HOME APP_CONFIG APP_LOG)
      for var in "${required_vars[@]}"; do
          if [[ -z "${!var}" ]]; then
              echo "MISSING: $var"
          else
              echo "OK: $var=${!var}"
          fi
      done
    config/env_staging.sh: |
      #!/bin/bash
      export PATH="$PATH:$HOME/bin"
      export APP_HOME="/opt/myapp-staging"
      export APP_CONFIG="$APP_HOME/config"
      export APP_LOG="$APP_HOME/logs"
  commit_message: Update files
