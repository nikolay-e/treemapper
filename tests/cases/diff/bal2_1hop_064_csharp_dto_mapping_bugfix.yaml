    src/Models/OrderDto.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Models
      {
          public class OrderDto
          {
              public string OrderId { get; set; }
              public decimal TotalAmount { get; set; }
              public List<OrderItemDto> Items { get; set; }
              public string CustomerName { get; set; }
          }

          public class OrderItemDto
          {
              public string ProductName { get; set; }
              public int Quantity { get; set; }
              public decimal UnitPrice { get; set; }
          }
      }
    src/Mapping/OrderMapper.cs: |
      using System;
      using System.Linq;
      using App.Models;
      using App.Domain;

      namespace App.Mapping
      {
          public class OrderMapper
          {
              public OrderDto ToDto(Order order)
              {
                  return new OrderDto
                  {
                      OrderId = order.Id.ToString(),
                      TotalAmount = order.Items.Sum(i => i.Price * i.Qty),
                      Items = order.Items.Select(i => new OrderItemDto
                      {
                          ProductName = i.Name,
                          Quantity = i.Qty,
                          UnitPrice = i.Price
                      }).ToList(),
                      CustomerName = order.Customer.FullName
                  };
              }
          }
      }
    src/Domain/Order.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Domain
      {
          public class Order
          {
              public Guid Id { get; set; }
              public List<OrderItem> Items { get; set; }
              public Customer Customer { get; set; }
              public DateTime CreatedAt { get; set; }
          }

          public class OrderItem
          {
              public string Name { get; set; }
              public int Qty { get; set; }
              public decimal Price { get; set; }
          }

          public class Customer
          {
              public string FullName { get; set; }
              public string Email { get; set; }
          }
      }
    src/Services/OrderService.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Mapping;
      using App.Models;

      namespace App.Services
      {
          public class OrderService
          {
              private readonly OrderMapper _mapper;

              public OrderService(OrderMapper mapper)
              {
                  _mapper = mapper;
              }

              public OrderDto GetOrderDetails(Domain.Order order)
              {
                  return _mapper.ToDto(order);
              }
          }
      }
    src/Validation/OrderValidator.cs: |
      using System;
      using App.Models;

      namespace App.Validation
      {
          public class OrderValidator
          {
              public bool IsValid(OrderDto dto)
              {
                  return dto.Items != null && dto.Items.Count > 0 && dto.TotalAmount > 0;
              }
          }
      }
