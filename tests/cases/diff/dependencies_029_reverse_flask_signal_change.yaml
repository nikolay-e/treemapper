name: dependencies_029_reverse_flask_signal_change
tags:
- lang:python
- change:single_file
- change:new_function
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    app/signals.py: |
      from blinker import signal

      user_registered = signal('user-registered')
      user_logged_in = signal('user-logged-in')
      user_logged_out = signal('user-logged-out')
    handlers/email_handler.py: |
      from app.signals import user_registered

      @user_registered.connect
      def send_welcome_email(sender, user, **kwargs):
          print(f"Sending welcome email to {user.email}")
    handlers/metrics_handler.py: |
      from app.signals import user_registered, user_logged_in

      @user_registered.connect
      def track_registration(sender, user, **kwargs):
          print(f"Tracking registration for {user.id}")

      @user_logged_in.connect
      def track_login(sender, user, **kwargs):
          print(f"Tracking login for {user.id}")
    handlers/audit_handler.py: |
      from app.signals import user_logged_out

      @user_logged_out.connect
      def audit_logout(sender, user, **kwargs):
          print(f"Audit: user {user.id} logged out")

      def format_audit_entry(user_id: int, action: str) -> dict:
          return {"user_id": user_id, "action": action}
    app/notifications.py: |
      from blinker import signal

      order_placed = signal('order-placed')
      order_shipped = signal('order-shipped')

      def emit_order_placed(sender, order, **kwargs):
          order_placed.send(sender, order=order)

      def emit_order_shipped(sender, order, tracking_number=None):
          order_shipped.send(sender, order=order, tracking=tracking_number)
    handlers/cache_handler.py: |
      from app.notifications import order_placed

      @order_placed.connect
      def invalidate_cache(sender, order, **kwargs):
          print(f"Cache invalidated for order {order.id}")

      def warm_cache(keys: list) -> int:
          return len(keys)
  changed_files:
    app/signals.py: |
      from blinker import signal

      user_registered = signal('user-registered')
      user_logged_in = signal('user-logged-in')
      user_logged_out = signal('user-logged-out')
      user_profile_updated = signal('user-profile-updated')
      user_password_changed = signal('user-password-changed')

      def emit_user_registered(sender, user, source='web'):
          user_registered.send(sender, user=user, source=source)

      def emit_user_logged_in(sender, user, ip_address=None):
          user_logged_in.send(sender, user=user, ip_address=ip_address)
    handlers/email_handler.py: |
      from app.signals import user_registered

