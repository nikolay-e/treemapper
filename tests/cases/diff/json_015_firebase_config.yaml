  changed_files:
    pkg/stream/publisher.go: |
      package stream

      import "encoding/json"

      type Event struct {
          Topic   string
          Payload map[string]interface{}
      }

      type Publisher struct {
          topic   string
          encoder *json.Encoder
      }

      func NewPublisher(topic string, enc *json.Encoder) *Publisher {
          return &Publisher{topic: topic, encoder: enc}
      }

      func (p *Publisher) Publish(payload map[string]interface{}) error {
          e := Event{Topic: p.topic, Payload: payload}
          return p.encoder.Encode(e)
      }

      func (p *Publisher) PublishBatch(payloads []map[string]interface{}) error {
          for _, payload := range payloads {
              if err := p.Publish(payload); err != nil {
                  return err
              }
          }
          return nil
      }
    internal/analytics/tracker.go: |
      package analytics

      import (
          "encoding/json"
          "os"
          "pkg/stream"
      )

      type Tracker struct {
          pub *stream.Publisher
      }

      func NewTracker(topic string) *Tracker {
          enc := json.NewEncoder(os.Stdout)
          return &Tracker{pub: stream.NewPublisher(topic, enc)}
      }

      func (t *Tracker) TrackEvent(name string, props map[string]interface{}) error {
          return t.pub.Publish(map[string]interface{}{
              "event": name,
              "props": props,
          })
      }

      func (t *Tracker) TrackBatch(events []map[string]interface{}) error {
          return t.pub.PublishBatch(events)
      }
    internal/api/analytics_handler.go: |
      package api

      import "internal/analytics"

