    src/DI/ServiceContainer.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.DI
      {
          public enum ServiceLifetime
          {
              Transient,
              Singleton,
              Scoped
          }

          public class ServiceContainer
          {
              private readonly Dictionary<Type, (Func<object> Factory, ServiceLifetime Lifetime)> _registrations
                  = new Dictionary<Type, (Func<object>, ServiceLifetime)>();
              private readonly Dictionary<Type, object> _singletons = new Dictionary<Type, object>();

              public void Register<T>(Func<T> factory, ServiceLifetime lifetime = ServiceLifetime.Transient) where T : class
              {
                  _registrations[typeof(T)] = (() => factory(), lifetime);
              }

              public T Resolve<T>() where T : class
              {
                  if (!_registrations.TryGetValue(typeof(T), out var reg))
                      throw new InvalidOperationException($"No registration for {typeof(T)}");

                  if (reg.Lifetime == ServiceLifetime.Singleton)
                  {
                      if (!_singletons.TryGetValue(typeof(T), out var instance))
                      {
                          instance = reg.Factory();
                          _singletons[typeof(T)] = instance;
                      }
                      return (T)instance;
                  }
                  return (T)reg.Factory();
              }

              public bool IsRegistered<T>() where T : class
              {
                  return _registrations.ContainsKey(typeof(T));
              }
          }
      }
    src/DI/ServiceScope.cs: |
      using System;

      namespace App.DI
      {
          public class ServiceScope : IDisposable
          {
              private readonly ServiceContainer _container;
              private bool _disposed;

              public ServiceScope(ServiceContainer container)
              {
                  _container = container;
              }

              public T Get<T>() where T : class
              {
                  return _container.Resolve<T>();
              }

              public void Dispose()
              {
                  _disposed = true;
              }
          }
      }
