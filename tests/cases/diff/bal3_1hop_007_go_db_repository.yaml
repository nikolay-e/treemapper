    internal/repo/user_repo.go: |
      package repo

      import "pkg/db"

      type UserRepo struct {
          conn *db.Connection
      }

      func NewUserRepo(c *db.Connection) *UserRepo {
          return &UserRepo{conn: c}
      }

      func (r *UserRepo) FindByID(id string) (map[string]string, error) {
          rows, err := r.conn.Query("SELECT * FROM users WHERE id = " + id)
          if err != nil {
              return nil, err
          }
          if len(rows) == 0 {
              return nil, nil
          }
          return rows[0], nil
      }
    internal/repo/order_repo.go: |
