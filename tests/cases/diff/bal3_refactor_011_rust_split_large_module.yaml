name: bal3_refactor_011_rust_split_large_module
tags:
- lang:rust
- change:multi_file
- change:refactor
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    src/models.rs: |
      #[derive(Debug, Clone)]
      pub struct User {
          pub id: u64,
          pub name: String,
          pub email: String,
      }

      impl User {
          pub fn new(id: u64, name: &str, email: &str) -> Self {
              Self { id, name: name.to_string(), email: email.to_string() }
          }
      }

      #[derive(Debug, Clone)]
      pub struct Order {
          pub id: u64,
          pub user_id: u64,
          pub total: f64,
      }

      impl Order {
          pub fn new(id: u64, user_id: u64, total: f64) -> Self {
              Self { id, user_id, total }
          }
      }

      #[derive(Debug, Clone)]
      pub struct Product {
          pub id: u64,
          pub name: String,
          pub price: f64,
      }

      impl Product {
          pub fn new(id: u64, name: &str, price: f64) -> Self {
              Self { id, name: name.to_string(), price }
          }
      }
    src/services/user_service.rs: |
      use crate::models::User;

      pub fn find_user(id: u64) -> Option<User> {
          Some(User::new(id, "test", "test@example.com"))
      }
    src/services/order_service.rs: |
      use crate::models::{Order, User};

      pub fn create_order(user: &User, total: f64) -> Order {
          Order::new(1, user.id, total)
      }
    src/lib.rs: |
      pub mod models;
      pub mod services;
    src/analytics/report.rs: |
      pub const GARBAGE_R011_REPORT_A: &str = "report";

      pub fn generate_report() -> String {
          String::from("report")
      }
    src/analytics/metrics.rs: |
      pub const GARBAGE_R011_METRICS_B: &str = "metrics";

      pub fn track_event(name: &str) {}
    src/analytics/dashboard.rs: |
      pub const GARBAGE_R011_DASH_C: &str = "dashboard";

      pub fn render_dashboard() -> String {
          String::from("dashboard")
      }
  changed_files:
