    src/test/java/com/auth/token/TokenServiceTest.java: |
      package com.auth.token;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      public class TokenServiceTest {
          @Test
          void issueAndValidate() {
              TokenService svc = new TokenService();
              String token = svc.issue("user42");
              assertTrue(svc.isValid(token));
          }

          @Test
          void unknownTokenInvalid() {
              TokenService svc = new TokenService();
              assertFalse(svc.isValid("bogus-token"));
          }

          @Test
          void resolveReturnsUserId() {
              TokenService svc = new TokenService();
              String token = svc.issue("alice");
              assertEquals("alice", svc.resolve(token).orElseThrow());
          }

          @Test
          void revokeInvalidatesToken() {
              TokenService svc = new TokenService();
              String token = svc.issue("bob");
              svc.revoke(token);
              assertFalse(svc.isValid(token));
          }
      }
