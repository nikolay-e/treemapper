  initial_files:
    src/lib.rs: |
      pub mod cache;
      pub mod session_store;
      pub mod rate_limiter;
    src/cache.rs: |
      use std::collections::HashMap;

      pub struct Cache {
          data: HashMap<String, String>,
      }

      impl Cache {
          pub fn new() -> Self {
              Self { data: HashMap::new() }
          }

          pub fn get(&self, key: &str) -> Option<&String> {
              self.data.get(key)
          }

          pub fn contains(&self, key: &str) -> bool {
              self.data.contains_key(key)
          }

          pub fn len(&self) -> usize {
              self.data.len()
          }

          pub fn is_empty(&self) -> bool {
              self.data.is_empty()
          }
      }
    src/session_store.rs: |
      use std::collections::HashMap;

      pub struct Session {
          pub user_id: String,
          pub token: String,
          pub expires_at: u64,
      }

      pub struct SessionStore {
          sessions: HashMap<String, Session>,
      }

      impl SessionStore {
          pub fn new() -> Self {
              Self { sessions: HashMap::new() }
          }

          pub fn create_session(&mut self, user_id: &str, token: &str, ttl: u64) {
              self.sessions.insert(token.to_string(), Session {
                  user_id: user_id.to_string(),
                  token: token.to_string(),
                  expires_at: ttl,
              });
          }

          pub fn get_session(&self, token: &str) -> Option<&Session> {
              self.sessions.get(token)
          }

          pub fn revoke(&mut self, token: &str) -> bool {
              self.sessions.remove(token).is_some()
          }
      }
    src/rate_limiter.rs: |
      use std::sync::atomic::{AtomicU64, Ordering};
      use std::collections::HashMap;

      pub struct RateLimiter {
          limits: HashMap<String, u64>,
          window_seconds: u64,
      }

      impl RateLimiter {
          pub fn new(window_seconds: u64) -> Self {
              Self {
                  limits: HashMap::new(),
                  window_seconds,
              }
          }

          pub fn set_limit(&mut self, key: &str, max_requests: u64) {
              self.limits.insert(key.to_string(), max_requests);
          }

          pub fn check(&self, key: &str, current_count: u64) -> bool {
              self.limits.get(key).map_or(true, |&limit| current_count < limit)
          }

          pub fn window(&self) -> u64 {
              self.window_seconds
          }
      }
