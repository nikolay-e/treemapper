  changed_files:
    lib/core/event_bus.rb: |
      require_relative 'event'

      module Core
        class EventBus
          def initialize
            @subscribers = Hash.new { |h, k| h[k] = [] }
          end

          def subscribe(event_type, priority: 0, &handler)
            @subscribers[event_type] << { handler: handler, priority: priority }
            @subscribers[event_type].sort_by! { |s| -s[:priority] }
          end

          def publish(event)
            @subscribers[event.class].each { |s| s[:handler].call(event) }
          end
        end
      end
    lib/core/event.rb: |
      module Core
        class Event
          attr_reader :occurred_at

          def initialize
            @occurred_at = Time.now
          end
        end
      end
    lib/domain/order_events.rb: |
      require_relative '../core/event'

      module Domain
        class OrderPlaced < Core::Event
          attr_reader :order_id, :amount

          def initialize(order_id, amount)
            super()
            @order_id = order_id
            @amount = amount
          end
        end
      end
    lib/app/order_handler.rb: |
      require_relative '../domain/order_events'
      require_relative '../core/event_bus'

      module App
        class OrderHandler
          def initialize(bus)
            @bus = bus
          end

          def place_order(order_id, amount)
            event = Domain::OrderPlaced.new(order_id, amount)
            @bus.publish(event)
          end
        end
      end
    lib/infra/email_notifier.rb: |
      require_relative '../core/event_bus'

      module Infra
        class EmailNotifier
          def initialize(bus, priority: 10)
            bus.subscribe(Domain::OrderPlaced, priority: priority) { |e| send_email(e) }
          end

          private

          def send_email(event)
            puts "Order #{event.order_id} placed for #{event.amount}"
          end
        end
      end
    lib/utils/formatter.rb: |
      GARBAGE_PPR008_A = 'currency_format_usd'

      module Utils
        class Formatter
          def self.currency(amount)
            "$#{format('%.2f', amount)}"
          end
        end
      end
    lib/utils/validator.rb: |
      GARBAGE_PPR008_B = 'validation_schema_v1'
      GARBAGE_PPR008_C = 50

      module Utils
        class Validator
          def self.positive?(value)
            value.is_a?(Numeric) && value > 0
          end
        end
      end
    lib/config/settings.rb: |
      GARBAGE_PPR008_D = 'settings_namespace'

      module Config
        TIMEOUT = 30
        MAX_RETRIES = 3
      end
