name: bal4_3hop_040_kotlin_password_validator
tags:
- lang:kotlin
- change:single_file
- context:import_chain
- distance:3hop+
- difficulty:easy
repo:
  initial_files:
    src/rules/LengthRule.kt: |
      package rules

      class LengthRule(private val min: Int = 8) {
          fun check(password: String): Boolean =
              password.length >= min
      }
    src/validator/PasswordValidator.kt: |
      package validator

      import rules.LengthRule

      class PasswordValidator(private val lengthRule: LengthRule) {
          fun validate(password: String): Boolean =
              lengthRule.check(password)
      }
    src/auth/AuthService.kt: |
      package auth

      import validator.PasswordValidator

      class AuthService(private val validator: PasswordValidator) {
          fun register(password: String): Boolean =
              validator.validate(password)
      }
    src/api/AuthApi.kt: |
      package api

      import auth.AuthService

      class AuthApi(private val authService: AuthService) {
          fun signup(password: String): String =
              if (authService.register(password)) "ok" else "weak password"
      }
