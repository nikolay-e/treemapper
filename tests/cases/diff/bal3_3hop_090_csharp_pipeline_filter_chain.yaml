    src/Filters/IFilter.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Filters
      {
          public interface IFilter<T>
          {
              IEnumerable<T> Apply(IEnumerable<T> items);
              bool IsApplicable(IEnumerable<T> items);
          }
      }
    src/Filters/PriceRangeFilter.cs: |
      using System;
      using System.Collections.Generic;
      using System.Linq;
      using App.Filters;

      namespace App.Filters
      {
          public class PriceRangeFilter : IFilter<Product>
          {
              private readonly decimal _min;
              private readonly decimal _max;
              public PriceRangeFilter(decimal min, decimal max)
              {
                  _min = min;
                  _max = max;
              }
              public IEnumerable<Product> Apply(IEnumerable<Product> items)
              {
                  return items.Where(p => p.Price >= _min && p.Price <= _max);
              }
              public bool IsApplicable(IEnumerable<Product> items)
              {
                  return _min >= 0 && _max > _min;
              }
          }
      }
    src/Pipeline/FilterPipeline.cs: |
      using System;
      using System.Collections.Generic;
      using App.Filters;

      namespace App.Pipeline
      {
          public class FilterPipeline<T>
          {
              private readonly List<IFilter<T>> _filters = new();
              public FilterPipeline<T> AddFilter(IFilter<T> filter)
              {
                  _filters.Add(filter);
                  return this;
              }
              public IEnumerable<T> Execute(IEnumerable<T> items)
              {
                  var result = items;
                  foreach (var filter in _filters)
                  {
                      if (filter.IsApplicable(result))
                      {
                          result = filter.Apply(result);
                      }
                  }
                  return result;
              }
          }
      }
