    app/models/user.rb: |
      class User
        attr_accessor :name, :email, :created_at, :updated_at

        def initialize(name, email)
          @name = name
          @email = email
          @created_at = Time.now
          @updated_at = Time.now
        end

        def touch
          @updated_at = Time.now
        end

        def time_since_creation
          Time.now - @created_at
        end
      end
    app/models/post.rb: |
      class Post
