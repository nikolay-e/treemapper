  changed_files:
    app/concerns/timestampable.rb: |
      module Timestampable
        def self.included(base)
          base.attr_accessor :created_at, :updated_at
        end

        def initialize_timestamps
          @created_at = Time.now
          @updated_at = Time.now
        end

        def touch
          @updated_at = Time.now
        end

        def time_since_creation
          Time.now - @created_at
        end
      end
    app/models/user.rb: |
      require_relative '../concerns/timestampable'

      class User
        include Timestampable
        attr_accessor :name, :email

        def initialize(name, email)
          @name = name
          @email = email
          initialize_timestamps
        end
      end
    app/models/post.rb: |
      require_relative '../concerns/timestampable'

      class Post
        include Timestampable
        attr_accessor :title, :body

        def initialize(title, body)
          @title = title
          @body = body
          initialize_timestamps
        end
      end
    app/models/comment.rb: |
      require_relative '../concerns/timestampable'

      class Comment
        include Timestampable
        attr_accessor :text, :author

        def initialize(text, author)
          @text = text
          @author = author
          initialize_timestamps
        end
      end
