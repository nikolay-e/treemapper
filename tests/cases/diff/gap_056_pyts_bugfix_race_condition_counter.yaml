    frontend/src/game/scoreboard.ts: |
      interface PlayerScore {
        playerId: string;
        points: number;
        streak: number;
        highestStreak: number;
      }

      function sortByPoints(scores: PlayerScore[]): PlayerScore[] {
        return [...scores].sort((a, b) => b.points - a.points);
      }

      function formatRank(index: number, score: PlayerScore): string {
        return `#${index + 1} ${score.playerId}: ${score.points} pts (streak: ${score.streak})`;
      }

      function renderLeaderboard(scores: PlayerScore[]): string {
        const sorted = sortByPoints(scores);
        return sorted.map((s, i) => formatRank(i, s)).join("\n");
      }
