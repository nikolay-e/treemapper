    backend/leaderboard/scorer.py: |
      from dataclasses import dataclass, field
      import threading

      @dataclass
      class PlayerScore:
          player_id: str
          points: int = 0
          streak: int = 0
          highest_streak: int = 0

      class Leaderboard:
          def __init__(self):
              self._scores: dict[str, PlayerScore] = {}
              self._lock = threading.Lock()

          def record_win(self, player_id: str, points: int) -> PlayerScore:
              with self._lock:
                  score = self._get_or_create(player_id)
                  score.points += points
                  score.streak += 1
                  if score.streak > score.highest_streak:
                      score.highest_streak = score.streak
                  return score

          def record_loss(self, player_id: str) -> PlayerScore:
              with self._lock:
                  score = self._get_or_create(player_id)
                  score.streak = 0
                  return score

          def top_players(self, limit: int = 10) -> list[PlayerScore]:
              with self._lock:
                  ranked = sorted(self._scores.values(), key=lambda s: s.points, reverse=True)
                  return ranked[:limit]

          def _get_or_create(self, player_id: str) -> PlayerScore:
              if player_id not in self._scores:
                  self._scores[player_id] = PlayerScore(player_id=player_id)
              return self._scores[player_id]
