    tax/engine.py: |
      from tax.brackets import marginal_rate

      class TaxEngine:
          def __init__(self, filing_status: str):
              self.filing_status = filing_status

          def compute_tax(self, income: float) -> float:
              rate = marginal_rate(income, self.filing_status)
              return round(income * rate, 2)
    tax/brackets.py: |
      from tax.jurisdictions import bracket_table

      def marginal_rate(income: float, status: str) -> float:
          brackets = bracket_table(status)
          rate = 0.0
          for threshold, r in brackets:
              if income >= threshold:
                  rate = r
          return rate

      def effective_rate(income: float, tax_amount: float) -> float:
          return round(tax_amount / income, 4) if income > 0 else 0.0
    tax/jurisdictions.py: |
      FEDERAL_BRACKETS_SINGLE = [
          (0, 0.10), (11000, 0.12), (44725, 0.22),
          (95375, 0.24), (182100, 0.32), (231250, 0.35),
      ]

      FEDERAL_BRACKETS_JOINT = [
          (0, 0.10), (22000, 0.12), (89450, 0.22),
          (190750, 0.24), (364200, 0.32), (462500, 0.35),
      ]

      def bracket_table(status: str) -> list[tuple[int, float]]:
          if status == "joint":
              return FEDERAL_BRACKETS_JOINT
          return FEDERAL_BRACKETS_SINGLE
    tax/deductions.py: |
      STANDARD_DEDUCTION_SINGLE = 13850
      STANDARD_DEDUCTION_JOINT = 27700

      class DeductionCalculator:
          def standard_deduction(self, status: str) -> int:
              if status == "joint":
                  return STANDARD_DEDUCTION_JOINT
              return STANDARD_DEDUCTION_SINGLE

          def itemized_total(self, items: list[float]) -> float:
              return sum(items)
  changed_files:
    tax/engine.py: |
      from tax.brackets import marginal_rate, effective_rate

      class TaxEngine:
          def __init__(self, filing_status: str):
              self.filing_status = filing_status

          def compute_tax(self, income: float) -> float:
              rate = marginal_rate(income, self.filing_status)
              return round(income * rate, 2)

          def compute_effective_rate(self, income: float) -> float:
              tax = self.compute_tax(income)
              return effective_rate(income, tax)
