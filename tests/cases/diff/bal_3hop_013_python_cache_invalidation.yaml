      import time
      class CacheEntry:
          def __init__(self, key: str, value: str, ttl: int = 300):
              self.key = key
              self.value = value
              self.ttl = ttl
              self.created_at = time.time()
          def is_expired(self) -> bool:
              return time.time() - self.created_at > self.ttl
    cache/store.py: |
      from cache.entry import CacheEntry
      class CacheStore:
          def __init__(self):
              self.entries: dict[str, CacheEntry] = {}
          def put(self, key: str, value: str, ttl: int = 300):
              self.entries[key] = CacheEntry(key, value, ttl)
          def get(self, key: str) -> str:
              entry = self.entries.get(key)
              if entry and not entry.is_expired():
                  return entry.value
              return ""
    cache/manager.py: |
      from cache.store import CacheStore
      class CacheManager:
          def __init__(self):
              self.store = CacheStore()
              self.hits = 0
              self.misses = 0
          def fetch(self, key: str) -> str:
              val = self.store.get(key)
              if val:
                  self.hits += 1
              else:
                  self.misses += 1
              return val
          def cache(self, key: str, value: str, ttl: int = 300):
              self.store.put(key, value, ttl)
