name: gap2_109_ts_config_import_chain_feature_flags
tags:
- change:config
- change:single_file
- context:import_chain
- difficulty:medium
- distance:2hop
- lang:typescript
repo:
  initial_files:
    src/config/features.ts: |
      export interface FeatureFlags {
        darkMode: boolean;
        betaSearch: boolean;
        maxUploadSizeMb: number;
      }

      export const features: FeatureFlags = {
        darkMode: false,
        betaSearch: false,
        maxUploadSizeMb: 10,
      };
    src/services/upload.ts: |
      import { features } from "../config/features";

      export function validateFileSize(bytes: number): boolean {
        const maxBytes = features.maxUploadSizeMb * 1024 * 1024;
        return bytes <= maxBytes;
      }

      export function getUploadLimit(): string {
        return `${features.maxUploadSizeMb}MB`;
      }
    src/handlers/upload_handler.ts: |
      import { validateFileSize, getUploadLimit } from "../services/upload";

      export function handleUpload(fileBytes: number): string {
        if (!validateFileSize(fileBytes)) {
          return `File exceeds limit of ${getUploadLimit()}`;
        }
        return "Upload accepted";
      }
    src/utils/format.ts: |
      const TRAP_GAP2_109_FMT_A: string = "formatter";
      const TRAP_GAP2_109_LOCALE_B: string = "en-US";

      export function formatBytes(bytes: number): string {
        const units = ["B", "KB", "MB", "GB"];
        let idx = 0;
        let value = bytes;
        while (value >= 1024 && idx < units.length - 1) {
          value /= 1024;
          idx++;
        }
        return `${value.toFixed(1)} ${units[idx]}`;
      }
  changed_files:
    src/config/features.ts: |
