name: jvm_and_compiled_052_scala_future
repo:
  initial_files:
    ExpensiveComputation.scala: |
      object ExpensiveComputation {
        def compute(input: Int): Int = {
          Thread.sleep(100)
          input * 2
        }

        def computeString(input: String): String = {
          Thread.sleep(100)
          input.toUpperCase
        }

        def computeBatch(inputs: List[Int]): List[Int] = {
          inputs.map(compute)
        }
      }
    AsyncProcessor.scala: |
      class AsyncProcessor {}
    async/AsyncOrderProcessor.scala: |
      import scala.concurrent.{Future, ExecutionContext}
      import scala.concurrent.ExecutionContext.Implicits.global

      class AsyncOrderProcessor {
        def processOrder(orderId: String): Future[String] = Future {
          Thread.sleep(50)
          s"processed:$orderId"
        }

        def processMany(orderIds: List[String]): Future[List[String]] = {
          Future.sequence(orderIds.map(id => Future(s"processed:$id")))
        }

        def processCombined(orderId: String, userId: String): Future[(String, String)] = {
          for {
            order <- Future(s"order:$orderId")
            user <- Future(s"user:$userId")
          } yield (order, user)
        }
      }
    aggregation/ResultAggregator.scala: |
      import scala.concurrent.{Future, ExecutionContext}
      import scala.concurrent.ExecutionContext.Implicits.global

      object ResultAggregator {
        def sumResults(futures: List[Future[Int]]): Future[Int] = {
          Future.sequence(futures).map(_.sum)
        }

        def firstCompleted[T](futures: List[Future[T]]): Future[T] = {
          Future.firstCompletedOf(futures)
        }

        def allSettled[T](futures: List[Future[T]]): Future[List[Either[Throwable, T]]] = {
          Future.sequence(futures.map(_.map(Right(_)).recover { case e => Left(e) }))
        }
      }
    scheduling/TaskScheduler.scala: |
      import java.util.concurrent.{ScheduledExecutorService, Executors, TimeUnit}

      object TaskScheduler {
        private val executor: ScheduledExecutorService = Executors.newScheduledThreadPool(4)

        def schedule(delay: Long, task: Runnable): Unit = {
          executor.schedule(task, delay, TimeUnit.MILLISECONDS)
        }

        def scheduleRepeating(interval: Long, task: Runnable): Unit = {
          executor.scheduleAtFixedRate(task, 0, interval, TimeUnit.MILLISECONDS)
        }

        def shutdown(): Unit = executor.shutdown()
      }
    extensions/FutureExtensions.scala: |
      import scala.concurrent.{Future, ExecutionContext, Promise}
      import scala.concurrent.duration._

      object FutureExtensions {
        implicit class RichFuture[T](future: Future[T]) {
          def withTimeout(duration: FiniteDuration)(implicit ec: ExecutionContext): Future[T] = {
            val promise = Promise[T]()
            future.foreach(promise.trySuccess)
            future.failed.foreach(promise.tryFailure)
            promise.future
          }

          def retry(times: Int)(implicit ec: ExecutionContext): Future[T] = {
            future.recoverWith {
              case _ if times > 0 => retry(times - 1)
            }
          }
        }
      }
