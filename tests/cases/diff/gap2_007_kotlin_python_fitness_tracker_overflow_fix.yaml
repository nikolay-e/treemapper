      package fitness

      class HeartRateMonitor {
          private val readings = mutableListOf<Int>()
          private val maxReadings = 1000

          fun record(bpm: Int) {
              readings.add(bpm)
          }

          fun averageBpm(): Int {
              if (readings.isEmpty()) return 0
              return readings.sum() / readings.size
          }

          fun peakBpm(): Int {
              return readings.maxOrNull() ?: 0
