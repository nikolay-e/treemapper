    warehouse/stock.py: |
      from dataclasses import dataclass

      @dataclass
      class StockItem:
          sku: str
          quantity: int
          location: str

      class StockLedger:
          def __init__(self):
              self.items: dict[str, StockItem] = {}

          def add(self, sku: str, quantity: int, location: str) -> StockItem:
              if sku in self.items:
                  self.items[sku].quantity += quantity
              else:
                  self.items[sku] = StockItem(sku, quantity, location)
              return self.items[sku]

          def remove(self, sku: str, quantity: int) -> int:
              if sku not in self.items:
                  return 0
              item = self.items[sku]
              removed = min(quantity, item.quantity)
              item.quantity -= removed
              return removed
    warehouse/picker.py: |
      class PickOrder:
          def __init__(self, order_id: str):
              self.order_id = order_id
              self.lines: list[tuple[str, int]] = []

          def add_line(self, sku: str, quantity: int) -> None:
              self.lines.append((sku, quantity))

          def total_items(self) -> int:
              return sum(q for _, q in self.lines)

          def unique_skus(self) -> int:
              return len(set(s for s, _ in self.lines))
