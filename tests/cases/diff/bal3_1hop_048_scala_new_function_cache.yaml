repo:
  initial_files:
    src/main/scala/cache/CacheStore.scala: |
      package cache

      class CacheStore {
        private var store: Map[String, Any] = Map.empty

        def get(key: String): Option[Any] = store.get(key)

        def put(key: String, value: Any): Unit = {
          store = store + (key -> value)
        }

        def remove(key: String): Unit = {
          store = store - key
        }
      }
    src/main/scala/service/ProductService.scala: |
      package service

      import cache.CacheStore

      class ProductService(cache: CacheStore) {
        def getProduct(id: Int): Option[Any] = {
          cache.get(s"product_$id")
        }

        def saveProduct(id: Int, data: Map[String, Any]): Unit = {
          cache.put(s"product_$id", data)
        }
      }
    src/main/scala/service/SessionService.scala: |
      package service

      import cache.CacheStore

      class SessionService(cache: CacheStore) {
        def getSession(token: String): Option[Any] = {
          cache.get(s"session_$token")
        }

        def createSession(token: String, userData: Map[String, Any]): Unit = {
          cache.put(s"session_$token", userData)
        }

        def destroySession(token: String): Unit = {
          cache.remove(s"session_$token")
        }
      }
    src/main/scala/service/RateLimiter.scala: |
      package service

      import cache.CacheStore

      class RateLimiter(cache: CacheStore) {
        def increment(ip: String): Int = {
          val count = cache.get(s"rate_$ip").map(_.asInstanceOf[Int]).getOrElse(0) + 1
          cache.put(s"rate_$ip", count)
          count
        }
      }
    src/main/scala/service/FeatureToggle.scala: |
      package service

      import cache.CacheStore

      class FeatureToggle(cache: CacheStore) {
        def isEnabled(flag: String): Boolean = {
          cache.get(s"flag_$flag").exists(_.asInstanceOf[Boolean])
        }

        def toggle(flag: String, enabled: Boolean): Unit = {
          cache.put(s"flag_$flag", enabled)
        }
      }
