  changed_files:
    src/main/scala/cache/CacheStore.scala: |
      package cache

      class CacheStore {
        private var store: Map[String, Any] = Map.empty
        private var ttls: Map[String, Long] = Map.empty

        def get(key: String): Option[Any] = {
          ttls.get(key) match {
            case Some(expiry) if System.currentTimeMillis() > expiry =>
              remove(key)
              None
            case _ => store.get(key)
          }
        }

        def put(key: String, value: Any): Unit = {
          store = store + (key -> value)
        }

        def putWithTtl(key: String, value: Any, ttlMillis: Long): Unit = {
          store = store + (key -> value)
          ttls = ttls + (key -> (System.currentTimeMillis() + ttlMillis))
        }

        def remove(key: String): Unit = {
          store = store - key
          ttls = ttls - key
        }

        def clear(): Unit = {
          store = Map.empty
          ttls = Map.empty
        }

        def size: Int = store.size
      }
  commit_message: "Add TTL support, clear, and size to CacheStore"
