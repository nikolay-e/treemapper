  changed_files:
    src/main/java/com/app/service/UserService.java: |
      package com.app.service;

      import com.app.model.User;
      import com.app.repository.UserRepository;
      import java.util.Optional;

      public class UserService {
          private final UserRepository repo;

          public UserService(UserRepository repo) {
              this.repo = repo;
          }

          public Optional<User> findActiveUser(String id) {
              return repo.findById(id)
                  .filter(User::isActive);
          }

          public void deactivateUser(String id) {
              repo.findById(id).ifPresent(user -> {
                  user.setActive(false);
                  repo.save(user);
              });
          }
      }
    src/main/java/com/app/model/User.java: |
      package com.app.model;

      public class User {
          private String id;
          private String name;
          private boolean active;

          public User(String id, String name) {
              this.id = id;
              this.name = name;
              this.active = true;
          }

          public String getId() { return id; }
          public String getName() { return name; }
          public boolean isActive() { return active; }
          public void setActive(boolean active) { this.active = active; }
      }
    src/main/java/com/app/repository/UserRepository.java: |
      package com.app.repository;

      import com.app.model.User;
      import java.util.Optional;

      public interface UserRepository {
          Optional<User> findById(String id);
          void save(User user);
          void delete(String id);
      }
    src/main/java/com/app/controller/AdminController.java: |
      package com.app.controller;

      import com.app.service.UserService;

      public class AdminController {
