          end
          result
        end
      end
  commit_message: "fix: use exclusive range to prevent overlapping chunks"
fragments:
- id: range_fix
  selector:
    path: lib/batch.rb
    anchor: "@items[i...i + @size]"
- id: processor_calls_chunks
  selector:
