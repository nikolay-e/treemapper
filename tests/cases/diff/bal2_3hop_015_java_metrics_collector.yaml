repo:
  initial_files:
    src/main/java/com/app/metrics/Metric.java: |
      package com.app.metrics;

      public class Metric {
          private final String name;
          private final double value;
          public Metric(String name, double value) {
              this.name = name;
              this.value = value;
          }
          public String getName() { return name; }
          public double getValue() { return value; }
      }
    src/main/java/com/app/metrics/MetricRegistry.java: |
      package com.app.metrics;

      import com.app.metrics.Metric;
      import java.util.ArrayList;
      import java.util.List;

      public class MetricRegistry {
          private final List<Metric> metrics = new ArrayList<>();
          public void record(Metric metric) {
              metrics.add(metric);
          }
          public List<Metric> getAll() { return metrics; }
      }
    src/main/java/com/app/monitor/HealthChecker.java: |
      package com.app.monitor;

      import com.app.metrics.MetricRegistry;
      import com.app.metrics.Metric;

      public class HealthChecker {
          private final MetricRegistry registry;
          public HealthChecker(MetricRegistry registry) {
              this.registry = registry;
          }
          public boolean isHealthy() {
              return registry.getAll().stream()
                  .allMatch(m -> m.getValue() < 100);
          }
      }
    src/main/java/com/app/api/StatusEndpoint.java: |
      package com.app.api;

      import com.app.monitor.HealthChecker;

      public class StatusEndpoint {
          private final HealthChecker checker;
          public StatusEndpoint(HealthChecker checker) {
              this.checker = checker;
          }
          public String status() {
              return checker.isHealthy() ? "UP" : "DOWN";
          }
      }
    src/main/java/com/app/util/Histogram.java: |
      package com.app.util;

      public class Histogram {
          private double sum = 0;
          private int count = 0;
          public void observe(double val) { sum += val; count++; }
          public double average() { return count > 0 ? sum / count : 0; }
      }
    src/main/java/com/app/util/Counter.java: |
      package com.app.util;

      public class Counter {
          private long value = 0;
          public void increment() { value++; }
          public long get() { return value; }
      }
