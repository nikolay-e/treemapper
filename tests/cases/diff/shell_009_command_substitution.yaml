name: shell_009_command_substitution
tags:
- lang:shell
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    scripts/backup.sh: |
      #!/bin/bash
      source ./env.sh

      current_date=$(date +%Y-%m-%d)
      hostname=$(hostname)

      backup_name="${BACKUP_PREFIX}_${hostname}_${current_date}"
      echo "Creating backup: $backup_name"
    env.sh: |
      #!/bin/bash
      export BACKUP_DIR="/var/backups/app"
      export BACKUP_PREFIX="nightly"
      export RETENTION_DAYS=30
    scripts/rotate.sh: |
      #!/bin/bash
      source ./env.sh
      find "$BACKUP_DIR" -name "*.tar.gz" -mtime +${RETENTION_DAYS} -delete
      echo "Old backups removed from $BACKUP_DIR"
    scripts/notify.sh: |
      #!/bin/bash
      SLACK_WEBHOOK="https://hooks.slack.com/services/XXX"
      send_notification() {
          local message=$1
          curl -s -X POST "$SLACK_WEBHOOK" -d "{\"text\": \"$message\"}"
      }
    scripts/verify.sh: |
      #!/bin/bash
      source ./env.sh
      latest=$(ls -t "$BACKUP_DIR"/*.tar.gz 2>/dev/null | head -1)
      if [[ -n "$latest" ]]; then
          file_count=$(tar -tzf "$latest" | wc -l)
          echo "Latest backup: $latest ($file_count files)"
          tar -tzf "$latest" > /dev/null 2>&1 && echo "Integrity: OK" || echo "Integrity: FAILED"
      else
          echo "No backups found in $BACKUP_DIR"
      fi
    scripts/restore.sh: |
      #!/bin/bash
      source ./env.sh
      RESTORE_DIR="/tmp/restore"
      backup_file=$1
      if [[ -z "$backup_file" ]]; then
          backup_file=$(ls -t "$BACKUP_DIR"/${BACKUP_PREFIX}_*.tar.gz | head -1)
      fi
      mkdir -p "$RESTORE_DIR"
      tar xzf "$backup_file" -C "$RESTORE_DIR"
      echo "Restored to $RESTORE_DIR"
    cron/backup_cron.sh: |
      #!/bin/bash
      SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
      LOG_FILE="/var/log/backup_cron.log"
      echo "=== $(date) ===" >> "$LOG_FILE"
      flock -n /tmp/backup.lock "$SCRIPT_DIR/../scripts/backup.sh" >> "$LOG_FILE" 2>&1
  changed_files:
    scripts/backup.sh: |
      #!/bin/bash
      source ./env.sh

      current_date=$(date +%Y-%m-%d)
      current_time=$(date +%H-%M-%S)
      hostname=$(hostname)
      git_hash=$(git rev-parse --short HEAD 2>/dev/null || echo "nogit")

      backup_name="${BACKUP_PREFIX}_${hostname}_${current_date}_${current_time}"
      echo "Creating backup: $backup_name"
      echo "Git version: $git_hash"

      file_count=$(find . -type f | wc -l)
      echo "Total files: $file_count"

      disk_free=$(df -h "$BACKUP_DIR" | awk 'NR==2 {print $4}')
      echo "Available disk at $BACKUP_DIR: $disk_free"

      tar czf "${BACKUP_DIR}/${backup_name}.tar.gz" .
    env.sh: |
      #!/bin/bash
      export BACKUP_DIR="/var/backups/app"
      export BACKUP_PREFIX="nightly"
      export RETENTION_DAYS=30
    scripts/rotate.sh: |
      #!/bin/bash
      source ./env.sh
      find "$BACKUP_DIR" -name "*.tar.gz" -mtime +${RETENTION_DAYS} -delete
      echo "Old backups removed from $BACKUP_DIR"
    scripts/notify.sh: |
      #!/bin/bash
      SLACK_WEBHOOK="https://hooks.slack.com/services/XXX"
      send_notification() {
          local message=$1
          curl -s -X POST "$SLACK_WEBHOOK" -d "{\"text\": \"$message\"}"
      }
    scripts/verify.sh: |
      #!/bin/bash
      source ./env.sh
      latest=$(ls -t "$BACKUP_DIR"/*.tar.gz 2>/dev/null | head -1)
      if [[ -n "$latest" ]]; then
          file_count=$(tar -tzf "$latest" | wc -l)
          echo "Latest backup: $latest ($file_count files)"
          tar -tzf "$latest" > /dev/null 2>&1 && echo "Integrity: OK" || echo "Integrity: FAILED"
      else
          echo "No backups found in $BACKUP_DIR"
      fi
    scripts/restore.sh: |
      #!/bin/bash
      source ./env.sh
      RESTORE_DIR="/tmp/restore"
      backup_file=$1
      if [[ -z "$backup_file" ]]; then
          backup_file=$(ls -t "$BACKUP_DIR"/${BACKUP_PREFIX}_*.tar.gz | head -1)
      fi
      mkdir -p "$RESTORE_DIR"
      tar xzf "$backup_file" -C "$RESTORE_DIR"
      echo "Restored to $RESTORE_DIR"
    cron/backup_cron.sh: |
      #!/bin/bash
      SCRIPT_DIR="$(cd "$(dirname "$0")" && pwd)"
      LOG_FILE="/var/log/backup_cron.log"
      echo "=== $(date) ===" >> "$LOG_FILE"
      flock -n /tmp/backup.lock "$SCRIPT_DIR/../scripts/backup.sh" >> "$LOG_FILE" 2>&1
  commit_message: Update files
