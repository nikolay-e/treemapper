repo:
  initial_files:
    Repository.swift: |
      protocol Repository {
          associatedtype Entity
          func save(_ entity: Entity)
          func find(id: String) -> Entity?
          func delete(id: String)
      }
    CacheService.swift: |
      // Initial
      class CacheService {}
    TypeErasedBox.swift: |
      class AnyRepository<T> {
          private let _save: (T) -> Void
          private let _find: (String) -> T?
          private let _delete: (String) -> Void

          init<R: Repository>(_ repository: R) where R.Entity == T {
              _save = repository.save
              _find = repository.find
              _delete = repository.delete
          }

          func save(_ entity: T) { _save(entity) }
          func find(id: String) -> T? { _find(id) }
          func delete(id: String) { _delete(id) }
      }
    KeyValueStore.swift: |
      protocol KeyValueStore {
          associatedtype Value

          func get(forKey key: String) -> Value?
          func set(_ value: Value, forKey key: String)
          func remove(forKey key: String)
          var count: Int { get }
      }
  changed_files:
    Repository.swift: |
      protocol Repository {
          associatedtype Entity
          func save(_ entity: Entity)
          func find(id: String) -> Entity?
          func delete(id: String)
      }
    CacheService.swift: |
      class CacheService<T: Comparable & Hashable> {
          private var cache: [String: T] = [:]

          func store(_ value: T, forKey key: String) {
              cache[key] = value
          }

          func retrieve(forKey key: String) -> T? {
              return cache[key]
          }

          func process<U: Numeric>(_ items: [U]) -> U {
              return items.reduce(0, +)
          }

          func filter<C: Collection>(items: C, predicate: (C.Element) -> Bool)
              -> [C.Element] where C.Element: Comparable {
              return items.filter(predicate).sorted()
          }
      }
    TypeErasedBox.swift: |
      class AnyRepository<T> {
