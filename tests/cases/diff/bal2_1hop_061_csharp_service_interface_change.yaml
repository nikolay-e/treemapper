repo:
  initial_files:
    src/Services/IPaymentService.cs: |
      using System;
      using System.Threading.Tasks;

      namespace App.Services
      {
          public interface IPaymentService
          {
              Task<bool> ProcessPayment(decimal amount, string currency);
              Task<bool> RefundPayment(string transactionId);
          }
      }
    src/Services/PaymentService.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Services;

      namespace App.Services
      {
          public class PaymentService : IPaymentService
          {
              public async Task<bool> ProcessPayment(decimal amount, string currency)
              {
                  if (amount <= 0) return false;
                  await Task.Delay(100);
                  return true;
              }

              public async Task<bool> RefundPayment(string transactionId)
              {
                  if (string.IsNullOrEmpty(transactionId)) return false;
                  await Task.Delay(50);
                  return true;
              }
          }
      }
    src/Controllers/PaymentController.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Services;
      using Microsoft.AspNetCore.Mvc;

      namespace App.Controllers
      {
          [ApiController]
          [Route("api/payments")]
          public class PaymentController : ControllerBase
          {
              private readonly IPaymentService _paymentService;

              public PaymentController(IPaymentService paymentService)
              {
                  _paymentService = paymentService;
              }

              [HttpPost("process")]
              public async Task<IActionResult> Process(decimal amount, string currency)
              {
                  var result = await _paymentService.ProcessPayment(amount, currency);
                  return result ? Ok() : BadRequest();
              }

              [HttpPost("refund")]
              public async Task<IActionResult> Refund(string transactionId)
              {
                  var result = await _paymentService.RefundPayment(transactionId);
                  return result ? Ok() : BadRequest();
              }
          }
      }
    src/Models/PaymentRequest.cs: |
      using System;

      namespace App.Models
      {
          public class PaymentRequest
          {
              public decimal Amount { get; set; }
              public string Currency { get; set; }
              public string Description { get; set; }
          }
      }
