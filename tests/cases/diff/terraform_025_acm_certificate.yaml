name: terraform_025_acm_certificate
repo:
  initial_files:
    certs.tf: |
      # ACM certificates placeholder
    route53.tf: |
      resource "aws_route53_zone" "main" {
        name = "example.com"
      }

      resource "aws_route53_record" "cert_validation" {
        zone_id = aws_route53_zone.main.zone_id
        name    = aws_acm_certificate.main.domain_validation_options[0].resource_record_name
        type    = aws_acm_certificate.main.domain_validation_options[0].resource_record_type
        ttl     = 60
        records = [aws_acm_certificate.main.domain_validation_options[0].resource_record_value]
      }
    internal_certs.tf: |
      resource "aws_acm_certificate" "internal" {
        domain_name       = "*.internal.example.com"
        validation_method = "DNS"

        lifecycle {
          create_before_destroy = true
        }
      }
    alb.tf: |
      resource "aws_lb_listener" "https" {
        load_balancer_arn = aws_lb.main.arn
        port              = 443
        protocol          = "HTTPS"
        certificate_arn   = aws_acm_certificate.main.arn

        default_action {
          type             = "forward"
          target_group_arn = aws_lb_target_group.app.arn
        }
      }
  changed_files:
    certs.tf: |
      resource "aws_acm_certificate" "main" {
        domain_name       = "api.example.com"
        validation_method = "DNS"

        lifecycle {
          create_before_destroy = true
        }
      }

      resource "aws_acm_certificate_validation" "main" {
        certificate_arn         = aws_acm_certificate.main.arn
        validation_record_fqdns = [aws_route53_record.cert_validation.fqdn]
      }
    route53.tf: |
      resource "aws_route53_zone" "main" {
        name = "example.com"
      }

      resource "aws_route53_record" "cert_validation" {
        zone_id = aws_route53_zone.main.zone_id
        name    = aws_acm_certificate.main.domain_validation_options[0].resource_record_name
        type    = aws_acm_certificate.main.domain_validation_options[0].resource_record_type
        ttl     = 60
        records = [aws_acm_certificate.main.domain_validation_options[0].resource_record_value]
      }
    internal_certs.tf: |
      resource "aws_acm_certificate" "internal" {
        domain_name       = "*.internal.example.com"
        validation_method = "DNS"

        lifecycle {
          create_before_destroy = true
        }
      }
    alb.tf: |
      resource "aws_lb_listener" "https" {
        load_balancer_arn = aws_lb.main.arn
        port              = 443
        protocol          = "HTTPS"
        certificate_arn   = aws_acm_certificate.main.arn

        default_action {
          type             = "forward"
          target_group_arn = aws_lb_target_group.app.arn
        }
      }
  commit_message: Update files
fragments:
- id: route53
  selector:
    path: route53.tf
    anchor: resource "aws_route53_zone" "main" {
- id: route53_1
  selector:
    path: route53.tf
    anchor: resource "aws_route53_record" "cert_validation" {
- id: no_internal_certs
  selector:
    path: internal_certs.tf
- id: no_alb
  selector:
    path: alb.tf
- id: no_global_0
  selector:
    anchor: '*.internal.example.com'
- id: no_global_1
  selector:
    anchor: aws_lb_target_group.app.arn
oracle:
  required:
  - route53
  - route53_1
  allowed: []
  forbidden:
  - no_internal_certs
  - no_alb
  - no_global_0
  - no_global_1
