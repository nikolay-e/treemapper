name: rust_005_impl_block
repo:
  initial_files:
    src/lib.rs: |
      pub mod circle;
      pub mod sphere;
      pub mod bounds;
    src/circle.rs: |
      use std::f64::consts::PI;
      use std::fmt;

      #[derive(Debug, Clone, PartialEq)]
      pub struct Circle {
          pub radius: f64,
          center_x: f64,
          center_y: f64,
      }

      impl Circle {
          pub const MIN_RADIUS: f64 = 0.001;

          pub fn unit() -> Self {
              Self {
                  radius: 1.0,
                  center_x: 0.0,
                  center_y: 0.0,
              }
          }
      }

      impl fmt::Display for Circle {
          fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
              write!(f, "Circle(r={}, center=({}, {}))", self.radius, self.center_x, self.center_y)
          }
      }

      impl Default for Circle {
          fn default() -> Self {
              Self::unit()
          }
      }
    src/sphere.rs: |
      use std::f64::consts::PI;

      pub struct Sphere {
          pub radius: f64,
          center_x: f64,
          center_y: f64,
          center_z: f64,
      }

      impl Sphere {
          pub fn new(radius: f64) -> Self {
              Self {
                  radius,
                  center_x: 0.0,
                  center_y: 0.0,
                  center_z: 0.0,
              }
          }

          pub fn volume(&self) -> f64 {
              (4.0 / 3.0) * PI * self.radius.powi(3)
          }

          pub fn surface_area(&self) -> f64 {
              4.0 * PI * self.radius.powi(2)
          }
      }
    src/bounds.rs: |
      #[derive(Debug, Clone)]
      pub struct BoundingBox {
          pub min_x: f64,
          pub min_y: f64,
          pub max_x: f64,
          pub max_y: f64,
      }

      impl BoundingBox {
          pub fn new(min_x: f64, min_y: f64, max_x: f64, max_y: f64) -> Self {
              Self { min_x, min_y, max_x, max_y }
          }

          pub fn width(&self) -> f64 {
              self.max_x - self.min_x
          }

          pub fn height(&self) -> f64 {
              self.max_y - self.min_y
          }

          pub fn contains(&self, x: f64, y: f64) -> bool {
              x >= self.min_x && x <= self.max_x && y >= self.min_y && y <= self.max_y
          }
      }
  changed_files:
    src/lib.rs: |
      pub mod circle;
