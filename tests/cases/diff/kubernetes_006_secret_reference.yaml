name: kubernetes_006_secret_reference
repo:
  initial_files:
    k8s/base/secret.yaml: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: db-secret
        namespace: production
        labels:
          app: myapp
          component: database
      type: Opaque
      data:
        username: cG9zdGdyZXM=
        password: c3VwZXJzZWNyZXRwYXNzd29yZA==
        host: cG9zdGdyZXMuZGF0YWJhc2Uuc3ZjLmNsdXN0ZXIubG9jYWw=
    k8s/base/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: myapp
        namespace: production
        labels:
          app: myapp
          tier: backend
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: myapp
        template:
          metadata:
            labels:
              app: myapp
              tier: backend
          spec:
            containers:
            - name: app
              image: myapp:v1.0.0
              ports:
              - containerPort: 8080
              env: []
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
    k8s/base/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: myapp
        namespace: production
      spec:
        selector:
          app: myapp
        ports:
        - port: 80
          targetPort: 8080
    k8s/vault/vault-config.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: vault-agent-injector
        namespace: vault
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: vault-agent-injector
        template:
          spec:
            containers:
            - name: vault-agent
              image: hashicorp/vault:1.15.0
              env:
              - name: VAULT_ADDR
                value: "https://vault.vault.svc:8200"
    k8s/external-secrets/cluster-store.yaml: |
      apiVersion: external-secrets.io/v1beta1
      kind: ClusterSecretStore
      metadata:
        name: aws-secrets-manager
      spec:
        provider:
          aws:
            service: SecretsManager
            region: us-east-1
            auth:
              jwt:
                serviceAccountRef:
                  name: external-secrets-sa
  changed_files:
    k8s/base/secret.yaml: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: db-secret
        namespace: production
        labels:
          app: myapp
          component: database
      type: Opaque
      data:
        username: cG9zdGdyZXM=
        password: c3VwZXJzZWNyZXRwYXNzd29yZA==
        host: cG9zdGdyZXMuZGF0YWJhc2Uuc3ZjLmNsdXN0ZXIubG9jYWw=
    k8s/base/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: myapp
        namespace: production
        labels:
          app: myapp
          tier: backend
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: myapp
        template:
          metadata:
            labels:
              app: myapp
              tier: backend
          spec:
            containers:
            - name: app
              image: myapp:v1.0.0
              ports:
              - containerPort: 8080
              env:
              - name: DB_USERNAME
                valueFrom:
                  secretKeyRef:
                    name: db-secret
                    key: username
              - name: DB_PASSWORD
                valueFrom:
                  secretKeyRef:
                    name: db-secret
                    key: password
              - name: DB_HOST
                valueFrom:
                  secretKeyRef:
                    name: db-secret
                    key: host
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
    k8s/base/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: myapp
        namespace: production
      spec:
        selector:
          app: myapp
        ports:
        - port: 80
          targetPort: 8080
    k8s/vault/vault-config.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: vault-agent-injector
        namespace: vault
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: vault-agent-injector
        template:
          spec:
            containers:
            - name: vault-agent
              image: hashicorp/vault:1.15.0
              env:
              - name: VAULT_ADDR
                value: "https://vault.vault.svc:8200"
    k8s/external-secrets/cluster-store.yaml: |
      apiVersion: external-secrets.io/v1beta1
      kind: ClusterSecretStore
      metadata:
        name: aws-secrets-manager
      spec:
        provider:
          aws:
            service: SecretsManager
            region: us-east-1
            auth:
              jwt:
                serviceAccountRef:
                  name: external-secrets-sa
  commit_message: Update files
