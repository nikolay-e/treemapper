  changed_files:
    lib/calculator.py: |
      def calculate_tax(amount, rate):
          return amount * rate

      def calculate_total(amount, rate):
          return amount + calculate_tax(amount, rate)

      def calculate_discount(amount, discount_pct, rate):
          discounted = amount * (1 - discount_pct)
          return calculate_total(discounted, rate)
    services/invoice.py: |
      from lib.calculator import calculate_total, calculate_tax

      class InvoiceService:
          def __init__(self, tax_rate):
              self.tax_rate = tax_rate

          def create_invoice(self, line_items):
              subtotal = sum(item["price"] * item["qty"] for item in line_items)
              total = calculate_total(subtotal, self.tax_rate)
              tax = calculate_tax(subtotal, self.tax_rate)
              return {"subtotal": subtotal, "tax": tax, "total": total}
