name: bal_refactor_008_python_class_to_functions
tags:
- lang:python
- change:multi_file
- change:refactor
- context:import_chain
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    lib/calculator.py: |
      class TaxCalculator:
          def __init__(self, rate):
              self.rate = rate

          def calculate_tax(self, amount):
              return amount * self.rate

          def calculate_total(self, amount):
              return amount + self.calculate_tax(amount)

          def calculate_discount(self, amount, discount_pct):
              discounted = amount * (1 - discount_pct)
              return self.calculate_total(discounted)
    services/invoice.py: |
      from lib.calculator import TaxCalculator

      class InvoiceService:
          def __init__(self, tax_rate):
              self.calc = TaxCalculator(tax_rate)

          def create_invoice(self, line_items):
              subtotal = sum(item["price"] * item["qty"] for item in line_items)
              total = self.calc.calculate_total(subtotal)
              tax = self.calc.calculate_tax(subtotal)
              return {"subtotal": subtotal, "tax": tax, "total": total}
    api/billing.py: |
      from services.invoice import InvoiceService

      invoice_svc = InvoiceService(tax_rate=0.2)

      def handle_billing(items):
          return invoice_svc.create_invoice(items)
