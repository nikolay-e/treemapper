name: bal4_3hop_008_ruby_finance_ledger
tags:
- lang:ruby
- change:new_function
- context:import_chain
- distance:3hop+
- difficulty:medium
repo:
  initial_files:
    lib/finance/currency.rb: |
      module Finance
        class Currency
          RATES = { "USD" => 1.0, "EUR" => 0.85, "GBP" => 0.73 }
          attr_reader :code
          def initialize(code)
            @code = code
          end
          def convert(amount, target)
            amount / RATES[code] * RATES[target]
          end
        end
      end
    lib/finance/entry.rb: |
      require_relative 'currency'
      module Finance
        class Entry
          attr_reader :amount, :currency, :label
          def initialize(amount, currency_code, label)
            @amount = amount
            @currency = Currency.new(currency_code)
            @label = label
          end
          def in_currency(target)
            @currency.convert(@amount, target)
          end
        end
      end
    lib/finance/ledger.rb: |
      require_relative 'entry'
      module Finance
        class Ledger
          def initialize
            @entries = []
          end
          def add(amount, currency, label)
            @entries << Entry.new(amount, currency, label)
          end
          def balance(currency)
            @entries.sum { |e| e.in_currency(currency) }
          end
        end
      end
    lib/finance/report.rb: |
      require_relative 'ledger'
      module Finance
        class Report
          def initialize(ledger)
            @ledger = ledger
          end
          def summary(currency)
            total = @ledger.balance(currency)
            "Total: #{total} #{currency}"
          end
        end
      end
    lib/finance/controller.rb: |
      require_relative 'report'
      module Finance
        class Controller
          def initialize
            @ledger = Ledger.new
            @report = Report.new(@ledger)
          end
          def add_entry(amount, currency, label)
            @ledger.add(amount, currency, label)
          end
          def show_report(currency)
            @report.summary(currency)
          end
        end
      end
    lib/audit/trail.rb: |
