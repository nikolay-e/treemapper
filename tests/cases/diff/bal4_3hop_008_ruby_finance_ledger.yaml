  changed_files:
    lib/finance/currency.rb: |
      module Finance
        class Currency
          RATES = { "USD" => 1.0, "EUR" => 0.85, "GBP" => 0.73, "JPY" => 110.0 }
          attr_reader :code
          def initialize(code)
            raise ArgumentError, "Unknown currency: #{code}" unless RATES.key?(code)
            @code = code
          end
          def convert(amount, target)
            raise ArgumentError, "Unknown target: #{target}" unless RATES.key?(target)
            amount / RATES[code] * RATES[target]
          end
        end
      end
