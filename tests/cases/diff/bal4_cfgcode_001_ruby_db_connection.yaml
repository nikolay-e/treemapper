name: bal4_cfgcode_001_ruby_db_connection
tags:
- lang:ruby
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:trivial
repo:
  initial_files:
    config/database.yml: |
      production:
        adapter: postgresql
        host: localhost
        port: 5432
        database: myapp_production
        pool: 5
    lib/db/connector.rb: |
      require 'yaml'
      module Db
        class Connector
          def initialize
            @cfg = YAML.load_file('config/database.yml')['production']
          end
          def pool_size
            @cfg['pool']
          end
          def dsn
            "postgres://#{@cfg['host']}:#{@cfg['port']}/#{@cfg['database']}"
          end
        end
      end
    garbage_mailer.rb: |
      GARBAGE_CFGCODE_001_MAILER_A = "smtp"
      GARBAGE_CFGCODE_001_MAILER_B = true
      class Mailer
        GARBAGE_CFGCODE_001_MAILER_C = 25
        def deliver(to, body)
          GARBAGE_CFGCODE_001_MAILER_D = "sent"
        end
      end
    garbage_logger.rb: |
      GARBAGE_CFGCODE_001_LOGGER_E = "info"
      GARBAGE_CFGCODE_001_LOGGER_F = "/var/log"
      class Logger
        GARBAGE_CFGCODE_001_LOGGER_G = true
        def log(msg)
          GARBAGE_CFGCODE_001_LOGGER_H = msg
        end
      end
    garbage_cache.rb: |
      GARBAGE_CFGCODE_001_CACHE_I = 3600
      GARBAGE_CFGCODE_001_CACHE_J = "redis"
  changed_files:
    config/database.yml: |
      production:
        adapter: postgresql
        host: db.prod.internal
        port: 5432
        database: myapp_production
        pool: 25
        timeout: 10
  commit_message: "update production database config"
