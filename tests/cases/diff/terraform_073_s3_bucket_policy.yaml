name: terraform_073_s3_bucket_policy
repo:
  initial_files:
    s3.tf: |
      resource "aws_s3_bucket" "static" {
        bucket = "my-static-site"
      }

      resource "aws_s3_bucket_policy" "static" {
        bucket = aws_s3_bucket.static.id
        policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Effect    = "Allow"
            Principal = "*"
            Action    = ["s3:GetObject"]
            Resource  = "${aws_s3_bucket.static.arn}/*"
          }]
        })
      }
    src/upload.py: |
      import boto3

      def upload_file(bucket: str, key: str, data: bytes):
          s3 = boto3.client("s3")
          s3.put_object(Bucket=bucket, Key=key, Body=data)
    garbage_s3_logging.tf: |
      GARBAGE_TF_073_LOGGING_MARKER_A = "s3-access-logs"
      GARBAGE_TF_073_BUCKET_LOG_MARKER_B = "enabled"

      resource "aws_s3_bucket" "access_logs" {
        bucket = "access-logs-archive"

        tags = {
          Environment = "audit"
          Purpose     = "access-logging"
        }
      }

      resource "aws_s3_bucket_policy" "access_logs" {
        bucket = aws_s3_bucket.access_logs.id
        policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Effect    = "Allow"
            Principal = {"Service": "logging.s3.amazonaws.com"}
            Action    = ["s3:PutObject"]
            Resource  = "${aws_s3_bucket.access_logs.arn}/*"
          }]
        })
      }
    garbage_billing.py: |
      GARBAGE_TF_073_BILLING_MARKER_C = "cost-center"
      GARBAGE_TF_073_INVOICE_MARKER_D = 9999

      class BillingReport:
          GARBAGE_TF_073_REPORT_MARKER_E = True

          def generate(self, month: int) -> dict:
              return {"month": month, "total": 0}
  changed_files:
    s3.tf: |
      resource "aws_s3_bucket" "static" {
        bucket = "my-static-site-prod"
      }

      resource "aws_s3_bucket_policy" "static" {
        bucket = aws_s3_bucket.static.id
        policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Effect    = "Allow"
            Principal = {"AWS": "arn:aws:iam::123456789:root"}
            Action    = ["s3:GetObject", "s3:PutObject"]
            Resource  = "${aws_s3_bucket.static.arn}/*"
          }]
        })
      }
    src/upload.py: |
      import boto3

      def upload_file(bucket: str, key: str, data: bytes):
          s3 = boto3.client("s3")
          s3.put_object(Bucket=bucket, Key=key, Body=data)
    garbage_s3_logging.tf: |
      GARBAGE_TF_073_LOGGING_MARKER_A = "s3-access-logs"
      GARBAGE_TF_073_BUCKET_LOG_MARKER_B = "enabled"

      resource "aws_s3_bucket" "access_logs" {
        bucket = "access-logs-archive"

        tags = {
          Environment = "audit"
          Purpose     = "access-logging"
        }
      }

      resource "aws_s3_bucket_policy" "access_logs" {
        bucket = aws_s3_bucket.access_logs.id
        policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Effect    = "Allow"
            Principal = {"Service": "logging.s3.amazonaws.com"}
            Action    = ["s3:PutObject"]
            Resource  = "${aws_s3_bucket.access_logs.arn}/*"
          }]
        })
      }
    garbage_billing.py: |
      GARBAGE_TF_073_BILLING_MARKER_C = "cost-center"
      GARBAGE_TF_073_INVOICE_MARKER_D = 9999

      class BillingReport:
          GARBAGE_TF_073_REPORT_MARKER_E = True

          def generate(self, month: int) -> dict:
              return {"month": month, "total": 0}
  commit_message: Update files
fragments:
- id: s3
  selector:
    path: s3.tf
    anchor: bucket = "my-static-site-prod"
- id: s3_1
  selector:
    path: s3.tf
    anchor: 'Principal = {"AWS": "arn:aws:iam::123456789:root"}'
- id: s3_2
  selector:
    path: s3.tf
    anchor: '["s3:GetObject", "s3:PutObject"]'
- id: s3_3
  selector:
    path: s3.tf
    anchor: resource "aws_s3_bucket_policy" "static"
- id: no_garbage_s3_logging
  selector:
    path: garbage_s3_logging.tf
- id: no_garbage_billing
  selector:
    path: garbage_billing.py
- id: no_upload
  selector:
    path: src/upload.py
- id: no_global_0
  selector:
    anchor: GARBAGE_TF_073_LOGGING_MARKER_A
- id: no_global_1
  selector:
    anchor: GARBAGE_TF_073_BUCKET_LOG_MARKER_B
- id: no_global_2
  selector:
    anchor: GARBAGE_TF_073_BILLING_MARKER_C
- id: no_global_3
  selector:
    anchor: GARBAGE_TF_073_INVOICE_MARKER_D
- id: no_global_4
  selector:
    anchor: GARBAGE_TF_073_REPORT_MARKER_E
