  required:
  - s3
  - s3_1
  - s3_2
  - s3_3
  allowed: []
  forbidden:
  - no_garbage_s3_logging
  - no_garbage_billing
  - no_upload
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
