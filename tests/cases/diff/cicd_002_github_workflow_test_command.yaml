            - name: Install dependencies
              run: pip install -e .[dev]
            - name: Run tests with coverage
              run: pytest tests/ --cov=src --cov-report=xml --cov-fail-under=80
            - name: Upload coverage
              uses: codecov/codecov-action@v4
              with:
                file: ./coverage.xml
