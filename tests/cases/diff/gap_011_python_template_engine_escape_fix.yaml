    tpl/compiler.py: |
      import re

      class TemplateCompiler:
          VAR_PATTERN = re.compile(r"\{\{\s*(\w+)\s*\}\}")

          def compile(self, source: str) -> "CompiledTemplate":
              parts = []
              last_end = 0
              for match in self.VAR_PATTERN.finditer(source):
                  if match.start() > last_end:
                      parts.append(("literal", source[last_end:match.start()]))
                  parts.append(("var", match.group(1)))
                  last_end = match.end()
              if last_end < len(source):
                  parts.append(("literal", source[last_end:]))
              return CompiledTemplate(parts)

      class CompiledTemplate:
          def __init__(self, parts: list[tuple[str, str]]):
              self._parts = parts

          def render(self, context: dict[str, str]) -> str:
              output = []
              for kind, value in self._parts:
                  if kind == "literal":
                      output.append(value)
                  elif kind == "var":
                      output.append(str(context.get(value, "")))
              return "".join(output)
    tpl/loader.py: |
      from pathlib import Path
      from tpl.compiler import TemplateCompiler

      class FileTemplateLoader:
          def __init__(self, base_dir: str):
              self._base = Path(base_dir)
              self._compiler = TemplateCompiler()
              self._cache: dict[str, object] = {}

          def load(self, name: str):
              if name in self._cache:
                  return self._cache[name]
              path = self._base / name
              source = path.read_text()
              compiled = self._compiler.compile(source)
              self._cache[name] = compiled
              return compiled
