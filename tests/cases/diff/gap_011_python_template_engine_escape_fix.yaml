    tpl/compiler.py: |
      import re
      from html import escape as html_escape

      class TemplateCompiler:
          VAR_PATTERN = re.compile(r"\{\{\s*(\w+)(\|raw)?\s*\}\}")

          def compile(self, source: str) -> "CompiledTemplate":
              parts = []
              last_end = 0
              for match in self.VAR_PATTERN.finditer(source):
                  if match.start() > last_end:
                      parts.append(("literal", source[last_end:match.start()]))
                  is_raw = match.group(2) is not None
                  parts.append(("raw" if is_raw else "var", match.group(1)))
                  last_end = match.end()
              if last_end < len(source):
                  parts.append(("literal", source[last_end:]))
              return CompiledTemplate(parts)

      class CompiledTemplate:
          def __init__(self, parts: list[tuple[str, str]]):
              self._parts = parts

          def render(self, context: dict[str, str]) -> str:
              output = []
              for kind, value in self._parts:
                  if kind == "literal":
                      output.append(value)
                  elif kind == "var":
                      output.append(html_escape(str(context.get(value, ""))))
                  elif kind == "raw":
                      output.append(str(context.get(value, "")))
              return "".join(output)
