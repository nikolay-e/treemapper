      from tpl.loader import FileTemplateLoader

      class PageView:
          def __init__(self, loader: FileTemplateLoader):
              self._loader = loader

          def render_page(self, template_name: str, title: str, body: str) -> str:
              tpl = self._loader.load(template_name)
              return tpl.render({"title": title, "body": body})

          def render_error(self, status: int, message: str) -> str:
              tpl = self._loader.load("error.html")
              return tpl.render({"status": str(status), "message": message})
