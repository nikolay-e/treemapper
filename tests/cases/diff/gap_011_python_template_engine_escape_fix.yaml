      class FilterRegistry:
          def __init__(self):
              self._filters: dict[str, callable] = {}

          def register(self, name: str, fn: callable) -> None:
              self._filters[name] = fn

          def apply(self, name: str, value: str) -> str:
              fn = self._filters.get(name)
              if fn is None:
                  return value
              return fn(value)
