    internal/telemetry/metrics.go: |
      package telemetry

      import "sync/atomic"

      type Counter struct {
          name  string
          value int64
      }

      func NewCounter(name string) *Counter {
          return &Counter{name: name}
      }

      func (c *Counter) Increment() {
          atomic.AddInt64(&c.value, 1)
      }

      func (c *Counter) Add(n int64) {
          atomic.AddInt64(&c.value, n)
      }

      func (c *Counter) Reset() {
          atomic.StoreInt64(&c.value, 0)
      }

      func (c *Counter) Value() int64 {
          return atomic.LoadInt64(&c.value)
      }
    internal/telemetry/gauge.go: |
      package telemetry

      import (
          "math"
          "sync/atomic"
      )

      type Gauge struct {
          name string
          bits uint64
          min  uint64
          max  uint64
      }

      func NewGauge(name string) *Gauge {
          return &Gauge{
              name: name,
              min:  math.Float64bits(math.MaxFloat64),
              max:  math.Float64bits(-math.MaxFloat64),
          }
      }

      func (g *Gauge) Set(v float64) {
          bits := math.Float64bits(v)
          atomic.StoreUint64(&g.bits, bits)
          for {
              old := atomic.LoadUint64(&g.min)
              if math.Float64frombits(old) <= v {
                  break
              }
              if atomic.CompareAndSwapUint64(&g.min, old, bits) {
                  break
              }
          }
          for {
              old := atomic.LoadUint64(&g.max)
              if math.Float64frombits(old) >= v {
                  break
              }
              if atomic.CompareAndSwapUint64(&g.max, old, bits) {
                  break
              }
          }
      }

      func (g *Gauge) Get() float64 {
          return math.Float64frombits(atomic.LoadUint64(&g.bits))
      }

      func (g *Gauge) Min() float64 {
          return math.Float64frombits(atomic.LoadUint64(&g.min))
      }

      func (g *Gauge) Max() float64 {
          return math.Float64frombits(atomic.LoadUint64(&g.max))
      }
