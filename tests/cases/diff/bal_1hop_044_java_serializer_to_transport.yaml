  changed_files:
    src/main/java/com/rpc/serial/MessageSerializer.java: |
      package com.rpc.serial;
      import java.nio.ByteBuffer;
      import java.nio.charset.StandardCharsets;
      public class MessageSerializer {
          private static final byte[] MAGIC = {0x4D, 0x53, 0x47};
          public byte[] serialize(String message) {
              byte[] body = message.getBytes(StandardCharsets.UTF_8);
              ByteBuffer buffer = ByteBuffer.allocate(MAGIC.length + 4 + body.length);
              buffer.put(MAGIC);
              buffer.putInt(body.length);
              buffer.put(body);
              return buffer.array();
          }
          public String deserialize(byte[] data) {
              ByteBuffer buffer = ByteBuffer.wrap(data);
              byte[] magic = new byte[MAGIC.length];
              buffer.get(magic);
              int length = buffer.getInt();
              byte[] body = new byte[length];
              buffer.get(body);
              return new String(body, StandardCharsets.UTF_8);
          }
          public boolean isValid(byte[] data) {
              if (data.length < MAGIC.length) return false;
              for (int i = 0; i < MAGIC.length; i++) {
                  if (data[i] != MAGIC[i]) return false;
              }
              return true;
          }
      }
  commit_message: "feat: add framed message format with magic bytes and length prefix"
