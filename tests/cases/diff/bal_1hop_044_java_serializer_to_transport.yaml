      package com.rpc.transport;
      import com.rpc.serial.MessageSerializer;
      public class TcpTransport {
          private final MessageSerializer serializer;
          private final String host;
          private final int port;
          public TcpTransport(MessageSerializer serializer, String host, int port) {
              this.serializer = serializer;
              this.host = host;
              this.port = port;
          }
          public byte[] send(String message) {
              byte[] payload = serializer.serialize(message);
              System.out.println("Sending " + payload.length + " bytes to " + host + ":" + port);
              return payload;
          }
          public String receive(byte[] data) {
              return serializer.deserialize(data);
          }
      }
