repo:
  initial_files:
    src/http/handler.zig: |
      const std = @import("std");
      const resp = @import("response.zig");

      pub const Handler = struct {
          path: []const u8,

          pub fn handle(self: Handler, body: []const u8) resp.Response {
              _ = self;
              return resp.Response{
                  .status = 200,
                  .body = body,
                  .content_type = "text/plain",
              };
          }
      };

      pub fn notFoundHandler() resp.Response {
          return resp.Response{
              .status = 404,
              .body = "Not Found",
              .content_type = "text/plain",
          };
      }
    src/http/response.zig: |
      const encode = @import("encode.zig");

      pub const Response = struct {
          status: u16,
          body: []const u8,
          content_type: []const u8,

          pub fn toBytes(self: Response) []const u8 {
              return encode.formatResponse(self.status, self.body, self.content_type);
          }
      };
    src/http/encode.zig: |
      pub fn formatResponse(status: u16, body: []const u8, content_type: []const u8) []const u8 {
          _ = status;
          _ = content_type;
          return body;
      }

      pub fn urlEncode(input: []const u8) []const u8 {
          return input;
      }

      pub fn urlDecode(input: []const u8) []const u8 {
          return input;
      }
    src/http/router.zig: |
      const handler_mod = @import("handler.zig");

      pub const Router = struct {
          handlers: [16]?handler_mod.Handler,
          count: usize,

          pub fn init() Router {
              return Router{
                  .handlers = [_]?handler_mod.Handler{null} ** 16,
                  .count = 0,
              };
          }

          pub fn addRoute(self: *Router, path: []const u8) void {
              self.handlers[self.count] = handler_mod.Handler{ .path = path };
              self.count += 1;
          }
      };
