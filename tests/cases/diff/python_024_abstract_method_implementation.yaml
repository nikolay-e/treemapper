              self._resolvers: Dict[str, callable] = {}

          def register(self, type_name: str, field: str, resolver: callable) -> None:
              key = f"{type_name}.{field}"
              self._resolvers[key] = resolver

          def resolve(self, type_name: str, field: str, context: ResolverContext) -> Any:
