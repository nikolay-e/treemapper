name: helm_043_import_values
tags:
- lang:yaml
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    Chart.yaml: |
      apiVersion: v2
      name: myapp
      dependencies:
        - name: backend
          version: 1.0.0
    charts/backend/values.yaml: |
      replicaCount: 3
      image:
        repository: backend-api
        tag: "1.0.0"
      exports:
        dbHost: "postgres.default.svc"
        dbPort: 5432
        cacheHost: "redis.default.svc"
    charts/backend/Chart.yaml: |
      apiVersion: v2
      name: backend
      version: 1.0.0
      description: Backend API service
    charts/backend/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ include "backend.fullname" . }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: backend
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    charts/frontend/values.yaml: |
      replicaCount: 2
      image:
        repository: frontend-app
        tag: "1.0.0"
      exports:
        apiUrl: "http://backend:8080"
    templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ include "myapp.fullname" . }}
      spec:
        template:
          spec:
            containers:
              - name: myapp
                env:
                  - name: DB_HOST
                    value: {{ .Values.config.dbHost }}
                  - name: DB_PORT
                    value: "{{ .Values.config.dbPort }}"
    values.yaml: |
      replicaCount: 1
      image:
        repository: myapp
        tag: "1.0.0"
  changed_files:
    Chart.yaml: |
      apiVersion: v2
      name: myapp
      dependencies:
        - name: backend
          version: 1.0.0
          import-values:
            - child: exports
              parent: config
    charts/backend/values.yaml: |
      replicaCount: 3
      image:
        repository: backend-api
        tag: "1.0.0"
      exports:
        dbHost: "postgres.default.svc"
        dbPort: 5432
        cacheHost: "redis.default.svc"
    charts/backend/Chart.yaml: |
      apiVersion: v2
      name: backend
      version: 1.0.0
      description: Backend API service
    charts/backend/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ include "backend.fullname" . }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: backend
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    charts/frontend/values.yaml: |
      replicaCount: 2
      image:
        repository: frontend-app
        tag: "1.0.0"
      exports:
        apiUrl: "http://backend:8080"
    templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ include "myapp.fullname" . }}
      spec:
        template:
          spec:
            containers:
              - name: myapp
                env:
                  - name: DB_HOST
                    value: {{ .Values.config.dbHost }}
                  - name: DB_PORT
                    value: "{{ .Values.config.dbPort }}"
    values.yaml: |
      replicaCount: 1
      image:
        repository: myapp
        tag: "1.0.0"
  commit_message: Update files
fragments:
- id: chart
  selector:
    path: Chart.yaml
    anchor: 'import-values:'
- id: chart_1
  selector:
    path: Chart.yaml
    anchor: 'child: exports'
- id: chart_2
  selector:
    path: Chart.yaml
    anchor: 'parent: config'
- id: values
  selector:
    path: charts/backend/values.yaml
    anchor: 'exports:'
- id: values_1
  selector:
    path: charts/backend/values.yaml
    anchor: 'dbHost: "postgres.default.svc"'
- id: values_2
  selector:
    path: charts/backend/values.yaml
    anchor: 'dbPort: 5432'
- id: deployment
  selector:
    path: templates/deployment.yaml
    anchor: .Values.config.dbHost
- id: deployment_1
  selector:
    path: templates/deployment.yaml
    anchor: .Values.config.dbPort
- id: no_deployment
  selector:
    path: charts/backend/templates/deployment.yaml
- id: no_chart
  selector:
    path: charts/backend/Chart.yaml
- id: no_values
  selector:
    path: charts/frontend/values.yaml
- id: no_values_1
  selector:
    path: values.yaml
- id: no_global_0
  selector:
    anchor: backend.fullname
- id: no_global_1
  selector:
    anchor: '{{ .Values.image.repository }}'
- id: no_global_2
  selector:
    anchor: Backend API service
- id: no_global_3
