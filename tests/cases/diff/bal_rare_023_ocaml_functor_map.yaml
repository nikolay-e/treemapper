  changed_files:
    lib/ordered.ml: |
      module type ORDERED = sig
        type t
        val compare : t -> t -> int
        val to_string : t -> string
      end

      module IntOrd : ORDERED with type t = int = struct
        type t = int
        let compare = compare
        let to_string = string_of_int
      end

      module StringOrd : ORDERED with type t = string = struct
        type t = string
        let compare = String.compare
        let to_string s = "\"" ^ s ^ "\""
      end
    lib/sorted_set.ml: |
      open Ordered

      module Make (Ord : ORDERED) = struct
        type t = Ord.t list

        let empty = []

        let rec insert x = function
          | [] -> [x]
          | h :: t as l ->
            let c = Ord.compare x h in
            if c < 0 then x :: l
            else if c = 0 then l
            else h :: insert x t

        let mem x l =
          List.exists (fun e -> Ord.compare x e = 0) l

        let to_list s = s

        let to_string_list s =
          List.map Ord.to_string s
      end
    lib/main.ml: |
      open Ordered
      open Sorted_set

      module IntSet = Make(IntOrd)

      let () =
        let s = IntSet.empty in
        let s = IntSet.insert 3 s in
        let s = IntSet.insert 1 s in
        let s = IntSet.insert 2 s in
        List.iter (Printf.printf "%d ") (IntSet.to_list s);
        print_newline ()
