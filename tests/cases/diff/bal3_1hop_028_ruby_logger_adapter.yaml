  changed_files:
    lib/logging/logger.rb: |
      module Logging
        LEVELS = { debug: 0, info: 1, warn: 2, error: 3, fatal: 4 }.freeze

        class Logger
          attr_reader :level, :formatter

          def initialize(level: :info, formatter: nil)
            @level = level
            @formatter = formatter || method(:default_format)
            @outputs = []
          end

          def debug(message)
            log(:debug, message)
          end

          def info(message)
            log(:info, message)
          end

          def warn(message)
            log(:warn, message)
          end

          def error(message)
            log(:error, message)
          end

          def fatal(message)
            log(:fatal, message)
          end

          private

          def log(msg_level, message)
            return if LEVELS[msg_level] < LEVELS[@level]
            formatted = @formatter.call(msg_level, message)
            @outputs << formatted
          end

          def default_format(level, message)
            "[#{Time.now.iso8601}] [#{level.upcase}] #{message}"
          end
        end
      end
  commit_message: "fix: add level filtering, debug/fatal levels, and custom formatter"
