      from datetime import datetime, timedelta

      class WateringScheduler:
          def __init__(self):
              self._schedule: dict[str, datetime] = {}

          def water_plant(self, plant_id: str) -> None:
              self._schedule[plant_id] = datetime.now()

          def next_watering(self, plant_id: str, interval_days: int) -> datetime:
              last = self._schedule.get(plant_id, datetime.now())
              return last + timedelta(days=interval_days)
    app/plants.js: |
      function daysUntilWatering(nextDate) {
        const now = new Date();
        const diff = nextDate - now;
        return Math.max(0, Math.ceil(diff / (1000 * 60 * 60 * 24)));
      }

      function plantStatusIcon(daysLeft) {
        if (daysLeft === 0) return "💧";
