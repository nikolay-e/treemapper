repo:
  initial_files:
    db/schema.sql: |
      CREATE TABLE products (
          id SERIAL PRIMARY KEY,
          name VARCHAR(255) NOT NULL,
          price NUMERIC(10, 2) NOT NULL,
          category_id INTEGER REFERENCES categories(id)
      );

      CREATE TABLE categories (
          id SERIAL PRIMARY KEY,
          name VARCHAR(100) NOT NULL
      );
    src/models/product.py: |
      import psycopg2

      def get_product(conn, product_id: int) -> dict:
          cur = conn.cursor()
          cur.execute("SELECT id, name, price, category_id FROM products WHERE id = %s", (product_id,))
          row = cur.fetchone()
          return {"id": row[0], "name": row[1], "price": row[2], "category_id": row[3]}
    src/reports/inventory.py: |
      import psycopg2

      def list_products_in_category(conn, category_id: int) -> list:
          cur = conn.cursor()
          cur.execute(
              "SELECT id, name, price FROM products WHERE category_id = %s ORDER BY name",
              (category_id,)
          )
          return cur.fetchall()
