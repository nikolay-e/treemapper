# Scenario: Adding a JSON Schema to validate Helm values.yaml structure.
#   Only values.schema.json is changed — from empty {} to a full schema
#   requiring image and replicaCount with type/minimum constraints.
#
# Reviewer questions:
#   Q1: "Does the schema match the actual values.yaml structure?"
#       -> Needs values.yaml: must verify that replicaCount and image.repository
#         exist and match the types defined in the schema.
#
#   Q2: "Will existing values pass validation with these new constraints?"
#       -> Needs values.yaml to see current values (replicaCount: 3,
#         image.repository: "myapp"). The schema requires minimum: 1
#         for replicaCount — reviewer needs to verify the current value passes.
#
# Not needed for comprehension:
#   - values-staging.yaml: Staging override with different replicaCount and image
#     tag. Same structure as values.yaml, same keys (replicaCount, image).
#     Tempting because staging values ALSO must conform to the schema. But
#     the reviewer's first concern is whether the BASE values pass — staging
#     overrides are a secondary deployment concern.
#
#   - templates/deployment.yaml: Consumes .Values.replicaCount and .Values.image
#     — the EXACT keys the schema constrains. Direct structural overlap. But
#     the schema validates the VALUES file, not how templates consume values.
#     Template correctness is orthogonal to schema correctness.
#
#   - Chart.yaml: Contains chart metadata (name, version, apiVersion). The
#     schema references none of these. No structural connection to the diff.
#
#   - templates/_helpers.tpl: Defines helper templates used by deployment.yaml.
#     No connection to values schema validation at all.
#
#   - tests/test-connection.yaml: Helm test pod that validates the release.
#     Tests release health, not values schema compliance.

max_enrichment: 5.2
initial:
  values.schema.json: |
    {}
  values.yaml: |
    replicaCount: 3
    image:
      repository: myapp
      tag: "1.0.0"
    service:
      type: ClusterIP
      port: 80
  values-staging.yaml: |
    replicaCount: 1
    image:
      repository: myapp
      tag: "latest"
    service:
      port: 8080
  Chart.yaml: |
    apiVersion: v2
    name: myapp
    version: 1.0.0
    description: My application chart
  templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ include "myapp.fullname" . }}
    spec:
      replicas: {{ .Values.replicaCount }}
      template:
        spec:
          containers:
            - name: {{ .Chart.Name }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              ports:
                - containerPort: {{ .Values.service.port }}
  templates/_helpers.tpl: |
    {{- define "myapp.fullname" -}}
    {{- printf "%s-%s" .Release.Name .Chart.Name | trunc 63 | trimSuffix "-" -}}
    {{- end -}}

    {{- define "myapp.labels" -}}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | default .Chart.Version }}
    {{- end -}}
  tests/test-connection.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: "{{ include "myapp.fullname" . }}-test-connection"
      annotations:
        "helm.sh/hook": test
    spec:
      containers:
        - name: wget
          image: busybox
          command: ['wget']
          args: ['{{ include "myapp.fullname" . }}:{{ .Values.service.port }}']
      restartPolicy: Never

changed:
  values.schema.json: |
    {
      "$schema": "http://json-schema.org/draft-07/schema#",
      "type": "object",
      "required": ["image", "replicaCount"],
      "properties": {
        "replicaCount": {
          "type": "integer",
          "minimum": 1
        },
        "image": {
          "type": "object",
          "required": ["repository"],
          "properties": {
            "repository": { "type": "string" },
            "tag": { "type": "string" }
          }
        }
      }
    }
  values.yaml: |
    replicaCount: 3
    image:
      repository: myapp
      tag: "1.0.0"
    service:
      type: ClusterIP
      port: 80
  values-staging.yaml: |
    replicaCount: 1
    image:
      repository: myapp
      tag: "latest"
    service:
      port: 8080
  Chart.yaml: |
    apiVersion: v2
    name: myapp
    version: 1.0.0
    description: My application chart
  templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ include "myapp.fullname" . }}
    spec:
      replicas: {{ .Values.replicaCount }}
      template:
        spec:
          containers:
            - name: {{ .Chart.Name }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              ports:
                - containerPort: {{ .Values.service.port }}
  templates/_helpers.tpl: |
    {{- define "myapp.fullname" -}}
    {{- printf "%s-%s" .Release.Name .Chart.Name | trunc 63 | trimSuffix "-" -}}
    {{- end -}}

    {{- define "myapp.labels" -}}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/version: {{ .Chart.AppVersion | default .Chart.Version }}
    {{- end -}}
  tests/test-connection.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: "{{ include "myapp.fullname" . }}-test-connection"
      annotations:
        "helm.sh/hook": test
    spec:
      containers:
        - name: wget
          image: busybox
          command: ['wget']
          args: ['{{ include "myapp.fullname" . }}:{{ .Values.service.port }}']
      restartPolicy: Never

must_include_files:
  - values.schema.json
  # Q1+Q2: The schema requires replicaCount (integer, minimum 1) and
  # image.repository (string). Reviewer must see values.yaml to verify
  # that the actual values conform to these constraints.
  - values.yaml

must_include_content_from:
  values.schema.json:
    - '"$schema": "http://json-schema.org/draft-07/schema#"'
    - '"required": ["image", "replicaCount"]'
    - '"minimum": 1'
  values.yaml:
    - "replicaCount: 3"
    - "repository: myapp"

must_not_include:
  # --- values-staging.yaml: different environment override ---
  # Same keys (replicaCount, image) as values.yaml. Staging values must
  # also pass the schema. But the reviewer first needs to verify the BASE
  # values — staging is a secondary concern.
  - values-staging
  - "tag: \"latest\""
  # --- templates/deployment.yaml: consumes .Values.replicaCount, .Values.image ---
  # HARDEST TRAP. References the EXACT keys the schema constrains. Direct
  # structural edge via .Values. But schema validates the values FILE, not
  # how templates use values. Template correctness is orthogonal.
  - "replicas: {{ .Values.replicaCount }}"
  - "{{ .Values.image.repository }}"
  # --- templates/_helpers.tpl: shared template helpers ---
  - "myapp.fullname"
  - "myapp.labels"
  # --- tests/test-connection.yaml: Helm test pod ---
  - "helm.sh/hook"
  - test-connection

must_not_include_files:
  - values-staging.yaml
  - templates/deployment.yaml
  - templates/_helpers.tpl
  - tests/test-connection.yaml
  - Chart.yaml

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
