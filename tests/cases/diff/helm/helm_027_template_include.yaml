initial:
  templates/_helpers.tpl: |
    {{- define "app.labels" -}}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- end }}
  templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
        app: myapp
  junk.md: |
    garbage_marker_12345
    unused_marker_67890
changed:
  templates/_helpers.tpl: |
    {{- define "app.labels" -}}
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    {{- end }}
  templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      labels:
    {{ include "app.labels" . | indent 4 }}
  junk.md: |
    garbage_marker_12345
    unused_marker_67890
must_include_files:
- templates/deployment.yaml
must_include_content:
- '{{ include "app.labels" . | indent 4 }}'
add_garbage_files: false
skip_garbage_check: true
