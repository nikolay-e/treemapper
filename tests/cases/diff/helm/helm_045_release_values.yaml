# Scenario: Converting a ConfigMap template from hardcoded values to Helm
#   release-aware values using .Release.Name, .Release.Namespace,
#   .Release.Service, and .Chart.Name/.Chart.Version for labels.
#   Only templates/configmap.yaml is changed.
#
# Reviewer questions:
#   Q1: "What will .Release.Name resolve to? Is the naming convention
#        consistent with other templates in this chart?"
#       -> Needs templates/deployment.yaml: uses the same {{ .Release.Name }}
#         pattern for naming. Reviewer must verify naming consistency
#         across resources to avoid mismatched resource names.
#
#   Q2: "Are the labels correct? Does .Chart.Name/.Chart.Version match
#        the chart metadata?"
#       -> Needs Chart.yaml: .Chart.Name comes from Chart.yaml's name field,
#         .Chart.Version from version field. Reviewer must verify the
#         label format produces valid Kubernetes labels.
#
# Not needed for comprehension:
#   - templates/service.yaml: Sibling template. Also uses {{ .Release.Name }}
#     for naming. TEMPTING because it's the same naming pattern. But
#     deployment.yaml already proves naming consistency — a second
#     sibling template is redundant for review.
#
#   - templates/_helpers.tpl: Defines reusable templates. The configmap
#     does NOT use {{ include ... }} — it uses .Release directly. If
#     helpers were used, they'd be needed. But they aren't.
#
#   - values.yaml: Chart values. The configmap's metadata uses .Release
#     and .Chart built-ins, not .Values. No values are referenced in
#     the changed template metadata.
#
#   - templates/ingress.yaml: Another sibling template. Same directory,
#     same chart. No structural connection to ConfigMap metadata.
#
#   - tests/test-connection.yaml: Helm test pod. Uses .Release.Name
#     for naming — same pattern as the diff. But test pods are for
#     validation, not for understanding the ConfigMap change.

initial:
  templates/configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: app-config
  templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ .Release.Name }}-app
      namespace: {{ .Release.Namespace }}
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    spec:
      replicas: {{ .Values.replicaCount }}
      template:
        spec:
          containers:
            - name: app
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  templates/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: {{ .Release.Name }}-svc
      namespace: {{ .Release.Namespace }}
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    spec:
      type: {{ .Values.service.type }}
      ports:
        - port: {{ .Values.service.port }}
  templates/_helpers.tpl: |
    {{- define "myapp.fullname" -}}
    {{- printf "%s-%s" .Release.Name .Chart.Name | trunc 63 | trimSuffix "-" -}}
    {{- end -}}

    {{- define "myapp.labels" -}}
    app.kubernetes.io/name: {{ .Chart.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    {{- end -}}
  templates/ingress.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: {{ .Release.Name }}-ingress
    spec:
      rules:
        - host: {{ .Values.ingress.host }}
  Chart.yaml: |
    apiVersion: v2
    name: myapp
    version: 1.2.0
    appVersion: "1.0.0"
  values.yaml: |
    replicaCount: 3
    image:
      repository: myapp
      tag: "1.0.0"
    service:
      type: ClusterIP
      port: 80
    ingress:
      host: myapp.example.com
  tests/test-connection.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: "{{ .Release.Name }}-test"
      annotations:
        "helm.sh/hook": test
    spec:
      containers:
        - name: wget
          image: busybox
          command: ['wget']
          args: ['{{ .Release.Name }}-svc:{{ .Values.service.port }}']
      restartPolicy: Never

changed:
  templates/configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: {{ .Release.Name }}-config
      namespace: {{ .Release.Namespace }}
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
  templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ .Release.Name }}-app
      namespace: {{ .Release.Namespace }}
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    spec:
      replicas: {{ .Values.replicaCount }}
      template:
        spec:
          containers:
            - name: app
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  templates/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: {{ .Release.Name }}-svc
      namespace: {{ .Release.Namespace }}
      labels:
        app.kubernetes.io/managed-by: {{ .Release.Service }}
    spec:
      type: {{ .Values.service.type }}
      ports:
        - port: {{ .Values.service.port }}
  templates/_helpers.tpl: |
    {{- define "myapp.fullname" -}}
    {{- printf "%s-%s" .Release.Name .Chart.Name | trunc 63 | trimSuffix "-" -}}
    {{- end -}}

    {{- define "myapp.labels" -}}
    app.kubernetes.io/name: {{ .Chart.Name }}
    helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
    {{- end -}}
  templates/ingress.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: {{ .Release.Name }}-ingress
    spec:
      rules:
        - host: {{ .Values.ingress.host }}
  Chart.yaml: |
    apiVersion: v2
    name: myapp
    version: 1.2.0
    appVersion: "1.0.0"
  values.yaml: |
    replicaCount: 3
    image:
      repository: myapp
      tag: "1.0.0"
    service:
      type: ClusterIP
      port: 80
    ingress:
      host: myapp.example.com
  tests/test-connection.yaml: |
    apiVersion: v1
    kind: Pod
    metadata:
      name: "{{ .Release.Name }}-test"
      annotations:
        "helm.sh/hook": test
    spec:
      containers:
        - name: wget
          image: busybox
          command: ['wget']
          args: ['{{ .Release.Name }}-svc:{{ .Values.service.port }}']
      restartPolicy: Never

must_include_files:
  - templates/configmap.yaml
  # Q1: deployment.yaml uses the same .Release.Name naming pattern.
  # Reviewer must verify naming is consistent across resources.
  - templates/deployment.yaml
  # Q2: .Chart.Name and .Chart.Version come from Chart.yaml.
  # Reviewer must verify the label format is correct.
  - Chart.yaml

must_include_content_from:
  templates/configmap.yaml:
    - "{{ .Release.Name }}-config"
    - "{{ .Release.Namespace }}"
    - "{{ .Release.Service }}"
    - "{{ .Chart.Name }}-{{ .Chart.Version }}"
  templates/deployment.yaml:
    - "{{ .Release.Name }}-app"
    - "{{ .Release.Namespace }}"
  Chart.yaml:
    - "name: myapp"
    - "version: 1.2.0"

must_not_include:
  # --- templates/service.yaml: sibling template, same naming pattern ---
  # HARDEST TRAP. Uses {{ .Release.Name }}-svc, {{ .Release.Namespace }},
  # {{ .Release.Service }} — EXACT same pattern as the diff. Same directory.
  # But deployment.yaml already proves naming consistency. Service is redundant.
  - "-svc"
  - ".Values.service.type"
  # --- templates/_helpers.tpl: helper templates ---
  # The configmap does NOT use {{ include ... }}. It uses .Release directly.
  - "myapp.fullname"
  - "myapp.labels"
  # --- templates/ingress.yaml: another sibling template ---
  - "-ingress"
  - ".Values.ingress.host"
  # --- values.yaml: chart values, but diff uses .Release/.Chart not .Values ---
  - "repository: myapp"
  - "host: myapp.example.com"
  # --- tests/test-connection.yaml: Helm test pod, same .Release pattern ---
  - "helm.sh/hook"
  - "-test"

must_not_include_files:
  - templates/service.yaml
  - templates/_helpers.tpl
  - templates/ingress.yaml
  - values.yaml
  - tests/test-connection.yaml

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
