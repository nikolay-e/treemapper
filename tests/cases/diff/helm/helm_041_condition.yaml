initial:
  Chart.yaml: |
    apiVersion: v2
    name: myapp
    dependencies:
      - name: backend
        version: 1.0.0
  junk.txt: |
    garbage_marker_12345
    unused_marker_67890
changed:
  Chart.yaml: |
    apiVersion: v2
    name: myapp
    dependencies:
      - name: backend
        version: 1.0.0
        condition: backend.enabled
  junk.txt: |
    garbage_marker_12345
    unused_marker_67890
must_include_files:
- Chart.yaml
must_include_content:
- 'condition: backend.enabled'
add_garbage_files: false
skip_garbage_check: true
