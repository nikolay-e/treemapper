# Scenario: Adding a condition field to a Helm subchart dependency to
#   control whether the backend subchart is deployed. Only Chart.yaml
#   is changed — a single line addition: `condition: backend.enabled`.
#
# Reviewer questions:
#   Q1: "Where is backend.enabled set? Will the subchart be enabled or
#        disabled by default?"
#       -> Needs values.yaml: must verify whether backend.enabled exists
#         and what its default value is. If absent, Helm treats the
#         condition as true (subchart deploys). The reviewer must check.
#
#   Q2: "Does the condition key name match the values hierarchy?"
#       -> Same file: values.yaml has `backend:` section. The condition
#         `backend.enabled` means .Values.backend.enabled. Reviewer needs
#         to verify this path exists or will be added.
#
# Not needed for comprehension:
#   - charts/backend/Chart.yaml: The subchart's own metadata. The condition
#     controls WHETHER this chart is deployed, but the condition logic is
#     in the parent Chart.yaml + values.yaml. The subchart's version/name
#     are already visible in the existing dependency block.
#
#   - charts/backend/templates/deployment.yaml: What gets deployed when
#     backend.enabled is true. Understanding the deployment template doesn't
#     help review whether the condition is correctly wired. The reviewer
#     needs to verify the VALUES, not the templates.
#
#   - charts/backend/values.yaml: Default values for the subchart itself.
#     The condition `backend.enabled` is resolved from the PARENT values.yaml,
#     not the subchart's values.yaml. Common confusion point.
#
#   - charts/frontend/Chart.yaml: Sibling subchart. Also a dependency in the
#     same Chart.yaml. Same structural location. But the diff only changes
#     the backend dependency — frontend is untouched.
#
#   - values-production.yaml: Production override. May set backend.enabled: true.
#     But the reviewer first needs to see the DEFAULT in values.yaml.

initial:
  Chart.yaml: |
    apiVersion: v2
    name: myapp
    dependencies:
      - name: backend
        version: 1.0.0
      - name: frontend
        version: 1.0.0
  values.yaml: |
    backend:
      enabled: true
      replicaCount: 3
      image:
        repository: backend-api
        tag: "1.0.0"
    frontend:
      enabled: true
      replicaCount: 2
  values-production.yaml: |
    backend:
      enabled: true
      replicaCount: 5
      image:
        tag: "1.2.0"
    frontend:
      replicaCount: 4
  charts/backend/Chart.yaml: |
    apiVersion: v2
    name: backend
    version: 1.0.0
    description: Backend API service
  charts/backend/values.yaml: |
    replicaCount: 1
    image:
      repository: backend-api
      tag: "latest"
  charts/backend/templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ include "backend.fullname" . }}
    spec:
      replicas: {{ .Values.replicaCount }}
      template:
        spec:
          containers:
            - name: backend
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  charts/frontend/Chart.yaml: |
    apiVersion: v2
    name: frontend
    version: 1.0.0
    description: Frontend web application

changed:
  Chart.yaml: |
    apiVersion: v2
    name: myapp
    dependencies:
      - name: backend
        version: 1.0.0
        condition: backend.enabled
      - name: frontend
        version: 1.0.0
  values.yaml: |
    backend:
      enabled: true
      replicaCount: 3
      image:
        repository: backend-api
        tag: "1.0.0"
    frontend:
      enabled: true
      replicaCount: 2
  values-production.yaml: |
    backend:
      enabled: true
      replicaCount: 5
      image:
        tag: "1.2.0"
    frontend:
      replicaCount: 4
  charts/backend/Chart.yaml: |
    apiVersion: v2
    name: backend
    version: 1.0.0
    description: Backend API service
  charts/backend/values.yaml: |
    replicaCount: 1
    image:
      repository: backend-api
      tag: "latest"
  charts/backend/templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ include "backend.fullname" . }}
    spec:
      replicas: {{ .Values.replicaCount }}
      template:
        spec:
          containers:
            - name: backend
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
  charts/frontend/Chart.yaml: |
    apiVersion: v2
    name: frontend
    version: 1.0.0
    description: Frontend web application

must_include_files:
  - Chart.yaml
  # Q1+Q2: condition: backend.enabled resolves to .Values.backend.enabled.
  # Reviewer must verify this key exists in values.yaml and see its default.
  - values.yaml

must_include_content_from:
  Chart.yaml:
    - "condition: backend.enabled"
  values.yaml:
    - "enabled: true"
    - "backend:"

must_not_include:
  # --- values-production.yaml: production override ---
  # Also sets backend.enabled: true. Same key path as values.yaml.
  # But reviewer needs the DEFAULT, not a per-environment override.
  - values-production
  - "replicaCount: 5"
  - 'tag: "1.2.0"'
  # --- charts/backend/Chart.yaml: subchart metadata ---
  # The condition controls WHETHER this deploys. But version/name are
  # already visible in the existing dependency block of Chart.yaml.
  - "Backend API service"
  # --- charts/backend/templates/deployment.yaml: what gets deployed ---
  # TEMPTING: it's what backend.enabled controls. But the reviewer needs
  # to verify the CONDITION WIRING, not the deployment template.
  - "backend.fullname"
  - "{{ .Values.image.repository }}"
  # --- charts/backend/values.yaml: subchart defaults ---
  # COMMON TRAP: condition resolves from PARENT values.yaml, not subchart.
  - 'tag: "latest"'
  # --- charts/frontend/Chart.yaml: sibling subchart ---
  - "Frontend web application"

must_not_include_files:
  - values-production.yaml
  - charts/backend/Chart.yaml
  - charts/backend/values.yaml
  - charts/backend/templates/deployment.yaml
  - charts/frontend/Chart.yaml

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
