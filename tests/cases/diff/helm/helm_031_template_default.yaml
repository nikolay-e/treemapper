initial:
  values.yaml: |
    # timeout not set
  templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    spec:
      template:
        spec:
          containers:
          - name: app
            env:
            - name: TIMEOUT
              value: "30"
  junk.py: |
    garbage_marker_12345 = 1
    unused_marker_67890 = 2
changed:
  values.yaml: |
    # timeout not set
  templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    spec:
      template:
        spec:
          containers:
          - name: app
            env:
            - name: TIMEOUT
              value: {{ .Values.timeout | default 30 | quote }}
  junk.py: |
    garbage_marker_12345 = 1
    unused_marker_67890 = 2
must_include_files:
- templates/deployment.yaml
must_include_content:
- 'value: {{ .Values.timeout | default 30 | quote }}'
add_garbage_files: false
skip_garbage_check: true
