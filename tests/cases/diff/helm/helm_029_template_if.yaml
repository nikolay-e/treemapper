max_enrichment: 4.2
initial:
  values.yaml: |
    ingress:
      enabled: false
  templates/ingress.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: Ingress
  junk.txt: |
    garbage_marker_12345
    unused_marker_67890
changed:
  values.yaml: |
    ingress:
      enabled: false
  templates/ingress.yaml: |
    {{- if .Values.ingress.enabled -}}
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: {{ .Release.Name }}-ingress
    spec:
      rules:
        - host: {{ .Values.ingress.host }}
    {{- end }}
  junk.txt: |
    garbage_marker_12345
    unused_marker_67890
must_include_files:
- templates/ingress.yaml
must_include_content:
- '{{- if .Values.ingress.enabled -}}'
add_garbage_files: false
skip_garbage_check: true
