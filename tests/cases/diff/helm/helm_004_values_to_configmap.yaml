max_enrichment: 17.0
initial:
  chart/Chart.yaml: |
    apiVersion: v2
    name: notification-svc
    version: 1.3.0
  chart/values.yaml: |
    replicaCount: 1
    image:
      repository: notification-service
      tag: "1.3.0"
    config:
      logLevel: info
      debugMode: false
  chart/templates/configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: {{ .Release.Name }}-config
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
    data:
      LOG_LEVEL: {{ .Values.config.logLevel }}
      DEBUG_MODE: {{ .Values.config.debugMode | quote }}
  chart/templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ .Release.Name }}-{{ .Chart.Name }}
    spec:
      replicas: {{ .Values.replicaCount }}
      template:
        spec:
          containers:
            - name: {{ .Chart.Name }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
  chart/templates/networkpolicy.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
    spec:
      podSelector:
        matchLabels:
      policyTypes:
        - Ingress
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
  chart/tools/load-test.py: |
    import requests
changed:
  chart/Chart.yaml: |
    apiVersion: v2
    name: notification-svc
    version: 1.3.0
  chart/values.yaml: |
    replicaCount: 1
    image:
      repository: notification-service
      tag: "1.3.0"
    config:
      logLevel: debug
      debugMode: true
      maxConnections: 100
  chart/templates/configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: {{ .Release.Name }}-config
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
    data:
      LOG_LEVEL: {{ .Values.config.logLevel }}
      DEBUG_MODE: {{ .Values.config.debugMode | quote }}
  chart/templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: {{ .Release.Name }}-{{ .Chart.Name }}
    spec:
      replicas: {{ .Values.replicaCount }}
      template:
        spec:
          containers:
            - name: {{ .Chart.Name }}
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              envFrom:
                - configMapRef:
                    name: {{ .Release.Name }}-config
  chart/templates/networkpolicy.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
    spec:
      podSelector:
        matchLabels:
      policyTypes:
        - Ingress
      ingress:
        - from:
            - namespaceSelector:
                matchLabels:
  chart/tools/load-test.py: |
    import requests
must_include_files:
- chart/values.yaml
must_include_content:
- 'logLevel: debug'
add_garbage_files: false
skip_garbage_check: true
