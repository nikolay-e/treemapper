name: helm_019_values_env
repo:
  initial_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: env-app
      description: Application with environment variable configuration
      type: application
      version: 1.0.0
    chart/values.yaml: |
      replicaCount: 1
      image:
        repository: env-app
        tag: "1.0.0"
      env: []
    chart/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ .Release.Name }}-{{ .Chart.Name }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: {{ .Chart.Name }}
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
                {{- if .Values.env }}
                env:
                  {{- toYaml .Values.env | nindent 14 }}
                {{- end }}
    src/app.py: |
      import os
      log_level = os.environ.get('LOG_LEVEL', 'info')
    chart/templates/backup-pvc.yaml: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
      spec:
        accessModes:
        resources:
          requests:
    chart/docs/env-vars.md: |
      # Environment Variables
      ## Secret Management
  changed_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: env-app
      description: Application with environment variable configuration
      type: application
      version: 1.0.0
    chart/values.yaml: |
      replicaCount: 1
      image:
        repository: env-app
        tag: "1.0.0"
      env:
        - name: LOG_LEVEL
          value: debug
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: url
    chart/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ .Release.Name }}-{{ .Chart.Name }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: {{ .Chart.Name }}
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
                {{- if .Values.env }}
                env:
                  {{- toYaml .Values.env | nindent 14 }}
                {{- end }}
    src/app.py: |
      import os
      log_level = os.environ.get('LOG_LEVEL', 'info')
    chart/templates/backup-pvc.yaml: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
      spec:
        accessModes:
        resources:
          requests:
    chart/docs/env-vars.md: |
      # Environment Variables
      ## Secret Management
  commit_message: Update files
fragments:
- id: values_file
  selector:
    path: chart/values.yaml
- id: req_global_0
  selector:
    anchor: '- name: LOG_LEVEL'
oracle:
  required:
  - values_file
  - req_global_0
  allowed: []
  forbidden: []
