initial:
  Chart.yaml: |
    apiVersion: v2
    name: myapp
    dependencies:
      - name: postgresql
        version: 12.0.0
        repository: https://charts.bitnami.com/bitnami
  unrelated.md: |
    # garbage_marker_12345
    unused_marker_67890
changed:
  Chart.yaml: |
    apiVersion: v2
    name: myapp
    dependencies:
      - name: postgresql
        version: 12.0.0
        repository: https://charts.bitnami.com/bitnami
        alias: postgres
  unrelated.md: |
    # garbage_marker_12345
    unused_marker_67890
must_include_files:
- Chart.yaml
must_include_content:
- 'alias: postgres'
must_not_include:
- unrelated.md
add_garbage_files: false
skip_garbage_check: true
