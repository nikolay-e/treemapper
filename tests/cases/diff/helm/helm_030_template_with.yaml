max_enrichment: 5.8
initial:
  values.yaml: |
    nodeSelector:
      kubernetes.io/os: linux
  templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    spec:
      template:
        spec:
          containers:
          - name: app
  unrelated.md: |
    # garbage_marker_12345
    unused_marker_67890
changed:
  values.yaml: |
    nodeSelector:
      kubernetes.io/os: linux
  templates/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    spec:
      template:
        spec:
          {{- with .Values.nodeSelector }}
          nodeSelector:
    {{ toYaml . | indent 8 }}
          {{- end }}
          containers:
          - name: app
  unrelated.md: |
    # garbage_marker_12345
    unused_marker_67890
must_include_files:
- templates/deployment.yaml
must_include_content:
- '{{- with .Values.nodeSelector }}'
must_not_include:
- unrelated.md
add_garbage_files: false
skip_garbage_check: true
