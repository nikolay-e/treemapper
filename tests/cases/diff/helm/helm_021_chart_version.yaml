name: helm_021_chart_version
repo:
  initial_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: myapp
      description: Web application
      type: application
      version: 1.0.0
    chart/CHANGELOG.md: |
      # Changelog

      ## 2.0.0
      - Breaking: Changed API endpoint format
      - Added new authentication method
    chart/values.yaml: |
      replicaCount: 1
      image:
        repository: myapp
        tag: "1.0.0"
    chart/templates/argo-rollout.yaml: |
      apiVersion: argoproj.io/v1alpha1
      kind: Rollout
      metadata:
      spec:
        strategy:
          canary:
            steps:
        selector:
          matchLabels:
    chart/docs/versioning.md: |
      # Versioning Policy
      ## Release Process
  changed_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: myapp
      description: Web application
      type: application
      version: 2.0.0
      appVersion: "2.0.0"
    chart/CHANGELOG.md: |
      # Changelog

      ## 2.0.0
      - Breaking: Changed API endpoint format
      - Added new authentication method
    chart/values.yaml: |
      replicaCount: 1
      image:
        repository: myapp
        tag: "2.0.0"
    chart/templates/argo-rollout.yaml: |
      apiVersion: argoproj.io/v1alpha1
      kind: Rollout
      metadata:
      spec:
        strategy:
          canary:
            steps:
        selector:
          matchLabels:
    chart/docs/versioning.md: |
      # Versioning Policy
      ## Release Process
  commit_message: Update files
fragments:
- id: chart_file
  selector:
    path: chart/Chart.yaml
- id: values_file
  selector:
    path: chart/values.yaml
- id: req_global_0
  selector:
    anchor: 'version: 2.0.0'
- id: req_global_1
  selector:
    anchor: 'appVersion: "2.0.0"'
oracle:
  required:
  - chart_file
  - values_file
  - req_global_0
  - req_global_1
  allowed: []
  forbidden: []
