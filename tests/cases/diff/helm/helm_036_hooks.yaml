      unused_marker_67890
  changed_files:
    templates/hooks/pre-install.yaml: |
      apiVersion: batch/v1
      kind: Job
      metadata:
        name: {{ .Release.Name }}-db-init
        annotations:
          "helm.sh/hook": pre-install
          "helm.sh/hook-weight": "-5"
          "helm.sh/hook-delete-policy": hook-succeeded
      spec:
        template:
          spec:
            containers:
            - name: init
              image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
              command: ["./init-db.sh"]
            restartPolicy: Never
    unrelated.md: |
      # garbage_marker_12345
      unused_marker_67890
  commit_message: Update files
fragments:
- id: pre_install_file
  selector:
    path: templates/hooks/pre-install.yaml
- id: req_global_0
  selector:
    anchor: 'apiVersion: batch/v1'
- id: no_global_0
  selector:
    anchor: unrelated.md
oracle:
