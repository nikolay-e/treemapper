initial:
  chart/Chart.yaml: |
    apiVersion: v2
    name: secret-app
    version: 1.0.0
  chart/values.yaml: |
    db:
      password: ""
  chart/templates/secret.yaml: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: db-secret
    data: {}
  chart/templates/sealed-secret.yaml: |
    apiVersion: bitnami.com/v1alpha1
    kind: SealedSecret
    metadata:
    spec:
      encryptedData:
  chart/docs/secret-rotation.md: |
    # Secret Rotation
    ## Vault Integration
changed:
  chart/Chart.yaml: |
    apiVersion: v2
    name: secret-app
    version: 1.0.0
  chart/values.yaml: |
    db:
      password: ""
  chart/templates/secret.yaml: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: {{ .Release.Name }}-db-secret
    type: Opaque
    data:
      password: {{ .Values.db.password | b64enc }}
  chart/templates/sealed-secret.yaml: |
    apiVersion: bitnami.com/v1alpha1
    kind: SealedSecret
    metadata:
    spec:
      encryptedData:
  chart/docs/secret-rotation.md: |
    # Secret Rotation
    ## Vault Integration
must_include_files:
- chart/templates/secret.yaml
must_include_content:
- 'name: {{ .Release.Name }}-db-secret'
add_garbage_files: false
skip_garbage_check: true
