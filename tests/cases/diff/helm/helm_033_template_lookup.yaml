max_enrichment: 4.2
initial:
  templates/secret.yaml: |
    apiVersion: v1
    kind: Secret
    data:
      password: {{ randAlphaNum 20 | b64enc }}
  junk.md: |
    garbage_marker_12345
    unused_marker_67890
changed:
  templates/secret.yaml: |
    {{- $secret := lookup "v1" "Secret" .Release.Namespace "existing-secret" -}}
    apiVersion: v1
    kind: Secret
    data:
      {{- if $secret }}
      password: {{ index $secret.data "password" }}
      {{- else }}
      password: {{ randAlphaNum 20 | b64enc }}
      {{- end }}
  junk.md: |
    garbage_marker_12345
    unused_marker_67890
must_include_files:
- templates/secret.yaml
must_include_content:
- '{{- $secret := lookup "v1" "Secret" .Release.Namespace "existing-secret" -}}'
add_garbage_files: false
skip_garbage_check: true
