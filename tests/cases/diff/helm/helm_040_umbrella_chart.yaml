name: helm_040_umbrella_chart
repo:
  initial_files:
    Chart.yaml: |
      apiVersion: v2
      name: myapp
      version: 1.0.0
    charts/frontend/Chart.yaml: |
      apiVersion: v2
      name: frontend
      version: 1.0.0
      description: Frontend web application
    charts/backend/Chart.yaml: |
      apiVersion: v2
      name: backend
      version: 1.0.0
      description: Backend API service
    charts/frontend/values.yaml: |
      replicaCount: 2
      image:
        repository: frontend-app
        tag: "1.0.0"
      service:
        type: ClusterIP
        port: 3000
    charts/backend/values.yaml: |
      replicaCount: 3
      image:
        repository: backend-api
        tag: "1.0.0"
      service:
        type: ClusterIP
        port: 8080
    charts/frontend/templates/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: {{ include "frontend.fullname" . }}
      spec:
        type: {{ .Values.service.type }}
        ports:
          - port: {{ .Values.service.port }}
    charts/backend/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ include "backend.fullname" . }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: backend
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    values.yaml: |
      frontend:
        replicaCount: 2
      backend:
        replicaCount: 3
      redis:
        auth:
          enabled: false
  changed_files:
    Chart.yaml: |
      apiVersion: v2
      name: myapp
      version: 1.0.0
      dependencies:
        - name: frontend
          version: 1.0.0
          repository: file://./charts/frontend
        - name: backend
          version: 1.0.0
          repository: file://./charts/backend
        - name: redis
          version: 17.0.0
          repository: https://charts.bitnami.com/bitnami
    charts/frontend/Chart.yaml: |
      apiVersion: v2
      name: frontend
      version: 1.0.0
      description: Frontend web application
    charts/backend/Chart.yaml: |
      apiVersion: v2
      name: backend
      version: 1.0.0
      description: Backend API service
    charts/frontend/values.yaml: |
      replicaCount: 2
      image:
        repository: frontend-app
        tag: "1.0.0"
      service:
        type: ClusterIP
        port: 3000
    charts/backend/values.yaml: |
      replicaCount: 3
      image:
        repository: backend-api
        tag: "1.0.0"
      service:
        type: ClusterIP
        port: 8080
    charts/frontend/templates/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: {{ include "frontend.fullname" . }}
      spec:
        type: {{ .Values.service.type }}
        ports:
          - port: {{ .Values.service.port }}
    charts/backend/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ include "backend.fullname" . }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: backend
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    values.yaml: |
      frontend:
        replicaCount: 2
      backend:
        replicaCount: 3
      redis:
        auth:
          enabled: false
  commit_message: Update files
