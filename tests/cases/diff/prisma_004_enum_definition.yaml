      export async function updateTicketStatus(
        id: number,
        status: TicketStatus,
      ) {
        return prisma.ticket.update({
          where: { id },
          data: { status },
        });
      }

      export async function getBlockerTickets() {
        return prisma.ticket.findMany({
          where: { priority: 'BLOCKER', status: { not: 'CLOSED' } },
          orderBy: { createdAt: 'desc' },
        });
      }
