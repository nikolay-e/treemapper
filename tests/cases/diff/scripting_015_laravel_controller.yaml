    app/Http/Requests/StoreUserRequest.php: |
      <?php

      namespace App\Http\Requests;

      use Illuminate\Foundation\Http\FormRequest;

      class StoreUserRequest extends FormRequest
      {
          public function authorize(): bool
          {
              return true;
          }

          public function rules(): array
          {
              return [
                  'name' => 'required|string|max:255',
                  'email' => 'required|email|unique:users',
              ];
          }

          public function messages(): array
          {
              return [
                  'email.unique' => 'A user with this email already exists.',
              ];
          }
      }
    app/Models/User.php: |
      <?php

      namespace App\Models;

      use Illuminate\Database\Eloquent\Model;
      use Illuminate\Database\Eloquent\Factories\HasFactory;

      class User extends Model
      {
          use HasFactory;

          protected $fillable = ['name', 'email', 'password'];

          protected $hidden = ['password', 'remember_token'];

          protected $casts = [
              'email_verified_at' => 'datetime',
          ];

          public function posts()
          {
              return $this->hasMany(Post::class);
          }

          public function fullName(): string
          {
              return $this->name;
          }
      }
    routes/api.php: |
      <?php

      use App\Http\Controllers\UserController;
      use App\Http\Controllers\PostController;
      use Illuminate\Support\Facades\Route;

      Route::middleware('api')->group(function () {
          Route::get('/users', [UserController::class, 'index']);
          Route::post('/users', [UserController::class, 'store']);
          Route::get('/users/{user}', [UserController::class, 'show']);
          Route::put('/users/{user}', [UserController::class, 'update']);
          Route::delete('/users/{user}', [UserController::class, 'destroy']);

          Route::apiResource('posts', PostController::class);
      });
    tests/Feature/UserControllerTest.php: |
      <?php

      namespace Tests\Feature;

      use Tests\TestCase;
      use App\Models\User;
      use Illuminate\Foundation\Testing\RefreshDatabase;

      class UserControllerTest extends TestCase
      {
          use RefreshDatabase;

          public function test_store_creates_user(): void
          {
              $response = $this->postJson('/api/users', [
                  'name' => 'Jane Doe',
                  'email' => 'jane@example.com',
              ]);

              $response->assertStatus(201)
                  ->assertJsonStructure(['user' => ['id', 'name', 'email'], 'created']);

              $this->assertDatabaseHas('users', ['email' => 'jane@example.com']);
          }

          public function test_store_validates_email(): void
          {
              $response = $this->postJson('/api/users', [
                  'name' => 'Test',
                  'email' => 'not-an-email',
              ]);

              $response->assertStatus(422);
          }

          public function test_store_rejects_duplicate_email(): void
          {
              User::factory()->create(['email' => 'taken@example.com']);

              $response = $this->postJson('/api/users', [
                  'name' => 'Duplicate',
                  'email' => 'taken@example.com',
              ]);

              $response->assertStatus(422);
          }

          public function test_index_returns_empty(): void
          {
              $this->getJson('/api/users')->assertStatus(200);
          }
      }
    app/Http/Requests/UpdateUserRequest.php: |
      <?php

      namespace App\Http\Requests;

      use Illuminate\Foundation\Http\FormRequest;

      class UpdateUserRequest extends FormRequest
      {
          public function authorize(): bool
          {
              return true;
          }

          public function rules(): array
          {
              return [
                  'name' => 'sometimes|string|max:255',
                  'email' => 'sometimes|email|unique:users,email,' . $this->route('user'),
              ];
          }
      }
    app/Http/Middleware/EnsureJsonResponse.php: |
      <?php

      namespace App\Http\Middleware;

      use Closure;
      use Illuminate\Http\Request;

      class EnsureJsonResponse
      {
          public function handle(Request $request, Closure $next)
          {
              $request->headers->set('Accept', 'application/json');
              return $next($request);
          }
      }
    app/Observers/UserObserver.php: |
      <?php

      namespace App\Observers;

      use App\Models\User;
      use Illuminate\Support\Facades\Log;

      class UserObserver
      {
          public function created(User $user): void
          {
              Log::info("User created: {$user->email}");
              // Dispatch welcome email job
          }

          public function updated(User $user): void
          {
              Log::info("User updated: {$user->email}");
          }

          public function deleted(User $user): void
          {
              Log::info("User deleted: {$user->email}");
          }
      }
    app/Http/Resources/UserResource.php: |
      <?php

      namespace App\Http\Resources;

      use Illuminate\Http\Resources\Json\JsonResource;

      class UserResource extends JsonResource
      {
          public function toArray($request): array
          {
              return [
                  'id' => $this->id,
                  'name' => $this->name,
                  'email' => $this->email,
                  'created_at' => $this->created_at->toISOString(),
              ];
          }
      }
  changed_files:
    app/Http/Controllers/UserController.php: |
      <?php

      namespace App\Http\Controllers;

      use App\Http\Requests\StoreUserRequest;
      use App\Models\User;
      use Illuminate\Http\JsonResponse;

      class UserController extends Controller
      {
          public function index(): JsonResponse
          {
              return response()->json(['users' => [], 'total' => 0]);
          }

          public function store(StoreUserRequest $request): JsonResponse
          {
              $data = $request->validated();
              $user = User::create($data);
              return response()->json(['user' => $user, 'created' => true], 201);
          }
      }
