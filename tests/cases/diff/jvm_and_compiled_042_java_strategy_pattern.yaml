    src/main/java/com/example/PaymentProcessor.java: |
      package com.example;

      public class PaymentProcessor {
          public void process(String type, double amount) {
              if ("credit".equals(type)) {
                  System.out.println("Credit: " + amount);
              } else if ("debit".equals(type)) {
                  System.out.println("Debit: " + amount);
              }
          }
      }
    src/main/java/com/example/RefundProcessor.java: |
      package com.example;

      public class RefundProcessor {
          public void processRefund(String transactionId, double amount) {
              if (amount <= 0) {
                  throw new IllegalArgumentException("Refund amount must be positive");
              }
              System.out.println("Refund " + transactionId + ": " + amount);
          }

          public boolean isRefundable(String status) {
              return "completed".equals(status) || "partial".equals(status);
          }
      }
    src/main/java/com/example/TransactionLog.java: |
      package com.example;

      import java.time.LocalDateTime;
      import java.util.ArrayList;
      import java.util.List;

      public class TransactionLog {
          private final List<String> entries = new ArrayList<>();

          public void record(String type, double amount) {
              entries.add(LocalDateTime.now() + " | " + type + " | " + amount);
          }

          public List<String> getEntries() {
              return List.copyOf(entries);
          }
      }
  changed_files:
    src/main/java/com/example/PaymentProcessor.java: |
      package com.example;

      public class PaymentProcessor {
          private PaymentStrategy strategy;

          public void setStrategy(PaymentStrategy strategy) {
              this.strategy = strategy;
          }

          public void process(double amount) {
              if (strategy.validate(amount)) {
                  strategy.pay(amount);
              } else {
                  throw new IllegalArgumentException("Invalid amount");
              }
          }
      }
    src/main/java/com/example/PaymentStrategy.java: |
      package com.example;

      public interface PaymentStrategy {
          void pay(double amount);
          boolean validate(double amount);
      }
    src/main/java/com/example/CreditCardPayment.java: |
      package com.example;

      public class CreditCardPayment implements PaymentStrategy {
          private final String cardNumber;

          public CreditCardPayment(String cardNumber) {
              this.cardNumber = cardNumber;
          }

          @Override
          public void pay(double amount) {
              System.out.println("Credit card " + cardNumber + ": " + amount);
          }

          @Override
          public boolean validate(double amount) {
              return amount > 0 && amount < 10000;
          }
      }
    src/main/java/com/example/RefundProcessor.java: |
