  changed_files:
    Sources/Validation/Validator.swift: |
      import Foundation

      enum ValidationError: Error, Equatable {
          case emptyField(String)
          case tooLong(String, max: Int)
          case invalidFormat(String, pattern: String)
          case outOfRange(String, min: Int, max: Int)
      }

      class Validator {
          func validateEmail(_ email: String) throws {
              if email.isEmpty {
                  throw ValidationError.emptyField("email")
              }
              let emailPattern = "[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
              if email.range(of: emailPattern, options: .regularExpression) == nil {
                  throw ValidationError.invalidFormat("email", pattern: emailPattern)
              }
          }

          func validateName(_ name: String) throws {
              if name.isEmpty {
                  throw ValidationError.emptyField("name")
              }
              if name.count > 100 {
                  throw ValidationError.tooLong("name", max: 100)
              }
          }

          func validateAge(_ age: Int) throws {
              if age < 0 || age > 150 {
                  throw ValidationError.outOfRange("age", min: 0, max: 150)
              }
          }
      }
