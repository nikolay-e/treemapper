# Scenario: A Flutter StatefulWidget's State class adds a new method that reads
# from a provider (ChangeNotifier). The reviewer needs the provider definition
# to understand what data the new method accesses and whether the state change
# notifications are correct.
#
# Diff: lib/screens/cart_screen.dart State class adds _applyDiscount() which
# reads CartProvider.items and CartProvider.applyDiscount(). The CartProvider
# is imported via Provider package pattern.
#
# Reviewer questions:
#   Q1: "What does CartProvider.applyDiscount() actually do — does it
#        modify the list in place or return a new total?"
#       -> lib/providers/cart_provider.dart (UNCHANGED): applyDiscount mutates
#          _items prices and calls notifyListeners().
#
#   Q2: "What is the shape of CartItem — does it have a price field?"
#       -> lib/models/cart_item.dart (UNCHANGED): CartItem with name, price, quantity.
#
# Not needed for comprehension:
#   - lib/providers/theme_provider.dart: Another provider, same directory.
#     STRUCTURAL TRAP: same ChangeNotifier pattern, same notifyListeners() calls.
#
#   - lib/screens/checkout_screen.dart: Screen that also uses CartProvider.
#     HARDEST TRAP: imports same provider, accesses same items list. But
#     checkout flow is not needed to understand the discount feature.
#
#   - lib/widgets/cart_badge.dart: Widget that displays cart count.
#     Uses CartProvider.items.length but unrelated to discount logic.

max_enrichment: 6.2
initial:
  lib/models/cart_item.dart: |
    class CartItem {
      final String id;
      final String name;
      double price;
      int quantity;

      CartItem({
        required this.id,
        required this.name,
        required this.price,
        this.quantity = 1,
      });

      double get total => price * quantity;
    }
  lib/providers/cart_provider.dart: |
    import 'package:flutter/foundation.dart';
    import 'package:myapp/models/cart_item.dart';

    class CartProvider extends ChangeNotifier {
      final List<CartItem> _items = [];

      List<CartItem> get items => List.unmodifiable(_items);

      double get subtotal => _items.fold(0, (sum, item) => sum + item.total);

      void addItem(CartItem item) {
        _items.add(item);
        notifyListeners();
      }

      void removeItem(String itemId) {
        _items.removeWhere((item) => item.id == itemId);
        notifyListeners();
      }

      void applyDiscount(double percentage) {
        for (final item in _items) {
          item.price = item.price * (1 - percentage / 100);
        }
        notifyListeners();
      }

      void clearCart() {
        _items.clear();
        notifyListeners();
      }
    }
