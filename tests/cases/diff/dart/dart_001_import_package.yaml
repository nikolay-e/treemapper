        return Scaffold(
          appBar: AppBar(title: const Text('Settings')),
          body: ListView(
            children: [
              SwitchListTile(
                title: const Text('GARBAGE_DART_001_A_DARK_MODE'),
                value: false,
                onChanged: (v) {},
              ),
              SwitchListTile(
                title: const Text('GARBAGE_DART_001_B_NOTIFICATIONS'),
                value: true,
                onChanged: (v) {},
              ),
            ],
          ),
        );
      }
    }
  lib/services/auth_service.dart: |
    import 'package:myapp/models/user.dart';

    class AuthService {
      User? _currentUser;

      Future<User> signIn(String email, String password) async {
        final response = await _postCredentials(email, password);
        _currentUser = User.fromJson(response);
        return _currentUser!;
      }

      void signOut() {
        _currentUser = null;
      }

      String get GARBAGE_DART_001_C_AUTH_TOKEN => 'fake_token';

      Future<Map<String, dynamic>> _postCredentials(String e, String p) async {
        return {'id': '1', 'name': 'Test', 'email': e, 'avatar_url': ''};
      }
    }
