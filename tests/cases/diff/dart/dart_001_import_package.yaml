# Scenario: A Flutter widget adds a new field display using a model class imported
# from a package. The reviewer needs to see the model definition to verify the
# field exists and has the expected type.
#
# Diff: lib/screens/profile_screen.dart changes from displaying only user.name
# to also displaying user.avatarUrl via a CircleAvatar widget. The User model
# is imported via `import 'package:myapp/models/user.dart';`.
#
# Reviewer questions:
#   Q1: "Does User have an avatarUrl field?"
#       -> lib/models/user.dart (UNCHANGED): class User with avatarUrl String field.
#
#   Q2: "Is avatarUrl nullable — do we need a null check?"
#       -> lib/models/user.dart: avatarUrl is `final String avatarUrl` (non-nullable).
#          The diff uses it directly without a null check, which is correct.
#
# Not needed for comprehension:
#   - lib/screens/settings_screen.dart: Sibling screen in same directory.
#     STRUCTURAL TRAP: same import pattern, same StatelessWidget. But deals
#     with app settings, not user profile display.
#
#   - lib/services/auth_service.dart: Service that also uses User objects.
#     HARDEST TRAP: imports the same User model, calls methods that return User.
#     But authentication logic is unrelated to rendering avatarUrl.
#
#   - lib/models/post.dart: Sibling model in models/ directory.
#     STRUCTURAL TRAP: same class pattern, same field types. But represents
#     a social post, not a user.
#
#   - lib/widgets/loading_spinner.dart: Generic widget used across the app.
#     No connection to User or profile rendering.

