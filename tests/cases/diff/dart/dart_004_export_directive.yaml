must_include_files:
  - lib/myapp.dart
  - lib/src/cache.dart

must_include_content_from:
  lib/myapp.dart:
    - "export 'src/cache.dart'"
  lib/src/cache.dart:
    - "class CacheManager"
    - "void set(String key, dynamic value)"
    - "T? get<T>(String key)"

must_not_include:
  # --- logger.dart: internal file, not exported ---
  - GARBAGE_DART_004_A_LOG_FORMAT
  - GARBAGE_DART_004_B_MAX_BUFFER
  - "class Logger"
  # --- internal_helpers.dart: utility, never exported ---
  - GARBAGE_DART_004_C_HELPER_VERSION
  - GARBAGE_DART_004_D_MAX_INPUT
  - sanitizeInput
  - isValidEmail

must_not_include_files:
  - lib/src/logger.dart
  - lib/src/internal_helpers.dart

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
