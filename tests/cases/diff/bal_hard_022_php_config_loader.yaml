      namespace App\Config;
      interface ConfigInterface {
          public function get(string $key, $default = null);
          public function has(string $key): bool;
          public function all(): array;
      }
    src/Config/ArrayConfig.php: |
      <?php
      namespace App\Config;
      class ArrayConfig implements ConfigInterface {
          private array $data;
          public function __construct(array $data) {
              $this->data = $data;
          }
          public function get(string $key, $default = null) {
              return $this->data[$key] ?? $default;
          }
          public function has(string $key): bool {
              return array_key_exists($key, $this->data);
          }
          public function all(): array {
              return $this->data;
          }
      }
    src/Config/ConfigFactory.php: |
      <?php
      namespace App\Config;
      class ConfigFactory {
          public static function fromArray(array $data): ConfigInterface {
              return new ArrayConfig($data);
          }
      }
    src/Database/Connection.php: |
      <?php
      namespace App\Database;
      use App\Config\ConfigInterface;
      class Connection {
          private string $dsn;
          public function __construct(ConfigInterface $config) {
              $host = $config->get('db_host', 'localhost');
              $port = $config->get('db_port', '5432');
              $name = $config->get('db_name', 'app');
              $this->dsn = "pgsql:host=$host;port=$port;dbname=$name";
          }
