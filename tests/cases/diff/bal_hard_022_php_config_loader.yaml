    src/App/Bootstrap.php: |
      <?php
      namespace App\App;
      use App\Config\ConfigFactory;
      use App\Database\Connection;
      use App\Cache\CacheManager;
      class Bootstrap {
          public static function init(array $env): array {
              $config = ConfigFactory::fromArray($env);
              $db = new Connection($config);
              $cache = new CacheManager($config);
              return ['db' => $db, 'cache' => $cache];
          }
      }
    src/Helpers/EnvParser.php: |
      <?php
      namespace App\Helpers;
      class EnvParser {
          public static function parse(string $content): array {
              $result = [];
              foreach (explode("\n", $content) as $line) {
                  if (strpos($line, '=') !== false) {
                      [$key, $value] = explode('=', $line, 2);
                      $result[trim($key)] = trim($value);
                  }
              }
              return $result;
          }
      }
  changed_files:
    src/Config/ArrayConfig.php: |
      <?php
      namespace App\Config;
      class ArrayConfig implements ConfigInterface {
          private array $data;
          public function __construct(array $data) {
              $this->data = $this->flatten($data);
          }
          public function get(string $key, $default = null) {
              return $this->data[$key] ?? $default;
          }
          public function has(string $key): bool {
              return array_key_exists($key, $this->data);
          }
          public function all(): array {
              return $this->data;
          }
          private function flatten(array $data, string $prefix = ''): array {
              $result = [];
              foreach ($data as $key => $value) {
                  $fullKey = $prefix ? "{$prefix}.{$key}" : $key;
                  if (is_array($value)) {
                      $result = array_merge($result, $this->flatten($value, $fullKey));
                  } else {
                      $result[$fullKey] = $value;
                  }
              }
              return $result;
          }
      }
    src/Database/Connection.php: |
