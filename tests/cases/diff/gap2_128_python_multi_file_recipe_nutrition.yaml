  changed_files:
    kitchen/ingredient.py: |
      from dataclasses import dataclass
      from typing import Optional

      @dataclass
      class Ingredient:
          name: str
          calories_per_gram: float
          grams: float
          protein_per_gram: Optional[float] = None

          def total_calories(self) -> float:
              return self.calories_per_gram * self.grams

          def total_protein(self) -> float:
              if self.protein_per_gram is None:
                  return 0.0
              return self.protein_per_gram * self.grams
    kitchen/recipe.py: |
      from typing import List
      from kitchen.ingredient import Ingredient

      class Recipe:
          def __init__(self, title: str, servings: int, prep_minutes: int = 0):
              self.title = title
              self.servings = servings
              self.prep_minutes = prep_minutes
              self._ingredients: List[Ingredient] = []

          def add_ingredient(self, ingredient: Ingredient) -> None:
              self._ingredients.append(ingredient)

          def total_calories(self) -> float:
              return sum(i.total_calories() for i in self._ingredients)

          def calories_per_serving(self) -> float:
              return self.total_calories() / self.servings

          def total_protein(self) -> float:
              return sum(i.total_protein() for i in self._ingredients)

          def protein_per_serving(self) -> float:
              return self.total_protein() / self.servings
