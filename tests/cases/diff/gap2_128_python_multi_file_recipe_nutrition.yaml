          grams: float

          def total_calories(self) -> float:
              return self.calories_per_gram * self.grams
    kitchen/recipe.py: |
      from typing import List
      from kitchen.ingredient import Ingredient

      class Recipe:
          def __init__(self, title: str, servings: int):
              self.title = title
              self.servings = servings
              self._ingredients: List[Ingredient] = []

          def add_ingredient(self, ingredient: Ingredient) -> None:
              self._ingredients.append(ingredient)

          def total_calories(self) -> float:
              return sum(i.total_calories() for i in self._ingredients)

          def calories_per_serving(self) -> float:
              return self.total_calories() / self.servings
