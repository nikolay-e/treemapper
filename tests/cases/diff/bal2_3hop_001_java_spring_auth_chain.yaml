    src/main/java/com/app/auth/TokenProvider.java: |
      package com.app.auth;

      import java.time.Instant;

      public class TokenProvider {
          private final long expirationSeconds;
          public TokenProvider(long expirationSeconds) {
              this.expirationSeconds = expirationSeconds;
          }
          public String generateToken(String userId) {
              long expiry = Instant.now().getEpochSecond() + expirationSeconds;
              return "token-" + userId + "-" + expiry;
          }
          public boolean validateToken(String token) {
              return token != null && token.startsWith("token-");
          }
      }
