      from dataclasses import dataclass
      from typing import Optional

      @dataclass
      class Track:
          track_id: str
          title: str
          artist: str
          duration_secs: int
          genre: Optional[str] = None

          def display_name(self) -> str:
              return f"{self.artist} - {self.title}"

          def is_long(self, threshold: int = 300) -> bool:
              return self.duration_secs > threshold
    music/playlist.py: |
      from typing import List, Optional
      from music.track import Track

      class Playlist:
          def __init__(self, name: str):
              self.name = name
              self._tracks: List[Track] = []

          def add(self, track: Track) -> None:
              self._tracks.append(track)

          def total_duration(self) -> int:
              return sum(t.duration_secs for t in self._tracks)

          def track_count(self) -> int:
              return len(self._tracks)

          def filter_by_genre(self, genre: str) -> List[Track]:
              return [t for t in self._tracks if t.genre == genre]

          def longest_track(self) -> Optional[Track]:
              if not self._tracks:
                  return None
              return max(self._tracks, key=lambda t: t.duration_secs)
