      use std::time::Instant;

      pub struct RateLimiter {
          max_requests: u32,
          burst_size: u32,
          window_start: Instant,
          count: u32,
      }

      impl RateLimiter {
          pub fn new(max_requests: u32) -> Self {
              RateLimiter {
                  max_requests,
                  burst_size: max_requests,
                  window_start: Instant::now(),
                  count: 0,
              }
          }

          pub fn with_burst(max_requests: u32, burst_size: u32) -> Self {
              RateLimiter {
                  max_requests,
                  burst_size,
                  window_start: Instant::now(),
                  count: 0,
              }
          }

          pub fn allow(&mut self) -> bool {
              if self.count < self.burst_size {
                  self.count += 1;
                  true
              } else {
                  false
              }
          }

          pub fn remaining(&self) -> u32 {
              self.burst_size.saturating_sub(self.count)
          }

          pub fn reset(&mut self) {
              self.count = 0;
              self.window_start = Instant::now();
          }
      }
