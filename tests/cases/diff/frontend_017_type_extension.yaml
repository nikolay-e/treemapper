repo:
  initial_files:
    src/types.ts: |
      export type User = {
          id: string;
          name: string;
          email: string;
      };

      export type Timestamps = {
          createdAt: Date;
          updatedAt: Date;
      };
    src/extended.ts: |
      console.log('initial');
    src/permissions.ts: |
      export type Role = 'admin' | 'editor' | 'viewer';

      export type Permission = 'read' | 'write' | 'delete' | 'manage';

      export type RolePermissions = {
          [K in Role]: Permission[];
      };

      export const defaultPermissions: RolePermissions = {
          admin: ['read', 'write', 'delete', 'manage'],
          editor: ['read', 'write'],
          viewer: ['read'],
      };

      export function hasPermission(role: Role, permission: Permission): boolean {
          return defaultPermissions[role].includes(permission);
      }
    src/types/api.ts: |
      export interface ApiResponse<T> {
          data: T;
          status: number;
          message: string;
      }

      export interface PaginatedResponse<T> {
          items: T[];
          total: number;
          page: number;
          pageSize: number;
          hasMore: boolean;
      }

      export interface ApiError {
          code: string;
          message: string;
          details?: Record<string, string>;
      }
  changed_files:
    src/types.ts: |
      export type User = {
          id: string;
          name: string;
          email: string;
      };

      export type Timestamps = {
          createdAt: Date;
          updatedAt: Date;
      };
    src/extended.ts: |
      import { User, Timestamps } from './types';

      export type ExtendedUser = User & {
          metadata: Record<string, unknown>;
          role: 'admin' | 'user';
      };

      export type TimestampedUser = User & Timestamps;

      export type FullUser = User & Timestamps & {
          preferences: {
              theme: 'light' | 'dark';
              notifications: boolean;
          };
      };
    src/permissions.ts: |
      export type Role = 'admin' | 'editor' | 'viewer';

      export type Permission = 'read' | 'write' | 'delete' | 'manage';

      export type RolePermissions = {
          [K in Role]: Permission[];
      };

      export const defaultPermissions: RolePermissions = {
          admin: ['read', 'write', 'delete', 'manage'],
          editor: ['read', 'write'],
          viewer: ['read'],
      };

      export function hasPermission(role: Role, permission: Permission): boolean {
          return defaultPermissions[role].includes(permission);
      }
    src/types/api.ts: |
      export interface ApiResponse<T> {
