name: ruby_001_method_definition
repo:
  initial_files:
    lib/processor.rb: |
      class Processor
        attr_reader :options

        def initialize(options = {})
          @options = options
          @logger = options.fetch(:logger, nil)
        end

        def process(data)
          data.upcase
        end

        def batch_process(items)
          items.map { |item| process(item) }
        end

        private

        def log(message)
          @logger&.info(message)
        end
      end
    app.rb: |
      puts 'Hello'
    lib/formatter.rb: |
      class Formatter
        def initialize(template)
          @template = template
        end

        def format(values)
          result = @template.dup
          values.each { |k, v| result.gsub!("{#{k}}", v.to_s) }
          result
        end
      end
    lib/csv_exporter.rb: |
      require 'csv'

      class CsvExporter
        def initialize(headers)
          @headers = headers
        end

        def export(records, output_path)
          CSV.open(output_path, 'w') do |csv|
            csv << @headers
            records.each { |record| csv << @headers.map { |h| record[h] } }
          end
        end

        def export_to_string(records)
          CSV.generate do |csv|
            csv << @headers
            records.each { |record| csv << @headers.map { |h| record[h] } }
          end
        end
      end
    lib/logger_config.rb: |
      require 'logger'

      class LoggerConfig
        DEFAULT_LEVEL = Logger::INFO

        def self.create(output: $stdout, level: DEFAULT_LEVEL)
          logger = Logger.new(output)
          logger.level = level
          logger.formatter = proc do |severity, datetime, _progname, msg|
            "[#{severity}] #{datetime.strftime('%Y-%m-%d %H:%M:%S')} - #{msg}\n"
          end
          logger
        end

        def self.create_file_logger(path, level: DEFAULT_LEVEL)
          create(output: path, level: level)
        end
      end
