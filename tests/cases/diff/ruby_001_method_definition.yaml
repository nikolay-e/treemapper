    app.rb: |
      require_relative 'lib/processor'
      require_relative 'lib/formatter'

      processor = Processor.new(logger: nil)
      result = processor.process("hello")
      puts result

      formatted = Formatter.new("Result: {value}").format(value: result)
      puts formatted

      batch = processor.batch_process(["alpha", "beta", "gamma"])
      batch.each { |item| puts item }
