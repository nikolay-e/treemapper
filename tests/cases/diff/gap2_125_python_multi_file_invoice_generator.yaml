  changed_files:
    billing/invoice.py: |
      from dataclasses import dataclass, field
      from typing import List, Optional
      from decimal import Decimal
      from datetime import date

      @dataclass
      class LineItem:
          description: str
          quantity: int
          unit_price: Decimal

          def subtotal(self) -> Decimal:
              return self.unit_price * self.quantity

      @dataclass
      class Invoice:
          invoice_id: str
          customer_name: str
          items: List[LineItem]
          due_date: Optional[date] = None
          discount_pct: Decimal = Decimal("0")

          def total(self) -> Decimal:
              raw = sum(item.subtotal() for item in self.items)
              return raw * (1 - self.discount_pct / 100)

          def is_overdue(self, today: date) -> bool:
              if self.due_date is None:
                  return False
              return today > self.due_date
    billing/formatter.py: |
      from billing.invoice import Invoice

      class InvoiceFormatter:
          def to_text(self, invoice: Invoice) -> str:
              lines = [f"Invoice: {invoice.invoice_id}"]
              if invoice.due_date:
                  lines.append(f"Due: {invoice.due_date.isoformat()}")
              for item in invoice.items:
                  lines.append(f"  {item.description}: {item.subtotal()}")
              if invoice.discount_pct:
                  lines.append(f"Discount: {invoice.discount_pct}%")
              lines.append(f"Total: {invoice.total()}")
              return "\n".join(lines)
