  changed_files:
    src/main/scala/core/Transformer.scala: |
      package core

      trait Transformer[A, B] {
        def transform(input: A): B

        def andThen[C](next: Transformer[B, C]): Transformer[A, C] = {
          val self = this
          new Transformer[A, C] {
            def transform(input: A): C = next.transform(self.transform(input))
          }
        }

        def map[C](f: B => C): Transformer[A, C] = {
          val self = this
          new Transformer[A, C] {
            def transform(input: A): C = f(self.transform(input))
          }
        }
      }

      object Transformer {
        def identity[A]: Transformer[A, A] = new Transformer[A, A] {
          def transform(input: A): A = input
        }

        def from[A, B](f: A => B): Transformer[A, B] = new Transformer[A, B] {
          def transform(input: A): B = f(input)
        }
      }
  commit_message: "Add andThen, map, and from factory to Transformer trait"
