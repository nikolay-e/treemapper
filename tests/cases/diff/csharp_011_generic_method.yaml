    src/main/scala/CS011_Notify.scala: |
      package notify

      object CS011_Notify {
        val CS011_GARBAGE_E = "notify_marker"

        def sendAlert(msg: String): Unit = println(msg)
      }
  changed_files:
    src/main/scala/trading/Trade.scala: |
      package trading

      case class Trade(
        id: String,
        symbol: String,
        quantity: Int,
        price: Double,
        side: String,
        commission: Double
      )
    src/main/scala/trading/TradeRepository.scala: |
      package trading

      class TradeRepository {
        private var store: List[Trade] = List.empty

        def save(t: Trade): Unit = {
          store = t :: store
        }

        def findBySymbol(symbol: String): List[Trade] =
          store.filter(_.symbol == symbol)

        def all(): List[Trade] = store

        def totalCommission(): Double =
          store.map(_.commission).sum
      }
    src/main/scala/trading/PositionService.scala: |
      package trading

      class PositionService(repo: TradeRepository) {
        def netPosition(symbol: String): Int = {
          repo.findBySymbol(symbol).foldLeft(0) { (acc, t) =>
            if (t.side == "buy") acc + t.quantity else acc - t.quantity
          }
        }

        def realizedPnl(symbol: String, currentPrice: Double): Double = {
          repo.findBySymbol(symbol).foldLeft(0.0) { (acc, t) =>
            val value = if (t.side == "buy") (currentPrice - t.price) * t.quantity
                        else (t.price - currentPrice) * t.quantity
            acc + value - t.commission
          }
        }

        def commissionPaid(): Double = repo.totalCommission()
      }
    src/main/scala/trading/api/TradingController.scala: |
      package trading.api

      import trading.{PositionService, TradeRepository, Trade}

      class TradingController(service: PositionService) {
        def handlePosition(symbol: String): String = {
          val pos = service.netPosition(symbol)
          s"Net position for $symbol: $pos"
        }

        def handlePnl(symbol: String, currentPrice: Double): String = {
          val pnl = service.realizedPnl(symbol, currentPrice)
          s"PnL for $symbol at $$${currentPrice}: $$${pnl}"
        }
      }
    src/main/scala/CS011_MarketData.scala: |
      package marketdata

      object CS011_MarketData {
        val CS011_GARBAGE_A = "marketdata_marker"
        val CS011_GARBAGE_B = "feed_url"

        def getLastPrice(symbol: String): Double = 0.0
      }
    src/main/scala/CS011_Compliance.scala: |
      package compliance

      object CS011_Compliance {
        val CS011_GARBAGE_C = "compliance_marker"
        val CS011_GARBAGE_D = "ruleset_version"

        def checkTrade(tradeId: String): Boolean = true
      }
    src/main/scala/CS011_Notify.scala: |
      package notify

      object CS011_Notify {
        val CS011_GARBAGE_E = "notify_marker"

        def sendAlert(msg: String): Unit = println(msg)
      }
  commit_message: "feat: add commission to Trade, realizedPnl and commissionPaid to PositionService"
