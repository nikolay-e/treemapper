      <?php
      namespace App\Http;

      class Request {
          private string $method;
          private string $uri;
          private array $headers;
          private string $body;

          public function __construct(string $method, string $uri, array $headers = [], string $body = '') {
              $this->method = $method;
              $this->uri = $uri;
              $this->headers = $headers;
              $this->body = $body;
          }

          public function getMethod(): string {
              return $this->method;
          }

          public function getUri(): string {
              return $this->uri;
          }

          public function getBody(): string {
              return $this->body;
          }

          public function getHeaders(): array {
              return $this->headers;
          }
      }
    src/Services/ResponseCache.php: |
      <?php
      namespace App\Services;

      class ResponseCache {
          private array $cache = [];
          private int $ttl;

          public function __construct(int $ttl = 300) {
              $this->ttl = $ttl;
          }

          public function store(string $key, string $responseBody): void {
              $this->cache[$key] = ['body' => $responseBody, 'expires' => time() + $this->ttl];
          }

          public function retrieve(string $key): ?string {
              if (isset($this->cache[$key]) && $this->cache[$key]['expires'] > time()) {
                  return $this->cache[$key]['body'];
              }
              return null;
          }

          public function invalidate(string $key): void {
              unset($this->cache[$key]);
          }
      }
    src/Http/JsonResponse.php: |
      <?php
      namespace App\Http;

      class JsonResponse {
          private int $status;
          private array $data;

          public function __construct(array $data, int $status = 200) {
              $this->data = $data;
              $this->status = $status;
          }

          public static function fromArray(array $data, int $status = 200): self {
              return new self($data, $status);
          }

          public function getDecoded(): array {
              return $this->data;
          }

          public function toResponse(): Response {
              return new Response($this->status, ['Content-Type' => 'application/json'], json_encode($this->data));
          }
      }
    src/Services/HttpClient.php: |
      <?php
      namespace App\Services;

      use App\Http\Response;

      class HttpClient {
          private string $baseUrl;
          private int $timeout;

          public function __construct(string $baseUrl, int $timeout = 30) {
              $this->baseUrl = $baseUrl;
              $this->timeout = $timeout;
          }

          public function get(string $path): Response {
              return new Response(200, [], '{}');
          }

          public function post(string $path, array $data): Response {
              $body = json_encode($data);
              return new Response(201, ['Content-Type' => 'application/json'], $body);
          }
      }
