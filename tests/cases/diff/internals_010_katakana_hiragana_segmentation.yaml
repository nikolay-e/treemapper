    src/main/java/com/payments/ledger/LedgerService.java: |
      package com.payments.ledger;

      import com.payments.model.Transaction;
      import java.util.List;
      import java.util.ArrayList;
      import java.util.stream.Collectors;

      public class LedgerService {
          private final List<Transaction> entries = new ArrayList<>();

          public void record(Transaction tx) {
              entries.add(tx);
          }

          public List<Transaction> getEntries() {
              return entries;
          }

          public double totalByCurrency(String currency) {
              return entries.stream()
                  .filter(tx -> tx.currency.equals(currency))
                  .mapToDouble(tx -> tx.amount)
                  .sum();
          }

          public List<Transaction> filterByCurrency(String currency) {
              return entries.stream()
                  .filter(tx -> tx.currency.equals(currency))
                  .collect(Collectors.toList());
          }
      }
    src/main/java/com/payments/model/Transaction.java: |
