    src/test/java/com/payments/ledger/LedgerServiceTest.java: |
      package com.payments.ledger;

      import com.payments.model.Transaction;
      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      public class LedgerServiceTest {
          @Test
          void recordAndRetrieve() {
              LedgerService svc = new LedgerService();
              svc.record(new Transaction("t1", 100.0, "USD"));
              assertEquals(1, svc.getEntries().size());
          }

          @Test
          void totalByCurrencySum() {
              LedgerService svc = new LedgerService();
              svc.record(new Transaction("t1", 50.0, "USD"));
              svc.record(new Transaction("t2", 75.0, "USD"));
              svc.record(new Transaction("t3", 30.0, "EUR"));
              assertEquals(125.0, svc.totalByCurrency("USD"), 0.001);
          }

          @Test
          void filterByCurrencyReturnsSubset() {
              LedgerService svc = new LedgerService();
              svc.record(new Transaction("t1", 10.0, "GBP"));
              svc.record(new Transaction("t2", 20.0, "USD"));
              assertEquals(1, svc.filterByCurrency("GBP").size());
          }
      }
