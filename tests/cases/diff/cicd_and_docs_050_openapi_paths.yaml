name: cicd_and_docs_050_openapi_paths
repo:
  initial_files:
    openapi.yaml: |
      openapi: 3.0.0
      info:
        title: User API
        version: 1.0.0
      paths:
        /users:
          get:
            summary: List users
            responses:
              '200':
                description: List of users
    src/handlers/users.py: |
      from flask import jsonify

      def list_users():
          return jsonify([{"id": 1, "name": "John"}])
    src/routes.py: |
      from flask import Blueprint
      from handlers.users import list_users

      api = Blueprint('api', __name__)
      api.route('/users')(list_users)
    garbage_openapi_parser.ts: |
      const GARBAGE_CICD_DOCS_050_PARSER_MARKER_A = "swagger-parser";
      const GARBAGE_CICD_DOCS_050_VALIDATE_MARKER_B = true;

      class GarbageOpenapiParser {
        static GARBAGE_CICD_DOCS_050_DEREFERENCE_MARKER_C = false;
        parse(): void {}
      }
    garbage_openapi_generator.ts: |
      const GARBAGE_CICD_DOCS_050_GENERATOR_MARKER_D = "openapi-generator";
      const GARBAGE_CICD_DOCS_050_LANG_MARKER_E = "typescript";

      class GarbageOpenapiGenerator {
        static GARBAGE_CICD_DOCS_050_TEMPLATE_MARKER_F = "axios";
        generate(): void {}
      }
  changed_files:
    openapi.yaml: |
      openapi: 3.0.0
      info:
        title: User API
        version: 1.0.0
      paths:
        /users:
          get:
            summary: List users
            parameters:
              - name: limit
                in: query
                schema:
                  type: integer
                  default: 10
            responses:
              '200':
                description: List of users
          post:
            summary: Create user
            requestBody:
              required: true
              content:
                application/json:
                  schema:
                    $ref: '#/components/schemas/CreateUser'
            responses:
              '201':
                description: User created
      components:
        schemas:
          CreateUser:
            type: object
            required:
              - name
              - email
            properties:
              name:
                type: string
              email:
                type: string
                format: email
    src/handlers/users.py: |
      from flask import jsonify, request

      def list_users():
          limit = request.args.get('limit', 10, type=int)
          users = [{"id": 1, "name": "John"}][:limit]
          return jsonify(users)

      def create_user():
          data = request.get_json()
          user = {"id": 2, **data}
          return jsonify(user), 201
    src/routes.py: |
      from flask import Blueprint
      from handlers.users import list_users, create_user

      api = Blueprint('api', __name__)
      api.route('/users', methods=['GET'])(list_users)
      api.route('/users', methods=['POST'])(create_user)
    garbage_openapi_parser.ts: |
      const GARBAGE_CICD_DOCS_050_PARSER_MARKER_A = "swagger-parser";
      const GARBAGE_CICD_DOCS_050_VALIDATE_MARKER_B = true;

      class GarbageOpenapiParser {
        static GARBAGE_CICD_DOCS_050_DEREFERENCE_MARKER_C = false;
        parse(): void {}
      }
    garbage_openapi_generator.ts: |
      const GARBAGE_CICD_DOCS_050_GENERATOR_MARKER_D = "openapi-generator";
      const GARBAGE_CICD_DOCS_050_LANG_MARKER_E = "typescript";

      class GarbageOpenapiGenerator {
        static GARBAGE_CICD_DOCS_050_TEMPLATE_MARKER_F = "axios";
        generate(): void {}
      }
  commit_message: Update files
fragments:
- id: openapi_file
  selector:
    path: openapi.yaml
- id: users_file
  selector:
    path: src/handlers/users.py
- id: routes_file
  selector:
    path: src/routes.py
- id: req_global_0
  selector:
    anchor: '- name: limit'
- id: req_global_1
  selector:
    anchor: 'format: email'
- id: no_global_0
  selector:
    anchor: GARBAGE_CICD_DOCS_050_DEREFERENCE_MARKER_C
- id: no_global_1
  selector:
    anchor: GARBAGE_CICD_DOCS_050_GENERATOR_MARKER_D
- id: no_global_2
  selector:
    anchor: GARBAGE_CICD_DOCS_050_LANG_MARKER_E
- id: no_global_3
  selector:
    anchor: GARBAGE_CICD_DOCS_050_PARSER_MARKER_A
- id: no_global_4
  selector:
    anchor: GARBAGE_CICD_DOCS_050_TEMPLATE_MARKER_F
- id: no_global_5
  selector:
    anchor: GARBAGE_CICD_DOCS_050_VALIDATE_MARKER_B
- id: no_global_6
  selector:
    anchor: garbage_openapi_parser.ts
oracle:
  required:
  - openapi_file
  - users_file
  - routes_file
  - req_global_0
  - req_global_1
  allowed: []
  forbidden:
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
  - no_global_5
  - no_global_6
