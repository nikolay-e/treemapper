    scripts/rate_limiter.lua: |
      local constants = require("scripts.constants")

      local function check_rate(key, limit, window)
          local current = tonumber(redis.call("GET", key) or "0")
          if current >= limit then
              return 0
          end
          local new_count = redis.call("INCR", key)
          if new_count == 1 then
              redis.call("EXPIRE", key, window)
          end
          return limit - new_count
      end

      local function check_sliding_window(identifier, limit, window)
          if window > constants.MAX_WINDOW_SIZE then
              window = constants.MAX_WINDOW_SIZE
          end
          local key = constants.make_key(identifier)
          local now = constants.timestamp()
          local window_start = now - window

          redis.call("ZREMRANGEBYSCORE", key, "-inf", window_start)
          local count = redis.call("ZCARD", key)

          if count >= limit then
              return 0
          end

          redis.call("ZADD", key, now, now .. ":" .. math.random(1000000))
          redis.call("EXPIRE", key, window)
          return limit - count - 1
      end

      local mode = ARGV[3] or "fixed"
      if mode == "sliding" then
          return check_sliding_window(KEYS[1], tonumber(ARGV[1]), tonumber(ARGV[2]))
      end
      return check_rate(KEYS[1], tonumber(ARGV[1]), tonumber(ARGV[2]))
