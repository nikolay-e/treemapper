repo:
  initial_files:
    scripts/constants.lua: |
      local M = {}

      M.KEY_PREFIX = "rl:"
      M.MAX_WINDOW_SIZE = 3600
      M.DEFAULT_LIMIT = 100
      M.DEFAULT_TTL = 60
      M.CLEANUP_BATCH_SIZE = 50

      function M.make_key(identifier)
          return M.KEY_PREFIX .. identifier
      end

      function M.timestamp()
          return tonumber(redis.call("TIME")[1])
      end

      return M
    scripts/rate_limiter.lua: |
      local constants = require("scripts.constants")

      local function check_rate(key, limit, window)
          local current = tonumber(redis.call("GET", key) or "0")
          if current >= limit then
              return 0
          end
          local new_count = redis.call("INCR", key)
          if new_count == 1 then
              redis.call("EXPIRE", key, window)
          end
          return limit - new_count
      end

      return check_rate(KEYS[1], tonumber(ARGV[1]), tonumber(ARGV[2]))
    scripts/cache_manager.lua: |
      local GARBAGE_LUA_004_A = "noise_marker_cache"

      local function evict_expired(prefix, batch_size)
          local keys = redis.call("KEYS", prefix .. "*")
          local evicted = 0
          for i = 1, math.min(#keys, batch_size) do
              local ttl = redis.call("TTL", keys[i])
              if ttl == -1 then
                  redis.call("DEL", keys[i])
                  evicted = evicted + 1
              end
          end
          return evicted
      end

      local function get_or_set(key, ttl)
          local val = redis.call("GET", key)
          if val then return val end
          redis.call("SETEX", key, ttl, "")
          return nil
      end

      return evict_expired(KEYS[1], tonumber(ARGV[1]))
    scripts/session_store.lua: |
      local GARBAGE_LUA_004_B = "noise_marker_session"

      local SESSION_PREFIX = "sess:"
      local SESSION_TTL = 1800

      local function create_session(user_id, data)
          local session_key = SESSION_PREFIX .. user_id
          redis.call("HMSET", session_key, unpack(data))
          redis.call("EXPIRE", session_key, SESSION_TTL)
          return session_key
      end

      local function get_session(user_id)
          local session_key = SESSION_PREFIX .. user_id
          return redis.call("HGETALL", session_key)
      end

      local function destroy_session(user_id)
          return redis.call("DEL", SESSION_PREFIX .. user_id)
      end

      return get_session(KEYS[1])
