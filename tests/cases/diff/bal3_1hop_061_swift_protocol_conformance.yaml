    Sources/Networking/APIClient.swift: |
      import Foundation

      protocol APIClientProtocol {
          func fetch(endpoint: String, completion: @escaping (Result<Data, Error>) -> Void)
          func fetch(endpoint: String, headers: [String: String], completion: @escaping (Result<Data, Error>) -> Void)
      }

      class APIClient: APIClientProtocol {
          private let session: URLSession
          private let baseURL: String

          init(session: URLSession = .shared, baseURL: String = "https://api.example.com") {
              self.session = session
              self.baseURL = baseURL
          }

          func fetch(endpoint: String, completion: @escaping (Result<Data, Error>) -> Void) {
              fetch(endpoint: endpoint, headers: [:], completion: completion)
          }

          func fetch(endpoint: String, headers: [String: String], completion: @escaping (Result<Data, Error>) -> Void) {
              guard let url = URL(string: baseURL + endpoint) else {
                  completion(.failure(URLError(.badURL)))
                  return
              }
              var request = URLRequest(url: url)
              headers.forEach { request.setValue($1, forHTTPHeaderField: $0) }
              session.dataTask(with: request) { data, _, error in
                  if let error = error {
                      completion(.failure(error))
                  } else if let data = data {
                      completion(.success(data))
                  }
              }.resume()
          }
      }
