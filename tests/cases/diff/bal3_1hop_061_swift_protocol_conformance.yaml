repo:
  initial_files:
    Sources/Networking/APIClient.swift: |
      import Foundation

      protocol APIClientProtocol {
          func fetch(endpoint: String, completion: @escaping (Result<Data, Error>) -> Void)
      }

      class APIClient: APIClientProtocol {
          private let session: URLSession

          init(session: URLSession = .shared) {
              self.session = session
          }

          func fetch(endpoint: String, completion: @escaping (Result<Data, Error>) -> Void) {
              guard let url = URL(string: endpoint) else {
                  completion(.failure(URLError(.badURL)))
                  return
              }
              session.dataTask(with: url) { data, _, error in
                  if let error = error {
                      completion(.failure(error))
                  } else if let data = data {
                      completion(.success(data))
                  }
              }.resume()
          }
      }
    Sources/Services/UserService.swift: |
      import Foundation
      import Networking

      class UserService {
          private let client: APIClientProtocol

          init(client: APIClientProtocol) {
              self.client = client
          }

          func loadUser(id: Int, completion: @escaping (Result<User, Error>) -> Void) {
              client.fetch(endpoint: "/users/\(id)") { result in
                  switch result {
                  case .success(let data):
                      let user = try? JSONDecoder().decode(User.self, from: data)
                      completion(user.map { .success($0) } ?? .failure(URLError(.cannotParseResponse)))
                  case .failure(let error):
                      completion(.failure(error))
                  }
              }
          }
      }
