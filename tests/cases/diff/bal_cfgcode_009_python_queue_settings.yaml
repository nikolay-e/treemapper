- context:config_to_code
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    config/queue.yaml: |
      queue:
        broker: "amqp://localhost:5672"
        backend: "redis://localhost:6379/0"
        concurrency: 4
        prefetch_multiplier: 1
        queues:
          default:
            priority: 0
          critical:
            priority: 9
    src/worker.py: |
      import yaml

      class Worker:
          def __init__(self):
              with open("config/queue.yaml") as f:
                  data = yaml.safe_load(f)
              self.cfg = data["queue"]
              self.broker = self.cfg["broker"]
              self.backend = self.cfg["backend"]
              self.concurrency = self.cfg["concurrency"]

          def get_queue_priority(self, name):
              return self.cfg["queues"].get(name, {}).get("priority", 0)
    src/tasks.py: |
      import yaml

      def get_broker_url():
          with open("config/queue.yaml") as f:
              data = yaml.safe_load(f)
          return data["queue"]["broker"]

      def enqueue(task_name, args):
          broker = get_broker_url()
          return broker, task_name, args
