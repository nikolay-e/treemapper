  changed_files:
    config/queue.yaml: |
      queue:
        broker: "amqp://rabbitmq.prod:5672"
        backend: "redis://redis.prod:6379/0"
        concurrency: 16
        prefetch_multiplier: 4
        queues:
          default:
            priority: 0
          critical:
            priority: 9
          bulk:
            priority: 3
            rate_limit: "100/m"
        retry_policy:
          max_retries: 5
          retry_backoff: true
    src/worker.py: |
      import yaml

      class Worker:
          def __init__(self):
              with open("config/queue.yaml") as f:
                  data = yaml.safe_load(f)
              self.cfg = data["queue"]
              self.broker = self.cfg["broker"]
              self.backend = self.cfg["backend"]
              self.concurrency = self.cfg["concurrency"]

          def get_queue_priority(self, name):
              return self.cfg["queues"].get(name, {}).get("priority", 0)
