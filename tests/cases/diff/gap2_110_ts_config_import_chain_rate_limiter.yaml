name: gap2_110_ts_config_import_chain_rate_limiter
tags:
- change:config
- change:single_file
- context:import_chain
- difficulty:medium
- distance:2hop
- lang:typescript
repo:
  initial_files:
    src/config/limits.ts: |
      export interface RateLimitConfig {
        windowMs: number;
        maxRequests: number;
        burstLimit: number;
      }

      export const rateLimits: RateLimitConfig = {
        windowMs: 60000,
        maxRequests: 100,
        burstLimit: 20,
      };
    src/middleware/rate_limiter.ts: |
      import { rateLimits } from "../config/limits";

      const buckets = new Map<string, number[]>();

      export function checkRateLimit(clientId: string): boolean {
        const now = Date.now();
        const window = buckets.get(clientId) || [];
        const recent = window.filter((t) => now - t < rateLimits.windowMs);
        buckets.set(clientId, recent);
        return recent.length < rateLimits.maxRequests;
      }

      export function getRemainingQuota(clientId: string): number {
        const window = buckets.get(clientId) || [];
        return Math.max(0, rateLimits.maxRequests - window.length);
      }
    src/routes/api_router.ts: |
      import { checkRateLimit, getRemainingQuota } from "../middleware/rate_limiter";

      export function routeRequest(clientId: string, path: string): string {
        if (!checkRateLimit(clientId)) {
          const remaining = getRemainingQuota(clientId);
          return `429 Too Many Requests (remaining: ${remaining})`;
        }
        return `200 OK: ${path}`;
      }
    src/utils/timer.ts: |
      const TRAP_GAP2_110_TIMER_A: string = "timer_utils";
      const TRAP_GAP2_110_PRECISION_B: number = 3;

      export function measureMs(fn: () => void): number {
        const start = performance.now();
        fn();
        return performance.now() - start;
      }
  changed_files:
