      package repository

      import (
          "context"
          "database/sql"
          "errors"
      )

      var ErrUserNotFound = errors.New("user not found")

      type UserRepository struct {
          db *sql.DB
      }

      func NewUserRepository(db *sql.DB) *UserRepository {
          return &UserRepository{db: db}
      }

      func (r *UserRepository) FindByID(ctx context.Context, id int64) (*User, error) {
          row := r.db.QueryRowContext(ctx, "SELECT id, name, email FROM users WHERE id = ?", id)
          var user User
          if err := row.Scan(&user.ID, &user.Name, &user.Email); err != nil {
              if errors.Is(err, sql.ErrNoRows) {
                  return nil, ErrUserNotFound
              }
              return nil, err
          }
          return &user, nil
      }

      func (r *UserRepository) FindAll(ctx context.Context, opts QueryOptions) ([]*User, error) {
          query := "SELECT id, name, email FROM users ORDER BY " + opts.SortBy + " LIMIT ? OFFSET ?"
          rows, err := r.db.QueryContext(ctx, query, opts.Limit, opts.Offset)
          if err != nil {
              return nil, err
          }
          defer rows.Close()

          var users []*User
          for rows.Next() {
              var user User
              if err := rows.Scan(&user.ID, &user.Name, &user.Email); err != nil {
                  return nil, err
              }
              users = append(users, &user)
          }
          return users, rows.Err()
      }

      func (r *UserRepository) FindByEmail(ctx context.Context, email string) (*User, error) {
          row := r.db.QueryRowContext(ctx, "SELECT id, name, email FROM users WHERE email = ?", email)
          var user User
          if err := row.Scan(&user.ID, &user.Name, &user.Email); err != nil {
              if errors.Is(err, sql.ErrNoRows) {
                  return nil, ErrUserNotFound
              }
              return nil, err
          }
          return &user, nil
      }

      func (r *UserRepository) Create(ctx context.Context, user *User) error {
          result, err := r.db.ExecContext(ctx,
              "INSERT INTO users (name, email) VALUES (?, ?)",
              user.Name, user.Email)
          if err != nil {
              return err
          }
          id, _ := result.LastInsertId()
          user.ID = id
          return nil
      }

      func (r *UserRepository) Update(ctx context.Context, user *User) error {
          _, err := r.db.ExecContext(ctx,
              "UPDATE users SET name = ?, email = ? WHERE id = ?",
              user.Name, user.Email, user.ID)
          return err
      }

      func (r *UserRepository) Delete(ctx context.Context, id int64) error {
          _, err := r.db.ExecContext(ctx, "DELETE FROM users WHERE id = ?", id)
          return err
      }
