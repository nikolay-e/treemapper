      package com.app.cache;

      public class CacheEntry {
          private String key;
          private Object value;
          private long createdAt;
          public CacheEntry(String key, Object value) {
              this.key = key;
              this.value = value;
              this.createdAt = System.currentTimeMillis();
          }
          public String getKey() { return key; }
          public Object getValue() { return value; }
          public long getCreatedAt() { return createdAt; }
      }
    src/main/java/com/app/cache/EvictionPolicy.java: |
      package com.app.cache;

      import java.util.List;

      public class EvictionPolicy {
          public CacheEntry selectForEviction(List<CacheEntry> entries) {
              return entries.stream()
                  .min((a, b) -> Long.compare(a.getCreatedAt(), b.getCreatedAt()))
                  .orElse(null);
          }
      }
    src/main/java/com/app/cache/CacheManager.java: |
      package com.app.cache;

      import java.util.ArrayList;
      import java.util.List;

      public class CacheManager {
          private final EvictionPolicy policy;
          private final List<CacheEntry> entries = new ArrayList<>();
          public CacheManager(EvictionPolicy policy) {
              this.policy = policy;
          }
          public void put(String key, Object value) {
              entries.add(new CacheEntry(key, value));
          }
          public void evict() {
              CacheEntry victim = policy.selectForEviction(entries);
              if (victim != null) entries.remove(victim);
          }
      }
    src/main/java/com/app/service/CacheService.java: |
      package com.app.service;

      import com.app.cache.CacheManager;

      public class CacheService {
          private final CacheManager manager;
          public CacheService(CacheManager manager) {
              this.manager = manager;
          }
          public void store(String key, Object value) {
              manager.put(key, value);
          }
          public void cleanup() {
              manager.evict();
          }
      }
