repo:
  initial_files:
    Counter.vue: |
      <script setup lang="ts">
      import { ref } from 'vue';

      const count = ref(0);

      function increment() {
          count.value++;
      }
      </script>

      <template>
          <button @click="increment">{{ count }}</button>
      </template>
    App.vue: |
      <template><div>initial</div></template>
    Timer.vue: |
      <script setup lang="ts">
      import { ref, onMounted, onUnmounted } from 'vue';

      const seconds = ref(0);
      let intervalId: number;

      onMounted(() => {
          intervalId = setInterval(() => { seconds.value++; }, 1000);
      });

      onUnmounted(() => {
          clearInterval(intervalId);
      });
      </script>

      <template>
          <span>{{ seconds }}s</span>
      </template>
    counter-store.ts: |
      import { ref } from 'vue';

      const globalCount = ref(0);

      export function useCounterStore() {
          function increment() { globalCount.value++; }
          function decrement() { globalCount.value--; }
          function reset() { globalCount.value = 0; }
          return { count: globalCount, increment, decrement, reset };
      }
    App.test.ts: |
      import { mount } from '@vue/test-utils';
      import App from './App.vue';
      import Counter from './Counter.vue';

      describe('App', () => {
          it('renders Counter component', () => {
              const wrapper = mount(App);
              expect(wrapper.findComponent(Counter).exists()).toBe(true);
          });

          it('displays heading', () => {
              const wrapper = mount(App);
              expect(wrapper.find('h1').text()).toBe('App');
          });
      });
  changed_files:
