repo:
  initial_files:
    handler.ts: |
      export const handlers = {
          onClick: () => console.log('clicked'),
          onHover: () => console.log('hovered'),
          onFocus: () => console.log('focused'),
      };
    main.ts: |
      console.log('initial');
    event-dispatcher.ts: |
      type EventCallback = (...args: unknown[]) => void;

      export class EventDispatcher {
          private listeners = new Map<string, Set<EventCallback>>();

          addEventListener(event: string, callback: EventCallback): void {
              if (!this.listeners.has(event)) this.listeners.set(event, new Set());
              this.listeners.get(event)!.add(callback);
          }

          removeEventListener(event: string, callback: EventCallback): void {
              this.listeners.get(event)?.delete(callback);
          }

          dispatch(event: string, ...args: unknown[]): void {
              this.listeners.get(event)?.forEach(cb => cb(...args));
          }
      }
    handler.test.ts: |
      import { handlers } from './handler';

      describe('handlers', () => {
          it('should have onClick handler', () => {
              const spy = jest.spyOn(console, 'log');
              handlers.onClick();
              expect(spy).toHaveBeenCalledWith('clicked');
              spy.mockRestore();
          });

          it('should have onHover handler', () => {
              const spy = jest.spyOn(console, 'log');
              handlers.onHover();
              expect(spy).toHaveBeenCalledWith('hovered');
              spy.mockRestore();
          });
      });
  changed_files:
    handler.ts: |
      export const handlers = {
          onClick: () => console.log('clicked'),
          onHover: () => console.log('hovered'),
