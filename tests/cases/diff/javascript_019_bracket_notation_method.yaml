      };
    main.ts: |
      import { handlers } from './handler';

      function callHandler(name: string) {
          const method = handlers[name as keyof typeof handlers];
          if (method) {
              method();
          }
      }

      callHandler('onClick');
    event-dispatcher.ts: |
