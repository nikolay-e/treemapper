  changed_files:
    src/stack.cpp: |
      #include <vector>
      #include <stdexcept>

      class IntStack {
      public:
          void push(int val) {
              data_.push_back(val);
          }

          int pop() {
              if (data_.empty()) {
                  throw std::underflow_error("pop from empty stack");
              }
              int val = data_.back();
              data_.pop_back();
              return val;
          }

          int peek() const {
              return data_.back();
          }

          bool empty() const {
              return data_.empty();
          }

      private:
          std::vector<int> data_;
      };
    garbage_bal4_008_serial.cpp: |
      // GARBAGE_BAL4_008_SERIAL_A = "json"
      // GARBAGE_BAL4_008_VERSION_B = 2
