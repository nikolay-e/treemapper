repo:
  initial_files:
    src/compute.ts: |
      export function expensiveComputation(items: number[]): number {
          return items.reduce((sum, n) => sum + n * n, 0);
      }

      export function averageValue(items: number[]): number {
          if (items.length === 0) return 0;
          const total = items.reduce((sum, n) => sum + n, 0);
          return total / items.length;
      }

      export function filterOutliers(items: number[], threshold: number): number[] {
          const avg = averageValue(items);
          return items.filter(n => Math.abs(n - avg) <= threshold);
      }
    src/Stats.tsx: |
      console.log('initial');
    src/components/chart.tsx: |
      interface ChartProps {
          data: number[];
          width: number;
          height: number;
          color?: string;
      }

      export function BarChart({ data, width, height, color = '#4a90d9' }: ChartProps) {
          const maxVal = Math.max(...data);
          const barWidth = width / data.length;
          return (
              <svg width={width} height={height}>
                  {data.map((val, i) => (
                      <rect
                          key={i}
                          x={i * barWidth}
                          y={height - (val / maxVal) * height}
                          width={barWidth - 2}
                          height={(val / maxVal) * height}
                          fill={color}
                      />
                  ))}
              </svg>
          );
      }
    src/utils/format.ts: |
      export function formatCurrency(value: number, currency = 'USD'): string {
          return new Intl.NumberFormat('en-US', { style: 'currency', currency }).format(value);
      }

      export function formatPercentage(value: number, decimals = 1): string {
          return `${(value * 100).toFixed(decimals)}%`;
      }

      export function formatCompact(value: number): string {
          return new Intl.NumberFormat('en-US', { notation: 'compact' }).format(value);
      }
