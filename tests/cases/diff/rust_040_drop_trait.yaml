  changed_files:
    src/StepCounter.jl: |
      module StepCounter

      export StepRecord, daily_steps, goal_reached, weekly_average

      struct StepRecord
          date::String
          steps::Int
      end

      function daily_steps(records::Vector{StepRecord}, date::String)::Int
          matches = filter(r -> r.date == date, records)
          return isempty(matches) ? 0 : sum(r.steps for r in matches)
      end

      function goal_reached(records::Vector{StepRecord}, date::String, goal::Int)::Bool
          return daily_steps(records, date) >= goal
      end

      function weekly_average(records::Vector{StepRecord})::Float64
          isempty(records) && return 0.0
          dates = unique(r.date for r in records)
          totals = [daily_steps(records, d) for d in dates]
          return sum(totals) / length(dates)
      end

      end
