          let expr = p.parse_expr();
          assert_eq!(evaluate(&expr).unwrap(), 14.0);
      }

      #[test]
      fn eval_division() {
          let mut p = Parser::new("10 / 4");
          let expr = p.parse_expr();
          assert_eq!(evaluate(&expr).unwrap(), 2.5);
      }

      #[test]
