    src/parser/lexer.rs: |
      #[derive(Debug, PartialEq, Clone)]
      pub enum Token {
          Number(f64),
          Plus,
          Minus,
          Star,
          Slash,
          LParen,
          RParen,
          Eof,
      }

      pub struct Lexer {
          input: Vec<char>,
          pos: usize,
      }

      impl Lexer {
          pub fn new(input: &str) -> Self {
              Lexer { input: input.chars().collect(), pos: 0 }
          }

          pub fn next_token(&mut self) -> Token {
              while self.pos < self.input.len() && self.input[self.pos].is_whitespace() {
                  self.pos += 1;
              }
              if self.pos >= self.input.len() {
                  return Token::Eof;
              }
              let ch = self.input[self.pos];
              self.pos += 1;
              match ch {
                  '+' => Token::Plus,
                  '-' => Token::Minus,
                  '*' => Token::Star,
                  '/' => Token::Slash,
                  '(' => Token::LParen,
                  ')' => Token::RParen,
                  c if c.is_ascii_digit() || c == '.' => {
                      let mut s = c.to_string();
                      while self.pos < self.input.len()
                          && (self.input[self.pos].is_ascii_digit() || self.input[self.pos] == '.')
                      {
                          s.push(self.input[self.pos]);
                          self.pos += 1;
                      }
                      Token::Number(s.parse().unwrap_or(0.0))
                  }
                  _ => Token::Eof,
              }
          }
      }
    src/parser/ast.rs: |
      use crate::parser::lexer::{Lexer, Token};

      #[derive(Debug)]
      pub enum Expr {
          Number(f64),
          BinOp { op: char, left: Box<Expr>, right: Box<Expr> },
      }

      pub struct Parser {
          lexer: Lexer,
          current: Token,
      }

      impl Parser {
          pub fn new(input: &str) -> Self {
              let mut lexer = Lexer::new(input);
              let current = lexer.next_token();
              Parser { lexer, current }
          }

          pub fn parse_expr(&mut self) -> Expr {
              self.parse_additive()
          }

          fn parse_additive(&mut self) -> Expr {
              let mut left = self.parse_multiplicative();
              loop {
                  let op = match &self.current {
                      Token::Plus => '+',
                      Token::Minus => '-',
                      _ => break,
                  };
                  self.advance();
                  let right = self.parse_multiplicative();
                  left = Expr::BinOp { op, left: Box::new(left), right: Box::new(right) };
              }
              left
          }

          fn parse_multiplicative(&mut self) -> Expr {
              let mut left = self.parse_primary();
              loop {
                  let op = match &self.current {
                      Token::Star => '*',
                      Token::Slash => '/',
                      _ => break,
                  };
                  self.advance();
                  let right = self.parse_primary();
                  left = Expr::BinOp { op, left: Box::new(left), right: Box::new(right) };
              }
              left
          }

          fn parse_primary(&mut self) -> Expr {
              match &self.current.clone() {
                  Token::Number(n) => { let v = *n; self.advance(); Expr::Number(v) }
                  _ => Expr::Number(0.0),
              }
          }

          fn advance(&mut self) {
              self.current = self.lexer.next_token();
          }
      }
    src/evaluator/eval.rs: |
      use crate::parser::ast::Expr;

      pub fn evaluate(expr: &Expr) -> f64 {
          match expr {
              Expr::Number(n) => *n,
              Expr::BinOp { op, left, right } => {
                  let l = evaluate(left);
                  let r = evaluate(right);
                  match op {
                      '+' => l + r,
                      '-' => l - r,
                      '*' => l * r,
                      '/' => l / r,
                      _ => 0.0,
                  }
              }
          }
      }
    tests/eval_integration.rs: |
      use crate::parser::ast::Parser;
      use crate::evaluator::eval::evaluate;

      #[test]
      fn eval_simple_addition() {
          let mut p = Parser::new("1 + 2");
          let expr = p.parse_expr();
          assert_eq!(evaluate(&expr), 3.0);
      }

      #[test]
      fn eval_precedence_mul_over_add() {
          let mut p = Parser::new("2 + 3 * 4");
          let expr = p.parse_expr();
          assert_eq!(evaluate(&expr), 14.0);
      }

      #[test]
      fn eval_division() {
          let mut p = Parser::new("10 / 4");
          let expr = p.parse_expr();
          assert_eq!(evaluate(&expr), 2.5);
      }
