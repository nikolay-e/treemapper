  changed_files:
    lib/http/client.rb: |
      module Http
        class Response
          attr_reader :status, :body, :headers, :elapsed_ms

          def initialize(status:, body:, headers: {}, elapsed_ms: 0)
            @status = status
            @body = body
            @headers = headers
            @elapsed_ms = elapsed_ms
          end

          def success?
            status >= 200 && status < 300
          end

          def json
            JSON.parse(body)
          end
        end

        class Client
          def initialize(base_url, timeout: 30, headers: {})
            @base_url = base_url
            @timeout = timeout
            @default_headers = headers
          end

          def get(path, headers: {})
            Response.new(status: 200, body: "GET #{@base_url}#{path}", headers: merged_headers(headers))
          end

          def post(path, body, headers: {})
            Response.new(status: 201, body: "POST #{@base_url}#{path}", headers: merged_headers(headers))
          end

          private

          def merged_headers(extra)
            @default_headers.merge(extra)
          end
        end
      end
  commit_message: "feat: add timeout, default headers, Response#json, and elapsed_ms"
