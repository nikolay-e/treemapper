repo:
  initial_files:
    lib/http/client.rb: |
      module Http
        class Response
          attr_reader :status, :body

          def initialize(status:, body:)
            @status = status
            @body = body
          end

          def success?
            status >= 200 && status < 300
          end
        end

        class Client
          def initialize(base_url)
            @base_url = base_url
          end

          def get(path)
            Response.new(status: 200, body: "GET #{@base_url}#{path}")
          end

          def post(path, body)
            Response.new(status: 201, body: "POST #{@base_url}#{path}")
          end
        end
      end
    lib/integrations/github_api.rb: |
      require_relative '../http/client'

      module Integrations
        class GithubApi
          def initialize(token)
            @client = Http::Client.new("https://api.github.com")
            @token = token
          end

          def repos(user)
            @client.get("/users/#{user}/repos")
          end
        end
      end
    lib/integrations/slack_api.rb: |
      require_relative '../http/client'

      module Integrations
        class SlackApi
          def initialize(webhook_url)
            @client = Http::Client.new(webhook_url)
          end

          def notify(channel, message)
            @client.post("/", { channel: channel, text: message })
          end
        end
      end
    lib/integrations/stripe_api.rb: |
      require_relative '../http/client'

      module Integrations
        class StripeApi
          def initialize(api_key)
            @client = Http::Client.new("https://api.stripe.com")
            @api_key = api_key
          end

          def create_charge(amount, currency)
            @client.post("/v1/charges", { amount: amount, currency: currency })
          end
        end
      end
