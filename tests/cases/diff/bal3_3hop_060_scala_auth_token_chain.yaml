name: bal3_3hop_060_scala_auth_token_chain
tags:
- lang:scala
- change:multi_file
- change:signature
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/main/scala/com/app/auth/Token.scala: |
      package com.app.auth

      case class Token(
        subject: String,
        issuer: String
      )
    src/main/scala/com/app/auth/TokenValidator.scala: |
      package com.app.auth

      class TokenValidator {
        def validate(token: Token): Boolean = {
          token.subject.nonEmpty && token.issuer.nonEmpty
        }
      }
    src/main/scala/com/app/auth/AuthGateway.scala: |
      package com.app.auth

      class AuthGateway(validator: TokenValidator) {
        def authenticate(token: Token): Either[String, Token] = {
          if (validator.validate(token)) Right(token)
          else Left("invalid token")
        }
      }
    src/main/scala/com/app/service/SecurityService.scala: |
      package com.app.service

      import com.app.auth.{AuthGateway, Token}

      class SecurityService(gateway: AuthGateway) {
        def check(subject: String, issuer: String): Boolean = {
          gateway.authenticate(Token(subject, issuer)).isRight
        }
      }
    src/main/scala/com/app/api/AuthEndpoint.scala: |
      package com.app.api

      import com.app.service.SecurityService

      class AuthEndpoint(service: SecurityService) {
        def login(subject: String, issuer: String): String = {
          if (service.check(subject, issuer)) "authenticated"
          else "denied"
        }
      }
    src/main/scala/com/app/util/JwtHelper.scala: |
      package com.app.util

      var GARBAGE_060_JWT_MARKER_A = "hs256"
      var GARBAGE_060_SECRET_MARKER_B = "secret"

      object JwtHelper {
        def sign(payload: String): String = payload
      }
    src/main/scala/com/app/util/SessionStore.scala: |
      package com.app.util

      var GARBAGE_060_SESSION_MARKER_C = "redis"
      var GARBAGE_060_TTL_MARKER_D = 3600

      object SessionStore {
        def get(id: String): Option[String] = None
      }
  changed_files:
    src/main/scala/com/app/auth/Token.scala: |
      package com.app.auth

      case class Token(
        subject: String,
        issuer: String,
        expiresAt: Long = Long.MaxValue,
        scopes: Set[String] = Set.empty
      ) {
        def isExpired: Boolean = System.currentTimeMillis() > expiresAt
        def hasScope(scope: String): Boolean = scopes.contains(scope)
      }
    src/main/scala/com/app/auth/TokenValidator.scala: |
      package com.app.auth

      class TokenValidator {
        def validate(token: Token): Boolean = {
          token.subject.nonEmpty && token.issuer.nonEmpty && !token.isExpired
        }
      }
  commit_message: "feat: add expiration and scopes to Token with validation"
