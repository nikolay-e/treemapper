repo:
  initial_files:
    src/Http/Middleware/RateLimiter.php: |
      <?php
      namespace App\Http\Middleware;

      class RateLimiter
      {
          private int $maxRequests;

          public function __construct(int $maxRequests = 60)
          {
              $this->maxRequests = $maxRequests;
          }

          public function handle(array $request): array
          {
              return ['allowed' => true, 'remaining' => $this->maxRequests - 1];
          }
      }
    src/Http/Kernel.php: |
      <?php
      namespace App\Http;

      use App\Http\Middleware\RateLimiter;

      class Kernel
      {
          private RateLimiter $rateLimiter;

          public function __construct(RateLimiter $rateLimiter)
          {
              $this->rateLimiter = $rateLimiter;
          }

          public function process(array $request): array
          {
              $check = $this->rateLimiter->handle($request);
              if (!$check['allowed']) {
                  return ['status' => 429];
              }
              return ['status' => 200];
          }
      }
    src/Http/Router.php: |
      <?php
      namespace App\Http;

      use App\Http\Middleware\RateLimiter;

      class Router
      {
          private RateLimiter $limiter;

          public function __construct(RateLimiter $limiter)
          {
              $this->limiter = $limiter;
          }

          public function dispatch(string $path): array
          {
              $check = $this->limiter->handle(['path' => $path]);
              return ['path' => $path, 'rate_limit' => $check];
          }
      }
    src/Http/ApiGateway.php: |
      <?php
      namespace App\Http;

      use App\Http\Middleware\RateLimiter;

      class ApiGateway
      {
          private RateLimiter $rateLimiter;

          public function __construct(RateLimiter $rateLimiter)
          {
              $this->rateLimiter = $rateLimiter;
          }

          public function forward(array $request): array
          {
              return $this->rateLimiter->handle($request);
          }
      }
    src/Http/WebhookHandler.php: |
      <?php
      namespace App\Http;

      use App\Http\Middleware\RateLimiter;

      class WebhookHandler
      {
          private RateLimiter $limiter;

          public function __construct(RateLimiter $limiter)
          {
              $this->limiter = $limiter;
          }

          public function receive(array $payload): array
          {
              $check = $this->limiter->handle($payload);
              return ['received' => true, 'limited' => !$check['allowed']];
          }
      }
