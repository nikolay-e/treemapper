    src/components/TextArea.tsx: |
      import React, { useState } from 'react';

      interface TextAreaProps {
          label: string;
          maxLength?: number;
          rows?: number;
          onChange?: (value: string) => void;
      }

      export function TextArea({ label, maxLength = 500, rows = 4, onChange }: TextAreaProps) {
          const [value, setValue] = useState('');
          const remaining = maxLength - value.length;

          const handleChange = (e: React.ChangeEvent<HTMLTextAreaElement>) => {
              const newValue = e.target.value.slice(0, maxLength);
              setValue(newValue);
              onChange?.(newValue);
          };

          return (
              <div>
                  <label>{label}</label>
                  <textarea rows={rows} value={value} onChange={handleChange} />
                  <span className="char-count">{remaining} characters remaining</span>
              </div>
          );
      }
    src/hooks/useFocus.ts: |
      import { useEffect, useRef } from 'react';

      export function useFocusTrap(containerRef: React.RefObject<HTMLElement>) {
          useEffect(() => {
              const container = containerRef.current;
              if (!container) return;

              const focusableElements = container.querySelectorAll(
                  'button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])'
              );
              const firstElement = focusableElements[0] as HTMLElement;
              const lastElement = focusableElements[focusableElements.length - 1] as HTMLElement;

              const handleKeyDown = (e: KeyboardEvent) => {
                  if (e.key !== 'Tab') return;
                  if (e.shiftKey && document.activeElement === firstElement) {
                      e.preventDefault();
                      lastElement?.focus();
                  } else if (!e.shiftKey && document.activeElement === lastElement) {
                      e.preventDefault();
                      firstElement?.focus();
                  }
              };

              container.addEventListener('keydown', handleKeyDown);
              return () => container.removeEventListener('keydown', handleKeyDown);
          }, [containerRef]);
      }
  changed_files:
    src/components/InputField.tsx: |
      import React, { forwardRef, InputHTMLAttributes } from 'react';

      export interface InputFieldProps extends InputHTMLAttributes<HTMLInputElement> {
          label: string;
          error?: string;
      }

      export const InputField = forwardRef<HTMLInputElement, InputFieldProps>(
          ({ label, error, ...props }, ref) => {
              return (
                  <div>
                      <label>{label}</label>
                      <input ref={ref} {...props} />
                      {error && <span className="error">{error}</span>}
                  </div>
              );
          }
      );

      InputField.displayName = 'InputField';
    src/components/Form.tsx: |
      import React, { useRef } from 'react';
      import { InputField } from './InputField';

      export function Form() {
          const nameRef = useRef<HTMLInputElement>(null);
          const emailRef = useRef<HTMLInputElement>(null);

          const handleSubmit = (e: React.FormEvent) => {
              e.preventDefault();
              nameRef.current?.focus();
          };

          return (
              <form onSubmit={handleSubmit}>
                  <InputField ref={nameRef} label="Name" name="name" />
                  <InputField ref={emailRef} label="Email" name="email" type="email" />
                  <button type="submit">Submit</button>
              </form>
          );
      }
