name: terraform_070_rds_instance
tags:
- lang:python
- lang:terraform
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    rds.tf: |
      resource "aws_db_instance" "main" {
        identifier        = "mydb"
        engine            = "postgres"
        instance_class    = "db.t3.micro"
        allocated_storage = 20
        storage_encrypted = true
        username          = "admin"
        password          = var.db_password
      }
    src/db.py: |
      import psycopg2

      def connect():
          return psycopg2.connect(host="mydb.example.com", database="mydb")
    parameters.tf: |
      resource "aws_db_parameter_group" "main" {
        name   = "mydb-params"
        family = "postgres15"

        parameter {
          name  = "log_connections"
          value = "1"
        }

        parameter {
          name  = "log_disconnections"
          value = "1"
        }
      }
    replicas/read_replica.tf: |
      resource "aws_db_instance" "read_replica" {
        identifier          = "mydb-replica"
        replicate_source_db = aws_db_instance.main.identifier
        instance_class      = "db.t3.micro"
      }
    monitoring/alarms.tf: |
      resource "aws_cloudwatch_metric_alarm" "db_cpu" {
        alarm_name          = "rds-high-cpu"
        comparison_operator = "GreaterThanThreshold"
        evaluation_periods  = 2
        metric_name         = "CPUUtilization"
        namespace           = "AWS/RDS"
        period              = 300
        statistic           = "Average"
        threshold           = 80
      }
  changed_files:
    rds.tf: |
      resource "aws_db_instance" "main" {
        identifier        = "mydb"
        engine            = "postgres"
        engine_version    = "15.4"
        instance_class    = "db.t3.medium"
        allocated_storage = 50
        storage_encrypted = true
        username          = "admin"
        password          = var.db_password
      }
  commit_message: Update files
fragments:
- id: rds
  selector:
    path: rds.tf
    anchor: engine_version    = "15.4"
- id: rds_1
  selector:
    path: rds.tf
    anchor: instance_class    = "db.t3.medium"
- id: rds_2
  selector:
    path: rds.tf
    anchor: allocated_storage = 50
- id: db
  selector:
    path: src/db.py
    anchor: psycopg2.connect
- id: no_read_replica
  selector:
    path: replicas/read_replica.tf
- id: no_alarms
  selector:
    path: monitoring/alarms.tf
- id: no_global_0
  selector:
    anchor: mydb-replica
- id: no_global_1
  selector:
    anchor: replicate_source_db
- id: no_global_2
  selector:
    anchor: rds-high-cpu
oracle:
  required:
  - rds
  - rds_1
  - rds_2
  - db
  allowed: []
  forbidden:
  - no_read_replica
  - no_alarms
  - no_global_0
  - no_global_1
  - no_global_2
