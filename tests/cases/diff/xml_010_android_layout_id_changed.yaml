    app/src/main/res/layout/activity_main.xml: |
      <?xml version="1.0" encoding="utf-8"?>
      <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
          android:layout_width="match_parent"
          android:layout_height="match_parent"
          android:orientation="vertical"
          android:padding="16dp">
        <EditText
            android:id="@+id/editTextSearch"
            android:layout_width="match_parent"
            android:layout_height="wrap_content"
            android:hint="Search..."/>
        <Button
            android:id="@+id/btnGo"
            android:layout_width="wrap_content"
            android:layout_height="wrap_content"
            android:text="Go"/>
        <RecyclerView
            android:id="@+id/recyclerResults"
            android:layout_width="match_parent"
            android:layout_height="0dp"
            android:layout_weight="1"/>
      </LinearLayout>
    app/src/main/java/com/example/search/MainActivity.java: |
      package com.example.search;
      import android.os.Bundle;
      import android.widget.Button;
      import android.widget.EditText;
      import androidx.appcompat.app.AppCompatActivity;
      import androidx.recyclerview.widget.RecyclerView;
      public class MainActivity extends AppCompatActivity {
          private EditText editTextSearch;
          private Button btnGo;
          private RecyclerView recyclerResults;
          @Override
          protected void onCreate(Bundle savedInstanceState) {
              super.onCreate(savedInstanceState);
              setContentView(R.layout.activity_main);
              editTextSearch = findViewById(R.id.editTextSearch);
              btnGo = findViewById(R.id.btnGo);
              recyclerResults = findViewById(R.id.recyclerResults);
              btnGo.setOnClickListener(v -> performSearch(editTextSearch.getText().toString()));
          }
          private void performSearch(String query) {}
      }
    app/src/main/java/com/example/search/SearchViewModel.java: |
      package com.example.search;
      import androidx.lifecycle.LiveData;
      import androidx.lifecycle.MutableLiveData;
      import androidx.lifecycle.ViewModel;
      import java.util.List;
      public class SearchViewModel extends ViewModel {
          private final MutableLiveData<List<String>> results = new MutableLiveData<>();
          public LiveData<List<String>> getResults() { return results; }
          public void search(String query) {
              results.setValue(List.of("Result for: " + query));
          }
      }
