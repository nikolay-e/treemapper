  changed_files:
    src/pricing/currency.rs: |
      use std::ops::{Add, Sub};

      #[derive(Debug, Clone, Copy, PartialEq)]
      pub struct Money {
          pub cents: i64,
          pub currency: &'static str,
      }

      impl Money {
          pub fn new(cents: i64, currency: &'static str) -> Self {
              Self { cents, currency }
          }
      }

      impl Add for Money {
          type Output = Money;
          fn add(self, other: Money) -> Money {
              assert_eq!(self.currency, other.currency, "currency mismatch");
              Money::new(self.cents + other.cents, self.currency)
          }
      }

      impl Sub for Money {
          type Output = Money;
          fn sub(self, other: Money) -> Money {
              assert_eq!(self.currency, other.currency, "currency mismatch");
              Money::new(self.cents - other.cents, self.currency)
          }
      }
    src/cart/order.rs: |
      use crate::pricing::currency::Money;

      pub struct OrderLine {
          pub product_id: u64,
          pub quantity: u32,
          pub unit_price: Money,
      }

      impl OrderLine {
          pub fn total(&self) -> Money {
              let total_cents = self.unit_price.cents * self.quantity as i64;
              Money::new(total_cents, self.unit_price.currency)
          }
      }

      pub struct Order {
          pub lines: Vec<OrderLine>,
      }

      impl Order {
          pub fn grand_total(&self) -> Money {
              self.lines.iter().fold(
                  Money::new(0, "USD"),
                  |acc, line| acc + line.total(),
              )
          }
      }
    src/api/checkout.rs: |
      use crate::cart::order::Order;
      use crate::pricing::currency::Money;

      pub fn checkout_total(order: &Order) -> String {
          let total = order.grand_total();
          format!("{} {:.2}", total.currency, total.cents as f64 / 100.0)
      }
    garbage/analytics.rs: |
      // GARBAGE_OVL_A = "pageview_tracker"
    garbage/shipping.rs: |
      // GARBAGE_OVL_B = "flat_rate_shipper"
    garbage/notifications.rs: |
      // GARBAGE_OVL_C = "email_notifier"
