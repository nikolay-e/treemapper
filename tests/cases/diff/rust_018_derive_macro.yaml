  changed_files:
    src/cloud/ResourceQuota.kt: |
      data class ResourceRequest(val cpu: Int, val memoryMb: Int, val gpuCount: Int)
      data class QuotaLimit(val maxCpu: Int, val maxMemoryMb: Int, val maxGpu: Int)

      class ResourceQuota(private val limit: QuotaLimit) {
          private var usedCpu = 0
          private var usedMemory = 0
          private var usedGpu = 0

          fun canAllocate(req: ResourceRequest): Boolean {
              return req.cpu <= (limit.maxCpu - usedCpu) &&
                     req.memoryMb <= (limit.maxMemoryMb - usedMemory) &&
                     req.gpuCount <= (limit.maxGpu - usedGpu)
          }

          fun allocate(req: ResourceRequest) {
              usedCpu += req.cpu
              usedMemory += req.memoryMb
              usedGpu += req.gpuCount
          }

          fun release(req: ResourceRequest) {
              usedCpu -= req.cpu
              usedMemory -= req.memoryMb
              usedGpu -= req.gpuCount
          }
      }
