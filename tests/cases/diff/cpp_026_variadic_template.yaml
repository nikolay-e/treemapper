name: cpp_026_variadic_template
tags:
- lang:erlang
- change:new_function
- change:single_file
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    src/hl7_parser.erl: |
      -module(hl7_parser).
      -export([parse_segment/1, segment_type/1]).

      parse_segment(Line) ->
          Fields = binary:split(Line, <<"|">>, [global]),
          Fields.

      segment_type(<<Type:3/binary, _/binary>>) -> Type;
      segment_type(_) -> <<"UNK">>.
    src/patient_record.erl: |
      -module(patient_record).
      -export([extract_pid/1]).

      extract_pid(Message) ->
          Segments = binary:split(Message, <<"\r">>, [global]),
          Pids = [S || S <- Segments, hl7_parser:segment_type(S) =:= <<"PID">>],
          case Pids of
              [Pid | _] -> {ok, hl7_parser:parse_segment(Pid)};
              [] -> {error, no_pid_segment}
          end.
    src/encounter.erl: |
      -module(encounter).
      -export([record_visit/2]).

      record_visit(PatientId, Timestamp) ->
          io:format("Visit: patient=~p time=~p~n", [PatientId, Timestamp]).
    garbage/imaging.erl: |
      % GARBAGE_CPP26_IMG_A = "imaging_marker"
    garbage/lab_results.erl: |
      % GARBAGE_CPP26_LAB_B = "lab_results_marker"
    garbage/prescriptions.erl: |
      % GARBAGE_CPP26_PRESC_C = "prescriptions_marker"
    garbage/insurance.erl: |
      % GARBAGE_CPP26_INS_D = "insurance_marker"
  changed_files:
    src/hl7_parser.erl: |
      -module(hl7_parser).
      -export([parse_segment/1, segment_type/1, extract_field/2]).

      parse_segment(Line) ->
          Fields = binary:split(Line, <<"|">>, [global]),
          Fields.

      segment_type(<<Type:3/binary, _/binary>>) -> Type;
      segment_type(_) -> <<"UNK">>.

      extract_field(Fields, Index) when Index < length(Fields) ->
          lists:nth(Index + 1, Fields);
      extract_field(_, _) -> <<>>.
    src/patient_record.erl: |
      -module(patient_record).
      -export([extract_pid/1, extract_patient_name/1]).

      extract_pid(Message) ->
          Segments = binary:split(Message, <<"\r">>, [global]),
          Pids = [S || S <- Segments, hl7_parser:segment_type(S) =:= <<"PID">>],
          case Pids of
              [Pid | _] -> {ok, hl7_parser:parse_segment(Pid)};
              [] -> {error, no_pid_segment}
          end.

      extract_patient_name(Message) ->
          case extract_pid(Message) of
              {ok, Fields} -> {ok, hl7_parser:extract_field(Fields, 5)};
              Err -> Err
          end.
    src/encounter.erl: |
      -module(encounter).
      -export([record_visit/2]).

      record_visit(PatientId, Timestamp) ->
          io:format("Visit: patient=~p time=~p~n", [PatientId, Timestamp]).
    garbage/imaging.erl: |
      % GARBAGE_CPP26_IMG_A = "imaging_marker"
    garbage/lab_results.erl: |
      % GARBAGE_CPP26_LAB_B = "lab_results_marker"
    garbage/prescriptions.erl: |
      % GARBAGE_CPP26_PRESC_C = "prescriptions_marker"
    garbage/insurance.erl: |
      % GARBAGE_CPP26_INS_D = "insurance_marker"
  commit_message: "feat: add extract_field/2 to hl7_parser and use it in patient_record"
