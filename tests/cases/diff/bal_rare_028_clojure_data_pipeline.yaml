  changed_files:
    src/pipeline/transform.clj: |
      (ns pipeline.transform)

      (defn normalize-key [k]
        (-> k name clojure.string/lower-case (clojure.string/replace #"_" "-") keyword))

      (defn normalize-keys [m]
        (into {} (map (fn [[k v]] [(normalize-key k) v]) m)))

      (defn filter-blanks [m]
        (into {} (filter (fn [[_ v]] (and (some? v) (not= v ""))) m)))

      (defn coerce-types [m schema]
        (reduce-kv
          (fn [acc k coercer]
            (if-let [v (get acc k)]
              (assoc acc k (coercer v))
              acc))
          m
          schema))

      (defn validate-required [m required-keys]
        (let [missing (remove #(contains? m %) required-keys)]
          (when (seq missing)
            (throw (ex-info "Missing required keys" {:keys missing})))
          m))

      (defn transform [record]
        (-> record
            normalize-keys
            filter-blanks))
    src/pipeline/loader.clj: |
      (ns pipeline.loader
        (:require [pipeline.transform :as t]))

      (defn load-records [records]
        (map t/transform records))

      (defn load-and-count [records]
        (let [transformed (load-records records)]
          {:count (count transformed)
           :records transformed}))
    garbage_notify.clj: |
      (ns garbage-notify)

      (def ^:const GARBAGE_RARE_028_CHANNEL_A "email")
      (def ^:const GARBAGE_RARE_028_RETRY_B 3)

      (defn garbage-send []
        GARBAGE_RARE_028_CHANNEL_A)

