  changed_files:
    src/Strings/SlugGenerator.cs: |
      namespace Strings;

      public static class SlugGenerator
      {
          public static string Generate(string title)
          {
              var slug = title.ToLowerInvariant().Trim();
              slug = slug.Replace(" ", "-");
              while (slug.Contains("--"))
                  slug = slug.Replace("--", "-");
              slug = new string(slug.Where(c => char.IsLetterOrDigit(c) || c == '-').ToArray());
              slug = slug.Trim('-');
              return slug;
          }

          public static bool IsValidSlug(string slug)
          {
              return !string.IsNullOrEmpty(slug) && slug.All(c => char.IsLetterOrDigit(c) || c == '-');
          }
      }
    tests/Strings/SlugGeneratorTests.cs: |
      using Xunit;
      using Strings;

      public class SlugGeneratorTests
      {
          [Fact]
          public void Generate_TitleWithSpaces_ReturnsHyphenated()
          {
              var slug = SlugGenerator.Generate("Hello World");
              Assert.Equal("hello-world", slug);
          }

          [Fact]
          public void Generate_TitleWithSpecialChars_StripsNonAlphanumeric()
          {
              var slug = SlugGenerator.Generate("C# is great!");
              Assert.Equal("c-is-great", slug);
          }

          [Fact]
          public void Generate_MultipleSpaces_NoDuplicateHyphens()
          {
              var slug = SlugGenerator.Generate("Hello   World");
              Assert.Equal("hello-world", slug);
          }

          [Fact]
          public void Generate_LeadingTrailingSpaces_StrippedFromSlug()
          {
              var slug = SlugGenerator.Generate("  Hello World  ");
              Assert.Equal("hello-world", slug);
          }
      }
