      package com.app.config;

      public class ConfigEntry {
          private String key;
          private String value;
          public ConfigEntry(String key, String value) {
              this.key = key;
              this.value = value;
          }
          public String getKey() { return key; }
          public String getValue() { return value; }
      }
    src/main/java/com/app/config/ConfigSource.java: |
      package com.app.config;

      import java.util.Map;
      import java.util.HashMap;

      public class ConfigSource {
          private final Map<String, ConfigEntry> entries = new HashMap<>();
          public void put(String key, String value) {
              entries.put(key, new ConfigEntry(key, value));
          }
          public ConfigEntry get(String key) {
              return entries.get(key);
          }
      }
    src/main/java/com/app/config/ConfigResolver.java: |
      package com.app.config;

      import java.util.List;

      public class ConfigResolver {
          private final List<ConfigSource> sources;
          public ConfigResolver(List<ConfigSource> sources) {
              this.sources = sources;
          }
          public String resolve(String key) {
              for (ConfigSource source : sources) {
                  ConfigEntry entry = source.get(key);
                  if (entry != null) return entry.getValue();
              }
              return null;
          }
      }
    src/main/java/com/app/service/AppConfigService.java: |
      package com.app.service;

      import com.app.config.ConfigResolver;

      public class AppConfigService {
          private final ConfigResolver resolver;
          public AppConfigService(ConfigResolver resolver) {
              this.resolver = resolver;
          }
          public String getSetting(String key) {
              return resolver.resolve(key);
          }
      }
    src/main/java/com/app/web/SettingsController.java: |
      package com.app.web;

      import com.app.service.AppConfigService;

      public class SettingsController {
          private final AppConfigService configService;
          public SettingsController(AppConfigService configService) {
              this.configService = configService;
          }
          public String get(String key) {
              String val = configService.getSetting(key);
              return val != null ? val : "not_found";
          }
      }
