  selector:
    path: config/logging.json
    anchor: '"level": "warn"'
- id: config_format
  selector:
    path: config/logging.json
    anchor: '"format": "json"'
- id: config_rotation
  selector:
    path: config/logging.json
    anchor: "maxSize"
- id: logger_reads_config
  selector:
    path: src/logger.ts
    anchor: "logConfig.level"
- id: request_logger_reads
  selector:
    path: src/request-logger.ts
