      pub struct BlobStore { pub bucket: String }
  changed_files:
    src/auth/validator.rs: |
      pub struct TokenValidator {
          secret: String,
      }

      impl TokenValidator {
          pub fn new(secret: &str) -> Self {
              TokenValidator { secret: secret.to_string() }
          }

          pub fn validate(&self, token: &str) -> bool {
              if token.is_empty() {
                  return false;
              }
              token.contains(&self.secret)
          }
      }
    src/middleware/auth_guard.rs: |
      use crate::auth::validator::TokenValidator;

      pub struct AuthGuard {
          validator: TokenValidator,
      }

      impl AuthGuard {
          pub fn new(secret: &str) -> Self {
              AuthGuard { validator: TokenValidator::new(secret) }
          }

          pub fn check_request(&self, token: &str) -> bool {
              self.validator.validate(token)
          }
      }
    garbage/mailer.rs: |
      // GARBAGE_GCON_A = "mailer_marker"
      pub fn send_email(_to: &str, _body: &str) {}
    garbage/scheduler.rs: |
      // GARBAGE_GCON_B = "scheduler_marker"
      pub fn schedule_job(_cron: &str) {}
    garbage/storage.rs: |
