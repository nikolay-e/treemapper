    core/src/main/kotlin/com/platform/pagination/Page.kt: |
      package com.platform.pagination

      data class Page<T>(
          val items: List<T>,
          val totalCount: Long,
          val request: PageRequest,
      ) {
          val totalPages: Int get() = ((totalCount + request.size - 1) / request.size).toInt()
          val hasNext: Boolean get() = request.page < totalPages - 1
          val hasPrev: Boolean get() = request.page > 0
      }
