repo:
  initial_files:
    src/AppMonad.hs: |
      module AppMonad where

      import Control.Monad.Reader

      data AppEnv = AppEnv
        { appName    :: String
        , appVersion :: String
        , appDebug   :: Bool
        }

      type AppM a = ReaderT AppEnv IO a

      runApp :: AppEnv -> AppM a -> IO a
      runApp env action = runReaderT action env

      getAppName :: AppM String
      getAppName = asks appName

      isDebug :: AppM Bool
      isDebug = asks appDebug
    src/Service.hs: |
      module Service where

      import AppMonad (AppM, getAppName, isDebug)

      greet :: String -> AppM String
      greet user = do
          name <- getAppName
          debug <- isDebug
          let prefix = if debug then "[DEBUG] " else ""
          return $ prefix ++ "Welcome to " ++ name ++ ", " ++ user

      healthCheck :: AppM String
      healthCheck = do
          name <- getAppName
          return $ name ++ " is running"
    src/Networking.hs: |
      module Networking where

      gARBAGE_RARE_008_NET_A = "http"
      gARBAGE_RARE_008_PORT_B = 443

      fetchUrl :: String -> IO String
      fetchUrl url = return $ "response from " ++ url
    src/Parsing.hs: |
      module Parsing where

      gARBAGE_RARE_008_PARSE_C = "json"
      gARBAGE_RARE_008_STRICT_D = True

      parseInput :: String -> Maybe String
      parseInput "" = Nothing
      parseInput s = Just s
    src/Crypto.hs: |
      module Crypto where

      gARBAGE_RARE_008_HASH_E = "sha256"
      gARBAGE_RARE_008_ROUNDS_F = 10000

      hashValue :: String -> String
      hashValue = reverse
  changed_files:
    src/AppMonad.hs: |
      module AppMonad where

      import Control.Monad.Reader
      import Control.Monad.Except

      data AppEnv = AppEnv
        { appName    :: String
        , appVersion :: String
        , appDebug   :: Bool
        , appMaxRetries :: Int
        }

      data AppError = NotFound String | Unauthorized | InternalError String
        deriving (Show)

      type AppM a = ExceptT AppError (ReaderT AppEnv IO) a

      runApp :: AppEnv -> AppM a -> IO (Either AppError a)
      runApp env action = runReaderT (runExceptT action) env

      getAppName :: AppM String
      getAppName = lift $ asks appName

      isDebug :: AppM Bool
      isDebug = lift $ asks appDebug

      throwAppError :: AppError -> AppM a
      throwAppError = throwError
  commit_message: "add ExceptT error handling to AppM monad stack"
