repo:
  initial_files:
    src/main/kotlin/state/OrderState.kt: |
      package state

      enum class OrderStatus {
          CREATED, CONFIRMED, SHIPPED, DELIVERED, CANCELLED
      }

      data class OrderState(
          val orderId: Long,
          val status: OrderStatus,
          val updatedAt: Long = System.currentTimeMillis()
      )
    src/main/kotlin/machine/OrderStateMachine.kt: |
      package machine

      import state.OrderState
      import state.OrderStatus

      class OrderStateMachine {
          private val transitions = mapOf(
              OrderStatus.CREATED to setOf(OrderStatus.CONFIRMED, OrderStatus.CANCELLED),
              OrderStatus.CONFIRMED to setOf(OrderStatus.SHIPPED, OrderStatus.CANCELLED),
              OrderStatus.SHIPPED to setOf(OrderStatus.DELIVERED)
          )

          fun canTransition(from: OrderStatus, to: OrderStatus): Boolean {
              return transitions[from]?.contains(to) == true
          }

          fun transition(state: OrderState, newStatus: OrderStatus): OrderState {
              require(canTransition(state.status, newStatus)) {
                  "Invalid transition from ${state.status} to $newStatus"
              }
              return state.copy(status = newStatus, updatedAt = System.currentTimeMillis())
          }
      }
    src/main/kotlin/notification/OrderNotifier.kt: |
      package notification

      object OrderNotifier {
          fun notifyStatusChange(orderId: Long, status: String) {
              println("Order $orderId changed to $status")
          }
      }
    src/main/kotlin/persistence/OrderStore.kt: |
      package persistence

      import state.OrderState

      class OrderStore {
          private val orders = mutableMapOf<Long, OrderState>()

          fun save(state: OrderState) {
              orders[state.orderId] = state
          }

          fun load(orderId: Long): OrderState? = orders[orderId]
      }
