              OrderStatus.CONFIRMED to setOf(OrderStatus.SHIPPED, OrderStatus.CANCELLED),
              OrderStatus.SHIPPED to setOf(OrderStatus.DELIVERED)
          )

          fun canTransition(from: OrderStatus, to: OrderStatus): Boolean {
              return transitions[from]?.contains(to) == true
          }

          fun transition(state: OrderState, newStatus: OrderStatus): OrderState {
              require(canTransition(state.status, newStatus)) {
                  "Invalid transition from ${state.status} to $newStatus"
              }
              return state.copy(status = newStatus, updatedAt = System.currentTimeMillis())
          }
      }
