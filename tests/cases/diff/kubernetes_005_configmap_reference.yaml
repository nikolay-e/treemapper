name: kubernetes_005_configmap_reference
xfail:
  category: k8s-config-over-discovery
repo:
  initial_files:
    k8s/base/app-config.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: app-config
        namespace: production
      data:
        LOG_LEVEL: info
        MAX_CONNECTIONS: "100"
        CACHE_TTL: "3600"
    k8s/base/api-deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-server
        namespace: production
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: api-server
        template:
          metadata:
            labels:
              app: api-server
          spec:
            containers:
            - name: api
              image: api-server:v1.2.0
              env:
              - name: LOG_LEVEL
                valueFrom:
                  configMapKeyRef:
                    name: app-config
                    key: LOG_LEVEL
              - name: MAX_CONNECTIONS
                valueFrom:
                  configMapKeyRef:
                    name: app-config
                    key: MAX_CONNECTIONS
              - name: CACHE_TTL
                valueFrom:
                  configMapKeyRef:
                    name: app-config
                    key: CACHE_TTL
    k8s/base/worker-deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: background-worker
        namespace: production
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: background-worker
        template:
          metadata:
            labels:
              app: background-worker
          spec:
            containers:
            - name: worker
              image: background-worker:v1.2.0
              env:
              - name: LOG_LEVEL
                valueFrom:
                  configMapKeyRef:
                    name: app-config
                    key: LOG_LEVEL
              - name: CACHE_TTL
                valueFrom:
                  configMapKeyRef:
                    name: app-config
                    key: CACHE_TTL
    k8s/base/scheduler-cronjob.yaml: |
      apiVersion: batch/v1
      kind: CronJob
      metadata:
        name: nightly-scheduler
        namespace: production
      spec:
        schedule: "0 2 * * *"
        jobTemplate:
          spec:
            template:
              spec:
                containers:
                - name: scheduler
                  image: scheduler:v1.0.0
                  env:
                  - name: MAX_CONNECTIONS
                    valueFrom:
                      configMapKeyRef:
                        name: app-config
                        key: MAX_CONNECTIONS
                restartPolicy: OnFailure
    k8s/base/database-config.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: database-config
        namespace: production
      data:
        DB_HOST: postgres.production.svc
        DB_PORT: "5432"
        DB_NAME: appdb
    k8s/base/database-deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: postgres
        namespace: production
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: postgres
        template:
          metadata:
            labels:
              app: postgres
          spec:
            containers:
            - name: postgres
              image: postgres:15
              env:
              - name: DB_HOST
                valueFrom:
                  configMapKeyRef:
                    name: database-config
                    key: DB_HOST
              - name: DB_PORT
                valueFrom:
                  configMapKeyRef:
                    name: database-config
                    key: DB_PORT
    k8s/base/api-service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: api-server
        namespace: production
      spec:
        selector:
          app: api-server
        ports:
        - port: 80
          targetPort: 8080
  changed_files:
    k8s/base/app-config.yaml: |
      apiVersion: v1
      kind: ConfigMap
