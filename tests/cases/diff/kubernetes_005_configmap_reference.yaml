fragments:
  - id: app_config_changed
    selector: { path: k8s/base/app-config.yaml }
  - id: api_deployment_updated
    selector: { path: k8s/base/api-deployment.yaml }
  - id: worker_must_update
    selector: { path: k8s/base/worker-deployment.yaml }
  - id: scheduler_must_update
    selector: { path: k8s/base/scheduler-cronjob.yaml }
  - id: database_config_unrelated
    selector: { path: k8s/base/database-config.yaml }
  - id: database_deployment_unrelated
    selector: { path: k8s/base/database-deployment.yaml }
  - id: api_service_unrelated
    selector: { path: k8s/base/api-service.yaml }
oracle:
  required:
    - app_config_changed
    - worker_must_update
    - scheduler_must_update
  allowed:
    - api_deployment_updated
  forbidden:
    - database_config_unrelated
    - database_deployment_unrelated
    - api_service_unrelated
