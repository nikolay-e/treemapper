  changed_files:
    src/Middleware/RateLimiter.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Middleware
      {
          public class RateLimiter
          {
              private readonly int _maxRequests;
              private readonly TimeSpan _window;
              private readonly Dictionary<string, List<DateTime>> _requests = new();

              public RateLimiter(int maxRequests, TimeSpan window)
              {
                  _maxRequests = maxRequests;
                  _window = window;
              }

              public bool IsAllowed(string clientId)
              {
                  var now = DateTime.UtcNow;
                  if (!_requests.ContainsKey(clientId))
                      _requests[clientId] = new List<DateTime>();

                  _requests[clientId].RemoveAll(t => t < now - _window);
                  if (_requests[clientId].Count >= _maxRequests)
                      return false;

                  _requests[clientId].Add(now);
                  return true;
              }

              public int RemainingRequests(string clientId)
              {
                  var now = DateTime.UtcNow;
                  if (!_requests.ContainsKey(clientId))
                      return _maxRequests;

                  _requests[clientId].RemoveAll(t => t < now - _window);
                  return Math.Max(0, _maxRequests - _requests[clientId].Count);
              }

              public void Reset(string clientId)
              {
                  _requests.Remove(clientId);
              }
          }
      }
  commit_message: "feat: add remaining requests count and reset"
