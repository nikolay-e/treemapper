    Tests/RateLimiterTests.cs: |
      using Xunit;
      using App.Middleware;
      using System;

      namespace App.Tests
      {
          public class RateLimiterTests
          {
              [Fact]
              public void IsAllowed_UnderLimit_ReturnsTrue()
              {
                  var limiter = new RateLimiter(5, TimeSpan.FromMinutes(1));
                  Assert.True(limiter.IsAllowed("client1"));
              }

              [Fact]
              public void IsAllowed_OverLimit_ReturnsFalse()
              {
                  var limiter = new RateLimiter(2, TimeSpan.FromMinutes(1));
                  limiter.IsAllowed("client1");
                  limiter.IsAllowed("client1");
                  Assert.False(limiter.IsAllowed("client1"));
              }
          }
      }
