      class AuthenticationError(Exception):
          pass

      class TokenExpiredError(AuthenticationError):
          def __init__(self, token_id: str):
              self.token_id = token_id
              super().__init__(f"Token {token_id} has expired")

      class InvalidCredentialsError(AuthenticationError):
          pass
    src/auth_service.py: |
      import time
      from src.auth_errors import TokenExpiredError, InvalidCredentialsError

      class AuthService:
          def __init__(self):
              self.tokens = {}
              self.users = {"admin": "secret123"}

          def login(self, username: str, password: str) -> str:
              if username not in self.users or self.users[username] != password:
                  raise InvalidCredentialsError("Invalid username or password")
              token_id = f"token_{username}_{time.time()}"
              self.tokens[token_id] = {"user": username, "expires": time.time() + 3600}
              return token_id

          def verify_token(self, token_id: str) -> dict:
              if token_id not in self.tokens:
                  raise TokenExpiredError(token_id)
              return self.tokens[token_id]
    tests/test_auth.py: |
      from src.auth_service import AuthService

      def test_login_success():
          service = AuthService()
          token = service.login("admin", "secret123")
          assert token.startswith("token_")
    src/session_manager.py: |
      import time

      class SessionManager:
          def __init__(self, ttl: int = 1800):
              self.sessions = {}
              self.ttl = ttl

          def create_session(self, user_id: str) -> str:
              session_id = f"session_{user_id}_{time.time()}"
              self.sessions[session_id] = {
                  "user_id": user_id,
                  "expires": time.time() + self.ttl,
              }
              return session_id

          def validate_session(self, session_id: str) -> bool:
              if session_id not in self.sessions:
                  return False
              session = self.sessions[session_id]
              if time.time() > session["expires"]:
                  del self.sessions[session_id]
                  return False
              return True
    tests/test_session_manager.py: |
      from unittest.mock import patch
      from src.session_manager import SessionManager

      def test_create_session():
          mgr = SessionManager(ttl=60)
          sid = mgr.create_session("user1")
          assert sid.startswith("session_")

      @patch('src.session_manager.time.time')
      def test_expired_session(mock_time):
          mock_time.return_value = 1000.0
          mgr = SessionManager(ttl=60)
          sid = mgr.create_session("user1")
          mock_time.return_value = 2000.0
          assert mgr.validate_session(sid) is False
