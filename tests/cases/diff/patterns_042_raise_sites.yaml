name: patterns_042_raise_sites
tags:
- lang:erlang
- change:new_function
- change:single_file
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    src/health_metrics.erl: |
      -module(health_metrics).
      -export([bmi/2, heart_rate_zone/1]).

      bmi(WeightKg, HeightM) ->
          WeightKg / (HeightM * HeightM).

      heart_rate_zone(Bpm) when Bpm < 60 -> rest;
      heart_rate_zone(Bpm) when Bpm < 100 -> aerobic;
      heart_rate_zone(Bpm) when Bpm < 150 -> anaerobic;
      heart_rate_zone(_) -> peak.
    src/patient_report.erl: |
      -module(patient_report).
      -export([generate/2]).

      generate(WeightKg, HeightM) ->
          Bmi = health_metrics:bmi(WeightKg, HeightM),
          io:format("BMI: ~.2f~n", [Bmi]).
    src/appointment.erl: |
      -module(appointment).
      -export([schedule/2]).

      schedule(PatientId, Date) ->
          io:format("Scheduled patient ~p on ~p~n", [PatientId, Date]).
    garbage/billing.erl: |
      % GARBAGE_PATT42_BILL_A = "billing_marker"
    garbage/insurance.erl: |
      % GARBAGE_PATT42_INSUR_B = "insurance_marker"
    garbage/pharmacy.erl: |
      % GARBAGE_PATT42_PHARM_C = "pharmacy_marker"
    garbage/radiology.erl: |
      % GARBAGE_PATT42_RADIO_D = "radiology_marker"
  changed_files:
    src/health_metrics.erl: |
      -module(health_metrics).
      -export([bmi/2, heart_rate_zone/1, vo2_max/2]).

      bmi(WeightKg, HeightM) ->
          WeightKg / (HeightM * HeightM).

      heart_rate_zone(Bpm) when Bpm < 60 -> rest;
      heart_rate_zone(Bpm) when Bpm < 100 -> aerobic;
      heart_rate_zone(Bpm) when Bpm < 150 -> anaerobic;
      heart_rate_zone(_) -> peak.

      vo2_max(MaxHr, RestingHr) ->
          15.3 * (MaxHr / RestingHr).
    src/patient_report.erl: |
      -module(patient_report).
      -export([generate/2, generate_full/3]).

      generate(WeightKg, HeightM) ->
          Bmi = health_metrics:bmi(WeightKg, HeightM),
          io:format("BMI: ~.2f~n", [Bmi]).

      generate_full(WeightKg, HeightM, {MaxHr, RestingHr}) ->
          Bmi = health_metrics:bmi(WeightKg, HeightM),
          Vo2 = health_metrics:vo2_max(MaxHr, RestingHr),
          io:format("BMI: ~.2f  VO2max: ~.1f~n", [Bmi, Vo2]).
    src/appointment.erl: |
      -module(appointment).
      -export([schedule/2]).

      schedule(PatientId, Date) ->
          io:format("Scheduled patient ~p on ~p~n", [PatientId, Date]).
    garbage/billing.erl: |
      % GARBAGE_PATT42_BILL_A = "billing_marker"
    garbage/insurance.erl: |
      % GARBAGE_PATT42_INSUR_B = "insurance_marker"
    garbage/pharmacy.erl: |
      % GARBAGE_PATT42_PHARM_C = "pharmacy_marker"
    garbage/radiology.erl: |
      % GARBAGE_PATT42_RADIO_D = "radiology_marker"
  commit_message: "feat: add vo2_max/2 to health_metrics and use it in patient_report"
fragments:
- id: vo2_max_func
  selector:
    path: src/health_metrics.erl
    anchor: "vo2_max(MaxHr, RestingHr) ->"
