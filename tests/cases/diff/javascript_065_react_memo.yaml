repo:
  initial_files:
    src/ExpensiveList.tsx: |
      import { memo } from 'react';

      interface Item {
          id: string;
          name: string;
      }

      interface ExpensiveListProps {
          items: Item[];
      }

      function ExpensiveListComponent({ items }: ExpensiveListProps) {
          return (
              <ul>
                  {items.map(item => (
                      <li key={item.id}>{item.name}</li>
                  ))}
              </ul>
          );
      }

      export const ExpensiveList = memo(ExpensiveListComponent);
    src/Dashboard.tsx: |
      export function Dashboard() {
          return <div>Placeholder</div>;
      }
    src/Sidebar.tsx: |
      interface SidebarProps {
          collapsed: boolean;
          onToggle: () => void;
      }

      export function Sidebar({ collapsed, onToggle }: SidebarProps) {
          return (
              <aside style={{ width: collapsed ? '60px' : '240px' }}>
                  <button onClick={onToggle}>{collapsed ? '>' : '<'}</button>
              </aside>
          );
      }
    src/list-utils.ts: |
      export function groupBy<T>(items: T[], key: keyof T): Record<string, T[]> {
          return items.reduce((groups, item) => {
              const value = String(item[key]);
              (groups[value] = groups[value] ?? []).push(item);
              return groups;
          }, {} as Record<string, T[]>);
      }
