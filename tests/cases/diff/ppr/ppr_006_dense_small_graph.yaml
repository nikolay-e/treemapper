      from core.shared_utils import normalize_vector, compute_magnitude
      GARBAGE_PPR_006_DENSE_CONSUMER_A = "dense_consumer_marker"
      GARBAGE_PPR_006_DENSE_CONSUMER_B = 3.14

      class VectorAnalyzer:
          def analyze(self, vectors):
              return [compute_magnitude(normalize_vector(v)) for v in vectors]

          def summarize(self, data):
              return sum(data) / len(data)
