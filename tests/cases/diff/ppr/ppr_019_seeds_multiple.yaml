# === Assertions ===

must_include:
- func_a
- func_b
- modified a
- modified b

must_include_files:
- module_a.py
- module_b.py

must_include_content_from:
  module_a.py:
    - 'def func_a():'
    - return "modified a"
  module_b.py:
    - 'def func_b():'
    - return "modified b"

must_not_include:
# Plain garbage markers
- GARBAGE_PPR_019_EMAIL_HOST_G
- GARBAGE_PPR_019_EMAIL_PORT_H
# Tricky: redefines func_a and func_b
- GARBAGE_PPR_019_ALT_MOD_A
- GARBAGE_PPR_019_ALT_VER_B
- GARBAGE_PPR_019_ALT_BUNDLE_C
# Tricky: structural sibling module_d
- GARBAGE_PPR_019_MOD_D_INIT_D
- GARBAGE_PPR_019_MOD_D_VER_E
- GARBAGE_PPR_019_MOD_D_HANDLE_F

must_not_include_files:
- garbage_alt_modules.py
- garbage_module_d.py
- garbage_email.py

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
