initial:
  module_a.py: |
    def func_a():
        return "a"
  module_b.py: |
    def func_b():
        return "b"
  module_c.py: |
    def func_c():
        return "c"

  # --- Tricky garbage: same function names func_a/func_b but no import edge ---
  garbage_alt_modules.py: |
    GARBAGE_PPR_019_ALT_MOD_A = "alternate_modules"
    GARBAGE_PPR_019_ALT_VER_B = "v2"

    def func_a():
        return "alternate_a"

    def func_b():
        return "alternate_b"

    class ModuleBundle:
        GARBAGE_PPR_019_ALT_BUNDLE_C = True

        def get_all(self):
            return [func_a(), func_b()]

  # --- Tricky garbage: structural sibling module_d matching naming ---
  garbage_module_d.py: |
    GARBAGE_PPR_019_MOD_D_INIT_D = "module_d"
    GARBAGE_PPR_019_MOD_D_VER_E = "1.0"

    def func_d():
        return "d"

    class ModuleDHandler:
        GARBAGE_PPR_019_MOD_D_HANDLE_F = True

        def handle(self):
            return func_d()

  # --- Plain garbage: no overlap ---
  garbage_email.py: |
    GARBAGE_PPR_019_EMAIL_HOST_G = "smtp.example.com"
    GARBAGE_PPR_019_EMAIL_PORT_H = 587

    class EmailSender:
        def send(self, to: str, body: str):
            pass

