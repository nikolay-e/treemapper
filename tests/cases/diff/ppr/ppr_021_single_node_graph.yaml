# Scenario: single_func changes return value from 1 to 2 — single isolated node
# Changed: single.py — single_func() returns 2 (was 1)
# Reviewer needs: single.py (changed, only relevant file)
# Trap: alt_single.py — defines single_func() too, name collision but no import
# Trap: solo_runner.py — similar single-function module structure
# Trap: storage_backend.py — completely unrelated

initial:
  single.py: |
    def single_func():
        return 1
  alt_single.py: |
    def single_func():
        return "alternate_single"

    class SingleWrapper:
        def wrap(self):
            return single_func()
  solo_runner.py: |
    def solo_func():
        return 999

    class SoloRunner:
        def execute(self):
            return solo_func()
  storage_backend.py: |
    STORE_PATH = "/var/data"
    STORE_TYPE = "filesystem"

    class StorageBackend:
        def save(self, data):
            pass

changed:
  single.py: |
    def single_func():
        return 2
  alt_single.py: |
    def single_func():
        return "alternate_single"

    class SingleWrapper:
        def wrap(self):
            return single_func()
  solo_runner.py: |
    def solo_func():
        return 999

    class SoloRunner:
        def execute(self):
            return solo_func()
  storage_backend.py: |
    STORE_PATH = "/var/data"
    STORE_TYPE = "filesystem"

    class StorageBackend:
        def save(self, data):
            pass

# === Assertions ===

must_include:
- single_func
- return 2

must_include_files:
- single.py

must_include_content_from:
  single.py:
    - 'def single_func():'
    - return 2

must_not_include:
- SingleWrapper
- alternate_single
- SoloRunner
- solo_func
- StorageBackend
- STORE_PATH

must_not_include_files:
- alt_single.py
- solo_runner.py
- storage_backend.py

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
