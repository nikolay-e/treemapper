# Scenario: single_change_with_downstream_caller
#   generate_token() in auth/token.py changes its return format.
#   consumer.py imports and calls generate_token(), using the return
#   value to build an auth header. The change is small (one function,
#   one file), but the reviewer MUST see the consumer to understand
#   impact.
#
# Diff shows:
#   auth/token.py:
#     - return token_value
#     + return f"Bearer {token_value}"
#     The function now returns a prefixed string instead of raw token.
#     Any caller that already adds "Bearer " will double-prefix.
#
# Reviewer questions:
#   Q1: "Who calls generate_token() and how do they use the return value?"
#       -> consumer.py imports generate_token, builds headers dict:
#         headers["Authorization"] = f"Bearer {generate_token()}"
#         With the change, this becomes "Bearer Bearer abc123" — a BUG.
#         Reviewer MUST see the consumer to catch this.
#
#   Q2: "Are there other callers that might be affected?"
#       -> In this codebase only consumer.py imports it. The garbage
#         files have similar naming but no real dependency.
#
# Not needed for comprehension:
#   - auth/refresh.py: Same auth/ package, has refresh_token() function.
#     Sibling module trap — same package, similar naming, but no
#     dependency on generate_token().
#
#   - garbage_token_validator.py: Has token-related naming with GARBAGE
#     markers. validate_token() sounds related but different module.
#
#   - garbage_auth_logger.py: Imports-like structure mentioning "auth"
#     and "token" in strings, but no real import of generate_token.

max_enrichment: 15.0
initial:
  auth/token.py: |
    import hashlib
    import time

    def generate_token():
        raw = f"session-{time.time()}"
        token_value = hashlib.sha256(raw.encode()).hexdigest()[:16]
        return token_value

  consumer.py: |
    from auth.token import generate_token

    def build_auth_headers():
        token = generate_token()
        headers = {
            "Authorization": f"Bearer {token}",
            "Content-Type": "application/json",
        }
        return headers

    def make_request(url):
        headers = build_auth_headers()
        return {"url": url, "headers": headers}

  auth/refresh.py: |
    import time
    GARBAGE_PPR018_REFRESH_A = "refresh_module"
    GARBAGE_PPR018_REFRESH_B = 3600

    def refresh_token(old_token):
        GARBAGE_PPR018_REFRESH_C = time.time()
        return f"refreshed-{old_token[:8]}"

    class TokenRefresher:
        GARBAGE_PPR018_REFRESH_D = 0

        def refresh(self, token):
            return refresh_token(token)

  garbage_token_validator.py: |
    GARBAGE_PPR018_VALID_E = "token_validator"
    GARBAGE_PPR018_VALID_F = True

    def validate_token(token):
        GARBAGE_PPR018_VALID_G = 16
        return len(token) >= GARBAGE_PPR018_VALID_G

    class TokenValidator:
        GARBAGE_PPR018_VALID_H = "strict"

        def check(self, token):
            return validate_token(token)

  garbage_auth_logger.py: |
    GARBAGE_PPR018_LOG_I = "auth_logger"
    GARBAGE_PPR018_LOG_J = []

    def log_auth_event(event_type, token_id):
        GARBAGE_PPR018_LOG_K = f"auth:{event_type}:{token_id}"
        GARBAGE_PPR018_LOG_J.append(GARBAGE_PPR018_LOG_K)

    class AuthAuditLog:
        GARBAGE_PPR018_LOG_L = "/var/log/auth"

        def record(self, event):
            log_auth_event("access", event)

