# === Assertions ===

must_include_files:
- main.py

must_include_content_from:
  main.py:
    - 'def main():'
    - do_work()
    - return 1

must_not_include:
# Tricky: same import from helper
- GARBAGE_PPR_009_HELPER_IMPORT_A
- GARBAGE_PPR_009_HELPER_IMPORT_B
# Tricky: name collision with main()
- GARBAGE_PPR_009_MAIN_COLLISION_C
- GARBAGE_PPR_009_MAIN_COLLISION_D
# Tricky: same directory sibling
- GARBAGE_PPR_009_IMPORT_SIBLING_E
- GARBAGE_PPR_009_IMPORT_SIBLING_F

must_not_include_files:
- garbage_helper_consumer.py
- garbage_main_collision.py
- garbage_import_sibling.py

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
