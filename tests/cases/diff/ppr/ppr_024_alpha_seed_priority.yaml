# Scenario: seed_func changes return; seed.py and far.py both define COMMON_VALUE — tests seed priority
# Changed: seed.py — seed_func() returns COMMON_VALUE + 100
# Reviewer needs: seed.py (changed, the seed node must score higher than far.py)
# Trap: global_registry.py — similar constant + function pattern (GLOBAL_SETTING + getter)
# Trap: config_provider.py — similar constant + function pattern (CONFIG_VALUE + getter)
# Trap: network_client.py — completely unrelated

initial:
  seed.py: |
    COMMON_VALUE = 1

    def seed_func():
        return COMMON_VALUE
  far.py: |
    COMMON_VALUE = 2

    def far_func():
        return COMMON_VALUE
  global_registry.py: |
    GLOBAL_SETTING = 999

    def compute_global():
        return GLOBAL_SETTING

    class GlobalRegistry:
        def lookup(self):
            return compute_global()
  config_provider.py: |
    CONFIG_VALUE = 42

    def config_func():
        return CONFIG_VALUE

    class ConfigProvider:
        def provide(self):
            return config_func()
  network_client.py: |
    NET_HOST = "0.0.0.0"
    NET_PORT = 8080

    class NetworkClient:
        def connect(self, host: str):
            pass

changed:
  seed.py: |
    COMMON_VALUE = 1

    def seed_func():
        return COMMON_VALUE + 100
  far.py: |
    COMMON_VALUE = 2

    def far_func():
        return COMMON_VALUE
  global_registry.py: |
    GLOBAL_SETTING = 999

    def compute_global():
        return GLOBAL_SETTING

    class GlobalRegistry:
        def lookup(self):
            return compute_global()
  config_provider.py: |
    CONFIG_VALUE = 42

    def config_func():
        return CONFIG_VALUE

    class ConfigProvider:
        def provide(self):
            return config_func()
  network_client.py: |
    NET_HOST = "0.0.0.0"
    NET_PORT = 8080

    class NetworkClient:
        def connect(self, host: str):
            pass

# === Assertions ===

must_include:
- seed_func
- COMMON_VALUE + 100

must_include_files:
- seed.py

must_include_content_from:
  seed.py:
    - 'def seed_func():'
    - return COMMON_VALUE + 100

must_not_include:
- GlobalRegistry
- compute_global
- ConfigProvider
- config_func
- NetworkClient
- NET_HOST

must_not_include_files:
- global_registry.py
- config_provider.py
- network_client.py

