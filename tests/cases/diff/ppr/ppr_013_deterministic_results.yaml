must_include:
- func0
- func1

must_include_files:
- test.py

must_include_content_from:
  test.py:
    - 'def func0():'
    - return 1

must_not_include:
# Plain garbage markers
- GARBAGE_PPR_013_LOGGER_INIT_G
- GARBAGE_PPR_013_LOGGER_LEVEL_H
# Tricky: same function names func0/func1 in different file
- GARBAGE_PPR_013_MATH_FUNCS_A
- GARBAGE_PPR_013_MATH_OVERLAP_B
- GARBAGE_PPR_013_MATH_CLASS_C
# Tricky: similar call chain pattern
- GARBAGE_PPR_013_CHAIN_START_D
- GARBAGE_PPR_013_CHAIN_DEPTH_E
- GARBAGE_PPR_013_CHAIN_RUN_F

must_not_include_files:
- garbage_math_funcs.py
- garbage_chain_funcs.py
- garbage_logger.py

max_fragments: 6
max_files: 2
add_garbage_files: false
skip_garbage_check: true
