initial:
  test.py: |
    def func0():
        pass

    def func1():
        func0()

    def func2():
        func1()

    def func3():
        func2()

    def func4():
        func3()

  # --- Tricky garbage: same function names func0/func1 but no import edge ---
  garbage_math_funcs.py: |
    GARBAGE_PPR_013_MATH_FUNCS_A = "math_operations"
    GARBAGE_PPR_013_MATH_OVERLAP_B = True

    def func0():
        return 3.14159

    def func1():
        return func0() * 2

    class MathHelper:
        GARBAGE_PPR_013_MATH_CLASS_C = 99

        def compute(self):
            return func0() + func1()

  # --- Tricky garbage: similar call chain pattern, similar names ---
  garbage_chain_funcs.py: |
    GARBAGE_PPR_013_CHAIN_START_D = "chain"
    GARBAGE_PPR_013_CHAIN_DEPTH_E = 5

    def chain_func0():
        return "start"

    def chain_func1():
        return chain_func0()

    class ChainRunner:
        GARBAGE_PPR_013_CHAIN_RUN_F = True

        def run(self):
            return chain_func1()

  # --- Plain garbage: no overlap ---
  garbage_logger.py: |
    GARBAGE_PPR_013_LOGGER_INIT_G = "logger"
    GARBAGE_PPR_013_LOGGER_LEVEL_H = "DEBUG"

    class Logger:
        def log(self, msg: str) -> None:
            pass

