# Scenario: func0 in a 5-function chain gets return value — tests determinism of PPR results
# Changed: test.py — func0() returns 1, chain func0->func1->...->func4
# Reviewer needs: test.py (changed, entire chain is in one file)
# Trap: math_ops.py — defines func0/func1 with identical names, same call pattern
# Trap: transform.py — similar chain structure with transform_a->transform_b->transform_c
# Trap: logging_config.py — completely unrelated, no function overlap

initial:
  test.py: |
    def func0():
        pass

    def func1():
        func0()

    def func2():
        func1()

    def func3():
        func2()

    def func4():
        func3()

  math_ops.py: |
    def func0():
        return 3.14159

    def func1():
        return func0() * 2

    class MathHelper:
        def compute(self):
            return func0() + func1()
  transform.py: |
    def transform_a():
        return "start"

    def transform_b():
        return transform_a() + "_b"

    def transform_c():
        return transform_b() + "_c"

    class TransformRunner:
        def run(self):
            return transform_c()
  logging_config.py: |
    LOG_LEVEL = "DEBUG"
    LOG_FORMAT = "%(asctime)s %(message)s"

    class Logger:
        def log(self, msg: str) -> None:
            pass

changed:
  test.py: |
    def func0():
        return 1

    def func1():
        func0()

    def func2():
        func1()

    def func3():
        func2()

    def func4():
        func3()

  math_ops.py: |
    def func0():
        return 3.14159

    def func1():
        return func0() * 2

    class MathHelper:
        def compute(self):
            return func0() + func1()
  transform.py: |
    def transform_a():
        return "start"

    def transform_b():
        return transform_a() + "_b"

    def transform_c():
        return transform_b() + "_c"

    class TransformRunner:
        def run(self):
            return transform_c()
  logging_config.py: |
    LOG_LEVEL = "DEBUG"
    LOG_FORMAT = "%(asctime)s %(message)s"

    class Logger:
        def log(self, msg: str) -> None:
            pass

# === Assertions ===

must_include:
- func0
- func1

must_include_files:
- test.py

must_include_content_from:
  test.py:
    - 'def func0():'
    - return 1

must_not_include:
- MathHelper
- TransformRunner
- LOG_LEVEL
- LOG_FORMAT
- transform_a

must_not_include_files:
- math_ops.py
- transform.py
- logging_config.py

max_fragments: 6
max_files: 2
add_garbage_files: false
skip_garbage_check: true
