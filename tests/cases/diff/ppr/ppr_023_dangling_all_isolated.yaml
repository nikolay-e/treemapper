# === Assertions ===

must_include_files:
- pricing.py

must_include_content_from:
  pricing.py:
    - 'def calculate_price(base_rate, quantity):'
    - return base_rate * quantity * DISCOUNT_FACTOR

must_not_include:
# --- inventory.py: shares "quantity" vocabulary but no import ---
- InventoryManager
- REORDER_QUANTITY
- RATE_LIMIT
# --- reporting.py: structural sibling, similar shape ---
- ReportBuilder
- REPORT_VERSION
- MAX_ROWS
# --- shipping.py: name-pattern trap (calculate_shipping ~ calculate_price) ---
- ShippingCalculator
- SHIPPING_RATE
# --- template_engine.py: completely unrelated ---
- TemplateRenderer
- TEMPLATE_FORMAT

must_not_include_files:
- inventory.py
- reporting.py
- shipping.py
- template_engine.py

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
