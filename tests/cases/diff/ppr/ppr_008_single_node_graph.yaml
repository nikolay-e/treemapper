# Scenario: Single isolated function only() is modified to return 1
# Changed: single.py — the only function in the repo gets a return value
# Reviewer needs: single.py (changed, the entire file IS the context)
# Trap: utils.py — also defines a single standalone function, same module shape
# Trap: constants.py — standalone file with single return value, shares "only" vocabulary

initial:
  single.py: |
    def only():
        pass
  utils.py: |
    def standalone_helper():
        return "standalone_result"

    def format_output(value):
        return str(value)
  constants.py: |
    ONLY_VALUE = None

    def get_only_default():
        return ONLY_VALUE

changed:
  single.py: |
    def only():
        return 1
  utils.py: |
    def standalone_helper():
        return "standalone_result"

    def format_output(value):
        return str(value)
  constants.py: |
    ONLY_VALUE = None

    def get_only_default():
        return ONLY_VALUE

# === Assertions ===

must_include_files:
- single.py

must_include_content_from:
  single.py:
    - 'def only():'
    - return 1

must_not_include:
- standalone_helper
- format_output
- ONLY_VALUE
- get_only_default

must_not_include_files:
- utils.py
- constants.py

max_fragments: 3
max_files: 2
add_garbage_files: false
skip_garbage_check: true
