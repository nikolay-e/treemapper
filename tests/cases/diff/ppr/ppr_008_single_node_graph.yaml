initial:
  single.py: |
    def only():
        pass
  # --- Tricky garbage: same function name "only" in different module ---
  garbage_only_collision.py: |
    GARBAGE_PPR_008_ONLY_COLLISION_A = "only_collision"
    GARBAGE_PPR_008_ONLY_COLLISION_B = False

    def only():
        return "completely_different_only"

    def only_wrapper():
        return only() + "_wrapped"
  # --- Tricky garbage: same directory sibling with single function ---
  garbage_single_sibling.py: |
    GARBAGE_PPR_008_SINGLE_SIBLING_C = "single_sibling"
    GARBAGE_PPR_008_SINGLE_SIBLING_D = 77

    def standalone_func():
        return "standalone_result"

    def standalone_helper():
        return standalone_func() + "_helped"
changed:
  single.py: |
    def only():
        return 1
  garbage_only_collision.py: |
    GARBAGE_PPR_008_ONLY_COLLISION_A = "only_collision"
    GARBAGE_PPR_008_ONLY_COLLISION_B = False

    def only():
        return "completely_different_only"

    def only_wrapper():
        return only() + "_wrapped"
  garbage_single_sibling.py: |
    GARBAGE_PPR_008_SINGLE_SIBLING_C = "single_sibling"
    GARBAGE_PPR_008_SINGLE_SIBLING_D = 77

    def standalone_func():
        return "standalone_result"

    def standalone_helper():
        return standalone_func() + "_helped"

# === Assertions ===

must_include_files:
- single.py

must_include_content_from:
  single.py:
    - 'def only():'
    - return 1

must_not_include:
# Tricky: name collision with only()
- GARBAGE_PPR_008_ONLY_COLLISION_A
- GARBAGE_PPR_008_ONLY_COLLISION_B
# Tricky: same directory sibling
- GARBAGE_PPR_008_SINGLE_SIBLING_C
- GARBAGE_PPR_008_SINGLE_SIBLING_D

must_not_include_files:
- garbage_only_collision.py
- garbage_single_sibling.py

max_fragments: 3
max_files: 2
add_garbage_files: false
skip_garbage_check: true
