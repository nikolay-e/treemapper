initial:
  a.py: |
    SHARED = "shared"
    FUNC_A = "func_a"

    def func_a():
        return SHARED + FUNC_A
  b.py: |
    SHARED = "shared"
    FUNC_B = "func_b"

    def func_b():
        return SHARED + FUNC_B
  c.py: |
    FUNC_C = "func_c"

    def func_c():
        return FUNC_C

  # --- Tricky garbage: same SHARED constant, same func_a name ---
  garbage_shared_alias.py: |
    GARBAGE_PPR028_ALIAS_A = "alias"
    GARBAGE_PPR028_ALIAS_B = True

    SHARED = "shared"
    FUNC_A = "func_a"

    def func_a():
        return SHARED + FUNC_A + "_alias"

    class SharedConsumer:
        GARBAGE_PPR028_CONSUMER_C = 77

        def use_shared(self):
            return SHARED

  # --- Tricky garbage: uses "_modified" like the diff ---
  garbage_modified_handler.py: |
    GARBAGE_PPR028_HANDLER_D = "handler"
    GARBAGE_PPR028_HANDLER_E = False

    def apply_modified():
        return "_modified"

    def get_modified_result():
        GARBAGE_PPR028_RESULT_F = 42
        return "base" + "_modified"

  # --- Tricky garbage: structural sibling, single-letter filename ---
  garbage_d.py: |
    GARBAGE_PPR028_SIBLING_G = "sibling_d"
    GARBAGE_PPR028_SIBLING_H = 0

    FUNC_D = "func_d"

    def func_d():
        return FUNC_D

