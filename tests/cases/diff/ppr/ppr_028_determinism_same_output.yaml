# === Assertions ===

must_include_files:
- a.py

must_include_content_from:
  a.py:
    - 'def func_a():'
    - return SHARED + FUNC_A + "_modified"
    - SHARED
    - FUNC_A

must_not_include:
# Tricky: same SHARED, FUNC_A, and func_a name
- GARBAGE_PPR028_ALIAS_A
- GARBAGE_PPR028_ALIAS_B
- GARBAGE_PPR028_CONSUMER_C
# Tricky: uses "_modified" string
- GARBAGE_PPR028_HANDLER_D
- GARBAGE_PPR028_HANDLER_E
- GARBAGE_PPR028_RESULT_F
# Tricky: structural sibling with single-letter name
- GARBAGE_PPR028_SIBLING_G
- GARBAGE_PPR028_SIBLING_H

must_not_include_files:
- garbage_shared_alias.py
- garbage_modified_handler.py
- garbage_d.py

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
