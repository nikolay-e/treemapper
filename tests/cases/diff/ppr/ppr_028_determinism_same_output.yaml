    FUNC_B = "func_b"

    def func_b():
        return SHARED + FUNC_B
  c.py: |
    FUNC_C = "func_c"

    def func_c():
        return FUNC_C
  garbage_shared_alias.py: |
    GARBAGE_PPR028_ALIAS_A = "alias"
    GARBAGE_PPR028_ALIAS_B = True

    SHARED = "shared"
    FUNC_A = "func_a"

    def func_a():
        return SHARED + FUNC_A + "_alias"

    class SharedConsumer:
        GARBAGE_PPR028_CONSUMER_C = 77

        def use_shared(self):
            return SHARED
  garbage_modified_handler.py: |
    GARBAGE_PPR028_HANDLER_D = "handler"
    GARBAGE_PPR028_HANDLER_E = False

    def apply_modified():
        return "_modified"

    def get_modified_result():
        GARBAGE_PPR028_RESULT_F = 42
        return "base" + "_modified"
