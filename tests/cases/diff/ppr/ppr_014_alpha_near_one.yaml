# Scenario: deep_chain_base_change
#   A 10-function chain across separate files where the BASE function
#   (position 0) changes its return value. Each function imports and
#   calls the previous one, using its return value in a computation:
#     fetch_config -> parse_config -> validate_schema -> extract_defaults ->
#     merge_overrides -> resolve_paths -> expand_templates ->
#     apply_constraints -> compile_output -> write_manifest
#
# Diff shows:
#   layer0_fetch.py:
#     - return {"version": 1, "entries": []}
#     + return {"version": 2, "entries": [], "strict": True}
#     Config format version bumped, new "strict" key added.
#     Every downstream function receives a dict with a new key.
#
# Reviewer questions:
#   Q1: "Who first consumes fetch_config's return value?"
#       -> layer1_parse.py imports fetch_config, accesses config["version"]
#         and config["entries"]. Reviewer must check whether parse_config
#         handles version=2 correctly and whether the new "strict" key
#         causes KeyError or unexpected behavior.
#
#   Q2: "Does any downstream function access config keys by name?"
#       -> layer2_validate.py checks 'if "version" in schema' — might be
#         affected by the version bump. But the IMMEDIATE caller
#         (layer1_parse) is most critical for review.
#
# Not needed for comprehension:
#   - alt_config_loader.py: Defines its own fetch_config() returning a
#     completely different structure. Name collision trap.
#
#   - garbage_schema_check.py: Has validate_schema-like naming with
#     GARBAGE markers. Different module.
#
#   - layer8_compile.py / layer9_write.py: Far downstream. Their logic
#     doesn't help review the config format change at the base.

max_enrichment: 22.0
initial:
  layer0_fetch.py: |
    def fetch_config():
        return {"version": 1, "entries": []}

  layer1_parse.py: |
    from layer0_fetch import fetch_config

    def parse_config():
        config = fetch_config()
        version = config["version"]
        entries = config["entries"]
        return {"version": version, "items": entries}

  layer2_validate.py: |
    from layer1_parse import parse_config

    def validate_schema():
        schema = parse_config()
        if "version" not in schema:
            raise ValueError("missing version")
        return schema

  layer3_defaults.py: |
    from layer2_validate import validate_schema

    def extract_defaults():
        validated = validate_schema()
        validated.setdefault("timeout", 30)
        return validated

  layer4_merge.py: |
    from layer3_defaults import extract_defaults

    def merge_overrides(overrides=None):
        defaults = extract_defaults()
        if overrides:
            defaults.update(overrides)
        return defaults

  layer5_resolve.py: |
    from layer4_merge import merge_overrides

    def resolve_paths():
        merged = merge_overrides()
        merged["base_path"] = "/opt/app"
        return merged

  layer6_expand.py: |
    from layer5_resolve import resolve_paths

    def expand_templates():
        resolved = resolve_paths()
        resolved["expanded"] = True
        return resolved

  layer7_constrain.py: |
    from layer6_expand import expand_templates

    def apply_constraints():
        expanded = expand_templates()
        if expanded.get("timeout", 0) > 120:
            expanded["timeout"] = 120
        return expanded

  layer8_compile.py: |
    from layer7_constrain import apply_constraints
    GARBAGE_PPR014_COMPILE_A = "compile_stage"
    GARBAGE_PPR014_COMPILE_B = 0

    def compile_output():
        constrained = apply_constraints()
        GARBAGE_PPR014_COMPILE_C = True
        return {"compiled": True, "config": constrained}

  layer9_write.py: |
    from layer8_compile import compile_output
    GARBAGE_PPR014_WRITE_D = "write_stage"
    GARBAGE_PPR014_WRITE_E = "/tmp/out"

    def write_manifest():
        compiled = compile_output()
        GARBAGE_PPR014_WRITE_F = "done"
        return f"manifest: {compiled}"

  alt_config_loader.py: |
    GARBAGE_PPR014_ALT_G = "alt_loader"
    GARBAGE_PPR014_ALT_H = True

    def fetch_config():
        GARBAGE_PPR014_ALT_I = "/etc/alt.conf"
        return {"type": "alt", "path": GARBAGE_PPR014_ALT_I}

    class AltConfigManager:
        GARBAGE_PPR014_ALT_J = "manager"

        def load(self):
            return fetch_config()

  garbage_schema_check.py: |
    GARBAGE_PPR014_SCHEMA_K = "schema_check"
    GARBAGE_PPR014_SCHEMA_L = False

    def validate_schema(data):
        GARBAGE_PPR014_SCHEMA_M = ["version", "type"]
        return all(k in data for k in GARBAGE_PPR014_SCHEMA_M)

    class SchemaValidator:
        GARBAGE_PPR014_SCHEMA_N = 1

        def check(self, data):
            return validate_schema(data)

