# === Assertions ===

must_include:
- func0

must_include_files:
- test.py

must_include_content_from:
  test.py:
    - 'def func0():'
    - return 1

must_not_include:
- AltProcessor
- alternate_implementation
- DeepPipelineRunner
- CONFIG_PATH
- RUN_MODE

must_not_include_files:
- alt_processor.py
- deep_pipeline.py
- app_settings.py

max_fragments: 6
max_files: 2
add_garbage_files: false
skip_garbage_check: true
