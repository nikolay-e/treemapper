    GARBAGE_PPR034_MIRROR_D = "start_mirror"
    GARBAGE_PPR034_MIRROR_E = False

    def start_func():
        return "unrelated_start"

    def start_helper():
        GARBAGE_PPR034_HELPER_F = 42
        return start_func()

  # --- Tricky garbage: uses result variable and "_modified" like the diff ---
