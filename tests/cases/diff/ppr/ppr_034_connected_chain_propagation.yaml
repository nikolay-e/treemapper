    from middle import middle_func

    def start_func():
        return middle_func()
  middle.py: |
    from end import end_func

    def middle_func():
        return end_func()
  end.py: |
    def end_func():
        return "end"

  # --- Tricky garbage: imports middle_func like start.py ---
  garbage_middle_consumer.py: |
    from middle import middle_func
    GARBAGE_PPR034_CONSUMER_A = "middle_consumer"
    GARBAGE_PPR034_CONSUMER_B = True

    def consume_middle():
        return middle_func()

    class MiddleWrapper:
        GARBAGE_PPR034_WRAPPER_C = 99

        def wrap(self):
            return middle_func()

