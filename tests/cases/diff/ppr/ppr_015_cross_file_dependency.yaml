# Scenario: main() changes return value from helper() to helper() + 1.
#   main.py imports helper from utils. Only main.py is changed.
#
# Diff shows:
#   - return helper()
#   + return helper() + 1
#
# Reviewer questions:
#   Q1: "What does helper() return — is adding 1 to it meaningful?"
#       -> Returns 42 (int). Adding 1 gives 43. Reviewer must verify
#         helper() returns a numeric type that supports addition.
#
#   Q2: "Could helper() return None and cause a TypeError?"
#       -> No, helper() always returns 42. But reviewer needs to see
#         the implementation to confirm no None path exists.
#
# Not needed for comprehension:
#   - analytics.py: Also imports helper from utils, calls helper() * 10.
#     HARDEST TRAP: same import statement (`from utils import helper`),
#     same function call. But how analytics multiplies doesn't help
#     review whether main.py's addition is correct.
#
#   - alt_utils.py: Defines its own helper() returning 99. Name collision
#     trap. Also has helper_v2() = helper() + 1 — nearly identical logic
#     to the diff. But different module, not the imported one.
#
#   - db_pool.py: Completely unrelated infrastructure module.

initial:
  utils.py: |
    def helper():
        return 42
  main.py: |
    from utils import helper

    def main():
        return helper()
  unrelated.py: |
    def unrelated_func():
        pass
  analytics.py: |
    from utils import helper

    class AnalyticsEngine:
        def compute_metric(self):
            return helper() * 10

        def validate_result(self):
            return True
  alt_utils.py: |
    def helper():
        return 99

    def helper_v2():
        return helper() + 1

    class HelperRegistry:
        def get_helper(self):
            return helper()
  db_pool.py: |
    DB_CONNECTION = "postgresql://localhost"
    POOL_SIZE = 10

    class DatabasePool:
        def connect(self):
            pass

changed:
  utils.py: |
    def helper():
        return 42
  main.py: |
    from utils import helper

    def main():
        return helper() + 1
  unrelated.py: |
    def unrelated_func():
        pass
  analytics.py: |
    from utils import helper

    class AnalyticsEngine:
        def compute_metric(self):
            return helper() * 10

        def validate_result(self):
            return True
  alt_utils.py: |
    def helper():
        return 99

    def helper_v2():
        return helper() + 1

    class HelperRegistry:
        def get_helper(self):
            return helper()
  db_pool.py: |
    DB_CONNECTION = "postgresql://localhost"
    POOL_SIZE = 10

    class DatabasePool:
        def connect(self):
            pass

must_include:
  - main
  - helper

must_include_files:
  - main.py

must_include_content_from:
  main.py:
    - "def main():"
    - "return helper() + 1"

must_not_include:
  # --- analytics.py: HARDEST TRAP — same `from utils import helper` ---
  - AnalyticsEngine
  - compute_metric
  - validate_result
  # --- alt_utils.py: name collision + helper_v2() = helper() + 1 ---
  - HelperRegistry
  - helper_v2
  # --- unrelated.py / db_pool.py: no structural edges ---
  - unrelated_func
  - DatabasePool
  - DB_CONNECTION

must_not_include_files:
  - analytics.py
  - alt_utils.py
  - unrelated.py
  - db_pool.py

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
