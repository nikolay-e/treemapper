# Scenario: entry.py changes main() which calls process1() from a 4-layer
#   deep import chain: entry -> layer1 -> layer2 -> layer3 -> layer4.
#   Only entry.py is changed (appends "_modified" to the return value).
#
# This tests whether PPR traverses a deep import chain within bounded
# iterations, surfacing at least the first-hop dependency (layer1.py)
# that the reviewer needs to understand the change.
#
# Diff shows:
#   entry.py:
#     - return process1()
#     + return process1() + "_modified"
#
# Reviewer question:
#   Q1: "main() calls process1() — what does it return? Does the change
#       break the pipeline?"
#       -> Needs layer1.py: it defines process1() which returns process2().
#         The reviewer must see what process1() returns to understand whether
#         appending "_modified" to its result makes sense. If process1()
#         returns a non-string, the + operator would fail at runtime.
#
# Not needed for comprehension:
#   - garbage_entry_consumer.py: Imports process1 from layer1 just like
#     entry.py does. Structural edge to the same dependency. But
#     consume_entry() and EntryWrapper are unrelated to the change.
#
#   - garbage_main_mirror.py: Defines ANOTHER main() — same name,
#     different module. Lexical trap. Completely unrelated.
#
#   - garbage_layer_util.py: Contains "layer" in the name and "_modified"
#     in a return value. Double lexical trap on both module name pattern
#     and diff content.

max_enrichment: 9.8
initial:
  entry.py: |
    from layer1 import process1

    def main():
        return process1()
  layer1.py: |
    from layer2 import process2

    def process1():
        return process2()
  layer2.py: |
    from layer3 import process3

    def process2():
        return process3()
  layer3.py: |
    from layer4 import process4

    def process3():
        return process4()
  layer4.py: |
    def process4():
        return "deep"

  # --- Tricky garbage: imports process1 like entry.py ---
  garbage_entry_consumer.py: |
    from layer1 import process1
    GARBAGE_PPR033_CONSUMER_A = "entry_consumer"
    GARBAGE_PPR033_CONSUMER_B = True

    def consume_entry():
        return process1()

    class EntryWrapper:
        GARBAGE_PPR033_WRAPPER_C = 99

        def wrap(self):
            return process1()

  # --- Tricky garbage: same main() function name ---
  garbage_main_mirror.py: |
    GARBAGE_PPR033_MAIN_D = "main_mirror"
    GARBAGE_PPR033_MAIN_E = False

    def main():
        return "unrelated_main"

    def main_helper():
        GARBAGE_PPR033_HELPER_F = 42
        return main()

  # --- Tricky garbage: layer* naming, uses "_modified" ---
  garbage_layer_util.py: |
    GARBAGE_PPR033_LAYER_G = "layer_util"
    GARBAGE_PPR033_LAYER_H = 0

    def layer_modified():
        return "_modified"

    def process_layer():
        return "process"

changed:
  entry.py: |
    from layer1 import process1

    def main():
        return process1() + "_modified"
  layer1.py: |
    from layer2 import process2

    def process1():
        return process2()
  layer2.py: |
    from layer3 import process3

    def process2():
        return process3()
  layer3.py: |
    from layer4 import process4

    def process3():
        return process4()
  layer4.py: |
    def process4():
        return "deep"
  garbage_entry_consumer.py: |
    from layer1 import process1
    GARBAGE_PPR033_CONSUMER_A = "entry_consumer"
    GARBAGE_PPR033_CONSUMER_B = True

    def consume_entry():
        return process1()

    class EntryWrapper:
        GARBAGE_PPR033_WRAPPER_C = 99

        def wrap(self):
            return process1()
  garbage_main_mirror.py: |
    GARBAGE_PPR033_MAIN_D = "main_mirror"
    GARBAGE_PPR033_MAIN_E = False

    def main():
        return "unrelated_main"

    def main_helper():
        GARBAGE_PPR033_HELPER_F = 42
        return main()
  garbage_layer_util.py: |
    GARBAGE_PPR033_LAYER_G = "layer_util"
    GARBAGE_PPR033_LAYER_H = 0

    def layer_modified():
        return "_modified"

    def process_layer():
        return "process"

# === Assertions ===

must_include_files:
- entry.py
  # Q1: Reviewer needs to see what process1() returns to evaluate
  # whether appending "_modified" is safe (type-compatible).
- layer1.py

must_include_content_from:
  entry.py:
    - 'def main():'
    - return process1() + "_modified"
    - from layer1 import process1
  layer1.py:
    - 'def process1():'

must_not_include:
# --- garbage_entry_consumer.py: imports process1 like entry.py ---
# Structural edge to the same dependency, but consume_entry() and
# EntryWrapper are unrelated to the main() change.
- GARBAGE_PPR033_CONSUMER_A
- GARBAGE_PPR033_CONSUMER_B
- GARBAGE_PPR033_WRAPPER_C
# --- garbage_main_mirror.py: defines another main() ---
# Lexical trap: same function name, different module, no relation.
- GARBAGE_PPR033_MAIN_D
- GARBAGE_PPR033_MAIN_E
- GARBAGE_PPR033_HELPER_F
# --- garbage_layer_util.py: "layer" name + "_modified" string ---
# Double lexical trap: module name matches layer* pattern AND
# return value matches diff content.
- GARBAGE_PPR033_LAYER_G
- GARBAGE_PPR033_LAYER_H

must_not_include_files:
- garbage_entry_consumer.py
- garbage_main_mirror.py
- garbage_layer_util.py

max_fragments: 6
max_files: 4
add_garbage_files: false
skip_garbage_check: true
