    from plugin_base import Plugin

    class FormatterPlugin(Plugin):
        name = "formatter"

        def process(self, data):
            return self.format(data)

        def format(self, data, style="default"):
            return {"formatted": data, "style": style, "version": 2}

  plugins/exporter.py: |
    from plugin_base import Plugin

    class ExporterPlugin(Plugin):
        name = "exporter"

        def process(self, data):
            return self.export(data)

        def export(self, records, delimiter=","):
            header = f"# Export: {len(records)} records"
            body = delimiter.join(str(r) for r in records)
            footer = f"# Total: {len(records)}"
            return f"{header}\n{body}\n{footer}"

