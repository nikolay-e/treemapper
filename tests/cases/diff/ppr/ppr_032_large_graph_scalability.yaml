# Scenario: Two modules in a 12-module plugin system change their output format.
#   Only plugins/formatter.py and plugins/exporter.py are changed.
#
# This tests context selection at scale: many files, sparse changes, and
# the challenge of finding the RIGHT 2-3 files among 12+ candidates.
#
# Diff shows:
#   plugins/formatter.py:
#     - format(data) returned {"formatted": data}
#     + format(data, style="default") returns {"formatted": data, "style": style, "version": 2}
#     Signature change (new param) + output shape change (new keys)
#
#   plugins/exporter.py:
#     - export(records) returned "\n".join(str(r) for r in records)
#     + export(records, delimiter=",") returns delimiter.join(...)
#     + adds header line and record count footer
#     Signature change (new param) + output format change
#
# Reviewer questions:
#   Q1: "Who calls formatter.format() and will they break from the new param?"
#       -> Needs pipeline.py: it calls formatter.format(data) with one arg.
#         Since style has a default, it won't break — but the output shape
#         changes (adds "style" and "version" keys), which downstream code
#         might not expect. Reviewer must see the call chain.
#
#   Q2: "Who calls exporter.export() and will the delimiter change matter?"
#       -> Same pipeline.py: calls exporter.export(results). One arg, so
#         delimiter defaults to ",". But the OLD output was newline-delimited;
#         now it's comma-delimited by default. This is a BEHAVIORAL CHANGE
#         even though the call compiles.
#
#   Q3: "What is the plugin interface these modules implement?"
#       -> plugin_base.py defines the Plugin base class with process() method.
#         Both formatter and exporter inherit from it. Reviewer needs the
#         interface to verify the new signatures are compatible.
#
# Not needed for comprehension:
#   - plugins/validator.py: Another plugin in the SAME registry. Same base
#     class, same process() method, registered alongside formatter/exporter.
#     HARDEST TRAP: sibling plugin with identical structure. But its
#     validate() logic doesn't help review format() or export() changes.
#
#   - plugins/transformer.py: Yet another sibling plugin. Calls transform()
#     on data. Same inheritance, same registry. No dependency on formatter
#     or exporter.
#
#   - plugins/aggregator.py: Aggregation plugin. Same pattern.
#
#   - plugin_registry.py: Discovers and registers all plugins including
#     formatter and exporter. Direct structural edge: references the
#     changed modules by import. But the registry's discovery mechanism
#     doesn't help review the signature/output changes.
#
#   - tests/test_formatter.py: Tests format() — imports formatter,
#     calls format(data), asserts output shape. Structural edge + exact
#     method. But test expectations verify behavior, not call chain.
#
#   - tests/test_exporter.py: Same for export().
#
#   - config/plugins.yaml: Plugin configuration listing enabled plugins
#     including "formatter" and "exporter". Lexical match on names.

max_enrichment: 10.6
initial:
  plugins/formatter.py: |
    from plugin_base import Plugin

    class FormatterPlugin(Plugin):
        name = "formatter"

        def process(self, data):
            return self.format(data)

        def format(self, data):
            return {"formatted": data}

  plugins/exporter.py: |
    from plugin_base import Plugin

    class ExporterPlugin(Plugin):
        name = "exporter"

        def process(self, data):
            return self.export(data)

        def export(self, records):
            return "\n".join(str(r) for r in records)

  plugin_base.py: |
    from abc import ABC, abstractmethod

    class Plugin(ABC):
        name: str = ""

        @abstractmethod
        def process(self, data):
            raise NotImplementedError

        def describe(self) -> str:
            return f"Plugin({self.name})"

  pipeline.py: |
    from plugins.formatter import FormatterPlugin
    from plugins.exporter import ExporterPlugin
    from plugins.validator import ValidatorPlugin

    class DataPipeline:
        def __init__(self):
            self.formatter = FormatterPlugin()
            self.exporter = ExporterPlugin()
            self.validator = ValidatorPlugin()

        def run(self, raw_data: list) -> str:
            validated = [d for d in raw_data if self.validator.validate(d)]
            formatted = [self.formatter.format(d) for d in validated]
            output = self.exporter.export(formatted)
            return output

        def run_formatted_only(self, raw_data: list) -> list:
            return [self.formatter.format(d) for d in raw_data]

  plugin_registry.py: |
    from plugins.formatter import FormatterPlugin
    from plugins.exporter import ExporterPlugin
    from plugins.validator import ValidatorPlugin
    from plugins.transformer import TransformerPlugin
    from plugins.aggregator import AggregatorPlugin

    PLUGIN_CLASSES = [
        FormatterPlugin,
        ExporterPlugin,
        ValidatorPlugin,
        TransformerPlugin,
        AggregatorPlugin,
    ]

    class PluginRegistry:
        def __init__(self):
            self._plugins = {}

        def register_all(self):
            for cls in PLUGIN_CLASSES:
                plugin = cls()
                self._plugins[plugin.name] = plugin

        def get(self, name: str):
            return self._plugins.get(name)

        def list_plugins(self) -> list:
            return list(self._plugins.keys())

  plugins/validator.py: |
    from plugin_base import Plugin

    class ValidatorPlugin(Plugin):
        name = "validator"

        def process(self, data):
            return self.validate(data)

        def validate(self, record) -> bool:
            if not isinstance(record, dict):
                return False
            if "id" not in record:
                return False
            return True

        def validate_batch(self, records: list) -> list:
            return [r for r in records if self.validate(r)]

  plugins/transformer.py: |
    from plugin_base import Plugin

    class TransformerPlugin(Plugin):
        name = "transformer"

        def process(self, data):
            return self.transform(data)

        def transform(self, record: dict) -> dict:
            result = {}
            for key, value in record.items():
                result[key.lower().replace(" ", "_")] = value
            return result

  plugins/aggregator.py: |
    from plugin_base import Plugin
    from collections import Counter

    class AggregatorPlugin(Plugin):
        name = "aggregator"

        def process(self, data):
            return self.aggregate(data)

        def aggregate(self, records: list) -> dict:
            if not records:
                return {"count": 0}
            keys = Counter()
            for record in records:
                if isinstance(record, dict):
                    keys.update(record.keys())
            return {
                "count": len(records),
                "fields": dict(keys),
            }

  tests/test_formatter.py: |
    from plugins.formatter import FormatterPlugin

    def test_format_basic():
        f = FormatterPlugin()
        result = f.format({"id": 1, "name": "test"})
        assert "formatted" in result

    def test_format_preserves_data():
        f = FormatterPlugin()
        data = {"key": "value"}
        result = f.format(data)
        assert result["formatted"] == data

    def test_process_calls_format():
        f = FormatterPlugin()
        result = f.process({"id": 1})
        assert isinstance(result, dict)

  tests/test_exporter.py: |
    from plugins.exporter import ExporterPlugin

    def test_export_basic():
        e = ExporterPlugin()
        result = e.export(["a", "b", "c"])
        assert "a" in result
        assert "b" in result

    def test_export_single():
        e = ExporterPlugin()
        result = e.export(["only"])
        assert result == "only"

    def test_process_calls_export():
        e = ExporterPlugin()
        result = e.process(["x", "y"])
        assert isinstance(result, str)

  config/plugins.yaml: |
