# Scenario: return_value_propagation_in_chain
#   A 5-function chain across separate files where each function USES the
#   return value of the one it calls. base.py's compute_base() changes its
#   return value from 10 to 25. The chain propagates real data:
#     base.compute_base -> step1.add_margin -> step2.apply_tax ->
#     step3.round_total -> step4.format_receipt
#
# Diff shows:
#   base.py:
#     - return 10
#     + return 25
#     The base price changes. Every downstream function receives a
#     different input, producing different outputs.
#
# Reviewer questions:
#   Q1: "What does add_margin do with base's return value?"
#       -> step1.py imports compute_base, calls it, adds 5 to the result.
#         Old: 10 + 5 = 15.  New: 25 + 5 = 30.
#         Reviewer must see this call site to understand propagation.
#
#   Q2: "Does apply_tax break with the new value?"
#       -> step2.py imports add_margin from step1, multiplies by 1.2.
#         Pure arithmetic — won't break, but the dollar amount changes
#         significantly (18.0 -> 36.0). Reviewer may or may not need
#         this depending on budget, but step1 is essential.
#
# Not needed for comprehension:
#   - alt_base.py: Defines its own compute_base() returning 99. Name
#     collision trap. Not imported by the chain.
#
#   - price_logger.py: Has compute_base-like naming and price-related
#     functions, but NO real import from base.py. Name similarity trap.
#
#   - garbage_parallel_calc.py: Similar arithmetic chain with GARBAGE
#     markers. Uses add_margin-like naming but different module.

max_enrichment: 25.0
initial:
  base.py: |
    def compute_base():
        return 10

  step1.py: |
    from base import compute_base

    def add_margin():
        price = compute_base()
        return price + 5

  step2.py: |
    from step1 import add_margin

    def apply_tax():
        subtotal = add_margin()
        return subtotal * 1.2

  step3.py: |
    from step2 import apply_tax

    def round_total():
        total = apply_tax()
        return round(total, 2)

  step4.py: |
    from step3 import round_total

    def format_receipt():
        amount = round_total()
        return f"Total: ${amount}"

  alt_base.py: |
    GARBAGE_PPR007_ALT_A = "alt_base"
    GARBAGE_PPR007_ALT_B = 99

    def compute_base():
        return GARBAGE_PPR007_ALT_B

    def compute_base_discounted():
        GARBAGE_PPR007_ALT_C = 0.9
        return compute_base() * GARBAGE_PPR007_ALT_C

  price_logger.py: |
    GARBAGE_PPR007_LOG_D = "logger"
    GARBAGE_PPR007_LOG_E = True

    def log_base_price(base_price):
        GARBAGE_PPR007_LOG_F = f"Logged: {base_price}"
        return GARBAGE_PPR007_LOG_F

    class PriceAuditTrail:
        GARBAGE_PPR007_LOG_G = []

        def record(self, price):
            self.GARBAGE_PPR007_LOG_G.append(price)

  garbage_parallel_calc.py: |
    GARBAGE_PPR007_CALC_H = "parallel_calc"
    GARBAGE_PPR007_CALC_I = 50

    def parallel_base():
        return GARBAGE_PPR007_CALC_I

    def parallel_margin():
        GARBAGE_PPR007_CALC_J = 8
        return parallel_base() + GARBAGE_PPR007_CALC_J

    class ParallelPricing:
        GARBAGE_PPR007_CALC_K = 1.15

        def compute(self):
            return parallel_margin() * self.GARBAGE_PPR007_CALC_K

