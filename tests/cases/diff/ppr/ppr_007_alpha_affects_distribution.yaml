# === Assertions ===

must_include_files:
  - base.py
  # Q1: step1 is the immediate downstream caller — reviewer must see
  # how compute_base()'s return value flows into add_margin().
  - step1.py

must_include_content_from:
  base.py:
    - "def compute_base():"
    - "return 25"
  step1.py:
    - "from base import compute_base"
    - "price = compute_base()"
    - "return price + 5"

must_not_include:
  # --- alt_base.py: name collision trap, own compute_base() ---
  - GARBAGE_PPR007_ALT_A
  - GARBAGE_PPR007_ALT_B
  - GARBAGE_PPR007_ALT_C
  - compute_base_discounted
  # --- price_logger.py: price-related naming but no real import ---
  - GARBAGE_PPR007_LOG_D
  - GARBAGE_PPR007_LOG_E
  - GARBAGE_PPR007_LOG_F
  - GARBAGE_PPR007_LOG_G
  - PriceAuditTrail
  - log_base_price
  # --- garbage_parallel_calc.py: similar arithmetic chain structure ---
  - GARBAGE_PPR007_CALC_H
  - GARBAGE_PPR007_CALC_I
  - GARBAGE_PPR007_CALC_J
  - GARBAGE_PPR007_CALC_K
  - ParallelPricing
  - parallel_base
  - parallel_margin

must_not_include_files:
  - alt_base.py
  - price_logger.py
  - garbage_parallel_calc.py

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
