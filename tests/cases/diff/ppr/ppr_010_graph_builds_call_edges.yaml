must_include_files:
- calls.py

must_include_content_from:
  calls.py:
    - 'def caller():'
    - callee()
    - return 1

must_not_include:
# Tricky: name collision with caller() and callee()
- GARBAGE_PPR_010_CALLER_COLLISION_A
- GARBAGE_PPR_010_CALLER_COLLISION_B
# Tricky: same directory sibling with call pattern
- GARBAGE_PPR_010_CALL_SIBLING_C
- GARBAGE_PPR_010_CALL_SIBLING_D
# Tricky: consumer of call results
- GARBAGE_PPR_010_CALL_CONSUMER_E
- GARBAGE_PPR_010_CALL_CONSUMER_F

must_not_include_files:
- garbage_caller_collision.py
- garbage_call_sibling.py
- garbage_call_consumer.py

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
