# Scenario: caller() adds return value; calls callee() — tests intra-file call edge detection
# Changed: calls.py — caller() now returns 1, still calls callee()
# Reviewer needs: calls.py (changed, both caller and callee in same file)
# Trap: dispatcher.py — also has caller/callee pattern with dispatch/handle naming
# Trap: pipeline.py — chain of function calls similar to caller->callee structure

initial:
  calls.py: |
    def caller():
        callee()

    def callee():
        pass
  dispatcher.py: |
    def dispatch(event):
        return handle(event)

    def handle(event):
        return f"handled: {event}"

    def notify(event):
        dispatch(event)
  pipeline.py: |
    def step_one(data):
        return step_two(data)

    def step_two(data):
        return data + "_processed"

    def run_pipeline(data):
        return step_one(data)

changed:
  calls.py: |
    def caller():
        callee()
        return 1

    def callee():
        pass
  dispatcher.py: |
    def dispatch(event):
        return handle(event)

    def handle(event):
        return f"handled: {event}"

    def notify(event):
        dispatch(event)
  pipeline.py: |
    def step_one(data):
        return step_two(data)

    def step_two(data):
        return data + "_processed"

    def run_pipeline(data):
        return step_one(data)

# === Assertions ===

must_include_files:
- calls.py

must_include_content_from:
  calls.py:
    - 'def caller():'
    - callee()
    - return 1

must_not_include:
- dispatch
- handle
- step_one
- step_two
- run_pipeline

must_not_include_files:
- dispatcher.py
- pipeline.py

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
