# Scenario: hub_func() adds a return value while still calling leaf1_func
#   and leaf2_func from imported modules. Only hub.py is changed.
#
# Diff shows:
#   + return "modified"   (added after leaf1_func/leaf2_func calls)
#
# Reviewer questions:
#   Q1: "What do leaf1_func/leaf2_func return — should hub_func use them?"
#       -> leaf1_func returns "leaf1", leaf2_func returns "leaf2". The diff
#         ignores both return values and returns "modified" instead.
#
# Not needed for comprehension:
#   - alt_hub.py: HARDEST TRAP — imports the SAME leaf1/leaf2 modules,
#     defines its own hub_func() that concatenates their returns. Same
#     import pattern, same function name, same dependencies. But different
#     module — not the hub_func being changed.
#
#   - leaf3.py: Structural sibling matching leaf1/leaf2 naming pattern.
#     But not imported by hub.py.
#
#   - auth_provider.py: Unrelated infrastructure module.

max_enrichment: 14.3
initial:
  hub.py: |
    from leaf1 import leaf1_func
    from leaf2 import leaf2_func

    def hub_func():
        leaf1_func()
        leaf2_func()
  leaf1.py: |
    def leaf1_func():
        return "leaf1"
  leaf2.py: |
    def leaf2_func():
        return "leaf2"
  alt_hub.py: |
    from leaf1 import leaf1_func
    from leaf2 import leaf2_func

    def hub_func():
        return leaf1_func() + leaf2_func()

    class HubManager:
        def orchestrate(self):
            return hub_func()
  leaf3.py: |
    def leaf3_func():
        return "leaf3"

    class Leaf3Processor:
        def process(self):
            return leaf3_func()
  auth_provider.py: |
    AUTH_TOKEN_PREFIX = "bearer"
    TOKEN_EXPIRY = 7200

    class AuthProvider:
        def authenticate(self, username: str):
            pass

changed:
  hub.py: |
    from leaf1 import leaf1_func
    from leaf2 import leaf2_func

    def hub_func():
        leaf1_func()
        leaf2_func()
        return "modified"
  leaf1.py: |
    def leaf1_func():
        return "leaf1"
  leaf2.py: |
    def leaf2_func():
        return "leaf2"
  alt_hub.py: |
    from leaf1 import leaf1_func
    from leaf2 import leaf2_func

    def hub_func():
        return leaf1_func() + leaf2_func()

    class HubManager:
        def orchestrate(self):
            return hub_func()
  leaf3.py: |
    def leaf3_func():
        return "leaf3"

    class Leaf3Processor:
        def process(self):
            return leaf3_func()
  auth_provider.py: |
    AUTH_TOKEN_PREFIX = "bearer"
    TOKEN_EXPIRY = 7200

    class AuthProvider:
        def authenticate(self, username: str):
            pass

must_include:
  - hub_func
  - modified

must_include_files:
  - hub.py

must_include_content_from:
  hub.py:
    - "def hub_func():"
    - 'return "modified"'

must_not_include:
  # --- alt_hub.py: HARDEST TRAP — same imports, same function name ---
  - HubManager
  - orchestrate
  # --- leaf3.py: sibling naming pattern ---
  - Leaf3Processor
  - leaf3_func
  # --- auth_provider.py: unrelated ---
  - AuthProvider
  - AUTH_TOKEN_PREFIX

must_not_include_files:
  - alt_hub.py
  - leaf3.py
  - auth_provider.py

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
