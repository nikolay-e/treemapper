initial:
  hub.py: |
    from leaf1 import leaf1_func
    from leaf2 import leaf2_func

    def hub_func():
        leaf1_func()
        leaf2_func()
  leaf1.py: |
    def leaf1_func():
        return "leaf1"
  leaf2.py: |
    def leaf2_func():
        return "leaf2"

  # --- Tricky garbage: also defines hub_func and imports leaves ---
  garbage_alt_hub.py: |
    from leaf1 import leaf1_func
    from leaf2 import leaf2_func
    GARBAGE_PPR_022_ALT_HUB_A = "alt_hub"
    GARBAGE_PPR_022_ALT_VER_B = "2.0"

    def hub_func():
        return leaf1_func() + leaf2_func()

    class HubManager:
        GARBAGE_PPR_022_ALT_MGR_C = True

        def orchestrate(self):
            return hub_func()

  # --- Tricky garbage: structural sibling — also a leaf-like module ---
  garbage_leaf3.py: |
    GARBAGE_PPR_022_LEAF3_INIT_D = "leaf3"
    GARBAGE_PPR_022_LEAF3_FLAG_E = True

    def leaf3_func():
        return "leaf3"

    class Leaf3Processor:
        GARBAGE_PPR_022_LEAF3_PROC_F = 33

        def process(self):
            return leaf3_func()

  # --- Plain garbage: no overlap ---
  garbage_auth.py: |
    GARBAGE_PPR_022_AUTH_TOKEN_G = "bearer_placeholder"
    GARBAGE_PPR_022_AUTH_EXP_H = 7200

    class AuthProvider:
        def authenticate(self, username: str):
            pass

changed:
  hub.py: |
    from leaf1 import leaf1_func
    from leaf2 import leaf2_func

    def hub_func():
        leaf1_func()
        leaf2_func()
        return "modified"
  leaf1.py: |
    def leaf1_func():
        return "leaf1"
  leaf2.py: |
    def leaf2_func():
        return "leaf2"

  garbage_alt_hub.py: |
    from leaf1 import leaf1_func
    from leaf2 import leaf2_func
    GARBAGE_PPR_022_ALT_HUB_A = "alt_hub"
    GARBAGE_PPR_022_ALT_VER_B = "2.0"

    def hub_func():
        return leaf1_func() + leaf2_func()

    class HubManager:
        GARBAGE_PPR_022_ALT_MGR_C = True

        def orchestrate(self):
            return hub_func()

  garbage_leaf3.py: |
    GARBAGE_PPR_022_LEAF3_INIT_D = "leaf3"
    GARBAGE_PPR_022_LEAF3_FLAG_E = True

    def leaf3_func():
        return "leaf3"

    class Leaf3Processor:
        GARBAGE_PPR_022_LEAF3_PROC_F = 33

        def process(self):
            return leaf3_func()

  garbage_auth.py: |
    GARBAGE_PPR_022_AUTH_TOKEN_G = "bearer_placeholder"
    GARBAGE_PPR_022_AUTH_EXP_H = 7200

    class AuthProvider:
        def authenticate(self, username: str):
            pass

# === Assertions ===

must_include:
- hub_func
- modified

must_include_files:
- hub.py

must_include_content_from:
  hub.py:
    - 'def hub_func():'
    - return "modified"

must_not_include:
# Plain garbage markers
- GARBAGE_PPR_022_AUTH_TOKEN_G
- GARBAGE_PPR_022_AUTH_EXP_H
# Tricky: redefines hub_func and imports same leaves
- GARBAGE_PPR_022_ALT_HUB_A
- GARBAGE_PPR_022_ALT_VER_B
- GARBAGE_PPR_022_ALT_MGR_C
# Tricky: structural sibling leaf module
- GARBAGE_PPR_022_LEAF3_INIT_D
- GARBAGE_PPR_022_LEAF3_FLAG_E
- GARBAGE_PPR_022_LEAF3_PROC_F

must_not_include_files:
- garbage_alt_hub.py
- garbage_leaf3.py
- garbage_auth.py

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
