# Scenario: Change in a cyclic dependency graph — mod0 -> mod1 -> mod2 -> mod0.
#   mod0.py changes encode() to also call validate() from mod1 before encoding.
#   The three modules form a tight cycle where each uses the next module's
#   return value: mod0.encode() calls mod1.transform(), mod1.transform()
#   calls mod2.checksum(), mod2.checksum() calls mod0.encode().
#
# Diff shows:
#   mod0.py: - return transform(data.upper())
#            + validated = validate(data)
#            + return transform(validated.upper())
#
# Reviewer questions:
#   Q1: "What does validate() return — is calling .upper() on it safe?"
#       -> validate() in mod1 returns a str (stripped input or raises).
#         Reviewer must see mod1.py to confirm the return type.
#
#   Q2: "Does this change affect the cycle? Could encode() -> transform()
#        -> checksum() -> encode() now behave differently?"
#       -> The cycle still works because validate() is a pure check that
#         returns the same type. But the reviewer needs to see mod1 and
#         mod2 to verify the cycle path is not broken.
#
#   Q3: "What does transform() do with the .upper() result?"
#       -> transform() passes it to checksum() which hashes it. The
#         reviewer needs mod1 and mod2 to trace the data flow.
#
# Not needed for comprehension:
#   - mod3-mod9: Extended chain hanging off the cycle. Each calls the
#     previous but none are on the cycle path (mod0->mod1->mod2->mod0).
#     Including them would add noise without helping understand the change.
#
#   - garbage_func0_clone.py: HARDEST TRAP — redefines encode() and
#     transform() locally, same names as the cycle functions.
#
#   - garbage_modifier.py: Uses "validated" string like the diff.
#
#   - garbage_chain.py: Calls transform() and checksum() — same function
#     names but from its own local definitions.

