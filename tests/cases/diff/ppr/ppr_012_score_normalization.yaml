# Scenario: two_changes_in_long_chain
#   A 10-function chain across separate files with real import/call
#   relationships. TWO functions at different positions change their
#   return values:
#     - parse_input (position 0) changes from returning raw string
#       to returning a stripped, lowercased string
#     - enrich_data (position 5) changes from returning dict as-is
#       to adding a "processed" flag
#
#   Chain: parse_input -> validate_format -> normalize_fields ->
#     extract_keys -> build_record -> enrich_data -> score_record ->
#     rank_result -> filter_top -> emit_output
#
# Diff shows:
#   stage0_parse.py:
#     - return raw_text
#     + return raw_text.strip().lower()
#     Input sanitization added. Downstream validate_format receives
#     cleaner strings.
#
#   stage5_enrich.py:
#     - return record
#     + return {**record, "processed": True}
#     Adds key to dict. Downstream score_record receives wider dict.
#
# Reviewer questions:
#   Q1: "Who consumes parse_input's return value directly?"
#       -> stage1_validate.py imports parse_input, passes result to
#         format checking. Reviewer must see whether validate_format
#         handles lowercased input correctly (e.g. case-sensitive checks).
#
#   Q2: "Who consumes enrich_data's return value?"
#       -> stage6_score.py imports enrich_data, reads dict keys to
#         compute a score. Reviewer must check whether the extra
#         "processed" key affects scoring logic.
#
#   Q3: "Is there coupling between the two changed functions?"
#       -> They're in the same chain but 5 steps apart. The parse
#         change propagates through intermediate stages before reaching
#         enrich. Reviewer needs both callers to verify independently.
#
# Not needed for comprehension:
#   - alt_parser.py: Defines its own parse_input() with different logic.
#     Name collision trap.
#
#   - garbage_enrichment_plugin.py: Has enrich_data-like naming with
#     GARBAGE markers. Different module entirely.
#
#   - stage8_filter.py / stage9_emit.py: Far downstream from both
#     changes. Their logic doesn't help review either change.

max_enrichment: 22.0
initial:
  stage0_parse.py: |
    def parse_input(raw_text):
        return raw_text

  stage1_validate.py: |
    from stage0_parse import parse_input

    def validate_format(raw_text):
        parsed = parse_input(raw_text)
        if not parsed:
            raise ValueError("empty input")
        return parsed

  stage2_normalize.py: |
    from stage1_validate import validate_format

    def normalize_fields(raw_text):
        valid = validate_format(raw_text)
        return valid.replace(",", ";")

  stage3_extract.py: |
    from stage2_normalize import normalize_fields

    def extract_keys(raw_text):
        normalized = normalize_fields(raw_text)
        parts = normalized.split(";")
        return {f"key_{i}": p.strip() for i, p in enumerate(parts)}

  stage4_build.py: |
    from stage3_extract import extract_keys

    def build_record(raw_text):
        keys = extract_keys(raw_text)
        keys["field_count"] = len(keys)
        return keys

  stage5_enrich.py: |
    from stage4_build import build_record

    def enrich_data(raw_text):
        record = build_record(raw_text)
        record["source"] = "pipeline"
        return record

  stage6_score.py: |
    from stage5_enrich import enrich_data

    def score_record(raw_text):
        enriched = enrich_data(raw_text)
        return len(enriched) * 10

  stage7_rank.py: |
    from stage6_score import score_record

    def rank_result(raw_text):
        score = score_record(raw_text)
        if score > 50:
            return "high"
        return "low"

  stage8_filter.py: |
    from stage7_rank import rank_result
    GARBAGE_PPR012_FILTER_A = "filter_stage"
    GARBAGE_PPR012_FILTER_B = 0

    def filter_top(raw_text):
        rank = rank_result(raw_text)
        GARBAGE_PPR012_FILTER_C = True
        return rank == "high"

  stage9_emit.py: |
    from stage8_filter import filter_top
    GARBAGE_PPR012_EMIT_D = "emit_stage"
    GARBAGE_PPR012_EMIT_E = []

    def emit_output(raw_text):
        accepted = filter_top(raw_text)
        GARBAGE_PPR012_EMIT_F = "done"
        return {"accepted": accepted, "text": raw_text}

  alt_parser.py: |
    GARBAGE_PPR012_ALT_G = "alt_parser"
    GARBAGE_PPR012_ALT_H = True

    def parse_input(text):
        GARBAGE_PPR012_ALT_I = ":"
        return text.split(GARBAGE_PPR012_ALT_I)

    class AltParseEngine:
        GARBAGE_PPR012_ALT_J = "engine"

        def run(self, text):
            return parse_input(text)

  garbage_enrichment_plugin.py: |
    GARBAGE_PPR012_PLUG_K = "enrichment_plugin"
    GARBAGE_PPR012_PLUG_L = False

    def enrich_data(record):
        GARBAGE_PPR012_PLUG_M = "extra"
        record[GARBAGE_PPR012_PLUG_M] = True
        return record

    class EnrichmentPlugin:
        GARBAGE_PPR012_PLUG_N = 1

        def apply(self, record):
            return enrich_data(record)

