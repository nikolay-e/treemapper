  changed_files:
    src/finance/exchange_rate.rs: |
      use std::collections::HashMap;

      pub struct ExchangeRateCache {
          rates: HashMap<(String, String), f64>,
      }

      impl ExchangeRateCache {
          pub fn new() -> Self {
              Self { rates: HashMap::new() }
          }

          pub fn set(&mut self, from: &str, to: &str, rate: f64) {
              self.rates.insert((from.to_string(), to.to_string()), rate);
          }

          pub fn convert(&self, amount: f64, from: &str, to: &str) -> Option<f64> {
              if from == to {
                  return Some(amount);
              }
              let direct = self.rates.get(&(from.to_string(), to.to_string())).copied();
              let inverse = self.rates.get(&(to.to_string(), from.to_string()))
                  .map(|&r| 1.0 / r);
              direct.or(inverse).map(|rate| amount * rate)
          }
      }
    src/finance/fx_service.rs: |
      use crate::finance::exchange_rate::ExchangeRateCache;

      pub struct FxService {
          cache: ExchangeRateCache,
      }

      impl FxService {
          pub fn new(cache: ExchangeRateCache) -> Self {
              Self { cache }
          }

          pub fn convert(&self, amount: f64, from: &str, to: &str) -> Result<f64, String> {
              self.cache.convert(amount, from, to)
                  .ok_or_else(|| format!("no rate for {}->{}", from, to))
          }
      }
