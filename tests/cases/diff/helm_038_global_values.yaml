repo:
  initial_files:
    include/net/packet_parser.hpp: |
      #pragma once
      #include <cstdint>
      #include <vector>
      #include <optional>

      namespace net {

      struct PacketHeader {
          uint16_t version;
          uint16_t type;
          uint32_t payload_length;
          uint32_t sequence_number;
      };

      class PacketParser {
      public:
          std::optional<PacketHeader> parse_header(const std::vector<uint8_t>& raw) const;
          std::vector<uint8_t> extract_payload(const std::vector<uint8_t>& raw) const;

      private:
          static constexpr size_t HEADER_SIZE = 12;
      };

      } // namespace net
    src/net/packet_dispatcher.cpp: |
      #include "net/packet_parser.hpp"
      #include <functional>
      #include <unordered_map>

      namespace net {

      class PacketDispatcher {
      public:
          using Handler = std::function<void(const std::vector<uint8_t>&)>;

          void register_handler(uint16_t type, Handler h) {
              handlers_[type] = std::move(h);
          }

          void dispatch(const std::vector<uint8_t>& raw) {
              PacketParser parser;
              auto header = parser.parse_header(raw);
              if (!header) return;
              auto it = handlers_.find(header->type);
              if (it != handlers_.end()) {
                  it->second(parser.extract_payload(raw));
              }
          }

      private:
          std::unordered_map<uint16_t, Handler> handlers_;
      };

      } // namespace net
