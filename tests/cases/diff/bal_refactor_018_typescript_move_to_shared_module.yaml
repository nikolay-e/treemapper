repo:
  initial_files:
    src/features/billing/validateCard.ts: |
      export function validateCard(number: string): boolean {
          const digits = number.replace(/\s/g, '');
          if (digits.length < 13 || digits.length > 19) return false;
          let sum = 0;
          let alternate = false;
          for (let i = digits.length - 1; i >= 0; i--) {
              let n = parseInt(digits[i], 10);
              if (alternate) {
                  n *= 2;
                  if (n > 9) n -= 9;
              }
              sum += n;
              alternate = !alternate;
          }
          return sum % 10 === 0;
      }
    src/features/billing/billingForm.ts: |
      import { validateCard } from './validateCard';

      export function processBillingForm(cardNumber: string, amount: number) {
          if (!validateCard(cardNumber)) {
              throw new Error('Invalid card number');
          }
          return { cardNumber, amount, status: 'pending' };
      }
    src/features/subscription/subscriptionForm.ts: |
      function validateCard(number: string): boolean {
          const digits = number.replace(/\s/g, '');
          if (digits.length < 13 || digits.length > 19) return false;
          let sum = 0;
          let alternate = false;
          for (let i = digits.length - 1; i >= 0; i--) {
              let n = parseInt(digits[i], 10);
              if (alternate) {
                  n *= 2;
                  if (n > 9) n -= 9;
              }
              sum += n;
              alternate = !alternate;
          }
          return sum % 10 === 0;
      }

      export function processSubscription(cardNumber: string, plan: string) {
          if (!validateCard(cardNumber)) {
              throw new Error('Invalid card number');
          }
          return { cardNumber, plan, status: 'active' };
      }
    src/features/checkout/checkoutPage.ts: |
