name: bal3_1hop_016_ruby_user_model
tags:
- lang:ruby
- change:single_file
- context:import_chain
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    lib/models/user.rb: |
      module Models
        class User
          attr_reader :id, :email, :name

          def initialize(id:, email:, name:)
            @id = id
            @email = email
            @name = name
          end

          def display_name
            name.strip
          end
        end
      end
    lib/services/user_service.rb: |
      require_relative '../models/user'

      module Services
        class UserService
          def initialize
            @users = {}
          end

          def create(id:, email:, name:)
            user = Models::User.new(id: id, email: email, name: name)
            @users[id] = user
            user
          end

          def find(id)
            @users[id]
          end
        end
      end
    lib/services/auth_service.rb: |
      require_relative '../models/user'

      module Services
        class AuthService
          def initialize(user_service)
            @user_service = user_service
          end

          def authenticate(id)
            user = @user_service.find(id)
            return nil unless user
            user
          end
        end
      end
    lib/services/notification_service.rb: |
      require_relative '../models/user'

      module Services
        class NotificationService
          def notify(user)
            "Notifying #{user.display_name} at #{user.email}"
          end
        end
      end
    lib/utils/string_helpers.rb: |
      GARBAGE_016_STRING_A = "string_helpers"

      module Utils
        module StringHelpers
          def self.truncate(str, length)
            str[0...length]
          end
        end
      end
    lib/utils/date_helpers.rb: |
      GARBAGE_016_DATE_B = "date_helpers"

      module Utils
        module DateHelpers
          def self.format(date)
            date.strftime("%Y-%m-%d")
          end
        end
      end
    lib/utils/number_helpers.rb: |
      GARBAGE_016_NUMBER_C = "number_helpers"

      module Utils
        module NumberHelpers
          def self.format_currency(amount)
            "$#{amount}"
          end
        end
      end
  changed_files:
    lib/models/user.rb: |
      module Models
        class User
          attr_reader :id, :email, :name, :role, :active

          def initialize(id:, email:, name:, role: 'member', active: true)
            @id = id
            @email = email
            @name = name
            @role = role
            @active = active
          end

          def display_name
            name.strip
          end

          def admin?
            role == 'admin'
          end

          def deactivate!
            @active = false
          end
        end
      end
  commit_message: "feat: add role, active status, admin? and deactivate! to User"
