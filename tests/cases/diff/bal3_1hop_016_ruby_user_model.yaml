      import heapq
      import time
      from dataclasses import dataclass, field
      from typing import Callable, Optional

      @dataclass(order=True)
      class ScheduledTask:
          run_at: float
          task_id: str = field(compare=False)
          callback: Callable = field(compare=False)

      class TaskScheduler:
          def __init__(self):
              self._queue: list = []
              self._task_ids: set = set()

          def schedule(self, task_id: str, delay_seconds: float, callback: Callable) -> None:
              if delay_seconds < 0:
                  raise ValueError("delay_seconds must be non-negative")
              if task_id in self._task_ids:
                  raise ValueError(f"task already scheduled: {task_id}")
              task = ScheduledTask(
                  run_at=time.monotonic() + delay_seconds,
                  task_id=task_id,
                  callback=callback,
              )
              heapq.heappush(self._queue, task)
              self._task_ids.add(task_id)

          def cancel(self, task_id: str) -> bool:
              if task_id not in self._task_ids:
                  return False
              self._task_ids.discard(task_id)
              self._queue = [t for t in self._queue if t.task_id != task_id]
              heapq.heapify(self._queue)
              return True

          def tick(self) -> int:
              now = time.monotonic()
              ran = 0
              while self._queue and self._queue[0].run_at <= now:
                  task = heapq.heappop(self._queue)
                  if task.task_id not in self._task_ids:
                      continue
                  self._task_ids.discard(task.task_id)
                  task.callback()
                  ran += 1
              return ran

          def pending_count(self) -> int:
              return len(self._task_ids)
