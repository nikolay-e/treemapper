      import pytest
      import time
      from src.tasks.scheduler import TaskScheduler

      def test_schedule_and_tick_runs_callback():
          scheduler = TaskScheduler()
          results = []
          scheduler.schedule("task-1", 0.0, lambda: results.append("done"))
          scheduler.tick()
          assert "done" in results

      def test_schedule_duplicate_id_raises():
          scheduler = TaskScheduler()
          scheduler.schedule("task-x", 10.0, lambda: None)
          with pytest.raises(ValueError, match="already scheduled"):
              scheduler.schedule("task-x", 10.0, lambda: None)

      def test_pending_count_decrements_after_tick():
          scheduler = TaskScheduler()
          scheduler.schedule("a", 0.0, lambda: None)
          scheduler.schedule("b", 0.0, lambda: None)
          assert scheduler.pending_count() == 2
          scheduler.tick()
          assert scheduler.pending_count() == 0
