# Scenario: default.nix imports a package derivation from packages/myapp.nix,
# and the package derivation adds a new build dependency.
# The reviewer needs to see default.nix to understand how the package is integrated.
#
# Reviewer questions:
#   Q1: "How is myapp.nix consumed by the top-level derivation?"
#       -> default.nix: imports ./packages/myapp.nix and passes pkgs
#   Q2: "What new dependency was added to myapp?"
#       -> packages/myapp.nix: adds pkgs.openssl to buildInputs
#
# Not needed:
#   - packages/utils.nix: sibling package, unrelated derivation
#   - packages/cli.nix: another sibling package, not imported by changed code

initial:
  default.nix: |
    { pkgs ? import <nixpkgs> {} }:

    let
      myapp = import ./packages/myapp.nix { inherit pkgs; };
      utils = import ./packages/utils.nix { inherit pkgs; };
    in
    pkgs.buildEnv {
      name = "myproject-env";
      paths = [
        myapp
        utils
      ];
    }
  packages/myapp.nix: |
    { pkgs }:

    pkgs.stdenv.mkDerivation {
      pname = "myapp";
      version = "1.0.0";

      src = ../src/myapp;

      buildInputs = [
        pkgs.python3
        pkgs.zlib
      ];

      buildPhase = ''
        python3 setup.py build
      '';

      installPhase = ''
        mkdir -p $out/bin
        cp -r build/lib/* $out/bin/
      '';
    }
  packages/utils.nix: |
    { pkgs }:

    GARBAGE_NIX_001_A = "noise_utils_nix";

    pkgs.stdenv.mkDerivation {
      pname = "utils";
      version = "0.5.0";

      src = ../src/utils;

      buildInputs = [
        pkgs.python3
      ];

      buildPhase = ''
        python3 setup.py build
      '';

      installPhase = ''
        mkdir -p $out/lib
        cp -r build/lib/* $out/lib/
      '';
    }

  # Trap: another sibling package
  packages/cli.nix: |
    { pkgs }:

    GARBAGE_NIX_001_B = "noise_cli_nix";

    pkgs.stdenv.mkDerivation {
      pname = "cli-tool";
      version = "0.2.0";

      src = ../src/cli;

      buildInputs = [
        pkgs.go
      ];

      buildPhase = ''
        go build -o cli-tool .
      '';

      installPhase = ''
        mkdir -p $out/bin
        cp cli-tool $out/bin/
      '';
    }

  # Trap: shell.nix is similar structure but unrelated
  shell.nix: |
    { pkgs ? import <nixpkgs> {} }:

    GARBAGE_NIX_001_C = "noise_shell_nix";

    pkgs.mkShell {
      buildInputs = [
        pkgs.python3
        pkgs.go
        pkgs.nodejs
      ];
    }

changed:
  default.nix: |
    { pkgs ? import <nixpkgs> {} }:

    let
      myapp = import ./packages/myapp.nix { inherit pkgs; };
      utils = import ./packages/utils.nix { inherit pkgs; };
    in
    pkgs.buildEnv {
      name = "myproject-env";
      paths = [
        myapp
        utils
      ];
    }
  packages/myapp.nix: |
    { pkgs }:

    pkgs.stdenv.mkDerivation {
      pname = "myapp";
      version = "1.1.0";

      src = ../src/myapp;

      buildInputs = [
        pkgs.python3
        pkgs.zlib
        pkgs.openssl
        pkgs.curl
      ];

      nativeBuildInputs = [
        pkgs.pkg-config
      ];

      buildPhase = ''
        export PKG_CONFIG_PATH="${pkgs.openssl.dev}/lib/pkgconfig"
        python3 setup.py build
      '';

      installPhase = ''
        mkdir -p $out/bin
        cp -r build/lib/* $out/bin/
      '';
    }
  packages/utils.nix: |
    { pkgs }:

    GARBAGE_NIX_001_A = "noise_utils_nix";

    pkgs.stdenv.mkDerivation {
      pname = "utils";
      version = "0.5.0";

      src = ../src/utils;

      buildInputs = [
        pkgs.python3
      ];

      buildPhase = ''
        python3 setup.py build
      '';

      installPhase = ''
        mkdir -p $out/lib
        cp -r build/lib/* $out/lib/
      '';
    }
  packages/cli.nix: |
    { pkgs }:

    GARBAGE_NIX_001_B = "noise_cli_nix";

    pkgs.stdenv.mkDerivation {
      pname = "cli-tool";
      version = "0.2.0";

      src = ../src/cli;

      buildInputs = [
        pkgs.go
      ];

      buildPhase = ''
        go build -o cli-tool .
      '';

      installPhase = ''
        mkdir -p $out/bin
        cp cli-tool $out/bin/
      '';
    }
  shell.nix: |
    { pkgs ? import <nixpkgs> {} }:

    GARBAGE_NIX_001_C = "noise_shell_nix";

    pkgs.mkShell {
      buildInputs = [
        pkgs.python3
        pkgs.go
        pkgs.nodejs
      ];
    }

must_include_files:
- packages/myapp.nix
- default.nix

must_include_content_from:
  packages/myapp.nix:
    - pkgs.openssl
    - pkgs.curl
    - pkg-config
  default.nix:
    - ./packages/myapp.nix

must_not_include:
- GARBAGE_NIX_001_A
- GARBAGE_NIX_001_B
- GARBAGE_NIX_001_C

must_not_include_files:
- packages/utils.nix
- packages/cli.nix
- shell.nix

max_files: 3
add_garbage_files: false
skip_garbage_check: true
