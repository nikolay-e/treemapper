- context:config_to_code
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    config/queue.yaml: |
      broker_url: "amqp://localhost:5672"
      concurrency: 4
      prefetch: 1
      queues:
        default:
          priority: 0
        critical:
          priority: 9
    internal/worker/worker.go: |
      package worker

      import (
        "os"

        "gopkg.in/yaml.v3"
      )

      type QueueConfig struct {
        BrokerURL   string `yaml:"broker_url"`
        Concurrency int    `yaml:"concurrency"`
        Prefetch    int    `yaml:"prefetch"`
        Queues      map[string]struct {
          Priority int `yaml:"priority"`
        } `yaml:"queues"`
      }

      func LoadQueueConfig() (*QueueConfig, error) {
        data, err := os.ReadFile("config/queue.yaml")
        if err != nil {
          return nil, err
        }
        var cfg QueueConfig
        yaml.Unmarshal(data, &cfg)
        return &cfg, nil
      }

      func (c *QueueConfig) GetPriority(name string) int {
        if q, ok := c.Queues[name]; ok {
          return q.Priority
        }
        return 0
      }
    internal/producer/producer.go: |
      package producer

      import (
        "os"

        "gopkg.in/yaml.v3"
      )

      type brokerCfg struct {
        BrokerURL string `yaml:"broker_url"`
      }

      func GetBrokerURL() string {
        data, _ := os.ReadFile("config/queue.yaml")
        var cfg brokerCfg
        yaml.Unmarshal(data, &cfg)
        return cfg.BrokerURL
      }

      func Publish(queue string, message []byte) error {
        _ = GetBrokerURL()
        return nil
      }
    internal/scheduler/cron.go: |
      package scheduler

      import (
        "os"

        "gopkg.in/yaml.v3"
      )

      type qCfg struct {
        Concurrency int `yaml:"concurrency"`
      }

      func MaxConcurrency() int {
        data, _ := os.ReadFile("config/queue.yaml")
        var cfg qCfg
        yaml.Unmarshal(data, &cfg)
        return cfg.Concurrency
      }
    internal/search/indexer.go: |
      package search

      var GARBAGE_CFGCODE_028_SEARCH_A = "elastic"
      var GARBAGE_CFGCODE_028_SEARCH_B = "http://localhost:9200"

      func Index(doc string) error {
        return nil
      }
    internal/notification/push.go: |
      package notification

      var GARBAGE_CFGCODE_028_PUSH_C = "fcm"
      var GARBAGE_CFGCODE_028_PUSH_D = "key-placeholder"

      func Send(token string, msg string) error {
        return nil
