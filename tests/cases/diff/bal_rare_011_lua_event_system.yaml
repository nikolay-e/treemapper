  changed_files:
    src/event.lua: |
      local Event = {}
      Event.__index = Event

      function Event.new()
        return setmetatable({listeners = {}}, Event)
      end

      function Event:on(name, callback)
        if not self.listeners[name] then
          self.listeners[name] = {}
        end
        table.insert(self.listeners[name], callback)
      end

      function Event:off(name, callback)
        local callbacks = self.listeners[name]
        if callbacks then
          for i, cb in ipairs(callbacks) do
            if cb == callback then
              table.remove(callbacks, i)
              return true
            end
          end
        end
        return false
      end

      function Event:emit(name, ...)
        local callbacks = self.listeners[name]
        if callbacks then
          for _, cb in ipairs(callbacks) do
            cb(...)
          end
        end
      end

      return Event
    src/player.lua: |
      local Event = require("src.event")

      local Player = {}
      Player.__index = Player

      function Player.new(name)
        local self = setmetatable({}, Player)
        self.name = name
        self.health = 100
        self.events = Event.new()
        return self
      end

      function Player:take_damage(amount)
        self.health = math.max(0, self.health - amount)
        self.events:emit("damage", self, amount)
        if self.health == 0 then
          self.events:emit("death", self)
        end
      end

      function Player:heal(amount)
        local old_health = self.health
        self.health = math.min(100, self.health + amount)
        if self.health > old_health then
          self.events:emit("heal", self, self.health - old_health)
        end
      end

      return Player
