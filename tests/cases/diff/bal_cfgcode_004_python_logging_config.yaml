name: bal_cfgcode_004_python_logging_config
tags:
- lang:python
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/logging.toml: |
      [logging]
      level = "DEBUG"
      format = "%(asctime)s %(levelname)s %(message)s"
      file = "app.log"
      max_bytes = 1048576
    src/logger.py: |
      import tomllib

      def setup_logging():
          with open("config/logging.toml", "rb") as f:
              cfg = tomllib.load(f)
          log_cfg = cfg["logging"]
          level = log_cfg["level"]
          fmt = log_cfg["format"]
          logfile = log_cfg["file"]
          return level, fmt, logfile
    src/handlers.py: |
      GARBAGE_CFGCODE_004_HANDLER_A = "stream"
      GARBAGE_CFGCODE_004_HANDLER_B = 1024

      class StreamHandler:
          def emit(self, record):
              pass

      class NullHandler:
          def emit(self, record):
              pass
    src/validators.py: |
      GARBAGE_CFGCODE_004_VALID_C = "check"
      GARBAGE_CFGCODE_004_VALID_D = False

      def validate_email(email):
          return "@" in email
  changed_files:
    config/logging.toml: |
      [logging]
      level = "WARNING"
      format = "%(asctime)s %(name)s %(levelname)s %(message)s"
      file = "app.log"
      max_bytes = 10485760
      rotation = "daily"
    src/logger.py: |
      import tomllib

      def setup_logging():
          with open("config/logging.toml", "rb") as f:
              cfg = tomllib.load(f)
          log_cfg = cfg["logging"]
          level = log_cfg["level"]
          fmt = log_cfg["format"]
          logfile = log_cfg["file"]
          return level, fmt, logfile
    src/handlers.py: |
      GARBAGE_CFGCODE_004_HANDLER_A = "stream"
      GARBAGE_CFGCODE_004_HANDLER_B = 1024

      class StreamHandler:
          def emit(self, record):
              pass

      class NullHandler:
          def emit(self, record):
              pass
    src/validators.py: |
      GARBAGE_CFGCODE_004_VALID_C = "check"
      GARBAGE_CFGCODE_004_VALID_D = False

      def validate_email(email):
          return "@" in email
