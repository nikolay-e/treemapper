          def find_by_email(self, email: str) -> Optional[Contact]:
              return next((c for c in self.contacts if c.email == email), None)

          def list_all(self) -> List[Contact]:
              return self.contacts
    garbage_generic_store.py: |
      from typing import Generic, TypeVar, Optional, List
      GARBAGE_GRAPH_004_GENERIC_STORE_D = "store"
      GARBAGE_GRAPH_004_GENERIC_STORE_E = 50

      S = TypeVar('S')

      class GenericStore(Generic[S]):
          GARBAGE_GRAPH_004_GENERIC_STORE_F = True

          def __init__(self):
              self.items: List[S] = []

          def get(self, index: int) -> Optional[S]:
              return self.items[index] if index < len(self.items) else None

          def add(self, item: S) -> S:
              self.items.append(item)
              return item
