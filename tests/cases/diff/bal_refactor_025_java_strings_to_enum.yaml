  changed_files:
    app/models/order.rb: |
      class Order
        STATUSES = %w[pending processing shipped delivered cancelled].freeze
        VALID_TRANSITIONS = {
          "pending"    => %w[processing cancelled],
          "processing" => %w[shipped cancelled],
          "shipped"    => %w[delivered],
          "delivered"  => [],
          "cancelled"  => [],
        }.freeze

        attr_reader :id, :status, :total

        def initialize(id:, total:)
          @id = id
          @total = total
          @status = "pending"
        end

        def transition_to(new_status)
          unless VALID_TRANSITIONS.fetch(status, []).include?(new_status)
            raise ArgumentError, "cannot transition from #{status} to #{new_status}"
          end
          @status = new_status
        end

        def shippable?
          status == "processing"
        end

        def cancellable?
          VALID_TRANSITIONS[status]&.include?("cancelled") || false
        end

        def calculate_tax
          total * 0.2
        end

        def total_with_tax
          total + calculate_tax
        end
      end
