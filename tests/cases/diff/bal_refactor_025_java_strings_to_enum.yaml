    app/models/order.rb: |
      class Order
        STATUSES = %w[pending processing shipped delivered cancelled].freeze

        attr_reader :id, :status, :total

        def initialize(id:, total:)
          @id = id
          @total = total
          @status = "pending"
        end

        def transition_to(new_status)
          unless STATUSES.include?(new_status)
            raise ArgumentError, "invalid status: #{new_status}"
          end
          @status = new_status
        end

        def shippable?
          status == "processing"
        end

        def cancellable?
          %w[pending processing].include?(status)
        end

        def calculate_tax
          total * 0.2
        end

        def total_with_tax
          total + calculate_tax
        end
      end
