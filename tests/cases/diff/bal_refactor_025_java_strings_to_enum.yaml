  changed_files:
    src/main/java/com/app/model/TicketStatus.java: |
      package com.app.model;

      public enum TicketStatus {
          OPEN, IN_PROGRESS, RESOLVED, CLOSED
      }
    src/main/java/com/app/model/Ticket.java: |
      package com.app.model;

      public class Ticket {
          private String id;
          private String title;
          private TicketStatus status;

          public Ticket(String id, String title) {
              this.id = id;
              this.title = title;
              this.status = TicketStatus.OPEN;
          }

          public void resolve() {
              if (status != TicketStatus.OPEN && status != TicketStatus.IN_PROGRESS) {
                  throw new IllegalStateException("cannot resolve");
              }
              this.status = TicketStatus.RESOLVED;
          }

          public void close() {
              if (status != TicketStatus.RESOLVED) {
                  throw new IllegalStateException("must resolve first");
              }
              this.status = TicketStatus.CLOSED;
          }

          public TicketStatus getStatus() { return status; }
          public String getId() { return id; }
          public String getTitle() { return title; }
      }
    src/main/java/com/app/service/TicketService.java: |
      package com.app.service;

      import com.app.model.Ticket;
      import com.app.model.TicketStatus;
      import java.util.ArrayList;
      import java.util.List;

      public class TicketService {
          private final List<Ticket> tickets = new ArrayList<>();

          public void addTicket(Ticket ticket) {
              tickets.add(ticket);
          }

          public List<Ticket> getOpenTickets() {
              List<Ticket> result = new ArrayList<>();
              for (Ticket t : tickets) {
                  if (t.getStatus() == TicketStatus.OPEN) {
                      result.add(t);
                  }
              }
              return result;
          }

          public List<Ticket> getResolvedTickets() {
              List<Ticket> result = new ArrayList<>();
              for (Ticket t : tickets) {
                  if (t.getStatus() == TicketStatus.RESOLVED) {
                      result.add(t);
                  }
              }
              return result;
          }
      }
