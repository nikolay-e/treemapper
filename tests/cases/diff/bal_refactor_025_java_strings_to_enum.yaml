      package com.app.view;

      import com.app.model.Ticket;

      public class TicketView {
          public String renderBadge(Ticket ticket) {
              String color;
              switch (ticket.getStatus()) {
                  case "open": color = "blue"; break;
                  case "in_progress": color = "yellow"; break;
                  case "resolved": color = "green"; break;
                  case "closed": color = "gray"; break;
                  default: color = "white";
              }
              return "<badge color=\"" + color + "\">" + ticket.getStatus() + "</badge>";
          }
      }
