    src/main/java/com/app/model/Ticket.java: |
      package com.app.model;

      public class Ticket {
          private String id;
          private String title;
          private String status;

          public Ticket(String id, String title) {
              this.id = id;
              this.title = title;
              this.status = "open";
          }

          public void resolve() {
              if (!"open".equals(status) && !"in_progress".equals(status)) {
                  throw new IllegalStateException("cannot resolve");
              }
              this.status = "resolved";
          }

          public void close() {
              if (!"resolved".equals(status)) {
                  throw new IllegalStateException("must resolve first");
              }
              this.status = "closed";
          }

          public String getStatus() { return status; }
          public String getId() { return id; }
          public String getTitle() { return title; }
      }
    src/main/java/com/app/service/TicketService.java: |
      package com.app.service;

      import com.app.model.Ticket;
      import java.util.ArrayList;
      import java.util.List;

      public class TicketService {
          private final List<Ticket> tickets = new ArrayList<>();

          public void addTicket(Ticket ticket) {
              tickets.add(ticket);
          }

          public List<Ticket> getOpenTickets() {
              List<Ticket> result = new ArrayList<>();
              for (Ticket t : tickets) {
                  if ("open".equals(t.getStatus())) {
                      result.add(t);
                  }
              }
              return result;
          }

          public List<Ticket> getResolvedTickets() {
              List<Ticket> result = new ArrayList<>();
              for (Ticket t : tickets) {
                  if ("resolved".equals(t.getStatus())) {
                      result.add(t);
                  }
              }
              return result;
          }
      }
