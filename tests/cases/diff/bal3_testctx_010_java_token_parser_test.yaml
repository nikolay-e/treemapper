      package com.lang;

      import java.util.ArrayList;
      import java.util.List;

      public class TokenParser {
          public List<String> parse(String input) {
              List<String> tokens = new ArrayList<>();
              StringBuilder current = new StringBuilder();
              for (char c : input.toCharArray()) {
                  if (Character.isWhitespace(c)) {
                      if (current.length() > 0) {
                          tokens.add(current.toString());
                          current.setLength(0);
                      }
                  } else {
                      current.append(c);
                  }
              }
              if (current.length() > 0) {
                  tokens.add(current.toString());
              }
              return tokens;
          }
      }
    src/test/java/com/lang/TokenParserTest.java: |
      package com.lang;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;
      import java.util.List;

      class TokenParserTest {
          private final TokenParser parser = new TokenParser();

          @Test
          void testSimpleParse() {
              List<String> tokens = parser.parse("hello world");
              assertEquals(2, tokens.size());
              assertEquals("hello", tokens.get(0));
          }

          @Test
          void testEmptyInput() {
              List<String> tokens = parser.parse("");
              assertTrue(tokens.isEmpty());
          }

          @Test
          void testMultipleSpaces() {
              List<String> tokens = parser.parse("a   b   c");
              assertEquals(3, tokens.size());
          }
      }
