      class Encryption
        def self.hash(value)
          require 'digest'
          Digest::SHA256.hexdigest(value)
        end
      end
  changed_files:
    lib/token_store.rb: |
      require 'securerandom'

      class TokenStore
        def initialize(ttl_seconds: 3600)
          @tokens = {}
          @ttl = ttl_seconds
        end

        def generate(user_id)
          token = SecureRandom.hex(16)
          @tokens[token] = { user_id: user_id, created_at: Time.now }
          token
        end

        def verify(token)
          entry = @tokens[token]
          return nil unless entry
          if Time.now - entry[:created_at] > @ttl
            @tokens.delete(token)
            return nil
          end
          entry[:user_id]
        end

        def revoke(token)
          @tokens.delete(token)
        end

        def revoke_all(user_id)
          @tokens.reject! { |_, v| v[:user_id] == user_id }
        end

        def active_count
          cleanup_expired
          @tokens.size
        end

        private

        def cleanup_expired
          now = Time.now
          @tokens.reject! { |_, v| now - v[:created_at] > @ttl }
        end
      end
  commit_message: "refactor: add TTL expiration, revoke_all, active_count"
