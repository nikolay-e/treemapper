    lib/token_store.rb: |
      require 'securerandom'

      class TokenStore
        def initialize
          @tokens = {}
        end

        def generate(user_id)
          token = SecureRandom.hex(16)
          @tokens[token] = user_id
          token
        end

        def verify(token)
