    spec/token_store_spec.rb: |
      require_relative '../lib/token_store'

      RSpec.describe TokenStore do
        subject { described_class.new }

        describe '#generate' do
          it 'returns a token string' do
            token = subject.generate('user_1')
            expect(token).to be_a(String)
            expect(token.length).to eq(32)
          end
        end

        describe '#verify' do
          it 'returns user_id for valid token' do
            token = subject.generate('user_1')
            expect(subject.verify(token)).to eq('user_1')
          end

          it 'returns nil for unknown token' do
            expect(subject.verify('bogus')).to be_nil
          end
        end

        describe '#revoke' do
          it 'invalidates the token' do
            token = subject.generate('user_1')
            subject.revoke(token)
            expect(subject.verify(token)).to be_nil
          end
        end
      end
