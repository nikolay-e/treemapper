    src/Notifications/INotification.cs: |
      using System;
      using System.Threading.Tasks;

      namespace App.Notifications
      {
          public interface INotification
          {
              string Recipient { get; }
              Task Send();
          }
      }
    src/Notifications/EmailNotification.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Notifications;

      namespace App.Notifications
      {
          public class EmailNotification : INotification
          {
              public string Recipient { get; }
              private readonly string _subject;
              private readonly string _body;

              public EmailNotification(string to, string subject, string body)
              {
                  Recipient = to;
                  _subject = subject;
                  _body = body;
              }

              public async Task Send()
              {
                  Console.WriteLine($"Email to {Recipient}: {_subject}");
                  await Task.CompletedTask;
              }
          }
      }
    src/Notifications/SmsNotification.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Notifications;

      namespace App.Notifications
      {
          public class SmsNotification : INotification
          {
              public string Recipient { get; }
              private readonly string _message;

              public SmsNotification(string phone, string message)
              {
                  Recipient = phone;
                  _message = message;
              }

              public async Task Send()
              {
                  Console.WriteLine($"SMS to {Recipient}: {_message}");
                  await Task.CompletedTask;
              }
          }
      }
    src/Services/NotificationDispatcher.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Factories;
      using App.Notifications;

      namespace App.Services
      {
          public class NotificationDispatcher
          {
              private readonly NotificationFactory _factory;

              public NotificationDispatcher(NotificationFactory factory)
              {
                  _factory = factory;
              }

              public async Task NotifyByEmail(string to, string subject, string body)
              {
                  var notification = _factory.CreateEmail(to, subject, body);
                  await notification.Send();
              }

              public async Task NotifyBySms(string phone, string message)
              {
                  var notification = _factory.CreateSms(phone, message);
                  await notification.Send();
              }
          }
      }
    src/Controllers/NotificationController.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Services;
      using Microsoft.AspNetCore.Mvc;

      namespace App.Controllers
      {
          [ApiController]
          [Route("api/notifications")]
          public class NotificationController : ControllerBase
          {
              private readonly NotificationDispatcher _dispatcher;

              public NotificationController(NotificationDispatcher dispatcher)
              {
                  _dispatcher = dispatcher;
              }

              [HttpPost("email")]
              public async Task<IActionResult> SendEmail(string to, string subject, string body)
              {
                  await _dispatcher.NotifyByEmail(to, subject, body);
                  return Ok();
              }
          }
      }
