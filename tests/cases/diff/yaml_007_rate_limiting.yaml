              count = self._counters.get(client_id, 0)
              if count >= self.rpm:
                  return False
              self._counters[client_id] = count + 1
              return True

          def reset(self):
              self._counters.clear()
    config/throttle.yaml: |
      throttle:
        endpoints:
          /api/search:
            requests_per_minute: 30
            burst: 5
          /api/export:
            requests_per_minute: 10
            burst: 2
        default:
          requests_per_minute: 60
    src/ip_blocker.py: |
      from datetime import datetime, timedelta

      class IpBlocker:
          def __init__(self, block_duration_minutes: int = 30):
              self.block_duration = timedelta(minutes=block_duration_minutes)
              self._blocked: dict[str, datetime] = {}

          def block(self, ip_address: str):
              self._blocked[ip_address] = datetime.utcnow()

          def is_blocked(self, ip_address: str) -> bool:
              if ip_address not in self._blocked:
