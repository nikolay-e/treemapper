name: scala_011_for_comprehension
xfail:
  category: scala-over-discovery
repo:
  initial_files:
    Repository.scala: |
      case class User(id: String, name: String)
      case class Order(id: String, userId: String, total: Double)

      class Repository {
        def getUser(id: String): Option[User] = Some(User(id, "John"))
        def getOrders(user: User): Option[List[Order]] = Some(List(Order("o1", user.id, 100.0)))
      }
    OrderService.scala: |
      class OrderService {}
    OrderValidator.scala: |
      class OrderValidator {
        def isValid(order: Order): Boolean =
          order.id.nonEmpty && order.total > 0

        def validateBatch(orders: List[Order]): List[String] =
          orders.filterNot(isValid).map(o => s"Invalid order: ${o.id}")

        def maxOrderAmount: Double = 10000.0
      }
    UserCache.scala: |
      class UserCache {
        private var cache: Map[String, User] = Map.empty

        def getUser(id: String): Option[User] = cache.get(id)

        def putUser(user: User): Unit = {
          cache = cache + (user.id -> user)
        }

        def invalidate(id: String): Unit = {
          cache = cache - id
        }

        def size: Int = cache.size
      }
  changed_files:
    Repository.scala: |
      case class User(id: String, name: String)
      case class Order(id: String, userId: String, total: Double)

      class Repository {
        def getUser(id: String): Option[User] = Some(User(id, "John"))
        def getOrders(user: User): Option[List[Order]] = Some(List(Order("o1", user.id, 100.0)))
      }
    OrderService.scala: |
      class OrderService(repo: Repository) {
        def getUserOrders(userId: String): Option[List[Order]] = {
          for {
            user <- repo.getUser(userId)
            orders <- repo.getOrders(user)
          } yield orders
        }

        def getTotalForUser(userId: String): Option[Double] = {
          for {
            user <- repo.getUser(userId)
            orders <- repo.getOrders(user)
            total = orders.map(_.total).sum
          } yield total
        }
      }
    OrderValidator.scala: |
      class OrderValidator {
        def isValid(order: Order): Boolean =
          order.id.nonEmpty && order.total > 0

        def validateBatch(orders: List[Order]): List[String] =
          orders.filterNot(isValid).map(o => s"Invalid order: ${o.id}")

        def maxOrderAmount: Double = 10000.0
      }
    UserCache.scala: |
      class UserCache {
        private var cache: Map[String, User] = Map.empty

        def getUser(id: String): Option[User] = cache.get(id)

        def putUser(user: User): Unit = {
          cache = cache + (user.id -> user)
        }

        def invalidate(id: String): Unit = {
          cache = cache - id
        }

        def size: Int = cache.size
      }
  commit_message: Update files
