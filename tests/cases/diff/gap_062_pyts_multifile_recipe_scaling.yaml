repo:
  initial_files:
    proto/order.proto: |
      syntax = "proto3";

      message OrderItem {
        string product_id = 1;
        int32 quantity = 2;
        double unit_price = 3;
      }

      message Order {
        string order_id = 1;
        string customer_id = 2;
        repeated OrderItem items = 3;
      }
    service/order_service.py: |
      from proto import order_pb2

      class OrderService:
          def create_order(
              self,
              order_id: str,
              customer_id: str,
              items: list,
          ) -> order_pb2.Order:
              proto_items = [
                  order_pb2.OrderItem(
                      product_id=i["product_id"],
                      quantity=i["quantity"],
                      unit_price=i["unit_price"],
                  )
                  for i in items
              ]
              return order_pb2.Order(
                  order_id=order_id,
                  customer_id=customer_id,
                  items=proto_items,
              )
