      interface ScaledIngredient {
        name: string;
        amount: number;
        unit: string;
      }

      function pluralizeUnit(unit: string, amount: number): string {
        if (amount <= 1) return unit;
        const irregulars: Record<string, string> = { cup: "cups", leaf: "leaves" };
        return irregulars[unit] || `${unit}s`;
      }

      function formatIngredientLine(item: ScaledIngredient): string {
        const unitStr = pluralizeUnit(item.unit, item.amount);
        return `${item.amount.toFixed(1)} ${unitStr} ${item.name}`;
      }

      function renderShoppingList(items: ScaledIngredient[]): string {
        return items.map(formatIngredientLine).join("\n");
      }
