name: comprehensive_010_monorepo_turborepo_depends_on
tags:
- lang:typescript
- change:single_file
- change:config
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    turbo.json: |
      {
          "$schema": "https://turbo.build/schema.json",
          "pipeline": {
              "build": {
                  "dependsOn": ["^build"],
                  "outputs": ["dist/**"]
              },
              "test": {
                  "dependsOn": ["build"]
              }
          }
      }
    packages/core/src/index.ts: |
      export const VERSION = '1.0.0';

      export function initialize(config: Record<string, unknown>) {
          return { ...config, version: VERSION };
      }

      export function shutdown() {
          return true;
      }
    packages/app/src/index.ts: |
      import { VERSION, initialize } from '@myorg/core';

      console.log(`App version: ${VERSION}`);

      export function startApp() {
          const config = initialize({ debug: false });
          return config;
      }
    scripts/deploy-pipeline.ts: |
      import { execSync } from 'child_process';

      interface DeployConfig {
        environment: string;
        canaryWeight: number;
        approvalRequired: boolean;
      }

      function deployService(service: string, config: DeployConfig): void {
        console.log(`Deploying ${service} to ${config.environment}`);
        if (config.approvalRequired) {
          console.log('Waiting for approval...');
        }
        execSync(`kubectl apply -f k8s/${service}.yaml`);
      }

      export { deployService, DeployConfig };
    scripts/release-manager.ts: |
      import * as fs from 'fs';

      interface ReleaseInfo {
        version: string;
        changelog: string;
        isDraft: boolean;
      }

      function createRelease(info: ReleaseInfo): void {
        const tag = `v${info.version}`;
        console.log(`Creating release ${tag}`);
        fs.writeFileSync('CHANGELOG.md', info.changelog, 'utf-8');
      }

      export { createRelease, ReleaseInfo };
  changed_files:
    turbo.json: |
      {
          "$schema": "https://turbo.build/schema.json",
          "pipeline": {
              "build": {
                  "dependsOn": ["^build"],
                  "outputs": ["dist/**"],
                  "env": ["NODE_ENV"]
              },
              "test": {
                  "dependsOn": ["build"],
                  "outputs": ["coverage/**"]
              },
              "lint": {
                  "outputs": []
              },
              "typecheck": {
                  "dependsOn": ["^build"],
                  "outputs": []
              },
              "deploy": {
                  "dependsOn": ["build", "test", "lint"],
                  "outputs": []
              }
          }
      }
    packages/core/src/index.ts: |
      export const VERSION = '1.0.0';

      export function initialize(config: Record<string, unknown>) {
          return { ...config, version: VERSION };
      }

      export function shutdown() {
          return true;
      }
    packages/app/src/index.ts: |
      import { VERSION, initialize } from '@myorg/core';

      console.log(`App version: ${VERSION}`);

      export function startApp() {
          const config = initialize({ debug: false });
          return config;
      }
    scripts/deploy-pipeline.ts: |
      import { execSync } from 'child_process';

      interface DeployConfig {
        environment: string;
        canaryWeight: number;
        approvalRequired: boolean;
      }

      function deployService(service: string, config: DeployConfig): void {
        console.log(`Deploying ${service} to ${config.environment}`);
        if (config.approvalRequired) {
          console.log('Waiting for approval...');
        }
        execSync(`kubectl apply -f k8s/${service}.yaml`);
      }

      export { deployService, DeployConfig };
    scripts/release-manager.ts: |
      import * as fs from 'fs';

      interface ReleaseInfo {
        version: string;
        changelog: string;
        isDraft: boolean;
      }

      function createRelease(info: ReleaseInfo): void {
        const tag = `v${info.version}`;
        console.log(`Creating release ${tag}`);
        fs.writeFileSync('CHANGELOG.md', info.changelog, 'utf-8');
      }

      export { createRelease, ReleaseInfo };
  commit_message: Update files
fragments:
- id: turbo_changed
  selector:
    path: turbo.json
- id: turbo_env_added
  selector:
    anchor: '"outputs": ["dist/**"],'
- id: no_deploy_pipeline
  selector:
    path: scripts/deploy-pipeline.ts
- id: no_release_manager
  selector:
    path: scripts/release-manager.ts
- id: no_deploy_service
  selector:
    anchor: deployService
- id: no_create_release
  selector:
    anchor: createRelease
oracle:
  required:
  - turbo_changed
  - turbo_env_added
  allowed: []
  forbidden:
  - no_deploy_pipeline
  - no_release_manager
  - no_deploy_service
  - no_create_release
