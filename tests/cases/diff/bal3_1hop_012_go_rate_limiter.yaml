  changed_files:
    pkg/ratelimit/limiter.go: |
      package ratelimit

      import "time"

      type Decision struct {
          Allowed   bool
          Remaining int
          ResetAt   time.Time
      }

      type Limiter struct {
          Rate     int
          Burst    int
          Window   time.Duration
          counters map[string]int
      }

      func NewLimiter(rate, burst int, window time.Duration) *Limiter {
          return &Limiter{Rate: rate, Burst: burst, Window: window, counters: make(map[string]int)}
      }

      func (l *Limiter) Allow(key string) Decision {
          l.counters[key]++
          allowed := l.counters[key] <= l.Rate+l.Burst
          remaining := l.Rate + l.Burst - l.counters[key]
          if remaining < 0 {
              remaining = 0
          }
          return Decision{
              Allowed:   allowed,
              Remaining: remaining,
              ResetAt:   time.Now().Add(l.Window),
          }
      }
  commit_message: "feat: return Decision struct from Allow with burst support"
