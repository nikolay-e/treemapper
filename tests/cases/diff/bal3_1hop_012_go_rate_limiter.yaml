  changed_files:
    src/cache/store.rs: |
      use std::collections::HashMap;

      pub struct CacheStore {
          data: HashMap<String, String>,
          max_size: usize,
      }

      impl CacheStore {
          pub fn new(max_size: usize) -> Self {
              CacheStore { data: HashMap::new(), max_size }
          }

          pub fn get(&self, key: &str) -> Option<&String> {
              self.data.get(key)
          }

          pub fn set(&mut self, key: String, value: String) -> bool {
              if self.data.len() >= self.max_size {
                  return false;
              }
              self.data.insert(key, value);
              true
          }
      }
    src/api/session.rs: |
      use crate::cache::store::CacheStore;

      pub struct SessionManager {
          store: CacheStore,
      }

      impl SessionManager {
          pub fn new() -> Self {
              SessionManager { store: CacheStore::new(1000) }
          }

          pub fn put_session(&mut self, id: String, token: String) {
              self.store.set(id, token);
          }

          pub fn get_session(&self, id: &str) -> Option<&String> {
              self.store.get(id)
          }
      }
    garbage/metrics.rs: |
      // GARBAGE_RLIM_A = "metrics_marker"
      pub fn record_metric(_name: &str) {}
    garbage/logger.rs: |
      // GARBAGE_RLIM_B = "logger_marker"
      pub fn log_event(_msg: &str) {}
    garbage/config.rs: |
      // GARBAGE_RLIM_C = "config_marker"
      pub struct AppConfig { pub port: u16 }
  commit_message: "fix: enforce max_size capacity check in CacheStore::set"
