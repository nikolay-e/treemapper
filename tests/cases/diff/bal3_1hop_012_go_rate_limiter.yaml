repo:
  initial_files:
    src/cache/store.rs: |
      use std::collections::HashMap;

      pub struct CacheStore {
          data: HashMap<String, String>,
          max_size: usize,
      }

      impl CacheStore {
          pub fn new(max_size: usize) -> Self {
              CacheStore { data: HashMap::new(), max_size }
          }

          pub fn get(&self, key: &str) -> Option<&String> {
              // BUG: no capacity check before insert
              self.data.get(key)
          }

          pub fn set(&mut self, key: String, value: String) {
              self.data.insert(key, value);
          }
      }
    src/api/session.rs: |
      use crate::cache::store::CacheStore;

      pub struct SessionManager {
          store: CacheStore,
      }

      impl SessionManager {
          pub fn new() -> Self {
              SessionManager { store: CacheStore::new(1000) }
          }

          pub fn put_session(&mut self, id: String, token: String) {
              self.store.set(id, token);
          }

          pub fn get_session(&self, id: &str) -> Option<&String> {
              self.store.get(id)
          }
      }
