repo:
  initial_files:
    pkg/ratelimit/limiter.go: |
      package ratelimit

      import "time"

      type Limiter struct {
          Rate     int
          Window   time.Duration
          counters map[string]int
      }

      func NewLimiter(rate int, window time.Duration) *Limiter {
          return &Limiter{Rate: rate, Window: window, counters: make(map[string]int)}
      }

      func (l *Limiter) Allow(key string) bool {
          l.counters[key]++
          return l.counters[key] <= l.Rate
      }
    internal/gateway/proxy.go: |
      package gateway

      import "pkg/ratelimit"

      type Proxy struct {
          limiter *ratelimit.Limiter
          Target  string
      }

      func NewProxy(target string, limiter *ratelimit.Limiter) *Proxy {
          return &Proxy{limiter: limiter, Target: target}
      }

      func (p *Proxy) Forward(clientIP string) bool {
          return p.limiter.Allow(clientIP)
      }
    internal/gateway/loadbalancer.go: |
      package gateway

      import "pkg/ratelimit"

      type LoadBalancer struct {
          limiter  *ratelimit.Limiter
          Backends []string
      }

      func NewLoadBalancer(backends []string, limiter *ratelimit.Limiter) *LoadBalancer {
          return &LoadBalancer{limiter: limiter, Backends: backends}
      }

      func (lb *LoadBalancer) Route(clientIP string) string {
          if !lb.limiter.Allow(clientIP) {
              return ""
          }
          return lb.Backends[0]
      }
    internal/gateway/circuit.go: |
      package gateway

      import "pkg/ratelimit"

      type CircuitGateway struct {
          limiter *ratelimit.Limiter
      }

      func NewCircuitGateway(limiter *ratelimit.Limiter) *CircuitGateway {
          return &CircuitGateway{limiter: limiter}
      }

      func (c *CircuitGateway) Check(key string) bool {
          return c.limiter.Allow(key)
      }
