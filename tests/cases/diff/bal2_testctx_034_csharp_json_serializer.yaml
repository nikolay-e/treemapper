    src/Serialization/JsonSerializer.cs: |
      using System;
      using System.Collections.Generic;
      using System.Text;

      namespace App.Serialization
      {
          public class JsonSerializer
          {
              public string Serialize(Dictionary<string, object> data)
              {
                  var sb = new StringBuilder();
                  sb.Append("{");
                  var first = true;
                  foreach (var kvp in data)
                  {
                      if (!first) sb.Append(",");
                      sb.Append($"\"{kvp.Key}\":");
                      sb.Append(FormatValue(kvp.Value));
                      first = false;
                  }
                  sb.Append("}");
                  return sb.ToString();
              }

              private string FormatValue(object value)
              {
                  if (value is string s) return $"\"{s}\"";
                  if (value is bool b) return b ? "true" : "false";
                  if (value is null) return "null";
                  return value.ToString();
              }
          }
      }
    Tests/JsonSerializerTests.cs: |
      using Xunit;
      using App.Serialization;
      using System.Collections.Generic;

      namespace App.Tests
      {
          public class JsonSerializerTests
          {
              private readonly JsonSerializer _serializer = new JsonSerializer();

              [Fact]
              public void Serialize_StringValue_QuotesCorrectly()
              {
                  var data = new Dictionary<string, object> { { "name", "alice" } };
                  var json = _serializer.Serialize(data);
                  Assert.Contains("\"name\":\"alice\"", json);
              }

              [Fact]
              public void Serialize_BoolValue_LowercaseOutput()
              {
                  var data = new Dictionary<string, object> { { "active", true } };
                  var json = _serializer.Serialize(data);
                  Assert.Contains("true", json);
              }

              [Fact]
              public void Serialize_NullValue_OutputsNull()
              {
                  var data = new Dictionary<string, object> { { "field", null } };
                  var json = _serializer.Serialize(data);
                  Assert.Contains("null", json);
              }
          }
      }
