    src/Caching/LruCache.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Caching
      {
          public class LruCache<TKey, TValue>
          {
              private readonly int _capacity;
              private readonly Dictionary<TKey, TValue> _store;

              public LruCache(int capacity)
              {
                  _capacity = capacity;
                  _store = new Dictionary<TKey, TValue>();
              }

              public void Put(TKey key, TValue value)
              {
                  _store[key] = value;
              }
          }
      }
  changed_files:
    src/Serialization/JsonSerializer.cs: |
      using System;
      using System.Collections.Generic;
      using System.Text;

      namespace App.Serialization
      {
          public class JsonSerializer
          {
              public string Serialize(Dictionary<string, object> data)
              {
                  var sb = new StringBuilder();
                  sb.Append("{");
                  var first = true;
                  foreach (var kvp in data)
                  {
                      if (!first) sb.Append(",");
                      sb.Append($"\"{EscapeString(kvp.Key)}\":");
                      sb.Append(FormatValue(kvp.Value));
                      first = false;
                  }
                  sb.Append("}");
                  return sb.ToString();
              }

              private string FormatValue(object value)
              {
                  if (value is string s) return $"\"{EscapeString(s)}\"";
                  if (value is bool b) return b ? "true" : "false";
                  if (value is null) return "null";
                  return value.ToString();
              }

              private string EscapeString(string input)
              {
                  return input
                      .Replace("\\", "\\\\")
                      .Replace("\"", "\\\"")
                      .Replace("\n", "\\n")
                      .Replace("\t", "\\t");
              }
          }
      }
  commit_message: "fix: escape special characters in JSON string output"
