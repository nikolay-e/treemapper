    src/healthcare/DosageCalculator.kt: |
      data class Patient(val weightKg: Double, val ageYears: Int, val renalScore: Int)
      data class Drug(val name: String, val baseDoseMgPerKg: Double, val maxDoseMg: Double)

      class DosageCalculator {
          fun calculate(patient: Patient, drug: Drug): Double {
              val raw = patient.weightKg * drug.baseDoseMgPerKg
              return if (raw > drug.maxDoseMg) drug.maxDoseMg else raw
          }

          fun adjustForRenal(dose: Double, renalScore: Int): Double {
              return if (renalScore <= 60) dose * 0.5 else dose
          }

          fun finalDose(patient: Patient, drug: Drug): Double {
              val base = calculate(patient, drug)
              return adjustForRenal(base, patient.renalScore)
          }
      }
