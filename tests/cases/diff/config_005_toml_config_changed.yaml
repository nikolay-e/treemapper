fragments:
- id: pyproject_file
  selector:
    path: pyproject.toml
- id: strict_markers_added
  selector:
    anchor: addopts = "-v --tb=short --strict-markers"
- id: timeout_increased
  selector:
    anchor: timeout = 60
- id: conftest_markers
  selector:
    path: tests/conftest.py
    anchor: pytest_configure
- id: slow_test_uses_timeout
  selector:
    path: tests/test_slow.py
    anchor: test_slow_operation
- id: no_benchmarks
  selector:
    path: benchmarks/runner.py
- id: no_seed_data
  selector:
    path: scripts/seed_data.py
- id: no_run_benchmark
  selector:
    anchor: run_benchmark
- id: no_data_seeder
  selector:
    anchor: DataSeeder
oracle:
  required:
  - pyproject_file
  - strict_markers_added
  - timeout_increased
  - conftest_markers
  - slow_test_uses_timeout
  allowed: []
  forbidden:
  - no_benchmarks
  - no_seed_data
  - no_run_benchmark
  - no_data_seeder
