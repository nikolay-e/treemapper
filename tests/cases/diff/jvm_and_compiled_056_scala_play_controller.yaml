repo:
  initial_files:
    routes: |
      GET     /users/:id        controllers.UserController.getUser(id: Long)
      POST    /users            controllers.UserController.createUser()
      DELETE  /users/:id        controllers.UserController.deleteUser(id: Long)
    UserController.scala: |
      // Initial
      class UserController {}
    OrderController.scala: |
      import play.api.mvc._
      import play.api.libs.json._
      import scala.concurrent.{ExecutionContext, Future}

      case class Order(id: Long, item: String, quantity: Int)

      class OrderController(cc: ControllerComponents)(implicit ec: ExecutionContext)
          extends AbstractController(cc) {

        implicit val orderFormat: Format[Order] = Json.format[Order]

        def getOrder(id: Long): Action[AnyContent] = Action.async {
          Future.successful(Ok(Json.toJson(Order(id, "Widget", 1))))
        }

        def createOrder(): Action[JsValue] = Action.async(parse.json) { request =>
          request.body.validate[Order].fold(
            errors => Future.successful(BadRequest),
            order => Future.successful(Created(Json.toJson(order)))
          )
        }
      }
    JsonFormats.scala: |
      import play.api.libs.json._

      object JsonFormats {
        implicit val dateFormat: Format[java.util.Date] = new Format[java.util.Date] {
          def writes(date: java.util.Date): JsValue = JsNumber(date.getTime)
          def reads(json: JsValue): JsResult[java.util.Date] = json.validate[Long].map(new java.util.Date(_))
        }

        def errorResponse(message: String): JsObject = {
          Json.obj("error" -> message, "status" -> "failed")
        }
      }
