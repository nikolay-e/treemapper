repo:
  initial_files:
    src/payments/processor.py: |
      from decimal import Decimal
      from typing import Optional

      class PaymentProcessor:
          def __init__(self, gateway):
              self.gateway = gateway

          def charge(self, amount: Decimal, currency: str, card_token: str) -> dict:
              if amount <= Decimal("0"):
                  raise ValueError("amount must be positive")
              result = self.gateway.charge(amount, currency, card_token)
              return {"status": result["status"], "transaction_id": result["id"]}

          def refund(self, transaction_id: str, amount: Optional[Decimal] = None) -> dict:
              result = self.gateway.refund(transaction_id, amount)
              return {"status": result["status"], "refund_id": result["id"]}
    src/payments/validator.py: |
      from decimal import Decimal

      SUPPORTED_CURRENCIES = {"USD", "EUR", "GBP"}

      def validate_charge_request(amount: Decimal, currency: str, card_token: str) -> None:
          if not card_token:
              raise ValueError("card_token is required")
          if currency not in SUPPORTED_CURRENCIES:
              raise ValueError(f"unsupported currency: {currency}")
          if amount <= Decimal("0"):
              raise ValueError("amount must be positive")
    tests/test_processor.py: |
      import pytest
      from decimal import Decimal
      from unittest.mock import MagicMock
      from src.payments.processor import PaymentProcessor

      def make_processor():
          gateway = MagicMock()
          gateway.charge.return_value = {"status": "ok", "id": "txn_1"}
          gateway.refund.return_value = {"status": "ok", "id": "ref_1"}
          return PaymentProcessor(gateway), gateway

      def test_charge_positive_amount_succeeds():
          processor, _ = make_processor()
          result = processor.charge(Decimal("50.00"), "USD", "tok_abc")
          assert result["status"] == "ok"
          assert result["transaction_id"] == "txn_1"

      def test_charge_zero_amount_raises():
          processor, _ = make_processor()
          with pytest.raises(ValueError, match="positive"):
              processor.charge(Decimal("0"), "USD", "tok_abc")

      def test_charge_negative_amount_raises():
          processor, _ = make_processor()
          with pytest.raises(ValueError):
              processor.charge(Decimal("-10"), "USD", "tok_abc")
