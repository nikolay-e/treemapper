    tests/test_processor.py: |
      import pytest
      from decimal import Decimal
      from unittest.mock import MagicMock
      from src.payments.processor import PaymentProcessor

      def make_processor():
          gateway = MagicMock()
          gateway.charge.return_value = {"status": "ok", "id": "txn_1"}
          gateway.refund.return_value = {"status": "ok", "id": "ref_1"}
          return PaymentProcessor(gateway), gateway

      def test_charge_positive_amount_succeeds():
          processor, _ = make_processor()
          result = processor.charge(Decimal("50.00"), "USD", "tok_abc")
          assert result["status"] == "ok"
          assert result["transaction_id"] == "txn_1"

      def test_charge_zero_amount_raises():
          processor, _ = make_processor()
          with pytest.raises(ValueError, match="positive"):
              processor.charge(Decimal("0"), "USD", "tok_abc")

      def test_charge_negative_amount_raises():
          processor, _ = make_processor()
          with pytest.raises(ValueError):
              processor.charge(Decimal("-10"), "USD", "tok_abc")

      def test_charge_unsupported_currency_raises():
          processor, _ = make_processor()
          with pytest.raises(ValueError, match="unsupported currency"):
              processor.charge(Decimal("10"), "JPY", "tok_abc")

      def test_charge_empty_token_raises():
          processor, _ = make_processor()
          with pytest.raises(ValueError, match="card_token"):
              processor.charge(Decimal("10"), "USD", "")

      def test_refund_negative_amount_raises():
          processor, _ = make_processor()
          with pytest.raises(ValueError, match="positive"):
              processor.refund("txn_1", Decimal("-5"))
