name: gap_156_shell_terraform_secrets_rotation_import_chain
tags:
- change:config
- change:multi_file
- context:import_chain
- difficulty:medium
- distance:2hop
- lang:shell
- lang:terraform
fixtures:
  auto_garbage: true
repo:
  initial_files:
    ops/rotate_secrets.sh: |
      #!/usr/bin/env bash
      set -euo pipefail

      source ops/aws_helpers.sh

      SECRET_PREFIX="/myapp/production"
      ROTATION_KEYS=("db-password" "api-key" "jwt-secret")

      for key in "${ROTATION_KEYS[@]}"; do
        secret_name="${SECRET_PREFIX}/${key}"
        current=$(aws_get_secret "${secret_name}")
        new_value=$(openssl rand -base64 32)
        aws_put_secret "${secret_name}" "${new_value}"
      done
    ops/aws_helpers.sh: |
      #!/usr/bin/env bash

      AWS_REGION="${AWS_REGION:-us-west-2}"

      aws_get_secret() {
        aws secretsmanager get-secret-value \
          --region "${AWS_REGION}" \
          --secret-id "$1" \
          --query SecretString \
          --output text
      }

      aws_put_secret() {
        aws secretsmanager put-secret-value \
          --region "${AWS_REGION}" \
          --secret-id "$1" \
          --secret-string "$2"
      }
    terraform/secrets.tf: |
      resource "aws_secretsmanager_secret" "db_password" {
        name = "/myapp/production/db-password"
      }

      resource "aws_secretsmanager_secret" "api_key" {
        name = "/myapp/production/api-key"
      }

      resource "aws_secretsmanager_secret" "jwt_secret" {
        name = "/myapp/production/jwt-secret"
      }
    terraform/monitoring.tf: |
      resource "aws_cloudwatch_dashboard" "main" {
        dashboard_name = "myapp-overview"
        dashboard_body = jsonencode({
          widgets = [
            {
              type   = "metric"
              x      = 0
              y      = 0
              width  = 12
              height = 6
              properties = {
                metrics = [["AWS/EC2", "CPUUtilization"]]
                period  = 300
                stat    = "Average"
              }
            }
          ]
        })
      }
  changed_files:
    ops/rotate_secrets.sh: |
      #!/usr/bin/env bash
      set -euo pipefail

      source ops/aws_helpers.sh

      SECRET_PREFIX="/myapp/production"
      ROTATION_KEYS=("db-password" "api-key" "jwt-secret" "encryption-key")
      LOG_FILE="/var/log/secret-rotation.log"

      for key in "${ROTATION_KEYS[@]}"; do
        secret_name="${SECRET_PREFIX}/${key}"
        current=$(aws_get_secret "${secret_name}")
        new_value=$(openssl rand -base64 48)
        aws_put_secret "${secret_name}" "${new_value}"
        echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) rotated ${key}" >> "${LOG_FILE}"
      done
    ops/aws_helpers.sh: |
      #!/usr/bin/env bash

      AWS_REGION="${AWS_REGION:-us-west-2}"
      AWS_RETRY_COUNT="${AWS_RETRY_COUNT:-3}"

      aws_get_secret() {
        aws secretsmanager get-secret-value \
          --region "${AWS_REGION}" \
          --secret-id "$1" \
          --query SecretString \
          --output text
      }

      aws_put_secret() {
        local attempt=0
        while [[ ${attempt} -lt ${AWS_RETRY_COUNT} ]]; do
          if aws secretsmanager put-secret-value \
            --region "${AWS_REGION}" \
            --secret-id "$1" \
            --secret-string "$2"; then
            return 0
          fi
          attempt=$((attempt + 1))
          sleep 2
        done
        return 1
      }
    terraform/secrets.tf: |
      resource "aws_secretsmanager_secret" "db_password" {
        name = "/myapp/production/db-password"
        recovery_window_in_days = 7
      }

      resource "aws_secretsmanager_secret" "api_key" {
        name = "/myapp/production/api-key"
        recovery_window_in_days = 7
      }

      resource "aws_secretsmanager_secret" "jwt_secret" {
        name = "/myapp/production/jwt-secret"
        recovery_window_in_days = 7
      }

      resource "aws_secretsmanager_secret" "encryption_key" {
        name = "/myapp/production/encryption-key"
        recovery_window_in_days = 7
      }
fragments:
- id: rotate_encryption_key
  selector:
    path: ops/rotate_secrets.sh
    anchor: encryption-key
- id: helpers_retry
  selector:
    path: ops/aws_helpers.sh
    anchor: AWS_RETRY_COUNT
- id: secrets_recovery
  selector:
    path: terraform/secrets.tf
    anchor: recovery_window_in_days
- id: no_monitoring
  selector:
    path: terraform/monitoring.tf
- id: no_dashboard
  selector:
    anchor: aws_cloudwatch_dashboard
oracle:
  required:
  - rotate_encryption_key
  - helpers_retry
  - secrets_recovery
  forbidden:
  - no_monitoring
  - no_dashboard
