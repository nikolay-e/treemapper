name: bal_1hop_010_go_exporter_calls_formatter
tags:
- lang:cpp
- change:new_function
- change:single_file
- context:cross_module
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    include/iot/sensor_aggregator.hpp: |
      #pragma once
      #include <vector>
      #include <string>
      #include <cstdint>

      namespace iot {

      struct SensorReading {
          uint32_t device_id;
          double value;
          int64_t timestamp_ms;
      };

      class SensorAggregator {
      public:
          void add_reading(const SensorReading& r);
          double compute_mean() const;
          double compute_max() const;
          size_t count() const;
          void clear();

      private:
          std::vector<SensorReading> readings_;
      };

      } // namespace iot
    src/iot/telemetry_publisher.cpp: |
      #include "iot/sensor_aggregator.hpp"
      #include <string>

      namespace iot {

      class TelemetryPublisher {
      public:
          explicit TelemetryPublisher(const std::string& topic) : topic_(topic) {}

          void publish_stats(SensorAggregator& agg) {
              if (agg.count() == 0) return;
              send_metric(topic_ + ".mean", agg.compute_mean());
              send_metric(topic_ + ".max", agg.compute_max());
              agg.clear();
          }

      private:
          void send_metric(const std::string& name, double value);
          std::string topic_;
      };

      } // namespace iot
    garbage/device_registry.cpp: |
      // GARBAGE_IOTPUB_A = "device_registry_marker"
