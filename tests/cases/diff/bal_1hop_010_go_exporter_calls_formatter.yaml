name: bal_1hop_010_go_exporter_calls_formatter
tags:
- lang:go
- change:single_file
- context:import_chain
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    internal/format/csv.go: |
      package format

      import (
          "bytes"
          "encoding/csv"
      )

      type Record struct {
          Fields []string
      }

      func ToCSV(records []Record) (string, error) {
          var buf bytes.Buffer
          w := csv.NewWriter(&buf)
          for _, r := range records {
              if err := w.Write(r.Fields); err != nil {
                  return "", err
              }
          }
          w.Flush()
          return buf.String(), w.Error()
      }
    internal/format/json.go: |
      package format

      import "encoding/json"

      func ToJSON(records []Record) (string, error) {
          data, err := json.Marshal(records)
          if err != nil {
              return "", err
          }
          return string(data), nil
      }
    internal/export/report.go: |
      package export

      import (
          "myapp/internal/format"
      )

      type ReportExporter struct {
          Format string
      }

      func (e *ReportExporter) Export(records []format.Record) (string, error) {
          switch e.Format {
          case "csv":
              return format.ToCSV(records)
          case "json":
              return format.ToJSON(records)
          default:
              return format.ToCSV(records)
          }
      }
    internal/export/schedule.go: |
      package export

      import "time"

      type Schedule struct {
          Interval time.Duration
          LastRun  time.Time
      }

      func (s *Schedule) IsDue() bool {
          return time.Since(s.LastRun) >= s.Interval
      }
    internal/audit/log.go: |
      package audit

      import "time"

      type Entry struct {
          Action    string
          Timestamp time.Time
      }

      func NewEntry(action string) *Entry {
          return &Entry{Action: action, Timestamp: time.Now()}
      }
    cmd/exporter/main.go: |
      package main

      import "fmt"

      func main() {
          fmt.Println("exporter starting")
      }
    internal/notify/slack.go: |
      package notify

      import "fmt"

      func SendSlack(channel, message string) error {
          fmt.Printf("slack: #%s: %s\n", channel, message)
          return nil
      }
  changed_files:
    internal/format/csv.go: |
      package format

      import (
          "bytes"
          "encoding/csv"
          "fmt"
      )

      type Record struct {
          Fields []string
      }

      type CSVOptions struct {
          Delimiter rune
          Header    []string
          QuoteAll  bool
      }

      func DefaultCSVOptions() CSVOptions {
          return CSVOptions{Delimiter: ',', QuoteAll: false}
      }

      func ToCSV(records []Record) (string, error) {
          return ToCSVWithOptions(records, DefaultCSVOptions())
      }

      func ToCSVWithOptions(records []Record, opts CSVOptions) (string, error) {
          var buf bytes.Buffer
          w := csv.NewWriter(&buf)
          w.Comma = opts.Delimiter
          if len(opts.Header) > 0 {
              if err := w.Write(opts.Header); err != nil {
                  return "", fmt.Errorf("writing header: %w", err)
              }
          }
          for _, r := range records {
              if err := w.Write(r.Fields); err != nil {
                  return "", fmt.Errorf("writing record: %w", err)
              }
          }
          w.Flush()
          return buf.String(), w.Error()
      }
  commit_message: "feat: add CSVOptions with custom delimiter and header"
