      GARBAGE_DEP_013_CSV_IMPORT_C = "csv_exporter"
      GARBAGE_DEP_013_CSV_BATCH_D = 5000

      class CsvExporter:
          GARBAGE_DEP_013_CSV_CLASS_E = True

          def export_row(self, record: dict) -> str:
              date_str = format_date(record["created_at"])
              return f"{record['id']},{date_str},{record['name']}"

          def export_all(self, records: list) -> str:
              return "\n".join(self.export_row(r) for r in records)
