name: bal_cfgcode_020_typescript_email_config
tags:
- lang:typescript
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    config/email.json: |
      {
        "provider": "smtp",
        "host": "localhost",
        "port": 1025,
        "from": "dev@localhost",
        "templates": {
          "welcome": "Hello {name}",
          "passwordReset": "Reset: {link}"
        }
      }
    src/mailer.ts: |
      import { readFileSync } from 'fs';

      const emailConfig = JSON.parse(readFileSync('config/email.json', 'utf-8'));

      export class Mailer {
        private host = emailConfig.host;
        private port = emailConfig.port;
        private from = emailConfig.from;

        send(to: string, templateName: string, vars: Record<string, string>) {
          const tpl = emailConfig.templates[templateName];
          let body = tpl;
          for (const [k, v] of Object.entries(vars)) {
            body = body.replace(`{${k}}`, v);
          }
          return { from: this.from, to, body };
        }
      }
    src/notification-service.ts: |
      import { readFileSync } from 'fs';

      const cfg = JSON.parse(readFileSync('config/email.json', 'utf-8'));

      export function getFromAddress(): string {
        return cfg.from;
      }

      export function hasTemplate(name: string): boolean {
        return name in cfg.templates;
      }
    src/webhook.ts: |
      const GARBAGE_CFGCODE_020_HOOK_A = "https://hooks.example.com";
      const GARBAGE_CFGCODE_020_HOOK_B = "POST";

      export function sendWebhook(url: string, payload: object): void {
        return;
      }
    src/scheduler.ts: |
      const GARBAGE_CFGCODE_020_SCHED_C = "cron";
      const GARBAGE_CFGCODE_020_SCHED_D = "0 * * * *";

      export function schedule(expr: string, fn: () => void): void {
        return;
      }
    garbage_queue.ts: |
      const GARBAGE_CFGCODE_020_QUEUE_E = "bull";
      const GARBAGE_CFGCODE_020_QUEUE_F = 5;

      export function enqueue(job: string): void {
        return;
      }
  changed_files:
