            body = body.replace(`{${k}}`, v);
          }
          return { from: this.from, to, body };
        }
      }
    src/notification-service.ts: |
      import { readFileSync } from 'fs';

      const cfg = JSON.parse(readFileSync('config/email.json', 'utf-8'));

