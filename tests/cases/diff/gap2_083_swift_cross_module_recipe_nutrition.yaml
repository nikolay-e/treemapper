    Sources/Cooking/IngredientDatabase.swift: |
      import Foundation

      class IngredientDatabase {
          private let catalog: FoodCatalog

          init(catalog: FoodCatalog) {
              self.catalog = catalog
          }

          func nutritionFor(name: String) -> FoodEntry? {
              catalog.search(query: name).first
          }

          func allIngredients() -> [FoodEntry] {
              catalog.allFoods()
          }
      }
    Sources/Cooking/FoodCatalog.swift: |
      import Foundation

      struct FoodEntry {
          let name: String
          let caloriesPer100g: Double
          let proteinPer100g: Double
          let fatPer100g: Double
      }

      class FoodCatalog {
          private var foods: [FoodEntry] = []

          func search(query: String) -> [FoodEntry] {
              foods.filter { $0.name.localizedCaseInsensitiveContains(query) }
          }

          func allFoods() -> [FoodEntry] {
              foods
          }

          func addFood(_ entry: FoodEntry) {
              foods.append(entry)
          }
      }
    Sources/Cooking/Recipe.swift: |
      import Foundation

      struct Ingredient {
          let name: String
          let quantityGrams: Double
      }

      struct Recipe {
          let title: String
          let ingredients: [Ingredient]
          let servings: Int
      }
    Sources/Shipping/DeliveryTracker.swift: |
