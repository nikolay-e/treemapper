repo:
  initial_files:
    src/messaging/publisher.ts: |
      import { MessageBroker } from './broker';
      import { Message } from './message';

      export class Publisher {
          constructor(private broker: MessageBroker) {}

          async publish(topic: string, payload: unknown): Promise<void> {
              const msg: Message = { topic, payload, timestamp: Date.now() };
              await this.broker.send(msg);
          }
      }
    src/messaging/broker.ts: |
      import { Message } from './message';

      export interface MessageBroker {
          send(message: Message): Promise<void>;
      }

      export class InMemoryBroker implements MessageBroker {
          private handlers = new Map<string, ((msg: Message) => void)[]>();

          async send(message: Message): Promise<void> {
              const handlers = this.handlers.get(message.topic) ?? [];
              handlers.forEach(h => h(message));
          }

          subscribe(topic: string, handler: (msg: Message) => void): void {
              const existing = this.handlers.get(topic) ?? [];
              this.handlers.set(topic, [...existing, handler]);
          }
      }
    src/messaging/message.ts: |
      export interface Message {
          topic: string;
          payload: unknown;
          timestamp: number;
      }
    src/events/order_publisher.ts: |
      import { Publisher } from '../messaging/publisher';

      export class OrderPublisher {
          constructor(private publisher: Publisher) {}

          async orderCreated(orderId: string, customerId: string): Promise<void> {
              await this.publisher.publish('order.created', { orderId, customerId });
          }

          async orderShipped(orderId: string): Promise<void> {
              await this.publisher.publish('order.shipped', { orderId });
          }
      }
    src/integrations/webhook.ts: |
      export const GARBAGE_GAP083_A = 'webhook_retry_limit';

