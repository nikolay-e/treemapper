      class DeliveryTracker {
          func estimateArrival() -> Date { Date() }
          func trackPackage(id: String) -> String { "in_transit" }
      }
  changed_files:
    Sources/Cooking/RecipeAnalyzer.swift: |
      import Foundation

      struct NutritionSummary {
          let calories: Double
          let proteinGrams: Double
          let fatGrams: Double
      }

      class RecipeAnalyzer {
          private let ingredientDb: IngredientDatabase

          init(ingredientDb: IngredientDatabase) {
              self.ingredientDb = ingredientDb
          }

          func totalCalories(recipe: Recipe) -> Double {
              recipe.ingredients.compactMap { ingredientDb.nutritionFor(name: $0.name) }
                  .reduce(0.0) { $0 + $1.caloriesPer100g }
          }

          func fullNutrition(recipe: Recipe) -> NutritionSummary {
              let entries = recipe.ingredients.compactMap { ingredientDb.nutritionFor(name: $0.name) }
              let cal = entries.reduce(0.0) { $0 + $1.caloriesPer100g }
              let protein = entries.reduce(0.0) { $0 + $1.proteinPer100g }
              let fat = entries.reduce(0.0) { $0 + $1.fatPer100g }
              return NutritionSummary(calories: cal, proteinGrams: protein, fatGrams: fat)
          }
      }
