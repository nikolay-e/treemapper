repo:
  initial_files:
    pkg/transform/mapper.go: |
      package transform

      type Record struct {
          Fields map[string]string
      }

      type Mapper struct {
          FieldMapping map[string]string
      }

      func NewMapper(mapping map[string]string) *Mapper {
          return &Mapper{FieldMapping: mapping}
      }

      func (m *Mapper) Map(r Record) Record {
          out := Record{Fields: make(map[string]string)}
          for src, dst := range m.FieldMapping {
              out.Fields[dst] = r.Fields[src]
          }
          return out
      }
    internal/pipeline/csv_ingester.go: |
      package pipeline

      import "pkg/transform"

      type CSVIngester struct {
          mapper *transform.Mapper
      }

      func NewCSVIngester(m *transform.Mapper) *CSVIngester {
          return &CSVIngester{mapper: m}
      }

      func (c *CSVIngester) Ingest(rows []map[string]string) []transform.Record {
          var results []transform.Record
          for _, row := range rows {
              r := transform.Record{Fields: row}
              results = append(results, c.mapper.Map(r))
          }
          return results
      }
