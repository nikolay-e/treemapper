    src/main/java/com/metrics/collector/MetricStore.java: |
      package com.metrics.collector;

      import java.util.HashMap;
      import java.util.Map;

      public class MetricStore {
          private final Map<String, Long> counters = new HashMap<>();

          public void increment(String name) {
              counters.merge(name, 1L, Long::sum);
          }

          public void incrementBy(String name, long delta) {
              if (delta < 0) throw new IllegalArgumentException("delta must be non-negative");
              counters.merge(name, delta, Long::sum);
          }

          public long get(String name) {
              return counters.getOrDefault(name, 0L);
          }

          public void reset(String name) {
              counters.put(name, 0L);
          }

          public Map<String, Long> snapshot() {
              return new HashMap<>(counters);
          }
      }
    src/main/java/com/metrics/collector/MetricReporter.java: |
      package com.metrics.collector;

      import java.util.Map;

      public class MetricReporter {
          private final MetricStore store;

          public MetricReporter(MetricStore store) {
              this.store = store;
          }

          public String report() {
              StringBuilder sb = new StringBuilder();
              for (Map.Entry<String, Long> e : store.snapshot().entrySet()) {
                  sb.append(e.getKey()).append("=").append(e.getValue()).append("\n");
              }
              return sb.toString();
          }
      }
    src/test/java/com/metrics/collector/MetricStoreTest.java: |
      package com.metrics.collector;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      public class MetricStoreTest {
          @Test
          void incrementAndGet() {
              MetricStore store = new MetricStore();
              store.increment("req.count");
              store.increment("req.count");
              assertEquals(2L, store.get("req.count"));
          }

          @Test
          void incrementByDelta() {
              MetricStore store = new MetricStore();
              store.incrementBy("bytes.sent", 1024L);
              assertEquals(1024L, store.get("bytes.sent"));
          }

          @Test
          void resetZeroesCounter() {
              MetricStore store = new MetricStore();
              store.increment("req.count");
              store.reset("req.count");
              assertEquals(0L, store.get("req.count"));
          }

          @Test
          void incrementByNegativeDeltaThrows() {
              MetricStore store = new MetricStore();
              assertThrows(IllegalArgumentException.class, () -> store.incrementBy("x", -1L));
          }
      }
