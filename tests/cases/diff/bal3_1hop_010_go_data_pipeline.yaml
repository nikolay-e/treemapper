  changed_files:
    pkg/transform/mapper.go: |
      package transform

      type Record struct {
          Fields   map[string]string
          Metadata map[string]string
      }

      type FilterFunc func(Record) bool

      type Mapper struct {
          FieldMapping map[string]string
          Filters      []FilterFunc
      }

      func NewMapper(mapping map[string]string) *Mapper {
          return &Mapper{FieldMapping: mapping}
      }

      func (m *Mapper) WithFilter(f FilterFunc) *Mapper {
          m.Filters = append(m.Filters, f)
          return m
      }

      func (m *Mapper) Map(r Record) (Record, bool) {
          for _, f := range m.Filters {
              if !f(r) {
                  return Record{}, false
              }
          }
          out := Record{Fields: make(map[string]string), Metadata: r.Metadata}
          for src, dst := range m.FieldMapping {
              out.Fields[dst] = r.Fields[src]
          }
          return out, true
      }
  commit_message: "feat: add Metadata, FilterFunc, and filtering to Mapper"
