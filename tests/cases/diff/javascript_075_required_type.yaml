repo:
  initial_files:
    options.ts: |
      export interface Options {
          name?: string;
          value?: number;
          enabled?: boolean;
      }
    validator.ts: |
      console.log('initial');
    options-defaults.ts: |
      import { Options } from './options';

      export const DEFAULT_OPTIONS: Required<Options> = {
          name: 'default',
          value: 0,
          enabled: true,
      };

      export function applyDefaults(partial: Options): Required<Options> {
          return { ...DEFAULT_OPTIONS, ...partial };
      }
    options-merger.ts: |
      import { Options } from './options';

      export function mergeOptions(base: Options, overrides: Partial<Options>): Options {
          return { ...base, ...overrides };
      }

      export function hasAllFields(options: Options): boolean {
          return options.name !== undefined && options.value !== undefined && options.enabled !== undefined;
      }
    config-validator.ts: |
      interface Config {
          host: string;
          port: number;
          ssl: boolean;
      }

      export function validateConfig(config: Config): { valid: boolean; errors: string[] } {
          const errors: string[] = [];
          if (!config.host || config.host.length < 1) errors.push('host required');
          if (config.port < 1 || config.port > 65535) errors.push('invalid port');
          return { valid: errors.length === 0, errors };
      }
  changed_files:
    options.ts: |
      export interface Options {
          name?: string;
          value?: number;
          enabled?: boolean;
      }
    validator.ts: |
      import { Options } from './options';

      type StrictOptions = Required<Options>;

      function validate(options: StrictOptions): boolean {
          return options.name.length > 0 && options.value >= 0 && typeof options.enabled === 'boolean';
      }
    options-defaults.ts: |
      import { Options } from './options';

      export const DEFAULT_OPTIONS: Required<Options> = {
          name: 'default',
          value: 0,
          enabled: true,
      };

      export function applyDefaults(partial: Options): Required<Options> {
          return { ...DEFAULT_OPTIONS, ...partial };
      }
    options-merger.ts: |
      import { Options } from './options';

      export function mergeOptions(base: Options, overrides: Partial<Options>): Options {
          return { ...base, ...overrides };
      }

      export function hasAllFields(options: Options): boolean {
          return options.name !== undefined && options.value !== undefined && options.enabled !== undefined;
      }
    config-validator.ts: |
      interface Config {
          host: string;
          port: number;
          ssl: boolean;
      }

      export function validateConfig(config: Config): { valid: boolean; errors: string[] } {
          const errors: string[] = [];
          if (!config.host || config.host.length < 1) errors.push('host required');
          if (config.port < 1 || config.port > 65535) errors.push('invalid port');
          return { valid: errors.length === 0, errors };
      }
  commit_message: Update files
