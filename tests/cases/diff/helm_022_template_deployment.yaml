name: helm_022_template_deployment
repo:
  initial_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: templ-app
      version: 1.0.0
    chart/values.yaml: |
      image:
        repository: myapp
        tag: latest
    chart/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: myapp
      spec:
        template:
          spec:
            containers:
              - name: app
                image: myapp:latest
    chart/templates/linkerd-smi.yaml: |
      apiVersion: split.smi-spec.io/v1alpha2
      kind: TrafficSplit
      metadata:
      spec:
        backends:
    chart/docs/template-patterns.md: |
      # Template Patterns
      ## Best Practices
  changed_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: templ-app
      version: 1.0.0
    chart/values.yaml: |
      image:
        repository: myapp
        tag: latest
    chart/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ .Release.Name }}-{{ .Chart.Name }}
      spec:
        template:
          spec:
            containers:
              - name: {{ .Chart.Name }}
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    chart/templates/linkerd-smi.yaml: |
      apiVersion: split.smi-spec.io/v1alpha2
      kind: TrafficSplit
      metadata:
      spec:
        backends:
    chart/docs/template-patterns.md: |
      # Template Patterns
      ## Best Practices
  commit_message: Update files
fragments:
- id: deployment_file
  selector:
    path: chart/templates/deployment.yaml
- id: req_global_0
  selector:
    anchor: 'name: {{ .Release.Name }}-{{ .Chart.Name }}'
oracle:
  required:
  - deployment_file
  - req_global_0
  allowed: []
  forbidden: []
