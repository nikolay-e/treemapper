repo:
  initial_files:
    app/services/discount_calculator.rb: |
      class DiscountCalculator
        def calculate(order_type, amount)
          case order_type
          when :standard
            amount * 0.05
          when :premium
            amount * 0.15
          when :wholesale
            amount * 0.25
          else
            0
          end
        end
      end
    app/services/checkout_service.rb: |
      require_relative 'discount_calculator'

      class CheckoutService
        def initialize
          @calculator = DiscountCalculator.new
        end

        def process(order_type, amount)
          discount = @calculator.calculate(order_type, amount)
          { total: amount - discount, discount: discount }
        end
      end
    app/controllers/checkout_controller.rb: |
      require_relative '../services/checkout_service'

      class CheckoutController
        def initialize
          @service = CheckoutService.new
        end

        def checkout(params)
          @service.process(params[:type], params[:amount])
        end
      end
