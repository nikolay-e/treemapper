    app/strategies/discount/wholesale.rb: |
      module Discount
        class Wholesale
          def calculate(amount)
            amount * 0.25
          end
        end
      end
    app/services/discount_calculator.rb: |
      require_relative '../strategies/discount/standard'
      require_relative '../strategies/discount/premium'
      require_relative '../strategies/discount/wholesale'

      class DiscountCalculator
        STRATEGIES = {
          standard: Discount::Standard.new,
          premium: Discount::Premium.new,
          wholesale: Discount::Wholesale.new,
        }.freeze

        def calculate(order_type, amount)
          strategy = STRATEGIES.fetch(order_type) { return 0 }
          strategy.calculate(amount)
        end
      end
    app/services/checkout_service.rb: |
      require_relative 'discount_calculator'

      class CheckoutService
        def initialize
          @calculator = DiscountCalculator.new
        end

        def process(order_type, amount)
          discount = @calculator.calculate(order_type, amount)
          { total: amount - discount, discount: discount }
        end
      end
