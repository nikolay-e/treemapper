  changed_files:
    app/strategies/discount/standard.rb: |
      module Discount
        class Standard
          def calculate(amount)
            amount * 0.05
          end
        end
      end
    app/strategies/discount/premium.rb: |
      module Discount
        class Premium
          def calculate(amount)
            amount * 0.15
          end
        end
