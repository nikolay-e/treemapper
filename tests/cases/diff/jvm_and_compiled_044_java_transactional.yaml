      package com.example;

      import org.springframework.stereotype.Service;
      import org.springframework.transaction.annotation.Transactional;
      import java.util.List;

      @Service
      public class InventoryService {
          @Transactional
          public void updateStock(List<OrderItem> items) {
              for (OrderItem item : items) {
                  reduceQuantity(item.getProductId(), item.getQuantity());
              }
          }

          private void reduceQuantity(Long productId, int quantity) {
              System.out.println("Reducing stock for product " + productId);
          }
      }
