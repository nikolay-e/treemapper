      data class TaxBracket(val threshold: Double, val rate: Double)

      class TaxCalculator(private val brackets: List<TaxBracket>) {
          fun computeTax(income: Double): Double {
              var remaining = income
              var tax = 0.0
              for (bracket in brackets.sortedBy { it.threshold }) {
                  if (remaining <= 0) break
                  val taxable = minOf(remaining, bracket.threshold)
                  tax += taxable * bracket.rate  // BUG: applies rate to cumulative threshold, not segment
