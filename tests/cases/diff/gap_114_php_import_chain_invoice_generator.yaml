  changed_files:
    src/finance/TaxCalculator.kt: |
      data class TaxBracket(val threshold: Double, val rate: Double)

      class TaxCalculator(private val brackets: List<TaxBracket>) {
          fun computeTax(income: Double): Double {
              val sorted = brackets.sortedBy { it.threshold }
              var remaining = income
              var tax = 0.0
              var prevThreshold = 0.0
              for (bracket in sorted) {
                  if (remaining <= 0) break
                  val segmentSize = bracket.threshold - prevThreshold
                  val taxable = minOf(remaining, segmentSize)
                  tax += taxable * bracket.rate
                  remaining -= taxable
                  prevThreshold = bracket.threshold
              }
              return tax
          }

          fun effectiveRate(income: Double): Double {
              return if (income == 0.0) 0.0 else computeTax(income) / income
          }
      }
