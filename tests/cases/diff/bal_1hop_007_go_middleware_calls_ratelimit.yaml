repo:
  initial_files:
    pkg/ratelimit/limiter.go: |
      package ratelimit

      import (
          "sync"
          "time"
      )

      type Limiter struct {
          mu       sync.Mutex
          requests map[string]int
          limit    int
          window   time.Duration
      }

      func New(limit int, window time.Duration) *Limiter {
          return &Limiter{
              requests: make(map[string]int),
              limit:    limit,
              window:   window,
          }
      }

      func (l *Limiter) Allow(ip string) bool {
          l.mu.Lock()
          defer l.mu.Unlock()
          l.requests[ip]++
          return l.requests[ip] <= l.limit
      }
    pkg/middleware/rate.go: |
      package middleware

      import (
          "net/http"
          "myapp/pkg/ratelimit"
      )

      func RateLimitMiddleware(limiter *ratelimit.Limiter) func(http.Handler) http.Handler {
          return func(next http.Handler) http.Handler {
              return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                  ip := r.RemoteAddr
                  if !limiter.Allow(ip) {
                      http.Error(w, "rate limited", 429)
                      return
                  }
                  next.ServeHTTP(w, r)
              })
          }
      }
    pkg/cors/handler.go: |
      package cors

      import "net/http"

      func AllowAll(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              w.Header().Set("Access-Control-Allow-Origin", "*")
              next.ServeHTTP(w, r)
          })
      }
    pkg/compress/gzip.go: |
      package compress

      import "net/http"

      func GzipMiddleware(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              next.ServeHTTP(w, r)
          })
      }
  changed_files:
    pkg/ratelimit/limiter.go: |
      package ratelimit

      import (
          "net"
          "sync"
          "time"
      )

      type Limiter struct {
          mu       sync.Mutex
          requests map[string]int
          limit    int
          window   time.Duration
      }

      func New(limit int, window time.Duration) *Limiter {
          l := &Limiter{
              requests: make(map[string]int),
              limit:    limit,
              window:   window,
          }
          go l.resetLoop()
          return l
      }

      func (l *Limiter) resetLoop() {
          for {
              time.Sleep(l.window)
              l.mu.Lock()
              l.requests = make(map[string]int)
              l.mu.Unlock()
          }
      }

      func (l *Limiter) Allow(ip string) bool {
          l.mu.Lock()
          defer l.mu.Unlock()
          cleanIP, _, _ := net.SplitHostPort(ip)
          if cleanIP == "" {
              cleanIP = ip
          }
          l.requests[cleanIP]++
          return l.requests[cleanIP] <= l.limit
      }
  commit_message: "fix: reset rate counters and strip port from IP"
