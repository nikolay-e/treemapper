name: javascript_020_new_class_constructor
tags:
- lang:typescript
- change:single_file
- change:new_function
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    user.ts: |
      export class MyClass {
          private value: number;

          constructor(value: number) {
              this.value = value;
          }

          getValue(): number {
              return this.value;
          }
      }
    main.ts: |
      console.log('initial');
    my-class.test.ts: |
      import { MyClass } from './user';

      describe('MyClass', () => {
          it('should store value from constructor', () => {
              const instance = new MyClass(42);
              expect(instance.getValue()).toBe(42);
          });

          it('should accept zero', () => {
              const instance = new MyClass(0);
              expect(instance.getValue()).toBe(0);
          });

          it('should accept negative values', () => {
              const instance = new MyClass(-10);
              expect(instance.getValue()).toBe(-10);
          });
      });
    my-class-builder.ts: |
      import { MyClass } from './user';

      export class MyClassBuilder {
          private value: number = 0;

          withValue(value: number): MyClassBuilder {
              this.value = value;
              return this;
          }

          build(): MyClass {
              return new MyClass(this.value);
          }
      }

      export function createDefault(): MyClass {
          return new MyClassBuilder().withValue(1).build();
      }
  changed_files:
