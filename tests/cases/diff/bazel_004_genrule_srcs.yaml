          """,
          tools = ["//codegen/scripts:generator"],
          visibility = ["//visibility:public"],
      )
    codegen/templates/user.tmpl: |
      class {{ .Name }}Model:
          def __init__(self, {{ range .Fields }}{{ .Name }}: {{ .Type }}, {{ end }}):
              {{ range .Fields }}self.{{ .Name }} = {{ .Name }}
              {{ end }}

          def to_dict(self):
              return {
                  {{ range .Fields }}"{{ .Name }}": self.{{ .Name }},
                  {{ end }}
              }
    codegen/templates/order.tmpl: |
      class {{ .Name }}Model:
          def __init__(self, {{ range .Fields }}{{ .Name }}: {{ .Type }}, {{ end }}):
              {{ range .Fields }}self.{{ .Name }} = {{ .Name }}
              {{ end }}

          def validate(self):
              {{ range .Validations }}
              if not self.{{ .Field }}:
                  raise ValueError("{{ .Field }} is required")
              {{ end }}
              return True
    codegen/templates/events.tmpl: |
      class {{ .Name }}Event:
          def __init__(self, {{ range .Fields }}{{ .Name }}: {{ .Type }}, {{ end }}):
              {{ range .Fields }}self.{{ .Name }} = {{ .Name }}
              {{ end }}
              self.timestamp = None

          def emit(self):
              import json
              return json.dumps(self.to_dict())

          def to_dict(self):
              return {
                  "type": "{{ .Name }}",
                  {{ range .Fields }}"{{ .Name }}": self.{{ .Name }},
                  {{ end }}
                  "timestamp": self.timestamp,
              }
    codegen/scripts/generator.py: |
