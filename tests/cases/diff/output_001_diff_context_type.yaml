    utils/logging_utils.py: |
      import sys
      from typing import TextIO

      LOG_LEVEL = "INFO"
      SUPPORTED_LEVELS = ("DEBUG", "INFO", "WARNING", "ERROR")

      class RotatingBuffer:
          def __init__(self, capacity: int = 1024):
              self.capacity = capacity
              self._buffer: list[str] = []

          def append(self, message: str) -> None:
              if len(self._buffer) >= self.capacity:
                  self._buffer.pop(0)
              self._buffer.append(message)

          def flush(self, stream: TextIO = sys.stderr) -> int:
              count = len(self._buffer)
              for line in self._buffer:
                  stream.write(line + "\n")
              self._buffer.clear()
              return count
    utils/metrics_collector.py: |
      from collections import defaultdict
      from time import monotonic

      METRICS_PREFIX = "app"

      class Timer:
          def __init__(self):
              self._start: float | None = None

          def start(self) -> None:
              self._start = monotonic()

          def elapsed_ms(self) -> float:
              if self._start is None:
                  return 0.0
              return (monotonic() - self._start) * 1000

      class CounterRegistry:
          def __init__(self):
              self._counters: dict[str, int] = defaultdict(int)

          def increment(self, name: str, value: int = 1) -> None:
              self._counters[f"{METRICS_PREFIX}.{name}"] += value

          def snapshot(self) -> dict[str, int]:
              return dict(self._counters)
