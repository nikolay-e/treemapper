  changed_files:
    src/main/scala/dsl/QueryBuilder.scala: |
      package dsl

      case class Query(table: String, conditions: List[String], columns: List[String], orderBy: Option[String], limit: Option[Int])

      class QueryBuilder(table: String) {
        private var conditions: List[String] = Nil
        private var columns: List[String] = List("*")
        private var orderByCol: Option[String] = None
        private var limitVal: Option[Int] = None

        def where(cond: String): QueryBuilder = {
          conditions = cond :: conditions
          this
        }

        def select(cols: String*): QueryBuilder = {
          columns = cols.toList
          this
        }

        def orderBy(col: String): QueryBuilder = {
          orderByCol = Some(col)
          this
        }

        def limit(n: Int): QueryBuilder = {
          limitVal = Some(n)
          this
        }

        def build: Query = Query(table, conditions.reverse, columns, orderByCol, limitVal)
      }
  commit_message: "feat: add orderBy and limit to QueryBuilder DSL"
