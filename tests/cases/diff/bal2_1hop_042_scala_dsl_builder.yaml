repo:
  initial_files:
    src/main/scala/dsl/QueryBuilder.scala: |
      package dsl

      case class Query(table: String, conditions: List[String], columns: List[String])

      class QueryBuilder(table: String) {
        private var conditions: List[String] = Nil
        private var columns: List[String] = List("*")

        def where(cond: String): QueryBuilder = {
          conditions = cond :: conditions
          this
        }

        def select(cols: String*): QueryBuilder = {
          columns = cols.toList
          this
        }

        def build: Query = Query(table, conditions.reverse, columns)
      }
    src/main/scala/repo/UserQueryRepo.scala: |
      package repo

      import dsl.{Query, QueryBuilder}

      class UserQueryRepo {
        def activeUsers: Query = {
          new QueryBuilder("users").where("active = true").select("id", "name").build
        }

        def userById(id: String): Query = {
          new QueryBuilder("users").where(s"id = '$id'").build
        }
      }
    src/main/scala/repo/OrderQueryRepo.scala: |
      package repo

      import dsl.{Query, QueryBuilder}

      class OrderQueryRepo {
        def recentOrders(limit: Int): Query = {
          new QueryBuilder("orders").where(s"created_at > now() - interval '$limit days'").build
        }
      }
    src/main/scala/executor/QueryExecutor.scala: |
      package executor

      import dsl.Query

      class QueryExecutor(connectionString: String) {
        def execute(query: Query): List[Map[String, Any]] = {
          println(s"Executing on ${query.table}")
          Nil
        }
      }
