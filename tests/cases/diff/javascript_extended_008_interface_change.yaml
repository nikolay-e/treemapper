name: javascript_extended_008_interface_change
repo:
  initial_files:
    src/interfaces.ts: |
      export interface Repository<T> {
          findById(id: string): Promise<T | null>;
          save(entity: T): Promise<T>;
      }

      export interface Identifiable {
          id: string;
      }

      export interface Timestamped {
          createdAt: Date;
          updatedAt: Date;
      }
    src/user_repo.ts: |
      import { Repository, Identifiable, Timestamped } from './interfaces';

      interface User extends Identifiable, Timestamped {
          name: string;
          email: string;
      }

      export class UserRepository implements Repository<User> {
          private users: User[] = [];

          async findById(id: string): Promise<User | null> {
              return this.users.find(u => u.id === id) ?? null;
          }

          async save(entity: User): Promise<User> {
              this.users.push(entity);
              return entity;
          }
      }
    src/unrelated/encryption.ts: |
      export class EncryptionService {
          encrypt(data: string): string {
              return Buffer.from(data).toString('base64');
          }

          decrypt(data: string): string {
              return Buffer.from(data, 'base64').toString();
          }
      }

      export function generateKey(): string {
          return crypto.randomBytes(32).toString('hex');
      }
    src/unrelated/audit.ts: |
      export class AuditService {
          private logs: string[] = [];

          record(action: string): void {
              this.logs.push(action);
          }

          getRecords(): string[] {
              return [...this.logs];
          }
      }

      export function purgeAuditLogs(): void {
          console.log('purging audit logs');
      }
