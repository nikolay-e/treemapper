    app.rb: |
      require_relative 'lib/user'

      user = User.new(name: 'John Doe', email: 'john@example.com')
      puts user.name
      puts user.id

      user.email = 'new@example.com'
      puts user.to_h.inspect

      if user.valid?
        puts "User is valid"
      end
