name: ruby_006_attr_accessor
xfail:
  category: low-relevance-threshold-tuning
repo:
  initial_files:
    lib/user.rb: |
      class User
        attr_accessor :name, :email
        attr_reader :id, :created_at

        def initialize(name:, email:, id: nil)
          @id = id || SecureRandom.uuid
          @name = name
          @email = email
          @created_at = Time.now
        end

        def to_h
          { id: @id, name: @name, email: @email, created_at: @created_at }
        end

        def valid?
          !@name.nil? && !@name.empty? && @email&.include?('@')
        end
      end
    app.rb: |
      puts 'Hello'
    lib/user_preferences.rb: |
      class UserPreferences
        DEFAULTS = {
          theme: 'light',
          language: 'en',
          notifications: true,
          timezone: 'UTC'
        }.freeze

        def initialize(user_id)
          @user_id = user_id
          @settings = DEFAULTS.dup
        end

        def get(key)
          @settings[key.to_sym]
        end

        def set(key, value)
          @settings[key.to_sym] = value
        end

        def to_h
          { user_id: @user_id, settings: @settings }
        end
      end
    lib/email_validator.rb: |
      class EmailValidator
        EMAIL_REGEX = /\A[^@\s]+@[^@\s]+\.[a-zA-Z]{2,}\z/

        def self.valid?(email)
          return false if email.nil? || email.empty?
          !!(email =~ EMAIL_REGEX)
        end

        def self.normalize(email)
          return nil unless valid?(email)
          email.strip.downcase
        end

        def self.domain(email)
          return nil unless valid?(email)
          email.split('@').last
        end
      end
  changed_files:
