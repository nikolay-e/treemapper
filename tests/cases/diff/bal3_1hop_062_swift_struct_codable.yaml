    Sources/Models/User.swift: |
      import Foundation

      struct User: Codable, Identifiable {
          let id: Int
          let name: String
          let email: String
          let avatarURL: URL?
          let role: UserRole

          enum UserRole: String, Codable {
              case admin
              case member
              case guest
          }
      }
