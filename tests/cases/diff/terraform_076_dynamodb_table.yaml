name: terraform_076_dynamodb_table
tags:
- lang:python
- lang:terraform
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    dynamodb.tf: |
      resource "aws_dynamodb_table" "users" {
        name         = "users"
        billing_mode = "PAY_PER_REQUEST"
        hash_key     = "id"

        attribute {
          name = "id"
          type = "S"
        }
      }
    src/users.py: |
      import boto3

      def get_user(user_id: str):
          dynamodb = boto3.resource("dynamodb")
          table = dynamodb.Table("users")
          return table.get_item(Key={"id": user_id})
    indexes.tf: |
      resource "aws_dynamodb_table" "users" {
        global_secondary_index {
          name            = "email-index"
          hash_key        = "email"
          projection_type = "ALL"
        }
      }
    sessions/table.tf: |
      resource "aws_dynamodb_table" "sessions" {
        name         = "sessions"
        billing_mode = "PAY_PER_REQUEST"
        hash_key     = "session_id"

        attribute {
          name = "session_id"
          type = "S"
        }

        ttl {
          attribute_name = "expires_at"
          enabled        = true
        }
      }
    email/service.py: |
      class EmailService:
          def send(self, to: str, subject: str, body: str) -> bool:
              return True
  changed_files:
    dynamodb.tf: |
      resource "aws_dynamodb_table" "users" {
        name         = "users"
        billing_mode = "PAY_PER_REQUEST"
        hash_key     = "id"
        range_key    = "created_at"

        attribute {
          name = "id"
          type = "S"
        }

        attribute {
          name = "created_at"
          type = "N"
        }
      }
  commit_message: Update files
fragments:
- id: dynamodb
  selector:
    path: dynamodb.tf
    anchor: range_key    = "created_at"
- id: dynamodb_1
  selector:
    path: dynamodb.tf
    anchor: name = "created_at"
- id: dynamodb_2
  selector:
    path: dynamodb.tf
    anchor: type = "N"
- id: users
  selector:
    path: src/users.py
    anchor: table.get_item
- id: no_table
  selector:
    path: sessions/table.tf
- id: no_service
  selector:
    path: email/service.py
- id: no_global_0
  selector:
    anchor: session_id
- id: no_global_1
  selector:
    anchor: expires_at
- id: no_global_2
  selector:
    anchor: class EmailService
oracle:
  required:
  - dynamodb
  - dynamodb_1
  - dynamodb_2
  - users
  allowed: []
  forbidden:
  - no_table
  - no_service
  - no_global_0
  - no_global_1
  - no_global_2
