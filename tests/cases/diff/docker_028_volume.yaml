name: docker_028_volume
tags:
- lang:python
- lang:shell
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/app.py: |
      import os
      import json
      from pathlib import Path

      DATA_DIR = Path('/data')
      CACHE_DIR = Path('/cache')
      LOGS_DIR = Path('/var/log/app')

      def ensure_directories():
          for directory in [DATA_DIR, CACHE_DIR, LOGS_DIR]:
              directory.mkdir(parents=True, exist_ok=True)

      def save_data(key: str, value: dict):
          filepath = DATA_DIR / f"{key}.json"
          with open(filepath, 'w') as f:
              json.dump(value, f)

      def load_data(key: str) -> dict:
          filepath = DATA_DIR / f"{key}.json"
          with open(filepath, 'r') as f:
              return json.load(f)
    requirements.txt: |
      flask==2.3.0
      gunicorn==21.2.0
    Dockerfile: |
      FROM python:3.11-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY src/ ./src/
      CMD ["python", "src/app.py"]
    scripts/backup_data.sh: |
      #!/bin/bash
      tar -czf /tmp/backup-$(date +%Y%m%d).tar.gz /data
      aws s3 cp /tmp/backup-*.tar.gz s3://backups/
    k8s/persistent-volume.yaml: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: app-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
    ops/retention.yaml: |
      policies:
        - path: /data
          retention_days: 90
        - path: /cache
          retention_days: 7
        - path: /var/log/app
          retention_days: 30
  changed_files:
    src/app.py: |
      import os
      import json
      from pathlib import Path

      DATA_DIR = Path('/data')
      CACHE_DIR = Path('/cache')
      LOGS_DIR = Path('/var/log/app')

      def ensure_directories():
          for directory in [DATA_DIR, CACHE_DIR, LOGS_DIR]:
              directory.mkdir(parents=True, exist_ok=True)

      def save_data(key: str, value: dict):
          filepath = DATA_DIR / f"{key}.json"
          with open(filepath, 'w') as f:
              json.dump(value, f)

      def load_data(key: str) -> dict:
          filepath = DATA_DIR / f"{key}.json"
          with open(filepath, 'r') as f:
              return json.load(f)
    requirements.txt: |
      flask==2.3.0
      gunicorn==21.2.0
    Dockerfile: |
      FROM python:3.12-slim-bookworm AS base
      ENV PYTHONDONTWRITEBYTECODE=1
      ENV PYTHONUNBUFFERED=1

      FROM base AS dependencies
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt

      FROM base AS production
      WORKDIR /app

      # Create user and volume directories with proper permissions
      RUN groupadd --gid 1000 appgroup && \
          useradd --uid 1000 --gid appgroup --create-home appuser && \
          mkdir -p /data /cache /var/log/app && \
          chown -R appuser:appgroup /data /cache /var/log/app /app

      # Declare volumes for persistent data
      VOLUME ["/data"]
      VOLUME ["/cache"]
      VOLUME ["/var/log/app"]

      COPY --from=dependencies /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages
      COPY --from=dependencies /usr/local/bin /usr/local/bin
      COPY --chown=appuser:appgroup src/ ./src/

      USER appuser:appgroup
      EXPOSE 8080

      CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:8080", "src.app:app"]
    scripts/backup_data.sh: |
      #!/bin/bash
      tar -czf /tmp/backup-$(date +%Y%m%d).tar.gz /data
      aws s3 cp /tmp/backup-*.tar.gz s3://backups/
    k8s/persistent-volume.yaml: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: app-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
    ops/retention.yaml: |
      policies:
        - path: /data
          retention_days: 90
        - path: /cache
          retention_days: 7
        - path: /var/log/app
          retention_days: 30
  commit_message: Update files
fragments:
- id: app
  selector:
    path: src/app.py
    anchor: DATA_DIR = Path('/data')
- id: app_1
  selector:
    path: src/app.py
    anchor: CACHE_DIR = Path('/cache')
- id: app_2
  selector:
    path: src/app.py
    anchor: LOGS_DIR = Path('/var/log/app')
- id: dockerfile_file
  selector:
    path: Dockerfile
- id: no_backup_data
  selector:
    path: scripts/backup_data.sh
- id: no_persistent_volume
  selector:
    path: k8s/persistent-volume.yaml
- id: no_retention
  selector:
    path: ops/retention.yaml
oracle:
  required:
  - app
  - app_1
  - app_2
  - dockerfile_file
  allowed: []
  forbidden:
  - no_backup_data
  - no_persistent_volume
  - no_retention
