    Program.cs: |
      using System;
      using MyApp.Services;

      class Program
      {
          static void Main()
          {
              var pipeline = new Pipeline<string>()
                  .AddStep(s => s.Trim())
                  .AddStep(s => s.ToUpper())
                  .AddStep(s => $"[{s}]");

              var result = pipeline.Execute("  hello world  ");
              Console.WriteLine(result);
          }
      }
