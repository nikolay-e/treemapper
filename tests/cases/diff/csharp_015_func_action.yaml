  changed_files:
    src/Heartrate.jl: |
      module Heartrate

      export HeartSample, classify_zone, is_elevated

      struct HeartSample
          bpm::Int
          timestamp::Float64
      end

      function classify_zone(sample::HeartSample)::String
          if sample.bpm < 60
              return "rest"
          elseif sample.bpm < 100
              return "aerobic"
          else
              return "anaerobic"
          end
      end

      function is_elevated(sample::HeartSample, threshold::Int=100)::Bool
          return sample.bpm >= threshold
      end

      end
