name: bal4_cfgcode_007_rust_db_pool
tags:
- lang:rust
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:trivial
repo:
  initial_files:
    config.toml: |
      [database]
      url = "postgres://localhost/myapp"
      pool_size = 5
      timeout_secs = 30
    src/db.rs: |
      use std::fs;
      use toml::Value;

      pub struct DbPool {
          url: String,
          pool_size: u32,
          timeout: u64,
      }

      impl DbPool {
          pub fn from_config() -> Self {
              let raw = fs::read_to_string("config.toml").unwrap();
              let cfg: Value = raw.parse().unwrap();
              let db = &cfg["database"];
              DbPool {
                  url: db["url"].as_str().unwrap().to_string(),
                  pool_size: db["pool_size"].as_integer().unwrap() as u32,
                  timeout: db["timeout_secs"].as_integer().unwrap() as u64,
              }
          }
      }
    garbage_cli.rs: |
      const GARBAGE_CFGCODE_007_CLI_A: &str = "v1.0";
      const GARBAGE_CFGCODE_007_CLI_B: bool = true;
      pub struct CliArgs {
          pub verbose: bool,
      }
      const GARBAGE_CFGCODE_007_CLI_C: u32 = 80;
      const GARBAGE_CFGCODE_007_CLI_D: &str = "default";
    garbage_logger.rs: |
      const GARBAGE_CFGCODE_007_LOG_E: &str = "info";
      const GARBAGE_CFGCODE_007_LOG_F: &str = "/var/log";
      pub fn init_logger() {
          let _level = GARBAGE_CFGCODE_007_LOG_E;
      }
      const GARBAGE_CFGCODE_007_LOG_G: bool = false;
      const GARBAGE_CFGCODE_007_LOG_H: u32 = 1024;
    garbage_metrics.rs: |
      const GARBAGE_CFGCODE_007_MET_I: &str = "prometheus";
      const GARBAGE_CFGCODE_007_MET_J: u16 = 9090;
  changed_files:
    config.toml: |
      [database]
      url = "postgres://db.prod.internal/myapp"
      pool_size = 25
      timeout_secs = 10
      max_lifetime_secs = 1800
  commit_message: "increase db pool and switch to prod host"
