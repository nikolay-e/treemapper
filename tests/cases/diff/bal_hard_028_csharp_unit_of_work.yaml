    src/Data/IRepository.cs: |
      namespace App.Data
      {
          using System.Collections.Generic;
          public interface IRepository<T> where T : class
          {
              T GetById(string id);
              List<T> GetAll();
              void Add(T entity);
              void Update(T entity);
          }
      }
    src/Data/IUnitOfWork.cs: |
      namespace App.Data
      {
          public interface IUnitOfWork
          {
              void Commit();
          }
      }
    src/Data/InMemoryRepository.cs: |
      namespace App.Data
      {
          using System.Collections.Generic;
          using System.Linq;
          public class InMemoryRepository<T> : IRepository<T> where T : class
          {
              protected readonly List<T> _store = new();
              protected readonly Func<T, string> _idSelector;
              public InMemoryRepository(Func<T, string> idSelector) { _idSelector = idSelector; }
              public T GetById(string id) => _store.FirstOrDefault(e => _idSelector(e) == id);
              public List<T> GetAll() => _store.ToList();
              public void Add(T entity) => _store.Add(entity);
              public void Update(T entity)
              {
                  var idx = _store.FindIndex(e => _idSelector(e) == _idSelector(entity));
                  if (idx >= 0) _store[idx] = entity;
              }
          }
      }
