  changed_files:
    src/Data/IUnitOfWork.cs: |
      namespace App.Data
      {
          using System;
          public interface IUnitOfWork : IDisposable
          {
              IRepository<T> Repository<T>() where T : class;
              void Commit();
              void Rollback();
          }
      }
    src/Data/InMemoryUnitOfWork.cs: |
      namespace App.Data
      {
          using System;
          using System.Collections.Generic;
          using App.Models;
          public class InMemoryUnitOfWork : IUnitOfWork
          {
              private readonly Dictionary<Type, object> _repos = new();
              private readonly List<Action> _rollbackActions = new();
              public InMemoryUnitOfWork()
              {
                  _repos[typeof(Customer)] = new InMemoryRepository<Customer>(c => c.Id);
                  _repos[typeof(OrderItem)] = new InMemoryRepository<OrderItem>(o => o.Id);
              }
              public IRepository<T> Repository<T>() where T : class
              {
                  return (IRepository<T>)_repos[typeof(T)];
              }
              public void Commit() { _rollbackActions.Clear(); }
              public void Rollback() { foreach (var action in _rollbackActions) action(); }
              public void Dispose() { }
          }
      }
    src/Service/CustomerService.cs: |
      namespace App.Service
      {
          using App.Data;
          using App.Models;
          public class CustomerService
          {
              private readonly IUnitOfWork _uow;
              public CustomerService(IUnitOfWork uow)
              {
                  _uow = uow;
              }
              public void CreateCustomerWithOrder(Customer customer, OrderItem order)
              {
                  _uow.Repository<Customer>().Add(customer);
                  _uow.Repository<OrderItem>().Add(order);
                  _uow.Commit();
              }
          }
      }
  commit_message: "feat: add unit of work pattern with rollback"
