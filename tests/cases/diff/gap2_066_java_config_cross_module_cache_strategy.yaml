name: gap2_066_java_config_cross_module_cache_strategy
tags:
- lang:cpp
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    include/render/pipeline.h: |
      #pragma once
      #include <vector>
      #include <string>

      namespace render {

      struct PipelineConfig {
          int width;
          int height;
          int msaa_samples;
          bool vsync;
      };

      class Pipeline {
      public:
          explicit Pipeline(const PipelineConfig& cfg);
          void begin_frame();
          void end_frame();
          void draw_mesh(const std::string& mesh_id);
      private:
          PipelineConfig cfg_;
      };

      }
    src/scene/renderer.cpp: |
      #include "render/pipeline.h"
      #include <memory>

      namespace scene {

      class SceneRenderer {
          std::unique_ptr<render::Pipeline> pipeline_;
      public:
          explicit SceneRenderer(const render::PipelineConfig& cfg)
              : pipeline_(std::make_unique<render::Pipeline>(cfg)) {}

          void render_frame(const std::vector<std::string>& meshes) {
              pipeline_->begin_frame();
              for (const auto& m : meshes) pipeline_->draw_mesh(m);
              pipeline_->end_frame();
          }
      };

      }
    src/ui/viewport.cpp: |
      #include "render/pipeline.h"

      namespace ui {

      class Viewport {
          render::PipelineConfig cfg_;
      public:
          explicit Viewport(int w, int h)
              : cfg_{w, h, 4, true} {}

          render::PipelineConfig config() const { return cfg_; }
      };

      }
    garbage/audio.cpp: |
      // GARBAGE_JAV066_AUDIO_A = "audio_marker"
      namespace audio { void init() {} }
    garbage/physics.cpp: |
      // GARBAGE_JAV066_PHYSICS_B = "physics_marker"
      namespace physics { void step(float dt) {} }
    garbage/scripting.cpp: |
      // GARBAGE_JAV066_SCRIPT_C = "scripting_marker"
      namespace scripting { void execute(const char* code) {} }
  changed_files:
    include/render/pipeline.h: |
      #pragma once
      #include <vector>
      #include <string>

      namespace render {

      struct PipelineConfig {
          int width;
          int height;
          int msaa_samples;
          bool vsync;
          float render_scale;
          bool hdr_enabled;
      };

      class Pipeline {
      public:
          explicit Pipeline(const PipelineConfig& cfg);
          void begin_frame();
          void end_frame();
          void draw_mesh(const std::string& mesh_id);
          void set_render_scale(float scale);
      private:
          PipelineConfig cfg_;
      };

      }
    src/scene/renderer.cpp: |
      #include "render/pipeline.h"
      #include <memory>

      namespace scene {

      class SceneRenderer {
          std::unique_ptr<render::Pipeline> pipeline_;
      public:
          explicit SceneRenderer(const render::PipelineConfig& cfg)
              : pipeline_(std::make_unique<render::Pipeline>(cfg)) {}

          void render_frame(const std::vector<std::string>& meshes) {
              pipeline_->begin_frame();
              for (const auto& m : meshes) pipeline_->draw_mesh(m);
              pipeline_->end_frame();
          }
      };

      }
    src/ui/viewport.cpp: |
      #include "render/pipeline.h"

      namespace ui {

      class Viewport {
          render::PipelineConfig cfg_;
      public:
          explicit Viewport(int w, int h)
              : cfg_{w, h, 4, true, 1.0f, false} {}

          render::PipelineConfig config() const { return cfg_; }
      };

      }
    garbage/audio.cpp: |
