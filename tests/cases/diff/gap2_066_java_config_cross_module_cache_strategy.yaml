      package config;

      import java.util.Map;

      public class CacheConfig {
          private Map<String, Object> values;

          public CacheConfig(Map<String, Object> values) {
              this.values = values;
          }

          public String getStrategy() { return (String) values.get("strategy"); }
          public int getMaxEntries() { return (int) values.get("maxEntries"); }
          public int getTtlSeconds() { return (int) values.get("ttlSeconds"); }
      }
    src/main/java/cache/CacheFactory.java: |
      package cache;

      import config.CacheConfig;

      public class CacheFactory {
          public static Object create(CacheConfig config) {
              switch (config.getStrategy()) {
                  case "lru": return new LruCache(config.getMaxEntries());
                  default: throw new IllegalArgumentException("Unknown strategy");
              }
          }
      }
