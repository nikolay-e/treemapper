  changed_files:
    src/valve.rs: |
      #[derive(Debug, Clone, PartialEq)]
      pub enum ValveState {
          Open,
          Closed,
          Faulty,
      }

      pub struct Valve {
          pub id: String,
          pub state: ValveState,
          pub flow_rate: f32,
          pub max_pressure: f32,
      }

      impl Valve {
          pub fn new(id: &str, flow_rate: f32) -> Self {
              Self {
                  id: id.to_string(),
                  state: ValveState::Closed,
                  flow_rate,
                  max_pressure: 10.0,
              }
          }

          pub fn open(&mut self) {
              self.state = ValveState::Open;
          }

          pub fn close(&mut self) {
              self.state = ValveState::Closed;
          }

          pub fn mark_faulty(&mut self) {
              self.state = ValveState::Faulty;
          }

          pub fn is_open(&self) -> bool {
              self.state == ValveState::Open
          }

          pub fn is_operational(&self) -> bool {
              self.state != ValveState::Faulty
          }
      }
    src/pipeline.rs: |
      use crate::valve::Valve;

      pub struct Pipeline {
          valves: Vec<Valve>,
      }

      impl Pipeline {
          pub fn new() -> Self {
              Self { valves: Vec::new() }
          }

          pub fn add_valve(&mut self, v: Valve) {
              self.valves.push(v);
          }

          pub fn total_flow(&self) -> f32 {
              self.valves.iter()
                  .filter(|v| v.is_open())
                  .map(|v| v.flow_rate)
                  .sum()
          }

          pub fn faulty_count(&self) -> usize {
              self.valves.iter().filter(|v| !v.is_operational()).count()
          }
      }
    src/SCALA002_telemetry.rs: |
      // SCALA002_GARBAGE_A = "telemetry_marker"
      pub fn emit_metric(_name: &str, _value: f32) {}
    src/SCALA002_config.rs: |
      // SCALA002_GARBAGE_B = "config_marker"
      pub const MAX_PRESSURE: f32 = 10.0;
    src/SCALA002_auth.rs: |
      // SCALA002_GARBAGE_C = "auth_marker"
      pub fn verify_token(_token: &str) -> bool { true }
  commit_message: "feat: add Faulty state to Valve, is_operational method, and faulty_count to Pipeline"
