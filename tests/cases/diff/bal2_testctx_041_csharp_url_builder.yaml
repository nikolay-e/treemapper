    src/Http/UrlBuilder.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Http
      {
          public class UrlBuilder
          {
              private string _baseUrl;
              private readonly Dictionary<string, string> _queryParams = new();

              public UrlBuilder(string baseUrl)
              {
                  _baseUrl = baseUrl;
              }

              public UrlBuilder AddParam(string key, string value)
              {
                  _queryParams[key] = value;
                  return this;
              }

              public string Build()
              {
                  if (_queryParams.Count == 0) return _baseUrl;
                  var query = string.Join("&", _queryParams.Select(kv => $"{kv.Key}={kv.Value}"));
                  return $"{_baseUrl}?{query}";
              }
          }
      }
    Tests/UrlBuilderTests.cs: |
      using Xunit;
      using App.Http;

      namespace App.Tests
      {
          public class UrlBuilderTests
          {
              [Fact]
              public void Build_NoParams_ReturnsBaseUrl()
              {
                  var url = new UrlBuilder("https://api.example.com").Build();
                  Assert.Equal("https://api.example.com", url);
              }

              [Fact]
              public void Build_WithParams_AppendsQueryString()
              {
                  var url = new UrlBuilder("https://api.example.com")
                      .AddParam("page", "1")
                      .Build();
                  Assert.Contains("page=1", url);
              }
          }
      }
