  changed_files:
    src/Http/UrlBuilder.cs: |
      using System;
      using System.Collections.Generic;
      using System.Linq;

      namespace App.Http
      {
          public class UrlBuilder
          {
              private string _baseUrl;
              private string _fragment;
              private readonly Dictionary<string, string> _queryParams = new();
              private readonly List<string> _pathSegments = new();

              public UrlBuilder(string baseUrl)
              {
                  _baseUrl = baseUrl;
              }

              public UrlBuilder AddParam(string key, string value)
              {
                  _queryParams[key] = value;
                  return this;
              }

              public UrlBuilder AddPath(string segment)
              {
                  _pathSegments.Add(segment.Trim('/'));
                  return this;
              }

              public UrlBuilder SetFragment(string fragment)
              {
                  _fragment = fragment;
                  return this;
              }

              public string Build()
              {
                  var url = _baseUrl.TrimEnd('/');
                  if (_pathSegments.Count > 0)
                      url += "/" + string.Join("/", _pathSegments);
                  if (_queryParams.Count > 0)
                      url += "?" + string.Join("&", _queryParams.Select(kv => $"{kv.Key}={kv.Value}"));
                  if (!string.IsNullOrEmpty(_fragment))
                      url += "#" + _fragment;
                  return url;
              }
          }
      }
  commit_message: "feat: add path segments and fragment support to URL builder"
