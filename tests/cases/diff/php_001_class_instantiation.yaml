name: php_001_class_instantiation
repo:
  initial_files:
    src/Models/User.php: |
      <?php
      namespace App\Models;

      class User {
          private string $name;
          private string $email;
          private int $age;

          public function __construct(string $name, string $email, int $age) {
              $this->name = $name;
              $this->email = $email;
              $this->age = $age;
          }

          public function getName(): string {
              return $this->name;
          }

          public function getEmail(): string {
              return $this->email;
          }

          public function getAge(): int {
              return $this->age;
          }

          public function isAdult(): bool {
              return $this->age >= 18;
          }
      }
    src/Controllers/UserController.php: |
      <?php
      namespace App\Controllers;

      class UserController {
          public function index(): array {
              return ['status' => 'ok'];
          }
      }
    src/Models/Product.php: |
      <?php
      namespace App\Models;

      class Product {
          private string $name;
          private float $price;
          private string $sku;

          public function __construct(string $name, float $price, string $sku) {
              $this->name = $name;
              $this->price = $price;
              $this->sku = $sku;
          }

          public function getName(): string {
              return $this->name;
          }

          public function getPrice(): float {
              return $this->price;
          }

          public function getSku(): string {
              return $this->sku;
          }
      }
    src/Controllers/OrderController.php: |
      <?php
      namespace App\Controllers;

      use App\Models\Product;

      class OrderController {
          public function store(array $items): array {
              return ['order' => $items, 'status' => 'created'];
          }

          public function show(int $orderId): array {
              return ['order_id' => $orderId, 'status' => 'found'];
          }
      }
    src/Validators/UserValidator.php: |
      <?php
      namespace App\Validators;

      class UserValidator {
          public function validateEmail(string $email): bool {
              return filter_var($email, FILTER_VALIDATE_EMAIL) !== false;
          }

          public function validateName(string $name): bool {
              return strlen($name) >= 2 && strlen($name) <= 100;
          }

          public function validateAge(int $age): bool {
              return $age >= 0 && $age <= 150;
          }
      }
