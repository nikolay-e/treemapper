repo:
  initial_files:
    src/main/java/com/app/payment/Currency.java: |
      package com.app.payment;

      public enum Currency {
          USD, EUR, GBP;
          public String getSymbol() {
              switch (this) {
                  case USD: return "$";
                  case EUR: return "E";
                  case GBP: return "P";
                  default: return "?";
              }
          }
      }
    src/main/java/com/app/payment/Money.java: |
      package com.app.payment;

      import com.app.payment.Currency;

      public class Money {
          private final long cents;
          private final Currency currency;
          public Money(long cents, Currency currency) {
              this.cents = cents;
              this.currency = currency;
          }
          public long getCents() { return cents; }
          public Currency getCurrency() { return currency; }
      }
    src/main/java/com/app/payment/PaymentGateway.java: |
      package com.app.payment;

      import com.app.payment.Money;

      public class PaymentGateway {
          public boolean charge(String accountId, Money amount) {
              return amount.getCents() > 0;
          }
      }
    src/main/java/com/app/order/CheckoutService.java: |
      package com.app.order;

      import com.app.payment.PaymentGateway;
      import com.app.payment.Money;
      import com.app.payment.Currency;

      public class CheckoutService {
          private final PaymentGateway gateway;
          public CheckoutService(PaymentGateway gateway) {
              this.gateway = gateway;
          }
          public boolean processOrder(String accountId, long totalCents) {
              Money money = new Money(totalCents, Currency.USD);
              return gateway.charge(accountId, money);
          }
      }
    src/main/java/com/app/shipping/ShippingCalculator.java: |
      package com.app.shipping;

      public class ShippingCalculator {
          public double calculate(double weight, String zone) {
              return weight * 2.5;
          }
      }
    src/main/java/com/app/inventory/StockManager.java: |
      package com.app.inventory;

      public class StockManager {
          public boolean isAvailable(String sku, int qty) {
              return qty > 0;
          }
      }
