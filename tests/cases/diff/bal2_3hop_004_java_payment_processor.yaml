    src/main/java/com/app/payment/Currency.java: |
      package com.app.payment;

      public enum Currency {
          USD, EUR, GBP, JPY;
          public String getSymbol() {
              switch (this) {
                  case USD: return "$";
                  case EUR: return "E";
                  case GBP: return "P";
                  case JPY: return "Y";
                  default: return "?";
              }
          }
          public int getDecimalPlaces() {
              return this == JPY ? 0 : 2;
          }
      }
