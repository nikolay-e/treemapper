name: scripting_001_class_instantiation
tags:
- lang:php
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/app.php: |
      <?php
      echo "Hello World";
    src/Models/User.php: |
      <?php
      namespace App\Models;

      class User {
          private string $name;
          private string $email;
          private int $age;
          private array $roles;

          public function __construct(string $name, string $email, int $age = 0) {
              $this->name = $name;
              $this->email = $email;
              $this->age = $age;
              $this->roles = [];
          }

          public function getName(): string {
              return $this->name;
          }

          public function getEmail(): string {
              return $this->email;
          }

          public function addRole(string $role): void {
              $this->roles[] = $role;
          }

          public function getRoles(): array {
              return $this->roles;
          }

          public function toArray(): array {
              return [
                  'name' => $this->name,
                  'email' => $this->email,
                  'age' => $this->age,
                  'roles' => $this->roles,
              ];
          }
      }
    src/Models/Product.php: |
      <?php
      namespace App\Models;

      class Product {
          private string $name;
          private float $price;
          private string $sku;

          public function __construct(string $name, float $price, string $sku) {
              $this->name = $name;
              $this->price = $price;
              $this->sku = $sku;
          }

          public function getName(): string {
              return $this->name;
          }

          public function getPrice(): float {
              return $this->price;
          }

          public function toArray(): array {
              return ['name' => $this->name, 'price' => $this->price, 'sku' => $this->sku];
          }
      }
    src/Models/Order.php: |
      <?php
      namespace App\Models;

      class Order {
          private int $id;
          private string $customerName;
          private float $total;
          private string $status;

          public function __construct(int $id, string $customerName, float $total) {
              $this->id = $id;
              $this->customerName = $customerName;
              $this->total = $total;
              $this->status = 'pending';
          }

          public function getName(): string {
              return $this->customerName;
          }

          public function toArray(): array {
              return ['id' => $this->id, 'customer' => $this->customerName, 'total' => $this->total];
          }
      }
    src/Helpers/StringHelper.php: |
      <?php
      namespace App\Helpers;

      class StringHelper {
          public static function slugify(string $text): string {
              return strtolower(preg_replace('/[^a-z0-9]+/i', '-', $text));
          }

          public static function truncate(string $text, int $length = 100): string {
              return mb_substr($text, 0, $length);
          }
      }
    src/Services/UserService.php: |
      <?php
      namespace App\Services;

      use App\Models\User;

      class UserService {
          private array $users = [];

          public function createUser(string $name, string $email, int $age): User {
              $user = new User($name, $email, $age);
              $this->users[] = $user;
              return $user;
          }

          public function assignRole(User $user, string $role): void {
              $user->addRole($role);
          }

          public function listUsers(): array {
              return array_map(fn(User $u) => $u->toArray(), $this->users);
          }
      }
    src/Views/UserView.php: |
      <?php
      namespace App\Views;

      use App\Models\User;

      class UserView {
          public function render(User $user): string {
              $data = $user->toArray();
              return sprintf(
                  "<div>%s (%s) - Roles: %s</div>",
                  $user->getName(),
                  $data['email'],
                  implode(', ', $data['roles'])
              );
          }
      }
  changed_files:
    src/app.php: |
      <?php
      require_once __DIR__ . '/Models/User.php';

      use App\Models\User;

      $user = new User('John', 'john@example.com', 30);
      $user->addRole('admin');
      echo $user->getName() . "\n";
      print_r($user->toArray());
  commit_message: Update files
