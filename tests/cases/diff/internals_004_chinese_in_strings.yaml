  changed_files:
    src/main/kotlin/gaming/ScoreValidator.kt: |
      class ScoreValidator {
          private val maxScore = 99999

          fun isValidScore(score: Int): Boolean {
              return score > 0 && score <= maxScore
          }

          fun rank(score: Int): String {
              return when {
                  score >= 9000 -> "Legendary"
                  score >= 5000 -> "Diamond"
                  score >= 1000 -> "Gold"
                  else -> "Bronze"
              }
          }
      }
    src/test/kotlin/gaming/ScoreValidatorTest.kt: |
      import org.junit.Test
      import kotlin.test.assertFalse
