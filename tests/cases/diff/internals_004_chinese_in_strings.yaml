repo:
  initial_files:
    src/main/kotlin/gaming/ScoreValidator.kt: |
      class ScoreValidator {
          fun isValidScore(score: Int): Boolean {
              return score > 0  // BUG: should also check upper bound
          }

          fun rank(score: Int): String {
              return when {
                  score >= 9000 -> "Legendary"
                  score >= 5000 -> "Diamond"
                  score >= 1000 -> "Gold"
                  else -> "Bronze"
              }
          }
      }
    src/test/kotlin/gaming/ScoreValidatorTest.kt: |
      import org.junit.Test
      import kotlin.test.assertFalse
      import kotlin.test.assertTrue
      import kotlin.test.assertEquals

      class ScoreValidatorTest {
          private val validator = ScoreValidator()

          @Test fun positiveScoreValid() {
              assertTrue(validator.isValidScore(100))
          }

          @Test fun zeroScoreInvalid() {
              assertFalse(validator.isValidScore(0))
          }

          @Test fun ranksCorrectly() {
              assertEquals("Gold", validator.rank(2500))
          }
      }
