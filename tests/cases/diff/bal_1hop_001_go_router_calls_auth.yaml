repo:
  initial_files:
    internal/auth/token.go: |
      package auth

      import "time"

      type Claims struct {
          UserID string
          Exp    time.Time
      }

      func ValidateToken(raw string) (*Claims, error) {
          if raw == "" {
              return nil, fmt.Errorf("empty token")
          }
          return &Claims{UserID: "u1", Exp: time.Now().Add(time.Hour)}, nil
      }
    internal/router/routes.go: |
      package router

      import (
          "net/http"
          "myapp/internal/auth"
      )

      func SetupRoutes(mux *http.ServeMux) {
          mux.HandleFunc("/profile", func(w http.ResponseWriter, r *http.Request) {
              claims, err := auth.ValidateToken(r.Header.Get("Authorization"))
              if err != nil {
                  http.Error(w, "unauthorized", 401)
                  return
              }
              w.Write([]byte("hello " + claims.UserID))
          })
      }
    internal/db/connection.go: |
      package db

      type Pool struct {
          DSN string
      }

      func NewPool(dsn string) *Pool {
          return &Pool{DSN: dsn}
      }
    cmd/server/main.go: |
      package main

      import "net/http"

      func main() {
          mux := http.NewServeMux()
          http.ListenAndServe(":8080", mux)
      }
  changed_files:
    internal/auth/token.go: |
      package auth

      import (
          "fmt"
          "time"
      )

      type Claims struct {
          UserID string
          Role   string
          Exp    time.Time
      }

      func ValidateToken(raw string, allowExpired bool) (*Claims, error) {
          if raw == "" {
              return nil, fmt.Errorf("empty token")
          }
          c := &Claims{UserID: "u1", Role: "user", Exp: time.Now().Add(time.Hour)}
          if !allowExpired && c.Exp.Before(time.Now()) {
              return nil, fmt.Errorf("token expired")
          }
          return c, nil
      }
  commit_message: "feat: add allowExpired param and Role to Claims"
