name: bal_rare_016_nim_string_utils
tags:
- lang:nim
- change:single_file
- change:new_function
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    src/strutils.nim: |
      proc capitalize*(s: string): string =
        if s.len == 0: return ""
        result = s[0].toUpperAscii & s[1..^1].toLowerAscii

      proc repeat_str*(s: string, n: int): string =
        result = ""
        for i in 0..<n:
          result.add(s)

      proc trim_left*(s: string): string =
        var i = 0
        while i < s.len and s[i] == ' ':
          inc i
        result = s[i..^1]
    src/formatter.nim: |
      import strutils

      proc format_name*(first, last: string): string =
        capitalize(first) & " " & capitalize(last)

      proc format_list*(items: seq[string], sep: string = ", "): string =
        result = ""
        for i, item in items:
          if i > 0: result.add(sep)
          result.add(item)
    garbage_crypto.nim: |
      const GARBAGE_RARE_016_ALGO_A = "aes256"
      const GARBAGE_RARE_016_KEYLEN_B = 32

      proc garbage_encrypt*() =
        discard GARBAGE_RARE_016_ALGO_A

      const GARBAGE_RARE_016_IV_C = 16
    garbage_compress.nim: |
      const GARBAGE_RARE_016_METHOD_D = "gzip"
      const GARBAGE_RARE_016_LEVEL_E = 6

      proc garbage_compress*() =
        discard GARBAGE_RARE_016_METHOD_D

      const GARBAGE_RARE_016_WINDOW_F = 15
  changed_files:
    src/strutils.nim: |
      proc capitalize*(s: string): string =
        if s.len == 0: return ""
        result = s[0].toUpperAscii & s[1..^1].toLowerAscii

      proc repeat_str*(s: string, n: int): string =
        result = ""
        for i in 0..<n:
          result.add(s)

      proc trim_left*(s: string): string =
        var i = 0
        while i < s.len and s[i] == ' ':
          inc i
        result = s[i..^1]

      proc trim_right*(s: string): string =
        var i = s.len - 1
        while i >= 0 and s[i] == ' ':
          dec i
        result = s[0..i]

      proc trim*(s: string): string =
        trim_left(trim_right(s))
    src/formatter.nim: |
      import strutils

      proc format_name*(first, last: string): string =
        capitalize(first) & " " & capitalize(last)

      proc format_list*(items: seq[string], sep: string = ", "): string =
        result = ""
        for i, item in items:
          if i > 0: result.add(sep)
          result.add(item)
    garbage_crypto.nim: |
      const GARBAGE_RARE_016_ALGO_A = "aes256"
      const GARBAGE_RARE_016_KEYLEN_B = 32

      proc garbage_encrypt*() =
        discard GARBAGE_RARE_016_ALGO_A

      const GARBAGE_RARE_016_IV_C = 16
    garbage_compress.nim: |
      const GARBAGE_RARE_016_METHOD_D = "gzip"
      const GARBAGE_RARE_016_LEVEL_E = 6

      proc garbage_compress*() =
        discard GARBAGE_RARE_016_METHOD_D

      const GARBAGE_RARE_016_WINDOW_F = 15
  commit_message: "feat: add trim_right and trim functions"
