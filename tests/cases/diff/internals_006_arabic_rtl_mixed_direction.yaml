    src/main/kotlin/streaming/StreamConsumer.kt: |
      class StreamConsumer(private val maxRetries: Int) {
          fun consume(topic: String): List<String> {
              if (topic.isEmpty()) return emptyList()
              return fetchMessages(topic)
          }

          private fun fetchMessages(topic: String): List<String> {
              var attempt = 0
              while (attempt < maxRetries) {
                  try {
                      return listOf("msg1", "msg2")
                  } catch (e: Exception) {
                      attempt++
                  }
              }
              return emptyList()  // BUG: should throw after exhausting retries
          }
      }
    src/test/kotlin/streaming/StreamConsumerTest.kt: |
      import org.junit.Test
      import kotlin.test.assertEquals
      import kotlin.test.assertFailsWith

      class StreamConsumerTest {
          @Test fun consumesMessages() {
              val consumer = StreamConsumer(3)
              val msgs = consumer.consume("events")
              assertEquals(2, msgs.size)
          }

          @Test fun emptyTopicReturnsEmpty() {
              val consumer = StreamConsumer(3)
              assertEquals(emptyList(), consumer.consume(""))
          }
      }
