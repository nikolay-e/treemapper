      package task

      type Status int

      const (
          Pending Status = iota
          Running
          Completed
          Failed
      )

      type Job struct {
          ID      string
          Payload string
          Status  Status
          Attempt int
      }

      func NewJob(id string, payload string) *Job {
          return &Job{ID: id, Payload: payload, Status: Pending, Attempt: 0}
      }

      func (j *Job) MarkRunning() {
          j.Status = Running
          j.Attempt++
      }

      func (j *Job) MarkCompleted() {
          j.Status = Completed
      }

      func (j *Job) MarkFailed() {
          j.Status = Failed
      }
    internal/task/queue.go: |
      package task

      type Queue struct {
          Jobs []*Job
      }

      func NewQueue() *Queue {
          return &Queue{}
      }

      func (q *Queue) Enqueue(job *Job) {
          q.Jobs = append(q.Jobs, job)
      }

      func (q *Queue) Dequeue() *Job {
          if len(q.Jobs) == 0 {
              return nil
          }
          job := q.Jobs[0]
          q.Jobs = q.Jobs[1:]
          return job
      }

      func (q *Queue) Len() int {
          return len(q.Jobs)
      }
    internal/pipeline/executor.go: |
      package pipeline

