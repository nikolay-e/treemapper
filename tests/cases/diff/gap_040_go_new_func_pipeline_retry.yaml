  changed_files:
    internal/task/job.go: |
      package task

      type Status int

      const (
          Pending Status = iota
          Running
          Completed
          Failed
      )

      type Job struct {
          ID         string
          Payload    string
          Status     Status
          Attempt    int
          MaxRetries int
      }

      func NewJob(id string, payload string) *Job {
          return &Job{ID: id, Payload: payload, Status: Pending, Attempt: 0, MaxRetries: 3}
      }

      func (j *Job) MarkRunning() {
          j.Status = Running
          j.Attempt++
      }

      func (j *Job) MarkCompleted() {
          j.Status = Completed
      }

      func (j *Job) MarkFailed() {
          j.Status = Failed
      }

      func (j *Job) CanRetry() bool {
          return j.Attempt < j.MaxRetries && j.Status == Failed
      }
    internal/task/queue.go: |
      package task

      type Queue struct {
          Jobs []*Job
      }

      func NewQueue() *Queue {
          return &Queue{}
      }

      func (q *Queue) Enqueue(job *Job) {
          q.Jobs = append(q.Jobs, job)
      }

      func (q *Queue) Dequeue() *Job {
          if len(q.Jobs) == 0 {
              return nil
          }
          job := q.Jobs[0]
          q.Jobs = q.Jobs[1:]
          return job
      }

      func (q *Queue) Len() int {
          return len(q.Jobs)
      }

      func (q *Queue) RequeueFailed() int {
          var retry []*Job
          var keep []*Job
          for _, j := range q.Jobs {
              if j.CanRetry() {
                  j.Status = Pending
                  retry = append(retry, j)
              } else {
                  keep = append(keep, j)
              }
          }
          q.Jobs = append(keep, retry...)
          return len(retry)
      }
    internal/pipeline/executor.go: |
      package pipeline

      import "internal/task"

      type Executor struct {
          Queue *task.Queue
      }

      func NewExecutor(q *task.Queue) *Executor {
          return &Executor{Queue: q}
      }

      func (e *Executor) ProcessNext() *task.Job {
          job := e.Queue.Dequeue()
          if job == nil {
              return nil
          }
          job.MarkRunning()
          job.MarkCompleted()
          return job
      }

      func (e *Executor) ProcessAll() int {
          count := 0
          for e.Queue.Len() > 0 {
              e.ProcessNext()
              count++
          }
          return count
      }

      func (e *Executor) ProcessWithRetry() (completed int, retried int) {
          completed = e.ProcessAll()
          retried = e.Queue.RequeueFailed()
          if retried > 0 {
              completed += e.ProcessAll()
          }
          return completed, retried
      }
