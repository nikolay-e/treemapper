name: bal4_cfgcode_010_rust_cors_origins
tags:
- lang:rust
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    config.toml: |
      [cors]
      allowed_origins = ["http://localhost:3000"]
      allow_credentials = false
      max_age_secs = 3600
    src/cors.rs: |
      use std::fs;
      use toml::Value;

      pub struct CorsConfig {
          pub origins: Vec<String>,
          pub credentials: bool,
          pub max_age: u64,
      }

      impl CorsConfig {
          pub fn load() -> Self {
              let raw = fs::read_to_string("config.toml").unwrap();
              let cfg: Value = raw.parse().unwrap();
              let cors = &cfg["cors"];
              let origins = cors["allowed_origins"]
                  .as_array().unwrap()
                  .iter().map(|v| v.as_str().unwrap().to_string())
                  .collect();
              CorsConfig {
                  origins,
                  credentials: cors["allow_credentials"].as_bool().unwrap(),
                  max_age: cors["max_age_secs"].as_integer().unwrap() as u64,
              }
          }
      }
    src/middleware/cors_layer.rs: |
      use crate::cors::CorsConfig;

      pub struct CorsLayer {
          config: CorsConfig,
      }

      impl CorsLayer {
          pub fn new() -> Self {
              CorsLayer { config: CorsConfig::load() }
          }
          pub fn is_origin_allowed(&self, origin: &str) -> bool {
              self.config.origins.contains(&origin.to_string())
          }
      }
    garbage_db.rs: |
      const GARBAGE_CFGCODE_010_DB_A: &str = "sqlite";
      const GARBAGE_CFGCODE_010_DB_B: u32 = 10;
      pub struct DbConn {
          pub path: String,
      }
      const GARBAGE_CFGCODE_010_DB_C: &str = "wal";
      const GARBAGE_CFGCODE_010_DB_D: bool = true;
    garbage_session.rs: |
      const GARBAGE_CFGCODE_010_SESS_E: &str = "cookie";
      const GARBAGE_CFGCODE_010_SESS_F: u64 = 7200;
      pub struct SessionStore {
          pub ttl: u64,
      }
      const GARBAGE_CFGCODE_010_SESS_G: bool = true;
      const GARBAGE_CFGCODE_010_SESS_H: &str = "secure";
    garbage_template.rs: |
      const GARBAGE_CFGCODE_010_TMPL_I: &str = "tera";
      const GARBAGE_CFGCODE_010_TMPL_J: bool = false;
  changed_files:
    config.toml: |
      [cors]
      allowed_origins = ["https://myapp.com", "https://staging.myapp.com"]
      allow_credentials = true
      max_age_secs = 86400
  commit_message: "restrict cors to production origins"
