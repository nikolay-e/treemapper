name: rust_028_build_rs
tags:
- lang:rust
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
xfail:
  category: rust-cross-dir-discovery
repo:
  initial_files:
    build.rs: |
      fn main() {
          println!("cargo:rerun-if-changed=proto/");
          tonic_build::compile_protos("proto/service.proto").unwrap();
      }
    src/lib.rs: |
      pub mod service;
      pub mod telemetry;
      pub mod health;
      pub mod client;
      pub mod interceptor;
    src/service.rs: |
      pub mod proto {
          tonic::include_proto!("service");
      }

      pub use proto::service_server::Service;

      pub struct ServiceImpl {
          name: String,
      }

      impl ServiceImpl {
          pub fn new(name: &str) -> Self {
              Self { name: name.to_string() }
          }

          pub fn service_name(&self) -> &str {
              &self.name
          }
      }
    src/telemetry.rs: |
      use tracing::{info, instrument};

      pub struct RequestTracer {
          service_name: String,
          sample_rate: f64,
      }

      impl RequestTracer {
          pub fn new(service_name: &str, sample_rate: f64) -> Self {
              Self {
                  service_name: service_name.to_string(),
                  sample_rate,
              }
          }

          #[instrument(skip(self))]
          pub fn trace_request(&self, method: &str, path: &str) {
              info!(service = %self.service_name, method, path, "incoming request");
          }

          pub fn set_sample_rate(&mut self, rate: f64) {
              self.sample_rate = rate.clamp(0.0, 1.0);
          }
      }
    src/health.rs: |
      use serde::Serialize;

      #[derive(Serialize)]
      pub struct HealthResponse {
          pub status: String,
          pub uptime_seconds: u64,
      }

      pub fn check_health(start_time: std::time::Instant) -> HealthResponse {
          HealthResponse {
              status: "ok".to_string(),
              uptime_seconds: start_time.elapsed().as_secs(),
          }
      }

      pub fn liveness_probe() -> bool {
          true
      }
    src/client.rs: |
      pub mod proto {
          tonic::include_proto!("service");
      }

      pub use proto::service_client::ServiceClient;

      pub struct ClientConfig {
          endpoint: String,
          timeout_ms: u64,
      }

      impl ClientConfig {
          pub fn new(endpoint: &str) -> Self {
              Self {
                  endpoint: endpoint.to_string(),
                  timeout_ms: 5000,
              }
          }

          pub fn with_timeout(mut self, ms: u64) -> Self {
              self.timeout_ms = ms;
              self
          }

          pub fn endpoint(&self) -> &str {
              &self.endpoint
          }
      }
    src/interceptor.rs: |
      use tonic::{Request, Status};

      pub fn auth_interceptor(req: Request<()>) -> Result<Request<()>, Status> {
          let token = req
              .metadata()
              .get("authorization")
              .and_then(|v| v.to_str().ok());

          match token {
              Some(t) if t.starts_with("Bearer ") => Ok(req),
              _ => Err(Status::unauthenticated("Missing or invalid token")),
          }
      }

      pub fn logging_interceptor(req: Request<()>) -> Result<Request<()>, Status> {
          println!("Request to: {:?}", req.uri());
          Ok(req)
      }
    Cargo.toml: |
      [package]
      name = "grpc-service"
      version = "0.1.0"
      edition = "2021"

      [dependencies]
      tonic = "0.11"
      prost = "0.12"
      tokio = { version = "1", features = ["full"] }
      serde = { version = "1", features = ["derive"] }
      tracing = "0.1"

      [build-dependencies]
      tonic-build = "0.11"
  changed_files:
    build.rs: |
      fn main() {
          println!("cargo:rerun-if-changed=proto/");

          tonic_build::configure()
              .build_server(true)
              .build_client(true)
              .out_dir("src/generated")
              .compile(
                  &["proto/service.proto", "proto/types.proto"],
                  &["proto/"],
              )
              .unwrap();
      }
  commit_message: Update files
