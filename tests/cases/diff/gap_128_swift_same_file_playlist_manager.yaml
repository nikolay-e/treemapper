repo:
  initial_files:
    Sources/Music/PlaylistManager.swift: |
      import Foundation

      struct Track {
          let id: String
          let title: String
          let artist: String
          let durationSeconds: Int
      }

      class PlaylistManager {
          private var playlists: [String: [Track]] = [:]

          func createPlaylist(name: String) {
              playlists[name] = []
          }

          func addTrack(_ track: Track, to playlist: String) {
              playlists[playlist]?.append(track)
          }

          func removeTrack(id: String, from playlist: String) {
              playlists[playlist]?.removeAll { $0.id == id }
          }

          func totalDuration(of playlist: String) -> Int {
              playlists[playlist]?.reduce(0) { $0 + $1.durationSeconds } ?? 0
          }

          func trackCount(in playlist: String) -> Int {
              playlists[playlist]?.count ?? 0
          }
      }
    Sources/Music/AudioPlayer.swift: |
      import Foundation

      enum PlaybackState {
          case playing
          case paused
          case stopped
      }

      class AudioPlayer {
          private var state: PlaybackState = .stopped
          private var currentTrack: Track?

          func play(_ track: Track) {
              currentTrack = track
              state = .playing
          }

          func pause() {
              state = .paused
          }

          func stop() {
              state = .stopped
              currentTrack = nil
          }

          func currentState() -> PlaybackState {
              return state
          }
      }
    Sources/Social/ShareService.swift: |
      import Foundation

      class ShareService {
          func shareTrack(_ trackId: String, to platform: String) -> Bool {
              return true
          }

          func generateShareLink(trackId: String) -> String {
              "https://music.example.com/track/\(trackId)"
          }

          func sharePlaylist(_ playlistName: String) -> String {
              "https://music.example.com/playlist/\(playlistName)"
          }
      }
