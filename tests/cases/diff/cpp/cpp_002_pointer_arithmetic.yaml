# Test 002: Parser rewritten to use BufferView — reviewer needs the header
#
# Scenario: src/parser.cpp is rewritten from a trivial stub into a full
# tokenizer that includes and uses app::memory::BufferView and safeStrlen
# from include/memory/buffer_view.hpp. The parser uses pointer arithmetic
# on BufferView::begin()/end() and calls safeStrlen for length.
#
# Reviewer questions:
#   Q1: "What is BufferView<T>?" -> buffer_view.hpp defines the template:
#       begin()/end() return raw T*, operator[] has bounds checking,
#       subview() does offset+count validation. Reviewer needs this to
#       verify the parser's pointer arithmetic is safe (e.g., that
#       `view.begin()` and `view.end()` return valid range pointers).
#   Q2: "What is safeStrlen?" -> Same header: null-checks before strlen.
#       Parser calls safeStrlen(input) — reviewer needs to confirm it
#       handles null input correctly.
#
# Not needed:
#   - network/socket_pool.hpp: connection pooling with raw pointers.
#     Same codebase, uses pointer arithmetic, but different subsystem
#     entirely — no shared types with the parser.
#   - memory/allocator.hpp: custom memory allocator in the same
#     memory/ directory as buffer_view.hpp. Same namespace sibling,
#     but parser does not use any allocator API.
#   - CMakeLists.txt: build config. Knowing compile flags does not
#     help verify pointer arithmetic correctness.

initial:
  include/memory/buffer_view.hpp: |
    #pragma once
    #include <cstddef>
    #include <cstring>
    #include <stdexcept>

    namespace app::memory {

    template<typename T>
    class BufferView {
    public:
        BufferView(T* data, size_t size)
            : data_(data), size_(size) {}

        T* begin() { return data_; }
        T* end() { return data_ + size_; }
        const T* begin() const { return data_; }
        const T* end() const { return data_ + size_; }

        T& operator[](size_t index) {
            if (index >= size_) throw std::out_of_range("Index out of bounds");
            return data_[index];
        }

        const T& operator[](size_t index) const {
            if (index >= size_) throw std::out_of_range("Index out of bounds");
            return data_[index];
        }

        size_t size() const { return size_; }
        bool empty() const { return size_ == 0; }

        BufferView<T> subview(size_t offset, size_t count) const {
            if (offset + count > size_) throw std::out_of_range("Subview out of bounds");
            return BufferView<T>(data_ + offset, count);
        }

    private:
        T* data_;
        size_t size_;
    };

    inline size_t safeStrlen(const char* str) {
        if (!str) return 0;
        return strlen(str);
    }

    }
  src/parser.cpp: |
    #include <iostream>
    int main() { return 0; }
  include/network/socket_pool.hpp: |
    #pragma once
    #include <cstddef>
    #include <vector>
    #include <functional>

    namespace app::network {

    struct SocketHandle {
        int fd;
        bool active;
        size_t bytesRead;
        size_t bytesWritten;
    };

    class SocketPool {
    public:
        SocketPool(size_t maxConnections)
            : maxConnections_(maxConnections) {
            sockets_.reserve(maxConnections);
        }

        SocketHandle* acquire() {
            for (auto& sock : sockets_) {
                if (!sock.active) {
                    sock.active = true;
                    return &sock;
                }
            }
            if (sockets_.size() < maxConnections_) {
                sockets_.push_back({-1, true, 0, 0});
                return &sockets_.back();
            }
            return nullptr;
        }

        void release(SocketHandle* handle) {
            if (handle) {
                handle->active = false;
                handle->bytesRead = 0;
                handle->bytesWritten = 0;
            }
        }

        size_t activeCount() const {
            size_t count = 0;
            for (const auto& s : sockets_) {
                if (s.active) ++count;
            }
            return count;
        }

    private:
        std::vector<SocketHandle> sockets_;
        size_t maxConnections_;
    };

    }
  include/memory/allocator.hpp: |
    #pragma once
    #include <cstddef>
    #include <cstdlib>
    #include <new>

    namespace app::memory {

    class PoolAllocator {
    public:
        explicit PoolAllocator(size_t blockSize, size_t blockCount)
            : blockSize_(blockSize), blockCount_(blockCount) {
            pool_ = static_cast<char*>(std::malloc(blockSize * blockCount));
            if (!pool_) throw std::bad_alloc();
            freeList_ = pool_;
            for (size_t i = 0; i < blockCount - 1; ++i) {
                char* current = pool_ + i * blockSize;
                char* next = pool_ + (i + 1) * blockSize;
                *reinterpret_cast<char**>(current) = next;
            }
            *reinterpret_cast<char**>(pool_ + (blockCount - 1) * blockSize) = nullptr;
        }

        ~PoolAllocator() { std::free(pool_); }

        void* allocate() {
            if (!freeList_) throw std::bad_alloc();
            void* block = freeList_;
            freeList_ = *reinterpret_cast<char**>(freeList_);
            return block;
        }

        void deallocate(void* ptr) {
            *reinterpret_cast<char**>(ptr) = freeList_;
            freeList_ = static_cast<char*>(ptr);
        }

    private:
        char* pool_;
        char* freeList_;
        size_t blockSize_;
        size_t blockCount_;
    };

    }
