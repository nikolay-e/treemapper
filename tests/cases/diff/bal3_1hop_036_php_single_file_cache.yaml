  changed_files:
    src/Cache/CacheManager.php: |
      <?php
      namespace App\Cache;

      class CacheManager
      {
          private array $store = [];
          private array $ttl = [];

          public function get(string $key): mixed
          {
              if (isset($this->ttl[$key]) && time() > $this->ttl[$key]) {
                  $this->delete($key);
                  return null;
              }
              return $this->store[$key] ?? null;
          }

          public function set(string $key, mixed $value, int $ttlSeconds = 0): void
          {
              $this->store[$key] = $value;
              if ($ttlSeconds > 0) {
                  $this->ttl[$key] = time() + $ttlSeconds;
              }
          }

          public function delete(string $key): void
          {
              unset($this->store[$key], $this->ttl[$key]);
          }

          public function flush(): void
          {
              $this->store = [];
              $this->ttl = [];
          }
      }
  commit_message: "Add TTL support and flush to CacheManager"
