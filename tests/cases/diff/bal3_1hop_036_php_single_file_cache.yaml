      <?php
      namespace App\Cache;

      class CacheManager
      {
          private array $store = [];

          public function get(string $key): mixed
          {
              return $this->store[$key] ?? null;
          }

          public function set(string $key, mixed $value): void
          {
              $this->store[$key] = $value;
          }

          public function delete(string $key): void
          {
              unset($this->store[$key]);
          }
      }
    src/Services/ProductCatalog.php: |
      <?php
      namespace App\Services;

      use App\Cache\CacheManager;

      class ProductCatalog
      {
          private CacheManager $cache;

          public function __construct(CacheManager $cache)
          {
              $this->cache = $cache;
          }

          public function getProduct(int $id): ?array
          {
              $cached = $this->cache->get("product_{$id}");
              if ($cached !== null) {
                  return $cached;
              }
              $product = ['id' => $id, 'name' => 'Widget'];
              $this->cache->set("product_{$id}", $product);
              return $product;
          }
      }
    src/Services/SessionManager.php: |
      <?php
      namespace App\Services;

      use App\Cache\CacheManager;

      class SessionManager
      {
          private CacheManager $cache;

          public function __construct(CacheManager $cache)
          {
              $this->cache = $cache;
          }

          public function getSession(string $token): ?array
          {
              return $this->cache->get("session_{$token}");
          }

          public function createSession(string $token, array $data): void
          {
              $this->cache->set("session_{$token}", $data);
          }

          public function destroySession(string $token): void
          {
              $this->cache->delete("session_{$token}");
          }
      }
