  changed_files:
    payments/processor.py: |
      from decimal import Decimal

      class PaymentProcessor:
          def __init__(self):
              self._transactions: dict[str, dict] = {}

          def charge(self, tx_id: str, amount: Decimal, currency: str) -> dict:
              if amount <= 0:
                  raise ValueError("Amount must be positive")
              record = {
                  "id": tx_id,
                  "amount": amount,
                  "currency": currency,
                  "status": "captured",
              }
              self._transactions[tx_id] = record
              return record

          def refund(self, tx_id: str, amount: Decimal | None = None) -> dict:
              original = self._transactions.get(tx_id)
              if original is None:
                  raise KeyError(f"Transaction not found: {tx_id}")
              if original["status"] == "refunded":
                  raise ValueError(f"Already refunded: {tx_id}")
              refund_amount = amount or original["amount"]
              if refund_amount > original["amount"]:
                  raise ValueError("Refund exceeds original amount")
              original["status"] = "refunded"
              refund_id = f"ref-{tx_id}"
              refund_record = {
                  "id": refund_id,
                  "original_tx": tx_id,
                  "amount": refund_amount,
                  "currency": original["currency"],
                  "status": "refunded",
              }
              self._transactions[refund_id] = refund_record
              return refund_record

          def get_transaction(self, tx_id: str) -> dict | None:
              return self._transactions.get(tx_id)
    payments/ledger.py: |
      from decimal import Decimal
      from datetime import datetime

      class LedgerEntry:
          def __init__(self, tx_id: str, amount: Decimal, entry_type: str):
              self.tx_id = tx_id
              self.amount = amount
              self.entry_type = entry_type
              self.timestamp = datetime.utcnow()

      class Ledger:
          def __init__(self):
              self._entries: list[LedgerEntry] = []

          def record_charge(self, tx_id: str, amount: Decimal) -> None:
              self._entries.append(LedgerEntry(tx_id, amount, "charge"))

          def record_refund(self, tx_id: str, amount: Decimal) -> None:
              self._entries.append(LedgerEntry(tx_id, -amount, "refund"))

          def balance(self) -> Decimal:
              total = Decimal("0")
              for entry in self._entries:
                  total += entry.amount
              return total

          def entries_for(self, tx_id: str) -> list[LedgerEntry]:
              return [e for e in self._entries if e.tx_id == tx_id]
    api/payment_routes.py: |
      from decimal import Decimal
      from payments.processor import PaymentProcessor
      from payments.ledger import Ledger

      class PaymentAPI:
          def __init__(self):
              self._processor = PaymentProcessor()
              self._ledger = Ledger()

          def handle_charge(self, tx_id: str, amount_str: str, currency: str) -> dict:
              amount = Decimal(amount_str)
              result = self._processor.charge(tx_id, amount, currency)
              self._ledger.record_charge(tx_id, amount)
              return result

          def handle_refund(self, tx_id: str, amount_str: str | None = None) -> dict:
              amount = Decimal(amount_str) if amount_str else None
              result = self._processor.refund(tx_id, amount)
              self._ledger.record_refund(tx_id, result["amount"])
              return result
