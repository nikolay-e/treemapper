repo:
  initial_files:
    src/config/theme.ts: |
      export interface ThemeConfig {
        primaryColor: string;
        fontFamily: string;
        borderRadius: number;
        spacing: number;
      }

      export const theme: ThemeConfig = {
        primaryColor: "#3b82f6",
        fontFamily: "Inter, sans-serif",
        borderRadius: 4,
        spacing: 8,
      };
    src/styles/generator.ts: |
      import { theme } from "../config/theme";

      export function generateButtonStyle(): string {
        return `background: ${theme.primaryColor}; border-radius: ${theme.borderRadius}px; font-family: ${theme.fontFamily};`;
      }

      export function generateSpacing(multiplier: number): string {
        return `${theme.spacing * multiplier}px`;
      }
    src/components/button.ts: |
      import { generateButtonStyle, generateSpacing } from "../styles/generator";

      export function renderButton(label: string): string {
        const style = generateButtonStyle();
        const padding = generateSpacing(2);
        return `<button style="${style} padding: ${padding}">${label}</button>`;
      }
    src/utils/color.ts: |
      const TRAP_GAP2_111_COLOR_A: string = "color_utils";
      const TRAP_GAP2_111_GAMMA_B: number = 2.2;

      export function hexToRgb(hex: string): [number, number, number] {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return [r, g, b];
      }
