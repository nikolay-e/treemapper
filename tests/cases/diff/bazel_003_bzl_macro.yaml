  changed_files:
    macros/service.bzl: |
      def py_service_library(name, srcs, deps = [], port = 8080, health_check = True, visibility = None):
          native.py_library(
              name = name + "_lib",
              srcs = srcs,
              deps = deps,
              visibility = visibility,
          )

          args = ["--port", str(port)]
          if health_check:
              args.extend(["--health-check", "/healthz"])

          native.py_binary(
              name = name,
              srcs = [name + "_main.py"],
              deps = [":" + name + "_lib"],
              args = args,
              visibility = visibility,
          )
    services/api/BUILD: |
      load("//macros:service.bzl", "py_service_library")

