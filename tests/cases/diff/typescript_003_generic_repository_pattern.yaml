name: typescript_003_generic_repository_pattern
repo:
  initial_files:
    src/database/connection.ts: |
      export interface QueryResult<T> {
        rows: T[];
        rowCount: number;
      }

      export interface DatabaseConnection {
        query<T>(sql: string, params?: unknown[]): Promise<QueryResult<T>>;
      }
    src/types/entity.ts: |
      export interface BaseEntity {
        id: string;
        createdAt: Date;
      }

      export interface User extends BaseEntity {
        email: string;
        name: string;
      }

      export interface Post extends BaseEntity {
        title: string;
        content: string;
        authorId: string;
      }

      export interface Comment extends BaseEntity {
        body: string;
        postId: string;
      }
    src/repositories/repository.ts: |
      import { BaseEntity } from '../types/entity';

      export interface Repository<T extends BaseEntity> {
        findById(id: string): Promise<T | null>;
        findAll(): Promise<T[]>;
        create(data: Omit<T, keyof BaseEntity>): Promise<T>;
        delete(id: string): Promise<boolean>;
      }
    src/repositories/userRepository.ts: |
      import { DatabaseConnection } from '../database/connection';
      import { User, BaseEntity } from '../types/entity';
      import { Repository } from './repository';

      export class UserRepository implements Repository<User> {
        constructor(private connection: DatabaseConnection) {}

        async findById(id: string): Promise<User | null> {
          const result = await this.connection.query<User>('SELECT * FROM users WHERE id = $1', [id]);
          return result.rows[0] || null;
        }

        async findAll(): Promise<User[]> {
          const result = await this.connection.query<User>('SELECT * FROM users');
          return result.rows;
        }

        async create(data: Omit<User, keyof BaseEntity>): Promise<User> {
          const result = await this.connection.query<User>(
            'INSERT INTO users (email, name) VALUES ($1, $2) RETURNING *',
            [data.email, data.name]
          );
          return result.rows[0];
        }

        async delete(id: string): Promise<boolean> {
          const result = await this.connection.query('DELETE FROM users WHERE id = $1', [id]);
          return result.rowCount > 0;
        }
      }
