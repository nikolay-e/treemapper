      from dataclasses import dataclass
      from decimal import Decimal
      from enum import Enum

      class ShippingMethod(Enum):
          STANDARD = "standard"
          EXPRESS = "express"

      @dataclass
      class ShippingRate:
          method: ShippingMethod
          cost: Decimal
          estimated_days: int

      class ShippingCalculator:
          def calculate(self, weight_kg: float, method: ShippingMethod = ShippingMethod.STANDARD) -> ShippingRate:
              base = Decimal("5.99") if method == ShippingMethod.STANDARD else Decimal("12.99")
              surcharge = Decimal(str(max(0, weight_kg - 5) * 2))
              days = 5 if method == ShippingMethod.STANDARD else 2
              return ShippingRate(method=method, cost=base + surcharge, estimated_days=days)
