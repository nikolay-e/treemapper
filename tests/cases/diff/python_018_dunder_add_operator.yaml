      from typing import Optional
      from dataclasses import dataclass
      from decimal import Decimal
      from datetime import datetime
      from enum import Enum

      class PaymentStatus(Enum):
          PENDING = "pending"
          CAPTURED = "captured"
          REFUNDED = "refunded"

      @dataclass
      class PaymentResult:
          transaction_id: str
          status: PaymentStatus
          amount: Decimal

      class PaymentGateway:
          def __init__(self, api_key: str, sandbox: bool = True):
              self._api_key = api_key
              self._sandbox = sandbox

          def authorize(self, amount: Decimal, card_token: str) -> PaymentResult:
              return PaymentResult("txn_001", PaymentStatus.PENDING, amount)

          def capture(self, transaction_id: str) -> PaymentResult:
              return PaymentResult(transaction_id, PaymentStatus.CAPTURED, Decimal("0"))
