  changed_files:
    src/main/java/com/events/EventBus.java: |
      package com.events;

      import java.util.ArrayList;
      import java.util.HashMap;
      import java.util.List;
      import java.util.Map;
      import java.util.concurrent.CopyOnWriteArrayList;
      import java.util.function.Consumer;

      public class EventBus {
          private final Map<String, List<Consumer<Event>>> listeners = new HashMap<>();
          private final List<Event> deadLetters = new CopyOnWriteArrayList<>();

          public void subscribe(String eventType, Consumer<Event> listener) {
              listeners.computeIfAbsent(eventType, k -> new ArrayList<>()).add(listener);
          }

          public void unsubscribe(String eventType) {
              listeners.remove(eventType);
          }

          public void publish(Event event) {
              List<Consumer<Event>> subs = listeners.get(event.getType());
              if (subs == null || subs.isEmpty()) {
                  deadLetters.add(event);
                  return;
              }
              for (Consumer<Event> sub : subs) {
                  sub.accept(event);
              }
          }

          public List<Event> getDeadLetters() {
              return new ArrayList<>(deadLetters);
          }
      }
  commit_message: "feat: add unsubscribe, dead letter queue to EventBus"
