    src/main/java/com/events/EventBus.java: |
      package com.events;

      import java.util.ArrayList;
      import java.util.HashMap;
      import java.util.List;
      import java.util.Map;
      import java.util.function.Consumer;

      public class EventBus {
          private final Map<String, List<Consumer<Event>>> listeners = new HashMap<>();

          public void subscribe(String eventType, Consumer<Event> listener) {
              listeners.computeIfAbsent(eventType, k -> new ArrayList<>()).add(listener);
          }

          public void publish(Event event) {
              List<Consumer<Event>> subs = listeners.get(event.getType());
              if (subs != null) {
                  for (Consumer<Event> sub : subs) {
                      sub.accept(event);
                  }
              }
          }
      }
    src/test/java/com/events/EventBusTest.java: |
      package com.events;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;
      import java.util.concurrent.atomic.AtomicInteger;

      class EventBusTest {
          @Test
          void testSubscribeAndPublish() {
              EventBus bus = new EventBus();
              AtomicInteger count = new AtomicInteger();
              bus.subscribe("click", e -> count.incrementAndGet());
              bus.publish(new Event("click", "button1"));
              assertEquals(1, count.get());
          }

          @Test
          void testNoSubscribers() {
              EventBus bus = new EventBus();
              bus.publish(new Event("unknown", "data"));
          }
      }
