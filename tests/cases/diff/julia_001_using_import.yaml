name: julia_001_using_import
tags:
- lang:kotlin
- change:bug_fix
- change:single_file
- context:test_file
- distance:1hop
- difficulty:trivial
repo:
  initial_files:
    src/main/kotlin/payments/FeeCalculator.kt: |
      class FeeCalculator(private val feeRatePercent: Double) {
          fun calculate(amount: Long): Long {
              return (amount * feeRatePercent / 100).toLong()  // BUG: integer truncation loses cents
          }

          fun calculateWithMinimum(amount: Long, minimumFee: Long): Long {
              val fee = calculate(amount)
              return if (fee < minimumFee) minimumFee else fee
          }
      }
    src/test/kotlin/payments/FeeCalculatorTest.kt: |
      import org.junit.Test
      import kotlin.test.assertEquals

      class FeeCalculatorTest {
          private val calc = FeeCalculator(2.5)

          @Test fun chargesCorrectFee() {
              assertEquals(25L, calc.calculate(1000L))
          }

          @Test fun respectsMinimum() {
              assertEquals(50L, calc.calculateWithMinimum(100L, 50L))
          }
      }
    garbage/ShipmentTracker.kt: |
      // GARBAGE_JULIA001_A = "shipment_tracker_marker"
    garbage/InventoryLock.kt: |
      // GARBAGE_JULIA001_B = "inventory_lock_marker"
    garbage/GameReward.kt: |
      // GARBAGE_JULIA001_C = "game_reward_marker"
  changed_files:
    src/main/kotlin/payments/FeeCalculator.kt: |
      import kotlin.math.roundToLong

      class FeeCalculator(private val feeRatePercent: Double) {
          fun calculate(amount: Long): Long {
              return (amount * feeRatePercent / 100.0).roundToLong()
          }

          fun calculateWithMinimum(amount: Long, minimumFee: Long): Long {
              val fee = calculate(amount)
              return if (fee < minimumFee) minimumFee else fee
          }
      }
    src/test/kotlin/payments/FeeCalculatorTest.kt: |
      import org.junit.Test
      import kotlin.test.assertEquals

      class FeeCalculatorTest {
          private val calc = FeeCalculator(2.5)

          @Test fun chargesCorrectFee() {
              assertEquals(25L, calc.calculate(1000L))
          }

          @Test fun respectsMinimum() {
              assertEquals(50L, calc.calculateWithMinimum(100L, 50L))
          }
      }
    garbage/ShipmentTracker.kt: |
      // GARBAGE_JULIA001_A = "shipment_tracker_marker"
    garbage/InventoryLock.kt: |
      // GARBAGE_JULIA001_B = "inventory_lock_marker"
    garbage/GameReward.kt: |
      // GARBAGE_JULIA001_C = "game_reward_marker"
  commit_message: "fix: use roundToLong to avoid fee truncation in FeeCalculator"
