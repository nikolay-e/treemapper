    src/CQRS/ICommandHandler.cs: |
      using System;
      using System.Threading.Tasks;

      namespace App.CQRS
      {
          public interface ICommandHandler<TCommand>
          {
              Task Execute(TCommand command);
          }
      }
    src/Commands/CreateUserCommand.cs: |
      using System;

      namespace App.Commands
      {
          public class CreateUserCommand
          {
              public string Name { get; set; }
              public string Email { get; set; }
          }
      }
    src/Handlers/CreateUserHandler.cs: |
      using System;
      using System.Threading.Tasks;
      using App.CQRS;
      using App.Commands;

      namespace App.Handlers
      {
          public class CreateUserHandler : ICommandHandler<CreateUserCommand>
          {
              public async Task Execute(CreateUserCommand command)
              {
                  Console.WriteLine($"Creating user {command.Name}");
                  await Task.CompletedTask;
              }
          }
      }
    src/Commands/DeleteUserCommand.cs: |
      using System;

      namespace App.Commands
      {
          public class DeleteUserCommand
          {
              public int UserId { get; set; }
          }
      }
    src/Handlers/DeleteUserHandler.cs: |
      using System;
      using System.Threading.Tasks;
      using App.CQRS;
      using App.Commands;

      namespace App.Handlers
      {
          public class DeleteUserHandler : ICommandHandler<DeleteUserCommand>
          {
              public async Task Execute(DeleteUserCommand command)
              {
                  Console.WriteLine($"Deleting user {command.UserId}");
                  await Task.CompletedTask;
              }
          }
      }
    src/Dispatchers/CommandDispatcher.cs: |
      using System;
      using System.Threading.Tasks;
      using App.CQRS;

      namespace App.Dispatchers
      {
          public class CommandDispatcher
          {
              private readonly IServiceProvider _provider;

              public CommandDispatcher(IServiceProvider provider)
              {
                  _provider = provider;
              }

              public async Task Dispatch<TCommand>(TCommand command)
              {
                  var handler = (ICommandHandler<TCommand>)_provider.GetService(typeof(ICommandHandler<TCommand>));
                  if (handler == null) throw new InvalidOperationException($"No handler for {typeof(TCommand).Name}");
                  await handler.Execute(command);
              }
          }
      }
