name: bal_3hop_024_python_scheduler_cron
tags:
- lang:python
- change:single_file
- change:signature
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    scheduler/schedule.py: |
      class Schedule:
          def __init__(self, cron_expr: str):
              self.cron_expr = cron_expr
              parts = cron_expr.split()
              self.minute = parts[0] if len(parts) > 0 else "*"
              self.hour = parts[1] if len(parts) > 1 else "*"
          def matches_hour(self, hour: int) -> bool:
              return self.hour == "*" or int(self.hour) == hour
          def matches_minute(self, minute: int) -> bool:
              return self.minute == "*" or int(self.minute) == minute
    scheduler/job.py: |
      from scheduler.schedule import Schedule
      class Job:
          def __init__(self, name: str, schedule: Schedule, fn):
              self.name = name
              self.schedule = schedule
              self.fn = fn
              self.run_count = 0
          def should_run(self, hour: int, minute: int) -> bool:
              return self.schedule.matches_hour(hour) and self.schedule.matches_minute(minute)
          def execute(self):
              self.fn()
              self.run_count += 1
    scheduler/executor.py: |
      from scheduler.job import Job
      class Executor:
          def __init__(self):
              self.jobs: list[Job] = []
          def add_job(self, job: Job):
              self.jobs.append(job)
          def tick(self, hour: int, minute: int) -> list[str]:
              executed = []
              for job in self.jobs:
                  if job.should_run(hour, minute):
                      job.execute()
                      executed.append(job.name)
              return executed
    app/cron_daemon.py: |
      from scheduler.executor import Executor
      from scheduler.job import Job
      from scheduler.schedule import Schedule
      class CronDaemon:
          def __init__(self):
              self.executor = Executor()
          def register(self, name: str, cron_expr: str, fn):
              schedule = Schedule(cron_expr)
              job = Job(name, schedule, fn)
              self.executor.add_job(job)
          def run_once(self, hour: int, minute: int) -> list[str]:
              return self.executor.tick(hour, minute)
