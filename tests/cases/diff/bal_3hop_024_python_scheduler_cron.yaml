  changed_files:
    scheduler/schedule.py: |
      class Schedule:
          def __init__(self, cron_expr: str, timezone: str = "UTC"):
              self.cron_expr = cron_expr
              self.timezone = timezone
              parts = cron_expr.split()
              self.minute = parts[0] if len(parts) > 0 else "*"
              self.hour = parts[1] if len(parts) > 1 else "*"
              self.day_of_week = parts[4] if len(parts) > 4 else "*"
          def matches_hour(self, hour: int) -> bool:
              return self.hour == "*" or int(self.hour) == hour
          def matches_minute(self, minute: int) -> bool:
              return self.minute == "*" or int(self.minute) == minute
          def matches_day(self, weekday: int) -> bool:
              return self.day_of_week == "*" or int(self.day_of_week) == weekday
