name: gap2_191_php_signature_import_chain_taxi_dispatch
tags:
- change:signature
- change:single_file
- context:import_chain
- difficulty:easy
- distance:2hop
- lang:php
repo:
  initial_files:
    src/Taxi/DispatchService.php: |
      <?php

      namespace App\Taxi;

      use App\Taxi\Fleet\VehiclePool;

      class DispatchService
      {
          private VehiclePool $pool;

          public function __construct(VehiclePool $pool)
          {
              $this->pool = $pool;
          }

          public function assignRide(string $passengerId): ?string
          {
              $vehicle = $this->pool->nextAvailable();
              if ($vehicle === null) {
                  return null;
              }
              return $vehicle;
          }

          public function availableCount(): int
          {
              return $this->pool->freeCount();
          }
      }
    src/Taxi/Fleet/VehiclePool.php: |
      <?php

      namespace App\Taxi\Fleet;

      use App\Taxi\Fleet\Driver;

      class VehiclePool
      {
          private array $drivers;

          public function __construct(array $drivers)
          {
              $this->drivers = $drivers;
          }

          public function nextAvailable(): ?string
          {
              foreach ($this->drivers as $driver) {
                  if ($driver->isOnDuty()) {
                      return $driver->licenseId();
                  }
              }
              return null;
          }

          public function freeCount(): int
          {
              $count = 0;
              foreach ($this->drivers as $driver) {
                  if ($driver->isOnDuty()) {
                      $count++;
                  }
              }
              return $count;
          }
      }
    src/Taxi/Fleet/Driver.php: |
      <?php

      namespace App\Taxi\Fleet;

      class Driver
      {
          private string $license;
          private bool $onDuty;

          public function __construct(string $license, bool $onDuty)
          {
              $this->license = $license;
              $this->onDuty = $onDuty;
          }

          public function licenseId(): string
          {
              return $this->license;
          }

          public function isOnDuty(): bool
          {
              return $this->onDuty;
          }
      }
    src/Accounting/FareCalculator.php: |
      <?php

      namespace App\Accounting;

      class FareCalculator
      {
          public function compute(float $distanceKm, float $ratePerKm): float
          {
              return $distanceKm * $ratePerKm;
          }
      }
  changed_files:
    src/Taxi/DispatchService.php: |
