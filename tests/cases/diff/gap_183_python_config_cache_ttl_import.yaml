repo:
  initial_files:
    config/cache.py: |
      CACHE_TTL = 3600
      CACHE_BACKEND = "redis"
      MAX_ENTRIES = 10000
      EVICTION_POLICY = "lru"
    middleware/rate_cache.py: |
      from config.cache import CACHE_TTL, MAX_ENTRIES

      class RateCache:
          def __init__(self):
              self.ttl = CACHE_TTL
              self.capacity = MAX_ENTRIES
              self._store: dict[str, tuple[float, int]] = {}

          def get(self, key: str) -> int | None:
              entry = self._store.get(key)
              if entry is None:
                  return None
              return entry[1]

          def put(self, key: str, value: int, timestamp: float) -> None:
              if len(self._store) >= self.capacity:
                  self._evict()
              self._store[key] = (timestamp, value)

          def _evict(self) -> None:
              oldest = min(self._store, key=lambda k: self._store[k][0])
              del self._store[oldest]
