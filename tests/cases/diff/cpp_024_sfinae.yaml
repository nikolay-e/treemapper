name: cpp_024_sfinae
tags:
- lang:json
- lang:yaml
- change:config
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    config/cache.yaml: |
      cache:
        ttlSeconds: 300
        maxEntries: 1000
        evictionPolicy: lru
    src/cache/cache_factory.go: |
      package cache

      import (
          "gopkg.in/yaml.v3"
          "os"
      )

      type CacheConfig struct {
          Cache struct {
              TTLSeconds     int    `yaml:"ttlSeconds"`
              MaxEntries     int    `yaml:"maxEntries"`
              EvictionPolicy string `yaml:"evictionPolicy"`
          } `yaml:"cache"`
      }

      func LoadConfig(path string) (*CacheConfig, error) {
          data, err := os.ReadFile(path)
          if err != nil {
              return nil, err
          }
          var cfg CacheConfig
          return &cfg, yaml.Unmarshal(data, &cfg)
      }

      func NewCache(cfg *CacheConfig) Cache {
          return newLRUCache(cfg.Cache.MaxEntries, cfg.Cache.TTLSeconds)
      }
    src/cache/store.go: |
      package cache

      type Store struct {
          cache Cache
      }

      func NewStore(cfg *CacheConfig) *Store {
          return &Store{cache: NewCache(cfg)}
      }

      func (s *Store) Get(key string) (interface{}, bool) {
          return s.cache.Get(key)
      }

      func (s *Store) Set(key string, value interface{}) {
          s.cache.Set(key, value)
      }
    garbage/metrics.go: |
      // GARBAGE_CACHE_A = "metrics_marker"
    garbage/replication.go: |
      // GARBAGE_CACHE_B = "replication_marker"
    garbage/persistence.go: |
      // GARBAGE_CACHE_C = "persistence_marker"
  changed_files:
    config/cache.yaml: |
      cache:
        ttlSeconds: 600
        maxEntries: 5000
        evictionPolicy: lru
        shards: 16
        compressionEnabled: true
    src/cache/cache_factory.go: |
      package cache

      import (
          "gopkg.in/yaml.v3"
          "os"
      )

      type CacheConfig struct {
          Cache struct {
              TTLSeconds          int    `yaml:"ttlSeconds"`
              MaxEntries          int    `yaml:"maxEntries"`
              EvictionPolicy      string `yaml:"evictionPolicy"`
              Shards              int    `yaml:"shards"`
              CompressionEnabled  bool   `yaml:"compressionEnabled"`
          } `yaml:"cache"`
      }

      func LoadConfig(path string) (*CacheConfig, error) {
          data, err := os.ReadFile(path)
          if err != nil {
              return nil, err
          }
          var cfg CacheConfig
          return &cfg, yaml.Unmarshal(data, &cfg)
      }

      func NewCache(cfg *CacheConfig) Cache {
          shards := cfg.Cache.Shards
          if shards == 0 {
              shards = 1
          }
          return newShardedLRUCache(cfg.Cache.MaxEntries, cfg.Cache.TTLSeconds, shards, cfg.Cache.CompressionEnabled)
      }
    src/cache/store.go: |
      package cache

      type Store struct {
          cache Cache
      }

      func NewStore(cfg *CacheConfig) *Store {
          return &Store{cache: NewCache(cfg)}
      }

      func (s *Store) Get(key string) (interface{}, bool) {
          return s.cache.Get(key)
      }

      func (s *Store) Set(key string, value interface{}) {
          s.cache.Set(key, value)
      }
    garbage/metrics.go: |
      // GARBAGE_CACHE_A = "metrics_marker"
    garbage/replication.go: |
      // GARBAGE_CACHE_B = "replication_marker"
    garbage/persistence.go: |
      // GARBAGE_CACHE_C = "persistence_marker"
  commit_message: "config: add sharding and compression options to cache config"
fragments:
- id: cache_config_yaml
  selector:
    path: config/cache.yaml
    anchor: "shards"
- id: cache_factory_new
  selector:
    path: src/cache/cache_factory.go
    anchor: "func NewCache"
- id: no_store
  selector:
    path: src/cache/store.go
- id: no_garbage_a
  selector:
    anchor: GARBAGE_CACHE_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_CACHE_B
- id: no_garbage_c
  selector:
    anchor: GARBAGE_CACHE_C
oracle:
  required:
  - cache_config_yaml
  - cache_factory_new
  allowed: []
  forbidden:
  - no_store
  - no_garbage_a
  - no_garbage_b
  - no_garbage_c
