      struct ContentView: View {
          @State private var isLoading = false
          @State private var items: [Item] = []

          var body: some View {
              VStack {
                  if isLoading {
                      ProgressView()
                  } else {
                      List(items) { item in
                          VStack(alignment: .leading) {
                              Text(item.title).font(.headline)
                              Text(item.subtitle).font(.caption)
                          }
                      }
                  }
                  Button("Load") {
