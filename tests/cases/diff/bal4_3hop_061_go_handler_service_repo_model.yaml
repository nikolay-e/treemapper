repo:
  initial_files:
    pkg/model/user.go: |
      package model

      type User struct {
          ID   int
          Name string
      }
    pkg/repo/user_repo.go: |
      package repo

      import "myapp/pkg/model"

      func FindUser(id int) model.User {
          return model.User{ID: id, Name: "alice"}
      }
    pkg/service/user_service.go: |
      package service

      import "myapp/pkg/repo"

      func GetUser(id int) string {
          u := repo.FindUser(id)
          return u.Name
      }
    pkg/handler/user_handler.go: |
      package handler

      import "myapp/pkg/service"

      func HandleUser(id int) string {
          return service.GetUser(id)
      }
    pkg/util/garbage_strings.go: |
      package util

      var GARBAGE_061_STRING_A = "pad"
      var GARBAGE_061_STRING_B = "filler"

      func GarbageTrim(s string) string {
          return s
      }
  changed_files:
