    internal/auth/jwt.go: |
      package auth

      import "time"

      type Token struct {
          Subject   string
          ExpiresAt time.Time
      }

      func NewToken(sub string) *Token {
          return &Token{Subject: sub, ExpiresAt: time.Now().Add(time.Hour)}
