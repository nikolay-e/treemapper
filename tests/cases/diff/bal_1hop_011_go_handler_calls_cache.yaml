    src/finance/InterestAccrual.kt: |
      import java.math.BigDecimal
      import java.math.RoundingMode

      data class LoanAccount(val principal: BigDecimal, val annualRatePct: Double, val daysPast: Int)

      class InterestAccrual {
          fun dailyInterest(account: LoanAccount): BigDecimal {
              val rate = BigDecimal(account.annualRatePct / 365)
              return account.principal.multiply(rate).setScale(4, RoundingMode.HALF_UP)
          }

          fun accruedInterest(account: LoanAccount): BigDecimal {
              return dailyInterest(account).multiply(BigDecimal(account.daysPast))
          }

          fun totalOwed(account: LoanAccount): BigDecimal {
              return account.principal.add(accruedInterest(account))
          }
      }
