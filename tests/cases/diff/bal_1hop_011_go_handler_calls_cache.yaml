repo:
  initial_files:
    internal/cache/store.go: |
      package cache

      import "sync"

      type Store struct {
          mu   sync.RWMutex
          data map[string]string
      }

      func NewStore() *Store {
          return &Store{data: make(map[string]string)}
      }

      func (s *Store) Get(key string) (string, bool) {
          s.mu.RLock()
          defer s.mu.RUnlock()
          v, ok := s.data[key]
          return v, ok
      }

      func (s *Store) Set(key, value string) {
          s.mu.Lock()
          defer s.mu.Unlock()
          s.data[key] = value
      }
    internal/cache/eviction.go: |
      package cache

      type EvictionPolicy int

      const (
          LRU EvictionPolicy = iota
          LFU
          FIFO
      )
    internal/api/product.go: |
      package api

      import (
          "encoding/json"
          "net/http"
          "myapp/internal/cache"
      )

      type ProductHandler struct {
          cache *cache.Store
      }

      func NewProductHandler(c *cache.Store) *ProductHandler {
          return &ProductHandler{cache: c}
      }

      func (h *ProductHandler) GetProduct(w http.ResponseWriter, r *http.Request) {
          id := r.URL.Query().Get("id")
          if val, ok := h.cache.Get(id); ok {
              json.NewEncoder(w).Encode(map[string]string{"product": val})
              return
          }
          http.Error(w, "not found", 404)
      }
