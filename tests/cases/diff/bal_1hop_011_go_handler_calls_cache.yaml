      }
  changed_files:
    internal/cache/store.go: |
      package cache

      import (
          "sync"
          "time"
      )

      type entry struct {
          value     string
          expiresAt time.Time
      }

      type Store struct {
          mu      sync.RWMutex
          data    map[string]entry
          policy  EvictionPolicy
          maxSize int
      }

      func NewStore(policy EvictionPolicy, maxSize int) *Store {
          return &Store{
              data:    make(map[string]entry),
              policy:  policy,
              maxSize: maxSize,
          }
      }

      func (s *Store) Get(key string) (string, bool) {
          s.mu.RLock()
          defer s.mu.RUnlock()
          e, ok := s.data[key]
          if !ok {
              return "", false
          }
          if !e.expiresAt.IsZero() && time.Now().After(e.expiresAt) {
              return "", false
          }
          return e.value, true
      }

      func (s *Store) Set(key, value string, ttl time.Duration) {
          s.mu.Lock()
          defer s.mu.Unlock()
          var exp time.Time
          if ttl > 0 {
              exp = time.Now().Add(ttl)
          }
          s.data[key] = entry{value: value, expiresAt: exp}
      }
  commit_message: "feat: add TTL, eviction policy and max size to cache Store"
