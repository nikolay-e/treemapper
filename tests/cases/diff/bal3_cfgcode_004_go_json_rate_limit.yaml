  changed_files:
    src/Media/ImageResizer.php: |
      <?php
      namespace App\Media;

      class ImageResizer
      {
          public function resize(string $path, int $width, int $height): array
          {
              if ($width <= 0 || $height <= 0) {
                  throw new \InvalidArgumentException("Width and height must be positive");
              }

              $info = getimagesize($path);
              if ($info === false) {
                  throw new \RuntimeException("Cannot read image: $path");
              }

              $origWidth = $info[0];
              $origHeight = $info[1];

              if ($origHeight === 0) {
                  throw new \RuntimeException("Image has zero height");
              }

              $ratio = $origWidth / $origHeight;
              if ($width / $height > $ratio) {
                  $width = (int)($height * $ratio);
              } else {
                  $height = (int)($width / $ratio);
              }

              return ['width' => max(1, $width), 'height' => max(1, $height)];
          }

          public function thumbnail(string $path, int $size): array
          {
              return $this->resize($path, $size, $size);
          }
      }
    src/Media/VideoTranscoder.php: |
      <?php
      namespace App\Media;

      class VideoTranscoder
      {
