name: internals_001_cyrillic_function_name
tags:
- lang:python
- lang:protobuf
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    proto/session.proto: |
      syntax = "proto3";

      message Session {
        string session_id = 1;
        string user_id = 2;
        int64 expires_at = 3;
      }
    service/session_service.py: |
      from proto import session_pb2

      class SessionService:
          def create_session(
              self, session_id: str, user_id: str, expires_at: int
          ) -> session_pb2.Session:
              return session_pb2.Session(
                  session_id=session_id,
                  user_id=user_id,
                  expires_at=expires_at,
              )

          def is_valid(self, session: session_pb2.Session, now: int) -> bool:
              return session.expires_at > now
    garbage/logging.py: |
      GARBAGE_INT001_A = "log_marker"

      def noop():
          pass
    garbage/metrics.py: |
      GARBAGE_INT001_B = "metrics_marker"

      def noop():
          pass
    garbage/events.py: |
      GARBAGE_INT001_C = "event_marker"

      def noop():
          pass
  changed_files:
    proto/session.proto: |
      syntax = "proto3";

      message Session {
        string session_id = 1;
        string user_id = 2;
        int64 expires_at = 3;
        string device_fingerprint = 4;
        bool mfa_verified = 5;
      }
    service/session_service.py: |
      from proto import session_pb2

      class SessionService:
          def create_session(
              self,
              session_id: str,
              user_id: str,
              expires_at: int,
              device_fingerprint: str = "",
              mfa_verified: bool = False,
          ) -> session_pb2.Session:
              return session_pb2.Session(
                  session_id=session_id,
                  user_id=user_id,
                  expires_at=expires_at,
                  device_fingerprint=device_fingerprint,
                  mfa_verified=mfa_verified,
              )

          def is_valid(self, session: session_pb2.Session, now: int) -> bool:
              return session.expires_at > now
    garbage/logging.py: |
      GARBAGE_INT001_A = "log_marker"

      def noop():
          pass
    garbage/metrics.py: |
      GARBAGE_INT001_B = "metrics_marker"

      def noop():
          pass
    garbage/events.py: |
      GARBAGE_INT001_C = "event_marker"

      def noop():
          pass
  commit_message: "feat: add device_fingerprint and mfa_verified to Session proto and service"
