- lang:java
repo:
  initial_files:
    src/main/resources/logback.xml: |
      <configuration>
        <appender name="STDOUT" class="ch.qos.logback.core.ConsoleAppender">
          <encoder>
            <pattern>%d{HH:mm:ss} %-5level %logger - %msg%n</pattern>
          </encoder>
        </appender>
        <root level="INFO">
          <appender-ref ref="STDOUT"/>
        </root>
      </configuration>
    src/main/java/logging/LoggerFactory.java: |
      package logging;

      public class LoggerFactory {
          private static String rootLevel = "INFO";

          public static void setRootLevel(String level) {
              rootLevel = level;
          }

          public static Logger getLogger(String name) {
              return new Logger(name, rootLevel);
          }
      }
    src/main/java/logging/Logger.java: |
      package logging;

      public class Logger {
          private final String name;
          private final String level;

          public Logger(String name, String level) {
              this.name = name;
              this.level = level;
          }

          public void info(String msg) { System.out.println("[" + level + "] " + name + ": " + msg); }
          public void debug(String msg) { if ("DEBUG".equals(level)) info(msg); }
      }
    src/main/java/service/OrderService.java: |
      package service;

      import logging.LoggerFactory;
      import logging.Logger;

      public class OrderService {
          private static final Logger log = LoggerFactory.getLogger("OrderService");

          public void process(String orderId) {
              log.info("Processing " + orderId);
          }
      }
