    config/permissions.yaml: |
      permissions:
        roles:
          admin:
            - read
            - write
            - delete
            - manage_users
          editor:
            - read
            - write
          viewer:
            - read
        default_role: viewer
        super_admin: root
    src/sanitizer.py: |
      import html
