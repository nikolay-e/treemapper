name: bal_3hop_005_python_event_system_dispatch
tags:
- lang:python
- change:single_file
- change:signature
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    events/base.py: |
      from dataclasses import dataclass
      @dataclass
      class Event:
          name: str
          payload: dict
    events/handler.py: |
      from events.base import Event
      class EventHandler:
          def __init__(self, event_type: str):
              self.event_type = event_type
          def handle(self, event: Event) -> bool:
              return event.name == self.event_type
    events/dispatcher.py: |
      from events.handler import EventHandler
      from events.base import Event
      class Dispatcher:
          def __init__(self):
              self.handlers: list[EventHandler] = []
          def register(self, handler: EventHandler):
              self.handlers.append(handler)
          def dispatch(self, event: Event) -> int:
              handled = 0
              for h in self.handlers:
                  if h.handle(event):
                      handled += 1
              return handled
    app/event_bus.py: |
      from events.dispatcher import Dispatcher
      from events.base import Event
      class EventBus:
          def __init__(self):
              self.dispatcher = Dispatcher()
          def emit(self, name: str, payload: dict) -> int:
              event = Event(name=name, payload=payload)
              return self.dispatcher.dispatch(event)
    utils/serializer.py: |
      import json
      def to_json(obj) -> str:
          return json.dumps(obj, default=str)
      def from_json(data: str) -> dict:
          return json.loads(data)
    config/constants.py: |
      MAX_RETRIES = 3
      TIMEOUT_SECONDS = 30
      EVENT_QUEUE_SIZE = 1000
  changed_files:
    events/base.py: |
      from dataclasses import dataclass, field
      from datetime import datetime
      @dataclass
      class Event:
          name: str
          payload: dict
          timestamp: datetime = field(default_factory=datetime.utcnow)
          source: str = "unknown"
    events/handler.py: |
      from events.base import Event
      class EventHandler:
          def __init__(self, event_type: str):
              self.event_type = event_type
          def handle(self, event: Event) -> bool:
              return event.name == self.event_type
    events/dispatcher.py: |
      from events.handler import EventHandler
      from events.base import Event
      class Dispatcher:
          def __init__(self):
              self.handlers: list[EventHandler] = []
          def register(self, handler: EventHandler):
              self.handlers.append(handler)
          def dispatch(self, event: Event) -> int:
              handled = 0
              for h in self.handlers:
                  if h.handle(event):
                      handled += 1
              return handled
    app/event_bus.py: |
      from events.dispatcher import Dispatcher
      from events.base import Event
      class EventBus:
          def __init__(self):
              self.dispatcher = Dispatcher()
          def emit(self, name: str, payload: dict) -> int:
              event = Event(name=name, payload=payload)
              return self.dispatcher.dispatch(event)
    utils/serializer.py: |
      import json
      def to_json(obj) -> str:
          return json.dumps(obj, default=str)
      def from_json(data: str) -> dict:
          return json.loads(data)
    config/constants.py: |
      MAX_RETRIES = 3
      TIMEOUT_SECONDS = 30
      EVENT_QUEUE_SIZE = 1000
