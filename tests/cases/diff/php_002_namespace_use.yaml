repo:
  initial_files:
    src/Finance/TaxCalculator.cs: |
      namespace Finance;

      public class TaxCalculator
      {
          public decimal ComputeVat(decimal netAmount, decimal vatRate)
          {
              return netAmount * vatRate;
          }

          public decimal GrossAmount(decimal netAmount, decimal vatRate)
          {
              return netAmount + ComputeVat(netAmount, vatRate);
          }

          public decimal NetFromGross(decimal grossAmount, decimal vatRate)
          {
              return grossAmount / (vatRate + 1);
          }
      }
    tests/Finance/TaxCalculatorTests.cs: |
      using Xunit;
      using Finance;

      public class TaxCalculatorTests
      {
          private readonly TaxCalculator _calc = new();

          [Fact]
          public void ComputeVat_TwentyPercent_ReturnsCorrectVat()
          {
              var vat = _calc.ComputeVat(100m, 0.20m);
              Assert.Equal(20m, vat);
          }

          [Fact]
          public void NetFromGross_RevertsGross()
          {
              var net = _calc.NetFromGross(120m, 0.20m);
              Assert.Equal(100m, net);
          }
      }
