          public function index(): array {
              return ['page' => 'checkout'];
          }
      }
    src/Services/ShippingService.php: |
      <?php
      namespace App\Services;

      class ShippingService {
          private float $baseRate;
          private string $defaultZone;

          public function __construct(float $baseRate = 5.99, string $defaultZone = 'domestic') {
              $this->baseRate = $baseRate;
              $this->defaultZone = $defaultZone;
          }

          public function calculateTotal(float $weight, string $zone = 'domestic'): float {
              $zoneMultiplier = match($zone) {
                  'international' => 3.0,
                  'express' => 2.0,
                  default => 1.0,
              };
              return round($this->baseRate * $weight * $zoneMultiplier, 2);
          }

          public function estimateDelivery(string $zone): int {
              return match($zone) {
                  'international' => 14,
                  'express' => 2,
                  default => 5,
              };
          }
      }
    src/Controllers/CartController.php: |
      <?php
      namespace App\Controllers;

      class CartController {
          private array $items = [];

          public function add(string $productId, int $quantity, float $price): void {
              $this->items[] = ['id' => $productId, 'qty' => $quantity, 'price' => $price];
          }

          public function getTotal(): float {
              return array_sum(array_map(
                  fn($item) => $item['qty'] * $item['price'],
                  $this->items
              ));
          }

          public function clear(): void {
              $this->items = [];
          }

          public function getItems(): array {
              return $this->items;
          }
      }
    src/Services/DiscountService.php: |
      <?php
      namespace App\Services;

      class DiscountService {
          private array $activeCodes = [];

          public function applyDiscount(float $amount, string $code): float {
              $rate = $this->getDiscountRate($code);
              return round($amount * (1 - $rate), 2);
          }

          public function registerCode(string $code, float $rate): void {
              $this->activeCodes[$code] = $rate;
          }

          private function getDiscountRate(string $code): float {
              return $this->activeCodes[$code] ?? 0.0;
          }
      }
    src/Events/PaymentProcessed.php: |
      <?php
      namespace App\Events;

      class PaymentProcessed {
          public readonly float $amount;
          public readonly string $transactionId;
          public readonly \DateTimeImmutable $processedAt;

          public function __construct(float $amount, string $transactionId) {
              $this->amount = $amount;
              $this->transactionId = $transactionId;
              $this->processedAt = new \DateTimeImmutable();
          }

          public function toArray(): array {
              return [
                  'amount' => $this->amount,
                  'transaction_id' => $this->transactionId,
                  'processed_at' => $this->processedAt->format('c'),
              ];
          }
      }
    src/Controllers/OrderController.php: |
      <?php
      namespace App\Controllers;

      class OrderController {
          private array $orders = [];

          public function processOrder(int $orderId, float $amount): array {
              $this->orders[$orderId] = ['amount' => $amount, 'status' => 'processing'];
              return $this->orders[$orderId];
          }

          public function getOrder(int $orderId): ?array {
              return $this->orders[$orderId] ?? null;
          }

          public function cancelOrder(int $orderId): bool {
              if (isset($this->orders[$orderId])) {
                  $this->orders[$orderId]['status'] = 'cancelled';
                  return true;
              }
              return false;
          }
      }
