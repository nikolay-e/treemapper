max_enrichment: 3.0
initial:
  connected.py: |
    pass
  isolated.py: |
    pass
changed:
  connected.py: |
    def caller():
        callee()

    def callee():
        pass
  isolated.py: |
    def completely_unique_function():
        totally_unique_helper()
must_include_files:
- connected.py
- isolated.py
must_include_content:
- 'def caller():'
- 'def callee():'
add_garbage_files: false
skip_garbage_check: true
