  - SUBSCRIPTION_MODULE_MARKER_PPP111
  - AUTH_PAYMENT_MARKER_QQQ222
  - CREATE_INVOICE_MARKER_RRR333
  - MANAGER_MARKER_SSS444
  - SESSION_MARKER_TTT555
  - authenticate_payment
