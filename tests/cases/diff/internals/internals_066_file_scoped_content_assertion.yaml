    class User:
        def __init__(self, name: str, email: str, role: str = "viewer"):
            self.name = name
            self.email = email
            self.role = role

        def greet(self) -> str:
            return f"Hello, {self.name}"

        def is_admin(self) -> bool:
            return self.role == "admin"
  services/auth.py: |
    from models.user import User

    class AuthService:
        def login(self, email: str, password: str) -> User:
            return User(name="test", email=email)

        def check_permission(self, user: User, action: str) -> bool:
            return user.is_admin() or action == "read"
