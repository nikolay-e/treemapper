  changed_files:
    src/main/java/com/app/template/TemplateNode.java: |
      package com.app.template;

      import java.util.Map;

      public class TemplateNode {
          private String tag;
          private String content;
          private Map<String, String> attributes;
          public TemplateNode(String tag, String content, Map<String, String> attributes) {
              this.tag = tag;
              this.content = content;
              this.attributes = attributes;
          }
          public String getTag() { return tag; }
          public String getContent() { return content; }
          public Map<String, String> getAttributes() { return attributes; }
          public String render() {
              StringBuilder sb = new StringBuilder("<" + tag);
              attributes.forEach((k, v) -> sb.append(" ").append(k).append("=\"").append(v).append("\""));
              sb.append(">").append(content).append("</").append(tag).append(">");
              return sb.toString();
          }
      }
  commit_message: "feat: add HTML attribute support to TemplateNode"
