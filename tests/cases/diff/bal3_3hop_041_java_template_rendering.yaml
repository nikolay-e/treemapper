repo:
  initial_files:
    src/main/java/com/app/template/TemplateNode.java: |
      package com.app.template;

      public class TemplateNode {
          private String tag;
          private String content;
          public TemplateNode(String tag, String content) {
              this.tag = tag;
              this.content = content;
          }
          public String getTag() { return tag; }
          public String getContent() { return content; }
          public String render() {
              return "<" + tag + ">" + content + "</" + tag + ">";
          }
      }
    src/main/java/com/app/template/TemplateEngine.java: |
      package com.app.template;

      import java.util.List;
      import java.util.stream.Collectors;

      public class TemplateEngine {
          public String render(List<TemplateNode> nodes) {
              return nodes.stream()
                  .map(TemplateNode::render)
                  .collect(Collectors.joining("\n"));
          }
      }
    src/main/java/com/app/service/RenderService.java: |
      package com.app.service;

      import com.app.template.TemplateEngine;
      import com.app.template.TemplateNode;
      import java.util.List;

      public class RenderService {
          private final TemplateEngine engine;
          public RenderService(TemplateEngine engine) {
              this.engine = engine;
          }
          public String renderPage(List<TemplateNode> nodes) {
              return engine.render(nodes);
          }
      }
    src/main/java/com/app/web/PageController.java: |
      package com.app.web;

      import com.app.service.RenderService;

      public class PageController {
          private final RenderService renderService;
          public PageController(RenderService renderService) {
              this.renderService = renderService;
          }
          public String show() {
              return renderService.renderPage(java.util.List.of());
          }
      }
