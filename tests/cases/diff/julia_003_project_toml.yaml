repo:
  initial_files:
    src/crypto/hmac.rs: |
      pub fn compute_hmac(key: &[u8], message: &[u8]) -> Vec<u8> {
          // BUG: empty key is not rejected; silently produces a weak HMAC
          let mut result = Vec::with_capacity(message.len());
          for (i, &byte) in message.iter().enumerate() {
              result.push(byte ^ key[i % key.len()]);
          }
          result
      }
    src/api/webhook.rs: |
      use crate::crypto::hmac::compute_hmac;

      pub struct WebhookVerifier {
          secret: Vec<u8>,
      }

      impl WebhookVerifier {
          pub fn new(secret: Vec<u8>) -> Self {
              WebhookVerifier { secret }
          }

          pub fn verify(&self, payload: &[u8], signature: &[u8]) -> bool {
              let expected = compute_hmac(&self.secret, payload);
              expected == signature
          }
      }
    garbage/encoder.rs: |
      // GARBAGE_HMAC_A = "encoder_marker"
      pub fn base64_encode(_data: &[u8]) -> String { String::new() }
    garbage/hasher.rs: |
      // GARBAGE_HMAC_B = "hasher_marker"
      pub fn sha256(_data: &[u8]) -> Vec<u8> { vec![] }
    garbage/cipher.rs: |
      // GARBAGE_HMAC_C = "cipher_marker"
      pub fn aes_encrypt(_key: &[u8], _data: &[u8]) -> Vec<u8> { vec![] }
  changed_files:
    src/crypto/hmac.rs: |
      pub fn compute_hmac(key: &[u8], message: &[u8]) -> Result<Vec<u8>, String> {
          if key.is_empty() {
              return Err("HMAC key must not be empty".to_string());
          }
          let mut result = Vec::with_capacity(message.len());
          for (i, &byte) in message.iter().enumerate() {
              result.push(byte ^ key[i % key.len()]);
          }
          Ok(result)
      }
    src/api/webhook.rs: |
      use crate::crypto::hmac::compute_hmac;

      pub struct WebhookVerifier {
          secret: Vec<u8>,
      }

      impl WebhookVerifier {
          pub fn new(secret: Vec<u8>) -> Self {
              WebhookVerifier { secret }
          }

          pub fn verify(&self, payload: &[u8], signature: &[u8]) -> bool {
              match compute_hmac(&self.secret, payload) {
                  Ok(expected) => expected == signature,
                  Err(_) => false,
              }
          }
      }
    garbage/encoder.rs: |
      // GARBAGE_HMAC_A = "encoder_marker"
      pub fn base64_encode(_data: &[u8]) -> String { String::new() }
    garbage/hasher.rs: |
      // GARBAGE_HMAC_B = "hasher_marker"
      pub fn sha256(_data: &[u8]) -> Vec<u8> { vec![] }
    garbage/cipher.rs: |
      // GARBAGE_HMAC_C = "cipher_marker"
      pub fn aes_encrypt(_key: &[u8], _data: &[u8]) -> Vec<u8> { vec![] }
  commit_message: "fix: reject empty key in compute_hmac with Result return type"
