name: bal4_0hop_005_haskell_signature_typeclass
tags:
- lang:haskell
- change:single_file
- change:signature
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    src/Printer.hs: |
      module Printer where

      showItem :: String -> String
      showItem s = "Item: " ++ s

      showAll :: [String] -> String
      showAll xs = unlines (map showItem xs)
    src/garbage_parse.hs: |
      module GarbageParse where

      GARBAGE_B4H005_PARSE_A = "parse"
      GARBAGE_B4H005_PARSE_B = False

      garbageParse :: String -> String
      garbageParse s = s
    src/garbage_emit.hs: |
      module GarbageEmit where

      GARBAGE_B4H005_EMIT_C = "emit"
      GARBAGE_B4H005_EMIT_D = 0

      garbageEmit :: String -> IO ()
      garbageEmit _ = return ()
  changed_files:
    src/Printer.hs: |
      module Printer where

      showItem :: Show a => a -> String
      showItem x = "Item: " ++ show x

      showAll :: Show a => [a] -> String
      showAll xs = unlines (map showItem xs)
    src/garbage_parse.hs: |
      module GarbageParse where

      GARBAGE_B4H005_PARSE_A = "parse"
      GARBAGE_B4H005_PARSE_B = False

      garbageParse :: String -> String
      garbageParse s = s
    src/garbage_emit.hs: |
      module GarbageEmit where

      GARBAGE_B4H005_EMIT_C = "emit"
      GARBAGE_B4H005_EMIT_D = 0

      garbageEmit :: String -> IO ()
      garbageEmit _ = return ()
  commit_message: "feat: generalize showItem and showAll to Show typeclass"
