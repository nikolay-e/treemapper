name: go_021_type_assertion
tags:
- lang:go
- change:multi_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    internal/handler/interfaces.go: |
      package handler

      import "context"

      type Reader interface {
          Read(ctx context.Context) ([]byte, error)
      }

      type Writer interface {
          Write(ctx context.Context, data []byte) error
      }

      type Closer interface {
          Close() error
      }
    internal/handler/processor.go: |
      package handler

      import "context"

      type Processor struct {
          handler Reader
      }

      func (p *Processor) Process(ctx context.Context) error {
          data, err := p.handler.Read(ctx)
          if err != nil {
              return err
          }
          if w, ok := p.handler.(Writer); ok {
              return w.Write(ctx, data)
          }
          return nil
      }
    internal/handler/file_handler.go: |
      package handler

      import (
          "context"
          "os"
      )

      type FileHandler struct {
          path string
          file *os.File
      }

      func (h *FileHandler) Read(ctx context.Context) ([]byte, error) {
          return os.ReadFile(h.path)
      }

      func (h *FileHandler) Write(ctx context.Context, data []byte) error {
          _, err := h.file.Write(data)
          return err
      }

      func (h *FileHandler) Close() error {
          return h.file.Close()
      }
    internal/handler/memory_handler.go: |
      package handler

      import (
          "bytes"
          "context"
      )

      type MemoryHandler struct {
          buf bytes.Buffer
      }

      func (m *MemoryHandler) Read(ctx context.Context) ([]byte, error) {
          return m.buf.Bytes(), nil
      }

      func (m *MemoryHandler) Write(ctx context.Context, data []byte) error {
          _, err := m.buf.Write(data)
          return err
      }
    internal/pipeline/runner.go: |
      package pipeline

      import (
          "context"

          "example.com/app/internal/handler"
      )

      type Runner struct {
          proc *handler.Processor
      }

      func (r *Runner) Run(ctx context.Context) error {
          return r.proc.Process(ctx)
      }
    internal/handler/options.go: |
      package handler

      type Options struct {
          BufferSize int
          MaxRetries int
      }

      func DefaultOptions() Options {
          return Options{BufferSize: 4096, MaxRetries: 3}
      }
    internal/pipeline/scheduler.go: |
      package pipeline

      import "time"

      type Scheduler struct {
          interval time.Duration
      }

      func (s *Scheduler) Tick() {}
  changed_files:
    internal/handler/interfaces.go: |
      package handler

      import "context"

      type Reader interface {
          Read(ctx context.Context) ([]byte, error)
      }

      type Writer interface {
          Write(ctx context.Context, data []byte) error
      }

      type Closer interface {
          Close() error
      }

      type Flusher interface {
          Flush() error
      }
    internal/handler/processor.go: |
      package handler

      import "context"

      type Processor struct {
          handler Reader
      }

      func (p *Processor) Process(ctx context.Context) error {
          data, err := p.handler.Read(ctx)
          if err != nil {
              return err
          }
          if w, ok := p.handler.(Writer); ok {
              if err := w.Write(ctx, data); err != nil {
                  return err
              }
          }
          if f, ok := p.handler.(Flusher); ok {
              return f.Flush()
          }
          return nil
      }
    internal/handler/file_handler.go: |
      package handler

      import (
          "context"
          "os"
      )

      type FileHandler struct {
          path string
          file *os.File
      }

      func (h *FileHandler) Read(ctx context.Context) ([]byte, error) {
          return os.ReadFile(h.path)
      }

      func (h *FileHandler) Write(ctx context.Context, data []byte) error {
          _, err := h.file.Write(data)
          return err
      }

      func (h *FileHandler) Close() error {
          return h.file.Close()
      }
    internal/handler/memory_handler.go: |
      package handler

      import (
          "bytes"
          "context"
      )

      type MemoryHandler struct {
