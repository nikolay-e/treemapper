      from dataclasses import dataclass

      @dataclass
      class Ingredient:
          name: str
          calories_per_gram: float
          protein_per_gram: float
          fat_per_gram: float

      PANTRY = {
          "chicken": Ingredient("chicken", 2.39, 0.27, 0.14),
          "rice": Ingredient("rice", 1.30, 0.027, 0.003),
          "broccoli": Ingredient("broccoli", 0.34, 0.028, 0.004),
          "olive_oil": Ingredient("olive_oil", 8.84, 0.0, 1.0),
      }

      def lookup(name: str) -> Ingredient:
          return PANTRY[name]
    recipes/builder.py: |
      from recipes.ingredients import Ingredient, lookup

      class RecipeBuilder:
          def __init__(self, name: str):
              self.name = name
              self.items: list[tuple[str, float]] = []

          def add(self, ingredient_name: str, grams: float):
              self.items.append((ingredient_name, grams))
              return self

          def total_calories(self) -> float:
              return sum(lookup(n).calories_per_gram * g for n, g in self.items)
