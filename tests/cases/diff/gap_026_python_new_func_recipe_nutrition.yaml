  changed_files:
    recipes/builder.py: |
      from recipes.ingredients import Ingredient, lookup

      class RecipeBuilder:
          def __init__(self, name: str):
              self.name = name
              self.items: list[tuple[str, float]] = []

          def add(self, ingredient_name: str, grams: float):
              self.items.append((ingredient_name, grams))
              return self

          def total_calories(self) -> float:
              return sum(lookup(n).calories_per_gram * g for n, g in self.items)

          def macro_breakdown(self) -> dict[str, float]:
              protein = sum(lookup(n).protein_per_gram * g for n, g in self.items)
              fat = sum(lookup(n).fat_per_gram * g for n, g in self.items)
              carbs = self.total_calories() - (protein * 4 + fat * 9)
              return {"protein_g": protein, "fat_g": fat, "carbs_kcal": max(carbs, 0)}
  commit_message: "add macro breakdown calculation to RecipeBuilder"
