name: php_011_attribute
repo:
  initial_files:
    src/Attributes/Route.php: |
      <?php
      namespace App\Attributes;

      #[Attribute(Attribute::TARGET_METHOD)]
      class Route {
          public function __construct(
              public string $path,
              public string $method = 'GET',
              public array $middleware = []
          ) {}

          public function getPath(): string {
              return $this->path;
          }

          public function getMethod(): string {
              return strtoupper($this->method);
          }

          public function getMiddleware(): array {
              return $this->middleware;
          }
      }
    src/Controllers/ApiController.php: |
      <?php
      namespace App\Controllers;

      class ApiController {
          public function users(): array {
              return ['users' => []];
          }
      }
    src/Attributes/Validate.php: |
      <?php
      namespace App\Attributes;

      #[Attribute(Attribute::TARGET_PARAMETER)]
      class Validate {
          public function __construct(
              public string $rule,
              public ?string $message = null
          ) {}

          public function getRule(): string {
              return $this->rule;
          }

          public function getMessage(): string {
              return $this->message ?? "Validation failed for rule: {$this->rule}";
          }
      }
    src/Controllers/AdminController.php: |
      <?php
      namespace App\Controllers;

      class AdminController {
          public function dashboard(): array {
              return ['page' => 'admin_dashboard', 'stats' => []];
          }

          public function users(): array {
              return ['admin_users' => [], 'total' => 0];
          }

          public function settings(): array {
              return ['settings' => ['maintenance' => false, 'debug' => false]];
          }
      }
    src/Attributes/Middleware.php: |
      <?php
      namespace App\Attributes;

      #[Attribute(Attribute::TARGET_CLASS | Attribute::TARGET_METHOD)]
      class Middleware {
          public function __construct(
              public array $names,
              public bool $global = false
          ) {}

          public function getNames(): array {
              return $this->names;
          }

          public function isGlobal(): bool {
              return $this->global;
          }
      }
    src/Controllers/AuthController.php: |
      <?php
      namespace App\Controllers;

      class AuthController {
          public function login(string $username, string $password): array {
              return ['token' => 'jwt_token_here', 'expires_in' => 3600];
          }

          public function logout(string $token): array {
              return ['revoked' => true];
          }

          public function refresh(string $token): array {
              return ['token' => 'new_jwt_token', 'expires_in' => 3600];
          }
      }
    src/Routing/Router.php: |
      <?php
      namespace App\Routing;

      class Router {
          private array $routes = [];

          public function registerController(string $controllerClass): void {
              $reflection = new \ReflectionClass($controllerClass);
              foreach ($reflection->getMethods() as $method) {
                  $attributes = $method->getAttributes(\App\Attributes\Route::class);
                  foreach ($attributes as $attr) {
                      $route = $attr->newInstance();
                      $this->routes[] = [
                          'path' => $route->getPath(),
                          'method' => $route->getMethod(),
                          'handler' => [$controllerClass, $method->getName()],
                      ];
                  }
              }
          }

          public function match(string $path, string $method): ?array {
              foreach ($this->routes as $route) {
                  if ($route['path'] === $path && $route['method'] === strtoupper($method)) {
                      return $route['handler'];
                  }
              }
              return null;
          }
      }
