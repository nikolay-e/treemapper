    auth/token_service.py: |
      import hashlib
      from typing import Optional, Dict
      from dataclasses import dataclass
      from datetime import datetime, timedelta

      @dataclass
      class TokenData:
          user_id: int
          token: str
          expires_at: datetime

      class TokenService:
          def __init__(self, secret_key: str, ttl_hours: int = 24):
              self._secret = secret_key
              self._ttl_hours = ttl_hours
              self._tokens: Dict[str, TokenData] = {}

          def generate_token(self, user_id: int) -> TokenData:
              raw = f"{user_id}{self._secret}{datetime.now().isoformat()}"
              token = hashlib.sha256(raw.encode()).hexdigest()
              data = TokenData(
                  user_id=user_id, token=token,
                  expires_at=datetime.now() + timedelta(hours=self._ttl_hours),
              )
              self._tokens[token] = data
              return data

          def validate_token(self, token: str) -> Optional[int]:
              data = self._tokens.get(token)
              if data and datetime.now() < data.expires_at:
                  return data.user_id
              return None
    middleware/rate_limiter.py: |
      import time
      from typing import Dict, Optional
      from dataclasses import dataclass

      @dataclass
      class RateLimitConfig:
          requests_per_minute: int = 60
          burst_size: int = 10

      class ApiRateLimiter:
          def __init__(self, config: RateLimitConfig):
              self._config = config
              self._requests: Dict[str, list[float]] = {}

          def is_allowed(self, client_id: str) -> bool:
              now = time.time()
              window_start = now - 60
              if client_id not in self._requests:
                  self._requests[client_id] = []
              self._requests[client_id] = [
                  t for t in self._requests[client_id] if t > window_start
              ]
              if len(self._requests[client_id]) >= self._config.requests_per_minute:
                  return False
              self._requests[client_id].append(now)
              return True
