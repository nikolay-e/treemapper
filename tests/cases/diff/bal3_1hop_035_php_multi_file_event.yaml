  changed_files:
    src/Events/EventDispatcher.php: |
      <?php
      namespace App\Events;

      class EventDispatcher
      {
          private array $listeners = [];
          private array $history = [];

          public function listen(string $event, callable $handler, int $priority = 0): void
          {
              $this->listeners[$event][] = ['handler' => $handler, 'priority' => $priority];
          }

          public function dispatch(string $event, array $payload): void
          {
              $this->history[] = ['event' => $event, 'payload' => $payload];
              $handlers = $this->listeners[$event] ?? [];
              usort($handlers, fn($a, $b) => $b['priority'] <=> $a['priority']);
              foreach ($handlers as $entry) {
                  $entry['handler']($payload);
              }
          }

          public function getHistory(): array
          {
              return $this->history;
          }
      }
    src/Events/EventSubscriber.php: |
      <?php
      namespace App\Events;

      class EventSubscriber
      {
          private EventDispatcher $dispatcher;

          public function __construct(EventDispatcher $dispatcher)
          {
              $this->dispatcher = $dispatcher;
          }

          public function subscribe(string $event, callable $callback, int $priority = 0): void
          {
              $this->dispatcher->listen($event, $callback, $priority);
          }

          public function unsubscribe(string $event): void
          {
          }
      }
  commit_message: "Add priority-based event dispatch and event history"
