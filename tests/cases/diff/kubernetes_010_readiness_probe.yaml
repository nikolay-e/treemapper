name: kubernetes_010_readiness_probe
tags:
- lang:yaml
- change:single_file
- change:config
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    k8s/apps/gateway/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
        namespace: production
        labels:
          app: api-gateway
          component: networking
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: api-gateway
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
        template:
          metadata:
            labels:
              app: api-gateway
              component: networking
          spec:
            containers:
            - name: gateway
              image: api-gateway:v2.0.0
              ports:
              - containerPort: 8080
                name: http
              - containerPort: 8443
                name: https
              - containerPort: 9090
                name: admin
              env:
              - name: UPSTREAM_URL
                value: "http://backend-api.production.svc.cluster.local"
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
    k8s/apps/gateway/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: api-gateway
        namespace: production
      spec:
        type: LoadBalancer
        selector:
          app: api-gateway
        ports:
        - name: http
          port: 80
          targetPort: 8080
        - name: https
          port: 443
          targetPort: 8443
    k8s/apps/gateway/rate-limit.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: gateway-rate-limits
        namespace: production
      data:
        config.yaml: |
          rate_limits:
            - name: global
              requests_per_second: 100
              burst: 50
            - name: per_ip
              requests_per_second: 10
              burst: 20
            - name: authenticated
              requests_per_second: 50
              burst: 100
    k8s/apps/backend/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend-api
        namespace: production
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: backend-api
        template:
          metadata:
            labels:
              app: backend-api
          spec:
            containers:
            - name: api
              image: backend-api:v3.1.0
              ports:
              - containerPort: 8080
              env:
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: db-credentials
                    key: url
  changed_files:
    k8s/apps/gateway/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
        namespace: production
        labels:
          app: api-gateway
          component: networking
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: api-gateway
        strategy:
          type: RollingUpdate
          rollingUpdate:
            maxSurge: 1
            maxUnavailable: 0
        template:
          metadata:
            labels:
              app: api-gateway
              component: networking
          spec:
            containers:
            - name: gateway
              image: api-gateway:v2.0.0
              ports:
              - containerPort: 8080
                name: http
              - containerPort: 8443
                name: https
              - containerPort: 9090
                name: admin
              env:
              - name: UPSTREAM_URL
                value: "http://backend-api.production.svc.cluster.local"
              readinessProbe:
                tcpSocket:
                  port: 8080
                initialDelaySeconds: 5
                periodSeconds: 5
                timeoutSeconds: 3
                failureThreshold: 3
                successThreshold: 1
              resources:
                requests:
                  memory: "128Mi"
                  cpu: "100m"
                limits:
                  memory: "256Mi"
                  cpu: "200m"
    k8s/apps/gateway/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: api-gateway
        namespace: production
      spec:
        type: LoadBalancer
        selector:
          app: api-gateway
        ports:
        - name: http
          port: 80
          targetPort: 8080
        - name: https
          port: 443
          targetPort: 8443
    k8s/apps/gateway/rate-limit.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: gateway-rate-limits
        namespace: production
      data:
        config.yaml: |
          rate_limits:
            - name: global
              requests_per_second: 100
              burst: 50
            - name: per_ip
              requests_per_second: 10
              burst: 20
            - name: authenticated
              requests_per_second: 50
              burst: 100
    k8s/apps/backend/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend-api
        namespace: production
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: backend-api
        template:
          metadata:
            labels:
              app: backend-api
          spec:
            containers:
            - name: api
              image: backend-api:v3.1.0
              ports:
              - containerPort: 8080
              env:
              - name: DATABASE_URL
                valueFrom:
                  secretKeyRef:
                    name: db-credentials
                    key: url
  commit_message: Update files
