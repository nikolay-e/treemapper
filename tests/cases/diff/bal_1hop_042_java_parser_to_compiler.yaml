    src/main/java/com/lang/parser/ExpressionParser.java: |
      package com.lang.parser;
      import java.util.ArrayList;
      import java.util.List;
      public class ExpressionParser {
          public List<String> tokenize(String expression) {
              List<String> tokens = new ArrayList<>();
              StringBuilder current = new StringBuilder();
              for (char c : expression.toCharArray()) {
                  if (c == '+' || c == '-' || c == '*' || c == '/') {
                      if (current.length() > 0) {
                          tokens.add(current.toString().trim());
                          current.setLength(0);
                      }
                      tokens.add(String.valueOf(c));
                  } else {
                      current.append(c);
                  }
              }
              if (current.length() > 0) {
                  tokens.add(current.toString().trim());
              }
              return tokens;
          }
          public boolean isOperator(String token) {
              return "+-*/".contains(token) && token.length() == 1;
          }
      }
    src/main/java/com/lang/compiler/ExpressionCompiler.java: |
      package com.lang.compiler;
      import com.lang.parser.ExpressionParser;
      import java.util.List;
      public class ExpressionCompiler {
          private final ExpressionParser parser;
          public ExpressionCompiler(ExpressionParser parser) {
              this.parser = parser;
          }
          public double evaluate(String expression) {
              List<String> tokens = parser.tokenize(expression);
              if (tokens.size() == 0) return 0;
              double result = Double.parseDouble(tokens.get(0));
              for (int i = 1; i < tokens.size() - 1; i += 2) {
                  String op = tokens.get(i);
                  double operand = Double.parseDouble(tokens.get(i + 1));
                  if (parser.isOperator(op)) {
                      switch (op) {
                          case "+": result += operand; break;
                          case "-": result -= operand; break;
                          case "*": result *= operand; break;
                          case "/": result /= operand; break;
                      }
                  }
              }
              return result;
          }
      }
