      package com.lang.formatter;
      public class CodeFormatter {
          public String indent(String code, int spaces) {
              String prefix = " ".repeat(spaces);
              return code.lines()
                  .map(line -> prefix + line)
                  .reduce("", (a, b) -> a + "\n" + b)
                  .trim();
          }
      }
