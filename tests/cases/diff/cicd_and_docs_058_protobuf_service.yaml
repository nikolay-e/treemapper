name: cicd_and_docs_058_protobuf_service
repo:
  initial_files:
    proto/user_service.proto: |
      syntax = "proto3";

      package user;

      service UserService {
        rpc GetUser(GetUserRequest) returns (User);
      }

      message GetUserRequest {
        int64 id = 1;
      }

      message User {
        int64 id = 1;
        string name = 2;
      }
    src/grpc/user_service.py: |
      import grpc
      from proto import user_service_pb2, user_service_pb2_grpc
      from database import get_db

      class UserServiceServicer(user_service_pb2_grpc.UserServiceServicer):
          def GetUser(self, request, context):
              db = get_db()
              user = db.query(User).filter(User.id == request.id).first()
              if not user:
                  context.abort(grpc.StatusCode.NOT_FOUND, "User not found")
              return user_service_pb2.User(id=user.id, name=user.name)
    src/grpc/server.py: |
      import grpc
      from concurrent import futures
      from proto import user_service_pb2_grpc
      from grpc.user_service import UserServiceServicer

      def serve():
          server = grpc.server(futures.ThreadPoolExecutor(max_workers=10))
          user_service_pb2_grpc.add_UserServiceServicer_to_server(
              UserServiceServicer(), server
          )
          server.add_insecure_port('[::]:50051')
          server.start()
          server.wait_for_termination()
    src/grpc/health_check.py: |
      import grpc
      from grpc_health.v1 import health_pb2, health_pb2_grpc

      class HealthServicer(health_pb2_grpc.HealthServicer):
          def Check(self, request, context):
              return health_pb2.HealthCheckResponse(
                  status=health_pb2.HealthCheckResponse.SERVING
              )

          def Watch(self, request, context):
              context.abort(grpc.StatusCode.UNIMPLEMENTED, "Watch not supported")
    src/middleware/auth_interceptor.py: |
      import grpc

      class AuthInterceptor(grpc.ServerInterceptor):
          def __init__(self, token_validator):
              self.token_validator = token_validator

          def intercept_service(self, continuation, handler_call_details):
              metadata = dict(handler_call_details.invocation_metadata)
              token = metadata.get("authorization", "")
              if not self.token_validator.validate(token):
                  return grpc.unary_unary_rpc_method_handler(
                      lambda req, ctx: ctx.abort(
                          grpc.StatusCode.UNAUTHENTICATED, "Invalid token"
                      )
                  )
              return continuation(handler_call_details)
    src/database.py: |
      from sqlalchemy import create_engine
      from sqlalchemy.orm import sessionmaker

      engine = create_engine("postgresql://localhost/mydb")
      SessionLocal = sessionmaker(bind=engine)

      def get_db():
          db = SessionLocal()
          try:
              return db
          finally:
              db.close()
  changed_files:
    proto/user_service.proto: |
      syntax = "proto3";

      package user;

      service UserService {
        rpc GetUser(GetUserRequest) returns (User);
        rpc ListUsers(ListUsersRequest) returns (ListUsersResponse);
        rpc CreateUser(CreateUserRequest) returns (User);
        rpc UpdateUser(UpdateUserRequest) returns (User);
        rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse);
      }

      message GetUserRequest {
        int64 id = 1;
      }

      message ListUsersRequest {
        int32 page_size = 1;
        string page_token = 2;
      }

      message ListUsersResponse {
        repeated User users = 1;
        string next_page_token = 2;
        int32 total_count = 3;
      }

      message CreateUserRequest {
        string name = 1;
        string email = 2;
      }

      message UpdateUserRequest {
        int64 id = 1;
        string name = 2;
        string email = 3;
      }

      message DeleteUserRequest {
        int64 id = 1;
      }

      message DeleteUserResponse {
        bool success = 1;
      }

      message User {
        int64 id = 1;
        string name = 2;
        string email = 3;
      }
  commit_message: "Add CRUD RPCs to UserService proto definition"
