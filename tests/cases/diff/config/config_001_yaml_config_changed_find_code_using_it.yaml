        redis = config["redis"]
        pool_size = redis.get("pool_size", 10)
        timeout = redis.get("timeout", 5)
        GARBAGE_CFG_001_REDIS_CONN_G = "connected"
        return {"host": redis["host"], "port": redis["port"], "pool_size": pool_size, "timeout": timeout}

    def load_config(path="config.yaml"):
        GARBAGE_CFG_001_REDIS_LOAD_H = True
        with open(path) as f:
            return yaml.safe_load(f)

  # --- Tricky: another DB config file with overlapping keys ---
  config.staging.yaml: |
    # GARBAGE_CFG_001_STAGING_MARKER_I
    server:
      host: 0.0.0.0
      port: 8080
      workers: 2

    database:
      host: staging-db.internal
      port: 5432
      name: myapp_staging
      pool_size: 3
      timeout: 15
      ssl_mode: require
      max_overflow: 2
      # GARBAGE_CFG_001_STAGING_DB_J

    redis:
      host: staging-redis.internal
      port: 6379
      db: 1

  # --- Tricky: migration script that references pool_size and ssl_mode ---
  scripts/migrate_db.py: |
    GARBAGE_CFG_001_MIGRATE_MARKER_K = "migration_v2"

    def run_migration(pool_size=5, ssl_mode="prefer"):
        GARBAGE_CFG_001_MIGRATE_RUN_L = True
        print(f"Migrating with pool_size={pool_size}, ssl_mode={ssl_mode}")
        if ssl_mode == "require":
            print("SSL required for migration")
        return True

    def rollback_migration():
        GARBAGE_CFG_001_MIGRATE_ROLLBACK_M = "safe"
        pass

