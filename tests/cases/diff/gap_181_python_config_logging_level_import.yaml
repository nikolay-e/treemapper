repo:
  initial_files:
    config/logging.py: |
      LOG_LEVEL = "WARNING"
      LOG_FORMAT = "%(asctime)s %(levelname)s %(message)s"
      MAX_LOG_SIZE = 10485760
      ROTATE_COUNT = 5
    services/ingest.py: |
      from config.logging import LOG_LEVEL, LOG_FORMAT

      class IngestService:
          def __init__(self):
              self.level = LOG_LEVEL
              self.fmt = LOG_FORMAT

          def process_batch(self, records: list[dict]) -> int:
              count = 0
              for record in records:
                  if self._validate(record):
                      count += 1
              return count

          def _validate(self, record: dict) -> bool:
              return "id" in record and "payload" in record
    services/export.py: |
