          def export_all(self, destination: str) -> None:
              pass
    utils/checksum.py: |
      import hashlib

      TRAP_GAP_181_CHECKSUM_MARKER_C: str = "checksum_noise"
      TRAP_GAP_181_HASH_FLAG_D: bool = False

      def sha256(data: bytes) -> str:
          return hashlib.sha256(data).hexdigest()

      def md5(data: bytes) -> str:
          return hashlib.md5(data).hexdigest()
