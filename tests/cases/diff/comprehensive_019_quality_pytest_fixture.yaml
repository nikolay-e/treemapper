      import random
      import string
      from typing import Dict

      class FixtureFactory:
          def __init__(self, seed: int = 42):
              self.rng = random.Random(seed)

          def random_string(self, length: int = 10) -> str:
              return ''.join(self.rng.choices(string.ascii_lowercase, k=length))

          def random_email(self) -> str:
              name = self.random_string(8)
              domain = self.random_string(5)
              return f"{name}@{domain}.com"

          def random_dict(self, keys: int = 3) -> Dict[str, str]:
              return {self.random_string(5): self.random_string(8) for _ in range(keys)}
    src/snapshot_manager.py: |
      import json
      from pathlib import Path

      class SnapshotManager:
          def __init__(self, snapshot_dir: str = "snapshots"):
              self.snapshot_dir = Path(snapshot_dir)

          def save(self, name: str, data: dict) -> None:
              path = self.snapshot_dir / f"{name}.json"
              path.write_text(json.dumps(data, indent=2))

          def load(self, name: str) -> dict:
              path = self.snapshot_dir / f"{name}.json"
              return json.loads(path.read_text())

          def compare(self, name: str, data: dict) -> bool:
              existing = self.load(name)
              return existing == data
