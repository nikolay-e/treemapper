  changed_files:
    lib/core/command.rb: |
      module Core
        module Command
          def call(context)
            raise NotImplementedError
          end
        end
      end
    lib/core/command_bus.rb: |
      require_relative 'command'

      module Core
        class CommandBus
          def initialize
            @handlers = {}
            @middleware = []
          end

          def register(command_class, handler)
            @handlers[command_class] = handler
          end

          def use(middleware_proc)
            @middleware << middleware_proc
            self
          end

          def dispatch(command)
            handler = @handlers[command.class]
            raise "No handler for #{command.class}" unless handler
            chain = @middleware.reduce(-> { handler.call(command) }) do |next_fn, mw|
              -> { mw.call(command, next_fn) }
            end
            chain.call
          end
        end
      end
