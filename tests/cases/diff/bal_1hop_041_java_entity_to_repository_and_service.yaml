          public String getDepartment() { return department; }
      }
    src/main/java/com/hr/repo/EmployeeRepository.java: |
      package com.hr.repo;
      import com.hr.entity.Employee;
      import java.util.ArrayList;
      import java.util.List;
      import java.util.Optional;
      public class EmployeeRepository {
          private final List<Employee> employees = new ArrayList<>();
          public void save(Employee emp) {
              employees.add(emp);
          }
          public Optional<Employee> findById(String id) {
              return employees.stream()
                  .filter(e -> e.getId().equals(id))
                  .findFirst();
          }
          public List<Employee> findByDepartment(String dept) {
              return employees.stream()
                  .filter(e -> e.getDepartment().equals(dept))
                  .collect(java.util.stream.Collectors.toList());
          }
      }
    src/main/java/com/hr/service/EmployeeService.java: |
      package com.hr.service;
      import com.hr.entity.Employee;
      import com.hr.repo.EmployeeRepository;
      public class EmployeeService {
          private final EmployeeRepository repo;
          public EmployeeService(EmployeeRepository repo) { this.repo = repo; }
          public Employee hire(String id, String name, String department) {
              Employee emp = new Employee(id, name, department);
              repo.save(emp);
              return emp;
          }
          public String getEmployeeName(String id) {
              return repo.findById(id)
                  .map(Employee::getName)
                  .orElse("Unknown");
          }
      }
    src/main/java/com/hr/payroll/PayrollCalculator.java: |
      package com.hr.payroll;
      public class PayrollCalculator {
          public double calculateSalary(double basePay, double bonus) {
              return basePay + bonus;
          }
          public double calculateTax(double salary, double rate) {
              return salary * rate;
          }
      }
    src/main/java/com/hr/email/EmailNotifier.java: |
      package com.hr.email;
