name: cicd_and_docs_018_gha_environment
repo:
  initial_files:
    .github/workflows/deploy.yml: |
      name: Deploy
      on:
        push:
          branches: [main]
      jobs:
        deploy:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - run: ./deploy.sh
    deploy.sh: |
      #!/bin/bash
      set -e
      echo "Deploying application..."
      aws s3 sync ./dist s3://prod-bucket/
      aws cloudfront create-invalidation --distribution-id E123 --paths "/*"
    src/config/deploy.ts: |
      export interface DeploymentTarget {
        name: string;
        url: string;
        region: string;
      }

      export const productionTarget: DeploymentTarget = {
        name: 'production',
        url: 'https://example.com',
        region: 'us-east-1'
      };
