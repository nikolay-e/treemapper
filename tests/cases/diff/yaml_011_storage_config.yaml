name: yaml_011_storage_config
tags:
- lang:python
- change:single_file
- change:config
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    config/storage.yaml: |
      storage:
        backend: local
        path: /data/uploads
    src/storage.py: |
      import os

      class StorageBackend:
          def __init__(self, backend: str, path: str):
              self.backend = backend
              self.path = path

          def save(self, filename: str, data: bytes):
              filepath = os.path.join(self.path, filename)
              os.makedirs(os.path.dirname(filepath), exist_ok=True)
              with open(filepath, "wb") as f:
                  f.write(data)

          def exists(self, filename: str) -> bool:
              return os.path.exists(os.path.join(self.path, filename))
    config/backup.yaml: |
      backup:
        schedule: "0 3 * * *"
        retention_days: 30
        storage:
          type: glacier
          vault: my-backup-vault
        notifications:
          on_failure: ops@example.com
    src/image_processor.py: |
      from PIL import Image
      from io import BytesIO

      class ImageProcessor:
          def __init__(self, max_width: int = 1920, quality: int = 85):
              self.max_width = max_width
              self.quality = quality

          def resize(self, image_data: bytes) -> bytes:
              img = Image.open(BytesIO(image_data))
              if img.width > self.max_width:
                  ratio = self.max_width / img.width
                  new_size = (self.max_width, int(img.height * ratio))
                  img = img.resize(new_size, Image.LANCZOS)
              output = BytesIO()
              img.save(output, format="JPEG", quality=self.quality)
              return output.getvalue()
  changed_files:
    config/storage.yaml: |
      storage:
        backend: s3
        bucket: my-bucket
        region: us-east-1
    src/storage.py: |
