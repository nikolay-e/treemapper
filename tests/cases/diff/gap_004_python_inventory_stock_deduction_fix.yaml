      from warehouse.sku import SkuRegistry, SkuNotFoundError

      class StockManager:
          def __init__(self):
              self._quantities: dict[str, int] = {}
              self._registry = SkuRegistry()

          def add_stock(self, sku: str, quantity: int) -> None:
              self._registry.validate(sku)
              current = self._quantities.get(sku, 0)
              self._quantities[sku] = current + quantity

          def deduct(self, sku: str, quantity: int) -> bool:
              self._registry.validate(sku)
              current = self._quantities.get(sku, 0)
              if current < quantity:
                  return False
              self._quantities[sku] = current - quantity
              return True

          def get_quantity(self, sku: str) -> int:
              return self._quantities.get(sku, 0)
    warehouse/sku.py: |
      class SkuNotFoundError(Exception):
          pass

      class SkuRegistry:
          def __init__(self):
              self._valid_skus: set[str] = set()

          def register(self, sku: str) -> None:
              self._valid_skus.add(sku.upper())

          def validate(self, sku: str) -> None:
              if sku.upper() not in self._valid_skus:
                  raise SkuNotFoundError(f"Unknown SKU: {sku}")

          def list_all(self) -> list[str]:
              return sorted(self._valid_skus)
