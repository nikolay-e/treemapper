    warehouse/stock.py: |
      from warehouse.sku import SkuRegistry, SkuNotFoundError

      class StockManager:
          def __init__(self):
              self._quantities: dict[str, int] = {}
              self._reserved: dict[str, int] = {}
              self._registry = SkuRegistry()

          def add_stock(self, sku: str, quantity: int) -> None:
              self._registry.validate(sku)
              current = self._quantities.get(sku, 0)
              self._quantities[sku] = current + quantity

          def reserve(self, sku: str, quantity: int) -> bool:
              available = self.available(sku)
              if available < quantity:
                  return False
              current_reserved = self._reserved.get(sku, 0)
              self._reserved[sku] = current_reserved + quantity
              return True

          def deduct(self, sku: str, quantity: int) -> bool:
              self._registry.validate(sku)
              current = self._quantities.get(sku, 0)
              reserved = self._reserved.get(sku, 0)
              available = current - reserved
              if available < quantity:
                  return False
              self._quantities[sku] = current - quantity
              return True

          def available(self, sku: str) -> int:
              total = self._quantities.get(sku, 0)
              reserved = self._reserved.get(sku, 0)
              return max(0, total - reserved)

          def get_quantity(self, sku: str) -> int:
              return self._quantities.get(sku, 0)
