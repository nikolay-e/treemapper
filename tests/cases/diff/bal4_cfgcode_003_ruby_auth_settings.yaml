name: bal4_cfgcode_003_ruby_auth_settings
tags:
- lang:ruby
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    config/auth.yml: |
      auth:
        provider: local
        session_ttl: 1800
        max_attempts: 5
        lockout_duration: 300
    app/middleware/authentication.rb: |
      require 'yaml'
      module Middleware
        class Authentication
          def initialize(app)
            @app = app
            @config = YAML.load_file('config/auth.yml')['auth']
          end
          def call(env)
            return locked_response if locked?(env)
            @app.call(env)
          end
          def max_attempts
            @config['max_attempts']
          end
          def lockout_seconds
            @config['lockout_duration']
          end
        end
      end
    app/models/session.rb: |
      require 'yaml'
      class Session
        CONFIG = YAML.load_file('config/auth.yml')['auth']
        def initialize(user_id)
          @user_id = user_id
          @ttl = CONFIG['session_ttl']
        end
        def expired?
          Time.now - @created_at > @ttl
        end
      end
    garbage_payment.rb: |
      GARBAGE_CFGCODE_003_PAY_A = "stripe"
      GARBAGE_CFGCODE_003_PAY_B = "usd"
      class PaymentProcessor
        GARBAGE_CFGCODE_003_PAY_C = 0.029
        def charge(amount)
          GARBAGE_CFGCODE_003_PAY_D = amount
        end
      end
    garbage_search.rb: |
      GARBAGE_CFGCODE_003_SEARCH_E = "elastic"
      GARBAGE_CFGCODE_003_SEARCH_F = 9200
      class SearchIndex
        GARBAGE_CFGCODE_003_SEARCH_G = "default"
        def query(q)
          GARBAGE_CFGCODE_003_SEARCH_H = q
        end
      end
    garbage_scheduler.rb: |
      GARBAGE_CFGCODE_003_SCHED_I = "cron"
      GARBAGE_CFGCODE_003_SCHED_J = 60
  changed_files:
    config/auth.yml: |
      auth:
        provider: oauth2
        session_ttl: 3600
        max_attempts: 3
        lockout_duration: 900
        mfa_required: true
  commit_message: "switch to oauth2 and enforce mfa"
