# Test: Release notes text file has small paragraph-level edits across sections
#
# Scenario: docs/release_notes.txt is updated from v2.4.0 to v2.4.1.
# Changes span multiple short paragraphs: a new bug fix is added,
# one known issue is removed, and a migration step is added. This
# tests that the algorithm properly presents fragments from a single
# text file with many small changes scattered across sections.
#
# Reviewer questions:
#   Q1: "What changed between v2.4.0 and v2.4.1?"
#       -> The diff itself shows: new CSV fix line, removed upload
#          issue, new migration step, version bump in title.
#
# Not needed:
#   - docs/api_reference.txt: API documentation. Different document
#     type, not related to release notes.
#   - docs/architecture.txt: architecture description. Design doc,
#     unrelated to the patch release changes.

initial:
  docs/release_notes.txt: |
    Release Notes v2.4.0
    ====================

    Bug Fixes:
    Fixed memory leak in connection pool manager.
    Resolved race condition in session cleanup.

    Performance:
    Reduced database query latency by 15%.

    New Features:
    Added support for webhook retry with exponential backoff.
    Implemented batch processing for bulk import operations.

    Breaking Changes:
    Removed deprecated v1 authentication endpoint.
    Changed default timeout from 30s to 15s.

    Known Issues:
    Intermittent timeout on large file uploads over 100MB.
    Dashboard chart rendering slow with more than 10000 data points.

    Migration Guide:
    Update all API clients to use v2 authentication.
    Review timeout settings in configuration files.
    Test webhook integrations with the new retry behavior.
  # --- Not needed: API reference, different document type ---
  docs/api_reference.txt: |
    API Reference
    =============

    GET /api/users
      Returns a list of all active users.
      Parameters: page (int), limit (int)

    POST /api/users
      Creates a new user account.
      Body: { name, email, role }

    DELETE /api/users/:id
      Deactivates a user account.
      Requires admin permissions.
  # --- Not needed: architecture doc, design concern ---
  docs/architecture.txt: |
    Architecture Overview
    =====================

    The system follows a layered architecture:
    - Presentation layer: REST API endpoints
    - Business layer: Service classes with domain logic
    - Data layer: Repository pattern with PostgreSQL

    All communication between layers uses typed DTOs.
    Background jobs run via a Redis-backed task queue.
changed:
  docs/release_notes.txt: |
    Release Notes v2.4.1
    ====================

    Bug Fixes:
    Fixed memory leak in connection pool manager.
    Resolved race condition in session cleanup.
    Fixed CSV export encoding issue for Unicode characters.

    Performance:
    Reduced database query latency by 15%.

    New Features:
    Added support for webhook retry with exponential backoff.
    Implemented batch processing for bulk import operations.

    Breaking Changes:
    Removed deprecated v1 authentication endpoint.
    Changed default timeout from 30s to 15s.

    Known Issues:
    Dashboard chart rendering slow with more than 10000 data points.

    Migration Guide:
    Update all API clients to use v2 authentication.
    Review timeout settings in configuration files.
    Test webhook integrations with the new retry behavior.
    Run the data migration script before deploying.
  docs/api_reference.txt: |
    API Reference
    =============

    GET /api/users
      Returns a list of all active users.
      Parameters: page (int), limit (int)

    POST /api/users
      Creates a new user account.
      Body: { name, email, role }

    DELETE /api/users/:id
      Deactivates a user account.
      Requires admin permissions.
  docs/architecture.txt: |
    Architecture Overview
    =====================

    The system follows a layered architecture:
    - Presentation layer: REST API endpoints
    - Business layer: Service classes with domain logic
    - Data layer: Repository pattern with PostgreSQL

    All communication between layers uses typed DTOs.
    Background jobs run via a Redis-backed task queue.
must_include_files:
  - docs/release_notes.txt
must_include_content:
  - "Fixed CSV export encoding issue for Unicode characters."
must_not_include:
  # api_reference.txt: API docs, different document type
  - "API Reference"
  - "GET /api/users"
  # architecture.txt: design document, unrelated to release patch
  - "Architecture Overview"
  - "layered architecture"
max_fragments: 8
max_files: 2
add_garbage_files: false
skip_garbage_check: true
