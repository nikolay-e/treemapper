    from src.data_pipeline import extract_records, transform_records, DataValidator
    from src.loaders.db_loader import load_records
    import logging

    logger = logging.getLogger(__name__)

    FIELD_MAPPING = {
        "id": "record_id",
        "source": "origin",
    }

    SCHEMA = {
        "record_id": {"type": "string"},
        "origin": {"type": "string"},
    }

    def run(source: str) -> int:
        raw = extract_records(source)
        logger.info(f"Extracted {len(raw)} records from {source}")

        validator = DataValidator(SCHEMA)
        transformed = transform_records(raw, FIELD_MAPPING)

        valid = [r for r in transformed if validator.validate(r)]
        if validator.get_errors():
            logger.warning(f"Validation errors: {validator.get_errors()}")

        loaded = load_records(valid)
        return loaded

    def run_incremental(source: str, since: str) -> int:
        raw = extract_records(source)
        filtered = [r for r in raw if r.get("updated_after", "") >= since]
        transformed = transform_records(filtered, FIELD_MAPPING)
        return load_records(transformed)

