name: merging_007_yaml_sections
repo:
  initial_files:
    config/application.yaml: |
      database:
        host: localhost
        port: 5432
        name: appdb
        pool_size: 10
        timeout_ms: 5000
        ssl_mode: disable

      logging:
        level: INFO
        format: json
        output: stdout
        max_file_size: 100MB

      server:
        host: 0.0.0.0
        port: 8080
        workers: 4
        max_connections: 1000
        read_timeout: 30s
        write_timeout: 30s

      cache:
        backend: redis
        host: localhost
        port: 6379
        ttl_seconds: 300
        max_memory: 256MB
    config/docker-compose.yaml: |
      version: "3.8"
      services:
        postgres:
          image: postgres:16-alpine
          environment:
            POSTGRES_DB: appdb
            POSTGRES_USER: devuser
            POSTGRES_PASSWORD: devpass
          ports:
            - "5432:5432"
          volumes:
            - pgdata:/var/lib/postgresql/data

        redis:
          image: redis:7-alpine
          ports:
            - "6379:6379"
          command: redis-server --maxmemory 256mb

      volumes:
        pgdata:
    config/terraform.tfvars: |
      region         = "us-east-1"
      instance_type  = "t3.medium"
      db_instance    = "db.r6g.large"
      db_name        = "appdb"
      db_port        = 5432
      cache_node     = "cache.r6g.large"
      cache_port     = 6379
      environment    = "production"
      min_instances  = 2
      max_instances  = 10
  changed_files:
    config/application.yaml: |
      database:
        host: production-db.internal
        port: 5432
        name: appdb
        pool_size: 25
        timeout_ms: 3000
        ssl_mode: require

      logging:
        level: WARNING
        format: json
        output: stdout
        max_file_size: 100MB

      server:
        host: 0.0.0.0
        port: 8080
        workers: 4
        max_connections: 1000
        read_timeout: 30s
        write_timeout: 30s

      cache:
        backend: redis
        host: localhost
        port: 6379
        ttl_seconds: 300
        max_memory: 256MB
    config/docker-compose.yaml: |
      version: "3.8"
      services:
        postgres:
          image: postgres:16-alpine
          environment:
            POSTGRES_DB: appdb
            POSTGRES_USER: devuser
            POSTGRES_PASSWORD: devpass
          ports:
            - "5432:5432"
          volumes:
            - pgdata:/var/lib/postgresql/data

        redis:
          image: redis:7-alpine
          ports:
            - "6379:6379"
          command: redis-server --maxmemory 256mb

      volumes:
        pgdata:
    config/terraform.tfvars: |
      region         = "us-east-1"
      instance_type  = "t3.medium"
      db_instance    = "db.r6g.large"
      db_name        = "appdb"
      db_port        = 5432
      cache_node     = "cache.r6g.large"
      cache_port     = 6379
      environment    = "production"
      min_instances  = 2
      max_instances  = 10
  commit_message: Update files
fragments:
- id: application_file
  selector:
    path: config/application.yaml
- id: req_global_0
  selector:
    anchor: 'host: production-db.internal'
- id: req_global_1
  selector:
    anchor: 'level: WARNING'
- id: no_docker_compose
  selector:
    path: config/docker-compose.yaml
- id: no_terraform
  selector:
    path: config/terraform.tfvars
- id: no_global_0
  selector:
    anchor: docker-compose.yaml
- id: no_global_1
  selector:
    anchor: terraform.tfvars
- id: no_global_2
  selector:
    anchor: POSTGRES_USER
- id: no_global_3
  selector:
    anchor: instance_type
oracle:
  required:
  - application_file
  - req_global_0
  - req_global_1
  allowed: []
  forbidden:
  - no_docker_compose
  - no_terraform
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
