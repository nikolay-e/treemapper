name: javascript_048_event_emitter_change
tags:
- lang:typescript
- change:single_file
- change:signature
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    emitter.ts: |
      import { EventEmitter } from 'events';

      export const appEmitter = new EventEmitter();

      export function emitUserCreated(user: { id: string; name: string }) {
          appEmitter.emit('userCreated', user);
      }
    listener.ts: |
      import { appEmitter } from './emitter';

      appEmitter.on('userCreated', (user) => {
          console.log('User created:', user);
      });
    user-repository.ts: |
      interface UserRecord {
          id: string;
          name: string;
          email: string;
      }

      const users = new Map<string, UserRecord>();

      export function saveUser(user: UserRecord): void {
          users.set(user.id, user);
      }

      export function removeUser(id: string): boolean {
          return users.delete(id);
      }

      export function findUser(id: string): UserRecord | undefined {
          return users.get(id);
      }
    notification-service.ts: |
      export async function sendEmailNotification(to: string, subject: string, body: string): Promise<boolean> {
          const response = await fetch('/api/notifications/email', {
              method: 'POST',
              body: JSON.stringify({ to, subject, body }),
          });
          return response.ok;
      }

      export async function sendPushNotification(userId: string, message: string): Promise<boolean> {
          const response = await fetch('/api/notifications/push', {
              method: 'POST',
              body: JSON.stringify({ userId, message }),
          });
          return response.ok;
      }
  changed_files:
