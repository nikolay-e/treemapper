  changed_files:
    lib/notifications/channel.rb: |
      module Notifications
        class DeliveryResult
          attr_reader :success, :channel_name, :error

          def initialize(success:, channel_name:, error: nil)
            @success = success
            @channel_name = channel_name
            @error = error
          end

          def success?
            @success
          end
        end

        class Channel
          attr_reader :name, :enabled

          def initialize(name, enabled: true)
            @name = name
            @enabled = enabled
          end

          def deliver(recipient, message)
            return DeliveryResult.new(success: false, channel_name: name, error: 'disabled') unless @enabled
            result = perform_delivery(recipient, message)
            DeliveryResult.new(success: true, channel_name: name)
          end

          def disable!
            @enabled = false
          end

          private

          def perform_delivery(recipient, message)
            "#{name}: #{message} -> #{recipient}"
          end
        end
      end
  commit_message: "feat: add DeliveryResult, enabled flag, and disable! to Channel"
