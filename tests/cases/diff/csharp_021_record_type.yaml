name: csharp_021_record_type
tags:
- lang:python
- lang:shell
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    scripts/lint.py: |
      import subprocess
      import sys

      LINT_PATHS = ["src", "tests"]


      def run_ruff(paths: list[str] = LINT_PATHS) -> int:
          result = subprocess.run(["ruff", "check"] + paths)
          return result.returncode
    scripts/lint.sh: |
      #!/usr/bin/env bash
      python3 scripts/lint.py
    garbage/complexity.py: |
      GARBAGE_CS021_COMPLEX_A = "complexity_marker"


      def check_complexity(path: str) -> dict:
          return {}
    garbage/dead_code.py: |
      GARBAGE_CS021_DEAD_B = "dead_code_marker"


      def find_dead_code(path: str) -> list:
          return []
    garbage/deps.py: |
      GARBAGE_CS021_DEPS_C = "deps_marker"


      def check_deps() -> list:
          return []
  changed_files:
    scripts/lint.py: |
      import subprocess
      import sys

      LINT_PATHS = ["src", "tests"]


      def run_ruff(paths: list[str] = LINT_PATHS) -> int:
          result = subprocess.run(["ruff", "check"] + paths)
          return result.returncode


      def run_mypy(paths: list[str] = LINT_PATHS) -> int:
          result = subprocess.run(["mypy"] + paths)
          return result.returncode


      def run_all(paths: list[str] = LINT_PATHS) -> int:
          ruff_code = run_ruff(paths)
          mypy_code = run_mypy(paths)
          return max(ruff_code, mypy_code)
    scripts/lint.sh: |
      #!/usr/bin/env bash
      set -euo pipefail
      if [[ "${CHECK:-all}" == "ruff" ]]; then
          python3 -c "import scripts.lint; sys.exit(scripts.lint.run_ruff())"
      elif [[ "${CHECK:-all}" == "mypy" ]]; then
          python3 -c "import scripts.lint; sys.exit(scripts.lint.run_mypy())"
      else
          python3 -c "import scripts.lint; sys.exit(scripts.lint.run_all())"
      fi
    garbage/complexity.py: |
      GARBAGE_CS021_COMPLEX_A = "complexity_marker"


      def check_complexity(path: str) -> dict:
          return {}
    garbage/dead_code.py: |
      GARBAGE_CS021_DEAD_B = "dead_code_marker"


      def find_dead_code(path: str) -> list:
          return []
    garbage/deps.py: |
      GARBAGE_CS021_DEPS_C = "deps_marker"


      def check_deps() -> list:
          return []
  commit_message: "feat: add run_mypy and run_all functions to lint script"
fragments:
- id: run_mypy_fn
  selector:
    path: scripts/lint.py
    anchor: "def run_mypy"
- id: run_all_fn
  selector:
    path: scripts/lint.py
    anchor: "def run_all"
- id: shell_check_dispatch
  selector:
    path: scripts/lint.sh
    anchor: 'CHECK:-all'
- id: no_garbage_a
  selector:
    anchor: GARBAGE_CS021_COMPLEX_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_CS021_DEAD_B
- id: no_garbage_c
  selector:
    anchor: GARBAGE_CS021_DEPS_C
oracle:
  required:
  - run_mypy_fn
  - run_all_fn
  - shell_check_dispatch
  allowed: []
  forbidden:
  - no_garbage_a
  - no_garbage_b
  - no_garbage_c
