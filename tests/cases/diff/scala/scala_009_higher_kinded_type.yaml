name: scala_009_higher_kinded_type
repo:
  initial_files:
    Functor.scala: |
      trait Functor[F[_]] {
        def map[A, B](fa: F[A])(f: A => B): F[B]
      }

      object Functor {
        implicit val listFunctor: Functor[List] = new Functor[List] {
          def map[A, B](fa: List[A])(f: A => B): List[B] = fa.map(f)
        }

        implicit val optionFunctor: Functor[Option] = new Functor[Option] {
          def map[A, B](fa: Option[A])(f: A => B): Option[B] = fa.map(f)
        }
      }
    FunctorOps.scala: |
      class FunctorOps {}
    Monad.scala: |
      trait Monad[F[_]] extends Functor[F] {
        def pure[A](a: A): F[A]
        def flatMap[A, B](fa: F[A])(f: A => F[B]): F[B]
      }

      object Monad {
        implicit val listMonad: Monad[List] = new Monad[List] {
          def pure[A](a: A): List[A] = List(a)
          def flatMap[A, B](fa: List[A])(f: A => List[B]): List[B] = fa.flatMap(f)
          def map[A, B](fa: List[A])(f: A => B): List[B] = fa.map(f)
        }

        implicit val optionMonad: Monad[Option] = new Monad[Option] {
          def pure[A](a: A): Option[A] = Some(a)
          def flatMap[A, B](fa: Option[A])(f: A => Option[B]): Option[B] = fa.flatMap(f)
          def map[A, B](fa: Option[A])(f: A => B): Option[B] = fa.map(f)
        }
      }
    ListOps.scala: |
      class ListOps {
        def doubleAll(list: List[Int]): List[Int] = list.map(_ * 2)
        def sumAll(list: List[Int]): Int = list.sum
        def filterPositive(list: List[Int]): List[Int] = list.filter(_ > 0)
        def groupBySign(list: List[Int]): Map[String, List[Int]] =
          list.groupBy(n => if (n >= 0) "positive" else "negative")
      }
  changed_files:
    Functor.scala: |
