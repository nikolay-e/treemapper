# Scenario: DataProcessor gains collection operation methods that work on
# Data objects — filterByScore, groupByFirstChar, topN, averageScore, flatMapValues.
#
# Diff: DataProcessor.scala changes from empty class to one with five methods,
# all operating on List[Data] using _.score, _.value, _.id field accesses.
#
# Reviewer questions:
#   Q1: "What fields does Data have — what are _.score, _.value, _.id?"
#       -> Data.scala (UNCHANGED) defines case class Data(id: Int, value: String,
#          score: Double). Reviewer confirms the field accesses are valid.
#   Q2: "Is headOption on _.value safe for empty strings?"
#       -> Data.scala shows value is a String. groupByFirstChar uses
#          headOption.getOrElse('_') which handles empty strings correctly.
#
# Not needed:
#   - DataExporter.scala: serializes Data objects to JSON/CSV. Same Data
#     domain, accesses d.id, d.value, d.score — the EXACT same fields.
#     HARDEST TRAP: uses the same Data case class with identical field accesses.
#   - DataImporter.scala: parses external data into Data objects. Same
#     Data fields, but creating not consuming.
#   - ScoreThresholds.scala: defines scoring constants and tier labels.
#     Related to "score" concept but not referenced by DataProcessor.
#   - DataValidator.scala: validates Data objects checking score ranges.
#     Same Data fields (_.score, _.value), same case class dependency.
#   - DataSpec.scala: tests for Data case class methods.

max_enrichment: 8.4
initial:
  Data.scala: |
    case class Data(id: Int, value: String, score: Double) {
      def isHighScore: Boolean = score > 0.8
      def formattedValue: String = value.trim.toLowerCase
    }
  DataProcessor.scala: |
    class DataProcessor {}
  DataExporter.scala: |
    object DataExporter {
      def toJson(items: List[Data]): String = {
        val entries = items.map { d =>
          s"""{"id":${d.id},"value":"${d.value}","score":${d.score}}"""
        }
        s"[${entries.mkString(",")}]"
      }

      def toCsv(items: List[Data]): String = {
        val header = "id,value,score"
        val rows = items.map(d => s"${d.id},${d.value},${d.score}")
        (header :: rows).mkString("\n")
      }

      def toXml(items: List[Data]): String = {
        val entries = items.map { d =>
          s"  <data id='${d.id}' value='${d.value}' score='${d.score}'/>"
        }
        s"<dataset>\n${entries.mkString("\n")}\n</dataset>"
      }
    }
  DataImporter.scala: |
    object DataImporter {
      def fromCsv(csv: String): List[Data] = {
        csv.split("\n").drop(1).toList.map { line =>
          val parts = line.split(",")
          Data(parts(0).toInt, parts(1), parts(2).toDouble)
        }
      }

      def fromJson(json: String): List[Data] = {
        List.empty
      }
    }
  ScoreThresholds.scala: |
    object ScoreThresholds {
      val Low: Double = 0.3
      val Medium: Double = 0.6
      val High: Double = 0.9

      def tier(score: Double): String = score match {
        case s if s >= High => "excellent"
        case s if s >= Medium => "good"
        case s if s >= Low => "fair"
        case _ => "poor"
      }

      def isPassingScore(score: Double): Boolean = score >= Low
    }
  DataValidator.scala: |
    class DataValidator {
      def validate(data: Data): Either[String, Data] = {
        if (data.score < 0.0 || data.score > 1.0) {
          Left(s"Score ${data.score} out of range for id ${data.id}")
        } else if (data.value.isEmpty) {
          Left(s"Empty value for id ${data.id}")
        } else {
          Right(data)
        }
      }

      def validateBatch(items: List[Data]): (List[String], List[Data]) = {
        val results = items.map(validate)
        (results.collect { case Left(e) => e }, results.collect { case Right(d) => d })
      }
    }
  DataSpec.scala: |
    import org.scalatest.flatspec.AnyFlatSpec
    import org.scalatest.matchers.should.Matchers

    class DataSpec extends AnyFlatSpec with Matchers {
      "Data" should "report high scores" in {
        Data(1, "test", 0.9).isHighScore should be(true)
        Data(2, "test", 0.5).isHighScore should be(false)
      }

      it should "format values" in {
        Data(1, "  Hello  ", 0.5).formattedValue should be("hello")
      }
    }
changed:
  DataProcessor.scala: |
    class DataProcessor {
      def filterByScore(items: List[Data], minScore: Double): List[Data] = {
        items.filter(_.score >= minScore)
      }

      def groupByFirstChar(items: List[Data]): Map[Char, List[Data]] = {
        items.groupBy(_.value.headOption.getOrElse('_'))
      }

      def topN(items: List[Data], n: Int): List[Data] = {
        items.sortBy(-_.score).take(n)
      }

      def averageScore(items: List[Data]): Double = {
        if (items.isEmpty) 0.0
        else items.map(_.score).sum / items.size
      }

      def flatMapValues(items: List[Data]): List[Char] = {
        items.flatMap(_.value.toList)
      }
    }
must_include_files:
  # Q1+Q2: Data.scala defines the case class whose fields DataProcessor accesses
  - Data.scala
must_include_content_from:
