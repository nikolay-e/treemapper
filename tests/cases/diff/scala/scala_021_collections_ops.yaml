  - "object DataExporter"
  - "toJson"
  - "toCsv"
  - "toXml"
  # DataImporter.scala: creates Data objects from external data
  - "object DataImporter"
  - "fromCsv"
  # ScoreThresholds.scala: scoring constants, not referenced
  - "object ScoreThresholds"
  - "excellent"
  - "isPassingScore"
  # DataValidator.scala: validates Data, accesses same fields
  - "class DataValidator"
  - "validateBatch"
  - "out of range"
  # DataSpec.scala: tests for Data case class
  - "class DataSpec"
  - "report high scores"
must_not_include_files:
  - DataExporter.scala
  - DataImporter.scala
  - ScoreThresholds.scala
  - DataValidator.scala
  - DataSpec.scala
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
