name: scala_024_opaque_types
repo:
  initial_files:
    Types.scala: |
      object Types {
        opaque type UserId = Long
        opaque type OrderId = Long

        object UserId {
          def apply(value: Long): UserId = value
          extension (id: UserId) def value: Long = id
        }

        object OrderId {
          def apply(value: Long): OrderId = value
          extension (id: OrderId) def value: Long = id
        }
      }
    UserService.scala: |
      class UserService {}
    OrderService.scala: |
      import Types._

      class OrderService {
        def createOrder(userId: UserId, amount: Double): OrderId = {
          OrderId(System.currentTimeMillis())
        }

        def getOrderDetails(orderId: OrderId): String = {
          s"Order ${orderId.value} details"
        }

        def listOrdersForUser(userId: UserId): List[OrderId] = {
          List(OrderId(1L), OrderId(2L))
        }
      }
    InventoryService.scala: |
      import Types._

      class InventoryService {
        def checkStock(orderId: OrderId): Boolean = {
          orderId.value > 0
        }

        def reserveForOrder(orderId: OrderId, quantity: Int): String = {
          s"Reserved $quantity items for order ${orderId.value}"
        }
      }
    Repository.scala: |
      trait Repository[T] {
        def findById(id: Long): Option[T]
        def findAll(): List[T]
        def save(entity: T): Unit
        def delete(id: Long): Unit
      }

      class InMemoryRepository[T] extends Repository[T] {
        private var store: Map[Long, T] = Map.empty

        def findById(id: Long): Option[T] = store.get(id)
        def findAll(): List[T] = store.values.toList
        def save(entity: T): Unit = {}
        def delete(id: Long): Unit = { store = store.removed(id) }
      }
    TypeAliases.scala: |
      object TypeAliases {
        opaque type Email = String
        opaque type Name = String

        object Email {
          def apply(value: String): Email = value
          extension (e: Email) def value: String = e
        }

        object Name {
          def apply(value: String): Name = value
          extension (n: Name) def value: String = n
        }
      }
    UserController.scala: |
      class UserController(service: UserService) {
        def handleCreateUser(name: String): String = {
          val userId = service.createUser(name)
          s"Created user with id: $userId"
        }

        def handleGetUser(rawId: Long): String = {
          import Types._
          val userId = UserId(rawId)
          service.getUserById(userId).getOrElse("Not found")
        }
      }
  changed_files:
    UserService.scala: |
      import Types._

      class UserService {
        def getUserById(id: UserId): Option[String] = {
          Some(s"User with id ${id.value}")
        }

        def createUser(name: String): UserId = {
          UserId(System.currentTimeMillis())
        }

        def getOrderForUser(userId: UserId, orderId: OrderId): String = {
          s"Order ${orderId.value} for user ${userId.value}"
        }
      }
  commit_message: Update files
