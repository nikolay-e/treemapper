# Scenario: Printer uses Show type class with context bounds to print values.
# The Show trait and its instances for Int/String are already defined.
#
# Diff: Printer.scala adds print[A: Show], printInt, printString methods that
# call Show[A].show(value).
#
# Reviewer questions:
#   Q1: "What Show instances are available?" -> Show.scala (UNCHANGED) provides
#        implicit val intShow and stringShow.
#   Q2: "How does the context bound resolve?" -> [A: Show] desugars to implicit
#        Show[A], and Show.apply[A] summons the instance.
#
# Trap files (plausible but no dependency on Show or Printer):
#   - Eq.scala: another type class for equality comparison. Same "type class"
#     pattern but independent trait, not used by Printer.
#   - Formatter.scala: formats values to strings using pattern matching.
#     Shares "value to string" domain but no Show type class usage.

initial:
  Show.scala: |
    trait Show[A] {
      def show(a: A): String
    }

    object Show {
      def apply[A](implicit sh: Show[A]): Show[A] = sh

      implicit val intShow: Show[Int] = (a: Int) => a.toString
      implicit val stringShow: Show[String] = (a: String) => a
    }
  Printer.scala: |
    class Printer {}
  Eq.scala: |
    trait Eq[A] {
      def eqv(a: A, b: A): Boolean
    }

    object Eq {
      def apply[A](implicit ev: Eq[A]): Eq[A] = ev

      implicit val intEq: Eq[Int] = (a: Int, b: Int) => a == b
      implicit val stringEq: Eq[String] = (a: String, b: String) => a == b

      def isEqual[A: Eq](a: A, b: A): Boolean = Eq[A].eqv(a, b)
    }
  Formatter.scala: |
    class Formatter {
      def formatInt(value: Int): String = s"Integer: $value"
      def formatString(value: String): String = s"String: '$value'"
      def formatDouble(value: Double): String = f"Double: $value%.2f"
      def formatBoolean(value: Boolean): String = if (value) "yes" else "no"
    }

changed:
  Show.scala: |
    trait Show[A] {
      def show(a: A): String
    }

    object Show {
      def apply[A](implicit sh: Show[A]): Show[A] = sh

      implicit val intShow: Show[Int] = (a: Int) => a.toString
      implicit val stringShow: Show[String] = (a: String) => a
    }
  Printer.scala: |
    class Printer {
      def print[A: Show](value: A): String = {
        Show[A].show(value)
      }

      def printInt(value: Int): String = {
        print(value)
      }

      def printString(value: String): String = {
        print(value)
      }
    }
  Eq.scala: |
    trait Eq[A] {
      def eqv(a: A, b: A): Boolean
    }

    object Eq {
      def apply[A](implicit ev: Eq[A]): Eq[A] = ev

      implicit val intEq: Eq[Int] = (a: Int, b: Int) => a == b
      implicit val stringEq: Eq[String] = (a: String, b: String) => a == b

      def isEqual[A: Eq](a: A, b: A): Boolean = Eq[A].eqv(a, b)
    }
  Formatter.scala: |
    class Formatter {
      def formatInt(value: Int): String = s"Integer: $value"
      def formatString(value: String): String = s"String: '$value'"
      def formatDouble(value: Double): String = f"Double: $value%.2f"
      def formatBoolean(value: Boolean): String = if (value) "yes" else "no"
    }

must_include_files:
  # Changed: uses Show type class with context bounds
  - Printer.scala
  # Unchanged but essential: defines Show trait and instances
  - Show.scala
must_include_content_from:
  Printer.scala:
    - "def print[A: Show](value: A): String = {"
    - "Show[A].show(value)"
  Show.scala:
    - "trait Show[A] {"
must_not_include:
  # Eq.scala: another type class, same pattern but not used by Printer
  - "trait Eq[A]"
  - eqv
  - isEqual
  # Formatter.scala: value-to-string but no type class usage
  - "class Formatter"
  - formatDouble
  - formatBoolean
must_not_include_files:
  - Eq.scala
  - Formatter.scala
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
