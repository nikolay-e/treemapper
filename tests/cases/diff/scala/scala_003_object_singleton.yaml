# Scenario: ApiClient gains methods that reference AppConfig singleton — fetch()
# uses getFullUrl and timeout, retry() uses maxRetries, fetchWithRetry combines both.
#
# Diff: src/client/ApiClient.scala adds import config.AppConfig and three new
# methods that call AppConfig.getFullUrl, AppConfig.timeout, AppConfig.maxRetries.
#
# Reviewer questions:
#   Q1: "What config values are used?"
#       -> src/config/AppConfig.scala (UNCHANGED) shows timeout=30, maxRetries=3,
#          baseUrl, getFullUrl(). Reviewer verifies the values are reasonable.
#   Q2: "Is retry logic correct?"
#       -> ApiClient.retry loops up to maxRetries with try/catch, re-throwing
#          the last error. Reviewer needs AppConfig.maxRetries value to assess.
#
# Not needed:
#   - src/config/DatabaseConfig.scala: another config singleton with connection
#     pool settings. Same "config" package, same singleton object pattern.
#     HARDEST TRAP: structurally identical config in same package.
#   - src/config/CacheConfig.scala: yet another config singleton. Same pattern.
#   - src/client/WebSocketClient.scala: another client class in same package.
#     Same "client" package but uses its own connection parameters.
#   - src/client/HttpClient.scala: third client that ALSO imports AppConfig.
#     DIRECT edge: uses AppConfig.getFullUrl, same as the diff. Sibling consumer.
#   - src/middleware/RetryMiddleware.scala: retry middleware with same retry
#     loop pattern. Uses AppConfig.maxRetries — exact same config value.

