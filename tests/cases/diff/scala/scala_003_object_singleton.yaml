name: scala_003_object_singleton
repo:
  initial_files:
    src/config/AppConfig.scala: |
      package config

      object AppConfig {
        val timeout: Int = 30
        val maxRetries: Int = 3
        val baseUrl: String = "https://api.example.com"
        val apiVersion: String = "v1"

        def getFullUrl(path: String): String = s"$baseUrl/$apiVersion$path"

        def getTimeoutMillis: Long = timeout * 1000L
      }
    src/client/ApiClient.scala: |
      package client

      class ApiClient {
        def healthCheck(): String = "ok"
      }
    src/config/DatabaseConfig.scala: |
      package config

      object DatabaseConfig {
        val host: String = "localhost"
        val port: Int = 5432
        val database: String = "myapp"
        val maxPoolSize: Int = 10
        val minIdle: Int = 2

        def connectionString: String =
          s"jdbc:postgresql://$host:$port/$database"

        def poolConfig: Map[String, Any] = Map(
          "maxPoolSize" -> maxPoolSize,
          "minIdle" -> minIdle
        )
      }
    src/config/CacheConfig.scala: |
      package config

      object CacheConfig {
        val ttlSeconds: Int = 300
        val maxEntries: Int = 1000
        val evictionPolicy: String = "lru"

        def isEnabled: Boolean = maxEntries > 0

        def ttlMillis: Long = ttlSeconds * 1000L
      }
    src/client/WebSocketClient.scala: |
      package client

      class WebSocketClient(url: String) {
        private var connected: Boolean = false

        def connect(): Unit = {
          println(s"Connecting to $url")
          connected = true
        }

        def disconnect(): Unit = {
          connected = false
        }

        def send(message: String): Unit = {
          if (connected) println(s"Sending: $message")
        }

        def isConnected: Boolean = connected
      }
    src/client/HttpClient.scala: |
      package client

      import config.AppConfig

      class HttpClient {
        def get(path: String): String = {
          val url = AppConfig.getFullUrl(path)
          s"GET $url (timeout: ${AppConfig.timeout}s)"
        }

        def post(path: String, body: String): String = {
          val url = AppConfig.getFullUrl(path)
          s"POST $url: $body"
        }
      }
    src/middleware/RetryMiddleware.scala: |
      package middleware

      import config.AppConfig

      class RetryMiddleware {
        def withRetry[T](action: => T): T = {
          var attempts = 0
          var lastError: Throwable = null
          while (attempts < AppConfig.maxRetries) {
            try { return action }
            catch { case e: Throwable => lastError = e; attempts += 1 }
          }
          throw lastError
        }
      }
  changed_files:
    src/client/ApiClient.scala: |
      package client

      import config.AppConfig

      class ApiClient {
        def healthCheck(): String = "ok"

        def fetch(path: String): String = {
          val url = AppConfig.getFullUrl(path)
          val timeout = AppConfig.timeout
          s"Fetching $url with timeout $timeout"
        }

        def retry[T](action: => T): T = {
          var attempts = 0
          var lastError: Throwable = null
          while (attempts < AppConfig.maxRetries) {
            try {
              return action
            } catch {
              case e: Throwable =>
                lastError = e
                attempts += 1
            }
          }
          throw lastError
        }

        def fetchWithRetry(path: String): String = {
          retry(fetch(path))
        }
      }
  commit_message: Update files
