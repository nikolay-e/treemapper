  src/client/HttpClient.scala: |
    package client

    import config.AppConfig

    class HttpClient {
      def get(path: String): String = {
        val url = AppConfig.getFullUrl(path)
        s"GET $url (timeout: ${AppConfig.timeout}s)"
      }

      def post(path: String, body: String): String = {
        val url = AppConfig.getFullUrl(path)
        s"POST $url: $body"
      }
    }
  src/middleware/RetryMiddleware.scala: |
    package middleware

    import config.AppConfig

    class RetryMiddleware {
      def withRetry[T](action: => T): T = {
        var attempts = 0
        var lastError: Throwable = null
        while (attempts < AppConfig.maxRetries) {
          try { return action }
          catch { case e: Throwable => lastError = e; attempts += 1 }
        }
        throw lastError
      }
    }

changed:
  src/client/ApiClient.scala: |
    package client

    import config.AppConfig

    class ApiClient {
      def healthCheck(): String = "ok"

      def fetch(path: String): String = {
        val url = AppConfig.getFullUrl(path)
        val timeout = AppConfig.timeout
        s"Fetching $url with timeout $timeout"
      }

      def retry[T](action: => T): T = {
        var attempts = 0
        var lastError: Throwable = null
        while (attempts < AppConfig.maxRetries) {
          try {
            return action
          } catch {
            case e: Throwable =>
              lastError = e
              attempts += 1
          }
        }
        throw lastError
      }

      def fetchWithRetry(path: String): String = {
        retry(fetch(path))
      }
    }
