# Scenario: UserSpec gains ScalaTest assertions for the User case class —
# tests isValidEmail, normalizedEmail, and name preservation.
#
# Diff: UserSpec.scala changes from empty class to full ScalaTest spec
# with AnyFlatSpec + Matchers testing User's methods.
#
# Reviewer questions:
#   Q1: "What does isValidEmail actually check?"
#       -> User.scala (UNCHANGED) shows isValidEmail checks email.contains("@")
#          && email.contains("."). Reviewer verifies the test expectations match.
#   Q2: "What does normalizedEmail do — does the test expectation match?"
#       -> User.scala shows normalizedEmail = email.toLowerCase.trim. Reviewer
#          confirms "  JOHN@Example.COM  " normalizes to "john@example.com".
#
# Not needed:
#   - UserRepository.scala: persistence layer for User objects with save/find.
#     Same domain (users), accesses user.email field. But UserSpec tests the
#     case class methods, not persistence.
#   - UserFactory.scala: factory for creating User test fixtures. Same User
#     constructor calls, same "User" domain. But factory doesn't define the
#     methods being tested.
#   - EmailService.scala: sends emails to users. Uses email addresses but
#     doesn't depend on User class — separate concern.
#   - UserValidator.scala: validates User objects including email validation.
#     HARDEST TRAP: also validates emails, also uses email.contains("@").
#     But UserSpec tests User's built-in isValidEmail, not UserValidator.
#   - OrderSpec.scala: sibling test spec using same AnyFlatSpec + Matchers.
#     Same test framework pattern, different domain.

max_enrichment: 5.9
initial:
  User.scala: |
    case class User(name: String, email: String) {
      def isValidEmail: Boolean = email.contains("@") && email.contains(".")
      def normalizedEmail: String = email.toLowerCase.trim
      def displayName: String = s"$name <$email>"
      def domain: String = email.split("@").lastOption.getOrElse("")
    }
  UserSpec.scala: |
    class UserSpec {}
  UserRepository.scala: |
    trait UserRepository {
      def save(user: User): Unit
      def findByEmail(email: String): Option[User]
      def findAll(): List[User]
      def delete(name: String): Boolean
    }

    class InMemoryUserRepository extends UserRepository {
      private var users: List[User] = Nil
      def save(user: User): Unit = { users = user :: users }
      def findByEmail(email: String): Option[User] = users.find(_.email == email)
      def findAll(): List[User] = users
      def delete(name: String): Boolean = {
        val before = users.size
        users = users.filterNot(_.name == name)
        users.size < before
      }
    }
  UserFactory.scala: |
    object UserFactory {
      def defaultUser: User = User("Test User", "test@example.com")
      def adminUser: User = User("Admin", "admin@example.com")
      def invalidUser: User = User("Invalid", "no-at-sign")
      def userWithSpaces: User = User("  Padded  ", "  CAPS@TEST.COM  ")

      def createMany(count: Int): List[User] = {
        (1 to count).map(i => User(s"User$i", s"user$i@example.com")).toList
      }
    }
  EmailService.scala: |
    class EmailService(smtpHost: String, smtpPort: Int = 587) {
      def sendWelcome(to: String, name: String): Boolean = {
        to.contains("@") && name.nonEmpty
      }

      def sendPasswordReset(to: String, token: String): Boolean = {
        to.contains("@") && token.length >= 32
      }

      def validateRecipient(email: String): Boolean = {
        email.contains("@") && email.contains(".")
      }
    }
  UserValidator.scala: |
    class UserValidator {
      def validateEmail(email: String): Either[String, String] = {
        if (!email.contains("@")) Left("Missing @ symbol")
        else if (!email.contains(".")) Left("Missing domain separator")
        else if (email.length > 254) Left("Email too long")
        else Right(email.toLowerCase.trim)
      }

      def validateName(name: String): Either[String, String] = {
        if (name.trim.isEmpty) Left("Name cannot be empty")
        else Right(name.trim)
      }
    }
  OrderSpec.scala: |
    import org.scalatest.flatspec.AnyFlatSpec
    import org.scalatest.matchers.should.Matchers

    case class Order(id: Int, total: Double)

    class OrderSpec extends AnyFlatSpec with Matchers {
      "Order" should "store total" in {
        Order(1, 99.99).total should be(99.99)
      }

      it should "have positive id" in {
        Order(1, 50.0).id should be > 0
      }
    }
changed:
  UserSpec.scala: |
    import org.scalatest.flatspec.AnyFlatSpec
    import org.scalatest.matchers.should.Matchers

    class UserSpec extends AnyFlatSpec with Matchers {
      "User" should "have valid email" in {
        val user = User("John", "john@example.com")
        user.isValidEmail should be(true)
      }

      it should "reject invalid email" in {
        val user = User("John", "invalid-email")
        user.isValidEmail should be(false)
      }

      it should "normalize email" in {
        val user = User("John", "  JOHN@Example.COM  ")
        user.normalizedEmail should equal("john@example.com")
      }

      "User creation" should "preserve name" in {
        val user = User("Jane Doe", "jane@test.com")
        user.name should be("Jane Doe")
      }
    }
must_include_files:
  # Q1+Q2: User.scala defines the methods being tested
  - User.scala
must_include_content_from:
  User.scala:
    - "def isValidEmail: Boolean"
    - "def normalizedEmail: String = email.toLowerCase.trim"
    - 'email.contains("@") && email.contains(".")'
must_not_include:
  # UserRepository.scala: persistence layer, tests target case class methods
  - InMemoryUserRepository
  - findByEmail
  - "def save(user: User)"
  # UserFactory.scala: test fixtures, doesn't define the methods being tested
  - "object UserFactory"
  - defaultUser
  - "createMany"
  # EmailService.scala: email sending, separate concern
  - "class EmailService"
  - sendWelcome
  - sendPasswordReset
  # UserValidator.scala: ALSO validates emails with contains("@") !
  - "class UserValidator"
  - "Missing @ symbol"
  - "Missing domain separator"
  # OrderSpec.scala: sibling test spec, same framework
  - "class OrderSpec"
  - "store total"
must_not_include_files:
  - UserRepository.scala
  - UserFactory.scala
  - EmailService.scala
  - UserValidator.scala
  - OrderSpec.scala
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
