name: scala_018_cats_effect
repo:
  initial_files:
    Database.scala: |
      import cats.effect.IO

      object Database {
        def connect(): IO[Unit] = IO(println("Connected"))
        def disconnect(): IO[Unit] = IO(println("Disconnected"))
        def query(sql: String): IO[List[String]] = IO(List("result1", "result2"))
      }
    Program.scala: |
      object Program {}
    Cache.scala: |
      import cats.effect.{IO, Ref}

      class Cache(ref: Ref[IO, Map[String, String]]) {
        def get(key: String): IO[Option[String]] =
          ref.get.map(_.get(key))

        def put(key: String, value: String): IO[Unit] =
          ref.update(_ + (key -> value))

        def remove(key: String): IO[Unit] =
          ref.update(_ - key)

        def size: IO[Int] =
          ref.get.map(_.size)
      }

      object Cache {
        def empty: IO[Cache] =
          Ref.of[IO, Map[String, String]](Map.empty).map(new Cache(_))
      }
    Migrations.scala: |
      import cats.effect.IO

      object Migrations {
        def runAll(): IO[Unit] = for {
          _ <- IO(println("Running migration 1: create users table"))
          _ <- IO(println("Running migration 2: create orders table"))
          _ <- IO(println("Running migration 3: add indexes"))
        } yield ()

        def rollback(version: Int): IO[Unit] =
          IO(println(s"Rolling back to version $version"))
      }
  changed_files:
    Database.scala: |
      import cats.effect.IO

      object Database {
        def connect(): IO[Unit] = IO(println("Connected"))
        def disconnect(): IO[Unit] = IO(println("Disconnected"))
        def query(sql: String): IO[List[String]] = IO(List("result1", "result2"))
      }
    Program.scala: |
      import cats.effect.{IO, IOApp, ExitCode}
      import cats.syntax.all._

      object Program extends IOApp {
        def program: IO[Unit] = for {
          _ <- Database.connect()
          results <- Database.query("SELECT * FROM users")
          _ <- IO(results.foreach(println))
          _ <- Database.disconnect()
        } yield ()

        def run(args: List[String]): IO[ExitCode] = {
          program.as(ExitCode.Success)
        }
      }
    Cache.scala: |
      import cats.effect.{IO, Ref}

      class Cache(ref: Ref[IO, Map[String, String]]) {
        def get(key: String): IO[Option[String]] =
          ref.get.map(_.get(key))

        def put(key: String, value: String): IO[Unit] =
          ref.update(_ + (key -> value))

        def remove(key: String): IO[Unit] =
          ref.update(_ - key)

        def size: IO[Int] =
          ref.get.map(_.size)
      }

      object Cache {
        def empty: IO[Cache] =
          Ref.of[IO, Map[String, String]](Map.empty).map(new Cache(_))
      }
    Migrations.scala: |
      import cats.effect.IO

      object Migrations {
        def runAll(): IO[Unit] = for {
          _ <- IO(println("Running migration 1: create users table"))
          _ <- IO(println("Running migration 2: create orders table"))
          _ <- IO(println("Running migration 3: add indexes"))
        } yield ()

        def rollback(version: Int): IO[Unit] =
          IO(println(s"Rolling back to version $version"))
      }
  commit_message: Update files
