# Scenario: Program implements IOApp with a for-comprehension that chains
# Database IO operations (connect, query, disconnect).
#
# Diff: Program.scala adds cats-effect imports, extends IOApp, and chains
# Database methods in a for-comprehension.
#
# Reviewer questions:
#   Q1: "What IO operations does Database provide?" -> Database.scala (UNCHANGED)
#        shows connect, disconnect, query all returning IO[...].
#   Q2: "How is the program structured?" -> IOApp.run with for-comprehension
#        composing IO actions, returning ExitCode.Success.
#
# Trap files (plausible but no dependency on Database or Program):
#   - Cache.scala: cats-effect based caching with Ref[IO, Map]. Same "cats-effect"
#     domain and IO monad usage but independent of Database.
#   - Migrations.scala: runs database migrations using IO. Shares "database + IO"
#     vocabulary but separate execution, not composed with Program.

initial:
  Database.scala: |
    import cats.effect.IO

    object Database {
      def connect(): IO[Unit] = IO(println("Connected"))
      def disconnect(): IO[Unit] = IO(println("Disconnected"))
      def query(sql: String): IO[List[String]] = IO(List("result1", "result2"))
    }
  Program.scala: |
    object Program {}
  Cache.scala: |
    import cats.effect.{IO, Ref}

    class Cache(ref: Ref[IO, Map[String, String]]) {
      def get(key: String): IO[Option[String]] =
        ref.get.map(_.get(key))

      def put(key: String, value: String): IO[Unit] =
        ref.update(_ + (key -> value))

      def remove(key: String): IO[Unit] =
        ref.update(_ - key)

      def size: IO[Int] =
        ref.get.map(_.size)
    }

    object Cache {
      def empty: IO[Cache] =
        Ref.of[IO, Map[String, String]](Map.empty).map(new Cache(_))
    }
  Migrations.scala: |
    import cats.effect.IO

    object Migrations {
      def runAll(): IO[Unit] = for {
        _ <- IO(println("Running migration 1: create users table"))
        _ <- IO(println("Running migration 2: create orders table"))
        _ <- IO(println("Running migration 3: add indexes"))
      } yield ()

      def rollback(version: Int): IO[Unit] =
        IO(println(s"Rolling back to version $version"))
    }

changed:
  Database.scala: |
    import cats.effect.IO

    object Database {
      def connect(): IO[Unit] = IO(println("Connected"))
      def disconnect(): IO[Unit] = IO(println("Disconnected"))
      def query(sql: String): IO[List[String]] = IO(List("result1", "result2"))
    }
  Program.scala: |
    import cats.effect.{IO, IOApp, ExitCode}
    import cats.syntax.all._

    object Program extends IOApp {
      def program: IO[Unit] = for {
        _ <- Database.connect()
        results <- Database.query("SELECT * FROM users")
        _ <- IO(results.foreach(println))
        _ <- Database.disconnect()
      } yield ()

      def run(args: List[String]): IO[ExitCode] = {
        program.as(ExitCode.Success)
      }
    }
  Cache.scala: |
    import cats.effect.{IO, Ref}

    class Cache(ref: Ref[IO, Map[String, String]]) {
      def get(key: String): IO[Option[String]] =
        ref.get.map(_.get(key))

      def put(key: String, value: String): IO[Unit] =
        ref.update(_ + (key -> value))

      def remove(key: String): IO[Unit] =
        ref.update(_ - key)

      def size: IO[Int] =
        ref.get.map(_.size)
    }

    object Cache {
      def empty: IO[Cache] =
        Ref.of[IO, Map[String, String]](Map.empty).map(new Cache(_))
    }
  Migrations.scala: |
    import cats.effect.IO

    object Migrations {
      def runAll(): IO[Unit] = for {
        _ <- IO(println("Running migration 1: create users table"))
        _ <- IO(println("Running migration 2: create orders table"))
        _ <- IO(println("Running migration 3: add indexes"))
      } yield ()

      def rollback(version: Int): IO[Unit] =
        IO(println(s"Rolling back to version $version"))
    }

must_include_files:
  # Changed: implements IOApp with Database IO composition
  - Program.scala
  # Unchanged but essential: defines IO-returning database operations
  - Database.scala
must_include_content_from:
  Program.scala:
    - "import cats.effect.{IO, IOApp, ExitCode}"
    - "_ <- Database.connect()"
    - "results <- Database.query"
  Database.scala:
    - "def connect(): IO[Unit]"
    - "def query(sql: String): IO[List[String]]"
must_not_include:
  # Cache.scala: cats-effect Ref-based cache, no Database dependency
  - "class Cache"
  - "Ref.of[IO"
  - "ref.update"
  # Migrations.scala: IO-based migrations but independent of Program
  - Migrations
  - runAll
  - rollback
must_not_include_files:
  - Cache.scala
  - Migrations.scala
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
