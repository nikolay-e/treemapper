# Test: Evaluator gains pattern-matching methods for the Expression ADT
#
# Scenario: Evaluator.scala is updated from an empty class to one with
# evaluate and simplify methods that pattern-match on the sealed trait
# Expression and its case class variants. Expression.scala is unchanged.
#
# Reviewer questions:
#   Q1: "What are all the possible Expression variants?"
#       -> Expression.scala (UNCHANGED) defines: Number(Double), Add(left, right),
#          Multiply(left, right), Variable(name). Reviewer verifies the pattern
#          match in evaluate/simplify is exhaustive.
#   Q2: "Does simplify handle all Add/Multiply identity cases correctly?"
#       -> Expression.scala shows the ADT structure. Reviewer checks that
#          Add(Number(0), x) -> x and Multiply(Number(0), _) -> Number(0)
#          align with mathematical identities.
#
# Not needed:
#   - PrettyPrinter.scala: converts Expression trees to formatted strings.
#     Same ADT domain but doesn't import Evaluator — separate utility.
#   - Parser.scala: parses string input into Expression trees. Produces
#     Expression objects but is independent of Evaluator — no import edge.

max_enrichment: 5.4
initial:
  Expression.scala: |
    sealed trait Expression
    case class Number(value: Double) extends Expression
    case class Add(left: Expression, right: Expression) extends Expression
    case class Multiply(left: Expression, right: Expression) extends Expression
    case class Variable(name: String) extends Expression
  Evaluator.scala: |
    class Evaluator {}
  # --- Not needed: formatting utility for Expression, no import from Evaluator ---
  PrettyPrinter.scala: |
    object PrettyPrinter {
      def format(expr: Expression, indent: Int = 0): String = {
        val prefix = "  " * indent
        expr match {
          case Number(v) => s"${prefix}Number($v)"
          case Variable(n) => s"${prefix}Variable($n)"
          case Add(l, r) =>
            s"${prefix}Add(\n${format(l, indent + 1)},\n${format(r, indent + 1)}\n${prefix})"
          case Multiply(l, r) =>
            s"${prefix}Multiply(\n${format(l, indent + 1)},\n${format(r, indent + 1)}\n${prefix})"
        }
      }
    }
  # --- Not needed: parser for expressions, independent of Evaluator ---
  Parser.scala: |
    object Parser {
      def parse(input: String): Expression = {
        val trimmed = input.trim
        if (trimmed.forall(c => c.isDigit || c == '.')) {
          Number(trimmed.toDouble)
        } else if (trimmed.forall(_.isLetter)) {
          Variable(trimmed)
        } else {
          Number(0)
        }
      }
    }
changed:
  Expression.scala: |
    sealed trait Expression
    case class Number(value: Double) extends Expression
    case class Add(left: Expression, right: Expression) extends Expression
    case class Multiply(left: Expression, right: Expression) extends Expression
    case class Variable(name: String) extends Expression
  Evaluator.scala: |
    class Evaluator {
      def evaluate(expr: Expression, vars: Map[String, Double] = Map.empty): Double = expr match {
        case Number(value) => value
        case Add(left, right) => evaluate(left, vars) + evaluate(right, vars)
        case Multiply(left, right) => evaluate(left, vars) * evaluate(right, vars)
        case Variable(name) => vars.getOrElse(name, 0.0)
      }

      def simplify(expr: Expression): Expression = expr match {
        case Add(Number(0), right) => simplify(right)
        case Add(left, Number(0)) => simplify(left)
        case Multiply(Number(1), right) => simplify(right)
        case Multiply(left, Number(1)) => simplify(left)
        case Multiply(Number(0), _) => Number(0)
        case Multiply(_, Number(0)) => Number(0)
        case Add(left, right) => Add(simplify(left), simplify(right))
        case Multiply(left, right) => Multiply(simplify(left), simplify(right))
        case other => other
      }
    }
  PrettyPrinter.scala: |
    object PrettyPrinter {
      def format(expr: Expression, indent: Int = 0): String = {
        val prefix = "  " * indent
        expr match {
          case Number(v) => s"${prefix}Number($v)"
          case Variable(n) => s"${prefix}Variable($n)"
          case Add(l, r) =>
            s"${prefix}Add(\n${format(l, indent + 1)},\n${format(r, indent + 1)}\n${prefix})"
          case Multiply(l, r) =>
            s"${prefix}Multiply(\n${format(l, indent + 1)},\n${format(r, indent + 1)}\n${prefix})"
        }
      }
    }
  Parser.scala: |
    object Parser {
      def parse(input: String): Expression = {
        val trimmed = input.trim
        if (trimmed.forall(c => c.isDigit || c == '.')) {
          Number(trimmed.toDouble)
        } else if (trimmed.forall(_.isLetter)) {
          Variable(trimmed)
        } else {
          Number(0)
        }
      }
    }
must_include_files:
  # Q1: Expression.scala defines the sealed trait ADT that Evaluator pattern-matches on
  - Expression.scala
must_include_content_from:
  Expression.scala:
    - "sealed trait Expression"
    - "case class Number"
    - "case class Add"
    - "case class Multiply"
    - "case class Variable"
must_not_include:
  # PrettyPrinter.scala: formatting utility, no import from Evaluator
  - PrettyPrinter
  - "def format"
  - "prefix"
  # Parser.scala: string-to-Expression parser, independent of Evaluator
  - Parser
  - "def parse"
  - "trimmed"
must_not_include_files:
  - PrettyPrinter.scala
  - Parser.scala
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
