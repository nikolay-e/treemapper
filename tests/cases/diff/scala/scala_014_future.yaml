    - "def compute(input: Int): Int"
    - "def computeString(input: String): String"
    - "input * 2"
must_not_include:
  # BatchJob.scala: uses Future.sequence + Future { } — same patterns
  - "class BatchJob"
  - runSequential
  - "processed $item"
  # StreamProcessor.scala: same for-comprehension + Future pattern
  - "class StreamProcessor"
  - "processStream"
  - "transformAndCombine"
  # TaskQueue.scala: task scheduling, no Future usage
  - "class TaskQueue"
  - enqueue
  - executeAll
  # ComputationCache.scala: calls ExpensiveComputation.compute() directly
  - "class ComputationCache"
  - "getOrCompute"
  - "invalidate"
  # AsyncSpec.scala: tests for AsyncProcessor
  - "class AsyncSpec"
  - "Await.result"
must_not_include_files:
  - BatchJob.scala
  - StreamProcessor.scala
  - TaskQueue.scala
  - ComputationCache.scala
  - AsyncSpec.scala
max_fragments: 5
max_files: 3
add_garbage_files: false
