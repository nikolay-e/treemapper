# Scenario: AsyncProcessor wraps ExpensiveComputation calls in Future for
# concurrent execution, with sequence and for-comprehension composition.
#
# Diff: AsyncProcessor.scala adds processAsync, processMany, processCombined
# using Future { ... }, Future.sequence, and for-comprehension.
#
# Reviewer questions:
#   Q1: "What computations are being wrapped?"
#       -> ExpensiveComputation.scala (UNCHANGED) provides compute(Int) and
#          computeString(String). Reviewer verifies the calls are valid.
#   Q2: "Is processCombined's for-comprehension sequential or parallel?"
#       -> The for-comprehension awaits resultA before starting resultB,
#          making it sequential. Reviewer needs ExpensiveComputation to know
#          whether this matters (both have Thread.sleep).
#
# Not needed:
#   - BatchJob.scala: runs batch operations asynchronously using Future.
#     HARDEST TRAP: uses Future.sequence, Future { ... }, same imports,
#     same async patterns. But processes its own data, not ExpensiveComputation.
#   - StreamProcessor.scala: another async processor using Future composition.
#     Same for-comprehension pattern, same imports.
#   - TaskQueue.scala: queues tasks for sequential execution. Same "async
#     processing" domain but uses a queue, not Future composition.
#   - ComputationCache.scala: caches results of ExpensiveComputation.compute().
#     DIRECT edge: calls the exact same ExpensiveComputation methods.
#     But caching logic doesn't help review AsyncProcessor's Future wrapping.
#   - AsyncSpec.scala: tests for AsyncProcessor with Await.result.
#     Exercises the same async methods.

max_enrichment: 8.4
initial:
  ExpensiveComputation.scala: |
    object ExpensiveComputation {
      def compute(input: Int): Int = {
        Thread.sleep(100)
        input * 2
      }

      def computeString(input: String): String = {
        Thread.sleep(100)
        input.toUpperCase
      }

      def computeBatch(inputs: List[Int]): List[Int] = {
        inputs.map(compute)
      }
    }
  AsyncProcessor.scala: |
    class AsyncProcessor {}
  BatchJob.scala: |
    import scala.concurrent.{Future, ExecutionContext}
    import scala.concurrent.ExecutionContext.Implicits.global

    class BatchJob(name: String) {
      def run(items: List[String]): Future[List[String]] = {
        Future.sequence(items.map(item => Future {
          Thread.sleep(50)
          s"$name: processed $item"
        }))
      }

      def runSequential(items: List[String]): Future[List[String]] = {
        items.foldLeft(Future.successful(List.empty[String])) { (acc, item) =>
          acc.flatMap(results => Future {
            Thread.sleep(50)
            results :+ s"$name: processed $item"
          })
        }
      }
    }
  StreamProcessor.scala: |
    import scala.concurrent.{Future, ExecutionContext}
    import scala.concurrent.ExecutionContext.Implicits.global

    class StreamProcessor {
      def processStream(data: List[String]): Future[List[Int]] = {
        Future.sequence(data.map(s => Future { s.length }))
      }

      def transformAndCombine(a: String, b: String): Future[String] = {
        for {
          upper <- Future(a.toUpperCase)
          lower <- Future(b.toLowerCase)
        } yield s"$upper-$lower"
      }
    }
  TaskQueue.scala: |
    class TaskQueue {
      private var tasks: List[() => Unit] = List.empty

      def enqueue(task: () => Unit): Unit = {
        tasks = tasks :+ task
      }

      def executeAll(): Unit = {
        tasks.foreach(task => task())
        tasks = List.empty
      }

      def pendingCount: Int = tasks.length
    }
  ComputationCache.scala: |
    class ComputationCache {
      private var cache: Map[Int, Int] = Map.empty

      def getOrCompute(input: Int): Int = {
        cache.getOrElse(input, {
          val result = ExpensiveComputation.compute(input)
          cache = cache + (input -> result)
          result
        })
      }

      def invalidate(input: Int): Unit = {
        cache = cache - input
      }

      def cacheSize: Int = cache.size
    }
  AsyncSpec.scala: |
    import scala.concurrent.Await
    import scala.concurrent.duration._

    class AsyncSpec {
      def testProcessAsync(): Unit = {
        val processor = new AsyncProcessor
        val result = Await.result(processor.processAsync(21), 5.seconds)
        assert(result == 42)
      }
    }

changed:
  AsyncProcessor.scala: |
    import scala.concurrent.{Future, ExecutionContext}
    import scala.concurrent.ExecutionContext.Implicits.global

    class AsyncProcessor {
      def processAsync(input: Int): Future[Int] = Future {
        ExpensiveComputation.compute(input)
      }

      def processMany(inputs: List[Int]): Future[List[Int]] = {
        Future.sequence(inputs.map(i => Future(ExpensiveComputation.compute(i))))
      }

      def processCombined(a: Int, b: String): Future[(Int, String)] = {
        for {
          resultA <- Future(ExpensiveComputation.compute(a))
          resultB <- Future(ExpensiveComputation.computeString(b))
        } yield (resultA, resultB)
      }
    }
