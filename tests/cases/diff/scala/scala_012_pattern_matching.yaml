# Scenario: UserValidator uses pattern matching on User case class to validate
# fields with guards and extract optional email.
#
# Diff: UserValidator.scala adds validate() and extractEmail() methods using
# exhaustive pattern matching on User(name, age, email).
#
# Reviewer questions:
#   Q1: "What is the User structure?" -> User.scala (UNCHANGED) shows
#        case class User(name: String, age: Int, email: Option[String]).
#   Q2: "Are all patterns exhaustive?" -> validate has a catch-all _,
#        extractEmail covers Some and None.
#
# Trap files (plausible but no dependency on User or UserValidator):
#   - EmailParser.scala: parses email addresses into parts. Shares "email" and
#     pattern matching usage but operates on raw strings.
#   - AgePolicy.scala: enforces age restrictions. Shares "age" domain with
#     User.age validation but has no User type dependency.

max_enrichment: 3.7
initial:
  User.scala: |
    case class User(name: String, age: Int, email: Option[String])
  UserValidator.scala: |
    class UserValidator {}
  EmailParser.scala: |
    class EmailParser {
      def parse(email: String): Option[(String, String)] = email.split("@") match {
        case Array(local, domain) if local.nonEmpty && domain.contains(".") =>
          Some((local, domain))
        case _ => None
      }

      def extractDomain(email: String): Option[String] = parse(email).map(_._2)

      def isValidFormat(email: String): Boolean = parse(email).isDefined
    }
  AgePolicy.scala: |
    class AgePolicy(minAge: Int, maxAge: Int) {
      def isAllowed(age: Int): Boolean = age >= minAge && age <= maxAge

      def category(age: Int): String = age match {
        case a if a < 13 => "child"
        case a if a < 18 => "teenager"
        case a if a < 65 => "adult"
        case _           => "senior"
      }

      def requiresConsent(age: Int): Boolean = age < minAge
    }

changed:
  User.scala: |
    case class User(name: String, age: Int, email: Option[String])
  UserValidator.scala: |
    class UserValidator {
      def validate(user: User): String = user match {
        case User(name, _, _) if name.isEmpty =>
          "Name cannot be empty"
        case User(_, age, _) if age < 0 =>
          "Age cannot be negative"
        case User(name, age, Some(email)) if email.contains("@") =>
          s"Valid user: $name, $age, $email"
        case User(name, age, None) =>
          s"Valid user without email: $name, $age"
        case _ =>
          "Invalid user"
      }

      def extractEmail(user: User): String = user match {
        case User(_, _, Some(email)) => email
        case User(name, _, None) => s"$name@default.com"
      }
    }
  EmailParser.scala: |
    class EmailParser {
      def parse(email: String): Option[(String, String)] = email.split("@") match {
        case Array(local, domain) if local.nonEmpty && domain.contains(".") =>
          Some((local, domain))
        case _ => None
      }

      def extractDomain(email: String): Option[String] = parse(email).map(_._2)

      def isValidFormat(email: String): Boolean = parse(email).isDefined
    }
  AgePolicy.scala: |
    class AgePolicy(minAge: Int, maxAge: Int) {
      def isAllowed(age: Int): Boolean = age >= minAge && age <= maxAge

      def category(age: Int): String = age match {
        case a if a < 13 => "child"
        case a if a < 18 => "teenager"
        case a if a < 65 => "adult"
        case _           => "senior"
      }

      def requiresConsent(age: Int): Boolean = age < minAge
    }

must_include_files:
  # Changed: adds pattern matching on User case class
  - UserValidator.scala
  # Unchanged but essential: defines User case class structure
  - User.scala
must_include_content_from:
  UserValidator.scala:
    - "def validate(user: User): String = user match {"
    - "def extractEmail(user: User): String = user match {"
  User.scala:
    - "case class User(name: String, age: Int, email: Option[String])"
must_not_include:
  # EmailParser.scala: email string parsing, no User dependency
  - EmailParser
  - extractDomain
  - isValidFormat
  # AgePolicy.scala: age-based rules but no User type
  - AgePolicy
  - category
  - requiresConsent
must_not_include_files:
  - EmailParser.scala
  - AgePolicy.scala
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
