  - "class Orders"
  - "OrderTables"
  - "user_id"
  # ProductTable.scala: another Slick table, same pattern
  - "class Products"
  - "ProductTables"
  # UserValidator.scala: validates User but no Slick/DB dependency
  - "class UserValidator"
  - validateName
  - validateAge
  # UserService.scala: consumer of UserRepository
  - "class UserService"
  - "getAdults"
  - "countSeniors"
  # MigrationV1.scala: SQL DDL for same table, but not Slick queries
  - "object MigrationV1"
  - "CREATE TABLE users"
  - "CREATE INDEX"
must_not_include_files:
  - OrderTable.scala
  - ProductTable.scala
  - UserValidator.scala
  - UserService.scala
  - MigrationV1.scala
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
