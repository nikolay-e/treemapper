name: scala_017_slick_query
repo:
  initial_files:
    Tables.scala: |
      import slick.jdbc.PostgresProfile.api._

      case class User(id: Long, name: String, age: Int, active: Boolean)

      class Users(tag: Tag) extends Table[User](tag, "users") {
        def id = column[Long]("id", O.PrimaryKey, O.AutoInc)
        def name = column[String]("name")
        def age = column[Int]("age")
        def active = column[Boolean]("active")
        def * = (id, name, age, active).mapTo[User]
      }

      object Tables {
        val users = TableQuery[Users]
      }
    UserRepository.scala: |
      class UserRepository {}
    OrderTable.scala: |
      import slick.jdbc.PostgresProfile.api._

      case class Order(id: Long, userId: Long, total: Double, status: String)

      class Orders(tag: Tag) extends Table[Order](tag, "orders") {
        def id = column[Long]("id", O.PrimaryKey, O.AutoInc)
        def userId = column[Long]("user_id")
        def total = column[Double]("total")
        def status = column[String]("status")
        def * = (id, userId, total, status).mapTo[Order]
      }

      object OrderTables {
        val orders = TableQuery[Orders]
      }
    ProductTable.scala: |
      import slick.jdbc.PostgresProfile.api._

      case class Product(id: Long, name: String, price: Double, category: String)

      class Products(tag: Tag) extends Table[Product](tag, "products") {
        def id = column[Long]("id", O.PrimaryKey, O.AutoInc)
        def name = column[String]("name")
        def price = column[Double]("price")
        def category = column[String]("category")
        def * = (id, name, price, category).mapTo[Product]
      }

      object ProductTables {
        val products = TableQuery[Products]
      }
    UserValidator.scala: |
      class UserValidator {
        def isValid(user: User): Boolean =
          user.name.nonEmpty && user.age >= 0

        def validateName(name: String): Either[String, String] =
          if (name.trim.isEmpty) Left("Name cannot be empty")
          else Right(name.trim)

        def validateAge(age: Int): Either[String, Int] =
          if (age < 0 || age > 150) Left("Invalid age")
          else Right(age)
      }
    UserService.scala: |
      import scala.concurrent.Future

      class UserService(repo: UserRepository) {
        def getAdults(): Future[Seq[User]] = repo.findAdults()

        def getActiveUsers(): Future[Seq[User]] = repo.findActive()

        def searchByName(name: String): Future[Option[User]] =
          repo.findByName(name)

        def countSeniors(): Future[Int] = repo.countByAge(65)
      }
    MigrationV1.scala: |
      object MigrationV1 {
        val createUsersTable: String = """
          CREATE TABLE users (
            id BIGSERIAL PRIMARY KEY,
            name VARCHAR(255) NOT NULL,
            age INTEGER NOT NULL DEFAULT 0,
            active BOOLEAN NOT NULL DEFAULT true
          )
        """

        val createIndex: String = """
          CREATE INDEX idx_users_name ON users(name)
        """
      }
  changed_files:
    UserRepository.scala: |
      import slick.jdbc.PostgresProfile.api._
      import scala.concurrent.Future

      class UserRepository(db: Database) {
        import Tables._

        def findAdults(): Future[Seq[User]] = {
          db.run(users.filter(_.age >= 18).result)
        }

        def findActive(): Future[Seq[User]] = {
          db.run(users.filter(_.active === true).result)
        }

        def findByName(name: String): Future[Option[User]] = {
          db.run(users.filter(_.name === name).result.headOption)
        }

        def countByAge(minAge: Int): Future[Int] = {
          db.run(users.filter(_.age >= minAge).length.result)
        }
      }
  commit_message: Update files
