        s"[${profile.displayName}]"
      }
    }

must_include_files:
  # Changed: imports implicit conversions and uses them
  - src/services/UserProcessor.scala
  # Unchanged but essential: defines the implicit conversions used
  - src/conversions/Implicits.scala
must_include_content_from:
  src/services/UserProcessor.scala:
    - "import conversions.{User, Implicits}"
    - "import Implicits._"
  src/conversions/Implicits.scala:
    - "implicit def stringToUser"
    - "implicit def userToProfile"
must_not_include:
  # JsonCodec.scala: implicit encoders/decoders, not type conversions
  - JsonEncoder
  - JsonDecoder
  - toJson
  # ProfileRenderer.scala: renders UserProfile but no implicit conversion usage
  - ProfileRenderer
  - renderBadge
must_not_include_files:
  - src/conversions/JsonCodec.scala
  - src/services/ProfileRenderer.scala
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
