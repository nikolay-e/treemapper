# Scenario: EventHandler uses PartialFunction to create composable handlers for
# a sealed Event trait, combining userHandler and orderHandler with orElse.
#
# Diff: EventHandler.scala adds PartialFunction-based handlers and a combined
# handler using orElse, plus a handle() method using lift.
#
# Reviewer questions:
#   Q1: "What Event subtypes exist?" -> Event.scala (UNCHANGED) defines
#        UserCreated, UserDeleted, OrderPlaced.
#   Q2: "What happens for unhandled events?" -> combinedHandler.lift returns None.
#
# Trap files (plausible but no dependency on Event or EventHandler):
#   - EventLogger.scala: logs events as strings. Shares "Event" vocabulary and
#     uses pattern matching on events, but is a separate consumer.
#   - OrderProcessor.scala: processes OrderPlaced events downstream. Same domain
#     but no PartialFunction composition, processes single events.

initial:
  Event.scala: |
    sealed trait Event
    case class UserCreated(name: String) extends Event
    case class UserDeleted(id: String) extends Event
    case class OrderPlaced(orderId: String, amount: Double) extends Event
  EventHandler.scala: |
    class EventHandler {}
  EventLogger.scala: |
    class EventLogger {
      def logEvent(event: Event): String = event match {
        case UserCreated(name) => s"[LOG] User created: $name"
        case UserDeleted(id) => s"[LOG] User deleted: $id"
        case OrderPlaced(id, amount) => s"[LOG] Order placed: $id for $amount"
      }

      def logBatch(events: List[Event]): List[String] =
        events.map(logEvent)
    }
  OrderProcessor.scala: |
    class OrderProcessor {
      private var processedOrders: List[String] = List.empty

      def process(event: Event): Option[String] = event match {
        case OrderPlaced(orderId, amount) =>
          processedOrders = orderId :: processedOrders
          Some(s"Processed order $orderId: $amount")
        case _ => None
      }

      def processedCount: Int = processedOrders.length
    }

changed:
  Event.scala: |
    sealed trait Event
    case class UserCreated(name: String) extends Event
    case class UserDeleted(id: String) extends Event
    case class OrderPlaced(orderId: String, amount: Double) extends Event
  EventHandler.scala: |
    class EventHandler {
      val userHandler: PartialFunction[Event, String] = {
        case UserCreated(name) => s"Created user: $name"
        case UserDeleted(id) => s"Deleted user: $id"
      }

      val orderHandler: PartialFunction[Event, String] = {
        case OrderPlaced(id, amount) => s"Order $id: $$$amount"
      }

      val combinedHandler: PartialFunction[Event, String] =
        userHandler orElse orderHandler

      def handle(event: Event): Option[String] = {
        combinedHandler.lift(event)
      }
    }
  EventLogger.scala: |
    class EventLogger {
      def logEvent(event: Event): String = event match {
        case UserCreated(name) => s"[LOG] User created: $name"
        case UserDeleted(id) => s"[LOG] User deleted: $id"
        case OrderPlaced(id, amount) => s"[LOG] Order placed: $id for $amount"
      }

      def logBatch(events: List[Event]): List[String] =
        events.map(logEvent)
    }
  OrderProcessor.scala: |
    class OrderProcessor {
      private var processedOrders: List[String] = List.empty

      def process(event: Event): Option[String] = event match {
        case OrderPlaced(orderId, amount) =>
          processedOrders = orderId :: processedOrders
          Some(s"Processed order $orderId: $amount")
        case _ => None
      }

      def processedCount: Int = processedOrders.length
    }

must_include_files:
  # Changed: PartialFunction-based event handling with orElse composition
  - EventHandler.scala
  # Unchanged but essential: defines Event sealed trait hierarchy
  - Event.scala
must_include_content_from:
  EventHandler.scala:
    - "val userHandler: PartialFunction[Event, String] = {"
    - "userHandler orElse orderHandler"
  Event.scala:
    - "sealed trait Event"
must_not_include:
  # EventLogger.scala: logs events but no PartialFunction composition
  - EventLogger
  - logEvent
  - logBatch
  # OrderProcessor.scala: processes events but regular match, not PartialFunction
  - OrderProcessor
  - processedCount
  - processedOrders
must_not_include_files:
  - EventLogger.scala
  - OrderProcessor.scala
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
