      def getProduct(id: Long): Action[AnyContent] = Action.async {
        Future.successful(Ok(Json.toJson(Product(id, "Widget", 9.99))))
      }

      def listProducts(): Action[AnyContent] = Action.async {
        Future.successful(Ok(Json.toJson(List(Product(1, "A", 1.0), Product(2, "B", 2.0)))))
      }
    }
  UserForm.scala: |
    import play.api.data._
    import play.api.data.Forms._

    case class UserFormData(name: String, email: String)

    object UserForm {
      val form: Form[UserFormData] = Form(
        mapping(
          "name" -> nonEmptyText(minLength = 2, maxLength = 100),
          "email" -> email
        )(UserFormData.apply)(UserFormData.unapply)
      )

      def validate(data: UserFormData): Either[String, UserFormData] = {
        if (data.name.trim.isEmpty) Left("Name required")
        else Right(data)
      }
    }

must_include_files:
  # Changed: implements Play controller endpoints
  - UserController.scala
  # Unchanged but essential: route definitions mapping URLs to actions
  - routes
must_include_content_from:
  UserController.scala:
    - "import play.api.mvc._"
    - "def getUser(id: Long): Action[AnyContent]"
  routes:
    - "controllers.UserController.getUser"
must_not_include:
  # ProductController.scala: another controller, different routes
  - ProductController
  - getProduct
  - listProducts
  - productFormat
  # UserForm.scala: form validation, no controller dependency
  - UserForm
  - UserFormData
  - nonEmptyText
must_not_include_files:
  - ProductController.scala
  - UserForm.scala
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
