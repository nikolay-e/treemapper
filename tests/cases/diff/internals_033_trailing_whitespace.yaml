  changed_files:
    app/services/cart_service.rb: |
      class CartService
        def initialize(cart)
          @cart = cart
        end

        def add_item(product, quantity)
          raise ArgumentError, "quantity must be positive" unless quantity > 0
          raise ArgumentError, "product is required" if product.nil?
          existing = @cart.items.find { |i| i.product_id == product.id }
          if existing
            existing.quantity += quantity
          else
            @cart.items << CartItem.new(product_id: product.id, quantity: quantity, price: product.price)
          end
          @cart
        end

        def remove_item(product_id)
          removed = @cart.items.count { |i| i.product_id == product_id }
          @cart.items.reject! { |i| i.product_id == product_id }
          raise ArgumentError, "item not in cart" if removed.zero?
          @cart
        end

        def total
          @cart.items.sum { |i| i.quantity * i.price }
        end

        def item_count
          @cart.items.sum(&:quantity)
        end
      end
    garbage/jobs/cleanup.rb: |
      # GARBAGE_TW33_A = "cleanup_job_unrelated"
