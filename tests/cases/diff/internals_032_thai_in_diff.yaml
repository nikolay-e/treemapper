  changed_files:
    app/validators/user_validator.rb: |
      class UserValidator
        EMAIL_PATTERN = /\A[^@\s]+@[^@\s]+\.[^@\s]+\z/
        MIN_PASSWORD_LENGTH = 8
        USERNAME_PATTERN = /\A[a-zA-Z0-9_]{3,30}\z/

        attr_reader :errors

        def initialize(params)
          @params = params
          @errors = []
        end

        def valid?
          @errors = []
          validate_email
          validate_password
          validate_username
          @errors.empty?
        end

        private

        def validate_email
          email = @params[:email]
          @errors << "email is required" if email.nil? || email.empty?
          @errors << "email format is invalid" unless EMAIL_PATTERN.match?(email.to_s)
        end

        def validate_password
          pw = @params[:password]
          @errors << "password is required" if pw.nil? || pw.empty?
          @errors << "password too short" if pw.to_s.length < MIN_PASSWORD_LENGTH
          @errors << "password must contain a digit" unless pw.to_s.match?(/\d/)
        end

        def validate_username
          username = @params[:username]
          @errors << "username is required" if username.nil? || username.empty?
          @errors << "username format is invalid" unless USERNAME_PATTERN.match?(username.to_s)
        end
      end
