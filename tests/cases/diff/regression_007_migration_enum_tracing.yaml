      from alembic import op

      def upgrade():
          op.execute(
              "ALTER TABLE snapshots DROP CONSTRAINT IF EXISTS ck_snapshot_mode"
          )
          op.execute(
              "ALTER TABLE snapshots ADD CONSTRAINT ck_snapshot_mode "
              "CHECK (mode IN ('recent', 'quarter', 'year', 'all'))"
          )

      def downgrade():
          op.execute(
              "ALTER TABLE snapshots DROP CONSTRAINT IF EXISTS ck_snapshot_mode"
          )
    src/analytics/types.py: |
      from enum import Enum

      class TrendMode(Enum):
          RECENT = "recent"
          QUARTER = "quarter"
          YEAR = "year"
          ALL = "all"

      class AlertLevel(Enum):
          LOW = "low"
          MEDIUM = "medium"
          HIGH = "high"
    src/analytics/pipeline.py: |
      from src.analytics.types import TrendMode

      class AnalyticsPipeline:
          def __init__(self, db_session):
              self.db = db_session

          def store_snapshot(self, data, mode: TrendMode):
              self.db.execute(
                  "INSERT INTO snapshots (data, mode) VALUES (:data, :mode)",
                  {"data": data, "mode": mode.value},
              )

          def get_snapshots(self, mode: TrendMode):
              return self.db.execute(
                  "SELECT * FROM snapshots WHERE mode = :mode",
                  {"mode": mode.value},
              ).fetchall()
    src/api.py: |
      from src.analytics.pipeline import AnalyticsPipeline
      from src.analytics.types import TrendMode

      def handle_snapshot_request(request):
          mode = TrendMode(request.params["mode"])
          pipeline = AnalyticsPipeline(request.db)
          return pipeline.store_snapshot(request.body, mode)
