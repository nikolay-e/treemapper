    src/storage/store.rs: |
      use std::collections::HashMap;

      #[derive(Debug)]
      pub enum StoreError {
          KeyNotFound(String),
          CapacityExceeded,
      }

      pub trait StorageBackend {
          fn set(&mut self, key: &str, value: Vec<u8>) -> Result<(), StoreError>;
          fn get(&self, key: &str) -> Result<&Vec<u8>, StoreError>;
          fn delete(&mut self, key: &str) -> Result<(), StoreError>;
      }

      pub struct KvStore {
          data: HashMap<String, Vec<u8>>,
      }

      impl KvStore {
          pub fn new() -> Self {
              Self { data: HashMap::new() }
          }
      }

      impl StorageBackend for KvStore {
          fn set(&mut self, key: &str, value: Vec<u8>) -> Result<(), StoreError> {
              self.data.insert(key.to_string(), value);
              Ok(())
          }

          fn get(&self, key: &str) -> Result<&Vec<u8>, StoreError> {
              self.data.get(key).ok_or_else(|| StoreError::KeyNotFound(key.to_string()))
          }

          fn delete(&mut self, key: &str) -> Result<(), StoreError> {
              self.data.remove(key).map(|_| ()).ok_or_else(|| StoreError::KeyNotFound(key.to_string()))
          }
      }
    src/cache/layer.rs: |
      use crate::storage::store::{StorageBackend, KvStore, StoreError};

      pub struct CacheLayer<S: StorageBackend> {
          store: S,
          max_entries: usize,
      }

      impl CacheLayer<KvStore> {
          pub fn new(max_entries: usize) -> Self {
              Self { store: KvStore::new(), max_entries }
          }
      }

      impl<S: StorageBackend> CacheLayer<S> {
          pub fn put(&mut self, key: &str, value: Vec<u8>) -> Result<(), StoreError> {
              self.store.set(key, value)
          }

          pub fn fetch(&self, key: &str) -> Result<&Vec<u8>, StoreError> {
              self.store.get(key)
          }
      }
    src/api/session.rs: |
      use crate::cache::layer::CacheLayer;
      use crate::storage::store::{KvStore, StoreError};

      pub struct SessionManager {
          cache: CacheLayer<KvStore>,
      }

      impl SessionManager {
          pub fn new() -> Self {
              Self { cache: CacheLayer::new(1000) }
          }

          pub fn store_session(&mut self, token: &str, data: Vec<u8>) -> Result<(), StoreError> {
              self.cache.put(token, data)
          }

          pub fn load_session(&self, token: &str) -> Result<&Vec<u8>, StoreError> {
              self.cache.fetch(token)
          }
      }
