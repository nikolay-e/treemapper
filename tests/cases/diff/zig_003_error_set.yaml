repo:
  initial_files:
    src/storage/store.rs: |
      use std::collections::HashMap;

      pub struct KvStore {
          data: HashMap<String, Vec<u8>>,
      }

      impl KvStore {
          pub fn new() -> Self {
              Self { data: HashMap::new() }
          }

          pub fn set(&mut self, key: &str, value: Vec<u8>) {
              self.data.insert(key.to_string(), value);
          }

          pub fn get(&self, key: &str) -> Option<&Vec<u8>> {
              self.data.get(key)
          }

          pub fn delete(&mut self, key: &str) -> bool {
              self.data.remove(key).is_some()
          }
      }
    src/cache/layer.rs: |
      use crate::storage::store::KvStore;

      pub struct CacheLayer {
          store: KvStore,
          max_entries: usize,
      }

      impl CacheLayer {
          pub fn new(max_entries: usize) -> Self {
              Self { store: KvStore::new(), max_entries }
          }

          pub fn put(&mut self, key: &str, value: Vec<u8>) {
              self.store.set(key, value);
          }

          pub fn fetch(&self, key: &str) -> Option<&Vec<u8>> {
              self.store.get(key)
          }
      }
    src/api/session.rs: |
      use crate::cache::layer::CacheLayer;

      pub struct SessionManager {
          cache: CacheLayer,
      }

      impl SessionManager {
          pub fn new() -> Self {
              Self { cache: CacheLayer::new(1000) }
          }

          pub fn store_session(&mut self, token: &str, data: Vec<u8>) {
              self.cache.put(token, data);
          }

          pub fn load_session(&self, token: &str) -> Option<&Vec<u8>> {
              self.cache.fetch(token)
          }
      }
