fragments:
- id: gradle_dependency_management_plugin
  selector:
    path: build.gradle
    anchor: "id 'io.spring.dependency-management' version '1.1.4'"
- id: gradle_jacoco_plugin
  selector:
    path: build.gradle
    anchor: "id 'jacoco'"
- id: gradle_actuator_dep
  selector:
    path: build.gradle
    anchor: spring-boot-starter-actuator
- id: gradle_test_dep
  selector:
    path: build.gradle
    anchor: spring-boot-starter-test
- id: gradle_jacoco_finalize
  selector:
    path: build.gradle
    anchor: finalizedBy jacocoTestReport
- id: health_indicator_actuate_import
  selector:
    path: src/main/java/com/example/webapp/health/HealthIndicator.java
    anchor: "import org.springframework.boot.actuate.health.Health"
- id: health_indicator_class
  selector:
    path: src/main/java/com/example/webapp/health/HealthIndicator.java
    anchor: extends AbstractHealthIndicator
- id: test_class_spring_boot_test
  selector:
    path: src/test/java/com/example/webapp/WebApplicationTest.java
    anchor: "@SpringBootTest"
- id: no_index_controller
  selector:
    path: src/main/java/com/example/webapp/controller/IndexController.java
    anchor: "Welcome to the web application"
- id: no_web_application_main
  selector:
    path: src/main/java/com/example/webapp/WebApplication.java
    anchor: SpringApplication.run
- id: no_security_config
  selector:
    path: src/main/java/com/example/webapp/config/SecurityConfig.java
    anchor: corsFilter
- id: no_notification_service
  selector:
    path: src/main/java/com/example/webapp/service/NotificationService.java
    anchor: sendEmail
oracle:
  required:
  - gradle_dependency_management_plugin
  - gradle_jacoco_plugin
  - gradle_actuator_dep
  - gradle_test_dep
  - gradle_jacoco_finalize
  - health_indicator_actuate_import
  - health_indicator_class
  - test_class_spring_boot_test
  allowed: []
  forbidden:
  - no_index_controller
  - no_web_application_main
  - no_security_config
  - no_notification_service
