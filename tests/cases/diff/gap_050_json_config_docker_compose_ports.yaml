name: gap_050_json_config_docker_compose_ports
tags:
- lang:json
- change:config
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    config/database.json: |
      {
        "host": "localhost",
        "port": 5432,
        "database": "appdb",
        "pool": {
          "min": 2,
          "max": 10,
          "idleTimeoutMs": 30000
        },
        "ssl": false
      }
    config/redis.json: |
      {
        "host": "localhost",
        "port": 6379,
        "db": 0,
        "maxRetries": 3,
        "retryDelayMs": 1000
      }
    config/app.json: |
      {
        "name": "billing-service",
        "port": 3000,
        "logLevel": "info",
        "cors": {
          "origins": ["http://localhost:8080"],
          "credentials": true
        }
      }
    src/server.ts: |
      import appConfig from "../config/app.json";
      import dbConfig from "../config/database.json";

      function startServer(): void {
        console.log(`Starting ${appConfig.name} on port ${appConfig.port}`);
        console.log(`Database: ${dbConfig.host}:${dbConfig.port}`);
      }

      startServer();
  changed_files:
    config/database.json: |
      {
        "host": "localhost",
        "port": 5432,
        "database": "appdb",
        "pool": {
          "min": 5,
          "max": 25,
          "idleTimeoutMs": 30000,
          "acquireTimeoutMs": 10000
        },
        "ssl": true,
        "sslRejectUnauthorized": false
      }
    config/redis.json: |
      {
        "host": "localhost",
        "port": 6379,
        "db": 0,
        "maxRetries": 5,
        "retryDelayMs": 2000,
        "enableOfflineQueue": true
      }
    config/app.json: |
      {
        "name": "billing-service",
        "port": 3000,
        "logLevel": "info",
        "cors": {
          "origins": ["http://localhost:8080"],
          "credentials": true
        }
      }
    src/server.ts: |
      import appConfig from "../config/app.json";
      import dbConfig from "../config/database.json";

      function startServer(): void {
        console.log(`Starting ${appConfig.name} on port ${appConfig.port}`);
        console.log(`Database: ${dbConfig.host}:${dbConfig.port}`);
      }

      startServer();
  commit_message: Update files
fixtures:
  auto_garbage: true
fragments:
- id: db_pool_min
  selector:
    path: config/database.json
    anchor: '"min": 5'
- id: db_pool_max
  selector:
    path: config/database.json
    anchor: '"max": 25'
- id: db_ssl
  selector:
    path: config/database.json
    anchor: '"ssl": true'
- id: redis_retries
  selector:
    path: config/redis.json
    anchor: '"maxRetries": 5'
- id: redis_offline_queue
  selector:
    path: config/redis.json
    anchor: "enableOfflineQueue"
oracle:
  required:
  - db_pool_max
  - db_ssl
  - redis_offline_queue
  allowed: []
  forbidden: []
