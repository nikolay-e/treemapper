      package com.ecommerce.search;

      import java.util.List;

      public class SearchService {
          private final ProductSearchRepository repository;

          public SearchService(ProductSearchRepository repository) {
              this.repository = repository;
          }

          public List<SearchResult> findProducts(String query, SearchOptions options) {
              return repository.search(query, options);
          }

          public List<SearchResult> findByTag(String tag) {
              return repository.searchByTag(tag);
          }

          public void indexProduct(String productId, String content, List<String> tags) {
              repository.index(productId, content, tags);
          }

          public void removeProduct(String productId) {
              repository.delete(productId);
          }
      }
