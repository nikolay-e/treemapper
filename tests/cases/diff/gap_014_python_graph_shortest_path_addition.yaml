      class AsciiRenderer:
          def __init__(self, width: int = 80):
              self._width = width

          def render_adjacency(self, adj: dict[str, list[str]]) -> str:
              lines = []
              for node in sorted(adj):
                  neighbors = ", ".join(sorted(adj[node]))
                  lines.append(f"{node} -> [{neighbors}]")
              return "\n".join(lines)
