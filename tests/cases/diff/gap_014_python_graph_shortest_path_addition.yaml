      from graph.core import Graph
      from graph.traversal import bfs

      def degree_centrality(graph: Graph) -> dict[str, float]:
          nodes = graph.nodes()
          n = len(nodes)
          if n <= 1:
              return {node: 0.0 for node in nodes}
          result = {}
          for node in nodes:
              result[node] = len(graph.neighbors(node)) / (n - 1)
          return result

      def closeness_centrality(graph: Graph) -> dict[str, float]:
          nodes = graph.nodes()
          result = {}
          for node in nodes:
              reachable = bfs(graph, node)
              if len(reachable) <= 1:
                  result[node] = 0.0
              else:
                  result[node] = (len(reachable) - 1) / len(nodes)
          return result
    graph/io_format.py: |
      from graph.core import Graph

      class GraphSerializer:
          def to_edge_list(self, graph: Graph) -> list[tuple[str, str, float]]:
              edges = []
              seen = set()
              for node in graph.nodes():
                  for neighbor, weight in graph.neighbors(node).items():
                      edge_key = tuple(sorted([node, neighbor]))
                      if edge_key not in seen:
                          edges.append((node, neighbor, weight))
                          seen.add(edge_key)
              return edges

          def from_edge_list(self, edges: list[tuple[str, str, float]]) -> Graph:
              g = Graph()
              for src, dst, weight in edges:
                  g.add_edge(src, dst, weight)
              return g
