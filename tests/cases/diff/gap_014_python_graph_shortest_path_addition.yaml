      from collections import defaultdict

      class Graph:
          def __init__(self, directed: bool = False):
              self._directed = directed
              self._adj: dict[str, dict[str, float]] = defaultdict(dict)

          def add_edge(self, src: str, dst: str, weight: float = 1.0) -> None:
              self._adj[src][dst] = weight
              if not self._directed:
                  self._adj[dst][src] = weight

          def neighbors(self, node: str) -> dict[str, float]:
              return dict(self._adj.get(node, {}))

          def nodes(self) -> set[str]:
              result = set()
              for src, edges in self._adj.items():
                  result.add(src)
                  result.update(edges.keys())
              return result
