      from graph.core import Graph
      from graph.traversal import bfs, dijkstra

      def degree_centrality(graph: Graph) -> dict[str, float]:
          nodes = graph.nodes()
          n = len(nodes)
          if n <= 1:
              return {node: 0.0 for node in nodes}
          result = {}
          for node in nodes:
              result[node] = len(graph.neighbors(node)) / (n - 1)
          return result

      def closeness_centrality(graph: Graph) -> dict[str, float]:
          nodes = graph.nodes()
          result = {}
          for node in nodes:
              total_dist = 0.0
              reachable = 0
              for target in nodes:
                  if target == node:
                      continue
                  dist, path = dijkstra(graph, node, target)
                  if dist < float("inf"):
                      total_dist += dist
                      reachable += 1
              if reachable == 0:
                  result[node] = 0.0
              else:
                  result[node] = reachable / total_dist
          return result
