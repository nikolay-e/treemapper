    src/vec2.lua: |
      local Vec2 = {}
      Vec2.__index = Vec2

      function Vec2.new(x, y)
        return setmetatable({x = x, y = y}, Vec2)
      end

      function Vec2:length()
        return math.sqrt(self.x * self.x + self.y * self.y)
      end

      function Vec2:add(other)
        return Vec2.new(self.x + other.x, self.y + other.y)
      end

      function Vec2:scale(factor)
        return Vec2.new(self.x * factor, self.y * factor)
      end

      return Vec2
    src/physics.lua: |
      local Vec2 = require("src.vec2")

      local Physics = {}

      function Physics.apply_gravity(position, velocity, dt)
        local gravity = Vec2.new(0, -9.81)
        local new_velocity = velocity:add(gravity:scale(dt))
        local new_position = position:add(new_velocity:scale(dt))
        return new_position, new_velocity
      end

      return Physics
