name: terraform_080_secrets_manager
tags:
- lang:python
- lang:terraform
- change:single_file
- change:config
- context:import_chain
- distance:2hop
- difficulty:easy
repo:
  initial_files:
    secrets.tf: |
      resource "aws_secretsmanager_secret" "db_creds" {
        name = "db-credentials"
      }

      resource "aws_secretsmanager_secret_version" "db_creds" {
        secret_id = aws_secretsmanager_secret.db_creds.id
        secret_string = jsonencode({
          username = "admin"
          password = var.db_password
        })
      }
    rotation.tf: |
      resource "aws_lambda_function" "rotate" {
        function_name = "secret-rotation-handler"
        runtime       = "python3.11"
        handler       = "rotation.handler"
        role          = aws_iam_role.rotation.arn
        filename      = "rotation.zip"
        timeout       = 60
      }

      resource "aws_iam_role" "rotation" {
        name = "secret-rotation-role"
        assume_role_policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Action = "sts:AssumeRole"
            Effect = "Allow"
            Principal = { Service = "lambda.amazonaws.com" }
          }]
        })
      }
    rds.tf: |
      resource "aws_db_instance" "main" {
        identifier = "app-db"
        engine     = "postgres"
        username   = jsondecode(aws_secretsmanager_secret_version.db_creds.secret_string)["username"]
        password   = jsondecode(aws_secretsmanager_secret_version.db_creds.secret_string)["password"]
      }
    api_keys/secrets.tf: |
      resource "aws_secretsmanager_secret" "api_keys" {
        name                    = "api-keys"
        recovery_window_in_days = 14
      }

      resource "aws_secretsmanager_secret_rotation" "api_keys" {
        secret_id           = aws_secretsmanager_secret.api_keys.id
        rotation_lambda_arn = aws_lambda_function.rotate_api.arn
        rotation_rules {
          automatically_after_days = 90
        }
      }
    src/secrets.py: |
      import boto3
      import json

      def get_secret(name: str) -> dict:
          sm = boto3.client("secretsmanager")
          response = sm.get_secret_value(SecretId=name)
          return json.loads(response["SecretString"])
  changed_files:
    secrets.tf: |
      resource "aws_secretsmanager_secret" "db_creds" {
        name                    = "db-credentials"
        recovery_window_in_days = 0
      }

      resource "aws_secretsmanager_secret_version" "db_creds" {
        secret_id = aws_secretsmanager_secret.db_creds.id
        secret_string = jsonencode({
          username = "admin"
          password = var.db_password
        })
      }

      resource "aws_secretsmanager_secret_rotation" "db_creds" {
        secret_id           = aws_secretsmanager_secret.db_creds.id
        rotation_lambda_arn = aws_lambda_function.rotate.arn
        rotation_rules {
          automatically_after_days = 30
        }
      }
  commit_message: Update files
fragments:
- id: secrets
  selector:
    path: secrets.tf
    anchor: recovery_window_in_days = 0
- id: secrets_1
  selector:
    path: secrets.tf
    anchor: resource "aws_secretsmanager_secret_rotation" "db_creds"
- id: secrets_2
  selector:
    path: secrets.tf
    anchor: automatically_after_days = 30
- id: rotation
  selector:
    path: rotation.tf
    anchor: resource "aws_lambda_function" "rotate" {
- id: rds
  selector:
    path: rds.tf
    anchor: aws_secretsmanager_secret_version.db_creds.secret_string
- id: no_secrets
  selector:
    path: api_keys/secrets.tf
- id: no_secrets_1
  selector:
    path: src/secrets.py
- id: no_global_0
  selector:
    anchor: api-keys
- id: no_global_1
  selector:
    anchor: rotate_api
- id: no_global_2
  selector:
    anchor: SecretString
oracle:
  required:
  - secrets
  - secrets_1
  - secrets_2
  - rotation
  - rds
  allowed: []
  forbidden:
  - no_secrets
  - no_secrets_1
  - no_global_0
  - no_global_1
  - no_global_2
