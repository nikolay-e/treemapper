  changed_files:
    include/cloud/storage_backend.hpp: |
      #pragma once
      #include <string>
      #include <vector>
      #include <cstdint>

      namespace cloud {

      class StorageBackend {
      public:
          virtual ~StorageBackend() = default;

          virtual bool put(const std::string& key, const std::vector<uint8_t>& data) = 0;
          virtual std::vector<uint8_t> get(const std::string& key) = 0;
          virtual bool remove(const std::string& key) = 0;
          virtual bool exists(const std::string& key) const = 0;
          virtual std::vector<std::string> list_keys(const std::string& prefix) const = 0;
      };

      class LocalStorageBackend : public StorageBackend {
      public:
          explicit LocalStorageBackend(const std::string& root_dir);

          bool put(const std::string& key, const std::vector<uint8_t>& data) override;
          std::vector<uint8_t> get(const std::string& key) override;
          bool remove(const std::string& key) override;
          bool exists(const std::string& key) const override;
          std::vector<std::string> list_keys(const std::string& prefix) const override;

      private:
          std::string root_dir_;
      };

      } // namespace cloud
    src/cloud/replication_service.cpp: |
      #include "cloud/storage_backend.hpp"
      #include <stdexcept>

      namespace cloud {

      class ReplicationService {
      public:
          ReplicationService(StorageBackend* primary, StorageBackend* replica)
              : primary_(primary), replica_(replica) {}

          bool replicate(const std::string& key) {
              auto data = primary_->get(key);
              return replica_->put(key, data);
          }

          size_t replicate_prefix(const std::string& prefix) {
              auto keys = primary_->list_keys(prefix);
              size_t count = 0;
              for (const auto& key : keys) {
                  if (replicate(key)) ++count;
              }
              return count;
          }

      private:
          StorageBackend* primary_;
          StorageBackend* replica_;
      };

      } // namespace cloud
