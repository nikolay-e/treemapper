repo:
  initial_files:
    src/store.rs: |
      pub struct MemStore {
          data: Vec<String>,
      }

      impl MemStore {
          pub fn new() -> Self {
              MemStore { data: vec![] }
          }

          pub fn save(&mut self, val: String) {
              self.data.push(val);
          }

          pub fn load(&self) -> &[String] {
              &self.data
          }
      }
    src/service.rs: |
      use crate::store::MemStore;

      pub fn run(store: &mut MemStore) {
          store.save("hello".into());
      }
