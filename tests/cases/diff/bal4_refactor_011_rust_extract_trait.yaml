  changed_files:
    src/store.rs: |
      pub trait Storage {
          fn save(&mut self, val: String);
          fn load(&self) -> &[String];
      }

      pub struct MemStore {
          data: Vec<String>,
      }

      impl MemStore {
          pub fn new() -> Self {
              MemStore { data: vec![] }
          }
      }

      impl Storage for MemStore {
          fn save(&mut self, val: String) {
              self.data.push(val);
          }

          fn load(&self) -> &[String] {
              &self.data
          }
      }
    src/service.rs: |
      use crate::store::Storage;

      pub fn run(store: &mut dyn Storage) {
          store.save("hello".into());
      }
    src/garbage_tok.rs: |
      // GARBAGE_BAL4R011_TOK_A
