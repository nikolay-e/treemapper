repo:
  initial_files:
    internal/client/http_client.go: |
      package client

      import (
          "io"
          "net/http"
      )

      type HTTPClient struct {
          baseURL string
      }

      func NewHTTPClient(baseURL string) *HTTPClient {
          return &HTTPClient{baseURL: baseURL}
      }

      func (c *HTTPClient) Get(path string) ([]byte, error) {
          resp, err := http.Get(c.baseURL + path)
          if err != nil {
              return nil, err
          }
          defer resp.Body.Close()
          return io.ReadAll(resp.Body)
      }
    internal/gateway/order_gateway.go: |
      package gateway

      import "myapp/internal/client"

      type OrderGateway struct {
          client *client.HTTPClient
      }

      func NewOrderGateway(c *client.HTTPClient) *OrderGateway {
          return &OrderGateway{client: c}
      }

      func (g *OrderGateway) FetchOrder(id string) ([]byte, error) {
          return g.client.Get("/orders/" + id)
      }
    internal/usecase/order_usecase.go: |
      package usecase

      import "myapp/internal/gateway"

      type OrderUsecase struct {
          gw *gateway.OrderGateway
      }

      func NewOrderUsecase(gw *gateway.OrderGateway) *OrderUsecase {
          return &OrderUsecase{gw: gw}
      }

      func (u *OrderUsecase) GetOrder(id string) ([]byte, error) {
          return u.gw.FetchOrder(id)
      }
    internal/api/order_api.go: |
      package api

      import (
          "myapp/internal/usecase"
          "net/http"
      )

      type OrderAPI struct {
          uc *usecase.OrderUsecase
      }

      func NewOrderAPI(uc *usecase.OrderUsecase) *OrderAPI {
          return &OrderAPI{uc: uc}
      }

      func (a *OrderAPI) HandleGetOrder(w http.ResponseWriter, r *http.Request) {
          id := r.URL.Query().Get("id")
          data, err := a.uc.GetOrder(id)
          if err != nil {
              http.Error(w, "error", 500)
              return
          }
          w.Write(data)
      }
    internal/metrics/counter.go: |
      package metrics

      var GARBAGE_BAL3_004_COUNTER_MARKER_A = "counter"
      var GARBAGE_BAL3_004_GAUGE_MARKER_B = "gauge"

      type Counter struct {
          val int
      }

      func (c *Counter) Inc() { c.val++ }
    internal/metrics/histogram.go: |
      package metrics

      var GARBAGE_BAL3_004_HIST_MARKER_C = "histogram"
      var GARBAGE_BAL3_004_BUCKET_MARKER_D = 10

      type Histogram struct {
          buckets []int
      }

      func (h *Histogram) Observe(v int) {
          h.buckets = append(h.buckets, v)
      }
  changed_files:
    internal/client/http_client.go: |
      package client

      import (
          "fmt"
          "io"
          "net/http"
      )

      type HTTPClient struct {
          baseURL string
          timeout int
      }

      func NewHTTPClient(baseURL string) *HTTPClient {
          return &HTTPClient{baseURL: baseURL, timeout: 30}
      }

      func (c *HTTPClient) Get(path string) ([]byte, error) {
          resp, err := http.Get(c.baseURL + path)
          if err != nil {
              return nil, fmt.Errorf("GET %s failed: %w", path, err)
          }
          defer resp.Body.Close()
          if resp.StatusCode != http.StatusOK {
              return nil, fmt.Errorf("unexpected status: %d", resp.StatusCode)
          }
          return io.ReadAll(resp.Body)
      }
  commit_message: "Fix missing status code check in HTTP client"
