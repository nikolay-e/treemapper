name: bal4_cfgcode_006_ruby_email_smtp
tags:
- lang:ruby
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/email.yml: |
      smtp:
        host: smtp.gmail.com
        port: 587
        tls: true
        from: noreply@example.com
        max_retries: 3
    lib/mailer/transport.rb: |
      require 'yaml'
      module Mailer
        class Transport
          def initialize
            @smtp = YAML.load_file('config/email.yml')['smtp']
          end
          def host
            @smtp['host']
          end
          def port
            @smtp['port']
          end
          def tls?
            @smtp['tls']
          end
        end
      end
    lib/mailer/sender.rb: |
      require 'yaml'
      module Mailer
        class Sender
          SMTP_CFG = YAML.load_file('config/email.yml')['smtp']
          def send_email(to, subject, body)
            from = SMTP_CFG['from']
            retries = SMTP_CFG['max_retries']
            deliver(from, to, subject, body, retries)
          end
        end
      end
    lib/mailer/template_engine.rb: |
      require 'yaml'
      module Mailer
        class TemplateEngine
          SMTP_CFG = YAML.load_file('config/email.yml')['smtp']
          def render(template_name, vars)
            header = "From: #{SMTP_CFG['from']}"
            body = load_template(template_name, vars)
            "#{header}\n\n#{body}"
          end
        end
      end
    garbage_queue.rb: |
      GARBAGE_CFGCODE_006_QUEUE_A = "sidekiq"
      GARBAGE_CFGCODE_006_QUEUE_B = 5
      class JobQueue
        GARBAGE_CFGCODE_006_QUEUE_C = "default"
        def enqueue(job)
          GARBAGE_CFGCODE_006_QUEUE_D = job
        end
      end
    garbage_storage.rb: |
      GARBAGE_CFGCODE_006_STORE_E = "local"
      GARBAGE_CFGCODE_006_STORE_F = "/uploads"
      class Storage
        GARBAGE_CFGCODE_006_STORE_G = 52428800
        def save(file)
          GARBAGE_CFGCODE_006_STORE_H = file
        end
      end
    garbage_metrics.rb: |
      GARBAGE_CFGCODE_006_METRIC_I = "statsd"
      GARBAGE_CFGCODE_006_METRIC_J = 8125
  changed_files:
    config/email.yml: |
      smtp:
        host: smtp.sendgrid.net
        port: 465
        tls: true
        from: notifications@myapp.com
        max_retries: 5
        rate_limit: 100
  commit_message: "switch to sendgrid smtp"
