    processor.py: |
      from transforms import (
          transformer, normalizer, slugifier,
          TransformPipeline, TransformResult, compose
      )
      from typing import Any

      class TextProcessor:
          def __init__(self):
              self.pipeline = TransformPipeline()
              self.pipeline.add("normalize", normalizer)
              self.pipeline.add("transform", transformer)

          def process_text(self, text: str) -> str:
              return self.pipeline.execute(text)

      def process(data: str) -> str:
          result = transformer(data)
          return result

      def process_and_slugify(data: str) -> str:
          normalized = normalizer(data)
          return slugifier(normalized)
