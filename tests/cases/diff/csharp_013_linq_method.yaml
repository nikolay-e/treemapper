    src/Dosage.jl: |
      module Dosage

      export DosageRecord, daily_total, weekly_total, exceeds_limit

      struct DosageRecord
          drug::String
          dose_mg::Float64
          times_per_day::Int
          max_daily_mg::Float64
      end

      function daily_total(record::DosageRecord)::Float64
          return record.dose_mg * record.times_per_day
      end

      function weekly_total(record::DosageRecord)::Float64
          return daily_total(record) * 7
      end

      function exceeds_limit(record::DosageRecord)::Bool
          return daily_total(record) > record.max_daily_mg
      end

      end
