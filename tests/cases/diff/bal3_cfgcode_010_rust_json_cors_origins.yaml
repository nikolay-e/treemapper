repo:
  initial_files:
    pkg/cache/lru.go: |
      package cache

      type entry struct {
          key   string
          value interface{}
      }

      type LRU struct {
          cap   int
          items []entry
      }

      func NewLRU(capacity int) *LRU {
          return &LRU{cap: capacity}
      }

      func (c *LRU) Get(key string) (interface{}, bool) {
          for i, e := range c.items {
              if e.key == key {
                  c.items = append(c.items[:i], c.items[i+1:]...)
                  c.items = append(c.items, e)
                  return e.value, true
              }
          }
          return nil, false
      }

      func (c *LRU) Set(key string, value interface{}) {
          for i, e := range c.items {
              if e.key == key {
                  c.items[i].value = value
                  return
              }
          }
          if len(c.items) >= c.cap {
              c.items = c.items[1:]  // BUG: evicts oldest, not LRU (last-accessed)
          }
          c.items = append(c.items, entry{key, value})
      }
    pkg/session/store.go: |
      package session

      import "pkg/cache"

      type Store struct {
          lru *cache.LRU
      }

      func NewStore(capacity int) *Store {
          return &Store{lru: cache.NewLRU(capacity)}
      }

      func (s *Store) Get(sid string) (interface{}, bool) {
          return s.lru.Get(sid)
      }

      func (s *Store) Set(sid string, data interface{}) {
          s.lru.Set(sid, data)
      }
    internal/middleware/session_mw.go: |
      package middleware

      import "pkg/session"

      type SessionMiddleware struct {
          store *session.Store
      }

      func NewSessionMiddleware(capacity int) *SessionMiddleware {
          return &SessionMiddleware{store: session.NewStore(capacity)}
      }

      func (m *SessionMiddleware) Load(sid string) (interface{}, bool) {
          return m.store.Get(sid)
      }

      func (m *SessionMiddleware) Save(sid string, data interface{}) {
          m.store.Set(sid, data)
      }
    internal/api/user_api.go: |
      package api

      import "internal/middleware"

      type UserAPI struct {
          session *middleware.SessionMiddleware
      }

      func NewUserAPI(s *middleware.SessionMiddleware) *UserAPI {
