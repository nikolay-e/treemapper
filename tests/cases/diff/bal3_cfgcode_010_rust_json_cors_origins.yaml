name: bal3_cfgcode_010_rust_json_cors_origins
tags:
- lang:rust
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/cors.json: |
      {
        "cors": {
          "allowed_origins": ["http://localhost:3000"],
          "allowed_methods": ["GET", "POST"],
          "max_age_secs": 3600
        }
      }
    src/middleware/cors.rs: |
      use serde::Deserialize;
      use std::fs;

      #[derive(Deserialize, Clone)]
      pub struct CorsConfig {
          pub allowed_origins: Vec<String>,
          pub allowed_methods: Vec<String>,
          pub max_age_secs: u64,
      }

      #[derive(Deserialize)]
      struct CorsFile {
          cors: CorsConfig,
      }

      pub fn load_cors_config(path: &str) -> Result<CorsConfig, Box<dyn std::error::Error>> {
          let content = fs::read_to_string(path)?;
          let file: CorsFile = serde_json::from_str(&content)?;
          Ok(file.cors)
      }

      pub fn is_origin_allowed(cfg: &CorsConfig, origin: &str) -> bool {
          cfg.allowed_origins.iter().any(|o| o == origin)
      }

      pub fn build_cors_headers(cfg: &CorsConfig) -> Vec<(String, String)> {
          vec![
              ("Access-Control-Allow-Origin".into(), cfg.allowed_origins.join(", ")),
              ("Access-Control-Allow-Methods".into(), cfg.allowed_methods.join(", ")),
              ("Access-Control-Max-Age".into(), cfg.max_age_secs.to_string()),
          ]
      }
    src/middleware/rate_limit.rs: |
      GARBAGE_CFGCODE_010_RATE_A: u32 = 100;
      GARBAGE_CFGCODE_010_BURST_B: u32 = 50;

      pub fn check_rate_limit() -> bool { true }
    src/handlers/upload.rs: |
      GARBAGE_CFGCODE_010_UPLOAD_C: &str = "multipart";
      GARBAGE_CFGCODE_010_MAXSIZE_D: u64 = 10485760;

      pub fn handle_upload() {}
    src/utils/crypto.rs: |
      GARBAGE_CFGCODE_010_ALGO_E: &str = "aes256";
      GARBAGE_CFGCODE_010_IV_F: &str = "random";

      pub fn encrypt(data: &[u8]) -> Vec<u8> { data.to_vec() }
  changed_files:
    config/cors.json: |
      {
        "cors": {
          "allowed_origins": ["https://app.example.com", "https://admin.example.com"],
          "allowed_methods": ["GET", "POST", "PUT", "DELETE"],
          "max_age_secs": 86400,
          "allow_credentials": true
        }
      }
  commit_message: "update CORS for production origins and methods"
