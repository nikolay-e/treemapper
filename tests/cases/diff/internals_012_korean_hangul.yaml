    src/BloodPressure.jl: |
      module BloodPressure

      export BPReading, classify_bp, pulse_pressure

      struct BPReading
          systolic::Int
          diastolic::Int
      end

      function classify_bp(r::BPReading)::String
          if r.systolic < 120 && r.diastolic < 80
              return "normal"
          elseif r.systolic < 130
              return "elevated"
          else
              return "hypertension"
          end
      end

      function pulse_pressure(r::BPReading)::Int
          return r.systolic - r.diastolic
      end

      end
