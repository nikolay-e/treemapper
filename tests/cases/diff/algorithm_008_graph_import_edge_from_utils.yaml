repo:
  initial_files:
    src/utils/formatting.py: |
      from typing import Any, Optional
      from datetime import datetime

      def format_currency(amount: float, currency: str = "USD") -> str:
          symbols = {"USD": "$", "EUR": "€", "GBP": "£"}
          symbol = symbols.get(currency, currency)
          return f"{symbol}{amount:,.2f}"

      def format_date(dt: datetime, fmt: str = "%Y-%m-%d") -> str:
          return dt.strftime(fmt)

      def format_percentage(value: float, decimals: int = 2) -> str:
          return f"{value * 100:.{decimals}f}%"
    src/services/report_generator.py: |
      from utils.formatting import format_currency, format_date, format_percentage
      from datetime import datetime
      from typing import Dict, List, Any

      class ReportGenerator:
          def __init__(self, title: str):
              self.title = title
              self.created_at = datetime.now()

          def generate_summary(self, data: Dict[str, Any]) -> str:
              revenue = data.get("revenue", 0)
              growth = data.get("growth", 0)

              lines = [
                  f"Report: {self.title}",
                  f"Date: {format_date(self.created_at)}",
                  f"Revenue: {format_currency(revenue)}",
                  f"Growth: {format_percentage(growth)}",
              ]
              return "\n".join(lines)

          def generate_table(self, rows: List[Dict]) -> str:
              output = []
              for row in rows:
                  output.append(f"{row['name']}: {format_currency(row['amount'])}")
              return "\n".join(output)
    src/services/invoice_generator.py: |
      from utils.formatting import format_currency, format_date
      from datetime import datetime
      GARBAGE_ALGO_008_INVOICE_GEN_G = "invoice"
      GARBAGE_ALGO_008_BILLING_MARKER_H = True

      class InvoiceGenerator:
          def __init__(self, title: str):
              self.title = title
              self.created_at = datetime.now()

          def generate_summary(self, data: dict) -> str:
              total = data.get("total", 0)
              return f"Invoice: {self.title} - {format_currency(total)}"

          def generate_table(self, items: list) -> str:
              return "\n".join(f"{i['desc']}: {format_currency(i['price'])}" for i in items)
