name: internals_037_file_modification_with_new_function
tags:
- lang:python
- lang:shell
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    scripts/export.py: |
      import csv
      import json
      import os

      OUTPUT_DIR = "exports"


      def export_csv(rows: list[dict], filename: str) -> str:
          if not rows:
              return ""
          path = os.path.join(OUTPUT_DIR, filename)
          with open(path, "w", newline="") as f:
              writer = csv.DictWriter(f, fieldnames=rows[0].keys())
              writer.writeheader()
              writer.writerows(rows)
          return path
    scripts/export.sh: |
      #!/usr/bin/env bash
      python3 scripts/export.py
    garbage/transform.py: |
      GARBAGE_INT037_XFORM_A = "transform_marker"


      def normalize(data: list) -> list:
          return data
    garbage/filter.py: |
      GARBAGE_INT037_FILTER_B = "filter_marker"


      def apply_filters(data: list, filters: dict) -> list:
          return data
    garbage/aggregate.py: |
      GARBAGE_INT037_AGG_C = "aggregate_marker"


      def sum_by_key(data: list, key: str) -> float:
          return 0.0
  changed_files:
    scripts/export.py: |
      import csv
      import json
      import os

      OUTPUT_DIR = "exports"


      def export_csv(rows: list[dict], filename: str) -> str:
          if not rows:
              return ""
          path = os.path.join(OUTPUT_DIR, filename)
          with open(path, "w", newline="") as f:
              writer = csv.DictWriter(f, fieldnames=rows[0].keys())
              writer.writeheader()
              writer.writerows(rows)
          return path


      def export_json(rows: list[dict], filename: str) -> str:
          path = os.path.join(OUTPUT_DIR, filename)
          with open(path, "w") as f:
              json.dump(rows, f, indent=2)
          return path
    scripts/export.sh: |
      #!/usr/bin/env bash
      set -euo pipefail
      FORMAT="${1:-csv}"
      python3 scripts/export.py "$FORMAT"
    garbage/transform.py: |
      GARBAGE_INT037_XFORM_A = "transform_marker"


      def normalize(data: list) -> list:
          return data
    garbage/filter.py: |
      GARBAGE_INT037_FILTER_B = "filter_marker"


      def apply_filters(data: list, filters: dict) -> list:
          return data
    garbage/aggregate.py: |
      GARBAGE_INT037_AGG_C = "aggregate_marker"


      def sum_by_key(data: list, key: str) -> float:
          return 0.0
