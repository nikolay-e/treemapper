repo:
  initial_files:
    src/rate/limiter.clj: |
      (ns rate.limiter)

      (defrecord RateLimiter [max-requests window-ms requests])

      (defn create [max-requests window-ms]
        (->RateLimiter max-requests window-ms (atom [])))

      (defn allowed? [limiter]
        (let [now (System/currentTimeMillis)
              cutoff (- now (:window-ms limiter))
              recent (filter #(> % cutoff) @(:requests limiter))]
          (reset! (:requests limiter) recent)
          (< (count recent) (:max-requests limiter))))

      (defn record-request! [limiter]
        (swap! (:requests limiter) conj (System/currentTimeMillis)))
    src/rate/middleware.clj: |
      (ns rate.middleware
        (:require [rate.limiter :as rl]))

      (defn wrap-rate-limit [handler limiter]
        (fn [request]
          (if (rl/allowed? limiter)
            (do (rl/record-request! limiter)
                (handler request))
            {:status 429 :body {:error "rate limit exceeded"}})))
    src/api/server.clj: |
      (ns api.server
        (:require [rate.middleware :as rm]
                  [rate.limiter :as rl]))

      (def global-limiter (rl/create 100 60000))

      (defn make-app [handler]
        (rm/wrap-rate-limit handler global-limiter))

      (defn handle-request [request]
        {:status 200 :body {:ok true}})
