  changed_files:
    src/rate/limiter.clj: |
      (ns rate.limiter)

      (defrecord RateLimiter [max-requests window-ms requests])

      (defn create [max-requests window-ms]
        (->RateLimiter max-requests window-ms (atom [])))

      (defn allowed? [limiter]
        (let [now (System/currentTimeMillis)
              cutoff (- now (:window-ms limiter))
              recent (filter #(> % cutoff) @(:requests limiter))]
          (reset! (:requests limiter) recent)
          (< (count recent) (:max-requests limiter))))

      (defn record-request! [limiter]
        (swap! (:requests limiter) conj (System/currentTimeMillis)))

      (defn remaining [limiter]
        (let [now (System/currentTimeMillis)
              cutoff (- now (:window-ms limiter))
              recent (filter #(> % cutoff) @(:requests limiter))]
          (max 0 (- (:max-requests limiter) (count recent)))))
    src/rate/middleware.clj: |
      (ns rate.middleware
        (:require [rate.limiter :as rl]))

      (defn wrap-rate-limit [handler limiter]
        (fn [request]
          (if (rl/allowed? limiter)
            (do (rl/record-request! limiter)
                (handler request))
            {:status 429
             :headers {"X-RateLimit-Remaining" "0"}
             :body {:error "rate limit exceeded"}})))

      (defn wrap-rate-limit-with-headers [handler limiter]
        (fn [request]
          (let [rem (rl/remaining limiter)]
            (if (rl/allowed? limiter)
              (do (rl/record-request! limiter)
                  (let [resp (handler request)]
                    (assoc-in resp [:headers "X-RateLimit-Remaining"]
                              (str (dec rem)))))
              {:status 429
               :headers {"X-RateLimit-Remaining" "0"}
               :body {:error "rate limit exceeded"}}))))
    src/api/server.clj: |
      (ns api.server
        (:require [rate.middleware :as rm]
                  [rate.limiter :as rl]))

      (def global-limiter (rl/create 100 60000))

      (defn make-app [handler]
        (rm/wrap-rate-limit-with-headers handler global-limiter))

      (defn handle-request [request]
        {:status 200 :body {:ok true}})
    garbage/metrics.clj: |
      (ns garbage.metrics)

      (def ^:const GARBAGE_CPP036_A "counter_marker")
      (def ^:const GARBAGE_CPP036_B "gauge_marker")

      (defn inc-counter [name]
        GARBAGE_CPP036_A)
    garbage/circuit.clj: |
      (ns garbage.circuit)

      (def ^:const GARBAGE_CPP036_C "circuit_marker")
      (def ^:const GARBAGE_CPP036_D "breaker_marker")

      (defn open? [breaker]
        GARBAGE_CPP036_C)
    garbage/session.clj: |
      (ns garbage.session)

      (def ^:const GARBAGE_CPP036_E "session_marker")

      (defn get-session [id]
        GARBAGE_CPP036_E)
