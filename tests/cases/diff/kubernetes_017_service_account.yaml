name: kubernetes_017_service_account
repo:
  initial_files:
    k8s/rbac/serviceaccount.yaml: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: app-service-account
        namespace: production
        labels:
          app: myapp
      automountServiceAccountToken: false
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: Role
      metadata:
        name: app-role
        namespace: production
      rules:
      - apiGroups: [""]
        resources: ["secrets", "configmaps"]
        verbs: ["get", "list", "watch"]
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["get", "list"]
      ---
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: app-role-binding
        namespace: production
      subjects:
      - kind: ServiceAccount
        name: app-service-account
        namespace: production
      roleRef:
        kind: Role
        name: app-role
        apiGroup: rbac.authorization.k8s.io
    k8s/apps/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: myapp
        namespace: production
        labels:
          app: myapp
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: myapp
        template:
          metadata:
            labels:
              app: myapp
          spec:
            containers:
            - name: app
              image: myapp:v1.0.0
              ports:
              - containerPort: 8080
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
    k8s/infra/reloader/reloader-deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: reloader
        namespace: kube-system
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: reloader
        template:
          spec:
            serviceAccountName: reloader-sa
            containers:
            - name: reloader
              image: stakater/reloader:v1.0.40
    k8s/infra/descheduler/descheduler.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: descheduler
        namespace: kube-system
      spec:
        template:
          spec:
            serviceAccountName: descheduler-sa
            containers:
            - name: descheduler
              image: registry.k8s.io/descheduler/descheduler:v0.28.0
  changed_files:
    k8s/rbac/serviceaccount.yaml: |
      apiVersion: v1
      kind: ServiceAccount
      metadata:
        name: app-service-account
        namespace: production
        labels:
          app: myapp
      automountServiceAccountToken: false
