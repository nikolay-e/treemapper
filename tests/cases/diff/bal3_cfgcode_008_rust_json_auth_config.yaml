    src/Payments/CurrencyConverter.cs: |
      namespace Payments;

      public class CurrencyConverter
      {
          private readonly Dictionary<string, decimal> _rates;

          public CurrencyConverter(Dictionary<string, decimal> rates)
          {
              _rates = rates;
          }

          public decimal Convert(decimal amount, string fromCurrency, string toCurrency)
          {
              if (fromCurrency == toCurrency) return amount;
              var inUsd = amount / _rates[fromCurrency];
              return inUsd * _rates[toCurrency];
          }

          public bool SupportsCurrency(string currency)
          {
              return _rates.ContainsKey(currency);
          }
      }
    tests/Payments/CurrencyConverterTests.cs: |
      using Xunit;
      using Payments;

      public class CurrencyConverterTests
      {
          private static readonly Dictionary<string, decimal> Rates = new()
          {
              ["USD"] = 1.0m,
              ["EUR"] = 0.92m,
              ["GBP"] = 0.79m,
          };

          private readonly CurrencyConverter _converter = new(Rates);

          [Fact]
          public void Convert_SameCurrency_ReturnsSameAmount()
          {
              var result = _converter.Convert(100m, "USD", "USD");
              Assert.Equal(100m, result);
          }

          [Fact]
          public void Convert_UsdToEur_ReturnsCorrectAmount()
          {
              var result = _converter.Convert(100m, "USD", "EUR");
              Assert.Equal(92m, result);
          }
      }
