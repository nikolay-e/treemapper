repo:
  initial_files:
    repo/user_repo.go: |
      package repo

      import (
          "errors"
          "sync"
      )

      type User struct {
          ID    int
          Name  string
          Email string
      }

      type UserRepo struct {
          mu    sync.RWMutex
          users map[int]*User
          seq   int
      }

      func NewUserRepo() *UserRepo {
          return &UserRepo{users: make(map[int]*User)}
      }

      func (r *UserRepo) Create(name, email string) *User {
          r.mu.Lock()
          defer r.mu.Unlock()
          r.seq++
          u := &User{ID: r.seq, Name: name, Email: email}
          r.users[u.ID] = u
          return u
      }

      func (r *UserRepo) FindByID(id int) (*User, error) {
          r.mu.RLock()
          defer r.mu.RUnlock()
          u, ok := r.users[id]
          if !ok {
              return nil, errors.New("user not found")
          }
          return u, nil
      }

      func (r *UserRepo) List() []*User {
          r.mu.RLock()
          defer r.mu.RUnlock()
          result := make([]*User, 0, len(r.users))
          for _, u := range r.users {
              result = append(result, u)
          }
          return result
      }
    repo/user_repo_test.go: |
      package repo

      import "testing"

      func TestCreate(t *testing.T) {
          r := NewUserRepo()
          u := r.Create("alice", "alice@test.com")
          if u.ID != 1 {
              t.Errorf("expected id 1, got %d", u.ID)
          }
      }

      func TestFindByID_Exists(t *testing.T) {
          r := NewUserRepo()
          created := r.Create("bob", "bob@test.com")
          found, err := r.FindByID(created.ID)
          if err != nil {
              t.Fatalf("unexpected error: %v", err)
          }
          if found.Name != "bob" {
              t.Errorf("expected bob, got %s", found.Name)
          }
      }

      func TestFindByID_NotFound(t *testing.T) {
          r := NewUserRepo()
          _, err := r.FindByID(999)
          if err == nil {
              t.Error("expected error for missing user")
          }
      }

      func TestList(t *testing.T) {
          r := NewUserRepo()
          r.Create("a", "a@test.com")
          r.Create("b", "b@test.com")
          users := r.List()
          if len(users) != 2 {
              t.Errorf("expected 2 users, got %d", len(users))
          }
      }
