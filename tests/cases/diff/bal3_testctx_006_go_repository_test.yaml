  changed_files:
    repo/user_repo.go: |
      package repo

      import (
          "errors"
          "sort"
          "sync"
      )

      type User struct {
          ID    int
          Name  string
          Email string
      }

      type UserRepo struct {
          mu    sync.RWMutex
          users map[int]*User
          seq   int
      }

      func NewUserRepo() *UserRepo {
          return &UserRepo{users: make(map[int]*User)}
      }

      func (r *UserRepo) Create(name, email string) (*User, error) {
          if name == "" {
              return nil, errors.New("name is required")
          }
          r.mu.Lock()
          defer r.mu.Unlock()
          r.seq++
          u := &User{ID: r.seq, Name: name, Email: email}
          r.users[u.ID] = u
          return u, nil
      }

      func (r *UserRepo) FindByID(id int) (*User, error) {
          r.mu.RLock()
          defer r.mu.RUnlock()
          u, ok := r.users[id]
          if !ok {
              return nil, errors.New("user not found")
          }
          return u, nil
      }

      func (r *UserRepo) FindByEmail(email string) (*User, error) {
          r.mu.RLock()
          defer r.mu.RUnlock()
          for _, u := range r.users {
              if u.Email == email {
                  return u, nil
              }
          }
          return nil, errors.New("user not found")
      }

      func (r *UserRepo) List() []*User {
          r.mu.RLock()
          defer r.mu.RUnlock()
          result := make([]*User, 0, len(r.users))
          for _, u := range r.users {
              result = append(result, u)
          }
          sort.Slice(result, func(i, j int) bool {
              return result[i].ID < result[j].ID
          })
          return result
      }

      func (r *UserRepo) Delete(id int) error {
          r.mu.Lock()
          defer r.mu.Unlock()
          if _, ok := r.users[id]; !ok {
              return errors.New("user not found")
          }
          delete(r.users, id)
          return nil
      }
  commit_message: "fix: add validation to Create, add FindByEmail and Delete"
