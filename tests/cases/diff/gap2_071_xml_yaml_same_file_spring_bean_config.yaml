repo:
  initial_files:
    lib/core/resolver.rb: |
      module Core
        class Resolver
          def initialize
            @registry = {}
          end

          def register(name, &factory)
            @registry[name] = factory
          end

          def resolve(name)
            factory = @registry[name]
            raise "Unknown dependency: #{name}" unless factory
            factory.call(self)
          end
        end
      end
    lib/core/application.rb: |
      require_relative 'resolver'

      module Core
        class Application
          attr_reader :resolver

          def initialize(&config)
            @resolver = Resolver.new
            config.call(@resolver) if config
          end

          def get(name)
            @resolver.resolve(name)
          end
        end
      end
    lib/services/mailer.rb: |
