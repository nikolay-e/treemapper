    lib/app/bootstrap.rb: |
      require_relative '../core/application'
      require_relative '../services/mailer'
      require_relative '../services/notifier'

      module App
        def self.build
          Core::Application.new do |r|
            r.register(:mailer_config, singleton: true) { |_| { host: 'smtp.example.com', port: 587 } }
            r.register(:mailer, singleton: true) { |resolver| Services::Mailer.new(resolver) }
            r.register(:notifier) { |resolver| Services::Notifier.new(resolver) }
          end
        end
      end
    lib/utils/string_helpers.rb: |
      GARBAGE_GAP071_A = 'string_helpers_namespace'

