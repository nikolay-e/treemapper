  changed_files:
    lib/core/resolver.rb: |
      module Core
        class Resolver
          def initialize
            @registry = {}
            @singletons = {}
          end

          def register(name, singleton: false, &factory)
            @registry[name] = { factory: factory, singleton: singleton }
          end

          def resolve(name)
            entry = @registry[name]
            raise "Unknown dependency: #{name}" unless entry
            if entry[:singleton]
              @singletons[name] ||= entry[:factory].call(self)
            else
              entry[:factory].call(self)
            end
          end
        end
      end
    lib/core/application.rb: |
      require_relative 'resolver'

      module Core
        class Application
          attr_reader :resolver

          def initialize(&config)
            @resolver = Resolver.new
            config.call(@resolver) if config
          end

          def get(name)
            @resolver.resolve(name)
          end
        end
      end
