name: gap2_071_xml_yaml_same_file_spring_bean_config
tags:
- change:single_file
- context:same_file
- difficulty:trivial
- distance:0hop
- lang:xml
- lang:yaml
repo:
  initial_files:
    src/beans.xml: |
      <beans>
        <bean id="dataSource" class="com.example.DataSource">
          <property name="url" value="jdbc:mysql://localhost/app"/>
          <property name="maxPool" value="10"/>
        </bean>
        <bean id="userDao" class="com.example.UserDao">
          <property name="dataSource" ref="dataSource"/>
        </bean>
      </beans>
    src/application.yml: |
      spring:
        datasource:
          url: jdbc:mysql://localhost/app
          pool-size: 10
    other/security.xml: |
      <security>
        <TRAP_GAP2_071_SEC_A>security_noise</TRAP_GAP2_071_SEC_A>
        <TRAP_GAP2_071_SEC_B>256</TRAP_GAP2_071_SEC_B>
        <encryption>AES</encryption>
      </security>
    other/routes.yml: |
      TRAP_GAP2_071_ROUTE_C: routes_noise
      TRAP_GAP2_071_ROUTE_D: false
      defaultPath: /home
    other/plugins.xml: |
      <plugins>
        <TRAP_GAP2_071_PLUG_E>plugin_noise</TRAP_GAP2_071_PLUG_E>
        <TRAP_GAP2_071_PLUG_F>3</TRAP_GAP2_071_PLUG_F>
      </plugins>
  changed_files:
    src/beans.xml: |
      <beans>
        <bean id="dataSource" class="com.example.DataSource">
          <property name="url" value="jdbc:mysql://localhost/app"/>
          <property name="maxPool" value="10"/>
        </bean>
        <bean id="userDao" class="com.example.UserDao">
