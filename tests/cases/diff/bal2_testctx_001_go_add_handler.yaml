repo:
  initial_files:
    handler/user.go: |
      package handler

      import (
          "encoding/json"
          "net/http"
      )

      type UserHandler struct {
          store UserStore
      }

      func (h *UserHandler) GetUser(w http.ResponseWriter, r *http.Request) {
          id := r.URL.Query().Get("id")
          user, err := h.store.FindByID(id)
          if err != nil {
              http.Error(w, "not found", http.StatusNotFound)
              return
          }
          json.NewEncoder(w).Encode(user)
      }
    handler/user_test.go: |
      package handler

      import (
          "net/http"
          "net/http/httptest"
          "testing"
      )

      func TestGetUser(t *testing.T) {
          h := &UserHandler{store: &mockStore{}}
          req := httptest.NewRequest("GET", "/user?id=1", nil)
          w := httptest.NewRecorder()
          h.GetUser(w, req)
          if w.Code != http.StatusOK {
              t.Fatalf("expected 200, got %d", w.Code)
          }
      }
    handler/health.go: |
      package handler

      GARBAGE_BAL2_001_HEALTH_A = "health"

      import "net/http"

      func HealthCheck(w http.ResponseWriter, r *http.Request) {
          w.WriteHeader(http.StatusOK)
          w.Write([]byte("ok"))
      }
    handler/health_test.go: |
      package handler

      GARBAGE_BAL2_001_HEALTH_TEST_B = "health_test"

      import (
          "net/http"
          "net/http/httptest"
          "testing"
      )

      func TestHealthCheck(t *testing.T) {
          req := httptest.NewRequest("GET", "/health", nil)
          w := httptest.NewRecorder()
          HealthCheck(w, req)
          if w.Code != http.StatusOK {
              t.Fatalf("expected 200, got %d", w.Code)
          }
      }
    middleware/logging.go: |
      package middleware

      GARBAGE_BAL2_001_LOGGING_C = "logging"
      GARBAGE_BAL2_001_MW_MARKER_D = true

      import (
          "log"
          "net/http"
          "time"
      )

      func LoggingMiddleware(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              start := time.Now()
              next.ServeHTTP(w, r)
              log.Printf("%s %s %v", r.Method, r.URL.Path, time.Since(start))
          })
      }
  changed_files:
    handler/user.go: |
      package handler

      import (
          "encoding/json"
          "net/http"
      )

      type UserHandler struct {
          store UserStore
      }

      func (h *UserHandler) GetUser(w http.ResponseWriter, r *http.Request) {
          id := r.URL.Query().Get("id")
          user, err := h.store.FindByID(id)
          if err != nil {
              http.Error(w, "not found", http.StatusNotFound)
              return
          }
          json.NewEncoder(w).Encode(user)
      }

      func (h *UserHandler) DeleteUser(w http.ResponseWriter, r *http.Request) {
          id := r.URL.Query().Get("id")
          if err := h.store.Delete(id); err != nil {
              http.Error(w, "delete failed", http.StatusInternalServerError)
              return
          }
          w.WriteHeader(http.StatusNoContent)
      }
    handler/user_test.go: |
      package handler

      import (
          "net/http"
          "net/http/httptest"
          "testing"
      )

      func TestGetUser(t *testing.T) {
          h := &UserHandler{store: &mockStore{}}
          req := httptest.NewRequest("GET", "/user?id=1", nil)
          w := httptest.NewRecorder()
          h.GetUser(w, req)
          if w.Code != http.StatusOK {
              t.Fatalf("expected 200, got %d", w.Code)
          }
      }

      func TestDeleteUser(t *testing.T) {
          h := &UserHandler{store: &mockStore{}}
          req := httptest.NewRequest("DELETE", "/user?id=1", nil)
          w := httptest.NewRecorder()
          h.DeleteUser(w, req)
          if w.Code != http.StatusNoContent {
              t.Fatalf("expected 204, got %d", w.Code)
          }
      }
    handler/health.go: |
      package handler

      GARBAGE_BAL2_001_HEALTH_A = "health"

