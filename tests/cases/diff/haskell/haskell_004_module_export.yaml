# === Assertions ===

must_include_files:
- src/MathUtils.hs
- src/Stats.hs

must_include_content_from:
  src/MathUtils.hs:
    - binomialCoeff :: Integer -> Integer -> Integer
    - binomialCoeff n k = factorial n
  src/Stats.hs:
    - import MathUtils (factorial, binomialCoeff)
    - probabilityMass :: Integer -> Integer -> Double -> Double
    - coeff = fromIntegral (binomialCoeff n k)

must_not_include:
# Tricky: also imports from MathUtils
- GARBAGE_HS_004_COMBI_MARKER_A
- GARBAGE_HS_004_PERM_CALC_B
# Tricky: similar math function names
- GARBAGE_HS_004_NUMERIC_MARKER_C
- GARBAGE_HS_004_PRIME_CHECK_D
# Plain garbage
- GARBAGE_HS_004_STRUTIL_MARKER_E
- GARBAGE_HS_004_CASE_CONV_F
- GARBAGE_HS_004_IOUTILS_MARKER_G
- GARBAGE_HS_004_FILE_READ_H

must_not_include_files:
- src/Combinatorics.hs
- src/Numeric.hs
- src/StringUtils.hs
- src/IOUtils.hs

max_fragments: 8
max_files: 2
add_garbage_files: false
skip_garbage_check: true
