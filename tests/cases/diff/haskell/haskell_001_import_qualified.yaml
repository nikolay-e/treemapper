    module Lookup
      ( lookupUser
      , lookupUsersByAge
      ) where

    import qualified Data.Map as Map
    import Types (UserId, UserProfile(..))

    type UserStore = Map.Map UserId UserProfile

    lookupUser :: UserStore -> UserId -> Maybe UserProfile
    lookupUser store uid = Map.lookup uid store

    lookupUsersByAge :: UserStore -> Int -> [UserProfile]
    lookupUsersByAge store minAge =
      filter (\p -> profileAge p >= minAge) (Map.elems store)

