name: haskell_001_import_qualified
repo:
  initial_files:
    src/Types.hs: |
      module Types
        ( UserId
        , UserName
        , UserProfile(..)
        ) where

      import Data.Text (Text)

      type UserId = Int

      type UserName = Text

      data UserProfile = UserProfile
        { profileId   :: UserId
        , profileName :: UserName
        , profileAge  :: Int
        }
    src/Lookup.hs: |
      module Lookup
        ( lookupUser
        ) where

      import qualified Data.Map as Map
      import Types (UserId, UserProfile(..))

      type UserStore = Map.Map UserId UserProfile

      lookupUser :: UserStore -> UserId -> Maybe UserProfile
      lookupUser store uid = Map.lookup uid store
    src/Cache.hs: |
      module Cache
        ( insertCache
        , lookupCache
        ) where

      import qualified Data.Map as Map
      GARBAGE_HS_001_CACHE_MARKER_A = "cache"
      GARBAGE_HS_001_CACHE_STORE_B = True

      type CacheMap = Map.Map String String

      insertCache :: CacheMap -> String -> String -> CacheMap
      insertCache m k v = Map.insert k v m

      lookupCache :: CacheMap -> String -> Maybe String
      lookupCache = Map.lookup
    src/Validator.hs: |
      module Validator
        ( validateProfile
        ) where

      import Types (UserProfile(..), UserName)
      import Data.Text (null)
      GARBAGE_HS_001_VALIDATOR_MARKER_C = "validator"
      GARBAGE_HS_001_VALIDATE_CHECK_D = True

      validateProfile :: UserProfile -> Bool
      validateProfile p = not (Data.Text.null (profileName p)) && profileAge p > 0
    src/Logger.hs: |
      module Logger
        ( logInfo
        , logError
        ) where

      GARBAGE_HS_001_LOGGER_MARKER_E = "logger"
      GARBAGE_HS_001_LOG_LEVEL_F = "INFO"

      logInfo :: String -> IO ()
      logInfo msg = putStrLn ("[INFO] " ++ msg)

      logError :: String -> IO ()
      logError msg = putStrLn ("[ERROR] " ++ msg)
    src/Config.hs: |
      module Config
        ( AppConfig(..)
        , loadConfig
        ) where

      GARBAGE_HS_001_CONFIG_MARKER_G = "config"
      GARBAGE_HS_001_ENV_MARKER_H = "production"

      data AppConfig = AppConfig
        { configPort :: Int
        , configHost :: String
        }

      loadConfig :: IO AppConfig
      loadConfig = return (AppConfig 8080 "localhost")
  changed_files:
    src/Types.hs: |
      module Types
        ( UserId
        , UserName
        , UserProfile(..)
        ) where

      import Data.Text (Text)

      type UserId = Int

      type UserName = Text

      data UserProfile = UserProfile
        { profileId   :: UserId
        , profileName :: UserName
        , profileAge  :: Int
        }
    src/Lookup.hs: |
      module Lookup
        ( lookupUser
        , lookupUsersByAge
        ) where

      import qualified Data.Map as Map
      import Types (UserId, UserProfile(..))

      type UserStore = Map.Map UserId UserProfile

      lookupUser :: UserStore -> UserId -> Maybe UserProfile
      lookupUser store uid = Map.lookup uid store

      lookupUsersByAge :: UserStore -> Int -> [UserProfile]
      lookupUsersByAge store minAge =
        filter (\p -> profileAge p >= minAge) (Map.elems store)
    src/Cache.hs: |
      module Cache
        ( insertCache
        , lookupCache
        ) where

      import qualified Data.Map as Map
      GARBAGE_HS_001_CACHE_MARKER_A = "cache"
      GARBAGE_HS_001_CACHE_STORE_B = True

      type CacheMap = Map.Map String String

      insertCache :: CacheMap -> String -> String -> CacheMap
      insertCache m k v = Map.insert k v m

      lookupCache :: CacheMap -> String -> Maybe String
      lookupCache = Map.lookup
    src/Validator.hs: |
      module Validator
        ( validateProfile
        ) where

      import Types (UserProfile(..), UserName)
      import Data.Text (null)
      GARBAGE_HS_001_VALIDATOR_MARKER_C = "validator"
      GARBAGE_HS_001_VALIDATE_CHECK_D = True

      validateProfile :: UserProfile -> Bool
      validateProfile p = not (Data.Text.null (profileName p)) && profileAge p > 0
    src/Logger.hs: |
      module Logger
        ( logInfo
        , logError
        ) where

      GARBAGE_HS_001_LOGGER_MARKER_E = "logger"
      GARBAGE_HS_001_LOG_LEVEL_F = "INFO"

      logInfo :: String -> IO ()
      logInfo msg = putStrLn ("[INFO] " ++ msg)

      logError :: String -> IO ()
      logError msg = putStrLn ("[ERROR] " ++ msg)
    src/Config.hs: |
      module Config
        ( AppConfig(..)
        , loadConfig
        ) where

      GARBAGE_HS_001_CONFIG_MARKER_G = "config"
      GARBAGE_HS_001_ENV_MARKER_H = "production"

      data AppConfig = AppConfig
        { configPort :: Int
        , configHost :: String
        }

      loadConfig :: IO AppConfig
      loadConfig = return (AppConfig 8080 "localhost")
