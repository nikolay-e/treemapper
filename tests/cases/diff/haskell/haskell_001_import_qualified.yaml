# Haskell qualified import: module imports local module and adds new function
# using the local module's type. Context must include the local module with
# the type definition. Noise: other unrelated modules.

max_enrichment: 10.7
initial:
  src/Types.hs: |
    module Types
      ( UserId
      , UserName
      , UserProfile(..)
      ) where

    import Data.Text (Text)

    type UserId = Int

    type UserName = Text

    data UserProfile = UserProfile
      { profileId   :: UserId
      , profileName :: UserName
      , profileAge  :: Int
      }

  src/Lookup.hs: |
    module Lookup
      ( lookupUser
      ) where

    import qualified Data.Map as Map
    import Types (UserId, UserProfile(..))

    type UserStore = Map.Map UserId UserProfile

    lookupUser :: UserStore -> UserId -> Maybe UserProfile
    lookupUser store uid = Map.lookup uid store

  # --- Tricky garbage: also imports Data.Map qualified ---
  src/Cache.hs: |
    module Cache
      ( insertCache
      , lookupCache
      ) where

    import qualified Data.Map as Map
    GARBAGE_HS_001_CACHE_MARKER_A = "cache"
    GARBAGE_HS_001_CACHE_STORE_B = True

    type CacheMap = Map.Map String String

    insertCache :: CacheMap -> String -> String -> CacheMap
    insertCache m k v = Map.insert k v m

    lookupCache :: CacheMap -> String -> Maybe String
    lookupCache = Map.lookup

  # --- Tricky garbage: also imports Types module ---
  src/Validator.hs: |
