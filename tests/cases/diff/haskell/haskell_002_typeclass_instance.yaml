  src/ShapeSerial.hs: |
    module ShapeSerial where

    import Data.Text (Text, pack, unpack)
    import Serializable (Serializable(..))
    import Models (Shape(..))

    instance Serializable Shape where
      serialize (Circle r)      = pack ("circle:" ++ show r)
      serialize (Rectangle w h) = pack ("rect:" ++ show w ++ ":" ++ show h)

      deserialize t = case break (== ':') (unpack t) of
        ("circle", ':':r)  -> Just (Circle (read r))
        ("rect", ':':rest) -> case break (== ':') rest of
          (w, ':':h) -> Just (Rectangle (read w) (read h))
          _          -> Nothing
        _ -> Nothing

