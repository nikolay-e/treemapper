    data Shape = Circle Double | Rectangle Double Double
      deriving (Show, Read, Eq)

  src/ColorSerial.hs: |
    module ColorSerial where

    import Data.Text (Text, pack, unpack)
    import Serializable (Serializable(..))
    import Models (Color(..))

    instance Serializable Color where
      serialize Red   = pack "red"
      serialize Green = pack "green"
