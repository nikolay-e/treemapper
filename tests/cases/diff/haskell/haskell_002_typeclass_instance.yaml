# === Assertions ===

must_include_files:
- src/ShapeSerial.hs

must_include_content_from:
  src/ShapeSerial.hs:
    - instance Serializable Shape where
    - serialize (Circle r)
    - serialize (Rectangle w h)
  src/Serializable.hs:
    - class Serializable a where
    - serialize   :: a -> Text

must_not_include:
# Tricky: another typeclass definition
- GARBAGE_HS_002_PRINTABLE_CLASS_A
- GARBAGE_HS_002_DISPLAY_MARKER_B
# Tricky: also implements Serializable
- GARBAGE_HS_002_STRING_SERIAL_C
- GARBAGE_HS_002_TEXT_CONVERT_D
# Tricky: also references Shape type
- GARBAGE_HS_002_DRAWING_MARKER_E
- GARBAGE_HS_002_CANVAS_MARKER_F
# Plain garbage
- GARBAGE_HS_002_UTILS_MARKER_G
- GARBAGE_HS_002_HELPER_MARKER_H

must_not_include_files:
- src/Printable.hs
- src/StringSerial.hs
- src/Drawing.hs
- src/Utils.hs

