# Haskell where clause with shared types: helper function in where clause
# is modified to use a new type from the Types module. Context must include
# the Types module. Noise: other function modules.

max_enrichment: 15.4
initial:
  src/Types.hs: |
    module Types
      ( Temperature(..)
      , Measurement(..)
      , Unit(..)
      ) where

    data Unit = Celsius | Fahrenheit | Kelvin
      deriving (Show, Eq)

    data Temperature = Temperature
      { tempValue :: Double
      , tempUnit  :: Unit
      } deriving (Show, Eq)

    data Measurement = Measurement
      { measLabel :: String
      , measTemp  :: Temperature
      } deriving (Show, Eq)

  src/Converter.hs: |
    module Converter
      ( convertTemp
      ) where

    import Types (Temperature(..), Unit(..))

    convertTemp :: Temperature -> Unit -> Temperature
    convertTemp temp targetUnit =
      let celsiusVal = toCelsius temp
      in fromCelsius celsiusVal targetUnit
      where
        toCelsius (Temperature v Celsius)    = v
        toCelsius (Temperature v Fahrenheit) = (v - 32) * 5 / 9
        toCelsius (Temperature v Kelvin)     = v - 273.15

        fromCelsius c Celsius    = Temperature c Celsius
        fromCelsius c Fahrenheit = Temperature (c * 9 / 5 + 32) Fahrenheit
        fromCelsius c Kelvin     = Temperature (c + 273.15) Kelvin

  # --- Tricky garbage: also imports Types and Temperature ---
  src/Display.hs: |
    module Display
      ( displayTemp
      ) where

    import Types (Temperature(..), Unit(..))
    GARBAGE_HS_005_DISPLAY_MARKER_A = "display"
    GARBAGE_HS_005_FORMAT_TEMP_B = True

    displayTemp :: Temperature -> String
    displayTemp (Temperature v u) =
      show v ++ " " ++ unitSymbol u
      where
        unitSymbol Celsius    = "°C"
        unitSymbol Fahrenheit = "°F"
        unitSymbol Kelvin     = "K"

  # --- Tricky garbage: also uses where clause with helpers ---
  src/Validator.hs: |
    module Validator
      ( validateRange
      ) where

    GARBAGE_HS_005_VALIDATOR_MARKER_C = "validator"
    GARBAGE_HS_005_RANGE_CHECK_D = True

    validateRange :: Double -> Double -> Double -> Bool
    validateRange lo hi val = isInRange val
      where
        isInRange x = x >= lo && x <= hi

  # --- Tricky garbage: also imports Measurement ---
  src/Reporter.hs: |
    module Reporter
      ( generateReport
      ) where

    import Types (Measurement(..), Temperature(..))
    GARBAGE_HS_005_REPORTER_MARKER_E = "reporter"
    GARBAGE_HS_005_REPORT_GEN_F = True

    generateReport :: [Measurement] -> String
    generateReport ms = unlines (map formatMeas ms)
      where
        formatMeas m = measLabel m ++ ": " ++ show (tempValue (measTemp m))

  # --- Plain garbage ---
  src/Parser.hs: |
    module Parser
      ( parseInput
      ) where

    GARBAGE_HS_005_PARSER_MARKER_G = "parser"
    GARBAGE_HS_005_PARSE_LINE_H = True

    parseInput :: String -> Maybe (String, Double)
    parseInput line = case words line of
      [label, val] -> Just (label, read val)
      _            -> Nothing

