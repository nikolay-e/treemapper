# === Assertions ===

must_include_files:
- src/Converter.hs

must_include_content_from:
  src/Converter.hs:
    - convertMeasurement :: Measurement -> Unit -> Measurement
    - convertedTemp = convertTemp (measTemp meas) targetUnit
  src/Types.hs:
    - data Measurement = Measurement
    - measTemp  :: Temperature

must_not_include:
# Tricky: also imports Types and Temperature
- GARBAGE_HS_005_DISPLAY_MARKER_A
- GARBAGE_HS_005_FORMAT_TEMP_B
# Tricky: also uses where clause pattern
- GARBAGE_HS_005_VALIDATOR_MARKER_C
- GARBAGE_HS_005_RANGE_CHECK_D
# Tricky: also imports Measurement
- GARBAGE_HS_005_REPORTER_MARKER_E
- GARBAGE_HS_005_REPORT_GEN_F
# Plain garbage
- GARBAGE_HS_005_PARSER_MARKER_G
- GARBAGE_HS_005_PARSE_LINE_H

must_not_include_files:
- src/Display.hs
- src/Validator.hs
- src/Reporter.hs
