name: jvm_and_compiled_015_csharp_dependency_injection
tags:
- lang:csharp
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    Interfaces/IUserService.cs: |
      using MyApp.Models;

      namespace MyApp.Interfaces
      {
          public interface IUserService
          {
              User GetUser(int id);
              void CreateUser(User user);
          }
      }
    Services/UserService.cs: |
      using MyApp.Interfaces;
      using MyApp.Models;

      namespace MyApp.Services
      {
          public class UserService : IUserService
          {
              private readonly IUserRepository _repository;

              public UserService(IUserRepository repository)
              {
                  _repository = repository;
              }

              public User GetUser(int id)
              {
                  return _repository.FindById(id);
              }

              public void CreateUser(User user)
              {
                  _repository.Add(user);
                  _repository.SaveChanges();
              }
          }
      }
    Startup.cs: |
      namespace MyApp
      {
          class Startup { }
      }
    Services/ProductService.cs: |
      using MyApp.Interfaces;
      using MyApp.Models;

      namespace MyApp.Services
      {
          public class ProductService : IProductService
          {
              private readonly IProductRepository _repository;

              public ProductService(IProductRepository repository)
              {
                  _repository = repository;
              }

              public Product GetProduct(int id)
              {
                  return _repository.FindById(id);
              }

              public void CreateProduct(Product product)
              {
                  _repository.Add(product);
                  _repository.SaveChanges();
              }
          }
      }
    Controllers/UserController.cs: |
      using Microsoft.AspNetCore.Mvc;
      using MyApp.Interfaces;
      using MyApp.Models;

      namespace MyApp.Controllers
      {
          [ApiController]
          [Route("api/[controller]")]
          public class UserController : ControllerBase
          {
              private readonly IUserService _userService;

              public UserController(IUserService userService)
              {
                  _userService = userService;
              }

              [HttpGet("{id}")]
              public ActionResult<User> Get(int id)
              {
                  var user = _userService.GetUser(id);
                  return user != null ? Ok(user) : NotFound();
              }
          }
      }
    Tests/UserServiceTests.cs: |
      using MyApp.Interfaces;
      using MyApp.Services;
      using Xunit;

      namespace MyApp.Tests
      {
          public class UserServiceTests
          {
              [Fact]
              public void GetUser_ReturnsUserFromRepository()
              {
                  var mockRepo = new MockUserRepository();
                  var service = new UserService(mockRepo);
                  var user = service.GetUser(1);
                  Assert.NotNull(user);
              }
          }
      }
    Middleware/RequestLoggingMiddleware.cs: |
      using Microsoft.AspNetCore.Http;

      namespace MyApp.Middleware
      {
          public class RequestLoggingMiddleware
          {
              private readonly RequestDelegate _next;

              public RequestLoggingMiddleware(RequestDelegate next)
              {
                  _next = next;
              }

              public async Task InvokeAsync(HttpContext context)
              {
                  var path = context.Request.Path;
                  Console.WriteLine($"Request: {context.Request.Method} {path}");
                  await _next(context);
                  Console.WriteLine($"Response: {context.Response.StatusCode}");
              }
          }
      }
  changed_files:
    Startup.cs: |
      using Microsoft.Extensions.DependencyInjection;
      using MyApp.Interfaces;
      using MyApp.Services;

      namespace MyApp
      {
          class Startup
          {
              public void ConfigureServices(IServiceCollection services)
              {
                  services.AddScoped<IUserService, UserService>();
              }
          }
      }
  commit_message: Update files
