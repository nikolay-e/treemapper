    CLAUDE.md: |
      # Project Guide

      ## Architecture

      The project uses a layered architecture with clear separation of concerns.

      ### Data Layer

      All data access goes through repository classes that abstract the database.
      Repositories handle connection pooling, query building, and result mapping.

      ### Service Layer

      Business logic lives in service classes that orchestrate repository calls.
      Services validate inputs, enforce business rules, and coordinate transactions.

      ### API Layer

      REST endpoints map to service methods with request/response serialization.
      Authentication middleware runs before route handlers.

      ## Diff Context Algorithm

      The diff context algorithm uses Personalized PageRank to rank code fragments
      by their relevance to a given git diff. The algorithm works in three phases:

      1. Parse the diff to identify changed lines and files
      2. Build a dependency graph from imports and function calls
      3. Run PPR with changed nodes as seed set to rank all fragments

      The selection phase uses lazy greedy optimization to pick fragments within
      a token budget while maximizing total relevance score.

      ## Development Workflow

      - Run tests with pytest
      - Format with black and isort
      - Lint with ruff
      - Type check with mypy

      ## Deployment

      Deployment uses Docker containers pushed to GHCR.
      ArgoCD syncs from the gitops repository automatically.
    src/cli.py: |
      import argparse

      def create_parser() -> argparse.ArgumentParser:
          parser = argparse.ArgumentParser(description="My tool")
          parser.add_argument("path", help="Path to analyze")
          parser.add_argument("--format", choices=["yaml", "json"], default="yaml")
          return parser

      def main() -> None:
          parser = create_parser()
          args = parser.parse_args()
          print(f"Analyzing {args.path} in {args.format} format")
