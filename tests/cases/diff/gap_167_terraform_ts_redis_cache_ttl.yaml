name: gap_167_terraform_ts_redis_cache_ttl
tags:
- change:config
- change:single_file
- context:cross_module
- difficulty:medium
- distance:2hop
- lang:terraform
- lang:typescript
fixtures:
  auto_garbage: true
repo:
  initial_files:
    iac/elasticache.tf: |
      resource "aws_elasticache_replication_group" "sessions" {
        replication_group_id = "session-store"
        description          = "Session cache"
        node_type            = "cache.t3.micro"
        num_cache_clusters   = 2
        engine               = "redis"
        engine_version       = "7.0"
        port                 = 6379

        parameter_group_name = aws_elasticache_parameter_group.custom.name
      }

      resource "aws_elasticache_parameter_group" "custom" {
        family = "redis7"
        name   = "session-params"

        parameter {
          name  = "maxmemory-policy"
          value = "allkeys-lru"
        }
      }
    backend/src/cache/sessionCache.ts: |
      export interface CacheOptions {
        host: string;
        port: number;
        defaultTtlSeconds: number;
      }

      export class SessionCache {
        private options: CacheOptions;

        constructor(options: CacheOptions) {
          this.options = options;
        }

        async set(key: string, value: string): Promise<void> {
          console.log(`SET ${key} EX ${this.options.defaultTtlSeconds}`);
        }

        async get(key: string): Promise<string | null> {
          console.log(`GET ${key}`);
          return null;
        }
      }
    backend/src/middleware/auth.ts: |
      export function validateToken(token: string): boolean {
        return token.length > 20 && token.startsWith("Bearer ");
      }

      export function extractUserId(token: string): string {
        return token.split(".")[1] || "";
      }
    backend/src/routes/health.ts: |
      export function healthCheck(): { status: string; uptime: number } {
        return { status: "ok", uptime: process.uptime() };
      }
  changed_files:
    iac/elasticache.tf: |
      resource "aws_elasticache_replication_group" "sessions" {
        replication_group_id = "session-store"
        description          = "Session cache"
        node_type            = "cache.t3.micro"
        num_cache_clusters   = 2
        engine               = "redis"
        engine_version       = "7.0"
        port                 = 6379

        parameter_group_name = aws_elasticache_parameter_group.custom.name
      }

      resource "aws_elasticache_parameter_group" "custom" {
        family = "redis7"
        name   = "session-params"

        parameter {
          name  = "maxmemory-policy"
          value = "volatile-ttl"
        }
      }
fragments:
- id: tf_eviction_policy
  selector:
    path: iac/elasticache.tf
    anchor: volatile-ttl
- id: ts_cache_ttl
  selector:
    path: backend/src/cache/sessionCache.ts
    anchor: defaultTtlSeconds
- id: ts_cache_set
  selector:
    path: backend/src/cache/sessionCache.ts
    anchor: "async set"
- id: no_auth
  selector:
    path: backend/src/middleware/auth.ts
- id: no_health
  selector:
    path: backend/src/routes/health.ts
oracle:
  required:
  - tf_eviction_policy
  - ts_cache_ttl
  forbidden:
  - no_auth
  - no_health
