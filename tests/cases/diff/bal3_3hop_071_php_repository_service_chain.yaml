    src/Database/Connection.php: |
      <?php
      namespace App\Database;

      class Connection {
          private string $dsn;
          private int $timeout;
          public function __construct(string $dsn, int $timeout = 30) {
              $this->dsn = $dsn;
              $this->timeout = $timeout;
          }
          public function query(string $sql): array {
              return [];
