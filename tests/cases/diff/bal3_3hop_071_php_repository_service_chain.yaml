    src/Repositories/UserRepository.php: |
      <?php
      namespace App\Repositories;

      use App\Database\Connection;

      class UserRepository {
          private Connection $db;
          public function __construct(Connection $db) {
              $this->db = $db;
          }
          public function findById(int $id): ?array {
              return $this->db->query("SELECT * FROM users WHERE id = $id")[0] ?? null;
          }
          public function findPaginated(int $limit, int $offset): array {
              return $this->db->queryPaginated("SELECT * FROM users", $limit, $offset);
          }
      }
    src/Services/UserService.php: |
      <?php
      namespace App\Services;

      use App\Repositories\UserRepository;

      class UserService {
          private UserRepository $repo;
          public function __construct(UserRepository $repo) {
              $this->repo = $repo;
          }
          public function getUser(int $id): ?array {
              return $this->repo->findById($id);
          }
          public function listUsers(int $page, int $perPage): array {
              return $this->repo->findPaginated($perPage, ($page - 1) * $perPage);
          }
      }
    src/Controllers/UserController.php: |
      <?php
      namespace App\Controllers;

      use App\Services\UserService;

      class UserController {
          private UserService $service;
          public function __construct(UserService $service) {
              $this->service = $service;
          }
          public function show(int $id): array {
              $user = $this->service->getUser($id);
              return ['user' => $user];
          }
          public function index(int $page = 1): array {
              $users = $this->service->listUsers($page, 20);
              return ['users' => $users];
          }
      }
