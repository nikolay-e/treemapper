    src/main/java/com/ecommerce/validation/ProductLookup.java: |
      package com.ecommerce.validation;

      import com.ecommerce.Product;
      import com.ecommerce.ProductRepository;

      public class ProductLookup {
          private final ProductRepository repository;

          public ProductLookup(ProductRepository repository) {
              this.repository = repository;
          }

          public Product requireProduct(String productId) {
              if (productId == null || productId.isBlank()) {
                  throw new IllegalArgumentException("Product ID required");
              }
              Product product = repository.findById(productId);
              if (product == null) {
                  throw new IllegalStateException("Product not found: " + productId);
              }
              return product;
          }
      }
    src/main/java/com/ecommerce/ProductRepository.java: |
      package com.ecommerce;

      public interface ProductRepository {
          Product findById(String productId);
      }
