    src/main/java/com/ecommerce/CartService.java: |
      package com.ecommerce;

      import java.util.ArrayList;
      import java.util.List;

      public class CartService {
          private final ProductRepository products;

          public CartService(ProductRepository products) {
              this.products = products;
          }

          public Cart addItem(Cart cart, String productId, int quantity) {
              if (productId == null || productId.isBlank()) {
                  throw new IllegalArgumentException("Product ID required");
              }
              if (quantity <= 0) {
                  throw new IllegalArgumentException("Quantity must be positive");
              }
              Product product = products.findById(productId);
              if (product == null) {
                  throw new IllegalStateException("Product not found: " + productId);
              }
              cart.addItem(new CartItem(product, quantity));
              return cart;
          }
      }
    src/main/java/com/ecommerce/WishlistService.java: |
      package com.ecommerce;

      public class WishlistService {
          private final ProductRepository products;

          public WishlistService(ProductRepository products) {
              this.products = products;
          }

          public Wishlist addToWishlist(Wishlist wishlist, String productId) {
              if (productId == null || productId.isBlank()) {
                  throw new IllegalArgumentException("Product ID required");
              }
              Product product = products.findById(productId);
              if (product == null) {
                  throw new IllegalStateException("Product not found: " + productId);
              }
              wishlist.add(product);
              return wishlist;
          }
      }
    src/main/java/com/ecommerce/ProductRepository.java: |
      package com.ecommerce;

      public interface ProductRepository {
          Product findById(String productId);
      }
