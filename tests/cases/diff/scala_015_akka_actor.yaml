repo:
  initial_files:
    Messages.scala: |
      sealed trait UserMessage
      case class CreateUser(name: String) extends UserMessage
      case class DeleteUser(id: String) extends UserMessage
      case class GetUser(id: String) extends UserMessage
      case class UserCreated(id: String, name: String)
    UserActor.scala: |
      class UserActor {}
    OrderActor.scala: |
      import akka.actor.{Actor, ActorLogging}

      sealed trait OrderMessage
      case class PlaceOrder(item: String, quantity: Int) extends OrderMessage
      case class CancelOrder(orderId: String) extends OrderMessage

      class OrderActor extends Actor with ActorLogging {
        private var orders: Map[String, String] = Map.empty

        def receive: Receive = {
          case PlaceOrder(item, quantity) =>
            val id = java.util.UUID.randomUUID().toString
            orders = orders + (id -> item)
            log.info(s"Placed order $id: $quantity x $item")

          case CancelOrder(orderId) =>
            orders = orders - orderId
        }
      }
    UserRepository.scala: |
      class UserRepository {
        private var users: Map[String, String] = Map.empty

        def create(name: String): String = {
          val id = java.util.UUID.randomUUID().toString
          users = users + (id -> name)
          id
        }

        def find(id: String): Option[String] = users.get(id)

        def delete(id: String): Boolean = {
          val existed = users.contains(id)
          users = users - id
          existed
        }

        def count: Int = users.size
      }
  changed_files:
    Messages.scala: |
      sealed trait UserMessage
      case class CreateUser(name: String) extends UserMessage
      case class DeleteUser(id: String) extends UserMessage
      case class GetUser(id: String) extends UserMessage
      case class UserCreated(id: String, name: String)
    UserActor.scala: |
      import akka.actor.{Actor, ActorLogging, Props}

      class UserActor extends Actor with ActorLogging {
        private var users: Map[String, String] = Map.empty

        def receive: Receive = {
          case CreateUser(name) =>
            val id = java.util.UUID.randomUUID().toString
            users = users + (id -> name)
            log.info(s"Created user $id: $name")
            sender() ! UserCreated(id, name)

          case DeleteUser(id) =>
            users = users - id
            log.info(s"Deleted user $id")

          case GetUser(id) =>
            sender() ! users.get(id)
        }
      }

      object UserActor {
        def props: Props = Props[UserActor]()
      }
    OrderActor.scala: |
      import akka.actor.{Actor, ActorLogging}

      sealed trait OrderMessage
      case class PlaceOrder(item: String, quantity: Int) extends OrderMessage
