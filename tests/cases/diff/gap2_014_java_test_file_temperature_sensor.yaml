    src/main/java/com/iot/sensor/TemperatureSensor.java: |
      package com.iot.sensor;

      import java.util.ArrayList;
      import java.util.List;

      public class TemperatureSensor {
          private final String sensorId;
          private final List<Double> readings;

          public TemperatureSensor(String sensorId) {
              this.sensorId = sensorId;
              this.readings = new ArrayList<>();
          }

          public void record(double celsius) {
              readings.add(celsius);
          }

          public double average() {
              if (readings.isEmpty()) return 0.0;
              return readings.stream().mapToDouble(Double::doubleValue).average().orElse(0.0);
          }

          public String getSensorId() {
              return sensorId;
          }
      }
    src/main/java/com/iot/alert/AlertThreshold.java: |
      package com.iot.alert;

      public class AlertThreshold {
          private final double minCelsius;
          private final double maxCelsius;

          public AlertThreshold(double minCelsius, double maxCelsius) {
              this.minCelsius = minCelsius;
              this.maxCelsius = maxCelsius;
          }

          public boolean isBreached(double value) {
              return value < minCelsius || value > maxCelsius;
          }

          public double getMinCelsius() { return minCelsius; }
          public double getMaxCelsius() { return maxCelsius; }
      }
    src/test/java/com/iot/sensor/TemperatureSensorTest.java: |
      package com.iot.sensor;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      class TemperatureSensorTest {
          @Test
          void averageOfEmptyReturnsZero() {
              TemperatureSensor sensor = new TemperatureSensor("S1");
              assertEquals(0.0, sensor.average());
          }

          @Test
          void averageComputesCorrectly() {
              TemperatureSensor sensor = new TemperatureSensor("S1");
              sensor.record(20.0);
              sensor.record(30.0);
              assertEquals(25.0, sensor.average(), 0.001);
          }
      }
