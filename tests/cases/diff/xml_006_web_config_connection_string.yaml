name: xml_006_web_config_connection_string
tags:
- lang:xml
- lang:csharp
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    Web.config: |
      <?xml version="1.0" encoding="utf-8"?>
      <configuration>
        <connectionStrings>
          <add name="DefaultConnection"
               connectionString="Server=localhost;Database=LegacyDb;Integrated Security=True"
               providerName="System.Data.SqlClient"/>
        </connectionStrings>
        <appSettings>
          <add key="PageSize" value="20"/>
        </appSettings>
      </configuration>
    DataAccess/CustomerRepository.cs: |
      using System.Configuration;
      using System.Data.SqlClient;
      namespace DataAccess;
      public class CustomerRepository
      {
          private readonly string _connStr;
          public CustomerRepository()
          {
              _connStr = ConfigurationManager.ConnectionStrings["DefaultConnection"].ConnectionString;
          }
          public Customer FindById(int id)
          {
              using var conn = new SqlConnection(_connStr);
              conn.Open();
              using var cmd = conn.CreateCommand();
              cmd.CommandText = "SELECT * FROM Customers WHERE Id = @id";
              cmd.Parameters.AddWithValue("@id", id);
              using var reader = cmd.ExecuteReader();
              return reader.Read() ? Map(reader) : null;
          }
          private static Customer Map(SqlDataReader r) =>
              new Customer { Id = (int)r["Id"], Name = (string)r["Name"] };
      }
    DataAccess/OrderRepository.cs: |
      using System.Configuration;
      using System.Data.SqlClient;
      namespace DataAccess;
      public class OrderRepository
      {
          private readonly string _connStr;
          public OrderRepository()
          {
              _connStr = ConfigurationManager.ConnectionStrings["DefaultConnection"].ConnectionString;
          }
          public void Save(Order order)
          {
              using var conn = new SqlConnection(_connStr);
              conn.Open();
              using var cmd = conn.CreateCommand();
              cmd.CommandText = "INSERT INTO Orders (CustomerId, Total) VALUES (@cid, @total)";
              cmd.Parameters.AddWithValue("@cid", order.CustomerId);
              cmd.Parameters.AddWithValue("@total", order.Total);
              cmd.ExecuteNonQuery();
          }
      }
    XML_NOISE_006_nlog.config: |
      <?xml version="1.0" encoding="utf-8"?>
      <nlog xmlns="http://www.nlog-project.org/schemas/NLog.xsd">
        <!-- XML_NOISE_006_NLOG_TARGET -->
        <targets>
          <target xsi:type="File" name="XML_NOISE_006_FileTarget" fileName="logs/app.log"/>
        </targets>
        <rules>
          <logger name="*" minlevel="Info" writeTo="XML_NOISE_006_FileTarget"/>
        </rules>
      </nlog>
    garbage/CacheHelper.cs: |
