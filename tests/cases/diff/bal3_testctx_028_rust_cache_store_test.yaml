      pub struct Counter {
          value: u64,
      }

      impl Counter {
          pub fn new() -> Self {
              Counter { value: 0 }
          }

          pub fn increment(&mut self) {
              self.value += 1;
          }

          pub fn get(&self) -> u64 {
              self.value
          }
      }
  changed_files:
    src/cache.rs: |
      use std::collections::HashMap;
      use std::time::{Duration, Instant};

      struct CacheEntry {
          value: String,
          expires_at: Option<Instant>,
      }

      pub struct Cache {
          data: HashMap<String, CacheEntry>,
          max_size: usize,
      }

      impl Cache {
          pub fn new() -> Self {
              Cache { data: HashMap::new(), max_size: 1000 }
          }

          pub fn with_max_size(max_size: usize) -> Self {
              Cache { data: HashMap::new(), max_size }
          }

          pub fn put(&mut self, key: String, value: String) {
              if self.data.len() >= self.max_size && !self.data.contains_key(&key) {
                  self.evict_expired();
              }
              self.data.insert(key, CacheEntry { value, expires_at: None });
          }

          pub fn put_with_ttl(&mut self, key: String, value: String, ttl: Duration) {
              let expires_at = Some(Instant::now() + ttl);
              self.data.insert(key, CacheEntry { value, expires_at });
          }

          pub fn get(&self, key: &str) -> Option<&str> {
              self.data.get(key).and_then(|entry| {
                  if let Some(exp) = entry.expires_at {
                      if Instant::now() > exp {
                          return None;
                      }
                  }
                  Some(entry.value.as_str())
              })
          }

          pub fn remove(&mut self, key: &str) -> Option<String> {
              self.data.remove(key).map(|entry| entry.value)
          }

          pub fn clear(&mut self) {
              self.data.clear();
          }

          pub fn len(&self) -> usize {
              self.data.len()
          }

          fn evict_expired(&mut self) {
              let now = Instant::now();
              self.data.retain(|_, entry| {
                  entry.expires_at.map_or(true, |exp| now <= exp)
              });
          }
      }
  commit_message: "refactor: add TTL support, max_size, and eviction to Cache"
