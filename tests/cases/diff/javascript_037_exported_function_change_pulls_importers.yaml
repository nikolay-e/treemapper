name: javascript_037_exported_function_change_pulls_importers
tags:
- lang:typescript
- change:single_file
- change:bug_fix
- context:import_chain
- distance:2hop
- difficulty:easy
repo:
  initial_files:
    utils.ts: |
      export function fetchUser(id: string) {
          return fetch(`/api/users/${id}`);
      }
    consumer.ts: |
      import { fetchUser } from './utils';

      async function loadUser(id: string) {
          const response = await fetchUser(id);
          return response.json();
      }
    url-builder.ts: |
      export function buildApiUrl(path: string, params?: Record<string, string>): string {
          const base = '/api';
          const url = new URL(`${base}${path}`, 'http://localhost');
          if (params) {
              Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
          }
          return url.pathname + url.search;
      }
    user-cache.ts: |
      const cache = new Map<string, { data: unknown; expiry: number }>();

      export function getCachedUser(id: string): unknown | null {
          const entry = cache.get(id);
          if (!entry || entry.expiry < Date.now()) return null;
          return entry.data;
      }

      export function setCachedUser(id: string, data: unknown, ttl: number = 60000): void {
          cache.set(id, { data, expiry: Date.now() + ttl });
      }
  changed_files:
