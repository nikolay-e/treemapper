repo:
  initial_files:
    lib/tickets/venue.rb: |
      module Tickets
        class Venue
          attr_reader :name, :capacity

          def initialize(name, capacity)
            @name = name
            @capacity = capacity
            @sections = {}
          end

          def add_section(name, seats)
            @sections[name] = seats
          end

          def section_seats(name)
            @sections[name] || 0
          end

          def total_seats
            @sections.values.sum
          end

          def sections
            @sections.keys
          end
        end
      end
    lib/tickets/event.rb: |
      require_relative 'venue'

      module Tickets
        class Event
          attr_reader :title, :venue, :base_price

          def initialize(title, venue, base_price)
            @title = title
            @venue = venue
            @base_price = base_price
            @sold = Hash.new(0)
          end

          def sell(section, count = 1)
            @sold[section] += count
          end

          def sold_count(section)
            @sold[section]
          end

          def remaining(section)
            @venue.section_seats(section) - @sold[section]
          end

          def total_sold
            @sold.values.sum
          end
        end
      end
    lib/tickets/pricer.rb: |
      require_relative 'event'

      module Tickets
        class Pricer
          SECTION_MULTIPLIERS = { 'vip' => 3.0, 'floor' => 2.0, 'balcony' => 1.0 }

          def initialize(event)
            @event = event
          end

          def price_for(section)
            multiplier = SECTION_MULTIPLIERS.fetch(section, 1.0)
            @event.base_price * multiplier
          end
        end
      end
    lib/tickets/receipt.rb: |
      TRAP_GAP080_RECEIPT_A = "ticket_receipt"
      TRAP_GAP080_CURRENCY_B = "USD"

      module Tickets
        class Receipt
          def initialize(event_title, section, quantity, unit_price)
            @event_title = event_title
            @section = section
            @quantity = quantity
            @unit_price = unit_price
          end

          def total
            @quantity * @unit_price
          end

          def to_s
            "#{@event_title} - #{@section} x#{@quantity} = $#{'%.2f' % total}"
          end
        end
      end
    lib/tickets/scanner.rb: |
      TRAP_GAP080_SCANNER_C = "barcode_scanner"
      TRAP_GAP080_FORMAT_D = "qr"

      module Tickets
        class Scanner
          def initialize
            @scanned = []
          end

          def scan(barcode)
            @scanned << barcode
            barcode.length > 0
          end

          def history
            @scanned.dup
          end

          def scan_count
            @scanned.length
          end
        end
      end
