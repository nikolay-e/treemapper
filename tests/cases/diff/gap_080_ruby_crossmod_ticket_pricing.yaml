    lib/tickets/pricer.rb: |
      require_relative 'event'

      module Tickets
        class Pricer
          SECTION_MULTIPLIERS = { 'vip' => 3.0, 'floor' => 2.0, 'balcony' => 1.0 }
          SURGE_THRESHOLD = 0.8

          def initialize(event)
            @event = event
          end

          def price_for(section)
            multiplier = SECTION_MULTIPLIERS.fetch(section, 1.0)
            @event.base_price * multiplier
          end

          def dynamic_price(section)
            base = price_for(section)
            capacity = @event.venue.section_seats(section)
            return base if capacity == 0
            fill_ratio = @event.sold_count(section).to_f / capacity
            fill_ratio >= SURGE_THRESHOLD ? base * 1.5 : base
          end

          def revenue_estimate
            @event.venue.sections.sum do |section|
              seats = @event.venue.section_seats(section)
              price_for(section) * seats
            end
          end
        end
      end
