    src/cdn/invalidator.rs: |
      use crate::cache::manifest::CacheManifest;

      pub struct CdnInvalidator {
          manifest: CacheManifest,
          base_url: String,
      }

      impl CdnInvalidator {
          pub fn new(manifest: CacheManifest, base_url: &str) -> Self {
              CdnInvalidator { manifest, base_url: base_url.to_string() }
          }

          pub fn invalidate(&mut self, path: &str) -> Vec<String> {
              let patterns = self.manifest.patterns_for(path);
              self.manifest.remove(path);
              patterns.iter().map(|p| format!("{}/{}", self.base_url, p)).collect()
          }

          pub fn invalidate_all(&mut self) -> usize {
              let count = self.manifest.len();
              self.manifest.clear();
              count
          }

          pub fn manifest_len(&self) -> usize {
              self.manifest.len()
          }
      }
