  initial_files:
    src/cdn/invalidator.rs: |
      use crate::cache::manifest::CacheManifest;

      pub struct CdnInvalidator {
          manifest: CacheManifest,
          base_url: String,
      }

      impl CdnInvalidator {
          pub fn new(manifest: CacheManifest, base_url: &str) -> Self {
              CdnInvalidator { manifest, base_url: base_url.to_string() }
          }

          pub fn invalidate(&mut self, path: &str) -> Vec<String> {
              let patterns = self.manifest.patterns_for(path);
              patterns.iter().map(|p| format!("{}/{}", self.base_url, p)).collect()
              // BUG: does not remove invalidated entries from manifest
          }

          pub fn invalidate_all(&mut self) -> usize {
              let count = self.manifest.len();
              self.manifest.clear();
              count
          }
      }
    src/cache/manifest.rs: |
      use std::collections::HashMap;

      pub struct CacheManifest {
          entries: HashMap<String, Vec<String>>,
      }

      impl CacheManifest {
          pub fn new() -> Self {
              CacheManifest { entries: HashMap::new() }
          }

          pub fn register(&mut self, path: &str, patterns: Vec<String>) {
              self.entries.insert(path.to_string(), patterns);
          }

          pub fn patterns_for(&self, path: &str) -> Vec<String> {
              self.entries.get(path).cloned().unwrap_or_default()
          }

          pub fn remove(&mut self, path: &str) {
              self.entries.remove(path);
          }

          pub fn clear(&mut self) {
              self.entries.clear();
          }

          pub fn len(&self) -> usize {
              self.entries.len()
          }
      }
    src/metrics/counters.rs: |
      use crate::cdn::invalidator::CdnInvalidator;

      pub fn count_pending(invalidator: &CdnInvalidator) -> usize {
          invalidator.manifest_len()
      }
