    src/order.rs: |
      #[derive(Debug, Clone, PartialEq)]
      pub enum OrderStatus {
          Pending,
          Processing,
          Shipped,
          Delivered,
          Cancelled,
      }

      pub struct Order {
          pub id: String,
          pub customer_id: String,
          pub total_usd: f64,
          pub status: OrderStatus,
          pub tracking_code: Option<String>,
      }

      impl Order {
          pub fn new(id: &str, customer_id: &str, total_usd: f64) -> Self {
              Self {
                  id: id.to_string(),
                  customer_id: customer_id.to_string(),
                  total_usd,
                  status: OrderStatus::Pending,
                  tracking_code: None,
              }
          }

          pub fn advance(&mut self) {
              self.status = match self.status {
                  OrderStatus::Pending    => OrderStatus::Processing,
                  OrderStatus::Processing => OrderStatus::Shipped,
                  OrderStatus::Shipped    => OrderStatus::Delivered,
                  OrderStatus::Delivered  => OrderStatus::Delivered,
                  OrderStatus::Cancelled  => OrderStatus::Cancelled,
              };
          }

          pub fn cancel(&mut self) {
              if self.status != OrderStatus::Delivered {
                  self.status = OrderStatus::Cancelled;
              }
          }

          pub fn is_complete(&self) -> bool {
              self.status == OrderStatus::Delivered
          }

          pub fn is_active(&self) -> bool {
              self.status != OrderStatus::Delivered && self.status != OrderStatus::Cancelled
          }
      }
    src/fulfillment.rs: |
      use crate::order::{Order, OrderStatus};

      pub struct FulfillmentEngine {
          orders: Vec<Order>,
      }

      impl FulfillmentEngine {
          pub fn new() -> Self {
              Self { orders: Vec::new() }
          }

          pub fn add_order(&mut self, o: Order) {
              self.orders.push(o);
          }

          pub fn pending_count(&self) -> usize {
              self.orders.iter().filter(|o| o.status == OrderStatus::Pending).count()
          }

          pub fn active_count(&self) -> usize {
              self.orders.iter().filter(|o| o.is_active()).count()
          }
      }
    src/RARE005_payments.rs: |
      // RARE005_GARBAGE_A = "payments_marker"
      pub fn charge(_amount: f64) -> bool { true }
    src/RARE005_notifications.rs: |
      // RARE005_GARBAGE_B = "notifications_marker"
      pub fn send_email(_to: &str, _msg: &str) {}
    src/RARE005_reports.rs: |
      // RARE005_GARBAGE_C = "reports_marker"
      pub fn generate_daily_report() -> String { String::new() }
