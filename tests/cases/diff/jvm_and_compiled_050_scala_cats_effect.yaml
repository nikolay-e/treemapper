repo:
  initial_files:
    Database.scala: |
      import cats.effect.IO

      object Database {
        def connect(): IO[Unit] = IO(println("Connected to database"))

        def disconnect(): IO[Unit] = IO(println("Disconnected from database"))

        def query(sql: String): IO[List[String]] = IO {
          println(s"Executing: $sql")
          List("result1", "result2", "result3")
        }

        def execute(sql: String): IO[Int] = IO {
          println(s"Executing: $sql")
          1
        }
      }
    Program.scala: |
      object Program {}
    HttpServer.scala: |
      import cats.effect.{IO, IOApp, ExitCode}

      object HttpServer extends IOApp {
        def startServer(port: Int): IO[Unit] = IO {
          println(s"Server started on port $port")
        }

        def stopServer(): IO[Unit] = IO {
          println("Server stopped")
        }

        def run(args: List[String]): IO[ExitCode] = {
          val port = args.headOption.flatMap(_.toIntOption).getOrElse(8080)
          for {
            _ <- startServer(port)
            _ <- IO.never[Unit]
          } yield ExitCode.Success
        }
      }
    MigrationRunner.scala: |
      import cats.effect.IO

      object MigrationRunner {
        def migrate(version: Int): IO[Unit] = IO {
          println(s"Running migration to version $version")
        }

        def rollback(version: Int): IO[Unit] = IO {
          println(s"Rolling back to version $version")
        }

        def currentVersion(): IO[Int] = IO.pure(1)

        def migrateAll(from: Int, to: Int): IO[Unit] = {
          (from until to).foldLeft(IO.unit) { (acc, v) =>
            acc.flatMap(_ => migrate(v + 1))
          }
        }
      }
    config/ConfigLoader.scala: |
      import cats.effect.IO

      case class AppConfig(host: String, port: Int, dbUrl: String)

      object ConfigLoader {
        def load(): IO[AppConfig] = IO {
          AppConfig("localhost", 8080, "jdbc:postgresql://localhost/db")
        }

        def loadFromEnv(): IO[AppConfig] = IO {
          val host = sys.env.getOrElse("HOST", "localhost")
          val port = sys.env.getOrElse("PORT", "8080").toInt
          val dbUrl = sys.env.getOrElse("DB_URL", "jdbc:postgresql://localhost/db")
          AppConfig(host, port, dbUrl)
        }
      }
    logging/Logger.scala: |
      import cats.effect.IO
      import java.time.LocalDateTime

      object Logger {
        def info(message: String): IO[Unit] = IO {
          println(s"[INFO ${LocalDateTime.now}] $message")
        }

        def error(message: String): IO[Unit] = IO {
          println(s"[ERROR ${LocalDateTime.now}] $message")
        }

        def debug(message: String): IO[Unit] = IO {
          println(s"[DEBUG ${LocalDateTime.now}] $message")
        }
      }
  changed_files:
    Database.scala: |
      import cats.effect.IO

      object Database {
        def connect(): IO[Unit] = IO(println("Connected to database"))

        def disconnect(): IO[Unit] = IO(println("Disconnected from database"))

        def query(sql: String): IO[List[String]] = IO {
