          return "[$(round(val.w, digits=4)) + $(round(val.x, digits=4))i + $(round(val.y, digits=4))j + $(round(val.z, digits=4))k]"
      end

      function format_table(values::Vector)::String
          lines = [format_value(v) for v in values]
          return join(lines, "\n")
      end

      function format_with_label(label::String, val)::String
          return "$label: $(format_value(val))"
      end
