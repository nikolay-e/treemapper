      from engine.geometry import AABB, intersects

      class PhysicsWorld:
          def __init__(self, gravity: float = 9.81):
              self._gravity = gravity
              self._bodies: list[dict] = []

          def add_body(self, x: float, y: float, w: float, h: float) -> int:
              body_id = len(self._bodies)
              self._bodies.append({
                  "id": body_id,
                  "bbox": AABB(x, y, w, h),
                  "vx": 0.0,
                  "vy": 0.0,
              })
              return body_id

          def step(self, dt: float) -> list[tuple[int, int]]:
              collisions = []
              for body in self._bodies:
                  body["vy"] += self._gravity * dt
                  bbox = body["bbox"]
                  body["bbox"] = AABB(
                      bbox.x + body["vx"] * dt,
                      bbox.y + body["vy"] * dt,
                      bbox.w, bbox.h,
                  )
              for i in range(len(self._bodies)):
                  for j in range(i + 1, len(self._bodies)):
                      if intersects(self._bodies[i]["bbox"], self._bodies[j]["bbox"]):
                          collisions.append((i, j))
              return collisions
    engine/geometry.py: |
      from dataclasses import dataclass

      @dataclass
      class AABB:
          x: float
          y: float
          w: float
          h: float

      def intersects(a: AABB, b: AABB) -> bool:
          if a.x + a.w < b.x or b.x + b.w < a.x:
              return False
          if a.y + a.h < b.y or b.y + b.h < a.y:
              return False
          return True

      def area(box: AABB) -> float:
          return box.w * box.h
    engine/renderer.py: |
      class SpriteRenderer:
          def __init__(self, screen_width: int, screen_height: int):
              self._width = screen_width
              self._height = screen_height
              self._sprites: list[dict] = []

          def add_sprite(self, texture_id: str, x: int, y: int) -> None:
              self._sprites.append({"tex": texture_id, "x": x, "y": y})

          def draw_all(self) -> list[dict]:
              visible = [
                  s for s in self._sprites
                  if 0 <= s["x"] < self._width and 0 <= s["y"] < self._height
              ]
              return sorted(visible, key=lambda s: s["y"])
