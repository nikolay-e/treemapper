    engine/physics.py: |
      from engine.geometry import AABB, intersects

      class PhysicsWorld:
          def __init__(self, gravity: float = 9.81):
              self._gravity = gravity
              self._bodies: list[dict] = []
              self._bounds: AABB | None = None

          def set_bounds(self, x: float, y: float, w: float, h: float) -> None:
              self._bounds = AABB(x, y, w, h)

          def add_body(self, x: float, y: float, w: float, h: float) -> int:
              body_id = len(self._bodies)
              self._bodies.append({
                  "id": body_id,
                  "bbox": AABB(x, y, w, h),
                  "vx": 0.0,
                  "vy": 0.0,
              })
              return body_id

          def step(self, dt: float) -> list[tuple[int, int]]:
              collisions = []
              for body in self._bodies:
                  body["vy"] += self._gravity * dt
                  bbox = body["bbox"]
                  new_x = bbox.x + body["vx"] * dt
                  new_y = bbox.y + body["vy"] * dt
                  if self._bounds is not None:
                      new_x = max(self._bounds.x, min(new_x, self._bounds.x + self._bounds.w - bbox.w))
                      new_y = max(self._bounds.y, min(new_y, self._bounds.y + self._bounds.h - bbox.h))
                      if new_y >= self._bounds.y + self._bounds.h - bbox.h:
                          body["vy"] = 0.0
                  body["bbox"] = AABB(new_x, new_y, bbox.w, bbox.h)
              for i in range(len(self._bodies)):
                  for j in range(i + 1, len(self._bodies)):
                      if intersects(self._bodies[i]["bbox"], self._bodies[j]["bbox"]):
                          collisions.append((i, j))
              return collisions
