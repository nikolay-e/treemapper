- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/validator/rules.rs: |
      pub struct Rule {
          pub field: String,
          pub required: bool,
          pub min_len: usize,
      }

      pub struct Validator {
          rules: Vec<Rule>,
      }

      impl Validator {
          pub fn new(rules: Vec<Rule>) -> Self {
              Self { rules }
          }

          pub fn validate(&self, data: &std::collections::HashMap<String, String>) -> Vec<String> {
              let mut errors = Vec::new();
              for rule in &self.rules {
                  match data.get(&rule.field) {
                      None if rule.required => {
                          errors.push(format!("{} is required", rule.field));
                      }
                      Some(val) if val.len() < rule.min_len => {
                          errors.push(format!("{} too short", rule.field));
                      }
                      _ => {}
                  }
              }
              errors
          }
      }
    src/validator/mod.rs: |
      pub mod rules;
    src/processor/processor.rs: |
      use crate::validator::rules::Validator;
      use std::collections::HashMap;

      pub struct Processor {
          validator: Validator,
      }

      impl Processor {
          pub fn new(validator: Validator) -> Self {
              Self { validator }
          }

          pub fn process(&self, data: &HashMap<String, String>) -> Result<(), Vec<String>> {
              let errors = self.validator.validate(data);
              if errors.is_empty() {
                  Ok(())
              } else {
                  Err(errors)
              }
          }
      }
    src/processor/mod.rs: |
      pub mod processor;
    src/coordinator/coordinator.rs: |
      use crate::processor::processor::Processor;
      use std::collections::HashMap;

      pub struct Coordinator {
          processor: Processor,
          processed: u64,
      }

      impl Coordinator {
          pub fn new(processor: Processor) -> Self {
              Self { processor, processed: 0 }
          }

          pub fn coordinate(&mut self, data: &HashMap<String, String>) -> Result<(), Vec<String>> {
              let result = self.processor.process(data);
              if result.is_ok() {
                  self.processed += 1;
              }
              result
          }

          pub fn total_processed(&self) -> u64 {
              self.processed
          }
      }
    src/coordinator/mod.rs: |
      pub mod coordinator;
    src/app/app.rs: |
      use crate::coordinator::coordinator::Coordinator;
      use std::collections::HashMap;

      pub struct App {
          coordinator: Coordinator,
      }

      impl App {
          pub fn new(coordinator: Coordinator) -> Self {
              Self { coordinator }
          }

          pub fn submit(&mut self, data: &HashMap<String, String>) -> String {
              match self.coordinator.coordinate(data) {
                  Ok(()) => "accepted".to_string(),
                  Err(errors) => format!("rejected: {}", errors.join(", ")),
              }
          }
      }
    src/app/mod.rs: |
      pub mod app;
    src/report/summary.rs: |
      pub static GARBAGE_BAL3_030_SUMMARY_MARKER_A: &str = "summary";
      pub static GARBAGE_BAL3_030_TOTAL_MARKER_B: u64 = 0;

      pub struct Summary;
      impl Summary {
          pub fn generate(&self) -> String { String::new() }
      }
    src/report/detail.rs: |
      pub static GARBAGE_BAL3_030_DETAIL_MARKER_C: &str = "detail";
      pub static GARBAGE_BAL3_030_VERBOSE_MARKER_D: bool = false;

      pub struct Detail;
      impl Detail {
          pub fn generate(&self) -> String { String::new() }
      }
    src/report/mod.rs: |
      pub mod summary;
      pub mod detail;
    src/lib.rs: |
      pub mod validator;
      pub mod processor;
      pub mod coordinator;
      pub mod app;
      pub mod report;
  changed_files:
    src/validator/rules.rs: |
      pub struct Rule {
          pub field: String,
          pub required: bool,
          pub min_len: usize,
          pub max_len: usize,
      }

      pub struct Validator {
          rules: Vec<Rule>,
      }

      impl Validator {
          pub fn new(rules: Vec<Rule>) -> Self {
              Self { rules }
          }

          pub fn validate(&self, data: &std::collections::HashMap<String, String>) -> Vec<String> {
              let mut errors = Vec::new();
              for rule in &self.rules {
                  match data.get(&rule.field) {
                      None if rule.required => {
                          errors.push(format!("{} is required", rule.field));
                      }
                      Some(val) if val.len() < rule.min_len => {
                          errors.push(format!("{} too short", rule.field));
                      }
                      Some(val) if rule.max_len > 0 && val.len() > rule.max_len => {
                          errors.push(format!("{} too long", rule.field));
                      }
                      _ => {}
                  }
              }
              errors
          }

          pub fn rule_count(&self) -> usize {
              self.rules.len()
          }
      }
  commit_message: "Add max_len validation and rule_count to validator"
