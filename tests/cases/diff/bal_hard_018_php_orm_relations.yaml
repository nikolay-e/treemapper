repo:
  initial_files:
    src/ORM/Entity.php: |
      <?php
      namespace App\ORM;
      abstract class Entity {
          public string $id;
          abstract public function tableName(): string;
          abstract public function toArray(): array;
      }
    src/ORM/QueryBuilder.php: |
      <?php
      namespace App\ORM;
      class QueryBuilder {
          private string $table;
          private array $conditions = [];
          public function from(string $table): self {
              $this->table = $table;
              return $this;
          }
          public function where(string $column, string $value): self {
              $this->conditions[] = "$column = '$value'";
              return $this;
          }
          public function build(): string {
              $sql = "SELECT * FROM {$this->table}";
              if (!empty($this->conditions)) {
                  $sql .= ' WHERE ' . implode(' AND ', $this->conditions);
              }
              return $sql;
          }
      }
    src/Models/Author.php: |
      <?php
      namespace App\Models;
      use App\ORM\Entity;
      class Author extends Entity {
          public string $name;
          public string $email;
          public function __construct(string $id, string $name, string $email) {
              $this->id = $id;
              $this->name = $name;
              $this->email = $email;
          }
          public function tableName(): string { return 'authors'; }
          public function toArray(): array {
              return ['id' => $this->id, 'name' => $this->name, 'email' => $this->email];
          }
      }
    src/Models/Book.php: |
      <?php
      namespace App\Models;
      use App\ORM\Entity;
      class Book extends Entity {
          public string $title;
          public string $authorId;
          public function __construct(string $id, string $title, string $authorId) {
              $this->id = $id;
              $this->title = $title;
              $this->authorId = $authorId;
          }
          public function tableName(): string { return 'books'; }
          public function toArray(): array {
              return ['id' => $this->id, 'title' => $this->title, 'author_id' => $this->authorId];
          }
      }
    src/Repository/BookRepository.php: |
      <?php
      namespace App\Repository;
      use App\ORM\QueryBuilder;
      class BookRepository {
          private QueryBuilder $qb;
          public function __construct() {
              $this->qb = new QueryBuilder();
          }
          public function findByAuthor(string $authorId): string {
              return $this->qb->from('books')->where('author_id', $authorId)->build();
          }
      }
    src/Service/LibraryService.php: |
      <?php
      namespace App\Service;
      use App\Repository\BookRepository;
      class LibraryService {
          private BookRepository $bookRepo;
          public function __construct(BookRepository $bookRepo) {
              $this->bookRepo = $bookRepo;
          }
          public function getBooksByAuthor(string $authorId): string {
