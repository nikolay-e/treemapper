    src/main/scala/config/ConfigLoader.scala: |
      package config

      object ConfigLoader {
        def parse(content: String): Map[String, String] = {
          content.split("\n").map { line =>
            val parts = line.split("=")
            parts(0) -> parts(1)
          }.toMap
        }

        def get(config: Map[String, String], key: String): String = {
          config(key)
        }
      }
