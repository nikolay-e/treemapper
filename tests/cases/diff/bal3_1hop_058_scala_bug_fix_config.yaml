  changed_files:
    src/main/scala/config/ConfigLoader.scala: |
      package config

      object ConfigLoader {
        def parse(content: String): Map[String, String] = {
          content.split("\n").flatMap { line =>
            val trimmed = line.trim
            if (trimmed.isEmpty || trimmed.startsWith("#")) None
            else {
              val pos = trimmed.indexOf('=')
              if (pos < 0) None
              else Some(trimmed.substring(0, pos).trim -> trimmed.substring(pos + 1).trim)
            }
          }.toMap
        }

        def get(config: Map[String, String], key: String, default: String = ""): String = {
          config.getOrElse(key, default)
        }
      }
  commit_message: "Fix config parser to handle comments, empty lines, missing keys"
