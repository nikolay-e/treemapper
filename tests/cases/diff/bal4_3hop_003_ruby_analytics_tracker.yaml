repo:
  initial_files:
    lib/analytics/event.rb: |
      module Analytics
        class Event
          attr_reader :name, :ts
          def initialize(name)
            @name = name
            @ts = Time.now
          end
        end
      end
    lib/analytics/tracker.rb: |
      require_relative 'event'
      module Analytics
        class Tracker
          def track(name)
            Event.new(name)
          end
        end
      end
    lib/analytics/pipeline.rb: |
      require_relative 'tracker'
      module Analytics
        class Pipeline
          def push(name)
            Tracker.new.track(name)
          end
        end
      end
    lib/analytics/api.rb: |
      require_relative 'pipeline'
      module Analytics
        class Api
          def record(name)
            Pipeline.new.push(name)
          end
        end
      end
