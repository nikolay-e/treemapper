            5
          end
        end
      end
  changed_files:
    lib/analytics/event.rb: |
      module Analytics
        class Event
          attr_reader :name, :ts, :source
          def initialize(name, source: "web")
            @name = name
            @ts = Time.now
            @source = source
          end
        end
      end
