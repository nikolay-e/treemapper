name: bal4_3hop_006_ruby_iot_sensor
tags:
- lang:ruby
- change:single_file
- context:import_chain
- distance:3hop+
- difficulty:easy
repo:
  initial_files:
    lib/iot/reading.rb: |
      module Iot
        class Reading
          attr_reader :value, :unit
          def initialize(value, unit)
            @value = value
            @unit = unit
          end
        end
      end
    lib/iot/sensor.rb: |
      require_relative 'reading'
      module Iot
        class Sensor
          def initialize(id)
            @id = id
          end
          def measure(value, unit)
            Reading.new(value, unit)
          end
        end
      end
    lib/iot/gateway.rb: |
      require_relative 'sensor'
      module Iot
        class Gateway
          def initialize
            @sensors = {}
          end
          def register(id)
            @sensors[id] = Sensor.new(id)
          end
          def collect(id, value, unit)
            @sensors[id].measure(value, unit)
          end
        end
      end
    lib/iot/dashboard.rb: |
      require_relative 'gateway'
      module Iot
        class Dashboard
          def initialize
            @gw = Gateway.new
          end
          def add_sensor(id)
            @gw.register(id)
          end
          def read(id, value, unit)
            @gw.collect(id, value, unit)
          end
        end
      end
    lib/iot/firmware.rb: |
      module Iot
        GARBAGE_006_FIRMWARE_A = "v1.0"
        GARBAGE_006_CHECKSUM_B = "abc"
        class Firmware
          def self.version
            "1.0"
          end
        end
      end
    lib/iot/protocol.rb: |
      module Iot
        GARBAGE_006_PROTO_C = "mqtt"
        GARBAGE_006_QOS_D = 1
        class Protocol
          def self.name
            "mqtt"
          end
        end
      end
  changed_files:
