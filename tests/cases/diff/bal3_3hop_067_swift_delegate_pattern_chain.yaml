name: bal3_3hop_067_swift_delegate_pattern_chain
tags:
- lang:swift
- change:single_file
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    Sources/Protocols/MediaPlayerDelegate.swift: |
      import Foundation

      protocol MediaPlayerDelegate: AnyObject {
          func playerDidStart()
          func playerDidStop()
      }
    Sources/Player/AudioEngine.swift: |
      import Foundation
      import Protocols

      class AudioEngine {
          weak var delegate: MediaPlayerDelegate?
          func play(url: URL) {
              delegate?.playerDidStart()
          }
          func stop() {
              delegate?.playerDidStop()
          }
      }
    Sources/Player/PlayerManager.swift: |
      import Foundation
      import Protocols

      class PlayerManager: MediaPlayerDelegate {
          private let engine: AudioEngine
          init(engine: AudioEngine) {
              self.engine = engine
              engine.delegate = self
          }
          func playerDidStart() {}
          func playerDidStop() {}
          func playTrack(url: URL) {
              engine.play(url: url)
          }
      }
    Sources/ViewModels/NowPlayingViewModel.swift: |
      import Foundation
      import Player

      class NowPlayingViewModel {
          private let manager: PlayerManager
          init(manager: PlayerManager) {
              self.manager = manager
          }
          func play(url: URL) {
              manager.playTrack(url: url)
          }
      }
