repo:
  initial_files:
    src/schema.ts: |
      export interface Schema {
          users: { id: string; name: string; role: string }[];
          posts: { id: string; title: string; content: string; authorId: string }[];
          comments: { id: string; postId: string; body: string }[];
      }

      export const emptySchema: Schema = {
          users: [],
          posts: [],
          comments: [],
      };
    src/accessor.ts: |
      console.log('initial');
    src/services/schemaValidator.ts: |
      import { Schema } from '../schema';
      import { z } from 'zod';

      const userSchema = z.object({
          id: z.string(),
          name: z.string(),
          role: z.string(),
      });

      const schemaValidator = z.object({
          users: z.array(userSchema),
          posts: z.array(z.object({ id: z.string(), title: z.string(), content: z.string(), authorId: z.string() })),
          comments: z.array(z.object({ id: z.string(), postId: z.string(), body: z.string() })),
      });

      export function validateSchema(data: unknown): data is Schema {
          return schemaValidator.safeParse(data).success;
      }

      export function getValidationErrors(data: unknown): string[] {
          const result = schemaValidator.safeParse(data);
          if (result.success) return [];
          return result.error.errors.map(e => e.message);
      }
    src/services/schemaSerializer.ts: |
      import { Schema } from '../schema';

      export function serializeSchema(schema: Schema): string {
          return JSON.stringify(schema, null, 2);
      }

      export function deserializeSchema(json: string): Schema {
          return JSON.parse(json) as Schema;
      }

      export function getSchemaStats(schema: Schema): { users: number; posts: number; comments: number } {
          return {
              users: schema.users.length,
              posts: schema.posts.length,
              comments: schema.comments.length,
          };
      }
    src/repositories/commentRepository.ts: |
      interface CommentRecord {
          id: string;
          postId: string;
          body: string;
          createdAt: Date;
      }

      const store: CommentRecord[] = [];

      export function addComment(postId: string, body: string): CommentRecord {
          const record = { id: Date.now().toString(), postId, body, createdAt: new Date() };
          store.push(record);
          return record;
      }

      export function findCommentsByPost(postId: string): CommentRecord[] {
          return store.filter(c => c.postId === postId);
      }

      export function deleteComment(id: string): boolean {
          const idx = store.findIndex(c => c.id === id);
          if (idx === -1) return false;
          store.splice(idx, 1);
          return true;
      }
