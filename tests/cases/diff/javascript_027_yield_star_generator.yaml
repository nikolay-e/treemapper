name: javascript_027_yield_star_generator
tags:
- lang:typescript
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    sub_generator.ts: |
      export function* subGenerator() {
          yield 1;
          yield 2;
          yield 3;
      }
    main_generator.ts: |
      console.log('initial');
    async-iterator.ts: |
      export async function* fetchPages(baseUrl: string) {
          let page = 1;
          while (true) {
              const response = await fetch(`${baseUrl}?page=${page}`);
              const data = await response.json();
              if (data.items.length === 0) return;
              yield data.items;
              page++;
          }
      }

      export async function* retryableStream<T>(
          generator: AsyncGenerator<T>,
          maxRetries: number = 3
      ) {
          let retries = 0;
          while (retries < maxRetries) {
              try {
                  yield* generator;
                  return;
              } catch {
                  retries++;
              }
          }
      }
    range-iterator.ts: |
      export class NumberRange {
          constructor(private start: number, private end: number) {}

          *[Symbol.iterator]() {
              for (let i = this.start; i <= this.end; i++) {
                  yield i;
              }
          }

          toArray(): number[] {
              return [...this];
          }

          contains(value: number): boolean {
              return value >= this.start && value <= this.end;
          }
      }
  changed_files:
    sub_generator.ts: |
      export function* subGenerator() {
          yield 1;
          yield 2;
          yield 3;
      }
    main_generator.ts: |
