      import os

      app = Flask(__name__)

      NODE_ENV = os.getenv("NODE_ENV", "production")
      DEBUG = os.getenv("DEBUG", "false").lower() == "true"

      @app.route('/health')
      def health():
          return jsonify(status='ok', env=NODE_ENV)

      @app.route('/api/info')
      def info():
          return jsonify(
              environment=NODE_ENV,
              debug=DEBUG
          )

      if __name__ == "__main__":
