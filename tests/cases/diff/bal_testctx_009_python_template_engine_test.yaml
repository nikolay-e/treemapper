      from src.template_engine import TemplateEngine

      class TemplateLoader:
          def __init__(self, engine: TemplateEngine):
              self.engine = engine
              self._cache: dict[str, str] = {}

          def load_string(self, name: str, content: str) -> None:
              self._cache[name] = content

          def render_cached(self, name: str, context: dict[str, str]) -> str:
              template = self._cache[name]
              return self.engine.render(template, context)
    tests/test_template_engine.py: |
      from src.template_engine import TemplateEngine

      def test_simple_render():
          engine = TemplateEngine()
          result = engine.render("Hello {{name}}", {"name": "World"})
          assert result == "Hello World"

      def test_multiple_variables():
          engine = TemplateEngine()
          result = engine.render("{{a}} + {{b}}", {"a": "1", "b": "2"})
          assert result == "1 + 2"

      def test_custom_delimiters():
          engine = TemplateEngine(delimiters=("<%", "%>"))
          result = engine.render("Hi <%user%>", {"user": "Alice"})
          assert result == "Hi Alice"
