      import html

      def sanitize(text: str) -> str:
          return html.escape(text)

      def strip_tags(text: str) -> str:
          import re
          return re.sub(r'<[^>]+>', '', text)
  changed_files:
    src/template_engine.py: |
      import re
      from typing import Callable, Dict, Optional

      class TemplateEngine:
          def __init__(self, delimiters: tuple[str, str] = ("{{", "}}")):
              self.open_delim = delimiters[0]
              self.close_delim = delimiters[1]
              self._filters: dict[str, Callable[[str], str]] = {}

          def register_filter(self, name: str, fn: Callable[[str], str]) -> None:
              self._filters[name] = fn

          def render(self, template: str, context: Dict[str, str]) -> str:
              result = template
              for key, value in context.items():
                  placeholder = f"{self.open_delim}{key}{self.close_delim}"
                  result = result.replace(placeholder, value)
              return result

          def render_with_filters(
              self, template: str, context: Dict[str, str]
          ) -> str:
              pattern = re.compile(
                  re.escape(self.open_delim) + r'(\w+)\|(\w+)' + re.escape(self.close_delim)
              )
              def replacer(match: re.Match) -> str:
                  key, filter_name = match.group(1), match.group(2)
                  value = context.get(key, "")
                  if filter_name in self._filters:
                      return self._filters[filter_name](value)
                  return value
              return pattern.sub(replacer, template)
  commit_message: "feat: add filter support to template engine"
