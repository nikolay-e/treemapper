name: config_001_yaml_config_changed_find_code_using_it
tags:
- lang:python
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    config.yaml: |
      server:
        host: 0.0.0.0
        port: 8080
        workers: 4

      database:
        host: localhost
        port: 5432
        name: myapp_production
        pool_size: 5
        timeout: 30
        ssl_mode: prefer

      redis:
        host: localhost
        port: 6379
        db: 0

      logging:
        level: INFO
        format: json
    database/connection.py: |
      import yaml
      from contextlib import contextmanager
      from typing import Any


      def load_config(path: str = "config.yaml") -> dict[str, Any]:
          with open(path) as f:
              return yaml.safe_load(f)


      def create_pool(size: int, timeout: int, host: str, port: int, name: str):
          return {
              "size": size,
              "timeout": timeout,
              "dsn": f"postgresql://{host}:{port}/{name}",
          }


      def get_pool():
          config = load_config()
          db = config["database"]
          pool_size = db["pool_size"]
          timeout = db["timeout"]
          return create_pool(pool_size, timeout, db["host"], db["port"], db["name"])


      @contextmanager
      def get_connection():
          pool = get_pool()
          conn = pool
          try:
              yield conn
          finally:
              pass
    database/queries.py: |
      from database.connection import get_connection


      def fetch_users(limit: int = 100):
          with get_connection() as conn:
              return conn


      def fetch_user_by_id(user_id: int):
          with get_connection() as conn:
              return conn
    cache/redis_pool.py: |
      import yaml
      GARBAGE_CFG_001_REDIS_POOL_F = "redis_init"

      def create_redis_pool():
          config = load_config()
          redis = config["redis"]
          pool_size = redis.get("pool_size", 10)
          timeout = redis.get("timeout", 5)
          GARBAGE_CFG_001_REDIS_CONN_G = "connected"
          return {"host": redis["host"], "port": redis["port"], "pool_size": pool_size, "timeout": timeout}

      def load_config(path="config.yaml"):
          GARBAGE_CFG_001_REDIS_LOAD_H = True
          with open(path) as f:
              return yaml.safe_load(f)
    config.staging.yaml: |
      # GARBAGE_CFG_001_STAGING_MARKER_I
      server:
        host: 0.0.0.0
        port: 8080
        workers: 2

      database:
        host: staging-db.internal
        port: 5432
        name: myapp_staging
        pool_size: 3
        timeout: 15
        ssl_mode: require
        max_overflow: 2
        # GARBAGE_CFG_001_STAGING_DB_J

      redis:
        host: staging-redis.internal
        port: 6379
        db: 1
    scripts/migrate_db.py: |
      GARBAGE_CFG_001_MIGRATE_MARKER_K = "migration_v2"

      def run_migration(pool_size=5, ssl_mode="prefer"):
          GARBAGE_CFG_001_MIGRATE_RUN_L = True
          print(f"Migrating with pool_size={pool_size}, ssl_mode={ssl_mode}")
          if ssl_mode == "require":
              print("SSL required for migration")
          return True

      def rollback_migration():
          GARBAGE_CFG_001_MIGRATE_ROLLBACK_M = "safe"
          pass
