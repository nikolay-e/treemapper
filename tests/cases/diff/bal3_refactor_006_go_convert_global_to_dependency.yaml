      import os
      import shutil

      BACKUP_DIR = "/var/data/backups"
      BACKUP_COMPRESS = True


      def run_backup(source: str) -> str:
          dest = os.path.join(BACKUP_DIR, os.path.basename(source))
          shutil.copy2(source, dest)
          return dest


      def list_backups() -> list[str]:
          return sorted(os.listdir(BACKUP_DIR))
    scripts/backup.sh: |
      #!/usr/bin/env bash
      set -euo pipefail
      python3 scripts/backup.py "$1"
