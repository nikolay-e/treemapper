      GARBAGE_DEP_043_GEO_G = "stratigraphy"

      def classify_rock(mineral_content: dict) -> str:
          return "igneous" if "quartz" in mineral_content else "sedimentary"

      class Fossil_GARBAGE_DEP_043_GEO_G:
          def __init__(self, era: str, species: str):
