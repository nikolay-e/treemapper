      GARBAGE_DEP_043_UTIL_XFORM_D = "util_transform"
      GARBAGE_DEP_043_UTIL_VER_E = "2.0"

      def transform(items, key=None):
          GARBAGE_DEP_043_UTIL_APPLY_F = "applying"
          if key:
              return sorted(items, key=key)
          return items
