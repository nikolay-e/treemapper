      from wrapper import process_data

      def main():
          result = process_data()
          print(result)
    wrapper.py: |
      from core import transform

      def process_data():
          return transform()
    core.py: |
      def transform(data=None, mode="default"):
          if data is None:
              data = []
          if mode == "default":
              return [x * 2 for x in data]
          elif mode == "reverse":
              return list(reversed(data))
          return data
