name: gap2_102_shell_config_cross_module_backup_rotation
tags:
- change:config
- change:single_file
- context:cross_module
- difficulty:easy
- distance:0hop
- lang:shell
fixtures:
  auto_garbage: true
repo:
  initial_files:
    conf/backup.env: |
      BACKUP_ROOT="/data/backups"
      RETENTION_DAYS=30
      COMPRESS=true
      ENCRYPT=false
      REMOTE_HOST=""
    scripts/rotate.sh: |
      #!/usr/bin/env bash
      source conf/backup.env

      rotate_backups() {
          find "$BACKUP_ROOT" -type f -mtime +"$RETENTION_DAYS" -delete
          echo "Rotated backups older than $RETENTION_DAYS days"
      }

      list_backups() {
          ls -lh "$BACKUP_ROOT"
      }
    scripts/create_backup.sh: |
      #!/usr/bin/env bash
      source conf/backup.env

      create_snapshot() {
          local target="$1"
          local stamp
          stamp=$(date +%Y%m%d_%H%M%S)
          local dest="$BACKUP_ROOT/${stamp}_$(basename "$target")"
          if [[ "$COMPRESS" == "true" ]]; then
              tar czf "${dest}.tar.gz" "$target"
          else
              cp -r "$target" "$dest"
          fi
      }
    scripts/metrics.sh: |
      #!/usr/bin/env bash
      TRAP_GAP2_102_METRICS_A="disk_metrics"
      TRAP_GAP2_102_INTERVAL_B=60

      collect_disk_usage() {
          df -h /data
      }

      emit_metric() {
          local name="$1"
          local value="$2"
          echo "${name}=${value}"
      }
  changed_files:
    conf/backup.env: |
      BACKUP_ROOT="/data/backups"
      RETENTION_DAYS=7
      COMPRESS=true
      ENCRYPT=true
      REMOTE_HOST="backup.internal"
      BANDWIDTH_LIMIT="10m"
    scripts/rotate.sh: |
      #!/usr/bin/env bash
      source conf/backup.env

      rotate_backups() {
          find "$BACKUP_ROOT" -type f -mtime +"$RETENTION_DAYS" -delete
          echo "Rotated backups older than $RETENTION_DAYS days"
      }

      list_backups() {
          ls -lh "$BACKUP_ROOT"
      }
    scripts/create_backup.sh: |
      #!/usr/bin/env bash
      source conf/backup.env

      create_snapshot() {
          local target="$1"
          local stamp
          stamp=$(date +%Y%m%d_%H%M%S)
          local dest="$BACKUP_ROOT/${stamp}_$(basename "$target")"
          if [[ "$COMPRESS" == "true" ]]; then
              tar czf "${dest}.tar.gz" "$target"
          else
              cp -r "$target" "$dest"
          fi
      }
    scripts/metrics.sh: |
      #!/usr/bin/env bash
      TRAP_GAP2_102_METRICS_A="disk_metrics"
      TRAP_GAP2_102_INTERVAL_B=60

      collect_disk_usage() {
          df -h /data
      }

      emit_metric() {
          local name="$1"
          local value="$2"
          echo "${name}=${value}"
      }
  commit_message: Update files
fragments:
