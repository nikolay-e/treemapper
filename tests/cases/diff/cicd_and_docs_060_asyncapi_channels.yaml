name: cicd_and_docs_060_asyncapi_channels
tags:
- lang:python
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    asyncapi.yaml: |
      asyncapi: 2.6.0
      info:
        title: Order Events
        version: 1.0.0
      channels:
        orders/created:
          publish:
            message:
              payload:
                type: object
                properties:
                  orderId:
                    type: string
    src/events/order_publisher.py: |
      import json
      from kafka import KafkaProducer

      producer = KafkaProducer(
          bootstrap_servers=['localhost:9092'],
          value_serializer=lambda v: json.dumps(v).encode('utf-8')
      )

      def publish_order_created(order_id: str):
          producer.send('orders/created', {'orderId': order_id})
          producer.flush()
    src/events/order_consumer.py: |
      import json
      from kafka import KafkaConsumer

      consumer = KafkaConsumer(
          'orders/created',
          bootstrap_servers=['localhost:9092'],
          value_deserializer=lambda m: json.loads(m.decode('utf-8'))
      )

      def consume_order_events():
          for message in consumer:
              process_order_event(message.value)
    src/events/payment_publisher.py: |
      import json
      from kafka import KafkaProducer

      payment_producer = KafkaProducer(
          bootstrap_servers=['localhost:9092'],
          value_serializer=lambda v: json.dumps(v).encode('utf-8')
      )

      def publish_payment_processed(payment_id: str, amount: float):
          payment_producer.send('payments/processed', {
              'paymentId': payment_id,
              'amount': amount,
          })
          payment_producer.flush()
    src/config/kafka_config.py: |
      KAFKA_BOOTSTRAP_SERVERS = ['localhost:9092']
      KAFKA_CONSUMER_GROUP = 'order-service-group'
      KAFKA_AUTO_OFFSET_RESET = 'earliest'
      KAFKA_MAX_POLL_RECORDS = 500
  changed_files:
    asyncapi.yaml: |
      asyncapi: 2.6.0
      info:
        title: Order Events
        version: 1.0.0
      channels:
        orders/created:
          publish:
            message:
              payload:
                $ref: '#/components/schemas/OrderCreatedEvent'
        orders/updated:
          publish:
            message:
              payload:
                $ref: '#/components/schemas/OrderUpdatedEvent'
        orders/shipped:
          subscribe:
            message:
              payload:
                $ref: '#/components/schemas/OrderShippedEvent'
        orders/cancelled:
          subscribe:
            message:
              payload:
                $ref: '#/components/schemas/OrderCancelledEvent'
      components:
        schemas:
          OrderCreatedEvent:
            type: object
            required:
              - orderId
              - userId
              - timestamp
            properties:
              orderId:
                type: string
              userId:
                type: string
              timestamp:
                type: string
                format: date-time
              items:
                type: array
                items:
                  $ref: '#/components/schemas/OrderItem'
          OrderUpdatedEvent:
            type: object
            properties:
              orderId:
                type: string
              changes:
                type: object
              updatedAt:
                type: string
                format: date-time
          OrderShippedEvent:
            type: object
            properties:
              orderId:
                type: string
              trackingNumber:
                type: string
              carrier:
                type: string
          OrderCancelledEvent:
            type: object
            properties:
              orderId:
                type: string
              reason:
                type: string
          OrderItem:
            type: object
            properties:
              productId:
                type: string
              quantity:
                type: integer
  commit_message: "Expand asyncapi spec with new order event channels and schemas"
fragments:
- id: asyncapi_spec
  selector:
    path: asyncapi.yaml
- id: schema_ref_created_event
  selector:
    anchor: "$ref: '#/components/schemas/OrderCreatedEvent'"
- id: created_event_schema
  selector:
    anchor: "OrderCreatedEvent:"
- id: no_kafka_config_marker
  selector:
    anchor: KAFKA_AUTO_OFFSET_RESET
- id: order_publisher
  selector:
    path: src/events/order_publisher.py
    anchor: def publish_order_created
- id: order_consumer
  selector:
    path: src/events/order_consumer.py
    anchor: def consume_order_events
- id: no_payment_publisher
  selector:
    path: src/events/payment_publisher.py
    anchor: def publish_payment_processed
- id: no_kafka_config
  selector:
    path: src/config/kafka_config.py
    anchor: KAFKA_BOOTSTRAP_SERVERS
oracle:
  required:
  - asyncapi_spec
  - schema_ref_created_event
  - created_event_schema
  - order_publisher
  - order_consumer
  allowed: []
  forbidden:
  - no_payment_publisher
  - no_kafka_config
  - no_kafka_config_marker
