  changed_files:
    src/Events/DomainEvent.cs: |
      using System;

      namespace App.Events
      {
          public abstract class DomainEvent
          {
              public Guid EventId { get; } = Guid.NewGuid();
              public DateTime OccurredAt { get; } = DateTime.UtcNow;
              public string AggregateId { get; set; }
              public int Version { get; set; }
          }
      }
    src/Events/AccountCreatedEvent.cs: |
      using System;
      using App.Events;

      namespace App.Events
      {
          public class AccountCreatedEvent : DomainEvent
          {
              public string AccountId { get; set; }
              public string OwnerName { get; set; }
              public string Email { get; set; }
          }
      }
    src/Store/EventStore.cs: |
      using System;
      using System.Collections.Generic;
      using System.Linq;
      using App.Events;

      namespace App.Store
      {
          public class EventStore
          {
              private readonly List<DomainEvent> _events = new();
              public void Append(DomainEvent domainEvent)
              {
                  domainEvent.Version = _events.Count(e => e.AggregateId == domainEvent.AggregateId) + 1;
                  _events.Add(domainEvent);
              }
              public IReadOnlyList<DomainEvent> GetAll()
              {
                  return _events.AsReadOnly();
              }
              public IReadOnlyList<DomainEvent> GetByAggregate(string aggregateId)
              {
                  return _events.Where(e => e.AggregateId == aggregateId).ToList().AsReadOnly();
              }
          }
      }
    src/Aggregates/AccountAggregate.cs: |
      using System;
      using App.Store;
      using App.Events;

      namespace App.Aggregates
      {
          public class AccountAggregate
          {
              private readonly EventStore _store;
              public AccountAggregate(EventStore store)
              {
                  _store = store;
              }
              public void CreateAccount(string id, string owner, string email)
              {
                  _store.Append(new AccountCreatedEvent
                  {
                      AccountId = id,
                      OwnerName = owner,
                      Email = email,
                      AggregateId = id
                  });
              }
          }
      }
    src/Services/AccountService.cs: |
      using System;
      using App.Aggregates;

      namespace App.Services
      {
          public class AccountService
          {
              private readonly AccountAggregate _aggregate;
              public AccountService(AccountAggregate aggregate)
              {
                  _aggregate = aggregate;
              }
              public void OpenAccount(string id, string owner, string email)
              {
                  _aggregate.CreateAccount(id, owner, email);
              }
          }
      }
    src/Controllers/AccountController.cs: |
      using System;
      using App.Services;

      namespace App.Controllers
      {
          public class AccountController
          {
              private readonly AccountService _service;
              public AccountController(AccountService service)
              {
                  _service = service;
              }
              public string Open(string id, string owner, string email)
              {
                  _service.OpenAccount(id, owner, email);
                  return "Account opened";
              }
          }
      }
