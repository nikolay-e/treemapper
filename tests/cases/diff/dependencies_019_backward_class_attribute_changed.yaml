name: dependencies_019_backward_class_attribute_changed
tags:
- lang:python
- change:single_file
- change:bug_fix
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    models.py: |
      class Config:
          timeout = 30
          max_connections = 10
    client.py: |
      from models import Config

      def make_request():
          timeout = Config.timeout
          return f"Request with timeout {timeout}"
    settings.py: |
      from models import Config

      default_timeout = Config.timeout
    adapters/config.py: |
      from typing import Optional

      class Config:
          timeout = 30
          max_connections = 20
          retry_on_failure = True

          def get_timeout(self) -> int:
              return self.timeout

          def with_timeout(self, value: int) -> 'Config':
              self.timeout = value
              return self
    defaults.py: |
      class Defaults:
          timeout = 60
          max_connections = 5
          pool_recycle = 3600

          def to_dict(self) -> dict:
              return {
                  "timeout": self.timeout,
                  "max_connections": self.max_connections,
                  "pool_recycle": self.pool_recycle,
              }
  changed_files:
    models.py: |
      class Config:
          timeout = 60
          max_connections = 10
    client.py: |
      from models import Config

      def make_request():
          timeout = Config.timeout
          return f"Request with timeout {timeout}"
    settings.py: |
