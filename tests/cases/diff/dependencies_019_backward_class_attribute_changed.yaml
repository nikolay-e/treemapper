      default_timeout = Config.timeout
    adapters/config.py: |
      from typing import Optional

      class Config:
          timeout = 30
          max_connections = 20
          retry_on_failure = True

          def get_timeout(self) -> int:
              return self.timeout

          def with_timeout(self, value: int) -> 'Config':
              self.timeout = value
              return self
    defaults.py: |
      class Defaults:
          timeout = 60
          max_connections = 5
          pool_recycle = 3600

          def to_dict(self) -> dict:
              return {
                  "timeout": self.timeout,
                  "max_connections": self.max_connections,
                  "pool_recycle": self.pool_recycle,
              }
  commit_message: Update files
fragments:
- id: models_timeout_changed
  selector:
    path: models.py
    anchor: timeout = 60
- id: models_class_def
  selector:
    path: models.py
    anchor: "class Config:"
- id: client_uses_timeout
  selector:
    path: client.py
    anchor: "def make_request():"
