repo:
  initial_files:
    lib/supply/warehouse.ex: |
      defmodule Supply.Warehouse do
        defstruct [:id, :location, :capacity_m3, :available_m3]

        def has_space?(%__MODULE__{available_m3: avail}, volume_m3) do
          avail >= volume_m3
        end

        def reserve(%__MODULE__{} = wh, volume_m3) do
          %{wh | available_m3: wh.available_m3 - volume_m3}
        end
      end
    lib/supply/allocation_service.ex: |
      defmodule Supply.AllocationService do
        alias Supply.Warehouse

        def allocate(warehouse, volume_m3) do
          if Warehouse.has_space?(warehouse, volume_m3) do
            updated = Warehouse.reserve(warehouse, volume_m3)
            {:ok, updated}
          else
            {:error, :insufficient_space}
          end
        end
      end
    lib/supply/fulfillment.ex: |
      defmodule Supply.Fulfillment do
        alias Supply.AllocationService

        def fulfill_order(warehouse, order_volume_m3) do
          case AllocationService.allocate(warehouse, order_volume_m3) do
            {:ok, updated_wh} -> {:ok, updated_wh}
            {:error, reason} -> {:error, reason}
          end
        end
      end
