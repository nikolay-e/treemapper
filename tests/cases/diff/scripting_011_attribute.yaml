    src/Middleware/AuthMiddleware.php: |
      <?php

      namespace App\Http\Middleware;

      class AuthMiddleware
      {
          private array $protectedPaths = [
              '/api/users',
              '/api/products',
          ];

          public function handle(array $request, callable $next): array
          {
              $path = $request['path'] ?? '';
              if ($this->isProtected($path) && empty($request['headers']['Authorization'] ?? '')) {
                  return [
                      'status' => 401,
                      'body' => json_encode(['error' => 'Unauthorized']),
                  ];
              }
              return $next($request);
          }

          private function isProtected(string $path): bool
          {
              foreach ($this->protectedPaths as $protected) {
                  if (str_starts_with($path, $protected)) {
                      return true;
                  }
              }
              return false;
          }
      }
    src/Cacheable.php: |
      <?php

      namespace App\Http;

      #[Attribute]
      class Cacheable
      {
          public int $ttl;
          public string $key;

          public function __construct(string $key, int $ttl = 3600)
          {
              $this->key = $key;
              $this->ttl = $ttl;
          }

          public function isExpired(int $timestamp): bool
          {
              return (time() - $timestamp) > $this->ttl;
          }
      }
