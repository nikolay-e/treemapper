    src/Route.php: |
      <?php

      namespace App\Http;

      #[Attribute]
      class Route
      {
          public string $path;
          public string $method;

          public function __construct(string $path, string $method = 'GET')
          {
              $this->path = $path;
              $this->method = $method;
          }

          public function matches(string $requestPath, string $requestMethod): bool
          {
              return $this->path === $requestPath
                  && strtoupper($this->method) === strtoupper($requestMethod);
          }

          public function __toString(): string
          {
              return "{$this->method} {$this->path}";
          }
      }
    src/Router.php: |
      <?php

      namespace App\Http;

      use ReflectionClass;
      use ReflectionMethod;

      class Router
      {
          private array $routes = [];

          public function registerController(string $controllerClass): void
          {
              $reflection = new ReflectionClass($controllerClass);
              foreach ($reflection->getMethods(ReflectionMethod::IS_PUBLIC) as $method) {
                  $attributes = $method->getAttributes(Route::class);
                  foreach ($attributes as $attr) {
                      $route = $attr->newInstance();
                      $this->routes[] = [
                          'path' => $route->path,
                          'method' => $route->method,
                          'controller' => $controllerClass,
                          'action' => $method->getName(),
                      ];
                  }
              }
          }

          public function dispatch(string $path, string $method): ?array
          {
              foreach ($this->routes as $route) {
                  if ($route['path'] === $path && strtoupper($route['method']) === strtoupper($method)) {
                      $controller = new $route['controller']();
                      $action = $route['action'];
                      return $controller->$action();
                  }
              }
              return null;
          }

          public function getRoutes(): array
          {
              return $this->routes;
          }

          public function hasRoute(string $path, string $method): bool
          {
              foreach ($this->routes as $route) {
                  if ($route['path'] === $path && strtoupper($route['method']) === strtoupper($method)) {
                      return true;
                  }
              }
              return false;
          }
      }
    tests/ControllerTest.php: |
      <?php

      namespace Tests;

      use App\Http\Controller;
      use App\Http\Route;
      use ReflectionMethod;

      class ControllerTest
      {
          public function testIndexReturnsUsers(): void
          {
              $controller = new Controller();
              $result = $controller->index();
              assert(is_array($result));
              assert(array_key_exists('users', $result));
          }

          public function testStoreReturnsCreated(): void
          {
              $controller = new Controller();
              $result = $controller->store();
              assert($result['created'] === true);
          }

          public function testIndexHasRouteAttribute(): void
          {
              $method = new ReflectionMethod(Controller::class, 'index');
              $attrs = $method->getAttributes(Route::class);
              assert(count($attrs) === 1);
              $route = $attrs[0]->newInstance();
              assert($route->path === '/api/users');
              assert($route->method === 'GET');
          }

          public function testStoreHasPostRoute(): void
          {
              $method = new ReflectionMethod(Controller::class, 'store');
              $attrs = $method->getAttributes(Route::class);
              $route = $attrs[0]->newInstance();
              assert($route->method === 'POST');
          }
      }
    src/ProductController.php: |
      <?php

      namespace App\Http;

      class ProductController
      {
          #[Route('/api/products', 'GET')]
          public function list(): array
          {
              return ['products' => []];
          }

          #[Route('/api/products', 'POST')]
          public function create(): array
          {
              return ['created' => true];
          }

          #[Route('/api/products/{id}', 'GET')]
          public function show(int $id): array
          {
              return ['product' => ['id' => $id]];
          }

          #[Route('/api/products/{id}', 'DELETE')]
          public function delete(int $id): array
          {
              return ['deleted' => $id];
          }
      }
