name: cicd_007_makefile_targets
tags:
- lang:python
- lang:shell
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    Makefile: ".PHONY: build test clean install dev\n\nPYTHON := python3\nVENV := venv\nPIP := $(VENV)/bin/pip\nPYTEST :=\
      \ $(VENV)/bin/pytest\n\nbuild:\n\tpython setup.py build\n\ntest:\n\tpytest tests/\n\nclean:\n\trm -rf build/ dist/ *.egg-info\n\
      \tfind . -type d -name __pycache__ -exec rm -rf {} +\n\tfind . -type f -name \"*.pyc\" -delete\n\ninstall:\n\t$(PIP)\
      \ install -e .\n\ndev:\n\t$(PIP) install -e \".[dev]\"\n"
    scripts/deploy.sh: |
      #!/bin/bash
      set -euo pipefail

      APP_ENV="${1:-staging}"
      ARTIFACT_BUCKET="s3://releases.internal"

      echo "Building distribution..."
      python -m build

      echo "Uploading to $ARTIFACT_BUCKET..."
      twine upload dist/*

      echo "Deployed to $APP_ENV"
    src/app.py: |
      import logging
      from typing import Optional
      from dataclasses import dataclass

      from .config import load_config, AppConfig
      from .services import DatabaseService, CacheService

      logger = logging.getLogger(__name__)

      @dataclass
      class Application:
          config: AppConfig
          database: DatabaseService
          cache: Optional[CacheService] = None

          def run(self) -> None:
              logger.info(f"Starting application in {self.config.environment} mode")
              self.database.connect()
              if self.cache:
                  self.cache.connect()

          def shutdown(self) -> None:
              if self.cache:
                  self.cache.disconnect()
              self.database.disconnect()

      def create_application() -> Application:
          config = load_config()
          database = DatabaseService(config.database)
          cache = CacheService(config.cache) if config.cache.enabled else None
          return Application(config=config, database=database, cache=cache)
    src/config.py: |
      import os
      from dataclasses import dataclass

      @dataclass
      class DatabaseConfig:
          host: str
          port: int
          name: str
          user: str
          password: str

      @dataclass
      class CacheConfig:
          enabled: bool
          host: str
          port: int
          ttl_seconds: int

      @dataclass
      class AppConfig:
          environment: str
          database: DatabaseConfig
          cache: CacheConfig

      def load_config() -> AppConfig:
          return AppConfig(
              environment=os.getenv("ENV", "development"),
              database=DatabaseConfig(
                  host=os.getenv("DB_HOST", "localhost"),
                  port=int(os.getenv("DB_PORT", "5432")),
                  name=os.getenv("DB_NAME", "app"),
                  user=os.getenv("DB_USER", "postgres"),
                  password=os.getenv("DB_PASSWORD", ""),
              ),
              cache=CacheConfig(
                  enabled=os.getenv("CACHE_ENABLED", "false").lower() == "true",
                  host=os.getenv("CACHE_HOST", "localhost"),
                  port=int(os.getenv("CACHE_PORT", "6379")),
                  ttl_seconds=int(os.getenv("CACHE_TTL", "300")),
              ),
          )
    .github/workflows/ci.yml: |
      name: CI Pipeline
      on: [push, pull_request]
      jobs:
        quality:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - name: Install tooling
              run: pip install ruff pytest coverage
            - name: Lint
              run: ruff check src/
            - name: Test
              run: pytest tests/ --cov=src
        release:
          needs: quality
          if: github.ref == 'refs/heads/main'
          runs-on: ubuntu-latest
          steps:
            - name: Deploy
              run: ./scripts/deploy.sh production
    Makefile.ci: ".PHONY: lint test build\n\nCI_RUNNER = github-actions\nCOVERAGE_THRESHOLD = 80\n\nlint:\n\truff check src/\n\
      \ntest:\n\tpytest tests/ --cov=src --cov-fail-under=$(COVERAGE_THRESHOLD)\n\nbuild:\n\tpython -m build --wheel\n"
    pyproject.toml: |
      [project]
      name = "myapp"
      version = "1.0.0"
      requires-python = ">=3.11"

      [tool.pytest.ini_options]
      testpaths = ["tests"]
      addopts = "--cov=src --cov-report=html"

      [tool.ruff]
      line-length = 88
      target-version = "py311"
    src/pipeline.py: |
      class DeploymentPipeline:
          def build_artifacts(self, source_dir: str) -> list:
              return []

          def deploy_to_staging(self, artifacts: list) -> bool:
              return True

          def run_smoke_tests(self) -> bool:
              return True
  changed_files:
    Makefile: ".PHONY: build test lint deploy clean install dev\n\nPYTHON := python3\nVENV := venv\nPIP := $(VENV)/bin/pip\n\
      PYTEST := $(VENV)/bin/pytest\n\nbuild:\n\tpython -m build\n\ntest:\n\tpytest tests/ --cov=src\n\nlint:\n\truff check\
      \ src/\n\ndeploy:\n\t./scripts/deploy.sh\n\nclean:\n\trm -rf build/ dist/ *.egg-info\n\tfind . -type d -name __pycache__\
      \ -exec rm -rf {} +\n\tfind . -type f -name \"*.pyc\" -delete\n\ninstall:\n\t$(PIP) install -e .\n\ndev:\n\t$(PIP) install\
      \ -e \".[dev]\"\n"
  commit_message: Update files
