name: terraform_064_yamlencode
repo:
  initial_files:
    k8s.tf: |
      resource "local_file" "k8s_config" {
        filename = "${path.module}/output/deployment.yaml"
        content  = yamlencode({
          apiVersion = "apps/v1"
          kind       = "Deployment"
          metadata = {
            name = "web-app"
            labels = {
              app = "web"
            }
          }
          spec = {
            replicas = 2
            selector = {
              matchLabels = {
                app = "web"
              }
            }
          }
        })
      }
    variables.tf: |
      variable "app_version" {
        type    = string
        default = "v1"
      }

      variable "namespace" {
        type    = string
        default = "production"
      }

      variable "cluster_name" {
        type    = string
        default = "main-cluster"
      }
    services.tf: |
      resource "local_file" "k8s_service" {
        filename = "${path.module}/output/service.yaml"
        content  = yamlencode({
          apiVersion = "v1"
          kind       = "Service"
          metadata = {
            name      = "web-app-service"
            namespace = var.namespace
          }
          spec = {
            selector = {
              app = "web"
            }
            ports = [{
              port       = 80
              targetPort = 8080
              protocol   = "TCP"
            }]
            type = "ClusterIP"
          }
        })
      }
    nginx/config.tf: |
      resource "local_file" "nginx_config" {
        filename = "${path.module}/output/nginx.conf"
        content  = yamlencode({
          upstream = {
            servers = ["10.0.1.1", "10.0.1.2"]
          }
          server = {
            listen = 80
            location = {
              proxy_pass = "http://upstream"
            }
          }
        })
      }
    monitoring/grafana.tf: |
      resource "local_file" "grafana_dashboard" {
        filename = "${path.module}/output/grafana-dashboard.yaml"
        content  = yamlencode({
          apiVersion = "v1"
          kind       = "ConfigMap"
          metadata = {
            name      = "grafana-dashboards"
            namespace = "monitoring"
          }
          data = {
            "dashboard.json" = file("${path.module}/dashboards/main.json")
          }
        })
      }
    alerting/sns.tf: |
      resource "aws_sns_topic" "alerts" {
        name = "critical-alerts"
      }

      resource "aws_sns_topic_subscription" "email" {
        topic_arn = aws_sns_topic.alerts.arn
        protocol  = "email"
        endpoint  = "ops@example.com"
      }
    helm/values.yaml: |
      replicaCount: 3
      image:
        repository: web-app
        tag: v1
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 250m
          memory: 128Mi
      service:
        type: ClusterIP
        port: 80
  changed_files:
    k8s.tf: |
      resource "local_file" "k8s_config" {
        filename = "${path.module}/output/deployment.yaml"
        content  = yamlencode({
          apiVersion = "apps/v1"
          kind       = "Deployment"
          metadata = {
            name      = "web-app"
            namespace = var.namespace
            labels = {
              app     = "web"
              version = var.app_version
            }
          }
          spec = {
            replicas = 3
            selector = {
              matchLabels = {
                app = "web"
              }
            }
            template = {
              spec = {
                containers = [{
                  name  = "web"
                  image = "web-app:${var.app_version}"
                  resources = {
                    limits = {
                      cpu    = "500m"
                      memory = "256Mi"
                    }
                  }
                }]
              }
            }
          }
        })
      }
  commit_message: Update files
