  changed_files:
    src/LinAlg.jl: |
      module LinAlg

      struct Matrix
          rows::Int
          cols::Int
          data::Vector{Float64}
      end

      function zeros(rows::Int, cols::Int)
          Matrix(rows, cols, fill(0.0, rows * cols))
      end

      function identity(n::Int)
          m = zeros(n, n)
          for i in 1:n
              setindex!(m, 1.0, i, i)
          end
          m
      end

      function getindex(m::Matrix, i::Int, j::Int)
          m.data[(i - 1) * m.cols + j]
      end

      function setindex!(m::Matrix, val::Float64, i::Int, j::Int)
          m.data[(i - 1) * m.cols + j] = val
      end

      function add(a::Matrix, b::Matrix)
          @assert a.rows == b.rows && a.cols == b.cols
          Matrix(a.rows, a.cols, a.data .+ b.data)
      end

      function transpose(m::Matrix)
          result = zeros(m.cols, m.rows)
          for i in 1:m.rows
              for j in 1:m.cols
                  setindex!(result, getindex(m, i, j), j, i)
              end
          end
          result
      end

      end
    src/Stats.jl: |
      module Stats
      using ..LinAlg

      function mean_col(m::LinAlg.Matrix, col::Int)
          total = 0.0
          for i in 1:m.rows
              total += LinAlg.getindex(m, i, col)
          end
          total / m.rows
      end

      end
