name: scala_018_cats_effect
tags:
- lang:kotlin
- change:bug_fix
- change:single_file
- context:test_file
- distance:1hop
- difficulty:trivial
repo:
  initial_files:
    src/main/kotlin/auth/TokenValidator.kt: |
      class TokenValidator {
          fun validate(token: String): Boolean {
              return token.length > 0  // BUG: accepts whitespace-only tokens
          }

          fun extractUserId(token: String): String {
              return token.split(".").last()
          }
      }
    src/test/kotlin/auth/TokenValidatorTest.kt: |
      import org.junit.Test
      import kotlin.test.assertFalse
      import kotlin.test.assertTrue

      class TokenValidatorTest {
          private val validator = TokenValidator()

          @Test fun validTokenPasses() {
              assertTrue(validator.validate("eyJ.payload.sig"))
          }

          @Test fun emptyTokenFails() {
              assertFalse(validator.validate(""))
          }
      }
    garbage/PaymentLogger.kt: |
      // GARBAGE_SCALA018_A = "payment_logger_marker"
    garbage/ShipmentConfig.kt: |
      // GARBAGE_SCALA018_B = "shipment_config_marker"
    garbage/InventoryCache.kt: |
      // GARBAGE_SCALA018_C = "inventory_cache_marker"
  changed_files:
    src/main/kotlin/auth/TokenValidator.kt: |
      class TokenValidator {
          fun validate(token: String): Boolean {
              return token.isNotBlank()
          }

          fun extractUserId(token: String): String {
              return token.split(".").last()
          }
      }
    src/test/kotlin/auth/TokenValidatorTest.kt: |
      import org.junit.Test
      import kotlin.test.assertFalse
      import kotlin.test.assertTrue

      class TokenValidatorTest {
          private val validator = TokenValidator()

          @Test fun validTokenPasses() {
              assertTrue(validator.validate("eyJ.payload.sig"))
          }

          @Test fun emptyTokenFails() {
              assertFalse(validator.validate(""))
          }
      }
    garbage/PaymentLogger.kt: |
      // GARBAGE_SCALA018_A = "payment_logger_marker"
    garbage/ShipmentConfig.kt: |
      // GARBAGE_SCALA018_B = "shipment_config_marker"
    garbage/InventoryCache.kt: |
      // GARBAGE_SCALA018_C = "inventory_cache_marker"
  commit_message: "fix: use isNotBlank to reject whitespace-only tokens"
