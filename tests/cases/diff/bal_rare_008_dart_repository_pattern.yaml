name: bal_rare_008_dart_repository_pattern
tags:
- lang:dart
- change:multi_file
- change:new_function
- context:import_chain
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    lib/models/task.dart: |
      class Task {
        final String id;
        final String title;
        final bool completed;

        Task({required this.id, required this.title, this.completed = false});

        Task copyWith({String? id, String? title, bool? completed}) {
          return Task(
            id: id ?? this.id,
            title: title ?? this.title,
            completed: completed ?? this.completed,
          );
        }
      }
    lib/repositories/task_repository.dart: |
      import '../models/task.dart';

      class TaskRepository {
        final List<Task> _tasks = [];

        List<Task> getAll() => List.unmodifiable(_tasks);

        void add(Task task) {
          _tasks.add(task);
        }

        void remove(String id) {
          _tasks.removeWhere((t) => t.id == id);
        }
      }
    lib/services/task_service.dart: |
      import '../repositories/task_repository.dart';
      import '../models/task.dart';

      class TaskService {
        final TaskRepository _repository;

        TaskService(this._repository);

        List<Task> listTasks() => _repository.getAll();

        void createTask(String title) {
          final task = Task(
            id: DateTime.now().millisecondsSinceEpoch.toString(),
            title: title,
          );
          _repository.add(task);
        }
      }
    garbage_logger.dart: |
      const GARBAGE_RARE_008_LEVEL_A = 'debug';
      const GARBAGE_RARE_008_OUTPUT_B = 'console';

      class GarbageLogger {
        static const GARBAGE_RARE_008_FORMAT_C = 'json';
      }
    garbage_storage.dart: |
      const GARBAGE_RARE_008_PATH_D = '/tmp/data';
      const GARBAGE_RARE_008_MAX_SIZE_E = 1048576;

      class GarbageStorage {
        static const GARBAGE_RARE_008_ENCRYPT_F = false;
      }
  changed_files:
    lib/models/task.dart: |
      enum Priority { low, medium, high }

      class Task {
        final String id;
        final String title;
        final bool completed;
        final Priority priority;

        Task({
          required this.id,
          required this.title,
          this.completed = false,
          this.priority = Priority.medium,
        });

        Task copyWith({String? id, String? title, bool? completed, Priority? priority}) {
          return Task(
            id: id ?? this.id,
            title: title ?? this.title,
            completed: completed ?? this.completed,
            priority: priority ?? this.priority,
          );
        }
      }
    lib/repositories/task_repository.dart: |
      import '../models/task.dart';

      class TaskRepository {
        final List<Task> _tasks = [];

        List<Task> getAll() => List.unmodifiable(_tasks);

        List<Task> getByPriority(Priority priority) {
          return _tasks.where((t) => t.priority == priority).toList();
        }

        void add(Task task) {
          _tasks.add(task);
        }

        void remove(String id) {
          _tasks.removeWhere((t) => t.id == id);
        }
      }
    lib/services/task_service.dart: |
      import '../repositories/task_repository.dart';
      import '../models/task.dart';

      class TaskService {
        final TaskRepository _repository;

        TaskService(this._repository);

        List<Task> listTasks() => _repository.getAll();

        List<Task> listHighPriority() => _repository.getByPriority(Priority.high);

        void createTask(String title, {Priority priority = Priority.medium}) {
          final task = Task(
            id: DateTime.now().millisecondsSinceEpoch.toString(),
            title: title,
            priority: priority,
          );
          _repository.add(task);
        }
      }
    garbage_logger.dart: |
      const GARBAGE_RARE_008_LEVEL_A = 'debug';
      const GARBAGE_RARE_008_OUTPUT_B = 'console';

      class GarbageLogger {
        static const GARBAGE_RARE_008_FORMAT_C = 'json';
      }
    garbage_storage.dart: |
      const GARBAGE_RARE_008_PATH_D = '/tmp/data';
      const GARBAGE_RARE_008_MAX_SIZE_E = 1048576;

      class GarbageStorage {
        static const GARBAGE_RARE_008_ENCRYPT_F = false;
      }
  commit_message: "feat: add priority field to tasks with filtering"
