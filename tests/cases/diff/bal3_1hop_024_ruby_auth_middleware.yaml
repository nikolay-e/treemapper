  changed_files:
    lib/auth/token_store.rb: |
      module Auth
        class TokenStore
          def initialize(expiry_seconds: 3600)
            @tokens = {}
            @expiry = {}
            @expiry_seconds = expiry_seconds
          end

          def store(user_id, token)
            @tokens[user_id] = token
            @expiry[user_id] = Time.now + @expiry_seconds
          end

          def fetch(user_id)
            return nil unless @tokens.key?(user_id)
            if Time.now > @expiry[user_id]
              revoke(user_id)
              return nil
            end
            @tokens[user_id]
          end

          def revoke(user_id)
            @tokens.delete(user_id)
            @expiry.delete(user_id)
          end

          def valid?(user_id)
            fetch(user_id) != nil
          end

          def refresh(user_id)
            return false unless @tokens.key?(user_id)
            @expiry[user_id] = Time.now + @expiry_seconds
            true
          end
        end
      end
  commit_message: "feat: add token expiration, valid?, and refresh to TokenStore"
