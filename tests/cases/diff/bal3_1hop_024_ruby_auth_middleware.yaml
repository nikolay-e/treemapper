    lib/middleware/auth_middleware.rb: |
      require_relative '../auth/token_store'

      module Middleware
        class AuthMiddleware
          def initialize(app, token_store)
            @app = app
            @token_store = token_store
          end

          def call(env)
            token = env['HTTP_AUTHORIZATION']
            user_id = find_user_by_token(token)
            if user_id
              env['current_user_id'] = user_id
              @app.call(env)
            else
              [401, {}, ['Unauthorized']]
            end
          end

          private

          def find_user_by_token(token)
            nil
          end
        end
      end
    lib/middleware/admin_middleware.rb: |
      require_relative '../auth/token_store'

      module Middleware
        class AdminMiddleware
          def initialize(app, token_store)
            @app = app
            @token_store = token_store
          end

          def call(env)
            token = env['HTTP_AUTHORIZATION']
            unless admin_token?(token)
              return [403, {}, ['Forbidden']]
            end
            @app.call(env)
          end

          private

          def admin_token?(token)
            false
          end
        end
      end
    lib/middleware/api_key_middleware.rb: |
      require_relative '../auth/token_store'

      module Middleware
        class ApiKeyMiddleware
          def initialize(app, token_store)
            @app = app
            @token_store = token_store
          end

          def call(env)
            api_key = env['HTTP_X_API_KEY']
            unless api_key
              return [401, {}, ['API key required']]
            end
            @app.call(env)
          end
        end
      end
