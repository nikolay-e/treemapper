    src/event_bus.py: |
      from typing import Callable, Dict, List

      class EventBus:
          def __init__(self):
              self.handlers: Dict[str, List[Callable]] = {}

          def subscribe(self, event: str, handler: Callable) -> None:
              self.handlers.setdefault(event, []).append(handler)

          def publish(self, event: str, data: dict) -> None:
              for handler in self.handlers.get(event, []):
                  handler(data)

          def unsubscribe(self, event: str, handler: Callable) -> None:
              if event in self.handlers:
                  self.handlers[event] = [h for h in self.handlers[event] if h != handler]
    src/schema_registry.py: |
      from typing import Dict, Optional

      class SchemaRegistry:
          def __init__(self):
              self.schemas: Dict[str, dict] = {}
              self.versions: Dict[str, int] = {}

          def register(self, name: str, schema: dict) -> int:
              version = self.versions.get(name, 0) + 1
              self.schemas[f"{name}:v{version}"] = schema
              self.versions[name] = version
              return version

          def get_latest(self, name: str) -> Optional[dict]:
              version = self.versions.get(name)
              if version is None:
                  return None
              return self.schemas.get(f"{name}:v{version}")
