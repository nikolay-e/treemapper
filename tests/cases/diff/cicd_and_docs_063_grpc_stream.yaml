name: cicd_and_docs_063_grpc_stream
tags:
- lang:protobuf
- lang:python
- change:single_file
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    proto/stream.proto: |
      syntax = "proto3";

      package stream;

      service DataService {
        rpc GetData(GetDataRequest) returns (DataResponse);
      }

      message GetDataRequest {
        string id = 1;
      }

      message DataResponse {
        bytes data = 1;
      }
    src/grpc/stream_service.py: |
      import grpc
      from proto import stream_pb2, stream_pb2_grpc

      class DataServiceServicer(stream_pb2_grpc.DataServiceServicer):
          def GetData(self, request, context):
              data = get_data_from_storage(request.id)
              if not data:
                  context.abort(grpc.StatusCode.NOT_FOUND, "Data not found")
              return stream_pb2.DataResponse(data=data)
    src/storage/data_store.py: |
      from typing import Optional

      def get_data_from_storage(data_id: str) -> Optional[bytes]:
          return storage.get(data_id)

      def store_data(data_id: str, data: bytes) -> bool:
          storage.set(data_id, data)
          return True
    src/grpc/health_service.py: |
      import grpc
      from grpc_health.v1 import health_pb2, health_pb2_grpc

      class HealthServicer(health_pb2_grpc.HealthServicer):
          def Check(self, request, context):
              return health_pb2.HealthCheckResponse(
                  status=health_pb2.HealthCheckResponse.SERVING
              )
    src/config/server_config.py: |
      GRPC_PORT = 50051
      MAX_WORKERS = 10
      MAX_MESSAGE_LENGTH = 4 * 1024 * 1024
      KEEPALIVE_TIME_MS = 30000
      KEEPALIVE_TIMEOUT_MS = 5000
  changed_files:
    proto/stream.proto: |
      syntax = "proto3";

      package stream;

      service DataService {
        rpc GetData(GetDataRequest) returns (DataResponse);
        rpc StreamData(StreamDataRequest) returns (stream DataChunk);
        rpc UploadData(stream DataChunk) returns (UploadResponse);
        rpc BiDirectionalStream(stream DataChunk) returns (stream DataChunk);
      }

      message GetDataRequest {
        string id = 1;
      }

      message StreamDataRequest {
        string id = 1;
        int32 chunk_size = 2;
      }

      message DataResponse {
        bytes data = 1;
      }

      message DataChunk {
        bytes content = 1;
        int64 offset = 2;
        int64 total_size = 3;
        bool is_last = 4;
        string checksum = 5;
      }

      message UploadResponse {
        string id = 1;
        int64 total_bytes = 2;
        bool success = 3;
        string error_message = 4;
      }
  commit_message: "Add streaming RPCs to DataService proto"
