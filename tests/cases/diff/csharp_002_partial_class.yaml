name: csharp_002_partial_class
tags:
- lang:python
- lang:protobuf
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    proto/inventory.proto: |
      syntax = "proto3";

      message Product {
        string id = 1;
        string name = 2;
        int32 quantity = 3;
      }
    service/inventory_service.py: |
      from proto import inventory_pb2

      class InventoryService:
          def get_product(self, product_id: str) -> inventory_pb2.Product:
              return inventory_pb2.Product(id=product_id, name="Widget", quantity=100)

          def list_products(self) -> list:
              return []
    garbage/billing.py: |
      GARBAGE_CS002_A = "billing_marker"

      def noop():
          pass
    garbage/audit.py: |
      GARBAGE_CS002_B = "audit_marker"

      def noop():
          pass
    garbage/reporting.py: |
      GARBAGE_CS002_C = "reporting_marker"

      def noop():
          pass
  changed_files:
    proto/inventory.proto: |
      syntax = "proto3";

      message Product {
        string id = 1;
        string name = 2;
        int32 quantity = 3;
        double price = 4;
      }
    service/inventory_service.py: |
      from proto import inventory_pb2

      class InventoryService:
          def get_product(self, product_id: str) -> inventory_pb2.Product:
              return inventory_pb2.Product(id=product_id, name="Widget", quantity=100, price=9.99)

          def list_products(self) -> list:
              return []

          def update_price(self, product_id: str, price: float) -> inventory_pb2.Product:
              return inventory_pb2.Product(id=product_id, name="Widget", quantity=100, price=price)
    garbage/billing.py: |
      GARBAGE_CS002_A = "billing_marker"

      def noop():
          pass
    garbage/audit.py: |
      GARBAGE_CS002_B = "audit_marker"

      def noop():
          pass
    garbage/reporting.py: |
      GARBAGE_CS002_C = "reporting_marker"

      def noop():
          pass
  commit_message: "feat: add price field to Product proto and inventory service"
fragments:
- id: proto_file
  selector:
    path: proto/inventory.proto
- id: service_file
  selector:
    path: service/inventory_service.py
- id: no_garbage_a
  selector:
    anchor: GARBAGE_CS002_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_CS002_B
- id: no_garbage_c
  selector:
    anchor: GARBAGE_CS002_C
oracle:
  required:
  - proto_file
  - service_file
  allowed: []
  forbidden:
  - no_garbage_a
  - no_garbage_b
  - no_garbage_c
