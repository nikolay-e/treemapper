    lib/screens/cart_screen.dart: |
      import 'package:flutter/material.dart';
      import 'package:provider/provider.dart';
      import 'package:myapp/providers/cart_provider.dart';

      class CartScreen extends StatefulWidget {
        const CartScreen({super.key});

        @override
        State<CartScreen> createState() => _CartScreenState();
      }

      class _CartScreenState extends State<CartScreen> {
        final TextEditingController _discountController = TextEditingController();
        bool _discountApplied = false;

        void _applyDiscount() {
          final percentage = double.tryParse(_discountController.text);
          if (percentage != null && percentage > 0 && percentage <= 50) {
            final cart = Provider.of<CartProvider>(context, listen: false);
            cart.applyDiscount(percentage);
            setState(() {
              _discountApplied = true;
            });
          }
        }

        @override
        void dispose() {
          _discountController.dispose();
          super.dispose();
        }

        @override
        Widget build(BuildContext context) {
          final cart = Provider.of<CartProvider>(context);
          return Scaffold(
            appBar: AppBar(title: const Text('Cart')),
            body: Column(
              children: [
                Expanded(
                  child: ListView.builder(
                    itemCount: cart.items.length,
                    itemBuilder: (context, index) {
                      final item = cart.items[index];
                      return ListTile(
                        title: Text(item.name),
                        subtitle: Text('\$${item.price.toStringAsFixed(2)} x ${item.quantity}'),
                        trailing: Text('\$${item.total.toStringAsFixed(2)}'),
                      );
                    },
                  ),
                ),
                Padding(
                  padding: const EdgeInsets.all(16),
                  child: Row(
                    children: [
                      Expanded(
                        child: TextField(
                          controller: _discountController,
                          decoration: const InputDecoration(labelText: 'Discount %'),
                          keyboardType: TextInputType.number,
                        ),
                      ),
                      const SizedBox(width: 8),
                      ElevatedButton(
                        onPressed: _discountApplied ? null : _applyDiscount,
                        child: const Text('Apply'),
                      ),
                    ],
                  ),
                ),
                Text('Subtotal: \$${cart.subtotal.toStringAsFixed(2)}'),
              ],
            ),
          );
        }
      }
