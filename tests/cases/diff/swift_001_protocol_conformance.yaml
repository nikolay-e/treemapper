name: swift_001_protocol_conformance
tags:
- lang:swift
- change:single_file
- change:new_function
- change:signature
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    Sources/Models/User.swift: |
      struct User: Codable, Equatable {
          let id: String
          let name: String
          let email: String
      }
    Sources/Services/UserService.swift: |
      import Foundation

      class UserService {
          func listUsers() -> [User] {
              return []
          }
      }
    Sources/Services/NotificationService.swift: |
      import Foundation

      class NotificationService {
          func sendPush(token: String, message: String) {
              print("Sending push to \(token): \(message)")
          }

          func scheduleLocal(title: String, delay: TimeInterval) {
              print("Scheduling '\(title)' in \(delay)s")
          }
      }
    Sources/Models/AppConfig.swift: |
      struct AppConfig: Codable {
          let apiBaseUrl: String
          let timeout: TimeInterval
          let maxRetries: Int
      }
    Sources/Services/UserCacheService.swift: |
      import Foundation

      class UserCacheService {
          private var cache: [String: Data] = [:]

          func cacheUser(_ user: User) throws {
              let data = try JSONEncoder().encode(user)
              cache[user.id] = data
          }

          func loadUser(id: String) throws -> User? {
              guard let data = cache[id] else { return nil }
              return try JSONDecoder().decode(User.self, from: data)
          }

          func invalidate(id: String) {
              cache.removeValue(forKey: id)
          }
      }
    Sources/Models/Product.swift: |
      struct Product: Codable, Equatable {
          let id: String
          let name: String
          let price: Double
          let category: String
      }
    Tests/UserServiceTests.swift: |
      import XCTest
      @testable import MyApp

      final class UserServiceTests: XCTestCase {
          let service = UserService()

          func testEncodeDecodRoundTrip() throws {
              let user = User(id: "1", name: "Alice", email: "alice@test.com")
              let data = try service.encode(user: user)
              let decoded = try service.decode(data: data)
              XCTAssertEqual(user, decoded)
          }

          func testAreEqual() {
              let a = User(id: "1", name: "Alice", email: "alice@test.com")
              let b = User(id: "1", name: "Alice", email: "alice@test.com")
              XCTAssertTrue(service.areEqual(a, b))
          }
      }
  changed_files:
    Sources/Models/User.swift: |
      struct User: Codable, Equatable {
          let id: String
          let name: String
          let email: String
      }
    Sources/Services/UserService.swift: |
      import Foundation

      class UserService {
          func encode(user: User) throws -> Data {
              let encoder = JSONEncoder()
              return try encoder.encode(user)
          }

          func decode(data: Data) throws -> User {
              let decoder = JSONDecoder()
              return try decoder.decode(User.self, from: data)
          }

          func areEqual(_ a: User, _ b: User) -> Bool {
              return a == b
          }
      }
    Sources/Services/NotificationService.swift: |
      import Foundation

      class NotificationService {
