repo:
  initial_files:
    ml/config.py: |
      class TrainingConfig:
          def __init__(self, lr: float, epochs: int):
              self.lr = lr
              self.epochs = epochs
    ml/optimizer.py: |
      from ml.config import TrainingConfig
      class Optimizer:
          def __init__(self, config: TrainingConfig):
              self.config = config
          def step(self, gradients: list[float]) -> list[float]:
              return [g * self.config.lr for g in gradients]
    ml/trainer.py: |
      from ml.optimizer import Optimizer
      class Trainer:
          def __init__(self, optimizer: Optimizer):
              self.optimizer = optimizer
          def train_epoch(self, data: list) -> float:
              loss = sum(len(d) for d in data) / len(data)
              return loss
    ml/experiment.py: |
      from ml.trainer import Trainer
      from ml.optimizer import Optimizer
      from ml.config import TrainingConfig
      def run_experiment(lr: float, epochs: int, data: list) -> list[float]:
          config = TrainingConfig(lr=lr, epochs=epochs)
          optimizer = Optimizer(config)
          trainer = Trainer(optimizer)
          losses = []
          for _ in range(config.epochs):
              losses.append(trainer.train_epoch(data))
          return losses
    ml/data_loader.py: |
      import random
      def load_dataset(path: str) -> list[list[float]]:
          random.seed(42)
          return [[random.random() for _ in range(10)] for _ in range(100)]
    utils/plotting.py: |
      def plot_losses(losses: list[float]):
          for i, loss in enumerate(losses):
              print(f"Epoch {i}: {loss:.4f}")
  changed_files:
    ml/config.py: |
      class TrainingConfig:
          def __init__(self, lr: float, epochs: int, weight_decay: float = 0.01):
              self.lr = lr
              self.epochs = epochs
              self.weight_decay = weight_decay
          def effective_lr(self, step: int) -> float:
              return self.lr * (1.0 / (1.0 + self.weight_decay * step))
