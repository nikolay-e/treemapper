# Test: calculator.add() changed to use float conversion — test file must be pulled
#
# Scenario: calculator.py changes add() from simple `a + b` to `float(a) + float(b)`.
# tests/test_calculator.py (UNCHANGED) imports and tests add(), so a reviewer needs
# to see the test expectations to assess if the type change breaks anything.
#
# Reviewer questions:
#   Q1: "Will the existing test_add assertions still pass with float return?"
#       -> tests/test_calculator.py (UNCHANGED) imports add and asserts add(1,2)==3
#   Q2: "Are there other callers of add() that depend on integer return type?"
#       -> test_calculator.py is the only importer.
#
# Trap files (plausible but unrelated):
#   - math_utils.py: helper math functions — same domain (arithmetic) but
#     calculator.py doesn't import or use it.
#   - conversion_helpers.py: type conversion utilities — similar to float()
#     usage but no dependency from calculator.py.

initial:
  calculator.py: |
    def add(a, b):
        return a + b

    def subtract(a, b):
        return a - b
  tests/test_calculator.py: |
    from calculator import add, subtract

    def test_add():
        assert add(1, 2) == 3
        assert add(-1, 1) == 0

    def test_subtract():
        assert subtract(5, 3) == 2
  math_utils.py: |
    import math

    def clamp(value, min_val, max_val):
        return max(min_val, min(value, max_val))

    def round_to_precision(value, precision=2):
        factor = 10 ** precision
        return math.floor(value * factor + 0.5) / factor

    def percentage(part, whole):
        if whole == 0:
            return 0.0
        return (part / whole) * 100.0
  conversion_helpers.py: |
    def to_int_safe(value, default=0):
        try:
            return int(value)
        except (ValueError, TypeError):
            return default

    def to_float_safe(value, default=0.0):
        try:
            return float(value)
        except (ValueError, TypeError):
            return default

    def to_bool(value):
        if isinstance(value, str):
            return value.lower() in ('true', '1', 'yes')
        return bool(value)
changed:
  calculator.py: |
    def add(a, b):
        return float(a) + float(b)

    def subtract(a, b):
        return a - b
  tests/test_calculator.py: |
    from calculator import add, subtract

    def test_add():
        assert add(1, 2) == 3
        assert add(-1, 1) == 0

    def test_subtract():
        assert subtract(5, 3) == 2
  math_utils.py: |
    import math

    def clamp(value, min_val, max_val):
        return max(min_val, min(value, max_val))

    def round_to_precision(value, precision=2):
        factor = 10 ** precision
        return math.floor(value * factor + 0.5) / factor

    def percentage(part, whole):
        if whole == 0:
            return 0.0
        return (part / whole) * 100.0
  conversion_helpers.py: |
    def to_int_safe(value, default=0):
        try:
            return int(value)
        except (ValueError, TypeError):
            return default

    def to_float_safe(value, default=0.0):
        try:
            return float(value)
        except (ValueError, TypeError):
            return default

    def to_bool(value):
        if isinstance(value, str):
            return value.lower() in ('true', '1', 'yes')
        return bool(value)
must_include_files:
  - calculator.py
  # Q1: test imports add — reviewer must see if float return breaks assertions
  - tests/test_calculator.py
must_include_content_from:
  calculator.py:
    - "return float(a) + float(b)"
  tests/test_calculator.py:
    - "from calculator import add, subtract"
    - "assert add(1, 2) == 3"
must_not_include:
  # math_utils.py: unrelated math helpers
  - clamp
  - round_to_precision
  - percentage
  # conversion_helpers.py: similar float conversion but no dependency
  - to_int_safe
  - to_float_safe
  - to_bool
must_not_include_files:
