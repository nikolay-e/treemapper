# Test: authenticate() adds input validation — test file must be pulled as importer
#
# Scenario: auth/login.py changes authenticate() to add guard for empty/None
# username or password. tests/auth/test_login.py (UNCHANGED) imports and tests
# authenticate — reviewer needs to see existing test expectations.
#
# Reviewer questions:
#   Q1: "Do existing tests cover the new empty-input edge case?"
#       -> tests/auth/test_login.py (UNCHANGED) only tests "admin"/"secret" and
#          "user"/"wrong" — no empty-input test.
#   Q2: "Does the guard clause change behavior for valid inputs?"
#       -> authenticate returns False early for empty, otherwise same logic.
#
# Trap files (plausible but unrelated):
#   - auth/session_manager.py: manages login sessions — same "auth" domain but
#     authenticate() doesn't call or depend on it.
#   - auth/password_hasher.py: hashes passwords — authenticate() does plain
#     comparison, doesn't use a hasher.

initial:
  auth/login.py: |
    def authenticate(username, password):
        return username == "admin" and password == "secret"
  tests/auth/test_login.py: |
    from auth.login import authenticate

    def test_authenticate_success():
        assert authenticate("admin", "secret") is True

    def test_authenticate_failure():
        assert authenticate("user", "wrong") is False
  auth/session_manager.py: |
    import time
    import uuid

    class SessionManager:
        def __init__(self, timeout_seconds=3600):
            self.sessions = {}
            self.timeout = timeout_seconds

        def create_session(self, user_id):
            session_id = str(uuid.uuid4())
            self.sessions[session_id] = {
                "user_id": user_id,
                "created_at": time.time(),
            }
            return session_id

        def get_session(self, session_id):
            session = self.sessions.get(session_id)
            if session and time.time() - session["created_at"] < self.timeout:
                return session
            return None

        def invalidate(self, session_id):
            self.sessions.pop(session_id, None)
  auth/password_hasher.py: |
    import hashlib

    SALT_LENGTH = 16

    def hash_password(password, salt=None):
        if salt is None:
            salt = "default_salt"
        combined = f"{salt}{password}"
        return hashlib.sha256(combined.encode()).hexdigest()

    def verify_password(password, hashed, salt=None):
        return hash_password(password, salt) == hashed
