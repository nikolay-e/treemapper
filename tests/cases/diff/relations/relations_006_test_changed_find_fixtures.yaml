# Test: test_orders uses conftest fixtures — fixture file must be pulled
#
# Scenario: tests/test_orders.py is rewritten to use db_session and sample_products
# fixtures from conftest. tests/conftest.py (UNCHANGED) defines these fixtures.
# A reviewer needs conftest to understand what the fixtures provide.
#
# Reviewer questions:
#   Q1: "What does db_session return? Is it a real connection?"
#       -> tests/conftest.py (UNCHANGED) returns {"connected": True}.
#   Q2: "What's in sample_products? How many items?"
#       -> conftest provides [{id:1,name:"Widget"},{id:2,name:"Gadget"}].
#
# Trap files (plausible but unrelated):
#   - tests/test_inventory.py: another test module using similar fixtures — same
#     tests/ directory but independent from test_orders.
#   - fixtures/sample_data.json: JSON fixture file — test_orders uses conftest
#     Python fixtures, not JSON files.

max_enrichment: 8.3
initial:
  tests/conftest.py: |
    import pytest

    @pytest.fixture
    def db_session():
        return {"connected": True}

    @pytest.fixture
    def sample_products():
        return [
            {"id": 1, "name": "Widget"},
            {"id": 2, "name": "Gadget"},
        ]
  tests/test_orders.py: |
    def test_create_order():
        assert True
  tests/test_inventory.py: |
    def test_check_stock(sample_products):
        assert len(sample_products) > 0

    def test_reorder_threshold():
        threshold = 10
        current_stock = 5
        assert current_stock < threshold

    def test_product_lookup(sample_products):
        widget = next((p for p in sample_products if p["name"] == "Widget"), None)
        assert widget is not None
  fixtures/sample_data.json: |
    {
      "orders": [
        {"id": 1, "product_id": 1, "quantity": 5, "status": "pending"},
        {"id": 2, "product_id": 2, "quantity": 3, "status": "shipped"}
      ],
      "customers": [
        {"id": 1, "name": "Acme Corp", "tier": "premium"}
      ]
    }
changed:
  tests/conftest.py: |
    import pytest

    @pytest.fixture
    def db_session():
        return {"connected": True}

    @pytest.fixture
    def sample_products():
        return [
            {"id": 1, "name": "Widget"},
            {"id": 2, "name": "Gadget"},
        ]
  tests/test_orders.py: |
    def test_create_order(db_session):
        assert db_session["connected"]

    def test_bulk_order(db_session, sample_products):
        assert len(sample_products) == 2
  tests/test_inventory.py: |
    def test_check_stock(sample_products):
        assert len(sample_products) > 0

    def test_reorder_threshold():
        threshold = 10
        current_stock = 5
        assert current_stock < threshold

    def test_product_lookup(sample_products):
        widget = next((p for p in sample_products if p["name"] == "Widget"), None)
        assert widget is not None
  fixtures/sample_data.json: |
    {
      "orders": [
        {"id": 1, "product_id": 1, "quantity": 5, "status": "pending"},
        {"id": 2, "product_id": 2, "quantity": 3, "status": "shipped"}
      ],
      "customers": [
        {"id": 1, "name": "Acme Corp", "tier": "premium"}
      ]
    }
must_include_files:
  - tests/test_orders.py
  # Q1/Q2: conftest defines the fixtures test_orders now uses
  - tests/conftest.py
must_include_content_from:
  tests/test_orders.py:
    - "def test_create_order(db_session):"
    - "def test_bulk_order(db_session, sample_products):"
  tests/conftest.py:
    - "def db_session():"
    - "def sample_products():"
must_not_include:
  # tests/test_inventory.py: independent test module
  - test_check_stock
  - test_reorder_threshold
  - test_product_lookup
  # fixtures/sample_data.json: JSON fixture — tests use conftest Python fixtures
  - Acme Corp
  - '"status": "shipped"'
must_not_include_files:
  - tests/test_inventory.py
  - fixtures/sample_data.json
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
