# Test: format_currency() gains currency symbol parameter — test must be pulled
#
# Scenario: utils/formatting.py changes format_currency(amount) to accept an
# optional symbol parameter. tests/utils/test_formatting.py (UNCHANGED) imports
# and tests format_currency — reviewer needs to verify the default symbol="$"
# preserves backward compatibility.
#
# Reviewer questions:
#   Q1: "Does the existing test still pass with the new signature?"
#       -> tests/utils/test_formatting.py (UNCHANGED) calls format_currency(10)
#          without symbol, relying on the default.
#   Q2: "Are there other callers that pass positional args that might break?"
#       -> test_formatting.py is the only importer.
#
# Trap files (plausible but unrelated):
#   - utils/number_formatting.py: formats numbers with commas/decimals — same
#     formatting domain but format_currency doesn't import it.
#   - utils/locale_config.py: locale/i18n settings — currency formatting relates
#     conceptually but no dependency from formatting.py.

max_enrichment: 5.6
initial:
  utils/formatting.py: |
    def format_currency(amount):
        return f"${amount:.2f}"
  tests/utils/test_formatting.py: |
    from utils.formatting import format_currency

    def test_format_currency():
        assert format_currency(10) == "$10.00"
  utils/number_formatting.py: |
    def format_with_commas(value):
        return f"{value:,.0f}"

    def format_percentage(value, decimals=1):
        return f"{value:.{decimals}f}%"

    def format_bytes(size_bytes):
        for unit in ['B', 'KB', 'MB', 'GB']:
            if size_bytes < 1024:
                return f"{size_bytes:.1f} {unit}"
            size_bytes /= 1024
        return f"{size_bytes:.1f} TB"
  utils/locale_config.py: |
    SUPPORTED_LOCALES = {
        "en": {"decimal": ".", "thousands": ",", "currency": "$"},
        "de": {"decimal": ",", "thousands": ".", "currency": "EUR"},
        "jp": {"decimal": ".", "thousands": ",", "currency": "JPY"},
    }

    def get_locale_settings(locale="en"):
        return SUPPORTED_LOCALES.get(locale, SUPPORTED_LOCALES["en"])

    def format_for_locale(value, locale="en"):
        settings = get_locale_settings(locale)
        return f"{settings['currency']}{value}"
