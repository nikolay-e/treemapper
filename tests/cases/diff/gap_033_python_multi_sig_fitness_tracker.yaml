  changed_files:
    fitness/workout.py: |
      from dataclasses import dataclass
      from datetime import datetime

      @dataclass
      class Exercise:
          name: str
          sets: int
          reps: int
          weight_kg: float = 0.0

      @dataclass
      class Workout:
          exercises: list
          started_at: datetime
          finished_at: datetime | None = None

          def total_sets(self) -> int:
              return sum(e.sets for e in self.exercises)

          def total_volume(self) -> float:
              return sum(e.sets * e.reps * e.weight_kg for e in self.exercises)

          def duration_minutes(self) -> float:
              if not self.finished_at:
                  return 0.0
              delta = self.finished_at - self.started_at
              return delta.total_seconds() / 60
    fitness/planner.py: |
      from datetime import datetime

      class WeeklyPlanner:
          def __init__(self, rest_days: list[str] | None = None):
              self.schedule: dict[str, list[str]] = {}
              self.rest_days = rest_days or []

          def assign(self, day: str, exercises: list[str]) -> None:
              if day in self.rest_days:
                  raise ValueError(f"{day} is a rest day")
              self.schedule[day] = exercises

          def get_today(self) -> list[str]:
              day_name = datetime.now().strftime("%A")
              return self.schedule.get(day_name, [])

          def summary(self) -> dict[str, int]:
              return {day: len(exs) for day, exs in self.schedule.items()}
  commit_message: "add weight tracking and rest day validation"
