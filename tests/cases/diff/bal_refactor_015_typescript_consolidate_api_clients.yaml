    src/net/connection.rs: |
      use std::io::{self, Read, Write};
      use std::net::TcpStream;
      use std::time::Duration;

      pub struct Connection {
          stream: TcpStream,
          timeout_ms: u64,
      }

      impl Connection {
          pub fn connect(addr: &str, timeout_ms: u64) -> io::Result<Self> {
              let stream = TcpStream::connect(addr)?;
              stream.set_read_timeout(Some(Duration::from_millis(timeout_ms)))?;
              Ok(Connection { stream, timeout_ms })
          }

          pub fn send(&mut self, data: &[u8]) -> io::Result<usize> {
              self.stream.write(data)
          }

          pub fn recv(&mut self, buf: &mut [u8]) -> io::Result<usize> {
              self.stream.read(buf)
          }
      }
    src/net/pool.rs: |
      use crate::net::connection::Connection;
      use std::collections::VecDeque;
      use std::io;
      use std::sync::{Arc, Mutex};

      pub struct ConnectionPool {
          addr: String,
          timeout_ms: u64,
          idle: Arc<Mutex<VecDeque<Connection>>>,
          max_size: usize,
      }

      impl ConnectionPool {
          pub fn new(addr: &str, timeout_ms: u64, max_size: usize) -> Self {
              ConnectionPool {
                  addr: addr.to_string(),
                  timeout_ms,
                  idle: Arc::new(Mutex::new(VecDeque::new())),
                  max_size,
              }
          }

          pub fn acquire(&self) -> io::Result<Connection> {
              let mut idle = self.idle.lock().unwrap();
              if let Some(conn) = idle.pop_front() {
                  return Ok(conn);
              }
              Connection::connect(&self.addr, self.timeout_ms)
          }

          pub fn release(&self, conn: Connection) {
              let mut idle = self.idle.lock().unwrap();
              if idle.len() < self.max_size {
                  idle.push_back(conn);
              }
          }
      }
    src/client/http.rs: |
      use crate::net::pool::ConnectionPool;
      use std::io;

      pub struct HttpClient {
          pool: ConnectionPool,
      }

      impl HttpClient {
          pub fn new(addr: &str) -> Self {
              HttpClient {
                  pool: ConnectionPool::new(addr, 5000, 10),
              }
          }

          pub fn get(&self, path: &str) -> io::Result<Vec<u8>> {
              let mut conn = self.pool.acquire()?;
              let request = format!("GET {} HTTP/1.0\r\n\r\n", path);
              conn.send(request.as_bytes())?;
              let mut buf = vec![0u8; 4096];
              let n = conn.recv(&mut buf)?;
              self.pool.release(conn);
              Ok(buf[..n].to_vec())
          }
      }
    tests/net_integration.rs: |
      use crate::net::connection::Connection;
      use crate::net::pool::ConnectionPool;

      #[test]
      fn pool_returns_cached_connection() {
          let pool = ConnectionPool::new("127.0.0.1:9999", 100, 5);
          assert_eq!(pool.max_size, 5);
