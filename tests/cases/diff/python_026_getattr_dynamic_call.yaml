      from typing import Dict, Any, Optional, List, Tuple
      from dataclasses import dataclass

      @dataclass
      class ParsedCommand:
          name: str
          args: List[str]
          kwargs: Dict[str, str]

      class CommandParser:
          def __init__(self, prefix: str = "/"):
              self._prefix = prefix

          def parse(self, input_str: str) -> Optional[ParsedCommand]:
              if not input_str.startswith(self._prefix):
                  return None
              parts = input_str[len(self._prefix):].split()
              if not parts:
                  return None
              name = parts[0]
              args = [p for p in parts[1:] if "=" not in p]
              kwargs = dict(p.split("=", 1) for p in parts[1:] if "=" in p)
              return ParsedCommand(name=name, args=args, kwargs=kwargs)
    plugin_loader.py: |
      import importlib
      from typing import Dict, Any, Optional, Type

      class PluginLoader:
          def __init__(self):
              self._plugins: Dict[str, Any] = {}

          def load(self, module_path: str, class_name: str) -> Optional[Type]:
              try:
                  module = importlib.import_module(module_path)
                  return getattr(module, class_name, None)
              except ImportError:
                  return None

          def register(self, name: str, plugin: Any) -> None:
              self._plugins[name] = plugin

          def get(self, name: str) -> Optional[Any]:
              return self._plugins.get(name)
