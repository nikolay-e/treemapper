    Sources/HTTP/Middleware.swift: |
      import Foundation

      struct HTTPRequest {
          var path: String
          var method: String
          var headers: [String: String]
          var body: Data?
          var queryParams: [String: String]
      }

      struct HTTPResponse {
          var statusCode: Int
          var headers: [String: String]
          var body: Data?
      }

      typealias MiddlewareFunc = (HTTPRequest) -> HTTPRequest
      typealias AsyncMiddlewareFunc = (HTTPRequest, @escaping (HTTPRequest) -> Void) -> Void

      class MiddlewarePipeline {
          private var middlewares: [MiddlewareFunc] = []

          func use(_ middleware: @escaping MiddlewareFunc) {
              middlewares.append(middleware)
          }

          func execute(request: HTTPRequest) -> HTTPRequest {
              return middlewares.reduce(request) { req, mw in mw(req) }
          }
      }
