      from typing import List, Optional, Dict
      from src.warehouse.stock import StockEntry, StockLedger

      class AllocationResult:
          def __init__(self, sku: str, allocated: int, remaining: int):
              self.sku = sku
              self.allocated = allocated
              self.remaining = remaining

      class InventoryAllocator:
          def __init__(self, ledger: StockLedger, allow_partial: bool = False):
              self.ledger = ledger
              self.allow_partial = allow_partial

          def allocate(self, sku: str, quantity: int) -> bool:
              entry = self.ledger.find_entry(sku)
              if entry is None or entry.available < quantity:
                  return False
              entry.available -= quantity
              return True

          def allocate_detailed(self, sku: str, quantity: int) -> Optional[AllocationResult]:
              entry = self.ledger.find_entry(sku)
              if entry is None:
                  return None
              actual = min(quantity, entry.available) if self.allow_partial else quantity
              if actual > entry.available:
                  return None
              entry.available -= actual
              return AllocationResult(sku=sku, allocated=actual, remaining=entry.available)

          def bulk_allocate(self, requests: Dict[str, int]) -> Dict[str, AllocationResult]:
              results = {}
              for sku, qty in requests.items():
                  result = self.allocate_detailed(sku, qty)
                  if result:
                      results[sku] = result
              return results

          def release(self, sku: str, quantity: int) -> None:
              entry = self.ledger.find_entry(sku)
              if entry:
                  entry.available += quantity
