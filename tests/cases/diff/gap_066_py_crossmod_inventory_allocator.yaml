      from dataclasses import dataclass
      from typing import List

      @dataclass
      class BinLocation:
          zone: str
          aisle: int
          shelf: int
          slot: int

          def code(self) -> str:
              return f"{self.zone}-{self.aisle:02d}-{self.shelf:02d}-{self.slot:02d}"

      class LocationRegistry:
          def __init__(self):
              self._bins: List[BinLocation] = []

          def register_bin(self, loc: BinLocation) -> None:
              self._bins.append(loc)

          def find_by_zone(self, zone: str) -> List[BinLocation]:
              return [b for b in self._bins if b.zone == zone]
