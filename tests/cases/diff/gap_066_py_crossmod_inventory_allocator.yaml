    src/warehouse/allocator.py: |
      from typing import List, Optional
      from src.warehouse.stock import StockEntry, StockLedger

      class InventoryAllocator:
          def __init__(self, ledger: StockLedger):
              self.ledger = ledger

          def allocate(self, sku: str, quantity: int) -> bool:
              entry = self.ledger.find_entry(sku)
              if entry is None or entry.available < quantity:
                  return False
              entry.available -= quantity
              return True

          def release(self, sku: str, quantity: int) -> None:
              entry = self.ledger.find_entry(sku)
              if entry:
                  entry.available += quantity
    src/warehouse/stock.py: |
      from typing import Optional, List
      from dataclasses import dataclass

      @dataclass
      class StockEntry:
          sku: str
          available: int
          reserved: int = 0

      class StockLedger:
          def __init__(self):
              self._entries: List[StockEntry] = []

          def add_entry(self, entry: StockEntry) -> None:
              self._entries.append(entry)

          def find_entry(self, sku: str) -> Optional[StockEntry]:
              for e in self._entries:
                  if e.sku == sku:
                      return e
              return None

          def total_available(self) -> int:
              return sum(e.available for e in self._entries)
