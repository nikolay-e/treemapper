name: comprehensive_003_context_cross_file_ppr_callee
repo:
  initial_files:
    src/math_utils.py: |
      from typing import List

      def calculate_sum(a: float, b: float) -> float:
          return a + b

      def calculate_product(a: float, b: float) -> float:
          return a * b

      def calculate_average(numbers: List[float]) -> float:
          total = calculate_sum(numbers[0], numbers[1])
          for n in numbers[2:]:
              total = calculate_sum(total, n)
          return total / len(numbers)

      def calculate_median(numbers: List[float]) -> float:
          sorted_nums = sorted(numbers)
          mid = len(sorted_nums) // 2
          if len(sorted_nums) % 2 == 0:
              return calculate_average([sorted_nums[mid - 1], sorted_nums[mid]])
          return sorted_nums[mid]
    src/processor.py: |
      from src.math_utils import calculate_average

      def process_data(data):
          result = calculate_average(data)
          return result

      def process_batch(batches):
          return [process_data(batch) for batch in batches]
    src/validator.py: |
      from typing import List

      def validate_numeric_input(data: List) -> bool:
          return all(isinstance(x, (int, float)) for x in data)

      def validate_non_empty(data: List) -> bool:
          return len(data) > 0
    src/feature_flags.py: |
      from typing import Dict, Optional

      class FeatureFlagService:
          def __init__(self):
              self.flags: Dict[str, bool] = {}

          def is_enabled(self, flag_name: str) -> bool:
              return self.flags.get(flag_name, False)

          def set_flag(self, flag_name: str, enabled: bool) -> None:
              self.flags[flag_name] = enabled
    src/ab_testing.py: |
      import random
      from typing import Dict

      class ABTestRunner:
          def __init__(self, variants: Dict[str, float]):
              self.variants = variants

          def assign_variant(self, user_id: str) -> str:
              random.seed(hash(user_id))
              roll = random.random()
              cumulative = 0.0
              for variant, weight in self.variants.items():
                  cumulative += weight
                  if roll <= cumulative:
                      return variant
              return list(self.variants.keys())[-1]
