name: kubernetes_022_service_port
repo:
  initial_files:
    k8s/apps/backend/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend-api
        namespace: production
        labels:
          app: backend-api
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: backend-api
        template:
          metadata:
            labels:
              app: backend-api
          spec:
            containers:
            - name: api
              image: backend-api:v1.0.0
              ports:
              - containerPort: 8080
                name: http
              - containerPort: 9090
                name: metrics
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
    k8s/apps/backend/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: backend-api
        namespace: production
      spec:
        selector:
          app: backend-api
        ports:
        - name: http
          port: 80
          targetPort: 3000
          protocol: TCP
    k8s/monitoring/service-monitor.yaml: |
      apiVersion: monitoring.coreos.com/v1
      kind: ServiceMonitor
      metadata:
        name: backend-api-metrics
        namespace: monitoring
      spec:
        selector:
          matchLabels:
            app: backend-api
        endpoints:
        - port: metrics
          interval: 15s
          path: /metrics
    k8s/apps/frontend/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: frontend
        namespace: production
      spec:
        selector:
          app: frontend
        ports:
        - name: http
          port: 80
          targetPort: 3000
        - name: https
          port: 443
          targetPort: 3000
  changed_files:
