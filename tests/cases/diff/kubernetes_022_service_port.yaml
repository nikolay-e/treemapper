              image: backend-api:v1.0.0
              ports:
              - containerPort: 8080
                name: http
              - containerPort: 9090
                name: metrics
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
    k8s/apps/backend/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: backend-api
        namespace: production
        labels:
          app: backend-api
      spec:
        selector:
          app: backend-api
        ports:
        - name: http
          port: 80
          targetPort: 8080
          protocol: TCP
        - name: metrics
          port: 9090
