  changed_files:
    string_utils.h: |
      #ifndef STRING_UTILS_H
      #define STRING_UTILS_H
      int str_len(const char *s);
      char *str_dup(const char *s);
      char *str_trim(char *s);
      #endif
    string_utils.c: |
      #include "string_utils.h"
      #include <stdlib.h>
      #include <string.h>
      #include <ctype.h>
      int str_len(const char *s) {
          int n = 0;
          while (s[n]) n++;
          return n;
      }
      char *str_dup(const char *s) {
          char *d = malloc(str_len(s) + 1);
          strcpy(d, s);
          return d;
      }
      char *str_trim(char *s) {
          while (isspace((unsigned char)*s)) s++;
          char *end = s + str_len(s) - 1;
          while (end > s && isspace((unsigned char)*end)) *end-- = '\0';
          return s;
      }
    parser.c: |
      #include "string_utils.h"
      void parse_token(char *token) {
          token = str_trim(token);
          int len = str_len(token);
          /* process trimmed token of length len */
      }
    C_NOISE_009_io.h: |
      #ifndef C_NOISE_009_IO_H
      #define C_NOISE_009_IO_H
      int C_NOISE_009_read_line(char *buf, int max);
      void C_NOISE_009_write_line(const char *s);
      #endif
    C_NOISE_009_io.c: |
      #include "C_NOISE_009_io.h"
      int C_NOISE_009_read_line(char *buf, int max) { return 0; }
      void C_NOISE_009_write_line(const char *s) {}
