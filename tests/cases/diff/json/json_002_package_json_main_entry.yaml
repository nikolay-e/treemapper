# Scenario: package.json changes main from "dist/index.js" to "dist/index.cjs",
#   adds "module" (ESM), "types" (d.ts), and "exports" field with dual CJS/ESM.
#
# Reviewer questions:
#   Q1: "Does the library export the same functions from both CJS and ESM?"
#       -> src/index.ts: exports greet, capitalize, slugify, truncate.
#          The exports field maps both require and import to dist/ files.
#          Reviewer must verify the build produces both .cjs and .mjs.
#
#   Q2: "Are type definitions correctly referenced?"
#       -> src/types.ts: defines StringTransformOptions, TransformFn,
#          TransformPipeline. The "types" field points to "dist/index.d.ts".
#          Reviewer must verify tsc generates this file.
#
# Not needed:
#   - tsconfig.json: TypeScript config that produces dist/. Related to
#     the build but different config concern.
#
#   - .npmrc: npm publish config. Same package domain but publish settings
#     don't help review the exports field.
#
#   - .npmignore: Files excluded from npm package. Same domain but
#     doesn't help review the entry point changes.
#
#   - README.md: Package documentation. Could document the dual CJS/ESM
#     support. But docs don't help review config correctness.

max_enrichment: 3.8
initial:
  package.json: |
    {
      "name": "mylib",
      "version": "2.1.0",
      "description": "Utility library for string manipulation",
      "main": "dist/index.js",
      "scripts": {
        "build": "tsc",
        "prepublishOnly": "npm run build"
      },
      "keywords": ["string", "utils"],
      "license": "MIT",
      "devDependencies": {
        "typescript": "^5.2.0"
      }
    }

  src/index.ts: |
    export function greet(name: string): string {
        return `Hello, ${name}!`;
    }

    export function capitalize(str: string): string {
        if (str.length === 0) return str;
        return str.charAt(0).toUpperCase() + str.slice(1);
    }

    export function slugify(text: string): string {
        return text
            .toLowerCase()
            .replace(/\s+/g, '-')
            .replace(/[^a-z0-9-]/g, '');
    }

    export function truncate(str: string, maxLength: number): string {
        if (str.length <= maxLength) return str;
        return str.slice(0, maxLength - 3) + '...';
    }

  src/types.ts: |
    export interface StringTransformOptions {
        preserveCase: boolean;
        trimWhitespace: boolean;
        maxLength: number;
    }

    export type TransformFn = (input: string) => string;

    export interface TransformPipeline {
        transforms: TransformFn[];
        apply(input: string): string;
    }

  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "ES2020",
        "module": "commonjs",
        "declaration": true,
        "outDir": "dist",
        "rootDir": "src",
        "strict": true,
        "esModuleInterop": true
      },
      "include": ["src/**/*"]
    }

  .npmrc: |
    registry=https://registry.npmjs.org/
    access=public

  .npmignore: |
    src/
    tsconfig.json
    .eslintrc.json
    tests/
    coverage/

changed:
  package.json: |
    {
      "name": "mylib",
      "version": "2.1.0",
      "description": "Utility library for string manipulation",
      "main": "dist/index.cjs",
      "module": "dist/index.mjs",
      "types": "dist/index.d.ts",
      "exports": {
        ".": {
          "require": "./dist/index.cjs",
          "import": "./dist/index.mjs",
          "types": "./dist/index.d.ts"
        }
      },
      "scripts": {
        "build": "tsc",
        "prepublishOnly": "npm run build"
      },
      "keywords": ["string", "utils"],
      "license": "MIT",
      "devDependencies": {
        "typescript": "^5.2.0"
      }
    }

must_include_files:
  - package.json

must_include_content_from:
  package.json:
    - '"main": "dist/index.cjs"'
    - '"module": "dist/index.mjs"'
    - '"types": "dist/index.d.ts"'
    - '"require": "./dist/index.cjs"'
    - '"import": "./dist/index.mjs"'

must_not_include:
  # --- tsconfig.json: separate build config ---
  - '"declaration": true'
  - "esModuleInterop"
  # --- .npmrc: publish config ---
  - "registry.npmjs.org"
  - "access=public"
  # --- .npmignore: package exclusions ---
  - "coverage/"
  - "tsconfig.json"

must_not_include_files:
  - tsconfig.json
  - .npmrc
  - .npmignore

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
