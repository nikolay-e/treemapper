# Scenario: netlify.json changes publish dir from "dist" to "build", functions
#   dir from "functions" to "netlify/functions", adds redirect rules.
#
# Reviewer questions:
#   Q1: "Will the redirect /api/* -> /.netlify/functions/:splat work?"
#       -> functions/users.js: handler function at functions/users.js.
#          With new dir "netlify/functions", Netlify resolves splat routes.
#          Reviewer must verify the function path matches.
#
#   Q2: "Does the publish dir change from 'dist' to 'build' match the build?"
#       -> Config: "command": "npm run build". The output dir depends on
#          the build tool config. Reviewer must verify build outputs to "build".
#
# Not needed:
#   - package.json: Build scripts and deps. Could verify build output dir.
#     But the diff is about netlify.json, not build tool config.
#
#   - src/index.js: Frontend entry point. Built into publish dir.
#     But source code doesn't help review deployment config changes.
#
#   - netlify/plugins/index.js: Netlify build plugin. Same config domain.
#     But plugin code doesn't help review redirect rules.

initial:
  netlify.json: |
    {
      "build": {
        "command": "npm run build",
        "publish": "dist",
        "environment": {
          "NODE_VERSION": "18"
        }
      },
      "functions": {
        "directory": "functions"
      },
      "headers": [
        {
          "for": "/api/*",
          "values": {"Access-Control-Allow-Origin": "*"}
        }
      ]
    }

  functions/hello.js: |
    exports.handler = async (event) => {
        const name = event.queryStringParameters?.name || 'World';
        return {
            statusCode: 200,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: `Hello, ${name}!` }),
        };
    };

  functions/users.js: |
    const { getAllUsers, addUser } = require('./utils/database');

    exports.handler = async (event) => {
        if (event.httpMethod === 'GET') {
            const users = await getAllUsers();
            return {
                statusCode: 200,
                body: JSON.stringify({ users }),
            };
        }

        if (event.httpMethod === 'POST') {
            const data = JSON.parse(event.body);
            const user = await addUser(data);
            return {
                statusCode: 201,
                body: JSON.stringify({ user }),
            };
        }

        return { statusCode: 405, body: 'Method Not Allowed' };
    };

  functions/utils/database.js: |
    const store = [];

    async function getAllUsers() {
        return [...store];
    }

    async function addUser(data) {
        const user = { id: store.length + 1, ...data, createdAt: Date.now() };
        store.push(user);
        return user;
    }

    module.exports = { getAllUsers, addUser };

  package.json: |
    {
      "name": "netlify-app",
      "version": "1.0.0",
      "scripts": {
        "build": "vite build",
        "dev": "vite dev",
        "preview": "vite preview"
      },
      "dependencies": {
        "react": "^18.2.0",
        "react-dom": "^18.2.0"
      },
      "devDependencies": {
        "vite": "^4.4.0"
      }
    }

  src/index.js: |
    import React from 'react';
    import ReactDOM from 'react-dom/client';

    function App() {
        return React.createElement('div', null,
            React.createElement('h1', null, 'Hello Netlify'),
            React.createElement('p', null, 'Deployed with Netlify Functions')
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));

changed:
  netlify.json: |
    {
      "build": {
        "command": "npm run build",
        "publish": "build",
        "environment": {
          "NODE_VERSION": "18"
        }
      },
      "functions": {
        "directory": "netlify/functions"
      },
      "redirects": [
        {"from": "/api/*", "to": "/.netlify/functions/:splat", "status": 200}
      ],
      "headers": [
        {
          "for": "/api/*",
          "values": {"Access-Control-Allow-Origin": "*"}
        }
      ]
    }

must_include_files:
  - netlify.json

must_include_content_from:
  netlify.json:
    - '"publish": "build"'
    - '"directory": "netlify/functions"'
    - '"from": "/api/*"'

must_not_include:
  # --- package.json: build config, not deployment config ---
  - "vite build"
  - "react-dom"
  # --- src/index.js: frontend source ---
  - ReactDOM
  - createRoot
  - "Hello Netlify"

must_not_include_files:
  - package.json
  - src/index.js

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
