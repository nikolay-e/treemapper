# Scenario: vercel.json changes builds src from "api/*.js" to "api/**/*.ts"
#   and adds multi-region deployment with ["sfo1", "iad1"].
#
# Reviewer questions:
#   Q1: "Does changing from *.js to **/*.ts break existing JS handlers?"
#       -> api/hello.js and api/users.js are .js files. The new glob
#          "api/**/*.ts" only matches .ts files. Unless migrated, existing
#          .js handlers will stop being built. Major review finding.
#
#   Q2: "Are the region codes sfo1 and iad1 valid Vercel regions?"
#       -> Vercel config specific. Reviewer must verify these are valid
#          Vercel region identifiers.
#
# Not needed:
#   - lib/userService.js: Service used by api/users.js. Different layer.
#     Not relevant to Vercel deployment configuration.
#
#   - package.json: Project deps. Not relevant to Vercel routing config.
#
#   - tsconfig.json: TypeScript config. Related to the .ts migration but
#     the diff only changes vercel.json, not the actual migration.

initial:
  vercel.json: |
    {
      "version": 2,
      "builds": [
        {"src": "api/*.js", "use": "@vercel/node"}
      ],
      "routes": [
        {"src": "/api/(.*)", "dest": "/api/$1"},
        {"src": "/(.*)", "dest": "/public/$1"}
      ],
      "env": {
        "NODE_ENV": "production"
      }
    }

  api/hello.js: |
    module.exports = (req, res) => {
        const name = req.query.name || 'World';
        res.json({ message: `Hello, ${name}!` });
    };

  api/users.js: |
    const { getUsers, createUser } = require('../lib/userService');

    module.exports = async (req, res) => {
        if (req.method === 'GET') {
            const users = await getUsers();
            return res.json({ users, count: users.length });
        }

        if (req.method === 'POST') {
            const user = await createUser(req.body);
            return res.status(201).json({ user });
        }

        res.status(405).json({ error: 'Method not allowed' });
    };

  lib/userService.js: |
    const users = [];

    async function getUsers() {
        return [...users];
    }

    async function createUser(data) {
        const user = {
            id: users.length + 1,
            name: data.name,
            email: data.email,
            createdAt: new Date().toISOString(),
        };
        users.push(user);
        return user;
    }

    module.exports = { getUsers, createUser };

  package.json: |
    {
      "name": "vercel-app",
      "version": "1.0.0",
      "scripts": {
        "dev": "vercel dev",
        "build": "vercel build"
      },
      "dependencies": {
        "express": "^4.18.0"
      }
    }

  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "ES2020",
        "module": "commonjs",
        "outDir": "dist",
        "strict": true,
        "esModuleInterop": true
      },
      "include": ["api/**/*.ts", "lib/**/*.ts"]
    }

changed:
  vercel.json: |
    {
      "version": 2,
      "builds": [
        {"src": "api/**/*.ts", "use": "@vercel/node"}
      ],
      "routes": [
        {"src": "/api/(.*)", "dest": "/api/$1"},
        {"src": "/(.*)", "dest": "/public/$1"}
      ],
      "regions": ["sfo1", "iad1"],
      "env": {
        "NODE_ENV": "production"
      }
    }

must_include_files:
  - vercel.json

must_include_content_from:
  vercel.json:
    - '"src": "api/**/*.ts"'
    - '"regions": ["sfo1", "iad1"]'

must_not_include:
  # --- lib/userService.js: service layer, not deployment config ---
  - getUsers
  - createUser
  - "users.length + 1"
  # --- package.json: deps ---
  - "vercel dev"
  - "vercel build"
  # --- tsconfig.json: TS config, separate concern ---
  - "esModuleInterop"

must_not_include_files:
  - lib/userService.js
  - package.json
  - tsconfig.json

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
