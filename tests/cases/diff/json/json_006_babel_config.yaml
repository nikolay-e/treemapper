# Scenario: babel.config.json changes preset-env from simple string to array
#   with targets: {node: "18"}, and adds @babel/preset-typescript.
#
# Reviewer questions:
#   Q1: "Does targeting node 18 affect existing code using private fields?"
#       -> src/modern.js: uses #prefix private field (class syntax). Node 18
#          supports this natively, so Babel won't need to transform it.
#
#   Q2: "Does adding preset-typescript affect existing .js files?"
#       -> src/modern.js and src/runtime.js are .js files. TypeScript preset
#          will strip type annotations if present but won't break .js files.
#
# Not needed:
#   - tsconfig.json: TypeScript compiler config. Related to TS setup but
#     Babel handles TS compilation here, not tsc. Different tool concern.
#
#   - package.json: Babel plugin versions. Same tool domain but deps
#     don't help review whether the config changes are correct.
#
#   - .babelrc: Alternative Babel config location. Could conflict with
#     babel.config.json but that's a separate concern.

max_enrichment: 5.3
initial:
  babel.config.json: |
    {
      "presets": ["@babel/preset-env"],
      "plugins": [
        "@babel/plugin-proposal-class-properties",
        "@babel/plugin-transform-runtime"
      ],
      "env": {
        "test": {
          "presets": ["@babel/preset-env"]
        }
      }
    }

  src/modern.js: |
    const greet = (name) => `Hello, ${name}`;

    const createPipeline = (...fns) => (input) =>
        fns.reduce((acc, fn) => fn(acc), input);

    class MessageBuilder {
        #prefix = '';

        constructor(prefix) {
            this.#prefix = prefix;
        }

        build(text) {
            return `${this.#prefix}: ${text}`;
        }

        withTimestamp(text) {
            const ts = new Date().toISOString();
            return this.build(`[${ts}] ${text}`);
        }
    }

    const formatOutput = createPipeline(
        (s) => s.trim(),
        (s) => s.toLowerCase(),
        (s) => s.replace(/\s+/g, '-')
    );

    export { greet, createPipeline, MessageBuilder, formatOutput };
    export default greet;

  src/runtime.js: |
    import { greet, MessageBuilder } from './modern';

    const builder = new MessageBuilder('APP');

    function startApp(userName) {
        const welcome = greet(userName);
        const message = builder.withTimestamp(welcome);
        console.log(message);
        return message;
    }

    function processMessage(text) {
        return builder.build(text);
    }

    export { startApp, processMessage };

  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "ES2020",
        "module": "commonjs",
        "strict": true,
        "esModuleInterop": true,
        "noEmit": true,
        "skipLibCheck": true
      },
      "include": ["src/**/*"]
    }

  package.json: |
    {
      "name": "modern-app",
      "version": "1.0.0",
      "scripts": {
        "build": "babel src --out-dir dist",
        "build:ts": "tsc && babel dist --out-dir lib"
      },
      "devDependencies": {
        "@babel/core": "^7.22.0",
        "@babel/preset-env": "^7.22.0",
        "@babel/preset-typescript": "^7.22.0",
        "@babel/plugin-proposal-class-properties": "^7.18.0",
        "@babel/plugin-transform-runtime": "^7.22.0"
      }
    }

changed:
  babel.config.json: |
    {
      "presets": [
        ["@babel/preset-env", {"targets": {"node": "18"}}],
        "@babel/preset-typescript"
      ],
      "plugins": [
        "@babel/plugin-proposal-class-properties",
        "@babel/plugin-transform-runtime"
      ],
      "env": {
        "test": {
          "presets": ["@babel/preset-env"]
        }
      }
    }

must_include_files:
  - babel.config.json

must_include_content_from:
  babel.config.json:
    - '"targets": {"node": "18"}'
    - "@babel/preset-typescript"

must_not_include:
  # --- tsconfig.json: different TS tool ---
  - "noEmit"
  - "skipLibCheck"
  # --- package.json: deps ---
  - "@babel/core"
  - "build:ts"

must_not_include_files:
  - tsconfig.json
  - package.json

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
