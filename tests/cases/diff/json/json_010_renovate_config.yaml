# Scenario: renovate.json enables automerge and adds packageRules for
#   auto-merging devDependencies.
#
# Reviewer questions:
#   Q1: "Is automerge: true safe for all dependencies?"
#       -> renovate.json: automerge changed from false to true globally.
#          This means production deps (lodash, express, axios) will auto-merge.
#          Potential risk. packageRules also enables devDeps automerge separately.
#
#   Q2: "What dependencies are affected by the automerge?"
#       -> package.json: production deps (lodash, express, axios) and devDeps
#          (jest, eslint, typescript). Reviewer needs package.json to evaluate
#          the risk of auto-merging each.
#
# Not needed:
#   - .github/workflows/ci.yml: CI pipeline that runs tests. Related to
#     automerge safety (tests must pass). But CI config doesn't help
#     review whether the renovate rules are correct.
#
#   - yarn.lock / package-lock.json: Lock files affected by updates.
#     Same dependency domain. But lock file contents don't help review
#     the renovate configuration.
#
#   - src/app.js: Application code using the dependencies. Could show
#     which APIs are used. But code doesn't help review renovate rules.

max_enrichment: 3.0
initial:
  renovate.json: |
    {
      "extends": ["config:base"],
      "automerge": false,
      "labels": ["dependencies"],
      "schedule": ["every weekend"],
      "prHourlyLimit": 5,
      "prConcurrentLimit": 10
    }

  package.json: |
    {
      "name": "webapp",
      "version": "3.0.0",
      "dependencies": {
        "lodash": "^4.17.0",
        "express": "^4.18.0",
        "axios": "^1.4.0"
      },
      "devDependencies": {
        "jest": "^29.6.0",
        "eslint": "^8.45.0",
        "typescript": "^5.2.0"
      }
    }

  src/app.js: |
    const express = require('express');
    const axios = require('axios');
    const _ = require('lodash');

    const app = express();

    app.get('/api/data', async (req, res) => {
        const response = await axios.get('https://api.example.com/data');
        const filtered = _.pick(response.data, ['id', 'name', 'status']);
        res.json(filtered);
    });

    app.get('/api/health', (req, res) => {
        res.json({ status: 'ok', version: '3.0.0' });
    });

    function startServer(port) {
        return app.listen(port, () => {
            console.log(`Server started on port ${port}`);
        });
    }

    module.exports = { app, startServer };

  .github/workflows/ci.yml: |
    name: CI
    on: [push, pull_request]
    jobs:
      test:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - uses: actions/setup-node@v4
            with:
              node-version: 18
          - run: npm ci
          - run: npm test
          - run: npm run lint

  tests/app.test.js: |
    const request = require('supertest');
    const { app } = require('../src/app');

    describe('API endpoints', () => {
        it('GET /api/health returns ok', async () => {
            const res = await request(app).get('/api/health');
            expect(res.status).toBe(200);
            expect(res.body.status).toBe('ok');
        });
    });

changed:
  renovate.json: |
    {
      "extends": ["config:base"],
      "automerge": true,
      "labels": ["dependencies"],
      "schedule": ["every weekend"],
      "prHourlyLimit": 5,
      "prConcurrentLimit": 10,
      "packageRules": [
        {"matchPackagePatterns": ["*"], "enabled": true},
        {"matchDepTypes": ["devDependencies"], "automerge": true}
      ]
    }

must_include_files:
  - renovate.json

must_include_content_from:
  renovate.json:
    - '"automerge": true'
    - '"matchDepTypes": ["devDependencies"]'

must_not_include:
  # --- src/app.js: application code, not dependency config ---
  - "_.pick"
  - startServer
  - "api.example.com"
  # --- CI workflow: runs tests, but doesn't help review automerge rules ---
  - "actions/checkout"
  - "actions/setup-node"
  - "npm run lint"
  # --- tests: test code, not dependency management ---
  - supertest
  - "GET /api/health"

must_not_include_files:
  - .github/workflows/ci.yml
  - tests/app.test.js
  - src/app.js

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
