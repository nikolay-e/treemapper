# Scenario: tsconfig.json adds @components/* path alias to the existing
#   @utils/* alias.
#
# Reviewer questions:
#   Q1: "Does the @utils/* path still work after adding @components/*?"
#       -> src/app.ts: imports from '@utils/helpers'. tsconfig.json still
#          has "@utils/*": ["src/utils/*"]. Existing alias preserved.
#
#   Q2: "Is there a src/components/ directory that @components/* resolves to?"
#       -> The new alias maps "@components/*" to ["src/components/*"]. Reviewer
#          must verify src/components/ exists or will be created.
#
# Not needed:
#   - jest.config.json: Module mapper for path aliases in tests. Would need
#     a matching @components/* entry. But jest config is a separate concern.
#
#   - webpack.config.js: Webpack resolve.alias for path aliases. Same concept
#     but different tool. Could be out of sync.
#
#   - package.json: Dependencies. Not related to path aliases.

max_enrichment: 3.7
initial:
  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "ES2020",
        "module": "commonjs",
        "baseUrl": ".",
        "paths": {
          "@utils/*": ["src/utils/*"]
        },
        "outDir": "dist",
        "rootDir": "src",
        "strict": true,
        "esModuleInterop": true,
        "skipLibCheck": true
      },
      "include": ["src/**/*"]
    }

  src/utils/helpers.ts: |
    export function formatDate(date: Date): string {
        return date.toISOString().split('T')[0];
    }

    export function formatTime(date: Date): string {
        return date.toISOString().split('T')[1].slice(0, 8);
    }

    export function formatDateTime(date: Date): string {
        return `${formatDate(date)} ${formatTime(date)}`;
    }

    export function parseDate(dateStr: string): Date {
        const parsed = new Date(dateStr);
        if (isNaN(parsed.getTime())) {
            throw new Error(`Invalid date string: ${dateStr}`);
        }
        return parsed;
    }

    export function daysBetween(start: Date, end: Date): number {
        const msPerDay = 1000 * 60 * 60 * 24;
        return Math.floor((end.getTime() - start.getTime()) / msPerDay);
    }

  src/app.ts: |
    import { formatDateTime, parseDate } from '@utils/helpers';

    interface AppConfig {
        timezone: string;
        locale: string;
    }

    function initializeApp(config: AppConfig): void {
        const now = new Date();
        const formatted = formatDateTime(now);
        console.log(`App started at ${formatted} in ${config.timezone}`);
    }

    function processDateInput(input: string): string {
        const date = parseDate(input);
        return formatDateTime(date);
    }

    export { initializeApp, processDateInput };

  jest.config.json: |
    {
      "preset": "ts-jest",
      "testEnvironment": "node",
      "moduleNameMapper": {
        "^@utils/(.*)$": "<rootDir>/src/utils/$1"
      }
    }

  webpack.config.js: |
    const path = require('path');

    module.exports = {
        entry: './src/app.ts',
        output: {
            filename: 'bundle.js',
            path: path.resolve(__dirname, 'dist'),
        },
        resolve: {
            alias: {
                '@utils': path.resolve(__dirname, 'src/utils'),
            },
            extensions: ['.ts', '.js'],
        },
        module: {
            rules: [
                { test: /\.ts$/, use: 'ts-loader', exclude: /node_modules/ },
            ],
        },
    };

  package.json: |
    {
      "name": "path-alias-app",
      "version": "1.0.0",
      "scripts": {
        "build": "tsc",
        "dev": "ts-node src/app.ts"
      },
      "devDependencies": {
        "typescript": "^5.2.0",
        "ts-node": "^10.9.0"
      }
    }

changed:
  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "ES2020",
        "module": "commonjs",
        "baseUrl": ".",
        "paths": {
          "@utils/*": ["src/utils/*"],
          "@components/*": ["src/components/*"]
        },
        "outDir": "dist",
        "rootDir": "src",
        "strict": true,
        "esModuleInterop": true,
        "skipLibCheck": true
      },
      "include": ["src/**/*"]
    }

must_include_files:
  - tsconfig.json

must_include_content_from:
  tsconfig.json:
    - '"@utils/*": ["src/utils/*"]'
    - '"@components/*": ["src/components/*"]'

must_not_include:
  # --- jest.config.json: test config, needs separate update ---
  - "moduleNameMapper"
  - "ts-jest"
  # --- webpack.config.js: bundler config, different tool ---
  - "resolve"
  - "ts-loader"
  - "bundle.js"
  # --- package.json: deps ---
  - "ts-node"

must_not_include_files:
  - jest.config.json
  - webpack.config.js
  - package.json

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
