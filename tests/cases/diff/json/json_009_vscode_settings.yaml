# Test: VS Code settings.json adds Python linting and black formatting config
#
# Scenario: config/settings.json adds pylint, black formatter, and a
# python-specific formatOnSave override. The Python source files exist
# but have no import-edge relationship to the JSON config file.
#
# Reviewer questions:
#   Q1: "What Python formatting and linting settings were added?"
#       -> The diff shows pylintEnabled, black formatter, and a
#          [python]-specific section. Self-contained change.
#   Q2: "What Python files exist in this project?"
#       -> src/main.py and src/config.py, but these are only discoverable
#          via directory structure, not import edges from JSON.
#
# Not needed:
#   - docs/style_guide.txt: project style documentation. Not a Python
#     source file, unrelated to IDE settings change.
#   - scripts/deploy.sh: deployment script. Shell script, unaffected
#     by Python-specific VS Code settings.

initial:
  config/settings.json: |
    {
      "editor.formatOnSave": true,
      "editor.tabSize": 4,
      "python.linting.enabled": true,
      "python.defaultInterpreterPath": "./venv/bin/python",
      "files.exclude": {
        "**/__pycache__": true,
        "**/*.pyc": true
      }
    }
  src/main.py: |
    import os
    from pathlib import Path
    from typing import Optional

    from src.config import load_config
    from src.processor import DataProcessor


    def main():
        config_path = Path(os.environ.get("CONFIG_PATH", "config.yaml"))
        config = load_config(config_path)
        processor = DataProcessor(config)
        results = processor.run()
        print(f"Processed {len(results)} items")
        return results


    def find_project_root(start: Optional[Path] = None) -> Path:
        current = start or Path.cwd()
        while current != current.parent:
            if (current / "pyproject.toml").exists():
                return current
            current = current.parent
        raise FileNotFoundError("Could not find project root")
  src/config.py: |
    import yaml
    from pathlib import Path
    from typing import Any


    def load_config(path: Path) -> dict[str, Any]:
        with open(path) as f:
            raw = yaml.safe_load(f)
        return validate_config(raw)


    def validate_config(raw: dict) -> dict[str, Any]:
        required = ["input_dir", "output_dir", "format"]
        missing = [k for k in required if k not in raw]
        if missing:
            raise ValueError(f"Missing config keys: {', '.join(missing)}")
        return raw
  # --- Not needed: text documentation, not affected by IDE config ---
  docs/style_guide.txt: |
    Project Style Guide
    ===================

    Code Formatting:
    - Use 4 spaces for indentation
    - Maximum line length: 88 characters
    - Use trailing commas in multi-line structures

    Naming Conventions:
    - snake_case for functions and variables
    - PascalCase for classes
    - UPPER_CASE for constants
  # --- Not needed: shell script, unaffected by Python IDE settings ---
  scripts/deploy.sh: |
    #!/bin/bash
    set -euo pipefail

    echo "Deploying application..."
    docker build -t myapp:latest .
    docker push myapp:latest
    kubectl rollout restart deployment/myapp
    echo "Deployment complete"
changed:
  config/settings.json: |
    {
      "editor.formatOnSave": true,
      "editor.tabSize": 4,
      "python.linting.enabled": true,
      "python.linting.pylintEnabled": true,
      "python.formatting.provider": "black",
      "python.defaultInterpreterPath": "./venv/bin/python",
      "files.exclude": {
        "**/__pycache__": true,
        "**/*.pyc": true
      },
      "[python]": {
        "editor.formatOnSave": true,
        "editor.defaultFormatter": "ms-python.black-formatter"
      }
    }
  src/main.py: |
    import os
    from pathlib import Path
    from typing import Optional

    from src.config import load_config
    from src.processor import DataProcessor


    def main():
        config_path = Path(os.environ.get("CONFIG_PATH", "config.yaml"))
        config = load_config(config_path)
