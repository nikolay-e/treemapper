# Scenario: firebase.json changes hosting.public from "public" to "dist",
#   adds SPA rewrite rule, and sets functions runtime to nodejs18.
#
# Reviewer questions:
#   Q1: "Will the SPA rewrite break existing function routes?"
#       -> functions/index.js: exports hello, getItems, addItem as
#          functions.https.onRequest handlers. The rewrite {"source": "**"}
#          catches all URLs — but Firebase prioritizes /functions routes
#          over hosting rewrites. Reviewer must verify this.
#
#   Q2: "Is the runtime upgrade to nodejs18 compatible with function code?"
#       -> functions/index.js: uses require(), async/await, optional chaining.
#          All compatible with Node 18. Reviewer must verify no Node 16 APIs.
#
#   Q3: "Does the addItem function validate input before writing to Firestore?"
#       -> functions/index.js: calls db.collection('items').add(req.body)
#          without validation. functions/utils/validation.js has validateItem()
#          but it's NOT used. Potential review finding.
#
# Not needed:
#   - public/index.html: The old hosting directory. The diff changes to "dist".
#     Direct structural edge (hosting.public references it). But the HTML
#     content doesn't help review the config change.
#
#   - dist/index.html: The new hosting directory. Same concern.
#
#   - functions/package.json: Node.js deps for functions. Could verify runtime
#     compatibility. But the diff is about firebase.json, not function deps.
#
#   - .firebaserc: Project ID configuration. Same Firebase project.
#     But project aliases don't help review hosting/functions config.

max_enrichment: 3.8
initial:
  firebase.json: |
    {
      "hosting": {
        "public": "public",
        "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
        "cleanUrls": true,
        "trailingSlash": false
      },
      "functions": {
        "source": "functions",
        "predeploy": ["npm --prefix functions run lint"]
      },
      "emulators": {
        "functions": {"port": 5001},
        "hosting": {"port": 5000}
      }
    }

  functions/index.js: |
    const functions = require('firebase-functions');
    const { initializeApp } = require('firebase-admin/app');
    const { getFirestore } = require('firebase-admin/firestore');

    initializeApp();
    const db = getFirestore();

    exports.hello = functions.https.onRequest((req, res) => {
        res.json({ message: 'Hello from Firebase!' });
    });

    exports.getItems = functions.https.onRequest(async (req, res) => {
        const snapshot = await db.collection('items').get();
        const items = snapshot.docs.map((doc) => ({ id: doc.id, ...doc.data() }));
        res.json({ items });
    });

    exports.addItem = functions.https.onRequest(async (req, res) => {
        if (req.method !== 'POST') {
            return res.status(405).send('Method Not Allowed');
        }
        const docRef = await db.collection('items').add(req.body);
        res.status(201).json({ id: docRef.id });
    });

  functions/utils/validation.js: |
    function validateItem(data) {
        const errors = [];
        if (!data.name || typeof data.name !== 'string') {
            errors.push('name is required and must be a string');
        }
        if (data.price !== undefined && typeof data.price !== 'number') {
            errors.push('price must be a number');
        }
        if (data.quantity !== undefined && !Number.isInteger(data.quantity)) {
            errors.push('quantity must be an integer');
        }
        return { valid: errors.length === 0, errors };
    }

    function sanitizeInput(data) {
        const allowed = ['name', 'price', 'quantity', 'description'];
        const sanitized = {};
        for (const key of allowed) {
            if (key in data) sanitized[key] = data[key];
        }
        return sanitized;
    }

    module.exports = { validateItem, sanitizeInput };

  public/index.html: |
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>My App</title>
        <link rel="stylesheet" href="/styles/main.css">
    </head>
    <body>
        <div id="app"></div>
        <script src="/js/main.js"></script>
    </body>
    </html>

  functions/package.json: |
    {
      "name": "functions",
      "description": "Cloud Functions for Firebase",
      "engines": {"node": "18"},
      "main": "index.js",
      "dependencies": {
        "firebase-admin": "^11.8.0",
        "firebase-functions": "^4.3.1"
      },
      "devDependencies": {
        "eslint": "^8.45.0"
      },
      "scripts": {
        "lint": "eslint ."
      }
    }

  .firebaserc: |
    {
      "projects": {
        "default": "my-app-prod",
        "staging": "my-app-staging"
      }
    }

changed:
  firebase.json: |
    {
      "hosting": {
        "public": "dist",
        "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
        "cleanUrls": true,
        "trailingSlash": false,
        "rewrites": [
          {"source": "**", "destination": "/index.html"}
        ]
      },
      "functions": {
        "source": "functions",
        "runtime": "nodejs18",
        "predeploy": ["npm --prefix functions run lint"]
      },
      "emulators": {
        "functions": {"port": 5001},
        "hosting": {"port": 5000}
      }
    }

must_include_files:
  - firebase.json

must_include_content_from:
  firebase.json:
    - '"public": "dist"'
    - '"runtime": "nodejs18"'

must_not_include:
  # --- public/index.html: old hosting directory, content doesn't help review config ---
  - "<div id=\"app\">"
  - "main.css"
  - "main.js"
  # --- functions/package.json: deps, not config ---
  - "firebase-admin"
  - "firebase-functions"
  # --- .firebaserc: project aliases, not hosting/functions config ---
  - my-app-prod
  - my-app-staging

must_not_include_files:
  - public/index.html
  - .firebaserc

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
