# Scenario: tsconfig.json enables strict: true, noImplicitAny: true, and
#   upgrades target from ES2020 to ES2022.
#
# Reviewer questions:
#   Q1: "Will strict: true break existing code with implicit 'any' types?"
#       -> src/app.ts: processData(data: any), findUser(...predicate: any),
#          mergeConfigs(base: any, override: any). These explicitly use 'any',
#          which is allowed even with strict mode. But noImplicitAny would
#          catch any function parameters missing type annotations.
#
#   Q2: "Does src/database.ts have implicit any issues?"
#       -> src/database.ts: query(sql: string, params: any[]): Promise<any[]>
#          and fetchUsers(): Promise<any[]>. Explicit 'any' — allowed but
#          worth noting as a type safety concern.
#
# Not needed:
#   - package.json: TypeScript version. Could affect which strict checks
#     are available. But version doesn't help review the config changes.
#
#   - .eslintrc.json: Lint rules. Different tool. Could have overlapping
#     type checks via @typescript-eslint but separate concern.
#
#   - jest.config.json: Test framework config. Same project but
#     unrelated to TypeScript strictness.

initial:
  tsconfig.json: |
    {
      "compilerOptions": {
        "strict": false,
        "target": "ES2020",
        "module": "commonjs",
        "outDir": "dist",
        "rootDir": "src",
        "esModuleInterop": true,
        "skipLibCheck": true,
        "resolveJsonModule": true
      },
      "include": ["src/**/*"],
      "exclude": ["node_modules", "dist"]
    }

  src/app.ts: |
    interface UserRecord {
        id: number;
        name: string;
        email: string;
        metadata?: Record<string, any>;
    }

    function processData(data: any) {
        return data.value;
    }

    function findUser(users: UserRecord[], predicate: any): UserRecord | undefined {
        return users.find(predicate);
    }

    function transformRecords(records: any[]): UserRecord[] {
        return records.map(r => ({
            id: r.id,
            name: r.name || 'Unknown',
            email: r.email || '',
            metadata: r.extra,
        }));
    }

    function mergeConfigs(base: any, override: any): any {
        return { ...base, ...override };
    }

    export { processData, findUser, transformRecords, mergeConfigs };

  src/database.ts: |
    import { processData, transformRecords } from './app';

    interface DatabaseConfig {
        host: string;
        port: number;
        database: string;
    }

    class DatabaseClient {
        private config: DatabaseConfig;

        constructor(config: DatabaseConfig) {
            this.config = config;
        }

        async query(sql: string, params: any[]): Promise<any[]> {
            console.log(`Executing: ${sql} with ${params.length} params`);
            return [];
        }

        async fetchUsers(): Promise<any[]> {
            const raw = await this.query('SELECT * FROM users', []);
            return transformRecords(raw);
        }
    }

    export { DatabaseClient, DatabaseConfig };

  package.json: |
    {
      "name": "ts-app",
      "version": "1.0.0",
      "scripts": {
        "build": "tsc",
        "typecheck": "tsc --noEmit"
      },
      "devDependencies": {
        "typescript": "^5.2.0"
      }
    }

  .eslintrc.json: |
    {
      "parser": "@typescript-eslint/parser",
      "plugins": ["@typescript-eslint"],
      "extends": [
        "eslint:recommended",
        "plugin:@typescript-eslint/recommended"
      ],
      "rules": {
        "@typescript-eslint/no-explicit-any": "warn"
      }
    }

  jest.config.json: |
    {
      "preset": "ts-jest",
      "testEnvironment": "node",
      "testMatch": ["**/*.test.ts"],
      "transform": {
        "^.+\\.ts$": "ts-jest"
      }
    }

changed:
  tsconfig.json: |
    {
      "compilerOptions": {
        "strict": true,
        "target": "ES2022",
        "module": "commonjs",
        "noImplicitAny": true,
        "outDir": "dist",
        "rootDir": "src",
        "esModuleInterop": true,
        "skipLibCheck": true,
        "resolveJsonModule": true
      },
      "include": ["src/**/*"],
      "exclude": ["node_modules", "dist"]
    }

must_include_files:
  - tsconfig.json

must_include_content_from:
  tsconfig.json:
    - '"strict": true'
    - '"target": "ES2022"'
    - '"noImplicitAny": true'

must_not_include:
  # --- package.json: deps and scripts, not TS config ---
  - "typecheck"
  - "tsc --noEmit"
  - '"typescript": "^5.2.0"'
  # --- .eslintrc.json: overlapping type checks but different tool ---
  - "@typescript-eslint/parser"
  - "no-explicit-any"
  - "@typescript-eslint/recommended"
  # --- jest.config.json: test framework config, unrelated to strict mode ---
  - "ts-jest"
  - "testMatch"
  - "testEnvironment"

must_not_include_files:
  - package.json
  - .eslintrc.json
  - jest.config.json

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
