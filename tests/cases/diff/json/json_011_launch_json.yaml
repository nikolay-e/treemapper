must_include_files:
  - config/launch.json
must_include_content:
  - "src/server.js"
  - "NODE_ENV"
must_not_include:
  # cors.js: CORS middleware, unrelated to debug launch configuration
  - corsMiddleware
  - "Access-Control-Allow-Origin"
  # logger.js: request logging, doesn't relate to launch config
  - requestLogger
max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
