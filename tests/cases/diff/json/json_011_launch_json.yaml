# Test: launch.json changes program path and adds env vars — reviewer needs entry point
#
# Scenario: config/launch.json changes the debug target from src/index.js
# to src/server.js and adds NODE_ENV/LOG_LEVEL environment variables.
# The application source files are unchanged.
#
# Reviewer questions:
#   Q1: "The debug program changed from index.js to server.js — why?"
#       -> The diff itself shows the change. src/index.js is the old
#          entry point, but JSON config has no import edges to JS files.
#   Q2: "What routes exist in the application?"
#       -> src/routes.js defines /api/users and /api/health, but again
#          launch.json has no import relationship to it.
#
# Not needed:
#   - src/middleware/cors.js: CORS middleware, unrelated to debug config.
#   - src/middleware/logger.js: request logging, not connected to launch.json.

max_enrichment: 6.2
initial:
  config/launch.json: |
    {
      "version": "0.2.0",
      "configurations": [
        {
          "type": "node",
          "request": "launch",
          "name": "Launch Server",
          "program": "${workspaceFolder}/src/index.js",
          "console": "integratedTerminal",
          "skipFiles": ["<node_internals>/**"]
        }
      ]
    }
  src/index.js: |
    const express = require('express');
    const { connectDatabase } = require('./database');
    const { setupRoutes } = require('./routes');

    const app = express();
    const PORT = process.env.PORT || 3000;

    app.use(express.json());
    app.use(express.urlencoded({ extended: true }));

    async function bootstrap() {
        await connectDatabase();
        setupRoutes(app);
        app.listen(PORT, () => {
            console.log(`Server listening on port ${PORT}`);
        });
    }

    bootstrap().catch((err) => {
        console.error('Failed to start server:', err);
        process.exit(1);
    });

    module.exports = { app, bootstrap };
  src/routes.js: |
    const { getUsers, createUser } = require('./handlers');

    function setupRoutes(app) {
        app.get('/api/users', getUsers);
        app.post('/api/users', createUser);
        app.get('/api/health', (req, res) => {
            res.json({ status: 'ok', timestamp: new Date().toISOString() });
        });
    }

    module.exports = { setupRoutes };
  # --- Not needed: CORS middleware, unrelated to launch config ---
  src/middleware/cors.js: |
    function corsMiddleware(req, res, next) {
        res.header('Access-Control-Allow-Origin', '*');
        res.header('Access-Control-Allow-Methods', 'GET, POST, PUT, DELETE');
        res.header('Access-Control-Allow-Headers', 'Content-Type, Authorization');
        if (req.method === 'OPTIONS') {
            return res.sendStatus(200);
        }
        next();
    }

    module.exports = { corsMiddleware };
  # --- Not needed: request logger, unrelated to debug configuration ---
  src/middleware/logger.js: |
    function requestLogger(req, res, next) {
        const start = Date.now();
        res.on('finish', () => {
            const duration = Date.now() - start;
            console.log(`${req.method} ${req.path} ${res.statusCode} ${duration}ms`);
        });
        next();
    }

    module.exports = { requestLogger };
