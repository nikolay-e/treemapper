# === Assertions ===

must_include_files:
  - src/components/Form.tsx
  - src/components/InputField.tsx

must_include_content_from:
  src/components/Form.tsx:
    - "import React, { useRef } from 'react'"
    - "nameRef = useRef<HTMLInputElement>(null)"
  src/components/InputField.tsx:
    - "forwardRef<HTMLInputElement, InputFieldProps>"
    - "InputField.displayName"

must_not_include:
  # TextArea.tsx: form element sibling but different approach, no ref forwarding
  - TextArea
  - TextAreaProps
  - char-count
  # useFocus.ts: focus-related but for focus trap, not individual input refs
  - useFocusTrap
  - focusableElements
  - handleKeyDown

must_not_include_files:
  - src/components/TextArea.tsx
  - src/hooks/useFocus.ts

