# Scenario: React component adds useMemo/useCallback to memoize expensive calculations.
#
# Diff: DataDisplay.tsx adds useMemo for expensiveCalculation and formatNumber,
# plus useCallback for selection handler.
#
# Reviewer questions:
#   Q1: "What does expensiveCalculation do?" → src/utils.ts (UNCHANGED) has the
#        reduce-based computation that sums squares.
#   Q2: "What does formatNumber do?" → src/utils.ts provides Intl.NumberFormat.
#
# Not needed:
#   - src/utils/math.ts: math utilities but for different calculations (average, median).
#   - src/components/ChartDisplay.tsx: another display component but renders charts,
#     not data lists.

initial:
  src/utils.ts: |
    export function expensiveCalculation(items: number[]): number {
        return items.reduce((acc, item) => acc + item * item, 0);
    }

    export function formatNumber(num: number): string {
        return new Intl.NumberFormat('en-US').format(num);
    }
  src/components/DataDisplay.tsx: |
    import React from 'react';

    export function DataDisplay() {
        return <div>TODO</div>;
    }
  src/utils/math.ts: |
    export function average(values: number[]): number {
        if (values.length === 0) return 0;
        return values.reduce((sum, v) => sum + v, 0) / values.length;
    }

    export function median(values: number[]): number {
        const sorted = [...values].sort((a, b) => a - b);
        const mid = Math.floor(sorted.length / 2);
        return sorted.length % 2 !== 0
            ? sorted[mid]
            : (sorted[mid - 1] + sorted[mid]) / 2;
    }

    export function standardDeviation(values: number[]): number {
        const avg = average(values);
        const squareDiffs = values.map(v => Math.pow(v - avg, 2));
        return Math.sqrt(average(squareDiffs));
    }
  src/components/ChartDisplay.tsx: |
    import React from 'react';

    interface ChartDisplayProps {
        data: { label: string; value: number }[];
        type: 'bar' | 'line' | 'pie';
        width?: number;
        height?: number;
    }

    export function ChartDisplay({ data, type, width = 400, height = 300 }: ChartDisplayProps) {
        const maxValue = Math.max(...data.map(d => d.value));
        return (
            <svg width={width} height={height}>
                {type === 'bar' && data.map((d, i) => (
                    <rect
                        key={i}
                        x={i * (width / data.length)}
                        y={height - (d.value / maxValue) * height}
                        width={width / data.length - 2}
                        height={(d.value / maxValue) * height}
                        fill="#4a90d9"
                    />
                ))}
            </svg>
        );
    }

