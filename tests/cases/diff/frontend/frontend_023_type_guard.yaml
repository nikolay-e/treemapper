# Scenario: New file creates type guard functions for a union of imported interfaces.
#
# Diff: guards.ts imports User, Admin, Guest from entities.ts, creates Person union,
# and adds isUser/isAdmin/isGuest/hasEmail type guards.
#
# Reviewer questions:
#   Q1: "What discriminant field does each entity use?" -> entities.ts (UNCHANGED)
#        shows type: 'user', type: 'admin', type: 'guest'. The guards check these
#        values, so the reviewer must see the source interfaces.
#   Q2: "Does Admin really extend User?" -> entities.ts shows Admin extends User
#        adding permissions[]. This explains why hasEmail returns User | Admin.
#
# Not needed:
#   - src/validators/input.ts: also uses `input is T` type narrowing syntax but for
#     form validation (isValidEmail, isPositiveNumber). Different domain.
#   - src/types/animal.ts: another discriminated union (Dog|Cat|Bird) with guards.
#     Same structural pattern but entirely different domain, no import edge.

initial:
  src/entities.ts: |
    export interface User {
        type: 'user';
        id: string;
        name: string;
        email: string;
    }

    export interface Admin extends User {
        type: 'admin';
        permissions: string[];
    }

    export interface Guest {
        type: 'guest';
        sessionId: string;
    }
  src/guards.ts: |
    console.log('initial');
  src/validators/input.ts: |
    export function isValidEmail(input: unknown): input is string {
        return typeof input === 'string' && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input);
    }

    export function isPositiveNumber(input: unknown): input is number {
        return typeof input === 'number' && input > 0;
    }
  src/types/animal.ts: |
    export interface Dog {
        kind: 'dog';
        name: string;
        breed: string;
    }

    export interface Cat {
        kind: 'cat';
        name: string;
        indoor: boolean;
    }

    export type Animal = Dog | Cat;

    export function isDog(animal: Animal): animal is Dog {
        return animal.kind === 'dog';
    }

changed:
  src/entities.ts: |
    export interface User {
        type: 'user';
        id: string;
        name: string;
        email: string;
    }

    export interface Admin extends User {
        type: 'admin';
        permissions: string[];
    }

    export interface Guest {
        type: 'guest';
        sessionId: string;
    }
  src/guards.ts: |
    import { User, Admin, Guest } from './entities';

    export type Person = User | Admin | Guest;

    export function isUser(obj: unknown): obj is User {
        return typeof obj === 'object' && obj !== null &&
            'type' in obj && (obj as User).type === 'user';
    }

    export function isAdmin(person: Person): person is Admin {
        return person.type === 'admin';
    }

    export function isGuest(person: Person): person is Guest {
        return person.type === 'guest';
    }

    export function hasEmail(person: Person): person is User | Admin {
        return 'email' in person;
    }
  src/validators/input.ts: |
    export function isValidEmail(input: unknown): input is string {
        return typeof input === 'string' && /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(input);
    }

    export function isPositiveNumber(input: unknown): input is number {
        return typeof input === 'number' && input > 0;
    }
  src/types/animal.ts: |
    export interface Dog {
        kind: 'dog';
        name: string;
        breed: string;
    }

    export interface Cat {
        kind: 'cat';
        name: string;
        indoor: boolean;
    }

    export type Animal = Dog | Cat;

    export function isDog(animal: Animal): animal is Dog {
        return animal.kind === 'dog';
    }

must_include_files:
  # Q1+Q2: entities.ts defines the interfaces being guarded — reviewer needs discriminants
  - src/entities.ts
must_include_content_from:
  src/entities.ts:
    - "interface User {"
    - "interface Admin extends User {"
    - "interface Guest {"
must_not_include:
  # input.ts: type narrowing for form values, not entity discrimination
  - isValidEmail
  - isPositiveNumber
  # animal.ts: discriminated union with guards but different domain, no import edge
  - Animal
  - isDog
must_not_include_files:
  - src/validators/input.ts
  - src/types/animal.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
