# Scenario: React component starts consuming a typed props interface from another file.
#
# Diff: UserCard.tsx changes from empty component to destructuring UserCardProps.
# App.tsx is added to render UserCard with a typed User object.
#
# Reviewer questions:
#   Q1: "What fields does UserCardProps have?" → src/types/user.ts (UNCHANGED) defines it.
#   Q2: "How is UserCard used in practice?" → App.tsx (CHANGED) passes a User instance.
#
# Not needed:
#   - src/types/product.ts: type definitions in same directory but for products.
#   - src/components/Avatar.tsx: another component in components/ but unrelated.

initial:
  src/types/user.ts: |
    export interface UserCardProps {
        user: User;
        onClick?: () => void;
        className?: string;
    }

    export interface User {
        id: string;
        name: string;
        email: string;
        avatar?: string;
    }

    export function formatUserName(user: User): string {
        return user.name.trim();
    }
  src/components/UserCard.tsx: |
    import React from 'react';

    export function UserCard() {
        return <div>TODO</div>;
    }
  src/types/product.ts: |
    export interface Product {
        id: string;
        name: string;
        price: number;
        description: string;
        imageUrl?: string;
    }

    export interface ProductCardProps {
        product: Product;
        onAddToCart?: (product: Product) => void;
        showPrice: boolean;
    }

    export function formatPrice(price: number): string {
        return new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
        }).format(price);
    }
  src/components/Avatar.tsx: |
    import React from 'react';

    interface AvatarProps {
        src?: string;
        alt: string;
        size?: 'small' | 'medium' | 'large';
    }

    const sizeMap = { small: 32, medium: 48, large: 64 };

    export function Avatar({ src, alt, size = 'medium' }: AvatarProps) {
        const px = sizeMap[size];
        if (!src) {
            return (
                <div style={{ width: px, height: px, borderRadius: '50%', background: '#ccc' }}>
                    {alt.charAt(0).toUpperCase()}
                </div>
            );
        }
        return <img src={src} alt={alt} width={px} height={px} style={{ borderRadius: '50%' }} />;
    }

changed:
  src/types/user.ts: |
    export interface UserCardProps {
        user: User;
        onClick?: () => void;
        className?: string;
    }

    export interface User {
        id: string;
        name: string;
        email: string;
        avatar?: string;
    }

    export function formatUserName(user: User): string {
        return user.name.trim();
    }
  src/components/UserCard.tsx: |
    import React from 'react';
    import { UserCardProps } from '../types/user';

    export function UserCard({ user, onClick, className }: UserCardProps) {
        return (
            <div className={className} onClick={onClick}>
                {user.avatar && <img src={user.avatar} alt={user.name} />}
                <h2>{user.name}</h2>
                <p>{user.email}</p>
            </div>
        );
    }
  src/App.tsx: |
    import React from 'react';
    import { UserCard } from './components/UserCard';
    import { User } from './types/user';

    const currentUser: User = {
        id: '1',
        name: 'John Doe',
        email: 'john@example.com',
    };

    export function App() {
        return <UserCard user={currentUser} />;
    }
  src/types/product.ts: |
    export interface Product {
        id: string;
        name: string;
        price: number;
        description: string;
        imageUrl?: string;
    }

    export interface ProductCardProps {
        product: Product;
        onAddToCart?: (product: Product) => void;
        showPrice: boolean;
    }

    export function formatPrice(price: number): string {
        return new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: 'USD',
        }).format(price);
    }
  src/components/Avatar.tsx: |
    import React from 'react';

    interface AvatarProps {
        src?: string;
        alt: string;
        size?: 'small' | 'medium' | 'large';
    }

    const sizeMap = { small: 32, medium: 48, large: 64 };

    export function Avatar({ src, alt, size = 'medium' }: AvatarProps) {
        const px = sizeMap[size];
        if (!src) {
            return (
                <div style={{ width: px, height: px, borderRadius: '50%', background: '#ccc' }}>
                    {alt.charAt(0).toUpperCase()}
                </div>
            );
        }
        return <img src={src} alt={alt} width={px} height={px} style={{ borderRadius: '50%' }} />;
    }

# === Assertions ===

must_include_files:
  - src/components/UserCard.tsx
  - src/App.tsx

must_include_content_from:
  # Reviewer needs to see the type definitions to understand what UserCardProps requires
  src/types/user.ts:
    - "interface UserCardProps {"
    - "interface User {"

must_not_include:
  # product.ts: same directory sibling with similar interface pattern
  - ProductCardProps
  - formatPrice
  - onAddToCart
  # Avatar.tsx: sibling component in components/ but unrelated
  - AvatarProps
  - sizeMap
  - borderRadius

must_not_include_files:
  - src/types/product.ts
  - src/components/Avatar.tsx

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
