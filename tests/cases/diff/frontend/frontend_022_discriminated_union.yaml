# Scenario: New file creates a discriminated union Result<T> from imported interfaces.
#
# Diff: handlers.ts imports Success, Failure, Loading from results.ts, composes
# Result<T> = Success<T> | Failure | Loading, and adds an exhaustive switch.
#
# Reviewer questions:
#   Q1: "What are the discriminant values for each variant?" -> results.ts (UNCHANGED)
#        defines type: 'success', type: 'failure', type: 'loading' — the reviewer
#        must verify the switch in handlers.ts covers all three discriminants.
#   Q2: "What fields are available after narrowing?" -> results.ts shows Success has
#        data and timestamp, Failure has error and code, Loading has progress.
#
# Not needed:
#   - src/types/action.ts: another discriminated union (CounterAction) but for Redux
#     actions. Same structural pattern, different domain, no import edge.
#   - src/utils/either.ts: tagged union (Left|Right) with tag: discriminant.
#     Overlapping concept but different tag field name and no dependency.

initial:
  src/results.ts: |
    export interface Success<T> {
        type: 'success';
        data: T;
        timestamp: Date;
    }

    export interface Failure {
        type: 'failure';
        error: Error;
        code: number;
    }

    export interface Loading {
        type: 'loading';
        progress?: number;
    }
  src/handlers.ts: |
    console.log('initial');
  src/types/action.ts: |
    export interface IncrementAction {
        type: 'INCREMENT';
        payload: number;
    }

    export interface DecrementAction {
        type: 'DECREMENT';
        payload: number;
    }

    export type CounterAction = IncrementAction | DecrementAction;
  src/utils/either.ts: |
    export type Left<L> = { tag: 'left'; value: L };
    export type Right<R> = { tag: 'right'; value: R };
    export type Either<L, R> = Left<L> | Right<R>;

    export function isLeft<L, R>(either: Either<L, R>): either is Left<L> {
        return either.tag === 'left';
    }

changed:
  src/results.ts: |
    export interface Success<T> {
        type: 'success';
        data: T;
        timestamp: Date;
    }

    export interface Failure {
        type: 'failure';
        error: Error;
        code: number;
    }

    export interface Loading {
        type: 'loading';
        progress?: number;
    }
  src/handlers.ts: |
    import { Success, Failure, Loading } from './results';

    export type Result<T> = Success<T> | Failure | Loading;

    export function handleResult<T>(result: Result<T>): string {
        switch (result.type) {
            case 'success':
                return `Data: ${JSON.stringify(result.data)}`;
            case 'failure':
                return `Error ${result.code}: ${result.error.message}`;
            case 'loading':
                return `Loading... ${result.progress ?? 0}%`;
        }
    }

    export function isSuccess<T>(result: Result<T>): result is Success<T> {
        return result.type === 'success';
    }
  src/types/action.ts: |
    export interface IncrementAction {
        type: 'INCREMENT';
        payload: number;
    }

    export interface DecrementAction {
        type: 'DECREMENT';
        payload: number;
    }

    export type CounterAction = IncrementAction | DecrementAction;
  src/utils/either.ts: |
    export type Left<L> = { tag: 'left'; value: L };
    export type Right<R> = { tag: 'right'; value: R };
    export type Either<L, R> = Left<L> | Right<R>;

    export function isLeft<L, R>(either: Either<L, R>): either is Left<L> {
        return either.tag === 'left';
    }

must_include_files:
  # Q1+Q2: results.ts defines the discriminant values and per-variant fields
  - src/results.ts
must_include_content_from:
  src/results.ts:
    - "type: 'success'"
    - "type: 'failure'"
    - "type: 'loading'"
must_not_include:
  # action.ts: discriminated union but for Redux actions, no import edge
  - CounterAction
  - IncrementAction
  # either.ts: tagged union with 'tag' discriminant, different pattern
  - Either
  - isLeft
must_not_include_files:
  - src/types/action.ts
  - src/utils/either.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
