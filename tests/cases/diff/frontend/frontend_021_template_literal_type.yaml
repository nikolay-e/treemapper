# Scenario: New file creates template literal types composing string unions from an import.
#
# Diff: template_types.ts imports EventCategory and EventAction from events.ts
# and composes EventName as `${EventCategory}:${EventAction}`.
#
# Reviewer questions:
#   Q1: "What values does EventName resolve to?" -> events.ts (UNCHANGED) defines
#        the string literal unions 'user'|'system'|'api' and 'created'|'updated'|'deleted'.
#        Without seeing these, the reviewer cannot enumerate the cartesian product.
#
# Not needed:
#   - src/types/routes.ts: defines string-based union HttpMethod but for URL routing,
#     not event naming. Lexical overlap with string literal unions but no import edge.
#   - src/config/constants.ts: exports string constants and a `typeof` derived type.
#     Similar "string types" flavor but no dependency from template_types.ts.

initial:
  src/events.ts: |
    export type EventCategory = 'user' | 'system' | 'api';
    export type EventAction = 'created' | 'updated' | 'deleted';
  src/template_types.ts: |
    console.log('initial');
  src/types/routes.ts: |
    export type HttpMethod = 'GET' | 'POST' | 'PUT' | 'DELETE' | 'PATCH';

    export interface RouteDefinition {
        method: HttpMethod;
        path: string;
        handler: string;
    }
  src/config/constants.ts: |
    export const SUPPORTED_FORMATS = ['json', 'xml', 'csv'] as const;
    export type SupportedFormat = typeof SUPPORTED_FORMATS[number];

changed:
  src/events.ts: |
    export type EventCategory = 'user' | 'system' | 'api';
    export type EventAction = 'created' | 'updated' | 'deleted';
  src/template_types.ts: |
    import { EventCategory, EventAction } from './events';

    export type EventName = `${EventCategory}:${EventAction}`;

    export type Getters<T> = {
        [K in keyof T as `get${Capitalize<string & K>}`]: () => T[K];
    };

    export type Setters<T> = {
        [K in keyof T as `set${Capitalize<string & K>}`]: (value: T[K]) => void;
    };
  src/types/routes.ts: |
    export type HttpMethod = 'GET' | 'POST' | 'PUT' | 'DELETE' | 'PATCH';

    export interface RouteDefinition {
        method: HttpMethod;
        path: string;
        handler: string;
    }
  src/config/constants.ts: |
    export const SUPPORTED_FORMATS = ['json', 'xml', 'csv'] as const;
    export type SupportedFormat = typeof SUPPORTED_FORMATS[number];

must_include_files:
  # Q1: events.ts defines the unions that EventName composes — reviewer must see them
  - src/events.ts
must_include_content_from:
  src/events.ts:
    - "type EventCategory = 'user' | 'system' | 'api'"
    - "type EventAction = 'created' | 'updated' | 'deleted'"
must_not_include:
  # routes.ts: string union but for HTTP methods, no import from template_types.ts
  - RouteDefinition
  - HttpMethod
  # constants.ts: derived string type but from array, unrelated module
  - SUPPORTED_FORMATS
  - SupportedFormat
must_not_include_files:
  - src/types/routes.ts
  - src/config/constants.ts
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
