# Scenario: TypeScript file adds conditional types built on base type primitives.
#
# Diff: conditional.ts adds Unwrap, UnwrapArray, IsArray, IsPrimitive, and
# DeepUnwrap conditional types using Primitive from primitives.ts.
#
# Reviewer questions:
#   Q1: "What is Primitive?" → primitives.ts (UNCHANGED) defines it as
#        string | number | boolean | null | undefined.
#   Q2: "What are JsonValue, JsonObject, JsonArray?" → primitives.ts
#        defines the recursive JSON types used alongside Primitive.
#
# Not needed:
#   - src/types/branded.ts: also uses conditional types but for branding patterns.
#   - src/utils/typecheck.ts: runtime type checking functions, not compile-time types.

initial:
  src/primitives.ts: |
    export type Primitive = string | number | boolean | null | undefined;

    export type JsonValue = Primitive | JsonObject | JsonArray;
    export interface JsonObject { [key: string]: JsonValue }
    export interface JsonArray extends Array<JsonValue> {}
  src/conditional.ts: |
    console.log('initial');
  src/types/branded.ts: |
    declare const brand: unique symbol;

    export type Brand<T, B extends string> = T & { readonly [brand]: B };

    export type UserId = Brand<string, 'UserId'>;
    export type OrderId = Brand<string, 'OrderId'>;
    export type Email = Brand<string, 'Email'>;

    export function createUserId(id: string): UserId {
        return id as UserId;
    }

    export function createOrderId(id: string): OrderId {
        return id as OrderId;
    }
  src/utils/typecheck.ts: |
    export function isString(value: unknown): value is string {
        return typeof value === 'string';
    }

    export function isNumber(value: unknown): value is number {
        return typeof value === 'number' && !isNaN(value);
    }

    export function isObject(value: unknown): value is Record<string, unknown> {
        return typeof value === 'object' && value !== null && !Array.isArray(value);
    }

    export function isNonEmpty(value: unknown): boolean {
        if (typeof value === 'string') return value.length > 0;
        if (Array.isArray(value)) return value.length > 0;
        if (isObject(value)) return Object.keys(value).length > 0;
        return value != null;
    }

changed:
  src/primitives.ts: |
    export type Primitive = string | number | boolean | null | undefined;

    export type JsonValue = Primitive | JsonObject | JsonArray;
    export interface JsonObject { [key: string]: JsonValue }
    export interface JsonArray extends Array<JsonValue> {}
  src/conditional.ts: |
    import { Primitive } from './primitives';

    export type Unwrap<T> = T extends Promise<infer U> ? U : T;

    export type UnwrapArray<T> = T extends Array<infer U> ? U : T;

    export type IsArray<T> = T extends unknown[] ? true : false;

    export type IsPrimitive<T> = T extends Primitive ? true : false;

    export type DeepUnwrap<T> = T extends Promise<infer U>
        ? DeepUnwrap<U>
        : T extends Array<infer V>
        ? Array<DeepUnwrap<V>>
        : T;
  src/types/branded.ts: |
    declare const brand: unique symbol;

    export type Brand<T, B extends string> = T & { readonly [brand]: B };

    export type UserId = Brand<string, 'UserId'>;
    export type OrderId = Brand<string, 'OrderId'>;
    export type Email = Brand<string, 'Email'>;

    export function createUserId(id: string): UserId {
        return id as UserId;
    }

    export function createOrderId(id: string): OrderId {
        return id as OrderId;
    }
  src/utils/typecheck.ts: |
    export function isString(value: unknown): value is string {
        return typeof value === 'string';
    }

    export function isNumber(value: unknown): value is number {
        return typeof value === 'number' && !isNaN(value);
    }

    export function isObject(value: unknown): value is Record<string, unknown> {
        return typeof value === 'object' && value !== null && !Array.isArray(value);
    }

    export function isNonEmpty(value: unknown): boolean {
        if (typeof value === 'string') return value.length > 0;
        if (Array.isArray(value)) return value.length > 0;
        if (isObject(value)) return Object.keys(value).length > 0;
        return value != null;
    }

must_include_files:
  - src/conditional.ts

must_include_content_from:
  src/conditional.ts:
    - "import { Primitive } from './primitives'"
    - "type Unwrap<T> = T extends Promise<infer U> ? U : T;"

must_not_include:
  # branded.ts: conditional type patterns but for branding, not unwrapping
  - Brand
  - createUserId
  - createOrderId
  # typecheck.ts: runtime type checking, not compile-time conditional types
  - isString
  - isNumber
  - isNonEmpty

must_not_include_files:
  - src/types/branded.ts
  - src/utils/typecheck.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
