name: frontend_010_custom_hook
repo:
  initial_files:
    src/hooks/useApi.ts: |
      import { useState, useEffect } from 'react';

      export interface UseApiResult<T> {
          data: T | null;
          loading: boolean;
          error: Error | null;
          refetch: () => void;
      }

      export function useApi<T>(endpoint: string): UseApiResult<T> {
          const [data, setData] = useState<T | null>(null);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState<Error | null>(null);

          const fetchData = async () => {
              setLoading(true);
              try {
                  const response = await fetch(endpoint);
                  const result = await response.json();
                  setData(result);
                  setError(null);
              } catch (e) {
                  setError(e as Error);
              } finally {
                  setLoading(false);
              }
          };

          useEffect(() => {
              fetchData();
          }, [endpoint]);

          return { data, loading, error, refetch: fetchData };
      }
    src/components/UserProfile.tsx: |
      import React from 'react';

      export function UserProfile() {
          return <div>TODO</div>;
      }
    src/hooks/useLocalStorage.ts: |
      import { useState, useCallback } from 'react';

      export function useLocalStorage<T>(key: string, initialValue: T): [T, (value: T) => void] {
          const [storedValue, setStoredValue] = useState<T>(() => {
              try {
                  const item = window.localStorage.getItem(key);
                  return item ? JSON.parse(item) : initialValue;
              } catch {
                  return initialValue;
              }
          });

          const setValue = useCallback((value: T) => {
              setStoredValue(value);
              window.localStorage.setItem(key, JSON.stringify(value));
          }, [key]);

          return [storedValue, setValue];
      }
    src/components/UserAvatar.tsx: |
      import React from 'react';

      interface UserAvatarProps {
          src?: string;
          name: string;
          size?: number;
      }

      export function UserAvatar({ src, name, size = 40 }: UserAvatarProps) {
          if (!src) {
              const initials = name.split(' ').map(n => n[0]).join('').toUpperCase();
              return (
                  <div style={{ width: size, height: size, borderRadius: '50%', background: '#4a90d9', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                      {initials}
                  </div>
              );
          }
          return <img src={src} alt={name} width={size} height={size} style={{ borderRadius: '50%' }} />;
      }
