# Scenario: TypeScript file adds intersection types extending base types.
#
# Diff: extended.ts creates ExtendedUser, TimestampedUser, and FullUser
# using intersection types with User and Timestamps from types.ts.
#
# Reviewer questions:
#   Q1: "What fields does User have?" → src/types.ts (UNCHANGED) defines User.
#   Q2: "What is Timestamps?" → src/types.ts defines createdAt/updatedAt.
#
# Not needed:
#   - src/permissions.ts: type definitions in same directory but for RBAC,
#     not user data shapes.
#   - src/types/api.ts: more type definitions but for API response wrappers.

initial:
  src/types.ts: |
    export type User = {
        id: string;
        name: string;
        email: string;
    };

    export type Timestamps = {
        createdAt: Date;
        updatedAt: Date;
    };
  src/extended.ts: |
    console.log('initial');
  src/permissions.ts: |
    export type Role = 'admin' | 'editor' | 'viewer';

    export type Permission = 'read' | 'write' | 'delete' | 'manage';

    export type RolePermissions = {
        [K in Role]: Permission[];
    };

    export const defaultPermissions: RolePermissions = {
        admin: ['read', 'write', 'delete', 'manage'],
        editor: ['read', 'write'],
        viewer: ['read'],
    };

    export function hasPermission(role: Role, permission: Permission): boolean {
        return defaultPermissions[role].includes(permission);
    }
  src/types/api.ts: |
    export interface ApiResponse<T> {
        data: T;
        status: number;
        message: string;
    }

    export interface PaginatedResponse<T> {
        items: T[];
        total: number;
        page: number;
        pageSize: number;
        hasMore: boolean;
    }

    export interface ApiError {
        code: string;
        message: string;
        details?: Record<string, string>;
    }

changed:
  src/types.ts: |
    export type User = {
        id: string;
        name: string;
        email: string;
    };

    export type Timestamps = {
        createdAt: Date;
        updatedAt: Date;
    };
  src/extended.ts: |
    import { User, Timestamps } from './types';

    export type ExtendedUser = User & {
        metadata: Record<string, unknown>;
        role: 'admin' | 'user';
    };

    export type TimestampedUser = User & Timestamps;

    export type FullUser = User & Timestamps & {
        preferences: {
            theme: 'light' | 'dark';
            notifications: boolean;
        };
    };
  src/permissions.ts: |
    export type Role = 'admin' | 'editor' | 'viewer';

    export type Permission = 'read' | 'write' | 'delete' | 'manage';

    export type RolePermissions = {
        [K in Role]: Permission[];
    };

    export const defaultPermissions: RolePermissions = {
        admin: ['read', 'write', 'delete', 'manage'],
        editor: ['read', 'write'],
        viewer: ['read'],
    };

    export function hasPermission(role: Role, permission: Permission): boolean {
        return defaultPermissions[role].includes(permission);
    }
  src/types/api.ts: |
    export interface ApiResponse<T> {
        data: T;
        status: number;
        message: string;
    }

    export interface PaginatedResponse<T> {
        items: T[];
        total: number;
        page: number;
        pageSize: number;
        hasMore: boolean;
    }

    export interface ApiError {
        code: string;
        message: string;
        details?: Record<string, string>;
    }

must_include_files:
  - src/extended.ts

must_include_content_from:
  src/extended.ts:
    - "import { User, Timestamps } from './types'"
    - "type ExtendedUser = User & {"

must_not_include:
  # permissions.ts: type definitions but for RBAC, not user data
  - RolePermissions
  - hasPermission
  - defaultPermissions
  # api.ts: type definitions but for API wrappers
  - ApiResponse
  - PaginatedResponse
  - ApiError

must_not_include_files:
  - src/permissions.ts
  - src/types/api.ts

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
