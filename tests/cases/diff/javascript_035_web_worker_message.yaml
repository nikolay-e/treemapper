name: javascript_035_web_worker_message
tags:
- lang:typescript
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    worker.ts: |
      self.onmessage = function(e: MessageEvent) {
          const result = e.data * 2;
          self.postMessage(result);
      };
    main.ts: |
      console.log('initial');
    shared-worker.ts: |
      const connections: MessagePort[] = [];

      self.onconnect = function(e: MessageEvent) {
          const port = (e as any).ports[0];
          connections.push(port);
          port.onmessage = function(msg: MessageEvent) {
              connections.forEach(p => p.postMessage(msg.data));
          };
      };
    thread-pool.ts: |
      export class WorkerPool {
          private workers: Worker[] = [];
          private taskQueue: Array<{ data: unknown; resolve: (v: unknown) => void }> = [];

          constructor(private size: number, private workerPath: string) {
              for (let i = 0; i < size; i++) {
                  this.workers.push(new Worker(workerPath));
              }
          }

          execute(data: unknown): Promise<unknown> {
              return new Promise(resolve => {
                  this.taskQueue.push({ data, resolve });
              });
          }
      }
  changed_files:
    worker.ts: |
      self.onmessage = function(e: MessageEvent) {
          const result = e.data * 2;
          self.postMessage(result);
      };
    main.ts: |
      const worker = new Worker('./worker.ts');

      worker.onmessage = function(e: MessageEvent) {
          console.log('Result:', e.data);
      };

      worker.postMessage(21);
    shared-worker.ts: |
      const connections: MessagePort[] = [];

      self.onconnect = function(e: MessageEvent) {
          const port = (e as any).ports[0];
          connections.push(port);
          port.onmessage = function(msg: MessageEvent) {
              connections.forEach(p => p.postMessage(msg.data));
          };
      };
    thread-pool.ts: |
      export class WorkerPool {
          private workers: Worker[] = [];
          private taskQueue: Array<{ data: unknown; resolve: (v: unknown) => void }> = [];

          constructor(private size: number, private workerPath: string) {
              for (let i = 0; i < size; i++) {
                  this.workers.push(new Worker(workerPath));
              }
          }

          execute(data: unknown): Promise<unknown> {
              return new Promise(resolve => {
                  this.taskQueue.push({ data, resolve });
              });
          }
      }
