repo:
  initial_files:
    Models/DataRecord.cs: |
      namespace App.Models
      {
          public class DataRecord
          {
              public int Id { get; set; }
              public string Name { get; set; }
              public string Value { get; set; }

              public DataRecord(int id, string name, string value)
              {
                  Id = id;
                  Name = name;
                  Value = value;
              }
          }
      }
    Repositories/DataRecordRepository.cs: |
      using App.Models;
      using System.Collections.Generic;
      using System.Linq;

      namespace App.Repositories
      {
          public class DataRecordRepository
          {
              private readonly List<DataRecord> _records = new();

              public void Add(DataRecord record) => _records.Add(record);

              public DataRecord FindById(int id) =>
                  _records.FirstOrDefault(r => r.Id == id);

              public List<DataRecord> GetAll() => _records.ToList();
          }
      }
    Services/DataRecordService.cs: |
      using App.Models;
      using App.Repositories;

      namespace App.Services
      {
          public class DataRecordService
          {
              private readonly DataRecordRepository _repository;

              public DataRecordService(DataRecordRepository repository)
              {
                  _repository = repository;
              }

              public void Create(string name, string value)
              {
                  var record = new DataRecord(0, name, value);
                  _repository.Add(record);
              }
          }
      }
