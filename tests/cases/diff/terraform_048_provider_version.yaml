name: terraform_048_provider_version
repo:
  initial_files:
    versions.tf: |
      terraform {
        required_providers {
          aws = {
            source  = "hashicorp/aws"
            version = "~> 4.0"
          }
        }
      }
    main.tf: |
      resource "aws_instance" "web" {
        ami           = "ami-12345"
        instance_type = "t3.micro"
      }
    modules/gcp/versions.tf: |
      terraform {
        required_providers {
          google = {
            source  = "hashicorp/google"
            version = "~> 4.84"
          }
          google-beta = {
            source  = "hashicorp/google-beta"
            version = "~> 4.84"
          }
        }
      }
    locals.tf: |
      locals {
        common_tags = {
          Team    = "platform"
          Project = "infra"
        }
      }
  changed_files:
    versions.tf: |
      terraform {
        required_providers {
          aws = {
            source  = "hashicorp/aws"
            version = "~> 5.0"
          }
          random = {
            source  = "hashicorp/random"
            version = "~> 3.5"
          }
          null = {
            source  = "hashicorp/null"
            version = "~> 3.2"
          }
        }
      }
  commit_message: Update files
fragments:
- id: versions
  selector:
    path: versions.tf
    anchor: version = "~> 5.0"
- id: versions_1
  selector:
    path: versions.tf
    anchor: source  = "hashicorp/random"
- id: versions_2
  selector:
    path: versions.tf
    anchor: source  = "hashicorp/null"
- id: main
  selector:
    path: main.tf
    anchor: resource "aws_instance" "web" {
- id: no_versions
  selector:
    path: modules/gcp/versions.tf
- id: no_locals
  selector:
    path: locals.tf
- id: no_global_0
  selector:
    anchor: hashicorp/google
- id: no_global_1
  selector:
    anchor: hashicorp/google-beta
- id: no_global_2
  selector:
    anchor: common_tags
oracle:
  required:
  - versions
  - versions_1
  - versions_2
  - main
  allowed: []
  forbidden:
  - no_versions
  - no_locals
  - no_global_0
  - no_global_1
  - no_global_2
