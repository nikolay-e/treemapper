    util/Retry.kt: |
      package util

      object Retry {
          fun <T> withRetry(maxAttempts: Int, block: () -> T): T {
              require(maxAttempts > 0) { "maxAttempts must be positive, got $maxAttempts" }
              var attempt = 0
              while (true) {
                  attempt++
                  try {
                      return block()
                  } catch (e: Exception) {
                      if (attempt >= maxAttempts) throw e
                  }
              }
          }
      }
    domain/FileUploader.kt: |
      package domain

      import util.Retry

      class FileUploader {
          fun upload(bytes: ByteArray): String {
              return Retry.withRetry(3) {
