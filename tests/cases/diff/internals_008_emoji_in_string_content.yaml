repo:
  initial_files:
    util/Retry.kt: |
      package util

      object Retry {
          // BUG: maxAttempts=0 causes infinite loop
          fun <T> withRetry(maxAttempts: Int, block: () -> T): T {
              var attempt = 0
              while (true) {
                  attempt++
                  try {
                      return block()
                  } catch (e: Exception) {
                      if (attempt >= maxAttempts) throw e
                  }
              }
          }
      }
    domain/FileUploader.kt: |
      package domain

      import util.Retry

      class FileUploader {
          fun upload(bytes: ByteArray): String {
              return Retry.withRetry(3) {
                  performUpload(bytes)
              }
          }

          private fun performUpload(bytes: ByteArray): String {
              return "uploaded:${bytes.size}"
          }
      }
    service/MediaService.kt: |
      package service

      import domain.FileUploader

      class MediaService {
          private val uploader = FileUploader()

          fun processMedia(data: ByteArray): String {
              return uploader.upload(data)
          }
      }
    api/MediaController.kt: |
      package api

      import service.MediaService

      class MediaController(private val svc: MediaService) {
          fun handleUpload(data: ByteArray): String {
              return svc.processMedia(data)
          }
      }
