      from typing import Dict, Any, Optional, List
      import time
      import random

      class APIError(Exception):
          def __init__(self, status_code: int, message: str):
              self.status_code = status_code
              self.message = message
              super().__init__(message)

      class APIClient:
          def __init__(self, base_url: str, api_key: str):
              self.base_url = base_url
              self.api_key = api_key
              self._request_count = 0

          def call_api(self, endpoint: str, method: str = "GET", data: Optional[Dict] = None) -> Dict[str, Any]:
              self._request_count += 1
              time.sleep(0.01)
              return {"endpoint": endpoint, "method": method, "status": "success"}

          def get(self, endpoint: str) -> Dict[str, Any]:
              return self.call_api(endpoint, "GET")

          def post(self, endpoint: str, data: Dict[str, Any]) -> Dict[str, Any]:
              return self.call_api(endpoint, "POST", data)

          def get_request_count(self) -> int:
              return self._request_count
    test_api.py: |
      from api import APIClient

      class TestAPIClient:
          def setup(self):
              self.client = APIClient("https://api.test.com", "test-key")

          def test_get_is_cached(self):
              r1 = self.client.get("/users")
              r2 = self.client.get("/users")
              assert self.client.get_request_count() == 1

          def test_post_not_cached(self):
              self.client.post("/users", {"name": "Alice"})
              self.client.post("/users", {"name": "Bob"})
              assert self.client.get_request_count() == 2

          def test_rate_limit_burst(self):
              for i in range(10):
                  self.client.call_api(f"/endpoint_{i}")
    api_factory.py: |
      from api import APIClient

      class APIClientFactory:
          def __init__(self, default_base_url: str = "https://api.prod.com"):
              self._base_url = default_base_url
              self._clients: dict[str, APIClient] = {}

          def create(self, api_key: str, base_url: str = None) -> APIClient:
              url = base_url or self._base_url
              key = f"{url}:{api_key}"
              if key not in self._clients:
                  self._clients[key] = APIClient(url, api_key)
              return self._clients[key]

          def get_active_count(self) -> int:
              return len(self._clients)
    middleware.py: |
      import time
      import logging
      from typing import Dict, Any, Callable, Optional
      from dataclasses import dataclass

      logger = logging.getLogger(__name__)

      @dataclass
      class RequestContext:
          method: str
          path: str
          headers: Dict[str, str]
          start_time: float

      class MiddlewareChain:
          def __init__(self):
              self._middlewares: list[Callable] = []

          def add(self, middleware: Callable) -> None:
              self._middlewares.append(middleware)

          def execute(self, context: RequestContext, handler: Callable) -> Any:
              chain = handler
              for mw in reversed(self._middlewares):
                  chain = lambda ctx, next_handler=chain, middleware=mw: middleware(ctx, next_handler)
              return chain(context)

      def logging_middleware(context: RequestContext, next_handler: Callable) -> Any:
          logger.info(f"{context.method} {context.path}")
          result = next_handler(context)
          elapsed = time.time() - context.start_time
          logger.info(f"Completed in {elapsed:.3f}s")
          return result

      def timing_middleware(context: RequestContext, next_handler: Callable) -> Any:
          start = time.perf_counter()
          result = next_handler(context)
          elapsed = time.perf_counter() - start
          return result
    circuit_breaker.py: |
      import time
      from typing import Callable, Any, Optional
      from dataclasses import dataclass
      from enum import Enum

      class CircuitState(Enum):
          CLOSED = "closed"
          OPEN = "open"
          HALF_OPEN = "half_open"

      @dataclass
      class CircuitBreakerConfig:
          failure_threshold: int = 5
          recovery_timeout: float = 30.0
          half_open_max_calls: int = 1

      class CircuitBreaker:
          def __init__(self, config: CircuitBreakerConfig):
              self._config = config
              self._state = CircuitState.CLOSED
              self._failure_count = 0
              self._last_failure_time: Optional[float] = None

          def call(self, func: Callable, *args: Any, **kwargs: Any) -> Any:
              if self._state == CircuitState.OPEN:
                  if time.time() - self._last_failure_time > self._config.recovery_timeout:
                      self._state = CircuitState.HALF_OPEN
                  else:
                      raise RuntimeError("Circuit breaker is open")
              try:
                  result = func(*args, **kwargs)
                  self._on_success()
                  return result
              except Exception as e:
                  self._on_failure()
                  raise

          def _on_success(self) -> None:
              self._failure_count = 0
              self._state = CircuitState.CLOSED

          def _on_failure(self) -> None:
              self._failure_count += 1
              self._last_failure_time = time.time()
              if self._failure_count >= self._config.failure_threshold:
                  self._state = CircuitState.OPEN
