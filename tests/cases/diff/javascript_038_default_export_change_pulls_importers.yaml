name: javascript_038_default_export_change_pulls_importers
repo:
  initial_files:
    api.ts: |
      export default function apiClient() {
          return { get: (url: string) => fetch(url) };
      }
    service.ts: |
      import client from './api';

      export function getData(url: string) {
          return client().get(url);
      }
    http-types.ts: |
      export type HttpMethod = 'GET' | 'POST' | 'PUT' | 'DELETE';

      export interface HttpOptions {
          method: HttpMethod;
          headers?: Record<string, string>;
          body?: string;
      }

      export function createRequest(url: string, options: HttpOptions): Request {
          return new Request(url, options);
      }
    retry-client.ts: |
      export async function fetchWithRetry(
          url: string,
          options?: RequestInit,
          maxRetries: number = 3
      ): Promise<Response> {
          for (let i = 0; i < maxRetries; i++) {
              try { return await fetch(url, options); }
              catch (e) { if (i === maxRetries - 1) throw e; }
          }
          throw new Error('Unreachable');
      }
  changed_files:
    api.ts: |
      export default function apiClient(baseUrl = '') {
          return {
              get: (url: string) => fetch(baseUrl + url),
              post: (url: string, data: any) => fetch(baseUrl + url, {
                  method: 'POST',
                  body: JSON.stringify(data),
              }),
          };
      }
    service.ts: |
      import client from './api';

      export function getData(url: string) {
          return client().get(url);
      }
    http-types.ts: |
      export type HttpMethod = 'GET' | 'POST' | 'PUT' | 'DELETE';

      export interface HttpOptions {
          method: HttpMethod;
          headers?: Record<string, string>;
          body?: string;
      }

      export function createRequest(url: string, options: HttpOptions): Request {
          return new Request(url, options);
      }
    retry-client.ts: |
      export async function fetchWithRetry(
          url: string,
          options?: RequestInit,
          maxRetries: number = 3
      ): Promise<Response> {
          for (let i = 0; i < maxRetries; i++) {
              try { return await fetch(url, options); }
              catch (e) { if (i === maxRetries - 1) throw e; }
          }
          throw new Error('Unreachable');
      }
  commit_message: Update files
