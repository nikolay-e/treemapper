repo:
  initial_files:
    src/Http/HttpContext.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Http
      {
          public class HttpContext
          {
              public string Method { get; set; }
              public string Path { get; set; }
              public Dictionary<string, string> Headers { get; set; } = new();
          }
      }
    src/Middleware/CorsMiddleware.cs: |
      using System;
      using App.Http;

      namespace App.Middleware
      {
          public class CorsMiddleware
          {
              public bool Process(HttpContext context)
              {
                  context.Headers["Access-Control-Allow-Origin"] = "*";
                  return true;
              }
          }
      }
    src/Middleware/MiddlewarePipeline.cs: |
      using System;
      using System.Collections.Generic;
      using App.Http;
      using App.Middleware;

      namespace App.Middleware
      {
          public class MiddlewarePipeline
          {
              private readonly CorsMiddleware _cors;
              public MiddlewarePipeline(CorsMiddleware cors)
              {
                  _cors = cors;
              }
              public bool Execute(HttpContext context)
              {
                  return _cors.Process(context);
              }
          }
      }
    src/Hosting/WebHost.cs: |
      using System;
      using App.Middleware;
      using App.Http;

      namespace App.Hosting
      {
          public class WebHost
          {
              private readonly MiddlewarePipeline _pipeline;
              public WebHost(MiddlewarePipeline pipeline)
              {
                  _pipeline = pipeline;
              }
              public string HandleRequest(HttpContext context)
              {
                  if (!_pipeline.Execute(context))
                  {
                      return "403 Forbidden";
                  }
                  return "200 OK";
              }
          }
      }
    src/Program/Startup.cs: |
      using System;
      using App.Hosting;

      namespace App.Program
      {
          public class Startup
          {
              private readonly WebHost _host;
              public Startup(WebHost host)
              {
                  _host = host;
              }
              public string Run(HttpContext context)
              {
                  return _host.HandleRequest(context);
              }
          }
      }
    src/Caching/MemoryCache.cs: |
