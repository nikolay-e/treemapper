      require_relative '../events/event_bus'
      require_relative '../handlers/notification_handler'
      module Config
        class EventConfig
          def self.setup
            bus = Events::EventBus.new
            bus.subscribe('user.created', Handlers::NotificationHandler.new)
            bus
          end
        end
      end
    lib/utils/time_helper.rb: |
      module Utils
        class TimeHelper
          def self.format_timestamp(time)
            time.strftime('%Y-%m-%d %H:%M:%S')
          end
        end
      end
  changed_files:
    lib/events/domain_event.rb: |
      module Events
        class DomainEvent
          attr_reader :name, :payload, :timestamp, :correlation_id

          def initialize(name, payload, correlation_id: nil)
            @name = name
            @payload = payload
            @timestamp = Time.now
            @correlation_id = correlation_id
          end
        end
      end
    lib/events/event_bus.rb: |
      require_relative 'domain_event'
      module Events
        class EventBus
          def initialize
            @handlers = Hash.new { |h, k| h[k] = [] }
          end

          def subscribe(event_name, handler)
            @handlers[event_name] << handler
          end

          def publish(event)
            @handlers[event.name].each { |h| h.call(event) }
          end

          def publish_with_correlation(event_name, payload, correlation_id)
            event = DomainEvent.new(event_name, payload, correlation_id: correlation_id)
            publish(event)
          end
        end
      end
    lib/handlers/notification_handler.rb: |
      module Handlers
        class NotificationHandler
          def call(event)
            send_email(event.payload[:email], event.name)
          end

