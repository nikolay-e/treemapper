    lib/events/domain_event.rb: |
      module Events
        class DomainEvent
          attr_reader :name, :payload, :timestamp

          def initialize(name, payload)
            @name = name
            @payload = payload
            @timestamp = Time.now
          end
        end
      end
    lib/events/event_bus.rb: |
      require_relative 'domain_event'
      module Events
        class EventBus
          def initialize
            @handlers = Hash.new { |h, k| h[k] = [] }
          end

          def subscribe(event_name, handler)
            @handlers[event_name] << handler
          end

          def publish(event)
            @handlers[event.name].each { |h| h.call(event) }
          end
        end
      end
