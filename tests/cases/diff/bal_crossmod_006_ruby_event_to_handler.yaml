            bus = Events::EventBus.new
            bus.subscribe('user.created', Handlers::NotificationHandler.new)
            bus
          end
        end
      end
    lib/utils/time_helper.rb: |
      module Utils
        class TimeHelper
          def self.format_timestamp(time)
            time.strftime('%Y-%m-%d %H:%M:%S')
          end
        end
      end
