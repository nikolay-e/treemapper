name: javascript_extended_010_enum_change
repo:
  initial_files:
    enums.ts: |
      export enum Status {
          Pending = 'PENDING',
          Active = 'ACTIVE',
          Completed = 'COMPLETED',
      }
    task.ts: |
      import { Status } from './enums';

      export class Task {
          status: Status = Status.Pending;

          complete() {
              this.status = Status.Completed;
          }
      }
    src/services/taskService.ts: |
      import { Status } from '../enums';
      import { Task } from '../task';

      const tasks: Task[] = [];

      export function addTask(): Task {
          const t = new Task();
          tasks.push(t);
          return t;
      }

      export function getTasksByStatus(status: Status): Task[] {
          return tasks.filter(t => t.status === status);
      }

      export function countByStatus(): Record<string, number> {
          const counts: Record<string, number> = {};
          for (const t of tasks) {
              counts[t.status] = (counts[t.status] || 0) + 1;
          }
          return counts;
      }
    src/services/statusTransitions.ts: |
      import { Status } from '../enums';

      const ALLOWED_TRANSITIONS: Record<Status, Status[]> = {
          [Status.Pending]: [Status.Active],
          [Status.Active]: [Status.Completed],
          [Status.Completed]: [],
      };

      export function canTransition(from: Status, to: Status): boolean {
          return ALLOWED_TRANSITIONS[from]?.includes(to) ?? false;
      }

      export function getNextStatuses(current: Status): Status[] {
          return ALLOWED_TRANSITIONS[current] ?? [];
      }
    src/utils/statusFormatter.ts: |
      import { Status } from '../enums';

      const STATUS_LABELS: Record<Status, string> = {
          [Status.Pending]: 'Pending Review',
          [Status.Active]: 'In Progress',
          [Status.Completed]: 'Done',
      };

      export function formatStatus(status: Status): string {
          return STATUS_LABELS[status] ?? status;
      }

      export function getStatusColor(status: Status): string {
          switch (status) {
              case Status.Pending: return '#f59e0b';
              case Status.Active: return '#3b82f6';
              case Status.Completed: return '#10b981';
              default: return '#6b7280';
          }
      }
  changed_files:
