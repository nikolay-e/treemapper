name: internals_002_cyrillic_mixed_with_ascii
tags:
- lang:clojure
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/data/schema.clj: |
      (ns data.schema)

      (def user-schema
        {:id   :string
         :name :string
         :role :keyword})

      (defn valid? [entity schema]
        (every? #(contains? entity %) (keys schema)))
    src/data/repository.clj: |
      (ns data.repository
        (:require [data.schema :as schema]))

      (defn find-user [store user-id]
        (when-let [user (get @store user-id)]
          (when (schema/valid? user schema/user-schema)
            user)))

      (defn save-user [store user]
        (swap! store assoc (:id user) user))
    src/api/handler.clj: |
      (ns api.handler
        (:require [data.repository :as repo]))

      (defn get-user [store user-id]
        (if-let [user (repo/find-user store user-id)]
          {:status 200 :body user}
          {:status 404 :body {:error "not found"}}))

      (defn create-user [store user]
        (repo/save-user store user)
        {:status 201 :body user})
