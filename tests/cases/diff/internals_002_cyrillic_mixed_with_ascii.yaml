  changed_files:
    src/data/repository.clj: |
      (ns data.repository
        (:require [data.schema :as schema]))

      (defn find-user [store user-id]
        (when-let [user (get @store user-id)]
          (when (schema/valid? user schema/user-schema)
            user)))

      (defn save-user [store user]
        (swap! store assoc (:id user) user))

      (defn delete-user [store user-id]
        (swap! store dissoc user-id))

      (defn list-users [store]
        (vals @store))
