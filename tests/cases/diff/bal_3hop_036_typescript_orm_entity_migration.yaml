repo:
  initial_files:
    src/entities/invoice.ts: |
      export interface Invoice {
        id: string;
        amount: number;
        status: 'pending' | 'paid';
        createdAt: Date;
      }

      export function createInvoice(amount: number): Invoice {
        return { id: crypto.randomUUID(), amount, status: 'pending', createdAt: new Date() };
      }
    src/repositories/invoice.ts: |
      import { Invoice, createInvoice } from '../entities/invoice';

      export class InvoiceRepository {
        private invoices: Invoice[] = [];

        save(amount: number): Invoice {
          const invoice = createInvoice(amount);
          this.invoices.push(invoice);
          return invoice;
        }

        findById(id: string): Invoice | undefined {
          return this.invoices.find(i => i.id === id);
        }

        findByStatus(status: Invoice['status']): Invoice[] {
          return this.invoices.filter(i => i.status === status);
        }
      }
    src/services/billing.ts: |
      import { InvoiceRepository } from '../repositories/invoice';

      export class BillingService {
        constructor(private repo: InvoiceRepository) {}

        createInvoice(amount: number) {
          return this.repo.save(amount);
        }

        getPendingInvoices() {
          return this.repo.findByStatus('pending');
        }
      }
    src/api/billing.ts: |
      import { BillingService } from '../services/billing';
      import { InvoiceRepository } from '../repositories/invoice';

      const repo = new InvoiceRepository();
      const billing = new BillingService(repo);

      export function handleCreateInvoice(req: any, res: any): void {
        const invoice = billing.createInvoice(req.body.amount);
        res.status(201).json(invoice);
      }

      export function handleGetPending(req: any, res: any): void {
        const invoices = billing.getPendingInvoices();
        res.json(invoices);
      }
    src/utils/csv.ts: |
      GARBAGE_036_CSV_MARKER_A = "csv";
      GARBAGE_036_DELIMITER_MARKER_B = ",";

      export function toCSV(rows: any[]): string {
        return rows.map(r => Object.values(r).join(',')).join('\n');
      }
    src/utils/template.ts: |
      GARBAGE_036_TEMPLATE_MARKER_C = "template";
      GARBAGE_036_RENDER_MARKER_D = true;

      export function renderTemplate(tmpl: string, vars: Record<string, string>): string {
        return tmpl.replace(/\{\{(\w+)\}\}/g, (_, k) => vars[k] || '');
      }
    src/jobs/cleanup.ts: |
      GARBAGE_036_CLEANUP_MARKER_E = "cleanup";
      GARBAGE_036_CRON_MARKER_F = "0 0 * * *";

      export function runCleanup(): void {
        console.log('Cleanup started');
      }
  changed_files:
    src/entities/invoice.ts: |
      export interface Invoice {
        id: string;
        amount: number;
        currency: string;
        status: 'pending' | 'paid' | 'overdue';
        createdAt: Date;
        dueDate: Date;
      }

      export function createInvoice(amount: number, currency: string, dueDays: number = 30): Invoice {
        const dueDate = new Date();
        dueDate.setDate(dueDate.getDate() + dueDays);
        return {
          id: crypto.randomUUID(),
          amount,
          currency,
          status: 'pending',
          createdAt: new Date(),
          dueDate,
        };
      }
    src/repositories/invoice.ts: |
      import { Invoice, createInvoice } from '../entities/invoice';

      export class InvoiceRepository {
        private invoices: Invoice[] = [];

        save(amount: number, currency: string): Invoice {
          const invoice = createInvoice(amount, currency);
          this.invoices.push(invoice);
          return invoice;
        }

        findById(id: string): Invoice | undefined {
          return this.invoices.find(i => i.id === id);
        }

        findByStatus(status: Invoice['status']): Invoice[] {
          return this.invoices.filter(i => i.status === status);
        }

        findOverdue(): Invoice[] {
          const now = new Date();
          return this.invoices.filter(i => i.status === 'pending' && i.dueDate < now);
        }
      }
    src/services/billing.ts: |
      import { InvoiceRepository } from '../repositories/invoice';

      export class BillingService {
        constructor(private repo: InvoiceRepository) {}

        createInvoice(amount: number, currency: string) {
          return this.repo.save(amount, currency);
        }

        getPendingInvoices() {
          return this.repo.findByStatus('pending');
        }

        getOverdueInvoices() {
          return this.repo.findOverdue();
        }
      }
    src/api/billing.ts: |
      import { BillingService } from '../services/billing';
      import { InvoiceRepository } from '../repositories/invoice';

      const repo = new InvoiceRepository();
      const billing = new BillingService(repo);

      export function handleCreateInvoice(req: any, res: any): void {
        const invoice = billing.createInvoice(req.body.amount, req.body.currency);
        res.status(201).json(invoice);
      }

      export function handleGetPending(req: any, res: any): void {
        const invoices = billing.getPendingInvoices();
        res.json(invoices);
      }
    src/utils/csv.ts: |
      GARBAGE_036_CSV_MARKER_A = "csv";
      GARBAGE_036_DELIMITER_MARKER_B = ",";

      export function toCSV(rows: any[]): string {
        return rows.map(r => Object.values(r).join(',')).join('\n');
      }
    src/utils/template.ts: |
      GARBAGE_036_TEMPLATE_MARKER_C = "template";
      GARBAGE_036_RENDER_MARKER_D = true;

      export function renderTemplate(tmpl: string, vars: Record<string, string>): string {
        return tmpl.replace(/\{\{(\w+)\}\}/g, (_, k) => vars[k] || '');
      }
    src/jobs/cleanup.ts: |
      GARBAGE_036_CLEANUP_MARKER_E = "cleanup";
      GARBAGE_036_CRON_MARKER_F = "0 0 * * *";

      export function runCleanup(): void {
        console.log('Cleanup started');
      }
  commit_message: "feat: add currency, dueDate, and overdue status to Invoice"
