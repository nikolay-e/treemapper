  changed_files:
    src/vec2.zig: |
      const std = @import("std");

      pub const Vec2 = struct {
          x: f32,
          y: f32,

          pub fn init(x: f32, y: f32) Vec2 {
              return .{ .x = x, .y = y };
          }

          pub fn length(self: Vec2) f32 {
              return @sqrt(self.x * self.x + self.y * self.y);
          }
      };
