repo:
  initial_files:
    Sources/Weather/WeatherService.swift: |
      import Foundation

      enum TemperatureUnit {
          case celsius
          case fahrenheit
      }

      struct WeatherReading {
          let temperature: Double
          let humidity: Double
          let windSpeed: Double
          let timestamp: Date
      }

      class WeatherService {
          private var readings: [WeatherReading] = []
          private let unit: TemperatureUnit

          init(unit: TemperatureUnit = .celsius) {
              self.unit = unit
          }

          func record(_ reading: WeatherReading) {
              readings.append(reading)
          }

          func averageTemperature() -> Double {
              guard !readings.isEmpty else { return 0 }
              let sum = readings.reduce(0.0) { $0 + $1.temperature }
              return sum / Double(readings.count)
          }

          func maxWindSpeed() -> Double {
              readings.map(\.windSpeed).max() ?? 0
          }
      }
    Sources/Weather/ForecastModel.swift: |
      import Foundation

      struct Forecast {
          let date: Date
          let highTemp: Double
          let lowTemp: Double
          let precipChance: Double
      }

      class ForecastModel {
          func predict(basedOn readings: [WeatherReading]) -> [Forecast] {
              return []
          }

          func accuracy(predicted: Forecast, actual: WeatherReading) -> Double {
              let tempDiff = abs(predicted.highTemp - actual.temperature)
              return max(0, 1.0 - tempDiff / 50.0)
          }
      }
    Sources/Alerts/AlertManager.swift: |
      import Foundation

      struct WeatherAlert {
          let severity: Int
          let message: String
          let expiresAt: Date
      }

      class AlertManager {
          private var alerts: [WeatherAlert] = []

          func addAlert(_ alert: WeatherAlert) {
              alerts.append(alert)
          }

          func activeAlerts() -> [WeatherAlert] {
              let now = Date()
              return alerts.filter { $0.expiresAt > now }
          }
      }
