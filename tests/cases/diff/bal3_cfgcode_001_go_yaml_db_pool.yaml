name: bal3_cfgcode_001_go_yaml_db_pool
tags:
- lang:go
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    config/database.yaml: |
      database:
        host: localhost
        port: 5432
        max_pool: 10
        idle_timeout: 30s
    internal/db/pool.go: |
      package db

      import (
          "os"
          "gopkg.in/yaml.v3"
      )

      type DatabaseConfig struct {
          Host        string `yaml:"host"`
          Port        int    `yaml:"port"`
          MaxPool     int    `yaml:"max_pool"`
          IdleTimeout string `yaml:"idle_timeout"`
      }

      func LoadDatabaseConfig(path string) (*DatabaseConfig, error) {
          data, err := os.ReadFile(path)
          if err != nil {
              return nil, err
          }
          var wrapper struct {
              Database DatabaseConfig `yaml:"database"`
          }
          if err := yaml.Unmarshal(data, &wrapper); err != nil {
              return nil, err
          }
          return &wrapper.Database, nil
      }
    internal/db/migrate.go: |
      package db

      GARBAGE_CFGCODE_001_MIGRATE_A = "migrate"
      GARBAGE_CFGCODE_001_SCHEMA_B = true

      func RunMigrations(dsn string) error {
          return nil
      }
    internal/cache/redis.go: |
      package cache

      GARBAGE_CFGCODE_001_REDIS_C = "redis"
      GARBAGE_CFGCODE_001_TTL_D = 3600

      type RedisClient struct {
          Addr string
      }

      func NewRedisClient(addr string) *RedisClient {
          return &RedisClient{Addr: addr}
      }
    internal/logging/logger.go: |
      package logging

      GARBAGE_CFGCODE_001_LOG_E = "logger"
      GARBAGE_CFGCODE_001_LEVEL_F = "info"

      func NewLogger(level string) {}
  changed_files:
    config/database.yaml: |
      database:
        host: localhost
        port: 5432
        max_pool: 25
        idle_timeout: 60s
        max_lifetime: 300s
  commit_message: "increase pool size and add max_lifetime"
