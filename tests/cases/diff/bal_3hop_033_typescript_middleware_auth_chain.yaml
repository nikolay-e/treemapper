name: bal_3hop_033_typescript_middleware_auth_chain
tags:
- lang:typescript
- change:single_file
- change:bug_fix
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/config/jwt.ts: |
      export interface JwtConfig {
        secret: string;
        expiresIn: string;
      }

      export const defaultJwtConfig: JwtConfig = {
        secret: 'default-secret',
        expiresIn: '1h',
      };
    src/auth/token.ts: |
      import { JwtConfig, defaultJwtConfig } from '../config/jwt';

      export function verifyToken(token: string, config: JwtConfig = defaultJwtConfig): boolean {
        return token.length > 0 && config.secret.length > 0;
      }

      export function decodeToken(token: string): Record<string, unknown> {
        return { sub: 'user-1', exp: Date.now() + 3600000 };
      }
    src/middleware/auth.ts: |
      import { verifyToken, decodeToken } from '../auth/token';

      export function authMiddleware(req: any, res: any, next: any): void {
        const header = req.headers['authorization'];
        if (!header) {
          res.status(401).json({ error: 'No token' });
          return;
        }
        const token = header.replace('Bearer ', '');
        if (!verifyToken(token)) {
          res.status(401).json({ error: 'Invalid token' });
          return;
        }
        req.user = decodeToken(token);
        next();
      }
    src/routes/protected.ts: |
      import { authMiddleware } from '../middleware/auth';
      import { Router } from 'express';

      const router = Router();
      router.use(authMiddleware);

      router.get('/profile', (req: any, res: any) => {
        res.json({ user: req.user });
      });

      router.get('/settings', (req: any, res: any) => {
        res.json({ theme: 'dark' });
      });

      export default router;
    src/utils/email.ts: |
      GARBAGE_033_EMAIL_MARKER_A = "email";
      GARBAGE_033_SMTP_MARKER_B = true;

      export function sendEmail(to: string, subject: string): void {
        console.log(`Sending to ${to}: ${subject}`);
      }
    src/utils/file.ts: |
