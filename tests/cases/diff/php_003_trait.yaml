name: php_003_trait
tags:
- lang:clojure
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/db/connection.clj: |
      (ns db.connection)

      (defn connect [url]
        {:url url :conn (atom nil)})

      (defn disconnect [db]
        (reset! (:conn db) nil))
    src/db/queries.clj: |
      (ns db.queries
        (:require [db.connection :as conn]))

      (defn find-by-id [db id]
        (when (:conn db)
          {:id id :data "row"}))

      (defn find-all [db]
        [])
    src/repo/user_repo.clj: |
      (ns repo.user-repo
        (:require [db.queries :as q]))

      (defn fetch-user [db user-id]
        (q/find-by-id db user-id))

      (defn all-users [db]
        (q/find-all db))
    garbage/mailer.clj: |
      (ns garbage.mailer)

      (def ^:const GARBAGE_PHP003_A "smtp_marker")
      (def ^:const GARBAGE_PHP003_B "template_marker")

      (defn send-mail [to subject body]
        GARBAGE_PHP003_A)
    garbage/cache.clj: |
      (ns garbage.cache)

      (def ^:const GARBAGE_PHP003_C "redis_marker")
      (def ^:const GARBAGE_PHP003_D "ttl_marker")

      (defn cache-get [key]
        GARBAGE_PHP003_C)
    garbage/events.clj: |
      (ns garbage.events)

      (def ^:const GARBAGE_PHP003_E "event_bus_marker")

      (defn emit [event payload]
        GARBAGE_PHP003_E)
  changed_files:
    src/repo/user_repo.clj: |
      (ns repo.user-repo
        (:require [db.queries :as q]))

      (defn fetch-user [db user-id]
        (q/find-by-id db user-id))

      (defn all-users [db]
        (q/find-all db))

      (defn fetch-users-by-ids [db ids]
        (mapv #(q/find-by-id db %) ids))
    garbage/mailer.clj: |
      (ns garbage.mailer)

      (def ^:const GARBAGE_PHP003_A "smtp_marker")
      (def ^:const GARBAGE_PHP003_B "template_marker")

      (defn send-mail [to subject body]
        GARBAGE_PHP003_A)
    garbage/cache.clj: |
      (ns garbage.cache)

      (def ^:const GARBAGE_PHP003_C "redis_marker")
      (def ^:const GARBAGE_PHP003_D "ttl_marker")

      (defn cache-get [key]
        GARBAGE_PHP003_C)
    garbage/events.clj: |
      (ns garbage.events)

      (def ^:const GARBAGE_PHP003_E "event_bus_marker")

      (defn emit [event payload]
        GARBAGE_PHP003_E)
  commit_message: "feat: add fetch-users-by-ids batch lookup to user-repo"
