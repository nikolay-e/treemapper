  changed_files:
    Sources/Models/Task.swift: |
      import Foundation

      enum TaskPriority: Int, Codable, Comparable {
          case low = 0
          case medium = 1
          case high = 2
          case urgent = 3

          static func < (lhs: TaskPriority, rhs: TaskPriority) -> Bool {
              return lhs.rawValue < rhs.rawValue
          }
      }

      struct Task: Identifiable, Codable {
          let id: UUID
          var title: String
          var isCompleted: Bool
          var priority: TaskPriority
          var dueDate: Date?
      }
    Sources/Models/TaskList.swift: |
      import Foundation

      struct TaskList: Identifiable, Codable {
          let id: UUID
          var name: String
          var tasks: [Task]
          var color: String

          var pendingCount: Int {
              tasks.filter { !$0.isCompleted }.count
          }
      }
