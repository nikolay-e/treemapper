repo:
  initial_files:
    Sources/Models/Task.swift: |
      import Foundation

      struct Task: Identifiable, Codable {
          let id: UUID
          var title: String
          var isCompleted: Bool
          var priority: Int
      }
    Sources/Models/TaskList.swift: |
      import Foundation

      struct TaskList: Identifiable, Codable {
          let id: UUID
          var name: String
          var tasks: [Task]
      }
    Sources/ViewModels/TaskViewModel.swift: |
      import Foundation
      import Models

      class TaskViewModel: ObservableObject {
          @Published var tasks: [Task] = []

          func add(title: String) {
              let task = Task(id: UUID(), title: title, isCompleted: false, priority: 0)
              tasks.append(task)
          }

          func toggle(taskId: UUID) {
              if let index = tasks.firstIndex(where: { $0.id == taskId }) {
                  tasks[index].isCompleted.toggle()
              }
          }
      }
    Sources/ViewModels/TaskListViewModel.swift: |
      import Foundation
      import Models

      class TaskListViewModel: ObservableObject {
          @Published var lists: [TaskList] = []

          func createList(name: String) {
              let list = TaskList(id: UUID(), name: name, tasks: [])
              lists.append(list)
          }
      }
    Sources/Views/TaskRowView.swift: |
      import Foundation
      import Models

      struct TaskRowView {
          let task: Task

          func render() -> String {
              let status = task.isCompleted ? "[x]" : "[ ]"
              return "\(status) \(task.title)"
          }
      }
    Sources/Views/TaskListRowView.swift: |
      import Foundation
      import Models

      struct TaskListRowView {
          let list: TaskList

          func render() -> String {
              return "\(list.name) (\(list.tasks.count) tasks)"
          }
      }
