name: shell_011_conditional
repo:
  initial_files:
    check.sh: |
      #!/bin/bash
      source ./defaults.sh

      if [[ -f "$CONFIG_FILE" ]]; then
          echo "Config file exists"
      else
          echo "Config file missing"
          exit 1
      fi
    defaults.sh: |
      #!/bin/bash
      export CONFIG_DIR="/etc/app"
      export CONFIG_FILE="${CONFIG_DIR}/config.yaml"
      export CONFIG_MODE="0644"
      export LOG_LEVEL="info"
    scripts/install.sh: |
      #!/bin/bash
      source ./defaults.sh
      mkdir -p "$CONFIG_DIR"
      cp templates/config.yaml "$CONFIG_FILE"
      chmod "$CONFIG_MODE" "$CONFIG_FILE"
      echo "Config installed to $CONFIG_FILE"
    scripts/migrate.sh: |
      #!/bin/bash
      source ./defaults.sh
      if [[ -f "${CONFIG_FILE}.v1" ]]; then
          python3 convert.py "${CONFIG_FILE}.v1" "$CONFIG_FILE"
          echo "Migration complete"
      fi
    scripts/validate_syntax.sh: |
      #!/bin/bash
      source ./defaults.sh
      if command -v yq > /dev/null 2>&1; then
          if yq eval '.' "$CONFIG_FILE" > /dev/null 2>&1; then
              echo "YAML syntax: valid"
          else
              echo "YAML syntax: invalid"
              exit 1
          fi
      else
          echo "yq not installed, skipping syntax check"
      fi
    scripts/backup_config.sh: |
      #!/bin/bash
      source ./defaults.sh
      TIMESTAMP=$(date +%Y%m%d_%H%M%S)
      cp "$CONFIG_FILE" "${CONFIG_FILE}.${TIMESTAMP}.bak"
      echo "Config backed up: ${CONFIG_FILE}.${TIMESTAMP}.bak"
    config/defaults_staging.sh: |
      #!/bin/bash
      export CONFIG_DIR="/etc/app-staging"
      export CONFIG_FILE="${CONFIG_DIR}/config.yaml"
      export CONFIG_MODE="0644"
      export LOG_LEVEL="debug"
  changed_files:
    check.sh: |
      #!/bin/bash
      source ./defaults.sh

      if [[ -f "$CONFIG_FILE" ]]; then
          echo "Config file exists"
          if [[ -r "$CONFIG_FILE" ]]; then
              echo "Config file is readable"
          else
              echo "Config file is not readable (expected mode $CONFIG_MODE)"
              exit 1
          fi
      elif [[ -d "$CONFIG_DIR" ]]; then
          echo "Config directory exists, but file is missing"
          exit 1
      else
          echo "Config directory $CONFIG_DIR does not exist"
          mkdir -p "$CONFIG_DIR"
      fi
    defaults.sh: |
      #!/bin/bash
      export CONFIG_DIR="/etc/app"
      export CONFIG_FILE="${CONFIG_DIR}/config.yaml"
      export CONFIG_MODE="0644"
      export LOG_LEVEL="info"
    scripts/install.sh: |
      #!/bin/bash
      source ./defaults.sh
      mkdir -p "$CONFIG_DIR"
      cp templates/config.yaml "$CONFIG_FILE"
      chmod "$CONFIG_MODE" "$CONFIG_FILE"
      echo "Config installed to $CONFIG_FILE"
    scripts/migrate.sh: |
      #!/bin/bash
      source ./defaults.sh
      if [[ -f "${CONFIG_FILE}.v1" ]]; then
          python3 convert.py "${CONFIG_FILE}.v1" "$CONFIG_FILE"
          echo "Migration complete"
      fi
    scripts/validate_syntax.sh: |
      #!/bin/bash
      source ./defaults.sh
      if command -v yq > /dev/null 2>&1; then
          if yq eval '.' "$CONFIG_FILE" > /dev/null 2>&1; then
              echo "YAML syntax: valid"
          else
              echo "YAML syntax: invalid"
              exit 1
          fi
      else
          echo "yq not installed, skipping syntax check"
      fi
    scripts/backup_config.sh: |
      #!/bin/bash
      source ./defaults.sh
      TIMESTAMP=$(date +%Y%m%d_%H%M%S)
      cp "$CONFIG_FILE" "${CONFIG_FILE}.${TIMESTAMP}.bak"
      echo "Config backed up: ${CONFIG_FILE}.${TIMESTAMP}.bak"
    config/defaults_staging.sh: |
      #!/bin/bash
      export CONFIG_DIR="/etc/app-staging"
      export CONFIG_FILE="${CONFIG_DIR}/config.yaml"
      export CONFIG_MODE="0644"
      export LOG_LEVEL="debug"
  commit_message: Update files
