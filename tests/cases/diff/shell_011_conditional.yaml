    path: defaults.sh
    anchor: CONFIG_DIR="/etc/app"
- id: defaults_1
  selector:
    path: defaults.sh
    anchor: CONFIG_FILE="${CONFIG_DIR}/config.yaml"
- id: defaults_2
  selector:
    path: defaults.sh
    anchor: CONFIG_MODE="0644"
- id: check
  selector:
    path: check.sh
    anchor: source ./defaults.sh
- id: check_1
  selector:
    path: check.sh
    anchor: if [[ -r "$CONFIG_FILE" ]]
- id: no_install
  selector:
    path: scripts/install.sh
- id: no_migrate
  selector:
    path: scripts/migrate.sh
- id: no_validate_syntax
  selector:
