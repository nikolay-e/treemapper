name: patterns_029_intra_helper_chain
tags:
- lang:python
- change:single_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    chain.py: |
      def step_one(x):
          return x + 1

      def step_two(x):
          return step_one(x) * 2

      def step_three(x):
          return step_two(x) + 10

      def process(x):
          return step_three(x)
    pipeline.py: |
      def step_a(data):
          return [item.strip() for item in data]

      def step_b(data):
          return [item.lower() for item in step_a(data)]

      def step_c(data):
          return [item for item in step_b(data) if item]

      def run_pipeline(data):
          return step_c(data)
    transform.py: |
      def process(records):
          return [normalize(r) for r in records]

      def normalize(record):
          return {k: str(v).strip() for k, v in record.items()}

      def validate(record):
          return all(v for v in record.values())
  changed_files:
    chain.py: |
      def step_one(x):
          return x + 1

      def step_two(x):
          return step_one(x) * 2

      def step_three(x):
          return step_two(x) + 10

      def process(x):
          result = step_three(x)
          return result * 100
    pipeline.py: |
      def step_a(data):
          return [item.strip() for item in data]

      def step_b(data):
          return [item.lower() for item in step_a(data)]

      def step_c(data):
          return [item for item in step_b(data) if item]

      def run_pipeline(data):
          return step_c(data)
    transform.py: |
      def process(records):
          return [normalize(r) for r in records]

      def normalize(record):
          return {k: str(v).strip() for k, v in record.items()}

      def validate(record):
          return all(v for v in record.values())
  commit_message: Update files
