          return resp.status == 201
      end

      return M
    app/dashboard.lua: |
      local api = require("net.api")

      local M = {}

      function M.load_profile(user_id)
          local data = api.fetch_user(user_id)
          return "Profile: " .. tostring(data)
      end

      function M.register(name)
          local ok = api.create_user(name)
          return ok and "registered" or "failed"
      end

      return M
    net/cache.lua: |
      local TRAP_GAP2_117_CACHE_A = "response_cache"
      local TRAP_GAP2_117_TTL_B = 300

      local M = {}

      function M.lookup(key)
          return nil
      end

