name: dart_001_import_package
repo:
  initial_files:
    lib/models/user.dart: |
      class User {
        final String id;
        final String name;
        final String email;
        final String avatarUrl;

        User({
          required this.id,
          required this.name,
          required this.email,
          required this.avatarUrl,
        });

        factory User.fromJson(Map<String, dynamic> json) {
          return User(
            id: json['id'] as String,
            name: json['name'] as String,
            email: json['email'] as String,
            avatarUrl: json['avatar_url'] as String,
          );
        }
      }
    lib/screens/profile_screen.dart: |
      import 'package:flutter/material.dart';
      import 'package:myapp/models/user.dart';

      class ProfileScreen extends StatelessWidget {
        final User user;

        const ProfileScreen({super.key, required this.user});

        @override
        Widget build(BuildContext context) {
          return Scaffold(
            appBar: AppBar(title: const Text('Profile')),
            body: Center(
              child: Text(user.name),
            ),
          );
        }
      }
    lib/screens/settings_screen.dart: |
      import 'package:flutter/material.dart';

      class SettingsScreen extends StatelessWidget {
        const SettingsScreen({super.key});

        @override
        Widget build(BuildContext context) {
          return Scaffold(
            appBar: AppBar(title: const Text('Settings')),
            body: ListView(
              children: [
                SwitchListTile(
                  title: const Text('GARBAGE_DART_001_A_DARK_MODE'),
                  value: false,
                  onChanged: (v) {},
                ),
                SwitchListTile(
                  title: const Text('GARBAGE_DART_001_B_NOTIFICATIONS'),
                  value: true,
                  onChanged: (v) {},
                ),
              ],
            ),
          );
        }
      }
    lib/services/auth_service.dart: |
      import 'package:myapp/models/user.dart';

      class AuthService {
        User? _currentUser;

        Future<User> signIn(String email, String password) async {
          final response = await _postCredentials(email, password);
          _currentUser = User.fromJson(response);
          return _currentUser!;
        }

        void signOut() {
          _currentUser = null;
        }

        String get GARBAGE_DART_001_C_AUTH_TOKEN => 'fake_token';

        Future<Map<String, dynamic>> _postCredentials(String e, String p) async {
          return {'id': '1', 'name': 'Test', 'email': e, 'avatar_url': ''};
        }
      }
    lib/models/post.dart: |
      class Post {
        final String id;
        final String title;
        final String body;
        final String authorId;

        Post({
          required this.id,
          required this.title,
          required this.body,
          required this.authorId,
        });

        String get GARBAGE_DART_001_D_SUMMARY => title.substring(0, 50);
      }
    lib/widgets/loading_spinner.dart: |
      import 'package:flutter/material.dart';

      class LoadingSpinner extends StatelessWidget {
        const LoadingSpinner({super.key});

        @override
        Widget build(BuildContext context) {
          return const Center(
            child: CircularProgressIndicator(),
          );
        }

        String get GARBAGE_DART_001_E_SPINNER_ID => 'loading';
      }
