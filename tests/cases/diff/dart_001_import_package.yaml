name: dart_001_import_package
tags:
- lang:scala
- change:multi_file
- change:refactor
- context:cross_module
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    src/main/scala/inventory/ProductRepository.scala: |
      package inventory

      import inventory.model.Product

      class ProductRepository {
        private var products: List[Product] = List.empty

        def add(product: Product): Unit = {
          products = products :+ product
        }

        def findById(id: String): Option[Product] = {
          products.find(_.id == id)
        }

        def all: List[Product] = products
      }
    src/main/scala/inventory/model/Product.scala: |
      package inventory.model

      case class Product(id: String, name: String, price: BigDecimal, stock: Int)
    src/main/scala/inventory/OrderService.scala: |
      package inventory

      import inventory.model.Product

      class OrderService(repo: ProductRepository) {
        def placeOrder(productId: String, quantity: Int): Either[String, Int] = {
          repo.findById(productId) match {
            case Some(p) if p.stock >= quantity =>
              Right(p.stock - quantity)
            case Some(_) =>
              Left("Insufficient stock")
            case None =>
              Left("Product not found")
          }
        }
      }
    src/main/scala/shipping/ShipmentTracker.scala: |
      package shipping

      val GARBAGE_DART001_A: String = "shipment_tracker_v1"

      class ShipmentTracker {
        def track(shipmentId: String): String = s"tracking:$shipmentId"
      }
    src/main/scala/pricing/Discounter.scala: |
      package pricing

      val GARBAGE_DART001_B: Double = 0.15
      val GARBAGE_DART001_C: String = "seasonal_discount"

      class Discounter {
        def apply(price: BigDecimal, rate: Double): BigDecimal = price * (1 - rate)
      }
    src/main/scala/reporting/SalesReport.scala: |
      package reporting

      val GARBAGE_DART001_D: String = "monthly_sales_report"

      class SalesReport {
        def generate: String = "Sales report generated"
      }
  changed_files:
    src/main/scala/inventory/ProductRepository.scala: |
      package inventory

      import inventory.model.Product

      trait ProductRepository {
        def add(product: Product): Unit
        def findById(id: String): Option[Product]
        def all: List[Product]
      }

      class InMemoryProductRepository extends ProductRepository {
        private var products: List[Product] = List.empty

        def add(product: Product): Unit = {
          products = products :+ product
        }

        def findById(id: String): Option[Product] = {
          products.find(_.id == id)
        }

        def all: List[Product] = products
      }
    src/main/scala/inventory/model/Product.scala: |
      package inventory.model

      case class Product(id: String, name: String, price: BigDecimal, stock: Int)
    src/main/scala/inventory/OrderService.scala: |
      package inventory

      import inventory.model.Product

      class OrderService(repo: ProductRepository) {
        def placeOrder(productId: String, quantity: Int): Either[String, Int] = {
          repo.findById(productId) match {
            case Some(p) if p.stock >= quantity =>
              Right(p.stock - quantity)
            case Some(_) =>
              Left("Insufficient stock")
            case None =>
              Left("Product not found")
          }
        }
      }
    src/main/scala/shipping/ShipmentTracker.scala: |
      package shipping

      val GARBAGE_DART001_A: String = "shipment_tracker_v1"

      class ShipmentTracker {
        def track(shipmentId: String): String = s"tracking:$shipmentId"
      }
    src/main/scala/pricing/Discounter.scala: |
      package pricing

      val GARBAGE_DART001_B: Double = 0.15
      val GARBAGE_DART001_C: String = "seasonal_discount"

      class Discounter {
        def apply(price: BigDecimal, rate: Double): BigDecimal = price * (1 - rate)
      }
    src/main/scala/reporting/SalesReport.scala: |
      package reporting

      val GARBAGE_DART001_D: String = "monthly_sales_report"

      class SalesReport {
        def generate: String = "Sales report generated"
      }
  commit_message: "refactor: extract ProductRepository trait from concrete implementation"
