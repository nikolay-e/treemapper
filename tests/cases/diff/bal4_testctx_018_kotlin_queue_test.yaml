repo:
  initial_files:
    src/main/kotlin/ds/BoundedQueue.kt: |
      package ds

      class BoundedQueue(private val capacity: Int) {
          private val items = mutableListOf<String>()

          fun enqueue(item: String) {
              if (items.size >= capacity) {
                  throw IllegalStateException("Queue is full")
              }
              items.add(item)
          }

          fun dequeue(): String {
              if (items.isEmpty()) {
                  throw NoSuchElementException("Queue is empty")
              }
              return items.removeAt(0)
          }

          fun size(): Int = items.size
      }
    src/test/kotlin/ds/BoundedQueueTest.kt: |
      package ds

      import org.junit.jupiter.api.Test
      import org.junit.jupiter.api.Assertions.assertEquals
      import org.junit.jupiter.api.assertThrows

      class BoundedQueueTest {
          @Test
          fun testEnqueueDequeue() {
              val q = BoundedQueue(5)
              q.enqueue("a")
              assertEquals("a", q.dequeue())
          }

          @Test
          fun testFullQueue() {
              val q = BoundedQueue(1)
              q.enqueue("x")
              assertThrows<IllegalStateException> { q.enqueue("y") }
          }

          @Test
          fun testEmptyDequeue() {
              val q = BoundedQueue(5)
              assertThrows<NoSuchElementException> { q.dequeue() }
          }
      }
