      package com.infra;

      import java.util.Map;
      import java.util.concurrent.ConcurrentHashMap;
      import java.util.concurrent.atomic.AtomicInteger;

      public class RateLimiter {
          private final int maxRequests;
          private final Map<String, AtomicInteger> counters = new ConcurrentHashMap<>();

          public RateLimiter(int maxRequests) {
              this.maxRequests = maxRequests;
          }

          public boolean tryAcquire(String clientId) {
              AtomicInteger counter = counters.computeIfAbsent(clientId, k -> new AtomicInteger(0));
              return counter.incrementAndGet() <= maxRequests;
          }

          public void reset(String clientId) {
              counters.remove(clientId);
          }
      }
    src/test/java/com/infra/RateLimiterTest.java: |
      package com.infra;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      class RateLimiterTest {
          @Test
          void testAllowUnderLimit() {
              RateLimiter limiter = new RateLimiter(3);
              assertTrue(limiter.tryAcquire("client1"));
              assertTrue(limiter.tryAcquire("client1"));
              assertTrue(limiter.tryAcquire("client1"));
          }

          @Test
          void testBlockOverLimit() {
              RateLimiter limiter = new RateLimiter(1);
              assertTrue(limiter.tryAcquire("client1"));
              assertFalse(limiter.tryAcquire("client1"));
          }

          @Test
          void testResetAllows() {
              RateLimiter limiter = new RateLimiter(1);
              limiter.tryAcquire("client1");
              limiter.reset("client1");
              assertTrue(limiter.tryAcquire("client1"));
          }

          @Test
          void testIndependentClients() {
              RateLimiter limiter = new RateLimiter(1);
              assertTrue(limiter.tryAcquire("a"));
              assertTrue(limiter.tryAcquire("b"));
          }
      }
