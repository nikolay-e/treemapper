    src/main/java/com/infra/RateLimiter.java: |
      package com.infra;

      import java.util.Map;
      import java.util.concurrent.ConcurrentHashMap;
      import java.util.concurrent.atomic.AtomicInteger;
      import java.util.concurrent.atomic.AtomicLong;

      public class RateLimiter {
          private final int maxRequests;
          private final long windowMs;
          private final Map<String, AtomicInteger> counters = new ConcurrentHashMap<>();
          private final Map<String, AtomicLong> windowStart = new ConcurrentHashMap<>();

          public RateLimiter(int maxRequests, long windowMs) {
              this.maxRequests = maxRequests;
              this.windowMs = windowMs;
          }

          public boolean tryAcquire(String clientId) {
              long now = System.currentTimeMillis();
              AtomicLong start = windowStart.computeIfAbsent(clientId, k -> new AtomicLong(now));
              if (now - start.get() > windowMs) {
                  start.set(now);
                  counters.put(clientId, new AtomicInteger(0));
              }
              AtomicInteger counter = counters.computeIfAbsent(clientId, k -> new AtomicInteger(0));
              return counter.incrementAndGet() <= maxRequests;
          }

          public void reset(String clientId) {
              counters.remove(clientId);
              windowStart.remove(clientId);
          }

          public int getRemainingQuota(String clientId) {
              AtomicInteger counter = counters.get(clientId);
              if (counter == null) {
                  return maxRequests;
              }
              return Math.max(0, maxRequests - counter.get());
          }
      }
  commit_message: "fix: add sliding window to rate limiter, add getRemainingQuota"
