name: gap_049_json_config_eslint_tsconfig
tags:
- lang:json
- change:config
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    tsconfig.json: |
      {
        "compilerOptions": {
          "target": "ES2020",
          "module": "commonjs",
          "strict": true,
          "esModuleInterop": true,
          "outDir": "./dist",
          "rootDir": "./src"
        },
        "include": ["src/**/*"],
        "exclude": ["node_modules", "dist"]
      }
    .eslintrc.json: |
      {
        "root": true,
        "parser": "@typescript-eslint/parser",
        "plugins": ["@typescript-eslint"],
        "extends": [
          "eslint:recommended",
          "plugin:@typescript-eslint/recommended"
        ],
        "rules": {
          "no-unused-vars": "off",
          "@typescript-eslint/no-unused-vars": "error"
        }
      }
    package.json: |
      {
        "name": "widget-factory",
        "version": "1.0.0",
        "main": "dist/index.js",
        "scripts": {
          "build": "tsc",
          "lint": "eslint src/"
        },
        "devDependencies": {
          "typescript": "^5.0.0",
          "eslint": "^8.0.0",
          "@typescript-eslint/parser": "^6.0.0",
          "@typescript-eslint/eslint-plugin": "^6.0.0"
        }
      }
    src/index.ts: |
      export function createWidget(name: string, width: number): Widget {
        return { name, width, height: width * 0.75 };
      }

      interface Widget {
        name: string;
        width: number;
        height: number;
      }
  changed_files:
    tsconfig.json: |
      {
        "compilerOptions": {
          "target": "ES2022",
          "module": "ESNext",
          "moduleResolution": "bundler",
          "strict": true,
          "esModuleInterop": true,
          "outDir": "./dist",
          "rootDir": "./src",
          "declaration": true,
          "declarationMap": true
        },
        "include": ["src/**/*"],
        "exclude": ["node_modules", "dist"]
      }
    .eslintrc.json: |
      {
        "root": true,
        "parser": "@typescript-eslint/parser",
        "plugins": ["@typescript-eslint"],
        "extends": [
          "eslint:recommended",
          "plugin:@typescript-eslint/recommended",
          "plugin:@typescript-eslint/strict"
        ],
        "rules": {
          "no-unused-vars": "off",
          "@typescript-eslint/no-unused-vars": "error",
          "@typescript-eslint/consistent-type-imports": "error"
        }
      }
    package.json: |
      {
        "name": "widget-factory",
        "version": "1.0.0",
        "main": "dist/index.js",
        "scripts": {
          "build": "tsc",
          "lint": "eslint src/"
        },
        "devDependencies": {
          "typescript": "^5.0.0",
          "eslint": "^8.0.0",
          "@typescript-eslint/parser": "^6.0.0",
          "@typescript-eslint/eslint-plugin": "^6.0.0"
        }
      }
    src/index.ts: |
      export function createWidget(name: string, width: number): Widget {
        return { name, width, height: width * 0.75 };
      }

      interface Widget {
        name: string;
        width: number;
        height: number;
      }
  commit_message: Update files
fragments:
- id: tsconfig_target
  selector:
    path: tsconfig.json
    anchor: "ES2022"
- id: tsconfig_module
  selector:
    path: tsconfig.json
    anchor: "ESNext"
- id: tsconfig_declaration
  selector:
    path: tsconfig.json
    anchor: "declaration"
- id: eslint_strict
  selector:
    path: .eslintrc.json
    anchor: "plugin:@typescript-eslint/strict"
- id: eslint_consistent_imports
  selector:
    path: .eslintrc.json
    anchor: "consistent-type-imports"
oracle:
  required:
  - tsconfig_target
  - tsconfig_declaration
  - eslint_strict
  - eslint_consistent_imports
  allowed: []
  forbidden: []
