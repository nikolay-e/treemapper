  changed_files:
    src/Data/IUnitOfWork.cs: |
      using System;
      using System.Threading.Tasks;

      namespace App.Data
      {
          public interface IUnitOfWork
          {
              void Commit();
              void Rollback();
              Task CommitAsync();
              bool HasPendingChanges { get; }
          }
      }
    src/Data/SqlUnitOfWork.cs: |
      using System;
      using System.Threading.Tasks;
      using App.Data;

      namespace App.Data
      {
          public class SqlUnitOfWork : IUnitOfWork
          {
              private bool _committed = false;
              private int _pendingCount = 0;
              public bool HasPendingChanges => _pendingCount > 0;
              public void Commit()
              {
                  _committed = true;
                  _pendingCount = 0;
              }
              public void Rollback()
              {
                  _committed = false;
                  _pendingCount = 0;
              }
              public async Task CommitAsync()
              {
                  await Task.Run(() => Commit());
              }
          }
      }
    src/Repositories/InvoiceRepository.cs: |
      using System;
      using App.Data;

      namespace App.Repositories
      {
          public class InvoiceRepository
          {
