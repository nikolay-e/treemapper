repo:
  initial_files:
    App/Startup.cs: |
      namespace App
      {
          public class AppSettings
          {
              public string DbConnectionString { get; set; }
              public int Port { get; set; }
              public bool EnableLogging { get; set; }
          }

          public class DatabaseContext
          {
              private readonly string _connectionString;

              public DatabaseContext(string connectionString)
              {
                  _connectionString = connectionString;
              }

              public void Migrate() { }
          }

          public class WebServer
          {
              private readonly int _port;

              public WebServer(int port)
              {
                  _port = port;
              }

              public void Start() { }
          }

          public class Startup
          {
              public void Configure()
              {
                  var settings = new AppSettings
                  {
                      DbConnectionString = "Server=localhost;Database=app",
                      Port = 8080,
                      EnableLogging = true
                  };
                  var db = new DatabaseContext(settings.DbConnectionString);
                  var server = new WebServer(settings.Port);
                  db.Migrate();
                  server.Start();
              }
          }
      }
    Controllers/HealthController.cs: |
      namespace App.Controllers
      {
          public class HealthController
          {
              private readonly App.DatabaseContext _db;

              public HealthController(App.DatabaseContext db)
              {
                  _db = db;
              }

              public bool Check() => true;
          }
      }
    Jobs/MigrationJob.cs: |
      namespace App.Jobs
      {
          public class MigrationJob
          {
              private readonly App.AppSettings _settings;

              public MigrationJob(App.AppSettings settings)
              {
                  _settings = settings;
              }

              public void Execute()
              {
                  var db = new App.DatabaseContext(_settings.DbConnectionString);
                  db.Migrate();
              }
          }
      }
