    EXCHANGE_RATES = {
        ("USD", "EUR"): 0.92,
        ("EUR", "USD"): 1.09,
        ("USD", "GBP"): 0.79,
        ("GBP", "USD"): 1.27,
    }

    class CurrencyConverter:
        def convert(self, amount: float, from_currency: str, to_currency: str) -> float:
            rate = EXCHANGE_RATES.get((from_currency, to_currency))
            if rate is None:
                raise ValueError(f"No rate for {from_currency}->{to_currency}")
