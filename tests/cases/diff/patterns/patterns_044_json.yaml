# Test 044: test_serializers adds JSON snapshot tests for User, Order, batch
#           — reviewer needs serializers module for dataclass and serialization logic
#
# Scenario: test_serializers.py adds snapshot tests that parse JSON output and
# verify exact field values for serialize_user, serialize_order, and
# serialize_batch. Imports expand to include Order and json.
#
# Reviewer questions:
#   Q1: "What extra fields does serialize_user add beyond asdict?"
#       -> Adds "type": "user" to the dict before json.dumps.
#   Q2: "What does serialize_order add?"
#       -> Adds "type": "order" and "item_count": len(order.items).
#
# Trap files (plausible but unrelated):
#   - src/csv_serializer.py: another serializer for the same dataclasses
#     but outputs CSV, not JSON.
#   - tests/test_csv_serializer.py: tests for CSV output with similar
#     User/Order assertions but different format.

initial:
  src/serializers.py: |
    import json
    from dataclasses import dataclass, asdict
    from typing import Any

    @dataclass
    class User:
        id: int
        name: str
        email: str
        active: bool = True

    @dataclass
    class Order:
        id: int
        user_id: int
        items: list
        total: float

    class JsonSerializer:
        @staticmethod
        def serialize_user(user: User) -> str:
            data = asdict(user)
            data["type"] = "user"
            return json.dumps(data, indent=2, sort_keys=True)

        @staticmethod
        def serialize_order(order: Order) -> str:
            data = asdict(order)
            data["type"] = "order"
            data["item_count"] = len(order.items)
            return json.dumps(data, indent=2, sort_keys=True)

        @staticmethod
        def serialize_batch(items: list[Any]) -> str:
            result = []
            for item in items:
                if isinstance(item, User):
                    result.append({"type": "user", **asdict(item)})
                elif isinstance(item, Order):
                    result.append({"type": "order", **asdict(item)})
            return json.dumps({"batch": result, "count": len(result)}, indent=2)
