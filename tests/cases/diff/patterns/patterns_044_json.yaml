    from src.serializers import User, JsonSerializer

    def test_serialize_user():
        user = User(id=1, name="Test", email="test@example.com")
        result = JsonSerializer.serialize_user(user)
        assert "test@example.com" in result
  src/csv_serializer.py: |
    import csv
    import io
    from dataclasses import asdict

    class CsvSerializer:
        @staticmethod
        def serialize_users(users) -> str:
            if not users:
                return ""
            output = io.StringIO()
            writer = csv.DictWriter(output, fieldnames=["id", "name", "email", "active"])
            writer.writeheader()
            for user in users:
                writer.writerow(asdict(user))
            return output.getvalue()

        @staticmethod
        def serialize_orders(orders) -> str:
            output = io.StringIO()
            writer = csv.DictWriter(output, fieldnames=["id", "user_id", "total"])
            writer.writeheader()
            for order in orders:
                row = {"id": order.id, "user_id": order.user_id, "total": order.total}
                writer.writerow(row)
            return output.getvalue()
  tests/test_csv_serializer.py: |
    from src.serializers import User, Order
    from src.csv_serializer import CsvSerializer

    def test_serialize_users_csv():
        users = [User(id=1, name="Alice", email="alice@test.com")]
        result = CsvSerializer.serialize_users(users)
        assert "Alice" in result
        assert "alice@test.com" in result

