# Test 034: CacheManager switches _serialize/_deserialize from str to json
#           — reviewer needs public get/set methods that call the private ones
#
# Scenario: _serialize changes from `str(value)` to `json.dumps(value)`,
# _deserialize from `data` passthrough to `json.loads(data)`. The public
# get() and set() methods call these private methods unchanged.
#
# Reviewer questions:
#   Q1: "Which public methods are affected by the serialization change?"
#       -> get() calls _deserialize(), set() calls _serialize().
#   Q2: "Will existing cached data break with the new format?"
#       -> Old str() data won't json.loads() correctly — potential issue.
#
# Trap files (plausible but unrelated):
#   - session_store.py: another cache-like class with get/set and
#     serialization but uses pickle, not json.
#   - json_utils.py: json helper functions (dumps/loads wrappers)
#     but not imported by CacheManager.

initial:
  cache.py: |
    class CacheManager:
        def __init__(self):
            self._data = {}

        def _serialize(self, value):
            return str(value)

        def _deserialize(self, data):
            return data

        def get(self, key):
            raw = self._data.get(key)
            if raw:
                return self._deserialize(raw)
            return None

        def set(self, key, value):
            self._data[key] = self._serialize(value)
  session_store.py: |
    import pickle

    class SessionStore:
        def __init__(self):
            self._sessions = {}

        def _serialize(self, data):
            return pickle.dumps(data)

        def _deserialize(self, raw):
            return pickle.loads(raw)

        def get(self, session_id):
            raw = self._sessions.get(session_id)
            return self._deserialize(raw) if raw else None

        def set(self, session_id, data):
            self._sessions[session_id] = self._serialize(data)
  json_utils.py: |
    import json

    def safe_dumps(data, default=None):
        try:
            return json.dumps(data, default=default)
        except TypeError:
            return str(data)

    def safe_loads(text):
        try:
            return json.loads(text)
        except (json.JSONDecodeError, TypeError):
            return None

