# Scenario: func1 and func2 both gain return values in a single file — many small hunks
# Changed: utils.py — func1() returns 1, func2() returns 2 (two separate hunks)
# Reviewer needs: utils.py (changed, both hunks in same file)
# Trap: helpers.py — also has func1/func2 naming pattern with similar function shapes
# Trap: operations.py — has return-value-producing functions with similar structure

initial:
  utils.py: |
    def func1():
        pass

    def func2():
        pass
  helpers.py: |
    def func1():
        return "helper_one"

    def func2():
        return "helper_two"

    class HelperRegistry:
        def get(self, name):
            return {"func1": func1, "func2": func2}.get(name)
  operations.py: |
    def operation_a():
        return 10

    def operation_b():
        return 20

    def run_all():
        return operation_a() + operation_b()

changed:
  utils.py: |
    def func1():
        return 1

    def func2():
        return 2
  helpers.py: |
    def func1():
        return "helper_one"

    def func2():
        return "helper_two"

    class HelperRegistry:
        def get(self, name):
            return {"func1": func1, "func2": func2}.get(name)
  operations.py: |
    def operation_a():
        return 10

    def operation_b():
        return 20

    def run_all():
        return operation_a() + operation_b()

# === Assertions ===

must_include_files:
- utils.py

must_not_include:
- helper_one
- helper_two
- HelperRegistry
- operation_a
- operation_b
- run_all

must_not_include_files:
- helpers.py
- operations.py

add_garbage_files: false
skip_garbage_check: true
