must_include_files:
  - test.py
must_not_include:
  # utils/syntax_checker.py: ast.parse()-based checker, no dependency on test.py
  - SyntaxChecker
  - SUPPORTED_PYTHON_VERSIONS
  - get_error_details
  # utils/code_linter.py: style rule linting, no reference to test.py
  - CodeLinter
  - LINT_RULES
  - MAX_LINE_LENGTH
must_not_include_files:
  - utils/syntax_checker.py
  - utils/code_linter.py
max_fragments: 3
max_files: 2
add_garbage_files: false
skip_garbage_check: true
