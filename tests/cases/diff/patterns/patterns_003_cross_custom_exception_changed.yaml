    import traceback
    from typing import Any

    INCLUDE_TRACEBACK = False
    MAX_MESSAGE_LENGTH = 500

    class ErrorSerializer:
        def serialize(self, error: Exception) -> dict[str, Any]:
            result = {
                "type": type(error).__name__,
                "message": str(error)[:MAX_MESSAGE_LENGTH],
                "args": [str(a) for a in error.args],
            }
            if INCLUDE_TRACEBACK:
                result["traceback"] = traceback.format_exc()
            return result

        def serialize_many(self, errors: list[Exception]) -> list[dict]:
            return [self.serialize(e) for e in errors]

