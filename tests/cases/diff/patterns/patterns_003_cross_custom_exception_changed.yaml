    from typing import Any

    SUPPORTED_FIELD_TYPES = ["text", "email", "number", "date", "select"]

    class FormField:
        def __init__(self, name: str, field_type: str, required: bool = False):
            self.name = name
            self.field_type = field_type
            self.required = required
            self.validators: list[callable] = []

        def validate(self, value: Any) -> list[str]:
            errors = []
            if self.required and not value:
                errors.append(f"{self.name} is required")
            for validator in self.validators:
                error = validator(value)
                if error:
                    errors.append(error)
            return errors

        def add_validator(self, fn: callable) -> None:
            self.validators.append(fn)

