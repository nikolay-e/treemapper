# Scenario: ValidationError constructor changed from single-message to (field, message)
#   pair. Only exceptions.py is changed.
#
# Diff shows:
#   - class ValidationError(Exception): pass
#   + def __init__(self, field, message): self.field = field; self.message = message
#   + super().__init__(f"{field}: {message}")
#
# Reviewer questions:
#   Q1: "Which callers raise ValidationError with the OLD single-arg signature?"
#       -> validators.py (UNCHANGED) imports ValidationError and raises it with a
#          single string argument in 5 places: "Data is empty", "Email is required",
#          "Name is required", "Order must have items", "Total must be positive".
#          ALL of these will break because __init__ now requires (field, message).
#          This is the most critical context for reviewing the change.
#
#   Q2: "Which callers catch ValidationError — does the new format break them?"
#       -> handlers.py (UNCHANGED) catches ValidationError in handle_request().
#          The except clause still works, but str(e) now returns "field: message"
#          instead of just the message. The reviewer needs to verify whether
#          downstream code depends on the string representation.
#
#   Q3: "Is the NotFoundError in the same file a related change?"
#       -> Same file (exceptions.py). NotFoundError already has a (resource, identifier)
#          constructor pattern — ValidationError is being brought to parity.
#          The reviewer can see the existing pattern in the diff context.
#
# Not needed for comprehension:
#   - middleware/error_handler.py: Catches generic Exception and ValidationError,
#     logs the error, and returns an error response. DIRECT import edge to
#     ValidationError. But it catches and logs — the new (field, message)
#     constructor doesn't affect catching behavior, only the string output.
#     Including it would shift review focus to error handling middleware
#     instead of the broken raise sites in validators.py.
#
#   - services/user_service.py: Uses validate_user_data() from validators.py.
#     Indirect structural edge: calls the function that raises ValidationError.
#     But the service doesn't import or construct ValidationError directly —
#     it's a transitive consumer, not a direct one.
#
#   - tests/test_validation.py: Tests that validate_user_data raises
#     ValidationError for invalid inputs. Imports ValidationError, uses
#     pytest.raises. Direct import edge AND tests the exact functions that
#     will break. But test assertions verify behavior, not signature —
#     the reviewer needs validators.py to see the broken call sites.
#
#   - utils/error_serializer.py: Serializes exception objects to JSON for
#     API responses. Accesses e.args, str(e), type(e).__name__. Same error
#     domain. But generic serialization doesn't depend on ValidationError's
#     specific constructor signature.
#
#   - models/form_field.py: Defines FormField with name, type, required
#     attributes and a validate() method that returns error strings.
#     "field" and "validation" vocabulary overlap. But FormField.validate()
#     returns strings, doesn't raise ValidationError.

