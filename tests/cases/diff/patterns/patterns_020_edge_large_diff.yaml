    utils/bulk_updater.py: |
      import re

      BULK_UPDATE_LIMIT = 500
      DRY_RUN_DEFAULT = True

      class BulkValueUpdater:
          def __init__(self, dry_run: bool = DRY_RUN_DEFAULT):
              self.dry_run = dry_run
              self._changes: list[dict] = []

          def replace_in_file(self, filepath: str, old: str, new: str) -> int:
              self._changes.append({"file": filepath, "old": old, "new": new})
              return 1

          def get_change_count(self) -> int:
              return len(self._changes)
    utils/diff_stats.py: |
      STAT_CATEGORIES = ["insertions", "deletions", "modifications"]

      class DiffStatCalculator:
          def __init__(self):
              self._stats: dict[str, int] = {"insertions": 0, "deletions": 0, "modifications": 0}

          def count_insertions(self, diff_text: str) -> int:
              return diff_text.count("\n+") - diff_text.count("\n+++")

          def count_deletions(self, diff_text: str) -> int:
              return diff_text.count("\n-") - diff_text.count("\n---")

          def summary(self) -> dict:
              return dict(self._stats)
