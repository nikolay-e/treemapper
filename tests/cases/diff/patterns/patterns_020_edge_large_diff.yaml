            return len(self._changes)
  utils/diff_stats.py: |
    STAT_CATEGORIES = ["insertions", "deletions", "modifications"]

    class DiffStatCalculator:
        def __init__(self):
            self._stats: dict[str, int] = {"insertions": 0, "deletions": 0, "modifications": 0}

        def count_insertions(self, diff_text: str) -> int:
            return diff_text.count("\n+") - diff_text.count("\n+++")

        def count_deletions(self, diff_text: str) -> int:
            return diff_text.count("\n-") - diff_text.count("\n---")

        def summary(self) -> dict:
            return dict(self._stats)
must_include_files:
  - large.py
must_include_content_from:
  large.py:
    - "def new_function():"
must_not_include:
  # utils/bulk_updater.py: mass file update tool, no dependency on large.py
  - BulkValueUpdater
  - BULK_UPDATE_LIMIT
  - DRY_RUN_DEFAULT
  # utils/diff_stats.py: diff statistics calculator, no reference to large.py
  - DiffStatCalculator
  - STAT_CATEGORIES
  - count_insertions
must_not_include_files:
  - utils/bulk_updater.py
  - utils/diff_stats.py
max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
