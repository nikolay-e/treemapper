# Scenario: Every line in a file changes — large diff covering all 20 variable assignments.
#
# Diff: large.py changes every line_N value from N to N+100 and adds new_function.
#
# Reviewer questions:
#   Q1: "Is this a bulk value change or a structural refactor?"
#       -> All 20 existing variables changed values. One new function added.
#   Q2: "Can the algorithm handle a diff that touches every line?"
#       -> The entire file is effectively rewritten. Budget constraints may limit
#          how much context is surfaced.
#
# Not needed:
#   - utils/bulk_updater.py: applies mass updates to config values across files.
#     Shares "bulk change" vocabulary but has no dependency on large.py.
#   - utils/diff_stats.py: computes statistics (insertions, deletions) on git diffs.
#     Same "diff" domain but analyzes diffs generically, no large.py reference.

max_enrichment: 4.1
initial:
  large.py: |
    def original_function():
        pass
  utils/bulk_updater.py: |
    import re

    BULK_UPDATE_LIMIT = 500
    DRY_RUN_DEFAULT = True

    class BulkValueUpdater:
        def __init__(self, dry_run: bool = DRY_RUN_DEFAULT):
            self.dry_run = dry_run
            self._changes: list[dict] = []

        def replace_in_file(self, filepath: str, old: str, new: str) -> int:
            self._changes.append({"file": filepath, "old": old, "new": new})
            return 1

        def get_change_count(self) -> int:
            return len(self._changes)
  utils/diff_stats.py: |
    STAT_CATEGORIES = ["insertions", "deletions", "modifications"]

    class DiffStatCalculator:
        def __init__(self):
            self._stats: dict[str, int] = {"insertions": 0, "deletions": 0, "modifications": 0}

        def count_insertions(self, diff_text: str) -> int:
            return diff_text.count("\n+") - diff_text.count("\n+++")

        def count_deletions(self, diff_text: str) -> int:
            return diff_text.count("\n-") - diff_text.count("\n---")

        def summary(self) -> dict:
            return dict(self._stats)
changed:
  large.py: |
    def original_function():
        return 1

    def new_function():
        return 2
  utils/bulk_updater.py: |
