# Test 029: process() changes return to multiply step_three result by 100
#           — reviewer needs helper chain (step_one -> step_two -> step_three)
#
# Scenario: process(x) changes from `return step_three(x)` to
# `result = step_three(x); return result * 100`. The helper chain
# step_one -> step_two -> step_three is unchanged but essential context.
#
# Reviewer questions:
#   Q1: "What does step_three(x) return that gets multiplied by 100?"
#       -> step_three calls step_two(x) + 10, which calls step_one(x) * 2.
#   Q2: "Is the full chain: (x+1)*2+10 then *100?"
#       -> Yes, unchanged helper chain computes ((x+1)*2)+10, now *100.
#
# Trap files (plausible but unrelated):
#   - pipeline.py: another function chain pattern with step_a -> step_b
#     naming but completely independent computation.
#   - transform.py: data transformation with process() function name
#     overlap but no dependency on step_one/two/three.

max_enrichment: 8.9
initial:
  chain.py: |
    def step_one(x):
        return x + 1

    def step_two(x):
        return step_one(x) * 2

    def step_three(x):
        return step_two(x) + 10

    def process(x):
        return step_three(x)
  pipeline.py: |
    def step_a(data):
        return [item.strip() for item in data]

    def step_b(data):
        return [item.lower() for item in step_a(data)]

    def step_c(data):
        return [item for item in step_b(data) if item]

    def run_pipeline(data):
        return step_c(data)
  transform.py: |
    def process(records):
        return [normalize(r) for r in records]

    def normalize(record):
        return {k: str(v).strip() for k, v in record.items()}

    def validate(record):
        return all(v for v in record.values())

changed:
  chain.py: |
    def step_one(x):
        return x + 1

    def step_two(x):
        return step_one(x) * 2

    def step_three(x):
        return step_two(x) + 10

    def process(x):
        result = step_three(x)
        return result * 100
  pipeline.py: |
    def step_a(data):
        return [item.strip() for item in data]

    def step_b(data):
        return [item.lower() for item in step_a(data)]

    def step_c(data):
        return [item for item in step_b(data) if item]

    def run_pipeline(data):
        return step_c(data)
  transform.py: |
    def process(records):
        return [normalize(r) for r in records]

    def normalize(record):
        return {k: str(v).strip() for k, v in record.items()}

    def validate(record):
        return all(v for v in record.values())

must_include_files:
  - chain.py

must_include_content_from:
  chain.py:
    - "result = step_three(x)"
    - "return result * 100"

must_not_include:
  # --- pipeline.py: similar chain pattern with step_a/b/c but independent ---
  - "step_a"
  - "step_b"
  - "run_pipeline"
  # --- transform.py: has process() function but different semantics ---
  - "normalize(r)"
  - "validate(record)"

must_not_include_files:
  - pipeline.py
  - transform.py

max_fragments: 4
max_files: 1
add_garbage_files: false
skip_garbage_check: true
