# Scenario: A file that was already syntactically broken gets another parameter added.
#
# Diff: broken.py adds `y = 2` parameter to an already-unclosed function signature.
# Both initial and changed versions have syntax errors.
#
# Reviewer questions:
#   Q1: "Can the algorithm handle a file that was already broken before the diff?"
#       -> The file never parsed correctly. The algorithm should still surface it
#          as a changed file.
#
# Not needed:
#   - utils/ast_recovery.py: attempts partial AST recovery from broken source files.
#     Shares "broken" and "syntax" vocabulary but has no dependency on broken.py.
#   - utils/error_report.py: aggregates parse errors across a project for CI reporting.
#     Error-handling domain but no reference to broken.py.

initial:
  broken.py: |
    def broken(
        x = 1
  utils/ast_recovery.py: |
    import ast

    RECOVERY_MAX_ATTEMPTS = 5

    class ASTRecovery:
        def attempt_partial_parse(self, source: str) -> list:
            lines = source.splitlines()
            nodes = []
            for i, line in enumerate(lines):
                try:
                    tree = ast.parse(line)
                    nodes.extend(ast.iter_child_nodes(tree))
                except SyntaxError:
                    continue
            return nodes

        def extract_function_names(self, source: str) -> list[str]:
            return [n for n in source.split() if n.startswith("def")]
  utils/error_report.py: |
    REPORT_FORMAT = "json"
    ERROR_SEVERITY_LEVELS = ["critical", "warning", "info"]

    class ParseErrorReport:
        def __init__(self):
            self._errors: list[dict] = []

        def add_error(self, file: str, line: int, message: str) -> None:
            self._errors.append({"file": file, "line": line, "message": message})

        def summary(self) -> dict:
            return {"total": len(self._errors), "errors": self._errors}
changed:
  broken.py: |
    def broken(
        x = 1
        y = 2
  utils/ast_recovery.py: |
