# Scenario: Only a TODO comment is added before an existing function — no logic changes.
#
# Diff: test.py gains a "# TODO: refactor this later" comment above def process().
#
# Reviewer questions:
#   Q1: "Is there any functional change?"
#       -> No. The function body and signature are identical.
#   Q2: "Should the algorithm surface this at all?"
#       -> Comment-only changes are low signal. The changed file must still appear
#          because the diff is non-empty, but no context files are needed.
#
# Not needed:
#   - utils/comment_stripper.py: removes comments from source code for analysis.
#     Same "comment" domain but no dependency on test.py.
#   - utils/todo_tracker.py: scans for TODO comments and reports them.
#     Uses "TODO" vocabulary but doesn't import or reference test.py.

max_enrichment: 3.7
initial:
  test.py: |
    def process():
        return 42
  utils/comment_stripper.py: |
    import re

    COMMENT_PATTERN = r"#.*$"
    DOCSTRING_PATTERN = r'""".*?"""'

    class CommentStripper:
        def strip_line_comments(self, source: str) -> str:
            return re.sub(COMMENT_PATTERN, "", source, flags=re.MULTILINE)

        def strip_docstrings(self, source: str) -> str:
            return re.sub(DOCSTRING_PATTERN, "", source, flags=re.DOTALL)
  utils/todo_tracker.py: |
    TODO_KEYWORDS = ["TODO", "FIXME", "HACK", "XXX"]

    class TodoTracker:
        def scan_file(self, filepath: str) -> list[dict]:
            return []

        def count_todos(self, filepath: str) -> int:
            return 0

        def get_summary(self, filepaths: list[str]) -> dict:
            return {"total": 0, "by_keyword": {}}
changed:
  test.py: |
    # TODO: refactor this later
    def process():
        return 42
  utils/comment_stripper.py: |
    import re

    COMMENT_PATTERN = r"#.*$"
    DOCSTRING_PATTERN = r'""".*?"""'

    class CommentStripper:
        def strip_line_comments(self, source: str) -> str:
            return re.sub(COMMENT_PATTERN, "", source, flags=re.MULTILINE)

        def strip_docstrings(self, source: str) -> str:
            return re.sub(DOCSTRING_PATTERN, "", source, flags=re.DOTALL)
  utils/todo_tracker.py: |
    TODO_KEYWORDS = ["TODO", "FIXME", "HACK", "XXX"]

    class TodoTracker:
        def scan_file(self, filepath: str) -> list[dict]:
            return []

        def count_todos(self, filepath: str) -> int:
            return 0

        def get_summary(self, filepaths: list[str]) -> dict:
            return {"total": 0, "by_keyword": {}}
must_include_files:
  - test.py
must_include_content:
  - "# TODO: refactor this later"
must_not_include:
  # utils/comment_stripper.py: regex-based comment removal, no dependency on test.py
  - CommentStripper
  - COMMENT_PATTERN
  - DOCSTRING_PATTERN
  # utils/todo_tracker.py: TODO keyword scanning, no reference to test.py
  - TodoTracker
  - TODO_KEYWORDS
  - count_todos
must_not_include_files:
  - utils/comment_stripper.py
  - utils/todo_tracker.py
max_fragments: 3
max_files: 2
add_garbage_files: false
skip_garbage_check: true
