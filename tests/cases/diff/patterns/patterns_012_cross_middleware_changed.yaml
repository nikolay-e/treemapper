    import time
    import re

    TOKEN_PATTERN = re.compile(r"^Bearer [A-Za-z0-9._-]+$")

    class AuthMiddleware:
        def __init__(self, secret_key: str = "default-secret"):
            self.secret_key = secret_key

        def process_request(self, request):
            if not request.get("token"):
                raise ValueError("Unauthorized: missing token")
            self._validate_token_format(request["token"])
            request["authenticated_at"] = time.time()
            return request

        def _validate_token_format(self, token: str):
            if not TOKEN_PATTERN.match(token):
                raise ValueError("Unauthorized: invalid token format")

