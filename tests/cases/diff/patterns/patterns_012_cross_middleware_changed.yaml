      import time
      from collections import defaultdict

      WINDOW_SECONDS = 60
      DEFAULT_LIMIT = 100

      class RateLimitMiddleware:
          def __init__(self, limit: int = DEFAULT_LIMIT):
              self.limit = limit
              self._requests: dict[str, list[float]] = defaultdict(list)

          def process_request(self, request):
              client_ip = request.get("client_ip", "unknown")
              now = time.time()
              window = [t for t in self._requests[client_ip] if now - t < WINDOW_SECONDS]
              self._requests[client_ip] = window
              if len(window) >= self.limit:
                  raise ValueError("Rate limit exceeded")
              self._requests[client_ip].append(now)
              request["rate_limit_remaining"] = self.limit - len(window) - 1
              return request
    middleware/logging_mw.py: |
      import logging

      logger = logging.getLogger("middleware.logging")

      class LoggingMiddleware:
          def __init__(self, log_body: bool = False):
              self.log_body = log_body

          def process_request(self, request):
              path = request.get("path", "/")
              method = request.get("method", "GET")
              logger.info(f"{method} {path}")
              if self.log_body and request.get("body"):
                  logger.debug(f"Body: {request['body']}")
              return request
    middleware/cors.py: |
      ALLOWED_ORIGINS = ["https://example.com", "https://app.example.com"]
      ALLOWED_METHODS = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      ALLOWED_HEADERS = ["Content-Type", "Authorization", "X-Request-ID"]

      class CorsMiddleware:
          def __init__(self, origins: list[str] = None):
              self.origins = origins or ALLOWED_ORIGINS

          def process_request(self, request):
              origin = request.get("origin", "")
              if origin in self.origins:
                  request["cors_allowed"] = True
              else:
                  request["cors_allowed"] = False
              return request

          def process_response(self, request, response):
              if request.get("cors_allowed"):
                  response["headers"] = response.get("headers", {})
                  response["headers"]["Access-Control-Allow-Origin"] = request["origin"]
                  response["headers"]["Access-Control-Allow-Methods"] = ", ".join(ALLOWED_METHODS)
              return response
    services/auth_service.py: |
      import hashlib
      import time

      TOKEN_EXPIRY_SECONDS = 3600
      TOKEN_ALGORITHM = "sha256"

      class AuthService:
          def __init__(self, secret_key: str):
              self.secret_key = secret_key

          def generate_token(self, user_id: str) -> str:
              payload = f"{user_id}:{time.time()}:{self.secret_key}"
              return hashlib.sha256(payload.encode()).hexdigest()

          def verify_token(self, token: str, user_id: str) -> bool:
              expected = self.generate_token(user_id)
              return hashlib.sha256(token.encode()).hexdigest() == hashlib.sha256(expected.encode()).hexdigest()

          def is_expired(self, issued_at: float) -> bool:
              return time.time() - issued_at > TOKEN_EXPIRY_SECONDS
    tests/test_auth_middleware.py: |
      import pytest
      from middleware.auth import AuthMiddleware

      def test_auth_middleware_passes_with_token():
          mw = AuthMiddleware()
          request = {"token": "Bearer valid-token-123", "path": "/api/users"}
          result = mw.process_request(request)
          assert result is not None

      def test_auth_middleware_rejects_missing_token():
          mw = AuthMiddleware()
          request = {"path": "/api/users"}
          with pytest.raises(ValueError, match="Unauthorized"):
              mw.process_request(request)

      def test_auth_middleware_rejects_empty_token():
          mw = AuthMiddleware()
          request = {"token": "", "path": "/api/users"}
          with pytest.raises(ValueError, match="Unauthorized"):
              mw.process_request(request)
