    middleware/session.py: |
      import uuid
      import time

      SESSION_COOKIE_NAME = "session_id"
      SESSION_TTL_SECONDS = 86400

      class SessionMiddleware:
          def __init__(self):
              self._sessions: dict[str, dict] = {}

          def process_request(self, request):
              session_id = request.get("cookies", {}).get(SESSION_COOKIE_NAME)
              if session_id and session_id in self._sessions:
                  request["session"] = self._sessions[session_id]
                  request["session_id"] = session_id
              else:
                  session_id = str(uuid.uuid4())
                  self._sessions[session_id] = {"created_at": time.time()}
                  request["session"] = self._sessions[session_id]
                  request["session_id"] = session_id
              return request

          def process_response(self, request, response):
              response["cookies"] = response.get("cookies", {})
              response["cookies"][SESSION_COOKIE_NAME] = request.get("session_id", "")
              return response
  changed_files:
    middleware/auth.py: |
      import time
      import re

      TOKEN_PATTERN = re.compile(r"^Bearer [A-Za-z0-9._-]+$")

      class AuthMiddleware:
          def __init__(self, secret_key: str = "default-secret"):
              self.secret_key = secret_key

          def process_request(self, request):
              if not request.get("token"):
                  raise ValueError("Unauthorized: missing token")
              self._validate_token_format(request["token"])
              request["authenticated_at"] = time.time()
              return request

          def _validate_token_format(self, token: str):
              if not TOKEN_PATTERN.match(token):
                  raise ValueError("Unauthorized: invalid token format")
