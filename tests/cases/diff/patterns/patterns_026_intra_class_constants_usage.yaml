# Scenario: APIConfig.BASE_URL changes from v1 to v2 — methods using BASE_URL are context
# Changed: config.py — BASE_URL updated to "https://api.v2.example.com"
# Reviewer needs: config.py (changed, get_endpoint and get_with_retry use BASE_URL/MAX_RETRIES)
# Trap: db_config.py — similar class-constant pattern with BASE_URL-like naming (DB_HOST, TIMEOUT)
# Trap: http_client.py — makes API calls with similar endpoint construction but no dependency

max_enrichment: 23.9
initial:
  config.py: |
    class APIConfig:
        BASE_URL = "https://api.example.com"
        TIMEOUT = 30
        MAX_RETRIES = 3

        def get_endpoint(self, path):
            return f"{self.BASE_URL}/{path}"

        def get_with_retry(self, url):
            for i in range(self.MAX_RETRIES):
                try:
                    return self._fetch(url)
                except Exception:
                    if i == self.MAX_RETRIES - 1:
                        raise
            return None

        def _fetch(self, url):
            pass
  db_config.py: |
    class DatabaseConfig:
        DB_HOST = "localhost"
        DB_PORT = 5432
        TIMEOUT = 30
        MAX_RETRIES = 5

        def get_connection_string(self):
            return f"postgresql://{self.DB_HOST}:{self.DB_PORT}/app"

        def connect_with_retry(self):
            for i in range(self.MAX_RETRIES):
                try:
                    return self._connect()
                except Exception:
                    if i == self.MAX_RETRIES - 1:
                        raise
            return None

        def _connect(self):
            pass
  http_client.py: |
    class HttpClient:
        def __init__(self, base_url):
            self.base_url = base_url

        def get(self, path):
            url = f"{self.base_url}/{path}"
            return self._request("GET", url)

        def post(self, path, data):
            url = f"{self.base_url}/{path}"
            return self._request("POST", url, data)

        def _request(self, method, url, data=None):
            pass

