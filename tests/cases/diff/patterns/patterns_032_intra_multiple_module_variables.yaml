must_include_files:
  - constants.py

must_include_content_from:
  constants.py:
    - 'VERSION = "2.0.0"'
    - "def get_version():"
    - "def get_app_info():"

must_not_include:
  # --- version_checker.py: version vocabulary overlap but independent ---
  - "parse_version"
  - "is_compatible"
  - "get_latest_version"
  # --- changelog.py: has version strings like "2.0.0" but independent ---
  - "CHANGELOG"
  - "get_changes"
  - "list_versions"

must_not_include_files:
  - version_checker.py
  - changelog.py

max_fragments: 4
max_files: 1
add_garbage_files: false
