must_include_files:
  - src/module_a.py
  - src/module_b.py
must_include_content_from:
  src/module_a.py:
    - "from module_b import func_b, new_func_b"
    - 'return "a_updated"'
must_not_include:
  # utils/import_analyzer.py: static cycle detection, no dependency on module_a or module_b
  - ImportCycleDetector
  - MAX_CYCLE_DEPTH
  - find_cycles
  # utils/dependency_graph.py: abstract dependency graph, no module_a/module_b reference
  - DependencyGraph
  - GRAPH_FORMAT
  - topological_sort
must_not_include_files:
  - utils/import_analyzer.py
  - utils/dependency_graph.py
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
