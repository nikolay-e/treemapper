# Scenario: Two modules with circular imports both change; module_a gains new_func_b
# import and call_new_b function.
#
# Diff: src/module_a.py changes import to include new_func_b, updates func_a return value,
# and adds call_new_b. src/module_b.py adds new_func_b.
#
# Reviewer questions:
#   Q1: "Does the circular import still work with the new symbol?"
#       -> module_a imports from module_b which imports from module_a — circular.
#          Adding new_func_b to module_b and importing it in module_a deepens the coupling.
#   Q2: "Is the circular dependency intentional?"
#       -> Both modules cross-reference each other's functions via call_b/call_a.
#
# Not needed:
#   - utils/import_analyzer.py: static analysis tool that detects import cycles.
#     Uses "import" and "module" vocabulary but has no dependency on module_a or module_b.
#   - utils/dependency_graph.py: builds a directed graph of module dependencies.
#     Related to imports conceptually but no code dependency on either module.

max_enrichment: 5.0
initial:
  src/module_a.py: |
    from module_b import func_b

    def func_a():
        return "a"

    def call_b():
        return func_b()
  src/module_b.py: |
    from module_a import func_a

    def func_b():
        return "b"

    def call_a():
        return func_a()
  utils/import_analyzer.py: |
    import ast

    MAX_CYCLE_DEPTH = 10

    class ImportCycleDetector:
        def __init__(self):
            self._graph: dict[str, set[str]] = {}

        def add_module(self, name: str, imports: list[str]) -> None:
            self._graph[name] = set(imports)

        def find_cycles(self) -> list[list[str]]:
            return []

        def has_cycle(self, start: str) -> bool:
            visited = set()
            stack = [start]
            while stack:
                node = stack.pop()
                if node in visited:
                    return True
                visited.add(node)
                stack.extend(self._graph.get(node, set()))
            return False
  utils/dependency_graph.py: |
    from collections import defaultdict

    GRAPH_FORMAT = "adjacency_list"

    class DependencyGraph:
        def __init__(self):
            self._edges: dict[str, list[str]] = defaultdict(list)

        def add_edge(self, source: str, target: str) -> None:
            self._edges[source].append(target)

        def get_dependents(self, module: str) -> list[str]:
            return self._edges.get(module, [])

        def topological_sort(self) -> list[str]:
            return []
changed:
  src/module_a.py: |
    from module_b import func_b, new_func_b

    def func_a():
        return "a_updated"

    def call_b():
        return func_b()

    def call_new_b():
        return new_func_b()
  src/module_b.py: |
    from module_a import func_a

    def func_b():
        return "b"

    def new_func_b():
        return "new_b"

    def call_a():
        return func_a()
  utils/import_analyzer.py: |
