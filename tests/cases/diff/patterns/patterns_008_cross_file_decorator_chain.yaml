      import functools
      import logging

      logger = logging.getLogger(__name__)

      def log_calls(func):
          @functools.wraps(func)
          def wrapper(*args, **kwargs):
              logger.info(f"Calling {func.__name__}")
              result = func(*args, **kwargs)
              logger.info(f"Finished {func.__name__}")
              return result
          return wrapper

      def retry(max_attempts=3):
          def decorator(func):
              @functools.wraps(func)
              def wrapper(*args, **kwargs):
                  for attempt in range(max_attempts):
                      try:
                          return func(*args, **kwargs)
                      except Exception as e:
                          if attempt == max_attempts - 1:
                              raise
                          logger.warning(f"Attempt {attempt + 1} failed: {e}")
              return wrapper
          return decorator
    services/user_service.py: |
      from decorators.logging import log_calls

      class UserService:
          def __init__(self, user_repo):
              self.user_repo = user_repo

          @log_calls
          def create_user(self, name: str, email: str):
              user = {"name": name, "email": email}
              self.user_repo.save(user)
              return user

          @log_calls
          def delete_user(self, user_id: int):
              self.user_repo.delete(user_id)
              return {"deleted": user_id}

          def get_user(self, user_id: int):
              return self.user_repo.find(user_id)
    services/order_service.py: |
      from decorators.logging import log_calls, retry

      class OrderService:
          def __init__(self, order_repo, inventory_client):
              self.order_repo = order_repo
              self.inventory_client = inventory_client

          @log_calls
          @retry(max_attempts=3)
          def create_order(self, user_id: int, items: list):
              self.inventory_client.reserve(items)
              order = {"user_id": user_id, "items": items, "status": "created"}
              self.order_repo.save(order)
              return order

          @log_calls
          def cancel_order(self, order_id: int):
              order = self.order_repo.find(order_id)
              order["status"] = "cancelled"
              self.order_repo.save(order)
              return order
    decorators/auth.py: |
      import functools
      import logging

      logger = logging.getLogger(__name__)

      def require_auth(func):
          @functools.wraps(func)
          def wrapper(*args, **kwargs):
              request = kwargs.get("request") or (args[0] if args else None)
              if not request or not request.get("token"):
                  raise PermissionError("Authentication required")
              logger.info(f"Authenticated request for {func.__name__}")
              return func(*args, **kwargs)
          return wrapper

      def require_role(role: str):
          def decorator(func):
              @functools.wraps(func)
              def wrapper(*args, **kwargs):
                  request = kwargs.get("request") or (args[0] if args else None)
                  user_role = request.get("role", "") if request else ""
                  if user_role != role:
                      raise PermissionError(f"Role '{role}' required")
                  return func(*args, **kwargs)
              return wrapper
          return decorator
    services/payment_service.py: |
      from decorators.logging import log_calls, retry

      class PaymentService:
          def __init__(self, gateway_client):
              self.gateway_client = gateway_client

          @log_calls
          @retry(max_attempts=3)
          def charge_card(self, card_token: str, amount: float, currency: str = "USD"):
              response = self.gateway_client.charge(card_token, amount, currency)
              if response.get("status") != "success":
                  raise RuntimeError(f"Charge failed: {response.get('error')}")
              return response

          @log_calls
          def refund(self, transaction_id: str, amount: float):
              return self.gateway_client.refund(transaction_id, amount)

          def get_transaction(self, transaction_id: str):
              return self.gateway_client.get(transaction_id)
    utils/performance_tracker.py: |
      import time
      from typing import Any

      SLOW_THRESHOLD_SECONDS = 1.0
      TRACKING_ENABLED = True

      class PerformanceTracker:
          def __init__(self):
              self._timings: dict[str, list[float]] = {}

          def start_timer(self, operation: str) -> float:
              return time.time()

          def stop_timer(self, operation: str, start: float) -> float:
              elapsed = time.time() - start
              if operation not in self._timings:
                  self._timings[operation] = []
              self._timings[operation].append(elapsed)
              return elapsed

          def average_time(self, operation: str) -> float:
              times = self._timings.get(operation, [])
              return sum(times) / len(times) if times else 0.0

          def is_slow(self, operation: str) -> bool:
              return self.average_time(operation) > SLOW_THRESHOLD_SECONDS
    tests/test_decorators.py: |
      import logging
      from decorators.logging import log_calls, retry

      def test_log_calls_logs_function_name(caplog):
          @log_calls
          def sample_function():
              return 42

          with caplog.at_level(logging.INFO):
              result = sample_function()
          assert result == 42
          assert "sample_function" in caplog.text

      def test_retry_retries_on_failure():
          call_count = 0

          @retry(max_attempts=3)
          def flaky_function():
              nonlocal call_count
              call_count += 1
              if call_count < 3:
                  raise RuntimeError("Temporary failure")
              return "success"

          result = flaky_function()
          assert result == "success"
          assert call_count == 3

      def test_retry_raises_after_max_attempts():
          @retry(max_attempts=2)
          def always_fails():
              raise ValueError("Permanent failure")

          try:
              always_fails()
          except ValueError:
              pass
