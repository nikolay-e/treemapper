    from decorators.logging import log_calls, retry

    class PaymentService:
        def __init__(self, gateway_client):
            self.gateway_client = gateway_client

        @log_calls
        @retry(max_attempts=3)
        def charge_card(self, card_token: str, amount: float, currency: str = "USD"):
            response = self.gateway_client.charge(card_token, amount, currency)
            if response.get("status") != "success":
                raise RuntimeError(f"Charge failed: {response.get('error')}")
            return response

        @log_calls
        def refund(self, transaction_id: str, amount: float):
            return self.gateway_client.refund(transaction_id, amount)

        def get_transaction(self, transaction_id: str):
            return self.gateway_client.get(transaction_id)

  utils/performance_tracker.py: |
    import time
    from typing import Any

    SLOW_THRESHOLD_SECONDS = 1.0
    TRACKING_ENABLED = True

    class PerformanceTracker:
        def __init__(self):
            self._timings: dict[str, list[float]] = {}

        def start_timer(self, operation: str) -> float:
            return time.time()

        def stop_timer(self, operation: str, start: float) -> float:
            elapsed = time.time() - start
            if operation not in self._timings:
                self._timings[operation] = []
            self._timings[operation].append(elapsed)
            return elapsed

        def average_time(self, operation: str) -> float:
            times = self._timings.get(operation, [])
            return sum(times) / len(times) if times else 0.0

        def is_slow(self, operation: str) -> bool:
            return self.average_time(operation) > SLOW_THRESHOLD_SECONDS

  tests/test_decorators.py: |
    import logging
    from decorators.logging import log_calls, retry

    def test_log_calls_logs_function_name(caplog):
        @log_calls
        def sample_function():
            return 42

        with caplog.at_level(logging.INFO):
            result = sample_function()
        assert result == 42
        assert "sample_function" in caplog.text

    def test_retry_retries_on_failure():
        call_count = 0

        @retry(max_attempts=3)
        def flaky_function():
            nonlocal call_count
            call_count += 1
            if call_count < 3:
                raise RuntimeError("Temporary failure")
            return "success"

        result = flaky_function()
        assert result == "success"
        assert call_count == 3

    def test_retry_raises_after_max_attempts():
        @retry(max_attempts=2)
        def always_fails():
            raise ValueError("Permanent failure")

        try:
            always_fails()
        except ValueError:
            pass

