    from decorators.logging import log_calls, retry

    class OrderService:
        def __init__(self, order_repo, inventory_client):
            self.order_repo = order_repo
            self.inventory_client = inventory_client

        @log_calls
        @retry(max_attempts=3)
        def create_order(self, user_id: int, items: list):
            self.inventory_client.reserve(items)
            order = {"user_id": user_id, "items": items, "status": "created"}
            self.order_repo.save(order)
            return order

        @log_calls
        def cancel_order(self, order_id: int):
            order = self.order_repo.find(order_id)
            order["status"] = "cancelled"
            self.order_repo.save(order)
            return order

