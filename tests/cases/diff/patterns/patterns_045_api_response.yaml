#           — reviewer needs api_handlers module for response structure
#
# Scenario: test_api_handlers.py adds snapshot tests that serialize ApiResponse
# to JSON and verify exact field values for success, not-found, and list
# responses. Imports expand to include ApiResponse and json.
#
# Reviewer questions:
#   Q1: "What does ApiResponse.to_json() include/exclude?"
#       -> Only includes non-None fields (data, error, meta conditionally).
#   Q2: "What meta fields does get_user return?"
#       -> request_id and cached for success, just request_id for error.
#
# Trap files (plausible but unrelated):
#   - src/product_api_handler.py: sibling API handler with similar get/list
#     methods returning ApiResponse, but for products.
#   - tests/test_product_api.py: snapshot tests for product API with similar
#     JSON assertion patterns but different handler.

