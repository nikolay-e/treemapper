# Test 035: create_user adds "verified" field to return dict
#           — reviewer needs private helpers called by create_user
#
# Scenario: UserService.create_user() adds "verified": False to its return
# dict. The method calls _validate_email, _hash_password, _generate_token
# (all unchanged). The new field doesn't affect the private method calls.
#
# Reviewer questions:
#   Q1: "What does create_user build from the private helpers?"
#       -> email from _validate_email, hashed from _hash_password, token
#       from _generate_token, now plus "verified": False.
#   Q2: "Do any private methods need updating for verified?"
#       -> No, it's a static field addition.
#
# Trap files (plausible but unrelated):
#   - auth_service.py: similar _validate/_hash pattern for authentication
#     but separate service class.
#   - user_profile.py: user domain with create/update methods but manages
#     profile data, not credentials.

max_enrichment: 9.9
initial:
  service.py: |
    class UserService:
        def _validate_email(self, email):
            return "@" in email and "." in email

        def _hash_password(self, password):
            return f"hashed_{password}"

        def _generate_token(self):
            return "token_123"

        def create_user(self, email, password):
            if not self._validate_email(email):
                raise ValueError("Invalid email")
            hashed = self._hash_password(password)
            token = self._generate_token()
            return {"email": email, "password": hashed, "token": token}
  auth_service.py: |
    class AuthService:
        def _validate_credentials(self, username, password):
            return len(username) > 0 and len(password) >= 8

        def _hash_password(self, password):
            import hashlib
            return hashlib.sha256(password.encode()).hexdigest()

        def authenticate(self, username, password):
            if not self._validate_credentials(username, password):
                return None
            return {"user": username, "hash": self._hash_password(password)}
  user_profile.py: |
    class UserProfile:
        def __init__(self, user_id):
            self.user_id = user_id
            self.data = {}

        def update(self, field, value):
            self.data[field] = value
            return self.data

        def get_display_name(self):
            return self.data.get('display_name', f'user_{self.user_id}')

