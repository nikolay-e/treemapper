# Scenario: calculate() changes return x + 1 to return x + 2 — minimal single-line edit
# Changed: test.py — single expression change in return statement
# Reviewer needs: test.py (changed, the only relevant file)
# Trap: math_utils.py — also has calculate-like functions doing arithmetic
# Trap: constants.py — defines numeric constants that could feed into calculations

max_enrichment: 4.5
initial:
  test.py: |
    def calculate():
        return x + 1
  math_utils.py: |
    def add(a, b):
        return a + b

    def multiply(a, b):
        return a * b

    class Calculator:
        def compute(self, x, y):
            return add(x, y)
  constants.py: |
    OFFSET = 1
    MULTIPLIER = 2
    MAX_VALUE = 100

    def get_offset():
        return OFFSET

changed:
  test.py: |
    def calculate():
        return x + 2
  math_utils.py: |
    def add(a, b):
        return a + b

    def multiply(a, b):
        return a * b

    class Calculator:
        def compute(self, x, y):
            return add(x, y)
  constants.py: |
    OFFSET = 1
    MULTIPLIER = 2
    MAX_VALUE = 100

    def get_offset():
        return OFFSET

# === Assertions ===

must_include_files:
- test.py

must_include_content:
- "return x + 2"

must_not_include:
- Calculator
- multiply
- OFFSET
- MULTIPLIER
- get_offset

must_not_include_files:
- math_utils.py
- constants.py

add_garbage_files: false
skip_garbage_check: true
