  src/retry_utils.py: |
    import time
    from functools import wraps

    def retry(max_attempts=3, backoff=1.0):
        def decorator(func):
            @wraps(func)
            def wrapper(*args, **kwargs):
                for attempt in range(max_attempts):
                    try:
                        return func(*args, **kwargs)
                    except Exception:
                        if attempt == max_attempts - 1:
                            raise
                        time.sleep(backoff * (attempt + 1))
            return wrapper
        return decorator
