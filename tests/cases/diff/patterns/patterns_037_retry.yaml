# Test 037: test_data_processor adds retry tests for process_with_retry
#           — reviewer needs DataProcessor and ApiClient to understand retry logic
#
# Scenario: New tests test_retry_on_failure and test_retry_exhausted_raises
# are added to test_data_processor.py. They verify DataProcessor.process_with_retry
# behavior when ApiClient.fetch_data raises ConnectionError.
#
# Reviewer questions:
#   Q1: "What does process_with_retry do on failure?"
#       -> Retries up to `retries` times, re-raises on last attempt.
#   Q2: "What method does it call that can fail?"
#       -> self.client.fetch_data(endpoint), which calls requests.get.
#
# Trap files (plausible but unrelated):
#   - src/retry_utils.py: generic retry decorator utility with similar
#     retry/backoff vocabulary but not used by DataProcessor.
#   - tests/test_api_client.py: tests for ApiClient directly but not
#     relevant to DataProcessor retry behavior review.

