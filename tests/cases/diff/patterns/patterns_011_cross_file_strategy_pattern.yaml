    import random

    DEFAULT_LIST_SIZE = 1000
    MAX_VALUE = 10000

    class SortDataGenerator:
        def random_list(self, size: int = DEFAULT_LIST_SIZE) -> list[int]:
            return [random.randint(0, MAX_VALUE) for _ in range(size)]

        def sorted_list(self, size: int = DEFAULT_LIST_SIZE) -> list[int]:
            return list(range(size))

        def reversed_list(self, size: int = DEFAULT_LIST_SIZE) -> list[int]:
            return list(range(size, 0, -1))
