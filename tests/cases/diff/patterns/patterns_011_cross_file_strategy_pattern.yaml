    import time

    BENCHMARK_ROUNDS = 100
    REPORT_FORMAT = "markdown"

    class BenchmarkReporter:
        def __init__(self):
            self._results: list[dict] = []

        def record_run(self, algorithm: str, size: int, elapsed: float) -> None:
            self._results.append({"algorithm": algorithm, "size": size, "elapsed": elapsed})

        def generate_table(self) -> str:
            header = "| Algorithm | Size | Time (ms) |"
            rows = [f"| {r['algorithm']} | {r['size']} | {r['elapsed']*1000:.2f} |" for r in self._results]
            return "\n".join([header] + rows)
