# Test 033: inner_validator adds length check inside outer_function
#           — reviewer needs sibling closures and parent scope for context
#
# Scenario: inner_validator inside outer_function changes from
# `value is not None` to `value is not None and len(value) > 0`.
# inner_transformer and process are unchanged but form the closure group.
#
# Reviewer questions:
#   Q1: "What calls inner_validator?"
#       -> process() calls inner_validator(data) before inner_transformer.
#   Q2: "Does the stricter check affect inner_transformer?"
#       -> No, transformer still just uppercases, but fewer values reach it.
#
# Trap files (plausible but unrelated):
#   - wrapper.py: another nested function pattern with similar
#     validator/transformer pair but independent closure scope.
#   - middleware.py: request validation with similar is not None
#     checks but web middleware context, unrelated to decorators.

max_enrichment: 8.3
initial:
  decorator.py: |
    def outer_function(config):
        def inner_validator(value):
            return value is not None

        def inner_transformer(value):
            return value.upper()

        def process(data):
            if not inner_validator(data):
                return None
            return inner_transformer(data)

        return process
  wrapper.py: |
    def create_wrapper(prefix):
        def validate(text):
            return text is not None and isinstance(text, str)

        def transform(text):
            return f"{prefix}_{text}"

        def execute(text):
            if not validate(text):
                return None
            return transform(text)

        return execute
  middleware.py: |
    def validate_request(request):
        if request is not None and 'body' in request:
            return True
        return False

    def parse_body(request):
        if request is not None:
            return request.get('body', {})
        return {}

    def handle_request(request):
        if not validate_request(request):
            return {'error': 'Invalid request'}
        return parse_body(request)

