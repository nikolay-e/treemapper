# Test 042: auth_service adds expiration check in verify_token + new tests
#           — reviewer needs auth_errors for exception hierarchy and test assertions
#
# Scenario: AuthService.verify_token adds time-based expiration check that
# deletes expired tokens and raises TokenExpiredError. Tests add login failure,
# unknown user, expired token, and nonexistent token scenarios.
#
# Reviewer questions:
#   Q1: "What does TokenExpiredError expose for test assertions?"
#       -> token_id attribute, message: "Token {token_id} has expired".
#   Q2: "Does the expiration check delete the token before raising?"
#       -> Yes, `del self.tokens[token_id]` then raises.
#
# Trap files (plausible but unrelated):
#   - src/session_manager.py: manages user sessions with similar expiration
#     logic and token terminology but independent of AuthService.
#   - tests/test_session_manager.py: tests session expiration with similar
#     time mocking pattern but different service.

