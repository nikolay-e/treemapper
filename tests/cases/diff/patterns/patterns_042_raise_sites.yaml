  src/session_manager.py: |
    import time

    class SessionManager:
        def __init__(self, ttl: int = 1800):
            self.sessions = {}
            self.ttl = ttl

        def create_session(self, user_id: str) -> str:
            session_id = f"session_{user_id}_{time.time()}"
            self.sessions[session_id] = {
                "user_id": user_id,
                "expires": time.time() + self.ttl,
            }
            return session_id

        def validate_session(self, session_id: str) -> bool:
            if session_id not in self.sessions:
                return False
            session = self.sessions[session_id]
            if time.time() > session["expires"]:
                del self.sessions[session_id]
                return False
            return True
  tests/test_session_manager.py: |
    from unittest.mock import patch
    from src.session_manager import SessionManager

    def test_create_session():
        mgr = SessionManager(ttl=60)
        sid = mgr.create_session("user1")
        assert sid.startswith("session_")

    @patch('src.session_manager.time.time')
    def test_expired_session(mock_time):
        mock_time.return_value = 1000.0
        mgr = SessionManager(ttl=60)
        sid = mgr.create_session("user1")
        mock_time.return_value = 2000.0
        assert mgr.validate_session(sid) is False

