# Test 039: test_calculator expands from single test to parametrized suite
#           — reviewer needs calculator module to verify imported functions
#
# Scenario: test_calculator.py changes import from just `add` to
# `add, subtract, multiply`, adds @pytest.mark.parametrize tests for add
# and subtract, plus a basic multiply test. calculator.py is unchanged.
#
# Reviewer questions:
#   Q1: "Do subtract and multiply signatures match the parametrize calls?"
#       -> subtract(a, b) -> int, multiply(a, b) -> int — yes, compatible.
#   Q2: "Why isn't divide tested?"
#       -> divide raises ValueError on zero but is not imported in tests.
#
# Trap files (plausible but unrelated):
#   - src/math_utils.py: additional math functions with add/multiply names
#     but in a different module, not imported by tests.
#   - tests/test_math_utils.py: tests for math_utils with similar
#     parametrize patterns but testing different functions.

max_enrichment: 4.7
initial:
  src/calculator.py: |
    def add(a: int, b: int) -> int:
        return a + b

    def subtract(a: int, b: int) -> int:
        return a - b

    def multiply(a: int, b: int) -> int:
        return a * b

    def divide(a: int, b: int) -> float:
        if b == 0:
            raise ValueError("Cannot divide by zero")
        return a / b
  tests/test_calculator.py: |
    import pytest
    from src.calculator import add

    def test_add_basic():
        assert add(1, 2) == 3
  src/math_utils.py: |
    import math

    def add_floats(a: float, b: float) -> float:
        return round(a + b, 10)

    def multiply_matrix(matrix_a, matrix_b):
        rows = len(matrix_a)
        cols = len(matrix_b[0])
        result = [[0] * cols for _ in range(rows)]
        for i in range(rows):
            for j in range(cols):
                for k in range(len(matrix_b)):
                    result[i][j] += matrix_a[i][k] * matrix_b[k][j]
        return result

    def factorial(n: int) -> int:
        return math.factorial(n)
  tests/test_math_utils.py: |
    import pytest
    from src.math_utils import add_floats, factorial

    @pytest.mark.parametrize("a,b,expected", [
        (0.1, 0.2, 0.3),
        (1.5, 2.5, 4.0),
    ])
    def test_add_floats(a, b, expected):
        assert add_floats(a, b) == expected

    def test_factorial():
        assert factorial(5) == 120

