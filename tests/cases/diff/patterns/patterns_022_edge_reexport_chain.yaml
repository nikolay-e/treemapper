must_include_files:
  # Q1: Reviewer needs to see the first hop in the re-export chain
  - src/lib/index.ts

must_include_content_from:
  src/core/utils.ts:
    - "coreutils"
    - "core_v2"

must_not_include:
  # --- logger.ts: sibling in core/, not in the re-export chain ---
  - "createLogger"
  - "LogLevel"
  - "getDefaultLogger"
  # --- helpers.ts: top-level helpers, no import relationship ---
  - "capitalize"
  - "slugify"
  - "truncate"
  # --- constants.ts: HARD TRAP — same core/ directory, similar const exports ---
  - "APP_NAME"
  - "MAX_RETRIES"
  - "getVersionString"
  # --- format.ts: same lib/ directory as re-export hop ---
  - "formatOutput"
  - "formatDate"
  - "formatNumber"
  # --- transform.ts: similar utility naming to core/utils.ts ---
  - "transformKeys"
  - "flattenArray"

must_not_include_files:
  - src/core/logger.ts
  - src/helpers.ts
  - src/core/constants.ts
  - src/lib/format.ts
  - src/utils/transform.ts

max_fragments: 8
max_files: 5
add_garbage_files: false
skip_garbage_check: true
