  signals_registry.py: |
    class Signal:
        def __init__(self, name: str):
            self.name = name
            self._receivers: list[callable] = []

        def connect(self, receiver: callable) -> None:
            self._receivers.append(receiver)

        def send(self, sender, **kwargs):
            results = []
            for receiver in self._receivers:
                results.append(receiver(sender, **kwargs))
            return results

        def disconnect(self, receiver: callable) -> None:
            self._receivers = [r for r in self._receivers if r != receiver]

    user_created = Signal("user_created")
    user_deleted = Signal("user_deleted")
    order_placed = Signal("order_placed")

  services/notification_service.py: |
    import logging

    logger = logging.getLogger(__name__)

    NOTIFICATION_TYPES = ["push", "in_app", "email"]
    MAX_BATCH_SIZE = 100

    class NotificationService:
        def __init__(self):
            self._queue: list[dict] = []

        def send_push(self, user_email: str, user_name: str, message: str) -> bool:
            logger.info(f"Push notification to {user_name}: {message}")
            self._queue.append({"type": "push", "to": user_email, "body": message})
            return True

        def send_in_app(self, user_email: str, user_name: str, message: str) -> bool:
            logger.info(f"In-app notification to {user_name}: {message}")
            self._queue.append({"type": "in_app", "to": user_email, "body": message})
            return True

        def flush_queue(self) -> int:
            count = len(self._queue)
            self._queue.clear()
            return count

  handlers/user_handler.py: |
    from models.user import User
    from signals_registry import user_created

    class UserHandler:
        def __init__(self, user_repo):
            self.user_repo = user_repo

        def create_user(self, request_data: dict) -> dict:
            user = User(
                name=request_data["name"],
                email=request_data["email"],
            )
            self.user_repo.save(user)
            user_created.send(sender=self.__class__, instance=user)
            return {"id": user.name, "status": "created"}

        def get_user(self, user_id: str) -> dict | None:
            return self.user_repo.find(user_id)

        def list_users(self) -> list[dict]:
            return self.user_repo.find_all()

  tests/test_signals.py: |
    from models.user import User
    from signals import on_user_created

    def test_on_user_created_prints_name(capsys):
        user = User(name="Alice", email="alice@example.com")
        on_user_created(sender=None, instance=user)
        captured = capsys.readouterr()
        assert "Alice" in captured.out

    def test_on_user_created_handles_special_chars(capsys):
        user = User(name="Bob O'Brien", email="bob@example.com")
        on_user_created(sender=None, instance=user)
        captured = capsys.readouterr()
        assert "Bob O'Brien" in captured.out

  services/sms_service.py: |
    import logging

    logger = logging.getLogger(__name__)

    SMS_GATEWAY_URL = "https://sms.gateway.example.com/api/v1"
    SMS_MAX_LENGTH = 160

    class SmsService:
        def __init__(self, gateway_url: str = SMS_GATEWAY_URL):
            self.gateway_url = gateway_url

        def send_welcome_sms(self, phone_number: str, user_name: str) -> bool:
            message = f"Welcome {user_name}! Thanks for joining."
            return self._send(phone_number, message)

        def send_verification(self, phone_number: str, code: str) -> bool:
            message = f"Your verification code is: {code}"
            return self._send(phone_number, message)

        def _send(self, to: str, message: str) -> bool:
            if len(message) > SMS_MAX_LENGTH:
                message = message[:SMS_MAX_LENGTH]
            logger.info(f"SMS to {to}: {message}")
            return True

