    from datetime import datetime

    class User:
        def __init__(self, name: str, email: str):
            self.name = name
            self.email = email
            self.created_at = datetime.utcnow()
            self.is_active = True

        def deactivate(self):
            self.is_active = False

        def full_display_name(self) -> str:
            return f"{self.name} <{self.email}>"

  services/email_service.py: |
    import logging

    logger = logging.getLogger(__name__)

    SMTP_HOST = "smtp.example.com"
    SMTP_PORT = 587
    DEFAULT_FROM = "noreply@example.com"

    class EmailService:
        def __init__(self, host: str = SMTP_HOST, port: int = SMTP_PORT):
            self.host = host
            self.port = port

        def send_welcome(self, recipient_email: str, recipient_name: str) -> bool:
            subject = f"Welcome, {recipient_name}!"
            body = f"Hello {recipient_name}, welcome to our platform."
            return self._send(recipient_email, subject, body)

        def send_password_reset(self, recipient_email: str, reset_token: str) -> bool:
            subject = "Password Reset Request"
            body = f"Use this token to reset your password: {reset_token}"
            return self._send(recipient_email, subject, body)

        def _send(self, to: str, subject: str, body: str) -> bool:
            logger.info(f"Sending email to {to}: {subject}")
            return True

