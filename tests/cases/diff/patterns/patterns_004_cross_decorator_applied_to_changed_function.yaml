    SUPPORTED_VERSIONS = ["v1", "v2", "v3"]
    DEFAULT_API_VERSION = "v2"

    class ApiVersionRouter:
        def __init__(self):
            self._version_handlers: dict[str, callable] = {}

        def register(self, version: str, handler: callable) -> None:
            self._version_handlers[version] = handler

        def route(self, version: str, request: dict) -> dict:
            handler = self._version_handlers.get(version)
            if not handler:
                return {"error": f"Unsupported version: {version}"}
            return handler(request)
