# Scenario: AuditableMixin gains created_by tracking and a track_modification helper.
#
# Diff: mixins/auditable.py adds get_created_by, set_created_by, updates audit_info
# to include created_by, and adds track_modification method.
#
# Reviewer questions:
#   Q1: "Which models inherit AuditableMixin and are affected?"
#       -> models/user.py (UNCHANGED) subclasses AuditableMixin with User class.
#          models/order.py (UNCHANGED) subclasses AuditableMixin with Order class.
#   Q2: "Should existing save() methods use track_modification instead?"
#       -> Both User.save() and Order.save() manually call get_created_at/set_created_at.
#          The new track_modification() consolidates this pattern.
#
# Not needed:
#   - utils/schema_migration.py: runs database ALTER TABLE statements.
#     Same "model" vocabulary but handles DB schema, not Python mixin methods.
#   - utils/data_seeder.py: populates test fixtures with sample data.
#     Creates model instances but doesn't extend AuditableMixin.

