# Scenario: Abstract factory base gains set_disabled on Button, set_required on Input,
# and a new Checkbox abstract class with create_checkbox on UIFactory.
#
# Diff: factories/base.py adds abstract methods and Checkbox class.
#
# Reviewer questions:
#   Q1: "Do MaterialUIFactory and BootstrapUIFactory implement the new methods?"
#       -> factories/material.py (UNCHANGED) and factories/bootstrap.py (UNCHANGED)
#          both import from factories.base and subclass UIFactory, Button, Input.
#          They will be broken until they implement the new abstracts.
#   Q2: "Is Checkbox implemented in any concrete factory?"
#       -> Neither material.py nor bootstrap.py implements create_checkbox yet.
#
# Not needed:
#   - utils/color_palette.py: defines hex color constants for design tokens.
#     Uses "UI" vocabulary (colors for buttons, inputs) but no import of factory base.
#   - utils/accessibility_checker.py: validates WCAG contrast ratios for element pairs.
#     UI-adjacent utility but has no dependency on the factory hierarchy.

initial:
  factories/base.py: |
    from abc import ABC, abstractmethod

    class Button(ABC):
        @abstractmethod
        def render(self) -> str:
            pass

    class Input(ABC):
        @abstractmethod
        def render(self) -> str:
            pass

    class UIFactory(ABC):
        @abstractmethod
        def create_button(self, label: str) -> Button:
            pass

        @abstractmethod
        def create_input(self, placeholder: str) -> Input:
            pass
  factories/material.py: |
    from factories.base import UIFactory, Button, Input

    class MaterialButton(Button):
        def __init__(self, label: str):
            self.label = label

        def render(self) -> str:
            return f'<button class="mdc-button">{self.label}</button>'

    class MaterialInput(Input):
        def __init__(self, placeholder: str):
            self.placeholder = placeholder

        def render(self) -> str:
            return f'<input class="mdc-input" placeholder="{self.placeholder}">'

    class MaterialUIFactory(UIFactory):
        def create_button(self, label: str) -> Button:
            return MaterialButton(label)

        def create_input(self, placeholder: str) -> Input:
            return MaterialInput(placeholder)
  factories/bootstrap.py: |
    from factories.base import UIFactory, Button, Input

    class BootstrapButton(Button):
        def __init__(self, label: str):
            self.label = label

        def render(self) -> str:
            return f'<button class="btn btn-primary">{self.label}</button>'

    class BootstrapInput(Input):
        def __init__(self, placeholder: str):
            self.placeholder = placeholder

        def render(self) -> str:
            return f'<input class="form-control" placeholder="{self.placeholder}">'

    class BootstrapUIFactory(UIFactory):
        def create_button(self, label: str) -> Button:
            return BootstrapButton(label)

        def create_input(self, placeholder: str) -> Input:
            return BootstrapInput(placeholder)
  utils/color_palette.py: |
    PRIMARY_COLOR = "#1976D2"
    SECONDARY_COLOR = "#424242"
    ACCENT_COLOR = "#FF4081"
    ERROR_COLOR = "#D32F2F"

    BUTTON_COLORS = {
        "primary": PRIMARY_COLOR,
        "secondary": SECONDARY_COLOR,
        "accent": ACCENT_COLOR,
    }

    def get_contrast_color(hex_color: str) -> str:
        r, g, b = int(hex_color[1:3], 16), int(hex_color[3:5], 16), int(hex_color[5:7], 16)
        luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255
        return "#000000" if luminance > 0.5 else "#FFFFFF"
  utils/accessibility_checker.py: |
    MIN_CONTRAST_RATIO = 4.5
    LARGE_TEXT_CONTRAST_RATIO = 3.0

    class AccessibilityChecker:
        def check_contrast(self, foreground: str, background: str) -> float:
            return 5.0

        def meets_wcag_aa(self, ratio: float, large_text: bool = False) -> bool:
            threshold = LARGE_TEXT_CONTRAST_RATIO if large_text else MIN_CONTRAST_RATIO
            return ratio >= threshold
