    from abc import ABC, abstractmethod

    class Button(ABC):
        @abstractmethod
        def render(self) -> str:
            pass

        @abstractmethod
        def set_disabled(self, disabled: bool) -> None:
            pass

    class Input(ABC):
        @abstractmethod
        def render(self) -> str:
            pass

        @abstractmethod
        def set_required(self, required: bool) -> None:
            pass

    class Checkbox(ABC):
        @abstractmethod
        def render(self) -> str:
            pass

    class UIFactory(ABC):
        @abstractmethod
        def create_button(self, label: str) -> Button:
            pass

        @abstractmethod
        def create_input(self, placeholder: str) -> Input:
            pass

        @abstractmethod
        def create_checkbox(self, label: str) -> Checkbox:
            pass
