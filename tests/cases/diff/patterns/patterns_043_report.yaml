# Test 043: test_report_generator adds snapshot tests for summary and HTML output
#           — reviewer needs ReportGenerator to verify expected values in snapshots
#
# Scenario: test_report_generator.py adds test_generate_summary_snapshot and
# test_generate_html_snapshot with full expected-value assertions. Tests verify
# exact total, count, average, and HTML structure.
#
# Reviewer questions:
#   Q1: "How does generate_summary compute average?"
#       -> total/count rounded to 2 decimals, returns dict with title/total/count/average/items.
#   Q2: "What HTML structure does generate_html produce?"
#       -> <html> with <h1> title, <p> total/count/average, <ul><li> per item.
#
# Trap files (plausible but unrelated):
#   - src/invoice_generator.py: another generator with similar generate_summary
#     and generate_html methods but for invoices, not reports.
#   - tests/test_invoice_generator.py: snapshot tests for invoices with similar
#     HTML assertion patterns but different generator.

max_enrichment: 6.5
initial:
  src/report_generator.py: |
    from datetime import datetime

    class ReportGenerator:
        def __init__(self, title: str):
            self.title = title

        def generate_summary(self, data: list[dict]) -> dict:
            total = sum(item.get("value", 0) for item in data)
            count = len(data)
            avg = total / count if count > 0 else 0
            return {
                "title": self.title,
                "total": total,
                "count": count,
                "average": round(avg, 2),
                "items": data,
            }

        def generate_html(self, data: list[dict]) -> str:
            summary = self.generate_summary(data)
            html = f"<html><head><title>{summary['title']}</title></head>"
            html += f"<body><h1>{summary['title']}</h1>"
            html += f"<p>Total: {summary['total']}</p>"
            html += f"<p>Count: {summary['count']}</p>"
            html += f"<p>Average: {summary['average']}</p>"
            html += "<ul>"
            for item in summary["items"]:
                html += f"<li>{item.get('name', 'Unknown')}: {item.get('value', 0)}</li>"
            html += "</ul></body></html>"
            return html
  tests/test_report_generator.py: |
    from src.report_generator import ReportGenerator

    def test_generate_summary_basic():
        generator = ReportGenerator("Test Report")
        data = [{"name": "A", "value": 10}]
        result = generator.generate_summary(data)
        assert result["total"] == 10
  src/invoice_generator.py: |
    from datetime import datetime

    class InvoiceGenerator:
        def __init__(self, company: str):
            self.company = company

        def generate_summary(self, line_items: list[dict]) -> dict:
            subtotal = sum(item.get("amount", 0) for item in line_items)
            tax = round(subtotal * 0.1, 2)
            return {
                "company": self.company,
                "subtotal": subtotal,
                "tax": tax,
                "total": round(subtotal + tax, 2),
                "items": line_items,
            }

        def generate_html(self, line_items: list[dict]) -> str:
            summary = self.generate_summary(line_items)
            html = f"<html><body><h1>Invoice - {self.company}</h1>"
            html += f"<p>Subtotal: ${summary['subtotal']}</p>"
            html += f"<p>Tax: ${summary['tax']}</p>"
            html += f"<p>Total: ${summary['total']}</p>"
            html += "</body></html>"
            return html
  tests/test_invoice_generator.py: |
    from src.invoice_generator import InvoiceGenerator

    def test_invoice_summary():
        gen = InvoiceGenerator("Acme Corp")
        items = [{"desc": "Widget", "amount": 100}]
        result = gen.generate_summary(items)
        assert result["subtotal"] == 100
        assert result["tax"] == 10.0

