# Scenario: deprecated.py gains a deprecation warning in old_function, changes
# new_function return value, and adds newer_function.
#
# Diff: src/deprecated.py adds `import warnings`, deprecation warning in old_function,
# changes new_function to return "new_v2", and adds newer_function.
#
# Reviewer questions:
#   Q1: "Who calls old_function with the new deprecation warning?"
#       -> src/legacy.py (UNCHANGED) imports and calls old_function — will now see the warning.
#   Q2: "Who calls new_function with the changed return value?"
#       -> src/main.py (UNCHANGED) imports and calls new_function — return value changed.
#
# Not needed:
#   - utils/deprecation_report.py: generates reports of deprecated symbol usage across a codebase.
#     Shares "deprecated" vocabulary but no import of deprecated.py.
#   - utils/migration_guide.py: documents upgrade paths between API versions.
#     Related to deprecation lifecycle but has no code dependency.

initial:
  src/deprecated.py: |
    def old_function():
        '''Deprecated: use new_function instead'''
        return "old"

    def new_function():
        return "new"
  src/main.py: |
    from deprecated import new_function

    def main():
        return new_function()
  src/legacy.py: |
    # This file still uses old_function for backwards compatibility
    from deprecated import old_function

    def legacy_handler():
        return old_function()
  utils/deprecation_report.py: |
    REPORT_OUTPUT_DIR = "./reports"
    DEPRECATION_THRESHOLD_DAYS = 90

    class DeprecationReporter:
        def __init__(self):
            self._usages: list[dict] = []

        def record_usage(self, symbol: str, file: str, line: int) -> None:
            self._usages.append({"symbol": symbol, "file": file, "line": line})

        def generate_report(self) -> str:
            return f"Found {len(self._usages)} deprecated usages"

        def get_symbols_past_threshold(self) -> list[str]:
            return []
  utils/migration_guide.py: |
    API_VERSIONS = ["v1", "v2", "v3"]
    LATEST_VERSION = "v3"

    class MigrationGuide:
        def get_breaking_changes(self, from_version: str, to_version: str) -> list[str]:
            return []

        def get_upgrade_steps(self, from_version: str) -> list[str]:
            return [f"Upgrade from {from_version} to {LATEST_VERSION}"]
changed:
  src/deprecated.py: |
    import warnings

    def old_function():
        '''Deprecated: use new_function instead'''
        warnings.warn(
            "old_function is deprecated, use new_function",
            DeprecationWarning,
            stacklevel=2
        )
        return "old"

    def new_function():
        return "new_v2"

    def newer_function():
        return "newer"
  src/main.py: |
    from deprecated import new_function

    def main():
        return new_function()
  src/legacy.py: |
    # This file still uses old_function for backwards compatibility
    from deprecated import old_function

    def legacy_handler():
        return old_function()
  utils/deprecation_report.py: |
    REPORT_OUTPUT_DIR = "./reports"
    DEPRECATION_THRESHOLD_DAYS = 90

    class DeprecationReporter:
        def __init__(self):
            self._usages: list[dict] = []

        def record_usage(self, symbol: str, file: str, line: int) -> None:
            self._usages.append({"symbol": symbol, "file": file, "line": line})

        def generate_report(self) -> str:
            return f"Found {len(self._usages)} deprecated usages"

        def get_symbols_past_threshold(self) -> list[str]:
            return []
  utils/migration_guide.py: |
    API_VERSIONS = ["v1", "v2", "v3"]
    LATEST_VERSION = "v3"

    class MigrationGuide:
        def get_breaking_changes(self, from_version: str, to_version: str) -> list[str]:
            return []

        def get_upgrade_steps(self, from_version: str) -> list[str]:
            return [f"Upgrade from {from_version} to {LATEST_VERSION}"]
must_include_files:
  - src/deprecated.py
must_include_content_from:
  src/deprecated.py:
    - "import warnings"
    - "warnings.warn("
must_not_include:
  # utils/deprecation_report.py: usage reporting tool, no import of deprecated.py
  - DeprecationReporter
  - REPORT_OUTPUT_DIR
  - DEPRECATION_THRESHOLD_DAYS
  # utils/migration_guide.py: version upgrade docs, no dependency on deprecated.py
  - MigrationGuide
  - API_VERSIONS
  - get_upgrade_steps
must_not_include_files:
  - utils/deprecation_report.py
  - utils/migration_guide.py
max_fragments: 5
max_files: 4
add_garbage_files: false
skip_garbage_check: true
