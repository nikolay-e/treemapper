repo:
  initial_files:
    schemas.py: |
      from dataclasses import dataclass

      @dataclass
      class UserCreate:
          name: str
          email: str

          def dict(self) -> dict:
              return {"name": self.name, "email": self.email}

      @dataclass
      class UserResponse:
          id: int
          name: str
          email: str

          def dict(self) -> dict:
              return {"id": self.id, "name": self.name, "email": self.email}
    routers/users.py: |
      from fastapi import APIRouter
      from schemas import UserCreate, UserResponse

      router = APIRouter(prefix="/users", tags=["users"])

      _users_db: list[dict] = []

      @router.post("/", response_model=UserResponse)
      async def create_user(user: UserCreate):
          new_user = {"id": len(_users_db) + 1, **user.dict()}
          _users_db.append(new_user)
          return new_user

      @router.get("/{user_id}", response_model=UserResponse)
      async def get_user(user_id: int):
          for u in _users_db:
              if u["id"] == user_id:
                  return u
          return {"id": 0, "name": "", "email": ""}

      @router.get("/", response_model=list)
      async def list_users():
          return _users_db
    main.py: |
      from fastapi import FastAPI

      app = FastAPI(title="User Service", version="1.0.0")
    services/notification_service.py: |
      from typing import Optional

      class NotificationService:
          def __init__(self, provider: str = "email"):
              self.provider = provider
              self._pending: list[dict] = []

          def send(self, recipient: str, message: str) -> bool:
              self._pending.append({"to": recipient, "msg": message})
              return True

          def flush(self) -> int:
              count = len(self._pending)
              self._pending.clear()
              return count

          def get_pending_count(self) -> int:
              return len(self._pending)
    services/billing_engine.py: |
      from typing import Optional

      class BillingEngine:
          def __init__(self, currency: str = "USD"):
              self.currency = currency
              self._transactions: list[dict] = []

          def charge(self, amount: float, description: str) -> dict:
              txn = {"amount": amount, "desc": description, "currency": self.currency}
              self._transactions.append(txn)
              return txn

          def get_total(self) -> float:
              return sum(t["amount"] for t in self._transactions)
