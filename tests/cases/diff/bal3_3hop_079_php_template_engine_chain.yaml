name: bal3_3hop_079_php_template_engine_chain
tags:
- lang:php
- change:bug_fix
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/Template/Engine.php: |
      <?php
      namespace App\Template;

      class Engine {
          private string $basePath;
          public function __construct(string $basePath) {
              $this->basePath = $basePath;
          }
          public function render(string $template, array $data): string {
              $content = file_get_contents($this->basePath . '/' . $template);
              foreach ($data as $key => $value) {
                  $content = str_replace('{{ ' . $key . ' }}', $value, $content);
              }
              return $content;
          }
      }
    src/Template/TemplateCache.php: |
      <?php
      namespace App\Template;

      use App\Template\Engine;

      class TemplateCache {
          private Engine $engine;
          private array $cache = [];
          public function __construct(Engine $engine) {
              $this->engine = $engine;
          }
          public function get(string $template, array $data): string {
              $key = md5($template . serialize($data));
              if (!isset($this->cache[$key])) {
                  $this->cache[$key] = $this->engine->render($template, $data);
              }
              return $this->cache[$key];
          }
      }
    src/View/ViewFactory.php: |
      <?php
      namespace App\View;

      use App\Template\TemplateCache;

      class ViewFactory {
          private TemplateCache $cache;
          public function __construct(TemplateCache $cache) {
              $this->cache = $cache;
          }
          public function make(string $view, array $data = []): string {
              return $this->cache->get($view . '.html', $data);
          }
      }
    src/Controllers/PageController.php: |
      <?php
      namespace App\Controllers;

      use App\View\ViewFactory;

      class PageController {
          private ViewFactory $view;
          public function __construct(ViewFactory $view) {
              $this->view = $view;
          }
          public function home(): string {
              return $this->view->make('home', ['title' => 'Home']);
          }
          public function about(): string {
              return $this->view->make('about', ['title' => 'About']);
          }
      }
