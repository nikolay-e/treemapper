    proto/notification.proto: |
      syntax = "proto3";

      message Notification {
        string recipient = 1;
        string subject = 2;
        string body = 3;
        string channel = 4;
        bool urgent = 5;
      }
    service/notification_service.py: |
      from proto import notification_pb2

      class NotificationService:
          def send(
              self,
              recipient: str,
              subject: str,
              body: str,
              channel: str = "email",
              urgent: bool = False,
          ) -> notification_pb2.Notification:
              return notification_pb2.Notification(
                  recipient=recipient,
                  subject=subject,
                  body=body,
                  channel=channel,
                  urgent=urgent,
              )
