name: gap_158_shell_terraform_monitoring_setup_single_import
tags:
- change:config
- change:single_file
- context:import_chain
- difficulty:medium
- distance:2hop
- lang:shell
- lang:terraform
fixtures:
  auto_garbage: true
repo:
  initial_files:
    monitoring/setup_grafana.sh: |
      #!/usr/bin/env bash
      set -euo pipefail

      GRAFANA_URL="${GRAFANA_URL:-http://localhost:3000}"
      GRAFANA_API_KEY="${GRAFANA_API_KEY:-admin:admin}"
      DATASOURCE_NAME="prometheus"
      PROMETHEUS_URL="${PROMETHEUS_URL:-http://prometheus:9090}"

      curl -s -X POST "${GRAFANA_URL}/api/datasources" \
        -u "${GRAFANA_API_KEY}" \
        -H "Content-Type: application/json" \
        -d "{\"name\":\"${DATASOURCE_NAME}\",\"type\":\"prometheus\",\"url\":\"${PROMETHEUS_URL}\",\"access\":\"proxy\"}"
    terraform/prometheus.tf: |
      resource "helm_release" "prometheus" {
        name       = "prometheus"
        repository = "https://prometheus-community.github.io/helm-charts"
        chart      = "kube-prometheus-stack"
        namespace  = "monitoring"
        version    = "51.0.0"

        set {
          name  = "prometheus.prometheusSpec.retention"
          value = "15d"
        }

        set {
          name  = "prometheus.prometheusSpec.storageSpec.volumeClaimTemplate.spec.resources.requests.storage"
          value = "50Gi"
        }
      }
    terraform/grafana.tf: |
      resource "helm_release" "grafana" {
        name       = "grafana"
        repository = "https://grafana.github.io/helm-charts"
        chart      = "grafana"
        namespace  = "monitoring"
        version    = "6.60.0"

        set {
          name  = "persistence.enabled"
          value = "true"
        }

        set {
          name  = "persistence.size"
          value = "10Gi"
        }
      }
    terraform/loki.tf: |
      resource "helm_release" "loki" {
        name       = "loki"
        repository = "https://grafana.github.io/helm-charts"
        chart      = "loki-stack"
        namespace  = "monitoring"
        version    = "2.10.0"

        set {
          name  = "loki.persistence.enabled"
          value = "true"
        }
      }
  changed_files:
    monitoring/setup_grafana.sh: |
      #!/usr/bin/env bash
      set -euo pipefail

      GRAFANA_URL="${GRAFANA_URL:-http://localhost:3000}"
      GRAFANA_API_KEY="${GRAFANA_API_KEY:-admin:admin}"
      DATASOURCE_NAME="prometheus"
      PROMETHEUS_URL="${PROMETHEUS_URL:-http://prometheus:9090}"
      LOKI_URL="${LOKI_URL:-http://loki:3100}"

      curl -s -X POST "${GRAFANA_URL}/api/datasources" \
        -u "${GRAFANA_API_KEY}" \
        -H "Content-Type: application/json" \
        -d "{\"name\":\"${DATASOURCE_NAME}\",\"type\":\"prometheus\",\"url\":\"${PROMETHEUS_URL}\",\"access\":\"proxy\"}"

      curl -s -X POST "${GRAFANA_URL}/api/datasources" \
        -u "${GRAFANA_API_KEY}" \
        -H "Content-Type: application/json" \
        -d "{\"name\":\"loki\",\"type\":\"loki\",\"url\":\"${LOKI_URL}\",\"access\":\"proxy\"}"

      curl -s -X PUT "${GRAFANA_URL}/api/org/preferences" \
        -u "${GRAFANA_API_KEY}" \
        -H "Content-Type: application/json" \
        -d "{\"theme\":\"dark\",\"homeDashboardUID\":\"overview\"}"
fragments:
- id: loki_datasource
  selector:
    path: monitoring/setup_grafana.sh
    anchor: LOKI_URL
- id: org_preferences
  selector:
    path: monitoring/setup_grafana.sh
    anchor: org/preferences
- id: grafana_helm
  selector:
    path: terraform/grafana.tf
    anchor: helm_release
- id: prometheus_helm
  selector:
    path: terraform/prometheus.tf
    anchor: kube-prometheus-stack
- id: no_loki_tf
  selector:
    path: terraform/loki.tf
- id: no_loki_stack
  selector:
    anchor: loki-stack
oracle:
  required:
  - loki_datasource
  - org_preferences
  - grafana_helm
  forbidden:
  - no_loki_tf
  - no_loki_stack
