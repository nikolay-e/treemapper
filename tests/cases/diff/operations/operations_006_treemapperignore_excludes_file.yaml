# Scenario: FileProcessor gains a status field and new method; .treemapperignore
# excludes *.tmp and *.log files which also changed.
# Reviewer asks: "What new functionality was added to FileProcessor?"
# Trap rationale: file_archiver.py and directory_scanner.py share filesystem
# vocabulary but are not imported by main.py. *.tmp and *.log must be excluded.

max_enrichment: 8.4
initial:
  .treemapperignore: |
    *.tmp
    *.log
    build/
  main.py: |
    from pathlib import Path
    from typing import Any

    class FileProcessor:
        def __init__(self, base_dir: str = "."):
            self.base_dir = Path(base_dir)
            self._processed: list[str] = []

        def process_file(self, filename: str) -> dict[str, Any]:
            path = self.base_dir / filename
            size = path.stat().st_size if path.exists() else 0
            self._processed.append(filename)
            return {"file": filename, "size": size}

        def get_processed_count(self) -> int:
            return len(self._processed)

    def create_processor(base_dir: str = ".") -> FileProcessor:
        return FileProcessor(base_dir)
