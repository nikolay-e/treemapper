      import tarfile
      from pathlib import Path

      ARCHIVE_EXTENSION = ".tar.gz"

      class FileArchiver:
          def __init__(self, archive_dir: str = "/tmp/archives"):
              self.archive_dir = Path(archive_dir)

          def create_archive(self, files: list[str], name: str) -> Path:
              archive_path = self.archive_dir / f"{name}{ARCHIVE_EXTENSION}"
              return archive_path

          def list_contents(self, archive_path: str) -> list[str]:
              return []
    utils/directory_scanner.py: |
      from pathlib import Path
      from typing import Iterator

      SKIP_PATTERNS = {".git", "__pycache__", "node_modules"}

      class DirectoryScanner:
          def __init__(self, root: str = "."):
              self.root = Path(root)

          def scan(self) -> Iterator[Path]:
              for item in self.root.rglob("*"):
                  if not any(p in item.parts for p in SKIP_PATTERNS):
                      yield item

          def count_files(self) -> int:
              return sum(1 for _ in self.scan() if _.is_file())
