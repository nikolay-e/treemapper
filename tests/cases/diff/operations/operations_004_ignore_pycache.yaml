    from typing import Union

    Number = Union[int, float]

    UNIT_CONVERSIONS = {
        "km_to_miles": 0.621371,
        "kg_to_lbs": 2.20462,
        "celsius_to_fahrenheit_offset": 32,
    }

    def km_to_miles(km: Number) -> float:
        return km * UNIT_CONVERSIONS["km_to_miles"]

    def celsius_to_fahrenheit(celsius: Number) -> float:
        return celsius * 9 / 5 + UNIT_CONVERSIONS["celsius_to_fahrenheit_offset"]

    class UnitConverter:
        def __init__(self, precision: int = 2):
            self.precision = precision

        def convert(self, value: Number, factor: float) -> float:
            return round(value * factor, self.precision)
  utils/formatter.py: |
    from typing import Union

    Number = Union[int, float]

    DECIMAL_SEPARATOR = "."
    THOUSANDS_SEPARATOR = ","

    class NumberFormatter:
        def __init__(self, decimal_places: int = 2):
            self.decimal_places = decimal_places

        def format_currency(self, amount: Number, symbol: str = "$") -> str:
            formatted = f"{amount:,.{self.decimal_places}f}"
            return f"{symbol}{formatted}"

        def format_percentage(self, value: Number) -> str:
            return f"{value:.{self.decimal_places}f}%"
