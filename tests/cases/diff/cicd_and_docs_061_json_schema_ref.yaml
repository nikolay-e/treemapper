name: cicd_and_docs_061_json_schema_ref
repo:
  initial_files:
    schemas/user.json: |
      {
        "$schema": "http://json-schema.org/draft-07/schema#",
        "type": "object",
        "properties": {
          "id": {"type": "integer"},
          "name": {"type": "string"}
        }
      }
    schemas/order.json: |
      {
        "$schema": "http://json-schema.org/draft-07/schema#",
        "type": "object",
        "properties": {
          "id": {"type": "integer"},
          "user": {"$ref": "user.json"}
        }
      }
    src/validators/schema_validator.py: |
      import json
      from jsonschema import validate, RefResolver

      def load_schema(schema_path: str) -> dict:
          with open(schema_path) as f:
              return json.load(f)

      def validate_data(data: dict, schema_name: str) -> bool:
          schema = load_schema(f"schemas/{schema_name}")
          resolver = RefResolver(f"file://schemas/", schema)
          validate(data, schema, resolver=resolver)
          return True
    schemas/product.json: |
      {
        "$schema": "http://json-schema.org/draft-07/schema#",
        "$id": "https://example.com/schemas/product.json",
        "type": "object",
        "properties": {
          "sku": {"type": "string"},
          "name": {"type": "string"},
          "price": {"type": "number", "minimum": 0}
        }
      }
    src/api/routes.py: |
      from flask import Flask, request, jsonify

      app = Flask(__name__)

      @app.route("/api/users", methods=["GET"])
      def list_users():
          return jsonify({"users": []})

      @app.route("/api/users/<int:user_id>", methods=["GET"])
      def get_user(user_id):
          return jsonify({"id": user_id, "name": "placeholder"})
  changed_files:
    schemas/user.json: |
      {
        "$schema": "http://json-schema.org/draft-07/schema#",
        "$id": "https://example.com/schemas/user.json",
        "type": "object",
        "required": ["id", "name", "email"],
        "properties": {
          "id": {"type": "integer"},
          "name": {"type": "string", "minLength": 1, "maxLength": 100},
          "email": {"type": "string", "format": "email"},
          "address": {"$ref": "address.json"},
          "preferences": {"$ref": "preferences.json"}
        },
        "additionalProperties": false
      }
    schemas/address.json: |
      {
        "$schema": "http://json-schema.org/draft-07/schema#",
        "$id": "https://example.com/schemas/address.json",
        "type": "object",
        "properties": {
          "street": {"type": "string"},
          "city": {"type": "string"},
          "country": {"type": "string"},
          "postal_code": {"type": "string"}
        }
      }
  commit_message: "Harden user schema with refs to address and preferences"
fragments:
- id: user_schema
  selector:
    path: schemas/user.json
- id: address_schema
  selector:
    path: schemas/address.json
- id: address_ref_in_user
  selector:
    anchor: '"address": {"$ref": "address.json"}'
- id: order_refs_user
  selector:
    path: schemas/order.json
    anchor: '"user": {"$ref": "user.json"}'
- id: schema_validator
  selector:
    path: src/validators/schema_validator.py
    anchor: def validate_data
- id: no_product_schema
  selector:
    path: schemas/product.json
    anchor: '"sku": {"type": "string"}'
- id: no_api_routes
  selector:
    path: src/api/routes.py
    anchor: def list_users
oracle:
  required:
  - user_schema
  - address_schema
  - address_ref_in_user
  - order_refs_user
  - schema_validator
  allowed: []
  forbidden:
  - no_product_schema
  - no_api_routes
