repo:
  initial_files:
    src/physics/aabb.rs: |
      #[derive(Debug, Clone)]
      pub struct AABB {
          pub min_x: f32,
          pub min_y: f32,
          pub max_x: f32,
          pub max_y: f32,
      }

      impl AABB {
          pub fn new(min_x: f32, min_y: f32, max_x: f32, max_y: f32) -> Self {
              Self { min_x, min_y, max_x, max_y }
          }

          pub fn intersects(&self, other: &AABB) -> bool {
              self.min_x <= other.max_x && self.max_x >= other.min_x
                  && self.min_y <= other.max_y && self.max_y >= other.min_y
          }
      }
    src/physics/detector.rs: |
      use crate::physics::aabb::AABB;

      pub struct CollisionDetector;

      impl CollisionDetector {
          pub fn check_pair(a: &AABB, b: &AABB) -> bool {
              a.intersects(b)
          }

          pub fn find_collisions(objects: &[AABB]) -> Vec<(usize, usize)> {
              let mut pairs = Vec::new();
              for i in 0..objects.len() {
                  for j in (i + 1)..objects.len() {
                      if objects[i].intersects(&objects[j]) {
                          pairs.push((i, j));
                      }
                  }
              }
              pairs
          }
      }
    src/physics/resolver.rs: |
      use crate::physics::detector::CollisionDetector;
      use crate::physics::aabb::AABB;

      pub struct CollisionResolver {
          restitution: f32,
      }

      impl CollisionResolver {
          pub fn new(restitution: f32) -> Self {
              Self { restitution }
          }

          pub fn resolve(&self, objects: &mut [AABB]) {
              let pairs = CollisionDetector::find_collisions(objects);
              for (i, j) in pairs {
                  let overlap_x = objects[i].max_x.min(objects[j].max_x)
                      - objects[i].min_x.max(objects[j].min_x);
                  objects[i].max_x -= overlap_x * 0.5 * self.restitution;
                  objects[j].min_x += overlap_x * 0.5 * self.restitution;
              }
          }
      }
    src/simulation/world.rs: |
      use crate::physics::resolver::CollisionResolver;
      use crate::physics::aabb::AABB;

      pub struct PhysicsWorld {
          resolver: CollisionResolver,
          bodies: Vec<AABB>,
      }

      impl PhysicsWorld {
          pub fn new(resolver: CollisionResolver) -> Self {
              Self { resolver, bodies: Vec::new() }
          }

          pub fn add_body(&mut self, body: AABB) {
              self.bodies.push(body);
          }

          pub fn step(&mut self) {
              self.resolver.resolve(&mut self.bodies);
          }
      }
    src/physics/raycast.rs: |
      GARBAGE_044_RAY_MARKER_A = "raycaster";
      GARBAGE_044_ORIGIN_MARKER_B = "0,0";

      pub struct Ray {
