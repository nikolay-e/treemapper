repo:
  initial_files:
    models.py: |
      from dataclasses import dataclass, field
      from typing import Optional, List
      from datetime import datetime
      from enum import Enum

      class OrderStatus(Enum):
          PENDING = "pending"
          PROCESSING = "processing"
          SHIPPED = "shipped"
          DELIVERED = "delivered"
          CANCELLED = "cancelled"

      @dataclass
      class Address:
          street: str
          city: str
          country: str
          postal_code: str

          def format_full(self) -> str:
              return f"{self.street}, {self.city}, {self.postal_code}, {self.country}"

      @dataclass
      class OrderItem:
          product_id: int
          quantity: int
          unit_price: float

          def subtotal(self) -> float:
              return self.quantity * self.unit_price

      @dataclass
      class Order:
          id: int
          customer_id: int
          total: float
          status: OrderStatus = OrderStatus.PENDING
          items: List[OrderItem] = field(default_factory=list)
          shipping_address: Optional[Address] = None
          created_at: datetime = field(default_factory=datetime.now)

          def calculate_total(self) -> float:
              return sum(item.subtotal() for item in self.items)

          def can_cancel(self) -> bool:
              return self.status in (OrderStatus.PENDING, OrderStatus.PROCESSING)

          def mark_shipped(self) -> None:
              if self.status != OrderStatus.PROCESSING:
                  raise ValueError("Order must be processing to ship")
              self.status = OrderStatus.SHIPPED
    services.py: |
      from models import Order, OrderStatus, OrderItem, Address

      class OrderService:
          def __init__(self, repository):
              self.repository = repository

          def create_order(self, customer_id: int, total: float) -> Order:
              order = Order(id=self._generate_id(), customer_id=customer_id, total=total)
              self.repository.save(order)
              return order

          def process_order(self, order: Order) -> str:
              if order.status != OrderStatus.PENDING:
                  raise ValueError("Cannot process non-pending order")
              order.status = OrderStatus.PROCESSING
              self.repository.save(order)
              return f"Processing order {order.id}"

          def add_item(self, order: Order, product_id: int, quantity: int, price: float) -> None:
              item = OrderItem(product_id=product_id, quantity=quantity, unit_price=price)
              order.items.append(item)
              order.total = order.calculate_total()
              self.repository.save(order)

          def set_shipping_address(self, order: Order, address: Address) -> None:
              order.shipping_address = address
              self.repository.save(order)

          def _generate_id(self) -> int:
              return self.repository.next_id()
    warehouse.py: |
      from dataclasses import dataclass, field
      from typing import List
      from enum import Enum

      class ShipmentPriority(Enum):
          LOW = "low"
          NORMAL = "normal"
          HIGH = "high"
          URGENT = "urgent"

      @dataclass
      class WarehouseItem:
          sku: str
          quantity: int
          priority: int = 0

          def is_high_priority(self) -> bool:
              return self.priority >= 3

      class WarehouseService:
          def __init__(self):
              self.items: List[WarehouseItem] = []

          def allocate_stock(self, sku: str, quantity: int) -> bool:
              return True

          def get_priority_items(self) -> List[WarehouseItem]:
              return [i for i in self.items if i.is_high_priority()]
