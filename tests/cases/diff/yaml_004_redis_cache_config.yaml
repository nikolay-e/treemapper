name: yaml_004_redis_cache_config
repo:
  initial_files:
    config/cache.yaml: |
      redis:
        host: localhost
        port: 6379
        db: 0
    src/cache.py: |
      import redis

      def get_redis_client():
          return redis.Redis(host="localhost", port=6379, db=0)
    config/session.yaml: |
      session:
        backend: redis
        ttl: 3600
        prefix: "sess:"
        secure: true
        http_only: true
    src/pubsub.py: |
      import redis

      class PubSubManager:
          def __init__(self, redis_url: str = "redis://localhost:6379"):
              self.client = redis.from_url(redis_url)
              self.pubsub = self.client.pubsub()

          def subscribe(self, channel: str, callback):
              self.pubsub.subscribe(**{channel: callback})

          def publish(self, channel: str, message: str):
              self.client.publish(channel, message)

          def listen(self):
              for message in self.pubsub.listen():
                  if message["type"] == "message":
                      yield message["data"]
  changed_files:
    config/cache.yaml: |
      redis:
        host: redis.cluster.local
        port: 6379
        db: 1
        password: secret
    src/cache.py: |
      import redis

      def get_redis_client():
          return redis.Redis(host="localhost", port=6379, db=0)
    config/session.yaml: |
      session:
        backend: redis
        ttl: 3600
        prefix: "sess:"
        secure: true
        http_only: true
    src/pubsub.py: |
      import redis

      class PubSubManager:
          def __init__(self, redis_url: str = "redis://localhost:6379"):
              self.client = redis.from_url(redis_url)
              self.pubsub = self.client.pubsub()

          def subscribe(self, channel: str, callback):
              self.pubsub.subscribe(**{channel: callback})

          def publish(self, channel: str, message: str):
              self.client.publish(channel, message)

          def listen(self):
              for message in self.pubsub.listen():
                  if message["type"] == "message":
                      yield message["data"]
  commit_message: Update files
