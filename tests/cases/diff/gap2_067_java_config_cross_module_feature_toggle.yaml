name: gap2_067_java_config_cross_module_feature_toggle
tags:
- change:config
- change:single_file
- context:cross_module
- difficulty:hard
- distance:2hop
- lang:java
repo:
  initial_files:
    src/main/resources/features.json: |
      {
        "darkMode": true,
        "betaSearch": false,
        "newCheckout": false
      }
    src/main/java/toggle/FeatureToggleService.java: |
      package toggle;

      import java.util.Map;

      public class FeatureToggleService {
          private final Map<String, Boolean> flags;

          public FeatureToggleService(Map<String, Boolean> flags) {
              this.flags = flags;
          }

          public boolean isEnabled(String feature) {
              return flags.getOrDefault(feature, false);
          }
      }
    src/main/java/web/SearchController.java: |
      package web;

      import toggle.FeatureToggleService;

      public class SearchController {
          private final FeatureToggleService toggles;

          public SearchController(FeatureToggleService toggles) {
              this.toggles = toggles;
          }

          public String search(String query) {
              if (toggles.isEnabled("betaSearch")) {
                  return "beta:" + query;
              }
              return "legacy:" + query;
          }
      }
    src/main/java/billing/InvoiceGenerator.java: |
