repo:
  initial_files:
    lib/query_builder.rb: |
      class QueryBuilder
        def initialize(table)
          @table = table
          @conditions = []
          @order = nil
          @limit_val = nil
        end

        def where(condition)
          @conditions << condition
          self
        end

        def order_by(column, direction = 'ASC')
          @order = "#{column} #{direction}"
          self
        end

        def limit(n)
          @limit_val = n
          self
        end

        def to_sql
          sql = "SELECT * FROM #{@table}"
          sql += " WHERE #{@conditions.join(' AND ')}" unless @conditions.empty?
          sql += " ORDER BY #{@order}" if @order
          sql += " LIMIT #{@limit_val}" if @limit_val
          sql
        end
      end
    spec/query_builder_spec.rb: |
      require_relative '../lib/query_builder'

      RSpec.describe QueryBuilder do
        describe '#to_sql' do
          it 'builds simple select' do
            sql = described_class.new('users').to_sql
            expect(sql).to eq('SELECT * FROM users')
          end

          it 'builds select with where' do
            sql = described_class.new('users').where('age > 18').to_sql
            expect(sql).to include('WHERE age > 18')
          end

          it 'builds select with order' do
            sql = described_class.new('users').order_by('name').to_sql
            expect(sql).to include('ORDER BY name ASC')
          end

          it 'builds select with limit' do
            sql = described_class.new('users').limit(10).to_sql
            expect(sql).to include('LIMIT 10')
          end

          it 'chains all clauses' do
            sql = described_class.new('users')
              .where('active = true')
              .order_by('created_at', 'DESC')
              .limit(5)
              .to_sql
            expect(sql).to include('WHERE')
            expect(sql).to include('ORDER BY')
            expect(sql).to include('LIMIT')
          end
        end
      end
    lib/connection_pool.rb: |
      class ConnectionPool
        def initialize(size: 5)
          @size = size
          @connections = []
        end

        def checkout
          @connections.pop || create_connection
        end

        def checkin(conn)
          @connections.push(conn)
        end

        private

        def create_connection
          Object.new
        end
      end
