  changed_files:
    lib/query_builder.rb: |
      class QueryBuilder
        def initialize(table)
          @table = table
          @select_cols = ['*']
          @conditions = []
          @joins = []
          @group_col = nil
          @having_cond = nil
          @order = nil
          @limit_val = nil
          @offset_val = nil
        end

        def select(*columns)
          @select_cols = columns.map(&:to_s)
          self
        end

        def where(condition)
          @conditions << condition
          self
        end

        def join(table, on_clause)
          @joins << "JOIN #{table} ON #{on_clause}"
          self
        end

        def group_by(column)
          @group_col = column
          self
        end

        def having(condition)
          @having_cond = condition
          self
        end

        def order_by(column, direction = 'ASC')
          @order = "#{column} #{direction}"
          self
        end

        def limit(n)
          @limit_val = n
          self
        end

        def offset(n)
          @offset_val = n
          self
        end

        def to_sql
          parts = ["SELECT #{@select_cols.join(', ')} FROM #{@table}"]
          @joins.each { |j| parts << j }
          parts << "WHERE #{@conditions.join(' AND ')}" unless @conditions.empty?
          parts << "GROUP BY #{@group_col}" if @group_col
          parts << "HAVING #{@having_cond}" if @having_cond
          parts << "ORDER BY #{@order}" if @order
          parts << "LIMIT #{@limit_val}" if @limit_val
          parts << "OFFSET #{@offset_val}" if @offset_val
          parts.join(' ')
        end
      end
  commit_message: "refactor: add select, join, group_by, having, offset to QueryBuilder"
