  changed_files:
    src/ORM/QueryBuilder.php: |
      <?php
      namespace App\ORM;

      class QueryBuilder
      {
          private string $table;
          private array $conditions = [];
          private ?int $limit = null;
          private ?int $offset = null;
          private ?string $orderBy = null;

          public function from(string $table): self
          {
              $this->table = $table;
              return $this;
          }

          public function where(string $column, mixed $value, string $operator = '='): self
          {
              $this->conditions[] = [$column, $operator, $value];
              return $this;
          }

          public function limit(int $limit): self
          {
              $this->limit = $limit;
              return $this;
          }

          public function offset(int $offset): self
          {
              $this->offset = $offset;
              return $this;
          }

          public function orderBy(string $column, string $direction = 'ASC'): self
          {
              $this->orderBy = "{$column} {$direction}";
              return $this;
          }

          public function toSql(): string
          {
              $sql = "SELECT * FROM {$this->table}";
              if (!empty($this->conditions)) {
                  $parts = [];
                  foreach ($this->conditions as [$col, $op, $val]) {
                      $parts[] = "{$col} {$op} '{$val}'";
                  }
                  $sql .= ' WHERE ' . implode(' AND ', $parts);
              }
              if ($this->orderBy !== null) {
                  $sql .= " ORDER BY {$this->orderBy}";
              }
              if ($this->limit !== null) {
                  $sql .= " LIMIT {$this->limit}";
              }
              if ($this->offset !== null) {
                  $sql .= " OFFSET {$this->offset}";
              }
              return $sql;
          }
      }
    src/ORM/EntityMapper.php: |
      <?php
      namespace App\ORM;

      class EntityMapper
      {
          private QueryBuilder $builder;

          public function __construct(QueryBuilder $builder)
          {
              $this->builder = $builder;
          }

          public function find(string $table, int $id): string
          {
              return $this->builder->from($table)->where('id', $id)->toSql();
          }

          public function findAll(string $table, int $limit = 100): string
          {
              return $this->builder->from($table)->limit($limit)->toSql();
          }
      }
  commit_message: "Add pagination, ordering, and operator support to QueryBuilder"
