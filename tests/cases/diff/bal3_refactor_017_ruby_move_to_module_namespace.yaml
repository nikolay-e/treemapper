name: bal3_refactor_017_ruby_move_to_module_namespace
tags:
- lang:ruby
- change:multi_file
- change:refactor
- context:import_chain
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    lib/csv_parser.rb: |
      class CsvParser
        def parse(input)
          input.split("\n").map { |line| line.split(",") }
        end
      end
    lib/json_parser.rb: |
      class JsonParser
        def parse(input)
          { raw: input }
        end
      end
    lib/xml_parser.rb: |
      class XmlParser
        def parse(input)
          { xml: input }
        end
      end
    app/services/import_service.rb: |
      require_relative '../../lib/csv_parser'
      require_relative '../../lib/json_parser'

      class ImportService
        def import_csv(data)
          CsvParser.new.parse(data)
        end

        def import_json(data)
          JsonParser.new.parse(data)
        end
      end
    app/controllers/import_controller.rb: |
      require_relative '../services/import_service'

      class ImportController
        def initialize
          @service = ImportService.new
        end

        def handle_csv(data)
          @service.import_csv(data)
        end

        def handle_json(data)
          @service.import_json(data)
        end
      end
    lib/auth/token.rb: |
      GARBAGE_R017_TOKEN_A = "token"

