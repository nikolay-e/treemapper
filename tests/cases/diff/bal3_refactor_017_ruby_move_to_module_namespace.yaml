        end
      end
    lib/auth/password.rb: |
      GARBAGE_R017_PASSWORD_C = "password"

      class PasswordHasher
        def hash(pwd)
          pwd
        end
      end
  changed_files:
    lib/parsers/csv.rb: |
      module Parsers
        class Csv
          def parse(input)
            input.split("\n").map { |line| line.split(",") }
          end
        end
      end
    lib/parsers/json.rb: |
      module Parsers
        class Json
          def parse(input)
            { raw: input }
          end
        end
      end
    lib/parsers/xml.rb: |
      module Parsers
        class Xml
          def parse(input)
            { xml: input }
          end
        end
      end
    app/services/import_service.rb: |
      require_relative '../../lib/parsers/csv'
      require_relative '../../lib/parsers/json'

      class ImportService
        def import_csv(data)
          Parsers::Csv.new.parse(data)
        end

        def import_json(data)
          Parsers::Json.new.parse(data)
        end
