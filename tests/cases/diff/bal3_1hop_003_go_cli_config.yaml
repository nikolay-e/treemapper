  changed_files:
    src/billing/invoicer.py: |
      from decimal import Decimal

      def compute_line_total(quantity: int, unit_price: Decimal) -> Decimal:
          return Decimal(quantity) * unit_price

      def compute_subtotal(lines: list[dict]) -> Decimal:
          return sum(compute_line_total(l["quantity"], Decimal(str(l["unit_price"]))) for l in lines)

      def compute_discount(subtotal: Decimal, discount_rate: Decimal) -> Decimal:
          return (subtotal * discount_rate).quantize(Decimal("0.01"))
    src/billing/tax.py: |
      from decimal import Decimal
      from src.billing.invoicer import compute_subtotal, compute_discount

      def compute_tax(lines: list[dict], tax_rate: Decimal) -> Decimal:
          subtotal = compute_subtotal(lines)
          return (subtotal * tax_rate).quantize(Decimal("0.01"))

      def compute_total_with_tax(
          lines: list[dict],
          tax_rate: Decimal,
          discount_rate: Decimal = Decimal("0"),
      ) -> Decimal:
          subtotal = compute_subtotal(lines)
          discount = compute_discount(subtotal, discount_rate)
          tax = compute_tax(lines, tax_rate)
          return subtotal - discount + tax
    src/billing/formatter.py: |
      from decimal import Decimal
      from src.billing.tax import compute_total_with_tax

      def format_invoice(
          lines: list[dict],
          tax_rate: Decimal,
          discount_rate: Decimal = Decimal("0"),
      ) -> str:
          total = compute_total_with_tax(lines, tax_rate, discount_rate)
          return f"Total due: {total}"
    garbage/auth.py: |
      GARBAGE_BAL31HOP003_A = "auth_marker"

      def noop():
          pass
    garbage/logger.py: |
      GARBAGE_BAL31HOP003_B = "log_marker"

      def noop():
          pass
    garbage/notify.py: |
      GARBAGE_BAL31HOP003_C = "notify_marker"

      def noop():
          pass
  commit_message: "feat: add discount computation to billing pipeline"
