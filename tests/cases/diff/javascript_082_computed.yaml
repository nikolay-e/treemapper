name: javascript_082_computed
repo:
  initial_files:
    utils.ts: |
      export function formatName(first: string, last: string): string {
          return `${first} ${last}`;
      }

      export function formatInitials(first: string, last: string): string {
          return `${first[0]}${last[0]}`.toUpperCase();
      }
    Profile.vue: |
      <template><div>initial</div></template>
    ProfileCard.vue: |
      <script setup lang="ts">
      import Profile from './Profile.vue';

      const user = { first: 'John', last: 'Doe' };
      </script>

      <template>
          <div class="profile-card">
              <Profile />
          </div>
      </template>
    name-validator.ts: |
      export function validateName(name: string): { valid: boolean; error?: string } {
          if (name.length < 1) return { valid: false, error: 'Name required' };
          if (name.length > 50) return { valid: false, error: 'Name too long' };
          if (!/^[a-zA-Z\s'-]+$/.test(name)) return { valid: false, error: 'Invalid characters' };
          return { valid: true };
      }

      export function sanitizeName(name: string): string {
          return name.trim().replace(/\s+/g, ' ');
      }
    ProfileAvatar.vue: |
      <script setup lang="ts">
      import { ref, computed } from 'vue';
      import { formatInitials } from './utils';

      const firstName = ref('Jane');
      const lastName = ref('Smith');

      const initials = computed(() => formatInitials(firstName.value, lastName.value));
      </script>

      <template>
          <div class="avatar">{{ initials }}</div>
      </template>
  changed_files:
