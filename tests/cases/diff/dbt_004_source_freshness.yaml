name: dbt_004_source_freshness
tags:
- lang:sql
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    models/sources.yml: |
      version: 2

      sources:
        - name: raw
          database: production_db
          schema: raw_data
          tables:
            - name: orders
              loaded_at_field: _loaded_at
              freshness:
                warn_after: {count: 12, period: hour}
                error_after: {count: 24, period: hour}
            - name: customers
              loaded_at_field: _loaded_at
              freshness:
                warn_after: {count: 24, period: hour}
                error_after: {count: 48, period: hour}
            - name: events
              description: Raw event stream from application
            - name: users
              loaded_at_field: _loaded_at

        - name: analytics
          database: analytics_db
          schema: tracking
          tables:
            - name: pageviews
            - name: sessions
    models/staging/stg_events.sql: |
      SELECT
          id AS event_id,
          user_id,
          event_type,
          event_data,
          created_at AS event_timestamp
      FROM {{ source('raw', 'events') }}
      WHERE event_type IS NOT NULL
    models/staging/stg_orders.sql: |
      SELECT
          id AS order_id,
          customer_id,
          amount,
          order_date,
          status
      FROM {{ source('raw', 'orders') }}
    models/staging/stg_users.sql: |
      -- GARBAGE_DBT_004_A: noise_stg_users
      SELECT
          id AS user_id,
          name AS user_name,
          email,
          signup_date
      FROM {{ source('raw', 'users') }}
    models/staging/stg_pageviews.sql: |
      -- GARBAGE_DBT_004_B: noise_stg_pageviews
      SELECT
          id AS pageview_id,
          session_id,
          user_id,
          page_url,
          viewed_at
      FROM {{ source('analytics', 'pageviews') }}
    models/marts/event_funnel.sql: |
      -- GARBAGE_DBT_004_C: noise_event_funnel
      WITH events AS (
          SELECT * FROM {{ ref('stg_events') }}
      )

      SELECT
          event_type,
          DATE_TRUNC('day', event_timestamp) AS event_day,
          COUNT(*) AS event_count,
          COUNT(DISTINCT user_id) AS unique_users
      FROM events
      GROUP BY 1, 2
    models/analytics_sources.yml: |
      version: 2

      sources:
        - name: analytics
          GARBAGE_DBT_004_D: noise_analytics_sources
          database: analytics_db
          schema: tracking
          tables:
            - name: pageviews
              loaded_at_field: _ingested_at
            - name: sessions
              loaded_at_field: _ingested_at
  changed_files:
    models/sources.yml: |
      version: 2

      sources:
        - name: raw
          database: production_db
          schema: raw_data
          tables:
            - name: orders
              loaded_at_field: _loaded_at
              freshness:
                warn_after: {count: 12, period: hour}
                error_after: {count: 24, period: hour}
            - name: customers
              loaded_at_field: _loaded_at
              freshness:
                warn_after: {count: 24, period: hour}
                error_after: {count: 48, period: hour}
            - name: events
              description: Raw event stream from application
              loaded_at_field: _ingested_at
              freshness:
                warn_after: {count: 12, period: hour}
                error_after: {count: 24, period: hour}
              columns:
                - name: id
                  tests:
                    - not_null
                - name: event_type
                  tests:
                    - not_null
            - name: users
              loaded_at_field: _loaded_at

        - name: analytics
          database: analytics_db
          schema: tracking
          tables:
            - name: pageviews
            - name: sessions
    models/staging/stg_events.sql: |
      SELECT
          id AS event_id,
          user_id,
          event_type,
          event_data,
          created_at AS event_timestamp
      FROM {{ source('raw', 'events') }}
      WHERE event_type IS NOT NULL
    models/staging/stg_orders.sql: |
      SELECT
          id AS order_id,
          customer_id,
          amount,
          order_date,
          status
      FROM {{ source('raw', 'orders') }}
    models/staging/stg_users.sql: |
      -- GARBAGE_DBT_004_A: noise_stg_users
      SELECT
          id AS user_id,
          name AS user_name,
          email,
          signup_date
      FROM {{ source('raw', 'users') }}
    models/staging/stg_pageviews.sql: |
      -- GARBAGE_DBT_004_B: noise_stg_pageviews
      SELECT
          id AS pageview_id,
          session_id,
          user_id,
          page_url,
          viewed_at
      FROM {{ source('analytics', 'pageviews') }}
    models/marts/event_funnel.sql: |
      -- GARBAGE_DBT_004_C: noise_event_funnel
      WITH events AS (
          SELECT * FROM {{ ref('stg_events') }}
      )

      SELECT
          event_type,
          DATE_TRUNC('day', event_timestamp) AS event_day,
          COUNT(*) AS event_count,
          COUNT(DISTINCT user_id) AS unique_users
      FROM events
      GROUP BY 1, 2
    models/analytics_sources.yml: |
      version: 2

      sources:
        - name: analytics
          GARBAGE_DBT_004_D: noise_analytics_sources
          database: analytics_db
          schema: tracking
          tables:
            - name: pageviews
              loaded_at_field: _ingested_at
            - name: sessions
              loaded_at_field: _ingested_at
  commit_message: Update files
