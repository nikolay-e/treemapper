repo:
  initial_files:
    src/RGB.jl: |
      module RGB

      export RGBColor, to_hex, blend

      struct RGBColor
          r::UInt8
          g::UInt8
          b::UInt8
      end

      function to_hex(c::RGBColor)::String
          return "#" * string(c.r, base=16, pad=2) *
                 string(c.g, base=16, pad=2) *
                 string(c.b, base=16, pad=2)
      end

      function blend(a::RGBColor, b::RGBColor, t::Float64)::RGBColor
          r = round(UInt8, a.r * (1 - t) + b.r * t)
          g = round(UInt8, a.g * (1 - t) + b.g * t)
          bl = round(UInt8, a.b * (1 - t) + b.b * t)
          return RGBColor(r, g, bl)
      end

      end
    src/HSL.jl: |
      module HSL

      export HSLColor, rotate_hue

      struct HSLColor
          h::Float64
          s::Float64
          l::Float64
      end

      function rotate_hue(c::HSLColor, degrees::Float64)::HSLColor
          new_h = mod(c.h + degrees, 360.0)
          return HSLColor(new_h, c.s, c.l)
      end

      function saturate(c::HSLColor, amount::Float64)::HSLColor
          new_s = clamp(c.s + amount, 0.0, 1.0)
          return HSLColor(c.h, new_s, c.l)
      end

      end
    src/Palette.jl: |
      module Palette

      GARBAGE_GAP2_052_SCHEME_A = "complementary"
      GARBAGE_GAP2_052_COUNT_B = 5

      function generate_palette(base_hue::Float64, count::Int)::Vector{Float64}
          step = 360.0 / count
          return [mod(base_hue + i * step, 360.0) for i in 0:count-1]
      end

      function warm_palette()::Vector{Float64}
          return [0.0, 30.0, 45.0, 60.0]
      end

      end
    src/Gradient.jl: |
      module Gradient

      GARBAGE_GAP2_052_STOPS_C = 10
      GARBAGE_GAP2_052_MODE_D = "linear"

      function linear_gradient(steps::Int)::Vector{Float64}
          return [i / (steps - 1) for i in 0:steps-1]
      end

      function ease_gradient(steps::Int)::Vector{Float64}
          return [sin(pi / 2 * i / (steps - 1)) for i in 0:steps-1]
      end

      end
  changed_files:
    src/RGB.jl: |
      module RGB

      export RGBColor, to_hex, blend, luminance

      struct RGBColor
          r::UInt8
          g::UInt8
          b::UInt8
      end

      function to_hex(c::RGBColor)::String
          return "#" * string(c.r, base=16, pad=2) *
                 string(c.g, base=16, pad=2) *
                 string(c.b, base=16, pad=2)
      end

      function blend(a::RGBColor, b::RGBColor, t::Float64)::RGBColor
          r = round(UInt8, a.r * (1 - t) + b.r * t)
          g = round(UInt8, a.g * (1 - t) + b.g * t)
          bl = round(UInt8, a.b * (1 - t) + b.b * t)
          return RGBColor(r, g, bl)
      end

      function luminance(c::RGBColor)::Float64
          return 0.2126 * (c.r / 255.0) + 0.7152 * (c.g / 255.0) + 0.0722 * (c.b / 255.0)
      end

      end
    src/HSL.jl: |
      module HSL

      export HSLColor, rotate_hue, lighten

      struct HSLColor
          h::Float64
          s::Float64
          l::Float64
      end

      function rotate_hue(c::HSLColor, degrees::Float64)::HSLColor
          new_h = mod(c.h + degrees, 360.0)
          return HSLColor(new_h, c.s, c.l)
      end

      function saturate(c::HSLColor, amount::Float64)::HSLColor
          new_s = clamp(c.s + amount, 0.0, 1.0)
          return HSLColor(c.h, new_s, c.l)
      end

      function lighten(c::HSLColor, amount::Float64)::HSLColor
          new_l = clamp(c.l + amount, 0.0, 1.0)
          return HSLColor(c.h, c.s, new_l)
      end

      end
