  changed_files:
    src/pathfinding.lua: |
      local M = {}

      function M.find_path(grid, start, goal)
          local open = {start}
          local came_from = {}
          local visited = {}

          while #open > 0 do
              local current = table.remove(open, 1)
              if current == goal then
                  return M.reconstruct(came_from, start, goal)
              end
              if not visited[current] then
                  visited[current] = true
                  for _, neighbor in ipairs(M.neighbors(grid, current)) do
                      if not visited[neighbor] then
                          table.insert(open, neighbor)
                          came_from[neighbor] = current
                      end
                  end
              end
          end
          return nil
      end

      function M.neighbors(grid, node)
          return {}
      end

      function M.reconstruct(came_from, start, goal)
          local path = {goal}
          local current = goal
          while current ~= start do
              current = came_from[current]
              if not current then return nil end
              table.insert(path, 1, current)
          end
          return path
      end

      return M
    garbage/GAP052_renderer.lua: |
