- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    cli/options.py: |
      class Option:
          def __init__(self, flag: str, description: str, required: bool = False):
              self.flag = flag
              self.description = description
              self.required = required
          def matches(self, arg: str) -> bool:
              return arg == self.flag
    cli/parser.py: |
      from cli.options import Option
      class ArgParser:
          def __init__(self):
              self.options: list[Option] = []
          def add_option(self, flag: str, desc: str, required: bool = False):
              self.options.append(Option(flag, desc, required))
          def parse(self, args: list[str]) -> dict:
              result = {}
              for i, arg in enumerate(args):
                  for opt in self.options:
                      if opt.matches(arg) and i + 1 < len(args):
                          result[opt.flag] = args[i + 1]
              return result
    cli/command.py: |
      from cli.parser import ArgParser
      class Command:
          def __init__(self, name: str):
              self.name = name
              self.parser = ArgParser()
          def execute(self, args: list[str]) -> str:
              parsed = self.parser.parse(args)
              return f"Executed {self.name} with {parsed}"
    cli/app.py: |
      from cli.command import Command
      class CLIApp:
          def __init__(self, name: str):
              self.name = name
              self.commands: dict[str, Command] = {}
          def register(self, cmd: Command):
              self.commands[cmd.name] = cmd
          def run(self, args: list[str]) -> str:
              if not args:
                  return "No command given"
              cmd_name = args[0]
              if cmd_name in self.commands:
                  return self.commands[cmd_name].execute(args[1:])
              return f"Unknown command: {cmd_name}"
    utils/color.py: |
      def red(text: str) -> str:
