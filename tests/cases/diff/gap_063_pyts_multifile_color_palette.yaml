      interface ColorSwatch {
        hex: string;
        label: string;
        isSelected: boolean;
      }

      function rgbToHex(r: number, g: number, b: number): string {
        const toHex = (c: number) => c.toString(16).padStart(2, "0");
        return `#${toHex(r)}${toHex(g)}${toHex(b)}`;
      }

      function selectionMarker(isSelected: boolean): string {
        return isSelected ? " *" : "";
      }

      function renderSwatch(swatch: ColorSwatch): string {
        return `[${swatch.hex}] ${swatch.label}${selectionMarker(swatch.isSelected)}`;
      }

      function renderPaletteGrid(swatches: ColorSwatch[]): string {
        return swatches.map(renderSwatch).join(" | ");
      }
