repo:
  initial_files:
    src/Shopping/CartCalculator.cs: |
      namespace Shopping;

      public class CartCalculator
      {
          public decimal CalculateTotal(IEnumerable<decimal> prices)
          {
              decimal total = 0;
              foreach (var price in prices)
                  total += price;
              return total;
          }

          public decimal ApplyDiscount(decimal total, decimal discountPercent)
          {
              return total - (total / discountPercent);
          }
      }
    tests/Shopping/CartCalculatorTests.cs: |
      using Xunit;
      using Shopping;

      public class CartCalculatorTests
      {
          private readonly CartCalculator _calc = new();

          [Fact]
          public void ApplyDiscount_TenPercent_ReturnsCorrectAmount()
          {
              var result = _calc.ApplyDiscount(100m, 10m);
              Assert.Equal(90m, result);
          }

          [Fact]
          public void CalculateTotal_EmptyList_ReturnsZero()
          {
              var result = _calc.CalculateTotal(new List<decimal>());
              Assert.Equal(0m, result);
          }
      }
