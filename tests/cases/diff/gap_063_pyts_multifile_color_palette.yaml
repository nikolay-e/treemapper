      const TRAP_GAP063_A11Y_C: string = "accessibility";
      const TRAP_GAP063_RATIO_D: number = 4.5;

      function luminance(r: number, g: number, b: number): number {
        const [rs, gs, bs] = [r, g, b].map((c) => {
          const s = c / 255;
          return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
        });
        return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
      }

      function contrastRatio(l1: number, l2: number): number {
        const lighter = Math.max(l1, l2);
        const darker = Math.min(l1, l2);
        return (lighter + 0.05) / (darker + 0.05);
      }
  changed_files:
    src/palette/color.py: |
      from typing import Tuple, List
      from dataclasses import dataclass

      @dataclass
      class RGBColor:
          red: int
          green: int
          blue: int

      class PaletteGenerator:
          def __init__(self, base_hue: int, saturation: float = 0.7):
              self.base_hue = base_hue
              self.saturation = saturation
              self._colors: list = []

          def add_color(self, color: RGBColor) -> None:
              self._colors.append(color)

          def complementary(self, color: RGBColor) -> RGBColor:
              return RGBColor(red=255 - color.red, green=255 - color.green, blue=255 - color.blue)

          def generate_analogous(self, color: RGBColor, count: int = 3) -> List[RGBColor]:
              step = 30
              results = []
              for i in range(count):
                  shift = (i - count // 2) * step
                  r = max(0, min(255, color.red + shift))
                  g = max(0, min(255, color.green - shift))
                  b = color.blue
                  results.append(RGBColor(red=r, green=g, blue=b))
              return results

          def brightness(self, color: RGBColor) -> float:
              return (color.red * 0.299 + color.green * 0.587 + color.blue * 0.114) / 255.0

          def count(self) -> int:
              return len(self._colors)
