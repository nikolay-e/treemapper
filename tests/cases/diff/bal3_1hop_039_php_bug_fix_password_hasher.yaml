repo:
  initial_files:
    src/Security/PasswordHasher.php: |
      <?php
      namespace App\Security;

      class PasswordHasher
      {
          public function hash(string $password): string
          {
              return md5($password);
          }

          public function verify(string $password, string $hash): bool
          {
              return md5($password) === $hash;
          }
      }
    src/Auth/LoginHandler.php: |
      <?php
      namespace App\Auth;

      use App\Security\PasswordHasher;

      class LoginHandler
      {
          private PasswordHasher $hasher;

          public function __construct(PasswordHasher $hasher)
          {
              $this->hasher = $hasher;
          }

          public function login(string $password, string $storedHash): bool
          {
              return $this->hasher->verify($password, $storedHash);
          }
      }
    src/Auth/PasswordResetHandler.php: |
      <?php
      namespace App\Auth;

      use App\Security\PasswordHasher;

      class PasswordResetHandler
      {
          private PasswordHasher $hasher;

          public function __construct(PasswordHasher $hasher)
          {
              $this->hasher = $hasher;
          }

          public function resetPassword(string $newPassword): string
          {
              return $this->hasher->hash($newPassword);
          }
      }
    src/Auth/AccountCreator.php: |
      <?php
      namespace App\Auth;

      use App\Security\PasswordHasher;

      class AccountCreator
      {
          private PasswordHasher $hasher;

          public function __construct(PasswordHasher $hasher)
          {
              $this->hasher = $hasher;
          }

          public function create(string $email, string $password): array
          {
              return [
                  'email' => $email,
                  'password_hash' => $this->hasher->hash($password),
              ];
          }
      }
    src/Auth/TwoFactorAuth.php: |
      <?php
      namespace App\Auth;

      use App\Security\PasswordHasher;

      class TwoFactorAuth
      {
          private PasswordHasher $hasher;

          public function __construct(PasswordHasher $hasher)
