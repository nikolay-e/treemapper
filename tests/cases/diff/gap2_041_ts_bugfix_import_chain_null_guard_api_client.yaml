      export interface ApiResponse<T> {
        data: T | null;
        status: number;
        message: string;
      }

      export interface UserProfile {
        id: string;
        displayName: string;
        email: string;
        avatarUrl: string | null;
      }
    src/api/client.ts: |
      import { ApiResponse, UserProfile } from "./types";

      function buildUrl(path: string): string {
        return `https://api.example.com${path}`;
      }

      function fetchUserProfile(userId: string): ApiResponse<UserProfile> {
        const url = buildUrl(`/users/${userId}`);
        return {
          data: { id: userId, displayName: "Test", email: "test@test.com", avatarUrl: null },
          status: 200,
          message: "ok",
        };
      }

      function formatProfileSummary(response: ApiResponse<UserProfile>): string {
        return `${response.data.displayName} (${response.data.email})`;
      }
