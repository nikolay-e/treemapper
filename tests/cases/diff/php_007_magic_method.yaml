      type IoTConfig struct{ DeviceID string }
    garbage/GameScore.go: |
      package garbage

      // GARBAGE_PHP007_C = "game_score_marker"

      type GameScore struct{ Points int }
  changed_files:
    pkg/payment/processor.go: |
      package payment

      type Charge struct {
          Amount   int64
          Currency string
          UserID   string
      }

      type Result struct {
          TransactionID string
          Success       bool
      }

      type Processor struct {
          gateway Gateway
      }

      func NewProcessor(g Gateway) *Processor {
          return &Processor{gateway: g}
      }

      func (p *Processor) Charge(c Charge) (Result, error) {
          return p.gateway.Submit(c.Amount, c.Currency, c.UserID)
      }

      func (p *Processor) Refund(transactionID string) error {
          return p.gateway.Refund(transactionID)
      }
    pkg/payment/gateway.go: |
      package payment

      type Gateway interface {
          Submit(amount int64, currency, userID string) (Result, error)
          Refund(transactionID string) error
      }
    internal/checkout/service.go: |
      package checkout

      import "pkg/payment"

      type CheckoutService struct {
          processor *payment.Processor
      }

      func NewCheckoutService(p *payment.Processor) *CheckoutService {
          return &CheckoutService{processor: p}
      }

      func (s *CheckoutService) PlaceOrder(userID string, amount int64) (payment.Result, error) {
          return s.processor.Charge(payment.Charge{
              Amount:   amount,
              Currency: "USD",
              UserID:   userID,
          })
      }

      func (s *CheckoutService) CancelOrder(transactionID string) error {
          return s.processor.Refund(transactionID)
      }
    internal/api/handler.go: |
      package api

      import "internal/checkout"

      type OrderHandler struct {
          checkout *checkout.CheckoutService
      }

      func NewOrderHandler(svc *checkout.CheckoutService) *OrderHandler {
          return &OrderHandler{checkout: svc}
      }

      func (h *OrderHandler) HandleOrder(userID string, amount int64) error {
          _, err := h.checkout.PlaceOrder(userID, amount)
          return err
      }

      func (h *OrderHandler) HandleCancellation(transactionID string) error {
          return h.checkout.CancelOrder(transactionID)
      }
    garbage/StreamLogger.go: |
      package garbage

      // GARBAGE_PHP007_A = "stream_logger_marker"

      type StreamLogger struct{ Level string }
    garbage/IoTConfig.go: |
      package garbage

      // GARBAGE_PHP007_B = "iot_config_marker"

      type IoTConfig struct{ DeviceID string }
    garbage/GameScore.go: |
      package garbage

      // GARBAGE_PHP007_C = "game_score_marker"

      type GameScore struct{ Points int }
  commit_message: "feat: add Refund function to payment processor with 2-hop integration"
