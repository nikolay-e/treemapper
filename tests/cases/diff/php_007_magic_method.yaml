name: php_007_magic_method
tags:
- lang:go
- change:new_function
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    pkg/payment/processor.go: |
      package payment

      type Charge struct {
          Amount   int64
          Currency string
          UserID   string
      }

      type Result struct {
          TransactionID string
          Success       bool
      }

      type Processor struct {
          gateway Gateway
      }

      func NewProcessor(g Gateway) *Processor {
          return &Processor{gateway: g}
      }

      func (p *Processor) Charge(c Charge) (Result, error) {
          return p.gateway.Submit(c.Amount, c.Currency, c.UserID)
      }
    pkg/payment/gateway.go: |
      package payment

      type Gateway interface {
          Submit(amount int64, currency, userID string) (Result, error)
      }
    internal/checkout/service.go: |
      package checkout

      import "pkg/payment"

      type CheckoutService struct {
          processor *payment.Processor
      }

      func NewCheckoutService(p *payment.Processor) *CheckoutService {
          return &CheckoutService{processor: p}
      }

      func (s *CheckoutService) PlaceOrder(userID string, amount int64) (payment.Result, error) {
          return s.processor.Charge(payment.Charge{
              Amount:   amount,
              Currency: "USD",
              UserID:   userID,
          })
      }
    internal/api/handler.go: |
      package api

      import "internal/checkout"

      type OrderHandler struct {
          checkout *checkout.CheckoutService
      }

      func NewOrderHandler(svc *checkout.CheckoutService) *OrderHandler {
          return &OrderHandler{checkout: svc}
      }

      func (h *OrderHandler) HandleOrder(userID string, amount int64) error {
          _, err := h.checkout.PlaceOrder(userID, amount)
          return err
      }
