    src/Controllers/ProfileController.php: |
      <?php
      namespace App\Controllers;

      use App\Core\DynamicObject;

      class ProfileController {
          public function show(): array {
              return ['page' => 'profile'];
          }

          public function updateProfile(array $data): DynamicObject {
              $profile = new DynamicObject();
              $profile->name = $data['name'] ?? 'Anonymous';
              $profile->email = $data['email'] ?? '';
              $profile->markReadOnly('email');

              if (isset($profile->name)) {
                  $profile->displayName = strtoupper($profile->name);
              }
              return $profile;
          }
      }
