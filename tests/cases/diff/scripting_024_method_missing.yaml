name: scripting_024_method_missing
tags:
- lang:ruby
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    dynamic_struct.rb: |
      class DynamicStruct
        def initialize(hash = {})
          @data = hash
        end

        def method_missing(name, *args)
          if name.to_s.end_with?('=')
            @data[name.to_s.chop.to_sym] = args.first
          else
            @data[name]
          end
        end

        def respond_to_missing?(name, include_private = false)
          true
        end

        def to_hash
          @data.dup
        end
      end
    app.rb: |
      puts 'Application starting'
    validated_struct.rb: |
      class ValidatedStruct
        def initialize(allowed_keys)
          @allowed_keys = allowed_keys
          @store = {}
        end

        def set(key, value)
          raise ArgumentError, "Unknown key: #{key}" unless @allowed_keys.include?(key)
          @store[key] = value
        end

        def get(key)
          @store[key]
        end

        def to_hash
          @store.dup
        end

        def valid_keys
          @allowed_keys.dup
        end
      end
    config_store.rb: |
      class ConfigStore
        def initialize(defaults = {})
          @entries = defaults.dup
        end

        def fetch(key, fallback = nil)
          @entries.fetch(key, fallback)
        end

        def update(key, value)
          @entries[key] = value
        end

        def keys
          @entries.keys
        end

        def merge(other)
          @entries.merge!(other)
        end
      end
    profile_builder.rb: |
      require_relative 'dynamic_struct'

      class ProfileBuilder
        def build(params)
          profile = DynamicStruct.new
          profile.name = params[:name]
          profile.email = params[:email]
          profile.role = params[:role] || 'user'
          profile
        end

        def build_admin(params)
          profile = build(params)
          profile.role = 'admin'
          profile.permissions = [:read, :write, :delete]
          profile
        end
      end
    open_struct_wrapper.rb: |
      require 'ostruct'

      class OpenStructWrapper
        def initialize(hash = {})
          @struct = OpenStruct.new(hash)
        end

        def method_missing(name, *args, &block)
          @struct.send(name, *args, &block)
        end

        def respond_to_missing?(name, include_private = false)
          @struct.respond_to?(name, include_private) || super
        end

        def freeze_fields
          @struct.freeze
        end
      end
    lib/hash_proxy.rb: |
      class HashProxy
        def initialize(hash)
          @hash = hash
        end

        def method_missing(name, *args)
          key = name.to_s
          if key.end_with?('=')
            @hash[key.chop] = args.first
          elsif @hash.key?(key)
            @hash[key]
          else
            super
          end
        end

        def respond_to_missing?(name, include_private = false)
          @hash.key?(name.to_s) || name.to_s.end_with?('=') || super
        end

        def inspect
          "#<HashProxy #{@hash.inspect}>"
        end
      end
  changed_files:
    dynamic_struct.rb: |
      class DynamicStruct
        def initialize(hash = {})
          @data = hash
        end

        def method_missing(name, *args)
          if name.to_s.end_with?('=')
            @data[name.to_s.chop.to_sym] = args.first
          else
            @data[name]
          end
        end

        def respond_to_missing?(name, include_private = false)
          true
        end

        def to_hash
          @data.dup
        end
      end
    app.rb: |
      require_relative 'dynamic_struct'

      obj = DynamicStruct.new(name: 'John')
      puts obj.name
      obj.email = 'john@example.com'
  commit_message: Update files
