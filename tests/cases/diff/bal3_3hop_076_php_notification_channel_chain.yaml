  changed_files:
    src/Channels/EmailChannel.php: |
      <?php
      namespace App\Channels;

      class EmailChannel {
          private int $maxRetries;
          public function __construct(int $maxRetries = 3) {
              $this->maxRetries = $maxRetries;
          }
          public function send(string $to, string $message): bool {
              return true;
          }
          public function sendWithRetry(string $to, string $message): bool {
              for ($i = 0; $i < $this->maxRetries; $i++) {
                  if ($this->send($to, $message)) {
                      return true;
                  }
              }
              return false;
          }
      }
    src/Notifications/NotificationSender.php: |
      <?php
      namespace App\Notifications;

      use App\Channels\EmailChannel;

      class NotificationSender {
          private EmailChannel $email;
          public function __construct(EmailChannel $email) {
              $this->email = $email;
          }
          public function notify(string $to, string $message): bool {
              return $this->email->send($to, $message);
          }
          public function notifyReliable(string $to, string $message): bool {
              return $this->email->sendWithRetry($to, $message);
          }
      }
    src/Services/AlertService.php: |
      <?php
      namespace App\Services;

      use App\Notifications\NotificationSender;

      class AlertService {
          private NotificationSender $sender;
          public function __construct(NotificationSender $sender) {
              $this->sender = $sender;
          }
          public function triggerAlert(string $userId, string $alertMessage): bool {
              return $this->sender->notify($userId, $alertMessage);
          }
          public function triggerCriticalAlert(string $userId, string $alertMessage): bool {
              return $this->sender->notifyReliable($userId, $alertMessage);
          }
      }
    src/Controllers/AlertController.php: |
      <?php
      namespace App\Controllers;

      use App\Services\AlertService;

      class AlertController {
          private AlertService $service;
          public function __construct(AlertService $service) {
              $this->service = $service;
          }
          public function fire(string $userId, string $message): array {
              $sent = $this->service->triggerAlert($userId, $message);
              return ['sent' => $sent];
          }
          public function fireCritical(string $userId, string $message): array {
              $sent = $this->service->triggerCriticalAlert($userId, $message);
              return ['sent' => $sent, 'priority' => 'critical'];
          }
      }
