    resolver/records.py: |
      from dataclasses import dataclass
      from enum import Enum

      class RecordType(Enum):
          A = "A"
          AAAA = "AAAA"
          CNAME = "CNAME"
          MX = "MX"
          TXT = "TXT"
          NS = "NS"

      @dataclass
      class DNSRecord:
          name: str
          record_type: RecordType
          value: str
          ttl: int = 300
          priority: int = 0

      class RecordStore:
          def __init__(self):
              self._records: dict[str, list[DNSRecord]] = {}

          def add(self, record: DNSRecord) -> None:
              key = f"{record.name}:{record.record_type.value}"
              if key not in self._records:
                  self._records[key] = []
              self._records[key].append(record)

          def lookup(self, name: str, record_type: RecordType) -> list[DNSRecord]:
              key = f"{name}:{record_type.value}"
              return self._records.get(key, [])

          def lookup_all(self, name: str) -> list[DNSRecord]:
              results = []
              for key, records in self._records.items():
                  if key.startswith(f"{name}:"):
                      results.extend(records)
              return results

          def remove(self, name: str, record_type: RecordType) -> int:
              key = f"{name}:{record_type.value}"
              removed = len(self._records.pop(key, []))
              return removed

          def count(self) -> int:
              return sum(len(v) for v in self._records.values())

          def names(self) -> list[str]:
              seen: set[str] = set()
              for key in self._records:
                  name = key.split(":")[0]
                  seen.add(name)
              return sorted(seen)

          def purge_expired(self, current_ttl: int) -> int:
              purged = 0
              for key in list(self._records.keys()):
                  before = len(self._records[key])
                  self._records[key] = [
                      r for r in self._records[key] if r.ttl > current_ttl
                  ]
                  purged += before - len(self._records[key])
              return purged
