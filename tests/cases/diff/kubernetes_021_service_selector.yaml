name: kubernetes_021_service_selector
tags:
- lang:yaml
- change:single_file
- change:config
- context:import_chain
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    k8s/apps/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-backend
        namespace: production
        labels:
          app: api-backend
          version: v2
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: api-backend
        template:
          metadata:
            labels:
              app: api-backend
              version: v2
              tier: backend
          spec:
            containers:
            - name: api
              image: api-backend:v2.0.0
              ports:
              - containerPort: 8080
                name: http
              - containerPort: 9090
                name: grpc
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
    k8s/apps/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: api-backend
        namespace: production
      spec:
        selector:
          app: old-api-backend
        ports:
        - name: http
          port: 80
          targetPort: 8080
        - name: grpc
          port: 9090
          targetPort: 9090
    k8s/istio/virtual-service.yaml: |
      apiVersion: networking.istio.io/v1beta1
      kind: VirtualService
      metadata:
        name: api-backend-vs
        namespace: production
      spec:
        hosts:
        - api-backend
        http:
        - route:
          - destination:
              host: api-backend
              subset: stable
            weight: 90
          - destination:
              host: api-backend
              subset: canary
            weight: 10
    k8s/apps/canary-deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-backend-canary
        namespace: production
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: api-backend
            track: canary
        template:
          metadata:
            labels:
              app: api-backend
              track: canary
              version: v3
          spec:
            containers:
            - name: api
              image: api-backend:v3.0.0-rc1
              ports:
              - containerPort: 8080
  changed_files:
