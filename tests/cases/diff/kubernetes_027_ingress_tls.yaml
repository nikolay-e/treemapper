name: kubernetes_027_ingress_tls
tags:
- lang:yaml
- change:single_file
- change:config
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    k8s/base/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: secure-api
        namespace: production
        labels:
          app: secure-api
          tier: backend
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: secure-api
        template:
          metadata:
            labels:
              app: secure-api
              tier: backend
          spec:
            containers:
            - name: api
              image: registry.example.com/secure-api:v2.1.0
              ports:
              - containerPort: 8080
                name: http
              env:
              - name: TLS_ENABLED
                value: "true"
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "500m"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
    k8s/base/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: secure-api
        namespace: production
      spec:
        selector:
          app: secure-api
        ports:
        - name: http
          port: 80
          targetPort: 8080
    k8s/base/certificate.yaml: |
      apiVersion: cert-manager.io/v1
      kind: Certificate
      metadata:
        name: api-tls
        namespace: production
      spec:
        secretName: tls-cert
        issuerRef:
          name: letsencrypt-prod
          kind: ClusterIssuer
        dnsNames:
        - api.example.com
        - api-backup.example.com
    k8s/base/ingress.yaml: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: api-ingress
        namespace: production
        annotations:
          kubernetes.io/ingress.class: nginx
          cert-manager.io/cluster-issuer: letsencrypt-prod
      spec:
        rules:
        - host: api.example.com
          http:
            paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: secure-api
                  port:
                    number: 80
    k8s/infra/sealed-secret.yaml: |
      apiVersion: bitnami.com/v1alpha1
      kind: SealedSecret
      metadata:
        name: db-credentials
        namespace: sealed-secrets
      spec:
        encryptedData:
          username: AgBz7K8mNpQrVwXyZ1234567890abcdefg
          password: AgCx9M2oRsTuWxYz0987654321hijklmn
        template:
          metadata:
            name: db-credentials
            namespace: production
    k8s/infra/oauth2-proxy.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: oauth2-proxy
        namespace: auth
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: oauth2-proxy
        template:
          spec:
            containers:
            - name: oauth2-proxy
              image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
              args:
              - --provider=oidc
              - --cookie-secure=true
              - --upstream=http://secure-api.production.svc:80
              ports:
              - containerPort: 4180
    k8s/infra/cert-manager-issuer.yaml: |
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: letsencrypt-prod
      spec:
        acme:
          email: admin@example.com
          server: https://acme-v02.api.letsencrypt.org/directory
          privateKeySecretRef:
            name: letsencrypt-prod-key
          solvers:
          - http01:
              ingress:
                class: nginx
    Makefile: "deploy:\n\tkubectl apply -f k8s/base/\n"
