    garbage/fraud.clj: |
      (ns garbage.fraud)

      (def ^:const GARBAGE_GAP2032_E "fraud_marker")

      (defn score [transaction]
        GARBAGE_GAP2032_E)
  changed_files:
    src/payments/ledger.clj: |
      (ns payments.ledger)

      (defprotocol Ledger
        (debit! [this account amount])
        (credit! [this account amount])
        (balance [this account])
        (history [this account]))

      (defrecord InMemoryLedger [entries log]
        Ledger
        (debit! [this account amount]
          (swap! entries update account (fnil - 0) amount)
          (swap! log conj {:type :debit :account account :amount amount})
          this)
        (credit! [this account amount]
          (swap! entries update account (fnil + 0) amount)
          (swap! log conj {:type :credit :account account :amount amount})
          this)
        (balance [this account]
          (get @entries account 0))
        (history [this account]
          (filter #(= account (:account %)) @log)))

      (defn create-ledger []
        (->InMemoryLedger (atom {}) (atom [])))
    src/payments/transfer.clj: |
      (ns payments.transfer
        (:require [payments.ledger :as l]))

      (defn transfer! [ledger from to amount]
        (when (neg? (- (l/balance ledger from) amount))
          (throw (ex-info "Insufficient funds" {:from from :amount amount})))
        (l/debit! ledger from amount)
        (l/credit! ledger to amount)
        {:from from :to to :amount amount})

      (defn transfer-history [ledger account]
        (l/history ledger account))
    src/api/payment_handler.clj: |
      (ns api.payment-handler
        (:require [payments.transfer :as tr]))

      (defn handle-transfer [ledger req]
        (try
          {:status 200 :body (tr/transfer! ledger (:from req) (:to req) (:amount req))}
          (catch clojure.lang.ExceptionInfo e
            {:status 400 :body {:error (ex-message e)}})))

      (defn handle-history [ledger req]
        {:status 200 :body (tr/transfer-history ledger (:account req))})
    garbage/notify.clj: |
      (ns garbage.notify)

      (def ^:const GARBAGE_GAP2032_A "sms_marker")
      (def ^:const GARBAGE_GAP2032_B "email_marker")

      (defn send-notification [to message]
        GARBAGE_GAP2032_A)
    garbage/audit.clj: |
      (ns garbage.audit)

      (def ^:const GARBAGE_GAP2032_C "audit_marker")
      (def ^:const GARBAGE_GAP2032_D "trail_marker")

      (defn record-event [event]
        GARBAGE_GAP2032_C)
    garbage/fraud.clj: |
      (ns garbage.fraud)

      (def ^:const GARBAGE_GAP2032_E "fraud_marker")

      (defn score [transaction]
        GARBAGE_GAP2032_E)
