repo:
  initial_files:
    src/payments/ledger.clj: |
      (ns payments.ledger)

      (defprotocol Ledger
        (debit! [this account amount])
        (credit! [this account amount])
        (balance [this account]))

      (defrecord InMemoryLedger [entries]
        Ledger
        (debit! [this account amount]
          (swap! entries update account (fnil - 0) amount)
          this)
        (credit! [this account amount]
          (swap! entries update account (fnil + 0) amount)
          this)
        (balance [this account]
          (get @entries account 0)))

      (defn create-ledger []
        (->InMemoryLedger (atom {})))
    src/payments/transfer.clj: |
      (ns payments.transfer
        (:require [payments.ledger :as l]))

      (defn transfer! [ledger from to amount]
        (when (neg? (- (l/balance ledger from) amount))
          (throw (ex-info "Insufficient funds" {:from from :amount amount})))
        (l/debit! ledger from amount)
        (l/credit! ledger to amount)
        {:from from :to to :amount amount})
    src/api/payment_handler.clj: |
      (ns api.payment-handler
        (:require [payments.transfer :as tr]))

      (defn handle-transfer [ledger req]
        (try
          {:status 200 :body (tr/transfer! ledger (:from req) (:to req) (:amount req))}
          (catch clojure.lang.ExceptionInfo e
            {:status 400 :body {:error (ex-message e)}})))
    garbage/notify.clj: |
