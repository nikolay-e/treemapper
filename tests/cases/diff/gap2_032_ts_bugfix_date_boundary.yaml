name: gap2_032_ts_bugfix_date_boundary
tags:
- change:bug_fix
- change:single_file
- context:import_chain
- difficulty:easy
- distance:2hop
- lang:typescript
repo:
  initial_files:
    src/scheduling/dateutil.ts: |
      export function daysBetween(start: Date, end: Date): number {
        const ms = end.getTime() - start.getTime();
        return Math.floor(ms / 86400000);
      }

      export function addDays(date: Date, days: number): Date {
        const result = new Date(date);
        result.setDate(result.getDate() + days);
        return result;
      }
    src/scheduling/availability.ts: |
      import { daysBetween, addDays } from "./dateutil";

      export interface TimeSlot {
        start: Date;
        end: Date;
      }

      export function isAvailable(slots: TimeSlot[], checkDate: Date): boolean {
        return slots.some((s) => daysBetween(s.start, checkDate) >= 0 && daysBetween(checkDate, s.end) >= 0);
      }
    src/scheduling/planner.ts: |
      import { isAvailable, TimeSlot } from "./availability";

      export function findNextAvailable(slots: TimeSlot[], from: Date, maxDays: number): Date | null {
        for (let i = 0; i < maxDays; i++) {
          const candidate = new Date(from.getTime() + i * 86400000);
          if (isAvailable(slots, candidate)) return candidate;
        }
        return null;
      }
    src/scheduling/recurrence.ts: |
      const TRAP_GAP2032_PATTERN_A: string = "weekly";
      const TRAP_GAP2032_MAX_B: number = 52;

      export function expandRecurrence(startDate: Date, count: number): Date[] {
        const dates: Date[] = [];
        for (let i = 0; i < count; i++) {
          dates.push(new Date(startDate.getTime() + i * 7 * 86400000));
        }
        return dates;
      }
    src/scheduling/reminder.ts: |
      const TRAP_GAP2032_LEAD_C: number = 24;
      const TRAP_GAP2032_CHANNEL_D: string = "email";

      export function shouldRemind(eventDate: Date, now: Date): boolean {
        const hoursUntil = (eventDate.getTime() - now.getTime()) / 3600000;
        return hoursUntil <= TRAP_GAP2032_LEAD_C && hoursUntil > 0;
      }
  changed_files:
    src/scheduling/dateutil.ts: |
      export function daysBetween(start: Date, end: Date): number {
        const startDay = Date.UTC(start.getFullYear(), start.getMonth(), start.getDate());
        const endDay = Date.UTC(end.getFullYear(), end.getMonth(), end.getDate());
        return Math.floor((endDay - startDay) / 86400000);
      }

      export function addDays(date: Date, days: number): Date {
        const result = new Date(date);
        result.setDate(result.getDate() + days);
        return result;
      }
