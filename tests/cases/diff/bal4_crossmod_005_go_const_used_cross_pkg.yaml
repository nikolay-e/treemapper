name: bal4_crossmod_005_go_const_used_cross_pkg
tags:
- lang:go
- change:single_file
- context:cross_module
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    pkg/config/limits.go: |
      package config

      const MaxRetries = 3
      const TimeoutSec = 30
      const MaxBatchSize = 100
    pkg/worker/processor.go: |
      package worker

      import "pkg/config"

      func Process(items []string) error {
          for i := 0; i < config.MaxRetries; i++ {
              if len(items) > config.MaxBatchSize {
                  items = items[:config.MaxBatchSize]
              }
          }
          return nil
      }
    pkg/scheduler/cron.go: |
      package scheduler

      import "pkg/config"

      func RunJob() {
          for i := 0; i < config.MaxRetries; i++ {
              break
          }
      }
    pkg/notifier/email.go: |
      package notifier

      var GARBAGE_005_SMTP_A = "smtp.local"
      var GARBAGE_005_PORT_B = 587

      func Send(to string, body string) error {
          return nil
      }
    garbage_deploy.go: |
      package deploy

      var GARBAGE_005_TARGET_C = "prod"
      var GARBAGE_005_REGION_D = "us-east"

      func Deploy() {}
  changed_files:
