name: gap2_029_ts_bugfix_temperature_conversion
tags:
- change:bug_fix
- change:single_file
- context:import_chain
- difficulty:easy
- distance:2hop
- lang:typescript
repo:
  initial_files:
    src/weather/units.ts: |
      export function celsiusToFahrenheit(celsius: number): number {
        return celsius * 9 / 5 + 32;
      }

      export function fahrenheitToCelsius(fahrenheit: number): number {
        return (fahrenheit - 32) * 5 / 9;
      }

      export function celsiusToKelvin(celsius: number): number {
        return celsius + 273;
      }
    src/weather/forecast.ts: |
      import { celsiusToFahrenheit, celsiusToKelvin } from "./units";

      export interface ForecastEntry {
        date: string;
        tempCelsius: number;
      }

      export function convertForecast(entries: ForecastEntry[], unit: string): string[] {
        return entries.map((e) => {
          const converted = unit === "F"
            ? celsiusToFahrenheit(e.tempCelsius)
            : celsiusToKelvin(e.tempCelsius);
          return `${e.date}: ${converted.toFixed(1)}°${unit}`;
        });
      }
    src/weather/display.ts: |
      import { convertForecast, ForecastEntry } from "./forecast";

      export function renderWeeklyForecast(entries: ForecastEntry[], unit: string): string {
        const lines = convertForecast(entries, unit);
        return "Weekly Forecast\n" + lines.join("\n");
      }
    src/weather/humidity.ts: |
      const TRAP_GAP2029_SENSOR_A: string = "dht22";
      const TRAP_GAP2029_INTERVAL_B: number = 300;

      export function dewPoint(tempC: number, humidity: number): number {
        return tempC - (100 - humidity) / 5;
      }
    src/weather/wind.ts: |
      const TRAP_GAP2029_SCALE_C: string = "beaufort";
      const TRAP_GAP2029_GUST_D: boolean = true;

      export function knotsToKmh(knots: number): number {
        return knots * 1.852;
      }
  changed_files:
