    src/scheduling/retry_policy.rs: |
      #[derive(Debug, Clone)]
      pub struct RetryPolicy {
          pub max_attempts: u32,
          pub backoff_ms: u64,
          pub jitter: bool,
      }

      impl RetryPolicy {
          pub fn new(max_attempts: u32, backoff_ms: u64) -> Self {
              Self { max_attempts, backoff_ms, jitter: false }
          }

          pub fn with_jitter(mut self) -> Self {
              self.jitter = true;
              self
          }

          pub fn delay_for_attempt(&self, attempt: u32) -> u64 {
              self.backoff_ms * attempt as u64
          }
      }
    src/scheduling/job_runner.rs: |
      use crate::scheduling::retry_policy::RetryPolicy;

      pub struct JobRunner {
          policy: RetryPolicy,
      }

      impl JobRunner {
          pub fn new(policy: RetryPolicy) -> Self {
              Self { policy }
          }

          pub fn run<F: Fn() -> bool>(&self, job: F) -> bool {
              for attempt in 0..self.policy.max_attempts {
                  if job() {
                      return true;
                  }
                  let delay = self.policy.delay_for_attempt(attempt);
                  std::thread::sleep(std::time::Duration::from_millis(delay));
              }
              false
          }
      }
