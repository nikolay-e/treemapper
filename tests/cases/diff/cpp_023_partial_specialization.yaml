- context:import_chain
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    src/infra/connection_pool.rs: |
      use std::time::{Duration, Instant};

      pub struct Connection {
          pub id: u32,
          pub created_at: Instant,
          pub max_age: Duration,
      }

      impl Connection {
          pub fn is_expired(&self) -> bool {
              // BUG: should check elapsed against max_age, not just always false
              self.created_at.elapsed() < Duration::from_secs(0)
          }
      }

      pub struct ConnectionPool {
          connections: Vec<Connection>,
          max_size: usize,
      }

      impl ConnectionPool {
          pub fn new(max_size: usize) -> Self {
              Self { connections: Vec::new(), max_size }
          }

          pub fn acquire(&mut self) -> Option<&Connection> {
              self.connections.retain(|c| !c.is_expired());
              self.connections.first()
          }

          pub fn release(&mut self, conn: Connection) {
              if self.connections.len() < self.max_size {
                  self.connections.push(conn);
              }
          }
      }
    src/infra/db_client.rs: |
      use crate::infra::connection_pool::ConnectionPool;

      pub struct DbClient {
          pool: ConnectionPool,
      }

      impl DbClient {
          pub fn new(pool_size: usize) -> Self {
              Self { pool: ConnectionPool::new(pool_size) }
          }

          pub fn query(&mut self, sql: &str) -> Result<Vec<String>, String> {
              match self.pool.acquire() {
                  Some(_conn) => Ok(vec![format!("result for: {}", sql)]),
                  None => Err("no available connections".to_string()),
              }
          }
      }
