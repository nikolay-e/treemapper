      def body_surface_area(height_cm: float, weight_kg: float) -> float:
          return 0.007184 * (height_cm ** 0.725) * (weight_kg ** 0.425)
    pharmacy/inventory.py: |
      class MedicationStock:
          def __init__(self):
              self._stock: dict[str, int] = {}

          def add(self, medication: str, quantity: int) -> None:
              self._stock[medication] = self._stock.get(medication, 0) + quantity

          def available(self, medication: str) -> int:
              return self._stock.get(medication, 0)

          def dispense(self, medication: str, quantity: int) -> bool:
              if self.available(medication) < quantity:
                  return False
              self._stock[medication] -= quantity
              return True
  changed_files:
    pharmacy/dosage.py: |
      from pharmacy.formulas import weight_based_dose

      class DosageCalculator:
          def __init__(self, patient_weight_kg: float):
              self.patient_weight_kg = patient_weight_kg

          def calculate_dose_mg(self, mg_per_kg: float) -> float:
              raw = weight_based_dose(self.patient_weight_kg, mg_per_kg)
              return round(raw, 1)

          def split_doses(self, total_mg: float, frequency: int) -> list[float]:
              per_dose = total_mg / frequency
              return [round(per_dose, 1)] * frequency
    pharmacy/formulas.py: |
