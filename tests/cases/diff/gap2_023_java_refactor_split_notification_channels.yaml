    src/main/java/com/clinic/AppointmentNotifier.java: |
      package com.clinic;

      public class AppointmentNotifier {
          public void notifyPatient(String patientId, String message, String channel) {
              if ("sms".equals(channel)) {
                  System.out.println("SMS to " + patientId + ": " + message);
              } else if ("email".equals(channel)) {
                  System.out.println("Email to " + patientId + ": " + message);
              }
          }
      }
    src/main/java/com/clinic/AppointmentScheduler.java: |
      package com.clinic;

      import java.time.LocalDateTime;

      public class AppointmentScheduler {
          private final AppointmentNotifier notifier;

          public AppointmentScheduler(AppointmentNotifier notifier) {
              this.notifier = notifier;
          }

          public void schedule(String patientId, String doctorId, LocalDateTime time) {
              String msg = "Appointment with Dr." + doctorId + " at " + time;
              notifier.notifyPatient(patientId, msg, "sms");
          }
      }
