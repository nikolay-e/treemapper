    internal/pipeline/stage.go: |
      package pipeline

      import "context"

      type StageFunc func(ctx context.Context, input interface{}) (interface{}, error)

      type Stage struct {
          name string
          fn   StageFunc
      }

      func NewStage(name string, fn StageFunc) *Stage {
          return &Stage{name: name, fn: fn}
      }

      func (s *Stage) Name() string {
          return s.name
      }

      func (s *Stage) Run(ctx context.Context, input interface{}) (interface{}, error) {
          return s.fn(ctx, input)
      }
    internal/pipeline/runner.go: |
      package pipeline

      import "context"

      type Runner struct {
          stages []*Stage
      }

      func NewRunner() *Runner {
          return &Runner{}
      }

      func (r *Runner) Add(s *Stage) {
          r.stages = append(r.stages, s)
      }

      func (r *Runner) Execute(ctx context.Context, input interface{}) (interface{}, error) {
          current := input
          for _, stage := range r.stages {
              out, err := stage.Run(ctx, current)
              if err != nil {
                  return nil, err
              }
              current = out
          }
          return current, nil
      }
    internal/storage/kv.go: |
      package storage

      import "sync"

      type KVStore struct {
          mu   sync.RWMutex
          data map[string][]byte
      }

      func NewKVStore() *KVStore {
          return &KVStore{data: make(map[string][]byte)}
      }

      func (s *KVStore) Set(key string, value []byte) {
          s.mu.Lock()
          defer s.mu.Unlock()
          s.data[key] = value
      }

      func (s *KVStore) Get(key string) ([]byte, bool) {
          s.mu.RLock()
          defer s.mu.RUnlock()
          v, ok := s.data[key]
          return v, ok
      }
