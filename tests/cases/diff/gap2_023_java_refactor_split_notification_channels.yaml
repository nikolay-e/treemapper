      public class WaitlistManager {
          private static final String TRAP_GAP2023_PRIORITY_C = "fifo";
          private static final int TRAP_GAP2023_MAX_D = 100;
          private final Queue<String> queue = new LinkedList<>();

          public void enqueue(String patientId) { queue.add(patientId); }
          public String dequeue() { return queue.poll(); }
      }
