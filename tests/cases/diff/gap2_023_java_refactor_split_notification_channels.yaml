      package com.clinic;

      public class BillingService {
          private static final String TRAP_GAP2023_CURRENCY_A = "USD";
          private static final double TRAP_GAP2023_TAX_B = 0.08;

          public double calculateBill(double baseAmount) {
              return baseAmount * (1 + TRAP_GAP2023_TAX_B);
          }
      }
