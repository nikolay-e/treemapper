fragments:
- id: migration_reversible
  selector:
    path: migrations/migration.py
    anchor: "reversible: bool = True"
- id: registry_uses_migration
  selector:
    path: migrations/registry.py
    anchor: "from migrations.migration import Migration"
- id: executor_uses_registry
  selector:
    path: migrations/executor.py
    anchor: "from migrations.registry import MigrationRegistry"
- id: db_manager_uses_executor
  selector:
    path: app/db_manager.py
    anchor: "from migrations.executor import MigrationExecutor"
- id: no_sql_formatter
  selector:
    path: utils/sql_formatter.py
    anchor: "def format_sql"
- id: no_db_config
  selector:
    path: config/db_config.py
    anchor: "DB_HOST"
