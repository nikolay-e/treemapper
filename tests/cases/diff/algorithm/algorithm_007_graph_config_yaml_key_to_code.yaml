# === Assertions ===

must_include_files:
- config/application.yaml
- config/database.yaml
- src/database/connection.py

must_include_content_from:
  config/application.yaml:
    - 'log_level: INFO'
  config/database.yaml:
    - 'host: db.production.example.com'
    - 'ssl_mode: require'
  src/database/connection.py:
    - ssl_param = f"?sslmode={self.ssl_mode}"

must_not_include:
# Plain garbage markers
- GARBAGE_ALGO_007_CACHE_MARKER_A
- GARBAGE_ALGO_007_TTL_MARKER_B
- GARBAGE_ALGO_007_QUEUE_MARKER_C
- GARBAGE_ALGO_007_WORKER_MARKER_D
- GARBAGE_ALGO_007_JOBS_MARKER_E
- GARBAGE_ALGO_007_PRIORITY_MARKER_F
# Tricky: structural sibling — another YAML config with pool_size key
- GARBAGE_ALGO_007_LOG_CONFIG_G
- GARBAGE_ALGO_007_LOG_FORMAT_H
# Tricky: same-import consumer — also uses yaml.safe_load and Path
- GARBAGE_ALGO_007_LOADER_MARKER_I
- GARBAGE_ALGO_007_PARSE_MARKER_J
# Tricky: name collision — same attributes (host, port, pool_size, get_connection_string)
- GARBAGE_ALGO_007_REDIS_CONN_K
- GARBAGE_ALGO_007_REDIS_POOL_L

must_not_include_files:
- garbage_cache_config.yaml
- garbage_queue.py
- config/logging.yaml
- src/config/loader.py
- src/database/redis_connection.py

max_fragments: 10
max_files: 4
add_garbage_files: false
skip_garbage_check: true
