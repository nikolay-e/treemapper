    from typing import List

    class PaymentService:
        def __init__(self, order_service):
            self.order_service = order_service
            self.transactions: List[dict] = []

        def charge(self, customer_id: int, amount: float) -> bool:
            transaction = {"customer_id": customer_id, "amount": amount, "status": "completed"}
            self.transactions.append(transaction)
            return True

        def refund(self, order_id: int) -> bool:
            order = self.order_service.get_order(order_id)
            if not order:
                return False
            transaction = {"customer_id": order.customer_id, "amount": -order.total, "status": "refunded"}
            self.transactions.append(transaction)
            return True

