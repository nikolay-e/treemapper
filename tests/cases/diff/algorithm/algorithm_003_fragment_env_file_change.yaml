# === Assertions ===

must_include_files:
- .env

must_include_content_from:
  .env:
    - DATABASE_URL=postgresql://localhost/myapp_dev
    - DEBUG=true
    - LOG_LEVEL=DEBUG

must_not_include:
# Plain garbage markers
- GARBAGE_ALGO_003_MIGRATION_MARKER_A
- GARBAGE_ALGO_003_SCHEMA_MARKER_B
- GARBAGE_ALGO_003_RUNNER_C
- GARBAGE_ALGO_003_SEED_MARKER_D
- GARBAGE_ALGO_003_FIXTURE_MARKER_E
- GARBAGE_ALGO_003_SEEDER_F
# Tricky: structural sibling — .env.staging has same keys as .env
- GARBAGE_ALGO_003_STAGING_ENV_G
- GARBAGE_ALGO_003_DEPLOY_TARGET_H
# Tricky: same-import consumer — imports settings just like app/main.py
- GARBAGE_ALGO_003_HEALTH_ENDPOINT_I
- GARBAGE_ALGO_003_CHECK_INTERVAL_J
# Tricky: name collision — redefines DEBUG, DATABASE_URL, LOG_LEVEL
- GARBAGE_ALGO_003_DOCKER_ENV_K
- GARBAGE_ALGO_003_CONTAINER_MARKER_L

must_not_include_files:
- garbage_migrations.py
- garbage_seeds.py
- .env.staging
- app/healthcheck.py
- config/docker_env.py

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
