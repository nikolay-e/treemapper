      from typing import List
      GARBAGE_ALGO_010_MATRIX_OPS_G = "matrix"
      GARBAGE_ALGO_010_LINALG_MARKER_H = True

      Number = float

      def add(a: List[List[float]], b: List[List[float]]) -> List[List[float]]:
          return [[a[i][j] + b[i][j] for j in range(len(a[0]))] for i in range(len(a))]

      def subtract(a: List[List[float]], b: List[List[float]]) -> List[List[float]]:
          return [[a[i][j] - b[i][j] for j in range(len(a[0]))] for i in range(len(a))]

      def multiply(a: List[List[float]], b: List[List[float]]) -> List[List[float]]:
          return [[sum(a[i][k] * b[k][j] for k in range(len(b))) for j in range(len(b[0]))] for i in range(len(a))]

      def divide(a: List[List[float]], scalar: float) -> List[List[float]]:
          if scalar == 0:
              raise ValueError("Cannot divide by zero")
          return [[a[i][j] / scalar for j in range(len(a[0]))] for i in range(len(a))]
