        def test_add_negative(self):
            assert add(-1, 1) == 0

    class TestDivide:
        def test_divide_integers(self):
            assert divide(10, 2) == 5

        def test_divide_by_zero(self):
            with pytest.raises(ValueError):
                divide(10, 0)

    class TestAverage:
        def test_average_list(self):
            assert average([1, 2, 3, 4, 5]) == 3.0

