repo:
  initial_files:
    src/queue/ring_buffer.rs: |
      pub struct RingBuffer<T> {
          data: Vec<Option<T>>,
          head: usize,
          tail: usize,
          capacity: usize,
      }

      impl<T> RingBuffer<T> {
          pub fn new(capacity: usize) -> Self {
              let mut data = Vec::with_capacity(capacity);
              for _ in 0..capacity {
                  data.push(None);
              }
              RingBuffer { data, head: 0, tail: 0, capacity }
          }

          pub fn push(&mut self, item: T) {
              // BUG: overwrites head when full instead of returning error
              self.data[self.tail] = Some(item);
              self.tail = (self.tail + 1) % self.capacity;
          }

          pub fn pop(&mut self) -> Option<T> {
              let item = self.data[self.head].take();
              if item.is_some() {
                  self.head = (self.head + 1) % self.capacity;
              }
              item
          }
      }
    src/worker/task_runner.rs: |
      use crate::queue::ring_buffer::RingBuffer;

      pub struct TaskRunner {
          queue: RingBuffer<String>,
      }

      impl TaskRunner {
          pub fn new() -> Self {
              TaskRunner { queue: RingBuffer::new(64) }
          }

          pub fn enqueue(&mut self, task: String) {
              self.queue.push(task);
          }

          pub fn run_next(&mut self) -> Option<String> {
              self.queue.pop()
          }
      }
