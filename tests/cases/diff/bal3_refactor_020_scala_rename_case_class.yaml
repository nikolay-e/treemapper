repo:
  initial_files:
    src/main/scala/domain/Event.scala: |
      package domain

      case class Event(id: String, name: String, payload: Map[String, String])
    src/main/scala/services/EventBus.scala: |
      package services

      import domain.Event

      class EventBus {
        private var listeners: List[Event => Unit] = Nil

        def subscribe(listener: Event => Unit): Unit =
          listeners = listener :: listeners

        def publish(event: Event): Unit =
          listeners.foreach(_(event))
      }
    src/main/scala/handlers/EventHandler.scala: |
      package handlers

      import domain.Event
      import services.EventBus

      class EventHandler(bus: EventBus) {
        bus.subscribe(handle)

        def handle(event: Event): Unit =
          println(s"Handling ${event.name}")
      }
    src/main/scala/persistence/FileStore.scala: |
