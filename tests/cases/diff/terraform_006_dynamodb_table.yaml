name: terraform_006_dynamodb_table
tags:
- lang:python
- lang:terraform
- change:single_file
- change:config
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    modules/dynamodb/main.tf: |
      resource "aws_dynamodb_table" "this" {
        name           = var.table_name
        billing_mode   = var.billing_mode
        hash_key       = var.hash_key
        range_key      = var.range_key

        dynamic "attribute" {
          for_each = var.attributes
          content {
            name = attribute.value.name
            type = attribute.value.type
          }
        }

        dynamic "global_secondary_index" {
          for_each = var.global_secondary_indexes
          content {
            name               = global_secondary_index.value.name
            hash_key           = global_secondary_index.value.hash_key
            range_key          = global_secondary_index.value.range_key
            projection_type    = global_secondary_index.value.projection_type
            non_key_attributes = global_secondary_index.value.non_key_attributes
          }
        }

        point_in_time_recovery {
          enabled = var.point_in_time_recovery_enabled
        }

        server_side_encryption {
          enabled     = var.encryption_enabled
          kms_key_arn = var.kms_key_arn
        }

        ttl {
          attribute_name = var.ttl_attribute_name
          enabled        = var.ttl_enabled
        }

        tags = var.tags
      }
    modules/dynamodb/variables.tf: |
      variable "table_name" {
        type = string
      }

      variable "billing_mode" {
        type    = string
        default = "PAY_PER_REQUEST"
      }

      variable "hash_key" {
        type = string
      }

      variable "range_key" {
        type    = string
        default = null
      }

      variable "attributes" {
        type = list(object({
          name = string
          type = string
        }))
      }

      variable "global_secondary_indexes" {
        type    = list(any)
        default = []
      }

      variable "point_in_time_recovery_enabled" {
        type    = bool
        default = true
      }

      variable "encryption_enabled" {
        type    = bool
        default = true
      }

      variable "kms_key_arn" {
        type    = string
        default = null
      }

      variable "ttl_attribute_name" {
        type    = string
        default = ""
      }

      variable "ttl_enabled" {
        type    = bool
        default = false
      }

      variable "tags" {
        type    = map(string)
        default = {}
      }
    app.py: |
      import boto3
      dynamodb = boto3.resource('dynamodb')
      table = dynamodb.Table('users')
      table.put_item(Item={'user_id': '123', 'name': 'John'})
    infrastructure/database.tf: |
      module "users_table" {
        source     = "./modules/dynamodb"
        table_name = "users-${var.environment}"
        hash_key   = "user_id"

        attributes = [
          { name = "user_id", type = "S" }
        ]

        tags = local.common_tags
      }
    infrastructure/audit_table.tf: |
      module "audit_table" {
        source     = "./modules/dynamodb"
        table_name = "audit-logs-${var.environment}"
        hash_key   = "event_id"
        range_key  = "timestamp"

        attributes = [
          { name = "event_id", type = "S" },
          { name = "timestamp", type = "N" },
          { name = "actor_id", type = "S" },
          { name = "resource_type", type = "S" }
        ]

        global_secondary_indexes = [
          {
            name               = "actor-index"
            hash_key           = "actor_id"
            range_key          = "timestamp"
            projection_type    = "ALL"
            non_key_attributes = null
          },
          {
            name               = "resource-type-index"
            hash_key           = "resource_type"
            range_key          = "timestamp"
            projection_type    = "INCLUDE"
            non_key_attributes = ["event_id", "actor_id"]
          }
        ]

        ttl_enabled        = true
        ttl_attribute_name = "expires_at"

        kms_key_arn = aws_kms_key.audit.arn

        tags = local.common_tags
      }
    infrastructure/cache_table.tf: |
      module "cache_table" {
        source     = "./modules/dynamodb"
        table_name = "cache-${var.environment}"
        hash_key   = "cache_key"

        attributes = [
          { name = "cache_key", type = "S" }
        ]

        ttl_enabled        = true
        ttl_attribute_name = "expires_at"

        tags = local.common_tags
      }
    infrastructure/redshift.tf: |
      resource "aws_redshift_cluster" "analytics" {
        cluster_identifier = "${var.environment}-analytics"
        database_name      = "warehouse"
        master_username    = "admin"
        master_password    = var.redshift_password
        node_type          = "dc2.large"
        cluster_type       = "single-node"
      }
    infrastructure/elasticache.tf: |
      resource "aws_elasticache_cluster" "sessions" {
        cluster_id           = "${var.environment}-sessions"
        engine               = "redis"
        node_type            = "cache.t3.micro"
        num_cache_nodes      = 1
        parameter_group_name = "default.redis7"
      }
