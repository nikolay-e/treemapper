  changed_files:
    src/main/java/com/messaging/queue/TaskQueue.java: |
      package com.messaging.queue;
      import java.util.LinkedList;
      import java.util.Queue;
      public class TaskQueue {
          private final Queue<String> queue = new LinkedList<>();
          private final int maxSize;
          public TaskQueue(int maxSize) {
              this.maxSize = maxSize;
          }
          public TaskQueue() {
              this(1000);
          }
          public boolean enqueue(String task) {
              if (queue.size() >= maxSize) {
                  return false;
              }
              queue.add(task);
              return true;
          }
          public String dequeue() {
              return queue.poll();
          }
          public boolean isEmpty() {
              return queue.isEmpty();
          }
          public int size() {
              return queue.size();
          }
      }
  commit_message: "feat: add bounded queue with max size and size query"
