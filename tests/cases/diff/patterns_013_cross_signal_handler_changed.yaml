      from models.user import User
      from services.email_service import EmailService

      email_service = EmailService()

      def on_user_created(sender, instance):
          print(f"User created: {instance.name}")
          email_service.send_welcome(instance.email, instance.name)
          log_user_event("created", instance)

      def log_user_event(event_type, user):
          print(f"Event [{event_type}]: {user.name}")
