repo:
  initial_files:
    config/email.json: |
      {
        "smtp_host": "smtp.gmail.com",
        "smtp_port": 587,
        "from_address": "noreply@example.com",
        "templates": {
          "welcome": "Welcome, {name}!",
          "reset": "Reset your password: {link}"
        }
      }
    src/mailer.py: |
      import json

      class Mailer:
          def __init__(self):
              with open("config/email.json") as f:
                  self.cfg = json.load(f)
              self.host = self.cfg["smtp_host"]
              self.port = self.cfg["smtp_port"]
              self.sender = self.cfg["from_address"]

          def send(self, to, template_name, context):
              tpl = self.cfg["templates"][template_name]
              body = tpl.format(**context)
              return self.sender, to, body
    src/notifications.py: |
      import json

      def get_template(name):
          with open("config/email.json") as f:
              cfg = json.load(f)
          return cfg["templates"].get(name)
