          val pool = new DatabasePool(cfg)
          pool.connect()
          srv.start()
        }
      }
    src/main/scala/api/Routes.scala: |
      package api

      import server.HttpServer

      class Routes(server: HttpServer) {
        def register(): Unit =
          println("Routes registered")
      }
    src/main/scala/jobs/Scheduler.scala: |
      package jobs

      import config.AppConfig

      class Scheduler(config: AppConfig) {
        def schedule(): Unit =
          println(s"Debug mode: ${config.debug}")
      }
    src/main/scala/infra/Email.scala: |
      package infra

      val GARBAGE_R023_EMAIL_A: String = "email"

      class EmailService {
        def send(to: String, body: String): Unit = ()
      }
    src/main/scala/infra/Storage.scala: |
      package infra

      val GARBAGE_R023_STORAGE_B: String = "storage"

      class StorageService {
        def save(key: String, data: Array[Byte]): Unit = ()
      }
    src/main/scala/infra/Monitor.scala: |
      package infra

      val GARBAGE_R023_MONITOR_C: String = "monitor"

      class MonitorService {
        def check(): Boolean = true
      }
  commit_message: "refactor: move AppConfig, HttpServer, DatabasePool to separate packages"
