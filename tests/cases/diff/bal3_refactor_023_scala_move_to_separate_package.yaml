name: bal3_refactor_023_scala_move_to_separate_package
tags:
- lang:scala
- change:multi_file
- change:refactor
- context:import_chain
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    src/main/scala/app/Application.scala: |
      package app

      case class AppConfig(dbUrl: String, port: Int, debug: Boolean)

      class HttpServer(config: AppConfig) {
        def start(): Unit =
          println(s"Starting on port ${config.port}")
      }

      class DatabasePool(config: AppConfig) {
        def connect(): Unit =
          println(s"Connecting to ${config.dbUrl}")
      }

      object Application {
        def main(args: Array[String]): Unit = {
          val config = AppConfig("jdbc:postgresql://localhost/db", 8080, debug = true)
          val server = new HttpServer(config)
          val pool = new DatabasePool(config)
          pool.connect()
          server.start()
        }
      }
    src/main/scala/api/Routes.scala: |
      package api

      import app.HttpServer

      class Routes(server: HttpServer) {
        def register(): Unit =
          println("Routes registered")
      }
    src/main/scala/jobs/Scheduler.scala: |
      package jobs

      import app.AppConfig

      class Scheduler(config: AppConfig) {
        def schedule(): Unit =
          println(s"Debug mode: ${config.debug}")
      }
    src/main/scala/infra/Email.scala: |
      package infra

      val GARBAGE_R023_EMAIL_A: String = "email"

      class EmailService {
        def send(to: String, body: String): Unit = ()
      }
    src/main/scala/infra/Storage.scala: |
      package infra

      val GARBAGE_R023_STORAGE_B: String = "storage"

      class StorageService {
        def save(key: String, data: Array[Byte]): Unit = ()
      }
    src/main/scala/infra/Monitor.scala: |
      package infra

      val GARBAGE_R023_MONITOR_C: String = "monitor"

      class MonitorService {
        def check(): Boolean = true
      }
  changed_files:
