    metrics/aggregator.py: |
      from collections import defaultdict

      class MetricAggregator:
          def __init__(self):
              self._buckets: dict[str, list[float]] = defaultdict(list)

          def record(self, name: str, value: float) -> None:
              self._buckets[name].append(value)

          def mean(self, name: str) -> float:
              values = self._buckets.get(name, [])
              if not values:
                  return 0.0
              return sum(values) / len(values)

          def percentile(self, name: str, pct: float) -> float:
              values = sorted(self._buckets.get(name, []))
              if not values:
                  return 0.0
              idx = int(len(values) * pct / 100)
              return values[min(idx, len(values) - 1)]

          def flush(self, name: str) -> list[float]:
              return self._buckets.pop(name, [])
    metrics/exporter.py: |
      from metrics.aggregator import MetricAggregator

      class PrometheusExporter:
          def __init__(self, aggregator: MetricAggregator):
              self._agg = aggregator
              self._prefix = "app"

          def format_metric(self, name: str) -> str:
              mean_val = self._agg.mean(name)
              p99 = self._agg.percentile(name, 99)
              lines = [
                  f"{self._prefix}_{name}_mean {mean_val:.6f}",
                  f"{self._prefix}_{name}_p99 {p99:.6f}",
              ]
              return "\n".join(lines)
    dashboard/panels.py: |
      from metrics.exporter import PrometheusExporter

      class DashboardPanel:
          def __init__(self, exporter: PrometheusExporter, metric_names: list[str]):
              self._exporter = exporter
              self._names = metric_names

          def render(self) -> str:
              sections = []
              for name in self._names:
                  sections.append(self._exporter.format_metric(name))
              return "\n\n".join(sections)

          def metric_count(self) -> int:
              return len(self._names)
    dashboard/alerts.py: |
      class AlertRule:
          def __init__(self, metric_name: str, threshold: float):
              self.metric_name = metric_name
              self.threshold = threshold

          def evaluate(self, current_value: float) -> bool:
              return current_value > self.threshold

          def description(self) -> str:
              return f"{self.metric_name} > {self.threshold}"

      class AlertManager:
          def __init__(self):
              self._rules: list[AlertRule] = []

          def add_rule(self, rule: AlertRule) -> None:
              self._rules.append(rule)

          def check_all(self, values: dict[str, float]) -> list[str]:
              fired = []
              for rule in self._rules:
                  val = values.get(rule.metric_name, 0.0)
                  if rule.evaluate(val):
                      fired.append(rule.description())
              return fired
