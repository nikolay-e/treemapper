    metrics/aggregator.py: |
      from collections import defaultdict
      from decimal import Decimal, ROUND_HALF_UP

      class MetricAggregator:
          def __init__(self, precision: int = 6):
              self._buckets: dict[str, list[Decimal]] = defaultdict(list)
              self._precision = precision

          def record(self, name: str, value: float) -> None:
              self._buckets[name].append(Decimal(str(value)))

          def mean(self, name: str) -> float:
              values = self._buckets.get(name, [])
              if not values:
                  return 0.0
              total = sum(values, Decimal("0"))
              result = total / len(values)
              return float(result.quantize(
                  Decimal(10) ** -self._precision, rounding=ROUND_HALF_UP
              ))

          def percentile(self, name: str, pct: float) -> float:
              values = sorted(self._buckets.get(name, []))
              if not values:
                  return 0.0
              rank = Decimal(str(pct)) / Decimal("100") * (len(values) - 1)
              lower = int(rank)
              upper = min(lower + 1, len(values) - 1)
              weight = rank - lower
              result = values[lower] * (1 - weight) + values[upper] * weight
              return float(result.quantize(
                  Decimal(10) ** -self._precision, rounding=ROUND_HALF_UP
              ))

          def flush(self, name: str) -> list[float]:
              decimals = self._buckets.pop(name, [])
              return [float(d) for d in decimals]
