      package com.example;

      import java.util.List;
      import java.util.Map;

      public class ReportGenerator {
          public String generateSummary(List<User> users) {
              StringBuilder sb = new StringBuilder();
              sb.append("Total users: ").append(users.size()).append("\n");
              for (User user : users) {
                  sb.append("- ").append(user.getName()).append("\n");
              }
              return sb.toString();
          }

          public Map<String, Integer> countByDepartment(List<User> users) {
