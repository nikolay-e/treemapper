      const std = @import("std");
      const effect = @import("effect.zig");

      pub const Channel = struct {
          volume: f32,
          pan: f32,
          muted: bool,
          solo: bool,

          pub fn process(self: Channel, samples: []f32) void {
              for (samples) |*s| {
                  if (self.muted and !self.solo) {
                      s.* = 0.0;
                  } else {
                      s.* *= self.volume;
                  }
              }
          }
      };

      pub fn mixChannels(channels: []const Channel, output: []f32) void {
          for (output) |*o| o.* = 0.0;
          for (channels) |ch| {
              if (!ch.muted or ch.solo) {
                  for (output, 0..) |*o, i| {
                      o.* += effect.softClip(o.* * ch.volume);
                      _ = i;
                  }
              }
          }
      }
    src/effect.zig: |
      const dsp = @import("dsp.zig");

      pub fn softClip(sample: f32) f32 {
          return dsp.tanhApprox(sample);
