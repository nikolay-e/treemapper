name: scripting_027_struct
tags:
- lang:ruby
- change:single_file
- change:new_function
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    types.rb: |
      Point = Struct.new(:x, :y) do
        def distance_from_origin
          Math.sqrt(x**2 + y**2)
        end

        def translate(dx, dy)
          Point.new(x + dx, y + dy)
        end
      end

      Rectangle = Struct.new(:width, :height) do
        def area
          width * height
        end

        def perimeter
          2 * (width + height)
        end
      end
    geometry.rb: |
      module Geometry
      end
    vector.rb: |
      class Vector
        attr_reader :x, :y

        def initialize(x, y)
          @x = x
          @y = y
        end

        def magnitude
          Math.sqrt(x**2 + y**2)
        end

        def add(other)
          Vector.new(x + other.x, y + other.y)
        end

        def dot(other)
          x * other.x + y * other.y
        end

        def normalize
          mag = magnitude
          Vector.new(x / mag, y / mag)
        end
      end
    canvas.rb: |
      class Canvas
        def initialize(width, height)
          @grid = Array.new(height) { Array.new(width, '.') }
          @width = width
          @height = height
        end

        def plot(x, y, char = '*')
          return unless y >= 0 && y < @height && x >= 0 && x < @width
          @grid[y][x] = char
        end

        def render
          @grid.map { |row| row.join('') }.join("\n")
        end

        def clear
          @grid.each { |row| row.fill('.') }
        end
      end
    shape_renderer.rb: |
      require_relative 'types'

      class ShapeRenderer
        def initialize(scale: 1.0)
          @scale = scale
        end

        def render_point(point)
          sx = (point.x * @scale).round(2)
          sy = (point.y * @scale).round(2)
          "<circle cx='#{sx}' cy='#{sy}' r='2'/>"
        end

        def render_rectangle(rect)
          sw = (rect.width * @scale).round(2)
          sh = (rect.height * @scale).round(2)
          "<rect width='#{sw}' height='#{sh}'/>"
        end

        def render_all(shapes)
          shapes.map do |shape|
            case shape
            when Point then render_point(shape)
            when Rectangle then render_rectangle(shape)
            end
          end.join("\n")
        end
      end
    bounds.rb: |
      BoundingBox = Struct.new(:x, :y, :w, :h) do
        def contains?(px, py)
          px >= x && px <= x + w && py >= y && py <= y + h
        end

        def intersects?(other)
          !(x + w < other.x || other.x + other.w < x ||
            y + h < other.y || other.y + other.h < y)
        end

        def expand(margin)
          BoundingBox.new(x - margin, y - margin, w + 2 * margin, h + 2 * margin)
        end
      end
    lib/math_helpers.rb: |
      module MathHelpers
        def self.distance(x1, y1, x2, y2)
          Math.sqrt((x2 - x1)**2 + (y2 - y1)**2)
        end

        def self.area_of_rectangle(width, height)
          width * height
        end

        def self.clamp(value, min, max)
          [[value, min].max, max].min
        end

        def self.lerp(a, b, t)
          a + (b - a) * t
        end
      end
  changed_files:
    types.rb: |
      Point = Struct.new(:x, :y) do
        def distance_from_origin
          Math.sqrt(x**2 + y**2)
        end

        def translate(dx, dy)
          Point.new(x + dx, y + dy)
        end
      end

      Rectangle = Struct.new(:width, :height) do
        def area
          width * height
        end

        def perimeter
          2 * (width + height)
        end
      end
    geometry.rb: |
      require_relative 'types'

      module Geometry
        def self.create_point(x, y)
          Point.new(x, y)
        end

        def self.create_rectangle(w, h)
          Rectangle.new(w, h)
        end
      end

      p = Geometry.create_point(3, 4)
      puts p.distance_from_origin
  commit_message: Update files
