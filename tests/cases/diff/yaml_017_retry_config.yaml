name: yaml_017_retry_config
tags:
- lang:python
- change:single_file
- change:config
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    config/resilience.yaml: |
      retry:
        max_attempts: 3
        backoff_factor: 2
    src/retry.py: |
      import time
      import random

      def with_retry(func, max_attempts: int = 3, backoff: float = 2.0):
          def wrapper(*args, **kwargs):
              for attempt in range(max_attempts):
                  try:
                      return func(*args, **kwargs)
                  except Exception:
                      if attempt < max_attempts - 1:
                          time.sleep(backoff ** attempt)
                      else:
                          raise
          return wrapper

      def retry_with_result(func, max_attempts: int = 3, predicate=None):
          for attempt in range(max_attempts):
              result = func()
              if predicate is None or predicate(result):
                  return result
          return None
    config/circuit_breaker.yaml: |
      circuit_breaker:
        failure_threshold: 5
        reset_timeout_seconds: 30
        half_open_max_requests: 3
        monitored_exceptions:
          - ConnectionError
          - TimeoutError
    src/timeout.py: |
      import signal
      from contextlib import contextmanager

      class TimeoutError(Exception):
          pass

      @contextmanager
      def timeout(seconds: int):
          def handler(signum, frame):
              raise TimeoutError(f"Operation timed out after {seconds}s")
          old_handler = signal.signal(signal.SIGALRM, handler)
          signal.alarm(seconds)
          try:
              yield
          finally:
              signal.alarm(0)
              signal.signal(signal.SIGALRM, old_handler)

      def with_timeout(func, seconds: int = 30):
          def wrapper(*args, **kwargs):
              with timeout(seconds):
                  return func(*args, **kwargs)
          return wrapper
