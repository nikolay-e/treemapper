              results = self.db.execute("SELECT * FROM sales_summary ORDER BY day DESC")
              return [SalesSummary(**r) for r in results]

          def refresh_views(self):
              self.db.execute_file('sql/jobs/refresh_views.sql')
    garbage_view_manager.ts: |
