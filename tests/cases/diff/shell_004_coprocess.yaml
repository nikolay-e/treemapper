name: shell_004_coprocess
tags:
- lang:shell
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    lib/worker.sh: |
      #!/bin/bash

      read_from_coproc() {
          local -n coproc_fds=$1
          local result
          read -r result <&${coproc_fds[0]}
          echo "$result"
      }

      write_to_coproc() {
          local -n coproc_fds=$1
          local data=$2
          echo "$data" >&${coproc_fds[1]}
      }

      cleanup_coproc() {
          local -n coproc_fds=$1
          local coproc_pid=$2
          exec {coproc_fds[1]}>&-
          wait "$coproc_pid"
      }
    orchestrate.sh: |
      #!/bin/bash
      source ./lib/worker.sh

      coproc WORKER { while read -r line; do echo "Echo: $line"; done; }

      echo "Hello" >&${WORKER[1]}
      result=$(read_from_coproc WORKER)
      echo "Got: $result"

      cleanup_coproc WORKER $WORKER_PID
    logging.sh: |
      #!/bin/bash

      LOG_FD=3
      exec 3>/tmp/app.log

      write_log() {
          local level=$1
          local message=$2
          echo "$(date +%Y-%m-%dT%H:%M:%S) [$level] $message" >&$LOG_FD
      }

      rotate_log() {
          exec 3>&-
          mv /tmp/app.log /tmp/app.log.1
          exec 3>/tmp/app.log
      }

      flush_log() {
          sync
      }
    monitor.sh: |
      #!/bin/bash

      declare -A TRACKED_PIDS

      track_pid() {
          local name=$1
          local pid=$2
          TRACKED_PIDS[$name]=$pid
          echo "$name=$pid" >> /tmp/running_pids.txt
      }

      wait_for_all() {
          while read -r entry; do
              local pid="${entry#*=}"
              wait "$pid" 2>/dev/null
          done < /tmp/running_pids.txt
      }

      check_alive() {
          local name=$1
          local pid=${TRACKED_PIDS[$name]}
          kill -0 "$pid" 2>/dev/null
      }
    pipeline.sh: |
      #!/bin/bash
      source ./lib/worker.sh

      coproc STAGE1 { while read -r line; do echo "stage1:$line"; done; }
      coproc STAGE2 { while read -r line; do echo "stage2:$line"; done; }
      coproc STAGE3 { while read -r line; do echo "stage3:$line"; done; }

      run_pipeline() {
          local input=$1
          write_to_coproc STAGE1 "$input"
          local s1
          s1=$(read_from_coproc STAGE1)
          write_to_coproc STAGE2 "$s1"
          local s2
          s2=$(read_from_coproc STAGE2)
          write_to_coproc STAGE3 "$s2"
          read_from_coproc STAGE3
      }

      cleanup_pipeline() {
          cleanup_coproc STAGE1 $STAGE1_PID
          cleanup_coproc STAGE2 $STAGE2_PID
          cleanup_coproc STAGE3 $STAGE3_PID
      }
    parallel.sh: |
      #!/bin/bash

      MAX_JOBS=4
      RUNNING_JOBS=0

      run_job() {
          local cmd=$1
          while (( RUNNING_JOBS >= MAX_JOBS )); do
              wait -n
              RUNNING_JOBS=$((RUNNING_JOBS - 1))
          done
          eval "$cmd" &
          RUNNING_JOBS=$((RUNNING_JOBS + 1))
      }

      wait_all_jobs() {
          wait
          RUNNING_JOBS=0
      }

      job_count() {
          echo "$RUNNING_JOBS"
      }
    lib/fd_utils.sh: |
      #!/bin/bash

      open_fd_read() {
          local fd=$1
          local file=$2
          eval "exec ${fd}<${file}"
      }

      open_fd_write() {
          local fd=$1
          local file=$2
          eval "exec ${fd}>${file}"
      }

      close_fd() {
          local fd=$1
          eval "exec ${fd}>&-"
      }

      redirect_stderr() {
          local file=$1
          exec 2>"$file"
      }
  changed_files:
    lib/worker.sh: |
      #!/bin/bash

      read_from_coproc() {
          local -n coproc_fds=$1
          local result
          read -r result <&${coproc_fds[0]}
          echo "$result"
      }

      write_to_coproc() {
          local -n coproc_fds=$1
          local data=$2
          echo "$data" >&${coproc_fds[1]}
      }

      cleanup_coproc() {
          local -n coproc_fds=$1
          local coproc_pid=$2
          exec {coproc_fds[1]}>&-
          wait "$coproc_pid"
      }
    orchestrate.sh: |
      #!/bin/bash
      source ./lib/worker.sh

      coproc WORKER { while read -r line; do echo "Echo: $line"; done; }

      echo "Hello" >&${WORKER[1]}
      result=$(read_from_coproc WORKER)
      echo "Got: $result"

      coproc TRANSFORMER {
          while read -r line; do
              echo "${line^^}"
          done
      }

      echo "lowercase" >&${TRANSFORMER[1]}
      upper=$(read_from_coproc TRANSFORMER)
      echo "Transformed: $upper"

      cleanup_coproc WORKER $WORKER_PID
      cleanup_coproc TRANSFORMER $TRANSFORMER_PID
  commit_message: Update files
