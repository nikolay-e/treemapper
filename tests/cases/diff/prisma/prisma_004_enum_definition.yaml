# === Assertions ===

must_include_files:
- prisma/schema.prisma
- src/services/ticket.service.ts

must_include_content_from:
  prisma/schema.prisma:
    - "BLOCKER"
    - "enum Priority"
  src/services/ticket.service.ts:
    - "BLOCKER"
    - "getBlockerTickets"

must_not_include:
- GARBAGE_PRISMA_004_A
- GARBAGE_PRISMA_004_B
- GARBAGE_PRISMA_004_C
- GARBAGE_PRISMA_004_D

must_not_include_files:
- src/services/user.service.ts
- src/routes/ticket.routes.ts
- src/utils/constants.ts
- src/services/notification.service.ts

max_files: 4
add_garbage_files: false
skip_garbage_check: true
