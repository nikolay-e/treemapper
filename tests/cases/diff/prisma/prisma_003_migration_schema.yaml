# === Assertions ===

must_include_files:
- prisma/migrations/20240320_email_verification/migration.sql
- prisma/schema.prisma

must_include_content_from:
  prisma/migrations/20240320_email_verification/migration.sql:
    - "emailVerified"
    - "verifiedAt"
    - "ALTER TABLE"
  prisma/schema.prisma:
    - "emailVerified"
    - "verifiedAt"

must_not_include:
- GARBAGE_PRISMA_003_A
- GARBAGE_PRISMA_003_B
- GARBAGE_PRISMA_003_C
- GARBAGE_PRISMA_003_D
- GARBAGE_PRISMA_003_E

must_not_include_files:
- prisma/migrations/20240101_init/migration.sql
- prisma/migrations/20240215_add_index/migration.sql
- prisma/seed.ts
- src/middleware/auth.ts
- src/services/analytics.service.ts

max_files: 4
add_garbage_files: false
skip_garbage_check: true
