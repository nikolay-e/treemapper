# === Assertions ===

must_include_files:
- prisma/schema.prisma

must_include_content_from:
  prisma/schema.prisma:
    - "model Category"
    - "categoryId"
    - "slug"

must_not_include:
- GARBAGE_PRISMA_001_A
- GARBAGE_PRISMA_001_B
- GARBAGE_PRISMA_001_C
- GARBAGE_PRISMA_001_D

must_not_include_files:
- prisma/migrations/20240101_init/migration.sql
- prisma/seed.ts
- src/services/user.service.ts
- src/services/comment.service.ts

max_files: 3
add_garbage_files: false
skip_garbage_check: true
