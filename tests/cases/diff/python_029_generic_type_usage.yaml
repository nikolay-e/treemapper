    service.py: |
      from containers import Cache

      session_cache: Cache[str, dict] = Cache(max_size=500)

      def run(session_id: str, payload: dict) -> dict:
          cached = session_cache.get(session_id)
          if cached is not None:
              return cached
          result = {"session": session_id, "data": payload}
          session_cache.set(session_id, result)
          return result
