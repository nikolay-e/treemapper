      type User struct {
          ID        int64
          Name      string
          Email     string
          CreatedAt time.Time
          UpdatedAt time.Time
      }

      type QueryOptions struct {
          Limit  int
          Offset int
          SortBy string
      }
    internal/handler/user_handler.go: |
      package handler

      import (
          "context"
          "mymodule/internal/repository"
      )

      type UserHandler struct {
          repo *repository.UserRepository
      }

      func NewUserHandler(repo *repository.UserRepository) *UserHandler {
          return &UserHandler{repo: repo}
      }

      func (h *UserHandler) GetUser(ctx context.Context, id int64) (*repository.User, error) {
          return h.repo.FindByID(ctx, id)
      }

      func (h *UserHandler) CreateUser(ctx context.Context, user *repository.User) error {
          return h.repo.Create(ctx, user)
      }
