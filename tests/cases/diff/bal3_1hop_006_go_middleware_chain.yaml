      }

      func (c *Checker) Run() bool {
          return len(c.Services) > 0
      }
    internal/migrations/runner.go: |
      package migrations

      GARBAGE_006_MIGRATE_B = "migrate"

      type Runner struct {
          Dir string
      }

      func (r *Runner) Execute() error {
          return nil
      }
    internal/seed/loader.go: |
      package seed

      GARBAGE_006_SEED_C = "seed"

      type Loader struct {
          Path string
      }

      func (l *Loader) Load() error {
          return nil
      }
  changed_files:
    pkg/middleware/cors.go: |
      package middleware

      import "net/http"

      type CORSConfig struct {
          AllowOrigins  []string
          AllowMethods  []string
          AllowHeaders  []string
          ExposeHeaders []string
          MaxAge        int
      }

      func CORS(cfg CORSConfig) func(http.Handler) http.Handler {
          return func(next http.Handler) http.Handler {
              return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
                  origin := r.Header.Get("Origin")
                  if isAllowed(cfg.AllowOrigins, origin) {
                      w.Header().Set("Access-Control-Allow-Origin", origin)
                  }
                  if r.Method == http.MethodOptions {
                      w.WriteHeader(http.StatusNoContent)
                      return
                  }
                  next.ServeHTTP(w, r)
              })
          }
      }

      func isAllowed(origins []string, origin string) bool {
          for _, o := range origins {
              if o == "*" || o == origin {
                  return true
              }
          }
          return false
      }
  commit_message: "feat: add preflight handling and origin validation to CORS"
