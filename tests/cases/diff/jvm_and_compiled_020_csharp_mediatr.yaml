    Commands/CreateUser.cs: |
      using MediatR;

      namespace App.Commands
      {
          public class CreateUser : IRequest<User>
          {
              public string Name { get; set; }
              public string Email { get; set; }
          }
      }
    Handlers/CreateUserHandler.cs: |
      namespace App.Handlers
      {
          class CreateUserHandler { }
      }
    Interfaces/IUserRepository.cs: |
      using System.Threading;
      using System.Threading.Tasks;

      namespace App.Interfaces
      {
          public interface IUserRepository
          {
              Task<User> AddAsync(User user, CancellationToken cancellationToken);
              Task<User> GetByIdAsync(int id, CancellationToken cancellationToken);
              Task UpdateAsync(User user, CancellationToken cancellationToken);
              Task DeleteAsync(int id, CancellationToken cancellationToken);
          }
      }
    Handlers/UpdateUserHandler.cs: |
      using MediatR;
      using System.Threading;
      using System.Threading.Tasks;

      namespace App.Handlers
      {
          public class UpdateUserHandler : IRequestHandler<UpdateUser, User>
          {
              private readonly IUserRepository _repository;

              public UpdateUserHandler(IUserRepository repository)
              {
                  _repository = repository;
              }

              public async Task<User> Handle(UpdateUser request, CancellationToken cancellationToken)
              {
                  var user = await _repository.GetByIdAsync(request.Id, cancellationToken);
                  user.Name = request.Name;
                  user.Email = request.Email;
                  await _repository.UpdateAsync(user, cancellationToken);
                  return user;
              }
          }
      }
    Handlers/DeleteUserHandler.cs: |
      using MediatR;
      using System.Threading;
      using System.Threading.Tasks;

      namespace App.Handlers
      {
          public class DeleteUserHandler : IRequestHandler<DeleteUser, Unit>
          {
              private readonly IUserRepository _repository;

              public DeleteUserHandler(IUserRepository repository)
              {
                  _repository = repository;
              }

              public async Task<Unit> Handle(DeleteUser request, CancellationToken cancellationToken)
              {
                  await _repository.DeleteAsync(request.Id, cancellationToken);
                  return Unit.Value;
              }
          }
      }
    Notifications/UserCreatedNotification.cs: |
      using MediatR;

      namespace App.Notifications
      {
          public class UserCreatedNotification : INotification
          {
              public int UserId { get; set; }
              public string UserName { get; set; }
              public string UserEmail { get; set; }
          }

          public class UserCreatedHandler : INotificationHandler<UserCreatedNotification>
          {
              public Task Handle(UserCreatedNotification notification, CancellationToken cancellationToken)
              {
                  Console.WriteLine($"User created: {notification.UserName}");
                  return Task.CompletedTask;
              }
          }
      }
    Config/MediatRConfig.cs: |
      using MediatR;
      using Microsoft.Extensions.DependencyInjection;

      namespace App.Config
      {
          public static class MediatRConfig
          {
              public static IServiceCollection AddMediatRHandlers(this IServiceCollection services)
              {
                  services.AddMediatR(cfg => cfg.RegisterServicesFromAssembly(typeof(MediatRConfig).Assembly));
                  return services;
              }
          }
      }
    Controllers/UserController.cs: |
      using MediatR;
      using Microsoft.AspNetCore.Mvc;

      namespace App.Controllers
      {
          [ApiController]
          [Route("api/users")]
          public class UserController : ControllerBase
          {
              private readonly IMediator _mediator;

              public UserController(IMediator mediator)
              {
                  _mediator = mediator;
              }

              [HttpPost]
              public async Task<IActionResult> Create([FromBody] CreateUser command)
              {
                  var user = await _mediator.Send(command);
                  return CreatedAtAction(nameof(GetById), new { id = user.Id }, user);
              }

              [HttpGet("{id}")]
              public async Task<IActionResult> GetById(int id)
              {
                  return Ok();
              }
          }
      }
