name: terraform_061_cloud_init
tags:
- lang:shell
- lang:terraform
- change:single_file
- change:config
- context:import_chain
- distance:2hop
- difficulty:easy
xfail:
  category: terraform-sibling-over-discovery
repo:
  initial_files:
    cloud_init.tf: |
      data "cloudinit_config" "web" {
        gzip          = true
        base64_encode = true

        part {
          content_type = "text/x-shellscript"
          content      = file("${path.module}/scripts/setup.sh")
        }
      }

      resource "aws_instance" "web" {
        ami           = "ami-12345678"
        instance_type = "t3.micro"
        user_data     = data.cloudinit_config.web.rendered
      }
    scripts/setup.sh: |
      #!/bin/bash
      yum update -y
      yum install -y amazon-cloudwatch-agent
      systemctl start amazon-cloudwatch-agent
    bastion.tf: |
      resource "aws_instance" "bastion" {
        ami           = "ami-99887766"
        instance_type = "t3.nano"
        tags = {
          Name = "bastion-host"
          Role = "jumpbox"
        }
      }
    monitoring/logging.tf: |
      resource "aws_cloudwatch_log_group" "app_logs" {
        name              = "/app/logs"
        retention_in_days = 30
      }
  changed_files:
    cloud_init.tf: |
      data "cloudinit_config" "web" {
        gzip          = true
        base64_encode = true

        part {
          content_type = "text/x-shellscript"
          content      = file("${path.module}/scripts/setup.sh")
        }

        part {
          content_type = "text/cloud-config"
          content      = yamlencode({
            packages = ["nginx", "docker.io"]
            runcmd   = ["systemctl start nginx"]
          })
        }
      }

      resource "aws_instance" "web" {
        ami           = "ami-12345678"
        instance_type = "t3.small"
        user_data     = data.cloudinit_config.web.rendered
      }
  commit_message: Update files
fragments:
- id: setup
  selector:
    path: scripts/setup.sh
    anchor: amazon-cloudwatch-agent
- id: no_bastion
  selector:
    path: bastion.tf
- id: no_logging
  selector:
    path: monitoring/logging.tf
- id: no_global_0
  selector:
    anchor: bastion-host
- id: no_global_1
  selector:
    anchor: jumpbox
- id: no_global_2
  selector:
    anchor: retention_in_days
oracle:
  required:
  - setup
  allowed: []
  forbidden:
  - no_bastion
  - no_logging
  - no_global_0
  - no_global_1
  - no_global_2
