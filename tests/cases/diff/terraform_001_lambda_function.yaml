fragments:
- id: lambda
  selector:
    path: infrastructure/lambda.tf
    anchor: handler       = "main.handler"
- id: lambda_1
  selector:
    path: infrastructure/lambda.tf
    anchor: runtime       = "python3.9"
- id: lambda_2
  selector:
    path: infrastructure/lambda.tf
    anchor: timeout       = 60
- id: lambda_3
  selector:
    path: infrastructure/lambda.tf
    anchor: memory_size   = 256
- id: lambda_4
  selector:
    path: infrastructure/lambda.tf
    anchor: LOG_LEVEL    = "INFO"
- id: lambda_5
  selector:
    path: infrastructure/lambda.tf
    anchor: API_ENDPOINT = var.api_endpoint
- id: lambda_6
  selector:
    path: infrastructure/lambda.tf
    anchor: subnet_ids         = module.vpc.private_subnet_ids
- id: no_worker_lambda
