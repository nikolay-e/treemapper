name: terraform_001_lambda_function
xfail:
  category: terraform-sibling-over-discovery
repo:
  initial_files:
    modules/lambda/main.tf: |
      resource "aws_lambda_function" "api" {
        function_name = var.function_name
        role          = aws_iam_role.lambda_exec.arn
        handler       = var.handler
        runtime       = var.runtime
        timeout       = var.timeout
        memory_size   = var.memory_size

        filename         = data.archive_file.lambda_zip.output_path
        source_code_hash = data.archive_file.lambda_zip.output_base64sha256

        vpc_config {
          subnet_ids         = var.subnet_ids
          security_group_ids = var.security_group_ids
        }

        environment {
          variables = var.environment_variables
        }

        tags = var.tags
      }

      resource "aws_iam_role" "lambda_exec" {
        name = "${var.function_name}-exec-role"

        assume_role_policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Effect    = "Allow"
            Principal = { Service = "lambda.amazonaws.com" }
            Action    = "sts:AssumeRole"
          }]
        })
      }

      data "archive_file" "lambda_zip" {
        type        = "zip"
        source_dir  = var.source_dir
        output_path = "${path.module}/lambda.zip"
      }
    modules/lambda/variables.tf: |
      variable "function_name" {
        type = string
      }

      variable "handler" {
        type    = string
        default = "index.handler"
      }

      variable "runtime" {
        type    = string
        default = "nodejs18.x"
      }

      variable "timeout" {
        type    = number
        default = 30
      }

      variable "memory_size" {
        type    = number
        default = 128
      }

      variable "source_dir" {
        type = string
      }

      variable "subnet_ids" {
        type    = list(string)
        default = []
      }

      variable "security_group_ids" {
        type    = list(string)
        default = []
      }

      variable "environment_variables" {
        type    = map(string)
        default = {}
      }

      variable "tags" {
        type    = map(string)
        default = {}
      }
    infrastructure/lambda.tf: |
      module "api_lambda" {
        source        = "./modules/lambda"
        function_name = "api-handler"
        handler       = "index.handler"
        runtime       = "nodejs16.x"
        source_dir    = "${path.module}/../src"
        timeout       = 30

        environment_variables = {
          NODE_ENV = "production"
        }

        tags = local.common_tags
      }
    infrastructure/worker_lambda.tf: |
      module "worker_lambda" {
        source        = "./modules/lambda"
        function_name = "worker-handler"
        handler       = "worker.handler"
        runtime       = "python3.9"
        source_dir    = "${path.module}/../src/worker"
        timeout       = 60
        memory_size   = 512

        environment_variables = {
          PYTHON_ENV   = "production"
          LOG_LEVEL    = "WARNING"
          QUEUE_URL    = var.worker_queue_url
        }

        subnet_ids         = module.vpc.private_subnet_ids
        security_group_ids = [aws_security_group.worker.id]

        tags = local.common_tags
      }
    infrastructure/scheduled_lambda.tf: |
      module "scheduled_lambda" {
        source        = "./modules/lambda"
        function_name = "scheduled-task"
        handler       = "cron.handler"
        runtime       = "python3.9"
        source_dir    = "${path.module}/../src/cron"
        timeout       = 300
        memory_size   = 1024

        environment_variables = {
          PYTHON_ENV   = "production"
          LOG_LEVEL    = "INFO"
          API_ENDPOINT = var.internal_api_endpoint
          SCHEDULE     = "hourly"
        }

        tags = local.common_tags
      }
