        ) where

      data Color = Red | Green | Blue
        deriving (Show, Read, Eq)

      data Shape = Circle Double | Rectangle Double Double
        deriving (Show, Read, Eq)
    src/ColorSerial.hs: |
      module ColorSerial where

      import Data.Text (Text, pack, unpack)
      import Serializable (Serializable(..))
      import Models (Color(..))

      instance Serializable Color where
        serialize Red   = pack "red"
        serialize Green = pack "green"
        serialize Blue  = pack "blue"

        deserialize t = case unpack t of
          "red"   -> Just Red
          "green" -> Just Green
          "blue"  -> Just Blue
          _       -> Nothing
    src/ShapeSerial.hs: |
      module ShapeSerial where

      import Data.Text (Text, pack, unpack)
      import Serializable (Serializable(..))
      import Models (Shape(..))

      instance Serializable Shape where
        serialize (Circle r)      = pack ("circle:" ++ show r)
        serialize (Rectangle w h) = pack ("rect:" ++ show w ++ ":" ++ show h)

        deserialize t = case break (== ':') (unpack t) of
          ("circle", ':':r)  -> Just (Circle (read r))
          ("rect", ':':rest) -> case break (== ':') rest of
            (w, ':':h) -> Just (Rectangle (read w) (read h))
            _          -> Nothing
          _ -> Nothing
