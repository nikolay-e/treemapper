name: haskell_002_typeclass_instance
tags:
- lang:haskell
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/Serializable.hs: |
      module Serializable
        ( Serializable(..)
        ) where

      import Data.Text (Text, pack, unpack)

      class Serializable a where
        serialize   :: a -> Text
        deserialize :: Text -> Maybe a
    src/Models.hs: |
      module Models
        ( Color(..)
        , Shape(..)
        ) where

      data Color = Red | Green | Blue
        deriving (Show, Read, Eq)

      data Shape = Circle Double | Rectangle Double Double
        deriving (Show, Read, Eq)
    src/ColorSerial.hs: |
      module ColorSerial where

      import Data.Text (Text, pack, unpack)
      import Serializable (Serializable(..))
      import Models (Color(..))

      instance Serializable Color where
        serialize Red   = pack "red"
        serialize Green = pack "green"
        serialize Blue  = pack "blue"

        deserialize t = case unpack t of
          "red"   -> Just Red
          "green" -> Just Green
          "blue"  -> Just Blue
          _       -> Nothing
    src/Printable.hs: |
      module Printable
        ( Printable(..)
        ) where

      GARBAGE_HS_002_PRINTABLE_CLASS_A = "printable"
      GARBAGE_HS_002_DISPLAY_MARKER_B = True

      class Printable a where
        prettyPrint :: a -> String
    src/StringSerial.hs: |
      module StringSerial where

      import Data.Text (Text, pack, unpack)
      import Serializable (Serializable(..))
      GARBAGE_HS_002_STRING_SERIAL_C = "string-serial"
      GARBAGE_HS_002_TEXT_CONVERT_D = True

      instance Serializable String where
        serialize = pack
        deserialize = Just . unpack
    src/Drawing.hs: |
      module Drawing
        ( draw
        ) where

      import Models (Shape(..))
      GARBAGE_HS_002_DRAWING_MARKER_E = "drawing"
      GARBAGE_HS_002_CANVAS_MARKER_F = "svg"

      draw :: Shape -> String
      draw (Circle r)      = "circle(" ++ show r ++ ")"
      draw (Rectangle w h) = "rect(" ++ show w ++ "," ++ show h ++ ")"
    src/Utils.hs: |
      module Utils
        ( trim
        ) where

      GARBAGE_HS_002_UTILS_MARKER_G = "utils"
      GARBAGE_HS_002_HELPER_MARKER_H = True

      trim :: String -> String
      trim = reverse . dropWhile (== ' ') . reverse . dropWhile (== ' ')
  changed_files:
    src/Serializable.hs: |
      module Serializable
