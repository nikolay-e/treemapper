    Features/Cache/EntityCache.swift: |
      import Foundation

      class EntityCache<T: Cacheable> {
          private var storage: [String: T] = [:]

          func store(_ item: T) {
              storage[item.cacheKey] = item
          }

          func retrieve(forKey key: String) -> T? {
              guard let item = storage[key] else { return nil }
              if item.isExpired {
                  storage.removeValue(forKey: key)
                  return nil
              }
              return item
          }

          func evictExpired() {
              let expiredKeys = storage.filter { $0.value.isExpired }.map(\.key)
              for key in expiredKeys {
                  storage.removeValue(forKey: key)
              }
          }

          var count: Int { storage.count }
      }
