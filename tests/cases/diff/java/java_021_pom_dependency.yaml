          <packaging>jar</packaging>

          <parent>
              <groupId>org.springframework.boot</groupId>
              <artifactId>spring-boot-starter-parent</artifactId>
              <version>3.2.0</version>
          </parent>

          <properties>
              <java.version>17</java.version>
              <maven.compiler.source>17</maven.compiler.source>
              <maven.compiler.target>17</maven.compiler.target>
          </properties>

          <dependencies>
              <dependency>
                  <groupId>org.springframework.boot</groupId>
                  <artifactId>spring-boot-starter-web</artifactId>
              </dependency>
          </dependencies>

          <build>
              <plugins>
                  <plugin>
                      <groupId>org.springframework.boot</groupId>
                      <artifactId>spring-boot-maven-plugin</artifactId>
                  </plugin>
              </plugins>
          </build>
      </project>
    src/main/java/com/example/inventory/InventoryApplication.java: |
      package com.example.inventory;

      import org.springframework.boot.SpringApplication;
      import org.springframework.boot.autoconfigure.SpringBootApplication;

      @SpringBootApplication
      public class InventoryApplication {
          public static void main(String[] args) {
              SpringApplication.run(InventoryApplication.class, args);
          }
      }
    src/main/java/com/example/inventory/controller/HealthController.java: |
      package com.example.inventory.controller;

      import org.springframework.web.bind.annotation.GetMapping;
      import org.springframework.web.bind.annotation.RestController;
      import java.util.Map;

      @RestController
      public class HealthController {
          @GetMapping("/health")
          public Map<String, String> health() {
              return Map.of("status", "UP", "service", "inventory");
          }
      }
    src/main/java/com/example/inventory/entity/InventoryEntity.java: |
      package com.example.inventory.entity;

      import jakarta.persistence.*;
      import java.time.Instant;

      @Entity
      @Table(name = "inventory")
      public class InventoryEntity {
          @Id
          @GeneratedValue(strategy = GenerationType.IDENTITY)
          private Long id;

          @Column(nullable = false)
          private String productName;

          @Column(nullable = false)
          private int quantity;

          @Column(name = "last_updated")
          private Instant lastUpdated;

          public Long getId() { return id; }
          public void setId(Long id) { this.id = id; }
          public String getProductName() { return productName; }
          public void setProductName(String productName) { this.productName = productName; }
          public int getQuantity() { return quantity; }
          public void setQuantity(int quantity) { this.quantity = quantity; }
          public Instant getLastUpdated() { return lastUpdated; }
          public void setLastUpdated(Instant lastUpdated) { this.lastUpdated = lastUpdated; }
      }
