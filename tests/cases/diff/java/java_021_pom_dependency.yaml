# Scenario: pom.xml gains spring-boot-starter-data-jpa, postgresql, and
#   flyway-core dependencies. Only pom.xml is changed.
#
# Diff shows:
#   + spring-boot-starter-data-jpa dependency
#   + postgresql runtime dependency
#   + flyway-core dependency
#
# Reviewer questions:
#   Q1: "Are there any existing JPA entities or repositories that will work with
#       the new data-jpa dependency?"
#       -> InventoryApplication.java and HealthController.java (UNCHANGED) don't
#          use JPA. Reviewer needs existing code to assess if dependencies are premature.
#
# Not needed for comprehension:
#   - InventoryApplication.java: Standard @SpringBootApplication main class.
#     Not changed. Does not reference JPA, PostgreSQL, or Flyway.
#
#   - HealthController.java: Simple REST endpoint returning status.
#     Not changed. No JPA or database usage.
#
#   - InventoryEntity.java: JPA entity using new data-jpa dependency.
#     KEYWORD OVERLAP: uses @Entity, @Id — directly related to new dependency.
#     HARDEST TRAP. But entity existence doesn't help review whether the
#     Maven dependency declaration itself is correct.

initial:
  pom.xml: |
    <?xml version="1.0" encoding="UTF-8"?>
    <project xmlns="http://maven.apache.org/POM/4.0.0"
             xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
             xsi:schemaLocation="http://maven.apache.org/POM/4.0.0 http://maven.apache.org/xsd/maven-4.0.0.xsd">
        <modelVersion>4.0.0</modelVersion>
        <groupId>com.example</groupId>
        <artifactId>inventory-service</artifactId>
        <version>1.0.0</version>
        <packaging>jar</packaging>

        <parent>
            <groupId>org.springframework.boot</groupId>
            <artifactId>spring-boot-starter-parent</artifactId>
            <version>3.2.0</version>
        </parent>

        <properties>
            <java.version>17</java.version>
            <maven.compiler.source>17</maven.compiler.source>
            <maven.compiler.target>17</maven.compiler.target>
        </properties>

        <dependencies>
            <dependency>
                <groupId>org.springframework.boot</groupId>
                <artifactId>spring-boot-starter-web</artifactId>
            </dependency>
        </dependencies>

        <build>
            <plugins>
                <plugin>
                    <groupId>org.springframework.boot</groupId>
                    <artifactId>spring-boot-maven-plugin</artifactId>
                </plugin>
            </plugins>
        </build>
    </project>
  src/main/java/com/example/inventory/InventoryApplication.java: |
    package com.example.inventory;

    import org.springframework.boot.SpringApplication;
    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication
    public class InventoryApplication {
        public static void main(String[] args) {
            SpringApplication.run(InventoryApplication.class, args);
        }
    }
  src/main/java/com/example/inventory/controller/HealthController.java: |
    package com.example.inventory.controller;

    import org.springframework.web.bind.annotation.GetMapping;
    import org.springframework.web.bind.annotation.RestController;
    import java.util.Map;

    @RestController
    public class HealthController {
        @GetMapping("/health")
        public Map<String, String> health() {
            return Map.of("status", "UP", "service", "inventory");
        }
    }
  src/main/java/com/example/inventory/entity/InventoryEntity.java: |
    package com.example.inventory.entity;

    import jakarta.persistence.*;
    import java.time.Instant;

    @Entity
    @Table(name = "inventory")
    public class InventoryEntity {
        @Id
        @GeneratedValue(strategy = GenerationType.IDENTITY)
        private Long id;

        @Column(nullable = false)
        private String productName;

        @Column(nullable = false)
        private int quantity;

        @Column(name = "last_updated")
        private Instant lastUpdated;

        public Long getId() { return id; }
        public void setId(Long id) { this.id = id; }
        public String getProductName() { return productName; }
        public void setProductName(String productName) { this.productName = productName; }
        public int getQuantity() { return quantity; }
        public void setQuantity(int quantity) { this.quantity = quantity; }
        public Instant getLastUpdated() { return lastUpdated; }
        public void setLastUpdated(Instant lastUpdated) { this.lastUpdated = lastUpdated; }
    }

