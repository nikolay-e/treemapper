  src/main/java/com/ecommerce/model/BaseEntity.java: |
    package com.ecommerce.model;

    import java.time.LocalDateTime;
    import java.util.Objects;

    public abstract class BaseEntity {
        private Long id;
        private LocalDateTime createdAt;
        private String createdBy;
        private LocalDateTime updatedAt;
        private String updatedBy;
        private Integer version;
        private boolean deleted;

        protected BaseEntity() {
            this.createdAt = LocalDateTime.now();
            this.version = 0;
            this.deleted = false;
        }

        public Long getId() {
            return id;
        }

        public void setId(Long id) {
            this.id = id;
        }

        public LocalDateTime getCreatedAt() {
            return createdAt;
        }

        public String getCreatedBy() {
            return createdBy;
        }

        public void setCreatedBy(String createdBy) {
            this.createdBy = createdBy;
        }

        public LocalDateTime getUpdatedAt() {
            return updatedAt;
        }

        public String getUpdatedBy() {
            return updatedBy;
        }

        public Integer getVersion() {
            return version;
        }

        public boolean isDeleted() {
            return deleted;
        }

        protected void onUpdate(String user) {
            this.updatedAt = LocalDateTime.now();
            this.updatedBy = user;
            this.version++;
        }

        protected void softDelete(String user) {
            this.deleted = true;
            onUpdate(user);
        }

        protected void restore(String user) {
            this.deleted = false;
            onUpdate(user);
        }

        public boolean isNew() {
            return id == null;
        }

        @Override
        public boolean equals(Object o) {
            if (this == o) return true;
            if (o == null || getClass() != o.getClass()) return false;
            BaseEntity that = (BaseEntity) o;
            return Objects.equals(id, that.id);
        }

        @Override
        public int hashCode() {
            return Objects.hash(id);
        }

        @Override
        public String toString() {
            return getClass().getSimpleName() + "{id=" + id + ", version=" + version + "}";
        }
    }

