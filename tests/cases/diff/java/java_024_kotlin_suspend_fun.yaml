    package com.example.users.session

    import kotlinx.coroutines.CoroutineScope
    import kotlinx.coroutines.Dispatchers
    import kotlinx.coroutines.delay
    import kotlinx.coroutines.launch

    class SessionManager {
        private val scope = CoroutineScope(Dispatchers.Default)
        private val sessions = mutableMapOf<String, Long>()

        fun createSession(userId: String, ttlMs: Long = 3600_000) {
            sessions[userId] = System.currentTimeMillis() + ttlMs
            scope.launch {
                delay(ttlMs)
                sessions.remove(userId)
            }
        }

        fun isActive(userId: String): Boolean {
            val expiry = sessions[userId] ?: return false
            return System.currentTimeMillis() < expiry
        }

        fun invalidate(userId: String) {
            sessions.remove(userId)
        }
    }
  src/main/kotlin/com/example/users/security/PasswordHasher.kt: |
    package com.example.users.security

    import java.security.MessageDigest
    import java.security.SecureRandom
    import java.util.Base64

    class PasswordHasher {
        private val random = SecureRandom()

        fun hash(password: String): String {
            val salt = ByteArray(16)
            random.nextBytes(salt)
            val digest = MessageDigest.getInstance("SHA-256")
            digest.update(salt)
            val hash = digest.digest(password.toByteArray())
            val saltB64 = Base64.getEncoder().encodeToString(salt)
            val hashB64 = Base64.getEncoder().encodeToString(hash)
            return "$saltB64:$hashB64"
        }

        fun verify(password: String, stored: String): Boolean {
            val parts = stored.split(":")
            val salt = Base64.getDecoder().decode(parts[0])
            val digest = MessageDigest.getInstance("SHA-256")
            digest.update(salt)
            val hash = digest.digest(password.toByteArray())
            return Base64.getEncoder().encodeToString(hash) == parts[1]
        }
    }

