# Scenario: application.properties gains Redis cache configuration (4 new lines).
#   DataSourceConfig and OrderApplication are unchanged.
#
# Diff shows:
#   + spring.cache.type=redis
#   + spring.data.redis.host=${REDIS_HOST:localhost}
#   + spring.data.redis.port=${REDIS_PORT:6379}
#   + spring.data.redis.timeout=2000
#
# Reviewer questions:
#   Q1: "Does DataSourceConfig reference any of the new Redis properties?"
#       -> DataSourceConfig.java (UNCHANGED) only injects spring.datasource.url
#          and server.port via @Value. It does NOT reference Redis properties.
#          Reviewer must see the config class to verify no injection conflicts.
#
#   Q2: "Is there a @Configuration class that creates Redis beans?"
#       -> No Redis config class exists yet in the codebase. Reviewer needs
#          to see existing config classes to identify this gap.
#
# Not needed for comprehension:
#   - OrderApplication.java: @SpringBootApplication main class. Standard
#     Spring Boot entry point. Does not reference any properties directly.
#     Auto-scans components but doesn't help review config additions.
#
#   - OrderController.java: REST controller for orders. Same package,
#     uses @Value for unrelated properties. STRUCTURAL TRAP: another
#     Spring component in the same package with @Value annotation.

max_enrichment: 9.1
initial:
  src/main/resources/application.properties: |
    server.port=8080
    spring.application.name=order-service
    spring.datasource.url=jdbc:postgresql://localhost:5432/orders
    spring.datasource.username=app
    spring.datasource.password=${DB_PASSWORD}
    spring.jpa.hibernate.ddl-auto=validate
    spring.jpa.show-sql=false
    logging.level.root=INFO
    logging.level.com.example=DEBUG
  src/main/java/com/example/orders/config/DataSourceConfig.java: |
    package com.example.orders.config;

    import org.springframework.beans.factory.annotation.Value;
    import org.springframework.context.annotation.Configuration;

    @Configuration
    public class DataSourceConfig {
        @Value("${spring.datasource.url}")
        private String datasourceUrl;

        @Value("${server.port}")
        private int serverPort;

        public String getDatasourceUrl() {
            return datasourceUrl;
        }

        public int getServerPort() {
            return serverPort;
        }
    }
  src/main/java/com/example/orders/OrderApplication.java: |
    package com.example.orders;

    import org.springframework.boot.SpringApplication;
    import org.springframework.boot.autoconfigure.SpringBootApplication;

    @SpringBootApplication
    public class OrderApplication {
        public static void main(String[] args) {
            SpringApplication.run(OrderApplication.class, args);
        }
    }
  src/main/java/com/example/orders/controller/OrderController.java: |
    package com.example.orders.controller;

    import org.springframework.beans.factory.annotation.Value;
    import org.springframework.web.bind.annotation.*;
    import java.util.Map;

    @RestController
    @RequestMapping("/api/orders")
    public class OrderController {
        @Value("${spring.application.name}")
        private String appName;

        @GetMapping("/health")
        public Map<String, String> health() {
            return Map.of("service", appName, "status", "UP");
        }

        @PostMapping
        public Map<String, String> createOrder(@RequestBody Map<String, Object> body) {
            return Map.of("orderId", "ORD-" + System.currentTimeMillis());
        }
    }

