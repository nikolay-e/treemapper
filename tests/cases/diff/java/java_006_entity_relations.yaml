      package com.ordersystem.repository;

      import com.ordersystem.model.Order;
      import com.ordersystem.model.OrderStatus;
      import org.springframework.data.jpa.repository.JpaRepository;
      import org.springframework.data.jpa.repository.Query;
      import org.springframework.stereotype.Repository;
      import java.time.LocalDateTime;
      import java.util.List;
      import java.util.Optional;

      @Repository
      public interface OrderRepository extends JpaRepository<Order, Long> {
          Optional<Order> findByOrderNumber(String orderNumber);

          List<Order> findByCustomerIdAndStatus(Long customerId, OrderStatus status);

          @Query("SELECT o FROM Order o WHERE o.createdAt > :since ORDER BY o.createdAt DESC")
          List<Order> findRecentOrders(LocalDateTime since);

          @Query("SELECT o FROM Order o WHERE o.status = :status AND o.shippedAt IS NULL")
          List<Order> findUnshippedByStatus(OrderStatus status);

          long countByStatus(OrderStatus status);
      }
    src/main/java/com/ordersystem/service/OrderService.java: |
      package com.ordersystem.service;

      import com.ordersystem.model.Order;
      import com.ordersystem.model.OrderItem;
      import com.ordersystem.model.OrderStatus;
      import com.ordersystem.repository.OrderRepository;
      import org.springframework.stereotype.Service;
      import org.springframework.transaction.annotation.Transactional;
      import java.math.BigDecimal;
      import java.time.LocalDateTime;

      @Service
      public class OrderService {
          private final OrderRepository orderRepository;

          public OrderService(OrderRepository orderRepository) {
              this.orderRepository = orderRepository;
          }

          @Transactional
          public Order createOrder(Order order) {
              order.recalculateTotal();
              return orderRepository.save(order);
          }

          @Transactional
          public Order addItemToOrder(Long orderId, OrderItem item) {
              Order order = orderRepository.findById(orderId)
                  .orElseThrow(() -> new RuntimeException("Order not found"));
              order.addItem(item);
              order.recalculateTotal();
              return orderRepository.save(order);
          }

          @Transactional
          public Order updateStatus(Long orderId, OrderStatus newStatus) {
              Order order = orderRepository.findById(orderId)
                  .orElseThrow(() -> new RuntimeException("Order not found"));
              order.setStatus(newStatus);
              if (newStatus == OrderStatus.SHIPPED) {
                  order.setShippedAt(LocalDateTime.now());
              } else if (newStatus == OrderStatus.DELIVERED) {
                  order.setDeliveredAt(LocalDateTime.now());
              }
              return orderRepository.save(order);
          }
      }
