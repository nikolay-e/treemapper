    package com.example.network.cache

    import java.time.Duration
    import java.time.Instant

    class CachePolicy(
        private val maxAge: Duration = Duration.ofMinutes(5),
        private val maxRetries: Int = 3
    ) {
        private val cache = mutableMapOf<String, CacheEntry>()

        fun get(key: String): String? {
            val entry = cache[key] ?: return null
            if (Duration.between(entry.storedAt, Instant.now()) > maxAge) {
                cache.remove(key)
                return null
            }
            return entry.value
        }

        fun put(key: String, value: String) {
            cache[key] = CacheEntry(value, Instant.now())
        }

        fun invalidate(key: String) {
            cache.remove(key)
        }

        private data class CacheEntry(val value: String, val storedAt: Instant)
    }
  src/main/kotlin/com/example/network/logging/NetworkLogger.kt: |
    package com.example.network.logging

    import java.time.Instant

    class NetworkLogger {
        private val logs = mutableListOf<LogEntry>()

        fun logRequest(method: String, url: String) {
            logs.add(LogEntry("REQUEST", "$method $url", Instant.now()))
        }

        fun logResponse(statusCode: Int, body: String) {
            logs.add(LogEntry("RESPONSE", "$statusCode: ${body.take(200)}", Instant.now()))
        }

        fun getRecentLogs(count: Int): List<LogEntry> {
            return logs.takeLast(count)
        }

        data class LogEntry(val type: String, val message: String, val timestamp: Instant)
    }

