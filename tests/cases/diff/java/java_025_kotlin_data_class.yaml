          val price: Double,
          val description: String = "",
          val category: String = "general",
          val active: Boolean = true
      )
    src/main/kotlin/com/example/catalog/mapper/ProductMapper.kt: |
      package com.example.catalog.mapper

      import com.example.catalog.model.Product
      import com.example.catalog.dto.ProductDto

      object ProductMapper {
          fun toDto(product: Product): ProductDto {
              return ProductDto(
                  id = product.id,
                  name = product.name,
                  displayPrice = "$${product.price}",
                  category = product.category
              )
          }

          fun toDomain(dto: ProductDto): Product {
              return Product(
                  id = dto.id,
                  name = dto.name,
                  price = dto.displayPrice.removePrefix("$").toDouble(),
                  category = dto.category
              )
          }
      }
    src/main/kotlin/com/example/catalog/dto/ProductDto.kt: |
      package com.example.catalog.dto

      data class ProductDto(
          val id: Long,
          val name: String,
          val displayPrice: String,
          val category: String = "general"
      )
    src/main/kotlin/com/example/catalog/repository/ProductRepository.kt: |
      package com.example.catalog.repository

      import com.example.catalog.model.Product

      interface ProductRepository {
          fun findById(id: Long): Product?
          fun findAll(): List<Product>
          fun save(product: Product): Product
          fun deleteById(id: Long)
          fun findByCategory(category: String): List<Product>
      }
    src/main/kotlin/com/example/catalog/validator/ProductValidator.kt: |
      package com.example.catalog.validator

      import com.example.catalog.model.Product

      class ProductValidator {
          fun validate(product: Product): List<String> {
              val errors = mutableListOf<String>()
              if (product.name.isBlank()) errors.add("Name must not be blank")
              if (product.price <= 0) errors.add("Price must be positive")
              return errors
          }

          fun isValid(product: Product): Boolean = validate(product).isEmpty()
      }
