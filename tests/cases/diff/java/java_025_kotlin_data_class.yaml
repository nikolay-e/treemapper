# Scenario: Product data class gains description, category, active fields.
#   ProductMapper and ProductDto are updated to include category.
#
# Diff shows:
#   Product.kt: + description: String = "", + category: String = "general", + active: Boolean = true
#   ProductMapper.kt: toDto adds category = product.category, toDomain adds category = dto.category
#   ProductDto.kt: + val category: String = "general"
#
# Reviewer questions:
#   Q1: "Does ProductMapper correctly map the new category field both ways?"
#       -> Product.kt defines category: String. ProductDto.kt defines category: String.
#          ProductMapper maps product.category -> dto and dto.category -> domain.
#          Reviewer must see all three to verify bidirectional mapping.
#
#   Q2: "Are description and active mapped — or intentionally omitted from DTO?"
#       -> Product.kt has description and active. ProductDto.kt does NOT add them.
#          ProductMapper does NOT map them. Reviewer needs both classes to assess
#          whether this is intentional or a bug.
#
# Not needed for comprehension:
#   - ProductRepository.kt: Database access returning Product entities.
#     DIRECT TYPE OVERLAP: uses Product. But persistence layer doesn't help
#     review mapper field mapping correctness.
#
#   - ProductValidator.kt: Validates Product fields (price > 0, name non-empty).
#     Uses Product but validates business rules, not field mapping.

initial:
  src/main/kotlin/com/example/catalog/model/Product.kt: |
    package com.example.catalog.model

    data class Product(
        val id: Long,
        val name: String,
        val price: Double
    )
  src/main/kotlin/com/example/catalog/mapper/ProductMapper.kt: |
    package com.example.catalog.mapper

    import com.example.catalog.model.Product
    import com.example.catalog.dto.ProductDto

    object ProductMapper {
        fun toDto(product: Product): ProductDto {
            return ProductDto(
                id = product.id,
                name = product.name,
                displayPrice = "$${product.price}"
            )
        }

        fun toDomain(dto: ProductDto): Product {
            return Product(
                id = dto.id,
                name = dto.name,
                price = dto.displayPrice.removePrefix("$").toDouble()
            )
        }
    }
  src/main/kotlin/com/example/catalog/dto/ProductDto.kt: |
    package com.example.catalog.dto

    data class ProductDto(
        val id: Long,
        val name: String,
        val displayPrice: String
    )
  src/main/kotlin/com/example/catalog/repository/ProductRepository.kt: |
    package com.example.catalog.repository

    import com.example.catalog.model.Product

    interface ProductRepository {
        fun findById(id: Long): Product?
        fun findAll(): List<Product>
        fun save(product: Product): Product
        fun deleteById(id: Long)
        fun findByCategory(category: String): List<Product>
    }
  src/main/kotlin/com/example/catalog/validator/ProductValidator.kt: |
    package com.example.catalog.validator

    import com.example.catalog.model.Product

    class ProductValidator {
        fun validate(product: Product): List<String> {
            val errors = mutableListOf<String>()
            if (product.name.isBlank()) errors.add("Name must not be blank")
            if (product.price <= 0) errors.add("Price must be positive")
            return errors
        }

        fun isValid(product: Product): Boolean = validate(product).isEmpty()
    }

