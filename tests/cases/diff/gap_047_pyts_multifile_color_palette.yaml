    ui/palette.ts: |
      interface RGB {
        red: number;
        green: number;
        blue: number;
      }

      interface PaletteEntry {
        name: string;
        color: RGB;
      }

      function rgbToHex(color: RGB): string {
        const r = color.red.toString(16).padStart(2, "0");
        const g = color.green.toString(16).padStart(2, "0");
        const b = color.blue.toString(16).padStart(2, "0");
        return `#${r}${g}${b}`;
      }

      function luminance(color: RGB): number {
        return 0.299 * color.red + 0.587 * color.green + 0.114 * color.blue;
      }

      function isLight(color: RGB): boolean {
        return luminance(color) > 128;
      }
    ui/render.ts: |
      function renderSwatch(hex: string, label: string): string {
        return `<div style="background:${hex}">${label}</div>`;
      }

      function renderPalette(entries: PaletteEntry[]): string {
        return entries
          .map((e) => renderSwatch(rgbToHex(e.color), e.name))
          .join("\n");
      }
  changed_files:
    api/colors.py: |
      from dataclasses import dataclass

      @dataclass
      class RGB:
          red: int
          green: int
          blue: int
          alpha: float = 1.0

      class Palette:
          def __init__(self):
              self._colors: dict[str, RGB] = {}

          def add(self, name: str, color: RGB) -> None:
              self._colors[name] = color

          def get(self, name: str) -> RGB:
              return self._colors[name]

          def names(self) -> list[str]:
              return sorted(self._colors.keys())

          def to_hex(self, name: str) -> str:
              c = self._colors[name]
              return f"#{c.red:02x}{c.green:02x}{c.blue:02x}"

          def blend(self, name_a: str, name_b: str, ratio: float = 0.5) -> RGB:
              a = self._colors[name_a]
              b = self._colors[name_b]
              return RGB(
                  red=int(a.red * ratio + b.red * (1 - ratio)),
                  green=int(a.green * ratio + b.green * (1 - ratio)),
                  blue=int(a.blue * ratio + b.blue * (1 - ratio)),
                  alpha=a.alpha * ratio + b.alpha * (1 - ratio),
              )
    ui/palette.ts: |
      interface RGB {
        red: number;
        green: number;
        blue: number;
        alpha: number;
      }

      interface PaletteEntry {
        name: string;
        color: RGB;
      }

      function rgbToHex(color: RGB): string {
        const r = color.red.toString(16).padStart(2, "0");
        const g = color.green.toString(16).padStart(2, "0");
        const b = color.blue.toString(16).padStart(2, "0");
        return `#${r}${g}${b}`;
      }

      function rgbToRgba(color: RGB): string {
        return `rgba(${color.red},${color.green},${color.blue},${color.alpha})`;
      }

      function luminance(color: RGB): number {
        return 0.299 * color.red + 0.587 * color.green + 0.114 * color.blue;
      }

      function isLight(color: RGB): boolean {
        return luminance(color) > 128;
      }
    ui/render.ts: |
      function renderSwatch(hex: string, label: string): string {
        return `<div style="background:${hex}">${label}</div>`;
      }

      function renderPalette(entries: PaletteEntry[]): string {
        return entries
          .map((e) => renderSwatch(rgbToHex(e.color), e.name))
          .join("\n");
      }
