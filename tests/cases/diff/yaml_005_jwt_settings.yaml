name: yaml_005_jwt_settings
repo:
  initial_files:
    config/auth.yaml: |
      jwt:
        secret_key: dev-secret
        algorithm: HS256
        expiration_hours: 24
    src/auth.py: |
      import jwt
      from datetime import datetime, timedelta

      def create_token(payload: dict, secret: str, algorithm: str = "HS256") -> str:
          expiry = datetime.utcnow() + timedelta(hours=24)
          payload["exp"] = expiry
          return jwt.encode(payload, secret, algorithm=algorithm)

      def verify_token(token: str, secret: str, algorithm: str = "HS256") -> dict:
          return jwt.decode(token, secret, algorithms=[algorithm])

      def refresh_token(token: str, secret: str, algorithm: str = "HS256") -> str:
          payload = verify_token(token, secret, algorithm)
          del payload["exp"]
          return create_token(payload, secret, algorithm)
    src/middleware/auth_middleware.py: |
      from src.auth import verify_token
      from src.config_loader import load_config

      class AuthMiddleware:
          def __init__(self):
              config = load_config("config/auth.yaml")
              self.secret = config["jwt"]["secret_key"]
              self.algorithm = config["jwt"].get("algorithm", "HS256")

          def authenticate(self, request):
              token = request.headers.get("Authorization", "").replace("Bearer ", "")
              if not token:
                  raise AuthError("Missing token")
              try:
                  payload = verify_token(token, self.secret, self.algorithm)
                  request.user = payload
              except Exception as e:
                  raise AuthError(f"Invalid token: {e}")
              return request

      class AuthError(Exception):
          pass
    config/oauth.yaml: |
      oauth:
        providers:
          google:
            client_id: google-client-id
            client_secret: google-client-secret
            redirect_uri: https://example.com/callback/google
          github:
            client_id: github-client-id
            client_secret: github-client-secret
            redirect_uri: https://example.com/callback/github
    src/password.py: |
      import hashlib
      import secrets

      def hash_password(password: str) -> tuple[str, str]:
          salt = secrets.token_hex(16)
          hashed = hashlib.pbkdf2_hmac("sha256", password.encode(), salt.encode(), 100000)
          return hashed.hex(), salt

      def verify_password(password: str, hashed: str, salt: str) -> bool:
          check = hashlib.pbkdf2_hmac("sha256", password.encode(), salt.encode(), 100000)
          return check.hex() == hashed
    src/session.py: |
      import redis
      from src.auth import create_token, verify_token

      class SessionManager:
          def __init__(self, redis_url: str, secret: str):
              self.redis = redis.from_url(redis_url)
              self.secret = secret

          def create_session(self, user_id: str) -> str:
              token = create_token({"user_id": user_id}, self.secret)
              self.redis.setex(f"session:{user_id}", 86400, token)
              return token

          def invalidate_session(self, user_id: str):
              self.redis.delete(f"session:{user_id}")

          def is_valid(self, user_id: str) -> bool:
              return self.redis.exists(f"session:{user_id}") > 0
    tests/test_auth.py: |
      import pytest
      from src.auth import create_token, verify_token, refresh_token

      class TestAuth:
          def test_create_and_verify_token(self):
              token = create_token({"user_id": "123"}, "test-secret")
              payload = verify_token(token, "test-secret")
              assert payload["user_id"] == "123"

          def test_invalid_secret_raises(self):
              token = create_token({"user_id": "123"}, "secret-a")
              with pytest.raises(Exception):
                  verify_token(token, "secret-b")

          def test_refresh_preserves_claims(self):
              token = create_token({"user_id": "456", "role": "admin"}, "secret")
              new_token = refresh_token(token, "secret")
              payload = verify_token(new_token, "secret")
              assert payload["role"] == "admin"
    config/cors.yaml: |
      cors:
        allowed_origins:
          - https://app.example.com
          - https://admin.example.com
        allowed_methods:
          - GET
          - POST
          - PUT
          - DELETE
        allowed_headers:
          - Authorization
          - Content-Type
        max_age: 3600
