      from typing import List, Callable, Any
      from src.pipeline.stage import Stage, StageResult

      class PipelineExecutor:
          def __init__(self, name: str, max_retries: int = 0):
              self.name = name
              self.max_retries = max_retries
              self._stages: List[Stage] = []

          def add_stage(self, stage: Stage) -> None:
              self._stages.append(stage)

          def run_with_retry(self, stage: Stage, payload: Any) -> StageResult:
              last_result = None
              for attempt in range(self.max_retries + 1):
                  last_result = stage.execute(payload)
                  if last_result.success:
                      return last_result
              return last_result

          def run(self, payload: Any) -> Any:
              current = payload
              for stage in self._stages:
                  result = self.run_with_retry(stage, current)
                  if not result.success:
                      raise RuntimeError(f"Stage {stage.label} failed: {result.error}")
                  current = result.output
              return current

          def dry_run(self, payload: Any) -> List[str]:
              labels = []
              for stage in self._stages:
                  labels.append(stage.label)
              return labels

          def stage_count(self) -> int:
              return len(self._stages)
