    src/pipeline/stage.py: |
      from typing import Any, Callable, Optional
      from dataclasses import dataclass

      @dataclass
      class StageResult:
          success: bool
          output: Any
          error: Optional[str] = None

      class Stage:
          def __init__(self, label: str, handler: Callable):
              self.label = label
              self.handler = handler

          def execute(self, payload: Any) -> StageResult:
              try:
                  output = self.handler(payload)
                  return StageResult(success=True, output=output)
              except Exception as e:
                  return StageResult(success=False, output=None, error=str(e))
