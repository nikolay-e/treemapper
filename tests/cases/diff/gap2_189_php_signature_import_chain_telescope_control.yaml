repo:
  initial_files:
    src/Observatory/TelescopeController.php: |
      <?php

      namespace App\Observatory;

      use App\Observatory\Mount\EquatorialMount;

      class TelescopeController
      {
          private EquatorialMount $mount;

          public function __construct(EquatorialMount $mount)
          {
              $this->mount = $mount;
          }

          public function pointAt(float $ra, float $dec): bool
          {
              return $this->mount->slew($ra, $dec);
          }

          public function currentPosition(): array
          {
              return $this->mount->coordinates();
          }
      }
    src/Observatory/Mount/EquatorialMount.php: |
      <?php

      namespace App\Observatory\Mount;

      use App\Observatory\Mount\StepperMotor;

      class EquatorialMount
      {
          private StepperMotor $raMotor;
          private StepperMotor $decMotor;

          public function __construct(StepperMotor $raMotor, StepperMotor $decMotor)
          {
              $this->raMotor = $raMotor;
              $this->decMotor = $decMotor;
          }

          public function slew(float $ra, float $dec): bool
          {
              $this->raMotor->moveTo($ra);
              $this->decMotor->moveTo($dec);
              return true;
          }

          public function coordinates(): array
          {
              return ['ra' => $this->raMotor->position(), 'dec' => $this->decMotor->position()];
          }
      }
    src/Observatory/Mount/StepperMotor.php: |
      <?php

      namespace App\Observatory\Mount;

      class StepperMotor
      {
          private float $pos = 0.0;

          public function moveTo(float $target): void
          {
              $this->pos = $target;
          }

          public function position(): float
          {
              return $this->pos;
          }
      }
    src/Weather/SkyCondition.php: |
      <?php

      namespace App\Weather;

      class SkyCondition
      {
          public function cloudCover(): float
          {
              return 0.3;
          }
      }
  changed_files:
    src/Observatory/TelescopeController.php: |
