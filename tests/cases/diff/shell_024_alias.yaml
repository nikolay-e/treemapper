name: shell_024_alias
repo:
  initial_files:
    lib/aliases.sh: |
      #!/bin/bash

      alias ll='ls -la'
      alias la='ls -A'
      alias grep='grep --color=auto'
      alias df='df -h'

      alias gs='git status'
      alias gc='git commit'
      alias gp='git push'
      alias gl='git log --oneline -10'
    interactive.sh: |
      #!/bin/bash
      shopt -s expand_aliases
      source ./lib/aliases.sh

      echo "Aliases loaded successfully"
    completions.sh: |
      #!/bin/bash

      _complete_deploy() {
          local cur="${COMP_WORDS[COMP_CWORD]}"
          COMPREPLY=( $(compgen -W "staging production canary" -- "$cur") )
      }
      complete -F _complete_deploy deploy

      _complete_service() {
          local cur="${COMP_WORDS[COMP_CWORD]}"
          COMPREPLY=( $(compgen -W "start stop restart status" -- "$cur") )
      }
      complete -F _complete_service svc
    keybindings.sh: |
      #!/bin/bash

      bind '"\e[A": history-search-backward'
      bind '"\e[B": history-search-forward'
      bind '"\C-r": reverse-search-history'

      setup_vi_mode() {
          set -o vi
          bind -m vi-insert '"\C-l": clear-screen'
      }
    scripts/git_workflow.sh: |
      #!/bin/bash
      shopt -s expand_aliases
      source ./lib/aliases.sh

      echo "=== Daily Git Workflow ==="
      gs
      echo "---"
      gl

      read -p "Commit message: " msg
      gc -m "$msg"
      gp

      echo "=== Updated Status ==="
      gs
    scripts/shell_setup.sh: |
      #!/bin/bash
      shopt -s expand_aliases

      echo "Loading shell environment..."
      source ./lib/aliases.sh
      source ./completions.sh
      source ./keybindings.sh

      echo "Shell setup complete"
      echo "Aliases: ll, la, gs, gc, gp, gl"
      echo "Completions: deploy, svc"
      echo "Keybindings: vi-mode ready"
    lib/git_aliases.sh: |
      #!/bin/bash

      alias gd='git diff'
      alias gds='git diff --staged'
      alias gb='git branch'
      alias gco='git checkout'
      alias gst='git stash'
      alias gsp='git stash pop'
      alias glog='git log --graph --oneline --all'
  changed_files:
    lib/aliases.sh: |
      #!/bin/bash

      alias ll='ls -la'
      alias la='ls -A'
      alias grep='grep --color=auto'
      alias df='df -h'

      alias gs='git status'
      alias gc='git commit'
      alias gp='git push'
      alias gl='git log --oneline -10'
    interactive.sh: |
      #!/bin/bash
      shopt -s expand_aliases
      source ./lib/aliases.sh

      echo "=== Directory listing ==="
      ll /tmp

      echo "=== Git status ==="
      gs

      echo "=== Disk usage ==="
      df
    completions.sh: |
      #!/bin/bash

      _complete_deploy() {
          local cur="${COMP_WORDS[COMP_CWORD]}"
          COMPREPLY=( $(compgen -W "staging production canary" -- "$cur") )
      }
      complete -F _complete_deploy deploy

      _complete_service() {
          local cur="${COMP_WORDS[COMP_CWORD]}"
          COMPREPLY=( $(compgen -W "start stop restart status" -- "$cur") )
      }
      complete -F _complete_service svc
    keybindings.sh: |
      #!/bin/bash

      bind '"\e[A": history-search-backward'
      bind '"\e[B": history-search-forward'
      bind '"\C-r": reverse-search-history'

      setup_vi_mode() {
          set -o vi
          bind -m vi-insert '"\C-l": clear-screen'
      }
    scripts/git_workflow.sh: |
      #!/bin/bash
      shopt -s expand_aliases
      source ./lib/aliases.sh

      echo "=== Daily Git Workflow ==="
      gs
      echo "---"
      gl

      read -p "Commit message: " msg
      gc -m "$msg"
      gp

      echo "=== Updated Status ==="
      gs
    scripts/shell_setup.sh: |
      #!/bin/bash
      shopt -s expand_aliases

      echo "Loading shell environment..."
      source ./lib/aliases.sh
      source ./completions.sh
      source ./keybindings.sh

      echo "Shell setup complete"
      echo "Aliases: ll, la, gs, gc, gp, gl"
      echo "Completions: deploy, svc"
      echo "Keybindings: vi-mode ready"
    lib/git_aliases.sh: |
      #!/bin/bash

      alias gd='git diff'
      alias gds='git diff --staged'
      alias gb='git branch'
      alias gco='git checkout'
      alias gst='git stash'
      alias gsp='git stash pop'
      alias glog='git log --graph --oneline --all'
  commit_message: Update files
