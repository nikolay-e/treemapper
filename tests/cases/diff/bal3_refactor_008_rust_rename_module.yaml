      fn test_retry_succeeds_on_third_attempt() {
          let policy = RetryPolicy::new(3, BackoffStrategy::Fixed(0));
          let executor = RetryExecutor::new(policy);
          let mut calls = 0;
          let result: Result<&str, &str> = executor.execute(|| {
              calls += 1;
              if calls < 3 { Err("fail") } else { Ok("ok") }
          });
          assert_eq!(result, Ok("ok"));
      }

      #[test]
      fn test_retry_exhausted_returns_last_error() {
          let policy = RetryPolicy::new(2, BackoffStrategy::Fixed(0));
          let executor = RetryExecutor::new(policy);
          let result: Result<&str, &str> = executor.execute(|| Err("always_fails"));
          assert_eq!(result, Err("always_fails"));
      }

      #[test]
      fn test_exponential_backoff_caps_at_max() {
          let strategy = BackoffStrategy::Exponential { base_ms: 100, max_ms: 500 };
          let delay = strategy.compute(10);
          assert!(delay.as_millis() <= 500);
      }
