    src/retry/policy.rs: |
      use crate::retry::backoff::BackoffStrategy;

      pub struct RetryPolicy {
          pub max_attempts: u32,
          pub backoff: BackoffStrategy,
      }

      impl RetryPolicy {
          pub fn new(max_attempts: u32, backoff: BackoffStrategy) -> Self {
              Self { max_attempts, backoff }
          }

          pub fn should_retry(&self, attempt: u32) -> bool {
              attempt < self.max_attempts
          }

          pub fn delay_for_attempt(&self, attempt: u32) -> std::time::Duration {
              self.backoff.compute(attempt)
          }
      }
    src/retry/backoff.rs: |
      pub enum BackoffStrategy {
          Fixed(u64),
          Exponential { base_ms: u64, max_ms: u64 },
      }

      impl BackoffStrategy {
          pub fn compute(&self, attempt: u32) -> std::time::Duration {
              match self {
                  BackoffStrategy::Fixed(ms) => std::time::Duration::from_millis(*ms),
                  BackoffStrategy::Exponential { base_ms, max_ms } => {
                      let ms = base_ms * 2u64.pow(attempt);
                      std::time::Duration::from_millis(ms.min(*max_ms))
                  }
              }
          }
      }
    src/retry/executor.rs: |
      use crate::retry::policy::RetryPolicy;

      pub struct RetryExecutor {
          policy: RetryPolicy,
      }

      impl RetryExecutor {
          pub fn new(policy: RetryPolicy) -> Self {
              Self { policy }
          }

          pub fn execute<F, T, E>(&self, mut operation: F) -> Result<T, E>
          where
              F: FnMut() -> Result<T, E>,
          {
              let mut attempt = 0;
              loop {
                  match operation() {
                      Ok(v) => return Ok(v),
                      Err(e) if self.policy.should_retry(attempt) => {
                          attempt += 1;
                      }
                      Err(e) => return Err(e),
                  }
              }
          }
      }
    tests/test_retry.rs: |
      use crate::retry::policy::RetryPolicy;
      use crate::retry::backoff::BackoffStrategy;
      use crate::retry::executor::RetryExecutor;

      #[test]
      fn test_retry_succeeds_on_third_attempt() {
          let policy = RetryPolicy::new(3, BackoffStrategy::Fixed(0));
          let executor = RetryExecutor::new(policy);
          let mut calls = 0;
          let result: Result<&str, &str> = executor.execute(|| {
              calls += 1;
              if calls < 3 { Err("fail") } else { Ok("ok") }
          });
          assert_eq!(result, Ok("ok"));
      }
