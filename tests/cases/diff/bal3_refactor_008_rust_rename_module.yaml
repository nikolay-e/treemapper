      pub enum BackoffStrategy {
          Fixed(u64),
          Exponential { base_ms: u64, max_ms: u64 },
      }

      impl BackoffStrategy {
          pub fn compute(&self, attempt: u32) -> std::time::Duration {
              match self {
                  BackoffStrategy::Fixed(ms) => std::time::Duration::from_millis(*ms),
                  BackoffStrategy::Exponential { base_ms, max_ms } => {
