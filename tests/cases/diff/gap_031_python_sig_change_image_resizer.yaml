  changed_files:
    imaging/transform.py: |
      from typing import NamedTuple
      from enum import Enum

      class Dimensions(NamedTuple):
          width: int
          height: int

      class FitMode(Enum):
          CONTAIN = "contain"
          COVER = "cover"
          STRETCH = "stretch"

      def resize(original: Dimensions, max_side: int, mode: FitMode = FitMode.CONTAIN) -> Dimensions:
          if mode == FitMode.STRETCH:
              return Dimensions(width=max_side, height=max_side)
          if mode == FitMode.COVER:
              ratio = max(max_side / original.width, max_side / original.height)
          else:
              ratio = min(max_side / original.width, max_side / original.height)
          return Dimensions(
              width=int(original.width * ratio),
              height=int(original.height * ratio),
          )
  commit_message: "add FitMode parameter to resize function"
