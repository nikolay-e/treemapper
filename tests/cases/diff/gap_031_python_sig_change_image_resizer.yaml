    imaging/transform.py: |
      from typing import NamedTuple

      class Dimensions(NamedTuple):
          width: int
          height: int

      def resize(original: Dimensions, max_side: int) -> Dimensions:
          ratio = min(max_side / original.width, max_side / original.height)
          return Dimensions(
              width=int(original.width * ratio),
              height=int(original.height * ratio),
          )
    imaging/pipeline.py: |
      from imaging.transform import resize, Dimensions

      class ImagePipeline:
          def __init__(self, max_side: int = 1024):
              self.max_side = max_side
              self.processed: list[Dimensions] = []

          def process(self, width: int, height: int) -> Dimensions:
              original = Dimensions(width, height)
              result = resize(original, self.max_side)
              self.processed.append(result)
              return result
    imaging/api.py: |
      from imaging.pipeline import ImagePipeline

      class ImageAPI:
          def __init__(self):
              self.pipeline = ImagePipeline(max_side=2048)

          def handle_upload(self, width: int, height: int) -> dict:
              resized = self.pipeline.process(width, height)
              return {"width": resized.width, "height": resized.height}
