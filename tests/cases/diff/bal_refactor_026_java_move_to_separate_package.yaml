repo:
  initial_files:
    src/main/java/com/app/service/PaymentService.java: |
      package com.app.service;

      import java.time.LocalDateTime;

      public class PaymentService {
          public double calculateTax(double amount, String region) {
              switch (region) {
                  case "US": return amount * 0.08;
                  case "EU": return amount * 0.20;
                  case "UK": return amount * 0.20;
                  default: return 0;
              }
          }

          public String processPayment(double amount, String region) {
              double tax = calculateTax(amount, region);
              double total = amount + tax;
              return String.format("Charged %.2f at %s", total, LocalDateTime.now());
          }
      }
    src/main/java/com/app/service/InvoiceService.java: |
      package com.app.service;

      public class InvoiceService {
          private final PaymentService paymentService;

          public InvoiceService(PaymentService paymentService) {
              this.paymentService = paymentService;
          }

          public double getInvoiceTax(double subtotal, String region) {
              return paymentService.calculateTax(subtotal, region);
          }
      }
    src/main/java/com/app/controller/CheckoutController.java: |
      package com.app.controller;

      import com.app.service.PaymentService;

      public class CheckoutController {
          private final PaymentService paymentService;

          public CheckoutController(PaymentService paymentService) {
              this.paymentService = paymentService;
          }

          public String checkout(double amount, String region) {
              return paymentService.processPayment(amount, region);
          }
      }
