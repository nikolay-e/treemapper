      import json

      class EventSerializer:
          def to_json(self, event_type: str, data: dict) -> str:
              return json.dumps({"type": event_type, "payload": data})

          def from_json(self, raw: str) -> tuple[str, dict]:
              parsed = json.loads(raw)
              return parsed["type"], parsed["payload"]
  changed_files:
    events/bus.py: |
      import threading
      from typing import Callable

      class EventBus:
          def __init__(self):
              self._lock = threading.RLock()
              self._listeners: dict[str, list[Callable]] = {}
              self._dispatching = threading.local()

          def subscribe(self, event_type: str, handler: Callable) -> None:
              with self._lock:
                  if event_type not in self._listeners:
                      self._listeners[event_type] = []
                  self._listeners[event_type].append(handler)

          def publish(self, event_type: str, data: dict) -> None:
              with self._lock:
                  handlers = list(self._listeners.get(event_type, []))
              depth = getattr(self._dispatching, "depth", 0)
              if depth > 10:
                  raise RecursionError(f"Event dispatch depth exceeded for {event_type}")
              self._dispatching.depth = depth + 1
              try:
                  for handler in handlers:
                      handler(data)
              finally:
                  self._dispatching.depth = depth

          def unsubscribe(self, event_type: str, handler: Callable) -> None:
              with self._lock:
                  listeners = self._listeners.get(event_type, [])
                  self._listeners[event_type] = [h for h in listeners if h != handler]

          def clear(self) -> None:
              with self._lock:
                  self._listeners.clear()
