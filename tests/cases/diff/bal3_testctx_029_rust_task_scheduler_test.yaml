    tests/scheduler_test.rs: |
      use mylib::task::{Task, Priority};
      use mylib::scheduler::Scheduler;

      #[test]
      fn test_add_and_next() {
          let mut sched = Scheduler::new();
          sched.add(Task::new(1, "task1", Priority::Medium));
          let task = sched.next().unwrap();
          assert_eq!(task.id, 1);
      }

      #[test]
      fn test_next_empty() {
          let mut sched = Scheduler::new();
          assert!(sched.next().is_none());
      }

      #[test]
      fn test_pending_count() {
          let mut sched = Scheduler::new();
          sched.add(Task::new(1, "a", Priority::Low));
          sched.add(Task::new(2, "b", Priority::High));
          assert_eq!(sched.pending_count(), 2);
      }
