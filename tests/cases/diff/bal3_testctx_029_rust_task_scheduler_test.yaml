  changed_files:
    src/scheduler.rs: |
      use crate::task::{Task, Priority};

      pub struct Scheduler {
          tasks: Vec<Task>,
          completed: Vec<Task>,
      }

      impl Scheduler {
          pub fn new() -> Self {
              Scheduler {
                  tasks: Vec::new(),
                  completed: Vec::new(),
              }
          }

          pub fn add(&mut self, task: Task) {
              self.tasks.push(task);
              self.tasks.sort_by(|a, b| priority_rank(&b.priority).cmp(&priority_rank(&a.priority)));
          }

          pub fn next(&mut self) -> Option<Task> {
              if self.tasks.is_empty() {
                  return None;
              }
              Some(self.tasks.remove(0))
          }

          pub fn complete(&mut self, task: Task) {
              self.completed.push(task);
          }

          pub fn pending_count(&self) -> usize {
              self.tasks.len()
          }

          pub fn completed_count(&self) -> usize {
              self.completed.len()
          }

          pub fn cancel(&mut self, task_id: u32) -> Option<Task> {
              if let Some(pos) = self.tasks.iter().position(|t| t.id == task_id) {
                  Some(self.tasks.remove(pos))
              } else {
                  None
              }
          }
      }

      fn priority_rank(p: &Priority) -> u8 {
          match p {
              Priority::Low => 0,
              Priority::Medium => 1,
              Priority::High => 2,
          }
      }
    src/task.rs: |
      #[derive(Debug, Clone, PartialEq)]
      pub enum Priority {
          Low,
          Medium,
          High,
      }

      #[derive(Debug, Clone, PartialEq)]
      pub enum Status {
          Pending,
          Running,
          Completed,
          Cancelled,
      }

      #[derive(Debug, Clone)]
      pub struct Task {
          pub id: u32,
          pub name: String,
          pub priority: Priority,
          pub status: Status,
      }

      impl Task {
          pub fn new(id: u32, name: &str, priority: Priority) -> Self {
              Task {
                  id,
                  name: name.to_string(),
                  priority,
                  status: Status::Pending,
              }
          }
      }
  commit_message: "feat: priority sorting, complete, cancel, status tracking"
