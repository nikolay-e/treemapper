    lib/music/player.rb: |
      require_relative 'playlist'

      module Music
        class Player
          def initialize(playlist)
            @playlist = playlist
            @current_index = 0
            @shuffle = false
            @play_order = nil
          end

          def current_track
            order = effective_order
            return nil if order.empty?
            order[@current_index % order.length]
          end

          def next_track
            @current_index += 1
            current_track
          end

          def toggle_shuffle
            @shuffle = !@shuffle
            @play_order = nil
            @shuffle
          end

          private

          def effective_order
            tracks = @playlist.tracks
            return tracks unless @shuffle
            @play_order ||= tracks.shuffle
          end
        end
      end
