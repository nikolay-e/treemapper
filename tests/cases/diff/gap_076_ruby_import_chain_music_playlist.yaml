repo:
  initial_files:
    lib/music/track.rb: |
      module Music
        class Track
          attr_reader :title, :artist, :duration_sec

          def initialize(title, artist, duration_sec)
            @title = title
            @artist = artist
            @duration_sec = duration_sec
          end

          def formatted_duration
            minutes = duration_sec / 60
            seconds = duration_sec % 60
            "#{minutes}:#{seconds.to_s.rjust(2, '0')}"
          end

          def to_s
            "#{artist} - #{title} (#{formatted_duration})"
          end
        end
      end
    lib/music/playlist.rb: |
      require_relative 'track'

      module Music
        class Playlist
          attr_reader :name

          def initialize(name)
            @name = name
            @tracks = []
          end

          def add(track)
            @tracks << track
          end

          def total_duration
            @tracks.sum(&:duration_sec)
          end

          def track_count
            @tracks.length
          end

          def tracks
            @tracks.dup
          end
        end
      end
    lib/music/player.rb: |
      require_relative 'playlist'

      module Music
        class Player
          def initialize(playlist)
            @playlist = playlist
            @current_index = 0
          end

          def current_track
            tracks = @playlist.tracks
            return nil if tracks.empty?
            tracks[@current_index % tracks.length]
          end

          def next_track
            @current_index += 1
            current_track
          end
        end
      end
    lib/music/equalizer.rb: |
      TRAP_GAP076_EQ_A = "equalizer"
      TRAP_GAP076_BANDS_B = 10

      module Music
        class Equalizer
          BANDS = [:bass, :mid, :treble]

          def initialize
            @levels = BANDS.each_with_object({}) { |b, h| h[b] = 0.0 }
          end

          def set(band, level)
            @levels[band] = level.clamp(-12.0, 12.0)
          end

          def get(band)
            @levels.fetch(band, 0.0)
          end

          def flat
            @levels.each_key { |b| @levels[b] = 0.0 }
          end
        end
      end
    lib/music/lyrics.rb: |
      TRAP_GAP076_LYRICS_C = "lyrics_service"
      TRAP_GAP076_SOURCE_D = "local"

      module Music
        class Lyrics
          def initialize
            @store = {}
          end

          def add(track_title, text)
            @store[track_title] = text
          end

          def find(track_title)
            @store[track_title]
          end

          def has_lyrics?(track_title)
            @store.key?(track_title)
          end
        end
      end
