name: cicd_and_docs_065_sql_migration_adds_table
tags:
- lang:python
- lang:sql
- change:multi_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    migrations/001_create_orders.sql: |
      CREATE TABLE orders (
          id SERIAL PRIMARY KEY,
          user_id INTEGER REFERENCES users(id),
          total DECIMAL(10, 2),
          status VARCHAR(50) DEFAULT 'pending',
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE INDEX idx_orders_user_id ON orders(user_id);
      CREATE INDEX idx_orders_status ON orders(status);
    src/models/order.py: |
      from dataclasses import dataclass
      from datetime import datetime
      from decimal import Decimal
      from typing import Optional

      @dataclass
      class Order:
          id: int
          user_id: int
          total: Decimal
          status: str = 'pending'
          created_at: Optional[datetime] = None
    src/repositories/order_repository.py: |
      from typing import List, Optional
      from models.order import Order

      class OrderRepository:
          def find_by_user(self, user_id: int) -> List[Order]:
              results = db.execute(
                  "SELECT * FROM orders WHERE user_id = %s",
                  (user_id,)
              )
              return [Order(**r) for r in results]
    src/models/user.py: |
      from dataclasses import dataclass
      from datetime import datetime
      from typing import Optional

      @dataclass
      class User:
          id: int
          name: str
          email: str
          created_at: Optional[datetime] = None
    src/services/shipping_service.py: |
      from typing import Optional

      class ShippingService:
          def calculate_shipping(self, weight: float, destination: str) -> float:
              base_rate = 5.99
              per_kg = 1.50
              return base_rate + (weight * per_kg)

          def get_tracking(self, shipment_id: str) -> Optional[str]:
              return None
  changed_files:
    migrations/002_create_order_items.sql: |
      CREATE TABLE order_items (
          id SERIAL PRIMARY KEY,
          order_id INTEGER REFERENCES orders(id) ON DELETE CASCADE,
          product_id INTEGER NOT NULL,
          product_name VARCHAR(255) NOT NULL,
          quantity INTEGER NOT NULL CHECK (quantity > 0),
          unit_price DECIMAL(10, 2) NOT NULL,
          subtotal DECIMAL(10, 2) GENERATED ALWAYS AS (quantity * unit_price) STORED,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE INDEX idx_order_items_order_id ON order_items(order_id);
      CREATE INDEX idx_order_items_product_id ON order_items(product_id);
    src/models/order_item.py: |
      from dataclasses import dataclass
      from datetime import datetime
      from decimal import Decimal
      from typing import Optional

      @dataclass
      class OrderItem:
          id: int
          order_id: int
          product_id: int
          product_name: str
          quantity: int
          unit_price: Decimal
          subtotal: Optional[Decimal] = None
          created_at: Optional[datetime] = None
  commit_message: "Add order_items table and model with FK to orders"
fragments:
- id: new_migration
  selector:
    path: migrations/002_create_order_items.sql
- id: create_order_items_table
  selector:
    anchor: CREATE TABLE order_items (
- id: order_item_model
  selector:
    path: src/models/order_item.py
    anchor: class OrderItem
- id: orders_migration_fk_target
  selector:
    path: migrations/001_create_orders.sql
    anchor: CREATE TABLE orders
- id: order_model
  selector:
    path: src/models/order.py
    anchor: class Order
- id: order_repository
  selector:
    path: src/repositories/order_repository.py
    anchor: class OrderRepository
- id: no_user_model
  selector:
    path: src/models/user.py
    anchor: class User
- id: no_shipping_service
  selector:
    path: src/services/shipping_service.py
    anchor: class ShippingService
oracle:
  required:
  - new_migration
  - create_order_items_table
  - order_item_model
  - orders_migration_fk_target
  - order_model
  allowed:
  - order_repository
  forbidden:
  - no_user_model
  - no_shipping_service
