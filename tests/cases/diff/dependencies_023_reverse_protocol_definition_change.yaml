      GARBAGE_DEP_023_ORDER_IMPORT_D = "order_consumer"
      GARBAGE_DEP_023_ORDER_SHIP_E = "fulfillment"

      class Order:
          def __init__(self, id: int, total: float):
              self.id = id
              self.total = total

      class OrderRepository:
          GARBAGE_DEP_023_ORDER_CLASS_F = True

          def __init__(self):
              self.orders = {}

          def find(self, id: int) -> Order:
              return self.orders.get(id)

          def save(self, entity: Order) -> None:
              self.orders[entity.id] = entity

          def delete(self, id: int) -> bool:
              return self.orders.pop(id, None) is not None
