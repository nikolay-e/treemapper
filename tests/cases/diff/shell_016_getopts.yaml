name: shell_016_getopts
repo:
  initial_files:
    cli.sh: |
      #!/bin/bash
      source ./processor.sh

      usage() {
          echo "Usage: $0 [-f file] [-v] [-h]"
          exit 1
      }

      verbose=false
      file=""

      while getopts "f:vh" opt; do
          case "$opt" in
              f) file="$OPTARG" ;;
              v) verbose=true ;;
              h) usage ;;
              *) usage ;;
          esac
      done

      shift $((OPTIND - 1))

      [[ -n "$file" ]] && run_processor "$file"
    processor.sh: |
      #!/bin/bash
      DEFAULT_OUTPUT="/dev/stdout"
      DEFAULT_COUNT=1

      run_processor() {
          local input=$1
          local output=${2:-$DEFAULT_OUTPUT}
          local count=${3:-$DEFAULT_COUNT}
          echo "Processing $input -> $output (count: $count)"
      }
    scripts/completions.sh: |
      #!/bin/bash
      _cli_completions() {
          local opts="-f -o -n -v -h"
          COMPREPLY=($(compgen -W "$opts" -- "${COMP_WORDS[COMP_CWORD]}"))
      }
      complete -F _cli_completions cli.sh
    scripts/manpage.sh: |
      #!/bin/bash
      cat <<'MAN' > cli.1
      .TH CLI 1 "2024-01-01"
      .SH NAME
      cli \- process files
      .SH OPTIONS
      -f file  Input file
      -v       Verbose mode
      MAN
  changed_files:
    cli.sh: |
      #!/bin/bash
      source ./processor.sh

      usage() {
          echo "Usage: $0 [-f file] [-o output] [-n count] [-v] [-h]"
          exit 1
      }

      verbose=false
      file=""
      output="$DEFAULT_OUTPUT"
      count="$DEFAULT_COUNT"

      while getopts "f:o:n:vh" opt; do
          case "$opt" in
              f) file="$OPTARG" ;;
              o) output="$OPTARG" ;;
              n) count="$OPTARG" ;;
              v) verbose=true ;;
              h) usage ;;
              *) usage ;;
          esac
      done

      shift $((OPTIND - 1))

      if [[ "$verbose" == true ]]; then
          echo "Verbose mode enabled"
          echo "File: $file, Output: $output, Count: $count"
      fi

      [[ -n "$file" ]] && run_processor "$file" "$output" "$count"
    processor.sh: |
      #!/bin/bash
      DEFAULT_OUTPUT="/dev/stdout"
      DEFAULT_COUNT=1

      run_processor() {
          local input=$1
          local output=${2:-$DEFAULT_OUTPUT}
          local count=${3:-$DEFAULT_COUNT}
          echo "Processing $input -> $output (count: $count)"
      }
    scripts/completions.sh: |
      #!/bin/bash
      _cli_completions() {
          local opts="-f -o -n -v -h"
          COMPREPLY=($(compgen -W "$opts" -- "${COMP_WORDS[COMP_CWORD]}"))
      }
      complete -F _cli_completions cli.sh
    scripts/manpage.sh: |
      #!/bin/bash
      cat <<'MAN' > cli.1
      .TH CLI 1 "2024-01-01"
      .SH NAME
      cli \- process files
      .SH OPTIONS
      -f file  Input file
      -v       Verbose mode
      MAN
  commit_message: Update files
fragments:
- id: processor
  selector:
    path: processor.sh
    anchor: run_processor()
- id: processor_1
  selector:
    path: processor.sh
    anchor: DEFAULT_OUTPUT="/dev/stdout"
- id: processor_2
  selector:
    path: processor.sh
    anchor: DEFAULT_COUNT=1
- id: cli_file
  selector:
    path: cli.sh
- id: no_completions
  selector:
    path: scripts/completions.sh
- id: no_manpage
  selector:
    path: scripts/manpage.sh
oracle:
  required:
  - processor
  - processor_1
  - processor_2
  - cli_file
  allowed: []
  forbidden:
  - no_completions
  - no_manpage
