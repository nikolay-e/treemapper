name: bal3_bugfix_009_rust_empty_vec_check
tags:
- lang:rust
- change:single_file
- change:bug_fix
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    src/stats.rs: |
      pub fn median(values: &[f64]) -> f64 {
          let mut sorted = values.to_vec();
          sorted.sort_by(|a, b| a.partial_cmp(b).unwrap());
          let mid = sorted.len() / 2;
          if sorted.len() % 2 == 0 {
              (sorted[mid - 1] + sorted[mid]) / 2.0
          } else {
              sorted[mid]
          }
      }
    src/analysis.rs: |
      use crate::stats;

      pub struct Analyzer;

      impl Analyzer {
          pub fn summarize(&self, data: &[f64]) -> f64 {
              stats::median(data)
          }
      }
    src/report.rs: |
      use crate::analysis::Analyzer;

      pub fn generate_report(data: &[f64]) -> String {
          let analyzer = Analyzer;
          let med = analyzer.summarize(data);
          format!("Median: {:.2}", med)
      }
    src/io.rs: |
      pub fn read_lines(path: &str) -> Vec<String> {
          vec![path.to_string()]
      }
  changed_files:
    src/stats.rs: |
      pub fn median(values: &[f64]) -> Option<f64> {
          if values.is_empty() {
              return None;
          }
          let mut sorted = values.to_vec();
          sorted.sort_by(|a, b| a.partial_cmp(b).unwrap());
          let mid = sorted.len() / 2;
          if sorted.len() % 2 == 0 {
              Some((sorted[mid - 1] + sorted[mid]) / 2.0)
          } else {
              Some(sorted[mid])
          }
      }
  commit_message: "fix: handle empty slice in median to prevent index panic"
fragments:
- id: empty_check
  selector:
    path: src/stats.rs
    anchor: "if values.is_empty()"
- id: analysis_calls_median
