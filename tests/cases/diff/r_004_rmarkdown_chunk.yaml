repo:
  initial_files:
    R/analysis.R: |
      compute_quarterly_metrics <- function(data, year) {
        quarters <- paste0(year, "-Q", 1:4)
        data$quarter <- paste0(format(as.Date(data$date), "%Y"), "-Q",
                               ceiling(as.numeric(format(as.Date(data$date), "%m")) / 3))

        results <- lapply(quarters, function(q) {
          quarter_data <- data[data$quarter == q, ]
          if (nrow(quarter_data) == 0) {
            warning(paste("No data for", q))
            return(list(quarter = q, revenue = NA, growth = NA, churn_rate = NA))
          }
          list(
            quarter = q,
            revenue = sum(quarter_data$amount, na.rm = TRUE),
            growth = mean(quarter_data$growth_pct, na.rm = TRUE),
            churn_rate = sum(quarter_data$churned) / nrow(quarter_data)
          )
        })

        do.call(rbind, lapply(results, as.data.frame))
      }

      compute_yoy_change <- function(current, previous) {
        if (is.na(previous) || previous == 0) return(NA)
        (current - previous) / previous * 100
      }

      compute_retention_cohort <- function(data, cohort_col, period_col) {
        cohorts <- split(data, data[[cohort_col]])
        retention <- lapply(cohorts, function(cohort) {
          periods <- sort(unique(cohort[[period_col]]))
          initial_size <- nrow(cohort[cohort[[period_col]] == periods[1], ])
          sapply(periods, function(p) {
            nrow(cohort[cohort[[period_col]] == p, ]) / initial_size
          })
        })
        retention
      }
    reports/quarterly.Rmd: |
