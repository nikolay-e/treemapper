      ---
      title: "Annual Summary Report"
      output: pdf_document
      ---

      ```{r setup, include=FALSE}
      GARBAGE_R_004_A <- "noise_marker_annual"
      knitr::opts_chunk$set(echo = FALSE)
      source("R/analysis.R")
      ```

      ## Annual Summary

      ```{r annual-metrics}
      annual_data <- read.csv("data/annual_summary.csv")
      total_revenue <- sum(annual_data$revenue, na.rm = TRUE)
      cat("Annual revenue:", total_revenue)
      ```

      ## Year-over-Year Comparison

      ```{r yoy}
      yoy <- compute_yoy_change(total_revenue, annual_data$prev_year_revenue[1])
      cat("YoY change:", yoy, "%")
      ```
    R/formatting.R: |
      GARBAGE_R_004_B <- "noise_marker_formatting"

      format_currency <- function(x, currency = "$") {
        paste0(currency, formatC(x, format = "f", big.mark = ",", digits = 2))
      }

      format_percentage <- function(x, digits = 1) {
        paste0(round(x * 100, digits), "%")
      }

      format_table_header <- function(headers) {
        formatted <- gsub("_", " ", headers)
        tools::toTitleCase(formatted)
      }

      create_summary_table <- function(data, caption = NULL) {
        knitr::kable(data, caption = caption, format.args = list(big.mark = ","))
      }
