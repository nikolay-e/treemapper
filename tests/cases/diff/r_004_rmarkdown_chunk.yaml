    reports/quarterly.Rmd: |
      ---
      title: "Quarterly Business Report"
      output: html_document
      ---

      ```{r setup, include=FALSE}
      knitr::opts_chunk$set(echo = FALSE, warning = FALSE)
      source("R/analysis.R")
      library(knitr)
      ```

      ## Overview

      This report summarizes key business metrics for the quarter.

      ```{r load-data}
      raw_data <- read.csv("data/transactions.csv")
      current_year <- as.numeric(format(Sys.Date(), "%Y"))
      ```

      ## Transaction Volume

      ```{r volume}
      total_transactions <- nrow(raw_data)
      cat("Total transactions:", total_transactions)
      ```

      ## Quarterly Metrics

      ```{r quarterly-metrics}
      metrics <- compute_quarterly_metrics(raw_data, current_year)
      kable(metrics, caption = "Quarterly Performance Metrics",
            col.names = c("Quarter", "Revenue", "Growth %", "Churn Rate"))
      ```

      ## Quarter-over-Quarter Trends

      ```{r qoq-trends}
      if (nrow(metrics) >= 2) {
        for (i in 2:nrow(metrics)) {
          qoq <- compute_yoy_change(metrics$revenue[i], metrics$revenue[i - 1])
          cat(metrics$quarter[i], "vs", metrics$quarter[i - 1],
              ": ", round(qoq, 1), "% change\n")
        }
      }
      ```
