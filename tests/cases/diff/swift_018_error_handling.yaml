repo:
  initial_files:
    Features/Payment/PaymentError.swift: |
      import Foundation

      enum PaymentError: LocalizedError {
          case insufficientFunds(available: Decimal, required: Decimal)
          case invalidCard(reason: String)
          case expiredCard(month: Int, year: Int)
          case networkFailure(underlying: Error)

          var errorDescription: String? {
              switch self {
              case .insufficientFunds(let available, let required):
                  return "Insufficient funds: \(available) available, \(required) required"
              case .invalidCard(let reason):
                  return "Invalid card: \(reason)"
              case .expiredCard(let month, let year):
                  return "Card expired: \(month)/\(year)"
              case .networkFailure(let underlying):
                  return "Network error: \(underlying.localizedDescription)"
              }
          }
      }
    Features/Payment/PaymentModels.swift: |
      import Foundation

      struct PaymentRequest {
          let amount: Decimal
          let cardNumber: String
          let expiryMonth: Int
          let expiryYear: Int
          let cvv: String
      }

      struct PaymentReceipt {
          let transactionId: String
          let amount: Decimal
          let timestamp: Date
      }
    Features/Payment/PaymentService.swift: |
      class PaymentService {}
    Features/Auth/AuthError.swift: |
      import Foundation

      enum AuthError: LocalizedError {
          case invalidCredentials
          case tokenExpired(expiresAt: Date)
          case accountLocked(until: Date)
          case twoFactorRequired

          var errorDescription: String? {
              switch self {
              case .invalidCredentials:
                  return "Invalid username or password"
              case .tokenExpired(let date):
                  return "Token expired at \(date)"
              case .accountLocked(let until):
                  return "Account locked until \(until)"
              case .twoFactorRequired:
                  return "Two-factor authentication required"
              }
          }
      }
    Features/Shipping/ShippingService.swift: |
      import Foundation

      struct ShippingRate {
          let carrier: String
          let cost: Decimal
          let estimatedDays: Int
      }

      class ShippingService {
          func calculateRate(weight: Double, destination: String) throws -> ShippingRate {
              guard weight > 0 else {
                  throw NSError(domain: "Shipping", code: 1)
              }
              return ShippingRate(carrier: "Standard", cost: 5.99, estimatedDays: 5)
          }
      }
    Features/Payment/PaymentGateway.swift: |
      import Foundation

      class PaymentGateway {
          private let service: PaymentService

          init(service: PaymentService) {
              self.service = service
          }

          func charge(request: PaymentRequest) -> Result<PaymentReceipt, PaymentError> {
              do {
                  let receipt = try service.processPayment(request)
                  return .success(receipt)
              } catch let error as PaymentError {
                  return .failure(error)
              } catch {
                  return .failure(.networkFailure(underlying: error))
              }
          }
      }
    Features/Payment/PaymentHistory.swift: |
      import Foundation

      class PaymentHistory {
          private var receipts: [PaymentReceipt] = []

          func record(_ receipt: PaymentReceipt) {
              receipts.append(receipt)
          }

          func total() -> Decimal {
              receipts.reduce(0) { $0 + $1.amount }
          }

          func recent(limit: Int) -> [PaymentReceipt] {
              Array(receipts.suffix(limit))
          }
      }
    Features/Order/OrderError.swift: |
      import Foundation

      enum OrderError: LocalizedError {
          case itemOutOfStock(itemId: String)
          case invalidQuantity(requested: Int, available: Int)
          case shippingUnavailable(destination: String)

          var errorDescription: String? {
              switch self {
              case .itemOutOfStock(let id): return "Item \(id) is out of stock"
              case .invalidQuantity(let r, let a): return "Requested \(r), only \(a) available"
              case .shippingUnavailable(let d): return "Cannot ship to \(d)"
              }
          }
      }
