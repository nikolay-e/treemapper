    Features/Payment/PaymentService.swift: |
      import Foundation

      class PaymentService {
          private let accountBalance: Decimal

          init(accountBalance: Decimal) {
              self.accountBalance = accountBalance
          }

          func processPayment(_ request: PaymentRequest) throws -> PaymentReceipt {
              try validateCard(request)
              try validateFunds(request.amount)
              return PaymentReceipt(
                  transactionId: UUID().uuidString,
                  amount: request.amount,
                  timestamp: Date()
              )
          }

          private func validateCard(_ request: PaymentRequest) throws {
              guard request.cardNumber.count == 16 else {
                  throw PaymentError.invalidCard(reason: "Card number must be 16 digits")
              }
              guard request.cvv.count == 3 else {
                  throw PaymentError.invalidCard(reason: "CVV must be 3 digits")
              }
              let now = Calendar.current.dateComponents([.month, .year], from: Date())
              let currentYear = now.year ?? 0
              let currentMonth = now.month ?? 0
              if request.expiryYear < currentYear ||
                 (request.expiryYear == currentYear && request.expiryMonth < currentMonth) {
                  throw PaymentError.expiredCard(
                      month: request.expiryMonth,
                      year: request.expiryYear
                  )
              }
          }

          private func validateFunds(_ amount: Decimal) throws {
              guard accountBalance >= amount else {
                  throw PaymentError.insufficientFunds(
                      available: accountBalance,
                      required: amount
                  )
              }
          }
      }
