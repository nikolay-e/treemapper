repo:
  initial_files:
    pkg/cache/entry.go: |
      package cache

      import "time"

      type Entry struct {
        Key       string
        Value     interface{}
        ExpiresAt time.Time
      }

      func NewEntry(key string, value interface{}, ttl time.Duration) Entry {
        return Entry{Key: key, Value: value, ExpiresAt: time.Now().Add(ttl)}
      }

      func (e Entry) IsExpired() bool {
        return time.Now().After(e.ExpiresAt)
      }
    pkg/cache/store.go: |
      package cache

      import "time"

      type Store struct {
        entries map[string]Entry
      }

      func NewStore() *Store {
        return &Store{entries: make(map[string]Entry)}
      }

      func (s *Store) Get(key string) (interface{}, bool) {
        e, ok := s.entries[key]
        if !ok || e.IsExpired() {
          delete(s.entries, key)
          return nil, false
        }
        return e.Value, true
      }

      func (s *Store) Set(key string, value interface{}, ttl time.Duration) {
        s.entries[key] = NewEntry(key, value, ttl)
      }
    pkg/service/product.go: |
      package service

      import (
        "pkg/cache"
        "time"
      )

      type ProductService struct {
        cache *cache.Store
      }

      func NewProductService(c *cache.Store) *ProductService {
        return &ProductService{cache: c}
      }

      func (s *ProductService) GetProduct(id string) interface{} {
        if val, ok := s.cache.Get("product:" + id); ok {
          return val
        }
        product := map[string]string{"id": id, "name": "Widget"}
        s.cache.Set("product:"+id, product, 5*time.Minute)
        return product
      }
    cmd/api/products.go: |
      package main

      import (
        "encoding/json"
        "net/http"
        "pkg/cache"
        "pkg/service"
      )

      var productSvc = service.NewProductService(cache.NewStore())

      func getProduct(w http.ResponseWriter, r *http.Request) {
        product := productSvc.GetProduct(r.URL.Query().Get("id"))
        json.NewEncoder(w).Encode(product)
      }
