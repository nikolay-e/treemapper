- lang:php
repo:
  initial_files:
    src/Vet/AppointmentService.php: |
      <?php

      namespace App\Vet;

      use App\Vet\AnimalRecord;

      class AppointmentService
      {
          private array $slots = [];

          public function schedule(AnimalRecord $animal, string $date): string
          {
              $id = uniqid('apt_');
              $this->slots[$id] = ['animal' => $animal->name(), 'date' => $date];
              return $id;
          }

          public function cancel(string $appointmentId): bool
          {
              if (!isset($this->slots[$appointmentId])) {
                  return false;
              }
              unset($this->slots[$appointmentId]);
              return true;
          }
      }
    src/Vet/AnimalRecord.php: |
      <?php

      namespace App\Vet;

      class AnimalRecord
      {
          private string $petName;
          private string $species;

          public function __construct(string $petName, string $species)
          {
              $this->petName = $petName;
              $this->species = $species;
          }

          public function name(): string
          {
              return $this->petName;
          }

          public function species(): string
          {
              return $this->species;
          }
      }
    src/Billing/InvoiceGenerator.php: |
      <?php

      namespace App\Billing;

      class InvoiceGenerator
      {
          public function generate(string $clientId, float $amount): string
          {
              return sprintf("INV-%s-%.2f", $clientId, $amount);
          }
      }
  changed_files:
    src/Vet/AppointmentService.php: |
      <?php

      namespace App\Vet;

      use App\Vet\AnimalRecord;

      class AppointmentService
      {
          private array $slots = [];

          public function schedule(AnimalRecord $animal, string $date, int $durationMinutes = 30): string
          {
              $id = uniqid('apt_');
              $this->slots[$id] = [
                  'animal' => $animal->name(),
                  'date' => $date,
                  'duration' => $durationMinutes,
              ];
              return $id;
          }

          public function cancel(string $appointmentId): bool
          {
              if (!isset($this->slots[$appointmentId])) {
                  return false;
              }
              unset($this->slots[$appointmentId]);
              return true;
          }
      }
  commit_message: "feat: add duration parameter to vet appointment scheduling"
