          m.mu.RLock()
          defer m.mu.RUnlock()
          v, ok := m.data[key]
          if !ok {
              return nil, errors.New("not found")
          }
          return v, nil
      }

      func (m *MemoryStore) Put(ctx context.Context, key string, val []byte) error {
          m.mu.Lock()
          defer m.mu.Unlock()
          m.data[key] = val
          return nil
      }

      func (m *MemoryStore) Delete(ctx context.Context, key string) error {
          m.mu.Lock()
          defer m.mu.Unlock()
          delete(m.data, key)
          return nil
      }
