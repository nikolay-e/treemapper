name: recall_002_interface_method_implementers
tags:
- lang:go
- change:multi_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    storage/store.go: |
      package storage

      import "context"

      type Store interface {
          Get(ctx context.Context, key string) ([]byte, error)
          Put(ctx context.Context, key string, val []byte) error
      }
    storage/memory.go: |
      package storage

      import (
          "context"
          "errors"
          "sync"
      )

      type MemoryStore struct {
          mu   sync.RWMutex
          data map[string][]byte
      }

      func NewMemoryStore() *MemoryStore {
          return &MemoryStore{data: make(map[string][]byte)}
      }

      func (m *MemoryStore) Get(ctx context.Context, key string) ([]byte, error) {
          m.mu.RLock()
          defer m.mu.RUnlock()
          v, ok := m.data[key]
          if !ok {
              return nil, errors.New("not found")
          }
          return v, nil
      }

      func (m *MemoryStore) Put(ctx context.Context, key string, val []byte) error {
          m.mu.Lock()
          defer m.mu.Unlock()
          m.data[key] = val
          return nil
      }
    storage/disk.go: |
      package storage

      import (
          "context"
          "os"
          "path/filepath"
      )

      type DiskStore struct {
          root string
      }

      func NewDiskStore(root string) *DiskStore {
          return &DiskStore{root: root}
      }

      func (d *DiskStore) Get(ctx context.Context, key string) ([]byte, error) {
          return os.ReadFile(filepath.Join(d.root, key))
      }

      func (d *DiskStore) Put(ctx context.Context, key string, val []byte) error {
          return os.WriteFile(filepath.Join(d.root, key), val, 0644)
      }
    storage/redis.go: |
      package storage

      import (
          "context"
      )

      type RedisStore struct {
          addr string
      }

      func NewRedisStore(addr string) *RedisStore {
          return &RedisStore{addr: addr}
      }

      func (r *RedisStore) Get(ctx context.Context, key string) ([]byte, error) {
          return nil, nil
      }

      func (r *RedisStore) Put(ctx context.Context, key string, val []byte) error {
          return nil
      }
    storage/metrics.go: |
      package storage

      import (
          "context"
          "time"
      )

      type MetricsWrapper struct {
          inner Store
      }

      func (m *MetricsWrapper) Get(ctx context.Context, key string) ([]byte, error) {
          start := time.Now()
          v, err := m.inner.Get(ctx, key)
          _ = time.Since(start)
          return v, err
      }

      func (m *MetricsWrapper) Put(ctx context.Context, key string, val []byte) error {
          return m.inner.Put(ctx, key, val)
      }
    storage/keys.go: |
      package storage

      import "strings"

      func NormalizeKey(k string) string {
          return strings.ToLower(strings.TrimSpace(k))
      }

      func IsValidKey(k string) bool {
          return len(k) > 0 && len(k) < 256
      }
    cache/lru.go: |
      package cache

      import "container/list"

      type LRU struct {
          cap  int
          ll   *list.List
          data map[string]*list.Element
      }

      func NewLRU(cap int) *LRU {
          return &LRU{cap: cap, ll: list.New(), data: make(map[string]*list.Element)}
      }
    util/hash.go: |
      package util

      import (
          "crypto/sha256"
          "encoding/hex"
      )

      func Hash(input string) string {
          h := sha256.Sum256([]byte(input))
          return hex.EncodeToString(h[:])
      }
