          "mymodule/internal/metrics"
      )

      func main() {
          reg := metrics.NewRegistry()
          api := handler.NewAPIHandler(reg)
          http.HandleFunc("/api", api.HandleRequest)
          http.HandleFunc("/metrics", api.HandleMetrics)
          http.ListenAndServe(":9090", nil)
      }
  changed_files:
    internal/metrics/counter.go: |
      package metrics

      import (
          "sync"
          "sync/atomic"
      )

      type Labels map[string]string

      type Counter struct {
          name   string
          labels Labels
          value  int64
      }

      func NewCounter(name string, labels Labels) *Counter {
          return &Counter{name: name, labels: labels}
      }

      func (c *Counter) Inc() {
          atomic.AddInt64(&c.value, 1)
      }

      func (c *Counter) Value() int64 {
          return atomic.LoadInt64(&c.value)
      }

      type Registry struct {
          mu       sync.RWMutex
          counters map[string]*Counter
      }

      func NewRegistry() *Registry {
          return &Registry{
              counters: make(map[string]*Counter),
          }
      }

      func (r *Registry) Counter(name string, labels Labels) *Counter {
          r.mu.Lock()
          defer r.mu.Unlock()
          key := name + labelsKey(labels)
          if c, ok := r.counters[key]; ok {
              return c
          }
          c := NewCounter(name, labels)
          r.counters[key] = c
          return c
      }

      func labelsKey(l Labels) string {
          result := ""
          for k, v := range l {
              result += k + "=" + v + ","
          }
          return result
      }

      func (r *Registry) Snapshot() map[string]int64 {
          r.mu.RLock()
          defer r.mu.RUnlock()
          snap := make(map[string]int64)
          for k, v := range r.counters {
              snap[k] = v.Value()
          }
          return snap
      }
