repo:
  initial_files:
    internal/metrics/counter.go: |
      package metrics

      import (
          "sync"
          "sync/atomic"
      )

      type Counter struct {
          name  string
          value int64
      }

      func NewCounter(name string) *Counter {
          return &Counter{name: name}
      }

      func (c *Counter) Inc() {
          atomic.AddInt64(&c.value, 1)
      }

      func (c *Counter) Value() int64 {
          return atomic.LoadInt64(&c.value)
      }

      type Registry struct {
          mu       sync.RWMutex
          counters map[string]*Counter
      }

      func NewRegistry() *Registry {
          return &Registry{
              counters: make(map[string]*Counter),
          }
      }

      func (r *Registry) Counter(name string) *Counter {
          r.mu.Lock()
          defer r.mu.Unlock()
          if c, ok := r.counters[name]; ok {
              return c
          }
          c := NewCounter(name)
          r.counters[name] = c
          return c
      }

      func (r *Registry) Snapshot() map[string]int64 {
          r.mu.RLock()
          defer r.mu.RUnlock()
          snap := make(map[string]int64)
          for k, v := range r.counters {
              snap[k] = v.Value()
          }
          return snap
      }
    internal/handler/api.go: |
      package handler

      import (
          "encoding/json"
          "net/http"
          "mymodule/internal/metrics"
      )

      type APIHandler struct {
          registry *metrics.Registry
      }

      func NewAPIHandler(reg *metrics.Registry) *APIHandler {
          return &APIHandler{registry: reg}
      }

      func (h *APIHandler) HandleRequest(w http.ResponseWriter, r *http.Request) {
          h.registry.Counter("requests_total").Inc()
          w.WriteHeader(http.StatusOK)
      }

      func (h *APIHandler) HandleMetrics(w http.ResponseWriter, r *http.Request) {
          snap := h.registry.Snapshot()
          json.NewEncoder(w).Encode(snap)
      }
