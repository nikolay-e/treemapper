name: terraform_021_route_table
xfail:
  category: low-relevance-threshold-tuning
repo:
  initial_files:
    network.tf: |
      resource "aws_vpc" "main" {
        cidr_block = "10.0.0.0/16"
      }

      resource "aws_subnet" "private" {
        vpc_id     = aws_vpc.main.id
        cidr_block = "10.0.1.0/24"
      }
    nat.tf: |
      resource "aws_eip" "nat" {
        domain = "vpc"
      }

      resource "aws_nat_gateway" "main" {
        allocation_id = aws_eip.nat.id
        subnet_id     = aws_subnet.public.id
        depends_on    = [aws_internet_gateway.main]
      }
    public_routes.tf: |
      resource "aws_route_table" "public" {
        vpc_id = aws_vpc.main.id

        route {
          cidr_block = "0.0.0.0/0"
          gateway_id = aws_internet_gateway.main.id
        }
      }

      resource "aws_route_table_association" "public" {
        subnet_id      = aws_subnet.public.id
        route_table_id = aws_route_table.public.id
      }
  changed_files:
    network.tf: |
      resource "aws_vpc" "main" {
        cidr_block = "10.0.0.0/16"
      }

      resource "aws_subnet" "private" {
        vpc_id     = aws_vpc.main.id
        cidr_block = "10.0.1.0/24"
      }

      resource "aws_route_table" "private" {
        vpc_id = aws_vpc.main.id

        route {
          cidr_block     = "0.0.0.0/0"
          nat_gateway_id = aws_nat_gateway.main.id
        }
      }

      resource "aws_route_table_association" "private" {
        subnet_id      = aws_subnet.private.id
        route_table_id = aws_route_table.private.id
      }
    nat.tf: |
      resource "aws_eip" "nat" {
        domain = "vpc"
      }

      resource "aws_nat_gateway" "main" {
        allocation_id = aws_eip.nat.id
        subnet_id     = aws_subnet.public.id
        depends_on    = [aws_internet_gateway.main]
      }
    public_routes.tf: |
      resource "aws_route_table" "public" {
        vpc_id = aws_vpc.main.id

        route {
          cidr_block = "0.0.0.0/0"
          gateway_id = aws_internet_gateway.main.id
        }
      }

      resource "aws_route_table_association" "public" {
        subnet_id      = aws_subnet.public.id
        route_table_id = aws_route_table.public.id
      }
  commit_message: Update files
fragments:
- id: nat
  selector:
    path: nat.tf
    anchor: resource "aws_nat_gateway" "main" {
- id: nat_1
  selector:
    path: nat.tf
    anchor: allocation_id = aws_eip.nat.id
- id: no_public_routes
  selector:
    path: public_routes.tf
- id: no_global_0
  selector:
    anchor: gateway_id = aws_internet_gateway.main.id
- id: no_global_1
  selector:
    anchor: route_table_id = aws_route_table.public.id
oracle:
  required:
  - nat
  - nat_1
  allowed: []
  forbidden:
  - no_public_routes
  - no_global_0
  - no_global_1
