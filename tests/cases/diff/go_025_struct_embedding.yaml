name: go_025_struct_embedding
repo:
  initial_files:
    internal/models/base.go: |
      package models

      import "time"

      type BaseModel struct {
          ID        int64     `json:"id" db:"id"`
          CreatedAt time.Time `json:"created_at" db:"created_at"`
          UpdatedAt time.Time `json:"updated_at" db:"updated_at"`
      }

      func (b *BaseModel) GetID() int64 {
          return b.ID
      }

      func (b *BaseModel) SetID(id int64) {
          b.ID = id
      }

      func (b *BaseModel) Touch() {
          b.UpdatedAt = time.Now()
      }

      type SoftDelete struct {
          DeletedAt *time.Time `json:"deleted_at,omitempty" db:"deleted_at"`
          IsDeleted bool       `json:"is_deleted" db:"is_deleted"`
      }

      func (s *SoftDelete) MarkDeleted() {
          now := time.Now()
          s.DeletedAt = &now
          s.IsDeleted = true
      }

      func (s *SoftDelete) Restore() {
          s.DeletedAt = nil
          s.IsDeleted = false
      }

      type Auditable struct {
          CreatedBy string `json:"created_by" db:"created_by"`
          UpdatedBy string `json:"updated_by" db:"updated_by"`
      }

      func (a *Auditable) SetCreator(userID string) {
          a.CreatedBy = userID
          a.UpdatedBy = userID
      }

      func (a *Auditable) SetUpdater(userID string) {
          a.UpdatedBy = userID
      }

      type Versionable struct {
          Version int `json:"version" db:"version"`
      }

      func (v *Versionable) IncrementVersion() {
          v.Version++
      }
    internal/models/user.go: |
      package models

      type User struct {
          Name  string `json:"name" db:"name"`
          Email string `json:"email" db:"email"`
      }
    internal/models/product.go: |
      package models

      type Product struct {
          Name        string  `json:"name" db:"name"`
          Description string  `json:"description" db:"description"`
          Price       float64 `json:"price" db:"price"`
          SKU         string  `json:"sku" db:"sku"`
      }

      func NewProduct(name string, price float64, sku string) *Product {
          return &Product{
              Name:  name,
              Price: price,
              SKU:   sku,
          }
      }
