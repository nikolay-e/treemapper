  changed_files:
    app/models/product.rb: |
      class Product
        CATEGORIES = %w[electronics clothing food sports books].freeze
        MAX_DISCOUNT_PERCENT = 80

        attr_reader :id, :name, :price, :category, :stock

        def initialize(id:, name:, price:, category:, stock: 0)
          raise ArgumentError, "price must be positive" unless price > 0
          @id = id
          @name = name
          @price = price
          @category = category
          @stock = stock
        end

        def in_stock?
          @stock > 0
        end

        def apply_discount(percent)
          unless (0..MAX_DISCOUNT_PERCENT).include?(percent)
            raise ArgumentError, "discount must be between 0 and #{MAX_DISCOUNT_PERCENT}"
          end
          @price = (@price * (1 - percent / 100.0)).round(2)
        end

        def restock(qty)
          raise ArgumentError, "restock quantity must be positive" unless qty > 0
          @stock += qty
        end

        def sell(qty)
          raise ArgumentError, "sell quantity must be positive" unless qty > 0
          raise ArgumentError, "insufficient stock" if qty > @stock
          @stock -= qty
        end

        def valid_category?
          CATEGORIES.include?(@category)
        end
      end
