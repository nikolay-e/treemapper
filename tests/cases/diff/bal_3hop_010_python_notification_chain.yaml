  changed_files:
    notifications/message.py: |
      from typing import Optional
      class Message:
          def __init__(self, recipient: str, subject: str, body: str,
                       priority: str = "normal", reply_to: Optional[str] = None):
              self.recipient = recipient
              self.subject = subject
              self.body = body
              self.priority = priority
              self.reply_to = reply_to
          def format(self) -> str:
              header = f"To: {self.recipient}\nSubject: {self.subject}"
              if self.reply_to:
                  header += f"\nReply-To: {self.reply_to}"
              return f"{header}\n\n{self.body}"
          def is_urgent(self) -> bool:
              return self.priority == "urgent"
