  changed_files:
    src/main/java/com/infra/config/ConfigProvider.java: |
      package com.infra.config;
      import java.util.Properties;
      public class ConfigProvider {
          private final Properties props;
          private final String environment;
          public ConfigProvider(Properties props, String environment) {
              this.props = props;
              this.environment = environment;
          }
          public String get(String key) {
              String envKey = environment + "." + key;
              String val = props.getProperty(envKey);
              return val != null ? val : props.getProperty(key);
          }
          public String getEnvironment() {
              return environment;
          }
      }
  commit_message: "feat: add environment-aware config resolution"
