    booking/inventory.py: |
      class SeatInventory:
          def __init__(self):
              self._seats = {}

          def add_flight(self, flight_id: str, capacity: int) -> None:
              self._seats[flight_id] = capacity

          def available(self, flight_id: str) -> int:
              return self._seats.get(flight_id, 0)
  changed_files:
    booking/reservation.py: |
      from booking.pricing import FareCalculator, SurchargePolicy

      class Reservation:
          def __init__(self, calculator: FareCalculator, surcharge: SurchargePolicy):
              self.calculator = calculator
              self.surcharge = surcharge
              self.bookings = []

          def book(self, passenger: str, route: str, cabin_class: str = "economy") -> float:
              fare = self.calculator.compute(route, cabin_class)
              total = self.surcharge.apply(fare, cabin_class)
              self.bookings.append({"passenger": passenger, "route": route, "fare": total})
              return total

          def cancel(self, passenger: str) -> bool:
              for i, b in enumerate(self.bookings):
                  if b["passenger"] == passenger:
                      self.bookings.pop(i)
                      return True
              return False
    booking/pricing.py: |
      from dataclasses import dataclass

      @dataclass
      class SurchargePolicy:
          fuel_pct: float = 0.12
          tax_pct: float = 0.08

          def apply(self, base_fare: float, cabin_class: str) -> float:
              multiplier = 1.5 if cabin_class == "business" else 1.0
              return base_fare * multiplier * (1 + self.fuel_pct + self.tax_pct)

      class FareCalculator:
          def __init__(self, base_rate: float):
              self.base_rate = base_rate

          def compute(self, route: str, cabin_class: str = "economy") -> float:
              distance = len(route) * 10
              return self.base_rate * distance
