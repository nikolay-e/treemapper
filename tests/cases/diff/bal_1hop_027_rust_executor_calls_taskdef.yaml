repo:
  initial_files:
    pkg/queue/task_queue.go: |
      package queue

      import "sync"

      type Task struct {
          ID      string
          Payload []byte
          Retries int
      }

      type TaskQueue struct {
          mu    sync.Mutex
          items []Task
      }

      func NewTaskQueue() *TaskQueue {
          return &TaskQueue{}
      }

      func (q *TaskQueue) Enqueue(t Task) {
          q.mu.Lock()
          defer q.mu.Unlock()
          q.items = append(q.items, t)
      }

      func (q *TaskQueue) Dequeue() (Task, bool) {
          q.mu.Lock()
          defer q.mu.Unlock()
          if len(q.items) == 0 {
              return Task{}, false
          }
          t := q.items[0]
          q.items = q.items[1:]
          return t, true
      }
    internal/worker/processor.go: |
      package worker

      import "pkg/queue"

      type Processor struct {
          q *queue.TaskQueue
      }

      func NewProcessor(q *queue.TaskQueue) *Processor {
          return &Processor{q: q}
      }

      func (p *Processor) Run() {
          for {
              t, ok := p.q.Dequeue()
              if !ok {
                  break
              }
              _ = t
          }
      }
    internal/api/job_handler.go: |
      package api

      import "pkg/queue"

      type JobHandler struct {
          q *queue.TaskQueue
      }

      func NewJobHandler(q *queue.TaskQueue) *JobHandler {
          return &JobHandler{q: q}
      }

      func (h *JobHandler) Submit(id string, payload []byte) {
          h.q.Enqueue(queue.Task{ID: id, Payload: payload})
      }
