      using System;
      using System.Threading.Tasks;

      namespace App.Resilience
      {
          public class RetryPolicy
          {
              private readonly int _maxRetries;
              private readonly TimeSpan _delay;

              public RetryPolicy(int maxRetries, TimeSpan delay)
              {
                  _maxRetries = maxRetries;
                  _delay = delay;
              }

              public async Task<T> ExecuteAsync<T>(Func<Task<T>> action)
              {
                  var attempts = 0;
                  while (true)
                  {
                      try
                      {
                          return await action();
                      }
                      catch (Exception) when (attempts < _maxRetries)
                      {
                          attempts++;
                          await Task.Delay(_delay);
                      }
                  }
              }
          }
      }
    Tests/RetryPolicyTests.cs: |
      using Xunit;
      using App.Resilience;
      using System;
      using System.Threading.Tasks;

      namespace App.Tests
      {
          public class RetryPolicyTests
          {
              [Fact]
              public async Task ExecuteAsync_SucceedsFirstTry_ReturnsResult()
              {
                  var policy = new RetryPolicy(3, TimeSpan.FromMilliseconds(10));
                  var result = await policy.ExecuteAsync(() => Task.FromResult(42));
                  Assert.Equal(42, result);
              }

              [Fact]
              public async Task ExecuteAsync_FailsThenSucceeds_RetriesCorrectly()
              {
                  var policy = new RetryPolicy(3, TimeSpan.FromMilliseconds(10));
                  var attempt = 0;
                  var result = await policy.ExecuteAsync<int>(() =>
                  {
                      attempt++;
                      if (attempt < 3) throw new InvalidOperationException();
                      return Task.FromResult(99);
                  });
                  Assert.Equal(99, result);
              }
          }
      }
    src/Resilience/CircuitBreaker.cs: |
      using System;

      namespace App.Resilience
      {
          public class CircuitBreaker
          {
              private int _failureCount;
              private readonly int _threshold;
              private bool _isOpen;

              public CircuitBreaker(int threshold)
              {
                  _threshold = threshold;
              }

              public bool CanExecute()
              {
                  return !_isOpen;
              }

              public void RecordFailure()
              {
                  _failureCount++;
                  if (_failureCount >= _threshold)
                      _isOpen = true;
              }

              public void Reset()
              {
                  _failureCount = 0;
                  _isOpen = false;
              }
          }
      }
