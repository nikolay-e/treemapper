    src/Resilience/RetryPolicy.cs: |
      using System;
      using System.Collections.Generic;
      using System.Threading.Tasks;

      namespace App.Resilience
      {
          public class RetryPolicy
          {
              private readonly int _maxRetries;
              private readonly TimeSpan _delay;
              private readonly List<Type> _retryableExceptions;

              public RetryPolicy(int maxRetries, TimeSpan delay, List<Type> retryableExceptions = null)
              {
                  _maxRetries = maxRetries;
                  _delay = delay;
                  _retryableExceptions = retryableExceptions;
              }

              public async Task<T> ExecuteAsync<T>(Func<Task<T>> action)
              {
                  var attempts = 0;
                  while (true)
                  {
                      try
                      {
                          return await action();
                      }
                      catch (Exception ex) when (attempts < _maxRetries && IsRetryable(ex))
                      {
                          attempts++;
                          await Task.Delay(CalculateDelay(attempts));
                      }
                  }
              }

              private bool IsRetryable(Exception ex)
              {
                  if (_retryableExceptions == null) return true;
                  return _retryableExceptions.Contains(ex.GetType());
              }

              private TimeSpan CalculateDelay(int attempt)
              {
                  return TimeSpan.FromMilliseconds(_delay.TotalMilliseconds * Math.Pow(2, attempt - 1));
              }
          }
      }
  commit_message: "feat: add exception filtering and exponential backoff"
