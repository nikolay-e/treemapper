    scheduler/task.py: |
      from dataclasses import dataclass, field
      from enum import Enum
      from typing import Optional

      class Status(Enum):
          PENDING = "pending"
          RUNNING = "running"
          DONE = "done"
          FAILED = "failed"
          CANCELLED = "cancelled"

      @dataclass
      class Task:
          task_id: str
          name: str
          priority: int = 0
          status: Status = Status.PENDING
          depends_on: list[str] = field(default_factory=list)
          error_message: Optional[str] = None

      class TaskQueue:
          def __init__(self):
              self._tasks: dict[str, Task] = {}

          def add(self, task: Task) -> None:
              self._tasks[task.task_id] = task

          def get(self, task_id: str) -> Optional[Task]:
              return self._tasks.get(task_id)

          def ready(self) -> list[Task]:
              result = []
              for task in self._tasks.values():
                  if task.status != Status.PENDING:
                      continue
                  deps_met = all(
                      self._tasks.get(d, Task("", "")).status == Status.DONE
                      for d in task.depends_on
                  )
                  if deps_met:
                      result.append(task)
              return sorted(result, key=lambda t: t.priority, reverse=True)

          def cancel(self, task_id: str) -> bool:
              task = self._tasks.get(task_id)
              if task and task.status == Status.PENDING:
                  task.status = Status.CANCELLED
                  return True
              return False

          def retry_failed(self) -> list[Task]:
              retried = []
              for task in self._tasks.values():
                  if task.status == Status.FAILED:
                      task.status = Status.PENDING
                      task.error_message = None
                      retried.append(task)
              return retried

          def fail(self, task_id: str, error: str) -> bool:
              task = self._tasks.get(task_id)
              if task and task.status == Status.RUNNING:
                  task.status = Status.FAILED
                  task.error_message = error
                  return True
              return False

          def blocked(self) -> list[Task]:
              result = []
              for task in self._tasks.values():
                  if task.status != Status.PENDING:
                      continue
                  for dep_id in task.depends_on:
                      dep = self._tasks.get(dep_id)
                      if dep and dep.status in (Status.FAILED, Status.CANCELLED):
                          result.append(task)
                          break
              return result

          def progress(self) -> float:
              if not self._tasks:
                  return 0.0
              done = sum(1 for t in self._tasks.values() if t.status == Status.DONE)
              return done / len(self._tasks)
