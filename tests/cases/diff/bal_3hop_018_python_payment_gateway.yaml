      class Currency:
          def __init__(self, code: str, symbol: str, decimals: int = 2):
              self.code = code
              self.symbol = symbol
              self.decimals = decimals
          def format_amount(self, amount: int) -> str:
              value = amount / (10 ** self.decimals)
              return f"{self.symbol}{value:.{self.decimals}f}"
    payments/transaction.py: |
      from payments.currency import Currency
      class Transaction:
          def __init__(self, tx_id: str, amount: int, currency: Currency):
              self.tx_id = tx_id
              self.amount = amount
              self.currency = currency
              self.status = "pending"
          def complete(self):
              self.status = "completed"
          def display_amount(self) -> str:
              return self.currency.format_amount(self.amount)
    payments/processor.py: |
      from payments.transaction import Transaction
      from payments.currency import Currency
      class PaymentProcessor:
          def __init__(self):
              self.transactions: list[Transaction] = []
          def charge(self, tx_id: str, amount: int, currency: Currency) -> Transaction:
              tx = Transaction(tx_id, amount, currency)
              tx.complete()
              self.transactions.append(tx)
              return tx
    api/checkout.py: |
      from payments.processor import PaymentProcessor
      from payments.currency import Currency
      USD = Currency("USD", "$", 2)
      class CheckoutAPI:
          def __init__(self):
              self.processor = PaymentProcessor()
          def purchase(self, item_id: str, amount: int) -> dict:
              tx = self.processor.charge(f"tx_{item_id}", amount, USD)
              return {"tx_id": tx.tx_id, "amount": tx.display_amount(), "status": tx.status}
