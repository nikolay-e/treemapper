  changed_files:
    payments/currency.py: |
      from typing import Optional
      class Currency:
          def __init__(self, code: str, symbol: str, decimals: int = 2):
              self.code = code
              self.symbol = symbol
              self.decimals = decimals
          def format_amount(self, amount: int) -> str:
              value = amount / (10 ** self.decimals)
              return f"{self.symbol}{value:.{self.decimals}f}"
          def convert_to(self, amount: int, target: "Currency", rate: float) -> int:
              base = amount / (10 ** self.decimals)
              converted = base * rate
              return int(converted * (10 ** target.decimals))
