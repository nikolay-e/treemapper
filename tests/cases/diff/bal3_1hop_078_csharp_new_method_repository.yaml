              }
          }
      }
    src/Batch/ProductImporter.cs: |
      using System;
      using System.Collections.Generic;
      using App.Data;
      using App.Data.Impl;

      namespace App.Batch
      {
          public class ProductImporter
          {
              private readonly IRepository<Product> _repo;

              public ProductImporter(IRepository<Product> repo)
              {
                  _repo = repo;
              }

              public void ImportBatch(IEnumerable<Product> products)
              {
                  foreach (var p in products)
                  {
                      _repo.Add(p);
                  }
              }
          }
      }
