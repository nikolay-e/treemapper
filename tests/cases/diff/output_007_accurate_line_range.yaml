    utils/rate_limiter.py: |
      WINDOW_SIZE_SECONDS = 60
      DEFAULT_LIMIT = 100

      class RateLimiter:
          def __init__(self, limit: int = DEFAULT_LIMIT):
              self._limit = limit
              self._calls: list[float] = []

          def is_allowed(self, client_id: str) -> bool:
              return len(self._calls) < self._limit

          def record_call(self, client_id: str) -> None:
              import time
              self._calls.append(time.time())
    utils/request_throttler.py: |
      BASE_DELAY_SECONDS = 1.0
      MAX_BACKOFF_SECONDS = 120

      class RequestThrottler:
          def __init__(self, base_delay: float = BASE_DELAY_SECONDS):
              self.base_delay = base_delay

          def get_delay(self, attempt: int) -> float:
              return min(self.base_delay * (2 ** attempt), MAX_BACKOFF_SECONDS)

          def should_retry(self, status_code: int) -> bool:
              return status_code in (429, 500, 502, 503)
