fixtures:
  auto_garbage: true
repo:
  initial_files:
    lib/state.lua: |
      local M = {}

      function M.create(initial)
          return { current = initial, history = {} }
      end

      function M.transition(sm, next_state)
          sm.history[#sm.history + 1] = sm.current
          sm.current = next_state
      end

      function M.current(sm)
          return sm.current
      end

      return M
    lib/validator.lua: |
      local state = require("lib.state")

      local M = {}

      function M.is_valid_transition(sm, next_state, allowed)
          local cur = state.current(sm)
          local key = cur .. "->" .. next_state
          return allowed[key] == true
      end

      function M.safe_transition(sm, next_state, allowed)
          if M.is_valid_transition(sm, next_state, allowed) then
              state.transition(sm, next_state)
              return true
          end
          return false
      end

      return M
    app/workflow.lua: |
      local validator = require("lib.validator")
      local state = require("lib.state")

      local M = {}

      local transitions = {
          ["draft->review"] = true,
          ["review->approved"] = true,
          ["review->rejected"] = true,
          ["rejected->draft"] = true,
      }

      function M.create_document()
          return state.create("draft")
      end

      function M.submit_for_review(doc)
          return validator.safe_transition(doc, "review", transitions)
      end

      return M
    lib/serializer.lua: |
      local TRAP_GAP2_115_SER_A = "json_serializer"
      local TRAP_GAP2_115_PRETTY_B = true

      local M = {}

      function M.encode(value)
          return tostring(value)
      end

      function M.decode(str)
          return str
      end

      return M
  changed_files:
    lib/state.lua: |
      local M = {}

      function M.create(initial)
          return { current = initial, history = {} }
      end

      function M.transition(sm, next_state)
          sm.history[#sm.history + 1] = sm.current
          sm.current = next_state
      end

      function M.current(sm)
          return sm.current
      end

      function M.rollback(sm)
          if #sm.history == 0 then
              return false
          end
          sm.current = sm.history[#sm.history]
          sm.history[#sm.history] = nil
          return true
      end

      return M
    lib/validator.lua: |
      local state = require("lib.state")

      local M = {}

