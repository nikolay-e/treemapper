name: csharp_005_cancellation_token
tags:
- lang:erlang
- change:refactor
- change:single_file
- context:call_graph
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    src/order_fsm.erl: |
      -module(order_fsm).
      -export([start/1, transition/2, state/1]).

      start(OrderId) ->
          {ok, #{id => OrderId, status => pending, history => []}}.

      transition(State = #{status := pending}, pay) ->
          {ok, State#{status => paid, history => [pay | maps:get(history, State)]}};
      transition(State = #{status := paid}, ship) ->
          {ok, State#{status => shipped, history => [ship | maps:get(history, State)]}};
      transition(State, _Event) ->
          {error, invalid_transition, State}.

      state(#{status := S}) -> S.
    src/order_api.erl: |
      -module(order_api).
      -export([create_order/1, pay_order/1, ship_order/1]).

      create_order(OrderId) ->
          order_fsm:start(OrderId).

      pay_order(State) ->
          order_fsm:transition(State, pay).

      ship_order(State) ->
          order_fsm:transition(State, ship).
    garbage/product_catalog.erl: |
      -module(product_catalog).
      %% GARBAGE_CSHAR005_A = "product_catalog_marker"
      -export([find/1]).

      find(ProductId) -> {ok, ProductId}.
    garbage/review_aggregator.erl: |
      -module(review_aggregator).
      %% GARBAGE_CSHAR005_B = "review_aggregator_marker"
      -export([average/1]).

      average(Reviews) -> lists:sum(Reviews) / length(Reviews).
    garbage/promo_engine.erl: |
      -module(promo_engine).
      %% GARBAGE_CSHAR005_C = "promo_engine_marker"
      -export([apply/2]).

      apply(Price, Discount) -> Price * (1 - Discount).
  changed_files:
    src/order_fsm.erl: |
      -module(order_fsm).
      -export([start/1, transition/2, state/1, cancel/1]).

      start(OrderId) ->
          {ok, #{id => OrderId, status => pending, history => []}}.

      transition(State = #{status := pending}, pay) ->
          {ok, State#{status => paid, history => [pay | maps:get(history, State)]}};
      transition(State = #{status := paid}, ship) ->
          {ok, State#{status => shipped, history => [ship | maps:get(history, State)]}};
      transition(State, _Event) ->
          {error, invalid_transition, State}.

      cancel(State = #{status := Status}) when Status =:= pending; Status =:= paid ->
          {ok, State#{status => cancelled, history => [cancel | maps:get(history, State)]}};
      cancel(State) ->
          {error, cannot_cancel, State}.

      state(#{status := S}) -> S.
    src/order_api.erl: |
      -module(order_api).
      -export([create_order/1, pay_order/1, ship_order/1, cancel_order/1]).

      create_order(OrderId) ->
          order_fsm:start(OrderId).

      pay_order(State) ->
          order_fsm:transition(State, pay).

      ship_order(State) ->
          order_fsm:transition(State, ship).

      cancel_order(State) ->
          order_fsm:cancel(State).
    garbage/product_catalog.erl: |
      -module(product_catalog).
      %% GARBAGE_CSHAR005_A = "product_catalog_marker"
      -export([find/1]).

      find(ProductId) -> {ok, ProductId}.
    garbage/review_aggregator.erl: |
      -module(review_aggregator).
      %% GARBAGE_CSHAR005_B = "review_aggregator_marker"
      -export([average/1]).

      average(Reviews) -> lists:sum(Reviews) / length(Reviews).
    garbage/promo_engine.erl: |
      -module(promo_engine).
      %% GARBAGE_CSHAR005_C = "promo_engine_marker"
      -export([apply/2]).

      apply(Price, Discount) -> Price * (1 - Discount).
  commit_message: "refactor: add cancel/1 to order_fsm, expose cancel_order in order_api"
