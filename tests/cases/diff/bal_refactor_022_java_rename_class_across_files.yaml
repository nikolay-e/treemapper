        end
      end
    lib/core/context.rb: |
      module Core
        class Context
          attr_accessor :data, :errors, :metadata

          def initialize(input, metadata: {})
            @data = input
            @errors = []
            @metadata = metadata
          end

          def output
            { data: @data, errors: @errors, metadata: @metadata }
          end
        end
      end
    lib/stages/validation_stage.rb: |
      require_relative '../core/stage'
      require_relative '../core/context'

      module Stages
        class ValidationStage
          include Core::Stage

          def initialize(schema)
            @schema = schema
          end

