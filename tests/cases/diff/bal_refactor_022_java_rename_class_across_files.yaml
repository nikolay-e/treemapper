repo:
  initial_files:
    lib/core/pipeline.rb: |
      require_relative 'stage'
      require_relative 'context'

      module Core
        class Pipeline
          def initialize
            @stages = []
          end

          def add_stage(stage)
            @stages << stage
            self
          end

          def run(input)
            ctx = Context.new(input)
            @stages.each { |s| s.process(ctx) }
            ctx.output
          end
        end
      end
    lib/core/stage.rb: |
      module Core
        module Stage
          def process(context)
            raise NotImplementedError
          end
        end
      end
    lib/core/context.rb: |
      module Core
        class Context
          attr_accessor :data, :errors

          def initialize(input)
            @data = input
            @errors = []
          end

          def output
            { data: @data, errors: @errors }
          end
        end
      end
    lib/stages/validation_stage.rb: |
      require_relative '../core/stage'
      require_relative '../core/context'

      module Stages
        class ValidationStage
          include Core::Stage

          def initialize(schema)
            @schema = schema
          end

          def process(context)
            @schema.each do |key, required|
              context.errors << "Missing: #{key}" if required && !context.data.key?(key)
            end
          end
        end
      end
    lib/stages/transform_stage.rb: |
      require_relative '../core/stage'

      module Stages
        class TransformStage
          include Core::Stage

          def initialize(&block)
            @transform = block
          end

          def process(context)
            context.data = @transform.call(context.data)
          end
        end
      end
    lib/app/document_processor.rb: |
      require_relative '../core/pipeline'
      require_relative '../stages/validation_stage'
      require_relative '../stages/transform_stage'

      module App
        class DocumentProcessor
          def initialize
            schema = { title: true, body: true }
            @pipeline = Core::Pipeline.new
              .add_stage(Stages::ValidationStage.new(schema))
              .add_stage(Stages::TransformStage.new { |d| d.transform_values(&:strip) })
          end

          def process(document)
            @pipeline.run(document)
          end
        end
      end
    lib/storage/archive.rb: |
      GARBAGE_REFACT022_A = 'archive_storage_v1'

      module Storage
        class Archive
          def store(key, data)
            puts "Archived #{key}"
          end
        end
      end
    lib/utils/encoder.rb: |
      GARBAGE_REFACT022_B = 'base64_encoder'
      GARBAGE_REFACT022_C = 'utf8'

      module Utils
        class Encoder
          def self.encode(str)
            Base64.strict_encode64(str)
          end
        end
      end
