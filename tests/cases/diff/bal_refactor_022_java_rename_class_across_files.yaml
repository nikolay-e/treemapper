      require_relative 'stage'
      require_relative 'context'

      module Core
        class Pipeline
          def initialize
            @stages = []
          end

          def add_stage(stage)
            @stages << stage
            self
          end

          def run(input, metadata: {})
            ctx = Context.new(input, metadata: metadata)
            @stages.each { |s| s.process(ctx) }
            ctx.output
          end
        end
      end
    lib/core/stage.rb: |
