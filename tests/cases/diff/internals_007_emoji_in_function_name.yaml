  changed_files:
    src/queue/task_queue.py: |
      from collections import deque
      from src.queue.task import Task

      class TaskQueue:
          def __init__(self, max_size: int = 100) -> None:
              self._queue: deque[Task] = deque()
              self._max_size = max_size

          def enqueue(self, task: Task) -> bool:
              if len(self._queue) >= self._max_size:
                  return False
              self._queue.append(task)
              return True

          def dequeue(self) -> Task | None:
              return self._queue.popleft() if self._queue else None

          def size(self) -> int:
              return len(self._queue)
    src/queue/task.py: |
      from dataclasses import dataclass

      @dataclass
      class Task:
          id: str
          payload: str
          priority: int = 0
    tests/test_task_queue.py: |
      from src.queue.task_queue import TaskQueue
      from src.queue.task import Task

      def test_enqueue_dequeue():
          q = TaskQueue()
          q.enqueue(Task("t1", "data"))
          assert q.dequeue().id == "t1"

      def test_empty_dequeue_returns_none():
          q = TaskQueue()
          assert q.dequeue() is None

      def test_enqueue_at_capacity_returns_false():
          q = TaskQueue(max_size=2)
          assert q.enqueue(Task("t1", "a")) is True
          assert q.enqueue(Task("t2", "b")) is True
          assert q.enqueue(Task("t3", "c")) is False
          assert q.size() == 2
