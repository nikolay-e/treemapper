      use crate::codec::encoder::{Base64Encoder, UrlSafeBase64Encoder, Encoder};
      use crate::codec::decoder::{Base64Decoder, Decoder};
      use crate::codec::pipeline::CodecPipeline;

      #[test]
      fn base64_encode_hello() {
          let enc = Base64Encoder;
          let result = enc.encode(b"hello");
          assert_eq!(result, b"aGVsbG8=");
      }

      #[test]
      fn base64_roundtrip() {
          let pipeline = CodecPipeline::new(Box::new(Base64Encoder), Box::new(Base64Decoder));
          let result = pipeline.roundtrip(b"test data").unwrap();
          assert_eq!(result, b"test data");
      }

      #[test]
      fn url_safe_encoder_replaces_plus_and_slash() {
          let enc = UrlSafeBase64Encoder;
          let result = enc.encode(b"\xfb\xff");
          assert!(!result.contains(&b'+'));
          assert!(!result.contains(&b'/'));
      }

      #[test]
      fn decoder_handles_url_safe_chars() {
          let enc = UrlSafeBase64Encoder;
          let encoded = enc.encode(b"url safe data");
          let dec = Base64Decoder;
          let decoded = dec.decode(&encoded).unwrap();
          assert_eq!(decoded, b"url safe data");
      }
