      pub trait Encoder {
          fn encode(&self, data: &[u8]) -> Vec<u8>;
          fn name(&self) -> &'static str;
      }

      pub struct Base64Encoder;

      impl Encoder for Base64Encoder {
          fn encode(&self, data: &[u8]) -> Vec<u8> {
              const ALPHABET: &[u8] = b"ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789+/";
              let mut out = Vec::new();
              let mut i = 0;
              while i < data.len() {
                  let b0 = data[i];
                  let b1 = if i + 1 < data.len() { data[i + 1] } else { 0 };
                  let b2 = if i + 2 < data.len() { data[i + 2] } else { 0 };
                  out.push(ALPHABET[(b0 >> 2) as usize]);
                  out.push(ALPHABET[((b0 & 3) << 4 | b1 >> 4) as usize]);
                  out.push(if i + 1 < data.len() { ALPHABET[((b1 & 0xf) << 2 | b2 >> 6) as usize] } else { b'=' });
                  out.push(if i + 2 < data.len() { ALPHABET[(b2 & 0x3f) as usize] } else { b'=' });
                  i += 3;
              }
              out
          }

          fn name(&self) -> &'static str { "base64" }
      }

      pub struct UrlSafeBase64Encoder;

      impl Encoder for UrlSafeBase64Encoder {
          fn encode(&self, data: &[u8]) -> Vec<u8> {
              let standard = Base64Encoder.encode(data);
              standard.into_iter().map(|b| match b {
                  b'+' => b'-',
                  b'/' => b'_',
                  other => other,
              }).collect()
          }

          fn name(&self) -> &'static str { "base64url" }
      }
    src/codec/decoder.rs: |
      pub trait Decoder {
          fn decode(&self, data: &[u8]) -> Result<Vec<u8>, String>;
          fn name(&self) -> &'static str;
      }

      pub struct Base64Decoder;

      impl Decoder for Base64Decoder {
          fn decode(&self, data: &[u8]) -> Result<Vec<u8>, String> {
              let data: Vec<u8> = data.iter()
                  .filter(|&&b| b != b'=')
                  .map(|&b| if b == b'-' { b'+' } else if b == b'_' { b'/' } else { b })
                  .collect();
              let mut out = Vec::new();
              for chunk in data.chunks(4) {
                  let v: Vec<u8> = chunk.iter().map(|&b| base64_val(b)).collect();
                  if v.iter().any(|&x| x == 255) {
                      return Err("invalid base64 character".to_string());
                  }
                  out.push(v[0] << 2 | v[1] >> 4);
                  if chunk.len() > 2 { out.push((v[1] & 0xf) << 4 | v[2] >> 2); }
                  if chunk.len() > 3 { out.push((v[2] & 3) << 6 | v[3]); }
              }
              Ok(out)
          }

          fn name(&self) -> &'static str { "base64" }
      }

      fn base64_val(b: u8) -> u8 {
          match b {
              b'A'..=b'Z' => b - b'A',
              b'a'..=b'z' => b - b'a' + 26,
              b'0'..=b'9' => b - b'0' + 52,
              b'+' => 62,
              b'/' => 63,
              _ => 255,
          }
      }
