  changed_files:
    lib/events/dispatcher.rb: |
      module Events
        class Dispatcher
          def initialize
            @listeners = Hash.new { |h, k| h[k] = [] }
            @once_listeners = Hash.new { |h, k| h[k] = [] }
          end

          def on(event_name, &block)
            @listeners[event_name] << block
          end

          def once(event_name, &block)
            @once_listeners[event_name] << block
          end

          def off(event_name)
            @listeners.delete(event_name)
            @once_listeners.delete(event_name)
          end

          def emit(event_name, data = {})
            @listeners[event_name].each { |listener| listener.call(data) }
            @once_listeners[event_name].each { |listener| listener.call(data) }
            @once_listeners.delete(event_name)
          end

          def listener_count(event_name)
            @listeners[event_name].size + @once_listeners[event_name].size
          end
        end
      end
  commit_message: "feat: add once, off, and listener_count to Dispatcher"
