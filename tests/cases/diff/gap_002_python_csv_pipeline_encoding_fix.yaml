      class DataCleaner:
          def strip_whitespace(self, rows: list[list[str]]) -> list[list[str]]:
              return [[cell.strip() for cell in row] for row in rows]

          def drop_empty_rows(self, rows: list[list[str]]) -> list[list[str]]:
              return [row for row in rows if any(cell.strip() for cell in row)]
