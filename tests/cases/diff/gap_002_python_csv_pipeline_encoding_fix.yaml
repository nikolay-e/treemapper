      from etl.readers.encoding import detect_encoding, normalize_line_endings

      class CsvReader:
          def __init__(self, delimiter: str = ",", quotechar: str = '"'):
              self._delimiter = delimiter
              self._quotechar = quotechar

          def read(self, path: str) -> list[list[str]]:
              encoding = detect_encoding(path)
              with open(path, "r", encoding=encoding, errors="replace") as f:
                  raw = f.read()
              normalized = normalize_line_endings(raw)
              rows = []
              for line in normalized.split("\n"):
                  if line.strip():
                      rows.append(self._split_row(line))
              return rows

          def _split_row(self, line: str) -> list[str]:
              fields = []
              current = []
              in_quotes = False
              for ch in line:
                  if ch == self._quotechar:
                      in_quotes = not in_quotes
                  elif ch == self._delimiter and not in_quotes:
                      fields.append("".join(current))
                      current = []
                  else:
                      current.append(ch)
              fields.append("".join(current))
              return fields

          def read_header(self, path: str) -> list[str]:
              rows = self.read(path)
              return rows[0] if rows else []
