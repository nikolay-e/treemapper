      import json

      class JsonWriter:
          def __init__(self, indent: int = 2):
              self._indent = indent

          def write(self, data: list[dict], path: str) -> None:
              with open(path, "w") as f:
                  json.dump(data, f, indent=self._indent)

          def write_lines(self, data: list[dict], path: str) -> None:
              with open(path, "w") as f:
                  for item in data:
                      f.write(json.dumps(item) + "\n")
