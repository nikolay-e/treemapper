repo:
  initial_files:
    src/main/java/com/example/Order.java: |
      package com.example;

      import javax.persistence.*;
      import java.util.List;

      @Entity
      @Table(name = "orders")
      public class Order {
          @Id
          @GeneratedValue(strategy = GenerationType.IDENTITY)
          private Long id;

          @ManyToOne
          @JoinColumn(name = "customer_id")
          private Customer customer;

          @OneToMany(mappedBy = "order", cascade = CascadeType.ALL)
          private List<OrderItem> items;
      }
    src/main/java/com/example/Customer.java: |
      package com.example;

      import javax.persistence.*;
      import java.util.List;

      @Entity
      @Table(name = "customers")
      public class Customer {
          @Id
          @GeneratedValue(strategy = GenerationType.IDENTITY)
          private Long id;

          private String name;
          private String email;

          @OneToMany(mappedBy = "customer")
          private List<Order> orders;

          public Long getId() { return id; }
          public String getName() { return name; }
          public String getEmail() { return email; }
      }
    src/main/java/com/example/OrderStatus.java: |
      package com.example;

      public enum OrderStatus {
          PENDING,
          CONFIRMED,
          SHIPPED,
          DELIVERED,
          CANCELLED;

          public boolean isTerminal() {
              return this == DELIVERED || this == CANCELLED;
          }
      }
    src/main/java/com/example/Product.java: |
      package com.example;

      import javax.persistence.*;
      import java.math.BigDecimal;

      @Entity
      @Table(name = "products")
      public class Product {
          @Id
          @GeneratedValue(strategy = GenerationType.IDENTITY)
          private Long id;

          private String name;

          @Column(precision = 10, scale = 2)
          private BigDecimal price;

          private String category;
          private boolean available;

          public Long getId() { return id; }
          public String getName() { return name; }
          public BigDecimal getPrice() { return price; }
      }
    src/main/java/com/example/OrderRepository.java: |
      package com.example;

      import org.springframework.data.jpa.repository.JpaRepository;
      import org.springframework.stereotype.Repository;
      import java.util.List;

      @Repository
      public interface OrderRepository extends JpaRepository<Order, Long> {
          List<Order> findByCustomerId(Long customerId);
          List<Order> findByStatus(OrderStatus status);
      }
    src/main/java/com/example/OrderService.java: |
      package com.example;

      import org.springframework.stereotype.Service;
      import java.util.List;

      @Service
      public class OrderService {
          private final OrderRepository orderRepository;

          public OrderService(OrderRepository orderRepository) {
              this.orderRepository = orderRepository;
          }

          public Order createOrder(Customer customer) {
              Order order = new Order();
              return orderRepository.save(order);
          }

          public List<Order> getOrdersByCustomer(Long customerId) {
              return orderRepository.findByCustomerId(customerId);
          }
      }
    src/main/java/com/example/OrderItem.java: |
      package com.example;

      import javax.persistence.*;
      import java.math.BigDecimal;

      @Entity
      @Table(name = "order_items")
      public class OrderItem {
          @Id
          @GeneratedValue(strategy = GenerationType.IDENTITY)
          private Long id;

          @ManyToOne
          @JoinColumn(name = "order_id")
          private Order order;

          @ManyToOne
          @JoinColumn(name = "product_id")
          private Product product;

          private int quantity;
          private BigDecimal unitPrice;

          public Long getId() { return id; }
          public Order getOrder() { return order; }
      }
    src/main/java/com/example/AuditEntity.java: |
      package com.example;

      import javax.persistence.*;
      import java.time.LocalDateTime;

      @MappedSuperclass
      public abstract class AuditEntity {
          @Column(name = "created_at")
          private LocalDateTime createdAt;

          @Column(name = "updated_at")
          private LocalDateTime updatedAt;

          @PrePersist
          protected void onCreate() { createdAt = LocalDateTime.now(); }

          @PreUpdate
          protected void onUpdate() { updatedAt = LocalDateTime.now(); }
      }
