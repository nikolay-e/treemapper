name: javascript_006_cy_get
tags:
- lang:typescript
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:easy
repo:
  initial_files:
    form.ts: |
      export const FORM_SELECTORS = {
          nameInput: '[data-testid=name-input]',
          emailInput: '[data-testid=email-input]',
          submitButton: '[data-testid=submit-btn]',
      };
    form.cy.ts: |
      console.log('initial');
    form.validators.ts: |
      export function isValidEmail(email: string): boolean {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      export function isValidName(name: string): boolean {
          return name.trim().length >= 2;
      }
    api-client.ts: |
      export async function submitForm(data: { name: string; email: string }) {
          const response = await fetch('/api/contact', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data),
          });
          return response.json();
      }
  changed_files:
    form.ts: |
      export const FORM_SELECTORS = {
          nameInput: '[data-testid=name-input]',
          emailInput: '[data-testid=email-input]',
          submitButton: '[data-testid=submit-btn]',
      };
    form.cy.ts: |
      import { FORM_SELECTORS } from './form';

      describe('Contact Form', () => {
          it('should submit form', () => {
              cy.visit('/contact');
              cy.get(FORM_SELECTORS.nameInput).type('John Doe');
              cy.get(FORM_SELECTORS.emailInput).type('john@example.com');
              cy.get(FORM_SELECTORS.submitButton).click();
              cy.contains('Thank you').should('be.visible');
          });
      });
    form.validators.ts: |
      export function isValidEmail(email: string): boolean {
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
      }

      export function isValidName(name: string): boolean {
          return name.trim().length >= 2;
      }
    api-client.ts: |
      export async function submitForm(data: { name: string; email: string }) {
          const response = await fetch('/api/contact', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data),
          });
          return response.json();
      }
  commit_message: Update files
