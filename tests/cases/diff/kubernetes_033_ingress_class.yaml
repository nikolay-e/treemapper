          http:
            paths:
            - path: /
              pathType: Prefix
              backend:
                service:
                  name: web-app
                  port:
                    number: 80
            - path: /static
              pathType: Prefix
              backend:
                service:
                  name: web-app
                  port:
                    number: 80
