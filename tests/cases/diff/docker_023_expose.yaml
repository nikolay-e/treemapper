name: docker_023_expose
tags:
- lang:python
- lang:shell
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/app.py: |
      from flask import Flask, jsonify
      from prometheus_client import make_wsgi_app
      from werkzeug.middleware.dispatcher import DispatcherMiddleware

      app = Flask(__name__)

      @app.route('/health')
      def health():
          return jsonify(status='ok')

      @app.route('/ready')
      def ready():
          return jsonify(status='ready')

      app.wsgi_app = DispatcherMiddleware(app.wsgi_app, {
          '/metrics': make_wsgi_app()
      })

      if __name__ == '__main__':
          app.run(host='0.0.0.0', port=8080)
    requirements.txt: |
      flask==2.3.0
      gunicorn==21.2.0
      prometheus-client==0.19.0
    Dockerfile: |
      FROM python:3.11-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY src/ ./src/
      CMD ["python", "src/app.py"]
    scripts/health_check.sh: |
      #!/bin/bash
      curl -f http://localhost:8080/health || exit 1
      curl -f http://localhost:9090/metrics || echo "Metrics not available"
    tests/test_endpoints.py: |
      from src.app import app
      def test_health():
          client = app.test_client()
          resp = client.get('/health')
          assert resp.status_code == 200
    k8s/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: flask-app
      spec:
        ports:
          - name: http
            port: 8080
            targetPort: 8080
          - name: metrics
            port: 9090
            targetPort: 9090
    monitoring/alerts.yaml: |
      groups:
        - name: app-alerts
          rules:
            - alert: AppDown
              expr: up{job="flask-app"} == 0
  changed_files:
    src/app.py: |
      from flask import Flask, jsonify
      from prometheus_client import make_wsgi_app
      from werkzeug.middleware.dispatcher import DispatcherMiddleware

      app = Flask(__name__)

      @app.route('/health')
      def health():
          return jsonify(status='ok')

      @app.route('/ready')
      def ready():
          return jsonify(status='ready')

      app.wsgi_app = DispatcherMiddleware(app.wsgi_app, {
          '/metrics': make_wsgi_app()
      })

      if __name__ == '__main__':
          app.run(host='0.0.0.0', port=8080)
    requirements.txt: |
      flask==2.3.0
      gunicorn==21.2.0
      prometheus-client==0.19.0
    Dockerfile: |
      FROM python:3.12-slim-bookworm AS base
      ENV PYTHONDONTWRITEBYTECODE=1
      ENV PYTHONUNBUFFERED=1

      FROM base AS dependencies
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install --no-cache-dir -r requirements.txt

      FROM base AS production
      WORKDIR /app

      COPY --from=dependencies /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages
      COPY --from=dependencies /usr/local/bin /usr/local/bin
      COPY src/ ./src/

      RUN useradd --create-home appuser
      USER appuser

      # Application port
      EXPOSE 8080/tcp

      # Metrics port for Prometheus scraping
      EXPOSE 9090/tcp

      # Debug port (only used in development)
      EXPOSE 5678/tcp

      HEALTHCHECK --interval=30s --timeout=5s --start-period=10s --retries=3 \
          CMD curl -f http://localhost:8080/health || exit 1

      CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:8080", "src.app:app"]
    scripts/health_check.sh: |
      #!/bin/bash
      curl -f http://localhost:8080/health || exit 1
      curl -f http://localhost:9090/metrics || echo "Metrics not available"
    tests/test_endpoints.py: |
      from src.app import app
      def test_health():
          client = app.test_client()
          resp = client.get('/health')
          assert resp.status_code == 200
    k8s/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: flask-app
      spec:
        ports:
          - name: http
            port: 8080
            targetPort: 8080
          - name: metrics
            port: 9090
            targetPort: 9090
    monitoring/alerts.yaml: |
      groups:
        - name: app-alerts
          rules:
            - alert: AppDown
              expr: up{job="flask-app"} == 0
  commit_message: Update files
fragments:
- id: dockerfile
  selector:
    path: Dockerfile
    anchor: EXPOSE 8080/tcp
- id: dockerfile_1
  selector:
    path: Dockerfile
    anchor: EXPOSE 9090/tcp
- id: dockerfile_2
  selector:
    path: Dockerfile
    anchor: CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:8080", "src.app:app"]
- id: app
  selector:
    path: src/app.py
    anchor: app.run(host='0.0.0.0', port=8080)
- id: app_1
  selector:
    path: src/app.py
    anchor: /metrics
- id: no_health_check
  selector:
    path: scripts/health_check.sh
- id: no_test_endpoints
  selector:
    path: tests/test_endpoints.py
- id: no_service
  selector:
    path: k8s/service.yaml
- id: no_alerts
  selector:
    path: monitoring/alerts.yaml
oracle:
  required:
  - dockerfile
  - dockerfile_1
  - dockerfile_2
  - app
  - app_1
  allowed: []
  forbidden:
  - no_health_check
  - no_test_endpoints
  - no_service
  - no_alerts
