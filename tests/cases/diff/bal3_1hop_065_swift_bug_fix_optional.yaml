    Sources/Core/ConfigLoader.swift: |
      import Foundation

      struct AppConfig {
          let apiKey: String
          let timeout: Int
          let retryCount: Int
          let baseURL: String
      }

      class ConfigLoader {
          func load(from path: String) throws -> AppConfig {
              guard let data = FileManager.default.contents(atPath: path) else {
                  throw ConfigError.fileNotFound(path)
              }
              guard let config = parseConfig(data: data) else {
                  throw ConfigError.invalidFormat
              }
              return config
          }

          private func parseConfig(data: Data) -> AppConfig? {
              return nil
          }
      }

      enum ConfigError: Error {
          case fileNotFound(String)
          case invalidFormat
      }
