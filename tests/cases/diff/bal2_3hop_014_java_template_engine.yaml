    src/main/java/com/app/template/TemplateContext.java: |
      package com.app.template;

      import com.app.template.Variable;
      import java.util.HashMap;
      import java.util.Map;

      public class TemplateContext {
          private final Map<String, Variable> variables = new HashMap<>();
          public void set(String name, String value) {
              variables.put(name, new Variable(name, value, true));
          }
          public void setRaw(String name, String value) {
              variables.put(name, new Variable(name, value, false));
          }
          public String resolve(String name) {
              Variable v = variables.get(name);
              return v != null ? v.getValue() : "";
          }
      }
