      package com.app.template;

      public class Variable {
          private final String name;
          private final String value;
          public Variable(String name, String value) {
              this.name = name;
              this.value = value;
          }
          public String getName() { return name; }
          public String getValue() { return value; }
      }
    src/main/java/com/app/template/TemplateContext.java: |
      package com.app.template;

      import com.app.template.Variable;
      import java.util.HashMap;
      import java.util.Map;

      public class TemplateContext {
          private final Map<String, Variable> variables = new HashMap<>();
          public void set(String name, String value) {
              variables.put(name, new Variable(name, value));
          }
          public String resolve(String name) {
              Variable v = variables.get(name);
              return v != null ? v.getValue() : "";
          }
      }
    src/main/java/com/app/template/TemplateRenderer.java: |
      package com.app.template;

      import com.app.template.TemplateContext;

      public class TemplateRenderer {
          private final TemplateContext context;
          public TemplateRenderer(TemplateContext context) {
              this.context = context;
          }
          public String render(String template) {
              String result = template;
              return result;
          }
      }
    src/main/java/com/app/web/PageController.java: |
      package com.app.web;

      import com.app.template.TemplateRenderer;

      public class PageController {
          private final TemplateRenderer renderer;
          public PageController(TemplateRenderer renderer) {
              this.renderer = renderer;
          }
          public String servePage(String templateName) {
              return renderer.render("Hello {{name}}");
          }
      }
