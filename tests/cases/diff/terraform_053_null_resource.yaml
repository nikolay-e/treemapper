name: terraform_053_null_resource
tags:
- lang:shell
- lang:terraform
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    scripts/deploy.sh: |
      #!/bin/bash
      ENV=$1
      echo "Deploying application to ${ENV}..."
      aws ecs update-service --cluster main --service app-${ENV} --force-new-deployment
    main.tf: |
      variable "build_version" {
        type = string
      }

      variable "environment" {
        type    = string
        default = "production"
      }
    compute.tf: |
      resource "aws_instance" "web" {
        ami           = var.ami_id
        instance_type = "t3.micro"

        tags = {
          Name    = "web-server"
          Version = var.build_version
        }
      }
    config.json: |
      {
        "app_name": "webapp",
        "port": 8080,
        "workers": 4
      }
    healthcheck.tf: |
      resource "null_resource" "healthcheck" {
        triggers = {
          endpoint = "https://api.example.com/health"
        }

        provisioner "local-exec" {
          command = "curl -f https://api.example.com/health"
        }
      }
    networking/subnet.tf: |
      resource "aws_subnet" "private" {
        vpc_id     = aws_vpc.main.id
        cidr_block = "10.0.1.0/24"

        tags = {
          Name = "private-subnet"
        }
      }
  changed_files:
    main.tf: |
      variable "build_version" {
        type = string
      }

      variable "environment" {
        type    = string
        default = "production"
      }

      resource "null_resource" "deploy" {
        triggers = {
          build_version = var.build_version
          config_hash   = md5(file("config.json"))
        }

        provisioner "local-exec" {
          command = "./scripts/deploy.sh ${var.environment}"
        }

        depends_on = [aws_instance.web]
      }
  commit_message: Update files
fragments:
- id: main
  selector:
    path: main.tf
    anchor: resource "null_resource" "deploy" {
- id: main_1
  selector:
    path: main.tf
    anchor: build_version = var.build_version
- id: main_2
  selector:
    path: main.tf
    anchor: config_hash   = md5(file("config.json"))
- id: main_3
  selector:
    path: main.tf
    anchor: depends_on = [aws_instance.web]
- id: deploy
  selector:
    path: scripts/deploy.sh
    anchor: Deploying application
- id: compute
  selector:
    path: compute.tf
    anchor: resource "aws_instance" "web" {
- id: no_healthcheck
  selector:
    path: healthcheck.tf
- id: no_subnet
  selector:
    path: networking/subnet.tf
- id: no_global_0
  selector:
    anchor: api.example.com/health
- id: no_global_1
  selector:
    anchor: 10.0.1.0/24
oracle:
  required:
  - main
  - main_1
  - main_2
  - main_3
  - deploy
  - compute
  allowed: []
  forbidden:
  - no_healthcheck
  - no_subnet
  - no_global_0
  - no_global_1
