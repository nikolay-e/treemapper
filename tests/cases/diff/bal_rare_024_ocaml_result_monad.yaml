repo:
  initial_files:
    lib/ml/model.rb: |
      module Ml
        class Model
          attr_reader :name, :version

          def initialize(name, version)
            @name = name
            @version = version
          end

          def predict(features)
            raise NotImplementedError
          end
        end
      end
    lib/ml/classifier.rb: |
      require_relative 'model'

      module Ml
        class Classifier < Model
          def predict(features)
            features.values.sum > 0.5 ? 'positive' : 'negative'
          end
        end
      end
    lib/inference/pipeline.rb: |
      require_relative '../ml/classifier'

      module Inference
        class Pipeline
          def initialize(model)
            @model = model
          end

          def run(features)
            @model.predict(features)
          end
        end
      end
    lib/inference/batch_runner.rb: |
      require_relative 'pipeline'

      module Inference
        class BatchRunner
          def initialize(pipeline)
            @pipeline = pipeline
          end

          def run_batch(records)
            records.map { |r| { id: r[:id], label: @pipeline.run(r[:features]) } }
          end
        end
      end
    lib/api/prediction_controller.rb: |
      require_relative '../inference/batch_runner'

      module Api
        class PredictionController
          def initialize(runner)
            @runner = runner
          end

          def predict_batch(records)
            @runner.run_batch(records)
          end
        end
      end
    garbage/trainer.rb: |
      # GARBAGE_OCAMLRES_A = "model_trainer_marker"
    garbage/evaluator.rb: |
      # GARBAGE_OCAMLRES_B = "model_evaluator_marker"
    garbage/registry.rb: |
      # GARBAGE_OCAMLRES_C = "model_registry_marker"
  changed_files:
    lib/ml/model.rb: |
      module Ml
        class Model
          attr_reader :name, :version, :threshold

          def initialize(name, version, threshold: 0.5)
            @name = name
            @version = version
            @threshold = threshold
          end

          def predict(features, context: {})
            raise NotImplementedError
          end

          def metadata
            { name: @name, version: @version, threshold: @threshold }
          end
        end
      end
    lib/ml/classifier.rb: |
      require_relative 'model'

      module Ml
        class Classifier < Model
          def predict(features, context: {})
            score = features.values.sum
            score > @threshold ? 'positive' : 'negative'
          end
        end
      end
    lib/inference/pipeline.rb: |
      require_relative '../ml/classifier'

      module Inference
        class Pipeline
          def initialize(model)
            @model = model
          end

          def run(features, context: {})
            @model.predict(features, context: context)
          end
        end
      end
    lib/inference/batch_runner.rb: |
      require_relative 'pipeline'

      module Inference
        class BatchRunner
          def initialize(pipeline)
            @pipeline = pipeline
          end

          def run_batch(records, context: {})
            records.map { |r| { id: r[:id], label: @pipeline.run(r[:features], context: context) } }
          end
        end
      end
    lib/api/prediction_controller.rb: |
      require_relative '../inference/batch_runner'

      module Api
        class PredictionController
          def initialize(runner)
            @runner = runner
          end

          def predict_batch(records, context: {})
            @runner.run_batch(records, context: context)
          end
        end
      end
    garbage/trainer.rb: |
      # GARBAGE_OCAMLRES_A = "model_trainer_marker"
    garbage/evaluator.rb: |
      # GARBAGE_OCAMLRES_B = "model_evaluator_marker"
    garbage/registry.rb: |
      # GARBAGE_OCAMLRES_C = "model_registry_marker"
  commit_message: "feat: propagate context hash through predict/run/batch chain"
