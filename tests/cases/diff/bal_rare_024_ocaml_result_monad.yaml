name: bal_rare_024_ocaml_result_monad
tags:
- lang:ocaml
- change:multi_file
- change:bug_fix
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    lib/result.ml: |
      type ('a, 'e) t =
        | Ok of 'a
        | Error of 'e

      let map f = function
        | Ok v -> Ok (f v)
        | Error e -> Error e

      let bind f = function
        | Ok v -> f v
        | Error e -> Error e

      let ( >>= ) r f = bind f r
    lib/validate.ml: |
      open Result

      let validate_age age =
        if age < 0 then Error "Age cannot be negative"
        else if age > 150 then Error "Age unreasonably high"
        else Ok age

      let validate_name name =
        if String.length name = 0 then Error "Name cannot be empty"
        else Ok name
    lib/user.ml: |
      open Result
      open Validate

      type user = { name : string; age : int }

      let create_user name age =
        validate_name name >>= fun valid_name ->
        validate_age age >>= fun valid_age ->
        Ok { name = valid_name; age = valid_age }
    lib/app.ml: |
      open User

      let run () =
        match create_user "Alice" 30 with
        | Result.Ok u -> Printf.printf "Created user: %s, age %d\n" u.name u.age
        | Result.Error e -> Printf.printf "Error: %s\n" e
    garbage_http.ml: |
      let garbage_rare_024_method_a = "GET"
      let garbage_rare_024_status_b = 200

      let garbage_request () =
        garbage_rare_024_method_a

      let garbage_rare_024_timeout_c = 30
    garbage_db.ml: |
      let garbage_rare_024_driver_d = "postgresql"
      let garbage_rare_024_pool_e = 5

      let garbage_connect () =
        garbage_rare_024_driver_d

      let garbage_rare_024_ssl_f = true
  changed_files:
    lib/result.ml: |
      type ('a, 'e) t =
        | Ok of 'a
        | Error of 'e

      let map f = function
        | Ok v -> Ok (f v)
        | Error e -> Error e

      let bind f = function
        | Ok v -> f v
        | Error e -> Error e

      let map_error f = function
        | Ok v -> Ok v
        | Error e -> Error (f e)

      let ( >>= ) r f = bind f r

      let ( >|= ) r f = map f r
    lib/validate.ml: |
      open Result

      let validate_age age =
        if age < 0 then Error "Age cannot be negative"
        else if age > 150 then Error "Age unreasonably high"
        else Ok age

      let validate_name name =
        if String.length name = 0 then Error "Name cannot be empty"
        else if String.length name > 100 then Error "Name too long"
        else Ok (String.trim name)

      let validate_email email =
        if not (String.contains email '@') then Error "Invalid email"
        else Ok email
    lib/user.ml: |
      open Result
      open Validate

      type user = { name : string; age : int; email : string }

      let create_user name age email =
        validate_name name >>= fun valid_name ->
        validate_age age >>= fun valid_age ->
        validate_email email >>= fun valid_email ->
        Ok { name = valid_name; age = valid_age; email = valid_email }
    lib/app.ml: |
      open User

      let run () =
        match create_user "Alice" 30 "alice@example.com" with
        | Result.Ok u -> Printf.printf "Created user: %s, age %d, email %s\n" u.name u.age u.email
        | Result.Error e -> Printf.printf "Error: %s\n" e
    garbage_http.ml: |
      let garbage_rare_024_method_a = "GET"
      let garbage_rare_024_status_b = 200

      let garbage_request () =
        garbage_rare_024_method_a

      let garbage_rare_024_timeout_c = 30
    garbage_db.ml: |
      let garbage_rare_024_driver_d = "postgresql"
      let garbage_rare_024_pool_e = 5

      let garbage_connect () =
        garbage_rare_024_driver_d

      let garbage_rare_024_ssl_f = true
  commit_message: "feat: add email validation and map_error to result monad"
