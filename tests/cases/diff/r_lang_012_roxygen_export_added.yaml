name: r_lang_012_roxygen_export_added
tags:
- lang:r
- change:multi_file
- change:config
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    R/utils.R: |
      #' @keywords internal
      format_number <- function(x, digits = 2, big_mark = ",") {
        formatC(x, format = "f", digits = digits, big.mark = big_mark)
      }

      #' @export
      summarise_numeric <- function(x) {
        list(
          mean = format_number(mean(x, na.rm = TRUE)),
          sd = format_number(sd(x, na.rm = TRUE)),
          min = format_number(min(x, na.rm = TRUE)),
          max = format_number(max(x, na.rm = TRUE))
        )
      }
    NAMESPACE: |
      # Generated by roxygen2: do not edit by hand

      export(summarise_numeric)
    R/R_NOISE_012_assert_utils.R: |
      R_NOISE_012_assert_length <- function(x, n) {
        if (length(x) != n) stop("Expected length ", n, ", got ", length(x))
        invisible(x)
      }
      R_NOISE_012_assert_type <- function(x, cls) {
        if (!inherits(x, cls)) stop("Expected class ", cls, ", got ", class(x)[1])
        invisible(x)
      }
    R/R_NOISE_012_progress_utils.R: |
      R_NOISE_012_make_progress_bar <- function(total, width = 40) {
        list(
          total = total,
          current = 0,
          width = width,
          tick = function() NULL
        )
      }
  changed_files:
    R/utils.R: |
      #' @export
      format_number <- function(x, digits = 2, big_mark = ",") {
        formatC(x, format = "f", digits = digits, big.mark = big_mark)
      }

      #' @export
      summarise_numeric <- function(x) {
        list(
          mean = format_number(mean(x, na.rm = TRUE)),
          sd = format_number(sd(x, na.rm = TRUE)),
          min = format_number(min(x, na.rm = TRUE)),
          max = format_number(max(x, na.rm = TRUE))
        )
      }
    NAMESPACE: |
      # Generated by roxygen2: do not edit by hand

      export(format_number)
      export(summarise_numeric)
  commit_message: "Update files"
fragments:
- id: utils_export_added
  selector:
    path: R/utils.R
    anchor: format_number
- id: namespace_updated
  selector:
    path: NAMESPACE
    anchor: format_number
- id: no_assert_utils
  selector:
    path: R/R_NOISE_012_assert_utils.R
- id: no_progress_utils
  selector:
    path: R/R_NOISE_012_progress_utils.R
- id: no_global_0
  selector:
    anchor: R_NOISE_012_assert_length
- id: no_global_1
  selector:
    anchor: R_NOISE_012_make_progress_bar
oracle:
  required:
  - utils_export_added
  - namespace_updated
  allowed: []
  forbidden:
  - no_assert_utils
  - no_progress_utils
  - no_global_0
  - no_global_1
