    src/db/query_builder.rs: |
      use std::fmt;

      #[derive(Debug, Clone)]
      pub struct PaginationParams {
          pub page: u32,
          pub page_size: u32,
      }

      impl PaginationParams {
          pub fn new(page: u32, page_size: u32) -> Self {
              Self { page, page_size }
          }

          pub fn offset(&self) -> u32 {
              self.page.saturating_sub(1) * self.page_size
          }

          pub fn limit(&self) -> u32 {
              self.page_size
          }
      }

      impl fmt::Display for PaginationParams {
          fn fmt(&self, f: &mut fmt::Formatter<'_>) -> fmt::Result {
              write!(f, "LIMIT {} OFFSET {}", self.limit(), self.offset())
          }
      }
    src/api/listing_handler.rs: |
      use crate::db::query_builder::PaginationParams;

      pub struct ListingQuery {
          pub category: String,
          pub pagination: PaginationParams,
      }

      pub fn build_listing_sql(query: &ListingQuery) -> String {
          format!(
              "SELECT * FROM listings WHERE category = '{}' {}",
              query.category,
              query.pagination,
          )
      }
