name: gap2_031_ts_bugfix_pagination_offset
tags:
- change:bug_fix
- change:single_file
- context:import_chain
- difficulty:easy
- distance:2hop
- lang:typescript
repo:
  initial_files:
    src/pagination/paginator.ts: |
      export interface Page<T> {
        items: T[];
        total: number;
        page: number;
        pageSize: number;
      }

      export function paginate<T>(items: T[], page: number, pageSize: number): Page<T> {
        const offset = page * pageSize;
        const slice = items.slice(offset, offset + pageSize);
        return { items: slice, total: items.length, page, pageSize };
      }
    src/pagination/cursor.ts: |
      import { paginate, Page } from "./paginator";

      export function paginateWithCursor<T>(
        items: T[],
        cursor: number,
        limit: number
      ): Page<T> & { nextCursor: number | null } {
        const result = paginate(items, cursor, limit);
        const nextCursor = cursor + 1 < Math.ceil(items.length / limit) ? cursor + 1 : null;
        return { ...result, nextCursor };
      }
    src/pagination/api.ts: |
      import { paginateWithCursor } from "./cursor";

      export function handleListRequest(items: any[], query: { page?: string; limit?: string }) {
        const page = parseInt(query.page || "0", 10);
        const limit = parseInt(query.limit || "20", 10);
        return paginateWithCursor(items, page, limit);
      }
    src/pagination/sorting.ts: |
      const TRAP_GAP2031_DEFAULT_A: string = "asc";
      const TRAP_GAP2031_FIELD_B: string = "id";

      export function sortItems<T>(items: T[], field: keyof T, order: string): T[] {
        return [...items].sort((a, b) => {
          if (order === "desc") return a[field] > b[field] ? -1 : 1;
          return a[field] > b[field] ? 1 : -1;
        });
      }
    src/pagination/filter.ts: |
      const TRAP_GAP2031_OPERATOR_C: string = "eq";
      const TRAP_GAP2031_CASESENS_D: boolean = false;

      export function filterItems<T>(items: T[], field: keyof T, value: unknown): T[] {
        return items.filter((item) => item[field] === value);
      }
