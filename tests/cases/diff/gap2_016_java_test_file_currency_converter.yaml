repo:
  initial_files:
    src/main/java/com/travel/currency/CurrencyConverter.java: |
      package com.travel.currency;

      import java.util.Map;

      public class CurrencyConverter {
          private final Map<String, Double> ratesToUsd;

          public CurrencyConverter(Map<String, Double> ratesToUsd) {
              this.ratesToUsd = ratesToUsd;
          }

          public double convert(double amount, String from, String to) {
              double inUsd = amount / ratesToUsd.get(from);
              return inUsd * ratesToUsd.get(to);
          }

          public boolean supports(String currency) {
              return ratesToUsd.containsKey(currency);
          }
      }
