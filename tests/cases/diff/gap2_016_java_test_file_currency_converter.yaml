    src/test/java/com/travel/currency/CurrencyConverterTest.java: |
      package com.travel.currency;

      import org.junit.jupiter.api.Test;
      import java.util.Map;
      import static org.junit.jupiter.api.Assertions.*;

      class CurrencyConverterTest {
          private final CurrencyConverter converter = new CurrencyConverter(
              Map.of("USD", 1.0, "EUR", 0.92, "GBP", 0.79)
          );

          @Test
          void convertUsdToEur() {
              double result = converter.convert(100, "USD", "EUR");
              assertEquals(92.0, result, 0.01);
          }

          @Test
          void supportsKnownCurrency() {
              assertTrue(converter.supports("EUR"));
          }
      }
    src/main/java/com/travel/booking/FlightSearch.java: |
      package com.travel.booking;

      import java.util.List;

      public class FlightSearch {
          public List<String> search(String origin, String destination, String date) {
              return List.of(origin + "-" + destination + "-" + date);
          }

          public double cheapest(List<Double> prices) {
              return prices.stream().mapToDouble(Double::doubleValue).min().orElse(0.0);
          }
      }
  changed_files:
    src/main/java/com/travel/currency/CurrencyConverter.java: |
      package com.travel.currency;

      import java.util.Map;

      public class CurrencyConverter {
          private final Map<String, Double> ratesToUsd;

          public CurrencyConverter(Map<String, Double> ratesToUsd) {
              this.ratesToUsd = ratesToUsd;
          }

          public double convert(double amount, String from, String to) {
              if (!supports(from) || !supports(to)) {
                  throw new IllegalArgumentException("Unsupported currency: " + from + " or " + to);
              }
              double inUsd = amount / ratesToUsd.get(from);
              return Math.round(inUsd * ratesToUsd.get(to) * 100.0) / 100.0;
          }

          public boolean supports(String currency) {
              return ratesToUsd.containsKey(currency);
          }
      }
  commit_message: "feat: add validation and rounding to currency conversion"
