  app/Models/Comment.php: |
    <?php
    namespace App\Models;

    class Comment {
        public int $id;
        public int $post_id;
        public string $content;
        public int $user_id;

        public function __construct(int $id, int $post_id, int $user_id, string $content) {
            $this->id = $id;
            $this->post_id = $post_id;
            $this->user_id = $user_id;
            $this->content = $content;
        }

        public function belongsToPost(Post $post): bool {
            return $this->post_id === $post->id;
        }
    }
