# Scenario: User model gains hasMany relationship to Post (posts(), addPost(), latestPost())
# Changed: User now imports and references Post class for relationship methods
# Reviewer needs: User (changed) + Post (unchanged, defines Post shape used by User)
# Trap: Comment model — also has post_id field and belongs to Post, but User doesn't touch it
# Trap: Tag model — similar model structure with id/name, but no relationship to User
# Trap: Category — has similar getPostCount()-like method, same domain vocabulary

initial:
  app/Models/Post.php: |
    <?php
    namespace App\Models;

    class Post {
        public int $id;
        public int $user_id;
        public string $title;
        public string $body;

        public function __construct(int $id, int $user_id, string $title, string $body) {
            $this->id = $id;
            $this->user_id = $user_id;
            $this->title = $title;
            $this->body = $body;
        }

        public function getSummary(): string {
            return substr($this->body, 0, 100);
        }
    }
