# Scenario: ProfileController uses DynamicObject with magic methods (__get/__set)
#   — reviewer needs DynamicObject to understand property access behavior
#
# Diff shows:
#   - class ProfileController { show(): array }
#   + use App\Core\DynamicObject; updateProfile() creates DynamicObject,
#     sets $profile->name, $profile->email via __set, reads $profile->name
#     via __get, checks isset($profile->name) via __isset, calls markReadOnly()
#
# Reviewer questions:
#   Q1: "What happens when you do $profile->name = ... ?"
#       -> __set stores in $data array, but checks readOnly list first.
#          If property is readOnly, throws RuntimeException.
#   Q2: "What does markReadOnly do — does it throw on subsequent writes?"
#       -> Adds name to readOnly array; subsequent __set throws RuntimeException.
#   Q3: "What does isset($profile->name) check?"
#       -> __isset checks if key exists in $data array.
#
# Not needed for comprehension:
#   - src/Core/Configuration.php: another dynamic property holder in same
#     Core namespace. Has get/set/has methods — similar key-value store.
#     But uses standard getters, not magic methods. Same directory.
#
#   - src/Controllers/SettingsController.php: sibling controller that also
#     manages user preferences. Has update(section, values) method. Same
#     Controllers namespace. Profile-adjacent domain. But doesn't use
#     DynamicObject.
#
#   - src/Core/PropertyBag.php: another key-value container in Core namespace.
#     Has setProperty/getProperty methods. HARD TRAP: structurally similar
#     to DynamicObject (stores in array, has set/get). But uses explicit
#     methods, not magic, and is not imported by ProfileController.
#
#   - src/Controllers/AccountController.php: sibling controller managing
#     user accounts. Has updateAccount() method — similar name pattern to
#     updateProfile(). Same namespace. But independent of DynamicObject.
#
#   - src/Core/EventDispatcher.php: same Core namespace as DynamicObject.
#     Has __call magic method. HARD TRAP: also uses magic methods, same
#     namespace. But dispatches events, not property access.

initial:
  src/Core/DynamicObject.php: |
    <?php
    namespace App\Core;

    class DynamicObject {
        private array $data = [];
        private array $readOnly = [];

        public function __get(string $name): mixed {
            return $this->data[$name] ?? null;
        }

        public function __set(string $name, mixed $value): void {
            if (in_array($name, $this->readOnly)) {
                throw new \RuntimeException("Property $name is read-only");
            }
            $this->data[$name] = $value;
        }

        public function __isset(string $name): bool {
            return isset($this->data[$name]);
        }

        public function __unset(string $name): void {
            unset($this->data[$name]);
        }

        public function markReadOnly(string $name): void {
            $this->readOnly[] = $name;
        }

        public function toArray(): array {
            return $this->data;
        }
    }
