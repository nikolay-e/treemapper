# Test 001: UserController adds methods that instantiate User model
#           — reviewer needs User class to understand constructor signature
#
# Scenario: UserController gains store() and show() methods that create User
# instances via `new User(...)`. The diff adds `use App\Models\User` and two
# new methods calling User's constructor and getters.
#
# Reviewer questions:
#   Q1: "What parameters does User's constructor accept?"
#       -> User.__construct takes (string $name, string $email, int $age).
#       Reviewer needs this to verify the store() and show() calls are correct.
#   Q2: "What does isAdult() return — is the string formatting in show() right?"
#       -> isAdult() returns bool based on age >= 18, used in ternary.
#
# Trap files (plausible but unrelated):
#   - src/Models/Product.php: another model class in same namespace with similar
#     constructor pattern, but never referenced by UserController.
#   - src/Controllers/OrderController.php: sibling controller that also has
#     store/show methods, but operates on a different model entirely.
#   - src/Validators/UserValidator.php: shares "User" in name and validates
#     email/name fields, but is not imported or used by UserController.

initial:
  src/Models/User.php: |
    <?php
    namespace App\Models;

    class User {
        private string $name;
        private string $email;
        private int $age;

        public function __construct(string $name, string $email, int $age) {
            $this->name = $name;
            $this->email = $email;
            $this->age = $age;
        }

        public function getName(): string {
            return $this->name;
        }

        public function getEmail(): string {
            return $this->email;
        }

        public function getAge(): int {
            return $this->age;
        }

        public function isAdult(): bool {
            return $this->age >= 18;
        }
    }
  src/Controllers/UserController.php: |
