# Scenario: ConnectionManager gains constructor injection of DatabaseConfig
# Changed: ConnectionManager now imports and depends on DatabaseConfig via constructor promotion
# Reviewer needs: ConnectionManager (changed) + DatabaseConfig (unchanged, provides getDsn/getHost/getPort)
# Trap: CacheConfig — similar config class with readonly constructor params, but no dependency edge
# Trap: SessionManager — similar "Manager" service, also has connect()-like methods
# Trap: RedisConfig — config class with getDsn() method, domain overlap but no import

initial:
  src/Config/DatabaseConfig.php: |
    <?php
    namespace App\Config;

    class DatabaseConfig {
        public function __construct(
            private readonly string $host,
            private readonly int $port,
            private readonly string $database,
            private readonly string $username,
            private readonly bool $ssl = false
        ) {}

        public function getDsn(): string {
            $scheme = $this->ssl ? 'pgsql' : 'mysql';
            return "{$scheme}:host={$this->host};port={$this->port};dbname={$this->database}";
        }

        public function getHost(): string {
            return $this->host;
        }

        public function getPort(): int {
            return $this->port;
        }
    }
