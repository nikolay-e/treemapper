# Test 006: UserRegistration service uses User static methods for CRUD
#           — reviewer needs User model to verify static API (find, create, all, count)
#
# Scenario: UserRegistration gains register(), listAll(), getTotalCount() that
# call User::find(), User::create(), User::all(), User::count(). Adds email
# uniqueness check via User::find(1).
#
# Reviewer questions:
#   Q1: "What do User::find and User::create return?"
#       -> find returns ?self (nullable), create returns self after inserting.
#   Q2: "Does User::all return objects or arrays?"
#       -> array_values of the static $users array, so User objects.
#
# Trap files (plausible but unrelated):
#   - src/Services/UserNotification.php: shares "User" prefix, sends emails
#     to users, but doesn't use User model static methods.
#   - src/Models/Role.php: related to users conceptually (user roles), but
#     not imported or referenced by UserRegistration.

max_enrichment: 5.6
initial:
  src/Models/User.php: |
    <?php
    namespace App\Models;

    class User {
        private static array $users = [];
        public int $id;
        public string $name;
        public string $email;

        public function __construct(int $id, string $name, string $email) {
            $this->id = $id;
            $this->name = $name;
            $this->email = $email;
        }

        public static function find(int $id): ?self {
            return self::$users[$id] ?? null;
        }

        public static function create(string $name, string $email): self {
            $id = count(self::$users) + 1;
            $user = new self($id, $name, $email);
            self::$users[$id] = $user;
            return $user;
        }

        public static function all(): array {
            return array_values(self::$users);
        }

        public static function count(): int {
            return count(self::$users);
        }
    }
  src/Services/UserRegistration.php: |
    <?php
    namespace App\Services;

    class UserRegistration {
        public function register(string $name): bool {
            return !empty($name);
        }
    }
  src/Services/UserNotification.php: |
    <?php
    namespace App\Services;

    class UserNotification {
        private string $fromEmail;

        public function __construct(string $fromEmail = 'noreply@app.com') {
            $this->fromEmail = $fromEmail;
        }

        public function sendWelcome(string $toEmail, string $userName): bool {
            $subject = "Welcome, {$userName}!";
            return $this->sendMail($toEmail, $subject, "Thanks for joining.");
        }

        private function sendMail(string $to, string $subject, string $body): bool {
            return !empty($to) && !empty($subject);
        }
    }
  src/Models/Role.php: |
    <?php
    namespace App\Models;

    class Role {
        public string $name;
        public array $permissions;

        public function __construct(string $name, array $permissions = []) {
            $this->name = $name;
            $this->permissions = $permissions;
        }

        public function hasPermission(string $permission): bool {
            return in_array($permission, $this->permissions);
        }
    }

