  src/Services/ResponseCache.php: |
    <?php
    namespace App\Services;

    class ResponseCache {
        private array $cache = [];
        private int $ttl;

        public function __construct(int $ttl = 300) {
            $this->ttl = $ttl;
        }

        public function store(string $key, string $responseBody): void {
            $this->cache[$key] = ['body' => $responseBody, 'expires' => time() + $this->ttl];
        }

        public function retrieve(string $key): ?string {
            if (isset($this->cache[$key]) && $this->cache[$key]['expires'] > time()) {
                return $this->cache[$key]['body'];
            }
            return null;
        }

        public function invalidate(string $key): void {
            unset($this->cache[$key]);
        }
    }
  src/Http/JsonResponse.php: |
    <?php
    namespace App\Http;

    class JsonResponse {
        private int $status;
        private array $data;

        public function __construct(array $data, int $status = 200) {
            $this->data = $data;
            $this->status = $status;
        }

        public static function fromArray(array $data, int $status = 200): self {
            return new self($data, $status);
        }

        public function getDecoded(): array {
            return $this->data;
        }

        public function toResponse(): Response {
            return new Response($this->status, ['Content-Type' => 'application/json'], json_encode($this->data));
        }
    }
