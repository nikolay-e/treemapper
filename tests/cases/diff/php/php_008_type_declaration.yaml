# Scenario: DataProcessor adds typed methods using Response class
#   — reviewer needs Response class to verify constructor and getter usage
#
# Diff shows:
#   - class DataProcessor { transform(array): array }
#   + use App\Http\Response; processResponse(Response) decodes getBody(),
#     buildResponse() constructs new Response(status, headers, body),
#     transform() gains typed closure fn(mixed): string
#
# Reviewer questions:
#   Q1: "What does Response::getBody() return — can it be json_decoded?"
#       -> getBody() returns string (the raw body), so json_decode is appropriate.
#   Q2: "What constructor signature does Response have — are 3 args correct?"
#       -> (int $status, array $headers, string $body). Yes, 3 args match.
#   Q3: "What does getStatus() return for the result array?"
#       -> Returns int $status from the constructor.
#
# Not needed for comprehension:
#   - src/Http/Request.php: sibling HTTP class in same Http namespace. Has
#     getBody() method too. HARDEST TRAP: same namespace, same getBody()
#     signature, similar constructor pattern. But not used by DataProcessor.
#
#   - src/Services/ResponseCache.php: shares "Response" in class name.
#     Same Services namespace as DataProcessor. Stores response bodies.
#     But is not imported by DataProcessor.
#
#   - src/Http/JsonResponse.php: extends Response concept with JSON methods.
#     Same Http namespace. Has fromArray() and getDecoded(). HARD TRAP:
#     domain overlap with json_decode in the diff. But not imported.
#
#   - src/Services/HttpClient.php: sends HTTP requests and returns responses.
#     Same Services namespace. Uses Response as return type. But DataProcessor
#     processes responses, it doesn't send requests.
#
#   - src/Http/StatusCode.php: HTTP status code constants used alongside
#     Response. Same namespace. Has isSuccess(int) method. But not referenced.

