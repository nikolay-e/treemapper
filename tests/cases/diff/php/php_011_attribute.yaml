            return ['users' => []];
        }

        #[Route('/api/users', 'POST', middleware: ['auth'])]
        public function createUser(array $data): array {
            return ['user' => $data, 'created' => true];
        }

        #[Route('/api/users/{id}', 'DELETE', middleware: ['auth', 'admin'])]
        public function deleteUser(int $id): array {
            return ['deleted' => $id];
        }
    }
