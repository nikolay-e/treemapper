# Test 010: Parser adds union-typed methods using Data DTO
#           — reviewer needs Data class to understand value wrapping semantics
#
# Scenario: Parser gains parse(string|array) returning Data, and
# normalize(int|float|string) returning string. Both use PHP 8.0 union types.
# parse() wraps decoded JSON or raw input in a Data DTO.
#
# Reviewer questions:
#   Q1: "What does new Data($value) store — is mixed ok?"
#       -> Data constructor accepts mixed, stores in public $value, tracks type.
#   Q2: "Does Data have methods Parser might chain?"
#       -> isNumeric(), toString(), getType() — but Parser doesn't chain them.
#
# Trap files (plausible but unrelated):
#   - src/DTO/Config.php: sibling DTO in same namespace with similar structure,
#     but not used by Parser.
#   - src/Services/Formatter.php: shares text-processing domain, has normalize()
#     method with similar name, but is not imported by Parser.

max_enrichment: 8.6
initial:
  src/DTO/Data.php: |
    <?php
    namespace App\DTO;

    class Data {
        public mixed $value;
        private string $type;

        public function __construct(mixed $value) {
            $this->value = $value;
            $this->type = gettype($value);
        }

        public function getType(): string {
            return $this->type;
        }

        public function isNumeric(): bool {
            return is_int($this->value) || is_float($this->value);
        }

        public function toString(): string {
            return (string)$this->value;
        }
    }
  src/Services/Parser.php: |
    <?php
    namespace App\Services;

    class Parser {
        public function decode(string $input): array {
            return json_decode($input, true) ?? [];
        }
    }
  src/DTO/Config.php: |
    <?php
    namespace App\DTO;

    class Config {
        public string $key;
        public mixed $value;
        public string $environment;

        public function __construct(string $key, mixed $value, string $environment = 'production') {
            $this->key = $key;
            $this->value = $value;
            $this->environment = $environment;
        }

        public function isProduction(): bool {
            return $this->environment === 'production';
        }
    }
  src/Services/Formatter.php: |
    <?php
    namespace App\Services;

    class Formatter {
        public function normalize(string $text): string {
            return trim(strtolower($text));
        }

        public function truncate(string $text, int $maxLength = 100): string {
            if (strlen($text) <= $maxLength) {
                return $text;
            }
            return substr($text, 0, $maxLength) . '...';
        }

        public function slugify(string $text): string {
            return strtolower(preg_replace('/[^a-zA-Z0-9]+/', '-', $text));
        }
    }

