# Scenario: CheckoutController adds PaymentService dependency for checkout flow
#   — reviewer needs PaymentService to verify calculateTotal/process calls
#
# Diff shows:
#   - class CheckoutController { index(): array }
#   + use App\Services\PaymentService; constructor injection;
#     checkout() calls calculateTotal() and process()
#
# Reviewer questions:
#   Q1: "What does calculateTotal() actually compute — is 0.08 tax rate correct?"
#       -> PaymentService.calculateTotal multiplies amount by (1 + taxRate).
#          Constructor default is 0.1, but checkout passes 0.08 via constructor.
#   Q2: "What does process() validate — can it reject the total?"
#       -> process() returns true only if amount > 0.
#
# Not needed for comprehension:
#   - src/Services/ShippingService.php: another service in same namespace with
#     calculateTotal() method name overlap. Same float-based calculation style,
#     same Services namespace. But not imported by CheckoutController.
#
#   - src/Controllers/CartController.php: checkout-adjacent controller in same
#     Controllers namespace. Has getTotal() method — similar to calculateTotal.
#     Manages items that feed into checkout flow. But has no PaymentService
#     dependency and doesn't help verify calculateTotal/process behavior.
#
#   - src/Services/DiscountService.php: another service that modifies prices.
#     Has applyDiscount(float $amount) with same parameter signature as
#     PaymentService methods. Could plausibly be called before checkout.
#     But not referenced in the diff.
#
#   - src/Events/PaymentProcessed.php: shares "Payment" naming with PaymentService.
#     Event class for payment lifecycle. Same domain vocabulary. But it's an
#     event data object, not the service being called in the diff.
#
#   - src/Controllers/OrderController.php: sibling controller that also handles
#     monetary transactions. Has processOrder() method name that overlaps with
#     PaymentService->process(). But independent controller.

initial:
  src/Services/PaymentService.php: |
    <?php
    namespace App\Services;

    class PaymentService {
        private float $taxRate;
        private string $currency;

        public function __construct(float $taxRate = 0.1, string $currency = 'USD') {
            $this->taxRate = $taxRate;
            $this->currency = $currency;
        }

        public function process(float $amount): bool {
            if ($amount <= 0) {
                return false;
            }
            return $this->chargeGateway($amount);
        }

        public function calculateTotal(float $amount): float {
            return round($amount * (1 + $this->taxRate), 2);
        }

        public function refund(float $amount): bool {
            return $amount > 0 && $amount <= 10000;
        }

        private function chargeGateway(float $amount): bool {
            return true;
        }
    }
