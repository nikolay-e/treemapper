# Scenario: UserRepository adds typed methods with nullable User returns
#   — reviewer needs User model to understand property access patterns
#
# Diff shows:
#   - class UserRepository { save(array): bool }
#   + use App\Models\User; find(int): ?User, save(User): void,
#     findByName(string): ?User iterating store and accessing $user->name, $user->id
#
# Reviewer questions:
#   Q1: "What public properties does User have for the repository to access?"
#       -> User has public int $id, string $name, ?string $avatar.
#   Q2: "Is $user->name a string for === comparison in findByName?"
#       -> Yes, public string $name. Comparison is type-safe.
#   Q3: "What does save() store as the key — is $user->id always set?"
#       -> Constructor requires int $id. Always set.
#
# Not needed for comprehension:
#   - src/Repositories/ProductRepository.php: sibling repository with IDENTICAL
#     find/save interface. Same Repositories namespace. Has find(int): ?array
#     and save(array). HARDEST TRAP: structurally identical sibling repo.
#     But operates on arrays, not User objects.
#
#   - src/Models/Address.php: user-adjacent model in same Models namespace.
#     Has similar property pattern (public int $id, string $street, ?string).
#     HARD TRAP: same namespace, similar nullable property pattern. But not
#     referenced by UserRepository.
#
#   - src/Repositories/OrderRepository.php: another repository in same namespace.
#     Has find(int) and save() methods. Same interface pattern. But operates
#     on Order model, not User.
#
#   - src/Models/UserSettings.php: user-adjacent model with user_id reference.
#     Same Models namespace. Has getUserId() method. Domain overlap with User.
#     But not accessed by UserRepository.
#
#   - src/Services/UserService.php: consumes UserRepository. Calls find() and
#     save(). Direct structural edge — it's the consumer of the changed code.
#     But HOW the service uses the repo doesn't help verify property access.

max_enrichment: 5.6
initial:
  src/Models/User.php: |
    <?php
    namespace App\Models;

    class User {
        public int $id;
        public string $name;
        public ?string $avatar;

        public function __construct(int $id, string $name, ?string $avatar = null) {
            $this->id = $id;
            $this->name = $name;
            $this->avatar = $avatar;
        }

        public function getAvatarUrl(): ?string {
            return $this->avatar ? "/avatars/{$this->avatar}" : null;
        }

        public function hasAvatar(): bool {
            return $this->avatar !== null;
        }
    }
