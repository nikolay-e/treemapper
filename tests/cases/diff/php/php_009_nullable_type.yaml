name: php_009_nullable_type
repo:
  initial_files:
    src/Models/User.php: |
      <?php
      namespace App\Models;

      class User {
          public int $id;
          public string $name;
          public ?string $avatar;

          public function __construct(int $id, string $name, ?string $avatar = null) {
              $this->id = $id;
              $this->name = $name;
              $this->avatar = $avatar;
          }

          public function getAvatarUrl(): ?string {
              return $this->avatar ? "/avatars/{$this->avatar}" : null;
          }

          public function hasAvatar(): bool {
              return $this->avatar !== null;
          }
      }
    src/Repositories/UserRepository.php: |
      <?php
      namespace App\Repositories;

      class UserRepository {
          private array $store = [];

          public function save(array $data): bool {
              $this->store[] = $data;
              return true;
          }
      }
    src/Repositories/ProductRepository.php: |
      <?php
      namespace App\Repositories;

      class ProductRepository {
          private array $products = [];

          public function find(int $id): ?array {
              return $this->products[$id] ?? null;
          }

          public function save(array $product): void {
              $this->products[$product['id']] = $product;
          }

          public function findByCategory(string $category): array {
              return array_filter($this->products, fn($p) => $p['category'] === $category);
          }

          public function count(): int {
              return count($this->products);
          }
      }
    src/Models/Address.php: |
      <?php
      namespace App\Models;

      class Address {
          public int $id;
          public string $street;
          public string $city;
          public ?string $zipCode;

          public function __construct(int $id, string $street, string $city, ?string $zipCode = null) {
              $this->id = $id;
              $this->street = $street;
              $this->city = $city;
              $this->zipCode = $zipCode;
          }

          public function getFullAddress(): string {
              $parts = [$this->street, $this->city];
              if ($this->zipCode) {
                  $parts[] = $this->zipCode;
              }
              return implode(', ', $parts);
          }
      }
    src/Repositories/OrderRepository.php: |
      <?php
      namespace App\Repositories;

      class OrderRepository {
          private array $orders = [];

          public function find(int $id): ?array {
              return $this->orders[$id] ?? null;
          }

          public function save(array $order): void {
              $this->orders[$order['id']] = $order;
          }

          public function findByStatus(string $status): array {
              return array_filter($this->orders, fn($o) => $o['status'] === $status);
          }

          public function delete(int $id): bool {
              if (isset($this->orders[$id])) {
                  unset($this->orders[$id]);
                  return true;
              }
              return false;
          }
      }
    src/Models/UserSettings.php: |
      <?php
      namespace App\Models;

      class UserSettings {
          private int $userId;
          private array $preferences;

          public function __construct(int $userId, array $preferences = []) {
              $this->userId = $userId;
              $this->preferences = $preferences;
          }

          public function getUserId(): int {
              return $this->userId;
          }

          public function get(string $key, mixed $default = null): mixed {
              return $this->preferences[$key] ?? $default;
          }

          public function set(string $key, mixed $value): void {
              $this->preferences[$key] = $value;
          }
      }
    src/Services/UserService.php: |
      <?php
      namespace App\Services;

      use App\Repositories\UserRepository;

      class UserService {
          public function __construct(private UserRepository $repo) {}

          public function getUser(int $id): ?array {
              $user = $this->repo->find($id);
              return $user ? ['id' => $user->id, 'name' => $user->name] : null;
          }

          public function registerUser(string $name, string $email): void {
              $this->repo->save(['name' => $name, 'email' => $email]);
          }
      }
