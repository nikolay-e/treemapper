    namespace App\Repositories;

    class UserRepository {
        private array $store = [];

        public function save(array $data): bool {
            $this->store[] = $data;
            return true;
        }
    }
  src/Repositories/ProductRepository.php: |
    <?php
    namespace App\Repositories;

    class ProductRepository {
        private array $products = [];

        public function find(int $id): ?array {
            return $this->products[$id] ?? null;
        }

        public function save(array $product): void {
            $this->products[$product['id']] = $product;
        }

        public function findByCategory(string $category): array {
            return array_filter($this->products, fn($p) => $p['category'] === $category);
        }

        public function count(): int {
            return count($this->products);
        }
    }
  src/Models/Address.php: |
    <?php
    namespace App\Models;

    class Address {
        public int $id;
        public string $street;
        public string $city;
        public ?string $zipCode;

        public function __construct(int $id, string $street, string $city, ?string $zipCode = null) {
            $this->id = $id;
            $this->street = $street;
            $this->city = $city;
            $this->zipCode = $zipCode;
        }

        public function getFullAddress(): string {
            $parts = [$this->street, $this->city];
            if ($this->zipCode) {
                $parts[] = $this->zipCode;
            }
            return implode(', ', $parts);
        }
    }
