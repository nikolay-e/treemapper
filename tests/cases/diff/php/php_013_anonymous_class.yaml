# Reviewer needs: Pipeline (changed) + Handler interface (unchanged, defines contract)
# Trap: Middleware — also uses addHandler pattern and pipeline-like chaining
# Trap: EventDispatcher — similar dispatch pattern, also has add/supports/handle methods
