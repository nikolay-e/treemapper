# Test 004: ApiHandler implements RequestHandler interface with validation
#           — reviewer needs RequestHandler contract to verify method signatures
#
# Scenario: ApiHandler changes from a simple responder to implementing the
# RequestHandler interface. It adds handle(), validate(), and getMiddleware()
# methods matching the interface contract.
#
# Reviewer questions:
#   Q1: "Does ApiHandler fulfill all RequestHandler methods?"
#       -> handle(array): array, validate(array): bool, getMiddleware(): array.
#   Q2: "Is the Middleware interface also relevant here?"
#       -> getMiddleware returns string names, not Middleware instances, so the
#       Middleware interface is not directly consumed here.
#
# Trap files (plausible but unrelated):
#   - src/Contracts/EventDispatcher.php: another interface in same namespace,
#     but not implemented by ApiHandler.
#   - src/Handlers/WebhookHandler.php: sibling handler class that could also
#     implement RequestHandler, but is independent of this change.

initial:
  src/Contracts/RequestHandler.php: |
    <?php
    namespace App\Contracts;

    interface RequestHandler {
        public function handle(array $request): array;
        public function validate(array $request): bool;
        public function getMiddleware(): array;
    }
  src/Contracts/Middleware.php: |
    <?php
    namespace App\Contracts;

    interface Middleware {
        public function process(array $request, callable $next): array;
    }
  src/Handlers/ApiHandler.php: |
    <?php
    namespace App\Handlers;

    class ApiHandler {
        public function respond(array $data): array {
            return ['data' => $data, 'status' => 200];
        }
    }
  src/Contracts/EventDispatcher.php: |
    <?php
    namespace App\Contracts;

    interface EventDispatcher {
        public function dispatch(string $event, array $payload): void;
        public function listen(string $event, callable $listener): void;
        public function hasListeners(string $event): bool;
    }
  src/Handlers/WebhookHandler.php: |
    <?php
    namespace App\Handlers;

    class WebhookHandler {
        private string $secret;

        public function __construct(string $secret) {
            $this->secret = $secret;
        }

        public function verifySignature(string $payload, string $signature): bool {
            return hash_hmac('sha256', $payload, $this->secret) === $signature;
        }

        public function process(array $event): array {
            return ['event' => $event['type'], 'processed' => true];
        }
    }

changed:
  src/Contracts/RequestHandler.php: |
    <?php
    namespace App\Contracts;

    interface RequestHandler {
        public function handle(array $request): array;
        public function validate(array $request): bool;
        public function getMiddleware(): array;
    }
  src/Contracts/Middleware.php: |
    <?php
    namespace App\Contracts;

    interface Middleware {
        public function process(array $request, callable $next): array;
    }
  src/Handlers/ApiHandler.php: |
    <?php
    namespace App\Handlers;

    use App\Contracts\RequestHandler;

    class ApiHandler implements RequestHandler {
        public function handle(array $request): array {
            if (!$this->validate($request)) {
                return ['error' => 'Invalid request', 'status' => 400];
            }
            return ['data' => $request['body'] ?? [], 'status' => 200];
        }

        public function validate(array $request): bool {
            return isset($request['action']) && isset($request['body']);
        }

        public function getMiddleware(): array {
            return ['auth', 'throttle'];
        }
    }
  src/Contracts/EventDispatcher.php: |
    <?php
    namespace App\Contracts;

    interface EventDispatcher {
        public function dispatch(string $event, array $payload): void;
        public function listen(string $event, callable $listener): void;
        public function hasListeners(string $event): bool;
    }
  src/Handlers/WebhookHandler.php: |
    <?php
    namespace App\Handlers;

    class WebhookHandler {
        private string $secret;

        public function __construct(string $secret) {
            $this->secret = $secret;
        }

        public function verifySignature(string $payload, string $signature): bool {
            return hash_hmac('sha256', $payload, $this->secret) === $signature;
        }

        public function process(array $event): array {
            return ['event' => $event['type'], 'processed' => true];
        }
    }

must_include_files:
  - src/Handlers/ApiHandler.php
  # Q1: Reviewer needs the interface contract to verify method compliance
  - src/Contracts/RequestHandler.php

must_include_content_from:
  src/Handlers/ApiHandler.php:
    - "implements RequestHandler"
    - "public function validate(array $request): bool"
  src/Contracts/RequestHandler.php:
    - "interface RequestHandler"
    - "public function handle(array $request): array"

must_not_include:
  # --- EventDispatcher.php: sibling interface in same namespace, not implemented ---
  - "interface EventDispatcher"
  - "hasListeners"
  # --- WebhookHandler.php: sibling handler, shares process() name but independent ---
  - "class WebhookHandler"
  - "verifySignature"
  - "hash_hmac"

must_not_include_files:
  - src/Contracts/EventDispatcher.php
  - src/Handlers/WebhookHandler.php

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
