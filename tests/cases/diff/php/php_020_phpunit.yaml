# Scenario: UserTest gains test methods that instantiate User and verify behavior
#   — reviewer needs User class to understand constructor and isValidEmail
#
# Diff shows:
#   - class UserTest {}
#   + require_once 'User.php'; testUserCreation() creates new User('John', 'john@...')
#     and asserts $user->name, $user->email; testEmailValidation() calls isValidEmail()
#
# Reviewer questions:
#   Q1: "What does new User('John', 'john@example.com') construct — what properties?"
#       -> User has public string $name, string $email via promoted constructor.
#   Q2: "What does isValidEmail() check — how does it validate?"
#       -> Uses filter_var($this->email, FILTER_VALIDATE_EMAIL). Returns bool.
#
# Not needed for comprehension:
#   - ProductTest.php: sibling test class with IDENTICAL test structure.
#     Has testProductCreation/testPriceValidation. HARDEST TRAP: same
#     test naming pattern, same assert style, same file location.
#     But tests Product not User.
#
#   - EmailValidator.php: has isValidEmail(string) method. HARD TRAP:
#     exact same method name as User->isValidEmail(). Also uses
#     filter_var with FILTER_VALIDATE_EMAIL. But standalone validator
#     class, not the User method being tested.
#
#   - UserRepository.php: user-domain class that stores User objects.
#     Has find/save methods. Domain overlap. But not referenced by tests.
#
#   - AdminTest.php: another test class with similar structure. Has
#     testAdminCreation() and testPermissions(). Same test pattern.
#     But tests Admin not User.
#
#   - UserFixture.php: test helper that creates User instances.
#     Has createTestUser() and createInvalidUser(). HARD TRAP:
#     creates same objects as the test. But fixture helper, not the
#     class definition the reviewer needs.

initial:
  User.php: |
    <?php
    class User {
        public function __construct(
            public string $name,
            public string $email
        ) {}

        public function isValidEmail(): bool {
            return filter_var($this->email, FILTER_VALIDATE_EMAIL) !== false;
        }

        public function getDisplayName(): string {
            return ucfirst($this->name);
        }

        public function toArray(): array {
            return ['name' => $this->name, 'email' => $this->email];
        }
    }
  UserTest.php: |
