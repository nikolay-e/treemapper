    class UserTest {}
  ProductTest.php: |
    <?php
    class ProductTest {
        public function testProductCreation(): void {
            $name = 'Widget';
            $price = 9.99;
            assert($name === 'Widget');
            assert($price > 0);
        }

        public function testPriceValidation(): void {
            $price = -5.0;
            $isValid = $price > 0;
            assert($isValid === false);
        }

        public function testProductDisplay(): void {
            $name = 'Gadget';
            assert(ucfirst($name) === 'Gadget');
        }
    }
  EmailValidator.php: |
    <?php
    class EmailValidator {
        public function isValidEmail(string $email): bool {
            return filter_var($email, FILTER_VALIDATE_EMAIL) !== false;
        }

        public function getDomain(string $email): string {
            $parts = explode('@', $email);
            return $parts[1] ?? '';
        }

        public function isDisposable(string $email): bool {
            $disposable = ['tempmail.com', 'throwaway.com', 'mailinator.com'];
            return in_array($this->getDomain($email), $disposable);
        }

        public function normalize(string $email): string {
            return strtolower(trim($email));
        }
    }
