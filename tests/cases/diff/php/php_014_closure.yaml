# Scenario: Collection gains map/filter/multiplyBy using closures that capture Multiplier
#   — reviewer needs Multiplier to understand getFactor() and apply() usage
#
# Diff shows:
#   - class Collection { __construct, toArray, count }
#   + use App\Math\Multiplier; map(callable), filter(callable),
#     multiplyBy(Multiplier) using closure with `use ($factor)` capturing
#     getFactor() result
#
# Reviewer questions:
#   Q1: "What does Multiplier::getFactor() return for the closure capture?"
#       -> Returns int $factor from constructor. The closure captures this value.
#   Q2: "Is the closure's `use ($factor)` correct — is it int?"
#       -> Yes, getFactor() returns int, and closure multiplies int * int.
#   Q3: "What does Multiplier::apply() do — is it used here?"
#       -> apply(int) multiplies by factor. Not used in diff, but shows
#          alternative to the manual closure approach.
#
# Not needed for comprehension:
#   - src/Collections/Sorter.php: sibling collection class in same namespace.
#     Uses callable parameters like Collection. Has sortBy(array, callable).
#     HARDEST TRAP: same namespace, same callable parameter pattern, similar
#     functional style with closures. But not imported by Collection.
#
#   - src/Collections/Reducer.php: another collection class in same namespace.
#     Has reduce(callable) and array operations. Same namespace, same
#     callable pattern. But independent of Collection changes.
#
#   - src/Math/Calculator.php: same Math namespace as Multiplier. Has
#     multiply(int, int) method. Domain overlap with multiplication logic.
#     But not referenced by Collection.
#
#   - src/Collections/Pipeline.php: collection processing pipeline. Has
#     map() and filter() methods. HARD TRAP: identical method names as the
#     diff. Same namespace. But different class, not imported.
#
#   - src/Math/Statistics.php: same Math namespace. Has average(), sum(),
#     median() methods operating on arrays. Numerical domain overlap.

