# Scenario: OrderService adopts LoggingTrait for operation logging
#   — reviewer needs LoggingTrait to understand logInfo/logError API
#
# Diff shows:
#   - class OrderService { createOrder(array): array }
#   + use App\Traits\LoggingTrait; use LoggingTrait;
#     createOrder() now calls $this->logInfo(), cancelOrder() calls logInfo/logError
#
# Reviewer questions:
#   Q1: "What methods does LoggingTrait provide — what do logInfo/logError do?"
#       -> log(level, message), logInfo(message), logError(message),
#          getLogEntries(), clearLog(). Uses sprintf with date/level/message.
#   Q2: "What format do log entries use?"
#       -> sprintf("[Y-m-d H:i:s] LEVEL: message") stored in $logEntries array.
#
# Not needed for comprehension:
#   - src/Traits/CacheableTrait.php: another trait in same Traits namespace.
#     Provides cacheGet/cacheSet/cacheFlush. Same `use` pattern as LoggingTrait.
#     HARD TRAP: sibling trait, same directory, same adoption mechanism.
#     But not used by OrderService.
#
#   - src/Services/InventoryService.php: sibling service in same namespace.
#     Manages order-related state (stock reservations). Direct domain overlap
#     with OrderService. But has no dependency on LoggingTrait.
#
#   - src/Traits/TimestampTrait.php: another trait in same namespace. Provides
#     getCreatedAt/getUpdatedAt/touch methods. Similar infrastructure trait
#     pattern. But not used by OrderService.
#
#   - src/Services/NotificationService.php: another service that could log
#     operations. Has sendNotification() and logDelivery() methods — name
#     overlap with logging vocabulary. But independent service.
#
#   - src/Services/PaymentService.php: order-adjacent service processing
#     payments for orders. Has processPayment() and refund(). Same domain
#     as OrderService but doesn't help understand LoggingTrait usage.

initial:
  src/Traits/LoggingTrait.php: |
    <?php
    namespace App\Traits;

    trait LoggingTrait {
        private array $logEntries = [];

        public function log(string $level, string $message): void {
            $entry = sprintf("[%s] %s: %s", date('Y-m-d H:i:s'), strtoupper($level), $message);
            $this->logEntries[] = $entry;
        }

        public function logInfo(string $message): void {
            $this->log('info', $message);
        }

        public function logError(string $message): void {
            $this->log('error', $message);
        }

        public function getLogEntries(): array {
            return $this->logEntries;
        }

        public function clearLog(): void {
            $this->logEntries = [];
        }
    }
