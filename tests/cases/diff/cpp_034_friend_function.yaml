name: cpp_034_friend_function
tags:
- lang:ruby
- change:signature
- context:import_chain
- distance:3hop+
- difficulty:easy
repo:
  initial_files:
    lib/game/entity.rb: |
      module Game
        class Entity
          attr_reader :id, :position

          def initialize(id, x, y)
            @id = id
            @position = { x: x, y: y }
          end

          def move_to(x, y)
            @position = { x: x, y: y }
          end
        end
      end
    lib/game/player.rb: |
      require_relative 'entity'

      module Game
        class Player < Entity
          attr_reader :health, :name

          def initialize(id, name, x, y)
            super(id, x, y)
            @name = name
            @health = 100
          end

          def take_damage(amount)
            @health = [@health - amount, 0].max
          end

          def alive?
            @health > 0
          end
        end
      end
    lib/game/combat_system.rb: |
      require_relative 'player'

      module Game
        class CombatSystem
          def resolve(attacker, defender, weapon)
            damage = weapon[:damage]
            defender.take_damage(damage)
            { attacker: attacker.id, defender: defender.id, damage: damage }
          end
        end
      end
    lib/game/match_manager.rb: |
      require_relative 'combat_system'

      module Game
        class MatchManager
          def initialize
            @combat = CombatSystem.new
            @log = []
          end

          def attack(attacker, defender, weapon)
            result = @combat.resolve(attacker, defender, weapon)
            @log << result
            result
          end
        end
      end
    lib/api/game_controller.rb: |
      require_relative '../game/match_manager'

      module Api
        class GameController
          def initialize
            @manager = Game::MatchManager.new
          end

          def handle_attack(attacker, defender, weapon)
            @manager.attack(attacker, defender, weapon)
          end
        end
      end
    garbage/leaderboard.rb: |
      # GARBAGE_GAMECPP_A = "leaderboard_service_marker"
    garbage/matchmaking.rb: |
      # GARBAGE_GAMECPP_B = "matchmaking_queue_marker"
    garbage/replay.rb: |
      # GARBAGE_GAMECPP_C = "replay_recorder_marker"
  changed_files:
    lib/game/entity.rb: |
      module Game
        class Entity
          attr_reader :id, :position, :tags

          def initialize(id, x, y)
            @id = id
            @position = { x: x, y: y }
            @tags = []
          end

          def move_to(x, y)
            @position = { x: x, y: y }
          end

          def add_tag(tag)
            @tags << tag
          end

          def has_tag?(tag)
            @tags.include?(tag)
          end
        end
      end
    lib/game/player.rb: |
      require_relative 'entity'

      module Game
        class Player < Entity
          attr_reader :health, :name, :armor

          def initialize(id, name, x, y, armor: 0)
            super(id, x, y)
            @name = name
            @health = 100
            @armor = armor
          end

          def take_damage(amount, armor_piercing: false)
            effective = armor_piercing ? amount : [amount - @armor, 0].max
            @health = [@health - effective, 0].max
          end

          def alive?
            @health > 0
          end
        end
      end
    lib/game/combat_system.rb: |
      require_relative 'player'

      module Game
        class CombatSystem
          def resolve(attacker, defender, weapon)
            damage = weapon[:damage]
            piercing = weapon.fetch(:armor_piercing, false)
            defender.take_damage(damage, armor_piercing: piercing)
            { attacker: attacker.id, defender: defender.id, damage: damage, piercing: piercing }
          end
        end
      end
    lib/game/match_manager.rb: |
      require_relative 'combat_system'

      module Game
        class MatchManager
          def initialize
            @combat = CombatSystem.new
            @log = []
          end

          def attack(attacker, defender, weapon)
            result = @combat.resolve(attacker, defender, weapon)
            @log << result
            result
          end
        end
      end
    lib/api/game_controller.rb: |
      require_relative '../game/match_manager'

      module Api
        class GameController
          def initialize
            @manager = Game::MatchManager.new
          end

          def handle_attack(attacker, defender, weapon)
            @manager.attack(attacker, defender, weapon)
          end
        end
      end
    garbage/leaderboard.rb: |
      # GARBAGE_GAMECPP_A = "leaderboard_service_marker"
    garbage/matchmaking.rb: |
      # GARBAGE_GAMECPP_B = "matchmaking_queue_marker"
    garbage/replay.rb: |
      # GARBAGE_GAMECPP_C = "replay_recorder_marker"
  commit_message: "feat: add armor_piercing to take_damage and weapon hash"
