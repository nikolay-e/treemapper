    anchor: GARBAGE_CICD_DOCS_030_EXECUTOR_MARKER_D
- id: no_global_1
  selector:
    anchor: GARBAGE_CICD_DOCS_030_PARALLEL_MARKER_F
- id: no_global_2
  selector:
    anchor: GARBAGE_CICD_DOCS_030_PRIORITY_MARKER_C
- id: no_global_3
  selector:
    anchor: GARBAGE_CICD_DOCS_030_QUEUE_MARKER_B
- id: no_global_4
