  changed_files:
    src/payments/processor.rs: |
      use crate::payments::gateway::PaymentGateway;
      use crate::payments::types::{PaymentRequest, PaymentResult};

      pub struct PaymentProcessor {
          gateway: PaymentGateway,
      }

      impl PaymentProcessor {
          pub fn new(gateway: PaymentGateway) -> Self {
              Self { gateway }
          }

          pub fn process(&self, req: PaymentRequest) -> PaymentResult {
              if req.amount <= 0.0 {
                  return PaymentResult::failure("Invalid amount");
              }
              if req.currency.is_empty() {
                  return PaymentResult::failure("Currency is required");
              }
              if req.customer_id.is_empty() {
                  return PaymentResult::failure("Customer ID is required");
              }
              self.gateway.charge(req)
          }
      }
    src/payments/gateway.rs: |
      use crate::payments::types::{PaymentRequest, PaymentResult};

      pub struct PaymentGateway {
          api_key: String,
      }

      impl PaymentGateway {
          pub fn new(api_key: String) -> Self {
              Self { api_key }
          }

          pub fn charge(&self, req: PaymentRequest) -> PaymentResult {
              if self.api_key.is_empty() {
                  return PaymentResult::failure("Missing API key");
              }
              PaymentResult::success(req.amount)
          }
      }
