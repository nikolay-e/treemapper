repo:
  initial_files:
    src/payments/processor.rs: |
      use crate::payments::gateway::PaymentGateway;
      use crate::payments::types::{PaymentRequest, PaymentResult};

      pub struct PaymentProcessor {
          gateway: PaymentGateway,
      }

      impl PaymentProcessor {
          pub fn new(gateway: PaymentGateway) -> Self {
              Self { gateway }
          }

          pub fn process(&self, req: PaymentRequest) -> PaymentResult {
              if req.amount <= 0.0 {
                  return PaymentResult::failure("Invalid amount");
              }
              self.gateway.charge(req)
          }
      }
    src/payments/gateway.rs: |
      use crate::payments::types::{PaymentRequest, PaymentResult};

      pub struct PaymentGateway {
          api_key: String,
      }

      impl PaymentGateway {
          pub fn new(api_key: String) -> Self {
              Self { api_key }
          }

          pub fn charge(&self, req: PaymentRequest) -> PaymentResult {
              if self.api_key.is_empty() {
                  return PaymentResult::failure("Missing API key");
              }
              PaymentResult::success(req.amount)
          }
      }
    src/payments/types.rs: |
      #[derive(Debug)]
      pub struct PaymentRequest {
          pub amount: f64,
          pub currency: String,
          pub customer_id: String,
      }

      #[derive(Debug)]
      pub struct PaymentResult {
          pub success: bool,
          pub amount: f64,
          pub error: Option<String>,
      }

      impl PaymentResult {
          pub fn success(amount: f64) -> Self {
              Self { success: true, amount, error: None }
          }

          pub fn failure(msg: &str) -> Self {
              Self { success: false, amount: 0.0, error: Some(msg.to_string()) }
          }
      }
    tests/test_processor.rs: |
      use crate::payments::processor::PaymentProcessor;
      use crate::payments::gateway::PaymentGateway;
      use crate::payments::types::PaymentRequest;

      #[test]
      fn test_process_rejects_zero_amount() {
          let gw = PaymentGateway::new("test_key".to_string());
          let processor = PaymentProcessor::new(gw);
          let req = PaymentRequest { amount: 0.0, currency: "USD".to_string(), customer_id: "c1".to_string() };
          let result = processor.process(req);
          assert!(!result.success);
      }

      #[test]
      fn test_process_rejects_negative_amount() {
          let gw = PaymentGateway::new("test_key".to_string());
          let processor = PaymentProcessor::new(gw);
          let req = PaymentRequest { amount: -10.0, currency: "USD".to_string(), customer_id: "c1".to_string() };
          let result = processor.process(req);
          assert!(!result.success);
      }
