name: jvm_and_compiled_063_swift_error_handling
xfail:
  category: swift-same-module-edges
repo:
  initial_files:
    AppError.swift: |
      enum AppError: Error {
          case networkError(String)
          case validationError(String)
          case notFound
          case unauthorized

          var localizedDescription: String {
              switch self {
              case .networkError(let message):
                  return "Network error: \(message)"
              case .validationError(let message):
                  return "Validation error: \(message)"
              case .notFound:
                  return "Resource not found"
              case .unauthorized:
                  return "Unauthorized access"
              }
          }
      }
    UserService.swift: |
      // Initial
      class UserService {}
    ErrorPresenter.swift: |
      import Foundation

      class ErrorPresenter {
          func presentAlert(for error: AppError) -> String {
              switch error {
              case .networkError:
                  return "Please check your internet connection"
              case .validationError:
                  return "Please correct the highlighted fields"
              case .notFound:
                  return "The requested item could not be found"
              case .unauthorized:
                  return "Your session has expired. Please log in again"
              }
          }

          func shouldRetry(error: AppError) -> Bool {
              if case .networkError = error { return true }
              return false
          }
      }
    NetworkMonitor.swift: |
      import Foundation

      class NetworkMonitor {
          private(set) var isConnected = true
          private(set) var connectionType: String = "wifi"

          func startMonitoring() {
              print("Network monitoring started")
          }

          func stopMonitoring() {
              print("Network monitoring stopped")
          }

          func checkConnectivity() -> Bool {
              return isConnected
          }
      }
