    src/Pricing.jl: |
      module Pricing

      export PriceRule, apply_rule, base_price

      struct PriceRule
          sku::String
          base::Float64
          tax_rate::Float64
      end

      function base_price(rule::PriceRule)::Float64
          return rule.base
      end

      function apply_rule(rule::PriceRule, quantity::Int)::Float64
          subtotal = rule.base * quantity
          return subtotal + subtotal * rule.tax_rate
      end

      end
    src/Checkout.jl: |
      module Checkout

      include("Pricing.jl")
      using .Pricing

      function checkout_total(rules::Vector{PriceRule}, quantities::Vector{Int})::Float64
          total = 0.0
          for (rule, qty) in zip(rules, quantities)
              total += apply_rule(rule, qty)
          end
          return total
      end

      function receipt_lines(rules::Vector{PriceRule}, quantities::Vector{Int})::Vector{String}
          return ["$(r.sku): $(apply_rule(r, q))" for (r, q) in zip(rules, quantities)]
      end

      end
    src/Reporting.jl: |
      module Reporting

      include("Pricing.jl")
      using .Pricing

      function price_summary(rules::Vector{PriceRule})::Dict{String,Float64}
          return Dict(r.sku => base_price(r) for r in rules)
      end

      end
