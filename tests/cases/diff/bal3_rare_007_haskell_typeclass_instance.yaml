  changed_files:
    src/Pricing.jl: |
      module Pricing

      export PriceRule, apply_rule, base_price, apply_discount

      struct PriceRule
          sku::String
          base::Float64
          tax_rate::Float64
          discount::Float64
      end

      function base_price(rule::PriceRule)::Float64
          return rule.base * (1.0 - rule.discount)
      end

      function apply_rule(rule::PriceRule, quantity::Int)::Float64
          discounted = base_price(rule)
          subtotal = discounted * quantity
          return subtotal + subtotal * rule.tax_rate
      end

      function apply_discount(rule::PriceRule, extra_pct::Float64)::PriceRule
          new_discount = min(1.0, rule.discount + extra_pct)
          return PriceRule(rule.sku, rule.base, rule.tax_rate, new_discount)
      end

      end
