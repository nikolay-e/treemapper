name: bal3_rare_007_haskell_typeclass_instance
tags:
- lang:haskell
- change:single_file
- context:import_chain
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    src/Types.hs: |
      module Types where

      data Priority = Low | Medium | High
        deriving (Show, Eq, Ord)

      data Task = Task
        { taskId       :: Int
        , taskTitle    :: String
        , taskPriority :: Priority
        } deriving (Show, Eq)

      comparePriority :: Task -> Task -> Ordering
      comparePriority a b = compare (taskPriority a) (taskPriority b)
    src/Scheduler.hs: |
      module Scheduler where

      import Types (Task(..), Priority(..), comparePriority)
      import Data.List (sortBy)

      scheduleByPriority :: [Task] -> [Task]
      scheduleByPriority = sortBy (flip comparePriority)

      nextTask :: [Task] -> Maybe Task
      nextTask [] = Nothing
      nextTask tasks = Just (head (scheduleByPriority tasks))
    src/Renderer.hs: |
      module Renderer where

      import Types (Task(..), Priority(..))

      renderTask :: Task -> String
      renderTask t = "[" ++ show (taskPriority t) ++ "] " ++ taskTitle t

      renderTaskList :: [Task] -> String
      renderTaskList = unlines . map renderTask
    src/Logger.hs: |
      module Logger where

      gARBAGE_RARE_007_LOG_A = "logger"
      gARBAGE_RARE_007_LEVEL_B = "info"

      logInfo :: String -> IO ()
      logInfo msg = putStrLn $ "INFO: " ++ msg
    src/Config.hs: |
      module Config where

      gARBAGE_RARE_007_CFG_C = "config"
      gARBAGE_RARE_007_PATH_D = "app.yaml"

      defaultPort :: Int
      defaultPort = 8080
    src/Database.hs: |
      module Database where

      gARBAGE_RARE_007_DB_E = "sqlite"
      gARBAGE_RARE_007_FILE_F = "app.db"

      connect :: String -> IO ()
      connect _ = return ()
  changed_files:
    src/Types.hs: |
      module Types where

      data Priority = Low | Medium | High | Critical
        deriving (Show, Eq, Ord)

      data Task = Task
        { taskId       :: Int
        , taskTitle    :: String
        , taskPriority :: Priority
        , taskDeadline :: Maybe String
        } deriving (Show, Eq)

      comparePriority :: Task -> Task -> Ordering
      comparePriority a b = compare (taskPriority a) (taskPriority b)

      isUrgent :: Task -> Bool
      isUrgent t = taskPriority t >= High
  commit_message: "add Critical priority, deadline field, and isUrgent"
