      package com.report.exporter;
      import com.report.converter.CsvConverter;
      import java.util.List;
      public class ReportExporter {
          private final CsvConverter converter;
          public ReportExporter(CsvConverter converter) {
              this.converter = converter;
          }
          public String exportReport(List<String[]> data) {
              String csv = converter.convert(data);
              return "REPORT\n" + csv;
          }
      }
