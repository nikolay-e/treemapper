  changed_files:
    src/main/java/com/report/converter/CsvConverter.java: |
      package com.report.converter;
      import java.util.List;
      public class CsvConverter {
          public String convert(List<String[]> rows) {
              StringBuilder sb = new StringBuilder();
              for (String[] row : rows) {
                  for (int i = 0; i < row.length; i++) {
                      String cell = row[i];
                      if (cell.contains(",") || cell.contains("\"")) {
                          cell = "\"" + cell.replace("\"", "\"\"") + "\"";
                      }
                      sb.append(cell);
                      if (i < row.length - 1) sb.append(",");
                  }
                  sb.append("\n");
              }
              return sb.toString();
          }
      }
  commit_message: "fix: properly escape commas and quotes in CSV output"
