      from typing import Set
      from src.auth.policy import PolicyStore, AccessPolicy

      class PermissionResolver:
          def __init__(self, store: PolicyStore):
              self.store = store

          def can_access(self, user_role: str, resource: str) -> bool:
              policy = self.store.find_policy(resource)
              if policy is None:
                  return False
              return user_role in policy.allowed_roles

          def list_resources(self, user_role: str) -> Set[str]:
              result = set()
              for policy in self.store.all_policies():
                  if user_role in policy.allowed_roles:
                      result.add(policy.resource)
              return result
    src/auth/policy.py: |
      from typing import List, Optional, Set
      from dataclasses import dataclass, field

      @dataclass
      class AccessPolicy:
          resource: str
          allowed_roles: Set[str] = field(default_factory=set)
          deny_roles: Set[str] = field(default_factory=set)

      class PolicyStore:
          def __init__(self):
              self._policies: List[AccessPolicy] = []

          def add_policy(self, policy: AccessPolicy) -> None:
              self._policies.append(policy)

          def find_policy(self, resource: str) -> Optional[AccessPolicy]:
              for p in self._policies:
                  if p.resource == resource:
                      return p
              return None

          def all_policies(self) -> List[AccessPolicy]:
              return list(self._policies)
    src/auth/token.py: |
      import hashlib
      from typing import Optional

      class TokenManager:
          def __init__(self, secret: str):
              self._secret = secret
              self._tokens = {}

          def issue(self, user_id: str) -> str:
              raw = f"{user_id}:{self._secret}"
              token = hashlib.sha256(raw.encode()).hexdigest()[:32]
              self._tokens[token] = user_id
              return token

          def validate(self, token: str) -> Optional[str]:
              return self._tokens.get(token)
    src/auth/rate_limiter.py: |
      TRAP_GAP068_LIMITER_A = "rate_limiter"
      TRAP_GAP068_WINDOW_B = 60

      class RateLimiter:
          def __init__(self, max_requests: int = 100):
              self.max_requests = max_requests
              self._counts = {}

          def check(self, client_id: str) -> bool:
              current = self._counts.get(client_id, 0)
              return current < self.max_requests

          def record(self, client_id: str) -> None:
              self._counts[client_id] = self._counts.get(client_id, 0) + 1
