  changed_files:
    src/auth/resolver.py: |
      from typing import Set, Dict, List
      from src.auth.policy import PolicyStore, AccessPolicy

      class PermissionReport:
          def __init__(self, role: str, allowed: Set[str], denied: Set[str]):
              self.role = role
              self.allowed = allowed
              self.denied = denied

      class PermissionResolver:
          def __init__(self, store: PolicyStore, superuser_role: str = "admin"):
              self.store = store
              self.superuser_role = superuser_role

          def can_access(self, user_role: str, resource: str) -> bool:
              if user_role == self.superuser_role:
                  return True
              policy = self.store.find_policy(resource)
              if policy is None:
                  return False
              if user_role in policy.deny_roles:
                  return False
              return user_role in policy.allowed_roles

          def audit_role(self, user_role: str) -> PermissionReport:
              allowed = set()
              denied = set()
              for policy in self.store.all_policies():
                  if user_role in policy.deny_roles:
                      denied.add(policy.resource)
                  elif user_role in policy.allowed_roles:
                      allowed.add(policy.resource)
              return PermissionReport(role=user_role, allowed=allowed, denied=denied)

          def effective_permissions(self, roles: List[str]) -> Set[str]:
              combined = set()
              for role in roles:
                  combined.update(self.list_resources(role))
              return combined

          def list_resources(self, user_role: str) -> Set[str]:
              result = set()
              for policy in self.store.all_policies():
                  if user_role in policy.allowed_roles:
                      result.add(policy.resource)
              return result
