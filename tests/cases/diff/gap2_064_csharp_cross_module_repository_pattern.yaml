    Data/IRepository.cs: |
      namespace Data
      {
          public interface IRepository<T>
          {
              T GetById(int id);
              IEnumerable<T> GetAll();
              void Save(T entity);
              void Delete(int id);
          }
      }
    Data/ProductRepository.cs: |
      using Data;
      using Models;

      namespace Data.Impl
      {
          public class ProductRepository : IRepository<Product>
          {
              private readonly List<Product> _store = new();

              public Product GetById(int id) => _store.FirstOrDefault(p => p.Id == id);
              public IEnumerable<Product> GetAll() => _store.AsReadOnly();
              public void Save(Product entity) { _store.Add(entity); }
              public void Delete(int id) { _store.RemoveAll(p => p.Id == id); }
          }
      }
    Models/Product.cs: |
