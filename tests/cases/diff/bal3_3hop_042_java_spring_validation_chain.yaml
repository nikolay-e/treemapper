repo:
  initial_files:
    src/main/java/com/app/validation/ValidationResult.java: |
      package com.app.validation;

      public class ValidationResult {
          private boolean valid;
          private String message;
          public ValidationResult(boolean valid, String message) {
              this.valid = valid;
              this.message = message;
          }
          public boolean isValid() { return valid; }
          public String getMessage() { return message; }
      }
    src/main/java/com/app/validation/FieldValidator.java: |
      package com.app.validation;

      public class FieldValidator {
          public ValidationResult validate(String field, String value) {
              if (value == null || value.isEmpty()) {
                  return new ValidationResult(false, field + " is required");
              }
              return new ValidationResult(true, "ok");
          }
      }
    src/main/java/com/app/validation/FormValidator.java: |
      package com.app.validation;

      import java.util.Map;
      import java.util.List;
      import java.util.ArrayList;

      public class FormValidator {
          private final FieldValidator fieldValidator;
          public FormValidator(FieldValidator fieldValidator) {
              this.fieldValidator = fieldValidator;
          }
          public List<ValidationResult> validateForm(Map<String, String> fields) {
              List<ValidationResult> results = new ArrayList<>();
              for (Map.Entry<String, String> entry : fields.entrySet()) {
                  results.add(fieldValidator.validate(entry.getKey(), entry.getValue()));
              }
              return results;
          }
      }
    src/main/java/com/app/service/RegistrationService.java: |
      package com.app.service;

      import com.app.validation.FormValidator;
      import com.app.validation.ValidationResult;
      import java.util.List;
      import java.util.Map;

      public class RegistrationService {
          private final FormValidator formValidator;
          public RegistrationService(FormValidator formValidator) {
              this.formValidator = formValidator;
          }
          public boolean register(Map<String, String> data) {
              List<ValidationResult> results = formValidator.validateForm(data);
              return results.stream().allMatch(ValidationResult::isValid);
          }
      }
    src/main/java/com/app/web/RegistrationController.java: |
      package com.app.web;

      import com.app.service.RegistrationService;
      import java.util.Map;

      public class RegistrationController {
          private final RegistrationService registrationService;
          public RegistrationController(RegistrationService registrationService) {
              this.registrationService = registrationService;
          }
          public String register(Map<String, String> form) {
              boolean ok = registrationService.register(form);
              return ok ? "registered" : "invalid";
          }
      }
