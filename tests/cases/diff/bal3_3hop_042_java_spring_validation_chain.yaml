    src/main/java/com/app/util/Normalizer.java: |
      package com.app.util;

      public class Normalizer {
          public static String GARBAGE_042_NORM_MARKER_C = "nfc";
          public static boolean GARBAGE_042_TRIM_MARKER_D = true;
          public static String normalize(String s) { return s.trim(); }
