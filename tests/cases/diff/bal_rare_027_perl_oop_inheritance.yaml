  changed_files:
    lib/payment/gateway.rb: |
      module Payment
        class Gateway
          def charge(amount_cents, currency, metadata = {})
            raise NotImplementedError, "subclass must implement charge"
          end

          def refund(transaction_id, amount_cents, reason: nil)
            raise NotImplementedError, "subclass must implement refund"
          end
        end
      end
    lib/payment/stripe_gateway.rb: |
      require_relative 'gateway'

      module Payment
        class StripeGateway < Gateway
          def initialize(api_key)
            @api_key = api_key
          end

          def charge(amount_cents, currency, metadata = {})
            { id: "ch_#{SecureRandom.hex(8)}", amount: amount_cents, currency: currency, metadata: metadata }
          end

          def refund(transaction_id, amount_cents, reason: nil)
            { id: "re_#{SecureRandom.hex(8)}", charge: transaction_id, reason: reason }
          end
        end
      end
    lib/order/processor.rb: |
      require_relative '../payment/stripe_gateway'

      module Order
        class Processor
          def initialize(gateway)
            @gateway = gateway
          end

          def process(order)
            meta = { order_id: order[:id], customer: order[:customer_id] }
            @gateway.charge(order[:total_cents], order[:currency], meta)
          end
        end
      end
    lib/api/checkout_controller.rb: |
      require_relative '../order/processor'
      require_relative '../payment/stripe_gateway'

      module Api
        class CheckoutController
          def initialize
            gateway = Payment::StripeGateway.new(ENV['STRIPE_KEY'])
            @processor = Order::Processor.new(gateway)
          end

          def create(params)
            @processor.process(params[:order])
          end
        end
      end
    lib/reporting/invoice_builder.rb: |
      require_relative '../api/checkout_controller'

      module Reporting
        class InvoiceBuilder
          def build_from_checkout(controller, order_params)
            result = controller.create(order_params)
            { transaction_id: result[:id], amount: order_params[:order][:total_cents] }
          end
        end
      end
