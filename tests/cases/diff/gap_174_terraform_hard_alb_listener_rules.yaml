name: gap_174_terraform_hard_alb_listener_rules
tags:
- change:config
- change:single_file
- context:cross_module
- difficulty:hard
- distance:2hop
- lang:terraform
repo:
  initial_files:
    tf/stacks/frontend/main.tf: |
      module "alb" {
        source     = "../../modules/alb"
        vpc_id     = var.vpc_id
        subnet_ids = var.public_subnets
        cert_arn   = var.cert_arn
      }

      module "target_group" {
        source   = "../../modules/target-group"
        vpc_id   = var.vpc_id
        port     = 3000
        health   = "/health"
      }
    tf/stacks/frontend/variables.tf: |
      variable "vpc_id" {
        type = string
      }

      variable "public_subnets" {
        type = list(string)
      }

      variable "cert_arn" {
        type = string
      }
    tf/modules/alb/main.tf: |
      resource "aws_lb" "this" {
        name               = "frontend-alb"
        internal           = false
        load_balancer_type = "application"
        subnets            = var.subnet_ids
      }

      resource "aws_lb_listener" "https" {
        load_balancer_arn = aws_lb.this.arn
        port              = 443
        protocol          = "HTTPS"
        ssl_policy        = "ELBSecurityPolicy-TLS13-1-2-2021-06"
        certificate_arn   = var.cert_arn

        default_action {
          type = "fixed-response"
          fixed_response {
            content_type = "text/plain"
            message_body = "Not Found"
            status_code  = "404"
          }
        }
      }
    tf/modules/alb/variables.tf: |
      variable "vpc_id" {
        type = string
      }

      variable "subnet_ids" {
        type = list(string)
      }

      variable "cert_arn" {
        type = string
      }
    tf/modules/alb/outputs.tf: |
      output "listener_arn" {
        value = aws_lb_listener.https.arn
      }

      output "alb_dns" {
        value = aws_lb.this.dns_name
      }
    tf/modules/target-group/main.tf: |
      resource "aws_lb_target_group" "this" {
        name     = "frontend-tg"
        port     = var.port
        protocol = "HTTP"
        vpc_id   = var.vpc_id

        health_check {
          path = var.health
        }
      }
    tf/modules/target-group/variables.tf: |
      variable "vpc_id" {
        type = string
      }

      variable "port" {
        type = number
      }

      variable "health" {
        type = string
      }
    tf/modules/waf/main.tf: |
      resource "aws_wafv2_web_acl" "this" {
        name  = "frontend-waf"
        scope = "REGIONAL"

        default_action {
          allow {}
        }

        visibility_config {
          sampled_requests_enabled = true
          cloudwatch_metrics_enabled = true
          metric_name = "frontendWaf"
        }
      }
  changed_files:
    tf/modules/alb/main.tf: |
      resource "aws_lb" "this" {
        name               = "frontend-alb"
        internal           = false
        load_balancer_type = "application"
        subnets            = var.subnet_ids

        drop_invalid_header_fields = true
      }

      resource "aws_lb_listener" "https" {
        load_balancer_arn = aws_lb.this.arn
        port              = 443
        protocol          = "HTTPS"
        ssl_policy        = "ELBSecurityPolicy-TLS13-1-3-2021-06"
        certificate_arn   = var.cert_arn

        default_action {
          type = "fixed-response"
          fixed_response {
            content_type = "text/plain"
            message_body = "Not Found"
            status_code  = "404"
          }
        }
      }
fragments:
- id: alb_drop_headers
  selector:
    path: tf/modules/alb/main.tf
    anchor: drop_invalid_header_fields
- id: alb_tls_policy
  selector:
    path: tf/modules/alb/main.tf
    anchor: ELBSecurityPolicy-TLS13-1-3
- id: frontend_stack_uses_alb
  selector:
    path: tf/stacks/frontend/main.tf
    anchor: module "alb"
- id: no_waf
  selector:
    path: tf/modules/waf/main.tf
- id: no_target_group
  selector:
    path: tf/modules/target-group/main.tf
oracle:
  required:
  - alb_drop_headers
  - alb_tls_policy
  forbidden:
  - no_waf
  - no_target_group
