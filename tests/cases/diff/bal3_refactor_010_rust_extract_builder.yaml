repo:
  initial_files:
    src/rate_limiter/limiter.rs: |
      use crate::rate_limiter::store::RateLimitStore;
      use crate::rate_limiter::config::RateLimitConfig;

      pub struct RateLimiter {
          store: RateLimitStore,
          config: RateLimitConfig,
      }

      impl RateLimiter {
          pub fn new(store: RateLimitStore, config: RateLimitConfig) -> Self {
              Self { store, config }
          }

          pub fn check(&mut self, key: &str) -> bool {
              let count = self.store.increment(key);
              count < self.config.max_requests
          }

          pub fn reset(&mut self, key: &str) {
              self.store.reset(key);
          }
      }
    src/rate_limiter/store.rs: |
      use std::collections::HashMap;

      pub struct RateLimitStore {
          counts: HashMap<String, u32>,
      }

      impl RateLimitStore {
          pub fn new() -> Self {
              Self { counts: HashMap::new() }
          }

          pub fn increment(&mut self, key: &str) -> u32 {
              let entry = self.counts.entry(key.to_string()).or_insert(0);
              *entry += 1;
              *entry
          }

          pub fn reset(&mut self, key: &str) {
              self.counts.remove(key);
          }
      }
    src/rate_limiter/config.rs: |
      pub struct RateLimitConfig {
          pub max_requests: u32,
          pub window_secs: u64,
      }
    tests/test_rate_limiter.rs: |
      use crate::rate_limiter::limiter::RateLimiter;
      use crate::rate_limiter::store::RateLimitStore;
      use crate::rate_limiter::config::RateLimitConfig;

      #[test]
      fn test_allows_within_limit() {
          let config = RateLimitConfig { max_requests: 3, window_secs: 60 };
          let mut limiter = RateLimiter::new(RateLimitStore::new(), config);
          assert!(limiter.check("user1"));
          assert!(limiter.check("user1"));
          assert!(limiter.check("user1"));
      }

      #[test]
      fn test_blocks_at_limit() {
          let config = RateLimitConfig { max_requests: 2, window_secs: 60 };
          let mut limiter = RateLimiter::new(RateLimitStore::new(), config);
          limiter.check("user1");
          limiter.check("user1");
          assert!(!limiter.check("user1"));
      }
    src/middleware/auth.rs: |
      pub const GARBAGE_BAL3R010_A: &str = "bearer_token_prefix";

      pub fn extract_token(header: &str) -> Option<&str> {
          header.strip_prefix("Bearer ")
      }
    src/middleware/cors.rs: |
      pub const GARBAGE_BAL3R010_B: &str = "cors_allow_all";
