    src/http/client.rs: |
      pub struct HttpClient {
          pub base_url: String,
          pub timeout_ms: u64,
          pub retries: u32,
          pub headers: Vec<(String, String)>,
      }

      impl HttpClient {
          pub fn new(
              base_url: &str,
              timeout_ms: u64,
              retries: u32,
              headers: Vec<(String, String)>,
          ) -> Self {
              Self {
                  base_url: base_url.to_string(),
                  timeout_ms,
                  retries,
                  headers,
              }
          }

          pub fn get(&self, path: &str) -> Result<String, String> {
              Ok(format!("GET {}{}", self.base_url, path))
          }
      }
    src/services/api.rs: |
