                  "https://api.example.com",
                  5000,
                  3,
                  vec![("Accept".into(), "application/json".into())],
              );
              Self { client }
          }

          pub fn fetch_data(&self) -> Result<String, String> {
              self.client.get("/data")
          }
      }
