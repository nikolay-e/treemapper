repo:
  initial_files:
    payments/currency.py: |
      from decimal import Decimal

      EXCHANGE_RATES = {
          ("USD", "EUR"): Decimal("0.85"),
          ("EUR", "USD"): Decimal("1.18"),
          ("USD", "GBP"): Decimal("0.73"),
          ("GBP", "USD"): Decimal("1.37"),
      }

      def convert(amount: Decimal, from_currency: str, to_currency: str) -> Decimal:
          if from_currency == to_currency:
              return amount
          rate = EXCHANGE_RATES.get((from_currency, to_currency), Decimal("1"))
          return (amount * rate).quantize(Decimal("0.01"))
    payments/processor.py: |
      from decimal import Decimal
      from payments.currency import convert

      class PaymentProcessor:
          def __init__(self, merchant_currency: str):
              self.merchant_currency = merchant_currency

          def charge(self, amount: Decimal, currency: str) -> dict:
              settled = convert(amount, currency, self.merchant_currency)
              return {"status": "charged", "settled_amount": settled}
    payments/checkout.py: |
      from decimal import Decimal
      from payments.processor import PaymentProcessor

      def process_cart(items: list[dict], currency: str, merchant_currency: str) -> dict:
          total = Decimal(sum(i["price"] * i["qty"] for i in items))
          processor = PaymentProcessor(merchant_currency)
          return processor.charge(total, currency)
    payments/refund.py: |
      GARBAGE_GAP_029_REFUND_A = "refund_marker"
      GARBAGE_GAP_029_POLICY_B = "30_days"

      def issue_refund(transaction_id: str, amount: float) -> dict:
          return {"status": "refunded", "transaction_id": transaction_id}
    payments/audit.py: |
      GARBAGE_GAP_029_AUDIT_C = "log_marker"
      GARBAGE_GAP_029_LEVEL_D = "info"

      def log_transaction(tx_id: str, action: str) -> None:
          pass
  changed_files:
    payments/currency.py: |
      from decimal import Decimal
      from datetime import date

      EXCHANGE_RATES = {
          ("USD", "EUR"): Decimal("0.85"),
          ("EUR", "USD"): Decimal("1.18"),
          ("USD", "GBP"): Decimal("0.73"),
          ("GBP", "USD"): Decimal("1.37"),
      }

      def convert(amount: Decimal, from_currency: str, to_currency: str, rate_date: date | None = None) -> Decimal:
          if from_currency == to_currency:
              return amount
          rate = EXCHANGE_RATES.get((from_currency, to_currency), Decimal("1"))
          return (amount * rate).quantize(Decimal("0.01"))
  commit_message: "add rate_date parameter to currency convert"
