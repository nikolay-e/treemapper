name: erlang_001_module_call_pulls_dependency
tags:
- lang:erlang
- change:single_file
- context:import_chain
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    src/order_processor.erl: |
      -module(order_processor).
      -export([process/1, validate/1]).

      process(Order) ->
          case validate(Order) of
              ok ->
                  order_store:save(Order),
                  ok;
              {error, Reason} ->
                  {error, Reason}
          end.

      validate(#{total := Total}) when Total > 0 ->
          ok;
      validate(_) ->
          {error, invalid_order}.
    src/order_store.erl: |
      -module(order_store).
      -export([save/1, find/1, all/0]).

      save(Order) ->
          ets:insert(orders, Order),
          ok.

      find(Id) ->
          case ets:lookup(orders, Id) of
              [Order] -> {ok, Order};
              [] -> {error, not_found}
          end.

      all() ->
          ets:tab2list(orders).
    src/warehouse_manager.erl: |
      -module(warehouse_manager).
      -export([allocate/2, release/2]).

      GARBAGE_ERL_001_A = noise_warehouse_marker.

      allocate(Sku, Qty) ->
          ets:update_counter(stock, Sku, {2, -Qty}).

      release(Sku, Qty) ->
          ets:update_counter(stock, Sku, {2, Qty}).
    src/notification_service.erl: |
      -module(notification_service).
      -export([send/2]).

      GARBAGE_ERL_001_B = noise_notification_marker.

      send(UserId, Message) ->
          io:format("Notify ~p: ~s~n", [UserId, Message]).
    src/audit_logger.erl: |
      -module(audit_logger).
      -export([log/2]).

      GARBAGE_ERL_001_C = noise_audit_marker.

      log(Event, Data) ->
          io:format("[AUDIT] ~p ~p~n", [Event, Data]).
    src/metrics_collector.erl: |
      -module(metrics_collector).
      -export([record/2]).

      GARBAGE_ERL_001_D = noise_metrics_marker.

      record(Key, Value) ->
          ets:insert(metrics, {Key, Value}).
    src/cache_server.erl: |
      -module(cache_server).
      -export([get/1, put/2]).

      GARBAGE_ERL_001_E = noise_cache_marker.

      get(Key) ->
          ets:lookup(cache, Key).

      put(Key, Value) ->
          ets:insert(cache, {Key, Value}).
  changed_files:
    src/order_processor.erl: |
      -module(order_processor).
      -export([process/1, validate/1, cancel/1]).

      process(Order) ->
          case validate(Order) of
              ok ->
                  order_store:save(Order),
                  ok;
              {error, Reason} ->
                  {error, Reason}
          end.

      cancel(OrderId) ->
          case order_store:find(OrderId) of
              {ok, Order} ->
                  order_store:save(Order#{status => cancelled}),
                  ok;
              {error, Reason} ->
                  {error, Reason}
          end.

      validate(#{total := Total}) when Total > 0 ->
          ok;
      validate(_) ->
          {error, invalid_order}.
