  changed_files:
    src/TaskQueue.cs: |
      namespace Queue;

      using System;
      using System.Collections.Generic;
      using System.Linq;

      public class TaskQueue
      {
          private readonly List<TaskItem> _items = new();
          private readonly HashSet<string> _completedIds = new();

          public void Enqueue(TaskItem item)
          {
              _items.Add(item);
              _items.Sort((a, b) => b.Priority.CompareTo(a.Priority));
          }

          public TaskItem Dequeue()
          {
              if (_items.Count == 0)
                  return null;
              var item = _items[0];
              _items.RemoveAt(0);
              return item;
          }

          public TaskItem Peek()
          {
              return _items.Count > 0 ? _items[0] : null;
          }

          public void Complete(string taskId)
          {
              _completedIds.Add(taskId);
              _items.RemoveAll(i => i.Id == taskId);
          }

          public bool IsCompleted(string taskId) => _completedIds.Contains(taskId);

          public int Count => _items.Count;

          public IReadOnlyList<TaskItem> GetPending() => _items.AsReadOnly();
      }
    src/TaskItem.cs: |
      namespace Queue;

      public class TaskItem
      {
          public string Id { get; set; }
          public string Name { get; set; }
          public int Priority { get; set; }
          public string Status { get; set; }

          public TaskItem(string id, string name, int priority)
          {
              Id = id;
              Name = name;
              Priority = priority;
              Status = "pending";
          }
      }
  commit_message: "feat: priority ordering, peek, complete, and status tracking"
