      namespace Queue;

      using System.Collections.Generic;
      using System.Linq;

      public class TaskQueue
      {
          private readonly List<TaskItem> _items = new();

          public void Enqueue(TaskItem item)
          {
              _items.Add(item);
          }

          public TaskItem Dequeue()
          {
              if (_items.Count == 0)
                  return null;
              var item = _items[0];
              _items.RemoveAt(0);
              return item;
          }

          public int Count => _items.Count;
      }
    tests/TaskQueueTests.cs: |
      using Xunit;
      using Queue;

      public class TaskQueueTests
      {
          [Fact]
          public void Enqueue_IncreasesCount()
          {
              var q = new TaskQueue();
              q.Enqueue(new TaskItem("1", "task1", 1));
              Assert.Equal(1, q.Count);
          }

          [Fact]
          public void Dequeue_ReturnsFirst()
          {
              var q = new TaskQueue();
              q.Enqueue(new TaskItem("1", "first", 1));
              q.Enqueue(new TaskItem("2", "second", 2));
              var item = q.Dequeue();
              Assert.Equal("first", item.Name);
          }

          [Fact]
          public void Dequeue_EmptyReturnsNull()
          {
              var q = new TaskQueue();
              Assert.Null(q.Dequeue());
          }
      }
