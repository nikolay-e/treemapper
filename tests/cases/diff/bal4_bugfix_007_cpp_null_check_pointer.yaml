repo:
  initial_files:
    include/node.h: |
      #pragma once

      struct TreeNode {
          int value;
          TreeNode* left;
          TreeNode* right;

          explicit TreeNode(int v) : value(v), left(nullptr), right(nullptr) {}
      };
    src/tree.cpp: |
      #include "node.h"

      class BinaryTree {
      public:
          BinaryTree() : root_(nullptr) {}

          int findMax() const {
              return findMaxNode(root_);
          }

      private:
          TreeNode* root_;

          int findMaxNode(TreeNode* node) const {
              int maxVal = node->value;
              if (node->left) {
                  int leftMax = findMaxNode(node->left);
                  if (leftMax > maxVal) maxVal = leftMax;
              }
              if (node->right) {
                  int rightMax = findMaxNode(node->right);
                  if (rightMax > maxVal) maxVal = rightMax;
              }
              return maxVal;
          }
      };
    src/printer.cpp: |
      #include "node.h"
      #include <iostream>

      void printInOrder(TreeNode* node) {
          if (!node) return;
          printInOrder(node->left);
          std::cout << node->value << " ";
          printInOrder(node->right);
      }
