    src/tree.cpp: |
      #include "node.h"
      #include <limits>

      class BinaryTree {
      public:
          BinaryTree() : root_(nullptr) {}

          int findMax() const {
              return findMaxNode(root_);
          }

      private:
          TreeNode* root_;

          int findMaxNode(TreeNode* node) const {
              if (!node) return std::numeric_limits<int>::min();
              int maxVal = node->value;
              if (node->left) {
                  int leftMax = findMaxNode(node->left);
                  if (leftMax > maxVal) maxVal = leftMax;
              }
              if (node->right) {
                  int rightMax = findMaxNode(node->right);
                  if (rightMax > maxVal) maxVal = rightMax;
              }
              return maxVal;
          }
      };
