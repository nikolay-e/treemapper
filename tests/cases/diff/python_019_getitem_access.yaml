    session_store.py: |
      from typing import Dict, Any, Optional
      from dataclasses import dataclass
      from datetime import datetime, timedelta

      @dataclass
      class SessionData:
          user_id: int
          data: Dict[str, Any]
          created_at: datetime
          expires_at: datetime

      class SessionStore:
          def __init__(self, ttl_seconds: int = 3600):
              self._store: Dict[str, SessionData] = {}
              self._ttl = ttl_seconds

          def get(self, session_id: str) -> Optional[SessionData]:
              session = self._store.get(session_id)
              if session and datetime.now() < session.expires_at:
                  return session
              return None

          def set(self, session_id: str, user_id: int, data: Dict[str, Any]) -> None:
              self._store[session_id] = SessionData(
                  user_id=user_id, data=data,
                  created_at=datetime.now(),
                  expires_at=datetime.now() + timedelta(seconds=self._ttl),
              )
    feature_flags.py: |
      from typing import Dict, Set
      from dataclasses import dataclass

      @dataclass
      class FeatureFlag:
          name: str
          enabled: bool
          rollout_percentage: float = 100.0

      class FeatureFlagStore:
          def __init__(self):
              self._flags: Dict[str, FeatureFlag] = {}

          def is_enabled(self, flag_name: str) -> bool:
              flag = self._flags.get(flag_name)
              return flag.enabled if flag else False

          def set_flag(self, name: str, enabled: bool) -> None:
              self._flags[name] = FeatureFlag(name=name, enabled=enabled)

          def list_enabled(self) -> Set[str]:
              return {n for n, f in self._flags.items() if f.enabled}
