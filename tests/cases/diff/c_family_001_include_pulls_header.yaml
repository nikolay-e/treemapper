name: c_family_001_include_pulls_header
tags:
- lang:c
- lang:cpp
- change:single_file
- change:signature
- context:import_chain
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    math_utils.h: |
      #ifndef MATH_UTILS_H
      #define MATH_UTILS_H

      int add(int a, int b);
      int multiply(int a, int b);

      #endif

    math_utils.c: |
      #include "math_utils.h"

      int add(int a, int b) {
          return a + b;
      }

      int multiply(int a, int b) {
          return a * b;
      }

    string_utils.h: |
      #ifndef C_FAMILY_NOISE_001_STRUTILS_H
      #define C_FAMILY_NOISE_001_STRUTILS_H

      int C_FAMILY_NOISE_001_strlen(const char *s);
      void C_FAMILY_NOISE_001_strrev(char *s);

      #endif

    string_utils.c: |
      #include "string_utils.h"

      int C_FAMILY_NOISE_001_strlen(const char *s) {
          int n = 0;
          while (*s++) n++;
          return n;
      }

      void C_FAMILY_NOISE_001_strrev(char *s) {
          int len = C_FAMILY_NOISE_001_strlen(s);
          for (int i = 0; i < len / 2; i++) {
              char tmp = s[i];
              s[i] = s[len - 1 - i];
              s[len - 1 - i] = tmp;
          }
      }

  changed_files:
    math_utils.h: |
      #ifndef MATH_UTILS_H
      #define MATH_UTILS_H

      int add(int a, int b);
      int multiply(int a, int b);
      int subtract(int a, int b);

      #endif

  commit_message: Update files

