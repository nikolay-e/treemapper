name: php_013_anonymous_class
repo:
  initial_files:
    src/Contracts/Handler.php: |
      <?php
      namespace App\Contracts;

      interface Handler {
          public function handle(mixed $data): mixed;
          public function supports(string $type): bool;
      }
    src/Pipeline/Pipeline.php: |
      <?php
      namespace App\Pipeline;

      use App\Contracts\Handler;

      class Pipeline {
          private array $handlers = [];

          public function addHandler(Handler $handler): self {
              $this->handlers[] = $handler;
              return $this;
          }

          public function process(mixed $data, string $type): mixed {
              foreach ($this->handlers as $handler) {
                  if ($handler->supports($type)) {
                      $data = $handler->handle($data);
                  }
              }
              return $data;
          }
      }
    src/Pipeline/Middleware.php: |
      <?php
      namespace App\Pipeline;

      class Middleware {
          private array $stack = [];

          public function addMiddleware(callable $middleware): self {
              $this->stack[] = $middleware;
              return $this;
          }

          public function process(mixed $request): mixed {
              foreach ($this->stack as $middleware) {
                  $request = $middleware($request);
              }
              return $request;
          }

          public function supports(string $contentType): bool {
              return $contentType === 'application/json';
          }
      }
    src/Events/EventDispatcher.php: |
      <?php
      namespace App\Events;

      class EventDispatcher {
          private array $listeners = [];

          public function addListener(string $event, callable $handler): void {
              $this->listeners[$event][] = $handler;
          }

          public function dispatch(string $event, mixed $data): mixed {
              foreach ($this->listeners[$event] ?? [] as $handler) {
                  $data = $handler($data);
              }
              return $data;
          }

          public function supports(string $event): bool {
              return isset($this->listeners[$event]);
          }
      }
  changed_files:
    src/Contracts/Handler.php: |
      <?php
      namespace App\Contracts;

      interface Handler {
          public function handle(mixed $data): mixed;
          public function supports(string $type): bool;
      }
    src/Pipeline/Pipeline.php: |
      <?php
      namespace App\Pipeline;

      use App\Contracts\Handler;

      class Pipeline {
          private array $handlers = [];

          public function addHandler(Handler $handler): self {
              $this->handlers[] = $handler;
              return $this;
          }

          public function process(mixed $data, string $type): mixed {
              foreach ($this->handlers as $handler) {
                  if ($handler->supports($type)) {
                      $data = $handler->handle($data);
                  }
              }
              return $data;
          }

          public function addInlineHandler(string $type, callable $callback): self {
              $this->handlers[] = new class($type, $callback) implements Handler {
                  public function __construct(
                      private string $supportedType,
                      private $callback
                  ) {}

                  public function handle(mixed $data): mixed {
                      return ($this->callback)($data);
                  }

                  public function supports(string $type): bool {
                      return $type === $this->supportedType;
                  }
              };
              return $this;
          }
      }
    src/Pipeline/Middleware.php: |
