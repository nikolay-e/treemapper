repo:
  initial_files:
    src/main/scala/warehouse/Product.scala: |
      package warehouse

      case class Product(
        sku: String,
        name: String,
        stockCount: Int,
        reorderPoint: Int
      )
    src/main/scala/warehouse/ProductRepository.scala: |
      package warehouse

      class ProductRepository {
        private var store: Map[String, Product] = Map.empty

        def save(p: Product): Unit = {
          store = store + (p.sku -> p)
        }

        def find(sku: String): Option[Product] = store.get(sku)

        def all(): List[Product] = store.values.toList
      }
    src/main/scala/warehouse/StockService.scala: |
      package warehouse

      class StockService(repo: ProductRepository) {
        def receive(sku: String, qty: Int): Either[String, Product] = {
          repo.find(sku) match {
            case None    => Left(s"SKU $sku not found")
            case Some(p) =>
              val updated = p.copy(stockCount = p.stockCount + qty)
              repo.save(updated)
              Right(updated)
          }
        }
      }
    src/main/scala/warehouse/api/StockController.scala: |
      package warehouse.api

      import warehouse.{StockService, ProductRepository, Product}

      class StockController(service: StockService) {
        def handleReceive(sku: String, qty: Int): String = {
          service.receive(sku, qty) match {
            case Right(p) => s"Received $qty units of ${p.sku}, stock now ${p.stockCount}"
            case Left(e)  => s"ERROR: $e"
          }
        }
      }
    src/main/scala/PHP013_Shipping.scala: |
      package shipping

      object PHP013_Shipping {
        val PHP013_GARBAGE_A = "shipping_marker"
        val PHP013_GARBAGE_B = "carrier_code"

        def getLabel(orderId: String): String = s"LABEL-$orderId"
      }
    src/main/scala/PHP013_Pricing.scala: |
      package pricing

      object PHP013_Pricing {
        val PHP013_GARBAGE_C = "pricing_marker"
        val PHP013_GARBAGE_D = "currency"

        def applyDiscount(price: Double, pct: Double): Double = price * (1 - pct / 100)
      }
    src/main/scala/PHP013_Analytics.scala: |
      package analytics

      object PHP013_Analytics {
        val PHP013_GARBAGE_E = "analytics_marker"

        def trackEvent(name: String): Unit = {}
      }
  changed_files:
    src/main/scala/warehouse/Product.scala: |
      package warehouse

      case class Product(
        sku: String,
        name: String,
        stockCount: Int,
        reorderPoint: Int,
        costPrice: Double
      )
    src/main/scala/warehouse/ProductRepository.scala: |
      package warehouse

      class ProductRepository {
        private var store: Map[String, Product] = Map.empty

        def save(p: Product): Unit = {
          store = store + (p.sku -> p)
        }

        def find(sku: String): Option[Product] = store.get(sku)

        def all(): List[Product] = store.values.toList

        def belowReorder(): List[Product] =
          store.values.filter(p => p.stockCount <= p.reorderPoint).toList
      }
    src/main/scala/warehouse/StockService.scala: |
      package warehouse

      class StockService(repo: ProductRepository) {
        def receive(sku: String, qty: Int): Either[String, Product] = {
          repo.find(sku) match {
            case None    => Left(s"SKU $sku not found")
            case Some(p) =>
              val updated = p.copy(stockCount = p.stockCount + qty)
              repo.save(updated)
              Right(updated)
          }
        }

        def deduct(sku: String, qty: Int): Either[String, Product] = {
          repo.find(sku) match {
            case None    => Left(s"SKU $sku not found")
            case Some(p) =>
              if (p.stockCount < qty) Left(s"Insufficient stock for $sku")
              else {
                val updated = p.copy(stockCount = p.stockCount - qty)
                repo.save(updated)
                Right(updated)
              }
          }
        }

        def reorderAlerts(): List[Product] = repo.belowReorder()
      }
    src/main/scala/warehouse/api/StockController.scala: |
      package warehouse.api

      import warehouse.{StockService, ProductRepository, Product}

      class StockController(service: StockService) {
        def handleReceive(sku: String, qty: Int): String = {
          service.receive(sku, qty) match {
            case Right(p) => s"Received $qty units of ${p.sku}, stock now ${p.stockCount}"
            case Left(e)  => s"ERROR: $e"
          }
        }

        def handleDeduct(sku: String, qty: Int): String = {
          service.deduct(sku, qty) match {
            case Right(p) => s"Deducted $qty units of ${p.sku}, stock now ${p.stockCount}"
            case Left(e)  => s"ERROR: $e"
          }
        }
      }
    src/main/scala/PHP013_Shipping.scala: |
      package shipping

      object PHP013_Shipping {
        val PHP013_GARBAGE_A = "shipping_marker"
        val PHP013_GARBAGE_B = "carrier_code"

        def getLabel(orderId: String): String = s"LABEL-$orderId"
      }
    src/main/scala/PHP013_Pricing.scala: |
      package pricing

      object PHP013_Pricing {
        val PHP013_GARBAGE_C = "pricing_marker"
        val PHP013_GARBAGE_D = "currency"

        def applyDiscount(price: Double, pct: Double): Double = price * (1 - pct / 100)
      }
    src/main/scala/PHP013_Analytics.scala: |
      package analytics

      object PHP013_Analytics {
        val PHP013_GARBAGE_E = "analytics_marker"

        def trackEvent(name: String): Unit = {}
      }
