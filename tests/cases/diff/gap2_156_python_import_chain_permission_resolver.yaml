    auth/roles.py: |
      from auth.policies import load_policy

      def permissions_for_role(role: str) -> set[str]:
          policy = load_policy(role)
          return set(policy.get("allow", []))

      def inherited_roles(role: str) -> list[str]:
          policy = load_policy(role)
          return policy.get("inherits", [])
    auth/policies.py: |
      ROLE_POLICIES = {
          "admin": {"allow": ["read", "write", "delete", "manage"], "inherits": ["editor"]},
          "editor": {"allow": ["read", "write"], "inherits": ["viewer"]},
          "viewer": {"allow": ["read"], "inherits": []},
      }

      def load_policy(role: str) -> dict:
          return ROLE_POLICIES.get(role, {"allow": [], "inherits": []})

      def all_roles() -> list[str]:
          return list(ROLE_POLICIES.keys())
