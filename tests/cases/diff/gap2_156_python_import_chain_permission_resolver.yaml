  changed_files:
    auth/resolver.py: |
      from auth.roles import permissions_for_role, inherited_roles

      class PermissionResolver:
          def __init__(self, user_roles: list[str]):
              self.user_roles = user_roles

          def can_access(self, resource: str) -> bool:
              for role in self.user_roles:
                  perms = permissions_for_role(role)
                  if resource in perms:
                      return True
              return False

          def effective_permissions(self) -> set[str]:
              all_perms: set[str] = set()
              visited: set[str] = set()
              stack = list(self.user_roles)
              while stack:
                  role = stack.pop()
                  if role in visited:
                      continue
                  visited.add(role)
                  all_perms |= permissions_for_role(role)
                  stack.extend(inherited_roles(role))
              return all_perms
  commit_message: "feat: add effective permissions with role inheritance"
