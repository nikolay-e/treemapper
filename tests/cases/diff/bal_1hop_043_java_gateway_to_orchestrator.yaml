    src/main/java/com/payment/orchestrator/PaymentOrchestrator.java: |
      package com.payment.orchestrator;
      import com.payment.gateway.PaymentGateway;
      public class PaymentOrchestrator {
          private final PaymentGateway gateway;
          public PaymentOrchestrator(PaymentGateway gateway) {
              this.gateway = gateway;
          }
          public String processPayment(String accountId, double amount) {
              if (amount <= 0) {
                  throw new IllegalArgumentException("Amount must be positive");
              }
              return gateway.charge(accountId, amount);
          }
          public boolean cancelPayment(String txnId) {
              return gateway.refund(txnId);
          }
      }
    src/main/java/com/payment/model/Transaction.java: |
      package com.payment.model;
      import java.time.Instant;
      public class Transaction {
          private final String id;
          private final String accountId;
          private final double amount;
          private final Instant timestamp;
          public Transaction(String id, String accountId, double amount) {
              this.id = id;
              this.accountId = accountId;
              this.amount = amount;
              this.timestamp = Instant.now();
          }
          public String getId() { return id; }
          public String getAccountId() { return accountId; }
          public double getAmount() { return amount; }
          public Instant getTimestamp() { return timestamp; }
      }
    src/main/java/com/payment/receipt/ReceiptGenerator.java: |
      package com.payment.receipt;
      public class ReceiptGenerator {
          public String generate(String txnId, double amount) {
              return "Receipt for " + txnId + ": $" + String.format("%.2f", amount);
          }
      }
    src/main/java/com/payment/fraud/FraudDetector.java: |
      package com.payment.fraud;
      public class FraudDetector {
          public boolean isSuspicious(String accountId, double amount) {
              return amount > 10000;
          }
      }
    src/main/java/com/payment/notification/PaymentNotifier.java: |
      package com.payment.notification;
      public class PaymentNotifier {
          public void notifySuccess(String accountId, String txnId) {
              System.out.println("Payment " + txnId + " for " + accountId + " succeeded");
          }
          public void notifyFailure(String accountId, String reason) {
              System.out.println("Payment failed for " + accountId + ": " + reason);
          }
      }
  changed_files:
