  changed_files:
    lib/serializers/base_serializer.rb: |
      module Serializers
        class BaseSerializer
          attr_reader :object, :options

          def initialize(object, options = {})
            @object = object
            @options = options
          end

          def serialize
            result = attributes.each_with_object({}) do |attr, hash|
              hash[attr] = object.send(attr)
            end
            result[:_type] = self.class.name if options[:include_type]
            apply_transforms(result)
          end

          def attributes
            raise NotImplementedError
          end

          def transforms
            {}
          end

          private

          def apply_transforms(hash)
            transforms.each do |key, transformer|
              hash[key] = transformer.call(hash[key]) if hash.key?(key)
            end
            hash
          end
        end
      end
  commit_message: "feat: add options, include_type, and transforms to BaseSerializer"
