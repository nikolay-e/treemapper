repo:
  initial_files:
    core/src/main/kotlin/com/store/money/Currency.kt: |
      package com.store.money

      enum class Currency(val code: String, val symbol: String, val decimalPlaces: Int) {
          USD("USD", "$", 2),
          EUR("EUR", "€", 2),
          JPY("JPY", "¥", 0),
          GBP("GBP", "£", 2);

          fun format(amount: Long): String {
              val divisor = Math.pow(10.0, decimalPlaces.toDouble()).toLong()
              return if (decimalPlaces == 0) {
                  "$symbol${amount}"
              } else {
                  "$symbol${amount / divisor}.${"%0${decimalPlaces}d".format(amount % divisor)}"
              }
          }
      }
    core/src/main/kotlin/com/store/money/Money.kt: |
      package com.store.money

      data class Money(val amount: Long, val currency: Currency) {
          operator fun plus(other: Money): Money {
              require(currency == other.currency) { "currency mismatch" }
              return Money(amount + other.amount, currency)
          }

          operator fun minus(other: Money): Money {
              require(currency == other.currency) { "currency mismatch" }
              return Money(amount - other.amount, currency)
          }

          fun format(): String = currency.format(amount)
      }
    domain/src/main/kotlin/com/store/cart/CartItem.kt: |
      package com.store.cart

      import com.store.money.Money

      data class CartItem(
          val productId: String,
          val name: String,
          val unitPrice: Money,
          val quantity: Int,
      ) {
          fun subtotal(): Money = Money(unitPrice.amount * quantity, unitPrice.currency)
      }
    api/src/main/kotlin/com/store/cart/CartSummaryService.kt: |
      package com.store.cart

      import com.store.money.Money

      class CartSummaryService {
          fun total(items: List<CartItem>): Money {
              require(items.isNotEmpty()) { "cart is empty" }
              return items.map { it.subtotal() }.reduce { acc, m -> acc + m }
          }
      }
