name: recall_003_deletion_consumer_ghost
repo:
  initial_files:
    pkg/timeutil/format.go: |
      package timeutil

      import (
          "fmt"
          "time"
      )

      func FormatRelative(t time.Time) string {
          d := time.Since(t)
          if d < time.Minute {
              return "just now"
          }
          if d < time.Hour {
              return fmt.Sprintf("%d minutes ago", int(d.Minutes()))
          }
          return fmt.Sprintf("%d hours ago", int(d.Hours()))
      }

      func FormatISO(t time.Time) string {
          return t.UTC().Format(time.RFC3339)
      }

      func ParseFlexible(s string) (time.Time, error) {
          return time.Parse(time.RFC3339, s)
      }
    pkg/dashboard/widgets.go: |
      package dashboard

      import (
          "fmt"
          "time"

          "example.com/app/pkg/timeutil"
      )

      type ActivityWidget struct {
          LastSeen time.Time
      }

      func (a *ActivityWidget) Render() string {
          return fmt.Sprintf("Last activity: %s", timeutil.FormatRelative(a.LastSeen))
      }
    pkg/notifications/digest.go: |
      package notifications

      import (
          "fmt"
          "time"

          "example.com/app/pkg/timeutil"
      )

      type Notification struct {
          Title     string
          CreatedAt time.Time
      }

      func RenderDigest(items []Notification) string {
          out := ""
          for _, it := range items {
              out += fmt.Sprintf("- %s (%s)\n", it.Title, timeutil.FormatRelative(it.CreatedAt))
          }
          return out
      }
    pkg/audit/log.go: |
