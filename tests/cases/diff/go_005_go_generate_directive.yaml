name: go_005_go_generate_directive
repo:
  initial_files:
    internal/service/generate.go: |
      package service

      //go:generate mockgen -source=interfaces.go -destination=mocks/mock_interfaces.go -package=mocks
      //go:generate stringer -type=Status -output=status_string.go
    internal/service/interfaces.go: |
      package service

      import "context"

      type UserService interface {
          GetUser(ctx context.Context, id int64) (*User, error)
          CreateUser(ctx context.Context, req *CreateUserRequest) (*User, error)
      }

      type CreateUserRequest struct {
          Name  string
          Email string
      }

      type User struct {
          ID    int64
          Name  string
          Email string
      }

      type Status int

      const (
          StatusUnknown Status = iota
          StatusPending
          StatusActive
          StatusInactive
      )
    internal/service/user_service.go: |
      package service

      import (
          "context"
          "errors"
      )

      var ErrUserNotFound = errors.New("user not found")

      type userService struct {
          repo UserRepository
      }

      type UserRepository interface {
          FindByID(ctx context.Context, id int64) (*User, error)
          Create(ctx context.Context, user *User) error
      }

      func NewUserService(repo UserRepository) UserService {
          return &userService{repo: repo}
      }

      func (s *userService) GetUser(ctx context.Context, id int64) (*User, error) {
          return s.repo.FindByID(ctx, id)
      }

      func (s *userService) CreateUser(ctx context.Context, req *CreateUserRequest) (*User, error) {
          user := &User{Name: req.Name, Email: req.Email}
          if err := s.repo.Create(ctx, user); err != nil {
              return nil, err
          }
          return user, nil
      }
    cmd/api/handler.go: |
      package api

      import (
          "context"
          "mymodule/internal/service"
      )

      type UserHandler struct {
          svc service.UserService
      }

      func NewUserHandler(svc service.UserService) *UserHandler {
          return &UserHandler{svc: svc}
      }

      func (h *UserHandler) HandleGetUser(ctx context.Context, id int64) (*service.User, error) {
          return h.svc.GetUser(ctx, id)
      }

      func (h *UserHandler) HandleCreateUser(ctx context.Context, name, email string) (*service.User, error) {
          return h.svc.CreateUser(ctx, &service.CreateUserRequest{Name: name, Email: email})
      }
    internal/middleware/ratelimit.go: |
      package middleware

      import (
          "sync"
          "time"
      )

      type RateLimiter struct {
          mu       sync.Mutex
          tokens   int
          maxRate  int
          interval time.Duration
      }

      func NewRateLimiter(maxRate int, interval time.Duration) *RateLimiter {
          return &RateLimiter{tokens: maxRate, maxRate: maxRate, interval: interval}
      }

      func (rl *RateLimiter) Allow() bool {
          rl.mu.Lock()
          defer rl.mu.Unlock()
          if rl.tokens > 0 {
              rl.tokens--
              return true
          }
          return false
      }
  changed_files:
    internal/service/generate.go: |
      package service

      //go:generate mockgen -source=interfaces.go -destination=mocks/mock_interfaces.go -package=mocks
      //go:generate stringer -type=Status -output=status_string.go
    internal/service/interfaces.go: |
      package service

      import "context"

      type UserService interface {
          GetUser(ctx context.Context, id int64) (*User, error)
          GetUserByEmail(ctx context.Context, email string) (*User, error)
          CreateUser(ctx context.Context, req *CreateUserRequest) (*User, error)
          UpdateUser(ctx context.Context, id int64, req *UpdateUserRequest) (*User, error)
          DeleteUser(ctx context.Context, id int64) error
          ListUsers(ctx context.Context, opts *ListOptions) ([]*User, error)
      }

      type CreateUserRequest struct {
          Name  string
          Email string
          Role  Role
      }

      type UpdateUserRequest struct {
          Name  *string
          Email *string
          Role  *Role
      }

      type ListOptions struct {
          Limit  int
          Offset int
          SortBy string
          Order  SortOrder
      }

      type SortOrder string

      const (
          SortAsc  SortOrder = "asc"
          SortDesc SortOrder = "desc"
      )

      type User struct {
          ID     int64
          Name   string
          Email  string
          Role   Role
          Status Status
      }

      type Role int

      const (
          RoleUser Role = iota
          RoleAdmin
          RoleModerator
      )

      type Status int

      const (
          StatusUnknown Status = iota
          StatusPending
          StatusActive
          StatusInactive
          StatusSuspended
      )
