    ws/frame.py: |
      class Frame:
          TEXT = 1
          BINARY = 2
          CLOSE = 8
          PING = 9
          PONG = 10
          def __init__(self, opcode: int, payload: bytes):
              self.opcode = opcode
              self.payload = payload
          def is_control(self) -> bool:
              return self.opcode >= self.CLOSE
          def decode_text(self) -> str:
              return self.payload.decode("utf-8")
    ws/connection.py: |
      from ws.frame import Frame
      class Connection:
          def __init__(self, conn_id: str):
              self.conn_id = conn_id
              self.open = True
              self.inbox: list[Frame] = []
              self.outbox: list[Frame] = []
          def receive(self, frame: Frame):
              self.inbox.append(frame)
          def send(self, frame: Frame):
              self.outbox.append(frame)
          def close(self):
              self.open = False
    ws/handler.py: |
      from ws.connection import Connection
      from ws.frame import Frame
      class MessageHandler:
          def __init__(self):
              self.message_log: list[str] = []
          def handle(self, conn: Connection):
              for frame in conn.inbox:
                  if frame.opcode == Frame.TEXT:
                      text = frame.decode_text()
                      self.message_log.append(f"{conn.conn_id}: {text}")
                      response = Frame(Frame.TEXT, f"echo: {text}".encode())
                      conn.send(response)
                  elif frame.opcode == Frame.PING:
                      conn.send(Frame(Frame.PONG, frame.payload))
              conn.inbox.clear()
    server/ws_server.py: |
      from ws.handler import MessageHandler
      from ws.connection import Connection
      from ws.frame import Frame
      class WebSocketServer:
          def __init__(self):
              self.handler = MessageHandler()
              self.connections: dict[str, Connection] = {}
          def connect(self, conn_id: str) -> Connection:
              conn = Connection(conn_id)
              self.connections[conn_id] = conn
              return conn
          def on_message(self, conn_id: str, data: bytes):
              conn = self.connections.get(conn_id)
              if conn and conn.open:
                  frame = Frame(Frame.TEXT, data)
                  conn.receive(frame)
                  self.handler.handle(conn)
          def disconnect(self, conn_id: str):
              conn = self.connections.pop(conn_id, None)
              if conn:
                  conn.close()
