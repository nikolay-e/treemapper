      from token_bucket import TokenBucket

      class RateLimiter:
          def __init__(self, capacity, refill_rate, window_seconds=60):
              self.bucket = TokenBucket(capacity, refill_rate)
              self.window_start = 0
              self.window_seconds = window_seconds
              self.request_count = 0

          def check_rate(self, timestamp):
              if timestamp - self.window_start > self.window_seconds:
                  self.reset_window(timestamp)
              self.bucket.refill()
              if self.bucket.consume(1):
                  self.request_count += 1
                  return True
              return False

          def reset_window(self, timestamp):
              self.window_start = timestamp
              self.request_count = 0
              self.bucket.refill()
