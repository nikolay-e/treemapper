  changed_files:
    src/event/dispatcher.rs: |
      use std::collections::HashMap;
      use std::collections::HashSet;

      pub struct EventDispatcher {
          listeners: HashMap<String, Vec<String>>,
          registered: HashMap<String, HashSet<String>>,
      }

      impl EventDispatcher {
          pub fn new() -> Self {
              EventDispatcher {
                  listeners: HashMap::new(),
                  registered: HashMap::new(),
              }
          }

          pub fn register(&mut self, event: &str, handler: &str) {
              let seen = self.registered.entry(event.to_string()).or_default();
              if seen.contains(handler) {
                  return;
              }
              seen.insert(handler.to_string());
              self.listeners
                  .entry(event.to_string())
                  .or_default()
                  .push(handler.to_string());
          }

          pub fn dispatch(&self, event: &str) -> Vec<String> {
              self.listeners.get(event).cloned().unwrap_or_default()
          }
      }
    src/app/router.rs: |
      use crate::event::dispatcher::EventDispatcher;

      pub struct AppRouter {
          dispatcher: EventDispatcher,
      }

      impl AppRouter {
          pub fn new() -> Self {
              AppRouter { dispatcher: EventDispatcher::new() }
          }

          pub fn on(&mut self, event: &str, handler: &str) {
              self.dispatcher.register(event, handler);
          }

          pub fn emit(&self, event: &str) -> Vec<String> {
              self.dispatcher.dispatch(event)
          }
      }
    garbage/tracing.rs: |
      // GARBAGE_EVTD_A = "tracing_marker"
      pub fn start_trace(_name: &str) -> u64 { 0 }
    garbage/health.rs: |
      // GARBAGE_EVTD_B = "health_marker"
      pub fn check_health() -> bool { true }
    garbage/profiler.rs: |
      // GARBAGE_EVTD_C = "profiler_marker"
      pub fn profile(_label: &str) {}
  commit_message: "fix: prevent duplicate handler registration in EventDispatcher"
