repo:
  initial_files:
    config/cache.yaml: |
      cache:
        backend: redis
        default_ttl: 300
        key_prefix: "app:"
        pools:
          sessions: 1800
          queries: 60
    src/cache_manager.py: |
      import yaml

      class CacheManager:
          def __init__(self):
              with open("config/cache.yaml") as f:
                  data = yaml.safe_load(f)
              self.cfg = data["cache"]
              self.backend = self.cfg["backend"]
              self.default_ttl = self.cfg["default_ttl"]
              self.prefix = self.cfg["key_prefix"]

          def get_ttl(self, pool_name):
              pools = self.cfg.get("pools", {})
              return pools.get(pool_name, self.default_ttl)
    src/session_store.py: |
      import yaml

      def get_session_ttl():
          with open("config/cache.yaml") as f:
              data = yaml.safe_load(f)
          return data["cache"]["pools"]["sessions"]
