name: ansible_003_template_jinja
repo:
  initial_files:
    roles/nginx/tasks/main.yml: |
      ---
      - name: Install nginx
        ansible.builtin.apt:
          name: nginx
          state: present
        become: true

      - name: Deploy nginx configuration
        ansible.builtin.template:
          src: nginx.conf.j2
          dest: /etc/nginx/nginx.conf
          owner: root
          group: root
          mode: "0644"
        notify: Restart nginx

      - name: Ensure nginx is running
        ansible.builtin.systemd:
          name: nginx
          state: started
          enabled: true
    roles/nginx/templates/nginx.conf.j2: |
      worker_processes auto;

      events {
          worker_connections {{ worker_connections | default(1024) }};
      }

      http {
          include /etc/nginx/mime.types;
          default_type application/octet-stream;
          sendfile on;
          keepalive_timeout 65;

          server {
              listen {{ http_port | default(80) }};
              server_name {{ server_name }};

              location / {
                  root {{ document_root }};
                  index index.html;
              }
          }
      }
    roles/nginx/handlers/main.yml: |
      ---
      - name: Restart nginx
        ansible.builtin.systemd:
          name: nginx
          state: restarted
        become: true
    roles/nginx/templates/vhost.conf.j2: |
      server {
          listen 80;
          server_name {{ vhost_name }};
          GARBAGE_ANS_003_A: "vhost_template_marker"
          root {{ vhost_root }};
      }
    roles/certbot/tasks/main.yml: |
      ---
      - name: GARBAGE_ANS_003_B install certbot
        ansible.builtin.apt:
          name: certbot
          state: present
    roles/certbot/templates/certbot.ini.j2: |
      # GARBAGE_ANS_003_C certbot config template
      email = {{ certbot_email }}
      agree-tos = true
      non-interactive = true
    roles/haproxy/templates/haproxy.cfg.j2: |
      # GARBAGE_ANS_003_D haproxy config
      global
          maxconn {{ haproxy_maxconn }}
      defaults
          mode http
          timeout connect 5000ms
  changed_files:
    roles/nginx/tasks/main.yml: |
      ---
      - name: Install nginx
        ansible.builtin.apt:
          name: nginx
          state: present
        become: true

      - name: Deploy nginx configuration
        ansible.builtin.template:
          src: nginx.conf.j2
          dest: /etc/nginx/nginx.conf
          owner: root
          group: root
          mode: "0644"
        notify: Restart nginx

      - name: Ensure nginx is running
        ansible.builtin.systemd:
          name: nginx
          state: started
          enabled: true
    roles/nginx/templates/nginx.conf.j2: |
      worker_processes auto;

      events {
          worker_connections {{ worker_connections | default(1024) }};
      }

      http {
          include /etc/nginx/mime.types;
          default_type application/octet-stream;
          sendfile on;
          keepalive_timeout 65;

          gzip on;
          gzip_types text/plain text/css application/json application/javascript;
          gzip_min_length 256;

          server {
              listen {{ http_port | default(80) }};
              server_name {{ server_name }};

              location / {
                  root {{ document_root }};
                  index index.html;
              }

              location /api {
                  proxy_pass http://{{ upstream_host }}:{{ upstream_port }};
                  proxy_set_header Host $host;
                  proxy_set_header X-Real-IP $remote_addr;
              }
          }
      }
    roles/nginx/handlers/main.yml: |
      ---
      - name: Restart nginx
        ansible.builtin.systemd:
          name: nginx
          state: restarted
        become: true
    roles/nginx/templates/vhost.conf.j2: |
      server {
          listen 80;
          server_name {{ vhost_name }};
          GARBAGE_ANS_003_A: "vhost_template_marker"
          root {{ vhost_root }};
      }
    roles/certbot/tasks/main.yml: |
      ---
      - name: GARBAGE_ANS_003_B install certbot
        ansible.builtin.apt:
          name: certbot
          state: present
    roles/certbot/templates/certbot.ini.j2: |
      # GARBAGE_ANS_003_C certbot config template
      email = {{ certbot_email }}
      agree-tos = true
      non-interactive = true
    roles/haproxy/templates/haproxy.cfg.j2: |
      # GARBAGE_ANS_003_D haproxy config
      global
          maxconn {{ haproxy_maxconn }}
      defaults
          mode http
          timeout connect 5000ms
  commit_message: Update files
fragments:
- id: main
  selector:
    path: roles/nginx/tasks/main.yml
    anchor: 'src: nginx.conf.j2'
- id: main_1
  selector:
    path: roles/nginx/tasks/main.yml
    anchor: 'dest: /etc/nginx/nginx.conf'
- id: main_2
  selector:
    path: roles/nginx/tasks/main.yml
    anchor: Deploy nginx configuration
- id: no_vhost_conf
  selector:
    path: roles/nginx/templates/vhost.conf.j2
- id: no_main
  selector:
    path: roles/certbot/tasks/main.yml
- id: no_certbot_ini
  selector:
    path: roles/certbot/templates/certbot.ini.j2
- id: no_haproxy_cfg
  selector:
    path: roles/haproxy/templates/haproxy.cfg.j2
- id: no_global_0
  selector:
    anchor: GARBAGE_ANS_003_A
- id: no_global_1
  selector:
    anchor: GARBAGE_ANS_003_B
- id: no_global_2
  selector:
    anchor: GARBAGE_ANS_003_C
- id: no_global_3
  selector:
    anchor: GARBAGE_ANS_003_D
oracle:
  required:
  - main
  - main_1
  - main_2
  allowed: []
  forbidden:
  - no_vhost_conf
  - no_main
  - no_certbot_ini
  - no_haproxy_cfg
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
