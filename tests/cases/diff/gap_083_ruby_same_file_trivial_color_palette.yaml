repo:
  initial_files:
    lib/palette.rb: |
      class Palette
        COLORS = {
          red: '#FF0000',
          green: '#00FF00',
          blue: '#0000FF',
          white: '#FFFFFF',
          black: '#000000'
        }.freeze

        def self.hex(name)
          COLORS.fetch(name)
        end

        def self.rgb(name)
          hex = COLORS.fetch(name).delete('#')
          [hex[0..1], hex[2..3], hex[4..5]].map { |c| c.to_i(16) }
        end

        def self.names
          COLORS.keys
        end
      end
    lib/gradient.rb: |
      class Gradient
        def initialize(start_color, end_color, steps)
          @start = start_color
          @end_color = end_color
          @steps = steps
        end

        def generate
          (0...@steps).map do |i|
            ratio = i.to_f / (@steps - 1)
            interpolate(ratio)
          end
        end

        def interpolate(ratio)
          ratio.clamp(0.0, 1.0)
        end
      end
    lib/theme.rb: |
      class Theme
        attr_reader :name, :primary, :secondary

        def initialize(name:, primary:, secondary:)
          @name = name
          @primary = primary
          @secondary = secondary
        end

        def to_css
          ":root { --primary: #{@primary}; --secondary: #{@secondary}; }"
        end

        def dark?
          @name.include?('dark')
        end
      end
