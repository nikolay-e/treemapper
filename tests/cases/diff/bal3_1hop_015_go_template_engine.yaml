  changed_files:
    pkg/template/engine.go: |
      package template

      import (
          "fmt"
          "strings"
      )

      type Context struct {
          Vars    map[string]string
          Helpers map[string]func(string) string
      }

      type Engine struct {
          Delimiter  string
          StrictMode bool
      }

      func NewEngine() *Engine {
          return &Engine{Delimiter: "{{}}", StrictMode: false}
      }

      func (e *Engine) Render(tpl string, ctx Context) (string, error) {
          result := tpl
          for k, v := range ctx.Vars {
              result = strings.ReplaceAll(result, "{{"+k+"}}", v)
          }
          if e.StrictMode && strings.Contains(result, "{{") {
              return "", fmt.Errorf("unresolved template variables")
          }
          return result, nil
      }

      func (e *Engine) RenderWithHelpers(tpl string, ctx Context) (string, error) {
          result, err := e.Render(tpl, ctx)
          if err != nil {
              return "", err
          }
          for name, fn := range ctx.Helpers {
              result = strings.ReplaceAll(result, "{{helper:"+name+"}}", fn(result))
          }
          return result, nil
      }
  commit_message: "feat: add StrictMode, Helpers, and error return to Engine.Render"
