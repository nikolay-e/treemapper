    garbage/BAL015_save.lua: |
      -- BAL015_GARBAGE_C = "save_marker"
  changed_files:
    game/combat.lua: |
      local M = {}

      local MAX_HP = 999

      function M.apply_damage(unit, damage)
          if damage < 0 then
              return
          end
          unit.hp = math.max(0, unit.hp - damage)
      end

      function M.heal(unit, amount)
          if amount < 0 then
              return
          end
          unit.hp = math.min(MAX_HP, unit.hp + amount)
      end

      return M
    garbage/BAL015_ui.lua: |
      -- BAL015_GARBAGE_A = "ui_marker"
    garbage/BAL015_audio.lua: |
      -- BAL015_GARBAGE_B = "audio_marker"
    garbage/BAL015_save.lua: |
      -- BAL015_GARBAGE_C = "save_marker"
  commit_message: "fix: clamp hp in apply_damage and heal, reject negative values"
