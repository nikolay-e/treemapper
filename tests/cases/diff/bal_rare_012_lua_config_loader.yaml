  changed_files:
    src/config.lua: |
      local Config = {}
      Config.__index = Config

      function Config.load(path, defaults)
        defaults = defaults or {}
        local file = io.open(path, "r")
        if not file then
          return setmetatable({data = defaults}, Config)
        end
        local content = file:read("*a")
        file:close()
        local data = {}
        for k, v in pairs(defaults) do data[k] = v end
        for line in content:gmatch("[^\n]+") do
          local key, value = line:match("^(%w+)%s*=%s*(.+)$")
          if key then data[key] = value end
        end
        return setmetatable({data = data}, Config)
      end

      function Config:get(key)
        return self.data[key]
      end

      function Config:get_int(key, fallback)
        local val = self.data[key]
        return tonumber(val) or fallback or 0
      end

      return Config
    src/server.lua: |
      local Config = require("src.config")

      local Server = {}

      function Server.new(config_path)
        local defaults = {host = "0.0.0.0", port = "8080"}
        local cfg = Config.load(config_path, defaults)
        return {
          host = cfg:get("host"),
          port = cfg:get_int("port", 8080),
        }
      end

      return Server
    src/middleware.lua: |
      local function cors_middleware(handler)
        return function(req, res)
          res.headers["Access-Control-Allow-Origin"] = "*"
          return handler(req, res)
        end
      end

      return { cors = cors_middleware }
    src/app.lua: |
      local Server = require("src.server")
      local middleware = require("src.middleware")

      local App = {}

      function App.start(config_path)
        local srv = Server.new(config_path)
        print("Starting on " .. srv.host .. ":" .. srv.port)
        return srv
      end

      return App
    garbage_template.lua: |
      local GARBAGE_RARE_012_ENGINE_A = "mustache"
      local GARBAGE_RARE_012_CACHE_B = true

      local GarbageTemplate = {}

      function GarbageTemplate.render()
        return GARBAGE_RARE_012_ENGINE_A
      end

      local GARBAGE_RARE_012_EXT_C = ".html"

      return GarbageTemplate
    garbage_session.lua: |
      local GARBAGE_RARE_012_TTL_D = 3600
      local GARBAGE_RARE_012_SECURE_E = true

      local GarbageSession = {}

      function GarbageSession.create()
        return GARBAGE_RARE_012_TTL_D
      end

      local GARBAGE_RARE_012_STORE_F = "memory"

      return GarbageSession
