name: bal_rare_012_lua_config_loader
tags:
- lang:lua
- change:multi_file
- change:signature
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    src/config.lua: |
      local Config = {}
      Config.__index = Config

      function Config.load(path)
        local file = io.open(path, "r")
        if not file then return nil, "file not found" end
        local content = file:read("*a")
        file:close()
        local data = {}
        for line in content:gmatch("[^\n]+") do
          local key, value = line:match("^(%w+)%s*=%s*(.+)$")
          if key then data[key] = value end
        end
        return setmetatable({data = data}, Config)
      end

      function Config:get(key)
        return self.data[key]
      end

      return Config
    src/server.lua: |
      local Config = require("src.config")

      local Server = {}

      function Server.new(config_path)
        local cfg = Config.load(config_path)
        return {
          host = cfg:get("host") or "0.0.0.0",
          port = tonumber(cfg:get("port")) or 8080,
        }
      end

      return Server
    src/middleware.lua: |
      local function cors_middleware(handler)
        return function(req, res)
          res.headers["Access-Control-Allow-Origin"] = "*"
          return handler(req, res)
        end
      end

      return { cors = cors_middleware }
    src/app.lua: |
      local Server = require("src.server")
      local middleware = require("src.middleware")

      local App = {}

      function App.start(config_path)
        local srv = Server.new(config_path)
        print("Starting on " .. srv.host .. ":" .. srv.port)
        return srv
      end

      return App
