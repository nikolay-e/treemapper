      sub find_by_id {
          my ($self, $user_id) = @_;
          my $rows = $self->{db}->query(
              "SELECT id, name, email FROM users WHERE id = ?", $user_id
          );
          return $rows->[0];
      }

      sub find_by_email {
          my ($self, $email) = @_;
          my $rows = $self->{db}->query(
              "SELECT id, name, email FROM users WHERE email = ?", $email
          );
          return $rows->[0];
      }

      sub list_active_users {
          my ($self, $limit) = @_;
          $limit ||= 50;
          return $self->{db}->query(
              "SELECT id, name, email FROM users WHERE active = true LIMIT ?",
              $limit
          );
      }

      sub create_user {
          my ($self, %attrs) = @_;
          $self->{db}->execute(
              "INSERT INTO users (name, email) VALUES (?, ?)",
              $attrs{name}, $attrs{email}
          );
      }

