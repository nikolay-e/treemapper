    src/search/indexer.py: |
      from src.search.tokenizer import tokenize

      class Indexer:
          def __init__(self) -> None:
              self._index: dict[str, set[int]] = {}

          def add(self, doc_id: int, text: str) -> None:
              for token in tokenize(text):
                  self._index.setdefault(token, set()).add(doc_id)

          def search(self, query: str) -> set[int]:
              tokens = tokenize(query)
              if not tokens:
                  return set()
              results = None
              for token in tokens:
                  hits = self._index.get(token, set())
                  results = hits if results is None else results & hits
              return results or set()
    src/search/tokenizer.py: |
      import re

      def tokenize(text: str) -> list[str]:
          return re.findall(r'\w+', text.lower())
    tests/test_indexer.py: |
      from src.search.indexer import Indexer

      def test_single_doc_search():
          idx = Indexer()
          idx.add(1, "hello world")
          assert 1 in idx.search("hello")

      def test_multiple_docs_same_token():
          idx = Indexer()
          idx.add(1, "python rocks")
          idx.add(2, "python rules")
          results = idx.search("python")
          assert 1 in results
          assert 2 in results

      def test_overwrite_bug_fixed():
          idx = Indexer()
          idx.add(1, "shared token")
          idx.add(2, "shared token")
          assert idx.search("shared") == {1, 2}
