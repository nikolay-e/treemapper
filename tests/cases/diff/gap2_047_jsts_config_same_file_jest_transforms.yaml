repo:
  initial_files:
    src/search/indexer.py: |
      from src.search.tokenizer import tokenize

      class Indexer:
          def __init__(self) -> None:
              self._index: dict[str, set[int]] = {}

          def add(self, doc_id: int, text: str) -> None:
              for token in tokenize(text):
                  # BUG: overwrites existing doc set instead of updating
                  self._index[token] = {doc_id}

          def search(self, query: str) -> set[int]:
              tokens = tokenize(query)
              if not tokens:
                  return set()
              results = None
              for token in tokens:
                  hits = self._index.get(token, set())
                  results = hits if results is None else results & hits
              return results or set()
