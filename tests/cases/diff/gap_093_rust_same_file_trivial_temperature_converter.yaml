name: gap_093_rust_same_file_trivial_temperature_converter
tags:
- lang:rust
- change:single_file
- context:same_file
- difficulty:trivial
- distance:0hop
repo:
  initial_files:
    src/temperature.rs: |
      pub fn celsius_to_fahrenheit(c: f64) -> f64 {
          c * 9.0 / 5.0 + 32.0
      }

      pub fn fahrenheit_to_celsius(f: f64) -> f64 {
          (f - 32.0) * 5.0 / 9.0
      }

      pub fn celsius_to_kelvin(c: f64) -> f64 {
          c + 273.15
      }
    src/pressure.rs: |
      pub fn psi_to_bar(psi: f64) -> f64 {
          psi * 0.0689476
      }

      pub fn bar_to_psi(bar: f64) -> f64 {
          bar / 0.0689476
      }

      pub fn atm_to_bar(atm: f64) -> f64 {
          atm * 1.01325
      }

      pub fn bar_to_atm(bar: f64) -> f64 {
          bar / 1.01325
      }
    src/distance.rs: |
      pub fn miles_to_km(miles: f64) -> f64 {
          miles * 1.60934
      }

      pub fn km_to_miles(km: f64) -> f64 {
          km / 1.60934
      }

      pub fn feet_to_meters(feet: f64) -> f64 {
          feet * 0.3048
      }

      pub fn meters_to_feet(meters: f64) -> f64 {
          meters / 0.3048
      }
  changed_files:
    src/temperature.rs: |
      pub fn celsius_to_fahrenheit(c: f64) -> f64 {
          c * 9.0 / 5.0 + 32.0
      }

      pub fn fahrenheit_to_celsius(f: f64) -> f64 {
          (f - 32.0) * 5.0 / 9.0
      }

      pub fn celsius_to_kelvin(c: f64) -> f64 {
          c + 273.15
      }

      pub fn kelvin_to_celsius(k: f64) -> f64 {
          k - 273.15
      }
  commit_message: Update files
