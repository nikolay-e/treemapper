repo:
  initial_files:
    Models/User.cs: |
      namespace App.Models
      {
          public class User
          {
              public int Id { get; set; }
              public string Name { get; set; }
              public string Email { get; set; }
              public DateTime CreatedAt { get; set; }

              public override string ToString()
              {
                  return $"User({Id}, {Name})";
              }
          }
      }
    Repositories/UserRepository.cs: |
      namespace App.Repositories
      {
          class UserRepository { }
      }
    Repositories/ProductRepository.cs: |
      using System.Collections.Generic;

      namespace App.Repositories
      {
          class ProductRepository
          {
              private readonly Dictionary<int, Product> _products = new();

              public Product? FindProduct(int id)
              {
                  return _products.TryGetValue(id, out var product) ? product : null;
              }

              public void Save(Product product)
              {
                  _products[product.Id] = product;
              }

              public Product GetOrCreate(int id, string name)
              {
                  var product = FindProduct(id);
                  if (product is null)
                  {
                      product = new Product { Id = id, Name = name };
                      Save(product);
                  }
                  return product;
              }
          }
      }
    Services/UserService.cs: |
      namespace App.Services
      {
          class UserService
          {
              private readonly UserRepository _repository;

              public UserService(UserRepository repository)
              {
                  _repository = repository;
              }

              public string GetUserDisplayName(int id)
              {
                  var user = _repository.FindUser(id);
                  return user?.Name ?? "Unknown";
              }

              public User EnsureUser(int id, string defaultName)
              {
                  return _repository.GetOrCreate(id, defaultName);
              }
          }
      }
    Validators/UserValidator.cs: |
      using System.Collections.Generic;

      namespace App.Validators
      {
          class UserValidator
          {
              public List<string> Validate(User? user)
              {
                  var errors = new List<string>();
                  if (user is null)
                  {
                      errors.Add("User cannot be null");
                      return errors;
                  }
                  if (string.IsNullOrEmpty(user.Name))
                      errors.Add("Name is required");
                  return errors;
              }
          }
      }
    Extensions/NullableExtensions.cs: |
      namespace App.Extensions
      {
          static class NullableExtensions
          {
              public static T OrDefault<T>(this T? value, T defaultValue) where T : class
              {
                  return value ?? defaultValue;
              }

              public static T ThrowIfNull<T>(this T? value, string paramName) where T : class
              {
                  return value ?? throw new ArgumentNullException(paramName);
              }
          }
      }
    Mappers/UserMapper.cs: |
      namespace App.Mappers
      {
          class UserMapper
          {
              public UserDto ToDto(User user)
              {
                  return new UserDto
                  {
                      Id = user.Id,
                      Name = user.Name,
                      Email = user.Email
                  };
              }

              public User FromDto(UserDto dto)
              {
                  return new User
                  {
                      Id = dto.Id,
                      Name = dto.Name,
                      Email = dto.Email
                  };
              }
          }
      }
