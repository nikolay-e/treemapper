      import Foundation

      struct ProductDTO: Codable {
          let id: String
          let name: String
          let priceInCents: Int
          let category: String
          let createdAt: Date

          enum CodingKeys: String, CodingKey {
              case id
              case name
              case priceInCents = "price_in_cents"
              case category
              case createdAt = "created_at"
          }
      }

      struct ProductResponse: Decodable {
          let products: [ProductDTO]
