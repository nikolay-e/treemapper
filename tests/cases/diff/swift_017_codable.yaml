    Models/UserModels.swift: |
      import Foundation

      struct UserDTO: Codable {
          let id: String
          let firstName: String
          let lastName: String
          let emailAddress: String
          let joinedAt: Date

          enum CodingKeys: String, CodingKey {
              case id
              case firstName = "first_name"
              case lastName = "last_name"
              case emailAddress = "email_address"
              case joinedAt = "joined_at"
          }
      }

      struct UserResponse: Decodable {
          let users: [UserDTO]
          let totalCount: Int
          let page: Int
      }

      struct User {
          let id: String
          let fullName: String
          let email: String
          let memberSince: Date
      }
    Networking/ProductAPIClient.swift: |
      import Foundation

      class ProductAPIClient {
          private let session: URLSession
          private let baseURL: URL

          init(baseURL: URL, session: URLSession = .shared) {
              self.baseURL = baseURL
              self.session = session
          }

          func fetchProducts(page: Int, category: String? = nil) async throws -> [Product] {
              let url = baseURL.appendingPathComponent("/products")
              var components = URLComponents(url: url, resolvingAgainstBaseURL: false)!
              var queryItems = [URLQueryItem(name: "page", value: "\(page)")]
              if let category = category {
                  queryItems.append(URLQueryItem(name: "category", value: category))
              }
              components.queryItems = queryItems

              let (data, _) = try await session.data(from: components.url!)
              let decoder = JSONDecoder()
              decoder.dateDecodingStrategy = .iso8601
              let response = try decoder.decode(ProductResponse.self, from: data)
              return response.products.map(mapToProduct)
          }

          private func mapToProduct(_ dto: ProductDTO) -> Product {
              Product(
                  id: dto.id,
                  name: dto.name,
                  price: Double(dto.priceInCents) / 100.0,
                  category: dto.category
              )
          }
      }
    Networking/APIClientProtocol.swift: |
      import Foundation

      protocol APIClient {
          var baseURL: URL { get }
          var session: URLSession { get }
      }

      protocol UserFetching {
          func fetchUsers(page: Int) async throws -> [User]
      }

      protocol ProductFetching {
          func fetchProducts(page: Int, category: String?) async throws -> [Product]
      }
    ViewModels/UserListViewModel.swift: |
      import Foundation

      @MainActor
      class UserListViewModel: ObservableObject {
          @Published var users: [User] = []
          @Published var isLoading = false
          @Published var errorMessage: String?

          private let apiClient: UserAPIClient
          private var currentPage = 1

          init(apiClient: UserAPIClient) {
              self.apiClient = apiClient
          }

          func loadUsers() async {
              isLoading = true
              defer { isLoading = false }
              do {
                  let fetched = try await apiClient.fetchUsers(page: currentPage)
                  users.append(contentsOf: fetched)
                  currentPage += 1
              } catch {
                  errorMessage = error.localizedDescription
              }
          }

          func refresh() async {
              users = []
              currentPage = 1
              await loadUsers()
          }
      }
    Tests/UserAPIClientTests.swift: |
      import XCTest
      @testable import MyApp

      final class UserAPIClientTests: XCTestCase {
          var sut: UserAPIClient!
          var mockSession: URLSession!

          override func setUp() {
              let config = URLSessionConfiguration.ephemeral
              config.protocolClasses = [MockURLProtocol.self]
              mockSession = URLSession(configuration: config)
              sut = UserAPIClient(baseURL: URL(string: "https://api.test.com")!, session: mockSession)
          }

          func testFetchUsersDecodesResponse() async throws {
              let json = """
              {"users": [{"id": "1", "first_name": "Alice", "last_name": "Smith", "email_address": "alice@test.com", "joined_at": "2024-01-01T00:00:00Z"}], "totalCount": 1, "page": 1}
              """
              MockURLProtocol.stubResponseData = json.data(using: .utf8)

              let users = try await sut.fetchUsers(page: 1)
              XCTAssertEqual(users.count, 1)
              XCTAssertEqual(users[0].fullName, "Alice Smith")
              XCTAssertEqual(users[0].email, "alice@test.com")
          }

          func testFetchUsersEmptyResponse() async throws {
              let json = """
              {"users": [], "totalCount": 0, "page": 1}
              """
              MockURLProtocol.stubResponseData = json.data(using: .utf8)

              let users = try await sut.fetchUsers(page: 1)
              XCTAssertTrue(users.isEmpty)
          }
      }
