# Scenario: Adding explicit depends_on to a Lambda function to ensure the IAM policy,
#   CloudWatch log group, and VPC endpoint exist before deployment.
# Reviewer questions:
#   1. What IAM policy is attached? (iam.tf defines the attachment)
#   2. What CloudWatch log group is expected? (logging.tf)
# Traps:
#   - ecs/service.tf: ECS service with its own depends_on (same pattern, different service)
#   - variables.tf: variable definitions (no dependency chain)

initial:
  main.tf: |
    resource "aws_lambda_function" "api" {
      function_name = "api-handler"
      runtime       = "python3.11"
      handler       = "main.handler"
      role          = aws_iam_role.lambda.arn
      filename      = "lambda.zip"

      vpc_config {
        subnet_ids         = var.private_subnet_ids
        security_group_ids = [aws_security_group.lambda.id]
      }
    }
  iam.tf: |
    resource "aws_iam_role_policy_attachment" "lambda_logs" {
      role       = aws_iam_role.lambda.name
      policy_arn = "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
    }

    resource "aws_iam_role" "lambda" {
      name = "api-lambda-role"
      assume_role_policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Action = "sts:AssumeRole"
          Effect = "Allow"
          Principal = { Service = "lambda.amazonaws.com" }
        }]
      })
    }
  logging.tf: |
    resource "aws_cloudwatch_log_group" "lambda" {
      name              = "/aws/lambda/api-handler"
      retention_in_days = 14
    }
  ecs/service.tf: |
    resource "aws_ecs_service" "app" {
      name            = "app-service"
      cluster         = "main-cluster"
      task_definition = "app:1"

      depends_on = [
        aws_lb_listener.https,
        aws_iam_role_policy.ecs_task,
      ]
    }
  variables.tf: |
    variable "private_subnet_ids" {
      type = list(string)
    }

    variable "environment" {
      default = "staging"
    }

changed:
  main.tf: |
    resource "aws_lambda_function" "api" {
      function_name = "api-handler"
      runtime       = "python3.11"
      handler       = "main.handler"
      role          = aws_iam_role.lambda.arn
      filename      = "lambda.zip"

      vpc_config {
        subnet_ids         = var.private_subnet_ids
        security_group_ids = [aws_security_group.lambda.id]
      }

      depends_on = [
        aws_iam_role_policy_attachment.lambda_logs,
        aws_cloudwatch_log_group.lambda,
        aws_vpc_endpoint.s3,
      ]
    }

must_include_files:
  - main.tf
  - iam.tf
  - logging.tf

must_include_content_from:
  main.tf:
    - depends_on = [
    - aws_iam_role_policy_attachment.lambda_logs,
    - aws_cloudwatch_log_group.lambda,
  iam.tf:
    - resource "aws_iam_role_policy_attachment" "lambda_logs" {
  logging.tf:
    - resource "aws_cloudwatch_log_group" "lambda" {

must_not_include:
  # ECS depends_on - same pattern but for a different service, different dependencies
  - app-service
  - ecs_task
  # Variables - defines inputs but no dependency chain relevant to depends_on
  - variable "environment" {

must_not_include_files:
  - ecs/service.tf
  - variables.tf

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
