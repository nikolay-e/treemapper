initial:
  provider.tf: |
    provider "aws" {
      region = "us-east-1"
    }
  main.tf: |
    resource "aws_s3_bucket" "data" {
      bucket = "my-data-bucket"
    }
changed:
  provider.tf: |
    provider "aws" {
      region = "eu-west-1"
    }

    provider "aws" {
      alias  = "us"
      region = "us-east-1"
    }
  main.tf: |
    resource "aws_s3_bucket" "data" {
      bucket = "my-data-bucket"
    }
must_include_files:
- provider.tf
must_include_content:
- region = "eu-west-1"
add_garbage_files: false
skip_garbage_check: true
