# Scenario: Adding runtime and memory_size variable declarations to a
#   Lambda module that already references var.runtime in its main.tf.
#
# Reviewer questions:
#   Q1: "Does the module already use var.runtime?"
#       -> modules/app/main.tf references var.runtime -- the variable
#         was used before being declared. This diff fixes that.
#   Q2: "What are the defaults?"
#       -> python3.9 and 128, visible in diff.
#   Q3: "Who calls this module with runtime override?"
#       -> root/main.tf (UNCHANGED) invokes the module and currently
#         passes runtime = "python3.11". Shows the caller.
#
# Not needed:
#   - modules/cache/variables.tf: Sibling module's variables with similar
#     declaration pattern. HARD TRAP: same variable block syntax, same
#     module directory pattern. But cache variables, not Lambda.
#
#   - modules/queue/variables.tf: Another sibling module's variables.
#     Same pattern, same structure. But SQS queue config.
#
#   - terraform.tfvars: Provides variable values. Contains runtime value.
#     HARD TRAP: has "runtime" key matching the new variable. But tfvars
#     provides values to root, not to the module directly.
#
#   - modules/app/outputs.tf: Module outputs. Same module directory but
#     outputs are the other direction (data flowing out, not in).

initial:
  modules/app/main.tf: |
    resource "aws_lambda_function" "app" {
      function_name = var.name
      runtime       = var.runtime
      handler       = var.handler
      memory_size   = var.memory_size
      timeout       = var.timeout
      role          = aws_iam_role.lambda.arn
      filename      = data.archive_file.lambda.output_path

      environment {
        variables = {
          LOG_LEVEL = var.log_level
        }
      }
    }

    resource "aws_iam_role" "lambda" {
      name = "${var.name}-role"

      assume_role_policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect    = "Allow"
          Principal = { Service = "lambda.amazonaws.com" }
          Action    = "sts:AssumeRole"
        }]
      })
    }

    data "archive_file" "lambda" {
      type        = "zip"
      source_dir  = var.source_dir
      output_path = "${path.module}/function.zip"
    }
  modules/app/variables.tf: |
    variable "name" {
      type = string
    }
  root/main.tf: |
    module "api_handler" {
      source     = "./modules/app"
      name       = "api-handler"
      runtime    = "python3.11"
      handler    = "main.handler"
      source_dir = "${path.module}/functions/api"
      log_level  = "INFO"
    }

    module "event_processor" {
      source     = "./modules/app"
      name       = "event-processor"
      runtime    = "python3.9"
      handler    = "processor.handle"
      source_dir = "${path.module}/functions/processor"
      log_level  = "DEBUG"
    }
  modules/cache/variables.tf: |
    variable "cache_name" {
      type    = string
      default = "redis-cluster"
    }

    variable "cache_engine_version" {
      type    = string
      default = "6.x"
    }

    variable "cache_node_type" {
      type    = string
      default = "cache.t3.micro"
    }

    variable "cache_num_nodes" {
      type    = number
      default = 1
    }
  modules/queue/variables.tf: |
    variable "queue_name" {
      type = string
    }

    variable "visibility_timeout" {
      type    = number
      default = 30
    }

    variable "message_retention" {
      type    = number
      default = 345600
    }

    variable "max_message_size" {
      type    = number
      default = 262144
    }
  terraform.tfvars: |
    name    = "my-lambda"
    runtime = "python3.9"
  modules/app/outputs.tf: |
    output "function_arn" {
      value = aws_lambda_function.app.arn
    }

    output "function_name" {
      value = aws_lambda_function.app.function_name
    }

    output "invoke_arn" {
      value = aws_lambda_function.app.invoke_arn
    }

changed:
  modules/app/variables.tf: |
    variable "name" {
      type = string
    }

    variable "runtime" {
      type    = string
      default = "python3.9"
    }

    variable "memory_size" {
      type    = number
      default = 128
    }

# modules/app/main.tf is unchanged but reviewer needs to confirm that the
# Lambda function already references var.runtime (the variable was used
# before being declared -- this diff fixes that)
must_include_files:
  # Q1: Lambda resource that uses var.runtime and var.memory_size
  - modules/app/main.tf
  # Q3: Module callers that pass runtime values
  - root/main.tf

must_include_content_from:
  modules/app/main.tf:
    - runtime       = var.runtime
    - memory_size   = var.memory_size
    - resource "aws_lambda_function" "app" {
  root/main.tf:
    - 'runtime    = "python3.11"'
    - 'runtime    = "python3.9"'

must_not_include:
  # --- cache variables: sibling module, same pattern ---
  - cache_name
  - cache_engine_version
  - cache_node_type
  - cache_num_nodes
  # --- queue variables: another sibling module ---
  - queue_name
  - visibility_timeout
  - message_retention
  # --- tfvars: provides values but not declarations ---
  - name    = "my-lambda"
  # --- module outputs: same module but data direction is out, not in ---
  - function_arn
  - invoke_arn

must_not_include_files:
  - modules/cache/variables.tf
  - modules/queue/variables.tf
  - terraform.tfvars
  - modules/app/outputs.tf

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
