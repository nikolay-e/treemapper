initial:
  ecs.tf: |
    resource "aws_ecs_cluster" "main" {
      name = "main-cluster"
    }

  # --- Tricky garbage: same resource type aws_ecs_task_definition but for cron jobs ---
  ecs_cron.tf: |
    GARBAGE_TF_014_CRON_TASK_A = "scheduled-job"
    GARBAGE_TF_014_CRON_CPU_B = "128"

    resource "aws_ecs_task_definition" "cron" {
      family                   = "cron-task"
      network_mode             = "awsvpc"
      requires_compatibilities = ["FARGATE"]
      cpu                      = "128"
      memory                   = "256"

      container_definitions = jsonencode([{
        name  = "cron"
        image = "cron-runner:latest"
        command = ["python", "run_cron.py"]
      }])
    }

  # --- Plain garbage ---
  garbage_log_parser.py: |
    GARBAGE_TF_014_LOG_PARSER_C = "parser"
    GARBAGE_TF_014_LOG_FORMAT_D = "json"

    def parse_logs(path):
        return []

