# Scenario: Add a Fargate task definition to an existing ECS cluster
#
# Reviewer questions:
#   Q1: "What IAM role does the task use?"
#       -> iam.tf defines aws_iam_role.ecs_task_exec with the trust policy
#         for ecs-tasks.amazonaws.com and the execution role policy attachment.
#   Q2: "What cluster will run this task?"
#       -> ecs.tf defines aws_ecs_cluster.main alongside the new task def.
#   Q3: "What service will schedule this task?"
#       -> service.tf (UNCHANGED) defines an ECS service that references
#         the task definition. Shows the deployment configuration.
#
# Not needed:
#   - ecs_cron.tf: Same task definition type but for scheduled cron jobs.
#     HARDEST TRAP: identical resource type (aws_ecs_task_definition),
#     same attributes (family, network_mode, requires_compatibilities,
#     FARGATE, cpu, memory, container_definitions). But cron-task
#     family, different container.
#
#   - ecs_worker.tf: Another Fargate task for background workers. Same
#     type, same Fargate config. HARD TRAP: identical structure. But
#     worker-task family, different purpose.
#
#   - Dockerfile: Application packaging. Same port (8080). But Docker
#     image build, not Terraform infrastructure.
#
#   - ecr.tf: ECR repository for the container image. Direct edge:
#     the task references an image that lives in ECR. But ECR repo
#     definition doesn't help review the task definition.

initial:
  ecs.tf: |
    resource "aws_ecs_cluster" "main" {
      name = "main-cluster"

      setting {
        name  = "containerInsights"
        value = "enabled"
      }
    }
  iam.tf: |
    resource "aws_iam_role" "ecs_task_exec" {
      name = "ecs-task-execution-role"

      assume_role_policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect    = "Allow"
          Principal = { Service = "ecs-tasks.amazonaws.com" }
          Action    = "sts:AssumeRole"
        }]
      })
    }

    resource "aws_iam_role_policy_attachment" "ecs_task_exec" {
      role       = aws_iam_role.ecs_task_exec.name
      policy_arn = "arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy"
    }

    resource "aws_iam_role" "ecs_task" {
      name = "ecs-task-role"

      assume_role_policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect    = "Allow"
          Principal = { Service = "ecs-tasks.amazonaws.com" }
          Action    = "sts:AssumeRole"
        }]
      })
    }
  service.tf: |
    resource "aws_ecs_service" "app" {
      name            = "app-service"
      cluster         = aws_ecs_cluster.main.id
      task_definition = aws_ecs_task_definition.app.arn
      desired_count   = 2
      launch_type     = "FARGATE"

      network_configuration {
        subnets          = var.private_subnet_ids
        security_groups  = [aws_security_group.ecs.id]
        assign_public_ip = false
      }

      load_balancer {
        target_group_arn = aws_lb_target_group.app.arn
        container_name   = "app"
        container_port   = 8080
      }
    }
  ecs_cron.tf: |
    resource "aws_ecs_task_definition" "cron" {
      family                   = "cron-task"
      network_mode             = "awsvpc"
      requires_compatibilities = ["FARGATE"]
      cpu                      = "128"
      memory                   = "256"
      execution_role_arn       = aws_iam_role.ecs_task_exec.arn

      container_definitions = jsonencode([{
        name    = "cron"
        image   = "cron-runner:latest"
        command = ["python", "run_cron.py"]
        logConfiguration = {
          logDriver = "awslogs"
          options = {
            "awslogs-group"  = "/ecs/cron"
            "awslogs-region" = var.aws_region
          }
        }
      }])
    }
  ecs_worker.tf: |
    resource "aws_ecs_task_definition" "worker" {
      family                   = "worker-task"
      network_mode             = "awsvpc"
      requires_compatibilities = ["FARGATE"]
      cpu                      = "512"
      memory                   = "1024"
      execution_role_arn       = aws_iam_role.ecs_task_exec.arn
      task_role_arn            = aws_iam_role.ecs_task.arn

      container_definitions = jsonencode([{
        name  = "worker"
        image = "task-worker:latest"
        environment = [{
          name  = "WORKER_CONCURRENCY"
          value = "4"
        }]
      }])
    }
  Dockerfile: |
    FROM node:18-alpine
    WORKDIR /app
    COPY package*.json ./
    RUN npm ci --production
    COPY . .
    EXPOSE 8080
    CMD ["node", "server.js"]
  ecr.tf: |
    resource "aws_ecr_repository" "app" {
      name                 = "myapp"
      image_tag_mutability = "MUTABLE"

      image_scanning_configuration {
        scan_on_push = true
      }
    }

    resource "aws_ecr_lifecycle_policy" "app" {
      repository = aws_ecr_repository.app.name

      policy = jsonencode({
        rules = [{
          rulePriority = 1
          description  = "Keep last 10 images"
          selection = {
            tagStatus   = "any"
            countType   = "imageCountMoreThan"
            countNumber = 10
          }
          action = { type = "expire" }
        }]
      })
    }

changed:
  ecs.tf: |
    resource "aws_ecs_cluster" "main" {
      name = "main-cluster"

      setting {
        name  = "containerInsights"
        value = "enabled"
      }
    }

    resource "aws_ecs_task_definition" "app" {
      family                   = "app-task"
      network_mode             = "awsvpc"
      requires_compatibilities = ["FARGATE"]
      cpu                      = "256"
      memory                   = "512"
      execution_role_arn       = aws_iam_role.ecs_task_exec.arn

      container_definitions = jsonencode([{
        name  = "app"
        image = "myapp:latest"
        portMappings = [{
          containerPort = 8080
        }]
        environment = [{
          name  = "NODE_ENV"
          value = "production"
        }]
      }])
    }

must_include_files:
  # Q1: IAM execution role referenced by the task definition
  - iam.tf
  # Q3: ECS service that schedules this task definition
  - service.tf

must_include_content_from:
  iam.tf:
    - resource "aws_iam_role" "ecs_task_exec" {
    - AmazonECSTaskExecutionRolePolicy
  service.tf:
    - task_definition = aws_ecs_task_definition.app.arn
    - container_name   = "app"
    - container_port   = 8080

must_not_include:
  # --- ecs_cron.tf: same resource type but for cron jobs ---
  - cron-task
  - cron-runner:latest
  - run_cron.py
  - "/ecs/cron"
  # --- ecs_worker.tf: same Fargate pattern but for workers ---
  - worker-task
  - task-worker:latest
  - WORKER_CONCURRENCY
  # --- Dockerfile: application packaging, not Terraform ---
  - FROM node:18-alpine
  - npm ci --production
  # --- ecr.tf: container registry, orthogonal to task definition ---
  - aws_ecr_repository
  - scan_on_push
  - imageCountMoreThan

must_not_include_files:
  - ecs_cron.tf
  - ecs_worker.tf
  - Dockerfile
  - ecr.tf

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
