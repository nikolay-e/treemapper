# Scenario: Add a Route53 A record alias pointing at an ALB
#
# Reviewer questions:
#   1. What ALB does the alias target? (lb.tf defines aws_lb.main with its dns_name)
#   2. What hosted zone does it go into? (dns.tf defines aws_route53_zone.main)
#
# The diff adds an A-record alias in dns.tf. The ALB definition in lb.tf is
# unchanged but needed to verify the alias target is correct.
#
# Traps: mail_records.tf shares the same route53_record type but is for MX.
# acm.tf has route53 records too but for certificate validation.

initial:
  dns.tf: |
    resource "aws_route53_zone" "main" {
      name = "example.com"
    }
  lb.tf: |
    resource "aws_lb" "main" {
      name               = "${var.environment}-alb"
      internal           = false
      load_balancer_type = "application"
      subnets            = var.public_subnet_ids
    }
  mail_records.tf: |
    resource "aws_route53_record" "mx" {
      zone_id = aws_route53_zone.main.zone_id
      name    = "example.com"
      type    = "MX"
      ttl     = 3600
      records = ["10 mail.example.com"]
    }
  acm.tf: |
    resource "aws_route53_record" "cert_validation" {
      zone_id = aws_route53_zone.main.zone_id
      name    = aws_acm_certificate.main.domain_validation_options[0].resource_record_name
      type    = aws_acm_certificate.main.domain_validation_options[0].resource_record_type
      ttl     = 60
      records = [aws_acm_certificate.main.domain_validation_options[0].resource_record_value]
    }

changed:
  dns.tf: |
    resource "aws_route53_zone" "main" {
      name = "example.com"
    }

    resource "aws_route53_record" "api" {
      zone_id = aws_route53_zone.main.zone_id
      name    = "api.example.com"
      type    = "A"

      alias {
        name                   = aws_lb.main.dns_name
        zone_id                = aws_lb.main.zone_id
        evaluate_target_health = true
      }
    }
  lb.tf: |
    resource "aws_lb" "main" {
      name               = "${var.environment}-alb"
      internal           = false
      load_balancer_type = "application"
      subnets            = var.public_subnet_ids
    }
  mail_records.tf: |
    resource "aws_route53_record" "mx" {
      zone_id = aws_route53_zone.main.zone_id
      name    = "example.com"
      type    = "MX"
      ttl     = 3600
      records = ["10 mail.example.com"]
    }
  acm.tf: |
    resource "aws_route53_record" "cert_validation" {
      zone_id = aws_route53_zone.main.zone_id
      name    = aws_acm_certificate.main.domain_validation_options[0].resource_record_name
      type    = aws_acm_certificate.main.domain_validation_options[0].resource_record_type
      ttl     = 60
      records = [aws_acm_certificate.main.domain_validation_options[0].resource_record_value]
    }

must_include_files:
- lb.tf

must_include_content_from:
  lb.tf:
    # Reviewer needs the ALB definition to verify the alias target
    - resource "aws_lb" "main" {
    - load_balancer_type = "application"

must_not_include:
# MX records share route53_record type but serve email routing
- type    = "MX"
- mail.example.com
# Cert validation records are Route53 but for ACM, unrelated to the ALB alias
- cert_validation
- domain_validation_options

must_not_include_files:
- mail_records.tf  # same resource type but MX records for email
- acm.tf  # route53 records for cert validation, different purpose

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
