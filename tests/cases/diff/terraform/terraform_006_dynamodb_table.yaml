# === Assertions ===

must_include_files:
- infrastructure/database.tf

must_include_content_from:
  infrastructure/database.tf:
    - range_key  = "created_at"
    - name               = "email-index"
    - name               = "status-created-index"
    - projection_type    = "INCLUDE"
    - non_key_attributes = ["user_id", "email"]
    - ttl_enabled        = true
    - ttl_attribute_name = "expires_at"
    - kms_key_arn = aws_kms_key.dynamodb.arn
    - 'table_name = "sessions-${var.environment}"'
    - hash_key   = "session_id"

must_not_include:
# Sibling dynamodb module calls -- same module, different tables, not touched by diff
- audit-logs  # audit_table.tf uses same module but is not changed
- cache_key  # cache_table.tf uses same module but is not changed
# Different database services entirely
- aws_redshift_cluster  # redshift is a different service
- aws_elasticache_cluster  # elasticache is a different service

must_not_include_files:
- infrastructure/redshift.tf  # different database service
- infrastructure/elasticache.tf  # different database service
- infrastructure/audit_table.tf  # same module, different table, not in diff
- infrastructure/cache_table.tf  # same module, different table, not in diff

max_fragments: 8
max_files: 2
add_garbage_files: false
skip_garbage_check: true
