# === Assertions ===

must_include_files:
- infrastructure/database.tf

must_include_content_from:
  infrastructure/database.tf:
    - range_key  = "created_at"
    - name               = "email-index"
    - name               = "status-created-index"
    - projection_type    = "INCLUDE"
    - non_key_attributes = ["user_id", "email"]
    - ttl_enabled        = true
    - ttl_attribute_name = "expires_at"
    - kms_key_arn = aws_kms_key.dynamodb.arn
    - 'table_name = "sessions-${var.environment}"'
    - hash_key   = "session_id"

must_not_include:
# Plain garbage markers
- GARBAGE_TF_REDSHIFT_446_001
- GARBAGE_DB_446_003
- GARBAGE_PASSWORD_446_004
- GARBAGE_TF_NEPTUNE_446_005
- GARBAGE-NEPTUNE-446-006
- GARBAGE-NEPTUNE-INSTANCE-446-007
# Tricky: sibling module call to same ./modules/dynamodb with GSIs
- GARBAGE_TF_006_AUDIT_TABLE_G
- GARBAGE_TF_006_AUDIT_GSI_H
# Tricky: cache table using same module with TTL
- GARBAGE_TF_006_CACHE_TABLE_I
- GARBAGE_TF_006_CACHE_TTL_J

must_not_include_files:
- unrelated/redshift.tf
- unrelated/neptune.tf
- infrastructure/audit_table.tf
- infrastructure/cache_table.tf

max_fragments: 8
max_files: 2
add_garbage_files: false
skip_garbage_check: true
