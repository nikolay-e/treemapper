# Scenario: Expanding a Kubernetes deployment manifest generated via yamlencode --
#   adding replicas, version label, container spec with resource limits.
#
# Reviewer questions:
#   Q1: "Where is the generated YAML file used?"
#       -> k8s.tf creates a local_file resource that writes deployment.yaml.
#   Q2: "What namespace or cluster does this deploy to?"
#       -> variables.tf defines namespace (default "production") and app_version.
#   Q3: "Is there a service that routes to this deployment?"
#       -> services.tf (UNCHANGED) defines a Kubernetes service with selector
#         app=web, matching the deployment's labels. Reviewer needs to verify
#         label consistency.
#
# Not needed:
#   - nginx/config.tf: Also uses yamlencode with local_file but generates nginx
#     config. HARD TRAP: same function (yamlencode), same resource (local_file),
#     same pattern. But nginx config is not a K8s manifest.
#
#   - monitoring/grafana.tf: Also generates a YAML ConfigMap via yamlencode.
#     HARD TRAP: same yamlencode for K8s-like config. But Grafana dashboards
#     are a different concern.
#
#   - alerting/sns.tf: SNS topic for alerts. Completely different AWS service.
#
#   - helm/values.yaml: Helm values file with similar K8s structure (replicas,
#     image, resources). HARDEST TRAP: nearly identical YAML keys. But this
#     is a static values file, not Terraform yamlencode output.

max_enrichment: 7.2
initial:
  k8s.tf: |
    resource "local_file" "k8s_config" {
      filename = "${path.module}/output/deployment.yaml"
      content  = yamlencode({
        apiVersion = "apps/v1"
        kind       = "Deployment"
        metadata = {
          name = "web-app"
          labels = {
            app = "web"
          }
        }
        spec = {
          replicas = 2
          selector = {
            matchLabels = {
              app = "web"
            }
          }
        }
      })
    }
  variables.tf: |
    variable "app_version" {
      type    = string
      default = "v1"
    }

    variable "namespace" {
      type    = string
      default = "production"
    }

    variable "cluster_name" {
      type    = string
      default = "main-cluster"
    }
  services.tf: |
    resource "local_file" "k8s_service" {
      filename = "${path.module}/output/service.yaml"
      content  = yamlencode({
        apiVersion = "v1"
        kind       = "Service"
        metadata = {
          name      = "web-app-service"
          namespace = var.namespace
        }
        spec = {
          selector = {
            app = "web"
          }
          ports = [{
            port       = 80
            targetPort = 8080
            protocol   = "TCP"
          }]
          type = "ClusterIP"
        }
      })
    }
  nginx/config.tf: |
    resource "local_file" "nginx_config" {
      filename = "${path.module}/output/nginx.conf"
      content  = yamlencode({
        upstream = {
          servers = ["10.0.1.1", "10.0.1.2"]
        }
        server = {
          listen = 80
          location = {
            proxy_pass = "http://upstream"
          }
        }
      })
    }
  monitoring/grafana.tf: |
    resource "local_file" "grafana_dashboard" {
      filename = "${path.module}/output/grafana-dashboard.yaml"
      content  = yamlencode({
        apiVersion = "v1"
        kind       = "ConfigMap"
        metadata = {
          name      = "grafana-dashboards"
          namespace = "monitoring"
        }
        data = {
          "dashboard.json" = file("${path.module}/dashboards/main.json")
        }
      })
    }
  alerting/sns.tf: |
    resource "aws_sns_topic" "alerts" {
      name = "critical-alerts"
    }

    resource "aws_sns_topic_subscription" "email" {
      topic_arn = aws_sns_topic.alerts.arn
      protocol  = "email"
      endpoint  = "ops@example.com"
    }
  helm/values.yaml: |
    replicaCount: 3
    image:
      repository: web-app
      tag: v1
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
    service:
      type: ClusterIP
      port: 80

changed:
  k8s.tf: |
    resource "local_file" "k8s_config" {
      filename = "${path.module}/output/deployment.yaml"
      content  = yamlencode({
        apiVersion = "apps/v1"
        kind       = "Deployment"
        metadata = {
          name      = "web-app"
          namespace = var.namespace
          labels = {
            app     = "web"
            version = var.app_version
          }
        }
        spec = {
          replicas = 3
          selector = {
            matchLabels = {
              app = "web"
            }
          }
          template = {
            spec = {
              containers = [{
                name  = "web"
                image = "web-app:${var.app_version}"
                resources = {
                  limits = {
                    cpu    = "500m"
                    memory = "256Mi"
                  }
                }
              }]
            }
          }
        }
      })
    }

must_include_files:
  - k8s.tf
  # Q2: Defines namespace and app_version used in the expanded manifest
  - variables.tf
  # Q3: Service with selector app=web must match deployment labels
  - services.tf

must_include_content_from:
  k8s.tf:
    - replicas = 3
    - image = "web-app:${var.app_version}"
    - 'resource "local_file" "k8s_config"'
  variables.tf:
    - variable "app_version" {
    - variable "namespace" {
  services.tf:
    - app = "web"
    - targetPort = 8080

must_not_include:
  # --- nginx config: same yamlencode/local_file pattern but for nginx ---
  - upstream
  - 10.0.1.1
  - proxy_pass
  # --- grafana: yamlencode for K8s ConfigMap but monitoring concern ---
  - grafana-dashboards
  - "dashboard.json"
  # --- SNS: alerting infrastructure, not K8s manifests ---
  - critical-alerts
  - ops@example.com
  # --- helm values: similar K8s keys but static file, not Terraform ---
  - replicaCount
  - 'repository: web-app'

must_not_include_files:
  - nginx/config.tf
  - monitoring/grafana.tf
  - alerting/sns.tf
  - helm/values.yaml

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
