initial:
  k8s.tf: |
    resource "local_file" "k8s_config" {
      filename = "${path.module}/output/deployment.yaml"
      content  = yamlencode({
        apiVersion = "apps/v1"
        kind       = "Deployment"
        metadata = {
          name = "web-app"
          labels = {
            app = "web"
          }
        }
        spec = {
          replicas = 2
          selector = {
            matchLabels = {
              app = "web"
            }
          }
        }
      })
    }

  # --- Tricky garbage: same resource type local_file but for nginx config ---
  garbage_nginx_config.tf: |
    GARBAGE_TF_064_NGINX_MARKER_A = "nginx-config"
    GARBAGE_TF_064_NGINX_MARKER_B = "reverse-proxy"

    resource "local_file" "nginx_config" {
      filename = "${path.module}/output/nginx.conf"
      content  = yamlencode({
        upstream = {
          servers = ["10.0.1.1", "10.0.1.2"]
        }
      })
    }

  # --- Plain garbage: no overlap ---
  garbage_alerting.tf: |
    GARBAGE_TF_064_ALERT_MARKER_C = "pagerduty-integration"
    GARBAGE_TF_064_ALERT_MARKER_D = "alert-routing"

    resource "aws_sns_topic" "alerts" {
      name = "critical-alerts"
    }

changed:
  k8s.tf: |
    resource "local_file" "k8s_config" {
      filename = "${path.module}/output/deployment.yaml"
      content  = yamlencode({
        apiVersion = "apps/v1"
        kind       = "Deployment"
        metadata = {
          name = "web-app"
          labels = {
            app     = "web"
            version = "v2"
          }
        }
        spec = {
          replicas = 3
          selector = {
            matchLabels = {
              app = "web"
            }
          }
          template = {
            spec = {
              containers = [{
                name  = "web"
                image = "web-app:v2"
                resources = {
                  limits = {
                    cpu    = "500m"
                    memory = "256Mi"
                  }
                }
              }]
            }
          }
        }
      })
    }

  # --- Tricky garbage: same resource type local_file but for nginx config ---
  garbage_nginx_config.tf: |
    GARBAGE_TF_064_NGINX_MARKER_A = "nginx-config"
    GARBAGE_TF_064_NGINX_MARKER_B = "reverse-proxy"

    resource "local_file" "nginx_config" {
      filename = "${path.module}/output/nginx.conf"
      content  = yamlencode({
        upstream = {
          servers = ["10.0.1.1", "10.0.1.2"]
        }
      })
    }

  # --- Plain garbage: no overlap ---
  garbage_alerting.tf: |
    GARBAGE_TF_064_ALERT_MARKER_C = "pagerduty-integration"
    GARBAGE_TF_064_ALERT_MARKER_D = "alert-routing"

    resource "aws_sns_topic" "alerts" {
      name = "critical-alerts"
    }

# === Assertions ===

must_include_files:
- k8s.tf

must_include_content_from:
  k8s.tf:
    - replicas = 3
    - version = "v2"
    - image = "web-app:v2"
    - 'resource "local_file" "k8s_config"'

must_not_include:
# Tricky garbage markers (sibling local_file resource)
- GARBAGE_TF_064_NGINX_MARKER_A
- GARBAGE_TF_064_NGINX_MARKER_B
# Plain garbage markers
- GARBAGE_TF_064_ALERT_MARKER_C
- GARBAGE_TF_064_ALERT_MARKER_D

must_not_include_files:
- garbage_nginx_config.tf
- garbage_alerting.tf

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
