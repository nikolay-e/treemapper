# Scenario: Add a private route table with NAT gateway route
#
# Reviewer questions:
#   1. What NAT gateway does the default route use? (nat.tf aws_nat_gateway.main)
#   2. What private subnet gets this route table? (network.tf aws_subnet.private)
#
# The diff adds aws_route_table "private" and its association to network.tf.
# nat.tf (unchanged) defines the NAT gateway that the route targets.
# A reviewer needs nat.tf to verify the route target exists and is correct.
#
# Traps: public_routes.tf is same resource type but routes via IGW.

max_enrichment: 7.1
initial:
  network.tf: |
    resource "aws_vpc" "main" {
      cidr_block = "10.0.0.0/16"
    }

    resource "aws_subnet" "private" {
      vpc_id     = aws_vpc.main.id
      cidr_block = "10.0.1.0/24"
    }
  nat.tf: |
    resource "aws_eip" "nat" {
      domain = "vpc"
    }

    resource "aws_nat_gateway" "main" {
      allocation_id = aws_eip.nat.id
      subnet_id     = aws_subnet.public.id
      depends_on    = [aws_internet_gateway.main]
    }
  public_routes.tf: |
    resource "aws_route_table" "public" {
      vpc_id = aws_vpc.main.id

      route {
        cidr_block = "0.0.0.0/0"
        gateway_id = aws_internet_gateway.main.id
      }
    }

    resource "aws_route_table_association" "public" {
      subnet_id      = aws_subnet.public.id
      route_table_id = aws_route_table.public.id
    }

changed:
  network.tf: |
    resource "aws_vpc" "main" {
      cidr_block = "10.0.0.0/16"
    }

    resource "aws_subnet" "private" {
      vpc_id     = aws_vpc.main.id
      cidr_block = "10.0.1.0/24"
    }

    resource "aws_route_table" "private" {
      vpc_id = aws_vpc.main.id

      route {
        cidr_block     = "0.0.0.0/0"
        nat_gateway_id = aws_nat_gateway.main.id
      }
    }

    resource "aws_route_table_association" "private" {
      subnet_id      = aws_subnet.private.id
      route_table_id = aws_route_table.private.id
    }
  nat.tf: |
    resource "aws_eip" "nat" {
      domain = "vpc"
    }

    resource "aws_nat_gateway" "main" {
      allocation_id = aws_eip.nat.id
      subnet_id     = aws_subnet.public.id
      depends_on    = [aws_internet_gateway.main]
    }
  public_routes.tf: |
    resource "aws_route_table" "public" {
      vpc_id = aws_vpc.main.id

      route {
        cidr_block = "0.0.0.0/0"
        gateway_id = aws_internet_gateway.main.id
      }
    }

    resource "aws_route_table_association" "public" {
      subnet_id      = aws_subnet.public.id
      route_table_id = aws_route_table.public.id
    }

must_include_files:
# Unchanged NAT gateway that the new route targets
- nat.tf

must_include_content_from:
  nat.tf:
    # Reviewer needs the NAT definition to verify the route target
    - resource "aws_nat_gateway" "main" {
    - allocation_id = aws_eip.nat.id

must_not_include:
# Public route table uses IGW instead of NAT -- different routing strategy
- gateway_id = aws_internet_gateway.main.id
- route_table_id = aws_route_table.public.id

must_not_include_files:
- public_routes.tf  # same resource type but public routing via IGW

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
