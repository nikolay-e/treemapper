initial:
  dynamodb.tf: |
    resource "aws_dynamodb_table" "users" {
      name         = "users"
      billing_mode = "PAY_PER_REQUEST"
      hash_key     = "id"

      attribute {
        name = "id"
        type = "S"
      }
    }
  src/users.py: |
    import boto3

    def get_user(user_id: str):
        dynamodb = boto3.resource("dynamodb")
        table = dynamodb.Table("users")
        return table.get_item(Key={"id": user_id})

  # --- Tricky garbage: sibling .tf with same aws_dynamodb_table resource type ---
  garbage_dynamo_sessions.tf: |
    GARBAGE_TF_076_SESSION_MARKER_A = "session-store"
    GARBAGE_TF_076_TTL_ATTR_MARKER_B = "expires_at"

    resource "aws_dynamodb_table" "sessions" {
      name         = "sessions"
      billing_mode = "PAY_PER_REQUEST"
      hash_key     = "session_id"

      attribute {
        name = "session_id"
        type = "S"
      }

      ttl {
        attribute_name = "expires_at"
        enabled        = true
      }
    }

  # --- Plain garbage: no overlap ---
  garbage_email.py: |
    GARBAGE_TF_076_EMAIL_MARKER_C = "smtp-sender"
    GARBAGE_TF_076_TEMPLATE_MARKER_D = "welcome"

    class EmailService:
        GARBAGE_TF_076_MAILER_MARKER_E = True

        def send(self, to: str, subject: str, body: str) -> bool:
            return True

