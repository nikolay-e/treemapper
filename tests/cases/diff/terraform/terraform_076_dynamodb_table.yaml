# === Assertions ===

must_include_files:
- dynamodb.tf

must_include_content_from:
  dynamodb.tf:
    - range_key    = "created_at"
    - name = "created_at"
    - type = "N"
    - 'resource "aws_dynamodb_table" "users"'

must_not_include:
# Tricky garbage: sibling .tf with same resource type
- GARBAGE_TF_076_SESSION_MARKER_A
- GARBAGE_TF_076_TTL_ATTR_MARKER_B
# Plain garbage
- GARBAGE_TF_076_EMAIL_MARKER_C
- GARBAGE_TF_076_TEMPLATE_MARKER_D
- GARBAGE_TF_076_MAILER_MARKER_E

must_not_include_files:
- garbage_dynamo_sessions.tf
- garbage_email.py
- src/users.py

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
