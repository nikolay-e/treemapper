# Scenario: Adding a range_key (created_at) to a DynamoDB users table for
#   time-based querying.
# Reviewer questions:
#   1. What application code queries this table? (src/users.py)
#   2. Are there GSIs that need updating? (indexes.tf)
# Traps:
#   - sessions/table.tf: another DynamoDB table for sessions (same resource type, different table)
#   - email/service.py: email service (unrelated to DynamoDB schema changes)

initial:
  dynamodb.tf: |
    resource "aws_dynamodb_table" "users" {
      name         = "users"
      billing_mode = "PAY_PER_REQUEST"
      hash_key     = "id"

      attribute {
        name = "id"
        type = "S"
      }
    }
  src/users.py: |
    import boto3

    def get_user(user_id: str):
        dynamodb = boto3.resource("dynamodb")
        table = dynamodb.Table("users")
        return table.get_item(Key={"id": user_id})
  indexes.tf: |
    resource "aws_dynamodb_table" "users" {
      global_secondary_index {
        name            = "email-index"
        hash_key        = "email"
        projection_type = "ALL"
      }
    }
  sessions/table.tf: |
    resource "aws_dynamodb_table" "sessions" {
      name         = "sessions"
      billing_mode = "PAY_PER_REQUEST"
      hash_key     = "session_id"

      attribute {
        name = "session_id"
        type = "S"
      }

      ttl {
        attribute_name = "expires_at"
        enabled        = true
      }
    }
  email/service.py: |
    class EmailService:
        def send(self, to: str, subject: str, body: str) -> bool:
            return True

changed:
  dynamodb.tf: |
    resource "aws_dynamodb_table" "users" {
      name         = "users"
      billing_mode = "PAY_PER_REQUEST"
      hash_key     = "id"
      range_key    = "created_at"

      attribute {
        name = "id"
        type = "S"
      }

      attribute {
        name = "created_at"
        type = "N"
      }
    }

must_include_files:
  - dynamodb.tf
  - src/users.py

must_include_content_from:
  dynamodb.tf:
    - range_key    = "created_at"
    - name = "created_at"
    - type = "N"
  src/users.py:
    - table.get_item

must_not_include:
  # Sessions table - same resource type but a different table with different schema
  - session_id
  - expires_at
  # Email service - application code unrelated to database schema
  - class EmailService

must_not_include_files:
  - sessions/table.tf
  - email/service.py

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
