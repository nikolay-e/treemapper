name: terraform_009_iam_role
repo:
  initial_files:
    iam.tf: |
      # IAM resources placeholder
    outputs.tf: |
      # Outputs placeholder
    ecs_iam.tf: |
      data "aws_iam_policy_document" "ecs_assume_role" {
        statement {
          effect  = "Allow"
          actions = ["sts:AssumeRole"]

          principals {
            type        = "Service"
            identifiers = ["ecs-tasks.amazonaws.com"]
          }
        }
      }

      resource "aws_iam_role" "ecs_task" {
        name               = "${var.environment}-ecs-task-role"
        assume_role_policy = data.aws_iam_policy_document.ecs_assume_role.json
      }

      resource "aws_iam_role_policy" "ecs_task_execution" {
        name   = "${var.environment}-ecs-task-execution-policy"
        role   = aws_iam_role.ecs_task.id
        policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Effect   = "Allow"
            Action   = ["ecr:GetAuthorizationToken", "ecr:BatchGetImage"]
            Resource = "*"
          }]
        })
      }
    deprecated/old_roles.tf: |
      resource "aws_iam_role" "legacy_admin" {
        name = "legacy-admin-role"
        assume_role_policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Effect    = "Allow"
            Principal = { Service = "ec2.amazonaws.com" }
            Action    = "sts:AssumeRole"
          }]
        })
      }
  changed_files:
    iam.tf: |
      data "aws_iam_policy_document" "lambda_assume_role" {
        statement {
          effect  = "Allow"
          actions = ["sts:AssumeRole"]

          principals {
            type        = "Service"
            identifiers = ["lambda.amazonaws.com"]
          }
        }
      }

      data "aws_iam_policy_document" "lambda_execution" {
        statement {
          sid     = "CloudWatchLogs"
          effect  = "Allow"
          actions = ["logs:CreateLogGroup", "logs:CreateLogStream", "logs:PutLogEvents"]
          resources = ["arn:aws:logs:*:*:*"]
        }

        statement {
          sid     = "S3ReadAccess"
          effect  = "Allow"
          actions = ["s3:GetObject", "s3:ListBucket"]
          resources = [var.data_bucket_arn, "${var.data_bucket_arn}/*"]
        }

        statement {
          sid     = "DynamoDBAccess"
          effect  = "Allow"
          actions = ["dynamodb:GetItem", "dynamodb:PutItem", "dynamodb:Query"]
          resources = [var.dynamodb_table_arn]
        }

        statement {
          sid     = "KMSDecrypt"
          effect  = "Allow"
          actions = ["kms:Decrypt", "kms:GenerateDataKey"]
          resources = [var.kms_key_arn]
        }
      }

      resource "aws_iam_role" "lambda_exec" {
        name               = "${var.environment}-lambda-role"
        assume_role_policy = data.aws_iam_policy_document.lambda_assume_role.json
      }

      resource "aws_iam_role_policy" "lambda_execution" {
        name   = "${var.environment}-lambda-policy"
        role   = aws_iam_role.lambda_exec.id
        policy = data.aws_iam_policy_document.lambda_execution.json
      }

      resource "aws_iam_role_policy_attachment" "lambda_xray" {
        role       = aws_iam_role.lambda_exec.name
        policy_arn = "arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess"
      }
    outputs.tf: |
      output "lambda_role_arn" {
        value = aws_iam_role.lambda_exec.arn
      }

      output "lambda_role_name" {
        value = aws_iam_role.lambda_exec.name
      }
    ecs_iam.tf: |
      data "aws_iam_policy_document" "ecs_assume_role" {
        statement {
          effect  = "Allow"
          actions = ["sts:AssumeRole"]

          principals {
            type        = "Service"
            identifiers = ["ecs-tasks.amazonaws.com"]
          }
        }
      }

      resource "aws_iam_role" "ecs_task" {
        name               = "${var.environment}-ecs-task-role"
        assume_role_policy = data.aws_iam_policy_document.ecs_assume_role.json
      }

      resource "aws_iam_role_policy" "ecs_task_execution" {
        name   = "${var.environment}-ecs-task-execution-policy"
        role   = aws_iam_role.ecs_task.id
        policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Effect   = "Allow"
            Action   = ["ecr:GetAuthorizationToken", "ecr:BatchGetImage"]
            Resource = "*"
          }]
        })
      }
    deprecated/old_roles.tf: |
      resource "aws_iam_role" "legacy_admin" {
        name = "legacy-admin-role"
        assume_role_policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Effect    = "Allow"
            Principal = { Service = "ec2.amazonaws.com" }
            Action    = "sts:AssumeRole"
          }]
        })
      }
  commit_message: Update files
fragments:
- id: iam
  selector:
    path: iam.tf
    anchor: resource "aws_iam_role" "lambda_exec" {
- id: iam_1
  selector:
    path: iam.tf
    anchor: resource "aws_iam_role_policy" "lambda_execution" {
- id: outputs
  selector:
    path: outputs.tf
    anchor: output "lambda_role_arn" {
- id: no_ecs_iam
  selector:
    path: ecs_iam.tf
- id: no_old_roles
  selector:
    path: deprecated/old_roles.tf
- id: no_global_0
  selector:
    anchor: ecs-tasks.amazonaws.com
- id: no_global_1
  selector:
    anchor: ecs_task_execution
- id: no_global_2
  selector:
    anchor: ecr:GetAuthorizationToken
- id: no_global_3
  selector:
    anchor: legacy-admin-role
oracle:
  required:
  - iam
  - iam_1
  - outputs
  allowed: []
  forbidden:
  - no_ecs_iam
  - no_old_roles
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
