initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami = "ami-12345"
    }

  # --- Tricky garbage: sibling .tf with terraform block and version constraints ---
  garbage_tf_047_version_override.tf: |
    GARBAGE_TF_047_VERSION_OVERRIDE_A = "override"
    GARBAGE_TF_047_COMPAT_CHECK_B = true

    terraform {
      required_version = ">= 1.0.0"

      required_providers {
        google = {
          source  = "hashicorp/google"
          version = "~> 4.0"
        }
      }
    }

  # --- Plain garbage ---
  garbage_tf_047_outputs.tf: |
    GARBAGE_TF_047_OUTPUT_MARKER_C = "outputs"
    GARBAGE_TF_047_EXPORT_FLAG_D = false

    output "instance_id" {
      value = "i-placeholder"
    }

changed:
  main.tf: |
    resource "aws_instance" "web" {
      ami = "ami-12345"
    }

  versions.tf: |
    terraform {
      required_version = ">= 1.5.0, < 2.0.0"

      required_providers {
        aws = {
          source  = "hashicorp/aws"
          version = "~> 5.0"
        }
      }
    }

  garbage_tf_047_version_override.tf: |
    GARBAGE_TF_047_VERSION_OVERRIDE_A = "override"
    GARBAGE_TF_047_COMPAT_CHECK_B = true

    terraform {
      required_version = ">= 1.0.0"

      required_providers {
        google = {
          source  = "hashicorp/google"
          version = "~> 4.0"
        }
      }
    }

  garbage_tf_047_outputs.tf: |
    GARBAGE_TF_047_OUTPUT_MARKER_C = "outputs"
    GARBAGE_TF_047_EXPORT_FLAG_D = false

    output "instance_id" {
      value = "i-placeholder"
    }

must_include_files:
- versions.tf

must_include_content_from:
  versions.tf:
    - required_version = ">= 1.5.0, < 2.0.0"
    - source  = "hashicorp/aws"
    - version = "~> 5.0"

must_not_include:
- GARBAGE_TF_047_VERSION_OVERRIDE_A
- GARBAGE_TF_047_COMPAT_CHECK_B
- GARBAGE_TF_047_OUTPUT_MARKER_C
- GARBAGE_TF_047_EXPORT_FLAG_D

must_not_include_files:
- garbage_tf_047_version_override.tf
- garbage_tf_047_outputs.tf
- main.tf

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
