# Scenario: Adding a versions.tf file to pin terraform and AWS provider versions.
# Reviewer questions:
#   1. What resources exist that depend on the AWS provider? (main.tf)
#   2. Are there any provider-specific features used that need version >= 5.0? (main.tf)
# Traps:
#   - modules/gcp/versions.tf: GCP provider version constraints (same block pattern, different cloud)
#   - outputs.tf: unrelated outputs file (no provider dependency)

initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = "ami-12345"
      instance_type = "t3.micro"

      tags = {
        Name = "web-server"
      }
    }

    resource "aws_s3_bucket" "data" {
      bucket = "app-data-bucket"
    }
  modules/gcp/versions.tf: |
    terraform {
      required_version = ">= 1.0.0"

      required_providers {
        google = {
          source  = "hashicorp/google"
          version = "~> 4.0"
        }
      }
    }
  outputs.tf: |
    output "instance_id" {
      value = aws_instance.web.id
    }

    output "bucket_name" {
      value = aws_s3_bucket.data.bucket
    }

changed:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = "ami-12345"
      instance_type = "t3.micro"

      tags = {
        Name = "web-server"
      }
    }

    resource "aws_s3_bucket" "data" {
      bucket = "app-data-bucket"
    }
  versions.tf: |
    terraform {
      required_version = ">= 1.5.0, < 2.0.0"

      required_providers {
        aws = {
          source  = "hashicorp/aws"
          version = "~> 5.0"
        }
      }
    }

must_include_files:
  - versions.tf
  - main.tf

must_include_content_from:
  versions.tf:
    - required_version = ">= 1.5.0, < 2.0.0"
    - source  = "hashicorp/aws"
    - version = "~> 5.0"
  main.tf:
    - resource "aws_instance" "web" {

must_not_include:
  # GCP versions - same terraform block structure but for a different cloud provider
  - hashicorp/google
  # Outputs - references resources but doesn't affect version requirements
  - output "bucket_name" {

must_not_include_files:
  - modules/gcp/versions.tf
  - outputs.tf

max_fragments: 5
max_files: 2
add_garbage_files: false
skip_garbage_check: true
