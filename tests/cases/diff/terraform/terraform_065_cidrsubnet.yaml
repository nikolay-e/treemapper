# === Assertions ===

must_include_files:
- networking.tf

must_include_content_from:
  networking.tf:
    - 'resource "aws_subnet" "public_b"'
    - cidrsubnet(var.vpc_cidr, 8, 2)
    - 'resource "aws_subnet" "private_b"'
    - cidrsubnet(var.vpc_cidr, 8, 11)

must_not_include:
# Tricky garbage markers (sibling aws_subnet resource)
- GARBAGE_TF_065_DBSUB_MARKER_A
- GARBAGE_TF_065_DBSUB_MARKER_B
# Plain garbage markers
- GARBAGE_TF_065_WAF_MARKER_C
- GARBAGE_TF_065_WAF_MARKER_D

must_not_include_files:
- garbage_db_subnets.tf
- garbage_waf.tf

max_fragments: 4
max_files: 1
add_garbage_files: false
skip_garbage_check: true
