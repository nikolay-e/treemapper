# Scenario: Adding a second AZ worth of public and private subnets using
#   cidrsubnet() for automatic CIDR calculation.
# Reviewer questions:
#   1. What VPC CIDR are these subnets carved from? (networking.tf has the vpc_cidr variable)
#   2. What route tables will these new subnets use? (routes.tf)
# Traps:
#   - database/subnets.tf: database-tier subnets also using cidrsubnet (same function, different tier)
#   - waf/rules.tf: WAF rules (unrelated to subnet layout)

max_enrichment: 8.0
initial:
  networking.tf: |
    variable "vpc_cidr" {
      default = "10.0.0.0/16"
    }

    resource "aws_subnet" "public_a" {
      vpc_id            = aws_vpc.main.id
      cidr_block        = cidrsubnet(var.vpc_cidr, 8, 1)
      availability_zone = "us-east-1a"
    }

    resource "aws_subnet" "private_a" {
      vpc_id            = aws_vpc.main.id
      cidr_block        = cidrsubnet(var.vpc_cidr, 8, 10)
      availability_zone = "us-east-1a"
    }
  routes.tf: |
    resource "aws_route_table" "public" {
      vpc_id = aws_vpc.main.id

      route {
        cidr_block = "0.0.0.0/0"
        gateway_id = aws_internet_gateway.main.id
      }
    }

    resource "aws_route_table_association" "public_a" {
      subnet_id      = aws_subnet.public_a.id
      route_table_id = aws_route_table.public.id
    }
  database/subnets.tf: |
    resource "aws_subnet" "db_a" {
      vpc_id            = aws_vpc.main.id
      cidr_block        = cidrsubnet(var.vpc_cidr, 8, 100)
      availability_zone = "us-east-1a"
    }

    resource "aws_subnet" "db_b" {
      vpc_id            = aws_vpc.main.id
      cidr_block        = cidrsubnet(var.vpc_cidr, 8, 101)
      availability_zone = "us-east-1b"
    }
  waf/rules.tf: |
    resource "aws_wafv2_web_acl" "main" {
      name  = "app-waf"
      scope = "REGIONAL"
      default_action {
        allow {}
      }
      visibility_config {
        metric_name                = "app-waf"
        sampled_requests_enabled   = true
        cloudwatch_metrics_enabled = true
      }
    }

changed:
  networking.tf: |
    variable "vpc_cidr" {
      default = "10.0.0.0/16"
    }

    resource "aws_subnet" "public_a" {
      vpc_id            = aws_vpc.main.id
      cidr_block        = cidrsubnet(var.vpc_cidr, 8, 1)
      availability_zone = "us-east-1a"
    }

    resource "aws_subnet" "public_b" {
      vpc_id            = aws_vpc.main.id
      cidr_block        = cidrsubnet(var.vpc_cidr, 8, 2)
      availability_zone = "us-east-1b"
    }

    resource "aws_subnet" "private_a" {
      vpc_id            = aws_vpc.main.id
      cidr_block        = cidrsubnet(var.vpc_cidr, 8, 10)
      availability_zone = "us-east-1a"
    }

    resource "aws_subnet" "private_b" {
      vpc_id            = aws_vpc.main.id
      cidr_block        = cidrsubnet(var.vpc_cidr, 8, 11)
      availability_zone = "us-east-1b"
    }

must_include_files:
  - networking.tf
  - routes.tf

must_include_content_from:
  networking.tf:
    - 'resource "aws_subnet" "public_b"'
    - cidrsubnet(var.vpc_cidr, 8, 2)
    - 'resource "aws_subnet" "private_b"'
    - cidrsubnet(var.vpc_cidr, 8, 11)
  routes.tf:
    - resource "aws_route_table" "public" {

must_not_include:
  # Database subnets - also use cidrsubnet but for database tier (different CIDR offsets)
  - aws_subnet" "db_a"
  - cidrsubnet(var.vpc_cidr, 8, 100)
  # WAF rules - security layer unrelated to subnet layout
  - aws_wafv2_web_acl

must_not_include_files:
  - database/subnets.tf
  - waf/rules.tf

max_fragments: 5
max_files: 2
add_garbage_files: false
skip_garbage_check: true
