# Scenario: Adding count-based instance scaling with a variable and
#   index-based naming tags.
# Reviewer questions:
#   1. What other resources reference the web instance? (outputs.tf exposes instance IDs)
#   2. How are instances tagged to distinguish replicas? (count.index in Name tag)
# Traps:
#   - database/replicas.tf: uses count for RDS read replicas (same meta-argument, different resource)
#   - scaling_policy.tf: ASG scaling policies (different scaling approach entirely)

initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = var.ami_id
      instance_type = "t3.micro"
    }
  outputs.tf: |
    output "instance_ids" {
      value = aws_instance.web[*].id
    }

    output "instance_public_ips" {
      value = aws_instance.web[*].public_ip
    }
  database/replicas.tf: |
    variable "replica_count" {
      default = 2
    }

    resource "aws_db_instance" "replica" {
      count               = var.replica_count
      replicate_source_db = aws_db_instance.primary.id
      instance_class      = "db.t3.medium"

      tags = {
        Name = "replica-${count.index}"
      }
    }
  scaling_policy.tf: |
    resource "aws_autoscaling_policy" "scale_up" {
      name                   = "scale-up"
      autoscaling_group_name = aws_autoscaling_group.web.name
      adjustment_type        = "ChangeInCapacity"
      scaling_adjustment     = 1
      cooldown               = 300
    }

    resource "aws_autoscaling_policy" "scale_down" {
      name                   = "scale-down"
      autoscaling_group_name = aws_autoscaling_group.web.name
      adjustment_type        = "ChangeInCapacity"
      scaling_adjustment     = -1
      cooldown               = 300
    }

changed:
  main.tf: |
    variable "instance_count" {
      default = 3
    }

    resource "aws_instance" "web" {
      count         = var.instance_count
      ami           = var.ami_id
      instance_type = "t3.micro"

      tags = {
        Name = "web-${count.index}"
      }
    }

# outputs.tf is unchanged but the reviewer needs it to see that the
# splat expression [*] already anticipates multiple instances
must_include_files:
  - outputs.tf

must_include_content_from:
  outputs.tf:
    - aws_instance.web[*].id
    - output "instance_public_ips" {

must_not_include:
  # Database replicas use count but for RDS, different resource type
  - replica_count
  - replicate_source_db
  - db.t3.medium
  # ASG scaling policies are a different approach to scaling
  - aws_autoscaling_policy
  - ChangeInCapacity

must_not_include_files:
  - database/replicas.tf
  - scaling_policy.tf

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
