must_include_files:
- main.tf

must_include_content_from:
  main.tf:
    - create_before_destroy = true
    - prevent_destroy       = true
    - ignore_changes        = [tags]

must_not_include:
- GARBAGE_TF_038_RDS_LIFECYCLE_A
- GARBAGE_TF_038_B
- GARBAGE_TF_038_S3_BUCKETS_C
- GARBAGE_TF_038_S3_D

must_not_include_files:
- database/rds_lifecycle_GARBAGE_TF_038_A.tf
- storage/s3_buckets_GARBAGE_TF_038_C.tf

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
