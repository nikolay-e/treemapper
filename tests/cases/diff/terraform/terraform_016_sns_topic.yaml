# Scenario: Add an SNS alerts topic with email subscription
#
# Reviewer questions:
#   Q1: "What CloudWatch alarms publish to this topic?"
#       -> alarms.tf references aws_sns_topic.alerts.arn as alarm_actions.
#   Q2: "Does the topic have a proper access policy?"
#       -> The diff creates a basic topic. No explicit policy in diff.
#   Q3: "Are there Lambda subscribers that process alerts?"
#       -> alert_handler.tf (UNCHANGED) defines a Lambda function subscribed
#         to the alerts topic via SNS subscription. Shows processing pipeline.
#
# Not needed:
#   - ops_notifications.tf: Same SNS type but for Slack notifications.
#     HARD TRAP: identical resource type (aws_sns_topic), same subscription
#     pattern (aws_sns_topic_subscription). But ops/Slack channel,
#     different audience.
#
#   - billing_alerts.tf: Another SNS topic for billing. Same type, same
#     subscription pattern. But AWS billing domain.
#
#   - messaging/sqs.tf: SQS queue for processing. Different AWS messaging
#     service entirely.
#
#   - chatops/slack.tf: Slack integration that also receives alerts. Uses
#     SNS but routes to Slack via Lambda. HARD TRAP: same SNS domain.
#     But Slack integration is a different delivery channel.

max_enrichment: 13.6
initial:
  monitoring.tf: |
    # SNS resources
  alarms.tf: |
    resource "aws_cloudwatch_metric_alarm" "cpu_high" {
      alarm_name          = "cpu-high"
      comparison_operator = "GreaterThanThreshold"
      evaluation_periods  = 2
      metric_name         = "CPUUtilization"
      namespace           = "AWS/EC2"
      period              = 300
      statistic           = "Average"
      threshold           = 80

      alarm_actions = [aws_sns_topic.alerts.arn]
    }

    resource "aws_cloudwatch_metric_alarm" "memory_high" {
      alarm_name          = "memory-high"
      comparison_operator = "GreaterThanThreshold"
      evaluation_periods  = 3
      metric_name         = "MemoryUtilization"
      namespace           = "CWAgent"
      period              = 300
      statistic           = "Average"
      threshold           = 90

      alarm_actions = [aws_sns_topic.alerts.arn]
    }
  alert_handler.tf: |
    resource "aws_lambda_function" "alert_handler" {
      function_name = "alert-processor"
      runtime       = "python3.11"
      handler       = "handler.process_alert"
      role          = aws_iam_role.alert_handler.arn
      filename      = "alert_handler.zip"

      environment {
        variables = {
          PAGERDUTY_KEY  = var.pagerduty_integration_key
          SLACK_WEBHOOK  = var.slack_alert_webhook
        }
      }
    }

    resource "aws_sns_topic_subscription" "alert_handler" {
      topic_arn = aws_sns_topic.alerts.arn
      protocol  = "lambda"
      endpoint  = aws_lambda_function.alert_handler.arn
    }

    resource "aws_lambda_permission" "sns_invoke" {
      statement_id  = "AllowSNSInvoke"
      action        = "lambda:InvokeFunction"
      function_name = aws_lambda_function.alert_handler.function_name
      principal     = "sns.amazonaws.com"
      source_arn    = aws_sns_topic.alerts.arn
    }
  ops_notifications.tf: |
    resource "aws_sns_topic" "ops" {
      name = "ops-notifications"
    }

    resource "aws_sns_topic_subscription" "ops_slack" {
      topic_arn = aws_sns_topic.ops.arn
      protocol  = "https"
      endpoint  = "https://hooks.slack.com/services/T00/B00/XXXX"
    }

    resource "aws_sns_topic_subscription" "ops_email" {
      topic_arn = aws_sns_topic.ops.arn
      protocol  = "email"
      endpoint  = "ops-team@example.com"
    }
  billing_alerts.tf: |
    resource "aws_sns_topic" "billing" {
      name = "billing-alerts"
    }

    resource "aws_sns_topic_subscription" "billing_email" {
      topic_arn = aws_sns_topic.billing.arn
      protocol  = "email"
      endpoint  = "finance@example.com"
    }
  messaging/sqs.tf: |
    resource "aws_sqs_queue" "processing" {
      name                      = "processing-queue"
      delay_seconds             = 0
      max_message_size          = 262144
      message_retention_seconds = 345600
    }
  chatops/slack.tf: |
    resource "aws_lambda_function" "slack_notifier" {
      function_name = "slack-notifier"
      runtime       = "nodejs18.x"
      handler       = "index.handler"
      role          = aws_iam_role.slack_notifier.arn
      filename      = "slack_notifier.zip"

      environment {
        variables = {
          SLACK_CHANNEL = "#ops-alerts"
          SLACK_TOKEN   = var.slack_bot_token
        }
      }
    }

changed:
  monitoring.tf: |
    resource "aws_sns_topic" "alerts" {
      name = "alerts-topic"
    }

    resource "aws_sns_topic_subscription" "email" {
      topic_arn = aws_sns_topic.alerts.arn
      protocol  = "email"
      endpoint  = var.alert_email
    }

must_include_files:
  # Q1: CloudWatch alarms that publish to the new topic
  - alarms.tf
  # Q3: Lambda handler subscribed to the alerts topic
  - alert_handler.tf

must_include_content_from:
  alarms.tf:
    - alarm_actions = [aws_sns_topic.alerts.arn]
    - metric_name         = "CPUUtilization"
    - alarm_name          = "memory-high"
  alert_handler.tf:
    - topic_arn = aws_sns_topic.alerts.arn
    - 'protocol  = "lambda"'

must_not_include:
  # --- ops_notifications.tf: same SNS type but for Slack/ops ---
  - ops-notifications
  - hooks.slack.com
  - ops-team@example.com
  # --- billing_alerts.tf: another SNS topic for billing ---
  - billing-alerts
  - finance@example.com
  # --- sqs.tf: different messaging service ---
  - aws_sqs_queue
  - processing-queue
  # --- chatops/slack.tf: Slack integration, different channel ---
  - slack-notifier
  - "#ops-alerts"
  - slack_bot_token

must_not_include_files:
  - ops_notifications.tf
  - billing_alerts.tf
  - messaging/sqs.tf
  - chatops/slack.tf

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
