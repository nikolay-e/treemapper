# Scenario: Renaming API Gateway and updating the resource path from "users" to "v2/users".
# Reviewer questions:
#   1. What Lambda handles requests to this resource? (lambda.tf)
#   2. What method integration connects the resource to the handler? (methods.tf)
# Traps:
#   - admin/api.tf: another API Gateway for admin (same resource types, different API)
#   - src/handlers/users.py: handler code (unchanged, but sibling file name matches path_part)

initial:
  api.tf: |
    resource "aws_api_gateway_rest_api" "main" {
      name = "my-api"
    }

    resource "aws_api_gateway_resource" "users" {
      rest_api_id = aws_api_gateway_rest_api.main.id
      parent_id   = aws_api_gateway_rest_api.main.root_resource_id
      path_part   = "users"
    }
  lambda.tf: |
    resource "aws_lambda_function" "users_handler" {
      function_name = "users-api-handler"
      runtime       = "python3.11"
      handler       = "handlers.users.get_users"
      role          = aws_iam_role.lambda.arn
      filename      = "lambda.zip"
    }
  methods.tf: |
    resource "aws_api_gateway_method" "users_get" {
      rest_api_id   = aws_api_gateway_rest_api.main.id
      resource_id   = aws_api_gateway_resource.users.id
      http_method   = "GET"
      authorization = "NONE"
    }

    resource "aws_api_gateway_integration" "users_get" {
      rest_api_id             = aws_api_gateway_rest_api.main.id
      resource_id             = aws_api_gateway_resource.users.id
      http_method             = aws_api_gateway_method.users_get.http_method
      integration_http_method = "POST"
      type                    = "AWS_PROXY"
      uri                     = aws_lambda_function.users_handler.invoke_arn
    }
  src/handlers/users.py: |
    def get_users(event, context):
        return {"statusCode": 200, "body": "[]"}
  admin/api.tf: |
    resource "aws_api_gateway_rest_api" "admin" {
      name = "admin-api"
    }

    resource "aws_api_gateway_resource" "admin_users" {
      rest_api_id = aws_api_gateway_rest_api.admin.id
      parent_id   = aws_api_gateway_rest_api.admin.root_resource_id
      path_part   = "admin-users"
    }

changed:
  api.tf: |
    resource "aws_api_gateway_rest_api" "main" {
      name = "my-api-v2"
    }

    resource "aws_api_gateway_resource" "users" {
      rest_api_id = aws_api_gateway_rest_api.main.id
      parent_id   = aws_api_gateway_rest_api.main.root_resource_id
      path_part   = "v2/users"
    }

must_include_files:
  - api.tf
  - methods.tf
  - lambda.tf

must_include_content_from:
  api.tf:
    - name = "my-api-v2"
    - path_part   = "v2/users"
  methods.tf:
    - resource "aws_api_gateway_method" "users_get" {
    - aws_api_gateway_resource.users.id
  lambda.tf:
    - resource "aws_lambda_function" "users_handler" {

must_not_include:
  # Admin API - same resource types but for a different API, not the one being renamed
  - admin-api
  - admin-users

must_not_include_files:
  - admin/api.tf

max_fragments: 6
max_files: 4
add_garbage_files: false
skip_garbage_check: true
