# Scenario: Add private subnets referencing existing VPC
#
# Reviewer questions:
#   1. What VPC CIDR do the subnets carve from? (variables.tf defines vpc_cidr)
#   2. Are there other subnets that might have CIDR overlap? (db_network.tf)
#
# The diff adds aws_subnet "private" to network.tf using cidrsubnet from
# the VPC CIDR. variables.tf (unchanged) defines the vpc_cidr variable that
# controls the address space.
#
# Traps: db_network.tf has same aws_subnet type but for the database tier.

initial:
  network.tf: |
    resource "aws_vpc" "main" {
      cidr_block = var.vpc_cidr
    }
  variables.tf: |
    variable "vpc_cidr" {
      type    = string
      default = "10.0.0.0/16"
    }

    variable "environment" {
      type    = string
      default = "dev"
    }
  db_network.tf: |
    resource "aws_subnet" "database" {
      count             = 2
      vpc_id            = aws_vpc.main.id
      cidr_block        = cidrsubnet("10.0.200.0/24", 2, count.index)
      availability_zone = data.aws_availability_zones.available.names[count.index]

      tags = {
        Name = "database-subnet-${count.index}"
        Tier = "database"
      }
    }

changed:
  network.tf: |
    resource "aws_vpc" "main" {
      cidr_block = var.vpc_cidr
    }

    resource "aws_subnet" "private" {
      count             = 2
      vpc_id            = aws_vpc.main.id
      cidr_block        = cidrsubnet(aws_vpc.main.cidr_block, 8, count.index)
      availability_zone = data.aws_availability_zones.available.names[count.index]

      tags = {
        Name = "private-subnet-${count.index}"
      }
    }
  variables.tf: |
    variable "vpc_cidr" {
      type    = string
      default = "10.0.0.0/16"
    }

    variable "environment" {
      type    = string
      default = "dev"
    }
  db_network.tf: |
    resource "aws_subnet" "database" {
      count             = 2
      vpc_id            = aws_vpc.main.id
      cidr_block        = cidrsubnet("10.0.200.0/24", 2, count.index)
      availability_zone = data.aws_availability_zones.available.names[count.index]

      tags = {
        Name = "database-subnet-${count.index}"
        Tier = "database"
      }
    }

must_include_files:
# Unchanged variables file that defines the VPC CIDR used by cidrsubnet
- variables.tf

must_include_content_from:
  variables.tf:
    # Reviewer needs the VPC CIDR default to understand the address space
    - variable "vpc_cidr" {
    - default = "10.0.0.0/16"

must_not_include:
# Database subnets are same type but different tier, not affected
- database-subnet
- Tier = "database"

must_not_include_files:
- db_network.tf  # same resource type, different tier (database)

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
