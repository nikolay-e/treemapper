# Scenario: Adding a remote-exec provisioner to install Docker on an EC2
#   instance, using SSH connection with a variable-controlled private key.
# Reviewer questions:
#   1. What SSH key path variable controls the connection? (variables.tf)
#   2. What security group allows SSH access for provisioning? (security.tf)
# Traps:
#   - bastion/setup.tf: also has a remote-exec provisioner but for bastion host
#   - networking/nacl.tf: network ACL shares VPC reference but unrelated to provisioning

max_enrichment: 7.6
initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami                    = var.ami_id
      instance_type          = "t3.micro"
      key_name               = var.ssh_key_name
      vpc_security_group_ids = [aws_security_group.web.id]
    }
  variables.tf: |
    variable "ami_id" {
      type = string
    }

    variable "ssh_key_name" {
      type    = string
      default = "deploy-key"
    }

    variable "private_key_path" {
      type    = string
      default = "~/.ssh/deploy-key.pem"
    }
  security.tf: |
    resource "aws_security_group" "web" {
      name   = "web-sg"
      vpc_id = aws_vpc.main.id

      ingress {
        from_port   = 22
        to_port     = 22
        protocol    = "tcp"
        cidr_blocks = [var.admin_cidr]
      }

      ingress {
        from_port   = 80
        to_port     = 80
        protocol    = "tcp"
        cidr_blocks = ["0.0.0.0/0"]
      }
    }
  bastion/setup.tf: |
    resource "aws_instance" "bastion" {
      ami           = var.bastion_ami
      instance_type = "t3.nano"

      provisioner "remote-exec" {
        inline = [
          "sudo yum install -y fail2ban",
          "sudo systemctl enable fail2ban"
        ]

        connection {
          type        = "ssh"
          user        = "ec2-user"
          private_key = file(var.bastion_key_path)
          host        = self.public_ip
        }
      }
    }
  networking/nacl.tf: |
    resource "aws_network_acl" "private" {
      vpc_id = aws_vpc.main.id

      ingress {
        protocol   = "tcp"
        rule_no    = 100
        action     = "allow"
        cidr_block = "10.0.0.0/8"
        from_port  = 443
        to_port    = 443
      }

      tags = {
        Name = "private-nacl"
      }
    }

changed:
  main.tf: |
    resource "aws_instance" "web" {
      ami                    = var.ami_id
      instance_type          = "t3.micro"
      key_name               = var.ssh_key_name
      vpc_security_group_ids = [aws_security_group.web.id]

      provisioner "remote-exec" {
        inline = [
          "sudo yum update -y",
          "sudo yum install -y docker",
          "sudo systemctl start docker"
        ]

        connection {
          type        = "ssh"
          user        = "ec2-user"
          private_key = file(var.private_key_path)
          host        = self.public_ip
        }
      }
    }

# variables.tf is unchanged but reviewer needs to see private_key_path
# variable definition referenced in the provisioner connection block.
# security.tf is unchanged but reviewer needs to confirm SSH port 22
# is open for the provisioner to connect.
must_include_files:
  - variables.tf
  - security.tf

must_include_content_from:
  variables.tf:
    - variable "private_key_path" {
    - deploy-key.pem
  security.tf:
    - from_port   = 22
    - resource "aws_security_group" "web" {

must_not_include:
  # Bastion provisioner - same pattern (remote-exec) but different host/concern
  - bastion_key_path
  - fail2ban
  # Network ACL - shares VPC but unrelated to instance provisioning
  - private-nacl

must_not_include_files:
  - bastion/setup.tf
  - networking/nacl.tf

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
