must_include_files:
- infrastructure/storage.tf

must_include_content_from:
  infrastructure/storage.tf:
    - versioning_enabled = true
    - kms_key_id         = aws_kms_key.data.arn
    - id      = "archive-old-data"
    - storage_class = "STANDARD_IA"
    - storage_class = "GLACIER"
    - expiration_days = 365
    - id      = "cleanup-temp"
    - expiration_days = 7
    - 'bucket_name        = "myapp-logs-${var.environment}"'
    - id              = "expire-old-logs"

must_not_include:
  # backup_storage.tf: sibling S3 module call for backups — different bucket,
  # different retention policy (730d), different KMS key
  - archive-backups
  - DEEP_ARCHIVE
  - cleanup-temp-backups
  # kms_keys.tf: key definitions — reviewer doesn't need KMS config details
  # to understand the S3 lifecycle and versioning changes
  - alias/shared-encryption
  - alias/myapp-backup

must_not_include_files:
- infrastructure/backup_storage.tf
- infrastructure/kms_keys.tf

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
