# Scenario: S3 module caller adds lifecycle rules, versioning, KMS encryption,
# and a second logs_bucket. The module definition (modules/s3) is unchanged.
#
# Reviewer questions:
#   Q1: "What lifecycle transitions and expiration policies are being configured?"
#       -> infrastructure/storage.tf: archive-old-data transitions to STANDARD_IA
#          at 30d, GLACIER at 90d, expires at 365d; cleanup-temp expires at 7d
#   Q2: "What S3 module variables control versioning and encryption?"
#       -> modules/s3/variables.tf: versioning_enabled (bool), sse_algorithm,
#          kms_key_id — reviewer confirms the module supports the new config
#   Q3: "Is a logs bucket also being created, and how does it differ?"
#       -> infrastructure/storage.tf: logs_bucket with versioning disabled,
#          single expire-old-logs rule at 30d
#
# Not needed:
#   - infrastructure/backup_storage.tf: sibling module call to same S3 module,
#     but for backup bucket — different retention, different KMS key
#   - infrastructure/kms_keys.tf: KMS key definitions — reviewer doesn't need
#     to verify key config to understand the S3 lifecycle/versioning changes

max_enrichment: 8.3
initial:
  modules/s3/main.tf: |
    resource "aws_s3_bucket" "this" {
      bucket = var.bucket_name
      tags   = var.tags
    }

    resource "aws_s3_bucket_versioning" "this" {
      bucket = aws_s3_bucket.this.id
      versioning_configuration {
        status = var.versioning_enabled ? "Enabled" : "Disabled"
      }
    }

    resource "aws_s3_bucket_server_side_encryption_configuration" "this" {
      bucket = aws_s3_bucket.this.id

      rule {
        apply_server_side_encryption_by_default {
          sse_algorithm     = var.sse_algorithm
          kms_master_key_id = var.kms_key_id
        }
        bucket_key_enabled = var.bucket_key_enabled
      }
    }

    resource "aws_s3_bucket_public_access_block" "this" {
      bucket = aws_s3_bucket.this.id

      block_public_acls       = var.block_public_acls
      block_public_policy     = var.block_public_policy
      ignore_public_acls      = var.ignore_public_acls
      restrict_public_buckets = var.restrict_public_buckets
    }

    resource "aws_s3_bucket_lifecycle_configuration" "this" {
      count  = length(var.lifecycle_rules) > 0 ? 1 : 0
      bucket = aws_s3_bucket.this.id

      dynamic "rule" {
        for_each = var.lifecycle_rules
        content {
          id     = rule.value.id
          status = rule.value.enabled ? "Enabled" : "Disabled"

          filter {
            prefix = rule.value.prefix
          }

          dynamic "transition" {
            for_each = rule.value.transitions
            content {
              days          = transition.value.days
              storage_class = transition.value.storage_class
            }
          }

          dynamic "expiration" {
            for_each = rule.value.expiration_days != null ? [1] : []
            content {
              days = rule.value.expiration_days
            }
          }
        }
      }
    }
  modules/s3/variables.tf: |
    variable "bucket_name" {
      type = string
    }

    variable "versioning_enabled" {
      type    = bool
      default = true
    }

    variable "sse_algorithm" {
      type    = string
      default = "aws:kms"
    }

    variable "kms_key_id" {
      type    = string
      default = null
    }

    variable "bucket_key_enabled" {
      type    = bool
      default = true
    }

    variable "block_public_acls" {
      type    = bool
      default = true
    }

    variable "block_public_policy" {
      type    = bool
      default = true
    }

    variable "ignore_public_acls" {
      type    = bool
      default = true
    }

    variable "restrict_public_buckets" {
      type    = bool
      default = true
    }

    variable "lifecycle_rules" {
      type    = list(any)
      default = []
    }

    variable "tags" {
      type    = map(string)
      default = {}
    }
  modules/s3/outputs.tf: |
    output "bucket_id" {
      value = aws_s3_bucket.this.id
    }

    output "bucket_arn" {
      value = aws_s3_bucket.this.arn
    }

    output "bucket_domain_name" {
      value = aws_s3_bucket.this.bucket_domain_name
    }
  infrastructure/storage.tf: |
    module "data_bucket" {
      source      = "./modules/s3"
      bucket_name = "myapp-data-${var.environment}"

      tags = local.common_tags
    }

  # Trap: sibling module call to same S3 module with lifecycle_rules
  infrastructure/backup_storage.tf: |
    module "backup_bucket" {
      source             = "./modules/s3"
      bucket_name        = "myapp-backups-${var.environment}"
      versioning_enabled = true
      kms_key_id         = aws_kms_key.backup.arn

      lifecycle_rules = [
        {
          id      = "archive-backups"
          enabled = true
          prefix  = "daily/"
          transitions = [
            {
              days          = 60
              storage_class = "GLACIER"
            },
            {
              days          = 180
              storage_class = "DEEP_ARCHIVE"
            }
          ]
          expiration_days = 730
        },
        {
          id      = "cleanup-temp-backups"
          enabled = true
          prefix  = "temp/"
          transitions     = []
          expiration_days = 14
        }
      ]

      tags = local.common_tags
    }

  # Trap: KMS key definitions in same infrastructure directory
  infrastructure/kms_keys.tf: |
    data "aws_kms_key" "shared_encryption" {
      key_id = "alias/shared-encryption"
    }

    resource "aws_kms_key" "backup" {
      description             = "KMS key for backup bucket encryption"
      deletion_window_in_days = 30
      enable_key_rotation     = true
      tags                    = local.common_tags
    }

    resource "aws_kms_alias" "backup" {
      name          = "alias/myapp-backup"
      target_key_id = aws_kms_key.backup.key_id
    }

