initial:
  main.tf: |
    variable "extra_tags" {
      type    = map(string)
      default = {}
    }

    locals {
      base_tags = {
        Project   = "webapp"
        ManagedBy = "terraform"
      }
    }

    resource "aws_instance" "web" {
      ami           = "ami-12345678"
      instance_type = "t3.micro"
      tags          = merge(local.base_tags, var.extra_tags)
    }

  # --- Tricky garbage: same resource type aws_instance but for cache layer ---
  garbage_cache_instance.tf: |
    GARBAGE_TF_067_CACHE_MARKER_A = "cache-instance"
    GARBAGE_TF_067_CACHE_MARKER_B = "redis-host"

    resource "aws_instance" "cache" {
      ami           = "ami-44556677"
      instance_type = "r5.large"
      tags          = merge(local.base_tags, { Role = "cache" })
    }

  # --- Plain garbage: no overlap ---
  garbage_ecr.tf: |
    GARBAGE_TF_067_ECR_MARKER_C = "container-registry"
    GARBAGE_TF_067_ECR_MARKER_D = "image-repo"

    resource "aws_ecr_repository" "app" {
      name = "app-images"
      image_scanning_configuration {
        scan_on_push = true
      }
    }

changed:
  main.tf: |
    variable "extra_tags" {
      type    = map(string)
      default = {}
    }

    locals {
      base_tags = {
        Project     = "webapp"
        ManagedBy   = "terraform"
        Environment = terraform.workspace
      }

      security_tags = {
        Compliance = "pci-dss"
        DataClass  = "confidential"
      }
    }

    resource "aws_instance" "web" {
      ami           = "ami-12345678"
      instance_type = "t3.micro"
      tags          = merge(local.base_tags, local.security_tags, var.extra_tags)
    }

  # --- Tricky garbage: same resource type aws_instance but for cache layer ---
  garbage_cache_instance.tf: |
    GARBAGE_TF_067_CACHE_MARKER_A = "cache-instance"
    GARBAGE_TF_067_CACHE_MARKER_B = "redis-host"

    resource "aws_instance" "cache" {
      ami           = "ami-44556677"
      instance_type = "r5.large"
      tags          = merge(local.base_tags, { Role = "cache" })
    }

  # --- Plain garbage: no overlap ---
  garbage_ecr.tf: |
    GARBAGE_TF_067_ECR_MARKER_C = "container-registry"
    GARBAGE_TF_067_ECR_MARKER_D = "image-repo"

    resource "aws_ecr_repository" "app" {
      name = "app-images"
      image_scanning_configuration {
        scan_on_push = true
      }
    }

# === Assertions ===

must_include_files:
- main.tf

must_include_content_from:
  main.tf:
    - Environment = terraform.workspace
    - security_tags = {
    - Compliance = "pci-dss"
    - merge(local.base_tags, local.security_tags, var.extra_tags)

must_not_include:
# Tricky garbage markers (sibling aws_instance resource)
- GARBAGE_TF_067_CACHE_MARKER_A
- GARBAGE_TF_067_CACHE_MARKER_B
# Plain garbage markers
- GARBAGE_TF_067_ECR_MARKER_C
- GARBAGE_TF_067_ECR_MARKER_D

must_not_include_files:
- garbage_cache_instance.tf
- garbage_ecr.tf

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
