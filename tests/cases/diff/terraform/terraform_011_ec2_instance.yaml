    - resource "aws_launch_template" "web" {
    - image_id      = local.ami_id
    - security_groups             = [aws_security_group.web.id]
    - user_data = base64encode(templatefile("${path.module}/user_data.sh", {
  ami_lookup.tf:
    - data "aws_ami" "amazon_linux_2023" {
    - 'values = ["al2023-ami-*-x86_64"]'

must_not_include:
# Plain garbage markers
- GARBAGE_TF_ec2451a
- GARBAGE_TF_ec2451b
# Tricky: worker launch template with same aws_launch_template, aws_security_group, instance profile
- GARBAGE_TF_EC2011_WORKER_MARKER_A
- GARBAGE_TF_EC2011_WORKER_FLAG_B
# Tricky: same aws_ami data source type in different lookup file
- GARBAGE_TF_EC2011_GPU_MARKER_C
- GARBAGE_TF_EC2011_GPU_FLAG_D

