# Scenario: Replacing a hardcoded subnet_id with a terraform_remote_state
#   data source that reads VPC outputs from a separate state file.
# Reviewer questions:
#   1. What backend stores the state? (backend.tf shows S3 bucket/key pattern)
#   2. What was the instance using before? (hardcoded subnet-12345, visible in diff)
# Traps:
#   - database/remote_state.tf: also uses terraform_remote_state but for database layer
#   - cdn/cloudfront.tf: CDN config in the same project, no state dependency

max_enrichment: 7.2
initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = var.ami_id
      instance_type = "t3.micro"
      subnet_id     = "subnet-12345"

      tags = {
        Name = "web-server"
      }
    }
  backend.tf: |
    terraform {
      backend "s3" {
        bucket = "terraform-state"
        key    = "app/terraform.tfstate"
        region = "us-east-1"
      }
    }
  database/remote_state.tf: |
    data "terraform_remote_state" "database" {
      backend = "s3"
      config = {
        bucket = "terraform-state"
        key    = "database/terraform.tfstate"
        region = "us-east-1"
      }
    }

    resource "aws_db_subnet_group" "main" {
      name       = "db-subnet-group"
      subnet_ids = data.terraform_remote_state.database.outputs.subnet_ids
    }
  cdn/cloudfront.tf: |
    resource "aws_cloudfront_distribution" "static" {
      enabled             = true
      default_root_object = "index.html"

      origin {
        domain_name = "static-assets.s3.amazonaws.com"
        origin_id   = "s3-static"
      }

      default_cache_behavior {
        allowed_methods        = ["GET", "HEAD"]
        cached_methods         = ["GET", "HEAD"]
        target_origin_id       = "s3-static"
        viewer_protocol_policy = "redirect-to-https"
      }
    }

changed:
  main.tf: |
    data "terraform_remote_state" "vpc" {
      backend = "s3"
      config = {
        bucket = "terraform-state"
        key    = "vpc/terraform.tfstate"
        region = "us-east-1"
      }
    }

    resource "aws_instance" "web" {
      ami           = var.ami_id
      instance_type = "t3.micro"
      subnet_id     = data.terraform_remote_state.vpc.outputs.subnet_id

      tags = {
        Name = "web-server"
      }
    }

# backend.tf is unchanged but reviewer needs it to understand where state
# is stored and confirm the remote_state data source uses the same backend
must_include_files:
  - backend.tf

must_include_content_from:
  backend.tf:
    - bucket = "terraform-state"
    - backend "s3" {

must_not_include:
  # Database remote state - same data source type but reads different state key
  - database/terraform.tfstate
  - db-subnet-group
  # CDN config - completely unrelated, no state dependency
  - aws_cloudfront_distribution

must_not_include_files:
  - database/remote_state.tf
  - cdn/cloudfront.tf

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
