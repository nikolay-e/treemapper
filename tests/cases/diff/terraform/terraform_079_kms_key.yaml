# === Assertions ===

must_include_files:
- kms.tf

must_include_content_from:
  kms.tf:
    - description             = "Main encryption key"
    - deletion_window_in_days = 7
    - enable_key_rotation     = true
    - 'resource "aws_kms_key" "main"'

must_not_include:
# Tricky garbage: sibling .tf with same resource type
- GARBAGE_TF_079_S3_KEY_MARKER_A
- GARBAGE_TF_079_SSE_MARKER_B
# Plain garbage
- GARBAGE_TF_079_AUTH_MARKER_C
- GARBAGE_TF_079_TOKEN_MARKER_D
- GARBAGE_TF_079_ISSUER_MARKER_E

must_not_include_files:
- garbage_kms_s3.tf
- garbage_auth.py
- src/encrypt.py

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
