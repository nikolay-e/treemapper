    }
  modules/iam_role/outputs.tf: |
    output "role_arn" {
      value = aws_iam_role.this.arn
    }

    output "role_name" {
      value = aws_iam_role.this.name
    }
  infrastructure/iam.tf: |
    data "aws_iam_policy_document" "lambda_assume_role" {
      statement {
        effect  = "Allow"
        actions = ["sts:AssumeRole"]

        principals {
          type        = "Service"
          identifiers = ["lambda.amazonaws.com"]
        }
      }
    }

    module "lambda_role" {
      source             = "./modules/iam_role"
      role_name          = "lambda-exec-role-${var.environment}"
      assume_role_policy = data.aws_iam_policy_document.lambda_assume_role.json

      managed_policy_arns = [
        "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole",
        "arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole"
      ]

      inline_policy = data.aws_iam_policy_document.lambda_permissions.json

      tags = local.common_tags
    }

    data "aws_iam_policy_document" "lambda_permissions" {
      statement {
        sid    = "S3Access"
        effect = "Allow"
        actions = [
          "s3:GetObject",
          "s3:PutObject",
          "s3:DeleteObject"
        ]
        resources = [
          "${module.data_bucket.bucket_arn}/*"
        ]
      }

      statement {
        sid    = "DynamoDBAccess"
        effect = "Allow"
        actions = [
          "dynamodb:GetItem",
          "dynamodb:PutItem",
          "dynamodb:UpdateItem",
          "dynamodb:DeleteItem",
          "dynamodb:Query",
          "dynamodb:Scan"
        ]
        resources = [
          module.users_table.table_arn,
          "${module.users_table.table_arn}/index/*"
        ]
      }

      statement {
        sid    = "SQSAccess"
        effect = "Allow"
        actions = [
          "sqs:SendMessage",
          "sqs:ReceiveMessage",
          "sqs:DeleteMessage",
          "sqs:GetQueueAttributes"
        ]
        resources = [
          aws_sqs_queue.processing.arn
        ]
      }

      statement {
        sid    = "KMSDecrypt"
        effect = "Allow"
        actions = [
          "kms:Decrypt",
          "kms:GenerateDataKey"
        ]
        resources = [
          aws_kms_key.data.arn
        ]
      }
    }

    resource "aws_iam_policy" "s3_readonly" {
      name        = "s3-readonly-${var.environment}"
      description = "Read-only access to data bucket"

      policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect = "Allow"
          Action = [
            "s3:GetObject",
            "s3:ListBucket"
          ]
          Resource = [
            module.data_bucket.bucket_arn,
            "${module.data_bucket.bucket_arn}/*"
          ]
        }]
      })

      tags = local.common_tags
    }

    resource "aws_iam_role_policy_attachment" "s3_readonly" {
      role       = module.readonly_role.role_name
      policy_arn = aws_iam_policy.s3_readonly.arn
    }

