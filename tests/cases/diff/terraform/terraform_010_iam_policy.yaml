must_include_files:
- infrastructure/iam.tf

must_include_content_from:
  infrastructure/iam.tf:
    - inline_policy = data.aws_iam_policy_document.lambda_permissions.json
    - '"s3:GetObject",'
    - sid    = "DynamoDBAccess"
    - sid    = "SQSAccess"
    - sid    = "KMSDecrypt"

must_not_include:
# Plain garbage markers
- GARBAGE_TF_COGNITO_450_001
- GARBAGE_USER_POOL_450_002
- GARBAGE_ATTR_450_003
- GARBAGE_CLIENT_450_004
- GARBAGE_TF_ORG_450_005
- GARBAGE_SCP_450_006
- GARBAGE_ACTION_450_007
# Tricky: same aws_iam_policy with s3:GetObject actions
- GARBAGE_TF_IAM010_READONLY_MARKER_A
- GARBAGE_TF_IAM010_READONLY_FLAG_B

must_not_include_files:
- infrastructure/iam_readonly.tf
- unrelated/cognito.tf
- unrelated/organizations.tf

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
