initial:
  modules/iam_role/main.tf: |
    resource "aws_iam_role" "this" {
      name               = var.role_name
      assume_role_policy = var.assume_role_policy
      description        = var.description

      max_session_duration = var.max_session_duration

      tags = var.tags
    }

    resource "aws_iam_role_policy_attachment" "managed" {
      count      = length(var.managed_policy_arns)
      role       = aws_iam_role.this.name
      policy_arn = var.managed_policy_arns[count.index]
    }

    resource "aws_iam_role_policy" "inline" {
      count  = var.inline_policy != null ? 1 : 0
      name   = "${var.role_name}-inline-policy"
      role   = aws_iam_role.this.id
      policy = var.inline_policy
    }
  modules/iam_role/variables.tf: |
    variable "role_name" {
      type = string
    }

    variable "assume_role_policy" {
      type = string
    }

    variable "description" {
      type    = string
      default = "Managed by Terraform"
    }

    variable "max_session_duration" {
      type    = number
      default = 3600
    }

    variable "managed_policy_arns" {
      type    = list(string)
      default = []
    }

    variable "inline_policy" {
      type    = string
      default = null
    }

    variable "tags" {
      type    = map(string)
      default = {}
    }
  modules/iam_role/outputs.tf: |
    output "role_arn" {
      value = aws_iam_role.this.arn
    }

    output "role_name" {
      value = aws_iam_role.this.name
    }
  infrastructure/iam.tf: |
    data "aws_iam_policy_document" "lambda_assume_role" {
      statement {
        effect  = "Allow"
        actions = ["sts:AssumeRole"]

        principals {
          type        = "Service"
          identifiers = ["lambda.amazonaws.com"]
        }
      }
    }

    module "lambda_role" {
      source             = "./modules/iam_role"
      role_name          = "lambda-exec-role-${var.environment}"
      assume_role_policy = data.aws_iam_policy_document.lambda_assume_role.json

      managed_policy_arns = [
        "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      ]

      tags = local.common_tags
    }

  # --- Tricky garbage: same aws_iam_policy with s3:GetObject actions ---
  infrastructure/iam_readonly.tf: |
    GARBAGE_TF_IAM010_READONLY_MARKER_A = "readonly-role"
    GARBAGE_TF_IAM010_READONLY_FLAG_B = true

    data "aws_iam_policy_document" "readonly_assume_role" {
      statement {
        effect  = "Allow"
        actions = ["sts:AssumeRole"]

        principals {
          type        = "Service"
          identifiers = ["ec2.amazonaws.com"]
        }
      }
    }

    module "readonly_role" {
      source             = "./modules/iam_role"
      role_name          = "readonly-role-${var.environment}-GARBAGE_TF_IAM010_READONLY_MARKER_A"
      assume_role_policy = data.aws_iam_policy_document.readonly_assume_role.json

      tags = merge(local.common_tags, {
        Purpose = "readonly-GARBAGE_TF_IAM010_READONLY_FLAG_B"
      })
    }

    resource "aws_iam_policy" "readonly_s3" {
      name        = "readonly-s3-${var.environment}"
      description = "Read-only S3 access for audit"

      policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect = "Allow"
          Action = [
            "s3:GetObject",
            "s3:ListBucket"
          ]
          Resource = [
            "arn:aws:s3:::audit-bucket-${var.environment}",
            "arn:aws:s3:::audit-bucket-${var.environment}/*"
          ]
        }]
      })

      tags = local.common_tags
    }

    resource "aws_iam_role_policy_attachment" "readonly_s3" {
      role       = module.readonly_role.role_name
      policy_arn = aws_iam_policy.readonly_s3.arn
    }

  unrelated/cognito.tf: |
    # GARBAGE_TF_COGNITO_450_001
    resource "aws_cognito_user_pool" "unrelated_pool" {
      name = "GARBAGE_USER_POOL_450_002"

      password_policy {
        minimum_length = 8
      }

      schema {
        name                = "GARBAGE_ATTR_450_003"
        attribute_data_type = "String"
        mutable             = true
      }
    }

    resource "aws_cognito_user_pool_client" "unrelated_client" {
      name         = "GARBAGE_CLIENT_450_004"
      user_pool_id = aws_cognito_user_pool.unrelated_pool.id
    }
  unrelated/organizations.tf: |
    # GARBAGE_TF_ORG_450_005
    resource "aws_organizations_policy" "unrelated_scp" {
      name    = "GARBAGE_SCP_450_006"
      content = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect   = "Deny"
          Action   = ["GARBAGE_ACTION_450_007"]
          Resource = "*"
        }]
      })
    }
