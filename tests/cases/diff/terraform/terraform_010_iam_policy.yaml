# Scenario: Lambda role gets an inline policy with S3, DynamoDB, SQS, KMS access
#
# Reviewer questions:
#   1. How does the module apply inline policies? (modules/iam_role/main.tf)
#   2. What interface does the module expose? (modules/iam_role/variables.tf)
#
# The diff expands the lambda_role module call in infrastructure/iam.tf with
# a new inline_policy and adds a standalone s3_readonly policy. The module
# source files (unchanged) are needed to verify the module supports
# inline_policy and understand how it gets attached.
#
# Traps: iam_readonly.tf has same s3:GetObject actions but for audit bucket.
# cognito.tf is IAM-adjacent but different service.

initial:
  modules/iam_role/main.tf: |
    resource "aws_iam_role" "this" {
      name               = var.role_name
      assume_role_policy = var.assume_role_policy
      tags               = var.tags
    }

    resource "aws_iam_role_policy_attachment" "managed" {
      count      = length(var.managed_policy_arns)
      role       = aws_iam_role.this.name
      policy_arn = var.managed_policy_arns[count.index]
    }

    resource "aws_iam_role_policy" "inline" {
      count  = var.inline_policy != null ? 1 : 0
      name   = "${var.role_name}-inline-policy"
      role   = aws_iam_role.this.id
      policy = var.inline_policy
    }
  modules/iam_role/variables.tf: |
    variable "role_name" {
      type = string
    }

    variable "assume_role_policy" {
      type = string
    }

    variable "managed_policy_arns" {
      type    = list(string)
      default = []
    }

    variable "inline_policy" {
      type    = string
      default = null
    }

    variable "tags" {
      type    = map(string)
      default = {}
    }
  infrastructure/iam.tf: |
    module "lambda_role" {
      source             = "./modules/iam_role"
      role_name          = "lambda-exec-role-${var.environment}"
      assume_role_policy = data.aws_iam_policy_document.lambda_assume_role.json

      managed_policy_arns = [
        "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      ]

      tags = local.common_tags
    }
  infrastructure/iam_readonly.tf: |
    module "readonly_role" {
      source             = "./modules/iam_role"
      role_name          = "readonly-role-${var.environment}"
      assume_role_policy = data.aws_iam_policy_document.readonly_assume_role.json
      tags               = local.common_tags
    }

    resource "aws_iam_policy" "readonly_s3" {
      name = "readonly-s3-${var.environment}"

      policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect   = "Allow"
          Action   = ["s3:GetObject", "s3:ListBucket"]
          Resource = [
            "arn:aws:s3:::audit-bucket-${var.environment}",
            "arn:aws:s3:::audit-bucket-${var.environment}/*"
          ]
        }]
      })
    }
  infrastructure/cognito.tf: |
    resource "aws_cognito_user_pool" "main" {
      name = "${var.environment}-users"

      password_policy {
        minimum_length = 8
      }
    }

changed:
  modules/iam_role/main.tf: |
    resource "aws_iam_role" "this" {
      name               = var.role_name
      assume_role_policy = var.assume_role_policy
      tags               = var.tags
    }

    resource "aws_iam_role_policy_attachment" "managed" {
      count      = length(var.managed_policy_arns)
      role       = aws_iam_role.this.name
      policy_arn = var.managed_policy_arns[count.index]
    }

    resource "aws_iam_role_policy" "inline" {
      count  = var.inline_policy != null ? 1 : 0
      name   = "${var.role_name}-inline-policy"
      role   = aws_iam_role.this.id
      policy = var.inline_policy
    }
  modules/iam_role/variables.tf: |
    variable "role_name" {
      type = string
    }

    variable "assume_role_policy" {
      type = string
    }

    variable "managed_policy_arns" {
      type    = list(string)
      default = []
    }

    variable "inline_policy" {
      type    = string
      default = null
    }

    variable "tags" {
      type    = map(string)
      default = {}
    }
  infrastructure/iam.tf: |
    module "lambda_role" {
      source             = "./modules/iam_role"
      role_name          = "lambda-exec-role-${var.environment}"
      assume_role_policy = data.aws_iam_policy_document.lambda_assume_role.json

      managed_policy_arns = [
        "arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole",
        "arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole"
      ]

      inline_policy = data.aws_iam_policy_document.lambda_permissions.json

      tags = local.common_tags
    }

    data "aws_iam_policy_document" "lambda_permissions" {
      statement {
        sid     = "S3Access"
        effect  = "Allow"
        actions = ["s3:GetObject", "s3:PutObject", "s3:DeleteObject"]
        resources = ["${module.data_bucket.bucket_arn}/*"]
      }

      statement {
        sid     = "DynamoDBAccess"
        effect  = "Allow"
        actions = [
          "dynamodb:GetItem",
          "dynamodb:PutItem",
          "dynamodb:Query"
        ]
        resources = [module.users_table.table_arn]
      }

      statement {
        sid     = "SQSAccess"
        effect  = "Allow"
        actions = ["sqs:SendMessage", "sqs:ReceiveMessage"]
        resources = [aws_sqs_queue.processing.arn]
      }

      statement {
        sid     = "KMSDecrypt"
        effect  = "Allow"
        actions = ["kms:Decrypt", "kms:GenerateDataKey"]
        resources = [aws_kms_key.data.arn]
      }
    }
  infrastructure/iam_readonly.tf: |
    module "readonly_role" {
      source             = "./modules/iam_role"
      role_name          = "readonly-role-${var.environment}"
      assume_role_policy = data.aws_iam_policy_document.readonly_assume_role.json
      tags               = local.common_tags
    }

    resource "aws_iam_policy" "readonly_s3" {
      name = "readonly-s3-${var.environment}"

      policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect   = "Allow"
          Action   = ["s3:GetObject", "s3:ListBucket"]
          Resource = [
            "arn:aws:s3:::audit-bucket-${var.environment}",
            "arn:aws:s3:::audit-bucket-${var.environment}/*"
          ]
        }]
      })
    }
  infrastructure/cognito.tf: |
    resource "aws_cognito_user_pool" "main" {
      name = "${var.environment}-users"

      password_policy {
        minimum_length = 8
      }
    }

must_include_files:
# Unchanged module source needed to verify inline_policy support
- modules/iam_role/main.tf

must_include_content_from:
  modules/iam_role/main.tf:
    # Reviewer needs to see how the module applies inline policies
    - resource "aws_iam_role_policy" "inline" {
    - policy = var.inline_policy

must_not_include:
# Readonly role has same s3:GetObject but for audit bucket
- audit-bucket
- readonly-role
# Cognito is identity management, not IAM roles
- aws_cognito_user_pool

must_not_include_files:
- infrastructure/iam_readonly.tf  # same s3:GetObject, different role/bucket
- infrastructure/cognito.tf  # identity management, not IAM role policy

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
