# Scenario: Add a NAT gateway with EIP in the public subnet
#
# Reviewer questions:
#   1. What subnet hosts the NAT? (network.tf defines aws_subnet.public)
#   2. What VPC do these resources belong to? (network.tf defines aws_vpc.main)
#   3. Is the IGW dependency satisfied? (igw.tf defines aws_internet_gateway.main)
#
# The diff adds aws_eip and aws_nat_gateway to nat.tf. The VPC and public
# subnet in network.tf are unchanged but needed to verify placement. The
# internet gateway in igw.tf is the explicit depends_on target.
#
# Traps: secondary_nat.tf has same resource types but for a different AZ.
# transit_gateway.tf is networking but a completely different service.

initial:
  nat.tf: |
    # NAT gateway resources placeholder
  network.tf: |
    resource "aws_vpc" "main" {
      cidr_block = "10.0.0.0/16"
    }

    resource "aws_subnet" "public" {
      vpc_id                  = aws_vpc.main.id
      cidr_block              = "10.0.0.0/24"
      map_public_ip_on_launch = true
    }
  igw.tf: |
    resource "aws_internet_gateway" "main" {
      vpc_id = aws_vpc.main.id
    }
  secondary_nat.tf: |
    resource "aws_eip" "secondary_nat" {
      domain = "vpc"
    }

    resource "aws_nat_gateway" "secondary" {
      allocation_id = aws_eip.secondary_nat.id
      subnet_id     = aws_subnet.secondary_public.id
      depends_on    = [aws_internet_gateway.secondary]
    }
  transit_gateway.tf: |
    resource "aws_ec2_transit_gateway" "main" {
      description = "Main transit gateway"
    }

    resource "aws_ec2_transit_gateway_vpc_attachment" "main" {
      transit_gateway_id = aws_ec2_transit_gateway.main.id
      vpc_id             = aws_vpc.main.id
      subnet_ids         = aws_subnet.private[*].id
    }

changed:
  nat.tf: |
    resource "aws_eip" "nat" {
      domain = "vpc"
    }

    resource "aws_nat_gateway" "main" {
      allocation_id = aws_eip.nat.id
      subnet_id     = aws_subnet.public.id
      depends_on    = [aws_internet_gateway.main]
    }
  network.tf: |
    resource "aws_vpc" "main" {
      cidr_block = "10.0.0.0/16"
    }

    resource "aws_subnet" "public" {
      vpc_id                  = aws_vpc.main.id
      cidr_block              = "10.0.0.0/24"
      map_public_ip_on_launch = true
    }
  igw.tf: |
    resource "aws_internet_gateway" "main" {
      vpc_id = aws_vpc.main.id
    }
  secondary_nat.tf: |
    resource "aws_eip" "secondary_nat" {
      domain = "vpc"
    }

    resource "aws_nat_gateway" "secondary" {
      allocation_id = aws_eip.secondary_nat.id
      subnet_id     = aws_subnet.secondary_public.id
      depends_on    = [aws_internet_gateway.secondary]
    }
  transit_gateway.tf: |
    resource "aws_ec2_transit_gateway" "main" {
      description = "Main transit gateway"
    }

    resource "aws_ec2_transit_gateway_vpc_attachment" "main" {
      transit_gateway_id = aws_ec2_transit_gateway.main.id
      vpc_id             = aws_vpc.main.id
      subnet_ids         = aws_subnet.private[*].id
    }

must_include_files:
# Unchanged subnet/VPC where the NAT is placed
- network.tf

must_include_content_from:
  network.tf:
    # Reviewer needs the public subnet to verify NAT placement
    - resource "aws_subnet" "public" {
    - map_public_ip_on_launch = true

must_not_include:
# Secondary NAT is same resource type but for a different AZ/subnet
- secondary_nat
- aws_internet_gateway.secondary
# Transit gateway is a completely different networking service
- aws_ec2_transit_gateway
- transit_gateway_id

must_not_include_files:
- secondary_nat.tf  # same NAT type, different AZ
- transit_gateway.tf  # different networking service

max_fragments: 4
max_files: 3
add_garbage_files: false
skip_garbage_check: true
