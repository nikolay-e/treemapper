initial:
  versions.tf: |
    terraform {
      required_providers {
        aws = {
          source  = "hashicorp/aws"
          version = "~> 4.0"
        }
      }
    }

  # --- Tricky garbage: sibling .tf with required_providers for different cloud ---
  garbage_tf_048_gcp_providers.tf: |
    GARBAGE_TF_048_GCP_PROVIDER_A = "google-cloud"
    GARBAGE_TF_048_GCP_VERSION_B = "4.84"

    terraform {
      required_providers {
        google = {
          source  = "hashicorp/google"
          version = "~> 4.84"
        }
        google-beta = {
          source  = "hashicorp/google-beta"
          version = "~> 4.84"
        }
      }
    }

  # --- Plain garbage ---
  garbage_tf_048_tags.tf: |
    GARBAGE_TF_048_TAG_POLICY_C = "mandatory"
    GARBAGE_TF_048_TAG_ENV_D = "development"

    locals {
      common_tags = {
        Team    = "platform"
        Project = "infra"
      }
    }

changed:
  versions.tf: |
    terraform {
      required_providers {
        aws = {
          source  = "hashicorp/aws"
          version = "~> 5.0"
        }
        random = {
          source  = "hashicorp/random"
          version = "~> 3.5"
        }
        null = {
          source  = "hashicorp/null"
          version = "~> 3.2"
        }
      }
    }

  garbage_tf_048_gcp_providers.tf: |
    GARBAGE_TF_048_GCP_PROVIDER_A = "google-cloud"
    GARBAGE_TF_048_GCP_VERSION_B = "4.84"

    terraform {
      required_providers {
        google = {
          source  = "hashicorp/google"
          version = "~> 4.84"
        }
        google-beta = {
          source  = "hashicorp/google-beta"
          version = "~> 4.84"
        }
      }
    }

  garbage_tf_048_tags.tf: |
    GARBAGE_TF_048_TAG_POLICY_C = "mandatory"
    GARBAGE_TF_048_TAG_ENV_D = "development"

    locals {
      common_tags = {
        Team    = "platform"
        Project = "infra"
      }
    }

must_include_files:
- versions.tf

must_include_content_from:
  versions.tf:
    - version = "~> 5.0"
    - source  = "hashicorp/random"
    - version = "~> 3.5"
    - source  = "hashicorp/null"

must_not_include:
- GARBAGE_TF_048_GCP_PROVIDER_A
- GARBAGE_TF_048_GCP_VERSION_B
- GARBAGE_TF_048_TAG_POLICY_C
- GARBAGE_TF_048_TAG_ENV_D

must_not_include_files:
- garbage_tf_048_gcp_providers.tf
- garbage_tf_048_tags.tf

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
