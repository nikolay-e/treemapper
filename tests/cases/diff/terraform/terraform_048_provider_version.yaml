# Scenario: Upgrading the AWS provider from ~> 4.0 to ~> 5.0 and adding
#   random and null provider requirements.
# Reviewer questions:
#   1. Which resources use the random or null provider? (main.tf)
#   2. Are there any breaking changes from AWS provider 4.x to 5.x in existing resources? (main.tf)
# Traps:
#   - modules/gcp/versions.tf: GCP provider version (same block pattern, different cloud)
#   - locals.tf: locals block with common tags (no provider dependency)

max_enrichment: 6.9
initial:
  versions.tf: |
    terraform {
      required_providers {
        aws = {
          source  = "hashicorp/aws"
          version = "~> 4.0"
        }
      }
    }
  main.tf: |
    resource "aws_instance" "web" {
      ami           = "ami-12345"
      instance_type = "t3.micro"
    }
  modules/gcp/versions.tf: |
    terraform {
      required_providers {
        google = {
          source  = "hashicorp/google"
          version = "~> 4.84"
        }
        google-beta = {
          source  = "hashicorp/google-beta"
          version = "~> 4.84"
        }
      }
    }
  locals.tf: |
    locals {
      common_tags = {
        Team    = "platform"
        Project = "infra"
      }
    }

changed:
  versions.tf: |
    terraform {
      required_providers {
        aws = {
          source  = "hashicorp/aws"
          version = "~> 5.0"
        }
        random = {
          source  = "hashicorp/random"
          version = "~> 3.5"
        }
        null = {
          source  = "hashicorp/null"
          version = "~> 3.2"
        }
      }
    }

must_include_files:
  - versions.tf
  - main.tf

must_include_content_from:
  versions.tf:
    - version = "~> 5.0"
    - source  = "hashicorp/random"
    - source  = "hashicorp/null"
  main.tf:
    - resource "aws_instance" "web" {

must_not_include:
  # GCP provider versions - same block type but for a different cloud
  - hashicorp/google
  - hashicorp/google-beta
  # Locals - tag definitions unrelated to provider version changes
  - common_tags

must_not_include_files:
  - modules/gcp/versions.tf
  - locals.tf

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
