initial:
  main.tf: |
    variable "custom_domain" {
      type    = string
      default = ""
    }

    variable "default_domain" {
      default = "app.example.com"
    }

    resource "aws_route53_record" "app" {
      zone_id = aws_route53_zone.main.zone_id
      name    = coalesce(var.custom_domain, var.default_domain)
      type    = "A"
      alias {
        name                   = aws_lb.main.dns_name
        zone_id                = aws_lb.main.zone_id
        evaluate_target_health = true
      }
    }

  # --- Tricky garbage: same resource type aws_route53_record but for API ---
  garbage_api_record.tf: |
    GARBAGE_TF_070_API_MARKER_A = "api-dns-record"
    GARBAGE_TF_070_API_MARKER_B = "api-endpoint"

    resource "aws_route53_record" "api" {
      zone_id = aws_route53_zone.main.zone_id
      name    = coalesce(var.api_domain, "api.example.com")
      type    = "A"
      alias {
        name                   = aws_lb.api.dns_name
        zone_id                = aws_lb.api.zone_id
        evaluate_target_health = true
      }
    }

  # --- Plain garbage: no overlap ---
  garbage_lambda_layer.tf: |
    GARBAGE_TF_070_LAYER_MARKER_C = "lambda-layer"
    GARBAGE_TF_070_LAYER_MARKER_D = "shared-deps"

    resource "aws_lambda_layer_version" "deps" {
      filename   = "layer.zip"
      layer_name = "shared-dependencies"
      compatible_runtimes = ["python3.11"]
    }

changed:
  main.tf: |
    variable "custom_domain" {
      type    = string
      default = ""
    }

    variable "default_domain" {
      default = "app.example.com"
    }

    variable "failover_domain" {
      type    = string
      default = ""
    }

    resource "aws_route53_record" "app" {
      zone_id = aws_route53_zone.main.zone_id
      name    = coalesce(var.custom_domain, var.default_domain)
      type    = "A"
      alias {
        name                   = aws_lb.main.dns_name
        zone_id                = aws_lb.main.zone_id
        evaluate_target_health = true
      }
    }

    resource "aws_route53_record" "failover" {
      zone_id = aws_route53_zone.main.zone_id
      name    = coalesce(var.failover_domain, var.custom_domain, var.default_domain)
      type    = "A"
      set_identifier = "secondary"
      failover_routing_policy {
        type = "SECONDARY"
      }
      alias {
        name                   = aws_lb.failover.dns_name
        zone_id                = aws_lb.failover.zone_id
        evaluate_target_health = true
      }
    }

  # --- Tricky garbage: same resource type aws_route53_record but for API ---
  garbage_api_record.tf: |
    GARBAGE_TF_070_API_MARKER_A = "api-dns-record"
    GARBAGE_TF_070_API_MARKER_B = "api-endpoint"

    resource "aws_route53_record" "api" {
      zone_id = aws_route53_zone.main.zone_id
      name    = coalesce(var.api_domain, "api.example.com")
      type    = "A"
      alias {
        name                   = aws_lb.api.dns_name
        zone_id                = aws_lb.api.zone_id
        evaluate_target_health = true
      }
    }

  # --- Plain garbage: no overlap ---
  garbage_lambda_layer.tf: |
    GARBAGE_TF_070_LAYER_MARKER_C = "lambda-layer"
    GARBAGE_TF_070_LAYER_MARKER_D = "shared-deps"

    resource "aws_lambda_layer_version" "deps" {
      filename   = "layer.zip"
      layer_name = "shared-dependencies"
      compatible_runtimes = ["python3.11"]
    }

# === Assertions ===

must_include_files:
- main.tf

must_include_content_from:
  main.tf:
    - 'resource "aws_route53_record" "failover"'
    - coalesce(var.failover_domain, var.custom_domain, var.default_domain)
    - type = "SECONDARY"
    - variable "failover_domain" {

must_not_include:
# Tricky garbage markers (sibling aws_route53_record resource)
- GARBAGE_TF_070_API_MARKER_A
- GARBAGE_TF_070_API_MARKER_B
# Plain garbage markers
- GARBAGE_TF_070_LAYER_MARKER_C
- GARBAGE_TF_070_LAYER_MARKER_D

must_not_include_files:
- garbage_api_record.tf
- garbage_lambda_layer.tf

max_fragments: 4
max_files: 1
add_garbage_files: false
skip_garbage_check: true
