# Scenario: Upgrading SQS queue - increasing timeouts, enabling FIFO mode.
# Reviewer questions:
#   1. What produces messages for this queue? (producer.tf)
#   2. What consumes messages? (src/queue.py sends messages via boto3)
# Traps:
#   - dlq/dead_letter.tf: dead letter queue for the same main queue (related but not changed)
#   - cache/redis.tf: Redis cache (unrelated to message queuing)

initial:
  sqs.tf: |
    resource "aws_sqs_queue" "tasks" {
      name                       = "task-queue"
      visibility_timeout_seconds = 30
      message_retention_seconds  = 86400
    }
  src/queue.py: |
    import boto3

    def send_message(queue_url: str, message: str):
        sqs = boto3.client("sqs")
        sqs.send_message(QueueUrl=queue_url, MessageBody=message)
  producer.tf: |
    resource "aws_lambda_function" "producer" {
      function_name = "task-producer"
      runtime       = "python3.11"
      handler       = "producer.handler"
      role          = aws_iam_role.producer.arn
      filename      = "producer.zip"

      environment {
        variables = {
          QUEUE_URL = aws_sqs_queue.tasks.url
        }
      }
    }
  dlq/dead_letter.tf: |
    resource "aws_sqs_queue" "dead_letter" {
      name                       = "task-queue-dlq"
      visibility_timeout_seconds = 120
      message_retention_seconds  = 1209600
    }

    resource "aws_sqs_queue_redrive_allow_policy" "dead_letter" {
      queue_url = aws_sqs_queue.dead_letter.id
      redrive_allow_policy = jsonencode({
        redrivePermission = "byQueue"
        sourceQueueArns   = [aws_sqs_queue.tasks.arn]
      })
    }
  cache/redis.tf: |
    resource "aws_elasticache_cluster" "redis" {
      cluster_id      = "app-cache"
      engine          = "redis"
      node_type       = "cache.t3.micro"
      num_cache_nodes = 1
    }

changed:
  sqs.tf: |
    resource "aws_sqs_queue" "tasks" {
      name                       = "task-queue"
      visibility_timeout_seconds = 60
      message_retention_seconds  = 604800
      fifo_queue                 = true
    }

must_include_files:
  - sqs.tf
  - producer.tf

must_include_content_from:
  sqs.tf:
    - visibility_timeout_seconds = 60
    - message_retention_seconds  = 604800
    - fifo_queue                 = true
  producer.tf:
    - QUEUE_URL = aws_sqs_queue.tasks.url

must_not_include:
  # Dead letter queue - related to the main queue but unchanged, different resource
  - task-queue-dlq
  - redrivePermission
  # Redis cache - unrelated caching infrastructure
  - app-cache

must_not_include_files:
  - dlq/dead_letter.tf
  - cache/redis.tf
  - src/queue.py

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
