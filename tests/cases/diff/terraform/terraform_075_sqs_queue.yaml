# === Assertions ===

must_include_files:
- sqs.tf

must_include_content_from:
  sqs.tf:
    - visibility_timeout_seconds = 60
    - message_retention_seconds  = 604800
    - fifo_queue                 = true
    - 'resource "aws_sqs_queue" "tasks"'

must_not_include:
# Tricky garbage: sibling .tf with same resource type
- GARBAGE_TF_075_DLQ_MARKER_A
- GARBAGE_TF_075_RETRY_MARKER_B
# Plain garbage
- GARBAGE_TF_075_CACHE_MARKER_C
- GARBAGE_TF_075_TTL_MARKER_D
- GARBAGE_TF_075_EVICTION_MARKER_E

must_not_include_files:
- garbage_sqs_dlq.tf
- garbage_cache.py
- src/queue.py

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
