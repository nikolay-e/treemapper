# Scenario: Build out ALB with listeners, target groups, and routing rules
#
# Reviewer questions:
#   1. What security group protects the ALB? (security.tf aws_security_group.alb)
#   2. What subnets host the ALB? (network.tf defines public subnets)
#
# The diff replaces placeholder lb.tf with a complete ALB setup including
# HTTPS listener, target groups, and routing rules. security.tf defines the
# ALB security group (unchanged) that the ALB references via security_groups.
#
# Traps: nlb.tf is a different load balancer type. cdn.tf references the ALB
# but for CloudFront origin, not load balancing.

initial:
  lb.tf: |
    # Load balancer resources placeholder
  security.tf: |
    resource "aws_security_group" "alb" {
      name        = "${var.environment}-alb-sg"
      description = "Security group for Application Load Balancer"
      vpc_id      = var.vpc_id

      lifecycle {
        create_before_destroy = true
      }
    }

    resource "aws_security_group_rule" "alb_https_ingress" {
      type              = "ingress"
      from_port         = 443
      to_port           = 443
      protocol          = "tcp"
      cidr_blocks       = ["0.0.0.0/0"]
      security_group_id = aws_security_group.alb.id
    }
  nlb.tf: |
    resource "aws_lb" "network" {
      name               = "${var.environment}-nlb"
      internal           = true
      load_balancer_type = "network"
      subnets            = var.private_subnet_ids
    }

    resource "aws_lb_target_group" "tcp" {
      name     = "${var.environment}-tcp-tg"
      port     = 9000
      protocol = "TCP"
      vpc_id   = var.vpc_id
    }
  cdn.tf: |
    resource "aws_cloudfront_distribution" "main" {
      enabled = true

      origin {
        domain_name = aws_lb.main.dns_name
        origin_id   = "ALB"

        custom_origin_config {
          http_port              = 80
          https_port             = 443
          origin_protocol_policy = "https-only"
          origin_ssl_protocols   = ["TLSv1.2"]
        }
      }

      default_cache_behavior {
        target_origin_id       = "ALB"
        viewer_protocol_policy = "redirect-to-https"
        allowed_methods        = ["GET", "HEAD"]
        cached_methods         = ["GET", "HEAD"]

        forwarded_values {
          query_string = false
          cookies {
            forward = "none"
          }
        }
      }

      restrictions {
        geo_restriction {
          restriction_type = "none"
        }
      }

      viewer_certificate {
        acm_certificate_arn = var.certificate_arn
        ssl_support_method  = "sni-only"
      }
    }

changed:
  lb.tf: |
    resource "aws_lb" "main" {
      name               = "${var.environment}-alb"
      internal           = false
      load_balancer_type = "application"
      security_groups    = [aws_security_group.alb.id]
      subnets            = var.public_subnet_ids
      enable_http2       = true
    }

    resource "aws_lb_listener" "https" {
      load_balancer_arn = aws_lb.main.arn
      port              = 443
      protocol          = "HTTPS"
      ssl_policy        = "ELBSecurityPolicy-TLS13-1-2-2021-06"
      certificate_arn   = var.certificate_arn

      default_action {
        type = "fixed-response"
        fixed_response {
          content_type = "text/plain"
          message_body = "Not Found"
          status_code  = "404"
        }
      }
    }

    resource "aws_lb_target_group" "app" {
      name     = "${var.environment}-app-tg"
      port     = var.app_port
      protocol = "HTTP"
      vpc_id   = var.vpc_id

      health_check {
        path     = var.health_check_path
        matcher  = "200-299"
        interval = 30
      }

      lifecycle {
        create_before_destroy = true
      }
    }

    resource "aws_lb_listener_rule" "app" {
      listener_arn = aws_lb_listener.https.arn
      priority     = 100

      action {
        type             = "forward"
        target_group_arn = aws_lb_target_group.app.arn
      }

      condition {
        host_header {
          values = var.app_host_headers
        }
      }
    }
  security.tf: |
    resource "aws_security_group" "alb" {
      name        = "${var.environment}-alb-sg"
      description = "Security group for Application Load Balancer"
      vpc_id      = var.vpc_id

      lifecycle {
        create_before_destroy = true
      }
    }

    resource "aws_security_group_rule" "alb_https_ingress" {
      type              = "ingress"
      from_port         = 443
      to_port           = 443
      protocol          = "tcp"
      cidr_blocks       = ["0.0.0.0/0"]
      security_group_id = aws_security_group.alb.id
    }
  nlb.tf: |
    resource "aws_lb" "network" {
      name               = "${var.environment}-nlb"
      internal           = true
      load_balancer_type = "network"
      subnets            = var.private_subnet_ids
    }

    resource "aws_lb_target_group" "tcp" {
      name     = "${var.environment}-tcp-tg"
      port     = 9000
      protocol = "TCP"
      vpc_id   = var.vpc_id
    }
  cdn.tf: |
    resource "aws_cloudfront_distribution" "main" {
      enabled = true

      origin {
        domain_name = aws_lb.main.dns_name
        origin_id   = "ALB"

        custom_origin_config {
          http_port              = 80
          https_port             = 443
          origin_protocol_policy = "https-only"
          origin_ssl_protocols   = ["TLSv1.2"]
        }
      }

      default_cache_behavior {
        target_origin_id       = "ALB"
        viewer_protocol_policy = "redirect-to-https"
        allowed_methods        = ["GET", "HEAD"]
        cached_methods         = ["GET", "HEAD"]

        forwarded_values {
          query_string = false
          cookies {
            forward = "none"
          }
        }
      }

      restrictions {
        geo_restriction {
          restriction_type = "none"
        }
      }

      viewer_certificate {
        acm_certificate_arn = var.certificate_arn
        ssl_support_method  = "sni-only"
      }
    }

must_include_files:
# Unchanged SG file that the ALB references via security_groups
- security.tf

must_include_content_from:
  security.tf:
    # Reviewer needs the SG definition to verify what traffic the ALB allows
    - resource "aws_security_group" "alb" {
    - from_port         = 443

must_not_include:
# NLB is a different load balancer type entirely
- load_balancer_type = "network"
- protocol = "TCP"
# CDN references ALB but is about caching, not LB configuration
- aws_cloudfront_distribution
- origin_protocol_policy

must_not_include_files:
- nlb.tf  # different LB type (network vs application)
- cdn.tf  # references ALB but different concern (CDN/caching)

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
