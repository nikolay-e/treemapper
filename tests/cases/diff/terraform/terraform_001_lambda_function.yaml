must_include_files:
- infrastructure/lambda.tf

must_include_content_from:
  infrastructure/lambda.tf:
    - handler       = "main.handler"
    - runtime       = "python3.9"
    - timeout       = 60
    - memory_size   = 256
    - LOG_LEVEL    = "INFO"
    - API_ENDPOINT = var.api_endpoint
    - subnet_ids         = module.vpc.private_subnet_ids

must_not_include:
  # worker_lambda.tf: deploys a different function (worker-handler), doesn't answer
  # questions about api-handler's new runtime, VPC, or env var configuration
  - worker-handler
  - QUEUE_URL
  # scheduled_lambda.tf: deploys yet another function (scheduled-task), unrelated
  # to the api-handler being changed
  - scheduled-task
  - SCHEDULE

must_not_include_files:
- infrastructure/worker_lambda.tf
- infrastructure/scheduled_lambda.tf

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
