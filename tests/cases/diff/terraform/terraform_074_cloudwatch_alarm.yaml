# === Assertions ===

must_include_files:
- monitoring.tf

must_include_content_from:
  monitoring.tf:
    - alarm_name          = "critical-cpu"
    - evaluation_periods  = 1
    - period              = 60
    - threshold           = 90
    - 'resource "aws_cloudwatch_metric_alarm" "cpu"'

must_not_include:
# Tricky garbage: sibling .tf with same resource type
- GARBAGE_TF_074_MEMORY_ALARM_MARKER_A
- GARBAGE_TF_074_CW_AGENT_MARKER_B
# Plain garbage
- GARBAGE_TF_074_SCHEDULER_MARKER_C
- GARBAGE_TF_074_INTERVAL_MARKER_D
- GARBAGE_TF_074_QUEUE_MARKER_E

must_not_include_files:
- garbage_cw_memory.tf
- garbage_scheduler.py
- src/metrics.py

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
