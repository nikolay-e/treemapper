      vpc_id      = module.vpc.vpc_id

      ingress_rules = [
        {
          from_port       = 5432
          to_port         = 5432
          protocol        = "tcp"
          security_groups = [module.app_sg.security_group_id]
          description     = "PostgreSQL from application tier"
        }
      ]

      egress_rules = []

      tags = local.common_tags
    }
  infrastructure/bastion_sg.tf: |
    module "bastion_sg" {
