initial:
  modules/security_group/main.tf: |
    resource "aws_security_group" "this" {
      name        = var.name
      description = var.description
      vpc_id      = var.vpc_id

      dynamic "ingress" {
        for_each = var.ingress_rules
        content {
          from_port       = ingress.value.from_port
          to_port         = ingress.value.to_port
          protocol        = ingress.value.protocol
          cidr_blocks     = ingress.value.cidr_blocks
          security_groups = ingress.value.security_groups
          description     = ingress.value.description
        }
      }

      dynamic "egress" {
        for_each = var.egress_rules
        content {
          from_port       = egress.value.from_port
          to_port         = egress.value.to_port
          protocol        = egress.value.protocol
          cidr_blocks     = egress.value.cidr_blocks
          security_groups = egress.value.security_groups
          description     = egress.value.description
        }
      }

      tags = merge(var.tags, { Name = var.name })
    }
  modules/security_group/variables.tf: |
    variable "name" {
      type = string
    }

    variable "description" {
      type    = string
      default = "Managed by Terraform"
    }

    variable "vpc_id" {
      type = string
    }

    variable "ingress_rules" {
      type = list(object({
        from_port       = number
        to_port         = number
        protocol        = string
        cidr_blocks     = optional(list(string), [])
        security_groups = optional(list(string), [])
        description     = optional(string, "")
      }))
      default = []
    }

    variable "egress_rules" {
      type = list(object({
        from_port       = number
        to_port         = number
        protocol        = string
        cidr_blocks     = optional(list(string), [])
        security_groups = optional(list(string), [])
        description     = optional(string, "")
      }))
      default = [{
        from_port   = 0
        to_port     = 0
        protocol    = "-1"
        cidr_blocks = ["0.0.0.0/0"]
        description = "Allow all outbound traffic"
      }]
    }

    variable "tags" {
      type    = map(string)
      default = {}
    }
  modules/security_group/outputs.tf: |
    output "security_group_id" {
      value = aws_security_group.this.id
    }

    output "security_group_arn" {
      value = aws_security_group.this.arn
    }
  infrastructure/security.tf: |
    module "web_sg" {
      source      = "./modules/security_group"
      name        = "web-sg-${var.environment}"
      description = "Security group for web servers"
      vpc_id      = module.vpc.vpc_id

      tags = local.common_tags
    }

  # --- Tricky garbage: sibling module call with same security_group module and ingress_rules ---
  infrastructure/bastion_sg.tf: |
    GARBAGE_TF_SG008_BASTION_MARKER_A = "bastion-sg"
    GARBAGE_TF_SG008_BASTION_FLAG_B = true

    module "bastion_sg" {
      source      = "./modules/security_group"
      name        = "bastion-sg-${var.environment}"
      description = "Security group for bastion hosts"
      vpc_id      = module.vpc.vpc_id

      ingress_rules = [
        {
          from_port   = 22
          to_port     = 22
          protocol    = "tcp"
          cidr_blocks = var.admin_cidr_blocks
          description = "SSH from admin IPs - GARBAGE_TF_SG008_BASTION_MARKER_A"
        }
      ]

      tags = merge(local.common_tags, {
        Role = "bastion-GARBAGE_TF_SG008_BASTION_FLAG_B"
      })
    }

  # --- Tricky garbage: same aws_security_group resource type for monitoring ---
  infrastructure/monitoring_sg.tf: |
    GARBAGE_TF_SG008_MONITOR_MARKER_C = "monitoring-sg"
    GARBAGE_TF_SG008_MONITOR_FLAG_D = 9090

    resource "aws_security_group" "monitoring" {
      name        = "${var.environment}-monitoring-sg"
      description = "Security group for monitoring stack"
      vpc_id      = module.vpc.vpc_id

      ingress {
        from_port   = 9090
        to_port     = 9090
        protocol    = "tcp"
        cidr_blocks = var.monitoring_cidr_blocks
        description = "Prometheus - GARBAGE_TF_SG008_MONITOR_MARKER_C"
      }

      ingress {
        from_port   = 3000
        to_port     = 3000
        protocol    = "tcp"
        cidr_blocks = var.monitoring_cidr_blocks
        description = "Grafana - GARBAGE_TF_SG008_MONITOR_FLAG_D"
      }

      egress {
        from_port   = 0
        to_port     = 0
        protocol    = "-1"
        cidr_blocks = ["0.0.0.0/0"]
      }

      tags = merge(local.common_tags, {
        Name = "${var.environment}-monitoring-sg"
      })
    }

  unrelated/waf.tf: |
    # GARBAGE_TF_WAF_448_001
    resource "aws_wafv2_web_acl" "unrelated_waf" {
      name  = "GARBAGE_WAF_ACL_448_002"
      scope = "REGIONAL"

      default_action {
        allow {}
      }

      visibility_config {
        cloudwatch_metrics_enabled = false
        metric_name               = "GARBAGE_WAF_METRIC_448_003"
        sampled_requests_enabled  = false
      }
    }
  unrelated/shield.tf: |
    # GARBAGE_TF_SHIELD_448_004
    resource "aws_shield_protection" "unrelated_shield" {
      name         = "GARBAGE_SHIELD_448_005"
      resource_arn = "arn:aws:elasticloadbalancing:us-east-1:123456789:loadbalancer/app/GARBAGE_ALB_448_006/1234567890"
    }

    variable "GARBAGE_SHIELD_VAR_448_007" {
      default = "unrelated-shield-config"
    }
