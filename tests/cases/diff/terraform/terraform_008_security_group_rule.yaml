must_include_files:
# Unchanged module source needed to verify dynamic ingress/egress blocks
- modules/security_group/main.tf

must_include_content_from:
  modules/security_group/main.tf:
    # Reviewer needs the module to verify security_groups param is supported
    - security_groups = ingress.value.security_groups
    - dynamic "ingress" {

must_not_include:
# Bastion SG uses same module but for SSH admin access
- admin_cidr_blocks
- bastion-sg
# Monitoring SG is raw resource, not using the module
- monitoring-sg
- Prometheus
# WAF is web security but a different AWS service
- aws_wafv2_web_acl

must_not_include_files:
- infrastructure/bastion_sg.tf  # same module, SSH concern, not in diff
- infrastructure/monitoring_sg.tf  # raw SG resource, monitoring concern
- infrastructure/waf.tf  # different AWS service entirely

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
