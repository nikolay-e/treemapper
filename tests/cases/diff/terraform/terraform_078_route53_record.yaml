# === Assertions ===

must_include_files:
- dns.tf

must_include_content_from:
  dns.tf:
    - name                   = aws_lb.main.dns_name
    - zone_id                = aws_lb.main.zone_id
    - evaluate_target_health = true
    - 'resource "aws_route53_record" "www"'

must_not_include:
# Tricky garbage: sibling .tf with same resource type
- GARBAGE_TF_078_MX_RECORD_MARKER_A
- GARBAGE_TF_078_MAIL_MARKER_B
# Plain garbage
- GARBAGE_TF_078_LOGGER_MARKER_C
- GARBAGE_TF_078_LEVEL_MARKER_D
- GARBAGE_TF_078_FORMAT_MARKER_E

must_not_include_files:
- garbage_dns_mx.tf
- garbage_logger.py
- src/health.py

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
