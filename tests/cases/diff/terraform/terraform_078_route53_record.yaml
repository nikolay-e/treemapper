# Scenario: Changing a Route53 A record from static IP to an ALB alias.
# Reviewer questions:
#   1. What ALB is being aliased? (alb.tf)
#   2. What health check was there before? (dns.tf - TTL and static IP are removed)
# Traps:
#   - mail/dns.tf: MX and SPF records in the same zone (same zone_id, different record type)
#   - src/health.py: health check code (mentions domain but is application code)

initial:
  dns.tf: |
    resource "aws_route53_record" "www" {
      zone_id = aws_route53_zone.main.zone_id
      name    = "www.example.com"
      type    = "A"
      ttl     = 300
      records = ["1.2.3.4"]
    }
  alb.tf: |
    resource "aws_lb" "main" {
      name               = "app-alb"
      internal           = false
      load_balancer_type = "application"
      subnets            = var.public_subnet_ids
    }
  src/health.py: |
    import requests

    def check_domain(domain: str) -> bool:
        try:
            r = requests.get(f"https://{domain}/health")
            return r.status_code == 200
        except Exception:
            return False
  mail/dns.tf: |
    resource "aws_route53_record" "mx" {
      zone_id = aws_route53_zone.main.zone_id
      name    = "example.com"
      type    = "MX"
      ttl     = 3600
      records = ["10 mail.example.com"]
    }

    resource "aws_route53_record" "spf" {
      zone_id = aws_route53_zone.main.zone_id
      name    = "example.com"
      type    = "TXT"
      ttl     = 3600
      records = ["v=spf1 include:_spf.google.com ~all"]
    }

changed:
  dns.tf: |
    resource "aws_route53_record" "www" {
      zone_id = aws_route53_zone.main.zone_id
      name    = "www.example.com"
      type    = "A"

      alias {
        name                   = aws_lb.main.dns_name
        zone_id                = aws_lb.main.zone_id
        evaluate_target_health = true
      }
    }

must_include_files:
  - dns.tf
  - alb.tf

must_include_content_from:
  dns.tf:
    - name                   = aws_lb.main.dns_name
    - zone_id                = aws_lb.main.zone_id
    - evaluate_target_health = true
  alb.tf:
    - resource "aws_lb" "main" {
    - name               = "app-alb"

must_not_include:
  # MX/SPF records - same zone but for email, not web traffic
  - type    = "MX"
  - _spf.google.com
  # Health check code - mentions domains but is application code, not infrastructure
  - check_domain

must_not_include_files:
  - mail/dns.tf
  - src/health.py

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
