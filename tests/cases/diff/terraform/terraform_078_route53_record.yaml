initial:
  dns.tf: |
    resource "aws_route53_record" "www" {
      zone_id = "Z123456"
      name    = "www.example.com"
      type    = "A"
      ttl     = 300
      records = ["1.2.3.4"]
    }
  src/health.py: |
    import requests

    def check_domain(domain: str) -> bool:
        try:
            r = requests.get(f"https://{domain}/health")
            return r.status_code == 200
        except Exception:
            return False

  # --- Tricky garbage: sibling .tf with same aws_route53_record resource type ---
  garbage_dns_mx.tf: |
    GARBAGE_TF_078_MX_RECORD_MARKER_A = "mail-exchange"
    GARBAGE_TF_078_MAIL_MARKER_B = "priority-10"

    resource "aws_route53_record" "mx" {
      zone_id = "Z123456"
      name    = "example.com"
      type    = "MX"
      ttl     = 3600
      records = ["10 mail.example.com"]
    }

    resource "aws_route53_record" "spf" {
      zone_id = "Z123456"
      name    = "example.com"
      type    = "TXT"
      ttl     = 3600
      records = ["v=spf1 include:_spf.google.com ~all"]
    }

  # --- Plain garbage: no overlap ---
  garbage_logger.py: |
    GARBAGE_TF_078_LOGGER_MARKER_C = "structured-logging"
    GARBAGE_TF_078_LEVEL_MARKER_D = "INFO"

    class StructuredLogger:
        GARBAGE_TF_078_FORMAT_MARKER_E = True

        def log(self, level: str, message: str) -> None:
            pass

