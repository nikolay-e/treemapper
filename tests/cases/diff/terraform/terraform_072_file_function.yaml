      name   = "ecs-task-policy"
      role   = aws_iam_role.ecs_task.id
      policy = file("${path.module}/policies/ecs-permissions.json")
    }

  # --- Plain garbage: no overlap ---
  garbage_step_functions.tf: |
    GARBAGE_TF_072_SFN_MARKER_C = "step-functions"
    GARBAGE_TF_072_SFN_MARKER_D = "state-machine"

    resource "aws_sfn_state_machine" "order_flow" {
      name     = "order-processing"
      role_arn = aws_iam_role.sfn.arn
      definition = jsonencode({
        StartAt = "ProcessOrder"
        States = {
          ProcessOrder = {
            Type = "Task"
            End  = true
          }
        }
      })
    }

# === Assertions ===

must_include_files:
- main.tf

must_include_content_from:
  main.tf:
    - 'resource "aws_iam_role_policy" "lambda_vpc"'
    - file("${path.module}/policies/lambda-vpc.json")
    - 'resource "aws_iam_role" "lambda"'

must_not_include:
# Tricky garbage markers (sibling aws_iam_role resource)
- GARBAGE_TF_072_ECSROLE_MARKER_A
- GARBAGE_TF_072_ECSROLE_MARKER_B
# Plain garbage markers
- GARBAGE_TF_072_SFN_MARKER_C
- GARBAGE_TF_072_SFN_MARKER_D

must_not_include_files:
- garbage_ecs_role.tf
- garbage_step_functions.tf
- policies/assume-role.json

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
