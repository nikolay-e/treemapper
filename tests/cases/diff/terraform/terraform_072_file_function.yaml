initial:
  main.tf: |
    resource "aws_iam_role" "lambda" {
      name               = "lambda-exec-role"
      assume_role_policy = file("${path.module}/policies/assume-role.json")
    }

    resource "aws_iam_role_policy" "lambda" {
      name   = "lambda-policy"
      role   = aws_iam_role.lambda.id
      policy = file("${path.module}/policies/lambda-permissions.json")
    }

  policies/assume-role.json: |
    {
      "Version": "2012-10-17",
      "Statement": [{
        "Effect": "Allow",
        "Principal": { "Service": "lambda.amazonaws.com" },
        "Action": "sts:AssumeRole"
      }]
    }

  policies/lambda-permissions.json: |
    {
      "Version": "2012-10-17",
      "Statement": [{
        "Effect": "Allow",
        "Action": ["logs:CreateLogGroup", "logs:CreateLogStream"],
        "Resource": "arn:aws:logs:*:*:*"
      }]
    }

  # --- Tricky garbage: same resource type aws_iam_role but for ECS ---
  garbage_ecs_role.tf: |
    GARBAGE_TF_072_ECSROLE_MARKER_A = "ecs-task-role"
    GARBAGE_TF_072_ECSROLE_MARKER_B = "ecs-execution"

    resource "aws_iam_role" "ecs_task" {
      name               = "ecs-task-role"
      assume_role_policy = file("${path.module}/policies/ecs-assume.json")
    }

    resource "aws_iam_role_policy" "ecs_task" {
      name   = "ecs-task-policy"
      role   = aws_iam_role.ecs_task.id
      policy = file("${path.module}/policies/ecs-permissions.json")
    }

  # --- Plain garbage: no overlap ---
  garbage_step_functions.tf: |
    GARBAGE_TF_072_SFN_MARKER_C = "step-functions"
    GARBAGE_TF_072_SFN_MARKER_D = "state-machine"

    resource "aws_sfn_state_machine" "order_flow" {
      name     = "order-processing"
      role_arn = aws_iam_role.sfn.arn
      definition = jsonencode({
        StartAt = "ProcessOrder"
        States = {
          ProcessOrder = {
            Type = "Task"
            End  = true
          }
        }
      })
    }

