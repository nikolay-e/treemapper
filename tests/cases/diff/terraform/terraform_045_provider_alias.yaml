# Scenario: Adding cross-region S3 replication using a provider alias
#   for the destination region, with IAM role and replication policy.
# Reviewer questions:
#   1. Where is the "west" provider alias defined? (providers.tf -- new file)
#   2. What is the existing primary bucket being replicated? (main.tf has aws_s3_bucket.main)
# Traps:
#   - providers_staging.tf: staging env also defines a "west" alias but for different regions
#   - dr_replication.tf: DynamoDB DR replication also references aws.west (same alias, unrelated service)

max_enrichment: 4.8
initial:
  main.tf: |
    resource "aws_s3_bucket" "main" {
      bucket = "my-bucket"

      tags = {
        Name = "primary-data"
      }
    }
  providers_staging.tf: |
    provider "aws" {
      region = "eu-west-1"

      default_tags {
        tags = {
          Environment = "staging"
          ManagedBy   = "terraform"
        }
      }
    }

    provider "aws" {
      alias  = "west"
      region = "eu-west-2"

      default_tags {
        tags = {
          Environment = "staging"
          ManagedBy   = "terraform"
        }
      }
    }

    resource "aws_s3_bucket" "staging_main" {
      bucket = "staging-my-bucket"
    }

    resource "aws_s3_bucket" "staging_replica" {
      provider = aws.west
      bucket   = "staging-my-bucket-replica"
    }

    resource "aws_s3_bucket_replication_configuration" "staging" {
      bucket = aws_s3_bucket.staging_main.id
      role   = aws_iam_role.staging_replication.arn

      rule {
        destination {
          bucket = aws_s3_bucket.staging_replica.arn
        }
      }
    }

    resource "aws_iam_role" "staging_replication" {
      name = "staging-s3-replication-role"

      assume_role_policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect    = "Allow"
          Principal = { Service = "s3.amazonaws.com" }
          Action    = "sts:AssumeRole"
        }]
      })
    }
  dr_replication.tf: |
    resource "aws_dynamodb_table" "dr_replica" {
      provider     = aws.west
      name         = "dr-replica-table"
      billing_mode = "PAY_PER_REQUEST"
      hash_key     = "id"

      attribute {
        name = "id"
        type = "S"
      }

      tags = {
        Purpose = "disaster-recovery"
      }
    }

    resource "aws_sns_topic" "dr_alerts" {
      provider = aws.west
      name     = "dr-failover-alerts"
    }

changed:
  main.tf: |
    resource "aws_s3_bucket" "main" {
      bucket = "my-bucket"

      tags = {
        Name = "primary-data"
      }
    }

    resource "aws_s3_bucket" "replica" {
      provider = aws.west
      bucket   = "my-bucket-replica"
    }

    resource "aws_s3_bucket_replication_configuration" "main" {
      bucket = aws_s3_bucket.main.id
      role   = aws_iam_role.replication.arn

      rule {
        destination {
          bucket = aws_s3_bucket.replica.arn
        }
      }
    }

    resource "aws_iam_role" "replication" {
      name = "s3-replication-role"

      assume_role_policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect    = "Allow"
          Principal = { Service = "s3.amazonaws.com" }
          Action    = "sts:AssumeRole"
        }]
      })
    }

    resource "aws_iam_role_policy" "replication" {
      name = "s3-replication-policy"
      role = aws_iam_role.replication.id

      policy = jsonencode({
        Version = "2012-10-17"
        Statement = [
          {
            Effect   = "Allow"
            Action   = ["s3:GetReplicationConfiguration", "s3:ListBucket"]
            Resource = aws_s3_bucket.main.arn
          },
          {
            Effect   = "Allow"
            Action   = ["s3:GetObjectVersionForReplication", "s3:GetObjectVersionAcl"]
            Resource = "${aws_s3_bucket.main.arn}/*"
          },
          {
            Effect   = "Allow"
            Action   = ["s3:ReplicateObject", "s3:ReplicateDelete", "s3:ReplicateTags"]
            Resource = "${aws_s3_bucket.replica.arn}/*"
          }
        ]
      })
    }
  providers.tf: |
    provider "aws" {
      region = "us-east-1"
    }

    provider "aws" {
      alias  = "west"
      region = "us-west-2"
    }

# providers.tf is a new file (only in changed), so it is part of the diff.
# The diff itself shows the replica bucket referencing aws.west and the new
# provider file. No unchanged context files are strictly needed here, but
# the changed files must appear.
must_include_files:
  - main.tf
  - providers.tf

must_include_content:
  - provider = aws.west
  - alias  = "west"
  - resource "aws_s3_bucket_replication_configuration" "main" {

must_not_include:
  # Staging providers - same "west" alias but staging environment, different regions
  - staging-my-bucket
  - staging-s3-replication-role
  # DR replication - uses same aws.west alias but for DynamoDB, not S3
  - dr-replica-table
  - dr-failover-alerts

must_not_include_files:
  - providers_staging.tf
  - dr_replication.tf

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
