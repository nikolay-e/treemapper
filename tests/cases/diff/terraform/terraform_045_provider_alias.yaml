initial:
  main.tf: |
    resource "aws_s3_bucket" "main" {
      bucket = "my-bucket"
    }

  # --- Tricky garbage: staging providers with same alias pattern, different regions ---
  providers_staging.tf: |
    GARBAGE_TF_prov485c_STAGING_PROVIDERS = "staging-providers"
    GARBAGE_TF_prov485c_STAGING_ALIAS = true

    provider "aws" {
      region = "eu-west-1"

      default_tags {
        tags = {
          Environment = "staging"
          ManagedBy   = "terraform"
        }
      }
    }

    provider "aws" {
      alias  = "west"
      region = "eu-west-2"

      default_tags {
        tags = {
          Environment = "staging"
          ManagedBy   = "terraform"
        }
      }
    }

    resource "aws_s3_bucket" "staging_main" {
      bucket = "staging-my-bucket"
    }

    resource "aws_s3_bucket" "staging_replica" {
      provider = aws.west
      bucket   = "staging-my-bucket-replica"
    }

    resource "aws_s3_bucket_replication_configuration" "staging" {
      bucket = aws_s3_bucket.staging_main.id
      role   = aws_iam_role.staging_replication.arn

      rule {
        destination {
          bucket = aws_s3_bucket.staging_replica.arn
        }
      }
    }

    resource "aws_iam_role" "staging_replication" {
      name = "staging-s3-replication-role"

      assume_role_policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect    = "Allow"
          Principal = { Service = "s3.amazonaws.com" }
          Action    = "sts:AssumeRole"
        }]
      })
    }

  # --- Tricky garbage: sibling module calling same provider alias ---
  dr_replication_GARBAGE_TF_prov485d.tf: |
    GARBAGE_TF_prov485d_DR_REPLICATION = "disaster-recovery"
    GARBAGE_TF_prov485d_DR_CROSS_REGION = true

    resource "aws_dynamodb_table" "dr_replica" {
      provider     = aws.west
      name         = "dr-replica-table"
      billing_mode = "PAY_PER_REQUEST"
      hash_key     = "id"

      attribute {
        name = "id"
        type = "S"
      }

      tags = {
        Purpose = "disaster-recovery"
      }
    }

    resource "aws_sns_topic" "dr_alerts" {
      provider = aws.west
      name     = "dr-failover-alerts"

      tags = {
        Purpose = "disaster-recovery"
      }
    }

changed:
  main.tf: |
    resource "aws_s3_bucket" "main" {
      bucket = "my-bucket"
    }

    resource "aws_s3_bucket" "replica" {
      provider = aws.west
      bucket   = "my-bucket-replica"
    }

    resource "aws_s3_bucket_replication_configuration" "main" {
      bucket = aws_s3_bucket.main.id
      role   = aws_iam_role.replication.arn

      rule {
        destination {
          bucket = aws_s3_bucket.replica.arn
        }
      }
    }

    resource "aws_iam_role" "replication" {
      name = "s3-replication-role"

      assume_role_policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect    = "Allow"
          Principal = { Service = "s3.amazonaws.com" }
          Action    = "sts:AssumeRole"
        }]
      })
    }

    resource "aws_iam_role_policy" "replication" {
      name = "s3-replication-policy"
      role = aws_iam_role.replication.id

      policy = jsonencode({
        Version = "2012-10-17"
        Statement = [
          {
            Effect = "Allow"
            Action = [
              "s3:GetReplicationConfiguration",
              "s3:ListBucket"
            ]
            Resource = aws_s3_bucket.main.arn
          },
          {
            Effect = "Allow"
            Action = [
              "s3:GetObjectVersionForReplication",
              "s3:GetObjectVersionAcl",
              "s3:GetObjectVersionTagging"
            ]
            Resource = "${aws_s3_bucket.main.arn}/*"
          },
          {
            Effect = "Allow"
            Action = [
              "s3:ReplicateObject",
              "s3:ReplicateDelete",
              "s3:ReplicateTags"
            ]
            Resource = "${aws_s3_bucket.replica.arn}/*"
          }
        ]
      })
    }
  providers.tf: |
    provider "aws" {
      region = "us-east-1"
    }

    provider "aws" {
      alias  = "west"
      region = "us-west-2"
    }

  # --- Tricky garbage: staging providers with same alias pattern, different regions ---
  providers_staging.tf: |
    GARBAGE_TF_prov485c_STAGING_PROVIDERS = "staging-providers"
    GARBAGE_TF_prov485c_STAGING_ALIAS = true

    provider "aws" {
      region = "eu-west-1"

      default_tags {
        tags = {
          Environment = "staging"
          ManagedBy   = "terraform"
        }
      }
    }

    provider "aws" {
      alias  = "west"
      region = "eu-west-2"

      default_tags {
        tags = {
          Environment = "staging"
          ManagedBy   = "terraform"
        }
      }
    }

    resource "aws_s3_bucket" "staging_main" {
      bucket = "staging-my-bucket"
    }

    resource "aws_s3_bucket" "staging_replica" {
      provider = aws.west
      bucket   = "staging-my-bucket-replica"
    }

    resource "aws_s3_bucket_replication_configuration" "staging" {
      bucket = aws_s3_bucket.staging_main.id
      role   = aws_iam_role.staging_replication.arn

      rule {
        destination {
          bucket = aws_s3_bucket.staging_replica.arn
        }
      }
    }

    resource "aws_iam_role" "staging_replication" {
      name = "staging-s3-replication-role"

      assume_role_policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect    = "Allow"
          Principal = { Service = "s3.amazonaws.com" }
          Action    = "sts:AssumeRole"
        }]
      })
    }

  # --- Tricky garbage: sibling module calling same provider alias ---
  dr_replication_GARBAGE_TF_prov485d.tf: |
    GARBAGE_TF_prov485d_DR_REPLICATION = "disaster-recovery"
    GARBAGE_TF_prov485d_DR_CROSS_REGION = true

    resource "aws_dynamodb_table" "dr_replica" {
      provider     = aws.west
      name         = "dr-replica-table"
      billing_mode = "PAY_PER_REQUEST"
      hash_key     = "id"

      attribute {
        name = "id"
        type = "S"
      }

