# === Assertions ===

must_include_files:
- main.tf
- providers.tf

must_include_content_from:
  main.tf:
    - resource "aws_s3_bucket" "replica" {
    - provider = aws.west
    - resource "aws_s3_bucket_replication_configuration" "main" {
    - resource "aws_iam_role" "replication" {
    - resource "aws_iam_role_policy" "replication" {
  providers.tf:
    - provider "aws" {
    - alias  = "west"
    - region = "us-west-2"

must_not_include:
# Tricky: staging providers with same alias pattern
- GARBAGE_TF_prov485c_STAGING_PROVIDERS
- GARBAGE_TF_prov485c_STAGING_ALIAS
# Tricky: sibling module calling same provider alias
- GARBAGE_TF_prov485d_DR_REPLICATION
- GARBAGE_TF_prov485d_DR_CROSS_REGION

must_not_include_files:
- providers_staging.tf
- dr_replication_GARBAGE_TF_prov485d.tf

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
