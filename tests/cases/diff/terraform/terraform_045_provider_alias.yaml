name: terraform_045_provider_alias
repo:
  initial_files:
    main.tf: |
      resource "aws_s3_bucket" "main" {
        bucket = "my-bucket"

        tags = {
          Name = "primary-data"
        }
      }
    providers_staging.tf: |
      provider "aws" {
        region = "eu-west-1"

        default_tags {
          tags = {
            Environment = "staging"
            ManagedBy   = "terraform"
          }
        }
      }

      provider "aws" {
        alias  = "west"
        region = "eu-west-2"

        default_tags {
          tags = {
            Environment = "staging"
            ManagedBy   = "terraform"
          }
        }
      }

      resource "aws_s3_bucket" "staging_main" {
        bucket = "staging-my-bucket"
      }

      resource "aws_s3_bucket" "staging_replica" {
        provider = aws.west
        bucket   = "staging-my-bucket-replica"
      }

      resource "aws_s3_bucket_replication_configuration" "staging" {
        bucket = aws_s3_bucket.staging_main.id
        role   = aws_iam_role.staging_replication.arn

        rule {
          destination {
            bucket = aws_s3_bucket.staging_replica.arn
          }
        }
      }

      resource "aws_iam_role" "staging_replication" {
        name = "staging-s3-replication-role"

        assume_role_policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Effect    = "Allow"
            Principal = { Service = "s3.amazonaws.com" }
            Action    = "sts:AssumeRole"
          }]
        })
      }
    dr_replication.tf: |
      resource "aws_dynamodb_table" "dr_replica" {
        provider     = aws.west
        name         = "dr-replica-table"
        billing_mode = "PAY_PER_REQUEST"
        hash_key     = "id"

        attribute {
          name = "id"
          type = "S"
        }

        tags = {
          Purpose = "disaster-recovery"
        }
      }

      resource "aws_sns_topic" "dr_alerts" {
        provider = aws.west
        name     = "dr-failover-alerts"
      }
  changed_files:
    main.tf: |
      resource "aws_s3_bucket" "main" {
        bucket = "my-bucket"

        tags = {
          Name = "primary-data"
        }
      }

      resource "aws_s3_bucket" "replica" {
        provider = aws.west
        bucket   = "my-bucket-replica"
      }

      resource "aws_s3_bucket_replication_configuration" "main" {
        bucket = aws_s3_bucket.main.id
        role   = aws_iam_role.replication.arn

        rule {
          destination {
            bucket = aws_s3_bucket.replica.arn
          }
        }
      }

      resource "aws_iam_role" "replication" {
        name = "s3-replication-role"

        assume_role_policy = jsonencode({
          Version = "2012-10-17"
          Statement = [{
            Effect    = "Allow"
            Principal = { Service = "s3.amazonaws.com" }
            Action    = "sts:AssumeRole"
          }]
        })
      }

      resource "aws_iam_role_policy" "replication" {
        name = "s3-replication-policy"
        role = aws_iam_role.replication.id

        policy = jsonencode({
          Version = "2012-10-17"
          Statement = [
            {
              Effect   = "Allow"
              Action   = ["s3:GetReplicationConfiguration", "s3:ListBucket"]
              Resource = aws_s3_bucket.main.arn
            },
            {
              Effect   = "Allow"
              Action   = ["s3:GetObjectVersionForReplication", "s3:GetObjectVersionAcl"]
              Resource = "${aws_s3_bucket.main.arn}/*"
            },
            {
              Effect   = "Allow"
              Action   = ["s3:ReplicateObject", "s3:ReplicateDelete", "s3:ReplicateTags"]
              Resource = "${aws_s3_bucket.replica.arn}/*"
            }
          ]
        })
      }
    providers.tf: |
      provider "aws" {
        region = "us-east-1"
      }

      provider "aws" {
        alias  = "west"
        region = "us-west-2"
      }
  commit_message: Update files
fragments:
- id: main_file
  selector:
    path: main.tf
- id: providers_file
  selector:
    path: providers.tf
- id: req_global_0
  selector:
    anchor: provider = aws.west
- id: req_global_1
  selector:
    anchor: alias  = "west"
- id: req_global_2
  selector:
    anchor: resource "aws_s3_bucket_replication_configuration" "main" {
- id: no_providers_staging
  selector:
    path: providers_staging.tf
- id: no_dr_replication
  selector:
    path: dr_replication.tf
- id: no_global_0
  selector:
    anchor: staging-my-bucket
- id: no_global_1
  selector:
    anchor: staging-s3-replication-role
- id: no_global_2
  selector:
    anchor: dr-replica-table
- id: no_global_3
  selector:
    anchor: dr-failover-alerts
oracle:
  required:
  - main_file
  - providers_file
  - req_global_0
  - req_global_1
  - req_global_2
  allowed: []
  forbidden:
  - no_providers_staging
  - no_dr_replication
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
