initial:
  main.tf: |
    # Managed resources

  # --- Tricky garbage: sibling .tf with import block for different resource ---
  garbage_tf_055_import_rds.tf: |
    GARBAGE_TF_055_IMPORT_RDS_A = "rds_import"
    GARBAGE_TF_055_DB_EXISTING_B = "legacy-database"

    import {
      to = aws_db_instance.legacy
      id = "legacy-database"
    }

    resource "aws_db_instance" "legacy" {
      identifier     = "legacy-database"
      engine         = "mysql"
      instance_class = "db.t3.medium"
    }

  # --- Plain garbage ---
  garbage_tf_055_alb.tf: |
    GARBAGE_TF_055_ALB_NAME_C = "app-lb"
    GARBAGE_TF_055_ALB_INTERNAL_D = false

    resource "aws_lb" "app" {
      name               = "app-lb"
      internal           = false
      load_balancer_type = "application"
    }

changed:
  main.tf: |
    import {
      to = aws_s3_bucket.existing
      id = "my-existing-bucket"
    }

    resource "aws_s3_bucket" "existing" {
      bucket = "my-existing-bucket"

      tags = {
        ManagedBy = "terraform"
      }
    }

  garbage_tf_055_import_rds.tf: |
    GARBAGE_TF_055_IMPORT_RDS_A = "rds_import"
    GARBAGE_TF_055_DB_EXISTING_B = "legacy-database"

    import {
      to = aws_db_instance.legacy
      id = "legacy-database"
    }

    resource "aws_db_instance" "legacy" {
      identifier     = "legacy-database"
      engine         = "mysql"
      instance_class = "db.t3.medium"
    }

  garbage_tf_055_alb.tf: |
    GARBAGE_TF_055_ALB_NAME_C = "app-lb"
    GARBAGE_TF_055_ALB_INTERNAL_D = false

    resource "aws_lb" "app" {
      name               = "app-lb"
      internal           = false
      load_balancer_type = "application"
    }

must_include_files:
- main.tf

must_include_content_from:
  main.tf:
    - to = aws_s3_bucket.existing
    - id = "my-existing-bucket"
    - resource "aws_s3_bucket" "existing" {
    - ManagedBy = "terraform"

must_not_include:
- GARBAGE_TF_055_IMPORT_RDS_A
- GARBAGE_TF_055_DB_EXISTING_B
- GARBAGE_TF_055_ALB_NAME_C
- GARBAGE_TF_055_ALB_INTERNAL_D

must_not_include_files:
- garbage_tf_055_import_rds.tf
- garbage_tf_055_alb.tf

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
