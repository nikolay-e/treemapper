# Scenario: Using an import block to bring an existing S3 bucket under
#   Terraform management without recreating it.
#
# Reviewer questions:
#   Q1: "What tags are applied to mark it as managed?"
#       -> main.tf shows ManagedBy = "terraform" and Imported = "true" tags.
#   Q2: "Is there a policy for this bucket?"
#       -> policy.tf has an existing policy for my-existing-bucket that
#         enforces HTTPS-only access. Reviewer must verify compatibility.
#   Q3: "Are there other resources referencing this bucket?"
#       -> cloudfront.tf (UNCHANGED) has a CloudFront distribution using
#         this bucket as origin. Shows downstream dependency.
#
# Not needed:
#   - database/import.tf: Also has an import block but for RDS. HARD TRAP:
#     same import {} block syntax, same pattern. Different resource type.
#
#   - logs/import.tf: Another import block for an S3 logging bucket.
#     HARDEST TRAP: same import block AND same resource type (S3 bucket).
#     But it's a different bucket for a different purpose (logging).
#
#   - alb.tf: ALB resource. Unrelated to S3 import.
#
#   - backup/s3.tf: S3 bucket for backups. Same resource type, same
#     directory pattern. But different bucket, different purpose.

max_enrichment: 16.0
initial:
  main.tf: |
    # Managed S3 resources
  policy.tf: |
    data "aws_iam_policy_document" "bucket_policy" {
      statement {
        effect    = "Deny"
        actions   = ["s3:*"]
        resources = ["arn:aws:s3:::my-existing-bucket/*"]
        principals {
          type        = "*"
          identifiers = ["*"]
        }
        condition {
          test     = "Bool"
          variable = "aws:SecureTransport"
          values   = ["false"]
        }
      }
    }

    resource "aws_s3_bucket_policy" "existing" {
      bucket = "my-existing-bucket"
      policy = data.aws_iam_policy_document.bucket_policy.json
    }
  cloudfront.tf: |
    resource "aws_cloudfront_distribution" "website" {
      enabled             = true
      default_root_object = "index.html"

      origin {
        domain_name = "my-existing-bucket.s3.amazonaws.com"
        origin_id   = "S3-my-existing-bucket"

        s3_origin_config {
          origin_access_identity = aws_cloudfront_origin_access_identity.main.cloudfront_access_identity_path
        }
      }

      default_cache_behavior {
        allowed_methods  = ["GET", "HEAD"]
        cached_methods   = ["GET", "HEAD"]
        target_origin_id = "S3-my-existing-bucket"

        viewer_protocol_policy = "redirect-to-https"
        forwarded_values {
          query_string = false
          cookies { forward = "none" }
        }
      }

      restrictions {
        geo_restriction { restriction_type = "none" }
      }

      viewer_certificate {
        cloudfront_default_certificate = true
      }
    }
  database/import.tf: |
    import {
      to = aws_db_instance.legacy
      id = "legacy-database"
    }

    resource "aws_db_instance" "legacy" {
      identifier     = "legacy-database"
      engine         = "mysql"
      instance_class = "db.t3.medium"

      tags = {
        ManagedBy = "terraform"
        Imported  = "true"
      }
    }
  logs/import.tf: |
    import {
      to = aws_s3_bucket.access_logs
      id = "access-logs-bucket"
    }

    resource "aws_s3_bucket" "access_logs" {
      bucket = "access-logs-bucket"

      tags = {
        ManagedBy = "terraform"
        Purpose   = "access-logging"
      }
    }
  alb.tf: |
    resource "aws_lb" "app" {
      name               = "app-lb"
      internal           = false
      load_balancer_type = "application"
      subnets            = var.public_subnet_ids
    }
  backup/s3.tf: |
    resource "aws_s3_bucket" "backups" {
      bucket = "app-backups-bucket"

      tags = {
        Purpose = "database-backups"
      }
    }

    resource "aws_s3_bucket_versioning" "backups" {
      bucket = aws_s3_bucket.backups.id
      versioning_configuration {
        status = "Enabled"
      }
    }

changed:
  main.tf: |
    import {
      to = aws_s3_bucket.existing
      id = "my-existing-bucket"
    }

    resource "aws_s3_bucket" "existing" {
      bucket = "my-existing-bucket"

      tags = {
        ManagedBy = "terraform"
        Imported  = "true"
      }
    }

must_include_files:
  - main.tf
  # Q2: Policy enforcing HTTPS on the imported bucket
  - policy.tf
  # Q3: CloudFront distribution using this bucket as origin
  - cloudfront.tf

must_include_content_from:
  main.tf:
    - to = aws_s3_bucket.existing
    - id = "my-existing-bucket"
    - ManagedBy = "terraform"
  policy.tf:
    - arn:aws:s3:::my-existing-bucket/*
    - aws:SecureTransport
  cloudfront.tf:
    - my-existing-bucket.s3.amazonaws.com
    - S3-my-existing-bucket

must_not_include:
  # --- database/import.tf: same import block but for RDS ---
  - legacy-database
  - aws_db_instance.legacy
  # --- logs/import.tf: same import + same resource type (S3) ---
  - access-logs-bucket
  - aws_s3_bucket.access_logs
  - access-logging
  # --- alb.tf: unrelated load balancer ---
  - app-lb
  - load_balancer_type
  # --- backup/s3.tf: different S3 bucket for backups ---
  - app-backups-bucket
  - database-backups
  - versioning_configuration

must_not_include_files:
  - database/import.tf
  - logs/import.tf
  - alb.tf
  - backup/s3.tf

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
