# Scenario: Marking variables as sensitive and adding new sensitive variables
#   for API key and SSL certificate.
#
# Reviewer questions:
#   Q1: "Where are these sensitive variables consumed?"
#       -> main.tf uses var.db_password in RDS and the new vars will be
#         consumed by the Lambda and ALB resources.
#   Q2: "How are secrets stored/passed?"
#       -> terraform.tfvars.example shows the variable pattern.
#   Q3: "Are the new api_key and ssl_certificate already referenced?"
#       -> main.tf has a Lambda that will use api_key and ALB that will
#         use ssl_certificate. Reviewer needs to see the consumers.
#
# Not needed:
#   - payment/secrets.tf: Also has sensitive variables but for payment.
#     HARD TRAP: same sensitive = true pattern, same variable blocks,
#     same security concern. But payment service is a different domain.
#
#   - secrets_manager.tf: AWS Secrets Manager resources that store secrets.
#     Same security domain (secrets). HARD TRAP: references "api_key" and
#     "ssl_certificate" as Secrets Manager secret names. But the Secret
#     Manager resource stores values, it doesn't consume the variables.
#
#   - networking/vpc.tf: VPC config. No connection to sensitive variables.
#
#   - outputs.tf: Exports resource attributes. Contains a sensitive output
#     for db_connection_string. Same sensitive keyword, but outputs are
#     different from variable declarations.
#
#   - ci/pipeline.tf: CI/CD pipeline that passes secrets as environment
#     variables. References var.db_password. HARD TRAP: uses the same
#     variable. But pipeline is a CI concern, not the core consumer.

max_enrichment: 15.4
initial:
  variables.tf: |
    variable "db_password" {
      type = string
    }

    variable "db_host" {
      type    = string
      default = "db.internal"
    }

    variable "environment" {
      type    = string
      default = "production"
    }
  main.tf: |
    resource "aws_db_instance" "main" {
      identifier = "app-db"
      engine     = "postgres"
      password   = var.db_password
      username   = "admin"

      tags = {
        Environment = var.environment
      }
    }

    resource "aws_lambda_function" "api" {
      function_name = "api-handler"
      runtime       = "python3.11"
      handler       = "main.handler"
      role          = aws_iam_role.lambda.arn
      filename      = "lambda.zip"

      environment {
        variables = {
          DB_HOST = var.db_host
        }
      }
    }

    resource "aws_lb_listener" "https" {
      load_balancer_arn = aws_lb.main.arn
      port              = 443
      protocol          = "HTTPS"

      default_action {
        type             = "forward"
        target_group_arn = aws_lb_target_group.app.arn
      }
    }
  terraform.tfvars.example: |
    db_password     = "CHANGEME"
    db_host         = "db.internal"
    api_key         = "CHANGEME"
    ssl_certificate = "arn:aws:acm:..."
  payment/secrets.tf: |
    variable "stripe_api_key" {
      type      = string
      sensitive = true
    }

    variable "sendgrid_token" {
      type      = string
      sensitive = true
    }

    variable "payment_webhook_secret" {
      type      = string
      sensitive = true
    }
  secrets_manager.tf: |
    resource "aws_secretsmanager_secret" "api_key" {
      name = "app/api_key"
    }

    resource "aws_secretsmanager_secret" "ssl_certificate" {
      name = "app/ssl_certificate"
    }

    resource "aws_secretsmanager_secret_version" "api_key" {
      secret_id     = aws_secretsmanager_secret.api_key.id
      secret_string = var.api_key
    }
  networking/vpc.tf: |
    resource "aws_vpc" "main" {
      cidr_block           = "10.0.0.0/16"
      enable_dns_hostnames = true
    }

    resource "aws_subnet" "private" {
      count      = 2
      vpc_id     = aws_vpc.main.id
      cidr_block = cidrsubnet("10.0.0.0/16", 8, count.index + 100)
    }
  outputs.tf: |
    output "db_endpoint" {
      value = aws_db_instance.main.endpoint
    }

    output "db_connection_string" {
      value     = "postgres://admin:${var.db_password}@${aws_db_instance.main.endpoint}/appdb"
      sensitive = true
    }

    output "lambda_arn" {
      value = aws_lambda_function.api.arn
    }
  ci/pipeline.tf: |
    resource "aws_codebuild_project" "deploy" {
      name = "deploy-pipeline"

      environment {
        type  = "LINUX_CONTAINER"
        image = "aws/codebuild/standard:7.0"

        environment_variable {
          name  = "DB_PASSWORD"
          value = var.db_password
          type  = "PARAMETER_STORE"
        }
      }

      source {
        type     = "GITHUB"
        location = "https://github.com/org/repo.git"
      }
    }

changed:
  variables.tf: |
    variable "db_password" {
      type      = string
      sensitive = true
    }

    variable "db_host" {
      type    = string
      default = "db.internal"
    }

    variable "environment" {
      type    = string
      default = "production"
    }

    variable "api_key" {
      type      = string
      sensitive = true
    }

    variable "ssl_certificate" {
      type      = string
      sensitive = true
    }

must_include_files:
  - variables.tf
  # Q1+Q3: Resources that consume these variables
  - main.tf

must_include_content_from:
  variables.tf:
    - sensitive = true
    - variable "api_key" {
    - variable "ssl_certificate" {
    - variable "db_password" {
  main.tf:
    - password   = var.db_password
    - DB_HOST = var.db_host

must_not_include:
  # --- payment/secrets.tf: same sensitive pattern, different domain ---
  - stripe_api_key
  - sendgrid_token
  - payment_webhook_secret
  # --- secrets_manager.tf: stores secrets but has same var names ---
  - aws_secretsmanager_secret
  - "app/api_key"
  - "app/ssl_certificate"
  # --- networking/vpc.tf: no connection to sensitive variables ---
  - 10.0.0.0/16
  - aws_subnet
  # --- outputs.tf: sensitive output but different concern ---
  - output "db_connection_string"
  - output "lambda_arn"
  # --- ci/pipeline.tf: uses var.db_password but is CI concern ---
  - aws_codebuild_project
  - PARAMETER_STORE

must_not_include_files:
  - payment/secrets.tf
  - secrets_manager.tf
  - networking/vpc.tf
  - outputs.tf
  - ci/pipeline.tf

max_fragments: 5
max_files: 2
add_garbage_files: false
skip_garbage_check: true
