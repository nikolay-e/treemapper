# Scenario: Upgrading an ECS task definition - new image version, doubled resources,
#   added log configuration, and production environment variables via jsonencode.
# Reviewer questions:
#   1. What ECS service runs this task? (service.tf)
#   2. What log group receives the container logs? (logging.tf)
# Traps:
#   - scheduler/task.tf: another ECS task definition using jsonencode (same pattern, different service)
#   - storage/backups.tf: S3 bucket (unrelated to ECS)

max_enrichment: 6.9
initial:
  ecs.tf: |
    resource "aws_ecs_task_definition" "worker" {
      family = "worker"
      container_definitions = jsonencode([{
        name      = "worker"
        image     = "worker:latest"
        cpu       = 256
        memory    = 512
        essential = true
        environment = [
          { name = "APP_ENV", value = "staging" }
        ]
      }])
    }
  service.tf: |
    resource "aws_ecs_service" "worker" {
      name            = "worker-service"
      cluster         = aws_ecs_cluster.main.id
      task_definition = aws_ecs_task_definition.worker.arn
      desired_count   = 2

      network_configuration {
        subnets         = var.private_subnet_ids
        security_groups = [aws_security_group.worker.id]
      }
    }
  logging.tf: |
    resource "aws_cloudwatch_log_group" "ecs_worker" {
      name              = "/ecs/worker"
      retention_in_days = 14
    }
  scheduler/task.tf: |
    resource "aws_ecs_task_definition" "scheduler" {
      family = "scheduler"
      container_definitions = jsonencode([{
        name      = "scheduler"
        image     = "scheduler:latest"
        cpu       = 128
        memory    = 256
        essential = true
      }])
    }
  storage/backups.tf: |
    resource "aws_s3_bucket" "backups" {
      bucket = "app-backups-bucket"
    }

changed:
  ecs.tf: |
    resource "aws_ecs_task_definition" "worker" {
      family = "worker"
      container_definitions = jsonencode([{
        name      = "worker"
        image     = "worker:v2"
        cpu       = 512
        memory    = 1024
        essential = true
        environment = [
          { name = "APP_ENV", value = "production" },
          { name = "LOG_FORMAT", value = "json" }
        ]
        logConfiguration = {
          logDriver = "awslogs"
          options = {
            "awslogs-group"  = "/ecs/worker"
            "awslogs-region" = "us-east-1"
          }
        }
      }])
    }

must_include_files:
  - ecs.tf
  - service.tf
  - logging.tf

must_include_content_from:
  ecs.tf:
    - image     = "worker:v2"
    - cpu       = 512
    - logDriver = "awslogs"
  service.tf:
    - resource "aws_ecs_service" "worker" {
    - aws_ecs_task_definition.worker.arn
  logging.tf:
    - name              = "/ecs/worker"

must_not_include:
  # Scheduler task - same resource type and jsonencode pattern but different service
  - scheduler
  # S3 backups - unrelated storage, no connection to ECS task changes
  - app-backups-bucket

must_not_include_files:
  - scheduler/task.tf
  - storage/backups.tf

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
