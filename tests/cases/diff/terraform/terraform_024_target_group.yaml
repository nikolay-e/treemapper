# Scenario: Add an ALB target group with health check for the app
#
# Reviewer questions:
#   1. What ALB does this target group attach to? (aws_lb.main)
#   2. What health check path and thresholds? (/health, 2/10)
#   3. What port and protocol? (8080, HTTP)
#
# The diff adds aws_lb_target_group "app" to lb.tf with health check
# configuration referencing the existing ALB.
#
# Traps: admin_target.tf has same target group type but for admin panel
# on port 9090. app.py has the /health endpoint but is application code.

initial:
  lb.tf: |
    resource "aws_lb" "main" {
      name = "main-alb"
    }

  # Trap: admin target group, same type, different port/path
  admin_target.tf: |
    resource "aws_lb_target_group" "admin" {
      name        = "admin-tg"
      port        = 9090
      protocol    = "HTTP"
      vpc_id      = aws_vpc.main.id
      target_type = "ip"

      health_check {
        path                = "/admin/health"
        healthy_threshold   = 3
        unhealthy_threshold = 5
        timeout             = 10
        interval            = 60
      }
    }

  # Trap: app code with the health endpoint (not Terraform)
  app.py: |
    from flask import Flask
    app = Flask(__name__)

    @app.route('/health')
    def health():
        return 'OK', 200

changed:
  lb.tf: |
    resource "aws_lb" "main" {
      name = "main-alb"
    }

    resource "aws_lb_target_group" "app" {
      name        = "app-tg"
      port        = 8080
      protocol    = "HTTP"
      vpc_id      = aws_vpc.main.id
      target_type = "ip"

      health_check {
        path                = "/health"
        healthy_threshold   = 2
        unhealthy_threshold = 10
        timeout             = 5
        interval            = 30
      }
    }

  admin_target.tf: |
    resource "aws_lb_target_group" "admin" {
      name        = "admin-tg"
      port        = 9090
      protocol    = "HTTP"
      vpc_id      = aws_vpc.main.id
      target_type = "ip"

      health_check {
        path                = "/admin/health"
        healthy_threshold   = 3
        unhealthy_threshold = 5
        timeout             = 10
        interval            = 60
      }
    }

  app.py: |
    from flask import Flask
    app = Flask(__name__)

    @app.route('/health')
    def health():
        return 'OK', 200

must_include_files:
- lb.tf

must_include_content_from:
  lb.tf:
    - resource "aws_lb_target_group" "app" {
    - 'path                = "/health"'

must_not_include:
# Admin target group is same type but for admin panel (different port/path)
- admin-tg
- /admin/health
- port        = 9090
# App code is application layer, not Terraform
- from flask import Flask
- '@app.route'

must_not_include_files:
- admin_target.tf  # same resource type, different target (admin)
- app.py  # application code, not Terraform

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
