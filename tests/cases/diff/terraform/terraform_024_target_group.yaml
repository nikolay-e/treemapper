initial:
  app.py: |
    from flask import Flask
    app = Flask(__name__)

    @app.route('/health')
    def health():
        return 'OK', 200
  lb.tf: |
    resource "aws_lb" "main" {
      name = "main-alb"
    }

  # --- Tricky garbage: same resource type aws_lb_target_group but for admin panel ---
  admin_target.tf: |
    GARBAGE_TF_024_ADMIN_TG_A = "admin-panel"
    GARBAGE_TF_024_ADMIN_PORT_B = 9090

    resource "aws_lb_target_group" "admin" {
      name        = "admin-tg"
      port        = 9090
      protocol    = "HTTP"
      vpc_id      = aws_vpc.main.id
      target_type = "ip"

      health_check {
        path                = "/admin/health"
        healthy_threshold   = 3
        unhealthy_threshold = 5
        timeout             = 10
        interval            = 60
      }
    }

  # --- Plain garbage ---
  garbage_config_loader.yaml: |
    # GARBAGE_TF_024_CONFIG_LOADER_C
    # GARBAGE_TF_024_CONFIG_VERSION_D
    service:
      name: legacy-config
      port: 3000

changed:
  app.py: |
    from flask import Flask
    app = Flask(__name__)

    @app.route('/health')
    def health():
        return 'OK', 200
  lb.tf: |
    resource "aws_lb" "main" {
      name = "main-alb"
    }

    resource "aws_lb_target_group" "app" {
      name        = "app-tg"
      port        = 8080
      protocol    = "HTTP"
      vpc_id      = aws_vpc.main.id
      target_type = "ip"

      health_check {
        path                = "/health"
        healthy_threshold   = 2
        unhealthy_threshold = 10
        timeout             = 5
        interval            = 30
      }
    }

  admin_target.tf: |
    GARBAGE_TF_024_ADMIN_TG_A = "admin-panel"
    GARBAGE_TF_024_ADMIN_PORT_B = 9090

    resource "aws_lb_target_group" "admin" {
      name        = "admin-tg"
      port        = 9090
      protocol    = "HTTP"
      vpc_id      = aws_vpc.main.id
      target_type = "ip"

      health_check {
        path                = "/admin/health"
        healthy_threshold   = 3
        unhealthy_threshold = 5
        timeout             = 10
        interval            = 60
      }
    }

  garbage_config_loader.yaml: |
    # GARBAGE_TF_024_CONFIG_LOADER_C
    # GARBAGE_TF_024_CONFIG_VERSION_D
    service:
      name: legacy-config
      port: 3000

must_include_files:
- lb.tf

must_include_content_from:
  lb.tf:
    - resource "aws_lb_target_group" "app" {
    - 'path                = "/health"'

must_not_include:
- GARBAGE_TF_024_ADMIN_TG_A
- GARBAGE_TF_024_ADMIN_PORT_B
- GARBAGE_TF_024_CONFIG_LOADER_C
- GARBAGE_TF_024_CONFIG_VERSION_D

must_not_include_files:
- admin_target.tf
- garbage_config_loader.yaml

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
