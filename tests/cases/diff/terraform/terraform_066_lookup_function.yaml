# Scenario: Adding a lookup-based volume size map alongside the existing instance
#   type map, and upgrading the prod instance type.
# Reviewer questions:
#   1. What variable defines the environment selection? (main.tf has var.environment)
#   2. How are these locals consumed by the instance? (main.tf shows the resource)
# Traps:
#   - monitoring/instances.tf: another aws_instance using lookup (same pattern, different role)
#   - certificates/acm.tf: ACM certificate (unrelated to instance sizing)

max_enrichment: 7.4
initial:
  main.tf: |
    variable "environment" {
      type    = string
      default = "dev"
    }

    locals {
      instance_types = {
        dev     = "t3.micro"
        staging = "t3.small"
        prod    = "t3.large"
      }
    }

    resource "aws_instance" "app" {
      ami           = "ami-12345678"
      instance_type = lookup(local.instance_types, var.environment, "t3.micro")
      tags = {
        Name = "app-${var.environment}"
      }
    }
  monitoring/instances.tf: |
    resource "aws_instance" "monitoring" {
      ami           = "ami-99887766"
      instance_type = lookup(local.monitoring_types, var.environment, "t3.micro")
      tags = {
        Name = "monitoring-${var.environment}"
      }
    }
  certificates/acm.tf: |
    resource "aws_acm_certificate" "main" {
      domain_name       = "example.com"
      validation_method = "DNS"
    }

changed:
  main.tf: |
    variable "environment" {
      type    = string
      default = "dev"
    }

    locals {
      instance_types = {
        dev     = "t3.micro"
        staging = "t3.small"
        prod    = "t3.xlarge"
      }

      volume_sizes = {
        dev     = 20
        staging = 50
        prod    = 100
      }
    }

    resource "aws_instance" "app" {
      ami           = "ami-12345678"
      instance_type = lookup(local.instance_types, var.environment, "t3.micro")
      root_block_device {
        volume_size = lookup(local.volume_sizes, var.environment, 20)
      }
      tags = {
        Name = "app-${var.environment}"
      }
    }

must_include_files:
  - main.tf

must_include_content_from:
  main.tf:
    - prod    = "t3.xlarge"
    - volume_sizes = {
    - lookup(local.volume_sizes, var.environment, 20)
    - 'resource "aws_instance" "app"'

must_not_include:
  # Monitoring instance - also uses lookup() but for a different instance role
  - monitoring_types
  - monitoring-${var.environment}
  # ACM certificate - SSL cert unrelated to instance sizing
  - aws_acm_certificate

must_not_include_files:
  - monitoring/instances.tf
  - certificates/acm.tf

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
