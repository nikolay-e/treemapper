initial:
  main.tf: |
    variable "environment" {
      default = "dev"
    }

    locals {
      instance_types = {
        dev     = "t3.micro"
        staging = "t3.small"
        prod    = "t3.large"
      }
    }

    resource "aws_instance" "app" {
      ami           = "ami-12345678"
      instance_type = lookup(local.instance_types, var.environment, "t3.micro")
      tags = {
        Name = "app-${var.environment}"
      }
    }

  # --- Tricky garbage: same resource type aws_instance but for monitoring ---
  garbage_monitoring_instance.tf: |
    GARBAGE_TF_066_MON_MARKER_A = "monitoring-instance"
    GARBAGE_TF_066_MON_MARKER_B = "grafana-host"

    resource "aws_instance" "monitoring" {
      ami           = "ami-99887766"
      instance_type = lookup(local.monitoring_types, var.environment, "t3.micro")
      tags = {
        Name = "monitoring-${var.environment}"
      }
    }

  # --- Plain garbage: no overlap ---
  garbage_certificate.tf: |
    GARBAGE_TF_066_CERT_MARKER_C = "acm-certificate"
    GARBAGE_TF_066_CERT_MARKER_D = "ssl-domain"

    resource "aws_acm_certificate" "main" {
      domain_name       = "example.com"
      validation_method = "DNS"
    }

changed:
  main.tf: |
    variable "environment" {
      default = "dev"
    }

    locals {
      instance_types = {
        dev     = "t3.micro"
        staging = "t3.small"
        prod    = "t3.xlarge"
      }

      volume_sizes = {
        dev     = 20
        staging = 50
        prod    = 100
      }
    }

    resource "aws_instance" "app" {
      ami           = "ami-12345678"
      instance_type = lookup(local.instance_types, var.environment, "t3.micro")
      root_block_device {
        volume_size = lookup(local.volume_sizes, var.environment, 20)
      }
      tags = {
        Name = "app-${var.environment}"
      }
    }

  # --- Tricky garbage: same resource type aws_instance but for monitoring ---
  garbage_monitoring_instance.tf: |
    GARBAGE_TF_066_MON_MARKER_A = "monitoring-instance"
    GARBAGE_TF_066_MON_MARKER_B = "grafana-host"

    resource "aws_instance" "monitoring" {
      ami           = "ami-99887766"
      instance_type = lookup(local.monitoring_types, var.environment, "t3.micro")
      tags = {
        Name = "monitoring-${var.environment}"
      }
    }

  # --- Plain garbage: no overlap ---
  garbage_certificate.tf: |
    GARBAGE_TF_066_CERT_MARKER_C = "acm-certificate"
    GARBAGE_TF_066_CERT_MARKER_D = "ssl-domain"

    resource "aws_acm_certificate" "main" {
      domain_name       = "example.com"
      validation_method = "DNS"
    }

# === Assertions ===

must_include_files:
- main.tf

must_include_content_from:
  main.tf:
    - prod    = "t3.xlarge"
    - volume_sizes = {
    - lookup(local.volume_sizes, var.environment, 20)
    - 'resource "aws_instance" "app"'

must_not_include:
# Tricky garbage markers (sibling aws_instance resource)
- GARBAGE_TF_066_MON_MARKER_A
- GARBAGE_TF_066_MON_MARKER_B
# Plain garbage markers
- GARBAGE_TF_066_CERT_MARKER_C
- GARBAGE_TF_066_CERT_MARKER_D

must_not_include_files:
- garbage_monitoring_instance.tf
- garbage_certificate.tf

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
