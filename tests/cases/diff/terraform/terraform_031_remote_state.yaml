# Scenario: Migrating terraform backend from local to S3 with DynamoDB
#   state locking and encryption.
# Reviewer questions:
#   1. What S3 bucket stores the state? (my-terraform-state)
#   2. Is state locking configured? (dynamodb_table = "terraform-locks")
# Traps:
#   - staging/backend.tf: similar S3 backend but for staging environment (different bucket)
#   - scripts/migrate_state.sh: operational migration script (not config)

max_enrichment: 4.7
initial:
  backend.tf: |
    terraform {
      backend "local" {}
    }
  staging/backend.tf: |
    terraform {
      backend "s3" {
        bucket = "staging-terraform-state"
        key    = "staging/terraform.tfstate"
        region = "eu-west-1"
      }
    }
  scripts/migrate_state.sh: |
    #!/bin/bash
    set -euo pipefail
    echo "Migrating Terraform state to S3..."
    terraform init -migrate-state
    echo "State migration complete"

changed:
  backend.tf: |
    terraform {
      backend "s3" {
        bucket         = "my-terraform-state"
        key            = "prod/terraform.tfstate"
        region         = "us-east-1"
        encrypt        = true
        dynamodb_table = "terraform-locks"
      }
    }

# The diff is self-contained: backend.tf changes from local to S3.
# No unchanged files are needed for understanding the migration.
must_include_files:
  - backend.tf

must_include_content:
  - backend "s3" {
  - bucket         = "my-terraform-state"
  - dynamodb_table = "terraform-locks"
  - encrypt        = true

must_not_include:
  # Staging backend is same pattern but different environment
  - staging-terraform-state
  - staging/terraform.tfstate
  - eu-west-1
  # Migration script is operational, not Terraform config
  - terraform init -migrate-state

must_not_include_files:
  - staging/backend.tf
  - scripts/migrate_state.sh

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
