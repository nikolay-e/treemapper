# Scenario: Adding a cloud-config part and resizing the web instance
#   in a cloudinit_config data source.
# Reviewer questions:
#   1. What existing shell script is already included as the first part? (scripts/setup.sh)
#   2. What instance consumes this cloud-init config? (cloud_init.tf has the instance inline)
# Traps:
#   - bastion.tf: another aws_instance in the same directory (same resource type, unrelated host)
#   - monitoring/logging.tf: CloudWatch log group (shares infra directory, unrelated concern)

initial:
  cloud_init.tf: |
    data "cloudinit_config" "web" {
      gzip          = true
      base64_encode = true

      part {
        content_type = "text/x-shellscript"
        content      = file("${path.module}/scripts/setup.sh")
      }
    }

    resource "aws_instance" "web" {
      ami           = "ami-12345678"
      instance_type = "t3.micro"
      user_data     = data.cloudinit_config.web.rendered
    }
  scripts/setup.sh: |
    #!/bin/bash
    yum update -y
    yum install -y amazon-cloudwatch-agent
    systemctl start amazon-cloudwatch-agent
  bastion.tf: |
    resource "aws_instance" "bastion" {
      ami           = "ami-99887766"
      instance_type = "t3.nano"
      tags = {
        Name = "bastion-host"
        Role = "jumpbox"
      }
    }
  monitoring/logging.tf: |
    resource "aws_cloudwatch_log_group" "app_logs" {
      name              = "/app/logs"
      retention_in_days = 30
    }

changed:
  cloud_init.tf: |
    data "cloudinit_config" "web" {
      gzip          = true
      base64_encode = true

      part {
        content_type = "text/x-shellscript"
        content      = file("${path.module}/scripts/setup.sh")
      }

      part {
        content_type = "text/cloud-config"
        content      = yamlencode({
          packages = ["nginx", "docker.io"]
          runcmd   = ["systemctl start nginx"]
        })
      }
    }

    resource "aws_instance" "web" {
      ami           = "ami-12345678"
      instance_type = "t3.small"
      user_data     = data.cloudinit_config.web.rendered
    }

# scripts/setup.sh is unchanged but a reviewer needs it to understand what
# the existing first part does and whether the new cloud-config part overlaps
must_include_files:
  - scripts/setup.sh

must_include_content_from:
  scripts/setup.sh:
    - amazon-cloudwatch-agent

must_not_include:
  # Bastion instance - same aws_instance type but different host, no cloud-init dependency
  - bastion-host
  - jumpbox
  # CloudWatch logging - unrelated monitoring config, not part of cloud-init
  - retention_in_days

must_not_include_files:
  - bastion.tf
  - monitoring/logging.tf

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
