# Scenario: Adding automatic secret rotation to a Secrets Manager secret for
#   database credentials with a 30-day rotation schedule.
# Reviewer questions:
#   1. What Lambda function handles the rotation? (rotation.tf)
#   2. What resource uses these credentials? (rds.tf references the secret)
# Traps:
#   - api_keys/secrets.tf: another SM secret with rotation but for API keys (same resource, different secret)
#   - src/secrets.py: application code that reads secrets (consumer, not infrastructure)

initial:
  secrets.tf: |
    resource "aws_secretsmanager_secret" "db_creds" {
      name = "db-credentials"
    }

    resource "aws_secretsmanager_secret_version" "db_creds" {
      secret_id = aws_secretsmanager_secret.db_creds.id
      secret_string = jsonencode({
        username = "admin"
        password = var.db_password
      })
    }
  rotation.tf: |
    resource "aws_lambda_function" "rotate" {
      function_name = "secret-rotation-handler"
      runtime       = "python3.11"
      handler       = "rotation.handler"
      role          = aws_iam_role.rotation.arn
      filename      = "rotation.zip"
      timeout       = 60
    }

    resource "aws_iam_role" "rotation" {
      name = "secret-rotation-role"
      assume_role_policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Action = "sts:AssumeRole"
          Effect = "Allow"
          Principal = { Service = "lambda.amazonaws.com" }
        }]
      })
    }
  rds.tf: |
    resource "aws_db_instance" "main" {
      identifier = "app-db"
      engine     = "postgres"
      username   = jsondecode(aws_secretsmanager_secret_version.db_creds.secret_string)["username"]
      password   = jsondecode(aws_secretsmanager_secret_version.db_creds.secret_string)["password"]
    }
  api_keys/secrets.tf: |
    resource "aws_secretsmanager_secret" "api_keys" {
      name                    = "api-keys"
      recovery_window_in_days = 14
    }

    resource "aws_secretsmanager_secret_rotation" "api_keys" {
      secret_id           = aws_secretsmanager_secret.api_keys.id
      rotation_lambda_arn = aws_lambda_function.rotate_api.arn
      rotation_rules {
        automatically_after_days = 90
      }
    }
  src/secrets.py: |
    import boto3
    import json

    def get_secret(name: str) -> dict:
        sm = boto3.client("secretsmanager")
        response = sm.get_secret_value(SecretId=name)
        return json.loads(response["SecretString"])

changed:
  secrets.tf: |
    resource "aws_secretsmanager_secret" "db_creds" {
      name                    = "db-credentials"
      recovery_window_in_days = 0
    }

    resource "aws_secretsmanager_secret_version" "db_creds" {
      secret_id = aws_secretsmanager_secret.db_creds.id
      secret_string = jsonencode({
        username = "admin"
        password = var.db_password
      })
    }

    resource "aws_secretsmanager_secret_rotation" "db_creds" {
      secret_id           = aws_secretsmanager_secret.db_creds.id
      rotation_lambda_arn = aws_lambda_function.rotate.arn
      rotation_rules {
        automatically_after_days = 30
      }
    }

must_include_files:
  - secrets.tf
  - rotation.tf
  - rds.tf

must_include_content_from:
  secrets.tf:
    - recovery_window_in_days = 0
    - 'resource "aws_secretsmanager_secret_rotation" "db_creds"'
    - automatically_after_days = 30
  rotation.tf:
    - resource "aws_lambda_function" "rotate" {
  rds.tf:
    - aws_secretsmanager_secret_version.db_creds.secret_string

must_not_include:
  # API keys secret - same rotation pattern but for API keys, different secret
  - api-keys
  - rotate_api
  # Secrets code - application-level consumer, not infrastructure
  - SecretString

must_not_include_files:
  - api_keys/secrets.tf
  - src/secrets.py

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
