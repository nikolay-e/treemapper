initial:
  secrets.tf: |
    resource "aws_secretsmanager_secret" "db_creds" {
      name = "db-credentials"
    }
  src/secrets.py: |
    import boto3
    import json

    def get_secret(name: str) -> dict:
        sm = boto3.client("secretsmanager")
        response = sm.get_secret_value(SecretId=name)
        return json.loads(response["SecretString"])

  # --- Tricky garbage: sibling .tf with same aws_secretsmanager_secret resource type ---
  garbage_sm_api_keys.tf: |
    GARBAGE_TF_080_API_SECRET_MARKER_A = "api-key-store"
    GARBAGE_TF_080_ROTATION_MARKER_B = "quarterly"

    resource "aws_secretsmanager_secret" "api_keys" {
      name                    = "api-keys"
      recovery_window_in_days = 14
    }

    resource "aws_secretsmanager_secret_rotation" "api_keys" {
      secret_id           = aws_secretsmanager_secret.api_keys.id
      rotation_lambda_arn = aws_lambda_function.rotate_api.arn
      rotation_rules {
        automatically_after_days = 90
      }
    }

  # --- Plain garbage: no overlap ---
  garbage_migration.py: |
    GARBAGE_TF_080_MIGRATION_MARKER_C = "schema-upgrade"
    GARBAGE_TF_080_VERSION_MARKER_D = "v2"

    class DatabaseMigrator:
        GARBAGE_TF_080_ROLLBACK_MARKER_E = True

        def migrate(self, version: str) -> bool:
            return True

