# === Assertions ===

must_include_files:
- secrets.tf

must_include_content_from:
  secrets.tf:
    - name                    = "db-credentials"
    - recovery_window_in_days = 0
    - 'resource "aws_secretsmanager_secret_rotation" "db_creds"'
    - automatically_after_days = 30
    - 'resource "aws_secretsmanager_secret" "db_creds"'

must_not_include:
# Tricky garbage: sibling .tf with same resource type
- GARBAGE_TF_080_API_SECRET_MARKER_A
- GARBAGE_TF_080_ROTATION_MARKER_B
# Plain garbage
- GARBAGE_TF_080_MIGRATION_MARKER_C
- GARBAGE_TF_080_VERSION_MARKER_D
- GARBAGE_TF_080_ROLLBACK_MARKER_E

must_not_include_files:
- garbage_sm_api_keys.tf
- garbage_migration.py
- src/secrets.py

max_fragments: 4
max_files: 1
add_garbage_files: false
skip_garbage_check: true
