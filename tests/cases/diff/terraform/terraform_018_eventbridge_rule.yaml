# Scenario: Add an EventBridge scheduled rule targeting a Lambda function
#
# Reviewer questions:
#   1. What Lambda function is the target? (lambda.tf defines aws_lambda_function.cleanup)
#   2. Does the Lambda's IAM role support being invoked by EventBridge?
#
# The diff adds an EventBridge rule, target, and Lambda permission in events.tf.
# lambda.tf (unchanged) defines the cleanup function being targeted. A reviewer
# needs it to verify the function name and runtime match the target config.
#
# Traps: backup_schedule.tf is same EventBridge pattern but for nightly backups.

max_enrichment: 5.6
initial:
  events.tf: |
    # EventBridge resources
  lambda.tf: |
    resource "aws_lambda_function" "cleanup" {
      function_name = "daily-cleanup"
      handler       = "cleanup.handler"
      runtime       = "python3.11"
      filename      = "cleanup.zip"
      role          = aws_iam_role.cleanup_lambda.arn
    }

    resource "aws_lambda_function" "backup" {
      function_name = "nightly-backup"
      handler       = "backup.handler"
      runtime       = "python3.11"
      filename      = "backup.zip"
      role          = aws_iam_role.backup_lambda.arn
    }
  backup_schedule.tf: |
    resource "aws_cloudwatch_event_rule" "backup" {
      name                = "nightly-backup"
      schedule_expression = "cron(0 4 * * ? *)"
    }

    resource "aws_cloudwatch_event_target" "backup_lambda" {
      rule      = aws_cloudwatch_event_rule.backup.name
      target_id = "backup-lambda"
      arn       = aws_lambda_function.backup.arn
    }

changed:
  events.tf: |
    resource "aws_cloudwatch_event_rule" "schedule" {
      name                = "daily-cleanup"
      schedule_expression = "cron(0 2 * * ? *)"
    }

    resource "aws_cloudwatch_event_target" "lambda" {
      rule      = aws_cloudwatch_event_rule.schedule.name
      target_id = "cleanup-lambda"
      arn       = aws_lambda_function.cleanup.arn
    }

    resource "aws_lambda_permission" "eventbridge" {
      statement_id  = "AllowEventBridge"
      action        = "lambda:InvokeFunction"
      function_name = aws_lambda_function.cleanup.function_name
      principal     = "events.amazonaws.com"
      source_arn    = aws_cloudwatch_event_rule.schedule.arn
    }
  lambda.tf: |
    resource "aws_lambda_function" "cleanup" {
      function_name = "daily-cleanup"
      handler       = "cleanup.handler"
      runtime       = "python3.11"
      filename      = "cleanup.zip"
      role          = aws_iam_role.cleanup_lambda.arn
    }

    resource "aws_lambda_function" "backup" {
      function_name = "nightly-backup"
      handler       = "backup.handler"
      runtime       = "python3.11"
      filename      = "backup.zip"
      role          = aws_iam_role.backup_lambda.arn
    }
  backup_schedule.tf: |
    resource "aws_cloudwatch_event_rule" "backup" {
      name                = "nightly-backup"
      schedule_expression = "cron(0 4 * * ? *)"
    }

    resource "aws_cloudwatch_event_target" "backup_lambda" {
      rule      = aws_cloudwatch_event_rule.backup.name
      target_id = "backup-lambda"
      arn       = aws_lambda_function.backup.arn
    }

must_include_files:
# Unchanged Lambda definition that the EventBridge rule targets
- lambda.tf

must_include_content_from:
  lambda.tf:
    # Reviewer needs the Lambda definition to verify the target
    - resource "aws_lambda_function" "cleanup" {
    - function_name = "daily-cleanup"

must_not_include:
# Backup schedule is same EventBridge pattern but for a different job
- nightly-backup
- backup-lambda
- aws_lambda_function.backup.arn

must_not_include_files:
- backup_schedule.tf  # same EventBridge type, different schedule/target

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
