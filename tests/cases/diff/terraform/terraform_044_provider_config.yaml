# Scenario: Extracting provider configuration into a new providers.tf file
#   with default_tags and assume_role for cross-account access.
#
# Reviewer questions:
#   Q1: "Which resources will inherit the new default_tags?"
#       -> main.tf has instances and buckets that will get auto-tagged.
#   Q2: "What role ARN is being assumed?"
#       -> providers.tf is new, reviewer sees it in diff.
#   Q3: "Do any resources have conflicting tags?"
#       -> main.tf has explicit tags on the instance. Default_tags merge
#         with resource tags, so reviewer needs to check for conflicts.
#
# Not needed:
#   - eu_region/providers.tf: EU region provider with its own assume_role.
#     HARD TRAP: same provider "aws" block, same default_tags structure,
#     same assume_role block. But different region and account.
#
#   - staging/providers.tf: Staging provider with different role ARN.
#     HARD TRAP: identical pattern, same assume_role. But different
#     environment entirely.
#
#   - scripts/provider_check.sh: Shell script that runs terraform providers.
#     Operational tooling, not infrastructure.
#
#   - iam/cross_account.tf: IAM role that matches the assumed role ARN.
#     Direct edge: defines the role being assumed. But IAM role definition
#     is in a different account -- the reviewer needs to verify resources
#     in THIS account, not the trust relationship.
#
#   - outputs.tf: Exports resource ARNs. Same resources as main.tf but
#     doesn't affect tagging behavior.

max_enrichment: 5.6
initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = "ami-12345"
      instance_type = "t3.micro"

      tags = {
        Name = "web-server"
      }
    }

    resource "aws_s3_bucket" "data" {
      bucket = "app-data-bucket"
    }

    resource "aws_s3_bucket" "logs" {
      bucket = "app-logs-bucket"

      tags = {
        Purpose = "logging"
      }
    }
  eu_region/providers.tf: |
    provider "aws" {
      alias  = "eu_west"
      region = "eu-west-1"

      default_tags {
        tags = {
          Environment = "production"
          ManagedBy   = "terraform"
          Region      = "eu"
        }
      }

      assume_role {
        role_arn = "arn:aws:iam::987654321:role/EURole"
      }
    }
  staging/providers.tf: |
    provider "aws" {
      alias  = "staging"
      region = "us-east-1"

      default_tags {
        tags = {
          Environment = "staging"
          ManagedBy   = "terraform"
        }
      }

      assume_role {
        role_arn = "arn:aws:iam::111222333:role/StagingRole"
      }
    }
  scripts/provider_check.sh: |
    #!/bin/bash
    echo "Checking provider versions..."
    terraform providers
    terraform providers lock -platform=linux_amd64
  iam/cross_account.tf: |
    resource "aws_iam_role" "terraform" {
      name = "TerraformRole"

      assume_role_policy = jsonencode({
        Version = "2012-10-17"
        Statement = [{
          Effect    = "Allow"
          Principal = { AWS = "arn:aws:iam::123456789:root" }
          Action    = "sts:AssumeRole"
        }]
      })
    }

    resource "aws_iam_role_policy_attachment" "terraform_admin" {
      role       = aws_iam_role.terraform.name
      policy_arn = "arn:aws:iam::aws:policy/AdministratorAccess"
    }
  outputs.tf: |
    output "instance_id" {
      value = aws_instance.web.id
    }

    output "data_bucket_arn" {
      value = aws_s3_bucket.data.arn
    }

    output "logs_bucket_arn" {
      value = aws_s3_bucket.logs.arn
    }

changed:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = "ami-12345"
      instance_type = "t3.micro"

      tags = {
        Name = "web-server"
      }
    }

    resource "aws_s3_bucket" "data" {
      bucket = "app-data-bucket"
    }

    resource "aws_s3_bucket" "logs" {
      bucket = "app-logs-bucket"

      tags = {
        Purpose = "logging"
      }
    }
  providers.tf: |
    provider "aws" {
      region = "us-east-1"

      default_tags {
        tags = {
          Environment = "production"
          ManagedBy   = "terraform"
        }
      }

      assume_role {
        role_arn = "arn:aws:iam::123456789:role/TerraformRole"
      }
    }

# main.tf is unchanged but a reviewer needs to see which resources will be
# affected by the new provider's default_tags and cross-account assume_role
must_include_files:
  - main.tf

must_include_content_from:
  main.tf:
    - resource "aws_instance" "web" {
    - resource "aws_s3_bucket" "data" {
    - resource "aws_s3_bucket" "logs" {

must_not_include:
  # --- eu_region/providers.tf: same structure, different region/account ---
  - eu_west
  - "987654321"
  - 'Region      = "eu"'
  # --- staging/providers.tf: same pattern, different environment ---
  - 'alias  = "staging"'
  - "111222333"
  - StagingRole
  # --- provider_check.sh: operational tooling ---
  - terraform providers
  - providers lock
  # --- iam/cross_account.tf: IAM role definition, different concern ---
  - assume_role_policy
  - AdministratorAccess
  # --- outputs.tf: exports ARNs, doesn't affect tagging ---
  - output "instance_id"
  - output "data_bucket_arn"

must_not_include_files:
  - eu_region/providers.tf
  - staging/providers.tf
  - scripts/provider_check.sh
  - iam/cross_account.tf
  - outputs.tf

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
