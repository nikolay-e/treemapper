must_include_files:
- providers.tf

must_include_content_from:
  providers.tf:
    - provider "aws" {
    - region = "us-east-1"
    - role_arn = "arn:aws:iam::123456789:role/TerraformRole"

must_not_include:
- GARBAGE_TF_044_EU_PROVIDER_A
- GARBAGE_TF_044_B
- GARBAGE_TF_044_PROVCHECK_C
- GARBAGE_TF_044_PROVCHECK_D

must_not_include_files:
- eu_region/providers_GARBAGE_TF_044_A.tf
- scripts/provider_check_GARBAGE_TF_044_C.sh
- main.tf

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
