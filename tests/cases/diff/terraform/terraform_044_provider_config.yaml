initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami = "ami-12345"
    }
  # --- Tricky garbage: sibling .tf with same provider block for a different provider/region ---
  eu_region/providers_GARBAGE_TF_044_A.tf: |
    # GARBAGE_TF_044_EU_PROVIDER_A - EU region provider config
    provider "aws" {
      alias  = "eu_west_GARBAGE_TF_044_A"
      region = "eu-west-1"

      default_tags {
        tags = {
          Environment = "production"
          ManagedBy   = "terraform"
          Region      = "eu-GARBAGE_TF_044_A"
        }
      }

      assume_role {
        role_arn = "arn:aws:iam::987654321:role/EURole-GARBAGE_TF_044_B"
      }
    }
  # --- Plain garbage: unrelated script ---
  scripts/provider_check_GARBAGE_TF_044_C.sh: |
    #!/bin/bash
    # GARBAGE_TF_044_PROVCHECK_C - Provider version checker
    echo "Checking providers GARBAGE_TF_044_PROVCHECK_D"
    terraform providers

changed:
  main.tf: |
    resource "aws_instance" "web" {
      ami = "ami-12345"
    }
  providers.tf: |
    provider "aws" {
      region = "us-east-1"

      default_tags {
        tags = {
          Environment = "production"
          ManagedBy   = "terraform"
        }
      }

      assume_role {
        role_arn = "arn:aws:iam::123456789:role/TerraformRole"
