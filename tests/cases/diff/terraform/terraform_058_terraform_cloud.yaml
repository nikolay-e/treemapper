# Scenario: Migrating from local backend to Terraform Cloud with
#   organization and workspace tag configuration.
# Reviewer questions:
#   1. What resources will now be managed via TFC state? (main.tf has instance + bucket)
#   2. What was the previous backend? (main.tf had backend "local" -- visible in diff)
# Traps:
#   - envs/staging/cloud.tf: staging TFC config with different org (same cloud block pattern)
#   - networking/eip.tf: EIP resource in same project (no backend relationship)

max_enrichment: 8.6
initial:
  main.tf: |
    terraform {
      backend "local" {}
    }

    resource "aws_instance" "web" {
      ami           = "ami-12345"
      instance_type = "t3.micro"

      tags = {
        Name = "web-server"
      }
    }

    resource "aws_s3_bucket" "data" {
      bucket = "app-data-bucket"
    }
  envs/staging/cloud.tf: |
    terraform {
      cloud {
        organization = "staging-org"

        workspaces {
          tags = ["app:api", "env:staging"]
        }
      }
    }
  networking/eip.tf: |
    resource "aws_eip" "nat" {
      domain = "vpc"
      tags = {
        Name = "nat-gateway-eip"
      }
    }

changed:
  main.tf: |
    terraform {
      cloud {
        organization = "my-org"

        workspaces {
          tags = ["app:web", "env:production"]
        }
      }
    }

    resource "aws_instance" "web" {
      ami           = "ami-12345"
      instance_type = "t3.micro"

      tags = {
        Name = "web-server"
      }
    }

    resource "aws_s3_bucket" "data" {
      bucket = "app-data-bucket"
    }

# The diff is self-contained (main.tf changes from local to cloud).
# No unchanged files are required because the resource blocks in main.tf
# are part of the changed file itself. Assert on the changed file content.
must_include_files:
  - main.tf

must_include_content:
  - organization = "my-org"
  - cloud {

must_not_include:
  # Staging cloud config - same cloud block but different org/environment, no cross-reference
  - staging-org
  - env:staging
  # EIP - unrelated networking resource with no backend dependency
  - nat-gateway-eip

must_not_include_files:
  - envs/staging/cloud.tf
  - networking/eip.tf

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
