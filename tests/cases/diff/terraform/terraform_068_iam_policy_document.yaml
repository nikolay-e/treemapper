name: terraform_068_iam_policy_document
repo:
  initial_files:
    iam.tf: |
      data "aws_iam_policy_document" "lambda_assume" {
        statement {
          actions = ["sts:AssumeRole"]
          principals {
            type        = "Service"
            identifiers = ["lambda.amazonaws.com"]
          }
        }
      }
    main.tf: |
      resource "aws_iam_role" "lambda" {
        name               = "lambda-role"
        assume_role_policy = data.aws_iam_policy_document.lambda_assume.json
      }

      resource "aws_lambda_function" "edge" {
        function_name = "edge-handler"
        role          = aws_iam_role.lambda.arn
        runtime       = "nodejs20.x"
        handler       = "index.handler"
        filename      = "edge.zip"
      }
    cdn.tf: |
      resource "aws_cloudfront_distribution" "main" {
        enabled = true

        default_cache_behavior {
          lambda_function_association {
            event_type   = "viewer-request"
            lambda_arn   = aws_lambda_function.edge.qualified_arn
            include_body = false
          }

          allowed_methods        = ["GET", "HEAD"]
          cached_methods         = ["GET", "HEAD"]
          target_origin_id       = "s3-origin"
          viewer_protocol_policy = "redirect-to-https"
        }

        origin {
          domain_name = "mybucket.s3.amazonaws.com"
          origin_id   = "s3-origin"
        }
      }
    ecs/iam.tf: |
      data "aws_iam_policy_document" "ecs_assume" {
        statement {
          actions = ["sts:AssumeRole"]
          principals {
            type        = "Service"
            identifiers = ["ecs-tasks.amazonaws.com"]
          }
        }
      }
    variables.tf: |
      variable "environment" {
        default = "production"
      }
  changed_files:
    iam.tf: |
      data "aws_iam_policy_document" "lambda_assume" {
        statement {
          actions = ["sts:AssumeRole"]
          principals {
            type        = "Service"
            identifiers = ["lambda.amazonaws.com", "edgelambda.amazonaws.com"]
          }
        }
      }
  commit_message: Update files
fragments:
- id: iam
  selector:
    path: iam.tf
    anchor: '["lambda.amazonaws.com", "edgelambda.amazonaws.com"]'
- id: main
  selector:
    path: main.tf
    anchor: data.aws_iam_policy_document.lambda_assume.json
- id: cdn
  selector:
    path: cdn.tf
    anchor: lambda_function_association {
- id: no_iam
  selector:
    path: ecs/iam.tf
- id: no_variables
  selector:
    path: variables.tf
- id: no_global_0
  selector:
    anchor: ecs-tasks.amazonaws.com
- id: no_global_1
  selector:
    anchor: variable "environment" {
oracle:
  required:
  - iam
  - main
  - cdn
  allowed: []
  forbidden:
  - no_iam
  - no_variables
  - no_global_0
  - no_global_1
