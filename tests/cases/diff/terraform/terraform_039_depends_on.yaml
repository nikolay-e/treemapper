initial:
  main.tf: |
    resource "aws_ecs_service" "app" {
      name = "app-service"
    }
  # --- Tricky garbage: sibling .tf with same depends_on pattern for a different resource ---
  batch/worker_deps_GARBAGE_TF_039_A.tf: |
    # GARBAGE_TF_039_WORKER_DEPS_A - Worker service dependencies
    resource "aws_ecs_service" "worker_GARBAGE_TF_039_A" {
      name = "worker-service-GARBAGE_TF_039_A"

      depends_on = [
        aws_sqs_queue.tasks_GARBAGE_TF_039_A,
        aws_iam_role_policy_attachment.worker_GARBAGE_TF_039_B
      ]
    }

    # GARBAGE_TF_039_WORKER_QUEUE_B
    resource "aws_sqs_queue" "tasks_GARBAGE_TF_039_B" {
      name = "worker-tasks-GARBAGE_TF_039_B"
    }
  # --- Plain garbage: unrelated script ---
  scripts/dep_graph_GARBAGE_TF_039_C.sh: |
    #!/bin/bash
    # GARBAGE_TF_039_DEPGRAPH_C - Dependency graph generator
    echo "Generating dep graph GARBAGE_TF_039_DEPGRAPH_D"
    terraform graph | dot -Tpng > graph.png

changed:
  main.tf: |
    resource "aws_ecs_service" "app" {
      name = "app-service"

      depends_on = [
        aws_lb_listener.https,
        aws_iam_role_policy_attachment.ecs_task
      ]
    }
  batch/worker_deps_GARBAGE_TF_039_A.tf: |
    # GARBAGE_TF_039_WORKER_DEPS_A - Worker service dependencies
    resource "aws_ecs_service" "worker_GARBAGE_TF_039_A" {
      name = "worker-service-GARBAGE_TF_039_A"

      depends_on = [
        aws_sqs_queue.tasks_GARBAGE_TF_039_A,
        aws_iam_role_policy_attachment.worker_GARBAGE_TF_039_B
      ]
    }

    # GARBAGE_TF_039_WORKER_QUEUE_B
    resource "aws_sqs_queue" "tasks_GARBAGE_TF_039_B" {
      name = "worker-tasks-GARBAGE_TF_039_B"
    }
  scripts/dep_graph_GARBAGE_TF_039_C.sh: |
    #!/bin/bash
    # GARBAGE_TF_039_DEPGRAPH_C - Dependency graph generator
    echo "Generating dep graph GARBAGE_TF_039_DEPGRAPH_D"
    terraform graph | dot -Tpng > graph.png

must_include_files:
- main.tf

must_include_content_from:
  main.tf:
    - depends_on = [
    - aws_lb_listener.https,
    - aws_iam_role_policy_attachment.ecs_task

must_not_include:
- GARBAGE_TF_039_WORKER_DEPS_A
- GARBAGE_TF_039_B
- GARBAGE_TF_039_DEPGRAPH_C
- GARBAGE_TF_039_DEPGRAPH_D

must_not_include_files:
- batch/worker_deps_GARBAGE_TF_039_A.tf
- scripts/dep_graph_GARBAGE_TF_039_C.sh

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
