initial:
  main.tf: |
    resource "aws_instance" "web" {
      tags = {
        Name = "web-server"
        Environment = "prod"
      }
    }
  # --- Tricky garbage: sibling .tf with same locals block pattern for a different stack ---
  monitoring/tags_GARBAGE_TF_033_A.tf: |
    # GARBAGE_TF_033_MON_TAGS_A - Monitoring common tags
    locals {
      monitoring_tags_GARBAGE_TF_033_A = {
        Project     = "monitoring"
        Environment = var.environment
        ManagedBy   = "terraform"
      }
    }

    # GARBAGE_TF_033_MON_INSTANCE_B - Monitoring instance
    resource "aws_instance" "grafana_GARBAGE_TF_033_B" {
      ami  = "ami-99999"
      tags = local.monitoring_tags_GARBAGE_TF_033_A
    }
  # --- Plain garbage: unrelated networking config ---
  networking/vpc_GARBAGE_TF_033_C.tf: |
    # GARBAGE_TF_033_VPC_C - VPC configuration
    resource "aws_vpc" "secondary_GARBAGE_TF_033_C" {
      cidr_block           = "172.16.0.0/16"
      enable_dns_hostnames = true
      enable_dns_support   = true

      tags = {
        Name = "secondary-vpc-GARBAGE_TF_033_C"
        Team = "platform-GARBAGE_TF_033_VPC_D"
      }
    }

changed:
  main.tf: |
    locals {
      common_tags = {
        Project     = "myapp"
        Environment = var.environment
        ManagedBy   = "terraform"
      }
    }

    resource "aws_instance" "web" {
      tags = merge(local.common_tags, {
        Name = "web-server"
      })
    }
  monitoring/tags_GARBAGE_TF_033_A.tf: |
    # GARBAGE_TF_033_MON_TAGS_A - Monitoring common tags
    locals {
      monitoring_tags_GARBAGE_TF_033_A = {
        Project     = "monitoring"
        Environment = var.environment
        ManagedBy   = "terraform"
      }
    }

    # GARBAGE_TF_033_MON_INSTANCE_B - Monitoring instance
    resource "aws_instance" "grafana_GARBAGE_TF_033_B" {
      ami  = "ami-99999"
      tags = local.monitoring_tags_GARBAGE_TF_033_A
    }
  networking/vpc_GARBAGE_TF_033_C.tf: |
    # GARBAGE_TF_033_VPC_C - VPC configuration
    resource "aws_vpc" "secondary_GARBAGE_TF_033_C" {
      cidr_block           = "172.16.0.0/16"
      enable_dns_hostnames = true
      enable_dns_support   = true

      tags = {
        Name = "secondary-vpc-GARBAGE_TF_033_C"
        Team = "platform-GARBAGE_TF_033_VPC_D"
      }
    }

must_include_files:
- main.tf

must_include_content_from:
  main.tf:
    - common_tags = {
    - merge(local.common_tags, {
    - ManagedBy   = "terraform"

must_not_include:
- GARBAGE_TF_033_MON_TAGS_A
- GARBAGE_TF_033_B
- GARBAGE_TF_033_VPC_C
- GARBAGE_TF_033_VPC_D

must_not_include_files:
- monitoring/tags_GARBAGE_TF_033_A.tf
- networking/vpc_GARBAGE_TF_033_C.tf

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
