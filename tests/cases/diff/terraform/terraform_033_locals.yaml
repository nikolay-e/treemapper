name: terraform_033_locals
repo:
  initial_files:
    main.tf: |
      resource "aws_instance" "web" {
        tags = {
          Name = "web-server"
          Environment = "prod"
        }
      }
    monitoring/tags.tf: |
      locals {
        monitoring_tags = {
          Project     = "monitoring"
          Environment = var.environment
          ManagedBy   = "terraform"
        }
      }

      resource "aws_instance" "grafana" {
        ami  = "ami-99999"
        tags = local.monitoring_tags
      }
    networking/vpc.tf: |
      resource "aws_vpc" "secondary" {
        cidr_block           = "172.16.0.0/16"
        enable_dns_hostnames = true
        enable_dns_support   = true

        tags = {
          Name = "secondary-vpc"
          Team = "platform"
        }
      }
  changed_files:
    main.tf: |
      locals {
        common_tags = {
          Project     = "myapp"
          Environment = var.environment
          ManagedBy   = "terraform"
        }
      }

      resource "aws_instance" "web" {
        tags = merge(local.common_tags, {
          Name = "web-server"
        })
      }
  commit_message: Update files
fragments:
- id: main_file
  selector:
    path: main.tf
- id: req_global_0
  selector:
    anchor: common_tags = {
- id: req_global_1
  selector:
    anchor: merge(local.common_tags, {
- id: req_global_2
  selector:
    anchor: ManagedBy   = "terraform"
- id: no_tags
