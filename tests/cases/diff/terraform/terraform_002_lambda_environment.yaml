must_include_files:
  - infrastructure/processor.tf

must_include_content_from:
  infrastructure/processor.tf:
    - timeout       = 120
    - memory_size   = 512
    - tracing_mode  = "Active"
    - LOG_LEVEL = "DEBUG"
    - DATABASE_URL   = var.database_connection_string
    - CACHE_ENDPOINT = aws_elasticache_cluster.main.cache_nodes[0].address
    - QUEUE_URL      = aws_sqs_queue.processor.url

must_not_include:
  # --- indexer.tf: sibling Lambda deploying search-indexer ---
  - search-indexer
  - ELASTICSEARCH_URL
  - INDEX_NAME
  - BATCH_SIZE        = "500"
  # --- notifier.tf: another Lambda module call for email ---
  - email-notifier
  - SMTP_HOST
  - FROM_ADDRESS
  - noreply@example.com
  # --- staging tfvars: environment-specific overrides ---
  - "postgres://staging-db.internal"
  - 'environment                 = "staging"'
  # --- module outputs: data flowing out, not in ---
  - invoke_arn
  # --- test code: not Terraform ---
  - test_processor_env_vars
  - test_processor_handles_task

must_not_include_files:
  - infrastructure/indexer.tf
  - infrastructure/notifier.tf
  - environments/staging/processor.tfvars
  - modules/lambda/outputs.tf
  - tests/test_processor.py

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
