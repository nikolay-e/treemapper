# === Assertions ===

must_include_files:
- infrastructure/processor.tf

must_include_content_from:
  infrastructure/processor.tf:
    - timeout       = 120
    - memory_size   = 512
    - tracing_mode  = "Active"
    - LOG_LEVEL = "DEBUG"
    - DATABASE_URL   = var.database_connection_string
    - CACHE_ENDPOINT = aws_elasticache_cluster.main.cache_nodes[0].address
    - QUEUE_URL      = aws_sqs_queue.processor.url
    - ENABLE_METRICS = "true"

must_not_include:
# Plain garbage markers
- GARBAGE_TF_PIPELINE_442_001
- GARBAGE_PIPELINE_442_002
- GARBAGE_ROLE_442_003
- GARBAGE_BUCKET_442_004
- GARBAGE_SOURCE_442_005
- GARBAGE_TF_CACHE_442_006
- GARBAGE_CACHE_VAR_442_008
# Tricky: sibling module call to same ./modules/lambda with custom_env_vars
- GARBAGE_TF_002_INDEXER_G
- GARBAGE_TF_002_INDEXER_SEARCH_H
# Tricky: staging environment variant with same variable names
- GARBAGE_TF_002_STAGING_I
- GARBAGE_TF_002_STAGING_REGION_J

must_not_include_files:
- unrelated/codepipeline.tf
- unrelated/elasticache.tf
- infrastructure/indexer.tf
- environments/staging/processor.tfvars

max_fragments: 6
max_files: 2
add_garbage_files: false
skip_garbage_check: true
