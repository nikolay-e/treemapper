initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = "ami-12345"
      instance_type = "t3.micro"
    }
  # --- Tricky garbage: sibling .tf with same data source pattern for a different purpose ---
  networking/ami_lookup_GARBAGE_TF_032_A.tf: |
    # GARBAGE_TF_032_NET_AMI_A - Networking AMI lookup
    data "aws_ami" "networking_GARBAGE_TF_032_A" {
      most_recent = true
      owners      = ["self"]

      filter {
        name   = "name"
        values = ["network-appliance-GARBAGE_TF_032_A-*"]
      }
    }

    # GARBAGE_TF_032_NET_INSTANCE_B - Networking instance
    resource "aws_instance" "firewall_GARBAGE_TF_032_B" {
      ami           = data.aws_ami.networking_GARBAGE_TF_032_A.id
      instance_type = "c5.xlarge"
    }
  # --- Plain garbage: unrelated helper ---
  scripts/rotate_amis_GARBAGE_TF_032_C.py: |
    # GARBAGE_TF_032_ROTATE_C - AMI rotation script
    def rotate_amis_GARBAGE_TF_032_C():
        print("Rotating AMIs GARBAGE_TF_032_ROTATE_D")
        return []

