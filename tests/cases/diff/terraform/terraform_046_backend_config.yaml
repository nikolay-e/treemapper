# Scenario: Adding S3 backend configuration with encryption, DynamoDB locking,
#   and KMS key to an existing terraform block.
#
# Reviewer questions:
#   Q1: "Is there a DynamoDB table for state locking already defined?"
#       -> dynamodb.tf defines terraform_locks table with LockID hash key.
#   Q2: "What KMS key is referenced for state encryption?"
#       -> kms.tf defines the encryption key with alias/terraform-state.
#   Q3: "Is the S3 bucket for state already provisioned?"
#       -> state_bucket.tf (UNCHANGED) defines the S3 bucket with versioning
#         that matches the backend bucket name.
#
# Not needed:
#   - versions.tf: Also has a terraform {} block but for required_providers.
#     HARD TRAP: same terraform {} block syntax. But provider constraints
#     are different from backend configuration.
#
#   - data_bucket.tf: S3 bucket for application data. Same S3 resource type.
#     HARD TRAP: same aws_s3_bucket resource. But data storage, not state.
#
#   - monitoring.tf: CloudWatch alarm. Completely unrelated to state config.
#
#   - environments/staging/backend.hcl: Backend partial config for staging.
#     HARDEST TRAP: contains "bucket", "key", "region" matching the diff.
#     But this is a different environment's backend config.

initial:
  main.tf: |
    terraform {
    }

    resource "aws_instance" "web" {
      ami           = "ami-12345"
      instance_type = "t3.micro"
    }
  dynamodb.tf: |
    resource "aws_dynamodb_table" "terraform_locks" {
      name         = "terraform-locks"
      billing_mode = "PAY_PER_REQUEST"
      hash_key     = "LockID"

      attribute {
        name = "LockID"
        type = "S"
      }

      tags = {
        Name = "Terraform State Lock"
      }
    }
  kms.tf: |
    resource "aws_kms_key" "terraform_state" {
      description             = "Encryption key for Terraform state"
      deletion_window_in_days = 10
      enable_key_rotation     = true
    }

    resource "aws_kms_alias" "terraform_state" {
      name          = "alias/terraform-state"
      target_key_id = aws_kms_key.terraform_state.key_id
    }
  state_bucket.tf: |
    resource "aws_s3_bucket" "terraform_state" {
      bucket = "my-terraform-state"

      tags = {
        Name    = "Terraform State"
        Purpose = "state-storage"
      }
    }

    resource "aws_s3_bucket_versioning" "terraform_state" {
      bucket = aws_s3_bucket.terraform_state.id
      versioning_configuration {
        status = "Enabled"
      }
    }

    resource "aws_s3_bucket_server_side_encryption_configuration" "terraform_state" {
      bucket = aws_s3_bucket.terraform_state.id
      rule {
        apply_server_side_encryption_by_default {
          sse_algorithm     = "aws:kms"
          kms_master_key_id = aws_kms_key.terraform_state.arn
        }
      }
    }
  versions.tf: |
    terraform {
      required_providers {
        azurerm = {
          source  = "hashicorp/azurerm"
          version = "~> 3.0"
        }
        aws = {
          source  = "hashicorp/aws"
          version = "~> 5.0"
        }
      }
    }
  data_bucket.tf: |
    resource "aws_s3_bucket" "data" {
      bucket = "app-data-bucket"

      tags = {
        Name    = "Application Data"
        Purpose = "data-storage"
      }
    }

    resource "aws_s3_bucket_versioning" "data" {
      bucket = aws_s3_bucket.data.id
      versioning_configuration {
        status = "Enabled"
      }
    }
  monitoring.tf: |
    resource "aws_cloudwatch_metric_alarm" "cpu" {
      alarm_name          = "high-cpu"
      comparison_operator = "GreaterThanThreshold"
      threshold           = 80
      evaluation_periods  = 2
      metric_name         = "CPUUtilization"
      namespace           = "AWS/EC2"
      period              = 300
      statistic           = "Average"
    }
  environments/staging/backend.hcl: |
    bucket         = "staging-terraform-state"
    key            = "staging/terraform.tfstate"
    region         = "us-west-2"
    encrypt        = true
    dynamodb_table = "staging-terraform-locks"

changed:
  main.tf: |
    terraform {
      backend "s3" {
        bucket         = "my-terraform-state"
        key            = "prod/terraform.tfstate"
        region         = "us-east-1"
        encrypt        = true
        dynamodb_table = "terraform-locks"
        kms_key_id     = "alias/terraform-state"
      }
    }

    resource "aws_instance" "web" {
      ami           = "ami-12345"
      instance_type = "t3.micro"
    }

must_include_files:
  - main.tf
  # Q1: DynamoDB table for state locking
  - dynamodb.tf
  # Q2: KMS key for state encryption
  - kms.tf

must_include_content_from:
  main.tf:
    - backend "s3" {
    - bucket         = "my-terraform-state"
    - encrypt        = true
    - dynamodb_table = "terraform-locks"
  dynamodb.tf:
    - resource "aws_dynamodb_table" "terraform_locks" {
    - name         = "terraform-locks"
  kms.tf:
    - alias/terraform-state
    - enable_key_rotation     = true

must_not_include:
  # --- versions.tf: same terraform {} block but for providers ---
  - hashicorp/azurerm
  - hashicorp/aws
  - required_providers
  # --- data_bucket.tf: S3 bucket but for app data, not state ---
  - app-data-bucket
  - Application Data
  - data-storage
  # --- monitoring.tf: unrelated CloudWatch alarm ---
  - CPUUtilization
  - high-cpu
  # --- staging backend.hcl: different environment backend config ---
  - staging-terraform-state
  - staging-terraform-locks
  - us-west-2

must_not_include_files:
  - versions.tf
  - data_bucket.tf
  - monitoring.tf
  - environments/staging/backend.hcl

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
