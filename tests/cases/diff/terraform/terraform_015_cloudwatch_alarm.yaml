    end

must_include_files:
- monitoring.tf

must_include_content_from:
  monitoring.tf:
    - resource "aws_cloudwatch_metric_alarm" "cpu_high" {
    - aws_autoscaling_group.web.name

must_not_include:
- GARBAGE_TF_015_MEM_ALARM_A
- GARBAGE_TF_015_MEM_THRESH_B
- GARBAGE_TF_015_EXPORTER_MARKER_C
- GARBAGE_TF_015_FORMAT_TYPE_D

must_not_include_files:
- monitoring_memory.tf
- garbage_data_exporter.rb

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
