initial:
  monitoring.tf: |
    # Monitoring resources

  # --- Tricky garbage: same resource type aws_cloudwatch_metric_alarm but for memory ---
  monitoring_memory.tf: |
    GARBAGE_TF_015_MEM_ALARM_A = "memory-alert"
    GARBAGE_TF_015_MEM_THRESH_B = 90

    resource "aws_cloudwatch_metric_alarm" "memory_high" {
      alarm_name          = "memory-high"
      comparison_operator = "GreaterThanThreshold"
      evaluation_periods  = 3
      metric_name         = "MemoryUtilization"
      namespace           = "CWAgent"
      period              = 300
      statistic           = "Average"
      threshold           = 90

      alarm_actions = [aws_sns_topic.ops.arn]
    }

  # --- Plain garbage ---
  garbage_data_exporter.rb: |
    GARBAGE_TF_015_EXPORTER_MARKER_C = "export"
    GARBAGE_TF_015_FORMAT_TYPE_D = "csv"

    class DataExporter
      def export(records)
        records.map(&:to_csv)
      end
    end

changed:
  monitoring.tf: |
    resource "aws_cloudwatch_metric_alarm" "cpu_high" {
      alarm_name          = "cpu-high"
      comparison_operator = "GreaterThanThreshold"
      evaluation_periods  = 2
      metric_name         = "CPUUtilization"
      namespace           = "AWS/EC2"
      period              = 300
      statistic           = "Average"
      threshold           = 80

      dimensions = {
        AutoScalingGroupName = aws_autoscaling_group.web.name
      }

      alarm_actions = [aws_sns_topic.alerts.arn]
    }

  monitoring_memory.tf: |
    GARBAGE_TF_015_MEM_ALARM_A = "memory-alert"
