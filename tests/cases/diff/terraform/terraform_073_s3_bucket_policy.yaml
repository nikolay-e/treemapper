# === Assertions ===

must_include_files:
- s3.tf

must_include_content_from:
  s3.tf:
    - bucket = "my-static-site-prod"
    - 'Principal = {"AWS": "arn:aws:iam::123456789:root"}'
    - '["s3:GetObject", "s3:PutObject"]'
    - 'resource "aws_s3_bucket_policy" "static"'

must_not_include:
# Tricky garbage: sibling .tf with same resource types
- GARBAGE_TF_073_LOGGING_MARKER_A
- GARBAGE_TF_073_BUCKET_LOG_MARKER_B
# Plain garbage
- GARBAGE_TF_073_BILLING_MARKER_C
- GARBAGE_TF_073_INVOICE_MARKER_D
- GARBAGE_TF_073_REPORT_MARKER_E

must_not_include_files:
- garbage_s3_logging.tf
- garbage_billing.py
- src/upload.py

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
