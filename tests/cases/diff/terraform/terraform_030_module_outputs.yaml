# Scenario: Adding port and connection_string outputs to an RDS module.
#
# Reviewer questions:
#   Q1: "What RDS resource attributes are available for the new outputs?"
#       -> modules/rds/main.tf defines aws_db_instance.main with engine=postgres.
#   Q2: "Is the connection_string marked sensitive?"
#       -> Yes, visible in the diff. Reviewer confirms it uses var.password.
#   Q3: "Who consumes these outputs?"
#       -> root/main.tf (UNCHANGED) calls the module and may need to reference
#         the new outputs. Shows the module invocation.
#
# Not needed:
#   - modules/cache/outputs.tf: Sibling module's outputs with similar port
#     pattern. HARD TRAP: same output "port" block, same module pattern.
#     But ElastiCache, not RDS.
#
#   - modules/queue/outputs.tf: Another module with outputs. Same structure.
#     But SQS queue, completely different resource.
#
#   - monitoring/alarms.tf: References RDS metrics. Same resource domain
#     (RDS). But monitoring thresholds don't help verify output attributes.
#
#   - modules/rds/variables.tf: Variables for the RDS module. Contains
#     var.username, var.password, var.database referenced in the connection
#     string. Direct edge: defines variables used in the new output.

initial:
  modules/rds/main.tf: |
    resource "aws_db_instance" "main" {
      identifier     = var.identifier
      engine         = "postgres"
      engine_version = "15.4"
      instance_class = var.instance_class
      username       = var.username
      password       = var.password
      db_name        = var.database

      allocated_storage = var.storage_size
      storage_encrypted = true

      tags = var.tags
    }
  modules/rds/outputs.tf: |
    output "endpoint" {
      value = aws_db_instance.main.endpoint
    }
  modules/rds/variables.tf: |
    variable "identifier" {
      type = string
    }

    variable "instance_class" {
      type    = string
      default = "db.t3.micro"
    }

    variable "username" {
      type = string
    }

    variable "password" {
      type      = string
      sensitive = true
    }

    variable "database" {
      type = string
    }

    variable "storage_size" {
      type    = number
      default = 20
    }

    variable "tags" {
      type    = map(string)
      default = {}
    }
  root/main.tf: |
    module "database" {
      source         = "./modules/rds"
      identifier     = "app-database"
      instance_class = "db.t3.medium"
      username       = var.db_username
      password       = var.db_password
      database       = "appdb"
      storage_size   = 50

      tags = {
        Environment = var.environment
      }
    }

    output "db_endpoint" {
      value = module.database.endpoint
    }
  modules/cache/outputs.tf: |
    output "cache_endpoint" {
      value = aws_elasticache_cluster.main.cache_nodes[0].address
    }

    output "cache_port" {
      value = aws_elasticache_cluster.main.cache_nodes[0].port
    }

    output "cache_connection_string" {
      value = "redis://${aws_elasticache_cluster.main.cache_nodes[0].address}:${aws_elasticache_cluster.main.cache_nodes[0].port}"
    }
  modules/queue/outputs.tf: |
    output "queue_url" {
      value = aws_sqs_queue.main.url
    }

    output "queue_arn" {
      value = aws_sqs_queue.main.arn
    }

    output "dlq_url" {
      value = aws_sqs_queue.dlq.url
    }
  monitoring/alarms.tf: |
    resource "aws_cloudwatch_metric_alarm" "rds_cpu" {
      alarm_name          = "rds-high-cpu"
      comparison_operator = "GreaterThanThreshold"
      evaluation_periods  = 2
      metric_name         = "CPUUtilization"
      namespace           = "AWS/RDS"
      period              = 300
      statistic           = "Average"
      threshold           = 80

      dimensions = {
        DBInstanceIdentifier = module.database.identifier
      }
    }

    resource "aws_cloudwatch_metric_alarm" "rds_connections" {
      alarm_name          = "rds-high-connections"
      comparison_operator = "GreaterThanThreshold"
      evaluation_periods  = 2
      metric_name         = "DatabaseConnections"
      namespace           = "AWS/RDS"
      period              = 300
      statistic           = "Average"
      threshold           = 100
    }

changed:
  modules/rds/outputs.tf: |
    output "endpoint" {
      value = aws_db_instance.main.endpoint
    }

    output "port" {
      value = aws_db_instance.main.port
    }

    output "connection_string" {
      value     = "postgres://${var.username}:${var.password}@${aws_db_instance.main.endpoint}/${var.database}"
      sensitive = true
    }

# modules/rds/main.tf is unchanged but reviewer needs to see the RDS resource
# definition to confirm .port and .endpoint are valid attributes on the instance
must_include_files:
  - modules/rds/main.tf

must_include_content_from:
  modules/rds/main.tf:
    - resource "aws_db_instance" "main" {
    - engine     = "postgres"

must_not_include:
  # --- cache outputs: similar pattern but for ElastiCache ---
  - cache_endpoint
  - cache_port
  - cache_connection_string
  - aws_elasticache_cluster
  # --- queue outputs: same module output pattern, different service ---
  - queue_url
  - queue_arn
  - dlq_url
  # --- monitoring: references RDS but is alarms concern ---
  - rds-high-cpu
  - CPUUtilization
  - DatabaseConnections

must_not_include_files:
  - modules/cache/outputs.tf
  - modules/queue/outputs.tf
  - monitoring/alarms.tf

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
