# Scenario: Adding local-exec provisioners to an EC2 instance to register
#   and deregister its IP address in a local file.
#
# Reviewer questions:
#   Q1: "What security group allows access to this instance?"
#       -> security.tf defines the SG with port 8080 ingress, now attached
#         via vpc_security_group_ids in the diff.
#   Q2: "Is the instance in a private subnet?"
#       -> main.tf shows subnet_id = var.private_subnet_id.
#   Q3: "What file format does private_ips.txt use?"
#       -> scripts/manage_inventory.py (UNCHANGED) reads private_ips.txt
#         and expects one IP per line. Shows the downstream consumer of
#         the file the provisioner writes to.
#
# Not needed:
#   - database/setup.tf: Also has local-exec provisioner but for DB init.
#     HARD TRAP: same provisioner "local-exec" block, same pattern.
#     But psql initialization is a different operation.
#
#   - worker/main.tf: Another EC2 instance with local-exec provisioner.
#     HARDEST TRAP: same resource type + same provisioner type + also
#     writes to an IP file. But it's a different instance tier.
#
#   - scripts/inventory.sh: Shell script that reads IP lists. Similar
#     to what the provisioner does. But operational tooling, not terraform.
#
#   - ansible/inventory.ini: Ansible inventory with IP addresses. Same
#     "IP list" concept. But Ansible is configuration management, not
#     the Terraform provisioner being reviewed.

initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = var.ami_id
      instance_type = "t3.micro"
      subnet_id     = var.private_subnet_id

      tags = {
        Name = "web-server"
      }
    }
  security.tf: |
    resource "aws_security_group" "web" {
      name   = "web-sg"
      vpc_id = aws_vpc.main.id

      ingress {
        from_port   = 8080
        to_port     = 8080
        protocol    = "tcp"
        cidr_blocks = ["10.0.0.0/8"]
      }

      egress {
        from_port   = 0
        to_port     = 0
        protocol    = "-1"
        cidr_blocks = ["0.0.0.0/0"]
      }
    }
  scripts/manage_inventory.py: |
    import sys

    def load_inventory(path: str = "private_ips.txt") -> list:
        with open(path) as f:
            return [line.strip() for line in f if line.strip()]

    def check_health(ip: str, port: int = 8080) -> bool:
        import socket
        try:
            sock = socket.create_connection((ip, port), timeout=5)
            sock.close()
            return True
        except (socket.timeout, ConnectionRefusedError):
            return False

    def main():
        ips = load_inventory()
        for ip in ips:
            status = "healthy" if check_health(ip) else "unhealthy"
            print(f"{ip}: {status}")

    if __name__ == "__main__":
        main()
  database/setup.tf: |
    resource "aws_db_instance" "setup" {
      identifier     = "setup-db"
      engine         = "postgres"
      instance_class = "db.t3.micro"

      provisioner "local-exec" {
        command = "psql -f init.sql ${self.endpoint}"
      }

      provisioner "local-exec" {
        when    = destroy
        command = "psql -f cleanup.sql ${self.endpoint}"
      }
    }
  worker/main.tf: |
    resource "aws_instance" "worker" {
      ami           = var.ami_id
      instance_type = "t3.small"
      subnet_id     = var.private_subnet_id

      provisioner "local-exec" {
        command = "echo ${self.private_ip} >> worker_ips.txt"
      }

      provisioner "local-exec" {
        when    = destroy
        command = "sed -i '/${self.private_ip}/d' worker_ips.txt"
      }

      tags = {
        Name = "worker-node"
      }
    }
  scripts/inventory.sh: |
    #!/bin/bash
    echo "Managing server inventory..."
    cat private_ips.txt
    echo "---"
    wc -l private_ips.txt
  ansible/inventory.ini: |
    [webservers]
    10.0.1.10 ansible_user=ec2-user
    10.0.1.11 ansible_user=ec2-user

    [workers]
    10.0.2.10 ansible_user=ec2-user
    10.0.2.11 ansible_user=ec2-user

changed:
  main.tf: |
    resource "aws_instance" "web" {
      ami                    = var.ami_id
      instance_type          = "t3.micro"
      subnet_id              = var.private_subnet_id
      vpc_security_group_ids = [aws_security_group.web.id]

      provisioner "local-exec" {
        command = "echo ${self.private_ip} >> private_ips.txt"
      }

      provisioner "local-exec" {
        when    = destroy
        command = "sed -i '/${self.private_ip}/d' private_ips.txt"
      }

      tags = {
        Name = "web-server"
      }
    }

must_include_files:
  - main.tf
  # Q1: Security group now attached to the instance
  - security.tf
  # Q3: Python script that reads the private_ips.txt file
  - scripts/manage_inventory.py

must_include_content_from:
  main.tf:
    - provisioner "local-exec" {
    - command = "echo ${self.private_ip} >> private_ips.txt"
    - when    = destroy
  security.tf:
    - resource "aws_security_group" "web" {
    - from_port   = 8080
  scripts/manage_inventory.py:
    - 'def load_inventory(path: str = "private_ips.txt")'
    - def check_health

must_not_include:
  # --- database/setup.tf: same local-exec but for psql initialization ---
  - psql -f init.sql
  - psql -f cleanup.sql
  - setup-db
  # --- worker/main.tf: same instance+provisioner pattern but for workers ---
  - worker_ips.txt
  - worker-node
  - "t3.small"
  # --- inventory.sh: reads the file but is shell tooling ---
  - Managing server inventory
  - wc -l
  # --- ansible/inventory.ini: IP lists but for Ansible ---
  - ansible_user
  - webservers

must_not_include_files:
  - database/setup.tf
  - worker/main.tf
  - scripts/inventory.sh
  - ansible/inventory.ini

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
