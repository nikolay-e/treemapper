must_include_files:
- compute.tf

must_include_content_from:
  compute.tf:
    - resource "aws_autoscaling_group" "web" {
    - aws_launch_template.web.id

must_not_include:
- GARBAGE_TF_012_WORKER_SCALING_A
- GARBAGE_TF_012_WORKER_CAPACITY_B
- GARBAGE_TF_012_BILLING_MARKER_C
- GARBAGE_TF_012_COST_TRACKER_D

must_not_include_files:
- worker_scaling.tf
- garbage_billing_report.py

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
