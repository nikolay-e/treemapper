# Scenario: Add an autoscaling group for the web tier
#
# Reviewer questions:
#   Q1: "What launch template does the ASG use?"
#       -> compute.tf has aws_launch_template.web alongside the new ASG.
#   Q2: "What target group does it register with?"
#       -> lb.tf defines aws_lb_target_group.app with health check.
#   Q3: "Are there scaling policies for this ASG?"
#       -> scaling.tf (UNCHANGED) defines target tracking scaling policy
#         that references the ASG. Shows auto-scaling configuration.
#
# Not needed:
#   - worker_asg.tf: Same resource type but for worker tier. HARDEST TRAP:
#     identical resource type (aws_autoscaling_group), same nested blocks
#     (launch_template), same var.ami_id usage. But worker tier with
#     different subnet IDs and no target group.
#
#   - batch_asg.tf: Another ASG for batch processing. Same type, same
#     pattern. But batch jobs with different scaling behavior.
#
#   - billing.tf: AWS budgets. Completely unrelated to compute.
#
#   - monitoring/asg_alarms.tf: CloudWatch alarms for ASG metrics.
#     References the web ASG. HARD TRAP: same ASG reference. But
#     monitoring is observation.

initial:
  compute.tf: |
    resource "aws_launch_template" "web" {
      name          = "web-template"
      image_id      = var.ami_id
      instance_type = "t3.micro"
      key_name      = var.key_name

      network_interfaces {
        associate_public_ip_address = false
        security_groups             = [aws_security_group.web.id]
      }

      user_data = base64encode(data.template_file.init.rendered)

      tag_specifications {
        resource_type = "instance"
        tags = {
          Name = "web-instance"
        }
      }
    }
  lb.tf: |
    resource "aws_lb_target_group" "app" {
      name     = "web-app-tg"
      port     = 80
      protocol = "HTTP"
      vpc_id   = var.vpc_id

      health_check {
        path                = "/health"
        matcher             = "200"
        interval            = 30
        timeout             = 5
        healthy_threshold   = 2
        unhealthy_threshold = 3
      }
    }

    resource "aws_lb" "app" {
      name               = "web-app-alb"
      internal           = false
      load_balancer_type = "application"
      subnets            = var.public_subnet_ids
      security_groups    = [aws_security_group.alb.id]
    }

    resource "aws_lb_listener" "http" {
      load_balancer_arn = aws_lb.app.arn
      port              = 80
      protocol          = "HTTP"

      default_action {
        type             = "forward"
        target_group_arn = aws_lb_target_group.app.arn
      }
    }
  scaling.tf: |
    resource "aws_autoscaling_policy" "web_target_tracking" {
      name                   = "web-target-tracking"
      autoscaling_group_name = aws_autoscaling_group.web.name
      policy_type            = "TargetTrackingScaling"

      target_tracking_configuration {
        predefined_metric_specification {
          predefined_metric_type = "ASGAverageCPUUtilization"
        }
        target_value = 60.0
      }
    }

    resource "aws_autoscaling_policy" "web_scale_in" {
      name                   = "web-scale-in-protection"
      autoscaling_group_name = aws_autoscaling_group.web.name
      policy_type            = "SimpleScaling"
      adjustment_type        = "ChangeInCapacity"
      scaling_adjustment     = -1
      cooldown               = 300
    }
  worker_asg.tf: |
    resource "aws_launch_template" "worker" {
      name          = "worker-template"
      image_id      = var.ami_id
      instance_type = "t3.small"
    }

    resource "aws_autoscaling_group" "worker" {
      name                = "worker-asg"
      min_size            = 0
      max_size            = 20
      desired_capacity    = 3
      vpc_zone_identifier = var.worker_subnet_ids

      launch_template {
        id      = aws_launch_template.worker.id
        version = "$Latest"
      }

      tag {
        key                 = "Name"
        value               = "worker-instance"
        propagate_at_launch = true
      }
    }
  batch_asg.tf: |
    resource "aws_launch_template" "batch" {
      name          = "batch-template"
      image_id      = var.ami_id
      instance_type = "c5.xlarge"
    }

    resource "aws_autoscaling_group" "batch" {
      name                = "batch-asg"
      min_size            = 0
      max_size            = 50
      desired_capacity    = 0
      vpc_zone_identifier = var.private_subnet_ids

      launch_template {
        id      = aws_launch_template.batch.id
        version = "$Latest"
      }
    }
  billing.tf: |
    resource "aws_budgets_budget" "monthly" {
      name         = "monthly-budget"
      budget_type  = "COST"
      limit_amount = "1000"
      limit_unit   = "USD"
      time_unit    = "MONTHLY"

      notification {
        comparison_operator       = "GREATER_THAN"
        threshold                 = 80
        threshold_type            = "PERCENTAGE"
        notification_type         = "ACTUAL"
        subscriber_email_addresses = ["finance@example.com"]
      }
    }
  monitoring/asg_alarms.tf: |
    resource "aws_cloudwatch_metric_alarm" "web_asg_cpu" {
      alarm_name          = "web-asg-cpu-high"
      comparison_operator = "GreaterThanThreshold"
      evaluation_periods  = 2
      metric_name         = "CPUUtilization"
      namespace           = "AWS/EC2"
      period              = 300
      statistic           = "Average"
      threshold           = 80

      dimensions = {
        AutoScalingGroupName = "web-asg"
      }
    }

changed:
  compute.tf: |
    resource "aws_launch_template" "web" {
      name          = "web-template"
      image_id      = var.ami_id
      instance_type = "t3.micro"
      key_name      = var.key_name

      network_interfaces {
        associate_public_ip_address = false
        security_groups             = [aws_security_group.web.id]
      }

      user_data = base64encode(data.template_file.init.rendered)

      tag_specifications {
        resource_type = "instance"
        tags = {
          Name = "web-instance"
        }
      }
    }

    resource "aws_autoscaling_group" "web" {
      name                = "web-asg"
      min_size            = 1
      max_size            = 10
      desired_capacity    = 2
      vpc_zone_identifier = var.subnet_ids
      target_group_arns   = [aws_lb_target_group.app.arn]

      launch_template {
        id      = aws_launch_template.web.id
        version = "$Latest"
      }
    }

must_include_files:
  # Q2: Target group with health check
  - lb.tf
  # Q3: Scaling policies referencing this ASG
  - scaling.tf

must_include_content_from:
  lb.tf:
    - resource "aws_lb_target_group" "app" {
    - path                = "/health"
    - 'matcher             = "200"'
  scaling.tf:
    - autoscaling_group_name = aws_autoscaling_group.web.name
    - ASGAverageCPUUtilization
    - target_value = 60.0

must_not_include:
  # --- worker_asg.tf: same resource type but different tier ---
  - worker-asg
  - worker_subnet_ids
  - worker-instance
  - worker-template
  # --- batch_asg.tf: another ASG for batch jobs ---
  - batch-asg
  - batch-template
  - c5.xlarge
  # --- billing.tf: unrelated cost management ---
  - aws_budgets_budget
  - monthly-budget
  - finance@example.com
  # --- monitoring: ASG alarms, observation concern ---
  - web-asg-cpu-high
  - AutoScalingGroupName

must_not_include_files:
  - worker_asg.tf
  - batch_asg.tf
  - billing.tf
  - monitoring/asg_alarms.tf

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
