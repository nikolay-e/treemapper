fragments:
- id: api
  selector:
    path: infrastructure/api.tf
    anchor: throttling_burst_limit = 2000
- id: api_1
  selector:
    path: infrastructure/api.tf
    anchor: throttling_rate_limit  = 1000
- id: api_2
