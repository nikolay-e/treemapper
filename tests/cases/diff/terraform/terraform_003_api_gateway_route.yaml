name: terraform_003_api_gateway_route
repo:
  initial_files:
    modules/api_gateway/main.tf: |
      resource "aws_apigatewayv2_api" "main" {
        name          = var.api_name
        protocol_type = "HTTP"
        description   = var.description

        cors_configuration {
          allow_origins     = var.cors_origins
          allow_methods     = var.cors_methods
          allow_headers     = var.cors_headers
          max_age           = var.cors_max_age
          allow_credentials = var.cors_allow_credentials
        }

        tags = var.tags
      }

      resource "aws_apigatewayv2_stage" "main" {
        api_id      = aws_apigatewayv2_api.main.id
        name        = var.stage_name
        auto_deploy = var.auto_deploy

        access_log_settings {
          destination_arn = aws_cloudwatch_log_group.api.arn
          format = jsonencode({
            requestId      = "$context.requestId"
            ip             = "$context.identity.sourceIp"
            requestTime    = "$context.requestTime"
            httpMethod     = "$context.httpMethod"
            routeKey       = "$context.routeKey"
            status         = "$context.status"
            responseLength = "$context.responseLength"
          })
        }

        default_route_settings {
          throttling_burst_limit = var.throttling_burst_limit
          throttling_rate_limit  = var.throttling_rate_limit
        }

        tags = var.tags
      }

      resource "aws_cloudwatch_log_group" "api" {
        name              = "/aws/apigateway/${var.api_name}"
        retention_in_days = var.log_retention_days
        tags              = var.tags
      }
    modules/api_gateway/variables.tf: |
      variable "api_name" {
        type = string
      }

      variable "description" {
        type    = string
        default = ""
      }

      variable "stage_name" {
        type    = string
        default = "$default"
      }

      variable "auto_deploy" {
        type    = bool
        default = true
      }

      variable "cors_origins" {
        type    = list(string)
        default = ["*"]
      }

      variable "cors_methods" {
        type    = list(string)
        default = ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
      }

      variable "cors_headers" {
        type    = list(string)
        default = ["*"]
      }

      variable "cors_max_age" {
        type    = number
        default = 300
      }

      variable "cors_allow_credentials" {
        type    = bool
        default = false
      }

      variable "throttling_burst_limit" {
        type    = number
        default = 1000
      }

      variable "throttling_rate_limit" {
        type    = number
        default = 500
      }

      variable "log_retention_days" {
        type    = number
        default = 14
      }

      variable "tags" {
        type    = map(string)
        default = {}
      }
    infrastructure/api.tf: |
      module "api" {
        source   = "./modules/api_gateway"
        api_name = "main-api"

        cors_origins = ["https://example.com"]
        cors_methods = ["GET", "POST"]

        tags = local.common_tags
      }

      resource "aws_apigatewayv2_route" "users" {
        api_id    = module.api.api_id
        route_key = "GET /users"
        target    = "integrations/${aws_apigatewayv2_integration.users.id}"
      }

      resource "aws_apigatewayv2_integration" "users" {
        api_id             = module.api.api_id
        integration_type   = "AWS_PROXY"
        integration_uri    = module.users_lambda.invoke_arn
        integration_method = "POST"
      }
    infrastructure/admin_api.tf: |
      module "admin_api" {
        source   = "./modules/api_gateway"
        api_name = "admin-api"

        cors_origins = ["https://admin.example.com"]
        cors_methods = ["GET", "POST", "PUT", "DELETE"]

        throttling_burst_limit = 500
        throttling_rate_limit  = 250

        tags = local.common_tags
      }

      resource "aws_apigatewayv2_route" "admin_users" {
        api_id             = module.admin_api.api_id
        route_key          = "GET /admin/users"
        target             = "integrations/${aws_apigatewayv2_integration.admin_users.id}"
        authorization_type = "JWT"
        authorizer_id      = aws_apigatewayv2_authorizer.admin_jwt.id
      }

      resource "aws_apigatewayv2_integration" "admin_users" {
        api_id             = module.admin_api.api_id
        integration_type   = "AWS_PROXY"
        integration_uri    = module.admin_lambda.invoke_arn
        integration_method = "POST"
      }

      resource "aws_apigatewayv2_authorizer" "admin_jwt" {
        api_id           = module.admin_api.api_id
        authorizer_type  = "JWT"
        identity_sources = ["$request.header.Authorization"]
        name             = "admin-jwt-authorizer"

        jwt_configuration {
          audience = [var.admin_cognito_client_id]
          issuer   = "https://cognito-idp.${var.aws_region}.amazonaws.com/${var.admin_cognito_user_pool_id}"
        }
      }
