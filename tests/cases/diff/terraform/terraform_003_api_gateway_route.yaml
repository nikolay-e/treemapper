    path: infrastructure/admin_api.tf
- id: no_global_0
  selector:
    anchor: admin-api
- id: no_global_1
  selector:
    anchor: admin_jwt
- id: no_global_2
  selector:
    anchor: admin_cognito_client_id
oracle:
  required:
  - api
