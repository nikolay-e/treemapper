must_include_files:
- infrastructure/api.tf

must_include_content_from:
  infrastructure/api.tf:
    - throttling_burst_limit = 2000
    - throttling_rate_limit  = 1000
    - route_key          = "POST /users"
    - route_key          = "PUT /users/{id}"
    - authorization_type = "JWT"
    - audience = [var.cognito_client_id]

must_not_include:
  # admin_api.tf: separate admin API — different gateway, different authorizer,
  # doesn't affect the main-api CORS, throttling, or route changes
  - admin-api
  - admin_jwt
  - admin_cognito_client_id

must_not_include_files:
- infrastructure/admin_api.tf

max_fragments: 8
max_files: 3
add_garbage_files: false
skip_garbage_check: true
