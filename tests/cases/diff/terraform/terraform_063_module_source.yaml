initial:
  modules/vpc/main.tf: |
    resource "aws_vpc" "main" {
      cidr_block = var.cidr_block
    }
  main.tf: |
    module "vpc" {
      source     = "./modules/vpc"
      cidr_block = "10.0.0.0/16"
    }
changed:
  modules/vpc/main.tf: |
    resource "aws_vpc" "main" {
      cidr_block = var.cidr_block
    }
  main.tf: |
    module "vpc" {
      source     = "./modules/vpc"
      cidr_block = "10.1.0.0/16"
      enable_dns = true
    }
must_include_files:
- main.tf
must_include_content:
- cidr_block = "10.1.0.0/16"
add_garbage_files: false
skip_garbage_check: true
