# Scenario: Updating a VPC module call - changing CIDR block and adding enable_dns parameter.
# Reviewer questions:
#   1. What does the VPC module accept as variables? (modules/vpc/variables.tf)
#   2. What is the module's main resource? (modules/vpc/main.tf)
# Traps:
#   - modules/database/main.tf: another module in the same project (same directory pattern, different concern)
#   - outputs.tf: exports module outputs but doesn't affect module source

initial:
  modules/vpc/main.tf: |
    resource "aws_vpc" "main" {
      cidr_block           = var.cidr_block
      enable_dns_hostnames = var.enable_dns

      tags = {
        Name = "main-vpc"
      }
    }
  modules/vpc/variables.tf: |
    variable "cidr_block" {
      type = string
    }

    variable "enable_dns" {
      type    = bool
      default = false
    }
  main.tf: |
    module "vpc" {
      source     = "./modules/vpc"
      cidr_block = "10.0.0.0/16"
    }
  modules/database/main.tf: |
    resource "aws_db_subnet_group" "main" {
      name       = "db-subnet-group"
      subnet_ids = var.subnet_ids
    }
  outputs.tf: |
    output "vpc_id" {
      value = module.vpc.vpc_id
    }

changed:
  main.tf: |
    module "vpc" {
      source     = "./modules/vpc"
      cidr_block = "10.1.0.0/16"
      enable_dns = true
    }

must_include_files:
  - main.tf
  - modules/vpc/variables.tf

must_include_content_from:
  main.tf:
    - cidr_block = "10.1.0.0/16"
    - enable_dns = true
  modules/vpc/variables.tf:
    - variable "cidr_block" {
    - variable "enable_dns" {

must_not_include:
  # Database module - different module, different concern (subnet groups not VPC)
  - db-subnet-group
  # Outputs - reads module output but doesn't affect module parameters
  - output "vpc_id" {

must_not_include_files:
  - modules/database/main.tf
  - outputs.tf

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
