initial:
  outputs.tf: |
    output "vpc_id" {
      value = aws_vpc.main.id
    }
  main.tf: |
    resource "aws_vpc" "main" {
      cidr_block = "10.0.0.0/16"
    }
changed:
  outputs.tf: |
    output "vpc_id" {
      value = aws_vpc.main.id
    }

    output "vpc_cidr" {
      value = aws_vpc.main.cidr_block
    }
  main.tf: |
    resource "aws_vpc" "main" {
      cidr_block = "10.0.0.0/16"
    }
must_include_files:
- outputs.tf
must_include_content:
- output "vpc_cidr" {
add_garbage_files: false
skip_garbage_check: true
