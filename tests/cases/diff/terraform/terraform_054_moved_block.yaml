# Scenario: Refactoring an EC2 instance from main.tf to compute.tf and renaming
#   it from "web" to "web_server", using a moved block to preserve state.
#
# Reviewer questions:
#   Q1: "What references the old resource name?"
#       -> outputs.tf references aws_instance.web.id and .private_ip.
#         These must be updated to aws_instance.web_server.
#   Q2: "What does the resource look like in its new location?"
#       -> compute.tf has the full resource definition and moved block.
#   Q3: "Are there security groups or other resources attached?"
#       -> security.tf (UNCHANGED) references aws_instance.web in a
#         security group rule. Must also be updated.
#
# Not needed:
#   - database/migrations.tf: Also has a moved block for RDS rename.
#     HARD TRAP: same moved {} block syntax, same pattern. But different
#     resource type (RDS, not EC2).
#
#   - storage/moved.tf: Another moved block for an S3 bucket rename.
#     HARD TRAP: same moved block, same refactoring pattern. Different
#     resource entirely.
#
#   - networking/nat.tf: NAT gateway. Unrelated infrastructure.
#
#   - monitoring/alarms.tf: CloudWatch alarm referencing the instance.
#     References aws_instance.web. HARD TRAP: uses the old resource name.
#     But monitoring is downstream observation, not a breaking reference.

max_enrichment: 7.8
initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = var.ami_id
      instance_type = "t3.micro"
      subnet_id     = var.private_subnet_id

      vpc_security_group_ids = [aws_security_group.web.id]

      tags = {
        Name = "web-server"
      }
    }
  outputs.tf: |
    output "instance_id" {
      value = aws_instance.web.id
    }

    output "instance_ip" {
      value = aws_instance.web.private_ip
    }

    output "instance_az" {
      value = aws_instance.web.availability_zone
    }
  security.tf: |
    resource "aws_security_group" "web" {
      name   = "web-sg"
      vpc_id = var.vpc_id

      ingress {
        from_port   = 443
        to_port     = 443
        protocol    = "tcp"
        cidr_blocks = ["0.0.0.0/0"]
      }

      egress {
        from_port   = 0
        to_port     = 0
        protocol    = "-1"
        cidr_blocks = ["0.0.0.0/0"]
      }
    }
  database/migrations.tf: |
    resource "aws_db_instance" "primary" {
      identifier     = "primary-db"
      engine         = "postgres"
      instance_class = "db.r5.large"
    }

    moved {
      from = aws_db_instance.main
      to   = aws_db_instance.primary
    }
  storage/moved.tf: |
    resource "aws_s3_bucket" "assets" {
      bucket = "app-assets"
    }

    moved {
      from = aws_s3_bucket.static
      to   = aws_s3_bucket.assets
    }
  networking/nat.tf: |
    resource "aws_nat_gateway" "main" {
      allocation_id = aws_eip.nat.id
      subnet_id     = aws_subnet.public.id

      tags = {
        Name = "main-nat-gw"
      }
    }
  monitoring/alarms.tf: |
    resource "aws_cloudwatch_metric_alarm" "web_cpu" {
      alarm_name          = "web-instance-cpu-high"
      comparison_operator = "GreaterThanThreshold"
      evaluation_periods  = 2
      metric_name         = "CPUUtilization"
      namespace           = "AWS/EC2"
      period              = 300
      statistic           = "Average"
      threshold           = 80

      dimensions = {
        InstanceId = aws_instance.web.id
      }
    }

changed:
  main.tf: |
    # Resources moved to compute.tf
  compute.tf: |
    resource "aws_instance" "web_server" {
      ami           = var.ami_id
      instance_type = "t3.micro"
      subnet_id     = var.private_subnet_id

      vpc_security_group_ids = [aws_security_group.web.id]

      tags = {
        Name = "web-server"
      }
    }

    moved {
      from = aws_instance.web
      to   = aws_instance.web_server
    }

must_include_files:
  - compute.tf
  - main.tf
  # Q1: Outputs referencing the old name that need updating
  - outputs.tf

must_include_content_from:
  compute.tf:
    - resource "aws_instance" "web_server" {
    - from = aws_instance.web
    - to   = aws_instance.web_server
  outputs.tf:
    - aws_instance.web.id
    - aws_instance.web.private_ip

must_not_include:
  # --- database/migrations.tf: same moved block but for RDS ---
  - aws_db_instance.main
  - aws_db_instance.primary
  - primary-db
  # --- storage/moved.tf: same moved block but for S3 ---
  - aws_s3_bucket.static
  - aws_s3_bucket.assets
  - app-assets
  # --- nat.tf: unrelated networking infrastructure ---
  - aws_nat_gateway
  - main-nat-gw
  # --- monitoring/alarms.tf: references old name but is monitoring ---
  - web-instance-cpu-high
  - CPUUtilization

must_not_include_files:
  - database/migrations.tf
  - storage/moved.tf
  - networking/nat.tf
  - monitoring/alarms.tf

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
