initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = var.ami_id
      instance_type = "t3.micro"
    }

  # --- Tricky garbage: sibling .tf with moved block for different resource ---
  garbage_tf_054_moved_rds.tf: |
    GARBAGE_TF_054_MOVED_RDS_A = "rds_moved"
    GARBAGE_TF_054_MIGRATION_ID_B = "db-refactor-v2"

    resource "aws_db_instance" "primary" {
      identifier     = "primary-db"
      engine         = "postgres"
      instance_class = "db.r5.large"
    }

    moved {
      from = aws_db_instance.main
      to   = aws_db_instance.primary
    }

  # --- Plain garbage ---
  garbage_tf_054_nat.tf: |
    GARBAGE_TF_054_NAT_EIP_C = "eipalloc-nat"
    GARBAGE_TF_054_NAT_SUBNET_D = "subnet-public"

    resource "aws_nat_gateway" "main" {
      allocation_id = "eipalloc-12345"
      subnet_id     = "subnet-12345"
    }

changed:
  main.tf: |
    # Resources moved to compute.tf

  compute.tf: |
    resource "aws_instance" "web_server" {
      ami           = var.ami_id
      instance_type = "t3.micro"
    }

    moved {
      from = aws_instance.web
      to   = aws_instance.web_server
    }

  garbage_tf_054_moved_rds.tf: |
    GARBAGE_TF_054_MOVED_RDS_A = "rds_moved"
    GARBAGE_TF_054_MIGRATION_ID_B = "db-refactor-v2"

    resource "aws_db_instance" "primary" {
      identifier     = "primary-db"
      engine         = "postgres"
      instance_class = "db.r5.large"
    }

    moved {
      from = aws_db_instance.main
      to   = aws_db_instance.primary
    }

  garbage_tf_054_nat.tf: |
    GARBAGE_TF_054_NAT_EIP_C = "eipalloc-nat"
    GARBAGE_TF_054_NAT_SUBNET_D = "subnet-public"

    resource "aws_nat_gateway" "main" {
      allocation_id = "eipalloc-12345"
      subnet_id     = "subnet-12345"
    }

must_include_files:
- compute.tf
- main.tf

must_include_content_from:
  compute.tf:
    - resource "aws_instance" "web_server" {
    - from = aws_instance.web
    - to   = aws_instance.web_server

must_not_include:
- GARBAGE_TF_054_MOVED_RDS_A
- GARBAGE_TF_054_MIGRATION_ID_B
- GARBAGE_TF_054_NAT_EIP_C
- GARBAGE_TF_054_NAT_SUBNET_D

must_not_include_files:
- garbage_tf_054_moved_rds.tf
- garbage_tf_054_nat.tf

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
