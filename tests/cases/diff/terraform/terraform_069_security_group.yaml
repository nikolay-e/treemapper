# Scenario: Changing a security group ingress from port 80 to port 443 (HTTP to HTTPS).
# Reviewer questions:
#   1. What instances use this security group? (main.tf references aws_security_group.web.id)
#   2. Is there a corresponding SSL certificate? (acm.tf)
# Traps:
#   - database/security.tf: database security group (same resource type, different tier)
#   - outputs.tf: exports values (unrelated to security group rules)

max_enrichment: 30.8
initial:
  security.tf: |
    resource "aws_security_group" "web" {
      name   = "web-sg"
      vpc_id = aws_vpc.main.id

      ingress {
        from_port   = 80
        to_port     = 80
        protocol    = "tcp"
        cidr_blocks = ["0.0.0.0/0"]
      }

      egress {
        from_port   = 0
        to_port     = 0
        protocol    = "-1"
        cidr_blocks = ["0.0.0.0/0"]
      }
    }
  main.tf: |
    resource "aws_instance" "web" {
      ami                    = "ami-12345678"
      instance_type          = "t3.micro"
      vpc_security_group_ids = [aws_security_group.web.id]

      tags = {
        Name = "web-server"
      }
    }
  acm.tf: |
    resource "aws_acm_certificate" "main" {
      domain_name       = "example.com"
      validation_method = "DNS"

      subject_alternative_names = ["*.example.com"]
    }
  database/security.tf: |
    resource "aws_security_group" "database" {
      name   = "database-sg"
      vpc_id = aws_vpc.main.id

      ingress {
        from_port       = 5432
        to_port         = 5432
        protocol        = "tcp"
        security_groups = [aws_security_group.web.id]
      }
    }
  outputs.tf: |
    output "web_sg_id" {
      value = aws_security_group.web.id
    }

changed:
  security.tf: |
    resource "aws_security_group" "web" {
      name   = "web-sg"
      vpc_id = aws_vpc.main.id

      ingress {
        from_port   = 443
        to_port     = 443
        protocol    = "tcp"
        cidr_blocks = ["0.0.0.0/0"]
      }

      egress {
        from_port   = 0
        to_port     = 0
        protocol    = "-1"
        cidr_blocks = ["0.0.0.0/0"]
      }
    }

must_include_files:
  - security.tf
  - main.tf

must_include_content_from:
  security.tf:
    - from_port   = 443
    - to_port     = 443
  main.tf:
    - vpc_security_group_ids = [aws_security_group.web.id]

must_not_include:
  # Database security group - same resource type but for database tier (references web SG as source, not target)
  - database-sg
  - from_port       = 5432
  # Outputs - exports SG ID but doesn't affect the rule change
  - output "web_sg_id" {

must_not_include_files:
  - database/security.tf
  - outputs.tf

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
