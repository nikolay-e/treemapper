initial:
  dns.tf: |
    # DNS resources

  # --- Tricky garbage: same resource type aws_acm_certificate but for internal services ---
  internal_certs.tf: |
    GARBAGE_TF_025_INT_CERT_A = "internal-tls"
    GARBAGE_TF_025_INT_DOMAIN_B = "*.internal.example.com"

    resource "aws_acm_certificate" "internal" {
      domain_name       = "*.internal.example.com"
      validation_method = "DNS"

      lifecycle {
        create_before_destroy = true
      }
    }

    resource "aws_acm_certificate_validation" "internal" {
      certificate_arn         = aws_acm_certificate.internal.arn
      validation_record_fqdns = [aws_route53_record.internal_cert_validation.fqdn]
    }

  # --- Plain garbage ---
  garbage_report_generator.py: |
    GARBAGE_TF_025_REPORT_GEN_C = "weekly-report"
    GARBAGE_TF_025_REPORT_FMT_D = "pdf"

    class ReportGenerator:
        def create_report(self, data):
            return b"%PDF-1.4"

