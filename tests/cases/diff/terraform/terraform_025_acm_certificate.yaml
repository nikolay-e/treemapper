# Scenario: Add an ACM certificate with DNS validation via Route53
#
# Reviewer questions:
#   1. What hosted zone completes the DNS validation? (route53.tf aws_route53_zone.main)
#   2. Is the validation record wired correctly? (route53.tf aws_route53_record.cert_validation)
#
# The diff adds aws_acm_certificate and aws_acm_certificate_validation in
# certs.tf. The Route53 zone and validation record in route53.tf are unchanged
# but essential to verify the validation chain is correct.
#
# Traps: internal_certs.tf has same ACM type but for a wildcard internal cert.
# alb.tf references certificate_arn but is about load balancing, not certs.

initial:
  certs.tf: |
    # ACM certificates placeholder
  route53.tf: |
    resource "aws_route53_zone" "main" {
      name = "example.com"
    }

    resource "aws_route53_record" "cert_validation" {
      zone_id = aws_route53_zone.main.zone_id
      name    = aws_acm_certificate.main.domain_validation_options[0].resource_record_name
      type    = aws_acm_certificate.main.domain_validation_options[0].resource_record_type
      ttl     = 60
      records = [aws_acm_certificate.main.domain_validation_options[0].resource_record_value]
    }
  internal_certs.tf: |
    resource "aws_acm_certificate" "internal" {
      domain_name       = "*.internal.example.com"
      validation_method = "DNS"

      lifecycle {
        create_before_destroy = true
      }
    }
  alb.tf: |
    resource "aws_lb_listener" "https" {
      load_balancer_arn = aws_lb.main.arn
      port              = 443
      protocol          = "HTTPS"
      certificate_arn   = aws_acm_certificate.main.arn

      default_action {
        type             = "forward"
        target_group_arn = aws_lb_target_group.app.arn
      }
    }

changed:
  certs.tf: |
    resource "aws_acm_certificate" "main" {
      domain_name       = "api.example.com"
      validation_method = "DNS"

      lifecycle {
        create_before_destroy = true
      }
    }

    resource "aws_acm_certificate_validation" "main" {
      certificate_arn         = aws_acm_certificate.main.arn
      validation_record_fqdns = [aws_route53_record.cert_validation.fqdn]
    }
  route53.tf: |
    resource "aws_route53_zone" "main" {
      name = "example.com"
    }

    resource "aws_route53_record" "cert_validation" {
      zone_id = aws_route53_zone.main.zone_id
      name    = aws_acm_certificate.main.domain_validation_options[0].resource_record_name
      type    = aws_acm_certificate.main.domain_validation_options[0].resource_record_type
      ttl     = 60
      records = [aws_acm_certificate.main.domain_validation_options[0].resource_record_value]
    }
  internal_certs.tf: |
    resource "aws_acm_certificate" "internal" {
      domain_name       = "*.internal.example.com"
      validation_method = "DNS"

      lifecycle {
        create_before_destroy = true
      }
    }
  alb.tf: |
    resource "aws_lb_listener" "https" {
      load_balancer_arn = aws_lb.main.arn
      port              = 443
      protocol          = "HTTPS"
      certificate_arn   = aws_acm_certificate.main.arn

      default_action {
        type             = "forward"
        target_group_arn = aws_lb_target_group.app.arn
      }
    }

must_include_files:
- route53.tf

must_include_content_from:
  route53.tf:
    # Reviewer needs the zone and validation record to verify the DNS chain
    - resource "aws_route53_zone" "main" {
    - resource "aws_route53_record" "cert_validation" {

must_not_include:
# Internal cert is same ACM type but for wildcard internal domain
- '*.internal.example.com'
# ALB listener references the cert but is about load balancing, not provisioning
- aws_lb_target_group.app.arn

must_not_include_files:
- internal_certs.tf  # same ACM type, different domain (internal wildcard)
- alb.tf  # consumes cert_arn but is about load balancing, not cert provisioning

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
