  docs/network_diagram_GARBAGE_TF_vpc459b.md: |
    # Legacy Network GARBAGE_TF_vpc459b
    Old network architecture documentation GARBAGE_TF_vpc459b

  # --- Tricky garbage: staging env with same VPC/subnet structure, different CIDRs ---
  network_staging.tf: |
    GARBAGE_TF_vpc459c_STAGING_NETWORK = true
    GARBAGE_TF_vpc459c_STAGING_VPC_FLAG = "staging-vpc-marker"

    data "aws_availability_zones" "available" {
      state = "available"
      filter {
        name   = "opt-in-status"
        values = ["opt-in-not-required"]
      }
    }

    locals {
      staging_azs = slice(data.aws_availability_zones.available.names, 0, var.az_count)

      staging_public_subnets = [
        for i, az in local.staging_azs : cidrsubnet(var.vpc_cidr, 8, i)
      ]

      staging_private_subnets = [
        for i, az in local.staging_azs : cidrsubnet(var.vpc_cidr, 8, i + 100)
      ]
    }

    resource "aws_vpc" "staging" {
      cidr_block           = "10.1.0.0/16"
      enable_dns_hostnames = true
      enable_dns_support   = true
      instance_tenancy     = "default"

      tags = merge(var.common_tags, {
        Name        = "staging-vpc"
        Environment = "staging"
      })
    }

    resource "aws_internet_gateway" "staging" {
      vpc_id = aws_vpc.staging.id

      tags = merge(var.common_tags, {
        Name = "staging-igw"
      })
    }

    resource "aws_subnet" "staging_public" {
      count                   = length(local.staging_public_subnets)
      vpc_id                  = aws_vpc.staging.id
      cidr_block              = local.staging_public_subnets[count.index]
      availability_zone       = local.staging_azs[count.index]
      map_public_ip_on_launch = true

      tags = merge(var.common_tags, {
        Name = "staging-public-${local.staging_azs[count.index]}"
        Tier = "public"
      })
    }

    resource "aws_subnet" "staging_private" {
      count             = length(local.staging_private_subnets)
      vpc_id            = aws_vpc.staging.id
      cidr_block        = local.staging_private_subnets[count.index]
      availability_zone = local.staging_azs[count.index]

      tags = merge(var.common_tags, {
        Name = "staging-private-${local.staging_azs[count.index]}"
        Tier = "private"
      })
    }

    resource "aws_eip" "staging_nat" {
      count  = 1
      domain = "vpc"

      tags = merge(var.common_tags, {
        Name = "staging-nat-eip-${count.index + 1}"
      })

      depends_on = [aws_internet_gateway.staging]
    }

    resource "aws_nat_gateway" "staging" {
      count         = 1
      allocation_id = aws_eip.staging_nat[count.index].id
      subnet_id     = aws_subnet.staging_public[count.index].id

      tags = merge(var.common_tags, {
        Name = "staging-nat-${count.index + 1}"
      })

      depends_on = [aws_internet_gateway.staging]
    }

    resource "aws_flow_log" "staging" {
      iam_role_arn    = aws_iam_role.vpc_flow_log.arn
      log_destination = aws_cloudwatch_log_group.staging_flow_log.arn
      traffic_type    = "ALL"
      vpc_id          = aws_vpc.staging.id

      tags = merge(var.common_tags, {
        Name = "staging-vpc-flow-log"
      })
    }

    resource "aws_cloudwatch_log_group" "staging_flow_log" {
      name              = "/aws/vpc/staging-flow-logs"
      retention_in_days = 7

      tags = var.common_tags
    }

  # --- Tricky garbage: same data source type in unrelated monitoring file ---
  monitoring_azs_GARBAGE_TF_vpc459d.tf: |
    GARBAGE_TF_vpc459d_MONITORING_AZS = "monitoring-az-data"
    GARBAGE_TF_vpc459d_HEALTH_CHECK_FLAG = true

