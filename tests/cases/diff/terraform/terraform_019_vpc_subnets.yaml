# === Assertions ===

must_include_files:
- network.tf
- outputs.tf

must_include_content_from:
  network.tf:
    - data "aws_availability_zones" "available" {
    - resource "aws_vpc" "main" {
    - resource "aws_subnet" "public" {
    - resource "aws_nat_gateway" "main" {
    - resource "aws_flow_log" "main" {
    - tags = var.common_tags
  outputs.tf:
    - output "vpc_id" {
    - output "public_subnet_ids" {

must_not_include:
# Plain garbage markers
- GARBAGE_TF_vpc459a
- GARBAGE_TF_vpc459b
# Tricky: staging env with same VPC/subnet structure
- GARBAGE_TF_vpc459c_STAGING_NETWORK
- GARBAGE_TF_vpc459c_STAGING_VPC_FLAG
# Tricky: same data source type in monitoring file
- GARBAGE_TF_vpc459d_MONITORING_AZS
- GARBAGE_TF_vpc459d_HEALTH_CHECK_FLAG

must_not_include_files:
- deprecated/legacy_network_GARBAGE_TF_vpc459a.tf
- docs/network_diagram_GARBAGE_TF_vpc459b.md
- network_staging.tf
- monitoring_azs_GARBAGE_TF_vpc459d.tf

max_fragments: 10
max_files: 3
add_garbage_files: false
skip_garbage_check: true
