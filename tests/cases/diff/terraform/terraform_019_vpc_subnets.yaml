    resource "aws_cloudwatch_metric_alarm" "az_health" {
      count               = length(data.aws_availability_zones.monitoring.names)
      alarm_name          = "az-health-${data.aws_availability_zones.monitoring.names[count.index]}"
      comparison_operator = "GreaterThanThreshold"
      evaluation_periods  = 2
      metric_name         = "StatusCheckFailed"
      namespace           = "AWS/EC2"
      period              = 300
      statistic           = "Maximum"
      threshold           = 0
      alarm_description   = "AZ health check GARBAGE_TF_vpc459d"
