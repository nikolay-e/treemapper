# Scenario: Build out full RDS PostgreSQL with subnet group, parameter group, SG
#
# Reviewer questions:
#   1. What new variables does this introduce? (variables.tf adds vpc_id, subnets, etc.)
#   2. What app security group feeds into the RDS SG? (variables.tf app_security_group_id)
#   3. Are there other RDS instances that might conflict? (database_replica.tf, staging_database.tf)
#
# The diff replaces placeholder database.tf with a complete aws_db_instance,
# parameter group, subnet group, and security group. variables.tf adds the
# needed input variables. Both changed files are free. The unchanged
# database_replica.tf and staging_database.tf are traps.
#
# NOTE: Both database.tf and variables.tf change, so there is no single
# unchanged file the reviewer critically needs. The test value comes from
# verifying the algorithm excludes the traps and includes the changed files.

initial:
  database.tf: |
    resource "aws_db_instance" "placeholder" {
      identifier          = "placeholder"
      engine              = "postgres"
      instance_class      = "db.t3.micro"
      skip_final_snapshot = true
    }
  variables.tf: |
    variable "environment" {
      type    = string
      default = "dev"
    }
  database_replica.tf: |
    resource "aws_db_instance" "replica" {
      identifier          = "${var.environment}-replica-db"
      engine              = "postgres"
      engine_version      = "15.4"
      instance_class      = var.replica_instance_class
      replicate_source_db = "arn:aws:rds:us-east-1:123456789:db:source-db"
      storage_encrypted   = true
      skip_final_snapshot = true
    }

    resource "aws_db_parameter_group" "postgres_replica" {
      family = "postgres15"
      name   = "${var.environment}-postgres-replica-params"

      parameter {
        name  = "log_connections"
        value = "1"
      }
    }
  staging_database.tf: |
    resource "aws_db_instance" "staging" {
      identifier          = "staging-main-db"
      engine              = "postgres"
      engine_version      = "15.4"
      instance_class      = var.staging_db_instance_class
      allocated_storage   = 20
      storage_type        = "gp3"
      skip_final_snapshot = true
      deletion_protection = false
    }
  monitoring/dashboard.tf: |
    resource "aws_cloudwatch_dashboard" "main" {
      dashboard_name = "${var.environment}-overview"
      dashboard_body = jsonencode({
        widgets = [{
          type   = "metric"
          width  = 6
          height = 6
          properties = {
            metrics = [["AWS/EC2", "CPUUtilization"]]
            title   = "EC2 CPU"
          }
        }]
      })
    }

changed:
  database.tf: |
    resource "aws_db_subnet_group" "main" {
      name       = "${var.environment}-db-subnet-group"
      subnet_ids = var.private_subnet_ids
    }

    resource "aws_db_parameter_group" "postgres" {
      family = "postgres15"
      name   = "${var.environment}-postgres-params"

      parameter {
        name  = "log_connections"
        value = "1"
      }

      parameter {
        name  = "log_disconnections"
        value = "1"
      }
    }

    resource "aws_db_instance" "main" {
      identifier               = "${var.environment}-main-db"
      engine                   = "postgres"
      engine_version           = "15.4"
      instance_class           = var.db_instance_class
      allocated_storage        = 100
      max_allocated_storage    = 500
      storage_type             = "gp3"
      storage_encrypted        = true
      kms_key_id               = var.kms_key_arn
      db_subnet_group_name     = aws_db_subnet_group.main.name
      vpc_security_group_ids   = [aws_security_group.rds.id]
      parameter_group_name     = aws_db_parameter_group.postgres.name
      username                 = var.db_username
      password                 = var.db_password
      multi_az                 = var.environment == "prod"
      backup_retention_period  = 30
      deletion_protection      = var.environment == "prod"
      skip_final_snapshot      = var.environment != "prod"
    }

    resource "aws_security_group" "rds" {
      name        = "${var.environment}-rds-sg"
      description = "Security group for RDS PostgreSQL"
      vpc_id      = var.vpc_id

      ingress {
        from_port       = 5432
        to_port         = 5432
        protocol        = "tcp"
        security_groups = [var.app_security_group_id]
      }

      egress {
        from_port   = 0
        to_port     = 0
        protocol    = "-1"
        cidr_blocks = ["0.0.0.0/0"]
      }
    }
  variables.tf: |
    variable "environment" {
      type = string
    }

    variable "vpc_id" {
      type = string
    }

    variable "private_subnet_ids" {
      type = list(string)
    }

    variable "db_instance_class" {
      type    = string
      default = "db.t3.medium"
    }

    variable "db_username" {
      type      = string
      sensitive = true
    }

    variable "db_password" {
      type      = string
      sensitive = true
    }

    variable "kms_key_arn" {
      type = string
    }

    variable "app_security_group_id" {
      type = string
    }
  database_replica.tf: |
    resource "aws_db_instance" "replica" {
      identifier          = "${var.environment}-replica-db"
      engine              = "postgres"
      engine_version      = "15.4"
      instance_class      = var.replica_instance_class
      replicate_source_db = "arn:aws:rds:us-east-1:123456789:db:source-db"
      storage_encrypted   = true
      skip_final_snapshot = true
    }

    resource "aws_db_parameter_group" "postgres_replica" {
      family = "postgres15"
      name   = "${var.environment}-postgres-replica-params"

      parameter {
        name  = "log_connections"
        value = "1"
      }
    }
  staging_database.tf: |
    resource "aws_db_instance" "staging" {
      identifier          = "staging-main-db"
      engine              = "postgres"
      engine_version      = "15.4"
      instance_class      = var.staging_db_instance_class
      allocated_storage   = 20
      storage_type        = "gp3"
      skip_final_snapshot = true
      deletion_protection = false
    }
  monitoring/dashboard.tf: |
    resource "aws_cloudwatch_dashboard" "main" {
      dashboard_name = "${var.environment}-overview"
      dashboard_body = jsonencode({
        widgets = [{
          type   = "metric"
          width  = 6
          height = 6
          properties = {
            metrics = [["AWS/EC2", "CPUUtilization"]]
            title   = "EC2 CPU"
          }
        }]
      })
    }

must_include_files:
- database.tf
- variables.tf

must_include_content_from:
  database.tf:
    - 'engine                   = "postgres"'
    - instance_class           = var.db_instance_class
    - vpc_security_group_ids   = [aws_security_group.rds.id]
  variables.tf:
    - variable "db_instance_class" {
    - variable "app_security_group_id" {

must_not_include:
# Replica uses same aws_db_instance type but is a separate concern
- replica-db
- replicate_source_db
# Staging env has same engine/variable patterns but is unrelated
- staging_db_instance_class
- staging-main-db
# Monitoring is a completely different concern
- aws_cloudwatch_dashboard

must_not_include_files:
- database_replica.tf  # sibling RDS instance, separate concern
- staging_database.tf  # different environment, not touched
- monitoring/dashboard.tf  # different concern entirely

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
