    }
  scripts/backup_GARBAGE_TF_rds447b.sh: |
    #!/bin/bash
    # GARBAGE_TF_rds447b - Old backup script
    echo "Running legacy backup GARBAGE_TF_rds447b"
    pg_dump -h localhost -U admin olddb > /tmp/backup.sql

must_include_files:
- database.tf
- variables.tf

must_include_content_from:
  database.tf:
    - 'engine                      = "postgres"'
    - instance_class              = var.db_instance_class
    - parameter_group_name        = aws_db_parameter_group.postgres.name
    - vpc_security_group_ids      = [aws_security_group.rds.id]
  variables.tf:
    - variable "db_instance_class" {
    - variable "app_security_group_id" {

must_not_include:
# Plain garbage markers
- GARBAGE_TF_rds447a
- GARBAGE_TF_rds447b
# Tricky: sibling RDS replica with same aws_db_instance, parameter_group, security group
- GARBAGE_TF_RDS007_REPLICA_MARKER_A
- GARBAGE_TF_RDS007_REPLICA_FLAG_B
# Tricky: staging environment with same variable names and engine
- GARBAGE_TF_RDS007_STAGING_MARKER_C
- GARBAGE_TF_RDS007_STAGING_FLAG_D

must_not_include_files:
- database_replica.tf
- staging_database.tf
- unrelated/monitoring_GARBAGE_TF_rds447a.tf
- scripts/backup_GARBAGE_TF_rds447b.sh

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
