initial:
  app.py: |
    import psycopg2
    conn = psycopg2.connect(os.environ['DATABASE_URL'])
  database.tf: |
    # RDS resources placeholder
  variables.tf: |
    variable "environment" {
      type    = string
      default = "dev"
    }

  # --- Tricky garbage: sibling RDS replica with same resource types and patterns ---
  database_replica.tf: |
    GARBAGE_TF_RDS007_REPLICA_MARKER_A = "replica-db"
    GARBAGE_TF_RDS007_REPLICA_FLAG_B = true

    resource "aws_db_instance" "replica" {
      identifier                  = "${var.environment}-replica-db"
      engine                      = "postgres"
      engine_version              = "15.4"
      instance_class              = var.replica_instance_class
      replicate_source_db         = "arn:aws:rds:us-east-1:123456789:db:source-db"
      storage_encrypted           = true
      kms_key_id                  = var.kms_key_arn
      vpc_security_group_ids      = [aws_security_group.rds_replica.id]
      parameter_group_name        = aws_db_parameter_group.postgres_replica.name
      skip_final_snapshot         = true
      multi_az                    = false
      backup_retention_period     = 0

      tags = {
        Name        = "${var.environment}-replica-db-GARBAGE_TF_RDS007_REPLICA_MARKER_A"
        Environment = var.environment
      }
    }

    resource "aws_db_parameter_group" "postgres_replica" {
      family = "postgres15"
      name   = "${var.environment}-postgres-replica-params"

      parameter {
        name  = "log_connections"
        value = "1"
      }

      tags = {
        Name = "GARBAGE_TF_RDS007_REPLICA_FLAG_B-param-group"
      }
    }

    resource "aws_security_group" "rds_replica" {
      name        = "${var.environment}-rds-replica-sg"
      description = "Security group for RDS replica"
      vpc_id      = var.vpc_id

      ingress {
        from_port       = 5432
        to_port         = 5432
        protocol        = "tcp"
        security_groups = [var.analytics_security_group_id]
        description     = "PostgreSQL access from analytics"
      }

      egress {
        from_port   = 0
        to_port     = 0
        protocol    = "-1"
        cidr_blocks = ["0.0.0.0/0"]
      }

      tags = {
        Name = "${var.environment}-rds-replica-sg"
      }
    }

  # --- Tricky garbage: staging environment with same variable names ---
  staging_database.tf: |
    GARBAGE_TF_RDS007_STAGING_MARKER_C = "staging-db"
    GARBAGE_TF_RDS007_STAGING_FLAG_D = "staging"

    variable "staging_db_instance_class" {
      type    = string
      default = "db.t3.small"
    }

    variable "staging_db_username" {
      type      = string
      sensitive = true
      default   = "staging_admin"
    }

    variable "staging_db_password" {
      type      = string
      sensitive = true
    }

    resource "aws_db_instance" "staging" {
      identifier            = "staging-main-db-GARBAGE_TF_RDS007_STAGING_MARKER_C"
      engine                = "postgres"
      engine_version        = "15.4"
      instance_class        = var.staging_db_instance_class
      allocated_storage     = 20
      storage_type          = "gp3"
      storage_encrypted     = true
      username              = var.staging_db_username
      password              = var.staging_db_password
      skip_final_snapshot   = true
      deletion_protection   = false

      tags = {
        Name        = "staging-db-GARBAGE_TF_RDS007_STAGING_FLAG_D"
        Environment = "staging"
      }
    }

  unrelated/monitoring_GARBAGE_TF_rds447a.tf: |
    # GARBAGE_TF_rds447a - Unrelated CloudWatch dashboard
    resource "aws_cloudwatch_dashboard" "legacy_dashboard" {
      dashboard_name = "legacy-metrics-GARBAGE_TF_rds447a"
      dashboard_body = jsonencode({
        widgets = [{
          type   = "metric"
          width  = 6
          height = 6
          properties = {
            metrics = [["AWS/EC2", "CPUUtilization"]]
            title   = "Legacy CPU GARBAGE_TF_rds447a"
          }
        }]
      })
    }
  scripts/backup_GARBAGE_TF_rds447b.sh: |
    #!/bin/bash
    # GARBAGE_TF_rds447b - Old backup script
    echo "Running legacy backup GARBAGE_TF_rds447b"
    pg_dump -h localhost -U admin olddb > /tmp/backup.sql
changed:
  app.py: |
    import psycopg2
    conn = psycopg2.connect(os.environ['DATABASE_URL'])
  database.tf: |
    resource "aws_db_subnet_group" "main" {
      name       = "${var.environment}-db-subnet-group"
      subnet_ids = var.private_subnet_ids

      tags = {
        Name        = "${var.environment}-db-subnet-group"
        Environment = var.environment
      }
    }

    resource "aws_db_parameter_group" "postgres" {
      family = "postgres15"
      name   = "${var.environment}-postgres-params"

      parameter {
        name  = "log_connections"
        value = "1"
      }

      parameter {
        name  = "log_disconnections"
        value = "1"
      }

      parameter {
        name  = "log_statement"
        value = "ddl"
      }
    }

    resource "aws_db_instance" "main" {
      identifier                  = "${var.environment}-main-db"
      engine                      = "postgres"
      engine_version              = "15.4"
      instance_class              = var.db_instance_class
      allocated_storage           = 100
      max_allocated_storage       = 500
      storage_type                = "gp3"
      storage_encrypted           = true
      kms_key_id                  = var.kms_key_arn
      db_subnet_group_name        = aws_db_subnet_group.main.name
      vpc_security_group_ids      = [aws_security_group.rds.id]
      parameter_group_name        = aws_db_parameter_group.postgres.name
      username                    = var.db_username
      password                    = var.db_password
      multi_az                    = var.environment == "prod"
      backup_retention_period     = 30
      backup_window               = "03:00-04:00"
      maintenance_window          = "Mon:04:00-Mon:05:00"
      deletion_protection         = var.environment == "prod"
      skip_final_snapshot         = var.environment != "prod"
      final_snapshot_identifier   = var.environment == "prod" ? "${var.environment}-final-snapshot" : null
      performance_insights_enabled = true
      enabled_cloudwatch_logs_exports = ["postgresql", "upgrade"]

      tags = {
        Name        = "${var.environment}-main-db"
        Environment = var.environment
      }
    }

    resource "aws_security_group" "rds" {
      name        = "${var.environment}-rds-sg"
      description = "Security group for RDS PostgreSQL"
      vpc_id      = var.vpc_id

      ingress {
        from_port       = 5432
        to_port         = 5432
        protocol        = "tcp"
        security_groups = [var.app_security_group_id]
        description     = "PostgreSQL access from application"
      }

      egress {
        from_port   = 0
        to_port     = 0
        protocol    = "-1"
        cidr_blocks = ["0.0.0.0/0"]
      }

      tags = {
        Name        = "${var.environment}-rds-sg"
        Environment = var.environment
      }
    }
  variables.tf: |
    variable "environment" {
      type        = string
      description = "Deployment environment"
    }

    variable "vpc_id" {
      type        = string
      description = "VPC ID for RDS deployment"
    }

    variable "private_subnet_ids" {
      type        = list(string)
      description = "Private subnet IDs for DB subnet group"
    }

    variable "db_instance_class" {
      type    = string
      default = "db.t3.medium"
    }

    variable "db_username" {
      type      = string
      sensitive = true
    }

    variable "db_password" {
      type      = string
      sensitive = true
    }

    variable "kms_key_arn" {
      type        = string
      description = "KMS key ARN for storage encryption"
    }

    variable "app_security_group_id" {
      type        = string
      description = "Application security group for DB access"
    }

  # --- Tricky garbage: identical in changed (no diff) ---
  database_replica.tf: |
    GARBAGE_TF_RDS007_REPLICA_MARKER_A = "replica-db"
    GARBAGE_TF_RDS007_REPLICA_FLAG_B = true

    resource "aws_db_instance" "replica" {
      identifier                  = "${var.environment}-replica-db"
      engine                      = "postgres"
      engine_version              = "15.4"
      instance_class              = var.replica_instance_class
      replicate_source_db         = "arn:aws:rds:us-east-1:123456789:db:source-db"
      storage_encrypted           = true
      kms_key_id                  = var.kms_key_arn
      vpc_security_group_ids      = [aws_security_group.rds_replica.id]
      parameter_group_name        = aws_db_parameter_group.postgres_replica.name
      skip_final_snapshot         = true
      multi_az                    = false
      backup_retention_period     = 0

      tags = {
        Name        = "${var.environment}-replica-db-GARBAGE_TF_RDS007_REPLICA_MARKER_A"
        Environment = var.environment
      }
    }

    resource "aws_db_parameter_group" "postgres_replica" {
      family = "postgres15"
      name   = "${var.environment}-postgres-replica-params"

      parameter {
        name  = "log_connections"
        value = "1"
      }

      tags = {
        Name = "GARBAGE_TF_RDS007_REPLICA_FLAG_B-param-group"
      }
    }

    resource "aws_security_group" "rds_replica" {
      name        = "${var.environment}-rds-replica-sg"
      description = "Security group for RDS replica"
      vpc_id      = var.vpc_id

      ingress {
        from_port       = 5432
        to_port         = 5432
        protocol        = "tcp"
        security_groups = [var.analytics_security_group_id]
        description     = "PostgreSQL access from analytics"
      }

      egress {
        from_port   = 0
        to_port     = 0
        protocol    = "-1"
        cidr_blocks = ["0.0.0.0/0"]
      }

      tags = {
        Name = "${var.environment}-rds-replica-sg"
      }
    }

  staging_database.tf: |
    GARBAGE_TF_RDS007_STAGING_MARKER_C = "staging-db"
    GARBAGE_TF_RDS007_STAGING_FLAG_D = "staging"

    variable "staging_db_instance_class" {
      type    = string
      default = "db.t3.small"
    }

    variable "staging_db_username" {
      type      = string
      sensitive = true
      default   = "staging_admin"
    }

    variable "staging_db_password" {
      type      = string
      sensitive = true
    }

    resource "aws_db_instance" "staging" {
      identifier            = "staging-main-db-GARBAGE_TF_RDS007_STAGING_MARKER_C"
      engine                = "postgres"
      engine_version        = "15.4"
      instance_class        = var.staging_db_instance_class
      allocated_storage     = 20
      storage_type          = "gp3"
      storage_encrypted     = true
      username              = var.staging_db_username
      password              = var.staging_db_password
      skip_final_snapshot   = true
      deletion_protection   = false

      tags = {
        Name        = "staging-db-GARBAGE_TF_RDS007_STAGING_FLAG_D"
        Environment = "staging"
      }
    }

  unrelated/monitoring_GARBAGE_TF_rds447a.tf: |
    # GARBAGE_TF_rds447a - Unrelated CloudWatch dashboard
    resource "aws_cloudwatch_dashboard" "legacy_dashboard" {
      dashboard_name = "legacy-metrics-GARBAGE_TF_rds447a"
      dashboard_body = jsonencode({
        widgets = [{
          type   = "metric"
          width  = 6
