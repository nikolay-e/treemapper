# Scenario: Adding lifecycle ignore_changes to an EC2 instance to prevent
#   Terraform from replacing instances when AMI or user_data changes externally.
#
# Reviewer questions:
#   Q1: "Who sets the AMI externally? Is there an ASG or CI pipeline?"
#       -> autoscaling.tf defines ASG and launch template using the same
#         var.ami_id. Shows the ASG updates AMIs via $Latest version.
#   Q2: "What user_data template is used?"
#       -> userdata.tf defines template_file that renders the init script
#         with environment and app_version variables.
#   Q3: "What tags use timestamp()?"
#       -> main.tf itself has LastModified = timestamp() in tags.
#         The lifecycle also ignores tags["LastModified"].
#
# Not needed:
#   - database/rds.tf: Also has lifecycle ignore_changes but on RDS.
#     HARD TRAP: same lifecycle { ignore_changes = [...] } block syntax.
#     But ignores engine_version on a database, different resource.
#
#   - cache/elasticache.tf: Also has lifecycle ignore_changes on cache.
#     HARD TRAP: same block, same pattern. But ignores engine_version
#     on ElastiCache, completely different resource.
#
#   - dns/zone.tf: Route53 zone. Unrelated to instance lifecycle.
#
#   - ci/codedeploy.tf: CodeDeploy that updates AMIs on instances.
#     Direct edge: same AMI update concern. But CI deployment is
#     the operational trigger, not the Terraform configuration.

initial:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = var.ami_id
      instance_type = "t3.micro"
      user_data     = data.template_file.init.rendered

      tags = merge(local.common_tags, {
        Name        = "web-server"
        LastModified = timestamp()
      })
    }
  autoscaling.tf: |
    resource "aws_autoscaling_group" "web" {
      name                = "web-asg"
      desired_capacity    = 2
      max_size            = 4
      min_size            = 1
      vpc_zone_identifier = var.subnet_ids

      launch_template {
        id      = aws_launch_template.web.id
        version = "$Latest"
      }

      tag {
        key                 = "Name"
        value               = "web-asg-instance"
        propagate_at_launch = true
      }
    }

    resource "aws_launch_template" "web" {
      name_prefix   = "web-"
      image_id      = var.ami_id
      instance_type = "t3.micro"
      user_data     = base64encode(data.template_file.init.rendered)
    }
  userdata.tf: |
    data "template_file" "init" {
      template = file("${path.module}/scripts/init.sh")
      vars = {
        environment = var.environment
        app_version = var.app_version
      }
    }
  database/rds.tf: |
    resource "aws_db_instance" "replica" {
      identifier     = "read-replica"
      engine         = "mysql"
      instance_class = "db.t3.micro"

      lifecycle {
        ignore_changes = [
          engine_version,
        ]
      }
    }
  cache/elasticache.tf: |
    resource "aws_elasticache_cluster" "session" {
      cluster_id           = "session-cache"
      engine               = "redis"
      node_type            = "cache.t3.micro"
      num_cache_nodes      = 1
      engine_version       = "7.0"

      lifecycle {
        ignore_changes = [
          engine_version,
        ]
      }
    }
  dns/zone.tf: |
    resource "aws_route53_zone" "primary" {
      name = "example.com"
    }

    resource "aws_route53_record" "web" {
      zone_id = aws_route53_zone.primary.zone_id
      name    = "web.example.com"
      type    = "A"
      ttl     = 300
      records = [aws_instance.web.public_ip]
    }
  ci/codedeploy.tf: |
    resource "aws_codedeploy_app" "web" {
      name             = "web-deploy"
      compute_platform = "Server"
    }

    resource "aws_codedeploy_deployment_group" "web" {
      app_name              = aws_codedeploy_app.web.name
      deployment_group_name = "web-deploy-group"
      service_role_arn      = aws_iam_role.codedeploy.arn

      auto_rollback_configuration {
        enabled = true
        events  = ["DEPLOYMENT_FAILURE"]
      }
    }

changed:
  main.tf: |
    resource "aws_instance" "web" {
      ami           = var.ami_id
      instance_type = "t3.micro"
      user_data     = data.template_file.init.rendered

      tags = merge(local.common_tags, {
        Name        = "web-server"
        LastModified = timestamp()
      })

      lifecycle {
        ignore_changes = [
          ami,
          user_data,
          tags["LastModified"],
        ]
      }
    }

must_include_files:
  - main.tf
  # Q1: ASG and launch template that also use var.ami_id
  - autoscaling.tf
  # Q2: User data template being ignored
  - userdata.tf

must_include_content_from:
  main.tf:
    - ignore_changes = [
    - ami,
    - user_data,
    - resource "aws_instance" "web" {
  autoscaling.tf:
    - resource "aws_autoscaling_group" "web" {
    - image_id      = var.ami_id
  userdata.tf:
    - data "template_file" "init" {
    - app_version = var.app_version

must_not_include:
  # --- database/rds.tf: same lifecycle block but on RDS ---
  - read-replica
  - engine_version
  - db.t3.micro
  # --- cache/elasticache.tf: same lifecycle block but on ElastiCache ---
  - session-cache
  - cache.t3.micro
  # --- dns/zone.tf: unrelated to instance lifecycle ---
  - aws_route53_zone
  - web.example.com
  # --- ci/codedeploy.tf: AMI update trigger but operational concern ---
  - web-deploy
  - DEPLOYMENT_FAILURE
  - aws_codedeploy_app

must_not_include_files:
  - database/rds.tf
  - cache/elasticache.tf
  - dns/zone.tf
  - ci/codedeploy.tf

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
