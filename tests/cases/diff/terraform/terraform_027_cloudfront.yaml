must_include_files:
- cdn.tf

must_include_content_from:
  cdn.tf:
    - resource "aws_cloudfront_distribution" "main" {
    - viewer_protocol_policy = "redirect-to-https"

must_not_include:
- GARBAGE_TF_027_API_CDN_A
- GARBAGE_TF_027_API_TTL_B
- GARBAGE_TF_027_QUEUE_PROC_C
- GARBAGE_TF_027_QUEUE_BATCH_D

must_not_include_files:
- api_cdn.tf
- garbage_queue_processor.java

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
