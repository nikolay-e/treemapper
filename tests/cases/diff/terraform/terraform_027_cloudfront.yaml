# Scenario: Adding a CloudFront distribution for S3 static website hosting
#   with OAI and redirect-to-https.
#
# Reviewer questions:
#   Q1: "What S3 bucket serves as the origin?"
#       -> s3.tf defines aws_s3_bucket.website with a bucket policy.
#   Q2: "Is there an existing CDN that could conflict?"
#       -> api_cdn.tf has an ALB-based CloudFront distribution.
#   Q3: "What ACM certificate is referenced?"
#       -> acm.tf (UNCHANGED) defines the certificate used by the new
#         CloudFront distribution. Reviewer must verify domain match.
#
# Not needed:
#   - api_cdn.tf: Same CloudFront resource type but for ALB API origin.
#     HARDEST TRAP: identical resource type (aws_cloudfront_distribution),
#     same nested blocks (origin, cache_behavior, viewer_certificate).
#     But different origin type (ALB vs S3), different caching strategy.
#
#   - waf/cloudfront_rules.tf: WAF rules for CloudFront. References
#     CloudFront distributions. Same domain. But WAF rules are security
#     policy, not distribution configuration.
#
#   - dns/records.tf: Route53 records pointing to CloudFront. Direct
#     edge: will need a record for the new distribution. But DNS routing
#     is downstream configuration.
#
#   - monitoring/cdn_alarms.tf: CloudWatch alarms for CloudFront metrics.
#     Same CloudFront domain. But monitoring is observation.

initial:
  cdn.tf: |
    # CDN resources
  api_cdn.tf: |
    resource "aws_cloudfront_distribution" "api" {
      enabled         = true
      is_ipv6_enabled = true

      origin {
        domain_name = aws_lb.api.dns_name
        origin_id   = "ALB-API"

        custom_origin_config {
          http_port              = 80
          https_port             = 443
          origin_protocol_policy = "https-only"
          origin_ssl_protocols   = ["TLSv1.2"]
        }
      }

      default_cache_behavior {
        allowed_methods  = ["GET", "HEAD", "OPTIONS", "PUT", "POST", "PATCH", "DELETE"]
        cached_methods   = ["GET", "HEAD"]
        target_origin_id = "ALB-API"

        forwarded_values {
          query_string = true
          cookies {
            forward = "all"
          }
        }

        viewer_protocol_policy = "https-only"
      }

      restrictions {
        geo_restriction {
          restriction_type = "none"
        }
      }

      viewer_certificate {
        acm_certificate_arn = aws_acm_certificate.api.arn
        ssl_support_method  = "sni-only"
      }
    }
  s3.tf: |
    resource "aws_s3_bucket" "website" {
      bucket = "${var.environment}-static-website"
    }

    resource "aws_s3_bucket_policy" "website" {
      bucket = aws_s3_bucket.website.id
      policy = data.aws_iam_policy_document.s3_website.json
    }

    data "aws_iam_policy_document" "s3_website" {
      statement {
        actions   = ["s3:GetObject"]
        resources = ["${aws_s3_bucket.website.arn}/*"]
        principals {
          type        = "AWS"
          identifiers = [aws_cloudfront_origin_access_identity.main.iam_arn]
        }
      }
    }
  acm.tf: |
    resource "aws_acm_certificate" "main" {
      domain_name       = "www.example.com"
      validation_method = "DNS"

      subject_alternative_names = [
        "example.com",
        "*.example.com",
      ]

      lifecycle {
        create_before_destroy = true
      }
    }

    resource "aws_acm_certificate_validation" "main" {
      certificate_arn = aws_acm_certificate.main.arn
    }
  waf/cloudfront_rules.tf: |
    resource "aws_wafv2_web_acl" "cloudfront" {
      name  = "cloudfront-waf"
      scope = "CLOUDFRONT"

      default_action {
        allow {}
      }

      rule {
        name     = "rate-limit"
        priority = 1

        action {
          block {}
        }

        statement {
          rate_based_statement {
            limit              = 2000
            aggregate_key_type = "IP"
          }
        }

        visibility_config {
          sampled_requests_enabled = true
          cloudwatch_metrics_enabled = true
          metric_name = "rate-limit-rule"
        }
      }

      visibility_config {
        sampled_requests_enabled = true
        cloudwatch_metrics_enabled = true
        metric_name = "cloudfront-waf"
      }
    }
  dns/records.tf: |
    resource "aws_route53_record" "website" {
      zone_id = aws_route53_zone.main.zone_id
      name    = "www.example.com"
      type    = "A"

      alias {
        name                   = aws_cloudfront_distribution.main.domain_name
        zone_id                = aws_cloudfront_distribution.main.hosted_zone_id
        evaluate_target_health = false
      }
    }
  monitoring/cdn_alarms.tf: |
    resource "aws_cloudwatch_metric_alarm" "cdn_4xx" {
      alarm_name          = "cdn-high-4xx-rate"
      comparison_operator = "GreaterThanThreshold"
      evaluation_periods  = 2
      metric_name         = "4xxErrorRate"
      namespace           = "AWS/CloudFront"
      period              = 300
      statistic           = "Average"
      threshold           = 5
    }

changed:
  cdn.tf: |
    resource "aws_cloudfront_distribution" "main" {
      enabled             = true
      is_ipv6_enabled     = true
      default_root_object = "index.html"

      origin {
        domain_name = aws_s3_bucket.website.bucket_regional_domain_name
        origin_id   = "S3-Website"

        s3_origin_config {
          origin_access_identity = aws_cloudfront_origin_access_identity.main.cloudfront_access_identity_path
        }
      }

      default_cache_behavior {
        allowed_methods  = ["GET", "HEAD"]
        cached_methods   = ["GET", "HEAD"]
        target_origin_id = "S3-Website"

        forwarded_values {
          query_string = false
          cookies {
            forward = "none"
          }
        }

        viewer_protocol_policy = "redirect-to-https"
      }

      restrictions {
        geo_restriction {
          restriction_type = "none"
        }
      }

      viewer_certificate {
        acm_certificate_arn = aws_acm_certificate.main.arn
        ssl_support_method  = "sni-only"
      }
    }

# s3.tf is unchanged but the reviewer needs it to see the origin bucket
# definition referenced via aws_s3_bucket.website in the CloudFront config
must_include_files:
  # Q1: S3 bucket and policy for the origin
  - s3.tf
  # Q3: ACM certificate referenced by viewer_certificate
  - acm.tf

must_include_content_from:
  s3.tf:
    - resource "aws_s3_bucket" "website" {
    - aws_s3_bucket_policy
    - aws_cloudfront_origin_access_identity.main.iam_arn
  acm.tf:
    - resource "aws_acm_certificate" "main" {
    - domain_name       = "www.example.com"

must_not_include:
  # --- api_cdn.tf: same type but for ALB with different caching ---
  - ALB-API
  - origin_protocol_policy = "https-only"
  - forward = "all"
  - aws_acm_certificate.api.arn
  # --- WAF rules: security policy for CloudFront ---
  - cloudfront-waf
  - rate-limit
  - rate_based_statement
  # --- DNS records: downstream routing ---
  - aws_route53_record
  - www.example.com
  # --- CDN alarms: monitoring concern ---
  - cdn-high-4xx-rate
  - 4xxErrorRate

must_not_include_files:
  - api_cdn.tf
  - waf/cloudfront_rules.tf
  - dns/records.tf
  - monitoring/cdn_alarms.tf

max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
