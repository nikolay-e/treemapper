  changed_files:
    src/main/scala/orm/QueryBuilder.scala: |
      package orm

      class QueryBuilder {
        private var table: String = ""
        private var conditions: List[(String, String, Any)] = Nil
        private var limitVal: Option[Int] = None
        private var offsetVal: Option[Int] = None
        private var orderByCol: Option[String] = None

        def from(tableName: String): QueryBuilder = {
          table = tableName
          this
        }

        def where(column: String, value: Any, operator: String = "="): QueryBuilder = {
          conditions = conditions :+ (column, operator, value)
          this
        }

        def limit(n: Int): QueryBuilder = {
          limitVal = Some(n)
          this
        }

        def offset(n: Int): QueryBuilder = {
          offsetVal = Some(n)
          this
        }

        def orderBy(column: String, direction: String = "ASC"): QueryBuilder = {
          orderByCol = Some(s"$column $direction")
          this
        }

        def toSql(): String = {
          var sql = s"SELECT * FROM $table"
          if (conditions.nonEmpty)
            sql += " WHERE " + conditions.map { case (c, op, v) => s"$c $op '$v'" }.mkString(" AND ")
          orderByCol.foreach(o => sql += s" ORDER BY $o")
          limitVal.foreach(l => sql += s" LIMIT $l")
          offsetVal.foreach(o => sql += s" OFFSET $o")
          sql
        }
      }
  commit_message: "Add operator, pagination, and ordering to QueryBuilder"
