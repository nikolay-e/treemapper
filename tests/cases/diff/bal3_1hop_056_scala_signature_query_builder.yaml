    src/main/scala/orm/QueryBuilder.scala: |
      package orm

      class QueryBuilder {
        private var table: String = ""
        private var conditions: List[(String, Any)] = Nil

        def from(tableName: String): QueryBuilder = {
          table = tableName
          this
        }

        def where(column: String, value: Any): QueryBuilder = {
          conditions = conditions :+ (column, value)
          this
        }

        def toSql(): String = {
          val sql = s"SELECT * FROM $table"
          if (conditions.isEmpty) sql
          else sql + " WHERE " + conditions.map { case (c, v) => s"$c = '$v'" }.mkString(" AND ")
        }
      }
