repo:
  initial_files:
    src/main/scala/ledger/Currency.scala: |
      package ledger

      case class Currency(code: String, decimals: Int)

      object Currency {
        val USD = Currency("USD", 2)
        val EUR = Currency("EUR", 2)
        val JPY = Currency("JPY", 0)
      }
    src/main/scala/ledger/Money.scala: |
      package ledger

      import ledger.Currency

      case class Money(amount: BigDecimal, currency: Currency) {
        def add(other: Money): Money = {
          require(currency == other.currency, "Currency mismatch")
          Money(amount + other.amount, currency)
        }

        def negate: Money = Money(-amount, currency)

        def roundToScale: Money = Money(amount.setScale(currency.decimals), currency)
      }
    src/main/scala/ledger/Entry.scala: |
      package ledger

      import ledger.Money

      case class Entry(account: String, amount: Money) {
        def isDebit: Boolean = amount.amount > 0
        def isCredit: Boolean = amount.amount < 0
      }
    src/main/scala/ledger/Transaction.scala: |
      package ledger

      import ledger.{Entry, Money}

      case class Transaction(id: String, entries: List[Entry]) {
        def isBalanced: Boolean = {
          val total = entries.map(_.amount).reduce(_ add _)
          total.amount == BigDecimal(0)
        }
      }
    src/main/scala/ledger/Journal.scala: |
      package ledger

      import ledger.Transaction

      class Journal {
        private var transactions: List[Transaction] = Nil

        def post(tx: Transaction): Either[String, Unit] = {
          if (tx.isBalanced) {
            transactions = tx :: transactions
            Right(())
          } else Left("Unbalanced transaction")
        }

        def allTransactions: List[Transaction] = transactions.reverse
      }
    src/main/scala/api/LedgerApi.scala: |
      package api

      import ledger.{Journal, Transaction, Entry, Money, Currency}

      class LedgerApi(journal: Journal) {
        def postTransaction(id: String, entries: List[Entry]): Either[String, Unit] = {
          journal.post(Transaction(id, entries))
        }

        def balance(account: String): Money = {
          val all = journal.allTransactions.flatMap(_.entries).filter(_.account == account)
          all.map(_.amount).foldLeft(Money(BigDecimal(0), Currency.USD))(_ add _)
        }
      }
    src/main/scala/util/Audit.scala: |
      package util

      object Audit {
        val GARBAGE_094_AUDIT_A = "trail"
        val GARBAGE_094_AUDIT_B = "snapshot"

        def log(msg: String): Unit = ()
      }
    src/main/scala/util/Crypto.scala: |
      package util

      object Crypto {
        val GARBAGE_094_CRYPTO_C = "aes256"
        val GARBAGE_094_CRYPTO_D = "rsa4096"

        def hash(data: String): String = data.hashCode.toString
      }
  changed_files:
    src/main/scala/ledger/Money.scala: |
      package ledger

      import ledger.Currency

      case class Money(amount: BigDecimal, currency: Currency) {
        def add(other: Money): Money = {
          require(currency == other.currency, "Currency mismatch")
          Money(amount + other.amount, currency)
        }

        def negate: Money = Money(-amount, currency)

        def roundToScale: Money = Money(amount.setScale(currency.decimals, BigDecimal.RoundingMode.HALF_UP), currency)
      }
  commit_message: "fix: use HALF_UP rounding mode in Money.roundToScale"
