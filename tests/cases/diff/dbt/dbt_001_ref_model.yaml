must_include_files:
- models/marts/order_summary.sql
- models/staging/stg_products.sql

must_include_content_from:
  models/marts/order_summary.sql:
    - ref('stg_products')
    - products.product_name
    - products.category
  models/staging/stg_products.sql:
    - product_id
    - product_name
    - category

must_not_include:
- GARBAGE_DBT_001_A
- GARBAGE_DBT_001_B
- GARBAGE_DBT_001_C

must_not_include_files:
- models/staging/stg_payments.sql
- models/marts/revenue_report.sql
- models/marts/customer_lifetime.sql

max_files: 4
add_garbage_files: false
skip_garbage_check: true
