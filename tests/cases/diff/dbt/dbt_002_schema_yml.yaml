must_include_files:
- models/marts/schema.yml
- models/marts/order_summary.sql

must_include_content_from:
  models/marts/schema.yml:
    - accepted_values
    - completed
    - total_amount
  models/marts/order_summary.sql:
    - refunded
    - completed
    - pending
    - total_amount

must_not_include:
- GARBAGE_DBT_002_A
- GARBAGE_DBT_002_B
- GARBAGE_DBT_002_C

must_not_include_files:
- models/marts/customer_segments.sql
- models/staging/schema.yml
- models/marts/revenue_daily.sql

max_files: 3
add_garbage_files: false
skip_garbage_check: true
