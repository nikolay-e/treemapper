name: dbt_002_schema_yml
repo:
  initial_files:
    models/marts/schema.yml: |
      version: 2

      models:
        - name: order_summary
          description: Aggregated order data with customer info
          columns:
            - name: order_id
              tests:
                - unique
                - not_null
            - name: customer_name
              tests:
                - not_null

        - name: customer_segments
          description: Customer segmentation by behavior
          columns:
            - name: customer_id
              tests:
                - unique
                - not_null
    models/marts/order_summary.sql: |
      WITH orders AS (
          SELECT * FROM {{ ref('stg_orders') }}
      ),

      customers AS (
          SELECT * FROM {{ ref('stg_customers') }}
      )

      SELECT
          orders.order_id,
          orders.order_date,
          orders.amount,
          customers.customer_name,
          customers.email,
          CASE
              WHEN orders.is_refunded THEN 'refunded'
              WHEN orders.is_completed THEN 'completed'
              ELSE 'pending'
          END AS status,
          orders.amount * orders.quantity AS total_amount
      FROM orders
      LEFT JOIN customers ON orders.customer_id = customers.customer_id
    models/marts/customer_segments.sql: |
      -- GARBAGE_DBT_002_A: noise_customer_segments
      WITH customers AS (
          SELECT * FROM {{ ref('stg_customers') }}
      ),

      orders AS (
          SELECT
              customer_id,
              COUNT(*) AS order_count,
              SUM(amount) AS total_spend
          FROM {{ ref('stg_orders') }}
          GROUP BY 1
      )

      SELECT
          customers.customer_id,
          customers.customer_name,
          CASE
              WHEN orders.total_spend > 1000 THEN 'premium'
              WHEN orders.total_spend > 100 THEN 'regular'
              ELSE 'new'
          END AS segment
      FROM customers
      LEFT JOIN orders ON customers.customer_id = orders.customer_id
    models/staging/schema.yml: |
      version: 2

      models:
        - name: stg_orders
          GARBAGE_DBT_002_B: noise_staging_schema
          columns:
            - name: order_id
              tests:
                - unique
                - not_null
            - name: customer_id
              tests:
                - not_null

        - name: stg_customers
          columns:
            - name: customer_id
              tests:
                - unique
                - not_null
    models/marts/revenue_daily.sql: |
      -- GARBAGE_DBT_002_C: noise_revenue_daily
      SELECT
          DATE_TRUNC('day', order_date) AS day,
          SUM(amount) AS daily_revenue
      FROM {{ ref('stg_orders') }}
      GROUP BY 1
  changed_files:
