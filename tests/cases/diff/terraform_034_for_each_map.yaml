  selector:
    path: main.tf
- id: outputs_file
  selector:
    path: outputs.tf
- id: req_global_0
  selector:
    anchor: environments = {
- id: req_global_1
  selector:
    anchor: subnet_config = {
- id: req_global_2
  selector:
    anchor: for_each = local.subnet_config
- id: req_global_3
  selector:
    anchor: output "subnet_ids" {
- id: req_global_4
  selector:
    anchor: output "asg_names" {
- id: no_hardcoded_infra
  selector:
    path: hardcoded_infra.tf
- id: no_database_subnets
  selector:
    path: database_subnets.tf
- id: no_static_subnets
  selector:
    path: legacy/static_subnets.tf
- id: no_global_0
  selector:
    anchor: hardcoded-vpc
- id: no_global_1
  selector:
    anchor: hardcoded-public-1
- id: no_global_2
  selector:
    anchor: hardcoded-web-sg
- id: no_global_3
  selector:
    anchor: db-isolated-1
- id: no_global_4
