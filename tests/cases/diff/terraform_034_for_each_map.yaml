name: terraform_034_for_each_map
repo:
  initial_files:
    main.tf: |
      resource "aws_subnet" "main" {
        vpc_id     = aws_vpc.main.id
        cidr_block = "10.0.1.0/24"
      }
    hardcoded_infra.tf: |
      resource "aws_vpc" "hardcoded" {
        cidr_block           = "10.0.0.0/16"
        enable_dns_hostnames = true
        enable_dns_support   = true

        tags = {
          Name = "hardcoded-vpc"
        }
      }

      resource "aws_subnet" "hardcoded_public_1" {
        vpc_id                  = aws_vpc.hardcoded.id
        cidr_block              = "10.0.1.0/24"
        availability_zone       = "us-east-1a"
        map_public_ip_on_launch = true

        tags = {
          Name = "hardcoded-public-1"
          Tier = "public"
        }
      }

      resource "aws_subnet" "hardcoded_public_2" {
        vpc_id                  = aws_vpc.hardcoded.id
        cidr_block              = "10.0.2.0/24"
        availability_zone       = "us-east-1b"
        map_public_ip_on_launch = true

        tags = {
          Name = "hardcoded-public-2"
          Tier = "public"
        }
      }

      resource "aws_subnet" "hardcoded_private_1" {
        vpc_id            = aws_vpc.hardcoded.id
        cidr_block        = "10.0.10.0/24"
        availability_zone = "us-east-1a"

        tags = {
          Name = "hardcoded-private-1"
          Tier = "private"
        }
      }

      resource "aws_internet_gateway" "hardcoded" {
        vpc_id = aws_vpc.hardcoded.id
      }

      resource "aws_security_group" "hardcoded_web" {
        name   = "hardcoded-web-sg"
        vpc_id = aws_vpc.hardcoded.id

        ingress {
          from_port   = 80
          to_port     = 80
          protocol    = "tcp"
          cidr_blocks = ["0.0.0.0/0"]
        }
      }

      resource "aws_launch_template" "hardcoded_dev" {
        name_prefix   = "dev-"
        image_id      = "ami-12345678"
        instance_type = "t3.small"
      }

      resource "aws_launch_template" "hardcoded_staging" {
        name_prefix   = "staging-"
        image_id      = "ami-12345678"
        instance_type = "t3.medium"
      }

      resource "aws_launch_template" "hardcoded_prod" {
        name_prefix   = "prod-"
        image_id      = "ami-12345678"
        instance_type = "t3.large"
      }
    database_subnets.tf: |
      resource "aws_subnet" "db_isolated_1" {
        vpc_id            = aws_vpc.database.id
        cidr_block        = "10.100.1.0/24"
        availability_zone = "us-east-1a"

        tags = {
          Name = "db-isolated-1"
          Tier = "database"
        }
      }

      resource "aws_subnet" "db_isolated_2" {
        vpc_id            = aws_vpc.database.id
        cidr_block        = "10.100.2.0/24"
        availability_zone = "us-east-1b"

        tags = {
          Name = "db-isolated-2"
          Tier = "database"
        }
      }

      resource "aws_db_subnet_group" "isolated" {
        name       = "db-isolated-subnet-group"
        subnet_ids = [aws_subnet.db_isolated_1.id, aws_subnet.db_isolated_2.id]
      }
    legacy/static_subnets.tf: |
      resource "aws_subnet" "legacy_subnet_1" {
        vpc_id     = aws_vpc.legacy.id
        cidr_block = "172.16.1.0/24"
      }

      resource "aws_subnet" "legacy_subnet_2" {
        vpc_id     = aws_vpc.legacy.id
        cidr_block = "172.16.2.0/24"
      }
  changed_files:
    main.tf: |
      locals {
        environments = {
          dev = {
            instance_type  = "t3.small"
            min_size       = 1
            max_size       = 2
            desired_size   = 1
            enable_logging = false
          }
          staging = {
            instance_type  = "t3.medium"
            min_size       = 2
            max_size       = 4
            desired_size   = 2
            enable_logging = true
          }
          prod = {
            instance_type  = "t3.large"
            min_size       = 3
            max_size       = 10
            desired_size   = 3
            enable_logging = true
          }
        }

        subnet_config = {
          "public-1" = {
            cidr        = "10.0.1.0/24"
            az_index    = 0
            public      = true
            nat_gateway = false
          }
          "public-2" = {
            cidr        = "10.0.2.0/24"
            az_index    = 1
            public      = true
            nat_gateway = false
          }
          "public-3" = {
            cidr        = "10.0.3.0/24"
            az_index    = 2
            public      = true
            nat_gateway = true
          }
          "private-1" = {
            cidr        = "10.0.10.0/24"
            az_index    = 0
            public      = false
            nat_gateway = false
          }
          "private-2" = {
            cidr        = "10.0.11.0/24"
            az_index    = 1
            public      = false
            nat_gateway = false
          }
          "private-3" = {
            cidr        = "10.0.12.0/24"
            az_index    = 2
            public      = false
            nat_gateway = false
          }
          "database-1" = {
            cidr        = "10.0.20.0/24"
            az_index    = 0
            public      = false
            nat_gateway = false
          }
          "database-2" = {
            cidr        = "10.0.21.0/24"
            az_index    = 1
            public      = false
            nat_gateway = false
          }
        }

        public_subnets   = { for k, v in local.subnet_config : k => v if v.public }
        private_subnets  = { for k, v in local.subnet_config : k => v if !v.public && !startswith(k, "database") }
        database_subnets = { for k, v in local.subnet_config : k => v if startswith(k, "database") }
        nat_subnets      = { for k, v in local.subnet_config : k => v if v.nat_gateway }

        security_rules = {
          http = {
            from_port   = 80
            to_port     = 80
            protocol    = "tcp"
            cidr_blocks = ["0.0.0.0/0"]
            description = "HTTP access"
          }
          https = {
            from_port   = 443
            to_port     = 443
            protocol    = "tcp"
            cidr_blocks = ["0.0.0.0/0"]
            description = "HTTPS access"
          }
          ssh = {
            from_port   = 22
            to_port     = 22
            protocol    = "tcp"
            cidr_blocks = var.admin_cidr_blocks
            description = "SSH access from admin"
          }
        }
      }

      data "aws_availability_zones" "available" {
        state = "available"
      }

      resource "aws_vpc" "main" {
        cidr_block           = var.vpc_cidr
        enable_dns_hostnames = true
        enable_dns_support   = true

        tags = {
          Name = "${var.environment}-vpc"
        }
      }

      resource "aws_subnet" "main" {
        for_each = local.subnet_config

        vpc_id                  = aws_vpc.main.id
        cidr_block              = each.value.cidr
        availability_zone       = data.aws_availability_zones.available.names[each.value.az_index]
        map_public_ip_on_launch = each.value.public

        tags = {
          Name = "${var.environment}-${each.key}"
          Tier = each.value.public ? "public" : (startswith(each.key, "database") ? "database" : "private")
        }
      }

      resource "aws_internet_gateway" "main" {
        vpc_id = aws_vpc.main.id

        tags = {
          Name = "${var.environment}-igw"
        }
      }

      resource "aws_eip" "nat" {
        for_each = local.nat_subnets
        domain   = "vpc"

        tags = {
          Name = "${var.environment}-nat-eip-${each.key}"
        }

        depends_on = [aws_internet_gateway.main]
      }

      resource "aws_nat_gateway" "main" {
        for_each = local.nat_subnets

        allocation_id = aws_eip.nat[each.key].id
        subnet_id     = aws_subnet.main[each.key].id

        tags = {
          Name = "${var.environment}-nat-${each.key}"
        }
      }

      resource "aws_route_table" "public" {
        vpc_id = aws_vpc.main.id

        route {
          cidr_block = "0.0.0.0/0"
          gateway_id = aws_internet_gateway.main.id
        }

        tags = {
          Name = "${var.environment}-public-rt"
        }
      }

      resource "aws_route_table" "private" {
        for_each = local.nat_subnets
        vpc_id   = aws_vpc.main.id

        route {
          cidr_block     = "0.0.0.0/0"
          nat_gateway_id = aws_nat_gateway.main[each.key].id
        }

        tags = {
          Name = "${var.environment}-private-rt-${each.key}"
        }
      }

      resource "aws_route_table_association" "public" {
        for_each = local.public_subnets

        subnet_id      = aws_subnet.main[each.key].id
        route_table_id = aws_route_table.public.id
      }

      resource "aws_route_table_association" "private" {
        for_each = local.private_subnets

        subnet_id      = aws_subnet.main[each.key].id
        route_table_id = aws_route_table.private[keys(local.nat_subnets)[0]].id
      }

      resource "aws_security_group" "web" {
        name        = "${var.environment}-web-sg"
        description = "Security group for web servers"
        vpc_id      = aws_vpc.main.id

        tags = {
          Name = "${var.environment}-web-sg"
        }
      }

      resource "aws_security_group_rule" "web_ingress" {
        for_each = local.security_rules

        type              = "ingress"
        from_port         = each.value.from_port
        to_port           = each.value.to_port
        protocol          = each.value.protocol
        cidr_blocks       = each.value.cidr_blocks
        description       = each.value.description
        security_group_id = aws_security_group.web.id
      }

      resource "aws_security_group_rule" "web_egress" {
        type              = "egress"
        from_port         = 0
        to_port           = 0
        protocol          = "-1"
        cidr_blocks       = ["0.0.0.0/0"]
        security_group_id = aws_security_group.web.id
      }

      resource "aws_launch_template" "env" {
        for_each = local.environments

        name_prefix   = "${each.key}-"
        image_id      = var.ami_id
        instance_type = each.value.instance_type

        network_interfaces {
          associate_public_ip_address = false
          security_groups             = [aws_security_group.web.id]
        }

        monitoring {
          enabled = each.value.enable_logging
        }

        tag_specifications {
          resource_type = "instance"
          tags = {
            Name        = "${each.key}-instance"
            Environment = each.key
          }
        }

        lifecycle {
          create_before_destroy = true
        }
      }

      resource "aws_autoscaling_group" "env" {
        for_each = local.environments

        name                = "${each.key}-asg"
        vpc_zone_identifier = [for k, v in local.private_subnets : aws_subnet.main[k].id]
        min_size            = each.value.min_size
        max_size            = each.value.max_size
        desired_capacity    = each.value.desired_size

        launch_template {
          id      = aws_launch_template.env[each.key].id
          version = "$Latest"
        }

        tag {
          key                 = "Name"
          value               = "${each.key}-asg-instance"
          propagate_at_launch = true
        }

        tag {
          key                 = "Environment"
          value               = each.key
          propagate_at_launch = true
        }

        lifecycle {
          create_before_destroy = true
        }
      }
    outputs.tf: |
      output "subnet_ids" {
        value = { for k, v in aws_subnet.main : k => v.id }
      }

      output "public_subnet_ids" {
        value = [for k, v in local.public_subnets : aws_subnet.main[k].id]
      }

      output "private_subnet_ids" {
        value = [for k, v in local.private_subnets : aws_subnet.main[k].id]
      }

      output "database_subnet_ids" {
        value = [for k, v in local.database_subnets : aws_subnet.main[k].id]
      }

      output "asg_names" {
        value = { for k, v in aws_autoscaling_group.env : k => v.name }
      }
  commit_message: Update files
fragments:
