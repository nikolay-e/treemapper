  changed_files:
    src/SpO2.jl: |
      module SpO2

      export SpO2Reading, classify_saturation, trend

      struct SpO2Reading
          percent::Float64
          timestamp::Int
      end

      function classify_saturation(r::SpO2Reading)::String
          if r.percent >= 95.0
              return "normal"
          elseif r.percent >= 90.0
              return "mild_hypoxia"
          else
              return "severe_hypoxia"
          end
      end

      function trend(readings::Vector{SpO2Reading})::String
          length(readings) < 2 && return "insufficient_data"
          delta = readings[end].percent - readings[1].percent
          if delta > 1.0
              return "improving"
          elseif delta < -1.0
              return "declining"
          else
              return "stable"
          end
      end

      end
