  changed_files:
    src/matrix.rs: |
      #[derive(Debug, Clone, PartialEq)]
      pub struct Matrix {
          rows: usize,
          cols: usize,
          data: Vec<Vec<f64>>,
      }

      impl Matrix {
          pub fn new(rows: usize, cols: usize) -> Self {
              Matrix {
                  rows,
                  cols,
                  data: vec![vec![0.0; cols]; rows],
              }
          }

          pub fn from_vec(data: Vec<Vec<f64>>) -> Self {
              let rows = data.len();
              let cols = if rows > 0 { data[0].len() } else { 0 };
              Matrix { rows, cols, data }
          }

          pub fn set(&mut self, row: usize, col: usize, value: f64) {
              self.data[row][col] = value;
          }

          pub fn get(&self, row: usize, col: usize) -> f64 {
              self.data[row][col]
          }

          pub fn dimensions(&self) -> (usize, usize) {
              (self.rows, self.cols)
          }

          pub fn transpose(&self) -> Matrix {
              let mut result = Matrix::new(self.cols, self.rows);
              for r in 0..self.rows {
                  for c in 0..self.cols {
                      result.set(c, r, self.data[r][c]);
                  }
              }
              result
          }

          pub fn add(&self, other: &Matrix) -> Result<Matrix, String> {
              if self.dimensions() != other.dimensions() {
                  return Err("Dimension mismatch".to_string());
              }
              let mut result = Matrix::new(self.rows, self.cols);
              for r in 0..self.rows {
                  for c in 0..self.cols {
                      result.set(r, c, self.get(r, c) + other.get(r, c));
                  }
              }
              Ok(result)
          }
      }
  commit_message: "feat: add from_vec, transpose, and add operations to Matrix"
