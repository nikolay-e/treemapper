xfail:
  category: php-namespace-over-linking
repo:
  initial_files:
    app/Models/BaseModel.php: |
      <?php
      namespace App\Models;

      abstract class BaseModel {
          protected array $fillable = [];
          protected array $attributes = [];
          protected array $casts = [];

          public function fill(array $data): self {
              foreach ($data as $key => $value) {
                  if (in_array($key, $this->fillable)) {
                      $this->attributes[$key] = $value;
                  }
              }
              return $this;
          }

          public function getAttribute(string $key): mixed {
              return $this->attributes[$key] ?? null;
          }

          public function toArray(): array {
              return $this->attributes;
          }
      }
    app/Models/User.php: |
      <?php
      namespace App\Models;

      class User extends BaseModel {
          protected array $fillable = ['name', 'email'];
      }
    app/Models/Product.php: |
      <?php
      namespace App\Models;

      class Product extends BaseModel {
          protected array $fillable = ['name', 'price', 'sku', 'category'];

          protected array $casts = [
              'price' => 'decimal',
              'is_available' => 'boolean',
          ];

          public static function create(array $data): self {
              $product = new self();
              return $product->fill($data);
          }

          public function getDisplayName(): string {
              return $this->getAttribute('name') ?? 'Unknown Product';
          }
      }
    app/Models/Profile.php: |
      <?php
      namespace App\Models;

      class Profile {
          private array $data = [];

          public function getAttribute(string $key): mixed {
              return $this->data[$key] ?? null;
          }

          public function getDisplayName(): string {
              $first = $this->getAttribute('first_name') ?? '';
              $last = $this->getAttribute('last_name') ?? '';
              return trim("{$first} {$last}") ?: 'Anonymous';
          }

          public function isAdmin(): bool {
              return $this->getAttribute('level') === 'admin';
          }
      }
