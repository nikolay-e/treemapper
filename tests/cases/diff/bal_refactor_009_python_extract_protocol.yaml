repo:
  initial_files:
    storage/file_store.py: |
      import os

      class FileStore:
          def __init__(self, base_path):
              self.base_path = base_path

          def save(self, key, data):
              path = os.path.join(self.base_path, key)
              with open(path, "w") as f:
                  f.write(data)

          def load(self, key):
              path = os.path.join(self.base_path, key)
              with open(path, "r") as f:
                  return f.read()

          def delete(self, key):
              path = os.path.join(self.base_path, key)
              os.remove(path)
    storage/memory_store.py: |
      class MemoryStore:
          def __init__(self):
              self.data = {}

          def save(self, key, data):
              self.data[key] = data

          def load(self, key):
              return self.data.get(key)

          def delete(self, key):
              self.data.pop(key, None)
    services/document_service.py: |
      from storage.file_store import FileStore

      class DocumentService:
          def __init__(self, store: FileStore):
              self.store = store

          def save_document(self, doc_id, content):
              self.store.save(f"doc_{doc_id}", content)

          def get_document(self, doc_id):
              return self.store.load(f"doc_{doc_id}")
    api/documents.py: |
      from services.document_service import DocumentService
      from storage.file_store import FileStore

      store = FileStore("/var/data")
      doc_svc = DocumentService(store)

      def handle_save(doc_id, content):
          doc_svc.save_document(doc_id, content)
          return {"status": "saved"}
