name: gap2_051_julia_multifile_same_file_graph_traversal
tags:
- lang:julia
- change:refactor
- change:single_file
- context:call_graph
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    src/RouteOptimizer.jl: |
      module RouteOptimizer

      export Route, optimize_route, total_distance

      struct Route
          waypoints::Vector{Tuple{Float64,Float64}}
          label::String
      end

      function total_distance(route::Route)::Float64
          total = 0.0
          for i in 2:length(route.waypoints)
              dx = route.waypoints[i][1] - route.waypoints[i-1][1]
              dy = route.waypoints[i][2] - route.waypoints[i-1][2]
              total += sqrt(dx^2 + dy^2)
          end
          return total
      end

      function optimize_route(route::Route)::Route
          return route
      end

      end
    src/DeliveryPlanner.jl: |
      module DeliveryPlanner

      include("RouteOptimizer.jl")
      using .RouteOptimizer

      function plan_deliveries(routes::Vector{Route})::Vector{Route}
          return sort(routes, by=total_distance)
      end

      function shortest_route(routes::Vector{Route})::Union{Route,Nothing}
          isempty(routes) && return nothing
          return first(plan_deliveries(routes))
      end

      end
    src/ReportGenerator.jl: |
      module ReportGenerator

      include("RouteOptimizer.jl")
      using .RouteOptimizer

      function route_report(routes::Vector{Route})::Vector{String}
          return ["$(r.label): $(round(total_distance(r), digits=2)) km" for r in routes]
      end

      end
