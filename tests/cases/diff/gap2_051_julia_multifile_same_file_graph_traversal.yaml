      module Clustering

      GARBAGE_GAP2_051_ALGO_A = "kmeans"
      GARBAGE_GAP2_051_K_B = 3

      function assign_clusters(points::Vector{Vector{Float64}}, k::Int)::Vector{Int}
          return ones(Int, length(points))
      end

      function cluster_distance(a::Vector{Float64}, b::Vector{Float64})::Float64
          return sqrt(sum((a .- b) .^ 2))
      end

      end
    src/Sorting.jl: |
      module Sorting

      GARBAGE_GAP2_051_SORT_C = "quicksort"
      GARBAGE_GAP2_051_PIVOT_D = "median"

      function quicksort(arr::Vector{Int})::Vector{Int}
          if length(arr) <= 1
              return arr
          end
          pivot = arr[1]
          left = filter(x -> x < pivot, arr[2:end])
          right = filter(x -> x >= pivot, arr[2:end])
          return vcat(quicksort(left), [pivot], quicksort(right))
      end

      end
