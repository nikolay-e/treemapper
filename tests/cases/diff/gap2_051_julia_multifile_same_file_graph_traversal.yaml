    src/Graph.jl: |
      module Graph

      export AdjList, add_edge, neighbors, bfs

      const AdjList = Dict{Int, Vector{Int}}

      function add_edge(g::AdjList, u::Int, v::Int)
          if !haskey(g, u)
              g[u] = Int[]
          end
          push!(g[u], v)
      end

      function neighbors(g::AdjList, node::Int)::Vector{Int}
          return get(g, node, Int[])
      end

      function bfs(g::AdjList, start::Int)::Vector{Int}
          visited = Set{Int}()
          queue = [start]
          order = Int[]
          while !isempty(queue)
              node = popfirst!(queue)
              if node in visited
                  continue
              end
              push!(visited, node)
              push!(order, node)
              for nb in neighbors(g, node)
                  push!(queue, nb)
              end
          end
          return order
      end

      end
    src/PathFinder.jl: |
      module PathFinder

      export shortest_path, has_path

      function shortest_path(g::Dict{Int,Vector{Int}}, src::Int, dst::Int)::Vector{Int}
          if src == dst
              return [src]
          end
          parent = Dict{Int, Int}()
          visited = Set{Int}([src])
          queue = [src]
          while !isempty(queue)
              node = popfirst!(queue)
              for nb in get(g, node, Int[])
                  if !(nb in visited)
                      parent[nb] = node
                      push!(visited, nb)
                      push!(queue, nb)
                      if nb == dst
                          return reconstruct(parent, src, dst)
                      end
                  end
              end
          end
          return Int[]
      end

      function reconstruct(parent::Dict{Int,Int}, src::Int, dst::Int)::Vector{Int}
          path = [dst]
          current = dst
          while current != src
              current = parent[current]
              pushfirst!(path, current)
          end
          return path
      end

      function has_path(g::Dict{Int,Vector{Int}}, src::Int, dst::Int)::Bool
          return !isempty(shortest_path(g, src, dst))
      end

      end
