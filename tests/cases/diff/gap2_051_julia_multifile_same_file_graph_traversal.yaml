      module PathFinder

      export shortest_path, has_path, path_length

      function shortest_path(g::Dict{Int,Vector{Int}}, src::Int, dst::Int)::Vector{Int}
          if src == dst
              return [src]
          end
          parent = Dict{Int, Int}()
          visited = Set{Int}([src])
          queue = [src]
          while !isempty(queue)
              node = popfirst!(queue)
              for nb in get(g, node, Int[])
                  if !(nb in visited)
                      parent[nb] = node
                      push!(visited, nb)
                      push!(queue, nb)
                      if nb == dst
                          return reconstruct(parent, src, dst)
                      end
                  end
              end
          end
          return Int[]
      end

      function reconstruct(parent::Dict{Int,Int}, src::Int, dst::Int)::Vector{Int}
          path = [dst]
          current = dst
          while current != src
              current = parent[current]
              pushfirst!(path, current)
          end
          return path
      end

      function has_path(g::Dict{Int,Vector{Int}}, src::Int, dst::Int)::Bool
          return !isempty(shortest_path(g, src, dst))
      end

      function path_length(g::Dict{Int,Vector{Int}}, src::Int, dst::Int)::Int
          p = shortest_path(g, src, dst)
          return isempty(p) ? -1 : length(p) - 1
      end

      end
