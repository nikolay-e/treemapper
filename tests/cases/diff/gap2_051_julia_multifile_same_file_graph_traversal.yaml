  changed_files:
    src/RouteOptimizer.jl: |
      module RouteOptimizer

      export Route, optimize_route, total_distance, segment_distances

      struct Route
          waypoints::Vector{Tuple{Float64,Float64}}
          label::String
          priority::Int
      end

      function total_distance(route::Route)::Float64
          total = 0.0
          for i in 2:length(route.waypoints)
              dx = route.waypoints[i][1] - route.waypoints[i-1][1]
              dy = route.waypoints[i][2] - route.waypoints[i-1][2]
              total += sqrt(dx^2 + dy^2)
          end
          return total
      end

      function segment_distances(route::Route)::Vector{Float64}
          segs = Float64[]
          for i in 2:length(route.waypoints)
              dx = route.waypoints[i][1] - route.waypoints[i-1][1]
              dy = route.waypoints[i][2] - route.waypoints[i-1][2]
              push!(segs, sqrt(dx^2 + dy^2))
          end
          return segs
      end

      function optimize_route(route::Route)::Route
          return route
      end

      end
