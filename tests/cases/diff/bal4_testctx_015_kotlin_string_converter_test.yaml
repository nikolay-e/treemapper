repo:
  initial_files:
    src/main/kotlin/text/StringConverter.kt: |
      package text

      class StringConverter {
          fun toCamelCase(input: String): String {
              return input.split("_")
                  .mapIndexed { i, w -> if (i == 0) w else w.replaceFirstChar { it.uppercase() } }
                  .joinToString("")
          }
      }
    src/test/kotlin/text/StringConverterTest.kt: |
      package text

      import org.junit.jupiter.api.Test
      import org.junit.jupiter.api.Assertions.assertEquals

      class StringConverterTest {
          private val converter = StringConverter()

          @Test
          fun testToCamelCase() {
              assertEquals("helloWorld", converter.toCamelCase("hello_world"))
          }
      }
    src/main/kotlin/text/Slugify.kt: |
      package text

      class Slugify {
          fun slugify(input: String): String = input.lowercase().replace(" ", "-")
      }
  changed_files:
    src/main/kotlin/text/StringConverter.kt: |
      package text

      class StringConverter {
          fun toCamelCase(input: String, delimiter: String = "_"): String {
              return input.split(delimiter)
                  .mapIndexed { i, w -> if (i == 0) w else w.replaceFirstChar { it.uppercase() } }
                  .joinToString("")
          }
      }
  commit_message: "refactor: configurable delimiter for toCamelCase"
