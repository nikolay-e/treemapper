    package MyApp::Controller::User;
    use strict;
    use warnings;
    use base 'Catalyst::Controller';

    sub index :Path :Args(0) {
        my ($self, $c) = @_;
        my $users = $c->model('User')->count_active;
        $c->stash(active_count => $users);
        $c->stash(template => 'user/index.tt');
    }

    sub view :Path :Args(1) {
        my ($self, $c, $id) = @_;
        my $user = $c->model('User')->find($id);
        unless ($user) {
            $c->response->status(404);
            $c->stash(template => 'error/not_found.tt');
            return;
        }
        $c->stash(user => $user, template => 'user/view.tt');
    }

    sub search :Path('search') :Args(0) {
        my ($self, $c) = @_;
        my $query = $c->request->params->{q};
        unless ($query && length($query) >= 2) {
            $c->stash(
                error    => 'Search query must be at least 2 characters',
                template => 'user/search.tt',
            );
            return;
        }
        my $results = $c->model('User')->search_by_name($query, 50);
        $c->stash(
            results  => $results,
            query    => $query,
            template => 'user/search.tt',
        );
    }

    1;
