  lib/MyApp/Product.pm: |
    package MyApp::Product;
    use Moose;
    use MyApp::Types;
    extends 'MyApp::Base';

    has 'price' => (
        is       => 'rw',
        isa      => 'PositiveNum',
        required => 1,
    );

    has 'sku' => (
        is       => 'ro',
        isa      => 'Str',
        required => 1,
    );

    has 'discount_percent' => (
        is      => 'rw',
        isa     => 'PercentValue',
        default => 0,
    );

    sub formatted_price {
        my ($self) = @_;
        return sprintf('$%.2f', $self->price);
    }

    sub discounted_price {
        my ($self) = @_;
        my $discount = $self->discount_percent / 100;
        return $self->price * (1 - $discount);
    }

    __PACKAGE__->meta->make_immutable;
    1;
