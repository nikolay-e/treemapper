must_include_files:
  - lib/MyApp/Product.pm
  # Q1: Types.pm defines PercentValue constraint used by discount_percent
  - lib/MyApp/Types.pm
must_include_content_from:
  lib/MyApp/Product.pm:
    - "discount_percent"
    - "PercentValue"
    - "sub discounted_price"
  lib/MyApp/Types.pm:
    - "subtype 'PercentValue'"
    - "$_ >= 0 && $_ <= 100"
must_not_include:
  # lib/MyApp/Inventory.pm: another Moose class — unrelated domain
  - GARBAGE_PERL_002_A
  - "noise_marker_inventory"
  - "is_in_stock"
  - "adjust_quantity"
  # lib/MyApp/PriceCalculator.pm: pricing — similar domain but not used
  - GARBAGE_PERL_002_B
  - "noise_marker_price_calc"
  - "calculate_total"
  - "apply_bulk_discount"
must_not_include_files:
  - lib/MyApp/Inventory.pm
  - lib/MyApp/PriceCalculator.pm
max_fragments: 6
max_files: 4
add_garbage_files: false
skip_garbage_check: true
