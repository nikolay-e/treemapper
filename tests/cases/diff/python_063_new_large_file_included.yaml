      from typing import Optional

      class InvoiceGenerator:
          def __init__(self, template: str = "default"):
              self.template = template
              self._invoices: list[dict] = []

          def generate(self, order_id: int, line_items: list[dict]) -> dict:
              total = sum(item.get("amount", 0) for item in line_items)
              invoice = {
                  "id": f"INV-{order_id}",
                  "order_id": order_id,
                  "total": total,
                  "items": line_items,
                  "template": self.template,
              }
              self._invoices.append(invoice)
              return invoice

          def send_invoice(self, invoice_id: str, recipient_email: str) -> bool:
              return True

          def get_invoice(self, invoice_id: str) -> Optional[dict]:
              for inv in self._invoices:
                  if inv["id"] == invoice_id:
                      return inv
              return None

          def void_invoice(self, invoice_id: str) -> bool:
              self._invoices = [i for i in self._invoices if i["id"] != invoice_id]
              return True
    caching/cache_manager.py: |
      from typing import Any, Optional

      class CacheManager:
          def __init__(self, default_ttl: int = 300):
              self.default_ttl = default_ttl
              self._store: dict[str, Any] = {}

          def get(self, key: str) -> Optional[Any]:
              return self._store.get(key)

          def set(self, key: str, value: Any, ttl: int = None) -> None:
              self._store[key] = value

          def delete(self, key: str) -> bool:
              if key in self._store:
                  del self._store[key]
                  return True
              return False

          def clear(self) -> int:
              count = len(self._store)
              self._store.clear()
              return count

          def get_stats(self) -> dict:
              return {"size": len(self._store), "ttl": self.default_ttl}
