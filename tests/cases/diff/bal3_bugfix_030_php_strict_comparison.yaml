name: bal3_bugfix_030_php_strict_comparison
tags:
- lang:php
- change:single_file
- change:bug_fix
- context:import_chain
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    src/Collection/Registry.php: |
      <?php
      namespace App\Collection;

      class Registry
      {
          private array $items = [];

          public function register(string $key, mixed $value): void
          {
              $this->items[$key] = $value;
          }

          public function find(string $key): mixed
          {
              $index = array_search($key, array_keys($this->items));
              if ($index == false) {
                  return null;
              }
              return array_values($this->items)[$index];
          }

          public function all(): array
          {
              return $this->items;
          }
      }
    src/Service/Container.php: |
      <?php
      namespace App\Service;

      use App\Collection\Registry;

      class Container
      {
          private Registry $registry;

          public function __construct()
          {
              $this->registry = new Registry();
          }

          public function get(string $key): mixed
          {
              return $this->registry->find($key);
          }

          public function set(string $key, mixed $value): void
          {
              $this->registry->register($key, $value);
          }
      }
    src/Cache/MemoryCache.php: |
      <?php
      namespace App\Cache;

      class MemoryCache
      {
          private array $store = [];

          public function get(string $key): mixed
          {
              return $this->store[$key] ?? null;
          }
      }
  changed_files:
    src/Collection/Registry.php: |
      <?php
      namespace App\Collection;

      class Registry
      {
          private array $items = [];

          public function register(string $key, mixed $value): void
          {
              $this->items[$key] = $value;
          }

          public function find(string $key): mixed
          {
              $index = array_search($key, array_keys($this->items), true);
              if ($index === false) {
                  return null;
              }
              return array_values($this->items)[$index];
          }

          public function all(): array
          {
              return $this->items;
          }
      }
  commit_message: "fix: use strict comparison to prevent 0 == false bug in find"
