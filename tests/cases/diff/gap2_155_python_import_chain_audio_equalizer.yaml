      from audio.filters import apply_band_filter, apply_lowpass

      class Equalizer:
          def __init__(self, bands: int = 10):
              self.bands = bands
              self._gains: list[float] = [0.0] * bands

          def set_gain(self, band: int, db: float) -> None:
              self._gains[band] = db

          def process(self, samples: list[float]) -> list[float]:
              result = samples[:]
              for band, gain in enumerate(self._gains):
                  if gain != 0.0:
                      result = apply_band_filter(result, band, gain)
              return result

          def process_with_lowpass(self, samples: list[float], cutoff_hz: float) -> list[float]:
              filtered = self.process(samples)
              return apply_lowpass(filtered, cutoff_hz)
