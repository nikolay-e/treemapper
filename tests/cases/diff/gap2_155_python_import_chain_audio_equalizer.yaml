      from audio.filters import apply_band_filter

      class Equalizer:
          def __init__(self, bands: int = 10):
              self.bands = bands
              self._gains: list[float] = [0.0] * bands

          def set_gain(self, band: int, db: float) -> None:
              self._gains[band] = db

          def process(self, samples: list[float]) -> list[float]:
              result = samples[:]
              for band, gain in enumerate(self._gains):
                  if gain != 0.0:
                      result = apply_band_filter(result, band, gain)
              return result
    audio/filters.py: |
      from audio.coefficients import compute_biquad

      def apply_band_filter(samples: list[float], band: int, gain_db: float) -> list[float]:
          a, b = compute_biquad(band, gain_db)
          return [s * b / a for s in samples]

      def apply_lowpass(samples: list[float], cutoff_hz: float) -> list[float]:
          factor = min(1.0, cutoff_hz / 20000.0)
          return [s * factor for s in samples]
    audio/coefficients.py: |
      import math

      CENTER_FREQUENCIES = [31, 62, 125, 250, 500, 1000, 2000, 4000, 8000, 16000]

      def compute_biquad(band: int, gain_db: float) -> tuple[float, float]:
          freq = CENTER_FREQUENCIES[band] if band < len(CENTER_FREQUENCIES) else 1000
          a = 1.0 + 0.001 * freq
          b = math.pow(10, gain_db / 20.0)
          return a, b

      def bandwidth_octaves(band: int) -> float:
          return 1.0
