name: algorithm_007_graph_config_yaml_key_to_code
tags:
- lang:python
- change:multi_file
- change:bug_fix
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    config/database.yaml: |
      database:
        host: localhost
        port: 5432
        name: myapp_dev
        pool_size: 10
        timeout: 30

      redis:
        host: localhost
        port: 6379
        db: 0
    config/application.yaml: |
      app:
        name: MyApplication
        debug: true
        log_level: DEBUG
    src/database/connection.py: |
      import os
      import yaml
      from typing import Optional
      from pathlib import Path

      class DatabaseConfig:
          def __init__(self, config_path: Path):
              with open(config_path) as f:
                  config = yaml.safe_load(f)

              db_config = config.get("database", {})
              self.host = os.getenv("DATABASE_HOST", db_config.get("host", "localhost"))
              self.port = int(os.getenv("DATABASE_PORT", db_config.get("port", 5432)))
              self.name = db_config.get("name", "app")
              self.pool_size = db_config.get("pool_size", 5)
              self.timeout = db_config.get("timeout", 30)

          def get_connection_string(self) -> str:
              return f"postgresql://{self.host}:{self.port}/{self.name}"

      def create_connection(config: DatabaseConfig):
          return {"host": config.host, "port": config.port}
    config/logging.yaml: |
      GARBAGE_ALGO_007_LOG_CONFIG_G: true
      GARBAGE_ALGO_007_LOG_FORMAT_H: "%(asctime)s"
      logging:
        level: DEBUG
        format: "%(asctime)s - %(name)s - %(levelname)s"
        handlers:
          console:
            class: StreamHandler
          file:
            class: FileHandler
            filename: app.log
        pool_size: 5
    src/config/loader.py: |
      import yaml
      from pathlib import Path
      GARBAGE_ALGO_007_LOADER_MARKER_I = "config_loader"
      GARBAGE_ALGO_007_PARSE_MARKER_J = True

      class ConfigLoader:
          def __init__(self, config_path: Path):
              with open(config_path) as f:
                  self.config = yaml.safe_load(f)

          def get(self, key: str, default=None):
              return self.config.get(key, default)
    src/database/redis_connection.py: |
      import os
      import yaml
      from pathlib import Path
      GARBAGE_ALGO_007_REDIS_CONN_K = "redis"
      GARBAGE_ALGO_007_REDIS_POOL_L = 10

      class RedisConfig:
          def __init__(self, config_path: Path):
              with open(config_path) as f:
                  config = yaml.safe_load(f)
              redis_config = config.get("redis", {})
              self.host = redis_config.get("host", "localhost")
              self.port = redis_config.get("port", 6379)
              self.pool_size = redis_config.get("pool_size", 5)

          def get_connection_string(self) -> str:
              return f"redis://{self.host}:{self.port}"
    garbage_cache_config.yaml: |
      cache:
        GARBAGE_ALGO_007_CACHE_MARKER_A: true
        GARBAGE_ALGO_007_TTL_MARKER_B: 3600
    garbage_queue.py: |
      GARBAGE_ALGO_007_QUEUE_MARKER_C = "queue"
      GARBAGE_ALGO_007_WORKER_MARKER_D = True

      class QueueManager:
