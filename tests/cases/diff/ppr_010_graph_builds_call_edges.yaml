name: ppr_010_graph_builds_call_edges
tags:
- lang:python
- change:single_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    calls.py: |
      def caller():
          callee()

      def callee():
          pass
    dispatcher.py: |
      def dispatch(event):
          return handle(event)

      def handle(event):
          return f"handled: {event}"

      def notify(event):
          dispatch(event)
    pipeline.py: |
      def step_one(data):
          return step_two(data)

      def step_two(data):
          return data + "_processed"

      def run_pipeline(data):
          return step_one(data)
  changed_files:
    calls.py: |
      def caller():
          callee()
          return 1

      def callee():
          pass
    dispatcher.py: |
      def dispatch(event):
          return handle(event)

      def handle(event):
          return f"handled: {event}"

      def notify(event):
          dispatch(event)
    pipeline.py: |
      def step_one(data):
          return step_two(data)

      def step_two(data):
          return data + "_processed"

      def run_pipeline(data):
          return step_one(data)
  commit_message: Update files
