# === Assertions ===

must_include_files:
- build.zig
- src/main.zig

must_include_content_from:
  build.zig:
    - '"storage"'
    - src/storage.zig
  src/main.zig:
    - const storage = @import("storage")
    - storage.StorageEngine.init
  src/storage.zig:
    - pub const StorageEngine = struct
    - 'pub fn init(path: []const u8, capacity: usize) StorageEngine'

must_not_include:
# Tricky: build-related file
- GARBAGE_ZIG_002_ZON_MARKER_A
- GARBAGE_ZIG_002_MANIFEST_B
# Tricky: also uses std.net
- GARBAGE_ZIG_002_CLIENT_MARKER_C
- GARBAGE_ZIG_002_CONN_FLAG_D
# Tricky: another module not in build
- GARBAGE_ZIG_002_LOGGER_MARKER_E
- GARBAGE_ZIG_002_LOG_LEVEL_F
# Plain garbage
- GARBAGE_ZIG_002_CONST_MARKER_G
- GARBAGE_ZIG_002_APP_VER_H

must_not_include_files:
- build.zig.zon
- src/client.zig
- src/logger.zig
- src/constants.zig

max_fragments: 10
max_files: 3
add_garbage_files: false
skip_garbage_check: true
