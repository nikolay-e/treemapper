# === Assertions ===

must_include_files:
- src/errors.zig
- src/handler.zig

must_include_content_from:
  src/errors.zig:
    - FileLocked
  src/handler.zig:
    - errors.FileError.FileLocked
    - File is locked

must_not_include:
# Tricky: also imports errors.zig
- GARBAGE_ZIG_003_WRITER_MARKER_A
- GARBAGE_ZIG_003_WRITE_FLAG_B
# Tricky: also defines error types
- GARBAGE_ZIG_003_NET_ERR_MARKER_C
- GARBAGE_ZIG_003_TIMEOUT_VAL_D
# Tricky: also uses switch on errors
- GARBAGE_ZIG_003_PARSER_MARKER_E
- GARBAGE_ZIG_003_TOKEN_FLAG_F
# Plain garbage
- GARBAGE_ZIG_003_UTILS_MARKER_G
- GARBAGE_ZIG_003_HELPER_H

must_not_include_files:
- src/writer.zig
- src/network_errors.zig
- src/parser.zig
- src/utils.zig

max_fragments: 8
max_files: 3
add_garbage_files: false
skip_garbage_check: true
