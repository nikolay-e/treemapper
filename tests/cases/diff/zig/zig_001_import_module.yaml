# === Assertions ===

must_include_files:
- src/main.zig

must_include_content_from:
  src/main.zig:
    - const blended = utils.lerp(0.0, 100.0, 0.75)
    - Blended
  src/utils.zig:
    - 'pub fn lerp(a: f64, b: f64, t: f64) f64'

must_not_include:
# Trap: imports utils.zig, calls clamp
- TRAP_ZIG_001_RENDER_MARKER_A
- TRAP_ZIG_001_DRAW_FLAG_B
# Trap: imports utils.zig, calls formatNumber
- TRAP_ZIG_001_LOG_MARKER_C
- TRAP_ZIG_001_LOG_FLAG_D
# Trap: imports utils.zig, calls lerp (same function as the diff!)
- TRAP_ZIG_001_ANIM_MARKER_E
- TRAP_ZIG_001_TWEEN_FLAG_F
# Trap: imports std, similar signatures (interpolate vs lerp)
- TRAP_ZIG_001_MATH_MARKER_G
- TRAP_ZIG_001_PRECISION_H
# Trap: imports std only
- TRAP_ZIG_001_ALLOC_MARKER_I
- TRAP_ZIG_001_HEAP_FLAG_J
# Plain trap
- TRAP_ZIG_001_CONFIG_MARKER_K
- TRAP_ZIG_001_VERSION_L

must_not_include_files:
- src/renderer.zig
- src/logger.zig
- src/animation.zig
- src/math.zig
- src/allocator.zig
- src/config.zig

max_fragments: 8
max_files: 2
