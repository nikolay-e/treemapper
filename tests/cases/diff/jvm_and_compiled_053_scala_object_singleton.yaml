name: jvm_and_compiled_053_scala_object_singleton
tags:
- lang:scala
- change:single_file
- change:new_function
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    Config.scala: |
      object Config {
        val timeout: Int = 30
        val maxRetries: Int = 3
        val baseUrl: String = "https://api.example.com"

        def getFullUrl(path: String): String = s"$baseUrl$path"

        def isProduction: Boolean = baseUrl.contains("api.example.com")

        val connectionPoolSize: Int = 10
      }
    ApiClient.scala: |
      class ApiClient {}
    HttpHeaders.scala: |
      object HttpHeaders {
        val contentType: String = "application/json"
        val accept: String = "application/json"
        val userAgent: String = "ScalaClient/1.0"

        def authHeader(token: String): (String, String) = {
          ("Authorization", s"Bearer $token")
        }

        def defaults: Map[String, String] = Map(
          "Content-Type" -> contentType,
          "Accept" -> accept,
          "User-Agent" -> userAgent
        )

        def withAuth(token: String): Map[String, String] = {
          val (k, v) = authHeader(token)
          defaults + (k -> v)
        }
      }
    ResponseParser.scala: |
      object ResponseParser {
        def parseJson(body: String): Map[String, Any] = {
          Map("raw" -> body)
        }

        def extractField(body: String, field: String): Option[String] = {
          if (body.contains(field)) Some(field) else None
        }

        def isSuccess(statusCode: Int): Boolean = statusCode >= 200 && statusCode < 300

        def isClientError(statusCode: Int): Boolean = statusCode >= 400 && statusCode < 500
      }
    logging/ApiLogger.scala: |
      object ApiLogger {
        def logRequest(method: String, url: String): Unit = {
          println(s"[API] $method $url")
        }

        def logResponse(statusCode: Int, body: String): Unit = {
          println(s"[API] Response: $statusCode, body length: ${body.length}")
        }

        def logError(url: String, error: Throwable): Unit = {
          println(s"[API] Error for $url: ${error.getMessage}")
        }
      }
    ratelimit/RateLimiter.scala: |
      object RateLimiter {
        private var requestCount = 0
        private val maxPerSecond = 10

        def acquire(): Boolean = {
          if (requestCount < maxPerSecond) {
            requestCount += 1
            true
          } else false
        }

        def reset(): Unit = { requestCount = 0 }

        def remaining(): Int = maxPerSecond - requestCount
      }
