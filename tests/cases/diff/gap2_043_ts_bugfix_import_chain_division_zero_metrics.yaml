repo:
  initial_files:
    src/metrics/types.ts: |
      export interface MetricSample {
        timestamp: number;
        value: number;
        label: string;
      }

      export interface AggregatedMetric {
        label: string;
        average: number;
        count: number;
      }
    src/metrics/aggregator.ts: |
      import { MetricSample, AggregatedMetric } from "./types";

      function groupByLabel(samples: MetricSample[]): Map<string, MetricSample[]> {
        const groups = new Map<string, MetricSample[]>();
        for (const sample of samples) {
          const existing = groups.get(sample.label) ?? [];
          existing.push(sample);
          groups.set(sample.label, existing);
        }
        return groups;
      }

      function computeAverage(samples: MetricSample[]): number {
        const total = samples.reduce((sum, s) => sum + s.value, 0);
        return total / samples.length;
      }

      function aggregate(samples: MetricSample[]): AggregatedMetric[] {
        const grouped = groupByLabel(samples);
        const results: AggregatedMetric[] = [];
        for (const [label, group] of grouped) {
          results.push({ label, average: computeAverage(group), count: group.length });
        }
        return results;
      }
    src/metrics/exporter.ts: |
      const TRAP_GAP2_043_EXPORT_A: string = "prometheus";
      const TRAP_GAP2_043_PORT_B: number = 9090;

      function formatPrometheus(name: string, value: number): string {
        return `${name} ${value}`;
      }

      function exportBatch(metrics: Array<{ name: string; value: number }>): string {
        return metrics.map((m) => formatPrometheus(m.name, m.value)).join("\n");
      }
    src/metrics/alerting.ts: |
      const TRAP_GAP2_043_ALERT_C: string = "threshold_alert";
      const TRAP_GAP2_043_THRESHOLD_D: number = 95;

      function checkThreshold(value: number, limit: number): boolean {
        return value > limit;
      }

      function triggerAlert(metric: string, value: number): void {}
  changed_files:
    src/metrics/aggregator.ts: |
      import { MetricSample, AggregatedMetric } from "./types";

      function groupByLabel(samples: MetricSample[]): Map<string, MetricSample[]> {
        const groups = new Map<string, MetricSample[]>();
        for (const sample of samples) {
          const existing = groups.get(sample.label) ?? [];
          existing.push(sample);
          groups.set(sample.label, existing);
        }
        return groups;
      }

      function computeAverage(samples: MetricSample[]): number {
        if (samples.length === 0) {
          return 0;
        }
        const total = samples.reduce((sum, s) => sum + s.value, 0);
        return total / samples.length;
      }

      function aggregate(samples: MetricSample[]): AggregatedMetric[] {
        const grouped = groupByLabel(samples);
        const results: AggregatedMetric[] = [];
        for (const [label, group] of grouped) {
          results.push({ label, average: computeAverage(group), count: group.length });
        }
        return results;
      }
  commit_message: Update files
