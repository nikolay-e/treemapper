    src/main/java/com/devops/pipeline/StageRunner.java: |
      package com.devops.pipeline;

      import java.util.Map;

      public interface StageRunner {
          StageResult run(String stageName, Map<String, String> env, StageContext context);
          boolean canRun(String stageName);
          void onFailure(String stageName, StageResult result);
      }
    src/main/java/com/devops/pipeline/PipelineExecutor.java: |
      package com.devops.pipeline;

      import java.util.List;
      import java.util.Map;
      import java.util.ArrayList;

      public class PipelineExecutor {
          private final StageRunner runner;

          public PipelineExecutor(StageRunner runner) {
              this.runner = runner;
          }

          public List<StageResult> execute(List<String> stages, Map<String, String> env) {
              List<StageResult> results = new ArrayList<>();
              StageContext ctx = new StageContext(stages);
              for (String stage : stages) {
                  if (runner.canRun(stage)) {
                      StageResult result = runner.run(stage, env, ctx);
                      results.add(result);
                      if (!result.isSuccess()) {
                          runner.onFailure(stage, result);
                          break;
                      }
                  }
              }
              return results;
          }
      }
    src/main/java/com/devops/pipeline/StageResult.java: |
