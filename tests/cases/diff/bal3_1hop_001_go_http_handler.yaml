name: bal3_1hop_001_go_http_handler
tags:
- lang:go
- change:single_file
- context:import_chain
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    pkg/auth/token.go: |
      package auth

      import "time"

      type Claims struct {
          UserID    string
          ExpiresAt time.Time
      }

      func ValidateToken(raw string) (*Claims, error) {
          if len(raw) == 0 {
              return nil, fmt.Errorf("empty token")
          }
          return &Claims{UserID: raw, ExpiresAt: time.Now().Add(time.Hour)}, nil
      }
    api/handlers/profile.go: |
      package handlers

      import (
          "net/http"
          "pkg/auth"
      )

      func ProfileHandler(w http.ResponseWriter, r *http.Request) {
          raw := r.Header.Get("Authorization")
          claims, err := auth.ValidateToken(raw)
          if err != nil {
              http.Error(w, "unauthorized", http.StatusUnauthorized)
              return
          }
          w.Write([]byte("hello " + claims.UserID))
      }
    api/handlers/settings.go: |
      package handlers

      import (
          "net/http"
          "pkg/auth"
      )

      func SettingsHandler(w http.ResponseWriter, r *http.Request) {
          raw := r.Header.Get("Authorization")
          claims, err := auth.ValidateToken(raw)
          if err != nil {
              http.Error(w, "unauthorized", http.StatusUnauthorized)
              return
          }
          w.Write([]byte("settings for " + claims.UserID))
      }
    api/middleware/logging.go: |
      package middleware

      import "net/http"

      GARBAGE_001_LOGGING_A = "logger"

      func LoggingMiddleware(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
              next.ServeHTTP(w, r)
          })
      }
    pkg/storage/db.go: |
      package storage

      GARBAGE_001_DB_B = "database"

      type DB struct {
          DSN string
      }

      func NewDB(dsn string) *DB {
          return &DB{DSN: dsn}
      }
    pkg/cache/redis.go: |
      package cache

      GARBAGE_001_REDIS_C = "redis"

      type RedisClient struct {
          Addr string
      }

      func NewRedisClient(addr string) *RedisClient {
          return &RedisClient{Addr: addr}
      }
  changed_files:
    pkg/auth/token.go: |
      package auth

      import (
          "fmt"
          "strings"
          "time"
      )

      type Claims struct {
          UserID    string
          Role      string
          ExpiresAt time.Time
      }

      func ValidateToken(raw string) (*Claims, error) {
          if len(raw) == 0 {
              return nil, fmt.Errorf("empty token")
          }
          raw = strings.TrimPrefix(raw, "Bearer ")
          return &Claims{UserID: raw, Role: "user", ExpiresAt: time.Now().Add(time.Hour)}, nil
      }
  commit_message: "feat: add Role field to Claims and strip Bearer prefix"
