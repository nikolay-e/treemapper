    lib/chess/evaluator.rb: |
      require_relative 'move_gen'

      module Chess
        class Evaluator
          PIECE_VALUES = { 'P' => 1, 'N' => 3, 'B' => 3, 'R' => 5, 'Q' => 9, 'K' => 0 }

          def initialize(move_gen)
            @move_gen = move_gen
          end

          def material_score(pieces)
            pieces.values.sum { |p| PIECE_VALUES.fetch(p.upcase, 0) }
          end

          def mobility_score(file, rank, piece_type)
            moves = case piece_type.upcase
                    when 'N' then @move_gen.knight_moves(file, rank)
                    when 'R' then @move_gen.rook_moves(file, rank)
                    else []
                    end
            moves.length * 0.1
          end
        end
      end
