    utils/timezone_helpers.py: |
      from datetime import datetime, timezone, timedelta

      UTC = timezone.utc
      EASTERN = timezone(timedelta(hours=-5))
      PACIFIC = timezone(timedelta(hours=-8))

      def to_utc(dt: datetime) -> datetime:
          if dt.tzinfo is None:
              return dt.replace(tzinfo=UTC)
          return dt.astimezone(UTC)

      def format_local(dt: datetime, tz: timezone = EASTERN) -> str:
          local_dt = dt.astimezone(tz)
          return local_dt.strftime("%Y-%m-%d %H:%M:%S %Z")

      def parse_iso_timestamp(iso_str: str) -> datetime:
          return datetime.fromisoformat(iso_str)
    utils/string_sanitizer.py: |
      import re
      from html import escape

      def sanitize_html(text: str) -> str:
          return escape(text)

      def strip_tags(html: str) -> str:
          return re.sub(r"<[^>]+>", "", html)

      def normalize_whitespace(text: str) -> str:
          return re.sub(r"\s+", " ", text).strip()

      def truncate_text(text: str, max_len: int = 100) -> str:
          if len(text) <= max_len:
              return text
          return text[:max_len - 3] + "..."
    utils/currency_converter.py: |
      from decimal import Decimal

      EXCHANGE_RATES = {
          ("USD", "EUR"): Decimal("0.92"),
          ("USD", "GBP"): Decimal("0.79"),
          ("EUR", "USD"): Decimal("1.09"),
          ("GBP", "USD"): Decimal("1.27"),
      }

      def convert(amount: Decimal, from_currency: str, to_currency: str) -> Decimal:
          if from_currency == to_currency:
              return amount
          rate = EXCHANGE_RATES.get((from_currency, to_currency))
          if rate is None:
              raise ValueError(f"No rate for {from_currency} -> {to_currency}")
          return amount * rate
