  changed_files:
    src/Aquarium/WaterMonitor.php: |
      <?php

      namespace App\Aquarium;

      use App\Aquarium\Sensor\PhSensor;

      class WaterMonitor
      {
          private PhSensor $sensor;

          public function __construct(PhSensor $sensor)
          {
              $this->sensor = $sensor;
          }

          public function isHealthy(): bool
          {
              $ph = $this->sensor->currentPh();
              return $ph >= 6.5 && $ph <= 8.5;
          }

          public function alertLevel(): string
          {
              $ph = $this->sensor->currentPh();
              if ($ph < 5.0 || $ph > 9.5) {
                  return 'critical';
              }
              if ($ph < 6.5 || $ph > 8.5) {
                  return 'warning';
              }
              return 'normal';
          }
      }
  commit_message: "feat: add pH alert level to water monitor"
