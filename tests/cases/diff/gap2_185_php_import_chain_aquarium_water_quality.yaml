      <?php

      namespace App\Aquarium\Sensor;

      use App\Aquarium\Sensor\Calibration;

      class PhSensor
      {
          private Calibration $calibration;
          private float $rawValue;

          public function __construct(Calibration $calibration, float $rawValue)
          {
              $this->calibration = $calibration;
              $this->rawValue = $rawValue;
          }

          public function currentPh(): float
          {
              return $this->calibration->adjust($this->rawValue);
          }
      }
    src/Aquarium/Sensor/Calibration.php: |
      <?php

      namespace App\Aquarium\Sensor;

      class Calibration
      {
          private float $offset;

          public function __construct(float $offset)
          {
              $this->offset = $offset;
          }

          public function adjust(float $raw): float
          {
              return $raw + $this->offset;
          }
      }
