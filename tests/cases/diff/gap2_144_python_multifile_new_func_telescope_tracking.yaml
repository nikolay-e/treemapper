      from telescope.motors import slew_to_coordinates, park_mount

      class MountTracker:
          def __init__(self, mount_id: str):
              self.mount_id = mount_id
              self._position: tuple[float, float] = (0.0, 0.0)

          def goto_target(self, ra: float, dec: float) -> None:
              slew_to_coordinates(self.mount_id, ra, dec)
              self._position = (ra, dec)

          def current_position(self) -> tuple[float, float]:
              return self._position

          def park(self) -> None:
              park_mount(self.mount_id)
              self._position = (0.0, 0.0)
