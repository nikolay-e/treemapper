      from mypackage import HelperClass, TextFormatter

      def run():
          config = {"name": "myapp", "version": "1.0"}
          helper = HelperClass(config)
          if helper.validate_config():
              formatter = TextFormatter()
              title = formatter.format_title(helper.help())
              return title
          return None
