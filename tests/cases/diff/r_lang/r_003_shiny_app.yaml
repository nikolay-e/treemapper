      source("R/data_processing.R")

      server <- function(input, output, session) {
        raw_data <- reactive({
          read.csv("data/measurements.csv")
        })

        filtered_data <- reactive({
          req(input$date_range)
          filter_date_range(raw_data(), "date", input$date_range[1], input$date_range[2])
        })

        period_summary <- reactive({
          req(input$period)
          aggregate_by_period(filtered_data(), "date", "value", input$period)
        })

        output$data_table <- renderTable({
          head(filtered_data(), 20)
        })

        output$summary_table <- renderTable({
          period_summary()
        })

        output$trend_chart <- renderPlot({
          summary_df <- period_summary()
          barplot(summary_df$stats[, "mean"],
                  names.arg = summary_df$period,
                  main = paste("Average by", input$period),
                  col = "steelblue")
        })
      }
