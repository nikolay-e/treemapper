must_include_files:
  - analysis/main.R
  # Q1+Q2: utils.R defines normalize_vector and scale_to_range
  - helpers/utils.R
must_include_content_from:
  analysis/main.R:
    - 'source("helpers/utils.R")'
    - "normalize_vector"
    - "scale_to_range"
  helpers/utils.R:
    - "normalize_vector <- function(x)"
    - "n <- sqrt(sum(x^2))"
    - "scale_to_range <- function"
must_not_include:
  # helpers/plotting.R: visualization — same dir but not sourced by main.R
  - GARBAGE_R_001_A
  - "create_histogram"
  - "create_scatter"
  - "save_plot"
  # analysis/clustering.R: uses same utils but independent analysis
  - GARBAGE_R_001_B
  - "perform_kmeans"
  - "compute_silhouette"
  - "find_optimal_k"
must_not_include_files:
  - helpers/plotting.R
  - analysis/clustering.R
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
