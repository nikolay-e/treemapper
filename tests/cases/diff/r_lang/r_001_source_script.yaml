    cat("Summary:\n")
    print(summary_stats)

    feature_cols <- c("height", "weight", "age")
    features <- as.matrix(cleaned[, feature_cols])
    normalized_features <- t(apply(features, 1, normalize_vector))

    scaled_values <- scale_to_range(cleaned$value)
    cat("Normalized feature dimensions:", dim(normalized_features), "\n")
    cat("Scaled value range:", range(scaled_values), "\n")
