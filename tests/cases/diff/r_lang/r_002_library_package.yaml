must_include_files:
  - scripts/transform.R
  # Q1+Q2: timeseries.R defines compute_moving_average and detect_trend
  - R/timeseries.R
must_include_content_from:
  scripts/transform.R:
    - "compute_moving_average"
    - "detect_trend"
    - 'source("R/timeseries.R")'
  R/timeseries.R:
    - "compute_moving_average <- function(x, window_size = 7)"
    - "na.rm = TRUE"
    - "detect_trend <- function(x)"
must_not_include:
  # scripts/visualize.R: plotting — different concern, not used by transform
  - GARBAGE_R_002_A
  - "plot_timeseries"
  - "save_timeseries_plot"
  - "ggplot"
  # R/regression.R: statistical modeling — different analysis, not sourced
  - GARBAGE_R_002_B
  - "fit_linear_model"
  - "compute_r_squared"
  - "cross_validate"
must_not_include_files:
  - scripts/visualize.R
  - R/regression.R
max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
