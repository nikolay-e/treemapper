      using System;
      using MyApp.Services;
      using MyApp.Models;

      class Program
      {
          static void Main()
          {
              var validator = new Validator<User>()
                  .AddRule(u => !string.IsNullOrEmpty(u.Name))
                  .AddRule(u => u.Id > 0)
                  .AddRule(u => u.Name.Length <= 100);

              var user = new User { Id = 1, Name = "John" };
              var isValid = validator.Validate(user);
          }
      }
