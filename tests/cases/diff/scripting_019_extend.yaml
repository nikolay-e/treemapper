- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    class_methods.rb: |
      module ClassMethods
        def find(id)
          new(id: id)
        end

        def all
          []
        end

        def count
          all.size
        end
      end
    model.rb: |
      class Model
        attr_reader :id

        def initialize(id:)
          @id = id
        end
      end
    query_builder.rb: |
      class QueryBuilder
        def initialize(table)
          @table = table
          @conditions = []
          @order = nil
        end

        def where(condition)
          @conditions << condition
          self
        end

        def order_by(column, direction = :asc)
          @order = "#{column} #{direction}"
          self
        end

        def to_sql
          sql = "SELECT * FROM #{@table}"
          sql += " WHERE #{@conditions.join(' AND ')}" unless @conditions.empty?
          sql += " ORDER BY #{@order}" if @order
          sql
        end
      end
    serializer.rb: |
      module Serializer
        def self.to_json(object)
          fields = object.instance_variables.map do |var|
            key = var.to_s.delete('@')
            value = object.instance_variable_get(var)
            "\"#{key}\": \"#{value}\""
          end
          "{ #{fields.join(', ')} }"
        end

        def self.from_json(json_str, klass)
          pairs = json_str.scan(/"(\w+)":\s*"([^"]*)"/)
          obj = klass.allocate
          pairs.each { |k, v| obj.instance_variable_set("@#{k}", v) }
          obj
        end
      end
    record.rb: |
      require_relative 'class_methods'

      class Record
        extend ClassMethods

        attr_reader :id, :type

        def initialize(id:, type: 'generic')
          @id = id
          @type = type
        end

        def save
          puts "Saving record #{id}"
        end
      end

      r = Record.find(42)
      puts r.id
    lib/instance_methods.rb: |
      module InstanceMethods
        def save
          raise NotImplementedError, "#{self.class}#save not implemented"
        end

        def destroy
          raise NotImplementedError, "#{self.class}#destroy not implemented"
        end

        def persisted?
          !@id.nil?
        end

        def new_record?
          !persisted?
        end
      end
    active_model.rb: |
      class ActiveModel
        attr_reader :id

        def self.find(id)
          new(id)
        end

        def self.all
          @records ||= []
        end

        def self.create(attrs = {})
          instance = new(nil)
          attrs.each { |k, v| instance.instance_variable_set("@#{k}", v) }
          instance
        end

        def initialize(id)
          @id = id
        end
      end
  changed_files:
    class_methods.rb: |
      module ClassMethods
        def find(id)
          new(id: id)
        end

        def all
          []
        end

        def count
          all.size
        end
      end
    model.rb: |
      require_relative 'class_methods'

      class Model
        extend ClassMethods

        attr_reader :id

        def initialize(id:)
          @id = id
        end
      end

      model = Model.find(1)
  commit_message: Update files
