            Action    = "sts:AssumeRole"
          }]
        })

        tags = var.common_tags
      }
    ami_lookup_gpu.tf: |
      GARBAGE_TF_EC2011_GPU_MARKER_C = "gpu-ami-lookup"
      GARBAGE_TF_EC2011_GPU_FLAG_D = "p3.2xlarge"

      data "aws_ami" "deep_learning" {
        most_recent = true
        owners      = ["amazon"]

        filter {
          name   = "name"
