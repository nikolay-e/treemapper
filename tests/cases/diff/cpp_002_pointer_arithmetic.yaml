    include/network/socket_pool.hpp: |
      #pragma once
      #include <cstddef>
      #include <vector>
      #include <functional>

      namespace app::network {

      struct SocketHandle {
          int fd;
          bool active;
          size_t bytesRead;
          size_t bytesWritten;
      };

      class SocketPool {
      public:
          SocketPool(size_t maxConnections)
              : maxConnections_(maxConnections) {
              sockets_.reserve(maxConnections);
          }

          SocketHandle* acquire() {
              for (auto& sock : sockets_) {
                  if (!sock.active) {
                      sock.active = true;
                      return &sock;
                  }
              }
              if (sockets_.size() < maxConnections_) {
                  sockets_.push_back({-1, true, 0, 0});
                  return &sockets_.back();
              }
              return nullptr;
          }

          void release(SocketHandle* handle) {
              if (handle) {
                  handle->active = false;
                  handle->bytesRead = 0;
                  handle->bytesWritten = 0;
              }
          }

          size_t activeCount() const {
              size_t count = 0;
              for (const auto& s : sockets_) {
                  if (s.active) ++count;
              }
              return count;
          }

      private:
          std::vector<SocketHandle> sockets_;
          size_t maxConnections_;
      };

      }
    include/memory/allocator.hpp: |
      #pragma once
      #include <cstddef>
      #include <cstdlib>
      #include <new>

      namespace app::memory {

      class PoolAllocator {
      public:
          explicit PoolAllocator(size_t blockSize, size_t blockCount)
              : blockSize_(blockSize), blockCount_(blockCount) {
              pool_ = static_cast<char*>(std::malloc(blockSize * blockCount));
              if (!pool_) throw std::bad_alloc();
              freeList_ = pool_;
              for (size_t i = 0; i < blockCount - 1; ++i) {
                  char* current = pool_ + i * blockSize;
                  char* next = pool_ + (i + 1) * blockSize;
                  *reinterpret_cast<char**>(current) = next;
              }
              *reinterpret_cast<char**>(pool_ + (blockCount - 1) * blockSize) = nullptr;
          }

          ~PoolAllocator() { std::free(pool_); }

          void* allocate() {
              if (!freeList_) throw std::bad_alloc();
              void* block = freeList_;
              freeList_ = *reinterpret_cast<char**>(freeList_);
              return block;
          }

          void deallocate(void* ptr) {
              *reinterpret_cast<char**>(ptr) = freeList_;
              freeList_ = static_cast<char*>(ptr);
          }

      private:
          char* pool_;
          char* freeList_;
          size_t blockSize_;
          size_t blockCount_;
      };

      }
