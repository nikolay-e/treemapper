name: patterns_031_intra_module_level_variables
tags:
- lang:python
- change:single_file
- change:bug_fix
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    settings.py: |
      DEBUG = True
      LOG_LEVEL = "INFO"
      DATABASE_URL = "sqlite:///app.db"

      def get_log_level():
          return LOG_LEVEL

      def is_debug():
          return DEBUG

      def get_db_connection():
          from sqlalchemy import create_engine
          return create_engine(DATABASE_URL)

      def configure_logging():
          import logging
          level = getattr(logging, LOG_LEVEL)
          logging.basicConfig(level=level)
    config.py: |
      DEBUG = False
      LOG_LEVEL = "WARNING"
      SECRET_KEY = "changeme"

      def get_config():
          return {
              'debug': DEBUG,
              'log_level': LOG_LEVEL,
              'secret': SECRET_KEY,
          }

      def is_production():
          return not DEBUG
    env_loader.py: |
      import os

      def load_env(path='.env'):
          if not os.path.exists(path):
              return {}
          result = {}
          with open(path) as f:
              for line in f:
                  key, _, value = line.strip().partition('=')
                  result[key] = value
          return result

      def get_debug_flag():
          return os.getenv('DEBUG', 'false').lower() == 'true'
  changed_files:
