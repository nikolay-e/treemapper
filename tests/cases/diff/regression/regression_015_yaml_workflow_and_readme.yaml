# Test: CI workflow expanded and README.md added — only config/docs change
#
# Scenario: .github/workflows/ci.yml is expanded (add pull_request trigger,
# lint job, dependency install, --tb=short flag) and a new README.md is created.
# The source code files (src/app.py, src/routes.py) are UNCHANGED.
#
# Reviewer questions:
#   Q1: "What changed in the CI pipeline?"
#       -> ci.yml now has lint + test jobs with dependency chain.
#   Q2: "What does the new README document?"
#       -> Installation, usage, and development instructions.
#
# Trap files (plausible but unrelated):
#   - src/app.py: Flask application — same project but not affected by CI changes.
#   - src/routes.py: API routes — same project but not affected by CI changes.
#   - requirements.txt: Python dependencies — CI-adjacent but not changed and
#     not referenced by the new workflow.

initial:
  src/app.py: |
    from flask import Flask

    def create_app():
        app = Flask(__name__)
        app.config["DEBUG"] = False
        return app

    def run_server(app):
        app.run(host="0.0.0.0", port=8080)
  src/routes.py: |
    from flask import jsonify

    def register_routes(app):
        @app.route("/health")
        def health():
            return jsonify({"status": "ok"})

        @app.route("/api/version")
        def version():
            return jsonify({"version": "1.0.0"})
  .github/workflows/ci.yml: |
    name: CI
    on:
      push:
        branches: [main]
    jobs:
      test:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Run tests
            run: pytest
  requirements.txt: |
    flask>=2.0
    gunicorn>=21.0
    sqlalchemy>=2.0
    alembic>=1.13
    pytest>=7.0
    ruff>=0.1.0
changed:
  src/app.py: |
    from flask import Flask

    def create_app():
        app = Flask(__name__)
        app.config["DEBUG"] = False
        return app

    def run_server(app):
        app.run(host="0.0.0.0", port=8080)
  src/routes.py: |
    from flask import jsonify

    def register_routes(app):
        @app.route("/health")
        def health():
            return jsonify({"status": "ok"})

        @app.route("/api/version")
        def version():
            return jsonify({"version": "1.0.0"})
  .github/workflows/ci.yml: |
    name: CI
    on:
      push:
        branches: [main]
      pull_request:
        branches: [main]
    jobs:
      lint:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Install dependencies
            run: pip install ruff
          - name: Run linter
            run: ruff check .
      test:
        runs-on: ubuntu-latest
        needs: lint
        steps:
          - uses: actions/checkout@v4
          - name: Install dependencies
            run: pip install -e ".[dev]"
          - name: Run tests
            run: pytest --tb=short
  README.md: |
    # My Application

    A web application built with Flask.

    ## Installation

    ```bash
    pip install -e ".[dev]"
    ```

    ## Usage

    ```bash
    python -m src.app
    ```

    ## Development

    Run tests with:

    ```bash
    pytest
    ```
  requirements.txt: |
    flask>=2.0
    gunicorn>=21.0
    sqlalchemy>=2.0
    alembic>=1.13
    pytest>=7.0
    ruff>=0.1.0
must_include_files:
  - .github/workflows/ci.yml
  - README.md
must_include_content_from:
  .github/workflows/ci.yml:
    - "needs: lint"
  README.md:
    - "# My Application"
must_not_include:
  # src/app.py: Flask app — unchanged, not affected by CI or docs changes
  - create_app
  - run_server
  # src/routes.py: API routes — unchanged, not affected by CI changes
  - register_routes
  # requirements.txt: dependency list — unchanged, not referenced in diff
  - gunicorn
  - alembic
must_not_include_files:
  - src/app.py
  - src/routes.py
  - requirements.txt
max_fragments: 4
max_files: 3
add_garbage_files: false
skip_garbage_check: true
