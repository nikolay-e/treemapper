    replicaCount: 3
    image:
      repository: ghcr.io/myorg/api-service
      tag: "2.0.0"
    resources:
      limits:
        memory: 512Mi
        cpu: 500m
      requests:
        memory: 256Mi
        cpu: 200m
    service:
      type: ClusterIP
      port: 8080
    ingress:
      enabled: true
      host: api.example.com
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
      tls:
        - secretName: api-tls
          hosts:
            - api.example.com
  argocd/apps/api-service/Chart.yaml: |
    apiVersion: v2
    name: api-service
    version: 0.4.0
