must_include_files:
- argocd/apps/api-service/values.yaml
- terraform/modules/dns/main.tf

must_include_content_from:
  argocd/apps/api-service/values.yaml:
    - 'tag: "2.0.0"'
    - "replicaCount: 3"
  terraform/modules/dns/main.tf:
    - 'resource "cloudflare_record" "api_staging"'

must_not_include:
- GARBAGE_REG_006_MUSIC_E
- GARBAGE_REG_006_ALBUM_F
- GARBAGE_REG_006_SCAN_G
- GARBAGE_REG_006_INTEGRITY_H
- GARBAGE_REG_006_TAGS_I
- GARBAGE_REG_006_DUPES_J
- GARBAGE_REG_006_ENCODE_K
- GARBAGE_REG_006_SOPS_C
- GARBAGE_REG_006_DECRYPT_D
- GARBAGE_REG_006_R2_B

must_not_include_files:
- ansible/scripts/music_checker.py
- scripts/setup_sops.sh
- terraform/r2.tf

strict: true
max_files: 5
add_garbage_files: false
skip_garbage_check: true
