# Test: Sibling page components must be excluded when only StatisticsPage changes
#
# Scenario: StatisticsPage.tsx adds a trends section by importing
# useTrendsData from the useAnalytics hook. The hook module gains
# the new useTrendsData export. Other page components in the same
# directory (DashboardPage, SettingsPage, ProfilePage) are unchanged
# and must NOT be included — they are sibling files with lexical
# overlap (React, useState, useEffect) but no import relationship
# to the changed code.
#
# Reviewer questions:
#   Q1: "What is useTrendsData? What API does it expose?"
#       -> frontend/src/hooks/useAnalytics.ts: the new useTrendsData()
#          hook returns { trends, loadTrends, trendError }. Reviewer
#          verifies the hook's contract matches how StatisticsPage uses it.
#   Q2: "What was the original useAnalytics hook providing?"
#       -> Same file shows fetchOverview (existing) alongside the new
#          useTrendsData. Both are used in the updated StatisticsPage.
#
# Not needed:
#   - frontend/src/pages/DashboardPage.tsx: sibling page in same directory.
#     Different page that doesn't import useAnalytics or useTrendsData.
#   - frontend/src/pages/SettingsPage.tsx: sibling page for user preferences.
#     Uses useState/useEffect like StatisticsPage but has no import overlap.
#   - frontend/src/pages/ProfilePage.tsx: sibling page for user profile.
#     Takes userId prop like StatisticsPage but fetches different data.

initial:
  frontend/src/pages/StatisticsPage.tsx: |
    import React, { useState, useEffect } from 'react';
    import { useAnalytics } from '../hooks/useAnalytics';

    interface StatisticsPageProps {
      userId: string;
    }

    export const StatisticsPage: React.FC<StatisticsPageProps> = ({ userId }) => {
      const { fetchOverview } = useAnalytics();
      const [overview, setOverview] = useState<Record<string, number> | null>(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        setLoading(true);
        fetchOverview(userId).then((data) => {
          setOverview(data);
          setLoading(false);
        });
      }, [userId]);

      if (loading) {
        return <div className="stats-loading">Loading statistics...</div>;
      }

      return (
        <div className="statistics-page">
          <h1>Statistics</h1>
          <div className="overview-grid">
            {overview && Object.entries(overview).map(([key, value]) => (
              <div key={key} className="stat-card">
                <span className="stat-label">{key}</span>
                <span className="stat-value">{value}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };
  frontend/src/hooks/useAnalytics.ts: |
    import { useState, useCallback } from 'react';

    interface OverviewData {
      [key: string]: number;
    }

    export function useAnalytics() {
      const [isLoading, setIsLoading] = useState(false);

      const fetchOverview = useCallback(async (userId: string): Promise<OverviewData> => {
        setIsLoading(true);
        const response = await fetch(`/api/analytics/${userId}/overview`);
        const data = await response.json();
        setIsLoading(false);
        return data;
      }, []);

      return { fetchOverview, isLoading };
    }
