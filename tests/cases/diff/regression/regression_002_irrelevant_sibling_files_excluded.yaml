repo:
  initial_files:
    frontend/src/pages/StatisticsPage.tsx: |
      import React, { useState, useEffect } from 'react';
      import { useAnalytics } from '../hooks/useAnalytics';

      interface StatisticsPageProps {
        userId: string;
      }

      export const StatisticsPage: React.FC<StatisticsPageProps> = ({ userId }) => {
        const { fetchOverview } = useAnalytics();
        const [overview, setOverview] = useState<Record<string, number> | null>(null);
        const [loading, setLoading] = useState(true);

        useEffect(() => {
          setLoading(true);
          fetchOverview(userId).then((data) => {
            setOverview(data);
            setLoading(false);
          });
        }, [userId]);

        if (loading) {
          return <div className="stats-loading">Loading statistics...</div>;
        }

        return (
          <div className="statistics-page">
            <h1>Statistics</h1>
            <div className="overview-grid">
              {overview && Object.entries(overview).map(([key, value]) => (
                <div key={key} className="stat-card">
                  <span className="stat-label">{key}</span>
                  <span className="stat-value">{value}</span>
                </div>
              ))}
            </div>
          </div>
        );
      };
    frontend/src/hooks/useAnalytics.ts: |
      import { useState, useCallback } from 'react';

      interface OverviewData {
        [key: string]: number;
      }

      export function useAnalytics() {
        const [isLoading, setIsLoading] = useState(false);

        const fetchOverview = useCallback(async (userId: string): Promise<OverviewData> => {
          setIsLoading(true);
          const response = await fetch(`/api/analytics/${userId}/overview`);
          const data = await response.json();
          setIsLoading(false);
          return data;
        }, []);

        return { fetchOverview, isLoading };
      }
    frontend/src/pages/DashboardPage.tsx: |
      import React, { useEffect, useState } from 'react';

      interface DashboardWidget {
        id: string;
        title: string;
        type: string;
      }

      export const DashboardPage: React.FC = () => {
        const [widgets, setWidgets] = useState<DashboardWidget[]>([]);

        useEffect(() => {
          fetch('/api/dashboard/widgets')
            .then((res) => res.json())
            .then(setWidgets);
        }, []);

        const handleRemoveWidget = (widgetId: string) => {
          setWidgets((prev) => prev.filter((w) => w.id !== widgetId));
        };

        return (
          <div className="dashboard-page">
            <h1>Dashboard</h1>
            {widgets.map((w) => (
              <div key={w.id} className="widget-card">
                <span>{w.title}</span>
                <button onClick={() => handleRemoveWidget(w.id)}>Remove</button>
              </div>
            ))}
          </div>
        );
      };
    frontend/src/pages/SettingsPage.tsx: |
      import React, { useState } from 'react';

      interface UserSettings {
        theme: string;
        notifications: boolean;
        language: string;
      }

      export const SettingsPage: React.FC = () => {
        const [settings, setSettings] = useState<UserSettings>({
          theme: 'light',
          notifications: true,
          language: 'en',
        });

        const handleThemeChange = (theme: string) => {
          setSettings((prev) => ({ ...prev, theme }));
        };

        const handleSave = async () => {
          await fetch('/api/settings', {
            method: 'PUT',
            body: JSON.stringify(settings),
          });
        };

        return (
          <div className="settings-page">
            <h1>Settings</h1>
            <select value={settings.theme} onChange={(e) => handleThemeChange(e.target.value)}>
              <option value="light">Light</option>
              <option value="dark">Dark</option>
            </select>
            <button onClick={handleSave}>Save</button>
          </div>
        );
      };
    frontend/src/pages/ProfilePage.tsx: |
      import React, { useState, useEffect } from 'react';

      interface UserProfile {
        name: string;
        email: string;
        avatarUrl: string;
      }

      export const ProfilePage: React.FC<{ userId: string }> = ({ userId }) => {
        const [profile, setProfile] = useState<UserProfile | null>(null);

        useEffect(() => {
          fetch(`/api/users/${userId}/profile`)
            .then((res) => res.json())
            .then(setProfile);
        }, [userId]);

        const handleUpdateName = (newName: string) => {
          if (profile) {
            setProfile({ ...profile, name: newName });
          }
        };

        if (!profile) {
          return <div>Loading profile...</div>;
        }

        return (
          <div className="profile-page">
            <h1>{profile.name}</h1>
            <p>{profile.email}</p>
            <input
              value={profile.name}
              onChange={(e) => handleUpdateName(e.target.value)}
            />
          </div>
        );
      };
