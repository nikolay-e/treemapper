    from src.analytics.types import TrendMode

    class AnalyticsPipeline:
        def __init__(self, db_session):
            self.db = db_session

        def store_snapshot(self, data, mode: TrendMode):
            self.db.execute(
                "INSERT INTO snapshots (data, mode) VALUES (:data, :mode)",
                {"data": data, "mode": mode.value},
            )

        def get_snapshots(self, mode: TrendMode):
            return self.db.execute(
                "SELECT * FROM snapshots WHERE mode = :mode",
                {"mode": mode.value},
            ).fetchall()
