          bottom: containerHeight * 0.15,
          left: containerWidth * 0.1,
        },
      };
    }

    export function interpolateColor(startHex: string, endHex: string, factor: number): string {
      const clampedFactor = Math.max(0, Math.min(1, factor));
      const start = parseInt(startHex.slice(1), 16);
      const end = parseInt(endHex.slice(1), 16);
      const r = Math.round(((start >> 16) & 0xff) + clampedFactor * (((end >> 16) & 0xff) - ((start >> 16) & 0xff)));
      const g = Math.round(((start >> 8) & 0xff) + clampedFactor * (((end >> 8) & 0xff) - ((start >> 8) & 0xff)));
      const b = Math.round((start & 0xff) + clampedFactor * ((end & 0xff) - (start & 0xff)));
      return `#${((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1)}`;
    }

    export function formatTickLabel(value: number, maxValue: number): string {
      if (maxValue >= 1000000) return `${(value / 1000000).toFixed(1)}M`;
      if (maxValue >= 10000) return `${(value / 1000).toFixed(1)}K`;
      return value.toFixed(0);
    }

    export function generateGridLines(min: number, max: number, count: number): number[] {
      const step = (max - min) / count;
      const lines: number[] = [];
      for (let i = 0; i <= count; i++) {
        lines.push(min + step * i);
      }
      return lines;
    }
  src/services/statisticsApi.ts: |
    const BASE_URL = '/api/statistics';

    export async function fetchUserStatistics(userId: string, metric: string) {
      const response = await fetch(`${BASE_URL}/${userId}?metric=${metric}`);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    }

    export async function fetchUserTrends(
      userId: string,
      metric: string,
      startDate: string,
      endDate: string,
      granularity: string
    ) {
      const params = new URLSearchParams({ metric, start: startDate, end: endDate, granularity });
      const response = await fetch(`${BASE_URL}/${userId}/trends?${params}`);
      if (!response.ok) return [];
      return response.json();
    }

    export async function fetchUserSummary(userId: string) {
      const response = await fetch(`${BASE_URL}/${userId}/summary`);
      if (!response.ok) return [];
      return response.json();
    }

