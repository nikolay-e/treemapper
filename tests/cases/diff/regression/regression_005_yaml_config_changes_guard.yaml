name: regression_005_yaml_config_changes_guard
repo:
  initial_files:
    .pre-commit-config.yaml: |
      repos:
        - repo: https://github.com/pre-commit/pre-commit-hooks
          rev: v4.5.0
          hooks:
            - id: trailing-whitespace
            - id: end-of-file-fixer
        - repo: https://github.com/semgrep/semgrep
          rev: v1.50.0
          hooks:
            - id: semgrep
              args: ['--config', 'auto']
    .github/workflows/ci.yml: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        test:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                python-version: "3.12"
            - run: pip install -r requirements.txt
            - run: pytest
    .github/actions/deploy/action.yml: |
      name: Deploy
      description: Deploy application
      inputs:
        environment:
          description: Target environment
          required: true
      runs:
        using: composite
        steps:
          - run: echo "Deploying to ${{ inputs.environment }}"
            shell: bash
    src/auth.py: |
      GARBAGE_REG_005_AUTH_A = "auth"
      GARBAGE_REG_005_TOKEN_B = "jwt"
      class AuthService:
          GARBAGE_REG_005_SVC_C = True
          def login(self, u, p):
              pass
    src/models.py: |
      GARBAGE_REG_005_MODEL_D = "orm"
      class User:
          GARBAGE_REG_005_USER_E = True
          name = ""
    src/utils.py: |
      GARBAGE_REG_005_UTIL_F = "helpers"
      def slugify(text):
          GARBAGE_REG_005_SLUG_G = True
          return text.lower().replace(" ", "-")
  changed_files:
    .pre-commit-config.yaml: |
      repos:
        - repo: https://github.com/pre-commit/pre-commit-hooks
          rev: v4.6.0
          hooks:
            - id: trailing-whitespace
            - id: end-of-file-fixer
            - id: check-yaml
        - repo: https://github.com/semgrep/semgrep
          rev: v1.60.0
          hooks:
            - id: semgrep
              args: ['--config', 'auto', '--error']
    .github/workflows/ci.yml: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        test:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-python@v5
              with:
                python-version: "3.13"
            - run: pip install -e ".[dev]"
            - run: pytest --strict-markers
    .github/actions/deploy/action.yml: |
      name: Deploy
      description: Deploy application to environment
      inputs:
        environment:
          description: Target environment
          required: true
        dry-run:
          description: Dry run mode
          required: false
          default: "false"
      runs:
        using: composite
        steps:
          - run: echo "Deploying to ${{ inputs.environment }}"
            shell: bash
          - run: echo "Dry run = ${{ inputs.dry-run }}"
            shell: bash
    src/auth.py: |
      GARBAGE_REG_005_AUTH_A = "auth"
      GARBAGE_REG_005_TOKEN_B = "jwt"
      class AuthService:
          GARBAGE_REG_005_SVC_C = True
          def login(self, u, p):
              pass
    src/models.py: |
      GARBAGE_REG_005_MODEL_D = "orm"
      class User:
          GARBAGE_REG_005_USER_E = True
          name = ""
    src/utils.py: |
      GARBAGE_REG_005_UTIL_F = "helpers"
      def slugify(text):
          GARBAGE_REG_005_SLUG_G = True
          return text.lower().replace(" ", "-")
  commit_message: Update files
fragments:
- id: pre_commit_config
  selector:
    path: .pre-commit-config.yaml
    anchor: 'rev: v1.60.0'
- id: pre_commit_config_1
  selector:
    path: .pre-commit-config.yaml
    anchor: check-yaml
- id: ci
  selector:
    path: .github/workflows/ci.yml
    anchor: pip install -e ".[dev]"
- id: ci_1
  selector:
    path: .github/workflows/ci.yml
    anchor: 'python-version: "3.13"'
- id: action_file
  selector:
    path: .github/actions/deploy/action.yml
- id: no_auth
  selector:
    path: src/auth.py
- id: no_models
  selector:
    path: src/models.py
- id: no_utils
  selector:
    path: src/utils.py
- id: no_global_0
  selector:
    anchor: GARBAGE_REG_005_AUTH_A
- id: no_global_1
  selector:
    anchor: GARBAGE_REG_005_TOKEN_B
- id: no_global_2
  selector:
    anchor: GARBAGE_REG_005_SVC_C
- id: no_global_3
  selector:
    anchor: GARBAGE_REG_005_MODEL_D
- id: no_global_4
  selector:
    anchor: GARBAGE_REG_005_USER_E
- id: no_global_5
  selector:
    anchor: GARBAGE_REG_005_UTIL_F
- id: no_global_6
  selector:
    anchor: GARBAGE_REG_005_SLUG_G
oracle:
  required:
  - pre_commit_config
  - pre_commit_config_1
  - ci
  - ci_1
  - action_file
  allowed: []
  forbidden:
  - no_auth
  - no_models
  - no_utils
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
  - no_global_5
  - no_global_6
