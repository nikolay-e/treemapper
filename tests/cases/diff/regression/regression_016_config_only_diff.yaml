# Test: Config-only diff — pyproject.toml and pre-commit updated, no code changes
#
# Scenario: pyproject.toml gets version bump (1.0.0 -> 1.1.0), Python version
# bump (3.10 -> 3.11), new dependencies (pydantic, mypy), and ruff config.
# .pre-commit-config.yaml gets hook version bumps and adds ruff-pre-commit.
# No source code files are changed.
#
# Reviewer questions:
#   Q1: "What dependencies were added?"
#       -> pyproject.toml adds pydantic>=2.0 and mypy to dev.
#   Q2: "What new pre-commit hooks were added?"
#       -> ruff and ruff-format from ruff-pre-commit, plus check-yaml.
#
# Trap files (plausible but unrelated):
#   - src/core/engine.py: core processing logic — same project but unchanged.
#   - src/api/handlers.py: API handlers — same project but not affected by
#     config changes.
#   - Makefile: build commands — CI-adjacent but not changed.

initial:
  pyproject.toml: |
    [project]
    name = "myapp"
    version = "1.0.0"
    requires-python = ">=3.10"
    dependencies = [
        "flask>=2.0",
        "sqlalchemy>=2.0",
    ]

    [project.optional-dependencies]
    dev = ["pytest", "ruff"]
  .pre-commit-config.yaml: |
    repos:
      - repo: https://github.com/pre-commit/pre-commit-hooks
        rev: v4.5.0
        hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
  src/core/engine.py: |
    from typing import Dict, List, Optional

    class ProcessingEngine:
        def __init__(self, config: Dict):
            self.config = config
            self.batch_size = config.get("batch_size", 100)

        def process_batch(self, items: List[Dict]) -> List[Dict]:
            results = []
            for i in range(0, len(items), self.batch_size):
                batch = items[i:i + self.batch_size]
                processed = [self._transform(item) for item in batch]
                results.extend(processed)
            return results

        def _transform(self, item: Dict) -> Dict:
            return {k: v for k, v in item.items() if v is not None}

        def validate_input(self, data: Dict) -> Optional[str]:
            required = self.config.get("required_fields", [])
            for field in required:
                if field not in data:
                    return f"Missing required field: {field}"
            return None
  src/api/handlers.py: |
    from flask import Flask, jsonify, request

    def register_handlers(app: Flask):
        @app.route("/api/process", methods=["POST"])
        def process():
            data = request.get_json()
            if not data:
                return jsonify({"error": "No data provided"}), 400
            return jsonify({"status": "processed", "items": len(data)})

        @app.route("/api/status")
        def status():
            return jsonify({"status": "running", "version": "1.0.0"})

        @app.errorhandler(404)
        def not_found(error):
            return jsonify({"error": "Not found"}), 404

        @app.errorhandler(500)
        def server_error(error):
            return jsonify({"error": "Internal server error"}), 500
  Makefile: |
    .PHONY: install test lint format clean

    install:
    	pip install -e ".[dev]"

    test:
    	pytest --tb=short

    lint:
    	ruff check src/

    format:
    	ruff format src/

    clean:
    	find . -name '__pycache__' -type d -exec rm -rf {} +
    	find . -name '*.pyc' -delete
changed:
  pyproject.toml: |
    [project]
    name = "myapp"
    version = "1.1.0"
    requires-python = ">=3.11"
    dependencies = [
        "flask>=3.0",
        "sqlalchemy>=2.0",
        "pydantic>=2.0",
    ]

    [project.optional-dependencies]
    dev = ["pytest", "ruff", "mypy"]

    [tool.ruff]
    line-length = 120
    target-version = "py311"
  .pre-commit-config.yaml: |
    repos:
      - repo: https://github.com/pre-commit/pre-commit-hooks
        rev: v5.0.0
        hooks:
          - id: trailing-whitespace
          - id: end-of-file-fixer
          - id: check-yaml
      - repo: https://github.com/astral-sh/ruff-pre-commit
        rev: v0.8.0
        hooks:
          - id: ruff
            args: [--fix]
          - id: ruff-format
  src/core/engine.py: |
    from typing import Dict, List, Optional

    class ProcessingEngine:
        def __init__(self, config: Dict):
            self.config = config
            self.batch_size = config.get("batch_size", 100)

        def process_batch(self, items: List[Dict]) -> List[Dict]:
            results = []
            for i in range(0, len(items), self.batch_size):
                batch = items[i:i + self.batch_size]
                processed = [self._transform(item) for item in batch]
                results.extend(processed)
            return results

        def _transform(self, item: Dict) -> Dict:
            return {k: v for k, v in item.items() if v is not None}

        def validate_input(self, data: Dict) -> Optional[str]:
            required = self.config.get("required_fields", [])
            for field in required:
                if field not in data:
                    return f"Missing required field: {field}"
            return None
  src/api/handlers.py: |
    from flask import Flask, jsonify, request

    def register_handlers(app: Flask):
        @app.route("/api/process", methods=["POST"])
        def process():
            data = request.get_json()
            if not data:
                return jsonify({"error": "No data provided"}), 400
            return jsonify({"status": "processed", "items": len(data)})

        @app.route("/api/status")
        def status():
            return jsonify({"status": "running", "version": "1.0.0"})

        @app.errorhandler(404)
        def not_found(error):
            return jsonify({"error": "Not found"}), 404

        @app.errorhandler(500)
        def server_error(error):
            return jsonify({"error": "Internal server error"}), 500
  Makefile: |
    .PHONY: install test lint format clean

    install:
    	pip install -e ".[dev]"

    test:
    	pytest --tb=short

    lint:
    	ruff check src/

    format:
    	ruff format src/

    clean:
    	find . -name '__pycache__' -type d -exec rm -rf {} +
    	find . -name '*.pyc' -delete
must_include_files:
  - pyproject.toml
  - .pre-commit-config.yaml
must_include_content_from:
  pyproject.toml:
    - 'version = "1.1.0"'
  .pre-commit-config.yaml:
    - "ruff-pre-commit"
must_not_include:
  # src/core/engine.py: processing logic — unchanged, not affected by config
  - ProcessingEngine
  - process_batch
  - validate_input
  # src/api/handlers.py: API handlers — unchanged, not affected by config
  - register_handlers
  - server_error
  # Makefile: build commands — unchanged
  - .PHONY
must_not_include_files:
  - src/core/engine.py
  - src/api/handlers.py
  - Makefile
max_fragments: 4
max_files: 3
add_garbage_files: false
skip_garbage_check: true
