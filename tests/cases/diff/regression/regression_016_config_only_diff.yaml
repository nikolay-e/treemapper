      \ {} +\n\tfind . -name '*.pyc' -delete\n"
  commit_message: Update files
fragments:
- id: pyproject
  selector:
    path: pyproject.toml
    anchor: version = "1.1.0"
- id: pre_commit_config
  selector:
    path: .pre-commit-config.yaml
    anchor: ruff-pre-commit
- id: no_engine
  selector:
    path: src/core/engine.py
- id: no_handlers
  selector:
    path: src/api/handlers.py
- id: no_makefile
  selector:
    path: Makefile
- id: no_global_0
  selector:
    anchor: ProcessingEngine
- id: no_global_1
  selector:
    anchor: process_batch
- id: no_global_2
  selector:
    anchor: validate_input
- id: no_global_3
  selector:
    anchor: register_handlers
- id: no_global_4
  selector:
    anchor: server_error
- id: no_global_5
  selector:
    anchor: .PHONY
oracle:
  required:
  - pyproject
  - pre_commit_config
  allowed: []
  forbidden:
  - no_engine
  - no_handlers
  - no_makefile
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
  - no_global_5
