# Scenario: ArgoCD values.yaml for app-a gets a new image tag (main-def5678),
#   and app-b gets a replica count bump from 2 to 3. Both are small YAML
#   config changes that should NOT pull in unrelated infrastructure files.
#
# Reviewer questions:
#   - Is the new image tag format correct (main-<sha7>)?
#   - Does increasing replicaCount to 3 require HPA adjustment?
#
# Trap files:
#   - ansible/scripts/consistency_checker.py: large infrastructure validation
#     script with permission/checksum/service checks, uses "config" and
#     "service" vocabulary but has no ArgoCD or Helm dependency
#   - scripts/backup.sh: database and config backup script with pg_dump,
#     mentions "config" and "database" but is operational tooling
#   - scripts/restore.sh: disaster recovery script with database restore,
#     uses "service" and "config" vocabulary but is independent
#   - docs/runbook.md: operations runbook with incident response procedures,
#     mentions "deployment" and "scaling" but is documentation only

initial:
  argocd/apps/app-a/values.yaml: |
    replicaCount: 2

    image:
      repository: ghcr.io/myorg/app-a
      tag: "main-abc1234"
      pullPolicy: IfNotPresent

    service:
      type: ClusterIP
      port: 8080

    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: app-a.example.com
