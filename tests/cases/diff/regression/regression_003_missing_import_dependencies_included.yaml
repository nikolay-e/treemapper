    from typing import Dict, List, Optional
    from analytics.stats import pearson_correlation_with_pvalue, calculate_ema_value
    from analytics.series import resample_series, align_timestamps
    from analytics.config import load_trend_config, get_quality_window

    class AnalyticsService:
        def __init__(self, data_source, cache_ttl: int = 300):
            self.data_source = data_source
            self.cache_ttl = cache_ttl
            self._cache: Dict[str, List[float]] = {}

        def get_correlation_report(self, metric_a: str, metric_b: str) -> Dict:
            series_a = self.data_source.fetch_series(metric_a)
            series_b = self.data_source.fetch_series(metric_b)
            aligned_a, aligned_b = align_timestamps(series_a, series_b)
            correlation, pvalue = pearson_correlation_with_pvalue(aligned_a, aligned_b)
            return {
                "metric_a": metric_a,
                "metric_b": metric_b,
                "correlation": round(correlation, 4),
                "p_value": round(pvalue, 6),
                "sample_size": len(aligned_a),
            }

        def get_smoothed_series(self, metric: str, window: int = 7) -> List[float]:
            raw = self.data_source.fetch_series(metric)
            resampled = resample_series(raw, interval_seconds=3600)
            return calculate_ema_value(resampled, span=window)

        def compute_advanced_score(
            self, metric: str, mode: str = "medium"
        ) -> Dict[str, float]:
            raw_series = self.data_source.fetch_series(metric)
            trend_config = load_trend_config(mode)
            window = trend_config["window"]
            quality_window = get_quality_window(mode)
            recent = raw_series[-window:] if len(raw_series) > window else raw_series
            resampled = resample_series(recent, interval_seconds=1800)
            smoothed = calculate_ema_value(resampled, span=quality_window)
            if len(smoothed) < quality_window:
                return {"score": 0.0, "confidence": 0.0, "trend_direction": 0.0}
            baseline = smoothed[:quality_window]
            current = smoothed[-quality_window:]
            aligned_base, aligned_curr = align_timestamps(baseline, current)
            correlation, p_value = pearson_correlation_with_pvalue(
                aligned_base, aligned_curr
            )
            trend_direction = (sum(current) / len(current)) - (
                sum(baseline) / len(baseline)
            )
            confidence = 1.0 - p_value if p_value < 0.05 else 0.0
            score = correlation * confidence * (1.0 if trend_direction > 0 else -1.0)
            return {
                "score": round(score, 4),
                "confidence": round(confidence, 4),
                "trend_direction": round(trend_direction, 4),
                "correlation": round(correlation, 4),
                "p_value": round(p_value, 6),
                "window_size": window,
            }
