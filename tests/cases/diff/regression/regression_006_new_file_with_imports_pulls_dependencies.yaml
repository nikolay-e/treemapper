    from typing import Any

    from src.data.loader import load_dataset, validate_schema
    from src.data.transform import normalize_values, apply_filters
    from src.config.settings import REPORT_FORMAT, MAX_ROWS


    class ReportGenerator:
        def __init__(self, source_path: str, output_format: str = REPORT_FORMAT):
            self.source_path = source_path
            self.output_format = output_format
            self.max_rows = MAX_ROWS
            self._dataset: list[dict[str, Any]] = []

        def load_and_validate(self, required_columns: list[str]) -> None:
            self._dataset = load_dataset(self.source_path)
            validate_schema(self._dataset, required_columns)
            if len(self._dataset) > self.max_rows:
                self._dataset = self._dataset[: self.max_rows]

        def generate_summary(
            self,
            group_column: str,
            value_column: str,
            filters: dict[str, Any] | None = None,
        ) -> dict[str, Any]:
            working_set = self._dataset
            if filters:
                working_set = apply_filters(working_set, filters)
            normalized = normalize_values(working_set, value_column)
            groups: dict[str, list[float]] = {}
            for record in normalized:
                key = str(record.get(group_column, "other"))
                if key not in groups:
                    groups[key] = []
                groups[key].append(float(record.get(value_column, 0)))
            summary = {}
            for key, values in groups.items():
                summary[key] = {
                    "count": len(values),
                    "total": round(sum(values), 4),
                    "average": round(sum(values) / len(values), 4) if values else 0,
                }
            return {"format": self.output_format, "groups": summary}

        def export_rows(self, columns: list[str]) -> list[dict[str, Any]]:
            exported = []
            for record in self._dataset:
                row = {col: record.get(col) for col in columns if col in record}
                exported.append(row)
            return exported

        def row_count(self) -> int:
            return len(self._dataset)
