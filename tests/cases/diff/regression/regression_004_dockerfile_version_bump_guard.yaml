must_include_files:
- Dockerfile

must_include_content_from:
  Dockerfile:
    - "FROM node:24-alpine AS builder"
    - "FROM nginx:1.28-alpine AS production"

must_not_include:
- GARBAGE_REG_004_CSRF_A
- GARBAGE_REG_004_ORIGIN_B
- GARBAGE_REG_004_MW_C
- GARBAGE_REG_004_LOGIN_D
- GARBAGE_REG_004_SESSION_E
- GARBAGE_REG_004_CFG_F

must_not_include_files:
- src/core/csrf.py
- src/auth/login.py
- src/config.py

strict: true
max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
