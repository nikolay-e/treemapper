# Regression: mixed default+named import not followed as dependency
# Root cause: JavaScript semantic parser regex doesn't handle
# `import defaultExport, { namedExport } from './module'` syntax.
# Only `import X from` and `import { X } from` are matched.
# Real-world: lingua-quiz commit 14f3470 — api/admin.ts missed as
# dependency of useAdminPage.ts which uses this exact pattern.

initial:
  src/pages/admin/useAdminPage.ts: |
    import adminApi, { type VocabularyItemCreate, type VocabularyItemUpdate } from '../../api/admin';
    import { useState, useCallback } from 'react';

    interface VocabularyItem {
      id: string;
      word: string;
      translation: string;
    }

    export function useAdminPage() {
      const [items, setItems] = useState<VocabularyItem[]>([]);
      const [loading, setLoading] = useState(false);

      const handleCreate = useCallback(async (word: string, translation: string) => {
        setLoading(true);
        const item = await adminApi.create({ word, translation });
        setItems(prev => [...prev, item]);
        setLoading(false);
      }, []);

      const handleUpdate = useCallback(async (id: string, data: Partial<VocabularyItem>) => {
        await adminApi.update(id, data);
        setItems(prev => prev.map(i => i.id === id ? { ...i, ...data } : i));
      }, []);

      const handleDelete = useCallback(async (id: string) => {
        await adminApi.remove(id);
        setItems(prev => prev.filter(i => i.id !== id));
      }, []);

      return { items, loading, handleCreate, handleUpdate, handleDelete };
    }
  src/api/admin.ts: |
    const API_BASE = '/api/admin';

    export interface VocabularyItemCreate {
      word: string;
      translation: string;
    }

    export interface VocabularyItemUpdate {
      word?: string;
      translation?: string;
    }

    async function create(data: VocabularyItemCreate) {
      const response = await fetch(`${API_BASE}/vocabulary`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      return response.json();
    }

    async function update(id: string, data: VocabularyItemUpdate) {
      const response = await fetch(`${API_BASE}/vocabulary/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      return response.json();
    }

    async function remove(id: string) {
      await fetch(`${API_BASE}/vocabulary/${id}`, { method: 'DELETE' });
    }

    const adminApi = { create, update, remove };
    export default adminApi;
