must_include_files:
  - pyproject.toml
must_include_content_from:
  pyproject.toml:
    - 'version = "1.3.0"'
    - "httpx>=0.25"
must_not_include:
  # src/treemapper/cli.py: unchanged source code
  - process_directory
  - click.Path
  # src/treemapper/tokens.py: unchanged source code
  - count_tokens
  - o200k_base
  # src/treemapper/clipboard.py: unchanged source code
  - copy_to_clipboard
  - pbcopy
must_not_include_files:
  - src/treemapper/cli.py
  - src/treemapper/tokens.py
  - src/treemapper/clipboard.py
max_fragments: 3
max_files: 2
add_garbage_files: false
skip_garbage_check: true
