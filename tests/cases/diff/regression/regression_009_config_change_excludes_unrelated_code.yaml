# Test: pyproject.toml version bump and new dependency — code files excluded
#
# Scenario: pyproject.toml changes version from "1.2.0" to "1.3.0" and adds
# "httpx>=0.25" to dependencies. No code files change. The diff context should
# include only the config file, not unrelated source files.
#
# Reviewer questions:
#   Q1: "What exactly changed in the project config?"
#       -> pyproject.toml: version bump + new httpx dependency.
#   Q2: "Does any existing code use httpx?"
#       -> No imports of httpx exist in any source file yet.
#
# Trap files (plausible but unrelated):
#   - src/treemapper/cli.py: CLI module — same project but no changes.
#   - src/treemapper/graph.py: dependency graph — same project but no changes.
#   - src/treemapper/clipboard.py: clipboard utilities — no changes.
#   - src/treemapper/tokens.py: token counting — no changes.

initial:
  pyproject.toml: |
    [project]
    name = "treemapper"
    version = "1.2.0"
    description = "Directory structure to YAML converter for LLM analysis"
    requires-python = ">=3.11"
    license = {text = "Apache-2.0"}
    authors = [
        {name = "Nikolay Eremeev", email = "dev@nikolay-eremeev.com"},
    ]
    dependencies = [
        "pyyaml>=6.0",
        "pathspec>=0.11",
        "tiktoken>=0.5",
        "click>=8.1",
    ]

    [project.optional-dependencies]
    dev = [
        "pytest>=7.4",
        "pytest-cov>=4.1",
        "black>=23.0",
        "ruff>=0.1",
        "mypy>=1.5",
        "pre-commit>=3.4",
    ]
    tree-sitter = [
        "tree-sitter>=0.21",
        "tree-sitter-python>=0.21",
        "tree-sitter-javascript>=0.21",
    ]

    [project.scripts]
    treemapper = "treemapper.cli:main"

    [tool.pytest.ini_options]
    testpaths = ["tests"]
    addopts = "-v --tb=short"

    [tool.black]
    line-length = 99
    target-version = ["py311"]

    [tool.ruff]
    line-length = 99
    target-version = "py311"

    [tool.mypy]
    python_version = "3.11"
    strict = true

    [build-system]
    requires = ["setuptools>=68.0", "wheel"]
    build-backend = "setuptools.backends._legacy:_Backend"
  src/treemapper/cli.py: |
    import sys
    from pathlib import Path
    from typing import Optional

    import click


    @click.command()
    @click.argument("path", type=click.Path(exists=True))
    @click.option("--format", "output_format", default="yaml")
    @click.option("--max-depth", default=None, type=int)
    @click.option("--budget", default=None, type=int)
    def main(path: str, output_format: str, max_depth: Optional[int], budget: Optional[int]):
        root = Path(path).resolve()
        if not root.is_dir():
            click.echo(f"Error: {path} is not a directory", err=True)
            sys.exit(1)
        result = process_directory(root, output_format, max_depth, budget)
        click.echo(result)


    def process_directory(root: Path, fmt: str, depth: Optional[int], budget: Optional[int]) -> str:
        entries = list(root.iterdir())
        filtered = [e for e in entries if not e.name.startswith(".")]
        return f"Processed {len(filtered)} entries in {fmt} format"
  src/treemapper/tokens.py: |
    from typing import List

    _encoder = None

    def _get_encoder():
        global _encoder
        if _encoder is None:
            import tiktoken
            _encoder = tiktoken.get_encoding("o200k_base")
        return _encoder

    def count_tokens(text: str) -> int:
        encoder = _get_encoder()
        return len(encoder.encode(text))

    def count_tokens_batch(texts: List[str]) -> List[int]:
        encoder = _get_encoder()
        return [len(encoder.encode(t)) for t in texts]
  src/treemapper/clipboard.py: |
    import subprocess
    import sys

    def copy_to_clipboard(content: str) -> bool:
        if sys.platform == "darwin":
            return _copy_macos(content)
        elif sys.platform == "linux":
            return _copy_linux(content)
        return False

    def _copy_macos(content: str) -> bool:
        try:
            process = subprocess.Popen(["pbcopy"], stdin=subprocess.PIPE)
            process.communicate(content.encode("utf-8"))
            return process.returncode == 0
        except FileNotFoundError:
            return False

    def _copy_linux(content: str) -> bool:
        for cmd in ["xclip", "xsel"]:
            try:
                process = subprocess.Popen([cmd], stdin=subprocess.PIPE)
                process.communicate(content.encode("utf-8"))
                if process.returncode == 0:
                    return True
            except FileNotFoundError:
                continue
        return False
