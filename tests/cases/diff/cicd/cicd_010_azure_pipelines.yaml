    const GARBAGE_CICD_010_LOCALE_MARKER_B = "en-US";

    class GarbageCalendarService {
      static GARBAGE_CICD_010_WEEK_START_MARKER_C = 0;

      getEvents(): void {}
    }

    export { GarbageCalendarService };
  garbage_timezone.ts: |
    const GARBAGE_CICD_010_TZ_MARKER_D = "UTC";
    const GARBAGE_CICD_010_OFFSET_MARKER_E = 0;

    class GarbageTimezoneConverter {
      static GARBAGE_CICD_010_DST_MARKER_F = true;

      convert(): void {}
    }

    export { GarbageTimezoneConverter };

must_include_files:
- azure-pipelines.yml

must_include_content_from:
  azure-pipelines.yml:
    - '- develop'
    - "NODE_VERSION: '20.x'"
    - '- task: NodeTool@0'
    - 'versionSpec: $(NODE_VERSION)'
    - '- script: npm ci'
    - '- script: npm run build'

must_not_include:
- GARBAGE_CICD_010_CALENDAR_MARKER_A
- GARBAGE_CICD_010_DST_MARKER_F
- GARBAGE_CICD_010_LOCALE_MARKER_B
- GARBAGE_CICD_010_OFFSET_MARKER_E
- GARBAGE_CICD_010_TZ_MARKER_D
- GARBAGE_CICD_010_WEEK_START_MARKER_C

must_not_include_files:
- garbage_calendar.ts
- garbage_timezone.ts
- src/types.ts
- src/utils.ts

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
