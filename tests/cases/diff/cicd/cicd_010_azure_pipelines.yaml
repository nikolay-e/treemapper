    trigger:
      - main
      - develop

    pool:
      vmImage: 'ubuntu-latest'

    variables:
      NODE_VERSION: '20.x'

    steps:
      - task: NodeTool@0
        inputs:
          versionSpec: $(NODE_VERSION)
      - script: npm ci
      - script: npm run build
      - script: npm test
  src/utils.ts: |
    export function formatDate(date: Date): string {
