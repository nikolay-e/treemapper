  Jenkinsfile:
    - NODE_ENV = 'production'
    - npm ci
    - npm test
    - stage('Test') {
must_not_include:
# Plain garbage markers
- GARBAGE_CICD_006_ARTIFACT_MARKER_D
- GARBAGE_CICD_006_DEPLOY_MARKER_A
- GARBAGE_CICD_006_PATH_MARKER_F
- GARBAGE_CICD_006_STRATEGY_MARKER_C
- GARBAGE_CICD_006_TARGET_MARKER_B
- GARBAGE_CICD_006_VERSION_MARKER_E
# Tricky: sibling staging pipeline with NODE_ENV and npm ci/test
- GARBAGE_CICD_006_STAGING_G
- GARBAGE_CICD_006_STGPIPE_H
# Tricky: Dockerfile with npm ci + npm test
- GARBAGE_CICD_006_DOCKER_I
- GARBAGE_CICD_006_DKRBUILD_J
must_not_include_files:
- garbage_deployment.js
- garbage_artifacts.js
- Jenkinsfile.staging
- Dockerfile
max_fragments: 4
max_files: 1
add_garbage_files: false
skip_garbage_check: true
