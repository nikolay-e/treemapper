must_include_files:
- bitbucket-pipelines.yml

must_include_content_from:
  bitbucket-pipelines.yml:
    - 'image: node:20'
    - 'name: Build and Test'
    - '- npm ci'
    - '- npm test'
    - 'name: Deploy'
    - 'deployment: production'
    - '- ./deploy.sh'

must_not_include:
- GARBAGE_CICD_011_MAX_MARKER_E
- GARBAGE_CICD_011_PORT_MARKER_B
- GARBAGE_CICD_011_PROTOCOL_MARKER_C
- GARBAGE_CICD_011_QUEUE_MARKER_D
- GARBAGE_CICD_011_RETRY_MARKER_F
- GARBAGE_CICD_011_SOCKET_MARKER_A

must_not_include_files:
- garbage_queue.js
- garbage_socket.js
- src/index.js
- src/logger.js
- src/routes.js

max_fragments: 3
max_files: 1
add_garbage_files: false
skip_garbage_check: true
