# Test 007: Makefile adds deploy target — reviewer needs the deploy script
#
# Scenario: Makefile modernizes build/test and adds lint + deploy targets.
# Only the Makefile is changed.
#
# Diff shows:
#   - build: python setup.py build -> python -m build
#   - test: pytest tests/ -> pytest tests/ --cov=src
#   - NEW lint: ruff check src/
#   - NEW deploy: ./scripts/deploy.sh
#
# Reviewer questions:
#   Q1: "What does ./scripts/deploy.sh do?"
#       -> Needs deploy.sh: it builds with `python -m build`, uploads via
#         `twine upload dist/*`, takes an environment argument. Without
#         seeing this, the reviewer cannot verify:
#         - The deploy target is calling something that actually deploys
#         - There is duplication: deploy.sh also runs `python -m build`,
#           same as the `build:` target
#         - The script defaults to staging (`${1:-staging}`), which may
#           or may not be the intended behavior
#
# Not needed for comprehension:
#   - CI workflow (ci.yml): knowing how GitHub Actions runs lint/test/deploy
#     does not help a reviewer verify the Makefile targets are correct
#   - Another Makefile variant (Makefile.ci): a separate CI build file
#     adds no understanding of what THIS Makefile does
#   - pyproject.toml: ruff/pytest config does not explain the Makefile
#   - Application code (app.py, config.py): completely unrelated to
#     build system changes
#   - pipeline.py: ML deployment code — shares the word "deploy" but
#     has nothing to do with the build system

max_enrichment: 14.1
initial:
  Makefile: ".PHONY: build test clean install dev\n\nPYTHON := python3\nVENV :=\
    \ venv\nPIP := $(VENV)/bin/pip\nPYTEST := $(VENV)/bin/pytest\n\nbuild:\n\tpython\
    \ setup.py build\n\ntest:\n\tpytest tests/\n\nclean:\n\trm -rf build/ dist/ *.egg-info\n\
    \tfind . -type d -name __pycache__ -exec rm -rf {} +\n\tfind . -type f -name \"\
    *.pyc\" -delete\n\ninstall:\n\t$(PIP) install -e .\n\ndev:\n\t$(PIP) install\
    \ -e \".[dev]\"\n"
  scripts/deploy.sh: |
    #!/bin/bash
    set -euo pipefail

    APP_ENV="${1:-staging}"
    ARTIFACT_BUCKET="s3://releases.internal"

    echo "Building distribution..."
    python -m build

    echo "Uploading to $ARTIFACT_BUCKET..."
    twine upload dist/*

    echo "Deployed to $APP_ENV"
  src/app.py: |
    import logging
    from typing import Optional
    from dataclasses import dataclass

    from .config import load_config, AppConfig
    from .services import DatabaseService, CacheService

    logger = logging.getLogger(__name__)

    @dataclass
    class Application:
        config: AppConfig
        database: DatabaseService
        cache: Optional[CacheService] = None

        def run(self) -> None:
            logger.info(f"Starting application in {self.config.environment} mode")
            self.database.connect()
            if self.cache:
                self.cache.connect()

        def shutdown(self) -> None:
            if self.cache:
                self.cache.disconnect()
            self.database.disconnect()

    def create_application() -> Application:
        config = load_config()
        database = DatabaseService(config.database)
        cache = CacheService(config.cache) if config.cache.enabled else None
        return Application(config=config, database=database, cache=cache)
  src/config.py: |
    import os
    from dataclasses import dataclass

    @dataclass
    class DatabaseConfig:
        host: str
        port: int
        name: str
        user: str
        password: str

    @dataclass
    class CacheConfig:
        enabled: bool
        host: str
        port: int
        ttl_seconds: int

    @dataclass
    class AppConfig:
        environment: str
        database: DatabaseConfig
        cache: CacheConfig

    def load_config() -> AppConfig:
        return AppConfig(
            environment=os.getenv("ENV", "development"),
            database=DatabaseConfig(
                host=os.getenv("DB_HOST", "localhost"),
                port=int(os.getenv("DB_PORT", "5432")),
                name=os.getenv("DB_NAME", "app"),
                user=os.getenv("DB_USER", "postgres"),
                password=os.getenv("DB_PASSWORD", ""),
            ),
            cache=CacheConfig(
                enabled=os.getenv("CACHE_ENABLED", "false").lower() == "true",
                host=os.getenv("CACHE_HOST", "localhost"),
                port=int(os.getenv("CACHE_PORT", "6379")),
                ttl_seconds=int(os.getenv("CACHE_TTL", "300")),
            ),
        )
  .github/workflows/ci.yml: |
    name: CI Pipeline
    on: [push, pull_request]
    jobs:
      quality:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Install tooling
            run: pip install ruff pytest coverage
          - name: Lint
            run: ruff check src/
          - name: Test
            run: pytest tests/ --cov=src
      release:
        needs: quality
        if: github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        steps:
          - name: Deploy
            run: ./scripts/deploy.sh production
  Makefile.ci: |
    .PHONY: lint test build

    CI_RUNNER = github-actions
    COVERAGE_THRESHOLD = 80

    lint:
    	ruff check src/

    test:
    	pytest tests/ --cov=src --cov-fail-under=$(COVERAGE_THRESHOLD)

    build:
    	python -m build --wheel
  pyproject.toml: |
    [project]
    name = "myapp"
    version = "1.0.0"
    requires-python = ">=3.11"

    [tool.pytest.ini_options]
    testpaths = ["tests"]
    addopts = "--cov=src --cov-report=html"

    [tool.ruff]
    line-length = 88
    target-version = "py311"
  src/pipeline.py: |
    class DeploymentPipeline:
        def build_artifacts(self, source_dir: str) -> list:
            return []

        def deploy_to_staging(self, artifacts: list) -> bool:
            return True

        def run_smoke_tests(self) -> bool:
            return True

changed:
  Makefile: ".PHONY: build test lint deploy clean install dev\n\nPYTHON := python3\n\
    VENV := venv\nPIP := $(VENV)/bin/pip\nPYTEST := $(VENV)/bin/pytest\n\nbuild:\n\
    \tpython -m build\n\ntest:\n\tpytest tests/ --cov=src\n\nlint:\n\truff check src/\n\
    \ndeploy:\n\t./scripts/deploy.sh\n\nclean:\n\trm -rf build/ dist/ *.egg-info\n\
    \tfind . -type d -name __pycache__ -exec rm -rf {} +\n\tfind . -type f -name \"\
    *.pyc\" -delete\n\ninstall:\n\t$(PIP) install -e .\n\ndev:\n\t$(PIP) install\
    \ -e \".[dev]\"\n"

must_include_files:
  - Makefile
  # Q1: "What does ./scripts/deploy.sh do?"
  # Without this, the reviewer sees `deploy: ./scripts/deploy.sh`
  # and has no idea if it is a PyPI publish, a server deploy, or a
  # database migration. The script content IS the answer.
  - scripts/deploy.sh
must_include_content_from:
  Makefile:
    - python -m build
    - pytest tests/ --cov=src
    - ruff check src/
    - ./scripts/deploy.sh
  scripts/deploy.sh:
    - twine upload
    - ARTIFACT_BUCKET
must_not_include:
  # --- CI workflow: how CI orchestrates != what the Makefile does ---
  - actions/checkout@v4
  - refs/heads/main
  - pip install ruff pytest coverage
  # --- Another Makefile variant: does not explain THIS Makefile ---
  - CI_RUNNER
  - COVERAGE_THRESHOLD
  - cov-fail-under
  # --- pyproject.toml: tool config does not explain build targets ---
  - cov-report=html
  - target-version
  - requires-python
  # --- pipeline.py: shares "deploy" as a word, not as a concept ---
  - DeploymentPipeline
  - build_artifacts
  - deploy_to_staging
  - run_smoke_tests
  # --- Application code: unrelated to build system ---
  - create_application
  - DatabaseService
  - CacheService
  - ttl_seconds
  - CACHE_TTL
  - DB_PASSWORD
must_not_include_files:
  - .github/workflows/ci.yml
  - Makefile.ci
  - pyproject.toml
  - src/pipeline.py
  - src/app.py
  - src/config.py
max_fragments: 5
max_files: 2
add_garbage_files: false
skip_garbage_check: true
