# === Assertions ===

must_include_files:
- .github/workflows/ci.yml

must_include_content_from:
  .github/workflows/ci.yml:
    - 'on: [push, pull_request]'
    - '- run: npm ci'
    - '- run: npm test'
    - 'name: CI'

must_not_include:
# Deploy workflow — sibling, shares checkout/setup-node/npm structure
- GARBAGE_ALGO_CICD_001_DEPLOY_MARKER_A
- GARBAGE_ALGO_CICD_001_DEPLOY_STEP_B
- GARBAGE_ALGO_CICD_001_DEPLOY_CMD_C
# Lint workflow — has pull_request trigger (same token as added in diff)
- GARBAGE_ALGO_CICD_001_LINT_MARKER_D
- GARBAGE_ALGO_CICD_001_LINT_CMD_E
# Dockerfile — has npm ci, npm run build, npm test (exact same commands)
- GARBAGE_ALGO_CICD_001_DOCKER_MARKER_F

must_not_include_files:
- .github/workflows/deploy.yml
- .github/workflows/lint.yml
- Dockerfile
- src/build.ts
- src/config.ts
- src/utils/logger.ts
- src/index.ts
- docs/README.md
- scripts/deploy.sh

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
