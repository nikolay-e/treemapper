    - 'DATABASE_URL: postgres://db/prod'
    - 'REDIS_URL: redis://redis:6379'
    - 'CI_DEBUG: "true"'
    - '- pytest --tb=short'
  src/config.py:
    - 'os.getenv("CI_DEBUG", "false")'
    - def load_config

