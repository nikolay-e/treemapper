    lib/theme.rb: |
      require_relative 'color'

      class Theme
        def highlight(base_color)
          base_color.brighten(50)
        end
      end
    lib/assets.rb: |
      module Assets
        def self.load(path)
          File.read(path)
        end
      end
  changed_files:
    lib/color.rb: |
      class Color
        attr_reader :r, :g, :b

        def initialize(r, g, b)
          @r = r.clamp(0, 255)
          @g = g.clamp(0, 255)
          @b = b.clamp(0, 255)
        end

        def brighten(amount)
          Color.new(@r + amount, @g + amount, @b + amount)
        end

        def to_hex
          format('#%02x%02x%02x', @r, @g, @b)
        end
      end
  commit_message: "fix: clamp RGB values to 0-255 range in constructor"
