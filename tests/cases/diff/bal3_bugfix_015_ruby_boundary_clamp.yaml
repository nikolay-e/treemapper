repo:
  initial_files:
    lib/color.rb: |
      class Color
        attr_reader :r, :g, :b

        def initialize(r, g, b)
          @r = r
          @g = g
          @b = b
        end

        def brighten(amount)
          Color.new(@r + amount, @g + amount, @b + amount)
        end

