name: bal4_crossmod_007_rust_trait_impl_cross_mod
tags:
- lang:rust
- change:single_file
- context:cross_module
- distance:1hop
- difficulty:trivial
repo:
  initial_files:
    src/traits/serializable.rs: |
      pub trait Serializable {
          fn to_json(&self) -> String;
      }
    src/models/product.rs: |
      use crate::traits::serializable::Serializable;

      pub struct Product {
          pub name: String,
          pub price: f64,
      }

      impl Serializable for Product {
          fn to_json(&self) -> String {
              format!("{{\"name\":\"{}\",\"price\":{}}}", self.name, self.price)
          }
      }
    src/utils/format.rs: |
      pub const GARBAGE_007_FMT_A: &str = "default";
      pub const GARBAGE_007_SEP_B: &str = ",";

      pub fn pad_left(s: &str, width: usize) -> String {
          format!("{:>width$}", s, width = width)
      }
    garbage_bench.rs: |
      pub const GARBAGE_007_BENCH_C: &str = "perf";
      pub const GARBAGE_007_ITER_D: u32 = 1000;

      pub fn run_bench() {}
  changed_files:
    src/traits/serializable.rs: |
      pub trait Serializable {
          fn to_json(&self) -> String;
          fn to_csv(&self) -> String;
      }
    src/models/product.rs: |
      use crate::traits::serializable::Serializable;

      pub struct Product {
          pub name: String,
          pub price: f64,
      }

      impl Serializable for Product {
          fn to_json(&self) -> String {
              format!("{{\"name\":\"{}\",\"price\":{}}}", self.name, self.price)
          }
      }
    src/utils/format.rs: |
      pub const GARBAGE_007_FMT_A: &str = "default";
      pub const GARBAGE_007_SEP_B: &str = ",";

      pub fn pad_left(s: &str, width: usize) -> String {
          format!("{:>width$}", s, width = width)
      }
    garbage_bench.rs: |
      pub const GARBAGE_007_BENCH_C: &str = "perf";
      pub const GARBAGE_007_ITER_D: u32 = 1000;

      pub fn run_bench() {}
  commit_message: "add to_csv to Serializable trait"
