      import adminApi, { type VocabularyItemCreate, type VocabularyItemUpdate } from '../../api/admin';
      import { useState, useCallback } from 'react';

      interface VocabularyItem {
        id: string;
        word: string;
        translation: string;
        category: string;
      }

      export function useAdminPage() {
        const [items, setItems] = useState<VocabularyItem[]>([]);
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState<string | null>(null);

        const handleCreate = useCallback(async (word: string, translation: string, category: string) => {
          setLoading(true);
          setError(null);
          try {
            const item = await adminApi.create({ word, translation });
            setItems(prev => [...prev, item]);
          } catch (e) {
            setError(e instanceof Error ? e.message : 'Failed to create');
          } finally {
            setLoading(false);
          }
        }, []);

        const handleUpdate = useCallback(async (id: string, data: Partial<VocabularyItem>) => {
          try {
            await adminApi.update(id, data);
            setItems(prev => prev.map(i => i.id === id ? { ...i, ...data } : i));
          } catch (e) {
            setError(e instanceof Error ? e.message : 'Failed to update');
          }
        }, []);

        const handleDelete = useCallback(async (id: string) => {
          try {
            await adminApi.remove(id);
            setItems(prev => prev.filter(i => i.id !== id));
          } catch (e) {
            setError(e instanceof Error ? e.message : 'Failed to delete');
          }
        }, []);

        return { items, loading, error, handleCreate, handleUpdate, handleDelete };
      }
