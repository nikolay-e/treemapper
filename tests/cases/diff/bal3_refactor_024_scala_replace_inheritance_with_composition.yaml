  changed_files:
    src/main/scala/core/InMemoryStore.scala: |
      package core

      class InMemoryStore[T] {
        private var data: Map[String, T] = Map.empty

        def findById(id: String): Option[T] = data.get(id)

        def save(id: String, entity: T): Unit =
          data = data + (id -> entity)

        def delete(id: String): Unit =
          data = data - id

        def findAll(): List[T] = data.values.toList

        def filter(predicate: T => Boolean): List[T] =
          data.values.filter(predicate).toList

        def findFirst(predicate: T => Boolean): Option[T] =
          data.values.find(predicate)
      }
    src/main/scala/repositories/UserRepository.scala: |
      package repositories

      import core.InMemoryStore
      import models.User

      class UserRepository {
        private val store = new InMemoryStore[User]

        def findById(id: String): Option[User] = store.findById(id)
        def save(id: String, user: User): Unit = store.save(id, user)
        def delete(id: String): Unit = store.delete(id)
        def findAll(): List[User] = store.findAll()

        def findByEmail(email: String): Option[User] =
          store.findFirst(_.email == email)
      }
    src/main/scala/repositories/ProductRepository.scala: |
      package repositories

      import core.InMemoryStore
      import models.Product

      class ProductRepository {
        private val store = new InMemoryStore[Product]

        def findById(id: String): Option[Product] = store.findById(id)
        def save(id: String, product: Product): Unit = store.save(id, product)
        def delete(id: String): Unit = store.delete(id)
        def findAll(): List[Product] = store.findAll()

        def findByCategory(cat: String): List[Product] =
          store.filter(_.category == cat)
      }
    src/main/scala/models/User.scala: |
      package models

      case class User(id: String, name: String, email: String)
    src/main/scala/models/Product.scala: |
      package models

      case class Product(id: String, name: String, category: String, price: Double)
    src/main/scala/services/UserService.scala: |
      package services

      import repositories.UserRepository
      import models.User

      class UserService {
        val repo = new UserRepository

        def register(user: User): Unit = repo.save(user.id, user)

        def lookup(email: String): Option[User] = repo.findByEmail(email)
      }
    src/main/scala/telemetry/Spans.scala: |
      package telemetry

      val GARBAGE_R024_SPANS_A: String = "spans"

      class SpanRecorder {
        def record(name: String): Unit = ()
      }
    src/main/scala/telemetry/Health.scala: |
