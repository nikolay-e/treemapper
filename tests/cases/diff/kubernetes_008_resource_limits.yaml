name: kubernetes_008_resource_limits
tags:
- lang:yaml
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    k8s/apps/worker/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: worker
        namespace: production
        labels:
          app: worker
          component: background-jobs
      spec:
        replicas: 5
        selector:
          matchLabels:
            app: worker
        template:
          metadata:
            labels:
              app: worker
              component: background-jobs
          spec:
            containers:
            - name: worker
              image: worker:v1.0.0
              command: ["python", "-m", "celery", "worker"]
              env:
              - name: CELERY_BROKER_URL
                valueFrom:
                  secretKeyRef:
                    name: redis-secret
                    key: url
              resources: {}
    k8s/apps/worker/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: worker-metrics
        namespace: production
      spec:
        selector:
          app: worker
        ports:
        - name: metrics
          port: 9090
          targetPort: 9090
    k8s/limitranges/production-limits.yaml: |
      apiVersion: v1
      kind: LimitRange
      metadata:
        name: default-limits
        namespace: production
      spec:
        limits:
        - type: Container
          default:
            memory: "256Mi"
            cpu: "500m"
          defaultRequest:
            memory: "128Mi"
            cpu: "100m"
          max:
            memory: "4Gi"
            cpu: "4"
    k8s/quotas/production-quota.yaml: |
      apiVersion: v1
      kind: ResourceQuota
      metadata:
        name: production-quota
        namespace: production
      spec:
        hard:
          requests.cpu: "20"
          requests.memory: "40Gi"
          limits.cpu: "40"
          limits.memory: "80Gi"
          pods: "100"
  changed_files:
    k8s/apps/worker/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: worker
        namespace: production
        labels:
          app: worker
          component: background-jobs
      spec:
        replicas: 5
        selector:
          matchLabels:
            app: worker
        template:
          metadata:
            labels:
              app: worker
              component: background-jobs
          spec:
            containers:
            - name: worker
              image: worker:v1.0.0
              command: ["python", "-m", "celery", "worker"]
              env:
              - name: CELERY_BROKER_URL
                valueFrom:
                  secretKeyRef:
                    name: redis-secret
                    key: url
              resources:
                requests:
                  memory: "512Mi"
                  cpu: "500m"
                  ephemeral-storage: "1Gi"
                limits:
                  memory: "1Gi"
                  cpu: "1000m"
                  ephemeral-storage: "2Gi"
    k8s/apps/worker/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: worker-metrics
        namespace: production
      spec:
        selector:
          app: worker
        ports:
        - name: metrics
          port: 9090
          targetPort: 9090
    k8s/limitranges/production-limits.yaml: |
      apiVersion: v1
      kind: LimitRange
      metadata:
        name: default-limits
        namespace: production
      spec:
        limits:
        - type: Container
          default:
            memory: "256Mi"
            cpu: "500m"
          defaultRequest:
            memory: "128Mi"
            cpu: "100m"
          max:
            memory: "4Gi"
            cpu: "4"
    k8s/quotas/production-quota.yaml: |
      apiVersion: v1
      kind: ResourceQuota
      metadata:
        name: production-quota
        namespace: production
      spec:
        hard:
          requests.cpu: "20"
          requests.memory: "40Gi"
          limits.cpu: "40"
          limits.memory: "80Gi"
          pods: "100"
  commit_message: Update files
