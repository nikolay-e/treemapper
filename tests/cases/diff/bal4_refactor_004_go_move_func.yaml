name: bal4_refactor_004_go_move_func
tags:
- lang:go
- change:multi_file
- change:refactor
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    pkg/handler/handler.go: |
      package handler

      import "fmt"

      func Handle(name string) string {
          return fmt.Sprintf("hello %s", sanitize(name))
      }

      func sanitize(s string) string {
          if len(s) == 0 {
              return "unknown"
          }
          return s
      }
    pkg/api/api.go: |
      package api

      import "app/pkg/handler"

      func Serve(name string) string {
          return handler.Handle(name)
      }
    garbage_events.go: |
      package garbage

      GARBAGE_BAL4R004_EVT_A = "events"
      GARBAGE_BAL4R004_BUS_B = "bus"

      type EventBus struct {
          GARBAGE_BAL4R004_BUS_C bool
      }
    garbage_cache.go: |
      package garbage

      GARBAGE_BAL4R004_CACHE_D = "cache"
      GARBAGE_BAL4R004_TTL_E = 60
  changed_files:
    pkg/handler/handler.go: |
      package handler

      import (
          "fmt"
          "app/pkg/strings"
      )

      func Handle(name string) string {
          return fmt.Sprintf("hello %s", strings.Sanitize(name))
      }
    pkg/strings/strings.go: |
      package strings

      func Sanitize(s string) string {
          if len(s) == 0 {
              return "unknown"
          }
          return s
      }
    pkg/api/api.go: |
      package api

      import "app/pkg/handler"

      func Serve(name string) string {
          return handler.Handle(name)
      }
    garbage_events.go: |
      package garbage

      GARBAGE_BAL4R004_EVT_A = "events"
      GARBAGE_BAL4R004_BUS_B = "bus"

      type EventBus struct {
          GARBAGE_BAL4R004_BUS_C bool
      }
    garbage_cache.go: |
      package garbage

      GARBAGE_BAL4R004_CACHE_D = "cache"
      GARBAGE_BAL4R004_TTL_E = 60
  commit_message: "refactor: move sanitize to strings package"
