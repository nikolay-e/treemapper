  changed_files:
    lib/config/settings.rb: |
      module Config
        class Settings
          attr_reader :data

          def initialize(data = {})
            @data = data
            @frozen = false
          end

          def get(key, default: nil)
            value = @data[key]
            value.nil? ? default : value
          end

          def set(key, value)
            raise "Settings are frozen" if @frozen
            @data[key] = value
          end

          def freeze!
            @frozen = true
            self
          end

          def frozen?
            @frozen
          end

          def merge(other_settings)
            Settings.new(@data.merge(other_settings.data))
          end
        end
      end
  commit_message: "fix: add default param to get, freeze!, and merge to Settings"
