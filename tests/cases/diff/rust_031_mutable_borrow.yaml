name: rust_031_mutable_borrow
tags:
- lang:clojure
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/workflow/steps.clj: |
      (ns workflow.steps)

      (defmulti execute-step :type)

      (defmethod execute-step :validate [step ctx]
        (assoc ctx :validated true))

      (defmethod execute-step :transform [step ctx]
        (update ctx :data (:fn step)))

      (defmethod execute-step :persist [step ctx]
        (assoc ctx :persisted true))
    src/workflow/engine.clj: |
      (ns workflow.engine
        (:require [workflow.steps :as steps]))

      (defn run-workflow [workflow ctx]
        (reduce (fn [context step]
                  (steps/execute-step step context))
                ctx
                (:steps workflow)))

      (defn build-workflow [step-configs]
        {:steps step-configs})
    src/api/workflow_handler.clj: |
      (ns api.workflow-handler
        (:require [workflow.engine :as engine]))

      (defn handle-run [workflow-config input]
        (let [workflow (engine/build-workflow (:steps workflow-config))
              result (engine/run-workflow workflow {:data input})]
          {:status 200 :body result}))
    garbage/scheduler.clj: |
      (ns garbage.scheduler)

      (def ^:const GARBAGE_RUST031_A "cron_marker")
      (def ^:const GARBAGE_RUST031_B "timer_marker")

      (defn schedule-job [job-fn cron-expr]
        GARBAGE_RUST031_A)
    garbage/monitor.clj: |
      (ns garbage.monitor)

      (def ^:const GARBAGE_RUST031_C "metric_marker")
      (def ^:const GARBAGE_RUST031_D "alert_marker")

      (defn record [metric-name value]
        GARBAGE_RUST031_C)
    garbage/notifier.clj: |
      (ns garbage.notifier)

      (def ^:const GARBAGE_RUST031_E "email_marker")

      (defn notify [user-id message]
        GARBAGE_RUST031_E)
  changed_files:
    src/workflow/engine.clj: |
      (ns workflow.engine
        (:require [workflow.steps :as steps]))

      (defn run-workflow [workflow ctx]
        (reduce (fn [context step]
                  (steps/execute-step step context))
                ctx
                (:steps workflow)))

      (defn build-workflow [step-configs]
        {:steps step-configs})

      (defn run-with-timeout [workflow ctx timeout-ms]
        (let [result (future (run-workflow workflow ctx))]
          (deref result timeout-ms {:error :timeout})))
    garbage/scheduler.clj: |
      (ns garbage.scheduler)

      (def ^:const GARBAGE_RUST031_A "cron_marker")
      (def ^:const GARBAGE_RUST031_B "timer_marker")

      (defn schedule-job [job-fn cron-expr]
        GARBAGE_RUST031_A)
    garbage/monitor.clj: |
      (ns garbage.monitor)

      (def ^:const GARBAGE_RUST031_C "metric_marker")
      (def ^:const GARBAGE_RUST031_D "alert_marker")

      (defn record [metric-name value]
        GARBAGE_RUST031_C)
    garbage/notifier.clj: |
      (ns garbage.notifier)

      (def ^:const GARBAGE_RUST031_E "email_marker")

      (defn notify [user-id message]
        GARBAGE_RUST031_E)
  commit_message: "feat: add run-with-timeout to workflow engine"
