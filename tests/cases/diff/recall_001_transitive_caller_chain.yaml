          Percent int
      }

      func ApplyDiscount(amount int64, d Discount) int64 {
          return amount - (amount*int64(d.Percent))/100
      }
    pkg/billing/tax.go: |
      package billing

      func ComputeTax(amount int64, rate float64) int64 {
