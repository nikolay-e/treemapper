name: bal3_refactor_014_ruby_rename_class_across_files
tags:
- lang:ruby
- change:multi_file
- change:refactor
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    lib/mailer.rb: |
      class Mailer
        def initialize(smtp_host)
          @smtp_host = smtp_host
        end

        def deliver(to, subject, body)
          { to: to, subject: subject, body: body, host: @smtp_host }
        end
      end
    app/services/notification_service.rb: |
      require_relative '../../lib/mailer'

      class NotificationService
        def initialize
          @mailer = Mailer.new("smtp.example.com")
        end

        def notify_user(user_email, message)
          @mailer.deliver(user_email, "Notification", message)
        end
      end
    app/services/report_service.rb: |
      require_relative '../../lib/mailer'

      class ReportService
        def initialize
          @mailer = Mailer.new("smtp.example.com")
        end

        def send_report(admin_email, report_data)
          @mailer.deliver(admin_email, "Weekly Report", report_data)
        end
      end
    lib/cache/memory.rb: |
      GARBAGE_R014_CACHE_A = "memory"

      class MemoryCache
