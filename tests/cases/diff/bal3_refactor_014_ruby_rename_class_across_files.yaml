      class SearchIndexer
        def index(doc)
        end
      end
  changed_files:
    lib/email_client.rb: |
      class EmailClient
        def initialize(smtp_host)
          @smtp_host = smtp_host
        end

        def deliver(to, subject, body)
          { to: to, subject: subject, body: body, host: @smtp_host }
        end
      end
    app/services/notification_service.rb: |
      require_relative '../../lib/email_client'

      class NotificationService
        def initialize
          @email_client = EmailClient.new("smtp.example.com")
        end

        def notify_user(user_email, message)
          @email_client.deliver(user_email, "Notification", message)
        end
      end
    app/services/report_service.rb: |
      require_relative '../../lib/email_client'

      class ReportService
