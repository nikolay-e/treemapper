  changed_files:
    src/DataFrame.jl: |
      module DataFrame

      struct Column
          name::String
          values::Vector{Any}
      end

      struct Table
          columns::Vector{Column}
      end

      function create_table(names::Vector{String}, data::Vector{Vector{Any}})
          @assert length(names) == length(data) "Names and data must match"
          @assert allequal(length.(data)) "All columns must have same length"
          cols = [Column(n, d) for (n, d) in zip(names, data)]
          Table(cols)
      end

      function get_column(t::Table, name::String)
          for col in t.columns
              if col.name == name
                  return col.values
              end
          end
          error("Column $name not found")
      end

      function has_column(t::Table, name::String)
          any(c -> c.name == name, t.columns)
      end

      function nrows(t::Table)
          isempty(t.columns) ? 0 : length(t.columns[1].values)
      end

      export Column, Table, create_table, get_column, has_column, nrows

      end
    src/Filter.jl: |
      module Filter
      using ..DataFrame

      function where(t::Table, col_name::String, pred::Function)
          @assert has_column(t, col_name) "Column $col_name does not exist"
          vals = get_column(t, col_name)
          mask = [pred(v) for v in vals]
          new_cols = [Column(c.name, c.values[mask]) for c in t.columns]
          Table(new_cols)
      end

      export where

      end
    src/Aggregator.jl: |
      module Aggregator
      using ..DataFrame

      function sum_column(t::Table, col_name::String)
          @assert has_column(t, col_name) "Column $col_name does not exist"
          vals = get_column(t, col_name)
          sum(vals)
      end

      export sum_column

      end
    src/Pipeline.jl: |
      module Pipeline
      include("DataFrame.jl")
      include("Filter.jl")
      include("Aggregator.jl")
      using .DataFrame
      using .Filter
      using .Aggregator

      function run(t::Table)
          filtered = where(t, "age", x -> x >= 18)
          total = sum_column(filtered, "score")
          (count=nrows(filtered), total=total)
      end

      end
    garbage_viz.jl: |
      GARBAGE_RARE_015_CHART_A = "bar"
      GARBAGE_RARE_015_COLORS_B = 8

      function garbage_viz()
          return GARBAGE_RARE_015_CHART_A
      end

      GARBAGE_RARE_015_LEGEND_C = true
    garbage_export.jl: |
      GARBAGE_RARE_015_FORMAT_D = "csv"
      GARBAGE_RARE_015_DELIM_E = ","

      function garbage_export()
          return GARBAGE_RARE_015_FORMAT_D
      end

      GARBAGE_RARE_015_HEADER_F = true
