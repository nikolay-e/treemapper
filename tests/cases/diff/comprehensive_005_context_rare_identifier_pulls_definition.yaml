    src/bloom_filter.py: |
      import hashlib
      from typing import List

      class BloomFilter:
          def __init__(self, size: int = 1024, hash_count: int = 3):
              self.size = size
              self.hash_count = hash_count
              self.bit_array = [False] * size

          def add(self, item: str) -> None:
              for seed in range(self.hash_count):
                  idx = int(hashlib.md5(f"{seed}:{item}".encode()).hexdigest(), 16) % self.size
                  self.bit_array[idx] = True

          def might_contain(self, item: str) -> bool:
              return all(
                  self.bit_array[int(hashlib.md5(f"{seed}:{item}".encode()).hexdigest(), 16) % self.size]
                  for seed in range(self.hash_count)
              )
    src/trie_index.py: |
      from typing import Dict, Optional

      class TrieNode:
          def __init__(self):
              self.children: Dict[str, 'TrieNode'] = {}
              self.is_end = False

      class TrieIndex:
          def __init__(self):
              self.root = TrieNode()

          def insert(self, word: str) -> None:
              node = self.root
              for char in word:
                  if char not in node.children:
                      node.children[char] = TrieNode()
                  node = node.children[char]
              node.is_end = True

          def search(self, prefix: str) -> bool:
              node = self.root
              for char in prefix:
                  if char not in node.children:
                      return False
                  node = node.children[char]
              return True
