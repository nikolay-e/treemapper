name: rust_021_cfg_feature
tags:
- lang:rust
- change:bug_fix
- change:single_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    src/inventory/stock.rs: |
      use std::collections::HashMap;

      pub struct StockLedger {
          levels: HashMap<String, i32>,
      }

      impl StockLedger {
          pub fn new() -> Self {
              StockLedger { levels: HashMap::new() }
          }

          pub fn set(&mut self, sku: &str, qty: i32) {
              self.levels.insert(sku.to_string(), qty);
          }

          pub fn receive(&mut self, sku: &str, qty: i32) {
              *self.levels.entry(sku.to_string()).or_insert(0) += qty;
          }

          pub fn deduct(&mut self, sku: &str, qty: i32) -> Result<(), String> {
              let level = self.levels.get_mut(sku)
                  .ok_or_else(|| format!("unknown SKU: {}", sku))?;
              if *level < qty {
                  return Err(format!("insufficient stock for {}", sku));
              }
              *level -= qty;
              Ok(())
          }

          pub fn available(&self, sku: &str) -> i32 {
              // BUG: returns 0 for unknown SKU — should return -1 to distinguish
              *self.levels.get(sku).unwrap_or(&0)
          }
      }
