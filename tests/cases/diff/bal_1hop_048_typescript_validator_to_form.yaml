    src/inventory/stock_tracker.rs: |
      use crate::inventory::warehouse::Warehouse;
      use crate::inventory::product::Product;

      pub struct StockTracker {
          warehouse: Warehouse,
      }

      impl StockTracker {
          pub fn new(warehouse: Warehouse) -> Self {
              Self { warehouse }
          }

          pub fn reserve(&mut self, product_id: &str, quantity: u32) -> Result<(), String> {
              let product = self.warehouse.get_mut(product_id)
                  .ok_or_else(|| format!("Product {} not found", product_id))?;
              if product.available < quantity {
                  return Err(format!("Only {} units available", product.available));
              }
              product.available -= quantity;
              product.reserved += quantity;
              Ok(())
          }

          pub fn release(&mut self, product_id: &str, quantity: u32) {
              if let Some(product) = self.warehouse.get_mut(product_id) {
                  product.reserved = product.reserved.saturating_sub(quantity);
                  product.available += quantity;
              }
          }
      }
    src/inventory/warehouse.rs: |
      use crate::inventory::product::Product;
      use std::collections::HashMap;

      pub struct Warehouse {
          products: HashMap<String, Product>,
      }

      impl Warehouse {
          pub fn new() -> Self {
              Self { products: HashMap::new() }
          }

          pub fn add(&mut self, product: Product) {
              self.products.insert(product.id.clone(), product);
          }

          pub fn get_mut(&mut self, id: &str) -> Option<&mut Product> {
              self.products.get_mut(id)
          }
      }
    src/inventory/product.rs: |
      pub struct Product {
