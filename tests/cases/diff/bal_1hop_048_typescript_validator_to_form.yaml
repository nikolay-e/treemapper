          pub available: u32,
          pub reserved: u32,
      }
    tests/test_stock_tracker.rs: |
      use crate::inventory::stock_tracker::StockTracker;
      use crate::inventory::warehouse::Warehouse;
      use crate::inventory::product::Product;

      fn make_warehouse() -> Warehouse {
          let mut wh = Warehouse::new();
          wh.add(Product { id: "p1".to_string(), name: "Widget".to_string(), available: 10, reserved: 0 });
          wh
      }

      #[test]
      fn test_reserve_reduces_available() {
          let mut tracker = StockTracker::new(make_warehouse());
          tracker.reserve("p1", 3).unwrap();
          // available should be 7
      }

      #[test]
      fn test_reserve_fails_when_insufficient() {
          let mut tracker = StockTracker::new(make_warehouse());
          let result = tracker.reserve("p1", 20);
          assert!(result.is_err());
      }
