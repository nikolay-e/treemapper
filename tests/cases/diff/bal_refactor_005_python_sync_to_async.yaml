  changed_files:
    src/pagination/cursor.rs: |
      pub struct Cursor {
          pub page: u32,
          pub per_page: u32,
          pub total: u64,
      }

      impl Cursor {
          pub fn new(page: u32, per_page: u32, total: u64) -> Self {
              let page = page.max(1);
              Cursor { page, per_page, total }
          }

          pub fn offset(&self) -> u64 {
              ((self.page - 1) as u64) * (self.per_page as u64)
          }

          pub fn total_pages(&self) -> u32 {
              ((self.total + self.per_page as u64 - 1) / self.per_page as u64) as u32
          }

          pub fn has_next(&self) -> bool {
              self.page < self.total_pages()
          }
      }
    src/api/list_handler.rs: |
      use crate::pagination::cursor::Cursor;

      pub struct ListHandler;

      impl ListHandler {
          pub fn paginate(page: u32, per_page: u32, total: u64) -> Cursor {
              Cursor::new(page, per_page, total)
          }
      }
    garbage/filter.rs: |
      // GARBAGE_PAGE_A = "filter_marker"
      pub fn apply_filter(_q: &str) -> Vec<String> { vec![] }
    garbage/sort.rs: |
      // GARBAGE_PAGE_B = "sort_marker"
