  changed_files:
    services/fetcher.py: |
      import aiohttp

      async def fetch_user(user_id):
          async with aiohttp.ClientSession() as session:
              async with session.get(f"https://api.example.com/users/{user_id}") as resp:
                  resp.raise_for_status()
                  return await resp.json()

      async def fetch_orders(user_id):
          async with aiohttp.ClientSession() as session:
              async with session.get(f"https://api.example.com/users/{user_id}/orders") as resp:
                  resp.raise_for_status()
                  return await resp.json()
    services/aggregator.py: |
      from services.fetcher import fetch_user, fetch_orders

      async def get_user_summary(user_id):
          user = await fetch_user(user_id)
          orders = await fetch_orders(user_id)
          return {
              "name": user["name"],
              "order_count": len(orders),
              "total_spent": sum(o["amount"] for o in orders),
          }
