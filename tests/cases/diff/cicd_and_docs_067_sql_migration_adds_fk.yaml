name: cicd_and_docs_067_sql_migration_adds_fk
repo:
  initial_files:
    migrations/001_create_tables.sql: |
      CREATE TABLE categories (
          id SERIAL PRIMARY KEY,
          name VARCHAR(255) NOT NULL UNIQUE,
          description TEXT,
          parent_id INTEGER,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE TABLE products (
          id SERIAL PRIMARY KEY,
          name VARCHAR(255) NOT NULL,
          category_id INTEGER,
          price DECIMAL(10, 2) NOT NULL,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );
    migrations/001_create_users.sql: |
      CREATE TABLE users (
          id SERIAL PRIMARY KEY,
          email VARCHAR(255) NOT NULL UNIQUE,
          name VARCHAR(255) NOT NULL,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE TABLE user_preferences (
          id SERIAL PRIMARY KEY,
          user_id INTEGER REFERENCES users(id),
          theme VARCHAR(50) DEFAULT 'light',
          notifications BOOLEAN DEFAULT TRUE
      );
    src/models/category.py: |
      from dataclasses import dataclass
      from typing import Optional

      @dataclass
      class Category:
          id: int
          name: str
          description: Optional[str] = None
          parent_id: Optional[int] = None
    src/models/product.py: |
      from dataclasses import dataclass
      from decimal import Decimal
      from typing import Optional

      @dataclass
      class Product:
          id: int
          name: str
          price: Decimal
          category_id: Optional[int] = None
    src/models/user.py: |
      from dataclasses import dataclass
      from typing import Optional

      @dataclass
      class User:
          id: int
          email: str
          name: str
  changed_files:
    migrations/001_create_tables.sql: |
      CREATE TABLE categories (
          id SERIAL PRIMARY KEY,
          name VARCHAR(255) NOT NULL UNIQUE,
          description TEXT,
          parent_id INTEGER,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE TABLE products (
          id SERIAL PRIMARY KEY,
          name VARCHAR(255) NOT NULL,
          category_id INTEGER,
          price DECIMAL(10, 2) NOT NULL,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );
    migrations/001_create_users.sql: |
      CREATE TABLE users (
          id SERIAL PRIMARY KEY,
          email VARCHAR(255) NOT NULL UNIQUE,
          name VARCHAR(255) NOT NULL,
          created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
      );

      CREATE TABLE user_preferences (
          id SERIAL PRIMARY KEY,
          user_id INTEGER REFERENCES users(id),
          theme VARCHAR(50) DEFAULT 'light',
          notifications BOOLEAN DEFAULT TRUE
      );
    migrations/002_add_foreign_keys.sql: |
      -- Self-referencing FK for category hierarchy
      ALTER TABLE categories
      ADD CONSTRAINT fk_categories_parent
      FOREIGN KEY (parent_id) REFERENCES categories(id)
      ON DELETE SET NULL;

      -- FK from products to categories
      ALTER TABLE products
      ADD CONSTRAINT fk_products_category
      FOREIGN KEY (category_id) REFERENCES categories(id)
      ON DELETE SET NULL
      ON UPDATE CASCADE;

      -- Add index for FK columns
      CREATE INDEX idx_categories_parent_id ON categories(parent_id);
      CREATE INDEX idx_products_category_id ON products(category_id);
    src/models/category.py: |
      from dataclasses import dataclass
      from typing import Optional

      @dataclass
      class Category:
          id: int
          name: str
          description: Optional[str] = None
          parent_id: Optional[int] = None
    src/models/product.py: |
      from dataclasses import dataclass
      from decimal import Decimal
      from typing import Optional

      @dataclass
      class Product:
          id: int
          name: str
          price: Decimal
          category_id: Optional[int] = None
    src/models/user.py: |
      from dataclasses import dataclass
      from typing import Optional

      @dataclass
      class User:
          id: int
          email: str
          name: str
  commit_message: "db: add foreign key constraints for categories and products"
fragments:
- id: fk_migration
  selector:
    path: migrations/002_add_foreign_keys.sql
- id: fk_category_hierarchy
  selector:
    anchor: "-- Self-referencing FK for category hierarchy"
- id: constrained_columns
  selector:
    path: migrations/001_create_tables.sql
    anchor: parent_id INTEGER
- id: category_model
  selector:
    path: src/models/category.py
    anchor: "parent_id: Optional[int]"
- id: product_model
  selector:
    path: src/models/product.py
    anchor: "category_id: Optional[int]"
- id: no_users_table
  selector:
    path: migrations/001_create_users.sql
    anchor: CREATE TABLE users
- id: no_user_model
  selector:
    path: src/models/user.py
    anchor: "class User"
oracle:
  required:
  - fk_migration
  - fk_category_hierarchy
  - constrained_columns
  allowed:
  - category_model
  - product_model
  forbidden:
  - no_users_table
  - no_user_model
