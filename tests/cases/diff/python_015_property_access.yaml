      from models.person import Person
      from views import PersonView, ViewConfig

      class TestPersonView:
          def setup(self):
              self.view = PersonView(ViewConfig(cache_enabled=False))

          def test_render_shows_full_name(self):
              person = Person("Alice", "Smith")
              html = self.view.render(person)
              assert "Alice Smith" in html

          def test_render_shows_age(self):
              from datetime import date
              person = Person("Bob", "Jones", date(1990, 1, 1))
              html = self.view.render(person)
              assert "Age:" in html

          def test_render_list(self):
              people = [Person("A", "B"), Person("C", "D")]
              html = self.view.render_list(people)
              assert "<li>" in html
    person_api.py: |
      from models.person import Person
      from typing import Dict, Any

      class PersonAPI:
          def serialize(self, person: Person) -> Dict[str, Any]:
              return {
                  "full_name": person.full_name,
                  "age": person.age,
                  "email": person.email,
                  "is_adult": person.is_adult,
              }

          def serialize_list(self, people: list[Person]) -> list[Dict[str, Any]]:
              return [self.serialize(p) for p in people]

          def handle_get(self, person: Person) -> Dict[str, Any]:
              data = self.serialize(person)
              data["display"] = person.display_info
              return data
