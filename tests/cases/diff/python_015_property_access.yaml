      from typing import Dict, Any, List, Optional

      class PersonFormatter:
          def __init__(self, date_format: str = "%Y-%m-%d"):
              self._date_format = date_format

          def format_csv_row(self, name: str, email: str, age: int) -> str:
              return f"{name},{email},{age}"

          def format_csv_header(self) -> str:
              return "name,email,age"

          def format_json(self, name: str, email: str) -> Dict[str, str]:
              return {"name": name, "email": email}

      class ExportFormatter:
          def __init__(self, output_format: str = "csv"):
              self._format = output_format

          def format_record(self, record: Dict[str, Any]) -> str:
              if self._format == "csv":
                  return ",".join(str(v) for v in record.values())
              return str(record)
    search_index.py: |
      from typing import Dict, Any, List, Optional
      from dataclasses import dataclass

      @dataclass
      class SearchResult:
          person_id: str
          name: str
          score: float

      class PersonSearchIndex:
          def __init__(self):
              self._index: Dict[str, Dict[str, Any]] = {}

          def index_person(self, person_id: str, name: str, email: str) -> None:
              self._index[person_id] = {"name": name.lower(), "email": email.lower()}

          def search(self, query: str, limit: int = 10) -> List[SearchResult]:
              results = []
              query_lower = query.lower()
              for pid, data in self._index.items():
                  if query_lower in data["name"]:
                      results.append(SearchResult(person_id=pid, name=data["name"], score=1.0))
              return results[:limit]

          def remove(self, person_id: str) -> bool:
              return self._index.pop(person_id, None) is not None
