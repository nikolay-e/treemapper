repo:
  initial_files:
    lib/utils.lua: |
      local M = {}

      function M.clamp(value, min_val, max_val)
          if value < min_val then return min_val end
          if value > max_val then return max_val end
          return value
      end

      function M.lerp(a, b, t)
          return a + (b - a) * t
      end

      function M.distance(x1, y1, x2, y2)
          local dx = x2 - x1
          local dy = y2 - y1
          return math.sqrt(dx * dx + dy * dy)
      end

      function M.normalize(x, y)
          local len = math.sqrt(x * x + y * y)
          if len == 0 then return 0, 0 end
          return x / len, y / len
      end

      return M
    game.lua: |
      local game = {}

      function game.init()
          game.x = 0
          game.y = 0
      end

      function game.update(dt)
          game.x = game.x + dt
      end

      return game
    lib/strings.lua: |
      local GARBAGE_LUA_001_A = "noise_marker_strings"

      local M = {}

      function M.trim(s)
          return s:match("^%s*(.-)%s*$")
      end

      function M.split(s, sep)
          local parts = {}
          for part in s:gmatch("[^" .. sep .. "]+") do
              parts[#parts + 1] = part
          end
          return parts
      end

      function M.starts_with(s, prefix)
          return s:sub(1, #prefix) == prefix
      end

      return M
    lib/logging.lua: |
      local GARBAGE_LUA_001_B = "noise_marker_logging"

      local M = {}
      M.level = "info"

      function M.set_level(level)
          M.level = level
      end

      function M.debug(msg)
          if M.level == "debug" then
              print("[DEBUG] " .. msg)
          end
      end

      function M.info(msg)
          print("[INFO] " .. msg)
      end

      function M.error(msg)
          print("[ERROR] " .. msg)
      end

      return M
