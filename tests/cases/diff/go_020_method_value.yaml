name: go_020_method_value
repo:
  initial_files:
    internal/notification/notifier.go: |
      package notification

      import "log"

      type Notifier struct {
          prefix string
          logger *log.Logger
      }

      func NewNotifier(prefix string, logger *log.Logger) *Notifier {
          return &Notifier{prefix: prefix, logger: logger}
      }

      func (n *Notifier) Notify(msg string) {
          n.logger.Printf("[%s] %s", n.prefix, msg)
      }

      func (n *Notifier) Alert(msg string) {
          n.logger.Printf("[ALERT][%s] %s", n.prefix, msg)
      }

      func (n *Notifier) Error(msg string) {
          n.logger.Printf("[ERROR][%s] %s", n.prefix, msg)
      }
    internal/dispatch/dispatcher.go: |
      package dispatch

      func Dispatch() {}
    internal/notification/formatter.go: |
      package notification

      import (
          "fmt"
          "strings"
          "time"
      )

      type MessageFormatter struct {
          dateFormat string
          uppercase  bool
      }

      func NewFormatter(dateFormat string) *MessageFormatter {
          return &MessageFormatter{dateFormat: dateFormat}
      }

      func (f *MessageFormatter) Format(msg string) string {
          timestamp := time.Now().Format(f.dateFormat)
          result := fmt.Sprintf("[%s] %s", timestamp, msg)
          if f.uppercase {
              return strings.ToUpper(result)
          }
          return result
      }
