  changed_files:
    grid/dispatcher.py: |
      from grid.topology import Substation, TransmissionLine
      from grid.load_model import LoadForecast

      class GridDispatcher:
          def __init__(self):
              self._substations: list[Substation] = []

          def register(self, sub: Substation) -> None:
              self._substations.append(sub)

          def total_capacity_mw(self) -> float:
              return sum(s.capacity_mw for s in self._substations)

          def find_overloaded(self, forecasts: list[LoadForecast]) -> list[str]:
              peak_demand = sum(f.demand_mw for f in forecasts if f.is_peak())
              overloaded = []
              for sub in self._substations:
                  if sub.capacity_mw < peak_demand / max(len(self._substations), 1):
                      overloaded.append(sub.name)
              return overloaded
    grid/topology.py: |
      class Substation:
          def __init__(self, name: str, capacity_mw: float):
              self.name = name
              self.capacity_mw = capacity_mw

      class TransmissionLine:
          def __init__(self, source: str, dest: str, max_mw: float):
              self.source = source
              self.dest = dest
              self.max_mw = max_mw

          def utilization(self, current_mw: float) -> float:
              return current_mw / self.max_mw if self.max_mw > 0 else 0.0

          def is_congested(self, current_mw: float, threshold: float = 0.85) -> bool:
              return self.utilization(current_mw) >= threshold
