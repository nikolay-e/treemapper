name: bal3_cfgcode_012_ruby_yaml_redis_session
tags:
- lang:ruby
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/session.yml: |
      session:
        store: cookie
        expiry_minutes: 30
        secure: false
        domain: localhost
    lib/session/manager.rb: |
      require 'yaml'

      module Session
        class Manager
          attr_reader :store, :expiry_minutes, :secure, :domain

          def initialize(config_path)
            data = YAML.load_file(config_path)
            cfg = data['session']
            @store = cfg['store']
            @expiry_minutes = cfg['expiry_minutes']
            @secure = cfg['secure']
            @domain = cfg['domain']
          end

          def cookie_options
            {
              expires: Time.now + (@expiry_minutes * 60),
              secure: @secure,
              domain: @domain,
              httponly: true
            }
          end

          def redis_store?
            @store == 'redis'
          end
        end
      end
    app/middleware/session_middleware.rb: |
      module App
        class SessionMiddleware
          def initialize(app, session_manager)
            @app = app
            @session_manager = session_manager
          end

          def call(env)
            env['session.options'] = @session_manager.cookie_options
            @app.call(env)
          end
        end
      end
    lib/cache/memory.rb: |
      GARBAGE_CFGCODE_012_MEM_A = "lru"
      GARBAGE_CFGCODE_012_SIZE_B = 256

      module Cache
        class Memory
          def get(key); end
          def set(key, value); end
        end
      end
    lib/logging/file_logger.rb: |
      GARBAGE_CFGCODE_012_FILE_C = "app.log"
      GARBAGE_CFGCODE_012_ROTATE_D = 7

      module Logging
        class FileLogger
          def info(msg); end
        end
      end
    lib/validators/email.rb: |
      GARBAGE_CFGCODE_012_REGEX_E = "email"
      GARBAGE_CFGCODE_012_MAX_F = 254

      module Validators
        def self.valid_email?(addr)
          addr.include?('@')
        end
      end
  changed_files:
    config/session.yml: |
      session:
        store: redis
        expiry_minutes: 60
        secure: true
        domain: .myapp.com
        redis_url: redis://session-store:6379/0
  commit_message: "switch sessions to Redis store with longer expiry"
