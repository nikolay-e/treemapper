repo:
  initial_files:
    pkg/pool/connection_pool.go: |
      package pool

      import "sync"

      type Pool struct {
          mu      sync.Mutex
          conns   []string
          maxSize int
      }

      func New(maxSize int) *Pool {
          return &Pool{maxSize: maxSize}
      }

      func (p *Pool) Acquire() (string, bool) {
          p.mu.Lock()
          defer p.mu.Unlock()
          if len(p.conns) == 0 {
              return "", false
          }
          conn := p.conns[0]
          p.conns = p.conns[1:]  // BUG: leaves capacity referencing old backing array
          return conn, true
      }

      func (p *Pool) Release(conn string) {
          p.mu.Lock()
          defer p.mu.Unlock()
          if len(p.conns) < p.maxSize {
              p.conns = append(p.conns, conn)
          }
      }
    pkg/db/client.go: |
      package db

      import "pkg/pool"

      type Client struct {
          pool *pool.Pool
      }

      func NewClient(p *pool.Pool) *Client {
          return &Client{pool: p}
      }

      func (c *Client) Exec(query string) error {
          conn, ok := c.pool.Acquire()
          if !ok {
              return nil
          }
          defer c.pool.Release(conn)
          _ = query
          return nil
      }
    internal/repo/user_repo.go: |
      package repo

      import "pkg/db"

      type UserRepo struct {
          db *db.Client
      }

      func NewUserRepo(db *db.Client) *UserRepo {
          return &UserRepo{db: db}
      }

      func (r *UserRepo) Create(userID string) error {
          return r.db.Exec("INSERT INTO users VALUES ($1)")
      }
    internal/service/user_service.go: |
      package service

      import "internal/repo"

      type UserService struct {
          repo *repo.UserRepo
      }

      func NewUserService(r *repo.UserRepo) *UserService {
          return &UserService{repo: r}
      }

      func (s *UserService) Register(userID string) error {
          return s.repo.Create(userID)
      }
