          def overlay(self, other: "ImageProcessor", offset_x: int, offset_y: int, alpha: float) -> None:
              ow, oh = other.dimensions()
              for dy in range(oh):
                  for dx in range(ow):
                      tx, ty = offset_x + dx, offset_y + dy
                      if 0 <= tx < self._width and 0 <= ty < self._height:
                          fg = other.get_pixel(dx, dy)
                          bg = self.get_pixel(tx, ty)
                          blended = (
                              int(bg[0] * (1 - alpha) + fg[0] * alpha),
                              int(bg[1] * (1 - alpha) + fg[1] * alpha),
                              int(bg[2] * (1 - alpha) + fg[2] * alpha),
                          )
                          self.set_pixel(tx, ty, blended)

          def dimensions(self) -> tuple[int, int]:
              return self._width, self._height
    pipeline/steps.py: |
      from imaging.processor import ImageProcessor

      class ResizeStep:
          def __init__(self, target_width: int, target_height: int):
              self._tw = target_width
              self._th = target_height

          def apply(self, img: ImageProcessor) -> ImageProcessor:
              resized = ImageProcessor(self._tw, self._th)
              sw, sh = img.dimensions()
              for y in range(self._th):
                  for x in range(self._tw):
                      src_x = int(x * sw / self._tw)
                      src_y = int(y * sh / self._th)
                      resized.set_pixel(x, y, img.get_pixel(src_x, src_y))
              return resized

      class WatermarkStep:
          def __init__(self, watermark: ImageProcessor, alpha: float = 0.3):
              self._watermark = watermark
              self._alpha = alpha

          def apply(self, img: ImageProcessor) -> ImageProcessor:
              iw, ih = img.dimensions()
              ww, wh = self._watermark.dimensions()
              offset_x = iw - ww - 10
              offset_y = ih - wh - 10
              img.overlay(self._watermark, offset_x, offset_y, self._alpha)
              return img
