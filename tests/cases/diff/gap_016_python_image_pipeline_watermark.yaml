      from imaging.processor import ImageProcessor

      class ResizeStep:
          def __init__(self, target_width: int, target_height: int):
              self._tw = target_width
              self._th = target_height

          def apply(self, img: ImageProcessor) -> ImageProcessor:
              resized = ImageProcessor(self._tw, self._th)
              sw, sh = img.dimensions()
              for y in range(self._th):
                  for x in range(self._tw):
                      src_x = int(x * sw / self._tw)
                      src_y = int(y * sh / self._th)
                      resized.set_pixel(x, y, img.get_pixel(src_x, src_y))
              return resized
    pipeline/output.py: |
      from imaging.processor import ImageProcessor

      class PngEncoder:
          def encode(self, img: ImageProcessor) -> bytes:
              w, h = img.dimensions()
              header = f"PNG:{w}x{h}".encode()
              return header

          def save(self, img: ImageProcessor, path: str) -> None:
              data = self.encode(img)
              with open(path, "wb") as f:
                  f.write(data)
    imaging/histogram.py: |
      class Histogram:
          def __init__(self):
              self._bins: dict[int, int] = {}

          def add(self, value: int) -> None:
              self._bins[value] = self._bins.get(value, 0) + 1

          def mode(self) -> int:
              if not self._bins:
                  return 0
              return max(self._bins, key=self._bins.get)

          def total(self) -> int:
              return sum(self._bins.values())
