      class ImageProcessor:
          def __init__(self, width: int, height: int):
              self._width = width
              self._height = height
              self._pixels: list[list[tuple[int, int, int]]] = [
                  [(0, 0, 0)] * width for _ in range(height)
              ]

          def set_pixel(self, x: int, y: int, color: tuple[int, int, int]) -> None:
              if 0 <= x < self._width and 0 <= y < self._height:
                  self._pixels[y][x] = color

          def get_pixel(self, x: int, y: int) -> tuple[int, int, int]:
              return self._pixels[y][x]

          def crop(self, x: int, y: int, w: int, h: int) -> "ImageProcessor":
              cropped = ImageProcessor(w, h)
              for dy in range(h):
                  for dx in range(w):
                      cropped.set_pixel(dx, dy, self.get_pixel(x + dx, y + dy))
              return cropped

          def dimensions(self) -> tuple[int, int]:
              return self._width, self._height
    imaging/blending.py: |
      def alpha_blend(
          bg: tuple[int, int, int],
          fg: tuple[int, int, int],
          alpha: float,
      ) -> tuple[int, int, int]:
          r = int(bg[0] * (1 - alpha) + fg[0] * alpha)
          g = int(bg[1] * (1 - alpha) + fg[1] * alpha)
          b = int(bg[2] * (1 - alpha) + fg[2] * alpha)
          return (min(255, r), min(255, g), min(255, b))

      def multiply(
          a: tuple[int, int, int],
          b: tuple[int, int, int],
      ) -> tuple[int, int, int]:
          return (
              (a[0] * b[0]) // 255,
              (a[1] * b[1]) // 255,
              (a[2] * b[2]) // 255,
          )
