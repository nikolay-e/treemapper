      package com.messaging.format

      enum class MessageFormat {
          JSON,
          PROTOBUF,
          AVRO;

          fun contentType(): String = when (this) {
              JSON -> "application/json"
              PROTOBUF -> "application/x-protobuf"
              AVRO -> "application/avro"
          }
      }
