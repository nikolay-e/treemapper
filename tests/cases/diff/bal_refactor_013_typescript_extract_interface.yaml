          fun close()
      }
    consumer/src/main/kotlin/com/messaging/consumer/MessageConsumer.kt: |
      package com.messaging.consumer

      import com.messaging.envelope.Envelope
      import com.messaging.format.MessageFormat

      class MessageConsumer(private val supportedFormats: Set<MessageFormat>) {
          fun accept(envelope: Envelope): Boolean {
              return envelope.format in supportedFormats
          }

          fun process(envelope: Envelope): ByteArray {
              if (!accept(envelope)) {
                  error("unsupported format: ${envelope.format}")
              }
              return envelope.payload
          }
      }
