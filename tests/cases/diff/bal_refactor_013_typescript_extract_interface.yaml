  changed_files:
    common/src/main/kotlin/com/messaging/format/MessageFormat.kt: |
      package com.messaging.format

      enum class MessageFormat {
          JSON,
          PROTOBUF,
          AVRO;

          fun contentType(): String = when (this) {
              JSON -> "application/json"
              PROTOBUF -> "application/x-protobuf"
              AVRO -> "application/avro"
          }

          fun isStructured(): Boolean = this == JSON || this == AVRO
      }
    common/src/main/kotlin/com/messaging/envelope/Envelope.kt: |
      package com.messaging.envelope

      import com.messaging.format.MessageFormat

      data class Envelope(
          val id: String,
          val topic: String,
          val payload: ByteArray,
          val format: MessageFormat,
          val timestamp: Long = System.currentTimeMillis(),
          val headers: Map<String, String> = emptyMap(),
      ) {
          fun isStructured(): Boolean = format.isStructured()
      }
