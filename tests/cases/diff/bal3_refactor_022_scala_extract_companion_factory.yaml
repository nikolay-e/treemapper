    src/main/scala/models/Connection.scala: |
      package models

      case class Connection(
        host: String,
        port: Int,
        ssl: Boolean,
        timeout: Int
      )

      object Connection {
        def local(host: String, port: Int, timeout: Int): Connection =
          Connection(host, port, ssl = false, timeout)

        def production(host: String, port: Int, timeout: Int): Connection =
          Connection(host, port, ssl = true, timeout)
      }
    src/main/scala/services/DatabaseService.scala: |
      package services

      import models.Connection

      class DatabaseService {
        def connect(): Connection =
          Connection.local("localhost", 5432, timeout = 30)

        def connectProd(): Connection =
          Connection.production("db.prod.internal", 5432, timeout = 10)
      }
    src/main/scala/services/CacheService.scala: |
      package services

      import models.Connection

      class CacheService {
        def connect(): Connection =
          Connection.local("redis.local", 6379, timeout = 5)

        def connectProd(): Connection =
