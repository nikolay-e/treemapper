name: php_010_union_type
tags:
- lang:php
- change:single_file
- change:signature
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/DTO/Data.php: |
      <?php
      namespace App\DTO;

      class Data {
          public mixed $value;
          private string $type;

          public function __construct(mixed $value) {
              $this->value = $value;
              $this->type = gettype($value);
          }

          public function getType(): string {
              return $this->type;
          }

          public function isNumeric(): bool {
              return is_int($this->value) || is_float($this->value);
          }

          public function toString(): string {
              return (string)$this->value;
          }
      }
    src/Services/Parser.php: |
      <?php
      namespace App\Services;

      class Parser {
          public function decode(string $input): array {
              return json_decode($input, true) ?? [];
          }
      }
    src/DTO/Config.php: |
      <?php
      namespace App\DTO;

      class Config {
          public string $key;
          public mixed $value;
          public string $environment;

          public function __construct(string $key, mixed $value, string $environment = 'production') {
              $this->key = $key;
              $this->value = $value;
              $this->environment = $environment;
          }

          public function isProduction(): bool {
              return $this->environment === 'production';
          }
      }
    src/Services/Formatter.php: |
      <?php
      namespace App\Services;

      class Formatter {
          public function normalize(string $text): string {
              return trim(strtolower($text));
          }

          public function truncate(string $text, int $maxLength = 100): string {
              if (strlen($text) <= $maxLength) {
                  return $text;
              }
              return substr($text, 0, $maxLength) . '...';
          }

          public function slugify(string $text): string {
              return strtolower(preg_replace('/[^a-zA-Z0-9]+/', '-', $text));
          }
      }
  changed_files:
