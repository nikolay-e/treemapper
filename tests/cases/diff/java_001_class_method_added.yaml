              Calculator calc = new Calculator();
              BigDecimal result = calc.add(BigDecimal.valueOf(1.5), BigDecimal.valueOf(2.5));
              System.out.println("Result: " + result);
          }
      }
    src/main/java/com/mathengine/core/ScientificCalculator.java: |
      package com.mathengine.core;

      import java.math.BigDecimal;
      import java.math.MathContext;
      import java.math.RoundingMode;

      public class ScientificCalculator extends Calculator {
          private final MathContext context;

          public ScientificCalculator(int scale, MathContext context) {
              super(scale);
              this.context = context;
          }

          @Override
          public BigDecimal add(BigDecimal a, BigDecimal b) {
              return a.add(b, context).setScale(getScale(), RoundingMode.HALF_UP);
          }

          public BigDecimal power(BigDecimal base, int exponent) {
              return base.pow(exponent, context).setScale(getScale(), RoundingMode.HALF_UP);
          }

          public BigDecimal sqrt(BigDecimal value) {
              return value.sqrt(context).setScale(getScale(), RoundingMode.HALF_UP);
          }
      }
    src/main/java/com/mathengine/service/StatisticsService.java: |
      package com.mathengine.service;

      import com.mathengine.core.Calculator;
      import org.springframework.stereotype.Service;
      import java.math.BigDecimal;
      import java.util.List;

      @Service
      public class StatisticsService {
          private final Calculator calculator;

          public StatisticsService(Calculator calculator) {
              this.calculator = calculator;
          }

          public BigDecimal computeSum(List<BigDecimal> values) {
              BigDecimal sum = BigDecimal.ZERO;
              for (BigDecimal v : values) {
                  sum = calculator.add(sum, v);
              }
              return sum;
          }

          public BigDecimal computeAverage(List<BigDecimal> values) {
              if (values.isEmpty()) {
                  throw new ArithmeticException("Cannot compute average of empty list");
              }
              BigDecimal sum = computeSum(values);
              return calculator.divide(sum, BigDecimal.valueOf(values.size()));
          }

          public BigDecimal computeVariance(List<BigDecimal> values) {
              BigDecimal avg = computeAverage(values);
              BigDecimal sumSquaredDiff = BigDecimal.ZERO;
              for (BigDecimal v : values) {
                  BigDecimal diff = calculator.subtract(v, avg);
                  sumSquaredDiff = calculator.add(sumSquaredDiff, calculator.multiply(diff, diff));
              }
              return calculator.divide(sumSquaredDiff, BigDecimal.valueOf(values.size()));
          }
      }
    src/test/java/com/mathengine/core/CalculatorTest.java: |
      package com.mathengine.core;

      import org.junit.jupiter.api.Test;
      import java.math.BigDecimal;
      import java.math.MathContext;
      import static org.junit.jupiter.api.Assertions.*;

      class CalculatorTest {
          private final Calculator calculator = new Calculator();

          @Test
          void testAddTwoPositiveNumbers() {
              BigDecimal result = calculator.add(BigDecimal.valueOf(1.5), BigDecimal.valueOf(2.5));
              assertEquals(new BigDecimal("4.0000000000"), result);
          }

          @Test
          void testAddWithNullThrows() {
              assertThrows(IllegalArgumentException.class,
                  () -> calculator.add(null, BigDecimal.ONE));
          }

          @Test
          void testDivideByZeroThrows() {
              assertThrows(ArithmeticException.class,
                  () -> calculator.divide(BigDecimal.ONE, BigDecimal.ZERO));
          }

          @Test
          void testMultiply() {
              BigDecimal result = calculator.multiply(BigDecimal.valueOf(3), BigDecimal.valueOf(4));
              assertEquals(new BigDecimal("12.0000000000"), result);
          }
      }
