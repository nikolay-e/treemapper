      }

      class InputValidator {
          func validateEmail(_ email: String) -> ValidationResult {
              if email.isEmpty {
                  ValidationResult(isValid: false, message: "Email is empty")
              }
              let hasAt = email.contains("@")
              return ValidationResult(isValid: hasAt, message: hasAt ? "OK" : "Invalid email")
          }

          func validateAge(_ age: Int) -> Bool {
              return age >= 0 && age <= 150
          }
      }
