    src/main/java/com/app/http/Request.java: |
      package com.app.http;

      import java.util.HashMap;
      import java.util.Map;

      public class Request {
          private final String path;
          private final Map<String, String> headers;
          public Request(String path) {
              this.path = path;
              this.headers = new HashMap<>();
          }
          public String getPath() { return path; }
          public Map<String, String> getHeaders() { return headers; }
      }
    src/main/java/com/app/http/RequestParser.java: |
      package com.app.http;

      import com.app.http.Request;

      public class RequestParser {
          public Request parse(String raw) {
              return new Request(raw.split(" ")[1]);
          }
      }
    src/main/java/com/app/middleware/RateLimiter.java: |
      package com.app.middleware;

      import com.app.http.RequestParser;
      import com.app.http.Request;

      public class RateLimiter {
          private final RequestParser parser;
          private int count = 0;
          public RateLimiter(RequestParser parser) {
              this.parser = parser;
          }
          public boolean allow(String rawRequest) {
              Request req = parser.parse(rawRequest);
              count++;
              return count < 100;
          }
      }
    src/main/java/com/app/gateway/ApiGateway.java: |
      package com.app.gateway;

      import com.app.middleware.RateLimiter;

      public class ApiGateway {
          private final RateLimiter limiter;
          public ApiGateway(RateLimiter limiter) {
              this.limiter = limiter;
          }
          public String handle(String rawRequest) {
              if (!limiter.allow(rawRequest)) {
                  return "429 Too Many Requests";
              }
              return "200 OK";
          }
      }
