  changed_files:
    src/Data/DbContext.cs: |
      using System;
      using System.Collections.Generic;
      using System.Linq;

      namespace App.Data
      {
          public class DbContext
          {
              private readonly Dictionary<string, object> _store = new();
              public T Find<T>(string id) where T : class
              {
                  return _store.ContainsKey(id) ? (T)_store[id] : null;
              }
              public void Add<T>(string id, T entity) where T : class
              {
                  _store[id] = entity;
              }
              public IEnumerable<T> FindAll<T>() where T : class
              {
                  return _store.Values.OfType<T>();
              }
          }
      }
    src/Repositories/CustomerRepository.cs: |
      using System;
      using System.Collections.Generic;
      using App.Data;

      namespace App.Repositories
      {
          public class CustomerRepository
          {
              private readonly DbContext _context;
              public CustomerRepository(DbContext context)
              {
                  _context = context;
              }
              public Customer FindById(string id)
              {
                  return _context.Find<Customer>(id);
              }
              public IEnumerable<Customer> GetAll()
              {
                  return _context.FindAll<Customer>();
              }
          }
      }
    src/Services/CustomerService.cs: |
      using System;
      using System.Collections.Generic;
