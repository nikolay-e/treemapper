  changed_files:
    src/queue/message.rs: |
      use uuid::Uuid;

      #[derive(Debug, Clone)]
      pub struct Message {
          pub id: String,
          pub topic: String,
          pub payload: Vec<u8>,
          pub priority: u8,
      }

      impl Message {
          pub fn new(id: &str, topic: &str, payload: Vec<u8>) -> Self {
              Self {
                  id: id.to_string(),
                  topic: topic.to_string(),
                  payload,
                  priority: 0,
              }
          }
      }

      pub trait MessageBroker: Send + Sync {
          fn publish(&self, topic: &str, payload: Vec<u8>) -> Message;
          fn subscribe(&self, topic: &str) -> Vec<Message>;
      }

      pub struct LocalBroker;

      impl MessageBroker for LocalBroker {
          fn publish(&self, topic: &str, payload: Vec<u8>) -> Message {
              let id = Uuid::new_v4().to_string();
              Message::new(&id, topic, payload)
          }

          fn subscribe(&self, _topic: &str) -> Vec<Message> {
              Vec::new()
          }
      }
    src/worker/consumer.rs: |
      use crate::queue::message::{Message, MessageBroker};

      pub struct Consumer<B: MessageBroker> {
          pub topic: String,
          broker: B,
      }

      impl<B: MessageBroker> Consumer<B> {
          pub fn new(topic: &str, broker: B) -> Self {
              Self { topic: topic.to_string(), broker }
          }

          pub fn send_ack(&self, msg: &Message) -> Message {
              self.broker.publish(&format!("{}.ack", self.topic), msg.id.as_bytes().to_vec())
          }
      }
    src/api/ingest.rs: |
      use crate::worker::consumer::Consumer;
      use crate::queue::message::{MessageBroker, LocalBroker};

      pub struct IngestEndpoint<B: MessageBroker> {
          consumer: Consumer<B>,
      }

      impl IngestEndpoint<LocalBroker> {
          pub fn new(topic: &str) -> Self {
              Self { consumer: Consumer::new(topic, LocalBroker) }
          }
      }

      impl<B: MessageBroker> IngestEndpoint<B> {
          pub fn handle(&self, raw: Vec<u8>) -> String {
              let msg = self.consumer.broker.publish(&self.consumer.topic, raw);
              let ack = self.consumer.send_ack(&msg);
              format!("acked: {}", ack.id)
          }
      }
    garbage/metrics.rs: |
      // GARBAGE_CLICFG_A = "prometheus_scrape_marker"
    garbage/tracing.rs: |
      // GARBAGE_CLICFG_B = "opentelemetry_trace_marker"
    garbage/config.rs: |
      // GARBAGE_CLICFG_C = "env_config_loader_marker"
