repo:
  initial_files:
    src/queue/message.rs: |
      #[derive(Debug, Clone)]
      pub struct Message {
          pub id: String,
          pub topic: String,
          pub payload: Vec<u8>,
      }

      impl Message {
          pub fn new(id: &str, topic: &str, payload: Vec<u8>) -> Self {
              Self {
                  id: id.to_string(),
                  topic: topic.to_string(),
                  payload,
              }
          }
      }

      pub fn publish(topic: &str, payload: Vec<u8>) -> Message {
          let id = format!("msg-{}", topic);
          Message::new(&id, topic, payload)
      }
    src/worker/consumer.rs: |
      use crate::queue::message::{Message, publish};

      pub struct Consumer {
          pub topic: String,
      }

      impl Consumer {
          pub fn new(topic: &str) -> Self {
              Self { topic: topic.to_string() }
          }

          pub fn send_ack(&self, msg: &Message) -> Message {
              publish(&format!("{}.ack", self.topic), msg.id.as_bytes().to_vec())
          }
      }
    src/api/ingest.rs: |
      use crate::worker::consumer::Consumer;
      use crate::queue::message::publish;

      pub struct IngestEndpoint {
          consumer: Consumer,
      }

      impl IngestEndpoint {
          pub fn new(topic: &str) -> Self {
              Self { consumer: Consumer::new(topic) }
          }

          pub fn handle(&self, raw: Vec<u8>) -> String {
              let msg = publish(&self.consumer.topic, raw);
              let ack = self.consumer.send_ack(&msg);
              format!("acked: {}", ack.id)
          }
      }
