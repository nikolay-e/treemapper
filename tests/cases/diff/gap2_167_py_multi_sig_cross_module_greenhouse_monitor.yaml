  changed_files:
    greenhouse/controller.py: |
      from greenhouse.sensor import SensorHub, AlertThreshold

      class ClimateController:
          def __init__(self, hub: SensorHub, thresholds: list):
              self.hub = hub
              self.thresholds = thresholds

          def should_water(self) -> bool:
              moisture = self.hub.read("moisture")
              return moisture < 30.0

          def check_alerts(self) -> list:
              alerts = []
              for t in self.thresholds:
                  value = self.hub.read(t.sensor)
                  if value > t.max_value or value < t.min_value:
                      alerts.append(f"{t.sensor}: {value}")
              return alerts
    greenhouse/sensor.py: |
      from dataclasses import dataclass

      @dataclass
      class AlertThreshold:
          sensor: str
          min_value: float
          max_value: float

      class SensorHub:
          def __init__(self):
              self._readings = {}
              self._history = {}

          def update(self, sensor: str, value: float) -> None:
              self._readings[sensor] = value
              self._history.setdefault(sensor, []).append(value)

          def read(self, sensor: str) -> float:
              return self._readings.get(sensor, 0.0)

          def average(self, sensor: str, window: int = 10) -> float:
              vals = self._history.get(sensor, [])[-window:]
              return sum(vals) / len(vals) if vals else 0.0
