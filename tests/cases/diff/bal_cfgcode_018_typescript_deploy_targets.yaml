name: bal_cfgcode_018_typescript_deploy_targets
tags:
- lang:typescript
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    config/deploy.json: |
      {
        "environment": "development",
        "region": "us-east-1",
        "replicas": 1,
        "resources": {
          "cpu": "250m",
          "memory": "256Mi"
        },
        "healthCheck": "/health"
      }
    src/deploy.ts: |
      import deployConfig from '../config/deploy.json';

      export const ENV = deployConfig.environment;
      export const REGION = deployConfig.region;
      export const REPLICAS = deployConfig.replicas;

      export function getResourceLimits() {
        return deployConfig.resources;
      }

      export function healthEndpoint(): string {
        return deployConfig.healthCheck;
      }
    src/scaling.ts: |
      import { readFileSync } from 'fs';

      const cfg = JSON.parse(readFileSync('config/deploy.json', 'utf-8'));

      export function shouldScale(currentLoad: number): boolean {
        return currentLoad > cfg.replicas * 100;
      }

      export function targetReplicas(load: number): number {
        return Math.ceil(load / 100);
      }
    src/monitoring.ts: |
      import { readFileSync } from 'fs';

      const deployCfg = JSON.parse(readFileSync('config/deploy.json', 'utf-8'));

      export function getHealthPath(): string {
        return deployCfg.healthCheck;
      }
    src/migrations.ts: |
      const GARBAGE_CFGCODE_018_MIG_A = "v2";
      const GARBAGE_CFGCODE_018_MIG_B = "pending";

      export function runMigrations(): void {
        return;
      }
    src/seed.ts: |
      const GARBAGE_CFGCODE_018_SEED_C = "test-data";
      const GARBAGE_CFGCODE_018_SEED_D = 100;

      export function seedDatabase(): void {
        return;
      }
    garbage_ci.ts: |
      const GARBAGE_CFGCODE_018_CI_E = "github-actions";
      const GARBAGE_CFGCODE_018_CI_F = "main";

      export function triggerBuild(): void {
        return;
      }
  changed_files:
    config/deploy.json: |
      {
        "environment": "production",
        "region": "eu-west-1",
        "replicas": 5,
        "resources": {
          "cpu": "1000m",
          "memory": "1Gi"
        },
        "healthCheck": "/health",
        "autoscaling": {
          "minReplicas": 3,
          "maxReplicas": 20,
          "targetCpuPercent": 70
        },
        "rollout": {
          "strategy": "canary",
          "canaryPercent": 10
        }
      }
    src/deploy.ts: |
      import deployConfig from '../config/deploy.json';

      export const ENV = deployConfig.environment;
      export const REGION = deployConfig.region;
      export const REPLICAS = deployConfig.replicas;

      export function getResourceLimits() {
        return deployConfig.resources;
      }

      export function healthEndpoint(): string {
        return deployConfig.healthCheck;
      }
    src/scaling.ts: |
      import { readFileSync } from 'fs';

      const cfg = JSON.parse(readFileSync('config/deploy.json', 'utf-8'));

      export function shouldScale(currentLoad: number): boolean {
        return currentLoad > cfg.replicas * 100;
      }

      export function targetReplicas(load: number): number {
        return Math.ceil(load / 100);
      }
    src/monitoring.ts: |
      import { readFileSync } from 'fs';

      const deployCfg = JSON.parse(readFileSync('config/deploy.json', 'utf-8'));

      export function getHealthPath(): string {
        return deployCfg.healthCheck;
      }
    src/migrations.ts: |
      const GARBAGE_CFGCODE_018_MIG_A = "v2";
      const GARBAGE_CFGCODE_018_MIG_B = "pending";

      export function runMigrations(): void {
        return;
      }
    src/seed.ts: |
      const GARBAGE_CFGCODE_018_SEED_C = "test-data";
      const GARBAGE_CFGCODE_018_SEED_D = 100;

      export function seedDatabase(): void {
        return;
      }
    garbage_ci.ts: |
      const GARBAGE_CFGCODE_018_CI_E = "github-actions";
      const GARBAGE_CFGCODE_018_CI_F = "main";

      export function triggerBuild(): void {
        return;
      }
  commit_message: "config: production deploy with autoscaling and canary"
