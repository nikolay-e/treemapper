  changed_files:
    Sources/Music/PlaylistManager.swift: |
      import Foundation

      class PlaylistManager {
          private let library: TrackLibrary

          init(library: TrackLibrary) {
              self.library = library
          }

          func createPlaylist(name: String, trackIds: [String]) -> Playlist {
              let tracks = trackIds.compactMap { library.findTrack(id: $0) }
              return Playlist(name: name, tracks: tracks)
          }

          func shufflePlaylist(name: String, maxDurationSec: Int) -> Playlist {
              let all = library.allTracks().shuffled()
              var selected: [Track] = []
              var total = 0
              for track in all {
                  if total + track.durationSec > maxDurationSec { break }
                  selected.append(track)
                  total += track.durationSec
              }
              return Playlist(name: name, tracks: selected)
          }
      }
