  changed_files:
    src/main/scala/workflow/WorkflowEngine.scala: |
      package workflow

      import workflow.step.WorkflowStep
      import workflow.model.{WorkflowContext, WorkflowResult}

      class WorkflowEngine {
        def execute(steps: List[WorkflowStep], input: Map[String, Any]): WorkflowResult = {
          val ctx = WorkflowContext(input, Map.empty, List.empty)
          val finalCtx = steps.foldLeft(ctx) { (acc, step) =>
            if (acc.hasErrors) acc else step.run(acc)
          }
          WorkflowResult(success = !finalCtx.hasErrors, context = finalCtx)
        }
      }
    src/main/scala/workflow/step/WorkflowStep.scala: |
      package workflow.step

