    src/main/scala/workflow/model/WorkflowContext.scala: |
      package workflow.model

      case class WorkflowContext(
        input: Map[String, Any],
        output: Map[String, Any],
        errors: List[String]
      ) {
        def withOutput(key: String, value: Any): WorkflowContext =
          copy(output = output + (key -> value))

        def withError(msg: String): WorkflowContext =
          copy(errors = errors :+ msg)

        def hasErrors: Boolean = errors.nonEmpty
      }

      case class WorkflowResult(success: Boolean, context: WorkflowContext)
