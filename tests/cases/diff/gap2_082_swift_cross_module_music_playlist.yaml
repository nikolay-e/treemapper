    Sources/Music/TrackLibrary.swift: |
      import Foundation

      class TrackLibrary {
          private let metadata: MetadataStore

          init(metadata: MetadataStore) {
              self.metadata = metadata
          }

          func findTrack(id: String) -> Track? {
              guard let meta = metadata.lookup(trackId: id) else { return nil }
              return Track(id: id, title: meta.title, artist: meta.artist, durationSec: meta.durationSec)
          }

          func allTracks() -> [Track] {
              metadata.allEntries().map { Track(id: $0.id, title: $0.title, artist: $0.artist, durationSec: $0.durationSec) }
          }
      }
    Sources/Music/MetadataStore.swift: |
      import Foundation

      struct TrackMetadata {
          let id: String
          let title: String
          let artist: String
          let durationSec: Int
      }

      class MetadataStore {
          private var entries: [String: TrackMetadata] = [:]

          func lookup(trackId: String) -> TrackMetadata? {
              entries[trackId]
          }

          func allEntries() -> [TrackMetadata] {
              Array(entries.values)
          }

          func store(_ meta: TrackMetadata) {
              entries[meta.id] = meta
          }
      }
