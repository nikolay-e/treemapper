repo:
  initial_files:
    src/main/scala/workflow/WorkflowEngine.scala: |
      package workflow

      import workflow.step.WorkflowStep
      import workflow.model.WorkflowContext

      class WorkflowEngine {
        def execute(steps: List[WorkflowStep], input: Map[String, Any]): WorkflowContext = {
          val ctx = WorkflowContext(input, Map.empty, List.empty)
          steps.foldLeft(ctx) { (acc, step) => step.run(acc) }
        }
      }
    src/main/scala/workflow/step/WorkflowStep.scala: |
      package workflow.step

      import workflow.model.WorkflowContext

      trait WorkflowStep {
        def run(ctx: WorkflowContext): WorkflowContext
      }
    src/main/scala/workflow/model/WorkflowContext.scala: |
      package workflow.model

      case class WorkflowContext(
        input: Map[String, Any],
        output: Map[String, Any],
        errors: List[String]
      ) {
        def withOutput(key: String, value: Any): WorkflowContext =
          copy(output = output + (key -> value))

        def withError(msg: String): WorkflowContext =
          copy(errors = errors :+ msg)

        def hasErrors: Boolean = errors.nonEmpty
      }
    src/main/scala/approval/ApprovalStep.scala: |
      package approval

      import workflow.step.WorkflowStep
      import workflow.model.WorkflowContext

      class ApprovalStep(approverId: String) extends WorkflowStep {
        def run(ctx: WorkflowContext): WorkflowContext = {
          val amount = ctx.input.get("amount").map(_.toString.toDouble).getOrElse(0.0)
          if (amount > 10000.0) {
            ctx.withOutput("requires_approval", true).withOutput("approver_id", approverId)
          } else {
            ctx.withOutput("requires_approval", false)
          }
        }
      }
