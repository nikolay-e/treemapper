repo:
  initial_files:
    src/evaluator.rs: |
      #[derive(Debug, PartialEq)]
      pub enum Token {
          Number(f64),
          Plus,
          Minus,
          Multiply,
          Divide,
      }

      pub fn tokenize(input: &str) -> Vec<Token> {
          let mut tokens = Vec::new();
          for part in input.split_whitespace() {
              match part {
                  "+" => tokens.push(Token::Plus),
                  "-" => tokens.push(Token::Minus),
                  "*" => tokens.push(Token::Multiply),
                  "/" => tokens.push(Token::Divide),
                  num => {
                      if let Ok(n) = num.parse::<f64>() {
                          tokens.push(Token::Number(n));
                      }
                  }
              }
          }
          tokens
      }

      pub fn evaluate(tokens: &[Token]) -> Result<f64, String> {
          if tokens.len() != 3 {
              return Err("expected 3 tokens".to_string());
          }
          let left = match &tokens[0] {
              Token::Number(n) => *n,
              _ => return Err("expected number".to_string()),
          };
          let right = match &tokens[2] {
              Token::Number(n) => *n,
              _ => return Err("expected number".to_string()),
          };
          match &tokens[1] {
              Token::Plus => Ok(left + right),
              Token::Minus => Ok(left - right),
              Token::Multiply => Ok(left * right),
              Token::Divide => {
                  if right == 0.0 {
                      Err("division by zero".to_string())
                  } else {
                      Ok(left / right)
                  }
              }
              _ => Err("expected operator".to_string()),
          }
      }
    tests/evaluator_test.rs: |
      use mylib::evaluator::{tokenize, evaluate, Token};

      #[test]
      fn test_tokenize_simple() {
          let tokens = tokenize("3 + 4");
          assert_eq!(tokens.len(), 3);
          assert_eq!(tokens[0], Token::Number(3.0));
          assert_eq!(tokens[1], Token::Plus);
      }

      #[test]
      fn test_evaluate_add() {
          let tokens = tokenize("3 + 4");
          assert_eq!(evaluate(&tokens), Ok(7.0));
      }

      #[test]
      fn test_evaluate_subtract() {
          let tokens = tokenize("10 - 3");
          assert_eq!(evaluate(&tokens), Ok(7.0));
      }

      #[test]
      fn test_evaluate_multiply() {
          let tokens = tokenize("3 * 5");
          assert_eq!(evaluate(&tokens), Ok(15.0));
      }

      #[test]
      fn test_evaluate_divide() {
          let tokens = tokenize("10 / 4");
          assert_eq!(evaluate(&tokens), Ok(2.5));
      }

      #[test]
      fn test_evaluate_divide_by_zero() {
          let tokens = tokenize("5 / 0");
          assert!(evaluate(&tokens).is_err());
      }
