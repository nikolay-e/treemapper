  changed_files:
    src/evaluator.rs: |
      use std::collections::HashMap;

      #[derive(Debug, PartialEq)]
      pub enum Token {
          Number(f64),
          Operator(String),
          LeftParen,
          RightParen,
      }

      type BinaryOp = fn(f64, f64) -> Result<f64, String>;

      pub struct Evaluator {
          operators: HashMap<String, (u8, BinaryOp)>,
      }

      impl Evaluator {
          pub fn new() -> Self {
              let mut operators: HashMap<String, (u8, BinaryOp)> = HashMap::new();
              operators.insert("+".into(), (1, |a, b| Ok(a + b)));
              operators.insert("-".into(), (1, |a, b| Ok(a - b)));
              operators.insert("*".into(), (2, |a, b| Ok(a * b)));
              operators.insert("/".into(), (2, |a, b| {
                  if b == 0.0 { Err("division by zero".into()) } else { Ok(a / b) }
              }));
              operators.insert("%".into(), (2, |a, b| {
                  if b == 0.0 { Err("modulo by zero".into()) } else { Ok(a % b) }
              }));
              operators.insert("^".into(), (3, |a, b| Ok(a.powf(b))));
              Evaluator { operators }
          }

          pub fn register_operator(&mut self, symbol: &str, precedence: u8, func: BinaryOp) {
              self.operators.insert(symbol.to_string(), (precedence, func));
          }

          pub fn tokenize(&self, input: &str) -> Vec<Token> {
              let mut tokens = Vec::new();
              for part in input.split_whitespace() {
                  match part {
                      "(" => tokens.push(Token::LeftParen),
                      ")" => tokens.push(Token::RightParen),
                      s if self.operators.contains_key(s) => {
                          tokens.push(Token::Operator(s.to_string()));
                      }
                      num => {
                          if let Ok(n) = num.parse::<f64>() {
                              tokens.push(Token::Number(n));
                          }
                      }
                  }
              }
              tokens
          }

          pub fn evaluate(&self, input: &str) -> Result<f64, String> {
              let tokens = self.tokenize(input);
              self.eval_tokens(&tokens)
          }

          fn eval_tokens(&self, tokens: &[Token]) -> Result<f64, String> {
              if tokens.len() != 3 {
                  return Err("expected simple expression".into());
              }
              let left = match &tokens[0] {
                  Token::Number(n) => *n,
                  _ => return Err("expected number".into()),
              };
              let right = match &tokens[2] {
                  Token::Number(n) => *n,
                  _ => return Err("expected number".into()),
              };
              let op = match &tokens[1] {
                  Token::Operator(s) => s,
                  _ => return Err("expected operator".into()),
              };
              let (_, func) = self.operators.get(op).ok_or("unknown operator")?;
              func(left, right)
          }

          pub fn supported_operators(&self) -> Vec<&str> {
              self.operators.keys().map(|s| s.as_str()).collect()
          }
      }
  commit_message: "refactor: operator registry with precedence, add modulo and power"
