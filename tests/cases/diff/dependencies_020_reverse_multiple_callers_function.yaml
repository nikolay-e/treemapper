name: dependencies_020_reverse_multiple_callers_function
tags:
- lang:python
- change:single_file
- change:new_function
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    core/calculator.py: |
      def calculate(x: float) -> float:
          return x * 2
    services/billing.py: |
      from core.calculator import calculate

      def compute_bill(amount: float) -> float:
          base = calculate(amount)
          return base + 10
    services/pricing.py: |
      from core.calculator import calculate

      def get_price(value: float) -> float:
          return calculate(value) * 1.1
    api/endpoints.py: |
      from core.calculator import calculate

      def handle_request(data: dict) -> dict:
          result = calculate(data["value"])
          return {"result": result}
    utils/helpers.py: |
      def format_output(value: float) -> str:
          return f"Result: {value:.2f}"
    math/geometry.py: |
      import math

      def calculate_area(width: float, height: float) -> float:
          return width * height

      def calculate_perimeter(width: float, height: float) -> float:
          return 2 * (width + height)

      def calculate_diagonal(width: float, height: float) -> float:
          return math.sqrt(width ** 2 + height ** 2)
    core/transformer.py: |
      from typing import List

      def transform(x: float) -> float:
          return x * 2

      def batch_transform(values: List[float]) -> List[float]:
          return [transform(v) for v in values]

      def inverse_transform(x: float) -> float:
          return x / 2
  changed_files:
    core/calculator.py: |
      def calculate(x: float, precision: int = 2) -> float:
          result = x * 2
          return round(result, precision)
    services/billing.py: |
      from core.calculator import calculate

      def compute_bill(amount: float) -> float:
          base = calculate(amount)
          return base + 10
    services/pricing.py: |
      from core.calculator import calculate

      def get_price(value: float) -> float:
          return calculate(value) * 1.1
    api/endpoints.py: |
      from core.calculator import calculate

      def handle_request(data: dict) -> dict:
          result = calculate(data["value"])
          return {"result": result}
    utils/helpers.py: |
      def format_output(value: float) -> str:
          return f"Result: {value:.2f}"
    math/geometry.py: |
      import math

      def calculate_area(width: float, height: float) -> float:
          return width * height

      def calculate_perimeter(width: float, height: float) -> float:
          return 2 * (width + height)

      def calculate_diagonal(width: float, height: float) -> float:
          return math.sqrt(width ** 2 + height ** 2)
    core/transformer.py: |
      from typing import List

      def transform(x: float) -> float:
          return x * 2

      def batch_transform(values: List[float]) -> List[float]:
          return [transform(v) for v in values]

      def inverse_transform(x: float) -> float:
          return x / 2
  commit_message: Update files
