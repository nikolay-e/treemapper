  selector:
    path: Dockerfile
    anchor: FROM python:3.12-slim-bookworm AS base
- id: dockerfile_1
  selector:
    path: Dockerfile
    anchor: COPY src/ ./src/
- id: dockerfile_2
  selector:
    path: Dockerfile
    anchor: COPY config/ ./config/
- id: dockerfile_3
  selector:
    path: Dockerfile
    anchor: CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:5000", "src.app:app"]
- id: requirements
  selector:
    path: requirements.txt
    anchor: flask==2.3.0
- id: no_seed_data
  selector:
    path: scripts/seed_data.sh
- id: no_test_models
  selector:
    path: tests/test_models.py
- id: no_api
  selector:
    path: docs/api.md
- id: no_global_0
  selector:
    anchor: manage.py seed
- id: no_global_1
  selector:
    anchor: --count 100
- id: no_global_2
  selector:
    anchor: test_user_model
- id: no_global_3
  selector:
    anchor: assert user.name
- id: no_global_4
  selector:
    anchor: API Documentation
- id: no_global_5
  selector:
    anchor: GET /users - List users
oracle:
  required:
  - dockerfile
  - dockerfile_1
  - dockerfile_2
  - dockerfile_3
  - requirements
  allowed: []
  forbidden:
  - no_seed_data
  - no_test_models
  - no_api
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
  - no_global_5
