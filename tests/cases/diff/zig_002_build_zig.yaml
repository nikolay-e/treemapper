                  sessions: HashMap::new(),
              }
          }

          pub fn create_session(&mut self, token: &str, user_id: &str) {
              let hash = self.hasher.hash_token(token);
              self.sessions.insert(hash, user_id.to_string());
          }

          pub fn get_user(&self, token: &str) -> Option<&String> {
              let hash = self.hasher.hash_token(token);
              self.sessions.get(&hash)
          }
      }
