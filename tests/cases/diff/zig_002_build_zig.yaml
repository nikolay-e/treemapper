name: zig_002_build_zig
repo:
  initial_files:
    build.zig: |
      const std = @import("std");

      pub fn build(b: *std.Build) void {
          const target = b.standardTargetOptions(.{});
          const optimize = b.standardOptimizeOption(.{});

          const exe = b.addExecutable(.{
              .name = "myapp",
              .root_source_file = .{ .path = "src/main.zig" },
              .target = target,
              .optimize = optimize,
          });

          exe.addModule("network", b.createModule(.{
              .source_file = .{ .path = "src/network.zig" },
          }));

          b.installArtifact(exe);
      }
    src/main.zig: |
      const std = @import("std");
      const network = @import("network");

      pub fn main() !void {
          try network.listen(8080);
      }
    src/network.zig: |
      const std = @import("std");

      pub fn listen(port: u16) !void {
          const address = std.net.Address.parseIp("0.0.0.0", port) catch unreachable;
          var server = try address.listen(.{});
          defer server.deinit();
      }
    src/storage.zig: |
      const std = @import("std");

      pub const StorageEngine = struct {
          path: []const u8,
          capacity: usize,

          pub fn init(path: []const u8, capacity: usize) StorageEngine {
              return .{ .path = path, .capacity = capacity };
          }

          pub fn write(self: *StorageEngine, key: []const u8, value: []const u8) !void {
              _ = self;
              _ = key;
              _ = value;
          }

          pub fn read(self: *StorageEngine, key: []const u8) !?[]const u8 {
              _ = self;
              _ = key;
              return null;
          }
      };
    build.zig.zon: |
      .{
          .name = "myapp",
          .version = "0.1.0",
          GARBAGE_ZIG_002_ZON_MARKER_A = "zon",
          GARBAGE_ZIG_002_MANIFEST_B = true,
      }
    src/client.zig: |
      const std = @import("std");

      const GARBAGE_ZIG_002_CLIENT_MARKER_C: []const u8 = "client";
      const GARBAGE_ZIG_002_CONN_FLAG_D: bool = true;

      pub fn connect(host: []const u8, port: u16) !std.net.Stream {
          const address = try std.net.Address.resolveIp(host, port);
          return try std.net.tcpConnectToAddress(address);
      }
    src/logger.zig: |
      const std = @import("std");

      const GARBAGE_ZIG_002_LOGGER_MARKER_E: []const u8 = "logger";
      const GARBAGE_ZIG_002_LOG_LEVEL_F: u8 = 3;

      pub fn info(msg: []const u8) void {
          std.debug.print("[INFO] {s}\n", .{msg});
      }
    src/constants.zig: |
      const GARBAGE_ZIG_002_CONST_MARKER_G: []const u8 = "constants";
      const GARBAGE_ZIG_002_APP_VER_H: []const u8 = "0.1.0";

      pub const max_retries: u32 = 3;
      pub const timeout_ms: u64 = 5000;
  changed_files:
