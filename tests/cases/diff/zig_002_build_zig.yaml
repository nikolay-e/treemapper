name: zig_002_build_zig
tags:
- lang:rust
- change:bug_fix
- context:import_chain
- distance:1hop
- difficulty:hard
repo:
  initial_files:
    src/crypto/hasher.rs: |
      use std::collections::hash_map::DefaultHasher;
      use std::hash::{Hash, Hasher};

      pub struct TokenHasher {
          secret: String,
      }

      impl TokenHasher {
          pub fn new(secret: &str) -> Self {
              Self { secret: secret.to_string() }
          }

          pub fn hash_token(&self, token: &str) -> u64 {
              let mut h = DefaultHasher::new();
              token.hash(&mut h);
              h.finish()
          }

          pub fn verify(&self, token: &str, expected_hash: u64) -> bool {
              self.hash_token(token) == expected_hash
          }
      }
    src/auth/session_store.rs: |
      use crate::crypto::hasher::TokenHasher;
      use std::collections::HashMap;

      pub struct SessionStore {
          hasher: TokenHasher,
          sessions: HashMap<u64, String>,
      }

      impl SessionStore {
          pub fn new(secret: &str) -> Self {
              Self {
                  hasher: TokenHasher::new(secret),
                  sessions: HashMap::new(),
              }
          }

          pub fn create_session(&mut self, token: &str, user_id: &str) {
              let hash = self.hasher.hash_token(token);
              self.sessions.insert(hash, user_id.to_string());
          }

          pub fn get_user(&self, token: &str) -> Option<&String> {
              let hash = self.hasher.hash_token(token);
              self.sessions.get(&hash)
          }
      }
