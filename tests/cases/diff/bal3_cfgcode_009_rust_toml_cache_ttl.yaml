  changed_files:
    src/auth/tokens.py: |
      import hashlib
      import hmac
      import time

      def generate_token(user_id: int, secret: str) -> str:
          payload = f"{user_id}:{int(time.time())}"
          return hmac.new(secret.encode(), payload.encode(), hashlib.sha256).hexdigest()

      def validate_token(token: str, user_id: int, secret: str, max_age: int = 3600) -> bool:
          if len(token) != 64:
              return False
          expected = generate_token(user_id, secret)
          return hmac.compare_digest(token, expected)
    src/auth/middleware.py: |
      from src.auth.tokens import validate_token

      def authenticate(request: dict, secret: str) -> bool:
          token = request.get("token", "")
          user_id = request.get("user_id", 0)
          return validate_token(token, user_id, secret)

      def require_auth(handler):
          def wrapper(request, *args, **kwargs):
              if not authenticate(request, "default_secret"):
                  return {"error": "unauthorized", "status": 401}
              return handler(request, *args, **kwargs)
          return wrapper
