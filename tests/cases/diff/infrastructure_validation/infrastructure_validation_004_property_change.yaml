    from typing import Optional

    class User:
        def __init__(self, first: str, last: str, title: Optional[str] = None):
            self.first = first
            self.last = last
            self.title = title

        @property
        def full_name(self) -> str:
            if self.title:
                return f"{self.title} {self.first} {self.last}"
            return f"{self.first} {self.last}"

        @property
        def initials(self) -> str:
