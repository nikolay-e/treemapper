# Scenario: Adding a `priority: int = 0` field to an Order dataclass.
#   Only models.py is changed — one line addition between total and status.
#
# Reviewer questions:
#   Q1: "What code creates Order instances? Does create_order() need to
#        pass the new priority field?"
#       -> Contained in models.py (diff): create_order() uses Order(id=0,
#         customer_id=..., total=...) — doesn't pass priority, so the
#         default 0 applies. Reviewer should verify this is intentional.
#
#   Q2: "Does any code read Order.priority? Could the new field break
#        serialization or database operations?"
#       -> Needs services.py: process_order and complete_order access
#         order.id, order.customer_id, order.total, order.status. They
#         do NOT access priority — so no immediate breakage. Reviewer
#         should note that priority is unused by service layer.
#
#   Q3: "Does the repository layer handle the new field? Will save/load
#        work correctly?"
#       -> Needs repository.py: save_order appends the whole Order object.
#         find_order_by_id returns Order objects. Since this is in-memory
#         storage, the new field is preserved automatically.
