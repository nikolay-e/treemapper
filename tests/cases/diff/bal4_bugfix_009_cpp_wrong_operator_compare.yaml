name: bal4_bugfix_009_cpp_wrong_operator_compare
tags:
- lang:cpp
- change:single_file
- change:bug_fix
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    include/sensor.h: |
      #pragma once

      struct SensorReading {
          double temperature;
          double humidity;
          long timestamp;
      };

      constexpr double TEMP_THRESHOLD = 100.0;
      constexpr double HUMIDITY_MAX = 100.0;
    src/monitor.cpp: |
      #include "sensor.h"
      #include <vector>

      class SensorMonitor {
      public:
          void addReading(SensorReading r) {
              readings_.push_back(r);
          }

          bool hasOverheat() const {
              for (const auto& r : readings_) {
                  if (r.temperature > TEMP_THRESHOLD) {
                      return true;
                  }
              }
              return false;
          }

          bool hasValidHumidity(const SensorReading& r) const {
              return r.humidity >= 0 && r.humidity > HUMIDITY_MAX;
          }

      private:
          std::vector<SensorReading> readings_;
      };
    src/display.cpp: |
      #include "sensor.h"
      #include <string>

      std::string formatReading(const SensorReading& r) {
          return std::to_string(r.temperature) + "C / " + std::to_string(r.humidity) + "%";
      }
