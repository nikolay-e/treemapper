    src/monitor.cpp: |
      #include "sensor.h"
      #include <vector>

      class SensorMonitor {
      public:
          void addReading(SensorReading r) {
              readings_.push_back(r);
          }

          bool hasOverheat() const {
              for (const auto& r : readings_) {
                  if (r.temperature > TEMP_THRESHOLD) {
                      return true;
                  }
              }
              return false;
          }

          bool hasValidHumidity(const SensorReading& r) const {
