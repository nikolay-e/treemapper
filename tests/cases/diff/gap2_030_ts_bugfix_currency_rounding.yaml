      <?php
      namespace App\Shipping;

      class RateCalculator
      {
          private float $baseRate;
          private float $perKgRate;

          public function __construct(float $baseRate, float $perKgRate)
          {
              $this->baseRate = $baseRate;
              $this->perKgRate = $perKgRate;
          }

          public function calculate(float $weightKg, string $zone): float
          {
              $multiplier = $this->zoneMultiplier($zone);
              return ($this->baseRate + $this->perKgRate * $weightKg) * $multiplier;
          }

          public function calculateBulk(array $parcels, string $zone): float
          {
              $total = 0.0;
              foreach ($parcels as $weight) {
                  $total += $this->calculate($weight, $zone);
              }
              return $total;
          }

          private function zoneMultiplier(string $zone): float
          {
              return match($zone) {
                  'local' => 1.0,
                  'regional' => 1.5,
                  'international' => 3.0,
                  default => 1.0,
              };
          }
      }
