      type Event struct {
          Source  string
          Payload interface{}
      }

      type Multiplexer struct {
          inputs  []<-chan Event
          output  chan<- Event
          timeout time.Duration
      }

      func NewMultiplexer(output chan<- Event, timeout time.Duration) *Multiplexer {
          return &Multiplexer{
              output:  output,
              timeout: timeout,
          }
      }

      func (m *Multiplexer) AddInput(ch <-chan Event) {
          m.inputs = append(m.inputs, ch)
      }

      func (m *Multiplexer) Run(ctx context.Context) {
          for {
              select {
              case <-ctx.Done():
                  return
              default:
                  m.processInputs(ctx)
              }
          }
      }

      func (m *Multiplexer) processInputs(ctx context.Context) {
          for _, ch := range m.inputs {
              select {
              case evt := <-ch:
                  m.output <- evt
              default:
              }
          }
      }
