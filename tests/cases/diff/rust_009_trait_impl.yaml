name: rust_009_trait_impl
tags:
- lang:rust
- change:multi_file
- change:new_function
- change:new_function
- change:signature
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/lib.rs: |
      pub mod animal;
      pub mod dog;
      pub mod cat;
      pub mod parrot;
      pub mod habitat;
      pub mod feeding;
    src/animal.rs: |
      pub trait Animal {
          fn speak(&self) -> String;
          fn species(&self) -> &str;

          fn introduce(&self) -> String {
              format!("I am a {} and I say: {}", self.species(), self.speak())
          }
      }
    src/dog.rs: |
      use crate::animal::Animal;

      pub struct Dog {
          pub name: String,
          age: u8,
      }

      impl Dog {
          pub fn new(name: &str, age: u8) -> Self {
              Self { name: name.to_string(), age }
          }
      }

      impl Animal for Dog {
          fn speak(&self) -> String {
              format!("{} says woof!", self.name)
          }

          fn species(&self) -> &str {
              "dog"
          }
      }
    src/cat.rs: |
      use crate::animal::Animal;

      pub struct Cat {
          pub name: String,
          indoor: bool,
      }

      impl Cat {
          pub fn new(name: &str, indoor: bool) -> Self {
              Self { name: name.to_string(), indoor }
          }
      }

      impl Animal for Cat {
          fn speak(&self) -> String {
              format!("{} says meow!", self.name)
          }

          fn species(&self) -> &str {
              "cat"
          }
      }
    src/parrot.rs: |
      use crate::animal::Animal;

      pub struct Parrot {
          pub name: String,
          vocabulary: Vec<String>,
      }

      impl Parrot {
          pub fn new(name: &str) -> Self {
              Self { name: name.to_string(), vocabulary: vec![] }
          }
      }

      impl Animal for Parrot {
          fn speak(&self) -> String {
              format!("{} says hello!", self.name)
          }

          fn species(&self) -> &str {
              "parrot"
          }
      }
    src/habitat.rs: |
      pub enum Biome {
          Forest,
          Desert,
          Aquatic,
      }

      pub struct Habitat {
          name: String,
          biome: Biome,
      }

      impl Habitat {
          pub fn new(name: &str, biome: Biome) -> Self {
              Self { name: name.to_string(), biome }
          }
      }
    src/feeding.rs: |
      use std::time::Duration;

      pub struct FeedingSchedule {
          interval: Duration,
          portion_grams: u32,
      }

      impl FeedingSchedule {
          pub fn new(hours: u64, portion_grams: u32) -> Self {
              Self { interval: Duration::from_secs(hours * 3600), portion_grams }
          }
      }
  changed_files:
    src/lib.rs: |
      pub mod animal;
      pub mod dog;
      pub mod cat;
      pub mod parrot;
      pub mod habitat;
      pub mod feeding;
    src/animal.rs: |
      pub trait Animal {
          fn speak(&self) -> String;
          fn species(&self) -> &str;

          fn legs(&self) -> u8;

          fn introduce(&self) -> String {
              format!("I am a {} with {} legs and I say: {}", self.species(), self.legs(), self.speak())
          }
      }
    src/dog.rs: |
      use crate::animal::Animal;

      pub struct Dog {
          pub name: String,
          age: u8,
      }

      impl Dog {
          pub fn new(name: &str, age: u8) -> Self {
              Self { name: name.to_string(), age }
          }
      }

      impl Animal for Dog {
          fn speak(&self) -> String {
              format!("{} says woof!", self.name)
          }

          fn species(&self) -> &str {
              "dog"
          }

          fn legs(&self) -> u8 {
              4
          }
      }
    src/cat.rs: |
      use crate::animal::Animal;

      pub struct Cat {
          pub name: String,
          indoor: bool,
      }

      impl Cat {
          pub fn new(name: &str, indoor: bool) -> Self {
              Self { name: name.to_string(), indoor }
          }
      }

      impl Animal for Cat {
          fn speak(&self) -> String {
              format!("{} says meow!", self.name)
          }

          fn species(&self) -> &str {
              "cat"
          }
      }
    src/parrot.rs: |
      use crate::animal::Animal;

      pub struct Parrot {
          pub name: String,
          vocabulary: Vec<String>,
      }

      impl Parrot {
          pub fn new(name: &str) -> Self {
              Self { name: name.to_string(), vocabulary: vec![] }
          }
      }

      impl Animal for Parrot {
          fn speak(&self) -> String {
              format!("{} says hello!", self.name)
          }

          fn species(&self) -> &str {
              "parrot"
          }
      }
    src/habitat.rs: |
      pub enum Biome {
          Forest,
          Desert,
          Aquatic,
      }

      pub struct Habitat {
          name: String,
          biome: Biome,
      }

      impl Habitat {
          pub fn new(name: &str, biome: Biome) -> Self {
              Self { name: name.to_string(), biome }
          }
      }
    src/feeding.rs: |
      use std::time::Duration;

      pub struct FeedingSchedule {
          interval: Duration,
          portion_grams: u32,
      }

      impl FeedingSchedule {
          pub fn new(hours: u64, portion_grams: u32) -> Self {
              Self { interval: Duration::from_secs(hours * 3600), portion_grams }
          }
      }
  commit_message: "animal: add legs() to Animal trait, implement on Dog"
