    features/__init__.py: ''
    features/base.py: |
      from abc import ABC, abstractmethod
      from typing import Any

      class BaseFeature(ABC):
          def __init__(self, name: str, enabled: bool = True):
              self.name = name
              self.enabled = enabled

          @abstractmethod
          def execute(self, context: dict[str, Any]) -> dict[str, Any]:
              pass

          def is_enabled(self) -> bool:
              return self.enabled

          def disable(self) -> None:
              self.enabled = False

          def enable(self) -> None:
              self.enabled = True

          def __repr__(self) -> str:
              status = "on" if self.enabled else "off"
              return f"<{self.__class__.__name__}({self.name}, {status})>"
    features/registry.py: |
      from features.base import BaseFeature

      _registry: dict[str, BaseFeature] = {}

      def register(feature: BaseFeature) -> None:
          _registry[feature.name] = feature

      def get_feature(name: str) -> BaseFeature | None:
          return _registry.get(name)

      def list_enabled() -> list[str]:
          return [name for name, f in _registry.items() if f.is_enabled()]
    infra/event_bus.py: |
      from typing import Callable, Any

      class EventBus:
          def __init__(self):
              self._subscribers: dict[str, list[Callable]] = {}

          def subscribe(self, topic: str, handler: Callable) -> None:
              if topic not in self._subscribers:
                  self._subscribers[topic] = []
              self._subscribers[topic].append(handler)

          def publish(self, topic: str, payload: Any) -> int:
              handlers = self._subscribers.get(topic, [])
              for h in handlers:
                  h(payload)
              return len(handlers)

          def topics(self) -> list[str]:
              return list(self._subscribers.keys())
    infra/permission_manager.py: |
      from enum import Enum

      class Permission(Enum):
          READ = "read"
          WRITE = "write"
          ADMIN = "admin"

      class PermissionManager:
          def __init__(self):
              self._grants: dict[str, set[Permission]] = {}

          def grant(self, user_id: str, perm: Permission) -> None:
              if user_id not in self._grants:
                  self._grants[user_id] = set()
              self._grants[user_id].add(perm)

          def has_permission(self, user_id: str, perm: Permission) -> bool:
              return perm in self._grants.get(user_id, set())
