repo:
  initial_files:
    src/config.rs: |
      use std::collections::HashMap;

      pub struct Config {
          values: HashMap<String, String>,
      }

      impl Config {
          pub fn new() -> Self {
              Config { values: HashMap::new() }
          }

          pub fn set(&mut self, key: &str, value: &str) {
              self.values.insert(key.to_string(), value.to_string());
          }

          pub fn get(&self, key: &str) -> Option<&String> {
              self.values.get(key)
          }
      }
    tests/config_test.rs: |
      use mylib::config::Config;

      #[test]
      fn test_set_and_get() {
          let mut cfg = Config::new();
          cfg.set("host", "localhost");
          assert_eq!(cfg.get("host"), Some(&"localhost".to_string()));
      }

      #[test]
      fn test_get_missing() {
          let cfg = Config::new();
          assert_eq!(cfg.get("missing"), None);
      }
    src/logger.rs: |
      pub fn log(level: &str, message: &str) {
          println!("[{}] {}", level, message);
      }
  changed_files:
    src/config.rs: |
      use std::collections::HashMap;

      pub struct Config {
          values: HashMap<String, String>,
      }

      impl Config {
          pub fn new() -> Self {
              Config { values: HashMap::new() }
          }

          pub fn set(&mut self, key: &str, value: &str) {
              self.values.insert(key.to_string(), value.to_string());
          }

          pub fn get(&self, key: &str) -> Option<&String> {
              self.values.get(key)
          }

          pub fn get_or_default<'a>(&'a self, key: &str, default: &'a str) -> &'a str {
              self.values.get(key).map(|s| s.as_str()).unwrap_or(default)
          }

          pub fn remove(&mut self, key: &str) -> Option<String> {
              self.values.remove(key)
          }

          pub fn keys(&self) -> Vec<&String> {
              self.values.keys().collect()
          }
      }
  commit_message: "feat: add get_or_default, remove, keys to Config"
