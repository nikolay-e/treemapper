  changed_files:
    src/main/kotlin/queue/TaskQueue.kt: |
      package queue

      data class Task(val id: String, val priority: Int)

      class TaskQueue {
          private val tasks = mutableListOf<Task>()

          fun enqueue(task: Task) {
              tasks.add(task)
          }

          fun peek(): Task? {
              return tasks.firstOrNull()
          }

          fun dequeue(): Task? {
              if (tasks.isEmpty()) return null
              return tasks.removeAt(0)
          }
      }
  commit_message: "fix: return null instead of throwing on empty queue"
