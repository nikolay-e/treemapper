repo:
  initial_files:
    src/search/indexer.rs: |
      use crate::storage::document::DocumentStore;

      pub struct Indexer {
          store: DocumentStore,
          term_freq: std::collections::HashMap<String, u32>,
      }

      impl Indexer {
          pub fn new(store: DocumentStore) -> Self {
              Indexer { store, term_freq: std::collections::HashMap::new() }
          }

          pub fn index(&mut self, doc_id: &str, content: &str) {
              self.store.save(doc_id, content);
              for word in content.split_whitespace() {
                  let normalized = word.to_lowercase();
                  *self.term_freq.entry(normalized).or_insert(0) += 1;
              }
          }

          pub fn term_count(&self, term: &str) -> u32 {
              // BUG: normalization inconsistency — query not lowercased before lookup
              *self.term_freq.get(term).unwrap_or(&0)
          }

          pub fn doc_count(&self) -> usize {
              self.store.count()
          }
      }
    src/storage/document.rs: |
      use std::collections::HashMap;

      pub struct DocumentStore {
          docs: HashMap<String, String>,
      }

      impl DocumentStore {
          pub fn new() -> Self {
              DocumentStore { docs: HashMap::new() }
          }

          pub fn save(&mut self, doc_id: &str, content: &str) {
              self.docs.insert(doc_id.to_string(), content.to_string());
          }

          pub fn get(&self, doc_id: &str) -> Option<&str> {
              self.docs.get(doc_id).map(String::as_str)
          }

          pub fn count(&self) -> usize {
              self.docs.len()
          }
      }
    src/search/query_engine.rs: |
      use crate::search::indexer::Indexer;

      pub struct QueryEngine {
          indexer: Indexer,
      }

      impl QueryEngine {
          pub fn new(indexer: Indexer) -> Self {
              QueryEngine { indexer }
          }

          pub fn frequency(&self, term: &str) -> u32 {
              self.indexer.term_count(term)
          }
      }
