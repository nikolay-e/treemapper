      #[derive(Debug, Clone)]
      pub struct Packet {
          pub id: u64,
          pub source_ip: String,
          pub dest_ip: String,
          pub payload_bytes: usize,
          pub protocol: String,
      }

      impl Packet {
          pub fn new(id: u64, src: &str, dst: &str, size: usize, proto: &str) -> Self {
