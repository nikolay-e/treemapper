  changed_files:
    src/packet.rs: |
      #[derive(Debug, Clone)]
      pub struct Packet {
          pub id: u64,
          pub source_ip: String,
          pub dest_ip: String,
          pub payload_bytes: usize,
          pub protocol: String,
          pub ttl: u8,
      }

      impl Packet {
          pub fn new(id: u64, src: &str, dst: &str, size: usize, proto: &str) -> Self {
              Self {
                  id,
                  source_ip: src.to_string(),
                  dest_ip: dst.to_string(),
                  payload_bytes: size,
                  protocol: proto.to_string(),
                  ttl: 64,
              }
          }

          pub fn is_tcp(&self) -> bool {
              self.protocol == "TCP"
          }

          pub fn has_expired(&self) -> bool {
              self.ttl == 0
          }
      }
    src/firewall.rs: |
      use crate::packet::Packet;

      pub struct Firewall {
          blocked_ips: Vec<String>,
      }

      impl Firewall {
          pub fn new() -> Self {
              Self { blocked_ips: Vec::new() }
          }

          pub fn block(&mut self, ip: &str) {
              self.blocked_ips.push(ip.to_string());
          }

          pub fn is_allowed(&self, packet: &Packet) -> bool {
              !self.blocked_ips.contains(&packet.source_ip) && !packet.has_expired()
          }

          pub fn filter<'a>(&self, packets: &'a [Packet]) -> Vec<&'a Packet> {
              packets.iter().filter(|p| self.is_allowed(p)).collect()
          }
      }
    src/CS012_logger.rs: |
      // CS012_GARBAGE_A = "logger_marker"
      pub fn log_packet(_id: u64) {}
    src/CS012_metrics.rs: |
      // CS012_GARBAGE_B = "metrics_marker"
      pub fn record_throughput(_bytes: usize) {}
    src/CS012_config.rs: |
      // CS012_GARBAGE_C = "config_marker"
      pub const DEFAULT_MTU: usize = 1500;
  commit_message: "feat: add ttl field to Packet, has_expired method, filter to Firewall"
