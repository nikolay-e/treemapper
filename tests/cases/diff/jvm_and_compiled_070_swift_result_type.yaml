name: jvm_and_compiled_070_swift_result_type
xfail:
  category: swift-same-module-edges
repo:
  initial_files:
    APIError.swift: |
      enum APIError: Error {
          case networkError
          case invalidResponse
          case decodingError
      }
    DataLoader.swift: |
      struct DataLoader {}
    NetworkMonitor.swift: |
      import Foundation

      class NetworkMonitor {
          enum ConnectionType {
              case wifi, cellular, none
          }

          private(set) var isConnected = true
          private(set) var connectionType: ConnectionType = .wifi

          func startMonitoring() {
              isConnected = true
              connectionType = .wifi
          }

          func stopMonitoring() {
              isConnected = false
              connectionType = .none
          }
      }
    RetryPolicy.swift: |
      import Foundation

      struct RetryPolicy {
          let maxAttempts: Int
          let baseDelay: TimeInterval
          let backoffMultiplier: Double

          init(maxAttempts: Int = 3, baseDelay: TimeInterval = 1.0, backoffMultiplier: Double = 2.0) {
              self.maxAttempts = maxAttempts
              self.baseDelay = baseDelay
              self.backoffMultiplier = backoffMultiplier
          }

          func delay(forAttempt attempt: Int) -> TimeInterval {
              return baseDelay * pow(backoffMultiplier, Double(attempt))
          }

          func shouldRetry(attempt: Int) -> Bool {
              return attempt < maxAttempts
          }
      }
  changed_files:
    APIError.swift: |
      enum APIError: Error {
          case networkError
          case invalidResponse
          case decodingError
      }
    DataLoader.swift: |
      import Foundation

      struct DataLoader {
          func load(from url: URL) -> Result<Data, APIError> {
              guard let data = "test".data(using: .utf8) else {
                  return .failure(.invalidResponse)
              }
              return .success(data)
          }

          func process(url: URL) {
              let result = load(from: url)
              switch result {
              case .success(let data):
                  print("Loaded \(data.count) bytes")
              case .failure(let error):
                  print("Error: \(error)")
              }
          }
      }
