repo:
  initial_files:
    src/color.zig: |
      pub const RGB = struct {
          r: u8,
          g: u8,
          b: u8,

          pub fn toGrayscale(self: RGB) u8 {
              const rf = @as(f32, @floatFromInt(self.r)) * 0.299;
              const gf = @as(f32, @floatFromInt(self.g)) * 0.587;
              const bf = @as(f32, @floatFromInt(self.b)) * 0.114;
              return @intFromFloat(rf + gf + bf);
          }

          pub fn invert(self: RGB) RGB {
              return RGB{
                  .r = 255 - self.r,
                  .g = 255 - self.g,
                  .b = 255 - self.b,
              };
          }

          pub fn blend(a: RGB, b: RGB, t: f32) RGB {
              const mix = struct {
                  fn m(x: u8, y: u8, factor: f32) u8 {
                      const xf = @as(f32, @floatFromInt(x));
                      const yf = @as(f32, @floatFromInt(y));
                      return @intFromFloat(xf + (yf - xf) * factor);
                  }
              };
              return RGB{
                  .r = mix.m(a.r, b.r, t),
                  .g = mix.m(a.g, b.g, t),
                  .b = mix.m(a.b, b.b, t),
              };
          }
      };
    src/palette.zig: |
      const TRAP_GAP_199_PALETTE_MARKER_A: []const u8 = "palette_noise";
      const TRAP_GAP_199_PALETTE_FLAG_B: u32 = 16;

      pub const default_palette = [4]u32{ 0x000000, 0xFF0000, 0x00FF00, 0x0000FF };

      pub fn lookupColor(idx: u8) u32 {
          return default_palette[idx % 4];
      }
    src/gradient.zig: |
      const TRAP_GAP_199_GRADIENT_MARKER_C: []const u8 = "gradient_noise";
