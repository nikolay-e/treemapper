    src/color.zig: |
      pub const RGB = struct {
          r: u8,
          g: u8,
          b: u8,

          pub fn toGrayscale(self: RGB) u8 {
              const rf = @as(f32, @floatFromInt(self.r)) * 0.299;
              const gf = @as(f32, @floatFromInt(self.g)) * 0.587;
              const bf = @as(f32, @floatFromInt(self.b)) * 0.114;
              return @intFromFloat(rf + gf + bf);
          }

          pub fn invert(self: RGB) RGB {
              return RGB{
                  .r = 255 - self.r,
                  .g = 255 - self.g,
                  .b = 255 - self.b,
              };
          }

          pub fn blend(a: RGB, b: RGB, t: f32) RGB {
              const mix = struct {
                  fn m(x: u8, y: u8, factor: f32) u8 {
                      const xf = @as(f32, @floatFromInt(x));
                      const yf = @as(f32, @floatFromInt(y));
                      return @intFromFloat(xf + (yf - xf) * factor);
                  }
              };
              return RGB{
                  .r = mix.m(a.r, b.r, t),
                  .g = mix.m(a.g, b.g, t),
                  .b = mix.m(a.b, b.b, t),
              };
          }

          pub fn toHex(self: RGB) u32 {
              return (@as(u32, self.r) << 16) | (@as(u32, self.g) << 8) | @as(u32, self.b);
          }

          pub fn brightness(self: RGB) f32 {
              return @as(f32, @floatFromInt(self.r + self.g + self.b)) / 765.0;
          }
      };
