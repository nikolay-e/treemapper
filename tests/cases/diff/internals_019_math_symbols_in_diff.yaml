    src/inventory/stock.py: |
      from dataclasses import dataclass, field
      from typing import Dict

      @dataclass
      class StockLevel:
          product_id: str
          quantity: int
          reserved: int = 0

          def available(self) -> int:
              return self.quantity - self.reserved

      class StockRepository:
          def __init__(self):
              self._levels: Dict[str, StockLevel] = {}

          def get(self, product_id: str) -> StockLevel:
              if product_id not in self._levels:
                  raise KeyError(f"product not found: {product_id}")
              return self._levels[product_id]

          def set(self, level: StockLevel) -> None:
              self._levels[level.product_id] = level

          def reserve(self, product_id: str, qty: int) -> None:
              level = self.get(product_id)
              if qty <= 0:
                  raise ValueError("reserve quantity must be positive")
              if qty > level.available():
                  raise ValueError("insufficient stock")
              level.reserved += qty

          def release(self, product_id: str, qty: int) -> None:
              level = self.get(product_id)
              if qty <= 0:
                  raise ValueError("release quantity must be positive")
              level.reserved = max(0, level.reserved - qty)
    src/inventory/service.py: |
      from src.inventory.stock import StockRepository

      class InventoryService:
          def __init__(self, repo: StockRepository):
              self.repo = repo

          def check_availability(self, product_id: str, qty: int) -> bool:
              if qty <= 0:
                  raise ValueError("quantity must be positive")
              try:
                  level = self.repo.get(product_id)
                  return level.available() >= qty
              except KeyError:
                  return False

          def fulfill(self, product_id: str, qty: int) -> None:
              self.repo.reserve(product_id, qty)
    tests/test_inventory.py: |
      import pytest
      from src.inventory.stock import StockLevel, StockRepository
      from src.inventory.service import InventoryService

      def make_service():
          repo = StockRepository()
          repo.set(StockLevel("prod-1", quantity=100, reserved=10))
          return InventoryService(repo), repo

      def test_check_availability_sufficient_stock():
          svc, _ = make_service()
          assert svc.check_availability("prod-1", 50) is True

      def test_check_availability_insufficient_stock():
          svc, _ = make_service()
          assert svc.check_availability("prod-1", 95) is False

      def test_fulfill_reduces_available():
          svc, repo = make_service()
          svc.fulfill("prod-1", 20)
          assert repo.get("prod-1").available() == 70

      def test_reserve_zero_quantity_raises():
          _, repo = make_service()
          with pytest.raises(ValueError, match="positive"):
              repo.reserve("prod-1", 0)

      def test_check_availability_zero_quantity_raises():
          svc, _ = make_service()
          with pytest.raises(ValueError, match="positive"):
              svc.check_availability("prod-1", 0)
