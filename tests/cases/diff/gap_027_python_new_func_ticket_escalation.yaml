      from dataclasses import dataclass, field
      from enum import Enum
      from datetime import datetime

      class Priority(Enum):
          LOW = "low"
          MEDIUM = "medium"
          HIGH = "high"
          CRITICAL = "critical"

      @dataclass
      class Ticket:
          id: int
          subject: str
          priority: Priority
          assignee: str
          created_at: datetime = field(default_factory=datetime.now)
          resolved: bool = False
