  changed_files:
    helpdesk/service.py: |
      from helpdesk.models import Ticket, Priority
      from datetime import datetime, timedelta

      def create_ticket(ticket_id: int, subject: str, assignee: str) -> Ticket:
          return Ticket(
              id=ticket_id,
              subject=subject,
              priority=Priority.MEDIUM,
              assignee=assignee,
          )

      def resolve_ticket(ticket: Ticket) -> Ticket:
          ticket.resolved = True
          return ticket

      def escalate_overdue(tickets: list[Ticket], max_age_hours: int = 24) -> list[Ticket]:
          cutoff = datetime.now() - timedelta(hours=max_age_hours)
          escalated = []
          for ticket in tickets:
              if not ticket.resolved and ticket.created_at < cutoff:
                  if ticket.priority != Priority.CRITICAL:
                      priorities = list(Priority)
                      idx = priorities.index(ticket.priority)
                      ticket.priority = priorities[min(idx + 1, len(priorities) - 1)]
                  escalated.append(ticket)
          return escalated
  commit_message: "add overdue ticket escalation function"
