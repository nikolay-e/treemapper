  changed_files:
    internal/game/entity.go: |
      package game

      type Vector2 struct {
          X, Y float64
      }

      type Entity struct {
          ID       string
          Position Vector2
          Health   int
          MaxHealth int
          Active   bool
      }

      func NewEntity(id string, x, y float64, health int) *Entity {
          return &Entity{ID: id, Position: Vector2{x, y}, Health: health, MaxHealth: health, Active: true}
      }

      func (e *Entity) IsAlive() bool {
          return e.Active && e.Health > 0
      }

      func (e *Entity) TakeDamage(dmg int) {
          e.Health -= dmg
          if e.Health <= 0 {
              e.Active = false
          }
      }

      func (e *Entity) Heal(amount int) {
          if !e.IsAlive() {
              return
          }
          e.Health += amount
          if e.Health > e.MaxHealth {
              e.Health = e.MaxHealth
          }
      }

      func (e *Entity) HealthPercent() float64 {
          if e.MaxHealth == 0 {
              return 0
          }
          return float64(e.Health) / float64(e.MaxHealth) * 100
      }
    internal/game/world.go: |
      package game

      import "math"

      type World struct {
          entities map[string]*Entity
      }

      func NewWorld() *World {
          return &World{entities: make(map[string]*Entity)}
      }

      func (w *World) AddEntity(e *Entity) {
          w.entities[e.ID] = e
      }

      func (w *World) GetEntity(id string) *Entity {
          return w.entities[id]
      }

      func (w *World) Distance(a, b *Entity) float64 {
          dx := a.Position.X - b.Position.X
          dy := a.Position.Y - b.Position.Y
          return math.Sqrt(dx*dx + dy*dy)
      }

      func (w *World) EntitiesInRange(origin *Entity, radius float64) []*Entity {
          var result []*Entity
          for _, e := range w.entities {
              if e.ID != origin.ID && w.Distance(origin, e) <= radius {
                  result = append(result, e)
              }
          }
          return result
      }
    internal/audio/mixer.go: |
      package audio

      import "fmt"

