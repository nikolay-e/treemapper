    src/main/java/com/library/LoanService.java: |
      package com.library;

      import java.time.LocalDate;

      public class LoanService {
          private final BookCatalog catalog;

          public LoanService(BookCatalog catalog) {
              this.catalog = catalog;
          }

          public Loan checkoutBook(String memberId, String isbn) {
              Book book = catalog.findByIsbn(isbn);
              if (!book.isAvailable()) {
                  throw new IllegalStateException("Book not available");
              }
              if (memberId == null || memberId.isBlank()) {
                  throw new IllegalArgumentException("Member ID required");
              }
              book.setAvailable(false);
              return new Loan(memberId, isbn, LocalDate.now(), LocalDate.now().plusDays(14));
          }
      }
