name: helm_020_chart_dependency
tags:
- lang:markdown
- lang:yaml
- change:multi_file
- change:config
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: myapp
      description: Full-stack application
      type: application
      version: 1.0.0
    chart/values.yaml: |
      replicaCount: 1
      image:
        repository: myapp
        tag: "1.0.0"
    chart/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ .Release.Name }}-{{ .Chart.Name }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: {{ .Chart.Name }}
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    chart/templates/flagger-canary.yaml: |
      apiVersion: flagger.app/v1beta1
      kind: Canary
      metadata:
      spec:
        targetRef:
          apiVersion: apps/v1
    chart/docs/dependency-management.md: |
      # Dependency Management
      ## Version Pinning
  changed_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: myapp
      description: Full-stack application
      type: application
      version: 1.0.0
      dependencies:
        - name: postgresql
          version: 12.1.0
          repository: https://charts.bitnami.com/bitnami
          condition: postgresql.enabled
    chart/values.yaml: |
      replicaCount: 1
      image:
        repository: myapp
        tag: "1.0.0"
      postgresql:
        enabled: true
    chart/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ .Release.Name }}-{{ .Chart.Name }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: {{ .Chart.Name }}
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
    chart/templates/flagger-canary.yaml: |
      apiVersion: flagger.app/v1beta1
      kind: Canary
      metadata:
      spec:
        targetRef:
          apiVersion: apps/v1
    chart/docs/dependency-management.md: |
      # Dependency Management
      ## Version Pinning
  commit_message: Update files
fragments:
- id: chart_file
  selector:
    path: chart/Chart.yaml
- id: values_file
  selector:
    path: chart/values.yaml
- id: req_global_0
  selector:
    anchor: 'dependencies:'
- id: req_global_1
  selector:
    anchor: 'enabled: true'
oracle:
  required:
  - chart_file
  - values_file
  - req_global_0
  - req_global_1
  allowed: []
  forbidden: []
