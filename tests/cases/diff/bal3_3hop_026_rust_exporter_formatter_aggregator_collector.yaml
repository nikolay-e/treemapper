  changed_files:
    src/collector/metric.rs: |
      #[derive(Clone)]
      pub struct Metric {
          pub name: String,
          pub value: f64,
      }

      pub struct Collector {
          metrics: Vec<Metric>,
          max_size: usize,
      }

      impl Collector {
          pub fn new(max_size: usize) -> Self {
              Self { metrics: Vec::new(), max_size }
          }

          pub fn record(&mut self, name: &str, value: f64) {
              if self.metrics.len() >= self.max_size {
                  self.metrics.remove(0);
              }
              self.metrics.push(Metric {
                  name: name.to_string(),
                  value,
              });
          }

          pub fn all(&self) -> &[Metric] {
              &self.metrics
          }

          pub fn is_full(&self) -> bool {
              self.metrics.len() >= self.max_size
          }
      }
  commit_message: "Fix unbounded metric growth with max_size ring buffer"
