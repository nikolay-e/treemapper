repo:
  initial_files:
    src/collector/metric.rs: |
      #[derive(Clone)]
      pub struct Metric {
          pub name: String,
          pub value: f64,
      }

      pub struct Collector {
          metrics: Vec<Metric>,
      }

      impl Collector {
          pub fn new() -> Self {
              Self { metrics: Vec::new() }
          }

          pub fn record(&mut self, name: &str, value: f64) {
              self.metrics.push(Metric {
                  name: name.to_string(),
                  value,
              });
          }

          pub fn all(&self) -> &[Metric] {
              &self.metrics
          }
      }
    src/collector/mod.rs: |
      pub mod metric;
    src/aggregator/aggregator.rs: |
      use crate::collector::metric::Collector;

      pub struct Aggregator {
          collector: Collector,
      }

      impl Aggregator {
          pub fn new(collector: Collector) -> Self {
              Self { collector }
          }

          pub fn sum(&self) -> f64 {
              self.collector.all().iter().map(|m| m.value).sum()
          }

          pub fn count(&self) -> usize {
              self.collector.all().len()
          }

          pub fn average(&self) -> f64 {
              let count = self.count();
              if count == 0 {
                  return 0.0;
              }
              self.sum() / count as f64
          }
      }
    src/aggregator/mod.rs: |
      pub mod aggregator;
    src/formatter/text_fmt.rs: |
      use crate::aggregator::aggregator::Aggregator;

      pub struct TextFormatter {
          aggregator: Aggregator,
      }

      impl TextFormatter {
          pub fn new(aggregator: Aggregator) -> Self {
              Self { aggregator }
          }

          pub fn format(&self) -> String {
              format!(
                  "sum={:.2} count={} avg={:.2}",
                  self.aggregator.sum(),
                  self.aggregator.count(),
                  self.aggregator.average()
              )
          }
      }
    src/formatter/mod.rs: |
      pub mod text_fmt;
    src/exporter/exporter.rs: |
      use crate::formatter::text_fmt::TextFormatter;

      pub struct Exporter {
          formatter: TextFormatter,
      }

      impl Exporter {
          pub fn new(formatter: TextFormatter) -> Self {
              Self { formatter }
          }

          pub fn export(&self) -> String {
              self.formatter.format()
          }
      }
    src/exporter/mod.rs: |
      pub mod exporter;
    src/dashboard/panel.rs: |
