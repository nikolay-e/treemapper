name: scripting_018_module_mixin
tags:
- lang:ruby
- change:single_file
- change:new_function
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    lib/logging.rb: |
      module Logging
        def log(message)
          puts "[LOG] #{message}"
        end

        def log_error(message)
          puts "[ERROR] #{message}"
        end

        def log_warning(message)
          puts "[WARNING] #{message}"
        end
      end
    lib/worker.rb: |
      class Worker
      end
    lib/metrics.rb: |
      class Metrics
        def initialize
          @counters = {}
          @timings = {}
        end

        def increment(name, amount = 1)
          @counters[name] = (@counters[name] || 0) + amount
        end

        def time(name)
          start = Time.now
          result = yield
          @timings[name] = Time.now - start
          result
        end

        def report
          { counters: @counters, timings: @timings }
        end
      end
    lib/notifier.rb: |
      class Notifier
        def initialize(channel)
          @channel = channel
        end

        def send_alert(subject, body)
          dispatch(@channel, subject, body)
        end

        def send_info(subject, body)
          dispatch(@channel, subject, body)
        end

        private

        def dispatch(channel, subject, body)
          puts "Sending to #{channel}: [#{subject}] #{body}"
        end
      end
  changed_files:
    lib/logging.rb: |
      module Logging
        def log(message)
          puts "[LOG] #{message}"
        end

        def log_error(message)
          puts "[ERROR] #{message}"
        end

        def log_warning(message)
          puts "[WARNING] #{message}"
        end
      end
    lib/worker.rb: |
      require_relative 'logging'

      class Worker
        include Logging

        def perform
          log("Starting work")
          log("Work completed")
        end
      end
    lib/metrics.rb: |
      class Metrics
        def initialize
          @counters = {}
          @timings = {}
        end

        def increment(name, amount = 1)
          @counters[name] = (@counters[name] || 0) + amount
        end

        def time(name)
          start = Time.now
          result = yield
          @timings[name] = Time.now - start
          result
        end

        def report
          { counters: @counters, timings: @timings }
        end
      end
    lib/notifier.rb: |
      class Notifier
        def initialize(channel)
          @channel = channel
        end

        def send_alert(subject, body)
          dispatch(@channel, subject, body)
        end

        def send_info(subject, body)
          dispatch(@channel, subject, body)
        end

        private

        def dispatch(channel, subject, body)
          puts "Sending to #{channel}: [#{subject}] #{body}"
        end
      end
  commit_message: Update files
