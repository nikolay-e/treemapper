name: bal4_0hop_007_nim_signature_change
tags:
- lang:nim
- change:single_file
- change:signature
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    src/convert.nim: |
      proc toUpper(s: string): string =
        result = ""
        for c in s:
          result.add(chr(ord(c) - 32))

      proc toLower(s: string): string =
        result = ""
        for c in s:
          result.add(chr(ord(c) + 32))
    src/garbage_tokens.nim: |
      const GARBAGE_B4N007_TOK_A = "tokens"
      const GARBAGE_B4N007_TOK_B = 5

      proc garbageTokenize(s: string): seq[string] =
        @[s]
    src/garbage_validate.nim: |
      const GARBAGE_B4N007_VAL_C = "validate"
      const GARBAGE_B4N007_VAL_D = false

      proc garbageCheck(x: int): bool =
        x > 0
  changed_files:
    src/convert.nim: |
      proc toUpper(s: string, locale: string = "en"): string =
        result = ""
        for c in s:
          result.add(chr(ord(c) - 32))

      proc toLower(s: string): string =
        result = ""
        for c in s:
          result.add(chr(ord(c) + 32))
    src/garbage_tokens.nim: |
      const GARBAGE_B4N007_TOK_A = "tokens"
      const GARBAGE_B4N007_TOK_B = 5

      proc garbageTokenize(s: string): seq[string] =
        @[s]
    src/garbage_validate.nim: |
      const GARBAGE_B4N007_VAL_C = "validate"
      const GARBAGE_B4N007_VAL_D = false

      proc garbageCheck(x: int): bool =
        x > 0
  commit_message: "feat: add locale parameter to toUpper"
fragments:
- id: changed_sig
