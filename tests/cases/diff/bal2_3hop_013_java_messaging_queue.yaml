      package com.app.msg;

      public class Message {
          private final String topic;
          private final String body;
          public Message(String topic, String body) {
              this.topic = topic;
              this.body = body;
          }
          public String getTopic() { return topic; }
          public String getBody() { return body; }
      }
    src/main/java/com/app/msg/MessageQueue.java: |
      package com.app.msg;

      import com.app.msg.Message;
      import java.util.LinkedList;
      import java.util.Queue;

      public class MessageQueue {
          private final Queue<Message> queue = new LinkedList<>();
          public void enqueue(Message msg) {
              queue.add(msg);
          }
          public Message dequeue() {
              return queue.poll();
          }
          public int size() { return queue.size(); }
      }
    src/main/java/com/app/worker/MessageConsumer.java: |
      package com.app.worker;

      import com.app.msg.MessageQueue;
      import com.app.msg.Message;

      public class MessageConsumer {
          private final MessageQueue queue;
          public MessageConsumer(MessageQueue queue) {
              this.queue = queue;
          }
          public String consume() {
              Message msg = queue.dequeue();
              return msg != null ? msg.getBody() : null;
          }
      }
    src/main/java/com/app/scheduler/TaskScheduler.java: |
      package com.app.scheduler;

      import com.app.worker.MessageConsumer;

      public class TaskScheduler {
          private final MessageConsumer consumer;
          public TaskScheduler(MessageConsumer consumer) {
              this.consumer = consumer;
          }
          public void processBatch(int count) {
              for (int i = 0; i < count; i++) {
                  consumer.consume();
              }
          }
      }
