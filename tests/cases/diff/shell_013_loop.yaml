name: shell_013_loop
tags:
- lang:shell
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    batch.sh: |
      #!/bin/bash
      source ./utils.sh

      for file in *.log; do
          process_file "$file"
      done
    utils.sh: |
      #!/bin/bash
      MAX_RETRIES=5
      CHECKSUM_CMD="sha256sum"

      process_file() {
          local file=$1
          if [[ ! -f "$file" ]]; then
              echo "SKIP: $file not found"
              return 1
          fi
          local sum=$($CHECKSUM_CMD "$file" | cut -d' ' -f1)
          echo "OK: $file ($sum)"
          return 0
      }
    scripts/archive.sh: |
      #!/bin/bash
      ARCHIVE_DIR="/data/archive"
      for f in /data/processed/*.log; do
          mv "$f" "$ARCHIVE_DIR/"
      done
      echo "Archived $(ls "$ARCHIVE_DIR" | wc -l) files"
    scripts/report.sh: |
      #!/bin/bash
      echo "file,status,checksum" > report.csv
      grep "^OK:" /var/log/batch.log | while read -r line; do
          echo "$line" >> report.csv
      done
    scripts/parallel_batch.sh: |
      #!/bin/bash
      source ./utils.sh

      for file in *.log; do
          process_file "$file" &
      done
      wait
      echo "All parallel jobs complete"
    scripts/dry_run.sh: |
      #!/bin/bash
      source ./utils.sh

      DRY_RUN=1
      for file in *.log; do
          if [[ $DRY_RUN -eq 1 ]]; then
              echo "DRY: would process $file"
          else
              process_file "$file"
          fi
      done
    lib/checksum.sh: |
      #!/bin/bash
      compute_checksum() {
          local file=$1
          local algo=${2:-sha256}
          case $algo in
              sha256) sha256sum "$file" | cut -d' ' -f1 ;;
              md5)    md5sum "$file" | cut -d' ' -f1 ;;
              *)      echo "Unknown algorithm: $algo" >&2; return 1 ;;
          esac
      }
  changed_files:
    batch.sh: |
      #!/bin/bash
      source ./utils.sh

      for file in *.log; do
          process_file "$file"
      done

      while read -r line; do
          process_file "$line"
      done < input.txt

      counter=0
      until [[ $counter -ge $MAX_RETRIES ]]; do
          echo "Retry attempt: $counter"
          process_file "pending.dat" && break
          ((counter++))
      done
    utils.sh: |
      #!/bin/bash
      MAX_RETRIES=5
      CHECKSUM_CMD="sha256sum"

      process_file() {
          local file=$1
          if [[ ! -f "$file" ]]; then
              echo "SKIP: $file not found"
              return 1
          fi
          local sum=$($CHECKSUM_CMD "$file" | cut -d' ' -f1)
          echo "OK: $file ($sum)"
          return 0
      }
    scripts/archive.sh: |
      #!/bin/bash
      ARCHIVE_DIR="/data/archive"
      for f in /data/processed/*.log; do
          mv "$f" "$ARCHIVE_DIR/"
      done
      echo "Archived $(ls "$ARCHIVE_DIR" | wc -l) files"
    scripts/report.sh: |
      #!/bin/bash
      echo "file,status,checksum" > report.csv
      grep "^OK:" /var/log/batch.log | while read -r line; do
          echo "$line" >> report.csv
      done
    scripts/parallel_batch.sh: |
      #!/bin/bash
      source ./utils.sh

      for file in *.log; do
          process_file "$file" &
      done
      wait
      echo "All parallel jobs complete"
    scripts/dry_run.sh: |
      #!/bin/bash
      source ./utils.sh

      DRY_RUN=1
      for file in *.log; do
          if [[ $DRY_RUN -eq 1 ]]; then
              echo "DRY: would process $file"
          else
              process_file "$file"
          fi
      done
    lib/checksum.sh: |
      #!/bin/bash
      compute_checksum() {
          local file=$1
          local algo=${2:-sha256}
          case $algo in
              sha256) sha256sum "$file" | cut -d' ' -f1 ;;
              md5)    md5sum "$file" | cut -d' ' -f1 ;;
              *)      echo "Unknown algorithm: $algo" >&2; return 1 ;;
          esac
      }
  commit_message: Update files
fragments:
- id: utils
  selector:
    path: utils.sh
    anchor: process_file()
- id: utils_1
  selector:
    path: utils.sh
    anchor: MAX_RETRIES=5
- id: batch
  selector:
    path: batch.sh
    anchor: process_file
- id: batch_1
  selector:
    path: batch.sh
    anchor: $MAX_RETRIES
- id: no_archive
  selector:
    path: scripts/archive.sh
- id: no_report
  selector:
    path: scripts/report.sh
- id: no_parallel_batch
  selector:
    path: scripts/parallel_batch.sh
- id: no_dry_run
  selector:
    path: scripts/dry_run.sh
- id: no_checksum
