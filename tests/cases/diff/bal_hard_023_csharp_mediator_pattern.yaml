    src/Mediator/Mediator.cs: |
      using System;
      using System.Collections.Generic;
      using System.Linq;
      namespace App.Mediator
      {
          public class Mediator
          {
              private readonly Dictionary<Type, object> _handlers = new();
              private readonly List<object> _behaviors = new();
              public void Register<TRequest, TResponse>(IHandler<TRequest, TResponse> handler)
                  where TRequest : IRequest<TResponse>
              {
                  _handlers[typeof(TRequest)] = handler;
              }
              public void AddBehavior<TRequest, TResponse>(IPipelineBehavior<TRequest, TResponse> behavior)
                  where TRequest : IRequest<TResponse>
              {
                  _behaviors.Add(behavior);
              }
              public TResponse Send<TResponse>(IRequest<TResponse> request)
              {
                  var handler = _handlers[request.GetType()];
                  var method = handler.GetType().GetMethod("Handle");
                  Func<TResponse> handle = () => (TResponse)method.Invoke(handler, new object[] { request });
                  foreach (var behavior in _behaviors)
                  {
                      var behMethod = behavior.GetType().GetMethod("Handle");
                      if (behMethod != null)
                      {
                          var prev = handle;
                          handle = () => (TResponse)behMethod.Invoke(behavior, new object[] { request, prev });
                      }
                  }
                  return handle();
              }
          }
      }
    src/Behaviors/LoggingBehavior.cs: |
      namespace App.Behaviors
      {
          using System;
          using App.Mediator;
          public class LoggingBehavior<TRequest, TResponse> : IPipelineBehavior<TRequest, TResponse>
              where TRequest : IRequest<TResponse>
          {
              public TResponse Handle(TRequest request, Func<TResponse> next)
              {
                  Console.WriteLine($"Handling {typeof(TRequest).Name}");
                  var response = next();
                  Console.WriteLine($"Handled {typeof(TRequest).Name}");
                  return response;
              }
          }
      }
  commit_message: "feat: add pipeline behaviors to mediator"
