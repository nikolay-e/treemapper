    src/Mediator/IPipelineBehavior.cs: |
      namespace App.Mediator
      {
          using System;
          public interface IPipelineBehavior<TRequest, TResponse> where TRequest : IRequest<TResponse>
          {
              TResponse Handle(TRequest request, Func<TResponse> next);
