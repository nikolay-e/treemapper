name: kubernetes_007_volume_mount
repo:
  initial_files:
    config/server.yaml: |
      server:
        port: 8080
        host: 0.0.0.0
        read_timeout: 30s
        write_timeout: 30s
      database:
        pool_size: 10
        idle_timeout: 300s
      logging:
        level: info
        format: json
        output: stdout
    k8s/configmap.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: app-config
        namespace: production
      data:
        server.yaml: |
          server:
            port: 8080
            host: 0.0.0.0
            read_timeout: 30s
            write_timeout: 30s
          database:
            pool_size: 10
            idle_timeout: 300s
          logging:
            level: info
            format: json
            output: stdout
    k8s/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: myapp
        namespace: production
        labels:
          app: myapp
          version: v1
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: myapp
        template:
          metadata:
            labels:
              app: myapp
              version: v1
          spec:
            containers:
            - name: app
              image: myapp:v1.0.0
              ports:
              - containerPort: 8080
              volumeMounts: []
            volumes: []
    k8s/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: myapp
        namespace: production
      spec:
        selector:
          app: myapp
        ports:
        - port: 80
          targetPort: 8080
    k8s/storage/nfs-provisioner.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nfs-client-provisioner
        namespace: kube-system
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: nfs-client-provisioner
        template:
          spec:
            containers:
            - name: nfs-provisioner
              image: registry.k8s.io/sig-storage/nfs-subdir-external-provisioner:v4.0.2
              volumeMounts:
              - name: nfs-root
                mountPath: /persistentvolumes
            volumes:
            - name: nfs-root
              nfs:
                server: 10.0.0.50
                path: /exports
    k8s/apps/elasticsearch/data-volume.yaml: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: elasticsearch-data
        namespace: logging
      spec:
        accessModes:
        - ReadWriteOnce
        storageClassName: gp3-encrypted
        resources:
          requests:
            storage: 100Gi
  changed_files:
    config/server.yaml: |
      server:
        port: 8080
        host: 0.0.0.0
        read_timeout: 30s
        write_timeout: 30s
      database:
        pool_size: 10
        idle_timeout: 300s
      logging:
        level: info
        format: json
        output: stdout
    k8s/configmap.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: app-config
        namespace: production
      data:
        server.yaml: |
          server:
            port: 8080
            host: 0.0.0.0
            read_timeout: 30s
            write_timeout: 30s
          database:
            pool_size: 10
            idle_timeout: 300s
          logging:
            level: info
            format: json
            output: stdout
    k8s/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: myapp
        namespace: production
        labels:
          app: myapp
          version: v1
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: myapp
        template:
          metadata:
            labels:
              app: myapp
              version: v1
          spec:
            containers:
            - name: app
              image: myapp:v1.0.0
              ports:
              - containerPort: 8080
              volumeMounts:
              - name: config
                mountPath: /app/config
                readOnly: true
              - name: secrets
                mountPath: /app/secrets
                readOnly: true
              - name: tmp
                mountPath: /tmp
            volumes:
            - name: config
              configMap:
                name: app-config
            - name: secrets
              secret:
                secretName: app-secrets
            - name: tmp
              emptyDir: {}
    k8s/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: myapp
        namespace: production
      spec:
        selector:
          app: myapp
        ports:
        - port: 80
          targetPort: 8080
    k8s/storage/nfs-provisioner.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: nfs-client-provisioner
        namespace: kube-system
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: nfs-client-provisioner
        template:
          spec:
            containers:
            - name: nfs-provisioner
              image: registry.k8s.io/sig-storage/nfs-subdir-external-provisioner:v4.0.2
              volumeMounts:
              - name: nfs-root
                mountPath: /persistentvolumes
            volumes:
            - name: nfs-root
              nfs:
                server: 10.0.0.50
                path: /exports
    k8s/apps/elasticsearch/data-volume.yaml: |
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: elasticsearch-data
        namespace: logging
      spec:
        accessModes:
        - ReadWriteOnce
        storageClassName: gp3-encrypted
        resources:
          requests:
            storage: 100Gi
