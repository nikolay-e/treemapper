    src/main/java/ratelimit/TokenBucketLimiter.java: |
      package ratelimit;

      import java.time.Duration;
      import java.util.concurrent.ConcurrentHashMap;

      public class TokenBucketLimiter implements RateLimiter {
          private final int maxTokens;
          private final Duration refillInterval;
          private final ConcurrentHashMap<String, Integer> buckets = new ConcurrentHashMap<>();

          public TokenBucketLimiter(int maxTokens, Duration refillInterval) {
              this.maxTokens = maxTokens;
              this.refillInterval = refillInterval;
          }

          public boolean tryAcquire(String clientId, int cost) {
              int tokens = buckets.getOrDefault(clientId, maxTokens);
              if (tokens >= cost) {
                  buckets.put(clientId, tokens - cost);
                  return true;
              }
              return false;
          }

          public Duration getRetryAfter(String clientId) {
              return refillInterval;
          }
      }
