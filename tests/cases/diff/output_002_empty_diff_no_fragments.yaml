    services/session_store.py: |
      from datetime import datetime, timedelta

      DEFAULT_TTL = timedelta(hours=24)

      class SessionStore:
          def __init__(self, ttl: timedelta = DEFAULT_TTL):
              self.ttl = ttl
              self._sessions: dict[str, datetime] = {}

          def create(self, session_id: str) -> None:
              self._sessions[session_id] = datetime.utcnow()

          def is_valid(self, session_id: str) -> bool:
              created = self._sessions.get(session_id)
              if created is None:
                  return False
              return datetime.utcnow() - created < self.ttl

          def revoke(self, session_id: str) -> bool:
              return self._sessions.pop(session_id, None) is not None
    services/auth_provider.py: |
      from hashlib import sha256

      AUTH_SCHEME = "Bearer"
      TOKEN_LENGTH = 64

      class AuthProvider:
          def __init__(self, secret: str):
              self._secret = secret

          def generate_token(self, user_id: str) -> str:
              payload = f"{user_id}:{self._secret}"
              return sha256(payload.encode()).hexdigest()[:TOKEN_LENGTH]

          def verify_token(self, user_id: str, token: str) -> bool:
              expected = self.generate_token(user_id)
              return token == expected
