must_include_files:
  - Program.scala
  - Database.scala

must_include_content_from:
  Program.scala:
    - "Database.connect()"
    - 'Database.query("SELECT * FROM users")'
    - "IO(results.foreach(println))"
    - "Database.disconnect()"
    - "program.as(ExitCode.Success)"
  Database.scala:
    - "def connect(): IO[Unit]"
    - "def query(sql: String): IO[List[String]]"
    - "def disconnect(): IO[Unit]"

must_not_include:
  # HttpServer.scala: identical IOApp, different purpose
  - HttpServer
  - startServer
  - stopServer
  - "IO.never"
  # MigrationRunner.scala: database IO, independent
  - MigrationRunner
  - migrate
  - rollback
  - migrateAll
  # ConfigLoader.scala: IO config loading, independent
  - ConfigLoader
  - AppConfig
  - loadFromEnv
  # Logger.scala: IO logging, not called by Program
  - "[INFO"
  - "[ERROR"
  - "[DEBUG"
  - LocalDateTime

must_not_include_files:
  - HttpServer.scala
  - MigrationRunner.scala
  - config/ConfigLoader.scala
  - logging/Logger.scala

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
