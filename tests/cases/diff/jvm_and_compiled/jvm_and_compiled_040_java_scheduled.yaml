# Scenario: ScheduledTasks adds SLF4J logging and a new daily cron job.
#
# Diff: ScheduledTasks.java replaces System.out.println with logger.info()
# and adds a new @Scheduled(cron=...) dailyReport method.
#
# Reviewer questions:
#   Q1: "What is the schedule configuration for existing tasks?"
#       -> ScheduledTasks.java (CHANGED) shows fixedRate=60000 on cleanupTask
#          and cron expression on the new dailyReport method.
#
# Not needed:
#   - src/main/java/com/example/BatchProcessor.java: another scheduled component.
#     Uses @Scheduled too but has no dependency on ScheduledTasks.
#   - src/main/resources/application.yml: app config with scheduling properties.
#     Contains scheduling.enabled flag but ScheduledTasks doesn't read it.

initial:
  src/main/java/com/example/ScheduledTasks.java: |
    package com.example;

    import org.springframework.scheduling.annotation.Scheduled;
    import org.springframework.stereotype.Component;

    @Component
    public class ScheduledTasks {
        @Scheduled(fixedRate = 60000)
        public void cleanupTask() {
            System.out.println("Running cleanup");
        }
    }
  src/main/java/com/example/BatchProcessor.java: |
    package com.example;

    import org.springframework.scheduling.annotation.Scheduled;
    import org.springframework.stereotype.Component;

    @Component
    public class BatchProcessor {
        @Scheduled(fixedDelay = 300000)
        public void processBatch() {
            System.out.println("Processing batch");
        }

        @Scheduled(cron = "0 0 * * * ?")
        public void hourlyAggregation() {
            System.out.println("Hourly aggregation");
        }
    }
  src/main/resources/application.yml: |
    spring:
      task:
        scheduling:
          pool:
            size: 5
      application:
        name: scheduled-app

    logging:
      level:
        root: INFO
        com.example: DEBUG

changed:
  src/main/java/com/example/ScheduledTasks.java: |
    package com.example;

    import org.springframework.scheduling.annotation.Scheduled;
    import org.springframework.stereotype.Component;
    import org.slf4j.Logger;
    import org.slf4j.LoggerFactory;

    @Component
    public class ScheduledTasks {
        private static final Logger logger = LoggerFactory.getLogger(ScheduledTasks.class);

        @Scheduled(fixedRate = 60000)
        public void cleanupTask() {
            logger.info("Running cleanup");
        }

        @Scheduled(cron = "0 0 2 * * ?")
        public void dailyReport() {
            logger.info("Generating daily report");
        }
    }
  src/main/java/com/example/BatchProcessor.java: |
