# Scenario: EventHandler implements PartialFunctions for user and order events,
#   composes them with orElse, and uses lift for safe handling.
#
# Diff shows:
#   - class EventHandler {}  (empty)
#   + userHandler: PartialFunction[Event, String] for UserCreated/UserDeleted,
#     orderHandler for OrderPlaced, combinedHandler via orElse,
#     handle() using combinedHandler.lift(event)
#
# Reviewer questions:
#   Q1: "What event types exist — do UserCreated/UserDeleted/OrderPlaced exist?"
#       -> Needs Event.scala: sealed trait Event with UserCreated(name),
#          UserDeleted(id), OrderPlaced(orderId, amount).
#
#   Q2: "Is the combinedHandler exhaustive for all Event subtypes?"
#       -> Same file: three case classes. All covered by userHandler + orderHandler.
#
# Not needed for comprehension:
#   - CommandHandler.scala: IDENTICAL PartialFunction pattern — handlers
#     for Command types composed with orElse. HARDEST TRAP: same pattern.
#
#   - EventLogger.scala: Matches on Event types to log them. Same pattern
#     match on the same types. But logging doesn't help review handler.
#
#   - EventMetrics.scala: Counts events by type. Same "Event" vocabulary.
#     Independent of EventHandler.
#
#   - EventStore.scala: Persists events. Uses Event type. Independent.
#
#   - EventSerializer.scala: Serializes events to JSON. Same Event types.
#     Independent of handler composition logic.

initial:
  Event.scala: |
    sealed trait Event

    case class UserCreated(name: String) extends Event
    case class UserDeleted(id: String) extends Event
    case class OrderPlaced(orderId: String, amount: Double) extends Event

    object Event {
      def describe(event: Event): String = event match {
        case UserCreated(name) => s"User $name created"
        case UserDeleted(id) => s"User $id deleted"
        case OrderPlaced(id, amt) => s"Order $id for $$$amt"
      }
    }
  EventHandler.scala: |
    class EventHandler {}
  handlers/CommandHandler.scala: |
    sealed trait Command
    case class CreateCommand(name: String) extends Command
    case class DeleteCommand(id: String) extends Command
    case class UpdateCommand(id: String, data: String) extends Command

    class CommandHandler {
      val createHandler: PartialFunction[Command, String] = {
        case CreateCommand(name) => s"Created: $name"
      }

      val deleteHandler: PartialFunction[Command, String] = {
        case DeleteCommand(id) => s"Deleted: $id"
      }

      val combinedHandler: PartialFunction[Command, String] =
        createHandler orElse deleteHandler

      def handle(command: Command): Option[String] = {
        combinedHandler.lift(command)
      }
    }
  logging/EventLogger.scala: |
    object EventLogger {
      def logEvent(event: Event): Unit = event match {
        case UserCreated(name) => println(s"[LOG] User created: $name")
        case UserDeleted(id) => println(s"[LOG] User deleted: $id")
        case OrderPlaced(id, amt) => println(s"[LOG] Order placed: $id for $$$amt")
      }

      def logBatch(events: List[Event]): Unit = {
        events.foreach(logEvent)
      }

      def logWithTimestamp(event: Event): Unit = {
        println(s"[${System.currentTimeMillis}] ${Event.describe(event)}")
      }
    }
  metrics/EventMetrics.scala: |
    object EventMetrics {
      private var counts: Map[String, Int] = Map.empty

      def record(eventType: String): Unit = {
        counts = counts.updated(eventType, counts.getOrElse(eventType, 0) + 1)
      }

      def getCount(eventType: String): Int = counts.getOrElse(eventType, 0)

      def reset(): Unit = { counts = Map.empty }

      def totalEvents(): Int = counts.values.sum
    }
  store/EventStore.scala: |
    class EventStore {
      private var events: List[Event] = Nil

      def store(event: Event): Unit = {
        events = event :: events
      }

      def getAll(): List[Event] = events.reverse

      def getByType[T <: Event](implicit ct: scala.reflect.ClassTag[T]): List[T] = {
        events.collect { case e: T => e }.reverse
      }

      def count(): Int = events.size
    }

