    using FluentValidation;
    using MyApp.Models;

    namespace MyApp.Validators
    {
        public class UserValidator : AbstractValidator<UserDto>
        {
            public UserValidator()
            {
                RuleFor(x => x.Name)
                    .NotEmpty()
                    .MaximumLength(100);

                RuleFor(x => x.Email)
                    .NotEmpty()
                    .EmailAddress();

                RuleFor(x => x.Age)
                    .GreaterThan(0)
                    .LessThan(150);
            }
        }
    }

