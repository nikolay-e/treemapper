# Scenario: Validator struct is implemented to use String extension methods
#   isValidEmail() and trimmed from StringExtensions.swift.
#
# Diff shows:
#   - struct Validator {}  (empty)
#   + validateEmail(_ email: String) calling email.trimmed.isValidEmail()
#
# Reviewer questions:
#   Q1: "What does isValidEmail() do — is the regex correct?"
#       -> Needs StringExtensions.swift: extension String with isValidEmail()
#          using regex pattern for email format, and trimmed computed property.
#
#   Q2: "Does trimmed handle all whitespace cases?"
#       -> Same file: trimmed calls trimmingCharacters(in: .whitespacesAndNewlines).
#
# Not needed for comprehension:
#   - DateExtensions.swift: IDENTICAL extension pattern — extension on Date
#     type with computed properties and utility methods. HARDEST TRAP: same
#     Swift extension syntax, same file naming convention.
#
#   - IntExtensions.swift: Extension on Int with utility methods. Same
#     extension pattern. Different type, no dependency.
#
#   - ArrayExtensions.swift: Extension on Array with sortedUnique/median.
#     Same extension pattern. Different type, no dependency.
#
#   - RegexHelper.swift: Static regex matching utilities. Regex vocabulary
#     overlaps with isValidEmail's regex, but StringExtensions uses inline regex.
#
#   - InputSanitizer.swift: Sanitizes user input strings. Same "string
#     validation" vocabulary. Independent of Validator.

initial:
  extensions/StringExtensions.swift: |
    import Foundation

    extension String {
        func isValidEmail() -> Bool {
            let pattern = "[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
            return self.range(of: pattern, options: .regularExpression) != nil
        }

        var trimmed: String {
            trimmingCharacters(in: .whitespacesAndNewlines)
        }

        var isBlank: Bool {
            trimmed.isEmpty
        }

        func truncated(to length: Int) -> String {
            if self.count <= length { return self }
            return String(self.prefix(length)) + "..."
        }
    }
  Validator.swift: |
    struct Validator {}
  extensions/DateExtensions.swift: |
    import Foundation

    extension Date {
        var isToday: Bool {
            Calendar.current.isDateInToday(self)
        }

        var isYesterday: Bool {
            Calendar.current.isDateInYesterday(self)
        }

        func formatted(as format: String) -> String {
            let formatter = DateFormatter()
            formatter.dateFormat = format
            return formatter.string(from: self)
        }

        var timeAgo: String {
            let interval = Date().timeIntervalSince(self)
            if interval < 60 { return "just now" }
            if interval < 3600 { return "\(Int(interval / 60))m ago" }
            return "\(Int(interval / 3600))h ago"
        }
    }
  extensions/IntExtensions.swift: |
    import Foundation

    extension Int {
        var isEven: Bool { self % 2 == 0 }
        var isOdd: Bool { self % 2 != 0 }

        func clamped(to range: ClosedRange<Int>) -> Int {
            return Swift.min(Swift.max(self, range.lowerBound), range.upperBound)
        }

        var ordinal: String {
            let suffix: String
            switch self % 10 {
            case 1 where self % 100 != 11: suffix = "st"
            case 2 where self % 100 != 12: suffix = "nd"
            case 3 where self % 100 != 13: suffix = "rd"
            default: suffix = "th"
            }
            return "\(self)\(suffix)"
        }
    }
  extensions/ArrayExtensions.swift: |
    extension Array where Element: Comparable {
        func sortedUnique() -> [Element] {
            return Array(Set(self)).sorted()
        }

        var median: Element? {
            guard !isEmpty else { return nil }
            let sorted = self.sorted()
            return sorted[sorted.count / 2]
        }
    }

    extension Array where Element: Hashable {
        func removingDuplicates() -> [Element] {
            var seen = Set<Element>()
            return filter { seen.insert($0).inserted }
        }
    }
  helpers/RegexHelper.swift: |
    import Foundation

    struct RegexHelper {
        static func matches(_ input: String, pattern: String) -> Bool {
            return input.range(of: pattern, options: .regularExpression) != nil
        }

        static func extractMatches(_ input: String, pattern: String) -> [String] {
            guard let regex = try? NSRegularExpression(pattern: pattern) else { return [] }
            let range = NSRange(input.startIndex..., in: input)
            return regex.matches(in: input, range: range).compactMap {
                Range($0.range, in: input).map { String(input[$0]) }
            }
        }

        static func replaceMatches(_ input: String, pattern: String, with replacement: String) -> String {
            guard let regex = try? NSRegularExpression(pattern: pattern) else { return input }
            let range = NSRange(input.startIndex..., in: input)
            return regex.stringByReplacingMatches(in: input, range: range, withTemplate: replacement)
        }
    }
  helpers/InputSanitizer.swift: |
    import Foundation

    struct InputSanitizer {
        static func sanitize(_ input: String) -> String {
            return input
                .trimmingCharacters(in: .whitespacesAndNewlines)
                .replacingOccurrences(of: "<", with: "&lt;")
                .replacingOccurrences(of: ">", with: "&gt;")
        }

        static func stripHTML(_ input: String) -> String {
            return input.replacingOccurrences(
                of: "<[^>]+>",
                with: "",
                options: .regularExpression
            )
        }

        static func normalizeWhitespace(_ input: String) -> String {
            return input.components(separatedBy: .whitespacesAndNewlines)
                .filter { !$0.isEmpty }
                .joined(separator: " ")
        }
    }

