# Scenario: UserController uses optional binding to safely unwrap User from UserRepository
# Changed: UserController.swift gains if-let binding, references UserRepository.fetchUser
# Reviewer questions: What happens if repository is empty? Should showUser return an Optional<String> instead?
# Trap 1: ErrorFormatter.swift — handles error display strings, shares "user not found" vocabulary but no dep
# Trap 2: CacheManager.swift — caches data by String keys, similar Optional return patterns but unrelated
max_enrichment: 7.8
initial:
  UserRepository.swift: |
    struct User {
        let id: String
        let name: String
    }

    class UserRepository {
        private var users: [String: User] = [:]

        func fetchUser(id: String) -> User? {
            return users[id]
        }

        func save(user: User) {
            users[user.id] = user
        }
    }
  UserController.swift: |
    class UserController {}
  ErrorFormatter.swift: |
    import Foundation

    struct ErrorFormatter {
        static func formatNotFound(entity: String, id: String) -> String {
            return "\(entity) with id '\(id)' was not found"
        }

        static func formatValidation(field: String, reason: String) -> String {
            return "Validation failed for \(field): \(reason)"
        }

        static func formatServerError(code: Int) -> String {
            return "Internal server error (code: \(code))"
        }
    }
  CacheManager.swift: |
    import Foundation

    class CacheManager<T> {
        private var storage: [String: (value: T, expiry: Date)] = [:]
        private let defaultTTL: TimeInterval

        init(defaultTTL: TimeInterval = 300) {
            self.defaultTTL = defaultTTL
        }

        func get(key: String) -> T? {
            guard let entry = storage[key], entry.expiry > Date() else {
                storage.removeValue(forKey: key)
                return nil
            }
            return entry.value
        }

        func set(key: String, value: T) {
            storage[key] = (value, Date().addingTimeInterval(defaultTTL))
        }
    }
changed:
  UserRepository.swift: |
    struct User {
        let id: String
        let name: String
    }

    class UserRepository {
        private var users: [String: User] = [:]

        func fetchUser(id: String) -> User? {
            return users[id]
        }

        func save(user: User) {
            users[user.id] = user
        }
    }
  UserController.swift: |
    class UserController {
        let repository = UserRepository()

        func showUser(id: String) -> String {
            if let user = repository.fetchUser(id: id) {
                return "User: \(user.name)"
            } else {
                return "User not found"
            }
        }
    }
