    package com.example;

    import java.util.ArrayList;
    import java.util.List;

    public class DataProcessor {
        public List<String> filterActive(List<User> users) {
            List<String> result = new ArrayList<>();
            for (User user : users) {
                if (user.isActive()) {
                    result.add(user.getName());
                }
            }
            return result;
        }
