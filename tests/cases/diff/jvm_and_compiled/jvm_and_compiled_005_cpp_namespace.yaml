# Scenario: app.cpp goes from empty main to using myapp::utils::trim() and
#   myapp::utils::toUpper() via 'using' declarations from utils.h/utils.cpp.
#
# Reviewer questions:
#   Q1: "What do trim() and toUpper() do? Are they correct for the usage?"
#       -> include/utils.h declares them in myapp::utils namespace.
#          src/utils.cpp implements: trim removes leading/trailing whitespace,
#          toUpper transforms to uppercase. app.cpp calls toUpper(trim(input)).
#
#   Q2: "Are the using declarations correct — do they match the namespace?"
#       -> Diff: 'using myapp::utils::trim' and 'using myapp::utils::toUpper'.
#          include/utils.h: declared in namespace myapp::utils. Must match.
#
#   Q3: "What happens with input = '  Hello World  '?"
#       -> trim removes spaces -> "Hello World", toUpper -> "HELLO WORLD".
#          Reviewer needs utils.cpp to verify this chain is correct.
#
# Not needed:
#   - src/parser.cpp: Also uses myapp::utils::trim(). Direct structural edge
#     (same namespace, same function). Different caller, different context.
#
#   - include/io_utils.h: Another utility namespace (myapp::io). Same nested
#     namespace pattern. Different utilities (file I/O). Similar naming.
#
#   - src/config.cpp: Uses myapp::utils::toUpper() for case-insensitive
#     config keys. Same function, different caller.
#
#   - tests/utils_test.cpp: Tests trim() and toUpper(). Same functions.
#     But test cases don't help review the app's composition of these functions.

max_enrichment: 12.1
initial:
  include/utils.h: |
    #pragma once
    #include <string>

    namespace myapp::utils {

    std::string trim(const std::string& s);
    std::string toUpper(const std::string& s);

    }

  src/utils.cpp: |
    #include "utils.h"
    #include <algorithm>
    #include <cctype>

    namespace myapp::utils {

    std::string trim(const std::string& s) {
        size_t start = s.find_first_not_of(" \t\n");
        size_t end = s.find_last_not_of(" \t\n");
        return (start == std::string::npos) ? "" : s.substr(start, end - start + 1);
    }

    std::string toUpper(const std::string& s) {
        std::string result = s;
        std::transform(result.begin(), result.end(), result.begin(), ::toupper);
        return result;
    }

    }

  src/app.cpp: |
    #include <iostream>
    int main() { return 0; }

  src/parser.cpp: |
    #include "utils.h"
    #include <string>
    #include <vector>

    using myapp::utils::trim;

    namespace myapp::parser {

    std::vector<std::string> splitAndTrim(const std::string& input, char delim) {
        std::vector<std::string> tokens;
        std::string current;
        for (char c : input) {
            if (c == delim) {
                auto trimmed = trim(current);
                if (!trimmed.empty()) tokens.push_back(trimmed);
                current.clear();
            } else {
                current += c;
            }
        }
        auto trimmed = trim(current);
        if (!trimmed.empty()) tokens.push_back(trimmed);
        return tokens;
    }

    }

  include/io_utils.h: |
    #pragma once
    #include <string>
    #include <fstream>

    namespace myapp::io {

    std::string readFile(const std::string& path);
    void writeFile(const std::string& path, const std::string& content);
    bool fileExists(const std::string& path);

    }

  src/config.cpp: |
    #include "utils.h"
    #include <unordered_map>
    #include <string>

    using myapp::utils::trim;
    using myapp::utils::toUpper;

    class ConfigLoader {
        std::unordered_map<std::string, std::string> entries_;
    public:
        void load(const std::string& line) {
            auto eq = line.find('=');
            if (eq == std::string::npos) return;
            auto key = toUpper(trim(line.substr(0, eq)));
            auto val = trim(line.substr(eq + 1));
            entries_[key] = val;
        }

        std::string get(const std::string& key) const {
            auto it = entries_.find(toUpper(key));
            return it != entries_.end() ? it->second : "";
        }
    };

  tests/utils_test.cpp: |
    #include "utils.h"
    #include <cassert>

    void test_trim() {
        assert(myapp::utils::trim("  hello  ") == "hello");
        assert(myapp::utils::trim("") == "");
        assert(myapp::utils::trim("no-spaces") == "no-spaces");
    }

    void test_toUpper() {
        assert(myapp::utils::toUpper("hello") == "HELLO");
        assert(myapp::utils::toUpper("Hello World") == "HELLO WORLD");
    }

changed:
  src/app.cpp: |
    #include "utils.h"
    #include <iostream>

    using myapp::utils::trim;
    using myapp::utils::toUpper;

    int main() {
        std::string input = "  Hello World  ";
        std::cout << toUpper(trim(input)) << std::endl;
        return 0;
    }

must_include_files:
  - src/app.cpp
  # Q1+Q2: Reviewer needs utils.h for namespace declarations and utils.cpp
  # for implementations to verify trim/toUpper behavior.
  - include/utils.h
  - src/utils.cpp

must_include_content_from:
  src/app.cpp:
    - "using myapp::utils::trim"
    - "using myapp::utils::toUpper"
    - "toUpper(trim(input))"
  include/utils.h:
    - "namespace myapp::utils"
    - "std::string trim(const std::string& s)"
    - "std::string toUpper(const std::string& s)"
  src/utils.cpp:
    - "find_first_not_of"
    - "std::transform"

must_not_include:
  # --- parser.cpp: uses trim(), different caller ---
  - splitAndTrim
  - "myapp::parser"
  - "delim"
  # --- io_utils.h: different utility namespace ---
  - "myapp::io"
  - readFile
  - writeFile
  - fileExists
  # --- config.cpp: uses trim/toUpper, different caller ---
  - ConfigLoader
  - "line.find('=')"
  - entries_
  # --- tests ---
  - test_trim
  - test_toUpper
  - "no-spaces"

must_not_include_files:
  - src/parser.cpp
  - include/io_utils.h
  - src/config.cpp
  - tests/utils_test.cpp

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
