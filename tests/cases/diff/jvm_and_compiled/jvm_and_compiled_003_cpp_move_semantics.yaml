# Scenario: processor.cpp goes from empty main to using Buffer's move semantics
#   — createBuffer returns Buffer by value (NRVO/move), processBuffer takes
#   Buffer by value, main uses std::move to transfer ownership.
#
# Reviewer questions:
#   Q1: "What are Buffer's move operations? Is std::move(b) safe here?"
#       -> include/buffer.h: Buffer has move ctor and move assignment that
#          transfer data_/size_ and null out the source. Copy is deleted.
#          After std::move(b), b.data_ == nullptr.
#
#   Q2: "Does createBuffer trigger copy elision (NRVO) or move?"
#       -> include/buffer.h: Copy is deleted, so NRVO must apply. If NRVO
#          fails, move ctor is used. Reviewer must verify Buffer has
#          move constructor.
#
#   Q3: "Is Buffer properly RAII — no leaks on move?"
#       -> include/buffer.h: Destructor deletes data_. Move ctor nulls source.
#          Move assignment deletes existing data_ before transfer.
#
# Not needed:
#   - src/string_buffer.cpp: Another move-only class. IDENTICAL pattern
#     (deleted copy, move ctor/assign, RAII destructor). Different resource.
#
#   - include/buffer_pool.h: Pool of Buffer objects. Uses std::move to
#     transfer Buffers. Direct structural edge. But pool management
#     doesn't help review the move semantics themselves.
#
#   - src/io_handler.cpp: Also creates and moves Buffers. Same types.
#     But another consumer doesn't help review this usage.
#
#   - tests/buffer_test.cpp: Tests Buffer move ctor and assignment.
#     Verifies post-move state. But tests don't help review whether
#     processor.cpp's usage is correct.

max_enrichment: 10.2
initial:
  include/buffer.h: |
    #pragma once
    #include <cstddef>
    #include <utility>

    class Buffer {
        char* data_;
        size_t size_;

    public:
        Buffer(size_t size) : data_(new char[size]), size_(size) {}
        ~Buffer() { delete[] data_; }

        Buffer(Buffer&& other) noexcept
            : data_(other.data_), size_(other.size_) {
            other.data_ = nullptr;
            other.size_ = 0;
        }

        Buffer& operator=(Buffer&& other) noexcept {
            if (this != &other) {
                delete[] data_;
                data_ = other.data_;
                size_ = other.size_;
                other.data_ = nullptr;
                other.size_ = 0;
            }
            return *this;
        }

        Buffer(const Buffer&) = delete;
        Buffer& operator=(const Buffer&) = delete;
    };

  src/processor.cpp: |
    #include <iostream>
    int main() { return 0; }

  src/string_buffer.cpp: |
    #include <cstddef>
    #include <cstring>

    class StringBuffer {
        char* data_;
        size_t length_;
        size_t capacity_;
    public:
        StringBuffer(size_t cap = 64)
            : data_(new char[cap]), length_(0), capacity_(cap) {
            data_[0] = '\0';
        }

        ~StringBuffer() { delete[] data_; }

        StringBuffer(StringBuffer&& other) noexcept
            : data_(other.data_), length_(other.length_), capacity_(other.capacity_) {
            other.data_ = nullptr;
            other.length_ = 0;
            other.capacity_ = 0;
        }

        StringBuffer& operator=(StringBuffer&& other) noexcept {
            if (this != &other) {
                delete[] data_;
                data_ = other.data_;
                length_ = other.length_;
                capacity_ = other.capacity_;
                other.data_ = nullptr;
                other.length_ = 0;
                other.capacity_ = 0;
            }
            return *this;
        }

        StringBuffer(const StringBuffer&) = delete;
        StringBuffer& operator=(const StringBuffer&) = delete;
    };

  include/buffer_pool.h: |
    #pragma once
    #include "buffer.h"
    #include <vector>

    class BufferPool {
        std::vector<Buffer> available_;
    public:
        Buffer acquire(size_t size) {
            if (!available_.empty()) {
                Buffer buf = std::move(available_.back());
                available_.pop_back();
                return buf;
            }
            return Buffer(size);
        }

        void release(Buffer buf) {
            available_.push_back(std::move(buf));
        }

        size_t availableCount() const { return available_.size(); }
    };

  src/io_handler.cpp: |
    #include "buffer.h"
    #include <utility>

    class IoHandler {
    public:
        Buffer readChunk(size_t size) {
            Buffer buf(size);
            return buf;
        }

        void writeChunk(Buffer buf) {
            // write buffer contents
        }

        void transfer(size_t size) {
            Buffer data = readChunk(size);
            writeChunk(std::move(data));
        }
    };

  tests/buffer_test.cpp: |
    #include "buffer.h"
    #include <cassert>
    #include <utility>

    void test_move_constructor() {
        Buffer a(100);
        Buffer b(std::move(a));
        // a should be in moved-from state
    }

    void test_move_assignment() {
        Buffer a(100);
        Buffer b(200);
        b = std::move(a);
        // a should be in moved-from state
    }

changed:
  src/processor.cpp: |
    #include "buffer.h"
    #include <utility>

    Buffer createBuffer(size_t size) {
        Buffer buf(size);
        return buf;
    }

    void processBuffer(Buffer buf) {
    }

    int main() {
        Buffer b = createBuffer(1024);
        processBuffer(std::move(b));
        return 0;
    }

