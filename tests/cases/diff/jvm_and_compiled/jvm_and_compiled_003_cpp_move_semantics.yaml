  - StringBuffer
  - capacity_
  - length_
  # --- buffer_pool.h: manages Buffers, different concern ---
  - BufferPool
  - acquire
  - release
  - availableCount
  # --- io_handler.cpp: another Buffer consumer ---
  - IoHandler
  - readChunk
  - writeChunk
  - transfer
  # --- tests ---
  - test_move_constructor
  - test_move_assignment

must_not_include_files:
  - src/string_buffer.cpp
  - include/buffer_pool.h
  - src/io_handler.cpp
  - tests/buffer_test.cpp

max_fragments: 6
max_files: 3
add_garbage_files: false
