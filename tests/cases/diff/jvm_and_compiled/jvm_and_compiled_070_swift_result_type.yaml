# Scenario: DataLoader uses Result<Data, APIError> for type-safe error handling during URL loading
# Changed: DataLoader.swift gains load(from:) returning Result and process(url:) with switch on result
# Reviewer questions: Is .invalidResponse the right error for nil data? Should process() return something?
# Trap 1: NetworkMonitor.swift — monitors reachability, shares "network" domain but no dep on DataLoader
# Trap 2: RetryPolicy.swift — defines retry strategies for failures, shares error-handling vocabulary but unrelated
max_enrichment: 6.8
initial:
  APIError.swift: |
    enum APIError: Error {
        case networkError
        case invalidResponse
        case decodingError
    }
  DataLoader.swift: |
    struct DataLoader {}
  NetworkMonitor.swift: |
    import Foundation

    class NetworkMonitor {
        enum ConnectionType {
            case wifi, cellular, none
        }

        private(set) var isConnected = true
        private(set) var connectionType: ConnectionType = .wifi

        func startMonitoring() {
            isConnected = true
            connectionType = .wifi
        }

        func stopMonitoring() {
            isConnected = false
            connectionType = .none
        }
    }
  RetryPolicy.swift: |
    import Foundation

    struct RetryPolicy {
        let maxAttempts: Int
        let baseDelay: TimeInterval
        let backoffMultiplier: Double

        init(maxAttempts: Int = 3, baseDelay: TimeInterval = 1.0, backoffMultiplier: Double = 2.0) {
            self.maxAttempts = maxAttempts
            self.baseDelay = baseDelay
            self.backoffMultiplier = backoffMultiplier
        }

        func delay(forAttempt attempt: Int) -> TimeInterval {
            return baseDelay * pow(backoffMultiplier, Double(attempt))
        }

        func shouldRetry(attempt: Int) -> Bool {
            return attempt < maxAttempts
        }
    }
changed:
  APIError.swift: |
    enum APIError: Error {
        case networkError
        case invalidResponse
        case decodingError
    }
  DataLoader.swift: |
    import Foundation

    struct DataLoader {
        func load(from url: URL) -> Result<Data, APIError> {
            guard let data = "test".data(using: .utf8) else {
                return .failure(.invalidResponse)
            }
            return .success(data)
        }

        func process(url: URL) {
            let result = load(from: url)
            switch result {
            case .success(let data):
                print("Loaded \(data.count) bytes")
            case .failure(let error):
                print("Error: \(error)")
            }
        }
    }
