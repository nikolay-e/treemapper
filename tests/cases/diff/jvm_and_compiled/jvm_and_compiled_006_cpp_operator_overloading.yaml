# Scenario: physics.cpp goes from empty main to physics simulation using
#   Vector2D operator overloads (+, *, +=) from vector2d.h.
#
# Reviewer questions:
#   Q1: "Does pos + vel * dt work — what's the operator precedence?"
#       -> include/vector2d.h: operator* returns Vector2D(x*scalar, y*scalar),
#          operator+ returns Vector2D(x+other.x, y+other.y). C++ precedence:
#          * before +, so vel * dt evaluates first, then pos + result.
#
#   Q2: "Does position += velocity * 0.1 modify position in-place?"
#       -> include/vector2d.h: operator+= modifies x and y in-place and
#          returns *this. operator* creates temporary, then += adds it.
#
#   Q3: "What are the member types x, y?"
#       -> include/vector2d.h: public double x, y. All operators work on
#          doubles. Reviewer must verify 0.1 and dt are compatible types.
#
# Not needed:
#   - include/matrix2d.h: Matrix class with operator overloads (+, *).
#     IDENTICAL pattern (operator+, operator*). Same math domain.
#     Different class (matrices vs vectors). Hardest trap.
#
#   - src/renderer.cpp: Uses Vector2D for screen positions. Direct structural
#     edge (includes vector2d.h, uses operator+). But rendering logic
#     doesn't help review whether physics calculations use operators correctly.
#
#   - include/color.h: Another class with operator overloads (blend via +).
#     Same operator pattern. Different domain entirely.
#
#   - tests/vector_test.cpp: Tests Vector2D operators. Same types. But test
#     assertions don't help review the physics usage.

initial:
  include/vector2d.h: |
    #pragma once

    class Vector2D {
    public:
        double x, y;

        Vector2D(double x = 0, double y = 0) : x(x), y(y) {}

        Vector2D operator+(const Vector2D& other) const {
            return Vector2D(x + other.x, y + other.y);
        }

        Vector2D operator-(const Vector2D& other) const {
            return Vector2D(x - other.x, y - other.y);
        }

        Vector2D operator*(double scalar) const {
            return Vector2D(x * scalar, y * scalar);
        }

        Vector2D& operator+=(const Vector2D& other) {
            x += other.x;
            y += other.y;
            return *this;
        }
    };

  src/physics.cpp: |
    #include <iostream>
    int main() { return 0; }

  include/matrix2d.h: |
    #pragma once

    class Matrix2D {
    public:
        double m[2][2];

        Matrix2D() : m{{1,0},{0,1}} {}
        Matrix2D(double a, double b, double c, double d) : m{{a,b},{c,d}} {}

        Matrix2D operator+(const Matrix2D& other) const {
            return Matrix2D(
                m[0][0]+other.m[0][0], m[0][1]+other.m[0][1],
                m[1][0]+other.m[1][0], m[1][1]+other.m[1][1]);
        }

        Matrix2D operator*(const Matrix2D& other) const {
            return Matrix2D(
                m[0][0]*other.m[0][0] + m[0][1]*other.m[1][0],
                m[0][0]*other.m[0][1] + m[0][1]*other.m[1][1],
                m[1][0]*other.m[0][0] + m[1][1]*other.m[1][0],
                m[1][0]*other.m[0][1] + m[1][1]*other.m[1][1]);
        }

        double determinant() const {
            return m[0][0]*m[1][1] - m[0][1]*m[1][0];
        }
    };

  src/renderer.cpp: |
    #include "vector2d.h"
    #include <iostream>

    class Renderer {
        Vector2D offset_;
        double scale_;
    public:
        Renderer(double scale) : scale_(scale) {}

        Vector2D worldToScreen(const Vector2D& worldPos) {
            return worldPos * scale_ + offset_;
        }

        void setOffset(const Vector2D& offset) { offset_ = offset; }

        void drawPoint(const Vector2D& pos) {
            auto screen = worldToScreen(pos);
            std::cout << "Draw at " << screen.x << "," << screen.y << std::endl;
        }
    };

  include/color.h: |
    #pragma once
    #include <algorithm>

    class Color {
    public:
        float r, g, b, a;

        Color(float r=0, float g=0, float b=0, float a=1)
            : r(r), g(g), b(b), a(a) {}

        Color operator+(const Color& other) const {
            return Color(
                std::min(r+other.r, 1.0f),
                std::min(g+other.g, 1.0f),
                std::min(b+other.b, 1.0f),
                std::min(a+other.a, 1.0f));
        }

        Color operator*(float scalar) const {
            return Color(r*scalar, g*scalar, b*scalar, a);
        }
    };

  tests/vector_test.cpp: |
    #include "vector2d.h"
    #include <cassert>
    #include <cmath>

    void test_add() {
        Vector2D a(1, 2);
        Vector2D b(3, 4);
        auto c = a + b;
        assert(c.x == 4 && c.y == 6);
    }

    void test_scalar_multiply() {
        Vector2D v(2, 3);
        auto r = v * 2.0;
        assert(r.x == 4 && r.y == 6);
    }

    void test_plus_equals() {
        Vector2D a(1, 1);
        a += Vector2D(2, 3);
        assert(a.x == 3 && a.y == 4);
    }

changed:
  src/physics.cpp: |
    #include "vector2d.h"

    Vector2D computePosition(Vector2D pos, Vector2D vel, double dt) {
        return pos + vel * dt;
    }

    void simulate() {
        Vector2D position(0, 0);
        Vector2D velocity(1, 2);
        position += velocity * 0.1;
    }

must_include_files:
  - src/physics.cpp
  # Q1+Q2+Q3: Reviewer needs Vector2D to verify operator+, operator*, and
  # operator+= all exist with correct signatures and return types.
  - include/vector2d.h

must_include_content_from:
  src/physics.cpp:
    - "return pos + vel * dt"
    - "position += velocity * 0.1"
    - "Vector2D computePosition"
  include/vector2d.h:
    - "Vector2D operator+(const Vector2D& other) const"
    - "Vector2D operator*(double scalar) const"
    - "Vector2D& operator+=(const Vector2D& other)"
    - "double x, y"

must_not_include:
  # --- matrix2d.h: identical operator pattern, different math type ---
  - Matrix2D
  - determinant
  - "m[2][2]"
  # --- renderer.cpp: uses Vector2D operators, different concern ---
  - Renderer
  - worldToScreen
  - drawPoint
  - scale_
  # --- color.h: operator overloads on colors ---
  - "class Color"
  - "float r, g, b"
  - "std::min"
  # --- tests ---
  - test_add
  - test_scalar_multiply
  - test_plus_equals

must_not_include_files:
  - include/matrix2d.h
  - src/renderer.cpp
  - include/color.h
  - tests/vector_test.cpp

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
