# Scenario: Kotlin User data class gains email and active fields. The
#   existing UserMapper maps User to UserDto but doesn't handle new fields.
#
# Diff shows:
#   - data class User(val id: Long, val name: String)
#   + val email: String, val active: Boolean = true
#
# Reviewer questions:
#   Q1: "What code maps User to UserDto — will it handle email/active?"
#       -> Needs UserMapper.kt: maps User to UserDto with only id/name.
#          Reviewer must spot the missing email/active in the mapper.
#
#   Q2: "What is UserDto — does it have email/active fields?"
#       -> Same file: UserDto(id, name) — no email/active. Both the
#          mapper and DTO are stale.
#
# Not needed for comprehension:
#   - ProductMapper.kt: IDENTICAL mapper pattern — maps Product to ProductDto.
#     Same mapping vocabulary. HARDEST TRAP: structurally identical mapper.
#
#   - UserRepository.kt: Persistence for User with findById/save.
#     Uses User type. But CRUD operations don't help review field changes.
#
#   - UserValidator.kt: Validates user fields including email format.
#     Same "email" vocabulary. But validation is independent.
#
#   - UserSerializer.kt: Serializes User to JSON. References User properties.
#     Same field accesses. But serialization is independent.
#
#   - UserFactory.kt: Creates User instances with defaults. References
#     User constructor. But factory creation is independent.

max_enrichment: 4.7
initial:
  src/main/kotlin/com/example/User.kt: |
    package com.example

    data class User(
        val id: Long,
        val name: String
    )
  src/main/kotlin/com/example/UserMapper.kt: |
    package com.example

    object UserMapper {
        fun toDto(user: User): UserDto = UserDto(user.id, user.name)
        fun fromDto(dto: UserDto): User = User(dto.id, dto.name)
    }

    data class UserDto(val id: Long, val name: String)
  src/main/kotlin/com/example/product/ProductMapper.kt: |
    package com.example.product

    object ProductMapper {
        fun toDto(product: Product): ProductDto = ProductDto(product.id, product.name, product.price)
        fun fromDto(dto: ProductDto): Product = Product(dto.id, dto.name, dto.price)
    }

    data class Product(val id: Long, val name: String, val price: Double)
    data class ProductDto(val id: Long, val name: String, val price: Double)
  src/main/kotlin/com/example/UserRepository.kt: |
    package com.example

    class UserRepository {
        private val users = mutableMapOf<Long, User>()

        fun save(user: User) {
            users[user.id] = user
        }

        fun findById(id: Long): User? = users[id]

        fun findAll(): List<User> = users.values.toList()

        fun deleteById(id: Long) {
            users.remove(id)
        }
    }
  src/main/kotlin/com/example/UserValidator.kt: |
    package com.example

    class UserValidator {
        fun validate(name: String): Boolean {
            return name.isNotBlank() && name.length in 2..100
        }

        fun validateEmail(email: String): Boolean {
            return email.contains("@") && email.contains(".")
        }

        fun validateAll(name: String, email: String): List<String> {
            val errors = mutableListOf<String>()
            if (!validate(name)) errors.add("Invalid name")
            if (!validateEmail(email)) errors.add("Invalid email")
            return errors
        }
    }
  src/main/kotlin/com/example/UserSerializer.kt: |
    package com.example

    import kotlinx.serialization.encodeToString
    import kotlinx.serialization.json.Json

    object UserSerializer {
        private val json = Json { prettyPrint = true }

        fun toJson(user: User): String {
            return """{"id":${user.id},"name":"${user.name}"}"""
        }

        fun toJsonList(users: List<User>): String {
            return users.joinToString(",", "[", "]") { toJson(it) }
        }
    }
  src/main/kotlin/com/example/UserFactory.kt: |
    package com.example

    object UserFactory {
        private var nextId = 1L

        fun create(name: String): User = User(nextId++, name)

        fun createBatch(names: List<String>): List<User> = names.map { create(it) }

        fun createDefault(): User = create("Guest")
    }

