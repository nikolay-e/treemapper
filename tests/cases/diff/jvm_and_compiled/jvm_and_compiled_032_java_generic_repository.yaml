  src/main/java/com/example/cache/CacheableRepository.java: |
    package com.example.cache;

    import java.util.*;

    public class CacheableRepository<T extends Entity<ID>, ID> implements Repository<T, ID> {
        private final Repository<T, ID> delegate;
        private final Map<ID, T> cache = new HashMap<>();

        public CacheableRepository(Repository<T, ID> delegate) {
            this.delegate = delegate;
        }

        @Override
        public void save(T entity) {
            cache.put(entity.getId(), entity);
            delegate.save(entity);
        }

        @Override
        public Optional<T> findById(ID id) {
            return Optional.ofNullable(cache.get(id))
                .or(() -> delegate.findById(id));
        }

        @Override
        public List<T> findAll() { return delegate.findAll(); }

        @Override
        public void delete(ID id) {
            cache.remove(id);
            delegate.delete(id);
        }
    }

