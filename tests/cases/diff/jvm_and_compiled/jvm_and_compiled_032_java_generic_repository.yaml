      package com.example;

      import java.util.HashMap;
      import java.util.Map;

      public class UserRepository {
          private final Map<Long, User> storage = new HashMap<>();

          public void save(User user) {
              storage.put(user.getId(), user);
          }

          public User findById(Long id) {
              return storage.get(id);
          }
      }
    src/main/java/com/example/service/CrudService.java: |
      package com.example.service;

      import java.util.List;
      import java.util.Optional;

      public class CrudService<T extends Entity<ID>, ID> {
          private final Repository<T, ID> repository;

          public CrudService(Repository<T, ID> repository) {
              this.repository = repository;
          }

          public T save(T entity) {
              repository.save(entity);
              return entity;
          }

          public Optional<T> getById(ID id) {
              return repository.findById(id);
          }

          public List<T> getAll() {
              return repository.findAll();
          }
      }
    src/main/java/com/example/jpa/JpaUserRepository.java: |
      package com.example.jpa;

      import org.springframework.data.jpa.repository.JpaRepository;
      import org.springframework.stereotype.Repository;
      import java.util.List;

      @Repository
      public interface JpaUserRepository extends JpaRepository<User, Long> {
          List<User> findByName(String name);
          List<User> findByEmailContaining(String domain);
          boolean existsByEmail(String email);
      }
    src/main/java/com/example/UserEntity.java: |
      package com.example;

      public class UserEntity implements Entity<Long> {
          private Long id;
          private String name;
          private String email;

          public UserEntity(Long id, String name, String email) {
              this.id = id;
              this.name = name;
              this.email = email;
          }

          @Override
          public Long getId() { return id; }
          public String getName() { return name; }
          public String getEmail() { return email; }
      }
    src/main/java/com/example/factory/RepositoryFactory.java: |
      package com.example.factory;

      public class RepositoryFactory {
          public static <T extends Entity<ID>, ID> Repository<T, ID> createInMemory() {
              return new InMemoryRepository<>();
          }

          public static <T extends Entity<ID>, ID> Repository<T, ID> createCacheable() {
              return new CacheableRepository<>(new InMemoryRepository<>());
          }
      }
    src/main/java/com/example/cache/CacheableRepository.java: |
      package com.example.cache;

      import java.util.*;

      public class CacheableRepository<T extends Entity<ID>, ID> implements Repository<T, ID> {
          private final Repository<T, ID> delegate;
          private final Map<ID, T> cache = new HashMap<>();

          public CacheableRepository(Repository<T, ID> delegate) {
              this.delegate = delegate;
          }

          @Override
          public void save(T entity) {
              cache.put(entity.getId(), entity);
              delegate.save(entity);
          }

          @Override
          public Optional<T> findById(ID id) {
              return Optional.ofNullable(cache.get(id))
                  .or(() -> delegate.findById(id));
          }

          @Override
          public List<T> findAll() { return delegate.findAll(); }

          @Override
          public void delete(ID id) {
              cache.remove(id);
              delegate.delete(id);
          }
      }
