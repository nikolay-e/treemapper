  - ErrorPresenter
  - presentAlert
  - shouldRetry
  # NetworkMonitor.swift: connectivity monitor, not referenced by UserService
  - NetworkMonitor
  - startMonitoring
  - checkConnectivity
must_not_include_files:
  - ErrorPresenter.swift
  - NetworkMonitor.swift
max_fragments: 4
max_files: 3
add_garbage_files: false
