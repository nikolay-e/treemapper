# Scenario: UserService is implemented with Swift error handling using
# the AppError enum, guard-throw pattern, and switch-based error handling.
#
# Diff: UserService.swift goes from empty class to fetchUser() with
# guard/throw, handleError() with switch, and a User struct.
#
# Reviewer questions:
#   Q1: "What error cases are defined?"
#       -> AppError.swift (UNCHANGED) defines networkError, validationError,
#          notFound, unauthorized with localizedDescription.
#
# Not needed:
#   - ErrorPresenter.swift: displays errors in the UI as alerts.
#     Error-adjacent vocabulary but no dependency from UserService.
#   - NetworkMonitor.swift: monitors network connectivity.
#     Network-related naming but not referenced by UserService error handling.

initial:
  AppError.swift: |
    enum AppError: Error {
        case networkError(String)
        case validationError(String)
        case notFound
        case unauthorized

        var localizedDescription: String {
            switch self {
            case .networkError(let message):
                return "Network error: \(message)"
            case .validationError(let message):
                return "Validation error: \(message)"
            case .notFound:
                return "Resource not found"
            case .unauthorized:
                return "Unauthorized access"
            }
        }
    }
  UserService.swift: |
    // Initial
    class UserService {}
  ErrorPresenter.swift: |
    import Foundation

    class ErrorPresenter {
        func presentAlert(for error: AppError) -> String {
            switch error {
            case .networkError:
                return "Please check your internet connection"
            case .validationError:
                return "Please correct the highlighted fields"
            case .notFound:
                return "The requested item could not be found"
            case .unauthorized:
                return "Your session has expired. Please log in again"
            }
        }

        func shouldRetry(error: AppError) -> Bool {
            if case .networkError = error { return true }
            return false
        }
    }
  NetworkMonitor.swift: |
    import Foundation

    class NetworkMonitor {
        private(set) var isConnected = true
        private(set) var connectionType: String = "wifi"

        func startMonitoring() {
            print("Network monitoring started")
        }

        func stopMonitoring() {
            print("Network monitoring stopped")
        }

        func checkConnectivity() -> Bool {
            return isConnected
        }
    }

