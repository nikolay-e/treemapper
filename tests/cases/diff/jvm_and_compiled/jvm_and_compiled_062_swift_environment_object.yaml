# Scenario: SwiftUI ProfileView is implemented to use @EnvironmentObject
# to access shared AppState for login status and user display.
#
# Diff: ProfileView.swift goes from empty View to full implementation
# with @EnvironmentObject var appState: AppState, conditional rendering
# based on isLoggedIn, and logout button.
#
# Reviewer questions:
#   Q1: "What properties does AppState publish?"
#       -> AppState.swift (UNCHANGED) defines @Published currentUser
#          and @Published isLoggedIn, plus login() and logout() methods.
#
# Not needed:
#   - SettingsView.swift: another SwiftUI view in the same app.
#     Uses AppState too but no dependency from ProfileView.
#   - ThemeManager.swift: manages app theme as ObservableObject.
#     Same ObservableObject pattern but independent state.

initial:
  AppState.swift: |
    import Combine

    class AppState: ObservableObject {
        @Published var currentUser: String?
        @Published var isLoggedIn = false

        func login(username: String) {
            currentUser = username
            isLoggedIn = true
        }

        func logout() {
            currentUser = nil
            isLoggedIn = false
        }
    }
  ProfileView.swift: |
    // Initial
    import SwiftUI
    struct ProfileView: View {
        var body: some View { Text("") }
    }
  SettingsView.swift: |
    import SwiftUI

    struct SettingsView: View {
        @EnvironmentObject var appState: AppState
        @State private var notificationsEnabled = true

        var body: some View {
            Form {
                Toggle("Notifications", isOn: $notificationsEnabled)
                if appState.isLoggedIn {
                    Button("Sign Out") {
                        appState.logout()
                    }
                }
            }
        }
    }
  ThemeManager.swift: |
    import Combine

    class ThemeManager: ObservableObject {
        @Published var isDarkMode = false
        @Published var accentColor = "blue"

        func toggleDarkMode() {
            isDarkMode.toggle()
        }

        func setAccent(_ color: String) {
            accentColor = color
        }
    }

changed:
  AppState.swift: |
    import Combine

    class AppState: ObservableObject {
        @Published var currentUser: String?
        @Published var isLoggedIn = false

        func login(username: String) {
            currentUser = username
            isLoggedIn = true
        }

        func logout() {
            currentUser = nil
            isLoggedIn = false
        }
    }
  ProfileView.swift: |
    import SwiftUI

    struct ProfileView: View {
        @EnvironmentObject var appState: AppState

        var body: some View {
            VStack {
                if appState.isLoggedIn {
                    Text("Welcome, \(appState.currentUser ?? "")")
                    Button("Logout") {
                        appState.logout()
                    }
                } else {
                    Text("Please log in")
                }
            }
        }
    }
  SettingsView.swift: |
    import SwiftUI

    struct SettingsView: View {
        @EnvironmentObject var appState: AppState
        @State private var notificationsEnabled = true

        var body: some View {
            Form {
                Toggle("Notifications", isOn: $notificationsEnabled)
                if appState.isLoggedIn {
                    Button("Sign Out") {
                        appState.logout()
                    }
                }
            }
        }
    }
  ThemeManager.swift: |
    import Combine

    class ThemeManager: ObservableObject {
        @Published var isDarkMode = false
        @Published var accentColor = "blue"

        func toggleDarkMode() {
            isDarkMode.toggle()
        }

        func setAccent(_ color: String) {
            accentColor = color
        }
    }

must_include_files:
  - ProfileView.swift
must_include_content_from:
  ProfileView.swift:
    - "@EnvironmentObject var appState: AppState"
must_not_include:
  # SettingsView.swift: sibling view, no dependency from ProfileView
  - SettingsView
  - notificationsEnabled
  # ThemeManager.swift: separate ObservableObject, not used by ProfileView
  - ThemeManager
  - isDarkMode
  - accentColor
  - toggleDarkMode
must_not_include_files:
  - SettingsView.swift
  - ThemeManager.swift
max_fragments: 4
max_files: 3
add_garbage_files: false
skip_garbage_check: true
