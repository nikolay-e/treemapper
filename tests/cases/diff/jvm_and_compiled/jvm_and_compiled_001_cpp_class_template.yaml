# Scenario: main.cpp goes from empty main() to instantiating Container<int>,
#   Container<string>, and calling Serializer::serialize().
#   Only main.cpp is changed.
#
# Diff shows:
#   - #include "container.h"
#   - #include "serializer.h"
#   - Container<int> intContainer; intContainer.add(42); intContainer.add(17);
#   - Container<std::string> strContainer; strContainer.add("hello");
#   - intContainer.size(), strContainer.get(0), Serializer::serialize(intContainer.get(0))
#
# Reviewer questions:
#   Q1: "What is Container<T> — what does add(), get(), size() do?"
#       -> Needs container.h: template class wrapping std::vector with
#         bounds-checked get() that throws std::out_of_range. Without
#         this, the reviewer sees `.get(0)` and can't verify it's safe
#         (it is — items were just added). They also can't verify that
#         `.add()` appends and `.size()` returns the count.
#
#   Q2: "What does Serializer::serialize(intContainer.get(0)) return?"
#       -> Needs serializer.h: static method that calls std::to_string().
#         The reviewer needs to see that serialize() takes an int and
#         returns a string to verify the cout expression is well-typed.
#
#   Q3: "Is strContainer.get(0) safe after two add() calls?"
#       -> container.h shows get() throws if index >= size(). Since two
#         elements were added, get(0) is safe. Reviewer needs the
#         bounds check logic to verify this.
#
# Not needed for comprehension:
#   - tests/container_test.cpp: Unit tests for Container<T>. Includes
#     container.h and exercises add(), get(), size(), empty(). Strong
#     structural edge — same header, same methods. But test cases for
#     Container don't help the reviewer understand what main.cpp does
#     with it. The question is "what does Container provide", answered
#     by the header, not "is Container tested."
#
#   - cache.h: Uses Container<std::string> internally to store cache
#     keys. Includes container.h, instantiates the same template.
#     Structural edge + same template instantiation as the diff. But
#     cache eviction logic doesn't help review main.cpp's usage.
#
#   - json_serializer.h: Another serializer — includes serializer.h,
#     inherits from Serializer, and adds JSON output. Structural edge
#     to the same header. But JSON serialization methods don't help
#     the reviewer verify that Serializer::serialize(int) returns a
#     string.
#
#   - logger.h: A logging utility that uses std::vector<std::string>
#     and operator<<. Lexical overlap with both Container's internal
#     storage (std::vector) and main.cpp's cout usage. But zero
#     structural dependency.
#
#   - config_parser.cpp: Parses config files, throws std::out_of_range
#     on missing keys. Same exception type as Container::get(). But
#     config parsing doesn't help review Container usage.

max_enrichment: 9.2
initial:
  container.h: |
    #pragma once
    #include <vector>
    #include <stdexcept>

    template<typename T>
    class Container {
        std::vector<T> items;

    public:
        void add(const T& item) { items.push_back(item); }

        T& get(size_t index) {
            if (index >= items.size()) {
                throw std::out_of_range("Index out of range");
            }
            return items[index];
        }

        const T& get(size_t index) const {
            if (index >= items.size()) {
                throw std::out_of_range("Index out of range");
            }
            return items[index];
        }

        size_t size() const { return items.size(); }
        bool empty() const { return items.empty(); }
        void clear() { items.clear(); }
    };

  serializer.h: |
    #pragma once
    #include <string>
    #include <sstream>

    class Serializer {
    public:
        static std::string serialize(int value) {
            return std::to_string(value);
        }

        static std::string serialize(double value) {
            std::ostringstream oss;
            oss << value;
            return oss.str();
        }

        static std::string serialize(const std::string& value) {
            return "\"" + value + "\"";
        }
    };

  main.cpp: |
    #include <iostream>

    int main() {
        return 0;
    }

  tests/container_test.cpp: |
    #include "container.h"
    #include <cassert>
    #include <string>

    void test_add_and_size() {
        Container<int> c;
        assert(c.empty());
        c.add(1);
        c.add(2);
        assert(c.size() == 2);
        assert(!c.empty());
    }

    void test_get_valid() {
        Container<std::string> c;
        c.add("hello");
        assert(c.get(0) == "hello");
    }

    void test_get_out_of_range() {
        Container<int> c;
        bool threw = false;
        try {
            c.get(0);
        } catch (const std::out_of_range&) {
            threw = true;
        }
        assert(threw);
    }

    void test_clear() {
        Container<int> c;
        c.add(1);
        c.clear();
        assert(c.empty());
    }

    int main() {
        test_add_and_size();
        test_get_valid();
        test_get_out_of_range();
        test_clear();
        return 0;
    }

  cache.h: |
    #pragma once
    #include "container.h"
    #include <string>
    #include <unordered_map>

    class LRUCache {
        Container<std::string> accessOrder;
        std::unordered_map<std::string, std::string> store;
        size_t maxSize;

    public:
        explicit LRUCache(size_t max) : maxSize(max) {}

        void put(const std::string& key, const std::string& value) {
            if (store.size() >= maxSize && store.find(key) == store.end()) {
                evictOldest();
            }
            store[key] = value;
            accessOrder.add(key);
        }

        std::string* get(const std::string& key) {
            auto it = store.find(key);
            if (it == store.end()) return nullptr;
            accessOrder.add(key);
            return &it->second;
        }

    private:
        void evictOldest() {
            if (!accessOrder.empty()) {
                store.erase(accessOrder.get(0));
            }
        }
    };

  json_serializer.h: |
    #pragma once
    #include "serializer.h"
    #include <string>
    #include <vector>
    #include <sstream>

    class JsonSerializer : public Serializer {
    public:
        static std::string serializeArray(const std::vector<int>& values) {
            std::ostringstream oss;
            oss << "[";
            for (size_t i = 0; i < values.size(); ++i) {
                if (i > 0) oss << ", ";
                oss << serialize(values[i]);
            }
            oss << "]";
            return oss.str();
        }

        static std::string serializeObject(const std::string& key, int value) {
            return "{\"" + key + "\": " + serialize(value) + "}";
        }
    };

  logger.h: |
    #pragma once
    #include <string>
    #include <vector>
    #include <iostream>
    #include <chrono>

    class Logger {
        std::vector<std::string> messages;

    public:
        void log(const std::string& msg) {
            auto now = std::chrono::system_clock::now();
            auto time = std::chrono::system_clock::to_time_t(now);
            messages.push_back(std::string(std::ctime(&time)) + ": " + msg);
            std::cout << messages.back() << std::endl;
        }

        size_t messageCount() const { return messages.size(); }
        void clear() { messages.clear(); }
    };

  config_parser.cpp: |
    #include <string>
    #include <unordered_map>
    #include <fstream>
    #include <stdexcept>

    class ConfigParser {
        std::unordered_map<std::string, std::string> values;

    public:
        void load(const std::string& filename) {
            std::ifstream file(filename);
            std::string line;
            while (std::getline(file, line)) {
                auto pos = line.find('=');
                if (pos != std::string::npos) {
                    values[line.substr(0, pos)] = line.substr(pos + 1);
                }
            }
        }

        std::string get(const std::string& key) const {
            auto it = values.find(key);
            if (it == values.end()) {
                throw std::out_of_range("Config key not found: " + key);
            }
            return it->second;
        }

        bool has(const std::string& key) const {
            return values.count(key) > 0;
        }
    };

