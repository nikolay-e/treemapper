# Scenario: UsersController goes from empty class to ASP.NET API controller
#   with [ApiController], [Route], [HttpGet], [HttpPost] attributes.
#   Returns ActionResult<User> using User model.
#
# Reviewer questions:
#   Q1: "What is User — does it have Id and Name for the return value?"
#       -> Models/User.cs: User has Id (int) and Name (string). GetUser
#          constructs new User { Id = id, Name = "Test" }.
#
#   Q2: "Does CreateUser correctly use CreatedAtAction with GetUser?"
#       -> Same diff: CreatedAtAction(nameof(GetUser), ...) references the
#          GET action. Reviewer must verify the method name matches.
#
#   Q3: "Is [FromBody] User correct? Are there any model validation attributes?"
#       -> Models/User.cs: User has no [Required] attributes. The controller
#          accepts raw User without validation — potential review finding.
#
# Not needed:
#   - Controllers/ProductsController.cs: Sibling API controller with IDENTICAL
#     attributes ([ApiController], [Route], [HttpGet], [HttpPost]).
#     Same ActionResult<T> pattern. Different entity (Product).
#
#   - Services/UserService.cs: Would be injected into controller. Same User type.
#     But controller currently constructs User inline, doesn't use a service.
#
#   - Middleware/AuthenticationMiddleware.cs: Runs before controllers. Same ASP.NET
#     pipeline. But auth middleware doesn't help review controller action logic.
#
#   - Models/ApiResponse.cs: Generic response wrapper. Could wrap User responses.
#     Same namespace pattern. But controller returns User directly.
#
#   - Program.cs: Configures app.MapControllers(). Same ASP.NET setup context.
#     But app wiring doesn't help review action method correctness.

max_enrichment: 7.1
initial:
  Models/User.cs: |
    namespace MyApp.Models
    {
        public class User
        {
            public int Id { get; set; }
            public string Name { get; set; }
        }
    }

  Controllers/UsersController.cs: |
    namespace MyApp.Controllers
    {
        class UsersController { }
    }

  Controllers/ProductsController.cs: |
    using Microsoft.AspNetCore.Mvc;
    using MyApp.Models;

    namespace MyApp.Controllers
    {
        [ApiController]
        [Route("api/[controller]")]
        public class ProductsController : ControllerBase
        {
            [HttpGet("{id}")]
            public ActionResult<Product> GetProduct(int id)
            {
                return new Product { Id = id, Name = "Sample", Price = 9.99m };
            }

            [HttpPost]
            public ActionResult<Product> CreateProduct([FromBody] Product product)
            {
                return CreatedAtAction(nameof(GetProduct), new { id = product.Id }, product);
            }
        }
    }

  Services/UserService.cs: |
    using MyApp.Models;

    namespace MyApp.Services
    {
        public class UserService
        {
            private readonly List<User> _users = new();

            public User GetById(int id)
            {
                return _users.FirstOrDefault(u => u.Id == id);
            }

            public User Create(User user)
            {
                user.Id = _users.Count + 1;
                _users.Add(user);
                return user;
            }
        }
    }

  Middleware/AuthenticationMiddleware.cs: |
    using Microsoft.AspNetCore.Http;

    namespace MyApp.Middleware
    {
        public class AuthenticationMiddleware
        {
            private readonly RequestDelegate _next;

            public AuthenticationMiddleware(RequestDelegate next)
            {
                _next = next;
            }

            public async Task InvokeAsync(HttpContext context)
            {
                var authHeader = context.Request.Headers["Authorization"].FirstOrDefault();
                if (string.IsNullOrEmpty(authHeader))
                {
                    context.Response.StatusCode = 401;
                    return;
                }
                await _next(context);
            }
        }
    }

  Models/ApiResponse.cs: |
    namespace MyApp.Models
    {
        public class ApiResponse<T>
        {
            public bool Success { get; set; }
            public T Data { get; set; }
            public string Message { get; set; }

            public static ApiResponse<T> Ok(T data) =>
                new() { Success = true, Data = data };

            public static ApiResponse<T> Error(string message) =>
                new() { Success = false, Message = message };
        }
    }

  Program.cs: |
    using Microsoft.AspNetCore.Builder;

    namespace MyApp
    {
        public class Program
        {
            public static void Main(string[] args)
            {
                var builder = WebApplication.CreateBuilder(args);
                builder.Services.AddControllers();
                var app = builder.Build();
                app.MapControllers();
                app.Run();
            }
        }
    }

