# Scenario: UserDto gains Bean Validation annotations (@NotBlank, @Size,
#   @Email) and a new email field with getter/setter. The UserController
#   consumes UserDto but is not changed.
#
# Diff shows:
#   - UserDto with id and name only
#   + import javax.validation.constraints.*, @NotBlank/@Size on name,
#     @Email on new email field, email getter/setter
#
# Reviewer questions:
#   Q1: "Which endpoints return UserDto — are they affected by new fields?"
#       -> Needs UserController.java: @RestController returning UserDto
#          from getUser(). Reviewer must check if controller sets email.
#
#   Q2: "Is @Valid used anywhere to trigger the new validation annotations?"
#       -> Needs UserController.java to check for @Valid on @RequestBody.
#
# Not needed for comprehension:
#   - ProductDto.java: IDENTICAL DTO in same package — getters/setters,
#     private fields. HARDEST TRAP: sibling DTO, same structure. But
#     ProductDto has no import/dependency edge to UserDto.
#
#   - UserService.java: Business logic creating UserDto instances. Direct
#     producer of the DTO. But service logic doesn't help review
#     whether validation annotations are correctly placed.
#
#   - ValidationConfig.java: Spring @Configuration for validator bean.
#     Same validation vocabulary. Infrastructure, not DTO-specific.
#
#   - UserDtoTest.java: Tests UserDto validation. References the changed
#     class. But test assertions don't help review annotation placement.
#
#   - OrderDto.java: Another DTO with validation annotations. Same
#     javax.validation.constraints imports. Different entity.

