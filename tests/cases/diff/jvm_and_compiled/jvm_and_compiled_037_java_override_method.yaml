# Scenario: Dog class adds a breed field and overrides both speak() and eat()
# from the Animal abstract base class.
#
# Diff: Dog.java gains a breed field, modifies the constructor, changes speak()
# to include breed, and adds an eat() override.
#
# Reviewer questions:
#   Q1: "What methods does Dog override from Animal?"
#       -> Animal.java (UNCHANGED) defines abstract speak() and concrete eat().
#          Dog now overrides both — reviewer must see Animal to verify signatures.
#
# Not needed:
#   - src/main/java/com/example/Kennel.java: manages a collection of Animals.
#     Shares the Animal domain but has no import/dependency edge to Dog's override changes.
#   - src/main/java/com/example/AnimalSound.java: enum of sound types.
#     Domain-adjacent vocabulary (speak, sound) but not referenced by Dog.

initial:
  src/main/java/com/example/Animal.java: |
    package com.example;

    public abstract class Animal {
        protected String name;

        public abstract String speak();

        public void eat() {
            System.out.println(name + " is eating");
        }
    }
  src/main/java/com/example/Dog.java: |
    package com.example;

    public class Dog extends Animal {
        public Dog(String name) {
            this.name = name;
        }

        @Override
        public String speak() {
            return "Woof!";
        }
    }
  src/main/java/com/example/Kennel.java: |
    package com.example;

    import java.util.ArrayList;
    import java.util.List;

    public class Kennel {
        private final List<Animal> animals = new ArrayList<>();

        public void admit(Animal animal) {
            animals.add(animal);
        }

        public void feedAll() {
            for (Animal animal : animals) {
                animal.eat();
            }
        }

        public int getCount() {
            return animals.size();
        }
    }
  src/main/java/com/example/AnimalSound.java: |
    package com.example;

    public enum AnimalSound {
        BARK("Woof"),
        MEOW("Meow"),
        CHIRP("Tweet");

        private final String sound;

        AnimalSound(String sound) {
            this.sound = sound;
        }

        public String getSound() {
            return sound;
        }
    }

