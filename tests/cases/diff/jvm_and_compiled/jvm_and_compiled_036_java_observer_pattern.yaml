# Scenario: Observer pattern is introduced — EventListener @FunctionalInterface,
#   EventBus with subscribe/unsubscribe/publish, and UserEventHandler
#   implementing EventListener. Event class (pre-existing) is the data carrier.
#
# Diff shows:
#   + EventListener interface with onEvent(Event), + EventBus with HashMap
#     of listeners per eventType, subscribe/unsubscribe/publish methods,
#   + UserEventHandler implementing EventListener
#
# Reviewer questions:
#   Q1: "What is Event — what data does it carry?"
#       -> Needs Event.java: pre-existing class with type and data fields.
#          EventBus.publish() calls event.getType() and listener.onEvent(event).
#
#   Q2: "How does publish dispatch — does event.getType() match subscription keys?"
#       -> The diff shows publish() looking up listeners.get(event.getType()).
#          Needs Event.java to verify getType() returns String.
#
# Not needed for comprehension:
#   - PropertyChangeSupport.java: Java beans observer pattern with
#     addPropertyChangeListener/removePropertyChangeListener. IDENTICAL
#     observer vocabulary. HARDEST TRAP: same design pattern, different API.
#
#   - OrderEventHandler.java: Another EventListener implementation for
#     order events. Same interface, same onEvent signature. Sibling handler.
#
#   - EventLogger.java: Logs all events. Uses Event type and EventListener.
#     Direct participant in the event system. But logging doesn't help
#     review the bus dispatch mechanism.
#
#   - EventStore.java: Persists events to storage. Uses Event type.
#     Same event vocabulary. Independent of observer pattern.
#
#   - EventMetrics.java: Counts events by type. Same type dispatch pattern.
#     Not referenced by EventBus or EventListener.

