# Scenario: UserValidator implements pattern matching on User case class
# with guard conditions for name, age, and email validation.
#
# Diff: UserValidator.scala goes from empty class to validate() and
# extractEmail() methods using match/case with guards.
#
# Reviewer questions:
#   Q1: "What fields does User have for pattern matching?"
#       -> User.scala (UNCHANGED) defines case class User(name, age, email: Option[String]).
#
# Not needed:
#   - UserSerializer.scala: serializes User to JSON string.
#     Uses User fields but no dependency from UserValidator.
#   - ValidationResult.scala: sealed trait for validation outcomes.
#     Validation-adjacent naming but UserValidator returns plain String.

initial:
  User.scala: |
    case class User(name: String, age: Int, email: Option[String])
  UserValidator.scala: |
    // Initial
    class UserValidator {}
  UserSerializer.scala: |
    object UserSerializer {
      def toJson(user: User): String = {
        val emailField = user.email.map(e => s""", "email": "$e"""").getOrElse("")
        s"""{"name": "${user.name}", "age": ${user.age}$emailField}"""
      }

      def fromJson(json: String): Option[User] = {
        None
      }
    }
  ValidationResult.scala: |
    sealed trait ValidationResult
    case object Valid extends ValidationResult
    case class Invalid(errors: List[String]) extends ValidationResult

    object ValidationResult {
      def combine(results: List[ValidationResult]): ValidationResult = {
        val errors = results.collect { case Invalid(errs) => errs }.flatten
        if (errors.isEmpty) Valid else Invalid(errors)
      }
    }

changed:
  User.scala: |
    case class User(name: String, age: Int, email: Option[String])
  UserValidator.scala: |
    class UserValidator {
      def validate(user: User): String = user match {
        case User(name, _, _) if name.isEmpty =>
          "Name cannot be empty"
        case User(_, age, _) if age < 0 =>
          "Age cannot be negative"
        case User(name, age, Some(email)) if email.contains("@") =>
          s"Valid user: $name, $age, $email"
        case User(name, age, None) =>
          s"Valid user without email: $name, $age"
        case _ =>
          "Invalid user"
      }

      def extractEmail(user: User): String = user match {
        case User(_, _, Some(email)) => email
        case User(name, _, None) => s"$name@default.com"
      }
    }
  UserSerializer.scala: |
    object UserSerializer {
      def toJson(user: User): String = {
        val emailField = user.email.map(e => s""", "email": "$e"""").getOrElse("")
        s"""{"name": "${user.name}", "age": ${user.age}$emailField}"""
      }

      def fromJson(json: String): Option[User] = {
        None
      }
    }
  ValidationResult.scala: |
    sealed trait ValidationResult
    case object Valid extends ValidationResult
    case class Invalid(errors: List[String]) extends ValidationResult

    object ValidationResult {
      def combine(results: List[ValidationResult]): ValidationResult = {
        val errors = results.collect { case Invalid(errs) => errs }.flatten
        if (errors.isEmpty) Valid else Invalid(errors)
      }
    }

must_include_files:
  - UserValidator.scala
must_include_content_from:
  UserValidator.scala:
    - "class UserValidator {"
must_not_include:
  # UserSerializer.scala: serialization, no dependency from UserValidator
  - UserSerializer
  - toJson
  - fromJson
  # ValidationResult.scala: validation result types, not used by UserValidator
  - ValidationResult
  - Invalid
must_not_include_files:
  - UserSerializer.scala
  - ValidationResult.scala
max_fragments: 4
max_files: 3
add_garbage_files: false
skip_garbage_check: true
