# Scenario: cache.cpp goes from empty main to Cache class using
#   shared_ptr<Data> for shared ownership of cached Data objects.
#
# Reviewer questions:
#   Q1: "What is Data — does make_shared<Data>(0) call the right constructor?"
#       -> include/data.h: struct Data has int value; Data(int v) sets value.
#          make_shared<Data>(0) creates Data with value=0 as default cache entry.
#
#   Q2: "Is shared_ptr the right choice here vs unique_ptr?"
#       -> Cache returns shared_ptr from get() — multiple callers can hold
#          references to the same Data. Reviewer must evaluate whether shared
#          ownership is intentional or if unique_ptr would suffice.
#
#   Q3: "Does the cache correctly handle existing vs missing keys?"
#       -> Diff: checks store.count(key), returns existing if found, otherwise
#          creates new Data(0), stores, and returns. Reviewer needs Data to
#          verify the default value semantics.
#
# Not needed:
#   - src/session_cache.cpp: Another cache using shared_ptr. IDENTICAL pattern
#     (unordered_map<string, shared_ptr<T>>, get method). Different value type.
#
#   - src/unique_store.cpp: Similar store but with unique_ptr. Same Data type.
#     Different ownership model — could confuse which pattern the diff uses.
#
#   - include/cache_policy.h: LRU eviction policy for caches. Same cache
#     domain. But policy logic doesn't help review the shared_ptr usage.
#
#   - tests/cache_test.cpp: Tests Cache::get() with assertions. Same types.
#     But tests verify behavior, not ownership correctness.

initial:
  include/data.h: |
    #pragma once

    struct Data {
        int value;
        Data(int v) : value(v) {}
    };

  src/cache.cpp: |
    #include <iostream>
    int main() { return 0; }

  src/session_cache.cpp: |
    #include <memory>
    #include <unordered_map>
    #include <string>

    struct Session {
        std::string token;
        int userId;
        Session(const std::string& t, int uid) : token(t), userId(uid) {}
    };

    class SessionCache {
        std::unordered_map<std::string, std::shared_ptr<Session>> sessions_;
    public:
        std::shared_ptr<Session> get(const std::string& token) {
            auto it = sessions_.find(token);
            if (it != sessions_.end()) return it->second;
            auto session = std::make_shared<Session>(token, 0);
            sessions_[token] = session;
            return session;
        }

        void invalidate(const std::string& token) { sessions_.erase(token); }
        size_t activeCount() const { return sessions_.size(); }
    };

  src/unique_store.cpp: |
    #include "data.h"
    #include <memory>
    #include <unordered_map>
    #include <string>

    class UniqueStore {
        std::unordered_map<std::string, std::unique_ptr<Data>> store_;
    public:
        Data* get(const std::string& key) {
            auto it = store_.find(key);
            if (it != store_.end()) return it->second.get();
            store_[key] = std::make_unique<Data>(0);
            return store_[key].get();
        }

        void remove(const std::string& key) { store_.erase(key); }
        size_t size() const { return store_.size(); }
    };

  include/cache_policy.h: |
    #pragma once
    #include <list>
    #include <unordered_map>
    #include <string>

    class LruPolicy {
        size_t capacity_;
        std::list<std::string> order_;
        std::unordered_map<std::string, std::list<std::string>::iterator> lookup_;
    public:
        LruPolicy(size_t cap) : capacity_(cap) {}

        void access(const std::string& key) {
            auto it = lookup_.find(key);
            if (it != lookup_.end()) order_.erase(it->second);
            order_.push_front(key);
            lookup_[key] = order_.begin();
        }

        std::string evict() {
            auto key = order_.back();
            lookup_.erase(key);
            order_.pop_back();
            return key;
        }

        bool shouldEvict() const { return order_.size() > capacity_; }
    };

  tests/cache_test.cpp: |
    #include "data.h"
    #include <cassert>
    #include <memory>
    #include <unordered_map>

    void test_cache_miss_creates_default() {
        // Would test Cache::get() for missing key
        auto data = std::make_shared<Data>(0);
        assert(data->value == 0);
    }

    void test_cache_hit_returns_same() {
        auto d1 = std::make_shared<Data>(42);
        auto d2 = d1;
        assert(d1.get() == d2.get());
    }

changed:
  src/cache.cpp: |
    #include "data.h"
    #include <memory>
    #include <unordered_map>
    #include <string>

    class Cache {
        std::unordered_map<std::string, std::shared_ptr<Data>> store;

    public:
        std::shared_ptr<Data> get(const std::string& key) {
            if (store.count(key)) {
                return store[key];
            }
            auto data = std::make_shared<Data>(0);
            store[key] = data;
            return data;
        }
    };

must_include_files:
  - src/cache.cpp
  # Q1+Q3: Reviewer needs Data to verify constructor and default value.
  - include/data.h

must_include_content_from:
  src/cache.cpp:
    - "class Cache"
    - "std::shared_ptr<Data>"
    - "std::make_shared<Data>(0)"
    - "store.count(key)"
  include/data.h:
    - "struct Data"
    - "Data(int v) : value(v)"

must_not_include:
  # --- session_cache.cpp: identical shared_ptr cache pattern ---
  - SessionCache
  - Session
  - invalidate
  - activeCount
  # --- unique_store.cpp: same Data type, different ownership ---
  - UniqueStore
  - make_unique
  - "Data* get"
  # --- cache_policy.h: eviction policy, different concern ---
  - LruPolicy
  - evict
  - shouldEvict
  - capacity_
  # --- tests ---
  - test_cache_miss_creates_default
  - test_cache_hit_returns_same

must_not_include_files:
  - src/session_cache.cpp
  - src/unique_store.cpp
  - include/cache_policy.h
  - tests/cache_test.cpp

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
