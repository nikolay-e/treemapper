# Scenario: NetworkHandler is implemented with chained guard statements
# for early-return validation of a Response struct.
#
# Diff: NetworkHandler.swift goes from empty struct to handleResponse()
# with three guard statements checking error, statusCode, and data.
#
# Reviewer questions:
#   Q1: "What fields does Response have?"
#       -> Response.swift (UNCHANGED) defines Response with data: Data?,
#          error: Error?, statusCode: Int.
#
# Not needed:
#   - ResponseValidator.swift: validates response headers and content type.
#     Response-adjacent but no dependency from NetworkHandler.
#   - HTTPStatusCodes.swift: enum mapping HTTP status codes to descriptions.
#     Status-code vocabulary but NetworkHandler checks codes inline.

initial:
  Response.swift: |
    struct Response {
        let data: Data?
        let error: Error?
        let statusCode: Int
    }
  NetworkHandler.swift: |
    // Initial
    struct NetworkHandler {}
  ResponseValidator.swift: |
    import Foundation

    struct ResponseValidator {
        func validateContentType(_ headers: [String: String], expected: String) -> Bool {
            return headers["Content-Type"]?.contains(expected) ?? false
        }

        func validateContentLength(_ headers: [String: String], maxBytes: Int) -> Bool {
            guard let lengthStr = headers["Content-Length"],
                  let length = Int(lengthStr) else { return true }
            return length <= maxBytes
        }

        func isJSON(_ headers: [String: String]) -> Bool {
            return validateContentType(headers, expected: "application/json")
        }
    }
  HTTPStatusCodes.swift: |
    enum HTTPStatusCodes: Int {
        case ok = 200
        case created = 201
        case badRequest = 400
        case unauthorized = 401
        case notFound = 404
        case serverError = 500

        var isSuccess: Bool { rawValue >= 200 && rawValue < 300 }
        var isClientError: Bool { rawValue >= 400 && rawValue < 500 }
        var isServerError: Bool { rawValue >= 500 && rawValue < 600 }

        var description: String {
            switch self {
            case .ok: return "OK"
            case .created: return "Created"
            case .badRequest: return "Bad Request"
            case .unauthorized: return "Unauthorized"
            case .notFound: return "Not Found"
            case .serverError: return "Internal Server Error"
            }
        }
    }

changed:
  Response.swift: |
    struct Response {
        let data: Data?
        let error: Error?
        let statusCode: Int
    }
  NetworkHandler.swift: |
    import Foundation

    struct NetworkHandler {
        func handleResponse(_ response: Response) -> Data? {
            guard response.error == nil else {
                print("Error: \(response.error!)")
                return nil
            }

            guard response.statusCode == 200 else {
                print("Invalid status: \(response.statusCode)")
                return nil
            }

            guard let data = response.data else {
                print("No data")
                return nil
            }

            return data
        }
    }
  ResponseValidator.swift: |
    import Foundation

    struct ResponseValidator {
        func validateContentType(_ headers: [String: String], expected: String) -> Bool {
            return headers["Content-Type"]?.contains(expected) ?? false
        }

        func validateContentLength(_ headers: [String: String], maxBytes: Int) -> Bool {
            guard let lengthStr = headers["Content-Length"],
                  let length = Int(lengthStr) else { return true }
            return length <= maxBytes
        }

        func isJSON(_ headers: [String: String]) -> Bool {
            return validateContentType(headers, expected: "application/json")
        }
    }
  HTTPStatusCodes.swift: |
    enum HTTPStatusCodes: Int {
        case ok = 200
        case created = 201
        case badRequest = 400
        case unauthorized = 401
        case notFound = 404
        case serverError = 500

        var isSuccess: Bool { rawValue >= 200 && rawValue < 300 }
        var isClientError: Bool { rawValue >= 400 && rawValue < 500 }
        var isServerError: Bool { rawValue >= 500 && rawValue < 600 }

        var description: String {
            switch self {
            case .ok: return "OK"
            case .created: return "Created"
            case .badRequest: return "Bad Request"
            case .unauthorized: return "Unauthorized"
            case .notFound: return "Not Found"
            case .serverError: return "Internal Server Error"
            }
        }
    }

must_include_files:
  - NetworkHandler.swift
must_include_content_from:
  NetworkHandler.swift:
    - "import Foundation"
must_not_include:
  # ResponseValidator.swift: header validation, no dependency from NetworkHandler
  - ResponseValidator
  - validateContentType
  - validateContentLength
  # HTTPStatusCodes.swift: status code enum, NetworkHandler checks codes inline
  - HTTPStatusCodes
  - isClientError
  - isServerError
must_not_include_files:
  - ResponseValidator.swift
  - HTTPStatusCodes.swift
max_fragments: 4
max_files: 3
add_garbage_files: false
skip_garbage_check: true
