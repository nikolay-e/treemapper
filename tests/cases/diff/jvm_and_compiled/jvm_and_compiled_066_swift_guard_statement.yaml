changed:
  Response.swift: |
    struct Response {
        let data: Data?
        let error: Error?
        let statusCode: Int
    }
  NetworkHandler.swift: |
    import Foundation

    struct NetworkHandler {
        func handleResponse(_ response: Response) -> Data? {
            guard response.error == nil else {
                print("Error: \(response.error!)")
                return nil
            }

            guard response.statusCode == 200 else {
                print("Invalid status: \(response.statusCode)")
                return nil
            }

            guard let data = response.data else {
                print("No data")
                return nil
            }

            return data
        }
    }
  GarbagePrecondChecker.swift: |
    class GarbagePrecondChecker {
        static let GARBAGE_JVM_066_PRECOND_MARKER_A = "marker"
        static let GARBAGE_JVM_066_ASSERT_MARKER_B = "marker"
        func noop() {}
    }
  GarbageFatalHandler.swift: |
    class GarbageFatalHandler {
        static let GARBAGE_JVM_066_FATAL_MARKER_C = "marker"
        static let GARBAGE_JVM_066_TRAP_MARKER_D = "marker"
        func noop() {}
    }
