# Scenario: ContentView is implemented with @State properties for loading
#   state and item list, with conditional rendering via ProgressView/List.
#
# Diff shows:
#   - struct ContentView: View { var body: some View { Text("") } }
#   + @State private var isLoading = false, @State private var items: [String],
#     ProgressView when isLoading, List(items) otherwise, Button("Load")
#
# Reviewer questions:
#   Q1: "What does the Item model look like — is [String] the right type?"
#       -> Needs ItemModel.swift: Item struct with id/title/description and
#          static sampleItems() returning [String] titles. The @State stores
#          plain strings from Item.title.
#
#   Q2: "Does the DataService.fetchItems() that would populate items exist?"
#       -> Needs DataService.swift: class with fetchItems(completion:) that
#          calls completion with [String]. ContentView's Load button would
#          call this (currently just sets isLoading).
#
# Not needed for comprehension:
#   - SettingsView.swift: IDENTICAL @State pattern — @State private var
#     toggles and text fields in a SwiftUI Form. HARDEST TRAP: same @State,
#     same VStack/Form layout, same Button triggering state changes.
#
#   - SearchBarView.swift: Another SwiftUI view with @State for search text
#     and @State for isSearching. Same @State + conditional rendering pattern.
#
#   - ThemeManager.swift: ObservableObject with @Published properties for
#     UI theming. SwiftUI state management vocabulary but uses @Published
#     not @State. No dependency from ContentView.
#
#   - LocalStorage.swift: Persists data with UserDefaults. Uses "items"
#     and "loading" vocabulary. Infrastructure, not view logic.
#
#   - NavigationRouter.swift: Manages navigation state with @Published.
#     SwiftUI state vocabulary. Independent of ContentView.

initial:
  models/ItemModel.swift: |
    import Foundation

    struct Item: Identifiable, Codable {
        let id: UUID
        let title: String
        let description: String
        let createdAt: Date

        static func sampleItems() -> [String] {
            return ["Alpha", "Bravo", "Charlie", "Delta"]
        }

        static func empty() -> Item {
            return Item(id: UUID(), title: "", description: "", createdAt: Date())
        }
    }
  services/DataService.swift: |
    import Foundation

    class DataService {
        static let shared = DataService()
        private let baseURL = "https://api.example.com"

        func fetchItems(completion: @escaping ([String]) -> Void) {
            DispatchQueue.global().async {
                let items = ["Item 1", "Item 2", "Item 3"]
                DispatchQueue.main.async {
                    completion(items)
                }
            }
        }

        func fetchItem(by id: String, completion: @escaping (String?) -> Void) {
            DispatchQueue.global().async {
                DispatchQueue.main.async {
                    completion("Item \(id)")
                }
            }
        }
    }
  ContentView.swift: |
    import SwiftUI
    struct ContentView: View {
        var body: some View { Text("") }
    }
  views/SettingsView.swift: |
    import SwiftUI

    struct SettingsView: View {
        @State private var notificationsEnabled = true
        @State private var username = ""
        @State private var fontSize: Double = 14.0

        var body: some View {
            Form {
                Toggle("Notifications", isOn: $notificationsEnabled)
                TextField("Username", text: $username)
                Slider(value: $fontSize, in: 10...24)
                Button("Save") {
                    notificationsEnabled = true
                }
            }
        }
    }
  views/SearchBarView.swift: |
    import SwiftUI

    struct SearchBarView: View {
        @State private var searchText = ""
        @State private var isSearching = false
        @State private var results: [String] = []

        var body: some View {
            VStack {
                if isSearching {
                    ProgressView("Searching...")
                } else {
                    List(results, id: \.self) { result in
                        Text(result)
                    }
                }
                TextField("Search", text: $searchText)
                Button("Search") {
                    isSearching = true
                }
            }
        }
    }
  theme/ThemeManager.swift: |
    import SwiftUI

    class ThemeManager: ObservableObject {
        @Published var accentColor: Color = .blue
        @Published var useDarkMode = false
        @Published var cornerRadius: CGFloat = 8.0

        func applyTheme() {
            if useDarkMode {
                accentColor = .purple
            } else {
                accentColor = .blue
            }
        }

        func resetTheme() {
            accentColor = .blue
            useDarkMode = false
            cornerRadius = 8.0
        }
    }
  storage/LocalStorage.swift: |
    import Foundation

    class LocalStorage {
        private let defaults = UserDefaults.standard

        func saveItems(_ items: [String], forKey key: String) {
            defaults.set(items, forKey: key)
        }

        func loadItems(forKey key: String) -> [String] {
            return defaults.stringArray(forKey: key) ?? []
        }

        func clearAll() {
            let domain = Bundle.main.bundleIdentifier!
            defaults.removePersistentDomain(forName: domain)
        }
    }
  navigation/NavigationRouter.swift: |
    import SwiftUI

    class NavigationRouter: ObservableObject {
        @Published var currentRoute: String = "home"
        @Published var navigationStack: [String] = []

        func navigate(to route: String) {
            navigationStack.append(currentRoute)
            currentRoute = route
        }

        func goBack() {
            if let previous = navigationStack.popLast() {
                currentRoute = previous
            }
        }

        func reset() {
            currentRoute = "home"
            navigationStack = []
        }
    }

