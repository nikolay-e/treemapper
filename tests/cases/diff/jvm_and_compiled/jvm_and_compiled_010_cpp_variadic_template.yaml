name: jvm_and_compiled_010_cpp_variadic_template
repo:
  initial_files:
    include/logger.h: |
      #pragma once
      #include <iostream>
      #include <sstream>

      template<typename... Args>
      void log(Args... args) {
          std::ostringstream oss;
          ((oss << args << " "), ...);
          std::cout << oss.str() << std::endl;
      }
    src/app.cpp: |
      #include <iostream>
      int main() { return 0; }
    include/format.h: |
      #pragma once
      #include <string>
      #include <sstream>

      template<typename T>
      std::string toString(const T& value) {
          std::ostringstream oss;
          oss << value;
          return oss.str();
      }

      template<typename... Args>
      std::string format(const std::string& pattern, Args... args) {
          std::string result = pattern;
          int index = 0;
          ((result.replace(result.find("{}"), 2, toString(args)), ++index), ...);
          return result;
      }
    src/diagnostics.cpp: |
      #include "logger.h"
      #include <string>

      class Diagnostics {
          std::string component_;
      public:
          Diagnostics(const std::string& name) : component_(name) {}

          void info(const std::string& message) {
              log("[INFO]", component_, message);
          }

          void warn(const std::string& message) {
              log("[WARN]", component_, message);
          }

          void error(const std::string& message, int code) {
              log("[ERROR]", component_, message, "code:", code);
          }
      };
    include/print.h: |
      #pragma once
      #include <iostream>
      #include <sstream>

      template<typename... Args>
      void print_err(Args... args) {
          std::ostringstream oss;
          ((oss << args << " "), ...);
          std::cerr << oss.str() << std::endl;
      }

      template<typename... Args>
      void print_debug(Args... args) {
          #ifdef DEBUG
          std::ostringstream oss;
          ((oss << "[DBG] " << args << " "), ...);
          std::cerr << oss.str() << std::endl;
          #endif
      }
    tests/logger_test.cpp: |
      #include "logger.h"
      #include <cassert>
      #include <sstream>

      void test_log_single_arg() {
          std::ostringstream capture;
          auto old = std::cout.rdbuf(capture.rdbuf());
          log("hello");
          std::cout.rdbuf(old);
          assert(capture.str().find("hello") != std::string::npos);
      }

      void test_log_multiple_args() {
          std::ostringstream capture;
          auto old = std::cout.rdbuf(capture.rdbuf());
          log("value:", 42, 3.14);
          std::cout.rdbuf(old);
          assert(capture.str().find("42") != std::string::npos);
      }
  changed_files:
    src/app.cpp: |
      #include "logger.h"

      void process() {
          log("Starting", "process", 42, 3.14);
          log("Done");
      }
  commit_message: Update files
