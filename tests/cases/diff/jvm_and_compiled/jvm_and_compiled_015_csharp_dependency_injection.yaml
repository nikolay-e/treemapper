  - IProductService
  - IProductRepository
  - GetProduct
  # --- UserController.cs: consumes IUserService, different concern ---
  - UserController
  - "[ApiController]"
  - "_userService.GetUser"
  # --- Tests: different concern ---
  - UserServiceTests
  - MockUserRepository
  # --- Middleware: different DI mechanism ---
  - RequestLoggingMiddleware
