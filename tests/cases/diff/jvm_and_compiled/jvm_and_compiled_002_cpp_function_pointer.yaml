# Scenario: main.cpp goes from empty to using function pointers — typedef
#   Callback, execute() taking Callback, and assigning onSuccess to handler.
#
# Reviewer questions:
#   Q1: "What is the signature of onSuccess? Does typedef Callback match?"
#       -> include/handlers.h: void onSuccess(int code). Diff defines
#          typedef void (*Callback)(int). Both are void(int) — match.
#
#   Q2: "Could handler be assigned onError or onTimeout instead?"
#       -> include/handlers.h: void onError(int code) and void onTimeout(int code)
#          both match the Callback typedef. The diff assigns onSuccess
#          specifically — reviewer must verify this is intentional.
#
#   Q3: "Does execute(handler, 200) correctly pass 200 to onSuccess?"
#       -> src/handlers.cpp: onSuccess prints "Success: " << code.
#          execute calls callback(value), so onSuccess(200) prints "Success: 200".
#
# Not needed:
#   - src/event_system.cpp: Also uses function pointers for callbacks.
#     IDENTICAL pattern (typedef, assign, call). Different event domain.
#
#   - include/callback_registry.h: Registry that stores function pointers.
#     Same Callback typedef. Direct structural edge. But registry management
#     doesn't help review the basic callback usage.
#
#   - src/signal_handler.cpp: Uses function pointers for OS signals.
#     Same void(*)(int) pattern. Different domain (OS signals).
#
#   - tests/handler_test.cpp: Tests handler functions. Same types.
#     But test assertions don't help review callback assignment.

initial:
  include/handlers.h: |
    #pragma once
    #include <iostream>

    void onSuccess(int code);
    void onError(int code);
    void onTimeout(int code);

  src/handlers.cpp: |
    #include "handlers.h"

    void onSuccess(int code) {
        std::cout << "Success: " << code << std::endl;
    }

    void onError(int code) {
        std::cerr << "Error: " << code << std::endl;
    }

    void onTimeout(int code) {
        std::cerr << "Timeout after " << code << "ms" << std::endl;
    }

  src/main.cpp: |
    #include <iostream>

    int main() {
        return 0;
    }

  src/event_system.cpp: |
    #include <functional>
    #include <unordered_map>
    #include <string>
    #include <vector>

    using EventCallback = void(*)(int);

    class EventSystem {
        std::unordered_map<std::string, std::vector<EventCallback>> listeners_;
    public:
        void on(const std::string& event, EventCallback cb) {
            listeners_[event].push_back(cb);
        }

        void emit(const std::string& event, int data) {
            auto it = listeners_.find(event);
            if (it != listeners_.end()) {
                for (auto cb : it->second) cb(data);
            }
        }

        void clear(const std::string& event) {
            listeners_.erase(event);
        }
    };

  include/callback_registry.h: |
    #pragma once
    #include <vector>
    #include <string>

    typedef void (*Callback)(int);

    class CallbackRegistry {
        struct Entry {
            std::string name;
            Callback fn;
        };
        std::vector<Entry> callbacks_;
    public:
        void add(const std::string& name, Callback fn) {
            callbacks_.push_back({name, fn});
        }

        Callback find(const std::string& name) const {
            for (const auto& e : callbacks_) {
                if (e.name == name) return e.fn;
            }
            return nullptr;
        }

        void invokeAll(int value) {
            for (const auto& e : callbacks_) e.fn(value);
        }
    };

  src/signal_handler.cpp: |
    #include <csignal>
    #include <iostream>

    typedef void (*SignalHandler)(int);

    void handleSigint(int sig) {
        std::cout << "Caught SIGINT: " << sig << std::endl;
    }

    void handleSigterm(int sig) {
        std::cout << "Caught SIGTERM: " << sig << std::endl;
    }

    void setupSignals() {
        signal(SIGINT, handleSigint);
        signal(SIGTERM, handleSigterm);
    }

  tests/handler_test.cpp: |
    #include "handlers.h"
    #include <sstream>
    #include <cassert>

    void test_onSuccess_output() {
        std::ostringstream capture;
        auto old = std::cout.rdbuf(capture.rdbuf());
        onSuccess(200);
        std::cout.rdbuf(old);
        assert(capture.str().find("200") != std::string::npos);
    }

    void test_onError_output() {
        std::ostringstream capture;
        auto old = std::cerr.rdbuf(capture.rdbuf());
        onError(404);
        std::cerr.rdbuf(old);
        assert(capture.str().find("404") != std::string::npos);
    }

changed:
  src/main.cpp: |
    #include "handlers.h"

    typedef void (*Callback)(int);

    void execute(Callback callback, int value) {
        callback(value);
    }

    int main() {
        Callback handler = onSuccess;
        execute(handler, 200);
        return 0;
    }

must_include_files:
  - src/main.cpp
  # Q1+Q2: Reviewer needs handler declarations to verify signatures match
  # the Callback typedef and that onSuccess is the right choice.
  - include/handlers.h
  # Q3: Reviewer needs handler implementations to verify what onSuccess(200) does.
  - src/handlers.cpp

must_include_content_from:
  src/main.cpp:
    - "typedef void (*Callback)(int)"
    - "void execute(Callback callback, int value)"
    - "Callback handler = onSuccess"
    - "execute(handler, 200)"
  include/handlers.h:
    - "void onSuccess(int code)"
    - "void onError(int code)"
    - "void onTimeout(int code)"
  src/handlers.cpp:
    - "Success: "

must_not_include:
  # --- event_system.cpp: same function pointer pattern, different domain ---
  - EventSystem
  - EventCallback
  - listeners_
  - emit
  # --- callback_registry.h: stores callbacks, different concern ---
  - CallbackRegistry
  - invokeAll
  - "find(const std::string"
  # --- signal_handler.cpp: OS signal function pointers ---
  - SignalHandler
  - handleSigint
  - handleSigterm
  - setupSignals
  # --- tests ---
  - test_onSuccess_output
  - test_onError_output
  - "rdbuf"

must_not_include_files:
  - src/event_system.cpp
  - include/callback_registry.h
  - src/signal_handler.cpp
  - tests/handler_test.cpp

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
