# Scenario: CreateUserHandler is implemented as a MediatR request handler
#   that processes CreateUser commands, accessing request.Name and request.Email
#   to create a User entity and persist via IUserRepository.
#
# Diff shows:
#   - class CreateUserHandler { }  (empty)
#   + IRequestHandler<CreateUser, User> implementation with constructor
#     injecting IUserRepository, Handle method reading request.Name/Email,
#     creating User, calling _repository.AddAsync().
#
# Reviewer questions:
#   Q1: "What properties does CreateUser have — do Name and Email exist?"
#       -> Needs CreateUser.cs: IRequest<User> with Name and Email properties.
#
#   Q2: "What is IUserRepository — does AddAsync exist?"
#       -> Needs IUserRepository.cs: interface defining AddAsync method.
#
#   Q3: "What is User — the entity being created and returned?"
#       -> Needs User.cs or CreateUser.cs context showing User type shape.
#
# Not needed for comprehension:
#   - UpdateUserHandler.cs: IDENTICAL MediatR handler pattern — same
#     IRequestHandler<>, same IUserRepository injection, same Handle method.
#     HARDEST TRAP: structurally identical sibling but handles UpdateUser
#     not CreateUser.
#
#   - DeleteUserHandler.cs: Another MediatR handler with IUserRepository.
#     Same constructor pattern, same async Task<> return type.
#
#   - UserCreatedNotification.cs: MediatR INotification triggered after
#     user creation. Same MediatR namespace, same User type reference.
#     But notification handling doesn't help review the command handler.
#
#   - MediatRConfig.cs: Registers MediatR in DI container. Same using
#     MediatR directive. Infrastructure, not handler logic.
#
#   - UserController.cs: Sends CreateUser command via IMediator.Send().
#     Direct consumer of the changed handler. But how the controller
#     dispatches doesn't help review the handler implementation.

