name: jvm_and_compiled_060_swift_async_await
repo:
  initial_files:
    User.swift: |
      struct User: Codable {
          let id: String
          let name: String
      }
    UserAPI.swift: |
      // Initial
      class UserAPI {}
    ImageDownloader.swift: |
      import Foundation

      class ImageDownloader {
          func downloadImage(from urlString: String) async throws -> Data {
              let url = URL(string: urlString)!
              let (data, _) = try await URLSession.shared.data(from: url)
              return data
          }

          func downloadThumbnail(from urlString: String) async throws -> Data {
              let url = URL(string: "\(urlString)?size=thumb")!
              let (data, _) = try await URLSession.shared.data(from: url)
              return data
          }
      }
    URLBuilder.swift: |
      import Foundation

      struct URLBuilder {
          private var components: URLComponents

          init(base: String) {
              components = URLComponents(string: base) ?? URLComponents()
          }

          mutating func addQueryItem(name: String, value: String) {
              var items = components.queryItems ?? []
              items.append(URLQueryItem(name: name, value: value))
              components.queryItems = items
          }

          func build() -> URL? {
              return components.url
          }
      }
  changed_files:
    User.swift: |
      struct User: Codable {
          let id: String
          let name: String
      }
    UserAPI.swift: |
      import Foundation

      class UserAPI {
          func fetchUsers() async throws -> [User] {
              let url = URL(string: "https://api.example.com/users")!
              let (data, _) = try await URLSession.shared.data(from: url)
              return try JSONDecoder().decode([User].self, from: data)
          }

          func getUser(id: String) async throws -> User {
              let users = try await fetchUsers()
              guard let user = users.first(where: { $0.id == id }) else {
                  throw NSError(domain: "UserAPI", code: 404)
              }
              return user
          }
      }
    ImageDownloader.swift: |
