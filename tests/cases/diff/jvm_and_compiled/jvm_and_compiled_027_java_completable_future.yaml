    package com.example.async;

    import java.util.concurrent.CompletableFuture;
    import java.util.concurrent.ExecutorService;
    import java.util.concurrent.Executors;

    public class AsyncOrderProcessor {
        private final ExecutorService executor = Executors.newFixedThreadPool(4);

        public CompletableFuture<String> processOrder(String orderId) {
            return CompletableFuture.supplyAsync(() -> {
                return "validated:" + orderId;
            }, executor);
        }

        public CompletableFuture<String> processAndShip(String orderId) {
            return processOrder(orderId)
                .thenCompose(validated -> CompletableFuture.supplyAsync(() -> {
                    return "shipped:" + validated;
                }, executor))
                .exceptionally(ex -> "failed:" + orderId);
        }

        public CompletableFuture<String> processMultiple(String id1, String id2) {
            CompletableFuture<String> f1 = processOrder(id1);
            CompletableFuture<String> f2 = processOrder(id2);
            return CompletableFuture.allOf(f1, f2)
                .thenApply(v -> f1.join() + "," + f2.join());
        }
    }
