    package com.example.async;

    import java.util.concurrent.CompletableFuture;
    import java.util.function.Supplier;

    public class RetryService {
        public <T> CompletableFuture<T> withRetry(Supplier<CompletableFuture<T>> action, int maxRetries) {
            return action.get().exceptionally(ex -> {
                if (maxRetries > 0) {
                    return withRetry(action, maxRetries - 1).join();
                }
                throw new RuntimeException("Max retries exceeded", ex);
            });
        }
    }
