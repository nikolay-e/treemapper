# Scenario: BaseEntity @MappedSuperclass gains updatedAt field with
#   @PreUpdate lifecycle hook. Product extends BaseEntity and inherits
#   the new field.
#
# Diff shows:
#   - BaseEntity with id and createdAt only
#   + @Column updatedAt, @PreUpdate onUpdate(), getUpdatedAt() getter
#
# Reviewer questions:
#   Q1: "Which entities inherit from BaseEntity — are they affected?"
#       -> Needs Product.java: @Entity extends BaseEntity. Reviewer must
#          check that the new updatedAt propagates correctly.
#
#   Q2: "What was BaseEntity before — what fields already existed?"
#       -> The diff itself shows before/after of BaseEntity.
#
# Not needed for comprehension:
#   - Order.java: Another @Entity extending BaseEntity. Same inheritance.
#     HARDEST TRAP: another subclass of the changed base class. But
#     reviewing one subclass is sufficient to understand the impact.
#
#   - AuditLog.java: JPA entity that records audit events with timestamps.
#     Same @Column, @Entity, createdAt/updatedAt vocabulary. But
#     AuditLog doesn't extend BaseEntity.
#
#   - BaseEntityTest.java: Tests BaseEntity lifecycle callbacks.
#     References the changed class. But tests don't help review design.
#
#   - ProductRepository.java: JPA repository for Product. Uses Product
#     type. But persistence queries don't help review entity changes.
#
#   - TimestampListener.java: JPA @EntityListeners with @PrePersist and
#     @PreUpdate. Same lifecycle hook vocabulary. Independent mechanism.

