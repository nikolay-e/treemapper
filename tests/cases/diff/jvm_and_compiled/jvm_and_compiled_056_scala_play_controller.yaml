      }
    }

must_include_files:
  - UserController.scala
must_include_content_from:
  UserController.scala:
    - "import play.api.mvc._"
must_not_include:
  # OrderController.scala: separate controller, no dependency on UserController
  - OrderController
  - getOrder
  - createOrder
  # JsonFormats.scala: shared formatters, not used by UserController (own implicit)
  - JsonFormats
  - dateFormat
  - errorResponse
must_not_include_files:
  - OrderController.scala
  - JsonFormats.scala
max_fragments: 4
max_files: 3
add_garbage_files: false
skip_garbage_check: true
