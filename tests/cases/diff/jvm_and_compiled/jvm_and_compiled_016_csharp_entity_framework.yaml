# Scenario: AppDbContext goes from empty to EF Core DbContext with DbSet<User>
#   and OnModelCreating that configures User entity (HasKey, IsRequired, HasIndex).
#
# Reviewer questions:
#   Q1: "What properties does User have? Does entity.HasKey(e => e.Id) make sense?"
#       -> Models/User.cs: User has Id (int), Name (string), Email (string),
#          CreatedAt (DateTime). Reviewer must verify Id exists and is correct
#          type for primary key.
#
#   Q2: "Does entity.Property(e => e.Email).IsRequired() match the model?"
#       -> Models/User.cs: Email is string (nullable by default in C#).
#          The EF config makes it required at DB level — reviewer must verify
#          the property exists and the constraint is intentional.
#
#   Q3: "Is HasIndex(e => e.Email).IsUnique() appropriate?"
#       -> Models/User.cs: Email is a string property. Unique index means
#          no duplicate emails. Reviewer must verify this is a business requirement.
#
# Not needed:
#   - Repositories/UserRepository.cs: Uses AppDbContext to query Users. Direct
#     structural edge (_context.Users.FindAsync). But how queries are written
#     doesn't help review whether the DB model configuration is correct.
#
#   - Data/AppDbContextFactory.cs: IDesignTimeDbContextFactory for migrations.
#     Creates AppDbContext with connection string. Same class name reference,
#     but factory pattern doesn't help review entity configuration.
#
#   - Models/Product.cs: Parallel entity model. Same namespace, same property
#     pattern (Id, Name, etc.). Different entity entirely.
#
#   - Data/ProductConfiguration.cs: IEntityTypeConfiguration<Product> with
#     identical EF fluent API pattern. Same HasKey, IsRequired, HasIndex calls.
#     Structurally identical but configures different entity.
#
#   - Migrations/InitialCreate.cs: EF migration file. References Users table.
#     Auto-generated code, not helpful for reviewing configuration intent.

initial:
  Models/User.cs: |
    namespace MyApp.Models
    {
        public class User
        {
            public int Id { get; set; }
            public string Name { get; set; }
            public string Email { get; set; }
            public DateTime CreatedAt { get; set; }
        }
    }

  Data/AppDbContext.cs: |
    namespace MyApp.Data
    {
        class AppDbContext { }
    }

  Repositories/UserRepository.cs: |
    using Microsoft.EntityFrameworkCore;
    using MyApp.Data;
    using MyApp.Models;

    namespace MyApp.Repositories
    {
        public class UserRepository
        {
            private readonly AppDbContext _context;

            public UserRepository(AppDbContext context)
            {
                _context = context;
            }

            public async Task<User> GetByIdAsync(int id)
            {
                return await _context.Users.FindAsync(id);
            }

            public async Task<User> GetByEmailAsync(string email)
            {
                return await _context.Users
                    .FirstOrDefaultAsync(u => u.Email == email);
            }

            public async Task AddAsync(User user)
            {
                _context.Users.Add(user);
                await _context.SaveChangesAsync();
            }
        }
    }

  Data/AppDbContextFactory.cs: |
    using Microsoft.EntityFrameworkCore;
    using Microsoft.EntityFrameworkCore.Design;

    namespace MyApp.Data
    {
        public class AppDbContextFactory : IDesignTimeDbContextFactory<AppDbContext>
        {
            public AppDbContext CreateDbContext(string[] args)
            {
                var optionsBuilder = new DbContextOptionsBuilder<AppDbContext>();
                optionsBuilder.UseSqlServer(
                    "Server=localhost;Database=MyApp;Trusted_Connection=True;");
                return new AppDbContext(optionsBuilder.Options);
            }
        }
    }

  Models/Product.cs: |
    namespace MyApp.Models
    {
        public class Product
        {
            public int Id { get; set; }
            public string Name { get; set; }
            public decimal Price { get; set; }
            public string Category { get; set; }
            public DateTime CreatedAt { get; set; }
        }
    }

  Data/ProductConfiguration.cs: |
    using Microsoft.EntityFrameworkCore;
    using Microsoft.EntityFrameworkCore.Metadata.Builders;
    using MyApp.Models;

    namespace MyApp.Data
    {
        public class ProductConfiguration : IEntityTypeConfiguration<Product>
        {
            public void Configure(EntityTypeBuilder<Product> builder)
            {
                builder.HasKey(p => p.Id);
                builder.Property(p => p.Name).IsRequired().HasMaxLength(200);
                builder.Property(p => p.Price).HasPrecision(18, 2);
                builder.HasIndex(p => p.Category);
            }
        }
    }

  Migrations/InitialCreate.cs: |
    using Microsoft.EntityFrameworkCore.Migrations;

    namespace MyApp.Migrations
    {
        public partial class InitialCreate : Migration
        {
            protected override void Up(MigrationBuilder migrationBuilder)
            {
                migrationBuilder.CreateTable(
                    name: "Users",
                    columns: table => new
                    {
                        Id = table.Column<int>(nullable: false)
                            .Annotation("SqlServer:Identity", "1, 1"),
                        Name = table.Column<string>(nullable: true),
                        Email = table.Column<string>(nullable: false),
                    });
            }

            protected override void Down(MigrationBuilder migrationBuilder)
            {
                migrationBuilder.DropTable(name: "Users");
            }
        }
    }

changed:
  Data/AppDbContext.cs: |
    using Microsoft.EntityFrameworkCore;
    using MyApp.Models;

    namespace MyApp.Data
    {
        public class AppDbContext : DbContext
        {
            public DbSet<User> Users { get; set; }

            public AppDbContext(DbContextOptions<AppDbContext> options)
                : base(options) { }

            protected override void OnModelCreating(ModelBuilder modelBuilder)
            {
                modelBuilder.Entity<User>(entity =>
                {
                    entity.HasKey(e => e.Id);
                    entity.Property(e => e.Email).IsRequired();
                    entity.HasIndex(e => e.Email).IsUnique();
                });
            }
        }
    }

