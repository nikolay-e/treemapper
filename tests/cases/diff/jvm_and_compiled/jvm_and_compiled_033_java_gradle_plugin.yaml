initial:
  build.gradle: |
    plugins {
        id 'java'
        id 'org.springframework.boot' version '3.0.0'
    }

    dependencies {
        implementation 'org.springframework.boot:spring-boot-starter-web'
    }
  GarbageTaskRunner.java: |
    public class GarbageTaskRunner {
        public static final String GARBAGE_JVM_033_TASK_MARKER_A = "marker";
        public static final String GARBAGE_JVM_033_EXEC_MARKER_B = "marker";
        public void noop() {}
    }
  GarbageBuildConfig.java: |
    public class GarbageBuildConfig {
        public static final String GARBAGE_JVM_033_BUILD_MARKER_C = "marker";
        public static final String GARBAGE_JVM_033_COMPILE_MARKER_D = "marker";
        public void noop() {}
    }
changed:
  build.gradle: |
    plugins {
        id 'java'
        id 'org.springframework.boot' version '3.0.0'
        id 'io.spring.dependency-management' version '1.1.0'
        id 'jacoco'
    }

    dependencies {
        implementation 'org.springframework.boot:spring-boot-starter-web'
        implementation 'org.springframework.boot:spring-boot-starter-actuator'
        testImplementation 'org.springframework.boot:spring-boot-starter-test'
    }

    jacoco {
        toolVersion = "0.8.8"
    }
  GarbageTaskRunner.java: |
    public class GarbageTaskRunner {
        public static final String GARBAGE_JVM_033_TASK_MARKER_A = "marker";
        public static final String GARBAGE_JVM_033_EXEC_MARKER_B = "marker";
        public void noop() {}
    }
  GarbageBuildConfig.java: |
    public class GarbageBuildConfig {
        public static final String GARBAGE_JVM_033_BUILD_MARKER_C = "marker";
        public static final String GARBAGE_JVM_033_COMPILE_MARKER_D = "marker";
        public void noop() {}
    }
must_include_files:
- build.gradle
must_include_content:
- id 'io.spring.dependency-management' version '1.1.0'
must_not_include:
- GARBAGE_JVM_033_BUILD_MARKER_C
- GARBAGE_JVM_033_COMPILE_MARKER_D
- GARBAGE_JVM_033_EXEC_MARKER_B
- GARBAGE_JVM_033_TASK_MARKER_A
- GarbageBuildConfig.java
- GarbageTaskRunner.java
add_garbage_files: false
skip_garbage_check: true
