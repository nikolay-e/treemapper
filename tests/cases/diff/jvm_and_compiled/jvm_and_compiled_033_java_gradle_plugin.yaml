must_include_files:
  - build.gradle

must_include_content_from:
  build.gradle:
    - "id 'io.spring.dependency-management' version '1.1.0'"
    - "id 'jacoco'"
    - "spring-boot-starter-actuator"
    - "spring-boot-starter-test"
    - 'toolVersion = "0.8.8"'

must_not_include:
  # build.gradle.kts: Kotlin DSL version, same deps, different syntax
  - "build.gradle.kts"
  - "xml.required.set"
  - "jacocoTestReport"
  # pom.xml: Maven build, different build tool
  - "pom.xml"
  - "modelVersion"
  - "artifactId"
  - legacy-service
  # Dockerfile: container build, doesn't help review Gradle config
  - Dockerfile
  - "eclipse-temurin"
  - "ENTRYPOINT"
  # gradle.properties: property overrides, not relevant
  - "org.gradle.jvmargs"
  - "org.gradle.parallel"
  - "spring.boot.mainclass"
  # ci.yml: CI pipeline, doesn't help review build config
  - "actions/checkout"
  - "actions/setup-java"
  - "gradlew"

must_not_include_files:
  - build.gradle.kts
  - pom.xml
  - Dockerfile
  - gradle.properties
  - .github/workflows/ci.yml

max_fragments: 4
max_files: 2
add_garbage_files: false
skip_garbage_check: true
