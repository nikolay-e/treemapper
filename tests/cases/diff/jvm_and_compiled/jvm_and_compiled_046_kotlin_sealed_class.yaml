# Scenario: Result sealed class gains Loading and Empty variants, and
#   Error gains optional cause: Throwable? parameter. The existing
#   Handler uses when(result) but only handles Success and Error.
#
# Diff shows:
#   - sealed class Result with Success and Error
#   + data object Loading, data object Empty, cause: Throwable? = null on Error
#
# Reviewer questions:
#   Q1: "What code handles Result with when-expression — is it exhaustive?"
#       -> Needs Handler.kt: handleResult() uses when(result) with only
#          is Result.Success and is Result.Error. Missing Loading/Empty
#          branches — non-exhaustive when. Critical review finding.
#
#   Q2: "What was Error before — is the new cause parameter backward compatible?"
#       -> The diff shows Error adding cause with default null — compatible.
#
# Not needed for comprehension:
#   - NetworkState.kt: IDENTICAL sealed class pattern — data objects and
#     data classes with when-expression usage. HARDEST TRAP: same Kotlin
#     sealed class design, different hierarchy.
#
#   - ResultMapper.kt: Maps Result to response DTOs. Uses when on Result.
#     Direct consumer with same when-expression. But the Handler is the
#     more critical consumer to review for exhaustiveness.
#
#   - ResultExtensions.kt: Extension functions on Result (map, flatMap).
#     Same Result type. But utility extensions don't help review whether
#     consumers handle new variants.
#
#   - ErrorHandler.kt: Handles errors from Result.Error. Same "Error"
#     vocabulary. But error handling is independent of sealed hierarchy.
#
#   - ApiResponse.kt: Another sealed class for API responses. Same sealed
#     pattern. Independent type hierarchy.

