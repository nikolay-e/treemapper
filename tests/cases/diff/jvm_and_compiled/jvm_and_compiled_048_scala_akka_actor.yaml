  - CancelOrder
  # ActorConfig.scala: system setup, not referenced by UserActor
  - ActorConfig
  - ActorSystem
  - ConfigFactory
must_not_include_files:
  - OrderActor.scala
  - ActorConfig.scala
max_fragments: 4
max_files: 3
add_garbage_files: false
