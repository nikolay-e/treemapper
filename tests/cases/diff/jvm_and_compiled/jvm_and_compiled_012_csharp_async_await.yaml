# Scenario: UserApi goes from empty to async/await HTTP client that deserializes
#   JSON into User objects using HttpClient and JsonSerializer.
#
# Reviewer questions:
#   Q1: "What is User — does JsonSerializer.Deserialize<User> work correctly?"
#       -> Models/User.cs: User has Id (int) and Name (string) with public get/set.
#          System.Text.Json can deserialize into this. Reviewer must verify
#          JSON property names match (case-sensitive by default).
#
#   Q2: "Does GetAllUsersAsync correctly deserialize IEnumerable<User>?"
#       -> Models/User.cs: User is a simple POCO. IEnumerable<User> will work
#          with JSON arrays. Reviewer must verify the type is compatible.
#
#   Q3: "Is EnsureSuccessStatusCode() sufficient error handling?"
#       -> Diff: calls response.EnsureSuccessStatusCode() which throws
#          HttpRequestException on non-2xx. No custom error handling.
#          Potential review finding for error handling strategy.
#
# Not needed:
#   - Api/ProductApi.cs: Sibling API client with IDENTICAL async/await pattern.
#     Same HttpClient, same GetAsync, same JsonSerializer.Deserialize. Different
#     entity (Product). Hardest trap: structurally identical.
#
#   - Services/HttpClientFactory.cs: Creates and configures HttpClient instances.
#     Same HttpClient type. But factory setup doesn't help review API call logic.
#
#   - Models/ApiError.cs: Error response model for non-2xx responses.
#     Could be relevant to error handling, but the diff doesn't use it.
#
#   - Tests/UserApiTests.cs: Tests UserApi with mocked HttpClient.
#     Calls GetUserAsync(), checks result. But mock setup doesn't help review
#     the actual deserialization logic.

max_enrichment: 6.2
initial:
  Models/User.cs: |
    namespace MyApp.Models
    {
        public class User
        {
            public int Id { get; set; }
            public string Name { get; set; }
        }
    }

  Api/UserApi.cs: |
    namespace MyApp.Api
    {
        class UserApi { }
    }

  Api/ProductApi.cs: |
    using System.Net.Http;
    using System.Text.Json;
    using MyApp.Models;

    namespace MyApp.Api
    {
        class ProductApi
        {
            private readonly HttpClient _client;

            public ProductApi(HttpClient client)
            {
                _client = client;
            }

            public async Task<Product> GetProductAsync(int id)
            {
                var response = await _client.GetAsync($"/api/products/{id}");
                response.EnsureSuccessStatusCode();
                var json = await response.Content.ReadAsStringAsync();
                return JsonSerializer.Deserialize<Product>(json);
            }

            public async Task<IEnumerable<Product>> GetAllProductsAsync()
            {
                var response = await _client.GetAsync("/api/products");
                var json = await response.Content.ReadAsStringAsync();
                return JsonSerializer.Deserialize<IEnumerable<Product>>(json);
            }
        }
    }

  Services/HttpClientFactory.cs: |
    using System.Net.Http;

    namespace MyApp.Services
    {
        public class HttpClientFactory
        {
            private readonly string _baseUrl;
            private readonly TimeSpan _timeout;

            public HttpClientFactory(string baseUrl, TimeSpan? timeout = null)
            {
                _baseUrl = baseUrl;
                _timeout = timeout ?? TimeSpan.FromSeconds(30);
            }

            public HttpClient Create()
            {
                var client = new HttpClient
                {
                    BaseAddress = new Uri(_baseUrl),
                    Timeout = _timeout
                };
                client.DefaultRequestHeaders.Add("Accept", "application/json");
                return client;
            }
        }
    }

  Models/ApiError.cs: |
    namespace MyApp.Models
    {
        public class ApiError
        {
            public int StatusCode { get; set; }
            public string Message { get; set; }
            public string Detail { get; set; }

            public override string ToString()
            {
                return $"HTTP {StatusCode}: {Message} - {Detail}";
            }
        }
    }

  Tests/UserApiTests.cs: |
    using MyApp.Api;
    using MyApp.Models;
    using Xunit;

    namespace MyApp.Tests
    {
        public class UserApiTests
        {
            [Fact]
            public async Task GetUserAsync_ReturnsUser()
            {
                var handler = new MockHttpMessageHandler("{\"Id\":1,\"Name\":\"Alice\"}");
                var client = new HttpClient(handler) { BaseAddress = new Uri("http://test") };
                var api = new UserApi(client);

                var user = await api.GetUserAsync(1);
                Assert.Equal("Alice", user.Name);
                Assert.Equal(1, user.Id);
            }

            [Fact]
            public async Task GetAllUsersAsync_ReturnsList()
            {
                var handler = new MockHttpMessageHandler("[{\"Id\":1,\"Name\":\"Bob\"}]");
                var client = new HttpClient(handler) { BaseAddress = new Uri("http://test") };
                var api = new UserApi(client);

                var users = await api.GetAllUsersAsync();
                Assert.Single(users);
            }
        }
    }

