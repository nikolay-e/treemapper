# Scenario: manager.cpp goes from empty main to ResourceManager that uses
#   std::unique_ptr<Resource> for exclusive ownership of Resource objects.
#
# Reviewer questions:
#   Q1: "What is Resource — what constructor does make_unique<Resource>(id) call?"
#       -> include/resource.h: Resource(const std::string& id) sets this->id.
#          make_unique<Resource>("resource-1") calls this constructor.
#
#   Q2: "Does res->use() exist on Resource?"
#       -> include/resource.h: public void use() {}. Reviewer must verify
#          this method exists and is accessible on Resource.
#
#   Q3: "Is ownership transfer correct via std::move?"
#       -> Diff: processBuffer(std::move(b)) — wait, this is ResourceManager,
#          not Buffer. acquire() returns unique_ptr, process() calls acquire
#          then res->use(). The unique_ptr goes out of scope after use —
#          automatic cleanup. Reviewer must verify no dangling access.
#
# Not needed:
#   - src/connection_pool.cpp: Also uses std::unique_ptr with a different
#     resource type. Same make_unique pattern. Different domain (connections).
#
#   - include/resource_factory.h: Factory that creates Resource objects.
#     Returns unique_ptr<Resource>. Direct structural edge. But factory
#     abstraction doesn't help review ResourceManager's ownership logic.
#
#   - src/shared_cache.cpp: Uses std::shared_ptr<Resource> (not unique_ptr).
#     Same Resource type, different ownership model. Could confuse reviewer
#     about which smart pointer pattern is intended.
#
#   - tests/resource_test.cpp: Tests Resource construction and use().
#     Same types. But tests don't help review ownership semantics.

initial:
  include/resource.h: |
    #pragma once
    #include <string>

    class Resource {
    public:
        std::string id;
        Resource(const std::string& id) : id(id) {}
        void use() {}
    };

  src/manager.cpp: |
    #include <iostream>
    int main() { return 0; }

  src/connection_pool.cpp: |
    #include <memory>
    #include <vector>
    #include <string>

    class Connection {
    public:
        std::string host;
        int port;
        Connection(const std::string& h, int p) : host(h), port(p) {}
        void execute(const std::string& query) {}
        void close() {}
    };

    class ConnectionPool {
        std::vector<std::unique_ptr<Connection>> pool_;
    public:
        std::unique_ptr<Connection> acquire(const std::string& host, int port) {
            return std::make_unique<Connection>(host, port);
        }

        void releaseAll() { pool_.clear(); }
        size_t size() const { return pool_.size(); }
    };

  include/resource_factory.h: |
    #pragma once
    #include "resource.h"
    #include <memory>
    #include <string>

    class ResourceFactory {
    public:
        static std::unique_ptr<Resource> create(const std::string& id) {
            return std::make_unique<Resource>(id);
        }

        static std::unique_ptr<Resource> createWithPrefix(
            const std::string& prefix,
            const std::string& name)
        {
            return std::make_unique<Resource>(prefix + "-" + name);
        }
    };

  src/shared_cache.cpp: |
    #include "resource.h"
    #include <memory>
    #include <unordered_map>
    #include <string>

    class SharedCache {
        std::unordered_map<std::string, std::shared_ptr<Resource>> cache_;
    public:
        std::shared_ptr<Resource> get(const std::string& key) {
            auto it = cache_.find(key);
            if (it != cache_.end()) return it->second;
            auto res = std::make_shared<Resource>(key);
            cache_[key] = res;
            return res;
        }

        size_t size() const { return cache_.size(); }
        void evict(const std::string& key) { cache_.erase(key); }
    };

  tests/resource_test.cpp: |
    #include "resource.h"
    #include <cassert>
    #include <memory>

    void test_resource_creation() {
        auto res = std::make_unique<Resource>("test-1");
        assert(res->id == "test-1");
    }

    void test_resource_use() {
        Resource r("test-2");
        r.use();
        assert(r.id == "test-2");
    }

changed:
  src/manager.cpp: |
    #include "resource.h"
    #include <memory>

    class ResourceManager {
    public:
        std::unique_ptr<Resource> acquire(const std::string& id) {
            return std::make_unique<Resource>(id);
        }

        void process() {
            auto res = acquire("resource-1");
            res->use();
        }
    };

must_include_files:
  - src/manager.cpp
  # Q1+Q2: Reviewer needs Resource to verify the constructor and use() method.
  - include/resource.h

must_include_content_from:
  src/manager.cpp:
    - "class ResourceManager"
    - "std::unique_ptr<Resource> acquire"
    - "std::make_unique<Resource>(id)"
    - "res->use()"
  include/resource.h:
    - "Resource(const std::string& id)"
    - "void use()"

must_not_include:
  # --- connection_pool.cpp: same unique_ptr pattern, different type ---
  - ConnectionPool
  - Connection
  - "execute(const std::string& query)"
  - releaseAll
  # --- resource_factory.h: creates Resources, different concern ---
  - ResourceFactory
  - createWithPrefix
  # --- shared_cache.cpp: shared_ptr not unique_ptr ---
  - SharedCache
  - shared_ptr
  - make_shared
  - evict
  # --- tests ---
  - test_resource_creation
  - test_resource_use

must_not_include_files:
  - src/connection_pool.cpp
  - include/resource_factory.h
  - src/shared_cache.cpp
  - tests/resource_test.cpp

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
