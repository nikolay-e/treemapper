# Scenario: Config class is refactored from plain instantiation to a
# thread-safe double-checked locking singleton pattern.
#
# Diff: Config.java gains volatile static instance, private constructor,
# synchronized getInstance(), and reads from env vars. A new AppContext.java
# is added that calls Config.getInstance().
#
# Reviewer questions:
#   Q1: "Where is the singleton consumed?"
#       -> AppContext.java (NEW) calls Config.getInstance() and getValue().
#   Q2: "Is the singleton thread-safe?"
#       -> Config.java uses volatile + synchronized double-check.
#
# Not needed:
#   - src/main/java/com/example/DatabaseConfig.java: another config class.
#     Similar naming but independent configuration, no reference to Config.
#   - src/main/java/com/example/PropertyLoader.java: loads .properties files.
#     Configuration-adjacent but not used by Config singleton.

