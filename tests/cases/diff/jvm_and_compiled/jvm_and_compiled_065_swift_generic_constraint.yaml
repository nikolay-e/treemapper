# Scenario: CacheService is implemented as a generic class with Comparable
# & Hashable constraints, plus additional generic methods with Numeric
# and Collection constraints.
#
# Diff: CacheService.swift goes from empty class to generic class with
# store, retrieve, process<U: Numeric>, and filter<C: Collection> methods.
#
# Reviewer questions:
#   Q1: "What protocol does the existing Repository use?"
#       -> Repository.swift (UNCHANGED) defines Repository protocol with
#          associatedtype Entity and CRUD methods.
#
# Not needed:
#   - TypeErasedBox.swift: type-erased wrapper for protocol types.
#     Generics-adjacent vocabulary but no dependency from CacheService.
#   - KeyValueStore.swift: protocol for key-value storage.
#     Similar generic cache pattern but CacheService doesn't conform to it.

initial:
  Repository.swift: |
    protocol Repository {
        associatedtype Entity
        func save(_ entity: Entity)
        func find(id: String) -> Entity?
        func delete(id: String)
    }
  CacheService.swift: |
    // Initial
    class CacheService {}
  TypeErasedBox.swift: |
    class AnyRepository<T> {
        private let _save: (T) -> Void
        private let _find: (String) -> T?
        private let _delete: (String) -> Void

        init<R: Repository>(_ repository: R) where R.Entity == T {
            _save = repository.save
            _find = repository.find
            _delete = repository.delete
        }

        func save(_ entity: T) { _save(entity) }
        func find(id: String) -> T? { _find(id) }
        func delete(id: String) { _delete(id) }
    }
  KeyValueStore.swift: |
    protocol KeyValueStore {
        associatedtype Value

        func get(forKey key: String) -> Value?
        func set(_ value: Value, forKey key: String)
        func remove(forKey key: String)
        var count: Int { get }
    }

changed:
  Repository.swift: |
    protocol Repository {
        associatedtype Entity
        func save(_ entity: Entity)
        func find(id: String) -> Entity?
        func delete(id: String)
    }
  CacheService.swift: |
    class CacheService<T: Comparable & Hashable> {
        private var cache: [String: T] = [:]

        func store(_ value: T, forKey key: String) {
            cache[key] = value
        }

        func retrieve(forKey key: String) -> T? {
            return cache[key]
        }

        func process<U: Numeric>(_ items: [U]) -> U {
            return items.reduce(0, +)
        }

        func filter<C: Collection>(items: C, predicate: (C.Element) -> Bool)
            -> [C.Element] where C.Element: Comparable {
            return items.filter(predicate).sorted()
        }
    }
  TypeErasedBox.swift: |
    class AnyRepository<T> {
        private let _save: (T) -> Void
        private let _find: (String) -> T?
        private let _delete: (String) -> Void

        init<R: Repository>(_ repository: R) where R.Entity == T {
            _save = repository.save
            _find = repository.find
            _delete = repository.delete
        }

        func save(_ entity: T) { _save(entity) }
        func find(id: String) -> T? { _find(id) }
        func delete(id: String) { _delete(id) }
    }
  KeyValueStore.swift: |
    protocol KeyValueStore {
        associatedtype Value

        func get(forKey key: String) -> Value?
        func set(_ value: Value, forKey key: String)
        func remove(forKey key: String)
        var count: Int { get }
    }

must_include_files:
  - CacheService.swift
must_include_content_from:
  CacheService.swift:
    - "class CacheService<T: Comparable & Hashable> {"
must_not_include:
  # TypeErasedBox.swift: type erasure wrapper, no dependency from CacheService
  - AnyRepository
  - TypeErasedBox
  # KeyValueStore.swift: protocol CacheService doesn't conform to
  - KeyValueStore
must_not_include_files:
  - TypeErasedBox.swift
  - KeyValueStore.swift
max_fragments: 4
max_files: 3
add_garbage_files: false
skip_garbage_check: true
