name: jvm_and_compiled_024_java_application_properties
repo:
  initial_files:
    src/main/resources/application.properties: |
      server.port=8080
      spring.datasource.url=jdbc:postgresql://localhost/db
      spring.datasource.username=app
      spring.datasource.password=secret
      spring.jpa.hibernate.ddl-auto=validate
    src/main/java/com/example/Config.java: |
      package com.example;

      import org.springframework.beans.factory.annotation.Value;
      import org.springframework.stereotype.Component;

      @Component
      public class Config {
          @Value("${server.port}")
          private int port;

          @Value("${spring.datasource.url}")
          private String datasourceUrl;

          public int getPort() { return port; }
          public String getDatasourceUrl() { return datasourceUrl; }
      }
    src/main/java/com/example/config/CacheConfig.java: |
      package com.example.config;

      import org.springframework.beans.factory.annotation.Value;
      import org.springframework.cache.annotation.EnableCaching;
      import org.springframework.context.annotation.Bean;
      import org.springframework.context.annotation.Configuration;
      import org.springframework.data.redis.connection.RedisConnectionFactory;
      import org.springframework.data.redis.connection.lettuce.LettuceConnectionFactory;

      @Configuration
      @EnableCaching
      public class CacheConfig {
          @Value("${spring.redis.host:localhost}")
          private String redisHost;

          @Value("${spring.redis.port:6379}")
          private int redisPort;

          @Bean
          public RedisConnectionFactory redisConnectionFactory() {
              return new LettuceConnectionFactory(redisHost, redisPort);
          }
      }
    src/test/resources/application-test.properties: |
      server.port=0
      spring.datasource.url=jdbc:h2:mem:testdb
      spring.datasource.username=sa
      spring.datasource.password=
      spring.jpa.hibernate.ddl-auto=create-drop
      spring.cache.type=none
      logging.level.root=WARN
    src/main/java/com/example/config/DatabaseConfig.java: |
      package com.example.config;

      import org.springframework.beans.factory.annotation.Value;
      import org.springframework.context.annotation.Bean;
      import org.springframework.context.annotation.Configuration;
      import javax.sql.DataSource;

      @Configuration
      public class DatabaseConfig {
          @Value("${spring.datasource.url}")
          private String dbUrl;

          @Value("${spring.datasource.username}")
          private String dbUsername;

          @Value("${spring.datasource.password}")
          private String dbPassword;

          @Bean
          public DataSource dataSource() {
              var ds = new org.postgresql.ds.PGSimpleDataSource();
              ds.setUrl(dbUrl);
              ds.setUser(dbUsername);
              ds.setPassword(dbPassword);
              return ds;
          }
      }
    src/main/java/com/example/config/SecurityConfig.java: |
      package com.example.config;

      import org.springframework.context.annotation.Bean;
      import org.springframework.context.annotation.Configuration;
      import org.springframework.security.config.annotation.web.builders.HttpSecurity;
      import org.springframework.security.web.SecurityFilterChain;

      @Configuration
      public class SecurityConfig {
          @Bean
          public SecurityFilterChain filterChain(HttpSecurity http) throws Exception {
              http.csrf().disable()
                  .authorizeHttpRequests()
                  .requestMatchers("/api/public/**").permitAll()
                  .anyRequest().authenticated();
              return http.build();
          }
      }
    src/main/java/com/example/config/LoggingConfig.java: |
      package com.example.config;

      import org.springframework.context.annotation.Configuration;
      import javax.annotation.PostConstruct;
      import java.util.logging.Logger;

      @Configuration
      public class LoggingConfig {
          private static final Logger logger = Logger.getLogger(LoggingConfig.class.getName());

          @PostConstruct
          public void init() {
              logger.info("Application logging configured");
          }
      }
    src/main/java/com/example/HealthCheckController.java: |
      package com.example;

      import org.springframework.web.bind.annotation.GetMapping;
      import org.springframework.web.bind.annotation.RestController;
      import java.util.Map;

      @RestController
      public class HealthCheckController {
          @GetMapping("/health")
          public Map<String, String> health() {
              return Map.of("status", "UP");
          }
      }
