      package com.example;

      import com.fasterxml.jackson.databind.ObjectMapper;
      import org.springframework.stereotype.Component;

      @Component
      public class OrderProcessor {
          private final ObjectMapper objectMapper = new ObjectMapper();

          public void process(String orderJson) {
              try {
                  var order = objectMapper.readValue(orderJson, OrderEvent.class);
                  System.out.println("Processing order: " + order.orderId());
              } catch (Exception e) {
                  throw new RuntimeException("Failed to parse order", e);
              }
          }

          record OrderEvent(String orderId, String status, double amount) {}
      }
