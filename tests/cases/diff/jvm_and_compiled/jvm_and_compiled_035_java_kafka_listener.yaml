#   try/catch, groupId, and a private processMessage method. KafkaProducer
#   remains unchanged as the producer side.
#
# Diff shows:
#   - KafkaConsumer with simple @KafkaListener on "orders" topic
#   + groupId = "order-processor", Acknowledgment parameter, try/catch
#     with ack.acknowledge(), logger for errors, processMessage() extraction
#
# Reviewer questions:
#   Q1: "What is the producer sending to the 'orders' topic?"
#       -> Needs KafkaProducer.java: sends String messages to "orders" topic
#          via KafkaTemplate. Reviewer must verify consumer handles same format.
#
#   Q2: "Is the topic name consistent between producer and consumer?"
#       -> Same file: both reference "orders" topic. Self-consistent.
#
# Not needed for comprehension:
#   - RabbitConsumer.java: IDENTICAL message listener pattern — annotated
#     handler method, acknowledgment, error handling. HARDEST TRAP: same
#     messaging pattern but for RabbitMQ not Kafka.
#
#   - KafkaConfig.java: Spring @Configuration for Kafka consumer/producer
#     factories. Same Kafka vocabulary. But factory configuration doesn't
#     help review the listener logic.
#
#   - OrderProcessor.java: Business logic that processes order messages.
#     Same "order" domain. But processing logic is independent.
#
#   - DeadLetterHandler.java: Handles failed Kafka messages. Same Kafka
#     error handling vocabulary. Not called by KafkaConsumer.
#
#   - MessageSerializer.java: Kafka serializer/deserializer config.
