      package com.example;

      import org.springframework.kafka.core.KafkaTemplate;
      import org.springframework.stereotype.Component;

      @Component
      public class KafkaProducer {
          private final KafkaTemplate<String, String> kafkaTemplate;

          public KafkaProducer(KafkaTemplate<String, String> kafkaTemplate) {
              this.kafkaTemplate = kafkaTemplate;
          }

          public void send(String message) {
              kafkaTemplate.send("orders", message);
          }

          public void sendWithKey(String key, String message) {
              kafkaTemplate.send("orders", key, message);
          }
      }
    src/main/java/com/example/messaging/RabbitConsumer.java: |
      package com.example.messaging;

      import org.springframework.amqp.rabbit.annotation.RabbitListener;
      import org.springframework.amqp.core.Message;
      import org.springframework.stereotype.Component;
      import com.rabbitmq.client.Channel;
      import org.slf4j.Logger;
      import org.slf4j.LoggerFactory;

      @Component
      public class RabbitConsumer {
          private static final Logger logger = LoggerFactory.getLogger(RabbitConsumer.class);

          @RabbitListener(queues = "orders-queue")
          public void listen(Message message, Channel channel) throws Exception {
              try {
                  String body = new String(message.getBody());
                  processMessage(body);
                  channel.basicAck(message.getMessageProperties().getDeliveryTag(), false);
              } catch (Exception e) {
                  logger.error("Failed to process RabbitMQ message", e);
                  channel.basicNack(message.getMessageProperties().getDeliveryTag(), false, true);
              }
          }

          private void processMessage(String body) {
              logger.info("Processing RabbitMQ: {}", body);
          }
      }
    src/main/java/com/example/config/KafkaConfig.java: |
      package com.example.config;

      import org.apache.kafka.clients.consumer.ConsumerConfig;
      import org.springframework.context.annotation.Bean;
      import org.springframework.context.annotation.Configuration;
      import org.springframework.kafka.config.ConcurrentKafkaListenerContainerFactory;
      import org.springframework.kafka.core.ConsumerFactory;
      import org.springframework.kafka.core.DefaultKafkaConsumerFactory;
      import org.springframework.kafka.listener.ContainerProperties;

      import java.util.HashMap;
      import java.util.Map;

      @Configuration
      public class KafkaConfig {
          @Bean
          public ConsumerFactory<String, String> consumerFactory() {
              Map<String, Object> props = new HashMap<>();
              props.put(ConsumerConfig.BOOTSTRAP_SERVERS_CONFIG, "localhost:9092");
              props.put(ConsumerConfig.GROUP_ID_CONFIG, "order-processor");
              return new DefaultKafkaConsumerFactory<>(props);
          }

          @Bean
          public ConcurrentKafkaListenerContainerFactory<String, String> kafkaListenerContainerFactory() {
              var factory = new ConcurrentKafkaListenerContainerFactory<String, String>();
              factory.setConsumerFactory(consumerFactory());
              factory.getContainerProperties().setAckMode(ContainerProperties.AckMode.MANUAL);
              return factory;
          }
      }
