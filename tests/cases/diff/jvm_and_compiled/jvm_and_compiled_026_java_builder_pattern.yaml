# Scenario: User class is refactored from simple constructor to Builder
#   pattern, adding age and address fields. UserService is introduced
#   as a consumer that uses User.builder().
#
# Diff shows:
#   - User with name/email constructor
#   + Builder inner class with name/email/age/address methods,
#     private User(Builder) constructor, builder() factory,
#     and UserService calling User.builder().name().email().age().build()
#
# Reviewer questions:
#   Q1: "What fields did User originally have — is the refactoring backward compatible?"
#       -> The diff itself shows the before/after of User.java.
#
#   Q2: "Who else constructs User — will they break?"
#       -> Needs UserService.java context showing builder usage pattern.
#
# Not needed for comprehension:
#   - ProductBuilder.java: IDENTICAL builder pattern — inner Builder class
#     with chained setters and build() method. HARDEST TRAP: same design
#     pattern, different domain object.
#
#   - UserMapper.java: Converts User to UserDto, accesses User.getName()
#     and User.getEmail(). Same property accesses. But mapping logic
#     doesn't help review the builder pattern correctness.
#
#   - UserValidator.java: Validates User fields. References User.getName(),
#     User.getEmail(). Same accessor methods. But validation is independent.
#
#   - UserRepository.java: Persists User entities. Uses User type. But
#     persistence doesn't help review builder construction logic.
#
#   - UserController.java: REST endpoint creating User via service. Direct
#     consumer chain but doesn't help review the builder API.

