  Services/EmailService.cs: |
    using MyApp.Helpers;

    namespace MyApp.Services
    {
        public class EmailService
        {
            private readonly List<string> _validRecipients = new();

            public void AddRecipient(string email)
            {
                if (!email.IsValidEmail())
                    throw new ArgumentException("Invalid email address");
                _validRecipients.Add(email);
            }

            public void SendBulk(string subject, string body)
            {
                foreach (var recipient in _validRecipients)
                {
                    Console.WriteLine($"Sending '{subject.Truncate(50)}' to {recipient}");
                }
            }

            public int RecipientCount => _validRecipients.Count;
        }
    }

  Helpers/NumberExtensions.cs: |
    namespace MyApp.Helpers
    {
        public static class NumberExtensions
        {
            public static string ToOrdinal(this int number)
            {
                var suffix = (number % 100) switch
                {
                    11 or 12 or 13 => "th",
                    _ => (number % 10) switch
                    {
                        1 => "st",
                        2 => "nd",
                        3 => "rd",
                        _ => "th"
                    }
                };
                return $"{number}{suffix}";
            }

            public static bool IsEven(this int number) => number % 2 == 0;

            public static int Clamp(this int value, int min, int max)
            {
                return Math.Max(min, Math.Min(max, value));
            }
        }
    }

  Tests/StringExtensionsTests.cs: |
    using MyApp.Helpers;
    using Xunit;

    namespace MyApp.Tests
    {
        public class StringExtensionsTests
        {
            [Theory]
            [InlineData("test@example.com", true)]
            [InlineData("invalid", false)]
            [InlineData("", false)]
            public void IsValidEmail_ReturnsExpected(string input, bool expected)
            {
                Assert.Equal(expected, input.IsValidEmail());
            }

            [Fact]
            public void Truncate_ShortString_ReturnsUnchanged()
            {
                Assert.Equal("hello", "hello".Truncate(10));
            }

            [Fact]
            public void Truncate_LongString_AddsDots()
            {
                Assert.Equal("hel...", "hello world".Truncate(6));
            }
        }
    }

  Helpers/DateExtensions.cs: |
    namespace MyApp.Helpers
    {
        public static class DateExtensions
        {
            public static string ToFriendly(this DateTime date)
            {
                var diff = DateTime.Now - date;
                if (diff.TotalMinutes < 1) return "just now";
                if (diff.TotalHours < 1) return $"{(int)diff.TotalMinutes}m ago";
                if (diff.TotalDays < 1) return $"{(int)diff.TotalHours}h ago";
                return date.ToString("MMM dd, yyyy");
            }

            public static bool IsWeekend(this DateTime date)
            {
                return date.DayOfWeek == DayOfWeek.Saturday || date.DayOfWeek == DayOfWeek.Sunday;
            }
        }
    }

