# Scenario: Validator goes from empty to calling extension methods IsValidEmail()
#   and Truncate() defined in StringExtensions.cs.
#
# Reviewer questions:
#   Q1: "What does IsValidEmail() do? Is the validation logic sufficient?"
#       -> StringExtensions.cs: checks !IsNullOrEmpty && Contains("@") && Contains(".").
#          Reviewer must verify this is adequate for the Validator's use case.
#
#   Q2: "What does Truncate(100) return for strings under 100 chars?"
#       -> StringExtensions.cs: returns s unchanged if s.Length <= maxLength,
#          otherwise s.Substring(0, maxLength) + "...".
#
#   Q3: "Are these extension methods — what is the 'this string s' pattern?"
#       -> Same file: public static class with 'this string s' parameters,
#          which is C# extension method syntax enabling s.IsValidEmail().
#
# Not needed:
#   - Services/EmailService.cs: Also calls IsValidEmail() on strings. Direct
#     structural edge (same extension method). But how another service uses
#     the same method doesn't help review whether Validator uses it correctly.
#
#   - Helpers/NumberExtensions.cs: Sibling extension class in same namespace.
#     Same 'public static class' + 'this' pattern. Different domain (numbers).
#
#   - Tests/StringExtensionsTests.cs: Tests the extension methods directly.
#     Calls IsValidEmail() and Truncate() with test data. But test cases
#     don't help review the Validator's usage pattern.
#
#   - Helpers/DateExtensions.cs: Another extension class. Same structural
#     pattern (static class, this keyword). Unrelated to string processing.

max_enrichment: 8.8
initial:
  Helpers/StringExtensions.cs: |
    namespace MyApp.Helpers
    {
        public static class StringExtensions
        {
            public static bool IsValidEmail(this string s)
            {
                return !string.IsNullOrEmpty(s) && s.Contains("@") && s.Contains(".");
            }

            public static string Truncate(this string s, int maxLength)
            {
                if (string.IsNullOrEmpty(s) || s.Length <= maxLength)
                    return s;
                return s.Substring(0, maxLength) + "...";
            }

            public static string ToSlug(this string s)
            {
                return s.ToLower().Replace(" ", "-").Replace("_", "-");
            }
        }
    }

