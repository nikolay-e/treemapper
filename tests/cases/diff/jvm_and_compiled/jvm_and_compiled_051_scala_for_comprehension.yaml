# Scenario: OrderService uses Scala for-comprehensions to compose
# Option-returning Repository calls for getUserOrders and getTotalForUser.
#
# Diff: OrderService.scala goes from empty class to methods using
# for/yield over repo.getUser() and repo.getOrders().
#
# Reviewer questions:
#   Q1: "What do the repository methods return?"
#       -> Repository.scala (UNCHANGED) defines getUser -> Option[User]
#          and getOrders -> Option[List[Order]], plus case classes.
#
# Not needed:
#   - OrderValidator.scala: validates order fields before saving.
#     Order-adjacent but no dependency from OrderService for-comprehensions.
#   - OrderFormatter.scala: formats orders for display.
#     Same domain vocabulary but not referenced by OrderService.

max_enrichment: 7.1
initial:
  Repository.scala: |
    case class User(id: String, name: String)
    case class Order(id: String, userId: String, total: Double)

    class Repository {
      def getUser(id: String): Option[User] = Some(User(id, "John"))
      def getOrders(user: User): Option[List[Order]] = Some(List(Order("o1", user.id, 100.0)))
    }
  OrderService.scala: |
    // Initial
    class OrderService {}
  OrderValidator.scala: |
    object OrderValidator {
      def validateOrder(userId: String, total: Double): Either[String, Unit] = {
        if (userId.isEmpty) Left("User ID is required")
        else if (total <= 0) Left("Total must be positive")
        else Right(())
      }

      def validateItems(items: List[String]): Either[String, Unit] = {
        if (items.isEmpty) Left("At least one item is required")
        else Right(())
      }
    }
  OrderFormatter.scala: |
    object OrderFormatter {
      def formatOrder(order: Order): String = {
        s"Order ${order.id}: $$${order.total} for user ${order.userId}"
      }

      def formatSummary(orders: List[Order]): String = {
        val total = orders.map(_.total).sum
        s"${orders.size} orders, total: $$$total"
      }
    }

changed:
  Repository.scala: |
    case class User(id: String, name: String)
    case class Order(id: String, userId: String, total: Double)

    class Repository {
      def getUser(id: String): Option[User] = Some(User(id, "John"))
      def getOrders(user: User): Option[List[Order]] = Some(List(Order("o1", user.id, 100.0)))
    }
  OrderService.scala: |
    class OrderService(repo: Repository) {
      def getUserOrders(userId: String): Option[List[Order]] = {
        for {
          user <- repo.getUser(userId)
          orders <- repo.getOrders(user)
        } yield orders
      }

      def getTotalForUser(userId: String): Option[Double] = {
        for {
          user <- repo.getUser(userId)
          orders <- repo.getOrders(user)
          total = orders.map(_.total).sum
        } yield total
      }
    }
  OrderValidator.scala: |
    object OrderValidator {
      def validateOrder(userId: String, total: Double): Either[String, Unit] = {
        if (userId.isEmpty) Left("User ID is required")
        else if (total <= 0) Left("Total must be positive")
        else Right(())
      }

      def validateItems(items: List[String]): Either[String, Unit] = {
        if (items.isEmpty) Left("At least one item is required")
        else Right(())
      }
    }
  OrderFormatter.scala: |
    object OrderFormatter {
      def formatOrder(order: Order): String = {
        s"Order ${order.id}: $$${order.total} for user ${order.userId}"
      }

      def formatSummary(orders: List[Order]): String = {
        val total = orders.map(_.total).sum
        s"${orders.size} orders, total: $$$total"
      }
    }

must_include_files:
  - OrderService.scala
must_include_content_from:
  OrderService.scala:
    - "class OrderService(repo: Repository) {"
must_not_include:
  # OrderValidator.scala: validation logic, not used in for-comprehension code
  - OrderValidator
  - validateOrder
  - validateItems
  # OrderFormatter.scala: display formatting, no dependency from OrderService
  - OrderFormatter
  - formatOrder
  - formatSummary
must_not_include_files:
  - OrderValidator.scala
  - OrderFormatter.scala
max_fragments: 4
max_files: 3
add_garbage_files: false
skip_garbage_check: true
