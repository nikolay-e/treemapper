# Scenario: Service refactored from RuntimeException to a custom exception
#   hierarchy — ServiceException base class with errorCode, and
#   ValidationException extending it with "VALIDATION_ERROR" code.
#
# Diff shows:
#   - Service throwing RuntimeException("Input is null")
#   + Service throwing ValidationException("Input cannot be null/empty"),
#     new ServiceException(message, errorCode, cause) base class,
#     new ValidationException(message) extending ServiceException
#
# Reviewer questions:
#   Q1: "What does ValidationException extend — what constructor does it call?"
#       -> Needs ServiceException.java: base class with errorCode field,
#          super(message, errorCode) constructor. ValidationException
#          calls super(message, "VALIDATION_ERROR").
#
#   Q2: "How does the Service use these exceptions — what inputs trigger them?"
#       -> Needs Service.java diff showing null and empty checks.
#
# Not needed for comprehension:
#   - NotFoundException.java: Another custom exception extending
#     ServiceException. Same hierarchy, same super() call pattern.
#     HARDEST TRAP: sibling exception in the same hierarchy.
#
#   - GlobalExceptionHandler.java: @ControllerAdvice that catches
#     ServiceException. Direct consumer of the exception hierarchy.
#     But error response formatting doesn't help review exception design.
#
#   - ErrorResponse.java: DTO for error responses, has errorCode field.
#     Same "errorCode" vocabulary. But the DTO is independent.
#
#   - AuthorizationException.java: Another ServiceException subclass
#     for auth failures. Same pattern, different error code.
#
#   - ServiceTest.java: Tests that Service throws ValidationException.
#     References the same classes. Test assertions don't help review.

