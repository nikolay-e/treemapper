      package com.example;

      public class Service {
          public void process(String input) {
              if (input == null) {
                  throw new RuntimeException("Input is null");
              }
          }
      }
    src/main/java/com/example/exceptions/NotFoundException.java: |
      package com.example.exceptions;

      public class NotFoundException extends ServiceException {
          public NotFoundException(String resource, String id) {
              super(resource + " not found: " + id, "NOT_FOUND");
          }
      }
    src/main/java/com/example/handler/GlobalExceptionHandler.java: |
      package com.example.handler;

      import org.springframework.http.ResponseEntity;
      import org.springframework.web.bind.annotation.ControllerAdvice;
      import org.springframework.web.bind.annotation.ExceptionHandler;

      @ControllerAdvice
      public class GlobalExceptionHandler {
          @ExceptionHandler(ServiceException.class)
          public ResponseEntity<ErrorResponse> handleServiceException(ServiceException ex) {
              ErrorResponse response = new ErrorResponse(ex.getErrorCode(), ex.getMessage());
              return ResponseEntity.badRequest().body(response);
          }

          @ExceptionHandler(NotFoundException.class)
          public ResponseEntity<ErrorResponse> handleNotFound(NotFoundException ex) {
              ErrorResponse response = new ErrorResponse(ex.getErrorCode(), ex.getMessage());
              return ResponseEntity.status(404).body(response);
          }
      }
    src/main/java/com/example/dto/ErrorResponse.java: |
      package com.example.dto;

      public class ErrorResponse {
          private final String errorCode;
          private final String message;
          private final long timestamp;

          public ErrorResponse(String errorCode, String message) {
              this.errorCode = errorCode;
              this.message = message;
              this.timestamp = System.currentTimeMillis();
          }

          public String getErrorCode() { return errorCode; }
          public String getMessage() { return message; }
          public long getTimestamp() { return timestamp; }
      }
    src/main/java/com/example/exceptions/AuthorizationException.java: |
      package com.example.exceptions;

      public class AuthorizationException extends ServiceException {
          public AuthorizationException(String action) {
              super("Not authorized to: " + action, "AUTHORIZATION_ERROR");
          }
      }
    src/test/java/com/example/ServiceTest.java: |
      package com.example;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;

      class ServiceTest {
          private final Service service = new Service();

          @Test
          void processNullInputThrows() {
              assertThrows(RuntimeException.class, () -> service.process(null));
          }

          @Test
          void processValidInput() {
              assertDoesNotThrow(() -> service.process("valid"));
          }
      }
  changed_files:
    src/main/java/com/example/Service.java: |
      package com.example;

      public class Service {
          public void process(String input) {
              if (input == null) {
                  throw new ValidationException("Input cannot be null");
              }
              if (input.isEmpty()) {
                  throw new ValidationException("Input cannot be empty");
              }
          }
      }
    src/main/java/com/example/exceptions/ServiceException.java: |
      package com.example.exceptions;

      public class ServiceException extends RuntimeException {
          private final String errorCode;

          public ServiceException(String message, String errorCode) {
              super(message);
              this.errorCode = errorCode;
          }

          public ServiceException(String message, String errorCode, Throwable cause) {
              super(message, cause);
              this.errorCode = errorCode;
          }

          public String getErrorCode() {
              return errorCode;
          }
      }
