# Scenario: UserFormView adopts @ObservedObject to bind to UserViewModel's
#   published properties with two-way bindings and validation.
#
# Diff shows:
#   - struct UserFormView: View { var body: some View { Text("") } }
#   + @ObservedObject var viewModel: UserViewModel, TextField bindings to
#     $viewModel.name/$viewModel.email, Button calling viewModel.validate(),
#     .disabled(!viewModel.isValid), .onChange calling validate()
#
# Reviewer questions:
#   Q1: "What are the UserViewModel's published properties and validate logic?"
#       -> Needs UserViewModel.swift: ObservableObject with @Published name,
#          email, isValid. validate() checks !name.isEmpty && email.contains("@").
#
#   Q2: "Is .disabled(!viewModel.isValid) correct — does validate() set isValid?"
#       -> Same file: validate() sets isValid = !name.isEmpty && email.contains("@").
#          So isValid is false until both conditions pass.
#
# Not needed for comprehension:
#   - ProfileFormView.swift: IDENTICAL @ObservedObject + Form pattern — binds
#     to ProfileViewModel with TextFields and a Submit button. HARDEST TRAP:
#     same @ObservedObject, same Form, same .onChange validation pattern.
#
#   - SettingsStore.swift: Another ObservableObject with @Published properties.
#     Same Combine/ObservableObject vocabulary. No dependency from UserFormView.
#
#   - NotificationScheduler.swift: ObservableObject with @Published internally.
#     Same reactive patterns. Independent of form logic.
#
#   - FormValidator.swift: Generic form validation utility. Validation vocabulary
#     overlaps but UserFormView calls viewModel.validate() directly.
#
#   - UserListView.swift: Displays list of users with @ObservedObject binding
#     to a different view model. Same @ObservedObject pattern, different purpose.

max_enrichment: 7.8
initial:
  UserViewModel.swift: |
    import Combine

    class UserViewModel: ObservableObject {
        @Published var name = ""
        @Published var email = ""
        @Published var isValid = false

        func validate() {
            isValid = !name.isEmpty && email.contains("@")
        }

        func reset() {
            name = ""
            email = ""
            isValid = false
        }
    }
  UserFormView.swift: |
    import SwiftUI
    struct UserFormView: View {
        var body: some View { Text("") }
    }
  views/ProfileFormView.swift: |
    import SwiftUI

    class ProfileViewModel: ObservableObject {
        @Published var displayName = ""
        @Published var bio = ""
        @Published var isValid = false

        func validate() {
            isValid = !displayName.isEmpty && bio.count <= 500
        }
    }

    struct ProfileFormView: View {
        @ObservedObject var viewModel: ProfileViewModel

        var body: some View {
            Form {
                TextField("Display Name", text: $viewModel.displayName)
                TextEditor(text: $viewModel.bio)
                Button("Save Profile") {
                    viewModel.validate()
                }
                .disabled(!viewModel.isValid)
            }
            .onChange(of: viewModel.displayName) { _ in viewModel.validate() }
            .onChange(of: viewModel.bio) { _ in viewModel.validate() }
        }
    }
  store/SettingsStore.swift: |
    import Combine

    class SettingsStore: ObservableObject {
        @Published var isDarkMode = false
        @Published var fontSize: Double = 14.0
        @Published var notificationsEnabled = true

        func resetToDefaults() {
            isDarkMode = false
            fontSize = 14.0
            notificationsEnabled = true
        }

        func saveToDisk() {
            UserDefaults.standard.set(isDarkMode, forKey: "darkMode")
            UserDefaults.standard.set(fontSize, forKey: "fontSize")
        }
    }
  notifications/NotificationScheduler.swift: |
    import Foundation
    import Combine

    class NotificationScheduler: ObservableObject {
        @Published var pendingCount = 0
        private var cancellables = Set<AnyCancellable>()

        func scheduleReminder(title: String, delay: TimeInterval) {
            let content = UNMutableNotificationContent()
            content.title = title
            pendingCount += 1
        }

        func cancelAll() {
            pendingCount = 0
        }
    }
  validation/FormValidator.swift: |
    import Foundation

    struct FormValidator {
        static func isValidEmail(_ email: String) -> Bool {
            let pattern = "[A-Z0-9a-z._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
            return email.range(of: pattern, options: .regularExpression) != nil
        }

        static func isNotEmpty(_ value: String) -> Bool {
            return !value.trimmingCharacters(in: .whitespacesAndNewlines).isEmpty
        }

        static func isValidLength(_ value: String, min: Int, max: Int) -> Bool {
            return value.count >= min && value.count <= max
        }
    }
  views/UserListView.swift: |
    import SwiftUI

    class UserListViewModel: ObservableObject {
        @Published var users: [String] = []
        @Published var isLoading = false

        func loadUsers() {
            isLoading = true
            DispatchQueue.main.asyncAfter(deadline: .now() + 1) {
                self.users = ["Alice", "Bob", "Charlie"]
                self.isLoading = false
            }
        }

        func deleteUser(at index: Int) {
            users.remove(at: index)
        }
    }

    struct UserListView: View {
        @ObservedObject var viewModel: UserListViewModel

        var body: some View {
            List(viewModel.users, id: \.self) { user in
                Text(user)
            }
        }
    }

