must_include_files:
  - ApiClient.scala
  - Config.scala

must_include_content_from:
  ApiClient.scala:
    - "Config.getFullUrl(path)"
    - "Config.timeout"
    - "Config.maxRetries"
  Config.scala:
    - "val timeout: Int = 30"
    - "val maxRetries: Int = 3"
    - 'val baseUrl: String = "https://api.example.com"'
    - "def getFullUrl(path: String): String"

must_not_include:
  # HttpHeaders.scala: similar singleton, HTTP vocabulary, not referenced
  - HttpHeaders
  - userAgent
  - authHeader
  - withAuth
  # ResponseParser.scala: parses responses, not called
  - ResponseParser
  - parseJson
  - extractField
  - isSuccess
  # ApiLogger.scala: logs API calls, not called
  - ApiLogger
  - logRequest
  - logResponse
  # RateLimiter.scala: rate limiting, independent
  - RateLimiter
  - acquire
  - maxPerSecond

must_not_include_files:
  - HttpHeaders.scala
  - ResponseParser.scala
  - logging/ApiLogger.scala
  - ratelimit/RateLimiter.scala

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
