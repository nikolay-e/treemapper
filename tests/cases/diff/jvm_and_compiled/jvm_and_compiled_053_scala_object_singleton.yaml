    }
  ApiClient.scala: |
    class ApiClient {
      def fetch(path: String): String = {
        val url = Config.getFullUrl(path)
        val timeout = Config.timeout
        s"Fetching $url with timeout $timeout"
      }

      def retry(action: => String): String = {
        var attempts = 0
        while (attempts < Config.maxRetries) {
          attempts += 1
        }
        action
      }
    }
