# === Assertions ===

must_include_files:
- references.bib

must_include_content_from:
  references.bib:
    - "smith2024"
    - "Weight-Sharing Supernets"

must_not_include:
- GARBAGE_TEX_003_A
- GARBAGE_TEX_003_B
- GARBAGE_TEX_003_C
- GARBAGE_TEX_003_D

must_not_include_files:
- chapters/experiments.tex
- chapters/related.tex
- supplementary.tex
- other_references.bib

max_files: 4
add_garbage_files: false
skip_garbage_check: true
