  chapters/results.tex: |
    \chapter{Results}
    \label{ch:results}

    \section{Experimental Setup}
    We deployed our algorithm on a cluster of 100 nodes across
    three data centers with inter-DC latency of 50ms.

    \section{Throughput Evaluation}
    Figure~\ref{fig:throughput} shows that our algorithm achieves
    $2.3\times$ higher throughput than Raft under contention.

    \begin{figure}[h]
      \centering
      \includegraphics[width=0.8\textwidth]{figures/throughput}
      \caption{Throughput comparison under varying contention levels}
      \label{fig:throughput}
    \end{figure}

    \section{Latency Analysis}
    The median commit latency was 12ms for single-DC operations
    and 67ms for cross-DC consensus.

