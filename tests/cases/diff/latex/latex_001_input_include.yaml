name: latex_001_input_include
repo:
  initial_files:
    main.tex: |
      \documentclass[12pt]{report}
      \usepackage[utf8]{inputenc}
      \usepackage{amsmath}
      \usepackage{graphicx}

      \title{Research on Distributed Systems}
      \author{Jane Doe}
      \date{\today}

      \begin{document}
      \maketitle
      \tableofcontents

      \input{chapters/intro}
      \input{chapters/methods}

      \bibliographystyle{plain}
      \bibliography{references}
      \end{document}
    chapters/intro.tex: |
      \chapter{Introduction}
      \label{ch:intro}

      Distributed systems form the backbone of modern computing
      infrastructure. This thesis explores novel approaches to
      consensus algorithms that improve both latency and throughput
      under realistic network conditions.

      \section{Motivation}
      The growing demand for highly available services has driven
      research into more efficient consensus protocols.

      \section{Contributions}
      We make the following contributions:
      \begin{itemize}
        \item A new consensus algorithm with $O(\log n)$ message complexity
        \item A formal proof of safety and liveness
        \item An experimental evaluation on a 100-node cluster
      \end{itemize}
    chapters/methods.tex: |
      \chapter{Methods}
      \label{ch:methods}

      \section{System Model}
      We assume an asynchronous network with crash-stop failures.
      Each node $p_i$ maintains a local state $s_i$ and communicates
      via reliable point-to-point channels.

      \section{Algorithm Description}
      Our algorithm proceeds in rounds. In each round $r$, the leader
      $\ell_r$ proposes a value $v_r$ and collects acknowledgments
      from a quorum $Q \subseteq \Pi$ where $|Q| > n/2$.
    chapters/conclusion.tex: |
      \chapter{Conclusion}
      \label{ch:conclusion}
      GARBAGE_TEX_001_A: conclusion_marker

      We have presented a novel consensus algorithm that achieves
      logarithmic message complexity while maintaining safety
      and liveness guarantees.
    chapters/related.tex: |
      \chapter{Related Work}
      \label{ch:related}
      GARBAGE_TEX_001_B: related_work_marker

      Paxos~\cite{lamport1998} remains the foundational consensus
      algorithm. Raft~\cite{ongaro2014} simplified the design
      for practical implementations.
    appendices/proofs.tex: |
      \appendix
      \chapter{Formal Proofs}
      GARBAGE_TEX_001_C: proofs_marker

      \begin{theorem}
      The algorithm satisfies agreement.
      \end{theorem}
    references.bib: |
      @article{lamport1998,
        author = {Lamport, Leslie},
        title = {The Part-Time Parliament},
        GARBAGE_TEX_001_D = {bib_marker},
        journal = {ACM TOCS},
        year = {1998}
      }
  changed_files:
