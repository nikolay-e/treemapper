# === Assertions ===

must_include_files:
- chapters/results.tex

must_include_content_from:
  chapters/results.tex:
    - "Experimental Setup"
    - "Throughput Evaluation"
    - "Latency Analysis"

must_not_include:
- GARBAGE_TEX_001_A
- GARBAGE_TEX_001_B
- GARBAGE_TEX_001_C
- GARBAGE_TEX_001_D

must_not_include_files:
- chapters/conclusion.tex
- chapters/related.tex
- appendices/proofs.tex

max_files: 4
add_garbage_files: false
skip_garbage_check: true
