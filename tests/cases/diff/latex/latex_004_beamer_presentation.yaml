  frames/observability.tex: |
    \section{Observability}

    \begin{frame}{Three Pillars}
    \begin{description}
      \item[Metrics] Prometheus + Grafana dashboards
      \item[Logs] Structured JSON logs via Fluentd to Elasticsearch
      \item[Traces] OpenTelemetry SDK with Jaeger backend
    \end{description}
    \end{frame}

    \begin{frame}{Alerting Strategy}
    \begin{itemize}
      \item SLO-based alerts (error budget burn rate)
      \item Page only on customer-impacting issues
      \item Automated runbooks for common failures
      \item Weekly on-call review and postmortems
    \end{itemize}
    \end{frame}

    \begin{frame}{Dashboard Example}
    \centering
    \includegraphics[width=0.9\textwidth]{figures/grafana_dashboard}
    \end{frame}

