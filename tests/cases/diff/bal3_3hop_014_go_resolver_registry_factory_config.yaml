name: bal3_3hop_014_go_resolver_registry_factory_config
tags:
- lang:go
- change:bug_fix
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    di/config/config.go: |
      package config

      type Config struct {
          Bindings map[string]string
      }

      func NewConfig() *Config {
          return &Config{Bindings: make(map[string]string)}
      }

      func (c *Config) Bind(iface, impl string) {
          c.Bindings[iface] = impl
      }

      func (c *Config) Resolve(iface string) string {
          return c.Bindings[iface]
      }
    di/factory/factory.go: |
      package factory

      import "myapp/di/config"

      type Factory struct {
          cfg *config.Config
      }

      func NewFactory(cfg *config.Config) *Factory {
          return &Factory{cfg: cfg}
      }

      func (f *Factory) Create(iface string) string {
          impl := f.cfg.Resolve(iface)
          return "instance:" + impl
      }
    di/registry/registry.go: |
      package registry

      import "myapp/di/factory"

      type Registry struct {
          factory *factory.Factory
          cache   map[string]string
      }

      func NewRegistry(f *factory.Factory) *Registry {
          return &Registry{factory: f, cache: make(map[string]string)}
      }

      func (r *Registry) Get(iface string) string {
          if cached, ok := r.cache[iface]; ok {
              return cached
          }
          instance := r.factory.Create(iface)
          r.cache[iface] = instance
          return instance
      }
    di/resolver/resolver.go: |
      package resolver

      import "myapp/di/registry"

      type Resolver struct {
          registry *registry.Registry
      }

      func NewResolver(reg *registry.Registry) *Resolver {
          return &Resolver{registry: reg}
      }

      func (r *Resolver) Resolve(iface string) string {
          return r.registry.Get(iface)
      }
    di/scope/scope.go: |
      package scope

      var GARBAGE_BAL3_014_SCOPE_MARKER_A = "scope"
      var GARBAGE_BAL3_014_LIFETIME_MARKER_B = "singleton"

      type Scope struct {
          name string
      }

      func (s *Scope) Name() string { return s.name }
    di/scope/child.go: |
      package scope

      var GARBAGE_BAL3_014_CHILD_MARKER_C = "child"
      var GARBAGE_BAL3_014_PARENT_MARKER_D = "root"

      type ChildScope struct{}

      func (c *ChildScope) Inherit() {}
  changed_files:
    di/config/config.go: |
      package config

      import "fmt"

      type Config struct {
          Bindings map[string]string
      }

      func NewConfig() *Config {
          return &Config{Bindings: make(map[string]string)}
      }

      func (c *Config) Bind(iface, impl string) {
          c.Bindings[iface] = impl
      }

      func (c *Config) Resolve(iface string) (string, error) {
          impl, ok := c.Bindings[iface]
          if !ok {
              return "", fmt.Errorf("no binding for %s", iface)
          }
          return impl, nil
      }
  commit_message: "Fix config resolve to return error on missing binding"
