  changed_files:
    src/safe_div.zig: |
      const std = @import("std");

      pub fn safeDivide(a: i32, b: i32) ?i32 {
          if (b == 0) return null;
          return @divTrunc(a, b);
      }

      pub fn remainder(a: i32, b: i32) i32 {
          return @rem(a, b);
      }
    src/garbage_abs.zig: |
      const GARBAGE_B4Z013_ABS_A: []const u8 = "abs";
      const GARBAGE_B4Z013_ABS_B: i32 = -1;

