name: bal3_3hop_072_php_event_dispatcher_chain
tags:
- lang:php
- change:new_function
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/Events/Event.php: |
      <?php
      namespace App\Events;

      abstract class Event {
          private string $name;
          public function __construct(string $name) {
              $this->name = $name;
          }
          public function getName(): string {
              return $this->name;
          }
      }
    src/Events/OrderPlacedEvent.php: |
      <?php
      namespace App\Events;

      use App\Events\Event;

      class OrderPlacedEvent extends Event {
          private int $orderId;
          public function __construct(int $orderId) {
              parent::__construct('order.placed');
              $this->orderId = $orderId;
          }
          public function getOrderId(): int {
              return $this->orderId;
          }
      }
    src/Listeners/EventDispatcher.php: |
      <?php
      namespace App\Listeners;

      use App\Events\Event;

      class EventDispatcher {
          private array $listeners = [];
          public function listen(string $eventName, callable $handler): void {
              $this->listeners[$eventName][] = $handler;
          }
          public function dispatch(Event $event): void {
              foreach ($this->listeners[$event->getName()] ?? [] as $handler) {
                  $handler($event);
              }
          }
      }
    src/Services/OrderService.php: |
      <?php
      namespace App\Services;

      use App\Listeners\EventDispatcher;
      use App\Events\OrderPlacedEvent;

      class OrderService {
          private EventDispatcher $dispatcher;
          public function __construct(EventDispatcher $dispatcher) {
              $this->dispatcher = $dispatcher;
          }
          public function placeOrder(array $items): int {
              $orderId = rand(1, 1000);
              $this->dispatcher->dispatch(new OrderPlacedEvent($orderId));
              return $orderId;
          }
      }
    src/Controllers/OrderController.php: |
      <?php
      namespace App\Controllers;

      use App\Services\OrderService;

      class OrderController {
          private OrderService $service;
          public function __construct(OrderService $service) {
              $this->service = $service;
          }
          public function store(array $request): array {
              $orderId = $this->service->placeOrder($request['items']);
              return ['order_id' => $orderId];
          }
      }
