      package com.logistics;

      import com.logistics.validation.ShipmentValidator;
      import java.util.HashMap;
      import java.util.Map;

      public class TrackingService {
          private final Map<String, String> shipmentStatus = new HashMap<>();
          private final ShipmentValidator validator;

          public TrackingService(ShipmentValidator validator) {
              this.validator = validator;
          }

          public void updateStatus(String shipmentId, String status) {
              validator.validateShipmentId(shipmentId);
              validator.validateStatus(status);
              shipmentStatus.put(shipmentId, status);
          }

          public String getStatus(String shipmentId) {
              return shipmentStatus.getOrDefault(shipmentId, "UNKNOWN");
          }
      }
