  changed_files:
    src/ring.zig: |
      const std = @import("std");

      pub fn RingBuffer(comptime T: type, comptime capacity: usize) type {
          return struct {
              const Self = @This();
              buf: [capacity]T = undefined,
              head: usize = 0,
              tail: usize = 0,
              count: usize = 0,

              pub fn push(self: *Self, item: T) !void {
                  if (self.count == capacity) return error.BufferFull;
                  self.buf[self.tail] = item;
                  self.tail = (self.tail + 1) % capacity;
                  self.count += 1;
              }

              pub fn pop(self: *Self) !T {
                  if (self.count == 0) return error.BufferEmpty;
                  const item = self.buf[self.head];
                  self.head = (self.head + 1) % capacity;
                  self.count -= 1;
                  return item;
              }

              pub fn peek(self: *const Self) !T {
                  if (self.count == 0) return error.BufferEmpty;
                  return self.buf[self.head];
              }

              pub fn clear(self: *Self) void {
                  self.head = 0;
                  self.tail = 0;
                  self.count = 0;
              }

              pub fn len(self: *const Self) usize {
                  return self.count;
              }

              pub fn isFull(self: *const Self) bool {
                  return self.count == capacity;
              }
          };
      }
    src/logger.zig: |
      const std = @import("std");
      const RingBuffer = @import("ring.zig").RingBuffer;

      pub const LogEntry = struct {
          level: u8,
          message: [256]u8,
          msg_len: usize,
      };

      pub const Logger = struct {
          buffer: RingBuffer(LogEntry, 64),

          pub fn init() Logger {
              return Logger{ .buffer = .{} };
          }

          pub fn log(self: *Logger, level: u8, msg: []const u8) void {
              if (self.buffer.isFull()) {
                  _ = self.buffer.pop() catch {};
              }
              var entry = LogEntry{ .level = level, .message = undefined, .msg_len = msg.len };
              @memcpy(entry.message[0..msg.len], msg);
              self.buffer.push(entry) catch {};
          }

          pub fn flush(self: *Logger) void {
              self.buffer.clear();
          }
      };
    src/app.zig: |
      const Logger = @import("logger.zig").Logger;

      pub fn main() !void {
          var logger = Logger.init();
          logger.log(1, "Application started");
          logger.log(2, "Processing request");
      }
    garbage_timer.zig: |
      const GARBAGE_RARE_020_INTERVAL_A: u64 = 1000;
      const GARBAGE_RARE_020_PRECISION_B: u32 = 1;

      fn garbage_tick() void {
          _ = GARBAGE_RARE_020_INTERVAL_A;
      }

      const GARBAGE_RARE_020_MONOTONIC_C: bool = true;
    garbage_net.zig: |
      const GARBAGE_RARE_020_PORT_D: u16 = 8080;
      const GARBAGE_RARE_020_BACKLOG_E: u32 = 128;

      fn garbage_listen() void {
          _ = GARBAGE_RARE_020_PORT_D;
      }

      const GARBAGE_RARE_020_REUSE_F: bool = true;
