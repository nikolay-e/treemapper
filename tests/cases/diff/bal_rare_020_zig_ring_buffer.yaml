      package com.logistics;

      import com.logistics.validation.ShipmentValidator;

      public class NotificationSender {
          private final ShipmentValidator validator;

          public NotificationSender(ShipmentValidator validator) {
              this.validator = validator;
          }

          public void notifyStatusChange(String shipmentId, String status) {
              validator.validateShipmentId(shipmentId);
              System.out.println("Notify: " + shipmentId + " -> " + status);
          }
      }
    src/main/java/com/logistics/validation/ShipmentValidator.java: |
      package com.logistics.validation;

      public class ShipmentValidator {
          public void validateShipmentId(String shipmentId) {
              if (shipmentId == null || shipmentId.isBlank()) {
                  throw new IllegalArgumentException("Shipment ID required");
              }
          }

          public void validateStatus(String status) {
              if (status == null || status.isBlank()) {
                  throw new IllegalArgumentException("Status must not be blank");
              }
          }
      }
