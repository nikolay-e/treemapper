      <?php
      namespace App\Services;

      use App\Config\ConfigParser;

      class DatabaseBootstrap
      {
          private ConfigParser $parser;

          public function __construct(ConfigParser $parser)
          {
              $this->parser = $parser;
          }

          public function getDsn(string $configContent): string
          {
              $config = $this->parser->parse($configContent);
              $host = $this->parser->get($config, 'db_host');
              $port = $this->parser->get($config, 'db_port');
              return "mysql:host={$host};port={$port}";
          }
      }
