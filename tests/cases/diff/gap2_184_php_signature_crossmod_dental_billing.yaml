    src/Scheduling/ChairAllocator.php: |
      <?php

      namespace App\Scheduling;

      class ChairAllocator
      {
          private int $totalChairs;

          public function __construct(int $totalChairs)
          {
              $this->totalChairs = $totalChairs;
          }

          public function available(): int
          {
              return $this->totalChairs;
          }
      }
  changed_files:
    src/Dental/TreatmentBiller.php: |
      <?php

      namespace App\Dental;

      use App\Dental\ProcedureCode;

      class TreatmentBiller
      {
          private array $lineItems = [];

          public function addProcedure(ProcedureCode $code, float $discountPercent = 0.0): void
          {
              $fee = $code->fee();
              $discounted = $fee * (1.0 - $discountPercent / 100.0);
              $this->lineItems[] = $discounted;
          }

          public function totalDue(): float
          {
              return array_sum($this->lineItems);
          }
      }
  commit_message: "feat: add discount parameter to dental procedure billing"
