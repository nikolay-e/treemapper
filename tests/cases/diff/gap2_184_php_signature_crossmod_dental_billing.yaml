    src/Dental/ProcedureCode.php: |
      <?php

      namespace App\Dental;

      class ProcedureCode
      {
          private string $code;
          private float $baseFee;

          public function __construct(string $code, float $baseFee)
          {
              $this->code = $code;
              $this->baseFee = $baseFee;
          }

          public function fee(): float
          {
              return $this->baseFee;
          }

          public function code(): string
          {
              return $this->code;
