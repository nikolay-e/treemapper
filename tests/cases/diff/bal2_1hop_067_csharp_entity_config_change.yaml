          }
      }
    src/Data/InvoiceConfiguration.cs: |
      using System;
      using App.Entities;
      using Microsoft.EntityFrameworkCore;
      using Microsoft.EntityFrameworkCore.Metadata.Builders;

      namespace App.Data
      {
          public class InvoiceConfiguration : IEntityTypeConfiguration<Invoice>
          {
              public void Configure(EntityTypeBuilder<Invoice> builder)
              {
                  builder.HasKey(i => i.Id);
                  builder.Property(i => i.Number).HasMaxLength(50).IsRequired();
                  builder.Property(i => i.Total).HasPrecision(18, 2);
                  builder.HasMany(i => i.Lines).WithOne(l => l.Invoice).HasForeignKey(l => l.InvoiceId);
              }
          }
      }
    src/Data/AppDbContext.cs: |
      using System;
      using App.Entities;
      using Microsoft.EntityFrameworkCore;

      namespace App.Data
      {
          public class AppDbContext : DbContext
          {
              public DbSet<Invoice> Invoices { get; set; }
              public DbSet<InvoiceLine> InvoiceLines { get; set; }

              protected override void OnModelCreating(ModelBuilder modelBuilder)
              {
                  modelBuilder.ApplyConfiguration(new InvoiceConfiguration());
              }
          }
      }
    src/Services/InvoiceService.cs: |
      using System;
      using System.Linq;
      using System.Threading.Tasks;
      using App.Data;
      using App.Entities;
      using Microsoft.EntityFrameworkCore;

      namespace App.Services
      {
          public class InvoiceService
          {
              private readonly AppDbContext _db;

              public InvoiceService(AppDbContext db)
              {
                  _db = db;
              }

              public async Task<Invoice> GetInvoice(int id)
              {
                  return await _db.Invoices.Include(i => i.Lines).FirstOrDefaultAsync(i => i.Id == id);
              }

              public async Task<decimal> CalculateTotal(int id)
              {
                  var invoice = await GetInvoice(id);
                  return invoice?.Lines.Sum(l => l.Amount) ?? 0;
              }
          }
      }
    src/Repositories/InvoiceRepository.cs: |
      using System;
      using System.Collections.Generic;
      using System.Threading.Tasks;
      using App.Data;
      using App.Entities;
      using Microsoft.EntityFrameworkCore;

      namespace App.Repositories
      {
          public class InvoiceRepository
          {
              private readonly AppDbContext _db;

              public InvoiceRepository(AppDbContext db)
              {
                  _db = db;
              }

              public async Task<List<Invoice>> GetAll()
              {
                  return await _db.Invoices.Include(i => i.Lines).ToListAsync();
              }
          }
      }
