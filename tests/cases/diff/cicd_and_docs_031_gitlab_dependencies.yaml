name: cicd_and_docs_031_gitlab_dependencies
tags:
- lang:shell
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    .gitlab-ci.yml: |
      stages:
        - build
        - deploy

      build:
        stage: build
        script:
          - npm ci
          - npm run build
        artifacts:
          paths:
            - dist/

      deploy:
        stage: deploy
        script:
          - ./deploy.sh
    deploy.sh: |
      #!/bin/bash
      set -e
      echo "Deploying from dist/"
      scp -r dist/* server:/var/www/app/
    package.json: |
      {
        "name": "gitlab-dependencies-app",
        "version": "1.0.0",
        "scripts": {
          "build": "webpack --mode production"
        }
      }
    garbage_artifact_store.ts: |
      const GARBAGE_CICD_DOCS_031_STORE_MARKER_A = "s3";
      const GARBAGE_CICD_DOCS_031_BUCKET_MARKER_B = "artifacts";

      class GarbageArtifactStore {
        static GARBAGE_CICD_DOCS_031_COMPRESS_MARKER_C = true;
        upload(): void {}
      }
    garbage_artifact_fetcher.ts: |
      const GARBAGE_CICD_DOCS_031_FETCH_MARKER_D = "http";
      const GARBAGE_CICD_DOCS_031_RETRY_MARKER_E = 3;

      class GarbageArtifactFetcher {
        static GARBAGE_CICD_DOCS_031_TIMEOUT_MARKER_F = 30000;
        fetch(): void {}
      }
  changed_files:
    .gitlab-ci.yml: |
      stages:
        - build
        - deploy

      build:
        stage: build
        script:
          - npm ci
          - npm run build
        artifacts:
          paths:
            - dist/

      deploy:
        stage: deploy
        dependencies:
          - build
        script:
          - ./deploy.sh dist/
    deploy.sh: |
      #!/bin/bash
      set -e
      DIST_DIR="${1:-dist}"
      echo "Deploying from $DIST_DIR/"
      scp -r "$DIST_DIR"/* server:/var/www/app/
    package.json: |
      {
        "name": "gitlab-dependencies-app",
        "version": "1.0.0",
        "scripts": {
          "build": "webpack --mode production"
        }
      }
    garbage_artifact_store.ts: |
      const GARBAGE_CICD_DOCS_031_STORE_MARKER_A = "s3";
      const GARBAGE_CICD_DOCS_031_BUCKET_MARKER_B = "artifacts";

      class GarbageArtifactStore {
        static GARBAGE_CICD_DOCS_031_COMPRESS_MARKER_C = true;
        upload(): void {}
      }
    garbage_artifact_fetcher.ts: |
      const GARBAGE_CICD_DOCS_031_FETCH_MARKER_D = "http";
      const GARBAGE_CICD_DOCS_031_RETRY_MARKER_E = 3;

      class GarbageArtifactFetcher {
        static GARBAGE_CICD_DOCS_031_TIMEOUT_MARKER_F = 30000;
        fetch(): void {}
      }
  commit_message: Update files
fragments:
- id: gitlab_ci_file
  selector:
    path: .gitlab-ci.yml
- id: deploy_file
  selector:
    path: deploy.sh
- id: req_global_0
  selector:
    anchor: 'dependencies:'
- id: req_global_1
  selector:
    anchor: DIST_DIR="${1:-dist}"
- id: no_global_0
  selector:
    anchor: GARBAGE_CICD_DOCS_031_COMPRESS_MARKER_C
- id: no_global_1
  selector:
    anchor: GARBAGE_CICD_DOCS_031_FETCH_MARKER_D
- id: no_global_2
  selector:
    anchor: GARBAGE_CICD_DOCS_031_RETRY_MARKER_E
- id: no_global_3
  selector:
    anchor: GARBAGE_CICD_DOCS_031_TIMEOUT_MARKER_F
- id: no_global_4
  selector:
    anchor: garbage_artifact_fetcher.ts
oracle:
  required:
  - gitlab_ci_file
  - deploy_file
  - req_global_0
  - req_global_1
  allowed: []
  forbidden:
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
