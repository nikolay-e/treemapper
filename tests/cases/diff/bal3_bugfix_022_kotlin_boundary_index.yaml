    anchor: "concurrency"
- id: create_pool
  selector:
    path: src/worker/pool.py
    anchor: "def create_worker_pool"
- id: no_scheduler
  selector:
    path: src/worker/scheduler.py
- id: no_garbage_a
  selector:
    anchor: GARBAGE_WRK_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_WRK_B
- id: no_garbage_c
  selector:
    anchor: GARBAGE_WRK_C
oracle:
