  changed_files:
    Sources/Events/EventBus.swift: |
      import Foundation

      struct EventPayload {
          let name: String
          let data: Any?
          let timestamp: Date
      }

      typealias EventHandler = (EventPayload) -> Void

      class EventBus {
          private var handlers: [String: [EventHandler]] = [:]

          func on(_ event: String, handler: @escaping EventHandler) {
              handlers[event, default: []].append(handler)
          }

          func emit(_ event: String, data: Any? = nil) {
              let payload = EventPayload(name: event, data: data, timestamp: Date())
              handlers[event]?.forEach { $0(payload) }
          }

          func once(_ event: String, handler: @escaping EventHandler) {
              var token: Int?
              let wrapper: EventHandler = { payload in
                  handler(payload)
              }
              handlers[event, default: []].append(wrapper)
          }

          func removeAll(for event: String) {
              handlers[event] = nil
          }
      }
