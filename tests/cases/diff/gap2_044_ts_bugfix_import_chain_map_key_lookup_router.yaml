repo:
  initial_files:
    src/rate_limiter.erl: |
      -module(rate_limiter).
      -export([new/2, allow/2, reset/1]).

      new(MaxRequests, WindowMs) ->
          #{max => MaxRequests, window => WindowMs, count => 0, start_time => erlang:system_time(millisecond)}.

      allow(State = #{max := Max, count := Count, window := Window, start_time := Start}, _Key) ->
          Now = erlang:system_time(millisecond),
          Elapsed = Now - Start,
          if
              Elapsed > Window ->
                  {allow, State#{count => 1, start_time => Now}};
              Count < Max ->
                  {allow, State#{count => Count + 1}};
              true ->
                  {deny, State}
          end.

      reset(State) ->
          State#{count => 0, start_time => erlang:system_time(millisecond)}.
    src/api_gateway.erl: |
      -module(api_gateway).
      -export([handle/3]).

      handle(Path, Method, State) ->
          case rate_limiter:allow(State, Path) of
              {allow, NewState} ->
                  {ok, route(Path, Method), NewState};
              {deny, NewState} ->
                  {error, rate_limited, NewState}
          end.

      route("/health", _) -> health_check;
      route("/api/v1/users", "GET") -> list_users;
      route("/api/v1/users", "POST") -> create_user;
      route(_, _) -> not_found.
