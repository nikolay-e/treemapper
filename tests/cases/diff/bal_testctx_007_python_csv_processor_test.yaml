      from src.csv_processor import parse_csv

      def test_parse_simple_csv():
          csv_data = "name,age\nAlice,30\nBob,25"
          result = parse_csv(csv_data)
          assert len(result) == 2
          assert result[0]["name"] == "Alice"
          assert result[1]["age"] == "25"

      def test_parse_empty_csv():
          csv_data = "name,age"
          result = parse_csv(csv_data)
          assert result == []
