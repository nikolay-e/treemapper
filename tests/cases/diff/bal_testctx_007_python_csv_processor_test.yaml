      from typing import Any, Dict, List

      def to_excel_rows(data: List[Dict[str, Any]]) -> List[List[Any]]:
          if not data:
              return []
          headers = list(data[0].keys())
          rows = [headers]
          for item in data:
              rows.append([item.get(h, "") for h in headers])
          return rows
