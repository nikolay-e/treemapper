  changed_files:
    src/handlers.ts: |
      export function createClickHandler(id: string) {
          return () => console.log('Clicked:', id);
      }
    src/ActionButton.tsx: |
      import { useCallback } from 'react';
      import { createClickHandler } from './handlers';

      export function ActionButton({ id }: { id: string }) {
          const handleClick = useCallback(() => {
              createClickHandler(id)();
          }, [id]);

          return <button onClick={handleClick}>Action</button>;
      }
    src/event-analytics.ts: |
      export function trackClick(elementId: string, timestamp: number): void {
          console.log(`Click tracked: ${elementId} at ${timestamp}`);
      }

      export function trackHover(elementId: string, durationMs: number): void {
          console.log(`Hover tracked: ${elementId} for ${durationMs}ms`);
      }
    src/ActionButton.styles.ts: |
      export const buttonStyles = {
          primary: { backgroundColor: '#007bff', color: 'white', padding: '8px 16px' },
          secondary: { backgroundColor: '#6c757d', color: 'white', padding: '8px 16px' },
          disabled: { backgroundColor: '#ccc', color: '#666', cursor: 'not-allowed' },
      };
