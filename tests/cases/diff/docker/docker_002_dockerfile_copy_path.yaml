# Test 002: Node.js Dockerfile rewritten with precise COPY paths — reviewer needs
#           package.json and source to verify paths match
#
# Scenario: Node.js Dockerfile rewritten from flat COPY to multi-stage with separate
# dependency, builder, and production stages. COPY paths become precise: package*.json,
# then src/ with --chown. HEALTHCHECK added targeting /api/health endpoint.
#
# Reviewer questions:
#   Q1: "Does package.json define the scripts (start) referenced in CMD?"
#       -> package.json has `"start": "node src/index.js"`. Reviewer needs
#       this to verify CMD matches the declared entry point.
#   Q2: "Does src/index.js expose the /api/health endpoint the HEALTHCHECK expects?"
#       -> src/index.js has `app.get('/api/health', ...)`. Reviewer needs
#       to confirm the endpoint exists and returns 200.
#   Q3: "Does the app listen on port 3000 matching EXPOSE?"
#       -> src/index.js has `const PORT = process.env.PORT || 3000`.
#
# Not needed:
#   - scripts/deploy.sh: runs `docker build` and `docker push` — mentions
#     Dockerfile but is an ops script, not relevant to COPY path review.
#   - tests/api.test.js: shares /api/health endpoint name with HEALTHCHECK
#     but test infrastructure adds nothing to build review.
#   - terraform/main.tf: defines ECS task with same image — different
#     infrastructure layer entirely.

initial:
  src/index.js: |
    const express = require('express');
    const cors = require('cors');
    const helmet = require('helmet');

    const app = express();
    app.use(cors());
    app.use(helmet());
    app.use(express.json());

    app.get('/api/health', (req, res) => {
        res.json({ status: 'healthy', timestamp: Date.now() });
    });

    app.get('/api/users', (req, res) => {
        res.json({ users: [] });
    });

    const PORT = process.env.PORT || 3000;
    app.listen(PORT, () => console.log(`Server running on port ${PORT}`));
  src/middleware/auth.js: |
    const jwt = require('jsonwebtoken');

    function authenticateToken(req, res, next) {
        const token = req.headers['authorization']?.split(' ')[1];
        if (!token) return res.sendStatus(401);
        jwt.verify(token, process.env.JWT_SECRET, (err, user) => {
            if (err) return res.sendStatus(403);
            req.user = user;
            next();
        });
    }

    module.exports = { authenticateToken };
  package.json: |
    {
      "name": "api-server",
      "version": "1.0.0",
      "main": "src/index.js",
      "scripts": {
        "start": "node src/index.js",
        "dev": "nodemon src/index.js"
      },
      "dependencies": {
        "express": "^4.18.2",
        "cors": "^2.8.5",
        "helmet": "^7.1.0",
        "jsonwebtoken": "^9.0.0"
      }
    }
  Dockerfile: |
    FROM node:18
    WORKDIR /app
    COPY src/ /app/src/
    CMD ["node", "src/index.js"]
  scripts/deploy.sh: |
    #!/bin/bash
    docker build -t api:latest .
    docker push registry.example.com/api:latest
  tests/api.test.js: |
    const request = require('supertest');
    describe('API', () => {
        it('should return health', async () => {
            const res = await request(app).get('/api/health');
            expect(res.status).toBe(200);
        });
    });
  terraform/main.tf: |
    provider "aws" {
      region = "us-east-1"
    }
    resource "aws_ecs_task_definition" "api" {
      container_definitions = jsonencode([{
        image = "api:latest"
        portMappings = [{ containerPort = 3000 }]
      }])
    }

changed:
  src/index.js: |
    const express = require('express');
    const cors = require('cors');
    const helmet = require('helmet');

    const app = express();
    app.use(cors());
    app.use(helmet());
    app.use(express.json());

    app.get('/api/health', (req, res) => {
        res.json({ status: 'healthy', timestamp: Date.now() });
    });

    app.get('/api/users', (req, res) => {
        res.json({ users: [] });
    });

    const PORT = process.env.PORT || 3000;
    app.listen(PORT, () => console.log(`Server running on port ${PORT}`));
  src/middleware/auth.js: |
    const jwt = require('jsonwebtoken');

    function authenticateToken(req, res, next) {
        const token = req.headers['authorization']?.split(' ')[1];
        if (!token) return res.sendStatus(401);
        jwt.verify(token, process.env.JWT_SECRET, (err, user) => {
            if (err) return res.sendStatus(403);
            req.user = user;
            next();
        });
    }

    module.exports = { authenticateToken };
  package.json: |
    {
      "name": "api-server",
      "version": "1.0.0",
      "main": "src/index.js",
      "scripts": {
        "start": "node src/index.js",
        "dev": "nodemon src/index.js"
      },
      "dependencies": {
        "express": "^4.18.2",
        "cors": "^2.8.5",
        "helmet": "^7.1.0",
        "jsonwebtoken": "^9.0.0"
      }
    }
  Dockerfile: |
    # Build stage - install dependencies
    FROM node:20-alpine AS deps
    WORKDIR /app
    COPY package*.json ./
    RUN npm ci --only=production && \
        npm cache clean --force

    # Build stage - for development dependencies
    FROM node:20-alpine AS builder
    WORKDIR /app
    COPY package*.json ./
    RUN npm ci
    COPY src/ ./src/

    # Production stage
    FROM node:20-alpine AS production
    WORKDIR /app

    # Security: run as non-root
    RUN addgroup -g 1001 -S nodejs && \
        adduser -S nodejs -u 1001

    # Copy production dependencies
    COPY --from=deps --chown=nodejs:nodejs /app/node_modules ./node_modules
    COPY --from=builder --chown=nodejs:nodejs /app/src ./src
    COPY --chown=nodejs:nodejs package*.json ./

    USER nodejs
    EXPOSE 3000

    ENV NODE_ENV=production
    ENV PORT=3000

    HEALTHCHECK --interval=30s --timeout=3s --start-period=5s \
        CMD wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1

    CMD ["node", "src/index.js"]
  scripts/deploy.sh: |
    #!/bin/bash
    docker build -t api:latest .
    docker push registry.example.com/api:latest
  tests/api.test.js: |
    const request = require('supertest');
    describe('API', () => {
        it('should return health', async () => {
            const res = await request(app).get('/api/health');
            expect(res.status).toBe(200);
        });
    });
  terraform/main.tf: |
    provider "aws" {
      region = "us-east-1"
    }
    resource "aws_ecs_task_definition" "api" {
      container_definitions = jsonencode([{
        image = "api:latest"
        portMappings = [{ containerPort = 3000 }]
      }])
    }

must_include_files:
  - Dockerfile
  # Q1: Does "start" script match CMD? Does the app have needed entry point?
  - package.json
  # Q2+Q3: Does /api/health exist for HEALTHCHECK? Does app bind port 3000?
  - src/index.js

must_include_content_from:
  Dockerfile:
    - COPY package*.json ./
    - COPY --from=deps --chown=nodejs:nodejs /app/node_modules ./node_modules
    - CMD ["node", "src/index.js"]
  package.json:
    - '"start": "node src/index.js"'
  src/index.js:
    - "/api/health"
    - "process.env.PORT || 3000"

must_not_include:
  # --- deploy.sh: ops script, does not inform COPY path review ---
  - docker push registry.example.com
  - docker build -t api
  # --- tests: shares /api/health URL but is test infrastructure ---
  - supertest
  - expect(res.status).toBe(200)
  # --- terraform: different infrastructure layer ---
  - aws_ecs_task_definition
  - containerPort
must_not_include_files:
  - scripts/deploy.sh
  - tests/api.test.js
  - terraform/main.tf

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
