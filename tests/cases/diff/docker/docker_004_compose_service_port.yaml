            res.end(JSON.stringify({ running: true, uptime: process.uptime() }));
        }
    };

    const server = http.createServer((req, res) => {
        const pathname = url.parse(req.url).pathname;
        const handler = routes[pathname] || ((req, res) => {
            res.writeHead(404);
            res.end('Not Found');
        });
        handler(req, res);
    });

