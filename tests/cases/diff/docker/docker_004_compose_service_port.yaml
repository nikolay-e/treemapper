    };
  package.json: |
    {
      "name": "http-server",
      "version": "1.0.0",
      "main": "src/server.js",
      "scripts": {
        "start": "node src/server.js"
      }
    }
  Dockerfile: |
    FROM node:20-alpine
    WORKDIR /app
    COPY package*.json ./
    RUN npm ci --only=production
    COPY src/ ./src/
    CMD ["node", "src/server.js"]
  docker-compose.yml: |
    version: '3.8'

    services:
      web:
        build:
          context: .
          dockerfile: Dockerfile
        image: myregistry/web:${VERSION:-latest}
        container_name: web-server
        hostname: web
        ports:
          - "${HOST_PORT:-8080}:${CONTAINER_PORT:-8080}"
          - "127.0.0.1:9090:9090"
        environment:
          - PORT=${CONTAINER_PORT:-8080}
          - HOST=0.0.0.0
          - NODE_ENV=production
        healthcheck:
          test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 40s
        restart: unless-stopped
        logging:
          driver: json-file
          options:
            max-size: "10m"
            max-file: "3"
        deploy:
          resources:
            limits:
              cpus: '0.5'
              memory: 256M
            reservations:
              cpus: '0.25'
              memory: 128M

      nginx:
        image: nginx:alpine
        ports:
          - "80:80"
          - "443:443"
        volumes:
          - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
        depends_on:
          web:
            condition: service_healthy
        restart: unless-stopped

    networks:
      default:
        driver: bridge
  scripts/start_dev.sh: |
    #!/bin/bash
    docker-compose up -d
  tests/integration.test.js: |
    describe('Server', () => {
        it('should respond on port', () => {});
    });
  docs/networking.md: |
    # Network Configuration
  nginx/nginx.conf: |
    upstream backend {
    }
  k8s/service.yaml: |
    apiVersion: v1
must_include_files:
- docker-compose.yml
must_include_content:
- 'dockerfile: Dockerfile'
- 'driver: bridge'
add_garbage_files: false
skip_garbage_check: true
