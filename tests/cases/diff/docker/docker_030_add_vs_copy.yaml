# Scenario: Python Dockerfile refactored to use ADD for tar extraction and
# remote URL fetch (with --checksum) instead of manual COPY + RUN tar -xzf.
# COPY retained for regular files. App code and requirements unchanged.
#
# Reviewer questions:
#   1. Does src/app.py reference /app/assets/ and /app/config/ matching ADD target paths?
#   2. Does the app load config from /app/config/ — what file does load_config read?
#   3. Does the app expect assets at /app/assets/ — matching ADD extraction target?

max_enrichment: 4.5
initial:
  src/app.py: |
    import os
    import tarfile
    from pathlib import Path

    ASSETS_DIR = Path('/app/assets')
    CONFIG_DIR = Path('/app/config')

    def extract_assets():
        if ASSETS_DIR.exists():
            print(f"Assets loaded: {list(ASSETS_DIR.iterdir())}")

    def load_config():
        config_file = CONFIG_DIR / 'app.json'
        if config_file.exists():
            return config_file.read_text()
        return '{}'
  assets.tar.gz: |
    (binary tarball placeholder)
  requirements.txt: |
    flask==2.3.0
  Dockerfile: |
    FROM python:3.11-slim
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install -r requirements.txt
    COPY assets.tar.gz /app/
    RUN tar -xzf assets.tar.gz && rm assets.tar.gz
    COPY src/ ./src/
    CMD ["python", "src/app.py"]

  # Trap: prepare assets script — creates the tarball, but is build tooling
  scripts/prepare_assets.sh: |
    #!/bin/bash
    cd assets/
    tar -czf ../assets.tar.gz .
    echo "Assets packed: $(du -sh ../assets.tar.gz)"

  # Trap: CDN config — mentions assets but is delivery infrastructure
  cdn/config.yaml: |
    origins:
      - name: app-assets
        bucket: s3://my-assets-bucket
        path: /assets/

  # Trap: build checksums — mentions sha256 but is separate verification tooling
  build/checksums.txt: |
    sha256:abc123def456  assets.tar.gz
    sha256:789ghi012jkl  config-defaults.json

changed:
  src/app.py: |
    import os
    import tarfile
    from pathlib import Path

    ASSETS_DIR = Path('/app/assets')
    CONFIG_DIR = Path('/app/config')

    def extract_assets():
        if ASSETS_DIR.exists():
            print(f"Assets loaded: {list(ASSETS_DIR.iterdir())}")

    def load_config():
        config_file = CONFIG_DIR / 'app.json'
        if config_file.exists():
            return config_file.read_text()
        return '{}'
  assets.tar.gz: |
    (binary tarball placeholder)
  requirements.txt: |
    flask==2.3.0
  Dockerfile: |
    FROM python:3.12-slim-bookworm AS base
    ENV PYTHONDONTWRITEBYTECODE=1
    ENV PYTHONUNBUFFERED=1

    FROM base AS dependencies
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install --no-cache-dir -r requirements.txt

    FROM base AS production
    WORKDIR /app

    # ADD automatically extracts tar archives
    ADD assets.tar.gz /app/assets/

    # ADD can fetch remote URLs (use with caution - prefer COPY for local files)
    ADD --checksum=sha256:abc123def456 https://releases.example.com/config/v1.0/defaults.json /app/config/defaults.json

    # COPY for regular files (preferred over ADD for non-archives)
    COPY --from=dependencies /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages
    COPY --from=dependencies /usr/local/bin /usr/local/bin
    COPY src/ ./src/

    RUN useradd --create-home appuser && \
        chown -R appuser:appuser /app
    USER appuser

    CMD ["python", "src/app.py"]

  scripts/prepare_assets.sh: |
    #!/bin/bash
    cd assets/
    tar -czf ../assets.tar.gz .
    echo "Assets packed: $(du -sh ../assets.tar.gz)"
  cdn/config.yaml: |
    origins:
      - name: app-assets
        bucket: s3://my-assets-bucket
        path: /assets/
  build/checksums.txt: |
    sha256:abc123def456  assets.tar.gz
    sha256:789ghi012jkl  config-defaults.json

# === Assertions ===

must_include_files:
- Dockerfile

must_include_content_from:
  # Reviewer needs to verify app references the exact paths used in ADD directives
  src/app.py:
    - ASSETS_DIR = Path('/app/assets')
    - CONFIG_DIR = Path('/app/config')

must_not_include_files:
  # Prepare script — creates the tarball but is build tooling, not Dockerfile concern
- scripts/prepare_assets.sh
  # CDN config — asset delivery infrastructure, not Docker build
- cdn/config.yaml
  # Checksums — mentions same sha256 but is separate verification tooling
- build/checksums.txt

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
