# Test 019: Python Dockerfile gains apt-get system deps and alembic COPY
#           — reviewer needs requirements.txt to verify why libpq-dev is needed
#
# Scenario: Python Flask Dockerfile rewritten from simple "pip install -r requirements.txt"
# and "COPY . ." to multi-stage with explicit system dependency installation
# (libpq-dev, curl via apt-get), alembic directory copying, and gunicorn CMD.
#
# Reviewer questions:
#   Q1: "Why install libpq-dev — does requirements.txt include psycopg2?"
#       -> requirements.txt has psycopg2-binary==2.9.9 which needs libpq.
#       Reviewer needs this to justify the apt-get install of libpq-dev.
#   Q2: "Does alembic/ directory exist and what's in alembic/env.py?"
#       -> alembic/env.py imports from src.models and configures migrations.
#       Reviewer needs to see this to verify COPY alembic/ is meaningful.
#   Q3: "Does src/app.py export the 'app' object gunicorn expects?"
#       -> src/app.py has `app = Flask(__name__)`. The gunicorn CMD targets
#       `src.app:app` — reviewer needs to verify this object exists.
#
# Not needed:
#   - scripts/ci_test.sh: runs pytest with coverage — CI script, not build-relevant.
#   - tests/conftest.py: imports from src.app but is test infrastructure.
#   - k8s/deployment.yaml: references same image and port but is different layer.

max_enrichment: 4.1
initial:
  requirements.txt: |
    flask==2.3.0
    gunicorn==21.2.0
    psycopg2-binary==2.9.9
    alembic==1.13.0
    sqlalchemy==2.0.23
  src/app.py: |
    from flask import Flask
    from sqlalchemy import create_engine
    import os
    app = Flask(__name__)
    engine = create_engine(os.environ['DATABASE_URL'])
  alembic/env.py: |
    from alembic import context
    from src.models import Base
    target_metadata = Base.metadata

    def run_migrations_online():
        connectable = context.config.attributes.get("connection", None)
        with connectable.connect() as connection:
            context.configure(connection=connection, target_metadata=target_metadata)
            with context.begin_transaction():
                context.run_migrations()
  Dockerfile: |
    FROM python:3.11-slim
    COPY requirements.txt .
    RUN pip install -r requirements.txt
    COPY . .
    CMD ["python", "app.py"]
  scripts/ci_test.sh: |
    #!/bin/bash
    set -e
    pytest tests/ -v --cov=src
    coverage report --fail-under=80
  tests/conftest.py: |
    import pytest
    from src.app import app
    @pytest.fixture
    def client():
        return app.test_client()
  k8s/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: flask-app
    spec:
      template:
        spec:
          containers:
            - name: app
              image: flask-app:latest
              ports:
                - containerPort: 8000

changed:
  requirements.txt: |
    flask==2.3.0
    gunicorn==21.2.0
    psycopg2-binary==2.9.9
    alembic==1.13.0
    sqlalchemy==2.0.23
  src/app.py: |
    from flask import Flask
    from sqlalchemy import create_engine
    import os
    app = Flask(__name__)
    engine = create_engine(os.environ['DATABASE_URL'])
  alembic/env.py: |
    from alembic import context
    from src.models import Base
    target_metadata = Base.metadata

    def run_migrations_online():
        connectable = context.config.attributes.get("connection", None)
        with connectable.connect() as connection:
            context.configure(connection=connection, target_metadata=target_metadata)
            with context.begin_transaction():
                context.run_migrations()
  Dockerfile: |
    FROM python:3.12-slim-bookworm AS base
    ENV PYTHONDONTWRITEBYTECODE=1
    ENV PYTHONUNBUFFERED=1

    # Install system dependencies
    RUN apt-get update && apt-get install -y --no-install-recommends \
        libpq-dev \
        curl \
        && rm -rf /var/lib/apt/lists/* \
        && apt-get clean

    FROM base AS dependencies
    WORKDIR /app
    COPY requirements.txt .

    # Install Python dependencies with optimizations
    RUN pip install --no-cache-dir --upgrade pip && \
        pip install --no-cache-dir -r requirements.txt && \
        find /usr/local -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true

    FROM base AS production
    WORKDIR /app

    # Copy dependencies from builder
    COPY --from=dependencies /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages
    COPY --from=dependencies /usr/local/bin /usr/local/bin

    # Copy application code
    COPY src/ ./src/
    COPY alembic/ ./alembic/
    COPY alembic.ini ./

    # Create non-root user and set permissions
    RUN useradd --create-home --shell /bin/bash appuser && \
        chown -R appuser:appuser /app

    USER appuser
    EXPOSE 8000

    CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:8000", "src.app:app"]
  scripts/ci_test.sh: |
    #!/bin/bash
    set -e
    pytest tests/ -v --cov=src
    coverage report --fail-under=80
  tests/conftest.py: |
    import pytest
    from src.app import app
    @pytest.fixture
    def client():
        return app.test_client()
  k8s/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: flask-app
    spec:
      template:
        spec:
          containers:
            - name: app
              image: flask-app:latest
              ports:
                - containerPort: 8000

must_include_files:
  - Dockerfile
  # Q1: Why libpq-dev? requirements.txt has psycopg2-binary.
  - requirements.txt

must_include_content_from:
  Dockerfile:
    - RUN apt-get update && apt-get install -y --no-install-recommends \
    - libpq-dev
    - COPY alembic/ ./alembic/
    - 'CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:8000", "src.app:app"]'
  requirements.txt:
    - psycopg2-binary==2.9.9
    - alembic==1.13.0

must_not_include:
  # --- ci_test.sh: CI script, not relevant to RUN commands in Dockerfile ---
  - pytest tests/ -v
  - coverage report --fail-under
  # --- tests/conftest.py: test infrastructure ---
  - "@pytest.fixture"
  - app.test_client
  # --- k8s: different infrastructure layer ---
  - "kind: Deployment"
  - flask-app:latest
must_not_include_files:
  - scripts/ci_test.sh
  - tests/conftest.py
  - k8s/deployment.yaml

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
