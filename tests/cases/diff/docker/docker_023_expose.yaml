# Scenario: Python Flask Dockerfile gains multiple EXPOSE directives: 8080/tcp for the
# app, 9090/tcp for Prometheus metrics, and 5678/tcp for debug. Previously had no EXPOSE.
# The app integrates prometheus_client on a DispatcherMiddleware.
#
# Reviewer questions:
#   1. Does src/app.py bind to port 8080 matching the main EXPOSE?
#   2. Does the app actually serve /metrics on port 9090 or same port?
#   3. What does the HEALTHCHECK target — does /health exist?

initial:
  src/app.py: |
    from flask import Flask, jsonify
    from prometheus_client import make_wsgi_app
    from werkzeug.middleware.dispatcher import DispatcherMiddleware

    app = Flask(__name__)

    @app.route('/health')
    def health():
        return jsonify(status='ok')

    @app.route('/ready')
    def ready():
        return jsonify(status='ready')

    app.wsgi_app = DispatcherMiddleware(app.wsgi_app, {
        '/metrics': make_wsgi_app()
    })

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080)
  requirements.txt: |
    flask==2.3.0
    gunicorn==21.2.0
    prometheus-client==0.19.0
  Dockerfile: |
    FROM python:3.11-slim
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install -r requirements.txt
    COPY src/ ./src/
    CMD ["python", "src/app.py"]

  # Trap: health check script — uses curl on port 8080 like HEALTHCHECK, but is ops tool
  scripts/health_check.sh: |
    #!/bin/bash
    curl -f http://localhost:8080/health || exit 1
    curl -f http://localhost:9090/metrics || echo "Metrics not available"

  # Trap: test file — tests same /health endpoint
  tests/test_endpoints.py: |
    from src.app import app
    def test_health():
        client = app.test_client()
        resp = client.get('/health')
        assert resp.status_code == 200

  # Trap: K8s service — defines ports 8080 and 9090 but is different layer
  k8s/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: flask-app
    spec:
      ports:
        - name: http
          port: 8080
          targetPort: 8080
        - name: metrics
          port: 9090
          targetPort: 9090

  # Trap: monitoring config — references same metrics port
  monitoring/alerts.yaml: |
    groups:
      - name: app-alerts
        rules:
          - alert: AppDown
            expr: up{job="flask-app"} == 0

changed:
  src/app.py: |
    from flask import Flask, jsonify
    from prometheus_client import make_wsgi_app
    from werkzeug.middleware.dispatcher import DispatcherMiddleware

    app = Flask(__name__)

    @app.route('/health')
    def health():
        return jsonify(status='ok')

    @app.route('/ready')
    def ready():
        return jsonify(status='ready')

    app.wsgi_app = DispatcherMiddleware(app.wsgi_app, {
        '/metrics': make_wsgi_app()
    })

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080)
  requirements.txt: |
    flask==2.3.0
    gunicorn==21.2.0
    prometheus-client==0.19.0
  Dockerfile: |
    FROM python:3.12-slim-bookworm AS base
    ENV PYTHONDONTWRITEBYTECODE=1
    ENV PYTHONUNBUFFERED=1

    FROM base AS dependencies
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install --no-cache-dir -r requirements.txt

    FROM base AS production
    WORKDIR /app

    COPY --from=dependencies /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages
    COPY --from=dependencies /usr/local/bin /usr/local/bin
    COPY src/ ./src/

    RUN useradd --create-home appuser
    USER appuser

    # Application port
    EXPOSE 8080/tcp

    # Metrics port for Prometheus scraping
    EXPOSE 9090/tcp

    # Debug port (only used in development)
    EXPOSE 5678/tcp

    HEALTHCHECK --interval=30s --timeout=5s --start-period=10s --retries=3 \
        CMD curl -f http://localhost:8080/health || exit 1

    CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:8080", "src.app:app"]

  scripts/health_check.sh: |
    #!/bin/bash
    curl -f http://localhost:8080/health || exit 1
    curl -f http://localhost:9090/metrics || echo "Metrics not available"
  tests/test_endpoints.py: |
    from src.app import app
    def test_health():
        client = app.test_client()
        resp = client.get('/health')
        assert resp.status_code == 200
  k8s/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: flask-app
    spec:
      ports:
        - name: http
          port: 8080
          targetPort: 8080
        - name: metrics
          port: 9090
          targetPort: 9090
  monitoring/alerts.yaml: |
    groups:
      - name: app-alerts
        rules:
          - alert: AppDown
            expr: up{job="flask-app"} == 0

# === Assertions ===

must_include_files:
- Dockerfile

must_include_content_from:
  Dockerfile:
    - EXPOSE 8080/tcp
    - EXPOSE 9090/tcp
    - 'CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:8080", "src.app:app"]'
  src/app.py:
    - "app.run(host='0.0.0.0', port=8080)"
    - '/metrics'

must_not_include_files:
  # Health check script — ops utility, same port but not needed for EXPOSE review
- scripts/health_check.sh
  # Tests — same endpoint but test infrastructure
- tests/test_endpoints.py
  # K8s service — same ports but different infrastructure layer
- k8s/service.yaml
  # Monitoring alerts — same metrics concept but different concern
- monitoring/alerts.yaml

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
