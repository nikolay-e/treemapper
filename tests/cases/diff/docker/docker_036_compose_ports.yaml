  api/Dockerfile: |
    FROM python:3.12-slim
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install -r requirements.txt
    COPY src/ ./src/
    CMD ["gunicorn", "-b", "0.0.0.0:8080", "src.app:app"]
  api/requirements.txt: |
    flask==2.3.0
    gunicorn==21.2.0
    prometheus-client==0.19.0
  docker-compose.yml: |
    version: '3.8'

    services:
      api:
        build: ./api
        ports:
          # Host:Container format with explicit protocol
          - "8080:8080/tcp"
          # Metrics port - only accessible from localhost
          - "127.0.0.1:9090:9090/tcp"
          # Debug port - only in development
          - "127.0.0.1:5678:5678/tcp"
          # UDP port for specific use cases
          - "8125:8125/udp"
          # Range of ports
          - "3000-3005:3000-3005/tcp"
        expose:
          # Internal ports (not published to host)
          - "8081"
          - "8082"
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
          interval: 30s
          timeout: 10s
          retries: 3

      prometheus:
        image: prom/prometheus:v2.48.0
        ports:
          - "127.0.0.1:9091:9090/tcp"
        volumes:
          - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro

      grafana:
        image: grafana/grafana:10.2.2
        ports:
          - "127.0.0.1:3000:3000/tcp"
        environment:
          - GF_SECURITY_ADMIN_PASSWORD=admin
  scripts/port_forward.sh: |
    #!/bin/bash
    kubectl port-forward svc/api 8080:8080
  tests/test_ports.py: |
    def test_port_binding():
        pass
  docs/ports.md: |
    # Port Configuration
  firewall/rules.yaml: ''
  nginx/upstream.conf: ''
must_include_files:
- docker-compose.yml
must_include_content:
- '- "8080:8080/tcp"'
add_garbage_files: false
skip_garbage_check: true
