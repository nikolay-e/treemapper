initial:
  app.py: |
    import os
    import sys

    DEBUG = os.getenv("DEBUG", "false").lower() == "true"

    def setup_app():
        if DEBUG:
            print("Debug mode enabled")

    def main():
        setup_app()
        print("Running app")

    if __name__ == "__main__":
        main()
  src/config.py: |
    import os

    APP_PORT = int(os.getenv("APP_PORT", "8080"))
    APP_HOST = os.getenv("APP_HOST", "0.0.0.0")
    DATABASE_URL = os.getenv("DATABASE_URL", "sqlite:///app.db")
  requirements.txt: |
    flask==2.3.0
    gunicorn==21.2.0
    pytest==7.4.0
    debugpy==1.8.0
  Dockerfile: |
    FROM python:3.12-slim
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install --no-cache-dir -r requirements.txt
    COPY . .
    EXPOSE 8080
    CMD ["python", "app.py"]
  docker-compose.yml: |
    version: '3.8'
    services:
      app:
        build: .
        ports:
          - "8080:8080"
        environment:
          - DEBUG=false
      debug:
        build: .
        profiles:
          - debug
        command: python -m debugpy --listen 0.0.0.0:5678 app.py
  scripts/run_debug.sh: |
    #!/bin/bash
    docker-compose --profile debug up
  tests/test_profiles.py: |
    def test_debug_profile():
        pass
  docs/development.md: |
    # Development Guide
  k8s/dev-deployment.yaml: |
    apiVersion: apps/v1
  terraform/dev.tfvars: ''
changed:
  app.py: |
    import os
    import sys

    DEBUG = os.getenv("DEBUG", "false").lower() == "true"

    def setup_app():
        if DEBUG:
            print("Debug mode enabled")

    def main():
        setup_app()
        print("Running app")

    if __name__ == "__main__":
        main()
  src/config.py: |
    import os

    APP_PORT = int(os.getenv("APP_PORT", "8080"))
    APP_HOST = os.getenv("APP_HOST", "0.0.0.0")
    DATABASE_URL = os.getenv("DATABASE_URL", "sqlite:///app.db")
  requirements.txt: |
    flask==2.3.0
    gunicorn==21.2.0
    pytest==7.4.0
    debugpy==1.8.0
  Dockerfile: |
    FROM python:3.12-slim
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install --no-cache-dir -r requirements.txt
    COPY . .
    EXPOSE 8080
    CMD ["python", "app.py"]
  docker-compose.yml: |
    version: '3.8'
    services:
      app:
        build: .
        ports:
          - "8080:8080"
        environment:
          - DEBUG=false
      debug:
        build: .
        profiles:
          - debug
        command: python -m debugpy --wait-for-client --listen 0.0.0.0:5678 app.py
        ports:
          - "5678:5678"
        environment:
          - DEBUG=true
      test:
        build: .
        profiles:
          - test
        command: pytest
        environment:
          - DATABASE_URL=sqlite:///test.db
  scripts/run_debug.sh: |
    #!/bin/bash
    docker-compose --profile debug up
  tests/test_profiles.py: |
    def test_debug_profile():
        pass
  docs/development.md: |
    # Development Guide
  k8s/dev-deployment.yaml: |
    apiVersion: apps/v1
  terraform/dev.tfvars: ''
must_include_files:
- docker-compose.yml
must_include_content:
- 'command: python -m debugpy --wait-for-client --listen 0.0.0.0:5678 app.py'
add_garbage_files: false
skip_garbage_check: true
