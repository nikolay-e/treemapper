# Test 013: TypeScript Dockerfile rewritten from 2-stage (builder+nginx) to proper
#           3-stage (deps, builder, production) — reviewer needs tsconfig and package.json
#
# Scenario: TypeScript API Dockerfile rewritten from a crude 2-stage (builder + nginx)
# to a proper 3-stage build (deps, builder, production). Key changes: separate dependency
# install, TypeScript compilation with tsconfig.json, distroless-style with dumb-init,
# ARG for versioning (APP_VERSION, GIT_SHA).
#
# Reviewer questions:
#   Q1: "Does tsconfig.json configure outDir=./dist matching the Dockerfile COPY?"
#       -> tsconfig.json has `"outDir": "./dist"` and `"rootDir": "./src"`.
#       Reviewer needs this to verify `COPY --from=builder /app/dist ./dist` is correct.
#   Q2: "What build scripts does package.json define — is 'tsc' the build command?"
#       -> package.json has `"build": "tsc"`. Reviewer needs this to verify
#       `RUN npm run build` produces the expected output.
#   Q3: "Does src/index.ts expose /health for the HEALTHCHECK endpoint?"
#       -> src/index.ts has `app.get('/health', ...)`. Confirms HEALTHCHECK target.
#   Q4: "Does the app listen on PORT 3000 matching EXPOSE?"
#       -> src/index.ts has `process.env.PORT || '3000'`. Matches ENV PORT=3000.
#
# Not needed:
#   - scripts/build.sh: wraps `docker build`, not relevant to internal Dockerfile structure.
#   - tests/api.test.ts: hits /health in tests, but test infrastructure adds nothing.
#   - k8s/deployment.yaml: references container port 3000 and image, different layer.

max_enrichment: 4.1
initial:
  src/index.ts: |
    import express from 'express';
    import cors from 'cors';
    import helmet from 'helmet';
    import compression from 'compression';

    const app = express();
    const PORT = parseInt(process.env.PORT || '3000', 10);

    app.use(cors());
    app.use(helmet());
    app.use(compression());
    app.use(express.json());

    export function init() {
        console.log("App initialized");
    }

    app.get('/health', (req, res) => {
        res.json({ status: 'healthy', version: process.env.APP_VERSION || 'unknown' });
    });

    app.get('/api/users', (req, res) => {
        res.json({ users: [] });
    });

    app.listen(PORT, () => {
        init();
        console.log(`Server running on port ${PORT}`);
    });
  src/config.ts: |
    export interface AppConfig {
        port: number;
        nodeEnv: string;
        logLevel: string;
    }

    export function loadConfig(): AppConfig {
        return {
            port: parseInt(process.env.PORT || '3000', 10),
            nodeEnv: process.env.NODE_ENV || 'development',
            logLevel: process.env.LOG_LEVEL || 'info'
        };
    }
  package.json: |
    {
      "name": "api-server",
      "version": "1.0.0",
      "main": "dist/index.js",
      "scripts": {
        "build": "tsc",
        "start": "node dist/index.js",
        "dev": "ts-node src/index.ts"
      },
      "dependencies": {
        "express": "^4.18.2",
        "cors": "^2.8.5",
        "helmet": "^7.1.0",
        "compression": "^1.7.4"
      },
      "devDependencies": {
        "typescript": "^5.3.3",
        "@types/node": "^20.10.0",
        "@types/express": "^4.17.21",
        "@types/compression": "^1.7.5"
      }
    }
  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "ES2022",
        "module": "commonjs",
        "outDir": "./dist",
        "rootDir": "./src",
        "strict": true,
        "esModuleInterop": true,
        "skipLibCheck": true,
        "forceConsistentCasingInFileNames": true
      },
      "include": ["src/**/*"],
      "exclude": ["node_modules", "dist"]
    }
  Dockerfile: |
    FROM node:18 AS builder
    WORKDIR /app
    COPY . .
    RUN npm run build

    FROM nginx:alpine
    COPY --from=builder /app/dist /usr/share/nginx/html
  scripts/build.sh: |
    #!/bin/bash
    docker build -t api:latest .
    echo "Build complete"
  tests/api.test.ts: |
    import request from 'supertest';
    describe('API', () => {
        it('should initialize', async () => {
            const res = await request(app).get('/health');
            expect(res.status).toBe(200);
        });
    });
  k8s/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: api-server
    spec:
      template:
        spec:
          containers:
            - name: api
              image: api-server:latest
              ports:
                - containerPort: 3000

changed:
  src/index.ts: |
    import express from 'express';
    import cors from 'cors';
    import helmet from 'helmet';
    import compression from 'compression';

    const app = express();
    const PORT = parseInt(process.env.PORT || '3000', 10);

    app.use(cors());
    app.use(helmet());
    app.use(compression());
    app.use(express.json());

    export function init() {
        console.log("App initialized");
    }

    app.get('/health', (req, res) => {
        res.json({ status: 'healthy', version: process.env.APP_VERSION || 'unknown' });
    });

    app.get('/api/users', (req, res) => {
        res.json({ users: [] });
    });

    app.listen(PORT, () => {
        init();
        console.log(`Server running on port ${PORT}`);
    });
  src/config.ts: |
    export interface AppConfig {
        port: number;
        nodeEnv: string;
        logLevel: string;
    }

    export function loadConfig(): AppConfig {
        return {
            port: parseInt(process.env.PORT || '3000', 10),
            nodeEnv: process.env.NODE_ENV || 'development',
            logLevel: process.env.LOG_LEVEL || 'info'
        };
    }
  package.json: |
    {
      "name": "api-server",
      "version": "1.0.0",
      "main": "dist/index.js",
      "scripts": {
        "build": "tsc",
        "start": "node dist/index.js",
        "dev": "ts-node src/index.ts"
      },
      "dependencies": {
        "express": "^4.18.2",
        "cors": "^2.8.5",
        "helmet": "^7.1.0",
        "compression": "^1.7.4"
      },
      "devDependencies": {
        "typescript": "^5.3.3",
        "@types/node": "^20.10.0",
        "@types/express": "^4.17.21",
        "@types/compression": "^1.7.5"
      }
    }
  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "ES2022",
        "module": "commonjs",
        "outDir": "./dist",
        "rootDir": "./src",
        "strict": true,
        "esModuleInterop": true,
        "skipLibCheck": true,
        "forceConsistentCasingInFileNames": true
      },
      "include": ["src/**/*"],
      "exclude": ["node_modules", "dist"]
    }
  Dockerfile: |
    # =============================================================================
    # Stage 1: Dependencies
    # =============================================================================
    FROM node:20-alpine AS deps
    WORKDIR /app

    # Install dependencies for native modules
    RUN apk add --no-cache python3 make g++

    # Copy package files
    COPY package*.json ./

    # Install all dependencies (including dev for build)
    RUN npm ci

    # =============================================================================
    # Stage 2: Builder
    # =============================================================================
    FROM node:20-alpine AS builder
    WORKDIR /app

    # Copy dependencies from deps stage
    COPY --from=deps /app/node_modules ./node_modules
    COPY package*.json ./
    COPY tsconfig.json ./
    COPY src ./src

    # Build the application
    RUN npm run build

    # Prune dev dependencies
    RUN npm prune --production

    # =============================================================================
    # Stage 3: Production
    # =============================================================================
    FROM node:20-alpine AS production
    WORKDIR /app

    # Security: Create non-root user
    RUN addgroup -g 1001 -S nodejs && \
        adduser -S nodejs -u 1001 && \
        apk add --no-cache dumb-init

    # Copy production artifacts
    COPY --from=builder --chown=nodejs:nodejs /app/node_modules ./node_modules
    COPY --from=builder --chown=nodejs:nodejs /app/dist ./dist
    COPY --from=builder --chown=nodejs:nodejs /app/package.json ./

    # Build arguments for versioning
    ARG APP_VERSION=0.0.0
    ARG GIT_SHA=unknown
    ENV APP_VERSION=${APP_VERSION}
    ENV GIT_SHA=${GIT_SHA}
    ENV NODE_ENV=production
    ENV PORT=3000

    # Switch to non-root user
    USER nodejs

    EXPOSE 3000

    # Health check
    HEALTHCHECK --interval=30s --timeout=3s --start-period=5s --retries=3 \
        CMD wget --no-verbose --tries=1 --spider http://localhost:3000/health || exit 1

    # Use dumb-init to handle signals properly
    ENTRYPOINT ["dumb-init", "--"]
    CMD ["node", "dist/index.js"]
  scripts/build.sh: |
    #!/bin/bash
    docker build -t api:latest .
    echo "Build complete"
  tests/api.test.ts: |
    import request from 'supertest';
    describe('API', () => {
        it('should initialize', async () => {
            const res = await request(app).get('/health');
            expect(res.status).toBe(200);
        });
    });
  k8s/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: api-server
    spec:
      template:
        spec:
          containers:
            - name: api
              image: api-server:latest
              ports:
                - containerPort: 3000

must_include_files:
  - Dockerfile
  # Q1: Does tsconfig outDir match COPY --from=builder /app/dist?
  - tsconfig.json
  # Q2: Does "build" script exist for RUN npm run build?
  - package.json

must_include_content_from:
  Dockerfile:
    - FROM node:20-alpine AS deps
    - COPY tsconfig.json ./
    - RUN npm run build
    - CMD ["node", "dist/index.js"]
  tsconfig.json:
    - '"outDir": "./dist"'
  package.json:
    - '"build": "tsc"'

must_not_include:
  # --- build.sh: wraps docker build, not relevant to internal stages ---
  - docker build -t api
  - "Build complete"
  # --- tests: test infrastructure, not build review ---
  - supertest
  - "should initialize"
  # --- k8s: different infrastructure layer ---
  - "kind: Deployment"
  - api-server:latest
must_not_include_files:
  - scripts/build.sh
  - tests/api.test.ts
  - k8s/deployment.yaml

max_fragments: 10
max_files: 5
add_garbage_files: false
skip_garbage_check: true
