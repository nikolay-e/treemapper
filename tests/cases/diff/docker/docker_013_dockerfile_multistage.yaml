  - dockerfile_3
  - tsconfig
  - package
  allowed: []
  forbidden:
  - no_build
  - no_api_test
  - no_deployment
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
  - no_global_5
