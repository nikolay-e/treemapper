name: docker_017_multi_stage_build
repo:
  initial_files:
    package.json: |
      {
        "name": "api-server",
        "version": "1.0.0",
        "scripts": {
          "build": "tsc",
          "start": "node dist/index.js",
          "dev": "ts-node src/index.ts"
        },
        "dependencies": {
          "express": "^4.18.2",
          "pg": "^8.11.3"
        },
        "devDependencies": {
          "typescript": "^5.3.3",
          "@types/node": "^20.10.0",
          "@types/express": "^4.17.21"
        }
      }
    src/index.ts: |
      import express from 'express';
      const app = express();
      app.get('/health', (req, res) => res.json({ status: 'ok' }));
      app.listen(3000);
    tsconfig.json: |
      {
        "compilerOptions": {
          "target": "ES2022",
          "module": "commonjs",
          "outDir": "./dist",
          "strict": true
        }
      }
    Dockerfile: |
      FROM node:20
      WORKDIR /app
      COPY . .
      RUN npm install
      RUN npm run build
      CMD ["node", "dist/index.js"]
    scripts/deploy.sh: |
      #!/bin/bash
      docker push myregistry/api:latest
    tests/api.test.ts: |
      import request from 'supertest';
      describe('API', () => {
        it('should return health', async () => {
          const res = await request(app).get('/health');
          expect(res.statusCode).toBe(200);
        });
      });
    migrations/001_init.sql: |
      CREATE TABLE users (id SERIAL PRIMARY KEY, name VARCHAR(100));
      CREATE TABLE sessions (id SERIAL PRIMARY KEY, user_id INT REFERENCES users(id));
  changed_files:
    package.json: |
      {
        "name": "api-server",
        "version": "1.0.0",
        "scripts": {
          "build": "tsc",
          "start": "node dist/index.js",
          "dev": "ts-node src/index.ts"
        },
        "dependencies": {
          "express": "^4.18.2",
          "pg": "^8.11.3"
        },
        "devDependencies": {
          "typescript": "^5.3.3",
          "@types/node": "^20.10.0",
          "@types/express": "^4.17.21"
        }
      }
    src/index.ts: |
      import express from 'express';
      const app = express();
      app.get('/health', (req, res) => res.json({ status: 'ok' }));
      app.listen(3000);
    tsconfig.json: |
      {
        "compilerOptions": {
          "target": "ES2022",
          "module": "commonjs",
          "outDir": "./dist",
          "strict": true
        }
      }
    Dockerfile: |
      # Build stage
      FROM node:20-alpine AS builder
      WORKDIR /app

      # Install dependencies first (better caching)
      COPY package*.json ./
      RUN npm ci --only=production && \
          cp -R node_modules /prod_modules && \
          npm ci

      # Build application
      COPY tsconfig.json ./
      COPY src ./src
      RUN npm run build

      # Production stage
      FROM node:20-alpine AS production
      WORKDIR /app

      # Security: run as non-root
      RUN addgroup -g 1001 -S nodejs && \
          adduser -S nodejs -u 1001

      # Copy production dependencies and built code
      COPY --from=builder --chown=nodejs:nodejs /prod_modules ./node_modules
      COPY --from=builder --chown=nodejs:nodejs /app/dist ./dist
      COPY --from=builder --chown=nodejs:nodejs /app/package.json ./

      USER nodejs
      EXPOSE 3000
      ENV NODE_ENV=production

      HEALTHCHECK --interval=30s --timeout=3s --start-period=5s \
          CMD node -e "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"

      CMD ["node", "dist/index.js"]
    scripts/deploy.sh: |
      #!/bin/bash
      docker push myregistry/api:latest
    tests/api.test.ts: |
      import request from 'supertest';
      describe('API', () => {
        it('should return health', async () => {
          const res = await request(app).get('/health');
          expect(res.statusCode).toBe(200);
        });
      });
    migrations/001_init.sql: |
      CREATE TABLE users (id SERIAL PRIMARY KEY, name VARCHAR(100));
      CREATE TABLE sessions (id SERIAL PRIMARY KEY, user_id INT REFERENCES users(id));
  commit_message: Update files
fragments:
- id: dockerfile
  selector:
    path: Dockerfile
    anchor: COPY package*.json ./
- id: dockerfile_1
  selector:
    path: Dockerfile
    anchor: COPY tsconfig.json ./
- id: dockerfile_2
  selector:
    path: Dockerfile
    anchor: RUN npm run build
- id: dockerfile_3
  selector:
    path: Dockerfile
    anchor: CMD ["node", "dist/index.js"]
- id: tsconfig
  selector:
    path: tsconfig.json
    anchor: '"outDir": "./dist"'
- id: package
  selector:
    path: package.json
    anchor: '"build": "tsc"'
- id: no_deploy
  selector:
    path: scripts/deploy.sh
- id: no_api_test
  selector:
    path: tests/api.test.ts
- id: no_001_init
  selector:
    path: migrations/001_init.sql
- id: no_global_0
  selector:
    anchor: docker push myregistry
- id: no_global_1
  selector:
    anchor: supertest
- id: no_global_2
  selector:
    anchor: should return health
- id: no_global_3
  selector:
    anchor: CREATE TABLE users
- id: no_global_4
  selector:
    anchor: CREATE TABLE sessions
oracle:
  required:
  - dockerfile
  - dockerfile_1
  - dockerfile_2
  - dockerfile_3
  - tsconfig
  - package
  allowed: []
  forbidden:
  - no_deploy
  - no_api_test
  - no_001_init
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
