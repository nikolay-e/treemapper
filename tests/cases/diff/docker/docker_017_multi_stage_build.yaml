# Test 017: TypeScript Dockerfile rewritten to proper 2-stage multi-stage
#           — reviewer needs tsconfig and package.json to verify build paths
#
# Scenario: TypeScript API Dockerfile rewritten from single-stage (npm install + build
# in one layer) to proper 2-stage multi-stage. Production deps separated via cp -R trick.
# HEALTHCHECK added using Node http module against /health endpoint.
#
# Reviewer questions:
#   Q1: "Does tsconfig.json set outDir=./dist matching COPY --from=builder /app/dist?"
#       -> tsconfig.json has `"outDir": "./dist"`. Reviewer needs this to verify
#       the build output path matches what the Dockerfile copies.
#   Q2: "Does package.json define 'build' script for RUN npm run build?"
#       -> package.json has `"build": "tsc"`. Reviewer verifies the command exists.
#   Q3: "Does src/index.ts expose GET /health for the HEALTHCHECK?"
#       -> src/index.ts has `app.get('/health', ...)`. Confirms endpoint exists.
#
# Not needed:
#   - scripts/deploy.sh: pushes docker image, does not inform build structure.
#   - tests/api.test.ts: shares /health reference but is test infrastructure.
#   - migrations/001_init.sql: database schema, completely unrelated to Docker build.

initial:
  package.json: |
    {
      "name": "api-server",
      "version": "1.0.0",
      "scripts": {
        "build": "tsc",
        "start": "node dist/index.js",
        "dev": "ts-node src/index.ts"
      },
      "dependencies": {
        "express": "^4.18.2",
        "pg": "^8.11.3"
      },
      "devDependencies": {
        "typescript": "^5.3.3",
        "@types/node": "^20.10.0",
        "@types/express": "^4.17.21"
      }
    }
  src/index.ts: |
    import express from 'express';
    const app = express();
    app.get('/health', (req, res) => res.json({ status: 'ok' }));
    app.listen(3000);
  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "ES2022",
        "module": "commonjs",
        "outDir": "./dist",
        "strict": true
      }
    }
  Dockerfile: |
    FROM node:20
    WORKDIR /app
    COPY . .
    RUN npm install
    RUN npm run build
    CMD ["node", "dist/index.js"]
  scripts/deploy.sh: |
    #!/bin/bash
    docker push myregistry/api:latest
  tests/api.test.ts: |
    import request from 'supertest';
    describe('API', () => {
      it('should return health', async () => {
        const res = await request(app).get('/health');
        expect(res.statusCode).toBe(200);
      });
    });
  migrations/001_init.sql: |
    CREATE TABLE users (id SERIAL PRIMARY KEY, name VARCHAR(100));
    CREATE TABLE sessions (id SERIAL PRIMARY KEY, user_id INT REFERENCES users(id));

changed:
  package.json: |
    {
      "name": "api-server",
      "version": "1.0.0",
      "scripts": {
        "build": "tsc",
        "start": "node dist/index.js",
        "dev": "ts-node src/index.ts"
      },
      "dependencies": {
        "express": "^4.18.2",
        "pg": "^8.11.3"
      },
      "devDependencies": {
        "typescript": "^5.3.3",
        "@types/node": "^20.10.0",
        "@types/express": "^4.17.21"
      }
    }
  src/index.ts: |
    import express from 'express';
    const app = express();
    app.get('/health', (req, res) => res.json({ status: 'ok' }));
    app.listen(3000);
  tsconfig.json: |
    {
      "compilerOptions": {
        "target": "ES2022",
        "module": "commonjs",
        "outDir": "./dist",
        "strict": true
      }
    }
  Dockerfile: |
    # Build stage
    FROM node:20-alpine AS builder
    WORKDIR /app

    # Install dependencies first (better caching)
    COPY package*.json ./
    RUN npm ci --only=production && \
        cp -R node_modules /prod_modules && \
        npm ci

    # Build application
    COPY tsconfig.json ./
    COPY src ./src
    RUN npm run build

    # Production stage
    FROM node:20-alpine AS production
    WORKDIR /app

    # Security: run as non-root
    RUN addgroup -g 1001 -S nodejs && \
        adduser -S nodejs -u 1001

    # Copy production dependencies and built code
    COPY --from=builder --chown=nodejs:nodejs /prod_modules ./node_modules
    COPY --from=builder --chown=nodejs:nodejs /app/dist ./dist
    COPY --from=builder --chown=nodejs:nodejs /app/package.json ./

    USER nodejs
    EXPOSE 3000
    ENV NODE_ENV=production

    HEALTHCHECK --interval=30s --timeout=3s --start-period=5s \
        CMD node -e "require('http').get('http://localhost:3000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"

    CMD ["node", "dist/index.js"]
  scripts/deploy.sh: |
    #!/bin/bash
    docker push myregistry/api:latest
  tests/api.test.ts: |
    import request from 'supertest';
    describe('API', () => {
      it('should return health', async () => {
        const res = await request(app).get('/health');
        expect(res.statusCode).toBe(200);
      });
    });
  migrations/001_init.sql: |
    CREATE TABLE users (id SERIAL PRIMARY KEY, name VARCHAR(100));
    CREATE TABLE sessions (id SERIAL PRIMARY KEY, user_id INT REFERENCES users(id));

must_include_files:
  - Dockerfile
  # Q1: Does outDir match the COPY path from builder stage?
  - tsconfig.json
  # Q2: Does "build" script exist for RUN npm run build?
  - package.json

must_include_content_from:
  Dockerfile:
    - COPY package*.json ./
    - COPY tsconfig.json ./
    - RUN npm run build
    - CMD ["node", "dist/index.js"]
  tsconfig.json:
    - '"outDir": "./dist"'
  package.json:
    - '"build": "tsc"'

must_not_include:
  # --- deploy.sh: pushes image, doesn't inform build stage review ---
  - docker push myregistry
  # --- tests: test infrastructure, mentions /health but not build-relevant ---
  - supertest
  - "should return health"
  # --- migrations: database schema, unrelated to Docker build ---
  - CREATE TABLE users
  - CREATE TABLE sessions
must_not_include_files:
  - scripts/deploy.sh
  - tests/api.test.ts
  - migrations/001_init.sql

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
