initial:
  nginx/nginx.conf: |
    worker_processes auto;
    events {
        worker_connections 1024;
    }
    http {
        upstream api {
            server api:8080;
        }
        server {
            listen 80;
            location / {
                proxy_pass http://api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }
        }
    }
  nginx/ssl.conf: |
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
  prometheus/prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'api'
        static_configs:
          - targets: ['api:8080']
  docker-compose.yml: |
    version: '3.8'
    services:
      nginx:
        image: nginx:alpine
      api:
        build: ./api
  scripts/update_config.sh: |
    #!/bin/bash
    docker-compose up -d --no-deps nginx
  tests/test_configs.py: |
    def test_config_mounted():
        pass
  docs/configuration.md: |
    # Configuration Management
  ansible/templates/nginx.conf.j2: ''
  k8s/configmap.yaml: ''
changed:
  nginx/nginx.conf: |
    worker_processes auto;
    events {
        worker_connections 1024;
    }
    http {
        upstream api {
            server api:8080;
        }
        server {
            listen 80;
            location / {
                proxy_pass http://api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
            }
        }
    }
  nginx/ssl.conf: |
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
  prometheus/prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: 'api'
        static_configs:
          - targets: ['api:8080']
  docker-compose.yml: |
    version: '3.8'

    services:
      nginx:
        image: nginx:alpine
        ports:
          - "80:80"
          - "443:443"
        configs:
          - source: nginx_main
            target: /etc/nginx/nginx.conf
            mode: 0440
          - source: nginx_ssl
            target: /etc/nginx/conf.d/ssl.conf
            mode: 0440
          - source: nginx_mime
            target: /etc/nginx/mime.types
        secrets:
          - source: ssl_cert
            target: /etc/nginx/ssl/cert.pem
          - source: ssl_key
            target: /etc/nginx/ssl/key.pem
            mode: 0400
        depends_on:
          - api
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost/health"]
          interval: 30s
          timeout: 10s
          retries: 3

      api:
        build: ./api
        configs:
          - source: app_config
            target: /app/config/app.yaml
        expose:
          - "8080"

      prometheus:
        image: prom/prometheus:v2.48.0
        configs:
          - source: prometheus_config
            target: /etc/prometheus/prometheus.yml
        ports:
          - "9090:9090"

    configs:
      nginx_main:
        file: ./nginx/nginx.conf
      nginx_ssl:
        file: ./nginx/ssl.conf
      nginx_mime:
        external: true
        name: nginx_mime_types_v1
      app_config:
        file: ./config/app.yaml
      prometheus_config:
        file: ./prometheus/prometheus.yml

    secrets:
      ssl_cert:
        file: ./secrets/ssl/cert.pem
      ssl_key:
        file: ./secrets/ssl/key.pem
  scripts/update_config.sh: |
    #!/bin/bash
    docker-compose up -d --no-deps nginx
  tests/test_configs.py: |
    def test_config_mounted():
        pass
  docs/configuration.md: |
    # Configuration Management
  ansible/templates/nginx.conf.j2: ''
  k8s/configmap.yaml: ''
must_include_files:
- docker-compose.yml
must_include_content:
- '- source: nginx_main'
- 'file: ./nginx/nginx.conf'
add_garbage_files: false
skip_garbage_check: true
