# Scenario: Python Dockerfile switches from CMD ["python", "src/main.py", "serve"]
# to ENTRYPOINT ["docker-entrypoint.sh"] + CMD ["serve", "--workers", "4"].
# A new docker-entrypoint.sh script is COPY'd into the image. The app uses argparse
# with subcommands (serve, migrate, shell).
#
# Reviewer questions:
#   1. Does src/main.py accept "serve" as a positional argument matching CMD?
#   2. Does main.py handle SIGTERM for graceful shutdown matching STOPSIGNAL?
#   3. Does docker-entrypoint.sh exist (it's referenced but not in initial files)?

max_enrichment: 4.7
initial:
  src/main.py: |
    import sys
    import argparse
    import signal

    def signal_handler(signum, frame):
        print(f"Received signal {signum}, shutting down gracefully...")
        sys.exit(0)

    def main():
        parser = argparse.ArgumentParser()
        parser.add_argument('--config', default='/etc/app/config.yaml')
        parser.add_argument('--workers', type=int, default=4)
        parser.add_argument('command', choices=['serve', 'migrate', 'shell'])
        args = parser.parse_args()

        signal.signal(signal.SIGTERM, signal_handler)
        signal.signal(signal.SIGINT, signal_handler)

        print(f"Running {args.command} with config: {args.config}")

    if __name__ == '__main__':
        main()
  requirements.txt: |
    pyyaml==6.0.1
    click==8.1.7
  Dockerfile: |
    FROM python:3.11-slim
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install -r requirements.txt
    COPY src/ ./src/
    CMD ["python", "src/main.py", "serve"]

  # Trap: existing docker_entrypoint script in scripts/ — similar name but different path
  scripts/docker_entrypoint.sh: |
    #!/bin/bash
    set -e
    echo "Legacy entrypoint"
    exec python main.py "$@"

  # Trap: test file for CLI — tests command parsing but doesn't inform Docker review
  tests/test_cli.py: |
    import subprocess
    def test_cli():
        result = subprocess.run(['python', 'src/main.py', '--help'], capture_output=True)
        assert result.returncode == 0

  # Trap: Helm values — defines command override, same ENTRYPOINT concept in K8s
  helm/values.yaml: |
    command: ["python"]
    args: ["src/main.py", "serve", "--workers", "8"]

  # Trap: init script — another shell script, different purpose
  scripts/init.sh: |
    #!/bin/bash
    echo "Initializing database..."
    python src/main.py migrate

changed:
  src/main.py: |
    import sys
    import argparse
    import signal

    def signal_handler(signum, frame):
        print(f"Received signal {signum}, shutting down gracefully...")
        sys.exit(0)

    def main():
        parser = argparse.ArgumentParser()
        parser.add_argument('--config', default='/etc/app/config.yaml')
        parser.add_argument('--workers', type=int, default=4)
        parser.add_argument('command', choices=['serve', 'migrate', 'shell'])
        args = parser.parse_args()

        signal.signal(signal.SIGTERM, signal_handler)
        signal.signal(signal.SIGINT, signal_handler)

        print(f"Running {args.command} with config: {args.config}")

    if __name__ == '__main__':
        main()
  requirements.txt: |
    pyyaml==6.0.1
    click==8.1.7
  Dockerfile: |
    FROM python:3.12-slim-bookworm AS base
    ENV PYTHONDONTWRITEBYTECODE=1
    ENV PYTHONUNBUFFERED=1

    FROM base AS dependencies
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install --no-cache-dir -r requirements.txt

    FROM base AS production
    WORKDIR /app

    COPY --from=dependencies /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages
    COPY --from=dependencies /usr/local/bin /usr/local/bin

    # Copy entrypoint script
    COPY docker-entrypoint.sh /usr/local/bin/
    RUN chmod +x /usr/local/bin/docker-entrypoint.sh

    COPY src/ ./src/

    RUN useradd --create-home appuser && \
        mkdir -p /etc/app && \
        chown -R appuser:appuser /app /etc/app

    USER appuser

    # Use entrypoint for initialization logic
    ENTRYPOINT ["docker-entrypoint.sh"]

    # Default command - can be overridden
    CMD ["serve", "--workers", "4"]

    EXPOSE 8000
    STOPSIGNAL SIGTERM

  scripts/docker_entrypoint.sh: |
    #!/bin/bash
    set -e
    echo "Legacy entrypoint"
    exec python main.py "$@"
  tests/test_cli.py: |
    import subprocess
    def test_cli():
        result = subprocess.run(['python', 'src/main.py', '--help'], capture_output=True)
        assert result.returncode == 0
  helm/values.yaml: |
    command: ["python"]
    args: ["src/main.py", "serve", "--workers", "8"]
  scripts/init.sh: |
    #!/bin/bash
    echo "Initializing database..."
    python src/main.py migrate

# === Assertions ===

must_include_files:
- Dockerfile

must_include_content_from:
  Dockerfile:
    - ENTRYPOINT ["docker-entrypoint.sh"]
    - CMD ["serve", "--workers", "4"]
    - STOPSIGNAL SIGTERM
    - COPY docker-entrypoint.sh /usr/local/bin/
  src/main.py:
    - "parser.add_argument('command', choices=['serve', 'migrate', 'shell'])"
    - signal.signal(signal.SIGTERM, signal_handler)

must_not_include_files:
  # Legacy entrypoint script in scripts/ — similar name but not the one COPY'd into image
- scripts/docker_entrypoint.sh
  # Test CLI — tests argparse but doesn't inform ENTRYPOINT review
- tests/test_cli.py
  # Helm values — K8s command override, different layer
- helm/values.yaml
  # Init script — different purpose, uses "migrate" not "serve"
- scripts/init.sh

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
