name: docker_001_dockerfile_entrypoint
repo:
  initial_files:
    src/main.py: |
      import os
      import sys
      import logging

      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger(__name__)

      def parse_arguments():
          return {"mode": os.getenv("APP_MODE", "server")}

      def run_server():
          logger.info("Starting HTTP server on port 8080")

      def run_worker():
          logger.info("Starting background worker")

      def main():
          args = parse_arguments()
          if args["mode"] == "server":
              run_server()
          else:
              run_worker()

      if __name__ == "__main__":
          main()
    src/config.py: |
      import os

      DATABASE_URL = os.getenv("DATABASE_URL", "sqlite:///app.db")
      REDIS_URL = os.getenv("REDIS_URL", "redis://localhost:6379")
      LOG_LEVEL = os.getenv("LOG_LEVEL", "INFO")
    requirements.txt: |
      flask==2.3.0
      gunicorn==21.2.0
      redis==5.0.0
      sqlalchemy==2.0.0
    Dockerfile: |
      FROM python:3.11
      WORKDIR /app
      COPY . .
      ENTRYPOINT ["python", "src/main.py"]
    scripts/start.sh: |
      #!/bin/bash
      python src/main.py
    tests/test_main.py: |
      def test_main():
          pass
    k8s/pod.yaml: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: app
      spec:
        containers:
          - name: app
            image: python:3.11
            command: ["python", "src/main.py"]
  changed_files:
    src/main.py: |
      import os
      import sys
      import logging

      logging.basicConfig(level=logging.INFO)
      logger = logging.getLogger(__name__)

      def parse_arguments():
          return {"mode": os.getenv("APP_MODE", "server")}

      def run_server():
          logger.info("Starting HTTP server on port 8080")

      def run_worker():
          logger.info("Starting background worker")

      def main():
          args = parse_arguments()
          if args["mode"] == "server":
              run_server()
          else:
              run_worker()

      if __name__ == "__main__":
          main()
    src/config.py: |
      import os

      DATABASE_URL = os.getenv("DATABASE_URL", "sqlite:///app.db")
      REDIS_URL = os.getenv("REDIS_URL", "redis://localhost:6379")
      LOG_LEVEL = os.getenv("LOG_LEVEL", "INFO")
    requirements.txt: |
      flask==2.3.0
      gunicorn==21.2.0
      redis==5.0.0
      sqlalchemy==2.0.0
    Dockerfile: |
      # Build stage
      FROM python:3.12-slim AS builder
      WORKDIR /build
      COPY requirements.txt .
      RUN pip install --no-cache-dir --target=/deps -r requirements.txt

      # Production stage
      FROM python:3.12-slim AS production
      WORKDIR /app

      # Security: run as non-root user
      RUN useradd --create-home --shell /bin/bash appuser

      # Copy dependencies and source
      COPY --from=builder /deps /usr/local/lib/python3.12/site-packages
      COPY src/ ./src/
      COPY requirements.txt .

      # Set environment variables
      ENV PYTHONUNBUFFERED=1
      ENV PYTHONDONTWRITEBYTECODE=1
      ENV APP_MODE=server

      USER appuser
      EXPOSE 8080

      ENTRYPOINT ["python", "-m", "src.main"]
      CMD ["--mode", "server"]
    scripts/start.sh: |
      #!/bin/bash
      python src/main.py
    tests/test_main.py: |
      def test_main():
          pass
    k8s/pod.yaml: |
      apiVersion: v1
      kind: Pod
      metadata:
        name: app
      spec:
        containers:
          - name: app
            image: python:3.11
            command: ["python", "src/main.py"]
  commit_message: Update files
