initial:
  app.py: |
    from flask import Flask, jsonify
    import os
    import time

    app = Flask(__name__)
    START_TIME = time.time()

    @app.route('/health')
    def health():
        return 'OK', 200

    @app.route('/healthz')
    def healthz():
        uptime = time.time() - START_TIME
        return jsonify({
            'status': 'healthy',
            'uptime_seconds': round(uptime, 2)
        })

    @app.route('/ready')
    def ready():
        return jsonify({'status': 'ready'})

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080)
  config.py: |
