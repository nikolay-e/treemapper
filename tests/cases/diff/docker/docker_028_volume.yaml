# Scenario: Python Dockerfile refactored to multi-stage build with VOLUME
# declarations for /data, /cache, and /var/log/app. Directories pre-created
# with proper ownership. The app code and requirements are unchanged.
#
# Reviewer questions:
#   1. Does src/app.py reference /data, /cache, /var/log/app — matching VOLUME paths?
#   2. Does the app write to these paths (save_data, load_data)?
#   3. Are paths hardcoded as Path objects matching the VOLUME declarations?

max_enrichment: 3.8
initial:
  src/app.py: |
    import os
    import json
    from pathlib import Path

    DATA_DIR = Path('/data')
    CACHE_DIR = Path('/cache')
    LOGS_DIR = Path('/var/log/app')

    def ensure_directories():
        for directory in [DATA_DIR, CACHE_DIR, LOGS_DIR]:
            directory.mkdir(parents=True, exist_ok=True)

    def save_data(key: str, value: dict):
        filepath = DATA_DIR / f"{key}.json"
        with open(filepath, 'w') as f:
            json.dump(value, f)

    def load_data(key: str) -> dict:
        filepath = DATA_DIR / f"{key}.json"
        with open(filepath, 'r') as f:
            return json.load(f)
  requirements.txt: |
    flask==2.3.0
    gunicorn==21.2.0
  Dockerfile: |
    FROM python:3.11-slim
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install -r requirements.txt
    COPY src/ ./src/
    CMD ["python", "src/app.py"]

  # Trap: backup script — references /data but is ops utility
  scripts/backup_data.sh: |
    #!/bin/bash
    tar -czf /tmp/backup-$(date +%Y%m%d).tar.gz /data
    aws s3 cp /tmp/backup-*.tar.gz s3://backups/

  # Trap: K8s PVC — same volume concept but Kubernetes provisioning layer
  k8s/persistent-volume.yaml: |
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: app-data
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi

  # Trap: ops retention policy — mentions /data and /cache but is policy config
  ops/retention.yaml: |
    policies:
      - path: /data
        retention_days: 90
      - path: /cache
        retention_days: 7
      - path: /var/log/app
        retention_days: 30

changed:
  src/app.py: |
    import os
    import json
    from pathlib import Path

    DATA_DIR = Path('/data')
    CACHE_DIR = Path('/cache')
    LOGS_DIR = Path('/var/log/app')

    def ensure_directories():
        for directory in [DATA_DIR, CACHE_DIR, LOGS_DIR]:
            directory.mkdir(parents=True, exist_ok=True)

    def save_data(key: str, value: dict):
        filepath = DATA_DIR / f"{key}.json"
        with open(filepath, 'w') as f:
            json.dump(value, f)

    def load_data(key: str) -> dict:
        filepath = DATA_DIR / f"{key}.json"
        with open(filepath, 'r') as f:
            return json.load(f)
  requirements.txt: |
    flask==2.3.0
    gunicorn==21.2.0
  Dockerfile: |
    FROM python:3.12-slim-bookworm AS base
    ENV PYTHONDONTWRITEBYTECODE=1
    ENV PYTHONUNBUFFERED=1

    FROM base AS dependencies
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install --no-cache-dir -r requirements.txt

    FROM base AS production
    WORKDIR /app

    # Create user and volume directories with proper permissions
    RUN groupadd --gid 1000 appgroup && \
        useradd --uid 1000 --gid appgroup --create-home appuser && \
        mkdir -p /data /cache /var/log/app && \
        chown -R appuser:appgroup /data /cache /var/log/app /app

    # Declare volumes for persistent data
    VOLUME ["/data"]
    VOLUME ["/cache"]
    VOLUME ["/var/log/app"]

    COPY --from=dependencies /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages
    COPY --from=dependencies /usr/local/bin /usr/local/bin
    COPY --chown=appuser:appgroup src/ ./src/

    USER appuser:appgroup
    EXPOSE 8080

    CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:8080", "src.app:app"]

  scripts/backup_data.sh: |
    #!/bin/bash
    tar -czf /tmp/backup-$(date +%Y%m%d).tar.gz /data
    aws s3 cp /tmp/backup-*.tar.gz s3://backups/
  k8s/persistent-volume.yaml: |
    apiVersion: v1
    kind: PersistentVolumeClaim
    metadata:
      name: app-data
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
  ops/retention.yaml: |
    policies:
      - path: /data
        retention_days: 90
      - path: /cache
        retention_days: 7
      - path: /var/log/app
        retention_days: 30

# === Assertions ===

must_include_files:
- Dockerfile

must_include_content_from:
  # Reviewer needs to verify app uses the exact paths declared as VOLUMEs
  src/app.py:
    - DATA_DIR = Path('/data')
    - CACHE_DIR = Path('/cache')
    - LOGS_DIR = Path('/var/log/app')

must_not_include_files:
  # Backup script — references /data but is ops utility, not Dockerfile concern
- scripts/backup_data.sh
  # K8s PVC — same volume concept but Kubernetes provisioning layer
- k8s/persistent-volume.yaml
  # Retention policy — mentions same paths but is ops policy, not Docker build
- ops/retention.yaml

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
