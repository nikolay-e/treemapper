initial:
  src/app.py: |
    import os
    import pwd
    from flask import Flask, jsonify

    app = Flask(__name__)

    @app.route('/whoami')
    def whoami():
        return jsonify(
            uid=os.getuid(),
            gid=os.getgid(),
            user=pwd.getpwuid(os.getuid()).pw_name
        )

    @app.route('/health')
    def health():
        return jsonify(status='ok')

    if __name__ == '__main__':
        app.run(host='0.0.0.0', port=8080)
