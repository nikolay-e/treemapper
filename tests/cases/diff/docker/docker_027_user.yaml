  requirements.txt: |
    flask==2.3.0
    gunicorn==21.2.0
  Dockerfile: |
    FROM python:3.12-slim-bookworm AS base
    ENV PYTHONDONTWRITEBYTECODE=1
    ENV PYTHONUNBUFFERED=1

    FROM base AS dependencies
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install --no-cache-dir -r requirements.txt

    FROM base AS production
    WORKDIR /app

    # Create non-root user with specific UID/GID for Kubernetes compatibility
    RUN groupadd --gid 1000 appgroup && \
        useradd --uid 1000 --gid appgroup --shell /bin/bash --create-home appuser && \
        mkdir -p /app/data /app/logs && \
        chown -R appuser:appgroup /app

    COPY --from=dependencies /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages
    COPY --from=dependencies /usr/local/bin /usr/local/bin
    COPY --chown=appuser:appgroup src/ ./src/

    # Switch to non-root user
    USER appuser:appgroup

    EXPOSE 8080

    HEALTHCHECK --interval=30s --timeout=5s \
        CMD curl -f http://localhost:8080/health || exit 1

    CMD ["gunicorn", "-w", "4", "-b", "0.0.0.0:8080", "src.app:app"]
  scripts/setup_user.sh: |
    #!/bin/bash
    useradd -m appuser
  tests/test_security.py: |
    def test_non_root():
        pass
  docs/security.md: |
    # Security
  k8s/pod-security.yaml: |
    apiVersion: v1
  compliance/checks.yaml: ''
must_include_files:
- Dockerfile
must_include_content:
- FROM base AS dependencies
add_garbage_files: false
skip_garbage_check: true
