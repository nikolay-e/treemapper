      APP_ENV: production
      DEBUG: "false"
      LOG_LEVEL: warning

must_include_files:
  - Dockerfile
  # Q1+Q2: What env vars does the app consume and how?
  # Reviewer verifies Dockerfile defaults match app expectations.
  - app.py
  # Q3: What packages need the slim image to support them?
  - requirements.txt

must_include_content_from:
  Dockerfile:
    - ENV APP_ENV=production
    - ENV DEBUG=false
    - ENV LOG_LEVEL=warning
    - COPY requirements.txt .
  app.py:
    - 'app_env=os.getenv("APP_ENV", "development")'
    - 'debug=os.getenv("DEBUG", "false")'

must_not_include:
  # --- env_setup.sh: local dev helper, sets opposite env values ---
  - export APP_ENV=development
  - export DEBUG=true
  # --- ansible/vars.yml: config management, different layer ---
  - "postgresql://prod-db:5432/app"
  # --- helm/values.yaml: K8s templating, different layer ---
  - "LOG_LEVEL: warning"
must_not_include_files:
  - scripts/env_setup.sh
  - ansible/vars.yml
  - helm/values.yaml

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
