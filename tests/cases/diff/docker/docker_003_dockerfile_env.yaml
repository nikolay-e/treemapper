name: docker_003_dockerfile_env
repo:
  initial_files:
    app.py: |
      import os
      import logging
      from dataclasses import dataclass
      from typing import Optional

      @dataclass
      class Config:
          app_env: str
          debug: bool
          log_level: str
          database_url: Optional[str]
          redis_url: Optional[str]
          secret_key: str

      def load_config() -> Config:
          return Config(
              app_env=os.getenv("APP_ENV", "development"),
              debug=os.getenv("DEBUG", "false").lower() == "true",
              log_level=os.getenv("LOG_LEVEL", "INFO"),
              database_url=os.getenv("DATABASE_URL"),
              redis_url=os.getenv("REDIS_URL"),
              secret_key=os.getenv("SECRET_KEY", "insecure-default")
          )

      def run_application(config: Config):
          logging.basicConfig(level=config.log_level)
          logger = logging.getLogger(__name__)

          if config.debug:
              logger.info(f"Running in {config.app_env} mode with DEBUG enabled")
          else:
              logger.info(f"Running in {config.app_env} mode")

      if __name__ == "__main__":
          config = load_config()
          run_application(config)
    src/database.py: |
      import os
      from sqlalchemy import create_engine

      DATABASE_URL = os.getenv("DATABASE_URL", "sqlite:///app.db")

      def get_engine():
          return create_engine(DATABASE_URL)
    requirements.txt: |
      sqlalchemy==2.0.0
      psycopg2-binary==2.9.9
      redis==5.0.0
    Dockerfile: |
      FROM python:3.11
      ENV APP_ENV=development
      ENV DEBUG=true
      COPY . .
      CMD ["python", "app.py"]
    scripts/env_setup.sh: |
      #!/bin/bash
      export APP_ENV=development
      export DEBUG=true
      export LOG_LEVEL=DEBUG
      python app.py
    ansible/vars.yml: |
      app_env: production
      debug: false
      log_level: warning
      database_url: "postgresql://prod-db:5432/app"
    helm/values.yaml: |
      env:
        APP_ENV: production
        DEBUG: "false"
        LOG_LEVEL: warning
  changed_files:
