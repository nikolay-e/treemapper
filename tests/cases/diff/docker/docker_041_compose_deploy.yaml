name: docker_041_compose_deploy
repo:
  initial_files:
    api/src/app.py: |
      from flask import Flask, jsonify
      import os
      import socket

      app = Flask(__name__)

      @app.route('/health')
      def health():
          return jsonify(
              status='ok',
              hostname=socket.gethostname(),
              instance=os.environ.get('HOSTNAME', 'unknown')
          )

      @app.route('/api/v1/data')
      def get_data():
          return jsonify(data=[1, 2, 3])
    api/requirements.txt: |
      flask==2.3.0
      gunicorn==21.2.0
    api/Dockerfile: |
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY src/ ./src/
      CMD ["gunicorn", "-b", "0.0.0.0:8080", "src.app:app"]
    docker-compose.yml: |
      version: '3.8'
      services:
        api:
          build: ./api
        db:
          image: postgres:16-alpine
    scripts/scale_service.sh: |
      #!/bin/bash
      docker-compose up -d --scale api=3
    tests/test_scaling.py: |
      def test_scaling():
          pass
    docs/deployment.md: |
      # Deployment Guide
    k8s/deployment.yaml: |
      apiVersion: apps/v1
    terraform/ecs.tf: ''
  changed_files:
    api/src/app.py: |
      from flask import Flask, jsonify
      import os
      import socket

      app = Flask(__name__)

      @app.route('/health')
      def health():
          return jsonify(
              status='ok',
              hostname=socket.gethostname(),
              instance=os.environ.get('HOSTNAME', 'unknown')
          )

      @app.route('/api/v1/data')
      def get_data():
          return jsonify(data=[1, 2, 3])
    api/requirements.txt: |
      flask==2.3.0
      gunicorn==21.2.0
    api/Dockerfile: |
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY src/ ./src/
      CMD ["gunicorn", "-b", "0.0.0.0:8080", "src.app:app"]
    docker-compose.yml: |
      version: '3.8'

      services:
        api:
          build: ./api
          ports:
            - "8080-8082:8080"
          deploy:
            mode: replicated
            replicas: 3
            endpoint_mode: vip
            resources:
              limits:
                cpus: '0.50'
                memory: 512M
              reservations:
                cpus: '0.25'
                memory: 256M
            restart_policy:
              condition: on-failure
              delay: 5s
              max_attempts: 3
              window: 120s
            rollback_config:
              parallelism: 1
              delay: 10s
              failure_action: continue
              monitor: 60s
              max_failure_ratio: 0.3
            update_config:
              parallelism: 1
              delay: 10s
              failure_action: rollback
              monitor: 60s
              max_failure_ratio: 0.3
              order: start-first
            placement:
              constraints:
                - node.role == worker
              preferences:
                - spread: node.labels.zone

        db:
          image: postgres:16-alpine
          environment:
            - POSTGRES_PASSWORD=secret
          volumes:
            - postgres_data:/var/lib/postgresql/data
          deploy:
            mode: replicated
            replicas: 1
            resources:
              limits:
                cpus: '1.0'
                memory: 1G
              reservations:
                cpus: '0.5'
                memory: 512M
            placement:
              constraints:
                - node.labels.db == true

        redis:
          image: redis:7-alpine
          deploy:
            mode: global
            resources:
              limits:
                cpus: '0.25'
                memory: 128M

      volumes:
        postgres_data:
    scripts/scale_service.sh: |
      #!/bin/bash
      docker-compose up -d --scale api=3
    tests/test_scaling.py: |
      def test_scaling():
          pass
    docs/deployment.md: |
      # Deployment Guide
    k8s/deployment.yaml: |
      apiVersion: apps/v1
    terraform/ecs.tf: ''
  commit_message: Update files
fragments:
- id: docker_compose_file
  selector:
    path: docker-compose.yml
- id: req_global_0
  selector:
    anchor: '- "8080-8082:8080"'
- id: req_global_1
  selector:
    anchor: 'postgres_data:'
oracle:
  required:
  - docker_compose_file
  - req_global_0
  - req_global_1
  allowed: []
  forbidden: []
