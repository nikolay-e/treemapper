initial:
  src/main.rs: |
    fn main() {
        let version = env!("CARGO_PKG_VERSION");
        println!("App version: {}", version);
    }
  Cargo.toml: |
    [package]
    name = "myapp"
    version = "1.0.0"
    edition = "2021"

    [dependencies]
    tokio = { version = "1.35", features = ["full"] }
    axum = "0.7"
  Dockerfile: |
    FROM rust:1.74-alpine
    WORKDIR /app
    COPY . .
    RUN cargo build --release
    CMD ["./target/release/myapp"]
  scripts/build.sh: |
    #!/bin/bash
    cargo build --release
  tests/integration_test.rs: |
    #[test]
    fn test_main() {}
  docs/building.md: |
    # Building
  .github/actions/release/action.yml: |
    name: Release
  benches/benchmark.rs: |
    fn bench_main() {}
changed:
  src/main.rs: |
    fn main() {
        let version = env!("CARGO_PKG_VERSION");
        println!("App version: {}", version);
    }
  Cargo.toml: |
    [package]
    name = "myapp"
    version = "1.0.0"
    edition = "2021"

    [dependencies]
    tokio = { version = "1.35", features = ["full"] }
    axum = "0.7"
  Dockerfile: |
    # Build arguments for versioning and caching
    ARG RUST_VERSION=1.75
    ARG BUILDPLATFORM=linux/amd64
    ARG TARGETPLATFORM=linux/amd64

    # Build stage
    FROM --platform=$BUILDPLATFORM rust:${RUST_VERSION}-alpine AS builder

    # Build arguments available inside build stage
    ARG VERSION=0.0.0
    ARG GIT_SHA=unknown
    ARG BUILD_DATE
    ARG CARGO_INCREMENTAL=0
    ARG CARGO_NET_RETRY=10

    # Install build dependencies
    RUN apk add --no-cache musl-dev openssl-dev pkgconfig

    WORKDIR /build

    # Cache dependencies
    COPY Cargo.toml Cargo.lock ./
    RUN mkdir src && echo "fn main() {}" > src/main.rs && \
        cargo build --release && \
        rm -rf src

    # Build actual application
    COPY src ./src
    RUN cargo build --release \
        --config "env.APP_VERSION='${VERSION}'" \
        --config "env.GIT_SHA='${GIT_SHA}'"

    # Production stage
    FROM gcr.io/distroless/cc-debian12:nonroot AS production

    ARG VERSION=0.0.0
    ARG GIT_SHA=unknown
    ARG BUILD_DATE

    LABEL org.opencontainers.image.version="${VERSION}" \
          org.opencontainers.image.revision="${GIT_SHA}" \
          org.opencontainers.image.created="${BUILD_DATE}" \
          org.opencontainers.image.source="https://github.com/org/myapp"

    COPY --from=builder --chown=nonroot:nonroot /build/target/release/myapp /app

    USER nonroot:nonroot
    ENTRYPOINT ["/app"]
  scripts/build.sh: |
    #!/bin/bash
    cargo build --release
  tests/integration_test.rs: |
    #[test]
    fn test_main() {}
  docs/building.md: |
    # Building
  .github/actions/release/action.yml: |
    name: Release
  benches/benchmark.rs: |
    fn bench_main() {}
must_include_files:
- Dockerfile
must_include_content:
- ARG RUST_VERSION=1.75
add_garbage_files: false
skip_garbage_check: true
