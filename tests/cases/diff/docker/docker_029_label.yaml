# Scenario: Python Dockerfile refactored to multi-stage build with extensive
# OCI LABEL metadata. ARG directives for VERSION, GIT_SHA, BUILD_DATE feed
# into labels. The app reads APP_VERSION from environment. App code unchanged.
#
# Reviewer questions:
#   1. Does src/main.py use APP_VERSION env var — does it relate to LABEL version ARG?
#   2. What ARG values flow into LABEL — VERSION, GIT_SHA, BUILD_DATE, VCS_URL?
#   3. Does the app expose version info via get_version_info() matching label metadata?

max_enrichment: 4.0
initial:
  src/main.py: |
    import os
    VERSION = os.environ.get('APP_VERSION', 'unknown')
    BUILD_DATE = os.environ.get('BUILD_DATE', 'unknown')

    def get_version_info():
        return {
            'version': VERSION,
            'build_date': BUILD_DATE
        }
  requirements.txt: |
    flask==2.3.0
  Dockerfile: |
    FROM python:3.11-slim
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install -r requirements.txt
    COPY src/ ./src/
    CMD ["python", "src/main.py"]

  # Trap: build info script — outputs version but is a dev convenience
  scripts/build_info.sh: |
    #!/bin/bash
    echo "Build date: $(date)"
    echo "Git SHA: $(git rev-parse HEAD)"
    echo "Version: $(cat VERSION)"

  # Trap: GitHub release workflow — passes --build-arg but is CI config
  .github/workflows/release.yml: |
    name: Release
    on:
      push:
        tags: ['v*']
    jobs:
      release:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Build
            run: docker build --build-arg VERSION=${GITHUB_REF_NAME} .

  # Trap: changelog — mentions versions but is documentation
  changelog/CHANGELOG.md: |
    # Changelog
    ## v1.0.0 - Initial Release
    - Flask application
    - Docker support

changed:
  src/main.py: |
    import os
    VERSION = os.environ.get('APP_VERSION', 'unknown')
    BUILD_DATE = os.environ.get('BUILD_DATE', 'unknown')

    def get_version_info():
        return {
            'version': VERSION,
            'build_date': BUILD_DATE
        }
  requirements.txt: |
    flask==2.3.0
  Dockerfile: |
    FROM python:3.12-slim-bookworm AS base

    # Build arguments for labels
    ARG VERSION=0.0.0
    ARG GIT_SHA=unknown
    ARG BUILD_DATE
    ARG VCS_URL=https://github.com/org/repo

    # OCI Image Format labels (standard)
    LABEL org.opencontainers.image.title="My Application" \
          org.opencontainers.image.description="Production-ready Python application" \
          org.opencontainers.image.version="${VERSION}" \
          org.opencontainers.image.revision="${GIT_SHA}" \
          org.opencontainers.image.created="${BUILD_DATE}" \
          org.opencontainers.image.source="${VCS_URL}" \
          org.opencontainers.image.url="${VCS_URL}" \
          org.opencontainers.image.documentation="${VCS_URL}/blob/main/README.md" \
          org.opencontainers.image.vendor="My Organization" \
          org.opencontainers.image.licenses="MIT"

    # Custom application labels
    LABEL com.myorg.app.component="api" \
          com.myorg.app.team="platform" \
          com.myorg.app.tier="backend"

    ENV PYTHONDONTWRITEBYTECODE=1
    ENV PYTHONUNBUFFERED=1

    FROM base AS dependencies
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install --no-cache-dir -r requirements.txt

    FROM base AS production
    WORKDIR /app

    COPY --from=dependencies /usr/local/lib/python3.12/site-packages /usr/local/lib/python3.12/site-packages
    COPY --from=dependencies /usr/local/bin /usr/local/bin
    COPY src/ ./src/

    RUN useradd --create-home appuser
    USER appuser

    CMD ["python", "src/main.py"]

  scripts/build_info.sh: |
    #!/bin/bash
    echo "Build date: $(date)"
    echo "Git SHA: $(git rev-parse HEAD)"
    echo "Version: $(cat VERSION)"
  .github/workflows/release.yml: |
    name: Release
    on:
      push:
        tags: ['v*']
    jobs:
      release:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Build
            run: docker build --build-arg VERSION=${GITHUB_REF_NAME} .
  changelog/CHANGELOG.md: |
    # Changelog
    ## v1.0.0 - Initial Release
    - Flask application
    - Docker support

# === Assertions ===

must_include_files:
- Dockerfile

must_include_content_from:
  # Reviewer needs to see the app reads version from env to understand how LABEL version
  # relates to runtime behavior
  src/main.py:
    - VERSION = os.environ.get('APP_VERSION', 'unknown')
    - BUILD_DATE = os.environ.get('BUILD_DATE', 'unknown')

must_not_include_files:
  # Build info script — outputs version info locally, not Dockerfile-relevant
- scripts/build_info.sh
  # Release workflow — passes --build-arg but is CI config, not Dockerfile review
- .github/workflows/release.yml
  # Changelog — mentions versions but is static documentation
- changelog/CHANGELOG.md

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
