  src/app.py: |
    from storage import ensure_directories, load_config, write_log

    def main():
        ensure_directories()
        config = load_config("app")
        write_log("Application started")

    if __name__ == "__main__":
        main()
  requirements.txt: |
    pyyaml==6.0.0
  Dockerfile: |
    FROM python:3.12-slim
    WORKDIR /app
    COPY requirements.txt .
    RUN pip install -r requirements.txt
    COPY src/ ./src/
    CMD ["python", "src/app.py"]
  docker-compose.yml: |
    version: '3.8'

    services:
      app:
        build:
          context: .
          dockerfile: Dockerfile
        volumes:
          # Persistent data - survives container recreation
          - app_data:/app/data

          # Read-only config from host
          - ./config:/app/config:ro

          # Named volume for logs with custom driver
          - app_logs:/app/logs

          # Temporary storage - cleared on restart
          - type: tmpfs
            target: /app/tmp
            tmpfs:
              size: 100M
              mode: 1777

          # Bind mount for development hot-reload
          - type: bind
            source: ./src
            target: /app/src
            read_only: false

        environment:
          - DATA_PATH=/app/data
          - CONFIG_PATH=/app/config
          - LOGS_PATH=/app/logs
        restart: unless-stopped

      backup:
        image: alpine:latest
        volumes:
          - app_data:/data:ro
          - ./backups:/backups
        command: sh -c "tar -czf /backups/backup-$$(date +%Y%m%d).tar.gz /data"
        profiles:
          - backup

    volumes:
      app_data:
        driver: local
        driver_opts:
          type: none
          o: bind
          device: ${PWD}/persistent_data

      app_logs:
        driver: local
        labels:
          com.example.description: "Application logs"
          com.example.retention: "7d"
  scripts/backup.sh: |
    #!/bin/bash
    tar -czf backup.tar.gz ./data
  tests/test_storage.py: |
    def test_save_data():
        pass
  docs/volumes.md: |
    # Volume Configuration
  k8s/pvc.yaml: |
    apiVersion: v1
  terraform/storage.tf: |
    resource "aws_ebs_volume" "data" {
    }
