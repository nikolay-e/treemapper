name: bal_cfgcode_026_go_rate_limit
tags:
- lang:go
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/ratelimit.yaml: |
      global:
        requests_per_second: 10
        burst: 20
      endpoints:
        /api/search:
          requests_per_second: 5
    internal/ratelimit/limiter.go: |
      package ratelimit

      import (
        "os"

        "gopkg.in/yaml.v3"
      )

      type RateLimitConfig struct {
        Global struct {
          RPS   int `yaml:"requests_per_second"`
          Burst int `yaml:"burst"`
        } `yaml:"global"`
        Endpoints map[string]struct {
          RPS int `yaml:"requests_per_second"`
        } `yaml:"endpoints"`
      }

      func LoadRateLimits() (*RateLimitConfig, error) {
        data, err := os.ReadFile("config/ratelimit.yaml")
        if err != nil {
          return nil, err
        }
        var cfg RateLimitConfig
        yaml.Unmarshal(data, &cfg)
        return &cfg, nil
      }

      func (c *RateLimitConfig) LimitForEndpoint(path string) int {
        if ep, ok := c.Endpoints[path]; ok {
          return ep.RPS
        }
        return c.Global.RPS
      }
    internal/handlers/api.go: |
      package handlers

      var GARBAGE_CFGCODE_026_API_A = "v1"
      var GARBAGE_CFGCODE_026_API_B = "/api"

      func HandleSearch() string {
        return "results"
      }
    internal/models/user.go: |
      package models

      var GARBAGE_CFGCODE_026_USER_C = "admin"
      var GARBAGE_CFGCODE_026_USER_D = 1

      type User struct {
        ID   int
        Name string
      }
  changed_files:
