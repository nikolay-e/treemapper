name: regression_015_yaml_workflow_and_readme
tags:
- lang:python
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    src/app.py: |
      from flask import Flask

      def create_app():
          app = Flask(__name__)
          app.config["DEBUG"] = False
          return app

      def run_server(app):
          app.run(host="0.0.0.0", port=8080)
    src/routes.py: |
      from flask import jsonify

      def register_routes(app):
          @app.route("/health")
          def health():
              return jsonify({"status": "ok"})

          @app.route("/api/version")
          def version():
              return jsonify({"version": "1.0.0"})
    .github/workflows/ci.yml: |
      name: CI
      on:
        push:
          branches: [main]
      jobs:
        test:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - name: Run tests
              run: pytest
    requirements.txt: |
      flask>=2.0
      gunicorn>=21.0
      sqlalchemy>=2.0
      alembic>=1.13
      pytest>=7.0
      ruff>=0.1.0
  changed_files:
    src/app.py: |
      from flask import Flask

      def create_app():
          app = Flask(__name__)
          app.config["DEBUG"] = False
          return app

      def run_server(app):
          app.run(host="0.0.0.0", port=8080)
    src/routes.py: |
      from flask import jsonify

      def register_routes(app):
          @app.route("/health")
          def health():
              return jsonify({"status": "ok"})

          @app.route("/api/version")
          def version():
              return jsonify({"version": "1.0.0"})
    .github/workflows/ci.yml: |
      name: CI
      on:
        push:
          branches: [main]
        pull_request:
          branches: [main]
      jobs:
        lint:
          runs-on: ubuntu-latest
          steps:
            - uses: actions/checkout@v4
            - name: Install dependencies
              run: pip install ruff
            - name: Run linter
              run: ruff check .
        test:
          runs-on: ubuntu-latest
          needs: lint
          steps:
            - uses: actions/checkout@v4
            - name: Install dependencies
              run: pip install -e ".[dev]"
            - name: Run tests
              run: pytest --tb=short
    README.md: |
      # My Application

      A web application built with Flask.

      ## Installation

      ```bash
      pip install -e ".[dev]"
      ```

      ## Usage

      ```bash
      python -m src.app
      ```

      ## Development

      Run tests with:

      ```bash
      pytest
      ```
    requirements.txt: |
      flask>=2.0
      gunicorn>=21.0
      sqlalchemy>=2.0
      alembic>=1.13
      pytest>=7.0
      ruff>=0.1.0
  commit_message: Update files
fragments:
- id: ci
  selector:
    path: .github/workflows/ci.yml
    anchor: 'needs: lint'
- id: readme
  selector:
    path: README.md
    anchor: '# My Application'
- id: no_app
  selector:
    path: src/app.py
- id: no_routes
  selector:
    path: src/routes.py
- id: no_requirements
  selector:
    path: requirements.txt
- id: no_global_0
  selector:
    anchor: create_app
- id: no_global_1
  selector:
    anchor: run_server
- id: no_global_2
  selector:
    anchor: register_routes
- id: no_global_3
  selector:
    anchor: gunicorn
- id: no_global_4
  selector:
    anchor: alembic
oracle:
  required:
  - ci
  - readme
  allowed: []
  forbidden:
  - no_app
  - no_routes
  - no_requirements
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
