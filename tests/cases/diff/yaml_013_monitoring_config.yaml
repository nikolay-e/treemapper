    src/main/java/com/gaming/MatchmakingService.java: |
      package com.gaming;

      import com.gaming.validation.PlayerAvailabilityChecker;

      public class MatchmakingService {
          private final PlayerAvailabilityChecker availabilityChecker;

          public MatchmakingService(PlayerAvailabilityChecker availabilityChecker) {
              this.availabilityChecker = availabilityChecker;
          }

          public Match createMatch(String playerId, String gameMode) {
              if (!isSupportedMode(gameMode)) {
                  throw new IllegalArgumentException("Unsupported mode: " + gameMode);
              }
              availabilityChecker.requireAvailable(playerId);
              return new Match(playerId, gameMode);
          }

          private boolean isSupportedMode(String mode) {
              return "ranked".equals(mode) || "casual".equals(mode) || "tournament".equals(mode);
          }
      }
