    src/main/java/com/gaming/validation/PlayerAvailabilityChecker.java: |
      package com.gaming.validation;

      import com.gaming.Player;
      import com.gaming.PlayerRepository;

      public class PlayerAvailabilityChecker {
          private final PlayerRepository players;

          public PlayerAvailabilityChecker(PlayerRepository players) {
              this.players = players;
          }

          public void requireAvailable(String playerId) {
              if (playerId == null || playerId.isBlank()) {
                  throw new IllegalArgumentException("Player ID required");
              }
              Player player = players.findById(playerId);
              if (player == null || !player.isOnline()) {
                  throw new IllegalStateException("Player not available: " + playerId);
              }
          }
      }
    src/main/java/com/gaming/PlayerRepository.java: |
