repo:
  initial_files:
    src/main/java/com/gaming/MatchmakingService.java: |
      package com.gaming;

      import java.util.List;

      public class MatchmakingService {
          private final PlayerRepository players;

          public MatchmakingService(PlayerRepository players) {
              this.players = players;
          }

          public Match createMatch(String playerId, String gameMode) {
              if (playerId == null || playerId.isBlank()) {
                  throw new IllegalArgumentException("Player ID required");
              }
              if (!isSupportedMode(gameMode)) {
                  throw new IllegalArgumentException("Unsupported mode: " + gameMode);
              }
              Player player = players.findById(playerId);
              if (player == null || !player.isOnline()) {
                  throw new IllegalStateException("Player not available: " + playerId);
              }
              return new Match(playerId, gameMode);
          }

          private boolean isSupportedMode(String mode) {
              return "ranked".equals(mode) || "casual".equals(mode) || "tournament".equals(mode);
          }
      }
    src/main/java/com/gaming/SpectatorService.java: |
      package com.gaming;

      public class SpectatorService {
          private final PlayerRepository players;

          public SpectatorService(PlayerRepository players) {
              this.players = players;
          }

          public void addSpectator(String matchId, String spectatorId) {
              if (spectatorId == null || spectatorId.isBlank()) {
                  throw new IllegalArgumentException("Spectator ID required");
              }
              Player spectator = players.findById(spectatorId);
              if (spectator == null || !spectator.isOnline()) {
                  throw new IllegalStateException("Spectator not available: " + spectatorId);
              }
              System.out.println("Spectator " + spectatorId + " joined match " + matchId);
          }
      }
    src/main/java/com/gaming/PlayerRepository.java: |
      package com.gaming;

      public interface PlayerRepository {
          Player findById(String playerId);
      }
