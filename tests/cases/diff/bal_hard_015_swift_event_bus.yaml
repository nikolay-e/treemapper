name: bal_hard_015_swift_event_bus
tags:
- lang:swift
- change:multi_file
- change:new_function
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    Sources/Events/Event.swift: |
      protocol Event {
          var name: String { get }
      }
    Sources/Events/EventBus.swift: |
      class EventBus {
          private var handlers: [String: [(Event) -> Void]] = [:]
          func subscribe(eventName: String, handler: @escaping (Event) -> Void) {
              handlers[eventName, default: []].append(handler)
          }
          func publish(event: Event) {
              handlers[event.name]?.forEach { $0(event) }
          }
      }
    Sources/Domain/UserCreatedEvent.swift: |
      struct UserCreatedEvent: Event {
          let name = "user.created"
          let userId: String
          let email: String
      }
    Sources/Domain/OrderPlacedEvent.swift: |
      struct OrderPlacedEvent: Event {
          let name = "order.placed"
          let orderId: String
          let total: Double
      }
    Sources/Handlers/EmailHandler.swift: |
      class EmailHandler {
          func onUserCreated(event: Event) {
              guard let e = event as? UserCreatedEvent else { return }
              print("Sending welcome email to \(e.email)")
          }
      }
    Sources/Handlers/AnalyticsHandler.swift: |
      class AnalyticsHandler {
          func onOrderPlaced(event: Event) {
              guard let e = event as? OrderPlacedEvent else { return }
              print("Tracking order \(e.orderId) with total \(e.total)")
          }
      }
    Sources/App/EventSetup.swift: |
      class EventSetup {
          static func configure(bus: EventBus) {
              let email = EmailHandler()
              let analytics = AnalyticsHandler()
              bus.subscribe(eventName: "user.created", handler: email.onUserCreated)
              bus.subscribe(eventName: "order.placed", handler: analytics.onOrderPlaced)
          }
      }
    Sources/Helpers/Serializer.swift: |
      struct Serializer {
          static func toJSON(_ dict: [String: Any]) -> String {
              return dict.map { "\"\($0.key)\": \"\($0.value)\"" }.joined(separator: ", ")
          }
      }
  changed_files:
    Sources/Events/EventBus.swift: |
      class EventBus {
          private var handlers: [String: [(Event) -> Void]] = [:]
          private var history: [Event] = []
          func subscribe(eventName: String, handler: @escaping (Event) -> Void) {
              handlers[eventName, default: []].append(handler)
          }
          func publish(event: Event) {
              history.append(event)
              handlers[event.name]?.forEach { $0(event) }
          }
          func replayEvents(eventName: String, handler: (Event) -> Void) {
              history.filter { $0.name == eventName }.forEach { handler($0) }
          }
      }
    Sources/Domain/UserDeletedEvent.swift: |
      struct UserDeletedEvent: Event {
          let name = "user.deleted"
          let userId: String
          let reason: String
      }
    Sources/Handlers/AuditHandler.swift: |
      class AuditHandler {
          private var log: [String] = []
          func onUserDeleted(event: Event) {
              guard let e = event as? UserDeletedEvent else { return }
              log.append("User \(e.userId) deleted: \(e.reason)")
          }
          func getLog() -> [String] { log }
      }
    Sources/App/EventSetup.swift: |
      class EventSetup {
          static func configure(bus: EventBus) {
              let email = EmailHandler()
              let analytics = AnalyticsHandler()
              let audit = AuditHandler()
              bus.subscribe(eventName: "user.created", handler: email.onUserCreated)
              bus.subscribe(eventName: "order.placed", handler: analytics.onOrderPlaced)
              bus.subscribe(eventName: "user.deleted", handler: audit.onUserDeleted)
          }
      }
  commit_message: "feat: add event history replay and user deletion audit"
