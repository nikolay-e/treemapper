repo:
  initial_files:
    src/retry/backoff.rs: |
      pub struct ExponentialBackoff {
          base_ms: u64,
          max_ms: u64,
      }

      impl ExponentialBackoff {
          pub fn new(base_ms: u64, max_ms: u64) -> Self {
              ExponentialBackoff { base_ms, max_ms }
          }

          pub fn delay_for_attempt(&self, attempt: u32) -> u64 {
              // BUG: no cap applied; returns values above max_ms for large attempts
              self.base_ms * 2u64.pow(attempt)
          }
      }
    src/client/http_retry.rs: |
      use crate::retry::backoff::ExponentialBackoff;

      pub struct RetryingClient {
          backoff: ExponentialBackoff,
          max_attempts: u32,
      }

      impl RetryingClient {
          pub fn new(base_ms: u64, max_ms: u64, max_attempts: u32) -> Self {
              RetryingClient {
                  backoff: ExponentialBackoff::new(base_ms, max_ms),
                  max_attempts,
              }
          }

          pub fn next_delay(&self, attempt: u32) -> Option<u64> {
              if attempt >= self.max_attempts {
                  return None;
              }
              Some(self.backoff.delay_for_attempt(attempt))
          }
      }
    garbage/circuit_breaker.rs: |
      // GARBAGE_BKOF_A = "circuit_breaker_marker"
      pub struct CircuitBreaker { pub threshold: u32 }
    garbage/rate_limiter.rs: |
      // GARBAGE_BKOF_B = "rate_limiter_marker"
      pub fn is_allowed(_key: &str) -> bool { true }
    garbage/timeout.rs: |
      // GARBAGE_BKOF_C = "timeout_marker"
      pub fn apply_timeout(_ms: u64) {}
  changed_files:
    src/retry/backoff.rs: |
      pub struct ExponentialBackoff {
          base_ms: u64,
          max_ms: u64,
      }

      impl ExponentialBackoff {
          pub fn new(base_ms: u64, max_ms: u64) -> Self {
              ExponentialBackoff { base_ms, max_ms }
          }

          pub fn delay_for_attempt(&self, attempt: u32) -> u64 {
              let delay = self.base_ms.saturating_mul(2u64.saturating_pow(attempt));
              delay.min(self.max_ms)
          }
      }
    src/client/http_retry.rs: |
      use crate::retry::backoff::ExponentialBackoff;

      pub struct RetryingClient {
          backoff: ExponentialBackoff,
          max_attempts: u32,
      }

      impl RetryingClient {
          pub fn new(base_ms: u64, max_ms: u64, max_attempts: u32) -> Self {
              RetryingClient {
                  backoff: ExponentialBackoff::new(base_ms, max_ms),
                  max_attempts,
              }
          }

          pub fn next_delay(&self, attempt: u32) -> Option<u64> {
              if attempt >= self.max_attempts {
                  return None;
              }
              Some(self.backoff.delay_for_attempt(attempt))
          }
      }
    garbage/circuit_breaker.rs: |
      // GARBAGE_BKOF_A = "circuit_breaker_marker"
      pub struct CircuitBreaker { pub threshold: u32 }
    garbage/rate_limiter.rs: |
      // GARBAGE_BKOF_B = "rate_limiter_marker"
      pub fn is_allowed(_key: &str) -> bool { true }
    garbage/timeout.rs: |
