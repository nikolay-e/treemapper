  initial_files:
    navigation/bearing.py: |
      import math

      def calculate_bearing(lat1: float, lon1: float, lat2: float, lon2: float) -> float:
          lat1_r = math.radians(lat1)
          lat2_r = math.radians(lat2)
          dlon = math.radians(lon2 - lon1)
          x = math.sin(dlon) * math.cos(lat2_r)
          y = math.cos(lat1_r) * math.sin(lat2_r) - math.sin(lat1_r) * math.cos(lat2_r) * math.cos(dlon)
          bearing = math.degrees(math.atan2(x, y))
          return (bearing + 360) % 360

      def bearing_to_cardinal(bearing: float) -> str:
          directions = ["N", "NE", "E", "SE", "S", "SW", "W", "NW"]
          idx = int((bearing + 22.5) / 45) % 8
          return directions[idx]
    navigation/waypoint.py: |
      WAYPOINT_RADIUS_M = 50

      class Waypoint:
          def __init__(self, name: str, lat: float, lon: float):
              self.name = name
              self.lat = lat
              self.lon = lon

          def distance_to(self, other_lat: float, other_lon: float) -> float:
              return ((self.lat - other_lat) ** 2 + (self.lon - other_lon) ** 2) ** 0.5
    navigation/route.py: |
      MAX_WAYPOINTS = 100

      class Route:
          def __init__(self):
              self._points: list[tuple[float, float]] = []

          def add_point(self, lat: float, lon: float) -> None:
              self._points.append((lat, lon))

          def total_legs(self) -> int:
              return max(0, len(self._points) - 1)
