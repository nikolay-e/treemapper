      from src.calculator import add, subtract, divide

      def test_add_positive():
          assert add(2, 3) == 5

      def test_add_negative():
          assert add(-1, -1) == -2

      def test_subtract():
          assert subtract(10, 4) == 6

      def test_divide_by_zero():
          with pytest.raises(ValueError):
              divide(1, 0)
