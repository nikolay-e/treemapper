    src/benchmark_runner.py: |
      import time
      from typing import Callable, Dict

      class BenchmarkRunner:
          def __init__(self, warmup_rounds: int = 3):
              self.warmup_rounds = warmup_rounds
              self.results: Dict[str, float] = {}

          def run(self, name: str, func: Callable, iterations: int = 100) -> float:
              for _ in range(self.warmup_rounds):
                  func()
              start = time.perf_counter()
              for _ in range(iterations):
                  func()
              elapsed = time.perf_counter() - start
              self.results[name] = elapsed / iterations
              return self.results[name]

          def report(self) -> str:
              lines = [f"{name}: {ms*1000:.3f}ms" for name, ms in self.results.items()]
              return "\n".join(lines)
    src/coverage_reporter.py: |
      from typing import Dict, Set

      class CoverageReporter:
          def __init__(self):
              self.covered_lines: Dict[str, Set[int]] = {}
              self.total_lines: Dict[str, int] = {}

          def record(self, filename: str, line: int) -> None:
              self.covered_lines.setdefault(filename, set()).add(line)

          def set_total(self, filename: str, total: int) -> None:
              self.total_lines[filename] = total

          def percentage(self, filename: str) -> float:
              covered = len(self.covered_lines.get(filename, set()))
              total = self.total_lines.get(filename, 1)
              return (covered / total) * 100
