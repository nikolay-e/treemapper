- change:single_file
- change:new_function
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/main/java/com/app/notification/Message.java: |
      package com.app.notification;

      public class Message {
          private String recipient;
          private String body;
          public Message(String recipient, String body) {
              this.recipient = recipient;
              this.body = body;
          }
          public String getRecipient() { return recipient; }
          public String getBody() { return body; }
      }
    src/main/java/com/app/notification/Channel.java: |
      package com.app.notification;

      public interface Channel {
          void send(Message message);
      }
    src/main/java/com/app/notification/EmailChannel.java: |
      package com.app.notification;

      public class EmailChannel implements Channel {
          public void send(Message message) {
              System.out.println("Email to " + message.getRecipient());
          }
      }
    src/main/java/com/app/service/NotificationService.java: |
      package com.app.service;

      import com.app.notification.Channel;
      import com.app.notification.Message;

      public class NotificationService {
          private final Channel channel;
          public NotificationService(Channel channel) {
              this.channel = channel;
          }
          public void notify(String recipient, String body) {
              channel.send(new Message(recipient, body));
          }
      }
    src/main/java/com/app/web/NotificationController.java: |
      package com.app.web;

      import com.app.service.NotificationService;

      public class NotificationController {
          private final NotificationService service;
          public NotificationController(NotificationService service) {
              this.service = service;
          }
          public String send(String recipient, String body) {
              service.notify(recipient, body);
              return "sent";
          }
      }
    src/main/java/com/app/util/Encoder.java: |
      package com.app.util;

      public class Encoder {
          public static String GARBAGE_032_ENCODE_MARKER_A = "enc";
          public static String GARBAGE_032_DECODE_MARKER_B = "dec";
          public static String encode(String val) { return val; }
      }
    src/main/java/com/app/util/Hasher.java: |
      package com.app.util;

      public class Hasher {
          public static String GARBAGE_032_HASH_MARKER_C = "hash";
          public static int GARBAGE_032_SALT_MARKER_D = 0;
          public static String hash(String val) { return val; }
      }
  changed_files:
    src/main/java/com/app/notification/Message.java: |
      package com.app.notification;

      public class Message {
          private String recipient;
          private String body;
          private int priority;
          public Message(String recipient, String body, int priority) {
              this.recipient = recipient;
              this.body = body;
              this.priority = priority;
          }
          public String getRecipient() { return recipient; }
          public String getBody() { return body; }
          public int getPriority() { return priority; }
          public boolean isUrgent() { return priority > 5; }
      }
  commit_message: "feat: add priority and urgency check to Message"
