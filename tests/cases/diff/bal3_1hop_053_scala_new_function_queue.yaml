  changed_files:
    src/main/scala/queue/TaskQueue.scala: |
      package queue

      class TaskQueue {
        private var tasks: List[Map[String, Any]] = Nil
        private var deadLetters: List[Map[String, Any]] = Nil

        def enqueue(channel: String, task: Map[String, Any]): Unit = {
          tasks = tasks :+ (task + ("channel" -> channel))
        }

        def dequeue(channel: String): Option[Map[String, Any]] = {
          tasks.find(_("channel") == channel) match {
            case Some(t) =>
              tasks = tasks.filterNot(_ eq t)
              Some(t)
            case None => None
          }
        }

        def sendToDeadLetter(channel: String, task: Map[String, Any], reason: String): Unit = {
          deadLetters = deadLetters :+ (task + ("channel" -> channel, "reason" -> reason))
        }

        def getDeadLetters(channel: String): List[Map[String, Any]] = {
          deadLetters.filter(_("channel") == channel)
        }

        def size(channel: String): Int = {
          tasks.count(_("channel") == channel)
        }

        def purge(channel: String): Unit = {
          tasks = tasks.filterNot(_("channel") == channel)
        }
      }
  commit_message: "Add dead letter queue, size, and purge to TaskQueue"
