repo:
  initial_files:
    pkg/auth/rbac.go: |
      package auth

      type Role string

      const (
          RoleAdmin   Role = "admin"
          RoleViewer  Role = "viewer"
          RoleEditor  Role = "editor"
      )

      type Permission string

      const (
          PermRead   Permission = "read"
          PermWrite  Permission = "write"
          PermDelete Permission = "delete"
      )

      var rolePermissions = map[Role][]Permission{
          RoleAdmin:  {PermRead, PermWrite, PermDelete},
          RoleEditor: {PermRead, PermWrite},
          RoleViewer: {PermRead},
      }

      func HasPermission(role Role, perm Permission) bool {
          perms, ok := rolePermissions[role]
          if !ok {
              return false
          }
          for _, p := range perms {
              if p == perm {
                  return true
              }
          }
          return false
      }
    internal/middleware/rbac_mw.go: |
      package middleware

      import "pkg/auth"

      type RBACMiddleware struct{}

      func NewRBACMiddleware() *RBACMiddleware {
          return &RBACMiddleware{}
      }

      func (m *RBACMiddleware) Check(role auth.Role, perm auth.Permission) bool {
          return auth.HasPermission(role, perm)
      }
    internal/api/resource_handler.go: |
      package api

      import (
          "internal/middleware"
          "pkg/auth"
      )

      type ResourceHandler struct {
          rbac *middleware.RBACMiddleware
      }

      func NewResourceHandler(rbac *middleware.RBACMiddleware) *ResourceHandler {
          return &ResourceHandler{rbac: rbac}
      }

      func (h *ResourceHandler) Handle(role auth.Role, perm auth.Permission) bool {
          return h.rbac.Check(role, perm)
      }
