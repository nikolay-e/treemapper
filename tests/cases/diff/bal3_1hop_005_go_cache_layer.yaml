repo:
  initial_files:
    pkg/cache/store.go: |
      package cache

      import "time"

      type Entry struct {
          Value     string
          ExpiresAt time.Time
      }

      type Store struct {
          data map[string]*Entry
      }

      func NewStore() *Store {
          return &Store{data: make(map[string]*Entry)}
      }

      func (s *Store) Get(key string) (string, bool) {
          e, ok := s.data[key]
          if !ok {
              return "", false
          }
          return e.Value, true
      }

      func (s *Store) Set(key, value string, ttl time.Duration) {
          s.data[key] = &Entry{Value: value, ExpiresAt: time.Now().Add(ttl)}
      }
    internal/api/user_handler.go: |
      package api

      import "pkg/cache"

      type UserHandler struct {
          cache *cache.Store
      }

      func NewUserHandler(c *cache.Store) *UserHandler {
          return &UserHandler{cache: c}
      }

      func (h *UserHandler) GetUser(id string) string {
          val, ok := h.cache.Get("user:" + id)
          if ok {
              return val
          }
          return "fetched-" + id
      }
    internal/api/product_handler.go: |
      package api

