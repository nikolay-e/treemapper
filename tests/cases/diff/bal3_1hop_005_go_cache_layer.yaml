  changed_files:
    pkg/cache/store.go: |
      package cache

      import "time"

      type Entry struct {
          Value     string
          ExpiresAt time.Time
      }

      type Store struct {
          data map[string]*Entry
      }

      func NewStore() *Store {
          return &Store{data: make(map[string]*Entry)}
      }

      func (s *Store) Get(key string) (string, bool) {
          e, ok := s.data[key]
          if !ok {
              return "", false
          }
          if time.Now().After(e.ExpiresAt) {
              delete(s.data, key)
              return "", false
          }
          return e.Value, true
      }

      func (s *Store) Set(key, value string, ttl time.Duration) {
          s.data[key] = &Entry{Value: value, ExpiresAt: time.Now().Add(ttl)}
      }

      func (s *Store) Delete(key string) {
          delete(s.data, key)
      }
  commit_message: "fix: expire stale cache entries on Get and add Delete method"
