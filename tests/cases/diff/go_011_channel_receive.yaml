name: go_011_channel_receive
repo:
  initial_files:
    internal/stream/producer.go: |
      package stream

      import (
          "context"
          "time"
      )

      type Message struct {
          ID        int
          Payload   []byte
          Timestamp time.Time
      }

      type Producer struct {
          output chan<- Message
          rate   time.Duration
      }

      func NewProducer(output chan<- Message, rate time.Duration) *Producer {
          return &Producer{output: output, rate: rate}
      }

      func (p *Producer) Start(ctx context.Context, count int) {
          ticker := time.NewTicker(p.rate)
          defer ticker.Stop()

          for i := 0; i < count; i++ {
              select {
              case <-ctx.Done():
                  return
              case <-ticker.C:
                  p.output <- Message{
                      ID:        i,
                      Payload:   []byte("data"),
                      Timestamp: time.Now(),
                  }
              }
          }
      }
    internal/stream/consumer.go: |
      package stream

      import "context"

      type Consumer struct {
          input <-chan Message
      }

      func NewConsumer(input <-chan Message) *Consumer {
          return &Consumer{input: input}
      }

      func (c *Consumer) Process(ctx context.Context) {
          for {
              select {
              case msg, ok := <-c.input:
                  if !ok {
                      return
                  }
                  println("Received:", msg.ID)
              case <-ctx.Done():
                  return
              }
          }
      }
    internal/stream/stats.go: |
      package stream

      import "sync/atomic"

      type StreamStats struct {
          messagesIn  int64
          messagesOut int64
          bytesTotal  int64
      }

      func NewStreamStats() *StreamStats {
          return &StreamStats{}
      }

      func (s *StreamStats) RecordIn() {
          atomic.AddInt64(&s.messagesIn, 1)
      }

      func (s *StreamStats) RecordOut() {
          atomic.AddInt64(&s.messagesOut, 1)
      }

      func (s *StreamStats) Snapshot() (int64, int64) {
          return atomic.LoadInt64(&s.messagesIn), atomic.LoadInt64(&s.messagesOut)
      }
