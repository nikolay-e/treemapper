name: bal_cfgcode_014_typescript_cors_config
tags:
- lang:typescript
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/cors.json: |
      {
        "origins": ["http://localhost:3000"],
        "methods": ["GET", "POST"],
        "credentials": false,
        "maxAge": 3600
      }
    src/server.ts: |
      import { readFileSync } from 'fs';

      const corsConfig = JSON.parse(readFileSync('config/cors.json', 'utf-8'));

      export function applyCors(res: any): void {
        const origins = corsConfig.origins;
        const methods = corsConfig.methods.join(',');
        res.setHeader('Access-Control-Allow-Origin', origins[0]);
        res.setHeader('Access-Control-Allow-Methods', methods);
        res.setHeader('Access-Control-Max-Age', corsConfig.maxAge);
      }
    src/router.ts: |
      const GARBAGE_CFGCODE_014_ROUTE_A = "/api";
      const GARBAGE_CFGCODE_014_ROUTE_B = "v1";

      export function createRouter() {
        return { routes: [] };
      }
    src/middleware.ts: |
      const GARBAGE_CFGCODE_014_MW_C = "compression";
      const GARBAGE_CFGCODE_014_MW_D = true;

      export function compress(data: Buffer): Buffer {
        return data;
      }
  changed_files:
    config/cors.json: |
      {
        "origins": [
          "http://localhost:3000",
          "https://app.example.com",
          "https://staging.example.com"
        ],
        "methods": ["GET", "POST", "PUT", "DELETE", "PATCH"],
        "credentials": true,
        "maxAge": 86400,
        "exposedHeaders": ["X-Request-Id"]
      }
    src/server.ts: |
      import { readFileSync } from 'fs';

      const corsConfig = JSON.parse(readFileSync('config/cors.json', 'utf-8'));

      export function applyCors(res: any): void {
        const origins = corsConfig.origins;
        const methods = corsConfig.methods.join(',');
        res.setHeader('Access-Control-Allow-Origin', origins[0]);
        res.setHeader('Access-Control-Allow-Methods', methods);
        res.setHeader('Access-Control-Max-Age', corsConfig.maxAge);
      }
    src/router.ts: |
      const GARBAGE_CFGCODE_014_ROUTE_A = "/api";
      const GARBAGE_CFGCODE_014_ROUTE_B = "v1";

      export function createRouter() {
        return { routes: [] };
      }
    src/middleware.ts: |
      const GARBAGE_CFGCODE_014_MW_C = "compression";
      const GARBAGE_CFGCODE_014_MW_D = true;

      export function compress(data: Buffer): Buffer {
        return data;
      }
  commit_message: "config: expand CORS for production and staging"
