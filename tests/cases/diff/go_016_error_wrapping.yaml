name: go_016_error_wrapping
repo:
  initial_files:
    internal/errors/sentinel.go: |
      package errors

      import "errors"

      var (
          ErrNotFound   = errors.New("not found")
          ErrPermission = errors.New("permission denied")
          ErrInvalid    = errors.New("invalid input")
      )
    internal/repository/user_repository.go: |
      package repository

      import (
          "context"
          "database/sql"
      )

      type User struct {
          ID    int64
          Name  string
          Email string
      }

      type UserRepository struct {
          db *sql.DB
      }

      func NewUserRepository(db *sql.DB) *UserRepository {
          return &UserRepository{db: db}
      }

      func (r *UserRepository) FindByID(ctx context.Context, id int64) (*User, error) {
          row := r.db.QueryRowContext(ctx, "SELECT id, name, email FROM users WHERE id = ?", id)
          var user User
          if err := row.Scan(&user.ID, &user.Name, &user.Email); err != nil {
              return nil, err
          }
          return &user, nil
      }

      func (r *UserRepository) Update(ctx context.Context, user *User) error {
          _, err := r.db.ExecContext(ctx, "UPDATE users SET name = ?, email = ? WHERE id = ?",
              user.Name, user.Email, user.ID)
          return err
      }

      func (r *UserRepository) Delete(ctx context.Context, id int64) error {
          _, err := r.db.ExecContext(ctx, "DELETE FROM users WHERE id = ?", id)
          return err
      }
    internal/service/user_service.go: |
      package service

      import (
          "context"
          "myproject/internal/repository"
      )

      type UserService struct {
          repo *repository.UserRepository
      }

      func NewUserService(repo *repository.UserRepository) *UserService {
          return &UserService{repo: repo}
      }

      func (s *UserService) GetUser(ctx context.Context, id int64) (*repository.User, error) {
          return s.repo.FindByID(ctx, id)
      }
