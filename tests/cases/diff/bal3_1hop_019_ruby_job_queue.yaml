  changed_files:
    lib/queue/job.rb: |
      module Queue
        class Job
          attr_reader :id, :name, :payload, :priority, :attempts, :max_retries

          def initialize(id:, name:, payload:, priority: :normal, max_retries: 3)
            @id = id
            @name = name
            @payload = payload
            @priority = priority
            @max_retries = max_retries
            @attempts = 0
          end

          def execute
            @attempts += 1
            "executed #{name}"
          end

          def retryable?
            @attempts < @max_retries
          end

          def high_priority?
            @priority == :high || @priority == :critical
          end
        end
      end
  commit_message: "feat: add priority, retry tracking, and helper methods to Job"
