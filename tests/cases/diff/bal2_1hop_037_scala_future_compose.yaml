  changed_files:
    src/main/scala/client/HttpClient.scala: |
      package client

      import scala.concurrent.Future
      import scala.concurrent.ExecutionContext.Implicits.global

      case class HttpResponse(status: Int, body: String)

      class HttpClient(baseUrl: String) {
        def get(path: String): Future[HttpResponse] = {
          Future.successful(HttpResponse(200, s"GET $baseUrl$path"))
        }

        def post(path: String, payload: String): Future[HttpResponse] = {
          Future.successful(HttpResponse(201, s"POST $baseUrl$path $payload"))
        }

        def getWithRetry(path: String, maxRetries: Int = 3): Future[HttpResponse] = {
          def attempt(remaining: Int): Future[HttpResponse] = {
            get(path).recoverWith {
              case _ if remaining > 0 => attempt(remaining - 1)
            }
          }
          attempt(maxRetries)
        }
      }
  commit_message: "fix: add retry logic to HttpClient for transient failures"
