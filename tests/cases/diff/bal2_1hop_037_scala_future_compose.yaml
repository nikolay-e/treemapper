    src/main/scala/client/HttpClient.scala: |
      package client

      import scala.concurrent.Future
      import scala.concurrent.ExecutionContext.Implicits.global

      case class HttpResponse(status: Int, body: String)

      class HttpClient(baseUrl: String) {
        def get(path: String): Future[HttpResponse] = {
          Future.successful(HttpResponse(200, s"GET $baseUrl$path"))
        }

        def post(path: String, payload: String): Future[HttpResponse] = {
          Future.successful(HttpResponse(201, s"POST $baseUrl$path $payload"))
        }
      }
    src/main/scala/service/UserFetcher.scala: |
      package service

      import client.{HttpClient, HttpResponse}
      import scala.concurrent.Future
      import scala.concurrent.ExecutionContext.Implicits.global

      class UserFetcher(client: HttpClient) {
        def fetchUser(id: String): Future[String] = {
          client.get(s"/users/$id").map(_.body)
        }

        def fetchUsers(): Future[List[String]] = {
          client.get("/users").map(r => r.body.split(",").toList)
        }
      }
    src/main/scala/service/OrderFetcher.scala: |
      package service

      import client.{HttpClient, HttpResponse}
      import scala.concurrent.Future
      import scala.concurrent.ExecutionContext.Implicits.global

      class OrderFetcher(client: HttpClient) {
        def fetchOrder(id: String): Future[String] = {
          client.get(s"/orders/$id").map(_.body)
        }
      }
    src/main/scala/controller/DashboardController.scala: |
      package controller

      import service.{UserFetcher, OrderFetcher}
      import scala.concurrent.Future
      import scala.concurrent.ExecutionContext.Implicits.global

      class DashboardController(userFetcher: UserFetcher, orderFetcher: OrderFetcher) {
        def overview(userId: String): Future[String] = {
          for {
            user <- userFetcher.fetchUser(userId)
            orders <- orderFetcher.fetchOrder(userId)
          } yield s"$user: $orders"
        }
      }
