              if (email == null || !email.contains("@") || email.length() > 255) {
                  throw new IllegalArgumentException("invalid email");
              }
              if (message == null || message.trim().isEmpty()) {
                  throw new IllegalArgumentException("empty message");
              }
              return "submitted:" + email;
          }
      }
