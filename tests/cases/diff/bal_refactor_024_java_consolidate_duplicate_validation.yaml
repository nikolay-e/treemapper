  changed_files:
    src/main/java/com/app/validation/InputValidator.java: |
      package com.app.validation;

      public class InputValidator {
          public static void requireValidEmail(String email) {
              if (email == null || !email.contains("@") || email.length() > 255) {
                  throw new IllegalArgumentException("invalid email");
              }
          }

          public static void requireNonEmpty(String value, String fieldName) {
              if (value == null || value.trim().isEmpty()) {
                  throw new IllegalArgumentException("empty " + fieldName);
              }
          }

          public static void requireMaxLength(String value, int max, String fieldName) {
              if (value != null && value.length() > max) {
                  throw new IllegalArgumentException(fieldName + " too long");
              }
          }
      }
    src/main/java/com/app/api/UserEndpoint.java: |
      package com.app.api;

      import com.app.validation.InputValidator;

      public class UserEndpoint {
          public String createUser(String email, String name) {
              InputValidator.requireValidEmail(email);
              InputValidator.requireNonEmpty(name, "name");
              InputValidator.requireMaxLength(name, 100, "name");
              return "created:" + email;
          }
      }
