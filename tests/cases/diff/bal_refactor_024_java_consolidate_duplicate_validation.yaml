    src/main/java/com/erp/employee/EmployeeService.java: |
      package com.erp.employee;

      import java.util.List;
      import java.util.Optional;

      public class EmployeeService {
          private final EmployeeRepository repository;

          public EmployeeService(EmployeeRepository repository) {
              this.repository = repository;
          }

          public Employee findById(Long id) {
              return repository.findById(id)
                  .orElseThrow(() -> new IllegalArgumentException("employee not found: " + id));
          }

          public List<Employee> findByDepartment(String department) {
              return repository.findByDepartment(department);
          }

          public List<Employee> findDirectReports(Long managerId) {
              Employee manager = findById(managerId);
              return repository.findByManagerId(manager.getId());
          }

          public Employee updateSalary(Long id, double newSalary) {
              if (newSalary < 0) {
                  throw new IllegalArgumentException("salary cannot be negative");
              }
              Employee emp = findById(id);
              emp.setSalary(newSalary);
              return repository.save(emp);
          }

          public Employee save(Employee employee) {
              return repository.save(employee);
          }
      }
