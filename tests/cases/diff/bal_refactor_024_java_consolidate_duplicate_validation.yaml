    src/test/java/com/erp/employee/EmployeeServiceTest.java: |
      package com.erp.employee;

      import org.junit.jupiter.api.Test;
      import java.util.List;
      import java.util.Optional;
      import static org.junit.jupiter.api.Assertions.*;

      class EmployeeServiceTest {
          private final InMemoryEmployeeRepository repo = new InMemoryEmployeeRepository();
          private final EmployeeService service = new EmployeeService(repo);

          @Test
          void findById_existingId_returnsEmployee() {
              repo.save(new Employee(1L, "Alice", "Engineering", null, 90000));
              Employee emp = service.findById(1L);
              assertEquals("Alice", emp.getName());
          }

          @Test
          void findById_missingId_throwsException() {
              assertThrows(IllegalArgumentException.class, () -> service.findById(99L));
          }

          @Test
          void findDirectReports_returnsSubordinates() {
              repo.save(new Employee(10L, "Manager", "Eng", null, 120000));
              repo.save(new Employee(11L, "Dev1", "Eng", 10L, 90000));
              repo.save(new Employee(12L, "Dev2", "Eng", 10L, 85000));
              List<Employee> reports = service.findDirectReports(10L);
              assertEquals(2, reports.size());
          }

          @Test
          void updateSalary_validAmount_persistsChange() {
              repo.save(new Employee(20L, "Bob", "Finance", null, 70000));
              Employee updated = service.updateSalary(20L, 75000);
              assertEquals(75000, updated.getSalary());
          }

          @Test
          void updateSalary_negative_throwsException() {
              repo.save(new Employee(21L, "Carol", "HR", null, 60000));
              assertThrows(IllegalArgumentException.class,
                  () -> service.updateSalary(21L, -1000));
          }
      }
