    tests/test_calculator.py: |
      from calculator import add, subtract, multiply, divide, Calculator
      from validator import validate_number

      def test_add():
          assert add(1, 2) == 3

      def test_subtract():
          assert subtract(5, 3) == 2

      def test_multiply():
          assert multiply(4, 5) == 20

      def test_divide():
          assert divide(10, 2) == 5

      def test_divide_by_zero():
          try:
              divide(1, 0)
              assert False
          except ZeroDivisionError:
              pass

      class TestCalculator:
          def test_calculate_add(self):
              calc = Calculator()
              assert calc.calculate("add", 1, 2) == 3

          def test_history(self):
              calc = Calculator()
              calc.calculate("add", 1, 2)
              assert len(calc.get_history()) == 1

          def test_clear_history(self):
              calc = Calculator()
              calc.calculate("add", 1, 2)
              calc.clear_history()
              assert len(calc.get_history()) == 0
    tests/test_validator.py: |
      from validator import validate_number, validate_operation

      def test_validate_number_int():
          assert validate_number(42) is True

