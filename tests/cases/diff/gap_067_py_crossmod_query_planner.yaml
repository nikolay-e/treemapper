      TRAP_GAP067_POOL_C = "conn_pool"
      TRAP_GAP067_MAX_D = 10

      class ConnectionPool:
          def __init__(self, max_size: int = 10):
              self.max_size = max_size
              self._active = 0

          def acquire(self) -> str:
              if self._active >= self.max_size:
                  raise RuntimeError("Pool exhausted")
              self._active += 1
              return f"conn_{self._active}"

          def release(self) -> None:
              if self._active > 0:
                  self._active -= 1
  changed_files:
    src/db/planner.py: |
      from typing import List, Optional
      from src.db.index import IndexCatalog, IndexSpec

      class CostEstimate:
          def __init__(self, strategy: str, cost: float, uses_index: bool):
              self.strategy = strategy
              self.cost = cost
              self.uses_index = uses_index

      class QueryPlanner:
          def __init__(self, catalog: IndexCatalog, seq_cost_per_row: float = 1.0):
              self.catalog = catalog
              self.seq_cost_per_row = seq_cost_per_row

          def estimate_cost(self, table: str, columns: List[str], row_count: int) -> CostEstimate:
              idx = self.catalog.best_index(table, columns)
              if idx:
                  index_cost = row_count * 0.1 * len(idx.columns)
                  return CostEstimate(f"INDEX_SCAN({idx.name})", index_cost, True)
              seq_cost = row_count * self.seq_cost_per_row
              return CostEstimate(f"SEQ_SCAN({table})", seq_cost, False)

          def plan(self, table: str, columns: List[str]) -> str:
              idx = self.catalog.best_index(table, columns)
              if idx:
                  return f"INDEX_SCAN({idx.name})"
              return f"SEQ_SCAN({table})"

          def suggest_indexes(self, table: str, query_columns: List[List[str]]) -> List[str]:
              suggestions = []
              for cols in query_columns:
                  if not self.catalog.best_index(table, cols):
                      suggestions.append(f"CREATE INDEX ON {table}({', '.join(cols)})")
              return suggestions

          def explain(self, table: str, columns: List[str]) -> str:
              strategy = self.plan(table, columns)
              return f"EXPLAIN: {strategy} on {', '.join(columns)}"
