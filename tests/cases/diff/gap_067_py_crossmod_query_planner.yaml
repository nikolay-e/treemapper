    src/db/planner.py: |
      from typing import List
      from src.db.index import IndexCatalog, IndexSpec

      class QueryPlanner:
          def __init__(self, catalog: IndexCatalog):
              self.catalog = catalog

          def plan(self, table: str, columns: List[str]) -> str:
              idx = self.catalog.best_index(table, columns)
              if idx:
                  return f"INDEX_SCAN({idx.name})"
              return f"SEQ_SCAN({table})"

          def explain(self, table: str, columns: List[str]) -> str:
              strategy = self.plan(table, columns)
              return f"EXPLAIN: {strategy} on {', '.join(columns)}"
    src/db/index.py: |
      from typing import List, Optional
      from dataclasses import dataclass

      @dataclass
      class IndexSpec:
          name: str
          table: str
          columns: List[str]
          unique: bool = False

      class IndexCatalog:
          def __init__(self):
              self._indexes: List[IndexSpec] = []

          def register(self, spec: IndexSpec) -> None:
              self._indexes.append(spec)

          def best_index(self, table: str, columns: List[str]) -> Optional[IndexSpec]:
              candidates = [
                  idx for idx in self._indexes
                  if idx.table == table and set(columns).issubset(set(idx.columns))
              ]
              if not candidates:
                  return None
              return min(candidates, key=lambda i: len(i.columns))

          def list_for_table(self, table: str) -> List[IndexSpec]:
              return [idx for idx in self._indexes if idx.table == table]
    src/db/executor.py: |
      from typing import Any, List, Dict

      class QueryExecutor:
          def __init__(self, connection_string: str):
              self.connection_string = connection_string
              self._query_log: List[str] = []

          def execute(self, sql: str) -> List[Dict[str, Any]]:
              self._query_log.append(sql)
              return []

          def last_queries(self, count: int = 5) -> List[str]:
              return self._query_log[-count:]
