      import logging
      from typing import List, Dict, Optional
      from dataclasses import dataclass

      logger = logging.getLogger(__name__)

      @dataclass
      class PipelineConfig:
          batch_size: int = 100
          retry_count: int = 3
          timeout_seconds: float = 30.0

      def extract_records(source: str) -> List[Dict]:
          logger.info(f"Extracting from {source}")
          records = []
          for i in range(10):
              records.append({"id": i, "source": source})
          return records

      class DataValidator:
          def __init__(self, schema: Dict):
              self.schema = schema
              self._errors: List[str] = []

          def validate(self, record: Dict) -> bool:
              for field_name in self.schema:
                  if field_name not in record:
                      self._errors.append(f"Missing: {field_name}")
                      return False
              return True

          def get_errors(self) -> List[str]:
              return self._errors.copy()

      def transform_records(records: List[Dict], mapping: Dict) -> List[Dict]:
          transformed = []
          for record in records:
              new_record = {}
              for old_key, new_key in mapping.items():
                  if old_key in record:
                      new_record[new_key] = record[old_key]
              transformed.append(new_record)
          return transformed
    src/pipeline_runner.py: |
      from src.data_pipeline import extract_records, transform_records, DataValidator
      from src.loaders.db_loader import load_records
      import logging

      logger = logging.getLogger(__name__)

      FIELD_MAPPING = {
          "id": "record_id",
          "source": "origin",
      }

      SCHEMA = {
          "record_id": {"type": "string"},
          "origin": {"type": "string"},
      }

      def run(source: str) -> int:
          raw = extract_records(source)
          logger.info(f"Extracted {len(raw)} records from {source}")

          validator = DataValidator(SCHEMA)
          transformed = transform_records(raw, FIELD_MAPPING)

          valid = [r for r in transformed if validator.validate(r)]
          if validator.get_errors():
              logger.warning(f"Validation errors: {validator.get_errors()}")

          loaded = load_records(valid)
          return loaded

      def run_incremental(source: str, since: str) -> int:
          raw = extract_records(source)
          filtered = [r for r in raw if r.get("updated_after", "") >= since]
          transformed = transform_records(filtered, FIELD_MAPPING)
          return load_records(transformed)
