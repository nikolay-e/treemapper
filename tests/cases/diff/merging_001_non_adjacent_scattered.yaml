      import logging
      from typing import List, Dict

      logger = logging.getLogger(__name__)

      def load_records(records: List[Dict], table: str = "raw_data") -> int:
          count = 0
          for record in records:
              columns = ", ".join(record.keys())
              placeholders = ", ".join(["%s"] * len(record))
              logger.debug(f"INSERT INTO {table} ({columns}) VALUES ({placeholders})")
              count += 1
          logger.info(f"Loaded {count} records into {table}")
          return count

      def upsert_records(records: List[Dict], table: str, key_column: str) -> int:
          count = 0
          for record in records:
              logger.debug(f"UPSERT into {table} on {key_column}")
              count += 1
          return count
