      from datetime import datetime, timedelta
      from typing import List, Callable
      import logging

      logger = logging.getLogger(__name__)

      SCHEDULE_INTERVAL = timedelta(minutes=15)

      class BatchScheduler:
          def __init__(self, interval: timedelta = SCHEDULE_INTERVAL):
              self.interval = interval
              self._jobs: List[dict] = []

          def schedule(self, name: str, handler: Callable) -> None:
              self._jobs.append({
                  "name": name,
                  "handler": handler,
                  "next_run": datetime.utcnow() + self.interval,
              })
              logger.info(f"Scheduled job '{name}' every {self.interval}")

          def pending_jobs(self) -> List[str]:
              now = datetime.utcnow()
              return [j["name"] for j in self._jobs if j["next_run"] <= now]

          def run_pending(self) -> int:
              ran = 0
              for job in self._jobs:
                  if job["next_run"] <= datetime.utcnow():
                      job["handler"]()
                      job["next_run"] = datetime.utcnow() + self.interval
                      ran += 1
              return ran
