      from src.data_pipeline import extract_records, transform_records, DataValidator

      def test_extract_returns_records():
          records = extract_records("test_source")
          assert len(records) > 0
          assert all("id" in r for r in records)

      def test_transform_applies_mapping():
          records = [{"id": 1, "source": "s3"}]
          mapping = {"id": "record_id", "source": "origin"}
          result = transform_records(records, mapping)
          assert result[0]["record_id"] == 1
          assert result[0]["origin"] == "s3"

      def test_validator_catches_missing():
          v = DataValidator({"name": {}, "age": {}})
          assert not v.validate({"name": "test"})
          assert len(v.get_errors()) == 1

      def test_validator_passes_complete():
          v = DataValidator({"name": {}, "age": {}})
          assert v.validate({"name": "test", "age": 30})
