      from typing import Dict, Any, List

      SUPPORTED_TYPES = ("string", "integer", "boolean", "float", "array")

      class DataQualityValidator:
          def __init__(self, rules: Dict[str, Any]):
              self.rules = rules
              self._violations: List[str] = []

          def check_record(self, record: Dict) -> bool:
              for field, rule in self.rules.items():
                  if field not in record:
                      self._violations.append(f"Missing required field: {field}")
                      return False
                  if rule.get("type") and not isinstance(record[field], self._type_map(rule["type"])):
                      self._violations.append(f"Type mismatch for {field}")
                      return False
              return True

          def _type_map(self, type_name: str) -> type:
              return {"string": str, "integer": int, "boolean": bool, "float": float}.get(type_name, object)

          def get_violations(self) -> List[str]:
              return list(self._violations)
