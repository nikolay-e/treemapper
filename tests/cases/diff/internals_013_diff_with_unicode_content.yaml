      module Telemetry

      export DeviceReading, aggregate_readings, latest_reading

      struct DeviceReading
          device_id::String
          metric::String
          value::Float64
          ts::Int
      end

      function aggregate_readings(readings::Vector{DeviceReading}, metric::String)::Float64
          matching = filter(r -> r.metric == metric, readings)
          isempty(matching) && return 0.0
          return sum(r.value for r in matching) / length(matching)
      end

      function latest_reading(readings::Vector{DeviceReading}, device_id::String)::Union{DeviceReading,Nothing}
          matching = filter(r -> r.device_id == device_id, readings)
          isempty(matching) && return nothing
          return reduce((a, b) -> a.ts > b.ts ? a : b, matching)
      end

      end
    src/Dashboard.jl: |
      module Dashboard

      include("Telemetry.jl")
      using .Telemetry

      function device_summary(readings::Vector{DeviceReading}, device_id::String)::Dict{String,Any}
          last = latest_reading(readings, device_id)
          return Dict("device" => device_id, "last_value" => last !== nothing ? last.value : nothing)
      end

      end
    src/Alerting.jl: |
      module Alerting

      include("Telemetry.jl")
      using .Telemetry

      function check_threshold(readings::Vector{DeviceReading}, metric::String, threshold::Float64)::Bool
          avg = aggregate_readings(readings, metric)
          return avg > threshold
      end

      end
