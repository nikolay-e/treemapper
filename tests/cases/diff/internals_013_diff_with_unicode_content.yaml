  changed_files:
    src/Telemetry.jl: |
      module Telemetry

      export DeviceReading, aggregate_readings, latest_reading, percentile

      struct DeviceReading
          device_id::String
          metric::String
          value::Float64
          ts::Int
          quality::Float64
      end

      function aggregate_readings(readings::Vector{DeviceReading}, metric::String)::Float64
          matching = filter(r -> r.metric == metric && r.quality >= 0.8, readings)
          isempty(matching) && return 0.0
          return sum(r.value for r in matching) / length(matching)
      end

      function latest_reading(readings::Vector{DeviceReading}, device_id::String)::Union{DeviceReading,Nothing}
          matching = filter(r -> r.device_id == device_id, readings)
          isempty(matching) && return nothing
          return reduce((a, b) -> a.ts > b.ts ? a : b, matching)
      end

      function percentile(readings::Vector{DeviceReading}, metric::String, pct::Float64)::Float64
          vals = sort([r.value for r in readings if r.metric == metric])
          isempty(vals) && return 0.0
          idx = max(1, round(Int, pct / 100.0 * length(vals)))
          return vals[idx]
      end

      end
