name: json_009_vscode_settings
tags:
- lang:php
- change:bug_fix
- change:single_file
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    src/Cart/DiscountCalculator.php: |
      <?php
      namespace App\Cart;

      class DiscountCalculator
      {
          public function applyPercentage(float $price, float $percent): float
          {
              return $price - ($price * $percent / 100);
          }

          public function applyFlat(float $price, float $discount): float
          {
              return $price - $discount;
          }

          public function applyTiered(float $price, array $tiers): float
          {
              foreach ($tiers as $threshold => $rate) {
                  if ($price >= $threshold) {
                      return $this->applyPercentage($price, $rate);
                  }
              }
              return $price;
          }
      }
    src/Cart/TaxCalculator.php: |
      <?php
      namespace App\Cart;

      class TaxCalculator
      {
          public function calculate(float $subtotal, float $taxRate): float
          {
              return $subtotal * $taxRate / 100;
          }
      }
