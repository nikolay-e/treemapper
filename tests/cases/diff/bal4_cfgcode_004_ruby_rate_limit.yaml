name: bal4_cfgcode_004_ruby_rate_limit
tags:
- lang:ruby
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    config/rate_limits.yml: |
      api:
        requests_per_minute: 60
        burst: 10
        window: 60
        ban_duration: 3600
    app/middleware/rate_limiter.rb: |
      require 'yaml'
      module Middleware
        class RateLimiter
          def initialize(app)
            @app = app
            @limits = YAML.load_file('config/rate_limits.yml')['api']
          end
          def call(env)
            return too_many if over_limit?(env)
            @app.call(env)
          end
          def rpm
            @limits['requests_per_minute']
          end
          def burst_limit
            @limits['burst']
          end
        end
      end
    app/controllers/api_controller.rb: |
      require 'yaml'
      class ApiController
        RATE_CFG = YAML.load_file('config/rate_limits.yml')['api']
        def throttle_info
          {
            limit: RATE_CFG['requests_per_minute'],
            window: RATE_CFG['window'],
            ban: RATE_CFG['ban_duration']
          }
        end
      end
    garbage_upload.rb: |
      GARBAGE_CFGCODE_004_UPLOAD_A = "s3"
      GARBAGE_CFGCODE_004_UPLOAD_B = 10485760
      class Uploader
        GARBAGE_CFGCODE_004_UPLOAD_C = "images/"
        def store(file)
          GARBAGE_CFGCODE_004_UPLOAD_D = file
        end
      end
    garbage_notification.rb: |
      GARBAGE_CFGCODE_004_NOTIF_E = "push"
      GARBAGE_CFGCODE_004_NOTIF_F = true
      class Notifier
        GARBAGE_CFGCODE_004_NOTIF_G = "apns"
        def send(msg)
          GARBAGE_CFGCODE_004_NOTIF_H = msg
        end
      end
    garbage_migration.rb: |
      GARBAGE_CFGCODE_004_MIG_I = "20240101"
      GARBAGE_CFGCODE_004_MIG_J = "users"
  changed_files:
    config/rate_limits.yml: |
      api:
        requests_per_minute: 120
        burst: 20
        window: 60
        ban_duration: 7200
        whitelist_enabled: true
  commit_message: "double rate limits and add whitelist flag"
