name: go_022_type_switch
repo:
  initial_files:
    internal/geometry/shapes.go: |
      package geometry

      import "math"

      type Shape interface {
          Area() float64
      }

      type Circle struct {
          Radius float64
      }

      func (c Circle) Area() float64 { return math.Pi * c.Radius * c.Radius }

      type Rectangle struct {
          Width, Height float64
      }

      func (r Rectangle) Area() float64 { return r.Width * r.Height }

      type Triangle struct {
          Base, Height float64
      }

      func (t Triangle) Area() float64 { return 0.5 * t.Base * t.Height }
    internal/geometry/ellipse.go: |
      package geometry

      import "math"

      type Ellipse struct {
          A, B float64
      }

      func (e Ellipse) Area() float64 { return math.Pi * e.A * e.B }
    internal/geometry/describe.go: |
      package geometry

      import "fmt"

      func Describe(s Shape) string {
          switch v := s.(type) {
          case Circle:
              return fmt.Sprintf("circle r=%.2f", v.Radius)
          case Rectangle:
              return fmt.Sprintf("rect %.2fx%.2f", v.Width, v.Height)
          case Triangle:
              return fmt.Sprintf("triangle b=%.2f h=%.2f", v.Base, v.Height)
          default:
              return "unknown"
          }
      }
    internal/render/svg.go: |
      package render

      import (
          "fmt"

          "example.com/app/internal/geometry"
      )

      func ToSVG(s geometry.Shape) string {
          switch v := s.(type) {
          case geometry.Circle:
              return fmt.Sprintf(`<circle r="%f"/>`, v.Radius)
          case geometry.Rectangle:
              return fmt.Sprintf(`<rect width="%f" height="%f"/>`, v.Width, v.Height)
          case geometry.Triangle:
              return fmt.Sprintf(`<polygon points="0,0 %f,0 0,%f"/>`, v.Base, v.Height)
          default:
              return ""
          }
      }
    internal/render/json_dump.go: |
      package render

      import (
          "encoding/json"

          "example.com/app/internal/geometry"
      )

      func ToJSON(s geometry.Shape) ([]byte, error) {
          switch v := s.(type) {
          case geometry.Circle:
              return json.Marshal(map[string]interface{}{"type": "circle", "r": v.Radius})
          case geometry.Rectangle:
              return json.Marshal(map[string]interface{}{"type": "rect", "w": v.Width, "h": v.Height})
          case geometry.Triangle:
              return json.Marshal(map[string]interface{}{"type": "triangle", "b": v.Base, "h": v.Height})
          default:
              return nil, nil
          }
      }
    internal/geometry/perimeter.go: |
      package geometry

      import "math"

      func CirclePerimeter(c Circle) float64 {
          return 2 * math.Pi * c.Radius
      }
    internal/render/text.go: |
      package render

      import "strings"

      func Wrap(s string, width int) string {
          return strings.TrimSpace(s)
      }
