repo:
  initial_files:
    models/request.py: |
      from dataclasses import dataclass
      from typing import Optional

      @dataclass
      class RequestModel:
          method: str
          path: str
          body: Optional[dict] = None
          headers: Optional[dict] = None

          def is_json(self) -> bool:
              ct = (self.headers or {}).get("Content-Type", "")
              return "application/json" in ct
    models/response.py: |
      from dataclasses import dataclass
      from typing import Optional

      @dataclass
      class ResponseModel:
          status_code: int
          body: dict
          headers: Optional[dict] = None

          def is_success(self) -> bool:
              return 200 <= self.status_code < 300
    service.py: |
      def process():
          pass
    middleware/auth.py: |
      from models.request import RequestModel
      from models.response import ResponseModel
      GARBAGE_DEP_006_AUTH_IMPORT_C = "auth_middleware"
      GARBAGE_DEP_006_AUTH_TOKEN_D = "bearer"

      class AuthMiddleware:
          GARBAGE_DEP_006_AUTH_CLASS_E = True

          def process(self, request: RequestModel) -> ResponseModel:
              token = (request.headers or {}).get("Authorization", "")
              if not token:
                  return ResponseModel(status_code=401, body={"error": "Unauthorized"})
              return ResponseModel(status_code=200, body={"auth": "ok"})
    models/grpc_models.py: |
