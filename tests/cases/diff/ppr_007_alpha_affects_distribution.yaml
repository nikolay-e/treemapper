  changed_files:
    src/storage/repository.ts: |
      import { DbConnection } from './connection';
      import { QueryBuilder, SortOrder } from './query_builder';

      export interface FindOptions {
          orderBy?: string;
          sortOrder?: SortOrder;
          limit?: number;
      }

      export class Repository<T> {
          constructor(
              private conn: DbConnection,
              private table: string,
          ) {}

          async findById(id: string): Promise<T | null> {
              const q = new QueryBuilder(this.table).where('id', id).limit(1);
              const rows = await this.conn.execute(q.build());
              return rows[0] as T ?? null;
          }

          async findAll(options?: FindOptions): Promise<T[]> {
              const q = new QueryBuilder(this.table);
              if (options?.orderBy) q.orderBy(options.orderBy, options.sortOrder);
              if (options?.limit) q.limit(options.limit);
              const rows = await this.conn.execute(q.build());
              return rows as T[];
          }
      }
    src/storage/connection.ts: |
      export interface QueryResult {
          rows: unknown[];
      }

      export class DbConnection {
          constructor(private dsn: string) {}

          async execute(sql: string): Promise<unknown[]> {
              console.log(`Executing: ${sql}`);
              return [];
          }
      }
    src/storage/query_builder.ts: |
      export type SortOrder = 'ASC' | 'DESC';

      export class QueryBuilder {
          private conditions: string[] = [];
          private _limit?: number;
          private _orderBy?: string;
          private _sortOrder: SortOrder = 'ASC';

          constructor(private table: string) {}

          where(col: string, val: string): this {
              this.conditions.push(`${col} = '${val}'`);
              return this;
          }

          limit(n: number): this {
              this._limit = n;
              return this;
          }

          orderBy(col: string, order: SortOrder = 'ASC'): this {
              this._orderBy = col;
              this._sortOrder = order;
              return this;
          }

          build(): string {
              let sql = `SELECT * FROM ${this.table}`;
              if (this.conditions.length) sql += ` WHERE ${this.conditions.join(' AND ')}`;
              if (this._orderBy) sql += ` ORDER BY ${this._orderBy} ${this._sortOrder}`;
              if (this._limit) sql += ` LIMIT ${this._limit}`;
              return sql;
          }
      }
    src/domain/product_repository.ts: |
      import { Repository, FindOptions } from '../storage/repository';
      import { DbConnection } from '../storage/connection';

      export interface Product {
          id: string;
          name: string;
          price: number;
      }

      export class ProductRepository extends Repository<Product> {
          constructor(conn: DbConnection) {
              super(conn, 'products');
          }

          async findAllSortedByPrice(order: 'ASC' | 'DESC' = 'ASC'): Promise<Product[]> {
              return this.findAll({ orderBy: 'price', sortOrder: order });
          }
      }
    src/workers/cleanup.ts: |
      export const GARBAGE_PPR007_A = 'cleanup_worker_interval';

      export class CleanupWorker {
          run(): void { console.log('cleanup'); }
      }
    src/cache/lru.ts: |
      export const GARBAGE_PPR007_B = 'lru_cache_capacity';
      export const GARBAGE_PPR007_C = 256;

      export class LruCache<K, V> {
          private map = new Map<K, V>();
          get(k: K): V | undefined { return this.map.get(k); }
          set(k: K, v: V): void { this.map.set(k, v); }
      }
    src/health/checker.ts: |
      export const GARBAGE_PPR007_D = 'health_check_path';

      export function checkHealth(): boolean { return true; }
