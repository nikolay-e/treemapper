      public:
          HealthBar(int max_hp);
          void set_current(int hp);
          float percentage() const;
      private:
          int max_hp_;
          int current_hp_;
      };

      }
  changed_files:
    src/input/keyboard.hpp: |
      #pragma once
      #include <unordered_set>

      namespace input {

      enum class Key {
          W, A, S, D, Space, Escape, Shift
      };

      class Keyboard {
      public:
          void press(Key key);
          void release(Key key);
          bool is_pressed(Key key) const;
          bool was_just_pressed(Key key);
      private:
          std::unordered_set<int> pressed_;
          std::unordered_set<int> just_pressed_;
      };

      }
    src/input/keyboard.cpp: |
      #include "keyboard.hpp"

      namespace input {

      void Keyboard::press(Key key) {
          int k = static_cast<int>(key);
          if (pressed_.count(k) == 0) {
              just_pressed_.insert(k);
          }
          pressed_.insert(k);
      }

      void Keyboard::release(Key key) {
          pressed_.erase(static_cast<int>(key));
      }

      bool Keyboard::is_pressed(Key key) const {
          return pressed_.count(static_cast<int>(key)) > 0;
      }

      bool Keyboard::was_just_pressed(Key key) {
          int k = static_cast<int>(key);
          bool result = just_pressed_.count(k) > 0;
          just_pressed_.erase(k);
          return result;
      }

      }
