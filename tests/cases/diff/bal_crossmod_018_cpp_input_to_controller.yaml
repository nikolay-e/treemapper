repo:
  initial_files:
    src/input/keyboard.hpp: |
      #pragma once
      #include <unordered_set>

      namespace input {

      enum class Key {
          W, A, S, D, Space, Escape, Shift
      };

      class Keyboard {
      public:
          void press(Key key);
          void release(Key key);
          bool is_pressed(Key key) const;
      private:
          std::unordered_set<int> pressed_;
      };

      }
    src/input/keyboard.cpp: |
      #include "keyboard.hpp"

      namespace input {

      void Keyboard::press(Key key) {
          pressed_.insert(static_cast<int>(key));
      }

      void Keyboard::release(Key key) {
          pressed_.erase(static_cast<int>(key));
      }

      bool Keyboard::is_pressed(Key key) const {
          return pressed_.count(static_cast<int>(key)) > 0;
      }

      }
    src/controller/player_controller.hpp: |
      #pragma once
      #include "../input/keyboard.hpp"

      namespace controller {

      class PlayerController {
      public:
          explicit PlayerController(input::Keyboard& kb);
          void update(float dt);
          float x() const;
          float y() const;
      private:
          input::Keyboard& kb_;
          float x_, y_;
          float speed_;
      };

      }
    src/controller/player_controller.cpp: |
      #include "player_controller.hpp"

      namespace controller {

      PlayerController::PlayerController(input::Keyboard& kb)
          : kb_(kb), x_(0), y_(0), speed_(100.0f) {}

      void PlayerController::update(float dt) {
          if (kb_.is_pressed(input::Key::W)) y_ += speed_ * dt;
          if (kb_.is_pressed(input::Key::S)) y_ -= speed_ * dt;
          if (kb_.is_pressed(input::Key::A)) x_ -= speed_ * dt;
          if (kb_.is_pressed(input::Key::D)) x_ += speed_ * dt;
      }

      float PlayerController::x() const { return x_; }
      float PlayerController::y() const { return y_; }

      }
