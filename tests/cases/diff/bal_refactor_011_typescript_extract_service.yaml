    src/main/scala/logistics/Shipment.scala: |
      package logistics

      case class Shipment(
        id: String,
        origin: String,
        destination: String,
        weightKg: Double,
        status: String
      )
    src/main/scala/logistics/ShipmentRepository.scala: |
      package logistics

      class ShipmentRepository {
        private var store: Map[String, Shipment] = Map.empty

        def save(s: Shipment): Unit = {
          store = store + (s.id -> s)
        }

        def find(id: String): Option[Shipment] = store.get(id)

        def all(): List[Shipment] = store.values.toList
      }
    src/main/scala/logistics/ShipmentService.scala: |
      package logistics

      class ShipmentService(repo: ShipmentRepository) {
        def dispatch(id: String): Either[String, Shipment] = {
          repo.find(id) match {
            case None    => Left(s"Shipment $id not found")
            case Some(s) => Right(s.copy(status = "dispatched"))
          }
        }
      }
    src/main/scala/logistics/api/ShipmentController.scala: |
      package logistics.api

      import logistics.{ShipmentService, ShipmentRepository, Shipment}

      class ShipmentController(service: ShipmentService) {
        def handleDispatch(id: String): String = {
          service.dispatch(id) match {
            case Right(s) => s"OK: dispatched ${s.id}"
            case Left(e)  => s"ERROR: $e"
          }
        }
      }
