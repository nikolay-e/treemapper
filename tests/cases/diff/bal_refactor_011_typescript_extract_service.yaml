  changed_files:
    src/main/scala/logistics/Shipment.scala: |
      package logistics

      case class Shipment(
        id: String,
        origin: String,
        destination: String,
        weightKg: Double,
        status: String,
        estimatedDays: Int
      )
    src/main/scala/logistics/ShipmentRepository.scala: |
      package logistics

      class ShipmentRepository {
        private var store: Map[String, Shipment] = Map.empty

        def save(s: Shipment): Unit = {
          store = store + (s.id -> s)
        }

        def find(id: String): Option[Shipment] = store.get(id)

        def all(): List[Shipment] = store.values.toList

        def findByStatus(status: String): List[Shipment] =
          store.values.filter(_.status == status).toList
      }
    src/main/scala/logistics/ShipmentService.scala: |
      package logistics

      class ShipmentService(repo: ShipmentRepository) {
        def dispatch(id: String): Either[String, Shipment] = {
          repo.find(id) match {
            case None    => Left(s"Shipment $id not found")
            case Some(s) => Right(s.copy(status = "dispatched"))
          }
        }

        def estimateDelivery(id: String, speedFactor: Double): Either[String, Int] = {
          repo.find(id) match {
            case None    => Left(s"Shipment $id not found")
            case Some(s) => Right(Math.ceil(s.estimatedDays / speedFactor).toInt)
          }
        }

        def listPending(): List[Shipment] = repo.findByStatus("pending")
      }
    src/main/scala/logistics/api/ShipmentController.scala: |
      package logistics.api

      import logistics.{ShipmentService, ShipmentRepository, Shipment}

      class ShipmentController(service: ShipmentService) {
        def handleDispatch(id: String): String = {
          service.dispatch(id) match {
            case Right(s) => s"OK: dispatched ${s.id}"
            case Left(e)  => s"ERROR: $e"
          }
        }

        def handleEstimate(id: String): String = {
          service.estimateDelivery(id, 1.5) match {
            case Right(days) => s"ETA: $days days"
            case Left(e)     => s"ERROR: $e"
          }
        }
      }
    src/main/scala/REFACTOR011_Audit.scala: |
      package audit

      object REFACTOR011_Audit {
        val REFACTOR011_GARBAGE_A = "audit_marker"
        val REFACTOR011_GARBAGE_B = "log_level"

        def log(msg: String): Unit = println(s"[AUDIT] $msg")
      }
    src/main/scala/REFACTOR011_Metrics.scala: |
