        val REFACTOR011_GARBAGE_C = "metrics_marker"
        val REFACTOR011_GARBAGE_D = "statsd_host"

        def record(name: String, value: Double): Unit = {}
      }
    src/main/scala/REFACTOR011_Cache.scala: |
      package cache

      object REFACTOR011_Cache {
        val REFACTOR011_GARBAGE_E = "cache_marker"

        def get(key: String): Option[String] = None
      }
