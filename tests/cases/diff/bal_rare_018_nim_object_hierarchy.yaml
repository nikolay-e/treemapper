    internal/iot/sensor.go: |
      package iot

      import "time"

      type Reading struct {
          SensorID  string
          Value     float64
          Unit      string
          Timestamp time.Time
      }

      type Sensor struct {
          ID       string
          Name     string
          Location string
          readings []Reading
      }

      func NewSensor(id, name, location string) *Sensor {
          return &Sensor{ID: id, Name: name, Location: location}
      }

      func (s *Sensor) Record(value float64, unit string) {
          s.readings = append(s.readings, Reading{
              SensorID:  s.ID,
              Value:     value,
              Unit:      unit,
              Timestamp: time.Now(),
          })
      }

      func (s *Sensor) Latest() *Reading {
          if len(s.readings) == 0 {
              return nil
          }
          return &s.readings[len(s.readings)-1]
      }

      func (s *Sensor) Average() float64 {
          if len(s.readings) == 0 {
              return 0
          }
          sum := 0.0
          for _, r := range s.readings {
              sum += r.Value
          }
          return sum / float64(len(s.readings))
      }

      func (s *Sensor) ReadingCount() int {
          return len(s.readings)
      }
    internal/iot/hub.go: |
      package iot

      type Hub struct {
          sensors map[string]*Sensor
      }

      func NewHub() *Hub {
          return &Hub{sensors: make(map[string]*Sensor)}
      }

      func (h *Hub) Register(s *Sensor) {
          h.sensors[s.ID] = s
      }

      func (h *Hub) Get(id string) *Sensor {
          return h.sensors[id]
      }

      func (h *Hub) AllSensors() []*Sensor {
          sensors := make([]*Sensor, 0, len(h.sensors))
          for _, s := range h.sensors {
              sensors = append(sensors, s)
          }
          return sensors
      }
    internal/cloud/uploader.go: |
      package cloud

      import "fmt"

      type Uploader struct {
          endpoint string
      }

      func NewUploader(endpoint string) *Uploader {
          return &Uploader{endpoint: endpoint}
      }

      func (u *Uploader) Upload(data []byte) error {
          fmt.Printf("uploading %d bytes to %s\n", len(data), u.endpoint)
          return nil
      }
