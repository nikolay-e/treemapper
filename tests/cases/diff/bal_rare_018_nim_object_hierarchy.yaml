name: bal_rare_018_nim_object_hierarchy
tags:
- lang:nim
- change:multi_file
- change:signature
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    src/animal.nim: |
      type
        Animal* = ref object of RootObj
          name*: string
          age*: int

        Dog* = ref object of Animal
          breed*: string

        Cat* = ref object of Animal
          indoor*: bool

      method speak*(a: Animal): string {.base.} =
        "..."

      method speak*(d: Dog): string =
        "Woof!"

      method speak*(c: Cat): string =
        "Meow!"

      proc newDog*(name: string, age: int, breed: string): Dog =
        Dog(name: name, age: age, breed: breed)

      proc newCat*(name: string, age: int, indoor: bool): Cat =
        Cat(name: name, age: age, indoor: indoor)
    src/shelter.nim: |
      import animal

      type
        Shelter* = object
          animals: seq[Animal]

      proc newShelter*(): Shelter =
        Shelter(animals: @[])

      proc adopt*(s: var Shelter, a: Animal) =
        s.animals.add(a)

      proc listAll*(s: Shelter): seq[string] =
        result = @[]
        for a in s.animals:
          result.add(a.name & " says " & a.speak())
    src/main.nim: |
      import animal, shelter

      proc main() =
        var s = newShelter()
        s.adopt(newDog("Rex", 3, "Labrador"))
        s.adopt(newCat("Whiskers", 2, true))
        for desc in s.listAll():
          echo desc

      main()
    garbage_weather.nim: |
      const GARBAGE_RARE_018_API_A = "openweather"
      const GARBAGE_RARE_018_UNITS_B = "metric"

      proc garbage_forecast*() =
        discard GARBAGE_RARE_018_API_A

      const GARBAGE_RARE_018_DAYS_C = 7
    garbage_logger.nim: |
      const GARBAGE_RARE_018_LEVEL_D = "info"
      const GARBAGE_RARE_018_FILE_E = "app.log"

      proc garbage_log*() =
        discard GARBAGE_RARE_018_LEVEL_D

      const GARBAGE_RARE_018_ROTATE_F = true
  changed_files:
    src/animal.nim: |
      type
        Animal* = ref object of RootObj
          name*: string
          age*: int

        Dog* = ref object of Animal
          breed*: string

        Cat* = ref object of Animal
          indoor*: bool

        Bird* = ref object of Animal
          canFly*: bool

      method speak*(a: Animal): string {.base.} =
        "..."

      method speak*(d: Dog): string =
        "Woof!"

      method speak*(c: Cat): string =
        "Meow!"

      method speak*(b: Bird): string =
        if b.canFly: "Tweet!" else: "Squawk!"

      method describe*(a: Animal): string {.base.} =
        a.name & " (age " & $a.age & ")"

      method describe*(d: Dog): string =
        procCall describe(Animal(d)) & " [" & d.breed & "]"

      proc newDog*(name: string, age: int, breed: string): Dog =
        Dog(name: name, age: age, breed: breed)

      proc newCat*(name: string, age: int, indoor: bool): Cat =
        Cat(name: name, age: age, indoor: indoor)

      proc newBird*(name: string, age: int, canFly: bool): Bird =
        Bird(name: name, age: age, canFly: canFly)
    src/shelter.nim: |
      import animal

      type
        Shelter* = object
          animals: seq[Animal]

      proc newShelter*(): Shelter =
        Shelter(animals: @[])

      proc adopt*(s: var Shelter, a: Animal) =
        s.animals.add(a)

      proc listAll*(s: Shelter): seq[string] =
        result = @[]
        for a in s.animals:
          result.add(a.describe() & " says " & a.speak())
    src/main.nim: |
      import animal, shelter

      proc main() =
        var s = newShelter()
        s.adopt(newDog("Rex", 3, "Labrador"))
        s.adopt(newCat("Whiskers", 2, true))
        s.adopt(newBird("Tweety", 1, true))
        for desc in s.listAll():
          echo desc

      main()
    garbage_weather.nim: |
      const GARBAGE_RARE_018_API_A = "openweather"
      const GARBAGE_RARE_018_UNITS_B = "metric"

      proc garbage_forecast*() =
        discard GARBAGE_RARE_018_API_A

      const GARBAGE_RARE_018_DAYS_C = 7
    garbage_logger.nim: |
      const GARBAGE_RARE_018_LEVEL_D = "info"
      const GARBAGE_RARE_018_FILE_E = "app.log"

      proc garbage_log*() =
        discard GARBAGE_RARE_018_LEVEL_D

      const GARBAGE_RARE_018_ROTATE_F = true
  commit_message: "feat: add Bird type and describe method hierarchy"
fragments:
- id: bird_type
  selector:
    path: src/animal.nim
    anchor: "Bird* = ref object of Animal"
- id: bird_speak
  selector:
    path: src/animal.nim
    anchor: "method speak*(b: Bird)"
- id: describe_base
  selector:
    path: src/animal.nim
    anchor: "method describe*(a: Animal)"
- id: new_bird
  selector:
    path: src/animal.nim
    anchor: "proc newBird*"
- id: shelter_uses_describe
  selector:
    path: src/shelter.nim
    anchor: "a.describe()"
- id: main_adopts_bird
  selector:
    path: src/main.nim
    anchor: 'newBird("Tweety"'
- id: no_garbage_weather
  selector:
    path: garbage_weather.nim
- id: no_garbage_logger
  selector:
    path: garbage_logger.nim
- id: no_global_0
  selector:
    anchor: GARBAGE_RARE_018_API_A
- id: no_global_1
  selector:
    anchor: GARBAGE_RARE_018_UNITS_B
- id: no_global_2
  selector:
    anchor: GARBAGE_RARE_018_DAYS_C
- id: no_global_3
  selector:
    anchor: GARBAGE_RARE_018_LEVEL_D
- id: no_global_4
  selector:
    anchor: GARBAGE_RARE_018_FILE_E
- id: no_global_5
  selector:
    anchor: GARBAGE_RARE_018_ROTATE_F
oracle:
  required:
  - bird_type
  - bird_speak
  - describe_base
  - new_bird
  - shelter_uses_describe
  - main_adopts_bird
  allowed: []
  forbidden:
  - no_garbage_weather
  - no_garbage_logger
  - no_global_0
  - no_global_1
  - no_global_2
  - no_global_3
  - no_global_4
  - no_global_5
