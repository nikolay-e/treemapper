    pkg/account/balance.go: |
      package account

      func Balance(id int) float64 {
          return 100.0
      }
    pkg/ledger/entry.go: |
      package ledger

      import "myapp/pkg/account"

      func Debit(id int, amt float64) float64 {
          return account.Balance(id) - amt
      }
    pkg/billing/invoice.go: |
      package billing

      import "myapp/pkg/ledger"

      func Charge(id int, amt float64) float64 {
          return ledger.Debit(id, amt)
      }
