  changed_files:
    src/graphql/schema.ts: |
      import { TypeRegistry } from './type_registry';
      import { Resolver, ResolverContext } from './resolver';

      export class Schema {
          private registry: TypeRegistry;

          constructor() {
              this.registry = new TypeRegistry();
          }

          addType(name: string, fields: Record<string, string>): this {
              this.registry.register(name, fields);
              return this;
          }

          addResolver(typeName: string, fieldName: string, resolver: Resolver): this {
              this.registry.attachResolver(typeName, fieldName, resolver);
              return this;
          }

          addContextualResolver(typeName: string, fieldName: string, resolver: (ctx: ResolverContext) => Resolver): this {
              this.registry.attachContextualResolver(typeName, fieldName, resolver);
              return this;
          }

          build(): string {
              return this.registry.toSDL();
          }
      }
    src/graphql/type_registry.ts: |
      import { Resolver, ResolverContext } from './resolver';

      interface TypeDef {
          fields: Record<string, string>;
          resolvers: Map<string, Resolver>;
          contextualResolvers: Map<string, (ctx: ResolverContext) => Resolver>;
      }

      export class TypeRegistry {
          private types = new Map<string, TypeDef>();

          register(name: string, fields: Record<string, string>): void {
              this.types.set(name, { fields, resolvers: new Map(), contextualResolvers: new Map() });
          }

          attachResolver(typeName: string, fieldName: string, resolver: Resolver): void {
              const type = this.types.get(typeName);
              if (!type) throw new Error(`Type ${typeName} not registered`);
              type.resolvers.set(fieldName, resolver);
          }

          attachContextualResolver(typeName: string, fieldName: string, factory: (ctx: ResolverContext) => Resolver): void {
              const type = this.types.get(typeName);
              if (!type) throw new Error(`Type ${typeName} not registered`);
              type.contextualResolvers.set(fieldName, factory);
          }

          toSDL(): string {
              return Array.from(this.types.entries())
                  .map(([name, def]) => {
                      const fields = Object.entries(def.fields).map(([f, t]) => `  ${f}: ${t}`).join('\n');
                      return `type ${name} {\n${fields}\n}`;
                  })
                  .join('\n\n');
          }
      }
    src/graphql/resolver.ts: |
      export interface ResolverContext {
          userId?: string;
          permissions: string[];
      }

      export type Resolver = (parent: unknown, args: Record<string, unknown>, ctx?: ResolverContext) => unknown;
    src/api/graphql_endpoint.ts: |
      import { Schema } from '../graphql/schema';
      import { ResolverContext } from '../graphql/resolver';

      export class GraphQLEndpoint {
          constructor(private schema: Schema) {}

          getSchemaSDL(): string {
              return this.schema.build();
          }

          createContext(userId?: string, permissions: string[] = []): ResolverContext {
              return { userId, permissions };
          }
      }
    src/telemetry/tracer.ts: |
      export const GARBAGE_BAL3R003_A = 'opentelemetry_tracer';

      export class Tracer {
          startSpan(name: string): { end: () => void } {
              return { end: () => {} };
          }
      }
    src/security/sanitizer.ts: |
      export const GARBAGE_BAL3R003_B = 'graphql_depth_limit';
      export const GARBAGE_BAL3R003_C = 10;

      export function sanitizeQuery(query: string): string { return query.trim(); }
    src/monitoring/metrics.ts: |
      export const GARBAGE_BAL3R003_D = 'graphql_request_counter';

      export class MetricsCollector {
          increment(metric: string): void { console.log(metric); }
      }
