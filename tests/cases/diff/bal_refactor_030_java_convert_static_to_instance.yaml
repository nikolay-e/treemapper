    src/main/java/com/app/security/PasswordHelper.java: |
      package com.app.security;

      import java.security.MessageDigest;
      import java.util.Base64;

      public class PasswordHelper {
          private static final String SALT = "default_salt";

          public static String hash(String password) {
              try {
                  MessageDigest md = MessageDigest.getInstance("SHA-256");
                  md.update((SALT + password).getBytes());
                  return Base64.getEncoder().encodeToString(md.digest());
              } catch (Exception e) {
                  throw new RuntimeException(e);
              }
          }

          public static boolean verify(String password, String hashed) {
              return hash(password).equals(hashed);
          }
      }
    src/main/java/com/app/service/AuthService.java: |
      package com.app.service;

      import com.app.security.PasswordHelper;

      public class AuthService {
          public String register(String username, String password) {
              String hashed = PasswordHelper.hash(password);
              return "registered:" + username + ":" + hashed;
          }

          public boolean login(String password, String storedHash) {
              return PasswordHelper.verify(password, storedHash);
          }
      }
