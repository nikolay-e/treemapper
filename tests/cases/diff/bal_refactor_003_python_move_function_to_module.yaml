repo:
  initial_files:
    core/handlers.py: |
      import json

      def parse_request(raw_body):
          data = json.loads(raw_body)
          if "action" not in data:
              raise KeyError("missing action")
          return data

      def dispatch(action, payload):
          if action == "create":
              return {"status": "created", "data": payload}
          elif action == "delete":
              return {"status": "deleted"}
          return {"status": "unknown"}

      def handle(raw_body):
          data = parse_request(raw_body)
          return dispatch(data["action"], data.get("payload", {}))
    core/router.py: |
      from core.handlers import handle

      class Router:
          def __init__(self):
              self.routes = {}

          def add_route(self, path, handler):
              self.routes[path] = handler

          def process(self, path, body):
              if path in self.routes:
                  return self.routes[path](body)
              return handle(body)
