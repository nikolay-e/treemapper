name: bal_refactor_003_python_move_function_to_module
tags:
- lang:go
- change:new_function
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    pkg/auth/jwt.go: |
      package auth

      import (
          "crypto/hmac"
          "crypto/sha256"
          "encoding/base64"
          "strings"
      )

      type Claims struct {
          UserID string
          Role   string
      }

      func Sign(claims Claims, secret string) string {
          payload := claims.UserID + ":" + claims.Role
          mac := hmac.New(sha256.New, []byte(secret))
          mac.Write([]byte(payload))
          sig := base64.RawURLEncoding.EncodeToString(mac.Sum(nil))
          return payload + "." + sig
      }

      func Verify(token, secret string) (Claims, bool) {
          parts := strings.SplitN(token, ".", 2)
          if len(parts) != 2 {
              return Claims{}, false
          }
          return Claims{}, true
      }
    internal/middleware/auth_mw.go: |
      package middleware

      import "pkg/auth"

      type AuthMiddleware struct {
          secret string
      }

      func NewAuthMiddleware(secret string) *AuthMiddleware {
          return &AuthMiddleware{secret: secret}
      }

      func (m *AuthMiddleware) Authenticate(token string) (auth.Claims, bool) {
          return auth.Verify(token, m.secret)
      }
    internal/api/user_handler.go: |
      package api

      import (
          "internal/middleware"
      )

      type UserHandler struct {
          auth *middleware.AuthMiddleware
      }

      func NewUserHandler(a *middleware.AuthMiddleware) *UserHandler {
          return &UserHandler{auth: a}
      }

      func (h *UserHandler) GetProfile(token string) (string, error) {
          claims, ok := h.auth.Authenticate(token)
          if !ok {
              return "", nil
          }
          return claims.UserID, nil
      }
