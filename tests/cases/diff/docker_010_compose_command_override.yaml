    requirements.txt: |
      schedule==1.2.0
      redis==5.0.0
    Dockerfile: |
      FROM python:3.12-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY *.py ./
      CMD ["python", "worker.py"]
    docker-compose.yml: |
      version: '3.8'

      services:
        worker:
          build:
            context: .
            dockerfile: Dockerfile
          command: ["python", "-u", "worker.py", "--concurrency", "4", "--queue", "high-priority", "--verbose"]
          environment:
            - WORKER_CONCURRENCY=4
            - QUEUE_NAME=high-priority
            - PYTHONUNBUFFERED=1
          restart: always
          stop_grace_period: 30s
          deploy:
            mode: replicated
            replicas: 3
            resources:
              limits:
                cpus: '0.5'
                memory: 256M

        worker-low:
          build:
            context: .
            dockerfile: Dockerfile
          command:
            - python
            - -u
            - worker.py
            - --concurrency
            - "2"
            - --queue
            - low-priority
          environment:
            - PYTHONUNBUFFERED=1
          restart: unless-stopped
          profiles:
            - background

        scheduler:
          build:
            context: .
            dockerfile: Dockerfile
          command: python scheduler.py
          restart: always
          deploy:
            mode: replicated
            replicas: 1

        shell:
          build:
            context: .
            dockerfile: Dockerfile
          entrypoint: ["/bin/sh"]
          command: ["-c", "while true; do sleep 86400; done"]
          stdin_open: true
          tty: true
          profiles:
            - debug

        one-off:
          build:
            context: .
            dockerfile: Dockerfile
          command: ["python", "-c", "print('One-off task completed')"]
          restart: "no"
          profiles:
            - tasks
    scripts/start_worker.sh: |
      #!/bin/bash
      docker-compose up worker
    tests/test_worker.py: |
      def test_process_jobs():
          pass
    docs/workers.md: |
      # Worker Configuration
    k8s/job.yaml: |
      apiVersion: batch/v1
    celery/config.py: ''
  commit_message: Update files
fragments:
- id: docker_compose_file
  selector:
    path: docker-compose.yml
- id: dockerfile_build_context
  selector:
    anchor: 'dockerfile: Dockerfile'
- id: worker_concurrency_arg
  selector:
    path: worker.py
    anchor: '--concurrency", type=int'
- id: worker_queue_arg
  selector:
    path: worker.py
    anchor: '--queue", type=str'
- id: worker_env_vars
  selector:
    path: worker.py
    anchor: 'CONCURRENCY = int(os.getenv("WORKER_CONCURRENCY"'
- id: scheduler_run
  selector:
    path: scheduler.py
    anchor: "def run_scheduler"
- id: no_k8s_job
  selector:
    path: k8s/job.yaml
    anchor: "apiVersion: batch/v1"
- id: no_test_worker
  selector:
    path: tests/test_worker.py
    anchor: "def test_process_jobs"
- id: no_start_script
  selector:
    path: scripts/start_worker.sh
    anchor: "docker-compose up worker"
oracle:
  required:
  - docker_compose_file
  - dockerfile_build_context
  - worker_concurrency_arg
  - worker_queue_arg
  - worker_env_vars
  - scheduler_run
  allowed: []
  forbidden:
  - no_k8s_job
  - no_test_worker
  - no_start_script
