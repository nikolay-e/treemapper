      from flask import Flask, jsonify, request
      from src.analytics.service import AnalyticsService
      from src.auth import require_auth
      from src.database import get_session

      app = Flask(__name__)

      @app.route("/api/analytics/<int:user_id>/daily")
      @require_auth
      def get_daily_analytics(user_id: int):
          date = request.args.get("date")
          if not date:
              return jsonify({"error": "date parameter required"}), 400
          service = AnalyticsService(user_id)
          summary = service.get_daily_summary(date)
          return jsonify(summary)

      @app.route("/api/analytics/<int:user_id>/weekly")
      @require_auth
      def get_weekly_analytics(user_id: int):
          start = request.args.get("start")
          end = request.args.get("end")
          if not start or not end:
              return jsonify({"error": "start and end parameters required"}), 400
          service = AnalyticsService(user_id)
          report = service.get_weekly_report(start, end)
          return jsonify(report)

      @app.route("/api/analytics/<int:user_id>/metrics")
      @require_auth
      def list_metrics(user_id: int):
          service = AnalyticsService(user_id)
          metrics = service.list_available_metrics()
          return jsonify({"metrics": metrics})

      @app.route("/health")
      def health_check():
          return jsonify({"status": "healthy"})
    src/analytics/formatters.py: |
      from typing import Dict, List
      from datetime import datetime

      class MetricFormatter:
          def __init__(self, locale: str = "en"):
              self.locale = locale

          def format_metric_value(self, value: float, unit: str) -> str:
              if unit == "steps":
                  return f"{int(value):,}"
              if unit == "calories":
                  return f"{int(value):,} kcal"
              if unit == "hours":
                  hours = int(value)
                  minutes = int((value - hours) * 60)
                  return f"{hours}h {minutes}m"
              return f"{value:.2f} {unit}"

          def format_date_range(self, start: datetime, end: datetime) -> str:
              return f"{start.strftime('%Y-%m-%d')} to {end.strftime('%Y-%m-%d')}"

          def format_summary_table(self, summaries: List[Dict]) -> str:
              lines = ["Date | Mean | Count", "--- | --- | ---"]
              for s in summaries:
                  date = s.get("date", "N/A")
                  mean = s.get("mean", 0)
                  count = s.get("count", 0)
                  lines.append(f"{date} | {mean:.2f} | {count}")
              return "\n".join(lines)
    src/analytics/export.py: |
      import csv
      import json
      from typing import Dict, List, IO
      from datetime import datetime

      class DataExporter:
          def __init__(self, date_format: str = "%Y-%m-%d"):
              self.date_format = date_format

          def to_csv(self, records: List[Dict], output: IO) -> None:
              if not records:
                  return
              writer = csv.DictWriter(output, fieldnames=records[0].keys())
              writer.writeheader()
              writer.writerows(records)

          def to_json(self, records: List[Dict], output: IO, indent: int = 2) -> None:
              json.dump({"exported_at": datetime.utcnow().isoformat(), "records": records}, output, indent=indent)

          def to_summary_csv(self, summaries: List[Dict], output: IO) -> None:
              writer = csv.writer(output)
              writer.writerow(["date", "mean", "count", "min", "max"])
              for s in summaries:
                  writer.writerow([s.get("date"), s.get("mean"), s.get("count"), s.get("min"), s.get("max")])
