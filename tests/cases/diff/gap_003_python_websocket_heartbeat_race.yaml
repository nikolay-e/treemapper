      class ConnectionMetrics:
          def __init__(self):
              self.messages_sent = 0
              self.messages_received = 0
              self.bytes_transferred = 0

          def record_send(self, size: int) -> None:
              self.messages_sent += 1
              self.bytes_transferred += size

          def record_receive(self, size: int) -> None:
              self.messages_received += 1
              self.bytes_transferred += size
  changed_files:
    realtime/connection.py: |
      import asyncio
      from realtime.protocol import encode_frame, FrameType

      class WebSocketConnection:
          def __init__(self, writer: asyncio.StreamWriter):
              self._writer = writer
              self._alive = True
              self._write_lock = asyncio.Lock()

          async def send(self, payload: bytes) -> None:
              frame = encode_frame(FrameType.DATA, payload)
              async with self._write_lock:
                  self._writer.write(frame)
                  await self._writer.drain()

          async def heartbeat(self, interval: float = 30.0) -> None:
              while self._alive:
                  await asyncio.sleep(interval)
                  ping = encode_frame(FrameType.PING, b"")
                  async with self._write_lock:
                      self._writer.write(ping)
                      await self._writer.drain()

          async def close(self) -> None:
              self._alive = False
              async with self._write_lock:
                  close_frame = encode_frame(FrameType.CLOSE, b"")
                  self._writer.write(close_frame)
                  await self._writer.drain()
              self._writer.close()
