      import asyncio
      from realtime.protocol import encode_frame, FrameType

      class WebSocketConnection:
          def __init__(self, writer: asyncio.StreamWriter):
              self._writer = writer
              self._alive = True

          async def send(self, payload: bytes) -> None:
              frame = encode_frame(FrameType.DATA, payload)
              self._writer.write(frame)
              await self._writer.drain()

          async def heartbeat(self, interval: float = 30.0) -> None:
              while self._alive:
                  await asyncio.sleep(interval)
                  ping = encode_frame(FrameType.PING, b"")
                  self._writer.write(ping)
                  await self._writer.drain()

          async def close(self) -> None:
              self._alive = False
              self._writer.close()
    realtime/protocol.py: |
      import struct
      from enum import IntEnum

      class FrameType(IntEnum):
          DATA = 0x01
          PING = 0x02
          PONG = 0x03
          CLOSE = 0x04

      def encode_frame(frame_type: FrameType, payload: bytes) -> bytes:
          header = struct.pack("!BH", frame_type, len(payload))
          return header + payload

      def decode_frame(data: bytes) -> tuple[FrameType, bytes]:
          ft, length = struct.unpack("!BH", data[:3])
          return FrameType(ft), data[3:3 + length]
