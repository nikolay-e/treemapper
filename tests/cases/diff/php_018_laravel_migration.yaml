repo:
  initial_files:
    Blueprint.php: |
      <?php
      class Blueprint {
          private array $columns = [];

          public function id(): self {
              $this->columns[] = ['name' => 'id', 'type' => 'bigint'];
              return $this;
          }

          public function string(string $name, int $length = 255): self {
              $this->columns[] = ['name' => $name, 'type' => 'string', 'length' => $length];
              return $this;
          }

          public function unique(): self {
              return $this;
          }

          public function timestamps(): self {
              $this->columns[] = ['name' => 'created_at', 'type' => 'timestamp'];
              $this->columns[] = ['name' => 'updated_at', 'type' => 'timestamp'];
              return $this;
          }
      }
    CreateUsersTable.php: |
      <?php
      class CreateUsersTable {}
    CreatePostsTable.php: |
      <?php
      require_once 'Blueprint.php';

      class CreatePostsTable {
          public function up(): void {
              $table = new Blueprint();
              $table->id();
              $table->string('title');
              $table->string('slug')->unique();
              $table->timestamps();
          }
      }
    SchemaBuilder.php: |
      <?php
      class SchemaBuilder {
          public function create(string $tableName, callable $callback): void {
              $blueprint = new Blueprint();
              $callback($blueprint);
          }

          public function table(string $tableName): Blueprint {
              return new Blueprint();
          }

          public function drop(string $tableName): void {}
      }
