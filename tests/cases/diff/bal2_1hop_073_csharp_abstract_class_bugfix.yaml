  changed_files:
    src/Pricing/PricingStrategy.cs: |
      using System;

      namespace App.Pricing
      {
          public abstract class PricingStrategy
          {
              public abstract decimal CalculatePrice(decimal basePrice, int quantity);

              public decimal ApplyDiscount(decimal price, decimal discountPercent)
              {
                  if (discountPercent < 0 || discountPercent > 100)
                      throw new ArgumentOutOfRangeException(nameof(discountPercent));
                  return Math.Round(price * (1 - discountPercent / 100), 2, MidpointRounding.AwayFromZero);
              }

              public decimal ApplyMinimumPrice(decimal price, decimal minimumPrice)
              {
                  return Math.Max(price, minimumPrice);
              }
          }
      }
  commit_message: "Fix discount validation and rounding in pricing strategy"
