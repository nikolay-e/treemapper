    src/Pricing/PricingStrategy.cs: |
      using System;

      namespace App.Pricing
      {
          public abstract class PricingStrategy
          {
              public abstract decimal CalculatePrice(decimal basePrice, int quantity);

              public decimal ApplyDiscount(decimal price, decimal discountPercent)
              {
                  return price * (1 - discountPercent / 100);
              }
          }
      }
    src/Pricing/BulkPricing.cs: |
      using System;
      using App.Pricing;

      namespace App.Pricing
      {
          public class BulkPricing : PricingStrategy
          {
              public override decimal CalculatePrice(decimal basePrice, int quantity)
              {
                  var total = basePrice * quantity;
                  if (quantity > 100)
                      total = ApplyDiscount(total, 15);
                  else if (quantity > 50)
                      total = ApplyDiscount(total, 10);
                  return total;
              }
          }
      }
    src/Pricing/TieredPricing.cs: |
      using System;
      using App.Pricing;

      namespace App.Pricing
      {
          public class TieredPricing : PricingStrategy
          {
              public override decimal CalculatePrice(decimal basePrice, int quantity)
              {
                  decimal total = 0;
                  for (int i = 0; i < quantity; i++)
                  {
                      var tier = i < 10 ? 1.0m : i < 50 ? 0.9m : 0.8m;
                      total += basePrice * tier;
                  }
                  return total;
              }
          }
      }
    src/Services/QuoteService.cs: |
      using System;
      using App.Pricing;

      namespace App.Services
      {
          public class QuoteService
          {
              private readonly PricingStrategy _strategy;

              public QuoteService(PricingStrategy strategy)
              {
                  _strategy = strategy;
              }

              public decimal GenerateQuote(decimal unitPrice, int quantity)
              {
                  return _strategy.CalculatePrice(unitPrice, quantity);
              }
          }
      }
