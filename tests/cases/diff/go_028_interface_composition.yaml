    pkg/io/interfaces.go: |
      package io

      type Reader interface {
          Read(p []byte) (n int, err error)
      }

      type Writer interface {
          Write(p []byte) (n int, err error)
      }

      type Closer interface {
          Close() error
      }

      type Flusher interface {
          Flush() error
      }

      type ReadWriter interface {
          Reader
          Writer
      }

      type ReadWriteCloser interface {
          Reader
          Writer
          Closer
      }
    pkg/io/file.go: |
      package io

      import "os"

      type File struct {
          path string
          mode os.FileMode
          fd   *os.File
      }

      func OpenFile(path string, mode os.FileMode) (*File, error) {
          fd, err := os.OpenFile(path, os.O_RDWR, mode)
          if err != nil {
              return nil, err
          }
          return &File{path: path, mode: mode, fd: fd}, nil
      }

      func (f *File) Path() string {
          return f.path
      }

      func (f *File) Mode() os.FileMode {
          return f.mode
      }

      func (f *File) Read(p []byte) (int, error) {
          return f.fd.Read(p)
      }

      func (f *File) Write(p []byte) (int, error) {
          return f.fd.Write(p)
      }

      func (f *File) Close() error {
          return f.fd.Close()
      }

      func ProcessReadWriteCloser(rwc ReadWriteCloser) error {
          defer rwc.Close()
          buf := make([]byte, 4096)
          n, err := rwc.Read(buf)
          if err != nil {
              return err
          }
          _, err = rwc.Write(buf[:n])
          return err
      }
