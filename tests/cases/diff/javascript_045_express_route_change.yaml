name: javascript_045_express_route_change
repo:
  initial_files:
    routes.ts: |
      import { Router } from 'express';

      export const userRouter = Router();

      userRouter.get('/:id', (req, res) => {
          res.json({ id: req.params.id });
      });
    middleware.ts: |
      import { userRouter } from './routes';

      export function setupRoutes(app: any) {
          app.use('/users', userRouter);
      }
    auth-middleware.ts: |
      import { Request, Response, NextFunction } from 'express';

      export function requireAuth(req: Request, res: Response, next: NextFunction) {
          const token = req.headers.authorization;
          if (!token) return res.status(401).json({ error: 'Unauthorized' });
          next();
      }

      export function requireAdmin(req: Request, res: Response, next: NextFunction) {
          const role = (req as any).user?.role;
          if (role !== 'admin') return res.status(403).json({ error: 'Forbidden' });
          next();
      }
    user-validator.ts: |
      export function validateUserBody(body: unknown): { valid: boolean; errors: string[] } {
          const errors: string[] = [];
          if (!body || typeof body !== 'object') return { valid: false, errors: ['Body required'] };
          const obj = body as Record<string, unknown>;
          if (!obj.name) errors.push('Name required');
          if (!obj.email) errors.push('Email required');
          return { valid: errors.length === 0, errors };
      }
  changed_files:
    routes.ts: |
      import { Router } from 'express';

      export const userRouter = Router();

      userRouter.get('/:id', (req, res) => {
          res.json({ id: req.params.id });
      });

      userRouter.post('/', (req, res) => {
          res.status(201).json(req.body);
      });

      userRouter.delete('/:id', (req, res) => {
          res.status(204).send();
      });
    middleware.ts: |
      import { userRouter } from './routes';

      export function setupRoutes(app: any) {
          app.use('/users', userRouter);
      }
    auth-middleware.ts: |
      import { Request, Response, NextFunction } from 'express';

      export function requireAuth(req: Request, res: Response, next: NextFunction) {
          const token = req.headers.authorization;
          if (!token) return res.status(401).json({ error: 'Unauthorized' });
          next();
      }

      export function requireAdmin(req: Request, res: Response, next: NextFunction) {
          const role = (req as any).user?.role;
          if (role !== 'admin') return res.status(403).json({ error: 'Forbidden' });
          next();
      }
    user-validator.ts: |
      export function validateUserBody(body: unknown): { valid: boolean; errors: string[] } {
          const errors: string[] = [];
          if (!body || typeof body !== 'object') return { valid: false, errors: ['Body required'] };
          const obj = body as Record<string, unknown>;
          if (!obj.name) errors.push('Name required');
          if (!obj.email) errors.push('Email required');
          return { valid: errors.length === 0, errors };
      }
  commit_message: Update files
