  changed_files:
    src/main/scala/auth/PasswordHasher.scala: |
      package auth

      import java.security.MessageDigest
      import java.util.Base64

      object PasswordHasher {
        private val algorithm = "SHA-256"

        def hash(password: String): String = {
          val salt = java.util.UUID.randomUUID().toString.take(16)
          val digest = MessageDigest.getInstance(algorithm)
          val hashed = digest.digest((salt + password).getBytes("UTF-8"))
          s"$salt:${Base64.getEncoder.encodeToString(hashed)}"
        }

        def verify(password: String, hashed: String): Boolean = {
          val parts = hashed.split(":")
          if (parts.length != 2) return false
          val salt = parts(0)
          val digest = MessageDigest.getInstance(algorithm)
          val computed = digest.digest((salt + password).getBytes("UTF-8"))
          Base64.getEncoder.encodeToString(computed) == parts(1)
        }

        def needsRehash(hashed: String): Boolean = {
          !hashed.contains(":")
        }
      }
  commit_message: "Fix insecure hashing to use SHA-256 with salt"
