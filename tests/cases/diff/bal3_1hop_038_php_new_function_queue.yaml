  changed_files:
    src/Queue/MessageQueue.php: |
      <?php
      namespace App\Queue;

      class MessageQueue
      {
          private array $messages = [];
          private array $deadLetters = [];

          public function push(string $channel, array $message): void
          {
              $this->messages[$channel][] = $message;
          }

          public function pop(string $channel): ?array
          {
              if (empty($this->messages[$channel])) {
                  return null;
              }
              return array_shift($this->messages[$channel]);
          }

          public function pushDeadLetter(string $channel, array $message, string $reason): void
          {
              $this->deadLetters[$channel][] = [
                  'message' => $message,
                  'reason' => $reason,
                  'timestamp' => time(),
              ];
          }

          public function getDeadLetters(string $channel): array
          {
              return $this->deadLetters[$channel] ?? [];
          }

          public function size(string $channel): int
          {
              return count($this->messages[$channel] ?? []);
          }
      }
  commit_message: "Add dead letter queue and size method to MessageQueue"
