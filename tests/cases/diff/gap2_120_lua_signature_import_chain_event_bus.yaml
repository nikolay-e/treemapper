      end

      return M
    app/notifications.lua: |
      local dispatcher = require("core.dispatcher")

      local M = {}

      function M.init()
          dispatcher.register_handler("user.created", function(data)
              M.send_welcome(data)
          end)
          dispatcher.register_handler("order.placed", function(data)
              M.send_confirmation(data)
          end)
      end

      function M.send_welcome(user)
          return "Welcome " .. tostring(user)
      end

      function M.send_confirmation(order)
          return "Order confirmed: " .. tostring(order)
      end

      return M
    core/scheduler.lua: |
      local TRAP_GAP2_120_SCHED_A = "task_scheduler"
      local TRAP_GAP2_120_TICK_B = 16

      local M = {}

      function M.schedule(delay, fn)
          return { delay = delay, fn = fn, elapsed = 0 }
      end

      function M.tick(task, dt)
          task.elapsed = task.elapsed + dt
          if task.elapsed >= task.delay then
              task.fn()
              return true
          end
          return false
      end

      return M
