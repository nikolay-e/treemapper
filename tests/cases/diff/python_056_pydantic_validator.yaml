    api.py: |
      from typing import Any
      from schemas import UserCreate, UserUpdate

      def register(data: dict[str, Any]) -> dict[str, Any]:
          user = UserCreate(**data)
          return {"id": 1, **user.dict()}

      def update_profile(user_id: int, data: dict[str, Any]) -> dict[str, Any]:
          update = UserUpdate(**data)
          changes = update.dict(exclude_unset=True)
          return {"id": user_id, **changes}

      def get_profile(user_id: int) -> dict[str, Any]:
          return {"id": user_id, "name": "Test", "email": "test@example.com"}
