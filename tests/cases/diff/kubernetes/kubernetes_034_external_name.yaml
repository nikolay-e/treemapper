# Scenario: Service for external DB changes from ClusterIP with empty endpoints
#   to ExternalName pointing at an RDS hostname. Only service-db.yaml is changed.
#
# Diff shows:
#   - type: ClusterIP with port 5432 and no endpoints
#   + type: ExternalName with externalName: mydb.abc123xyz.us-east-1.rds.amazonaws.com
#   + annotation describing the external service
#
# Reviewer questions:
#   Q1: "Which deployment references this service for database connectivity?"
#       -> Needs k8s/base/deployment.yaml: backend-service has env
#          DATABASE_URL = postgresql://external-db.production.svc.cluster.local:5432/mydb
#          pointing at the exact service being changed. The reviewer must verify
#          this DNS name still resolves correctly with ExternalName type (it will —
#          ExternalName returns a CNAME for the service DNS entry).
#
#   Q2: "Does the port mapping still work with ExternalName?"
#       -> ExternalName services don't actually proxy traffic through a port —
#          they return a CNAME DNS record. The ports field is informational only.
#          The reviewer must verify the app connects directly to the resolved
#          hostname on port 5432, which it does via the DATABASE_URL.
#
#   Q3: "Are there other consumers of this service besides the backend deployment?"
#       -> Needs k8s/jobs/db-migration.yaml: CronJob that also references
#          external-db.production.svc.cluster.local for schema migrations.
#          Both consumers must continue working after the type change.
#
# Not needed for comprehension:
#   - k8s/base/configmap.yaml: Backend config with LOG_LEVEL and POOL_SIZE.
#     Same namespace, same app domain. But configuration values don't help
#     review the service type change.
#
#   - k8s/iac/crossplane-composition.yaml: Crossplane Composition defining
#     an RDS PostgreSQL instance. HARD TRAP: the ExternalName points to an
#     RDS hostname, and this Crossplane resource provisions RDS with the same
#     engine (postgres) and the same region (us-east-1). But understanding
#     infrastructure-as-code doesn't help review the K8s service configuration.
#     Different abstraction layer.
#
#   - k8s/iac/terraform-state.yaml: Terraform backend config with S3 state
#     storing production/rds/terraform.tfstate. Shares "RDS" and "production"
#     vocabulary. But Terraform state management is completely unrelated to
#     K8s service type changes.
#
#   - k8s/base/service.yaml: The backend-service itself (not the DB service).
#     HARD TRAP: same namespace (production), same directory (k8s/base/),
#     same Kind (Service). A sibling service for the application's HTTP port.
#     But its port mapping (80->8080) is for the application, not the database.
#     Including it confuses which service is being reviewed.
#
#   - k8s/monitoring/postgres-exporter.yaml: Prometheus exporter for PostgreSQL
#     metrics. HARD TRAP: directly references port 5432 and postgres vocabulary,
#     and monitors the very database the ExternalName points to. But monitoring
#     configuration doesn't help review whether the service type change is correct.
#
#   - k8s/base/networkpolicy-db.yaml: NetworkPolicy allowing egress to port 5432
#     from backend pods. Shares exact port number and namespace. But network
#     policy rules don't affect whether ExternalName resolves correctly.

initial:
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backend-service
      namespace: production
      labels:
        app: backend-service
        tier: backend
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: backend-service
      template:
        metadata:
          labels:
            app: backend-service
            tier: backend
        spec:
          containers:
          - name: backend
            image: registry.example.com/backend-service:v1.2.0
            ports:
            - containerPort: 8080
              name: http
            env:
            - name: DATABASE_URL
              value: "postgresql://external-db.production.svc.cluster.local:5432/mydb"
            - name: REDIS_URL
              value: "redis://cache.internal.svc.cluster.local:6379"
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: backend-service
      namespace: production
    spec:
      selector:
        app: backend-service
      ports:
      - name: http
        port: 80
        targetPort: 8080
  k8s/base/service-db.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: external-db
      namespace: production
      labels:
        app: external-db
        type: external
    spec:
      type: ClusterIP
      ports:
      - name: postgres
        port: 5432
        targetPort: 5432
  k8s/jobs/db-migration.yaml: |
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: db-migration
      namespace: production
    spec:
      schedule: "0 3 * * *"
      jobTemplate:
        spec:
          template:
            spec:
              containers:
              - name: migrate
                image: registry.example.com/db-migrator:v1.0.0
                env:
                - name: DATABASE_URL
                  value: "postgresql://external-db.production.svc.cluster.local:5432/mydb"
                - name: MIGRATION_DIR
                  value: "/migrations"
              restartPolicy: OnFailure
  k8s/base/configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: backend-config
      namespace: production
    data:
      LOG_LEVEL: info
      POOL_SIZE: "10"
      TIMEOUT: "30"
  k8s/iac/crossplane-composition.yaml: |
    apiVersion: apiextensions.crossplane.io/v1
    kind: Composition
    metadata:
      name: rds-postgres-composition
    spec:
      compositeTypeRef:
        apiVersion: database.example.com/v1alpha1
        kind: PostgreSQLInstance
      resources:
      - name: rds-instance
        base:
          apiVersion: rds.aws.crossplane.io/v1alpha1
          kind: DBInstance
          spec:
            forProvider:
              engine: postgres
              engineVersion: "15.4"
              instanceClass: db.r6g.large
              dbName: mydb
  k8s/iac/terraform-state.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: terraform-backend-config
      namespace: terraform
    data:
      backend.tf: |
        terraform {
          backend "s3" {
            bucket = "mycompany-tfstate"
            key    = "production/rds/terraform.tfstate"
            region = "us-east-1"
          }
        }
  k8s/monitoring/postgres-exporter.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: postgres-exporter
      namespace: monitoring
      labels:
        app: postgres-exporter
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: postgres-exporter
      template:
        spec:
          containers:
          - name: exporter
            image: prometheuscommunity/postgres-exporter:v0.15.0
            ports:
            - containerPort: 9187
              name: metrics
            env:
            - name: DATA_SOURCE_NAME
              value: "postgresql://monitor:monitor@external-db.production.svc.cluster.local:5432/mydb?sslmode=require"
  k8s/base/networkpolicy-db.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: NetworkPolicy
    metadata:
      name: allow-db-egress
      namespace: production
    spec:
      podSelector:
        matchLabels:
          app: backend-service
      policyTypes:
      - Egress
      egress:
      - to:
        - ipBlock:
            cidr: 10.0.0.0/8
        ports:
        - protocol: TCP
          port: 5432

