must_include_files:
  - k8s/base/service-db.yaml
  # Q1: deployment references external-db.production.svc.cluster.local in DATABASE_URL.
  # Reviewer must verify the ExternalName DNS behavior doesn't break this connection.
  - k8s/base/deployment.yaml
  # Q3: CronJob also references external-db.production.svc.cluster.local.
  # Both consumers must continue working after the type change.
  - k8s/jobs/db-migration.yaml

must_include_content_from:
  k8s/base/service-db.yaml:
    - "type: ExternalName"
    - "mydb.abc123xyz.us-east-1.rds.amazonaws.com"
  k8s/base/deployment.yaml:
    - "external-db.production.svc.cluster.local"
  k8s/jobs/db-migration.yaml:
    - "external-db.production.svc.cluster.local"

must_not_include:
  # --- configmap: app config, no service type dependency ---
  - POOL_SIZE
  - "TIMEOUT"
  # --- crossplane: HARD TRAP — provisions the RDS instance the
  #     ExternalName points to, same engine (postgres), same dbName (mydb).
  #     But understanding IaC provisioning doesn't help review the K8s
  #     service configuration. Different abstraction layer. ---
  - rds-postgres-composition
  - PostgreSQLInstance
  - "db.r6g.large"
  # --- terraform state: infrastructure state management, shares RDS vocab ---
  - terraform-backend-config
  - mycompany-tfstate
  - "terraform.tfstate"
  # --- postgres-exporter: HARD TRAP — directly references
  #     external-db.production.svc.cluster.local:5432/mydb in DATA_SOURCE_NAME,
  #     exact same service being changed. But monitoring config doesn't help
  #     review whether ExternalName resolves correctly. ---
  - postgres-exporter
  - DATA_SOURCE_NAME
  - "containerPort: 9187"
  # --- networkpolicy: HARD TRAP — same namespace (production), same pod selector
  #     (backend-service), same port (5432). But network policy egress rules
  #     don't affect whether ExternalName DNS resolution works. ---
  - allow-db-egress
  - NetworkPolicy
  - "cidr: 10.0.0.0/8"
  # --- backend-service Service: sibling Service in same directory, same namespace.
  #     Different resource (HTTP app port, not DB). ---
  - "targetPort: 8080"

must_not_include_files:
  - k8s/base/configmap.yaml
  - k8s/iac/crossplane-composition.yaml
  - k8s/iac/terraform-state.yaml
  - k8s/monitoring/postgres-exporter.yaml
  - k8s/base/networkpolicy-db.yaml

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
