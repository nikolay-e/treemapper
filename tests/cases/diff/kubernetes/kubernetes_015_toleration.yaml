# Scenario: Critical-service deployment adds tolerations for dedicated nodes,
#   critical-workloads, and not-ready conditions. Only
#   k8s/apps/critical/deployment.yaml is changed.
#
# Diff shows:
#   + toleration: dedicated=high-priority:NoSchedule
#   + toleration: critical-workloads:NoExecute with tolerationSeconds: 3600
#   + toleration: node.kubernetes.io/not-ready:NoExecute with tolerationSeconds: 300
#
# Reviewer questions:
#   Q1: "Is tolerationSeconds=3600 too long for critical-workloads NoExecute?"
#       -> Pure config review: 3600s = 1 hour. Pod stays on a tainted node
#          for 1 hour before eviction. For a "critical" service, this is
#          a long time to run on a problematic node.
#
#   Q2: "Does the dedicated=high-priority taint actually exist on nodes?"
#       -> Needs to verify node taints, but that's runtime state.
#          The taint-manager CronJob applies this exact taint.
#
# Not needed for comprehension:
#   - k8s/infra/taint-manager.yaml: CronJob that runs kubectl taint with
#     "dedicated=high-priority:NoSchedule". Direct structural edge: applies
#     the EXACT taint being tolerated. HARDEST TRAP: the toleration key
#     "dedicated" with value "high-priority" directly references the taint
#     this CronJob manages. But the reviewer can evaluate tolerations purely
#     from the deployment config — whether tolerationSeconds values are
#     appropriate doesn't depend on how taints are applied.
#
#   - k8s/apps/critical/pdb.yaml: PDB selecting app: critical-service with
#     minAvailable: 2. Shares same label selector and "critical" naming.
#     But PDB controls disruption budgets during node drains, not toleration
#     behavior. Different scheduling concern entirely.
initial:
  k8s/apps/critical/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: critical-service
      namespace: production
      labels:
        app: critical-service
        priority: high
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: critical-service
      template:
        metadata:
          labels:
            app: critical-service
            priority: high
        spec:
          containers:
          - name: service
            image: critical-service:v1.0.0
            ports:
            - containerPort: 8080
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
            livenessProbe:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 5
  k8s/apps/critical/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: critical-service
      namespace: production
    spec:
      selector:
        app: critical-service
      ports:
      - port: 80
        targetPort: 8080
  k8s/infra/taint-manager.yaml: |
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: taint-manager
      namespace: kube-system
    spec:
      schedule: "*/30 * * * *"
      jobTemplate:
        spec:
          template:
            spec:
              serviceAccountName: taint-manager-sa
              containers:
              - name: taint-manager
                image: bitnami/kubectl:1.28
                command:
                - /bin/sh
                - -c
                - kubectl taint nodes --selector=dedicated=high-priority dedicated=high-priority:NoSchedule --overwrite
              restartPolicy: Never
  k8s/apps/critical/pdb.yaml: |
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: critical-service-pdb
      namespace: production
    spec:
      minAvailable: 2
      selector:
        matchLabels:
          app: critical-service
changed:
  k8s/apps/critical/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: critical-service
      namespace: production
      labels:
        app: critical-service
        priority: high
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: critical-service
      template:
        metadata:
          labels:
            app: critical-service
            priority: high
        spec:
          tolerations:
          - key: "dedicated"
            operator: "Equal"
            value: "high-priority"
            effect: "NoSchedule"
          - key: "critical-workloads"
            operator: "Exists"
            effect: "NoExecute"
            tolerationSeconds: 3600
          - key: "node.kubernetes.io/not-ready"
            operator: "Exists"
            effect: "NoExecute"
            tolerationSeconds: 300
          containers:
          - name: service
            image: critical-service:v1.0.0
            ports:
            - containerPort: 8080
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
            livenessProbe:
              httpGet:
                path: /health
                port: 8080
              initialDelaySeconds: 10
              periodSeconds: 5
  k8s/apps/critical/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: critical-service
      namespace: production
    spec:
      selector:
        app: critical-service
      ports:
      - port: 80
        targetPort: 8080
  k8s/infra/taint-manager.yaml: |
    apiVersion: batch/v1
    kind: CronJob
    metadata:
      name: taint-manager
      namespace: kube-system
    spec:
      schedule: "*/30 * * * *"
      jobTemplate:
        spec:
          template:
            spec:
              serviceAccountName: taint-manager-sa
              containers:
              - name: taint-manager
                image: bitnami/kubectl:1.28
                command:
                - /bin/sh
                - -c
                - kubectl taint nodes --selector=dedicated=high-priority dedicated=high-priority:NoSchedule --overwrite
              restartPolicy: Never
  k8s/apps/critical/pdb.yaml: |
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: critical-service-pdb
      namespace: production
    spec:
      minAvailable: 2
      selector:
        matchLabels:
          app: critical-service
must_include_files:
- k8s/apps/critical/deployment.yaml
must_include_content_from:
  k8s/apps/critical/deployment.yaml:
    - 'key: "dedicated"'
    - 'tolerationSeconds: 3600'
    - 'tolerationSeconds: 300'
    - 'node.kubernetes.io/not-ready'
must_not_include:
  # --- taint-manager.yaml: applies exact taint being tolerated ---
  - taint-manager
  - taint-manager-sa
  - "bitnami/kubectl"
  # --- pdb.yaml: same app label, different scheduling concern ---
  - critical-service-pdb
  - PodDisruptionBudget
  - "minAvailable: 2"
must_not_include_files:
  - k8s/infra/taint-manager.yaml
  - k8s/apps/critical/pdb.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
