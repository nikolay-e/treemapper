# Scenario: ML training deployment adds nodeSelector to target GPU nodes
#   with A100 accelerators and GPU resource requests. Only
#   k8s/ml/training-job.yaml is changed.
#
# Diff shows:
#   + nodeSelector: accelerator: nvidia-tesla-a100, gpu-memory: "80gb",
#     instance-type: p4d.24xlarge
#   + nvidia.com/gpu: "8" in requests and limits
#
# Reviewer questions:
#   Q1: "Are A100 nodes labeled with these exact label keys and values?"
#       -> Runtime verification needed. The nodeSelector requires nodes to
#          have all three labels. If any label is missing or misspelled,
#          the pod will be unschedulable.
#
#   Q2: "Is requesting 8 GPUs reasonable for a single training job?"
#       -> Pure config review: p4d.24xlarge has 8 A100 GPUs. Requesting
#          all 8 means exclusive node access. Correct for distributed training.
#
# Not needed for comprehension:
#   - k8s/ml/model-serving.yaml: Model serving deployment in same namespace
#     (ml-workloads) using pytorch/torchserve. Shares ML domain vocabulary
#     (pytorch, models). But model serving has different resource needs and
#     doesn't need GPU node selection. Its config doesn't help review
#     whether the training nodeSelector labels are correct.
#
#   - k8s/infra/gpu-device-plugin.yaml: NVIDIA device plugin DaemonSet with
#     toleration for nvidia.com/gpu taint. Direct structural edge: the
#     device plugin enables the nvidia.com/gpu resource that the diff
#     requests. HARDEST TRAP: without the device plugin, the GPU resource
#     request would fail. But the plugin's existence is an infrastructure
#     prerequisite — its DaemonSet config doesn't help review whether
#     the nodeSelector labels match actual node labels.
max_enrichment: 13.2
initial:
  k8s/ml/training-job.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ml-training
      namespace: ml-workloads
      labels:
        app: ml-training
        workload-type: gpu-intensive
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: ml-training
      template:
        metadata:
          labels:
            app: ml-training
            workload-type: gpu-intensive
        spec:
          containers:
          - name: trainer
            image: pytorch/pytorch:2.0.1-cuda11.7-cudnn8-runtime
            command: ["python", "train.py"]
            env:
            - name: MODEL_NAME
              value: "gpt-finetune"
            - name: BATCH_SIZE
              value: "32"
            resources:
              requests:
                memory: "16Gi"
                cpu: "4"
              limits:
                memory: "32Gi"
                cpu: "8"
  k8s/ml/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: ml-training-metrics
      namespace: ml-workloads
    spec:
      selector:
        app: ml-training
      ports:
      - name: metrics
        port: 9090
        targetPort: 9090
  k8s/ml/model-serving.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: model-serving
      namespace: ml-workloads
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: model-serving
      template:
        metadata:
          labels:
            app: model-serving
        spec:
          containers:
          - name: serving
            image: pytorch/torchserve:0.8.0
            ports:
            - containerPort: 8080
            - containerPort: 8081
            env:
            - name: MODEL_STORE
              value: "/models"
  k8s/infra/gpu-device-plugin.yaml: |
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: nvidia-device-plugin
      namespace: kube-system
    spec:
      selector:
        matchLabels:
          name: nvidia-device-plugin
      template:
        spec:
          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          containers:
          - name: nvidia-device-plugin
            image: nvcr.io/nvidia/k8s-device-plugin:v0.14.1
            securityContext:
              allowPrivilegeEscalation: false
changed:
  k8s/ml/training-job.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: ml-training
      namespace: ml-workloads
      labels:
        app: ml-training
        workload-type: gpu-intensive
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: ml-training
      template:
        metadata:
          labels:
            app: ml-training
            workload-type: gpu-intensive
        spec:
          nodeSelector:
            accelerator: nvidia-tesla-a100
            gpu-memory: "80gb"
            node.kubernetes.io/instance-type: p4d.24xlarge
          containers:
          - name: trainer
            image: pytorch/pytorch:2.0.1-cuda11.7-cudnn8-runtime
            command: ["python", "train.py"]
            env:
            - name: MODEL_NAME
              value: "gpt-finetune"
            - name: BATCH_SIZE
              value: "32"
            resources:
              requests:
                memory: "16Gi"
                cpu: "4"
                nvidia.com/gpu: "8"
              limits:
                memory: "32Gi"
                cpu: "8"
                nvidia.com/gpu: "8"
  k8s/ml/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: ml-training-metrics
      namespace: ml-workloads
    spec:
      selector:
        app: ml-training
      ports:
      - name: metrics
        port: 9090
        targetPort: 9090
  k8s/ml/model-serving.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: model-serving
      namespace: ml-workloads
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: model-serving
      template:
        metadata:
          labels:
            app: model-serving
        spec:
          containers:
          - name: serving
            image: pytorch/torchserve:0.8.0
            ports:
            - containerPort: 8080
            - containerPort: 8081
            env:
            - name: MODEL_STORE
              value: "/models"
  k8s/infra/gpu-device-plugin.yaml: |
    apiVersion: apps/v1
    kind: DaemonSet
    metadata:
      name: nvidia-device-plugin
      namespace: kube-system
    spec:
      selector:
        matchLabels:
          name: nvidia-device-plugin
      template:
        spec:
          tolerations:
          - key: nvidia.com/gpu
            operator: Exists
            effect: NoSchedule
          containers:
          - name: nvidia-device-plugin
            image: nvcr.io/nvidia/k8s-device-plugin:v0.14.1
            securityContext:
              allowPrivilegeEscalation: false
must_include_files:
- k8s/ml/training-job.yaml
must_include_content_from:
  k8s/ml/training-job.yaml:
  - 'nodeSelector:'
  - 'accelerator: nvidia-tesla-a100'
must_not_include:
  # --- model-serving.yaml: same namespace, different workload type ---
  - model-serving
  - torchserve
  - MODEL_STORE
  # --- gpu-device-plugin.yaml: enables GPU resource, infrastructure layer ---
  - nvidia-device-plugin
  - k8s-device-plugin
  - "nvcr.io/nvidia"
must_not_include_files:
  - k8s/ml/model-serving.yaml
  - k8s/infra/gpu-device-plugin.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
