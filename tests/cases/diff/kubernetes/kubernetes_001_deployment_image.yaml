must_include_files:
  - k8s/base/deployment.yaml
  # Q1: Major version bump. The reviewer must verify that the Service
  # port mapping (80→8080, 9090→9090) still matches the container's
  # declared ports. Without service.yaml, the reviewer cannot confirm
  # the port contract is intact after the image change.
  - k8s/base/service.yaml

must_include_content_from:
  k8s/base/deployment.yaml:
    - "image: registry.example.com/api-server:v2.0.0"
    - "containerPort: 8080"
    - "containerPort: 9090"
  k8s/base/service.yaml:
    - "targetPort: 8080"
    - "targetPort: 9090"
    - "app: api-server"

must_not_include:
  # --- hpa.yaml: scaleTargetRef → Deployment api-server ---
  # Direct structural reference to the SAME deployment being changed.
  # Hardest trap. But autoscaling thresholds (cpu 70%, memory 80%) and
  # replica bounds don't help verify the image bump is safe.
  - scaleTargetRef
  - minReplicas
  - maxReplicas
  - averageUtilization
  # --- ingress.yaml: routes to Service api-server ---
  # Structural edge through service name. But URL routing paths
  # (/v1, /grpc) don't help review whether the new image tag is
  # compatible with the existing port configuration.
  - api.example.com
  - ssl-redirect
  - rate-limit
  - api-tls-cert
  # --- pdb.yaml: selects pods with app: api-server ---
  # Structural edge through matchLabels on same pods.
  # Disruption budget is an availability concern, not a compatibility one.
  - PodDisruptionBudget
  - minAvailable
  # --- grafana dashboard: monitors api-server by name ---
  - api-server-dashboard
  - grafana_dashboard
  - http_requests_total
  - kube_deployment_status_replicas
  # --- db-migration: same namespace + same secret, but different workload ---
  - db-migrate-v42
  - db-migrations
  - manage.py
  # --- Dockerfile: builds the image, EXPOSE matches ports ---
  # Shows how the image is built, not how it's deployed.
  - "FROM python:3.11-slim"
  - EXPOSE 8080 9090
  - uvicorn

must_not_include_files:
  - k8s/base/hpa.yaml
  - k8s/base/ingress.yaml
  - k8s/base/pdb.yaml
  - k8s/monitoring/grafana-dashboard.yaml
  - k8s/jobs/db-migration.yaml
  - Dockerfile

max_fragments: 8
max_files: 5
add_garbage_files: false
skip_garbage_check: true
