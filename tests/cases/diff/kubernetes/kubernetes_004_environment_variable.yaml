      import os
      from dataclasses import dataclass

      @dataclass
      class DatabaseConfig:
          host: str = os.environ.get('DATABASE_HOST', 'localhost')
          port: int = int(os.environ.get('DATABASE_PORT', '5432'))
          name: str = os.environ.get('DATABASE_NAME', 'app')
          user: str = os.environ.get('DATABASE_USER', 'postgres')

      @dataclass
      class AppConfig:
          debug: bool = os.environ.get('DEBUG', 'false').lower() == 'true'
          log_level: str = os.environ.get('LOG_LEVEL', 'INFO')
          database: DatabaseConfig = None

          def __post_init__(self):
              self.database = DatabaseConfig()
    k8s/apps/backend/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend-api
        namespace: production
        labels:
          app: backend-api
          component: api
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: backend-api
        template:
          metadata:
            labels:
              app: backend-api
              component: api
          spec:
            serviceAccountName: backend-sa
            containers:
            - name: api
              image: backend-api:v1.0.0
              ports:
