# Scenario: Worker deployment gains proper resource requests/limits including
#   ephemeral-storage. Only k8s/apps/worker/deployment.yaml is changed.
#
# Diff shows:
#   - resources: {}  ->  + requests: 512Mi/500m/1Gi, limits: 1Gi/1000m/2Gi
#   + ephemeral-storage in both requests and limits
#
# Reviewer questions:
#   Q1: "Is 1Gi memory limit enough for Celery workers?"
#       -> Pure config review: Celery workers can consume significant memory
#          depending on task payloads and prefetch multiplier. 1Gi may OOMKill
#          workers processing large tasks.
#
#   Q2: "Do the resource values fit within namespace LimitRange constraints?"
#       -> The LimitRange has max memory: 4Gi, so 1Gi fits. But this
#          requires looking at LimitRange — which is NOT needed for
#          understanding the diff itself, only for operational validation.
#
# Not needed for comprehension:
#   - k8s/limitranges/production-limits.yaml: LimitRange with default
#     memory 256Mi and max 4Gi. Shares resource vocabulary (memory, cpu,
#     requests, limits). Direct structural edge: the LimitRange constrains
#     the exact resource fields being set. HARDEST TRAP: LimitRange defaults
#     apply when no resources are set — the diff replaces resources: {} with
#     explicit values, making the LimitRange defaults irrelevant. The
#     reviewer needs to evaluate the values themselves, not the constraints.
#
#   - k8s/quotas/production-quota.yaml: ResourceQuota with namespace-wide
#     limits (requests.cpu: "20", requests.memory: "40Gi"). Shares resource
#     vocabulary. But quota is an aggregate constraint — it doesn't help
#     review whether individual pod resources are appropriate.
max_enrichment: 9.4
initial:
  k8s/apps/worker/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: worker
      namespace: production
      labels:
        app: worker
        component: background-jobs
    spec:
      replicas: 5
      selector:
        matchLabels:
          app: worker
      template:
        metadata:
          labels:
            app: worker
            component: background-jobs
        spec:
          containers:
          - name: worker
            image: worker:v1.0.0
            command: ["python", "-m", "celery", "worker"]
            env:
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: url
            resources: {}
  k8s/apps/worker/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: worker-metrics
      namespace: production
    spec:
      selector:
        app: worker
      ports:
      - name: metrics
        port: 9090
        targetPort: 9090
  k8s/limitranges/production-limits.yaml: |
    apiVersion: v1
    kind: LimitRange
    metadata:
      name: default-limits
      namespace: production
    spec:
      limits:
      - type: Container
        default:
          memory: "256Mi"
          cpu: "500m"
        defaultRequest:
          memory: "128Mi"
          cpu: "100m"
        max:
          memory: "4Gi"
          cpu: "4"
  k8s/quotas/production-quota.yaml: |
    apiVersion: v1
    kind: ResourceQuota
    metadata:
      name: production-quota
      namespace: production
    spec:
      hard:
        requests.cpu: "20"
        requests.memory: "40Gi"
        limits.cpu: "40"
        limits.memory: "80Gi"
        pods: "100"
changed:
  k8s/apps/worker/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: worker
      namespace: production
      labels:
        app: worker
        component: background-jobs
    spec:
      replicas: 5
      selector:
        matchLabels:
          app: worker
      template:
        metadata:
          labels:
            app: worker
            component: background-jobs
        spec:
          containers:
          - name: worker
            image: worker:v1.0.0
            command: ["python", "-m", "celery", "worker"]
            env:
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: url
            resources:
              requests:
                memory: "512Mi"
                cpu: "500m"
                ephemeral-storage: "1Gi"
              limits:
                memory: "1Gi"
                cpu: "1000m"
                ephemeral-storage: "2Gi"
  k8s/apps/worker/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: worker-metrics
      namespace: production
    spec:
      selector:
        app: worker
      ports:
      - name: metrics
        port: 9090
        targetPort: 9090
  k8s/limitranges/production-limits.yaml: |
    apiVersion: v1
    kind: LimitRange
    metadata:
      name: default-limits
      namespace: production
    spec:
      limits:
      - type: Container
        default:
          memory: "256Mi"
          cpu: "500m"
        defaultRequest:
          memory: "128Mi"
          cpu: "100m"
        max:
          memory: "4Gi"
          cpu: "4"
  k8s/quotas/production-quota.yaml: |
    apiVersion: v1
    kind: ResourceQuota
    metadata:
      name: production-quota
      namespace: production
    spec:
      hard:
        requests.cpu: "20"
        requests.memory: "40Gi"
        limits.cpu: "40"
        limits.memory: "80Gi"
        pods: "100"
must_include_files:
- k8s/apps/worker/deployment.yaml
must_include_content_from:
  k8s/apps/worker/deployment.yaml:
    - 'memory: "512Mi"'
    - 'ephemeral-storage: "1Gi"'
    - 'cpu: "500m"'
    - 'memory: "1Gi"'
must_not_include:
  # --- production-limits.yaml: namespace defaults, now overridden ---
  - default-limits
  - LimitRange
  - defaultRequest
  # --- production-quota.yaml: aggregate constraint, not per-pod concern ---
  - production-quota
  - ResourceQuota
  - "pods: \"100\""
must_not_include_files:
  - k8s/limitranges/production-limits.yaml
  - k8s/quotas/production-quota.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
