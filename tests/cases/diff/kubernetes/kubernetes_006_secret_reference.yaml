# Scenario: Deployment gains env vars referencing db-secret via secretKeyRef
#   for DB credentials. Only k8s/base/deployment.yaml is changed.
#
# Diff shows:
#   - env: []  ->  + DB_USERNAME, DB_PASSWORD, DB_HOST from secretKeyRef db-secret
#
# Reviewer questions:
#   Q1: "Does db-secret exist with keys username, password, host?"
#       -> Needs k8s/base/secret.yaml: Secret named db-secret in production
#          namespace with data keys: username, password, host. The
#          deployment references these exact keys via secretKeyRef.
#          Without this, the reviewer cannot verify the key names match.
#
#   Q2: "Should we use envFrom instead of individual secretKeyRef entries?"
#       -> Pure config review: three separate secretKeyRef entries vs
#          envFrom: secretRef. envFrom imports all keys, which may expose
#          keys not needed. Individual refs are more explicit but verbose.
#
# Not needed for comprehension:
#   - k8s/vault/vault-config.yaml: Vault agent injector deployment with
#     VAULT_ADDR env var. Shares "secret" vocabulary and even uses env
#     vars in a similar pattern. But Vault is a different secret management
#     system — its config doesn't help review Kubernetes native secretKeyRef.
#
#   - k8s/external-secrets/cluster-store.yaml: ClusterSecretStore for
#     AWS Secrets Manager. Shares "secret" vocabulary and secret management
#     domain. HARDEST TRAP: external-secrets could be the source of
#     db-secret (synced from AWS). But the ClusterSecretStore config
#     doesn't help verify that the secretKeyRef key names match the
#     Secret's data keys.
initial:
  k8s/base/secret.yaml: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: db-secret
      namespace: production
      labels:
        app: myapp
        component: database
    type: Opaque
    data:
      username: cG9zdGdyZXM=
      password: c3VwZXJzZWNyZXRwYXNzd29yZA==
      host: cG9zdGdyZXMuZGF0YWJhc2Uuc3ZjLmNsdXN0ZXIubG9jYWw=
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: myapp
      namespace: production
      labels:
        app: myapp
        tier: backend
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: myapp
      template:
        metadata:
          labels:
            app: myapp
            tier: backend
        spec:
          containers:
          - name: app
            image: myapp:v1.0.0
            ports:
            - containerPort: 8080
            env: []
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: myapp
      namespace: production
    spec:
      selector:
        app: myapp
      ports:
      - port: 80
        targetPort: 8080
  k8s/vault/vault-config.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: vault-agent-injector
      namespace: vault
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: vault-agent-injector
      template:
        spec:
          containers:
          - name: vault-agent
            image: hashicorp/vault:1.15.0
            env:
            - name: VAULT_ADDR
              value: "https://vault.vault.svc:8200"
  k8s/external-secrets/cluster-store.yaml: |
    apiVersion: external-secrets.io/v1beta1
    kind: ClusterSecretStore
    metadata:
      name: aws-secrets-manager
    spec:
      provider:
        aws:
          service: SecretsManager
          region: us-east-1
          auth:
            jwt:
              serviceAccountRef:
                name: external-secrets-sa
changed:
  k8s/base/secret.yaml: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: db-secret
      namespace: production
      labels:
        app: myapp
        component: database
    type: Opaque
    data:
      username: cG9zdGdyZXM=
      password: c3VwZXJzZWNyZXRwYXNzd29yZA==
      host: cG9zdGdyZXMuZGF0YWJhc2Uuc3ZjLmNsdXN0ZXIubG9jYWw=
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: myapp
      namespace: production
      labels:
        app: myapp
        tier: backend
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: myapp
      template:
        metadata:
          labels:
            app: myapp
            tier: backend
        spec:
          containers:
          - name: app
            image: myapp:v1.0.0
            ports:
            - containerPort: 8080
            env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: password
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: db-secret
                  key: host
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: myapp
      namespace: production
    spec:
      selector:
        app: myapp
      ports:
      - port: 80
        targetPort: 8080
  k8s/vault/vault-config.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: vault-agent-injector
      namespace: vault
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: vault-agent-injector
      template:
        spec:
          containers:
          - name: vault-agent
            image: hashicorp/vault:1.15.0
            env:
            - name: VAULT_ADDR
              value: "https://vault.vault.svc:8200"
  k8s/external-secrets/cluster-store.yaml: |
    apiVersion: external-secrets.io/v1beta1
    kind: ClusterSecretStore
    metadata:
      name: aws-secrets-manager
    spec:
      provider:
        aws:
          service: SecretsManager
          region: us-east-1
          auth:
            jwt:
              serviceAccountRef:
                name: external-secrets-sa
must_include_files:
  - k8s/base/deployment.yaml
  # Q1: Secret must have matching key names.
  - k8s/base/secret.yaml
must_include_content_from:
  k8s/base/deployment.yaml:
    - '- name: DB_USERNAME'
    - 'secretKeyRef:'
    - 'key: password'
    - 'key: host'
  k8s/base/secret.yaml:
    - 'name: db-secret'
    - 'username:'
    - 'password:'
    - 'host:'
must_not_include:
  # --- vault-config.yaml: different secret management system ---
  - vault-agent-injector
  - VAULT_ADDR
  - "hashicorp/vault"
  # --- cluster-store.yaml: external secrets operator, different layer ---
  - ClusterSecretStore
  - aws-secrets-manager
  - SecretsManager
  - external-secrets-sa
must_not_include_files:
  - k8s/vault/vault-config.yaml
  - k8s/external-secrets/cluster-store.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
