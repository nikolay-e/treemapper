must_include_files:
  - k8s/deployment.yaml
  # Q1: Service targetPort must match containerPort.
  - k8s/service.yaml
must_include_content_from:
  k8s/deployment.yaml:
    - 'containerPort: 8080'
  k8s/service.yaml:
    - 'targetPort: 8080'
must_not_include:
  # --- prometheus-scrape.yaml: selects same app label, different concern ---
  - fastapi-app-monitor
  - ServiceMonitor
  - "interval: 15s"
  # --- worker deployment: different app in same namespace ---
  - background-worker
  - celery
  - "redis://redis:6379"
must_not_include_files:
  - k8s/monitoring/prometheus-scrape.yaml
  - k8s/apps/worker/deployment.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
