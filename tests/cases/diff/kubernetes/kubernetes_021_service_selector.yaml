must_include_files:
  - k8s/apps/service.yaml
  # Q1+Q2: Deployment labels must match service selector.
  - k8s/apps/deployment.yaml
must_include_content_from:
  k8s/apps/service.yaml:
    - 'app: api-backend'
    - 'version: v2'
  k8s/apps/deployment.yaml:
    - 'app: api-backend'
    - 'version: v2'
must_not_include:
  # --- virtual-service.yaml: Istio routing, different abstraction layer ---
  - api-backend-vs
  - VirtualService
  - "subset: stable"
  - "subset: canary"
  # --- canary-deployment.yaml: shares app label, different version ---
  - api-backend-canary
  - v3.0.0-rc1
  - "track: canary"
must_not_include_files:
  - k8s/istio/virtual-service.yaml
  - k8s/apps/canary-deployment.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
