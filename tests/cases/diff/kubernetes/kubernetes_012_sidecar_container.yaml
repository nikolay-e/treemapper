# Scenario: Deployment adds fluent-bit log-shipper sidecar sharing logs
#   via emptyDir volume. Only k8s/apps/backend/deployment.yaml is changed.
#
# Diff shows:
#   + log-shipper container: fluent/fluent-bit:2.1
#   + shared-logs emptyDir volume (main container writes, sidecar reads)
#   + fluent-bit-config volume from ConfigMap
#   + volumeMount on main container: /var/log/app
#
# Reviewer questions:
#   Q1: "Is readOnly: true correct for the sidecar's /var/log/app mount?"
#       -> Pure config review: the sidecar reads logs written by the main
#          container. readOnly: true is correct — fluent-bit only tails files.
#
#   Q2: "Does the fluent-bit-config ConfigMap exist?"
#       -> The diff references configMap.name: fluent-bit-config but no
#          ConfigMap manifest is shown. config/fluent-bit.conf exists as a
#          file but is not the same as the K8s ConfigMap. Potential gap.
#
#   Q3: "Does the sidecar's /fluent-bit/etc path match fluent-bit's config?"
#       -> Needs config/fluent-bit.conf: shows [INPUT] with Path /var/log/app/*.log
#          matching the shared volume mountPath. Confirms the paths align.
#
# Not needed for comprehension:
#   - k8s/logging/fluentd-aggregator.yaml: Central Fluentd aggregator in
#     logging namespace. Shares logging vocabulary (fluent, log forwarding).
#     HARDEST TRAP: same "fluent" ecosystem — fluent-bit is the log shipper,
#     fluentd is the aggregator. They're related in architecture but the
#     aggregator config doesn't help review the sidecar container setup.
#
#   - k8s/monitoring/loki-stack.yaml: Loki StatefulSet for log storage.
#     Shares log collection domain. But Loki is the storage backend, not
#     a dependency of the sidecar configuration being reviewed.
max_enrichment: 5.8
initial:
  config/fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info

    [INPUT]
        Name              tail
        Path              /var/log/app/*.log
        Tag               app.logs
        Refresh_Interval  5

    [OUTPUT]
        Name          stdout
        Match         *
  k8s/apps/backend/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backend-service
      namespace: production
      labels:
        app: backend-service
        tier: backend
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: backend-service
      template:
        metadata:
          labels:
            app: backend-service
            tier: backend
        spec:
          containers:
          - name: backend
            image: backend-service:v2.0.0
            ports:
            - containerPort: 8080
            env:
            - name: LOG_FORMAT
              value: "json"
            - name: LOG_PATH
              value: "/var/log/app"
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  k8s/apps/backend/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: backend-service
      namespace: production
    spec:
      selector:
        app: backend-service
      ports:
      - port: 80
        targetPort: 8080
  k8s/logging/fluentd-aggregator.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: fluentd-aggregator
      namespace: logging
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: fluentd-aggregator
      template:
        spec:
          containers:
          - name: fluentd
            image: fluent/fluentd:v1.16
            ports:
            - containerPort: 24224
            env:
            - name: FLUENT_ELASTICSEARCH_HOST
              value: "elasticsearch.logging.svc"
  k8s/monitoring/loki-stack.yaml: |
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: loki
      namespace: monitoring
    spec:
      serviceName: loki
      replicas: 1
      selector:
        matchLabels:
          app: loki
      template:
        spec:
          containers:
          - name: loki
            image: grafana/loki:2.9.0
            ports:
            - containerPort: 3100
            args:
            - -config.file=/etc/loki/local-config.yaml
changed:
  config/fluent-bit.conf: |
    [SERVICE]
        Flush         5
        Daemon        Off
        Log_Level     info

    [INPUT]
        Name              tail
        Path              /var/log/app/*.log
        Tag               app.logs
        Refresh_Interval  5

    [OUTPUT]
        Name          stdout
        Match         *
  k8s/apps/backend/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: backend-service
      namespace: production
      labels:
        app: backend-service
        tier: backend
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: backend-service
      template:
        metadata:
          labels:
            app: backend-service
            tier: backend
        spec:
          containers:
          - name: backend
            image: backend-service:v2.0.0
            ports:
            - containerPort: 8080
            env:
            - name: LOG_FORMAT
              value: "json"
            - name: LOG_PATH
              value: "/var/log/app"
            volumeMounts:
            - name: shared-logs
              mountPath: /var/log/app
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
          - name: log-shipper
            image: fluent/fluent-bit:2.1
            volumeMounts:
            - name: shared-logs
              mountPath: /var/log/app
              readOnly: true
            - name: fluent-bit-config
              mountPath: /fluent-bit/etc
            resources:
              requests:
                memory: "64Mi"
                cpu: "50m"
              limits:
                memory: "128Mi"
                cpu: "100m"
          volumes:
          - name: shared-logs
            emptyDir: {}
          - name: fluent-bit-config
            configMap:
              name: fluent-bit-config
  k8s/apps/backend/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: backend-service
      namespace: production
    spec:
      selector:
        app: backend-service
      ports:
      - port: 80
        targetPort: 8080
  k8s/logging/fluentd-aggregator.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: fluentd-aggregator
      namespace: logging
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: fluentd-aggregator
      template:
        spec:
          containers:
          - name: fluentd
            image: fluent/fluentd:v1.16
            ports:
            - containerPort: 24224
            env:
            - name: FLUENT_ELASTICSEARCH_HOST
              value: "elasticsearch.logging.svc"
  k8s/monitoring/loki-stack.yaml: |
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: loki
      namespace: monitoring
    spec:
      serviceName: loki
      replicas: 1
      selector:
        matchLabels:
          app: loki
      template:
        spec:
          containers:
          - name: loki
            image: grafana/loki:2.9.0
            ports:
            - containerPort: 3100
            args:
            - -config.file=/etc/loki/local-config.yaml
must_include_files:
- k8s/apps/backend/deployment.yaml
must_include_content_from:
  k8s/apps/backend/deployment.yaml:
    - 'name: log-shipper'
    - 'name: shared-logs'
    - 'fluent/fluent-bit:2.1'
    - 'readOnly: true'
must_not_include:
  # --- fluentd-aggregator.yaml: same fluent ecosystem, different role ---
  - fluentd-aggregator
  - FLUENT_ELASTICSEARCH_HOST
  - "fluent/fluentd"
  # --- loki-stack.yaml: log storage backend, not sidecar config ---
  - grafana/loki
  - local-config.yaml
  - "containerPort: 3100"
must_not_include_files:
  - k8s/logging/fluentd-aggregator.yaml
  - k8s/monitoring/loki-stack.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
