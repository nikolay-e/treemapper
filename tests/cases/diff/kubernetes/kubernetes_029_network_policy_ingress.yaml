must_include_files:
  - k8s/base/networkpolicy.yaml

must_include_content_from:
  k8s/base/networkpolicy.yaml:
    - "name: payment-service-ingress"
    - "role: api-gateway"
    - "role: order-service"
    - "port: 8080"

must_not_include:
  # --- order-service deployment: allowed source, but policy only checks labels ---
  - "order-service:v2.1.0"
  - PAYMENT_URL
  # --- gateway deployment: other allowed source, same reasoning ---
  - "api-gateway:v3.0.0"
  - UPSTREAM_PAYMENT
  # --- prometheus deployment: monitoring source, policy checks labels only ---
  - "prom/prometheus"
  - "storage.tsdb.retention"
  # --- global deny: separate cluster-wide policy in kube-system ---
  - cluster-default-deny
  # --- secret: deployment dependency, not network policy concern ---
  - base64encodedkey

must_not_include_files:
  - k8s/apps/order-service/deployment.yaml
  - k8s/apps/gateway/deployment.yaml
  - k8s/monitoring/prometheus-deployment.yaml
  - k8s/policies/global-deny.yaml
  - k8s/base/secret.yaml

max_fragments: 8
max_files: 4
add_garbage_files: false
skip_garbage_check: true
