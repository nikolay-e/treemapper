must_include_files:
  - k8s/apps/deployment.yaml
  # Q1: Secret must exist with the referenced name.
  - k8s/secrets/registry-credentials.yaml
must_include_content_from:
  k8s/apps/deployment.yaml:
    - 'imagePullSecrets:'
    - 'imagePullPolicy: Always'
    - 'name: private-registry-cred'
    - 'name: gcr-json-key'
  k8s/secrets/registry-credentials.yaml:
    - 'name: private-registry-cred'
    - 'kubernetes.io/dockerconfigjson'
must_not_include:
  # --- harbor-config.yaml: registry infrastructure, not pull secret refs ---
  - harbor-registry-config
  - harbor-registry-storage
  - AKIAIOSFODNN7EXAMPLE
  # --- image-puller-role.yaml: RBAC for pulling, not pull secret config ---
  - image-puller
  - ClusterRole
  - serviceaccounts
must_not_include_files:
  - k8s/registry/harbor-config.yaml
  - k8s/rbac/image-puller-role.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
