# Scenario: Deployment adds imagePullSecrets for private-registry-cred and
#   gcr-json-key with Always pull policy. Only k8s/apps/deployment.yaml
#   is changed.
#
# Diff shows:
#   + imagePullSecrets: [private-registry-cred, gcr-json-key]
#   + imagePullPolicy: Always
#
# Reviewer questions:
#   Q1: "Does the private-registry-cred secret exist in production namespace?"
#       -> Needs k8s/secrets/registry-credentials.yaml: Secret named
#          private-registry-cred in production namespace with type
#          kubernetes.io/dockerconfigjson. Confirms the referenced secret
#          exists. Without this, the reviewer cannot verify the pull secret
#          reference is valid.
#
#   Q2: "Does gcr-json-key secret exist?"
#       -> Not defined in any file — potential review finding. The deployment
#          references it but no corresponding Secret manifest exists.
#
#   Q3: "Is imagePullPolicy: Always needed for tagged images?"
#       -> Pure config review: image uses tag v1.0.0 (not :latest).
#          Always pull ensures fresh pulls but adds latency. IfNotPresent
#          would be more efficient for tagged images.
#
# Not needed for comprehension:
#   - k8s/registry/harbor-config.yaml: Harbor registry ConfigMap in
#     "registry" namespace with S3 storage config. Shares "registry"
#     vocabulary directly. But Harbor server configuration is infrastructure
#     — it doesn't help review whether imagePullSecrets are correctly
#     referenced in a deployment.
#
#   - k8s/rbac/image-puller-role.yaml: ClusterRole for image pulling with
#     secrets get/list permissions. Shares "image pull" vocabulary. Direct
#     structural overlap: RBAC for the same operation. But RBAC permissions
#     don't help verify that the secret names in imagePullSecrets are correct.
max_enrichment: 13.6
initial:
  k8s/secrets/registry-credentials.yaml: |
    apiVersion: v1
    kind: Secret
    metadata:
      name: private-registry-cred
      namespace: production
      labels:
        app: myapp
    type: kubernetes.io/dockerconfigjson
    data:
      .dockerconfigjson: eyJhdXRocyI6eyJwcml2YXRlLXJlZ2lzdHJ5LmlvIjp7InVzZXJuYW1lIjoiZGVwbG95IiwicGFzc3dvcmQiOiJzZWNyZXQiLCJlbWFpbCI6ImRlcGxveUBleGFtcGxlLmNvbSIsImF1dGgiOiJaR1Z3Ykc5NU9uTmxZM0psZEE9PSJ9fX0=
  k8s/apps/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: myapp
      namespace: production
      labels:
        app: myapp
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: myapp
      template:
        metadata:
          labels:
            app: myapp
        spec:
          containers:
          - name: app
            image: private-registry.io/myorg/myapp:v1.0.0
            ports:
            - containerPort: 8080
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  k8s/apps/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: myapp
      namespace: production
    spec:
      selector:
        app: myapp
      ports:
      - port: 80
        targetPort: 8080
  k8s/registry/harbor-config.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: harbor-registry-config
      namespace: registry
    data:
      config.yml: |
        version: 0.1
        storage:
          s3:
            accesskey: AKIAIOSFODNN7EXAMPLE
            region: us-east-1
            bucket: harbor-registry-storage
        http:
          addr: :5000
  k8s/rbac/image-puller-role.yaml: |
    apiVersion: rbac.authorization.k8s.io/v1
    kind: ClusterRole
    metadata:
      name: image-puller
    rules:
    - apiGroups: [""]
      resources: ["secrets"]
      verbs: ["get", "list"]
    - apiGroups: [""]
      resources: ["serviceaccounts"]
      verbs: ["get"]
