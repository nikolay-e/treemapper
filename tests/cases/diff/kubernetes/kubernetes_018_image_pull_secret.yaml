        app: myapp
      ports:
      - port: 80
        targetPort: 8080
  k8s/registry/harbor-config.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: harbor-registry-config
      namespace: registry
    data:
      config.yml: |
        version: 0.1
        storage:
          s3:
            accesskey: AKIAIOSFODNN7EXAMPLE
            region: us-east-1
            bucket: harbor-registry-storage
        http:
