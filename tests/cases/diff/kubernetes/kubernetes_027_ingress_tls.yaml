must_include_files:
  - k8s/base/ingress.yaml

must_include_content_from:
  k8s/base/ingress.yaml:
    - 'nginx.ingress.kubernetes.io/ssl-redirect: "true"'
    - "secretName: tls-cert"
    - "host: api-backup.example.com"

must_not_include:
  # --- sealed-secret: different secret type, different namespace ---
  - SealedSecret
  - db-credentials
  - encryptedData
  # --- oauth2-proxy: proxies to secure-api, but auth flow not needed ---
  - oauth2-proxy
  - "--provider=oidc"
  - "--cookie-secure=true"
  # --- cert-manager issuer: HARD TRAP — referenced by name in the diff,
  #     but ACME solver details don't help review ingress TLS block ---
  - "acme-v02.api.letsencrypt.org"
  - privateKeySecretRef
  - "admin@example.com"
  # --- deployment: container details not needed for ingress TLS review ---
  - TLS_ENABLED
  - "secure-api:v2.1.0"

must_not_include_files:
  - k8s/infra/sealed-secret.yaml
  - k8s/infra/oauth2-proxy.yaml
  - k8s/infra/cert-manager-issuer.yaml
  - k8s/base/deployment.yaml

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
