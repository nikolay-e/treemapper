# Scenario: Ingress gains TLS termination with cert-manager, SSL redirect,
#   force-ssl-redirect, and a second host rule for api-backup.example.com.
#
# Diff shows:
#   + tls block referencing secretName: tls-cert with both hosts
#   + ssl-redirect and force-ssl-redirect annotations
#   + second rules entry for api-backup.example.com
#
# Reviewer questions:
#   Q1: "Does the tls-cert secret already exist, and does it cover both hosts?"
#       -> Needs k8s/base/certificate.yaml: Certificate with secretName: tls-cert
#          and dnsNames including both api.example.com and api-backup.example.com.
#          Confirms the secret will be created by cert-manager with matching hosts.
#
#   Q2: "Does the backend service secure-api exist with port 80?"
#       -> Needs k8s/base/service.yaml: service named secure-api on port 80
#          targeting 8080, confirming the ingress backend port is valid.
#
#   Q3: "Is the cert-manager issuer already configured?"
#       -> The ingress annotation references cluster-issuer: letsencrypt-prod,
#          and the Certificate references the same issuer. Cross-verification.
#
# Not needed for comprehension:
#   - k8s/base/deployment.yaml: Runs the secure-api container. Direct structural
#     edge (ingress -> service -> deployment). But the ingress change concerns
#     TLS and host routing, not container configuration.
#
#   - k8s/infra/sealed-secret.yaml: SealedSecret for db-credentials in
#     sealed-secrets namespace. Shares "secret" vocabulary and production
#     namespace reference. But it's a completely different secret for a
#     different purpose — database credentials, not TLS certs.
#
#   - k8s/infra/oauth2-proxy.yaml: OAuth2 proxy with upstream pointing to
#     secure-api. Direct structural edge: it proxies to the same service.
#     But the ingress TLS change doesn't require understanding OAuth2 flow.
#
#   - k8s/infra/cert-manager-issuer.yaml: The ClusterIssuer letsencrypt-prod
#     referenced by both the ingress annotation and the Certificate. HARD TRAP:
#     direct reference from the diff. But the issuer's ACME config and solver
#     details don't help review the ingress TLS block — the reviewer only needs
#     to verify the name matches.
#
#   - Makefile: Deployment script referencing k8s/base/. No TLS dependency.

initial:
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: secure-api
      namespace: production
      labels:
        app: secure-api
        tier: backend
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: secure-api
      template:
        metadata:
          labels:
            app: secure-api
            tier: backend
        spec:
          containers:
          - name: api
            image: registry.example.com/secure-api:v2.1.0
            ports:
            - containerPort: 8080
              name: http
            env:
            - name: TLS_ENABLED
              value: "true"
            resources:
              requests:
                memory: "512Mi"
                cpu: "500m"
              limits:
                memory: "1Gi"
                cpu: "1000m"
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: secure-api
      namespace: production
    spec:
      selector:
        app: secure-api
      ports:
      - name: http
        port: 80
        targetPort: 8080
  k8s/base/certificate.yaml: |
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: api-tls
      namespace: production
    spec:
      secretName: tls-cert
      issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      dnsNames:
      - api.example.com
      - api-backup.example.com
  k8s/base/ingress.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: api-ingress
      namespace: production
      annotations:
        kubernetes.io/ingress.class: nginx
        cert-manager.io/cluster-issuer: letsencrypt-prod
    spec:
      rules:
      - host: api.example.com
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: secure-api
                port:
                  number: 80
  k8s/infra/sealed-secret.yaml: |
    apiVersion: bitnami.com/v1alpha1
    kind: SealedSecret
    metadata:
      name: db-credentials
      namespace: sealed-secrets
    spec:
      encryptedData:
        username: AgBz7K8mNpQrVwXyZ1234567890abcdefg
        password: AgCx9M2oRsTuWxYz0987654321hijklmn
      template:
        metadata:
          name: db-credentials
          namespace: production
  k8s/infra/oauth2-proxy.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: oauth2-proxy
      namespace: auth
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: oauth2-proxy
      template:
        spec:
          containers:
          - name: oauth2-proxy
            image: quay.io/oauth2-proxy/oauth2-proxy:v7.5.1
            args:
            - --provider=oidc
            - --cookie-secure=true
            - --upstream=http://secure-api.production.svc:80
            ports:
            - containerPort: 4180
  k8s/infra/cert-manager-issuer.yaml: |
    apiVersion: cert-manager.io/v1
    kind: ClusterIssuer
    metadata:
      name: letsencrypt-prod
    spec:
      acme:
        email: admin@example.com
        server: https://acme-v02.api.letsencrypt.org/directory
        privateKeySecretRef:
          name: letsencrypt-prod-key
        solvers:
        - http01:
            ingress:
              class: nginx
  Makefile: "deploy:\n\tkubectl apply -f k8s/base/\n"

