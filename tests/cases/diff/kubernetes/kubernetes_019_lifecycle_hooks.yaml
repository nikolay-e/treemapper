# Scenario: Deployment adds postStart and preStop lifecycle hooks with
#   increased terminationGracePeriodSeconds. Only k8s/apps/deployment.yaml
#   is changed.
#
# Diff shows:
#   - terminationGracePeriodSeconds: 30  ->  + 60
#   + postStart exec: curl -X POST http://localhost:8080/admin/register
#   + preStop httpGet: path /admin/drain, port 8080
#
# Reviewer questions:
#   Q1: "Does /admin/register and /admin/drain exist in the application?"
#       -> Needs scripts/graceful-shutdown.sh: references /admin/drain
#          endpoint (curl -X POST http://localhost:8080/admin/drain).
#          Confirms the drain endpoint exists. But /admin/register is not
#          referenced anywhere else — potential review finding.
#
#   Q2: "Will preStop httpGet complete within the 60s grace period?"
#       -> Pure config review: preStop httpGet to /admin/drain fires on
#          SIGTERM. The pod has 60s total before SIGKILL. The drain must
#          complete within that window.
#
# Not needed for comprehension:
#   - k8s/apps/health-check-config.yaml: ConfigMap with health check
#     endpoint paths (/health/live, /health/ready, /health/startup).
#     Shares /admin-adjacent path vocabulary and same "health endpoint"
#     concern. But health checks are different from lifecycle hooks —
#     the ConfigMap configures readiness/liveness probes, not postStart/preStop.
#
#   - k8s/infra/pod-lifecycle-events.yaml: Deployment of a lifecycle event
#     logger watching production namespace. Shares "lifecycle" vocabulary
#     directly. HARDEST TRAP: same word "lifecycle" in the resource name.
#     But this is an observability tool that watches pod events, not a
#     dependency of the lifecycle hooks being configured.
max_enrichment: 8.1
initial:
  scripts/graceful-shutdown.sh: |
    #!/bin/bash
    set -e

    echo "Received shutdown signal, starting graceful shutdown..."

    curl -X POST http://localhost:8080/admin/drain
    sleep 5

    echo "Waiting for active connections to complete..."
    while [ $(curl -s http://localhost:8080/metrics | grep active_connections | awk '{print $2}') -gt 0 ]; do
      sleep 1
    done

    echo "Graceful shutdown complete"
  k8s/apps/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: api-server
      namespace: production
      labels:
        app: api-server
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: api-server
      template:
        metadata:
          labels:
            app: api-server
        spec:
          terminationGracePeriodSeconds: 30
          containers:
          - name: api
            image: api-server:v1.0.0
            ports:
            - containerPort: 8080
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  k8s/apps/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: api-server
      namespace: production
    spec:
      selector:
        app: api-server
      ports:
      - port: 80
        targetPort: 8080
  k8s/apps/health-check-config.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: health-check-config
      namespace: production
    data:
      config.json: |
        {
          "endpoints": {
            "liveness": "/health/live",
            "readiness": "/health/ready",
            "startup": "/health/startup"
          },
          "timeouts": {
            "liveness": 5,
            "readiness": 3
          }
        }
  k8s/infra/pod-lifecycle-events.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: lifecycle-event-logger
      namespace: kube-system
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: lifecycle-logger
      template:
        spec:
          containers:
          - name: logger
            image: event-logger:v1.0
            env:
            - name: WATCH_NAMESPACE
              value: "production"
            - name: EVENT_TYPES
              value: "Normal,Warning"
changed:
  scripts/graceful-shutdown.sh: |
    #!/bin/bash
    set -e

    echo "Received shutdown signal, starting graceful shutdown..."

    curl -X POST http://localhost:8080/admin/drain
    sleep 5

    echo "Waiting for active connections to complete..."
    while [ $(curl -s http://localhost:8080/metrics | grep active_connections | awk '{print $2}') -gt 0 ]; do
      sleep 1
    done

    echo "Graceful shutdown complete"
  k8s/apps/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: api-server
      namespace: production
      labels:
        app: api-server
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: api-server
      template:
        metadata:
          labels:
            app: api-server
        spec:
          terminationGracePeriodSeconds: 60
          containers:
          - name: api
            image: api-server:v1.0.0
            ports:
            - containerPort: 8080
            lifecycle:
              postStart:
                exec:
                  command:
                  - /bin/sh
                  - -c
                  - |
                    echo "Container started at $(date)" >> /var/log/lifecycle.log
                    curl -X POST http://localhost:8080/admin/register
              preStop:
                httpGet:
                  path: /admin/drain
                  port: 8080
                  scheme: HTTP
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  k8s/apps/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: api-server
      namespace: production
    spec:
      selector:
        app: api-server
      ports:
      - port: 80
        targetPort: 8080
  k8s/apps/health-check-config.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: health-check-config
      namespace: production
    data:
      config.json: |
        {
          "endpoints": {
            "liveness": "/health/live",
            "readiness": "/health/ready",
            "startup": "/health/startup"
          },
          "timeouts": {
            "liveness": 5,
            "readiness": 3
          }
        }
  k8s/infra/pod-lifecycle-events.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: lifecycle-event-logger
      namespace: kube-system
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: lifecycle-logger
      template:
        spec:
          containers:
          - name: logger
            image: event-logger:v1.0
            env:
            - name: WATCH_NAMESPACE
              value: "production"
            - name: EVENT_TYPES
              value: "Normal,Warning"
must_include_files:
- k8s/apps/deployment.yaml
must_include_content_from:
  k8s/apps/deployment.yaml:
    - 'terminationGracePeriodSeconds: 60'
    - 'path: /admin/drain'
    - '/admin/register'
    - 'postStart:'
    - 'preStop:'
must_not_include:
  # --- health-check-config.yaml: shares /admin path vocabulary ---
  - health-check-config
  - "/health/live"
  - "/health/ready"
  # --- pod-lifecycle-events.yaml: shares "lifecycle" vocabulary ---
  - lifecycle-event-logger
  - lifecycle-logger
  - WATCH_NAMESPACE
  - EVENT_TYPES
must_not_include_files:
  - k8s/apps/health-check-config.yaml
  - k8s/infra/pod-lifecycle-events.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
