# Scenario: Ingress updated with ingressClassName: nginx-internal, TLS block,
#   proxy buffer annotations, labels, and a second path rule for /static.
#
# Diff shows:
#   + ingressClassName: nginx-internal referencing the IngressClass resource
#   + tls block with secretName: web-app-tls
#   + proxy-buffer-size and proxy-buffers-number annotations
#   + labels on metadata, second path rule for /static
#
# Reviewer questions:
#   Q1: "Does the nginx-internal IngressClass exist and use the right controller?"
#       -> Needs k8s/base/ingress-class.yaml: defines IngressClass nginx-internal
#          with controller k8s.io/ingress-nginx, is-default-class: false.
#
#   Q2: "Does the backend service web-app exist and expose port 80?"
#       -> Needs k8s/base/service.yaml: service named web-app with port 80
#          targeting 3000, confirming the ingress backend port number: 80 is valid.
#
#   Q3: "Is the TLS host consistent with the ingress rule host?"
#       -> The diff itself shows both tls.hosts and rules.host use app.example.com.
#          Reviewer can verify in the diff fragment.
#
# Not needed for comprehension:
#   - k8s/base/deployment.yaml: The deployment runs the web-app container
#     on port 3000. Direct structural edge (ingress -> service -> deployment).
#     But the ingress change only references the service by name and port 80.
#     The reviewer doesn't need to verify deployment container config to review
#     ingress annotations and TLS.
#
#   - k8s/base/configmap.yaml: ConfigMap for the web-app with feature flags.
#     Same namespace, same app label. But the ingress references no ConfigMap.
#
#   - k8s/base/hpa.yaml: HPA targeting the web-app deployment. Shares the
#     "web-app" label and same namespace. But HPA scaling policy is unrelated
#     to ingress routing, TLS, and proxy buffer configuration.
#
#   - k8s/certs/web-app-certificate.yaml: cert-manager Certificate that
#     creates the web-app-tls secret referenced in the TLS block. HARD TRAP:
#     the ingress directly references secretName: web-app-tls, and this file
#     defines that secret. But understanding TLS ingress config only requires
#     knowing the secretName matches — the certificate issuer details don't
#     help review the ingress annotations.
#
#   - k8s/controllers/nginx-ingress-deployment.yaml: The actual nginx ingress
#     controller deployment. The IngressClass references controller:
#     k8s.io/ingress-nginx, and this deploys it. But the reviewer needs to
#     verify the IngressClass spec, not the controller pod configuration.

initial:
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: web-app
      namespace: production
      labels:
        app: web-app
        tier: frontend
    spec:
      replicas: 4
      selector:
        matchLabels:
          app: web-app
      template:
        metadata:
          labels:
            app: web-app
            tier: frontend
        spec:
          containers:
          - name: web
            image: registry.example.com/web-app:v2.0.0
            ports:
            - containerPort: 3000
              name: http
            livenessProbe:
              httpGet:
                path: /health
                port: 3000
              initialDelaySeconds: 10
              periodSeconds: 15
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: web-app
      namespace: production
    spec:
      selector:
        app: web-app
      ports:
      - name: http
        port: 80
        targetPort: 3000
  k8s/base/ingress-class.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: IngressClass
    metadata:
      name: nginx-internal
      annotations:
        ingressclass.kubernetes.io/is-default-class: "false"
    spec:
      controller: k8s.io/ingress-nginx
  k8s/base/ingress.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: web-app-ingress
      namespace: production
      annotations:
        nginx.ingress.kubernetes.io/ssl-redirect: "true"
    spec:
      rules:
      - host: app.example.com
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 80
  k8s/base/configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: web-app-config
      namespace: production
    data:
      API_URL: https://api.example.com
      FEATURE_FLAGS: '{"darkMode": true, "analytics": true}'
  k8s/base/hpa.yaml: |
    apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      name: web-frontend-hpa
      namespace: production
    spec:
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: web-app
      minReplicas: 3
      maxReplicas: 10
      metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
  k8s/certs/web-app-certificate.yaml: |
    apiVersion: cert-manager.io/v1
    kind: Certificate
    metadata:
      name: web-app-tls
      namespace: production
    spec:
      secretName: web-app-tls
      issuerRef:
        name: letsencrypt-prod
        kind: ClusterIssuer
      dnsNames:
      - app.example.com
      renewBefore: 720h
  k8s/controllers/nginx-ingress-deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: nginx-ingress-controller
      namespace: ingress-nginx
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: nginx-ingress
      template:
        metadata:
          labels:
            app: nginx-ingress
        spec:
          containers:
          - name: controller
            image: registry.k8s.io/ingress-nginx/controller:v1.9.4
            args:
            - /nginx-ingress-controller
            - --ingress-class=nginx-internal
            - --election-id=ingress-controller
            ports:
            - containerPort: 80
            - containerPort: 443

changed:
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: web-app
      namespace: production
      labels:
        app: web-app
        tier: frontend
    spec:
      replicas: 4
      selector:
        matchLabels:
          app: web-app
      template:
        metadata:
          labels:
            app: web-app
            tier: frontend
        spec:
          containers:
          - name: web
            image: registry.example.com/web-app:v2.0.0
            ports:
            - containerPort: 3000
              name: http
