must_include_files:
  - k8s/base/ingress.yaml

must_include_content_from:
  k8s/base/ingress.yaml:
    - 'nginx.ingress.kubernetes.io/proxy-buffer-size: "16k"'
    - "ingressClassName: nginx-internal"
    - "secretName: web-app-tls"

must_not_include:
  # --- deployment: backend container details not needed for ingress review ---
  - "web-app:v2.0.0"
  - "containerPort: 3000"
  # --- configmap: app config, no ingress dependency ---
  - FEATURE_FLAGS
  - darkMode
  # --- hpa: scaling config, shares app label but no ingress dep ---
  - web-frontend-hpa
  - averageUtilization
  # --- certificate: HARD TRAP — creates the web-app-tls secret, but issuer
  #     details don't help review ingress annotations ---
  - letsencrypt-prod
  - ClusterIssuer
  - "renewBefore: 720h"
  # --- nginx controller: HARD TRAP — runs the ingress-nginx controller,
  #     but pod spec doesn't help review ingress resource config ---
  - nginx-ingress-controller
  - "controller:v1.9.4"
  - election-id

must_not_include_files:
  - k8s/base/deployment.yaml
  - k8s/base/configmap.yaml
  - k8s/base/hpa.yaml
  - k8s/certs/web-app-certificate.yaml
  - k8s/controllers/nginx-ingress-deployment.yaml

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
