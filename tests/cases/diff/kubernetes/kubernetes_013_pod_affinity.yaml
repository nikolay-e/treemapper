# Scenario: Web-app deployment adds podAffinity to co-locate with cache and podAntiAffinity to spread across zones
# Changed: k8s/apps/web/deployment.yaml adds affinity block with required podAffinity and preferred podAntiAffinity
# Reviewer questions: Is requiredDuringScheduling too strict — will pods fail if no cache is co-located? Is zone topology correct?
# Trap 1: k8s/apps/cache/service.yaml — cache service definition, shares "cache" label but no dep on web affinity
# Trap 2: k8s/infra/node-labels.yaml — node labeling job, shares topology vocabulary but no dep
initial:
  k8s/apps/web/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: web-app
      namespace: production
      labels:
        app: web-app
        tier: frontend
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: web-app
      template:
        metadata:
          labels:
            app: web-app
            tier: frontend
        spec:
          containers:
          - name: web
            image: web-app:v1.0.0
            ports:
            - containerPort: 3000
            env:
            - name: CACHE_URL
              value: "redis://cache.production.svc.cluster.local:6379"
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
  k8s/apps/cache/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: cache
      namespace: production
      labels:
        app: cache
        tier: caching
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: cache
      template:
        metadata:
          labels:
            app: cache
            tier: caching
        spec:
          containers:
          - name: redis
            image: redis:7-alpine
            ports:
            - containerPort: 6379
  k8s/apps/cache/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: cache
      namespace: production
    spec:
      selector:
        app: cache
      ports:
      - port: 6379
        targetPort: 6379
  k8s/infra/node-labels.yaml: |
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: label-gpu-nodes
      namespace: kube-system
    spec:
      template:
        spec:
          serviceAccountName: node-labeler
          containers:
          - name: labeler
            image: bitnami/kubectl:1.28
            command:
            - /bin/sh
            - -c
            - kubectl label nodes --selector=node.kubernetes.io/instance-type=p3.2xlarge accelerator=nvidia-v100 --overwrite
          restartPolicy: Never
changed:
  k8s/apps/web/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: web-app
      namespace: production
      labels:
        app: web-app
        tier: frontend
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: web-app
      template:
        metadata:
          labels:
            app: web-app
            tier: frontend
        spec:
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app: cache
                topologyKey: kubernetes.io/hostname
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
              - weight: 100
                podAffinityTerm:
                  labelSelector:
                    matchLabels:
                      app: web-app
                  topologyKey: topology.kubernetes.io/zone
          containers:
          - name: web
            image: web-app:v1.0.0
            ports:
            - containerPort: 3000
            env:
            - name: CACHE_URL
              value: "redis://cache.production.svc.cluster.local:6379"
            resources:
              requests:
                memory: "128Mi"
                cpu: "100m"
              limits:
                memory: "256Mi"
                cpu: "200m"
  k8s/apps/cache/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: cache
      namespace: production
      labels:
        app: cache
        tier: caching
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: cache
      template:
        metadata:
          labels:
            app: cache
            tier: caching
        spec:
          containers:
          - name: redis
            image: redis:7-alpine
            ports:
            - containerPort: 6379
  k8s/apps/cache/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: cache
      namespace: production
    spec:
      selector:
        app: cache
      ports:
      - port: 6379
        targetPort: 6379
  k8s/infra/node-labels.yaml: |
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: label-gpu-nodes
      namespace: kube-system
    spec:
      template:
        spec:
          serviceAccountName: node-labeler
          containers:
          - name: labeler
            image: bitnami/kubectl:1.28
            command:
            - /bin/sh
            - -c
            - kubectl label nodes --selector=node.kubernetes.io/instance-type=p3.2xlarge accelerator=nvidia-v100 --overwrite
          restartPolicy: Never
must_include_files:
- k8s/apps/web/deployment.yaml
must_include_content_from:
  k8s/apps/web/deployment.yaml:
  - 'requiredDuringSchedulingIgnoredDuringExecution:'
  - 'topologyKey: kubernetes.io/hostname'
must_not_include:
- label-gpu-nodes
- node-labeler
- nvidia-v100
must_not_include_files:
- k8s/apps/cache/service.yaml
- k8s/infra/node-labels.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
