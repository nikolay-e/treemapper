# Scenario: PDB strengthened — minAvailable raised to 3, maxUnavailable=1,
#   unhealthyPodEvictionPolicy added. Only k8s/apps/pdb.yaml is changed.
#
# Diff shows:
#   - minAvailable: 1  ->  + minAvailable: 3
#   + maxUnavailable: 1
#   + unhealthyPodEvictionPolicy: IfHealthyBudget
#   + labels: app: critical-api
#
# Reviewer questions:
#   Q1: "With 5 replicas and minAvailable=3, is maxUnavailable=1 redundant?"
#       -> Needs k8s/apps/deployment.yaml: replicas: 5, maxSurge: 2,
#          maxUnavailable: 0. With 5 replicas and minAvailable: 3,
#          at most 2 pods can be disrupted. Adding maxUnavailable: 1
#          further constrains to 1 — more conservative. Reviewer must
#          verify the math: min(5-3, 1) = 1 effective disruption budget.
#
#   Q2: "Is IfHealthyBudget the right eviction policy?"
#       -> Pure config review: IfHealthyBudget only evicts unhealthy pods
#          when the PDB budget is satisfied. Conservative choice.
#
# Not needed for comprehension:
#   - k8s/infra/priority-class.yaml: PriorityClass named "critical-workload"
#     with value 1000000. Shares "critical" naming vocabulary. But
#     PriorityClass controls scheduling preemption priority, not disruption
#     budgets. No dependency on PDB configuration.
#
#   - k8s/apps/hpa.yaml: HPA targeting same deployment (critical-api) with
#     minReplicas: 5, maxReplicas: 20. Direct structural edge: targets the
#     same deployment, and HPA scaling interacts with PDB (can't scale down
#     below minAvailable). HARDEST TRAP: HPA minReplicas affects PDB math.
#     But the reviewer needs the deployment replicas to verify PDB math,
#     not the HPA — the PDB constrains node drains, not autoscaler decisions.
max_enrichment: 16.0
initial:
  k8s/apps/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: critical-api
      namespace: production
      labels:
        app: critical-api
        tier: backend
    spec:
      replicas: 5
      selector:
        matchLabels:
          app: critical-api
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 2
          maxUnavailable: 0
      template:
        metadata:
          labels:
            app: critical-api
            tier: backend
        spec:
          topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app: critical-api
          containers:
          - name: api
            image: critical-api:v1.0.0
            ports:
            - containerPort: 8080
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  k8s/apps/pdb.yaml: |
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: critical-api-pdb
      namespace: production
    spec:
      minAvailable: 1
      selector:
        matchLabels:
          app: critical-api
  k8s/apps/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: critical-api
      namespace: production
    spec:
      selector:
        app: critical-api
      ports:
      - port: 80
        targetPort: 8080
  k8s/infra/priority-class.yaml: |
    apiVersion: scheduling.k8s.io/v1
    kind: PriorityClass
    metadata:
      name: critical-workload
    value: 1000000
    globalDefault: false
    preemptionPolicy: PreemptLowerPriority
    description: "Priority class for critical production workloads"
  k8s/apps/hpa.yaml: |
    apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      name: critical-api-hpa
      namespace: production
    spec:
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: critical-api
      minReplicas: 5
      maxReplicas: 20
      metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 60
changed:
  k8s/apps/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: critical-api
      namespace: production
      labels:
        app: critical-api
        tier: backend
    spec:
      replicas: 5
      selector:
        matchLabels:
          app: critical-api
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 2
          maxUnavailable: 0
      template:
        metadata:
          labels:
            app: critical-api
            tier: backend
        spec:
          topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app: critical-api
          containers:
          - name: api
            image: critical-api:v1.0.0
            ports:
            - containerPort: 8080
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  k8s/apps/pdb.yaml: |
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: critical-api-pdb
      namespace: production
      labels:
        app: critical-api
    spec:
      minAvailable: 3
      selector:
        matchLabels:
          app: critical-api
      maxUnavailable: 1
      unhealthyPodEvictionPolicy: IfHealthyBudget
  k8s/apps/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: critical-api
      namespace: production
    spec:
      selector:
        app: critical-api
      ports:
      - port: 80
        targetPort: 8080
  k8s/infra/priority-class.yaml: |
    apiVersion: scheduling.k8s.io/v1
    kind: PriorityClass
    metadata:
      name: critical-workload
    value: 1000000
    globalDefault: false
    preemptionPolicy: PreemptLowerPriority
    description: "Priority class for critical production workloads"
  k8s/apps/hpa.yaml: |
    apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      name: critical-api-hpa
      namespace: production
    spec:
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: critical-api
      minReplicas: 5
      maxReplicas: 20
      metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 60
must_include_files:
  - k8s/apps/pdb.yaml
  # Q1: Deployment replicas needed to verify PDB math (5 replicas - 3 minAvailable = 2 budget).
  - k8s/apps/deployment.yaml
must_include_content_from:
  k8s/apps/pdb.yaml:
    - 'minAvailable: 3'
    - 'unhealthyPodEvictionPolicy: IfHealthyBudget'
    - 'maxUnavailable: 1'
  k8s/apps/deployment.yaml:
    - 'replicas: 5'
must_not_include:
  # --- priority-class.yaml: shares "critical" naming, different concern ---
  - critical-workload
  - PriorityClass
  - PreemptLowerPriority
  # --- hpa.yaml: targets same deployment, but scaling != disruption budget ---
  - critical-api-hpa
  - HorizontalPodAutoscaler
  - averageUtilization
must_not_include_files:
  - k8s/infra/priority-class.yaml
  - k8s/apps/hpa.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
