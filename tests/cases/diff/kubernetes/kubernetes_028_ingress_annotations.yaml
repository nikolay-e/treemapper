              Path          /var/log/containers/*.log
          [OUTPUT]
              Name          es
              Host          elasticsearch.logging.svc
              Port          9200
    k8s/monitoring/prometheus-rules.yaml: |
      apiVersion: monitoring.coreos.com/v1
      kind: PrometheusRule
      metadata:
        name: frontend-alerts
        namespace: monitoring
      spec:
