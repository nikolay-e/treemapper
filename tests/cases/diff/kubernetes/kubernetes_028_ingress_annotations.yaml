        }

must_include_files:
  - k8s/base/ingress.yaml

must_include_content_from:
  k8s/base/ingress.yaml:
    - 'nginx.ingress.kubernetes.io/rewrite-target: /'
    - 'nginx.ingress.kubernetes.io/proxy-read-timeout: "300"'
    - 'nginx.ingress.kubernetes.io/enable-cors: "true"'

must_not_include:
  # --- deployment: container details not needed for annotation review ---
  - "web-frontend:v3.0.0"
  - "containerPort: 3000"
  # --- hpa: scaling policy, shares app but no annotation dep ---
  - web-frontend-hpa
  - averageUtilization
  # --- fluentbit: logging infra, different namespace ---
  - fluent-bit-config
  - elasticsearch.logging.svc
  # --- prometheus rules: alerting, shares "frontend" naming ---
  - HighErrorRate
  - PrometheusRule
  - frontend-alerts
  # --- cors policy: HARD TRAP — app-level CORS config, but ingress CORS
  #     is configured via annotations, not this ConfigMap ---
  - cors-allowed-origins
  - allowed_methods
  - "max_age"

must_not_include_files:
  - k8s/base/deployment.yaml
  - k8s/base/hpa.yaml
  - k8s/monitoring/fluentbit-config.yaml
  - k8s/monitoring/prometheus-rules.yaml
  - k8s/security/cors-policy.yaml

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
