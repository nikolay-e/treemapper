# Scenario: Ingress gets nginx annotations for rewrite, SSL, CORS, proxy
#   timeouts, body size, and rate limiting — all at once.
#
# Diff shows:
#   + rewrite-target, ssl-redirect, proxy-body-size, proxy timeouts
#   + enable-cors with cors-allow-origin
#   + rate-limit and rate-limit-window
#
# Reviewer questions:
#   Q1: "Is rewrite-target: / correct for the single path rule?"
#       -> The ingress has pathType: Prefix with path: / — rewrite-target: /
#          means all paths are forwarded as-is. This is internally consistent.
#
#   Q2: "Does the backend service exist and match the ingress rule?"
#       -> Needs k8s/base/service.yaml: service web-frontend on port 80
#          targeting 3000, confirming the ingress backend port number: 80.
#
#   Q3: "Are proxy timeouts consistent with each other?"
#       -> connect=60, read=300, send=300 — read/send match, connect is lower.
#          This is a common pattern for long-running requests.
#
# Not needed for comprehension:
#   - k8s/base/deployment.yaml: The web-frontend deployment with port 3000.
#     Direct structural edge (ingress -> service -> deployment). But the
#     ingress annotations concern nginx proxy behavior, not container config.
#
#   - k8s/base/hpa.yaml: HPA targeting web-frontend deployment. Same namespace
#     and same app. But scaling policy is unrelated to nginx proxy annotations.
#
#   - k8s/monitoring/fluentbit-config.yaml: Fluent Bit logging config in
#     logging namespace. Shares Kubernetes/observability vocabulary but
#     no reference from the ingress.
#
#   - k8s/monitoring/prometheus-rules.yaml: PrometheusRule for frontend alerts.
#     Shares "frontend" naming and HTTP vocabulary (http_requests_total).
#     But alerting rules don't help review ingress annotation correctness.
#
#   - k8s/security/cors-policy.yaml: A ConfigMap defining CORS origins for
#     the API. HARD TRAP: the ingress adds enable-cors and cors-allow-origin
#     annotations, and this file lists allowed origins. But nginx ingress
#     CORS is configured entirely via annotations — the ConfigMap is for
#     application-level CORS, a separate concern.

initial:
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: web-frontend
      namespace: production
      labels:
        app: web-frontend
        component: frontend
    spec:
      replicas: 5
      selector:
        matchLabels:
          app: web-frontend
      template:
        metadata:
          labels:
            app: web-frontend
            component: frontend
        spec:
          containers:
          - name: frontend
            image: registry.example.com/web-frontend:v3.0.0
            ports:
            - containerPort: 3000
              name: http
            readinessProbe:
              httpGet:
                path: /health
                port: 3000
              initialDelaySeconds: 5
              periodSeconds: 10
            resources:
              requests:
                memory: "256Mi"
                cpu: "200m"
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: web-frontend
      namespace: production
    spec:
      selector:
        app: web-frontend
      ports:
      - name: http
        port: 80
        targetPort: 3000
  k8s/base/ingress.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: web-ingress
      namespace: production
    spec:
      rules:
      - host: www.example.com
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-frontend
                port:
                  number: 80
  k8s/base/hpa.yaml: |
    apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      name: web-frontend-hpa
      namespace: production
    spec:
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: web-frontend
      minReplicas: 3
      maxReplicas: 10
      metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
  k8s/monitoring/fluentbit-config.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: fluent-bit-config
      namespace: logging
    data:
      fluent-bit.conf: |
        [SERVICE]
            Flush         5
            Daemon        Off
            Log_Level     info
        [INPUT]
            Name          tail
            Path          /var/log/containers/*.log
        [OUTPUT]
            Name          es
            Host          elasticsearch.logging.svc
            Port          9200
  k8s/monitoring/prometheus-rules.yaml: |
    apiVersion: monitoring.coreos.com/v1
    kind: PrometheusRule
    metadata:
      name: frontend-alerts
      namespace: monitoring
    spec:
      groups:
      - name: frontend.rules
        rules:
        - alert: HighErrorRate
          expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
          for: 5m
          labels:
            severity: warning
  k8s/security/cors-policy.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: cors-allowed-origins
      namespace: production
    data:
      origins.json: |
        {
          "allowed_origins": [
            "https://example.com",
            "https://www.example.com",
            "https://admin.example.com"
          ],
          "allowed_methods": ["GET", "POST", "PUT", "DELETE"],
          "max_age": 86400
        }

