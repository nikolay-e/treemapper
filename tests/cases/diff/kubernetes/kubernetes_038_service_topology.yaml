# Scenario: Cache service gains topology-aware routing with annotation and
# topologyKeys for hostname/zone/region preference.
# Reviewer asks: "Is topology-aware routing configured correctly for the cache?"
# Trap rationale: pod-topology-spread.yaml and node-affinity.yaml share
# topology vocabulary but define scheduling constraints, not service routing.

max_enrichment: 17.0
initial:
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: cache-service
      namespace: production
      labels:
        app: cache-service
        tier: cache
    spec:
      replicas: 6
      selector:
        matchLabels:
          app: cache-service
      template:
        metadata:
          labels:
            app: cache-service
            tier: cache
        spec:
          topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app: cache-service
          containers:
          - name: cache
            image: registry.example.com/cache-service:v1.5.0
            ports:
            - containerPort: 6379
              name: redis
            - containerPort: 9121
              name: metrics
            resources:
              requests:
                memory: "1Gi"
                cpu: "500m"
              limits:
                memory: "2Gi"
                cpu: "1000m"
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: cache-service
      namespace: production
      labels:
        app: cache-service
    spec:
      selector:
        app: cache-service
      ports:
      - name: redis
        port: 6379
        targetPort: 6379
      - name: metrics
        port: 9121
        targetPort: 9121
  k8s/base/pdb.yaml: |
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: cache-service-pdb
      namespace: production
    spec:
      minAvailable: 4
      selector:
        matchLabels:
          app: cache-service
  k8s/base/servicemonitor.yaml: |
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: cache-service
      namespace: production
    spec:
      selector:
        matchLabels:
          app: cache-service
      endpoints:
      - port: metrics
        interval: 15s
  k8s/scheduling/pod-topology-spread.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: default-topology-constraints
      namespace: kube-system
    data:
      constraints: |
        defaultConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
  k8s/scheduling/node-affinity.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: node-affinity-defaults
      namespace: kube-system
    data:
      preferred-zones: us-east-1a,us-east-1b,us-east-1c
      required-instance-types: m5.xlarge,m5.2xlarge,r5.xlarge
      anti-affinity-label: topology.kubernetes.io/zone
  cdk8s/main.ts: |
    import { App } from 'cdk8s';
    const app = new App();
changed:
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: cache-service
      namespace: production
      labels:
        app: cache-service
        tier: cache
    spec:
      replicas: 6
      selector:
        matchLabels:
          app: cache-service
      template:
        metadata:
          labels:
            app: cache-service
            tier: cache
        spec:
          topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: DoNotSchedule
            labelSelector:
              matchLabels:
                app: cache-service
          containers:
          - name: cache
            image: registry.example.com/cache-service:v1.5.0
            ports:
            - containerPort: 6379
              name: redis
            - containerPort: 9121
              name: metrics
            resources:
              requests:
                memory: "1Gi"
                cpu: "500m"
              limits:
                memory: "2Gi"
                cpu: "1000m"
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: cache-service
      namespace: production
      labels:
        app: cache-service
      annotations:
        service.kubernetes.io/topology-aware-hints: "auto"
    spec:
      selector:
        app: cache-service
      ports:
      - name: redis
        port: 6379
        targetPort: 6379
      - name: metrics
        port: 9121
        targetPort: 9121
      topologyKeys:
      - "kubernetes.io/hostname"
      - "topology.kubernetes.io/zone"
      - "topology.kubernetes.io/region"
      - "*"
  k8s/base/pdb.yaml: |
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: cache-service-pdb
      namespace: production
    spec:
      minAvailable: 4
      selector:
        matchLabels:
          app: cache-service
  k8s/base/servicemonitor.yaml: |
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: cache-service
      namespace: production
    spec:
      selector:
        matchLabels:
          app: cache-service
      endpoints:
      - port: metrics
        interval: 15s
  k8s/scheduling/pod-topology-spread.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: default-topology-constraints
      namespace: kube-system
    data:
      constraints: |
        defaultConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
        - maxSkew: 2
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
  k8s/scheduling/node-affinity.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: node-affinity-defaults
      namespace: kube-system
    data:
      preferred-zones: us-east-1a,us-east-1b,us-east-1c
      required-instance-types: m5.xlarge,m5.2xlarge,r5.xlarge
      anti-affinity-label: topology.kubernetes.io/zone
  cdk8s/main.ts: |
    import { App } from 'cdk8s';
    const app = new App();
must_include_files:
- k8s/base/service.yaml
must_include_content:
- 'service.kubernetes.io/topology-aware-hints: "auto"'
must_not_include:
- default-topology-constraints
- node-affinity-defaults
- pod-topology-spread.yaml
- node-affinity.yaml
must_not_include_files:
- k8s/scheduling/pod-topology-spread.yaml
- k8s/scheduling/node-affinity.yaml
add_garbage_files: false
skip_garbage_check: true
