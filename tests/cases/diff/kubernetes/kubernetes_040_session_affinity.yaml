# Scenario: Service gains sessionAffinity: ClientIP with 1-hour timeout and
#   annotation for session tracking on a stateful web app. Only service.yaml is changed.
#
# Diff shows:
#   + sessionAffinity: ClientIP with timeoutSeconds: 3600
#   + annotation service.kubernetes.io/session-affinity: "ClientIP"
#
# Reviewer questions:
#   Q1: "Does the deployment use in-memory sessions that need affinity?"
#       -> Needs k8s/base/deployment.yaml: env SESSION_STORE=memory and
#          SESSION_TIMEOUT=3600, plus emptyDir volume for session data.
#          Confirms the app stores sessions locally, so affinity is needed.
#
#   Q2: "Is 3600s timeout consistent with the app's session timeout?"
#       -> Deployment has SESSION_TIMEOUT=3600. The service timeoutSeconds
#          matches. Reviewer can verify consistency.
#
#   Q3: "Does the ingress already have cookie-based affinity — is this redundant?"
#       -> Needs k8s/base/ingress.yaml: nginx annotations with
#          affinity: cookie and session-cookie-name: INGRESSCOOKIE.
#          Reviewer can assess whether L4 (ClientIP) and L7 (cookie)
#          affinity should coexist or if one is redundant.
#
# Not needed for comprehension:
#   - k8s/base/pdb.yaml: PDB for the same app with minAvailable: 3.
#     Shares app: stateful-web-app label. But pod disruption budget is
#     about availability during eviction, not session routing.
#
#   - k8s/cache/redis-sentinel.yaml: Redis Sentinel StatefulSet.
#     HARD TRAP: the app uses SESSION_STORE=memory, implying it COULD
#     use Redis for sessions. Redis is a common session store, and
#     sharing "session" vocabulary makes it a strong distractor. But
#     the app explicitly uses in-memory sessions — Redis is unrelated
#     infrastructure in a different namespace.
#
#   - k8s/cache/memcached-pool.yaml: Memcached deployment in cache
#     namespace. Another session/cache infrastructure distractor. Same
#     reasoning: the app doesn't use external caching for sessions.
#
#   - k8s/base/hpa.yaml: HPA for the same app, same label selector.
#     HARD TRAP: scaling decisions directly affect session affinity —
#     new pods won't have existing sessions. But HPA config (min/max
#     replicas, CPU threshold) doesn't help review whether the
#     sessionAffinity setting is correct or consistent with the app.
#
#   - k8s/monitoring/servicemonitor.yaml: Prometheus ServiceMonitor
#     selecting the same service (stateful-web-app) by label. Shares
#     exact label selector and namespace. But metrics scraping config
#     doesn't affect session routing behavior.

max_enrichment: 32.7
initial:
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: stateful-web-app
      namespace: production
      labels:
        app: stateful-web-app
        tier: frontend
    spec:
      replicas: 5
      selector:
        matchLabels:
          app: stateful-web-app
      template:
        metadata:
          labels:
            app: stateful-web-app
            tier: frontend
        spec:
          containers:
          - name: webapp
            image: registry.example.com/stateful-web-app:v2.5.0
            ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
            env:
            - name: SESSION_STORE
              value: "memory"
            - name: SESSION_TIMEOUT
              value: "3600"
            volumeMounts:
            - name: session-data
              mountPath: /app/sessions
            resources:
              requests:
                memory: "512Mi"
                cpu: "500m"
              limits:
                memory: "1Gi"
                cpu: "1000m"
          volumes:
          - name: session-data
            emptyDir: {}
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: stateful-web-app
      namespace: production
      labels:
        app: stateful-web-app
    spec:
      selector:
        app: stateful-web-app
      ports:
      - name: http
        port: 80
        targetPort: 8080
      - name: https
        port: 443
        targetPort: 8443
  k8s/base/ingress.yaml: |
    apiVersion: networking.k8s.io/v1
    kind: Ingress
    metadata:
      name: stateful-web-app
      namespace: production
      annotations:
        nginx.ingress.kubernetes.io/affinity: "cookie"
        nginx.ingress.kubernetes.io/session-cookie-name: "INGRESSCOOKIE"
    spec:
      ingressClassName: nginx
      rules:
      - host: app.example.com
        http:
          paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: stateful-web-app
                port:
                  number: 80
  k8s/base/pdb.yaml: |
    apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: stateful-web-app-pdb
      namespace: production
    spec:
      minAvailable: 3
      selector:
        matchLabels:
          app: stateful-web-app
  k8s/base/hpa.yaml: |
    apiVersion: autoscaling/v2
    kind: HorizontalPodAutoscaler
    metadata:
      name: stateful-web-app-hpa
      namespace: production
    spec:
      scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: stateful-web-app
      minReplicas: 3
      maxReplicas: 10
      metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
  k8s/monitoring/servicemonitor.yaml: |
    apiVersion: monitoring.coreos.com/v1
    kind: ServiceMonitor
    metadata:
      name: stateful-web-app-monitor
      namespace: monitoring
      labels:
        app: stateful-web-app
    spec:
      namespaceSelector:
        matchNames:
        - production
      selector:
        matchLabels:
          app: stateful-web-app
      endpoints:
      - port: http
        path: /metrics
        interval: 30s
  k8s/cache/redis-sentinel.yaml: |
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: redis-sentinel
      namespace: cache
    spec:
      serviceName: redis-sentinel
      replicas: 3
      selector:
        matchLabels:
          app: redis-sentinel
      template:
        spec:
          containers:
          - name: redis
            image: redis:7-alpine
            ports:
            - containerPort: 26379
              name: sentinel
            command:
            - redis-sentinel
            - /etc/redis/sentinel.conf
  k8s/cache/memcached-pool.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: memcached-pool
      namespace: cache
    spec:
      replicas: 4
      selector:
        matchLabels:
          app: memcached
      template:
        spec:
          containers:
          - name: memcached
            image: memcached:1.6-alpine
            ports:
            - containerPort: 11211
            args:
            - -m 512
            - -c 1024
            resources:
              limits:
                memory: "768Mi"

