must_include_files:
  - k8s/base/service.yaml
  # Q1+Q2: deployment has SESSION_STORE=memory and SESSION_TIMEOUT=3600.
  # Reviewer must verify the app actually uses in-memory sessions (justifying
  # affinity) and that the timeout values match between service and app.
  - k8s/base/deployment.yaml
  # Q3: ingress already has cookie-based affinity. Reviewer must assess
  # whether L4 (ClientIP) and L7 (cookie) affinity should coexist.
  - k8s/base/ingress.yaml

must_include_content_from:
  k8s/base/service.yaml:
    - 'service.kubernetes.io/session-affinity: "ClientIP"'
    - "sessionAffinity: ClientIP"
    - "timeoutSeconds: 3600"
  k8s/base/deployment.yaml:
    - 'value: "memory"'
    - 'value: "3600"'
  k8s/base/ingress.yaml:
    - 'nginx.ingress.kubernetes.io/affinity: "cookie"'
    - 'nginx.ingress.kubernetes.io/session-cookie-name: "INGRESSCOOKIE"'

must_not_include:
  # --- pdb: availability config, not session routing ---
  - stateful-web-app-pdb
  - PodDisruptionBudget
  - "minAvailable: 3"
  # --- hpa: HARD TRAP — targets the same Deployment (stateful-web-app),
  #     same namespace (production). Scaling decisions DO affect session
  #     affinity (new pods won't have sessions), but HPA's min/max replicas
  #     and CPU threshold don't help review whether the sessionAffinity
  #     setting is correct or consistent with the app's session config. ---
  - stateful-web-app-hpa
  - HorizontalPodAutoscaler
  - "averageUtilization: 70"
  # --- servicemonitor: HARD TRAP — selects the same service by label
  #     (app: stateful-web-app), same namespace. But Prometheus scraping
  #     config doesn't affect session routing behavior. ---
  - stateful-web-app-monitor
  - ServiceMonitor
  - "/metrics"
  # --- redis sentinel: HARD TRAP — common session store, but app uses
  #     in-memory sessions. Different namespace, different concern ---
  - redis-sentinel
  - sentinel.conf
  - "containerPort: 26379"
  # --- memcached: another cache distractor ---
  - memcached-pool
  - "memcached:1.6-alpine"
  - "containerPort: 11211"

must_not_include_files:
  - k8s/base/pdb.yaml
  - k8s/base/hpa.yaml
  - k8s/monitoring/servicemonitor.yaml
  - k8s/cache/redis-sentinel.yaml
  - k8s/cache/memcached-pool.yaml

max_fragments: 8
max_files: 4
add_garbage_files: false
