must_include_files:
- k8s/base/service.yaml
must_include_content:
- 'prometheus.io/scrape: "true"'
must_not_include:
- default-sidecar
- grpc-health-check
- servicemesh-sidecar.yaml
- grpc-health-probe.yaml
must_not_include_files:
- k8s/mesh/servicemesh-sidecar.yaml
- k8s/tools/grpc-health-probe.yaml
add_garbage_files: false
skip_garbage_check: true
