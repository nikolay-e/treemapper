must_include_files:
- k8s/apps/web-frontend/deployment.yaml
must_include_content_from:
  k8s/apps/web-frontend/deployment.yaml:
  - 'replicas: 5'
must_not_include:
- cluster-autoscaler
- scale-down-delay
- web-frontend-netpol
- ingress-nginx
must_not_include_files:
- k8s/infra/cluster-autoscaler.yaml
- k8s/apps/web-frontend/network-policy.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
