# Scenario: Deployment gains custom dnsPolicy: None with explicit nameservers,
#   search domains, and resolver options (ndots, timeout, rotate).
#
# Diff shows:
#   + dnsPolicy: None
#   + dnsConfig with nameservers [8.8.8.8, 8.8.4.4, 1.1.1.1]
#   + searches [production.svc.cluster.local, svc.cluster.local, cluster.local, example.com]
#   + options ndots=2, timeout=3, attempts=2, rotate
#
# Reviewer questions:
#   Q1: "Why override the default dnsPolicy — what does the app need?"
#       -> Needs k8s/base/deployment.yaml diff itself. The app has
#          RESOLVER_TIMEOUT and DNS_CACHE_TTL env vars, suggesting custom
#          DNS behavior is required by the application.
#
#   Q2: "Are the search domains correct for the production namespace?"
#       -> The diff includes production.svc.cluster.local as first search
#          domain, matching the deployment's namespace: production.
#
#   Q3: "Is ndots=2 safe — won't it cause excessive DNS queries?"
#       -> Pure configuration review. ndots=2 means names with fewer than 2
#          dots get search domain suffixes appended. Lower than default (5)
#          reduces DNS lookups for external names.
#
# Not needed for comprehension:
#   - k8s/base/service.yaml: Service for dns-test-app. Same namespace but
#     the DNS config change is about pod resolver settings, not service
#     discovery configuration.
#
#   - k8s/base/configmap.yaml: ConfigMap with LOG_LEVEL and ENABLE_DNS_LOGGING.
#     Shares DNS vocabulary. But the ConfigMap values don't affect the pod's
#     dnsConfig — they're application-level settings.
#
#   - k8s/base/serviceaccount.yaml: ServiceAccount for the deployment.
#     Same namespace, same app name. But service account configuration
#     is unrelated to DNS resolver settings.
#
#   - k8s/system/coredns-corefile.yaml: CoreDNS Corefile in kube-system.
#     HARD TRAP: the dnsPolicy: None bypasses cluster DNS (CoreDNS), and
#     this file configures CoreDNS. Understanding what CoreDNS does helps
#     explain WHY the override exists — but the reviewer needs to verify
#     the dnsConfig values, not CoreDNS internals.
#
#   - k8s/system/external-dns-config.yaml: ExternalDNS config for Cloudflare.
#     Shares "DNS" vocabulary extensively. But ExternalDNS manages DNS records
#     in cloud providers — completely different from pod DNS resolver config.

initial:
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: dns-test-app
      namespace: production
      labels:
        app: dns-test-app
        tier: backend
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: dns-test-app
      template:
        metadata:
          labels:
            app: dns-test-app
            tier: backend
        spec:
          containers:
          - name: app
            image: registry.example.com/dns-test-app:v1.0.0
            ports:
            - containerPort: 8080
              name: http
            env:
            - name: RESOLVER_TIMEOUT
              value: "5"
            - name: DNS_CACHE_TTL
              value: "30"
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: dns-test-app
      namespace: production
    spec:
      selector:
        app: dns-test-app
      ports:
      - name: http
        port: 80
        targetPort: 8080
  k8s/base/configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: dns-test-config
      namespace: production
    data:
      LOG_LEVEL: debug
      ENABLE_DNS_LOGGING: "true"
  k8s/base/serviceaccount.yaml: |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: dns-test-app
      namespace: production
    automountServiceAccountToken: true
  k8s/system/coredns-corefile.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: coredns
      namespace: kube-system
    data:
      Corefile: |
        .:53 {
            errors
            health
            kubernetes cluster.local in-addr.arpa ip6.arpa {
                pods insecure
                fallthrough in-addr.arpa ip6.arpa
            }
            forward . /etc/resolv.conf
            cache 30
            loop
            reload
            loadbalance
        }
  k8s/system/external-dns-config.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: external-dns-config
      namespace: external-dns
    data:
      provider: cloudflare
      domain-filter: example.com
      policy: sync
      registry: txt
      txt-owner-id: k8s-cluster-prod

changed:
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: dns-test-app
      namespace: production
      labels:
        app: dns-test-app
        tier: backend
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: dns-test-app
      template:
        metadata:
          labels:
            app: dns-test-app
            tier: backend
        spec:
          dnsPolicy: None
          dnsConfig:
            nameservers:
            - 8.8.8.8
            - 8.8.4.4
            - 1.1.1.1
            searches:
            - production.svc.cluster.local
            - svc.cluster.local
            - cluster.local
            - example.com
            options:
            - name: ndots
              value: "2"
            - name: timeout
              value: "3"
            - name: attempts
              value: "2"
            - name: rotate
          containers:
          - name: app
            image: registry.example.com/dns-test-app:v1.0.0
            ports:
            - containerPort: 8080
              name: http
            env:
            - name: RESOLVER_TIMEOUT
              value: "5"
            - name: DNS_CACHE_TTL
              value: "30"
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
              limits:
                memory: "512Mi"
                cpu: "500m"
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: dns-test-app
      namespace: production
    spec:
      selector:
        app: dns-test-app
      ports:
      - name: http
        port: 80
        targetPort: 8080
  k8s/base/configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: dns-test-config
      namespace: production
    data:
      LOG_LEVEL: debug
      ENABLE_DNS_LOGGING: "true"
  k8s/base/serviceaccount.yaml: |
    apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: dns-test-app
      namespace: production
    automountServiceAccountToken: true
  k8s/system/coredns-corefile.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: coredns
      namespace: kube-system
    data:
      Corefile: |
        .:53 {
            errors
            health
            kubernetes cluster.local in-addr.arpa ip6.arpa {
                pods insecure
                fallthrough in-addr.arpa ip6.arpa
            }
            forward . /etc/resolv.conf
            cache 30
            loop
            reload
            loadbalance
        }
  k8s/system/external-dns-config.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: external-dns-config
      namespace: external-dns
    data:
      provider: cloudflare
      domain-filter: example.com
      policy: sync
      registry: txt
      txt-owner-id: k8s-cluster-prod

must_include_files:
  - k8s/base/deployment.yaml

must_include_content_from:
  k8s/base/deployment.yaml:
    - "dnsPolicy: None"
    - "- 8.8.8.8"
    - "production.svc.cluster.local"
    - 'name: ndots'

must_not_include:
  # --- service: port mapping doesn't help review DNS resolver config ---
  - "targetPort: 8080"
  # --- configmap: app-level DNS logging config, not pod resolver ---
  - ENABLE_DNS_LOGGING
  - dns-test-config
  # --- serviceaccount: unrelated to DNS ---
  - automountServiceAccountToken
  # --- coredns: HARD TRAP — cluster DNS being bypassed by dnsPolicy: None,
  #     but CoreDNS internals don't help review the override values ---
  - Corefile
  - "pods insecure"
  - loadbalance
  # --- external-dns: DNS record management, not resolver config ---
  - txt-owner-id
  - domain-filter
  - external-dns-config

must_not_include_files:
  - k8s/base/service.yaml
  - k8s/base/configmap.yaml
  - k8s/base/serviceaccount.yaml
  - k8s/system/coredns-corefile.yaml
  - k8s/system/external-dns-config.yaml

max_fragments: 6
max_files: 2
add_garbage_files: false
skip_garbage_check: true
