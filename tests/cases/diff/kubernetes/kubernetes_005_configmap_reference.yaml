name: kubernetes_005_configmap_reference
repo:
  initial_files:
    k8s/base/configmap.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: app-config
        namespace: production
        labels:
          app: myapp
      data:
        LOG_LEVEL: info
        MAX_CONNECTIONS: "100"
        CACHE_TTL: "3600"
        FEATURE_FLAGS: |
          enable_new_ui=true
          enable_analytics=true
          beta_features=false
        config.yaml: |
          server:
            port: 8080
            host: 0.0.0.0
          logging:
            level: info
            format: json
    k8s/base/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: myapp
        namespace: production
        labels:
          app: myapp
          version: v1
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: myapp
        template:
          metadata:
            labels:
              app: myapp
              version: v1
          spec:
            containers:
            - name: app
              image: myapp:v1.0.0
              ports:
              - containerPort: 8080
              env: []
              volumeMounts:
              - name: config-volume
                mountPath: /app/config
                readOnly: true
            volumes:
            - name: config-volume
              configMap:
                name: app-config
                items:
                - key: config.yaml
                  path: config.yaml
    k8s/infra/coredns-config.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: coredns-custom
        namespace: kube-system
      data:
        custom.server: |
          example.local:53 {
              forward . 10.0.0.1
              cache 30
              log
          }
    k8s/apps/frontend/nginx-config.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: nginx-config
        namespace: production
      data:
        default.conf: |
          server {
              listen 80;
              server_name _;
              location / {
                  root /usr/share/nginx/html;
                  try_files $uri $uri/ /index.html;
              }
              location /api/ {
                  proxy_pass http://backend-api;
              }
          }
  changed_files:
    k8s/base/configmap.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: app-config
        namespace: production
        labels:
          app: myapp
      data:
        LOG_LEVEL: info
        MAX_CONNECTIONS: "100"
        CACHE_TTL: "3600"
        FEATURE_FLAGS: |
          enable_new_ui=true
          enable_analytics=true
          beta_features=false
        config.yaml: |
          server:
            port: 8080
            host: 0.0.0.0
          logging:
            level: info
            format: json
    k8s/base/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: myapp
        namespace: production
        labels:
          app: myapp
          version: v1
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: myapp
        template:
          metadata:
            labels:
              app: myapp
              version: v1
          spec:
            containers:
            - name: app
              image: myapp:v1.0.0
              ports:
              - containerPort: 8080
              env:
              - name: LOG_LEVEL
                valueFrom:
                  configMapKeyRef:
                    name: app-config
                    key: LOG_LEVEL
              - name: MAX_CONNECTIONS
                valueFrom:
                  configMapKeyRef:
                    name: app-config
                    key: MAX_CONNECTIONS
              - name: CACHE_TTL
                valueFrom:
                  configMapKeyRef:
                    name: app-config
                    key: CACHE_TTL
              volumeMounts:
              - name: config-volume
                mountPath: /app/config
                readOnly: true
            volumes:
            - name: config-volume
              configMap:
                name: app-config
                items:
                - key: config.yaml
                  path: config.yaml
    k8s/infra/coredns-config.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: coredns-custom
        namespace: kube-system
      data:
        custom.server: |
          example.local:53 {
              forward . 10.0.0.1
              cache 30
              log
          }
    k8s/apps/frontend/nginx-config.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: nginx-config
        namespace: production
      data:
        default.conf: |
          server {
              listen 80;
              server_name _;
              location / {
                  root /usr/share/nginx/html;
                  try_files $uri $uri/ /index.html;
              }
              location /api/ {
                  proxy_pass http://backend-api;
              }
          }
  commit_message: Update files
