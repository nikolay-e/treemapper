# Scenario: Deployment wires ConfigMap keys as env vars via configMapKeyRef.
#   Only k8s/base/deployment.yaml is changed.
#
# Diff shows:
#   - env: []  ->  + LOG_LEVEL, MAX_CONNECTIONS, CACHE_TTL from
#     configMapKeyRef app-config
#
# Reviewer questions:
#   Q1: "Do the ConfigMap keys LOG_LEVEL, MAX_CONNECTIONS, CACHE_TTL exist?"
#       -> Needs k8s/base/configmap.yaml: ConfigMap named app-config with
#          data keys LOG_LEVEL: info, MAX_CONNECTIONS: "100", CACHE_TTL: "3600".
#          The deployment references these exact keys. Without this, the
#          reviewer cannot verify the key names and values are correct.
#
#   Q2: "Does the existing config.yaml volume mount conflict with the new env vars?"
#       -> The deployment already mounts app-config as a volume at /app/config
#          for the config.yaml key. Adding individual env vars from the same
#          ConfigMap is redundant if the app also reads config.yaml. Pure
#          config review concern.
#
# Not needed for comprehension:
#   - k8s/infra/coredns-config.yaml: CoreDNS ConfigMap in kube-system
#     namespace. Shares "ConfigMap" resource type and YAML structure.
#     But CoreDNS is cluster DNS infrastructure — its configuration
#     (DNS forwarding rules) has no relation to application env vars.
#
#   - k8s/apps/frontend/nginx-config.yaml: nginx ConfigMap in production
#     namespace. Shares ConfigMap kind AND same namespace. HARDEST TRAP:
#     same namespace, same resource type, even has proxy_pass to backend-api
#     (related service). But nginx server config doesn't help review
#     whether the app-config key names match the deployment's env vars.
max_enrichment: 10.7
initial:
  k8s/base/configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: app-config
      namespace: production
      labels:
        app: myapp
    data:
      LOG_LEVEL: info
      MAX_CONNECTIONS: "100"
      CACHE_TTL: "3600"
      FEATURE_FLAGS: |
        enable_new_ui=true
        enable_analytics=true
        beta_features=false
      config.yaml: |
        server:
          port: 8080
          host: 0.0.0.0
        logging:
          level: info
          format: json
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: myapp
      namespace: production
      labels:
        app: myapp
        version: v1
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: myapp
      template:
        metadata:
          labels:
            app: myapp
            version: v1
        spec:
          containers:
          - name: app
            image: myapp:v1.0.0
            ports:
            - containerPort: 8080
            env: []
            volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
          volumes:
          - name: config-volume
            configMap:
              name: app-config
              items:
              - key: config.yaml
                path: config.yaml
  k8s/infra/coredns-config.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: coredns-custom
      namespace: kube-system
    data:
      custom.server: |
        example.local:53 {
            forward . 10.0.0.1
            cache 30
            log
        }
  k8s/apps/frontend/nginx-config.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: nginx-config
      namespace: production
    data:
      default.conf: |
        server {
            listen 80;
            server_name _;
            location / {
                root /usr/share/nginx/html;
                try_files $uri $uri/ /index.html;
            }
            location /api/ {
                proxy_pass http://backend-api;
            }
        }
changed:
  k8s/base/configmap.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: app-config
      namespace: production
      labels:
        app: myapp
    data:
      LOG_LEVEL: info
      MAX_CONNECTIONS: "100"
      CACHE_TTL: "3600"
      FEATURE_FLAGS: |
        enable_new_ui=true
        enable_analytics=true
        beta_features=false
      config.yaml: |
        server:
          port: 8080
          host: 0.0.0.0
        logging:
          level: info
          format: json
  k8s/base/deployment.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: myapp
      namespace: production
      labels:
        app: myapp
        version: v1
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: myapp
      template:
        metadata:
          labels:
            app: myapp
            version: v1
        spec:
          containers:
          - name: app
            image: myapp:v1.0.0
            ports:
            - containerPort: 8080
            env:
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: LOG_LEVEL
            - name: MAX_CONNECTIONS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MAX_CONNECTIONS
            - name: CACHE_TTL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: CACHE_TTL
            volumeMounts:
            - name: config-volume
              mountPath: /app/config
              readOnly: true
          volumes:
          - name: config-volume
            configMap:
              name: app-config
              items:
              - key: config.yaml
                path: config.yaml
  k8s/infra/coredns-config.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: coredns-custom
      namespace: kube-system
    data:
      custom.server: |
        example.local:53 {
            forward . 10.0.0.1
            cache 30
            log
        }
  k8s/apps/frontend/nginx-config.yaml: |
    apiVersion: v1
    kind: ConfigMap
    metadata:
      name: nginx-config
      namespace: production
    data:
      default.conf: |
        server {
            listen 80;
            server_name _;
            location / {
                root /usr/share/nginx/html;
                try_files $uri $uri/ /index.html;
            }
            location /api/ {
                proxy_pass http://backend-api;
            }
        }
must_include_files:
  - k8s/base/deployment.yaml
  # Q1: ConfigMap must have matching key names.
  - k8s/base/configmap.yaml
must_include_content_from:
  k8s/base/deployment.yaml:
    - '- name: LOG_LEVEL'
    - 'configMapKeyRef:'
    - 'key: MAX_CONNECTIONS'
    - 'key: CACHE_TTL'
  k8s/base/configmap.yaml:
    - 'name: app-config'
    - 'LOG_LEVEL: info'
    - 'MAX_CONNECTIONS: "100"'
    - 'CACHE_TTL: "3600"'
must_not_include:
  # --- coredns-config.yaml: cluster DNS, different namespace ---
  - coredns-custom
  - example.local
  - "forward . 10.0.0.1"
  # --- nginx-config.yaml: same namespace, different app config ---
  - nginx-config
  - proxy_pass
  - "server_name _"
must_not_include_files:
  - k8s/infra/coredns-config.yaml
  - k8s/apps/frontend/nginx-config.yaml
add_garbage_files: false
skip_garbage_check: true
max_fragments: 8
max_files: 5
