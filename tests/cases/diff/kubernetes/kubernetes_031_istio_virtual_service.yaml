# Scenario: Istio VirtualService gains canary routing — header match, path-prefix
#   match, weighted 90/10 split with retries and timeout.
#
# Diff shows:
#   + http routing rules: x-canary header -> v2, /api/v2 prefix -> v2
#   + default route: 90% v1, 10% v2 with retries (3 attempts, 2s per try)
#   + timeout: 10s on default route
#   + labels added to metadata
#
# Reviewer questions:
#   Q1: "Do subsets v1 and v2 exist in the DestinationRule?"
#       -> Needs k8s/base/destination-rule.yaml: defines subsets v1 (version: v1)
#          and v2 (version: v2) for host product-service. The VirtualService
#          routes to these subsets — reviewer must verify they match.
#
#   Q2: "Are the gateway names correct — does product-gateway exist?"
#       -> The VirtualService references gateways: product-gateway and mesh.
#          The gateway definition is a separate concern, but the name must match.
#
#   Q3: "Is the 90/10 split with 3 retries safe for canary?"
#       -> Pure config review: weights sum to 100, perTryTimeout < timeout/attempts.
#
# Not needed for comprehension:
#   - k8s/base/deployment-v1.yaml: v1 deployment with version: v1 label.
#     Direct structural edge (DestinationRule subset -> label -> deployment).
#     But the VirtualService references subsets by name, not deployment labels.
#     The reviewer needs the DestinationRule, not the deployment details.
#
#   - k8s/base/deployment-v2.yaml: v2 deployment. Same reasoning as v1.
#
#   - k8s/base/service.yaml: Service selecting app: product-service. The
#     VirtualService host: product-service references this service. But the
#     service config (port mapping) doesn't help review routing rules.
#
#   - k8s/gateway/ambassador-mapping.yaml: Ambassador Mapping for a DIFFERENT
#     service (catalog-service). Shares API gateway/routing vocabulary (timeout,
#     retry_policy). But different mesh API, different service entirely.
#
#   - k8s/gateway/kong-ingress.yaml: Kong ingress config for yet another
#     service (inventory). Shares routing vocabulary (strip_path, protocols).
#     But Kong and Istio are different mesh implementations.

max_enrichment: 4.1
initial:
  k8s/base/deployment-v1.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: product-service-v1
      namespace: production
      labels:
        app: product-service
        version: v1
    spec:
      replicas: 3
      selector:
        matchLabels:
          app: product-service
          version: v1
      template:
        metadata:
          labels:
            app: product-service
            version: v1
          annotations:
            sidecar.istio.io/inject: "true"
        spec:
          containers:
          - name: product
            image: registry.example.com/product-service:v1.0.0
            ports:
            - containerPort: 8080
              name: http
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
  k8s/base/deployment-v2.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: product-service-v2
      namespace: production
      labels:
        app: product-service
        version: v2
    spec:
      replicas: 2
      selector:
        matchLabels:
          app: product-service
          version: v2
      template:
        metadata:
          labels:
            app: product-service
            version: v2
          annotations:
            sidecar.istio.io/inject: "true"
        spec:
          containers:
          - name: product
            image: registry.example.com/product-service:v2.0.0
            ports:
            - containerPort: 8080
              name: http
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
  k8s/base/service.yaml: |
    apiVersion: v1
    kind: Service
    metadata:
      name: product-service
      namespace: production
    spec:
      selector:
        app: product-service
      ports:
      - name: http
        port: 80
        targetPort: 8080
  k8s/base/destination-rule.yaml: |
    apiVersion: networking.istio.io/v1beta1
    kind: DestinationRule
    metadata:
      name: product-service
      namespace: production
    spec:
      host: product-service
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 100
          http:
            h2UpgradePolicy: UPGRADE
      subsets:
      - name: v1
        labels:
          version: v1
      - name: v2
        labels:
          version: v2
  k8s/base/virtual-service.yaml: |
    apiVersion: networking.istio.io/v1beta1
    kind: VirtualService
    metadata:
      name: product-service
      namespace: production
    spec:
      hosts:
      - product-service
      - product.example.com
      gateways:
      - product-gateway
      - mesh
  k8s/gateway/ambassador-mapping.yaml: |
    apiVersion: getambassador.io/v3alpha1
    kind: Mapping
    metadata:
      name: catalog-service
      namespace: ambassador
    spec:
      hostname: catalog.example.com
      prefix: /api/catalog/
      service: catalog-service.catalog:80
      timeout_ms: 5000
      retry_policy:
        retry_on: 5xx
        num_retries: 3
  k8s/gateway/kong-ingress.yaml: |
    apiVersion: configuration.konghq.com/v1
    kind: KongIngress
    metadata:
      name: inventory-rate-limit
      namespace: kong
    proxy:
      protocol: http
      connect_timeout: 10000
    route:
      strip_path: true
      protocols:
      - https

changed:
  k8s/base/deployment-v1.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
