      template:
        metadata:
          labels:
            app: product-service
            version: v2
          annotations:
            sidecar.istio.io/inject: "true"
        spec:
          containers:
          - name: product
            image: registry.example.com/product-service:v2.0.0
            ports:
            - containerPort: 8080
              name: http
            resources:
              requests:
                memory: "256Mi"
                cpu: "250m"
