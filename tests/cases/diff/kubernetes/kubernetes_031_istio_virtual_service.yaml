    apiVersion: v1
    kind: Service
    metadata:
      name: product-service
      namespace: production
    spec:
      selector:
        app: product-service
      ports:
      - name: http
        port: 80
        targetPort: 8080
  k8s/base/destination-rule.yaml: |
    apiVersion: networking.istio.io/v1beta1
    kind: DestinationRule
    metadata:
      name: product-service
      namespace: production
    spec:
      host: product-service
      trafficPolicy:
        connectionPool:
          tcp:
            maxConnections: 100
          http:
            h2UpgradePolicy: UPGRADE
      subsets:
      - name: v1
        labels:
          version: v1
      - name: v2
        labels:
          version: v2
  k8s/base/virtual-service.yaml: |
    apiVersion: networking.istio.io/v1beta1
    kind: VirtualService
    metadata:
      name: product-service
      namespace: production
      labels:
        app: product-service
    spec:
      hosts:
      - product-service
      - product.example.com
      gateways:
      - product-gateway
      - mesh
      http:
      - match:
        - headers:
            x-canary:
              exact: "true"
        route:
        - destination:
            host: product-service
            subset: v2
          weight: 100
      - match:
        - uri:
            prefix: /api/v2
        route:
        - destination:
            host: product-service
            subset: v2
          weight: 100
      - route:
        - destination:
            host: product-service
            subset: v1
          weight: 90
        - destination:
            host: product-service
            subset: v2
          weight: 10
        retries:
          attempts: 3
          perTryTimeout: 2s
        timeout: 10s
  k8s/gateway/ambassador-mapping.yaml: |
    apiVersion: getambassador.io/v3alpha1
    kind: Mapping
    metadata:
      name: catalog-service
      namespace: ambassador
    spec:
      hostname: catalog.example.com
      prefix: /api/catalog/
      service: catalog-service.catalog:80
      timeout_ms: 5000
      retry_policy:
        retry_on: 5xx
        num_retries: 3
  k8s/gateway/kong-ingress.yaml: |
    apiVersion: configuration.konghq.com/v1
    kind: KongIngress
    metadata:
      name: inventory-rate-limit
      namespace: kong
    proxy:
      protocol: http
      connect_timeout: 10000
    route:
      strip_path: true
      protocols:
      - https

must_include_files:
  - k8s/base/virtual-service.yaml
  # Q1: DestinationRule defines the subsets referenced by the VirtualService.
  - k8s/base/destination-rule.yaml

must_include_content_from:
  k8s/base/virtual-service.yaml:
    - "x-canary"
    - "subset: v1"
    - "weight: 90"
    - "perTryTimeout: 2s"
  k8s/base/destination-rule.yaml:
    - "name: v1"
    - "name: v2"
    - "version: v1"

must_not_include:
  # --- deployment-v1: VirtualService routes to subsets, not deployments ---
  - "product-service:v1.0.0"
  - "sidecar.istio.io/inject"
  # --- deployment-v2: same reasoning ---
  - "product-service:v2.0.0"
  # --- service: port mapping, not needed for routing rule review ---
  - "targetPort: 8080"
  # --- ambassador mapping: DIFFERENT service, different mesh API ---
  - catalog-service
  - catalog.example.com
  - "timeout_ms: 5000"
  # --- kong ingress: DIFFERENT mesh, different service ---
  - inventory-rate-limit
  - KongIngress
  - strip_path

must_not_include_files:
  - k8s/base/deployment-v1.yaml
  - k8s/base/deployment-v2.yaml
  - k8s/base/service.yaml
  - k8s/gateway/ambassador-mapping.yaml
  - k8s/gateway/kong-ingress.yaml

max_fragments: 6
max_files: 3
add_garbage_files: false
skip_garbage_check: true
