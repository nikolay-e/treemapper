name: kubernetes_031_istio_virtual_service
repo:
  initial_files:
    k8s/base/deployment-v1.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: product-service-v1
        namespace: production
        labels:
          app: product-service
          version: v1
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: product-service
            version: v1
        template:
          metadata:
            labels:
              app: product-service
              version: v1
            annotations:
              sidecar.istio.io/inject: "true"
          spec:
            containers:
            - name: product
              image: registry.example.com/product-service:v1.0.0
              ports:
              - containerPort: 8080
                name: http
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
    k8s/base/deployment-v2.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: product-service-v2
        namespace: production
        labels:
          app: product-service
          version: v2
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: product-service
            version: v2
        template:
          metadata:
            labels:
              app: product-service
              version: v2
            annotations:
              sidecar.istio.io/inject: "true"
          spec:
            containers:
            - name: product
              image: registry.example.com/product-service:v2.0.0
              ports:
              - containerPort: 8080
                name: http
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
    k8s/base/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: product-service
        namespace: production
      spec:
        selector:
          app: product-service
        ports:
        - name: http
          port: 80
          targetPort: 8080
    k8s/base/destination-rule.yaml: |
      apiVersion: networking.istio.io/v1beta1
      kind: DestinationRule
      metadata:
        name: product-service
        namespace: production
      spec:
        host: product-service
        trafficPolicy:
          connectionPool:
            tcp:
              maxConnections: 100
            http:
              h2UpgradePolicy: UPGRADE
        subsets:
        - name: v1
          labels:
            version: v1
        - name: v2
          labels:
            version: v2
    k8s/base/virtual-service.yaml: |
      apiVersion: networking.istio.io/v1beta1
      kind: VirtualService
      metadata:
        name: product-service
        namespace: production
      spec:
        hosts:
        - product-service
        - product.example.com
        gateways:
        - product-gateway
        - mesh
    k8s/gateway/ambassador-mapping.yaml: |
      apiVersion: getambassador.io/v3alpha1
      kind: Mapping
      metadata:
        name: catalog-service
        namespace: ambassador
      spec:
        hostname: catalog.example.com
        prefix: /api/catalog/
        service: catalog-service.catalog:80
        timeout_ms: 5000
        retry_policy:
          retry_on: 5xx
          num_retries: 3
    k8s/gateway/kong-ingress.yaml: |
      apiVersion: configuration.konghq.com/v1
      kind: KongIngress
      metadata:
        name: inventory-rate-limit
        namespace: kong
      proxy:
        protocol: http
        connect_timeout: 10000
      route:
        strip_path: true
        protocols:
        - https
  changed_files:
    k8s/base/deployment-v1.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: product-service-v1
        namespace: production
        labels:
          app: product-service
          version: v1
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: product-service
            version: v1
        template:
          metadata:
            labels:
              app: product-service
              version: v1
            annotations:
              sidecar.istio.io/inject: "true"
          spec:
            containers:
            - name: product
              image: registry.example.com/product-service:v1.0.0
              ports:
              - containerPort: 8080
                name: http
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
    k8s/base/deployment-v2.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: product-service-v2
        namespace: production
        labels:
          app: product-service
          version: v2
      spec:
        replicas: 2
        selector:
          matchLabels:
            app: product-service
            version: v2
        template:
          metadata:
            labels:
              app: product-service
              version: v2
            annotations:
              sidecar.istio.io/inject: "true"
          spec:
            containers:
            - name: product
              image: registry.example.com/product-service:v2.0.0
              ports:
              - containerPort: 8080
                name: http
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
    k8s/base/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: product-service
        namespace: production
      spec:
        selector:
          app: product-service
        ports:
        - name: http
          port: 80
          targetPort: 8080
    k8s/base/destination-rule.yaml: |
      apiVersion: networking.istio.io/v1beta1
      kind: DestinationRule
      metadata:
        name: product-service
        namespace: production
      spec:
        host: product-service
        trafficPolicy:
          connectionPool:
            tcp:
              maxConnections: 100
            http:
              h2UpgradePolicy: UPGRADE
        subsets:
        - name: v1
          labels:
            version: v1
        - name: v2
          labels:
            version: v2
    k8s/base/virtual-service.yaml: |
      apiVersion: networking.istio.io/v1beta1
      kind: VirtualService
      metadata:
        name: product-service
        namespace: production
        labels:
          app: product-service
      spec:
        hosts:
        - product-service
        - product.example.com
        gateways:
        - product-gateway
        - mesh
        http:
        - match:
          - headers:
              x-canary:
                exact: "true"
          route:
          - destination:
              host: product-service
              subset: v2
            weight: 100
        - match:
          - uri:
              prefix: /api/v2
          route:
          - destination:
              host: product-service
              subset: v2
            weight: 100
        - route:
          - destination:
              host: product-service
              subset: v1
            weight: 90
          - destination:
              host: product-service
              subset: v2
            weight: 10
          retries:
            attempts: 3
            perTryTimeout: 2s
          timeout: 10s
    k8s/gateway/ambassador-mapping.yaml: |
      apiVersion: getambassador.io/v3alpha1
      kind: Mapping
      metadata:
        name: catalog-service
        namespace: ambassador
      spec:
        hostname: catalog.example.com
        prefix: /api/catalog/
        service: catalog-service.catalog:80
        timeout_ms: 5000
        retry_policy:
          retry_on: 5xx
          num_retries: 3
    k8s/gateway/kong-ingress.yaml: |
      apiVersion: configuration.konghq.com/v1
      kind: KongIngress
      metadata:
        name: inventory-rate-limit
        namespace: kong
      proxy:
        protocol: http
        connect_timeout: 10000
      route:
        strip_path: true
        protocols:
        - https
  commit_message: Update files
