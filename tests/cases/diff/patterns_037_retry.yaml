name: patterns_037_retry
tags:
- lang:elixir
- change:new_function
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    lib/payments/ledger.ex: |
      defmodule Payments.Ledger do
        defstruct [:account_id, :balance, :entries]

        def debit(%__MODULE__{balance: bal} = ledger, amount) when amount > 0 and bal >= amount do
          entry = %{type: :debit, amount: amount, ts: DateTime.utc_now()}
          {:ok, %{ledger | balance: bal - amount, entries: [entry | ledger.entries]}}
        end
        def debit(_, _), do: {:error, :invalid_debit}

        def credit(%__MODULE__{balance: bal} = ledger, amount) when amount > 0 do
          entry = %{type: :credit, amount: amount, ts: DateTime.utc_now()}
          {:ok, %{ledger | balance: bal + amount, entries: [entry | ledger.entries]}}
        end
        def credit(_, _), do: {:error, :invalid_credit}
      end
    lib/payments/transaction_service.ex: |
      defmodule Payments.TransactionService do
        alias Payments.Ledger

        def transfer(from_ledger, to_ledger, amount) do
          with {:ok, debited} <- Ledger.debit(from_ledger, amount),
               {:ok, credited} <- Ledger.credit(to_ledger, amount) do
            {:ok, {debited, credited}}
          end
        end
      end
    lib/payments/reconciliation.ex: |
      defmodule Payments.Reconciliation do
        alias Payments.TransactionService

        def reconcile_batch(transfers) do
          Enum.map(transfers, fn {from, to, amount} ->
            TransactionService.transfer(from, to, amount)
          end)
        end
      end
    garbage/Compliance.ex: |
