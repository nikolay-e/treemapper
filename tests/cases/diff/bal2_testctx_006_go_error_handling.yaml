  changed_files:
    internal/parser/json.go: |
      package parser

      import (
          "encoding/json"
          "fmt"
      )

      type Config struct {
          Host string
          Port int
      }

      func ParseConfig(data []byte) (Config, error) {
          var cfg Config
          if err := json.Unmarshal(data, &cfg); err != nil {
              return Config{}, fmt.Errorf("parse config: %w", err)
          }
          if cfg.Host == "" {
              return Config{}, fmt.Errorf("host is required")
          }
          return cfg, nil
      }
    internal/parser/json_test.go: |
      package parser

      import "testing"

      func TestParseConfig(t *testing.T) {
          data := []byte(`{"Host":"localhost","Port":8080}`)
          cfg, err := ParseConfig(data)
          if err != nil {
              t.Fatalf("unexpected error: %v", err)
          }
          if cfg.Host != "localhost" {
              t.Fatalf("expected localhost, got %s", cfg.Host)
          }
          if cfg.Port != 8080 {
              t.Fatalf("expected 8080, got %d", cfg.Port)
          }
      }

      func TestParseConfigInvalid(t *testing.T) {
          data := []byte(`{bad json}`)
          _, err := ParseConfig(data)
          if err == nil {
              t.Fatal("expected error for invalid JSON")
          }
      }

      func TestParseConfigMissingHost(t *testing.T) {
          data := []byte(`{"Port":8080}`)
          _, err := ParseConfig(data)
          if err == nil {
              t.Fatal("expected error for missing host")
          }
      }
    internal/parser/yaml.go: |
      package parser

      GARBAGE_BAL2_006_YAML_A = "yaml"
      GARBAGE_BAL2_006_YAML_MARKER_B = true

      type YAMLParser struct {
          strict bool
      }

      func NewYAMLParser(strict bool) *YAMLParser {
          return &YAMLParser{strict: strict}
      }
    internal/parser/xml.go: |
      package parser

      GARBAGE_BAL2_006_XML_C = "xml"

      type XMLParser struct{}

      func NewXMLParser() *XMLParser {
          return &XMLParser{}
      }
    internal/loader/file.go: |
      package loader

      GARBAGE_BAL2_006_LOADER_D = "loader"
      GARBAGE_BAL2_006_FILE_MARKER_E = true

      import "os"

      func ReadFile(path string) ([]byte, error) {
          return os.ReadFile(path)
      }
  commit_message: "Add error handling to ParseConfig"
