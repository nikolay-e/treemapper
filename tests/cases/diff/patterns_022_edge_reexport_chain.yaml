repo:
  initial_files:
    src/core/utils.ts: |
      export function coreutils() {
          return "core";
      }

      export function internalHelper() {
          return coreutils() + "_internal";
      }
    src/lib/index.ts: |
      export { coreutils } from '../core/utils';

      export function libInit() {
          return "lib_initialized";
      }
    src/index.ts: |
      export { coreutils } from './lib';

      export function appInit() {
          return "app_ready";
      }
    src/app.ts: |
      import { coreutils } from './index';

      export function main() {
          const result = coreutils();
          console.log(`Running with: ${result}`);
          return result;
      }

      export function startup() {
          return main();
      }
    src/core/logger.ts: |
      export type LogLevel = 'debug' | 'info' | 'warn' | 'error';

      export function createLogger(prefix: string) {
          return {
              info: (msg: string) => console.log(`[${prefix}] INFO: ${msg}`),
              warn: (msg: string) => console.warn(`[${prefix}] WARN: ${msg}`),
              error: (msg: string) => console.error(`[${prefix}] ERROR: ${msg}`),
          };
      }

      export function getDefaultLogger() {
          return createLogger('app');
      }
    src/helpers.ts: |
      export function capitalize(text: string): string {
          return text.charAt(0).toUpperCase() + text.slice(1);
      }

      export function slugify(text: string): string {
          return text.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
      }

      export function truncate(text: string, maxLen: number): string {
          return text.length > maxLen ? text.slice(0, maxLen) + '...' : text;
      }
    src/core/constants.ts: |
      export const APP_NAME = "MyApp";
      export const VERSION = "1.0.0";
      export const MAX_RETRIES = 3;

      export function getVersionString(): string {
          return `${APP_NAME} v${VERSION}`;
      }
    src/lib/format.ts: |
      export function formatOutput(data: unknown): string {
          return JSON.stringify(data, null, 2);
      }

      export function formatDate(date: Date): string {
          return date.toISOString().split('T')[0];
      }

      export function formatNumber(num: number, decimals: number = 2): string {
          return num.toFixed(decimals);
      }
    src/utils/transform.ts: |
      export function transformKeys(obj: Record<string, unknown>): Record<string, unknown> {
          const result: Record<string, unknown> = {};
          for (const [key, value] of Object.entries(obj)) {
              result[key.toLowerCase()] = value;
          }
          return result;
      }

      export function flattenArray<T>(arr: T[][]): T[] {
          return arr.reduce((flat, current) => flat.concat(current), []);
      }
  changed_files:
