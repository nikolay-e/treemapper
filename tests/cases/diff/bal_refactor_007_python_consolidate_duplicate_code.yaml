      object Logger { fun log(msg: String) {} }
    garbage/Config.kt: |
      // GARBAGE_KREF_C = "config_marker"
      data class Config(val host: String)
  changed_files:
    util/StringUtil.kt: |
      package util

      object StringUtil {
          fun normalize(input: String): String {
              if (input.isBlank()) return ""
              return input.trim().lowercase()
          }
      }
    domain/UserProfile.kt: |
      package domain

      import util.StringUtil

      data class UserProfile(val rawName: String) {
          val name: String get() = StringUtil.normalize(rawName)
      }
    service/ProfileService.kt: |
      package service

      import domain.UserProfile

      class ProfileService {
          fun buildProfile(rawName: String): UserProfile {
              return UserProfile(rawName)
          }
      }
    api/ProfileController.kt: |
      package api

      import service.ProfileService

      class ProfileController(private val svc: ProfileService) {
          fun handleCreate(rawName: String): String {
              val profile = svc.buildProfile(rawName)
              return profile.name
          }
      }
    garbage/Mailer.kt: |
      // GARBAGE_KREF_A = "mailer_marker"
      class Mailer { fun send(to: String) {} }
    garbage/Logger.kt: |
      // GARBAGE_KREF_B = "logger_marker"
