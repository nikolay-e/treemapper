name: bal_refactor_007_python_consolidate_duplicate_code
tags:
- lang:python
- change:multi_file
- change:refactor
- context:cross_module
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    exporters/csv_exporter.py: |
      import csv
      import io

      def sanitize_value(val):
          if val is None:
              return ""
          text = str(val).strip()
          text = text.replace('"', '""')
          return text

      def export_csv(records, columns):
          buf = io.StringIO()
          writer = csv.writer(buf)
          writer.writerow(columns)
          for record in records:
              row = [sanitize_value(record.get(col)) for col in columns]
              writer.writerow(row)
          return buf.getvalue()
    exporters/json_exporter.py: |
      import json

      def sanitize_value(val):
          if val is None:
              return ""
          text = str(val).strip()
          text = text.replace('"', '""')
          return text

      def export_json(records, columns):
          cleaned = []
          for record in records:
              row = {col: sanitize_value(record.get(col)) for col in columns}
              cleaned.append(row)
          return json.dumps(cleaned, indent=2)
    exporters/xml_exporter.py: |
      def sanitize_value(val):
          if val is None:
              return ""
          text = str(val).strip()
          text = text.replace('"', '""')
          return text

      def export_xml(records, columns):
          lines = ['<?xml version="1.0"?>']
          lines.append("<records>")
          for record in records:
              lines.append("  <record>")
              for col in columns:
                  val = sanitize_value(record.get(col))
                  lines.append(f"    <{col}>{val}</{col}>")
              lines.append("  </record>")
          lines.append("</records>")
          return "\n".join(lines)
