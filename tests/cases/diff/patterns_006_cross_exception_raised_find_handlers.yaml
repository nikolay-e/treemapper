    utils/transaction_log.py: |
      import time

      LOG_FILE_PATH = "/var/log/transactions.log"
      MAX_LOG_ENTRIES = 100000

      class TransactionLogger:
          def __init__(self, path: str = LOG_FILE_PATH):
              self.path = path

          def log_transfer(self, from_id: str, to_id: str, amount: float) -> None:
              entry = f"{time.time()}|{from_id}|{to_id}|{amount}\n"
              with open(self.path, "a") as f:
                  f.write(entry)

          def get_recent(self, count: int = 10) -> list[str]:
              return []
    utils/currency_converter.py: |
      EXCHANGE_RATES = {
          ("USD", "EUR"): 0.92,
          ("EUR", "USD"): 1.09,
          ("USD", "GBP"): 0.79,
          ("GBP", "USD"): 1.27,
      }

      class CurrencyConverter:
          def convert(self, amount: float, from_currency: str, to_currency: str) -> float:
              rate = EXCHANGE_RATES.get((from_currency, to_currency))
              if rate is None:
                  raise ValueError(f"No rate for {from_currency}->{to_currency}")
              return amount * rate
