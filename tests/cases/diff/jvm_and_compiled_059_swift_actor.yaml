repo:
  initial_files:
    Item.swift: |
      struct Item: Identifiable {
          let id: String
          let name: String
      }
    DataStore.swift: |
      // Initial
      class DataStore {}
    DataCache.swift: |
      class DataCache<T> {
          private var storage: [String: T] = [:]

          func set(_ value: T, forKey key: String) {
              storage[key] = value
          }

          func get(forKey key: String) -> T? {
              return storage[key]
          }

          func remove(forKey key: String) {
              storage.removeValue(forKey: key)
          }

          func clear() {
              storage.removeAll()
          }
      }
    ItemFormatter.swift: |
      struct ItemFormatter {
          static func format(_ item: Item) -> String {
              return "[\(item.id)] \(item.name)"
          }

          static func formatList(_ items: [Item]) -> String {
              return items.map { format($0) }.joined(separator: "\n")
          }
      }
  changed_files:
    Item.swift: |
      struct Item: Identifiable {
          let id: String
          let name: String
      }
    DataStore.swift: |
      actor DataStore {
          private var items: [Item] = []

          func add(_ item: Item) {
              items.append(item)
          }

          func remove(id: String) {
              items.removeAll { $0.id == id }
          }

          func getAll() -> [Item] {
              return items
          }

          var count: Int {
              items.count
          }
      }
    DataCache.swift: |
      class DataCache<T> {
          private var storage: [String: T] = [:]

          func set(_ value: T, forKey key: String) {
