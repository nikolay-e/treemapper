repo:
  initial_files:
    src/api_client.py: |
      import requests
      from typing import Dict, Optional

      BASE_URL = "https://api.example.com"

      def fetch_user(user_id: int) -> Dict:
          response = requests.get(f"{BASE_URL}/users/{user_id}")
          response.raise_for_status()
          return response.json()

      def create_user(name: str, email: str) -> Dict:
          response = requests.post(f"{BASE_URL}/users", json={"name": name, "email": email})
          response.raise_for_status()
          return response.json()

      def delete_user(user_id: int) -> bool:
          response = requests.delete(f"{BASE_URL}/users/{user_id}")
          return response.status_code == 204
    tests/test_api.py: |
      def test_placeholder():
          pass

      def test_another_placeholder():
          pass
    src/http_interceptor.py: |
      from typing import Callable, Dict

      class HttpInterceptor:
          def __init__(self, base_url: str):
              self.base_url = base_url
              self.before_hooks: list = []

          def add_hook(self, hook: Callable) -> None:
              self.before_hooks.append(hook)

          def intercept(self, request: Dict) -> Dict:
              for hook in self.before_hooks:
                  request = hook(request)
              return request
    src/mock_server.py: |
      from typing import Dict, List

      class MockServer:
          def __init__(self, port: int = 8080):
              self.port = port
              self.routes: Dict[str, dict] = {}
              self.request_log: List[dict] = []

          def register(self, path: str, response: dict) -> None:
              self.routes[path] = response

          def handle(self, method: str, path: str) -> dict:
              self.request_log.append({"method": method, "path": path})
              return self.routes.get(path, {"status": 404})
