    src/Auth/TokenService.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Auth
      {
          public class TokenService
          {
              private readonly Dictionary<string, (string UserId, DateTime Expiry)> _tokens = new();
              private readonly TimeSpan _tokenLifetime;

              public TokenService(TimeSpan tokenLifetime)
              {
                  _tokenLifetime = tokenLifetime;
              }

              public string CreateToken(string userId)
              {
                  var token = Guid.NewGuid().ToString("N");
                  _tokens[token] = (userId, DateTime.UtcNow + _tokenLifetime);
                  return token;
              }

              public string ValidateToken(string token)
              {
                  if (!_tokens.TryGetValue(token, out var entry))
                      return null;
                  return entry.UserId;
              }

              public void RevokeToken(string token)
              {
                  _tokens.Remove(token);
              }
          }
      }
    Tests/TokenServiceTests.cs: |
      using Xunit;
      using App.Auth;
      using System;

      namespace App.Tests
      {
          public class TokenServiceTests
          {
              [Fact]
              public void CreateToken_ReturnsNonEmptyString()
              {
                  var svc = new TokenService(TimeSpan.FromHours(1));
                  var token = svc.CreateToken("user1");
                  Assert.False(string.IsNullOrEmpty(token));
              }

              [Fact]
              public void ValidateToken_ValidToken_ReturnsUserId()
              {
                  var svc = new TokenService(TimeSpan.FromHours(1));
                  var token = svc.CreateToken("user1");
                  Assert.Equal("user1", svc.ValidateToken(token));
              }

              [Fact]
              public void RevokeToken_InvalidatesToken()
              {
                  var svc = new TokenService(TimeSpan.FromHours(1));
                  var token = svc.CreateToken("user1");
                  svc.RevokeToken(token);
                  Assert.Null(svc.ValidateToken(token));
              }
          }
      }
    src/Auth/PermissionManager.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Auth
      {
          public class PermissionManager
          {
              private readonly Dictionary<string, HashSet<string>> _permissions = new();

              public void Grant(string userId, string permission)
              {
                  if (!_permissions.ContainsKey(userId))
                      _permissions[userId] = new HashSet<string>();
                  _permissions[userId].Add(permission);
              }

              public bool HasPermission(string userId, string permission)
              {
                  return _permissions.ContainsKey(userId) && _permissions[userId].Contains(permission);
              }
          }
      }
