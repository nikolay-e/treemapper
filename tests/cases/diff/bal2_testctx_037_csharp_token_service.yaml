  changed_files:
    src/Auth/TokenService.cs: |
      using System;
      using System.Collections.Generic;

      namespace App.Auth
      {
          public class TokenService
          {
              private readonly Dictionary<string, (string UserId, DateTime Expiry)> _tokens = new();
              private readonly TimeSpan _tokenLifetime;

              public TokenService(TimeSpan tokenLifetime)
              {
                  _tokenLifetime = tokenLifetime;
              }

              public string CreateToken(string userId)
              {
                  var token = Guid.NewGuid().ToString("N");
                  _tokens[token] = (userId, DateTime.UtcNow + _tokenLifetime);
                  return token;
              }

              public string ValidateToken(string token)
              {
                  if (!_tokens.TryGetValue(token, out var entry))
                      return null;
                  if (entry.Expiry < DateTime.UtcNow)
                  {
                      _tokens.Remove(token);
                      return null;
                  }
                  return entry.UserId;
              }

              public void RevokeToken(string token)
              {
                  _tokens.Remove(token);
              }

              public void RevokeAllForUser(string userId)
              {
                  var toRemove = new List<string>();
                  foreach (var kvp in _tokens)
                  {
                      if (kvp.Value.UserId == userId)
                          toRemove.Add(kvp.Key);
                  }
                  foreach (var key in toRemove)
                      _tokens.Remove(key);
              }
          }
      }
  commit_message: "fix: check token expiry during validation, add bulk revoke"
