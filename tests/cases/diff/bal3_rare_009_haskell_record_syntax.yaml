name: bal3_rare_009_haskell_record_syntax
tags:
- lang:haskell
- change:single_file
- change:single_file
- context:same_file
- distance:0hop
- difficulty:easy
xfail:
  category: weak-haskell-discovery
repo:
  initial_files:
    src/Person.hs: |
      module Person where

      data Person = Person
        { personName  :: String
        , personAge   :: Int
        , personEmail :: String
        } deriving (Show, Eq)

      greetPerson :: Person -> String
      greetPerson p = "Hello, " ++ personName p ++ "!"

      isAdult :: Person -> Bool
      isAdult p = personAge p >= 18

      contactInfo :: Person -> String
      contactInfo p = personName p ++ " <" ++ personEmail p ++ ">"
    src/Team.hs: |
      module Team where

      import Person (Person(..), greetPerson, isAdult)

      data Team = Team
        { teamName    :: String
        , teamMembers :: [Person]
        }

      adultMembers :: Team -> [Person]
      adultMembers team = filter isAdult (teamMembers team)

      greetTeam :: Team -> [String]
      greetTeam team = map greetPerson (teamMembers team)
    src/Serializer.hs: |
      module Serializer where

      gARBAGE_RARE_009_SER_A = "json"
      gARBAGE_RARE_009_FMT_B = "pretty"

      serialize :: Show a => a -> String
      serialize = show
    src/Validator.hs: |
      module Validator where

      gARBAGE_RARE_009_VAL_C = "required"
      gARBAGE_RARE_009_MAX_D = 255

      validate :: String -> Bool
      validate s = not (null s)
    src/Cache.hs: |
      module Cache where

      gARBAGE_RARE_009_CACHE_E = "lru"
      gARBAGE_RARE_009_SIZE_F = 1000

      cacheGet :: String -> Maybe String
      cacheGet _ = Nothing
  changed_files:
    src/Person.hs: |
      module Person where

      data Person = Person
        { personName  :: String
        , personAge   :: Int
        , personEmail :: String
        , personPhone :: Maybe String
        } deriving (Show, Eq)

      greetPerson :: Person -> String
      greetPerson p = "Hello, " ++ personName p ++ "!"

      isAdult :: Person -> Bool
      isAdult p = personAge p >= 18

      contactInfo :: Person -> String
      contactInfo p = case personPhone p of
        Just phone -> personName p ++ " <" ++ personEmail p ++ "> " ++ phone
        Nothing    -> personName p ++ " <" ++ personEmail p ++ ">"
  commit_message: "add optional phone to Person record"
