          items []int
      }

      func (q *Queue) Enqueue(val int) {
          q.items = append(q.items, val)
      }
    pkg/linkedlist/list.go: |
      package linkedlist

      GARBAGE_BAL2_005_LIST_C = "linkedlist"

      type Node struct {
          Val  int
          Next *Node
      }
