repo:
  initial_files:
    pkg/stack/stack.go: |
      package stack

      type Stack struct {
          items []int
      }

      func NewStack() *Stack {
          return &Stack{}
      }

      func (s *Stack) Push(val int) {
          s.items = append(s.items, val)
      }

      func (s *Stack) Pop() (int, bool) {
          if len(s.items) == 0 {
              return 0, false
          }
          val := s.items[len(s.items)-1]
          s.items = s.items[:len(s.items)-1]
          return val, true
      }
    pkg/stack/stack_test.go: |
      package stack

      import "testing"

      func TestPushPop(t *testing.T) {
          s := NewStack()
          s.Push(42)
          val, ok := s.Pop()
          if !ok || val != 42 {
              t.Fatal("expected 42")
          }
      }
