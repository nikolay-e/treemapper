name: bal3_bugfix_021_kotlin_null_safety
tags:
- lang:elixir
- change:new_function
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    lib/crm/contact.ex: |
      defmodule CRM.Contact do
        defstruct [:id, :email, :phone, :tags, :created_at]

        def tagged_with?(%__MODULE__{tags: tags}, tag) do
          tag in (tags || [])
        end

        def add_tag(%__MODULE__{tags: tags} = contact, tag) do
          existing = tags || []
          if tag in existing do
            contact
          else
            %{contact | tags: [tag | existing]}
          end
        end
      end
    lib/crm/segment_service.ex: |
      defmodule CRM.SegmentService do
        alias CRM.Contact

        def contacts_in_segment(contacts, segment_tag) do
          Enum.filter(contacts, &Contact.tagged_with?(&1, segment_tag))
        end
      end
    lib/crm/campaign_engine.ex: |
      defmodule CRM.CampaignEngine do
        alias CRM.SegmentService

        def target_contacts(all_contacts, segment_tag) do
          SegmentService.contacts_in_segment(all_contacts, segment_tag)
        end
      end
