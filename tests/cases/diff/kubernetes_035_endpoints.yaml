fragments:
- id: endpoints_populated
  selector:
    path: k8s/base/endpoints.yaml
- id: endpoints_external_api_label
  selector:
    anchor: 'app: external-api'
- id: service_external_matches_endpoints
  selector:
    path: k8s/base/service-external.yaml
    anchor: 'name: external-api'
- id: deployment_references_external_api
  selector:
    path: k8s/base/deployment.yaml
    anchor: 'value: external-api'
- id: no_endpointslice
  selector:
    path: k8s/advanced/endpointslice.yaml
- id: no_service_mesh_entry
