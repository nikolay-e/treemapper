      from models.user import UserProfile

      class UserService:
          def __init__(self, repository):
              self.repository = repository

          def get_active_users(self):
              all_users = self.repository.find_all()
              return [u for u in all_users if u.is_active]

          def process(self, user: UserProfile) -> dict:
              if not user.is_active:
                  raise ValueError("Cannot process inactive user")
              return {"id": user.user_id, "name": user.full_display()}

          def find_by_email(self, email: str):
              users = self.repository.find_all()
              for user in users:
                  if user.email == email:
                      return user
              return None
