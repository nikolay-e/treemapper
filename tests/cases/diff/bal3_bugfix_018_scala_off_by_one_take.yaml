repo:
  initial_files:
    src/main/scala/collection/TopK.scala: |
      package collection

      class TopK {
        def top(items: List[Int], k: Int): List[Int] = {
          items.sorted.reverse.take(k - 1)
        }

        def bottom(items: List[Int], k: Int): List[Int] = {
          items.sorted.take(k)
        }
      }
    src/main/scala/io/Printer.scala: |
