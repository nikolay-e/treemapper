name: bal_refactor_016_typescript_class_to_functions
tags:
- lang:typescript
- change:multi_file
- change:refactor
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/StringHelper.ts: |
      export class StringHelper {
          static capitalize(s: string): string {
              return s.charAt(0).toUpperCase() + s.slice(1);
          }

          static slugify(s: string): string {
              return s.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
          }

          static truncate(s: string, len: number): string {
              return s.length > len ? s.slice(0, len) + '...' : s;
          }
      }
    src/formatters/titleFormatter.ts: |
      import { StringHelper } from '../StringHelper';

      export function formatTitle(raw: string): string {
          const capitalized = StringHelper.capitalize(raw.trim());
          return StringHelper.truncate(capitalized, 100);
      }
    src/formatters/urlFormatter.ts: |
      import { StringHelper } from '../StringHelper';

      export function formatUrl(title: string): string {
          return `/posts/${StringHelper.slugify(title)}`;
      }
    src/pages/postEditor.ts: |
      import { formatTitle } from '../formatters/titleFormatter';
      import { formatUrl } from '../formatters/urlFormatter';

      export function preparePost(rawTitle: string) {
          return {
              title: formatTitle(rawTitle),
              url: formatUrl(rawTitle),
          };
      }
    src/styles/theme.ts: |
      const GARBAGE_REFACTOR_016_THEME_A = 'theme';
      const GARBAGE_REFACTOR_016_COLOR_B = '#fff';

      export const colors = {
          GARBAGE_REFACTOR_016_COLORS_C: true,
          primary: '#007bff',
      };
    garbage_auth.ts: |
      const GARBAGE_REFACTOR_016_AUTH_D = 'auth';
      const GARBAGE_REFACTOR_016_SESSION_E = 'jwt';

      export function isAuthenticated(): boolean {
          return false;
      }
  changed_files:
