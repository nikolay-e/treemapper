name: bal_refactor_016_typescript_class_to_functions
tags:
- lang:cpp
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    include/db/connection_pool.h: |
      #pragma once
      #include <string>
      #include <memory>

      namespace db {

      struct PoolConfig {
          std::string dsn;
          int min_connections;
          int max_connections;
          int idle_timeout_ms;
      };

      class ConnectionPool {
      public:
          explicit ConnectionPool(const PoolConfig& cfg);
          ~ConnectionPool();
          struct Connection* acquire();
          void release(struct Connection* conn);
          int active_count() const;
      private:
          PoolConfig cfg_;
      };

      }
    src/services/user_service.cpp: |
      #include "db/connection_pool.h"
      #include <string>

      namespace services {

      class UserService {
          db::ConnectionPool& pool_;
      public:
          explicit UserService(db::ConnectionPool& pool) : pool_(pool) {}

          std::string find_by_id(int id) {
              auto* conn = pool_.acquire();
              // query
              pool_.release(conn);
              return "";
          }
      };

      }
    src/services/order_service.cpp: |
      #include "db/connection_pool.h"
      #include <vector>

      namespace services {

      class OrderService {
          db::ConnectionPool& pool_;
      public:
          explicit OrderService(db::ConnectionPool& pool) : pool_(pool) {}

          std::vector<int> list_orders(int user_id) {
              auto* conn = pool_.acquire();
              // query
              pool_.release(conn);
              return {};
          }
      };

      }
    garbage/cache.cpp: |
      // GARBAGE_TS016_CACHE_A = "cache_marker"
      namespace cache { void invalidate(const char* key) {} }
    garbage/metrics.cpp: |
      // GARBAGE_TS016_METRICS_B = "metrics_marker"
      namespace metrics { void record(const char* name, double v) {} }
    garbage/config.cpp: |
      // GARBAGE_TS016_CONFIG_C = "config_marker"
      namespace config { const char* get(const char* key) { return ""; } }
  changed_files:
    include/db/connection_pool.h: |
      #pragma once
      #include <string>
      #include <memory>
      #include <chrono>

      namespace db {

      struct PoolConfig {
          std::string dsn;
          int min_connections;
          int max_connections;
          int idle_timeout_ms;
          int acquire_timeout_ms;
          bool health_check_enabled;
      };

      class ConnectionPool {
      public:
          explicit ConnectionPool(const PoolConfig& cfg);
          ~ConnectionPool();
          struct Connection* acquire();
          void release(struct Connection* conn);
          int active_count() const;
          int idle_count() const;
          bool is_healthy() const;
      private:
          PoolConfig cfg_;
      };

      }
    src/services/user_service.cpp: |
      #include "db/connection_pool.h"
      #include <string>

      namespace services {

      class UserService {
          db::ConnectionPool& pool_;
      public:
