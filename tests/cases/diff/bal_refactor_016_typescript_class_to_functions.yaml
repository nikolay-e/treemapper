          std::string find_by_id(int id) {
              auto* conn = pool_.acquire();
              // query
              pool_.release(conn);
              return "";
          }
      };

      }
    src/services/order_service.cpp: |
      #include "db/connection_pool.h"
      #include <vector>

      namespace services {

