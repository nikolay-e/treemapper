    server.py: |
      import json
      from typing import Any


      def load_settings(path: str = "settings.json") -> dict[str, Any]:
          with open(path) as f:
              return json.load(f)


      def create_server_config() -> dict[str, Any]:
          settings = load_settings()
          server = settings["server"]
          return {
              "host": server["host"],
              "port": server["port"],
              "max_connections": server["maxConnections"],
              "timeout": server["timeout"],
              "keep_alive": server["keepAlive"],
          }


      def get_cors_config() -> dict[str, Any]:
          settings = load_settings()
          return settings["cors"]


      def get_rate_limit_config() -> dict[str, Any]:
          settings = load_settings()
          return settings["rateLimit"]


      def start_server():
          config = create_server_config()
          cors = get_cors_config()
          return {"server": config, "cors": cors}
    middleware.py: |
      from server import get_rate_limit_config, get_cors_config


      def apply_rate_limiting(request):
          config = get_rate_limit_config()
          max_requests = config["maxRequests"]
          window_ms = config["windowMs"]
          return {"allowed": True, "limit": max_requests, "window": window_ms}


      def apply_cors(request):
          config = get_cors_config()
          origins = config["allowedOrigins"]
          return {"origins": origins, "credentials": config["allowCredentials"]}
    uploads/handler.py: |
      import os
      from typing import BinaryIO


      ALLOWED_EXTENSIONS = {".jpg", ".png", ".gif", ".pdf", ".docx"}
      MAX_FILE_SIZE_MB = 10


      def upload_file(filename: str, content: BinaryIO, upload_dir: str = "uploads") -> str:
          ext = os.path.splitext(filename)[1].lower()
          if ext not in ALLOWED_EXTENSIONS:
              raise ValueError(f"Extension {ext} not allowed")
          return os.path.join(upload_dir, filename)


      def validate_file_size(content: bytes, max_mb: int = MAX_FILE_SIZE_MB) -> bool:
          return len(content) <= max_mb * 1024 * 1024
    scheduler/tasks.py: |
      from datetime import datetime, timedelta
      from typing import Callable, Optional


      class TaskScheduler:
          def __init__(self):
              self.tasks: list[dict] = []

          def add_task(self, name: str, interval_seconds: int, handler: Optional[Callable] = None):
              self.tasks.append({
                  "name": name,
                  "interval": interval_seconds,
                  "handler": handler,
                  "last_run": None,
              })

          def run_pending(self) -> list[str]:
              now = datetime.utcnow()
              executed = []
              for task in self.tasks:
                  if task["last_run"] is None or (now - task["last_run"]).total_seconds() >= task["interval"]:
                      if task["handler"]:
                          task["handler"]()
                      task["last_run"] = now
                      executed.append(task["name"])
              return executed
