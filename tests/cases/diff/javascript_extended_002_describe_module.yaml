name: javascript_extended_002_describe_module
repo:
  initial_files:
    src/calculator.ts: |
      export function add(a: number, b: number): number {
          return a + b;
      }

      export function subtract(a: number, b: number): number {
          return a - b;
      }

      export function multiply(a: number, b: number): number {
          return a * b;
      }

      export function divide(a: number, b: number): number {
          if (b === 0) {
              throw new Error('Division by zero');
          }
          return a / b;
      }

      export function modulo(a: number, b: number): number {
          return a % b;
      }
    src/calculator.test.ts: |
      console.log('placeholder');
    src/unrelated/analytics.ts: |
      export class AnalyticsTracker {
          private events: string[] = [];

          trackEvent(name: string): void {
              this.events.push(name);
          }

          getEvents(): string[] {
              return [...this.events];
          }
      }

      export function flushEvents(): void {
          console.log('flushing analytics events');
      }
    src/unrelated/i18n.ts: |
      const translations: Record<string, Record<string, string>> = {
          en: { greeting: 'Hello' },
          fr: { greeting: 'Bonjour' },
      };

      export class Translator {
          translate(key: string, locale: string = 'en'): string {
              return translations[locale]?.[key] ?? key;
          }
      }

      export function loadLocale(locale: string): void {
          console.log('loading locale:', locale);
      }
