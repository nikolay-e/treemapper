repo:
  initial_files:
    lib/sanitizer.rb: |
      module Sanitizer
        def self.strip_tags(input)
          input.gsub(/<[^>]*>/, '')
        end

        def self.escape_html(input)
          input.gsub('&', '&amp;')
               .gsub('<', '&lt;')
               .gsub('>', '&gt;')
        end

        def self.normalize_whitespace(input)
          input.strip.gsub(/\s+/, ' ')
        end
      end
    lib/formatter.rb: |
      module Formatter
        def self.titlecase(str)
          str.split(' ').map(&:capitalize).join(' ')
        end

        def self.truncate(str, length: 50)
          return str if str.length <= length
          str[0...length] + '...'
        end

        def self.slugify(str)
          str.downcase.gsub(/[^a-z0-9]+/, '-').gsub(/^-|-$/, '')
        end
      end
    lib/encoder.rb: |
      require 'base64'

      module Encoder
        def self.to_base64(data)
          Base64.strict_encode64(data)
        end

        def self.from_base64(encoded)
          Base64.strict_decode64(encoded)
        end

        def self.hex_encode(data)
          data.unpack1('H*')
        end
      end
