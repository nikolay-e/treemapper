name: rust_030_include_str
tags:
- lang:python
- lang:protobuf
- change:multi_file
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    proto/device.proto: |
      syntax = "proto3";

      message Device {
        string device_id = 1;
        string owner_id = 2;
        string model = 3;
      }
    service/device_service.py: |
      from proto import device_pb2

      class DeviceService:
          def register_device(
              self, device_id: str, owner_id: str, model: str
          ) -> device_pb2.Device:
              return device_pb2.Device(
                  device_id=device_id,
                  owner_id=owner_id,
                  model=model,
              )

          def get_device(self, device_id: str) -> device_pb2.Device | None:
              return None
    garbage/telemetry.py: |
      GARBAGE_RUST030_A = "telemetry_marker"

      def noop():
          pass
    garbage/firmware.py: |
      GARBAGE_RUST030_B = "firmware_marker"

      def noop():
          pass
    garbage/provisioning.py: |
      GARBAGE_RUST030_C = "provision_marker"

      def noop():
          pass
    garbage/shadow.py: |
      GARBAGE_RUST030_D = "shadow_marker"

      def noop():
          pass
  changed_files:
    proto/device.proto: |
      syntax = "proto3";

      message Device {
        string device_id = 1;
        string owner_id = 2;
        string model = 3;
        string firmware_version = 4;
        bool is_online = 5;
      }
    service/device_service.py: |
      from proto import device_pb2

      class DeviceService:
          def register_device(
              self,
              device_id: str,
              owner_id: str,
              model: str,
              firmware_version: str = "",
              is_online: bool = False,
          ) -> device_pb2.Device:
              return device_pb2.Device(
                  device_id=device_id,
                  owner_id=owner_id,
                  model=model,
                  firmware_version=firmware_version,
                  is_online=is_online,
              )

          def get_device(self, device_id: str) -> device_pb2.Device | None:
              return None
    garbage/telemetry.py: |
      GARBAGE_RUST030_A = "telemetry_marker"

      def noop():
          pass
    garbage/firmware.py: |
      GARBAGE_RUST030_B = "firmware_marker"

      def noop():
          pass
    garbage/provisioning.py: |
      GARBAGE_RUST030_C = "provision_marker"

      def noop():
          pass
    garbage/shadow.py: |
      GARBAGE_RUST030_D = "shadow_marker"

      def noop():
          pass
  commit_message: "feat: add firmware_version and is_online to Device proto and service"
fragments:
- id: proto_file
  selector:
    path: proto/device.proto
- id: service_file
  selector:
    path: service/device_service.py
- id: no_garbage_a
  selector:
    anchor: GARBAGE_RUST030_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_RUST030_B
- id: no_garbage_c
  selector:
    anchor: GARBAGE_RUST030_C
- id: no_garbage_d
  selector:
    anchor: GARBAGE_RUST030_D
oracle:
  required:
  - proto_file
  - service_file
  allowed: []
  forbidden:
  - no_garbage_a
  - no_garbage_b
  - no_garbage_c
  - no_garbage_d
