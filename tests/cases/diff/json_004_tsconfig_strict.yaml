name: json_004_tsconfig_strict
tags:
- lang:typescript
- change:single_file
- change:config
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    tsconfig.json: |
      {
        "compilerOptions": {
          "strict": false,
          "target": "ES2020",
          "module": "commonjs",
          "outDir": "dist",
          "rootDir": "src",
          "esModuleInterop": true,
          "skipLibCheck": true,
          "resolveJsonModule": true
        },
        "include": ["src/**/*"],
        "exclude": ["node_modules", "dist"]
      }
    src/app.ts: |
      interface UserRecord {
          id: number;
          name: string;
          email: string;
          metadata?: Record<string, any>;
      }

      function processData(data: any) {
          return data.value;
      }

      function findUser(users: UserRecord[], predicate: any): UserRecord | undefined {
          return users.find(predicate);
      }

      function transformRecords(records: any[]): UserRecord[] {
          return records.map(r => ({
              id: r.id,
              name: r.name || 'Unknown',
              email: r.email || '',
              metadata: r.extra,
          }));
      }

      function mergeConfigs(base: any, override: any): any {
          return { ...base, ...override };
      }

      export { processData, findUser, transformRecords, mergeConfigs };
    src/database.ts: |
      import { processData, transformRecords } from './app';

      interface DatabaseConfig {
          host: string;
          port: number;
          database: string;
      }

      class DatabaseClient {
          private config: DatabaseConfig;

          constructor(config: DatabaseConfig) {
              this.config = config;
          }

          async query(sql: string, params: any[]): Promise<any[]> {
              console.log(`Executing: ${sql} with ${params.length} params`);
              return [];
          }

          async fetchUsers(): Promise<any[]> {
              const raw = await this.query('SELECT * FROM users', []);
              return transformRecords(raw);
          }
      }

      export { DatabaseClient, DatabaseConfig };
    package.json: |
      {
        "name": "ts-app",
        "version": "1.0.0",
        "scripts": {
          "build": "tsc",
          "typecheck": "tsc --noEmit"
        },
        "devDependencies": {
          "typescript": "^5.2.0"
        }
      }
    .eslintrc.json: |
      {
        "parser": "@typescript-eslint/parser",
        "plugins": ["@typescript-eslint"],
        "extends": [
          "eslint:recommended",
          "plugin:@typescript-eslint/recommended"
        ],
        "rules": {
          "@typescript-eslint/no-explicit-any": "warn"
        }
      }
    jest.config.json: |
      {
        "preset": "ts-jest",
        "testEnvironment": "node",
        "testMatch": ["**/*.test.ts"],
        "transform": {
          "^.+\\.ts$": "ts-jest"
        }
      }
  changed_files:
    tsconfig.json: |
      {
        "compilerOptions": {
          "strict": true,
          "target": "ES2022",
          "module": "commonjs",
          "noImplicitAny": true,
          "outDir": "dist",
          "rootDir": "src",
          "esModuleInterop": true,
          "skipLibCheck": true,
          "resolveJsonModule": true
        },
        "include": ["src/**/*"],
        "exclude": ["node_modules", "dist"]
      }
  commit_message: Update files
