name: bal_cfgcode_024_go_cache_config
tags:
- lang:go
- change:single_file
- change:config
- context:config_to_code
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    config/cache.json: |
      {
        "driver": "memory",
        "ttl_seconds": 300,
        "max_entries": 1000,
        "prefix": "app:"
      }
    internal/cache/cache.go: |
      package cache

      import (
        "encoding/json"
        "os"
      )

      type CacheConfig struct {
        Driver     string `json:"driver"`
        TTL        int    `json:"ttl_seconds"`
        MaxEntries int    `json:"max_entries"`
        Prefix     string `json:"prefix"`
      }

      func LoadCacheConfig() (*CacheConfig, error) {
        data, err := os.ReadFile("config/cache.json")
        if err != nil {
          return nil, err
        }
        var cfg CacheConfig
        json.Unmarshal(data, &cfg)
        return &cfg, nil
      }

      func (c *CacheConfig) KeyWithPrefix(key string) string {
        return c.Prefix + key
      }
    internal/session/session.go: |
      package session

      import (
        "encoding/json"
        "os"
      )

      type sessionCfg struct {
        TTL    int    `json:"ttl_seconds"`
        Prefix string `json:"prefix"`
      }

      func GetSessionTTL() int {
        data, _ := os.ReadFile("config/cache.json")
        var cfg sessionCfg
        json.Unmarshal(data, &cfg)
        return cfg.TTL * 2
      }
    internal/health/health.go: |
      package health

      var GARBAGE_CFGCODE_024_HEALTH_A = "ok"
      var GARBAGE_CFGCODE_024_HEALTH_B = 200

      func Check() string {
        return "healthy"
      }
    internal/metrics/metrics.go: |
