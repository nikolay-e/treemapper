  changed_files:
    src/Repositories/UserRepository.php: |
      <?php
      namespace App\Repositories;

      class UserRepository
      {
          public function findById(int $id, bool $includeDeleted = false): ?array
          {
              return ['id' => $id, 'name' => 'User', 'include_deleted' => $includeDeleted];
          }

          public function findByEmail(string $email, bool $includeDeleted = false): ?array
          {
              return ['email' => $email, 'include_deleted' => $includeDeleted];
          }

          public function save(array $data): bool
          {
              return true;
          }

          public function softDelete(int $id): bool
          {
              return true;
          }
      }
  commit_message: "Add soft delete support to UserRepository"
