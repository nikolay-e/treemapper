    src/physics/rigid_body.hpp: |
      #pragma once

      namespace physics {

      struct Vector3 {
          float x, y, z;
      };

      class RigidBody {
      public:
          RigidBody(float mass, Vector3 position);
          void apply_force(Vector3 force);
          void update(float dt);
          Vector3 get_position() const;
      private:
          float mass_;
          Vector3 position_;
          Vector3 velocity_;
      };

      }
    src/physics/rigid_body.cpp: |
      #include "rigid_body.hpp"

      namespace physics {

      RigidBody::RigidBody(float mass, Vector3 position)
          : mass_(mass), position_(position), velocity_{0, 0, 0} {}

      void RigidBody::apply_force(Vector3 force) {
          velocity_.x += force.x / mass_;
          velocity_.y += force.y / mass_;
          velocity_.z += force.z / mass_;
      }

      void RigidBody::update(float dt) {
          position_.x += velocity_.x * dt;
          position_.y += velocity_.y * dt;
          position_.z += velocity_.z * dt;
      }

      Vector3 RigidBody::get_position() const {
          return position_;
      }

      }
    src/entity/game_object.hpp: |
      #pragma once
      #include <string>
      #include "../physics/rigid_body.hpp"

      namespace entity {

      class GameObject {
      public:
          GameObject(const std::string& name, physics::RigidBody body);
          void tick(float dt);
          const std::string& name() const;
      private:
          std::string name_;
          physics::RigidBody body_;
      };

      }
    src/entity/game_object.cpp: |
      #include "game_object.hpp"

      namespace entity {

      GameObject::GameObject(const std::string& name, physics::RigidBody body)
          : name_(name), body_(std::move(body)) {}

      void GameObject::tick(float dt) {
          body_.update(dt);
      }

      const std::string& GameObject::name() const {
          return name_;
      }

      }
