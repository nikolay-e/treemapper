    src/physics/rigid_body.cpp: |
      #include "rigid_body.hpp"

      namespace physics {

      RigidBody::RigidBody(float mass, Vector3 position)
          : mass_(mass), position_(position), velocity_{0, 0, 0} {}

      void RigidBody::apply_force(Vector3 force) {
          velocity_.x += force.x / mass_;
          velocity_.y += force.y / mass_;
          velocity_.z += force.z / mass_;
      }

      void RigidBody::apply_impulse(Vector3 impulse) {
          velocity_.x += impulse.x;
          velocity_.y += impulse.y;
          velocity_.z += impulse.z;
      }

      void RigidBody::update(float dt) {
          position_.x += velocity_.x * dt;
          position_.y += velocity_.y * dt;
          position_.z += velocity_.z * dt;
      }

      Vector3 RigidBody::get_position() const {
          return position_;
      }

      Vector3 RigidBody::get_velocity() const {
          return velocity_;
      }

