      package com.warehouse.order;

      import org.junit.jupiter.api.Test;
      import java.util.List;
      import static org.junit.jupiter.api.Assertions.*;

      class OrderFulfillmentServiceTest {
          private final InMemoryOrderRepository orderRepo = new InMemoryOrderRepository();
          private final InMemoryInventoryRepository inventoryRepo = new InMemoryInventoryRepository();
          private final OrderFulfillmentService service =
              new OrderFulfillmentService(orderRepo, inventoryRepo);

          @Test
          void fulfill_sufficientStock_succeeds() {
              inventoryRepo.setAvailable("SKU-A", 100);
              Order order = new Order(1L, List.of(new OrderLine("SKU-A", 10)));
              orderRepo.save(order);
              FulfillmentResult result = service.fulfill(1L);
              assertTrue(result.isSuccess());
          }

          @Test
          void fulfill_insufficientStock_returnsError() {
              inventoryRepo.setAvailable("SKU-B", 3);
              Order order = new Order(2L, List.of(new OrderLine("SKU-B", 10)));
              orderRepo.save(order);
              FulfillmentResult result = service.fulfill(2L);
              assertFalse(result.isSuccess());
              assertEquals("SKU-B", result.getFailedSku());
          }
      }
