    src/main/java/com/warehouse/order/OrderFulfillmentService.java: |
      package com.warehouse.order;

      import java.util.List;

      public class OrderFulfillmentService {
          private final OrderRepository orderRepo;
          private final InventoryRepository inventoryRepo;

          public OrderFulfillmentService(OrderRepository orderRepo, InventoryRepository inventoryRepo) {
              this.orderRepo = orderRepo;
              this.inventoryRepo = inventoryRepo;
          }

          public FulfillmentResult fulfill(Long orderId) {
              Order order = orderRepo.findById(orderId)
                  .orElseThrow(() -> new IllegalArgumentException("order not found: " + orderId));
              for (OrderLine line : order.getLines()) {
                  int available = inventoryRepo.getAvailable(line.getSku());
                  if (available < line.getQuantity()) {
                      return FulfillmentResult.insufficientStock(line.getSku());
                  }
              }
              for (OrderLine line : order.getLines()) {
                  inventoryRepo.reserve(line.getSku(), line.getQuantity());
              }
              order.setStatus(OrderStatus.FULFILLED);
              orderRepo.save(order);
              return FulfillmentResult.success(orderId);
          }

          public FulfillmentResult cancelFulfillment(Long orderId) {
              Order order = orderRepo.findById(orderId)
                  .orElseThrow(() -> new IllegalArgumentException("order not found: " + orderId));
              if (order.getStatus() != OrderStatus.FULFILLED) {
                  return FulfillmentResult.failure("order is not fulfilled");
              }
              for (OrderLine line : order.getLines()) {
                  inventoryRepo.release(line.getSku(), line.getQuantity());
              }
              order.setStatus(OrderStatus.CANCELLED);
              orderRepo.save(order);
              return FulfillmentResult.success(orderId);
          }

          public List<Order> findPendingOrders() {
              return orderRepo.findByStatus(OrderStatus.PENDING);
          }
      }
