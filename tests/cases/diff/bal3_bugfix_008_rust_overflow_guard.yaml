  changed_files:
    src/counter.rs: |
      pub struct Counter {
          value: u32,
      }

      impl Counter {
          pub fn new() -> Self {
              Counter { value: 0 }
          }

          pub fn increment(&mut self, amount: u32) {
              self.value = self.value.saturating_add(amount);
          }

          pub fn get(&self) -> u32 {
              self.value
          }
      }
  commit_message: "fix: use saturating_add to prevent u32 overflow panic"
