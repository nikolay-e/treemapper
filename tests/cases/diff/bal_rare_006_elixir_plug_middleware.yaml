        end

        @garbage_rare_006_lock_c true
      end
    garbage_seeder.ex: |
      defmodule GarbageSeeder do
        @garbage_rare_006_count_d 100
        @garbage_rare_006_batch_e 10

        def seed do
          @garbage_rare_006_count_d
        end

        @garbage_rare_006_faker_f true
      end
  changed_files:
    lib/web/auth_plug.ex: |
      defmodule Web.AuthPlug do
        import Plug.Conn

        def init(opts), do: opts

        def call(conn, _opts) do
          case get_req_header(conn, "authorization") do
            ["Bearer " <> token] -> assign(conn, :token, token)
            _ -> conn |> send_resp(401, "Unauthorized") |> halt()
          end
        end
      end
    lib/web/router.ex: |
      defmodule Web.Router do
        use Plug.Router
        plug Web.AuthPlug
        plug Web.RateLimiter, max_requests: 100, window_ms: 60_000
        plug :match
        plug :dispatch

        get "/health" do
          send_resp(conn, 200, "ok")
        end

        get "/users" do
          send_resp(conn, 200, "[]")
        end
      end
    lib/web/rate_limiter.ex: |
      defmodule Web.RateLimiter do
        import Plug.Conn

        def init(opts) do
          %{
            max_requests: Keyword.get(opts, :max_requests, 60),
            window_ms: Keyword.get(opts, :window_ms, 60_000)
          }
        end

        def call(conn, %{max_requests: max, window_ms: window}) do
          ip = conn.remote_ip |> :inet.ntoa() |> to_string()
          case check_rate(ip, max, window) do
            :ok -> conn
            :rate_limited ->
              conn
              |> put_resp_header("retry-after", "60")
              |> send_resp(429, "Too Many Requests")
              |> halt()
          end
        end

        defp check_rate(_ip, _max, _window), do: :ok
      end
    lib/web/endpoint.ex: |
      defmodule Web.Endpoint do
        use Plug.Builder
        plug Web.Router
      end
    garbage_migrator.ex: |
      defmodule GarbageMigrator do
        @garbage_rare_006_version_a 1
