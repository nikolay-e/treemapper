repo:
  initial_files:
    src/clamp.zig: |
      const std = @import("std");

      pub fn clamp(val: i32, lo: i32, hi: i32) i32 {
          if (val < lo) return lo;
          if (val > hi) return hi;
          return val;
      }
    src/garbage_rand.zig: |
