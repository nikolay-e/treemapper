      pub fn garbageHash(x: i32) i32 {
          return x;
      }
  changed_files:
    src/clamp.zig: |
      const std = @import("std");

      pub fn clamp(comptime T: type, val: T, lo: T, hi: T) T {
          if (val < lo) return lo;
          if (val > hi) return hi;
          return val;
      }
    src/garbage_rand.zig: |
      const GARBAGE_B4Z012_RND_A: []const u8 = "rand";
