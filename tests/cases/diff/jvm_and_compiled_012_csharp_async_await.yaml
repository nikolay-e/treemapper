    Api/ProductApi.cs: |
      using System.Net.Http;
      using System.Text.Json;
      using MyApp.Models;

      namespace MyApp.Api
      {
          class ProductApi
          {
              private readonly HttpClient _client;

              public ProductApi(HttpClient client)
              {
                  _client = client;
              }

              public async Task<Product> GetProductAsync(int id)
              {
                  var response = await _client.GetAsync($"/api/products/{id}");
                  response.EnsureSuccessStatusCode();
                  var json = await response.Content.ReadAsStringAsync();
                  return JsonSerializer.Deserialize<Product>(json);
              }

              public async Task<IEnumerable<Product>> GetAllProductsAsync()
              {
                  var response = await _client.GetAsync("/api/products");
                  var json = await response.Content.ReadAsStringAsync();
                  return JsonSerializer.Deserialize<IEnumerable<Product>>(json);
              }
          }
      }
    Services/HttpClientFactory.cs: |
      using System.Net.Http;

      namespace MyApp.Services
      {
          public class HttpClientFactory
          {
              private readonly string _baseUrl;
              private readonly TimeSpan _timeout;

              public HttpClientFactory(string baseUrl, TimeSpan? timeout = null)
              {
                  _baseUrl = baseUrl;
                  _timeout = timeout ?? TimeSpan.FromSeconds(30);
              }

              public HttpClient Create()
              {
                  var client = new HttpClient
                  {
                      BaseAddress = new Uri(_baseUrl),
                      Timeout = _timeout
                  };
                  client.DefaultRequestHeaders.Add("Accept", "application/json");
                  return client;
              }
          }
      }
    Models/ApiError.cs: |
      namespace MyApp.Models
      {
          public class ApiError
          {
              public int StatusCode { get; set; }
              public string Message { get; set; }
              public string Detail { get; set; }

              public override string ToString()
              {
                  return $"HTTP {StatusCode}: {Message} - {Detail}";
              }
          }
      }
    Tests/UserApiTests.cs: |
      using MyApp.Api;
      using MyApp.Models;
      using Xunit;

      namespace MyApp.Tests
      {
          public class UserApiTests
          {
              [Fact]
              public async Task GetUserAsync_ReturnsUser()
              {
                  var handler = new MockHttpMessageHandler("{\"Id\":1,\"Name\":\"Alice\"}");
                  var client = new HttpClient(handler) { BaseAddress = new Uri("http://test") };
                  var api = new UserApi(client);

                  var user = await api.GetUserAsync(1);
                  Assert.Equal("Alice", user.Name);
                  Assert.Equal(1, user.Id);
              }

              [Fact]
              public async Task GetAllUsersAsync_ReturnsList()
              {
                  var handler = new MockHttpMessageHandler("[{\"Id\":1,\"Name\":\"Bob\"}]");
                  var client = new HttpClient(handler) { BaseAddress = new Uri("http://test") };
                  var api = new UserApi(client);

                  var users = await api.GetAllUsersAsync();
                  Assert.Single(users);
              }
          }
      }
