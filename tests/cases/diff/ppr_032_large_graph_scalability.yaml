          def process(self, data):
              return self.export(data)

          def export(self, records):
              return "\n".join(str(r) for r in records)
    plugin_base.py: |
      from abc import ABC, abstractmethod

      class Plugin(ABC):
          name: str = ""

          @abstractmethod
          def process(self, data):
              raise NotImplementedError

          def describe(self) -> str:
              return f"Plugin({self.name})"
    pipeline.py: |
      from plugins.formatter import FormatterPlugin
      from plugins.exporter import ExporterPlugin
      from plugins.validator import ValidatorPlugin

      class DataPipeline:
          def __init__(self):
              self.formatter = FormatterPlugin()
              self.exporter = ExporterPlugin()
              self.validator = ValidatorPlugin()

          def run(self, raw_data: list) -> str:
              validated = [d for d in raw_data if self.validator.validate(d)]
              formatted = [self.formatter.format(d) for d in validated]
              output = self.exporter.export(formatted)
              return output

          def run_formatted_only(self, raw_data: list) -> list:
              return [self.formatter.format(d) for d in raw_data]
    plugin_registry.py: |
      from plugins.formatter import FormatterPlugin
      from plugins.exporter import ExporterPlugin
      from plugins.validator import ValidatorPlugin
      from plugins.transformer import TransformerPlugin
      from plugins.aggregator import AggregatorPlugin

      PLUGIN_CLASSES = [
          FormatterPlugin,
          ExporterPlugin,
          ValidatorPlugin,
          TransformerPlugin,
          AggregatorPlugin,
      ]

      class PluginRegistry:
          def __init__(self):
              self._plugins = {}

          def register_all(self):
              for cls in PLUGIN_CLASSES:
                  plugin = cls()
                  self._plugins[plugin.name] = plugin

          def get(self, name: str):
              return self._plugins.get(name)

          def list_plugins(self) -> list:
              return list(self._plugins.keys())
    plugins/validator.py: |
      from plugin_base import Plugin

      class ValidatorPlugin(Plugin):
          name = "validator"

          def process(self, data):
              return self.validate(data)

          def validate(self, record) -> bool:
              if not isinstance(record, dict):
                  return False
              if "id" not in record:
                  return False
              return True

          def validate_batch(self, records: list) -> list:
              return [r for r in records if self.validate(r)]
    plugins/transformer.py: |
      from plugin_base import Plugin

      class TransformerPlugin(Plugin):
          name = "transformer"

          def process(self, data):
              return self.transform(data)

          def transform(self, record: dict) -> dict:
              result = {}
              for key, value in record.items():
                  result[key.lower().replace(" ", "_")] = value
              return result
    plugins/aggregator.py: |
      from plugin_base import Plugin
      from collections import Counter

      class AggregatorPlugin(Plugin):
          name = "aggregator"

          def process(self, data):
              return self.aggregate(data)

          def aggregate(self, records: list) -> dict:
              if not records:
                  return {"count": 0}
              keys = Counter()
              for record in records:
                  if isinstance(record, dict):
                      keys.update(record.keys())
              return {
                  "count": len(records),
                  "fields": dict(keys),
              }
    tests/test_formatter.py: |
      from plugins.formatter import FormatterPlugin

      def test_format_basic():
          f = FormatterPlugin()
          result = f.format({"id": 1, "name": "test"})
          assert "formatted" in result

      def test_format_preserves_data():
          f = FormatterPlugin()
          data = {"key": "value"}
          result = f.format(data)
          assert result["formatted"] == data

      def test_process_calls_format():
          f = FormatterPlugin()
          result = f.process({"id": 1})
          assert isinstance(result, dict)
    tests/test_exporter.py: |
      from plugins.exporter import ExporterPlugin

      def test_export_basic():
          e = ExporterPlugin()
          result = e.export(["a", "b", "c"])
          assert "a" in result
          assert "b" in result

      def test_export_single():
          e = ExporterPlugin()
          result = e.export(["only"])
          assert result == "only"

      def test_process_calls_export():
          e = ExporterPlugin()
          result = e.process(["x", "y"])
          assert isinstance(result, str)
