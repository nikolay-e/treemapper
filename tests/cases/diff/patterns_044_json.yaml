name: patterns_044_json
tags:
- lang:python
- change:single_file
- change:new_function
- change:signature
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/serializers.py: |
      import json
      from dataclasses import dataclass, asdict
      from typing import Any

      @dataclass
      class User:
          id: int
          name: str
          email: str
          active: bool = True

      @dataclass
      class Order:
          id: int
          user_id: int
          items: list
          total: float

      class JsonSerializer:
          @staticmethod
          def serialize_user(user: User) -> str:
              data = asdict(user)
              data["type"] = "user"
              return json.dumps(data, indent=2, sort_keys=True)

          @staticmethod
          def serialize_order(order: Order) -> str:
              data = asdict(order)
              data["type"] = "order"
              data["item_count"] = len(order.items)
              return json.dumps(data, indent=2, sort_keys=True)

          @staticmethod
          def serialize_batch(items: list[Any]) -> str:
              result = []
              for item in items:
                  if isinstance(item, User):
                      result.append({"type": "user", **asdict(item)})
                  elif isinstance(item, Order):
                      result.append({"type": "order", **asdict(item)})
              return json.dumps({"batch": result, "count": len(result)}, indent=2)
    tests/test_serializers.py: |
      from src.serializers import User, JsonSerializer

      def test_serialize_user():
          user = User(id=1, name="Test", email="test@example.com")
          result = JsonSerializer.serialize_user(user)
          assert "test@example.com" in result
    src/csv_serializer.py: |
      import csv
      import io
      from dataclasses import asdict

      class CsvSerializer:
          @staticmethod
          def serialize_users(users) -> str:
              if not users:
                  return ""
              output = io.StringIO()
              writer = csv.DictWriter(output, fieldnames=["id", "name", "email", "active"])
              writer.writeheader()
              for user in users:
                  writer.writerow(asdict(user))
              return output.getvalue()

          @staticmethod
          def serialize_orders(orders) -> str:
              output = io.StringIO()
              writer = csv.DictWriter(output, fieldnames=["id", "user_id", "total"])
              writer.writeheader()
              for order in orders:
                  row = {"id": order.id, "user_id": order.user_id, "total": order.total}
                  writer.writerow(row)
              return output.getvalue()
    tests/test_csv_serializer.py: |
      from src.serializers import User, Order
      from src.csv_serializer import CsvSerializer

      def test_serialize_users_csv():
          users = [User(id=1, name="Alice", email="alice@test.com")]
          result = CsvSerializer.serialize_users(users)
          assert "Alice" in result
          assert "alice@test.com" in result
