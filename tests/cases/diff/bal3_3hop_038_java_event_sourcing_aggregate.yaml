      package com.app.event;

      public class DomainEvent {
          private String eventType;
          private String payload;
          public DomainEvent(String eventType, String payload) {
              this.eventType = eventType;
              this.payload = payload;
          }
          public String getEventType() { return eventType; }
          public String getPayload() { return payload; }
      }
    src/main/java/com/app/event/EventStore.java: |
      package com.app.event;

      import java.util.ArrayList;
      import java.util.List;

      public class EventStore {
          private final List<DomainEvent> events = new ArrayList<>();
          public void append(DomainEvent event) {
              events.add(event);
          }
          public List<DomainEvent> getEvents() {
              return new ArrayList<>(events);
          }
      }
    src/main/java/com/app/aggregate/OrderAggregate.java: |
      package com.app.aggregate;

      import com.app.event.EventStore;
      import com.app.event.DomainEvent;

      public class OrderAggregate {
          private final EventStore store;
          private String status = "new";
          public OrderAggregate(EventStore store) {
              this.store = store;
          }
          public void place() {
              this.status = "placed";
              store.append(new DomainEvent("OrderPlaced", status));
          }
          public String getStatus() { return status; }
      }
    src/main/java/com/app/service/OrderCommandService.java: |
      package com.app.service;

      import com.app.aggregate.OrderAggregate;
      import com.app.event.EventStore;

      public class OrderCommandService {
          private final EventStore store;
          public OrderCommandService(EventStore store) {
              this.store = store;
          }
          public OrderAggregate createOrder() {
              OrderAggregate agg = new OrderAggregate(store);
              agg.place();
              return agg;
          }
      }
    src/main/java/com/app/web/OrderCommandController.java: |
      package com.app.web;

      import com.app.service.OrderCommandService;

      public class OrderCommandController {
          private final OrderCommandService service;
          public OrderCommandController(OrderCommandService service) {
              this.service = service;
          }
          public String placeOrder() {
              service.createOrder();
              return "order_placed";
          }
      }
