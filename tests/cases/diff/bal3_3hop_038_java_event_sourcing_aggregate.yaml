  changed_files:
    src/main/java/com/app/event/DomainEvent.java: |
      package com.app.event;

      public class DomainEvent {
          private String eventType;
          private String payload;
          private long version;
          public DomainEvent(String eventType, String payload, long version) {
              this.eventType = eventType;
              this.payload = payload;
              this.version = version;
          }
          public String getEventType() { return eventType; }
          public String getPayload() { return payload; }
          public long getVersion() { return version; }
      }
    src/main/java/com/app/aggregate/OrderAggregate.java: |
      package com.app.aggregate;

      import com.app.event.EventStore;
      import com.app.event.DomainEvent;

      public class OrderAggregate {
          private final EventStore store;
          private String status = "new";
          private long version = 0;
          public OrderAggregate(EventStore store) {
              this.store = store;
          }
          public void place() {
              this.status = "placed";
              this.version++;
              store.append(new DomainEvent("OrderPlaced", status, version));
          }
          public String getStatus() { return status; }
          public long getVersion() { return version; }
      }
  commit_message: "feat: add event versioning to aggregate and DomainEvent"
