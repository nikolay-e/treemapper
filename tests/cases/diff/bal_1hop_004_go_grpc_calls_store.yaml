      }
  changed_files:
    internal/store/kv.go: |
      package store

      import (
          "fmt"
          "sync"
          "time"
      )

      type KVStore struct {
          mu   sync.RWMutex
          data map[string]entry
      }

      type entry struct {
          Value     []byte
          ExpiresAt time.Time
      }

      func NewKVStore() *KVStore {
          return &KVStore{data: make(map[string]entry)}
      }

      func (s *KVStore) Get(key string) ([]byte, error) {
          s.mu.RLock()
          defer s.mu.RUnlock()
          e, ok := s.data[key]
          if !ok {
              return nil, fmt.Errorf("key not found: %s", key)
          }
          if !e.ExpiresAt.IsZero() && time.Now().After(e.ExpiresAt) {
              return nil, fmt.Errorf("key expired: %s", key)
          }
          return e.Value, nil
      }

      func (s *KVStore) Put(key string, val []byte, ttl time.Duration) {
          s.mu.Lock()
          defer s.mu.Unlock()
          var exp time.Time
          if ttl > 0 {
              exp = time.Now().Add(ttl)
          }
          s.data[key] = entry{Value: val, ExpiresAt: exp}
      }
  commit_message: "feat: add TTL expiration to KVStore"
