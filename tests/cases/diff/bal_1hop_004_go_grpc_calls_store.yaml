repo:
  initial_files:
    internal/store/kv.go: |
      package store

      import "sync"

      type KVStore struct {
          mu   sync.RWMutex
          data map[string][]byte
      }

      func NewKVStore() *KVStore {
          return &KVStore{data: make(map[string][]byte)}
      }

      func (s *KVStore) Get(key string) ([]byte, error) {
          s.mu.RLock()
          defer s.mu.RUnlock()
          val, ok := s.data[key]
          if !ok {
              return nil, fmt.Errorf("key not found: %s", key)
          }
          return val, nil
      }

      func (s *KVStore) Put(key string, val []byte) {
          s.mu.Lock()
          defer s.mu.Unlock()
          s.data[key] = val
      }
    internal/grpc/server.go: |
      package grpc

      import (
          "context"
          "myapp/internal/store"
      )

      type KVServer struct {
          store *store.KVStore
      }

      func NewKVServer(st *store.KVStore) *KVServer {
          return &KVServer{store: st}
      }

      func (s *KVServer) GetValue(ctx context.Context, key string) ([]byte, error) {
          return s.store.Get(key)
      }

      func (s *KVServer) SetValue(ctx context.Context, key string, val []byte) error {
          s.store.Put(key, val)
          return nil
      }
