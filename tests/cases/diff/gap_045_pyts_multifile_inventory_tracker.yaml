  changed_files:
    backend/inventory.py: |
      from typing import Optional
      from dataclasses import dataclass

      @dataclass
      class Product:
          sku: str
          name: str
          quantity: int
          price_cents: int
          reorder_threshold: int = 10

      class InventoryManager:
          def __init__(self):
              self._products: dict[str, Product] = {}

          def add_product(self, product: Product) -> None:
              self._products[product.sku] = product

          def get_product(self, sku: str) -> Optional[Product]:
              return self._products.get(sku)

          def remove_product(self, sku: str) -> bool:
              if sku in self._products:
                  del self._products[sku]
                  return True
              return False

          def needs_reorder(self, sku: str) -> bool:
              product = self._products.get(sku)
              if product is None:
                  return False
              return product.quantity <= product.reorder_threshold
    frontend/inventory.ts: |
      interface Product {
        sku: string;
        name: string;
        quantity: number;
        priceCents: number;
        reorderThreshold: number;
      }

      function formatPrice(product: Product): string {
        const dollars = product.priceCents / 100;
        return `$${dollars.toFixed(2)}`;
      }

      function isInStock(product: Product): boolean {
        return product.quantity > 0;
      }

      function needsReorder(product: Product): boolean {
        return product.quantity <= product.reorderThreshold;
      }

      function displayProduct(product: Product): string {
        const price = formatPrice(product);
        const stock = isInStock(product) ? "In Stock" : "Out of Stock";
        const reorder = needsReorder(product) ? " [REORDER]" : "";
        return `${product.name} - ${price} (${stock})${reorder}`;
      }
    frontend/api.ts: |
      const API_BASE = "/api/v1";

      async function fetchProducts(): Promise<Product[]> {
        const response = await fetch(`${API_BASE}/products`);
        return response.json();
      }

      async function fetchProduct(sku: string): Promise<Product> {
        const response = await fetch(`${API_BASE}/products/${sku}`);
        return response.json();
      }
