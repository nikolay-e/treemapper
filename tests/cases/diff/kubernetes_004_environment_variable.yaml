      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: cert-manager-controller
        namespace: cert-manager
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: cert-manager
        template:
          spec:
            containers:
            - name: controller
              image: quay.io/jetstack/cert-manager-controller:v1.13.0
              args:
              - --cluster-resource-namespace=cert-manager
              - --leader-election-namespace=cert-manager
    k8s/ingress/traefik.yaml: |
      apiVersion: apps/v1
      kind: DaemonSet
      metadata:
        name: traefik-ingress
        namespace: kube-system
      spec:
        selector:
          matchLabels:
            app: traefik
        template:
          spec:
            containers:
            - name: traefik
              image: traefik:v2.10
              ports:
              - containerPort: 80
              - containerPort: 443
  commit_message: Update files
fragments:
