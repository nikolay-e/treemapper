name: graph_009_yaml_key_to_code
repo:
  initial_files:
    config.yaml: |
      database:
        host: localhost
        port: 5432
        name: myapp_db
        pool_size: 10
        timeout: 30
      redis:
        host: localhost
        port: 6379
        db: 0
      api:
        version: v2
        rate_limit: 1000
        timeout: 60
      features:
        dark_mode: true
        notifications: true
        analytics: false
    db.py: |
      import os
      import yaml

      def load_config():
          with open("config.yaml") as f:
              return yaml.safe_load(f)

      config = load_config()

      database_host = os.getenv("DATABASE_HOST", config["database"]["host"])
      database_port = int(os.getenv("DATABASE_PORT", config["database"]["port"]))
      database_name = config["database"]["name"]
      pool_size = config["database"]["pool_size"]
      timeout = config["database"]["timeout"]

      def connect():
          return f"postgresql://{database_host}:{database_port}/{database_name}"

      def get_pool():
          return {"size": pool_size, "timeout": timeout}

      class DatabaseConnection:
          def __init__(self):
              self.host = database_host
              self.port = database_port
              self.connected = False

          def connect(self):
              self.connected = True
              return self

          def disconnect(self):
              self.connected = False
    cache.py: |
      import yaml

      def load_config():
          with open("config.yaml") as f:
              return yaml.safe_load(f)

      config = load_config()

      redis_host = config["redis"]["host"]
      redis_port = config["redis"]["port"]
      redis_db = config["redis"]["db"]

      def get_redis_url():
          return f"redis://{redis_host}:{redis_port}/{redis_db}"

      class CacheClient:
          def __init__(self):
              self.url = get_redis_url()

          def get(self, key):
              pass

          def set(self, key, value, ttl=3600):
              pass
    api_client.py: |
      import yaml

      def load_config():
          with open("config.yaml") as f:
              return yaml.safe_load(f)

      config = load_config()

      api_version = config["api"]["version"]
      rate_limit = config["api"]["rate_limit"]
      api_timeout = config["api"]["timeout"]

      def build_url(endpoint):
          return f"/api/{api_version}/{endpoint}"

      class APIClient:
          def __init__(self):
              self.version = api_version
              self.rate_limit = rate_limit
              self.timeout = api_timeout

          def request(self, method, endpoint, data=None):
              url = build_url(endpoint)
              return {"url": url, "method": method}
