  config.yaml:
    - 'host: db.example.com'
    - 'host: redis.example.com'
    - 'version: v3'
    - 'analytics: true'

must_not_include:
# Plain garbage markers
- GARBAGE_GRAPH_yza001
- GARBAGE_GRAPH_yza002
# Tricky: YAML config with identical structure (database, redis, api keys)
- GARBAGE_GRAPH_009_STAGING_CFG_A
- GARBAGE_GRAPH_009_STAGING_CFG_B
# Tricky: Python file that reads config.yaml with same yaml.safe_load pattern
- GARBAGE_GRAPH_009_CONFIG_LOADER_C
- GARBAGE_GRAPH_009_CONFIG_LOADER_D
- GARBAGE_GRAPH_009_CONFIG_MGR_E
# Tricky: YAML with overlapping keys (api.version: v3, features.analytics: true)
- GARBAGE_GRAPH_009_DEPLOY_CFG_F
- GARBAGE_GRAPH_009_DEPLOY_CFG_G

must_not_include_files:
- garbage/logging_config_GARBAGE_GRAPH_yza001.yaml
- garbage/logger_GARBAGE_GRAPH_yza001.py
- garbage/metrics_config_GARBAGE_GRAPH_yza002.yaml
- garbage/metrics_GARBAGE_GRAPH_yza002.py
- garbage_staging_config.yaml
- garbage_config_loader.py
- garbage_deploy_config.yaml

