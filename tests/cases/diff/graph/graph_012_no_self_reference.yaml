      def factorial(n):
          if n <= 1:
              return 1
          return n * factorial(n - 1)

      def fibonacci(n):
          if n <= 1:
              return n
          return fibonacci(n - 1) + fibonacci(n - 2)

      def gcd(a, b):
          if b == 0:
              return a
          return gcd(b, a % b)

      def binary_search(arr, target, low, high):
          if low > high:
              return -1
          mid = (low + high) // 2
          if arr[mid] == target:
              return mid
          elif arr[mid] < target:
              return binary_search(arr, target, mid + 1, high)
          else:
              return binary_search(arr, target, low, mid - 1)
