name: rust_008_basic_trait_definition
tags:
- lang:rust
- change:single_file
- change:new_function
- change:signature
- context:same_file
- distance:0hop
- difficulty:easy
repo:
  initial_files:
    src/lib.rs: |
      pub mod traits;
      pub mod printable;
      pub mod serializable;
    src/traits.rs: |
      use std::fmt::Debug;

      pub trait Named {
          fn name(&self) -> &str;

          fn display_name(&self) -> String {
              format!("Name: {}", self.name())
          }
      }

      pub trait Identifiable {
          type Id: Debug + Clone;

          fn id(&self) -> Self::Id;
      }

      pub struct Entity {
          name: String,
          id: u64,
      }

      impl Named for Entity {
          fn name(&self) -> &str {
              &self.name
          }
      }

      impl Identifiable for Entity {
          type Id = u64;

          fn id(&self) -> Self::Id {
              self.id
          }
      }
    src/printable.rs: |
      pub trait Printable {
          fn print(&self);
          fn print_verbose(&self);
      }

      pub struct Document {
          title: String,
          content: String,
      }

      impl Document {
          pub fn new(title: &str, content: &str) -> Self {
              Self {
                  title: title.to_string(),
                  content: content.to_string(),
              }
          }
      }

      impl Printable for Document {
          fn print(&self) {
              println!("{}", self.title);
          }

          fn print_verbose(&self) {
              println!("{}: {}", self.title, self.content);
          }
      }
    src/serializable.rs: |
      pub trait Serializable {
          fn to_bytes(&self) -> Vec<u8>;
          fn from_bytes(data: &[u8]) -> Self where Self: Sized;

          fn to_string_repr(&self) -> String {
              let bytes = self.to_bytes();
              bytes.iter().map(|b| format!("{:02x}", b)).collect()
          }
      }

      pub struct Record {
          pub id: u32,
          pub data: Vec<u8>,
      }

      impl Serializable for Record {
          fn to_bytes(&self) -> Vec<u8> {
              let mut buf = self.id.to_be_bytes().to_vec();
              buf.extend_from_slice(&self.data);
              buf
          }

          fn from_bytes(data: &[u8]) -> Self {
              let id = u32::from_be_bytes([data[0], data[1], data[2], data[3]]);
              Self { id, data: data[4..].to_vec() }
          }
      }
  changed_files:
    src/lib.rs: |
      pub mod traits;
      pub mod printable;
      pub mod serializable;
    src/traits.rs: |
      use std::fmt::Debug;

      pub trait Named {
          fn name(&self) -> &str;

          fn display_name(&self) -> String {
              format!("Name: {}", self.name())
          }
      }

      pub trait Identifiable {
          type Id: Debug + Clone;

          fn id(&self) -> Self::Id;
      }

      pub trait Describable {
          fn describe(&self) -> String;

          fn short_description(&self) -> String {
              let desc = self.describe();
              if desc.len() > 50 {
                  format!("{}...", &desc[..47])
              } else {
                  desc
              }
          }

          fn detailed_description(&self) -> String {
              format!("Description: {}", self.describe())
          }
      }

      pub trait Displayable: Named + Describable {
          fn display(&self) -> String {
              format!("{}: {}", self.name(), self.short_description())
          }
      }

      pub struct Entity {
          name: String,
          id: u64,
          description: String,
      }

      impl Entity {
          pub fn new(id: u64, name: &str, description: &str) -> Self {
              Self {
                  id,
                  name: name.to_string(),
                  description: description.to_string(),
              }
          }
      }

      impl Named for Entity {
          fn name(&self) -> &str {
              &self.name
          }
      }

      impl Identifiable for Entity {
          type Id = u64;

          fn id(&self) -> Self::Id {
              self.id
          }
      }

      impl Describable for Entity {
          fn describe(&self) -> String {
              self.description.clone()
          }
      }

      impl Displayable for Entity {}
