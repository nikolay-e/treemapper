name: internals_038_cyclic_dependency_convergence
tags:
- lang:sql
- change:single_file
- context:cross_module
- distance:0hop
- difficulty:medium
repo:
  initial_files:
    db/schema.sql: |
      CREATE TABLE users (
          id SERIAL PRIMARY KEY,
          email VARCHAR(255) UNIQUE NOT NULL,
          created_at TIMESTAMP NOT NULL DEFAULT NOW()
      );

      CREATE TABLE sessions (
          id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
          user_id INTEGER NOT NULL REFERENCES users(id) ON DELETE CASCADE,
          created_at TIMESTAMP NOT NULL DEFAULT NOW(),
          expires_at TIMESTAMP NOT NULL
      );
    src/auth/user_repo.py: |
      def find_user_by_email(conn, email: str) -> dict | None:
          cur = conn.cursor()
          cur.execute("SELECT id, email, created_at FROM users WHERE email = %s", (email,))
          row = cur.fetchone()
          if row is None:
              return None
          return {"id": row[0], "email": row[1], "created_at": row[2]}
    src/auth/session_repo.py: |
      import datetime

      def create_session(conn, user_id: int, ttl_hours: int = 24) -> str:
          expires = datetime.datetime.utcnow() + datetime.timedelta(hours=ttl_hours)
          cur = conn.cursor()
          cur.execute(
              "INSERT INTO sessions (user_id, expires_at) VALUES (%s, %s) RETURNING id",
              (user_id, expires),
          )
          conn.commit()
          return cur.fetchone()[0]
    garbage/events.py: |
      GARBAGE_CYC038_EVENTS_A = "events_marker"


      def emit(event_name: str) -> None:
          pass
    garbage/feature_flags.py: |
      GARBAGE_CYC038_FLAGS_B = "flags_marker"


      def is_enabled(flag: str) -> bool:
          return False
    garbage/rate_limit.py: |
      GARBAGE_CYC038_RATE_C = "rate_marker"


      def check_limit(key: str) -> bool:
          return True
  changed_files:
