name: ruby_016_rails_model
repo:
  initial_files:
    app/models/order.rb: |
      class Order
        attr_accessor :id, :user_id, :total, :status, :items

        def initialize(id: nil, user_id: nil, total: 0, status: :pending)
          @id = id
          @user_id = user_id
          @total = total
          @status = status
          @items = []
        end

        def add_item(name, price, quantity: 1)
          @items << { name: name, price: price, quantity: quantity }
          @total += price * quantity
        end

        def complete
          @status = :completed
        end
      end
    app/models/user.rb: |
      class User
        attr_accessor :id, :name
        def initialize(id: nil, name: nil)
          @id = id
          @name = name
        end
      end
    app/models/invoice.rb: |
      class Invoice
        attr_accessor :id, :order_id, :amount, :due_date, :paid

        def initialize(order_id:, amount:, due_date:)
          @id = rand(10000)
          @order_id = order_id
          @amount = amount
          @due_date = due_date
          @paid = false
        end

        def mark_paid
          @paid = true
        end

        def overdue?
          !@paid && @due_date < Time.now
        end

        def total_with_tax(rate: 0.1)
          @amount * (1 + rate)
        end

        def formatted_amount
          "$#{'%.2f' % @amount}"
        end
      end
    app/models/shipping.rb: |
      class ShippingCalculator
        RATES = {
          standard: 5.99,
          express: 12.99,
          overnight: 24.99
        }.freeze

        def initialize(weight:, destination:)
          @weight = weight
          @destination = destination
        end

        def calculate(method: :standard)
          base = RATES.fetch(method, RATES[:standard])
          base + weight_surcharge
        end

        def estimated_days(method: :standard)
          case method
          when :standard then 5..7
          when :express then 2..3
          when :overnight then 1..1
          end
        end

        private

        def weight_surcharge
          return 0 if @weight <= 1.0
          (@weight - 1.0).ceil * 1.50
        end
      end
