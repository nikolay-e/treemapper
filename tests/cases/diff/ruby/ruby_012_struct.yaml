# Test: Geometry module uses Struct-based types (Point, Rectangle, Circle)
#
# Scenario: lib/geometry.rb is rewritten to require types and construct
# Point, Rectangle, Circle instances. The Struct definitions (UNCHANGED) in
# lib/types.rb include custom methods (distance_from_origin, area, perimeter).
#
# Reviewer questions:
#   Q1: "What fields does Point have? Does it have custom methods?"
#       -> lib/types.rb (UNCHANGED) — Point = Struct.new(:x, :y) with
#          distance_from_origin and to_s.
#   Q2: "What does bounding_box return? A Rectangle?"
#       -> Geometry.bounding_box constructs Rectangle.new from min/max of points.
#
# Trap files (plausible but unrelated):
#   - lib/vector_math.rb: vector operations — similar math domain but Geometry
#     uses Struct types directly, not vectors.
#   - lib/shape_renderer.rb: renders shapes to SVG — same shape domain but
#     Geometry is a factory module, not a renderer.

max_enrichment: 9.4
initial:
  lib/types.rb: |
    Point = Struct.new(:x, :y) do
      def distance_from_origin
        Math.sqrt(x**2 + y**2)
      end

      def to_s
        "(#{x}, #{y})"
      end
    end

    Rectangle = Struct.new(:width, :height) do
      def area
        width * height
      end

      def perimeter
        2 * (width + height)
      end
    end

    Circle = Struct.new(:radius) do
      def area
        Math::PI * radius**2
      end

      def circumference
        2 * Math::PI * radius
      end
    end
  lib/geometry.rb: |
    module Geometry
      def self.hello
        "geometry"
      end
    end
  lib/vector_math.rb: |
    class Vector2D
      attr_reader :x, :y

      def initialize(x, y)
        @x = x
        @y = y
      end

      def magnitude
        Math.sqrt(@x**2 + @y**2)
      end

      def dot(other)
        @x * other.x + @y * other.y
      end

      def add(other)
        Vector2D.new(@x + other.x, @y + other.y)
      end

      def scale(factor)
        Vector2D.new(@x * factor, @y * factor)
      end

      def normalize
        mag = magnitude
        return Vector2D.new(0, 0) if mag.zero?
        Vector2D.new(@x / mag, @y / mag)
      end
    end
  lib/shape_renderer.rb: |
    class ShapeRenderer
      def initialize(canvas_width, canvas_height)
        @width = canvas_width
        @height = canvas_height
        @shapes = []
      end

      def add_circle(cx, cy, radius, color: 'black')
        @shapes << { type: :circle, cx: cx, cy: cy, r: radius, color: color }
      end

      def add_rectangle(x, y, width, height, color: 'black')
        @shapes << { type: :rect, x: x, y: y, w: width, h: height, color: color }
      end

      def to_svg
        elements = @shapes.map { |s| render_shape(s) }.join("\n  ")
        "<svg width=\"#{@width}\" height=\"#{@height}\">\n  #{elements}\n</svg>"
      end

      private

      def render_shape(shape)
        case shape[:type]
        when :circle
          "<circle cx=\"#{shape[:cx]}\" cy=\"#{shape[:cy]}\" r=\"#{shape[:r]}\" fill=\"#{shape[:color]}\" />"
        when :rect
          "<rect x=\"#{shape[:x]}\" y=\"#{shape[:y]}\" width=\"#{shape[:w]}\" height=\"#{shape[:h]}\" fill=\"#{shape[:color]}\" />"
        end
      end
    end
