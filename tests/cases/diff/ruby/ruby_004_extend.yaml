# Test: Model uses extend to add ClassMethods (find/all/where) as class-level API
#
# Scenario: lib/model.rb is rewritten to extend ClassMethods, gaining class-level
# find/all/where/count methods. ClassMethods (UNCHANGED) provides an in-memory
# storage-backed query interface.
#
# Reviewer questions:
#   Q1: "What does Model.find return? How does storage work?"
#       -> lib/class_methods.rb (UNCHANGED) defines find/all/where/count backed
#          by an @storage array.
#   Q2: "What's the difference between extend and include here?"
#       -> extend adds methods at class level, so Model.find works (not instance).
#
# Trap files (plausible but unrelated):
#   - lib/persistence.rb: database persistence layer — same domain (data storage)
#     but Model uses ClassMethods' in-memory storage, not this DB adapter.
#   - lib/query_builder.rb: SQL query construction — similar to where() semantics
#     but ClassMethods.where uses Ruby's select, not SQL.

initial:
  lib/class_methods.rb: |
    module ClassMethods
      def find(id)
        all_records = storage
        all_records.detect { |r| r[:id] == id }
      end

      def all
        storage.dup
      end

      def where(conditions)
        storage.select do |record|
          conditions.all? { |k, v| record[k] == v }
        end
      end

      def count
        storage.size
      end

      private

      def storage
        @storage ||= []
      end
    end
  lib/model.rb: |
    class Model
      def save
        true
      end
    end
  lib/persistence.rb: |
    class Persistence
      def initialize(connection_string)
        @connection_string = connection_string
        @connected = false
      end

      def connect
        @connected = true
      end

      def save_record(table, attributes)
        raise "Not connected" unless @connected
        { table: table, attributes: attributes, saved: true }
      end

      def find_record(table, id)
        raise "Not connected" unless @connected
        { table: table, id: id }
      end

      def delete_record(table, id)
        raise "Not connected" unless @connected
        true
      end
    end
  lib/query_builder.rb: |
    class QueryBuilder
      def initialize(table_name)
        @table = table_name
        @conditions = []
        @order = nil
        @limit_val = nil
      end

      def where(condition)
        @conditions << condition
        self
      end

      def order_by(column, direction = :asc)
        @order = { column: column, direction: direction }
        self
      end

      def limit(n)
        @limit_val = n
        self
      end

      def to_sql
        sql = "SELECT * FROM #{@table}"
        sql += " WHERE #{@conditions.join(' AND ')}" unless @conditions.empty?
        sql += " ORDER BY #{@order[:column]} #{@order[:direction]}" if @order
        sql += " LIMIT #{@limit_val}" if @limit_val
        sql
      end
    end
