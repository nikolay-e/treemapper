# Scenario: Post model starts including Commentable and Taggable concern modules
#   from commentable.rb, and adds a summary method that calls concern methods.
#   Only app/models/post.rb is changed.
#
# Diff shows:
#   - require_relative 'concerns/commentable'
#   + include Commentable, include Taggable
#   + def summary calling comment_count and tags.join
#
# Reviewer questions:
#   Q1: "What methods does Commentable define? Does comment_count exist?"
#       -> Needs app/models/concerns/commentable.rb: Commentable defines
#         comments, add_comment, comment_count via define_method.
#         summary calls comment_count — reviewer must verify it exists.
#
#   Q2: "What methods does Taggable define? Does tags.join work?"
#       -> Same file: Taggable defines tags (returns array), add_tag, tagged_with?.
#         summary calls tags.join(', ') — reviewer must verify tags returns an array.
#
#   Q3: "Is include order significant for Commentable vs Taggable?"
#       -> Both are in same file. Reviewer needs to see if they share any
#         method names or interact. They don't — independent concerns.
#
# Not needed for comprehension:
#   - app/models/concerns/searchable.rb: Another concern module with IDENTICAL
#     pattern — self.included(base) + base.class_eval + define_method.
#     Same directory, same Ruby concern structure. But Post doesn't include
#     Searchable. Including it confuses which concerns are being mixed in.
#
#   - app/models/author.rb: Domain overlap — Author has post_ids, add_post,
#     post_count, display_name. Shares "post" vocabulary heavily. But Author
#     doesn't use concerns and post.rb doesn't reference Author.
#
#   - app/serializers/post_serializer.rb: Serializes Post objects with to_json
#     and to_hash. Directly consumes Post. But HOW the serializer formats
#     Post doesn't help review whether concern methods are correctly called.
#
#   - app/models/concerns/auditable.rb: Yet another concern in same directory.
#     Uses exact same self.included/define_method pattern. But Post doesn't
#     include Auditable.
#
#   - spec/models/post_spec.rb: Tests Post methods directly. Calls
#     post.add_comment, post.add_tag, post.summary. Direct consumer of
#     the changed code. But test expectations verify behavior, not concern
#     method definitions.

