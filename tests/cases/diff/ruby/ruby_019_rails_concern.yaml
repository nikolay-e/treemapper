  app/models/concerns/searchable.rb: |
    module Searchable
      def self.included(base)
        base.class_eval do
          define_method(:search_index) { @search_index ||= {} }

          define_method(:index_field) do |field|
            value = send(field).to_s.downcase
            words = value.split(/\s+/)
            words.each do |word|
              search_index[word] ||= []
              search_index[word] << field unless search_index[word].include?(field)
            end
          end

          define_method(:matches?) do |query|
            terms = query.downcase.split(/\s+/)
            terms.all? { |term| search_index.keys.any? { |k| k.include?(term) } }
          end
        end
      end
    end
  app/models/author.rb: |
    class Author
      attr_accessor :name, :bio, :post_ids

      def initialize(name:, bio: '')
        @name = name
        @bio = bio
        @post_ids = []
      end

      def add_post(post_id)
        @post_ids << post_id unless @post_ids.include?(post_id)
      end

      def remove_post(post_id)
        @post_ids.delete(post_id)
      end

      def post_count
        @post_ids.size
      end

      def prolific?
        post_count >= 10
      end

      def display_name
        "#{name} (#{post_count} posts)"
      end
    end
  app/serializers/post_serializer.rb: |
    class PostSerializer
      def initialize(post)
        @post = post
      end

      def to_hash
        {
          title: @post.title,
          body: @post.body,
          comment_count: @post.respond_to?(:comment_count) ? @post.comment_count : 0,
          tags: @post.respond_to?(:tags) ? @post.tags : []
        }
      end

      def to_json
        require 'json'
        JSON.generate(to_hash)
      end

      def summary_line
        "#{@post.title} — #{to_hash[:comment_count]} comments"
      end
    end
  app/models/concerns/auditable.rb: |
    module Auditable
      def self.included(base)
        base.class_eval do
          define_method(:audit_log) { @audit_log ||= [] }

          define_method(:record_change) do |field, old_value, new_value|
            audit_log << {
              field: field,
              from: old_value,
              to: new_value,
              at: Time.now
            }
          end

          define_method(:last_change) { audit_log.last }
          define_method(:change_count) { audit_log.size }
        end
      end
    end
  spec/models/post_spec.rb: |
    require 'rspec'
    require_relative '../../app/models/post'

    RSpec.describe Post do
      let(:post) { Post.new(title: 'Test Post', body: 'Hello world') }

      describe '#summary' do
        it 'includes title and counts' do
          post.add_comment('Great post!')
          post.add_tag('ruby')
          expect(post.summary).to include('Test Post')
          expect(post.summary).to include('1 comments')
          expect(post.summary).to include('ruby')
        end
      end

      describe '#add_comment' do
        it 'increments comment count' do
          post.add_comment('Nice')
          expect(post.comment_count).to eq(1)
        end
      end

      describe '#add_tag' do
        it 'prevents duplicates' do
          post.add_tag('ruby')
          post.add_tag('ruby')
          expect(post.tags.size).to eq(1)
        end
      end
    end
