# Test: app.rb calls Service.process which chains private validate/normalize/transform
#
# Scenario: app.rb is rewritten to require Service and call process() with edge
# cases (whitespace, nil). Service (UNCHANGED) has a public process() method that
# chains three private methods: validate, normalize, transform.
#
# Reviewer questions:
#   Q1: "What happens when process(nil) is called? What does validate raise?"
#       -> lib/service.rb (UNCHANGED) — validate raises ArgumentError for nil/empty.
#   Q2: "What's the full transformation pipeline?"
#       -> validate -> normalize (strip+downcase) -> transform (upcase).
#
# Trap files (plausible but unrelated):
#   - lib/data_pipeline.rb: multi-step data pipeline — similar chaining concept
#     but completely independent from Service.
#   - lib/string_utils.rb: string manipulation utilities — similar to normalize/
#     transform but Service has its own private methods.

max_enrichment: 6.8
initial:
  lib/service.rb: |
    class Service
      def process(data)
        validated = validate(data)
        normalized = normalize(validated)
        transform(normalized)
      end

      private

      def validate(data)
        raise ArgumentError, "Data cannot be nil" if data.nil?
        raise ArgumentError, "Data cannot be empty" if data.empty?
        data
      end

      def normalize(data)
        data.to_s.strip.downcase
      end

      def transform(data)
        data.upcase
      end
    end
  app.rb: |
    puts 'Hello'
  lib/data_pipeline.rb: |
    class DataPipeline
      def initialize
        @steps = []
      end

      def add_step(name, &block)
        @steps << { name: name, transform: block }
      end

      def execute(input)
        @steps.reduce(input) do |data, step|
          step[:transform].call(data)
        end
      end

      def step_count
        @steps.size
      end
    end
  lib/string_utils.rb: |
    module StringUtils
      def self.titleize(str)
        str.split(/[\s_-]/).map(&:capitalize).join(' ')
      end

      def self.truncate(str, length: 50, omission: '...')
        return str if str.length <= length
        str[0, length - omission.length] + omission
      end

      def self.parameterize(str)
        str.downcase.gsub(/[^a-z0-9]+/, '-').gsub(/(^-|-$)/, '')
      end

      def self.camelize(str)
        str.split('_').map(&:capitalize).join
      end
    end
