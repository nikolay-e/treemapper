  app/models/user.rb: |
    require_relative '../../lib/scopes'
    require_relative 'product'

    class User
      include Scopes

      attr_accessor :name, :products

      scope :active, -> { all.select(&:active) }
      scope :expensive, -> { all.select { |p| p.price > 100 } }
      scope :by_category, ->(cat) { all.select { |p| p.category == cat } }

      def initialize(name:)
        @name = name
        @products = []
      end

      def self.all
        []
      end

      def active
        true
      end
    end
