    require_relative 'retry_helper'

    class Service
      include RetryHelper

      def fetch_data
        with_retry(max_attempts: 5, delay: 2) do
          response = Net::HTTP.get(URI("https://api.example.com/data"))
          JSON.parse(response)
        end
      end

      def fetch_with_timeout
        with_timeout(seconds: 10) do
          fetch_data
        end
      end
    end
