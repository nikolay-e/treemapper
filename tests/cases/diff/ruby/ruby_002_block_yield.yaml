# Test: Service includes RetryHelper module to gain retry/timeout via block+yield
#
# Scenario: lib/service.rb is rewritten to include RetryHelper, calling
# with_retry and with_timeout with blocks. RetryHelper (UNCHANGED) uses
# yield to delegate to caller-supplied blocks.
#
# Reviewer questions:
#   Q1: "What does with_retry yield? How does the retry backoff work?"
#       -> lib/retry_helper.rb (UNCHANGED) defines with_retry using yield
#          inside begin/rescue/retry with exponential delay.
#   Q2: "What happens when with_timeout wraps with_retry?"
#       -> Both methods yield, so the reviewer needs the module to see
#          the timeout/retry interaction.
#
# Trap files (plausible but unrelated):
#   - lib/http_client.rb: makes HTTP requests (same domain as Net::HTTP in
#     Service), but Service uses Net::HTTP directly, not this wrapper.
#   - lib/circuit_breaker.rb: fault tolerance pattern like retry, but
#     RetryHelper is a separate, independent resilience strategy.

max_enrichment: 4.4
initial:
  lib/retry_helper.rb: |
    module RetryHelper
      def with_retry(max_attempts: 3, delay: 1)
        attempts = 0
        begin
          attempts += 1
          yield
        rescue StandardError => e
          if attempts < max_attempts
            sleep(delay * attempts)
            retry
          end
          raise e
        end
      end

      def with_timeout(seconds: 30)
        Timeout.timeout(seconds) { yield }
      rescue Timeout::Error
        raise "Operation timed out after #{seconds}s"
      end
    end
  lib/service.rb: |
    class Service
      def call
        "default"
      end
    end
  lib/http_client.rb: |
    require 'net/http'
    require 'json'

    class HttpClient
      def initialize(base_url)
        @base_url = URI.parse(base_url)
      end

      def get(path, headers: {})
        uri = URI.join(@base_url, path)
        request = Net::HTTP::Get.new(uri)
        headers.each { |k, v| request[k] = v }
        response = Net::HTTP.start(uri.hostname, uri.port) { |http| http.request(request) }
        JSON.parse(response.body)
      end

      def post(path, body:, headers: {})
        uri = URI.join(@base_url, path)
        request = Net::HTTP::Post.new(uri)
        request.body = body.to_json
        request['Content-Type'] = 'application/json'
        headers.each { |k, v| request[k] = v }
        response = Net::HTTP.start(uri.hostname, uri.port) { |http| http.request(request) }
        JSON.parse(response.body)
      end
    end
  lib/circuit_breaker.rb: |
    class CircuitBreaker
      STATES = [:closed, :open, :half_open].freeze

      def initialize(failure_threshold: 5, reset_timeout: 30)
        @failure_threshold = failure_threshold
        @reset_timeout = reset_timeout
        @failure_count = 0
        @state = :closed
        @last_failure_time = nil
      end

      def call
        check_state!
        begin
          result = yield
          on_success
          result
        rescue StandardError => e
          on_failure
          raise e
        end
      end

      private

      def check_state!
        return if @state == :closed
        if @state == :open && Time.now - @last_failure_time > @reset_timeout
          @state = :half_open
        end
        raise "Circuit is open" if @state == :open
      end

      def on_success
        @failure_count = 0
        @state = :closed
      end

      def on_failure
        @failure_count += 1
        @last_failure_time = Time.now
        @state = :open if @failure_count >= @failure_threshold
      end
    end
