# Test: app.rb gains require_relative calls to Processor and Formatter, wiring them together
#
# Scenario: app.rb is rewritten from a trivial puts to a script that requires
# Processor and Formatter, calls process/batch_process, and formats results.
# Both lib/processor.rb and lib/formatter.rb are UNCHANGED.
#
# Reviewer questions:
#   Q1: "What methods does Processor expose? What is batch_process's return type?"
#       -> lib/processor.rb (UNCHANGED) defines process(data) and batch_process(items)
#   Q2: "What template syntax does Formatter use?"
#       -> lib/formatter.rb (UNCHANGED) defines format(values) with gsub-based interpolation
#
# Trap files (plausible but unrelated):
#   - lib/csv_exporter.rb: exports data to CSV format. Same lib/ directory, deals
#     with data transformation, but Processor and Formatter never reference it.
#   - lib/logger_config.rb: configures application-level logging. Processor has a
#     @logger field, making this seem related, but app.rb passes logger: nil and
#     never touches logging config.

initial:
  lib/processor.rb: |
    class Processor
      attr_reader :options

      def initialize(options = {})
        @options = options
        @logger = options.fetch(:logger, nil)
      end

      def process(data)
        data.upcase
      end

      def batch_process(items)
        items.map { |item| process(item) }
      end

      private

      def log(message)
        @logger&.info(message)
      end
    end
  app.rb: |
    puts 'Hello'
  lib/formatter.rb: |
    class Formatter
      def initialize(template)
        @template = template
      end

      def format(values)
        result = @template.dup
        values.each { |k, v| result.gsub!("{#{k}}", v.to_s) }
        result
      end
    end
  lib/csv_exporter.rb: |
    require 'csv'

    class CsvExporter
      def initialize(headers)
        @headers = headers
      end

      def export(records, output_path)
        CSV.open(output_path, 'w') do |csv|
          csv << @headers
          records.each { |record| csv << @headers.map { |h| record[h] } }
        end
      end

      def export_to_string(records)
        CSV.generate do |csv|
          csv << @headers
          records.each { |record| csv << @headers.map { |h| record[h] } }
        end
      end
    end
  lib/logger_config.rb: |
    require 'logger'

    class LoggerConfig
      DEFAULT_LEVEL = Logger::INFO

      def self.create(output: $stdout, level: DEFAULT_LEVEL)
        logger = Logger.new(output)
        logger.level = level
        logger.formatter = proc do |severity, datetime, _progname, msg|
          "[#{severity}] #{datetime.strftime('%Y-%m-%d %H:%M:%S')} - #{msg}\n"
        end
        logger
      end

      def self.create_file_logger(path, level: DEFAULT_LEVEL)
        create(output: path, level: level)
      end
    end
