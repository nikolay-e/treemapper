name: ruby_011_symbol_to_proc
repo:
  initial_files:
    lib/user.rb: |
      class User
        attr_reader :name, :email, :age, :active

        def initialize(name:, email:, age:, active: true)
          @name = name
          @email = email
          @age = age
          @active = active
        end

        def to_s
          "#{@name} <#{@email}>"
        end

        def adult?
          @age >= 18
        end
      end
    lib/report.rb: |
      class Report
        def generate
          "empty"
        end
      end
    lib/csv_report.rb: |
      require 'csv'

      class CsvReport
        def initialize(headers, rows)
          @headers = headers
          @rows = rows
        end

        def generate
          CSV.generate do |csv|
            csv << @headers
            @rows.each { |row| csv << row }
          end
        end

        def save(file_path)
          File.write(file_path, generate)
        end
      end
    lib/user_stats.rb: |
      class UserStats
        def initialize(users)
          @users = users
        end

        def average_age
          return 0 if @users.empty?
          @users.sum { |u| u.age } / @users.size.to_f
        end

        def active_percentage
          return 0 if @users.empty?
          active_count = @users.count { |u| u.active }
          (active_count.to_f / @users.size * 100).round(1)
        end

        def age_distribution
          @users.group_by { |u| (u.age / 10) * 10 }
                .transform_values(&:size)
        end
      end
  changed_files:
    lib/user.rb: |
      class User
        attr_reader :name, :email, :age, :active

        def initialize(name:, email:, age:, active: true)
