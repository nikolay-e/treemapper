        GARBAGE_RUBY_011_RESOLVER_TYPE_A
      end
    end
  lib/garbage_session_store.rb: |
    GARBAGE_RUBY_011_STORE_BACKEND_D = "memcached"
    GARBAGE_RUBY_011_EXPIRY_HOURS_E = "24"

