    lib/report.rb: |
      require_relative 'user'

      class Report
        def initialize(users)
          @users = users
        end

        def names
          @users.map(&:name)
        end

        def emails
          @users.map(&:email)
        end

        def total_age
          @users.map(&:age).sum
        end

        def active_adults
          @users.select(&:active).select(&:adult?)
        end

        def summary
          @users.map(&:to_s).join(", ")
        end
      end
    lib/csv_report.rb: |
      require 'csv'

      class CsvReport
        def initialize(headers, rows)
          @headers = headers
