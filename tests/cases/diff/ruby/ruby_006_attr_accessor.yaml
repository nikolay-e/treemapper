        @settings[key.to_sym] = value
      end

      def to_h
        { user_id: @user_id, settings: @settings }
      end
    end
  lib/email_validator.rb: |
    class EmailValidator
      EMAIL_REGEX = /\A[^@\s]+@[^@\s]+\.[a-zA-Z]{2,}\z/

      def self.valid?(email)
        return false if email.nil? || email.empty?
        !!(email =~ EMAIL_REGEX)
      end

      def self.normalize(email)
        return nil unless valid?(email)
        email.strip.downcase
      end

      def self.domain(email)
        return nil unless valid?(email)
        email.split('@').last
      end
    end
must_include_files:
  - app.rb
  # Q1/Q2: User defines the accessors and valid? that app.rb relies on
  - lib/user.rb
must_include_content_from:
  app.rb:
    - "user = User.new(name: 'John Doe', email: 'john@example.com')"
    - "user.email = 'new@example.com'"
  lib/user.rb:
    - "attr_accessor :name, :email"
    - "attr_reader :id, :created_at"
must_not_include:
  # lib/user_preferences.rb: user settings — not imported by app.rb or User
  - UserPreferences
  - DEFAULTS
  - timezone
  # lib/email_validator.rb: standalone validator — User.valid? has inline check
  - EmailValidator
  - EMAIL_REGEX
  - normalize
must_not_include_files:
  - lib/user_preferences.rb
  - lib/email_validator.rb
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
