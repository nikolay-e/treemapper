  app/services/email_service.rb: |
    class EmailService
      SMTP_HOST = 'smtp.example.com'
      SMTP_PORT = 587

      def initialize(from:)
        @from = from
        @queue = []
      end

      def send_welcome(to:, name:)
        @queue << {
          to: to,
          subject: "Welcome #{name}!",
          body: "Thanks for signing up.",
          from: @from
        }
        deliver_all
      end

      def send_reset_password(to:, token:)
        @queue << {
          to: to,
          subject: "Password Reset",
          body: "Reset token: #{token}",
          from: @from
        }
        deliver_all
      end

      private

      def deliver_all
        count = @queue.size
        @queue.clear
        count
      end
    end
