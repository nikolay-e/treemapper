name: ruby_013_refinement
repo:
  initial_files:
    lib/string_ext.rb: |
      module StringExtensions
        refine String do
          def titlecase
            split(' ').map(&:capitalize).join(' ')
          end

          def truncate(length, omission: '...')
            return self if size <= length
            "#{self[0, length - omission.size]}#{omission}"
          end

          def word_count
            split(/\s+/).size
          end
        end
      end
    lib/formatter.rb: |
      class Formatter
        def format(text)
          text.to_s
        end
      end
    lib/text_stats.rb: |
      class TextStatistics
        def initialize(text)
          @text = text
        end

        def word_count
          @text.split(/\s+/).size
        end

        def char_count
          @text.length
        end

        def avg_word_length
          words = @text.split(/\s+/)
          return 0.0 if words.empty?
          words.sum(&:length).to_f / words.size
        end

        def sentence_count
          @text.scan(/[.!?]+/).size
        end
      end
    lib/markdown_renderer.rb: |
      class MarkdownRenderer
        def render(markdown)
          lines = markdown.split("\n")
          lines.map { |line| render_line(line) }.join("\n")
        end

        private

        def render_line(line)
          case line
          when /^# (.+)/
            "<h1>#{$1}</h1>"
          when /^## (.+)/
            "<h2>#{$1}</h2>"
          when /^\* (.+)/
            "<li>#{$1}</li>"
          else
            "<p>#{line}</p>"
          end
        end
      end
