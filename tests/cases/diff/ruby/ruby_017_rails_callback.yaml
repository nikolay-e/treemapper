    lib/event_bus.rb: |
      class EventBus
        def initialize
          @subscribers = Hash.new { |h, k| h[k] = [] }
        end

        def subscribe(event, &handler)
          @subscribers[event] << handler
        end

        def publish(event, data = {})
          @subscribers[event].each { |handler| handler.call(data) }
        end

        def unsubscribe(event)
          @subscribers.delete(event)
        end

        def subscriber_count(event)
          @subscribers[event].size
        end

        def clear_all
          @subscribers.clear
        end
      end
    lib/validator.rb: |
      class ValidationPipeline
        def initialize
          @rules = []
        end

        def add_rule(field, &block)
          @rules << { field: field, check: block }
        end

        def validate(record)
          errors = []
          @rules.each do |rule|
            value = record.send(rule[:field])
            unless rule[:check].call(value)
              errors << "#{rule[:field]} is invalid"
            end
          end
          errors
        end

        def valid?(record)
          validate(record).empty?
        end

        def rule_count
          @rules.size
        end
      end
