# Test: Worker includes Logging module to gain structured log methods
#
# Scenario: lib/worker.rb is rewritten to include Logging, calling log(),
# log_error(), and log_debug() within perform/execute. The Logging module
# (UNCHANGED) provides these methods with timestamp formatting.
#
# Reviewer questions:
#   Q1: "What format does log() produce? What levels are supported?"
#       -> lib/logging.rb (UNCHANGED) defines log/log_error/log_debug/log_warn
#   Q2: "Does log_error raise or just print?"
#       -> Logging.log_error delegates to log(level: :error), just prints
#
# Trap files (plausible but unrelated):
#   - lib/json_serializer.rb: serializes objects to JSON — same lib/ directory,
#     both deal with output formatting, but Worker never imports or uses it.
#   - lib/task_queue.rb: background task queue — similar domain to Worker
#     (both process tasks), but no dependency from Worker.

max_enrichment: 6.7
initial:
  lib/logging.rb: |
    module Logging
      def log(message, level: :info)
        timestamp = Time.now.strftime("%Y-%m-%d %H:%M:%S")
        formatted = "[#{level.upcase}] #{timestamp} - #{message}"
        puts formatted
        formatted
      end

      def log_error(message)
        log(message, level: :error)
      end

      def log_debug(message)
        log(message, level: :debug)
      end

      def log_warn(message)
        log(message, level: :warn)
      end
    end
  lib/worker.rb: |
    class Worker
      def perform
        "done"
      end
    end
  lib/json_serializer.rb: |
    require 'json'

    class JsonSerializer
      def initialize(pretty: false)
        @pretty = pretty
      end

      def serialize(object)
        if @pretty
          JSON.pretty_generate(object)
        else
          JSON.generate(object)
        end
      end

      def deserialize(json_string)
        JSON.parse(json_string, symbolize_names: true)
      end
    end
  lib/task_queue.rb: |
    class TaskQueue
      def initialize
        @queue = []
        @completed = []
      end

      def enqueue(task_name, priority: 0)
        @queue << { name: task_name, priority: priority, enqueued_at: Time.now }
        @queue.sort_by! { |t| -t[:priority] }
      end

      def dequeue
        @queue.shift
      end

      def complete(task_name)
        @completed << { name: task_name, completed_at: Time.now }
      end

      def pending_count
        @queue.size
      end
    end
