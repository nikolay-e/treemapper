    - "include Logging"
    - 'log_error("Task #{task_name} failed'
  lib/logging.rb:
    - "def log(message, level: :info)"
must_not_include:
  # lib/json_serializer.rb: serialization — no dependency edge from Worker
  - JsonSerializer
  - pretty_generate
  - deserialize
  # lib/task_queue.rb: task queue — different responsibility, not imported
  - TaskQueue
  - enqueue
  - pending_count
must_not_include_files:
  - lib/json_serializer.rb
