  lib/form.rb: |
    require_relative 'validators'

    class Form
      def validate(data)
        age_range = Validators::IN_RANGE.call(1, 150)
        rules = {
          age: [Validators::POSITIVE, age_range],
          name: [Validators::NON_EMPTY],
          email: [Validators::NON_EMPTY, Validators::EMAIL_FORMAT]
        }
        Validators.validate_all(data, rules)
      end

      def submit(data)
        return false unless validate(data)
        true
      end
    end
