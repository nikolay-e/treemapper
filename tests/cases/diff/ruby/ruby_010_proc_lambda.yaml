# Test: Form uses Validators' Proc/Lambda constants for field validation
#
# Scenario: lib/form.rb is rewritten to require Validators and use its lambda
# constants (POSITIVE, NON_EMPTY, EMAIL_FORMAT, IN_RANGE) plus validate_all.
# Validators (UNCHANGED) defines these as lambdas.
#
# Reviewer questions:
#   Q1: "What does IN_RANGE return? Is it a curried lambda?"
#       -> lib/validators.rb (UNCHANGED) — IN_RANGE returns a lambda-returning-lambda.
#   Q2: "How does validate_all combine multiple validators per field?"
#       -> Validators.validate_all iterates rules hash, calling all validators.
#
# Trap files (plausible but unrelated):
#   - lib/schema_validator.rb: JSON schema validation — different validation
#     approach, not used by Form.
#   - lib/form_builder.rb: builds form HTML — same "form" domain but
#     Form is a data validation class, not an HTML builder.

max_enrichment: 8.1
initial:
  lib/validators.rb: |
    module Validators
      POSITIVE = ->(x) { x.is_a?(Numeric) && x > 0 }
      NON_EMPTY = ->(s) { !s.nil? && !s.to_s.empty? }
      EMAIL_FORMAT = ->(e) { e.to_s =~ /\A[^@\s]+@[^@\s]+\z/ }
      IN_RANGE = ->(min, max) { ->(v) { v >= min && v <= max } }

      def self.validate(value, *validators)
        validators.all? { |v| v.call(value) }
      end

      def self.validate_all(data, rules)
        rules.all? do |field, validators|
          validators.all? { |v| v.call(data[field]) }
        end
      end
    end
  lib/form.rb: |
    class Form
      def submit
        true
      end
    end
  lib/schema_validator.rb: |
    class SchemaValidator
      def initialize(schema)
        @schema = schema
      end

      def validate(data)
        errors = []
        @schema.each do |field, rules|
          value = data[field]
          if rules[:required] && value.nil?
            errors << "#{field} is required"
          end
          if rules[:type] && !value.nil? && !value.is_a?(rules[:type])
            errors << "#{field} must be #{rules[:type]}"
          end
          if rules[:max_length] && value.is_a?(String) && value.length > rules[:max_length]
            errors << "#{field} exceeds max length #{rules[:max_length]}"
          end
        end
        errors
      end

      def valid?(data)
        validate(data).empty?
      end
    end
  lib/form_builder.rb: |
    class FormBuilder
      def initialize(action, method: :post)
        @action = action
        @method = method
        @fields = []
      end

      def text_field(name, label: nil, placeholder: nil)
        @fields << { type: :text, name: name, label: label, placeholder: placeholder }
        self
      end

      def submit_button(text = 'Submit')
        @fields << { type: :submit, text: text }
        self
      end

      def to_html
        fields_html = @fields.map { |f| render_field(f) }.join("\n")
        "<form action=\"#{@action}\" method=\"#{@method}\">\n#{fields_html}\n</form>"
      end

      private

      def render_field(field)
        case field[:type]
        when :text
          "<input type=\"text\" name=\"#{field[:name]}\" />"
        when :submit
          "<button type=\"submit\">#{field[:text]}</button>"
        end
      end
    end
