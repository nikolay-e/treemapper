must_include_files:
  - app.rb
  # Q1/Q2: DynamicStruct implements method_missing that app.rb relies on
  - lib/dynamic_struct.rb
must_include_content_from:
  app.rb:
    - "config = DynamicStruct.new(host: 'localhost', port: 3000, debug: false)"
    - "config.debug?"
  lib/dynamic_struct.rb:
    - "def method_missing(name, *args)"
    - "def respond_to_missing?"
must_not_include:
  # lib/config_loader.rb: YAML config loading — not used by app.rb
  - ConfigLoader
  - load_with_defaults
  - YAML.safe_load
  # lib/open_struct_ext.rb: different dynamic struct implementation
  - OpenStructExt
  - freeze_deep
must_not_include_files:
  - lib/config_loader.rb
  - lib/open_struct_ext.rb
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
