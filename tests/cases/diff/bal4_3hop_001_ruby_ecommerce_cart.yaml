name: bal4_3hop_001_ruby_ecommerce_cart
tags:
- lang:ruby
- change:single_file
- context:import_chain
- distance:3hop+
- difficulty:trivial
repo:
  initial_files:
    lib/pricing/tax.rb: |
      module Pricing
        class Tax
          def self.rate(region)
            { "US" => 0.08, "EU" => 0.20 }.fetch(region, 0.0)
          end
        end
      end
    lib/pricing/calculator.rb: |
      require_relative 'tax'
      module Pricing
        class Calculator
          def total(amount, region)
            amount + amount * Tax.rate(region)
          end
        end
      end
    lib/cart/line_item.rb: |
      require_relative '../pricing/calculator'
      module Cart
        class LineItem
          attr_reader :price, :qty
          def initialize(price, qty)
            @price = price
            @qty = qty
          end
          def subtotal(region)
            Pricing::Calculator.new.total(price * qty, region)
          end
        end
      end
    lib/cart/checkout.rb: |
      require_relative 'line_item'
      module Cart
        class Checkout
          def initialize(items, region)
            @items = items
            @region = region
          end
          def grand_total
            @items.sum { |i| i.subtotal(@region) }
          end
        end
      end
    lib/utils/formatter.rb: |
      module Utils
        GARBAGE_001_FORMATTER_A = "fmt"
        class Formatter
          GARBAGE_001_STYLE_B = true
          def self.currency(val)
            "$#{val}"
          end
        end
      end
    lib/utils/logger.rb: |
      module Utils
        GARBAGE_001_LOGGER_C = "log"
        GARBAGE_001_LEVEL_D = "info"
        class Logger
          def self.info(msg)
            puts msg
          end
        end
      end
  changed_files:
