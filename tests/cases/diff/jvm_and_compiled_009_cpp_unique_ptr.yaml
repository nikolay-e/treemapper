- difficulty:hard
repo:
  initial_files:
    include/resource.h: |
      #pragma once
      #include <string>

      class Resource {
      public:
          std::string id;
          Resource(const std::string& id) : id(id) {}
          void use() {}
      };
    src/manager.cpp: |
      #include <iostream>
      int main() { return 0; }
    src/connection_pool.cpp: |
      #include <memory>
      #include <vector>
      #include <string>

      class Connection {
      public:
          std::string host;
          int port;
          Connection(const std::string& h, int p) : host(h), port(p) {}
          void execute(const std::string& query) {}
          void close() {}
      };

      class ConnectionPool {
          std::vector<std::unique_ptr<Connection>> pool_;
      public:
          std::unique_ptr<Connection> acquire(const std::string& host, int port) {
              return std::make_unique<Connection>(host, port);
          }

          void releaseAll() { pool_.clear(); }
          size_t size() const { return pool_.size(); }
      };
    include/resource_factory.h: |
      #pragma once
      #include "resource.h"
      #include <memory>
      #include <string>

      class ResourceFactory {
      public:
          static std::unique_ptr<Resource> create(const std::string& id) {
              return std::make_unique<Resource>(id);
          }

          static std::unique_ptr<Resource> createWithPrefix(
              const std::string& prefix,
              const std::string& name)
          {
              return std::make_unique<Resource>(prefix + "-" + name);
          }
      };
    src/shared_cache.cpp: |
      #include "resource.h"
      #include <memory>
      #include <unordered_map>
      #include <string>

      class SharedCache {
          std::unordered_map<std::string, std::shared_ptr<Resource>> cache_;
      public:
          std::shared_ptr<Resource> get(const std::string& key) {
              auto it = cache_.find(key);
              if (it != cache_.end()) return it->second;
              auto res = std::make_shared<Resource>(key);
              cache_[key] = res;
              return res;
          }

          size_t size() const { return cache_.size(); }
          void evict(const std::string& key) { cache_.erase(key); }
      };
    tests/resource_test.cpp: |
      #include "resource.h"
      #include <cassert>
      #include <memory>

      void test_resource_creation() {
          auto res = std::make_unique<Resource>("test-1");
          assert(res->id == "test-1");
      }

      void test_resource_use() {
          Resource r("test-2");
          r.use();
          assert(r.id == "test-2");
      }
  changed_files:
    src/manager.cpp: |
      #include "resource.h"
      #include <memory>

      class ResourceManager {
      public:
          std::unique_ptr<Resource> acquire(const std::string& id) {
              return std::make_unique<Resource>(id);
          }

          void process() {
              auto res = acquire("resource-1");
              res->use();
          }
      };
  commit_message: Update files
