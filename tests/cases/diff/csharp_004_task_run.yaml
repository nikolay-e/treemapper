name: csharp_004_task_run
tags:
- lang:python
- change:config
- change:single_file
- context:cross_module
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    config/game_settings.py: |
      MATCHMAKING_TIMEOUT = 30
      MAX_PLAYERS_PER_ROOM = 4
      RANKED_QUEUE_ENABLED = True
      ELO_K_FACTOR = 32
      MIN_ELO_DIFF_FOR_MATCH = 200
    matchmaking/queue.py: |
      from config.game_settings import MATCHMAKING_TIMEOUT, MAX_PLAYERS_PER_ROOM, MIN_ELO_DIFF_FOR_MATCH

      class MatchmakingQueue:
          def __init__(self):
              self.timeout = MATCHMAKING_TIMEOUT
              self.max_players = MAX_PLAYERS_PER_ROOM
              self.elo_diff = MIN_ELO_DIFF_FOR_MATCH
              self._waiting = []

          def enqueue(self, player_id: str, elo: int):
              self._waiting.append({"id": player_id, "elo": elo})

          def dequeue_match(self):
              if len(self._waiting) < self.max_players:
                  return None
              return self._waiting[:self.max_players]
    matchmaking/elo.py: |
      from config.game_settings import ELO_K_FACTOR

      class EloCalculator:
          def __init__(self):
              self.k = ELO_K_FACTOR

          def expected_score(self, player_elo: int, opponent_elo: int) -> float:
              return 1.0 / (1 + 10 ** ((opponent_elo - player_elo) / 400))

          def update(self, player_elo: int, opponent_elo: int, won: bool) -> int:
              expected = self.expected_score(player_elo, opponent_elo)
              actual = 1 if won else 0
              return int(player_elo + self.k * (actual - expected))
    services/game_session.py: |
      from matchmaking.queue import MatchmakingQueue
      from matchmaking.elo import EloCalculator

      class GameSessionService:
          def __init__(self):
              self.queue = MatchmakingQueue()
              self.elo = EloCalculator()

          def start_matchmaking(self, player_id: str, elo: int):
              self.queue.enqueue(player_id, elo)
    garbage/StreamingBitrate.py: |
      # GARBAGE_CSHAR004_A = "streaming_bitrate_marker"

      class StreamingBitrate:
          default = 1080
    garbage/PaymentInvoice.py: |
      # GARBAGE_CSHAR004_B = "payment_invoice_marker"

      class PaymentInvoice:
          currency = "USD"
    garbage/IoTSensorHub.py: |
      # GARBAGE_CSHAR004_C = "iot_sensor_hub_marker"

      class IoTSensorHub:
          protocol = "MQTT"
  changed_files:
    config/game_settings.py: |
      MATCHMAKING_TIMEOUT = 30
      MAX_PLAYERS_PER_ROOM = 4
      RANKED_QUEUE_ENABLED = True
      ELO_K_FACTOR = 16
      MIN_ELO_DIFF_FOR_MATCH = 150
      PLACEMENT_MATCHES_REQUIRED = 10
    matchmaking/queue.py: |
      from config.game_settings import MATCHMAKING_TIMEOUT, MAX_PLAYERS_PER_ROOM, MIN_ELO_DIFF_FOR_MATCH

      class MatchmakingQueue:
          def __init__(self):
              self.timeout = MATCHMAKING_TIMEOUT
              self.max_players = MAX_PLAYERS_PER_ROOM
              self.elo_diff = MIN_ELO_DIFF_FOR_MATCH
              self._waiting = []

          def enqueue(self, player_id: str, elo: int):
              self._waiting.append({"id": player_id, "elo": elo})

          def dequeue_match(self):
              if len(self._waiting) < self.max_players:
                  return None
              return self._waiting[:self.max_players]
    matchmaking/elo.py: |
      from config.game_settings import ELO_K_FACTOR, PLACEMENT_MATCHES_REQUIRED

      class EloCalculator:
          def __init__(self):
              self.k = ELO_K_FACTOR
              self.placement_required = PLACEMENT_MATCHES_REQUIRED

          def expected_score(self, player_elo: int, opponent_elo: int) -> float:
              return 1.0 / (1 + 10 ** ((opponent_elo - player_elo) / 400))

          def update(self, player_elo: int, opponent_elo: int, won: bool, games_played: int = 0) -> int:
              k = self.k * 2 if games_played < self.placement_required else self.k
              expected = self.expected_score(player_elo, opponent_elo)
              actual = 1 if won else 0
              return int(player_elo + k * (actual - expected))
    services/game_session.py: |
      from matchmaking.queue import MatchmakingQueue
