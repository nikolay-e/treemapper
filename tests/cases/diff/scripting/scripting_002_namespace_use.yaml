# Scenario: Controller.php adds a use statement for App\Services\PaymentService
# and builds a checkout flow that calls process(), getProvider(), getCurrency().
#
# Diff: Controller.php goes from an empty class to a full checkout controller
# that instantiates PaymentService and delegates payment processing.
#
# Reviewer questions:
#   Q1: "What does PaymentService::process() actually do? Can it fail?"
#       -> src/Services/PaymentService.php (UNCHANGED) defines process(float):
#          returns false when amount <= 0. Reviewer verifies the controller
#          handles the boolean return correctly.
#   Q2: "What are getProvider() and getCurrency()?"
#       -> PaymentService.php shows they return constructor defaults ('stripe', 'USD').
#          Reviewer sees the full contract of the service being consumed.
#
# Not needed:
#   - src/Services/ShippingService.php: calculates shipping rates. Same Services
#     namespace, same constructor-with-defaults pattern. But Controller doesn't
#     import it.
#   - src/Services/DiscountService.php: applies discounts to amounts. Same
#     namespace, processes float amounts like PaymentService. But not imported.
#   - src/Repositories/OrderRepository.php: database persistence layer for orders.
#     Controller doesn't use it — different concern entirely.
#   - src/Controllers/CartController.php: another controller that ALSO uses
#     PaymentService. HARDEST TRAP: same `use App\Services\PaymentService`,
#     same process() calls. Sibling consumer of the exact same dependency.
#   - src/Events/PaymentProcessed.php: event dispatched after payment.
#     Related to payment domain but not referenced in the diff.
#   - tests/PaymentServiceTest.php: tests for the service being consumed.
#     Exercises the same process/getProvider methods.

