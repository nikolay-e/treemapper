# Scenario: Repository.php adds find() and save() methods that use ?User nullable return.
# User.php defines the User class with id and name properties.
#
# Diff: Repository.php changes from empty class to having find(int $id): ?User
# and save(User $user): void methods, with require_once 'User.php'.
#
# Reviewer questions:
#   Q1: "What does the User class look like that find() returns?"
#       -> User.php (UNCHANGED) defines User with $id and $name properties and a
#          constructor. Reviewer verifies the returned type's shape.
#   Q2: "Is the nullable return type correct — can $users[$id] actually be missing?"
#       -> User.php shows User is a simple value object with no nullable fields,
#          so null is the correct fallback for missing entries.
#
# Not needed:
#   - Validator.php: validates user input fields. Same domain but doesn't interact
#     with Repository or User storage — no import edge.
#   - UserFormatter.php: formats user data for display. Works with user-like arrays
#     but doesn't import User or Repository.
#   - UserService.php: also requires User.php and Repository.php, calls find()
#     and save(). DIRECT structural edge (same classes, same methods) but is
#     a service layer consumer — different responsibility.
#   - Product.php: another entity class with $id and $name properties. Same
#     structure (constructor, public properties) but different entity.
#   - lib/CacheableRepository.php: wraps repository calls with caching. Has
#     find() method returning nullable — same pattern but independent.

initial:
  src/User.php: |
    <?php
    class User {
        public int $id;
        public string $name;
        public ?string $email;

        public function __construct(int $id, string $name, ?string $email = null) {
            $this->id = $id;
            $this->name = $name;
            $this->email = $email;
        }

        public function hasEmail(): bool {
            return $this->email !== null;
        }
    }
  src/Repository.php: |
    <?php
    class Repository {
    }
  src/Validator.php: |
    <?php
    class Validator {
        public function validateName(string $name): bool {
            return strlen($name) >= 2 && strlen($name) <= 100;
        }

        public function validateId(int $id): bool {
            return $id > 0;
        }

        public function validateEmail(string $email): bool {
            return filter_var($email, FILTER_VALIDATE_EMAIL) !== false;
        }

        public function validateAll(array $data): array {
            $errors = [];
            if (!$this->validateName($data['name'] ?? '')) $errors[] = 'Invalid name';
            if (!$this->validateId($data['id'] ?? 0)) $errors[] = 'Invalid id';
            return $errors;
        }
    }
  src/UserFormatter.php: |
    <?php
    class UserFormatter {
        public function formatForDisplay(array $userData): string {
            return sprintf('%s (%d)', $userData['name'], $userData['id']);
        }

        public function formatForCsv(array $userData): string {
            return implode(',', [$userData['id'], $userData['name']]);
        }

        public function formatForJson(array $userData): string {
            return json_encode($userData);
        }
    }
  src/UserService.php: |
    <?php
    require_once 'User.php';
    require_once 'Repository.php';

    class UserService {
        private Repository $repository;

        public function __construct(Repository $repository) {
            $this->repository = $repository;
        }

        public function getUser(int $id): ?User {
            return $this->repository->find($id);
        }

        public function createUser(string $name, string $email): User {
            $user = new User(rand(1, 9999), $name, $email);
            $this->repository->save($user);
            return $user;
        }

        public function updateUser(int $id, string $name): ?User {
            $user = $this->repository->find($id);
            if ($user === null) return null;
            $user->name = $name;
            $this->repository->save($user);
            return $user;
        }
    }
  src/Product.php: |
    <?php
    class Product {
        public int $id;
        public string $name;
        public float $price;

        public function __construct(int $id, string $name, float $price = 0.0) {
            $this->id = $id;
            $this->name = $name;
            $this->price = $price;
        }

        public function formattedPrice(): string {
            return '$' . number_format($this->price, 2);
        }
    }
  src/lib/CacheableRepository.php: |
    <?php
    class CacheableRepository {
        private array $cache = [];

        public function find(int $id): ?object {
            return $this->cache[$id] ?? null;
        }

        public function store(int $id, object $item): void {
            $this->cache[$id] = $item;
        }

        public function invalidate(int $id): void {
            unset($this->cache[$id]);
        }

        public function flush(): void {
            $this->cache = [];
        }
    }

changed:
  src/User.php: |
    <?php
    class User {
        public int $id;
        public string $name;
        public ?string $email;

        public function __construct(int $id, string $name, ?string $email = null) {
            $this->id = $id;
            $this->name = $name;
            $this->email = $email;
        }

        public function hasEmail(): bool {
            return $this->email !== null;
        }
    }
  src/Repository.php: |
    <?php
    require_once 'User.php';

    class Repository {
        private array $users = [];

        public function find(int $id): ?User {
            return $this->users[$id] ?? null;
        }

        public function save(User $user): void {
            $this->users[$user->id] = $user;
        }
    }

