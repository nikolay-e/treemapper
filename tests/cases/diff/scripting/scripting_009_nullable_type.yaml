  - validateName
  - validateEmail
  - validateAll
  # UserFormatter.php: display formatting, doesn't import User class
  - formatForDisplay
  - formatForCsv
  - formatForJson
  # UserService.php: HARDEST TRAP — requires User.php + Repository.php,
  # calls find() and save() — same classes, same methods, different layer
  - UserService
  - createUser
  - updateUser
  # Product.php: another entity with $id and $name — structure trap
  - Product
  - formattedPrice
  - "$this->price"
  # lib/CacheableRepository.php: has find() returning ?object — pattern trap
  - CacheableRepository
  - invalidate
  - flush
must_not_include_files:
