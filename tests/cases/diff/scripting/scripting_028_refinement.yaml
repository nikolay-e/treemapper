name: scripting_028_refinement
repo:
  initial_files:
    string_ext.rb: |
      module StringExtensions
        refine String do
          def shout
            upcase + "!"
          end

          def whisper
            downcase + "..."
          end

          def emphasize
            "*#{self}*"
          end
        end
      end
    messenger.rb: |
      class Messenger
      end
    text_inflector.rb: |
      module TextInflector
        IRREGULAR = {
          'person' => 'people',
          'child' => 'children',
          'mouse' => 'mice'
        }.freeze

        def self.pluralize(word)
          return IRREGULAR[word] if IRREGULAR.key?(word)
          case word
          when /([^aeiou])y$/i then word.sub(/y$/i, 'ies')
          when /(s|x|z|ch|sh)$/i then word + 'es'
          else word + 's'
          end
        end

        def self.singularize(word)
          inverse = IRREGULAR.invert
          return inverse[word] if inverse.key?(word)
          word.sub(/s$/, '')
        end
      end
    ansi_colors.rb: |
      module AnsiColors
        CODES = { red: 31, green: 32, yellow: 33, blue: 34, magenta: 35, cyan: 36 }.freeze

        def self.colorize(text, color)
          code = CODES.fetch(color, 0)
          "\e[#{code}m#{text}\e[0m"
        end

        def self.bold(text)
          "\e[1m#{text}\e[0m"
        end

        def self.strip_ansi(text)
          text.gsub(/\e\[[0-9;]*m/, '')
        end
      end
    notification.rb: |
      require_relative 'string_ext'

      class Notification
        using StringExtensions

        def initialize(title, body)
          @title = title
          @body = body
        end

        def alert_title
          @title.shout
        end

        def summary
          @body.whisper
        end

        def formatted
          "#{alert_title}\n#{@body.emphasize}"
        end
      end
    string_sanitizer.rb: |
      module StringSanitizer
        SPECIAL_CHARS = /[<>&"']/
        HTML_ENTITIES = { '<' => '&lt;', '>' => '&gt;', '&' => '&amp;', '"' => '&quot;' }.freeze

        def self.strip_tags(input)
          input.gsub(/<\/?[^>]+>/, '')
        end

        def self.escape_html(input)
          input.gsub(/[<>&"]/) { |match| HTML_ENTITIES[match] || match }
        end

        def self.normalize_whitespace(input)
          input.gsub(/\s+/, ' ').strip
        end
      end
    lib/markdown_ext.rb: |
      module MarkdownExtensions
        refine String do
          def to_heading(level = 1)
            "#{'#' * level} #{self}"
          end

          def to_bold
            "**#{self}**"
          end

          def to_italic
            "_#{self}_"
          end

          def to_link(url)
            "[#{self}](#{url})"
          end
        end
      end
  changed_files:
    string_ext.rb: |
      module StringExtensions
        refine String do
          def shout
            upcase + "!"
          end

          def whisper
            downcase + "..."
          end

          def emphasize
            "*#{self}*"
          end
        end
      end
    messenger.rb: |
      require_relative 'string_ext'

      class Messenger
        using StringExtensions

        def loud_message(text)
          text.shout
        end

        def quiet_message(text)
          text.whisper
        end
      end
  commit_message: Update files
