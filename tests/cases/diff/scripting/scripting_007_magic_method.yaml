must_include_files:
  # Q1+Q2+Q3: DynamicObject defines __get, __set, __isset magic methods
  - src/Models/DynamicObject.php
must_include_content_from:
  src/Models/DynamicObject.php:
    - "public function __get(string $name): mixed"
    - "public function __set(string $name, mixed $value): void"
    - "public function __isset(string $name): bool"
  src/app.php:
    - "new DynamicObject()"
    - "$obj->name"
must_not_include:
  # src/Models/StrictObject.php: similar magic methods but throws exceptions
  - "class StrictObject"
  - "Property '$name' not allowed"
  - allowedKeys
  # src/Serializers/ArraySerializer.php: object serialization, no relation
  - "class ArraySerializer"
  - "get_object_vars"
  - toJson
  # src/Models/FormData.php: HARDEST TRAP — requires DynamicObject, calls
  # __set and __get through $this->fields->$name — same class, same methods
  - FormData
  - setField
  - getField
  - allFields
  # src/Models/ImmutableObject.php: __get without __set — opposite behavior
  - ImmutableObject
  - "object is immutable"
  # src/Hydrators/ObjectHydrator.php: sets properties via __set on objects
  - ObjectHydrator
  - hydrate
  - extract
must_not_include_files:
  - src/Models/StrictObject.php
  - src/Serializers/ArraySerializer.php
  - src/Models/FormData.php
  - src/Models/ImmutableObject.php
  - src/Hydrators/ObjectHydrator.php
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
