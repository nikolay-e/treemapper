    src/EnvLoader.php: |
      <?php
      class EnvLoader {
          private string $envFile;

          public function __construct(string $envFile = '.env') {
              $this->envFile = $envFile;
          }

          public function load(): array {
              $vars = [];
              if (file_exists($this->envFile)) {
                  $lines = file($this->envFile, FILE_IGNORE_NEW_LINES | FILE_SKIP_EMPTY_LINES);
                  foreach ($lines as $line) {
                      if (str_starts_with($line, '#')) continue;
                      [$key, $value] = explode('=', $line, 2);
                      $vars[trim($key)] = trim($value);
                  }
              }
              return $vars;
          }

          public function get(string $key, string $default = ''): string {
              return $this->load()[$key] ?? $default;
          }
      }
    src/Logger.php: |
      <?php
      class Logger {
          private string $logFile;

          public function __construct(string $logFile = 'app.log') {
              $this->logFile = $logFile;
          }

          public function info(string $message): void {
              $this->write('INFO', $message);
          }

          public function error(string $message): void {
              $this->write('ERROR', $message);
          }

          public function debug(string $message): void {
              $this->write('DEBUG', $message);
          }

          private function write(string $level, string $message): void {
              $entry = sprintf("[%s] %s: %s\n", date('Y-m-d H:i:s'), $level, $message);
              file_put_contents($this->logFile, $entry, FILE_APPEND);
          }
      }
    src/DatabaseConfig.php: |
      <?php
      class DatabaseConfig {
          public function __construct(
              private string $host,
              private int $port,
              private string $database,
              private string $username = 'root',
              private string $password = ''
          ) {}

          public function getHost(): string {
              return $this->host;
          }

          public function getPort(): int {
              return $this->port;
          }

          public function getDsn(): string {
              return "mysql:host={$this->host};port={$this->port};dbname={$this->database}";
          }
      }
    src/AppBootstrap.php: |
      <?php
      require_once 'Config.php';
      require_once 'Logger.php';

      class AppBootstrap {
          private Config $config;
          private Logger $logger;

          public function __construct(Config $config) {
              $this->config = $config;
              $logFile = $config->isDebug() ? 'debug.log' : 'app.log';
              $this->logger = new Logger($logFile);
          }

          public function run(): void {
              $address = $this->config->getHost() . ':' . $this->config->getPort();
              $this->logger->info("Starting server on $address");
              if ($this->config->isDebug()) {
                  $this->logger->debug("Debug mode enabled");
              }
          }
      }
    src/lib/ConfigValidator.php: |
      <?php
      class ConfigValidator {
          public function validate(object $config): array {
              $errors = [];
              if (method_exists($config, 'getHost') && empty($config->getHost())) {
                  $errors[] = 'Host cannot be empty';
              }
              if (method_exists($config, 'getPort')) {
                  $port = $config->getPort();
                  if ($port < 1 || $port > 65535) {
                      $errors[] = 'Port must be between 1 and 65535';
                  }
              }
              return $errors;
          }
      }
