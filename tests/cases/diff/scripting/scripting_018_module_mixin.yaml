        result = yield
        @timings[name] = Time.now - start
        result
      end

      def report
        { counters: @counters, timings: @timings }
      end
    end
  lib/notifier.rb: |
    class Notifier
      def initialize(channel)
        @channel = channel
      end

      def send_alert(subject, body)
        dispatch(@channel, subject, body)
      end

      def send_info(subject, body)
        dispatch(@channel, subject, body)
      end

      private

      def dispatch(channel, subject, body)
        puts "Sending to #{channel}: [#{subject}] #{body}"
      end
    end
must_include_files:
  # Q1: logging.rb defines the Logging module that worker.rb includes
  - lib/logging.rb
must_include_content_from:
  lib/logging.rb:
    - "module Logging"
    - "def log(message)"
    - "puts \"[LOG] #{message}\""
must_not_include:
  # metrics.rb: performance tracking, no reference to Logging module
  - Metrics
  - increment
  - "@counters"
  # notifier.rb: alert sending, independent notification mechanism
  - Notifier
  - send_alert
  - dispatch
must_not_include_files:
  - lib/metrics.rb
  - lib/notifier.rb
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
