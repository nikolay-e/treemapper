# Scenario: Parser.php adds a parse() method accepting string|array union type,
# returning a Data object. Data.php defines the value wrapper class.
#
# Diff: Parser.php changes from empty class to having parse(string|array $input): Data
# which handles both string (JSON decode) and array inputs, with require_once 'Data.php'.
#
# Reviewer questions:
#   Q1: "What is the Data class that parse() constructs and returns?"
#       -> Data.php (UNCHANGED) defines Data with a mixed $value property and constructor.
#          Reviewer verifies the wrapper's structure matches how Parser uses it.
#   Q2: "Is json_decode output compatible with Data's constructor?"
#       -> Data.php accepts mixed $value, so both decoded arrays and raw arrays work.
#
# Not needed:
#   - Serializer.php: converts objects to JSON strings. Inverse operation to parsing
#     but doesn't import Data or Parser — no edge.
#   - SchemaValidator.php: validates data against JSON schemas. Related domain
#     (data processing) but independent — no import to Data or Parser.
#   - ResponseParser.php: also requires Data.php and returns Data instances.
#     DIRECT structural edge (same class, same return type) but parses HTTP
#     responses — different consumer.
#   - TypedData.php: extends Data concept with type checking. References Data
#     pattern but is an independent class — no import from Parser.
#   - lib/JsonHelper.php: provides json_decode wrappers. Same json_decode call
#     as Parser but standalone utility — no Data dependency.

initial:
  src/Data.php: |
    <?php
    class Data {
        public mixed $value;

        public function __construct(mixed $value) {
            $this->value = $value;
        }

        public function isEmpty(): bool {
            return empty($this->value);
        }

        public function toArray(): array {
            return is_array($this->value) ? $this->value : [$this->value];
        }

        public function count(): int {
            return is_array($this->value) ? count($this->value) : 1;
        }
    }
  src/Parser.php: |
    <?php
    class Parser {
    }
  src/Serializer.php: |
    <?php
    class Serializer {
        public function toJson(object $obj): string {
            return json_encode($obj, JSON_PRETTY_PRINT);
        }

        public function toXml(array $data, string $root = 'root'): string {
            $xml = new SimpleXMLElement("<{$root}/>");
            array_walk_recursive($data, function($val, $key) use ($xml) {
                $xml->addChild($key, $val);
            });
            return $xml->asXML();
        }

        public function toCsv(array $rows): string {
            $output = fopen('php://temp', 'r+');
            foreach ($rows as $row) {
                fputcsv($output, $row);
            }
            rewind($output);
            return stream_get_contents($output);
        }
    }
  src/SchemaValidator.php: |
    <?php
    class SchemaValidator {
        private array $schema;

        public function __construct(array $schema) {
            $this->schema = $schema;
        }

        public function validate(array $data): bool {
            foreach ($this->schema as $field => $type) {
                if (!isset($data[$field]) || gettype($data[$field]) !== $type) {
                    return false;
                }
            }
            return true;
        }

        public function errors(array $data): array {
            $errs = [];
            foreach ($this->schema as $field => $type) {
                if (!isset($data[$field])) {
                    $errs[] = "Missing field: $field";
                }
            }
            return $errs;
        }
    }
  src/ResponseParser.php: |
    <?php
    require_once 'Data.php';

    class ResponseParser {
        public function parseBody(string $body): Data {
            $decoded = json_decode($body, true);
            return new Data($decoded ?? []);
        }

        public function parseHeaders(array $headers): Data {
            $normalized = [];
            foreach ($headers as $key => $value) {
                $normalized[strtolower($key)] = $value;
            }
            return new Data($normalized);
        }

        public function parseStatusLine(string $line): array {
            preg_match('/HTTP\/(\d\.\d)\s+(\d+)\s+(.*)/', $line, $matches);
            return ['version' => $matches[1] ?? '', 'status' => (int)($matches[2] ?? 0)];
        }
    end
  src/TypedData.php: |
    <?php
    class TypedData {
        private mixed $value;
        private string $type;

        public function __construct(mixed $value) {
            $this->value = $value;
            $this->type = gettype($value);
        }

        public function isString(): bool {
            return $this->type === 'string';
        }

        public function isArray(): bool {
            return $this->type === 'array';
        }

        public function getValue(): mixed {
            return $this->value;
        }
    end
  src/lib/JsonHelper.php: |
    <?php
    class JsonHelper {
        public static function decode(string $json, bool $assoc = true): mixed {
            $result = json_decode($json, $assoc);
            if (json_last_error() !== JSON_ERROR_NONE) {
                throw new \RuntimeException('JSON decode error: ' . json_last_error_msg());
            }
            return $result;
        }

        public static function encode(mixed $data): string {
            $json = json_encode($data, JSON_THROW_ON_ERROR);
            return $json;
        }

        public static function isValid(string $json): bool {
            json_decode($json);
            return json_last_error() === JSON_ERROR_NONE;
        }
    }

changed:
  src/Data.php: |
    <?php
    class Data {
        public mixed $value;

        public function __construct(mixed $value) {
            $this->value = $value;
        }

        public function isEmpty(): bool {
            return empty($this->value);
        }

        public function toArray(): array {
            return is_array($this->value) ? $this->value : [$this->value];
        }

        public function count(): int {
            return is_array($this->value) ? count($this->value) : 1;
        }
    }
  src/Parser.php: |
    <?php
    require_once 'Data.php';

    class Parser {
        public function parse(string|array $input): Data {
            if (is_string($input)) {
                return new Data(json_decode($input, true));
            }
            return new Data($input);
        }
    }

