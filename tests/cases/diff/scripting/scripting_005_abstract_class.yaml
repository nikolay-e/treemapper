  - src/Controllers/BaseController.php
must_include_content_from:
  src/Controllers/BaseController.php:
    - "abstract protected function getModel(): string"
    - "protected function respond(array $data): void"
    - "return ['model' => $this->getModel()]"
must_not_include:
  # ProductController.php: IDENTICAL sibling — same extends, same getModel, same respond
  - "class ProductController"
  - "return 'Product'"
  # OrderController.php: another sibling with same inheritance pattern
  - "class OrderController"
  - "return 'Order'"
  # User.php: model entity, UserController returns string 'User' not the class
  - "namespace App\\Models"
  - "public function toArray"
  # RateLimiter.php: middleware, different concern
  - "class RateLimiter"
  - "maxRequests"
  # web.php: route config, consumer of UserController
  - "$router->get"
  - "UserController::class"
  # UserControllerTest.php: test for the changed class
  - "class UserControllerTest"
  - "testIndex"
must_not_include_files:
