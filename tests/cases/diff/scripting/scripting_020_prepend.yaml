# Scenario: request_handler.rb adds `prepend RequestInterceptor` to wrap the
# process method with before/after logging via super.
# request_interceptor.rb defines the module that intercepts method calls.
#
# Diff: request_handler.rb changes from a standalone class to one that prepends
# RequestInterceptor, so calls to process now pass through the interceptor.
#
# Reviewer questions:
#   Q1: "What does RequestInterceptor do to the process call?"
#       -> request_interceptor.rb (UNCHANGED) shows the module calls super
#          between before/after logging — reviewer understands the interception.
#   Q2: "Does the super call correctly delegate to RequestHandler#process?"
#       -> request_interceptor.rb calls `super` which, with prepend, goes to
#          the original process method. The return value is captured and returned.
#
# Not needed:
#   - text_formatter.rb: formats strings to different cases. Text processing
#     domain but doesn't interact with RequestInterceptor — no require edge.
#   - audit_recorder.rb: writes timestamped entries to file. Related concept
#     (logging) but independent module — no import edge.
#   - response_handler.rb: also prepends RequestInterceptor and has a process
#     method. DIRECT structural edge (same module, same prepend, same method
#     name) but is a different class handling responses.
#   - lib/timing_interceptor.rb: another interceptor module with the same
#     prepend+super pattern. Same mechanism but different module — no edge.
#   - event_handler.rb: has a process method and uses include (not prepend).
#     Same method name and related mechanism but different pattern.

initial:
  request_interceptor.rb: |
    module RequestInterceptor
      def process(payload)
        puts "Before processing: #{payload.length} bytes"
        result = super
        puts "After processing: complete"
        result
      end

      def validate(payload)
        puts "Before validation"
        result = super
        puts "After validation"
        result
      end
    end
  request_handler.rb: |
    class RequestHandler
      def process(payload)
        payload.upcase
      end
    end
  text_formatter.rb: |
    module TextFormatter
      def self.titlecase(text)
        text.split(' ').map(&:capitalize).join(' ')
      end

      def self.snakecase(text)
        text.gsub(/([A-Z])/, '_\1').downcase.sub(/^_/, '')
      end

      def self.truncate(text, length: 50)
        text.length > length ? text[0...length] + '...' : text
      end

      def self.wrap(text, width: 80)
        text.gsub(/(.{1,#{width}})(\s+|$)/, "\\1\n").strip
      end
    end
  audit_recorder.rb: |
    class AuditRecorder
      def initialize(log_path)
        @log_path = log_path
        @entries = []
      end

      def record(level, message)
        timestamp = Time.now.strftime('%Y-%m-%d %H:%M:%S')
        entry = "[#{timestamp}] #{level}: #{message}"
        @entries << entry
        File.open(@log_path, 'a') { |f| f.puts entry }
      end

      def record_info(message)
        record('INFO', message)
      end

      def recent(count = 10)
        @entries.last(count)
      end
    end
  response_handler.rb: |
    require_relative 'request_interceptor'

    class ResponseHandler
      prepend RequestInterceptor

      def process(payload)
        { status: 200, body: payload.downcase }
      end

      def validate(payload)
        payload.is_a?(String) && !payload.empty?
      end
    end
  lib/timing_interceptor.rb: |
    module TimingInterceptor
      def process(payload)
        start_time = Process.clock_gettime(Process::CLOCK_MONOTONIC)
        result = super
        elapsed = Process.clock_gettime(Process::CLOCK_MONOTONIC) - start_time
        puts "Processing took #{elapsed.round(4)}s"
        result
      end
    end
  event_handler.rb: |
    class EventHandler
      def process(event)
        case event[:type]
        when :click then handle_click(event)
        when :submit then handle_submit(event)
        else { error: "Unknown event type" }
        end
      end

      private

      def handle_click(event)
        { action: :clicked, target: event[:target] }
      end

      def handle_submit(event)
        { action: :submitted, data: event[:data] }
      end
    end

