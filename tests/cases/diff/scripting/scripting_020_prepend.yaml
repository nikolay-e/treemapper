must_include_files:
  # Q1: request_interceptor.rb defines the module prepended by RequestHandler
  - request_interceptor.rb
must_include_content_from:
  request_interceptor.rb:
    - "def process(payload)"
    - "result = super"
  request_handler.rb:
    - "prepend RequestInterceptor"
must_not_include:
  # text_formatter.rb: text formatting, no require edge
  - TextFormatter
  - titlecase
  - snakecase
  - wrap
  # audit_recorder.rb: file-based logging, independent
  - AuditRecorder
  - record_info
  - recent
  # response_handler.rb: HARDEST TRAP — also prepends RequestInterceptor
  # Same module, same prepend pattern, same process method name
  - ResponseHandler
  - "status: 200"
  # lib/timing_interceptor.rb: another interceptor module — same pattern
  - TimingInterceptor
  - "clock_gettime"
  - "elapsed"
  # event_handler.rb: has process method but doesn't prepend anything
  - EventHandler
  - handle_click
  - handle_submit
must_not_include_files:
  - text_formatter.rb
  - audit_recorder.rb
  - response_handler.rb
  - lib/timing_interceptor.rb
  - event_handler.rb
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
