# Scenario: Controller.php adds index() and store() methods annotated with
#   #[Route] attributes. Uses require_once 'Route.php'.
#   Only src/Controller.php is changed.
#
# Diff shows:
#   + require_once 'Route.php';
#   + #[Route('/api/users', 'GET')] public function index(): array
#   + #[Route('/api/users', 'POST')] public function store(): array
#
# Reviewer questions:
#   Q1: "What parameters does #[Route] accept? What's the default method?"
#       -> Needs Route.php: constructor has $path and $method (default 'GET').
#         Reviewer must see this to verify #[Route('/api/users', 'POST')]
#         correctly passes 'POST' as second arg (not relying on default).
#
#   Q2: "Can #[Route] be used on methods — or only on classes?"
#       -> Route.php has `#[Attribute]` without Attribute::TARGET_METHOD.
#         This means it applies to classes, methods, functions — everything.
#         Reviewer needs to see this to assess if unrestricted targeting
#         is intentional or a missing constraint.
#
# Not needed for comprehension:
#   - src/Router.php: The framework router that READS #[Route] attributes
#     via reflection to build a routing table. HARDEST TRAP: it references
#     Route::class directly, calls getAttributes(Route::class), and iterates
#     Controller methods. It's the CONSUMER of the exact mechanism the diff
#     uses. But understanding how routes are DISPATCHED doesn't help review
#     whether the #[Route] ANNOTATIONS are correct. The reviewer needs
#     Route.php (attribute definition), not Router.php (attribute reader).
#
#   - tests/ControllerTest.php: Tests Controller — calls index(), store(),
#     asserts return values. Also verifies #[Route] attributes exist via
#     reflection. Imports Controller, exercises the EXACT methods from diff.
#     But test assertions verify behavior, not attribute class definition.
#
#   - src/ProductController.php: Also requires Route.php, uses #[Route]
#     with identical pattern. Sibling controller. Same attribute, same
#     import, same annotation style. But products ≠ users — different
#     controller, different routes.
#
#   - config/routes.php: Configuration file that lists controller classes
#     to scan for #[Route] attributes. References Controller::class by
#     name. Direct backward edge. But route registration config doesn't
#     show what Route's constructor accepts.
#
#   - src/Middleware/AuthMiddleware.php: Middleware registered for
#     '/api/users' routes — the SAME path from the diff's #[Route].
#     Lexical + structural overlap. But middleware processing doesn't
#     explain the Route attribute definition.
#
#   - src/Cacheable.php: Another #[Attribute] class. Same PHP mechanism
#     but independent — no import from Controller.

