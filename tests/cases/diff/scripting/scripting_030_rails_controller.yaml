# Scenario: controller.py is rewritten from placeholder to full CRUD
# controller that imports User from user_model.py and calls User(),
# User.find_by_id(), and user.save().
#
# Diff: controller.py gains create_user, get_user, and builds User objects.
#
# Reviewer questions:
#   Q1: "What does User.find_by_id return and what is User()'s interface?"
#       -> user_model.py (UNCHANGED) defines User with id, name, email attrs,
#          a find_by_id classmethod, and save(). Reviewer needs this to verify
#          the controller passes correct params.
#   Q2: "Does save do anything meaningful?"
#       -> user_model.py shows save returns True. Reviewer sees the controller
#          relies on a stub — important context for understanding error handling.
#
# Not needed:
#   - currency_converter.py: FX conversion. Completely different domain,
#     no import edge to controller or user_model.
#   - weather_forecast.py: weather data. No relationship to user management.

initial:
