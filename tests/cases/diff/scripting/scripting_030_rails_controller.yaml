      class User:
          def __init__(self, user_id=None, name=None, email=None):
              self.user_id = user_id
              self.name = name
              self.email = email

          @classmethod
          def find_by_id(cls, user_id):
              return cls(user_id=user_id, name="User")

          def save(self):
              return True

          def to_dict(self):
              return {"user_id": self.user_id, "name": self.name, "email": self.email}
    controller.py: |
      class UserController:
          pass
    currency_converter.py: |
      class CurrencyConverter:
          def __init__(self):
              self.rates = {"USD_EUR": 0.85, "EUR_GBP": 0.87}

          def convert_amount(self, amount, from_currency, to_currency):
              pair = f"{from_currency}_{to_currency}"
              rate = self.rates.get(pair, 1.0)
              return amount * rate

          def add_exchange_rate(self, pair, rate):
              self.rates[pair] = rate

          def list_supported_pairs(self):
              return list(self.rates.keys())
    weather_forecast.py: |
      class WeatherForecast:
          def __init__(self, api_endpoint="https://weather.example.com"):
              self.api_endpoint = api_endpoint
              self.cache = {}

          def get_temperature(self, city):
              return self.cache.get(city, {"temp": 20, "unit": "celsius"})

          def get_humidity(self, city):
              return self.cache.get(f"{city}_humidity", 65)
