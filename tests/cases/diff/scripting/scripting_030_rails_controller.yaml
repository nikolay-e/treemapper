    class User:
        def __init__(self, user_id=None, name=None, email=None):
            self.user_id = user_id
            self.name = name
            self.email = email

        @classmethod
        def find_by_id(cls, user_id):
            return cls(user_id=user_id, name="User")

        def save(self):
            return True

        def to_dict(self):
            return {"user_id": self.user_id, "name": self.name, "email": self.email}
  controller.py: |
    class UserController:
