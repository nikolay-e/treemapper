  - ValidatedStruct
  - allowed_keys
  - valid_keys
  # config_store.rb: explicit get/set config store, not referenced by app.rb
  - ConfigStore
  - "@entries"
  # profile_builder.rb: HARDEST TRAP — requires dynamic_struct.rb, calls
  # .name= and .email= — same class, same dynamic methods, different consumer
  - ProfileBuilder
  - build_admin
  - permissions
  # open_struct_wrapper.rb: same dynamic attribute concept via OpenStruct
  - OpenStructWrapper
  - freeze_fields
  # lib/hash_proxy.rb: same method_missing mechanism on hashes
  - HashProxy
