# Scenario: app.php starts using the User class — adds require_once, creates
# a User instance, calls addRole(), getName(), and toArray().
#
# Diff: app.php changes from a bare "echo" to full User usage with constructor
# args, role assignment, and serialization.
#
# Reviewer questions:
#   Q1: "What constructor signature does User expect?"
#       -> src/Models/User.php (UNCHANGED) defines __construct(string $name,
#          string $email, int $age = 0). Reviewer verifies the call
#          new User('John', 'john@example.com', 30) matches the signature.
#   Q2: "What do addRole(), getName(), toArray() actually do?"
#       -> src/Models/User.php defines all three methods. Reviewer checks
#          that the usage in app.php (addRole('admin'), getName(), toArray())
#          is correct and understands the returned array structure.
#
# Not needed:
#   - src/Models/Product.php: another model class with name/price fields.
#     Same Models namespace, also has getName() and toArray(). HARDEST TRAP:
#     shares exact method names with User. But no import edge from app.php.
#   - src/Models/Order.php: another model with toArray() and constructor.
#     Same package, same patterns, amplifies the sibling trap.
#   - src/Helpers/StringHelper.php: string utility functions (slugify, truncate).
#     General helper, not referenced by app.php or User.
#   - src/Services/UserService.php: service that creates and manages User
#     objects. Calls `new User(...)` and `$user->addRole()` — the EXACT same
#     API from the diff. Direct structural edge as a consumer.
#   - src/Views/UserView.php: renders User objects using getName() and toArray().
#     Accesses the same User methods from the diff.

initial:
  src/app.php: |
    <?php
    echo "Hello World";
  src/Models/User.php: |
    <?php
    namespace App\Models;

    class User {
        private string $name;
        private string $email;
        private int $age;
        private array $roles;

        public function __construct(string $name, string $email, int $age = 0) {
            $this->name = $name;
            $this->email = $email;
            $this->age = $age;
            $this->roles = [];
        }

        public function getName(): string {
            return $this->name;
        }

        public function getEmail(): string {
            return $this->email;
        }

        public function addRole(string $role): void {
            $this->roles[] = $role;
        }

        public function getRoles(): array {
            return $this->roles;
        }

        public function toArray(): array {
            return [
                'name' => $this->name,
                'email' => $this->email,
                'age' => $this->age,
                'roles' => $this->roles,
            ];
        }
    }
  src/Models/Product.php: |
    <?php
    namespace App\Models;

    class Product {
        private string $name;
        private float $price;
        private string $sku;

        public function __construct(string $name, float $price, string $sku) {
            $this->name = $name;
            $this->price = $price;
            $this->sku = $sku;
        }

        public function getName(): string {
            return $this->name;
        }

        public function getPrice(): float {
            return $this->price;
        }

        public function toArray(): array {
            return ['name' => $this->name, 'price' => $this->price, 'sku' => $this->sku];
        }
    }
  src/Models/Order.php: |
    <?php
    namespace App\Models;

    class Order {
        private int $id;
        private string $customerName;
        private float $total;
        private string $status;

        public function __construct(int $id, string $customerName, float $total) {
            $this->id = $id;
            $this->customerName = $customerName;
            $this->total = $total;
            $this->status = 'pending';
        }

        public function getName(): string {
            return $this->customerName;
        }

        public function toArray(): array {
            return ['id' => $this->id, 'customer' => $this->customerName, 'total' => $this->total];
        }
    }
  src/Helpers/StringHelper.php: |
    <?php
    namespace App\Helpers;

    class StringHelper {
        public static function slugify(string $text): string {
            return strtolower(preg_replace('/[^a-z0-9]+/i', '-', $text));
        }

        public static function truncate(string $text, int $length = 100): string {
            return mb_substr($text, 0, $length);
        }
    }
  src/Services/UserService.php: |
    <?php
    namespace App\Services;

    use App\Models\User;

    class UserService {
        private array $users = [];

        public function createUser(string $name, string $email, int $age): User {
            $user = new User($name, $email, $age);
            $this->users[] = $user;
            return $user;
        }

        public function assignRole(User $user, string $role): void {
            $user->addRole($role);
        }

        public function listUsers(): array {
            return array_map(fn(User $u) => $u->toArray(), $this->users);
        }
    }
  src/Views/UserView.php: |
    <?php
    namespace App\Views;

    use App\Models\User;

    class UserView {
        public function render(User $user): string {
            $data = $user->toArray();
            return sprintf(
                "<div>%s (%s) - Roles: %s</div>",
                $user->getName(),
                $data['email'],
                implode(', ', $data['roles'])
            );
        }
    }
changed:
  src/app.php: |
    <?php
    require_once __DIR__ . '/Models/User.php';

    use App\Models\User;

    $user = new User('John', 'john@example.com', 30);
    $user->addRole('admin');
    echo $user->getName() . "\n";
    print_r($user->toArray());
must_include_files:
  # Q1+Q2: User.php defines the class being instantiated — constructor, addRole, toArray
  - src/Models/User.php
must_include_content_from:
  src/Models/User.php:
    - "public function __construct(string $name, string $email, int $age = 0)"
    - "public function addRole(string $role): void"
    - "public function toArray(): array"
    - "'roles' => $this->roles"
must_not_include:
  # Product.php: sibling model with SAME getName() and toArray() methods
  - "class Product"
  - "private string $sku"
  - "getPrice"
  # Order.php: another sibling model with getName() and toArray()
  - "class Order"
  - "customerName"
  # StringHelper.php: string utilities, not referenced
  - "function slugify"
  - "function truncate"
  # UserService.php: calls new User() and addRole() — same API as diff
  - "class UserService"
  - "createUser"
  - "assignRole"
  # UserView.php: calls getName() and toArray() — same methods as diff
  - "class UserView"
  - "function render"
must_not_include_files:
  - src/Models/Product.php
  - src/Models/Order.php
  - src/Helpers/StringHelper.php
  - src/Services/UserService.php
  - src/Views/UserView.php
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
