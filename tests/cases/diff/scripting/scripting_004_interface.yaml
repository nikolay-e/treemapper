# Scenario: ApiHandler.php implements the RequestHandler interface — adds
# `implements RequestHandler` and provides handle() and validate() methods.
#
# Diff: ApiHandler.php changes from an empty class to a full implementation
# of the RequestHandler interface with request validation and handling logic.
#
# Reviewer questions:
#   Q1: "What contract does RequestHandler define?"
#       -> src/Contracts/RequestHandler.php (UNCHANGED) declares handle(array):array
#          and validate(array):bool. Reviewer verifies ApiHandler implements
#          both methods with the correct signatures.
#   Q2: "Are there other methods in the interface that need implementation?"
#       -> RequestHandler.php has exactly two methods. Reviewer confirms
#          ApiHandler satisfies the full contract.
#
# Not needed:
#   - src/Contracts/EventListener.php: another interface (onEvent, getSubscribedEvents).
#     Same Contracts namespace, same "interface with two methods" structure.
#     But ApiHandler doesn't implement it.
#   - src/Contracts/Cacheable.php: yet another interface in same package.
#     Same structural pattern, amplifies the sibling trap.
#   - src/Middleware/AuthMiddleware.php: request middleware class that also
#     processes request arrays. Shares "handle request" vocabulary and
#     operates on the same array $request parameter type.
#   - src/Handlers/WebhookHandler.php: another RequestHandler implementation.
#     HARDEST TRAP: implements the EXACT same interface being reviewed.
#     Same handle()/validate() signatures. But seeing a sibling implementation
#     doesn't help verify ApiHandler's correctness.
#   - src/Handlers/FormHandler.php: third RequestHandler implementation.
#     Same interface, different validation logic.
#   - tests/ApiHandlerTest.php: test that constructs ApiHandler and calls
#     handle()/validate(). Exercises the same interface methods.

initial:
  src/Handlers/ApiHandler.php: |
    <?php
    namespace App\Handlers;

    class ApiHandler {
    }
  src/Contracts/RequestHandler.php: |
    <?php
    namespace App\Contracts;

    interface RequestHandler {
        public function handle(array $request): array;
        public function validate(array $request): bool;
    }
  src/Contracts/EventListener.php: |
    <?php
    namespace App\Contracts;

    interface EventListener {
        public function onEvent(string $eventName, array $payload): void;
        public function getSubscribedEvents(): array;
    }
  src/Contracts/Cacheable.php: |
    <?php
    namespace App\Contracts;

    interface Cacheable {
        public function getCacheKey(): string;
        public function getCacheTtl(): int;
    }
  src/Middleware/AuthMiddleware.php: |
    <?php
    namespace App\Middleware;

    class AuthMiddleware {
        private string $tokenHeader;

        public function __construct(string $tokenHeader = 'Authorization') {
            $this->tokenHeader = $tokenHeader;
        }

        public function process(array $request, callable $next): array {
            if (!isset($request['headers'][$this->tokenHeader])) {
                return ['error' => 'Unauthorized', 'status' => 401];
            }
            return $next($request);
        }
    }
  src/Handlers/WebhookHandler.php: |
    <?php
    namespace App\Handlers;

    use App\Contracts\RequestHandler;

    class WebhookHandler implements RequestHandler {
        public function handle(array $request): array {
            if (!$this->validate($request)) {
                return ['error' => 'Invalid webhook payload'];
            }
            return [
                'success' => true,
                'event' => $request['event'] ?? 'unknown',
                'processed' => true,
            ];
        }

        public function validate(array $request): bool {
            return isset($request['event']) && isset($request['signature']);
        }
    }
  src/Handlers/FormHandler.php: |
    <?php
    namespace App\Handlers;

    use App\Contracts\RequestHandler;

    class FormHandler implements RequestHandler {
        public function handle(array $request): array {
            if (!$this->validate($request)) {
                return ['error' => 'Missing form fields'];
            }
            return [
                'success' => true,
                'fields' => array_keys($request['fields'] ?? []),
            ];
        }

        public function validate(array $request): bool {
            return isset($request['fields']) && is_array($request['fields']);
        }
    }
  tests/ApiHandlerTest.php: |
    <?php
    namespace Tests;

    use App\Handlers\ApiHandler;
    use PHPUnit\Framework\TestCase;

    class ApiHandlerTest extends TestCase {
        private ApiHandler $handler;

        protected function setUp(): void {
            $this->handler = new ApiHandler();
        }

        public function testHandleValidRequest(): void {
            $result = $this->handler->handle(['action' => 'create']);
            $this->assertTrue($result['success']);
        }

        public function testValidateRejectsEmpty(): void {
            $this->assertFalse($this->handler->validate([]));
        }
    }
changed:
  src/Handlers/ApiHandler.php: |
    <?php
    namespace App\Handlers;

    use App\Contracts\RequestHandler;

    class ApiHandler implements RequestHandler {
        public function handle(array $request): array {
            if (!$this->validate($request)) {
                return ['error' => 'Invalid request'];
            }
            return [
                'success' => true,
                'action' => $request['action'],
            ];
        }

        public function validate(array $request): bool {
            return isset($request['action']) && is_string($request['action']);
        }
    }
