# Scenario: form.rb adds a validate method that calls lambda validators from
# the Validators module. validators.rb defines lambdas for common validations.
#
# Diff: form.rb changes from an empty class to one with a validate method that
# calls Validators::POSITIVE, NON_EMPTY, and EMAIL_FORMAT lambdas.
#
# Reviewer questions:
#   Q1: "What does each validator lambda check?"
#       -> validators.rb (UNCHANGED) defines POSITIVE checks x > 0,
#          NON_EMPTY checks non-nil and non-empty, EMAIL_FORMAT matches regex.
#   Q2: "Will the validators correctly handle the data[:age], data[:name],
#       data[:email] fields passed from form.rb?"
#       -> validators.rb shows each lambda takes a single argument — reviewer
#          can verify the data fields match the expected types.
#
# Not needed:
#   - error_messages.rb: maps validation error codes to human-readable strings.
#     Related to validation but doesn't import Validators — no require edge.
#   - type_coercer.rb: converts strings to typed values (Integer, Float, etc).
#     Could be used alongside validators but is independent — no edge.
#   - signup_form.rb: also requires validators.rb and calls Validators::NON_EMPTY.
#     DIRECT structural edge (same source, same lambda) but is a different form
#     with different field validations.
#   - rules_engine.rb: evaluates Proc-based rules. Same lambda/proc mechanism
#     but operates on a different rule set — no import to Validators.
#   - lib/sanitizers.rb: cleans data before validation. Related pipeline step
#     but independent module — no require edge to Validators.

max_enrichment: 7.2
initial:
  validators.rb: |
    module Validators
      POSITIVE = ->(x) { x > 0 }
      NON_EMPTY = ->(s) { !s.nil? && !s.empty? }
      EMAIL_FORMAT = ->(e) { e =~ /\A[^@\s]+@[^@\s]+\z/ }
      IN_RANGE = ->(v, min, max) { v >= min && v <= max }
    end
  form.rb: |
    class Form
    end
  error_messages.rb: |
    module ErrorMessages
      CODES = {
        required: "This field is required",
        too_short: "Must be at least %{min} characters",
        invalid_format: "Invalid format",
        out_of_range: "Value must be between %{min} and %{max}"
      }.freeze

      def self.for(code, interpolations = {})
        template = CODES.fetch(code, "Unknown error")
        interpolations.reduce(template) do |msg, (key, val)|
          msg.gsub("%{#{key}}", val.to_s)
        end
      end

      def self.all_codes
        CODES.keys
      end
    end
  type_coercer.rb: |
    module TypeCoercer
      def self.to_integer(value)
        Integer(value)
      rescue ArgumentError, TypeError
        nil
      end

      def self.to_float(value)
        Float(value)
      rescue ArgumentError, TypeError
        nil
      end

      def self.to_boolean(value)
        case value.to_s.downcase
        when 'true', '1', 'yes' then true
        when 'false', '0', 'no' then false
        end
      end

      def self.to_date(value)
        Date.parse(value.to_s)
      rescue Date::Error
        nil
      end
    end
  signup_form.rb: |
    require_relative 'validators'

    class SignupForm
      def initialize(params)
        @params = params
      end

      def valid?
        return false unless Validators::NON_EMPTY.call(@params[:username])
        return false unless Validators::EMAIL_FORMAT.call(@params[:email])
        return false unless Validators::NON_EMPTY.call(@params[:password])
        @params[:password].length >= 8
      end

      def errors
        errs = []
        errs << :username_required unless Validators::NON_EMPTY.call(@params[:username])
        errs << :email_invalid unless Validators::EMAIL_FORMAT.call(@params[:email])
        errs
      end
    end
  rules_engine.rb: |
    class RulesEngine
      def initialize
        @rules = []
      end

      def add_rule(name, &block)
        @rules << { name: name, check: block }
      end

      def evaluate(data)
        @rules.map do |rule|
          { name: rule[:name], passed: rule[:check].call(data) }
        end
      end

      def all_pass?(data)
        @rules.all? { |rule| rule[:check].call(data) }
      end
    end
  lib/sanitizers.rb: |
    module Sanitizers
      def self.strip_html(input)
        input.gsub(/<\/?[^>]+>/, '')
      end

      def self.trim(input)
        input.to_s.strip
      end

      def self.downcase_email(email)
        email.to_s.strip.downcase
      end

      def self.normalize_phone(phone)
        phone.to_s.gsub(/[^0-9+]/, '')
      end
    end

