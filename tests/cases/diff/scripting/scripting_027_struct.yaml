# Scenario: geometry.rb adds factory methods that create Point and Rectangle structs.
# types.rb defines these structs with custom methods (distance_from_origin, area).
#
# Diff: geometry.rb changes from an empty module to one that creates Point and
# Rectangle instances and calls p.distance_from_origin.
#
# Reviewer questions:
#   Q1: "What fields and methods does Point have?"
#       -> types.rb (UNCHANGED) shows `Point = Struct.new(:x, :y)` with a
#          custom `distance_from_origin` method using Math.sqrt.
#   Q2: "What does Rectangle provide?"
#       -> types.rb shows `Rectangle = Struct.new(:width, :height)` with an
#          `area` method — reviewer sees the full struct interface.
#
# Not needed:
#   - vector.rb: a custom Vector class with x, y fields and magnitude method.
#     Similar geometric concept AND same Math.sqrt formula — but independent
#     class with no require edge.
#   - canvas.rb: drawing surface with plot and render methods. Could display
#     points but doesn't import types.rb — no relationship.
#   - shape_renderer.rb: also requires types.rb and calls Point.new and
#     Rectangle.new. DIRECT structural edge (same source, same types) but
#     renders SVG — different consumer.
#   - bounds.rb: defines BoundingBox = Struct.new(:x, :y, :w, :h). Same
#     Struct.new pattern — name/mechanism trap — but independent.
#   - lib/math_helpers.rb: provides distance and area calculations. Same
#     domain (math/geometry) but standalone functions, no Struct dependency.

max_enrichment: 9.6
initial:
  types.rb: |
    Point = Struct.new(:x, :y) do
      def distance_from_origin
        Math.sqrt(x**2 + y**2)
      end

      def translate(dx, dy)
        Point.new(x + dx, y + dy)
      end
    end

    Rectangle = Struct.new(:width, :height) do
      def area
        width * height
      end

      def perimeter
        2 * (width + height)
      end
    end
  geometry.rb: |
    module Geometry
    end
  vector.rb: |
    class Vector
      attr_reader :x, :y

      def initialize(x, y)
        @x = x
        @y = y
      end

      def magnitude
        Math.sqrt(x**2 + y**2)
      end

      def add(other)
        Vector.new(x + other.x, y + other.y)
      end

      def dot(other)
        x * other.x + y * other.y
      end

      def normalize
        mag = magnitude
        Vector.new(x / mag, y / mag)
      end
    end
  canvas.rb: |
    class Canvas
      def initialize(width, height)
        @grid = Array.new(height) { Array.new(width, '.') }
        @width = width
        @height = height
      end

      def plot(x, y, char = '*')
        return unless y >= 0 && y < @height && x >= 0 && x < @width
        @grid[y][x] = char
      end

      def render
        @grid.map { |row| row.join('') }.join("\n")
      end

      def clear
        @grid.each { |row| row.fill('.') }
      end
    end
  shape_renderer.rb: |
    require_relative 'types'

    class ShapeRenderer
      def initialize(scale: 1.0)
        @scale = scale
      end

      def render_point(point)
        sx = (point.x * @scale).round(2)
        sy = (point.y * @scale).round(2)
        "<circle cx='#{sx}' cy='#{sy}' r='2'/>"
      end

      def render_rectangle(rect)
        sw = (rect.width * @scale).round(2)
        sh = (rect.height * @scale).round(2)
        "<rect width='#{sw}' height='#{sh}'/>"
      end

      def render_all(shapes)
        shapes.map do |shape|
          case shape
          when Point then render_point(shape)
          when Rectangle then render_rectangle(shape)
          end
        end.join("\n")
      end
    end
  bounds.rb: |
    BoundingBox = Struct.new(:x, :y, :w, :h) do
      def contains?(px, py)
        px >= x && px <= x + w && py >= y && py <= y + h
      end

      def intersects?(other)
        !(x + w < other.x || other.x + other.w < x ||
          y + h < other.y || other.y + other.h < y)
      end

      def expand(margin)
        BoundingBox.new(x - margin, y - margin, w + 2 * margin, h + 2 * margin)
      end
    end
  lib/math_helpers.rb: |
    module MathHelpers
      def self.distance(x1, y1, x2, y2)
        Math.sqrt((x2 - x1)**2 + (y2 - y1)**2)
      end

      def self.area_of_rectangle(width, height)
        width * height
      end

      def self.clamp(value, min, max)
        [[value, min].max, max].min
      end

      def self.lerp(a, b, t)
        a + (b - a) * t
      end
    end

