    require_relative 'types'

    module Geometry
      def self.create_point(x, y)
        Point.new(x, y)
      end

      def self.create_rectangle(w, h)
        Rectangle.new(w, h)
      end
    end

    p = Geometry.create_point(3, 4)
    puts p.distance_from_origin

