  - magnitude
  - dot
  - normalize
  # canvas.rb: drawing surface, doesn't import types.rb
  - Canvas
  - plot
  - render
  - clear
  # shape_renderer.rb: HARDEST TRAP — requires types.rb, uses Point.new and
  # Rectangle.new — same types, same source, but different consumer (SVG)
  - ShapeRenderer
  - render_point
  - render_rectangle
  - render_all
  # bounds.rb: same Struct.new pattern — mechanism trap
  - BoundingBox
  - contains?
  - intersects?
  # lib/math_helpers.rb: same domain (distance, area) but standalone
  - MathHelpers
  - lerp
  - clamp
must_not_include_files:
