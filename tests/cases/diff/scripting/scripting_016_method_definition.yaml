# Scenario: app.rb starts using Processor class, calling its process() method.
# processor.rb defines the Processor class with the process method.
#
# Diff: app.rb changes from a simple puts to require_relative 'lib/processor',
# creating a Processor instance and calling process("hello").
#
# Reviewer questions:
#   Q1: "What does process() do to the input?"
#       -> processor.rb (UNCHANGED) defines process(data) which calls data.upcase.
#          Reviewer sees the transformation applied to "hello".
#   Q2: "Does Processor have any state or initialization requirements?"
#       -> processor.rb shows a simple class with no initialize method or instance
#          variables. Processor.new requires no arguments.
#
# Not needed:
#   - formatter.rb: formats strings for display output. Same domain (string
#     processing) but doesn't reference Processor — no edge.
#   - sanitizer.rb: cleans input strings by removing special characters.
#     Related to string processing but independent of Processor.
#   - batch_runner.rb: also requires processor.rb and calls process().
#     DIRECT structural edge (same class, same method) but runs batch
#     operations — different consumer.
#   - transformer.rb: has a process() method with same name. Name collision
#     trap but completely different class — no import to Processor.
#   - lib/string_utils.rb: string utility functions including upcase. Same
#     transformation as Processor but standalone functions.

initial:
  lib/processor.rb: |
    class Processor
      def process(data)
        data.upcase
      end

      def batch_process(items)
        items.map { |item| process(item) }
      end

      def can_process?(data)
        data.is_a?(String) && !data.empty?
      end
    end
  app.rb: |
    puts 'Hello'
  lib/formatter.rb: |
    class Formatter
      def format_title(text)
        text.split(' ').map(&:capitalize).join(' ')
      end

      def format_slug(text)
        text.downcase.gsub(/\s+/, '-').gsub(/[^a-z0-9\-]/, '')
      end

      def truncate(text, length = 50)
        text.length > length ? text[0...length] + '...' : text
      end

      def pad(text, width, char = ' ')
        text.ljust(width, char)
      end
    end
  lib/sanitizer.rb: |
    class Sanitizer
      SPECIAL_CHARS = /[<>&"']/
      WHITESPACE = /\s+/

      def clean(input)
        input.gsub(SPECIAL_CHARS, '')
      end

      def strip_tags(html)
        html.gsub(/<\/?[^>]+>/, '')
      end

      def normalize_whitespace(text)
        text.gsub(WHITESPACE, ' ').strip
      end

      def escape(text)
        text.gsub('&', '&amp;').gsub('<', '&lt;').gsub('>', '&gt;')
      end
    end
  lib/batch_runner.rb: |
    require_relative 'processor'

    class BatchRunner
      def initialize(processor = Processor.new)
        @processor = processor
        @results = []
      end

      def run(items)
        items.each do |item|
          result = @processor.process(item)
          @results << result
        end
        @results
      end

      def run_with_filter(items)
        items.select { |item| @processor.can_process?(item) }
             .map { |item| @processor.process(item) }
      end

      def result_count
        @results.size
      end
    end
  lib/transformer.rb: |
    class Transformer
      def process(input)
        input.reverse
      end

      def transform_all(items)
        items.map { |item| process(item) }
      end

      def chain(*operations)
        operations.reduce(nil) do |result, op|
          result ? process(result) : process(op)
        end
      end
    end
  lib/string_utils.rb: |
    module StringUtils
      def self.upcase_first(str)
        str[0].upcase + str[1..]
      end

      def self.to_upper(str)
        str.upcase
      end

      def self.to_lower(str)
        str.downcase
      end

      def self.camelize(str)
        str.split('_').map(&:capitalize).join
      end
    end

changed:
  lib/processor.rb: |
    class Processor
      def process(data)
        data.upcase
      end

      def batch_process(items)
        items.map { |item| process(item) }
      end

      def can_process?(data)
        data.is_a?(String) && !data.empty?
      end
    end
  app.rb: |
    require_relative 'lib/processor'

    processor = Processor.new
    result = processor.process("hello")
    puts result

must_include_files:
  # Q1: processor.rb defines the class and process() method used by app.rb
  - lib/processor.rb
must_include_content_from:
  lib/processor.rb:
    - "class Processor"
    - "def process(data)"
    - "data.upcase"
  app.rb:
    - "Processor.new"
    - 'processor.process("hello")'
must_not_include:
  # formatter.rb: string formatting, no reference to Processor
  - format_title
  - format_slug
  - truncate
  - pad
  # sanitizer.rb: input cleaning, independent of Processor
  - strip_tags
  - SPECIAL_CHARS
  - escape
  # batch_runner.rb: HARDEST TRAP — requires processor.rb, calls process()
  # Same class, same method, but different consumer
  - BatchRunner
  - run_with_filter
  - result_count
  # transformer.rb: has process() method — name collision trap
  - Transformer
  - chain
  - "input.reverse"
  # lib/string_utils.rb: upcase function — same transformation
  - StringUtils
  - camelize
  - to_upper
must_not_include_files:
  - lib/formatter.rb
  - lib/sanitizer.rb
  - lib/batch_runner.rb
  - lib/transformer.rb
  - lib/string_utils.rb
max_fragments: 5
max_files: 3
add_garbage_files: false
skip_garbage_check: true
