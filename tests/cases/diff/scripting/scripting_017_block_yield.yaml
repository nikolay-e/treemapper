# Scenario: service.rb includes RetryHelper and calls with_retry(max_attempts: 5)
# with a block. retry_helper.rb defines the module with the yield-based retry logic.
#
# Diff: service.rb changes from empty class to including RetryHelper and adding
# a fetch_data method that calls with_retry with a block.
#
# Reviewer questions:
#   Q1: "How does with_retry work — what happens to the yielded block on failure?"
#       -> retry_helper.rb (UNCHANGED) shows with_retry uses begin/rescue/retry
#          pattern: it yields the block, catches StandardError, retries up to
#          max_attempts, then re-raises. Reviewer understands the retry semantics.
#   Q2: "Service passes max_attempts: 5 but the default is 3 — is this override safe?"
#       -> retry_helper.rb shows the parameter signature with_retry(max_attempts: 3).
#          Overriding to 5 is valid — just increases retry count.
#
# Not needed:
#   - circuit_breaker.rb: prevents repeated calls to failing services. Related
#     resilience pattern but doesn't include or reference RetryHelper — no edge.
#   - timeout_helper.rb: wraps operations with a timeout. Similar concern
#     (error handling) but independent module with no import to RetryHelper.
#   - api_client.rb: also includes RetryHelper and calls with_retry.
#     DIRECT structural edge (same module, same method) but different consumer.
#   - lib/backoff_strategy.rb: implements exponential backoff with a block.
#     Same yield+retry concept but independent — no require to RetryHelper.
#   - error_handler.rb: rescues StandardError like RetryHelper does. Same
#     exception type but different pattern — no module inclusion.

max_enrichment: 6.9
initial:
  lib/retry_helper.rb: |
    module RetryHelper
      def with_retry(max_attempts: 3)
        attempts = 0
        begin
          attempts += 1
          yield
        rescue StandardError => e
          retry if attempts < max_attempts
          raise e
        end
      end

      def retryable?(error)
        error.is_a?(StandardError) && !error.is_a?(ArgumentError)
      end
    end
