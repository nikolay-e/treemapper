# Scenario: config.py goes from placeholder to using DSL metaprogramming
#   to generate property accessors for host, port, debug.
#   Only config.py is changed.
#
# Diff shows:
#   - class Config: pass
#   + from dsl import define_accessors
#   + __init__ storing _host, _port, _debug
#   + define_accessors(Config, "host", "port", "debug") at module level
#   + config = Config(); print(config.host)
#
# Reviewer questions:
#   Q1: "What does define_accessors actually do at the metaclass level?"
#       -> Needs dsl.py: iterates names, creates getter/setter closures
#         via make_getter/make_setter, calls setattr(cls, name, property(...)).
#         Without this, the reviewer sees `define_accessors(Config, "host",
#         "port", "debug")` and has no idea what it generates. The _host/_port
#         /_debug init pattern only makes sense once you see that
#         define_accessors creates properties reading from `_name`.
#
#   Q2: "Is the accessor string list consistent with __init__?"
#       -> dsl.py shows getattr(self, f"_{n}", None). Config.__init__ stores
#         self._host, self._port, self._debug. The names must match:
#         "host" → _host, "port" → _port, "debug" → _debug. Reviewer
#         verifies this correspondence.
#
# Not needed for comprehension:
#   - models/database.py: ALSO imports define_accessors from dsl.py and
#     calls it with its own field names. Same import, same function,
#     same usage pattern. HARDEST TRAP: identical structural edge to dsl.py.
#     But seeing how ANOTHER class uses define_accessors doesn't help
#     review whether Config's field names match its __init__ attributes.
#
#   - app.py: Imports Config and accesses config.host, config.port,
#     config.debug — the exact dynamic properties the diff creates.
#     Direct backward structural edge + uses the generated API. But
#     HOW the app reads config values doesn't help review the
#     metaprogramming setup.
#
#   - tests/test_config.py: Tests Config by creating instances and
#     asserting .host, .port, .debug values. Imports Config, exercises
#     the dynamic accessors. But test assertions verify behavior, not
#     the define_accessors mechanism.
#
#   - middleware/config_reload.py: Imports Config, calls setattr() on
#     instances to hot-reload values. Uses setattr — same builtin as
#     dsl.py. But config reloading logic doesn't explain what
#     define_accessors generates.
#
#   - serializer.py: JSON serialization via __dict__. No import edge.
#
#   - validator.py: Dict validation. No import edge.

initial:
  config.py: |
    class Config:
        pass

  dsl.py: |
    def define_accessors(cls, *names):
        for name in names:
            def make_getter(n):
                def getter(self):
                    return getattr(self, f"_{n}", None)
                return getter
            def make_setter(n):
                def setter(self, value):
                    setattr(self, f"_{n}", value)
                return setter
            setattr(cls, name, property(make_getter(name), make_setter(name)))

    def define_readonly(cls, *names):
        for name in names:
            def make_getter(n):
                def getter(self):
                    return getattr(self, f"_{n}", None)
                return getter
            setattr(cls, name, property(make_getter(name)))

