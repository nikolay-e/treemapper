repo:
  initial_files:
    src/render/renderer.rs: |
      pub struct RenderOptions {
          pub width: u32,
          pub height: u32,
          pub samples: u32,
      }

      pub struct FrameBuffer {
          pub pixels: Vec<u32>,
          pub width: u32,
          pub height: u32,
      }

      impl FrameBuffer {
          pub fn new(width: u32, height: u32) -> Self {
              Self { pixels: vec![0u32; (width * height) as usize], width, height }
          }
      }

      pub fn render_frame(options: &RenderOptions) -> FrameBuffer {
          let buf = FrameBuffer::new(options.width, options.height);
          buf
      }
    src/scene/camera.rs: |
      use crate::render::renderer::RenderOptions;

      pub struct Camera {
          pub fov: f32,
          pub near: f32,
          pub far: f32,
      }

      impl Camera {
          pub fn new(fov: f32) -> Self {
              Self { fov, near: 0.1, far: 1000.0 }
          }

          pub fn to_render_options(&self, width: u32, height: u32) -> RenderOptions {
              RenderOptions { width, height, samples: 1 }
          }
      }
    src/engine/game_loop.rs: |
      use crate::scene::camera::Camera;
      use crate::render::renderer::render_frame;

      pub struct GameLoop {
          camera: Camera,
      }

      impl GameLoop {
          pub fn new() -> Self {
              Self { camera: Camera::new(90.0) }
          }

          pub fn tick(&self, width: u32, height: u32) {
              let options = self.camera.to_render_options(width, height);
              let _frame = render_frame(&options);
          }
      }
