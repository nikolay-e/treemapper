      // GARBAGE_DBIWRAP_C = "network_sync_marker"
  changed_files:
    src/render/renderer.rs: |
      pub struct RenderOptions {
          pub width: u32,
          pub height: u32,
          pub samples: u32,
          pub hdr: bool,
      }

      pub trait Renderer {
          fn render(&self, options: &RenderOptions) -> FrameBuffer;
          fn name(&self) -> &'static str;
      }

      pub struct FrameBuffer {
          pub pixels: Vec<u32>,
          pub width: u32,
          pub height: u32,
      }

      impl FrameBuffer {
          pub fn new(width: u32, height: u32) -> Self {
              Self { pixels: vec![0u32; (width * height) as usize], width, height }
          }
      }

      pub struct DefaultRenderer;

      impl Renderer for DefaultRenderer {
          fn render(&self, options: &RenderOptions) -> FrameBuffer {
              FrameBuffer::new(options.width, options.height)
          }

          fn name(&self) -> &'static str {
              "default"
          }
      }
    src/scene/camera.rs: |
      use crate::render::renderer::RenderOptions;

      pub struct Camera {
          pub fov: f32,
          pub near: f32,
          pub far: f32,
          pub hdr: bool,
      }

      impl Camera {
          pub fn new(fov: f32) -> Self {
              Self { fov, near: 0.1, far: 1000.0, hdr: false }
          }

          pub fn to_render_options(&self, width: u32, height: u32) -> RenderOptions {
              RenderOptions { width, height, samples: 1, hdr: self.hdr }
          }
      }
    src/engine/game_loop.rs: |
      use crate::scene::camera::Camera;
      use crate::render::renderer::{Renderer, DefaultRenderer};

      pub struct GameLoop<R: Renderer> {
          camera: Camera,
          renderer: R,
      }

      impl GameLoop<DefaultRenderer> {
          pub fn new() -> Self {
              Self { camera: Camera::new(90.0), renderer: DefaultRenderer }
          }
      }

      impl<R: Renderer> GameLoop<R> {
          pub fn tick(&self, width: u32, height: u32) {
              let options = self.camera.to_render_options(width, height);
              let _frame = self.renderer.render(&options);
          }
      }
    garbage/audio.rs: |
      // GARBAGE_DBIWRAP_A = "audio_engine_marker"
    garbage/physics.rs: |
      // GARBAGE_DBIWRAP_B = "physics_world_marker"
    garbage/networking.rs: |
      // GARBAGE_DBIWRAP_C = "network_sync_marker"
