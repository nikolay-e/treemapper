    spec/support/factory.rb: |
      module TestFactory
        def self.build(type, overrides = {})
          defaults = default_attributes(type)
          attrs = defaults.merge(overrides)
          Object.const_get(type.to_s.capitalize).new(**attrs)
        end

        def self.default_attributes(type)
          case type
          when :user
            { email: 'default@example.com', name: 'Test User', age: 25 }
          when :product
            { name: 'Widget', price: 9.99, active: true }
          when :order
            { total: 0, status: :pending }
          else
            {}
          end
        end

        def self.build_list(type, count, overrides = {})
          count.times.map { |i| build(type, overrides.merge(name: "#{type}_#{i}")) }
        end
      end
    lib/age_calculator.rb: |
      class AgeCalculator
        def initialize(birth_date)
          @birth_date = birth_date
        end

        def age_at(date = Time.now)
          years = date.year - @birth_date.year
          if date.month < @birth_date.month ||
             (date.month == @birth_date.month && date.day < @birth_date.day)
            years -= 1
          end
          years
        end

        def minor?(date = Time.now)
          age_at(date) < 18
        end

        def senior?(date = Time.now)
          age_at(date) >= 65
        end

        def age_group(date = Time.now)
          age = age_at(date)
          case age
          when 0..12 then :child
          when 13..17 then :teenager
          when 18..64 then :adult
          else :senior
          end
        end
      end
