name: bal_3hop_052_go_auth_rbac_chain
tags:
- lang:go
- change:single_file
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    pkg/auth/role.go: |
      package auth

      type Role string

      const (
        RoleAdmin  Role = "admin"
        RoleUser   Role = "user"
      )

      type Permission struct {
        Resource string
        Action   string
      }

      func GetPermissions(role Role) []Permission {
        switch role {
        case RoleAdmin:
          return []Permission{
            {Resource: "*", Action: "*"},
          }
        case RoleUser:
          return []Permission{
            {Resource: "profile", Action: "read"},
            {Resource: "profile", Action: "write"},
          }
        }
        return nil
      }
    pkg/auth/checker.go: |
      package auth

      type AccessChecker struct{}

      func NewAccessChecker() *AccessChecker {
        return &AccessChecker{}
      }

      func (c *AccessChecker) HasPermission(role Role, resource string, action string) bool {
        perms := GetPermissions(role)
        for _, p := range perms {
          if (p.Resource == "*" || p.Resource == resource) && (p.Action == "*" || p.Action == action) {
            return true
          }
        }
        return false
      }
    pkg/middleware/auth.go: |
      package middleware

      import (
        "net/http"
        "pkg/auth"
      )

      func AuthzMiddleware(checker *auth.AccessChecker, resource string, action string) func(http.Handler) http.Handler {
        return func(next http.Handler) http.Handler {
          return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
            role := auth.Role(r.Header.Get("X-Role"))
            if !checker.HasPermission(role, resource, action) {
              http.Error(w, "Forbidden", http.StatusForbidden)
              return
            }
            next.ServeHTTP(w, r)
          })
        }
      }
    cmd/api/routes.go: |
      package main

      import (
        "net/http"
        "pkg/auth"
        "pkg/middleware"
      )

      func setupRoutes() http.Handler {
        checker := auth.NewAccessChecker()
        mux := http.NewServeMux()

        adminHandler := middleware.AuthzMiddleware(checker, "admin", "write")(http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
          w.Write([]byte("admin panel"))
        }))
        mux.Handle("/admin", adminHandler)
        return mux
      }
    pkg/util/token.go: |
