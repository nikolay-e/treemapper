      -export([notify/2]).

      notify(To, Msg) -> {sent, To, Msg}.
    garbage/iot_sensor_agent.erl: |
      -module(iot_sensor_agent).
      %% GARBAGE_GAP064_C = "iot_sensor_agent_marker"
      -export([read/1]).

      read(SensorId) -> {ok, SensorId, 42}.
