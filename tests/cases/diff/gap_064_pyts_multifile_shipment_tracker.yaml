- difficulty:hard
repo:
  initial_files:
    src/inventory_server.erl: |
      -module(inventory_server).
      -behaviour(gen_server).
      -export([start_link/0, reserve/2, release/2, stock/1]).
      -export([init/1, handle_call/3, handle_cast/2]).

      start_link() ->
          gen_server:start_link({local, ?MODULE}, ?MODULE, #{}, []).

      reserve(ProductId, Qty) ->
          gen_server:call(?MODULE, {reserve, ProductId, Qty}).

      release(ProductId, Qty) ->
          gen_server:cast(?MODULE, {release, ProductId, Qty}).

      stock(ProductId) ->
          gen_server:call(?MODULE, {stock, ProductId}).

      init(_Args) ->
          {ok, #{}}.

      handle_call({reserve, ProductId, Qty}, _From, State) ->
          Current = maps:get(ProductId, State, 0),
          if
              Current >= Qty ->
                  {reply, ok, maps:put(ProductId, Current - Qty, State)};
              true ->
                  {reply, {error, insufficient_stock}, State}
          end;
      handle_call({stock, ProductId}, _From, State) ->
          {reply, maps:get(ProductId, State, 0), State}.

      handle_cast({release, ProductId, Qty}, State) ->
          Current = maps:get(ProductId, State, 0),
          {noreply, maps:put(ProductId, Current + Qty, State)}.
    src/order_handler.erl: |
      -module(order_handler).
      -export([place_order/2]).

      place_order(ProductId, Qty) ->
          case inventory_server:reserve(ProductId, Qty) of
              ok -> {ok, order_placed};
              {error, Reason} -> {error, Reason}
          end.
    garbage/payment_processor.erl: |
      -module(payment_processor).
