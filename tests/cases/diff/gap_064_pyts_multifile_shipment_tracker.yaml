      from typing import List, Optional
      from dataclasses import dataclass
      from enum import Enum

      class ShipmentStatus(Enum):
          PENDING = "pending"
          IN_TRANSIT = "in_transit"
          DELIVERED = "delivered"
          RETURNED = "returned"

      @dataclass
      class Parcel:
          tracking_id: str
          weight_kg: float
          destination: str

      class ShipmentTracker:
          def __init__(self, warehouse: str, max_weight: float = 1000.0):
              self.warehouse = warehouse
              self.max_weight = max_weight
              self._parcels: List[Parcel] = []

          def register(self, parcel: Parcel) -> None:
              self._parcels.append(parcel)

          def bulk_register(self, parcels: List[Parcel]) -> int:
              added = 0
              for p in parcels:
                  if self.total_weight() + p.weight_kg <= self.max_weight:
                      self._parcels.append(p)
                      added += 1
              return added

          def filter_by_destination(self, destination: str) -> List[Parcel]:
              return [p for p in self._parcels if p.destination == destination]

          def total_weight(self) -> float:
              return sum(p.weight_kg for p in self._parcels)

          def find_by_id(self, tracking_id: str) -> Optional[Parcel]:
              for p in self._parcels:
                  if p.tracking_id == tracking_id:
                      return p
              return None
    src/logistics/dashboard.ts: |
      interface ShipmentSummary {
        trackingId: string;
        status: string;
        eta: string;
        priority: number;
      }

      function formatEta(hoursRemaining: number): string {
        if (hoursRemaining < 1) return "< 1 hour";
        return `${Math.ceil(hoursRemaining)} hours`;
      }

      function priorityBadge(priority: number): string {
        if (priority >= 3) return "[URGENT]";
        if (priority >= 2) return "[HIGH]";
        return "";
      }

      function renderShipmentCard(summary: ShipmentSummary): string {
        const badge = priorityBadge(summary.priority);
        return `${badge} [${summary.trackingId}] ${summary.status} - ETA: ${summary.eta}`;
      }

      function renderDashboard(summaries: ShipmentSummary[]): string {
        const sorted = [...summaries].sort((a, b) => b.priority - a.priority);
        const header = `Shipments: ${sorted.length}`;
        const cards = sorted.map(renderShipmentCard).join("\n");
        return `${header}\n${cards}`;
      }
    src/logistics/invoice.py: |
