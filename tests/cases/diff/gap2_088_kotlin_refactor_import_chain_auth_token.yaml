  changed_files:
    src/main/kotlin/auth/TokenValidator.kt: |
      package auth

      import auth.store.TokenStore
      import auth.model.AuthToken
      import auth.model.TokenScope

      class TokenValidator(private val store: TokenStore) {
          fun validate(rawToken: String): AuthToken? {
              val token = store.lookup(rawToken) ?: return null
              if (token.expiresAtMillis < System.currentTimeMillis()) return null
              return token
          }

          fun hasScope(rawToken: String, required: TokenScope): Boolean {
              val token = validate(rawToken) ?: return false
              return token.scopes.contains(required)
          }
      }
    src/main/kotlin/auth/store/TokenStore.kt: |
      package auth.store

      import auth.model.AuthToken

      class TokenStore {
          private val tokens = mutableMapOf<String, AuthToken>()

          fun lookup(raw: String): AuthToken? = tokens[raw]

          fun save(raw: String, token: AuthToken) {
              tokens[raw] = token
          }

          fun revoke(raw: String) {
              tokens.remove(raw)
          }
      }
    src/main/kotlin/auth/model/TokenPayload.kt: |
      package auth.model

      enum class TokenScope { READ, WRITE, ADMIN }

      data class AuthToken(
          val userId: String,
          val scopes: Set<TokenScope>,
          val expiresAtMillis: Long
      )
