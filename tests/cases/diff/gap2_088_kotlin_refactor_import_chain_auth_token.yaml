      package auth

      import auth.store.TokenStore
      import auth.model.TokenPayload

      class TokenValidator(private val store: TokenStore) {
          fun validate(rawToken: String): TokenPayload? {
              val payload = store.lookup(rawToken)
              if (payload == null || payload.expiry < System.currentTimeMillis()) {
                  return null
              }
              return payload
          }
      }
    src/main/kotlin/auth/store/TokenStore.kt: |
      package auth.store

      import auth.model.TokenPayload

      class TokenStore {
          private val tokens = mutableMapOf<String, TokenPayload>()

          fun lookup(raw: String): TokenPayload? = tokens[raw]

          fun save(raw: String, payload: TokenPayload) {
              tokens[raw] = payload
          }

          fun revoke(raw: String) {
              tokens.remove(raw)
          }
      }
