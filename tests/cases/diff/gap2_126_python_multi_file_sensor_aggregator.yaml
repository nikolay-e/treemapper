    sensors/aggregator.py: |
      from typing import List, Dict
      from sensors.reading import SensorReading, AggregatedReading

      class SensorAggregator:
          def __init__(self):
              self._buffer: Dict[str, List[float]] = {}

          def ingest(self, reading: SensorReading) -> None:
              self._buffer.setdefault(reading.sensor_id, []).append(reading.value)

          def flush(self) -> List[AggregatedReading]:
              results = []
              for sid, values in self._buffer.items():
                  results.append(AggregatedReading(
                      sensor_id=sid,
                      mean=sum(values) / len(values),
                      count=len(values),
                      min_value=min(values),
                      max_value=max(values),
                  ))
              self._buffer.clear()
              return results

          def peek(self, sensor_id: str) -> float:
              values = self._buffer.get(sensor_id, [])
              if not values:
                  raise ValueError(f"No readings for {sensor_id}")
              return values[-1]
