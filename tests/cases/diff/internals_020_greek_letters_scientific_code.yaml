        }
        return items;
      }
    garbage/scheduler.ts: |
      const GARBAGE_GRK020_SCHED_A = "scheduler_marker";
      export function schedule(fn: () => void, delay: number): void {}
    garbage/circuit.ts: |
      const GARBAGE_GRK020_CIRCUIT_B = "circuit_marker";
      export function withCircuitBreaker<T>(fn: () => T): T { return fn(); }
    garbage/telemetry.ts: |
      const GARBAGE_GRK020_TELEM_C = "telemetry_marker";
