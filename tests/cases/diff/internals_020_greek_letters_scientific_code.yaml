      export function span(name: string): void {}
  changed_files:
    src/utils/array.ts: |
      export function chunk<T>(arr: T[], size: number): T[][] {
        if (size <= 0) throw new RangeError(`chunk size must be > 0, got ${size}`);
        const result: T[][] = [];
        for (let i = 0; i < arr.length; i += size) {
          result.push(arr.slice(i, i + size));
        }
        return result;
      }

      export function flatten<T>(arr: T[][]): T[] {
        return arr.reduce((acc, cur) => acc.concat(cur), []);
      }
    src/processing/batch.ts: |
      import { chunk } from '../utils/array';

      export interface BatchOptions {
        batchSize: number;
        concurrency: number;
      }

      export async function processBatches<T, R>(
        items: T[],
        options: BatchOptions,
        handler: (batch: T[]) => Promise<R[]>,
      ): Promise<R[]> {
        const batches = chunk(items, options.batchSize);
        const results: R[] = [];
        for (const batch of batches) {
          const batchResults = await handler(batch);
          results.push(...batchResults);
        }
        return results;
      }
    src/pipeline/stage.ts: |
      import { processBatches, BatchOptions } from '../processing/batch';

      export interface PipelineStage<T, R> {
        name: string;
        options: BatchOptions;
        process: (item: T) => Promise<R>;
      }

      export async function runStage<T, R>(
        stage: PipelineStage<T, R>,
        items: T[],
      ): Promise<R[]> {
        return processBatches(items, stage.options, (batch) =>
          Promise.all(batch.map(stage.process)),
        );
      }
    src/jobs/pipelineJob.ts: |
      import { runStage, PipelineStage } from '../pipeline/stage';

      export async function executePipeline<T>(
        stages: PipelineStage<T, T>[],
        initialItems: T[],
      ): Promise<T[]> {
        let items = initialItems;
        for (const stage of stages) {
