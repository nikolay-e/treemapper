  changed_files:
    internal/notification/email.go: |
      package notification

      import "fmt"

      type EmailSender struct {
          host    string
          port    int
          from    string
          sent    int
          failed  int
      }

      func NewEmailSender(host string, port int, from string) *EmailSender {
          return &EmailSender{host: host, port: port, from: from}
      }

      func (e *EmailSender) Send(to, subject, body string) error {
          fmt.Printf("sending email to %s: %s\n", to, subject)
          e.sent++
          return nil
      }

      func (e *EmailSender) Address() string {
          return fmt.Sprintf("%s:%d", e.host, e.port)
      }

      func (e *EmailSender) Stats() (sent, failed int) {
          return e.sent, e.failed
      }

      func (e *EmailSender) RecordFailure() {
          e.failed++
      }
    internal/notification/sms.go: |
      package notification

      import "fmt"

      type SmsSender struct {
          apiKey  string
          fromNum string
          sent    int
          failed  int
      }

      func NewSmsSender(apiKey, fromNum string) *SmsSender {
          return &SmsSender{apiKey: apiKey, fromNum: fromNum}
      }

      func (s *SmsSender) Send(to, message string) error {
          fmt.Printf("SMS to %s: %s\n", to, message)
          s.sent++
          return nil
      }

      func (s *SmsSender) Stats() (sent, failed int) {
          return s.sent, s.failed
      }

      func (s *SmsSender) RecordFailure() {
          s.failed++
      }
    internal/storage/blob.go: |
      package storage

      import "fmt"

      type BlobStore struct {
          bucket string
      }

      func NewBlobStore(bucket string) *BlobStore {
          return &BlobStore{bucket: bucket}
      }

      func (b *BlobStore) Put(key string, data []byte) error {
          fmt.Printf("storing %d bytes at %s/%s\n", len(data), b.bucket, key)
          return nil
      }
