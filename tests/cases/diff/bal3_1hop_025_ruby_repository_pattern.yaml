    lib/repositories/user_repository.rb: |
      require_relative '../db/connection'

      module Repositories
        class UserRepository
          def initialize(connection)
            @conn = connection
          end

          def find(id)
            @conn.query("SELECT * FROM users WHERE id = #{id}").first
          end

          def all
            @conn.query("SELECT * FROM users")
          end
        end
      end
    lib/repositories/order_repository.rb: |
      require_relative '../db/connection'

      module Repositories
        class OrderRepository
          def initialize(connection)
            @conn = connection
          end

          def find_by_user(user_id)
            @conn.query("SELECT * FROM orders WHERE user_id = #{user_id}")
          end
        end
      end
    lib/repositories/product_repository.rb: |
      require_relative '../db/connection'

      module Repositories
        class ProductRepository
          def initialize(connection)
            @conn = connection
          end

          def find(id)
            @conn.query("SELECT * FROM products WHERE id = #{id}").first
          end

          def search(term)
            @conn.query("SELECT * FROM products WHERE name LIKE '%#{term}%'")
          end
        end
      end
