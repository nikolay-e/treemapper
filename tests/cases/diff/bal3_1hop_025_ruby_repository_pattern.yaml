    lib/tasks/seed.rb: |
      GARBAGE_025_SEED_C = "seed"

      module Tasks
        class Seed
          def run
            "seeded"
          end
        end
      end
  changed_files:
    lib/db/connection.rb: |
      module Db
        class Connection
          attr_reader :host, :port, :database, :pool_size

          def initialize(host:, port:, database:, pool_size: 5)
            @host = host
            @port = port
            @database = database
            @pool_size = pool_size
            @transaction_active = false
          end

          def query(sql, params = [])
            []
          end

          def execute(sql, params = [])
            true
          end

          def transaction
            @transaction_active = true
            yield
            @transaction_active = false
          rescue => e
            @transaction_active = false
            raise e
          end

          def in_transaction?
            @transaction_active
          end
        end
      end
  commit_message: "feat: add pool_size, parameterized queries, and transactions"
