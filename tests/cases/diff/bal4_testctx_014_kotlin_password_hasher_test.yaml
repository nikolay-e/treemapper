repo:
  initial_files:
    src/main/kotlin/auth/PasswordHasher.kt: |
      package auth

      import java.security.MessageDigest

      class PasswordHasher {
          fun hash(password: String): String {
              val digest = MessageDigest.getInstance("SHA-256")
              val bytes = digest.digest(password.toByteArray())
              return bytes.joinToString("") { "%02x".format(it) }
          }

          fun verify(password: String, hash: String): Boolean {
              return hash(password) == hash
          }
      }
    src/test/kotlin/auth/PasswordHasherTest.kt: |
      package auth

      import org.junit.jupiter.api.Test
      import org.junit.jupiter.api.Assertions.assertTrue
      import org.junit.jupiter.api.Assertions.assertFalse

      class PasswordHasherTest {
          private val hasher = PasswordHasher()

          @Test
          fun testHashAndVerify() {
              val hash = hasher.hash("secret")
              assertTrue(hasher.verify("secret", hash))
          }

          @Test
          fun testVerifyWrongPassword() {
              val hash = hasher.hash("secret")
              assertFalse(hasher.verify("wrong", hash))
          }
      }
