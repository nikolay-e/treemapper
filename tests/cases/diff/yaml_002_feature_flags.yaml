name: yaml_002_feature_flags
tags:
- lang:python
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    config/features.yaml: |
      features:
        new_ui: false
        dark_mode: true
    src/features.py: |
      def is_feature_enabled(name: str) -> bool:
          features = {"new_ui": False, "dark_mode": True}
          return features.get(name, False)

      def get_enabled_features() -> list:
          features = {"new_ui": False, "dark_mode": True}
          return [name for name, enabled in features.items() if enabled]
    src/middleware/feature_gate.py: |
      from src.features import is_feature_enabled

      class FeatureGateMiddleware:
          def __init__(self, app):
              self.app = app

          def process_request(self, request):
              if request.path.startswith("/api/beta"):
                  if not is_feature_enabled("beta_api"):
                      return {"error": "Feature not available", "status": 403}
              if request.path.startswith("/ui/v2"):
                  if not is_feature_enabled("new_ui"):
                      return {"error": "New UI not enabled", "status": 403}
              return self.app.handle(request)
    config/experiments.yaml: |
      experiments:
        search_v2:
          enabled: false
          rollout_percentage: 10
          target_group: beta_users
        checkout_redesign:
          enabled: true
          rollout_percentage: 50
          target_group: all
        new_ui_experiment:
          enabled: false
          rollout_percentage: 5
          target_group: internal
    src/analytics.py: |
      from datetime import datetime

      class AnalyticsTracker:
          def __init__(self):
              self.events = []

          def track(self, event_name: str, properties: dict = None):
              self.events.append({
                  "name": event_name,
                  "properties": properties or {},
                  "timestamp": datetime.utcnow().isoformat(),
              })

          def track_feature_usage(self, feature_name: str, user_id: str):
              self.track("feature_used", {
                  "feature": feature_name,
                  "user_id": user_id,
              })

          def flush(self):
              batch = self.events[:]
              self.events.clear()
              return batch
    src/ui/theme.py: |
      from src.features import is_feature_enabled

      class ThemeManager:
          def __init__(self):
              self.dark_mode = is_feature_enabled("dark_mode")

          def get_styles(self) -> dict:
              if self.dark_mode:
                  return {
                      "background": "#1a1a1a",
                      "text": "#ffffff",
                      "accent": "#4fc3f7",
                  }
              return {
                  "background": "#ffffff",
                  "text": "#333333",
                  "accent": "#1976d2",
              }

          def toggle_theme(self):
              self.dark_mode = not self.dark_mode
    tests/test_features.py: |
      from src.features import is_feature_enabled, get_enabled_features

      class TestFeatures:
          def test_new_ui_disabled_by_default(self):
              assert not is_feature_enabled("new_ui")

          def test_dark_mode_enabled(self):
              assert is_feature_enabled("dark_mode")

          def test_unknown_feature_returns_false(self):
              assert not is_feature_enabled("nonexistent")

          def test_get_enabled_features(self):
              enabled = get_enabled_features()
              assert "dark_mode" in enabled
              assert "new_ui" not in enabled
    config/rollout_schedule.yaml: |
      rollout:
        new_ui:
          phase_1:
            date: "2024-01-15"
            percentage: 10
          phase_2:
            date: "2024-02-01"
            percentage: 50
          phase_3:
            date: "2024-03-01"
            percentage: 100
        beta_api:
          phase_1:
            date: "2024-04-01"
            percentage: 5
  changed_files:
    config/features.yaml: |
      features:
        new_ui: true
        dark_mode: true
        beta_api: false
    src/features.py: |
      def is_feature_enabled(name: str) -> bool:
          features = {"new_ui": False, "dark_mode": True}
          return features.get(name, False)

      def get_enabled_features() -> list:
          features = {"new_ui": False, "dark_mode": True}
          return [name for name, enabled in features.items() if enabled]
    src/middleware/feature_gate.py: |
      from src.features import is_feature_enabled

      class FeatureGateMiddleware:
          def __init__(self, app):
              self.app = app

          def process_request(self, request):
              if request.path.startswith("/api/beta"):
                  if not is_feature_enabled("beta_api"):
                      return {"error": "Feature not available", "status": 403}
              if request.path.startswith("/ui/v2"):
                  if not is_feature_enabled("new_ui"):
                      return {"error": "New UI not enabled", "status": 403}
              return self.app.handle(request)
  commit_message: Update files
