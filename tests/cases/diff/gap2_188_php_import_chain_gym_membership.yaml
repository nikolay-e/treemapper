  changed_files:
    src/Gym/MembershipManager.php: |
      <?php

      namespace App\Gym;

      use App\Gym\Plan\PlanRegistry;

      class MembershipManager
      {
          private PlanRegistry $plans;
          private array $members = [];

          public function __construct(PlanRegistry $plans)
          {
              $this->plans = $plans;
          }

          public function enroll(string $memberName, string $planId): bool
          {
              $plan = $this->plans->find($planId);
              if ($plan === null) {
                  return false;
              }
              $this->members[$memberName] = $planId;
              return true;
          }

          public function freeze(string $memberName): bool
          {
              if (!isset($this->members[$memberName])) {
                  return false;
              }
              $this->members[$memberName] = 'frozen';
              return true;
          }

          public function activeMemberCount(): int
          {
              $count = 0;
              foreach ($this->members as $status) {
                  if ($status !== 'frozen') {
                      $count++;
                  }
              }
              return $count;
          }
      }
  commit_message: "feat: add membership freeze capability"
