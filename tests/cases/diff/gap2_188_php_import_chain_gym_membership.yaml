      <?php

      namespace App\Equipment;

      class LockerAssigner
      {
          private int $totalLockers;

          public function __construct(int $totalLockers)
          {
              $this->totalLockers = $totalLockers;
          }

          public function assign(string $memberId): int
          {
              return crc32($memberId) % $this->totalLockers;
          }
