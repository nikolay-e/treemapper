      namespace App\Gym\Plan;

      use App\Gym\Plan\PriceTier;

      class PlanRegistry
      {
          private array $plans = [];

          public function register(string $id, PriceTier $tier): void
          {
              $this->plans[$id] = $tier;
          }

          public function find(string $id): ?PriceTier
          {
              return $this->plans[$id] ?? null;
          }
