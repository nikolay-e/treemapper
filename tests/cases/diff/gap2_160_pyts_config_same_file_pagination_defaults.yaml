name: gap2_160_pyts_config_same_file_pagination_defaults
tags:
- change:config
- change:single_file
- context:same_file
- difficulty:trivial
- distance:0hop
- lang:python
- lang:typescript
fixtures:
  auto_garbage: true
repo:
  initial_files:
    service/pagination.py: |
      DEFAULT_PAGE_SIZE = 20
      MAX_PAGE_SIZE = 100

      def clamp_page_size(requested: int) -> int:
          return max(1, min(requested, MAX_PAGE_SIZE))

      def compute_offset(page: int, size: int) -> int:
          return (page - 1) * size
    components/pagination.ts: |
      export const DEFAULT_PAGE_SIZE = 20;
      export const MAX_PAGE_SIZE = 100;

      export function clampPageSize(requested: number): number {
        return Math.max(1, Math.min(requested, MAX_PAGE_SIZE));
      }

      export function computeOffset(page: number, size: number): number {
        return (page - 1) * size;
      }
    service/cache_config.py: |
      CACHE_TTL_SECONDS = 300
      MAX_CACHE_ENTRIES = 5000

      class CacheConfig:
          def __init__(self):
              self.ttl = CACHE_TTL_SECONDS
              self.max_entries = MAX_CACHE_ENTRIES

          def is_expired(self, age_seconds: int) -> bool:
              return age_seconds > self.ttl
  changed_files:
    service/pagination.py: |
      DEFAULT_PAGE_SIZE = 25
      MAX_PAGE_SIZE = 200

      def clamp_page_size(requested: int) -> int:
          return max(1, min(requested, MAX_PAGE_SIZE))

      def compute_offset(page: int, size: int) -> int:
          return (page - 1) * size
    components/pagination.ts: |
      export const DEFAULT_PAGE_SIZE = 25;
      export const MAX_PAGE_SIZE = 200;

      export function clampPageSize(requested: number): number {
        return Math.max(1, Math.min(requested, MAX_PAGE_SIZE));
      }

      export function computeOffset(page: number, size: number): number {
        return (page - 1) * size;
      }
  commit_message: "config: increase default page size and max limit"
