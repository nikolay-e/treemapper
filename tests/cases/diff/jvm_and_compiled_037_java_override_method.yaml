name: jvm_and_compiled_037_java_override_method
repo:
  initial_files:
    src/main/java/com/example/Animal.java: |
      package com.example;

      public abstract class Animal {
          protected String name;

          public abstract String speak();

          public void eat() {
              System.out.println(name + " is eating");
          }
      }
    src/main/java/com/example/Dog.java: |
      package com.example;

      public class Dog extends Animal {
          public Dog(String name) {
              this.name = name;
          }

          @Override
          public String speak() {
              return "Woof!";
          }
      }
    src/main/java/com/example/Kennel.java: |
      package com.example;

      import java.util.ArrayList;
      import java.util.List;

      public class Kennel {
          private final List<Animal> animals = new ArrayList<>();

          public void admit(Animal animal) {
              animals.add(animal);
          }

          public void feedAll() {
              for (Animal animal : animals) {
                  animal.eat();
              }
          }

          public int getCount() {
              return animals.size();
          }
      }
    src/main/java/com/example/AnimalSound.java: |
      package com.example;

      public enum AnimalSound {
          BARK("Woof"),
          MEOW("Meow"),
          CHIRP("Tweet");

          private final String sound;

          AnimalSound(String sound) {
              this.sound = sound;
          }

          public String getSound() {
              return sound;
          }
      }
