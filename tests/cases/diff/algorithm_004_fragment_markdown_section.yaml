      # Webhooks Reference

      GARBAGE_ALGO_004_WEBHOOK_DOC_G
      GARBAGE_ALGO_004_EVENTS_LIST_H

      ## Authentication

      Webhook payloads include an `X-Signature` header for verification.

      ```bash
      curl -H "Authorization: Bearer YOUR_TOKEN" https://api.example.com/v1/webhooks
      ```

      ### Token Generation

      Tokens for webhook endpoints use the same `/auth/token` flow.

      | Parameter | Type | Required | Description |
      |-----------|------|----------|-------------|
      | username | string | Yes | Service account name |
      | scope | string | Yes | Webhook scope |
