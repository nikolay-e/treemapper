name: bal3_3hop_082_csharp_mediator_command_chain
tags:
- lang:csharp
- change:new_function
- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    src/Commands/ICommand.cs: |
      using System;

      namespace App.Commands
      {
          public interface ICommand
          {
              string CommandName { get; }
          }
      }
    src/Commands/CreateOrderCommand.cs: |
      using System;
      using App.Commands;

      namespace App.Commands
      {
          public class CreateOrderCommand : ICommand
          {
              public string CommandName => "CreateOrder";
              public string ProductId { get; set; }
              public int Quantity { get; set; }
          }
      }
    src/Handlers/OrderHandler.cs: |
      using System;
      using App.Commands;

      namespace App.Handlers
      {
          public class OrderHandler
          {
              public string Handle(CreateOrderCommand command)
              {
                  return $"Order created for {command.ProductId} x{command.Quantity}";
              }
          }
      }
    src/Mediator/Mediator.cs: |
      using System;
      using App.Handlers;
      using App.Commands;

      namespace App.Mediator
      {
          public class Mediator
          {
              private readonly OrderHandler _orderHandler;
              public Mediator(OrderHandler orderHandler)
              {
                  _orderHandler = orderHandler;
              }
              public string Send(ICommand command)
              {
                  if (command is CreateOrderCommand createOrder)
                  {
                      return _orderHandler.Handle(createOrder);
                  }
                  throw new InvalidOperationException("Unknown command");
              }
          }
      }
    src/Controllers/OrderController.cs: |
      using System;
      using App.Mediator;
      using App.Commands;

      namespace App.Controllers
      {
          public class OrderController
          {
              private readonly Mediator _mediator;
              public OrderController(Mediator mediator)
              {
                  _mediator = mediator;
              }
              public string CreateOrder(string productId, int quantity)
              {
                  var command = new CreateOrderCommand { ProductId = productId, Quantity = quantity };
                  return _mediator.Send(command);
              }
          }
      }
    src/Logging/ConsoleLogger.cs: |
      using System;
      // GARBAGE_082_CONSOLE_A = "logger"
