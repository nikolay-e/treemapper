    src/math/Constants.kt: |
      package math

      const val PI = 3.14159
    src/geo/Circle.kt: |
      package geo

      import math.PI

      fun circleArea(radius: Double): Double = PI * radius * radius
    src/calc/ShapeCalc.kt: |
      package calc

      import geo.circleArea

      fun totalArea(radii: List<Double>): Double =
          radii.sumOf { circleArea(it) }
    src/api/AreaApi.kt: |
