name: helm_004_values_to_configmap
tags:
- lang:python
- change:single_file
- change:config
- context:cross_module
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: notification-svc
      version: 1.3.0
    chart/values.yaml: |
      replicaCount: 1
      image:
        repository: notification-service
        tag: "1.3.0"
      config:
        logLevel: info
        debugMode: false
    chart/templates/configmap.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: {{ .Release.Name }}-config
        labels:
          app.kubernetes.io/name: {{ .Chart.Name }}
      data:
        LOG_LEVEL: {{ .Values.config.logLevel }}
        DEBUG_MODE: {{ .Values.config.debugMode | quote }}
    chart/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ .Release.Name }}-{{ .Chart.Name }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: {{ .Chart.Name }}
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
                envFrom:
                  - configMapRef:
                      name: {{ .Release.Name }}-config
    chart/templates/networkpolicy.yaml: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
      spec:
        podSelector:
          matchLabels:
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
    chart/tools/load-test.py: |
      import requests
  changed_files:
    chart/Chart.yaml: |
      apiVersion: v2
      name: notification-svc
      version: 1.3.0
    chart/values.yaml: |
      replicaCount: 1
      image:
        repository: notification-service
        tag: "1.3.0"
      config:
        logLevel: debug
        debugMode: true
        maxConnections: 100
    chart/templates/configmap.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: {{ .Release.Name }}-config
        labels:
          app.kubernetes.io/name: {{ .Chart.Name }}
      data:
        LOG_LEVEL: {{ .Values.config.logLevel }}
        DEBUG_MODE: {{ .Values.config.debugMode | quote }}
    chart/templates/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: {{ .Release.Name }}-{{ .Chart.Name }}
      spec:
        replicas: {{ .Values.replicaCount }}
        template:
          spec:
            containers:
              - name: {{ .Chart.Name }}
                image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
                envFrom:
                  - configMapRef:
                      name: {{ .Release.Name }}-config
    chart/templates/networkpolicy.yaml: |
      apiVersion: networking.k8s.io/v1
      kind: NetworkPolicy
      metadata:
      spec:
        podSelector:
          matchLabels:
        policyTypes:
          - Ingress
        ingress:
          - from:
              - namespaceSelector:
                  matchLabels:
    chart/tools/load-test.py: |
      import requests
  commit_message: Update files
fragments:
- id: values_log_level
  selector:
    path: chart/values.yaml
    anchor: 'logLevel: debug'
- id: values_debug_mode
  selector:
    path: chart/values.yaml
    anchor: 'debugMode: true'
- id: values_max_connections
  selector:
    path: chart/values.yaml
    anchor: 'maxConnections: 100'
- id: configmap_template_log_level
  selector:
    path: chart/templates/configmap.yaml
    anchor: .Values.config.logLevel
- id: configmap_template_debug_mode
  selector:
    path: chart/templates/configmap.yaml
    anchor: .Values.config.debugMode
- id: no_networkpolicy
  selector:
    path: chart/templates/networkpolicy.yaml
    anchor: NetworkPolicy
- id: no_load_test
  selector:
    path: chart/tools/load-test.py
    anchor: import requests
- id: no_deployment_template
  selector:
    path: chart/templates/deployment.yaml
    anchor: .Values.replicaCount
oracle:
  required:
  - values_log_level
  - values_debug_mode
  - values_max_connections
  - configmap_template_log_level
  - configmap_template_debug_mode
  allowed: []
  forbidden:
  - no_networkpolicy
  - no_load_test
  - no_deployment_template
