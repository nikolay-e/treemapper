      using App.Services;

      namespace App.Controllers
      {
          public class AlertController
          {
              private readonly NotificationService _notifications;

              public AlertController(NotificationService notifications)
              {
                  _notifications = notifications;
              }

              public void TriggerAlert(string channel, string target, string msg)
              {
                  _notifications.Send(channel, target, msg);
              }
          }
      }
