      using System.Collections.Generic;
      using App.Services.Channels;

      namespace App.Services
      {
          public class NotificationService
          {
              private readonly Dictionary<string, INotificationChannel> _channels;

              public NotificationService()
              {
                  _channels = new Dictionary<string, INotificationChannel>
                  {
                      ["email"] = new EmailChannel(),
                      ["sms"] = new SmsChannel(),
                      ["push"] = new PushChannel(),
                  };
              }

              public void Send(string channel, string recipient, string message)
              {
                  if (_channels.TryGetValue(channel, out var ch))
                      ch.Send(recipient, message);
              }
          }
      }
