repo:
  initial_files:
    src/queue/worker.rs: |
      use std::collections::VecDeque;
      use std::sync::{Arc, Mutex};

      pub type Job = Box<dyn FnOnce() + Send + 'static>;

      pub struct WorkQueue {
          jobs: Arc<Mutex<VecDeque<Job>>>,
      }

      impl WorkQueue {
          pub fn new() -> Self {
              WorkQueue {
                  jobs: Arc::new(Mutex::new(VecDeque::new())),
              }
          }

          pub fn enqueue(&self, job: Job) {
              let mut q = self.jobs.lock().unwrap();
              q.push_back(job);
          }

          pub fn dequeue(&self) -> Option<Job> {
              let mut q = self.jobs.lock().unwrap();
              q.pop_front()
          }

          pub fn len(&self) -> usize {
              self.jobs.lock().unwrap().len()
          }
      }
    src/queue/executor.rs: |
      use crate::queue::worker::WorkQueue;

      pub struct Executor {
          queue: WorkQueue,
          max_retries: u32,
      }

      impl Executor {
          pub fn new(max_retries: u32) -> Self {
              Executor {
                  queue: WorkQueue::new(),
                  max_retries,
              }
          }

          pub fn submit<F: FnOnce() + Send + 'static>(&self, f: F) {
              self.queue.enqueue(Box::new(f));
          }

          pub fn run_next(&self) -> bool {
              if let Some(job) = self.queue.dequeue() {
                  job();
                  true
              } else {
                  false
              }
          }

          pub fn pending(&self) -> usize {
              self.queue.len()
          }
      }
    src/pipeline/stage.rs: |
      use crate::queue::executor::Executor;
      use std::sync::{Arc, Mutex};

      pub struct Pipeline {
          stages: Vec<Executor>,
          results: Arc<Mutex<Vec<String>>>,
      }

      impl Pipeline {
          pub fn new(stage_count: usize, max_retries: u32) -> Self {
              Pipeline {
                  stages: (0..stage_count).map(|_| Executor::new(max_retries)).collect(),
                  results: Arc::new(Mutex::new(Vec::new())),
              }
          }

          pub fn stage(&self, index: usize) -> &Executor {
              &self.stages[index]
          }
      }
    tests/queue_integration.rs: |
      use crate::queue::executor::Executor;
      use std::sync::{Arc, Mutex};

      #[test]
      fn executor_runs_submitted_job() {
          let exec = Executor::new(3);
          let flag = Arc::new(Mutex::new(false));
          let flag2 = Arc::clone(&flag);
          exec.submit(move || { *flag2.lock().unwrap() = true; });
          exec.run_next();
          assert!(*flag.lock().unwrap());
      }

      #[test]
      fn executor_pending_count_decrements() {
          let exec = Executor::new(3);
          exec.submit(|| {});
          exec.submit(|| {});
          assert_eq!(exec.pending(), 2);
          exec.run_next();
          assert_eq!(exec.pending(), 1);
      }
