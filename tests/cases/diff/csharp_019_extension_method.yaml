      use crate::queue::executor::Executor;
      use std::sync::{Arc, Mutex};

      #[test]
      fn executor_runs_submitted_job() {
          let exec = Executor::new(3);
          let flag = Arc::new(Mutex::new(false));
          let flag2 = Arc::clone(&flag);
          exec.submit(move || { *flag2.lock().unwrap() = true; });
          exec.run_next();
          assert!(*flag.lock().unwrap());
      }

      #[test]
      fn executor_pending_count_decrements() {
          let exec = Executor::new(3);
          exec.submit(|| {});
          exec.submit(|| {});
          assert_eq!(exec.pending(), 2);
          exec.run_next();
          assert_eq!(exec.pending(), 1);
      }

      #[test]
      fn executor_run_all_drains_queue() {
          let exec = Executor::new(3);
          exec.submit(|| {});
          exec.submit(|| {});
          exec.submit(|| {});
          let ran = exec.run_all();
          assert_eq!(ran, 3);
          assert!(exec.is_idle());
      }
