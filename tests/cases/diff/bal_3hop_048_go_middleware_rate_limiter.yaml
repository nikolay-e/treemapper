- context:import_chain
- distance:3hop+
- difficulty:hard
repo:
  initial_files:
    pkg/ratelimit/bucket.go: |
      package ratelimit

      import "time"

      type TokenBucket struct {
        capacity int
        tokens   int
        rate     time.Duration
        lastFill time.Time
      }

      func NewTokenBucket(capacity int, rate time.Duration) *TokenBucket {
        return &TokenBucket{capacity: capacity, tokens: capacity, rate: rate, lastFill: time.Now()}
      }

      func (b *TokenBucket) Allow() bool {
        b.refill()
        if b.tokens > 0 {
          b.tokens--
          return true
        }
        return false
      }

      func (b *TokenBucket) refill() {
        elapsed := time.Since(b.lastFill)
        newTokens := int(elapsed / b.rate)
        if newTokens > 0 {
          b.tokens = min(b.capacity, b.tokens+newTokens)
          b.lastFill = time.Now()
        }
      }
    pkg/ratelimit/limiter.go: |
      package ratelimit

      import "time"

      type Limiter struct {
        buckets map[string]*TokenBucket
        capacity int
        rate     time.Duration
      }

      func NewLimiter(capacity int, rate time.Duration) *Limiter {
        return &Limiter{buckets: make(map[string]*TokenBucket), capacity: capacity, rate: rate}
      }

      func (l *Limiter) Allow(key string) bool {
        if _, ok := l.buckets[key]; !ok {
          l.buckets[key] = NewTokenBucket(l.capacity, l.rate)
        }
        return l.buckets[key].Allow()
      }
    pkg/middleware/ratelimit.go: |
      package middleware

      import (
        "net/http"
        "pkg/ratelimit"
        "time"
      )

      func RateLimitMiddleware(next http.Handler) http.Handler {
        limiter := ratelimit.NewLimiter(100, time.Second)
        return http.HandlerFunc(func(w http.ResponseWriter, r *http.Request) {
          ip := r.RemoteAddr
          if !limiter.Allow(ip) {
            http.Error(w, "Too Many Requests", http.StatusTooManyRequests)
            return
          }
          next.ServeHTTP(w, r)
        })
      }
    cmd/server/main.go: |
      package main

      import (
        "net/http"
        "pkg/middleware"
      )

      func main() {
        mux := http.NewServeMux()
        mux.HandleFunc("/api/data", func(w http.ResponseWriter, r *http.Request) {
          w.Write([]byte("ok"))
        })
        handler := middleware.RateLimitMiddleware(mux)
        http.ListenAndServe(":8080", handler)
      }
