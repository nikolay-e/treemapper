name: kubernetes_026_ingress_rules
tags:
- lang:shell
- change:single_file
- change:config
- context:same_file
- distance:0hop
- difficulty:trivial
repo:
  initial_files:
    k8s/base/deployment.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: api-gateway
        namespace: production
        labels:
          app: api-gateway
          component: ingress
      spec:
        replicas: 3
        selector:
          matchLabels:
            app: api-gateway
        template:
          metadata:
            labels:
              app: api-gateway
              component: ingress
          spec:
            containers:
            - name: api
              image: registry.example.com/api-gateway:v1.5.0
              ports:
              - containerPort: 8080
                name: http
              - containerPort: 8443
                name: https
              resources:
                requests:
                  memory: "256Mi"
                  cpu: "250m"
                limits:
                  memory: "512Mi"
                  cpu: "500m"
    k8s/base/service.yaml: |
      apiVersion: v1
      kind: Service
      metadata:
        name: api-gateway
        namespace: production
        labels:
          app: api-gateway
      spec:
        selector:
          app: api-gateway
        ports:
        - name: http
          port: 80
          targetPort: 8080
        - name: https
          port: 443
          targetPort: 8443
    k8s/base/ingress.yaml: |
      apiVersion: networking.k8s.io/v1
      kind: Ingress
      metadata:
        name: api-ingress
        namespace: production
        annotations:
          kubernetes.io/ingress.class: nginx
      spec:
        rules: []
    k8s/base/configmap.yaml: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: api-config
        namespace: production
      data:
        LOG_LEVEL: info
        API_TIMEOUT: "30"
        RATE_LIMIT: "1000"
    k8s/base/tls-secret.yaml: |
      apiVersion: v1
      kind: Secret
      metadata:
        name: api-tls-cert
        namespace: production
      type: kubernetes.io/tls
      data:
        tls.crt: LS0tLS1CRUdJTi...
        tls.key: LS0tLS1CRUdJTi...
    k8s/monitoring/ingress-metrics.yaml: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ingress-nginx-metrics
        namespace: ingress-nginx
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: ingress-metrics-exporter
        template:
          spec:
            containers:
            - name: exporter
              image: nginx/nginx-prometheus-exporter:0.11
              args:
              - -nginx.scrape-uri=http://localhost:8080/stub_status
              ports:
              - containerPort: 9113
    scripts/deploy.sh: |
      #!/bin/bash
      kubectl apply -f k8s/base/
