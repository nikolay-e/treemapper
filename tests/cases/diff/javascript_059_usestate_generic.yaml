repo:
  initial_files:
    types.ts: |
      export interface TodoItem {
          id: string;
          text: string;
          completed: boolean;
      }
    TodoList.tsx: |
      console.log('initial');
    todo-filters.ts: |
      import { TodoItem } from './types';

      export function filterCompleted(items: TodoItem[]): TodoItem[] {
          return items.filter(item => item.completed);
      }

      export function filterActive(items: TodoItem[]): TodoItem[] {
          return items.filter(item => !item.completed);
      }
    TodoItemView.tsx: |
      interface TodoItemViewProps {
          text: string;
          completed: boolean;
          onToggle: () => void;
      }

      export function TodoItemView({ text, completed, onToggle }: TodoItemViewProps) {
          return (
              <li onClick={onToggle} style={{ textDecoration: completed ? 'line-through' : 'none' }}>
                  {text}
              </li>
          );
      }
  changed_files:
    types.ts: |
      export interface TodoItem {
          id: string;
          text: string;
          completed: boolean;
      }
    TodoList.tsx: |
      import { useState } from 'react';
      import { TodoItem } from './types';

      export function TodoList() {
          const [todos, setTodos] = useState<TodoItem[]>([]);

          const addTodo = (text: string) => {
              setTodos([...todos, { id: Date.now().toString(), text, completed: false }]);
          };

          return <div>{todos.map(t => <span key={t.id}>{t.text}</span>)}</div>;
      }
    todo-filters.ts: |
      import { TodoItem } from './types';

      export function filterCompleted(items: TodoItem[]): TodoItem[] {
