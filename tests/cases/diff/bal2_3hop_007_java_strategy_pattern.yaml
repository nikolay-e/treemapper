    src/main/java/com/app/sort/SortStrategy.java: |
      package com.app.sort;

      import java.util.List;

      public interface SortStrategy {
          List<Integer> sort(List<Integer> data);
      }
    src/main/java/com/app/sort/QuickSort.java: |
      package com.app.sort;

      import com.app.sort.SortStrategy;
      import java.util.ArrayList;
      import java.util.List;

      public class QuickSort implements SortStrategy {
          public List<Integer> sort(List<Integer> data) {
              List<Integer> sorted = new ArrayList<>(data);
              sorted.sort(Integer::compareTo);
              return sorted;
          }
      }
    src/main/java/com/app/engine/SortEngine.java: |
      package com.app.engine;

      import com.app.sort.QuickSort;
      import com.app.sort.SortStrategy;
      import java.util.List;

      public class SortEngine {
          private SortStrategy strategy;
          public SortEngine() {
              this.strategy = new QuickSort();
          }
          public List<Integer> execute(List<Integer> data) {
              return strategy.sort(data);
          }
      }
    src/main/java/com/app/api/DataEndpoint.java: |
      package com.app.api;

      import com.app.engine.SortEngine;
      import java.util.List;

      public class DataEndpoint {
          private final SortEngine engine;
          public DataEndpoint(SortEngine engine) {
              this.engine = engine;
          }
          public List<Integer> getSorted(List<Integer> input) {
              return engine.execute(input);
          }
      }
    src/main/java/com/app/util/ArrayUtils.java: |
      package com.app.util;

      public class ArrayUtils {
          public static int[] reverse(int[] arr) {
              int[] result = new int[arr.length];
              for (int i = 0; i < arr.length; i++) {
                  result[i] = arr[arr.length - 1 - i];
              }
              return result;
          }
      }
