    class HealthProbe:
        def __init__(self, checks=None):
            self.checks = checks or []

        def register_check(self, name, check_fn):
            self.checks.append({"name": name, "fn": check_fn})

        def run_all(self):
            results = {}
            for check in self.checks:
                try:
                    check["fn"]()
                    results[check["name"]] = "healthy"
                except Exception as exc:
                    results[check["name"]] = f"unhealthy: {exc}"
            return results

        def is_healthy(self):
            results = self.run_all()
            return all(v == "healthy" for v in results.values())

