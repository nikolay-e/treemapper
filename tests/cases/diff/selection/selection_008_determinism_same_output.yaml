    from scheduler import Scheduler
    import logging

    logger = logging.getLogger(__name__)

    class SchedulerRunner:
        def __init__(self):
            self.scheduler = Scheduler()
            self._task_counter = 0

        def submit_task(self, task_data: dict) -> str:
            self._task_counter += 1
            task_id = f"task-{self._task_counter}"
            task = {"id": task_id, **task_data}
            success = self.scheduler.schedule_task(task)
            logger.info(f"Submitted {task_id}: {success}")
            return task_id

        def cancel(self, task_id: str) -> bool:
            removed = self.scheduler.cancel_task(task_id)
            logger.info(f"Cancelled {task_id}: {removed}")
            return removed

        def resubmit(self, task_id: str, task_data: dict) -> bool:
            task = {"id": task_id, **task_data}
            result = self.scheduler.reschedule_task(task_id, task)
            logger.info(f"Resubmitted {task_id}: {result}")
            return result

