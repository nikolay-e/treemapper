    from task_queue import TaskQueue

    class Scheduler:
        def __init__(self, default_priority=5):
            self.queue = TaskQueue(max_size=100)
            self.default_priority = default_priority

        def schedule_task(self, task, priority=None):
            effective_priority = priority if priority is not None else self.default_priority
            success = self.queue.enqueue(task, priority=effective_priority)
            return success

        def cancel_task(self, task_id):
            removed = self.queue.remove(task_id)
            return removed

        def reschedule_task(self, task_id, task, priority=None):
            self.queue.remove(task_id)
            effective_priority = priority if priority is not None else self.default_priority
            self.queue.enqueue(task, priority=effective_priority)
            return True

