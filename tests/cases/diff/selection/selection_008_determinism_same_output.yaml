    from task_queue import TaskQueue
    import logging
    import time

    logger = logging.getLogger(__name__)

    class TaskWorker:
        def __init__(self, queue: TaskQueue, poll_interval: float = 1.0):
            self.queue = queue
            self.poll_interval = poll_interval
            self._running = False

        def start(self):
            self._running = True
            logger.info("Worker started")
            while self._running:
                task = self.queue.dequeue()
                if task is not None:
                    self._process(task)
                else:
                    next_task = self.queue.peek()
                    if next_task is None:
                        time.sleep(self.poll_interval)

        def stop(self):
            self._running = False
            logger.info("Worker stopped")

        def _process(self, task):
            logger.info(f"Processing task: {task}")
            remaining = self.queue.size()
            logger.info(f"Queue size after dequeue: {remaining}")

