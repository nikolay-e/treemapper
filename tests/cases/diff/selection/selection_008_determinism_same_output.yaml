    from dataclasses import dataclass
    from typing import Optional

    HIGH = 10
    MEDIUM = 5
    LOW = 1
    DEFAULT = MEDIUM

    @dataclass
    class PriorityRule:
        pattern: str
        priority: int

    class PriorityResolver:
        def __init__(self, rules: list[PriorityRule] = None):
            self.rules = rules or []

        def resolve(self, task_name: str) -> int:
            for rule in self.rules:
                if rule.pattern in task_name:
                    return rule.priority
            return DEFAULT

        def add_rule(self, pattern: str, priority: int):
            self.rules.append(PriorityRule(pattern=pattern, priority=priority))

