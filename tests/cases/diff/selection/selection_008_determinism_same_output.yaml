      from task_queue import TaskQueue
      import logging
      import time

      logger = logging.getLogger(__name__)

      class TaskWorker:
          def __init__(self, queue: TaskQueue, poll_interval: float = 1.0):
              self.queue = queue
              self.poll_interval = poll_interval
              self._running = False

          def start(self):
              self._running = True
              logger.info("Worker started")
              while self._running:
                  task = self.queue.dequeue()
                  if task is not None:
                      self._process(task)
                  else:
                      next_task = self.queue.peek()
                      if next_task is None:
                          time.sleep(self.poll_interval)

          def stop(self):
              self._running = False
              logger.info("Worker stopped")

          def _process(self, task):
              logger.info(f"Processing task: {task}")
              remaining = self.queue.size()
              logger.info(f"Queue size after dequeue: {remaining}")
    scheduler_runner.py: |
      from scheduler import Scheduler
      import logging

      logger = logging.getLogger(__name__)

      class SchedulerRunner:
          def __init__(self):
              self.scheduler = Scheduler()
              self._task_counter = 0

          def submit_task(self, task_data: dict) -> str:
              self._task_counter += 1
              task_id = f"task-{self._task_counter}"
              task = {"id": task_id, **task_data}
              success = self.scheduler.schedule_task(task)
              logger.info(f"Submitted {task_id}: {success}")
              return task_id

          def cancel(self, task_id: str) -> bool:
              removed = self.scheduler.cancel_task(task_id)
              logger.info(f"Cancelled {task_id}: {removed}")
              return removed

          def resubmit(self, task_id: str, task_data: dict) -> bool:
              task = {"id": task_id, **task_data}
              result = self.scheduler.reschedule_task(task_id, task)
              logger.info(f"Resubmitted {task_id}: {result}")
              return result
    tests/test_scheduler.py: |
      from scheduler import Scheduler

      def test_schedule_task():
          s = Scheduler()
          assert s.schedule_task({"id": "t1", "name": "test"}) is True

      def test_cancel_task():
          s = Scheduler()
          s.schedule_task({"id": "t1", "name": "test"})
          assert s.cancel_task({"id": "t1", "name": "test"}) is True

      def test_cancel_nonexistent():
          s = Scheduler()
          assert s.cancel_task("nonexistent") is False

      def test_reschedule_task():
          s = Scheduler()
          task = {"id": "t1", "name": "test"}
          s.schedule_task(task)
          assert s.reschedule_task("t1", {"id": "t1", "name": "updated"}) is True

      def test_schedule_returns_false_when_full():
          s = Scheduler()
          s.queue.max_size = 1
          s.schedule_task({"id": "t1"})
          assert s.schedule_task({"id": "t2"}) is False
