    from scheduler import Scheduler

    def test_schedule_task():
        s = Scheduler()
        assert s.schedule_task({"id": "t1", "name": "test"}) is True

    def test_cancel_task():
        s = Scheduler()
        s.schedule_task({"id": "t1", "name": "test"})
        assert s.cancel_task({"id": "t1", "name": "test"}) is True

    def test_cancel_nonexistent():
        s = Scheduler()
        assert s.cancel_task("nonexistent") is False

    def test_reschedule_task():
        s = Scheduler()
        task = {"id": "t1", "name": "test"}
        s.schedule_task(task)
        assert s.reschedule_task("t1", {"id": "t1", "name": "updated"}) is True

    def test_schedule_returns_false_when_full():
        s = Scheduler()
        s.queue.max_size = 1
        s.schedule_task({"id": "t1"})
        assert s.schedule_task({"id": "t2"}) is False

