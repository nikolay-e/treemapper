      from task_queue import TaskQueue

      class Scheduler:
          def __init__(self):
              self.queue = TaskQueue(max_size=100)

          def schedule_task(self, task):
              self.queue.enqueue(task, priority=0)
              return True

          def cancel_task(self, task_id):
              return self.queue.remove(task_id)

          def reschedule_task(self, task_id, task):
              self.queue.remove(task_id)
              self.queue.enqueue(task, priority=0)
              return True
    task_queue.py: |
      class TaskQueue:
          def __init__(self, max_size=50):
              self.max_size = max_size
              self.items = []

          def enqueue(self, item, priority=0):
              if len(self.items) >= self.max_size:
                  return False
              self.items.append({"item": item, "priority": priority})
              self.items.sort(key=lambda x: x["priority"], reverse=True)
              return True

          def dequeue(self):
              if not self.items:
                  return None
              return self.items.pop(0)["item"]

          def remove(self, item_id):
              before = len(self.items)
              self.items = [x for x in self.items if x["item"] != item_id]
              return len(self.items) < before

          def peek(self):
              if not self.items:
                  return None
              return self.items[0]["item"]

          def size(self):
              return len(self.items)
