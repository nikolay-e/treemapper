      from dataclasses import dataclass
      from typing import Optional

      HIGH = 10
      MEDIUM = 5
      LOW = 1
      DEFAULT = MEDIUM

      @dataclass
      class PriorityRule:
          pattern: str
          priority: int

      class PriorityResolver:
          def __init__(self, rules: list[PriorityRule] = None):
              self.rules = rules or []

          def resolve(self, task_name: str) -> int:
              for rule in self.rules:
                  if rule.pattern in task_name:
                      return rule.priority
              return DEFAULT

          def add_rule(self, pattern: str, priority: int):
              self.rules.append(PriorityRule(pattern=pattern, priority=priority))
    metrics_collector.py: |
      from datetime import datetime

      class MetricsCollector:
          def __init__(self, namespace="default"):
              self.namespace = namespace
              self.counters = {}
              self.gauges = {}

          def increment_counter(self, metric_name, value=1):
              key = f"{self.namespace}.{metric_name}"
              self.counters[key] = self.counters.get(key, 0) + value

          def set_gauge(self, metric_name, value):
              key = f"{self.namespace}.{metric_name}"
              self.gauges[key] = {"value": value, "timestamp": datetime.now()}

          def flush_metrics(self):
              snapshot = {"counters": dict(self.counters), "gauges": dict(self.gauges)}
              self.counters.clear()
              return snapshot
    health_probe.py: |
      class HealthProbe:
          def __init__(self, checks=None):
              self.checks = checks or []

          def register_check(self, name, check_fn):
              self.checks.append({"name": name, "fn": check_fn})

          def run_all(self):
              results = {}
              for check in self.checks:
                  try:
                      check["fn"]()
                      results[check["name"]] = "healthy"
                  except Exception as exc:
                      results[check["name"]] = f"unhealthy: {exc}"
              return results

          def is_healthy(self):
              results = self.run_all()
              return all(v == "healthy" for v in results.values())
