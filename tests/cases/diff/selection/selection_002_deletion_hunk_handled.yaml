# remaining functions (track_event, flush_events) are left intact. The
# deleted function was imported in legacy_adapter.py which is unchanged.
#
# Diff: analytics.py loses track_legacy_event (deletion hunk). The other
# functions and the file itself remain.
#
# Reviewer questions:
#   Q1: "Does anything still import the deleted function?"
#       -> legacy_adapter.py (UNCHANGED) has `from analytics import track_legacy_event`.
#          This import is now broken. Reviewer needs to see the caller to
#          understand the blast radius of the deletion.
#   Q2: "What did track_legacy_event do that track_event doesn't?"
#       -> The diff shows the deleted code. legacy_adapter.py shows how it
#          was called with the old (category, action) signature.
#
# Not needed:
#   - dashboard.py: renders analytics charts from aggregated data. Does not
#     import from analytics.py directly — reads from a database instead.
#   - export_csv.py: exports event logs to CSV. Uses its own query logic,
#     no import edge to analytics.py.

