    class CircuitBreaker:
        CLOSED = "closed"
        OPEN = "open"
        HALF_OPEN = "half_open"

        def __init__(self, failure_threshold=5, recovery_timeout=30):
            self.state = self.CLOSED
            self.failure_count = 0
            self.failure_threshold = failure_threshold
            self.recovery_timeout = recovery_timeout
            self.last_failure_time = None

        def record_success(self):
            self.failure_count = 0
            self.state = self.CLOSED

        def record_failure(self):
            self.failure_count += 1
            if self.failure_count >= self.failure_threshold:
                self.state = self.OPEN

        def allow_request(self):
            return self.state != self.OPEN

        def reset(self):
            self.failure_count = 0
            self.state = self.CLOSED
            self.last_failure_time = None
  retry_policy.py: |
    import time

    class RetryPolicy:
        def __init__(self, max_retries=3, base_delay=1.0, backoff_factor=2.0):
            self.max_retries = max_retries
            self.base_delay = base_delay
            self.backoff_factor = backoff_factor

        def execute(self, func, *args, **kwargs):
            last_error = None
            for attempt in range(self.max_retries):
                try:
                    return func(*args, **kwargs)
                except Exception as exc:
                    last_error = exc
                    delay = self.base_delay * (self.backoff_factor ** attempt)
                    time.sleep(delay)
            raise last_error

        def compute_delay(self, attempt):
            return self.base_delay * (self.backoff_factor ** attempt)

        def should_retry(self, error):
            return not isinstance(error, (KeyboardInterrupt, SystemExit))
  throttle_middleware.py: |
    from token_bucket import TokenBucket

    class ThrottleMiddleware:
        def __init__(self, requests_per_second):
            self.bucket = TokenBucket(requests_per_second, requests_per_second)
            self.rejected_count = 0

        def process_request(self, request):
            self.bucket.refill()
            if not self.bucket.consume(1):
                self.rejected_count += 1
                return {"status": 429, "message": "Too many requests"}
            return None

        def get_stats(self):
            return {
                "available_tokens": self.bucket.available(),
                "rejected": self.rejected_count,
            }

        def reset_stats(self):
            self.rejected_count = 0
