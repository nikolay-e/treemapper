    src/repository/user_repository.hpp: |
      #pragma once
      #include <string>
      #include <optional>
      #include "../database/connection.hpp"

      namespace repository {

      struct UserRecord {
          int id;
          std::string name;
          std::string email;
      };

      class UserRepository {
      public:
          explicit UserRepository(database::Connection& conn);
          std::optional<UserRecord> find_by_id(int id);
      private:
          database::Connection& conn_;
      };

      }
    src/repository/user_repository.cpp: |
      #include "user_repository.hpp"

      namespace repository {

      UserRepository::UserRepository(database::Connection& conn)
          : conn_(conn) {}

      std::optional<UserRecord> UserRepository::find_by_id(int id) {
          auto rows = conn_.query("SELECT * FROM users WHERE id = " + std::to_string(id));
          if (rows.empty()) return std::nullopt;
          return UserRecord{id, rows[0]["name"], rows[0]["email"]};
      }

      }
