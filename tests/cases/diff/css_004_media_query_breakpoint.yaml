name: css_004_media_query_breakpoint
tags:
- lang:css
- change:single_file
- context:import_chain
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    responsive.css: |
      @media (max-width: 768px) {
        .container { padding: 0 16px; }
        .sidebar { display: none; }
      }
      @media (min-width: 769px) {
        .container { max-width: 1200px; margin: 0 auto; }
      }
    layout.css: |
      @import "responsive.css";
      .container { display: flex; gap: 24px; }
      .sidebar { width: 240px; flex-shrink: 0; }
      .main-content { flex: 1; }
    CSS_NOISE_004_admin.css: |
      .CSS_NOISE_004_admin_panel { background: #333; color: #fff; }
      .CSS_NOISE_004_admin_nav { width: 200px; }
    CSS_NOISE_004_dashboard.css: |
      .CSS_NOISE_004_dashboard_widget { border: 1px solid #ddd; }
      .CSS_NOISE_004_dashboard_chart { height: 300px; }
  changed_files:
    responsive.css: |
      @media (max-width: 800px) {
        .container { padding: 0 16px; }
        .sidebar { display: none; }
      }
      @media (min-width: 801px) {
        .container { max-width: 1200px; margin: 0 auto; }
      }
  commit_message: "style: update mobile breakpoint from 768px to 800px"
fragments:
- id: responsive_breakpoint
  selector:
    path: responsive.css
    anchor: "max-width: 800px"
- id: layout_imports_responsive
  selector:
    path: layout.css
    anchor: responsive.css
- id: no_admin
  selector:
    path: CSS_NOISE_004_admin.css
- id: no_dashboard
  selector:
    path: CSS_NOISE_004_dashboard.css
- id: no_global_0
  selector:
    anchor: CSS_NOISE_004_admin_panel
- id: no_global_1
  selector:
    anchor: CSS_NOISE_004_dashboard_widget
oracle:
  required:
  - responsive_breakpoint
  - layout_imports_responsive
  allowed: []
  forbidden:
  - no_admin
  - no_dashboard
  - no_global_0
  - no_global_1
