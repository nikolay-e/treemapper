repo:
  initial_files:
    Payment/IPaymentProvider.cs: |
      namespace Payment
      {
          public interface IPaymentProvider
          {
              bool Charge(string customerId, decimal amount);
              bool Refund(string transactionId);
          }
      }
    Payment/StripeProvider.cs: |
      using Payment;

      namespace Payment.Providers
      {
          public class StripeProvider : IPaymentProvider
          {
              public bool Charge(string customerId, decimal amount) => true;
              public bool Refund(string transactionId) => true;
          }
      }
    Checkout/CheckoutService.cs: |
      using Payment;

      namespace Checkout
      {
          public class CheckoutService
          {
              private readonly IPaymentProvider _provider;

              public CheckoutService(IPaymentProvider provider)
              {
                  _provider = provider;
              }

              public bool ProcessOrder(string customerId, decimal total)
              {
                  return _provider.Charge(customerId, total);
              }
          }
      }
