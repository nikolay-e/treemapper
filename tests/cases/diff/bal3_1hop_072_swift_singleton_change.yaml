    Sources/Core/AppState.swift: |
      import Foundation

      enum AppTheme: String {
          case light
          case dark
          case system
      }

      class AppState {
          static let shared = AppState()
          var isLoggedIn: Bool = false
          var userId: String?
          var theme: AppTheme = .system
          var language: String = "en"
          var isOnboarded: Bool = false

          private init() {}

          func reset() {
              isLoggedIn = false
              userId = nil
              isOnboarded = false
          }
      }
    Sources/UI/HeaderView.swift: |
      import Foundation
