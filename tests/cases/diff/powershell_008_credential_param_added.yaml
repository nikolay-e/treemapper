name: powershell_008_credential_param_added
tags:
- lang:powershell
- change:single_file
- change:multi_file
- change:signature
- context:import_chain
- distance:1hop
- difficulty:medium
repo:
  initial_files:
    DbConnectionModule.psm1: |
      function Connect-Database {
          param(
              [string]$Server,
              [string]$Database
          )
          $connStr = "Server=$Server;Database=$Database;Integrated Security=true"
          $conn = New-Object System.Data.SqlClient.SqlConnection($connStr)
          $conn.Open()
          return $conn
      }
      Export-ModuleMember -Function Connect-Database
    Sync-UserData.ps1: |
      Import-Module ./DbConnectionModule.psm1
      $conn = Connect-Database -Server "sql01" -Database "Users"
      Write-Output "User sync started on $($conn.Database)"
    Export-ReportData.ps1: |
      Import-Module ./DbConnectionModule.psm1
      $conn = Connect-Database -Server "sql01" -Database "Reports"
      Write-Output "Report export started on $($conn.Database)"
    PS_NOISE_008_SmtpUtils.psm1: |
      function PS_NOISE_008_Send-AlertEmail {
          param([string]$To, [string]$Subject, [string]$Body)
          $smtp = New-Object Net.Mail.SmtpClient("mail.internal.example.com")
          $smtp.Send("noreply@example.com", $To, $Subject, $Body)
      }
      Export-ModuleMember -Function PS_NOISE_008_Send-AlertEmail
    PS_NOISE_008_AdUtils.psm1: |
      function PS_NOISE_008_Get-AdGroupMembers {
          param([string]$GroupName)
          return Get-ADGroupMember -Identity $GroupName -Recursive
      }
      Export-ModuleMember -Function PS_NOISE_008_Get-AdGroupMembers
  changed_files:
    DbConnectionModule.psm1: |
      function Connect-Database {
          param(
              [string]$Server,
              [string]$Database,
              [System.Management.Automation.PSCredential]$Credential
          )
          if ($Credential) {
              $connStr = "Server=$Server;Database=$Database;User Id=$($Credential.UserName);Password=$($Credential.GetNetworkCredential().Password)"
          } else {
              $connStr = "Server=$Server;Database=$Database;Integrated Security=true"
          }
          $conn = New-Object System.Data.SqlClient.SqlConnection($connStr)
          $conn.Open()
          return $conn
      }
      Export-ModuleMember -Function Connect-Database
  commit_message: "feat: add optional PSCredential param to Connect-Database"
