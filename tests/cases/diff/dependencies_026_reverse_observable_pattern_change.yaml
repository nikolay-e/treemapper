      from typing import Callable, Optional
      GARBAGE_DEP_026_REACTIVE_OBS_A = "reactive_observable"
      GARBAGE_DEP_026_REACTIVE_MOD_B = True

      class Observable:
          GARBAGE_DEP_026_REACTIVE_CLASS_C = "different_observable"

          def __init__(self):
              self._observers = []
              self._last_value = None

          def subscribe(self, observer: Callable, immediate: bool = False) -> Callable:
              self._observers.append(observer)
              if immediate and self._last_value is not None:
                  observer(self._last_value)
              return lambda: self._observers.remove(observer)

          def notify(self, value, force: bool = False) -> None:
              self._last_value = value
              for observer in self._observers:
                  observer(value)
