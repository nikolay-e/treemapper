    Sources/Storage/Store.swift: |
      import Foundation

      protocol Storable: Codable {
          var id: String { get }
          var createdAt: Date { get }
      }

      class Store<T: Storable> {
          private var items: [String: T] = [:]

          func save(_ item: T) {
              items[item.id] = item
          }

          func find(id: String) -> T? {
              return items[id]
          }

          func all() -> [T] {
              return Array(items.values)
          }

          func remove(id: String) -> T? {
              return items.removeValue(forKey: id)
          }

          func filter(predicate: (T) -> Bool) -> [T] {
              return items.values.filter(predicate)
          }
      }
