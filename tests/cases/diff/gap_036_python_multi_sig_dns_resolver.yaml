  changed_files:
    resolver/cache.py: |
      from dataclasses import dataclass
      from datetime import datetime, timedelta

      @dataclass
      class CacheEntry:
          domain: str
          ip_address: str
          cached_at: datetime
          ttl_seconds: int = 300

          def is_expired(self) -> bool:
              return datetime.now() > self.cached_at + timedelta(seconds=self.ttl_seconds)

      class DNSCache:
          def __init__(self, max_entries: int = 10000):
              self.entries: dict[str, CacheEntry] = {}
              self.max_entries = max_entries

          def put(self, domain: str, ip_address: str, ttl: int = 300) -> None:
              if len(self.entries) >= self.max_entries:
                  self.evict_expired()
              self.entries[domain] = CacheEntry(domain, ip_address, datetime.now(), ttl)

          def get(self, domain: str) -> str | None:
              entry = self.entries.get(domain)
              if entry and not entry.is_expired():
                  return entry.ip_address
              return None

          def evict_expired(self) -> int:
              expired = [k for k, v in self.entries.items() if v.is_expired()]
              for k in expired:
                  del self.entries[k]
              return len(expired)

          def size(self) -> int:
              return len(self.entries)
    resolver/lookup.py: |
      class RecursiveResolver:
          def __init__(self, upstream: str, timeout_ms: int = 5000):
              self.upstream = upstream
              self.timeout_ms = timeout_ms
              self.query_count = 0

          def resolve(self, domain: str) -> str:
              self.query_count += 1
              return f"203.0.113.{hash(domain) % 256}"

          def stats(self) -> dict:
              return {
                  "upstream": self.upstream,
                  "queries": self.query_count,
                  "timeout_ms": self.timeout_ms,
              }
  commit_message: "add TTL-based cache eviction and resolver timeout"
