name: bal4_crossmod_010_rust_fn_sig_change_cross_mod
tags:
- lang:rust
- change:signature
- context:cross_module
- distance:1hop
- difficulty:easy
repo:
  initial_files:
    src/math/calc.rs: |
      pub fn add(a: i32, b: i32) -> i32 {
          a + b
      }

      pub fn multiply(a: i32, b: i32) -> i32 {
          a * b
      }
    src/engine/compute.rs: |
      use crate::math::calc;

      pub fn sum_list(values: &[i32]) -> i32 {
          let mut total = 0;
          for v in values {
              total = calc::add(total, *v);
          }
          total
      }

      pub fn product_list(values: &[i32]) -> i32 {
          let mut result = 1;
          for v in values {
              result = calc::multiply(result, *v);
          }
          result
      }
    src/render/display.rs: |
      use crate::math::calc;

      pub fn show_sum(a: i32, b: i32) -> String {
          format!("{} + {} = {}", a, b, calc::add(a, b))
      }
    src/io/reader.rs: |
      pub const GARBAGE_010_BUF_A: usize = 4096;
      pub const GARBAGE_010_ENC_B: &str = "utf-8";

      pub fn read_line() -> String {
          String::new()
      }
    garbage_logger.rs: |
      pub const GARBAGE_010_LEVEL_C: &str = "debug";
      pub const GARBAGE_010_FILE_D: &str = "app.log";

      pub fn log(msg: &str) {}
  changed_files:
    src/math/calc.rs: |
      pub fn add(a: i64, b: i64) -> i64 {
          a + b
      }

      pub fn multiply(a: i64, b: i64) -> i64 {
          a * b
      }
    src/engine/compute.rs: |
      use crate::math::calc;

      pub fn sum_list(values: &[i32]) -> i32 {
          let mut total = 0;
          for v in values {
              total = calc::add(total, *v);
          }
          total
      }

      pub fn product_list(values: &[i32]) -> i32 {
          let mut result = 1;
          for v in values {
              result = calc::multiply(result, *v);
          }
          result
      }
    src/render/display.rs: |
      use crate::math::calc;

      pub fn show_sum(a: i32, b: i32) -> String {
          format!("{} + {} = {}", a, b, calc::add(a, b))
      }
    src/io/reader.rs: |
      pub const GARBAGE_010_BUF_A: usize = 4096;
      pub const GARBAGE_010_ENC_B: &str = "utf-8";

      pub fn read_line() -> String {
          String::new()
      }
    garbage_logger.rs: |
      pub const GARBAGE_010_LEVEL_C: &str = "debug";
      pub const GARBAGE_010_FILE_D: &str = "app.log";

      pub fn log(msg: &str) {}
  commit_message: "change calc functions from i32 to i64"
