    anchor: "pub fn overdue_ids"
- id: processor_calls_mark_paid
  selector:
    path: src/billing/payment_processor.rs
    anchor: "inv.mark_paid()"
- id: no_garbage_a
  selector:
    anchor: GARBAGE_JESTCFG_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_JESTCFG_B
- id: no_garbage_c
  selector:
    anchor: GARBAGE_JESTCFG_C
oracle:
