name: json_007_jest_config
tags:
- lang:rust
- change:multi_file
- change:refactor
- context:import_chain
- distance:2hop
- difficulty:hard
repo:
  initial_files:
    src/billing/invoice.rs: |
      use chrono::NaiveDate;

      #[derive(Debug, Clone)]
      pub struct Invoice {
          pub id: String,
          pub customer_id: String,
          pub amount_cents: i64,
          pub due_date: NaiveDate,
      }

      impl Invoice {
          pub fn new(id: &str, customer_id: &str, amount_cents: i64, due_date: NaiveDate) -> Self {
              Self {
                  id: id.to_string(),
                  customer_id: customer_id.to_string(),
                  amount_cents,
                  due_date,
              }
          }

          pub fn is_overdue(&self, today: NaiveDate) -> bool {
              today > self.due_date
          }
      }

      pub fn format_amount(cents: i64) -> String {
          format!("${:.2}", cents as f64 / 100.0)
      }
    src/billing/invoice_repo.rs: |
      use crate::billing::invoice::Invoice;
      use std::collections::HashMap;

      pub struct InvoiceRepo {
          store: HashMap<String, Invoice>,
      }

      impl InvoiceRepo {
          pub fn new() -> Self {
              Self { store: HashMap::new() }
          }

          pub fn save(&mut self, invoice: Invoice) {
              self.store.insert(invoice.id.clone(), invoice);
          }

          pub fn find(&self, id: &str) -> Option<&Invoice> {
              self.store.get(id)
          }
      }
    src/billing/payment_processor.rs: |
      use crate::billing::invoice_repo::InvoiceRepo;
      use crate::billing::invoice::format_amount;

      pub struct PaymentProcessor {
          repo: InvoiceRepo,
      }

      impl PaymentProcessor {
          pub fn new() -> Self {
              Self { repo: InvoiceRepo::new() }
          }

          pub fn process_payment(&mut self, invoice_id: &str, amount_cents: i64) -> String {
              if let Some(inv) = self.repo.find(invoice_id) {
                  format!("Paid {} for invoice {}", format_amount(amount_cents), inv.id)
              } else {
                  format!("Invoice {} not found", invoice_id)
              }
          }
      }
    garbage/tax_calculator.rs: |
      // GARBAGE_JESTCFG_A = "vat_calculator_marker"
    garbage/dunning.rs: |
      // GARBAGE_JESTCFG_B = "dunning_scheduler_marker"
    garbage/receipt.rs: |
      // GARBAGE_JESTCFG_C = "receipt_generator_marker"
  changed_files:
    src/billing/invoice.rs: |
      use chrono::NaiveDate;

      #[derive(Debug, Clone)]
      pub struct Invoice {
          pub id: String,
          pub customer_id: String,
          pub amount_cents: i64,
          pub due_date: NaiveDate,
          pub paid: bool,
      }

      impl Invoice {
          pub fn new(id: &str, customer_id: &str, amount_cents: i64, due_date: NaiveDate) -> Self {
              Self {
                  id: id.to_string(),
                  customer_id: customer_id.to_string(),
                  amount_cents,
                  due_date,
                  paid: false,
              }
          }

          pub fn is_overdue(&self, today: NaiveDate) -> bool {
              !self.paid && today > self.due_date
          }

          pub fn mark_paid(&mut self) {
              self.paid = true;
          }
      }

      pub fn format_amount(cents: i64) -> String {
          format!("${:.2}", cents as f64 / 100.0)
      }
    src/billing/invoice_repo.rs: |
      use crate::billing::invoice::Invoice;
      use std::collections::HashMap;

      pub struct InvoiceRepo {
          store: HashMap<String, Invoice>,
      }

      impl InvoiceRepo {
          pub fn new() -> Self {
              Self { store: HashMap::new() }
          }

          pub fn save(&mut self, invoice: Invoice) {
              self.store.insert(invoice.id.clone(), invoice);
          }

          pub fn find(&self, id: &str) -> Option<&Invoice> {
              self.store.get(id)
          }

          pub fn find_mut(&mut self, id: &str) -> Option<&mut Invoice> {
              self.store.get_mut(id)
          }

          pub fn overdue_ids(&self, today: chrono::NaiveDate) -> Vec<String> {
              self.store.values()
                  .filter(|inv| inv.is_overdue(today))
                  .map(|inv| inv.id.clone())
                  .collect()
          }
      }
    src/billing/payment_processor.rs: |
      use crate::billing::invoice_repo::InvoiceRepo;
      use crate::billing::invoice::format_amount;

      pub struct PaymentProcessor {
          repo: InvoiceRepo,
      }

      impl PaymentProcessor {
          pub fn new() -> Self {
              Self { repo: InvoiceRepo::new() }
          }

          pub fn process_payment(&mut self, invoice_id: &str, amount_cents: i64) -> String {
              if let Some(inv) = self.repo.find_mut(invoice_id) {
                  inv.mark_paid();
                  format!("Paid {} for invoice {}", format_amount(amount_cents), inv.id)
              } else {
                  format!("Invoice {} not found", invoice_id)
              }
          }
      }
    garbage/tax_calculator.rs: |
      // GARBAGE_JESTCFG_A = "vat_calculator_marker"
    garbage/dunning.rs: |
      // GARBAGE_JESTCFG_B = "dunning_scheduler_marker"
    garbage/receipt.rs: |
      // GARBAGE_JESTCFG_C = "receipt_generator_marker"
  commit_message: "refactor: add paid flag and mark_paid to Invoice, overdue_ids to repo"
fragments:
