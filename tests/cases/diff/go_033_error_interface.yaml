      type ErrorCode int

      const (
          CodeUnknown ErrorCode = iota
          CodeNotFound
          CodePermission
          CodeInvalid
          CodeTimeout
          CodeConflict
          CodeUnavailable
          CodeInternal
      )

      func (c ErrorCode) String() string {
          switch c {
          case CodeNotFound:
              return "NOT_FOUND"
          case CodePermission:
              return "PERMISSION_DENIED"
          case CodeInvalid:
              return "INVALID_INPUT"
          case CodeTimeout:
              return "TIMEOUT"
          case CodeConflict:
              return "CONFLICT"
          case CodeUnavailable:
              return "UNAVAILABLE"
          case CodeInternal:
              return "INTERNAL"
          default:
              return "UNKNOWN"
          }
      }
