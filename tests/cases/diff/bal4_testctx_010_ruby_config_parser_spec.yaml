  initial_files:
    lib/config_parser.rb: |
      require 'json'

      class ConfigParser
        def parse_json(str)
          JSON.parse(str)
        end

        def stringify(hash)
          JSON.generate(hash)
        end
      end
    spec/config_parser_spec.rb: |
      require_relative '../lib/config_parser'

      RSpec.describe ConfigParser do
        subject { described_class.new }

        describe '#parse_json' do
          it 'parses valid JSON' do
            result = subject.parse_json('{"key":"val"}')
            expect(result['key']).to eq('val')
          end
        end

        describe '#stringify' do
          it 'converts hash to JSON' do
            result = subject.stringify({ a: 1 })
            expect(result).to include('"a"')
          end
        end
      end
