repo:
  initial_files:
    src/Portfolio.jl: |
      module Portfolio

      export Position, total_value, unrealized_pnl

      struct Position
          symbol::String
          quantity::Int
          avg_cost::Float64
          current_price::Float64
      end

      function total_value(positions::Vector{Position})::Float64
          return sum(p.quantity * p.current_price for p in positions)
      end

      function unrealized_pnl(position::Position)::Float64
          return position.quantity * (position.current_price - position.avg_cost)
      end

      end
    src/RiskEngine.jl: |
      module RiskEngine

      include("Portfolio.jl")
      using .Portfolio

      function check_concentration(positions::Vector{Position}, max_pct::Float64)::Vector{String}
          total = total_value(positions)
          warnings = String[]
          for p in positions
              pct = (p.quantity * p.current_price) / total
              if pct > max_pct
                  push!(warnings, "$(p.symbol) exceeds concentration limit: $(round(pct*100, digits=1))%")
              end
          end
          return warnings
      end

      end
    src/PnlReport.jl: |
      module PnlReport

      include("Portfolio.jl")
      using .Portfolio

      function summarize_pnl(positions::Vector{Position})::Dict{String,Float64}
          return Dict(p.symbol => unrealized_pnl(p) for p in positions)
      end

      end
