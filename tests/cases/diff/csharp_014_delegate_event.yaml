  changed_files:
    src/Portfolio.jl: |
      module Portfolio

      export Position, total_value, unrealized_pnl, weighted_avg_price

      struct Position
          symbol::String
          quantity::Int
          avg_cost::Float64
          current_price::Float64
          sector::String
      end

      function total_value(positions::Vector{Position})::Float64
          return sum(p.quantity * p.current_price for p in positions)
      end

      function unrealized_pnl(position::Position)::Float64
          return position.quantity * (position.current_price - position.avg_cost)
      end

      function weighted_avg_price(positions::Vector{Position})::Float64
          total_qty = sum(p.quantity for p in positions)
          return total_qty == 0 ? 0.0 : sum(p.quantity * p.current_price for p in positions) / total_qty
      end

      end
