    src/main/java/com/catalog/category/CategoryRepository.java: |
      package com.catalog.category;

      import java.util.ArrayList;
      import java.util.List;
      import java.util.Optional;
      import java.util.stream.Collectors;

      public class CategoryRepository {
          private final List<Category> categories = new ArrayList<>();

          public void save(Category c) {
              categories.add(c);
          }

          public Optional<Category> findById(String id) {
              return categories.stream().filter(c -> c.getId().equals(id)).findFirst();
          }

          public List<Category> findAll() {
              return categories;
          }

          public List<Category> findByProductId(String productId) {
              return categories.stream()
                  .filter(c -> c.getProductIds().contains(productId))
                  .collect(Collectors.toList());
          }

          public void deleteById(String id) {
              categories.removeIf(c -> c.getId().equals(id));
          }
      }
    src/main/java/com/catalog/category/Category.java: |
