    src/test/java/com/catalog/category/CategoryRepositoryTest.java: |
      package com.catalog.category;

      import org.junit.jupiter.api.Test;
      import static org.junit.jupiter.api.Assertions.*;
      import java.util.List;

      public class CategoryRepositoryTest {
          @Test
          void saveAndFind() {
              CategoryRepository repo = new CategoryRepository();
              repo.save(new Category("c1", "Electronics"));
              assertTrue(repo.findById("c1").isPresent());
          }

          @Test
          void findByProductIdReturnsMatchingCategories() {
              CategoryRepository repo = new CategoryRepository();
              Category c = new Category("c1", "Electronics");
              c.addProduct("p1");
              repo.save(c);
              repo.save(new Category("c2", "Books"));
              List<Category> found = repo.findByProductId("p1");
              assertEquals(1, found.size());
              assertEquals("c1", found.get(0).getId());
          }

          @Test
          void deleteByIdRemovesCategory() {
              CategoryRepository repo = new CategoryRepository();
              repo.save(new Category("c1", "Electronics"));
              repo.deleteById("c1");
              assertFalse(repo.findById("c1").isPresent());
          }
      }
