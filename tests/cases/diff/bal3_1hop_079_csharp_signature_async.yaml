  changed_files:
    src/Infrastructure/EmailSender.cs: |
      using System;
      using System.Threading.Tasks;

      namespace App.Infrastructure
      {
          public class EmailSender
          {
              public async Task<bool> SendAsync(string to, string subject, string body)
              {
                  await Task.Delay(100);
                  Console.WriteLine($"Sending to {to}: {subject}");
                  return true;
              }

              public async Task<bool> SendBulkAsync(string[] recipients, string subject, string body)
              {
                  foreach (var r in recipients)
                  {
                      await SendAsync(r, subject, body);
                  }
                  return true;
              }

              public bool Send(string to, string subject, string body)
              {
                  return SendAsync(to, subject, body).GetAwaiter().GetResult();
              }

              public bool SendBulk(string[] recipients, string subject, string body)
              {
                  return SendBulkAsync(recipients, subject, body).GetAwaiter().GetResult();
              }
          }
      }
