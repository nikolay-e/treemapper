name: jvm_and_compiled_049_scala_case_class
repo:
  initial_files:
    User.scala: |
      case class User(name: String, age: Int) {
        def isAdult: Boolean = age >= 18

        def greet: String = s"Hello, I'm $name and I'm $age years old"
      }

      object User {
        def apply(name: String): User = User(name, 0)

        def adults(users: List[User]): List[User] = users.filter(_.isAdult)
      }
    UserService.scala: |
      class UserService {}
    services/ProductService.scala: |
      case class Product(name: String, price: Double, inStock: Boolean = true)

      class ProductService {
        def createProduct(name: String, price: Double): Product = {
          Product(name, price)
        }

        def copyWithNewPrice(product: Product, newPrice: Double): Product = {
          product.copy(price = newPrice)
        }

        def compareProducts(p1: Product, p2: Product): Boolean = {
          p1 == p2
        }
      }
    formatters/UserFormatter.scala: |
      object UserFormatter {
        def format(user: User): String = s"${user.name} (age: ${user.age})"

        def formatList(users: List[User]): String = {
          users.map(format).mkString(", ")
        }

        def toJson(user: User): String = {
          s"""{"name": "${user.name}", "age": ${user.age}}"""
        }
      }
    stats/UserStats.scala: |
      object UserStats {
        def averageAge(users: List[User]): Double = {
          if (users.isEmpty) 0.0
          else users.map(_.age).sum.toDouble / users.size
        }

        def countAdults(users: List[User]): Int = {
          users.count(_.isAdult)
        }

        def oldestUser(users: List[User]): Option[User] = {
          users.sortBy(-_.age).headOption
        }

        def youngestUser(users: List[User]): Option[User] = {
          users.sortBy(_.age).headOption
        }
      }
    repositories/UserRepository.scala: |
      class UserRepository {
        private var users = Map.empty[String, User]

        def save(user: User): Unit = {
          users = users + (user.name -> user)
        }

        def findByName(name: String): Option[User] = users.get(name)

        def findAll(): List[User] = users.values.toList

        def delete(name: String): Unit = {
          users = users - name
        }
      }
