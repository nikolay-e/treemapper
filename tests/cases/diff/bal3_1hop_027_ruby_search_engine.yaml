  changed_files:
    lib/search/index.rb: |
      module Search
        class SearchResult
          attr_reader :id, :content, :score

          def initialize(id:, content:, score:)
            @id = id
            @content = content
            @score = score
          end
        end

        class Index
          def initialize(case_sensitive: false)
            @documents = {}
            @case_sensitive = case_sensitive
          end

          def add(id, content, metadata: {})
            @documents[id] = { content: content, metadata: metadata }
          end

          def search(query, limit: 10)
            normalize = ->(s) { @case_sensitive ? s : s.downcase }
            results = @documents.select { |_id, doc| normalize.call(doc[:content]).include?(normalize.call(query)) }
            results.map { |id, doc| SearchResult.new(id: id, content: doc[:content], score: 1.0) }
                   .first(limit)
          end

          def remove(id)
            @documents.delete(id)
          end

          def size
            @documents.size
          end
        end
      end
  commit_message: "feat: add SearchResult, case sensitivity, metadata, and limit"
