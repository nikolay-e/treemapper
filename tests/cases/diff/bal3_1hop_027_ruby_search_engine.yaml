repo:
  initial_files:
    lib/search/index.rb: |
      module Search
        class Index
          def initialize
            @documents = {}
          end

          def add(id, content)
            @documents[id] = content
          end

          def search(query)
            @documents.select { |_id, content| content.include?(query) }
          end

          def remove(id)
            @documents.delete(id)
          end
        end
      end
    lib/services/product_search.rb: |
      require_relative '../search/index'

      module Services
        class ProductSearch
          def initialize(index)
            @index = index
          end

          def find_products(query)
            @index.search(query)
          end

          def index_product(product)
            @index.add(product[:id], product[:name])
          end
        end
      end
    lib/services/article_search.rb: |
      require_relative '../search/index'

      module Services
        class ArticleSearch
          def initialize(index)
