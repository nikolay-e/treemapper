      import pytest
      from database import Session
      from models import User, Project

      @pytest.fixture
      def db_session():
          session = Session()
          yield session
          session.close()

      @pytest.fixture
      def test_user(db_session):
          user = User(name="Alice", email="alice@example.com")
          db_session.add(user)
          db_session.commit()
          return user

      @pytest.fixture
      def test_project(db_session, test_user):
          project = Project(name="Test Project", owner=test_user)
          db_session.add(project)
          db_session.commit()
          return project
    models.py: |
      class User:
          def __init__(self, name: str, email: str, is_active: bool = True):
              self.name = name
              self.email = email
              self.is_active = is_active

          def __repr__(self):
              return f"User(name={self.name!r}, email={self.email!r})"

      class Project:
          def __init__(self, name: str, owner: User):
              self.name = name
              self.owner = owner
              self.is_archived = False

          def __repr__(self):
              return f"Project(name={self.name!r}, owner={self.owner.name!r})"
    database.py: |
      class Session:
          def __init__(self, url: str = "sqlite:///test.db"):
              self.url = url
              self._data: dict[str, list] = {}

          def add(self, obj: object) -> None:
              table = type(obj).__name__
              if table not in self._data:
                  self._data[table] = []
              self._data[table].append(obj)

          def commit(self) -> None:
              pass

          def rollback(self) -> None:
              self._data.clear()

          def close(self) -> None:
              self._data.clear()

          def query(self, model_class: type) -> list:
              return self._data.get(model_class.__name__, [])
    tests/test_api.py: |
      def test_api_user_creation(db_session, test_user):
          """Verify user fixture is usable in API-level tests."""
          assert test_user.name == "Alice"
          db_session.add(test_user)

      def test_api_project_access(db_session, test_project):
          """Verify project fixture is accessible."""
          assert test_project.name == "Test Project"

      def test_api_list_users(db_session, test_user):
          """Verify user appears in session query."""
          users = db_session.query(type(test_user))
          assert len(users) >= 1
    services/user_service.py: |
      from database import Session
      from models import User

      class UserService:
          def __init__(self, session: Session):
              self.session = session

          def create_user(self, name: str, email: str) -> User:
              user = User(name=name, email=email)
              self.session.add(user)
              self.session.commit()
              return user

          def get_users(self) -> list:
              return self.session.query(User)

          def deactivate_user(self, user: User) -> None:
              user.is_active = False
              self.session.commit()
