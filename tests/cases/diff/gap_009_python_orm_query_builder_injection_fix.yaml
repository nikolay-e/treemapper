    db/query.py: |
      import re

      VALID_IDENTIFIER = re.compile(r"^[a-zA-Z_][a-zA-Z0-9_.]*$")

      class QueryBuilder:
          def __init__(self, table: str):
              self._validate_identifier(table)
              self._table = table
              self._conditions: list[str] = []
              self._params: list = []
              self._order_by: str | None = None
              self._limit: int | None = None

          def where(self, clause: str, *params) -> "QueryBuilder":
              self._conditions.append(clause)
              self._params.extend(params)
              return self

          def order(self, column: str, direction: str = "ASC") -> "QueryBuilder":
              self._validate_identifier(column)
              if direction.upper() not in ("ASC", "DESC"):
                  raise ValueError(f"Invalid direction: {direction}")
              self._order_by = f"{column} {direction.upper()}"
              return self

          def limit(self, n: int) -> "QueryBuilder":
              if n < 0:
                  raise ValueError("Limit must be non-negative")
              self._limit = n
              return self

          def build(self) -> tuple[str, list]:
              sql = f"SELECT * FROM {self._table}"
              if self._conditions:
                  sql += " WHERE " + " AND ".join(self._conditions)
              if self._order_by:
                  sql += f" ORDER BY {self._order_by}"
              if self._limit is not None:
                  sql += f" LIMIT {self._limit}"
              return sql, self._params

          def _validate_identifier(self, name: str) -> None:
              if not VALID_IDENTIFIER.match(name):
                  raise ValueError(f"Invalid identifier: {name}")
