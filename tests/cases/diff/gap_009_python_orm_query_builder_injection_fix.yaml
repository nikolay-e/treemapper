      from db.query import QueryBuilder

      class UserHandler:
          def __init__(self, db):
              self._db = db

          def search(self, name_filter: str) -> list[dict]:
              q = QueryBuilder("users").where("name LIKE ?", f"%{name_filter}%")
              sql, params = q.build()
              return self._db.execute(sql, params)

          def list_active(self) -> list[dict]:
              q = QueryBuilder("users").where("active = ?", True).order("created_at", "DESC")
              sql, params = q.build()
              return self._db.execute(sql, params)
