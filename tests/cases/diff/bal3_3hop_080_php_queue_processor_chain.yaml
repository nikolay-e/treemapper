  changed_files:
    src/Queue/Job.php: |
      <?php
      namespace App\Queue;

      abstract class Job {
          protected string $queue = 'default';
          protected int $maxRetries = 3;
          protected int $attempts = 0;
          abstract public function handle(): void;
          public function getQueue(): string {
              return $this->queue;
          }
          public function incrementAttempts(): void {
              $this->attempts++;
          }
          public function canRetry(): bool {
              return $this->attempts < $this->maxRetries;
          }
      }
    src/Queue/Worker.php: |
      <?php
      namespace App\Queue;

      use App\Queue\Job;

      class Worker {
          public function process(Job $job): bool {
              $job->incrementAttempts();
              try {
                  $job->handle();
                  return true;
              } catch (\Throwable $e) {
                  return false;
              }
          }
      }
    src/Queue/Dispatcher.php: |
      <?php
      namespace App\Queue;

      use App\Queue\Worker;
      use App\Queue\Job;

      class Dispatcher {
          private Worker $worker;
          private array $queue = [];
          private array $failed = [];
          public function __construct(Worker $worker) {
              $this->worker = $worker;
          }
          public function dispatch(Job $job): void {
              $this->queue[] = $job;
          }
          public function flush(): array {
              $results = [];
              foreach ($this->queue as $job) {
                  $success = $this->worker->process($job);
                  if (!$success && $job->canRetry()) {
                      $this->failed[] = $job;
                  }
                  $results[] = $success;
              }
              $this->queue = $this->failed;
              $this->failed = [];
              return $results;
          }
      }
    src/Services/QueueService.php: |
      <?php
      namespace App\Services;

      use App\Queue\Dispatcher;
      use App\Queue\Job;

      class QueueService {
          private Dispatcher $dispatcher;
          public function __construct(Dispatcher $dispatcher) {
              $this->dispatcher = $dispatcher;
          }
          public function enqueue(Job $job): void {
              $this->dispatcher->dispatch($job);
          }
          public function processAll(): array {
              return $this->dispatcher->flush();
          }
      }
    src/Console/QueueCommand.php: |
      <?php
      namespace App\Console;

      use App\Services\QueueService;

      class QueueCommand {
          private QueueService $service;
          public function __construct(QueueService $service) {
              $this->service = $service;
          }
          public function run(): array {
              return $this->service->processAll();
          }
      }
