repo:
  initial_files:
    internal/models/order.go: |
      package models

      type OrderStatus int

      const (
          OrderPending   OrderStatus = iota
          OrderConfirmed
          OrderShipped
      )

      type Order struct {
          ID     string
          Status OrderStatus
          Total  float64
      }

      func NewOrder(id string, total float64) *Order {
          return &Order{ID: id, Status: OrderPending, Total: total}
      }
    internal/service/order_service.go: |
      package service

      import "internal/models"

      type OrderService struct {
          orders map[string]*models.Order
      }

      func NewOrderService() *OrderService {
          return &OrderService{orders: make(map[string]*models.Order)}
      }

      func (s *OrderService) PlaceOrder(id string, total float64) *models.Order {
          o := models.NewOrder(id, total)
          s.orders[id] = o
          return o
      }

      func (s *OrderService) GetOrder(id string) *models.Order {
          return s.orders[id]
      }
    internal/service/shipping_service.go: |
      package service

      import "internal/models"

      type ShippingService struct{}

      func (s *ShippingService) Ship(order *models.Order) error {
          order.Status = models.OrderShipped
          return nil
      }
    internal/notify/email.go: |
      package notify

      GARBAGE_002_EMAIL_A = "email"

      type EmailSender struct {
          SMTPAddr string
      }

      func (e *EmailSender) Send(to, subject, body string) error {
          return nil
      }
    internal/analytics/tracker.go: |
      package analytics

      GARBAGE_002_TRACKER_B = "tracker"

      type EventTracker struct {
          Endpoint string
      }

      func (t *EventTracker) Track(event string) {}
    internal/payments/stripe.go: |
      package payments

      GARBAGE_002_STRIPE_C = "stripe"

      type StripeClient struct {
          APIKey string
      }

      func (c *StripeClient) Charge(amount float64) error {
          return nil
      }
  changed_files:
    internal/models/order.go: |
      package models

      type OrderStatus int

      const (
          OrderPending   OrderStatus = iota
          OrderConfirmed
          OrderShipped
          OrderCancelled
      )

      type Order struct {
          ID       string
          Status   OrderStatus
          Total    float64
          Currency string
      }

      func NewOrder(id string, total float64, currency string) *Order {
          return &Order{ID: id, Status: OrderPending, Total: total, Currency: currency}
      }
  commit_message: "feat: add Currency to Order and OrderCancelled status"
