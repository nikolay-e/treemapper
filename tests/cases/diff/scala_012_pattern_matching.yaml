name: scala_012_pattern_matching
tags:
- lang:clojure
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    src/report/aggregator.clj: |
      (ns report.aggregator)

      (defn sum-by [coll key-fn]
        (reduce + (map key-fn coll)))

      (defn group-by-field [coll key-fn]
        (group-by key-fn coll))

      (defn count-by [coll key-fn]
        (reduce-kv (fn [m k v] (assoc m k (count v)))
                   {}
                   (group-by-field coll key-fn)))
    src/report/builder.clj: |
      (ns report.builder
        (:require [report.aggregator :as agg]))

      (defn build-summary [records field-fn]
        {:total    (count records)
         :sum      (agg/sum-by records field-fn)
         :by-group (agg/count-by records field-fn)})
    src/api/report_handler.clj: |
      (ns api.report-handler
        (:require [report.builder :as rb]))

      (defn handle-report [records field-fn]
        {:status 200 :body (rb/build-summary records field-fn)})
    garbage/cache.clj: |
      (ns garbage.cache)

      (def ^:const GARBAGE_SCALA012_A "redis_marker")
      (def ^:const GARBAGE_SCALA012_B "ttl_marker")

      (defn get-cached [k]
        GARBAGE_SCALA012_A)
    garbage/export.clj: |
      (ns garbage.export)

      (def ^:const GARBAGE_SCALA012_C "csv_marker")
      (def ^:const GARBAGE_SCALA012_D "xlsx_marker")

      (defn export-csv [data]
        GARBAGE_SCALA012_C)
    garbage/email.clj: |
      (ns garbage.email)

      (def ^:const GARBAGE_SCALA012_E "smtp_marker")

      (defn send-report [recipient report]
        GARBAGE_SCALA012_E)
  changed_files:
    src/report/builder.clj: |
      (ns report.builder
        (:require [report.aggregator :as agg]))

      (defn build-summary [records field-fn]
        {:total    (count records)
         :sum      (agg/sum-by records field-fn)
         :by-group (agg/count-by records field-fn)})

      (defn build-top-n [records field-fn n]
        (take n (sort-by (comp - field-fn) records)))
    garbage/cache.clj: |
      (ns garbage.cache)

      (def ^:const GARBAGE_SCALA012_A "redis_marker")
      (def ^:const GARBAGE_SCALA012_B "ttl_marker")

      (defn get-cached [k]
        GARBAGE_SCALA012_A)
    garbage/export.clj: |
      (ns garbage.export)

      (def ^:const GARBAGE_SCALA012_C "csv_marker")
      (def ^:const GARBAGE_SCALA012_D "xlsx_marker")

      (defn export-csv [data]
        GARBAGE_SCALA012_C)
    garbage/email.clj: |
      (ns garbage.email)

      (def ^:const GARBAGE_SCALA012_E "smtp_marker")

      (defn send-report [recipient report]
        GARBAGE_SCALA012_E)
  commit_message: "feat: add build-top-n to report builder"
