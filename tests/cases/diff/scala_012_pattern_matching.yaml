    anchor: "(defn build-top-n"
- id: aggregator_sum_by
  selector:
    path: src/report/aggregator.clj
    anchor: "(defn sum-by"
- id: handler_uses_builder
  selector:
    path: src/api/report_handler.clj
    anchor: "(rb/build-summary"
- id: no_garbage_a
  selector:
    anchor: GARBAGE_SCALA012_A
- id: no_garbage_b
  selector:
    anchor: GARBAGE_SCALA012_B
- id: no_garbage_c
