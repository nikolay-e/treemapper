name: shell_014_here_document
tags:
- lang:shell
- change:single_file
- context:import_chain
- distance:2hop
- difficulty:medium
repo:
  initial_files:
    generate.sh: |
      #!/bin/bash
      set -euo pipefail

      source ./app_vars.sh

      echo "Generating config.json..."

      cat <<EOF > config.json
      {
          "name": "$APP_NAME",
          "version": "$APP_VERSION"
      }
      EOF

      echo "Config generated successfully."
    app_vars.sh: |
      #!/bin/bash
      # Application variable defaults — sourced by generate.sh and other scripts.
      # Override via environment: DB_HOST=mydb ./generate.sh

      export APP_NAME="myapp"
      export APP_VERSION="1.0.0"
      export DEPLOY_ENV="${DEPLOY_ENV:-production}"

      # Database defaults
      export DB_HOST="${DB_HOST:-localhost}"
      export DB_PORT="${DB_PORT:-5432}"
      export DB_NAME="${DB_NAME:-appdb}"
      export DB_USER="${DB_USER:-appuser}"

      # Connection string (derived)
      export DB_URL="postgresql://${DB_USER}@${DB_HOST}:${DB_PORT}/${DB_NAME}"
    docker-compose.yml: |
      version: "3.8"
      services:
        app:
          build: .
          environment:
            - DB_HOST=postgres
            - DB_PORT=5432
            - DB_NAME=appdb
            - DB_USER=appuser
            - DEPLOY_ENV=production
          depends_on:
            - postgres
          volumes:
            - ./config.json:/app/config.json:ro
          command: ["./start.sh"]

        postgres:
          image: postgres:16-alpine
          environment:
            POSTGRES_DB: appdb
            POSTGRES_USER: appuser
            POSTGRES_PASSWORD: secret
          ports:
            - "5432:5432"
          volumes:
            - pgdata:/var/lib/postgresql/data

        config-generator:
          build: .
          command: ["./generate.sh"]
          environment:
            - DB_HOST=postgres
            - DEPLOY_ENV=production
          volumes:
            - .:/workspace

      volumes:
        pgdata:
    docs/config-generation.md: |
      # Config Generation Strategy

      ## Overview

      We use shell heredocs in `generate.sh` to produce `config.json` at
      build/deploy time. The script sources `app_vars.sh` for variable
      defaults, which can be overridden via environment variables.

      ## Why Heredocs?

      We evaluated three approaches:
      1. **Go templates** (`config.tmpl`) — requires Go toolchain
      2. **envsubst** — can't handle conditional logic
      3. **Shell heredocs** — zero dependencies, full bash expressiveness

      We chose heredocs for simplicity. The tradeoff is that JSON syntax
      errors aren't caught until runtime.

      ## Variables

      | Variable    | Default       | Source         |
      |-------------|---------------|----------------|
      | DB_HOST     | localhost     | app_vars.sh    |
      | DB_PORT     | 5432          | app_vars.sh    |
      | DEPLOY_ENV  | production    | app_vars.sh    |
      | APP_NAME    | myapp         | app_vars.sh    |

      ## Quoted vs Unquoted Heredocs

      The config heredoc uses `<<EOF` (unquoted) so variables like `$DB_HOST`
      are expanded. If we need literal dollar signs in output, we use
      `<<'DELIM'` (quoted) which suppresses all expansion.

      ## Usage

      ```bash
      # Use defaults
      ./generate.sh

      # Override for staging
      DB_HOST=staging-db.internal DEPLOY_ENV=staging ./generate.sh
      ```
    Makefile: ".PHONY: generate-config check-db deploy clean test\n\ngenerate-config:\n\t./generate.sh\n\ncheck-db:\n\t@source\
      \ ./app_vars.sh && \\\n\t\tpg_isready -h \"$$DB_HOST\" -p \"$$DB_PORT\" && \\\n\t\techo \"Database OK\" || echo \"Database\
      \ UNREACHABLE\"\n\ndeploy: generate-config check-db\n\t./scripts/apply_config.sh\n\tdocker compose up -d\n\nclean:\n\
      \trm -f config.json setup.sh\n\ntest:\n\t./generate.sh\n\tjq empty config.json\n\t@echo \"Config valid\"\n"
    .env.example: |
      # Copy to .env and customize for your environment.
      # These override the defaults in app_vars.sh.

      DB_HOST=mydb.example.com
      DB_PORT=5432
      DB_NAME=myapp_production
      DB_USER=deploy_user
      DEPLOY_ENV=staging

      # Optional: uncomment for verbose output
      # DEBUG=1
      # LOG_LEVEL=debug
    scripts/apply_config.sh: |
      #!/bin/bash
      set -euo pipefail

      source ./app_vars.sh

      echo "Applying configuration..."
      echo "  Database: $DB_HOST:$DB_PORT/$DB_NAME"
      echo "  Environment: $DEPLOY_ENV"

      # Verify database connectivity
      if pg_isready -h "$DB_HOST" -p "$DB_PORT" -q 2>/dev/null; then
          echo "  Database connection: OK"
      else
          echo "  WARNING: Database not reachable at $DB_HOST:$DB_PORT"
      fi

      # Load config.json into running service
      if [[ -f config.json ]]; then
          curl -s -X POST http://localhost:8080/admin/reload-config \
              -H "Content-Type: application/json" \
              -d @config.json
          echo "  Config reloaded via API"
      fi
    CHANGELOG.md: |
      # Changelog

      ## [Unreleased]

      ### Added
      - Database configuration (host, port) in generated config.json
      - Quoted heredoc for setup.sh generation (no variable expansion)
      - DEPLOY_ENV field in config.json

      ### Changed
      - generate.sh now sources DB_HOST and DB_PORT from app_vars.sh

      ## [1.0.0] - 2025-01-15

      ### Added
      - Initial config generation with APP_NAME and APP_VERSION
      - app_vars.sh for centralized variable management
  changed_files:
    generate.sh: |
      #!/bin/bash
      set -euo pipefail

      source ./app_vars.sh

      echo "Generating config.json..."

      cat <<EOF > config.json
      {
          "name": "$APP_NAME",
          "version": "$APP_VERSION",
          "environment": "$DEPLOY_ENV",
          "database": {
              "host": "$DB_HOST",
              "port": $DB_PORT
          }
      }
      EOF

      cat <<'SCRIPT' > setup.sh
      #!/bin/bash
      echo "This is a literal script"
      echo '$HOME will not be expanded'
      echo 'DB_HOST is not interpolated here'
      SCRIPT

      echo "Config and setup script generated."
  commit_message: Update files
