name: javascript_extended_007_default_export_change
repo:
  initial_files:
    src/api.ts: |
      interface ApiClient {
          get(url: string): Promise<Response>;
      }

      export default function apiClient(): ApiClient {
          return {
              get: (url: string) => fetch(url),
          };
      }

      export function createHeaders(token?: string): Record<string, string> {
          const headers: Record<string, string> = {
              'Content-Type': 'application/json',
          };
          if (token) {
              headers['Authorization'] = `Bearer ${token}`;
          }
          return headers;
      }
    src/service.ts: |
      import client from './api';

      export async function getData(url: string) {
          const api = client();
          const response = await api.get(url);
          return response.json();
      }

      export async function getStatus(): Promise<string> {
          const api = client();
          const response = await api.get('/api/health');
          const data = await response.json();
          return data.status;
      }
    src/unrelated/featureFlags.ts: |
      export class FeatureFlagService {
          private flags: Record<string, boolean> = {};

          isEnabled(flag: string): boolean {
              return this.flags[flag] ?? false;
          }

          setFlag(flag: string, value: boolean): void {
              this.flags[flag] = value;
          }
      }

      export function evaluateFlags(userId: string): Record<string, boolean> {
          return { darkMode: false, betaFeatures: true };
      }
    src/unrelated/rateLimit.ts: |
      interface RateLimitConfig {
          maxRequests: number;
          windowMs: number;
      }

      export class RateLimiter {
          private count = 0;

          check(): boolean {
              return this.count < 100;
          }

          increment(): void {
              this.count++;
          }
      }

      export function resetLimits(limiter: RateLimiter): void {
          console.log('resetting rate limits');
      }
  changed_files:
    src/api.ts: |
      interface ApiClient {
          get(url: string): Promise<Response>;
          post(url: string, data: unknown): Promise<Response>;
      }

      export default function apiClient(baseUrl = ''): ApiClient {
          return {
              get: (url: string) => fetch(baseUrl + url),
              post: (url: string, data: unknown) => fetch(baseUrl + url, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(data),
              }),
          };
      }

      export function createHeaders(token?: string): Record<string, string> {
          const headers: Record<string, string> = {
              'Content-Type': 'application/json',
          };
          if (token) {
              headers['Authorization'] = `Bearer ${token}`;
          }
          return headers;
      }
    src/service.ts: |
      import client from './api';

      export async function getData(url: string) {
          const api = client();
          const response = await api.get(url);
          return response.json();
      }

      export async function getStatus(): Promise<string> {
          const api = client();
          const response = await api.get('/api/health');
          const data = await response.json();
          return data.status;
      }
    src/unrelated/featureFlags.ts: |
      export class FeatureFlagService {
          private flags: Record<string, boolean> = {};

          isEnabled(flag: string): boolean {
              return this.flags[flag] ?? false;
          }

          setFlag(flag: string, value: boolean): void {
              this.flags[flag] = value;
          }
      }

      export function evaluateFlags(userId: string): Record<string, boolean> {
          return { darkMode: false, betaFeatures: true };
      }
    src/unrelated/rateLimit.ts: |
      interface RateLimitConfig {
          maxRequests: number;
          windowMs: number;
      }

      export class RateLimiter {
          private count = 0;

          check(): boolean {
              return this.count < 100;
          }

          increment(): void {
              this.count++;
          }
      }

      export function resetLimits(limiter: RateLimiter): void {
          console.log('resetting rate limits');
      }
  commit_message: Update files
