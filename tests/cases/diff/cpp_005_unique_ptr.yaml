    include/resource/resource.hpp: |
      #pragma once
      #include <string>
      #include <vector>
      #include <functional>

      namespace app::resource {

      enum class ResourceType {
          Texture,
          Shader,
          Model,
          Audio,
          Script
      };

      struct ResourceMetadata {
          std::string path;
          ResourceType type;
          size_t sizeBytes;
          bool compressed;
      };

      class Resource {
      public:
          explicit Resource(const std::string& id)
              : id_(id)
              , loaded_(false) {}

          virtual ~Resource() = default;

          const std::string& id() const { return id_; }
          bool isLoaded() const { return loaded_; }

          virtual bool load() = 0;
          virtual void unload() = 0;
          virtual size_t memoryUsage() const = 0;

      protected:
          void setLoaded(bool loaded) { loaded_ = loaded; }

      private:
          std::string id_;
          bool loaded_;
      };

      class TextureResource : public Resource {
      public:
          TextureResource(const std::string& id, int width, int height)
              : Resource(id)
              , width_(width)
              , height_(height)
              , data_(nullptr) {}

          ~TextureResource() override { unload(); }

          bool load() override {
              if (isLoaded()) return true;
              data_ = new unsigned char[width_ * height_ * 4];
              setLoaded(true);
              return true;
          }

          void unload() override {
              delete[] data_;
              data_ = nullptr;
              setLoaded(false);
          }

          size_t memoryUsage() const override {
              return isLoaded() ? width_ * height_ * 4 : 0;
          }

          int width() const { return width_; }
          int height() const { return height_; }

      private:
          int width_;
          int height_;
          unsigned char* data_;
      };

      }
