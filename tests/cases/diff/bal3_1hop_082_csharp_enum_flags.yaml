      namespace App.Core
      {
          [Flags]
          public enum Permission
          {
              None = 0,
              Read = 1,
              Write = 2,
              Delete = 4,
              Execute = 8,
              Admin = 16,
              All = Read | Write | Delete | Execute | Admin
          }
      }
