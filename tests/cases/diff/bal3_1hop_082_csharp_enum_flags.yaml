repo:
  initial_files:
    src/Core/Permission.cs: |
      using System;

      namespace App.Core
      {
          public enum Permission
          {
              None = 0,
              Read = 1,
              Write = 2,
              Delete = 4
          }
      }
    src/Auth/PermissionChecker.cs: |
      using System;
      using App.Core;

      namespace App.Auth
      {
          public class PermissionChecker
          {
              public bool HasPermission(Permission userPerms, Permission required)
              {
                  return (userPerms & required) == required;
              }
          }
      }
    src/Auth/RoleManager.cs: |
      using System;
      using App.Core;

      namespace App.Auth
      {
          public class RoleManager
          {
              public Permission GetRolePermissions(string role)
              {
                  switch (role)
                  {
                      case "admin": return Permission.Read | Permission.Write | Permission.Delete;
                      case "editor": return Permission.Read | Permission.Write;
                      default: return Permission.Read;
                  }
              }
          }
      }
    src/Controllers/ResourceController.cs: |
      using System;
      using App.Core;

      namespace App.Controllers
      {
          public class ResourceController
          {
              private readonly Permission _userPermissions;

              public ResourceController(Permission userPermissions)
              {
                  _userPermissions = userPermissions;
              }

              public bool CanDelete()
              {
                  return (_userPermissions & Permission.Delete) == Permission.Delete;
              }
          }
      }
    src/Middleware/AuthorizationFilter.cs: |
      using System;
      using App.Core;

      namespace App.Middleware
      {
          public class AuthorizationFilter
          {
              public bool Authorize(Permission userPerms, Permission required)
              {
                  return (userPerms & required) == required;
              }
          }
      }
    src/Views/PermissionView.cs: |
      using System;
      using App.Core;

      namespace App.Views
      {
          public class PermissionView
          {
              public string Render(Permission perms)
              {
                  return $"Permissions: {perms}";
              }
          }
      }
    src/IO/FileWriter.cs: |
