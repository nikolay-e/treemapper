repo:
  initial_files:
    src/buffer.cpp: |
      #include <vector>
      #include <string>

      class RingBuffer {
      public:
          explicit RingBuffer(int capacity) : data_(capacity), head_(0), size_(0) {}

          void push(int value) {
              data_[head_] = value;
              head_ = (head_ + 1) % data_.size();
              if (size_ < data_.size()) size_++;
          }

          int sum() const {
              int total = 0;
              for (int i = 0; i <= size_; i++) {
                  total += data_[i];
              }
              return total;
          }

      private:
          std::vector<int> data_;
          int head_;
          int size_;
      };
